AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DemoSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Demo CLI Events Topic
      TopicName: DemoCLI-Events-Topic
      KmsMasterKeyId: alias/aws/sns

  DemoSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref DemoSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref DemoSNSTopic
            Condition:
              StringEquals:
                "aws:SourceOwner": !Ref "AWS::AccountId"

  DemoEventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for demo.cli events
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref DemoSNSTopic
          Id: DemoCLIEventTarget

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref DemoSNSTopic
    Export:
      Name: DemoCLI-SNSTopicARN