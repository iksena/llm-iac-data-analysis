AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an automated monitoring and notification system for AWS Secrets Manager secret lifecycle events.

Parameters:
  SNSTopicName:
    Type: String
    Default: SecretsManagerEventsTopic
    Description: Name of the SNS topic to send notifications to
  EmailSubscription:
    Type: String
    Default: admin@example.com
    Description: Email address to subscribe to the SNS topic

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailSubscription
      Protocol: email
      TopicArn: !Ref SNSTopic

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  SecretsManagerEventHandler:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          def lambda_handler(event, context):
              sns_client = boto3.client('sns')
              topic_arn = os.environ['SNS_TOPIC_ARN']

              # Extract event details
              detail = event['detail']
              secret_id = detail.get('SecretId', 'Unknown')
              operation = detail.get('Operation', 'Unknown')
              request_id = detail.get('RequestId', 'Unknown')

              # Create notification message
              message = f"Secrets Manager Event: {operation}\n\n"
              message += f"Secret ID: {secret_id}\n"
              message += f"Request ID: {request_id}\n"
              message += f"Event Time: {detail.get('EventTime', 'Unknown')}\n"

              # Publish to SNS
              response = sns_client.publish(
                  TopicArn=topic_arn,
                  Subject=f"Secrets Manager {operation} Alert",
                  Message=message
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Notification sent successfully!')
              }

      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Captures Secrets Manager Create, Update, and Access events
      EventPattern:
        source:
          - aws.secretsmanager
        detail:
          Operation:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn: !GetAtt SecretsManagerEventHandler.Arn
          Id: SecretsManagerEventHandler

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SecretsManagerEventHandler
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  LambdaFunctionARN:
    Description: ARN of the Lambda function
    Value: !GetAtt SecretsManagerEventHandler.Arn