AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon S3 bucket with default settings.

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'my-default-bucket-${AWS::AccountId}-${AWS::Region}'

Outputs:
  BucketName:
    Description: The name of the S3 bucket
    Value: !Ref S3Bucket