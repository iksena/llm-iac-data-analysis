AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
      RetentionPeriodHours: 24

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      AlarmActions:
        - !Ref AlarmTopic

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisThroughputAlarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com