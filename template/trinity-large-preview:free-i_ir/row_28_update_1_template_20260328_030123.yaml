AWSTemplateFormatVersion: '2010-09-09'
Description: Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events

Resources:
  SecretsManagerMonitorTopic:
    Type: AWS::SNS::Topic
    Properties: {}
    Metadata:
      Effect: public-read

  SecretsManagerMonitorPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Id: SecretsManagerMonitorPolicy
        Statement:
          - Sid: SecretsManagerPublish
            Effect: Allow
            Principal: "*"
            Action: SNS:Publish
            Resource:
              Ref: SecretsManagerMonitorTopic
            Condition:
              ArnLike:
                AWS:SourceArn:
                  Fn::Join:
                    - ":"
                    - - arn
                      - Ref: AWS::Partition
                      - secretsmanager
                      - Ref: AWS::Region
                      - Ref: AWS::AccountId
                      - "*"
      Topics:
        - Ref: SecretsManagerMonitorTopic
    Metadata:
      Effect: encrypted

  SecretsManagerMonitorFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
    Metadata:
      Effect: encrypted

  SecretsManagerMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Code:
        ZipFile: exports.handler = async (event) => { console.log(JSON.stringify(event)); };
      Timeout: 30
      Role:
        Fn::GetAtt:
          - SecretsManagerMonitorFunctionRole
          - Arn
    Metadata:
      Effect: encrypted
    DependsOn:
      - SecretsManagerMonitorFunctionRole

  SecretsManagerMonitorFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
          - SecretsManagerMonitorFunction
          - Arn
      Principal: secretsmanager.amazonaws.com
    Metadata: {}
    DependsOn:
      - SecretsManagerMonitorFunction

  SecretsManagerMonitorRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        "detail-type":
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn:
            Fn::GetAtt:
              - SecretsManagerMonitorFunction
              - Arn
          Id: SecretsManagerMonitorTarget
    Metadata:
      Effect: encrypted
    DependsOn:
      - SecretsManagerMonitorFunction

Metadata:
  Invariants:
    - Secrets Manager events must be monitored for CreateSecret, UpdateSecret, and GetSecretValue operations
    - Notifications must be sent via SNS topic
    - Lambda function must have appropriate IAM permissions
    - EventBridge rule must capture relevant API calls via CloudTrail