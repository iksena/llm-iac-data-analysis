AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  ApiDestinationUrl:
    Type: String
    Description: The URL of the external API endpoint
    Default: 'https://webhook.site/testtest'
  ApiKey:
    Type: String
    Description: The API key for authentication
    NoEcho: true
  EventBusName:
    Type: String
    Description: The name of the EventBridge event bus
    Default: 'default'

Resources:
  ApiDestination:
    Type: AWS::ApiGateway::ApiDestination
    Properties:
      ApiDestinationArn: !Sub 'arn:aws:apigateway:${AWS::Region}:api-destination/${ApiDestinationUrl}'
      ApiDestinationRegion: !Ref AWS::Region
      ConnectionArn: !Ref ApiKeyConnection
      Description: External API destination

  ApiKeyConnection:
    Type: AWS::ApiGateway::Connection
    Properties:
      Description: API key connection
      ApiKey: !Ref ApiKey
      ApiKeySelectionExpression: '$request.header.apikey'

  EventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: !Ref EventBusName

  EventRule:
    Type: AWS::EventBridge::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - 'custom.source'
      Targets:
        - Arn: !GetAtt ApiDestination.ApiDestinationArn
          Id: ApiDestinationTarget

Outputs:
  EventRuleArn:
    Description: The ARN of the EventBridge rule
    Value: !Ref EventRule
  ApiDestinationArn:
    Description: The ARN of the API Gateway API destination
    Value: !GetAtt ApiDestination.ApiDestinationArn