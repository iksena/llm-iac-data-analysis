AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready IAM baseline with secure role-based access and cross-account governance'

Parameters:
  IdentityAccountID:
    Type: String
    Description: 'AWS account ID for Identity Management account (12 digits)'
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: 'Must be a 12-digit AWS account number'
  ToolingAccountID:
    Type: String
    Description: 'AWS account ID for Tooling Management account (12 digits)'
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: 'Must be a 12-digit AWS account number'

Resources:
  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdmin
      Description: 'Full administrative access with MFA enforcement and sensitive operation restrictions'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingAccountID}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: AdminAccessWithRestrictions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: '*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'billing:*'
                  - 'cloudhsm:*'
                Resource: '*'

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdmin
      Description: 'Limited administrative access with service restrictions and MFA enforcement'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingAccountID}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                  - 'cloudformation:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'billing:*'
                  - 'cloudhsm:*'
                  - 'iam:*'
                Resource: '*'

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdmin
      Description: 'Dedicated role for IAM identity management with MFA enforcement'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityAccountID}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: IdentityManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'billing:*'
                  - 'cloudhsm:*'
                Resource: '*'

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecution
      Description: 'Execution role for CloudFormation stack operations'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Service: 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CFNExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: '*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'billing:*'
                  - 'cloudhsm:*'
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecution
      Description: 'Execution role for CloudFormation StackSet operations'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:PrincipalAccount': !Ref ToolingAccountID
      Policies:
        - PolicyName: StackSetExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: '*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'billing:*'
                  - 'cloudhsm:*'
                Resource: '*'

  PrivilegedAdminsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmins
      Policies:
        - PolicyName: AssumePrivilegedAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: !GetAtt PrivilegedAdminRole.Arn

  RestrictedAdminsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmins
      Policies:
        - PolicyName: AssumeRestrictedAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: !GetAtt RestrictedAdminRole.Arn

  IdentityAdminsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmins
      Policies:
        - PolicyName: AssumeIdentityAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: !GetAtt IdentityAdminRole.Arn

Outputs:
  PrivilegedAdminRoleArn:
    Description: 'ARN of the PrivilegedAdmin role for cross-account assumption'
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: 'ARN of the RestrictedAdmin role for cross-account assumption'
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: 'ARN of the IdentityAdmin role for identity management'
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: 'ARN of the CloudFormation execution role'
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: 'ARN of the StackSet execution role'
    Value: !GetAtt StackSetExecutionRole.Arn
  PrivilegedAdminsGroupArn:
    Description: 'ARN of the PrivilegedAdmins IAM group'
    Value: !GetAtt PrivilegedAdminsGroup.Arn
  RestrictedAdminsGroupArn:
    Description: 'ARN of the RestrictedAdmins IAM group'
    Value: !GetAtt RestrictedAdminsGroup.Arn
  IdentityAdminsGroupArn:
    Description: 'ARN of the IdentityAdmins IAM group'
    Value: !GetAtt IdentityAdminsGroup.Arn