AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready web application environment with S3, DynamoDB, and EC2 integration'
Parameters:
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: String
    Default: NONE
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
Conditions:
  UseKeyName: !Not [!Equals [!Ref KeyName, "NONE"]]
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from anywhere
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WebAppSG
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForStaticAssets
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${S3Bucket}/*"
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: Version
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: Version
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                  - dynamodb:*
                Resource: '*'
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: DynamoDBTable
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !If [UseKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Sub: 
            - |
              #!/bin/bash
              set -x
              yum update -y
              yum install -y httpd php php-cli php-mbstring aws-cli jq
              systemctl start httpd
              systemctl enable httpd
              
              cat > /var/www/html/index.php <<'EOF'
              <html>
              <head>
                <title>Lab Application</title>
                <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
              </head>
              <body>
                <h1>Welcome to the Lab Application</h1>
                <img src="https://${S3Bucket}.s3.${AWS::Region}.amazonaws.com/sample.jpg" alt="Sample">
              </body>
              </html>
              EOF
              
              echo "Sample image content" > /tmp/sample.jpg
              aws s3 cp /tmp/sample.jpg s3://${S3Bucket}/sample.jpg
              
              cat > /tmp/data.json <<'EOT'
              {
                "ServiceName": {"S": "EC2"},
                "Version": {"S": "2023"}
              }
              EOT
              
              MAX_RETRIES=30
              RETRY_INTERVAL=5
              TABLE_STATUS=$(aws dynamodb describe-table --table-name AWS-Services --query "Table.TableStatus" --output text 2>/dev/null || echo "NOT_FOUND")
              
              for ((i=1; i<=MAX_RETRIES; i++)); do
                if [ "$TABLE_STATUS" == "ACTIVE" ]; then
                  echo "DynamoDB table is ACTIVE"
                  break
                fi
                
                if [ "$TABLE_STATUS" == "NOT_FOUND" ]; then
                  echo "DynamoDB table not found yet, retrying ($i/$MAX_RETRIES)..."
                else
                  echo "DynamoDB table status: $TABLE_STATUS, retrying ($i/$MAX_RETRIES)..."
                fi
                
                sleep $RETRY_INTERVAL
                TABLE_STATUS=$(aws dynamodb describe-table --table-name AWS-Services --query "Table.TableStatus" --output text 2>/dev/null || echo "NOT_FOUND")
              done
              
              if [ "$TABLE_STATUS" != "ACTIVE" ]; then
                echo "ERROR: DynamoDB table did not become ACTIVE in time"
                exit 1
              fi
              
              aws dynamodb put-item --table-name AWS-Services --item file:///tmp/data.json
              
              echo "<?php phpinfo(); ?>" > /var/www/html/phpinfo.php
              
              systemctl restart httpd
            - S3Bucket: !Ref S3Bucket
Outputs:
  EC2PublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt EC2Instance.PublicIp
  S3BucketName:
    Description: Name of the S3 bucket for static assets
    Value: !Ref S3Bucket
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: AWS-Services