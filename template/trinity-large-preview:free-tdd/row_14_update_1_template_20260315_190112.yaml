AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Network Interface with EIPs and secondary private IPs
      SubnetId: !Ref SubnetId
      PrivateIpAddress: !Ref PrivateIpAddress
      SecondaryPrivateIpAddressCount: 2
      Groups:
        - !Ref SecurityGroupId
      Tags:
        - Key: Name
          Value: MyNetworkInterface

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000

  PrivateIpAddress:
    Type: String
    Default: 10.0.0.10

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-00000000000000000