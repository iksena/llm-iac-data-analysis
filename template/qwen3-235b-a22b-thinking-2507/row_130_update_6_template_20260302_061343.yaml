AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Account-wide IAM Password Policy with customizable security requirements.
  Uses Lambda custom resource to manage password policy configuration.

Parameters:
  MinPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum password length (6-128 characters)
  
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase character
  
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase character
  
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one numeric character
  
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one special character
  
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Days before password expiration (1-1095)
  
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to remember (1-24)
  
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow IAM users to change their own password
  
  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enforce immediate password change upon expiration

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PasswordPolicyUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:UpdateAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          import urllib3
          import time
          import cfnresponse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          iam = boto3.client('iam')
          http = urllib3.PoolManager()

          def send_response(event, context, response_status, response_data, physical_resource_id=None):
              response_url = event.get('ResponseURL')
              if not response_url:
                  logger.error("No ResponseURL found in event")
                  return

              response_body = {
                  'Status': response_status,
                  'Reason': 'See CloudWatch Logs for details',
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }

              try:
                  headers = {'Content-Type': ''}
                  encoded_data = json.dumps(response_body).encode()
                  response = http.request(
                      'PUT',
                      response_url,
                      body=encoded_data,
                      headers=headers
                  )
                  logger.info(f"Response sent to CloudFormation. Status: {response.status}")
              except Exception as e:
                  logger.error(f"Failed to send response to CloudFormation: {str(e)}")

          def update_password_policy(props):
              # Convert string boolean values to actual booleans
              policy_params = {
                  'MinimumPasswordLength': int(props['MinPasswordLength']),
                  'RequireSymbols': props['RequireSymbols'].lower() == 'true',
                  'RequireNumbers': props['RequireNumbers'].lower() == 'true',
                  'RequireUppercaseCharacters': props['RequireUppercase'].lower() == 'true',
                  'RequireLowercaseCharacters': props['RequireLowercase'].lower() == 'true',
                  'AllowUsersToChangePassword': props['AllowUsersToChangePassword'].lower() == 'true',
                  'MaxPasswordAge': int(props['MaxPasswordAge']),
                  'PasswordReusePrevention': int(props['PasswordReusePrevention']),
                  'HardExpiry': props['HardExpiry'].lower() == 'true'
              }
              
              # Retry logic for API calls
              max_retries = 3
              for attempt in range(max_retries):
                  try:
                      iam.update_account_password_policy(**policy_params)
                      return
                  except iam.exceptions.ServiceFailureException as e:
                      if attempt == max_retries - 1:
                          raise
                      logger.warning(f"Service failure, retrying ({attempt+1}/{max_retries}): {str(e)}")
                      time.sleep(2 ** attempt)  # Exponential backoff
                  except iam.exceptions.LimitExceededException as e:
                      if attempt == max_retries - 1:
                          raise
                      logger.warning(f"Rate limit exceeded, retrying ({attempt+1}/{max_retries}): {str(e)}")
                      time.sleep(2 ** attempt)  # Exponential backoff

          def lambda_handler(event, context):
              logger.info(f"Received event: {json.dumps(event)}")
              response_data = {}
              physical_resource_id = None
              
              try:
                  request_type = event['RequestType']
                  props = event.get('ResourceProperties', {})
                  
                  if request_type == 'Delete':
                      try:
                          # Reset to minimum valid values on delete
                          iam.update_account_password_policy(
                              MinimumPasswordLength=6,
                              RequireSymbols=False,
                              RequireNumbers=False,
                              RequireUppercaseCharacters=False,
                              RequireLowercaseCharacters=False,
                              AllowUsersToChangePassword=True
                          )
                          logger.info("Reset password policy to default on delete")
                      except Exception as e:
                          logger.warning(f"Error resetting policy on delete: {str(e)}")
                          # Don't fail the delete operation if reset fails
                      send_response(event, context, 'SUCCESS', response_data)
                      return
                  
                  # Handle Create and Update
                  update_password_policy(props)
                  send_response(event, context, 'SUCCESS', response_data)
              except Exception as e:
                  logger.error(f"Error: {str(e)}", exc_info=True)
                  response_data['Error'] = str(e)
                  send_response(event, context, 'FAILED', response_data)

      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.14
      Timeout: 60
      MemorySize: 128

  AccountPasswordPolicy:
    Type: Custom::AccountPasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinPasswordLength: !Ref MinPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry: !Ref HardExpiry
    DeletionPolicy: Delete

Outputs:
  MinPasswordLength:
    Value: !Ref MinPasswordLength
    Description: Configured minimum password length
  RequireUppercase:
    Value: !Ref RequireUppercase
    Description: Uppercase character requirement
  RequireLowercase:
    Value: !Ref RequireLowercase
    Description: Lowercase character requirement
  RequireNumbers:
    Value: !Ref RequireNumbers
    Description: Numeric character requirement
  RequireSymbols:
    Value: !Ref RequireSymbols
    Description: Special character requirement
  MaxPasswordAge:
    Value: !Ref MaxPasswordAge
    Description: Password expiration period in days
  PasswordReusePrevention:
    Value: !Ref PasswordReusePrevention
    Description: Number of previous passwords prevented from reuse
  AllowUsersToChangePassword:
    Value: !Ref AllowUsersToChangePassword
    Description: Self-service password change capability
  HardExpiry:
    Value: !Ref HardExpiry
    Description: Immediate password change enforcement upon expiration