AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with Flow Logging to S3 Bucket

Parameters:
  LogPrefix:
    Type: String
    Default: vpc-flow-logs/
    Description: Optional prefix for log files in the S3 bucket

Resources:
  FlowLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled

  FlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${Bucket}/${Prefix}AWSLogs/${AccountID}/*
              - Bucket: !Ref FlowLogBucket
                Prefix: !Ref LogPrefix
                AccountID: !Ref 'AWS::AccountId'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogDestinationType: s3
      LogDestination: !GetAtt FlowLogBucket.Arn
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'
      TrafficType: ALL
      ResourceId: !Ref VPC
      ResourceType: VPC
      MaxAggregationInterval: 600

  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: FlowLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub
                  - arn:aws:s3:::${Bucket}/${Prefix}AWSLogs/${AccountID}/*
                  - Bucket: !Ref FlowLogBucket
                    Prefix: !Ref LogPrefix
                    AccountID: !Ref 'AWS::AccountId'

Outputs:
  FlowLogBucketName:
    Description: Name of the S3 bucket storing VPC flow logs
    Value: !Ref FlowLogBucket