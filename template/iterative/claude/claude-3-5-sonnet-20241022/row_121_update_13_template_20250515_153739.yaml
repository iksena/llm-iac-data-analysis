AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated EC2 management using EventBridge Scheduler and Systems Manager'

Parameters:
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type for Linux
  WindowsInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type for Windows

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: HelloWorld-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: HelloWorld-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: HelloWorld-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: HelloWorld-PublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  LinuxAMI:
    Type: AWS::SSM::Parameter::Value
    Properties:
      Name: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  WindowsAMI:
    Type: AWS::SSM::Parameter::Value
    Properties:
      Name: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base

  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2Role

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                  - ssm:CreateAssociation
                Resource: '*'

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for HelloWorld instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAMI
      InstanceType: !Ref LinuxInstanceType
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: HelloWorld-Linux

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref WindowsInstanceType
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: HelloWorld-Windows

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: "2.2"
        description: "Cross-platform HelloWorld commands"
        parameters: {}
        mainSteps:
          - action: "aws:runPowerShellScript"
            name: WindowsHello
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
            precondition:
              StringEquals:
                - platformType
                - Windows
          - action: "aws:runShellScript"
            name: LinuxHello
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
            precondition:
              StringEquals:
                - platformType
                - Linux

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - "true"
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-outputs

  SchedulerGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: HelloWorldGroup

  HelloWorldSchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn: SchedulerGroup
    Properties:
      GroupName: HelloWorldGroup
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: "rate(15 minutes)"
      Target:
        Input: !Sub
          - '{"AssociationIds": ["${assocID}"]}'
          - assocID: !GetAtt SSMAssociation.AssociationId
        Arn: arn:aws:scheduler:::aws-sdk:ssm:startAssociationsOnce
        RoleArn: !GetAtt SchedulerRole.Arn
      State: ENABLED

Outputs:
  LinuxInstanceId:
    Description: ID of Linux Instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: ID of Windows Instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of S3 bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of EventBridge Schedule
    Value: !Ref HelloWorldSchedule
  SSMDocumentArn:
    Description: ARN of SSM Document
    Value: !Ref SSMDocument
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet