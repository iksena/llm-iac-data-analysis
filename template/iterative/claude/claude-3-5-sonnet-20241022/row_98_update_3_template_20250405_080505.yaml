AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for TodoApp Amplify deployment'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[A-Za-z0-9-]+'
  
  BranchName:
    Type: String
    Description: Name of the branch to deploy
    Default: production
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[A-Za-z0-9-/_]+'

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole

  AmplifyApp:
    Type: AWS::Amplify::App
    DependsOn: AmplifyRole
    Properties:
      Name: !Ref AppName
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm ci
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
      Platform: WEB
      CustomRules:
        - Source: /<*>
          Target: /index.html
          Status: 200

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    DependsOn: AmplifyApp
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyDefaultDomain:
    Description: Default Amplify Domain
    Value: !GetAtt AmplifyApp.DefaultDomain

  BranchURL:
    Description: Branch URL
    Value: !Sub https://${BranchName}.${AmplifyApp.DefaultDomain}