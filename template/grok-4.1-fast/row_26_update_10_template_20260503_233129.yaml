AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket with EventBridge and SNS integration for Object Created events'

Parameters:
  TopicName:
    Type: String
    Default: 's3-object-created-topic'
    Description: 'Name for the SNS topic'

Resources:
  Bucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub 'EventBridge SNS Bucket'
        - Key: Purpose
          Value: 'EventBridge SNS Notifications'

  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref TopicName
      DisplayName: 'S3 Object Created Notifications'
      Tags:
        - Key: Name
          Value: !Ref TopicName
        - Key: Purpose
          Value: 'S3 Event Notifications'

  EventRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Description: 'Capture S3 Object Created events from specific bucket and send to SNS'
      EventPattern:
        source:
          - "aws.s3"
        "detail-type":
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: "SnsTarget"

  SNSTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Action: "sns:Publish"
            Resource: !Ref SNSTopic
            Condition:
              ArnEquals:
                "aws:SourceArn": !GetAtt EventRule.Arn

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref Bucket
  BucketArn:
    Description: 'ARN of the S3 bucket'
    Value: !GetAtt Bucket.Arn
  TopicArn:
    Description: 'ARN of the SNS topic'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'
  RuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt EventRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'