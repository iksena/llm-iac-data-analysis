AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time data pipeline with Kinesis Data Stream, Firehose, and S3 bucket'

Parameters:
  StreamName:
    Type: String
    Default: 'my-data-stream'
    Description: 'Name for the Kinesis Data Stream'
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1000
    Description: 'Number of shards for the Kinesis Stream'
  DeliveryStreamName:
    Type: String
    Default: 'my-firehose-delivery-stream'
    Description: 'Name for the Kinesis Data Firehose Delivery Stream'
  BucketName:
    Type: String
    Description: 'Globally unique name for the S3 bucket (e.g., my-unique-bucket-123)'
  RetentionPeriodHours:
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168
    Description: 'Retention period for the Kinesis Stream in hours'

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt FirehoseRole.Arn
            Action:
              - s3:PutObject
              - s3:PutObjectAcl
            Resource: !Sub '${DataBucket.Arn}/*'
    DependsOn: DataBucket

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseFullAccess

  DataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  DeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref DeliveryStreamName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      S3DestinationConfiguration:
        RoleARN: !GetAtt FirehoseRole.Arn
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          SizeInMBs: 1
          IntervalInSeconds: 60
        CompressionFormat: UNCOMPRESSED
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        ErrorPrefix: 'error/'
    DependsOn:
      - DataStream
      - FirehoseRole
      - DataBucket
      - DataBucketPolicy

Outputs:
  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref DataStream
  KinesisStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt DataStream.Arn
  DeliveryStreamName:
    Description: Name of the Firehose Delivery Stream
    Value: !Ref DeliveryStream
  DeliveryStreamArn:
    Description: ARN of the Firehose Delivery Stream
    Value: !GetAtt DeliveryStream.Arn
  S3BucketName:
    Description: Name of the S3 Bucket
    Value: !Ref DataBucket
  S3BucketArn:
    Description: ARN of the S3 Bucket
    Value: !GetAtt DataBucket.Arn