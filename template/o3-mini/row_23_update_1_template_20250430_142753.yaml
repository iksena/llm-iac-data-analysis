AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to create a DynamoDB table with customizable parameters.

Parameters:
  TableName:
    Description: "Name of the DynamoDB table."
    Type: String
    Default: "MyDynamoDBTable"
  ReadCapacityUnits:
    Description: "Read capacity units for the DynamoDB table."
    Type: Number
    Default: 5
  WriteCapacityUnits:
    Description: "Write capacity units for the DynamoDB table."
    Type: Number
    Default: 5

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: "Id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "Id"
          KeyType: "HASH"
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: "The name of the DynamoDB table."
    Value: !Ref DynamoDBTable
  TableArn:
    Description: "The ARN of the DynamoDB table."
    Value: !GetAtt DynamoDBTable.Arn