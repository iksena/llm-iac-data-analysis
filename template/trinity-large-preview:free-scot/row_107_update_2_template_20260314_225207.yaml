AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with SQS queue for HTTP-based message retrieval

Parameters:
  QueueName:
    Type: String
    Default: my-queue
    Description: Name for the SQS queue
  ApiName:
    Type: String
    Default: MyApi
    Description: Name for the API Gateway
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage for the API

Resources:
  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MyQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:ReceiveMessage'
            Resource: !GetAtt MyQueue.Arn

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  MyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName

  RootResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MyApi
      ParentId: !GetAtt MyApi.RootResourceId
      PathPart: ''

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MyApi
      ResourceId: !Ref RootResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}'
          - QueueName: !Ref QueueName
        Credentials: !GetAtt APIGatewayRole.Arn
        RequestParameters:
          'integration.request.header.Content-Type': 'application/x-www-form-urlencoded'
        RequestTemplates:
          'application/json': |
            Action=ReceiveMessage
            QueueUrl=https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${QueueName}
            MaxNumberOfMessages=10
            WaitTimeSeconds=10
            VisibilityTimeout=30
            MessageAttributeNames=All
            AttributeNames=All
        PassthroughBehavior: WHEN_NO_TEMPLATES
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              'application/json': |
                #set($inputRoot = $input.path('$'))
                {
                  "Messages": [
                    #foreach($msg in $inputRoot.ReceiveMessageResponse.ReceiveMessageResult.Message)
                    {
                      "MessageId": "$msg.MessageId",
                      "Body": "$msg.Body",
                      "ReceiptHandle": "$msg.ReceiptHandle",
                      "Attributes": {
                        #foreach($attr in $msg.Attribute)
                        "$attr.Name": "$attr.Value"#if($foreach.hasNext),#end
                        #end
                      },
                      "MessageAttributes": {
                        #foreach($attr in $msg.MessageAttribute)
                        "$attr.Name": {
                          "StringValue": "$attr.Value.StringValue",
                          "DataType": "$attr.Value.DataType"
                        }#if($foreach.hasNext),#end
                        #end
                      }
                    }#if($foreach.hasNext),#end
                    #end
                  ]
                }

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref MyApi
      Description: Deployment for production stage

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref MyApi
      StageName: !Ref StageName
      DeploymentId: !Ref ApiDeployment

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !GetAtt MyQueue.QueueUrl
  ApiEndpoint:
    Description: Endpoint URL of the API Gateway
    Value: !Sub 'https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/'