AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for CloudWatch Dashboard and Logs Insights queries to monitor AWS Client VPN usage patterns

Resources:
  ClientVPNAnalyticsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAnalyticsDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ClientVPN", "ClientVPNConnectionCount", "EndpointId", "endpoint-*" ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Active Client VPN Connections"
              }
            },
            {
              "type": "text",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 1,
              "properties": {
                "markdown": "# Client VPN Usage Analytics"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 7,
              "width": 12,
              "height": 8,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ClientVPNDataTransfer", "EndpointId", "endpoint-*" ]
                ],
                "region": "us-east-1",
                "title": "Data Transfer by Endpoint"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: "fields @timestamp, @message | filter @message like /connection.*established/ | stats avg(@duration) as avgDuration by @endpointId | sort avgDuration desc"
    DependsOn: ClientVPNAnalyticsDashboard

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: "fields @timestamp, @message | filter @message like /data.*transfer/ | stats sum(@bytesIn) as totalIngress, sum(@bytesOut) as totalEgress by @endpointId, @userId | sort totalIngress desc"
    DependsOn: ClientVPNAnalyticsDashboard

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: "fields @timestamp, @message | filter @message like /authentication/ | stats count(*) as connectionCount by @userId, @authMethod | sort connectionCount desc"
    DependsOn: ClientVPNAnalyticsDashboard

  AuthMethodBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: AuthMethodBreakdown
      LogGroupNames:
        - /aws/client-vpn
      QueryString: "fields @timestamp, @message | filter @message like /authentication/ | stats count(*) as authCount by @authMethod | sort authCount desc"
    DependsOn: ClientVPNAnalyticsDashboard

Outputs:
  DashboardURL:
    Description: URL to access the Client VPN Analytics Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#/dashboard/ClientVPNAnalyticsDashboard"