AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access) using CloudTrail, EventBridge, and SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Name of the S3 bucket for CloudTrail logs (must be globally unique and lowercase).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: 'S3 bucket names must contain 3-63 lowercase letters, numbers, hyphens; cannot start or end with hyphen.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '[-_./a-zA-Z0-9][-_./a-zA-Z0-9]*[-_./a-zA-Z0-9]?'
    Default: 'SecretsManagerMonitoringTrail'
  SNSTopicName:
    Type: String
    Description: 'Name of the SNS topic for alerts.'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-]{1,256}$'
    Default: 'SecretsManagerAlerts'

Resources:
  CloudTrailBucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  CloudTrailBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'AWSCloudTrailAclCheck'
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:GetBucketAcl'
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: 'AWSCloudTrailWrite'
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
    DependsOn: CloudTrailBucket

  CloudTrailTrail:
    Type: 'AWS::CloudTrail::Trail'
    Properties:
      TrailName: !Ref CloudTrailTrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - IncludeManagementEvents: true
          ReadWriteType: All
          DataResources:
            - Type: 'AWS::SecretsManager::Secret'
              Values:
                - '*'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring
    DependsOn: CloudTrailBucketPolicy

  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Sub '${SNSTopicName} - Secrets Manager Alerts'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  SNSTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'AllowEventBridge'
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref SNSTopic
            Condition:
              ArnEquals:
                'aws:SourceArn': !GetAtt EventBridgeRule.Arn

  EventBridgeRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Name: !Sub '${AWS::StackName}-SecretsManagerEvents'
      Description: 'Capture Secrets Manager management events (create, update, describe) via CloudTrail and notify via SNS. Data events (GetSecretValue) logged to S3.'
      State: ENABLED
      EventPattern:
        source:
          - aws.secretsmanager
        'detail-type':
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - DescribeSecret
      Targets:
        - Arn: !Ref SNSTopic
          Id: 'SNSTarget'
    DependsOn: SNSTopicPolicy

Outputs:
  SNSTopicArn:
    Description: 'ARN of the SNS topic. Subscribe email/Lambda/etc. for alerts on secret events.'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  EventBridgeRuleArn:
    Description: 'ARN of the EventBridge rule monitoring Secrets Manager events.'
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudTrailTrailName:
    Description: 'Name of the CloudTrail trail logging Secrets Manager events.'
    Value: !Ref CloudTrailTrailName
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailTrailName'

  CloudTrailBucketName:
    Description: 'Name of S3 bucket for CloudTrail logs (data events like GetSecretValue query via Athena).'
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailBucketName'