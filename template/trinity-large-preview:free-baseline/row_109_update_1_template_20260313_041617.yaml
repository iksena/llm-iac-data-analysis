AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create EventBridge integration with MongoDB API endpoint

Resources:
  EventBridgeEventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: MongoDBEventBus
      Description: Event bus for MongoDB integration

  MongoDBConnection:
    Type: AWS::EventSchemas::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection to MongoDB API endpoint
      Name: MongoDBConnection
      ApiKeyAuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value
      ConnectionType: HTTP
      AuthorizationConfig:
        HttpMethod: POST
        Uri: https://www.testanu.com

  MongoDBIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MongoDBEventBridgeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MongoDBInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt MongoDBApiDestination.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDeadLetterQueue
      MessageRetentionPeriod: 1209600

  MongoDBApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      Description: API destination for MongoDB
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: https://www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      InvocationHttpParameters:
        PathParameterNames:
          - pathParam1
        QueryParameterNames:
          - queryParam1
      InvocationRateLimit: 10
      InvocationRateLimitUnit: SECOND
      InvocationRateLimitBy: DESTINATION
      InvocationRateLimitByUnit: DESTINATION
      InvocationRateLimitByDestination: true
      InvocationRateLimitByDestinationUnit: SECOND
      InvocationRateLimitByDestinationValue: 10
      InvocationRateLimitByDestinationValueUnit: SECOND
      InvocationRateLimitByDestinationValueBy: DESTINATION
      InvocationRateLimitByDestinationValueByUnit: SECOND
      InvocationRateLimitByDestinationValueByDestination: true
      InvocationRateLimitByDestinationValueByDestinationUnit: SECOND
      InvocationRateLimitByDestinationValueByDestinationValue: 10
      InvocationRateLimitByDestinationValueByDestinationValueUnit: SECOND
      InvocationRateLimitByDestinationValueByDestinationValueBy: DESTINATION
      InvocationRateLimitByDestinationValueByDestinationValueByUnit: SECOND
