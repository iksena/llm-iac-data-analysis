AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Bedrock Agent with Lambda integration for stock price lookup

Parameters:
  ModelId:
    Type: String
    Default: amazon.claude-3-sonnet-20240229
    Description: The foundational model ID for the Bedrock Agent
  LambdaRuntime:
    Type: String
    Default: nodejs20.x
    Description: The runtime for the Lambda function
  LambdaHandler:
    Type: String
    Default: index.handler
    Description: The handler for the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: !Ref LambdaHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const stockSymbol = event.stockSymbol;
            const stockPrice = 100; // Hard-coded placeholder
            return {
              stockSymbol,
              stockPrice
            };
          };

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: StockPriceAgent
      Description: Agent for stock price lookup
      RoleArn: !GetAtt BedrockAgentRole.Arn
      ModelId: !Ref ModelId
      Instructions: |
        You are a stock price lookup assistant. When users ask about stock prices,
        use the getStockPrice action to retrieve the current price. Only respond
        with stock price information when the user specifically asks about a stock.
      ActionGroups:
        - ActionGroupName: StockPriceActions
          Description: Actions for stock price lookup
          Actions:
            - Name: getStockPrice
              Description: Get the current price of a stock
              LambdaFunction:
                Arn: !GetAtt StockPriceLambdaFunction.Arn
                RequestResponse: true
              Parameters:
                - Name: stockSymbol
                  Type: String
                  Required: true
                  Description: The stock symbol to look up

Outputs:
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn
  BedrockAgentArn:
    Description: The ARN of the Bedrock Agent
    Value: !GetAtt BedrockAgent.AgentArn
  ActionGroupArn:
    Description: The ARN of the Action Group
    Value: !GetAtt BedrockAgent.ActionGroups[0].Actions[0].Arn