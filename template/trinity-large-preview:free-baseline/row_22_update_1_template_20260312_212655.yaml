AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table with local and global secondary indexes

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyTable
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
        - AttributeName: RangeKey
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: RangeKey
          AttributeType: S
        - AttributeName: LSIKey
          AttributeType: S
        - AttributeName: GSIKey
          AttributeType: S
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      LocalSecondaryIndexes:
        - IndexName: LSIIndex
          KeySchema:
            - AttributeName: Id
              KeyType: HASH
            - AttributeName: LSIKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSIIndex
          KeySchema:
            - AttributeName: GSIKey
              KeyType: HASH
            - AttributeName: RangeKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref MyDynamoDBTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt MyDynamoDBTable.Arn