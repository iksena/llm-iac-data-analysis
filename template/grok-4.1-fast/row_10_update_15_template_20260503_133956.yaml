AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drives using block device mappings, latest Amazon Linux 2 AMI via SSM Parameter, auto-created SSH key pair, in pre-existing default VPC/subnet'

Parameters:
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: 'Latest Amazon Linux 2 AMI ID fetched from SSM Parameter Store'
  InstanceType:
    Type: String
    Default: m5d.large
    Description: 'EC2 instance type supporting NVMe instance store (ephemeral) volume'
    AllowedValues:
      - m5d.large
      - m5d.xlarge
      - m5d.2xlarge
      - m5d.4xlarge
      - c5d.large
      - c5d.xlarge
    ConstraintDescription: 'must support instance store volumes (d* types)'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Pre-existing default VPC ID (aws ec2 describe-vpcs --filters "Name=is-default,Values=true")'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Public subnet ID in default VPC'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR range allowed for SSH ingress (port 22)'
    AllowedPattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}(?:/(?:3[0-2]|[12]?[0-9]))?$'
    ConstraintDescription: 'must be valid CIDR notation (e.g., 0.0.0.0/0 or 10.0.0.0/24)'

Resources:
  InstanceKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-KeyPair'
      KeyType: rsa
      KeyFormat: pem

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSH access (port 22)'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref InstanceKeyPair
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref InstanceSecurityGroup
          AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Instance'

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref Ec2Instance
  PublicIp:
    Description: 'Public IP address (SSH: ssh -i key.pem ec2-user@PublicIp)'
    Value: !GetAtt Ec2Instance.PublicIp
  KeyName:
    Description: 'Name of the created EC2 KeyPair'
    Value: !Ref InstanceKeyPair
  KeyMaterial:
    Description: 'Base64-encoded RSA private key material (decode: echo Value | base64 -d > key.pem; chmod 400 key.pem)'
    Value: !GetAtt InstanceKeyPair.KeyMaterial
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup