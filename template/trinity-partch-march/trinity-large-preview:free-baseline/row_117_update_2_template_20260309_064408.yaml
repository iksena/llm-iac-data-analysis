AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB-EventBridge integration with streaming and event routing

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: !Ref StreamViewType
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  InsertRule:
    Type: AWS::Events::Rule
    Properties:
      Name: InsertRule
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - "aws:dynamodb"
        detail:
          operation:
            - "INSERT"
      Targets:
        - Arn: !GetAtt EventBus.Arn
          Id: InsertTarget

  ModifyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ModifyRule
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - "aws:dynamodb"
        detail:
          operation:
            - "MODIFY"
      Targets:
        - Arn: !GetAtt EventBus.Arn
          Id: ModifyTarget

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: Name of the DynamoDB table
  StreamViewType:
    Type: String
    Default: NEW_AND_OLD_IMAGES
    AllowedValues:
      - NEW_AND_OLD_IMAGES
      - NEW_IMAGE
      - OLD_IMAGE
      - KEYS_ONLY
    Description: Type of data to capture in DynamoDB stream
  EventBusName:
    Type: String
    Default: OrdersEventBus
    Description: Name of the EventBridge event bus

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref DynamoDBTable
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref EventBus
  StreamArn:
    Description: DynamoDB stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn