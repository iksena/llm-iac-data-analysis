AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create and manage AWS account-wide IAM password policy with Lambda enforcement

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    Description: Minimum password length for IAM users
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Maximum password age in days
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    Description: Number of previous passwords to prevent reuse
  PermissionBoundaryArn:
    Type: String
    Default: ''
    Description: Optional IAM permission boundary ARN for Lambda role

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref "AWS::NoValue"]
      Policies:
        - PolicyName: IAMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          from botocore.exceptions import ClientError

          iam_client = boto3.client('iam')

          def lambda_handler(event, context):
              try:
                  # Apply password policy
                  iam_client.update_account_password_policy(
                      MinimumPasswordLength=int(os.environ['MIN_LENGTH']),
                      RequireUppercaseCharacters=True,
                      RequireLowercaseCharacters=True,
                      RequireNumbers=True,
                      RequireSymbols=True,
                      AllowUsersToChangePassword=True,
                      MaxPasswordAge=int(os.environ['MAX_AGE']),
                      PasswordReusePrevention=int(os.environ['REUSE_PREVENTION'])
                  )
                  return {'statusCode': 200, 'body': 'Password policy applied successfully'}
              except ClientError as e:
                  if e.response['Error']['Code'] == 'NoSuchEntity':
                      # Policy doesn't exist, create it
                      iam_client.update_account_password_policy(
                          MinimumPasswordLength=int(os.environ['MIN_LENGTH']),
                          RequireUppercaseCharacters=True,
                          RequireLowercaseCharacters=True,
                          RequireNumbers=True,
                          RequireSymbols=True,
                          AllowUsersToChangePassword=True,
                          MaxPasswordAge=int(os.environ['MAX_AGE']),
                          PasswordReusePrevention=int(os.environ['REUSE_PREVENTION'])
                      )
                      return {'statusCode': 200, 'body': 'Password policy created successfully'}
                  else:
                      return {'statusCode': 500, 'body': str(e)}
      Environment:
        Variables:
          MIN_LENGTH: !Ref MinimumPasswordLength
          MAX_AGE: !Ref MaxPasswordAge
          REUSE_PREVENTION: !Ref PasswordReusePrevention

  PasswordPolicyEnforcementRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Daily enforcement of IAM password policy
      ScheduleExpression: rate(1 day)
      Targets:
        - Arn: !GetAtt PasswordPolicyLambda.Arn
          Id: PasswordPolicyLambdaTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PasswordPolicyLambda.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PasswordPolicyEnforcementRule.Arn

  ConfigRule:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: IAMPasswordPolicyCompliance
      Source:
        Owner: AWS
        SourceIdentifier: IAM_PASSWORD_POLICY

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, '']]

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN for password policy enforcement
    Value: !GetAtt PasswordPolicyLambda.Arn
  PolicyStatus:
    Description: Current password policy status
    Value: !Join
      - ' '
      - - 'Minimum Length:'
        - !Ref MinimumPasswordLength
        - 'Max Age:'
        - !Ref MaxPasswordAge
        - 'Reuse Prevention:'
        - !Ref PasswordReusePrevention