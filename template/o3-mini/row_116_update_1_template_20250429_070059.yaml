AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an SNS-to-SQS fanout system with filtered message routing.
  Provides a central SNS topic and three SQS queues (AllMetrics, Temperature, Humidity)
  with corresponding Dead Letter Queues (DLQs) and SNS subscriptions with filter policies.

Resources:

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "CentralMetricTopic"
      TopicName: "CentralMetricTopic"

  AllMetricsDLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "AllMetricsDLQueue"

  TemperatureDLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "TemperatureDLQueue"

  HumidityDLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "HumidityDLQueue"

  AllMetricsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "AllMetricsQueue"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQueue.Arn
        maxReceiveCount: 5

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "TemperatureSqsQueue"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDLQueue.Arn
        maxReceiveCount: 5

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "HumiditySqsQueue"
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDLQueue.Arn
        maxReceiveCount: 5

  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: Allow-SNS-Publish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SNSTopic

  TemperatureQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: Allow-SNS-Publish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SNSTopic

  HumidityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: Allow-SNS-Publish
            Effect: Allow
            Principal: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SNSTopic

  SNSToAllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsQueue.Arn

  SNSToTemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  SNSToHumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:

  SNSTopicARN:
    Description: "ARN of the SNS Topic"
    Value: !Ref SNSTopic

  AllMetricsQueueURL:
    Description: "URL of the All Metrics SQS Queue"
    Value: !Ref AllMetricsQueue

  TemperatureSqsQueueURL:
    Description: "URL of the Temperature SQS Queue"
    Value: !Ref TemperatureSqsQueue

  HumiditySqsQueueURL:
    Description: "URL of the Humidity SQS Queue"
    Value: !Ref HumiditySqsQueue