AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of shards for the Kinesis stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 168
    Description: Data retention period in hours
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: Allowed origin for CORS configuration

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-stream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  APIGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
        AllowHeaders:
          - Content-Type
          - Authorization

  PutRecordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: PUT /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref PutRecordIntegration

  PutRecordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        - region: !Ref AWS::Region
      IntegrationSubtype: AWS_PROXY
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  BatchRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: POST /batch
      Target: !Join
        - '/'
        - - integrations
          - !Ref BatchRecordsIntegration

  BatchRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
        - region: !Ref AWS::Region
      IntegrationSubtype: AWS_PROXY
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  GetRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref GetRecordsIntegration

  GetRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        - region: !Ref AWS::Region
      IntegrationSubtype: AWS_PROXY
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  MetadataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /metadata
      Target: !Join
        - '/'
        - - integrations
          - !Ref MetadataIntegration

  MetadataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
        - region: !Ref AWS::Region
      IntegrationSubtype: AWS_PROXY
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  APIDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    Properties:
      ApiId: !Ref APIGateway
    DependsOn:
      - PutRecordRoute
      - BatchRecordsRoute
      - GetRecordsRoute
      - MetadataRoute

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGateway
      DeploymentId: !Ref APIDeployment
      StageName: $default
      AccessLogSettings:
        DestinationArn: !GetAtt APIGatewayLogGroup.Arn
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context.httpMethod $context.routeKey $context.protocol" $context.status $context.responseLength $context.requestId
      AutoDeploy: true

  APIGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${APIGateway}
      RetentionInDays: 30

  APIGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt APIGatewayRole.Arn

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com
  KinesisStreamARN:
    Description: Kinesis Stream ARN
    Value: !GetAtt KinesisStream.Arn