AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudWatch Dashboard and Logs Insights queries for monitoring AWS Client VPN usage patterns.

Resources:
  ClientVPNAnalysisDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAnalysisDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Analysis Dashboard"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 1,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats count(*) as TotalConnections by bin(1h)",
                "region": "${AWS::Region}",
                "title": "Total Connections Over Time",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 7,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats count(*) as Connections by ClientVpnEndpointId",
                "region": "${AWS::Region}",
                "title": "Connections by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 7,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats count(*) as Users by ClientVpnEndpointId, AuthenticationType",
                "region": "${AWS::Region}",
                "title": "Users by Authentication Type",
                "view": "table"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationQuery
      LogGroupNames:
        - "/aws/vpn/client"
      QueryString: "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats avg(Duration) as AvgDuration, max(Duration) as MaxDuration, min(Duration) as MinDuration by ClientVpnEndpointId"

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferQuery
      LogGroupNames:
        - "/aws/vpn/client"
      QueryString: "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats sum(IngressBytes) as TotalIngress, sum(EgressBytes) as TotalEgress by ClientVpnEndpointId"

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityQuery
      LogGroupNames:
        - "/aws/vpn/client"
      QueryString: "fields @timestamp, @message | filter @message like /Client VPN connection/ | stats count(*) as Connections, count_distinct(UserName) as DistinctUsers by ClientVpnEndpointId, AuthenticationType"

Outputs:
  DashboardArn:
    Description: The ARN of the CloudWatch Dashboard
    Value: !GetAtt ClientVPNAnalysisDashboard.Arn
  DashboardUrl:
    Description: The URL of the CloudWatch Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=ClientVPNAnalysisDashboard"