AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to create an AWS Transit Gateway with preset BGP settings
  and a Resource Share via AWS RAM for cross-account network connectivity.

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Options:
        AmazonSideAsn: 65000
        AutoAcceptSharedAttachments: "enable"
        DefaultRouteTableAssociation: "enable"
        DefaultRouteTablePropagation: "enable"
      TagSpecifications:
        - ResourceType: transit-gateway
          Tags:
            - Key: Name
              Value: TransitGatewayStack

  TransitGatewayResourceShare:
    Type: AWS::RAM::ResourceShare
    DependsOn:
      - TransitGateway
    Properties:
      Name: TransitGatewayShare
      AllowExternalPrincipals: false
      Principals:
        - "644519422710"
      ResourceArns:
        - !Sub 
            - "arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TGW_ID}"
            - { TGW_ID: !Ref TransitGateway }

Outputs:
  TransitGatewayID:
    Description: "ID of the Transit Gateway"
    Value: !Ref TransitGateway
    Export:
      Name: !Sub "${AWS::StackName}-TransitGatewayID"

  TransitGatewayResourceShareID:
    Description: "ID of the RAM Resource Share for the Transit Gateway"
    Value: !Ref TransitGatewayResourceShare
    Export:
      Name: !Sub "${AWS::StackName}-ResourceShareID"