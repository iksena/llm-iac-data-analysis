AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that creates a standardized IAM baseline with
  secure, role-based access controls for AWS account governance. This template provisions IAM groups
  with associated managed policies and creates IAM roles for CloudFormation and StackSet execution.

Parameters:
  ResourcePrefix:
    Description: "Prefix used for IAM resource names to avoid naming collisions."
    Type: String
    Default: "Standard"

Resources:
  PrivilegedAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-PrivilegedAdmin"
      Path: "/"

  RestrictedAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-RestrictedAdmin"
      Path: "/"

  IdentityAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-IdentityAdmin"
      Path: "/"

  PrivilegedAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-PrivilegedAdminPolicy"
      Groups:
        - !Ref PrivilegedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "RequireMFAForAllActions"
            Effect: "Allow"
            Action: "*"
            Resource: "*"
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  RestrictedAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-RestrictedAdminPolicy"
      Groups:
        - !Ref RestrictedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowReadOnlyAccess"
            Effect: "Allow"
            Action:
              - "ec2:Describe*"
              - "cloudwatch:Describe*"
              - "logs:Describe*"
            Resource: "*"

  IdentityAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-IdentityAdminPolicy"
      Groups:
        - !Ref IdentityAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "IAMAndOrganizationsFullAccessWithMFA"
            Effect: "Allow"
            Action:
              - "iam:*"
              - "organizations:*"
            Resource: "*"
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  CFNExecutionRoleManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-CFNExecutionPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "CFNPermissions"
            Effect: "Allow"
            Action:
              - "cloudformation:CreateStack"
              - "cloudformation:UpdateStack"
              - "cloudformation:ValidateTemplate"
              - "iam:PassRole"
            Resource: "*"

  StackSetExecutionRoleManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-StackSetExecutionPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "StackSetPermissions"
            Effect: "Allow"
            Action:
              - "cloudformation:CreateStack"
              - "cloudformation:UpdateStack"
              - "cloudformation:DeleteStack"
              - "iam:PassRole"
            Resource: "*"

  CFNExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "${ResourcePrefix}-CFNExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationAssumeRole"
            Effect: "Allow"
            Principal:
              Service: "cloudformation.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - !Ref CFNExecutionRoleManagedPolicy

  StackSetExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "${ResourcePrefix}-StackSetExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationForStackSet"
            Effect: "Allow"
            Principal:
              Service: "cloudformation.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - !Ref StackSetExecutionRoleManagedPolicy

Outputs:
  PrivilegedAdminGroupName:
    Description: "Name of the Privileged Admin IAM Group"
    Value: !Ref PrivilegedAdminGroup
  RestrictedAdminGroupName:
    Description: "Name of the Restricted Admin IAM Group"
    Value: !Ref RestrictedAdminGroup
  IdentityAdminGroupName:
    Description: "Name of the Identity Admin IAM Group"
    Value: !Ref IdentityAdminGroup
  CFNExecutionRoleARN:
    Description: "ARN of the CloudFormation Execution Role"
    Value: !GetAtt CFNExecutionRole.Arn
  StackSetExecutionRoleARN:
    Description: "ARN of the StackSet Execution Role"
    Value: !GetAtt StackSetExecutionRole.Arn