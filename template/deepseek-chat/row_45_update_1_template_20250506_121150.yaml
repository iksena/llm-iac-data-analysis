AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Kinesis Firehose with server-side encryption and CloudWatch error logging

Resources:
  FirehoseDeliveryStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseDeliveryStreamPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource:
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/aws/kinesis'

  FirehoseErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/kinesisfirehose/FirehoseDeliveryErrors
      RetentionInDays: 7

  FirehoseErrorLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseErrorLogGroup
      LogStreamName: FirehoseDeliveryErrorStream

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: FirehoseDeliveryStream
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::firehose-delivery-${AWS::AccountId}'
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/aws/kinesis'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseErrorLogGroup
          LogStreamName: !Ref FirehoseErrorLogStream
        ErrorOutputPrefix: 'error/'

Outputs:
  FirehoseDeliveryStreamARN:
    Description: ARN of the created Kinesis Firehose Delivery Stream
    Value: !GetAtt FirehoseDeliveryStream.Arn
  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group for error logging
    Value: !Ref FirehoseErrorLogGroup
  CloudWatchLogStreamName:
    Description: Name of the CloudWatch Log Stream for error logging
    Value: !Ref FirehoseErrorLogStream