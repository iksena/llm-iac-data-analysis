AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge to Kinesis Integration for Real-time Event Streaming'

Parameters:
  EventSourceName:
    Type: String
    Default: 'my-application'
    Description: 'Source name for the events'
    AllowedPattern: '^[a-zA-Z0-9-_]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters, hyphens and underscores'

  KinesisStreamName:
    Type: String
    Default: 'application-events-stream'
    Description: 'Name of the Kinesis Data Stream'
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters, periods, underscores and hyphens'

  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
    Description: 'Number of shards for the Kinesis stream'

  RetentionPeriod:
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168
    Description: 'Data retention period in hours'

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-event-bus'
      Tags:
        - Key: Purpose
          Value: EventStreaming

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis
      Tags:
        - Key: Purpose
          Value: EventStreaming

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Purpose
          Value: EventStreaming

  EventBridgePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-eventbridge-kinesis-policy'
      Roles: 
        - !Ref EventBridgeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
            Resource: !GetAtt KinesisStream.Arn

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-event-rule'
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref EventSourceName
      State: ENABLED
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: 'KinesisTarget'
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the Event Bus'
    Value: !GetAtt EventBus.Arn

  KinesisStreamArn:
    Description: 'ARN of the Kinesis Stream'
    Value: !GetAtt KinesisStream.Arn

  EventRuleArn:
    Description: 'ARN of the Event Rule'
    Value: !GetAtt EventRule.Arn