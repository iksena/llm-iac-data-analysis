AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with multiple EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the ENI will be created

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID for the ENI

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: Network Interface with multiple IPs
      GroupSet: 
        - !Ref SecurityGroupId
      SecondaryPrivateIpAddressCount: 1
      Tags:
        - Key: Name
          Value: Multi-IP ENI

  FirstEIP:
    Type: AWS::EC2::EIP
    DependsOn: NetworkInterface
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: First-EIP

  SecondEIP:
    Type: AWS::EC2::EIP
    DependsOn: NetworkInterface
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Second-EIP

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: 
      - NetworkInterface
      - FirstEIP
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: 
      - NetworkInterface
      - SecondEIP
      - FirstEIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface

  PrimaryPrivateIP:
    Description: Primary Private IP of the ENI
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  FirstEIPAddress:
    Description: First Elastic IP Address
    Value: !Ref FirstEIP

  SecondEIPAddress:
    Description: Second Elastic IP Address
    Value: !Ref SecondEIP