AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an IAM role with configurable permission boundaries for developer-created IAM resources'

Parameters:
  EnableStrictBoundary:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Toggle to enable/disable strict boundary enforcement (true = restricted, false = permissive)

  TeamNamePrefix:
    Type: String
    Default: 'MyTeam'
    Description: Prefix for IAM resources that developers are allowed to create/modify

  OwnerTagValue:
    Type: String
    Default: 'DevTeam'
    Description: Value for the mandatory Owner tag on IAM resources

Conditions:
  StrictBoundaryEnabled: !Equals [!Ref EnableStrictBoundary, 'true']

Resources:
  # Permission Boundary Policy - restricts actions to S3 and read-only IAM operations
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permission boundary policy that restricts actions to S3 and read-only IAM operations
      ManagedPolicyName: !Sub '${TeamNamePrefix}PermissionBoundary'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Actions
            Effect: Allow
            Action:
              - 's3:*'
            Resource: '*'
          - Sid: AllowIAMReadOnly
            Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:Generate*'
            Resource: '*'
          - Sid: DenyIAMPermissionBoundaryModification
            Effect: Deny
            Action:
              - 'iam:DeletePolicy'
              - 'iam:DeletePolicyVersion'
              - 'iam:CreatePolicyVersion'
              - 'iam:SetDefaultPolicyVersion'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/${TeamNamePrefix}PermissionBoundary'
          - Sid: DenyRemovalOfPermissionBoundary
            Effect: Deny
            Action:
              - 'iam:DeleteRolePermissionsBoundary'
              - 'iam:DeleteUserPermissionsBoundary'
            Resource: '*'

  # Permissive IAM Policy - allows broad IAM privileges without strict boundary enforcement
  PermissiveIAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permissive IAM policy that allows broad IAM privileges
      ManagedPolicyName: !Sub '${TeamNamePrefix}PermissiveIAMPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIAMActions
            Effect: Allow
            Action:
              - 'iam:*'
            Resource: '*'
          - Sid: RequireOwnerTag
            Effect: Deny
            Action:
              - 'iam:CreateRole'
              - 'iam:CreateUser'
              - 'iam:CreatePolicy'
              - 'iam:TagRole'
              - 'iam:TagUser'
              - 'iam:TagPolicy'
            Resource: '*'
            Condition:
              'ForAllValues:StringNotEquals':
                'aws:TagKeys':
                  - 'Owner'

  # Restricted IAM Policy - enforces permission boundaries and requires specific naming conventions and tags
  RestrictedIAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Restricted IAM policy that enforces permission boundaries and requires specific naming conventions and tags
      ManagedPolicyName: !Sub '${TeamNamePrefix}RestrictedIAMPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIAMActionsWithConditions
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:CreateUser'
              - 'iam:CreatePolicy'
              - 'iam:AttachRolePolicy'
              - 'iam:AttachUserPolicy'
              - 'iam:PutRolePolicy'
              - 'iam:PutUserPolicy'
              - 'iam:TagRole'
              - 'iam:TagUser'
              - 'iam:TagPolicy'
            Resource: '*'
            Condition:
              StringLike:
                'iam:ResourceTag/Owner': !Ref OwnerTagValue
                'aws:RequestTag/Owner': !Ref OwnerTagValue
              ArnLike:
                'iam:PermissionsBoundary': !Sub 'arn:aws:iam::${AWS::AccountId}:policy/${TeamNamePrefix}PermissionBoundary'
          - Sid: AllowIAMActionsWithNamePrefix
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:CreateUser'
              - 'iam:CreatePolicy'
            Resource: '*'
            Condition:
              StringLike:
                'iam:ResourceTag/Owner': !Ref OwnerTagValue
                'aws:RequestTag/Owner': !Ref OwnerTagValue
                'iam:ResourcePrefix': !Sub '${TeamNamePrefix}*'
          - Sid: AllowIAMReadOnly
            Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:Generate*'
            Resource: '*'
          - Sid: RequirePermissionBoundary
            Effect: Deny
            Action:
              - 'iam:CreateRole'
              - 'iam:CreateUser'
            Resource: '*'
            Condition:
              StringNotEquals:
                'iam:PermissionsBoundary': !Sub 'arn:aws:iam::${AWS::AccountId}:policy/${TeamNamePrefix}PermissionBoundary'
          - Sid: RequireOwnerTag
            Effect: Deny
            Action:
              - 'iam:CreateRole'
              - 'iam:CreateUser'
              - 'iam:CreatePolicy'
              - 'iam:TagRole'
              - 'iam:TagUser'
              - 'iam:TagPolicy'
            Resource: '*'
            Condition:
              'ForAllValues:StringNotEquals':
                'aws:TagKeys':
                  - 'Owner'

  # IAM Role for Developers
  DeveloperIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TeamNamePrefix}DeveloperRole'
      Description: IAM role with configurable permission boundaries for developer-created IAM resources
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iam.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !If [StrictBoundaryEnabled, !Ref RestrictedIAMPolicy, !Ref PermissiveIAMPolicy]
      PermissionsBoundary: !If [StrictBoundaryEnabled, !Ref PermissionBoundaryPolicy, !Ref "AWS::NoValue"]
      Tags:
        - Key: Owner
          Value: !Ref OwnerTagValue

Outputs:
  DeveloperRoleARN:
    Description: ARN of the IAM role for developers
    Value: !GetAtt DeveloperIAMRole.Arn

  PermissionBoundaryPolicyARN:
    Description: ARN of the permission boundary policy
    Value: !Ref PermissionBoundaryPolicy

  EnforcementMode:
    Description: Current enforcement mode for permission boundaries
    Value: !If [StrictBoundaryEnabled, 'Strict (Restricted)', 'Permissive']