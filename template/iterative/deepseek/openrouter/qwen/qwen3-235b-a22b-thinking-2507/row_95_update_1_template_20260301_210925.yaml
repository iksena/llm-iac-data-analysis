AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with SSM-driven nginx deployment and validation'

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type for the web server

Resources:
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to Nginx
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: nginx-web-sg

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt WebSecurityGroup.GroupId
      Tags:
        - Key: nginx
          Value: Yes
      UserData: 
        Fn::Base64: 
          !Sub |
            #!/bin/bash
            echo "SSM agent configuration complete"

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content: 
        Fn::Sub: |
          {
            "description": "Updates OS, installs Nginx, and validates web server",
            "schemaVersion": "0.3",
            "assumeRole": "{{automationAssumeRole}}",
            "parameters": {
              "automationAssumeRole": {
                "type": "String",
                "description": "(Optional) ARN of role for Automation execution",
                "default": ""
              },
              "InstanceId": {
                "type": "String",
                "description": "Target instance ID",
                "default": ""
              }
            },
            "mainSteps": [
              {
                "name": "updateOS",
                "action": "aws:runCommand",
                "inputs": {
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": ["{{InstanceId}}"],
                  "Parameters": {
                    "commands": [
                      "yum update -y",
                      "if [ -f /var/run/reboot-required ]; then touch /tmp/reboot-required; fi"
                    ]
                  }
                }
              },
              {
                "name": "rebootIfRequired",
                "action": "aws:runCommand",
                "onFailure": "Continue",
                "inputs": {
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": ["{{InstanceId}}"],
                  "Parameters": {
                    "commands": [
                      "if [ -f /tmp/reboot-required ]; then shutdown -r now; fi"
                    ]
                  }
                }
              },
              {
                "name": "waitForReboot",
                "action": "aws:waitForInstanceState",
                "inputs": {
                  "InstanceIds": ["{{InstanceId}}"],
                  "State": "running"
                }
              },
              {
                "name": "installNginx",
                "action": "aws:runCommand",
                "inputs": {
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": ["{{InstanceId}}"],
                  "Parameters": {
                    "commands": [
                      "yum install -y nginx",
                      "systemctl start nginx",
                      "systemctl enable nginx"
                    ]
                  }
                }
              },
              {
                "name": "validateNginx",
                "action": "aws:runCommand",
                "inputs": {
                  "DocumentName": "AWS-RunShellScript",
                  "InstanceIds": ["{{InstanceId}}"],
                  "Parameters": {
                    "commands": [
                      "curl -I http://localhost | grep 'HTTP/1.1 200 OK'"
                    ]
                  }
                }
              }
            ]
          }
      DocumentType: Automation
Outputs:
  InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance
  PublicIP:
    Description: Public IP address of the instance
    Value: !GetAtt EC2Instance.PublicIp
  NginxURL:
    Description: URL to access the Nginx server
    Value: !Sub 'http://${EC2Instance.PublicDnsName}'