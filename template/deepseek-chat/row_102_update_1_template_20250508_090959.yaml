AWSTemplateFormatVersion: '2010-09-09'
Description: 'Risk Management System for AWS Workloads with DynamoDB, Lambda, and SNS'

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementData
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  DynamoDBAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DynamoDBAccess
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt RiskManagementTable.Arn

  SNSAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SNSAccess
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref RiskNotificationTopic

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: RiskManagementNotifications

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskAssessmentFunction
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              # Risk assessment logic here
              return {"statusCode": 200, "body": "Risk assessment completed"}
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          SNS_TOPIC_ARN: !Ref RiskNotificationTopic

  RiskResponseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskResponseFunction
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              # Risk response logic here
              return {"statusCode": 200, "body": "Risk response executed"}
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          SNS_TOPIC_ARN: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref RiskManagementTable
  RiskAssessmentLambdaARN:
    Description: ARN of the Risk Assessment Lambda Function
    Value: !GetAtt RiskAssessmentFunction.Arn
  RiskResponseLambdaARN:
    Description: ARN of the Risk Response Lambda Function
    Value: !GetAtt RiskResponseFunction.Arn
  NotificationTopicARN:
    Description: ARN of the SNS Notification Topic
    Value: !Ref RiskNotificationTopic