AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role with read-only access to IAM metadata for EC2 instances'

Resources:
  EC2IAMReadOnlyRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-iam-readonly-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns: []
      Path: '/'
      Policies:
        - PolicyName: IAMReadOnlyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:Get*'
                  - 'iam:List*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'iam:Create*'
                  - 'iam:Delete*'
                  - 'iam:Put*'
                  - 'iam:Update*'
                  - 'iam:Attach*'
                  - 'iam:Detach*'
                Resource: '*'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref EC2IAMReadOnlyRole

Outputs:
  RoleARN:
    Description: 'ARN of the created IAM Role'
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'
  
  RoleName:
    Description: 'Name of the created IAM Role'
    Value: !Ref EC2IAMReadOnlyRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'
  
  InstanceProfileARN:
    Description: 'ARN of the created Instance Profile'
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileARN'