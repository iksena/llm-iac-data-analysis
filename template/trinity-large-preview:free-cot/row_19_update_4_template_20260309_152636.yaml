AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge configuration to route custom events to external API endpoint

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus
      Description: Custom event bus for routing events

  WebhookConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: WebhookConnection
      Description: Connection to external webhook endpoint
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: x-api-key
        ApiKeyValue: !Sub '{{resolve:secretsmanager:WebhookAPIKey:SecretString:}}'

  WebhookAPI:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: WebhookAPI
      Description: External webhook endpoint
      ConnectionArn: !GetAtt WebhookConnection.Arn
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST

  EventPatternRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "myapp.events"
        detail-type:
          - "Custom Event"
      Targets:
        - Arn: !GetAtt WebhookAPI.Arn
          Id: WebhookTarget

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  ConnectionArn:
    Description: ARN of the EventBridge connection
    Value: !GetAtt WebhookConnection.Arn
  APIDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt WebhookAPI.Arn