AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
      RetentionPeriodHours: 24
      DeletionPolicy: Delete
      UpdateReplacePolicy: Delete
  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "ReadThroughputExceeded-${AWS::StackName}"
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      Threshold: 1
      EvaluationPeriods: 1
      AlarmActions:
        - !Ref AlarmTopic
      ComparisonOperator: GreaterThanThreshold
  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "WriteThroughputExceeded-${AWS::StackName}"
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      Threshold: 1
      EvaluationPeriods: 1
      AlarmActions:
        - !Ref AlarmTopic
      ComparisonOperator: GreaterThanThreshold
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisThroughputAlarms
      TopicName: KinesisThroughputAlarms
Outputs:
  StreamName:
    Description: The name of the Kinesis Data Stream
    Value: !Ref KinesisDataStream