AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with S3 Storage and IAM Permissions

Parameters:
  S3BucketName:
    Type: String
    Default: emr-serverless-scripts-data
    Description: Name of the S3 bucket for storing scripts and data

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
        - PolicyName: CloudWatchLogsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ScriptsDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  EMRServerlessApplication:
    Type: AWS::EMR::ServerlessApplication
    Properties:
      Name: emr-serverless-spark-app
      Engine: Spark
      EngineVersion: emr-6.15.0
      AutoStart: true
      AutoStop: true
      RoleArn: !GetAtt EMRServerlessRole.Arn
      InitialCapacity:
        - WorkerConfiguration:
            WorkerType: Driver
            WorkerCount: 1
            WorkerCpu: 1
            WorkerMemory: 2
          WorkerConfiguration:
            WorkerType: Executor
            WorkerCount: 2
            WorkerCpu: 2
            WorkerMemory: 4

Outputs:
  EMRServerlessApplicationArn:
    Description: EMR Serverless Application ARN
    Value: !GetAtt EMRServerlessApplication.Arn
  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref ScriptsDataBucket