AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready MySQL RDS instance in private subnets with Provisioned IOPS'

Parameters:
  DBName:
    Type: String
    Default: ''
    Description: 'Optional database name to create'
    AllowedPattern: '^[a-zA-Z0-9_]*$'
    ConstraintDescription: 'Database name can only contain alphanumeric characters and underscores'
  MasterUsername:
    Type: String
    NoEcho: true
    Description: 'Master database username'
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '^[a-zA-Z0-9_]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters and underscores'
  MasterUserSecretName:
    Type: String
    Description: 'Name of the Secrets Manager secret containing the master password'
    MinLength: 1
    MaxLength: 256
  EngineVersion:
    Type: String
    Default: '8.0.34'
    Description: 'MySQL engine version'
    AllowedValues:
      - '5.7.42'
      - '8.0.34'
  AllocatedStorage:
    Type: Number
    Default: 100
    Description: 'Allocated storage in GB (minimum 100 for io1)'
    MinValue: 100
    MaxValue: 65536
  Iops:
    Type: Number
    Default: 1000
    Description: 'Provisioned IOPS (1000-64000)'
    MinValue: 1000
    MaxValue: 64000
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'VPC CIDR block'
    AllowedPattern: '^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: 'Must be a valid CIDR range'
  PrivateSubnet1Cidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: 'Private subnet 1 CIDR'
    AllowedPattern: '^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: 'Must be a valid CIDR range'
  PrivateSubnet2Cidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: 'Private subnet 2 CIDR'
    AllowedPattern: '^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: 'Must be a valid CIDR range'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnet1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnet2'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${AWS::StackName}-DBSubnetGroup'
      DBSubnetGroupDescription: 'Subnet group for MySQL RDS instance'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for MySQL RDS instance'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCidr

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub 'mysql-rds-${AWS::StackName}'
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: !Ref EngineVersion
      DBInstanceClass: db.r5.large
      AllocatedStorage: !Ref AllocatedStorage
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${MasterUserSecretName}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DatabaseSecurityGroup.GroupId
      StorageType: io1
      Iops: !Ref Iops
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      ApplyImmediately: true
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Retain

Outputs:
  DBEndpointAddress:
    Description: 'RDS endpoint address'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  DBEndpointPort:
    Description: 'RDS endpoint port'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Port
  SecurityGroupId:
    Description: 'Database security group ID'
    Value: !GetAtt DatabaseSecurityGroup.GroupId