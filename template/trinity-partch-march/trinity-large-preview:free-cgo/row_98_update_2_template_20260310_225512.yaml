AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      AutoBranchCreationConfig:
        EnableAutoBuild: true
        AutoBranchCreationPatterns:
          - master
      Repository: https://github.com/your-repo/TodoApp.git
      OauthToken: '{{resolve:secretsmanager:your-amplify-token:SecretString}}'

  AmplifyProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      EnableAutoBuild: true
      Framework: react
      Stage: PRODUCTION

  AmplifyAppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAmplifyServiceRole

Outputs:
  AppId:
    Value: !Ref AmplifyApp
    Description: Amplify App ID
  AppArn:
    Value: !GetAtt AmplifyApp.Arn
    Description: Amplify App ARN
  DefaultDomain:
    Value: !GetAtt AmplifyApp.DefaultDomain
    Description: Default Domain of the Amplify App