AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  UserPoolName:
    Type: String
    Default: SecureUserPool
  DomainPrefix:
    Type: String
    Default: mysecureapp-auth
  CallbackURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3000/callback"
  LogoutURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3000/logout"
  PasswordMinLength:
    Type: Number
    Default: 12
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  RequireNumbersTrue: !Equals [!Ref RequireNumbers, 'true']
  RequireSymbolsTrue: !Equals [!Ref RequireSymbols, 'true']
  RequireLowercaseTrue: !Equals [!Ref RequireLowercase, 'true']
  RequireUppercaseTrue: !Equals [!Ref RequireUppercase, 'true']

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: Your verification code is {####}
        EmailSubject: Your verification code
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireNumbers: !If [RequireNumbersTrue, true, false]
          RequireSymbols: !If [RequireSymbolsTrue, true, false]
          RequireLowercase: !If [RequireLowercaseTrue, true, false]
          RequireUppercase: !If [RequireUppercaseTrue, true, false]
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: SecureAppClient
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Value: !Ref UserPoolDomain