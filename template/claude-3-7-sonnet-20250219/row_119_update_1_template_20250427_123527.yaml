AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge to Kinesis integration for real-time event streaming'

Parameters:
  ApplicationName:
    Type: String
    Default: 'my-application'
    Description: 'Name of the application generating events'
  
  EventBusName:
    Type: String
    Default: 'application-events'
    Description: 'Name for the EventBridge event bus'
  
  KinesisStreamName:
    Type: String
    Default: 'application-events-stream'
    Description: 'Name for the Kinesis data stream'
  
  KinesisStreamShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards for the Kinesis stream'
    MinValue: 1
  
  KinesisStreamRetentionPeriod:
    Type: Number
    Default: 24
    Description: 'Retention period in hours for the Kinesis stream'
    MinValue: 24
    MaxValue: 168

Resources:
  # Custom EventBridge Event Bus
  ApplicationEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  # Kinesis Data Stream
  ApplicationEventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref KinesisStreamRetentionPeriod
      ShardCount: !Ref KinesisStreamShardCount
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  # IAM Role for EventBridge to publish to Kinesis
  EventBridgeToKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Description: 'IAM Role for EventBridge to publish to Kinesis'
      ManagedPolicyArns:
        - !Ref EventBridgeToKinesisPolicy

  # IAM Policy for EventBridge to publish to Kinesis
  EventBridgeToKinesisPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Policy allowing EventBridge to publish to Kinesis'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
              - kinesis:DescribeStream
            Resource: !GetAtt ApplicationEventStream.Arn

  # EventBridge Rule to capture events and route to Kinesis
  ApplicationEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ApplicationName}-to-kinesis-rule'
      Description: 'Rule to capture events from application and route to Kinesis'
      EventBusName: !Ref ApplicationEventBus
      EventPattern:
        source:
          - !Ref ApplicationName
      State: ENABLED
      Targets:
        - Id: KinesisTarget
          Arn: !GetAtt ApplicationEventStream.Arn
          RoleArn: !GetAtt EventBridgeToKinesisRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the created EventBridge event bus'
    Value: !GetAtt ApplicationEventBus.Arn
  
  KinesisStreamArn:
    Description: 'ARN of the created Kinesis data stream'
    Value: !GetAtt ApplicationEventStream.Arn
  
  EventBridgeRuleArn:
    Description: 'ARN of the created EventBridge rule'
    Value: !GetAtt ApplicationEventRule.Arn
  
  IAMRoleArn:
    Description: 'ARN of the created IAM role'
    Value: !GetAtt EventBridgeToKinesisRole.Arn