AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: ""
    Description: Subnet ID for the EC2 instance (leave empty to use default VPC)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: ""
    Description: VPC ID for the EC2 instance (leave empty to use default VPC)

Resources:
  # IAM Role for SSM
  SSMIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  # Instance Profile for SSM
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMIAMRole

  # IAM Role for FIS Integration
  FISIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - !Sub 'fis.${AWS::URLSuffix}'
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: FISPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"

  # CloudWatch Log Group for stress test execution
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  # Custom SSM Document for CPU stress testing
  CPUMaximizeStressDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: PowerShell script to maximize CPU usage by spawning threads equal to logical processors
        parameters:
          Duration:
            type: String
            default: '300'
            description: Duration in seconds for CPU stress test
        mainSteps:
          - name: MaximizeCPU
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - $duration = {{Duration}}
                - $processors = (Get-WmiObject -Class Win32_Processor).NumberOfLogicalProcessors
                - Write-Host "Starting CPU stress test with $processors threads for $duration seconds"
                - 1..$processors | ForEach-Object {
                -     Start-Job -ScriptBlock {
                -         $start = Get-Date
                -         while ((Get-Date) - $start -lt [TimeSpan]::FromSeconds($using:duration)) {
                -             $result = 1
                -             1..1000000 | ForEach-Object { $result *= $_ }
                -         }
                -     }
                - }
                - Write-Host "CPU stress test started. Waiting for completion..."
                - Get-Job | Wait-Job
                - Write-Host "CPU stress test completed"

  # Security Group for Windows instance
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Windows instance
      VpcId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref SubnetId]
      UserData:
        Fn::Base64: |
          <powershell>
          # Install SSM Agent if not present
          Install-WindowsFeature -Name "AmazonSSMAgent" -IncludeManagementTools
          Start-Service AmazonSSMAgent
          </powershell>
      Tags:
        - Key: Name
          Value: Windows-CPU-Stress-Test-Instance

  # Condition for default VPC usage
  UseDefaultVPC:
    Fn::Equals:
      - !Ref VpcId
      - ""

  # Condition for default subnet usage
  UseDefaultSubnet:
    Fn::Equals:
      - !Ref SubnetId
      - ""

# Outputs
Outputs:
  InstanceId:
    Description: Instance ID of the Windows EC2 instance
    Value: !Ref WindowsInstance
  PublicIp:
    Description: Public IP address of the Windows instance
    Value: !GetAtt WindowsInstance.PublicIp
  SSMIAMRoleArn:
    Description: ARN of the SSM IAM role
    Value: !GetAtt SSMIAMRole.Arn
  FISIAMRoleArn:
    Description: ARN of the FIS IAM role
    Value: !GetAtt FISIAMRole.Arn
  CPUMaximizeStressDocumentName:
    Description: Name of the custom SSM document
    Value: !Ref CPUMaximizeStressDocument
  LogGroupName:
    Description: Name of the CloudWatch log group
    Value: !Ref LogGroup