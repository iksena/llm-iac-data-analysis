AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB table with Local and Global Secondary Indexes

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  BillingMode:
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: Billing mode for the table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units (required if PROVISIONED)
    MinValue: 1
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units (required if PROVISIONED)
    MinValue: 1

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: LSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: !Ref BillingMode
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      LocalSecondaryIndexes:
        - IndexName: LSI1
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: LSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
      Tags:
        - Key: Environment
          Value: Production
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  TableARN:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref TableName
  LSI1Name:
    Description: Name of the Local Secondary Index
    Value: LSI1
  GSI1Name:
    Description: Name of the Global Secondary Index
    Value: GSI1