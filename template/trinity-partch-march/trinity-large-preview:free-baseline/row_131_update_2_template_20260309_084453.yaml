AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized alerting system using Amazon SNS with configurable endpoints and fallback notifications.

Parameters:
  EmailEndpoint:
    Type: String
    Description: Email address for notifications (optional)
    Default: ''
  HttpEndpoint:
    Type: String
    Description: HTTP/HTTPS URL for webhook notifications (optional)
    Default: ''
  FallbackEmail:
    Type: String
    Description: Email address for fallback notifications (optional)
    Default: ''

Resources:
  PrimarySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alerting Topic

  PrimarySNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref PrimarySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - budgets.amazonaws.com
                - cloudwatch.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref PrimarySNSTopic

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Fallback Alerting Topic

  FallbackSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref FallbackSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - budgets.amazonaws.com
                - cloudwatch.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref FallbackSNSTopic

  FailedNotificationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationsAlarm
      AlarmDescription: Alarm for failed notifications
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: email
      Endpoint: !Ref EmailEndpoint

  HttpSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHttpEndpoint
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: https
      Endpoint: !Ref HttpEndpoint

  FallbackEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasFallbackEmail
    Properties:
      TopicArn: !Ref FallbackSNSTopic
      Protocol: email
      Endpoint: !Ref FallbackEmail

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, '']]
  HasHttpEndpoint: !Not [!Equals [!Ref HttpEndpoint, '']]
  HasFallbackEmail: !Not [!Equals [!Ref FallbackEmail, '']]

Outputs:
  PrimarySNSTopicArn:
    Description: ARN of the primary SNS topic
    Value: !Ref PrimarySNSTopic
  FallbackSNSTopicArn:
    Description: ARN of the fallback SNS topic
    Value: !Ref FallbackSNSTopic