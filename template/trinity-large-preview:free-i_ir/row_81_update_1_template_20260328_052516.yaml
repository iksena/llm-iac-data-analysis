AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ResourceTagFilter:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: ServiceInstances
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::ManagedInstance
          TagFilters:
            - Key: Environment
              Values:
                - Production

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E3012