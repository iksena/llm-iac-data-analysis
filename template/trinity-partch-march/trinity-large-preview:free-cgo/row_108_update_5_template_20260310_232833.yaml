AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Management System with Admin-Managed Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  DomainPrefix:
    Type: String
    Default: myapp
    Description: Prefix for the Cognito hosted domain
  AllowedOAuthFlows:
    Type: CommaDelimitedList
    Default: "code,implicit"
    Description: Allowed OAuth flows
  AllowedOAuthScopes:
    Type: CommaDelimitedList
    Default: "email,openid,profile"
    Description: Allowed OAuth scopes
  CallbackURLs:
    Type: CommaDelimitedList
    Default: "https://localhost:3000/callback"
    Description: Callback URLs for OAuth flows
  LogoutURLs:
    Type: CommaDelimitedList
    Default: "https://localhost:3000/logout"
    Description: Logout URLs for OAuth flows
  PasswordMinLength:
    Type: Number
    Default: 8
    Description: Minimum password length
  PasswordRequireNumbers:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require numbers in password
  PasswordRequireSymbols:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require symbols in password
  PasswordRequireUppercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require uppercase letters in password
  PasswordRequireLowercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require lowercase letters in password

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireNumbers: !Ref PasswordRequireNumbers
          RequireSymbols: !Ref PasswordRequireSymbols
          RequireUppercase: !Ref PasswordRequireUppercase
          RequireLowercase: !Ref PasswordRequireLowercase
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: OFF
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      UsernameAttributes:
        - email
      LambdaConfig: {}
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: false
      EmailConfiguration: {}
      SmsConfiguration: {}

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${UserPoolName}-Client
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows: !Ref AllowedOAuthFlows
      AllowedOAuthScopes: !Ref AllowedOAuthScopes
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      SupportedIdentityProviders:
        - COGNITO

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref CognitoUserPool

Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolDomain:
    Description: Domain URL for the Cognito hosted UI
    Value: !Sub https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient