AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads

Parameters:
  EmailEndpoint:
    Type: String
    Default: dummy@example.com
    Description: Email address to receive notifications (dummy@example.com if not providing real email)

Resources:
  # IAM Role for Lambda Functions
  RiskManagementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RiskManagementExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementTable.Arn
        - PolicyName: SNSpublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskManagementTopic

  # DynamoDB Table for Risk Management Data
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementData
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S

  # SNS Topic for Notifications
  RiskManagementTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Risk Management System Notifications
      TopicName: RiskManagementAlerts

  # SNS Topic Policy for SSM OpsCenter
  RiskManagementTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm-opscenter.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskManagementTopic
      Topics:
        - !Ref RiskManagementTopic

  # Lambda Function: Workload Processor
  WorkloadProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WorkloadProcessor
      Handler: workload_processor.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt RiskManagementRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          sns = boto3.client('sns')

          def lambda_handler(event, context):
              try:
                  table = dynamodb.Table('RiskManagementData')
                  workload_id = event['workload_id']
                  question_id = event['question_id']
                  data = event['data']

                  # Store workload data
                  table.put_item(
                      Item={
                          'workload_id': workload_id,
                          'question_id': question_id,
                          'data': data,
                          'status': 'processed'
                      }
                  )

                  # Publish notification
                  sns.publish(
                      TopicArn='{{resolve:ssm-secure:/risk-management/sns-topic-arn}}',
                      Message=json.dumps(event),
                      Subject='Workload Processed'
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Workload processed successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }

  # Lambda Function: Risk Evaluator
  RiskEvaluatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskEvaluator
      Handler: risk_evaluator.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt RiskManagementRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          sns = boto3.client('sns')

          def lambda_handler(event, context):
              try:
                  table = dynamodb.Table('RiskManagementData')
                  workload_id = event['workload_id']
                  question_id = event['question_id']

                  # Retrieve data
                  response = table.get_item(
                      Key={
                          'workload_id': workload_id,
                          'question_id': question_id
                      }
                  )

                  if 'Item' not in response:
                      return {
                          'statusCode': 404,
                          'body': json.dumps('Item not found')
                      }

                  item = response['Item']

                  # Evaluate risk (simple example logic)
                  risk_level = 'LOW'
                  if item.get('data', {}).get('severity', 0) > 7:
                      risk_level = 'HIGH'

                  # Update item with risk assessment
                  table.update_item(
                      Key={
                          'workload_id': workload_id,
                          'question_id': question_id
                      },
                      UpdateExpression='SET risk_level = :val',
                      ExpressionAttributeValues={
                          ':val': risk_level
                      }
                  )

                  # Publish notification if high risk
                  if risk_level == 'HIGH':
                      sns.publish(
                          TopicArn='{{resolve:ssm-secure:/risk-management/sns-topic-arn}}',
                          Message=json.dumps({
                              'workload_id': workload_id,
                              'question_id': question_id,
                              'risk_level': risk_level
                          }),
                          Subject='High Risk Alert'
                      )

                  return {
                      'statusCode': 200,
                      'body': json.dumps(f'Risk evaluated: {risk_level}')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }

  # SNS Topic Subscription
  RiskManagementTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      TopicArn: !Ref RiskManagementTopic

Outputs:
  RiskManagementTopicArn:
    Description: SNS Topic ARN for Risk Management Notifications
    Value: !Ref RiskManagementTopic
    Export:
      Name: RiskManagementTopicArn

  WorkloadProcessorFunctionArn:
    Description: ARN of the Workload Processor Lambda Function
    Value: !GetAtt WorkloadProcessorFunction.Arn
    Export:
      Name: WorkloadProcessorFunctionArn

  RiskEvaluatorFunctionArn:
    Description: ARN of the Risk Evaluator Lambda Function
    Value: !GetAtt RiskEvaluatorFunction.Arn
    Export:
      Name: RiskEvaluatorFunctionArn