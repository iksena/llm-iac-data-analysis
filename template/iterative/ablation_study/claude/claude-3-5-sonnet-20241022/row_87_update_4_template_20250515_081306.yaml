AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket for Lambda artifacts and KMS key for encryption'

Parameters:
  BucketNameSuffix:
    Type: String
    Description: Suffix for the S3 bucket name
    AllowedPattern: '^[a-z0-9-]*$'
    ConstraintDescription: 'Must contain only lowercase letters, numbers, and hyphens'
    MinLength: 1
    MaxLength: 20

  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to KMS key

Resources:
  ArtifactsKMSKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: 'KMS key for Lambda artifacts encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'artifacts-key-policy'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: 'Allow Service Role Usage'
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:Encrypt'
              - 'kms:GenerateDataKey*'
              - 'kms:ReEncrypt*'
            Resource: '*'

  ArtifactsKMSAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: !Sub 'alias/artifacts-${BucketNameSuffix}'
      TargetKeyId: !Ref ArtifactsKMSKey

  ArtifactsBucket:
    Type: 'AWS::S3::Bucket'
    DependsOn: ArtifactsKMSKey
    Properties:
      BucketName: !Sub 'lambda-artifacts-${BucketNameSuffix}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt ArtifactsKMSKey.Arn
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90

  ArtifactsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    DependsOn: ArtifactsBucket
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${ArtifactsBucket.Arn}/*'
          - Sid: EnforceSSLOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${ArtifactsBucket.Arn}/*'
              - !GetAtt ArtifactsBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref ArtifactsBucket

  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt ArtifactsBucket.Arn

  KMSKeyId:
    Description: ID of the created KMS key
    Value: !Ref ArtifactsKMSKey

  KMSKeyArn:
    Description: ARN of the created KMS key
    Value: !GetAtt ArtifactsKMSKey.Arn