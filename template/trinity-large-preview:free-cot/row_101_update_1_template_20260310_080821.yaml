AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Flow Logging to S3 Bucket'

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  FlowLogTrafficType:
    Type: String
    Default: ALL
    AllowedValues:
      - ALL
      - ACCEPT
      - REJECT
    Description: Type of traffic to log
  S3BucketPrefix:
    Type: String
    Default: ''
    Description: Optional prefix for S3 bucket name
  LogFilePrefix:
    Type: String
    Default: ''
    Description: Optional prefix for log file organization

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasPrefix
        - !Sub '${S3BucketPrefix}-${AWS::AccountId}-${AWS::Region}-vpc-flowlogs'
        - !Sub '${AWS::AccountId}-${AWS::Region}-vpc-flowlogs'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-FlowLogsBucket'

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: SSLOnly
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Sid: VPCFlowLogsPermissions
            Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: s3:PutObject
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonVPCFlowLogsRole
      Path: /
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-FlowLogsRole'

  FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn
      LogDestinationType: s3
      LogDestination: !Sub 'arn:aws:s3:::${S3Bucket}'
      LogFormat: vpcflow
      TrafficType: !Ref FlowLogTrafficType
      ResourceId: !Ref VPC
      MaxAggregationInterval: 600
      LogFilePrefix: !Ref LogFilePrefix

Conditions:
  HasPrefix: !Not [!Equals [!Ref S3BucketPrefix, '']]

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
  S3BucketName:
    Description: S3 Bucket Name for Flow Logs
    Value: !Ref S3Bucket
  FlowLogId:
    Description: Flow Log ID
    Value: !Ref FlowLog