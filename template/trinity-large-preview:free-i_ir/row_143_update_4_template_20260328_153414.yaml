AWSTemplateFormatVersion: '2010-09-09'
Description: Secure static website on S3 with CloudFront CDN and automated deployment

Resources:
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      WebsiteConfiguration:
        IndexDocument: index.html

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for static site bucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName:
              Fn::GetAtt:
                - StaticSiteBucket
                - DomainName
            S3OriginConfig:
              OriginAccessIdentity:
                Fn::Join:
                  - ""
                  - - "origin-access-identity/cloudfront/"
                    - Ref: OriginAccessIdentity
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          Compress: true
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  PopulateS3LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - Fn::GetAtt:
                      - StaticSiteBucket
                      - Arn
                  - Fn::Join:
                      - ""
                      - - Fn::GetAtt:
                            - StaticSiteBucket
                            - Arn
                        - "/*"

  PopulateS3Lambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role:
        Fn::GetAtt:
          - PopulateS3LambdaExecutionRole
          - Arn
      Code:
        ZipFile:
          Fn::Join:
            - ""
            - - "exports.handler = async (event) => {\n"
              - "  const AWS = require('aws-sdk');\n"
              - "  const s3 = new AWS.S3();\n"
              - "  const bucketName = process.env.BUCKET_NAME;\n"
              - "\n"
              - "  try {\n"
              - "    if (event.RequestType === 'Create' || event.RequestType === 'Update') {\n"
              - "      await s3.putObject({\n"
              - "        Bucket: bucketName,\n"
              - "        Key: 'index.html',\n"
              - "        Body: '<html><body><h1>Welcome to our static site!</h1></body></html>',\n"
              - "        ContentType: 'text/html'\n"
              - "      }).promise();\n"
              - "    }\n"
              - "  } catch (error) {\n"
              - "    console.error('Error in PopulateS3Lambda:', error);\n"
              - "    throw error;\n"
              - "  }\n"
              - "  return event;\n"
              - "};\n"
      Runtime: nodejs24.x
      Timeout: 30
      Environment:
        Variables:
          BUCKET_NAME:
            Ref: StaticSiteBucket

  PopulateS3CustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - PopulateS3Lambda
          - Arn

Outputs:
  WebsiteURL:
    Value:
      Fn::GetAtt:
        - StaticSiteBucket
        - WebsiteURL
    Description: URL of the static website
  CloudFrontURL:
    Value:
      Fn::Join:
        - ""
        - - "https://"
          - Fn::GetAtt:
              - CloudFrontDistribution
              - DomainName
    Description: CloudFront distribution URL