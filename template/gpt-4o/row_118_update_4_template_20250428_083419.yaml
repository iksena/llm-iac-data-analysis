AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EnrichmentQueue

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/events/enrichment-logs
      RetentionInDays: 14

  StepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/events/enrichment-logs:*
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*/GET/us/*

  StepFunction:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt StepFunctionRole.Arn
      DefinitionString: |
        {
          "Comment": "A simple AWS Step Functions state machine that enriches SQS messages.",
          "StartAt": "GetMessage",
          "States": {
            "GetMessage": {
              "Type": "Task",
              "Resource": "arn:aws:states:::sqs:receiveMessage",
              "Parameters": {
                "QueueUrl": !Ref SQSQueue,
                "MaxNumberOfMessages": 1
              },
              "Next": "EnrichData"
            },
            "EnrichData": {
              "Type": "Task",
              "Resource": "arn:aws:states:::apigateway:invoke",
              "Parameters": {
                "ApiEndpoint": "https://api.zippopotam.us",
                "Method": "GET",
                "Path": "us/{.Messages[0].Body.zipCode}"
              },
              "Next": "LogResult"
            },
            "LogResult": {
              "Type": "Task",
              "Resource": "arn:aws:states:::logs:putLogEvents",
              "Parameters": {
                "LogGroupName": !Ref CloudWatchLogGroup,
                "LogStreamName": "EnrichmentLogStream",
                "LogEvents": [
                  {
                    "Timestamp": "States.Format('yyyy-MM-dd'T'HH:mm:ss.SSS'Z', $.timestamp)",
                    "Message": "States.JsonToString($.EnrichData)"
                  }
                ]
              },
              "End": true
            }
          }
        }

Outputs:
  SQSQueueURL:
    Description: URL of the SQS Queue
    Value: !Ref SQSQueue

  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref CloudWatchLogGroup

  StepFunctionARN:
    Description: ARN of the Step Function
    Value: !Ref StepFunction