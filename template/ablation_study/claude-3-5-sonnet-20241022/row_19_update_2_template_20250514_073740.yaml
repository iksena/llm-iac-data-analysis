AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge configuration with API destination and connection'

Parameters:
  ApiEndpointUrl:
    Type: String
    Description: 'API endpoint URL for the destination'
    Default: 'https://webhook.site/testtest'
  
  ApiKey:
    Type: String
    Description: 'API key for authentication'
    NoEcho: true

Resources:
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-bus'

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'x-api-key'
          ApiKeyValue: !Ref ApiKey
      Name: !Sub '${AWS::StackName}-connection'
      Description: 'Connection for API destination'

  ApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn: ApiConnection
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref ApiEndpointUrl
      InvocationRateLimitPerSecond: 300
      Name: !Sub '${AWS::StackName}-destination'

  EventRule:
    Type: AWS::Events::Rule
    DependsOn: ApiDestination
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "custom.events"
      Name: !Sub '${AWS::StackName}-rule'
      State: ENABLED
      Targets:
        - Id: "ApiDestinationTarget"
          Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the custom event bus'
    Value: !GetAtt CustomEventBus.Arn

  ApiDestinationArn:
    Description: 'ARN of the API destination'
    Value: !GetAtt ApiDestination.Arn

  ConnectionArn:
    Description: 'ARN of the connection'
    Value: !GetAtt ApiConnection.Arn