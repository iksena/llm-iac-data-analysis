AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create environment-specific DynamoDB tables for supporter product data

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

  ReadCapacityUnits:
    Type: Number
    Default: 20
    Description: Read capacity units for PROD table

  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for PROD table

  MinWriteCapacity:
    Type: Number
    Default: 5
    Description: Minimum write capacity for auto-scaling

  MaxWriteCapacity:
    Type: Number
    Default: 500
    Description: Maximum write capacity for auto-scaling

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub SupporterProductData-${Stage}
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      ProvisionedThroughput: !If [IsProd, {ReadCapacityUnits: !Ref ReadCapacityUnits, WriteCapacityUnits: !Ref WriteCapacityUnits}, !Ref AWS::NoValue]
      SSESpecification:
        Enabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: true

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: !Ref MaxWriteCapacity
      MinCapacity: !Ref MinWriteCapacity
      ResourceId: !Sub table/SupporterProductData-${Stage}
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
      ServiceNamespace: dynamodb

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteCapacityAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDynamoDBFullAccess

Conditions:
  IsProd: !Equals [!Ref Stage, PROD]

Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref SupporterProductDataTable