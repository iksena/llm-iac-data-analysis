AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 Image Builder resources including IAM role, instance profile, and S3 bucket for logs

Resources:
  ImageBuilderIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ImageBuilderRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AWSImageBuilderFullAccess
      Policies:
        - PolicyName: S3LogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3LogsBucket}/*'
                  - !Sub 'arn:aws:s3:::${S3LogsBucket}'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: ImageBuilderInstanceProfile
      Roles:
        - !Ref ImageBuilderIAMRole

  S3LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: image-builder-logs-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  S3LogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ImageBuilderIAMRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3LogsBucket}/*'
              - !Sub 'arn:aws:s3:::${S3LogsBucket}'

Outputs:
  S3LogsBucketName:
    Description: Name of the S3 bucket for storing image build logs
    Value: !Ref S3LogsBucket
  EC2InstanceProfileName:
    Description: Name of the EC2 instance profile for Image Builder
    Value: !Ref EC2InstanceProfile