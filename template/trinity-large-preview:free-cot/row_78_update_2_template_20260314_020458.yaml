AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EC2 IP Address Manager (IPAM) with exported identifiers for cross-stack references

Parameters:
  IPAMName:
    Type: String
    Default: DefaultIPAM
    Description: Name for the IPAM
  Description:
    Type: String
    Default: Managed IP Address Manager
    Description: Description for the IPAM
  OperatingRegions:
    Type: String
    Default: !Ref 'AWS::Region'
    Description: Comma-separated list of regions where IPAM will be active

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Name: !Ref IPAMName
      Description: !Ref Description
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      IpamScopeType: public
      Tags:
        - Key: Name
          Value: PublicScope

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      IpamScopeType: private
      Tags:
        - Key: Name
          Value: PrivateScope

  PublicPool:
    Type: AWS::EC2::IPAMPool
    Properties:
      AddressFamily: ipv4
      IpamScopeId: !Ref PublicScope
      Tags:
        - Key: Name
          Value: PublicPool

  PrivatePool:
    Type: AWS::EC2::IPAMPool
    Properties:
      AddressFamily: ipv4
      IpamScopeId: !Ref PrivateScope
      Tags:
        - Key: Name
          Value: PrivatePool

Outputs:
  IPAMARN:
    Description: IPAM ARN
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ARN'
  IPAMID:
    Description: IPAM ID
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ID'
  PublicScopeID:
    Description: Public Scope ID
    Value: !Ref PublicScope
    Export:
      Name: !Sub '${AWS::StackName}-Public-Scope-ID'
  PrivateScopeID:
    Description: Private Scope ID
    Value: !Ref PrivateScope
    Export:
      Name: !Sub '${AWS::StackName}-Private-Scope-ID'