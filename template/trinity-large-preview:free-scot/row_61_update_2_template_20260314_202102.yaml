AWSTemplateFormatVersion: '2010-09-09'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref AWS::Region

  VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.route53
      VpcId: !Ref VPC
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: '*'
            Resource: '*'

Outputs:
  HostedZoneID:
    Value: !Ref PrivateHostedZone
  HostedZoneName:
    Value: !GetAtt PrivateHostedZone.NameServers.0