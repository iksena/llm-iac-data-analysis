AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SNS topic and EventBridge rule for demo.cli events

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: DemoCLIEventsTopic
      TopicName: DemoCLIEventsTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to capture demo.cli events
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: DemoCLITarget

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

Outputs:
  SNSTopicArn:
    Description: ARN of the created SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleArn:
    Description: ARN of the created EventBridge rule
    Value: !Ref EventBridgeRule