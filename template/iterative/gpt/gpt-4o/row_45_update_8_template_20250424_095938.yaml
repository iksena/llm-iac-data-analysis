AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Kinesis Data Firehose with server-side encryption and error logging to CloudWatch Logs.

Parameters:
  FirehoseStreamName:
    Type: String
    Description: Name of the Kinesis Data Firehose delivery stream.
    Default: MyFirehoseStream
  LogGroupName:
    Type: String
    Description: Name of the CloudWatch Log Group for error logging.
    Default: MyFirehoseLogGroup
  LogStreamName:
    Type: String
    Description: Name of the CloudWatch Log Stream for error logging.
    Default: MyFirehoseLogStream
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket for Firehose delivery.
    Default: my-firehose-s3-bucket

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 14

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref LogGroupName
      LogStreamName: !Ref LogStreamName
    DependsOn: FirehoseLogGroup

  FirehoseKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting Kinesis Data Firehose data.
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub arn:aws:s3:::${S3BucketName}/*
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}:log-stream:${LogStreamName}

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      S3DestinationConfiguration:
        BucketARN: !Sub arn:aws:s3:::${S3BucketName}
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: !GetAtt FirehoseKMSKey.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref LogGroupName
          LogStreamName: !Ref LogStreamName
    DependsOn: 
      - FirehoseLogGroup
      - FirehoseLogStream
      - FirehoseRole
      - FirehoseKMSKey

Outputs:
  FirehoseStreamARN:
    Description: The ARN of the Kinesis Data Firehose delivery stream.
    Value: !GetAtt FirehoseDeliveryStream.Arn

  CloudWatchLogGroupName:
    Description: The name of the CloudWatch Log Group.
    Value: !Ref LogGroupName

  CloudWatchLogStreamName:
    Description: The name of the CloudWatch Log Stream.
    Value: !Ref LogStreamName