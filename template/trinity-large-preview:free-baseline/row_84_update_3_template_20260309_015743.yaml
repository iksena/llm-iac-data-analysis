AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Macie session for automated sensitive data discovery and security monitoring.

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: ENABLED

Outputs:
  MacieAdminAccount:
    Description: The AWS account ID that is the Macie administrator account
    Value: !Ref AWS::AccountId