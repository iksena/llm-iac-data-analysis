AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon ECR repository with repository policy'

Parameters:
  RepositoryName:
    Type: String
    Description: Name for the ECR repository
    Default: kubernetes-images
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-z][a-z0-9-_]*$'
    ConstraintDescription: Repository name must start with a letter and can only contain lowercase letters, numbers, hyphens, and underscores.

  ImageTagMutability:
    Type: String
    Description: The tag mutability setting for the repository
    Default: MUTABLE
    AllowedValues:
      - MUTABLE
      - IMMUTABLE

  ScanOnPush:
    Type: String
    Description: Whether to scan images for vulnerabilities on push
    Default: true
    AllowedValues:
      - true
      - false

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      ImageTagMutability: !Ref ImageTagMutability
      ImageScanningConfiguration:
        ScanOnPush: !Ref ScanOnPush
      EncryptionConfiguration:
        EncryptionType: AES256

  ECRRepositoryPolicy:
    Type: AWS::ECR::RepositoryPolicy
    Properties:
      RepositoryName: !Ref ECRRepository
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:DescribeRepositories
              - ecr:GetRepositoryPolicy
              - ecr:ListImages
              - ecr:DeleteRepository
              - ecr:BatchDeleteImage
              - ecr:SetRepositoryPolicy
              - ecr:DeleteRepositoryPolicy

Outputs:
  RepositoryURI:
    Description: The URI of the ECR repository
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}
    Export:
      Name: !Sub ${AWS::StackName}-RepositoryURI

  RepositoryARN:
    Description: The ARN of the ECR repository
    Value: !GetAtt ECRRepository.Arn
    Export:
      Name: !Sub ${AWS::StackName}-RepositoryARN