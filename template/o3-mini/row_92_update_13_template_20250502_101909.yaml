AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that creates a self-configuring Amazon Linux 2 EC2 instance.
  The instance installs Nginx via an SSM association. The template provisions the necessary IAM roles,
  an S3 bucket for logs (with server-side encryption), a security group, and an instance profile.
  NOTE: You must supply valid values for the VpcId and SubnetId parameters when launching the stack.

Parameters:
  VpcId:
    Description: "The VPC ID where the EC2 instance and security group will be deployed."
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: "The Subnet ID for the EC2 instance. Must belong to the VPC provided above."
    Type: AWS::EC2::Subnet::Id
  InstanceType:
    Description: "EC2 instance type."
    Type: String
    Default: t2.micro

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  InstanceSSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: SSMAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:DescribeAssociation
                  - ssm:GetDeployablePatchSnapshotForInstance
                  - ssm:GetDocument
                  - ssm:DescribeDocument
                  - ssm:ListAssociations
                  - ssm:ListInstanceAssociations
                  - ssm:UpdateInstanceAssociationStatus
                  - ssm:UpdateAssociationStatus
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                  - ssm:SendCommand
                  - ssm:CancelCommand
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Join 
                    - ""
                    - - "arn:aws:s3:::"
                      - !Ref LogsBucket
                  - !Join 
                    - ""
                    - - "arn:aws:s3:::"
                      - !Ref LogsBucket
                      - "/*"
              - Effect: Allow
                Action:
                  - ec2messages:*
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref InstanceSSMRole

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP access for the web server"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs}}"
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      SubnetId: !Ref SubnetId

  NginxInstallAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: "AWS-RunShellScript"
      InstanceId: !Ref EC2Instance
      Parameters:
        commands:
          - "sudo amazon-linux-extras install nginx1 -y"
          - "sudo systemctl start nginx"
          - "sudo systemctl enable nginx"

Outputs:
  EC2InstanceId:
    Description: "ID of the EC2 instance running Nginx."
    Value: !Ref EC2Instance
  LogsBucketName:
    Description: "Name of the S3 bucket storing logs."
    Value: !Ref LogsBucket