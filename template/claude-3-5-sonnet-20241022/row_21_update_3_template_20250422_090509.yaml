AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Timestream Database and Tables'

Parameters:
  DatabaseName:
    Type: String
    Default: 'TimeseriesDB'
    Description: 'Name of the Timestream database'
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'

  MemoryRetentionHours:
    Type: Number
    Default: 24
    Description: 'Memory store retention in hours'
    MinValue: 1
    MaxValue: 8766

  MagneticRetentionDays:
    Type: Number
    Default: 365
    Description: 'Magnetic store retention in days'
    MinValue: 1
    MaxValue: 73000

Resources:
  TimeStreamDatabase:
    Type: AWS::Timestream::Database
    DeletionPolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName

  BatchWriteTable:
    Type: AWS::Timestream::Table
    DependsOn: TimeStreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-01-batch-write'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

  OlderRecordsMemOnlyTable:
    Type: AWS::Timestream::Table
    DependsOn: TimeStreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-02-older-records-memonly'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

  OlderRecordsMagneticTable:
    Type: AWS::Timestream::Table
    DependsOn: TimeStreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-03-older-records-magnetic'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

  CommonAttributesTable:
    Type: AWS::Timestream::Table
    DependsOn: TimeStreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-04-common-attributes'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

Outputs:
  DatabaseArn:
    Description: 'ARN of the created Timestream database'
    Value: !GetAtt TimeStreamDatabase.Arn

  BatchWriteTableName:
    Description: 'Name of the batch write table'
    Value: !Ref BatchWriteTable

  OlderRecordsMemOnlyTableName:
    Description: 'Name of the memory-only records table'
    Value: !Ref OlderRecordsMemOnlyTable

  OlderRecordsMagneticTableName:
    Description: 'Name of the magnetic store records table'
    Value: !Ref OlderRecordsMagneticTable

  CommonAttributesTableName:
    Description: 'Name of the common attributes table'
    Value: !Ref CommonAttributesTable