AWSTemplateFormatVersion: '2010-09-09'
Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-TGW'

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: TGW-Share
      AllowExternalPrincipals: true
      Principals:
        - 644519422710

  ResourceSharePermission:
    Type: AWS::RAM::Permission
    Properties:
      Name: TGW-Share-Permission
      ResourceType: tgw
      PolicyTemplate:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - ram:GetResourceShare
              - ram:ListResourceSharePermissions
            Resource: '*'

  TransitGatewayResourceAssociation:
    Type: AWS::RAM::ResourceShareAssociation
    Properties:
      ResourceShareArn: !GetAtt ResourceShare.Arn
      ResourceArn: !GetAtt TransitGateway.Arn

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref ResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'