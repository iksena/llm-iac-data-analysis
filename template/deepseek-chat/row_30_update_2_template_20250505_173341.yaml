AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with multi-AZ EC2 instances and performance monitoring'

Parameters:
  VpcCidr:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  PublicSubnet1Cidr:
    Description: 'CIDR block for public subnet 1'
    Type: String
    Default: '10.0.1.0/24'
  
  PublicSubnet2Cidr:
    Description: 'CIDR block for public subnet 2'
    Type: String
    Default: '10.0.2.0/24'
  
  InstanceType:
    Description: 'EC2 instance type'
    Type: String
    Default: 't3.micro'
    AllowedValues: ['t3.micro', 't3.small', 't3.medium']
  
  KeyPairName:
    Description: 'Name of an existing EC2 KeyPair'
    Type: 'AWS::EC2::KeyPair::KeyName'
  
  EfsPerformanceMode:
    Description: 'EFS performance mode'
    Type: String
    Default: 'generalPurpose'
    AllowedValues: ['generalPurpose', 'maxIO']
  
  EfsThroughputMode:
    Description: 'EFS throughput mode'
    Type: String
    Default: 'bursting'
    AllowedValues: ['bursting', 'provisioned']
  
  IoLimitThreshold:
    Description: 'I/O limit alarm threshold percentage'
    Type: Number
    Default: 95
    MinValue: 1
    MaxValue: 100
  
  ThroughputThreshold:
    Description: 'Throughput alarm threshold percentage'
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100

Mappings:
  RegionMap:
    us-east-1:
      AMI: 'ami-0c7217cdde317cfec'
    us-west-2:
      AMI: 'ami-03f65b8614a860c29'
    eu-west-1:
      AMI: 'ami-0d75513e7706cf2d9'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'EFS-VPC'

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: 'EFS-IGW'

  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: 'PublicRouteTable'

  PublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'PublicSubnet1'

  PublicSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: 'PublicSubnet2'

  Subnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  EfsSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for EFS'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: 'tcp'
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref Ec2SecurityGroup

  Ec2SecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for EC2 instances'
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          FromPort: -1
          ToPort: -1
      SecurityGroupIngress:
        - IpProtocol: 'tcp'
          FromPort: 22
          ToPort: 22
          CidrIp: '0.0.0.0/0'

  EfsFileSystem:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      PerformanceMode: !Ref EfsPerformanceMode
      ThroughputMode: !Ref EfsThroughputMode
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: 'SharedEFS'

  EfsMountTarget1:
    Type: 'AWS::EFS::MountTarget'
    DependsOn: EfsSecurityGroup
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: 'AWS::EFS::MountTarget'
    DependsOn: EfsSecurityGroup
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  Ec2IamRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ['ec2.amazonaws.com']
            Action: ['sts:AssumeRole']
      Path: '/'
      Policies:
        - PolicyName: 'EFS-Access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'elasticfilesystem:ClientMount'
                  - 'elasticfilesystem:ClientWrite'
                Resource: !GetAtt EfsFileSystem.Arn
        - PolicyName: 'SSM-Access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:UpdateInstanceInformation'
                  - 'ssm:ListAssociations'
                  - 'ssm:ListInstanceAssociations'
                Resource: '*'

  Ec2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref Ec2IamRole

  Ec2Instance1:
    Type: 'AWS::EC2::Instance'
    DependsOn: 
      - EfsMountTarget1
      - Ec2InstanceProfile
    CreationPolicy:
      ResourceSignal:
        Timeout: 'PT15M'
        Count: 1
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs ${EfsFileSystem}:/ /mnt/efs
          do
            sleep 10
          done
          echo "${EfsFileSystem}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Ec2Instance1 --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: 'EFS-Instance1'

  Ec2Instance2:
    Type: 'AWS::EC2::Instance'
    DependsOn: 
      - EfsMountTarget2
      - Ec2InstanceProfile
    CreationPolicy:
      ResourceSignal:
        Timeout: 'PT15M'
        Count: 1
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs ${EfsFileSystem}:/ /mnt/efs
          do
            sleep 10
          done
          echo "${EfsFileSystem}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Ec2Instance2 --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: 'EFS-Instance2'

  EfsIoLimitAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    DependsOn: EfsFileSystem
    Properties:
      AlarmDescription: 'Alarm when EFS I/O limit exceeds threshold'
      Namespace: 'AWS/EFS'
      MetricName: 'PercentIOLimit'
      Dimensions:
        - Name: 'FileSystemId'
          Value: !Ref EfsFileSystem
      Statistic: 'Average'
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref IoLimitThreshold
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'
      AlarmActions:
        - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic'

  EfsThroughputAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    DependsOn: EfsFileSystem
    Properties:
      AlarmDescription: 'Alarm when EFS throughput exceeds threshold'
      Namespace: 'AWS/EFS'
      MetricName: 'BurstCreditBalance'
      Dimensions:
        - Name: 'FileSystemId'
          Value: !Ref EfsFileSystem
      Statistic: 'Average'
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref ThroughputThreshold
      ComparisonOperator: 'LessThanOrEqualToThreshold'
      AlarmActions:
        - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic'

Outputs:
  EfsId:
    Description: 'EFS File System ID'
    Value: !Ref EfsFileSystem
  
  EfsDnsName:
    Description: 'EFS DNS name'
    Value: !GetAtt EfsFileSystem.DNSName
  
  Instance1Id:
    Description: 'Instance 1 ID'
    Value: !Ref Ec2Instance1
  
  Instance2Id:
    Description: 'Instance 2 ID'
    Value: !Ref Ec2Instance2
  
  EfsSecurityGroupId:
    Description: 'EFS Security Group ID'
    Value: !Ref EfsSecurityGroup
  
  Ec2SecurityGroupId:
    Description: 'EC2 Security Group ID'
    Value: !Ref Ec2SecurityGroup