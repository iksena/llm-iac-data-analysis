AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and cost-optimized S3 bucket for CloudWatch export data with configurable versioning and lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: 'Optional. Custom bucket name (must be globally unique). Leave empty for auto-generated name.'
    AllowedPattern: '^[a-z0-9][a-z0-9\.-]{1,61}[a-z0-9]$|^$'
    ConstraintDescription: 'Bucket name must be DNS-compliant and 3-63 characters long, or empty for auto-generation'

  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable versioning for object recovery (true) or disable (false)'

  TransitionToStandardIAAfterDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 364
    Description: 'Days after creation to transition to Standard-IA (must be < Glacier days)'

  TransitionToGlacierAfterDays:
    Type: Number
    Default: 90
    MinValue: 2
    Description: 'Days after creation to transition to Glacier (must be > IA days and < Expiration days)'

  ExpirationAfterDays:
    Type: Number
    Default: 365
    MinValue: 3
    Description: 'Days after creation to expire objects (must be > Glacier days)'

Conditions:
  UseProvidedBucketName: !Not [!Equals [!Ref BucketName, '']]
  VersioningEnabled: !Equals [!Ref VersioningEnabled, 'true']

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseProvidedBucketName, !Ref BucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !If [VersioningEnabled, 'Enabled', 'Suspended']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CloudWatchExportLifecycleRule
            Status: Enabled
            Prefix: ''
            Transitions:
              - StorageClass: STANDARD_IA
                Days: !Ref TransitionToStandardIAAfterDays
              - StorageClass: GLACIER
                Days: !Ref TransitionToGlacierAfterDays
            ExpirationInDays: !Ref ExpirationAfterDays

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref CloudWatchExportBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn