AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated Security Hub Controls Management'

Parameters:
  DisableCIS140Controls:
    Type: Boolean
    Default: false
    Description: 'Set to true to disable CIS 1.4.0 controls'
  DisableAWSFSPControls:
    Type: Boolean
    Default: false
    Description: 'Set to true to disable AWS Foundational Security Best Practices controls'
  PermissionsBoundary:
    Type: String
    Default: ''
    Description: 'Optional IAM permissions boundary ARN'
  LogRetentionDays:
    Type: Number
    Default: 30
    Description: 'CloudWatch Logs retention period in days'

Resources:
  SecurityHubControlManagerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'SecurityHubControlManager-${AWS::StackName}'
      Path: '/'
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundary, !Ref 'AWS::NoValue']
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:BatchUpdateStandardsControlAssociations
                  - securityhub:DescribeStandardsControls
                Resource: '*'

  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'SecurityHubControlManager-${AWS::StackName}'
      Description: 'Manages Security Hub controls based on CloudFormation parameters'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt SecurityHubControlManagerRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse
          import boto3

          securityhub = boto3.client('securityhub')

          def handler(event, context):
              try:
                  print('Received event: %s' % json.dumps(event))
                  request_type = event['RequestType']

                  if request_type == 'Create' or request_type == 'Update':
                      disable_cis = event['ResourceProperties']['DisableCIS140Controls']
                      disable_fsp = event['ResourceProperties']['DisableAWSFSPControls']

                      controls_to_disable = []

                      if disable_cis:
