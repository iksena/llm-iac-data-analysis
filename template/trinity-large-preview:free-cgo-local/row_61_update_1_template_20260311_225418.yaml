AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  VPCId:
    Type: String
    Default: 'vpc-12345678'
    Description: The VPC ID where the private hosted zone will be associated
  VPCRegion:
    Type: String
    Default: 'us-east-1'
    Description: The AWS region of the VPC

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: www.example.com
      HostedZoneConfig:
        Comment: Internal DNS for VPC
        PrivateZone: true
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref VPCRegion

Outputs:
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
    Export:
      Name: PrivateHostedZoneID
  NameServers:
    Description: The name servers for the hosted zone
    Value: !Join [',', !GetAtt PrivateHostedZone.NameServers]
    Export:
      Name: PrivateHostedZoneNameServers