AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL cluster with two publicly accessible db.t3.large instances and custom parameter groups

Parameters:
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
  DBInstanceIdentifier1:
    Type: String
    Default: aurora-instance-1
  DBInstanceIdentifier2:
    Type: String
    Default: aurora-instance-2
  MasterUsername:
    Type: String
    Default: admin
  MasterUserPassword:
    Type: String
    NoEcho: true
    Default: Password123!
  DBSubnetGroupName:
    Type: String
    Default: default-vpc
  VPCSecurityGroups:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Default: []

Resources:
  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      EnableHttpEndpoint: true
      DBClusterIdentifier: !Ref DBClusterIdentifier
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VpcSecurityGroupIds: !Ref VPCSecurityGroups
      BackupRetentionPeriod: 1
      PreferredBackupWindow: '03:00-04:00'

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Ref DBInstanceIdentifier1
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraDBParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Ref DBInstanceIdentifier2
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraDBParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups

  AuroraDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for Aurora MySQL cluster
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION'

Outputs:
  ClusterEndpoint:
    Description: The cluster endpoint for the Aurora MySQL cluster
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint for the Aurora MySQL cluster
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address