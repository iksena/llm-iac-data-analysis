AWSTemplateFormatVersion: '2010-09-09'
Description: Lab environment for EC2 instance scheduling automation with VPC, instances, and admin tools

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SchedulingLabVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SchedulingLabIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSchedulerAdminRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Path: /
      Tags:
        - Key: Name
          Value: InstanceSchedulerAdminRole

  InstanceSchedulerAdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceSchedulerAdminRole

  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Name
          Value: SSMRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and restricted outbound traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SchedulingLabSG

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref InstanceSchedulerAdminInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y aws-cli
          curl -o instance-scheduler-cli.zip https://example.com/instance-scheduler-cli.zip
          unzip instance-scheduler-cli.zip
          ./install.sh
      Tags:
        - Key: Name
          Value: AdminInstance
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

  DevInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: DevInstance1
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

  DevInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: DevInstance2
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

  DevInstance3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: DevInstance3
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

  DevInstance4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: DevInstance4
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

  DevInstance5:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, AMI]
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: DevInstance5
        - Key: environment
          Value: dev
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-east-2:
      AMI: ami-0c55b159cbfafe1f0
    us-west-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0c55b159cbfafe1f0
    eu-west-1:
      AMI: ami-0c55b159cbfafe1f0
    eu-west-2:
      AMI: ami-0c55b159cbfafe1f0
    eu-central-1:
      AMI: ami-0c55b159cbfafe1f0
    ap-southeast-1:
      AMI: ami-0c55b159cbfafe1f0
    ap-southeast-2:
      AMI: ami-0c55b159cbfafe1f0
    ap-northeast-1:
      AMI: ami-0c55b159cbfafe1f0
    ap-northeast-2:
      AMI: ami-0c55b159cbfafe1f0
    sa-east-1:
      AMI: ami-0c55b159cbfafe1f0
    ca-central-1:
      AMI: ami-0c55b159cbfafe1f0

Outputs:
  AdminInstanceId:
    Description: Instance ID of the admin instance
    Value: !Ref AdminInstance
  DevInstanceIds:
    Description: Instance IDs of the development instances
    Value: !Join [",", [!Ref DevInstance1, !Ref DevInstance2, !Ref DevInstance3, !Ref DevInstance4, !Ref DevInstance5]]
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
  AdminInstancePublicIp:
    Description: Public IP of the admin instance
    Value: !GetAtt AdminInstance.PublicIp