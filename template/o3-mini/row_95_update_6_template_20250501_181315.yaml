AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EC2 instance with tag-driven automation for OS updates,
  Nginx installation, and SSM-based validation. It deploys an Amazon Linux 2 EC2 instance with a tag "nginx: Yes",
  an IAM role and instance profile for SSM access, a custom SSM Automation Document for executing commands,
  and an SSM Association that targets instances by tag.

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: "/"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
      Path: "/"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: nginx
          Value: "Yes"

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Name: EC2-Nginx-Automation-Document
      Content:
        schemaVersion: "0.3"
        description: "Automation document to update the OS, install Nginx, and validate the web server."
        mainSteps:
          - name: OSUpdate
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo yum update -y"
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo amazon-linux-extras install nginx1 -y"
                - "sudo systemctl start nginx"
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - "status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost)"
                - "if [ $status -ne 200 ]; then exit 1; fi"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      AssociationName: EC2-Nginx-Automation-Association
      Targets:
        - Key: "tag:nginx"
          Values:
            - "Yes"

Outputs:
  InstanceId:
    Description: The ID of the EC2 instance
    Value: !Ref EC2Instance
  SSMAutomationDocumentName:
    Description: The name of the custom SSM Automation Document
    Value: !Ref SSMAutomationDocument