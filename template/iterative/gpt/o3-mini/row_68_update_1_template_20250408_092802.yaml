AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM role with AWS managed policies for CloudWatch and Systems Manager,
  along with an instance profile for EC2 instances.

Resources:
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      RoleName: EC2InstanceRole

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2IAMRole
      InstanceProfileName: EC2InstanceProfile

Outputs:
  IAMRoleName:
    Description: Name of the IAM role for EC2
    Value: !Ref EC2IAMRole
  InstanceProfileName:
    Description: Name of the EC2 instance profile associated with the IAM role
    Value: !Ref EC2InstanceProfile