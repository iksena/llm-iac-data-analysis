AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AliasName:
    Type: String
    Default: alias/central-encryption-key
    Description: Name for the KMS key alias (must start with 'alias/')
Resources:
  CentralKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Central encryption management key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-policy
        Statement:
          - Sid: EnableRootPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
  KeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref AliasName
      TargetKeyId: !Ref CentralKmsKey
Outputs:
  KeyArn:
    Value: !GetAtt CentralKmsKey.Arn
    Description: ARN of the created KMS key
  KeyAliasName:
    Value: !Ref KeyAlias
    Description: Name of the key alias