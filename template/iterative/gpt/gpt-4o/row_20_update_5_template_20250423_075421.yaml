AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a CloudWatch Dashboard and CloudWatch Logs Insights queries
  for monitoring AWS Client VPN usage patterns, including connection durations, data transfer volumes,
  and user activity across different authentication methods.

Parameters:
  LogGroupName:
    Type: String
    Default: '/aws/vpn/logs'
    Description: The name of the CloudWatch Log Group for VPN logs.

Resources:
  VPNLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 30

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'Connection Duration'
      QueryString: |
        fields @timestamp, @message
        | filter @message like /Client VPN connection/
        | stats sum(connectionDuration) as TotalConnectionDuration by userId
      LogGroupNames:
        - !Ref LogGroupName

  DataTransferVolumeQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'Data Transfer Volume'
      QueryString: |
        fields @timestamp, @message
        | filter @message like /Data transfer/
        | stats sum(bytesTransferred) as TotalDataTransferred by userId
      LogGroupNames:
        - !Ref LogGroupName

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'User Activity'
      QueryString: |
        fields @timestamp, @message
        | filter @message like /User activity/
        | stats count() as ActivityCount by userId, authType
      LogGroupNames:
        - !Ref LogGroupName

  VPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: 'VPNUsageDashboard'
      DashboardBody: 
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "log",
                "x": 0,
                "y": 0,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "${ConnectionDurationQuery.QueryDefinitionId}",
                  "logGroupNames": ["${LogGroupName}"],
                  "title": "Connection Duration by User"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 6,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "${DataTransferVolumeQuery.QueryDefinitionId}",
                  "logGroupNames": ["${LogGroupName}"],
                  "title": "Data Transfer Volume by User"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 12,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "${UserActivityQuery.QueryDefinitionId}",
                  "logGroupNames": ["${LogGroupName}"],
                  "title": "User Activity by Authentication Type"
                }
              }
            ]
          }

Outputs:
  DashboardURL:
    Description: URL of the CloudWatch Dashboard
    Value: "https://console.aws.amazon.com/cloudwatch/home#dashboards:name=VPNUsageDashboard"
    Export:
      Name: !Sub "${AWS::StackName}-DashboardURL"

  LogGroupNameOutput:
    Description: The name of the CloudWatch Log Group
    Value: !Ref VPNLogGroup
    Export:
      Name: !Sub "${AWS::StackName}-LogGroupName"

  ConnectionDurationQueryId:
    Description: The ID of the Connection Duration Query
    Value: !Ref ConnectionDurationQuery
    Export:
      Name: !Sub "${AWS::StackName}-ConnectionDurationQueryId"

  DataTransferVolumeQueryId:
    Description: The ID of the Data Transfer Volume Query
    Value: !Ref DataTransferVolumeQuery
    Export:
      Name: !Sub "${AWS::StackName}-DataTransferVolumeQueryId"

  UserActivityQueryId:
    Description: The ID of the User Activity Query
    Value: !Ref UserActivityQuery
    Export:
      Name: !Sub "${AWS::StackName}-UserActivityQueryId"