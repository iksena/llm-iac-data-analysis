AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure parameter management with SSM Parameter Store and Secrets Manager'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'dev'
    Description: Environment name for resource prefixing
  Username:
    Type: String
    Default: 'admin'
    Description: Username for Secrets Manager secret

Resources:
  # SSM Parameters
  ConfigParameterA:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/config/parameterA'
      Type: String
      Value: 'This is A'
      Description: 'Configuration parameter A'
      Tier: Standard

  ConfigParameterB:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/config/parameterB'
      Type: String
      Value: 'This is B'
      Description: 'Configuration parameter B'
      Tier: Standard

  # Secrets Manager Secret
  ApplicationSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${EnvironmentName}/application/credentials'
      Description: 'Application credentials'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${Username}"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  # IAM Role for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/*'
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref ApplicationSecret

  # Lambda Function
  ParameterReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-parameter-reader'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          def handler(event, context):
              ssm = boto3.client('ssm')
              secrets = boto3.client('secretsmanager')
              
              # Get SSM Parameters
              param_path = f"/{os.environ['ENVIRONMENT_NAME']}/config/"
              ssm_response = ssm.get_parameters_by_path(
                  Path=param_path,
                  Recursive=True
              )
              
              # Get Secret
              secret_response = secrets.get_secret_value(
                  SecretId=os.environ['SECRET_ARN']
              )
              
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'parameters': [p['Value'] for p in ssm_response['Parameters']],
                      'secret': secret_response['SecretString']
                  })
              }
      Runtime: python3.9
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT_NAME: !Ref EnvironmentName
          SECRET_ARN: !Ref ApplicationSecret

Outputs:
  ParameterA:
    Description: 'SSM Parameter A ARN'
    Value: !Ref ConfigParameterA
  
  ParameterB:
    Description: 'SSM Parameter B ARN'
    Value: !Ref ConfigParameterB
  
  SecretARN:
    Description: 'Secret ARN'
    Value: !Ref ApplicationSecret
  
  LambdaFunctionARN:
    Description: 'Lambda Function ARN'
    Value: !GetAtt ParameterReaderFunction.Arn