AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB Streams to EventBridge integration'

Parameters:
  DynamoDBTableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: EventDrivenTable
  
  DynamoDBPartitionKeyName:
    Type: String
    Description: Name of the partition key for the DynamoDB table
    Default: id
  
  DynamoDBPartitionKeyType:
    Type: String
    Description: Data type of the partition key
    Default: S
    AllowedValues:
      - S
      - N
      - B
  
  EventBridgeEventBusName:
    Type: String
    Description: Name of the EventBridge event bus
    Default: DynamoDBEventBus

Resources:
  # DynamoDB Table with Streams enabled
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: !Ref DynamoDBPartitionKeyName
          AttributeType: !Ref DynamoDBPartitionKeyType
      KeySchema:
        - AttributeName: !Ref DynamoDBPartitionKeyName
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # EventBridge Event Bus
  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBridgeEventBusName

  # Dead Letter Queues for EventBridge Pipes
  InsertEventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: InsertEventsPipeDLQ
      MessageRetentionPeriod: 1209600

  ModifyEventsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ModifyEventsPipeDLQ
      MessageRetentionPeriod: 1209600

  # IAM Role for EventBridge Pipes
  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt EventBridgeEventBus.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt InsertEventsDLQ.Arn
                  - !GetAtt ModifyEventsDLQ.Arn

  # EventBridge Pipe for INSERT events
  InsertEventsPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: 
      - DynamoDBTable
      - EventBridgeEventBus
      - EventBridgePipesRole
      - InsertEventsDLQ
    Properties:
      Name: DynamoDBInsertEventsPipe
      RoleArn: !GetAtt EventBridgePipesRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
          DeadLetterConfig:
            Arn: !GetAtt InsertEventsDLQ.Arn
          MaximumRecordAgeInSeconds: 604800
          MaximumRetryAttempts: 5
          OnPartialBatchItemFailure: AUTOMATIC_BISECT
          ParallelizationFactor: 1
      Enrichment: !GetAtt DynamoDBTable.Arn
      Target: !GetAtt EventBridgeEventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'DynamoDB Table Insert'
          Source: 'dynamodb.streams'

  # EventBridge Pipe for MODIFY events
  ModifyEventsPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: 
      - DynamoDBTable
      - EventBridgeEventBus
      - EventBridgePipesRole
      - ModifyEventsDLQ
    Properties:
      Name: DynamoDBModifyEventsPipe
      RoleArn: !GetAtt EventBridgePipesRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
          DeadLetterConfig:
            Arn: !GetAtt ModifyEventsDLQ.Arn
          MaximumRecordAgeInSeconds: 604800
          MaximumRetryAttempts: 5
          OnPartialBatchItemFailure: AUTOMATIC_BISECT
          ParallelizationFactor: 1
      Enrichment: !GetAtt DynamoDBTable.Arn
      Target: !GetAtt EventBridgeEventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'DynamoDB Table Modify'
          Source: 'dynamodb.streams'

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  
  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  
  DynamoDBStreamArn:
    Description: ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn
  
  EventBridgeEventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref EventBridgeEventBus
  
  EventBridgeEventBusArn:
    Description: ARN of the EventBridge event bus
    Value: !GetAtt EventBridgeEventBus.Arn
  
  InsertEventsPipeName:
    Description: Name of the EventBridge Pipe for INSERT events
    Value: !Ref InsertEventsPipe
  
  ModifyEventsPipeName:
    Description: Name of the EventBridge Pipe for MODIFY events
    Value: !Ref ModifyEventsPipe