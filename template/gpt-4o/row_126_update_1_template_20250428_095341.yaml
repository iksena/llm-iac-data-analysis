AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a REST API Gateway integrated with Amazon Kinesis Data Streams
  for HTTP-based interaction to ingest and retrieve streaming data.

Parameters:
  StreamName:
    Type: String
    Description: The name of the Kinesis Data Stream
    Default: MyKinesisStream
  ShardCount:
    Type: Number
    Description: The number of shards for the Kinesis Data Stream
    Default: 1
  ApiStageName:
    Type: String
    Description: The stage name for the API Gateway
    Default: prod

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisApi

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: kinesis
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayMethodPutRecord:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref ApiGatewayResource
      RestApiId: !Ref ApiGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS
        Uri: 
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${StreamName}",
              "Data": "$util.base64Encode($input.json('$.data'))",
              "PartitionKey": "$input.json('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiGatewayMethodGetRecords:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiGatewayResource
      RestApiId: !Ref ApiGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS
        Uri: 
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')"
            }
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: !Ref ApiStageName
    DependsOn: 
      - ApiGatewayMethodPutRecord
      - ApiGatewayMethodGetRecords

  ApiGatewayKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisApiPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                Resource: !GetAtt KinesisDataStream.Arn

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/kinesis"
  KinesisStreamName:
    Description: "Name of the Kinesis Data Stream"
    Value: !Ref KinesisDataStream