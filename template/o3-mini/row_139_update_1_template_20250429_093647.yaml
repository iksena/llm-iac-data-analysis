AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation Template to deploy a Lambda-backed custom resource that performs arithmetic operations.
Parameters:
  FirstNumber:
    Description: "The first number for the arithmetic operation."
    Type: Number
  SecondNumber:
    Description: "The second number for the arithmetic operation."
    Type: Number
  Operator:
    Description: "The arithmetic operator. Valid values: +, -, *, /."
    Type: String
    AllowedValues: ["+", "-", "*", "/"]
  FailTest:
    Description: "Set to 'true' to simulate a failure in the custom resource; 'false' otherwise."
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ArithmeticCustomResourceLambdaRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ArithmeticCustomResourceFunction
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.8
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib.request
          import cfnresponse

          def handler(event, context):
              try:
                  # Log the received event for debugging
                  print("Received event: " + json.dumps(event))
                  request_type = event.get('RequestType')
                  properties = event.get('ResourceProperties', {})
                  first = float(properties.get('FirstNumber', 0))
                  second = float(properties.get('SecondNumber', 0))
                  operator = properties.get('Operator')
                  fail_test = properties.get('FailTest', "false").lower() == "true"
                  
                  # Simulate failure if FailTest is set to true
                  if fail_test:
                      raise Exception("Simulated failure as requested by FailTest parameter.")

                  result = None
                  if operator == "+":
                      result = first + second
                  elif operator == "-":
                      result = first - second
                  elif operator == "*":
                      result = first * second
                  elif operator == "/":
                      if second == 0:
                          raise Exception("Division by zero error.")
                      result = first / second
                  else:
                      raise Exception("Unsupported operator: " + str(operator))

                  # Sending response back to CloudFormation
                  response_data = {'Result': result}
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  print("Error: " + str(e))
                  response_data = {'Error': str(e)}
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
          
          # Note: cfnresponse module is available in the Lambda runtime for custom resources.
  CustomResourceHelper:
    Type: Custom::helper
    DependsOn: ArithmeticLambdaFunction
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      FailTest: !Ref FailTest
Outputs:
  CalculationResult:
    Description: "Result of the arithmetic operation performed by the custom resource."
    Value: !GetAtt CustomResourceHelper.Result
  LambdaFunctionName:
    Description: "Name of the Lambda function deployed for the custom resource."
    Value: !Ref ArithmeticLambdaFunction