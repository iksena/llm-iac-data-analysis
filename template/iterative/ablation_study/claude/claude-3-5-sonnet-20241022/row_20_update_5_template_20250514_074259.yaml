AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Log Queries for AWS Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'ID of the Client VPN Endpoint to monitor'
  
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Log Group containing Client VPN logs'
    
  DashboardName:
    Type: String
    Default: 'ClientVPNMonitoring'
    Description: 'Name of the CloudWatch Dashboard'

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE ${LogGroupName} | filter endpoint_id = '${VPNEndpointId}' | stats count(*) as total_connections, count_distinct(connection_id) as unique_connections by authentication_type | sort by total_connections desc",
                "region": "${AWS::Region}",
                "title": "VPN Connections by Authentication Type",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE ${LogGroupName} | filter endpoint_id = '${VPNEndpointId}' | stats sum(bytes_in) as total_ingress_bytes, sum(bytes_out) as total_egress_bytes by bin(1h)",
                "region": "${AWS::Region}",
                "title": "VPN Data Transfer Volume",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE ${LogGroupName} | filter endpoint_id = '${VPNEndpointId}' | stats count(*) as connection_count by user, authentication_type | sort by connection_count desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top 10 Users by Connection Count",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: 'URL of the created CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'