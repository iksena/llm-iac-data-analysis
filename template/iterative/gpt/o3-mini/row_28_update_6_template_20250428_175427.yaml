AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an automated monitoring and notification system
  for AWS Secrets Manager secret lifecycle events. This template sets up an SNS topic with an email
  subscription, an SNS topic policy that allows EventBridge to publish messages, and an EventBridge rule
  that triggers on Secrets Manager events (creation, update, access).

Parameters:
  NotificationEmail:
    Description: "Email address to receive SNS notifications for AWS Secrets Manager events."
    Type: String

Resources:
  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "SecretsManagerLifecycleAlerts"
      TopicName: "SecretsManagerLifecycleAlertsTopic"

  SecretsManagerSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsManagerSNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowEventBridgePublish"
            Effect: "Allow"
            Principal:
              Service: "events.amazonaws.com"
            Action: "SNS:Publish"
            Resource: !Ref SecretsManagerSNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt SecretsManagerEventRule.Arn

  SecretsManagerSNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref NotificationEmail
      TopicArn: !Ref SecretsManagerSNSTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "EventBridge rule to capture AWS Secrets Manager lifecycle events and notify SNS."
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - "CreateSecret"
            - "UpdateSecret"
            - "GetSecretValue"
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SecretsManagerSNSTopic

Outputs:
  SNSTopicARN:
    Description: "ARN of the SNS Topic for Secrets Manager lifecycle alerts."
    Value: !Ref SecretsManagerSNSTopic
  EventRuleARN:
    Description: "ARN of the EventBridge rule that monitors Secrets Manager events."
    Value: !GetAtt SecretsManagerEventRule.Arn