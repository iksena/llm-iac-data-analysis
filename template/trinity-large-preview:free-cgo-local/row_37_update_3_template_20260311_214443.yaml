AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PrimaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'primary-bucket-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: primary-bucket-logs/
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrimaryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: RequireSecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'replica-bucket-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'access-log-bucket-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ReplicationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'S3ReplicationRole-${AWS::AccountId}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReplicationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObjectVersion
                  - s3:GetObjectVersionAcl
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucket}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetReplicationConfiguration
                Resource: !GetAtt PrimaryBucket.Arn
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${ReplicaBucket}/*'

  ReplicationConfiguration:
    Type: AWS::S3::BucketReplicationConfiguration
    Properties:
      Bucket: !Ref PrimaryBucket
      Role: !GetAtt ReplicationRole.Arn
      Rules:
        - Id: ReplicationRule
          Status: Enabled
          Destination:
            Bucket: !GetAtt ReplicaBucket.Arn
          DeleteMarkerReplication:
            Status: Disabled
          SourceSelectionCriteria:
            SseKmsEncryptedObjects:
              Status: Disabled

Outputs:
  PrimaryBucketArn:
    Description: ARN of the primary bucket
    Value: !GetAtt PrimaryBucket.Arn
  ReplicaBucketArn:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn
  AccessLogBucketArn:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn