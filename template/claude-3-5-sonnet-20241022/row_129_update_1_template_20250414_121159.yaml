AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Config setup with customizable retention and delivery configurations'

Parameters:
  RetentionPeriod:
    Type: Number
    Default: 2557
    Description: 'Number of days to retain configuration items'
    MinValue: 30
    MaxValue: 7300

  DeliveryFrequency:
    Type: String
    Default: 'Six_Hours'
    AllowedValues:
      - 'One_Hour'
      - 'Three_Hours'
      - 'Six_Hours'
      - 'Twelve_Hours'
      - 'TwentyFour_Hours'
    Description: 'The frequency with which AWS Config delivers configuration snapshots'

  ExistingS3BucketName:
    Type: String
    Description: 'Optional: Name of existing S3 bucket for AWS Config data'
    Default: ''

  EnablePermissionBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Enable IAM permission boundary for created roles'

  ConfigurationRecorderName:
    Type: String
    Default: 'config-recorder'
    Description: 'Name of the AWS Config configuration recorder'

  SNSTopicName:
    Type: String
    Default: 'config-notifications'
    Description: 'Name of the SNS topic for AWS Config notifications'

Conditions:
  CreateNewBucket: !Equals [!Ref ExistingS3BucketName, '']
  UsePermissionBoundary: !Equals [!Ref EnablePermissionBoundary, 'true']

Resources:
  ConfigRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole
      PermissionsBoundary: !If
        - UsePermissionBoundary
        - !Sub arn:aws:iam::${AWS::AccountId}:policy/ConfigPermissionBoundary
        - !Ref AWS::NoValue

  ConfigBucket:
    Type: 'AWS::S3::Bucket'
    Condition: CreateNewBucket
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ConfigBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Condition: CreateNewBucket
    Properties:
      Bucket: !Ref ConfigBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub arn:aws:s3:::${ConfigBucket}
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  ConfigTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref SNSTopicName
      KmsMasterKeyId: alias/aws/sns

  ConfigTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref ConfigTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSConfigSNSPolicy
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sns:Publish
            Resource: !Ref ConfigTopic

  ConfigurationRecorder:
    Type: 'AWS::Config::ConfigurationRecorder'
    Properties:
      Name: !Ref ConfigurationRecorderName
      RoleARN: !GetAtt ConfigRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResources: true

  ConfigDeliveryChannel:
    Type: 'AWS::Config::DeliveryChannel'
    Properties:
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency
      S3BucketName: !If [CreateNewBucket, !Ref ConfigBucket, !Ref ExistingS3BucketName]
      SnsTopicARN: !Ref ConfigTopic

  RetentionManagerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigRetentionManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:PutRetentionConfiguration
                Resource: '*'

  RetentionManagerFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      Handler: index.handler
      Role: !GetAtt RetentionManagerRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
            try:
              if event['RequestType'] in ['Create', 'Update']:
                config = boto3.client('config')
                config.put_retention_configuration(
                  RetentionPeriodInDays=int(event['ResourceProperties']['RetentionPeriod'])
                )
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
            except Exception as e:
              cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
      Runtime: python3.9
      Timeout: 30
      MemorySize: 128

  RetentionConfiguration:
    Type: 'Custom::RetentionManager'
    Properties:
      ServiceToken: !GetAtt RetentionManagerFunction.Arn
      RetentionPeriod: !Ref RetentionPeriod

Outputs:
  ConfigurationRecorderARN:
    Description: 'ARN of the AWS Config Configuration Recorder'
    Value: !Sub arn:aws:config:${AWS::Region}:${AWS::AccountId}:config-recorder/${ConfigurationRecorderName}

  SNSTopicARN:
    Description: 'ARN of the SNS Topic for AWS Config notifications'
    Value: !Ref ConfigTopic

  ConfigBucketName:
    Description: 'Name of the S3 bucket used for AWS Config data'
    Value: !If [CreateNewBucket, !Ref ConfigBucket, !Ref ExistingS3BucketName]

  RetentionManagerFunctionARN:
    Description: 'ARN of the Lambda function managing retention'
    Value: !GetAtt RetentionManagerFunction.Arn