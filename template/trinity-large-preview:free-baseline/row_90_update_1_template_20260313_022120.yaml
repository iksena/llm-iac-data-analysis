AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 Image Builder resources including IAM role, instance profile, S3 bucket for logs, and IAM policy.

Resources:
  ImageBuilderIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ImageBuilderRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AWSImageBuilderFullAccess

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: ImageBuilderInstanceProfile
      Roles:
        - !Ref ImageBuilderIAMRole

  ImageBuilderLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: image-builder-logs-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  ImageBuilderLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBuilderLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ImageBuilderIAMRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${ImageBuilderLogsBucket}'
              - !Sub 'arn:aws:s3:::${ImageBuilderLogsBucket}/*'