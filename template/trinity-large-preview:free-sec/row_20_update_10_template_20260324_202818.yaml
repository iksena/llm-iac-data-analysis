AWSTemplateFormatVersion: '2010-09-09'
Description: Secure CloudFormation template for CloudWatch Dashboard and Logs Insights queries to monitor AWS Client VPN usage patterns

Resources:
  ClientVPNAuthDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAuthUsageDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Dashboard"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Connection Duration" } ],
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Connection Duration" } ],
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "Mixed Auth", { "label": "Mixed Auth Connection Duration" } ]
                ],
                "region": "${AWS::Region}",
                "title": "Connection Durations by Authentication Method"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "DataTransferIn", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Data In" } ],
                  [ "AWS/ClientVPN", "DataTransferOut", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Data Out" } ],
                  [ "AWS/ClientVPN", "DataTransferIn", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Data In" } ],
                  [ "AWS/ClientVPN", "DataTransferOut", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Data Out" } ],
                  [ "AWS/ClientVPN", "DataTransferIn", "AuthenticationMethod", "Mixed Auth", { "label": "Mixed Auth Data In" } ],
                  [ "AWS/ClientVPN", "DataTransferOut", "AuthenticationMethod", "Mixed Auth", { "label": "Mixed Auth Data Out" } ]
                ],
                "region": "${AWS::Region}",
                "title": "Data Transfer Volumes by Authentication Method"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 7,
              "width": 24,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ActiveConnections", "EndpointId", "*", { "label": "Active Connections by Endpoint" } ]
                ],
                "region": "${AWS::Region}",
                "title": "Active Connections by Endpoint"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection duration/
        | stats avg(connectionDuration) as avgDuration, max(connectionDuration) as maxDuration, min(connectionDuration) as minDuration
        | sort by @timestamp desc

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: |
        fields @timestamp, @message
        | filter @message like /data transfer/
        | stats sum(dataTransferIn) as totalIn, sum(dataTransferOut) as totalOut
        | sort by @timestamp desc

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityAnalysis
      LogGroupNames:
        - /aws/client-vpn
      QueryString: |
        fields @timestamp, @message
        | filter @message like /user activity/
        | stats count(*) as userCount by userId
        | sort by userCount desc

  AuthenticationBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: AuthenticationBreakdown
      LogGroupNames:
        - /aws/client-vpn
      QueryString: |
        fields @timestamp, @message
        | filter @message like /authentication/
        | stats count(*) as authCount by authenticationMethod
        | sort by authCount desc

Outputs:
  DashboardName:
    Description: Name of the Client VPN Auth Dashboard
    Value: !Ref ClientVPNAuthDashboard
    Export:
      Name: ClientVPNAuthDashboardName

  ConnectionDurationQueryId:
    Description: ID of the Connection Duration Query
    Value: !Ref ConnectionDurationQuery
    Export:
      Name: ConnectionDurationQueryId

  DataTransferQueryId:
    Description: ID of the Data Transfer Query
    Value: !Ref DataTransferQuery
    Export:
      Name: DataTransferQueryId

  UserActivityQueryId:
    Description: ID of the User Activity Query
    Value: !Ref UserActivityQuery
    Export:
      Name: UserActivityQueryId

  AuthenticationBreakdownQueryId:
    Description: ID of the Authentication Breakdown Query
    Value: !Ref AuthenticationBreakdownQuery
    Export:
      Name: AuthenticationBreakdownQueryId