AWSTemplateFormatVersion: '2010-09-09'
Description: 'Private Route 53 Hosted Zone for internal DNS management within a VPC'

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  VPCName:
    Type: String
    Default: example-vpc
    Description: Name tag for the VPC
  HostedZoneComment:
    Type: String
    Default: Private hosted zone for internal DNS
    Description: Comment for the hosted zone

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref VPCName

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: !Ref HostedZoneComment

Outputs:
  HostedZoneID:
    Description: ID of the created hosted zone
    Value: !Ref PrivateHostedZone
  VPCID:
    Description: ID of the created VPC
    Value: !Ref VPC