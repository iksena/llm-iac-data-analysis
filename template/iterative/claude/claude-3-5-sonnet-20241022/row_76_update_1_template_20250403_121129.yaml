AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM roles template for tiered FIS access management'

Resources:
  SecurityAdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'SecurityAdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  SecurityAdminPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: 'SecurityAdminFISPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'fis:*'
            Resource: '*'
          - Effect: Allow
            Action: 'iam:CreateServiceLinkedRole'
            Resource: '*'
          - Effect: Allow
            Action: 'sts:AssumeRole'
            Resource: 'arn:aws:iam::*:role/aws-service-role/fis.amazonaws.com/*'
      Roles:
        - !Ref SecurityAdminRole

  AdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'AdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  AdminPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: 'AdminFISPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'fis:*'
            Resource: '*'
          - Effect: Deny
            Action: 'fis:*'
            Resource: '*'
            Condition:
              StringEquals:
                'aws:ResourceTag/Environment': 'prod'
          - Effect: Allow
            Action: 'sts:AssumeRole'
            Resource: 'arn:aws:iam::*:role/aws-service-role/fis.amazonaws.com/*'
      Roles:
        - !Ref AdminRole

  UserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'UserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  UserPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: 'UserFISPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'fis:StartExperiment'
              - 'fis:StopExperiment'
              - 'fis:GetExperiment'
              - 'fis:ListExperiments'
              - 'fis:TagResource'
              - 'fis:UntagResource'
            Resource: '*'
          - Effect: Deny
            Action: 'fis:*'
            Resource: '*'
            Condition:
              StringEquals:
                'aws:ResourceTag/Environment': 'prod'
      Roles:
        - !Ref UserRole

  NonUserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'NonUserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  NonUserPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: 'NonUserFISPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action: 'fis:*'
            Resource: '*'
      Roles:
        - !Ref NonUserRole

Outputs:
  SecurityAdminRoleARN:
    Description: 'ARN of Security Admin Role'
    Value: !GetAtt SecurityAdminRole.Arn

  AdminRoleARN:
    Description: 'ARN of Admin Role'
    Value: !GetAtt AdminRole.Arn

  UserRoleARN:
    Description: 'ARN of User Role'
    Value: !GetAtt UserRole.Arn

  NonUserRoleARN:
    Description: 'ARN of Non-User Role'
    Value: !GetAtt NonUserRole.Arn