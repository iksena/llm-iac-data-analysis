AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Web-Based VS Code Development Environment with CloudFront

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  CodeServerVersion:
    Type: String
    Default: 4.16.1
    Description: Version of code-server to install
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type
  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    Description: CloudFront price class
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RouteTable

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: code-server-sg
      GroupDescription: Security group for code-server allowing CloudFront access
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SecurityGroup

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: ami-0c55b159cbfafe1f0
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            # Update system
            apt-get update -y
            apt-get upgrade -y

            # Install dependencies
            apt-get install -y curl wget gnupg2

            # Install code-server
            wget -qO- https://github.com/coder/code-server/releases/download/v${CodeServerVersion}/code-server_${CodeServerVersion}_amd64.deb -O /tmp/code-server.deb
            dpkg -i /tmp/code-server.deb
            apt-get install -f -y

            # Create config directory
            mkdir -p /home/ubuntu/.config/code-server
            chown -R ubuntu:ubuntu /home/ubuntu/.config

            # Create systemd service
            cat << EOF > /etc/systemd/system/code-server.service
            [Unit]
            Description=code-server
            After=network.target

            [Service]
            User=ubuntu
            ExecStart=/usr/bin/code-server --bind-addr 0.0.0.0:8080 --disable-auth
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF

            # Enable and start service
            systemctl daemon-reload
            systemctl enable code-server
            systemctl start code-server

            # Install AWS CLI for SSM
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
            unzip -o /tmp/awscliv2.zip -d /tmp
            /tmp/aws/install

      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - EC2SSMRole

  CloudFrontFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-Function
      FunctionConfig:
        Comment: Redirect HTTP to HTTPS
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          return {
            statusCode: 301,
            headers: {
              location: { value: `https://${event.request.headers.host.value}${event.request.uri}` }
            }
          }
        }

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: CloudFront distribution for code-server
        Enabled: true
        PriceClass: !Ref CloudFrontPriceClass
        HttpVersion: http2
        IPV6Enabled: true
        Aliases: []
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Origins:
          - Id: code-server-origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 8080
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: code-server-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - POST
            - OPTIONS
            - PUT
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
            Headers:
              - Origin
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CloudFrontFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: "/"
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: "/"

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub ${AWS::StackName}-OAI

Outputs:
  CloudFrontURL:
    Description: CloudFront URL for code-server access
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontURL

  InstanceID:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
    Export:
      Name: !Sub ${AWS::StackName}-InstanceID

  PublicIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub ${AWS::StackName}-PublicIP

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region
    Export:
      Name: !Sub ${AWS::StackName}-Region

  AZ:
    Description: Availability Zone
    Value: !GetAtt EC2Instance.AvailabilityZone
    Export:
      Name: !Sub ${AWS::StackName}-AZ