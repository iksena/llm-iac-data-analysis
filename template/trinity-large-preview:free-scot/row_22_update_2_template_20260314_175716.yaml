AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PrimaryKey
          AttributeType: S
        - AttributeName: LSIKey
          AttributeType: S
        - AttributeName: GSIKey
          AttributeType: S
      KeySchema:
        - AttributeName: PrimaryKey
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TableName: MyTable
      LocalSecondaryIndexes:
        - IndexName: LSIndex1
          KeySchema:
            - AttributeName: PrimaryKey
              KeyType: HASH
            - AttributeName: LSIKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSIndex1
          KeySchema:
            - AttributeName: GSIKey
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5