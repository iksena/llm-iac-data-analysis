AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Security Group (Syntax Corrected)
Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
  KeyName:
    Description: REQUIRED - Existing EC2 Key Pair name (Must be pre-created in target region)
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must specify valid existing key pair
  SSHLocation:
    Description: Allowed SSH source IP range (CIDR format)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d+\.\d+\.\d+\.\d+/\d+$
  VpcId:
    Description: REQUIRED - VPC ID for security group creation (Find in VPC dashboard)
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: REQUIRED - Public subnet ID for EC2 instance (Find in VPC dashboard)
    Type: AWS::EC2::Subnet::Id

Mappings:
  AWSRegionAMI:
    us-east-1:
      AMIID: ami-0aa7d40eeae50c9b9  # Amazon Linux 2023
    us-west-2:
      AMIID: ami-0d70546e43a941d70
    eu-west-1:
      AMIID: ami-0d75513e7706cf2d9

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access via port 22
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-SSH-SecurityGroup

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSRegionAMI, !Ref "AWS::Region", AMIID]
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet:
            - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: CFN-EC2-Instance

Outputs:
  InstancePublicIP:
    Description: Public IP address of deployed instance
    Value: !GetAtt EC2Instance.PublicIp
  ConnectionCommand:
    Description: SSH connection command
    Value: !Sub 'ssh -i ${KeyName}.pem ec2-user@${EC2Instance.PublicIp}'
  SecurityGroupId:
    Description: Created security group ID
    Value: !Ref SecurityGroup