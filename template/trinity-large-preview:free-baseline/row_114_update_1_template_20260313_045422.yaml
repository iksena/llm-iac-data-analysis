AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Business Contact"
    Description: Name of the business contact person
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: Email address of the business contact person
  BusinessContactPhone:
    Type: String
    Default: "+1-555-123-4567"
    Description: Phone number of the business contact person

Resources:
  B2BIDataInterchangeProfile:
    Type: AWS::B2B::Profile
    Properties:
      ProfileName: !Sub "${AWS::StackName}-Profile"
      BusinessContact:
        Name: !Ref BusinessContactName
        Email: !Ref BusinessContactEmail
        Phone: !Ref BusinessContactPhone
      Description: Profile for B2B EDI processing

  B2BIDataInterchangeTransformer:
    Type: AWS::B2B::Transformer
    Properties:
      TransformerName: !Sub "${AWS::StackName}-Transformer"
      ProfileArn: !GetAtt B2BIDataInterchangeProfile.Arn
      InputFormat: EDI_X12
      OutputFormat: JSON
      DocumentType: X12_214
      MappingLogic: |
        {
          "transformations": [
            {
              "type": "EDI_TO_JSON",
              "source": "X12_214",
              "target": "JSON"
            }
          ]
        }
      Description: Transformer for converting EDI X12_214 to JSON

  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  B2BIDataInterchangeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BI-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2b.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: B2BIDataInterchangePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt InputS3Bucket.Arn
                  - !GetAtt InputS3Bucket.Arn/*
                  - !GetAtt OutputS3Bucket.Arn
                  - !GetAtt OutputS3Bucket.Arn/*

  B2BIDataInterchangePipeline:
    Type: AWS::B2B::Pipeline
    Properties:
      PipelineName: !Sub "${AWS::StackName}-Pipeline"
      ProfileArn: !GetAtt B2BIDataInterchangeProfile.Arn
      TransformerArn: !GetAtt B2BIDataInterchangeTransformer.Arn
      InputS3Bucket: !Ref InputS3Bucket
      OutputS3Bucket: !Ref OutputS3Bucket
      Description: B2B EDI pipeline for X12_214 to JSON transformation

Outputs:
  InputS3BucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputS3Bucket
  OutputS3BucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputS3Bucket
  B2BIDataInterchangeProfileArn:
    Description: ARN of the B2B Data Interchange Profile
    Value: !GetAtt B2BIDataInterchangeProfile.Arn
  B2BIDataInterchangeTransformerArn:
    Description: ARN of the B2B Data Interchange Transformer
    Value: !GetAtt B2BIDataInterchangeTransformer.Arn