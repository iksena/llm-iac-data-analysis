AWSTemplateFormatVersion: "2010-09-09"
Resources:
  FirehoseS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FirehoseCloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "${AWS::StackName}-FirehoseErrorLogs"
      RetentionInDays: 30

  FirehoseIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseS3AndCloudWatchPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt FirehoseS3Bucket.Arn
                  - Fn::Sub: "${FirehoseS3Bucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: 
                  Fn::Sub: "${FirehoseCloudWatchLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: 
                  Fn::Sub: "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/firehose"

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt FirehoseS3Bucket.Arn
        RoleARN: !GetAtt FirehoseIAMRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        Prefix: firehose/
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseCloudWatchLogGroup
          LogStreamName: DeliveryStreamErrorStream
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/firehose"

Outputs:
  DeliveryStreamName:
    Description: Name of the Kinesis Data Firehose delivery stream
    Value: !Ref FirehoseDeliveryStream
  DeliveryStreamARN:
    Description: ARN of the Kinesis Data Firehose delivery stream
    Value: !GetAtt FirehoseDeliveryStream.Arn
  ErrorLogGroupName:
    Description: Name of the CloudWatch Logs group for error logging
    Value: !Ref FirehoseCloudWatchLogGroup
  S3BucketName:
    Description: Name of the S3 bucket used as Firehose destination
    Value: !Ref FirehoseS3Bucket