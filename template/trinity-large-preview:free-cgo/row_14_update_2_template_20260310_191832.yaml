AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref PrimaryPrivateIpAddress
          Primary: true
        - PrivateIpAddress: !Ref SecondaryPrivateIpAddress1
          Primary: false
        - PrivateIpAddress: !Ref SecondaryPrivateIpAddress2
          Primary: false
      GroupSet:
        - !Ref SecurityGroupId
      Description: Network Interface with multiple IPs and EIPs
  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyNetworkInterface
  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyNetworkInterface
Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  PrimaryPrivateIpAddress:
    Type: String
    Default: 10.0.0.10
  SecondaryPrivateIpAddress1:
    Type: String
    Default: 10.0.0.11
  SecondaryPrivateIpAddress2:
    Type: String
    Default: 10.0.0.12
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-12345678
Outputs:
  NetworkInterfaceId:
    Value: !Ref MyNetworkInterface
  EIP1PublicIp:
    Value: !GetAtt EIP1.PublicIp
  EIP2PublicIp:
    Value: !GetAtt EIP2.PublicIp
  SecondaryPrivateIpAddress1:
    Value: !Ref SecondaryPrivateIpAddress1
  SecondaryPrivateIpAddress2:
    Value: !Ref SecondaryPrivateIpAddress2