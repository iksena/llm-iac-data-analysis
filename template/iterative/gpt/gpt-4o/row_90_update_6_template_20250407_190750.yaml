AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create resources for EC2 Image Builder to automate AMI creation and management.

Resources:
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ImageBuilderSSMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:DescribeInstanceInformation
                  - ssm:GetCommandInvocation
                  - ssm:ListCommands
                  - ssm:SendCommand
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ImageBuilderRole

  ImageBuilderLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  ImageBuilderLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBuilderLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ImageBuilderRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub '${ImageBuilderLogsBucket.Arn}/*'
              - !Sub '${ImageBuilderLogsBucket.Arn}'

Outputs:
  ImageBuilderRoleArn:
    Description: ARN of the IAM Role for Image Builder
    Value: !GetAtt ImageBuilderRole.Arn

  ImageBuilderInstanceProfileArn:
    Description: ARN of the Instance Profile for Image Builder
    Value: !Ref ImageBuilderInstanceProfile

  ImageBuilderLogsBucketName:
    Description: Name of the S3 bucket for Image Builder logs
    Value: !Ref ImageBuilderLogsBucket