AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Account-Wide IAM Password Policy Management with Lambda

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum password length (6-128 characters)
  RequireUppercaseCharacters:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase character
  RequireLowercaseCharacters:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase character
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one number
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one non-alphanumeric character
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Maximum password age in days (1-1095)
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to prevent reuse (1-24)
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow users to change their own passwords
  PermissionBoundary:
    Type: String
    Default: ''
    Description: Optional IAM permission boundary ARN

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IAMPasswordPolicyLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundary, !Ref AWS::NoValue]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPasswordPolicyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: '*'

  IAMPasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: IAMPasswordPolicyManager
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          iam_client = boto3.client('iam')

          def lambda_handler(event, context):
              try:
                  action = event.get('action')
                  if action == 'apply':
                      return apply_password_policy(event.get('policy'))
                  elif action == 'remove':
                      return remove_password_policy()
                  else:
                      return {
                          'statusCode': 400,
                          'body': json.dumps('Invalid action. Use "apply" or "remove".')
                      }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error: {str(e)}')
                  }

          def apply_password_policy(policy):
              try:
                  iam_client.update_account_password_policy(
                      MinimumPasswordLength=policy.get('MinimumPasswordLength', 14),
                      RequireUppercaseCharacters=policy.get('RequireUppercaseCharacters', True),
                      RequireLowercaseCharacters=policy.get('RequireLowercaseCharacters', True),
                      RequireNumbers=policy.get('RequireNumbers', True),
                      RequireSymbols=policy.get('RequireSymbols', True),
                      MaxPasswordAge=policy.get('MaxPasswordAge', 90),
                      PasswordReusePrevention=policy.get('PasswordReusePrevention', 24),
                      AllowUsersToChangePassword=policy.get('AllowUsersToChangePassword', True)
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Password policy applied successfully.')
                  }
              except iam_client.exceptions.NoSuchEntityException:
                  # If no policy exists, create it
                  iam_client.update_account_password_policy(
                      MinimumPasswordLength=policy.get('MinimumPasswordLength', 14),
                      RequireUppercaseCharacters=policy.get('RequireUppercaseCharacters', True),
                      RequireLowercaseCharacters=policy.get('RequireLowercaseCharacters', True),
                      RequireNumbers=policy.get('RequireNumbers', True),
                      RequireSymbols=policy.get('RequireSymbols', True),
                      MaxPasswordAge=policy.get('MaxPasswordAge', 90),
                      PasswordReusePrevention=policy.get('PasswordReusePrevention', 24),
                      AllowUsersToChangePassword=policy.get('AllowUsersToChangePassword', True)
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Password policy created successfully.')
                  }

          def remove_password_policy():
              try:
                  iam_client.delete_account_password_policy()
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Password policy removed successfully.')
                  }
              except iam_client.exceptions.NoSuchEntityException:
                  return {
                      'statusCode': 200,
                      'body': json.dumps('No password policy to remove.')
                  }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt IAMPasswordPolicyLambda.Arn
      Principal: sns.amazonaws.com

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundary, '']]

Outputs:
  LambdaFunctionName:
    Description: Lambda function name for IAM password policy management
    Value: !Ref IAMPasswordPolicyLambda
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt IAMPasswordPolicyLambda.Arn
  ExecutionRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn