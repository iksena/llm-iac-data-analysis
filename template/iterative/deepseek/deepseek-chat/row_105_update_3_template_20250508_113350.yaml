AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM role for cross-service automation with SSM, EC2, and monitoring permissions'

Parameters:
  RoleName:
    Type: String
    Default: CrossServiceAutomationRole
    Description: 'Name for the IAM role (max 64 chars)'
    AllowedPattern: '^[a-zA-Z0-9+=,.@_-]+$'
    MaxLength: 64
    ConstraintDescription: 'Must be valid IAM role name (a-z,A-Z,0-9,+=,.@_-)'

Resources:
  AutomationRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
                - monitoring.amazonaws.com
            Action: 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  EC2AutomationPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${RoleName}-EC2Automation'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
              - 'ec2:CreateTags'
            Resource: '*'
      Roles:
        - !Ref AutomationRole

  SSMAutomationPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${RoleName}-SSMAutomation'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ssm:SendCommand'
              - 'ssm:ListCommands'
              - 'ssm:ListCommandInvocations'
              - 'ssm:GetCommandInvocation'
              - 'ssm:DescribeInstanceInformation'
              - 'ssm:DescribeInstanceProperties'
              - 'ssm:CreateAssociation'
              - 'ssm:ListAssociations'
            Resource: '*'
      Roles:
        - !Ref AutomationRole

  MonitoringPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${RoleName}-Monitoring'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudwatch:PutMetricData'
              - 'cloudwatch:GetMetricStatistics'
              - 'cloudwatch:ListMetrics'
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogStreams'
            Resource: '*'
      Roles:
        - !Ref AutomationRole

Outputs:
  RoleARN:
    Description: 'ARN of the created IAM role'
    Value: !GetAtt AutomationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'