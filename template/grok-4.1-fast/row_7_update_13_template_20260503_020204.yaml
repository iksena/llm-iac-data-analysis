AWSTemplateFormatVersion: '2010-09-09'
Description: 'Basic EC2 t3.micro instance with SSM for secure remote management - fully standalone with optional SSH'

Parameters:
  KeyName:
    Type: String
    Default: ''
    Description: 'Name of an existing EC2 KeyPair for SSH access (leave empty to skip)'
    AllowedPattern: '^[a-zA-Z0-9-]*$|^$'
    ConstraintDescription: 'Must be empty or a valid EC2 KeyPair name.'

Conditions:
  UseKeyPair: !Not
    - !Equals
      - !Ref KeyName
      - ''

Resources:
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: SSMRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  LatestAMI:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Properties:
      ParameterName: "/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2"

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SSMVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SSMInternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: SSMPublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: SSMPublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
    DependsOn: VPCGatewayAttachment

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for SSM EC2 with SSH access'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSMInstanceSG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAMI
      InstanceType: t3.micro
      IamInstanceProfile: !Ref SSMInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !If [UseKeyPair, !Ref KeyName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: SSMEC2Instance
    DependsOn:
      - SSMInstanceProfile
      - SubnetRouteTableAssociation

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIpAddress:
    Description: Public IP of the instance
    Value: !GetAtt EC2Instance.PublicIp
  PrivateIpAddress:
    Description: Private IP of the instance
    Value: !GetAtt EC2Instance.PrivateIp
  PublicDnsName:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
  SubnetId:
    Description: Subnet ID
    Value: !Ref PublicSubnet