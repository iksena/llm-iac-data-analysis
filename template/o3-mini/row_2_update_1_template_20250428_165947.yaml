AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon S3 bucket with default settings.

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties: {}

Outputs:
  BucketName:
    Description: "Name of the created S3 bucket"
    Value: !Ref S3Bucket