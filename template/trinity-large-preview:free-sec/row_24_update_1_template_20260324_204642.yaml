AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with two subnets, Auto Scaling Group, and ElastiCache with Lambda snapshot control

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  Subnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for subnet 1
  Subnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for subnet 2
  ElastiCacheInstanceType:
    Type: String
    Default: cache.m3.medium
    AllowedValues:
      - cache.m3.medium
      - cache.m4.large
      - cache.r4.large
    Description: ElastiCache instance type
  SnapshotRetentionDays:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 35
    Description: Number of days to retain snapshots (0 = disable)
  MultiAZ:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Enable Multi-AZ deployment

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-RT

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet2

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for ElastiCache
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  ElastiCacheCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      CacheNodeType: !Ref ElastiCacheInstanceType
      Engine: redis
      NumCacheNodes: !If [MultiAZCondition, 2, 1]
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      SnapshotRetentionLimit: !Ref SnapshotRetentionDays
      MultiAZEnabled: !Ref MultiAZ
      Port: 6379
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ElastiCache

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  LaunchConfiguration:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.micro
      AssociatePublicIpAddress: true
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-linux-extras
          amazon-linux-extras install -y redis6

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref Subnet1
        - !Ref Subnet2
      LaunchConfigurationName: !Ref LaunchConfiguration
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 1
      TargetGroupARNs: []
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ASG
          PropagateAtLaunch: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ElastiCacheSnapshotControl
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:ModifyCacheCluster
                  - elasticache:DescribeCacheClusters
                Resource: !GetAtt ElastiCacheCluster.Arn

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3

          def lambda_handler(event, context):
              client = boto3.client('elasticache')
              cluster_id = event.get('cluster_id')
              retention_days = event.get('retention_days', 0)

              try:
                  response = client.modify_cache_cluster(
                      CacheClusterId=cluster_id,
                      SnapshotRetentionLimit=retention_days
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Snapshot retention updated successfully')
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }

  MultiAZCondition:
    Fn::Equals:
      - !Ref MultiAZ
      - true

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  ElastiCacheEndpoint:
    Description: ElastiCache primary endpoint
    Value: !GetAtt ElastiCacheCluster.PrimaryEndPoint.Address
  AutoScalingGroupName:
    Description: Auto Scaling Group name
    Value: !Ref AutoScalingGroup