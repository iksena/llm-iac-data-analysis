AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogApp

  DataDogConnection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: DataDogApiKey
      SecretString: testanu

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogDestination
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      DeadLetterConfig:
        Arn: !GetAtt DeadLetterQueue.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationAccess
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogApiDestination.Arn

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref MyEventBus
  ApiDestinationName:
    Description: Name of the DataDog API destination
    Value: !Ref DataDogApiDestination
  DeadLetterQueueUrl:
    Description: URL of the dead-letter SQS queue
    Value: !Ref DeadLetterQueue