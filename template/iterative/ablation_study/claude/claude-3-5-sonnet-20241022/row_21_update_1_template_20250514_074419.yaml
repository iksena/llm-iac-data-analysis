AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Timestream Database and Tables'

Parameters:
  DatabaseName:
    Type: String
    Description: Name of the Timestream database
    MinLength: 3
    MaxLength: 64
    Pattern: ^[a-zA-Z0-9_.-]+$
    Default: 'timestream-poc-database'

  MemoryRetentionHours:
    Type: Number
    Description: Memory store retention period in hours
    MinValue: 1
    MaxValue: 8766
    Default: 24

  MagneticRetentionDays:
    Type: Number
    Description: Magnetic store retention period in days
    MinValue: 1
    MaxValue: 73000
    Default: 7

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      Tags:
        - Key: Environment
          Value: Production

  TableBatchWrite:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: 'poc-table-01-batch-write'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: Purpose
          Value: BatchWrite

  TableOlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: 'poc-table-02-older-records-memonly'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: 0
      Tags:
        - Key: Purpose
          Value: MemoryOnly

  TableOlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: 'poc-table-03-older-records-magnetic'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: Purpose
          Value: MagneticStorage

  TableCommonAttributes:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: 'poc-table-04-common-attributes'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: Purpose
          Value: CommonAttributes

Outputs:
  DatabaseArn:
    Description: ARN of the created Timestream database
    Value: !GetAtt TimestreamDatabase.Arn

  TableBatchWriteArn:
    Description: ARN of the batch write table
    Value: !GetAtt TableBatchWrite.Arn

  TableOlderRecordsMemOnlyArn:
    Description: ARN of the memory-only table
    Value: !GetAtt TableOlderRecordsMemOnly.Arn

  TableOlderRecordsMagneticArn:
    Description: ARN of the magnetic storage table
    Value: !GetAtt TableOlderRecordsMagnetic.Arn

  TableCommonAttributesArn:
    Description: ARN of the common attributes table
    Value: !GetAtt TableCommonAttributes.Arn