AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BillingAlarmSNS:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alarm Notifications
      Subscription:
        - Endpoint: xxxxx@gmail.com
          Protocol: email

  MonthlyCostAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: MonthlyCostAlarm-5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingAlarmSNS

  MonthlyCostAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: MonthlyCostAlarm-10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingAlarmSNS

  MonthlyCostAlarm20:
