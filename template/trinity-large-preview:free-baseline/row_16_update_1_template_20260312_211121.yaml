AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create AWS Glue resources for crawling CloudTrail logs in S3

Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: cloudtrail_logs_db

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail_crawler
      Role: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/AWSGlueServiceRole'
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      Configuration: >
        {
          "Version":1.0,
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          }
        }