AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Governance Control Framework with Configurable Permission Boundaries

Parameters:
  PermissionBoundaryEnforcement:
    Type: String
    Default: enabled
    AllowedValues:
      - enabled
      - disabled
    Description: Toggle permission boundary enforcement (enabled/disabled)

  TeamOwnerTag:
    Type: String
    Default: MyTeam
    AllowedPattern: ^[a-zA-Z0-9-_]+$
    Description: Team identifier for Owner tag

  ResourcePrefix:
    Type: String
    Default: MyTeam
    AllowedPattern: ^[a-zA-Z0-9-_]+$
    Description: Required prefix for IAM resource names

Conditions:
  IsStrictMode:
    !Equals [!Ref PermissionBoundaryEnforcement, 'enabled']

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ResourcePrefix}-PermissionBoundary
      Description: Default permission boundary restricting to S3 and read-only IAM
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
              - iam:Generate*
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:CreatePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicy
              - iam:DeletePolicyVersion
              - iam:CreateRole
              - iam:DeleteRole
            Resource: '*'
            Condition:
              StringNotEquals:
                iam:PermissionBoundary: !If [IsStrictMode, !Ref PermissionBoundaryPolicyArn, !Ref "AWS::NoValue"]

  PermissionBoundaryPolicyArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ResourcePrefix}/PermissionBoundaryArn
      Type: String
      Value: !GetAtt PermissionBoundaryPolicy.Arn
      Description: SSM Parameter for Permission Boundary ARN

  NamingGovernancePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ResourcePrefix}-NamingGovernance
      Description: Enforces naming prefix for IAM resources
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
            Resource: '*'
            Condition:
              StringLike:
                iam:RoleTag/Name: !Sub ${ResourcePrefix}*

  TaggingGovernancePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${ResourcePrefix}-TaggingGovernance
      Description: Enforces Owner tag on IAM resources
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:TagRole
              - iam:UntagRole
            Resource: '*'
            Condition:
              StringEquals:
                iam:ResourceTag/Owner: !Ref TeamOwnerTag

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ResourcePrefix}-Developer
      Description: Developer role with conditional permission boundaries
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:root:${AWS::AccountId}
            Action: sts:AssumeRole
      PermissionsBoundary: !If [IsStrictMode, !Ref PermissionBoundaryPolicyArn, !Ref "AWS::NoValue"]
      ManagedPolicyArns:
        - !Ref NamingGovernancePolicy
        - !Ref TaggingGovernancePolicy
      Tags:
        - Key: Owner
          Value: !Ref TeamOwnerTag

Outputs:
  DeveloperRoleArn:
    Description: ARN of the developer role
    Value: !GetAtt DeveloperRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-DeveloperRoleArn

  PermissionBoundaryArn:
    Description: ARN of the permission boundary policy
    Value: !GetAtt PermissionBoundaryPolicy.Arn
    Export:
      Name: !Sub ${AWS::StackName}-PermissionBoundaryArn