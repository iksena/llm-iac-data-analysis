AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for Lambda Artifacts Encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: lambda-artifacts-key-policy
        Statement:
          - Sid: AllowRootAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Create*
              - kms:Delete*
              - kms:Describe*
              - kms:Disable*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
            Resource: '*'
          - Sid: AllowServiceRoleUsage
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleARN
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey
            Resource: '*'
      PendingWindowInDays: 30

  LambdaArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKMSKey

Parameters:
  ServiceRoleARN:
    Type: String
    Description: ARN of the service role that needs KMS key usage permissions

Outputs:
  LambdaArtifactsBucketURL:
    Description: URL of the Lambda Artifacts S3 Bucket
    Value: !GetAtt LambdaArtifactsBucket.WebsiteURL
  LambdaArtifactsKMSKeyId:
    Description: KMS Key ID for Lambda Artifacts Encryption
    Value: !Ref LambdaArtifactsKMSKey