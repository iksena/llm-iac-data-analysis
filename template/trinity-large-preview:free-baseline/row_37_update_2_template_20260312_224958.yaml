AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 bucket configuration with replica and access log buckets

Parameters:
  MainBucketName:
    Type: String
    Default: secure-bucket-production
    Description: Name of the main secure bucket
  ReplicaBucketName:
    Type: String
    Default: replica-bucket-production
    Description: Name of the replica bucket
  AccessLogBucketName:
    Type: String
    Default: access-logs-production
    Description: Name of the access log bucket

Resources:
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref AccessLogBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  MainBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref MainBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucketName
        LogFilePrefix: main-bucket-logs/

  MainBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${MainBucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${MainBucketName}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ReplicaBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

Outputs:
  MainBucketName:
    Description: Name of the main secure bucket
    Value: !Ref MainBucket
  ReplicaBucketName:
    Description: Name of the replica bucket
    Value: !Ref ReplicaBucket
  AccessLogBucketName:
    Description: Name of the access log bucket
    Value: !Ref AccessLogBucket