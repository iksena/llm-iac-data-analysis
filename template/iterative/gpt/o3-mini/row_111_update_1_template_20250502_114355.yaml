AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for EventBridge integration with DataDog for centralized log forwarding.
  It provisions an EventBridge event bus, connection, API destination targeting DataDog's log ingestion endpoint,
  an IAM role to allow EventBridge to invoke the API destination, a dead-letter SQS queue, and an EventBridge rule
  that routes events from the source "MyDataDogApp" to DataDog.

Resources:
  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: DataDogEventBus

  DataDogApiConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: DataDogConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "DD-API-KEY"
          ApiKeyValue: "testanu"
      Description: "Connection to DataDog API using API key for authentication."

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogApiDestination
      Description: "API destination targeting DataDog log ingestion endpoint."
      ConnectionArn: !Ref DataDogApiConnection
      InvocationEndpoint: "https://http-intake.logs.datadoghq.com"
      HttpMethod: POST

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeInvokeRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDataDogApiDestinationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt DataDogApiDestination.Arn

  DataDogDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue

  DataDogEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: SendLogsToDataDog
      Description: "Route events from source MyDataDogApp to DataDog API Destination."
      EventBusName: !Ref DataDogEventBus
      EventPattern:
        source:
          - "MyDataDogApp"
      State: ENABLED
      Targets:
        - Id: DataDogApiDestinationTarget
          Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DataDogDeadLetterQueue.Arn
          InputPath: "$"

Outputs:
  EventBusName:
    Description: "Name of the EventBridge event bus"
    Value: !Ref DataDogEventBus
  ApiDestinationArn:
    Description: "ARN of the DataDog API Destination"
    Value: !GetAtt DataDogApiDestination.Arn
  DeadLetterQueueUrl:
    Description: "URL of the dead-letter SQS queue"
    Value: !Ref DataDogDeadLetterQueue