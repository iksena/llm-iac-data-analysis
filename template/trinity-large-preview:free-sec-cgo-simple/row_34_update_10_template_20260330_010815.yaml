AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for MySQL RDS instance with Provisioned IOPS in a VPC

Parameters:
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCIDR1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the first private subnet
  SubnetCIDR2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the second private subnet
  DBName:
    Type: String
    Default: MyDatabase
    Description: The name of the database
  DBUsername:
    Type: String
    Default: admin
    Description: The database admin username
  AllocatedStorage:
    Type: Number
    Default: 100
    Description: The size of the database (in GB)
  Iops:
    Type: Number
    Default: 1000
    Description: The amount of provisioned IOPS
  DBPasswordSecret:
    Type: String
    Description: ARN of the secret containing the database admin password

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: RDS-VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref SubnetCIDR1
      Tags:
        - Key: Name
          Value: Private-Subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref SubnetCIDR2
      Tags:
        - Key: Name
          Value: Private-Subnet-2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCIDR
      Tags:
        - Key: Name
          Value: RDS-SecurityGroup

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: RDS-SubnetGroup

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      AllocatedStorage: !Ref AllocatedStorage
      DBInstanceClass: db.r5.large
      Engine: MySQL
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBPasswordSecret}:SecretString:password}}'
      StorageType: io1
      Iops: !Ref Iops
      MultiAZ: true
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableIAMDatabaseAuthentication: true
      StorageEncrypted: true
      DeletionProtection: true
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true

Outputs:
  DBEndpoint:
    Description: Endpoint of the RDS instance
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  DBPort:
    Description: Port of the RDS instance
    Value: !GetAtt MySQLRDSInstance.Endpoint.Port