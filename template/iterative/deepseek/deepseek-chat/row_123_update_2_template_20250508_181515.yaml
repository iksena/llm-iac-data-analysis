AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe API for product creation automation'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: 'API key for Stripe authentication'
  EventSource:
    Type: String
    Default: 'PartnerApp'
    Description: 'Source identifier for the events'
  EventDetailType:
    Type: String
    Default: 'PartnerAppDetailType'
    Description: 'Detail type for the events'

Resources:
  ProductEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: 'StripeProductEventBus'

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: 'StripeAPIConnection'
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'Authorization'
          ApiKeyValue: !Ref StripeApiKey

  StripeAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: 'StripeProductAPIDestination'
      ConnectionArn: !GetAtt StripeConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: 'https://api.stripe.com/v1/products'
      InvocationRateLimitPerSecond: 10

  EventBridgeInvokeAPIRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEventBridgeFullAccess

  ProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: 'StripeProductCreationRule'
      EventBusName: !Ref ProductEventBus
      EventPattern:
        source:
          - !Ref EventSource
        detail-type:
          - !Ref EventDetailType
      State: ENABLED
      Targets:
        - Arn: !GetAtt StripeAPIDestination.Arn
          Id: 'StripeProductAPIDestinationTarget'
          RoleArn: !GetAtt EventBridgeInvokeAPIRole.Arn

Outputs:
  EventBusName:
    Description: 'Name of the EventBridge bus'
    Value: !Ref ProductEventBus
  RuleName:
    Description: 'Name of the EventBridge rule'
    Value: !Ref ProductCreationRule
  APIDestinationName:
    Description: 'Name of the API Destination'
    Value: !Ref StripeAPIDestination
  ConnectionName:
    Description: 'Name of the Connection resource'
    Value: !Ref StripeConnection