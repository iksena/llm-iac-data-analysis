AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted EFS file system with cross-AZ EC2 instances and monitoring.

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed
    Default: vpc-12345678
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of two public subnet IDs for EFS mount targets
    Default: subnet-12345678,subnet-87654321
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  FileSystemPerformanceMode:
    Type: String
    Description: Performance mode for the EFS file system
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO

Resources:
  # IAM Role for EC2 instances with EFS and SSM permissions
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2IAMRole

  # Encrypted EFS File System
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref FileSystemPerformanceMode
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  # EFS Mount Targets in two public subnets
  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSecurityGroup

  # Security Group for EFS mount targets
  EFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  # EC2 Instances in separate AZs with EFS mounting
  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          mount -t efs ${EFSFileSystem}:/ /home/efs
          echo "${EFSFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          mount -t efs ${EFSFileSystem}:/ /home/efs
          echo "${EFSFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab

  # Security Group for EC2 instances
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # CloudWatch Alarms for EFS monitoring
  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when burst credit balance falls below 100
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when percent I/O limit exceeds 90%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  TotalSizeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when total size exceeds 80% of provisioned capacity
      Namespace: AWS/EFS
      MetricName: TotalSize
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  # SNS Topic for alarms
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Outputs:
  EFSFileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EFSFileSystem
  EC2InstanceIds:
    Description: The IDs of the created EC2 instances
    Value: !Join [",", [!Ref EC2Instance1, !Ref EC2Instance2]]