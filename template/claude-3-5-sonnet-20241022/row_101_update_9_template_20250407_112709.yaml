AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Flow Logs Configuration and S3 Bucket for Log Storage'

Parameters:
  VpcCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'

  LogFilePrefix:
    Type: String
    Default: 'flow-logs/'
    Description: S3 prefix for flow logs storage

  TrafficType:
    Type: String
    Default: 'ALL'
    AllowedValues:
      - 'ACCEPT'
      - 'REJECT'
      - 'ALL'
    Description: Type of traffic to log

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: 
              - s3:PutObject
            Resource: !Sub '${FlowLogsBucket.Arn}/${LogFilePrefix}*'
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt FlowLogsBucket.Arn
              - !Sub '${FlowLogsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    DependsOn: FlowLogsBucketPolicy
    Properties:
      LogDestination: !Sub '${FlowLogsBucket.Arn}/${LogFilePrefix}'
      LogDestinationType: s3
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: !Ref TrafficType
      MaxAggregationInterval: 600
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-flow-log'

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  FlowLogsBucketName:
    Description: Name of S3 bucket storing VPC Flow Logs
    Value: !Ref FlowLogsBucket

  FlowLogId:
    Description: VPC Flow Log ID
    Value: !Ref VPCFlowLog