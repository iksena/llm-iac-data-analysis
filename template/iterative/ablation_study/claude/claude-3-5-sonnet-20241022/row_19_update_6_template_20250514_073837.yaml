AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates EventBridge configuration with API destination, connection, and custom event bus for external API integration'

Parameters:
  ApiEndpointUrl:
    Type: String
    Description: 'The HTTPS endpoint URL where events will be sent (e.g., https://webhook.site/testtest)'
    AllowedPattern: '^https://.*'
    ConstraintDescription: 'Must be a valid HTTPS URL'
    MinLength: 8
    MaxLength: 512

  ApiKey:
    Type: String
    Description: 'API key for authenticating with the external endpoint'
    MinLength: 1
    MaxLength: 256
    NoEcho: true
    ConstraintDescription: 'API key cannot be empty and must be between 1 and 256 characters'

Resources:
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-custom-bus

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: x-api-key
          ApiKeyValue: !Ref ApiKey
      Description: Connection for external API integration
      Name: !Sub ${AWS::StackName}-connection

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref ApiEndpointUrl
      InvocationRateLimitPerSecond: 100
      Name: !Sub ${AWS::StackName}-destination

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - custom.events
      Name: !Sub ${AWS::StackName}-rule
      State: ENABLED
      Targets:
        - Id: ApiDestinationTarget
          Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the custom event bus
    Value: !GetAtt CustomEventBus.Arn

  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn

  ConnectionArn:
    Description: ARN of the connection
    Value: !GetAtt ApiConnection.Arn

  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus