AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create a private Amazon Route 53 Hosted Zone for internal DNS management.
  The hosted zone's domain is "www.example.com", and it is associated with a specified VPC.

Parameters:
  VPCId:
    Description: "The ID of the VPC to associate with the private hosted zone. Provide a valid VPC ID."
    Type: AWS::EC2::VPC::Id

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      HostedZoneConfig:
        Comment: "Private Route 53 Hosted Zone for internal DNS management."
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region

Outputs:
  HostedZoneId:
    Description: "The ID of the created private Route 53 hosted zone."
    Value: !Ref PrivateHostedZone