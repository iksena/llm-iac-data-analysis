AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table for ArtistId, Concert, and TicketSales

Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ArtistConcertTicketSales
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref ArtistConcertTicketSalesTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt ArtistConcertTicketSalesTable.Arn