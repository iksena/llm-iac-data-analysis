AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Template for a production-ready risk management system. It provisions a DynamoDB table
  with composite keys, two Lambda functions for risk and workload processing, an IAM role with
  necessary permissions, and an SNS topic with a policy allowing SSM OpsCenter to publish alerts.

Resources:

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRoleForRiskManagement
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaDynamoDBAndCloudWatchPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: 
                  - !Sub "${DynamoDBTable.Arn}"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  RiskProcessingLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskProcessingLambda
      Runtime: python3.8
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          def lambda_handler(event, context):
              # Process risk events and store/update in DynamoDB
              return {
                  'statusCode': 200,
                  'body': json.dumps('Risk processed successfully!')
              }
      Timeout: 10

  WorkloadManagementLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WorkloadManagementLambda
      Runtime: python3.8
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          def lambda_handler(event, context):
              # Handle workload-related data and interactions with DynamoDB
              return {
                  'statusCode': 200,
                  'body': json.dumps('Workload data handled successfully!')
              }
      Timeout: 10

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskNotificationTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSSMOpsCenterPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableName:
    Description: "DynamoDB table name for risk management."
    Value: !Ref DynamoDBTable
  RiskNotificationTopicARN:
    Description: "SNS Topic ARN for risk notifications."
    Value: !Ref RiskNotificationTopic
  RiskProcessingLambdaARN:
    Description: "ARN for the Risk Processing Lambda function."
    Value: !GetAtt RiskProcessingLambda.Arn
  WorkloadManagementLambdaARN:
    Description: "ARN for the Workload Management Lambda function."
    Value: !GetAtt WorkloadManagementLambda.Arn