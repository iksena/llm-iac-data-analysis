AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an encrypted one zone EFS file system using
  an AWS VPC, subnet in us-east-1a, security group for NFS, and a mount target
  for the file system.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: OneZoneEFS-VPC

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      Tags:
        - Key: Name
          Value: OneZoneEFS-Subnet

  MyEFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS access on port 2049 for EFS
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: OneZoneEFS-SG

  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      FileSystemTags:
        - Key: Name
          Value: OneZoneEFS-FileSystem

  MyEFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !Ref MySubnet
      SecurityGroups:
        - !Ref MyEFSSecurityGroup

Outputs:
  VPCId:
    Description: VPC ID for the one zone EFS setup
    Value: !Ref MyVPC
  SubnetId:
    Description: Subnet ID in us-east-1a
    Value: !Ref MySubnet
  EFSTaggedFileSystemId:
    Description: The encrypted EFS File System ID
    Value: !Ref MyEFSFileSystem
  EFSMountTarget:
    Description: The mount target for the encrypted EFS File System
    Value: !Ref MyEFSMountTarget