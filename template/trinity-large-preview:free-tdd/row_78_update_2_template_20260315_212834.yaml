AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: Managed IP Address Manager for VPC and subnet allocation
      OperatingRegions:
        - RegionName: !Ref AWS::Region

Outputs:
  IPAMArn:
    Description: ARN of the created IPAM
    Value: !GetAtt IPAM.Arn

  IPAMId:
    Description: ID of the created IPAM
    Value: !Ref IPAM

  DefaultPublicScopeId:
    Description: ID of the default public scope
    Value: !GetAtt IPAM.PublicDefaultScopeId

  DefaultPrivateScopeId:
    Description: ID of the default private scope
    Value: !GetAtt IPAM.PrivateDefaultScopeId