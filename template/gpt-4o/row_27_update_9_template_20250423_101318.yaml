AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create a real-time data ingestion and storage pipeline using Amazon Kinesis Data Stream and Kinesis Data Firehose, delivering data to an S3 bucket.

Parameters:
  S3BucketName:
    Description: Name of the S3 bucket to store the data
    Type: String
    Default: mybucketkinesistestanu
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: Must be a valid S3 bucket name.

  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Type: String
    Default: kinesisteststream
    AllowedPattern: '^[a-zA-Z0-9_.-]{1,128}$'
    ConstraintDescription: Must be a valid Kinesis stream name.

  FirehoseName:
    Description: Name of the Kinesis Data Firehose
    Type: String
    Default: kinesistestfirehose
    AllowedPattern: '^[a-zA-Z0-9_.-]{1,64}$'
    ConstraintDescription: Must be a valid Firehose stream name.

  RetentionPeriodHours:
    Description: Retention period for Kinesis Data Stream in hours
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1
      RetentionPeriodHours: !Ref RetentionPeriodHours

  KinesisFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisFirehosePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub arn:aws:s3:::${S3BucketName}/*
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                Resource: !GetAtt KinesisDataStream.Arn

  KinesisFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn: S3Bucket
    Properties:
      DeliveryStreamName: !Ref FirehoseName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt KinesisFirehoseRole.Arn
      S3DestinationConfiguration:
        BucketARN: !Sub arn:aws:s3:::${S3BucketName}
        RoleARN: !GetAtt KinesisFirehoseRole.Arn
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3BucketName

  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref KinesisStreamName

  FirehoseName:
    Description: Name of the Kinesis Data Firehose
    Value: !Ref FirehoseName