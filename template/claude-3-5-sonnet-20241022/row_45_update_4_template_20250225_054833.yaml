AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a Kinesis Firehose with AWS KMS encryption and CloudWatch error logging

Resources:
  FirehoseLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}'
      RetentionInDays: 7

  FirehoseLogStream:
    Type: 'AWS::Logs::LogStream'
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: ErrorLogs

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: !Sub '${AWS::StackName}-firehose-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:PutLogEvents'
                Resource: !Sub '${FirehoseLogGroup.Arn}/*'
              - Effect: Allow
                Action:
                  - 'kms:GenerateDataKey'
                  - 'kms:Decrypt'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource: '*'

  DeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    DependsOn:
      - FirehoseLogStream
      - FirehoseRole
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::StackName}-destination'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 1
        CompressionFormat: UNCOMPRESSED
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  FirehoseArn:
    Description: ARN of the Kinesis Firehose Delivery Stream
    Value: !GetAtt DeliveryStream.Arn
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref FirehoseLogGroup