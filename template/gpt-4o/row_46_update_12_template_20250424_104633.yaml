AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy a resilient Jenkins CI/CD server on AWS.

Resources:
  JenkinsVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: JenkinsVPC

  JenkinsSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref JenkinsVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: JenkinsSubnet

  JenkinsInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: JenkinsInternetGateway

  JenkinsVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref JenkinsVPC
      InternetGatewayId: !Ref JenkinsInternetGateway

  JenkinsRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref JenkinsVPC
      Tags:
        - Key: Name
          Value: JenkinsRouteTable

  JenkinsRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref JenkinsRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref JenkinsInternetGateway

  JenkinsSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref JenkinsSubnet
      RouteTableId: !Ref JenkinsRouteTable

  JenkinsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and ICMP access to the Jenkins server
      VpcId: !Ref JenkinsVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  JenkinsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  JenkinsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref JenkinsRole]

  JenkinsElasticIP:
    Type: AWS::EC2::EIP

  JenkinsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref JenkinsSubnet
      SecurityGroupIds: [!Ref JenkinsSecurityGroup]
      IamInstanceProfile: !Ref JenkinsInstanceProfile
      ImageId: ami-061ac2e015473fbe2
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y java-1.8.0
          wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo
          rpm --import https://pkg.jenkins.io/redhat/jenkins.io.key
          yum install -y jenkins
          service jenkins start
          chkconfig jenkins on

  JenkinsElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref JenkinsInstance
      EIP: !Ref JenkinsElasticIP

  JenkinsRecoveryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: JenkinsInstanceRecovery
      AlarmDescription: Recover Jenkins instance if it becomes unhealthy
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed_System
      Dimensions:
        - Name: InstanceId
          Value: !Ref JenkinsInstance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Sub arn:aws:automate:${AWS::Region}:ec2:recover

Outputs:
  JenkinsURL:
    Description: URL to access the Jenkins server
    Value: !Sub http://${JenkinsElasticIP}

  InstanceId:
    Description: Instance ID of the Jenkins server
    Value: !Ref JenkinsInstance