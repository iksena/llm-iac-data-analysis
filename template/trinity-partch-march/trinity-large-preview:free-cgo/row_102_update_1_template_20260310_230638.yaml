AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads with Logging, Data Storage, and Notifications

Parameters:
  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues:
      - python3.12
      - nodejs20.x
    Description: Lambda runtime version

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      SSESpecification:
        Enabled: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RiskManagementLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementTable.Arn
        - PolicyName: SNSTopicAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskNotificationTopic

  LambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction1
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')
          sns = boto3.client('sns')

          def handler(event, context):
              try:
                  # Example implementation - store workload data
                  workload_id = event['workload_id']
                  question_id = event['question_id']
                  data = event['data']

                  table.put_item(
                      Item={
                          'workload_id': workload_id,
                          'question_id': question_id,
                          'data': data
                      }
                  )

                  # Publish notification
                  sns.publish(
                      TopicArn='!Ref RiskNotificationTopic',
                      Message=json.dumps(event),
                      Subject='Risk Management Update'
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Success')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          SNS_TOPIC_ARN: !Ref RiskNotificationTopic
      TracingConfig:
        Mode: Active

  LambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction2
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')

          def handler(event, context):
              try:
                  # Example implementation - retrieve workload data
                  workload_id = event['workload_id']
                  question_id = event['question_id']

                  response = table.get_item(
                      Key={
                          'workload_id': workload_id,
                          'question_id': question_id
                      }
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps(response.get('Item', {}))
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
      TracingConfig:
        Mode: Active

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskNotificationTopic

  RiskNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref RiskManagementTable
  LambdaFunction1Arn:
    Description: ARN of Lambda Function 1
    Value: !GetAtt LambdaFunction1.Arn
  LambdaFunction2Arn:
    Description: ARN of Lambda Function 2
    Value: !GetAtt LambdaFunction2.Arn
  SNSTopicArn:
    Description: ARN of SNS Topic
    Value: !Ref RiskNotificationTopic