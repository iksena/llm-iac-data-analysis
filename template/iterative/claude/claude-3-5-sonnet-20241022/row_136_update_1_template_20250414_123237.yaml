AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Permission Boundary and Developer Role Configuration'

Parameters:
  EnableStrictBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: 'Enable strict permission boundary enforcement'

  TeamNamePrefix:
    Type: String
    Default: 'MyTeam'
    Description: 'Prefix for IAM resource names'
    MinLength: 3
    MaxLength: 20

  OwnerTagValue:
    Type: String
    Description: 'Value for Owner tag on IAM resources'
    MinLength: 3
    MaxLength: 50

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Permission boundary for developer-created IAM resources'
      ManagedPolicyName: !Sub '${TeamNamePrefix}-PermissionBoundary'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Operations
            Effect: Allow
            Action:
              - 's3:*'
            Resource: '*'
          - Sid: AllowIAMReadOnly
            Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TeamNamePrefix}-DeveloperRole'
      Description: 'Role for developers with managed IAM permissions'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'iam.amazonaws.com'
            Action: 'sts:AssumeRole'
      PermissionsBoundary: !Ref PermissionBoundaryPolicy
      Tags:
        - Key: Owner
          Value: !Ref OwnerTagValue

  DeveloperAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Policy defining developer IAM permissions with boundary enforcement'
      ManagedPolicyName: !Sub '${TeamNamePrefix}-DeveloperAccess'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIAMResourceCreation
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:CreatePolicy'
              - 'iam:PutRolePolicy'
              - 'iam:AttachRolePolicy'
            Resource: '*'
            Condition:
              StringLike:
                'aws:RequestTag/Owner': !Ref OwnerTagValue
                'iam:ResourceTag/Owner': !Ref OwnerTagValue
              StringLike:
                'iam:ResourceTag/Name': !Sub '${TeamNamePrefix}*'
          - Sid: RequirePermissionBoundary
            Effect: Deny
            Action:
              - 'iam:CreateRole'
              - 'iam:PutRolePolicy'
            Resource: '*'
            Condition:
              StringNotEquals:
                'iam:PermissionsBoundary': !Ref PermissionBoundaryPolicy
          - Sid: RequireOwnerTag
            Effect: Deny
            Action:
              - 'iam:*'
            Resource: '*'
            Condition:
              'Null':
                'aws:RequestTag/Owner': 'true'

Outputs:
  PermissionBoundaryPolicyArn:
    Description: 'ARN of the Permission Boundary Policy'
    Value: !Ref PermissionBoundaryPolicy

  DeveloperRoleArn:
    Description: 'ARN of the Developer Role'
    Value: !GetAtt DeveloperRole.Arn

  DeveloperAccessPolicyArn:
    Description: 'ARN of the Developer Access Policy'
    Value: !Ref DeveloperAccessPolicy