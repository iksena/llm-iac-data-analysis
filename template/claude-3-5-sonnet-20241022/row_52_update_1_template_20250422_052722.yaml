AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS Region
  
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS Region
    
  PrimaryEndpoint:
    Type: String
    Description: Primary region application endpoint URL
    
  SecondaryEndpoint:
    Type: String
    Description: Secondary region application endpoint URL
    
  HealthCheckInterval:
    Type: Number
    Default: 30
    Description: Health check interval in seconds
    
Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: MultiRegionFailoverCluster
      
  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: MultiRegionControlPanel
      ClusterArn: !Ref RecoveryCluster
      
  PrimaryRegionRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: PrimaryRegionControl
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel
      
  SecondaryRegionRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: SecondaryRegionControl
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel
      
  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: EnsureOneRegionActive
      ControlPanelArn: !Ref ControlPanel
      AssertionRule:
        AssertedControls: 
          - !Ref PrimaryRegionRoutingControl
          - !Ref SecondaryRegionRoutingControl
        WaitPeriodMs: 5000
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
        
  PrimaryRegionHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: /health
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        RequestInterval: !Ref HealthCheckInterval
        FailureThreshold: 3
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: PrimaryRegionHealthCheck
          
  SecondaryRegionHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: /health
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        RequestInterval: !Ref HealthCheckInterval
        FailureThreshold: 3
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: SecondaryRegionHealthCheck

Outputs:
  RecoveryClusterArn:
    Description: ARN of the Recovery Cluster
    Value: !Ref RecoveryCluster
    
  ControlPanelArn:
    Description: ARN of the Control Panel
    Value: !Ref ControlPanel
    
  PrimaryRegionRoutingControlArn:
    Description: ARN of the Primary Region Routing Control
    Value: !Ref PrimaryRegionRoutingControl
    
  SecondaryRegionRoutingControlArn:
    Description: ARN of the Secondary Region Routing Control
    Value: !Ref SecondaryRegionRoutingControl
    
  PrimaryRegionHealthCheckId:
    Description: ID of the Primary Region Health Check
    Value: !Ref PrimaryRegionHealthCheck
    
  SecondaryRegionHealthCheckId:
    Description: ID of the Secondary Region Health Check
    Value: !Ref SecondaryRegionHealthCheck