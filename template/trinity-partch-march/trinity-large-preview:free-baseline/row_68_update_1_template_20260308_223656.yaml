AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role and Instance Profile for EC2 with CloudWatch and SSM permissions

Resources:
  EC2CloudWatchSSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2CloudWatchSSMRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: EC2CloudWatchSSMInstanceProfile
      Roles:
        - !Ref EC2CloudWatchSSMRole

Outputs:
  InstanceProfileName:
    Description: The name of the created instance profile
    Value: !Ref EC2InstanceProfile