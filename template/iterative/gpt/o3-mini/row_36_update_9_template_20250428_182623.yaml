AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production ready CloudFormation template that creates a MySQL RDS instance (db.t3.micro)
  within a securely isolated VPC spanning two Availability Zones. It includes a custom DBParameterGroup
  and integrates AWS Secrets Manager for secure admin credentials management.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "ProdVPC"

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "ProdSubnet1"

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "ProdSubnet2"

  RDSDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for MySQL RDS instance"
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2
      Tags:
        - Key: Name
          Value: "ProdRDSSubnetGroup"

  CustomDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: "Custom parameter group for MySQL RDS instance"
      Family: "mysql8.0"
      Parameters:
        innodb_file_per_table: "1"
      Tags:
        - Key: Name
          Value: "ProdMySQLParameterGroup"

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for MySQL RDS instance"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 3306
          ToPort: 3306
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "ProdRDSSG"

  DBAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: "DBAdminSecret"
      Description: "Admin credentials for the MySQL RDS instance"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: "password"
        ExcludePunctuation: true
        ExcludeCharacters: "\"@/\\"
        PasswordLength: 16

  MySQLDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: "db.t3.micro"
      Engine: "mysql"
      EngineVersion: "8.0.40"
      MasterUsername: "admin"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBAdminSecret}:SecretString:password}}"
      DBName: "productiondb"
      DBParameterGroupName: !Ref CustomDBParameterGroup
      DBSubnetGroupName: !Ref RDSDBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      MultiAZ: false
      PubliclyAccessible: false
      StorageType: "gp2"
      DeletionProtection: true
      BackupRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: "ProdMySQLDB"

Outputs:
  VPCId:
    Description: "VPC Id of the production VPC"
    Value: !Ref VPC
  DBInstanceEndpoint:
    Description: "Endpoint address of the MySQL RDS instance"
    Value: !GetAtt MySQLDBInstance.Endpoint.Address
  DBAdminSecretARN:
    Description: "ARN of the Secrets Manager secret storing DB admin credentials"
    Value: !Ref DBAdminSecret