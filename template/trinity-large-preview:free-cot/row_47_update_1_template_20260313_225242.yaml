AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      Description: EC2 role with read-only IAM access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  EC2IAMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2IAMReadOnlyRole