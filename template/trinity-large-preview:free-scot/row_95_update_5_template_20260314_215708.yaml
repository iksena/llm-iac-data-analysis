AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: nginx
          Value: Yes

  NginxAutomation:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: OS updates, Nginx install, and validation
        mainSteps:
          - name: osUpdates
            action: 'aws:runShellScript'
            inputs:
              runCommand: |
                yum update -y
                shutdown -r now
            onFailure: Abort
          - name: nginxInstall
            action: 'aws:runShellScript'
            inputs:
              runCommand: |
                yum install -y nginx
                systemctl start nginx
                systemctl enable nginx
            onFailure: Abort
          - name: validation
            action: 'aws:runShellScript'
            inputs:
              runCommand: |
                curl -f http://localhost || exit 1
            onFailure: Abort

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref MyEC2Instance
  PublicDNS:
    Description: Public DNS Name
    Value: !GetAtt MyEC2Instance.PublicDnsName