AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) Pipeline for EDI X12_214 to JSON Transformation

Parameters:
  BusinessContactName:
    Type: String
    Default: "Default Contact"
    Description: "Business contact name for B2B profile"

  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: "Business contact email"

  BusinessContactPhone:
    Type: String
    Default: "+1-555-0100"
    Description: "Business contact phone number"

  InputBucketName:
    Type: String
    Default: !Sub "${AWS::StackName}-input"
    Description: "Input S3 bucket name"

  OutputBucketName:
    Type: String
    Default: !Sub "${AWS::StackName}-output"
    Description: "Output S3 bucket name"

Resources:
  # IAM Role for B2B Integration Service
  B2BIServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BI-Service-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bintegration.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${InputBucketName}"
                  - !Sub "arn:aws:s3:::${InputBucketName}/*"
                  - !Sub "arn:aws:s3:::${OutputBucketName}"
                  - !Sub "arn:aws:s3:::${OutputBucketName}/*"

  # Input S3 Bucket for EDI Files
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      Tags:
        - Key: Environment
          Value: !Sub "${AWS::StackName}"

  # Output S3 Bucket for JSON Files
  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transition:
              Days: 30
              StorageClass: INTELLIGENT_TIERING
      Tags:
        - Key: Environment
          Value: !Sub "${AWS::StackName}"

  # B2B Integration Profile
  B2BIPipelineProfile:
    Type: AWS::B2BIntegration::Profile
    Properties:
      ProfileName: !Sub "${AWS::StackName}-EDI-Profile"
      BusinessContact:
        Name: !Ref BusinessContactName
        Email: !Ref BusinessContactEmail
        Phone: !Ref BusinessContactPhone
      Description: "EDI X12_214 Processing Profile"
      ServiceRoleArn: !GetAtt B2BIServiceRole.Arn

  # Transformer Resource for EDI X12_214 to JSON
  EDI214Transformer:
    Type: AWS::B2BIntegration::Transformer
    Properties:
      TransformerName: !Sub "${AWS::StackName}-EDI214-JSON-Transformer"
      InputFormat: "EDI"
      OutputFormat: "JSON"
      MappingLogic:
        - Segment: "ISA"
          Type: "Header"
          Fields:
            - ISA01: "00"
            - ISA02: "          "
            - ISA03: "00"
            - ISA04: "          "
            - ISA05: "ZZ"
            - ISA07: "ZZ"
            - ISA08: "0000000000"
            - ISA12: "00501"
            - ISA13: "000000001"
            - ISA14: "T"
            - ISA15: "P"
            - ISA16: ":"
        - Segment: "ST"
          Type: "Transaction"
          Fields:
            - ST01: "214"
            - ST02: "000000001"
        - Segment: "B10"
          Type: "Body"
          Fields:
            - B1001: "Pickup Request Number"
            - B1002: "Date"
            - B1003: "Time"
            - B1004: "Time Code"
        - Segment: "N1"
          Type: "Loop"
          Fields:
            - N101: "SH"
            - N102: "Shipper Name"
            - N103: "SHID"
        - Segment: "SE"
          Type: "Trailer"
          Fields:
            - SE01: "NumberOfIncludedSegments"
            - SE02: "ST02"
      ProfileId: !Ref B2BIPipelineProfile

  # S3 Event Notification Configuration
  S3EventNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref InputBucket
      LambdaFunctionConfigurations:
        - LambdaFunctionArn: !GetAtt EDITransformationFunction.Arn
          Events:
            - "s3:ObjectCreated:*"
          Filter:
            S3Key:
              Rules:
                - Name: prefix
                  Value: "edi/"
                - Name: suffix
                  Value: ".x12"

  # Lambda Function for Custom Transformation (if needed)
  EDITransformationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EDI-Transformer"
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']

                  # Get the object from S3
                  edi_file = s3.get_object(Bucket=bucket, Key=key)
                  edi_content = edi_file['Body'].read().decode('utf-8')

                  # Transform EDI to JSON (placeholder logic)
                  json_data = {
                      "documentType": "X12_214",
                      "originalContent": edi_content,
                      "transformed": True
                  }

                  # Save JSON to output bucket
                  output_key = key.replace('edi/', 'json/').replace('.x12', '.json')
                  s3.put_object(
                      Bucket=os.environ['OUTPUT_BUCKET'],
                      Key=output_key,
                      Body=json.dumps(json_data),
                      ContentType='application/json'
                  )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation completed successfully')
              }
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucketName

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-Lambda-Execution-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${InputBucketName}"
                  - !Sub "arn:aws:s3:::${InputBucketName}/*"
                  - !Sub "arn:aws:s3:::${OutputBucketName}"
                  - !Sub "arn:aws:s3:::${OutputBucketName}/*"

Outputs:
  InputBucketName:
    Description: Input S3 bucket for EDI files
    Value: !Ref InputBucketName

  OutputBucketName:
    Description: Output S3 bucket for JSON files
    Value: !Ref OutputBucketName

  B2BIPipelineProfile:
    Description: B2B Integration Profile ARN
    Value: !Ref B2BIPipelineProfile

  EDI214Transformer:
    Description: EDI Transformer ARN
    Value: !Ref EDI214Transformer