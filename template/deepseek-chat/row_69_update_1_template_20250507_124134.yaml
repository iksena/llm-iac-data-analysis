AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating VPC, Security Group, S3 Bucket, and DynamoDB Table'

Parameters:
  VPCCidrBlock:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  S3BucketName:
    Description: 'Name for the S3 bucket'
    Type: String
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'S3 bucket name can only contain lowercase letters, numbers, and hyphens'
  
  DynamoDBTableName:
    Description: 'Name for the DynamoDB table'
    Type: String
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: 'DynamoDB table name can only contain alphanumeric characters and hyphens'
  
  ReadCapacityUnits:
    Description: 'Provisioned read capacity units for DynamoDB'
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000
  
  WriteCapacityUnits:
    Description: 'Provisioned write capacity units for DynamoDB'
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for the VPC'
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SecurityGroup'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Bucket'

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: 'ID'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'ID'
          KeyType: 'HASH'
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        SSEEnabled: true
      DeletionProtectionEnabled: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DynamoDBTable'

Outputs:
  VPCId:
    Description: 'The ID of the created VPC'
    Value: !Ref VPC
  
  SecurityGroupId:
    Description: 'The ID of the created Security Group'
    Value: !Ref SecurityGroup
  
  S3BucketName:
    Description: 'The name of the created S3 bucket'
    Value: !Ref S3Bucket
  
  DynamoDBTableName:
    Description: 'The name of the created DynamoDB table'
    Value: !Ref DynamoDBTable