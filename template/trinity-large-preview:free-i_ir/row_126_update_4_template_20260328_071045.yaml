AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with Amazon Kinesis Data Streams

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: StreamingData
      ShardCount: 1

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListStreams
                Resource: !GetAtt KinesisStream.Arn

  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisDataAPI

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref APIGatewayRestApi
    DependsOn:
      - PutRecordMethod
      - PutRecordsMethod
      - GetRecordsMethod
      - GetShardIteratorMethod
      - DescribeStreamMethod

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestApi
      StageName: prod

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: POST
      ResourceId: !Ref APIGatewayRestApi
      RestApiId: !Ref APIGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn

  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: POST
      ResourceId: !Ref APIGatewayRestApi
      RestApiId: !Ref APIGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      ResourceId: !Ref APIGatewayRestApi
      RestApiId: !Ref APIGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn

  GetShardIteratorMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      ResourceId: !Ref APIGatewayRestApi
      RestApiId: !Ref APIGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetShardIterator
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn

  DescribeStreamMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      ResourceId: !Ref APIGatewayRestApi
      RestApiId: !Ref APIGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn