AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: subnet-12345678
      Description: Primary network interface with multiple IPs
      GroupSet:
        - sg-12345678
      PrivateIpAddress: 10.0.1.10
      SecondaryPrivateIpAddressCount: 2
      SourceDestCheck: true

  EIP0:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.11

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.12

  SecondaryIP1:
    Type: AWS::EC2::NetworkInterfaceSecondaryPrivateIpAddress
    Properties:
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.11

  SecondaryIP2:
    Type: AWS::EC2::NetworkInterfaceSecondaryPrivateIpAddress
    Properties:
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.12

Outputs:
  NetworkInterfaceId:
    Value: !Ref MyNetworkInterface
  EIP1PublicIP:
    Value: !GetAtt EIP0.PublicIp
  EIP2PublicIP:
    Value: !GetAtt EIP1.PublicIp
  SecondaryPrivateIP1:
    Value: !Ref SecondaryIP1
  SecondaryPrivateIP2:
    Value: !Ref SecondaryIP2