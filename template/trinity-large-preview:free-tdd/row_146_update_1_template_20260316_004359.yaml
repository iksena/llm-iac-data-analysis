AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Image Analysis Pipeline with S3, Lambda, Step Functions, and Rekognition

Parameters:
  PhoneNumber:
    Type: String
    Description: Phone number to receive SMS alerts (e.g., +1234567890)
    Default: "+1234567890"
    AllowedPattern: "^\+[1-9]\d{1,14}$"

Resources:
  # S3 Bucket for image uploads
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        LambdaConfigurations:
          - Function: !GetAtt ImageAnalysisLambda.Arn
            Event: s3:ObjectCreated:*

  # Lambda function for image analysis (Rekognition)
  ImageAnalysisLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              s3_client = boto3.client('s3')
              rekognition_client = boto3.client('rekognition')
              sns_client = boto3.client('sns')

              bucket = event['Records'][0]['s3']['bucket']['name']
              key = event['Records'][0]['s3']['object']['key']

              try:
                  response = rekognition_client.detect_labels(
                      Image={
                          'S3Object': {
                              'Bucket': bucket,
                              'Name': key
                          }
                      },
                      MaxLabels=10,
                      MinConfidence=75
                  )

                  labels = response['Labels']
                  has_human = any(label['Name'].lower() == 'human' for label in labels)

                  if has_human:
                      sns_client.publish(
                          TopicArn= os.environ['SNS_TOPIC_ARN'],
                          Message=f"Human detected in image: {key}",
                          Subject="Human Detection Alert"
                      )

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'labels': labels,
                          'human_detected': has_human
                      })
                  }

              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  # Lambda function for Step Functions execution
  StepFunctionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3

          def lambda_handler(event, context):
              s3_client = boto3.client('s3')
              rekognition_client = boto3.client('rekognition')
              sns_client = boto3.client('sns')

              bucket = event['bucket']
              key = event['key']

              response = rekognition_client.detect_labels(
                  Image={
                      'S3Object': {
                          'Bucket': bucket,
                          'Name': key
                      }
                  },
                  MaxLabels=10,
                  MinConfidence=75
              )

              labels = response['Labels']
              has_human = any(label['Name'].lower() == 'human' for label in labels)

              if has_human:
                  sns_client.publish(
                      TopicArn= os.environ['SNS_TOPIC_ARN'],
                      Message=f"Human detected in image: {key}",
                      Subject="Human Detection Alert"
                  )

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'labels': labels,
                      'human_detected': has_human
                  })
              }

  # Step Functions State Machine
  ImageAnalysisStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      DefinitionString: |
        {
          "StartAt": "AnalyzeImage",
          "States": {
            "AnalyzeImage": {
              "Type": "Task",
              "Resource": "arn:aws:states:::lambda:invoke",
              "Parameters": {
                "FunctionName": "ImageAnalysisLambda",
                "Payload": {
                  "Records": [ {
                    "s3": {
                      "bucket": {
                        "name.$": "$.bucket"
                      },
                      "object": {
                        "key.$": "$.key"
                      }
                    }
                  } ]
                }
              },
              "End": true
            }
          }
        }
      RoleArn: !GetAtt StepFunctionRole.Arn

  # SNS Topic for alerts
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "ImageAnalysisAlerts"

  # SNS Subscription
  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: sms
      Endpoint: !Ref PhoneNumber

  # IAM Role for ImageAnalysisLambda
  ImageAnalysisLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # IAM Role for StepFunctionLambda
  StepFunctionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # IAM Role for Step Functions
  StepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSStepFunctionsFullAccess

  # IAM Policy for ImageAnalysisLambda (Rekognition + SNS)
  ImageAnalysisLambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ImageAnalysisLambdaPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - rekognition:DetectLabels
            Resource: "*"
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref AlertTopic
      Roles:
        - !Ref ImageAnalysisLambdaRole

  # IAM Policy for StepFunctionLambda (Rekognition + SNS)
  StepFunctionLambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StepFunctionLambdaPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - rekognition:DetectLabels
            Resource: "*"
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref AlertTopic
      Roles:
        - !Ref StepFunctionLambdaRole

  # Lambda Permission for S3 trigger
  S3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ImageAnalysisLambda.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:s3:::${ImageBucket}

Outputs:
  ImageBucketName:
    Description: Name of the S3 bucket for image uploads
    Value: !Ref ImageBucket
  ImageAnalysisLambdaArn:
    Description: ARN of the Image Analysis Lambda function
    Value: !GetAtt ImageAnalysisLambda.Arn
  StepFunctionsStateMachineArn:
    Description: ARN of the Step Functions State Machine
    Value: !Ref ImageAnalysisStateMachine
  AlertTopicArn:
    Description: ARN of the SNS Topic for alerts
    Value: !Ref AlertTopic