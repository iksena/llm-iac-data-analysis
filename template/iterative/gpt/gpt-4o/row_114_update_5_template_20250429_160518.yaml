AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create a B2B Data Interchange (B2BI) pipeline
  for transforming EDI X12_214 documents into JSON format.

Parameters:
  BusinessContactName:
    Type: String
    Description: The name of the business contact.
  BusinessContactEmail:
    Type: String
    Description: The email of the business contact.
  BusinessContactPhone:
    Type: String
    Description: The phone number of the business contact.
  InputBucketName:
    Type: String
    Description: The name of the S3 bucket to receive raw EDI files.
  OutputBucketName:
    Type: String
    Description: The name of the S3 bucket to store transformed JSON data.

Resources:
  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${InputBucketName}/*
                  - !Sub arn:aws:s3:::${OutputBucketName}/*

  EDITransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              s3 = boto3.client('s3')
              # Placeholder for EDI to JSON transformation logic
              # Example: Read from input bucket, transform, and write to output bucket
              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation complete')
              }
      Runtime: python3.12
      Timeout: 60
      Environment:
        Variables:
          INPUT_BUCKET: !Ref InputBucketName
          OUTPUT_BUCKET: !Ref OutputBucketName
          BUSINESS_CONTACT_NAME: !Ref BusinessContactName
          BUSINESS_CONTACT_EMAIL: !Ref BusinessContactEmail
          BUSINESS_CONTACT_PHONE: !Ref BusinessContactPhone

Outputs:
  InputBucketName:
    Description: The name of the input S3 bucket.
    Value: !Ref InputBucketName

  OutputBucketName:
    Description: The name of the output S3 bucket.
    Value: !Ref OutputBucketName

  LambdaFunctionARN:
    Description: The ARN of the EDI Transformer Lambda function.
    Value: !GetAtt EDITransformerFunction.Arn