AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an S3 bucket that sends object creation events to Amazon EventBridge,
  an SNS topic for notifications, and an EventBridge rule that triggers based on these events.

Parameters:
  BucketNameParam:
    Description: "Optional custom S3 bucket name. Leave blank for an auto-generated name."
    Type: String
    Default: ""
    MinLength: 0
    MaxLength: 63

Conditions:
  UseCustomBucketName: !Not [ !Equals [ !Ref BucketNameParam, "" ] ]

Resources:

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - UseCustomBucketName
        - !Ref BucketNameParam
        - !Ref "AWS::NoValue"
      NotificationConfiguration:
        EventBridgeConfiguration: {}

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Object Created Notifications"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "SNS:Publish"
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "S3ObjectCreatedRule"
      Description: "Triggers on S3 object creation events and forwards messages to SNS"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SNSTopic

Outputs:

  BucketName:
    Description: "Name of the S3 bucket"
    Value: !Ref S3Bucket

  SNSTopicARN:
    Description: "ARN of the SNS topic"
    Value: !Ref SNSTopic

  EventBridgeRuleName:
    Description: "Name of the EventBridge rule"
    Value: !Ref EventBridgeRule