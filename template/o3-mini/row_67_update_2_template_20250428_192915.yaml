AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that creates an S3 bucket with a bucket policy.
  The policy grants access either organization-wide (if an AWS Organization ID is provided) 
  or restricts access to the current AWS account when no Organization ID is given.

Parameters:
  OrganizationId:
    Type: String
    Description: >
      Provide the AWS Organization ID for enterprise-wide access.
      Leave this parameter empty for single-account access.
    Default: ''

Conditions:
  UseOrgAccess: !Not [ !Equals [ !Ref OrganizationId, "" ] ]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement: !If
          - UseOrgAccess
          - - Sid: OrgWideAccess
              Effect: Allow
              Principal: "*"
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !Sub "${S3Bucket.Arn}"
                - !Sub "${S3Bucket.Arn}/*"
              Condition:
                StringEquals:
                  aws:PrincipalOrgID: !Ref OrganizationId
          - - Sid: SingleAccountAccess
              Effect: Allow
              Principal:
                AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !Sub "${S3Bucket.Arn}"
                - !Sub "${S3Bucket.Arn}/*"

Outputs:
  BucketName:
    Description: "The name of the created S3 bucket."
    Value: !Ref S3Bucket