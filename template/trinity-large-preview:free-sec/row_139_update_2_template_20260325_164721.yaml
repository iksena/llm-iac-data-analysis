AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with Lambda custom resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
  SecondNumber:
    Type: Number
    Default: 5
  Operator:
    Type: String
    Default: "+"
    AllowedValues:
      - "+"
      - "-"
      - "*"
      - "/"
  Fail:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']
                  fail = event['ResourceProperties'].get('Fail', 'false').lower() == 'true'

                  if fail:
                      raise ValueError("Simulated failure for testing")

                  if operator == '+':
                      result = first_number + second_number
                  elif operator == '-':
                      result = first_number - second_number
                  elif operator == '*':
                      result = first_number * second_number
                  elif operator == '/':
                      if second_number == 0:
                          raise ValueError("Division by zero")
                      result = first_number / second_number
                  else:
                      raise ValueError(f"Unsupported operator: {operator}")

                  response_data = {
                      'Result': result
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  CustomArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      Fail: !Ref Fail

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomArithmeticResource.Result
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ArithmeticLambdaFunction.Arn