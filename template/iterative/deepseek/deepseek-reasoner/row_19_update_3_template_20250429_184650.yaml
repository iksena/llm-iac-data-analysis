AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  APIKeyValue:
    Type: String
    NoEcho: true
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  WebhookConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: WebhookConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: x-api-key
          ApiKeyValue: !Ref APIKeyValue

  WebhookDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: WebhookDestination
      ConnectionArn: !GetAtt WebhookConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: https://webhook.site/testtest
      InvocationRateLimitPerSecond: 10
    DependsOn: WebhookConnection

  EventInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt WebhookDestination.Arn
    DependsOn: WebhookDestination

  EventRoutingRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - prefix: ""
      State: ENABLED
      Targets:
        - Arn: !GetAtt WebhookDestination.Arn
          Id: WebhookTarget
          RoleArn: !GetAtt EventInvocationRole.Arn
          HttpParameters:
            HeaderParameters:
              x-api-key: !Ref APIKeyValue
    DependsOn:
      - WebhookDestination
      - EventInvocationRole

Outputs:
  EventBusName:
    Value: !Ref CustomEventBus
  ApiDestinationArn:
    Value: !GetAtt WebhookDestination.Arn
  ConnectionName:
    Value: !Ref WebhookConnection