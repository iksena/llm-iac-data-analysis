AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a DynamoDB table with local and global secondary indexes'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: MyDynamoDBTable
  
  BillingMode:
    Type: String
    Description: DynamoDB billing mode
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
  
  ProvisionedReadCapacityUnits:
    Type: Number
    Description: Provisioned read capacity units (only used if BillingMode is PROVISIONED)
    Default: 5
    MinValue: 1
  
  ProvisionedWriteCapacityUnits:
    Type: Number
    Description: Provisioned write capacity units (only used if BillingMode is PROVISIONED)
    Default: 5
    MinValue: 1
  
  EnablePointInTimeRecovery:
    Type: String
    Description: Enable point-in-time recovery
    Default: true
    AllowedValues:
      - true
      - false

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, 'PROVISIONED']
  EnablePITR: !Equals [!Ref EnablePointInTimeRecovery, 'true']

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      ReadCapacityUnits: !If [IsProvisioned, !Ref ProvisionedReadCapacityUnits, !Ref 'AWS::NoValue']
      WriteCapacityUnits: !If [IsProvisioned, !Ref ProvisionedWriteCapacityUnits, !Ref 'AWS::NoValue']
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: LSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: N
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: LSI1
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: LSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ReadCapacityUnits: !If [IsProvisioned, !Ref ProvisionedReadCapacityUnits, !Ref 'AWS::NoValue']
          WriteCapacityUnits: !If [IsProvisioned, !Ref ProvisionedWriteCapacityUnits, !Ref 'AWS::NoValue']
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - Attribute1
              - Attribute2
          ReadCapacityUnits: !If [IsProvisioned, !Ref ProvisionedReadCapacityUnits, !Ref 'AWS::NoValue']
          WriteCapacityUnits: !If [IsProvisioned, !Ref ProvisionedWriteCapacityUnits, !Ref 'AWS::NoValue']
      PointInTimeRecoverySpecification: !If
        - EnablePITR
        - PointInTimeRecoveryEnabled: true
        - !Ref 'AWS::NoValue'
      SSESpecification:
        SSEEnabled: true
      DeletionPolicy: Retain
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn