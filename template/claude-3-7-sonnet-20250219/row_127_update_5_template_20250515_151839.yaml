AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon EFS file system for a testing environment'

Parameters:
  EnvironmentName:
    Description: Environment name
    Type: String
    Default: Test
    
  AvailabilityZone:
    Description: Availability Zone for the subnet and EFS mount target
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
    
  VpcCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    
  SubnetCIDR:
    Description: CIDR block for the subnet
    Type: String
    Default: 10.0.1.0/24
    
  PerformanceMode:
    Description: EFS performance mode
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Ref AvailabilityZone
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-RouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS file system
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCIDR
          Description: Allow NFS traffic from within the VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EFS-SG

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      FileSystemTags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EFS

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  EFSFileSystemId:
    Description: ID of the EFS File System
    Value: !Ref EFSFileSystem

  EFSFileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  MountCommand:
    Description: Command to mount the EFS file system
    Value: !Sub "sudo mount -t nfs4 ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs"

  VPCId:
    Description: ID of the VPC
    Value: !Ref VPC

  SubnetId:
    Description: ID of the Subnet
    Value: !Ref Subnet