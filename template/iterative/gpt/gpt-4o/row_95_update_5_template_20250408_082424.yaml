AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy an EC2 instance with tag-driven automation for OS updates, Nginx installation, and validation using AWS Systems Manager.

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Default: my-key-pair
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the EC2 instance
    Default: vpc-12345678
    ConstraintDescription: Must be a valid VPC ID.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for the EC2 instance
    Default: subnet-12345678
    ConstraintDescription: Must be a valid Subnet ID.

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0b2f6494ff0b07a0e

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:DescribeInstanceInformation
                  - ssm:GetCommandInvocation
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                  - ssm:SendCommand
                  - ec2messages:*
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - Ref: EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: NginxServer
        - Key: nginx
          Value: Yes

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: "Automate OS updates, Nginx installation, and validation"
        mainSteps:
          - action: aws:runCommand
            name: UpdateOS
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - sudo yum update -y
                  - sudo reboot || true
          - action: aws:runCommand
            name: InstallNginx
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - sudo amazon-linux-extras install nginx1 -y
                  - sudo systemctl start nginx
                  - sudo systemctl enable nginx
          - action: aws:runCommand
            name: ValidateNginx
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - curl -f http://localhost || exit 1

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  InstancePublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  SSMDocumentName:
    Description: Name of the SSM Automation Document
    Value: !Ref SSMDocument
```

**Note:** Replace the default values for `KeyName`, `VpcId`, and `SubnetId` with actual values from your AWS environment when deploying the stack. These are placeholders to demonstrate the structure and should be customized to match your specific setup.