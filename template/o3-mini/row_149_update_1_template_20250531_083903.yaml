AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to deploy an encrypted Amazon EFS file system with automated monitoring,
  cross-AZ EC2 integration, centralized data access and mounting on /home of EC2 instances. This template
  creates an EFS file system with mount targets in two public subnets, two EC2 instances in separate AZs with
  IAM roles for EFS access and Systems Manager (SSM) management, and CloudWatch Alarms for monitoring EFS metrics.

Parameters:
  VPCId:
    Description: VPC ID for the resources.
    Type: AWS::EC2::VPC::Id
  PublicSubnet1:
    Description: Public Subnet ID for the first mount target and EC2 instance.
    Type: AWS::EC2::Subnet::Id
  PublicSubnet2:
    Description: Public Subnet ID for the second mount target and EC2 instance.
    Type: AWS::EC2::Subnet::Id
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access.
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
  AMIId:
    Description: The AMI ID for the EC2 instances.
    Type: AWS::EC2::Image::Id

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets allowing NFS traffic from EC2 instances.
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: EFS-SG

  EC2InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances allowing SSH and NFS outbound.
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 0
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-Instance-SG

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_14_DAYS
      FileSystemTags:
        - Key: Name
          Value: SharedEFS

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EFSMountPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:DescribeFileSystems
                Resource: "*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AMIId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet1
          GroupSet:
            - !Ref EC2InstanceSecurityGroup
      UserData:
        Fn::Base64: 
          !Sub |
            #!/bin/bash -xe
            yum install -y amazon-efs-utils
            mkdir -p /home
            echo "${EFSFileSystemId}:/ /home efs defaults,_netdev 0 0" >> /etc/fstab
            mount -a
      Tags:
        - Key: Name
          Value: EC2-Instance-1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AMIId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet2
          GroupSet:
            - !Ref EC2InstanceSecurityGroup
      UserData:
        Fn::Base64: 
          !Sub |
            #!/bin/bash -xe
            yum install -y amazon-efs-utils
            mkdir -p /home
            echo "${EFSFileSystemId}:/ /home efs defaults,_netdev 0 0" >> /etc/fstab
            mount -a
      Tags:
        - Key: Name
          Value: EC2-Instance-2

  CloudWatchAlarmEFS:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-BurstCreditBalance-Low
      AlarmDescription: Alarm if EFS burst credit balance drops below threshold indicating potential performance issues.
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching

Outputs:
  EFSFileSystemId:
    Description: ID of the EFS File System.
    Value: !Ref EFSFileSystem
  EC2Instance1Id:
    Description: ID of the first EC2 Instance.
    Value: !Ref EC2Instance1
  EC2Instance2Id:
    Description: ID of the second EC2 Instance.
    Value: !Ref EC2Instance2