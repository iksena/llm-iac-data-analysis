AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an IAM role assumable by Bedrock service for agent resources with permissions to invoke foundation models and Lambda functions'

Parameters:
  AwsAccountId:
    Type: String
    Description: The AWS Account ID where this stack is being deployed
    Default: '123456789012'
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  LambdaFunctionArn:
    Type: String
    Description: Lambda function ARN that can be invoked by Bedrock (use * for all Lambda functions)
    Default: '*'

Conditions:
  IsWildcardLambda: !Equals [!Ref LambdaFunctionArn, '*']

Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'BedrockAgentServiceRole-${AWS::Region}'
      Path: '/service-role/'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AwsAccountId
      ManagedPolicyArns:
        - !Ref BedrockAgentPolicy
      Tags:
        - Key: Purpose
          Value: BedrockAgentIntegration

  BedrockAgentPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'BedrockAgentPolicy-${AWS::Region}'
      Description: Policy for Bedrock agent to invoke foundation models and Lambda functions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: '*'
            Condition:
              StringEquals:
                aws:ResourceAccount: !Ref AwsAccountId
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: !If 
              - IsWildcardLambda
              - 'arn:aws:lambda:*:*:function:*'
              - !Ref LambdaFunctionArn
          - Effect: Allow
            Action:
              - bedrock:*
            Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AwsAccountId}:agent/*'

Outputs:
  BedrockAgentRoleArn:
    Description: ARN of the IAM role for Bedrock agent
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockAgentRoleArn'
  
  BedrockAgentRoleName:
    Description: Name of the IAM role for Bedrock agent
    Value: !Ref BedrockAgentRole
    Export:
      Name: !Sub '${AWS::StackName}-BedrockAgentRoleName'