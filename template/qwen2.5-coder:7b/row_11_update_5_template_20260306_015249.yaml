AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table
    Default: MobileNotificationsReporting

  PartitionKey:
    Type: String
    Description: The partition key for the DynamoDB table
    Default: id

  SortKey:
    Type: String
    Description: The sort key for the DynamoDB table
    Default: sentTime

  TTLAttribute:
    Type: String
    Description: The TTL attribute for the DynamoDB table
    Default: expirationTime

Resources:
  MobileNotificationsReportingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKey
          AttributeType: S
        - AttributeName: !Ref SortKey
          AttributeType: S
        - AttributeName: !Ref TTLAttribute
          AttributeType: N
      KeySchema:
        - AttributeName: !Ref PartitionKey
          KeyType: HASH
        - AttributeName: !Ref SortKey
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttribute
        Enabled: true

Outputs:
  MobileNotificationsReportingTableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt MobileNotificationsReportingTable.Arn