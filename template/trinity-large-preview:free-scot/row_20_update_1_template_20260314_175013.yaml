AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard and Logs Insights queries for AWS Client VPN usage monitoring

Parameters:
  ClientVPNEndpointId:
    Type: String
    Default: vpn-endpoint-id
    Description: ID of the AWS Client VPN endpoint to monitor
  DashboardName:
    Type: String
    Default: ClientVPN-Usage-Dashboard
    Description: Name for the CloudWatch Dashboard
  LogGroupName:
    Type: String
    Default: /aws/vpn/logs
    Description: CloudWatch Logs group where Client VPN logs are stored

Resources:
  DashboardRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
      Policies:
        - PolicyName: ClientVPNAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:GetLogEvents
                Resource: !Sub 'arn:aws:logs:*:*:log-group:${LogGroupName}:*'

  ConnectionDurationsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurations
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection duration/
        | stats avg(duration) as AvgDuration, max(duration) as MaxDuration, min(duration) as MinDuration
        by endpointId

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransfer
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /data transfer/
        | stats sum(ingressBytes) as TotalIngress, sum(egressBytes) as TotalEgress
        by endpointId

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivity
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /user activity/
        | stats count(*) as ConnectionCount, distinct(user) as UniqueUsers
        by endpointId

  AD_SAML_AuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: AD_SAML_Auth
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /AD|SAML/
        | stats count(*) as AuthCount
        by endpointId

  MutualAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MutualAuth
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /Mutual Auth/
        | stats count(*) as AuthCount
        by endpointId

  MixedAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MixedAuth
      LogGroupName: !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /Mixed Auth/
        | stats count(*) as AuthCount
        by endpointId

  ClientVPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Dashboard"
              }
            },
            {
              "type": "query",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "ConnectionDurations",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "Connection Durations by Endpoint"
              }
            },
            {
              "type": "query",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "DataTransfer",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "Data Transfer by Endpoint"
              }
            },
            {
              "type": "query",
              "x": 0,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "UserActivity",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "User Activity by Endpoint"
              }
            },
            {
              "type": "query",
              "x": 8,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "AD_SAML_Auth",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "AD/SAML Authentication Counts"
              }
            },
            {
              "type": "query",
              "x": 16,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "MutualAuth",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "Mutual Authentication Counts"
              }
            },
            {
              "type": "query",
              "x": 0,
              "y": 13,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "MixedAuth",
                "region": "${AWS::Region}",
                "view": "table",
                "stacked": false,
                "title": "Mixed Authentication Counts"
              }
            }
          ]
        }

Outputs:
  DashboardUrl:
    Description: URL for the CloudWatch Dashboard
    Value: !GetAtt ClientVPNDashboard.Url
  DashboardName:
    Description: Name of the CloudWatch Dashboard
    Value: !Ref DashboardName