AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeEventBus:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBEventBus
      Description: Event bus for MongoDB integration

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: MongoDBApiKey
      Description: API key for MongoDB authentication
      SecretString: '{"test_name": "test_value"}'

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  MongoDBApiDestination:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MongoDBApiDestination
      Description: API destination for MongoDB
      Handler: index.handler
      Role: !GetAtt EventBridgeIAMRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = {
              statusCode: 200,
              body: JSON.stringify('MongoDB API destination invoked'),
            };
            return response;
          };
      Runtime: nodejs18.x

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDeadLetterQueue
      MessageRetentionPeriod: 1209600

Outputs:
  EventBusArn:
    Value: !Ref EventBridgeEventBus
    Description: ARN of the EventBridge event bus
  ApiDestinationArn:
    Value: !GetAtt MongoDBApiDestination.Arn
    Description: ARN of the API destination
  QueueUrl:
    Value: !Ref DeadLetterQueue
    Description: URL of the dead-letter queue