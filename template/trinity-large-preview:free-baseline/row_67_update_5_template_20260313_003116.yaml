AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with optional Organization-wide access

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID (optional, leave blank for single-account use)
    Default: ''
    AllowedPattern: '^o-[a-z0-9]{10,32}$|^$'
  BucketName:
    Type: String
    Description: S3 Bucket Name (optional, will generate a unique name if not provided)
    Default: 'default-bucket'
    MaxLength: 63
    MinLength: 3
    AllowedPattern: '^[a-z0-9.-]+$'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref "AWS::NoValue"]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasOrganizationId
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

  OrganizationS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasOrganizationId
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:organizations::${OrganizationId}:root'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

Conditions:
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, '']]
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Outputs:
  BucketName:
    Description: The name of the created S3 bucket
    Value: !Ref S3Bucket