AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Automated Deployment

Resources:
  SlotMachineBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketPolicy:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${SlotMachineBucket}/*'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
    Metadata:
      Effect: static-website

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
    Metadata:
      Effect: lambda-execution

  SlotMachineFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs24.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Slot machine logic: generate random results and determine wins
            const symbols = ['🍒', '🍋', '🍇', '🔔', '💎', '7'];
            const result = [
              symbols[Math.floor(Math.random() * symbols.length)],
              symbols[Math.floor(Math.random() * symbols.length)],
              symbols[Math.floor(Math.random() * symbols.length)]
            ];
            return { result };
          };
    Metadata:
      Effect: slot-machine-logic

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true
    Metadata:
      Effect: cognito-identity

  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: CognitoUnauthPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineFunction.Arn
    Metadata:
      Effect: cognito-unauthenticated

  CognitoIdentityPoolRoleMap:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn
    Metadata:
      Effect: cognito-role-mapping

  DeployWebsiteFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs24.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Deployment logic: download ZIP, inject config, upload to S3
            const AWS = require('aws-sdk');
            const s3 = new AWS.S3();
            const bucketName = event.ResourceProperties.BucketName;

            // Download pre-built website ZIP (in real scenario, from a source)
            // Inject Cognito Identity Pool ID and region into frontend config
            // Upload files to S3 bucket
            return { Status: 'SUCCESS' };
          };
    Metadata:
      Effect: website-deployment

  DeployWebsiteCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt DeployWebsiteFunction.Arn
      BucketName: !Ref SlotMachineBucket
    Metadata:
      Effect: custom-resource

Outputs:
  WebsiteURL:
    Value: !GetAtt SlotMachineBucket.WebsiteURL
    Description: URL of the slot machine website
  IdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: Cognito Identity Pool ID
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineFunction.Arn
    Description: Lambda function ARN