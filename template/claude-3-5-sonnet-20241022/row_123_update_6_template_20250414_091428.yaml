AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe Products API. IMPORTANT: You must provide a valid Stripe API Key when deploying this template.'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: |
      [REQUIRED] Your Stripe API Key (starts with 'sk_'). 
      This key will be used to authenticate requests to the Stripe API.
      Format: sk_test_xxx or sk_live_xxx
    MinLength: 20
    MaxLength: 100
    AllowedPattern: '^sk_(test|live)_[A-Za-z0-9]+$'
    ConstraintDescription: Must be a valid Stripe API key starting with 'sk_test_' or 'sk_live_'
  
  PartnerAppSource:
    Type: String
    Description: Source name for the partner application events
    Default: PartnerApp
    MinLength: 1
    MaxLength: 256
  
  PartnerAppDetailType:
    Type: String
    Description: Detail type for the partner application events
    Default: PartnerAppDetailType
    MinLength: 1
    MaxLength: 256

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Required Authentication"
        Parameters:
          - StripeApiKey
      - Label:
          default: "Event Configuration"
        Parameters:
          - PartnerAppSource
          - PartnerAppDetailType
    ParameterLabels:
      StripeApiKey:
        default: "Stripe API Key (Required - starts with sk_)"

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-bus

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub Bearer ${StripeApiKey}
      Description: Connection to Stripe API
      Name: !Sub ${AWS::StackName}-stripe-conn

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt StripeConnection.Arn
      Description: Stripe Products API Destination
      HttpMethod: POST
      InvocationEndpoint: https://api.stripe.com/v1/products
      InvocationRateLimitPerSecond: 5
      Name: !Sub ${AWS::StackName}-stripe-dest

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to forward events to Stripe API
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref PartnerAppSource
        detail-type:
          - !Ref PartnerAppDetailType
      Name: !Sub ${AWS::StackName}-rule
      State: ENABLED
      Targets:
        - Id: StripeProductsApi
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn
  
  EventBusName:
    Description: Name of the created Event Bus
    Value: !Ref EventBus
  
  ApiDestinationArn:
    Description: ARN of the Stripe API Destination
    Value: !GetAtt StripeApiDestination.Arn
  
  ConnectionArn:
    Description: ARN of the Stripe Connection
    Value: !GetAtt StripeConnection.Arn