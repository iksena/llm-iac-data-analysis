AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure REST API Gateway with DynamoDB for Music Data Management'

Parameters:
  ApiStageName:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name

Resources:
  # DynamoDB Table
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: SongTitle
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: SongTitle
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt MusicTable.Arn
                  - !Sub '${MusicTable.Arn}/*'

  # Create Music Lambda Function
  CreateMusicFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref MusicTable
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key
          import os

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def handler(event, context):
              try:
                  data = json.loads(event['body'])
                  artist = data['artist']
                  song_title = data['song_title']
                  album = data['album']

                  item = {
                      'Artist': artist,
                      'SongTitle': song_title,
                      'Album': album
                  }

                  table.put_item(Item=item)

                  return {
                      'statusCode': 201,
                      'body': json.dumps({'message': 'Music entry created successfully'})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'message': str(e)})
                  }

  # Get Music by Artist Lambda Function
  GetMusicByArtistFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref MusicTable
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def handler(event, context):
              try:
                  artist = event['pathParameters']['artist']

                  response = table.query(
                      IndexName='Artist-Index',
                      KeyConditionExpression='Artist = :artist',
                      ExpressionAttributeValues={':artist': artist}
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps(response['Items'])
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'message': str(e)})
                  }

  # API Gateway
  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi
      Description: API for Music Data Management

  # API Gateway Resource
  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music

  # POST Method for Create Music
  CreateMusicMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt CreateMusicFunction.Arn
      MethodResponses:
        - StatusCode: 201

  # GET Method for Get Music by Artist
  GetMusicByArtistMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.path.artist: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: GET
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt GetMusicByArtistFunction.Arn
        RequestParameters:
          integration.request.path.artist: method.request.path.artist
      MethodResponses:
        - StatusCode: 200

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CreateMusicMethod
      - GetMusicByArtistMethod
    Properties:
      RestApiId: !Ref MusicApi
      StageName: !Ref ApiStageName

  # API Gateway Usage Plan
  MusicUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref ApiStageName
      Throttle:
        BurstLimit: 5
        RateLimit: 100

  # API Gateway API Key
  MusicApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicApiKey
      Description: API Key for Music API
      Enabled: true

  # API Gateway Usage Plan Key
  MusicUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicUsagePlan

  # Lambda Permissions for API Gateway
  CreateMusicPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt CreateMusicFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MusicApi}/*/POST/music'

  GetMusicByArtistPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetMusicByArtistFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MusicApi}/*/GET/music/{artist}'

Outputs:
  ApiURL:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/music'
  ApiKey:
    Description: API Key for accessing the API
    Value: !Ref MusicApiKey
  MusicTableName:
    Description: DynamoDB Table Name
    Value: !Ref MusicTable