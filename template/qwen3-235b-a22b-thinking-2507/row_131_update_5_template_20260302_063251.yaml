AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  MainTopicName:
    Type: String
    Default: CentralAlerts
    Description: Name for the main SNS topic that aggregates alerts
  FallbackEmail:
    Type: String
    Description: Email address for fallback notifications when delivery fails (required)
  MainEmailEndpoint:
    Type: String
    Default: ''
    Description: Email endpoint for main alerts (optional - leave empty to skip)
  MainHttpEndpoint:
    Type: String
    Default: ''
    Description: HTTP/HTTPS endpoint for main alerts (optional - leave empty to skip)
  HttpRetryCount:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 5
    Description: Number of retry attempts for HTTP/S endpoints (1-5)
Conditions:
  ShouldCreateMainEmailSubscription: !Not [!Equals [!Ref MainEmailEndpoint, '']]
  ShouldCreateMainHttpSubscription: !Not [!Equals [!Ref MainHttpEndpoint, '']]
Resources:
  MainAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref MainTopicName
      DisplayName: Centralized Alerting System Main Topic
  MainAlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAWServicesPublish
            Effect: Allow
            Principal:
              Service:
                - cloudwatch.amazonaws.com
                - budgets.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
                - logs.amazonaws.com
            Action: sns:Publish
            Resource: !GetAtt MainAlertTopic.Arn
      Topics:
        - !GetAtt MainAlertTopic.Arn
  MainEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: ShouldCreateMainEmailSubscription
    Properties:
      Endpoint: !Ref MainEmailEndpoint
      Protocol: email
      TopicArn: !Ref MainAlertTopic
  MainHttpSubscription:
    Type: AWS::SNS::Subscription
    Condition: ShouldCreateMainHttpSubscription
    Properties:
      Endpoint: !Ref MainHttpEndpoint
      Protocol: https
      TopicArn: !Ref MainAlertTopic
      DeliveryPolicy: !Sub >-
        {"http": {"defaultThrottlePolicy": {"maxReceivesPerSecond": 10},
        "defaultHealthyRetryPolicy": {"numRetries": ${HttpRetryCount},
        "numNoDelayRetries": 0, "numMinDelayRetries": 0,
        "numMaxDelayRetries": ${HttpRetryCount}, "numProcessingDelayRetries": 0,
        "minDelayTarget": 20, "maxDelayTarget": 20, "backoffFunction": "linear"}}}
  FallbackTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alerting System Fallback Topic
  FallbackEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref FallbackEmail
      Protocol: email
      TopicArn: !Ref FallbackTopic
  FailedNotificationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${MainTopicName}-Delivery-Failure-Alarm'
      AlarmDescription: Triggers when SNS notifications fail to deliver from main topic
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Dimensions:
        - Name: TopicName
          Value: !Ref MainTopicName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref FallbackTopic
      OKActions:
        - !Ref FallbackTopic
      InsufficientDataActions:
        - !Ref FallbackTopic
Outputs:
  MainTopicArn:
    Description: ARN of the main alerting topic
    Value: !Ref MainAlertTopic
  FallbackTopicArn:
    Description: ARN of the fallback topic for delivery failures
    Value: !Ref FallbackTopic
  MainTopicName:
    Description: Name of the main alerting topic
    Value: !Ref MainTopicName
  FallbackEmailSubscriptionArn:
    Description: ARN of the fallback email subscription
    Value: !Ref FallbackEmailSubscription