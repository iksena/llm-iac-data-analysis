AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
  DLQMessageRetentionPeriod:
    Type: Number
    Default: 1209600
  MaxReceiveCount:
    Type: Number
    Default: 5

Resources:
  AllMetricsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref DLQMessageRetentionPeriod

  TemperatureDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref DLQMessageRetentionPeriod

  HumidityDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref DLQMessageRetentionPeriod

  AllMetricsQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  SnsTopic:
    Type: AWS::SNS::Topic

  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic

  TemperatureQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic

  HumidityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsQueue.Arn

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  SnsTopicArn:
    Value: !Ref SnsTopic
    Description: ARN of the central SNS topic

  AllMetricsQueueArn:
    Value: !GetAtt AllMetricsQueue.Arn
    Description: ARN of the All Metrics queue

  TemperatureQueueArn:
    Value: !GetAtt TemperatureSqsQueue.Arn
    Description: ARN of the Temperature filtered queue

  HumidityQueueArn:
    Value: !GetAtt HumiditySqsQueue.Arn
    Description: ARN of the Humidity filtered queue