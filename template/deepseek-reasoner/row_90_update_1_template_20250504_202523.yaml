AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  OwnerEmail:
    Type: String
    Default: u12345678@anu.edu.au

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'imagebuilder-logs-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: OwnerEmail
          Value: !Ref OwnerEmail

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt LogsBucket.Arn
                  - !Sub '${LogsBucket.Arn}/*'
              - Effect: Allow
                Action: s3:ListAllMyBuckets
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  ImageBuilderServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/EC2ImageBuilderAccess
      Policies:
        - PolicyName: PassEC2InstanceRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt EC2InstanceRole.Arn

Outputs:
  LogsBucketName:
    Value: !Ref LogsBucket
    Description: Name of the S3 bucket for storing image build logs
  ImageBuilderInstanceProfile:
    Value: !Ref InstanceProfile
    Description: Instance profile ARN for Image Builder instances
  ImageBuilderServiceRoleARN:
    Value: !GetAtt ImageBuilderServiceRole.Arn
    Description: Service role ARN for EC2 Image Builder