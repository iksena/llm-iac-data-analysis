AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create three IAM managed policies for S3 access and database protection

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'S3Access-${Environment}'
      Description: Managed policy granting read/write access to ios-apps.sagebridge.org S3 bucket for iOS applications
      Path: '/'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - 'arn:aws:s3:::ios-apps.sagebridge.org'
              - 'arn:aws:s3:::ios-apps.sagebridge.org/*'

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'DynamoDBProtection-${Environment}'
      Description: Managed policy explicitly denying destructive DynamoDB operations to prevent accidental data loss
      Path: '/'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: 'arn:aws:dynamodb:*:*:table/*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'RDSProtection-${Environment}'
      Description: Managed policy explicitly denying destructive RDS operations to safeguard databases and backups
      Path: '/'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
            Resource: '*'