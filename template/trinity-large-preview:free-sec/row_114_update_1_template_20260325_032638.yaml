AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange pipeline for EDI X12_214 to JSON transformation

Parameters:
  ProfileName:
    Type: String
    Default: DefaultProfile
    Description: Name of the B2BI profile
  ContactName:
    Type: String
    Default: Business Contact
    Description: Business contact name
  ContactEmail:
    Type: String
    Default: contact@example.com
    Description: Business contact email
  ContactPhone:
    Type: String
    Default: +1234567890
    Description: Business contact phone number
  InputBucketName:
    Type: String
    Default: edi-input-bucket
    Description: Name of the input S3 bucket for EDI files
  OutputBucketName:
    Type: String
    Default: json-output-bucket
    Description: Name of the output S3 bucket for JSON files

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${InputBucketName}/*'

  OutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${OutputBucketName}/*'

  B2BIPipeline:
    Type: AWS::B2BDataInterchange::Profile
    Properties:
      Name: !Ref ProfileName
      BusinessContact:
        Name: !Ref ContactName
        Email: !Ref ContactEmail
        Phone: !Ref ContactPhone
      DocumentSpecifications:
        - DocumentType: X12_214
          DocumentFormat: EDI
          TargetFormat: JSON
          TransformerArn: !GetAtt Transformer.Arn

  Transformer:
    Type: AWS::B2BDataInterchange::Transformer
    Properties:
      Name: X12_214ToJSONTransformer
      DocumentType: X12_214
      SourceFormat: EDI
      TargetFormat: JSON
      MappingLogic: |
        {
          "transformations": [
            {
              "source": "ST",
              "target": "transactionHeader",
              "type": "object"
            },
            {
              "source": "BHT",
              "target": "transactionBody",
              "type": "object"
            }
          ]
        }

  PipelineConfiguration:
    Type: AWS::B2BDataInterchange::Pipeline
    Properties:
      Name: EDIToJSONPipeline
      ProfileArn: !GetAtt B2BIPipeline.Arn
      Source:
        Type: S3
        BucketArn: !GetAtt InputBucket.Arn
        Prefix: edi/
      Target:
        Type: S3
        BucketArn: !GetAtt OutputBucket.Arn
        Prefix: json/
      TransformerArn: !GetAtt Transformer.Arn
      ErrorHandling:
        ErrorBucketArn: !GetAtt OutputBucket.Arn
        ErrorPrefix: errors/

Outputs:
  PipelineEndpoint:
    Description: B2BI Pipeline Endpoint URL
    Value: !GetAtt B2BIPipeline.EndpointUrl
  InputBucketName:
    Description: Input S3 Bucket Name
    Value: !Ref InputBucketName
  OutputBucketName:
    Description: Output S3 Bucket Name
    Value: !Ref OutputBucketName