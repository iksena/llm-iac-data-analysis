AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven integration between DynamoDB streams and EventBridge using Pipes for avatar URL filtering'

Resources:
  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  UserEventsBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventsBus

  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBToEventBridgePipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                Resource: !GetAtt UserTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt UserEventsBus.Arn

  AvatarUpdatePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: AvatarUpdatePipe
      RoleArn: !GetAtt PipeExecutionRole.Arn
      Source: !GetAtt UserTable.StreamArn
      Target: !GetAtt UserEventsBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 100
        FilterCriteria:
          Filters:
            - Pattern: '{"dynamodb":{"NewImage":{"avatarUrl":{"S":[{"suffix":".png"}]}}}}'
      InputTemplate: '{"Source":"com.example.users","DetailType":"UserAvatarUpdate","Detail":<$.dynamodb.NewImage>}'
Outputs:
  PipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt AvatarUpdatePipe.Arn
  EventBusARN:
    Description: ARN of the EventBridge custom bus
    Value: !GetAtt UserEventsBus.Arn
  TableARN:
    Description: ARN of the DynamoDB table
    Value: !GetAtt UserTable.Arn
  PipeName:
    Description: Name of the EventBridge Pipe
    Value: !Ref AvatarUpdatePipe