AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable Security Hub with default standards and consolidated findings'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      ControlFindingsFormat: CONSOLIDATED
      Tags:
        - Key: Purpose
          Value: Security Monitoring
        - Key: Environment
          Value: Production

  CISStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/cis-aws-foundations-benchmark/v/1.2.0'
    DependsOn: SecurityHub

  PCIDSSStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/pci-dss/v/3.2.1'
    DependsOn: SecurityHub

  AWSFoundationalStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

Outputs:
  SecurityHubArn:
    Description: 'The ARN of the Security Hub'
    Value: !GetAtt SecurityHub.Arn

  CISStandardArn:
    Description: 'The ARN of the enabled CIS Standard'
    Value: !Ref CISStandard

  PCIDSSStandardArn:
    Description: 'The ARN of the enabled PCI DSS Standard'
    Value: !Ref PCIDSSStandard

  AWSFoundationalStandardArn:
    Description: 'The ARN of the enabled AWS Foundational Security Best Practices Standard'
    Value: !Ref AWSFoundationalStandard