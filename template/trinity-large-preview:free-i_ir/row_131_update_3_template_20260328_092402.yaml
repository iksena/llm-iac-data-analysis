<i_ir>
{
  "resources": [
    {
      "id": "PrimaryAlertTopic",
      "kind": "AWS::SNS::Topic",
      "fields": {
        "TopicName": "CentralizedAlertTopic",
        "DisplayName": "Centralized Alerting System",
        "KmsMasterKeyId": "alias/aws/sns"
      },
      "effects": ["encrypted"]
    },
    {
      "id": "PrimaryTopicPolicy",
      "kind": "AWS::SNS::TopicPolicy",
      "fields": {
        "PolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": "*",
              "Action": [
                "sns:Publish",
                "sns:Subscribe",
                "sns:Receive"
              ],
              "Resource": {
                "Ref": "PrimaryAlertTopic"
              },
              "Condition": {
                "ArnLike": {
                  "AWS:SourceArn": [
                    "arn:aws:cloudwatch:*:*:alarm",
                    "arn:aws:rds:*:*:*",
                    "arn:aws:s3:*:*:*",
                    "arn:aws:budgets:*:*:*"
                  ]
                }
              }
            }
          ]
        },
        "Topics": [
          {
            "Ref": "PrimaryAlertTopic"
          }
        ]
      },
      "effects": ["public-read"]
    },
    {
      "id": "EmailSubscription",
      "kind": "AWS::SNS::Subscription",
      "fields": {
        "TopicArn": {
          "Ref": "PrimaryAlertTopic"
        },
        "Protocol": "email",
        "Endpoint": {
          "Ref": "EmailEndpoint"
        },
        "FilterPolicy": {
          "service": [
            "cloudwatch",
            "rds",
            "s3",
            "budgets"
          ]
        }
      },
      "effects": ["email"]
    },
    {
      "id": "HTTPSSubscription",
      "kind": "AWS::SNS::Subscription",
      "fields": {
        "TopicArn": {
          "Ref": "PrimaryAlertTopic"
        },
        "Protocol": "https",
        "Endpoint": {
          "Ref": "HTTPSURL"
        },
        "DeliveryPolicy": {
          "healthyRetryPolicy": {
            "minDelayTarget": 20,
            "maxDelayTarget": 20,
            "numRetries": 3,
            "numMaxDelayRetries": 0,
            "backoffFunction": "linear"
          },
          "throttlePolicy": {
            "maxInflight": 10
          }
        },
        "FilterPolicy": {
          "service": [
            "cloudwatch",
            "rds",
            "s3",
            "budgets"
          ]
        }
      },
      "effects": ["webhook"]
    },
    {
      "id": "FallbackAlertTopic",
      "kind": "AWS::SNS::Topic",
      "fields": {
        "TopicName": "FallbackAlertTopic",
        "DisplayName": "Fallback Alerting System",
        "KmsMasterKeyId": "alias/aws/sns"
      },
      "effects": ["encrypted"]
    },
    {
      "id": "FallbackEmailSubscription",
      "kind": "AWS::SNS::Subscription",
      "fields": {
        "TopicArn": {
          "Ref": "FallbackAlertTopic"
        },
        "Protocol": "email",
        "Endpoint": {
          "Ref": "FallbackEmailEndpoint"
        }
      },
      "effects": ["email"]
    },
    {
      "id": "FailedNotificationsAlarm",
      "kind": "AWS::CloudWatch::Alarm",
      "fields": {
        "AlarmName": "FailedNotificationsAlarm",
        "ComparisonOperator": "GreaterThanThreshold",
        "EvaluationPeriods": 1,
        "MetricName": "NumberOfNotificationsFailed",
        "Namespace": "AWS/SNS",
        "Period": 300,
        "Statistic": "Sum",
        "Threshold": 1,
        "AlarmActions": [
          {
            "Ref": "FallbackAlertTopic"
          }
        ],
        "TreatMissingData": "notBreaching"
      },
      "effects": ["monitoring"]
    }
  ],
  "edges": [
    {
      "type": "depends",
      "from": "PrimaryTopicPolicy",
      "to": "PrimaryAlertTopic"
    },
    {
      "type": "depends",
      "from": "EmailSubscription",
      "to": "PrimaryAlertTopic"
    },
    {
      "type": "depends",
      "from": "HTTPSSubscription",
      "to": "PrimaryAlertTopic"
    },
    {
      "type": "depends",
      "from": "FallbackEmailSubscription",
      "to": "FallbackAlertTopic"
    },
    {
      "type": "connects",
      "from": "FailedNotificationsAlarm",
      "to": "FallbackAlertTopic",
      "proto": "https",
      "port": 443
    }
  ],
  "invariants": [
    "SNS topic must be encrypted at rest",
    "Primary topic must allow authorized AWS services to publish",
    "HTTP(S) subscriptions must have retry policies",
    "Failed notifications must trigger fallback mechanism",
    "Email and HTTPS endpoints are optional"
  ]
}
</i_ir>