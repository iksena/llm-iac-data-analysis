AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where Aurora cluster will be deployed

  Subnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for Aurora cluster

  Subnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for Aurora cluster

  DBName:
    Type: String
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    Default: 'auroradb'

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - !Ref Subnet1Id
        - !Ref Subnet2Id

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL cluster
      Family: aurora-mysql8.0
      Parameters:
        server_audit_logging: '1'
        server_audit_logs_upload: '1'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL instances
      Family: aurora-mysql8.0

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/rds/cluster/${DBName}/error'
      RetentionInDays: 30

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: 'Secret for Aurora MySQL database'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.04.1'
      DatabaseName: !Ref DBName
      MasterUsername: admin
      MasterUserPassword: !Join ['', ['{{resolve:secretsmanager:', !Ref DBSecret, ':SecretString:password}}']]
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      VpcSecurityGroupIds: 
        - !Ref DBSecurityGroup
      Port: 3306

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AutoMinorVersionUpgrade: false
      AvailabilityZone: !Select [0, !GetAZs '']

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AutoMinorVersionUpgrade: false
      AvailabilityZone: !Select [1, !GetAZs '']

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt DBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address

  SecretARN:
    Description: Secret ARN for database credentials
    Value: !Ref DBSecret

  ClusterSecurityGroup:
    Description: Security Group ID
    Value: !Ref DBSecurityGroup