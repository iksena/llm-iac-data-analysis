AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Lambda function with Node.js 20.x runtime that prints hello world

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('hello world');
            return {
              statusCode: 200,
              body: JSON.stringify('hello world'),
            };
          };
      Description: Lambda function that prints hello world
      Timeout: 10
      MemorySize: 128