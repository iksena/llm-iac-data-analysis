AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
  RepositoryUrl:
    Type: String
    Default: https://github.com/aws-samples/aws-amplify-todo-sample
  AccessToken:
    Type: String
    NoEcho: true
    Default: ''
  BranchName:
    Type: String
    Default: production

Conditions:
  HasAccessToken: !Not [!Equals [!Ref AccessToken, '']]

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      AccessToken: !If [HasAccessToken, !Ref AccessToken, !Ref AWS::NoValue]

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: !Ref BranchName
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Value: !Ref AmplifyApp
  ProductionBranchURL:
    Value: !GetAtt AmplifyBranch.DomainName