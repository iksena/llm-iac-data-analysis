AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
    MinLength: '1'
    MaxLength: '255'
  RepositoryUrl:
    Type: String
    Description: URL of the Git repository (e.g., https://github.com/username/repo.git)
    MinLength: '1'
  BranchName:
    Type: String
    Default: production
    Description: Name of the production branch
    MinLength: '1'
    MaxLength: '255'
Resources:
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      RepositoryUrl: !Ref RepositoryUrl
      Platform: WEB
  TodoAppProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref TodoAppAmplifyApp
      BranchName: !Ref BranchName
Outputs:
  AmplifyAppId:
    Description: ID of the Amplify application
    Value: !Ref TodoAppAmplifyApp
  AmplifyBranchName:
    Description: Name of the production branch
    Value: !Ref BranchName
  AmplifyAppUrl:
    Description: URL of the deployed application
    Value: !Sub "https://${BranchName}.${TodoAppAmplifyApp.DefaultDomain}"