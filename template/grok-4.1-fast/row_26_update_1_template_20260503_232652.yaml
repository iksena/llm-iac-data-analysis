AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket with EventBridge and SNS integration for Object Created events'

Parameters:
  BucketName:
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    Description: 'Globally unique name for the S3 bucket'
  TopicName:
    Type: String
    Default: 's3-object-created-topic'
    Description: 'Name for the SNS topic'

Resources:
  Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        EventBridgeConfiguration: {}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref TopicName
      DisplayName: 'S3 Object Created Notifications'

  EventRule:
    Type: 'AWS::Events::Rule'
    DependsOn: [Bucket, SNSTopic]
    Properties:
      Description: 'Capture S3 Object Created events and send to SNS'
      EventPattern:
        source:
          - 'aws.s3'
        'detail-type':
          - 'Object Created'
        detail:
          bucket:
            name:
              - !Ref Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: 'SNSTopicTarget'

Outputs:
  BucketName:
    Description: 'Name of the S3 bucket'
    Value: !Ref Bucket
  BucketArn:
    Description: 'ARN of the S3 bucket'
    Value: !GetAtt Bucket.Arn
  TopicArn:
    Description: 'ARN of the SNS topic'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'
  RuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt EventRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'