AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DashboardName:
    Type: String
    Default: NATGatewayFlowLogsDashboard
    Description: Name for the CloudWatch Dashboard
  VPCFlowLogsLogGroupName:
    Type: String
    Default: "/aws/vpc/flow-logs"
    Description: Name of existing VPC Flow Logs Log Group (default: /aws/vpc/flow-logs)
Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs - Outbound Traffic (Table)",
                "view": "table",
                "region": "${AWS::Region}",
                "query": "fields @timestamp, srcaddr, bytes\n| filter interfaceId like 'eni-'\n| stats sum(bytes) as totalBytes by srcaddr\n| sort totalBytes desc\n| limit 10",
                "logGroups": ["arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${VPCFlowLogsLogGroupName}:*"]
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs - Outbound Traffic (Chart)",
                "view": "bar",
                "region": "${AWS::Region}",
                "query": "fields @timestamp, srcaddr, bytes\n| filter interfaceId like 'eni-'\n| stats sum(bytes) as totalBytes by srcaddr\n| sort totalBytes desc\n| limit 10",
                "logGroups": ["arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${VPCFlowLogsLogGroupName}:*"]
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs - Rejects (Table)",
                "view": "table",
                "region": "${AWS::Region}",
                "query": "fields @timestamp, srcaddr, action\n| filter interfaceId like 'eni-' and action='REJECT'\n| stats count() as rejectCount by srcaddr\n| sort rejectCount desc\n| limit 10",
                "logGroups": ["arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${VPCFlowLogsLogGroupName}:*"]
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs - Rejects (Chart)",
                "view": "bar",
                "region": "${AWS::Region}",
                "query": "fields @timestamp, srcaddr, action\n| filter interfaceId like 'eni-' and action='REJECT'\n| stats count() as rejectCount by srcaddr\n| sort rejectCount desc\n| limit 10",
                "logGroups": ["arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${VPCFlowLogsLogGroupName}:*"]
              }
            }
          ]
        }
Outputs:
  DashboardName:
    Description: Created CloudWatch Dashboard name
    Value: !Ref DashboardName
  DashboardURL:
    Description: CloudWatch Dashboard console URL
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"