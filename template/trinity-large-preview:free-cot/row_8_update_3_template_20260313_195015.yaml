AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard for NAT Gateway VPC Flow Logs Analysis

Parameters:
  DashboardName:
    Type: String
    Default: NATGatewayFlowLogsDashboard
    Description: Name of the CloudWatch Dashboard
  LogGroupName:
    Type: String
    Default: /vpc/flowlogs
    Description: Name of the VPC Flow Log group
  RefreshInterval:
    Type: Number
    Default: 900
    Description: Dashboard auto-refresh interval in seconds

Resources:
  CloudWatchLogsInsightsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - logs.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/CloudWatchLogsInsightsServiceRolePolicy

  TopSourceIPsOutboundQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsOutbound
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, srcAddr, bytes
        | filter interfaceId like 'eni-' and destinationPrefixListIds = []
        | stats sum(bytes) as totalBytes by srcAddr
        | sort totalBytes desc
        | limit 20

  TopSourceIPsRejectedQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsRejected
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, srcAddr, action
        | filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedCount by srcAddr
        | sort rejectedCount desc
        | limit 20

  TopDestinationIPsOutboundQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPsOutbound
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, destAddr, bytes
        | filter interfaceId like 'eni-' and destinationPrefixListIds = []
        | stats sum(bytes) as totalBytes by destAddr
        | sort totalBytes desc
        | limit 20

  TopDestinationIPsRejectedQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPsRejected
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, destAddr, action
        | filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedCount by destAddr
        | sort rejectedCount desc
        | limit 20

  NATGatewayFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '~/${TopSourceIPsOutboundQuery}'",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic",
                "view": "table",
                "stacked": false,
                "stat": "Average",
                "period": 300,
                "refreshInterval": ${RefreshInterval}
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '~/${TopSourceIPsRejectedQuery}'",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connections",
                "view": "table",
                "stacked": false,
                "stat": "Average",
                "period": 300,
                "refreshInterval": ${RefreshInterval}
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '~/${TopDestinationIPsOutboundQuery}'",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Outbound Traffic",
                "view": "table",
                "stacked": false,
                "stat": "Average",
                "period": 300,
                "refreshInterval": ${RefreshInterval}
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "SOURCE '~/${TopDestinationIPsRejectedQuery}'",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Rejected Connections",
                "view": "table",
                "stacked": false,
                "stat": "Average",
                "period": 300,
                "refreshInterval": ${RefreshInterval}
              }
            }
          ]
        }