AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Timestream database and tables with configurable retention policies

Parameters:
  DatabaseName:
    Type: String
    Default: poc-database
    Description: Name of the Timestream database to create
  KmsKeyId:
    Type: String
    Default: ""
    Description: KMS key ID for database encryption (optional)

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName
      KmsKeyId: !Ref KmsKeyId

  TimestreamTableBatchWrite:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 72
        MagneticStoreRetentionPeriodInDays: 7

  TimestreamTableOlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 0

  TimestreamTableOlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 30

  TimestreamTableCommonAttributes:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 168
        MagneticStoreRetentionPeriodInDays: 30

Outputs:
  DatabaseName:
    Description: Timestream Database Name
    Value: !Ref DatabaseName
  DatabaseArn:
    Description: Timestream Database ARN
    Value: !GetAtt TimestreamDatabase.Arn
  TableBatchWriteArn:
    Description: Timestream Batch Write Table ARN
    Value: !GetAtt TimestreamTableBatchWrite.Arn
  TableOlderRecordsMemOnlyArn:
    Description: Timestream Older Records Mem Only Table ARN
    Value: !GetAtt TimestreamTableOlderRecordsMemOnly.Arn
  TableOlderRecordsMagneticArn:
    Description: Timestream Older Records Magnetic Table ARN
    Value: !GetAtt TimestreamTableOlderRecordsMagnetic.Arn
  TableCommonAttributesArn:
    Description: Timestream Common Attributes Table ARN
    Value: !GetAtt TimestreamTableCommonAttributes.Arn