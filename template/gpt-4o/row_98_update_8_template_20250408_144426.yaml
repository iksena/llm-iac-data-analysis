AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application for a TodoApp.'

Parameters:
  GitHubRepositoryOwner:
    Type: String
    Description: 'The owner of the GitHub repository containing the TodoApp source code.'
  GitHubRepositoryName:
    Type: String
    Description: 'The name of the GitHub repository containing the TodoApp source code.'
  GitHubBranchName:
    Type: String
    Description: 'The branch of the GitHub repository to deploy.'
    Default: 'main'
  GitHubOAuthToken:
    Type: String
    Description: 'The OAuth token for accessing the GitHub repository.'
    NoEcho: true

Resources:
  AmplifyApp:
    Type: 'AWS::Amplify::App'
    Properties:
      Name: 'TodoApp'
      Repository: !Sub 'https://github.com/${GitHubRepositoryOwner}/${GitHubRepositoryName}'
      OauthToken: !Ref GitHubOAuthToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: /build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: 'AWS::Amplify::Branch'
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: !Ref GitHubBranchName
      Stage: 'PRODUCTION'

Outputs:
  AmplifyAppURL:
    Description: 'The URL of the deployed AWS Amplify application.'
    Value: !Sub 'https://${GitHubBranchName}.${AmplifyApp.DefaultDomain}'
  AmplifyAppArn:
    Description: 'The ARN of the AWS Amplify application.'
    Value: !GetAtt [AmplifyApp, Arn]
```

**Instructions for Secure Deployment:**

- When deploying the CloudFormation stack, ensure that you provide the `GitHubOAuthToken` parameter securely. This can be done through the AWS Management Console, AWS CLI, or any other deployment tool that supports parameter input.

- If using the AWS CLI, you can pass the token as follows:
  ```bash
  aws cloudformation create-stack --stack-name MyAmplifyAppStack --template-body file://template.yaml --parameters ParameterKey=GitHubRepositoryOwner,ParameterValue=your-github-username ParameterKey=GitHubRepositoryName,ParameterValue=your-repo-name ParameterKey=GitHubBranchName,ParameterValue=main ParameterKey=GitHubOAuthToken,ParameterValue=your-github-oauth-token
  ```

- Ensure that the OAuth token is kept secure and not exposed in logs or version control systems.