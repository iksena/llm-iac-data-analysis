AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Bedrock service with agent permissions and Lambda integration

Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: BedrockAgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:agent:CreateAgent
                  - bedrock:agent:CreateAgentAlias
                  - bedrock:agent:CreateAgentActionGroup
                  - bedrock:agent:CreateAgentVersion
                  - bedrock:agent:DeleteAgent
                  - bedrock:agent:DeleteAgentAlias
                  - bedrock:agent:DeleteAgentActionGroup
                  - bedrock:agent:DeleteAgentVersion
                  - bedrock:agent:GetAgent
                  - bedrock:agent:GetAgentAlias
                  - bedrock:agent:GetAgentActionGroup
                  - bedrock:agent:GetAgentVersion
                  - bedrock:agent:ListAgents
                  - bedrock:agent:ListAgentAliases
                  - bedrock:agent:ListAgentActionGroups
                  - bedrock:agent:ListAgentVersions
                  - bedrock:agent:UpdateAgent
                  - bedrock:agent:UpdateAgentAlias
                  - bedrock:agent:UpdateAgentActionGroup
                  - bedrock:agent:InvokeAgent
                  - bedrock:agent:InvokeInlineAgent
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'