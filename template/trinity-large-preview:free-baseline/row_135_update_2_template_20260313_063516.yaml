AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudFront distribution fronting an API Gateway REST API with a mock backend.

Parameters:
  APIName:
    Type: String
    Default: HelloWorldAPI
    Description: Name of the API Gateway REST API
  LambdaFunctionName:
    Type: String
    Default: HelloWorldFunction
    Description: Name of the Lambda function

Resources:
  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = {
              statusCode: 200,
              body: JSON.stringify('hello world'),
            };
            return response;
          };

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloWorldAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref APIName
      Description: API Gateway for hello world endpoint

  HelloWorldResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HelloWorldAPI
      ParentId: !GetAtt HelloWorldAPI.RootResourceId
      PathPart: hello

  HelloWorldMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HelloWorldAPI
      ResourceId: !Ref HelloWorldResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt HelloWorldFunction.Arn

  HelloWorldDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: HelloWorldMethod
    Properties:
      RestApiId: !Ref HelloWorldAPI
      StageName: production

  HelloWorldFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HelloWorldFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/*/GET/hello
        - RestApiId: !Ref HelloWorldAPI

  HelloWorldDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: CloudFront distribution for API Gateway
        Origins:
          - DomainName: !Sub
              - ${RestApiId}.execute-api.${AWS::Region}.amazonaws.com
              - RestApiId: !Ref HelloWorldAPI
            Id: APIGatewayOrigin
            OriginPath: /production
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        Enabled: true
        DefaultRootObject: hello
        DefaultCacheBehavior:
          TargetOriginId: APIGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: false
          ForwardedValues:
            QueryString: true
            Headers:
              - Authorization
            Cookies:
              Forward: none
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${HelloWorldDistribution.DomainName}'
  APIGatewayURL:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HelloWorldAPI}.execute-api.${AWS::Region}.amazonaws.com/production/hello'
  LambdaARN:
    Description: Lambda function ARN
    Value: !GetAtt HelloWorldFunction.Arn