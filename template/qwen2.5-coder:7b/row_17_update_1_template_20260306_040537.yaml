AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EmailAddress:
    Type: String
    Description: Email address to receive billing alerts
    Default: xxxxx@gmail.com

Resources:
  BillingSNS:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: BillingAlerts

  BillingEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref EmailAddress
      TopicArn: !Ref BillingSNS

  EstimatedChargesAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EstimatedCharges5
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Period: 21600
      Statistic: Sum
      Threshold: 5
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingSNS

  EstimatedChargesAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EstimatedCharges10
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Period: 21600
      Statistic: Sum
      Threshold: 10
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingSNS

  EstimatedChargesAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EstimatedCharges20
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Period: 21600
      Statistic: Sum
      Threshold: 20
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingSNS

  EstimatedChargesAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EstimatedCharges40
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: EstimatedCharges
      Namespace: AWS/Billing
      Period: 21600
      Statistic: Sum
      Threshold: 40
      TreatMissingData: breaching
      AlarmActions:
        - !Ref BillingSNS

Outputs:
  SNSArn:
    Description: SNS Topic ARN
    Value: !Ref BillingSNS
    Export:
      Name: BillingSNSArn

  AlarmNames:
    Description: List of Alarm Names
    Value: !Join [', ', [!Ref EstimatedChargesAlarm5, !Ref EstimatedChargesAlarm10, !Ref EstimatedChargesAlarm20, !Ref EstimatedChargesAlarm40]]
    Export:
      Name: AlarmNames