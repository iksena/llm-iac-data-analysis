AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Logs Insights Queries for Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'Client VPN Endpoint ID to monitor'
    
  DashboardName:
    Type: String
    Description: 'Name for the CloudWatch Dashboard'
    Default: 'ClientVPNMonitoring'

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: 
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "ActiveConnectionsCount", "Endpoint", "${VPNEndpointId}" ]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "Active VPN Connections"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "ConnectionAttemptCount", "Endpoint", "${VPNEndpointId}" ]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Connection Attempts"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "IngressBytes", "Endpoint", "${VPNEndpointId}" ],
                    [ ".", "EgressBytes", ".", "." ]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Data Transfer"
                }
              },
              {
                "type": "metric",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "AuthenticationFailures", "Endpoint", "${VPNEndpointId}" ]
                  ],
                  "period": 300,
                  "stat": "Sum",
                  "region": "${AWS::Region}",
                  "title": "Authentication Failures"
                }
              }
            ]
          }

Outputs:
  DashboardURL:
    Description: 'URL for the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'