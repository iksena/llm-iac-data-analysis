AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-RiskManagementData"
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt RiskManagementTable.Arn
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:log-stream:*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref RiskAlertsTopic
  RiskDataIngestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-RiskDataIngestion"
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          
          def handler(event, context):
              table_name = os.environ['TABLE_NAME']
              dynamodb = boto3.resource('dynamodb')
              table = dynamodb.Table(table_name)
              
              # Example: Store risk data
              if 'workload_id' in event and 'question_id' in event:
                  table.put_item(
                      Item={
                          'workload_id': event['workload_id'],
                          'question_id': event['question_id'],
                          'response': event.get('response', 'N/A'),
                          'status': event.get('status', 'PENDING')
                      }
                  )
                  return {'status': 'SUCCESS', 'message': 'Risk data stored'}
              
              return {'status': 'ERROR', 'message': 'Missing required parameters'}
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
  RiskAnalysisFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-RiskAnalysis"
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          
          def handler(event, context):
              table_name = os.environ['TABLE_NAME']
              dynamodb = boto3.resource('dynamodb')
              table = dynamodb.Table(table_name)
              
              # Example: Analyze risk data
              if 'workload_id' in event:
                  response = table.query(
                      KeyConditionExpression='workload_id = :wid',
                      ExpressionAttributeValues={':wid': event['workload_id']}
                  )
                  
                  # Check for high-risk items
                  high_risk_items = [item for item in response['Items'] 
                                    if item.get('risk_level') == 'HIGH']
                  
                  if high_risk_items:
                      sns = boto3.client('sns')
                      sns.publish(
                          TopicArn=os.environ['ALERT_TOPIC_ARN'],
                          Message=f"High risk items detected for workload {event['workload_id']}",
                          Subject="Risk Management Alert"
                      )
                      return {'status': 'ALERT_SENT', 'count': len(high_risk_items)}
              
              return {'status': 'ANALYSIS_COMPLETE', 'message': 'No high-risk items found'}
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          ALERT_TOPIC_ARN: !Ref RiskAlertsTopic
  RiskAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-RiskManagementAlerts"
  RiskAlertsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskAlertsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSMOpsCenterPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskAlertsTopic
Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table for risk management data
    Value: !Ref RiskManagementTable
  IngestionFunctionName:
    Description: Name of the risk data ingestion Lambda function
    Value: !Ref RiskDataIngestionFunction
  AnalysisFunctionName:
    Description: Name of the risk analysis Lambda function
    Value: !Ref RiskAnalysisFunction
  AlertsTopicArn:
    Description: ARN of the SNS topic for risk notifications
    Value: !Ref RiskAlertsTopic
  LambdaRoleArn:
    Description: ARN of the IAM role used by Lambda functions
    Value: !GetAtt LambdaExecutionRole.Arn