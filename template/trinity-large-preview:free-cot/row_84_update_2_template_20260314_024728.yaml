AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Macie Session for Automated Sensitive Data Discovery and Security Monitoring

Resources:
  MacieServiceLinkedRole:
    Type: AWS::IAM::ServiceLinkedRole
    Properties:
      AWSServiceName: macie.amazonaws.com
      Description: Service-linked role for AWS Macie

  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      FindingPublishingFrequency: FIFTEEN_MINUTES
      Status: ENABLED

Outputs:
  MacieSessionStatus:
    Description: Status of the Macie session
    Value: ENABLED
    Export:
      Name: MacieSessionStatus

  MacieSessionServiceRole:
    Description: Service role ARN of the Macie session
    Value: !GetAtt MacieSession.ServiceRole
    Export:
      Name: MacieSessionServiceRole