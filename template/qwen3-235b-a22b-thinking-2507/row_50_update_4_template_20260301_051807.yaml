AWSTemplateFormatVersion: '2010-09-09'
Description: 'Scalable URL-to-PNG screenshot service with load testing and S3/SQS integration'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    AllowedPattern: '^[a-zA-Z0-9\\(\\)_\\.\\-\\/\\@]+$|^\\s*$'
    ConstraintDescription: Must be a valid key pair name
  InstanceType:
    Description: EC2 instance type for worker nodes
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - m5.large
  LoadTestCount:
    Description: Number of test URLs to generate during load testing
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100
  MinInstances:
    Description: Minimum number of worker instances
    Type: Number
    Default: 1
    MinValue: 1
  MaxInstances:
    Description: Maximum number of worker instances
    Type: Number
    Default: 2
    MinValue: 1
  QueueThreshold:
    Description: SQS message count triggering scale-out
    Type: Number
    Default: 1
    MinValue: 1

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ScreenshotServiceVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ScreenshotServiceIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  Subnet2RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Purpose
          Value: ScreenshotStorage

  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ScreenshotWorkerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ScreenshotQueue.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub "${ScreenshotBucket.Arn}/*"

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WorkerRole

  LoadTesterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: LoadTesterPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt ScreenshotQueue.Arn

  LoadTesterInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LoadTesterRole

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for screenshot workers
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  LoadTesterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for load test instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ScreenshotWorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: ScreenshotWorkerTemplate
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt WorkerInstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt WorkerSecurityGroup.GroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install -y chromium picolisp xorg-x11-server-Xvfb jq
            mkdir -p /opt/screenshot-worker
            cat > /opt/screenshot-worker/worker.sh << 'EOF'
            #!/bin/bash
            while true; do
              MESSAGE=\\$(aws sqs receive-message --queue-url ${ScreenshotQueue} --max-number-of-messages 1 --wait-time-seconds 20)
              if [ -z "\\$MESSAGE" ]; then continue; fi
              
              URL=\\$(echo "\\$MESSAGE" | jq -r '.Messages[0].Body')
              RECEIPT_HANDLE=\\$(echo "\\$MESSAGE" | jq -r '.Messages[0].ReceiptHandle')
              
              if [ "\\$URL" = "null" ] || [ -z "\\$URL" ]; then
                aws sqs delete-message --queue-url ${ScreenshotQueue} --receipt-handle "\\$RECEIPT_HANDLE"
                continue
              fi
              
              OUTPUT_FILE="/tmp/\\$(date +%s).png"
              xvfb-run --server-args="-screen 0 1024x768x24" chromium-browser --headless --disable-gpu --screenshot="\\$OUTPUT_FILE" --window-size=1024,768 "\\$URL"
              
              if [ -f "\\$OUTPUT_FILE" ]; then
                aws s3 cp "\\$OUTPUT_FILE" s3://${ScreenshotBucket}/screenshots/\\$(date +%Y%m%d)/\\$(uuidgen).png
                rm -f "\\$OUTPUT_FILE"
              fi
              
              aws sqs delete-message --queue-url ${ScreenshotQueue} --receipt-handle "\\$RECEIPT_HANDLE"
            done
            EOF
            chmod +x /opt/screenshot-worker/worker.sh
            nohup /opt/screenshot-worker/worker.sh > /var/log/screenshot-worker.log 2>&1 &
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ScreenshotWorker

  ScreenshotAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref ScreenshotWorkerLaunchTemplate
        Version: !GetAtt ScreenshotWorkerLaunchTemplate.LatestVersionNumber
      MinSize: !Ref MinInstances
      MaxSize: !Ref MaxInstances
      DesiredCapacity: !Ref MinInstances
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: ScreenshotWorkerASG
          PropagateAtLaunch: true
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT5M
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: !Ref MinInstances
        MaxBatchSize: 1
        PauseTime: PT5M
        SuspendProcesses:
          - HealthCheck
          - ReplaceUnhealthy
          - AZRebalance

  SQSQueueDepthAlarmScaleOut:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale out when queue depth exceeds threshold
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref QueueThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScreenshotScaleOutPolicy
      OKActions:
        - !Ref ScreenshotScaleInPolicy
      TreatMissingData: notBreaching

  SQSQueueDepthAlarmScaleIn:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale in when queue is empty
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      AlarmActions:
        - !Ref ScreenshotScaleInPolicy
      OKActions:
        - !Ref ScreenshotScaleOutPolicy
      TreatMissingData: notBreaching

  ScreenshotScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref ScreenshotAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  ScreenshotScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref ScreenshotAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  LoadTesterInstance:
    Type: AWS::EC2::Instance
    DependsOn: ScreenshotQueue
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.nano
      IamInstanceProfile: !Ref LoadTesterInstanceProfile
      SecurityGroupIds:
        - !GetAtt LoadTesterSecurityGroup.GroupId
      SubnetId: !Ref PublicSubnet1
      KeyName: !Ref KeyName
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          for i in $(seq 1 ${LoadTestCount}); do
            aws sqs send-message --queue-url ${ScreenshotQueue} --message-body "https://example.com?test=$i"
          done
          echo "Sent ${LoadTestCount} test URLs to SQS"
      Tags:
        - Key: Name
          Value: ScreenshotLoadTester

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket storing screenshots
    Value: !Ref ScreenshotBucket
  SQSQueueUrl:
    Description: URL of the SQS queue for screenshot requests
    Value: !Ref ScreenshotQueue
  LoadTesterPublicIp:
    Description: Public IP address of the load test instance
    Value: !GetAtt LoadTesterInstance.PublicIp
  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group managing workers
    Value: !Ref ScreenshotAutoScalingGroup