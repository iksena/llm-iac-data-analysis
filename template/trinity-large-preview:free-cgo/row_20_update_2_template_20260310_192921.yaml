AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ClientVPNAnalysisDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAnalysisDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Analysis Dashboard"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Connection Duration" } ],
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Connection Duration" } ],
                  [ "AWS/ClientVPN", "ConnectionDuration", "AuthenticationMethod", "Mixed Auth", { "label": "Mixed Auth Connection Duration" } ]
                ],
                "region": "us-east-1",
                "title": "Connection Duration by Authentication Method"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "BytesIn", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Ingress" } ],
                  [ "AWS/ClientVPN", "BytesOut", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Egress" } ],
                  [ "AWS/ClientVPN", "BytesIn", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Ingress" } ],
                  [ "AWS/ClientVPN", "BytesOut", "AuthenticationMethod", "Mutual Auth", { "label": "Mutual Auth Egress" } ]
                ],
                "region": "us-east-1",
                "title": "Data Transfer Volumes by Authentication Method"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationAnalysis
      LogGroupNames:
        - /aws/client-vpn-endpoint
      QueryString: |
        fields @timestamp, connectionId, userId, authenticationMethod, connectionStartTime, connectionEndTime
        | filter connectionStartTime != null and connectionEndTime != null
        | stats avg(duration) as avgDuration, count(*) as totalConnections by authenticationMethod
        | sort avgDuration desc

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferAnalysis
      LogGroupNames:
        - /aws/client-vpn-endpoint
      QueryString: |
        fields @timestamp, connectionId, userId, authenticationMethod, bytesIn, bytesOut
        | stats sum(bytesIn) as totalIngress, sum(bytesOut) as totalEgress by authenticationMethod
        | sort totalIngress desc

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityAnalysis
      LogGroupNames:
        - /aws/client-vpn-endpoint
      QueryString: |
        fields @timestamp, connectionId, userId, authenticationMethod
        | stats count(*) as connectionCount, distinct(userId) as uniqueUsers by authenticationMethod
        | sort connectionCount desc

  EndpointUsageQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: EndpointUsageAnalysis
      LogGroupNames:
        - /aws/client-vpn-endpoint
      QueryString: |
        fields @timestamp, connectionId, endpointId, userId, authenticationMethod
        | stats count(*) as connectionCount by endpointId, authenticationMethod
        | sort connectionCount desc

Outputs:
  DashboardName:
    Description: Name of the Client VPN Analysis Dashboard
    Value: !Ref ClientVPNAnalysisDashboard
  DashboardArn:
    Description: ARN of the Client VPN Analysis Dashboard
    Value: !Sub "arn:${AWS::Partition}:cloudwatch:${AWS::Region}:${AWS::AccountId}:dashboard/${ClientVPNAnalysisDashboard}"