AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  NotificationEmail:
    Type: String
    Description: Email address for receiving secret lifecycle notifications

Resources:
  SecretsMonitoringSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerLifecycleNotifications

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsMonitoringSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SecretsMonitoringSNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SecretsMonitoringSNSTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  SecretsLifecycleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Detect Secrets Manager create/update/access events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - GetSecretValue
      Targets:
        - Arn: !Ref SecretsMonitoringSNSTopic
          Id: SecretsManagerSNSTarget

Outputs:
  NotificationTopicARN:
    Value: !Ref SecretsMonitoringSNSTopic
    Description: ARN for secret lifecycle notifications SNS topic