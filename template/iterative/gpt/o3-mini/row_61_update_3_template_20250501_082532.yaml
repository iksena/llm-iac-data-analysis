AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template creates a private Amazon Route 53 Hosted Zone for internal DNS management
  within the specified VPC. The hosted zone's domain is "www.example.com".

Parameters:
  VPCId:
    Description: "The ID of the VPC to associate with the private hosted zone."
    Type: AWS::EC2::VPC::Id

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: "Private Route 53 Hosted Zone for internal DNS management within the provided VPC."

Outputs:
  HostedZoneId:
    Description: "The ID of the created private hosted zone."
    Value: !Ref PrivateHostedZone