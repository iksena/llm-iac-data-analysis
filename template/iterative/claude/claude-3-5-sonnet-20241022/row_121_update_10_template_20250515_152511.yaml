AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated EC2 management using EventBridge Scheduler and Systems Manager'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Select an existing VPC ID
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select a subnet within the selected VPC
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Select an existing EC2 key pair
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type for Linux
  WindowsInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type for Windows

Mappings:
  RegionMap:
    us-east-1:
      Linux: ami-0440d3b780d96b29d
      Windows: ami-0d86c69530d0a048e
    us-west-2:
      Linux: ami-0735c191cf914754d
      Windows: ami-0054160a688f96c3b

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2Role

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                  - ssm:CreateAssociation
                Resource: '*'

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for HelloWorld instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', Linux]
      InstanceType: !Ref LinuxInstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyPairName
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: HelloWorld-Linux

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', Windows]
      InstanceType: !Ref WindowsInstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyPairName
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: HelloWorld-Windows

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: "2.2"
        description: "Cross-platform HelloWorld commands"
        parameters: {}
        mainSteps:
          - action: "aws:runPowerShellScript"
            name: WindowsHello
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
            precondition:
              StringEquals:
                - platformType
                - Windows
          - action: "aws:runShellScript"
            name: LinuxHello
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
            precondition:
              StringEquals:
                - platformType
                - Linux

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - "true"
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-outputs

  SchedulerGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: HelloWorldGroup

  HelloWorldSchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn: SchedulerGroup
    Properties:
      GroupName: HelloWorldGroup
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: "rate(15 minutes)"
      Target:
        RoleArn: !GetAtt SchedulerRole.Arn
        Arn: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}"
        Input: "{}"
      State: ENABLED

Outputs:
  LinuxInstanceId:
    Description: ID of Linux Instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: ID of Windows Instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of S3 bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of EventBridge Schedule
    Value: !Ref HelloWorldSchedule
  SSMDocumentArn:
    Description: ARN of SSM Document
    Value: !Ref SSMDocument