AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge Pipes workflow for SQS message enrichment and logging.

Resources:
  EventBridgePipesIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: SQSAndAPIAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudWatchLogGroup.Arn

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-SQSQueue

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-LogGroup
      RetentionInDays: 30

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-EventBridgePipe
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SQSQueue.QueueUrl
      Target:
        TargetType: AwsManaged
        TargetParameters:
          CloudWatchLogsParameters:
            InputTemplate: |-
              {
                "message": {
                  "body": "$.detail.body",
                  "apiResponse": "$.detail.apiResponse"
                }
              }
            LogGroupName: !Ref CloudWatchLogGroup
        PipeTargetDetails:
          EndpointType: ApiDestination
          EndpointId: !Ref APIDestination
          HttpMethod: GET
          PathTemplate: '/us/{zipCode}'
          QueryParameters:
            - Key: 'zipCode'
              Value: '$body.zipCode'
          ResponseTemplate: |-
            {
              "apiResponse": $body
            }
      RoleArn: !GetAtt EventBridgePipesIAMRole.Arn

  APIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub ${AWS::StackName}-APIDestination
      ConnectionArn: !GetAtt APIConnection.Arn
      InvocationEndpoint: 'https://api.zippopotam.us'
      HttpMethod: GET

  APIConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: 'zippopotam-api-key'
        ApiKeyValue: 'dummy-api-key'  # This should be replaced with a real API key

Outputs:
  EventBridgePipeArn:
    Description: The ARN of the created EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn