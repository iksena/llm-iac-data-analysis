AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template that integrates DynamoDB Streams with Amazon EventBridge using EventBridge Pipes. The Pipe routes DynamoDB stream events to the default EventBridge bus with pre-defined metadata."

Parameters:
  DynamoDBTableName:
    Description: "Name of the DynamoDB table."
    Type: String
    Default: "UserTable"

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "DynamoDBPipeRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: "PipeDynamoDBEventBridgePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"

  DynamoDBStreamToEventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: "DynamoDBStreamToEventBridgePipe"
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: TRIM_HORIZON
          BatchSize: 100
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "DynamoDB_Stream_Event"
          Source: "custom.dynamodb"

Outputs:
  DynamoDBTableOutput:
    Description: "The name of the DynamoDB table created."
    Value: !Ref DynamoDBTable
  EventBridgePipeOutput:
    Description: "The ARN of the EventBridge Pipe connecting DynamoDB Streams to EventBridge."
    Value: !GetAtt DynamoDBStreamToEventBridgePipe.Arn