AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Cross-Account Trust and Role-Based Access Controls

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: '123456789012'
  TrustedToolingManagementAccount:
    Type: String
    Default: '234567890123'
  OrganizationId:
    Type: String
    Default: 'o-xxxxxxxxxx'

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'cloudformation:*'
                  - 's3:*'
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'macie:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'aws-portal:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/PowerUserAccess'
      Policies:
        - PolicyName: DenySensitiveOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - 'aws-portal:ViewBilling'
                  - 'aws-portal:ModifyBilling'
                  - 'cloudhsm:*'
                Resource: '*'

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 's3:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'macie:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/IAMFullAccess'
        - 'arn:aws:iam::aws:policy/AWSOrganizationsFullAccess'
      Policies:
        - PolicyName: IdentityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:*'
                  - 's3:*'
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'macie:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'aws-portal:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSCloudFormationFullAccess'
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 's3:*'
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'macie:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'aws-portal:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSCloudFormationStackSetAdministration'
      Policies:
        - PolicyName: StackSetExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 's3:*'
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'macie:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'aws-portal:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

Outputs:
  PrivilegedAdminRoleArn:
    Description: ARN of the PrivilegedAdminRole
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of the RestrictedAdminRole
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of the IdentityAdminRole
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormationExecutionRole
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of the StackSetExecutionRole
    Value: !GetAtt StackSetExecutionRole.Arn