AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue for production use.

Parameters:
  QueueName:
    Description: Name of the SQS FIFO Queue. Must end with ".fifo"
    Type: String
    Default: MyFifoQueue.fifo
    ConstraintDescription: The queue name must end with ".fifo" for FIFO queues.

Resources:
  SQSFifoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: true

Outputs:
  QueueURL:
    Description: URL of the created SQS FIFO Queue.
    Value: !Ref SQSFifoQueue
  QueueArn:
    Description: ARN of the created SQS FIFO Queue.
    Value: !GetAtt SQSFifoQueue.Arn