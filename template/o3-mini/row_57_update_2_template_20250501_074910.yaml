AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that creates an Amazon ECS Cluster with configurable monitoring (container insights) capabilities.
Parameters:
  ClusterName:
    Description: "The name of the ECS Cluster"
    Type: String
    Default: "ECSCluster"
  ContainerInsightsEnabled:
    Description: "Enable Container Insights for monitoring (true/false)"
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
Conditions:
  IsContainerInsightsEnabled: 
    Fn::Equals: 
      - !Ref ContainerInsightsEnabled
      - "true"
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      ClusterSettings: 
        Fn::If:
          - IsContainerInsightsEnabled
          - - Name: containerInsights
              Value: enabled
          - !Ref AWS::NoValue
Outputs:
  ClusterNameOutput:
    Description: "The name of the ECS Cluster"
    Value: !Ref ECSCluster
  ClusterArnOutput:
    Description: "The ARN of the ECS Cluster"
    Value: !GetAtt [ECSCluster, Arn]