AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to enable AWS GuardDuty for continuous security monitoring of EC2 instances'

Parameters:
  EnableGuardDuty:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable or disable GuardDuty detector
  
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: Frequency of findings publication

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: !Ref EnableGuardDuty
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      DataSources:
        S3Logs:
          Enable: true
        Kubernetes:
          AuditLogs:
            Enable: false
        Malware:
          ScanEc2InstanceWithFindings:
            EbsVolumes: true
        EksAuditLogs:
          Enable: false
        EksRuntimeMonitoring:
          Enable: false
        FlowLogs:
          Enable: true
        Dns:
          Enable: true

Outputs:
  DetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector
  
  GuardDutyStatus:
    Description: The status of GuardDuty (enabled/disabled)
    Value: !Ref EnableGuardDuty