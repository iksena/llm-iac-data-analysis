AWSTemplateFormatVersion: '2010-09-09'
Description: Production VPC with Security Group
Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  SecurityGroupIngressPorts:
    Type: CommaDelimitedList
    Default: '80,443'
    Description: Comma-separated list of inbound ports to open (0-65535)

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Production security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        Fn::ForEach:
          - Port
          - !Ref SecurityGroupIngressPorts
          - IpProtocol: tcp
            FromPort: !Ref Port
            ToPort: !Ref Port
            CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WebSecurityGroup

Outputs:
  VpcId:
    Description: ID of the created VPC
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  SecurityGroupId:
    Description: ID of the security group
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'