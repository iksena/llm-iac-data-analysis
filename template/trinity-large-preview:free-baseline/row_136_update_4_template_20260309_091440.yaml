AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  PermissionBoundaryEnforcement:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Toggle to enable/disable strict permission boundary enforcement
  TeamName:
    Type: String
    Default: MyTeam
    Description: Team name for resource identification and tagging
  OwnerTag:
    Type: String
    Default: DeveloperTeam
    Description: Owner tag for accountability and resource tracking

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${TeamName}-PermissionBoundary
      Description: Permission boundary policy restricting to S3 and read-only IAM
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
              - iam:Generate*
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${TeamName}-Developer
      Description: IAM Role for developers with broad IAM privileges
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      PermissionsBoundary: !If [PermissionBoundaryEnforcement, !Ref PermissionBoundaryPolicy, !Ref AWS::NoValue]
      Tags:
        - Key: Owner
          Value: !Ref OwnerTag

  DeveloperPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: PermissionBoundaryEnforcement
    Properties:
      ManagedPolicyName: !Sub ${TeamName}-DeveloperPolicy
      Description: IAM Policy for developers with conditional enforcement
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:TagRole
              - iam:TagPolicy
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${TeamName}*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/${TeamName}*'
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:TagRole
              - iam:TagPolicy
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/MyTeam*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/MyTeam*'

Conditions:
  PermissionBoundaryEnforcement: !Equals [!Ref PermissionBoundaryEnforcement, 'true']

Outputs:
  DeveloperRoleArn:
    Description: ARN of the Developer Role
    Value: !GetAtt DeveloperRole.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !Ref PermissionBoundaryPolicy