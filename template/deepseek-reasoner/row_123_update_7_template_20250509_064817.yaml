AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StripeApiKey:
    Type: String
    Description: Stripe API key (without 'Bearer ' prefix)
    NoEcho: true

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus

  Connection:
    Type: AWS::Events::Connection
    Properties:
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Join [" ", ["Bearer", !Ref StripeApiKey]]
      AuthorizationType: API_KEY
      Description: Stripe API connection with API key authentication

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt Connection.Arn
      HttpMethod: POST
      InvocationEndpoint: https://api.stripe.com/v1/products
      InvocationRateLimitPerSecond: 10

  Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !GetAtt EventBus.Name
      EventPattern:
        source: 
          - PartnerApp
        'detail-type':
          - PartnerAppDetailType
      Targets:
        - Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt Role.Arn
          Id: StripeProductCreationTarget

Outputs:
  EventBusName:
    Value: !GetAtt EventBus.Name
  ApiDestinationArn:
    Value: !GetAtt ApiDestination.Arn
  RuleName:
    Value: !Ref EventRule