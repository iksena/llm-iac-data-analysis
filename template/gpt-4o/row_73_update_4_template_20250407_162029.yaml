AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an Amazon ECS Cluster with Fargate and Fargate Spot capacity providers.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the ECS Cluster will be deployed.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: The Subnet IDs where the ECS Cluster will be deployed.
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS Cluster.

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

  ECSClusterDefaultVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-vpc"

  ECSClusterDefaultSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ECSClusterDefaultVpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-subnet-1"

  ECSClusterDefaultSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ECSClusterDefaultVpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-subnet-2"

Outputs:
  ECSClusterARN:
    Description: The ARN of the ECS Cluster.
    Value: !GetAtt ECSCluster.Arn
  ECSClusterName:
    Description: The name of the ECS Cluster.
    Value: !Ref ECSCluster
  VpcId:
    Description: The VPC ID used by the ECS Cluster.
    Value: !Ref ECSClusterDefaultVpc
  SubnetIds:
    Description: The Subnet IDs used by the ECS Cluster.
    Value: !Join [",", [!Ref ECSClusterDefaultSubnet1, !Ref ECSClusterDefaultSubnet2]]