AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create CloudWatch Dashboard and Logs Insights queries for AWS Client VPN usage monitoring

Resources:
  ClientVPNAnalysisDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAnalysisDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Analysis Dashboard"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ClientVPN", "ClientConnectionCount", { "label": "Active Connections" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Active Client VPN Connections"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ClientVPN", "BytesIn", { "label": "Ingress Data" } ],
                  [ "AWS/ClientVPN", "BytesOut", { "label": "Egress Data" } ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "us-east-1",
                "title": "Data Transfer Volumes"
              }
            },
            {
              "type": "query",
              "x": 0,
              "y": 7,
              "width": 24,
              "height": 8,
              "properties": {
                "query": "fields @timestamp, @message | sort @timestamp desc | limit 20",
                "queryId": "ClientVPNAuthBreakdown",
                "region": "us-east-1",
                "title": "Authentication Method Breakdown"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 15,
              "width": 24,
              "height": 8,
              "properties": {
                "query": "fields @timestamp, @message | sort @timestamp desc | limit 20",
                "queryId": "ClientVPNEndpointUsage",
                "region": "us-east-1",
                "title": "Endpoint-Specific Usage"
              }
            }
          ]
        }

  ADSAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ADSAuthQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /AD|LDAP|SAML/
        | stats count() as ADSAuthCount by bin(1h)
        | sort ADSAuthCount desc

  MutualAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MutualAuthQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /MutualAuth|Certificate/
        | stats count() as MutualAuthCount by bin(1h)
        | sort MutualAuthCount desc

  MixedAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MixedAuthQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /MixedAuth|Multiple/
        | stats count() as MixedAuthCount by bin(1h)
        | sort MixedAuthCount desc

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /connection|connected/
        | stats avg(duration) as AvgDuration, max(duration) as MaxDuration, min(duration) as MinDuration
        | sort AvgDuration desc

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /bytes|transferred/
        | stats sum(bytes_in) as TotalIngress, sum(bytes_out) as TotalEgress
        | sort TotalIngress desc

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /user|login/
        | stats count() as UserCount by user
        | sort UserCount desc

  DistinctUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DistinctUsersQuery
      LogGroupNames:
        - "/aws/vpn/logs"
      QueryString: |
        filter @message like /user|login/
        | stats distinct_count(user) as DistinctUserCount

Outputs:
  DashboardURL:
    Description: URL for the Client VPN Analysis Dashboard
    Value: !Sub |
      https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#!/dashboards/view/${ClientVPNAnalysisDashboard}
  ADSAuthQueryId:
    Description: Query ID for AD/SAML Authentication Analysis
    Value: !Ref ADSAuthQuery
  MutualAuthQueryId:
    Description: Query ID for Mutual Authentication Analysis
    Value: !Ref MutualAuthQuery
  MixedAuthQueryId:
    Description: Query ID for Mixed Authentication Analysis
    Value: !Ref MixedAuthQuery
  ConnectionDurationQueryId:
    Description: Query ID for Connection Duration Analysis
    Value: !Ref ConnectionDurationQuery
  DataTransferQueryId:
    Description: Query ID for Data Transfer Analysis
    Value: !Ref DataTransferQuery
  UserActivityQueryId:
    Description: Query ID for User Activity Analysis
    Value: !Ref UserActivityQuery
  DistinctUsersQueryId:
    Description: Query ID for Distinct Users Analysis
    Value: !Ref DistinctUsersQuery