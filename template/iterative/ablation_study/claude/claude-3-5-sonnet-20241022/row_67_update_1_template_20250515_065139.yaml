AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket with optional AWS Organization-wide access'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: Bucket name must be between 3 and 63 characters, start and end with a lowercase letter or number, and can contain lowercase letters, numbers, hyphens, and periods

  EnableOrganizationAccess:
    Type: String
    Description: Enable access for AWS Organization
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'false'

  OrganizationId:
    Type: String
    Description: AWS Organization ID (optional, leave empty for single account)
    Default: ''
    AllowedPattern: '^(o-[a-z0-9]{10,32})?$'
    ConstraintDescription: Must be a valid AWS Organization ID starting with 'o-' or empty

  OrganizationalUnitId:
    Type: String
    Description: AWS Organizational Unit ID (optional, leave empty if not needed)
    Default: ''
    AllowedPattern: '^(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})?$'
    ConstraintDescription: Must be a valid AWS OU ID starting with 'ou-' or empty

Conditions:
  IsOrganizationEnabled: !Equals 
    - !Ref EnableOrganizationAccess
    - 'true'
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, '']]
  HasOUId: !Not [!Equals [!Ref OrganizationalUnitId, '']]
  CreateOrgPolicy: !And
    - !Condition IsOrganizationEnabled
    - !Or [!Condition HasOrganizationId, !Condition HasOUId]

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Condition: CreateOrgPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccess
            Effect: Allow
            Principal: '*'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:ListBucket'
            Resource:
              - !Sub '${S3Bucket.Arn}/*'
              - !GetAtt S3Bucket.Arn
            Condition:
              StringEquals:
                'aws:PrincipalOrgID': !If 
                  - HasOrganizationId
                  - !Ref OrganizationId
                  - !Ref 'AWS::NoValue'
              StringLike:
                'aws:PrincipalOrgPaths': !If
                  - HasOUId
                  - !Sub '${OrganizationalUnitId}/*'
                  - !Ref 'AWS::NoValue'

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn

  BucketDomainName:
    Description: Domain name of the created S3 bucket
    Value: !GetAtt S3Bucket.DomainName

  OrganizationAccess:
    Description: Organization access status
    Value: !If [IsOrganizationEnabled, 'Enabled', 'Disabled']