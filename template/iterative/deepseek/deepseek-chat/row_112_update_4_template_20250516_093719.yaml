AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket with SQS event notifications'

Parameters:
  BucketName:
    Description: 'Name of the S3 bucket'
    Type: String
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters'

  QueueName:
    Description: 'Name of the SQS queue'
    Type: String
    AllowedPattern: '^[a-zA-Z0-9_-]{1,80}$'
    ConstraintDescription: 'Queue name must be between 1 and 80 characters'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: 's3:ObjectCreated:*'
            Queue: !GetAtt SQSQueue.Arn

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${BucketName}'
      Queues:
        - !Ref SQSQueue

Outputs:
  BucketName:
    Description: 'Created S3 bucket name'
    Value: !Ref BucketName
  QueueURL:
    Description: 'SQS Queue URL'
    Value: !Ref SQSQueue
  QueueARN:
    Description: 'SQS Queue ARN'
    Value: !GetAtt SQSQueue.Arn