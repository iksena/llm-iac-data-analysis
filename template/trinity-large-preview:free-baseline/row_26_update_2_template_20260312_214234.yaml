AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket integrated with EventBridge and SNS for object creation notifications.

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-events-bucket
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-s3-events-topic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule to capture S3 ObjectCreated events
      EventPattern:
        source:
          - aws.s3
        detail:
          eventName:
            - ObjectCreated:*
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Arn: !Ref SNSTopic
          Id: S3EventTarget

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule