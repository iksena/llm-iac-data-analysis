AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure with S3 Storage

Parameters:
  S3BucketName:
    Type: String
    Default: glue-scripts-logs
    Description: Name of the S3 bucket to store Glue scripts and logs
  GlueJobName:
    Type: String
    Default: SampleConvertJob
    Description: Name of the Glue ETL job
  GlueScriptPath:
    Type: String
    Default: gue_scripts/sample_convert.py
    Description: Path to the Glue script in the S3 bucket
  GlueLogPath:
    Type: String
    Default: logs/glue
    Description: Path in the S3 bucket for Glue job logs

Resources:
  GlueScriptLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueScriptLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GlueServiceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${S3BucketName}/${GlueScriptPath}'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': 'python'
        '--job-bookmark-option': 'job-bookmark-disable'
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-continuous-log-filter': 'true'
        '--continuous-log-logGroup': !Sub '/aws-glue/jobs/${GlueJobName}'
        '--TempDir': !Sub 's3://${S3BucketName}/temp'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      MaxCapacity: 2.0
      Timeout: 60
      MaxRetries: 0
      SecurityConfiguration: !Ref 'AWS::NoValue'
      NotificationProperty:
        NotifyDelayAfter: 30

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptLogBucket
  GlueJobName:
    Description: Name of the created Glue ETL job
    Value: !Ref GlueETLJob
  IAMRoleName:
    Description: Name of the IAM role for Glue service
    Value: !Ref GlueServiceRole