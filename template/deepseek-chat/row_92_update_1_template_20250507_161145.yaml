AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with automated Nginx installation via SSM and centralized logging'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type

  KeyPairName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair

  BucketName:
    Description: Name for the S3 bucket to store logs
    Type: String
    Default: nginx-logs-${AWS::AccountId}-${AWS::Region}

  AllowedIP:
    Description: IP address allowed to access the EC2 instance (your public IP)
    Type: String
    Default: 0.0.0.0/0

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0bbc25e23a7640b9b
    ap-southeast-1:
      AMI: ami-0f74c08b8b5effa56

Resources:
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedIP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: NginxWebServer
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          systemctl start amazon-ssm-agent

  NginxInstallationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref WebServerInstance
      Parameters:
        commands:
          - |
            #!/bin/bash
            yum install -y nginx
            systemctl start nginx
            systemctl enable nginx
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref BucketName
          OutputS3KeyPrefix: logs/

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx web server
    Value: !Ref WebServerInstance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  PublicDNS:
    Description: Public DNS of the Nginx web server
    Value: !GetAtt WebServerInstance.PublicDnsName
    Export:
      Name: !Sub "${AWS::StackName}-PublicDNS"

  S3BucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref BucketName
    Export:
      Name: !Sub "${AWS::StackName}-S3BucketName"

  SSMAssociationId:
    Description: SSM Association ID for Nginx installation
    Value: !Ref NginxInstallationAssociation
    Export:
      Name: !Sub "${AWS::StackName}-SSMAssociationId"