AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EventBridge integration with DataDog for centralized log forwarding

Parameters:
  DataDogAPIKey:
    Type: String
    Description: DataDog API key for authentication (32-character hexadecimal)
    Default: "00000000000000000000000000000000"  # Placeholder value
    NoEcho: true
    MinLength: 32
    MaxLength: 32
    AllowedPattern: '^[a-fA-F0-9]{32}$'
    ConstraintDescription: Must be a valid 32-character hexadecimal DataDog API key
  EventSource:
    Type: String
    Description: Source identifier for the events
    Default: MyDataDogApp
    AllowedPattern: '^[a-zA-Z0-9-_]+$'
    ConstraintDescription: Must contain only alphanumeric characters, hyphens, or underscores
  DataDogEndpoint:
    Type: String
    Description: DataDog log ingestion endpoint
    Default: https://http-intake.logs.datadoghq.com/api/v2/logs
    AllowedPattern: '^https://.*$'
    ConstraintDescription: Must be a valid HTTPS URL

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub DataDogEventBus-${AWS::StackName}

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub DataDogDLQ-${AWS::StackName}
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: [!Ref DeadLetterQueue]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sqs:SendMessage
          Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub DataDogEventBridgeRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: events.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: InvokeAPIDestinationPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: events:InvokeApiDestination
            Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:api-destination/*

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub DataDogConnection-${AWS::StackName}
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: !Ref DataDogAPIKey

  DataDogAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub DataDogAPIDestination-${AWS::StackName}
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref DataDogEndpoint
      InvocationRateLimitPerSecond: 100

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub DataDogForwardingRule-${AWS::StackName}
      EventBusName: !Ref EventBus
      EventPattern:
        source: [!Ref EventSource]
      Targets:
      - Arn: !GetAtt DataDogAPIDestination.Arn
        RoleArn: !GetAtt EventBridgeRole.Arn
        Id: DataDogAPIDestinationTarget
        DeadLetterConfig:
          Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusARN:
    Description: ARN of the EventBridge event bus
    Value: !GetAtt EventBus.Arn
  APIDestinationARN:
    Description: ARN of the API Destination
    Value: !GetAtt DataDogAPIDestination.Arn
  DeadLetterQueueURL:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue
  ConnectionARN:
    Description: ARN of the DataDog connection
    Value: !GetAtt DataDogConnection.Arn