AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  AMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    Description: AMI ID for Windows Server 2019 (retrieved from SSM Parameter Store)
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)
  Subnet:
    Type: String
    Default: ''
    Description: Subnet ID for the EC2 instance (leave blank to use default VPC)
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
      Path: /

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Windows EC2 instance
      VpcId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !ImportValue 'DefaultVPCId']
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref Subnet]
      UserData:
        Fn::Base64: |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          netsh advfirewall set rule name="Windows Remote Management (HTTP-In)" new enable=yes
          </powershell>

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: CPU Stress Test Script
        parameters:
          duration:
            type: String
            description: Duration of CPU stress test in seconds
            default: '60'
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: runCPUStressTest
            inputs:
              runCommand:
                - |
                  $duration = [int]$duration
                  $processors = [int](Get-WmiObject -Class Win32_Processor).NumberOfLogicalProcessors
                  $scriptBlock = {
                    $startTime = Get-Date
                    while ((Get-Date) -lt $startTime.AddSeconds($duration)) {
                      $result = 1
                      for ($i = 1; $i -lt 1000000; $i++) {
                        $result = $result * $i
                      }
                    }
                  }
                  for ($i = 0; $i -lt $processors; $i++) {
                    Start-Job -ScriptBlock $scriptBlock
                  }
                  Wait-Job *
                  Remove-Job *

Conditions:
  UseDefaultVPC: !Equals [!Ref Subnet, '']

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp