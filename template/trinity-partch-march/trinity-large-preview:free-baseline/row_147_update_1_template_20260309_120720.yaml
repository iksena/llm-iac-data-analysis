AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with S3, Lambda, and Cognito

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: Name of the S3 bucket for hosting the website
  LambdaFunctionName:
    Type: String
    Default: SlotMachineFunction
    Description: Name of the Lambda function
  DeploymentPackageURL:
    Type: String
    Default: https://example.com/slot-machine.zip
    Description: URL to the deployment package ZIP file
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CognitoIdentityPoolRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineCognitoIdentityPoolRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: CognitoIdentityPoolPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineFunction.Arn

  SlotMachineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        S3Bucket: !Ref WebsiteBucketName
        S3Key: slot-machine.zip

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true
      CognitoIdentityProviders: []

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoIdentityPoolRole.Arn

  CustomDeployWebsite:
    Type: Custom::DeployWebsite
    Properties:
      ServiceToken: !GetAtt DeployWebsiteFunction.Arn
      BucketName: !Ref WebsiteBucketName
      LambdaFunctionName: !Ref LambdaFunctionName
      DeploymentPackageURL: !Ref DeploymentPackageURL
      CognitoIdentityPoolId: !Ref CognitoIdentityPool
      Region: !Ref AWS::Region

  DeployWebsiteFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          import zipfile
          import urllib.request
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      bucket_name = event['ResourceProperties']['BucketName']
                      lambda_function_name = event['ResourceProperties']['LambdaFunctionName']
                      deployment_package_url = event['ResourceProperties']['DeploymentPackageURL']
                      cognito_identity_pool_id = event['ResourceProperties']['CognitoIdentityPoolId']
                      region = event['ResourceProperties']['Region']

                      s3 = boto3.client('s3')
                      lambda_client = boto3.client('lambda')

                      # Download deployment package
                      zip_path, _ = urllib.request.urlretrieve(deployment_package_url)

                      # Extract and upload to S3
                      with zipfile.ZipFile(zip_path, 'r') as zip_ref:
                          zip_ref.extractall('/tmp/extracted')
                          for root, dirs, files in os.walk('/tmp/extracted'):
                              for file in files:
                                  local_path = os.path.join(root, file)
                                  s3_key = os.path.relpath(local_path, '/tmp/extracted')
                                  s3.upload_file(local_path, bucket_name, s3_key)

                      # Update frontend config with Cognito and region info
                      config = {
                          'cognitoIdentityPoolId': cognito_identity_pool_id,
                          'region': region,
                          'lambdaFunctionName': lambda_function_name
                      }
                      config_json = json.dumps(config)
                      s3.put_object(Bucket=bucket_name, Key='config.json', Body=config_json)

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the slot machine website
  LambdaFunctionARN:
    Value: !GetAtt SlotMachineFunction.Arn
    Description: ARN of the Lambda function
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: ID of the Cognito Identity Pool