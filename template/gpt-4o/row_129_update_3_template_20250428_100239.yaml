AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to set up AWS Config with secure and compliant configurations,
  including S3 bucket for snapshots, SNS topic for notifications, and Lambda for retention management.

Parameters:
  S3BucketName:
    Description: Name of the S3 bucket to store AWS Config snapshots
    Type: String
  UseExistingS3Bucket:
    Description: Whether to use an existing S3 bucket (true/false)
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  SNSTopicName:
    Description: Name of the SNS topic for AWS Config notifications
    Type: String
  RetentionPeriodInDays:
    Description: Retention period for AWS Config snapshots
    Type: Number
    Default: 2557
  DeliveryFrequency:
    Description: Frequency of AWS Config snapshot delivery
    Type: String
    Default: 'One_Hour'
    AllowedValues: ['One_Hour', 'Three_Hours', 'Six_Hours', 'Twelve_Hours', 'TwentyFour_Hours']

Conditions:
  CreateS3Bucket: !Equals [!Ref UseExistingS3Bucket, 'false']

Resources:
  ConfigS3Bucket:
    Condition: CreateS3Bucket
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ConfigPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource: 
                  - !Sub arn:aws:s3:::${S3BucketName}/*
                  - !Sub arn:aws:s3:::${S3BucketName}
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref ConfigSNSTopic

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - config:PutRetentionConfiguration
                Resource: '*'

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RoleARN: !GetAtt ConfigRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      S3BucketName: !Ref S3BucketName
      SnsTopicARN: !Ref ConfigSNSTopic
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency

  ConfigRetentionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          def handler(event, context):
              client = boto3.client('config')
              retention_days = int(os.environ['RetentionPeriodInDays'])
              client.put_retention_configuration(
                  RetentionPeriodInDays=retention_days
              )
      Runtime: python3.8
      Timeout: 60
      Environment:
        Variables:
          RetentionPeriodInDays: !Ref RetentionPeriodInDays

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket used for AWS Config snapshots
    Value: !Ref S3BucketName
  SNSTopicARN:
    Description: ARN of the SNS topic for AWS Config notifications
    Value: !Ref ConfigSNSTopic
  LambdaFunctionARN:
    Description: ARN of the Lambda function managing retention
    Value: !GetAtt ConfigRetentionLambda.Arn