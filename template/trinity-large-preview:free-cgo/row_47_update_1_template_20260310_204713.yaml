AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for EC2 instances with read-only access to AWS IAM metadata

Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2-IAM-ReadOnly-Role
      Path: /
      Description: IAM Role for EC2 instances with read-only access to AWS IAM metadata
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Policies:
        - PolicyName: DenyIAMWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - iam:Delete*
                  - iam:Put*
                  - iam:Create*
                  - iam:Update*
                  - iam:PassRole
                Resource: '*'

Outputs:
  IAMRoleARN:
    Description: ARN of the IAM Role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: EC2-IAM-ReadOnly-Role-ARN