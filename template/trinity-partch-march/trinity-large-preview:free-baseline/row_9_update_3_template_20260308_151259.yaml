AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted One Zone file system in the us-east-1a Availability Zone

Parameters:
  FileSystemName:
    Type: String
    Default: MyEFSFileSystem
    Description: The name of the file system
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: The performance mode of the file system
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: The throughput mode of the file system
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1024
    Description: The amount of throughput, in MiB/s, for the file system (only applicable if ThroughputMode is provisioned)
  Encrypted:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Whether the file system is encrypted
  KmsKeyId:
    Type: String
    Default: 'alias/aws/ebs'
    AllowedPattern: '^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}|mrk-[0-9a-f]{32}|alias/[a-zA-Z0-9/_-]+|(arn:aws[-a-z]*:kms:[a-z0-9-]+:\\d{12}:((key/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})|(key/mrk-[0-9a-f]{32})|(alias/[a-zA-Z0-9/_-]+))))$'
    Description: The ID of the KMS key to use for encryption (only applicable if Encrypted is true)

Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref AWS::NoValue]
      Encrypted: !Ref Encrypted
      KmsKeyId: !If [IsEncrypted, !Ref KmsKeyId, !Ref AWS::NoValue]
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

Conditions:
  IsProvisionedThroughput: !And
    - !Equals [!Ref ThroughputMode, provisioned]
    - !Not [!Equals [!Ref ProvisionedThroughputInMibps, 0]]
  IsEncrypted: !Equals [!Ref Encrypted, true]

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref MyEFSFileSystem
  FileSystemArn:
    Description: The ARN of the created file system
    Value: !GetAtt MyEFSFileSystem.Arn
  FileSystemName:
    Description: The name of the created file system
    Value: !Ref FileSystemName