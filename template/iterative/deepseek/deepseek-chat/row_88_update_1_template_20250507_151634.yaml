AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for AWS Service Catalog with permissions for S3, Lambda, and related services'

Resources:
  ServiceCatalogProvisioningRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'ServiceCatalogProvisioningRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'servicecatalog.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'ServiceCatalogOperations'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'servicecatalog:ProvisionProduct'
                  - 'servicecatalog:TerminateProvisionedProduct'
                  - 'servicecatalog:UpdateProvisionedProduct'
                Resource: '*'
              - Effect: 'Allow'
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:DeleteRolePolicy'
                Resource: '*'
              - Effect: 'Allow'
                Action:
                  - 'lambda:CreateFunction'
                  - 'lambda:DeleteFunction'
                  - 'lambda:InvokeFunction'
                  - 'lambda:UpdateFunctionCode'
                  - 'lambda:UpdateFunctionConfiguration'
                Resource: '*'
              - Effect: 'Allow'
                Action:
                  - 'cloudformation:CreateStack'
                  - 'cloudformation:DeleteStack'
                  - 'cloudformation:DescribeStacks'
                  - 'cloudformation:UpdateStack'
                Resource: '*'
              - Effect: 'Allow'
                Action:
                  - 'sns:Publish'
                Resource: '*'

Outputs:
  RoleARN:
    Description: 'ARN of the IAM Role for Service Catalog provisioning'
    Value: !GetAtt ServiceCatalogProvisioningRole.Arn