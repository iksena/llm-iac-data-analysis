AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog to provision S3 and Lambda resources

Resources:
  ServiceCatalogProvisioningRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogProvisioningRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceCatalogProvisioningPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeRecord
                  - servicecatalog:TerminateProvisionedProduct
                  - servicecatalog:SearchProductsAsAdmin
                  - servicecatalog:DescribeProductView
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:ListRecordHistory
                Resource: '*'

              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:PassRole
                Resource: 'arn:aws:iam::*:role/servicecatalog-*'

              - Effect: Allow
                Action:
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:GetPolicy
                  - iam:ListPolicies
                Resource: 'arn:aws:iam::*:policy/servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:InvokeFunction
                  - lambda:GetFunction
                  - lambda:ListFunctions
                  - lambda:GetAccountSettings
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateAlias
                  - lambda:DeleteAlias
                  - lambda:UpdateAlias
                  - lambda:GetAlias
                  - lambda:ListAliases
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*:*'

              - Effect: Allow
                Action:
                  - lambda:CreateEventSourceMapping
                  - lambda:DeleteEventSourceMapping
                  - lambda:ListEventSourceMappings
                Resource: 'arn:aws:lambda:*:*:event-source-mapping:*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunctionUrlConfig
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunctionUrlConfig
                  - lambda:ListFunctionUrlConfigs
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateLayerVersion
                  - lambda:DeleteLayerVersion
                  - lambda:GetLayerVersion
                  - lambda:ListLayers
                  - lambda:ListLayerVersions
                Resource: 'arn:aws:lambda:*:*:layer:servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunctionCodeSigningConfig
                  - lambda:DeleteFunctionCodeSigningConfig
                  - lambda:GetFunctionCodeSigningConfig
                  - lambda:ListFunctionCodeSigningConfig
                Resource: 'arn:aws:lambda:*:*:code-signing-config:*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunctionEventInvokeConfig
                  - lambda:DeleteFunctionEventInvokeConfig
                  - lambda:GetFunctionEventInvokeConfig
                  - lambda:ListFunctionEventInvokeConfigs
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunctionProvisionedConcurrencyConfig
                  - lambda:DeleteFunctionProvisionedConcurrencyConfig
                  - lambda:GetFunctionProvisionedConcurrencyConfig
                  - lambda:ListFunctionProvisionedConcurrencyConfigs
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*'

              - Effect: Allow
                Action:
                  - lambda:CreateFunctionTrafficRoutingConfig
                  - lambda:DeleteFunctionTrafficRoutingConfig
                  - lambda:GetFunctionTrafficRoutingConfig
                  - lambda:ListFunctionTrafficRoutingConfigs
                Resource: 'arn:aws:lambda:*:*:function:servicecatalog-*'

              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                Resource: 'arn:aws:cloudformation:*:*:stack/servicecatalog-*/*'

              - Effect: Allow
                Action:
                  - sns:Publish
                  - sns:ListTopics
                  - sns:GetTopicAttributes
                Resource: 'arn:aws:sns:*:*:servicecatalog-*'

              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListMultipartUploadParts
                  - s3:AbortMultipartUpload
                Resource:
                  - 'arn:aws:s3:::servicecatalog-*'
                  - 'arn:aws:s3:::servicecatalog-*/**'

Outputs:
  ServiceCatalogProvisioningRoleArn:
    Description: ARN of the Service Catalog Provisioning Role
    Value: !GetAtt ServiceCatalogProvisioningRole.Arn
    Export:
      Name: ServiceCatalogProvisioningRoleArn