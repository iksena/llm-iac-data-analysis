AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with CloudWatch Alarms, Automated Backups, and VPC Integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
    Description: VPC ID for EFS mount targets
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0000000000000000,subnet-0000000000000001
    Description: List of subnet IDs (at least two across different AZs)
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups (default: daily at midnight)
  AllowedCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR range allowed to access EFS

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Encrypted: true
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref AllowedCidr

  EfsMountTargets:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SecurityGroups:
        - !Ref EfsSecurityGroup
      SubnetId: !Select [0, !Ref SubnetIds]
    DependsOn: EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SecurityGroups:
        - !Ref EfsSecurityGroup
      SubnetId: !Select [1, !Ref SubnetIds]
    DependsOn: EfsSecurityGroup

  EfsBackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-EFS-Backup-Plan'
        Rules:
          - RuleName: DailyBackup
            TargetBackupVault: !Sub 'arn:${AWS::Partition}:backup:${AWS::Region}:${AWS::AccountId}:backup-vault:Default'
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 240
            Lifecycle:
              DeleteAfterDays: 30
            RecoveryPointTags:
              BackupType: EFS
        AdvancedBackupSettings:
          - ResourceType: "AWS::EFS::FileSystem"
            BackupOptions:
              EnableContinuousBackup: false

  EfsBackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref EfsBackupPlan
      SelectionName: EFSFileSystemSelection
      IamRoleArn: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/service-role/AWSBackupDefaultServiceRole'
      Resources:
        - !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EfsFileSystem}'

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-EFS-BurstCreditBalance-Low'
      AlarmDescription: 'EFS BurstCreditBalance below 20% threshold'
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:AWS_CloudWatch_Alarms'
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-EFS-PercentIOLimit-High'
      AlarmDescription: 'EFS PercentIOLimit above 80% threshold'
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:AWS_CloudWatch_Alarms'
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsBurstThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-EFS-BurstThroughputExceeded'
      AlarmDescription: 'EFS BurstThroughputExceeded detected'
      Namespace: AWS/EFS
      MetricName: BurstThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:AWS_CloudWatch_Alarms'
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  FileSystemDNS:
    Description: EFS File System DNS Name
    Value: !GetAtt EfsFileSystem.DNSName
  MountTargetIds:
    Description: EFS Mount Target IDs
    Value: !Join [',', [!Ref EfsMountTargets, !Ref EfsMountTarget2]]