AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create a DynamoDB table with local and global secondary indexes.

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table.
    Default: MyDynamoDBTable

  ReadCapacityUnits:
    Type: Number
    Description: The number of read capacity units for the table.
    Default: 5

  WriteCapacityUnits:
    Type: Number
    Description: The number of write capacity units for the table.
    Default: 5

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      TableName: !Ref TableName
      AttributeDefinitions: 
        - AttributeName: Id
          AttributeType: S
        - AttributeName: CreatedAt
          AttributeType: N
        - AttributeName: Status
          AttributeType: S
      KeySchema: 
        - AttributeName: Id
          KeyType: HASH
      ProvisionedThroughput: 
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      LocalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: Id
              KeyType: HASH
            - AttributeName: CreatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: Status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref TableName

  TableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn