AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a secure S3 bucket for CloudWatch export data with lifecycle management'

Parameters:
  VersioningState:
    Type: String
    Description: S3 bucket versioning state
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended
  
  StandardRetentionDays:
    Type: Number
    Description: Number of days to keep objects in Standard storage class
    Default: 30
    MinValue: 1
    MaxValue: 3650
  
  GlacierTransitionDays:
    Type: Number
    Description: Number of days before transitioning objects to Glacier storage class
    Default: 90
    MinValue: 30
    MaxValue: 3650
  
  ExpirationDays:
    Type: Number
    Description: Number of days before objects are deleted
    Default: 365
    MinValue: 90
    MaxValue: 3650
  
  EnableLogging:
    Type: String
    Description: Enable S3 server access logging
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  EnableServerLogging: !Equals [!Ref EnableLogging, 'true']

Resources:
  LoggingBucket:
    Type: AWS::S3::Bucket
    Condition: EnableServerLogging
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-access-logs-bucket"
        - Key: Purpose
          Value: S3 Access Logs

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: EnableServerLogging
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt LoggingBucket.Arn
              - !Sub '${LoggingBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Sid: AllowLogDelivery
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action:
              - 's3:PutObject'
            Resource: !Sub '${LoggingBucket.Arn}/*'

  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: !Ref VersioningState
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacierAndExpire
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref GlacierTransitionDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref ExpirationDays
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref ExpirationDays
          - Id: IntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref StandardRetentionDays
                StorageClass: INTELLIGENT_TIERING
      LoggingConfiguration: !If
        - EnableServerLogging
        - DestinationBucketName: !Ref LoggingBucket
          LogFilePrefix: cloudwatch-export-logs/
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-cloudwatch-export-bucket"
        - Key: Purpose
          Value: CloudWatch Export Data

  CloudWatchExportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt CloudWatchExportBucket.Arn
              - !Sub '${CloudWatchExportBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Sid: AllowCloudWatchExports
            Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - 's3:GetBucketAcl'
              - 's3:PutObject'
            Resource:
              - !GetAtt CloudWatchExportBucket.Arn
              - !Sub '${CloudWatchExportBucket.Arn}/*'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'

Outputs:
  BucketName:
    Description: Name of the S3 bucket for CloudWatch export data
    Value: !Ref CloudWatchExportBucket
  
  BucketARN:
    Description: ARN of the S3 bucket for CloudWatch export data
    Value: !GetAtt CloudWatchExportBucket.Arn
  
  LoggingBucketName:
    Description: Name of the S3 bucket for access logs
    Condition: EnableServerLogging
    Value: !Ref LoggingBucket