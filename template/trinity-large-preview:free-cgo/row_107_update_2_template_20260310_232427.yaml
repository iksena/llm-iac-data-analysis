AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-queue
      VisibilityTimeout: 30
      ReceiveMessageWaitTimeSeconds: 0
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SQSDeadLetterQueue.Arn
        maxReceiveCount: 3

  SQSDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-dlq

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: SQSQueuePolicy
        Statement:
          - Sid: AllowAPIGatewayReceiveMessage
            Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

  APIGatewayIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-APIGatewayRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSReceiveMessagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  APIRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-API
      Description: API Gateway for SQS message retrieval

  APIRootResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIRestApi
      ParentId: !GetAtt APIRestApi.RootResourceId
      PathPart: '{proxy+}'

  APIMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIRestApi
      ResourceId: !Ref APIRootResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${queueName}
          - queueName: !GetAtt SQSQueue.QueueName
        Credentials: !GetAtt APIGatewayIAMRole.Arn
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {}
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: |
            Action=ReceiveMessage&Version=2012-11-05
            #foreach($key in $input.params().querystring.keySet())
            &$key=$util.urlEncode($input.params().querystring.get($key))
            #end

  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIMethod
    Properties:
      RestApiId: !Ref APIRestApi
      Description: Deployment for SQS API

  APIProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref APIRestApi
      DeploymentId: !Ref APIDeployment
      StageName: prod
      Description: Production stage for SQS API

Outputs:
  APIGatewayURL:
    Description: API Gateway URL for SQS message retrieval
    Value: !Sub https://${APIRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
    Export:
      Name: !Sub ${AWS::StackName}-APIGatewayURL