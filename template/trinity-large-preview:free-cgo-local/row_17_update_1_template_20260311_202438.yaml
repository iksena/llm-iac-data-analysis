AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create multi-threshold AWS billing alarms using CloudWatch and SNS

Resources:
  BillingAlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alarm Notifications
      TopicName: BillingAlarmTopic

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: xxxxx@gmail.com
      TopicArn: !Ref BillingAlarmSNSTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm5USD
      AlarmDescription: Alarm for AWS charges exceeding $5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm10USD
      AlarmDescription: Alarm for AWS charges exceeding $10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm20USD
      AlarmDescription: Alarm for AWS charges exceeding $20
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm40USD
      AlarmDescription: Alarm for AWS charges exceeding $40
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: USD

Outputs:
  BillingAlarmSNSTopicArn:
    Description: ARN of the SNS topic for billing alarms
    Value: !Ref BillingAlarmSNSTopic