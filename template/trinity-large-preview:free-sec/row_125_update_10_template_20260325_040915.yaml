AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  ApiName:
    Type: String
    Default: EmailAPI
  LambdaTimeout:
    Type: Number
    Default: 30
  LambdaMemory:
    Type: Number
    Default: 128
  ApiStageName:
    Type: String
    Default: prod
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  SubnetId:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-00000000000000000,subnet-00000000000000000

Resources:
  EmailApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: REST
      ApiKeySelectionExpression: $request.header.x-api-key
      Description: API for sending templated emails via SES

  EmailModel:
    Type: AWS::ApiGatewayV2::Model
    Properties:
      ApiId: !Ref EmailApi
      Name: EmailModel
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        type: object
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          text:
            type: string
          html:
            type: string
        required:
          - to
          - from
          - subject
          - text

  EmailApiDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn: EmailApiRoute
    Properties:
      ApiId: !Ref EmailApi

  EmailApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref EmailApi
      DeploymentId: !Ref EmailApiDeployment
      StageName: !Ref ApiStageName
      AutoDeploy: true
      DefaultRouteSettings:
        DataTraceEnabled: false
        DetailedMetricsEnabled: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","sourceIp":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'

  EmailApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EmailApi
      RouteKey: POST /send
      AuthorizationType: NONE
      ModelSelectionExpression: $request.body
      RequestModels:
        application/json: !Ref EmailModel
      Target: !Join
        - '/'
        - - integrations
          - !Ref EmailApiIntegration

  EmailApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EmailApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
        - LambdaArn: !GetAtt EmailLambda.Arn
      PayloadFormatVersion: '2.0'

  EmailLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      VpcConfig:
        SubnetIds: !Ref SubnetId
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      ReservedConcurrentExecutions: 100
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDLQ.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ses = boto3.client('ses')

          def handler(event, context):
              try:
                  body = json.loads(event['body'])
                  response = ses.send_email(
                      Source=body['from'],
                      Destination={'ToAddresses': [body['to']]},
                      Message={
                          'Subject': {'Data': body['subject']},
                          'Body': {
                              'Text': {'Data': body.get('text', '')},
                              'Html': {'Data': body.get('html', '')}
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': str(e)})
                  }
      Role: !GetAtt EmailLambdaRole.Arn

  EmailLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'
                Condition:
                  StringEquals:
                    ses:FromAddress: !Ref FromEmail

  EmailApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt EmailLambda.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*
        - ApiId: !Ref EmailApi

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VpcId

  LambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EmailLambdaDLQ

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/EmailAPI
      RetentionInDays: 30

  FromEmail:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /EmailAPI/FromEmail
      Type: String
      Value: noreply@example.com
      Description: Default from email address for SES

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub
      - https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
      - ApiId: !Ref EmailApi
        Stage: !Ref ApiStageName