AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with automated OS updates, Nginx installation, and SSM Automation validation

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3AccessForLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketForLogs}'
                  - !Sub 'arn:aws:s3:::${S3BucketForLogs}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  S3BucketForLogs:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'ssm-automation-logs-${AWS::AccountId}-${AWS::Region}'

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        assumeRole: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${EC2InstanceRole}'
        parameters: {}
        mainSteps:
          - name: UpdateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo reboot
          - name: WaitForReboot
            action: aws:waitForAwsResourceProperty
            inputs:
              Service: EC2
              Api: DescribeInstances
              Id: !Ref EC2Instance
              PropertySelector: '$.Reservations[0].Instances[0].State.Name'
              DesiredValues:
                - running
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo amazon-linux-extras install nginx1 -y
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost || exit 1

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
      Tags:
        - Key: Name
          Value: SSM-Automation-EC2

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance

Outputs:
  InstancePublicDnsName:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstancePublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp