AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Resource Group with tag-based filters for EC2, RDS, SageMaker, SSM, and other instances.

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub ${AWS::StackName}-ResourceGroup
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::ManagedInstanceInventory
          TagFilters:
            - Key: Environment
              Values:
                - Production
                - Development
                - Testing
      Tags:
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ResourceGroupArn:
    Description: The ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.GroupArn
    Export:
      Name: !Sub ${AWS::StackName}-ResourceGroupArn