AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled automation workflow using EventBridge Scheduler and SSM for cross-platform EC2 instances

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH/RDP access
  ScheduleExpression:
    Type: String
    Default: rate(15 minutes)
    Description: EventBridge Schedule expression (cron or rate)

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: HelloWorldVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: HelloWorldIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH/RDP access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2SecurityGroup

  LinuxInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Tags:
        - Key: Name
          Value: LinuxInstanceRole

  LinuxInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LinuxInstanceRole

  WindowsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Tags:
        - Key: Name
          Value: WindowsInstanceRole

  WindowsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WindowsInstanceRole

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LinuxInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref PublicSubnet1
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource LinuxInstance
      Tags:
        - Key: HelloWorld
          Value: 'true'
      CreationPolicy:
        ResourceSignal:
          Timeout: PT10M

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref WindowsInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref PublicSubnet2
      UserData:
        Fn::Base64:
          !Sub |
            <powershell>
            Install-PackageProvider -Name NuGet -Force
            Install-Module -Name AWSPowerShell.NetCore -Force
            Install-EC2LaunchConfiguration -UserData
            Install-AWSDependencies -UserData
            Install-SSMAgent
            Start-SSMAgent
            cfn-signal -Stack ${AWS::StackName} -Resource WindowsInstance -Status SUCCESS
            </powershell>
      Tags:
        - Key: HelloWorld
          Value: 'true'
      CreationPolicy:
        ResourceSignal:
          Timeout: PT10M

  HelloWorldDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      DocumentFormat: YAML
      Content:
        schemaVersion: '2.2'
        description: HelloWorld automation document
        parameters: {}
        mainSteps:
          - action: 'aws:runShellScript'
            name: linuxStep
            inputs:
              runCommand:
                - echo "Hello World!"
          - action: 'aws:runPowerShellScript'
            name: windowsStep
            inputs:
              runCommand:
                - Write-Host "Hello World!"

  HelloWorldAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: !Ref ScheduleExpression

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole

  ExecutionLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'helloworld-execution-logs-${AWS::AccountId}-${AWS::Region}'
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: ExecutionLogsBucket

  ExecutionLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ExecutionLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${ExecutionLogsBucket.Arn}/*'

  HelloWorldSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Schedule for HelloWorld SSM Association
      ScheduleExpression: !Ref ScheduleExpression
      Targets:
        - Arn: !GetAtt HelloWorldAssociation.AssociationId
          Id: HelloWorldTarget
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  LinuxInstanceId:
    Description: Linux Instance ID
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Windows Instance ID
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: S3 Bucket for execution logs
    Value: !Ref ExecutionLogsBucket
  ScheduleArn:
    Description: EventBridge Schedule ARN
    Value: !Ref HelloWorldSchedule