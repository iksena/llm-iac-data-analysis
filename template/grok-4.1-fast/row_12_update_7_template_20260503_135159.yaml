AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready CloudFormation template for EC2 instance with EIP and SSH access in a new VPC public subnet.'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
      - t3.medium
    Description: 'EC2 instance type'
  SSHCidrIp:
    Type: String
    Default: '0.0.0.0/0'
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: 'CIDR IP range allowed to connect via SSH (e.g., 203.0.113.0/24 or 0.0.0.0/0). Default opens to world - restrict for production.'
  AmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: 'AMI ID for Amazon Linux 2 (fetched from SSM Parameter Store)'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  AttachGateway: