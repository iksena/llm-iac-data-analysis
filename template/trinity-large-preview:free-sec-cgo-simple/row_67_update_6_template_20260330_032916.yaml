AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-wide or Public Access

Parameters:
  OrganizationId:
    Type: String
    Default: ""
    Description: AWS Organization ID for enterprise-wide access (leave empty for single-account public access)

Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::StackName}-bucket"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      AccessControl: Private
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action: s3:GetObject
            Resource: !Sub "arn:${AWS::Partition}:s3:::${MyS3Bucket}/*"
            Principal:
              AWS:
                Fn::If:
                  - HasOrganizationId
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
                  - "*"

Conditions:
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, ""]]

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MyS3Bucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt MyS3Bucket.Arn