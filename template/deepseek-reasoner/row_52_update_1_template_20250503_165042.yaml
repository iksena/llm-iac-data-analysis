AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  PrimaryAppEndpoint:
    Type: String
    Description: Endpoint URL for primary region application
  SecondaryAppEndpoint:
    Type: String
    Description: Endpoint URL for secondary region application
Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: AppRecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: MultiRegionControlPanel
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  PrimaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: PrimaryRegion-RC
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Status: DEPLOYED

  SecondaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: SecondaryRegion-RC
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Status: DEPLOYED

  PrimaryHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: "/"
        FullyQualifiedDomainName: !Ref PrimaryAppEndpoint
        RequestInterval: 30
        FailureThreshold: 2
        MeasureLatency: false
        Port: 80

  SecondaryHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: "/"
        FullyQualifiedDomainName: !Ref SecondaryAppEndpoint
        RequestInterval: 30
        FailureThreshold: 2
        MeasureLatency: false
        Port: 80

  PrimaryHealthAssociation:
    Type: AWS::Route53RecoveryControl::HealthCheckAssociation
    Properties:
      RoutingControlArn: !GetAtt PrimaryRoutingControl.RoutingControlArn
      HealthCheckArn: !GetAtt PrimaryHealthCheck.HealthCheckArn

  SecondaryHealthAssociation:
    Type: AWS::Route53RecoveryControl::HealthCheckAssociation
    Properties:
      RoutingControlArn: !GetAtt SecondaryRoutingControl.RoutingControlArn
      HealthCheckArn: !GetAtt SecondaryHealthCheck.HealthCheckArn

  FailoverSafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: MinimumActiveRegionRule
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
      AssertionRule:
        AssertedControls:
          - !GetAtt PrimaryRoutingControl.RoutingControlArn
          - !GetAtt SecondaryRoutingControl.RoutingControlArn
        WaitPeriodMs: 5000
Outputs:
  PrimaryHealthCheckID:
    Value: !Ref PrimaryHealthCheck
  SecondaryHealthCheckID:
    Value: !Ref SecondaryHealthCheck
  SafetyRuleStatus:
    Value: !GetAtt FailoverSafetyRule.Status