AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Number of days to retain CloudWatch Logs
    MinValue: 1
    MaxValue: 3653
  QueueName:
    Type: String
    Default: EventBridgePipesSourceQueue
    Description: Name of the SQS source queue
    MinLength: 1
    MaxLength: 80

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 1209600

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SourceQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeReceive
            Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
            Resource: !GetAtt SourceQueue.Arn

  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/pipes/zipcode-enrichment-logs-${AWS::StackName}"
      RetentionInDays: !Ref LogRetentionInDays

  ZipCodeEnrichmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "ZipCodeEnrichmentFunction-${AWS::StackName}"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs24.x
      Timeout: 15
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const zipcode = event.body.zipcode;
            return new Promise((resolve, reject) => {
              const req = require('https').request(`https://api.zippopotam.us/us/${zipcode}`, (res) => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try {
                    resolve({ ...event, apiResponse: JSON.parse(data) });
                  } catch (e) {
                    reject(e);
                  }
                });
              });
              req.on('error', reject);
              req.end();
            });
          };

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt ZipCodeEnrichmentFunction.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${CloudWatchLogsGroup.Arn}:*"

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub "ZipCodeEnrichmentPipe-${AWS::StackName}"
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt SourceQueue.Arn
      Target: !GetAtt CloudWatchLogsGroup.Arn
      Enrichment: !GetAtt ZipCodeEnrichmentFunction.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 0
      EnrichmentParameters:
        LambdaParameters:
          InvocationType: REQUEST_RESPONSE

Outputs:
  SourceQueueUrl:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue
  LogGroupName:
    Description: Name of the CloudWatch Logs group
    Value: !Ref CloudWatchLogsGroup
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !Ref EventBridgePipe
  FunctionArn:
    Description: ARN of the Lambda enrichment function
    Value: !GetAtt ZipCodeEnrichmentFunction.Arn