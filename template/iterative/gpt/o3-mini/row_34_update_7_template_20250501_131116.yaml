AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production Ready CloudFormation Template to deploy a MySQL RDS instance
  (db.r5.large with Provisioned IOPS using io1 storage) in a dedicated VPC
  spanning two private subnets across different Availability Zones.

Parameters:
  VpcCIDR:
    Description: "CIDR block for the VPC"
    Type: String
    Default: "10.0.0.0/16"
  DBName:
    Description: "The name of the initial database"
    Type: String
    Default: "mydatabase"
  DBUsername:
    Description: "The database admin account username"
    Type: String
    Default: "admin"
  AllocatedStorage:
    Description: "The size of the database in GB"
    Type: Number
    Default: 100
  IOPS:
    Description: "The number of Provisioned IOPS for the RDS instance"
    Type: Number
    Default: 1000

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "Production-VPC"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Private-Subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "Private-Subnet-2"

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for RDS, allowing MySQL port 3306 access within the VPC"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCIDR
      Tags:
        - Key: Name
          Value: "RDS-SG"

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for RDS instance across two private subnets"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: "RDS-DBSubnetGroup"

  MySQLDBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: "RDS Master User credentials for MySQL instance"
      Name: "MySQLRDSSecret"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: "password"
        ExcludeCharacters: '"@/\\'
        PasswordLength: 16

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      AllocatedStorage: !Ref AllocatedStorage
      DBInstanceIdentifier: "production-mysql-db"
      DBInstanceClass: "db.r5.large"
      Engine: "mysql"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${MySQLDBSecret}:SecretString:password}}"
      EngineVersion: "8.0.39"
      StorageType: "io1"
      Iops: !Ref IOPS
      MultiAZ: true
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      DeletionProtection: true
      BackupRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: "Production-MySQL-RDS"

Outputs:
  VPCId:
    Description: "VPC ID"
    Value: !Ref MyVPC
  RDSInstanceEndpoint:
    Description: "RDS instance endpoint address"
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  DBSubnetGroupName:
    Description: "Name of the RDS DB Subnet Group"
    Value: !Ref DBSubnetGroup