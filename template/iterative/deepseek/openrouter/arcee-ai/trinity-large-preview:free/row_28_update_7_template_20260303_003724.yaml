AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an automated monitoring and notification system for AWS Secrets Manager secret lifecycle events.

Parameters:
  SNSTopicName:
    Type: String
    Default: SecretsManagerEventsTopic
    Description: The name of the SNS topic to create for notifications
  LambdaFunctionName:
    Type: String
    Default: SecretsManagerEventHandler
    Description: The name of the Lambda function to create

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs24.x
      Timeout: 30
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const sns = new AWS.SNS();
            const secretId = event.detail.secretId;
            const secretName = event.detail.secretName;
            const eventType = event.detail.eventType;

            const message = `Secret ${secretName} (${secretId}) has been ${eventType}`;
            const params = {
              TopicArn: process.env.SNS_TOPIC_ARN,
              Message: message,
              Subject: 'Secrets Manager Event Notification'
            };

            try {
              await sns.publish(params).promise();
              console.log('Notification sent successfully');
            } catch (error) {
              console.error('Error sending notification:', error);
              throw error;
            }
          };
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SNSTopic

  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: SecretsManagerEventsRule
      Description: Rule to capture Secrets Manager events
      EventPattern:
        source:
          - aws.secretsmanager
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - RestoreSecret
            - RotateSecret
      State: ENABLED
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: SecretsManagerEventsTarget

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudWatchEventRule.Arn

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS topic
    Value: !Ref SNSTopic
  LambdaFunctionARN:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  CloudWatchEventRuleARN:
    Description: The ARN of the CloudWatch Event Rule
    Value: !Ref CloudWatchEventRule