AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/config/ab-test"
      Type: String
      Value: "This is A/B"
      Description: Non-sensitive configuration parameter
      Tier: Standard

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-secret"
      Description: Secure secret with predefined username
      SecretString: |
        {
          "username": "admin",
          "password": "P@ssw0rd!Secure123"
        }
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: "password"
        ExcludeCharacters: "/@\""
        PasswordLength: 16

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Policies:
        - PolicyName: LambdaSecretsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/config/*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3

          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              secrets = boto3.client('secretsmanager')

              # Retrieve SSM parameter by path
              ssm_params = ssm.get_parameters_by_path(
                  Path=f"/{context.function_name.split('-')[0]}/config/",
                  Recursive=False
              )
              ssm_value = ssm_params['Parameters'][0]['Value']

              # Retrieve Secrets Manager secret
              secret = secrets.get_secret_value(SecretId=context.function_name.split('-')[0] + '-secret')
              secret_value = json.loads(secret['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secret': secret_value
                  })
              }
      Timeout: 10
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          SSM_PATH: !Sub "/${AWS::StackName}/config/"
          SECRET_NAME: !Sub "${AWS::StackName}-secret"
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet1
          - !Ref LambdaSubnet2
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDLQ.Arn
      ReservedConcurrentExecutions: 5

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-sg"

  LambdaSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-subnet-1"

  LambdaSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-lambda-subnet-2"

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  LambdaDLQ:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Lambda Dead Letter Queue
      TopicName: !Sub "${AWS::StackName}-lambda-dlq"

Outputs:
  SSMParameterValue:
    Description: SSM Parameter Value
    Value: !Ref SSMParameter
  SecretsManagerSecretARN:
    Description: Secrets Manager Secret ARN
    Value: !Ref SecretsManagerSecret
  LambdaFunctionARN:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn