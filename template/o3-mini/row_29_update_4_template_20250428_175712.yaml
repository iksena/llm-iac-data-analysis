AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template for centralized configuration management.
  Deploys an SSM parameter for non-sensitive configuration, a Secrets Manager secret with a dynamic password and predefined username,
  an IAM role with least privilege for the Lambda function, and a Lambda function to fetch and decrypt configuration data.

Resources:
  ConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/exampleParameter"
      Type: String
      Value: "This is A/B"
      Description: "Non-sensitive configuration parameter for serverless applications."

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-AppSecret"
      Description: "Secret containing configuration credentials for the application."
      GenerateSecretString:
        SecretStringTemplate: '{"username": "adminUser"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '\"@/\\'
        ExcludePunctuation: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-LambdaExecutionRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaSSMSecretsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - ssm:GetParameter
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ConfigFetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ConfigFetcher"
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              # Create clients for SSM and Secrets Manager
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Retrieve parameters from SSM by path using the stack name as a namespace
              stack_name = os.environ.get('STACK_NAME')
              ssm_path = f"/{stack_name}/"
              ssm_response = ssm_client.get_parameters_by_path(
                  Path=ssm_path,
                  Recursive=True,
                  WithDecryption=True
              )
              parameters = ssm_response.get('Parameters', [])

              # Retrieve the secret from Secrets Manager
              secret_name = os.environ.get('SECRET_NAME')
              secret_response = secrets_client.get_secret_value(SecretId=secret_name)
              secret = secret_response.get('SecretString', '')

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_parameters': parameters,
                      'secret': secret
                  })
              }
      Environment:
        Variables:
          STACK_NAME: !Ref "AWS::StackName"
          SECRET_NAME: !Ref AppSecret

Outputs:
  SSMParameterName:
    Description: "Name of the SSM parameter storing non-sensitive configuration"
    Value: !Ref ConfigParameter

  SecretARN:
    Description: "ARN of the Secrets Manager secret"
    Value: !Ref AppSecret

  LambdaFunctionName:
    Description: "Name of the Lambda function fetching configurations"
    Value: !Ref ConfigFetcherFunction