AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VPCId:
    Type: String
    Description: ID of the existing VPC to associate with the private hosted zone
    AllowedPattern: '^vpc-[0-9a-f]{8}([0-9a-f]{9})?$'
    ConstraintDescription: "Must be a valid VPC ID (format: vpc-xxxxxxxx or vpc-xxxxxxxxxxxxxxxxx)"
  VPCRegion:
    Type: String
    Description: Region where the VPC is located (must match VPC's actual region)
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com.
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref VPCRegion
Outputs:
  HostedZoneId:
    Description: ID of the created private Route 53 hosted zone
    Value: !Ref PrivateHostedZone
  HostedZoneName:
    Description: Name of the private Route 53 hosted zone
    Value: www.example.com.
  NameServers:
    Description: Name servers for the hosted zone
    Value: !Join [", ", !GetAtt PrivateHostedZone.NameServers]
  AssociatedVPC:
    Description: VPC associated with the private hosted zone
    Value: !Sub '${VPCRegion}:${VPCId}'