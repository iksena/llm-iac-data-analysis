AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed
  
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for compute environment
    
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for compute environment
    
  ContainerImage:
    Type: String
    Description: URI of the container image to run
    
  MaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum vCPUs for the compute environment

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600
      
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: -1
          ToPort: -1
          CidrIp: '0.0.0.0/0'
          
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-batch-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'
        
  EcsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ecs-instance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role'
        
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ecs-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
        
  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-pipes-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action: 'batch:SubmitJob'
                Resource: '*'
                  
  EcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-ecs-instance-profile'
      Roles:
        - !Ref EcsInstanceRole
        
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: !Sub '${AWS::StackName}-compute-env'
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: EC2
        MaxvCpus: !Ref MaxvCpus
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        InstanceRole: !GetAtt EcsInstanceProfile.Arn
      ServiceRole: !GetAtt BatchServiceRole.Arn
      
  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub '${AWS::StackName}-job-queue'
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
          
  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Sub '${AWS::StackName}-job-def'
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Vcpus: 1
        Memory: 2048
        JobRoleArn: !GetAtt EcsTaskRole.Arn
      RetryStrategy:
        Attempts: 3
        
  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${AWS::StackName}-event-pipe'
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt EventQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      Target: !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}'
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: "ProcessOrder"
      
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref EventQueue
    
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn
    
  JobQueueArn:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn
    
  JobDefinitionArn:
    Description: ARN of the Batch job definition
    Value: !Ref BatchJobDefinition