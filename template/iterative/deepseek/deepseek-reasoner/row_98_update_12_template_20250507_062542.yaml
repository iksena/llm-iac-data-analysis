AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
  BranchName:
    Type: String
    Default: production

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Sub "${AmplifyApp.AppId}"
      BranchName: !Ref BranchName

Outputs:
  AmplifyAppId:
    Value: !Ref AmplifyApp