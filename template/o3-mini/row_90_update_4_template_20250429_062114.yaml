AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for EC2 Image Builder.
  This template provisions an S3 bucket for secure logging, an IAM role with an instance profile
  for EC2 instances with AmazonSSMManagedInstanceCore permissions, and attaches an inline policy
  that grants secure S3 read/write and list access to the logs bucket.

Resources:
  ImageBuilderLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  LogsBucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Properties:
      Bucket: !Ref ImageBuilderLogsBucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  EC2ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2ImageBuilderRole

  EC2ImageBuilderLoggingPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EC2ImageBuilderLoggingPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: 
              - !Sub "${ImageBuilderLogsBucket.Arn}/*"
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: 
              - !Sub "${ImageBuilderLogsBucket.Arn}"
      Roles:
        - !Ref EC2ImageBuilderRole

Outputs:
  LogsBucketName:
    Description: "The S3 bucket used to store image build logs."
    Value: !Ref ImageBuilderLogsBucket

  ImageBuilderRoleName:
    Description: "The IAM role assigned to EC2 Image Builder instances."
    Value: !Ref EC2ImageBuilderRole

  InstanceProfileName:
    Description: "The IAM Instance Profile for EC2 Image Builder instances."
    Value: !Ref EC2ImageBuilderInstanceProfile