AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Elastic Network Interface (ENI) with two Elastic IPs (EIPs) and secondary private IPs.

Parameters:
  SubnetId:
    Description: The Subnet ID where the ENI will be created.
    Type: AWS::EC2::Subnet::Id

Resources:
  MyENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: ENI with multiple IPs
      Tags:
        - Key: Name
          Value: MyENI

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Select
        - "0"
        - !GetAtt MyENI.SecondaryPrivateIpAddresses

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Select
        - "1"
        - !GetAtt MyENI.SecondaryPrivateIpAddresses

Outputs:
  ENIId:
    Description: The ID of the created ENI
    Value: !Ref MyENI

  EIP1Address:
    Description: The first Elastic IP address
    Value: !GetAtt EIP1.PublicIp

  EIP2Address:
    Description: The second Elastic IP address
    Value: !GetAtt EIP2.PublicIp