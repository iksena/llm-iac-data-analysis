AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
            - AttributeName: Album
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: alias/aws/dynamodb
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  APIGatewayIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  MusicAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicAPI
      Description: REST API for Music CRUD operations

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicAPI
      ParentId: !GetAtt MusicAPI.RootResourceId
      PathPart: music

  MusicPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicAPI
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem
          - region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayIAMRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "Artist": {
                  "S": "$input.path('$.artist')"
                },
                "Album": {
                  "S": "$input.path('$.album')"
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  MusicGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicAPI
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.path.artist: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query
          - region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayIAMRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": {
                  "S": "$input.path('$.artist')"
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  MusicAPIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref MusicAPI
          Stage: !Ref MusicAPIStage
      Quota:
        Limit: 10000
        Period: MONTH
      Throttle:
        BurstLimit: 100
        RateLimit: 50

  MusicAPIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicAPIKey
      Enabled: true

  MusicAPIUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicAPIUsagePlan

  MusicAPIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref MusicAPI
      DeploymentId: !Ref MusicAPIDeployment
      StageName: prod
      CacheClusterEnabled: true
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt APIGatewayLogGroup.Arn

  MusicAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - MusicPostMethod
      - MusicGetMethod
    Properties:
      RestApiId: !Ref MusicAPI

  APIGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/MusicAPI
      RetentionInDays: 30

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub
      - https://${apiId}.execute-api.${region}.amazonaws.com/prod/music
      - apiId: !Ref MusicAPI
        region: !Ref AWS::Region
  DynamoDBTableName:
    Description: DynamoDB Table Name
    Value: !Ref MusicTable