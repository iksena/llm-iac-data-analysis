AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange pipeline for EDI X12_214 to JSON transformation

Parameters:
  ProfileName:
    Type: String
    Default: DefaultProfile
    Description: Name of the B2BI profile
  ContactName:
    Type: String
    Default: Business Contact
    Description: Business contact name
  ContactEmail:
    Type: String
    Default: contact@example.com
    Description: Business contact email
  ContactPhone:
    Type: String
    Default: +1234567890
    Description: Business contact phone number
  InputBucketName:
    Type: String
    Default: edi-input-bucket
    Description: Name of the input S3 bucket for EDI files
  OutputBucketName:
    Type: String
    Default: json-output-bucket
    Description: Name of the output S3 bucket for JSON files

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogPrefix: input-bucket-logs/

  OutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogPrefix: output-bucket-logs/

  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: edi-log-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda security group
      VpcId: !Ref VPC

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  EDILambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  edi_file = s3.get_object(Bucket=bucket, Key=key)
                  edi_content = edi_file['Body'].read().decode('utf-8')
                  json_content = transform_edi_to_json(edi_content)
                  output_key = key.replace('edi/', 'json/').replace('.edi', '.json')
                  s3.put_object(Bucket=os.environ['OUTPUT_BUCKET'], Key=output_key, Body=json_content)
              return {'statusCode': 200}

          def transform_edi_to_json(edi_content):
              # Simplified transformation logic
              return json.dumps({"edi_content": edi_content})
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucketName
      VpcConfig:
        SubnetIds:
          - !Ref Subnet
        SecurityGroupIds:
          - !Ref SecurityGroup
      DeadLetterConfig:
        TargetArn: !GetAtt DLQ.Arn
      KmsKeyArn: !GetAtt LambdaKMSKey.Arn
      ReservedConcurrentExecutions: 10

  DLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: edi-lambda-dlq

  LambdaKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda environment variables
      EnableKeyRotation: true

  EDILambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt EDILambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InputBucket.Arn
      SourceAccount: !Ref 'AWS::AccountId'

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${InputBucketName}/*'

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${OutputBucketName}/*'

  ProfileResource:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/b2bi/profiles/${ProfileName}'
      Type: String
      Value: !Sub '{"name": "${ContactName}", "email": "${ContactEmail}", "phone": "${ContactPhone}"}'
      Description: B2BI Profile Configuration

Outputs:
  InputBucketName:
    Description: Input S3 Bucket Name
    Value: !Ref InputBucketName
  OutputBucketName:
    Description: Output S3 Bucket Name
    Value: !Ref OutputBucketName
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt EDILambdaFunction.Arn