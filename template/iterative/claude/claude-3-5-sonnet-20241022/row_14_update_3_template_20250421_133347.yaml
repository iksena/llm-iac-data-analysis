AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with two EIPs and secondary private IPs'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC where the ENI will be created'
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet where the ENI will be created'
  
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: 'Security Group for the ENI'

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: 'Network Interface with multiple IPs'
      GroupSet: 
        - !Ref SecurityGroupId
      SecondaryPrivateIpAddressCount: 1

  FirstEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  SecondEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: FirstEIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: 'ID of the created Network Interface'
    Value: !Ref NetworkInterface

  PrimaryPrivateIP:
    Description: 'Primary Private IP of the ENI'
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  FirstEIPAddress:
    Description: 'First Elastic IP Address'
    Value: !Ref FirstEIP

  SecondEIPAddress:
    Description: 'Second Elastic IP Address'
    Value: !Ref SecondEIP