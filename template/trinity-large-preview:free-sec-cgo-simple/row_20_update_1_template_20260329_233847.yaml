AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ClientVPNAuthDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAuthDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# Client VPN Usage Dashboard"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ClientConnectionCount", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Connections" } ],
                  [ "AWS/ClientVPN", "ClientConnectionCount", "AuthenticationMethod", "MutualAuth", { "label": "Mutual Auth Connections" } ],
                  [ "AWS/ClientVPN", "ClientConnectionCount", "AuthenticationMethod", "MixedAuth", { "label": "Mixed Auth Connections" } ]
                ],
                "region": "us-east-1",
                "title": "Connection Count by Authentication Method"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "BytesIn", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Ingress" } ],
                  [ "AWS/ClientVPN", "BytesOut", "AuthenticationMethod", "AD/SAML", { "label": "AD/SAML Egress" } ],
                  [ "AWS/ClientVPN", "BytesIn", "AuthenticationMethod", "MutualAuth", { "label": "Mutual Auth Ingress" } ],
                  [ "AWS/ClientVPN", "BytesOut", "AuthenticationMethod", "MutualAuth", { "label": "Mutual Auth Egress" } ]
                ],
                "region": "us-east-1",
                "title": "Data Transfer by Authentication Method"
              }
            }
          ]
        }

  ClientVPNConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNConnectionDuration
      LogGroupNames:
        - "/aws/vpn-endpoint/logs"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection/
        | stats count(*) as TotalConnections, avg(duration) as AvgDuration
        | sort by TotalConnections desc

  ClientVPNDataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNDataTransfer
      LogGroupNames:
        - "/aws/vpn-endpoint/logs"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /transfer/
        | stats sum(bytesIn) as TotalIngress, sum(bytesOut) as TotalEgress
        | sort by TotalIngress desc

  ClientVPNUserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNUserActivity
      LogGroupNames:
        - "/aws/vpn-endpoint/logs"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /user/
        | stats count(*) as UserConnections, distinct_count(user) as DistinctUsers
        | sort by UserConnections desc

  ClientVPNAuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNAuthBreakdown
      LogGroupNames:
        - "/aws/vpn-endpoint/logs"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /authentication/
        | stats count(*) as AuthCount by authenticationMethod
        | sort by AuthCount desc

  ClientVPNEndpointUsageQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNEndpointUsage
      LogGroupNames:
        - "/aws/vpn-endpoint/logs"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /endpoint/
        | stats count(*) as EndpointConnections by endpointId
        | sort by EndpointConnections desc