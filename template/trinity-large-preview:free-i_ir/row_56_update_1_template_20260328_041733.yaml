AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: SecureUserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: Your verification code is {####}
      EmailVerificationSubject: Your verification code
      Schema:
        - Name: email
          AttributeDataType: String
          DeveloperOnlyAttribute: false
          Mutable: false
          Required: true
          StringAttributeConstraints:
            MinLength: "0"
            MaxLength: "2048"
      # Encryption at rest is handled by AWS Cognito service
      # Versioning is not applicable to Cognito User Pools

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: SecureAppClient
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      WriteAttributes:
        - email
      ReadAttributes:
        - email
    DependsOn: CognitoUserPool

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: secure-auth-domain
      UserPoolId: !Ref CognitoUserPool
    DependsOn: CognitoUserPool

Outputs:
  UserPoolId:
    Description: ID of the created Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: ID of the created Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient
  UserPoolDomain:
    Description: Domain name for the Cognito User Pool
    Value: !Ref CognitoUserPoolDomain