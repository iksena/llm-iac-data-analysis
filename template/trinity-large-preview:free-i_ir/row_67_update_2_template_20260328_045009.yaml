AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-wide or Single-Account Access Control

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID (e.g. o-xxxxxxxxxx) - Leave empty for single account access
    Default: ''

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OrganizationAccess
            Effect: Allow
            Principal:
              AWS: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID:
                  Ref: OrganizationId
          - Sid: SingleAccountAccess
            Effect: Allow
            Principal:
              AWS: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID:
                  Ref: OrganizationId

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket