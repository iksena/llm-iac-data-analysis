AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS KMS Key with Alias for centralized encryption management'
Parameters:
  KeyAlias:
    Type: String
    Default: my-encryption-key
    Description: 'Name for the KMS key alias (without "alias/" prefix)'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '[\w/.-]+'
    ConstraintDescription: 'Alias name can only contain alphanumeric characters, forward slashes, underscores, periods, and hyphens'
  KeyDescription:
    Type: String
    Default: 'KMS key for centralized encryption management'
    Description: 'Description of the KMS key'
    MinLength: 1
    MaxLength: 8192
Resources:
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KeyDescription
      KeyPolicy: !Sub |
        {
          "Version": "2012-10-17",
          "Id": "key-default",
          "Statement": [
            {
              "Sid": "Enable IAM User Permissions",
              "Effect": "Allow",
              "Principal": {
                "AWS": "arn:aws:iam::${AWS::AccountId}:root"
              },
              "Action": "kms:*",
              "Resource": "*"
            }
          ]
        }
      EnableKeyRotation: true
  KeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${KeyAlias}'
      TargetKeyId: !Ref EncryptionKey
Outputs:
  KeyId:
    Value: !Ref EncryptionKey
    Description: 'ID of the KMS key'
  KeyArn:
    Value: !GetAtt EncryptionKey.Arn
    Description: 'ARN of the KMS key'
  AliasName:
    Value: !Sub 'alias/${KeyAlias}'
    Description: 'Complete alias name for the KMS key'