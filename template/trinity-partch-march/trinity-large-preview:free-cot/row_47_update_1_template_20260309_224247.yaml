AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for EC2 with Read-Only IAM Metadata Access

Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2IAMReadOnlyRole
      Description: IAM role for EC2 instances with read-only access to IAM metadata
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Policies:
        - PolicyName: CustomIAMReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListRoles
                  - iam:ListPolicies
                  - iam:ListGroups
                  - iam:ListServerCertificates
                  - iam:ListVirtualMFADevices
                  - iam:ListAccessKeys
                  - iam:ListSigningCertificates
                  - iam:ListSSHPublicKeys
                  - iam:ListServiceSpecificCredentials
                  - iam:ListMFADevices
                  - iam:GetUser
                  - iam:GetRole
                  - iam:GetPolicy
                  - iam:GetGroup
                  - iam:GetAccountAuthorizationDetails
                  - iam:GetAccountSummary
                  - iam:GenerateCredentialReport
                  - iam:GenerateOrganizationsAccessReport
                  - iam:SimulateCustomPolicy
                  - iam:SimulatePrincipalPolicy
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: EC2IAMReadOnlyInstanceProfile
      Roles:
        - !Ref EC2IAMReadOnlyRole

Outputs:
  IAMRoleArn:
    Description: ARN of the IAM role created
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
  InstanceProfileName:
    Description: Name of the instance profile
    Value: !Ref EC2InstanceProfile