AWSTemplateFormatVersion: '2010-09-09'
Description: Secure static website on S3 with CloudFront CDN and automated deployment

Parameters:
  SiteName:
    Type: String
    Default: my-static-site
    Description: Name for the static website (used in bucket naming)
  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: Lambda runtime version

Resources:
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub ${SiteName}-static-site
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub OAI for ${SiteName} static site

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub arn:${AWS::Partition}:s3:::${StaticSiteBucket}/*
          - Effect: Allow
            Principal: "*"
            Action: s3:ListBucket
            Resource: !GetAtt StaticSiteBucket.Arn
            Condition:
              StringEquals:
                aws:referer: !Ref SiteName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${StaticSiteBucket}/*
              - Effect: Allow
                Action: s3:DeleteObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${StaticSiteBucket}/*

  DeployLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib3

          def handler(event, context):
              try:
                  bucket_name = event['ResourceProperties']['BucketName']
                  s3 = boto3.client('s3')
                  http = urllib3.PoolManager()

                  if event['RequestType'] == 'Create':
                      # Create index.html
                      index_content = """
                      <!DOCTYPE html>
                      <html>
                      <head>
                          <title>Welcome</title>
                      </head>
                      <body>
                          <h1>Welcome to your static site!</h1>
                      </body>
                      </html>
                      """
                      s3.put_object(Bucket=bucket_name, Key='index.html', Body=index_content)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  elif event['RequestType'] == 'Delete':
                      # Empty the bucket
                      s3 = boto3.client('s3')
                      bucket = s3.list_objects_v2(Bucket=bucket_name)
                      if 'Contents' in bucket:
                          for item in bucket['Contents']:
                              s3.delete_object(Bucket=bucket_name, Key=item['Key'])
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  DeployLambdaCustomResource:
    Type: Custom::DeployLambda
    Properties:
      ServiceToken: !GetAtt DeployLambda.Arn
      BucketName: !Ref StaticSiteBucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${OriginAccessIdentity}
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          Compress: true
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  WebsiteURL:
    Value: !GetAtt StaticSiteBucket.WebsiteURL
    Description: URL of the static website hosted on S3
  CloudFrontURL:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: CloudFront distribution domain name