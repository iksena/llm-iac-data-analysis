AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${EMRServerlessBucket}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${EMRServerlessBucket}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: emr-serverless-scripts-data
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  EMRServerlessBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EMRServerlessBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${EMRServerlessBucket}/*'

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: emr-serverless-spark-app
      Type: spark
      ReleaseLabel: emr-6.15.0
      AutoStartConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 5
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 10