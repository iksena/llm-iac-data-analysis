AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an auto-configuring EC2 instance with Nginx installation
  and enhanced monitoring using AWS Systems Manager, with centralized logging to S3.

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket for storing logs

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0b2f6494ff0b07a0e

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:*
                  - ec2messages:*
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: NginxServer
        - Key: InstallNginx
          Value: 'true'

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: "Install and start Nginx"
        mainSteps:
          - action: aws:runShellScript
            name: installNginx
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo amazon-linux-extras install nginx1 -y
                - sudo systemctl start nginx
                - sudo systemctl enable nginx

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:InstallNginx
          Values: ['true']

Outputs:
  InstanceId:
    Description: The Instance ID of the EC2 instance
    Value: !Ref EC2Instance
  InstancePublicDNS:
    Description: The public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  S3BucketName:
    Description: The name of the S3 bucket for logs
    Value: !Ref S3Bucket