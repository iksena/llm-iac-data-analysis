AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecretsManagerMonitoringTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerMonitoringTopic

  SecretsManagerMonitoringTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsManagerMonitoringTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SecretsManagerMonitoringTopic

  SecretsManagerMonitoringRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Monitor Secrets Manager API calls for critical lifecycle events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - DeleteSecret
            - RotateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerMonitoringTopic
          Id: SendToSNS

Outputs:
  SecretsManagerMonitoringTopicArn:
    Description: ARN of the SNS topic for Secrets Manager monitoring
    Value: !Ref SecretsManagerMonitoringTopic