AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'

  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'

  MFARequirementDuration:
    Type: Number
    Description: Duration in seconds for MFA token validity
    Default: 43200
    MinValue: 3600
    MaxValue: 86400

  Environment:
    Type: String
    Description: Environment type for permission boundaries
    AllowedValues:
      - Development
      - Production
    Default: Development

Resources:
  MFARequirementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: MFARequirement
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: MFARequired
            Effect: Deny
            NotAction:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
            Condition:
              BoolIfExists:
                aws:MultiFactorAuthPresent: false

  PrivilegedAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: PrivilegedAdmin
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'organizations:*'
              - 'cloudhsm:*'
              - 'billing:*'
            Resource: '*'

  RestrictedAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RestrictedAdmin
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:*'
              - 's3:*'
              - 'rds:*'
              - 'cloudwatch:*'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'iam:*'
              - 'organizations:*'
              - 'cloudhsm:*'
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: IdentityAdmin
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'organizations:DescribeOrganization'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'iam:DeleteAccountPasswordPolicy'
              - 'iam:DeleteUserPolicy'
            Resource: '*'

  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmins
      ManagedPolicyArns:
        - !Ref PrivilegedAdminPolicy
        - !Ref MFARequirementPolicy

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmins
      ManagedPolicyArns:
        - !Ref RestrictedAdminPolicy
        - !Ref MFARequirementPolicy

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmins
      ManagedPolicyArns:
        - !Ref IdentityAdminPolicy
        - !Ref MFARequirementPolicy

  CrossAccountAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountAccess
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - !Ref PrivilegedAdminPolicy

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  PrivilegedAdminGroupArn:
    Description: ARN of Privileged Admin Group
    Value: !GetAtt PrivilegedAdminGroup.Arn

  RestrictedAdminGroupArn:
    Description: ARN of Restricted Admin Group
    Value: !GetAtt RestrictedAdminGroup.Arn

  IdentityAdminGroupArn:
    Description: ARN of Identity Admin Group
    Value: !GetAtt IdentityAdminGroup.Arn

  CrossAccountAccessRoleArn:
    Description: ARN of Cross-Account Access Role
    Value: !GetAtt CrossAccountAccessRole.Arn

  CloudFormationExecutionRoleArn:
    Description: ARN of CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn

  StackSetExecutionRoleArn:
    Description: ARN of StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn