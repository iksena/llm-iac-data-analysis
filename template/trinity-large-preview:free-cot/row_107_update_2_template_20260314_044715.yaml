AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with SQS for HTTP-based message retrieval

Parameters:
  QueueName:
    Type: String
    Default: MessageQueue
    Description: Name of the SQS queue
  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Default visibility timeout for the queue in seconds
  MaxMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds

Resources:
  APIGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: SQSPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                Resource:
                  - !GetAtt SQSQueue.Arn

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: !Ref VisibilityTimeout
      MaximumMessageSize: !Ref MaxMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt APIGatewayExecutionRole.Arn
            Action:
              - sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

  APIGatewayRestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQSMessageAPI
      Description: REST API for retrieving messages from SQS

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      ParentId: !GetAtt APIGatewayRestAPI.RootResourceId
      PathPart: messages

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      ResourceId: !Ref APIGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: false

  APIGatewayIntegration:
    Type: AWS::ApiGateway::Integration
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      ResourceId: !Ref APIGatewayResource
      HttpMethod: POST
      Type: AWS_PROXY
      IntegrationHttpMethod: POST
      Uri: !Sub
        - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}
        - QueueName: !Ref QueueName
      Credentials: !GetAtt APIGatewayExecutionRole.Arn
      RequestParameters:
        integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
      RequestTemplates:
        application/json: !Sub |
          Action=ReceiveMessage
          &Version=2012-11-05
          &QueueUrl=https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${QueueName}
          &MaxNumberOfMessages=$input.params('MaxNumberOfMessages')
          &VisibilityTimeout=$input.params('VisibilityTimeout')
          &WaitTimeSeconds=$input.params('WaitTimeSeconds')

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - APIGatewayIntegration
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      Description: Deployment for production stage

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestAPI
      StageName: prod
      Description: Production stage

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL for the production environment
    Value: !Sub https://${APIGatewayRestAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/messages
  SQSQueueURL:
    Description: URL of the created SQS queue
    Value: !GetAtt SQSQueue.QueueUrl
  SQSQueueARN:
    Description: ARN of the created SQS queue
    Value: !GetAtt SQSQueue.Arn