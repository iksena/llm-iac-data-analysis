AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      OauthToken: '{{resolve:secretsmanager:GitHubOAuthToken}}'
      Repository: https://github.com/yourusername/TodoApp.git
      Platform: WEB
      IAMServiceRole: !GetAtt AmplifyRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      Stage: PRODUCTION
      Framework: react
      BuildSpec: |
        version: 0.2
        phases:
          build:
            commands:
              - npm install
              - npm run build
      EnablePullRequestPreview: false

  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForAmplify
      Policies:
        - PolicyName: AmplifyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                  - codebuild:*
                  - s3:*
                  - cloudformation:*
                  - logs:*
                  - iam:PassRole
                Resource: '*'

Outputs:
  AppId:
    Description: Amplify Application ID
    Value: !Ref AmplifyApp
  DefaultDomain:
    Description: Default domain for the Amplify application
    Value: !GetAtt AmplifyApp.DefaultDomain