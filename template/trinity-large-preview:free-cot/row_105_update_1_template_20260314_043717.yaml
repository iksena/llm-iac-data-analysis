AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Service Automation Workflows

Parameters:
  Environment:
    Type: String
    Default: Production
    AllowedValues:
      - Production
      - Staging
      - Development
      - Testing
    Description: Environment for the IAM role

  RoleNamePrefix:
    Type: String
    Default: AutomationRole
    Description: Prefix for the IAM role name

Resources:
  AutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${RoleNamePrefix}-${Environment}-${AWS::Region}-${AWS::AccountId}
      Description: IAM role for cross-service automation workflows with SSM, EC2, and monitoring permissions
      Path: "/"
      MaxSessionDuration: 43200
      PermissionsBoundary: !Ref PermissionsBoundaryArn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: AutomationWorkflows
        - Key: Owner
          Value: InfrastructureTeam
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - lambda.amazonaws.com
                - ssm.amazonaws.com
                - states.amazonaws.com
            Action:
              - sts:AssumeRole

  SSMManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${RoleNamePrefix}-SSM-${Environment}
      Description: Managed policy for Systems Manager permissions
      Path: "/"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ssm:DescribeAssociation
              - ssm:GetDeployablePatchSnapshotForInstance
              - ssm:GetDocument
              - ssm:ListAssociations
              - ssm:ListInstanceAssociations
              - ssm:PutInventory
              - ssm:PutComplianceItems
              - ssm:PutConfigurePackageResult
              - ssm:UpdateAssociationStatus
              - ssm:UpdateInstanceAssociationStatus
              - ssm:UpdateInstanceInformation
              - ssmmessages:CreateControlChannel
              - ssmmessages:CreateDataChannel
              - ssmmessages:OpenControlChannel
              - ssmmessages:OpenDataChannel
              - ec2messages:AcknowledgeMessage
              - ec2messages:DeleteMessage
              - ec2messages:FailMessage
              - ec2messages:GetEndpoint
              - ec2messages:GetMessages
              - ec2messages:SendReplyMessage
            Resource: "*"

  EC2ManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${RoleNamePrefix}-EC2-${Environment}
      Description: Managed policy for EC2 permissions
      Path: "/"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:Describe*
              - ec2:GetConsoleOutput
              - ec2:GetConsoleScreenshot
              - ec2:RebootInstances
              - ec2:StartInstances
              - ec2:StopInstances
              - ec2:CreateTags
              - ec2:DeleteTags
              - ec2:ModifyInstanceAttribute
              - ec2:ModifyVolume
              - ec2:ResetInstanceAttribute
              - ec2:ResetNetworkInterfaceAttribute
              - ec2:RunScheduledInstances
              - ec2:CreateVolume
              - ec2:AttachVolume
              - ec2:DetachVolume
              - ec2:DeleteVolume
              - ec2:CreateSnapshot
              - ec2:DeleteSnapshot
              - ec2:CreateImage
              - ec2:DeregisterImage
              - ec2:CopyImage
              - ec2:ImportImage
              - ec2:ExportImage
              - ec2:CreateInstanceExportTask
              - ec2:CancelExportTask
              - ec2:ModifySnapshotAttribute
