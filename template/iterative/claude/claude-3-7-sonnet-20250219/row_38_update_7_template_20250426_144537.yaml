AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with Lambda trigger'

Parameters:
  LambdaRuntime:
    Type: String
    Description: Runtime for the Lambda function
    Default: python3.9
    AllowedValues:
      - python3.8
      - python3.9
      - python3.10
  
  LambdaMemorySize:
    Type: Number
    Description: Memory size for the Lambda function (in MB)
    Default: 128
    MinValue: 128
    MaxValue: 10240
  
  LambdaTimeout:
    Type: Number
    Description: Timeout for the Lambda function (in seconds)
    Default: 30
    MinValue: 1
    MaxValue: 900

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ProcessorFunction.Arn
    DependsOn: LambdaInvokePermission

  ProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          BUCKET_NAME: !Ref S3Bucket
      Code:
        ZipFile: |
          import json
          import urllib.parse
          import boto3
          import os

          s3 = boto3.client('s3')

          def handler(event, context):
              # Get the object from the event
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'], encoding='utf-8')
              
              try:
                  # Log event details
                  print(f"Processing object: {key} from bucket: {bucket}")
                  
                  # Get object metadata
                  response = s3.head_object(Bucket=bucket, Key=key)
                  print(f"Object metadata: {response}")
                  
                  # Return success
                  return {
                      'statusCode': 200,
                      'body': json.dumps(f'Successfully processed {key} from {bucket}')
                  }
              except Exception as e:
                  print(e)
                  print(f'Error processing object {key} from bucket {bucket}')
                  raise e

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket}"
                  - !Sub "arn:${AWS::Partition}:s3:::${S3Bucket}/*"

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProcessorFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:${AWS::Partition}:s3:::${S3Bucket}"

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref ProcessorFunction
  
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ProcessorFunction.Arn