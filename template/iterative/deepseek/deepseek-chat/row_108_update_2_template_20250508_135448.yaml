AWSTemplateFormatVersion: '2010-09-09'
Description: Secure AWS Cognito User Pool with Admin-Managed User Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: SecureUserPool
    Description: Name for the Cognito User Pool
  EmailVerificationSubject:
    Type: String
    Default: Your verification code
    Description: Subject line for verification emails
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
    Description: Content of verification emails
  PasswordMinLength:
    Type: Number
    Default: 8
    MinValue: 6
    MaxValue: 99
    Description: Minimum password length
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require lowercase characters
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require uppercase characters
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require numeric characters
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require special characters
  DomainPrefix:
    Type: String
    Default: secure-auth
    Description: Prefix for Cognito hosted UI domain
  CallbackURL:
    Type: String
    Default: https://example.com/callback
    Description: OAuth callback URL
  LogoutURL:
    Type: String
    Default: https://example.com/logout
    Description: OAuth logout URL

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationSubject: !Ref EmailVerificationSubject
      EmailVerificationMessage: !Ref EmailVerificationMessage
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireLowercase: !Equals [!Ref RequireLowercase, 'true']
          RequireNumbers: !Equals [!Ref RequireUppercase, 'true']
          RequireSymbols: !Equals [!Ref RequireSymbols, 'true']
          RequireUppercase: !Equals [!Ref RequireNumbers, 'true']
      Schema:
        - AttributeDataType: String
          Name: email
          Required: true
          Mutable: true
      UsernameAttributes:
        - email

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${UserPoolName}Client
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      RefreshTokenValidity: 30
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackURL
      LogoutURLs:
        - !Ref LogoutURL
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Description: Created User Pool ID
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: User Pool ARN
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: User Pool Client ID
  UserPoolDomain:
    Value: !GetAtt UserPoolDomain.Domain
    Description: User Pool Domain
  HostedUIURL:
    Value: !Sub https://${UserPoolDomain.Domain}.auth.${AWS::Region}.amazoncognito.com
    Description: Hosted UI URL