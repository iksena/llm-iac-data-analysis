AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  KinesisStreamName:
    Type: String
    Default: MyKinesisStream
    Description: Name of the Kinesis Data Stream

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  APIGatewayPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: APIGatewayKinesisPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - kinesis:DescribeStream
              - kinesis:ListStreams
            Resource: !GetAtt KinesisStream.Arn
      Roles:
        - !Ref APIGatewayRole

  APIRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisAPIGateway
      Description: REST API Gateway for Kinesis Data Streams

  KinesisResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIRestApi
      ParentId: !GetAtt APIRestApi.RootResourceId
      PathPart: kinesis

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIRestApi
      ResourceId: !Ref KinesisResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
          - AWS::Region: !Ref AWS::Region
        IntegrationResponses:
          - StatusCode: 200

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIRestApi
      ResourceId: !Ref KinesisResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
          - AWS::Region: !Ref AWS::Region
        IntegrationResponses:
          - StatusCode: 200

  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref APIRestApi
      Description: Deployment of Kinesis API

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref APIRestApi
      DeploymentId: !Ref APIDeployment
      StageName: prod

Outputs:
  APIGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub
      - https://${apiId}.execute-api.${AWS::Region}.amazonaws.com/prod/kinesis
      - apiId: !Ref APIRestApi