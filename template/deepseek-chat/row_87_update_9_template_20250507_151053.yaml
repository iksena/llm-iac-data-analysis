AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a public S3 bucket for Lambda artifacts with KMS encryption'

Parameters:
  BucketNamePrefix:
    Type: String
    Description: 'Prefix for the S3 bucket name (will be combined with account ID)'
    Default: 'lambda-artifacts-bucket'
    AllowedPattern: '^[a-z0-9-]{1,50}$'
    ConstraintDescription: 'Bucket name prefix must contain only lowercase letters, numbers and hyphens'

  KeyAliasName:
    Type: String
    Description: 'Alias for the KMS key (without "alias/" prefix)'
    Default: 'lambda-artifacts-key'
    AllowedPattern: '^[a-zA-Z0-9/_-]+$'
    ConstraintDescription: 'Key alias must contain valid characters'

  ServiceRoleARN:
    Type: String
    Description: 'ARN of the service role that needs KMS key access'
    Default: ''
    AllowedPattern: '^$|^arn:aws:iam::\d{12}:role/[a-zA-Z0-9+=,.@_-]+$'
    ConstraintDescription: 'Must be a valid IAM role ARN or empty'

Conditions:
  HasServiceRole: !Not [!Equals [!Ref ServiceRoleARN, '']]

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: 'BucketOwnerPreferred'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              StringLike:
                'aws:UserAgent': 'aws-cli/*'

  KMSKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: 'KMS key for encrypting Lambda artifacts'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-policy'
        Statement:
          - Sid: 'Enable root account permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: 'Allow service role access'
            Effect: 'Allow'
            Principal:
              AWS: !If [HasServiceRole, !Ref ServiceRoleARN, !Ref 'AWS::NoValue']
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'

  KMSKeyAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: !Sub 'alias/${KeyAliasName}'
      TargetKeyId: !GetAtt KMSKey.KeyId

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketARN:
    Description: 'ARN of the S3 bucket'
    Value: !GetAtt S3Bucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketARN'

  KMSKeyARN:
    Description: 'ARN of the KMS key'
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyARN'

  KMSKeyAliasName:
    Description: 'Full alias name of the KMS key'
    Value: !Sub 'alias/${KeyAliasName}'
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyAliasName'