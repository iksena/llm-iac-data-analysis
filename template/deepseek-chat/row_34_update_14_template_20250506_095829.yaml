AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for MySQL RDS instance with Provisioned IOPS in a VPC'

Parameters:
  DBName:
    Type: String
    Default: 'mydatabase'
    Description: 'The database name'
  
  DBUsername:
    Type: String
    Default: 'admin'
    Description: 'The database admin username'
    NoEcho: true
  
  AllocatedStorage:
    Type: Number
    Default: 100
    Description: 'The allocated storage size in GB'
    MinValue: 100
    MaxValue: 65536
  
  IOPS:
    Type: Number
    Default: 1000
    Description: 'The Provisioned IOPS value'
    MinValue: 1000
    MaxValue: 80000

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'RDS-VPC'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: 'Private-Subnet-AZ1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: 'Private-Subnet-AZ2'

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for MySQL RDS instance'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: '10.0.0.0/16'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for MySQL RDS instance'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'rds-credentials-${AWS::StackName}'
      Description: 'Database credentials for MySQL RDS instance'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: mysql
      EngineVersion: '8.0.35'
      DBInstanceClass: db.r5.large
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: io1
      Iops: !Ref IOPS
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      MultiAZ: true
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionProtection: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'

Outputs:
  RDSInstanceEndpoint:
    Description: 'MySQL RDS instance endpoint'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  
  RDSSecurityGroupId:
    Description: 'Security Group ID for RDS instance'
    Value: !Ref RDSSecurityGroup
  
  VPCId:
    Description: 'VPC ID created for RDS'
    Value: !Ref VPC
  
  PrivateSubnet1Id:
    Description: 'First private subnet ID'
    Value: !Ref PrivateSubnet1
  
  PrivateSubnet2Id:
    Description: 'Second private subnet ID'
    Value: !Ref PrivateSubnet2
  
  DBSecretArn:
    Description: 'ARN of the Secrets Manager secret containing database credentials'
    Value: !Ref DBSecret