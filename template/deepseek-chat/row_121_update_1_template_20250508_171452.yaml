AWSTemplateFormatVersion: '2010-09-09'
Description: 'Scheduled automation workflow with EventBridge Scheduler and SSM'

Parameters:
  KeyName:
    Description: 'Name of an existing EC2 KeyPair to enable SSH access'
    Type: 'AWS::EC2::KeyPair::KeyName'
    ConstraintDescription: 'Must be the name of an existing EC2 KeyPair.'
  InstanceType:
    Description: 'EC2 instance type'
    Type: String
    Default: 't3.micro'
    AllowedValues:
      - 't2.micro'
      - 't3.micro'
      - 't3.small'
    ConstraintDescription: 'Must be a valid EC2 instance type.'
  LinuxAMI:
    Description: 'Amazon Linux 2 AMI ID'
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
  WindowsAMI:
    Description: 'Windows Server 2022 AMI ID'
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base'

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMI: 'ami-0c55b159cbfafe1f0'
      WindowsAMI: 'ami-0d1bf5b68307103c2'

Resources:
  LogBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${AWS::StackName}-logs-${AWS::AccountId}'
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess'

  EventBridgeSchedulerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'scheduler.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'SSMInvokePolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:StartAutomationExecution'
                  - 'ssm:SendCommand'
                  - 'ssm:CreateAssociation'
                Resource: '*'

  LinuxInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref LinuxAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Sub '${EC2InstanceRole}-instance-profile'
      Tags:
        - Key: 'Name'
          Value: 'LinuxInstance'
        - Key: 'HelloWorld'
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y amazon-ssm-agent
          systemctl start amazon-ssm-agent
          systemctl enable amazon-ssm-agent

  WindowsInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Sub '${EC2InstanceRole}-instance-profile'
      Tags:
        - Key: 'Name'
          Value: 'WindowsInstance'
        - Key: 'HelloWorld'
          Value: 'true'

  LinuxSSMDocument:
    Type: 'AWS::SSM::Document'
    Properties:
      DocumentType: 'Command'
      Content:
        schemaVersion: '2.2'
        description: 'Hello World for Linux'
        mainSteps:
          - action: 'aws:runShellScript'
            name: 'HelloWorldLinux'
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'

  WindowsSSMDocument:
    Type: 'AWS::SSM::Document'
    Properties:
      DocumentType: 'Command'
      Content:
        schemaVersion: '2.2'
        description: 'Hello World for Windows'
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: 'HelloWorldWindows'
            inputs:
              runCommand:
                - 'Write-Output "Hello World from Windows!"'

  SSMAssociation:
    Type: 'AWS::SSM::Association'
    Properties:
      Name: !Ref LinuxSSMDocument
      Targets:
        - Key: 'tag:HelloWorld'
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: 'ssm-output'

  EventBridgeSchedule:
    Type: 'AWS::Scheduler::Schedule'
    Properties:
      Name: 'SSMExecutionSchedule'
      Description: 'Runs SSM Association every 15 minutes'
      ScheduleExpression: 'rate(15 minutes)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}'
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 3

Outputs:
  LinuxInstanceId:
    Description: 'ID of the Linux EC2 instance'
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: 'ID of the Windows EC2 instance'
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: 'Name of the S3 bucket for logs'
    Value: !Ref LogBucket
  ScheduleARN:
    Description: 'ARN of the EventBridge Schedule'
    Value: !GetAtt EventBridgeSchedule.Arn
  AssociationId:
    Description: 'ID of the SSM Association'
    Value: !Ref SSMAssociation