AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcEndpointId:
    Type: String
    Description: "REQUIRED: Valid VPC Endpoint ID (vpce-xxxxxxxx)"
    AllowedPattern: "^vpce-[a-zA-Z0-9]{17}$"
    ConstraintDescription: "Must be a valid VPC endpoint ID starting with 'vpce-'" 
    Default: "REPLACE_WITH_VPC_ENDPOINT_ID"

  DomainName:
    Type: String
    Description: "REQUIRED: Custom domain name (e.g., api.yourdomain.com)"
    AllowedPattern: "^[a-zA-Z0-9.-]+$"
    ConstraintDescription: "Must be a valid domain name"
    Default: "REPLACE_WITH_YOUR_DOMAIN"

  CertificateArn:
    Type: String
    Description: "REQUIRED: ACM Certificate ARN from same region"
    AllowedPattern: "^arn:aws:acm:[a-z0-9-]+:[0-9]+:certificate/[a-zA-Z0-9-]+$"
    ConstraintDescription: "Must be a valid ACM certificate ARN"
    Default: "REPLACE_WITH_CERTIFICATE_ARN"

  HostedZoneId:
    Type: String
    Description: "REQUIRED: Route53 Hosted Zone ID (ZABC12345678)"
    AllowedPattern: "^Z[A-Z0-9]{12,}$"
    ConstraintDescription: "Must be a valid Route53 hosted zone ID"
    Default: "REPLACE_WITH_HOSTED_ZONE_ID"

Resources:
  # ... (keep all resource definitions unchanged from previous template) ...

Outputs:
  # ... (keep all output definitions unchanged from previous template) ...