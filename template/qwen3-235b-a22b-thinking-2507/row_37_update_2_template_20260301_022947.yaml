AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-access-logs"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256

  PrimaryStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-primary"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LoggingConfiguration:
        LogDestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: primary/

  PrimaryStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryStorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${PrimaryStorageBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${PrimaryStorageBucket}/*"
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  ReplicaStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-replica"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LoggingConfiguration:
        LogDestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: replica/

  ReplicaStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReplicaStorageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${ReplicaStorageBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${ReplicaStorageBucket}/*"
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Outputs:
  PrimaryBucketName:
    Description: Name of the primary storage bucket
    Value: !Ref PrimaryStorageBucket
  ReplicaBucketName:
    Description: Name of the replica storage bucket
    Value: !Ref ReplicaStorageBucket
  AccessLogsBucketName:
    Description: Name of the access logs bucket
    Value: !Ref AccessLogsBucket