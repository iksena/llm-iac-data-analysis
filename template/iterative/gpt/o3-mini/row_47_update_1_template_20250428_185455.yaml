AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM Role for EC2 instances with restricted read-only access
  to AWS IAM metadata. This role allows only listing and getting IAM resources without any modification rights.

Resources:
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: IAMReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:List*
                  - iam:Get*
                Resource: "*"
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2IAMRole

Outputs:
  IAMRoleARN:
    Description: ARN of the IAM Role for EC2 instances with restricted read-only access to IAM metadata.
    Value: !GetAtt EC2IAMRole.Arn
  InstanceProfileName:
    Description: Name of the EC2 Instance Profile associated with the IAM Role.
    Value: !Ref EC2InstanceProfile