AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'my-s3-bucket-${AWS::AccountId}'

  MyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'my-sns-topic-${AWS::AccountId}'

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref MyTopic
            Condition:
              ArnLike:
                AWS:SourceArn: !Join
                  - ''
                  - - 'arn:aws:s3:::'
                    - !Ref MyBucket
                    - /*
                AWS:SourceAccount: !Ref AWS::AccountId
      Topics:
        - !Ref MyTopic

  BucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref MyBucket
      TopicConfigurations:
        - Topic: !Ref MyTopic
          Events:
            - s3:ObjectCreated:*
          Filter:
            Key:
              FilterRules:
                - Name: prefix
                  Value: ''
                - Name: suffix
                  Value: ''
    DependsOn:
      - MyBucket

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MyBucket
  TopicArn:
    Description: ARN of the SNS topic
    Value: !Ref MyTopic