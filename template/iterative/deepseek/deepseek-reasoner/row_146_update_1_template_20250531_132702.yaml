AWSTemplateFormatVersion: '2010-09-09'
Description: Automated image analysis pipeline with human face detection and SMS alerts

Parameters:
  PhoneNumber:
    Type: String
    Description: Phone number for SMS alerts (E.164 format)

Resources:
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    DependsOn: S3TriggerPermission

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: 
              Service: rekognition.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ImageBucket.Arn}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'

  TriggerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StartStepFunctions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !GetAtt AnalysisStateMachine.Arn

  TriggerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt TriggerLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref AnalysisStateMachine
      Code:
        ZipFile: |
          import json
          import boto3
          def handler(event, context):
              sfn = boto3.client('stepfunctions')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  sfn.start_execution(
                      stateMachineArn=context.environ['STATE_MACHINE_ARN'],
                      input=json.dumps({'bucket': bucket, 'key': key})
                  )

  S3TriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TriggerLambda
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt ImageBucket.Arn

  FaceDetectionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RekognitionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: rekognition:DetectFaces
                Resource: '*'

  FaceDetectionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt FaceDetectionLambdaRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          def handler(event, context):
              rekognition = boto3.client('rekognition')
              response = rekognition.detect_faces(
                  Image={'S3Object': {'Bucket': event['bucket'], 'Name': event['key']}},
                  Attributes=['ALL']
              )
              return {
                  'hasFaces': len(response['FaceDetails']) > 0,
                  'faceCount': len(response['FaceDetails'])
              }

  AlertLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertTopic

  AlertLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt AlertLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          TOPIC_ARN: !Ref AlertTopic
      Code:
        ZipFile: |
