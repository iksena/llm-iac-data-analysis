AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Windows EC2 instance with CPU stress testing capabilities

Parameters:
  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: ""
    Description: Subnet ID for the EC2 instance. If empty, uses default VPC.
  CustomAMI:
    Type: AWS::EC2::Image::Id
    Default: ""
    Description: Custom AMI ID (optional). If not provided, uses Windows Server 2019 from SSM.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CPUStressTestVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CPUStressTestIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CPUStressTestPublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: CPUStressTestSubnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref PublicRouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSM and RDP access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: CPUStressTestSG

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Name
          Value: CPUStressTestEC2Role

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FISCPUPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ec2:DescribeInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: '*'
      Path: /
      Tags:
        - Key: Name
          Value: CPUStressTestFISRole

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '1.2'
        description: CPU Stress Test
        parameters:
          duration:
            type: String
            default: '60'
        runtimeConfig:
          aws:runPowerShellScript:
            properties:
              - id: '0.aws:runPowerShellScript'
                runCommand:
                  - '$processors = [Environment]::ProcessorCount'
                  - '$duration = [int]$duration'
                  - 'Write-Host "Starting CPU stress test with $processors threads for $duration seconds"'
                  - 'for ($i = 0; $i -lt $processors; $i++) {'
                  - '  Start-Job -ScriptBlock {'
                  - '    $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()'
                  - '    while ($stopwatch.Elapsed.TotalSeconds -lt $duration) {'
                  - '      $null = 1 * 2'
                  - '    }'
                  - '  }'
                  - '}'
                  - 'Get-Job | Wait-Job'
                  - 'Write-Host "CPU stress test completed"'
      DocumentType: Command
      DocumentFormat: JSON

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !If [UseCustomAMI, !Ref CustomAMI, !GetAtt AMIResolver.AMIId]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !If [UseProvidedSubnet, !Ref SubnetId, !Ref Subnet]
      SecurityGroupIds:
        - !Ref SecurityGroup
      UserData:
        Fn::Base64: |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          net stop winrm
          sc.exe config winrm start= auto
          net start winrm
          </powershell>
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      Tags:
        - Key: Name
          Value: CPUStressTestInstance

  AMIResolver:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Properties:
      Name: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base

Conditions:
  UseProvidedSubnet: !Not [!Equals [!Ref SubnetId, ""]]
  UseCustomAMI: !Not [!Equals [!Ref CustomAMI, ""]]

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the instance
    Value: !GetAtt EC2Instance.PublicIp
  SSMDocumentName:
    Description: Name of the SSM document
    Value: !Ref SSMDocument
  FISRoleName:
    Description: Name of the FIS IAM role
    Value: !Ref FISRole