AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Production-ready VPC with public/private subnets hosting Apache web server.
  Creates a public-facing EC2 instance with a simple inventory application.

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: String
    Default: ''
    AllowedPattern: '^(?:[a-zA-Z0-9._\-]+)?$'
    ConstraintDescription: Must be a valid EC2 KeyPair name if specified
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type
  VPCCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 10.0.0.0/16)
  PublicSubnetCidr:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 10.0.1.0/24)
  PrivateSubnetCidr:
    Description: CIDR block for the private subnet
    Type: String
    Default: 10.0.2.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 10.0.2.0/24)
  SSHLocation:
    Description: IP range allowed for SSH access (CIDR)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 203.0.113.0/24)

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0f74d881311ab024e
    us-west-1:
      AMI: ami-0c5b9fbb019aa9c87
    us-west-2:
      AMI: ami-09d949651bacb00ac
    eu-west-1:
      AMI: ami-0d9a29c2caf1de567
    eu-central-1:
      AMI: ami-03f519f519c93c3ba
    ap-southeast-1:
      AMI: ami-0fbb970b3b1e80d95
    ap-northeast-1:
      AMI: ami-0c02c1c491fcd8c2c
    ca-central-1:
      AMI: ami-0b5f0f8ea2f125349
    eu-west-2:
      AMI: ami-0c4b0ea61a9a30e6b
    ap-southeast-2:
      AMI: ami-0d64d6a8f43f2e6bc
    ap-northeast-2:
      AMI: ami-0c6d80b5a4e8282f7

Conditions:
  KeyNameProvided: !Not [!Equals [!Ref KeyName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebApp-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebApp-IGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Public-Route-Table

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Private-Route-Table

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Web-SG

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: PublicSubnetRouteTableAssociation
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [KeyNameProvided, !Ref KeyName, !Ref 'AWS::NoValue']
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      SubnetId: !Ref PublicSubnet
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          set -x
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<html><body><h1>Inventory Application</h1><p>Sample inventory system is operational.</p></body></html>" > /var/www/html/index.html
          chown -R apache:apache /var/www/html
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: Web-Server

Outputs:
  EC2PublicDNS:
    Description: Public DNS of the web server
    Value: !GetAtt WebServerInstance.PublicDnsName
    Export:
      Name: WebServerDNS
  EC2PublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp
    Export:
      Name: WebServerIP
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  SecurityGroupID:
    Description: Web server security group ID
    Value: !Ref WebSecurityGroup