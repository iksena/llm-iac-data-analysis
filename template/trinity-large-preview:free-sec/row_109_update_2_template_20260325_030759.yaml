AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: CustomEventBus
      Description: Custom event bus for application events

  Connection:
    Type: AWS::EventSchemas::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuth:
        ApiKeyName: test_name
        ApiKeyValue: test_value

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*

  ApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      Description: API destination for MongoDB endpoint
      ConnectionArn: !GetAtt Connection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      InvocationHttpParameters:
        Path:
          - Name: pathParam
            Value: /events
      RoleArn: !GetAtt EventBridgeRole.Arn
      DeadLetterConfig:
        Arn: !GetAtt DeadLetterQueue.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue
      MessageRetentionPeriod: 1209600

Outputs:
  EventBusArn:
    Description: Event Bus ARN
    Value: !GetAtt EventBus.Arn
  ApiDestinationArn:
    Description: API Destination ARN
    Value: !GetAtt ApiDestination.Arn
  DeadLetterQueueUrl:
    Description: Dead Letter Queue URL
    Value: !Ref DeadLetterQueue