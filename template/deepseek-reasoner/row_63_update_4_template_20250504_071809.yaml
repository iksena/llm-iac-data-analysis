AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database cluster
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two public subnets for multi-AZ deployment
  DBName:
    Type: String
    Default: mydatabase
    Description: Initial database name
  MasterUsername:
    Type: String
    Default: admin
    Description: Database admin username
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues: [db.t3.medium, db.t3.large, db.r5.large]
    Description: DB instance class type

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'aurora-secret-${AWS::StackName}'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${MasterUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.2
      DatabaseName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt RDSSecurityGroup.GroupId
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true

Outputs:
  ClusterEndpoint:
    Value: !GetAtt DBCluster.Endpoint.Address
  ReaderEndpoint:
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  SecurityGroupId:
    Value: !Ref RDSSecurityGroup
  DBSubnetGroupName:
    Value: !Ref DBSubnetGroup
  SecretARN:
    Value: !Ref DBSecret