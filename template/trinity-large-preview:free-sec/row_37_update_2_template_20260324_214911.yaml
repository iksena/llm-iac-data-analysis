AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 bucket architecture with encryption, logging, and secure transport requirements

Parameters:
  PrimaryBucketName:
    Type: String
    Default: secure-primary-bucket
    Description: Name of the primary secure bucket
  ReplicaBucketName:
    Type: String
    Default: secure-replica-bucket
    Description: Name of the replica bucket
  AccessLogBucketName:
    Type: String
    Default: secure-access-logs
    Description: Name of the access log bucket

Resources:
  PrimaryBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref PrimaryBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: primary-bucket-logs/
      Tags:
        - Key: Name
          Value: !Ref PrimaryBucketName

  PrimaryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucketName}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ReplicaBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Ref ReplicaBucketName

  AccessLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref AccessLogBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Ref AccessLogBucketName

Outputs:
  PrimaryBucketARN:
    Description: ARN of the primary secure bucket
    Value: !GetAtt PrimaryBucket.Arn
  PrimaryBucketName:
    Description: Name of the primary secure bucket
    Value: !Ref PrimaryBucketName
  ReplicaBucketARN:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn
  AccessLogBucketARN:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn