AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to create AWS Glue ETL job infrastructure.
  This includes an S3 bucket for Glue scripts and Spark logs, an IAM role with required permissions,
  and a Glue job configured with Glue version 4.0 using a Python script.

Resources:

  GlueBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: GlueS3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${GlueBucket}
                  - !Sub arn:aws:s3:::${GlueBucket}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: GlueETLJob
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: "4.0"
      Command:
        Name: glueetl
        ScriptLocation: !Join 
          - ""
          - - "s3://"
            - !Ref GlueBucket
            - "/gue_scripts/sample_convert.py"
      DefaultArguments:
        --job-bookmark-option: job-bookmark-disable
      MaxRetries: 0
      Timeout: 60

Outputs:
  S3BucketName:
    Description: "The name of the S3 bucket used for Glue scripts and Spark logs."
    Value: !Ref GlueBucket
  GlueJobRoleARN:
    Description: "The ARN of the IAM role granted to AWS Glue."
    Value: !GetAtt GlueJobRole.Arn
  GlueJobName:
    Description: "The name of the created AWS Glue ETL job."
    Value: !Ref GlueETLJob