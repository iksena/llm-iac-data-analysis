AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with monitoring capabilities'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'production'
    Description: 'Environment name for the ECS cluster'
    AllowedPattern: '[a-zA-Z0-9-]*'
    ConstraintDescription: 'Only alphanumeric characters and hyphens allowed'
  
  MonitoringEnabled:
    Type: String
    Default: 'true'
    AllowedValues: 
      - 'true'
      - 'false'
    Description: 'Enable CloudWatch monitoring'

  LogRetentionDays:
    Type: Number
    Default: 30
    Description: 'CloudWatch Log retention period in days'
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

Conditions:
  MonitoringIsEnabled: !Equals [!Ref MonitoringEnabled, 'true']

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref MonitoringEnabled
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSClusterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${AWS::StackName}'
      RetentionInDays: !Ref LogRetentionDays

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Path: '/'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: MonitoringIsEnabled
    Properties:
      AlarmName: !Sub '${AWS::StackName}-cpu-utilization'
      AlarmDescription: 'CPU utilization high for cluster'
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      ComparisonOperator: GreaterThanThreshold
      Threshold: 80
      TreatMissingData: notBreaching
      Dimensions:
        - Name: ClusterName
          Value: !Sub '${AWS::StackName}-cluster'

  MemoryUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: MonitoringIsEnabled
    Properties:
      AlarmName: !Sub '${AWS::StackName}-memory-utilization'
      AlarmDescription: 'Memory utilization high for cluster'
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      ComparisonOperator: GreaterThanThreshold
      Threshold: 80
      TreatMissingData: notBreaching
      Dimensions:
        - Name: ClusterName
          Value: !Sub '${AWS::StackName}-cluster'

Outputs:
  ClusterName:
    Description: 'ECS Cluster Name'
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-cluster-name'

  ClusterArn:
    Description: 'ECS Cluster ARN'
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-cluster-arn'

  TaskExecutionRoleArn:
    Description: 'ECS Task Execution Role ARN'
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-task-execution-role-arn'

  LogGroupName:
    Description: 'CloudWatch Log Group Name'
    Value: !Ref ECSClusterLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-log-group-name'