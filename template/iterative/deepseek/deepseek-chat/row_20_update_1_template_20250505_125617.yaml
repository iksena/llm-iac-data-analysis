AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Client VPN monitoring with CloudWatch Dashboard and Logs Insights queries'

Parameters:
  DashboardName:
    Type: String
    Default: 'ClientVPN-Monitoring-Dashboard'
    Description: 'Name for the CloudWatch Dashboard'
  LogGroupName:
    Type: String
    Default: '/aws/clientvpn'
    Description: 'Name of the Client VPN CloudWatch Log Group'

Resources:
  ClientVPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats count(*) by bin(1h)\n| sort bin asc\n| filter eventType = 'connection'",
                "region": "!Ref AWS::Region",
                "title": "Connection Count Over Time",
                "view": "timeSeries"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats sum(connectionDuration) as totalDuration, avg(connectionDuration) as avgDuration, max(connectionDuration) as maxDuration by endpointId",
                "region": "!Ref AWS::Region",
                "title": "Connection Duration by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats sum(bytesIn) as totalBytesIn, sum(bytesOut) as totalBytesOut by endpointId",
                "region": "!Ref AWS::Region",
                "title": "Data Transfer by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats count(*) as connectionCount by authenticationType",
                "region": "!Ref AWS::Region",
                "title": "Connections by Auth Type",
                "view": "pie"
              }
            },
            {
              "type": "log",
              "x": 8,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats count_distinct(username) as uniqueUsers by endpointId",
                "region": "!Ref AWS::Region",
                "title": "Unique Users by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16,
              "y": 12,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '!Ref LogGroupName' | stats count(*) as connectionCount by username | sort connectionCount desc | limit 10",
                "region": "!Ref AWS::Region",
                "title": "Top 10 Users by Connection Count",
                "view": "table"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'ClientVPN-Connection-Duration'
      QueryString: |
        SOURCE '!Ref LogGroupName' 
        | stats sum(connectionDuration) as totalDuration, avg(connectionDuration) as avgDuration, max(connectionDuration) as maxDuration 
        by endpointId, username
        | sort totalDuration desc
      LogGroupNames:
        - !Ref LogGroupName

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'ClientVPN-Data-Transfer'
      QueryString: |
        SOURCE '!Ref LogGroupName' 
        | stats sum(bytesIn) as totalBytesIn, sum(bytesOut) as totalBytesOut 
        by endpointId, username
        | sort totalBytesIn desc
      LogGroupNames:
        - !Ref LogGroupName

  AuthTypeBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'ClientVPN-Auth-Type-Breakdown'
      QueryString: |
        SOURCE '!Ref LogGroupName' 
        | stats count(*) as connectionCount 
        by authenticationType
        | sort connectionCount desc
      LogGroupNames:
        - !Ref LogGroupName

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: 'ClientVPN-User-Activity'
      QueryString: |
        SOURCE '!Ref LogGroupName' 
        | stats count(*) as connectionCount, sum(connectionDuration) as totalDuration, sum(bytesIn + bytesOut) as totalData 
        by username
        | sort connectionCount desc
      LogGroupNames:
        - !Ref LogGroupName

Outputs:
  DashboardURL:
    Description: 'URL to access the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  SavedQueryNames:
    Description: 'List of created Logs Insights queries'
    Value: 
      Fn::Join:
        - ', '
        - - 'ClientVPN-Connection-Duration'
          - 'ClientVPN-Data-Transfer'
          - 'ClientVPN-Auth-Type-Breakdown'
          - 'ClientVPN-User-Activity'