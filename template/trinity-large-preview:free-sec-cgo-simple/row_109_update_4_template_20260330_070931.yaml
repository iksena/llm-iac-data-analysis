AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt Connection.Arn
      Description: API destination for MongoDB
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      Name: MongoDBApiDestination

  Connection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: test_name
          ApiKeyValue: test_value
      Description: Connection to MongoDB API endpoint
      Name: MongoDBConnection

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue
      MessageRetentionPeriod: 1209600

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref EventBridgeBus
  ApiDestinationArn:
    Description: ARN of the MongoDB API destination
    Value: !GetAtt ApiDestination.Arn