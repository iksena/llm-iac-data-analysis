AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${QueueName}.fifo
      ContentBasedDeduplication: !Ref ContentBasedDeduplication

Parameters:
  QueueName:
    Type: String
    Default: MyQueue
    Description: Name of the SQS FIFO queue (without .fifo extension)
  ContentBasedDeduplication:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable content-based deduplication for the FIFO queue

Outputs:
  QueueURL:
    Description: URL of the created SQS FIFO queue
    Value: !Ref SQSQueue
  QueueARN:
    Description: ARN of the created SQS FIFO queue
    Value: !GetAtt SQSQueue.Arn