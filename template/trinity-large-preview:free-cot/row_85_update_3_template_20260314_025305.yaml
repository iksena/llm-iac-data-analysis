AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure and cost-optimized S3 bucket for CloudWatch export data with versioning and lifecycle management'

Parameters:
  VersioningStatus:
    Type: String
    Default: Disabled
    AllowedValues:
      - Enabled
      - Disabled
      - Suspended

  CurrentVersionExpirationInDays:
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 3653

  NoncurrentVersionExpirationInDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 3653

  TransitionToInfrequentAccessDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653

  BucketName:
    Type: String
    Default: cloudwatch-exports
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$

Resources:
  CloudWatchExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      AnalyticsConfigurations:
        - Id: StorageClassAnalysis
          StorageClassAnalysis:
            DataExport:
              OutputSchemaVersion: V_1
              Destination:
                S3BucketDestination:
                  Format: CSV
                  BucketAccountId: !Ref AWS::AccountId
                  BucketArn: !GetAtt CloudWatchExportsBucket.Arn
                  Prefix: analytics
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: CurrentVersionExpiration
            Status: Enabled
            ExpirationInDays: !Ref CurrentVersionExpirationInDays
          - Id: NoncurrentVersionExpiration
            Status: Enabled
            NoncurrentVersionExpirationInDays: !Ref NoncurrentVersionExpirationInDays
          - Id: TransitionToInfrequentAccess
            Status: Enabled
            Transitions:
              - Days: !Ref TransitionToInfrequentAccessDays
                StorageClass: INTELLIGENT_TIERING

  CloudWatchExportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudWatchExportsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:*
            Resource:
              - !GetAtt CloudWatchExportsBucket.Arn
              - !Sub '${CloudWatchExportsBucket.Arn}/*'

  CloudWatchExportsBucketLogging:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CloudWatchExportsBucketLoggingPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportsBucketLogging
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudWatchExportsBucketLogging.Arn}/AWSLogs/${AWS::AccountId}/*'

  CloudWatchExportsBucketLoggingConfiguration:
    Type: AWS::S3::BucketLoggingConfiguration
    Properties:
      Destination:
        BucketName: !GetAtt CloudWatchExportsBucketLogging.Arn
        Format: CSV
      LoggingEnabled:
        TargetBucket: !Ref CloudWatchExportsBucketLogging
        TargetPrefix: CloudWatchExportsBucketLogs/

Outputs:
  BucketName:
    Description: Name of the CloudWatch exports bucket
    Value: !Ref CloudWatchExportsBucket
  BucketArn:
    Description: ARN of the CloudWatch exports bucket
    Value: !GetAtt CloudWatchExportsBucket.Arn
  BucketDomainName:
    Description: Domain name of the CloudWatch exports bucket
    Value: !GetAtt CloudWatchExportsBucket.DomainName