AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Security Hub Controls Manager

Resources:
  SecurityHubControlManagerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubControlManagerRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary:
        Ref: SecurityHubControlManagerPermissionBoundary
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateSecurityHubConfiguration
                  - securityhub:DescribeStandardsControls
                  - securityhub:BatchUpdateStandardsControls
                Resource: "*"

  SecurityHubControlManagerPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"

  SecurityHubControlManagerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30
      KmsKeyId:
        Fn::GetAtt:
          - SecurityHubControlManagerLogGroupKMSKey
          - Arn

  SecurityHubControlManagerLogGroupKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for Security Hub Control Manager Log Group
      Enabled: true
      EnableKeyRotation: true

  SecurityHubControlManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Lambda logic here
          };
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          DISABLE_CIS_140_CONTROLS: "false"
          DISABLE_FOUNDATIONAL_BEST_PRACTICES: "false"
      Role:
        Fn::GetAtt:
          - SecurityHubControlManagerRole
          - Arn
      VpcConfig:
        SecurityGroupIds:
          - Fn::GetAtt:
              - SecurityHubControlManagerLambdaSecurityGroup
              - GroupId
        SubnetIds:
          - Fn::GetAtt:
              - SecurityHubControlManagerLambdaSubnet
              - SubnetId
      DeadLetterConfig:
        TargetArn:
          Fn::GetAtt:
            - SecurityHubControlManagerDLQ
            - Arn
      TracingConfig:
        Mode: Active
      KmsKeyArn:
        Fn::GetAtt:
          - SecurityHubControlManagerLambdaKMSKey
          - Arn

  SecurityHubControlManagerLambdaKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for Security Hub Control Manager Lambda
      Enabled: true
      EnableKeyRotation: true

  SecurityHubControlManagerLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Security Hub Control Manager Lambda
      VpcId:
        Fn::GetAtt:
          - SecurityHubControlManagerVPC
          - VpcId

  SecurityHubControlManagerLambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Fn::GetAtt:
          - SecurityHubControlManagerVPC
          - VpcId
      CidrBlock: 10.0.1.0/24

  SecurityHubControlManagerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  SecurityHubControlManagerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId:
        Fn::GetAtt:
          - SecurityHubControlManagerDLQKMSKey
          - Arn

  SecurityHubControlManagerDLQKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for Security Hub Control Manager DLQ
      Enabled: true
      EnableKeyRotation: true

  SecurityHubControlManagerLambdaAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName:
        Ref: SecurityHubControlManagerLambda
      FunctionVersion: $LATEST
      Name: live

  SecurityHubControlManagerLambdaVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName:
        Ref: SecurityHubControlManagerLambda

  SecurityHubControlManagerLambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - nodejs18.x
      Content:
        ZipFile: |
          // Layer content here

  SecurityHubControlManagerLambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn:
