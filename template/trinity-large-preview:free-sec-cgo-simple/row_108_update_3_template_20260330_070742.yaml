AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Management System with Admin Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  DomainPrefix:
    Type: String
    Default: myapp
    Description: Prefix for the Cognito hosted domain
  AllowedOAuthFlows:
    Type: CommaDelimitedList
    Default: code,implicit
    Description: Allowed OAuth flows (comma-separated)
  CallbackURLs:
    Type: CommaDelimitedList
    Default: https://yourapp.com/callback
    Description: Callback URLs for OAuth (comma-separated)
  LogoutURLs:
    Type: CommaDelimitedList
    Default: https://yourapp.com/logout
    Description: Logout URLs for OAuth (comma-separated)
  EmailSender:
    Type: String
    Default: noreply@example.com
    Description: Verified email sender for verification messages

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      EmailVerificationMessage: 'Your verification code is {####}'
      EmailVerificationSubject: 'Verify your email'
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        FromEmail: !Ref EmailSender
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: 'OFF'
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MyAppClient
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      AllowedOAuthFlows: !Ref AllowedOAuthFlows
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - phone
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      SupportedIdentityProviders:
        - COGNITO

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref UserPool
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Description: Hosted domain for the User Pool
    Value: !Sub '${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'