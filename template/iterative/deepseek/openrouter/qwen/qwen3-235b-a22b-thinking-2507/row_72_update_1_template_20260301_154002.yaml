AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CodeServerVersion:
    Type: String
    Default: '4.84.3'
    Description: Version of code-server to install
  CloudFrontIPV4Ranges:
    Type: CommaDelimitedList
    Description: 'CloudFront IPv4 IP ranges (CIDR blocks) - required for security'
  CloudFrontIPV6Ranges:
    Type: CommaDelimitedList
    Description: 'CloudFront IPv6 IP ranges (CIDR blocks) - optional'
    Default: ''
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for development environment
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CodeServer-VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CodeServer-IGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: CodeServer-PublicSubnet
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CodeServer-RouteTable
  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for code-server instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [0, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [1, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [2, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [3, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [4, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [5, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [6, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [7, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [8, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [9, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [10, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [11, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [12, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [13, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [14, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [15, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [16, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [17, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [18, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Select [19, !Ref CloudFrontIPV4Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIpv6: !Select [0, !Ref CloudFrontIPV6Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIpv6: !Select [1, !Ref CloudFrontIPV6Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIpv6: !Select [2, !Ref CloudFrontIPV6Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIpv6: !Select [3, !Ref CloudFrontIPV6Ranges]
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIpv6: !Select [4, !Ref CloudFrontIPV6Ranges]
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - EC2SecurityGroup
      - EC2InstanceRole
      - SubnetRouteTableAssociation
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y curl
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version ${CodeServerVersion}
          mkdir -p /home/ubuntu/.config/code-server
          echo "bind-addr: 0.0.0.0:8080" > /home/ubuntu/.config/code-server/config.yaml
          echo "auth: none" >> /home/ubuntu/.config/code-server/config.yaml
          chown -R ubuntu:ubuntu /home/ubuntu/.config
          systemctl enable --now code-server@ubuntu
      Tags:
        - Key: Name
          Value: CodeServer-Instance
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
  CachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: OneYearTTL
        Comment: Custom cache policy with 1-year TTL for static assets
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2Instance
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: EC2Origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSslProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CachePolicy
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
Outputs:
  CloudFrontURL:
    Description: URL of the CloudFront distribution
    Value: !GetAtt CloudFrontDistribution.DomainName
  InstanceId:
    Description: EC2 instance identifier
    Value: !Ref EC2Instance
  InstancePublicDNS:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  SecurityGroupID:
    Description: Security group ID for the EC2 instance
    Value: !Ref EC2SecurityGroup