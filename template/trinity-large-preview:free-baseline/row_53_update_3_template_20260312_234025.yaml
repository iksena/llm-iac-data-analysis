AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless environment with IAM role, private S3 bucket, and EMR Serverless application

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EMRServerlessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMR ServerlessRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - Fn::GetAtt: [EMRServerlessBucket, Arn]
                  - Fn::Join: ['', [Fn::GetAtt: [EMRServerlessBucket, Arn], '/*']]
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: emr-serverless-scripts-data
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EMRServerlessApplication:
    Type: AWS::EMR::Cluster
    Properties:
      Name: EMRServerlessApp
      ReleaseLabel: emr-6.15.0
      Applications:
        - Name: Spark
      Instances:
        MasterInstanceGroup:
          InstanceType: m5.xlarge
          InstanceCount: 1
        CoreInstanceGroup:
          InstanceType: m5.xlarge
          InstanceCount: 2
      VisibleToAllUsers: true
      JobFlowRole: !GetAtt EMRServerlessRole.Arn
      ServiceRole: !GetAtt EMRServerlessRole.Arn
      Configurations:
        - Classification: spark
          Properties:
            maximizeResourceAllocation: 'true'

Outputs:
  EMRServerlessApplicationArn:
    Description: ARN of the EMR Serverless Application
    Value: !GetAtt EMRServerlessApplication.Arn
  EMRServerlessBucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref EMRServerlessBucket