AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an EC2 IP Address Manager (IPAM) for managing IP address allocation.
  Exports critical identifiers like the IPAM ARN, ID, and default public/private scope IDs.

Resources:
  MyIPAM:
    Type: 'AWS::EC2::IPAM'
    Properties:
      Description: 'IP Address Manager for managing IP address allocation'
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'

Outputs:
  IPAMArn:
    Description: 'The ARN of the IPAM'
    Value: !GetAtt MyIPAM.IpamArn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMArn'

  IPAMId:
    Description: 'The ID of the IPAM'
    Value: !Ref MyIPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAMId'

  DefaultPublicScopeId:
    Description: 'The ID of the default public scope'
    Value: !GetAtt MyIPAM.DefaultResourceDiscoveryId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPublicScopeId'

  DefaultPrivateScopeId:
    Description: 'The ID of the default private scope'
    Value: !GetAtt MyIPAM.DefaultPrivateScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPrivateScopeId'