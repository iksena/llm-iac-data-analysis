AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
    Description: EC2 instance type for the web server
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: The latest Amazon Linux 2 AMI ID

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access on webserver
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-WebServerSG'

  WebServerInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT5M
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - config
        config:
          packages:
            yum:
              httpd: []
              aws-cfn-bootstrap: []
              curl: []
          files:
            /var/www/html/index.html:
              mode: '000644'
              owner: apache
              group: apache
              content: !Sub |
                <!DOCTYPE html>
                <html>
                  <head>
                    <title>AWS CloudFormation Apache Demo</title>
                  </head>
                  <body>
                    <h1>Hello from AWS CloudFormation!</h1>
                    <p>Deployed in stack: ${AWS::StackName}</p>
                  </body>
                </html>
            /etc/cfn/hooks.d/cfn-auto-reloader.conf:
              mode: '000644'
              owner: root
              group: root
              content: !Sub |
                [main]
                hooks=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName}
                  --resource WebServerInstance --region ${AWS::Region}
                verbose: true
          commands:
            01_mkdir_www:
              command: mkdir -p /var/www/html
            02_chown_www:
              command: chown apache:apache /var/www/html
            03_restorecon:
              command: restorecon -R /var/www/html
              ignoreErrors: true
            04_start_httpd:
              command: systemctl enable httpd && systemctl start httpd
            05_test_httpd:
              command: |
                sleep 10
                curl -f http://localhost/index.html || exit 1
          services:
            systemd:
              httpd:
                enabled: true
                ensureRunning: true
              cfn-hup:
                enabled: true
                ensureRunning: true
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp2
            VolumeSize: 10
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-WebServer'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -x
          /opt/aws/bin/cfn-init -v --stack ${AWS::StackName}
            --resource WebServerInstance --region ${AWS::Region}
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName}
            --resource WebServerInstance --region ${AWS::Region}

Outputs:
  WebsiteURL:
    Description: Application URL
    Value: !Sub 'http://${WebServerInstance.PublicIp}/index.html'
  PublicIP:
    Description: Public IP of the web server
    Value: !GetAtt WebServerInstance.PublicIp
  InstanceId:
    Description: Instance ID
    Value: !Ref WebServerInstance