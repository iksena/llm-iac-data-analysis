AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Flow Logs Configuration and S3 Bucket for Log Storage'

Parameters:
  VpcCidrBlock:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'

  FlowLogTrafficType:
    Type: String
    Default: ALL
    AllowedValues: 
      - ACCEPT
      - REJECT
      - ALL
    Description: Type of traffic to log

  RetentionPeriod:
    Type: Number
    Default: 30
    Description: Number of days to retain flow logs
    MinValue: 1
    MaxValue: 3650

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpirationRule
            Status: Enabled
            ExpirationInDays: !Ref RetentionPeriod

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: 
              - s3:PutObject
            Resource: !Sub ${FlowLogsBucket.Arn}/*
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt FlowLogsBucket.Arn
          - Sid: SSLOnly
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource: 
              - !GetAtt FlowLogsBucket.Arn
              - !Sub ${FlowLogsBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: flow-logs-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub ${FlowLogsBucket.Arn}/*

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn
      LogDestination: !GetAtt FlowLogsBucket.Arn
      LogDestinationType: s3
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: !Ref FlowLogTrafficType
      MaxAggregationInterval: 600

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  FlowLogsBucketName:
    Description: Name of the S3 bucket storing VPC Flow Logs
    Value: !Ref FlowLogsBucket

  FlowLogId:
    Description: Flow Log ID
    Value: !Ref VPCFlowLog