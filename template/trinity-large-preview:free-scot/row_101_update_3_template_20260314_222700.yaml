AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  LogFilePrefix:
    Type: String
    Default: "vpc-flow-logs/"
    AllowedPattern: "^[a-zA-Z0-9-/]*$"
  TrafficType:
    Type: String
    Default: "ALL"
    AllowedValues:
      - "ACCEPT"
      - "REJECT"
      - "ALL"
  LogDestinationType:
    Type: String
    Default: "s3"
    AllowedValues:
      - "s3"
      - "cloud-watch-logs"
  LogFormat:
    Type: String
    Default: "plain-text"
    AllowedValues:
      - "plain-text"
      - "parquet"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "vpc-flow-logs-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub "${FlowLogsBucket.Arn}/*"
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - s3:GetBucketAcl
            Resource: !Sub "${FlowLogsBucket.Arn}"

  FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      TrafficType: !Ref TrafficType
      LogDestinationType: !Ref LogDestinationType
      LogDestination: !GetAtt FlowLogsBucket.Arn
      LogFormat: !Ref LogFormat
      MaxAggregationInterval: 600
      DeliverLogsPermissionArn: !GetAtt FlowLogsBucket.Arn
      ResourceType: VPC

  VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: UseCloudWatchLogs
    Properties:
      ServiceName: com.amazonaws.us-east-1.s3
      VpcId: !Ref VPC
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - s3:*
            Resource:
              - !Sub "${FlowLogsBucket.Arn}"
              - !Sub "${FlowLogsBucket.Arn}/*"

Conditions:
  UseCloudWatchLogs: !Equals [!Ref LogDestinationType, "cloud-watch-logs"]

Outputs:
  FlowLogsBucketName:
    Value: !Ref FlowLogsBucket