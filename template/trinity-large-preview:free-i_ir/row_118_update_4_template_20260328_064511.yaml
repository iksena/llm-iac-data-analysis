<i_ir>
{
  "resources": [
    {
      "id": "SQSQueue",
      "kind": "AWS::SQS::Queue",
      "fields": {},
      "effects": ["source-queue"]
    },
    {
      "id": "APIConnection",
      "kind": "AWS::EventSchemas::ApiDestination",
      "fields": {
        "ApiDestinationName": "ZippopotamAPIConnection",
        "ConnectionArn": {"ref": "IAMRole"},
        "InvocationEndpoint": "https://api.zippopotam.us/us/*",
        "HttpMethod": "GET"
      },
      "effects": ["api-connection"]
    },
    {
      "id": "APIDestination",
      "kind": "AWS::EventSchemas::ApiDestination",
      "fields": {
        "ApiDestinationName": "ZippopotamAPI",
        "ConnectionArn": {"ref": "APIConnection"},
        "InvocationEndpoint": "https://api.zippopotam.us/us/*",
        "HttpMethod": "GET"
      },
      "effects": ["external-api"]
    },
    {
      "id": "LogGroup",
      "kind": "AWS::Logs::LogGroup",
      "fields": {
        "LogGroupName": "EventBridgePipesEnrichmentLogs",
        "RetentionInDays": 30
      },
      "effects": ["enriched-logs"]
    },
    {
      "id": "IAMRole",
      "kind": "AWS::IAM::Role",
      "fields": {
        "AssumeRolePolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "pipes.amazonaws.com"
              },
              "Action": "sts:AssumeRole"
            }
          ]
        },
        "Policies": [
          {
            "PolicyName": "EventBridgePipesPermissions",
            "PolicyDocument": {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": [
                    "sqs:ReceiveMessage",
                    "sqs:DeleteMessage",
                    "sqs:GetQueueAttributes"
                  ],
                  "Resource": {"ref": "SQSQueue"}
                },
                {
                  "Effect": "Allow",
                  "Action": "events:InvokeApiDestination",
                  "Resource": {"ref": "APIDestination"}
                },
                {
                  "Effect": "Allow",
                  "Action": [
                    "logs:CreateLogStream",
                    "logs:PutLogEvents"
                  ],
                  "Resource": {"ref": "LogGroup"}
                }
              ]
            }
          }
        ]
      },
      "effects": ["service-role"]
    },
    {
      "id": "EventBridgePipe",
      "kind": "AWS::Pipes::Pipe",
      "fields": {
        "Name": "SQSToAPIPipe",
        "Source": {
          "SqsQueue": {
            "QueueUrl": {"ref": "SQSQueue"}
          }
        },
        "Transform": {
          "ApiDestination": {
            "ApiDestinationArn": {"ref": "APIDestination"}
          }
        },
        "Target": {
          "CloudWatchLogs": {
            "LogGroup": {"ref": "LogGroup"}
          }
        },
        "RoleArn": {"ref": "IAMRole"}
      },
      "effects": ["data-enrichment", "event-driven"]
    }
  ],
  "edges": [
    {"type": "depends", "from": "APIConnection", "to": "IAMRole"},
    {"type": "depends", "from": "APIDestination", "to": "APIConnection"},
    {"type": "depends", "from": "EventBridgePipe", "to": "SQSQueue"},
    {"type": "depends", "from": "EventBridgePipe", "to": "APIDestination"},
    {"type": "depends", "from": "EventBridgePipe", "to": "LogGroup"},
    {"type": "depends", "from": "EventBridgePipe", "to": "IAMRole"}
  ],
  "invariants": [
    "EventBridge Pipe must have permissions to read SQS, invoke API, and write logs",
    "API destination must use HTTPS with US zip code path parameter",
    "Log group must retain enriched data for 30 days",
    "IAM role must be assumable by EventBridge Pipes service",
    "Message enrichment must dynamically append API response data"
  ]
}
</i_ir>