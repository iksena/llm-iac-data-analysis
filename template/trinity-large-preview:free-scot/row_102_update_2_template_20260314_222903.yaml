AWSTemplateFormatVersion: '2010-09-09'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskNotificationTopic

  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: RiskManagementNotifications

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref 'AWS::AccountId'
      Topics:
        - !Ref RiskNotificationTopic

  DataIngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')
          sns = boto3.client('sns')

          def handler(event, context):
              try:
                  workload_id = event['workload_id']
                  question_id = event['question_id']
                  data = event['data']

                  table.put_item(
                      Item={
                          'workload_id': workload_id,
                          'question_id': question_id,
                          'data': data
                      }
                  )

                  sns.publish(
                      TopicArn='!Ref RiskNotificationTopic',
                      Message=json.dumps({'workload_id': workload_id, 'question_id': question_id}),
                      Subject='New Risk Data'
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Data stored successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC: !Ref RiskNotificationTopic
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

  RiskAssessmentLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')
          sns = boto3.client('sns')

          def handler(event, context):
              try:
                  workload_id = event['workload_id']
                  question_id = event['question_id']

                  response = table.get_item(
                      Key={
                          'workload_id': workload_id,
                          'question_id': question_id
                      }
                  )

                  if 'Item' in response:
                      data = response['Item']['data']
                      # Perform risk assessment logic here
                      risk_level = 'HIGH' if 'critical' in data else 'LOW'

                      sns.publish(
                          TopicArn='!Ref RiskNotificationTopic',
                          Message=json.dumps({'workload_id': workload_id, 'question_id': question_id, 'risk_level': risk_level}),
                          Subject='Risk Assessment Result'
                      )

                      return {
                          'statusCode': 200,
                          'body': json.dumps({'risk_level': risk_level})
                      }
                  else:
                      return {
                          'statusCode': 404,
                          'body': json.dumps('Data not found')
                      }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC: !Ref RiskNotificationTopic
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

Outputs:
  DataIngestionLambdaArn:
    Description: ARN of the Data Ingestion Lambda function
    Value: !GetAtt DataIngestionLambda.Arn
  RiskAssessmentLambdaArn:
    Description: ARN of the Risk Assessment Lambda function
    Value: !GetAtt RiskAssessmentLambda.Arn
  RiskManagementTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt RiskManagementTable.Arn
  RiskNotificationTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref RiskNotificationTopic