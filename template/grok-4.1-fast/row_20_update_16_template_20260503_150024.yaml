AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production CloudFormation template for CloudWatch Dashboard and folder-organized Logs Insights Queries monitoring AWS Client VPN: connections/durations, ingress/egress GB, top users/distinct, auth breakdowns (SAML/AD/Mutual/Mixed).'

Parameters:
  LogGroupName:
    Type: String
    Default: '/aws/vpn/control'
    Description: 'CloudWatch Log Group for Client VPN logs (e.g., /aws/vpn/control)'
  DashboardName:
    Type: String
    Default: 'ClientVPN-Monitoring-Dashboard'
    Description: 'CloudWatch Dashboard name'

Resources:
  ByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPN/Usage/ByEndpoint
      Log