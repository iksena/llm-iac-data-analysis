AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create CloudWatch Dashboard and Logs Insights queries for AWS Client VPN usage monitoring

Resources:
  ClientVPNAuthDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAuthUsageDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Dashboard"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN/ | stats count(*) as TotalConnections by @logStream | sort TotalConnections desc",
                "region": "${AWS::Region}",
                "title": "Total Connections by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN/ | stats distinct_count(@logStream) as UniqueUsers by bin(1h) | sort bin(1h) desc",
                "region": "${AWS::Region}",
                "title": "Unique Users Over Time",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN/ | stats sum(bytesIn) as TotalIngress, sum(bytesOut) as TotalEgress by @logStream | sort TotalIngress desc",
                "region": "${AWS::Region}",
                "title": "Data Transfer by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 8,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN/ | stats count(*) as Connections by authType | sort Connections desc",
                "region": "${AWS::Region}",
                "title": "Connections by Authentication Type",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16,
              "y": 7,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter @message like /Client VPN/ | stats avg(duration) as AvgConnectionDuration by authType | sort AvgConnectionDuration desc",
                "region": "${AWS::Region}",
                "title": "Average Connection Duration by Auth Type",
                "view": "table"
              }
            }
          ]
        }

  ClientVPNConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNConnectionDurations
      LogGroupNames:
        - /aws/vpn/client-vpn-log-group
      QueryString: |
        fields @timestamp, @message
        | filter @message like /Client VPN/
        | stats avg(duration) as AverageDuration, max(duration) as MaxDuration, min(duration) as MinDuration
        | sort AverageDuration desc

  ClientVPNDataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNDataTransfer
      LogGroupNames:
        - /aws/vpn/client-vpn-log-group
      QueryString: |
        fields @timestamp, @message, bytesIn, bytesOut
        | filter @message like /Client VPN/
        | stats sum(bytesIn) as TotalIngress, sum(bytesOut) as TotalEgress
        | sort TotalIngress desc

  ClientVPNUserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNUserActivity
      LogGroupNames:
        - /aws/vpn/client-vpn-log-group
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /Client VPN/
        | stats count(*) as Connections, distinct_count(@logStream) as UniqueUsers
        | sort Connections desc

  ClientVPNAuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNAuthBreakdown
      LogGroupNames:
        - /aws/vpn/client-vpn-log-group
      QueryString: |
        fields @timestamp, @message, authType
        | filter @message like /Client VPN/
        | stats count(*) as Connections by authType
        | sort Connections desc

Outputs:
  DashboardName:
    Description: Name of the CloudWatch Dashboard
    Value: !Ref ClientVPNAuthDashboard
  DashboardArn:
    Description: ARN of the CloudWatch Dashboard
    Value: !GetAtt ClientVPNAuthDashboard.Arn
  ConnectionDurationQueryArn:
    Description: ARN of the Connection Duration Query
    Value: !GetAtt ClientVPNConnectionDurationQuery.Arn
  DataTransferQueryArn:
    Description: ARN of the Data Transfer Query
    Value: !GetAtt ClientVPNDataTransferQuery.Arn
  UserActivityQueryArn:
    Description: ARN of the User Activity Query
    Value: !GetAtt ClientVPNUserActivityQuery.Arn
  AuthBreakdownQueryArn:
    Description: ARN of the Authentication Breakdown Query
    Value: !GetAtt ClientVPNAuthBreakdownQuery.Arn