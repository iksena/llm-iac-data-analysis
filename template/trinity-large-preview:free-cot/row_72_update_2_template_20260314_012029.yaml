AWSTemplateFormatVersion: '2010-09-09'
Description: Secure VS Code Development Environment with CloudFront Distribution

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access (for SSM management)
  CodeServerVersion:
    Type: String
    Default: 4.10.0
    Description: Version of code-server to install
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type
  CloudFrontTTL:
    Type: Number
    Default: 31536000
    Description: CloudFront cache TTL in seconds (1 year = 31536000)

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VSCodeVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: VSCodeIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: VSCodeSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: VSCodeRouteTable

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: VSCodeSecurityGroup
      GroupDescription: Security group for VS Code development environment
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: VSCodeSG

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: VSCodeInstanceRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId: !Ref Subnet
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Update system
          sudo apt-get update -y
          sudo apt-get upgrade -y

          # Install dependencies
          sudo apt-get install -y curl wget gnupg2

          # Install code-server
          wget -qO- https://github.com/coder/code-server/releases/download/v${CodeServerVersion}/code-server_${CodeServerVersion}_amd64.deb -O /tmp/code-server.deb
          sudo dpkg -i /tmp/code-server.deb
          sudo apt-get install -f -y

          # Create systemd service
          sudo tee /etc/systemd/system/code-server.service > /dev/null <<EOF
          [Unit]
          Description=Code Server
          After=network.target

          [Service]
          User=ubuntu
          Environment=PASSWORD=
          ExecStart=/usr/bin/code-server --bind-addr 0.0.0.0:8080 --auth none /home/ubuntu/workspace
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          # Create workspace directory
          mkdir -p /home/ubuntu/workspace
          sudo chown -R ubuntu:ubuntu /home/ubuntu/workspace

          # Enable and start service
          sudo systemctl daemon-reload
          sudo systemctl enable code-server
          sudo systemctl start code-server

      Tags:
        - Key: Name
          Value: VSCodeInstance

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: VS Code Origin Access Identity

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt EC2Instance.PublicDnsName
            Id: VSCodeOrigin
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1
                - TLSv1.1
                - TLSv1.2
        Enabled: true
        Comment: VS Code CloudFront Distribution
        DefaultRootObject: /
        PriceClass: PriceClass_All
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          TargetOriginId: VSCodeOrigin
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
            Headers:
              - Origin
          ViewerProtocolPolicy: redirect-to-https
          DefaultTTL: !Ref CloudFrontTTL
          MinTTL: 0
          MaxTTL: !Ref CloudFrontTTL
        Restrictions:
          GeoRestriction:
            RestrictionType: none

Outputs:
  CloudFrontURL:
    Description: CloudFront Distribution URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: VSCodeCloudFrontURL

  InstancePublicIP:
    Description: EC2 Instance Public IP
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: VSCodeInstanceIP

  SecurityGroupID:
    Description: Security Group ID
    Value: !GetAtt SecurityGroup.GroupId
    Export:
      Name: VSCodeSecurityGroupID

  InstanceProfileARN:
    Description: IAM Instance Profile ARN
    Value: !GetAtt InstanceProfile.Arn
    Export:
      Name: VSCodeInstanceProfileARN