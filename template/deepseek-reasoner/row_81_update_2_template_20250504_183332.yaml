AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  GroupName:
    Type: String
    Description: Name for the resource group
    Default: TagBasedResourceGroup
  TagKey:
    Type: String
    Description: Tag key for resource filtering
    Default: Environment
  TagValue:
    Type: String
    Description: Tag value for resource filtering
    Default: Production
Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Ref GroupName
      Description: Resource group containing resources with specified tag
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::ManagedInstance
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue
Outputs:
  GroupArn:
    Description: ARN of the created resource group
    Value: !GetAtt ResourceGroup.Arn
  GroupName:
    Description: Name of the resource group
    Value: !Ref ResourceGroup