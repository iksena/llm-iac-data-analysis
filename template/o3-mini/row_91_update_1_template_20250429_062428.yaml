AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create an S3 bucket for storing VPC flow logs with
  automated lifecycle management and strict access controls.

Parameters:
  BucketName:
    Description: "Optional custom name for the S3 bucket. Leave empty for auto-generated name."
    Type: String
    Default: ""
  VersioningConfiguration:
    Description: "S3 Bucket versioning status: Enabled or Suspended."
    Type: String
    AllowedValues:
      - Enabled
      - Suspended
    Default: Enabled
  TransitionDays:
    Description: "The number of days after object creation to transition to Glacier."
    Type: Number
    Default: 30
  ExpirationDays:
    Description: "The number of days after object creation to permanently delete the objects."
    Type: Number
    Default: 365000

Conditions:
  UseCustomBucketName: !Not [ !Equals [ !Ref BucketName, ""] ]

Resources:
  LogS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If 
        - UseCustomBucketName
        - !Ref BucketName
        - !Ref "AWS::NoValue"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningConfiguration
      LifecycleConfiguration:
        Rules:
          - Id: "TransitionAndExpirationRule"
            Status: "Enabled"
            Filter: {}
            Transitions:
              - TransitionInDays: !Ref TransitionDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref ExpirationDays

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowVPCFlowLogsDelivery"
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: "s3:PutObject"
            Resource: 
              - !Sub "${LogS3Bucket.Arn}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: "bucket-owner-full-control"

Outputs:
  BucketName:
    Description: "Name of the S3 bucket for VPC flow logs"
    Value: !Ref LogS3Bucket
  BucketArn:
    Description: "ARN of the S3 bucket for VPC flow logs"
    Value: !GetAtt LogS3Bucket.Arn