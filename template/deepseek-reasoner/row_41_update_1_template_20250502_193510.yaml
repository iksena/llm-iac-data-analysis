AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a standard SQS queue with auto-generated name
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30
Outputs:
  QueueARN:
    Description: ARN of the created SQS queue
    Value: !GetAtt SQSQueue.Arn
  QueueURL:
    Description: URL endpoint for the SQS queue
    Value: !Ref SQSQueue