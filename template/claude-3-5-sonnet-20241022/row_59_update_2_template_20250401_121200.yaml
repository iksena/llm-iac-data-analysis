AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with CloudWatch Alarms'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream

  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    Default: 1
    MinValue: 1

  RetentionHours:
    Type: Number
    Description: Data retention period in hours
    Default: 24
    MinValue: 24
    MaxValue: 168

  AlarmEmail:
    Type: String
    Description: Email address for alarm notifications

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      RetentionPeriodHours: !Ref RetentionHours
      ShardCount: !Ref ShardCount

  MonitoringTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisMonitoring

  TopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref MonitoringTopic
      Endpoint: !Ref AlarmEmail

  WriteAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Write Throughput Exceeded
      MetricName: IncomingBytes
      Namespace: AWS/Kinesis
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      AlarmActions:
        - !Ref MonitoringTopic

  ReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Read Throughput Exceeded
      MetricName: GetRecords.Bytes
      Namespace: AWS/Kinesis
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      AlarmActions:
        - !Ref MonitoringTopic

Outputs:
  StreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn

  TopicArn:
    Description: ARN of the SNS Topic
    Value: !Ref MonitoringTopic