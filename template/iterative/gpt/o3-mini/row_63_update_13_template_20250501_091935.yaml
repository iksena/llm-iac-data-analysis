AWSTemplateFormatVersion: "2010-09-09"
Description: >
  This CloudFormation template creates a production-ready Amazon Aurora MySQL cluster 
  with CloudWatch Logs integration. It also creates required network resources dynamically 
  selecting availability zones for Public Subnets.

Parameters:
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
    Description: The identifier for the Aurora cluster.
  DBName:
    Type: String
    Default: mydatabase
    Description: The database name for the Aurora cluster.
  MasterUsername:
    Type: String
    Default: admin
    Description: The master username for the Aurora cluster.
  MasterUserSecretARN:
    Type: String
    Default: "arn:aws:secretsmanager:us-east-1:123456789012:secret:aurora-master-password"
    Description: >
      The ARN of the AWS Secrets Manager secret that contains the master user password.
      The secret must include a key "password" holding the master password.

Resources:
  # VPC and Networking Resources
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyAuroraVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MyAuroraIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: MyAuroraPublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Dynamically select availability zones
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MyAuroraPublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [ 1, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MyAuroraPublicSubnet2

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Security Group for Aurora DB
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for the Aurora MySQL cluster"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: AuroraDBSecurityGroup

  # Database Subnet Group using the public subnets
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets for the Aurora MySQL cluster"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: AuroraDBSubnetGroup

  # Aurora Cluster and Instance Resources
  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.11.6"
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${MasterUserSecretARN}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true

Outputs:
  VPCId:
    Description: "VPC ID created for the Aurora cluster"
    Value: !Ref MyVPC
  PublicSubnet1Id:
    Description: "Public Subnet 1 ID"
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: "Public Subnet 2 ID"
    Value: !Ref PublicSubnet2
  DBClusterEndpoint:
    Description: "Aurora MySQL DB Cluster writer endpoint address"
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  DBReaderEndpoint:
    Description: "Aurora MySQL DB Cluster reader endpoint address"
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address
  DBClusterIdentifierOutput:
    Description: "Aurora DB Cluster Identifier"
    Value: !Ref AuroraDBCluster