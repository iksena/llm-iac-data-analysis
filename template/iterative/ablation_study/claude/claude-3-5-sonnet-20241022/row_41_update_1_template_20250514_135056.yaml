AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating an SQS Standard Queue'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    Default: my-standard-queue
  
  MessageRetentionPeriod:
    Type: Number
    Description: The number of seconds that Amazon SQS retains a message (1 minute to 14 days)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  
  VisibilityTimeout:
    Type: Number
    Description: The length of time during which a message will be invisible after being read
    Default: 30
    MinValue: 0
    MaxValue: 43200
  
  DelaySeconds:
    Type: Number
    Description: The time in seconds that the delivery of all messages in the queue will be delayed
    Default: 0
    MinValue: 0
    MaxValue: 900

Resources:
  StandardQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: 262144
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: 0
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: StandardQueue

Outputs:
  QueueURL:
    Description: URL of the newly created SQS Queue
    Value: !Ref StandardQueue
  
  QueueARN:
    Description: ARN of the newly created SQS Queue
    Value: !GetAtt StandardQueue.Arn
  
  QueueName:
    Description: Name of the newly created SQS Queue
    Value: !GetAtt StandardQueue.QueueName