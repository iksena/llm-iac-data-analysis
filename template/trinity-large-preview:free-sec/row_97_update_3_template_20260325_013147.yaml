AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data for centralized governance and reporting

Parameters:
  S3BucketName:
    Type: String
    Default: org-data-central-store
    Description: Name of the S3 bucket to store organizational data
  TagsToInclude:
    Type: String
    Default: "Environment,Owner,Project"
    Description: Comma-separated list of tags to include in reports
  ManagementAccountId:
    Type: String
    Default: "123456789012"
    Description: Management account ID for cross-account access
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: Name of the Athena database for querying

Resources:
  OrgDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref S3BucketName

  OrgDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OrgDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${OrgDataBucket}/*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'organizations:ListAccounts'
                  - 'organizations:ListOrganizationalUnitsForParent'
                  - 'organizations:ListTagsForResource'
                Resource: '*'
        - PolicyName: CrossAccountAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/OrganizationDataReader'

  OrgDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          def lambda_handler(event, context):
              org_client = boto3.client('organizations')
              sts_client = boto3.client('sts')

              # Assume cross-account role
              response = sts_client.assume_role(
                  RoleArn=f'arn:aws:iam::{os.environ["MANAGEMENT_ACCOUNT_ID"]}:role/OrganizationDataReader',
                  RoleSessionName='OrgDataCollection'
              )
              credentials = response['Credentials']

              # Create organizations client with assumed role
              org_client = boto3.client(
                  'organizations',
                  aws_access_key_id=credentials['AccessKeyId'],
                  aws_secret_access_key=credentials['SecretAccessKey'],
                  aws_session_token=credentials['SessionToken']
              )

              # Collect data
              accounts = org_client.list_accounts()
              ou_tree = org_client.list_organizational_units_for_parent(ParentId='root')
              tags = org_client.list_tags_for_resource(ResourceId='root')

              # Prepare data
              data = {
                  'timestamp': datetime.now().isoformat(),
                  'accounts': accounts,
                  'ou_tree': ou_tree,
                  'tags': tags
              }

              # Write to S3
              s3_client = boto3.client('s3')
              s3_client.put_object(
                  Bucket=os.environ['S3_BUCKET_NAME'],
                  Key=f'org-data/{datetime.now().strftime("%Y-%m-%d")}.json',
                  Body=json.dumps(data)
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Data collection successful')
              }

      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId

  OrgDataSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: 'rate(7 days)'
      Targets:
        - Arn: !GetAtt OrgDataLambda.Arn
          Id: OrgDataLambdaTarget

  OrgDataLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref OrgDataLambda
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OrgDataSchedule.Arn

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 's3:GetObject'
                Resource: !Sub 'arn:aws:s3:::${OrgDataBucket}/*'

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName
        Description: Database for organizational data analysis

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrgDataCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${OrgDataBucket}/org-data/'
      Schedule: 'rate(7 days)'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE

Outputs:
  S3BucketARN:
    Description: S3 bucket ARN for organizational data storage
    Value: !GetAtt OrgDataBucket.Arn
  LambdaFunctionARN:
    Description: Lambda function ARN for data collection
    Value: !GetAtt OrgDataLambda.Arn
  GlueDatabaseARN:
    Description: Glue database ARN for Athena queries
    Value: !GetAtt GlueDatabase.Arn