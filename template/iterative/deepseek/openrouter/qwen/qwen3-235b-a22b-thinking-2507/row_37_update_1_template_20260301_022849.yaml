AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-access-logs"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
  PrimaryStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-primary"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LoggingConfiguration:
        LogDestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: primary/
  PrimaryStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryStorageBucket
      PolicyDocument:
        Statement:
          - Action: 's3:*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
            Effect: Deny
            Principal: '*'
            Resource: 
              - !Sub "arn:${AWS::Partition}:s3:::${PrimaryStorageBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${PrimaryStorageBucket}/*"
  ReplicaStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-replica"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LoggingConfiguration:
        LogDestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: replica/
  ReplicaStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReplicaStorageBucket
      PolicyDocument:
        Statement:
          - Action: 's3:*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'
            Effect: Deny
            Principal: '*'
            Resource: 
              - !Sub "arn:${AWS::Partition}:s3:::${ReplicaStorageBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${ReplicaStorageBucket}/*"
Outputs:
  PrimaryBucketName:
    Description: Name of the primary storage bucket
    Value: !Ref PrimaryStorageBucket