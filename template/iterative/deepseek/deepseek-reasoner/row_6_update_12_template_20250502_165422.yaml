AWSTemplateFormatVersion: '2010-09-09'
Description: Self-contained EC2 Instance with Network Infrastructure
Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
  SSHLocation:
    Description: Allowed SSH source IP range (CIDR format)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^\d+\.\d+\.\d+\.\d+/\d+$

Mappings:
  AWSRegionAMI:
    us-east-1:
      AMIID: ami-0aa7d40eeae50c9b9  # Amazon Linux 2023
    us-west-2:
      AMIID: ami-0d70546e43a941d70
    eu-west-1:
      AMIID: ami-0d75513e7706cf2d9

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CFN-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CFN-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: CFN-Public-Subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CFN-Public-RT

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access via port 22
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-SSH-SecurityGroup

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSRegionAMI, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: CFN-EC2-Instance

Outputs:
  InstancePublicIP:
    Description: Public IP address of deployed instance
    Value: !GetAtt EC2Instance.PublicIp
  VPCId:
    Description: Created VPC ID
    Value: !Ref VPC
  PublicSubnetId:
    Description: Created Public Subnet ID
    Value: !Ref PublicSubnet
  SecurityGroupId:
    Description: Created security group ID
    Value: !Ref SecurityGroup