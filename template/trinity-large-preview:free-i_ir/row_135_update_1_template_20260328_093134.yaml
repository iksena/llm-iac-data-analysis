AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution fronting API Gateway with mock backend

Resources:
  MockAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MockAPI

  MockResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt MockAPI.RootResourceId
      PathPart: hello
      RestApiId: !Ref MockAPI

  MockMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !Ref MockResource
      RestApiId: !Ref MockAPI
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                {
                  "message": "hello world"
                }
        RequestTemplates:
          application/json: |
            {
              "statusCode": 200
            }
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
          ResponseParameters:
            method.response.header.Content-Type: true

  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: MockMethod
    Properties:
      RestApiId: !Ref MockAPI
      StageName: prod

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: APIDeployment
    Properties:
      DistributionConfig:
        Origins