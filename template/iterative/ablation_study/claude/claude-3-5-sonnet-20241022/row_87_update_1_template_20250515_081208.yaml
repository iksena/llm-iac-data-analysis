AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket for Lambda artifacts and KMS key for encryption'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
  
  KMSKeyAlias:
    Type: String
    Description: Alias for the KMS key
    Default: 'alias/lambda-artifacts'
    
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to KMS key

Resources:
  ArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda artifacts encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:*'
            Resource: '*'
          - Sid: AllowServiceRoleAccess
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  ArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref KMSKeyAlias
      TargetKeyId: !Ref ArtifactsKMSKey

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ArtifactsKMSKey.Arn
            BucketKeyEnabled: true

  ArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${ArtifactsBucket.Arn}/*'

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref ArtifactsBucket

  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt ArtifactsBucket.Arn

  KMSKeyId:
    Description: ID of the created KMS key
    Value: !Ref ArtifactsKMSKey

  KMSKeyArn:
    Description: ARN of the created KMS key
    Value: !GetAtt ArtifactsKMSKey.Arn

  KMSKeyAlias:
    Description: Alias of the created KMS key
    Value: !Ref KMSKeyAlias