AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      # Default properties for Macie Session
      # No specific properties are required by the business need
      # The resource will be created with default settings
      Status: ENABLED

Outputs:
  MacieSessionArn:
    Description: The ARN of the Macie Session
    Value: !GetAtt MacieSession.Arn
    Export:
      Name: MacieSessionArn