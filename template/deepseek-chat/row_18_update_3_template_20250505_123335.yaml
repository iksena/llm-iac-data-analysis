AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB to EventBridge integration with filtering'

Parameters:
  DynamoDBTableName:
    Type: String
    Default: 'UserTable'
    Description: 'Name of the DynamoDB table to monitor'
  EventBusName:
    Type: String
    Default: 'default'
    Description: 'Name of the EventBridge bus to send events to'

Resources:
  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: "userId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "userId"
          KeyType: "HASH"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAndEventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt UserTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'

  DynamoDBToEventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: 'DynamoDBToEventBridgePipe'
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt UserTable.StreamArn
      Target: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
      FilterCriteria:
        Filters:
          - Pattern: >-
              {
                "eventName": ["MODIFY"],
                "dynamodb": {
                  "NewImage": {
                    "avatarUrl": {
                      "S": [{"suffix": ".png"}]
                    }
                  }
                }
              }
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'AvatarImageUpdated'
          Source: 'user.avatar'
        InputTemplate: >-
          {
            "detail": <aws.dynamodb.json>,
            "detail-type": "AvatarImageUpdated",
            "source": "user.avatar",
            "eventBusName": "${EventBusName}",
            "time": <aws.events.event.ingestion-time>
          }

Outputs:
  PipeARN:
    Description: 'ARN of the EventBridge Pipe'
    Value: !GetAtt DynamoDBToEventBridgePipe.Arn
  DynamoDBStreamARN:
    Description: 'ARN of the DynamoDB Stream'
    Value: !GetAtt UserTable.StreamArn