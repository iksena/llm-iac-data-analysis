AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Macie session for sensitive data discovery and security monitoring.

Parameters:
  AdminAccountId:
    Type: String
    Description: The AWS account ID that will be the Macie administrator
    Default: ""

Resources:
  MacieSession:
    Type: AWS::Macie::MacieSession
    Properties:
      IsEnabled: true
      AdminAccountId: !Ref AdminAccountId
      FindingPublishingFrequency: IMMEDIATE

Outputs:
  MacieSessionArn:
    Description: ARN of the Macie session
    Value: !GetAtt MacieSession.MacieSessionArn
  MacieSessionStatus:
    Description: Status of the Macie session
    Value: !GetAtt MacieSession.Status