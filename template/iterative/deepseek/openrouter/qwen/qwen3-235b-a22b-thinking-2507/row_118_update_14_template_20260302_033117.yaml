AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Number of days to retain CloudWatch Logs
    MinValue: 1
    MaxValue: 3653
  QueueName:
    Type: String
    Default: EventBridgePipesSourceQueue
    Description: Name of the SQS source queue
    MinLength: 1
    MaxLength: 80
  ApiKeyValue:
    Type: String
    NoEcho: true
    Description: API key value for connection (dummy value for public API)
    Default: dummy

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 1209600

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SourceQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeReceive
            Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
            Resource: !GetAtt SourceQueue.Arn

  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/pipes/zipcode-enrichment-logs-${AWS::StackName}"
      RetentionInDays: !Ref LogRetentionInDays

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub "ZippopotamConnection-${AWS::StackName}"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "x-api-key"
          ApiKeyValue: !Ref ApiKeyValue

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub "USZipCodeApi-${AWS::StackName}"
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: GET
      InvocationEndpoint: https://api.zippopotam.us/us/
      InvocationRateLimitPerSecond: 300

  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${CloudWatchLogsGroup.Arn}:*"

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub "ZipCodeEnrichmentPipe-${AWS::StackName}"
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt SourceQueue.Arn
      Target: !GetAtt CloudWatchLogsGroup.Arn
      Enrichment: !Ref ApiDestination
      EnrichmentParameters:
        HttpParameters:
          PathParameterValues:
            - "$.body.zipcode"

Outputs:
  SourceQueueUrl:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue
  LogGroupName:
    Description: Name of the CloudWatch Logs group
    Value: !Ref CloudWatchLogsGroup
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !Ref EventBridgePipe
  ApiDestinationArn:
    Description: ARN of the API Destination
    Value: !GetAtt ApiDestination.Arn