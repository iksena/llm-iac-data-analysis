AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Resources:
  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SecureEmailAPI
    Metadata:
      Effect: encrypted

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: email
      RestApiId: !Ref APIGatewayRestApi
    DependsOn: APIGatewayRestApi

  APIGatewayRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: EmailRequestValidator
      RestApiId: !Ref APIGatewayRestApi
      ValidateRequestBody: true
      ValidateRequestParameters: true
    DependsOn: APIGatewayRestApi

  APIGatewayIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: APIGatewaySESPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"
    Metadata:
      Effect: encrypted

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: POST
      ResourceId: !Ref APIGatewayResource
      RestApiId: !Ref APIGatewayRestApi
      AuthorizationType: AWS_IAM
      ApiKeyRequired: true
      RequestValidatorId: !Ref APIGatewayRequestValidator
    DependsOn:
      - APIGatewayResource
      - APIGatewayRequestValidator

  APIGatewayIntegration:
    Type: AWS::ApiGateway::Integration
    Properties:
      HttpMethod: POST
      ResourceId: !Ref APIGatewayResource
      RestApiId: !Ref APIGatewayRestApi
      Type: AWS
      IntegrationHttpMethod: POST
      Uri: arn:aws:apigateway:us-east-1:ses:action/SendEmail
      Credentials: !GetAtt APIGatewayIAMRole.Arn
      RequestTemplates:
        application/json: |
          #set($allParams = $input.path('$'))
          {
            "Source": "$input.path('$.from')",
            "Destination": {
              "ToAddresses": ["$input.path('$.to')"]
            },
            "Message": {
              "Subject": {
                "Data": "$input.path('$.subject')"
              },
              "Body": {
                "Text": {
                  "Data": "$input.path('$.text')"
                },
                "Html": {
                  "Data": "$input.path('$.html')"
                }
              }
            }
          }
    DependsOn:
      - APIGatewayMethod
      - APIGatewayIAMRole

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      StageName: prod
    DependsOn: APIGatewayIntegration

  APIGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: EmailUsagePlan
      ApiStages:
        - ApiId: !Ref APIGatewayRestApi
          Stage: prod
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH
    DependsOn: APIGatewayDeployment

  APIGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPIKey
      Description: API Key for Email Service
      Enabled: true
    Metadata:
      Effect: encrypted

  APIGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIGatewayApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref APIGatewayUsagePlan
    DependsOn:
      - APIGatewayApiKey
      - APIGatewayUsagePlan

Metadata:
  TemplateInvariant:
    - API Gateway must have IAM permissions to invoke SES SendEmail action
    - Request validation must enforce JSON schema compliance
    - API key authentication must be enabled with encryption
    - Rate limiting must enforce 500 requests/second and 10,000 requests/month quotas
    - All API keys must be encrypted at rest