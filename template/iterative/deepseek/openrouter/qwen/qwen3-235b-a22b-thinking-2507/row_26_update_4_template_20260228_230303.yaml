AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
  SNSTopic:
    Type: AWS::SNS::Topic
  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.s3
        'detail-type':
          - 'Object Created'
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Id: SnsTarget
          Arn: !Ref SNSTopic
Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule