AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that provisions a serverless pipeline to collect,
  store, and analyze AWS Organizations data for centralized governance and reporting.
  It includes an encrypted S3 bucket with strict access controls, a Lambda function (using python3.12)
  to fetch organizational data on a weekly schedule via CloudWatch Events, and a Glue Crawler to catalog
  the S3 data into an Athena database.

Parameters:
  S3BucketName:
    Description: "Name of the S3 bucket to store organizational data."
    Type: String
  ManagementAccountId:
    Description: "AWS Management Account ID for cross-account role assumption."
    Type: String
  ReportTags:
    Description: "Comma-separated key=value pairs for report tags."
    Type: String
    Default: ""
  AthenaDatabaseName:
    Description: "Name of the Athena (Glue) database for cataloging the data."
    Type: String
    Default: "managementcur"

Resources:
  S3DataBucket:
    Type: AWS::S3::Bucket
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceEncryption
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: "AES256"
          - Sid: BlockInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${S3BucketName}"
              - !Sub "arn:aws:s3:::${S3BucketName}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-LambdaExecutionRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaOrgDataPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:ListOrganizationalUnitsForParent
                  - organizations:DescribeOrganization
                  - organizations:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub "arn:aws:iam::${ManagementAccountId}:role/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-FetchOrgData"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 300
      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId
          REPORT_TAGS: !Ref ReportTags
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          
          def handler(event, context):
              s3 = boto3.client('s3')
              # Placeholder for logic to assume cross-account role and retrieve AWS Organizations data
              org_data = {
                  "Accounts": [],
                  "OrganizationalUnits": [],
                  "Tags": os.environ.get('REPORT_TAGS', '')
              }
              bucket = os.environ.get('S3_BUCKET')
              key = "org_data_{}.json".format(context.aws_request_id)
              s3.put_object(Bucket=bucket, Key=key, Body=json.dumps(org_data))
              return {"status": "success", "s3_key": key}

  LambdaCloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-WeeklyScheduleRule"
      Description: "Triggers the Lambda function every week to fetch AWS Organizations data."
      ScheduleExpression: "rate(7 days)"
      State: "ENABLED"
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: "LambdaTarget"

  LambdaPermissionForEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"
      SourceArn: !GetAtt LambdaCloudWatchEventRule.Arn

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-GlueServiceRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: GlueS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3BucketName}"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${AWS::StackName}-Crawler"
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub "s3://${S3BucketName}/"
      Schedule:
        ScheduleExpression: "cron(0 0 ? * SUN *)"
      SchemaChangePolicy:
        UpdateBehavior: "LOG"
        DeleteBehavior: "LOG"

Outputs:
  S3BucketARN:
    Description: "ARN of the S3 bucket storing AWS Organization data."
    Value: !Sub "arn:aws:s3:::${S3BucketName}"
  LambdaFunctionARN:
    Description: "ARN of the Lambda function that retrieves AWS Organizations data."
    Value: !GetAtt LambdaFunction.Arn
  GlueCrawlerName:
    Description: "Name of the Glue Crawler cataloging the S3 data."
    Value: !Ref GlueCrawler