AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation Template to provision a Windows Server 2019 EC2 instance with SSM integration,
  a custom SSM Document for CPU stress testing, and an IAM Role for FIS with permissions to trigger SSM commands,
  manage CloudWatch Logs, and interact with EC2 instances.

Parameters:
  WindowsAMI:
    Description: "SSM parameter containing the AMI for Windows Server 2019"
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
  InstanceType:
    Description: "EC2 instance type (allowed values from t3.nano to t3.large)"
    Type: String
    Default: t3.micro
    AllowedValues: [t3.nano, t3.micro, t3.small, t3.medium, t3.large]
  CPUStressDuration:
    Description: "Duration in seconds to run the CPU stress test"
    Type: Number
    Default: 60
  SubnetId:
    Description: "Subnet ID for the instance. Enter a valid Subnet ID or 'default' for default VPC placement."
    Type: String
    Default: "default"
    AllowedPattern: "(default)|(subnet-[0-9a-f]+)"
    ConstraintDescription: "Must be 'default' or a valid subnet ID (e.g., subnet-xxxxxxx)."

Conditions:
  IsProvidedSubnet: !Not [ !Equals [ !Ref SubnetId, "default" ] ]

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2InstanceRole

  WindowsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: WindowsCPUStressInstance
      SubnetId: !If [ IsProvidedSubnet, !Ref SubnetId, !Ref "AWS::NoValue" ]

  CustomSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: CPUStressTestDocument
      Content: |
        {
          "schemaVersion": "2.2",
          "description": "SSM Document to perform CPU stress testing by spawning threads equal to logical processors.",
          "parameters": {
            "duration": {
              "type": "String",
              "description": "(Optional) Duration in seconds for CPU stress test",
              "default": "${CPUStressDuration}"
            }
          },
          "mainSteps": [
            {
              "action": "aws:runPowerShellScript",
              "name": "cpuStress",
              "inputs": {
                "runCommand": [
                  "$cpuCount = (Get-WmiObject -Class Win32_Processor).NumberOfLogicalProcessors",
                  "for ($i = 0; $i -lt $cpuCount; $i++) {",
                  "    Start-Job -ScriptBlock { param($duration) { $end = (Get-Date).AddSeconds($duration); while ((Get-Date) -lt $end) { } } } -ArgumentList \"{{ duration }}\"",
                  "}"
                ]
              }
            }
          ]
        }

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: FISExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: FISPermissionsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"

Outputs:
  InstanceId:
    Description: "ID of the Windows EC2 instance"
    Value: !Ref WindowsEC2Instance
  SSMDocumentName:
    Description: "Name of the custom SSM Document for CPU stress testing"
    Value: !Ref CustomSSMDocument