AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instance with ephemeral drives in default VPC

Parameters:
  KeyName:
    Description: (Optional) Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: String
    Default: ''
    ConstraintDescription: Must be the name of an existing EC2 KeyPair if provided.

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: m5d.large
    AllowedValues:
      - m5d.large
      - m5d.xlarge
      - m5d.2xlarge
    ConstraintDescription: Must be a valid instance type with ephemeral storage

Mappings:
  RegionMap:
    us-east-1:
      AMI: 'ami-0c2f25c1f66a1ff4d'  # Updated Amazon Linux 2 AMI for us-east-1
    us-west-2:
      AMI: 'ami-0d70546e43a941d70'  # Amazon Linux 2 AMI for us-west-2
    eu-west-1:
      AMI: 'ami-0bbc25e23a7640b9b'  # Amazon Linux 2 AMI for eu-west-1

Resources:
  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Enable SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      Tags:
        - Key: Name
          Value: EphemeralStorageInstance
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  HasSSHAccess:
    Description: Whether SSH access was configured
    Value: !If [HasKeyName, 'Yes', 'No']
  AMIUsed:
    Description: The AMI ID used for the instance
    Value: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]