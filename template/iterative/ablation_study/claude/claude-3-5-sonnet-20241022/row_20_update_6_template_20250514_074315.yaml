AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Log Queries for AWS Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'ID of the Client VPN Endpoint to monitor'
  
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Log Group containing Client VPN logs'
    
  DashboardName:
    Type: String
    Default: 'ClientVPNMonitoring'
    Description: 'Name of the CloudWatch Dashboard'

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: 
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "metric",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "ActiveConnectionsCount", "EndpointID", "${VPNEndpointId}" ]
                  ],
                  "period": 300,
                  "stat": "Average",
                  "region": "${AWS::Region}",
                  "title": "Active VPN Connections"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message\n| filter @logStream like /${VPNEndpointId}/\n| stats count(*) as ConnectionCount by bin(1h)",
                  "region": "${AWS::Region}",
                  "stacked": false,
                  "title": "Connection Count per Hour",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 6,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message\n| filter @logStream like /${VPNEndpointId}/\n| parse @message \"* bytes_rx=* bytes_tx=*\" as connection_id, bytes_rx, bytes_tx\n| stats sum(bytes_rx) as IngressBytes, sum(bytes_tx) as EgressBytes by bin(1h)",
                  "region": "${AWS::Region}",
                  "title": "Data Transfer Volume",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message\n| filter @logStream like /${VPNEndpointId}/\n| parse @message \"* auth-type=*\" as connection_id, auth_type\n| stats count(*) as AuthCount by auth_type\n| sort AuthCount desc",
                  "region": "${AWS::Region}",
                  "title": "Authentication Methods Usage",
                  "view": "pie"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 12,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message\n| filter @logStream like /${VPNEndpointId}/\n| parse @message \"* user=*\" as connection_id, user\n| stats count_distinct(connection_id) as ConnectionCount by user\n| sort ConnectionCount desc\n| limit 10",
                  "region": "${AWS::Region}",
                  "title": "Top 10 Users by Connections",
                  "view": "table"
                }
              }
            ]
          }

Outputs:
  DashboardURL:
    Description: 'URL of the created CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  
  DashboardARN:
    Description: 'ARN of the created CloudWatch Dashboard'
    Value: !Sub 'arn:aws:cloudwatch::${AWS::AccountId}:dashboard/${DashboardName}'