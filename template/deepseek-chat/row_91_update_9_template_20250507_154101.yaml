AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for VPC Flow Logs with lifecycle management and strict access controls

Parameters:
  BucketName:
    Description: Optional custom name for the S3 bucket (leave blank for auto-generated name)
    Type: String
    Default: ''
    MaxLength: 63
    AllowedPattern: ^[a-z0-9.-]*$
    ConstraintDescription: Bucket name can contain only lowercase letters, numbers, hyphens, and periods
  VersioningStatus:
    Description: Enable or suspend versioning for the bucket
    Type: String
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended
  TransitionToGlacierDays:
    Description: Number of days before transitioning objects to Glacier
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365000
  ExpirationInDays:
    Description: Number of days before objects expire
    Type: Number
    Default: 365000
    MinValue: 1
    MaxValue: 365000
  EnableLifecycle:
    Description: Enable lifecycle management rules
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]
  EnableLifecycleCondition: !Equals [!Ref EnableLifecycle, 'true']

Resources:
  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LifecycleConfiguration:
        !If:
        - EnableLifecycleCondition
        - Rules:
          - Id: TransitionAndExpirationRule
            Status: Enabled
            Transitions:
            - StorageClass: GLACIER
              TransitionInDays: !Ref TransitionToGlacierDays
            ExpirationInDays: !Ref ExpirationInDays
        - !Ref 'AWS::NoValue'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: FlowLogsBucket
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowVPCFlowLogsWrite
          Effect: Allow
          Principal:
            Service: delivery.logs.amazonaws.com
          Action: s3:PutObject
          Resource: !Sub '${FlowLogsBucket.Arn}/*'
          Condition:
            StringEquals:
              s3:x-amz-acl: bucket-owner-full-control
        - Sid: AllowVPCFlowLogsACL
          Effect: Allow
          Principal:
            Service: delivery.logs.amazonaws.com
          Action: s3:GetBucketAcl
          Resource: !Ref FlowLogsBucket

Outputs:
  BucketName:
    Description: Name of the created S3 bucket for VPC Flow Logs
    Value: !Ref FlowLogsBucket
  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt FlowLogsBucket.Arn
  BucketDomainName:
    Description: Domain name of the bucket
    Value: !GetAtt FlowLogsBucket.DomainName