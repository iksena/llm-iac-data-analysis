AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EC2 IP Address Manager (IPAM) with Public and Private Scopes

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: Managed IP Address Manager
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IPAM'
        - Key: Environment
          Value: !Ref Environment

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      Description: Public IP Address Scope
      IpamScopeType: public
      Tags:
        - Key: Name
          Value: PublicScope
        - Key: Environment
          Value: !Ref Environment

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      Description: Private IP Address Scope
      IpamScopeType: private
      Tags:
        - Key: Name
          Value: PrivateScope
        - Key: Environment
          Value: !Ref Environment

  PublicPool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamScopeId: !Ref PublicScope
      Description: Public IP Address Pool
      AddressFamily: ipv4
      Tags:
        - Key: Name
          Value: PublicPool
        - Key: Environment
          Value: !Ref Environment

  PrivatePool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamScopeId: !Ref PrivateScope
      Description: Private IP Address Pool
      AddressFamily: ipv4
      Tags:
        - Key: Name
          Value: PrivatePool
        - Key: Environment
          Value: !Ref Environment

Parameters:
  Environment:
    Type: String
    Default: Production
    Description: Environment name for tagging

Outputs:
  IPAMArn:
    Description: IPAM ARN
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ARN'

  IPAMId:
    Description: IPAM ID
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ID'

  PublicScopeId:
    Description: Public Scope ID
    Value: !Ref PublicScope
    Export:
      Name: !Sub '${AWS::StackName}-Public-Scope-ID'

  PrivateScopeId:
    Description: Private Scope ID
    Value: !Ref PrivateScope
    Export:
      Name: !Sub '${AWS::StackName}-Private-Scope-ID'