AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: subnet-12345678
      Description: Primary network interface with multiple IPs
      GroupSet:
        - sg-12345678
      PrivateIpAddress: 10.0.1.10
      SecondaryPrivateIpAddressCount: 2
      SourceDestCheck: true

  EIP0:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation0:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP0.AllocationId
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.11

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyNetworkInterface
      PrivateIpAddress: 10.0.1.12

Outputs:
  NetworkInterfaceId:
    Value: !Ref MyNetworkInterface
  EIP1PublicIP:
    Value: !GetAtt EIP0.PublicIp
  EIP2PublicIP:
    Value: !GetAtt EIP1.PublicIp
  SecondaryPrivateIP1:
    Value: 10.0.1.11
  SecondaryPrivateIP2:
    Value: 10.0.1.12