AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drive(s) attached via block device mappings, latest Amazon Linux 2 AMI via SSM, SSH key access, in pre-existing default VPC/subnet'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: 'Name of EXISTING EC2 KeyPair for SSH (create first: aws ec2 create-key-pair --key-name MyKey --query "KeyMaterial" --output text > MyKey.pem; chmod 400 MyKey.pem)'
  InstanceType:
    Type: String
    Default: m5d.large
    Description: 'Instance type supporting ephemeral NVMe instance store'
    AllowedValues:
      - m5d.large
      - m5d.xlarge
      - m5d.2xlarge
      - c5d.large
      - c5d.xlarge
    ConstraintDescription: 'Must support instance store (d* types)'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Pre-existing default VPC ID (aws ec2 describe-vpcs --filters "Name=is-default,Values=true")'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Public subnet ID in default VPC (must have MapPublicIpOnLaunch=true for public IP; aws ec2 describe-subnets --filters "Name=vpc-id,Values=vpc-xxx" "Name=default-for-az,Values=true")'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR for SSH (22) ingress'
    AllowedPattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:/(?:3[0-2]|[12]?[0-9]))?$'
    ConstraintPattern: 'must be valid CIDR like 0.0.0.0/0 or 10.0.0.0/24'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSH (22) access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2-ami-kernel-5.10-hvm-2.0-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Instance'

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref Ec2Instance
  PublicIp:
    Description: 'Public IP (SSH: ssh -i MyKey.pem ec2-user@PublicIp)'
    Value: !GetAtt Ec2Instance.PublicIp
  KeyName:
    Description: 'SSH KeyPair Name'
    Value: !Ref KeyName
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup