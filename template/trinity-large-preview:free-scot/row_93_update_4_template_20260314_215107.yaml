AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  S3BucketName:
    Type: String
    Default: nginx-logs-bucket
    Description: Unique S3 bucket name for storing logs

Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: NginxInstance
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-cloudwatch-agent
          systemctl start amazon-cloudwatch-agent

  NginxInstallAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-InstallApplication
      DocumentVersion: '$LATEST'
      Parameters:
        SourceType:
          - S3
        Location:
          - s3://aws-ssm-documents/AWS-InstallApplication/1.0/AWS-InstallApplication.zip
        SourceInfo:
          - '{"path":"nginx","sourceType":"S3"}'
      Targets:
        - Key: tag:InstallNginx
          Values:
            - 'true'
      ScheduleExpression: 'rate(1 hour)'

  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighCPUUtilization
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref NginxInstance
      EvaluationPeriods: 1

  HighMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighMemoryUtilization
      Namespace: AWS/EC2
      MetricName: MemoryUtilization
      Statistic: Average
      Period: 300
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref NginxInstance
      EvaluationPeriods: 1

  NginxDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NginxMonitoringDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization", "InstanceId", { "Ref": "NginxInstance" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "CPU Utilization"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "MemoryUtilization", "InstanceId", { "Ref": "NginxInstance" } ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Memory Utilization"
              }
            }
          ]
        }

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx server
    Value: !Ref NginxInstance
  PublicDNS:
    Description: Public DNSName of the Nginx server
    Value: !GetAtt NginxInstance.PublicDnsName
  S3BucketName:
    Description: S3 bucket name for logs
    Value: !Ref LogsBucket