AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable AWS Macie for sensitive data discovery'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: 'FIFTEEN_MINUTES'
    AllowedValues:
      - 'FIFTEEN_MINUTES'
      - 'ONE_HOUR'
      - 'SIX_HOURS'
    Description: 'Frequency for publishing updated findings'

  Status:
    Type: String
    Default: 'ENABLED'
    AllowedValues:
      - 'ENABLED'
      - 'SUSPENDED'
    Description: 'Status of the Macie session'

Resources:
  MacieSession:
    Type: 'AWS::Macie::Session'
    Properties:
      Status: !Ref Status
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      Tags:
        - Key: Environment
          Value: Production
        - Key: Service
          Value: Macie
        - Key: CreatedBy
          Value: CloudFormation

Outputs:
  MacieSessionId:
    Description: 'The ID of the Macie session'
    Value: !Ref MacieSession

  MacieSessionStatus:
    Description: 'The status of the Macie session'
    Value: !GetAtt MacieSession.Status