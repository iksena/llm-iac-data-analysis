AWSTemplateFormatVersion: '2010-09-09'
Description: Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)
  SubnetID:
    Type: AWS::EC2::Subnet::Id
    Default: ''
    Description: Subnet ID for EC2 instance (leave blank to use default VPC)
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: EC2 Key Pair name for SSH access

Resources:
  WindowsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  WindowsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WindowsInstanceRole

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess

  WindowsInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref WindowsInstanceProfile
      KeyName: !Ref KeyName
      SubnetId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref SubnetID]
      UserData:
        Fn::Base64: |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          </powershell>
      Tags:
        - Key: Name
          Value: Windows-CPU-Stress-Test

  CPUMaxStressDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '1.0'
        description: CPU stress test script
        parameters:
          duration:
            type: String
            default: '300'
            description: Duration in seconds for CPU stress test
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: runStressTest
            inputs:
              runCommand:
                - |
                  $duration = [int]$duration
                  $processors = [int](Get-WmiObject -Class Win32_Processor).NumberOfLogicalProcessors
                  $scriptBlock = {
                    $startTime = Get-Date
                    while ((Get-Date) -lt ($startTime.AddSeconds($using:duration))) {
                      $result = 1
                      for ($i = 0; $i -lt 1000000; $i++) {
                        $result = $result * $i
                      }
                    }
                  }
                  for ($i = 0; $i -lt $processors; $i++) {
                    Start-Job -ScriptBlock $scriptBlock
                  }
                  Wait-Job -Job (Get-Job)
                  Remove-Job -Job (Get-Job) -Force

Conditions:
  UseDefaultVPC: !Equals [!Ref SubnetID, '']

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WindowsInstance
  PublicIp:
    Description: Public IP Address
    Value: !GetAtt WindowsInstance.PublicIp
  CPUMaxStressDocumentName:
    Description: SSM Document Name
    Value: !Ref CPUMaxStressDocument