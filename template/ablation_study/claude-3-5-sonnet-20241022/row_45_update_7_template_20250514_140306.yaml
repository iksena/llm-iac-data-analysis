AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Kinesis Firehose with encryption and CloudWatch logging'

Parameters:
  FirehoseStreamName:
    Type: String
    Description: 'Name of the Firehose delivery stream'
    Default: 'MyFirehoseStream'
  
  S3BucketName:
    Type: String
    Description: 'Name of the S3 bucket for Firehose destination'

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/firehose/${FirehoseStreamName}'
      RetentionInDays: 7

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'ErrorLogging'

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSKinesisFirehoseServiceRole
      Policies:
        - PolicyName: FirehoseCustomPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt FirehoseLogGroup.Arn
                  - !Sub '${FirehoseLogGroup.Arn}:log-stream:*'
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: '*'

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn: 
      - FirehoseRole
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      S3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${S3BucketName}'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream
        EncryptionConfiguration:
          NoEncryptionConfig: NoEncryption

Outputs:
  FirehoseStreamARN:
    Description: 'ARN of the created Kinesis Firehose Delivery Stream'
    Value: !GetAtt FirehoseStream.Arn
  
  FirehoseLogGroupName:
    Description: 'Name of the CloudWatch Log Group for Firehose'
    Value: !Ref FirehoseLogGroup