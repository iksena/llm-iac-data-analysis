AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
      ManagedPolicyArns:
        - Fn::Join:
            - ''
            -
              - 'arn:'
              - Ref: AWS::Partition
              - ':iam::aws:policy/service-role/AmazonSSMManagedInstanceCore'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - Ref: IAMRole

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: owner
          Value: u12345678@anu.edu.au

  S3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3ImageBuilderLogsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Effect: Allow
            Resource:
              - Fn::Join:
                  - ''
                  -
                    - 'arn:'
                    - Ref: AWS::Partition
                    - ':s3:::'
                    - Ref: S3Bucket
              - Fn::Join:
                  - ''
                  -
                    - 'arn:'
                    - Ref: AWS::Partition
                    - ':s3:::'
                    - Ref: S3Bucket
                    - '/*'
      Roles:
        - Ref: IAMRole