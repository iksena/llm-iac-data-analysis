AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EFS with cross-AZ EC2 instances and performance monitoring'

Parameters:
  EnvironmentName:
    Description: Environment name
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Testing
      - Production

  VpcCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Description: CIDR block for the public subnet in AZ 1
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Description: CIDR block for the public subnet in AZ 2
    Type: String
    Default: 10.0.2.0/24

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
      - m5.large
    ConstraintDescription: Must be a valid EC2 instance type.

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    
  EmailAddress:
    Description: Email address to receive CloudWatch alarm notifications
    Type: String
    Default: example@example.com

Resources:
  # VPC and Networking Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # Network ACL
  NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-NACL

  InboundHTTPNetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  InboundSSHNetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22

  InboundNFSNetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 2049
        To: 2049

  InboundEphemeralNetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  OutboundNetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  Subnet1NetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref NetworkAcl

  Subnet2NetworkAclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref NetworkAcl

  # Security Groups
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EC2-SG

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow NFS access from EC2 instances
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EFS-SG

  # IAM Role for EC2 instances
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EC2-Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  # EFS Resources
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EFS

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # EC2 Instances
  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update packages
          yum update -y
          
          # Install required packages
          yum install -y amazon-efs-utils
          yum install -y httpd
          yum install -y aws-cfn-bootstrap
          
          # Start and enable httpd
          systemctl start httpd
          systemctl enable httpd
          
          # Create mount directory
          mkdir -p /mnt/efs
          
          # Wait for mount targets to be available
          echo "Waiting for EFS mount targets to be available..."
          sleep 60
          
          # Mount EFS with retry logic
          MOUNT_SUCCESS=false
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$MOUNT_SUCCESS" = false ]; do
            echo "Attempting to mount EFS (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
            
            # Try to mount
            mount -t efs -o tls ${FileSystem}:/ /mnt/efs
            
            if [ $? -eq 0 ]; then
              MOUNT_SUCCESS=true
              echo "EFS mounted successfully!"
              
              # Add to fstab for persistence across reboots
              echo "${FileSystem}:/ /mnt/efs efs defaults,tls 0 0" >> /etc/fstab
              
              # Create test file
              echo "This is a test file from Instance 1" > /mnt/efs/test-instance1.txt
              
              # Signal success
              /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}
            else
              echo "Mount failed, retrying in 30 seconds..."
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 30
            fi
          done
          
          if [ "$MOUNT_SUCCESS" = false ]; then
            echo "Failed to mount EFS after $MAX_RETRIES attempts"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}
            exit 1
          fi
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EC2-Instance1

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
      - EC2Instance1
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update packages
          yum update -y
          
          # Install required packages
          yum install -y amazon-efs-utils
          yum install -y httpd
          yum install -y aws-cfn-bootstrap
          
          # Start and enable httpd
          systemctl start httpd
          systemctl enable httpd
          
          # Create mount directory
          mkdir -p /mnt/efs
          
          # Wait for mount targets to be available
          echo "Waiting for EFS mount targets to be available..."
          sleep 60
          
          # Mount EFS with retry logic
          MOUNT_SUCCESS=false
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$MOUNT_SUCCESS" = false ]; do
            echo "Attempting to mount EFS (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
            
            # Try to mount
            mount -t efs -o tls ${FileSystem}:/ /mnt/efs
            
            if [ $? -eq 0 ]; then
              MOUNT_SUCCESS=true
              echo "EFS mounted successfully!"
              
              # Add to fstab for persistence across reboots
              echo "${FileSystem}:/ /mnt/efs efs defaults,tls 0 0" >> /etc/fstab
              
              # Create test file
              echo "This is a test file from Instance 2" > /mnt/efs/test-instance2.txt
              
              # Signal success
              /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}
            else
              echo "Mount failed, retrying in 30 seconds..."
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 30
            fi
          done
          
          if [ "$MOUNT_SUCCESS" = false ]; then
            echo "Failed to mount EFS after $MAX_RETRIES attempts"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}
            exit 1
          fi
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EC2-Instance2

  # CloudWatch Alarms
  EFSIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when EFS I/O limit reaches 95%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 95
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic

  EFSThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when EFS throughput utilization reaches 80%
      Namespace: AWS/EFS
      MetricName: ThroughputUtilization
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem
      Statistic: Average
      Period: 60
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic

  EFSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarm-Topic
      TopicName: !Sub ${EnvironmentName}-EFS-Alarms

  EFSAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref EFSAlarmTopic
      Protocol: email
      Endpoint: !Ref EmailAddress

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnet1:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1

  PublicSubnet2:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2

  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !Sub ${FileSystem}.efs.${AWS::Region}.amazonaws.com

  EC2Instance1Id:
    Description: EC2 Instance 1 ID
    Value: !Ref EC2Instance1

  EC2Instance1PublicIP:
    Description: EC2 Instance 1 Public IP
    Value: !GetAtt EC2Instance1.PublicIp

  EC2Instance2Id:
    Description: EC2 Instance 2 ID
    Value: !Ref EC2Instance2

  EC2Instance2PublicIP:
    Description: EC2 Instance 2 Public IP
    Value: !GetAtt EC2Instance2.PublicIp

  IOLimitAlarm:
    Description: CloudWatch Alarm for EFS I/O Limit
    Value: !Ref EFSIOLimitAlarm

  ThroughputAlarm:
    Description: CloudWatch Alarm for EFS Throughput
    Value: !Ref EFSThroughputAlarm