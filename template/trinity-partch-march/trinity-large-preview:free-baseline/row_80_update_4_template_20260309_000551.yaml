AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Bedrock service with agent and Lambda permissions

Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole
      Policies:
        - PolicyName: BedrockAgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:agent:CreateAgent
                  - bedrock:agent:UpdateAgent
                  - bedrock:agent:DeleteAgent
                  - bedrock:agent:GetAgent
                  - bedrock:agent:ListAgents
                  - bedrock:agent:InvokeAgent
                  - bedrock:agent:PrepareAgent
                Resource: 'arn:aws:bedrock:*:*:agent/*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'