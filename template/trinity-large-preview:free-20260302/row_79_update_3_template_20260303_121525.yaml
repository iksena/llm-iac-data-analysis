AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create three IAM managed policies for S3, DynamoDB, and RDS protection.

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3AccessPolicy
      Description: Grants read/write access to the ios-apps.sagebridge.org S3 bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:aws:s3:::ios-apps.sagebridge.org'
              - !Sub 'arn:aws:s3:::ios-apps.sagebridge.org/*'

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DynamoDBProtectionPolicy
      Description: Explicitly denies deletion or schema-modification actions in DynamoDB
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:UpdateTableReplicaAutoScaling
              - dynamodb:UpdateGlobalTable
              - dynamodb:UpdateGlobalTableSettings
              - dynamodb:UpdateTimeToLive
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RDSProtectionPolicy
      Description: Blocks destructive RDS operations to safeguard databases and backups
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBInstanceAutomatedBackup
              - rds:DeleteDBSnapshot
              - rds:DeleteDBCluster
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteEventSubscription
              - rds:DeleteOptionGroup
              - rds:DeleteParameterGroup
              - rds:DeleteDBSubnetGroup
            Resource: '*'