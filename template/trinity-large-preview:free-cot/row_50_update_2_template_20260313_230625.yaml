AWSTemplateFormatVersion: '2010-09-09'
Description: URL-to-PNG Screenshot Service with Auto Scaling and Load Testing

Parameters:
  AdminCidrIp:
    Type: String
    Description: CIDR block for SSH access (e.g., 192.168.1.0/24)
    Default: 0.0.0.0/0
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}/\d{1,2}
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ScreenshotService-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ScreenshotService-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ScreenshotService-PublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ScreenshotService-PrivateRT

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotService-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotService-PublicSubnet2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: ScreenshotService-PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: ScreenshotService-PrivateSubnet2

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'screenshot-service-${AWS::AccountId}-${AWS::Region}-${AWS::NoValue}'
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: ScreenshotService-S3Bucket

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt WorkerRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      QueueName: ScreenshotServiceQueue
      Tags:
        - Key: Name
          Value: ScreenshotService-SQSQueue

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for worker instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidrIp
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ScreenshotService-WorkerSG

  LoadTestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for load test instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidrIp
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ScreenshotService-LoadTestSG

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Path: /
      Tags:
        - Key: Name
          Value: ScreenshotService-WorkerRole

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref WorkerRole

  LoadTestRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
      Path: /
      Tags:
        - Key: Name
          Value: ScreenshotService-LoadTestRole

  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref LoadTestRole

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: ScreenshotService-WorkerLT
      LaunchTemplateData:
        ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
        InstanceType: t3.micro
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: !Ref WorkerInstanceProfile
        SecurityGroupIds:
          - !Ref WorkerSecurityGroup
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y chromium-browser python3
            pip3 install boto3
            cat > /home/ec2-user/worker.py << 'EOF'
            import boto3
            import subprocess
            import os
            import time
            import json

            def take_screenshot(url, output_path):
                try:
                    subprocess.run(['chromium-browser', '--headless', '--disable-gpu', '--screenshot', '--window-size=1920,1080', url, '--virtual-time-budget=10000', '--no-sandbox'], check=True)
                    if os.path.exists('screenshot.png'):
                        os.rename('screenshot.png', output_path)
                        return True
                except Exception as e:
                    print(f"Error taking screenshot: {e}")
                return False

            def process_messages():
                sqs = boto3.client('sqs')
                s3 = boto3.client('s3')
                queue_url = 'https://sqs.' + os.environ['AWS_REGION'] + '.amazonaws.com/' + os.environ['AWS_ACCOUNT_ID'] + '/ScreenshotServiceQueue'

                while True:
                    response = sqs.receive_message(
                        QueueUrl=queue_url,
                        MaxNumberOfMessages=1,
                        VisibilityTimeout=300,
                        WaitTimeSeconds=20
                    )

                    if 'Messages' in response:
                        message = response['Messages'][0]
                        body = json.loads(message['Body'])
                        url = body.get('url')
                        receipt_handle = message['ReceiptHandle']

                        if url:
                            timestamp = int(time.time())
                            s3_key = f"screenshots/{timestamp}.png"
                            if take_screenshot(url, s3_key):
                                s3.upload_file(s3_key, 'screenshot-service-' + os.environ['AWS_ACCOUNT_ID'] + '-' + os.environ['AWS_REGION'] + '-null', s3_key)
                                os.remove(s3_key)
                                sqs.delete_message(QueueUrl=queue_url, ReceiptHandle=receipt_handle)
                            else:
                                sqs.change_message_visibility(QueueUrl=queue_url, ReceiptHandle=receipt_handle, VisibilityTimeout=0)
                        else:
                            sqs.delete_message(QueueUrl=queue_url, ReceiptHandle=receipt_handle)
                    else:
                        time.sleep(5)

            if __name__ == "__main__":
                process_messages()
            EOF
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ScreenshotService-Worker

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref LoadTestSecurityGroup
          SubnetId: !Ref PublicSubnet1
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y python3
          pip3 install boto3
          cat > /home/ec2-user/load_test.py << 'EOF'
          import boto3
          import time
          import json
          import random

          def populate_queue():
              sqs = boto3.client('sqs')
              queue_url = 'https://sqs.' + os.environ['AWS_REGION'] + '.amazonaws.com/' + os.environ['AWS_ACCOUNT_ID'] + '/ScreenshotServiceQueue'
              test_urls = [
                  'https://aws.amazon.com',
                  'https://amazon.com',
                  'https://google.com',
                  'https://github.com',
                  'https://stackoverflow.com'
              ]

              while True:
                  url = random.choice(test_urls)
                  message = {
                      'url': url
                  }
                  sqs.send_message(
                      QueueUrl=queue_url,
                      MessageBody=json.dumps(message)
                  )
                  time.sleep(random.randint(1, 5))

          if __name__ == "__main__":
              populate_queue()
          EOF
      Tags:
        - Key: Name
          Value: ScreenshotService-LoadTest

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: ScreenshotService-WorkerASG
          PropagateAtLaunch: true

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ApproximateNumberOfMessagesVisible
        TargetValue: 5.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ApproximateNumberOfMessagesVisible
        TargetValue: 1.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for screenshots
    Value: !Ref S3Bucket
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !GetAtt SQSQueue.QueueUrl
  LoadTestInstanceID:
    Description: ID of the load test instance
    Value: !Ref LoadTestInstance