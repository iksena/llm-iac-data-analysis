AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Provision Linux and Windows EC2 instances (with SSM agent),
  an SSM Document with OS-specific commands,
  an SSM Association targeting instances tagged with HelloWorld=true,
  and an EventBridge Scheduler that triggers the SSM Association every 15 minutes.
  An S3 bucket is created for execution logs and appropriate IAM roles are defined.

Parameters:
  LinuxAmi:
    Description: "AMI ID for the Linux instance"
    Type: AWS::EC2::Image::Id
  WindowsAmi:
    Description: "AMI ID for the Windows instance"
    Type: AWS::EC2::Image::Id
  InstanceTypeLinux:
    Description: "EC2 instance type for Linux"
    Type: String
    Default: t3.micro
  InstanceTypeWindows:
    Description: "EC2 instance type for Windows"
    Type: String
    Default: t3.micro
  KeyName:
    Description: "Optional EC2 KeyPair name to allow SSH/RDP access to instances"
    Type: AWS::EC2::KeyPair::KeyName
    Default: ""

Conditions:
  HasKeyName:
    Fn::Not:
      - Fn::Equals:
          - !Ref KeyName
          - ""

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ssm-execution-logs-${AWS::AccountId}-${AWS::Region}-${AWS::StackName}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 30

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EC2InstanceRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${LogBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-EC2InstanceProfile"
      Roles:
        - !Ref EC2InstanceRole

  LinuxEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeLinux
      ImageId: !Ref LinuxAmi
      KeyName: 
        !If:
          - HasKeyName
          - !Ref KeyName
          - !Ref "AWS::NoValue"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-LinuxInstance"

  WindowsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeWindows
      ImageId: !Ref WindowsAmi
      KeyName:
        !If:
          - HasKeyName
          - !Ref KeyName
          - !Ref "AWS::NoValue"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-WindowsInstance"

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: !Sub "${AWS::StackName}-HelloWorldDocument"
      Content:
        schemaVersion: '2.2'
        description: "Document to execute OS-specific Hello World commands"
        mainSteps:
          - name: runLinuxCommand
            action: aws:runShellScript
            inputs:
              runCommand:
                - "echo Hello World!"
          - name: runWindowsCommand
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - "Write-Output 'Hello World!'"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: "tag:HelloWorld"
          Values:
            - "true"

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-SchedulerRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AllowSSMInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                Resource: "*"

  EventBridgeScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-Scheduler"
      Description: "Trigger SSM Association every 15 minutes"
      ScheduleExpression: "rate(15 minutes)"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        RoleArn: !GetAtt SchedulerRole.Arn
        Arn: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociationId}"
        Input: !Sub '{"AssociationId": "${SSMAssociationId}"}'
    Metadata:
      SSMAssociationId: !Ref SSMAssociation

Outputs:
  LinuxInstanceId:
    Description: "ID of the Linux EC2 instance"
    Value: !Ref LinuxEC2Instance
  WindowsInstanceId:
    Description: "ID of the Windows EC2 instance"
    Value: !Ref WindowsEC2Instance
  LogBucketName:
    Description: "Name of the S3 bucket for execution logs"
    Value: !Ref LogBucket
  ScheduleARN:
    Description: "ARN of the EventBridge Scheduler"
    Value: !GetAtt EventBridgeScheduler.Arn