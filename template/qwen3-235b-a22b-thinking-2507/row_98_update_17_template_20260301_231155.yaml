AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
    MinLength: 1
    MaxLength: 120
  RepositoryUrl:
    Type: String
    Default: 'https://github.com/aws-samples/create-react-app-amplify.git'
    Description: URL of public Git repository (must be accessible without tokens)
    MinLength: 1
  BranchName:
    Type: String
    Default: production
    Description: Name of the production branch
    MinLength: 1
    MaxLength: 255
  AccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Personal access token (only needed for private repositories)
Conditions:
  HasAccessToken: !Not
    - !Equals
      - !Ref AccessToken
      - ''
Resources:
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub '${AppName}-${AWS::StackName}'
      Repository: !Ref RepositoryUrl
      Platform: WEB
      AccessToken: !If
        - HasAccessToken
        - !Ref AccessToken
        - !Ref AWS::NoValue
  TodoAppProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt TodoAppAmplifyApp.AppId
      BranchName: !Ref BranchName
Outputs:
  AmplifyAppId:
    Description: ID of the Amplify application
    Value: !GetAtt TodoAppAmplifyApp.AppId
  AmplifyBranchName:
    Description: Name of the production branch
    Value: !Ref BranchName
  AmplifyAppUrl:
    Description: URL of the deployed application
    Value: !Sub 'https://${BranchName}.${TodoAppAmplifyApp.DefaultDomain}'