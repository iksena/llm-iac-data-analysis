AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a private API Gateway integrated with a Lambda function.
  The API is restricted via a VPC endpoint, which is created within this stack.

Parameters:
  LambdaHandler:
    Type: String
    Default: "index.lambda_handler"
    Description: "Lambda function handler."
  LambdaRuntime:
    Type: String
    Default: "python3.12"
    Description: "Runtime environment for the Lambda function."
  LambdaTimeout:
    Type: Number
    Default: 10
    Description: "Timeout (in seconds) for the Lambda function."

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "MyVPC"

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: "MySubnet"

  ApiGatewayVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref MyVPC
      SubnetIds:
        - !Ref MySubnet
      VpcEndpointType: "Interface"
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.execute-api"
      PrivateDnsEnabled: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "LambdaExecutionRoleForPrivateAPIGateway"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "LambdaBasicExecution"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "PrivateAPILambdaFunction"
      Handler: !Ref LambdaHandler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Hello from Lambda behind Private API Gateway"
              }

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "PrivateAPIWithLambda"
      EndpointConfiguration:
        Types:
          - "PRIVATE"
        VpcEndpointIds:
          - !Ref ApiGatewayVPCEndpoint
      Policy:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "execute-api:Invoke",
                  "Resource": "arn:aws:execute-api:${Region}:${AccountId}:*/*",
                  "Condition": {
                    "StringEquals": {
                      "aws:SourceVpce": "${VpcEndpointId}"
                    }
                  }
                }
              ]
            }
          - Region: !Ref "AWS::Region"
            AccountId: !Ref "AWS::AccountId"
            VpcEndpointId: !Ref ApiGatewayVPCEndpoint

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: "lambda"

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: "GET"
      AuthorizationType: "NONE"
      Integration:
        Type: "AWS_PROXY"
        IntegrationHttpMethod: "POST"
        Uri:
          Fn::Join:
            - ""
            - - "arn:aws:apigateway:"
              - !Ref "AWS::Region"
              - ":lambda:path/2015-03-31/functions/"
              - !GetAtt LambdaFunction.Arn
              - "/invocations"
      MethodResponses:
        - StatusCode: "200"

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: "prod"
      DeploymentId: !Ref ApiGatewayDeployment
      RestApiId: !Ref ApiGatewayRestApi

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceAccount: !Ref "AWS::AccountId"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/*/GET/lambda"

Outputs:
  VPCId:
    Description: "The ID of the created VPC."
    Value: !Ref MyVPC

  VPCEndpointId:
    Description: "The ID of the created VPC Endpoint for API Gateway."
    Value: !Ref ApiGatewayVPCEndpoint

  ApiGatewayId:
    Description: "The ID of the API Gateway."
    Value: !Ref ApiGatewayRestApi

  ApiInvokeURL:
    Description: "The invoke URL of the API Gateway."
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"

  LambdaFunctionARN:
    Description: "ARN of the Lambda function."
    Value: !GetAtt LambdaFunction.Arn