AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL cluster with CloudWatch Logs integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the DB cluster will be deployed

  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for DB cluster

  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for DB cluster

  DBName:
    Type: String
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBMasterUsername:
    Type: String
    Description: Database admin username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBMasterPassword:
    Type: String
    Description: Database admin password
    MinLength: 8
    MaxLength: 41
    NoEcho: true

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: 
        - !Ref Subnet1
        - !Ref Subnet2

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Aurora MySQL cluster parameter group
      Family: aurora-mysql5.7
      Parameters:
        character_set_server: utf8mb4
        character_set_client: utf8mb4

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Aurora MySQL instance parameter group
      Family: aurora-mysql5.7
      Parameters:
        max_connections: '1000'

  CloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

  CloudWatchLogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AuroraCloudWatchLogsPolicy
      Roles: 
        - !Ref CloudWatchLogsRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:CreateLogGroup
              - logs:DescribeLogStreams
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/rds/*

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.10.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds: 
        - !Ref DBSecurityGroup
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      BackupRetentionPeriod: 7
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub ${AWS::StackName}-instance1

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub ${AWS::StackName}-instance2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt AuroraDBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address

  Instance1Endpoint:
    Description: First instance endpoint
    Value: !GetAtt DBInstance1.Endpoint.Address

  Instance2Endpoint:
    Description: Second instance endpoint
    Value: !GetAtt DBInstance2.Endpoint.Address