AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a DynamoDB table'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: MyDynamoDBTable
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: Must contain only alphanumeric characters, underscores, hyphens, and dots.

  BillingMode:
    Type: String
    Description: DynamoDB billing mode
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Type: Number
    Description: Provisioned read capacity units (only applicable if BillingMode is PROVISIONED)
    Default: 5
    MinValue: 1
    MaxValue: 10000
    ConstraintDescription: Must be between 1 and 10000

  WriteCapacityUnits:
    Type: Number
    Description: Provisioned write capacity units (only applicable if BillingMode is PROVISIONED)
    Default: 5
    MinValue: 1
    MaxValue: 10000
    ConstraintDescription: Must be between 1 and 10000

  EnablePointInTimeRecovery:
    Type: String
    Description: Enable point-in-time recovery for the DynamoDB table
    Default: true
    AllowedValues:
      - true
      - false

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, 'PROVISIONED']
  EnablePITR: !Equals [!Ref EnablePointInTimeRecovery, 'true']

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: !If
        - IsProvisioned
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification: !If
        - EnablePITR
        - PointInTimeRecoveryEnabled: true
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"