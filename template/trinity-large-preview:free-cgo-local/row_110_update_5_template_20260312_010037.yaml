AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-account private API Gateway with Lambda backend and custom domain

Parameters:
  VpcEndpointId:
    Type: String
    Default: vpce-0000000000000000
    Description: VPC endpoint ID for private API access
  CustomDomainName:
    Type: String
    Default: api.example.com
    Description: Custom domain name for the API
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage name

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from private API Gateway'
              }

  ApiGatewayVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub ${AWS::StackName}-vpc-link
      SubnetIds:
        - Fn::ImportValue: !Sub ${AWS::AccountId}:SubnetA
        - Fn::ImportValue: !Sub ${AWS::AccountId}:SubnetB
      SecurityGroupIds:
        - Fn::ImportValue: !Sub ${AWS::AccountId}:LambdaSecurityGroup

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateHttpApi
      ProtocolType: HTTP
      SecurityConfig:
        ApiKeyRequired: false
      Target: !GetAtt ApiGatewayVpcLink.VpcLinkId

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'ANY /'
      Target: !Sub integrations/${LambdaIntegration}

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      Name: !Ref StageName
      AutoDeploy: true

  CustomDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !ImportValue !Sub ${AWS::AccountId}:ACMArn

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref CustomDomainName
      Stage: !Ref StageName

  ApiGatewayInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub https://${CustomDomainName}/${StageName}