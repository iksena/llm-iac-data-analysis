AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS KMS Key with an Alias

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for centralized encryption management
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/centralized-encryption-key
      TargetKeyId: !Ref KMSKey

Outputs:
  KeyId:
    Description: The ID of the created KMS key
    Value: !Ref KMSKey
    Export:
      Name: KMSKeyId

  KeyArn:
    Description: The ARN of the created KMS key
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: KMSKeyArn

  AliasName:
    Description: The name of the created alias
    Value: !Ref KMSKeyAlias
    Export:
      Name: KMSKeyAliasName