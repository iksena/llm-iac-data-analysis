AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyTransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable

  MyResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: TransitGatewayShare
      AllowExternalPrincipals: true
      ResourceArns:
        - !Join
          - ''
          - - 'arn:aws:ec2:::transit-gateway/'
            - !Ref MyTransitGateway
      Principals:
        - 644519422710

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref MyTransitGateway
  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref MyResourceShare