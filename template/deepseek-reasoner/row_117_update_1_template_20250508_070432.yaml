AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  CentralEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CentralEventBus

  InsertPipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt CentralEventBus.Arn

  ModifyPipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt CentralEventBus.Arn

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: InsertEventPipe
      RoleArn: !GetAtt InsertPipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["INSERT"]}'
      TargetParameters:
        InputTemplate: |
          {
            "detail-type": "DynamoDB Stream Event",
            "source": "com.company.dynamodb",
            "detail": {
              "operation": "<$.eventName>",
              "newRecord": <$.dynamodb.NewImage>,
              "oldRecord": <$.dynamodb.OldImage>
            }
          }

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: ModifyEventPipe
      RoleArn: !GetAtt ModifyPipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["MODIFY"]}'
      TargetParameters:
        InputTemplate: |
          {
            "detail-type": "DynamoDB Stream Event",
            "source": "com.company.dynamodb",
            "detail": {
              "operation": "<$.eventName>",
              "newRecord": <$.dynamodb.NewImage>,
              "oldRecord": <$.dynamodb.OldImage>
            }
          }

Outputs:
  EventBusArn:
    Value: !GetAtt CentralEventBus.Arn
    Description: ARN of the central event bus
  DynamoDBTableName:
    Value: !Ref DynamoDBTable
    Description: Name of the DynamoDB table with streams