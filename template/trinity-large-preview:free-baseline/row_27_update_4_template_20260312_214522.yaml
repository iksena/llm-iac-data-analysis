AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for real-time data ingestion and storage pipeline using Kinesis Data Stream and Firehose with S3 delivery.

Parameters:
  KinesisStreamName:
    Type: String
    Default: MyKinesisStream
    Description: Name of the Kinesis Data Stream
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis Data Stream
  S3BucketName:
    Type: String
    Default: my-kinesis-firehose-delivery-bucket
    Description: Name of the S3 bucket for Firehose delivery
  S3Prefix:
    Type: String
    Default: firehose/
    Description: S3 prefix for organizing delivered data

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled

  FirehoseDeliveryStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: FirehoseDeliveryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Join ['', [!GetAtt S3Bucket.Arn, '/*']]

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: MyFirehoseDeliveryStream
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        Prefix: !Ref S3Prefix
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn

Outputs:
  KinesisStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
  KinesisFirehoseDeliveryStreamARN:
    Description: ARN of the Kinesis Firehose Delivery Stream
    Value: !Ref KinesisFirehoseDeliveryStream
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket