AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication'

Parameters:
  UserPoolName:
    Type: String
    Default: 'SecureUserPool'
    Description: 'Name of the Cognito User Pool'
  
  EmailVerificationSubject:
    Type: String
    Default: 'Verify your email for our application'
    Description: 'Subject line for the email verification message'
  
  EmailVerificationMessage:
    Type: String
    Default: 'Thank you for signing up. Your verification code is {####}'
    Description: 'Content of the email verification message. Must include {####} placeholder for the verification code'
  
  AdminCreateUserOnly:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to allow only administrators to create user profiles'
  
  PasswordMinimumLength:
    Type: Number
    Default: 12
    MinValue: 8
    MaxValue: 99
    Description: 'Minimum length required for user passwords'

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: !Ref AdminCreateUserOnly
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
      UsernameAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-client'
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30

Outputs:
  UserPoolId:
    Description: 'ID of the Cognito User Pool'
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'
  
  UserPoolArn:
    Description: 'ARN of the Cognito User Pool'
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolArn'
  
  UserPoolClientId:
    Description: 'ID of the Cognito User Pool Client'
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'