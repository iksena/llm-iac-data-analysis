AWSTemplateFormatVersion: '2010-09-09'
Description: Secure, monitored web application environment with PHP/Apache, VPC, S3 logging, and IAM roles

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access from the internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServerSG

  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServerRole

  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref WebServerRole

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegion2AMI, !Ref 'AWS::Region', AmazonLinux2]
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref WebServerInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref WebServerSecurityGroup
          SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd php
          systemctl start httpd
          systemctl enable httpd
          echo "<html><body><h1>Web Server Running</h1><p>Instance ID: " > /var/www/html/index.php
          curl -s http://169.254.169.254/latest/meta-data/instance-id >> /var/www/html/index.php
          echo "<br>Public IP: " >> /var/www/html/index.php
          curl -s http://169.254.169.254/latest/meta-data/public-ipv4 >> /var/www/html/index.php
          echo "</p></body></html>" >> /var/www/html/index.php
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServer

  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-LogBucket

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetBucketAcl
            Resource:
              - !Sub 'arn:aws:s3:::${LogBucket}/*'
              - !Sub 'arn:aws:s3:::${LogBucket}'

Mappings:
  AWSRegion2AMI:
    us-east-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    us-east-2:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    us-west-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    us-west-2:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    eu-west-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    eu-west-2:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    eu-west-3:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    eu-central-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    ap-northeast-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    ap-northeast-2:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    ap-southeast-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    ap-southeast-2:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    sa-east-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0

Outputs:
  WebServerPublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp
  LogBucketARN:
    Description: ARN of the log bucket
    Value: !GetAtt LogBucket.Arn