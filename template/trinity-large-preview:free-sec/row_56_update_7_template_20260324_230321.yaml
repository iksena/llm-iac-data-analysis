AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication

Parameters:
  UserPoolName:
    Type: String
    Default: SecureUserPool
    Description: Name of the Cognito User Pool
  UserPoolClientName:
    Type: String
    Default: SecureUserPoolClient
    Description: Name of the Cognito User Pool Client
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
    Description: Custom verification message
  EmailVerificationSubject:
    Type: String
    Default: Your verification code
    Description: Custom verification subject
  RequireEmailVerification:
    Type: String
    AllowedValues: ['True', 'False']
    Default: 'True'
    Description: Require email verification before user activation
  MfaConfiguration:
    Type: String
    AllowedValues: ['OFF', 'ON', 'OPTIONAL']
    Default: 'OFF'
    Description: MFA configuration for the user pool

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: !Ref RequireEmailVerification
        UnusedAccountValidityDays: 7
      MfaConfiguration: !Ref MfaConfiguration
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
          StringAttributeConstraints:
            MinLength: '0'
            MaxLength: '2048'
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolTags:
        ManagedBy: CloudFormation
        Environment: Production

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref UserPoolClientName
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email
      TokenValidityUnits:
        AccessToken: 'hours'
        IdToken: 'hours'
        RefreshToken: 'days'
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: secure-user-pool-domain
      UserPoolId: !Ref CognitoUserPool

Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient
  UserPoolDomain:
    Description: Domain of the Cognito User Pool
    Value: !Ref CognitoUserPoolDomain