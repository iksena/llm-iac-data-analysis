AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon EFS file system with basic configurations
  for a testing environment in the us-east-1a availability zone.

Parameters:
  VpcId:
    Description: The VPC ID where the EFS will be created.
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: The Subnet ID in us-east-1a where the EFS mount target will be created.
    Type: AWS::EC2::Subnet::Id
  SecurityGroupId:
    Description: The Security Group ID to associate with the EFS mount target.
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      Encrypted: true

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref SecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the EFS file system.
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-EFSFileSystemId"

  MountTargetIpAddress:
    Description: The IP address of the EFS mount target.
    Value: !GetAtt MountTarget.IpAddress
    Export:
      Name: !Sub "${AWS::StackName}-EFSMountTargetIpAddress"