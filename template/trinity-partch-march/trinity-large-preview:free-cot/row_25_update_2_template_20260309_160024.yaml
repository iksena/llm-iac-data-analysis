AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - Routes messages from AWS IoT Core to SQS via SNS

Resources:
  IotDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-iot-data-queue'
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30
      MaximumMessageSize: 262144
      DelaySeconds: 0
      ReceiveMessageWaitTimeSeconds: 0
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IotDataDeadLetterQueue.Arn
        maxReceiveCount: 3

  IotDataDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-iot-data-dlq'

  IotDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-iot-data-topic'

  IotDataTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref IotDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sns:Publish
            Resource: !Ref IotDataTopic

  IotDataRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-iot-data-rule-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTLoggingPolicy
      Policies:
        - PolicyName: IotDataRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IotDataTopic

  IotDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub '${AWS::StackName}-iot-data-rule'
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IotDataTopic
              RoleArn: !GetAtt IotDataRuleRole.Arn
        RuleDisabled: false

  IotDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IotDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: sqs:SendMessage
            Resource: !GetAtt IotDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IotDataTopic

Outputs:
  IotDataQueueUrl:
    Description: URL of the IoT Data SQS Queue
    Value: !Ref IotDataQueue
    Export:
      Name: !Sub '${AWS::StackName}-IotDataQueueUrl'

  IotDataQueueArn:
    Description: ARN of the IoT Data SQS Queue
    Value: !GetAtt IotDataQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IotDataQueueArn'

  IotDataTopicArn:
    Description: ARN of the IoT Data SNS Topic
    Value: !Ref IotDataTopic
    Export:
      Name: !Sub '${AWS::StackName}-IotDataTopicArn'