AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  DynamoDBTableName:
    Type: String
    Description: Name of the DynamoDB table
  DynamoDBTableRegion:
    Type: String
    Description: Region where the DynamoDB table is located
  EventBridgeBusName:
    Type: String
    Description: Name of the EventBridge bus
  EventBridgeBusRegion:
    Type: String
    Description: Region where the EventBridge bus is located
  EventBridgePipeSourceARN:
    Type: String
    Description: ARN of the EventBridge source
  EventBridgePipeTargetARN:
    Type: String
    Description: ARN of the EventBridge target
  EventBridgePipeFilterPattern:
    Type: String
    Description: Filter pattern for the EventBridge Pipe

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      Region: !Ref DynamoDBTableRegion
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES

  DynamoDBStream:
    Type: AWS::DynamoDB::Stream
    Properties:
      TableName: !Ref DynamoDBTableName
      StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgeBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: !Ref EventBridgeBusName
      Region: !Ref EventBridgeBusRegion

  EventBridgePipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      SourceArn: !Ref EventBridgePipeSourceARN
      TargetArn: !Ref EventBridgePipeTargetARN
      FilterPattern: !Ref EventBridgePipeFilterPattern
      Description: Pipe to filter DynamoDB stream events and route to EventBridge bus

Outputs:
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  EventBridgePipeStatus:
    Description: Status of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Status