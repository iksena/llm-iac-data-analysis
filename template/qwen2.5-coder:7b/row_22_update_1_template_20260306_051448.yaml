AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table
  AttributeDefinitions:
    Type: List
    Description: The attribute definitions for the table
  KeySchema:
    Type: List
    Description: The key schema for the table
  LocalSecondaryIndexes:
    Type: List
    Description: The local secondary indexes for the table
  GlobalSecondaryIndexes:
    Type: List
    Description: The global secondary indexes for the table

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions: !Ref AttributeDefinitions
      KeySchema: !Ref KeySchema
      LocalSecondaryIndexes: !Ref LocalSecondaryIndexes
      GlobalSecondaryIndexes: !Ref GlobalSecondaryIndexes

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref DynamoDBTable
  TableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn