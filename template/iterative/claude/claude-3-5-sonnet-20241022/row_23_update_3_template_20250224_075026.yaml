AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a DynamoDB table'

Parameters:
  TableName:
    Type: String
    Description: 'Name of the DynamoDB table'
    Default: 'my-dynamodb-table'
  BillingMode:
    Type: String
    Description: 'DynamoDB billing mode'
    Default: 'PAY_PER_REQUEST'
    AllowedValues:
      - 'PROVISIONED'
      - 'PAY_PER_REQUEST'
  ReadCapacityUnits:
    Type: Number
    Description: 'Read capacity units for the table'
    Default: 5
    MinValue: 1
  WriteCapacityUnits:
    Type: Number
    Description: 'Write capacity units for the table'
    Default: 5
    MinValue: 1

Conditions:
  IsProvisionedBilling: !Equals 
    - !Ref BillingMode
    - 'PROVISIONED'

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput: !If
        - IsProvisionedBilling
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table'
    Value: !Ref DynamoDBTable
  TableArn:
    Description: 'ARN of the created DynamoDB table'
    Value: !GetAtt DynamoDBTable.Arn