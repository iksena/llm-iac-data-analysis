AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyDataDogAppBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppBus
      EventSourceName: MyDataDogApp

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: testanu

  DataDogLogDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogDestination
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      ConnectionArn: !GetAtt DataDogConnection.Arn

  EventBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogLogDestination.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyDataDogAppBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogLogDestination.Arn
          Id: DataDogTarget
          RoleArn: !GetAtt EventBridgeExecutionRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusName:
    Description: EventBridge EventBus Name
    Value: !Ref MyDataDogAppBus
  ApiDestinationArn:
    Description: DataDog API Destination ARN
    Value: !GetAtt DataDogLogDestination.Arn
  ConnectionArn:
    Description: DataDog Connection ARN
    Value: !GetAtt DataDogConnection.Arn
  DeadLetterQueueUrl:
    Description: Dead Letter Queue URL
    Value: !Ref DeadLetterQueue