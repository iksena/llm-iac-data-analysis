AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AWS Bedrock Agent with Lambda function for stock price lookup

Parameters:
  ModelId:
    Type: String
    Default: "anthropic.claude-3-sonnet-20240229"
    AllowedValues:
      - "anthropic.claude-3-sonnet-20240229"
      - "anthropic.claude-3-haiku-20240307"
    Description: The foundational model ID to use for the Bedrock Agent

  LambdaRuntime:
    Type: String
    Default: "nodejs20.x"
    AllowedValues:
      - "nodejs20.x"
      - "python3.12"
    Description: The runtime for the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Hard-coded stock price as placeholder
            const stockPrice = 100;
            return {
              statusCode: 200,
              body: JSON.stringify({ price: stockPrice })
            };
          };

  BedrockAgent:
    Type: AWS::AmazonBedrock::Agent
    Properties:
      Name: StockPriceAgent
      Description: Agent for stock price lookup
      AgentType: "AGENT"
      ModelId: !Ref ModelId
      AgentInstructions:
        Content: "You are a stock price lookup assistant. Use the getStockPrice action to retrieve stock prices."
      ActionGroups:
        - Name: StockPriceActions
          Description: Actions for stock price lookup
          Actions:
            - Name: getStockPrice
              Description: Get the current stock price
              Lambda:
                Arn: !GetAtt StockPriceLambdaFunction.Arn
                Payload:
                  Type: "JSON"
                  Content: |
                    {
                      "stockSymbol": "{{StockSymbol}}"
                    }
              InputParameters:
                - Name: StockSymbol
                  Type: "STRING"
                  Description: "The stock symbol to look up"

Outputs:
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn
  BedrockAgentArn:
    Description: The ARN of the Bedrock Agent
    Value: !Ref BedrockAgent