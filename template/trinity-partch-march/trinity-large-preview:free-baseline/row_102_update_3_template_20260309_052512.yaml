AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads

Resources:
  RiskManagementIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt RiskManagementDynamoDBTable.Arn
                  - !Sub '${RiskManagementDynamoDBTable.Arn}/*'
        - PolicyName: SNSTopicPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref RiskManagementSNSTopic

  RiskManagementDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true

  RiskManagementSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: RiskManagementNotifications
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail

  RiskManagementLambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt RiskManagementIAMRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')

          def handler(event, context):
              # Lambda function logic here
              return {
                  'statusCode': 200,
                  'body': json.dumps('Success')
              }
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementDynamoDBTable
          SNS_TOPIC: !Ref RiskManagementSNSTopic

  RiskManagementLambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt RiskManagementIAMRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              # Lambda function logic here
              return {
                  'statusCode': 200,
                  'body': json.dumps('Success')
              }
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementDynamoDBTable
          SNS_TOPIC: !Ref RiskManagementSNSTopic

  RiskManagementSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskManagementSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - sns:Publish
            Resource: !Ref RiskManagementSNSTopic

Outputs:
  LambdaFunction1Arn:
    Value: !GetAtt RiskManagementLambdaFunction1.Arn
  LambdaFunction2Arn:
    Value: !GetAtt RiskManagementLambdaFunction2.Arn
  DynamoDBTableName:
    Value: !Ref RiskManagementDynamoDBTable
  SNSTopicArn:
    Value: !Ref RiskManagementSNSTopic