AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an encrypted One Zone EFS file system in us-east-1a'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EFS file system will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID in us-east-1a where the EFS mount target will be created

  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system

  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VPC.CidrBlock
      Tags:
        - Key: Name
          Value: EFS-SecurityGroup

  EFSKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EFS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EFSKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-efs-key'
      TargetKeyId: !Ref EFSKMSKey

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !Ref EFSKMSKey
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      AvailabilityZoneName: us-east-1a
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'
      BackupPolicy:
        Status: ENABLED

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Join
      - ''
      - - !Ref FileSystem
        - '.efs.'
        - !Ref 'AWS::Region'
        - '.amazonaws.com'

  KMSKeyId:
    Description: ID of the KMS Key used for encryption
    Value: !Ref EFSKMSKey

  MountTargetDNSName:
    Description: DNS name of the Mount Target
    Value: !Join
      - ''
      - - !Ref FileSystem
        - '.efs.'
        - !Ref 'AWS::Region'
        - '.amazonaws.com'