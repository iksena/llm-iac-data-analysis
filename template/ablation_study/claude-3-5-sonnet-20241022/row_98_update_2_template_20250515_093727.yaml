AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for TodoApp Amplify Application'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[A-Za-z0-9-]+'
    ConstraintDescription: Only alphanumeric characters and hyphens are allowed

  RepositoryUrl:
    Type: String
    Description: URL of the source code repository
    Default: https://github.com/username/todo-app
    
  AccessToken:
    Type: String
    Description: Personal access token for repository access
    NoEcho: true

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AppName}-AmplifyRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess-Amplify
      Policies:
        - PolicyName: AmplifyAdditionalPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                Resource: '*'

  AmplifyApp:
    Type: AWS::Amplify::App
    DependsOn: AmplifyRole
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      AccessToken: !Ref AccessToken
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      EnableBranchAutoBuild: true
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: '</^[^.]+$|\\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/'
          Target: '/index.html'
          Status: '200'
      Tags:
        - Key: Environment
          Value: Production
        - Key: Application
          Value: !Ref AppName

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    DependsOn: AmplifyApp
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: production
        - Name: API_ENDPOINT
          Value: ''
      Tags:
        - Key: Environment
          Value: Production
        - Key: Branch
          Value: production

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !Ref AmplifyApp

  AmplifyAppARN:
    Description: Amplify Application ARN
    Value: !GetAtt AmplifyApp.Arn

  AmplifyDefaultDomain:
    Description: Default domain for the Amplify application
    Value: !Sub ${AmplifyApp}.amplifyapp.com

  ProductionBranchURL:
    Description: URL for the production branch
    Value: !Sub https://production.${AmplifyApp}.amplifyapp.com

  AmplifyConsoleURL:
    Description: URL for the Amplify Console
    Value: !Sub https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp}