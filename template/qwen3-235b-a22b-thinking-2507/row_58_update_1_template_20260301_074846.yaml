AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS with monitoring, backups, and performance safeguards'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for EFS mount targets (at least 2 for HA)
  EnableBackup:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable AWS Backup for EFS
  BackupSchedule:
    Type: String
    Default: 'cron(0 5 ? * MON *)'
    AllowedPattern: '^cron\\(\\d+ \\d+ \\? \\* \\S+ \\*\\)$'
    Description: CRON schedule for backups (6-field format)
  BurstCreditThreshold:
    Type: Number
    Default: 100000000
    MinValue: 1000000
    Description: Minimum burst credits before alarm (Bytes)
  ThroughputThreshold:
    Type: Number
    Default: 10000000
    MinValue: 100000
    Description: Maximum throughput threshold (Bytes/s)
  IOThreshold:
    Type: Number
    Default: 500
    MinValue: 10
    Description: Maximum IO operations threshold (Count/s)

Conditions:
  CreateBackupResources: !Equals [!Ref EnableBackup, 'true']

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'
      DeletionPolicy: Retain
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref MountTargetSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs-sg'

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    DependsOn: MountTargetSecurityGroup
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SecurityGroups:
        - !Ref MountTargetSecurityGroup
      SubnetId: !Select [0, !Ref SubnetIds]

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    DependsOn: MountTargetSecurityGroup
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SecurityGroups:
        - !Ref MountTargetSecurityGroup
      SubnetId: !Select [1, !Ref SubnetIds]

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Burst credit balance below threshold
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref BurstCreditThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      DatapointsToAlarm: 1
      Unit: Bytes

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Throughput exceeding threshold
      Namespace: AWS/EFS
      MetricName: Throughput
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref ThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      DatapointsToAlarm: 3
      Unit: Bytes/Second

  IOAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: IO operations exceeding threshold
      Namespace: AWS/EFS
      MetricName: DataReadOperations
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref IOThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      DatapointsToAlarm: 3
      Unit: Count/Second

  BackupServiceRole:
    Condition: CreateBackupResources
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-backup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - efs:DescribeFileSystems
                  - efs:DescribeMountTargets
                  - efs:DescribeTags
                Resource: '*'
              - Effect: Allow
                Action:
                  - efs:CreateFileSystem
                  - efs:CreateMountTarget
                  - efs:CreateTags
                  - efs:DeleteFileSystem
                  - efs:DeleteMountTarget
                  - efs:DeleteTags
                Resource: !Sub 'arn:${AWS::Partition}:efs:${AWS::Region}:${AWS::AccountId}:file-system/*'

  BackupVault:
    Condition: CreateBackupResources
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub '${AWS::StackName}-backup-vault'
      BackupVaultTags:
        - Key: ManagedBy
          Value: CloudFormation

  BackupPlan:
    Condition: CreateBackupResources
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-backup-plan'
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            Lifecycle:
              DeleteAfterDays: 35
      BackupPlanTags:
        - Key: ManagedBy
          Value: CloudFormation

  BackupSelection:
    Condition: CreateBackupResources
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EfsSelection
        IamRoleArn: !GetAtt BackupServiceRole.Arn
        Resources:
          - !Sub 'arn:${AWS::Partition}:efs:${AWS::Region}:${AWS::AccountId}:file-system/${EfsFileSystem}'

Outputs:
  FileSystemId:
    Description: ID of the EFS file system
    Value: !Ref EfsFileSystem
  MountTargetSecurityGroup:
    Description: Security group for EFS mount targets
    Value: !Ref MountTargetSecurityGroup
  BackupPlanArn:
    Condition: CreateBackupResources
    Description: ARN of the backup plan
    Value: !GetAtt BackupPlan.BackupPlanArn
  BurstCreditAlarmArn:
    Description: ARN of burst credit alarm
    Value: !Ref BurstCreditAlarm
  ThroughputAlarmArn:
    Description: ARN of throughput alarm
    Value: !Ref ThroughputAlarm