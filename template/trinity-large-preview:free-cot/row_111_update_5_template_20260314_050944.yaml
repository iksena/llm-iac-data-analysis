AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with DataDog for centralized log forwarding

Parameters:
  DataDogApiKeyName:
    Type: String
    Default: /datadog/api_key
    Description: Name of the SSM Parameter containing the DataDog API key
  EventBusName:
    Type: String
    Default: MyDataDogAppBus
    Description: Name of the EventBridge event bus
  EventSourceName:
    Type: String
    Default: MyDataDogApp
    Description: Source name for events to be captured

Resources:
  DataDogApiSsmParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Ref DataDogApiKeyName
      Type: String
      Value: testanu
      Description: DataDog API key for log ingestion

  EventBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeDataDogExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeInvocationAccess
      Policies:
        - PolicyName: DataDogApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDataDogDeadLetterQueue

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogIngestion
      Description: API destination for DataDog log ingestion
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt EventBridgeConnection.Arn

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: dd-api-key
        ApiKeyValue: '{{resolve:ssm:/datadog/api_key}}'
      Description: Connection for DataDog API
      Name: DataDogConnection

Outputs:
  EventBridgeEventBusArn:
    Description: ARN of the EventBridge event bus
    Value: !GetAtt EventBridgeEventBus.Arn
  EventBridgeApiDestinationArn:
    Description: ARN of the EventBridge API destination
    Value: !GetAtt EventBridgeApiDestination.Arn
  DeadLetterQueueUrl:
    Description: URL of the dead letter queue
    Value: !Ref DeadLetterQueue