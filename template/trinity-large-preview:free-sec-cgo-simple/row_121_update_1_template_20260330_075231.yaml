AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled automation workflow using EventBridge Scheduler and SSM

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  # IAM Role for EC2 instances with SSM and S3 access
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # IAM Role for EventBridge Scheduler
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole

  # S3 Bucket for storing execution logs
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'ssm-automation-logs-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Linux EC2 Instance
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl start amazon-ssm-agent

  # Windows EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          <powershell>
          Install-WindowsFeature -Name "AmazonSSMAgent"
          Start-Service AmazonSSMAgent
          </powershell>

  # SSM Document for cross-platform commands
  HelloWorldDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Cross-platform Hello World automation
        parameters: {}
        mainSteps:
          - name: linuxStep
            action: aws:runShellScript
            inputs:
              runCommand:
                - echo "Hello World!"
            timeoutSeconds: 30
            precondition:
              StringEquals:
                - platformType
                - Linux
          - name: windowsStep
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - Write-Host "Hello World!"
            timeoutSeconds: 30
            precondition:
              StringEquals:
                - platformType
                - Windows

  # SSM Association for targeted instances
  HelloWorldAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: 'ssm-execution-logs'

  # EventBridge Schedule to trigger SSM Association
  HelloWorldSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: HelloWorldSchedule
      Description: Schedule to trigger SSM Hello World automation every 15 minutes
      FlexibleTimeWindow:
        MaximumWindowInMinutes: 60
        Mode: Off
      ScheduleExpression: 'rate(15 minutes)'
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:association/${HelloWorldAssociation}'
        RoleArn: !GetAtt SchedulerRole.Arn
      ScheduleExpressionTimezone: 'UTC'

Outputs:
  LinuxInstanceId:
    Description: Linux Instance ID
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Windows Instance ID
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: S3 Bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: EventBridge Schedule ARN
    Value: !GetAtt HelloWorldSchedule.Arn