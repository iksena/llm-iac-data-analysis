AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready AWS GuardDuty detector for EC2 security monitoring'
Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: SIX_HOURS
    Description: 'Frequency of finding delivery to S3 (FIFTEEN_MINUTES|ONE_HOUR|SIX_HOURS)'
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
Outputs:
  DetectorId:
    Description: 'GuardDuty detector ID for integration with other services'
    Value: !Ref GuardDutyDetector