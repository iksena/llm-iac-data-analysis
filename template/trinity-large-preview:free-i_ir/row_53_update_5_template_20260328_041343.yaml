AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with IAM Role, S3 Bucket, and Auto-Start/Stop Application

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Ref ScriptsBucket
                  - !Sub 'arn:aws:s3:::${ScriptsBucket}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'emr-serverless-scripts-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  EMRServerlessApplication:
    Type: AWS::EMR::Cluster
    Properties:
      Name: EMRServerlessSparkApp
      ReleaseLabel: emr-6.15.0
      Applications:
        - Name: Spark
      Instances:
        MasterInstanceGroup:
          InstanceType: m5.xlarge
          InstanceCount: 1
        CoreInstanceGroup:
          InstanceType: m5.xlarge
          InstanceCount: 2
      VisibleToAllUsers: true
      JobFlowRole: !GetAtt EMRServerlessRole.Arn
      ServiceRole: !GetAtt EMRServerlessRole.Arn
      Configurations:
        - Classification: spark-defaults
          Properties:
            spark.dynamicAllocation.enabled: 'true'
            spark.shuffle.service.enabled: 'true'
            spark.sql.shuffle.partitions: '200'
      AutoScalingPolicy:
        Constraints:
          MinCapacity: 1
          MaxCapacity: 10
        Rules:
          - Name: ScaleOut
            Description: Scale out if YARNMemoryAvailablePercentage is less than 15
            Action:
              SimpleScalingPolicyConfiguration:
                AdjustmentType: CHANGE_IN_CAPACITY
                ScalingAdjustment: 1
                CoolDown: 300
            Trigger:
              CloudWatchAlarmDefinition:
                MetricName: YARNMemoryAvailablePercentage
                Namespace: AWS/ElasticMapReduce
                Statistic: AVERAGE
                Period: 300
                Threshold: 15.0
                ComparisonOperator: LESS_THAN
          - Name: ScaleIn
            Description: Scale in if YARNMemoryAvailablePercentage is greater than 85
            Action:
              SimpleScalingPolicyConfiguration:
                AdjustmentType: CHANGE_IN_CAPACITY
                ScalingAdjustment: -1
                CoolDown: 300
            Trigger:
              CloudWatchAlarmDefinition:
                MetricName: YARNMemoryAvailablePercentage
                Namespace: AWS/ElasticMapReduce
                Statistic: AVERAGE
                Period: 300
                Threshold: 85.0
                ComparisonOperator: GREATER_THAN

Outputs:
  EMRServerlessApplicationArn:
    Description: ARN of the EMR Serverless Application
    Value: !GetAtt EMRServerlessApplication.Arn
  ScriptsBucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref ScriptsBucket