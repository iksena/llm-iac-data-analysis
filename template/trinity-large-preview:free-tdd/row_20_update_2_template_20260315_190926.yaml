AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard and Logs Insights Queries for AWS Client VPN Monitoring

Parameters:
  DashboardName:
    Type: String
    Default: ClientVPNAnalyticsDashboard
    Description: Name of the CloudWatch Dashboard

Resources:
  ClientVPNAnalyticsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Analytics Dashboard"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ConnectionCount", "EndpointId", "endpoint-1" ],
                  [ "AWS/ClientVPN", "ConnectionCount", "EndpointId", "endpoint-2" ]
                ],
                "region": "us-east-1",
                "title": "Endpoint Connection Counts"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "DataIn", "EndpointId", "endpoint-1" ],
                  [ "AWS/ClientVPN", "DataOut", "EndpointId", "endpoint-1" ],
                  [ "AWS/ClientVPN", "DataIn", "EndpointId", "endpoint-2" ],
                  [ "AWS/ClientVPN", "DataOut", "EndpointId", "endpoint-2" ]
                ],
                "region": "us-east-1",
                "title": "Data Transfer Volumes"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationQuery
      LogGroupNames:
        - "/aws/client-vpn/endpoint-1"
        - "/aws/client-vpn/endpoint-2"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection duration/
        | stats avg(duration) as avg_duration, max(duration) as max_duration
        by endpoint_id, user_name

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferQuery
      LogGroupNames:
        - "/aws/client-vpn/endpoint-1"
        - "/aws/client-vpn/endpoint-2"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /data transfer/
        | stats sum(data_in) as total_in, sum(data_out) as total_out
        by endpoint_id, user_name

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityQuery
      LogGroupNames:
        - "/aws/client-vpn/endpoint-1"
        - "/aws/client-vpn/endpoint-2"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /authentication/
        | stats count(*) as auth_count
        by endpoint_id, auth_method, user_name

Outputs:
  CloudWatchDashboard:
    Description: Name of the CloudWatch Dashboard
    Value: !Ref ClientVPNAnalyticsDashboard

  ConnectionDurationQuery:
    Description: ID of the Connection Duration Query
    Value: !GetAtt ConnectionDurationQuery.QueryDefinitionId

  DataTransferQuery:
    Description: ID of the Data Transfer Query
    Value: !GetAtt DataTransferQuery.QueryDefinitionId

  UserActivityQuery:
    Description: ID of the User Activity Query
    Value: !GetAtt UserActivityQuery.QueryDefinitionId