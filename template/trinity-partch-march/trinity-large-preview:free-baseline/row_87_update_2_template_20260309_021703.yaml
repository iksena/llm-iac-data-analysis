AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for Lambda artifacts and a KMS key for encryption

Parameters:
  BucketName:
    Type: String
    Default: lambda-artifacts-public
    Description: Name of the S3 bucket for Lambda artifacts
  ServiceRoleArn:
    Type: String
    Default: ""
    Description: ARN of the service role to import (leave empty if not using)

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${BucketName}/*'

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda artifacts encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow access for Key Administrator
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource*
              - kms:UntagResource*
              - kms:ScheduleKeyDeletion*
              - kms:CancelKeyDeletion*
            Resource: '*'
          - Sid: Allow use of the key
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
          - Sid: Allow attachment of persistent resources
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:CreateGrant*
            Resource: '*'
            Condition:
              Bool:
                kms:GrantIsForAWSResource: true
          - Sid: Allow service role usage
            Effect: Allow
            Principal:
              AWS: !If [HasServiceRole, !Ref ServiceRoleArn, !Ref AWS::NoValue]
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'

  LambdaArtifactsKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKMSKey

  LambdaArtifactsKMSKeyAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaArtifactsKMSKeyAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource*
              - kms:UntagResource*
              - kms:ScheduleKeyDeletion*
              - kms:CancelKeyDeletion*
            Resource: !GetAtt LambdaArtifactsKMSKey.Arn
      Roles:
        - !Sub 'arn:aws:iam::${AWS::AccountId}:root'

  LambdaArtifactsKMSKeyUsagePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaArtifactsKMSKeyUsagePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !GetAtt LambdaArtifactsKMSKey.Arn
      Roles:
        - !Sub 'arn:aws:iam::${AWS::AccountId}:root'

Conditions:
  HasServiceRole: !Not [!Equals [!Ref ServiceRoleArn, ""]]

Outputs:
  BucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
  KMSKeyId:
    Description: ID of the KMS key for Lambda artifacts
    Value: !Ref LambdaArtifactsKMSKey
  KMSKeyAlias:
    Description: Alias of the KMS key for Lambda artifacts
    Value: !Ref LambdaArtifactsKMSKeyAlias