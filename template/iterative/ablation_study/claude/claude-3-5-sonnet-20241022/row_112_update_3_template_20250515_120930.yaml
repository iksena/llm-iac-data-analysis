AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket with SQS notification configuration for object creation events'

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'notification-bucket'
    Description: 'Prefix for the S3 bucket name'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '[a-z0-9-]*'

Resources:
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Queues:
        - !Ref NotificationQueue

  S3Bucket:
    Type: AWS::S3::Bucket
    DependsOn: QueuePolicy
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt NotificationQueue.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  QueueURL:
    Description: URL of the created SQS queue
    Value: !Ref NotificationQueue

  QueueARN:
    Description: ARN of the created SQS queue
    Value: !GetAtt NotificationQueue.Arn