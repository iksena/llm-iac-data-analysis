AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  StreamName:
    Type: String
    Default: kinesis-stream
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours
  ApiName:
    Type: String
    Default: kinesis-api
    Description: Name of the API Gateway

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  KinesisIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListStreams
                Resource: !GetAtt KinesisStream.Arn

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaIAMRole.Arn
      Runtime: nodejs18.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const kinesis = new AWS.Kinesis();
            const response = {
              statusCode: 200,
              body: JSON.stringify('Success'),
            };
            try {
              if (event.httpMethod === 'POST') {
                const body = JSON.parse(event.body);
                const params = {
                  Data: body.data,
                  PartitionKey: body.partitionKey || 'default',
                  StreamName: process.env.STREAM_NAME,
                };
                await kinesis.putRecord(params).promise();
              } else if (event.httpMethod === 'GET') {
                const params = {
                  ShardIteratorType: 'LATEST',
                  StreamName: process.env.STREAM_NAME,
                  ShardId: 'shardId-000000000000',
                };
                const result = await kinesis.getShardIterator(params).promise();
                response.body = JSON.stringify(result);
              }
            } catch (error) {
              response.statusCode = 500;
              response.body = JSON.stringify(error.message);
            }
            return response;
          };
      Environment:
        Variables:
          STREAM_NAME: !Ref StreamName

  LambdaIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListStreams
                Resource: !GetAtt KinesisStream.Arn

  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: API Gateway for Kinesis Data Streams

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: '{proxy+}'

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref APIGatewayResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt LambdaFunction.Arn

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      StageName: prod

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGatewayRestApi}/*/*

Outputs:
  APIGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${APIGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/
  KinesisStreamARN:
    Description: Kinesis Stream ARN
    Value: !GetAtt KinesisStream.Arn