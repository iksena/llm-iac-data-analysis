AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes SQS to API Enrichment Workflow

Resources:
  # SQS Queue as Event Source
  EventSourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgePipeSourceQueue
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30
      MaximumMessageSize: 262144

  # CloudWatch Log Group as Target
  EnrichedDataLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/eventbridge/pipes/enriched-data
      RetentionInDays: 30

  # IAM Role for EventBridge Pipes
  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipesEnrichmentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: SQSAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt EventSourceQueue.Arn
        - PolicyName: CloudWatchLogsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt EnrichedDataLogGroup.Arn

  # EventBridge Pipe
  SQSToAPIPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SQSToAPIPipe
      SourceType: SQS
      SourceParameters:
        QueueParameter:
          QueueARN: !GetAtt EventSourceQueue.Arn
      Enrichment:
        Type: ApiDestination
        Parameters:
          ApiDestinationArn: !Ref APIDestination
          InvocationType: REQUEST_RESPONSE
          HttpMethod: GET
          PathParameterValues:
            - !Select [0, !Split ["-", !Select [1, !Split ["|", !Ref "AWS::StackName"]]]]
      Target:
        Type: CloudWatchLogs
        Parameters:
          LogStreamName: !Sub "enriched-data-${AWS::StackName}"
          LogGroupName: !GetAtt EnrichedDataLogGroup.LogGroupName
      RoleArn: !GetAtt EventBridgePipesRole.Arn

  # API Destination for Zip Code Lookup
  APIDestination:
    Type: AWS::Pipes::ApiDestination
    Properties:
      Name: ZipCodeAPIDestination
      ConnectionArn: !Ref HTTPConnection
      InvocationEndpoint: https://api.zippopotam.us
      HttpMethod: GET
      PathTemplate: /us/{zipcode}

  # HTTP Connection for API Destination
  HTTPConnection:
    Type: AWS::Pipes::Connection
    Properties:
      Name: ZipCodeAPIConnection
      AuthorizationType: NONE
      InvocationHttpParameters:
        PathParameterNames:
          - zipcode