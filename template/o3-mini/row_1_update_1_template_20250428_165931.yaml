AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to create an SNS Topic with an email subscription for test@test.com"

Resources:
  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      DisplayName: "NotificationTopic"
      TopicName: "NotificationTopic"

  SNSSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: email
      Endpoint: "test@test.com"

Outputs:
  SNSTopicArn:
    Description: "ARN of the created SNS Topic"
    Value: !Ref SNSTopic