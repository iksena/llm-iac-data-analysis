AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that creates an S3 bucket with event-driven notifications to an SNS topic.
  When new objects are uploaded to the S3 bucket, an event is triggered to notify the SNS topic.
  
Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3EventNotificationTopic"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: "s3:ObjectCreated:*"
            Topic: !Ref SNSTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: "AllowS3Publish"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "sns:Publish"
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn:
                  Fn::Join:
                    - ""
                    - - "arn:aws:s3:::"
                      - !Ref S3Bucket
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"

Outputs:
  SNSTopicARN:
    Description: "SNS Topic ARN for S3 notifications"
    Value: !Ref SNSTopic
  S3BucketName:
    Description: "S3 Bucket name"
    Value: !Ref S3Bucket