AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a DynamoDB table for mobile notifications reporting'

Parameters:
  TableName:
    Type: String
    Default: MobileNotificationsTable
    Description: Name of the DynamoDB table
    
  TTLAttributeName:
    Type: String
    Default: expiryTime
    Description: Name of the attribute used for TTL expiration
    
  TTLEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether TTL is enabled for the table

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: !Ref TTLEnabled
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: MobileNotifications
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref NotificationsTable
    
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
    
  GSIName:
    Description: Name of the Global Secondary Index
    Value: TypeSentTimeIndex