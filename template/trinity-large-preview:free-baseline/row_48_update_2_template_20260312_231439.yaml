AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure with S3 storage

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'glue-scripts-${AWS::AccountId}-${AWS::Region}'
      Versioning:
        Status: 'Enabled'

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GlueRole-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptBucket}'
                  - !Sub 'arn:aws:s3:::${GlueScriptBucket}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: SampleConvertJob
      Role: !GetAtt GlueRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${GlueScriptBucket}/gue_scripts/sample_convert.py'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': 'python'
        '--job-bookmark-option': 'job-bookmark-disable'
      GlueVersion: '4.0'
      MaxCapacity: 2.0
      Timeout: 60
      Tags:
        Name: Sample Convert Job

Outputs:
  GlueScriptBucketName:
    Description: Name of the S3 bucket for Glue scripts
    Value: !Ref GlueScriptBucket
  GlueETLJobName:
    Description: Name of the created Glue ETL job
    Value: !Ref GlueETLJob