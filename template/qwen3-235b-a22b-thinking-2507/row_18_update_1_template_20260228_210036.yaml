AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  TableName:
    Type: String
    Default: UsersTable
    Description: Name of the DynamoDB table to monitor
  FilterSuffix:
    Type: String
    Default: ".png"
    Description: Suffix to filter avatar URLs (e.g., .png, .jpg)
  DetailType:
    Type: String
    Default: UserAvatarUpdate
    Description: DetailType value for EventBridge events
  Source:
    Type: String
    Default: com.example.user-service
    Description: Source value for EventBridge events
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE
  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipeExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: AvatarUpdatePipe
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      RoleArn: !GetAtt PipeRole.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          FilterCriteria:
            Filters:
              - Pattern: !Sub '{"dynamodb":{"NewImage":{"avatarUrl":{"S":[{"suffix":"${FilterSuffix}"}]}}}}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: !Ref DetailType
          Source: !Ref Source
Outputs:
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !Ref EventBridgePipe
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: ARN of the DynamoDB Stream
    Value: !GetAtt DynamoDBTable.StreamArn
  FilterSuffixUsed:
    Description: Suffix pattern used for filtering
    Value: !Ref FilterSuffix