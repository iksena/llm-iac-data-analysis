AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled automation workflow with EventBridge Scheduler and SSM

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
  LinuxAMI:
    Description: Amazon Linux 2 AMI ID
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  WindowsAMI:
    Description: Windows Server 2022 AMI ID
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:CreateAssociation
                Resource: "*"

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: LinuxInstance
        - Key: HelloWorld
          Value: "true"
      UserData: |
        #!/bin/bash
        yum install -y amazon-ssm-agent
        systemctl start amazon-ssm-agent
        systemctl enable amazon-ssm-agent

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: WindowsInstance
        - Key: HelloWorld
          Value: "true"

  LinuxSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Hello World for Linux
        mainSteps:
          - action: aws:runShellScript
            name: HelloWorldLinux
            inputs:
              runCommand:
                - echo "Hello World from Linux!"

  WindowsSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Hello World for Windows
        mainSteps:
          - action: aws:runPowerShellScript
            name: HelloWorldWindows
            inputs:
              runCommand:
                - Write-Output "Hello World from Windows!"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref LinuxSSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - "true"
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-output

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub '${AWS::StackName}-SSMExecutionSchedule'
      ScheduleExpression: rate(15 minutes)
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}'
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        Input: !Sub |
          {
            "DocumentName": "${LinuxSSMDocument}",
            "Targets": [{
              "Key": "tag:HelloWorld",
              "Values": ["true"]
            }]
          }
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 3

Outputs:
  LinuxInstanceId:
    Description: Linux EC2 instance ID
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Windows EC2 instance ID
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: S3 log bucket name
    Value: !Ref LogBucket
  ScheduleARN:
    Description: EventBridge Schedule ARN
    Value: !GetAtt EventBridgeSchedule.Arn