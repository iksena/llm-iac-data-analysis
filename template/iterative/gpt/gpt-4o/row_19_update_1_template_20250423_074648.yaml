AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  MyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: MyApiConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: MyApiKey
          ApiKeyValue: 'YourSecureApiKeyValue' # Replace with a secure value

  MyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MyApiDestination
      ConnectionArn: !GetAtt MyConnection.Arn
      InvocationEndpoint: 'https://webhook.site/testtest'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge event bus
    Value: !GetAtt MyEventBus.Arn

  ApiDestinationArn:
    Description: The ARN of the API destination
    Value: !GetAtt MyApiDestination.Arn

  ConnectionArn:
    Description: The ARN of the connection
    Value: !GetAtt MyConnection.Arn