AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS Resource Group using tag-based filters
  to include instances from services like EC2, RDS, SageMaker, and SSM.

Parameters:
  TagKey:
    Description: The key of the tag used to filter resources.
    Type: String
    Default: 'Environment'
  TagValue:
    Description: The value of the tag used to filter resources.
    Type: String
    Default: 'Production'

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties: 
      Name: MyResourceGroup
      Description: Resource Group for managing resources tagged with specific key-value pairs.
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::ManagedInstance
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue

Outputs:
  ResourceGroupName:
    Description: The name of the created Resource Group.
    Value: !GetAtt ResourceGroup.Name
```