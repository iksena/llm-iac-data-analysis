AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Config setup with customizable retention policies and delivery configurations

Parameters:
  S3BucketName:
    Type: String
    Default: config-bucket
    Description: Name of the S3 bucket for configuration snapshots
  SnsTopicName:
    Type: String
    Default: config-topic
    Description: Name of the SNS topic for notifications
  RetentionPeriod:
    Type: Number
    Default: 2557
    Description: Retention period in days (default: 2557 days)
  DeliveryFrequency:
    Type: String
    Default: One_Hour
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
    Description: Delivery frequency for configuration snapshots
  EnableIAMPermissionBoundaries:
    Type: Boolean
    Default: false
    Description: Enable IAM permission boundaries for AWS Config
  ExistingS3Bucket:
    Type: Boolean
    Default: false
    Description: Use existing S3 bucket instead of creating a new one
  ExistingSNSTopic:
    Type: Boolean
    Default: false
    Description: Use existing SNS topic instead of creating a new one

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Condition: NotExistingS3Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ConfigRetention
            Status: Enabled
            ExpirationInDays: !Ref RetentionPeriod

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: NotExistingS3Bucket
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt S3Bucket.Arn
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${S3Bucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  SNSTopic:
    Type: AWS::SNS::Topic
    Condition: NotExistingSNSTopic
    Properties:
      TopicName: !Ref SnsTopicName

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: NotExistingSNSTopic
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ConfigRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If
        - EnableIAMPermissionBoundaries
        - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/PermissionBoundary'
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSConfigRole
      Policies:
        - PolicyName: ConfigPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: !GetAtt S3Bucket.Arn
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${S3Bucket.Arn}/AWSLogs/${AWS::AccountId}/*'
                Condition:
                  StringEquals:
                    s3:x-amz-acl: bucket-owner-full-control
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SNSTopic

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: ConfigRecorder
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true
      RoleARN: !GetAtt ConfigRole.Arn

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    DependsOn: ConfigRecorder
    Properties:
      name: ConfigDeliveryChannel
      s3BucketName: !If
        - ExistingS3Bucket
        !Ref S3BucketName
        - !Ref S3Bucket
      snsTopicARN: !If
        - ExistingSNSTopic
        !Ref SNSTopic
        - !Ref SNSTopic
      configSnapshotDeliveryProperties:
        deliveryFrequency: !Ref DeliveryFrequency

  RetentionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RetentionLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If
        - EnableIAMPermissionBoundaries
        - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/PermissionBoundary'
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3LifecyclePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketLifecycleConfiguration
                  - s3:GetBucketLifecycleConfiguration
                Resource: !If
                  - ExistingS3Bucket
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
                  - !GetAtt S3Bucket.Arn

  RetentionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ConfigRetentionManager
      Handler: index.lambda_handler
      Role: !GetAtt RetentionLambdaRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              s3_client = boto3.client('s3')
              bucket_name = event['ResourceProperties']['BucketName']
              retention_days = event['ResourceProperties']['RetentionDays']

              try:
                  lifecycle_config = {
                      'Rules': [{
                          'ID': 'ConfigRetention',
                          'Status': 'Enabled',
                          'Expiration': {
                              'Days': retention_days
                          }
                      }]
                  }

                  s3_client.put_bucket_lifecycle_configuration(
                      Bucket=bucket_name,
                      LifecycleConfiguration=lifecycle_config
                  )

                  return {
                      'Status': 'SUCCESS',
                      'PhysicalResourceId': bucket_name,
                      'Data': {
                          'Message': f'Successfully set retention period to {retention_days} days'
                      }
                  }
              except ClientError as e:
                  return {
                      'Status': 'FAILED',
                      'PhysicalResourceId': bucket_name,
                      'Data': {
                          'Message': str(e)
                      }
                  }

  RetentionCustomResource:
    Type: Custom::RetentionManager
    Properties:
      ServiceToken: !GetAtt RetentionLambdaFunction.Arn
      BucketName: !If
        - ExistingS3Bucket
        !Ref S3BucketName
        - !Ref S3Bucket
      RetentionDays: !Ref RetentionPeriod

Conditions:
  NotExistingS3Bucket: !Not [Condition: ExistingS3Bucket]
  NotExistingSNSTopic: !Not [Condition: ExistingSNSTopic]

Outputs:
  ConfigRecorderName:
    Description: AWS Config Recorder Name
    Value: !Ref ConfigRecorder
  DeliveryChannelName:
    Description: AWS Config Delivery Channel Name
    Value: !Ref ConfigDeliveryChannel
  S3BucketName:
    Description: S3 Bucket Name
    Value: !If
      - ExistingS3Bucket
      !Ref S3BucketName
      - !Ref S3Bucket
  SNSTopicARN:
    Description: SNS Topic ARN
    Value: !If
      - ExistingSNSTopic
      !Ref SNSTopic
      - !Ref SNSTopic
  LambdaFunctionName:
    Description: Lambda Function Name
    Value: !Ref RetentionLambdaFunction