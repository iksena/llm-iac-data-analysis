AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-region Application Failover Architecture using Route 53 Application Recovery Controller

Parameters:
  RecoveryClusterName:
    Type: String
    Default: my-recovery-cluster
    Description: Name of the recovery cluster
  ControlPanelName:
    Type: String
    Default: my-control-panel
    Description: Name of the control panel
  RoutingControl1Name:
    Type: String
    Default: region-1-routing-control
    Description: Name of the first routing control
  RoutingControl2Name:
    Type: String
    Default: region-2-routing-control
    Description: Name of the second routing control
  SafetyRuleName:
    Type: String
    Default: at-least-one-active
    Description: Name of the safety rule
  HealthCheck1Name:
    Type: String
    Default: region-1-health-check
    Description: Name of the first health check
  HealthCheck2Name:
    Type: String
    Default: region-2-health-check
    Description: Name of the second health check

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Ref RecoveryClusterName

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Ref ControlPanelName
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControl1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Ref RoutingControl1Name
      ControlPanelArn: !GetAtt ControlPanel.Arn

  RoutingControl2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Ref RoutingControl2Name
      ControlPanelArn: !GetAtt ControlPanel.Arn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Ref SafetyRuleName
      ControlPanelArn: !GetAtt ControlPanel.Arn
      RuleConfig:
        RuleType: ATLEAST
        Threshold: 1
      GatingControls:
        - !Ref RoutingControl1
        - !Ref RoutingControl2

  HealthCheck1:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      Name: !Ref HealthCheck1Name
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region-1.com
        Port: 443
      RoutingControlArn: !GetAtt RoutingControl1.Arn

  HealthCheck2:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      Name: !Ref HealthCheck2Name
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region-2.com
        Port: 443
      RoutingControlArn: !GetAtt RoutingControl2.Arn

Outputs:
  ClusterArn:
    Description: ARN of the recovery cluster
    Value: !GetAtt RecoveryCluster.Arn
  ControlPanelArn:
    Description: ARN of the control panel
    Value: !GetAtt ControlPanel.Arn
  RoutingControl1Arn:
    Description: ARN of the first routing control
    Value: !GetAtt RoutingControl1.Arn
  RoutingControl2Arn:
    Description: ARN of the second routing control
    Value: !GetAtt RoutingControl2.Arn