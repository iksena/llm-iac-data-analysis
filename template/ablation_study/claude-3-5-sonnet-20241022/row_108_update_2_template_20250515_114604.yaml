AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Cognito User Pool with admin-managed user provisioning'

Parameters:
  UserPoolName:
    Type: String
    Description: Name of the Cognito User Pool
    Default: 'SecureUserPool'

  DomainPrefix:
    Type: String
    Description: Prefix for the Cognito domain (must be unique)
    AllowedPattern: '^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$'
    ConstraintDescription: Domain prefix must contain only lowercase letters, numbers, and hyphens

  ClientName:
    Type: String
    Description: Name of the Cognito User Pool Client
    Default: 'DefaultClient'

Resources:
  CognitoUserPool:
    Type: 'AWS::Cognito::UserPool'
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      EmailVerificationMessage: 'Your verification code is {####}'
      EmailVerificationSubject: 'Verify your email'
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UsernameAttributes:
        - email
      UserPoolTags:
        Environment: Production

  UserPoolDomain:
    Type: 'AWS::Cognito::UserPoolDomain'
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref CognitoUserPool

  UserPoolClient:
    Type: 'AWS::Cognito::UserPoolClient'
    Properties:
      ClientName: !Ref ClientName
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - 'https://example.com/callback'
      LogoutURLs:
        - 'https://example.com/logout'
      SupportedIdentityProviders:
        - COGNITO

  AdminGroup:
    Type: 'AWS::Cognito::UserPoolGroup'
    Properties:
      GroupName: Administrators
      UserPoolId: !Ref CognitoUserPool
      Description: Administrator group
      Precedence: 1

Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref CognitoUserPool

  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref UserPoolClient

  UserPoolDomainName:
    Description: Domain name for hosted UI
    Value: !Sub ${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com

  HostedUIURL:
    Description: URL for the hosted UI login page
    Value: !Sub https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/login