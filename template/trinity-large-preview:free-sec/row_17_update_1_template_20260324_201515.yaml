AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alarm Notifications
      TopicName: BillingAlarmTopic

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: xxxxx@gmail.com
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm5
      AlarmDescription: Billing alarm for $5 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: USD

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm10
      AlarmDescription: Billing alarm for $10 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: USD

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm20
      AlarmDescription: Billing alarm for $20 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: USD

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm40
      AlarmDescription: Billing alarm for $40 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 40
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: USD

Outputs:
  BillingAlarmTopicArn:
    Description: ARN of the billing alarm SNS topic
    Value: !Ref BillingAlarmTopic