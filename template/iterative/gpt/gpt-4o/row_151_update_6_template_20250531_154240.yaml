AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy an AWS Bedrock Agent integrated with a Lambda function for stock price lookup.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"stockPrice": 100}
      Runtime: python3.12
      Timeout: 10

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: StockPriceAgent
      ActionGroupName: StockPriceActionGroup
      LambdaArn: !GetAtt StockPriceLambdaFunction.Arn
      Parameters:
        - Name: stockSymbol
          Type: String

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn

  BedrockAgentId:
    Description: ID of the Bedrock Agent
    Value: !Ref BedrockAgent

  BedrockAgentActionGroupName:
    Description: Name of the Bedrock Agent Action Group
    Value: StockPriceActionGroup