AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table with local and global secondary indexes

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: Billing mode for the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units for PROVISIONED billing mode
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for PROVISIONED billing mode

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: S
        - AttributeName: Status
          AttributeType: S
        - AttributeName: ProductId
          AttributeType: S
      ProvisionedThroughput:
        Fn::If:
          - IsProvisioned
          - ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - Ref: AWS::NoValue
      LocalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: UserId
              KeyType: HASH
            - AttributeName: Status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: ProductIndex
          KeySchema:
            - AttributeName: ProductId
              KeyType: HASH
            - AttributeName: Status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            Fn::If:
              - IsProvisioned
              - ReadCapacityUnits: !Ref ReadCapacityUnits
                WriteCapacityUnits: !Ref WriteCapacityUnits
              - Ref: AWS::NoValue

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, "PROVISIONED"]