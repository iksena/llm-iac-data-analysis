AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with S3, DynamoDB, and EC2

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties: {}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: t2.micro
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: my-key-pair
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd php php-cli php-common php-mbstring php-xml php-zip php-json php-curl php-gd php-intl php-mcrypt php-pear php-soap php-xmlrpc php-zip php-devel php-pecl-apcu php-pecl-apcu-bc php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-ap