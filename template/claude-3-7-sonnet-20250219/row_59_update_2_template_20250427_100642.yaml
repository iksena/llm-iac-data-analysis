AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with CloudWatch Alarms'

Parameters:
  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: MyKinesisStream
    
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    Default: 1
    MinValue: 1
    MaxValue: 200
    
  RetentionPeriod:
    Type: Number
    Description: Data retention period in hours
    Default: 24
    MinValue: 24
    MaxValue: 168
    
  AlertEmail:
    Type: String
    Description: Email address to receive alerts
    
  ReadIteratorAgeThreshold:
    Type: Number
    Description: Threshold for iterator age in milliseconds
    Default: 30000
    
  AlarmEvaluationPeriods:
    Type: Number
    Description: Number of periods to evaluate for alarm condition
    Default: 2
    
  AlarmPeriod:
    Type: Number
    Description: Period in seconds for alarm evaluation
    Default: 300

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis
      Tags:
        - Key: Name
          Value: !Ref KinesisStreamName

  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub "${KinesisStreamName}-Alerts"
      TopicName: !Sub "${KinesisStreamName}-Alerts"

  AlertSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlertSNSTopic

  ReadThroughputExceededAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${KinesisStreamName}-ReadThroughputExceeded"
      AlarmDescription: "Alarm when read throughput exceeds provisioned capacity"
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStreamName
      Statistic: Average
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSNSTopic
      OKActions:
        - !Ref AlertSNSTopic

  WriteThroughputExceededAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${KinesisStreamName}-WriteThroughputExceeded"
      AlarmDescription: "Alarm when write throughput exceeds provisioned capacity"
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStreamName
      Statistic: Average
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSNSTopic
      OKActions:
        - !Ref AlertSNSTopic

  IteratorAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${KinesisStreamName}-HighIteratorAge"
      AlarmDescription: "Alarm when iterator age exceeds threshold, indicating potential processing delays"
      Namespace: AWS/Kinesis
      MetricName: GetRecords.IteratorAgeMilliseconds
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStreamName
      Statistic: Maximum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref ReadIteratorAgeThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertSNSTopic
      OKActions:
        - !Ref AlertSNSTopic

Outputs:
  KinesisStreamARN:
    Description: ARN of the created Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn
    
  KinesisStreamName:
    Description: Name of the created Kinesis Data Stream
    Value: !Ref KinesisDataStream
    
  SNSTopicARN:
    Description: ARN of the created SNS Topic for alerts
    Value: !Ref AlertSNSTopic