AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instances Managed by AWS Systems Manager with Auto Scaling Groups

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 1
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2
  KeyPairName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SSM-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SSM-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: SSM-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: SSM-PublicSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access and SSM
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSM-SG

  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Tags:
        - Key: Name
          Value: SSM-Role

  LinuxLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: LinuxSSMInstance
      LaunchTemplateData:
        ImageId:
          Fn::Join:
            - ''
            - - 'arn:'
              - Fn::Select:
                  - 1
                  - Fn::Split:
                      - ':'
                      - Fn::FindInMap:
                          - AWSRegionArch2AMI
                          - !Ref 'AWS::Region'
                          - 'Linux'
              - ':ssm:'
              - Fn::Select:
                  - 0
                  - Fn::GetAZs: !Ref 'AWS::Region'
              - ':parameter/amzn2-ami-kernel-5.10-hvm-2.0.*'
        InstanceType: t3.micro
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - !Ref SecurityGroup
        IamInstanceProfile:
          Name: !Ref SSMRole
        UserData:
          Fn::Base64:
            Fn::Join:
              - ''
              - - '#!/bin/bash -xe\n'
                - 'yum update -y\n'
                - 'amazon-linux-extras install -y amazon-ssm-agent\n'
                - 'systemctl enable amazon-ssm-agent\n'
                - 'systemctl start amazon-ssm-agent\n'
                - 'yum install -y httpd\n'
                - 'systemctl start httpd\n'
                - 'systemctl enable httpd\n'
                - 'echo "Hello World from Linux instance" > /var/www/html/index.html\n'

  WindowsLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: WindowsSSMInstance
      LaunchTemplateData:
        ImageId:
          Fn::Join:
            - ''
            - - 'arn:'
              - Fn::Select:
                  - 1
                  - Fn::Split:
                      - ':'
                      - Fn::FindInMap:
                          - AWSRegionArch2AMI
                          - !Ref 'AWS::Region'
                          - 'Windows'
              - ':ssm:'
              - Fn::Select:
                  - 0
                  - Fn::GetAZs: !Ref 'AWS::Region'
              - ':parameter/windows-ami-2.*'
        InstanceType: t3.micro
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - !Ref SecurityGroup
        IamInstanceProfile:
          Name: !Ref SSMRole
        UserData:
          Fn::Base64:
            Fn::Join:
              - ''
              - - '<powershell>\n'
                - 'Install-WindowsFeature -Name Web-Server -IncludeManagementTools\n'
                - 'echo "Hello World from Windows instance" > C:\\inetpub\\wwwroot\\Default.htm\n'
                - '</powershell>\n'

  LinuxAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref LinuxLaunchTemplate
        Version: !GetAtt LinuxLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      TargetGroupARNs: []
      Tags:
        - Key: Name
          Value: Linux-SSM-ASG
          PropagateAtLaunch: true

  WindowsAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref WindowsLaunchTemplate
        Version: !GetAtt WindowsLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      TargetGroupARNs: []
      Tags:
        - Key: Name
          Value: Windows-SSM-ASG
          PropagateAtLaunch: true

Mappings:
  AWSRegionArch2AMI:
    Linux:
      '64': 'arn:aws:ssm::us-east-1:parameter/amzn2-ami-kernel-5.10-hvm-2.0.*'
    Windows:
      '64': 'arn:aws:ssm::us-east-1:parameter/windows-ami-2.*'