AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access) via CloudTrail, EventBridge, and SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique lowercase S3 bucket name for CloudTrail logs (create before deploy).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[