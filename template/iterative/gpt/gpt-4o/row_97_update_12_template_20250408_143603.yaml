AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a serverless pipeline for AWS Organization data collection and analysis.

Parameters:
  S3BucketName:
    Type: String
    Description: The name of the S3 bucket to store organizational data.
    Default: my-default-org-data-bucket
  ManagementAccountId:
    Type: String
    Description: The AWS Account ID of the management account.
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: The name of the Athena database for querying the data.

Resources:
  OrganizationDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub arn:aws:iam::${ManagementAccountId}:role/OrganizationReadRole
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${S3BucketName}/*

  OrganizationDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: !Sub |
          import boto3
          import json
          def handler(event, context):
              client = boto3.client('organizations')
              response = client.list_accounts()
              s3_client = boto3.client('s3')
              s3_client.put_object(
                  Bucket='${S3BucketName}',
                  Key='organization_data.json',
                  Body=json.dumps(response)
              )
      Runtime: python3.12
      Timeout: 300

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OrganizationDataLambda
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OrganizationDataEventRule.Arn

  OrganizationDataEventRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn: !GetAtt OrganizationDataLambda.Arn
          Id: TargetFunction

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::${S3BucketName}/*

  OrganizationDataCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub s3://${S3BucketName}/
      Schedule:
        ScheduleExpression: cron(0 0 ? * 1 *)

Outputs:
  S3BucketArn:
    Description: The ARN of the S3 bucket.
    Value: !GetAtt OrganizationDataBucket.Arn

  LambdaFunctionArn:
    Description: The ARN of the Lambda function.
    Value: !GetAtt OrganizationDataLambda.Arn

  GlueCrawlerName:
    Description: The name of the Glue crawler.
    Value: !Ref OrganizationDataCrawler

  AthenaDatabaseName:
    Description: The name of the Athena database.
    Value: !Ref AthenaDatabaseName

  LambdaExecutionRoleArn:
    Description: The ARN of the Lambda execution role.
    Value: !GetAtt LambdaExecutionRole.Arn

  GlueServiceRoleArn:
    Description: The ARN of the Glue service role.
    Value: !GetAtt GlueServiceRole.Arn