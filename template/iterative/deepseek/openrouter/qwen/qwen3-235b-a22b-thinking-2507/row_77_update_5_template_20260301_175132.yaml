AWSTemplateFormatVersion: '2010-09-09'
Description: 'Environment-specific DynamoDB tables for supporter product data'
Parameters:
  Stage:
    Type: String
    Description: 'Deployment environment (PROD or CODE)'
    AllowedValues:
      - PROD
      - CODE
    Default: CODE
Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']
Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      ProvisionedThroughput: !If
        - IsProd
        - 
          ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Backup
          Value: 'true'
        - Key: Application
          Value: SupporterProductData
  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAutoScaling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateTable
                  - dynamodb:DescribeTable
                Resource: !GetAtt SupporterProductDataTable.Arn
              - Effect: Allow
                Action:
                  - application-autoscaling:*
                Resource: '*'
  WriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub 'table/SupporterProductData-${Stage}'
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb
  WriteCapacityScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteCapacityScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref SupporterProductDataTable
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt SupporterProductDataTable.Arn
  AutoScalingPolicyName:
    Description: Name of the write capacity scaling policy (PROD only)
    Value: !Ref WriteCapacityScalingPolicy
    Condition: IsProd