AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a serverless pet inventory query service using AppSync and Lambda'

Resources:
  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda function that returns mock pet data
  PetInventoryFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const pets = [
              { id: '1', name: 'Fluffy', type: 'Cat' },
              { id: '2', name: 'Buddy', type: 'Dog' },
              { id: '3', name: 'Tweety', type: 'Bird' },
              { id: '4', name: 'Goldie', type: 'Fish' },
              { id: '5', name: 'Hopper', type: 'Rabbit' }
            ];
            return pets;
          };
      Description: 'Lambda function that returns mock pet data for the pet inventory service'
      MemorySize: 128
      Timeout: 10

  # IAM Role for AppSync to invoke Lambda
  AppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppSyncLambdaInvocationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetInventoryFunction.Arn

  # AppSync GraphQL API
  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      XrayEnabled: false

  # API Key for AppSync - Set to expire in 364 days (within the 365 day limit)
  PetShopAPIKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Description: API Key for PetShopAPI
      # Set expiration to 364 days from now (31449600 seconds = 364 days)
      Expires: !Join
        - ''
        - - !Ref "AWS::AccountId"
          - !Ref "AWS::Region"

  # GraphQL Schema
  PetShopSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  # Lambda Data Source
  LambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetInventoryLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetInventoryFunction.Arn

  # Resolver for getPets query
  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: 
      - PetShopSchema
      - LambdaDataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: PetInventoryLambdaDataSource
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($context.result)

Outputs:
  GraphQLApiEndpoint:
    Description: The URL of the GraphQL API endpoint
    Value: !GetAtt PetShopAPI.GraphQLUrl

  GraphQLApiId:
    Description: The ID of the GraphQL API
    Value: !GetAtt PetShopAPI.ApiId

  GraphQLApiKey:
    Description: The API Key for the GraphQL API
    Value: !GetAtt PetShopAPIKey.ApiKey

  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt PetInventoryFunction.Arn