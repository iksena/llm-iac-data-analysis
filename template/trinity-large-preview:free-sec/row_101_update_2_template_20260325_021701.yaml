AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with Flow Logging to S3 Bucket

Parameters:
  LogFilePrefix:
    Type: String
    Default: vpc-flow-logs/
    Description: Optional prefix for organizing flow log files in S3 bucket

Resources:
  VPCFlowLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref VPCFlowLogBucket
        LogPrefix: access-logs/

  VPCFlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogBucket
      PolicyDocument:
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${VPCFlowLogBucket}/${LogFilePrefix}AWSLogs/*/vpcflowlogs/*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: s3
      LogDestination: !Sub 'arn:${AWS::Partition}:s3:::${VPCFlowLogBucket}/${LogFilePrefix}'
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'
      MaxAggregationInterval: 600

Outputs:
  FlowLogBucketName:
    Description: S3 bucket name for VPC flow logs
    Value: !Ref VPCFlowLogBucket
    Export:
      Name: VPCFlowLogBucketName