AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Ephemeral Drives and SSH Key Pair

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type

  SSHKeyName:
    Type: String
    Default: my-key-pair
    Description: Name of the SSH key pair to create

  VolumeSize:
    Type: Number
    Default: 8
    Description: Size of ephemeral volumes in GB

Resources:
  SSHKey:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref SSHKeyName
      KeyType: rsa

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      KeyName: !Ref SSHKeyName
      BlockDeviceMappings:
        - DeviceName: /dev/xvdb
          Ebs:
            VolumeType: gp2
            VolumeSize: !Ref VolumeSize
            DeleteOnTermination: true
        - DeviceName: /dev/xvdc
          Ebs:
            VolumeType: gp2
            VolumeSize: !Ref VolumeSize
            DeleteOnTermination: true
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !ImportValue DefaultSubnetID
          GroupSet:
            - !ImportValue DefaultSecurityGroupID

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicIP:
    Description: Public IP address
    Value: !GetAtt EC2Instance.PublicIp
  SSHKeyName:
    Description: SSH Key Pair Name
    Value: !Ref SSHKeyName