AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization or single-account access control

Parameters:
  OrganizationId:
    Type: String
    Default: ''
    Description: AWS Organization ID for enterprise-wide access (leave empty for single-account access)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
              StringEqualsIfExists:
                aws:PrincipalOrgID: !Ref OrganizationId

Outputs:
  BucketDomainName:
    Description: S3 Bucket Domain Name
    Value: !GetAtt S3Bucket.DomainName
  BucketWebsiteURL:
    Description: S3 Bucket Website URL (if configured)
    Value: !GetAtt S3Bucket.WebsiteURL