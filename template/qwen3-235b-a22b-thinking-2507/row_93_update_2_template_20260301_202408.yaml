AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Description: VPC ID to deploy resources into
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: Subnet ID for EC2 instance placement
    Type: AWS::EC2::Subnet::Id
  SSHLocation:
    Description: CIDR for SSH access (restrict in production!)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR range
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
Mappings:
  AWSRegion2AMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0d47a841fb19e3038
    us-west-1:
      AMI: ami-04b6c97a09140668f
    us-west-2:
      AMI: ami-09e1df5d1e3614dc6
    ap-south-1:
      AMI: ami-0470e33cd681b2474
    ap-northeast-1:
      AMI: ami-0d2a9b67c3341f4b2
    ap-southeast-1:
      AMI: ami-0c66885292ff5bf07
    ap-southeast-2:
      AMI: ami-0a3c0f96cf98ebf89
    eu-central-1:
      AMI: ami-05c7eb2be9949c767
    eu-west-1:
      AMI: ami-0c9511e36e0d67c78
    eu-west-2:
      AMI: ami-05a53c2e0d4a4e1c1
    eu-west-3:
      AMI: ami-0f52a2a1c8a1439f2
Resources:
  NginxLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt NginxLogsBucket.Arn
                  - !Sub "${NginxLogsBucket.Arn}/*"
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTP access and restricted SSH
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegion2AMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      SubnetId: !Ref SubnetId
      Monitoring: true
      Tags:
        - Key: Nginx
          Value: installed
  SSMNginxAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      AssociationName: nginx-installation
      Targets:
        - Key: tag:Nginx
          Values: [installed]
      Parameters:
        commands:
          - !Sub
            - "#!/bin/bash\nsudo amazon-linux-extras install -y nginx1\nsudo systemctl start nginx\nsudo systemctl enable nginx\nif ! command -v aws &> /dev/null; then\n  sudo yum install -y aws-cli\nfi\nLOG_DIR=/var/log/nginx\nBUCKET_NAME=${BucketName}\nUPLOAD_SCRIPT=/usr/local/bin/upload_nginx_logs.sh\ncat << 'EOF' > \\$UPLOAD_SCRIPT\n#!/bin/bash\naws s3 sync \\$LOG_DIR s3://\\$BUCKET_NAME/nginx-logs/ --delete\nEOF\nchmod +x \\$UPLOAD_SCRIPT\n(crontab -l 2>/dev/null | grep -v 'upload_nginx_logs.sh' || true; echo \"0 * * * * \\$UPLOAD_SCRIPT\") | crontab -"
            - BucketName: !Ref NginxLogsBucket
Outputs:
  InstanceURL:
    Description: Public URL of Nginx server
    Value: !Sub "http://${EC2Instance.PublicDnsName}"
    Export:
      Name: !Sub "${AWS::StackName}-InstanceURL"
  LogBucketName:
    Description: S3 bucket for centralized logs
    Value: !Ref NginxLogsBucket
    Export:
      Name: !Sub "${AWS::StackName}-LogBucketName"
  SSMAssociationId:
    Description: SSM association identifier
    Value: !Ref SSMNginxAssociation
    Export:
      Name: !Sub "${AWS::StackName}-SSMAssociationId"