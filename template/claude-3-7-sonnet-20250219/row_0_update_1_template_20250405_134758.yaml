AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an AWS SQS queue with basic configuration'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    Default: MyQueue
  
  MessageRetentionPeriod:
    Type: Number
    Description: The number of seconds that Amazon SQS retains a message (60 seconds to 14 days)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  
  VisibilityTimeout:
    Type: Number
    Description: The visibility timeout for the queue in seconds
    Default: 30
    MinValue: 0
    MaxValue: 43200
  
  EnableDeadLetterQueue:
    Type: String
    Description: Whether to create a dead-letter queue
    Default: true
    AllowedValues:
      - true
      - false
  
  MaxReceiveCount:
    Type: Number
    Description: Maximum number of times a message can be received before being sent to the dead-letter queue
    Default: 5
    MinValue: 1
    MaxValue: 1000
  
  EnableEncryption:
    Type: String
    Description: Whether to enable server-side encryption for the queue
    Default: true
    AllowedValues:
      - true
      - false

Conditions:
  CreateDeadLetterQueue: !Equals [!Ref EnableDeadLetterQueue, 'true']
  EnableSQSEncryption: !Equals [!Ref EnableEncryption, 'true']

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Condition: CreateDeadLetterQueue
    Properties:
      QueueName: !Sub '${QueueName}-DLQ'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      KmsMasterKeyId: !If [EnableSQSEncryption, 'alias/aws/sqs', !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: !Sub '${QueueName}-DLQ'
        - Key: Environment
          Value: Production

  MainQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      KmsMasterKeyId: !If [EnableSQSEncryption, 'alias/aws/sqs', !Ref 'AWS::NoValue']
      RedrivePolicy: !If 
        - CreateDeadLetterQueue
        - !Sub |
          {
            "deadLetterTargetArn": "${DeadLetterQueue.Arn}",
            "maxReceiveCount": ${MaxReceiveCount}
          }
        - !Ref 'AWS::NoValue'
      Tags:
        - Key: Name
          Value: !Ref QueueName
        - Key: Environment
          Value: Production

Outputs:
  QueueURL:
    Description: URL of the main SQS queue
    Value: !Ref MainQueue
  
  QueueARN:
    Description: ARN of the main SQS queue
    Value: !GetAtt MainQueue.Arn
  
  DeadLetterQueueURL:
    Description: URL of the dead-letter SQS queue
    Condition: CreateDeadLetterQueue
    Value: !Ref DeadLetterQueue
  
  DeadLetterQueueARN:
    Description: ARN of the dead-letter SQS queue
    Condition: CreateDeadLetterQueue
    Value: !GetAtt DeadLetterQueue.Arn