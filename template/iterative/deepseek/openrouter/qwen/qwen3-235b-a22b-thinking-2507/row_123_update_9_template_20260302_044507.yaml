AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: 'Stripe API secret key for authenticating product creation requests'
    MinLength: 1
    Default: 'sk_test_XXXXXXXXXXXXXXXXXXXXXXXX'
Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus
  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: StripeConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub 'Bearer ${StripeApiKey}'
  StripeProductsApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductsApiDestination
      ConnectionArn: !GetAtt StripeConnection.Arn
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300
  ProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref PartnerAppEventBus
      Name: ProductCreationRule
      EventPattern:
        source:
          - PartnerApp
        "detail-type":
          - PartnerAppDetailType
      Targets:
        - Id: StripeProductTarget
          Arn: !GetAtt StripeProductsApiDestination.Arn
Outputs:
  EventBusName:
    Value: !Ref PartnerAppEventBus
    Description: Name of the Event Bus to publish PartnerApp events to
  RuleName:
    Value: !Ref ProductCreationRule
    Description: Name of the EventBridge rule triggering product creation
  ApiDestinationArn:
    Value: !GetAtt StripeProductsApiDestination.Arn
    Description: ARN of the API Destination for Stripe product endpoint
  ConnectionArn:
    Value: !GetAtt StripeConnection.Arn
    Description: ARN of the Connection used for Stripe authentication