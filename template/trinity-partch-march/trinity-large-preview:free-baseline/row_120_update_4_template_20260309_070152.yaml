AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource tagging
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet
  PrivateSubnetCIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet
  BatchInstanceType:
    Type: String
    Default: optimal
    Description: EC2 instance type for Batch compute resources
  BatchMinvCpus:
    Type: Number
    Default: 0
    Description: Minimum number of vCPUs for Batch compute environment
  BatchMaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum number of vCPUs for Batch compute environment
  ContainerImage:
    Type: String
    Default: busybox
    Description: Container image for Batch jobs
  EventPattern:
    Type: String
    Default: '{"detail-type": ["OrderCreated"]}'
    Description: Event pattern to trigger Batch jobs

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PrivateSubnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SecurityGroup

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-BatchServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ECSTaskExecutionRole

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-OrderQueue
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SQSQueue

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: !Ref BatchMinvCpus
        MaxvCpus: !Ref BatchMaxvCpus
        InstanceTypes:
          - !Ref BatchInstanceType
        Subnets:
          - !Ref PrivateSubnet
        SecurityGroupIds:
          - !Ref SecurityGroup
        Ec2KeyPair: default-key
      ServiceRole: !GetAtt BatchServiceRole.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ComputeEnvironment

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-JobQueue

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Memory: 512
        Vcpus: 1
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-JobDefinition

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${EnvironmentName}-OrderProcessingRule
      EventPattern: !Ref EventPattern
      State: ENABLED
      Targets:
        - Arn: !GetAtt BatchJobQueue.Arn
          Id: BatchJobTarget
          RoleArn: !GetAtt EventBridgeRuleRole.Arn
          BatchParameters:
            JobDefinition: !Ref BatchJobDefinition
            JobName: !Sub ${EnvironmentName}-OrderProcessingJob

  EventBridgeRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: !GetAtt BatchJobQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EventBridgeRuleRole

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  BatchJobQueueARN:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn
  EventBridgeRuleARN:
    Description: ARN of the EventBridge Rule
    Value: !GetAtt EventBridgeRule.Arn