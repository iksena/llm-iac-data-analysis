AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application with a production branch for TodoApp'

Parameters:
  AppName:
    Type: String
    Default: 'TodoApp'
    Description: Name of the Amplify application
  
  BranchName:
    Type: String
    Default: 'main'
    Description: Name of the branch to deploy

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess-Amplify

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: '/<*>'
          Target: '/index.html'
          Status: '404'
        - Source: '^[^.]+$'
          Target: '/index.html'
          Status: '200'
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: 'production'
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn
      Platform: WEB

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: 'production'

Outputs:
  AmplifyAppId:
    Description: ID of the Amplify App
    Value: !GetAtt AmplifyApp.AppId
  
  AmplifyAppURL:
    Description: URL of the Amplify App
    Value: !Sub "https://${BranchName}.${AmplifyApp.DefaultDomain}"
  
  AmplifyConsoleURL:
    Description: URL to the Amplify Console
    Value: !Sub "https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp.AppId}"