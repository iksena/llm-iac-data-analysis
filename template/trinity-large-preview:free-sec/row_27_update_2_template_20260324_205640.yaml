AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for real-time data ingestion and storage pipeline using Kinesis Data Stream and Kinesis Data Firehose

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis Data Stream
  RetentionPeriod:
    Type: Number
    Default: 24
    Description: Data retention period in hours for the Kinesis Data Stream
  S3BucketName:
    Type: String
    Default: my-kinesis-firehose-delivery-bucket
    Description: Name of the S3 bucket for data storage
  Prefix:
    Type: String
    Default: firehose/
    Description: Prefix for the S3 bucket objects
  ErrorOutputPrefix:
    Type: String
    Default: firehose/error/
    Description: Prefix for error output in the S3 bucket

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriod

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        Prefix: !Ref Prefix
        ErrorOutputPrefix: !Ref ErrorOutputPrefix
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub '${S3Bucket.Arn}/*'

Outputs:
  KinesisStreamARN:
    Description: Kinesis Data Stream ARN
    Value: !GetAtt KinesisStream.Arn
  KinesisFirehoseDeliveryStreamARN:
    Description: Kinesis Firehose DeliveryStream ARN
    Value: !GetAtt KinesisFirehoseDeliveryStream.Arn
  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket