AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create IAM roles for EC2 instances with read-only access to IAM metadata.

Resources:
  EC2ReadOnlyIAMRole1:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'EC2ReadOnlyIAMRole1'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'ReadOnlyIAMPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:Get*'
                  - 'iam:List*'
                Resource: '*'

  EC2ReadOnlyIAMRole2:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'EC2ReadOnlyIAMRole2'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'ReadOnlyIAMPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:Get*'
                  - 'iam:List*'
                Resource: '*'

Outputs:
  Role1ARN:
    Description: 'ARN of the first IAM Role'
    Value: !GetAtt EC2ReadOnlyIAMRole1.Arn

  Role2ARN:
    Description: 'ARN of the second IAM Role'
    Value: !GetAtt EC2ReadOnlyIAMRole2.Arn