AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted One Zone EFS file system in us-east-1a.
Parameters:
  KMSKeyId:
    Type: String
    Description: KMS Key ID to use for encryption. Leave blank to create a new key.
    Default: ''
  FileSystemName:
    Type: String
    Description: Name for the EFS file system.
    Default: MyEncryptedOneZoneFileSystem
Resources:
  EncryptedEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !If [ !Equals [ !Ref KMSKeyId, '' ], !Ref KMSKeyId, !Ref NewKMSKey ]
      PerformanceMode: generalPurpose
      AvailabilityZoneName: us-east-1a
  NewKMSKey:
    Type: AWS::KMS::Key
    Condition: CreateNewKey
    Properties:
      Description: KMS key for EFS encryption
      EnableKeyRotation: true
Conditions:
  CreateNewKey: !Equals [ !Ref KMSKeyId, '' ]
Outputs:
  FileSystemId:
    Value: !Ref EncryptedEFS
    Description: The ID of the EFS file system.
  FileSystemDNSName:
    Value: !GetAtt EncryptedEFS.Name
    Description: The DNS name of the EFS file system.

