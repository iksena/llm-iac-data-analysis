AWSTemplateFormatVersion: '2010-09-01'
Description: 'Aurora MySQL cluster with two instances and custom parameter groups'

Parameters:
  DBName:
    Type: String
    Description: The database name
    MinLength: '1'
    MaxLength: '64'
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  DBMasterUsername:
    Type: String
    Description: The database admin account username
    MinLength: '1'
    MaxLength: '16'
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  DBMasterPassword:
    Type: String
    Description: The database admin account password
    NoEcho: true
    MinLength: '8'
    MaxLength: '41'
    AllowedPattern: '[a-zA-Z0-9!@#$%^&*()_+=-]*'
    ConstraintDescription: Must contain only alphanumeric and special characters

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the database into

  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for DB subnet group

  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for DB subnet group

Resources:
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Custom cluster parameter group
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        character_set_server: utf8mb4
        collation_server: utf8mb4_unicode_ci

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom instance parameter group
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.10.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      Port: 3306
      PubliclyAccessible: true

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AutoMinorVersionUpgrade: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AutoMinorVersionUpgrade: true

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt DBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address

  Instance1Endpoint:
    Description: First instance endpoint
    Value: !GetAtt DBInstance1.Endpoint.Address

  Instance2Endpoint:
    Description: Second instance endpoint
    Value: !GetAtt DBInstance2.Endpoint.Address

  DatabaseName:
    Description: Database name
    Value: !Ref DBName

  Port:
    Description: Database port
    Value: 3306