AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  BatchJobQueueName:
    Type: String
    Default: OrderProcessingQueue
  BatchJobDefinitionName:
    Type: String
    Default: OrderProcessingJob
  BatchJobMemory:
    Type: Number
    Default: 2048
  BatchJobVcpus:
    Type: Number
    Default: 1
  EventBridgePipeName:
    Type: String
    Default: OrderCreatedToBatchPipe
  SqsQueueName:
    Type: String
    Default: OrderCreatedQueue

Resources:
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - optimal
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds: [!Ref BatchSecurityGroup]
      ServiceRole: !GetAtt BatchServiceRole.Arn

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      State: ENABLED
      Name: !Ref BatchJobQueueName

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: amazon/aws-cli:latest
        Memory: !Ref BatchJobMemory
        Vcpus: !Ref BatchJobVcpus
        Command:
          - /bin/sh
          - -c
          - |
            echo "Processing order: $ORDER_ID"
            echo "Order details: $ORDER_DETAILS"
            echo "Order processed successfully"
        Environment:
          - Name: ORDER_ID
            Value: !Ref 'AWS::StackName'
          - Name: ORDER_DETAILS
            Value: !Ref 'AWS::StackName'
        ExecutionRoleArn: !GetAtt BatchExecutionRole.Arn
      Name: !Ref BatchJobDefinitionName

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: BatchExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SqsQueueName

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref EventBridgePipeName
      Source:
        Type: SQS
        SourceParameters:
          QueueUrl: !GetAtt SqsQueue.Arn
      Target:
        Type: Batch
        TargetParameters:
          BatchParameters:
            JobDefinition: !Ref BatchJobDefinition
            JobName: !Ref BatchJobDefinitionName
            ArrayProperties:
              Size: 1
            RetryStrategy:
              Attempts: 3
      Enrichment:
        Type: NONE
      RoleArn: !GetAtt PipeRole.Arn
      Filter:
        EventPattern:
          source:
            - aws.sqs
          detail:
            message:
              - OrderCreated

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipeExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SqsQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                  - batch:DescribeJobs
                Resource: !GetAtt BatchJobDefinition.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

Outputs:
  SqsQueueUrl:
    Description: SQS Queue URL
    Value: !Ref SqsQueue
  BatchJobQueueArn:
    Description: Batch Job Queue ARN
    Value: !GetAtt BatchJobQueue.Arn
  EventBridgePipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn