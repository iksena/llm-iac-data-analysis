AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify web application with production branch for TodoApp

Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
  BranchName:
    Type: String
    Default: main
    Description: Name of the production branch
  Repository:
    Type: String
    Default: https://github.com/example/todoapp.git
    Description: Repository URL for the TodoApp
  OAuthToken:
    Type: String
    Default: dummy-token
    NoEcho: true
    Description: OAuth token for GitHub integration

Resources:
  TodoApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      OAuthToken: !Ref OAuthToken
      BuildSpec: |
        version: 0.1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: production

  ProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref TodoApp
      BranchName: !Ref BranchName
      PullRequest: false
      Stage: PRODUCTION
      Framework: none
      EnableAutoBuild: true
      EnableBasicAuth: false
      EnablePerformanceMode: false
      EnablePullRequestPreview: false
      EnableNotification: false
      EnableAutoBranchCreation: false

Outputs:
  AppId:
    Description: Amplify Application ID
    Value: !Ref TodoApp
  AppUrl:
    Description: Amplify Application URL
    Value: !GetAtt TodoApp.DefaultDomain
  BranchName:
    Description: Production branch name
    Value: !Ref BranchName