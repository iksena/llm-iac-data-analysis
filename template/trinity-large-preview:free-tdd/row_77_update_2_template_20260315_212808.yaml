AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB tables for supporter product data with environment-specific configurations

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE

Resources:
  SupporterProductDataPROD:
    Type: AWS::DynamoDB::Table
    Condition: IsProd
    Properties:
      TableName: SupporterProductData-PROD
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 20
        WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      Tags:
        - Key: Backup
          Value: Enabled

  SupporterProductDataCODE:
    Type: AWS::DynamoDB::Table
    Condition: IsCode
    Properties:
      TableName: SupporterProductData-CODE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      Tags:
        - Key: Backup
          Value: Enabled

  PRODWriteAutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: SupporterProductData-PROD-WriteCapacityAutoScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PRODWriteScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
        DisableScaleIn: false

  PRODWriteScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub "table/${SupporterProductDataPROD}"
      RoleARN: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/dynamodb.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_DynamoDBTable"
      ScalableDimension: "dynamodb:table:WriteCapacityUnits"
      ServiceNamespace: dynamodb

Conditions:
  IsProd: !Equals [!Ref Stage, "PROD"]
  IsCode: !Equals [!Ref Stage, "CODE"]