AWSTemplateFormatVersion: '2010-09-09'
Description: Load balanced, scalable sample website
Resources:
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub my-website-access-logs-${AWS::Region}-${AWS::AccountId}
  ELBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  ASGSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
  LaunchConfiguration:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: ami-0c55b31ad2299a701 # Replace with your AMI ID
      InstanceType: t2.micro
      KeyName: MyKeyPair # Replace with your Key Pair name
      SecurityGroups:
        - !Ref ASGSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
        yum install httpd -y
        systemctl start httpd
        systemctl enable httpd
        echo "<h1>Hello from AWS!</h1>" > /var/www/html/index.html
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchConfigurationName: !Ref LaunchConfiguration
      MinSize: 1
      MaxSize: 3
      VPCZoneIdentifier:
        - subnet-xxxxxxxxxxxx # Replace with your subnet IDs
      HealthCheckType: EC2
      LoadBalancerNames:
        - !Ref ElasticLoadBalancer
  ElasticLoadBalancer:
    Type: AWS::ElasticLoadBalancing::LoadBalancer
    Properties:
      ConnectionDrainingPolicy:
        Enabled: true
        Timeout: 300
      HealthCheck:
        HealthyThreshold: 2
        Interval: 10
        Target: HTTP:80/index.html
        Timeout: 5
        UnhealthyThreshold: 2
      Instances:
        - !Ref AutoScalingGroup
      Listeners:
        - InstancePort: 80
          LoadBalancerPort: 80
          Protocol: HTTP
      LoadBalancerName: MyLoadBalancer
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ELBSecurityGroup
      Subnets:
        - subnet-xxxxxxxxxxxx # Replace with your subnet IDs
      AccessLoggingPolicy:
        Enabled: true
        S3BucketName: !Ref S3Bucket
        S3BucketPrefix: elb-logs/


Outputs:
  LoadBalancerDNSName:
    Value: !GetAtt ElasticLoadBalancer.DNSName
    Description: The DNS name of the load balancer
