AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units for the table
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for the table
  BillingMode:
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: Billing mode for the DynamoDB table

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref MyDynamoDBTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt MyDynamoDBTable.Arn