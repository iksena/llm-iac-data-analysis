AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  GlueDatabaseName:
    Type: String
    Default: cloudtrail_database
    AllowedPattern: ^[a-z0-9_]+$
    ConstraintDescription: Database name must contain only lowercase letters, numbers and underscores
  S3BucketName:
    Type: String
    Default: kk-admin
  S3Prefix:
    Type: String
    Default: cloud-trail/AWSLogs/

Resources:
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName
        Description: Database for CloudTrail log analysis

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueDatabaseAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:DeleteTable
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTables
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabaseName}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabaseName}/*"

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    DependsOn: GlueDatabase
    Properties:
      Name: !Sub "${AWS::StackName}-cloudtrail-crawler"
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref GlueDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub "s3://${S3BucketName}/${S3Prefix}"
      TablePrefix: cloudtrail_
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      Configuration: |
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": {
              "AddOrUpdateBehavior": "InheritFromTable"
            },
            "Tables": {
              "AddOrUpdateBehavior": "MergeNewColumns"
            }
          },
          "Grouping": {
            "TableLevelConfiguration": 3
          }
        }

Outputs:
  DatabaseName:
    Value: !Ref GlueDatabaseName
  CrawlerName:
    Value: !Ref CloudTrailCrawler
  CrawlerRoleARN:
    Value: !GetAtt GlueCrawlerRole.Arn