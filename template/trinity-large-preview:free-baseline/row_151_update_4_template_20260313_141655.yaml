AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Bedrock Agent with Lambda Stock Price Lookup

Parameters:
  LambdaFunctionName:
    Type: String
    Default: StockPriceLookupFunction
    Description: Name of the Lambda function
  BedrockAgentName:
    Type: String
    Default: StockPriceAgent
    Description: Name of the Bedrock Agent
  ModelId:
    Type: String
    Default: amazon.claude-3-sonnet-20240229
    Description: ID of the foundational model to use

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': {
                      'stockPrice': 100
                  }
              }
      Timeout: 10

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${BedrockAgentName}-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt StockPriceLambdaFunction.Arn

  StockPriceAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref BedrockAgentName
      Description: Agent for stock price lookup
      AgentType: TASK
      ModelId: !Ref ModelId
      AgentInstructions:
        Content: |
          You are a stock price lookup assistant. When users ask about stock prices, use the getStockPrice action to retrieve the current price.
      ActionGroups:
        - ActionGroupName: StockPriceActions
          Actions:
            - Name: getStockPrice
              Description: Get the current stock price
              LambdaInvocation:
                FunctionArn: !GetAtt StockPriceLambdaFunction.Arn
                Payload:
                  Type: JSON
                  Format: REQUEST_RESPONSE
                  Schema:
                    Type: object
                    Properties:
                      symbol:
                        Type: string
                    Required:
                      - symbol

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn
  BedrockAgentArn:
    Description: ARN of the Bedrock Agent
    Value: !GetAtt StockPriceAgent.AgentArn