AWSTemplateFormatVersion: '2010-09-09'
Resources:
  VPCFlowLogsQueryTopSourceIPsOutbound:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsOutbound
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::AccountId}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'ACCEPT' and dstPort != 22
        | stats sum(bytes) as totalBytes by srcAddr
        | sort totalBytes desc
        | limit 10

  VPCFlowLogsQueryTopSourceIPsRejected:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsRejected
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::AccountId}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedCount by srcAddr
        | sort rejectedCount desc
        | limit 10

  VPCFlowLogsQueryTopDestIPsOutbound:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestIPsOutbound
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::AccountId}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'ACCEPT' and dstPort != 22
        | stats sum(bytes) as totalBytes by dstAddr
        | sort totalBytes desc
        | limit 10

  VPCFlowLogsQueryTopDestIPsRejected:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestIPsRejected
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::AccountId}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedCount by dstAddr
        | sort rejectedCount desc
        | limit 10

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogsDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${VPCFlowLogsQueryTopSourceIPsOutbound}' | stats sum(bytes) by srcAddr | sort sum(bytes) desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${VPCFlowLogsQueryTopSourceIPsRejected}' | stats count(*) by srcAddr | sort count(*) desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connections"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${VPCFlowLogsQueryTopDestIPsOutbound}' | stats sum(bytes) by dstAddr | sort sum(bytes) desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${VPCFlowLogsQueryTopDestIPsRejected}' | stats count(*) by dstAddr | sort count(*) desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Rejected Connections"
              }
            }
          ]
        }

Outputs:
  DashboardARN:
    Description: ARN of the CloudWatch Dashboard
    Value: !GetAtt CloudWatchDashboard.DashboardArn