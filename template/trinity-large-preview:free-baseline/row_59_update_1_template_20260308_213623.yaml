AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Kinesis Data Stream with throughput alarms

Parameters:
  StreamName:
    Type: String
    Default: MyKinesisStream
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours
  AlarmThreshold:
    Type: Number
    Default: 5
    Description: Threshold for alarm trigger
  AlarmEvaluationPeriods:
    Type: Number
    Default: 1
    Description: Number of periods to evaluate for alarm
  AlarmPeriod:
    Type: Number
    Default: 300
    Description: Period in seconds over which to evaluate alarm

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-ReadThroughputExceeded"
      AlarmDescription: Alarm when read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: []

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-WriteThroughputExceeded"
      AlarmDescription: Alarm when write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: []

Outputs:
  StreamARN:
    Description: Kinesis Stream ARN
    Value: !GetAtt KinesisStream.Arn
  StreamName:
    Description: Kinesis Stream Name
    Value: !Ref StreamName