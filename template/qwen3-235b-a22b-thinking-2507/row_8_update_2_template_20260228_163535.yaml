AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  FlowLogsLogGroupName:
    Type: String
    Description: Name of the CloudWatch Logs log group containing VPC flow logs (e.g., '/aws/vpc/flow-log-group')
    MinLength: 1
  DashboardName:
    Type: String
    Default: NatGatewayFlowLogsDashboard
    Description: Name of the CloudWatch Dashboard to create
    MinLength: 1
Resources:
  NatGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${FlowLogsLogGroupName}' | fields srcaddr, SUM(bytes) as total_bytes | filter interfaceId like 'eni-%' and action = 'ACCEPT' | stats total_bytes by srcaddr | sort total_bytes desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Bytes"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${FlowLogsLogGroupName}' | fields srcaddr, SUM(packets) as total_packets | filter interfaceId like 'eni-%' and action = 'ACCEPT' | stats total_packets by srcaddr | sort total_packets desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Packets"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${FlowLogsLogGroupName}' | fields srcaddr, COUNT(*) as reject_count | filter interfaceId like 'eni-%' and action = 'REJECT' | stats reject_count by srcaddr | sort reject_count desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connection Count"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${FlowLogsLogGroupName}' | fields srcaddr, SUM(bytes) as reject_bytes | filter interfaceId like 'eni-%' and action = 'REJECT' | stats reject_bytes by srcaddr | sort reject_bytes desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Bytes"
              }
            }
          ]
        }
Outputs:
  DashboardName:
    Description: Name of the created CloudWatch Dashboard
    Value: !Ref DashboardName
  DashboardArn:
    Description: ARN of the created CloudWatch Dashboard
    Value: !GetAtt NatGatewayDashboard.DashboardArn