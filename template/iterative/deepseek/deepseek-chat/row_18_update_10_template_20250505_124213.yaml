AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB to EventBridge integration with filtering'

Parameters:
  DynamoDBTableName:
    Type: String
    Default: 'UserTable'
    Description: 'Name of the DynamoDB table to monitor'
  TargetEventBusName:
    Type: String
    Default: 'AvatarProcessingBus'
    Description: 'Name of the target EventBridge bus to send events to'

Resources:
  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: "userId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "userId"
          KeyType: "HASH"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  TargetEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref TargetEventBusName

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: 'DynamoDBStreamToEventBridge'
      EventPattern:
        source:
          - "aws.dynamodb"
        detail-type:
          - "DynamoDB Stream Record"
        detail:
          eventName:
            - "MODIFY"
          dynamodb:
            NewImage:
              avatarUrl:
                S:
                  - suffix: ".png"
      Targets:
        - Arn: !GetAtt TargetEventBus.Arn
          Id: 'DynamoDBStreamTarget'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt UserTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: "*"

Outputs:
  DynamoDBStreamARN:
    Description: 'ARN of the DynamoDB Stream'
    Value: !GetAtt UserTable.StreamArn
  EventRuleARN:
    Description: 'ARN of the EventBridge Rule'
    Value: !GetAtt EventRule.Arn
  TargetEventBusARN:
    Description: 'ARN of the target EventBus'
    Value: !GetAtt TargetEventBus.Arn