AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  KinesisStreamName:
    Type: String
    Default: MyKinesisStream
    Description: The name of the Kinesis data stream
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: The number of shards for the Kinesis stream
  KinesisRetentionPeriod:
    Type: Number
    Default: 24
    Description: The retention period for the Kinesis stream in hours
  APIGatewayName:
    Type: String
    Default: MyAPIGateway
    Description: The name of the API Gateway
  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: The runtime for the Lambda functions
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: The timeout for the Lambda functions in seconds

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount
      RetentionPeriodHours: !Ref KinesisRetentionPeriod

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                  - kinesis:UpdateShardCount
                Resource: !GetAtt KinesisStream.Arn

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                  - kinesis:UpdateShardCount
                Resource: !GetAtt KinesisStream.Arn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  PutRecordsLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: put_records.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import base64

          kinesis_client = boto3.client('kinesis')

          def lambda_handler(event, context):
              try:
                  records = event['body']
                  if isinstance(records, str):
                      records = json.loads(records)
                  response = kinesis_client.put_records(
                      StreamName='MyKinesisStream',
                      Records=records
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response)
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout

  GetRecordsLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: get_records.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          kinesis_client = boto3.client('kinesis')

          def lambda_handler(event, context):
              try:
                  shard_iterator = event['queryStringParameters']['shard_iterator']
                  limit = int(event['queryStringParameters'].get('limit', 100))
                  response = kinesis_client.get_records(
                      ShardIterator=shard_iterator,
                      Limit=limit
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response)
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout

  ManageMetadataLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: manage_metadata.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          kinesis_client = boto3.client('kinesis')

          def lambda_handler(event, context):
              try:
                  action = event['queryStringParameters']['action']
                  if action == 'describe':
                      response = kinesis_client.describe_stream(
                          StreamName='MyKinesisStream'
                      )
                  elif action == 'update_shard_count':
                      shard_count = int(event['queryStringParameters']['shard_count'])
                      response = kinesis_client.update_shard_count(
                          StreamName='MyKinesisStream',
                          TargetShardCount=shard_count,
                          ScalingType='UNIFORM_SCALING'
                      )
                  else:
                      return {
                          'statusCode': 400,
                          'body': json.dumps('Invalid action')
                      }
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response)
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout

  APIGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref APIGatewayName
      Description: API Gateway for Kinesis Data Streams

  PutRecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGateway
      ParentId: !GetAtt APIGateway.RootResourceId
      PathPart: put-records

  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGateway
      ResourceId: !Ref PutRecordsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt PutRecordsLambdaFunction.Arn

  GetRecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGateway
      ParentId: !GetAtt APIGateway.RootResourceId
      PathPart: get-records

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGateway
      ResourceId: !Ref GetRecordsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt GetRecordsLambdaFunction.Arn

  ManageMetadataResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGateway
      ParentId: !GetAtt APIGateway.RootResourceId
      PathPart: manage-metadata

  ManageMetadataMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGateway
      ResourceId: !Ref ManageMetadataResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt ManageMetadataLambdaFunction.Arn

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref APIGateway
      StageName: prod

  PutRecordsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PutRecordsLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGateway}/*/POST/put-records

  GetRecordsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetRecordsLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGateway}/*/GET/get-records

  ManageMetadataLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ManageMetadataLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGateway}/*/GET/manage-metadata

Outputs:
  APIGatewayURL:
    Description: The URL of the API Gateway
    Value: !Sub https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com/prod