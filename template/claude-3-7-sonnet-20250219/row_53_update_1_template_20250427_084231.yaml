AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EMR Serverless with S3 bucket and IAM role'

Parameters:
  EMRServerlessApplicationName:
    Type: String
    Default: 'emr-serverless-spark-app'
    Description: Name for the EMR Serverless application
    
  EMRServerlessReleaseLabel:
    Type: String
    Default: 'emr-6.15.0'
    Description: EMR release version
    
  S3BucketName:
    Type: String
    Description: Name for the S3 bucket to store scripts and data
    AllowedPattern: '^[a-z0-9][-a-z0-9]*$'
    ConstraintDescription: Bucket name can include numbers, lowercase letters, and hyphens, and must be globally unique
    
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    Description: Number of minutes after which an idle application will stop
    MinValue: 1
    MaxValue: 10080
    
  AutoStartEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to enable auto-start for the EMR Serverless application
    
  SparkDriverCores:
    Type: Number
    Default: 4
    Description: Number of cores for Spark driver
    
  SparkDriverMemory:
    Type: Number
    Default: 16
    Description: Memory in GB for Spark driver
    
  SparkExecutorCores:
    Type: Number
    Default: 4
    Description: Number of cores for Spark executor
    
  SparkExecutorMemory:
    Type: Number
    Default: 16
    Description: Memory in GB for Spark executor
    
  SparkExecutorInstances:
    Type: Number
    Default: 2
    Description: Number of Spark executor instances
    
  MaxConcurrentApps:
    Type: Number
    Default: 3
    Description: Maximum number of concurrent applications

Resources:
  EMRServerlessS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA

  EMRServerlessServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessServiceRolePolicy
      Path: /service-role/

  EMRServerlessJobExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  EMRServerlessJobExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EMRServerlessJobExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub 'arn:aws:s3:::${EMRServerlessS3Bucket}'
              - !Sub 'arn:aws:s3:::${EMRServerlessS3Bucket}/*'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*'
      Roles:
        - !Ref EMRServerlessJobExecutionRole

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    DependsOn:
      - EMRServerlessServiceRole
      - EMRServerlessJobExecutionRole
      - EMRServerlessJobExecutionPolicy
    Properties:
      Name: !Ref EMRServerlessApplicationName
      ReleaseLabel: !Ref EMRServerlessReleaseLabel
      Type: SPARK
      AutoStartConfiguration:
        Enabled: !Ref AutoStartEnabled
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      MaximumCapacity:
        Cpu: !Ref MaxConcurrentApps
        Memory: !Ref MaxConcurrentApps
      InitialCapacity:
        - Key: Driver
          Value:
            Cpu: !Ref SparkDriverCores
            Memory: !Mul [!Ref SparkDriverMemory, 1024]
        - Key: Executor
          Value:
            Cpu: !Ref SparkExecutorCores
            Memory: !Mul [!Ref SparkExecutorMemory, 1024]
            Count: !Ref SparkExecutorInstances
      NetworkConfiguration:
        SecurityGroupIds: 
          - !GetAtt EMRServerlessSecurityGroup.GroupId
        SubnetIds:
          - !Ref EMRServerlessSubnet

  EMRServerlessVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EMRServerlessVPC

  EMRServerlessSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EMRServerlessVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: EMRServerlessPrivateSubnet

  EMRServerlessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EMR Serverless
      VpcId: !Ref EMRServerlessVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EMRServerlessRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EMRServerlessVPC
      Tags:
        - Key: Name
          Value: EMRServerlessRouteTable

  EMRServerlessSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EMRServerlessSubnet
      RouteTableId: !Ref EMRServerlessRouteTable

Outputs:
  EMRServerlessApplicationId:
    Description: The ID of the EMR Serverless application
    Value: !Ref EMRServerlessApplication
    
  EMRServerlessApplicationARN:
    Description: The ARN of the EMR Serverless application
    Value: !GetAtt EMRServerlessApplication.Arn
    
  S3BucketName:
    Description: The name of the S3 bucket for EMR Serverless scripts and data
    Value: !Ref EMRServerlessS3Bucket
    
  S3BucketARN:
    Description: The ARN of the S3 bucket
    Value: !GetAtt EMRServerlessS3Bucket.Arn
    
  JobExecutionRoleARN:
    Description: The ARN of the IAM role for EMR Serverless job execution
    Value: !GetAtt EMRServerlessJobExecutionRole.Arn
    
  ServiceRoleARN:
    Description: The ARN of the IAM service role for EMR Serverless
    Value: !GetAtt EMRServerlessServiceRole.Arn