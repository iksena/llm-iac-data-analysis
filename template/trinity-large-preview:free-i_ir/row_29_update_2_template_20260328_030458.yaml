AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Parameter Storage and Retrieval Workflows with SSM Parameter Store and Secrets Manager

Resources:
  SSMParameterStore:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /my-stack/config/ab-test
      Type: String
      Value: This is A/B
      Description: Stack-specific SSM parameter for non-sensitive configuration

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: my-stack-secret
      Description: Stack-specific secret with predefined username
      GenerateSecretString:
        ExcludeCharacters: "\"@/\\"
        GenerateStringKey: password
        PasswordLength: 30
        IncludeSpace: false
      SecretString: '{"username": "admin", "password": "<PASSWORD>"}'

  LambdaIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaSSMParameterPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSSMParameterAccess
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParametersByPath
            Resource:
              Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/my-stack/*
      Roles:
        - !Ref LambdaIAMRole

  LambdaSecretsManagerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSecretsManagerAccess
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              Fn::Sub: arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:my-stack-secret-*
      Roles:
        - !Ref LambdaIAMRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.14
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          def handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Fetch SSM parameter
              ssm_param = ssm_client.get_parameter(Name='/my-stack/config/ab-test', WithDecryption=True)

              # Fetch Secrets Manager secret
              secret = secrets_client.get_secret_value(SecretId='my-stack-secret')
              secret_value = json.loads(secret['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_param['Parameter']['Value'],
                      'secret': secret_value
                  })
              }
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SSM_PARAMETER_NAME: /my-stack/config/ab-test
          SECRET_NAME: my-stack-secret
      Role: !GetAtt LambdaIAMRole.Arn

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
  SSMParameterName:
    Description: SSM Parameter Name
    Value: !Ref SSMParameterStore
  SecretsManagerSecretName:
    Description: Secrets Manager Secret Name
    Value: !Ref SecretsManagerSecret