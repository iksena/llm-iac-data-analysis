AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a centralized Amazon SNS topic with secure cross-service notification capabilities and email subscription.

Parameters:
  EmailAddress:
    Description: The email address to subscribe to the SNS topic.
    Type: String
    AllowedPattern: '^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$'
    ConstraintDescription: Must be a valid email address.
    MinLength: 1
    MaxLength: 254
    Default: 'example@example.com'

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: CentralizedAlertsTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - cloudwatch.amazonaws.com
                - events.amazonaws.com
            Action: 'SNS:Publish'
            Resource: 
              - Ref: SNSTopic
            Condition:
              ArnLike:
                AWS:SourceArn: 
                  - 'arn:aws:cloudwatch:*:*:alarm/*'
                  - 'arn:aws:events:*:*:rule/*'

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref EmailAddress
      TopicArn: !Ref SNSTopic

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS Topic
    Value: !Ref SNSTopic