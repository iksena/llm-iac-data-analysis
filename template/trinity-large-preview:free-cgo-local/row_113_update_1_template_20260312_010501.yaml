AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EventBridgeDemoTopic
      TopicName: EventBridgeDemoTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for demo.cli events
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget

Outputs:
  SNSTopicARN:
    Description: SNS Topic ARN
    Value: !Ref SNSTopic
    Export:
      Name: EventBridgeDemoTopicARN