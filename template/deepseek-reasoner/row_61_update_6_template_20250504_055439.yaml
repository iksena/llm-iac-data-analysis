AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a private Route53 Hosted Zone for www.example.com associated with a VPC
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the VPC to associate with the private hosted zone
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com.
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management
        PrivateZone: true
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref AWS::Region
Outputs:
  HostedZoneId:
    Description: ID of the created private hosted zone
    Value: !Ref PrivateHostedZone
  HostedZoneNameServers:
    Description: Name servers of the hosted zone
    Value: !Join [',', !GetAtt PrivateHostedZone.NameServers]