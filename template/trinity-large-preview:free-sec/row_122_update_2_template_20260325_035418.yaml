AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify's product creation API

Parameters:
  ShopifyAdminApiKey:
    Type: String
    Default: "your-shopify-admin-api-key-here"
    AllowedPattern: "^[a-zA-Z0-9_-]{10,100}$"
    Description: Shopify admin API key for authentication

Resources:
  MyShopifyAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp

  ShopifyApiDestinationConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyAdminApiKey

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ShopifyApiDestinationConnection.Arn
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2024-01/products.json
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  ShopifyProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: MyShopifyApp
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyApiDestination.Arn
          Id: ShopifyProductCreationTarget

Outputs:
  EventBusName:
    Description: EventBridge bus name
    Value: MyShopifyApp
  ApiDestinationArn:
    Description: Shopify API destination ARN
    Value: !GetAtt ShopifyApiDestination.Arn
  ConnectionArn:
    Description: Shopify API connection ARN
    Value: !GetAtt ShopifyApiDestinationConnection.Arn