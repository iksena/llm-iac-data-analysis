


AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard for NAT Gateway VPC Flow Logs
Parameters:
  NatGatewayId:
    Type: String
    Description: ID of the NAT Gateway
    ConstraintDescription: Must be a valid NAT Gateway ID
  VpcId:
    Type: String
    Description: ID of the VPC
    ConstraintDescription: Must be a valid VPC ID
  LogGroupName:
    Type: String
    Description: Name of the CloudWatch Log Group containing VPC Flow Logs
    Default: /aws/vpcflowlogs
Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogsDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "logs",
              "x": 0,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "region": !Ref AWS::Region,
                "title": "NAT Gateway Outbound Bytes",
                "period": 300,
                "query": "fields @message | parse @message \"srcIP=\\\"*\\\",dstIP=\\\"*\\\",srcPort=\\\"*\\\",dstPort=\\\"*\\\",protocol=\\\"*\\\",bytes=\\\"*\\\",packets=\\\"*\\\",start=\\\"*\\\",end=\\\"*\\\"\" | filter dstIP = !Ref NatGatewayId | stats sum(bytes) by bin(1m)",
                "view": "timeSeries",
                "stacked": false,
                "logGroupName": !Ref LogGroupName
              }
            },
            {
              "type": "logs",
              "x": 6,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "region": !Ref AWS::Region,
                "title": "NAT Gateway Inbound Packets",
                "period": 300,
                "query": "fields @message | parse @message \"srcIP=\\\"*\\\",dstIP=\\\"*\\\",srcPort=\\\"*\\\",dstPort=\\\"*\\\",protocol=\\\"*\\\",bytes=\\\"*\\\",packets=\\\"*\\\",start=\\\"*\\\",end=\\\"*\\\"\" | filter srcIP = !Ref NatGatewayId | stats sum(packets) by bin(1m)",
                "view": "timeSeries",
                "stacked": false,
                "logGroupName": !Ref LogGroupName
              }
            },
            {
              "type": "logs",
              "x": 0,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "region": !Ref AWS::Region,
                "title": "Top 5 Source IPs",
                "period": 300,
                "query": "fields @message | parse @message \"srcIP=\\\"*\\\",dstIP=\\\"*\\\",srcPort=\\\"*\\\",dstPort=\\\"*\\\",protocol=\\\"*\\\",bytes=\\\"*\\\",packets=\\\"*\\\",start=\\\"*\\\",end=\\\"*\\\"\" | filter dstIP = !Ref NatGatewayId | stats count(*) by srcIP | sort count(*) desc | limit 5",
                "view": "table",
                "stacked": false,
                "logGroupName": !Ref LogGroupName
              }
            },
            {
              "type": "logs",
              "x": 6,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "region": !Ref AWS::Region,
                "title": "Top 5 Destination IPs",
                "period": 300,
                "query": "fields @message | parse @message \"srcIP=\\\"*\\\",dstIP=\\\"*\\\",srcPort=\\\"*\\\",dstPort=\\\"*\\\",protocol=\\\"*\\\",bytes=\\\"*\\\",packets=\\\"*\\\",start=\\\"*\\\",end=\\\"*\\\"\" | filter srcIP = !Ref NatGatewayId | stats count(*) by dstIP | sort count(*) desc | limit 5",
                "view": "table",
                "stacked": false,
                "logGroupName": !Ref LogGroupName
              }
            }
          ]
        }
Outputs:
  DashboardArn:
    Value: !GetAtt NATGatewayDashboard.Arn
    Description: ARN of the created CloudWatch Dashboard

