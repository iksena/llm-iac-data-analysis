AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster with Monitoring Capabilities

Parameters:
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: CloudWatch Logs retention period in days
  AlarmSNSTopic:
    Type: String
    Default: ''
    Description: SNS topic ARN for alarm notifications (leave blank for no notifications)

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AWS::StackName}-Cluster

  ECSRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-ECSRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  ECSRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-ECSLoggingPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource: '*'
      Roles:
        - !Ref ECSRole

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/ecs/${ECSCluster}
      RetentionInDays: !Ref LogRetentionInDays

  CloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-ClusterCPUUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmDescription: Alarm when cluster CPU utilization exceeds 80%
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
      AlarmActions:
        - !If [HasSNSTopic, !Ref AlarmSNSTopic, !Ref "AWS::NoValue"]

Conditions:
  HasSNSTopic: !Not [!Equals [!Ref AlarmSNSTopic, '']]

Outputs:
  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
  ClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn