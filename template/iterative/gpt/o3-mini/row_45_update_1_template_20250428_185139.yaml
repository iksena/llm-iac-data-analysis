AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon Kinesis Data Firehose Delivery Stream
  with AWS managed server-side encryption enabled and error logging to CloudWatch Logs.

Resources:
  DeliveryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/kinesisfirehose/deliveryErrorLogGroup
      RetentionInDays: 14

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: deliveryErrorLogStream

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: FirehoseAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt DeliveryBucket.Arn
                  - !Sub "${DeliveryBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${FirehoseLogGroup}:*"

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      S3DestinationConfiguration:
        BucketARN: !GetAtt DeliveryBucket.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        Prefix: "firehose-data/"
        CompressionFormat: UNCOMPRESSED
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  DeliveryStreamName:
    Description: "Name of the Kinesis Firehose Delivery Stream"
    Value: !Ref FirehoseDeliveryStream
  S3BucketName:
    Description: "Name of the S3 Bucket used as the destination for Firehose"
    Value: !Ref DeliveryBucket
  LogGroupName:
    Description: "CloudWatch Log Group for Firehose error logging"
    Value: !Ref FirehoseLogGroup