AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template that creates an automated monitoring and alerting system for AWS Secrets Manager activities, which sends email notifications for critical secret lifecycle events.

Parameters:
  EmailAddress:
    Type: String
    Default: example@example.com
    Description: Email address for SNS notifications

Resources:
  SecretEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Secrets Manager Events Topic
      TopicName: SecretsManagerEventsTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref SecretEventsTopic

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  EventBridgePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecretsManagerEventsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: events:PutEvents
            Resource: '*'
      Roles:
        - !Ref EventBridgeRole

  SecretManagerEventsRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - CreateSecret
          - DeleteSecret
          - RotateSecret
        detail:
          status:
            - FAILED
      State: ENABLED
      Targets:
        - Id: Target1
          Arn: !Ref SecretEventsTopic
        - Id: Target2
          Arn: !GetAtt EventBridgeRole.Arn

Outputs:
  SecretEventsTopicArn:
    Description: ARN of the SNS topic for Secrets Manager events
    Value: !Ref SecretEventsTopic