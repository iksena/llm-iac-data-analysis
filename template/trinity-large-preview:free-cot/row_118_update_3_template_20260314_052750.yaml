AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes SQS to API Enrichment Workflow

Resources:
  # SQS Queue as Event Source
  EventSourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgePipeSourceQueue
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30
      MaximumMessageSize: 262144

  # CloudWatch Log Group as Target
  EnrichedDataLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/eventbridge/pipes/enriched-data
      RetentionInDays: 30

  # IAM Role for EventBridge Pipes
  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipesEnrichmentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: SQSAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt EventSourceQueue.Arn
        - PolicyName: CloudWatchLogsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt EnrichedDataLogGroup.Arn

  # EventBridge Pipe
  SQSToAPIPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SQSToAPIPipe
      Source:
        Type: SQS
        Parameters:
          QueueUrl: !GetAtt EventSourceQueue.QueueUrl
      Target:
        Type: CloudWatchLogs
        Parameters:
          LogStreamName: !Sub "enriched-data-${AWS::StackName}"
          LogGroupName: !GetAtt EnrichedDataLogGroup.LogGroupName
      RoleArn: !GetAtt EventBridgePipesRole.Arn
      Enrichment:
        Type: ApiDestination
        Parameters:
          ApiDestinationArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:apidestination/ZipCodeAPIDestination"
          InvocationType: REQUEST_RESPONSE
          HttpMethod: GET
          PathParameterValues:
            - !Select [0, !Split ["-", !Select [1, !Split ["|", !Ref "AWS::StackName"]]]]

  # API Destination for Zip Code Lookup
  ZipCodeAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ZipCodeAPIDestination
      ConnectionArn: !GetAtt ZipCodeAPIConnection.Arn
      InvocationEndpoint: https://api.zippopotam.us
      HttpMethod: GET
      InvocationHttpParameters:
        PathParameterValues:
          - zipcode

  # HTTP Connection for API Destination
  ZipCodeAPIConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ZipCodeAPIConnection
      AuthorizationType: API_KEY
      AuthorizationConfig:
        ApiKeyAuthConfig:
          ApiKeyName: zipcode-api-key
          ApiKeyValue: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:zipcode-api-key"