AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  DBClusterIdentifier:
    Type: String
    Default: aurora-mysql-cluster
    Description: The identifier for the DB cluster
  MasterUsername:
    Type: String
    Default: admin
    Description: The master username for the DB cluster
  MasterUserPassword:
    Type: String
    Default: 'Password123!'
    NoEcho: true
    Description: The master password for the DB cluster
  DBSubnetGroupName:
    Type: String
    Default: aurora-subnet-group
    Description: The name of the DB subnet group
  VpcSecurityGroupIds:
    Type: List<String>
    Default: sg-0000000000000000
    Description: The VPC security group IDs for the DB cluster
  DBParameterGroupName:
    Type: String
    Default: default.aurora-mysql5.7
    Description: The name of the DB parameter group
  DBClusterParameterGroupName:
    Type: String
    Default: default.aurora-mysql5.7
    Description: The name of the DB cluster parameter group
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
    Description: The daily time range during which automated backups are created
  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
    Description: The weekly time range during which system maintenance can occur

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      EngineVersion: 8.0.28
      DBClusterIdentifier: !Ref DBClusterIdentifier
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VpcSecurityGroupIds: !Ref VpcSecurityGroupIds
      Port: 3306
      DBClusterParameterGroupName: !Ref DBClusterParameterGroupName
      EnableCloudwatchLogsExports:
        - error
      BackupRetentionPeriod: 1
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      DeletionProtection: false
      EnableHttpEndpoint: false
      CopyTagsToSnapshot: false
      StorageEncrypted: false
      Tags:
        - Key: Name
          Value: !Ref DBClusterIdentifier

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      DBParameterGroupName: !Ref DBParameterGroupName
      VPCSecurityGroups: !Ref VpcSecurityGroupIds
      AvailabilityZone: !Select [0, !GetAZs '']
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance-1'
      Tags:
        - Key: Name
          Value: !Sub '${DBClusterIdentifier}-instance-1'

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      DBParameterGroupName: !Ref DBParameterGroupName
      VPCSecurityGroups: !Ref VpcSecurityGroupIds
      AvailabilityZone: !Select [1, !GetAZs '']
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance-2'
      Tags:
        - Key: Name
          Value: !Sub '${DBClusterIdentifier}-instance-2'

Outputs:
  ClusterEndpoint:
    Description: The endpoint for the Aurora cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint for the Aurora cluster
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address