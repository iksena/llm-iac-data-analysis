AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource: '*'
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  MyEFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !Select [0, !GetAZs '']
      SecurityGroups:
        - !Ref MyEFSSecurityGroup

  MyEFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount target
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref MyEFSFileSystem
  FileSystemArn:
    Description: The ARN of the created EFS file system
    Value: !GetAtt MyEFSFileSystem.Arn