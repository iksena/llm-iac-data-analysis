AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an encrypted One Zone EFS file system
  in the specified Availability Zone.

Parameters:
  AvailabilityZone:
    Type: String
    Default: us-east-1a
    Description: The Availability Zone where the EFS file system will be created.

Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      AvailabilityZoneName: !Ref AvailabilityZone
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      FileSystemTags:
        - Key: Name
          Value: MyOneZoneEFS

Outputs:
  FileSystemId:
    Description: The ID of the EFS file system
    Value: !Ref MyEFSFileSystem