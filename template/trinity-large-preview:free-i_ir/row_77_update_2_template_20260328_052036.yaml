AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for environment-specific DynamoDB tables to store supporter product data

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

Conditions:
  IsProd:
    Fn::Equals:
      - Ref: Stage
      - PROD

Resources:
  SupporterProductData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: SupporterProductData-${Stage}
      BillingMode:
        Fn::If:
          - IsProd
          - PROVISIONED
          - PAY_PER_REQUEST
      ProvisionedThroughput:
        Fn::If:
          - IsProd
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: "true"
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  AutoScalingWriteCapacity:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: WriteCapacityAutoScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId:
        Fn::If:
          - IsProd
          - Ref: SupporterProductData
          - Ref: AWS::NoValue
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
    Condition: IsProd

Outputs:
  TableName:
    Value:
      Ref: SupporterProductData
    Description: Name of the DynamoDB table