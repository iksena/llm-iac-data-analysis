AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard with four Logs Insights widgets for NAT Gateway VPC Flow Logs - top source IPs by outbound traffic (bytes/packets ACCEPT) and rejected connections (bytes/packets REJECT).'

Parameters:
  DashboardName:
    Type: String
    Default: 'NATGatewayFlowLogsDashboard'
    Description: 'Name of the CloudWatch Dashboard.'
  LogGroupName:
    Type: String
    Description: 'CloudWatch Logs group name for VPC Flow Logs (e.g., /aws/vpc/flowlogs/nat-xxxx). Required.'

Resources:
  NATFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Outbound Bytes (ACCEPT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets | filter interfaceid like 'eni-%' | filter action = \"ACCEPT\" | stats sum(bytes) as totalBytes by srcaddr | sort totalBytes desc | limit 20",
                  "LogGroups": [
                    {
                      "logGroupName": "${LogGroupName}",
                      "status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Outbound Packets (ACCEPT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets | filter interfaceid like 'eni-%' | filter action = \"ACCEPT\" | stats sum(packets) as totalPackets by srcaddr | sort totalPackets desc | limit 20",
                  "LogGroups": [
                    {
                      "logGroupName": "${LogGroupName}",
                      "status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Rejected Bytes (REJECT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets | filter interfaceid like 'eni-%' | filter action = \"REJECT\" | stats sum(bytes) as totalBytes by srcaddr | sort totalBytes desc | limit 20",
                  "LogGroups": [
                    {
                      "logGroupName": "${LogGroupName}",
                      "status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Rejected Packets (REJECT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets | filter interfaceid like 'eni-%' | filter action = \"REJECT\" | stats sum(packets) as totalPackets by srcaddr | sort totalPackets desc | limit 20",
                  "LogGroups": [
                    {
                      "logGroupName": "${LogGroupName}",
                      "status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: 'Name of the created CloudWatch Dashboard.'
    Value: !Ref NATFlowLogsDashboard
  DashboardUrl:
    Description: 'URL to view the dashboard in CloudWatch console.'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name/${DashboardName}'