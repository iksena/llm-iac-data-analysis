AWSTemplateFormatVersion: 2010-09-09
Description: IAM roles with tiered permissions for FIS access control

Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      Description: Security Admins with full FIS access and role-passing privileges
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - fis:*
                Resource: "*"
        - PolicyName: RolePassingWorkshopRoles
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - arn:aws:iam::*:role/workshop-*
        - PolicyName: ServiceLinkedRoleCreation
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - fis.amazonaws.com
                      - other-service.amazonaws.com

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Admins
      Description: Admins with FIS access excluding production resources
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISAccessExcludingProduction
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - fis:ListExperiments
                  - fis:GetExperiment
                  - fis:ListActions
                  - fis:ListTargetResourceTypes
                Resource: "*"
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                Resource: "*"
                Condition:
                  StringNotEquals:
                    aws:ResourceTag/Environment: prod
              - Effect: Allow
                Action:
                  - fis:CreateExperimentTemplate
                  - fis:UpdateExperimentTemplate
                  - fis:DeleteExperimentTemplate
                  - fis:StopExperiment
                Resource: "*"
                Condition:
                  StringNotEquals:
                    aws:ResourceTag/Environment: prod
        - PolicyName: RolePassingWorkshopRoles
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource:
                  - arn:aws:iam::*:role/workshop-*
        - PolicyName: ServiceLinkedRoleCreation
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName:
                      - fis.amazonaws.com
                      - other-service.amazonaws.com

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Users
      Description: Users with limited FIS access for experiment management
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISExperimentManagement
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - fis:ListExperiments
                  - fis:GetExperiment
                  - fis:ListActions
                  - fis:ListTargetResourceTypes
                Resource: "*"
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                Resource: "*"
                Condition:
                  StringNotEquals:
                    aws:ResourceTag/Environment: prod
        - PolicyName: FIStagging
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - fis:TagResource
                  - fis:UntagResource
                  - fis:ListTagsForResource
                Resource: "*"
        - PolicyName: FISDenyProduction
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Deny
                Action:
                  - fis:*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: prod

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUsers
      Description: Non-Users with read-only access and no FIS permissions
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Deny
                Action:
                  - fis:*
                Resource: "*"

Outputs:
  SecurityAdminsRoleArn:
    Description: ARN of the Security Admins role
    Value: !GetAtt SecurityAdminsRole.Arn
  AdminsRoleArn:
    Description: ARN of the Admins role
    Value: !GetAtt AdminsRole.Arn
  UsersRoleArn:
    Description: ARN of the Users role
    Value: !GetAtt UsersRole.Arn
  NonUsersRoleArn:
    Description: ARN of the Non-Users role
    Value: !GetAtt NonUsersRole.Arn