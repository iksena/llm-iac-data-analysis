AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - IoT Core to SQS via SNS

Resources:
  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        - Protocol: sqs
          Endpoint: !GetAtt SqsQueue.Arn

  IoTRule:
    Type: AWS::IoT::TopicRule
    DependsOn: SnsTopic
    Properties:
      RuleName: DeviceDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TopicArn: !Ref SnsTopic
              MessageFormat: RAW

Outputs:
  SqsQueueUrl:
    Value: !Ref SqsQueue
  SnsTopicArn:
    Value: !Ref SnsTopic