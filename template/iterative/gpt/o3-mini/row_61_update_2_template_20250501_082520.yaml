AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create a private Amazon Route 53 Hosted Zone for internal DNS management within a specified VPC.
Parameters:
  VPCId:
    Description: "The ID of the VPC to associate with the private Hosted Zone."
    Type: AWS::EC2::VPC::Id
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: "Private Route 53 Hosted Zone for internal DNS management within the provided VPC."
Outputs:
  HostedZoneId:
    Description: "The ID of the created private hosted zone."
    Value: !Ref PrivateHostedZone