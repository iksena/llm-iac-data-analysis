AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized Alerting System with SNS, CloudWatch Alarms, and Fallback Mechanism

Resources:
  PrimaryAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralizedAlertTopic
      DisplayName: Centralized Alerting System
      KmsMasterKeyId: alias/aws/sns

  PrimaryTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sns:Publish
              - sns:Subscribe
              - sns:Receive
            Resource:
              Ref: PrimaryAlertTopic
            Condition:
              ArnLike:
                AWS:SourceArn:
                  - arn:aws:cloudwatch:*:*:alarm
                  - arn:aws:rds:*:*:*
                  - arn:aws:s3:*:*:*
                  - arn:aws:budgets:*:*:*
      Topics:
        - Ref: PrimaryAlertTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      TopicArn:
        Ref: PrimaryAlertTopic
      Protocol: email
      Endpoint:
        Ref: EmailEndpoint
      FilterPolicy:
        service:
          - cloudwatch
          - rds
          - s3
          - budgets

  HTTPSSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHTTPSURL
    Properties:
      TopicArn:
        Ref: PrimaryAlertTopic
      Protocol: https
      Endpoint:
        Ref: HTTPSURL
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 20
          maxDelayTarget: 20
          numRetries: 3
          numMaxDelayRetries: 0
          backoffFunction: linear
        throttlePolicy:
          maxInflight: 10
      FilterPolicy:
        service:
          - cloudwatch
          - rds
          - s3
          - budgets

  FallbackAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: FallbackAlertTopic
      DisplayName: Fallback Alerting System
      KmsMasterKeyId: alias/aws/sns

  FallbackEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn:
        Ref: FallbackAlertTopic
      Protocol: email
      Endpoint:
        Ref: FallbackEmailEndpoint

  FailedNotificationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationsAlarm
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: NumberOfNotificationsFailed
      Namespace: AWS/SNS
      Period: 300
      Statistic: Sum
      Threshold: 1
      AlarmActions:
        - Ref: FallbackAlertTopic
      TreatMissingData: notBreaching

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, ""]]
  HasHTTPSURL: !Not [!Equals [!Ref HTTPSURL, ""]]

Parameters:
  EmailEndpoint:
    Type: String
    Description: Email address for primary notifications
    Default: ""
  HTTPSURL:
    Type: String
    Description: HTTPS endpoint for webhook notifications
    Default: ""
  FallbackEmailEndpoint:
    Type: String
    Description: Email address for fallback notifications
    Default: ""

Outputs:
  PrimaryAlertTopicArn:
    Description: ARN of the primary alert topic
    Value:
      Ref: PrimaryAlertTopic
  FallbackAlertTopicArn:
    Description: ARN of the fallback alert topic
    Value:
      Ref: FallbackAlertTopic