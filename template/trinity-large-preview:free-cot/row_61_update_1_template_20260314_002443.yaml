AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a private Amazon Route 53 Hosted Zone for internal DNS management within a VPC.

Parameters:
  VPCName:
    Type: String
    Default: PrivateDNSVPC
    Description: Name of the VPC to create
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  HostedZoneName:
    Type: String
    Default: www.example.com
    Description: Domain name for the private hosted zone

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Ref VPCName

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref HostedZoneName
      VPC:
        VPCId: !Ref VPC
        VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: "Private hosted zone for internal DNS management"

Outputs:
  HostedZoneID:
    Description: ID of the created hosted zone
    Value: !Ref PrivateHostedZone
  VPCID:
    Description: ID of the created VPC
    Value: !Ref VPC
  HostedZoneName:
    Description: Name of the created hosted zone
    Value: !Ref HostedZoneName