AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Role-Based Access Controls and Cross-Account Trust

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'cloudformation:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'cloudhsm:*'
                  - 'aws-portal:ModifyBilling'
                Resource: '*'
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': 'true'

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'cloudformation:*'
                  - 'cloudhsm:*'
                Resource: '*'
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': 'true'

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      Policies:
        - PolicyName: IdentityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'cloudhsm:*'
                  - 'aws-portal:ModifyBilling'
                Resource: '*'
              - Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': 'true'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PrivilegedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'cloudformation:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'cloudhsm:*'
                  - 'aws-portal:ModifyBilling'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSManagedPolicyForMFA

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: RestrictedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'cloudformation:*'
                  - 'cloudhsm:*'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSManagedPolicyForMFA

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: IdentityAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'cloudhsm:*'
                  - 'aws-portal:ModifyBilling'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSManagedPolicyForMFA

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:*'
                  - 'iam:*'
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                  - 'ssm:GetParametersByPath'
                Resource: 'arn:aws:ssm:*:*:parameter/*'
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:DescribeKey'
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: StackSetExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:*'
                  - 'iam:*'
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                  - 'ssm:GetParametersByPath'
                Resource: 'arn:aws:ssm:*:*:parameter/*'
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:DescribeKey'
                Resource: '*'

Parameters:
  IdentityManagementAccount:
    Type: String
    Default: '123456789012'
    Description: Account ID for Identity Management Account
  ToolingManagementAccount:
    Type: String
    Default: '234567890123'
    Description: Account ID for Tooling Management Account

Outputs:
  PrivilegedAdminGroupArn:
    Description: ARN of PrivilegedAdmin Group
    Value: !GetAtt PrivilegedAdminGroup.Arn
  RestrictedAdminGroupArn:
    Description: ARN of RestrictedAdmin Group
    Value: !GetAtt RestrictedAdminGroup.Arn
  IdentityAdminGroupArn:
    Description: ARN of IdentityAdmin Group
    Value: !GetAtt IdentityAdminGroup.Arn
  PrivilegedAdminRoleArn:
    Description: ARN of PrivilegedAdmin Role
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of RestrictedAdmin Role
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of IdentityAdmin Role
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn