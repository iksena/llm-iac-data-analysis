AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for real-time data ingestion and storage pipeline using Amazon Kinesis Data Stream and Kinesis Data Firehose, delivering data to an S3 bucket.

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: MyKinesisStream
  FirehoseName:
    Type: String
    Description: Name of the Kinesis Data Firehose
    Default: MyKinesisFirehose
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket
    Default: my-kinesis-firehose-bucket
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    Default: 1
  S3Prefix:
    Type: String
    Description: S3 prefix for the Kinesis Data Firehose delivery
    Default: 'kinesis/'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled

  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  KinesisDataFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        Prefix: !Ref S3Prefix
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: firehose-s3-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'

Outputs:
  KinesisDataStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn
  KinesisDataFirehoseArn:
    Description: ARN of the Kinesis Data Firehose
    Value: !GetAtt KinesisDataFirehose.Arn
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3BucketName