AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template provisions Linux and Windows EC2 instances (with the SSM agent),
  an SSM Document containing OS-specific Hello World commands,
  an SSM Association that targets instances tagged with HelloWorld=true,
  and an EventBridge Scheduler that triggers a Lambda function every 15 minutes.
  The Lambda function invokes the SSM association by calling ssm:StartAssociationsOnce.
  An S3 bucket is created for execution logs, and the necessary IAM roles are defined.

Parameters:
  LinuxAmi:
    Description: "AMI ID for the Linux instance. Defaults to the latest Amazon Linux 2 AMI from SSM Parameter Store."
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: "/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs"
  WindowsAmi:
    Description: "AMI ID for the Windows instance. Defaults to the latest Windows Server 2019 Base AMI from SSM Parameter Store."
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: "/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base"
  InstanceTypeLinux:
    Description: "EC2 instance type for Linux"
    Type: String
    Default: t3.micro
  InstanceTypeWindows:
    Description: "EC2 instance type for Windows"
    Type: String
    Default: t3.micro
  KeyName:
    Description: >
      Optional EC2 KeyPair name to allow SSH/RDP access to instances.
      If no key is desired, set this parameter value to "NONE".
    Type: String
    Default: "NONE"
    AllowedPattern: "^(NONE|[\\w\\-]+)$"
    ConstraintDescription: "KeyName must be a valid EC2 KeyPair name or 'NONE'."

Conditions:
  HasKeyName:
    Fn::Not:
      - Fn::Equals:
          - !Ref KeyName
          - "NONE"

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ssmexeclogs-${AWS::AccountId}-${AWS::Region}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 30

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EC2InstanceRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${LogBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-EC2InstanceProfile"
      Roles:
        - !Ref EC2InstanceRole

  LinuxEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeLinux
      ImageId: !Ref LinuxAmi
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-LinuxInstance"

  WindowsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeWindows
      ImageId: !Ref WindowsAmi
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-WindowsInstance"

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: !Sub "${AWS::StackName}-HelloWorldDocument"
      Content:
        schemaVersion: '2.2'
        description: "Document to execute OS-specific Hello World commands"
        mainSteps:
          - name: runLinuxCommand
            action: aws:runShellScript
            inputs:
              runCommand:
                - "echo Hello World!"
          - name: runWindowsCommand
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - "Write-Output 'Hello World!'"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: "tag:HelloWorld"
          Values:
            - "true"

  LambdaSSMInvokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-LambdaSSMInvokerRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeSSMAssociation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                Resource: "*"

  SSMInvokerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-SSMInvoker"
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaSSMInvokerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import os
          import boto3
          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              association_id = os.environ.get("SSM_ASSOCIATION_ID")
              if not association_id:
                  return {"Error": "SSM_ASSOCIATION_ID not set"}
              response = ssm.start_associations_once(AssociationId=association_id)
              return response
      Environment:
        Variables:
          SSM_ASSOCIATION_ID: !Ref SSMAssociation

  SchedulerInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-SchedulerInvocationRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt SSMInvokerFunction.Arn

  EventBridgeScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-Scheduler"
      Description: "Trigger Lambda to invoke SSM Association every 15 minutes"
      ScheduleExpression: "rate(15 minutes)"
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt SSMInvokerFunction.Arn
        RoleArn: !GetAtt SchedulerInvocationRole.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 3600
          MaximumRetryAttempts: 0

Outputs:
  LinuxInstanceId:
    Description: "ID of the Linux EC2 instance"
    Value: !Ref LinuxEC2Instance
  WindowsInstanceId:
    Description: "ID of the Windows EC2 instance"
    Value: !Ref WindowsEC2Instance
  LogBucketName:
    Description: "Name of the S3 bucket for execution logs"
    Value: !Ref LogBucket
  ScheduleARN:
    Description: "ARN of the EventBridge Scheduler"
    Value: !GetAtt EventBridgeScheduler.Arn
  SSMInvokerFunctionArn:
    Description: "ARN of the Lambda function that triggers the SSM Association"
    Value: !GetAtt SSMInvokerFunction.Arn