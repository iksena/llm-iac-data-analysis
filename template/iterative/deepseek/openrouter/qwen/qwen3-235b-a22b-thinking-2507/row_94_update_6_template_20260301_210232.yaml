AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large
  SubnetId:
    Description: Subnet ID for the EC2 instance deployment
    Type: AWS::EC2::Subnet::Id
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ssm-logs-${AWS::StackName}'
      VersioningConfiguration:
        Status: Enabled
  SSMAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${S3Bucket.Arn}/*'
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt SSMAutomationRole.Arn
            Action: s3:PutObject
            Resource: !Sub '${S3Bucket.Arn}/*'
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Nginx web server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          echo "SSM Agent pre-installed on Amazon Linux 2"
  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        Fn::Sub:
          - |
            schemaVersion: '0.3'
            description: 'Performs OS updates, Nginx installation, and validation'
            assumeRole: '${RoleArn}'
            parameters:
              InstanceId:
                type: String
                description: 'Target EC2 instance ID'
            mainSteps:
              - name: updateOS
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{InstanceId}}'
                  Parameters:
                    commands:
                      - 'sudo yum update -y'
              - name: rebootInstance
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{InstanceId}}'
                  Parameters:
                    commands:
                      - 'sudo reboot'
              - name: waitForReboot
                action: 'aws:waitFor'
                timeoutSeconds: 900
                inputs:
                  InstanceId: '{{InstanceId}}'
                  WaitType: InstanceOnline
              - name: installNginx
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{InstanceId}}'
                  Parameters:
                    commands:
                      - 'sudo yum install -y nginx'
                      - 'sudo systemctl start nginx'
              - name: validateNginx
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{InstanceId}}'
                  Parameters:
                    commands:
                      - 'until curl -f http://localhost; do sleep 5; done'
          - RoleArn: !GetAtt SSMAutomationRole.Arn
  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      Parameters:
        InstanceId:
          - !Ref EC2Instance
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref S3Bucket
          OutputS3KeyPrefix: automation-logs
Outputs:
  InstanceId:
    Description: EC2 instance identifier
    Value: !Ref EC2Instance
  S3BucketName:
    Description: S3 bucket for automation logs
    Value: !Ref S3Bucket
  SSMAutomationDocumentName:
    Description: SSM Automation document name
    Value: !Ref SSMAutomationDocument