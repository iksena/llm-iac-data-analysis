AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for MySQL RDS instance with Secrets Manager integration'

Parameters:
  DBName:
    Description: 'The database name'
    Type: String
    Default: 'applicationdb'
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'

  DBUsername:
    Description: 'The database admin username'
    Type: String
    Default: 'admin'
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'

  UseDefaultVPC:
    Description: 'Whether to use the default VPC and subnets'
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    ConstraintDescription: 'Must be true or false'

  VpcId:
    Description: 'VPC ID where the RDS instance will be deployed (required if not using default VPC)'
    Type: AWS::EC2::VPC::Id
    Default: ''

  Subnet1Id:
    Description: 'First private subnet ID (required if not using default VPC)'
    Type: AWS::EC2::Subnet::Id
    Default: ''

  Subnet2Id:
    Description: 'Second private subnet ID (required if not using default VPC)'
    Type: AWS::EC2::Subnet::Id
    Default: ''

  EnvironmentType:
    Description: 'Environment type'
    Type: String
    Default: 'dev'
    AllowedValues:
      - 'dev'
      - 'test'
      - 'prod'
    ConstraintDescription: 'Must be dev, test, or prod'

Conditions:
  UseDefaultVPC: !Equals [!Ref UseDefaultVPC, 'true']

Mappings:
  EnvironmentSettings:
    dev:
      DBInstanceClass: 'db.t3.micro'
      AllocatedStorage: '20'
    test:
      DBInstanceClass: 'db.t3.micro'
      AllocatedStorage: '50'
    prod:
      DBInstanceClass: 'db.t3.micro'
      AllocatedStorage: '100'

Resources:
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}-db-secret'
      Description: 'Database credentials'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Custom MySQL parameter group'
      Family: 'mysql8.0'
      Parameters:
        character_set_server: 'utf8mb4'
        collation_server: 'utf8mb4_unicode_ci'

  DefaultVPC:
    Type: AWS::EC2::VPC
    Condition: UseDefaultVPC
    Properties:
      CidrBlock: '172.31.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true

  DefaultSubnet1:
    Type: AWS::EC2::Subnet
    Condition: UseDefaultVPC
    Properties:
      VpcId: !Ref DefaultVPC
      CidrBlock: '172.31.0.0/20'
      AvailabilityZone: !Select [0, !GetAZs '']

  DefaultSubnet2:
    Type: AWS::EC2::Subnet
    Condition: UseDefaultVPC
    Properties:
      VpcId: !Ref DefaultVPC
      CidrBlock: '172.31.16.0/20'
      AvailabilityZone: !Select [1, !GetAZs '']

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for RDS instance'
      SubnetIds: !If
        - UseDefaultVPC
        - [!Ref DefaultSubnet1, !Ref DefaultSubnet2]
        - [!Ref Subnet1Id, !Ref Subnet2Id]

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for RDS instance'
      VpcId: !If
        - UseDefaultVPC
        - !Ref DefaultVPC
        - !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: '10.0.0.0/16'

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      DBInstanceClass: !FindInMap ['EnvironmentSettings', !Ref EnvironmentType, 'DBInstanceClass']
      AllocatedStorage: !FindInMap ['EnvironmentSettings', !Ref EnvironmentType, 'AllocatedStorage']
      Engine: 'mysql'
      EngineVersion: '8.0.35'
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}::username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}::password}}'
      DBParameterGroupName: !Ref DBParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      MultiAZ: false
      StorageType: 'gp2'
      PubliclyAccessible: false
      DeletionProtection: false
      BackupRetentionPeriod: 7
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: 'Name'
          Value: !Sub '${AWS::StackName}-rds-instance'

Outputs:
  DBEndpoint:
    Description: 'Connection endpoint for the database'
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DBEndpoint'

  DBSecretARN:
    Description: 'ARN of the Secrets Manager secret containing database credentials'
    Value: !Ref DBSecret
    Export:
      Name: !Sub '${AWS::StackName}-DBSecretARN'

  DBParameterGroupName:
    Description: 'Name of the custom DB parameter group'
    Value: !Ref DBParameterGroup
    Export:
      Name: !Sub '${AWS::StackName}-DBParameterGroupName'