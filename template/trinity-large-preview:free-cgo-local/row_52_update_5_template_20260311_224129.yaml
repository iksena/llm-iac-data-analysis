AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-region application failover architecture using Route 53 Application Recovery Controller

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: MultiRegionRecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: MultiRegionControlPanel
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: Region1RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: Region2RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: AtLeastOneRegionActive
      RuleConfig:
        RuleType: ATLEAST
        Threshold: 1
        EvaluationPeriod: 1
      SafetyRuleType: SAFETY
      RoutingControls:
        - ControlArn: !GetAtt RoutingControlRegion1.RoutingControlArn
        - ControlArn: !GetAtt RoutingControlRegion2.RoutingControlArn

  HealthCheckRegion1:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      Name: Region1HealthCheck
      HealthCheckConfig:
        Port: 80
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region1.com
        RequestInterval: 30
        FailureThreshold: 3

  HealthCheckRegion2:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      Name: Region2HealthCheck
      HealthCheckConfig:
        Port: 80
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region2.com
        RequestInterval: 30
        FailureThreshold: 3

  HealthCheckSafetyRuleRegion1:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: Region1HealthCheckRule
      RuleConfig:
        RuleType: ATLEAST
        Threshold: 1
        EvaluationPeriod: 1
      SafetyRuleType: GATING
      RoutingControls:
        - ControlArn: !GetAtt RoutingControlRegion1.RoutingControlArn
      HealthCheckArn: !GetAtt HealthCheckRegion1.HealthCheckArn

  HealthCheckSafetyRuleRegion2:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: Region2HealthCheckRule
      RuleConfig:
        RuleType: ATLEAST
        Threshold: 1
        EvaluationPeriod: 1
      SafetyRuleType: GATING
      RoutingControls:
        - ControlArn: !GetAtt RoutingControlRegion2.RoutingControlArn
      HealthCheckArn: !GetAtt HealthCheckRegion2.HealthCheckArn

Outputs:
  ClusterArn:
    Description: ARN of the Route 53 Recovery Cluster
    Value: !GetAtt RecoveryCluster.ClusterArn
  ControlPanelArn:
    Description: ARN of the Control Panel
    Value: !GetAtt ControlPanel.ControlPanelArn
  RoutingControlRegion1Arn:
    Description: ARN of the Routing Control for Region 1
    Value: !GetAtt RoutingControlRegion1.RoutingControlArn
  RoutingControlRegion2Arn:
    Description: ARN of the Routing Control for Region 2
    Value: !GetAtt RoutingControlRegion2.RoutingControlArn