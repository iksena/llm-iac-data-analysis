AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate task with Cloud Map service discovery
Resources:
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: MyECSCluster
  MyECSService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref MyECSCluster
      DesiredCount: 1
      LaunchType: FARGATE
      ServiceName: MyECSService
      TaskDefinition: !Ref MyECSTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref Subnet1
            - !Ref Subnet2
          SecurityGroups:
            - !Ref SecurityGroup
  MyECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: MyECSTaskDefinition
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ContainerDefinitions:
        - Name: nginx
          Image: nginx:latest
          PortMappings:
            - ContainerPort: 80
              HostPort: 80
              Protocol: tcp
  MyCloudMapNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: MyCloudMapNamespace
      Description: Namespace for ECS Fargate service
  MyCloudMapService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: MyCloudMapService
      NamespaceId: !Ref MyCloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 300
      HealthCheckCustomConfig:
        FailureThreshold: 2
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: /
      ServiceType: HTTP
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS Fargate task
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-east-1b
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

Outputs:
  CloudMapServiceURL:
    Value: !GetAtt MyCloudMapService.DNSRecord.A
    Description: The DNS record for the Cloud Map service.

