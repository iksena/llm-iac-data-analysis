AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with secure, role-based access controls and cross-account trust configurations

Parameters:
  TrustedAccountIds:
    Type: List<String>
    Description: List of trusted account IDs for cross-account access
    Default: '["123456789012"]'
  ToolingManagementAccountId:
    Type: String
    Description: ID of the tooling management account
    Default: '123456789012'

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  CloudFormationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ToolingManagementAccountId
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  StackSetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ToolingManagementAccountId
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  PrivilegedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminPolicy
      Roles:
        - !Ref PrivilegedAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  RestrictedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminPolicy
      Roles:
        - !Ref RestrictedAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'iam:*'
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminPolicy
      Roles:
        - !Ref IdentityAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'organizations:*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  CloudFormationPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudFormationPolicy
      Roles:
        - !Ref CloudFormationRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:*'
              - 's3:GetObject'
              - 's3:GetObjectVersion'
            Resource: '*'
          - Effect: Allow
            Action:
              - 's3:PutObject'
            Resource:
              - 'arn:aws:s3:::*-templates/*'
          - Effect: Allow
            Action:
              - 's3:List*'
            Resource: '*'

  StackSetPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StackSetPolicy
      Roles:
        - !Ref StackSetRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:CreateStackInstances'
              - 'cloudformation:CreateStackSet'
              - 'cloudformation:DeleteStackInstances'
              - 'cloudformation:DeleteStackSet'
              - 'cloudformation:Describe*'
              - 'cloudformation:List*'
              - 'cloudformation:UpdateStackInstances'
              - 'cloudformation:UpdateStackSet'
            Resource: '*'