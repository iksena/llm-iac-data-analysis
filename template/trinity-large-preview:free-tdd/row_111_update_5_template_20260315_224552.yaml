AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyDataDogAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogApp

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: DataDogConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: testanu

  DataDogDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue

  DataDogLogDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogDestination
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogLogDestination.Arn

  DataDogLogForwardingRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: MyDataDogApp
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogLogDestination.Arn
          Id: DataDogLogTarget