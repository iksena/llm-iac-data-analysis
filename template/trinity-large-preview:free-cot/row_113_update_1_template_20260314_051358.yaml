AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeDemoTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: EventBridgeDemoTopic

  EventBridgeDemoTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventBridgeDemoTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EventBridgeDemoTopic

  EventBridgeDemoRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Routes demo.cli events to SNS topic
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref EventBridgeDemoTopic
          Id: EventBridgeDemoTarget