AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with DataDog for centralized log forwarding'

Parameters:
  DataDogAPIKey:
    Type: String
    NoEcho: true
    Description: DataDog API key for authentication. Must be kept secret.

Resources:
  DLQQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogEventBridgeDLQ

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DLQAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DLQQueue.Arn

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: !Ref DataDogAPIKey
      Name: DataDogConnection

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !Ref DataDogConnection
      HttpMethod: POST
      InvocationEndpoint: https://http-intake.logs.datadoghq.com/v1/input
      Name: DataDogApiDestination

  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppEventBus

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref DataDogEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Id: DataDogLogsTarget
          Arn: !Ref DataDogApiDestination
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DLQQueue.Arn

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge event bus
    Value: !Ref DataDogEventBus
  RuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventRule
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !Ref DataDogApiDestination
  DLQQueueURL:
    Description: URL of the dead-letter SQS queue
    Value: !Ref DLQQueue