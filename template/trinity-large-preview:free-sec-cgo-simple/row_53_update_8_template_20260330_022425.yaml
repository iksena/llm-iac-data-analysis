AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/EMRFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Path: /
      RoleName: EMRServerlessRole

  EMRScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: emr-serverless-scripts-bucket
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: emr-serverless-spark-app
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      InitialCapacity:
        - Worker:
            WeightedCapacity: 1
      MaximumCapacity:
        Cpu: 16
        Memory: 64
      AutoStartConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 5
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 10
      Architecture: ARM64
      NetworkConfiguration:
        SubnetIds:
          - !Select [0, !GetAZs '']

Outputs:
  EMRApplicationName:
    Description: EMR Serverless Application Name
    Value: !Ref EMRServerlessApplication
  EMRApplicationArn:
    Description: EMR Serverless Application ARN
    Value: !GetAtt EMRServerlessApplication.Arn