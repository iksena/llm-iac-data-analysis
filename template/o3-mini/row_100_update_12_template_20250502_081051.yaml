AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that creates a standardized IAM baseline with
  secure, role-based access controls and cross-account trust configurations for AWS account governance.

Parameters:
  ResourcePrefix:
    Description: "Prefix used for IAM resource names to avoid naming collisions."
    Type: String
    Default: "Standard"
  IdentityManagementAccountId:
    Description: "AWS Account ID for Identity Management Account (12-digit numeric ID). Use an empty string if not provided."
    Type: String
    Default: ""
    AllowedPattern: "(^$)|(^\\d{12}$)"
    ConstraintDescription: "IdentityManagementAccountId must be a 12-digit AWS account number or an empty string."
  ToolingManagementAccountId:
    Description: "AWS Account ID for Tooling Management Account (12-digit numeric ID). Use an empty string if not provided."
    Type: String
    Default: ""
    AllowedPattern: "(^$)|(^\\d{12}$)"
    ConstraintDescription: "ToolingManagementAccountId must be a 12-digit AWS account number or an empty string."

Conditions:
  IdentityMgmtProvided: 
    !Not
      - !Equals 
          - !Ref IdentityManagementAccountId
          - ""
  ToolingMgmtProvided: 
    !Not
      - !Equals 
          - !Ref ToolingManagementAccountId
          - ""

Resources:
  PrivilegedAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-PrivilegedAdmin"
      Path: "/"

  RestrictedAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-RestrictedAdmin"
      Path: "/"

  IdentityAdminGroup:
    Type: "AWS::IAM::Group"
    Properties:
      GroupName: !Sub "${ResourcePrefix}-IdentityAdmin"
      Path: "/"

  PrivilegedAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-PrivilegedAdminPolicy"
      Groups:
        - !Ref PrivilegedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "RequireMFAForAllActions"
            Effect: "Allow"
            Action: "*"
            Resource: "*"
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  RestrictedAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-RestrictedAdminPolicy"
      Groups:
        - !Ref RestrictedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowReadOnlyAccess"
            Effect: "Allow"
            Action:
              - "ec2:Describe*"
              - "cloudwatch:Describe*"
              - "logs:Describe*"
            Resource: "*"

  IdentityAdminManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-IdentityAdminPolicy"
      Groups:
        - !Ref IdentityAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "IAMAndOrganizationsFullAccessWithMFA"
            Effect: "Allow"
            Action:
              - "iam:*"
              - "organizations:*"
            Resource: "*"
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  CrossAccountGovernanceRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "${ResourcePrefix}-CrossAccountGovernanceRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCrossAccountAssumeRoleWithMFA"
            Effect: "Allow"
            Principal:
              AWS:
                - !If 
                    - IdentityMgmtProvided
                    - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                    - !Ref "AWS::NoValue"
                - !If 
                    - ToolingMgmtProvided
                    - !Sub "arn:aws:iam::${ToolingManagementAccountId}:root"
                    - !Ref "AWS::NoValue"
            Action: "sts:AssumeRole"
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  CFNExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "${ResourcePrefix}-CFNExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationAssumeRole"
            Effect: "Allow"
            Principal:
              Service: "cloudformation.amazonaws.com"
            Action: "sts:AssumeRole"

  StackSetExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Sub "${ResourcePrefix}-StackSetExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationForStackSet"
            Effect: "Allow"
            Principal:
              Service: "cloudformation.amazonaws.com"
            Action: "sts:AssumeRole"

  CrossAccountGovernanceManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-CrossAccountGovernancePolicy"
      Roles:
        - !Ref CrossAccountGovernanceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "ExplicitDenySensitiveOperations"
            Effect: "Deny"
            Action:
              - "aws-portal:*"
              - "cloudhsm:*"
            Resource: "*"
          - Sid: "AllowAllOtherActions"
            Effect: "Allow"
            Action: "*"
            Resource: "*"

  CFNExecutionRoleManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-CFNExecutionPolicy"
      Roles:
        - !Ref CFNExecutionRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "CFNPermissions"
            Effect: "Allow"
            Action:
              - "cloudformation:CreateStack"
              - "cloudformation:UpdateStack"
              - "cloudformation:ValidateTemplate"
              - "iam:PassRole"
            Resource: "*"

  StackSetExecutionRoleManagedPolicy:
    Type: "AWS::IAM::ManagedPolicy"
    Properties:
      ManagedPolicyName: !Sub "${ResourcePrefix}-StackSetExecutionPolicy"
      Roles:
        - !Ref StackSetExecutionRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "StackSetPermissions"
            Effect: "Allow"
            Action:
              - "cloudformation:CreateStack"
              - "cloudformation:UpdateStack"
              - "cloudformation:DeleteStack"
              - "iam:PassRole"
            Resource: "*"

Outputs:
  PrivilegedAdminGroupName:
    Description: "Name of the Privileged Admin IAM Group"
    Value: !Ref PrivilegedAdminGroup
  RestrictedAdminGroupName:
    Description: "Name of the Restricted Admin IAM Group"
    Value: !Ref RestrictedAdminGroup
  IdentityAdminGroupName:
    Description: "Name of the Identity Admin IAM Group"
    Value: !Ref IdentityAdminGroup
  CrossAccountGovernanceRoleARN:
    Description: "ARN of the Cross-Account Governance Role"
    Value: !GetAtt CrossAccountGovernanceRole.Arn
  CFNExecutionRoleARN:
    Description: "ARN of the CloudFormation Execution Role"
    Value: !GetAtt CFNExecutionRole.Arn
  StackSetExecutionRoleARN:
    Description: "ARN of the StackSet Execution Role"
    Value: !GetAtt StackSetExecutionRole.Arn