AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy a production-ready AppSync GraphQL API (PetShopAPI)
  with API_KEY authentication backed by a Lambda function returning static pet data.

Resources:
  PetLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt PetLambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              // Return a static list of pet data
              const pets = [
                  { id: "1", name: "Buddy", type: "Dog" },
                  { id: "2", name: "Mittens", type: "Cat" },
                  { id: "3", name: "Nibbles", type: "Hamster" }
              ];
              return pets;
          };

  AppSyncGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY

  AppSyncApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId

  AppSyncGraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  AppSyncLambdaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AppSyncLambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetLambdaFunction.Arn

  AppSyncLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      Name: LambdaDataSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn
      ServiceRoleArn: !GetAtt AppSyncLambdaServiceRole.Arn

  AppSyncResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !Ref AppSyncLambdaDataSource
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result)

Outputs:
  GraphqlApiId:
    Description: "The GraphQL API ID for PetShopAPI"
    Value: !GetAtt AppSyncGraphQLApi.ApiId

  GraphqlApiUrl:
    Description: "The GraphQL API endpoint URL for PetShopAPI"
    Value: !GetAtt AppSyncGraphQLApi.GraphQLUrl

  GraphqlApiKey:
    Description: "The API Key for accessing PetShopAPI"
    Value: !Ref AppSyncApiKey