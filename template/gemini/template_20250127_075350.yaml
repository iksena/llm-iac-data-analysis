

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket for website hosting.'
Parameters:
  BucketName:
    Type: String
    Description: The name of the S3 bucket.
    Default: my-website-bucket
    AllowedPattern: '^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name.'
  IndexDocument:
    Type: String
    Description: The index document for the website.
    Default: index.html
  ErrorDocument:
    Type: String
    Description: The error document for the website.
    Default: error.html
Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      WebsiteConfiguration:
        IndexDocument: !Ref IndexDocument
        ErrorDocument: !Ref ErrorDocument
      DeletionPolicy: Retain
Outputs:
  BucketURL:
    Value: !Sub 'https://s3-website-${AWS::Region}.amazonaws.com/${BucketName}'
    Description: URL of the S3 website bucket.
  BucketName:
    Value: !Ref BucketName
    Description: Name of the S3 website bucket.

