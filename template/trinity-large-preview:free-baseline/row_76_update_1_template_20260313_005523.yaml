AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles with Tiered Permissions for FIS Management

Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - faultsimulator:*
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
        - PolicyName: ServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Admins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - faultsimulator:*
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
        - PolicyName: ServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'
        - PolicyName: ProdFISDeny
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - faultsimulator:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: prod

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISExperimentActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - faultsimulator:StartExperiment
                  - faultsimulator:StopExperiment
                Resource: '*'
        - PolicyName: FISReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - faultsimulator:Get*
                  - faultsimulator:List*
                Resource: '*'
        - PolicyName: FISTagging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - faultsimulator:TagResource
                  - faultsimulator:UntagResource
                Resource: '*'
        - PolicyName: ProdFISDeny
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - faultsimulator:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: prod

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUsers
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - faultsimulator:*
                Resource: '*'