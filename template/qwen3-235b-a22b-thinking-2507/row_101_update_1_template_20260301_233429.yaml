AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VPCCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC
  LogPrefix:
    Type: String
    Default: ''
    Description: Optional prefix path for flow logs (e.g., prod/vpc/)
    AllowedPattern: '^[a-zA-Z0-9!_.*''()-]*$'
    ConstraintDescription: Must contain only alphanumeric characters and valid S3 path characters
  BucketName:
    Type: String
    Default: ''
    Description: Custom S3 bucket name (leave empty for auto-generated)
    AllowedPattern: '^[a-z0-9.-]*$'
    ConstraintDescription: Must be lowercase alphanumeric with dots and hyphens only

Resources:
  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [IsCustomBucketName, !Ref BucketName, !Sub 'vpc-flowlogs-${AWS::AccountId}-${AWS::Region}']
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${FlowLogsBucket}/${LogPrefix}AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Sid: DenyInsecureAccess
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${FlowLogsBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  VPCFlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogsS3Permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${FlowLogsBucket}/${LogPrefix}AWSLogs/${AWS::AccountId}/*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MainVPC

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogsRole.Arn
      LogDestination: !Sub 'arn:${AWS::Partition}:s3:::${FlowLogsBucket}/${LogPrefix}'
      LogDestinationType: s3
      ResourceType: VPC
      ResourceId: !Ref VPC
      TrafficType: ALL
      MaxAggregationInterval: 60

Outputs:
  FlowLogBucketName:
    Description: Name of the S3 bucket storing flow logs
    Value: !Ref FlowLogsBucket
    Export:
      Name: !Sub '${AWS::StackName}-FlowLogBucketName'
  VpcId:
    Description: ID of the created VPC
    Value: !Ref VPC
  FlowLogId:
    Description: ID of the flow log resource
    Value: !Ref VPCFlowLog
Conditions:
  IsCustomBucketName: !Not [!Equals [!Ref BucketName, '']]