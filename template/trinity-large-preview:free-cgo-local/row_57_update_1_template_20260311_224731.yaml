AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a basic Amazon ECS cluster with monitoring capabilities

Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: Name of the ECS cluster
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Retention period for CloudWatch logs in days

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      Settings:
        - Name: containerInsights
          Value: enabled

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-TaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS cluster
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ClusterName}
      RetentionInDays: !Ref LogRetentionInDays
    DeletionPolicy: Retain

  CloudWatchContainerInsightsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ClusterName}-ContainerInsightsRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  ECSMonitoringInsightRule:
    Type: AWS::CloudWatch::InsightRule
    Properties:
      RuleName: !Sub ${ClusterName}-MonitoringRule
      RuleState: ENABLED
      Schema: cloudwatch/logs
      Definition: |
        {
          "Schema": {
            "Name": "CloudWatchLogRule",
            "Version": 1
          },
          "LogGroupNames": [
            !Sub /ecs/${ClusterName}
          ],
          "LogFormat": "json",
          "TimeZone": "UTC",
          "Contribution": {
            "Keys": [
              "$.containerName"
            ],
            "Filters": [],
            "Aggregation": "Count"
          }
        }

Outputs:
  ClusterName:
    Description: Name of the ECS cluster
    Value: !Ref ECSCluster
  ClusterArn:
    Description: ARN of the ECS cluster
    Value: !GetAtt ECSCluster.Arn
  TaskExecutionRoleArn:
    Description: ARN of the ECS task execution role
    Value: !GetAtt ECSTaskExecutionRole.Arn
  LogGroupName:
    Description: Name of the CloudWatch log group
    Value: !Ref CloudWatchLogGroup