AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with two EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet where the ENI will be created'
  
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: 'Security Group for the ENI'
  
  PrimaryPrivateIP:
    Type: String
    Description: 'Primary private IP address for the ENI'
    Default: '10.0.0.10'
  
  SecondaryPrivateIP:
    Type: String
    Description: 'Secondary private IP address for the ENI'
    Default: '10.0.0.11'

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: 'Network Interface with multiple IPs'
      GroupSet: 
        - !Ref SecurityGroupId
      PrivateIpAddress: !Ref PrimaryPrivateIP
      SecondaryPrivateIpAddresses:
        - !Ref SecondaryPrivateIP

  FirstEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  SecondEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrimaryPrivateIP

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: FirstEIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIP

Outputs:
  NetworkInterfaceId:
    Description: 'ID of the created Network Interface'
    Value: !Ref NetworkInterface

  FirstEIPAddress:
    Description: 'First Elastic IP Address'
    Value: !Ref FirstEIP

  SecondEIPAddress:
    Description: 'Second Elastic IP Address'
    Value: !Ref SecondEIP