AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of private subnet IDs for Batch compute
  ComputeEnvironmentType:
    Type: String
    Default: MANAGED
    AllowedValues: [MANAGED, UNMANAGED]
    Description: Type of Batch compute environment
  ComputeInstanceTypes:
    Type: CommaDelimitedList
    Default: c5.large,c5.xlarge
    Description: EC2 instance types for Batch compute
  EcrImageUri:
    Type: String
    Description: ECR image URI for the Batch job container

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderEventsQueue
      VisibilityTimeout: 1800

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [batch.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: ECSExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute
      VpcId: !Ref VpcId

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: !Ref ComputeEnvironmentType
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes: !Ref ComputeInstanceTypes
        Subnets: !Ref SubnetIds
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        InstanceRole: !GetAtt ECSTaskExecutionRole.Arn

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref EcrImageUri
        Vcpus: 1
        Memory: 1024
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      PlatformCapabilities:
        - EC2

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [pipes.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: PipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: '*'

  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: OrderEventToBatchPipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt EventQueue.Arn
      Target: !Sub 'arn:${AWS::Partition}:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}'
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: OrderProcessingJob
      FilterCriteria:
        Filters:
          - Pattern: '{"body": {"eventType": ["OrderCreated"]}}'

Outputs:
  EventQueueUrl:
    Description: URL of the SQS queue for event submission
    Value: !Ref EventQueue
  BatchJobQueueArn:
    Description: ARN of the Batch job queue
    Value: !Ref BatchJobQueue
  EventPipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventPipe.Arn