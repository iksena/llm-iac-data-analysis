AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with monitoring capabilities'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'production'
    Description: 'Environment name for the ECS cluster'
  
  MonitoringEnabled:
    Type: String
    Default: 'true'
    AllowedValues: 
      - 'true'
      - 'false'
    Description: 'Enable CloudWatch monitoring'

  LogRetentionDays:
    Type: Number
    Default: 30
    Description: 'CloudWatch Log retention period in days'
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

Conditions:
  MonitoringIsEnabled: !Equals [!Ref MonitoringEnabled, 'true']

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${EnvironmentName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref MonitoringEnabled
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSClusterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${EnvironmentName}-cluster'
      RetentionInDays: !Ref LogRetentionDays

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-ecs-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-ecs-service-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSServiceRole

  ClusterCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: MonitoringIsEnabled
    Properties:
      AlarmName: !Sub '${EnvironmentName}-cluster-cpu-high'
      AlarmDescription: 'Cluster CPU utilization is too high'
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      ComparisonOperator: GreaterThanThreshold
      Threshold: 80
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster

  ClusterMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: MonitoringIsEnabled
    Properties:
      AlarmName: !Sub '${EnvironmentName}-cluster-memory-high'
      AlarmDescription: 'Cluster memory utilization is too high'
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      ComparisonOperator: GreaterThanThreshold
      Threshold: 80
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster

Outputs:
  ClusterName:
    Description: 'ECS Cluster Name'
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ClusterName'

  ClusterArn:
    Description: 'ECS Cluster ARN'
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ClusterArn'

  TaskExecutionRoleArn:
    Description: 'ECS Task Execution Role ARN'
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TaskExecutionRoleArn'

  LogGroupName:
    Description: 'CloudWatch Log Group Name'
    Value: !Ref ECSClusterLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-LogGroupName'