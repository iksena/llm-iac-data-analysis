AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready S3 bucket with SQS notification integration for object creation events'

Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Optional custom name for S3 bucket (leave empty for AWS-generated name)
    MinLength: 0
    MaxLength: 63
    AllowedPattern: "^[a-z0-9][a-z0-9\.-]{1,61}[a-z0-9]$|^$"
  QueueName:
    Type: String
    Default: ''
    Description: Optional custom name for SQS queue (leave empty for AWS-generated name)
    MinLength: 0
    MaxLength: 80
    AllowedPattern: "^[0-9A-Za-z_-]{1,80}$|^$"

Resources:
  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Condition
        - ShouldCreateCustomQueueName
        - !Ref QueueName
        - !Ref AWS::NoValue
      Description: SQS queue for S3 object creation notifications
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600

  NotificationBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Condition
        - ShouldCreateCustomBucketName
        - !Ref BucketName
        - !Ref AWS::NoValue
      Description: Bucket configured to send object creation events to SQS
      NotificationConfiguration:
        QueueConfigurations:
          - Queue: !GetAtt NotificationQueue.Arn
            Events:
              - s3:ObjectCreated:*

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: NotificationQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt NotificationBucket.Arn

Conditions:
  ShouldCreateCustomBucketName: !Not [!Equals [!Ref BucketName, '']]
  ShouldCreateCustomQueueName: !Not [!Equals [!Ref QueueName, '']]

Outputs:
  BucketName:
    Value: !Ref NotificationBucket
    Description: Name of the S3 bucket receiving object uploads
  QueueUrl:
    Value: !Ref NotificationQueue
    Description: URL of the SQS queue receiving S3 notifications
  QueueArn:
    Value: !GetAtt NotificationQueue.Arn
    Description: ARN of the SQS queue for programmatic access