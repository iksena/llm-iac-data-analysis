AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StageName:
    Type: String
    Default: prod
    Description: API deployment stage name
  RateLimit:
    Type: Number
    Default: 100
    Description: Maximum requests per second
  BurstLimit:
    Type: Number
    Default: 50
    Description: Maximum burst requests
  ApiKeyName:
    Type: String
    Default: MusicApi-Key
    Description: Name for the API key
  UsagePlanName:
    Type: String
    Default: MusicAPI-UsagePlan
    Description: Name for the usage plan
Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      AttributeDefinitions:
        - AttributeName: SongTitle
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: SongTitle
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Music'
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/Music/index/Artist-Index'

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicAPI
      EndpointConfiguration:
        Types:
          - REGIONAL

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music
      RestApiId: !Ref MusicApi

  PostMusicMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: API_KEY
      ApiKeyRequired: true
      HttpMethod: POST
      ResourceId: !Ref MusicResource
      RestApiId: !Ref MusicApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "SongTitle": { "S": "$input.path('$.songTitle')" },
                "Artist": { "S": "$input.path('$.artist')" },
                "Album": { "S": "$input.path('$.album')" }
              }
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              "method.response.header.Content-Type": "'application/json'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            "method.response.header.Content-Type": true

  GetMusicByArtistMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: API_KEY
      ApiKeyRequired: true
      HttpMethod: GET
      ResourceId: !Ref MusicResource
      RestApiId: !Ref MusicApi
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": { "S": "$input.params('artist')" }
              }
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              "method.response.header.Content-Type": "'application/json'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            "method.response.header.Content-Type": true
            "method.response.header.Access-Control-Allow-Origin": true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMusicMethod
      - GetMusicByArtistMethod
    Properties:
      RestApiId: !Ref MusicApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref StageName
      RestApiId: !Ref MusicApi
      DeploymentId: !Ref ApiDeployment

  MusicUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: !Ref UsagePlanName
      Description: Usage plan for Music API
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref StageName
      Throttle:
        BurstLimit: !Ref BurstLimit
        RateLimit: !Ref RateLimit

  MusicApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Ref ApiKeyName
      Enabled: true

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicUsagePlan
Outputs:
  ApiUrl:
    Description: API endpoint URL
    Value: !Sub 'https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
  UsagePlanId:
    Description: Usage plan identifier
    Value: !Ref MusicUsagePlan
  ApiKeyId:
    Description: API key identifier
    Value: !Ref MusicApiKey