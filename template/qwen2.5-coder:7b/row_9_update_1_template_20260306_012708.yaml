AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EFSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting the EFS file system
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      AvailabilityZoneName: us-east-1a
      Encrypted: true
      KmsKeyId: !Ref EFSKey
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EFSFileSystem
    Export:
      Name: EFSFileSystemId

  KMSKeyArn:
    Description: The ARN of the KMS key used for encryption
    Value: !GetAtt EFSKey.Arn
    Export:
      Name: EFSKMSKeyArn