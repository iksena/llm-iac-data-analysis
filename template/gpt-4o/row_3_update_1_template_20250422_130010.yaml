AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an S3 bucket for static website hosting with a DeletionPolicy.

Resources:
  WebsiteBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
    DeletionPolicy: Retain

Outputs:
  WebsiteURL:
    Description: "URL for the website hosted on S3"
    Value: !GetAtt 
      - WebsiteBucket
      - WebsiteURL