AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge Pipes workflow for enriching SQS messages with location data'

Parameters:
  ApiEndpointUrl:
    Type: String
    Default: 'https://api.zippopotam.us/us'
    Description: Base URL for the ZIP code API
  
  LogRetentionDays:
    Type: Number
    Default: 30
    Description: Number of days to retain logs
    
  QueueName:
    Type: String
    Default: 'enrichment-queue'
    Description: Name of the SQS queue

Resources:
  EnrichmentQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20

  EnrichmentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/pipes/${AWS::StackName}'
      RetentionInDays: !Ref LogRetentionDays

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub '${AWS::StackName}-pipe-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EnrichmentQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt EnrichmentLogGroup.Arn
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  ApiConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection for ZIP code API
      Name: !Sub '${AWS::StackName}-api-connection'
      ApiKeyAuthParameters:
        ApiKeyName: 'x-api-key'
        ApiKeyValue: 'dummy-key'

  ApiDestination:
    Type: AWS::EventBridge::ApiDestination
    DependsOn: ApiConnection
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: GET
      InvocationEndpoint: !Ref ApiEndpointUrl
      InvocationRateLimitPerSecond: 10

  EnrichmentPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: [ApiDestination, EnrichmentQueue, EnrichmentLogGroup, PipeRole]
    Properties:
      Name: !Sub '${AWS::StackName}-enrichment-pipe'
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt EnrichmentQueue.Arn
      Target: !GetAtt EnrichmentLogGroup.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      Enrichment: !GetAtt ApiDestination.Arn
      TargetParameters:
        InputTemplate: '{"timestamp":"$.time","messageId":"$.id","zipCode":"$.body.zipCode","locationData":"$.enrichmentResult"}'

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref EnrichmentQueue

  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt EnrichmentQueue.Arn

  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref EnrichmentLogGroup

  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EnrichmentPipe.Arn