AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for AWS Service Catalog to manage S3 and Lambda resources'

Resources:
  ServiceCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Tags:
        - Key: Purpose
          Value: ServiceCatalogAutomation

  ServiceCatalogCustomPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ServiceCatalogCustomPermissions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - servicecatalog:*
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:GetRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:PassRole
            Resource: 
              - !Sub arn:aws:iam::${AWS::AccountId}:role/*
          - Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:ListFunctions
              - lambda:AddPermission
              - lambda:RemovePermission
            Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*
          - Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:UpdateStack
              - cloudformation:ListStacks
            Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*
          - Effect: Allow
            Action:
              - sns:CreateTopic
              - sns:DeleteTopic
              - sns:ListTopics
              - sns:Publish
              - sns:Subscribe
              - sns:Unsubscribe
            Resource: !Sub arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*
      Roles:
        - !Ref ServiceCatalogRole

Outputs:
  ServiceCatalogRoleARN:
    Description: ARN of the Service Catalog execution role
    Value: !GetAtt ServiceCatalogRole.Arn
  ServiceCatalogRoleName:
    Description: Name of the Service Catalog execution role
    Value: !Ref ServiceCatalogRole