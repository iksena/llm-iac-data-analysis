AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Bedrock Service with Agent and Lambda Integration

Resources:
  BedrockAgentIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole

  BedrockAgentIntegrationPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BedrockAgentIntegrationPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeAgent
            Resource: '*'
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: '*'
      Roles:
        - !Ref BedrockAgentIntegrationRole