AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an S3 bucket for storing VPC flow logs with
  automated lifecycle management and strict access controls.

Parameters:
  BucketName:
    Description: Optional custom name for the S3 bucket
    Type: String
    Default: ''
    AllowedPattern: '^[a-z0-9.-]*$'
    ConstraintDescription: Must be a valid S3 bucket name.
  
  EnableVersioning:
    Description: Enable or suspend versioning for the S3 bucket
    Type: String
    Default: 'Enabled'
    AllowedValues: ['Enabled', 'Suspended']
  
  TransitionDays:
    Description: Number of days before transitioning logs to Glacier
    Type: Number
    Default: 30
  
  RetentionDays:
    Description: Retention period in days before deleting logs
    Type: Number
    Default: 365000

Resources:
  VPCFlowLogsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If 
        - !Equals [!Ref BucketName, '']
        - !Ref BucketName
        - !Ref 'AWS::NoValue'
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      LifecycleConfiguration:
        Rules:
          - Id: "TransitionToGlacier"
            Status: "Enabled"
            Transitions:
              - StorageClass: "GLACIER"
                TransitionInDays: !Ref TransitionDays
            ExpirationInDays: !Ref RetentionDays
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  VPCFlowLogsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub '${VPCFlowLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

Outputs:
  BucketName:
    Description: The name of the S3 bucket
    Value: !Ref VPCFlowLogsBucket