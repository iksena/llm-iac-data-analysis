AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ECR repository with repository policy for Kubernetes container image management'

Resources:
  KubernetesECRRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName: kubernetes-images
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootUserAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:DeleteRepository
              - ecr:DeleteRepositoryPolicy
      Tags:
        - Key: Purpose
          Value: KubernetesContainers
        - Key: Environment
          Value: Production

Outputs:
  RepositoryURI:
    Description: The URI of the ECR repository
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${KubernetesECRRepository}
  
  RepositoryARN:
    Description: The ARN of the ECR repository
    Value: !GetAtt KubernetesECRRepository.Arn
    
  RepositoryName:
    Description: The name of the ECR repository
    Value: !Ref KubernetesECRRepository