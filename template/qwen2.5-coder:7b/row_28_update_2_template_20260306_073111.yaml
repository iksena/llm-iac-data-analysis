AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  SecretName:
    Type: String
    Description: The name of the secret to monitor
  TopicName:
    Type: String
    Description: The name of the SNS topic to send notifications to
  EmailAddress:
    Type: String
    Description: The email address to subscribe to the SNS topic

Resources:
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      IsLogging: true
      IncludeGlobalServiceEvents: true
      S3BucketName: !Ref CloudTrailBucket
      CloudWatchLogsLogGroupArn: !Ref CloudWatchLogsLogGroup

  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cloudtrail-${AWS::StackName}'

  CloudWatchLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub 'cloudtrail-${AWS::StackName}'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'SecretsManagerNotification-${AWS::StackName}'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: !Sub |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const sns = new AWS.SNS();
            const cloudtrail = new AWS.CloudTrail();
            const secretsmanager = new AWS.SecretsManager();

            const trailEvents = await cloudtrail.lookupEvents({
              LookupAttributes: [
                {
                  AttributeKey: 'EventName',
                  AttributeValue: 'CreateSecret'
                },
                {
                  AttributeKey: 'EventName',
                  AttributeValue: 'UpdateSecret'
                },
                {
                  AttributeKey: 'EventName',
                  AttributeValue: 'GetSecretValue'
                }
              ]
            }).promise();

            for (const event of trailEvents.Events) {
              const secretName = event.EventSourceARN.split('/')[1];
              if (secretName === '${SecretName}') {
                const secret = await secretsmanager.getSecretValue({
                  SecretId: secretName
                }).promise();
                const message = `Secret ${secretName} has been ${event.EventName}`;
                await sns.publish({
                  TopicArn: !Ref SNSTopic,
                  Message: message
                }).promise();
              }
            }
      Runtime: nodejs14.x

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-SecretsManagerNotification-*'
              - Effect: Allow
                Action:
                  - 'sns:Publish'
                Resource: !Ref SNSTopic
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}'

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: email
      Endpoint: !Ref EmailAddress

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS topic created
    Value: !Ref SNSTopic
    Export:
      Name: !Sub 'SNSTopicARN-${AWS::StackName}'

  LambdaFunctionARN:
    Description: The ARN of the Lambda function created
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub 'LambdaFunctionARN-${AWS::StackName}'