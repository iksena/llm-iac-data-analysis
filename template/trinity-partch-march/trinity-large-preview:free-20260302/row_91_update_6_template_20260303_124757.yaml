AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for VPC flow logs with lifecycle management and access controls.

Parameters:
  BucketName:
    Type: String
    Description: Optional custom name for the S3 bucket. If not provided, a unique name will be generated.
    Default: ''
  VersioningStatus:
    Type: String
    Description: Status of versioning for the S3 bucket.
    AllowedValues:
      - Enabled
      - Suspended
    Default: Suspended
  LifecycleTransitionDays:
    Type: Number
    Description: Number of days before transitioning logs to Glacier.
    Default: 30
  LifecycleExpirationDays:
    Type: Number
    Description: Number of days before logs are deleted.
    Default: 365000

Resources:
  VPCFlowLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseCustomBucketName, !Ref BucketName, !Ref "AWS::NoValue"]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                Days: !Ref LifecycleTransitionDays
          - Id: Expiration
            Status: Enabled
            ExpirationInDays: !Ref LifecycleExpirationDays

  VPCFlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogBucket
      PolicyDocument:
        Statement:
          - Sid: AllowDeliveryLogs
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub arn:${AWS::Partition}:s3:::${VPCFlowLogBucket}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Outputs:
  BucketName:
    Description: The name of the S3 bucket created for VPC flow logs.
    Value: !Ref VPCFlowLogBucket