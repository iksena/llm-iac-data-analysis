AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a VPC with VPC Flow Logs enabled.
  An S3 bucket is provisioned to store the flow logs with optional log file prefixes.
  The bucket enforces SSL for data transfers, blocks public access, and grants minimal permissions to AWS log delivery services.

Parameters:
  LogFilePrefix:
    Description: "Optional prefix for storing VPC flow logs in the S3 Bucket (leave empty for default)."
    Type: String
    Default: ""

Conditions:
  HasLogFilePrefix:
    Fn::Not:
      - Fn::Equals: 
          - !Ref LogFilePrefix
          - ""

Resources:
  VPCResource:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-FlowLog

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowGetBucketAclForLogDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt FlowLogsBucket.Arn
          - Sid: AllowPutObjectForLogDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource:
              Fn::If:
                - HasLogFilePrefix
                - !Join 
                  - ""
                  - - !GetAtt FlowLogsBucket.Arn
                    - "/"
                    - !Ref LogFilePrefix
                    - "/*"
                - !Join
                  - ""
                  - - !GetAtt FlowLogsBucket.Arn
                    - "/AWSLogs/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: EnforceSSL
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt FlowLogsBucket.Arn
              - !Join 
                - ""
                - - !GetAtt FlowLogsBucket.Arn
                  - "/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPCResource
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: s3
      LogDestination:
        Fn::If:
          - HasLogFilePrefix
          - !Join
            - ""
            - - !GetAtt FlowLogsBucket.Arn
              - "/"
              - !Ref LogFilePrefix
          - !GetAtt FlowLogsBucket.Arn

Outputs:
  FlowLogsBucketName:
    Description: "Name of the S3 Bucket storing VPC flow logs."
    Value: !Ref FlowLogsBucket