AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with SQS notifications for object creation events'

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 345600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-queue'

  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Ref 'AWS::StackName'

  BucketPermission:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt S3Bucket.Arn

  NotificationConfiguration:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt NotificationFunction.Arn
      BucketName: !Ref S3Bucket
      QueueArn: !GetAtt SQSQueue.Arn

  NotificationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3BucketNotificationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                Resource: !GetAtt S3Bucket.Arn

  NotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt NotificationFunctionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              responseData = {}
              
              try:
                  if event['RequestType'] == 'Delete':
                      print("Request Type:", event['RequestType'])
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
                      return

                  props = event['ResourceProperties']
                  bucket_name = props['BucketName']
                  queue_arn = props['QueueArn']
                  
                  notification_configuration = {
                      'QueueConfigurations': [
                          {
                              'QueueArn': queue_arn,
                              'Events': ['s3:ObjectCreated:*']
                          }
                      ]
                  }
                  
                  s3.put_bucket_notification_configuration(
                      Bucket=bucket_name,
                      NotificationConfiguration=notification_configuration
                  )
                  
                  responseData['Message'] = 'Notification configuration set successfully'
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
              
              except Exception as e:
                  print('Error:', str(e))
                  responseData['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData)

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  BucketARN:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn
  
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  
  QueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt SQSQueue.Arn