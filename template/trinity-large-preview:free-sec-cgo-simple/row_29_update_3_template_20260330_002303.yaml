AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/config/ab-test"
      Type: String
      Value: "This is A/B"
      Description: Non-sensitive configuration parameter
      Tier: Standard

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-secret"
      Description: Secure secret with predefined username
      SecretString: |
        {
          "username": "admin",
          "password": "P@ssw0rd!Secure123"
        }
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: "password"
        ExcludeCharacters: "/@\""
        PasswordLength: 16

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3

          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              secrets = boto3.client('secretsmanager')

              # Retrieve SSM parameter by path
              ssm_params = ssm.get_parameters_by_path(
                  Path=f"/{context.function_name.split('-')[0]}/config/",
                  Recursive=False
              )
              ssm_value = ssm_params['Parameters'][0]['Value']

              # Retrieve Secrets Manager secret
              secret = secrets.get_secret_value(SecretId=context.function_name.split('-')[0] + '-secret')
              secret_value = json.loads(secret['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secret': secret_value
                  })
              }
      Timeout: 10

Outputs:
  SSMParameterValue:
    Description: SSM Parameter Value
    Value: !Ref SSMParameter
  SecretsManagerSecretARN:
    Description: Secrets Manager Secret ARN
    Value: !Ref SecretsManagerSecret
  LambdaFunctionARN:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn