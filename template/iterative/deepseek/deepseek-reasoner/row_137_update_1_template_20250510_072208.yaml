AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => {
            return [
              { id: '1', name: 'Buddy', type: 'Dog' },
              { id: '2', name: 'Whiskers', type: 'Cat' },
              { id: '3', name: 'Goldie', type: 'Fish' }
            ];
          };

  AppSyncLambdaInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokePetLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PetLambdaFunction.Arn

  PetGraphQLAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      XrayEnabled: false
      AdditionalAuthenticationProviders: []
      LogConfig:
        CloudWatchLogsRoleArn: !GetAppSyncLambdaInvokeRole.Arn
        FieldLogLevel: NONE

  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetGraphQLAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        type Query {
          getPets: [Pet!]!
        }

  PetLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetGraphQLAPI.ApiId
      Name: PetLambdaSource
      Type: AWS_LAMBDA
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn
      ServiceRoleArn: !GetAtt AppSyncLambdaInvokeRole.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetGraphQLAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($context.result)

  PetAPIKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetGraphQLAPI.ApiId

Outputs:
  GraphQLAPIURL:
    Value: !GetAtt PetGraphQLAPI.GraphQLUrl
  GraphQLAPIKey:
    Value: !GetAtt PetAPIKey.ApiKey
  LambdaFunctionName:
    Value: !Ref PetLambdaFunction