AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Kinesis Data Stream with throughput alarms

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: RealTimeDataStream
      ShardCount: 1
      Tags:
        - Key: Environment
          Value: production
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisThroughputAlarms

  ReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisReadThroughputAlarm
      AlarmDescription: Alarm when Kinesis read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream

  WriteAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisWriteThroughputAlarm
      AlarmDescription: Alarm when Kinesis write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream