AWSTemplateFormatVersion: '2010-09-09'
Description: Creates S3 bucket with Lambda trigger on object uploads
Parameters:
  BucketName:
    Type: String
    Description: Base name for the S3 bucket
    AllowedPattern: ^[a-z0-9-]{3,63}$
    Default: my-bucket
    ConstraintDescription: Bucket name must follow S3 naming rules

  LambdaFunctionName:
    Type: String
    Default: S3TriggeredLambda
    Description: Name for the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::${BucketName}-${AWS::AccountId}/*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              print("Received S3 event: " + json.dumps(event))
              return {
                  'statusCode': 200,
                  'body': json.dumps('Successfully processed S3 event')
              }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${BucketName}-${AWS::AccountId}"
      SourceAccount: !Ref AWS::AccountId

  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${BucketName}-${AWS::AccountId}"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt LambdaFunction.Arn

Outputs:
  S3BucketName:
    Value: !Ref S3Bucket
    Description: Name of the created S3 bucket
  LambdaFunctionARN:
    Value: !GetAtt LambdaFunction.Arn
    Description: ARN of the Lambda function