AWSTemplateFormatVersion: '2010-09-09'
Description: Production-ready VPC network infrastructure with ALB and ECR repository

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 1
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PublicSubnet3CIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for public subnet 3
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.10.0/24
    Description: CIDR block for private subnet 1
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.11.0/24
    Description: CIDR block for private subnet 2
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet3CIDR:
    Type: String
    Default: 10.0.12.0/24
    Description: CIDR block for private subnet 3
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet4CIDR:
    Type: String
    Default: 10.0.20.0/24
    Description: CIDR block for private subnet 4
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet5CIDR:
    Type: String
    Default: 10.0.21.0/24
    Description: CIDR block for private subnet 5
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet6CIDR:
    Type: String
    Default: 10.0.22.0/24
    Description: CIDR block for private subnet 6
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Production-VPC
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Production-IGW
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: Production-NATGW
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Public-Route-Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Private-Route-Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-1
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-2
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet3CIDR
      AvailabilityZone: !Select [2, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-3
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-1
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-2
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet3CIDR
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-3
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet4CIDR
      AvailabilityZone: !Select [1, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-4
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet5:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet5CIDR
      AvailabilityZone: !Select [2, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-5
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrivateSubnet6:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet6CIDR
      AvailabilityZone: !Select [2, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: Private-Subnet-6
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PublicSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation4:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet4
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation5:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet5
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation6:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet6
      RouteTableId: !Ref PrivateRouteTable

  HTTPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTP/HTTPS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: HTTP-HTTPS-SG
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSH-SG
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PostgreSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PostgreSQL access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: PostgreSQL-SG
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  InternalSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal VPC access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 65535
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: Internal-SG
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VPCCIDR
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: ALB-SG
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internal
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
        - !Ref PrivateSubnet4
        - !Ref PrivateSubnet5
        - !Ref PrivateSubnet6
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      Tags:
        - Key: Name
          Value: Internal-ALB
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: 'Default response from ALB'
            StatusCode: '200'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: production-ecr-repo
      ImageScanningConfiguration:
        scanOnPush: true
      Tags:
        - Key: Name
          Value: Production-ECR
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  VPCParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /vpc/id
      Type: String
      Value: !Ref VPC
      Description: VPC ID

  PublicSubnetsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /vpc/public-subnets
      Type: String
      Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]
      Description: Public subnet IDs

  PrivateSubnetsParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /vpc/private-subnets
      Type: String
      Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3, !Ref PrivateSubnet4, !Ref PrivateSubnet5, !Ref PrivateSubnet6]]
      Description: Private subnet IDs

  HTTPSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /security-groups/http-https
      Type: String
      Value: !Ref HTTPSecurityGroup
      Description: HTTP/HTTPS security group ID

  SSHSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /security-groups/ssh
      Type: String
      Value: !Ref SSHSecurityGroup
      Description: SSH security group ID

  PostgreSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /security-groups/postgres
      Type: String
      Value: !Ref PostgreSecurityGroup
      Description: PostgreSQL security group ID

  InternalSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /security-groups/internal
      Type: String
      Value: !Ref InternalSecurityGroup
      Description: Internal security group ID

  ALBListenerParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /alb/listener-arn
      Type: String
      Value: !Ref ALBListener
      Description: ALB listener ARN

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnets:
    Description: Public subnet IDs
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]
  PrivateSubnets:
    Description: Private subnet IDs
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3, !Ref PrivateSubnet4, !Ref PrivateSubnet5, !Ref PrivateSubnet6]]
  ALBEndpoint:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  ECRRepository:
    Description: ECR repository name
    Value: !Ref ECRRepository