AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecretsManagerMonitorSNS:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerMonitorTopic
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

  SecretsManagerMonitorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SecretsManagerMonitorSNS

  SecretsManagerMonitorLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SecretsManagerMonitorLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              sns_client = boto3.client('sns')
              sns_topic = os.environ['SNS_TOPIC_ARN']
              secret_name = event['detail']['secretId']
              event_type = event['detail']['eventType']

              message = {
                  'secretName': secret_name,
                  'eventType': event_type,
                  'timestamp': event['time'],
                  'region': event['region']
              }

              sns_client.publish(
                  TopicArn=sns_topic,
                  Subject=f'Secrets Manager Event: {event_type}',
                  Message=json.dumps(message)
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Event processed successfully')
              }
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SecretsManagerMonitorSNS

  SecretsManagerMonitorLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SecretsManagerMonitorLambda.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SecretsManagerEventRule.Arn

  SecretsManagerTestSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Test secret for monitoring lifecycle events
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  SecretsManagerTestRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref SecretsManagerTestSecret
      RotationLambdaARN: !GetAtt SecretsManagerMonitorLambda.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Monitor Secrets Manager lifecycle events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn: !GetAtt SecretsManagerMonitorLambda.Arn
          Id: SecretsManagerMonitorTarget

Outputs:
  SNSTopicARN:
    Description: SNS Topic ARN for receiving alerts
    Value: !Ref SecretsManagerMonitorSNS
  LambdaFunctionARN:
    Description: Lambda Function ARN processing Secrets Manager events
    Value: !GetAtt SecretsManagerMonitorLambda.Arn