AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a private Route53 hosted zone for example.com'

Parameters:
  VpcId:
    Description: 'ID of the VPC to associate with the private hosted zone (e.g., vpc-1a2b3c4d)'
    Type: 'AWS::EC2::VPC::Id'
    AllowedPattern: '^vpc-[a-f0-9]{8}(?:[a-f0-9]{9})?$'
    ConstraintDescription: 'Must be a valid VPC ID'
    MinLength: 12
    MaxLength: 21

Resources:
  PrivateHostedZone:
    Type: 'AWS::Route53::HostedZone'
    Properties:
      Name: 'example.com.'
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for example.com'

Outputs:
  HostedZoneId:
    Description: 'The ID of the created private hosted zone'
    Value: !Ref PrivateHostedZone
  HostedZoneNameServers:
    Description: 'The name servers for the hosted zone'
    Value: !Join [',', !GetAtt PrivateHostedZone.NameServers]