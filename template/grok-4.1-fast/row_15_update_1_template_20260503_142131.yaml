AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Runtime:
    Type: String
    Default: nodejs18.x
    AllowedValues:
      - nodejs18.x
      - python3.12
  Handler:
    Type: String
    Default: index.handler
  ApiName:
    Type: String
    Default: MyNonProxyApi
  StageName:
    Type: String
    Default: prod

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: !Ref Handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref Runtime
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                "Content-Type": "application/json",
                "Access-Control-Allow-Origin": "*"
              },
              body: JSON.stringify({ message: "Hello from non-proxy Lambda!" })
            };
          };

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: REST API with Lambda non-proxy integration

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: hello

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
        RequestTemplates:
          application/json: '{}'
        PassthroughBehavior: WHEN_NO_MATCH

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: Initial deployment

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName

Outputs:
  ApiId:
    Description: API Gateway REST API ID
    Value: !Ref RestApi
    Export:
      Name: !Sub ${AWS::StackName}-ApiId

  ApiInvokeUrl:
    Description: Invoke URL for the API Gateway stage
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/
    Export:
      Name: !Sub ${AWS::StackName}-ApiInvokeUrl

  HelloEndpoint:
    Description: Full URL for GET /hello endpoint
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/hello
    Export:
      Name: !Sub ${AWS::StackName}-HelloEndpoint

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LambdaArn