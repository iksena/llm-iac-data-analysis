AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready CloudFormation template creating a single ENI with primary/secondary private IPs and two associated EIPs in a public subnet for multi-public IP support on one EC2 instance.'

Parameters:
  AvailabilityZone:
    Type: String
    Default: us-east-1a
    Description: 'Availability Zone for the ENI and subnet.'
  VPCCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: 'CIDR block for the VPC.'
  SubnetCidrBlock:
    Type: String
    Default: 10.0.1.0/24
    Description: 'CIDR block for the public subnet.'
  PrimaryPrivateIPAddress:
    Type: String
    Default: 10.0.1.10
    Description: 'Primary private IPv4 address for the ENI (must be unused in SubnetCidrBlock).'
  SecondaryPrivateIPAddress:
    Type: String
    Default: 10.0.1.11
    Description: 'Secondary private IPv4 address for the ENI (must be unused in SubnetCidrBlock, different from primary).'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnet'

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-RouteTable'

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for ENI allowing SSH inbound and all outbound.'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ENI-SG'

  MyENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PublicSubnet
      Description: !Sub 'ENI with primary ${PrimaryPrivateIPAddress} and secondary ${SecondaryPrivateIPAddress} for multi-IP EC2'
      PrivateIpAddress: !Ref PrimaryPrivateIPAddress
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref SecondaryPrivateIPAddress
          Primary: false
      SecurityGroups:
        - !Ref SecurityGroup

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Ref PrimaryPrivateIPAddress

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Ref SecondaryPrivateIPAddress

Outputs:
  NetworkInterfaceId:
    Description: 'ENI ID (attach to your EC2 instance using this ID and SecurityGroupId)'
    Value: !Ref MyENI
    Export:
      Name: !Sub '${AWS::StackName}-ENIID'

  PrimaryPrivateIPAddress:
    Description: 'Primary private IP'
    Value: !GetAtt MyENI.PrimaryPrivateIpAddress
    Export:
      Name: !Sub '${AWS::StackName}-PrimaryPrivateIP'

  SecondaryPrivateIPAddress:
    Description: 'Secondary private IP'
    Value: !Ref SecondaryPrivateIPAddress
    Export:
      Name: !Sub '${AWS::StackName}-SecondaryPrivateIP'

  EIP1PublicIPAddress:
    Description: 'EIP1 public IP (primary private IP)'
    Value: !Ref EIP1
    Export:
      Name: !Sub '${AWS::StackName}-EIP1PublicIP'

  EIP1AllocationId:
    Description: 'EIP1 allocation ID'
    Value: !GetAtt EIP1.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-EIP1AllocId'

  EIP2PublicIPAddress:
    Description: 'EIP2 public IP (secondary private IP)'
    Value: !Ref EIP2
    Export:
      Name: !Sub '${AWS::StackName}-EIP2PublicIP'

  EIP2AllocationId:
    Description: 'EIP2 allocation ID'
    Value: !GetAtt EIP2.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-EIP2AllocId'

  SecurityGroupId:
    Description: 'Security Group ID for ENI'
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SGID'

  VPCId:
    Description: 'VPC ID'
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCID'

  SubnetId:
    Description: 'Subnet ID'
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub '${AWS::StackName}-SubnetID'

  AvailabilityZone:
    Description: 'AZ used'
    Value: !Ref AvailabilityZone
    Export:
      Name: !Sub '${AWS::StackName}-AZ'