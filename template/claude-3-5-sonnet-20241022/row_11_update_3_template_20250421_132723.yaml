AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for mobile notifications with GSI and TTL

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: mobile-notifications

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true

Outputs:
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt NotificationsTable.Arn