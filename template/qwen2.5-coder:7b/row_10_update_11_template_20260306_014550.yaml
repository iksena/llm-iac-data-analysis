AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  KeyPairName:
    Type: String
    Description: Name of the SSH key pair to use for the EC2 instance
  InstanceType:
    Type: String
    Description: Type of EC2 instance to launch
    Default: t2.micro
  SubnetId:
    Type: String
    Description: ID of the subnet to launch the EC2 instance in

Mappings:
  LatestAmazonLinux2AMI:
    'us-east-1':
      'ami': 'ami-0c55b159cbfafe1f0'
    'us-west-2':
      'ami': 'ami-0a529f1424115114a'

Resources:
  EC2KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref KeyPairName

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      VpcId: !Ref 'AWS::DefaultVPC'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [LatestAmazonLinux2AMI, !Ref 'AWS::Region', ami]
      InstanceType: !Ref InstanceType
      KeyName: !Ref EC2KeyPair
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        - DeviceName: /dev/xvdb
          Ebs:
            VolumeSize: 20
            VolumeType: gp2
            DeleteOnTermination: true

Outputs:
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIpAddress
  PrivateIP:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PrivateIpAddress