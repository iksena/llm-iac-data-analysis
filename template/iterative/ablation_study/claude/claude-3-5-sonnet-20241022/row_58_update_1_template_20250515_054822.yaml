AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS with monitoring and automated backups'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for mount targets

  EnableBackups:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Enable automated backups

  BackupSchedule:
    Type: String
    Default: 'cron(0 5 ? * * *)'
    Description: CRON expression for backup schedule

  PerformanceMode:
    Type: String
    AllowedValues: ['generalPurpose', 'maxIO']
    Default: 'generalPurpose'
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    AllowedValues: ['bursting', 'provisioned']
    Default: 'bursting'
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    Default: 128
    MinValue: 1
    MaxValue: 1024
    Description: Provisioned throughput in MiB/s

  BurstCreditLowThreshold:
    Type: Number
    Default: 1000000000000
    Description: Burst credit balance threshold

Conditions:
  IsBackupEnabled: !Equals [!Ref EnableBackups, 'true']
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VPC.CidrBlock

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughput
        - !Ref 'AWS::NoValue'
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs

  MountTargets:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt MountTargetFunction.Arn
      FileSystemId: !Ref EFSFileSystem
      SubnetIds: !Ref SubnetIds
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when burst credit balance is low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref BurstCreditLowThreshold
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-vault

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-backup-plan
        BackupPlanRule:
          - RuleName: DailyBackups
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 120
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFSBackupSelection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  BackupRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem

  FileSystemDNS:
    Description: EFS File System DNS Name
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  MountTargetSecurityGroup:
    Description: Security Group ID for Mount Targets
    Value: !Ref EFSSecurityGroup