AWSTemplateFormatVersion: '2010-09-09'
Description: SageMaker Project Service Catalog Product
Resources:
  SageMakerProject:
    Type: AWS::SageMaker::Project
    Properties:
      ProjectName: SageMakerProjectForServiceCatalog
      ProjectDescription: Project for model training and deployment
      ServiceCatalogProvisioningDetails:
        ProvisioningArtifactId: 'arn:aws:servicecatalog:REGION:ACCOUNT_ID:product/prod-XXXXXXXXXXXX/provisioning-artifact/XXXXXXXXXXXX'
        Path: /path/to/your/project
      GitConfig:
        RepositoryUrl: 'https://gitlab.com/yourgroup/yourproject.git'
        SecretArn: arn:aws:secretsmanager:REGION:ACCOUNT_ID:secret:your-gitlab-token-XXXXXXXXXXXX
      CodeRepository:
        RepositoryUrl: 'https://gitlab.com/yourgroup/yourproject.git'
        Branch: main
      Environment:
        ExecutionRoleArn: arn:aws:iam::ACCOUNT_ID:role/SageMakerExecutionRole
  ServiceCatalogPortfolio:
    Type: AWS::ServiceCatalog::Portfolio
    Properties:
      DisplayName: SageMakerPortfolio
      ProviderName: YourTeam
      Description: Portfolio for SageMaker Projects
  ServiceCatalogProduct:
    Type: AWS::ServiceCatalog::Product
    Properties:
      Name: SageMakerProduct
      Owner: YourTeam
      ProviderName: YourTeam
      Description: SageMaker Project for model training and deployment
      SupportDescription: Contact YourTeam for support
      SupportEmail: yourteam@example.com
      SupportUrl: https://yourteam.example.com/support
      ProvisioningArtifactParameters:
        Name: SageMakerProjectArtifact
        Description: Provisioning artifact for SageMaker Project
        Type: CLOUDFORMATION
        Info:
          LoadTemplateFromURL: 'https://your-s3-bucket.s3.amazonaws.com/your-cloudformation-template.yaml'
Outputs:
  ServiceCatalogProductId:
    Value: !Ref ServiceCatalogProduct
    Description: Service Catalog Product ID
  SageMakerProjectId:
    Value: !Ref SageMakerProject
    Description: SageMaker Project ID

Conditions:
  UseExistingPortfolio: !Equals [!Ref AWS::Region, us-east-1]

Metadata:
  'AWS::CloudFormation::Interface':
    ParameterGroups:
      - Label: Project Configuration
        Parameters:
          - SageMakerProject
          - GitConfig
          - CodeRepository
          - Environment
      - Label: Service Catalog Configuration
        Parameters:
          - ServiceCatalogPortfolio
          - ServiceCatalogProduct

Parameters:
  SageMakerProject:
    Type: String
    Description: Name of the SageMaker Project
    Default: SageMakerProjectForServiceCatalog
  GitConfig:
    Type: String
    Description: Git configuration for the project
    Default: 'https://gitlab.com/yourgroup/yourproject.git'
  CodeRepository:
    Type: String
    Description: Code repository for the project
    Default: 'https://gitlab.com/yourgroup/yourproject.git'
  Environment:
    Type: String
    Description: Environment for the project
    Default: 'arn:aws:iam::ACCOUNT_ID:role/SageMakerExecutionRole'
  ServiceCatalogPortfolio:
    Type: String
    Description: Name of the Service Catalog Portfolio
    Default: SageMakerPortfolio
  ServiceCatalogProduct:
    Type: String
    Description: Name of the Service Catalog Product
    Default: SageMakerProduct

  ACCOUNT_ID:
    Type: String
    Default: !Ref AWS::AccountId
  REGION:
    Type: String
    Default: !Ref AWS::Region

