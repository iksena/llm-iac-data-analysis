AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EmailEndpoint:
    Type: String
    Default: example@example.com
    Description: Email address for notifications
  HTTPSEndpoint:
    Type: String
    Default: https://example.com/webhook
    Description: HTTPS URL for notifications
  FallbackEmail:
    Type: String
    Default: fallback@example.com
    Description: Email for delivery failure notifications

Resources:
  MainTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alerting System

  MainTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - monitoring.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
                - budgets.amazonaws.com
            Action: sns:Publish
            Resource: !Ref MainTopic
      Topics:
        - !Ref MainTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      Protocol: email
      Endpoint: !Ref EmailEndpoint
      TopicArn: !Ref MainTopic

  HTTPSSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHTTPSEndpoint
    Properties:
      Protocol: https
      Endpoint: !Ref HTTPSEndpoint
      TopicArn: !Ref MainTopic
      DeliveryPolicy:
        retryPolicy:
          maximumMessageAgeInMinutes: 1
          maximumRetries: 3

  FallbackTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Fallback Alerting System

  FallbackEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref FallbackEmail
      TopicArn: !Ref FallbackTopic

  NotificationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FallbackTopic
      AlarmDescription: Triggers fallback topic when MainTopic has failed notifications

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, ""]]
  HasHTTPSEndpoint: !Not [!Equals [!Ref HTTPSEndpoint, ""]]

Outputs:
  MainTopicArn:
    Description: ARN of the main SNS topic
    Value: !Ref MainTopic
  FallbackTopicArn:
    Description: ARN of the fallback SNS topic
    Value: !Ref FallbackTopic