AWSTemplateFormatVersion: '2010-09-09'
Description: MySQL RDS instance with custom parameter group and Secrets Manager integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000001
  DBName:
    Type: String
    Default: MyDatabase
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  EngineVersion:
    Type: String
    Default: 8.0.33
  MultiAZ:
    Type: String
    Default: false
    AllowedValues: [true, false]
  PubliclyAccessible:
    Type: String
    Default: false
    AllowedValues: [true, false]

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for MySQL
      Family: mysql8.0
      Parameters:
        max_connections: 200
        character_set_server: utf8mb4
        collation_server: utf8mb4_unicode_ci

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      DBInstanceClass: !Ref DBInstanceClass
      Engine: MySQL
      EngineVersion: !Ref EngineVersion
      DBParameterGroupName: !Ref DBParameterGroup
      AllocatedStorage: 20
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      MultiAZ: !Ref MultiAZ
      PubliclyAccessible: !Ref PubliclyAccessible

  DBPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /rds/mysql/admin-credentials
      Description: Admin credentials for MySQL RDS instance
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  SecretRDSInstanceAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBPassword
      TargetId: !Ref RDSInstance
      TargetType: AWS::RDS::DBInstance

  SecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref DBPassword
      RotationLambdaARN: !GetAtt RotationLambda.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  RotationLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import boto3
          from datetime import datetime

          def handler(event, context):
              # Lambda rotation logic here
              return {
                  'Response': 'Rotation complete',
                  'Timestamp': datetime.now().isoformat()
              }
      Role: !GetAtt LambdaExecutionRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/SecretsManagerRotation

Outputs:
  DBEndpoint:
    Description: RDS instance endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
  SecretARN:
    Description: Secrets Manager secret ARN
    Value: !Ref DBPassword