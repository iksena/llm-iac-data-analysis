AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS EC2 IP Address Manager (IPAM) and export critical identifiers for cross-stack references.

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IP Address Manager for managing IP address allocation
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IPAM'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  IPAMARN:
    Description: The Amazon Resource Name (ARN) of the IPAM
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ARN'

  IPAMID:
    Description: The unique identifier (ID) of the IPAM
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ID'

  DefaultPublicScopeID:
    Description: The default public scope ID of the IPAM
    Value: !GetAtt IPAM.DefaultPublicScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPublicScopeID'

  DefaultPrivateScopeID:
    Description: The default private scope ID of the IPAM
    Value: !GetAtt IPAM.DefaultPrivateScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPrivateScopeID'