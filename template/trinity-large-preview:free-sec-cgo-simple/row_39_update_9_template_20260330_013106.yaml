AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: kubernetes-container-images
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserAccess
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
Outputs:
  RepositoryUri:
    Description: ECR Repository URI for Kubernetes container images
    Value: !GetAtt ECRRepository.RepositoryUri