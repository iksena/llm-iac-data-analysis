AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM roles template for tiered FIS access management'

Resources:
  SecurityAdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'SecurityAdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: SecurityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:*'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'iam:CreateServiceLinkedRole'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/fis.amazonaws.com/*'

  AdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'AdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: AdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/Environment': 'prod'
              - Effect: Allow
                Action:
                  - 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/fis.amazonaws.com/*'

  UserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'UserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: UserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:GetExperiment'
                  - 'fis:ListExperiments'
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:TagResource'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/Environment': 'prod'

  NonUserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'NonUserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'fis.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: NonUserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - 'fis:*'
                Resource: '*'