AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT Data Pipeline: IoT Core -> SNS -> SQS'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name for resource naming
    AllowedPattern: '^[a-zA-Z0-9]+$'
    ConstraintDescription: Must be alphanumeric only
  QueueVisibilityTimeoutSeconds:
    Type: Number
    Default: 30
    Description: Visibility timeout for SQS queue in seconds
    MinValue: 0
    MaxValue: 43200
  QueueMessageRetentionPeriodSeconds:
    Type: Number
    Default: 345600
    Description: Message retention period for SQS queue in seconds
    MinValue: 60
    MaxValue: 1209600

Resources:
  IoTSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-IoTDataQueue'
      VisibilityTimeoutSeconds: !Ref QueueVisibilityTimeoutSeconds
      MessageRetentionPeriod: !Ref QueueMessageRetentionPeriodSeconds

  IoTSQSPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt IoTSQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IoTSNSTopic
      Queues:
        - !Ref IoTSQSQueue

  IoTSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${Environment}-IoTDataTopic'

  IoTSNStoSQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref IoTSNSTopic
      Endpoint: !GetAtt IoTSQSQueue.Arn
    DependsOn:
      - IoTSNSTopic
      - IoTSQSQueue
      - IoTSQSPolicy

  IoTIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-IoTToSNSPublishRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole

  IoTIAMRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${Environment}-IoTToSNSPublishPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: !Ref IoTSNSTopic
      Roles:
        - !Ref IoTIAMRole
    DependsOn: IoTIAMRole

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub '${Environment}-device-data-rule'
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTSNSTopic
              RoleArn: !GetAtt IoTIAMRole.Arn
        RuleDisabled: false
    DependsOn:
      - IoTIAMRole
      - IoTSNSTopic

Outputs:
  SQSQueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref IoTSQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueUrl'

  SQSQueueArn:
    Description: ARN of the SQS Queue
    Value: !GetAtt IoTSQSQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'

  SNSTopicArn:
    Description: ARN of the SNS Topic
    Value: !Ref IoTSNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'

  IoTTopicRuleName:
    Description: Name of the IoT Topic Rule
    Value: !Ref IoTTopicRule
    Export:
      Name: !Sub '${AWS::StackName}-RuleName'

  IoTTopicRuleArn:
    Description: ARN of the IoT Topic Rule
    Value: !GetAtt IoTTopicRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'

  SNSSubscriptionArn:
    Description: ARN of the SNS Subscription
    Value: !Ref IoTSNStoSQSSubscription
    Export:
      Name: !Sub '${AWS::StackName}-SubscriptionArn'