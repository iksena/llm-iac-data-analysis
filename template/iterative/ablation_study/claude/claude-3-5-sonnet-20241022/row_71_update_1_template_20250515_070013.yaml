AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template to create EC2 instance with HTTP access and S3 bucket'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair
  Environment:
    Description: Environment name for resource tagging
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access via port 80
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: !Ref Environment

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SecurityGroups:
        - !Ref WebServerSecurityGroup
      KeyName: !Ref KeyName
      ImageId: !Ref AWS::Region
      ImageId: !If 
        - IsUsEast1
        - ami-0230bd60aa48260c6  # Amazon Linux 2023 AMI in us-east-1
        - ami-0230bd60aa48260c6  # Default to us-east-1 AMI
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-WebServer
        - Key: Environment
          Value: !Ref Environment

  ApplicationBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WebServerInstance
  
  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicIp
  
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref WebServerSecurityGroup
  
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref ApplicationBucket