AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Account-Wide IAM Password Policy with Lambda Management

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    Description: Minimum password length
  MaxPasswordAge:
    Type: Number
    Default: 90
    Description: Maximum password age in days
  PasswordReusePrevention:
    Type: Number
    Default: 24
    Description: Number of previous passwords to prevent reuse
  RequireLowercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require lowercase characters
  RequireUppercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require uppercase characters
  RequireNumbers:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require numbers
  RequireSymbols:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require symbols
  AllowChangePassword:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Allow users to change their own password

Resources:
  IAMPasswordPolicy:
    Type: AWS::IAM::AccountPasswordPolicy
    Properties:
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireLowercaseCharacters: !Ref RequireLowercase
      RequireUppercaseCharacters: !Ref RequireUppercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      AllowUsersToChangePassword: !Ref AllowChangePassword
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
    DeletionPolicy: Retain

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for encrypting IAM resources
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
    DependsOn: IAMPasswordPolicy

  IAMRoleForLambda:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      PermissionsBoundary: !GetAtt PermissionBoundaryPolicy.Arn
    DependsOn: KMSKey

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt IAMRoleForLambda.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const iam = new AWS.IAM();
            // Lambda code to manage IAM password policy
          };
      Environment:
        Variables:
          KMS_KEY_ID: !Ref KMSKey
      KmsKeyArn: !GetAtt KMSKey.Arn
    DependsOn: IAMRoleForLambda

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
      Description: Permission boundary for Lambda execution
    DependsOn: KMSKey

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt PasswordPolicyLambda.Arn
    Description: Lambda function ARN for password policy management