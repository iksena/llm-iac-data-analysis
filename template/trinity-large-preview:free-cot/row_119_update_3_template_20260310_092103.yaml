AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis Integration for Real-time Event Streaming

Parameters:
  ApplicationName:
    Type: String
    Default: my-application
    Description: Name of the application generating events
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    MinLength: 1
    MaxLength: 64

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${ApplicationName}-events'
      EventSourceName: !Ref ApplicationName

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub '${ApplicationName}-events-stream'
      ShardCount: 1
      RetentionPeriodHours: 24

  EventBridgeKinesisIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'EventBridgeKinesisIntegrationRole-${ApplicationName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ApplicationName}-to-kinesis-rule'
      EventPattern:
        source:
          - !Ref ApplicationName
      EventBusName: !Ref EventBus
      Targets:
        - Id: KinesisTarget
          Arn: !GetAtt KinesisStream.Arn
          RoleArn: !GetAtt EventBridgeKinesisIntegrationRole.Arn

Outputs:
  EventBusName:
    Description: EventBridge Event Bus Name
    Value: !Ref EventBus
  KinesisStreamName:
    Description: Kinesis Data Stream Name
    Value: !Ref KinesisStream
  KinesisStreamArn:
    Description: Kinesis Data Stream ARN
    Value: !GetAtt KinesisStream.Arn