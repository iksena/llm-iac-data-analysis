AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create EventBridge integration with Shopify for product creation.

Parameters:
  ShopifyAdminAPIKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: 'your-shopify-admin-api-key'

Resources:
  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyAppEventBus
      EventSourceName: 'aws.partner/shopify.com/partner'

  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreationApi
      Description: API destination for Shopify product creation
      InvocationEndpoint: 'https://testanu.myshopify.com/admin/api/2023-04/products.json'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt EventBridgeConnection.Arn

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection to Shopify with API key authentication
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyAdminAPIKey

Outputs:
  EventBusName:
    Description: The name of the created event bus
    Value: !Ref EventBridgeEventBus