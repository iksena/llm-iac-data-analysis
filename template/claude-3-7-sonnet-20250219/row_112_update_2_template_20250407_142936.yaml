AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with SQS notifications for object creation events'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    Default: ''
  
  QueueName:
    Type: String
    Description: Name for the SQS queue
    Default: ''
  
  MessageRetentionPeriod:
    Type: Number
    Description: The number of seconds SQS retains a message (1 minute to 14 days)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]
  HasQueueName: !Not [!Equals [!Ref QueueName, '']]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !If [HasBucketName, !Ref BucketName, !Ref 'AWS::StackName']

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If [HasQueueName, !Ref QueueName, !Ref 'AWS::NoValue']
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: !If [HasQueueName, !Ref QueueName, !Sub '${AWS::StackName}-queue']

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt S3Bucket.Arn

  S3BucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref S3Bucket
      QueueConfigurations:
        - Event: s3:ObjectCreated:*
          Queue: !GetAtt SQSQueue.Arn

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  BucketARN:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn
  
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  
  QueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt SQSQueue.Arn