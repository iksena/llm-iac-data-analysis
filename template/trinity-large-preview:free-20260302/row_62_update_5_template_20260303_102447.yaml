AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL cluster with two instances and custom parameter group

Parameters:
  DBClusterName:
    Type: String
    Description: The name of the database cluster
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    Description: The instance class for the database instances
  MasterUsername:
    Type: String
    NoEcho: true
    Description: The master username for the database
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: The master password for the database
  DBName:
    Type: String
    Default: mydb
    Description: The name of the database
  PubliclyAccessible:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether the database instances are publicly accessible

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - subnet-12345678
        - subnet-87654321

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION'

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBClusterIdentifier: !Ref DBClusterName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterParameterGroupName: !Ref DBParameterGroup
      Port: 3306
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${DBClusterName}-instance1'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: !Ref PubliclyAccessible
      DBSubnetGroupName: !Ref DBSubnetGroup

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${DBClusterName}-instance2'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: !Ref PubliclyAccessible
      DBSubnetGroupName: !Ref DBSubnetGroup

Outputs:
  ClusterEndpoint:
    Description: The endpoint of the database cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint of the database cluster
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  DatabaseName:
    Description: The name of the database
    Value: !Ref DBName