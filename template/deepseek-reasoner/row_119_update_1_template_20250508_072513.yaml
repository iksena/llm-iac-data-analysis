AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyApplicationEventBus

  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  EventBridgeToKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisPutAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt EventStream.Arn

  EventRoutingRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyEventBus
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt EventStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeToKinesisRole.Arn
          KinesisParameters:
            PartitionKeyPath: $.id

Outputs:
  EventBusARN:
    Value: !Ref MyEventBus
  KinesisStreamARN:
    Value: !GetAtt EventStream.Arn
  EventBridgeRoleARN:
    Value: !GetAtt EventBridgeToKinesisRole.Arn