AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PAY_PER_REQUEST
      - PROVISIONED
    Description: Billing mode for the DynamoDB table
  EnableEncryption:
    Type: Boolean
    Default: true
    Description: Enable server-side encryption

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      BillingMode: !Ref BillingMode
      SSESpecification:
        Enabled: !Ref EnableEncryption
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production

Outputs:
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt MyDynamoDBTable.Arn
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref TableName
  TableStreamArn:
    Description: Stream ARN of the DynamoDB table
    Value: !GetAtt MyDynamoDBTable.StreamArn