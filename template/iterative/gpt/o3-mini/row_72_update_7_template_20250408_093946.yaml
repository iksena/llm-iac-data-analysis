AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy a secure, web-based VS Code development environment.
  This template provisions an EC2 instance running Ubuntu 22.04 with code-server (configurable version)
  bound to port 8080 with authentication disabled. It creates a VPC, public subnet, and security groups
  that restrict inbound access to specified CloudFront IP ranges. A CloudFront Distribution is deployed for
  global HTTPS access, caching (1-year TTL), and request forwarding. The instance is integrated with SSM for management.
Parameters:
  CodeServerVersion:
    Type: String
    Description: Version of code-server to install.
    Default: "4.8.0"
  CloudFrontAllowedIP1:
    Type: String
    Description: A CloudFront regional IP range allowed to access code-server.
    Default: "203.0.113.0/24"
  CloudFrontAllowedIP2:
    Type: String
    Description: A CloudFront regional IP range allowed to access code-server.
    Default: "198.51.100.0/24"
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: DemoVPC
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: DemoIGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for code-server instance allowing inbound from CloudFront IP ranges.
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: CodeServerSG
  SGIngress1:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      CidrIp: !Ref CloudFrontAllowedIP1
  SGIngress2:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      CidrIp: !Ref CloudFrontAllowedIP2
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: "{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}"
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > /var/log/user-data.log 2>&1
          apt-get update -y
          apt-get install -y wget tar
          wget -qO- "https://github.com/cdr/code-server/releases/download/v${CodeServerVersion}/code-server-${CodeServerVersion}-linux-amd64.tar.gz" | tar -xz -C /usr/local --strip-components=1
          printf '%s\n' '[Unit]' 'Description=code-server' 'After=network.target' '' '[Service]' 'Type=simple' 'ExecStart=/usr/local/bin/code-server --bind-addr 0.0.0.0:8080 --auth none' 'Restart=always' 'User=root' '' '[Install]' 'WantedBy=multi-user.target' > /etc/systemd/system/code-server.service
          systemctl daemon-reload
          systemctl enable code-server
          systemctl start code-server
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2Instance
    Properties:
      DistributionConfig:
        Origins:
          - Id: CodeServerOrigin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 8080
              OriginProtocolPolicy: http-only
              OriginSslProtocols:
                - TLSv1.2
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: CodeServerOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 31536000
          MaxTTL: 31536000
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
Outputs:
  CloudFrontURL:
    Description: "The CloudFront Distribution Domain Name for global HTTPS access to code-server."
    Value: !GetAtt CloudFrontDistribution.DomainName
  InstanceID:
    Description: "EC2 Instance ID running code-server."
    Value: !Ref EC2Instance
  InstancePublicIP:
    Description: "The public IP address of the EC2 instance."
    Value: !GetAtt EC2Instance.PublicIp