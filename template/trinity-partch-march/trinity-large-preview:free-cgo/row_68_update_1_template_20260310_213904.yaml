AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EC2SSMCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2RoleforSSM
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2SSMCloudWatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMCloudWatchRole

Outputs:
  InstanceProfileName:
    Description: Name of the Instance Profile for EC2 instances
    Value: !Ref EC2SSMCloudWatchInstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileName'