

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploys an App Runner service from an existing ECR repository'
Parameters:
  ECRRepositoryUri:
    Type: String
    Description: 'The URI of the ECR repository containing the application image'
    Default: '000000000000.dkr.ecr.us-east-1.amazonaws.com/my-app'
  ServiceName:
    Type: String
    Description: 'Name of the App Runner service'
    Default: 'my-app-runner-service'
    AllowedPattern: '^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$'
  ImageTag:
    Type: String
    Description: 'Image tag'
    Default: 'latest'
  AutoDeploymentsEnabled:
    Type: Boolean
    Description: 'Enable auto-deployments'
    Default: true
  InstanceConfigurationName:
    Type: String
    Description: 'App Runner instance configuration name'
    Default: 'apprunner.default'
Resources:
  AppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Ref ServiceName
      SourceConfiguration:
        ImageRepository:
          ImageIdentifier: !Sub '${ECRRepositoryUri}:${ImageTag}'
          ImageUri: !Ref ECRRepositoryUri
      AutoDeploymentsEnabled: !Ref AutoDeploymentsEnabled
      InstanceConfigurationName: !Ref InstanceConfigurationName
Outputs:
  AppRunnerServiceUrl:
    Value: !GetAtt AppRunnerService.ServiceUrl
    Description: 'URL of the App Runner service'
  AppRunnerServiceArn:
    Value: !GetAtt AppRunnerService.Arn
    Description: 'ARN of the App Runner service'

