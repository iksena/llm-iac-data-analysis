AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a secure REST API Gateway integrated with DynamoDB for music data management

Parameters:
  ApiGatewayStageName:
    Type: String
    Default: prod
    Description: The name of the API Gateway stage

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: MusicAPI
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
        AllowHeaders:
          - Content-Type
          - Authorization
      DisableExecuteApiEndpoint: false

  ApiGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: !Ref ApiGatewayStageName
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/api-gateway/${ApiGateway}
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context.httpMethod $context.routeKey $context.protocol" $context.status $context.responseLength $context.requestId

  PostMusicRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: POST /music
      AuthorizationType: AWS_IAM
      Target: !Sub integrations/${PostMusicIntegration}

  GetMusicByArtistRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /music/{artist}
      AuthorizationType: AWS_IAM
      Target: !Sub integrations/${GetMusicByArtistIntegration}

  PostMusicIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:dynamodb:action/PutItem
      CredentialsArn: !GetAtt ApiGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  GetMusicByArtistIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:dynamodb:action/Query
      CredentialsArn: !GetAtt ApiGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  ApiKeyValidatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt ApiKeyValidatorRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const apiKey = event.headers['authorization'];
            // Validate API key logic here
            if (apiKey === 'valid-api-key') {
              return {
                isAuthorized: true
              };
            } else {
              return {
                isAuthorized: false,
                context: {
                  errorMessage: 'Invalid API key'
                }
              };
            }
          };

  ApiKeyValidatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

Outputs:
  ApiEndpoint:
    Description: The API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}