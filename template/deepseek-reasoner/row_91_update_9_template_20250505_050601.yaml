AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Custom bucket name (optional)
    AllowedPattern: ^$|^[a-z0-9.-]{3,63}$
    ConstraintDescription: Bucket name must comply with S3 naming rules
  VersioningStatus:
    Type: String
    Default: Enabled
    AllowedValues: [Enabled, Suspended]
  TransitionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 36500
    Description: Days until transitioning to Glacier Flexible Retrieval (1-36500)
  RetentionDays:
    Type: Number
    Default: 3650
    MinValue: 1
    MaxValue: 36500
    Description: Days until permanent deletion (1-36500)
  EnableLifecycle:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  UseCustomName: !Not [!Equals [!Ref BucketName, '']]
  CreateLifecycle: !Equals [!Ref EnableLifecycle, 'true']

Resources:
  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If 
        - UseCustomName
        - !Ref BucketName
        - !Sub '${AWS::StackName}-vpc-flow-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        !If
        - CreateLifecycle
        - Rules:
            - Id: LogLifecycle
              Status: Enabled
              Transitions:
                - StorageClass: GLACIER
                  TransitionInDays: !Ref TransitionDays
              ExpirationInDays: !Ref RetentionDays
        - !Ref 'AWS::NoValue'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetBucketAcl
            Resource:
              - !GetAtt FlowLogsBucket.Arn
              - !Sub '${FlowLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: EnforceTLS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt FlowLogsBucket.Arn
              - !Sub '${FlowLogsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  BucketARN:
    Value: !GetAtt FlowLogsBucket.Arn
    Description: ARN of the flow logs bucket
  BucketName:
    Value: !Ref FlowLogsBucket
    Description: Name of the created S3 bucket