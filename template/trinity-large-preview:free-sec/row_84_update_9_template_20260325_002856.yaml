AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MacieAccount:
    Type: AWS::Macie::Account
    Properties:
      FindingPublishingFrequency: FifteenMinutes
      Status: ENABLED
      Tags:
        - Key: Name
          Value: Macie-Sensitive-Data-Discovery

Outputs:
  MacieServiceLinkedRoleArn:
    Description: ARN of the Macie service-linked role
    Value: !GetAtt MacieAccount.ServiceRoleArn
    Export:
      Name: MacieServiceLinkedRoleArn