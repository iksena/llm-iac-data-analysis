AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template to create a private Route 53 hosted zone for internal DNS management'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Select the VPC ID where the private hosted zone will be associated'
    AllowedPattern: ^vpc-[a-z0-9]+$
    ConstraintDescription: 'Must be a valid VPC ID starting with vpc-'

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS resolution'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneId'
  DomainName:
    Description: 'The domain name of the private hosted zone'
    Value: www.example.com