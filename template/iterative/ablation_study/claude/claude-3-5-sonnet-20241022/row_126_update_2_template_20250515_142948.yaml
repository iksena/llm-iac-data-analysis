AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway integration with Kinesis Data Streams for data ingestion and retrieval'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis stream
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'
  
  RetentionPeriod:
    Type: Number
    Description: Stream retention period in hours (24-168)
    Default: 24
    MinValue: 24
    MaxValue: 168
  
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis stream
    Default: 1
    MinValue: 1
  
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: 'prod'
    AllowedPattern: '[a-zA-Z0-9]+'

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-KinesisAPI
      Description: API Gateway for Kinesis Stream operations
      EndpointConfiguration:
        Types:
          - REGIONAL

  RecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'records'

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref RecordsResource
      HttpMethod: POST
      AuthorizationType: AWS_IAM
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${StreamName}",
              "Data": "$util.base64Encode($input.path('$.data'))",
              "PartitionKey": "$input.path('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "SequenceNumber": "$inputRoot.SequenceNumber",
                  "ShardId": "$inputRoot.ShardId"
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref RecordsResource
      HttpMethod: GET
      AuthorizationType: AWS_IAM
      RequestParameters:
        method.request.querystring.shardIterator: true
        method.request.querystring.limit: false
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')",
              "Limit": #if($input.params('limit'))$input.params('limit')#else 100#end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "Records": $input.json('$.Records'),
                  "NextShardIterator": "$inputRoot.NextShardIterator"
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PutRecordMethod
      - GetRecordsMethod
    Properties:
      RestApiId: !Ref ApiGateway
      Description: 'Production deployment'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref ApiGateway
      StageName: !Ref StageName
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  StreamArn:
    Description: ARN of the Kinesis stream
    Value: !GetAtt KinesisStream.Arn

  StreamName:
    Description: Name of the Kinesis stream
    Value: !Ref StreamName