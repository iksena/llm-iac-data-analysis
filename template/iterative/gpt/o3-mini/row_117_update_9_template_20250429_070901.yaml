AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template provisioning an event-driven integration between DynamoDB Streams and EventBridge.
  This template creates a DynamoDB table with streaming enabled, a centralized EventBridge event bus,
  an IAM role for AWS Pipes, and two EventBridge Pipes to forward INSERT and MODIFY events from DynamoDB.
Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: OrderID
          AttributeType: S
      KeySchema:
        - AttributeName: OrderID
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  OrdersEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrdersEventBus

  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: PipesAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt OrdersEventBus.Arn

  NewOrdersPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: NewOrdersPipe
      Description: Pipe for processing INSERT events from the DynamoDB stream to the EventBridge bus
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt OrdersTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
      Target: !GetAtt OrdersEventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "NewOrder"
          Source: "com.mycompany.orders"

  OrderUpdatePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: OrderUpdatePipe
      Description: Pipe for processing MODIFY events from the DynamoDB stream to the EventBridge bus
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt OrdersTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
      Target: !GetAtt OrdersEventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "OrderUpdate"
          Source: "com.mycompany.orders"

Outputs:
  OrdersTableName:
    Description: "Name of the deployed DynamoDB Table"
    Value: !Ref OrdersTable

  OrdersEventBusName:
    Description: "Name of the deployed EventBridge event bus"
    Value: !Ref OrdersEventBus

  NewOrdersPipeArn:
    Description: "ARN of the pipe processing INSERT events"
    Value: !GetAtt NewOrdersPipe.Arn

  OrderUpdatePipeArn:
    Description: "ARN of the pipe processing MODIFY events"
    Value: !GetAtt OrderUpdatePipe.Arn