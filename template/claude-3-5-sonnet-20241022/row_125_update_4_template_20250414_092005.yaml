AWSTemplateFormatVersion: '2010-09-09'
Description: API Gateway with SES Integration for Email Sending

Parameters:
  EmailDomain:
    Type: String
    Description: Verified SES domain for sending emails
  
  Environment:
    Type: String
    AllowedValues: 
      - dev
      - prod
    Default: dev
    Description: Deployment environment
    
  ApiStageName:
    Type: String
    Default: v1
    Description: API Gateway stage name
    
  UsagePlanQuota:
    Type: Number
    Default: 10000
    Description: Monthly quota for API usage
    
  ThrottlingRate:
    Type: Number
    Default: 500
    Description: Requests per second throttling limit

Resources:
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: ApiGatewaySESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-api
      Description: API for sending emails via SES
      EndpointConfiguration:
        Types:
          - REGIONAL

  EmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: email

  EmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail
        IntegrationHttpMethod: POST
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: "Action=SendEmail&Version=2010-12-01&Source=$input.path('$.from')&Destination.ToAddresses.member.1=$input.path('$.to')&Message.Subject.Data=$input.path('$.subject')&Message.Body.Text.Data=$input.path('$.content.text')&Message.Body.Html.Data=$input.path('$.content.html')"
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"message":"Email sent successfully"}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: Empty

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmailMethod
    Properties:
      RestApiId: !Ref EmailApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref EmailApi
      StageName: !Ref ApiStageName

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub ${AWS::StackName}-key
      Description: API Key for email service
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: !Ref ApiStageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Sub ${AWS::StackName}-usage-plan
      Description: Usage plan for email service
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: !Ref ApiStageName
      Quota:
        Limit: !Ref UsagePlanQuota
        Period: MONTH
      Throttle:
        RateLimit: !Ref ThrottlingRate
        BurstLimit: !Ref ThrottlingRate

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: API Endpoint URL
    Value: !Sub https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/email

  ApiKeyId:
    Description: API Key ID
    Value: !Ref ApiKey

  UsagePlanId:
    Description: Usage Plan ID
    Value: !Ref UsagePlan