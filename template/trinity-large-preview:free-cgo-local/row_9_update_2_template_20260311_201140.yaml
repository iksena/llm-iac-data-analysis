AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_7_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      AvailabilityZoneName: us-east-1a
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedOneZoneFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref SecurityGroup

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the mount target will be created
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: The security group to associate with the mount target

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EncryptedOneZoneFileSystem
  FileSystemArn:
    Description: The ARN of the created EFS file system
    Value: !GetAtt EncryptedOneZoneFileSystem.Arn