AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Service Automation Workflows

Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossServiceAutomationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EC2ManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: '*'
        - PolicyName: SSMAutomationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetParameters
                  - ssm:ListCommands
                  - ssm:ListDocuments
                Resource: '*'

Outputs:
  RoleArn:
    Description: The ARN of the IAM role created for cross-service automation workflows
    Value: !GetAtt CrossServiceAutomationRole.Arn
    Export:
      Name: CrossServiceAutomationRoleArn