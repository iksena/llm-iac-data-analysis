AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ALBAccessLogsBucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: LogRetentionRule
            Status: Enabled
            Transitions:
              - Transition:
                  Days: 30
                  StorageClass: GLACIER
            ExpirationInDays: 90
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ALBAccessLogsBucketPolicyELB:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::amazon:policy/AWSLoadBalancerControllerLogsAccess
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/*'

  ALBAccessLogsBucketPolicyDelivery:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  ALBAccessLogsBucketName:
    Description: Name of the ALB Access Logs Bucket
    Value: !Ref ALBAccessLogsBucket
  ALBAccessLogsBucketARN:
    Description: ARN of the ALB Access Logs Bucket
    Value: !GetAtt ALBAccessLogsBucket.Arn