AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template creates a centralized Amazon SNS Topic with secure cross-service notification capabilities.
  It includes an SNS Topic Policy to restrict publishing to the same AWS account and an email subscription to aggregate alerts and events from AWS services.

Parameters:
  EmailAddress:
    Description: "The email address to subscribe to SNS notifications."
    Type: String
    ConstraintDescription: "Must be a valid email address."

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "CentralizedAlertsTopic"
      TopicName: "CentralizedAlertsTopic"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: "AllowPublishFromSameAccount"
            Effect: Allow
            Principal: "*"
            Action: "SNS:Publish"
            Resource: !Ref SNSTopic
            Condition:
              StringEquals:
                "AWS:SourceOwner": !Ref "AWS::AccountId"

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  SNSTopicARN:
    Description: "The ARN of the centralized SNS Topic."
    Value: !Ref SNSTopic