AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with SSM access configuration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance will be launched
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet where the EC2 instance will be launched

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Purpose
          Value: SSM-Management

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - Ref: SSMInstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSM-managed instance
      VpcId: 
        Ref: VpcId
      SecurityGroupEgress:
        - Description: Allow all outbound traffic
          IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSM-Instance-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: 
        Ref: SubnetId
      IamInstanceProfile: 
        Ref: SSMInstanceProfile
      SecurityGroupIds:
        - Ref: InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: SSM-Managed-Instance
        - Key: Purpose
          Value: Remote-Management

Outputs:
  InstanceId:
    Description: ID of the created EC2 instance
    Value: 
      Ref: EC2Instance
  SSMConnectionCommand:
    Description: Command to connect to instance using Session Manager
    Value: 
      Fn::Sub: aws ssm start-session --target ${EC2Instance}
  SecurityGroupId:
    Description: ID of the security group
    Value:
      Ref: InstanceSecurityGroup