AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB API integration with dead-letter queue

Resources:
  EventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: CustomEventBus
    Metadata:
      Effect: public-read

  MongoDBConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value
    Metadata:
      Effect: encrypted

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDB
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*
    Metadata:
      Effect: encrypted

  MongoDBApiDestination:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationHttpParameters: {}
      InvocationRateLimitPerSecond: 10
      InvocationRetryPolicy:
        MaximumRetryAttempts: 3
        MaximumEventAgeInSeconds: 86400
      DeadLetterConfig:
        Arn: !GetAtt DeadLetterQueue.Arn
    DependsOn:
      - MongoDBConnection
      - EventBridgeRole
      - DeadLetterQueue
    Metadata:
      Effect: public-read

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300
    Metadata:
      Effect: encrypted

Metadata:
  Invariants:
    - EventBridge must have IAM permissions to invoke MongoDB API endpoint
    - MongoDB API key authentication must be securely stored
    - Dead-letter queue must be configured for fault tolerance