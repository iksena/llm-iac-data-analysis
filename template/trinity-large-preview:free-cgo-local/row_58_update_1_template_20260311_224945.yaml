AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with Monitoring, Backups, and Performance Safeguards'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
    Description: VPC ID where EFS will be deployed
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups (default: daily at midnight)
  AlarmActions:
    Type: List<String>
    Default: 'arn:aws:sns:us-east-1:123456789012:DefaultAlarmTopic'
    Description: SNS topic ARN for CloudWatch alarm notifications

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      BackupConfiguration:
        Enabled: true
        Schedule: !Ref BackupSchedule
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [0, !GetAZs '']
      SecurityGroups:
        - !Ref EfsSecurityGroup
  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [1, !GetAZs '']
      SecurityGroups:
        - !Ref EfsSecurityGroup
  MountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [2, !GetAZs '']
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VpcCidrBlock.OutputValue

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-BurstCreditBalance'
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions: !Ref AlarmActions
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsIOPercentAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-PercentIOLimit'
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: !Ref AlarmActions
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ThroughputPercent'
      MetricName: ThroughputPercent
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: !Ref AlarmActions
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  VpcCidrBlock:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: https://s3.amazonaws.com/cloudformation-templates-us-east-1/vpc.yaml

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  FileSystemArn:
    Description: EFS File System ARN
    Value: !GetAtt EfsFileSystem.Arn
  MountTargetDns:
    Description: DNS name of the first mount target
    Value: !GetAtt MountTarget1.DnsName