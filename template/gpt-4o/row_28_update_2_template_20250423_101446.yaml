AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an automated monitoring and notification system
  for AWS Secrets Manager secret lifecycle events, sending alerts via Amazon SNS.

Parameters:
  SNSTopicName:
    Type: String
    Default: SecretsManagerAlerts
    Description: The name of the SNS Topic for notifications.
  EmailSubscription:
    Type: String
    Description: The email address to subscribe to the SNS Topic.

Resources:
  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      Subscription:
        - Protocol: email
          Endpoint: !Ref EmailSubscription

  SecretsManagerEventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerEventPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SecretsManagerSNSTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Capture Secrets Manager secret lifecycle events.
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerSNSTopic
          Id: "SecretsManagerSNSTarget"
          RoleArn: !GetAtt SecretsManagerEventRole.Arn

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS Topic for Secrets Manager alerts.
    Value: !Ref SecretsManagerSNSTopic
  EventRuleName:
    Description: The name of the CloudWatch Event Rule.
    Value: !Ref SecretsManagerEventRule