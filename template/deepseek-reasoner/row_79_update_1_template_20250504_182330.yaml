AWSTemplateFormatVersion: '2010-09-09'
Description: Creates three IAM managed policies for S3 access, DynamoDB protection, and RDS protection
Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3AccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - arn:aws:s3:::ios-apps.sagebridge.org
              - arn:aws:s3:::ios-apps.sagebridge.org/*
  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DynamoDBProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: "*"
  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RDSProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
            Resource: "*"
Outputs:
  S3AccessPolicyArn:
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyArn:
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyArn:
    Value: !Ref RDSProtectionPolicy