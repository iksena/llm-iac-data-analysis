AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for S3 bucket encryption
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow access through S3
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      EnableKeyRotation: true
  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/s3-encryption-key
      TargetKeyId: !Ref KMSKey
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !Ref KMSKey
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransition
            Status: Enabled
            NoncurrentVersionTransition:
              StorageClass: GLACIER
              TransitionInDays: 30
          - Id: Expiration
            Status: Enabled
            NoncurrentVersionExpiration:
              Days: 365
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag
        - Key: CostCenter
          Value: !Ref CostCenterTag
      VersioningConfiguration:
        Status: Enabled
Outputs:
  KMSKeyId:
    Description: KMS Key ID
    Value: !Ref KMSKey
  KMSKeyAlias:
    Description: KMS Key Alias
    Value: !GetAtt KMSAlias.AliasName
  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket
Parameters:
  ProjectTag:
    Type: String
    Default: DefaultProject
  EnvironmentTag:
    Type: String
    Default: Development
  OwnerTag:
    Type: String
    Default: Team
  CostCenterTag:
    Type: String
    Default: 12345