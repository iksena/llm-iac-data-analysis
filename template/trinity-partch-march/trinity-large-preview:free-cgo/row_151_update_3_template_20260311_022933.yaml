AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AWS Bedrock Agent with Lambda function for stock price lookup

Parameters:
  BedrockModelName:
    Type: String
    Default: bedrock-aws/claude-3-sonnet-20240229
    Description: The name of the foundational model to use for the Bedrock Agent

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              # Hard-coded stock price as placeholder
              return {
                  'statusCode': 200,
                  'body': '100'
              }

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:foundation-model/${BedrockModelName}'

  StockPriceAgent:
    Type: AWS::AmazonBedrock::Agent
    Properties:
      Name: StockPriceAgent
      Description: Agent for handling stock price queries
      ModelId: !Ref BedrockModelName
      Instructions: "You are a stock price assistant. When asked about stock prices, use the getStockPrice action to retrieve the current price."
      ActionGroup:
        Name: StockPriceActionGroup
        Description: Action group for stock price lookup
        Actions:
          - Name: getStockPrice
            Description: Get the current stock price
            HttpMethod: POST
            Uri: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${StockPriceLambdaFunction}'
            RequestSchema:
              type: object
              properties:
                symbol:
                  type: string
                  description: The stock symbol to look up
              required:
                - symbol

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn
  BedrockAgentArn:
    Description: ARN of the Bedrock Agent
    Value: !GetAtt StockPriceAgent.Arn