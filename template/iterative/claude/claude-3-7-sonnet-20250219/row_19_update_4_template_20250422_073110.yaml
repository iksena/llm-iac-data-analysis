AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge configuration to route custom events to an external API endpoint'

Parameters:
  ApiEndpointUrl:
    Type: String
    Default: 'https://webhook.site/testtest'
    Description: 'The URL of the API endpoint to send events to'
  
  ApiKeyName:
    Type: String
    Default: 'x-api-key'
    Description: 'The name of the API key header'
  
  ApiKeyValue:
    Type: String
    NoEcho: true
    Default: 'dummy-api-key'
    Description: 'The value of the API key for authentication'
  
  EventBusName:
    Type: String
    Default: 'CustomEventBus'
    Description: 'The name of the custom event bus'

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
  
  ApiKeyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          Key: !Ref ApiKeyName
          Value: !Ref ApiKeyValue
        BasicAuthParameters:
          Password: ''
          Username: ''
        OAuthParameters:
          AuthorizationEndpoint: 'https://example.com/oauth2/authorize'
          ClientId: ''
          ClientSecret: ''
          HttpMethod: GET
      Name: !Sub '${EventBusName}-ApiKeyConnection'
  
  ExternalApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ApiKeyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref ApiEndpointUrl
      InvocationRateLimitPerSecond: 10
      Name: !Sub '${EventBusName}-ApiDestination'
  
  EventBridgeRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationsExecutionRole'

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EventBusName}-ForwardToApiRule'
      Description: 'Rule to forward events to the API destination'
      EventBusName: !Ref CustomEventBus
      EventPattern: 
        source:
          - prefix: ""
      State: ENABLED
      Targets:
        - Id: 'ApiDestinationTarget'
          Arn: !GetAtt ExternalApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRuleRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the custom event bus'
    Value: !GetAtt CustomEventBus.Arn
  
  ApiDestinationArn:
    Description: 'ARN of the API destination'
    Value: !GetAtt ExternalApiDestination.Arn
  
  ConnectionArn:
    Description: 'ARN of the connection'
    Value: !GetAtt ApiKeyConnection.Arn
  
  RuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt EventBridgeRule.Arn