AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VPCId:
    Type: String
    Description: ID of the existing VPC to associate with the private hosted zone (e.g., vpc-12345678)
    AllowedPattern: '^vpc-[0-9a-f]{8}|vpc-[0-9a-f]{17}$'
    ConstraintDescription: Must be a valid VPC ID in the format vpc-xxxxxxxx or vpc-xxxxxxxxxxxxxxxxx
  VPCRegion:
    Type: String
    Default: !Ref 'AWS::Region'
    Description: Region where the VPC is located (defaults to current stack region)
    AllowedValues:
      - !Ref 'AWS::Region'
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com.
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref VPCRegion
Outputs:
  HostedZoneId:
    Description: ID of the created private Route 53 hosted zone
    Value: !Ref PrivateHostedZone
  HostedZoneName:
    Description: Name of the private Route 53 hosted zone
    Value: !GetAtt PrivateHostedZone.Name
  AssociatedVPC:
    Description: VPC associated with the private hosted zone
    Value: !Sub '${VPCRegion}:${VPCId}'