AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EnvironmentType:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment type
  Username:
    Type: String
    Default: appUser
    MinLength: 4
    MaxLength: 16
    Description: Predefined username for secret

Resources:
  AppConfigParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /AppConfig/${EnvironmentType}/FeatureToggleAB
      Type: String
      Value: "This is A/B"
      Tier: Standard

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /AppConfig/${EnvironmentType}/DatabaseCredentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${Username}"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: "\"@/\\"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ParameterStoreAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/AppConfig/${EnvironmentType}/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !GetAtt DatabaseSecret.Arn

  ConfigReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ConfigReader-${EnvironmentType}
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import os
          import boto3
          from botocore.exceptions import ClientError
          
          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              secrets = boto3.client('secretsmanager')
              
              try:
                  params = ssm.get_parameters_by_path(
                      Path=f'/AppConfig/{os.environ["EnvironmentType"]}/',
                      WithDecryption=True
                  )
                  print(f"Retrieved parameters: {params}")
                  
                  secret = secrets.get_secret_value(
                      SecretId=os.environ['SECRET_ARN']
                  )
                  print("Secret retrieved successfully")
                  
                  return {
                      'statusCode': 200,
                      'body': 'Configuration retrieved successfully'
                  }
              except ClientError as e:
                  print(f"Error: {e.response['Error']['Code']}")
                  raise e
      Environment:
        Variables:
          EnvironmentType: !Ref EnvironmentType
          SECRET_ARN: !Ref DatabaseSecret
      Timeout: 30

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt ConfigReaderFunction.Arn
    Description: ARN of the configuration reader Lambda function
  SecretARN:
    Value: !Ref DatabaseSecret
    Description: ARN of the generated database secret
  SSMParameterPath:
    Value: !Sub /AppConfig/${EnvironmentType}/
    Description: Base path for SSM parameters