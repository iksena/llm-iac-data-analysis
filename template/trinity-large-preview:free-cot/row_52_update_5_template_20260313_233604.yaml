AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Region Application Failover Architecture with Route 53 ARC

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    AllowedValues:
      - us-east-1
      - us-west-2
      - eu-west-1
      - ap-southeast-1
    Description: Primary AWS region for application deployment

  SecondaryRegion:
    Type: String
    Default: us-west-2
    AllowedValues:
      - us-east-1
      - us-west-2
      - eu-west-1
      - ap-southeast-1
    Description: Secondary AWS region for failover

  ApplicationEndpoint:
    Type: String
    Default: https://example.com/health
    Description: Application health check endpoint

Resources:
  # Primary Region Resources
  PrimaryRecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Sub '${AWS::StackName}-primary-recovery-cluster'
      Tags:
        - Key: Application
          Value: MultiRegionFailover

  PrimaryControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub '${AWS::StackName}-primary-control-panel'
      ClusterArn: !GetAtt PrimaryRecoveryCluster.ClusterArn
      Tags:
        - Key: Application
          Value: MultiRegionFailover

  PrimaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub '${AWS::StackName}-primary-routing-control'
      ControlPanelArn: !GetAtt PrimaryControlPanel.ControlPanelArn

  # Secondary Region Resources
  SecondaryRecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Sub '${AWS::StackName}-secondary-recovery-cluster'
      Tags:
        - Key: Application
          Value: MultiRegionFailover

  SecondaryControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub '${AWS::StackName}-secondary-control-panel'
      ClusterArn: !GetAtt SecondaryRecoveryCluster.ClusterArn
      Tags:
        - Key: Application
          Value: MultiRegionFailover

  SecondaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub '${AWS::StackName}-secondary-routing-control'
      ControlPanelArn: !GetAtt SecondaryControlPanel.ControlPanelArn

  # Global Safety Rule (at least one region active)
  GlobalSafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Sub '${AWS::StackName}-at-least-one-active'
      ControlPanelArn: !GetAtt PrimaryControlPanel.ControlPanelArn
      Status: PENDING
      RuleConfig:
        Type: ATLEAST
        Threshold: 1
        RoutingControlArnList:
          - !GetAtt PrimaryRoutingControl.RoutingControlArn
          - !GetAtt SecondaryRoutingControl.RoutingControlArn

  # IAM Role for Route 53 ARC Operations
  Route53RecoveryControlRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: route53-recovery-control.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/Route53RecoveryControl
      Tags:
        - Key: Application
          Value: MultiRegionFailover

Outputs:
  PrimaryClusterArn:
    Description: ARN of the primary recovery cluster
    Value: !GetAtt PrimaryRecoveryCluster.ClusterArn

  SecondaryClusterArn:
    Description: ARN of the secondary recovery cluster
    Value: !GetAtt SecondaryRecoveryCluster.ClusterArn

  PrimaryControlPanelArn:
    Description: ARN of the primary control panel
    Value: !GetAtt PrimaryControlPanel.ControlPanelArn

  SecondaryControlPanelArn:
    Description: ARN of the secondary control panel
    Value: !GetAtt SecondaryControlPanel.ControlPanelArn

  GlobalSafetyRuleArn:
    Description: ARN of the global safety rule
    Value: !GetAtt GlobalSafetyRule.SafetyRuleArn