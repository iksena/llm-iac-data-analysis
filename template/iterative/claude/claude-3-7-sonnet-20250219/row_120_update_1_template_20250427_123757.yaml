AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the Batch compute environment will be created

  PrivateSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the Batch compute environment (minimum of 2 recommended)

  ContainerImage:
    Type: String
    Description: URI of the container image to use for the Batch job
    Default: amazon/amazon-ecs-sample

  InstanceTypes:
    Type: CommaDelimitedList
    Description: Instance types to use for the Batch compute environment
    Default: optimal

  MinvCpus:
    Type: Number
    Description: Minimum number of vCPUs for the Batch compute environment
    Default: 0
    MinValue: 0

  MaxvCpus:
    Type: Number
    Description: Maximum number of vCPUs for the Batch compute environment
    Default: 16
    MinValue: 1

  JobMemory:
    Type: Number
    Description: Memory (in MiB) required for the Batch job
    Default: 2048
    MinValue: 4

  JobvCpus:
    Type: Number
    Description: vCPUs required for the Batch job
    Default: 1
    MinValue: 1

  MessageRetentionPeriod:
    Type: Number
    Description: SQS message retention period in seconds
    Default: 345600  # 4 days
    MinValue: 60
    MaxValue: 1209600  # 14 days

  MessageFilterPattern:
    Type: String
    Description: JSON pattern to filter messages (e.g., for OrderCreated events)
    Default: '{"messageType": ["OrderCreated"]}'

Resources:
  # IAM Roles
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesSQSBatchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource:
                  - !GetAtt BatchJobQueue.Arn
                  - !Ref BatchJobDefinition

  # Security Group
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Batch compute environment
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # SQS Queue
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: 300  # 5 minutes
      Tags:
        - Key: Name
          Value: EventDrivenBatchQueue

  # AWS Batch Resources
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      State: ENABLED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: !Ref MinvCpus
        MaxvCpus: !Ref MaxvCpus
        InstanceTypes: !Ref InstanceTypes
        Subnets: !Ref PrivateSubnets
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        InstanceRole: !GetAtt BatchInstanceProfile.Arn
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        Tags:
          Name: BatchComputeEnvironment

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Memory: !Ref JobMemory
        Vcpus: !Ref JobvCpus
        ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref BatchLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: batch
      RetryStrategy:
        Attempts: 3
      Timeout:
        AttemptDurationSeconds: 900  # 15 minutes

  # CloudWatch Logs
  BatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/batch/job/${AWS::StackName}
      RetentionInDays: 14

  # EventBridge Pipe
  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-sqs-to-batch-pipe
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt EventQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 10
          MaximumBatchingWindowInSeconds: 30
      Target: !GetAtt BatchJobQueue.Arn
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: !Sub ${AWS::StackName}-job
          RetryStrategy:
            Attempts: 3
      Enrichment: !GetAtt EventQueue.Arn
      EnrichmentParameters:
        InputTemplate: !Sub |
          {
            "jobName": "${AWS::StackName}-job-<aws.pipes.event.json.messageId>",
            "parameters": {
              "messageId": "<aws.pipes.event.json.messageId>",
              "messageType": "<aws.pipes.event.json.messageType>"
            }
          }
      FilterCriteria:
        Filters:
          - Pattern: !Ref MessageFilterPattern

Outputs:
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref EventQueue

  QueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn

  BatchJobQueueARN:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn

  BatchJobDefinitionARN:
    Description: ARN of the Batch job definition
    Value: !Ref BatchJobDefinition

  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !Ref EventBridgePipe