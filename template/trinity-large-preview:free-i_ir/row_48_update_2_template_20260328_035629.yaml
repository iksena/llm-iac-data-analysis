AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  GluePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: GlueS3AccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - Fn::Join:
                  - ''
                  - - 'arn:aws:s3:::'
                    - Ref: GlueScriptBucket
                    - /*
              - Fn::Join:
                  - ''
                  - - 'arn:aws:s3:::'
                    - Ref: GlueScriptBucket
      Roles:
        - Ref: GlueRole

  GlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: SampleConvertJob
      Role:
        Fn::GetAtt:
          - GlueRole
          - Arn
      Command:
        Name: glueetl
        ScriptLocation:
          Fn::Join:
            - ''
            - - 's3://'
              - Ref: GlueScriptBucket
              - '/gue_scripts/sample_convert.py'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': python
      GlueVersion: '4.0'

Outputs:
  GlueJobName:
    Description: Name of the created Glue Job
    Value:
      Ref: GlueJob
    Export:
      Name: !Sub "${AWS::StackName}-GlueJobName"