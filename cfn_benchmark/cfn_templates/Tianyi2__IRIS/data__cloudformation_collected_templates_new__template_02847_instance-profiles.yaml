          Statement:
          - Action:
            - ec2:CreateTags
            - ec2:DeleteSnapshot
            - ec2:DescribeImages
            - ec2:DescribeInstances
            - ec2:DescribeSnapshots
            - ec2:DescribeVolumes
            - ec2:TerminateInstances
            - ses:SendEmail
            - elasticloadbalancing:*
            Effect: Allow
            Resource: '*'
          - Action:
            - autoscaling:DeleteAutoScalingGroup
            - autoscaling:DescribeAutoScalingGroups
            - autoscaling:DescribeAutoScalingInstances
            Effect: Allow
            Resource: '*'
          - Action:
            - sdb:BatchDeleteAttributes
            - sdb:BatchPutAttributes
            - sdb:DomainMetadata
            - sdb:GetAttributes
            - sdb:PutAttributes
            - sdb:ListDomains
            - sdb:CreateDomain
            - sdb:Select
            Effect: Allow
            Resource: '*'
          - Action:
            - ec2:Describe*
            Effect: Allow
            Resource: '*'
          - Action:
            - ssm:GetParameter
            Effect: Allow
            Resource:
            - Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aem-opencloud/*"
            - Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aem-opencloud/*/*"
          - Action:
            - s3:Get*
            - s3:List*
            Effect: Allow
            Resource: '*'
          - Action:
            - logs:*
            Effect: Allow
            Resource:
            - arn:aws:logs:*:*:*
          Version: '2012-10-17'
        PolicyName: ChaosMonkeyRolePolicy
