AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable Amazon EFS with Monitoring and Automated Backups

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet
  EnableBackup:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Enable automated backups via AWS Backup
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups
  AlarmEmail:
    Type: String
    Default: admin@example.com
    Description: Email address for CloudWatch alarm notifications

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EFSVPCSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS-SG

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      BackupPolicy:
        Enabled: !Ref EnableBackup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref EFSVPCSecurityGroup

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic
      Subscription:
        - Endpoint: !Ref AlarmEmail
          Protocol: email

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-BurstCreditBalance
      AlarmDescription: Alarm when burst credit balance is low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  PercentIOBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-PercentIOBalance
      AlarmDescription: Alarm when I/O utilization is high
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-Throughput
      AlarmDescription: Alarm when throughput is high
      Namespace: AWS/EFS
      MetricName: TotalIOBytes
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: CreateBackupResources
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-BackupVault
      BackupVaultTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-BackupVault

  BackupServiceRole:
    Type: AWS::IAM::Role
    Condition: CreateBackupResources
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: CreateBackupResources
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-BackupPlan
        Rules:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: CreateBackupResources
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Ref FileSystem

Conditions:
  CreateBackupResources: !Equals [ !Ref EnableBackup, true ]

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem
  MountTargetDNSName:
    Description: EFS Mount Target DNS Name
    Value: !GetAtt MountTarget.DnsName
  FileSystemArn:
    Description: EFS File System ARN
    Value: !Ref FileSystem
  BackupPlanArn:
    Description: Backup Plan ARN
    Value: !If [ CreateBackupResources, !Ref BackupPlan, "Backup not enabled" ]