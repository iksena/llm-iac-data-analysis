AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a private Route 53 hosted zone'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where the private hosted zone will be associated'
  
  DomainName:
    Type: String
    Default: 'www.example.com'
    Description: 'Domain name for the private hosted zone'
    AllowedPattern: '^([a-zA-Z0-9][a-zA-Z0-9-]*\.)+[a-zA-Z]{2,}$'

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS management'
      HostedZoneTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-hosted-zone'
        - Key: Environment
          Value: Production

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneId'
  
  HostedZoneName:
    Description: 'The domain name of the private hosted zone'
    Value: !Ref DomainName
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneName'