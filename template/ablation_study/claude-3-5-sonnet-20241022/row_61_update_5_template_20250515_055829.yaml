AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a private Route 53 hosted zone for internal DNS resolution'

Parameters:
  VpcId:
    Type: String
    Description: 'ID of the VPC where the private hosted zone will be associated. Leave empty to use the default VPC.'
    Default: ''
    AllowedPattern: '^(vpc-[a-z0-9]{8,}|)$'
    ConstraintDescription: 'Must be a valid VPC ID or empty'

Conditions:
  UseProvidedVpc: !Not [!Equals [!Ref VpcId, '']]

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: 'www.example.com.'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS resolution'
      HostedZoneTags:
        - Key: Name
          Value: 'www.example.com Private Zone'
        - Key: Environment
          Value: !Ref 'AWS::StackName'
        - Key: CreatedBy
          Value: 'CloudFormation'
        - Key: Purpose
          Value: 'Internal DNS Resolution'
      VPCs:
        - VPCId: !If 
            - UseProvidedVpc
            - !Ref VpcId
            - !Ref 'AWS::DefaultVPC'
          VPCRegion: !Ref 'AWS::Region'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneId'

  HostedZoneName:
    Description: 'The domain name of the private hosted zone'
    Value: 'www.example.com'
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneName'

  AssociatedVpc:
    Description: 'The VPC associated with the private hosted zone'
    Value: !If 
      - UseProvidedVpc
      - !Ref VpcId
      - !Ref 'AWS::DefaultVPC'
    Export:
      Name: !Sub '${AWS::StackName}-AssociatedVpc'