AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates a secure and cost-optimized S3 bucket for storing CloudWatch export data.
  The bucket is configured with server-side encryption, configurable versioning, automated lifecycle management,
  and enforced public access blocking where supported. A bucket policy is attached to enforce private access and secure transport.

Parameters:
  Versioning:
    Description: "Bucket versioning state: 'Enabled' or 'Suspended'."
    Type: String
    AllowedValues:
      - Enabled
      - Suspended
    Default: Enabled
  ExpirationDays:
    Description: "Number of days after which objects in the bucket will expire."
    Type: Number
    Default: 30

Conditions:
  DeployPublicAccessBlock:
    Fn::Not:
      - Fn::Equals:
          - Ref: AWS::Region
          - "us-east-1"

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: !Ref Versioning
      LifecycleConfiguration:
        Rules:
          - Id: ExpireObjectsRule
            Status: Enabled
            Prefix: ""
            ExpirationInDays: !Ref ExpirationDays
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowOwnerFullControl
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}-${AWS::AccountId}/*"
          - Sid: EnforceSSL
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"
              - !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}-${AWS::AccountId}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  S3BucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Condition: DeployPublicAccessBlock
    Properties:
      Bucket: !Ref S3Bucket
      BlockPublicAcls: true
      BlockPublicPolicy: true
      IgnorePublicAcls: true
      RestrictPublicBuckets: true

Outputs:
  BucketNameOutput:
    Description: "The name of the S3 bucket."
    Value: !Ref S3Bucket
  BucketArn:
    Description: "The ARN of the S3 bucket."
    Value: !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}-${AWS::AccountId}"