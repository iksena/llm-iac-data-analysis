AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-wide Access Control

Parameters:
  OrganizationId:
    Type: String
    Description: AWS Organization ID (e.g., o-xxxxxxxxxx) for organization-wide access
    Default: ''
    AllowedPattern: '^o-[a-z0-9]{10,32}$|^$'
  OrganizationUnitId:
    Type: String
    Description: AWS Organization Unit ID (e.g., ou-abcd-1234abcd) for OU-wide access
    Default: ''
    AllowedPattern: '^ou-[a-z0-9]{8,32}-[a-z0-9]{8,32}$|^$'
  BucketName:
    Type: String
    Description: Name of the S3 bucket
    Default: my-org-access-bucket
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9.-]+$'

Resources:
  OrgAccessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OrgAccessBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OrgAccessBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OrgAccess
            Effect: Allow
            Principal:
              AWS:
                Fn::If:
                  - HasOrganizationId
                  - Fn::Sub:
                      - 'arn:${Partition}:organizations::${MasterAccountId}:root/o-${OrganizationId}'
                  - Fn::If:
                      - HasOrganizationUnitId
                      - Fn::Sub:
                          - 'arn:${Partition}:organizations::${MasterAccountId}:ouid/${OrganizationUnitId}'
                      - Ref: AWS::NoValue
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - Fn::Sub: 'arn:${AWS::Partition}:s3:::${BucketName}'
              - Fn::Sub: 'arn:${AWS::Partition}:s3:::${BucketName}/*'

Conditions:
  HasOrganizationId: !Not [Fn::Equals: [!Ref OrganizationId, '']]
  HasOrganizationUnitId: !Not [Fn::Equals: [!Ref OrganizationUnitId, '']]

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref OrgAccessBucket
  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt OrgAccessBucket.Arn