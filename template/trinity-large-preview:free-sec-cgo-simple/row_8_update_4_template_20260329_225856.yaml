AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights widgets for NAT Gateway analysis

Parameters:
  LogGroupName:
    Type: String
    Default: 'vpc-flow-logs'
    Description: Name of the VPC Flow Log group (e.g., 'vpc-flow-logs')
  DashboardRegion:
    Type: String
    Default: !Ref 'AWS::Region'
    Description: AWS Region for the dashboard

Resources:
  QueryExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsReadOnlyAccess

  TopSourceIPsByOutboundTrafficQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsByOutboundTraffic
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and action = 'accept' and trafficType = 'egress'
        | stats sum(bytes) as TotalBytes by srcAddr
        | sort TotalBytes desc
        | limit 20
      RoleArn: !GetAtt QueryExecutionRole.Arn

  TopSourceIPsByRejectedConnectionsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsByRejectedConnections
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and action = 'reject'
        | stats count(*) as RejectedCount by srcAddr
        | sort RejectedCount desc
        | limit 20
      RoleArn: !GetAtt QueryExecutionRole.Arn

  TopSourceIPsByInboundTrafficQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsByInboundTraffic
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and action = 'accept' and trafficType = 'ingress'
        | stats sum(bytes) as TotalBytes by srcAddr
        | sort TotalBytes desc
        | limit 20
      RoleArn: !GetAtt QueryExecutionRole.Arn

  TopDestinationIPsByOutboundTrafficQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPsByOutboundTraffic
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and action = 'accept' and trafficType = 'egress'
        | stats sum(bytes) as TotalBytes by dstAddr
        | sort TotalBytes desc
        | limit 20
      RoleArn: !GetAtt QueryExecutionRole.Arn

  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogsInsights
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs by Outbound Traffic",
                "view": "table",
                "region": !Ref DashboardRegion,
                "stacked": false,
                "queryId": "${TopSourceIPsByOutboundTrafficQuery.Arn}"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs by Rejected Connections",
                "view": "table",
                "region": !Ref DashboardRegion,
                "stacked": false,
                "queryId": "${TopSourceIPsByRejectedConnectionsQuery.Arn}"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Source IPs by Inbound Traffic",
                "view": "table",
                "region": !Ref DashboardRegion,
                "stacked": false,
                "queryId": "${TopSourceIPsByInboundTrafficQuery.Arn}"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Top Destination IPs by Outbound Traffic",
                "view": "table",
                "region": !Ref DashboardRegion,
                "stacked": false,
                "queryId": "${TopDestinationIPsByOutboundTrafficQuery.Arn}"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: Name of the created CloudWatch Dashboard
    Value: !Ref NATGatewayDashboard
  QueryExecutionRoleArn:
    Description: ARN of the query execution role
    Value: !GetAtt QueryExecutionRole.Arn