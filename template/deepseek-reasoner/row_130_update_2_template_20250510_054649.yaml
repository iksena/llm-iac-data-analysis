AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  PasswordExpiration:
    Type: Number
    Default: 90
  PreventReuse:
    Type: Number
    Default: 24
  AllowPasswordChange:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  PermissionBoundaryArn:
    Type: String
    Default: ''
    Description: Optional IAM Permission Boundary ARN for Lambda role
Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, '']]
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPasswordPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:UpdateAccountPasswordPolicy
                Resource: '*'
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref "AWS::NoValue"]
  SetPasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          const { IAM } = require('@aws-sdk/client-iam');
          const https = require('https');
          
          async function sendResponse(event, context, status, data = {}) {
              const responseBody = JSON.stringify({
                  Status: status,
                  Reason: `See CloudWatch Logs: ${context.logStreamName}`,
                  PhysicalResourceId: event.PhysicalResourceId || context.logStreamName,
                  StackId: event.StackId,
                  RequestId: event.RequestId,
                  LogicalResourceId: event.LogicalResourceId,
                  Data: data
              });
          
              const parsedUrl = new URL(event.ResponseURL);
              const options = {
                  hostname: parsedUrl.hostname,
                  path: parsedUrl.pathname + parsedUrl.search,
                  method: 'PUT',
                  headers: { 'Content-Type': '', 'Content-Length': responseBody.length }
              };
          
              return new Promise((resolve, reject) => {
                  const req = https.request(options, (res) => {
                      res.on('data', () => {});
                      res.on('end', () => resolve());
                  });
                  req.on('error', (error) => reject(error));
                  req.write(responseBody);
                  req.end();
              });
          }
          
          exports.handler = async (event, context) => {
              const iam = new IAM();
              try {
                  if (event.RequestType === 'Delete') {
                      await iam.updateAccountPasswordPolicy({
                          MinimumPasswordLength: 6,
                          RequireUppercaseCharacters: false,
                          RequireLowercaseCharacters: false,
                          RequireNumbers: false,
                          RequireSymbols: false,
                          MaxPasswordAge: 0,
                          PasswordReusePrevention: 0,
                          AllowUsersToChangePassword: true
                      });
                  } else {
                      const params = {
                          MinimumPasswordLength: parseInt(event.ResourceProperties.MinimumPasswordLength, 10),
                          RequireUppercaseCharacters: event.ResourceProperties.RequireUppercase === 'true',
                          RequireLowercaseCharacters: event.ResourceProperties.RequireLowercase === 'true',
                          RequireNumbers: event.ResourceProperties.RequireNumbers === 'true',
                          RequireSymbols: event.ResourceProperties.RequireSymbols === 'true',
                          MaxPasswordAge: parseInt(event.ResourceProperties.PasswordExpiration, 10),
                          PasswordReusePrevention: parseInt(event.ResourceProperties.PreventReuse, 10),
                          AllowUsersToChangePassword: event.ResourceProperties.AllowPasswordChange === 'true'
                      };
                      await iam.updateAccountPasswordPolicy(params);
                  }
                  await sendResponse(event, context, 'SUCCESS');
              } catch (error) {
                  console.error('Error:', error);
                  await sendResponse(event, context, 'FAILED', { Error: error.message });
              }
          };
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SetPasswordPolicyLambda.Arn
      Principal: cloudformation.amazonaws.com
  PasswordPolicyConfig:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: SetPasswordPolicyLambda
    Properties:
      ServiceToken: !GetAtt SetPasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      PasswordExpiration: !Ref PasswordExpiration
      PreventReuse: !Ref PreventReuse
      AllowPasswordChange: !Ref AllowPasswordChange
Outputs:
  PolicyStatus:
    Value: AWS Account Password Policy configured successfully