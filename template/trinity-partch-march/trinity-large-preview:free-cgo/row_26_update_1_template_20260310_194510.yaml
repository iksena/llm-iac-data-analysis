AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          Enabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: S3ObjectCreationNotifications
      TopicName: S3ObjectCreationTopic
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Triggers on S3 Object Created events
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - 'PutObject'
            - 'CompleteMultipartUpload'
          requestParameters:
            bucketName:
              - !Ref S3Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSNotificationTarget
  S3EventBridgePermission:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleARN:
    Description: ARN of the EventBridge rule
    Value: !Ref EventBridgeRule