AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create S3 bucket for VPC flow logs with lifecycle management and access controls

Parameters:
  BucketName:
    Type: String
    Description: Custom name for the S3 bucket (optional)
    Default: ""
  EnableVersioning:
    Type: String
    Description: Enable or suspend versioning for the bucket
    AllowedValues:
      - Enabled
      - Suspended
    Default: Suspended
  TransitionDays:
    Type: Number
    Description: Number of days before transitioning objects to Glacier
    Default: 30
  ExpirationDays:
    Type: Number
    Description: Number of days before deleting objects
    Default: 365000

Resources:
  VPCFlowLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::If:
          - HasCustomBucketName
          - Ref: BucketName
          - Fn::Join:
              - "-"
              - - "vpc-flow-logs"
                - Fn::Select:
                    - 0
                    - Fn::Split:
                        - "-"
                        - Fn::Select:
                            - 0
                            - Fn::Split:
                                - "/"
                                - Fn::Select:
                                    - 1
                                    - Fn::Split:
                                        - ":"
                                        - Ref: AWS::AccountId
                - Fn::Select:
                    - 0
                    - Fn::Split:
                        - "-"
                        - Fn::Select:
                            - 0
                            - Fn::Split:
                                - "."
                                - Fn::Select:
                                    - 0
                                    - Fn::Split:
                                        - ":"
                                        - Ref: AWS::Region
      VersioningConfiguration:
        Status:
          Ref: EnableVersioning
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - Days:
                  Ref: TransitionDays
                StorageClass: GLACIER
            ExpirationInDays:
              Ref: ExpirationDays

  VPCFlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: VPCFlowLogBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource:
              Fn::Join:
                - ""
                - - "arn:aws:s3:::"
                  - Ref: VPCFlowLogBucket
                  - "/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource:
              Fn::Join:
                - ""
                - - "arn:aws:s3:::"
                  - Ref: VPCFlowLogBucket

Conditions:
  HasCustomBucketName:
    Fn::Not:
      - Fn::Equals:
          - Ref: BucketName
          - ""

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: S3 Bucket Configuration
        Parameters:
          - BucketName
          - EnableVersioning
      - Label:
          default: Lifecycle Management
        Parameters:
          - TransitionDays
          - ExpirationDays
    ParameterLabels:
      BucketName:
        default: Bucket Name
      EnableVersioning:
        default: Versioning Status
      TransitionDays:
        default: Transition to Glacier (days)
      ExpirationDays:
        default: Expiration (days)