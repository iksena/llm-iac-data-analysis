AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for encrypted EFS file system with cross-AZ EC2 integration and monitoring

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  FileSystemPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref FileSystemPerformanceMode
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  EfsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEFSReadOnlyAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EfsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EfsInstanceRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          !Sub 'LatestAmiId'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref Subnet1
      IamInstanceProfile: !Ref EfsInstanceProfile
      SecurityGroupIds:
        - !Ref EfsSecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /home/efs
            mount -t efs ${EfsFileSystem}:/ /home/efs
            echo "${EfsFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2-Instance-1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          !Sub 'LatestAmiId'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref Subnet2
      IamInstanceProfile: !Ref EfsInstanceProfile
      SecurityGroupIds:
        - !Ref EfsSecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /home/efs
            mount -t efs ${EfsFileSystem}:/ /home/efs
            echo "${EfsFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2-Instance-2

  EfsIoLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EFS-PercentIOLimit
      AlarmDescription: Alarm for EFS PercentIOLimit
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EFS-BurstCreditBalance
      AlarmDescription: Alarm for EFS BurstCreditBalance
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub ${AWS::StackName}-EFS-Alarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  MountTarget1Id:
    Description: Mount Target 1 ID
    Value: !Ref MountTarget1
  MountTarget2Id:
    Description: Mount Target 2 ID
    Value: !Ref MountTarget2
  EC2Instance1Id:
    Description: EC2 Instance 1 ID
    Value: !Ref EC2Instance1
  EC2Instance2Id:
    Description: EC2 Instance 2 ID
    Value: !Ref EC2Instance2