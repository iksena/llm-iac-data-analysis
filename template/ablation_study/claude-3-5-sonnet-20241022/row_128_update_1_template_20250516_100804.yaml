AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated solution for managing AWS Security Hub controls'

Parameters:
  DisableCIS140Controls:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Whether to disable CIS 1.4.0 controls'

  EnablePermissionBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Enable IAM permission boundary for Lambda role'

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: 'CloudWatch Logs retention period in days'

  CustomSecurityHubControls:
    Type: CommaDelimitedList
    Default: ''
    Description: 'Comma-separated list of Security Hub control IDs to disable'

Conditions:
  UsePermissionBoundary: !Equals [!Ref EnablePermissionBoundary, 'true']

Resources:
  LambdaPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Condition: UsePermissionBoundary
    Properties:
      Description: Permission boundary for Security Hub controls management
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'securityhub:UpdateSecurityHubConfiguration'
              - 'securityhub:UpdateStandardsControl'
              - 'securityhub:GetEnabledStandards'
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource: '*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If 
        - UsePermissionBoundary
        - !Ref LambdaPermissionBoundary
        - !Ref AWS::NoValue
      Policies:
        - PolicyName: SecurityHubManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'securityhub:UpdateSecurityHubConfiguration'
                  - 'securityhub:UpdateStandardsControl'
                  - 'securityhub:GetEnabledStandards'
                Resource: '*'

  SecurityHubControlsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          securityhub = boto3.client('securityhub')

          def handler(event, context):
              try:
                  disable_cis = os.environ['DISABLE_CIS_140'] == 'true'
                  custom_controls = os.environ['CUSTOM_CONTROLS'].split(',') if os.environ['CUSTOM_CONTROLS'] else []
                  
                  standards = securityhub.get_enabled_standards()
                  
                  for standard in standards['StandardsSubscriptions']:
                      if disable_cis and 'CIS' in standard['StandardsArn']:
                          update_controls(standard['StandardsSubscriptionArn'], True)
                      
                      if custom_controls:
                          update_custom_controls(standard['StandardsSubscriptionArn'], custom_controls)
                  
                  return {'statusCode': 200, 'message': 'Successfully updated Security Hub controls'}
              except Exception as e:
                  logger.error(f"Error updating Security Hub controls: {str(e)}")
                  raise

              def update_controls(subscription_arn, disable):
                  response = securityhub.update_standards_control(
                      StandardsControlArn=subscription_arn,
                      ControlStatus='DISABLED' if disable else 'ENABLED'
                  )
                  return response

              def update_custom_controls(subscription_arn, control_ids):
                  for control_id in control_ids:
                      update_controls(f"{subscription_arn}/control/{control_id}", True)

      Runtime: python3.9
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          DISABLE_CIS_140: !Ref DisableCIS140Controls
          CUSTOM_CONTROLS: !Join [',', !Ref CustomSecurityHubControls]

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${SecurityHubControlsFunction}'
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Security Hub Controls Lambda function'
    Value: !GetAtt SecurityHubControlsFunction.Arn

  LambdaRoleArn:
    Description: 'ARN of the Lambda execution role'
    Value: !GetAtt LambdaExecutionRole.Arn

  LogGroupName:
    Description: 'Name of the CloudWatch Logs group'
    Value: !Ref LambdaLogGroup