AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Sub '${AWS::StackName}-CrossServiceAutomationRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
                - monitoring.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EC2AutomationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:Get*
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: '*'
Outputs:
  AutomationRoleArn:
    Description: ARN of the Cross Service Automation IAM Role
    Value: !GetAtt CrossServiceAutomationRole.Arn