AWSTemplateFormatVersion: '2010-09-09'
Description: Enables AWS Security Hub with default standards and consolidated control findings
Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true
      ControlFindingGenerator: SECURITY_CONTROL

  CISStandardSubscription:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: 'arn:aws:securityhub:::standards/cis-aws-foundations-benchmark/v/1.4.0'
    DependsOn: SecurityHub

  AWSFoundationalStandardSubscription:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: !Sub 'arn:aws:securityhub:${AWS::Region}::standards/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

  PCIStandardSubscription:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: 'arn:aws:securityhub:::standards/pci-dss/v/3.2.1'
    DependsOn: SecurityHub