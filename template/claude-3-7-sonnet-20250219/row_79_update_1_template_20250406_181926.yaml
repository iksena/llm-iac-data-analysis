AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates three IAM managed policies for S3 access and protection of DynamoDB and RDS resources'

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Grants read/write access to the ios-apps.sagebridge.org S3 bucket
      ManagedPolicyName: S3AccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org/*'
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org'

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Explicitly denies deletion or schema-modification actions for DynamoDB tables
      ManagedPolicyName: DynamoDBProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Blocks destructive RDS operations to safeguard databases and backups
      ManagedPolicyName: RDSProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteDBInstanceAutomatedBackup
              - rds:StopDBInstance
              - rds:StopDBCluster
            Resource: '*'

Outputs:
  S3AccessPolicyARN:
    Description: ARN of the S3 Access Policy
    Value: !Ref S3AccessPolicy
  
  DynamoDBProtectionPolicyARN:
    Description: ARN of the DynamoDB Protection Policy
    Value: !Ref DynamoDBProtectionPolicy
  
  RDSProtectionPolicyARN:
    Description: ARN of the RDS Protection Policy
    Value: !Ref RDSProtectionPolicy