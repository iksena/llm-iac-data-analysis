AWSTemplateFormatVersion: '2010-09-09'
Description: >
  A CloudFormation template to create an AWS Lambda function using Node.js 20.x runtime that prints "hello world".
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloWorldLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HelloWorldFunction
      Description: Lambda function that prints "hello world" using Node.js 20.x runtime.
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log("hello world");
              return {
                  statusCode: 200,
                  body: JSON.stringify('hello world'),
              };
          };
Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Hello World Lambda function"
    Value: !GetAtt HelloWorldLambdaFunction.Arn