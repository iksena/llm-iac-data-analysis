AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Custom bucket name (leave empty for auto-generated)
    AllowedPattern: ^[a-z0-9\-.]*$
    ConstraintDescription: Lowercase letters, numbers, hyphens, and periods only
  EnableVersioning:
    Type: String
    Default: Enabled
    AllowedValues: [Enabled, Suspended]
  TransitionDays:
    Type: Number
    Default: 30
    MinValue: 0
    Description: Days until transitioning to Glacier (0 for immediate)
  RetentionDays:
    Type: Number
    Default: 365000
    MinValue: 1
    Description: Days until permanent deletion (minimum 1)

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref AWS::NoValue]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransitionRule
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref TransitionDays
            ExpirationInDays: !Ref RetentionDays

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub ${FlowLogsBucket.Arn}/*
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Value: !Ref FlowLogsBucket
  BucketARN:
    Value: !GetAtt FlowLogsBucket.Arn