AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch pipeline triggered by SQS messages via EventBridge Pipes'

Parameters:
  VpcId:
    Description: 'ID of existing VPC for resource isolation'
    Type: 'AWS::EC2::VPC::Id'
  PrivateSubnetIds:
    Description: 'Comma-separated list of private subnet IDs for Batch compute environment'
    Type: 'CommaDelimitedList'
  Image:
    Description: 'Container image for Batch job (ECR or Docker Hub)'
    Type: 'String'
    MinLength: '1'
  QueueName:
    Description: 'Name for the SQS queue'
    Type: 'String'
    Default: 'OrderProcessingQueue'
    MinLength: '1'
    MaxLength: '80'
    AllowedPattern: '[a-zA-Z0-9_-]{1,80}'

Resources:
  ProcessingQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 300

  BatchSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for AWS Batch compute environment'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'

  BatchServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'BatchServiceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'batch.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'

  BatchInstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'BatchInstanceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role'

  BatchInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: 'BatchInstanceProfile'
      Roles:
        - !Ref BatchInstanceRole

  ECSTaskExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'ECSTaskExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ecs-tasks.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'

  BatchComputeEnvironment:
    Type: 'AWS::Batch::ComputeEnvironment'
    Properties:
      Type: 'MANAGED'
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: 'EC2'
        AllocationStrategy: 'BEST_FIT_PROGRESSIVE'
        MinvCpus: 0
        MaxvCpus: 256
        DesiredvCpus: 0
        InstanceRole: !Ref BatchInstanceProfile
        InstanceTypes:
          - 'optimal'
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        Subnets: !Ref PrivateSubnetIds
      State: 'ENABLED'

  BatchJobQueue:
    Type: 'AWS::Batch::JobQueue'
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      State: 'ENABLED'

  BatchJobDefinition:
    Type: 'AWS::Batch::JobDefinition'
    Properties:
      Type: 'container'
      ContainerProperties:
        Image: !Ref Image
        ResourceRequirements:
          - Type: 'VCPU'
            Value: '1'
          - Type: 'MEMORY'
            Value: '512'
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn

  PipeRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'PipeRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'pipes.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'PipePolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !GetAtt ProcessingQueue.Arn
              - Effect: 'Allow'
                Action:
                  - 'batch:SubmitJob'
                Resource: !GetAtt BatchJobQueue.Arn

  EventBridgePipe:
    Type: 'AWS::Pipes::Pipe'
    Properties:
      Source: !GetAtt ProcessingQueue.Arn
      Target: !GetAtt BatchJobQueue.Arn
      RoleArn: !GetAtt PipeRole.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: 'OrderProcessingJob'
      Filter: '{ "body": { "eventType": [ "OrderCreated" ] } }'

Outputs:
  SQSQueueUrl:
    Description: 'URL of the SQS queue for event producers'
    Value: !Ref ProcessingQueue
  BatchJobQueueArn:
    Description: 'ARN of the Batch job queue'
    Value: !GetAtt BatchJobQueue.JobQueueArn
  BatchJobDefinitionArn:
    Description: 'ARN of the Batch job definition'
    Value: !Ref BatchJobDefinition
  EventBridgePipeArn:
    Description: 'ARN of the EventBridge Pipe'
    Value: !GetAtt EventBridgePipe.Arn