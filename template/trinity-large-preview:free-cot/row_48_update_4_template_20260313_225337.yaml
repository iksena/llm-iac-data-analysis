AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'glue-scripts-${AWS::StackName}-${AWS::Region}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled

  GlueScriptBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${GlueScriptBucket}/*'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GlueServiceRole-${AWS::StackName}'
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub 'GlueETLJob-${AWS::StackName}'
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${GlueScriptBucket}/gue_scripts/sample_convert.py'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': 'python'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      NumberOfWorkers: 2
      Timeout: 60
      WorkerType: G.1X

Outputs:
  GlueETLJobName:
    Description: Name of the created Glue ETL Job
    Value: !Ref GlueETLJob
  GlueScriptBucketName:
    Description: Name of the S3 bucket for Glue scripts
    Value: !Ref GlueScriptBucket