AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Resources:
  DynamoDbTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: BillingMode PAY_PER_REQUEST is appropriate for this use case

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrdersEventBus

  InsertPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: InsertPipe
      Source:
        Type: DynamoDBStream
        SourceSettings:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
      Target:
        Type: EventBridgeEventBus
        TargetSettings:
          EventBusName:
            Ref: EventBus
      RoleArn:
        Fn::GetAtt:
          - InsertPipeRole
          - Arn
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - INSERT

  ModifyPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: ModifyPipe
      Source:
        Type: DynamoDBStream
        SourceSettings:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
      Target:
        Type: EventBridgeEventBus
        TargetSettings:
          EventBusName:
            Ref: EventBus
      RoleArn:
        Fn::GetAtt:
          - ModifyPipeRole
          - Arn
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - MODIFY

  InsertPipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: PipesToEventBridge
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  Fn::GetAtt:
                    - EventBus
                    - Arn

  ModifyPipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: PipesToEventBridge
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  Fn::GetAtt:
                    - EventBus
                    - Arn

Outputs:
  DynamoDbTableArn:
    Description: ARN of the DynamoDB table
    Value:
      Fn::GetAtt:
        - DynamoDbTable
        - Arn
  EventBusName:
    Description: Name of the EventBridge event bus
    Value:
      Ref: EventBus