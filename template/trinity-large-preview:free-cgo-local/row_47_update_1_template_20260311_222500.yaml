AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for EC2 instances with read-only access to IAM metadata

Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2-IAM-ReadOnly-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Policies:
        - PolicyName: EC2-IAM-ReadOnly-Permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:Get*
                  - iam:List*
                Resource: '*'

Outputs:
  IAMRoleARN:
    Description: ARN of the IAM Role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: EC2-IAM-ReadOnly-Role-ARN