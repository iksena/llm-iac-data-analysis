AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon ECS cluster that leverages both Fargate and Fargate Spot capacity providers for cost-effective containerized application deployment.

Parameters:
  ClusterName:
    Description: "Name of the ECS Cluster"
    Type: String
    Default: "MyECSFargateCluster"
    MinLength: 1
    MaxLength: 255
    AllowedPattern: "[a-zA-Z0-9-_]+"
    ConstraintDescription: "Cluster name can only contain alphanumeric characters, hyphens, and underscores."

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT

Outputs:
  ECSClusterName:
    Description: "The name of the ECS Cluster created."
    Value: !Ref ECSCluster
  ECSClusterArn:
    Description: "The ARN of the ECS Cluster created."
    Value: !GetAtt ECSCluster.Arn