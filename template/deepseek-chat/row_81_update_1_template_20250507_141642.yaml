AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an AWS Resource Group with tag-based filters'

Parameters:
  TagKey:
    Description: 'The tag key to use for filtering resources'
    Type: String
    Default: 'Environment'
  TagValue:
    Description: 'The tag value to use for filtering resources'
    Type: String
    Default: 'Production'
  GroupName:
    Description: 'Name for the resource group'
    Type: String
    Default: 'TagBasedResourceGroup'
    AllowedPattern: '^[a-zA-Z0-9-_]+$'
    ConstraintDescription: 'Resource group name can only contain alphanumeric characters, hyphens, and underscores.'

Resources:
  TagBasedResourceGroup:
    Type: 'AWS::ResourceGroups::Group'
    Properties:
      Name: !Ref GroupName
      Description: 'Resource group containing resources with specified tag'
      ResourceQuery:
        Type: 'TAG_FILTERS_1_0'
        Query:
          ResourceTypeFilters:
            - 'AWS::EC2::Instance'
            - 'AWS::RDS::DBInstance'
            - 'AWS::SageMaker::NotebookInstance'
            - 'AWS::SSM::ManagedInstance'
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue

Outputs:
  ResourceGroupARN:
    Description: 'ARN of the created resource group'
    Value: !GetAtt TagBasedResourceGroup.Arn
  ResourceGroupName:
    Description: 'Name of the created resource group'
    Value: !Ref GroupName