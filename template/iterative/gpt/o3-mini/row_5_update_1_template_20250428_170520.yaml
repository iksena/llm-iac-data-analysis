AWSTemplateFormatVersion: '2010-09-09'
Description: Production ready DynamoDB table for storing ArtistId, Concert, and TicketSales data.
Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ArtistConcertTicketSales
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
Outputs:
  TableName:
    Description: "Name of the DynamoDB table"
    Value: !Ref ArtistConcertTicketSalesTable
  TableArn:
    Description: "ARN of the DynamoDB table"
    Value: !GetAtt ArtistConcertTicketSalesTable.Arn