AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Account-Wide Password Policy with Lambda Management

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
  RequireSymbols:
    Type: String
    Default: true
    AllowedValues: [true, false]
  RequireNumbers:
    Type: String
    Default: true
    AllowedValues: [true, false]
  RequireUppercaseCharacters:
    Type: String
    Default: true
    AllowedValues: [true, false]
  RequireLowercaseCharacters:
    Type: String
    Default: true
    AllowedValues: [true, false]
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
  AllowUsersToChangePassword:
    Type: String
    Default: true
    AllowedValues: [true, false]
  PermissionBoundaryArn:
    Type: String
    Default: ''

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref "AWS::NoValue"]

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def lambda_handler(event, context):
              client = boto3.client('iam')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      client.update_account_password_policy(
                          MinimumPasswordLength=event['ResourceProperties']['MinimumPasswordLength'],
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'] == 'true',
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'] == 'true',
                          RequireUppercaseCharacters=event['ResourceProperties']['RequireUppercaseCharacters'] == 'true',
                          RequireLowercaseCharacters=event['ResourceProperties']['RequireLowercaseCharacters'] == 'true',
                          MaxPasswordAge=event['ResourceProperties']['MaxPasswordAge'],
                          PasswordReusePrevention=event['ResourceProperties']['PasswordReusePrevention'],
                          AllowUsersToChangePassword=event['ResourceProperties']['AllowUsersToChangePassword'] == 'true'
                      )
                  elif event['RequestType'] == 'Delete':
                      client.delete_account_password_policy()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  PasswordPolicyResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireSymbols: !Ref RequireSymbols
      RequireNumbers: !Ref RequireNumbers
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: events.amazonaws.com

  PasswordPolicySchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 day)
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: PasswordPolicyCheck

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, '']]

Outputs:
  CurrentPasswordPolicy:
    Description: Current IAM Password Policy Configuration
    Value: !Join [', ', [
      'MinLength:', !Ref MinimumPasswordLength,
      'RequireSymbols:', !Ref RequireSymbols,
      'RequireNumbers:', !Ref RequireNumbers,
      'RequireUppercase:', !Ref RequireUppercaseCharacters,
      'RequireLowercase:', !Ref RequireLowercaseCharacters,
      'MaxAge:', !Ref MaxPasswordAge,
      'ReusePrevention:', !Ref PasswordReusePrevention,
      'AllowChange:', !Ref AllowUsersToChangePassword
    ]]
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn