AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  TableName:
    Type: String
    Default: ''
    Description: Enter table name (leave blank for auto-generation)
  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
  ReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000
    Description: Required only for PROVISIONED billing mode
  WriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000
    Description: Required only for PROVISIONED billing mode

Conditions:
  HasTableName: !Not [!Equals [!Ref TableName, '']]
  IsProvisioned: !Equals [!Ref BillingMode, PROVISIONED]

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [HasTableName, !Ref TableName, !Ref 'AWS::NoValue']
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: !If
        - IsProvisioned
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref 'AWS::NoValue'
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Value: !Ref DynamoDBTable
  TableArn:
    Value: !GetAtt DynamoDBTable.Arn