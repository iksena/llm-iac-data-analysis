AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  EventSchemasRegistry:
    Type: AWS::EventSchemas::Registry
    Properties:
      Name: dynamodb-events
      Description: Registry for DynamoDB change events

  EventSchemasSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content: |
        {
          "type": "object",
          "properties": {
            "eventName": {"type": "string"},
            "eventVersion": {"type": "string"},
            "eventSource": {"type": "string"},
            "awsRegion": {"type": "string"},
            "dynamodb": {"type": "object"}
          }
        }
      Description: Schema for DynamoDB change events
      RegistryName: !Ref EventSchemasRegistry
      SchemaName: dynamodb-change
      Type: json

  EventSchemasDiscoverer:
    Type: AWS::EventSchemas::Discoverer
    Properties:
      Description: Discoverer for DynamoDB stream events
      SourceArn: !GetAtt DynamoDBTable.StreamArn
      Tags:
        - Key: Source
          Value: DynamoDB

  EventBridgeBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-CentralBus

  InsertEventPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-InsertPipe
      Source:
        Arn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Arn: !GetAtt EventBridgeBus.Arn
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - INSERT
      RequiredResourcePolicies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:DescribeStream
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: dynamodb:GetRecords
                Resource: !GetAtt DynamoDBTable.StreamArn

  ModifyEventPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-ModifyPipe
      Source:
        Arn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Arn: !GetAtt EventBridgeBus.Arn
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - MODIFY
      RequiredResourcePolicies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:DescribeStream
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: dynamodb:GetRecords
                Resource: !GetAtt DynamoDBTable.StreamArn

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Central Bus Name
    Value: !GetAtt EventBridgeBus.Name