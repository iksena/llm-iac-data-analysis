AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket with optional AWS Organization-wide access'

Parameters:
  BucketNamePrefix:
    Type: String
    Description: Prefix for the S3 bucket name (final name will include a unique suffix)
    MinLength: 3
    MaxLength: 50
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: Must contain only lowercase letters, numbers, periods, and hyphens

  OrganizationId:
    Type: String
    Description: AWS Organization ID (leave empty for single account access)
    Default: ''
    AllowedPattern: '^$|^o-[a-z0-9]{10,32}$'
    ConstraintDescription: Must be empty or a valid AWS Organization ID starting with 'o-'

  EnableOrganizationAccess:
    Type: String
    Description: Enable access for AWS Organization
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'false'

Conditions:
  IsOrganizationEnabled: !And
    - !Equals [!Ref EnableOrganizationAccess, 'true']
    - !Not [!Equals [!Ref OrganizationId, '']]

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Purpose
          Value: Organization-Shared-Storage
        - Key: Environment
          Value: Production

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Condition: IsOrganizationEnabled
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccess
            Effect: Allow
            Principal: '*'
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:ListBucket'
              - 's3:DeleteObject'
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - !Sub 'arn:aws:s3:::${S3Bucket}'
            Condition:
              StringEquals:
                'aws:PrincipalOrgID': !Ref OrganizationId
              Bool:
                'aws:SecureTransport': true

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn

  BucketDomainName:
    Description: Domain name of the bucket
    Value: !GetAtt S3Bucket.DomainName

  OrganizationAccess:
    Description: Organization access status
    Value: !If [IsOrganizationEnabled, 'Enabled', 'Disabled']