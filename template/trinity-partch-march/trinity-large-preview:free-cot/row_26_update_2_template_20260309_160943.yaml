AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with EventBridge and SNS Integration for Object Creation Notifications

Parameters:
  S3BucketName:
    Type: String
    Default: 's3-eventbridge-sns'
    Description: Name of the S3 bucket (must be globally unique)
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
  SNSTopicName:
    Type: String
    Default: 's3-eventbridge-notifications'
    Description: Name of the SNS topic
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-_]+$'
  SNSTopicDisplayName:
    Type: String
    Default: 'S3 EventBridge Notifications'
    Description: Display name for the SNS topic

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref S3BucketName

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/*'
            Condition:
              StringNotEquals:
                aws:PrincipalArn: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Ref SNSTopicDisplayName
      Tags:
        - Key: Name
          Value: !Ref SNSTopicName

  EventBridgePermission:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: 's3-object-created-events'
      Description: Captures S3 object creation events
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - 'PutObject'
            - 'PostObject'
            - 'CompleteMultipartUpload'
          requestParameters:
            bucketName:
              - !Ref S3BucketName
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: SendToSNS
          InputTransformer:
            InputPathsMap:
              bucket: $.detail.requestParameters.bucketName
              key: $.detail.requestParameters.key
            InputTemplate: '{"Bucket": <bucket>, "Key": "<key>"}'

  S3BucketNotification:
    Type: Custom::S3BucketNotification
    Properties:
      ServiceToken: !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}/notification'
      NotificationConfiguration:
        EventBridgeConfiguration:
          Enabled: true

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-S3BucketName'
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'
  EventBridgeRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleName'