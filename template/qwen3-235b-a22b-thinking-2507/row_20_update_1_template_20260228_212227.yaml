AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DashboardName:
    Type: String
    Default: ClientVPN-Monitoring
    Description: Name of the CloudWatch Dashboard for Client VPN monitoring
Resources:
  ConnectionDurationByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationByEndpoint
      LogGroupNames:
        - /aws/vpn/client
      QueryString: >-
        fields @timestamp, endpoint_id, duration_seconds
        | filter @message like "ClientDisconnected"
        | json @message auto
        | stats avg(duration_seconds) as avg_duration by endpoint_id
  DataTransferByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferByEndpoint
      LogGroupNames:
        - /aws/vpn/client
      QueryString: >-
        fields @timestamp, endpoint_id, bytes_in, bytes_out
        | filter @message like "ClientDisconnected"
        | json @message auto
        | stats sum(bytes_in) as total_in, sum(bytes_out) as total_out by endpoint_id
  ConnectionsByAuthMethodQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionsByAuthMethod
      LogGroupNames:
        - /aws/vpn/client
      QueryString: >-
        fields @timestamp, authentication_method
        | filter @message like "ClientConnected"
        | json @message auto
        | stats count() as connection_count by authentication_method
  DistinctUsersByAuthMethodQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DistinctUsersByAuthMethod
      LogGroupNames:
        - /aws/vpn/client
      QueryString: >-
        fields @timestamp, username, authentication_method
        | filter @message like "ClientConnected"
        | json @message auto
        | stats count_distinct(username) as unique_users by authentication_method
  DistinctUsersByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DistinctUsersByEndpoint
      LogGroupNames:
        - /aws/vpn/client
      QueryString: >-
        fields @timestamp, username, endpoint_id
        | filter @message like "ClientConnected"
        | json @message auto
        | stats count_distinct(username) as unique_users by endpoint_id
  ClientVPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    DependsOn:
      - ConnectionDurationByEndpointQuery
      - DataTransferByEndpointQuery
      - ConnectionsByAuthMethodQuery
      - DistinctUsersByAuthMethodQuery
      - DistinctUsersByEndpointQuery
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "height": 1,
              "width": 24,
              "properties": {
                "markdown": "# Client VPN Usage Monitoring Dashboard"
              }
            },
            {
              "type": "log",
              "height": 6,
              "width": 12,
              "properties": {
                "query": "{SOURCE: /aws/vpn/client | name=ConnectionDurationByEndpoint}",
                "region": "${AWS::Region}",
                "title": "Average Connection Duration by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "height": 6,
              "width": 12,
              "properties": {
                "query": "{SOURCE: /aws/vpn/client | name=DataTransferByEndpoint}",
                "region": "${AWS::Region}",
                "title": "Data Transfer (Ingress/Egress) by Endpoint",
                "view": "table"
              }
            },
            {
              "type": "log",
              "height": 6,
              "width": 12,
              "properties": {
                "query": "{SOURCE: /aws/vpn/client | name=ConnectionsByAuthMethod}",
                "region": "${AWS::Region}",
                "title": "Connections by Authentication Method",
                "view": "table"
              }
            },
            {
              "type": "log",
              "height": 6,
              "width": 12,
              "properties": {
                "query": "{SOURCE: /aws/vpn/client | name=DistinctUsersByAuthMethod}",
                "region": "${AWS::Region}",
                "title": "Distinct Users by Authentication Method",
                "view": "table"
              }
            },
            {
              "type": "log",
              "height": 6,
              "width": 24,
              "properties": {
                "query": "{SOURCE: /aws/vpn/client | name=DistinctUsersByEndpoint}",
                "region": "${AWS::Region}",
                "title": "Distinct Users by Endpoint",
                "view": "table"
              }
            }
          ]
        }
Outputs:
  DashboardName:
    Description: Name of the deployed CloudWatch Dashboard
    Value: !Ref DashboardName
    Export:
      Name: !Sub "${AWS::StackName}-DashboardName"