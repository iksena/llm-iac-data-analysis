AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IAM role for AWS Service Catalog with permissions for S3, Lambda, and related services.

Resources:
  ServiceCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogProvisioningRole
      Description: IAM role for AWS Service Catalog to provision and manage S3 and Lambda resources
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceCatalogPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeRecord
                  - servicecatalog:TerminateProvisionedProduct
                  - servicecatalog:SearchProductsAsAdmin
                  - servicecatalog:DescribeProduct
                  - servicecatalog:DescribeProductView
                  - servicecatalog:ListLaunchPaths
                  - servicecatalog:DescribeProvisioningParameters
                  - servicecatalog:DescribeProvisioningArtifacts
                Resource: '*'
        - PolicyName: IAMPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                Resource: '*'
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:ListFunctions
                  - lambda:InvokeFunction
                  - lambda:GetFunctionConfiguration
                Resource: '*'
        - PolicyName: CloudFormationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:ListStacks
                Resource: '*'
        - PolicyName: SNSPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:Publish
                  - sns:ListTopics
                  - sns:GetTopicAttributes
                Resource: '*'

Outputs:
  ServiceCatalogRoleArn:
    Description: The ARN of the created Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogRole.Arn
    Export:
      Name: ServiceCatalogProvisioningRoleArn