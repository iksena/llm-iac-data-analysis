AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Kinesis Firehose with encryption and CloudWatch logging'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Name of the existing S3 bucket for Firehose destination'

Resources:
  FirehoseLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}'
      RetentionInDays: 14

  FirehoseLogStream:
    Type: 'AWS::Logs::LogStream'
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'DeliveryErrors'

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: FirehoseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
        - PolicyName: FirehoseLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:PutLogEvents'
                  - 'logs:CreateLogStream'
                Resource: 
                  - !GetAtt FirehoseLogGroup.Arn
                  - !Sub '${FirehoseLogGroup.Arn}:*'

  FirehoseDeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    DependsOn: 
      - FirehoseRole
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamType: 'DirectPut'
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: 'AWS_OWNED_CMK'
      S3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${S3BucketName}'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: 'UNCOMPRESSED'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  FirehoseStreamARN:
    Description: 'ARN of the Kinesis Firehose Delivery Stream'
    Value: !GetAtt FirehoseDeliveryStream.Arn

  LogGroupName:
    Description: 'Name of the CloudWatch Log Group'
    Value: !Ref FirehoseLogGroup