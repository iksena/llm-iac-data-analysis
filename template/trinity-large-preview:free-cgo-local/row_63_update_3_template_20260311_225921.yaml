AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Aurora MySQL cluster with CloudWatch Logs integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678901234567
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-12345678901234567,subnet-87654321098765432
  DBClusterIdentifier:
    Type: String
    Default: aurora-mysql-cluster
  MasterUsername:
    Type: String
    Default: admin
  MasterUserPassword:
    Type: String
    NoEcho: true
    Default: Password123!
  DBInstanceClass:
    Type: String
    Default: db.t3.large
  BackupRetentionPeriod:
    Type: Number
    Default: 7
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
  PerformanceInsightsRetention:
    Type: Number
    Default: 7
    AllowedValues: [7, 731]

Resources:
  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 8.0.mysql_aurora.3.03.0
      DBClusterIdentifier: !Ref DBClusterIdentifier
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      Port: 3306
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      EnableCloudwatchLogsExports:
        - error
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL cluster
      Family: aurora-mysql8.0
      Parameters:
        audit_logs: 1

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${DBClusterIdentifier}-instance-1
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true
      AvailabilityZone: !Select [0, !GetAZs '']
      PerformanceInsightsRetentionPeriod: !Ref PerformanceInsightsRetention

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${DBClusterIdentifier}-instance-2
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true
      AvailabilityZone: !Select [1, !GetAZs '']
      PerformanceInsightsRetentionPeriod: !Ref PerformanceInsightsRetention

  CloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSDirectoryServiceAccess
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/rds/cluster/${DBClusterIdentifier}/error
      RetentionInDays: 30

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint for the Aurora MySQL cluster
    Value: !GetAtt DBCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Reader endpoint for the Aurora MySQL cluster
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  CloudWatchLogGroup:
    Description: CloudWatch Log Group for Aurora error logs
    Value: !Ref ErrorLogGroup