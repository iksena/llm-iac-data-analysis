AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline Template - Standardized IAM groups, roles, and cross-account trust configurations'

Parameters:
  TrustedAccountIds:
    Type: List<String>
    Default: []
    Description: List of trusted AWS account IDs for cross-account access

Resources:
  # IAM Groups
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess

  # IAM Roles with MFA requirement
  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      Description: Full administrative access with MFA requirement
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/AdminPermissionsBoundary'

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      Description: Administrative access with service restrictions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: '*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:*'
                  - 'cloudhsm:*'
                Resource: '*'

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      Description: Identity and access management permissions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess

  # Cross-account trust roles
  IdentityManagementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityManagementRole
      Description: Cross-account role for identity management
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                !Ref TrustedAccountIds
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess

  ToolingManagementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ToolingManagementRole
      Description: Cross-account role for tooling management
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                !Ref TrustedAccountIds
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess

  # CloudFormation execution roles
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      Description: Role for CloudFormation stack operations
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      Description: Role for CloudFormation StackSets deployment
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationStackSetsFullAccess

  TemplateValidationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: TemplateValidationRole
      Description: Read-only role for template validation
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess

  # Permissions boundary for admin roles
  AdminPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: AdminPermissionsBoundary
      Description: Permissions boundary for admin roles
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

Outputs:
  PrivilegedAdminGroup:
    Description: ARN of the PrivilegedAdmin group
    Value: !Ref PrivilegedAdminGroup
    Export:
      Name: PrivilegedAdminGroup

  RestrictedAdminGroup:
    Description: ARN of the RestrictedAdmin group
    Value: !Ref RestrictedAdminGroup
    Export:
      Name: RestrictedAdminGroup

  IdentityAdminGroup:
    Description: ARN of the IdentityAdmin group
    Value: !Ref IdentityAdminGroup
    Export:
      Name: IdentityAdminGroup

  PrivilegedAdminRole:
    Description: ARN of the PrivilegedAdmin role
    Value: !GetAtt PrivilegedAdminRole.Arn
    Export:
      Name: PrivilegedAdminRole

  RestrictedAdminRole:
    Description: ARN of the RestrictedAdmin role
    Value: !GetAtt RestrictedAdminRole.Arn
    Export:
      Name: RestrictedAdminRole

  IdentityAdminRole:
    Description: ARN of the IdentityAdmin role
    Value: !GetAtt IdentityAdminRole.Arn
    Export:
      Name: IdentityAdminRole

  IdentityManagementRole:
    Description: ARN of the IdentityManagement role
    Value: !GetAtt IdentityManagementRole.Arn
    Export:
      Name: IdentityManagementRole

  ToolingManagementRole:
    Description: ARN of the ToolingManagement role
    Value: !GetAtt ToolingManagementRole.Arn
    Export:
      Name: ToolingManagementRole

  CloudFormationExecutionRole:
    Description: ARN of the CloudFormationExecution role
    Value: !GetAtt CloudFormationExecutionRole.Arn
    Export:
      Name: CloudFormationExecutionRole

  StackSetExecutionRole:
    Description: ARN of the StackSetExecution role
    Value: !GetAtt StackSetExecutionRole.Arn
    Export:
      Name: StackSetExecutionRole

  TemplateValidationRole:
    Description: ARN of the TemplateValidation role
    Value: !GetAtt TemplateValidationRole.Arn
    Export:
      Name: TemplateValidationRole