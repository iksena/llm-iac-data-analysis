AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an encrypted One Zone EFS file system in the specified Availability Zone (default: us-east-1a). Production-ready with backups and lifecycle policies enabled.'

Parameters:
  AvailabilityZoneName:
    Type: String
    Default: us-east-1a
    Description: 'Availability Zone for the One Zone EFS file system (e.g., us-east-1a).'
  EFSName:
    Type: String
    Default: OneZoneEncryptedEFS
    Description: 'Logical name for the EFS file system (used in tags).'

Resources:
  OneZoneEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      AvailabilityZoneName: !Ref AvailabilityZoneName
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Tags:
        - Key: Name
          Value: !Ref EFSName
        - Key: Purpose
          Value: OneZoneEncryptedFileSystem

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref OneZoneEFSFileSystem
  FileSystemArn:
    Description: EFS File System ARN
    Value: !GetAtt OneZoneEFSFileSystem.Arn
  DNSEntry:
    Description: EFS File System DNS Name
    Value: !GetAtt OneZoneEFSFileSystem.DNSName
  AvailabilityZoneName:
    Description: Confirmed Availability Zone for One Zone storage
    Value: !Ref AvailabilityZoneName