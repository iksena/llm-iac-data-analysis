AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for Amazon Bedrock service with permissions to invoke foundation models and Lambda functions'

Resources:
  BedrockServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub 'bedrock-service-role-${AWS::Region}'
      Description: 'IAM Role for Bedrock service to invoke foundation models and Lambda functions'
      Path: '/service-roles/'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'

  BedrockServicePolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: !Sub 'bedrock-service-policy-${AWS::Region}'
      Description: 'Policy for Bedrock service to invoke foundation models and Lambda functions'
      Roles:
        - !Ref BedrockServiceRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'bedrock:InvokeModel'
              - 'bedrock:InvokeModelWithResponseStream'
            Resource: '*'
            Condition:
              StringLike:
                'aws:ResourceTag/service': 'agent/*'
          - Effect: Allow
            Action:
              - 'lambda:InvokeFunction'
              - 'lambda:InvokeAsync'
            Resource: !Sub 'arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:*'

Outputs:
  RoleArn:
    Description: 'ARN of the created IAM Role'
    Value: !GetAtt BedrockServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
  
  RoleName:
    Description: 'Name of the created IAM Role'
    Value: !Ref BedrockServiceRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'