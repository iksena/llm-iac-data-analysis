AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data for centralized governance and reporting.

Parameters:
  ManagementAccountId:
    Type: String
    Description: Management account ID for cross-account role assumption
  TagsToInclude:
    Type: String
    Description: Comma-separated list of tags to include in reports
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: Name of the Athena database for Glue catalog

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: Bucket is private and encrypted

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - organizations:Describe*
                  - organizations:List*
                Resource: "*"
              - Effect: Allow
                Action: sts:AssumeRole
                Resource:
                  Fn::Sub: "arn:aws:iam::${ManagementAccountId}:role/OrganizationCrossAccountRole"
              - Effect: Allow
                Action: s3:PutObject
                Resource:
                  Fn::Sub: "arn:aws:s3:::${DataBucket}/*"
    DependsOn: DataBucket

  OrganizationDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role:
        Fn::GetAtt: [LambdaExecutionRole, Arn]
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          TARGET_BUCKET:
            Ref: DataBucket
          TAGS_TO_INCLUDE:
            Ref: TagsToInclude
          MANAGEMENT_ACCOUNT_ID:
            Ref: ManagementAccountId
    DependsOn: LambdaExecutionRole

  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn:
            Fn::GetAtt: [OrganizationDataLambda, Arn]
          Id: OrganizationDataCollection
    DependsOn: OrganizationDataLambda

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::GetAtt: [OrganizationDataLambda, Arn]
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt: [CloudWatchEventRule, Arn]
    DependsOn: CloudWatchEventRule

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource:
                  Fn::Sub: "arn:aws:s3:::${DataBucket}/*"
              - Effect: Allow
                Action: s3:PutObject
                Resource:
                  Fn::Sub: "arn:aws:s3:::aws-glue-*/*"
    DependsOn: DataBucket

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrganizationDataCrawler
      DatabaseName:
        Ref: AthenaDatabaseName
      Role:
        Fn::GetAtt: [GlueCrawlerRole, Arn]
      Targets:
        S3Targets:
          - Path:
              Fn::Sub: "s3://${DataBucket}/"
      Schedule:
        ScheduleExpression: "cron(0 2 * * ? *)"
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
    DependsOn: [DataBucket, GlueCrawlerRole]

Outputs:
  DataBucketArn:
    Description: ARN of the S3 bucket storing organization data
    Value:
      Fn::GetAtt: [DataBucket, Arn]
  LambdaFunctionArn:
    Description: ARN of the Lambda function collecting organization data
    Value:
      Fn::GetAtt: [OrganizationDataLambda, Arn]
  GlueCrawlerArn:
    Description: ARN of the Glue crawler cataloging organization data
    Value:
      Fn::GetAtt: [GlueCrawler, Arn]