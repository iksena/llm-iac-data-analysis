AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized SNS Topic for Cross-Service Notifications

Parameters:
  EmailAddress:
    Type: String
    Default: admin@example.com
    Description: Email address to subscribe to the SNS topic

Resources:
  CentralizedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized-Alerts-Events
      ContentBasedDeduplication: true

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: TopicPolicy
        Statement:
          - Sid: AllowAWSServicePublish
            Effect: Allow
            Principal: '*'
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref 'AWS::AccountId'
          - Sid: AllowTopicOwnerPublish
            Effect: Allow
            Principal:
              AWS: !Ref 'AWS::AccountId'
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref CentralizedSNSTopic

Outputs:
  TopicArn:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedSNSTopic
    Export:
      Name: CentralizedSNSTopicArn