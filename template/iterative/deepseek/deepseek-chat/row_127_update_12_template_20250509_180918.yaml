AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon EFS file system in us-east-1a for testing environment'

Parameters:
  VpcId:
    Type: 'AWS::EC2::VPC::Id'
    Description: 'The VPC ID where the EFS file system will be created'
    Default: 'vpc-00000000'  # Placeholder value that matches the pattern
    AllowedPattern: '^vpc-[a-f0-9]{8}(?:[a-f0-9]{9})?$'
    ConstraintDescription: 'Must be a valid VPC ID starting with vpc-'
  
  SubnetId:
    Type: 'AWS::EC2::Subnet::Id'
    Description: 'The subnet ID in us-east-1a where the mount target will be created'
    Default: 'subnet-00000000'  # Placeholder value that matches the pattern
    AllowedPattern: '^subnet-[a-f0-9]{8}(?:[a-f0-9]{9})?$'
    ConstraintDescription: 'Must be a valid subnet ID starting with subnet-'
  
  VpcCidr:
    Type: 'String'
    Description: 'CIDR block of the VPC for security group access'
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: 'Must be a valid CIDR range'

Conditions:
  HasVpcId: !Not [!Equals [!Ref VpcId, 'vpc-00000000']]
  HasSubnetId: !Not [!Equals [!Ref SubnetId, 'subnet-00000000']]

Resources:
  EFSSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: HasVpcId
    Properties:
      GroupDescription: 'Security group for EFS access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidr

  EFSFileSystem:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  EFSMountTarget:
    Type: 'AWS::EFS::MountTarget'
    Condition: HasSubnetId
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !If [HasVpcId, !GetAtt EFSSecurityGroup.GroupId, !Ref 'AWS::NoValue']

Outputs:
  FileSystemId:
    Description: 'The ID of the created EFS file system'
    Value: !Ref EFSFileSystem
  MountTargetId:
    Description: 'The ID of the mount target'
    Value: !If [HasSubnetId, !Ref EFSMountTarget, 'Not created - missing subnet parameter']
  SecurityGroupId:
    Description: 'The ID of the security group created for EFS access'
    Value: !If [HasVpcId, !Ref EFSSecurityGroup, 'Not created - missing VPC parameter']