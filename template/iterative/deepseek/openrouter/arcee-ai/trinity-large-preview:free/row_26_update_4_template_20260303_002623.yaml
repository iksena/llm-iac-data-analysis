AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket integrated with EventBridge and SNS for object creation notifications.

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 's3-eventbridge-sns-${AWS::AccountId}'
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 's3-eventbridge-sns-topic-${AWS::AccountId}'

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to trigger on S3 object creation events
      EventPattern:
        source:
          - aws.s3
        detail:
          eventName:
            - 'ObjectCreated:*'
          requestParameters:
            bucketName:
              - !Ref S3Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule