AWSTemplateFormatVersion: '2010-09-09'
Description: AWS SQS Queue with Basic Configuration

Parameters:
  QueueName:
    Type: String
    Default: MyBasicQueue
    Description: Name of the SQS queue
  DelaySeconds:
    Type: Number
    Default: 0
    Description: Delay for all messages in the queue (in seconds)
  MaximumMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: Wait time for receiving messages
  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Visibility timeout for messages in seconds

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      VisibilityTimeout: !Ref VisibilityTimeout

Outputs:
  QueueURL:
    Description: URL of the created SQS queue
    Value: !Ref MySQSQueue
  QueueARN:
    Description: ARN of the created SQS queue
    Value: !GetAtt MySQSQueue.Arn