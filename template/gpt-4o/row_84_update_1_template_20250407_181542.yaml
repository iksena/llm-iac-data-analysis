AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an AWS Macie session for automated sensitive data discovery and security monitoring.

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties: 
      FindingPublishingFrequency: FIFTEEN_MINUTES
      Status: ENABLED

Outputs:
  MacieSessionId:
    Description: The ID of the Macie session
    Value: !Ref MacieSession