AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket with event notifications to SNS topic for object creation events'

Parameters:
  BucketNamePrefix:
    Type: String
    Description: Prefix for the S3 bucket name
    Default: my-notification-bucket
    AllowedPattern: ^[a-zA-Z0-9-]+$
    ConstraintDescription: Bucket prefix can include numbers, lowercase letters, uppercase letters, and hyphens (-).
  
  Environment:
    Type: String
    Description: Environment name for resource tagging
    Default: production
    AllowedValues:
      - development
      - staging
      - production

Resources:
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${BucketNamePrefix}-notifications-${Environment}
      Tags:
        - Key: Environment
          Value: !Ref Environment

  NotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref NotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3EventNotifications
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref NotificationTopic
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                AWS:SourceArn: !Sub arn:aws:s3:::${BucketNamePrefix}-${Environment}

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${BucketNamePrefix}-${Environment}
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref NotificationTopic
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn

  TopicName:
    Description: Name of the created SNS topic
    Value: !GetAtt NotificationTopic.TopicName

  TopicARN:
    Description: ARN of the created SNS topic
    Value: !Ref NotificationTopic