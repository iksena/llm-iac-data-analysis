AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon EFS file system with basic configurations for testing environment

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be created
  SubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for the EFS mount target (us-east-1a)
  SourceSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group ID that can access the EFS file system

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      FileSystemTags:
        - Key: Environment
          Value: testing
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: EFS encryption is enabled

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref SourceSecurityGroupId

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref SubnetA
      SecurityGroups:
        - !Ref EfsSecurityGroup

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-FileSystemId"

  MountTargetId:
    Description: EFS Mount Target ID
    Value: !Ref EfsMountTarget
    Export:
      Name: !Sub "${AWS::StackName}-MountTargetId"

  SecurityGroupId:
    Description: EFS Security Group ID
    Value: !Ref EfsSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"