AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon S3 bucket with a conditional bucket policy.
  When an AWS Organization ID is provided, the policy grants organization-wide access;
  otherwise, access is limited to the current AWS account.

Parameters:
  OrganizationId:
    Type: String
    Description: >
      Provide the AWS Organization ID for enterprise-wide access.
      Leave empty for single-account access.
    Default: ""

Conditions:
  UseOrgAccess: !Not [!Equals [!Ref OrganizationId, ""]]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement: 
          Fn::If:
            - UseOrgAccess
            - - Sid: OrgWideAccess
                Effect: Allow
                Principal: "*"
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
                Condition:
                  StringEquals:
                    aws:PrincipalOrgID: !Ref OrganizationId
            - - Sid: SingleAccountAccess
                Effect: Allow
                Principal:
                  AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}"
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"

Outputs:
  BucketName:
    Description: "The name of the created S3 bucket."
    Value: !Ref S3Bucket