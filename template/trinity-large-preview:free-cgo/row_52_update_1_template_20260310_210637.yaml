AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-region application failover architecture using Amazon Route 53 Application Recovery Controller

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Sub ${AWS::StackName}-RecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub ${AWS::StackName}-ControlPanel
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${AWS::StackName}-Region1-RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${AWS::StackName}-Region2-RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Sub ${AWS::StackName}-SafetyRule
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      RuleConfig:
        RuleType: ATLEAST
        Threshold: 1
        TargetControls:
          - !GetAtt RoutingControlRegion1.RoutingControlArn
          - !GetAtt RoutingControlRegion2.RoutingControlArn
      GatingControls: []
      WaitPeriodMS: 0

  HealthCheckRegion1:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      HealthCheckConfig:
        HealthCheckCustomConfig:
          HealthCheckArn: !GetAtt RoutingControlRegion1.RoutingControlArn

  HealthCheckRegion2:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      HealthCheckConfig:
        HealthCheckCustomConfig:
          HealthCheckArn: !GetAtt RoutingControlRegion2.RoutingControlArn

Outputs:
  ClusterArn:
    Description: ARN of the Recovery Cluster
    Value: !GetAtt RecoveryCluster.ClusterArn
  ControlPanelArn:
    Description: ARN of the Control Panel
    Value: !GetAtt ControlPanel.ControlPanelArn
  RoutingControlRegion1Arn:
    Description: ARN of the Routing Control for Region 1
    Value: !GetAtt RoutingControlRegion1.RoutingControlArn
  RoutingControlRegion2Arn:
    Description: ARN of the Routing Control for Region 2
    Value: !GetAtt RoutingControlRegion2.RoutingControlArn