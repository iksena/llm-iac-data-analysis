AWSTemplateFormatVersion: "2010-09-09"
Description: "Production-ready CloudFormation template to create a DynamoDB table with customizable parameters and protection from deletion."

Parameters:
  TableName:
    Description: "The name of the DynamoDB table."
    Type: String
    Default: "MyDynamoDBTable"
  ReadCapacityUnits:
    Description: "Provisioned read capacity units for the DynamoDB table."
    Type: Number
    Default: 5
  WriteCapacityUnits:
    Description: "Provisioned write capacity units for the DynamoDB table."
    Type: Number
    Default: 5

Resources:
  DynamoDBTable:
    Type: "AWS::DynamoDB::Table"
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: "Id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "Id"
          KeyType: "HASH"
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      Tags:
        - Key: Environment
          Value: "Production"

Outputs:
  TableNameOutput:
    Description: "Name of the created DynamoDB table."
    Value: !Ref DynamoDBTable
  TableArnOutput:
    Description: "ARN of the created DynamoDB table."
    Value: !GetAtt [DynamoDBTable, Arn]