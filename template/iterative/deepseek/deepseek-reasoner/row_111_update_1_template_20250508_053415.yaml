AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with DataDog for log forwarding with DLQ

Parameters:
  DataDogAPIKey:
    Type: String
    NoEcho: true
    Default: testanu
    Description: DataDog API key for authentication

Resources:
  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppEventBus

  DataDogAPISecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: DataDogAPIKeySecret
      SecretString: !Sub '{"api-key":"${DataDogAPIKey}"}'

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: DataDogAPIConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: '{{resolve:secretsmanager:DataDogAPIKeySecret:SecretString:api-key}}'

  DataDogAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogIngestion
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      InvocationRateLimitPerSecond: 100

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDataDogDLQ
      MessageRetentionPeriod: 1209600

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationAndDLQ
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt DataDogAPIDestination.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  DataDogLogForwardingRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DataDogLogForwardingRule
      EventBusName: !Ref DataDogEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogAPIDestination.Arn
          Id: DataDogAPIDestinationTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusARN:
    Value: !Ref DataDogEventBus
  APIDestinationARN:
    Value: !GetAtt DataDogAPIDestination.Arn
  ConnectionARN:
    Value: !GetAtt DataDogConnection.Arn
  DeadLetterQueueURL:
    Value: !Ref DeadLetterQueue
  DeadLetterQueueARN:
    Value: !GetAtt DeadLetterQueue.Arn