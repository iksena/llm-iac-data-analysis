AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a Kinesis Data Firehose delivery stream with server-side encryption using AWS managed keys and destination error logging to CloudWatch.
Resources:
  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: MyFirehoseStream
      DeliveryStreamType: KinesisStreamAsSource
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        CompressionFormat: UNCOMPRESSED
        ErrorOutputPrefix: firehose-errors/
        RoleARN: !GetAtt IAMRole.Arn
        ServerSideEncryption:
          KMSMasterKeyId: alias/aws/kinesis-firehose
      KinesisStreamConfiguration:
        KinesisStreamARN: !Ref KinesisStream
      ExtendedS3DestinationConfiguration:
        RoleARN: !GetAtt IAMRole.Arn
        BucketARN: !GetAtt S3Bucket.Arn
        CompressionFormat: UNCOMPRESSED
        ErrorOutputPrefix: errors/
        Prefix: firehose-data/
        ServerSideEncryption:
          KMSMasterKeyId: alias/aws/kinesis-firehose
      CloudWatchLoggingOptions:
        Enabled: true
        LogGroupName: /firehose/MyFirehoseStream
        LogStreamName: MyFirehoseStream
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub my-firehose-bucket-${AWS::Region}-${AWS::AccountId}
  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: FirehoseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub arn:aws:s3:::${S3Bucket}
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/firehose/MyFirehoseStream:*
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: MyKinesisStream
      ShardCount: 1

Outputs:
  FirehoseStreamArn:
    Value: !GetAtt FirehoseDeliveryStream.Arn
    Description: The ARN of the created Firehose delivery stream.
  S3BucketName:
    Value: !Ref S3Bucket
    Description: The name of the created S3 bucket.

