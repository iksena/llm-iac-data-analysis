AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled automation workflow using EventBridge Scheduler and SSM

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: HelloWorldVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: HelloWorldIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: HelloWorldSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: HelloWorldRouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  LinuxAMI:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      Type: String
      Value: ami-0c55b159cbfafe0f0

  WindowsAMI:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
      Type: String
      Value: ami-0c55b159cbfafe0f0

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref Subnet
      Tags:
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref Subnet
      Tags:
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          net stop winrm
          c:\windows\system32\sysprep\sysprep.exe /generalize /oobe /shutdown
          </powershell>

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Cross-platform Hello World script
        parameters: {}
        mainSteps:
          - name: linuxStep
            action: aws:runShellScript
            inputs:
              runCommand:
                - echo "Hello World from Linux!"
            timeoutSeconds: 60
            onExit: continue
          - name: windowsStep
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - Write-Output "Hello World from Windows!"
            timeoutSeconds: 60
            onExit: continue

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hello-world-logs-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EC2Role.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref S3Bucket
          OutputS3KeyPrefix: 'ssm-association-outputs'

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SSMInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: HelloWorldSchedule
      Description: Schedule to trigger SSM Association every 15 minutes
      ScheduleExpression: 'rate(15 minutes)'
      FlexibleTimeWindow:
        Mode: OFF
      Target:
        Arn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/${SSMDocument}'
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        SqsParameters:
          MessageGroupId: 'HelloWorldScheduleGroup'

Outputs:
  LinuxInstanceId:
    Description: Instance ID of the Linux instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Instance ID of the Windows instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref S3Bucket
  ScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn