AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AllowedSourceEmail:
    Type: String
    Description: Verified SES email address allowed to send emails
  SESRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for SES integration

Resources:
  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailServiceAPI
      Description: API for sending templated emails via SES

  EmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: send

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      RestApiId: !Ref EmailApi
      Name: EmailRequestValidator
      ValidateRequestBody: true
      ValidateRequestParameters: false

  RequestModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref EmailApi
      ContentType: application/json
      Name: EmailRequestModel
      Schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        title: EmailRequestSchema
        type: object
        properties:
          to:
            type: string
          from:
            type: string
          subject:
            type: string
            minLength: 1
          html:
            type: string
            minLength: 1
        required: [to, from, subject, html]

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SESEmailPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: "*"
                Condition:
                  StringEquals:
                    ses:FromAddress: !Ref AllowedSourceEmail

  EmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref RequestValidator
      RequestModels:
        application/json: !Ref RequestModel
      MethodResponses:
        - StatusCode: 200
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${SESRegion}:ses:action/SendEmail
        RequestTemplates:
          application/json: |
            #set($input = $input.path('$'))
            {
              "Source": "$input.from",
              "Destination": {
                "ToAddresses": [$input.to]
              },
              "Message": {
                "Subject": { "Data": "$input.subject" },
                "Body": { 
                  "Html": { "Data": "$input.html" }
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmailMethod
    Properties:
      RestApiId: !Ref EmailApi

  ProdStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      RestApiId: !Ref EmailApi
      StageName: prod
      DeploymentId: !Ref ApiDeployment

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ProdStage
    Properties:
      UsagePlanName: EmailAPIRateLimit
      Throttle:
        RateLimit: 500
        BurstLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: prod

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPIKey
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: prod

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  APIKeyID:
    Value: !Ref ApiKey