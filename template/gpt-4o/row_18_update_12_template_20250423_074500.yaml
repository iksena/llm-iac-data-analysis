AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with Amazon EventBridge using EventBridge Rules.

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserTable
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventBus

  EventBridgeRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/UserEventBus

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - aws.dynamodb
        detail-type:
          - DynamoDB Update
        detail:
          dynamodb:
            NewImage:
              avatarUrl:
                S:
                  - suffix: ".png"
      Targets:
        - Id: TargetLambda
          Arn: !GetAtt TargetLambdaFunction.Arn
          RoleArn: !GetAtt EventBridgeRuleRole.Arn

  TargetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ProcessDynamoDBEvent
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              print("Received event: " + str(event))
      Runtime: python3.11

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB Table
    Value: !Ref DynamoDBTable

  EventBusName:
    Description: Name of the EventBridge Event Bus
    Value: !Ref EventBus

  EventBridgeRuleName:
    Description: Name of the EventBridge Rule
    Value: !Ref EventBridgeRule

  LambdaFunctionName:
    Description: Name of the Lambda Function
    Value: !Ref TargetLambdaFunction