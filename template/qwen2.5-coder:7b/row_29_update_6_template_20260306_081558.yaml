AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  StackName:
    Type: String
    Description: The name of the stack to create stack-specific namespaces for SSM parameters.

Mappings:
  ExcludedCharacters:
    Default: "!@#$%^&*()_+{}|:\"<>?[];',./"

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${StackName}/config/value'
      Type: String
      Value: 'This is A/B'

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${StackName}/secret'
      Description: 'Secrets Manager secret with dynamically generated password'
      GenerateSecretString:
        ExcludeCharacters: !FindInMap ['ExcludedCharacters', 'Default', '']
        ExcludePunctuation: 'true'
        ExcludeNumbers: 'false'
        ExcludeUppercase: 'false'
        ExcludeLowercase: 'false'
        IncludeSpace: 'false'
        PasswordLength: 16

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/config/value'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret/${StackName}/secret'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import json

          def lambda_handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              ssm_param_response = ssm_client.get_parameter(Name='/${StackName}/config/value')
              ssm_param_value = ssm_param_response['Parameter']['Value']

              secrets_response = secrets_client.get_secret_value(SecretId='/${StackName}/secret')
              secrets_value = json.loads(secrets_response['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'SSMParameterValue': ssm_param_value,
                      'SecretsManagerValue': secrets_value['Username']
                  })
              }
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.14
      Timeout: 30

  LambdaExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-LambdaFunction:*'

  LambdaExecutionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-LambdaFunction'

Outputs:
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  SecretName:
    Description: The name of the Secrets Manager secret
    Value: !Ref SecretsManagerSecret