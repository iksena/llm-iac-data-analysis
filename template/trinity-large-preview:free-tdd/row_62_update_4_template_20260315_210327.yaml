AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with Parameter Groups and Two db.t3.large Instances'

Parameters:
  MasterUsername:
    Type: String
    Default: admin
    MinLength: 1
    MaxLength: 16
    Description: Database master username
  DBClusterIdentifier:
    Type: String
    Default: aurora-mysql-cluster
    Description: Cluster identifier
  DBSubnetGroupName:
    Type: String
    Default: default-vpc
    Description: Subnet group name
  VPCSecurityGroups:
    Type: List<String>
    Default: 'sg-0000000000000000'
    Description: VPC security group IDs

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      DBClusterIdentifier: !Ref DBClusterIdentifier
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUsername
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VpcSecurityGroupIds: !Ref VPCSecurityGroups
      Port: 3306
      BackupRetentionPeriod: 1
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'mon:04:00-mon:05:00'
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance-1'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups
      DBParameterGroupName: !Ref DBParameterGroup

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance-2'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups
      DBParameterGroupName: !Ref DBParameterGroup

  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Aurora MySQL Cluster Parameter Group
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Aurora MySQL DB Parameter Group
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION'