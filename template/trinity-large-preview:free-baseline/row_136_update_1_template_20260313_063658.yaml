AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  PermissionBoundaryEnforcement:
    Type: Boolean
    Default: true
    Description: Enable strict permission boundary enforcement
  TeamName:
    Type: String
    Default: MyTeam
    Description: Team name prefix for IAM resources
  OwnerTagValue:
    Type: String
    Default: DeveloperTeam
    Description: Owner tag value for accountability

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permission boundary restricting to S3 and read-only IAM
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
            Resource: '*'

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TeamName}DeveloperRole'
      Description: Developer role with configurable permission boundaries
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      PermissionsBoundary: !If
        - EnablePermissionBoundary
        - !Ref PermissionBoundaryPolicy
        - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Tags:
        - Key: Owner
          Value: !Ref OwnerTagValue

Conditions:
  EnablePermissionBoundary: !Equals [!Ref PermissionBoundaryEnforcement, true]