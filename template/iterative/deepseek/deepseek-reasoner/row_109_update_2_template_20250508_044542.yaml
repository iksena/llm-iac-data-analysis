AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: MongoDBConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: test_name
          ApiKeyValue: test_value

  MongoDBAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MongoDBAPIDestination
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: https://www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 100

  EventBridgeInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAPIDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Ref MongoDBAPIDestination

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: RouteToMongoDBRule
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - custom.application
      Targets:
        - Arn: !Ref MongoDBAPIDestination
          Id: MongoDBAPITarget
          RoleArn: !GetAtt EventBridgeInvocationRole.Arn
          RetryPolicy:
            MaximumRetryAttempts: 3
            MaximumEventAgeInSeconds: 3600
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusARN:
    Value: !GetAtt CustomEventBus.Arn
  APIDestinationARN:
    Value: !Ref MongoDBAPIDestination
  DeadLetterQueueURL:
    Value: !Ref DeadLetterQueue
  InvocationRoleARN:
    Value: !GetAtt EventBridgeInvocationRole.Arn