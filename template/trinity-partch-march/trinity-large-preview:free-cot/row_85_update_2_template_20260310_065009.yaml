AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  BucketName:
    Type: String
    Default: cloudwatch-exports
    Description: S3 bucket name for CloudWatch exports (will be prefixed with account ID)
  EnableVersioning:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Enable S3 bucket versioning
  EnableMFADelete:
    Type: String
    Default: false
    AllowedValues: [true, false]
    Description: Enable MFA delete for versioning
  TransitionToIA:
    Type: Number
    Default: 30
    Description: Days to transition to Infrequent Access storage class
  TransitionToGlacier:
    Type: Number
    Default: 60
    Description: Days to transition to Glacier storage class
  ExpirationDays:
    Type: Number
    Default: 365
    Description: Days to expire old objects

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: CloudWatchExports

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetBucketAcl
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}-${AWS::AccountId}-${AWS::Region}'
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}-${AWS::AccountId}-${AWS::Region}/*'
          - Effect: Allow
            Principal: '*'
            Action: s3:ListBucket
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}-${AWS::AccountId}-${AWS::Region}'
            Condition:
              StringEquals:
                aws:PrincipalArn: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/CloudWatchExportRole'

  BucketVersioning:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${BucketName}-versioning-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: !Ref EnableVersioning
        MFADelete: !Ref EnableMFADelete

  BucketLifecycleConfiguration:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${BucketName}-lifecycle-${AWS::AccountId}-${AWS::Region}'
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Filter: {}
            Transitions:
              - Days: !Ref TransitionToIA
                StorageClass: INTELLIGENT_TIERING
          - Id: TransitionToGlacier
            Status: Enabled
            Filter: {}
            Transitions:
              - Days: !Ref TransitionToGlacier
                StorageClass: GLACIER
          - Id: Expiration
            Status: Enabled
            Filter: {}
            NoncurrentVersionExpiration:
              NoncurrentDays: !Ref ExpirationDays
            Expiration:
              Days: !Ref ExpirationDays

  CloudWatchExportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudWatchExportRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/CloudWatchLogsFullAccess

  RolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudWatchExportPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetBucketAcl
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}-${AWS::AccountId}-${AWS::Region}'
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}-${AWS::AccountId}-${AWS::Region}/*'
      Roles:
        - !Ref CloudWatchExportRole

Outputs:
  BucketName:
    Description: Name of the CloudWatch export S3 bucket
    Value: !Sub '${BucketName}-${AWS::AccountId}-${AWS::Region}'
  BucketArn:
    Description: ARN of the CloudWatch export S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn
  BucketRegion:
    Description: Region of the CloudWatch export S3 bucket
    Value: !Sub '${AWS::Region}'