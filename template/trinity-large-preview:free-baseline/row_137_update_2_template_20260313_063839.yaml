AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AppSync GraphQL API with Lambda backend for pet inventory service

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  PetInventoryLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const mockData = [
              { id: "1", name: "Max", type: "Dog" },
              { id: "2", name: "Bella", type: "Cat" },
              { id: "3", name: "Charlie", type: "Bird" }
            ];
            return {
              statusCode: 200,
              body: JSON.stringify(mockData)
            };
          };

  AppSyncGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY

  AppSyncApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      Description: API Key for PetShopAPI
      Expires: !Select [0, !Split("-", !Join("-", !Ref "AWS::Region"))]

  AppSyncLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      Name: PetInventoryLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt LambdaInvocationRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetInventoryLambda.Arn

  LambdaInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetInventoryLambda.Arn

  AppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  AppSyncResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt AppSyncGraphQLApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt AppSyncLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

Outputs:
  GraphQLApiUrl:
    Description: URL for the GraphQL API
    Value: !GetAtt AppSyncGraphQLApi.GraphQLUrl
  ApiKey:
    Description: API Key for the GraphQL API
    Value: !GetAtt AppSyncApiKey.ApiKey