AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Flow Logging to S3'

Parameters:
  VPCCidrBlock:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  TrafficType:
    Description: 'Type of traffic to log (ACCEPT, REJECT, or ALL)'
    Type: String
    Default: 'ALL'
    AllowedValues:
      - 'ACCEPT'
      - 'REJECT'
      - 'ALL'
  
  LogFilePrefix:
    Description: 'Optional prefix for log files (leave empty for none)'
    Type: String
    Default: ''
  
  LogRetentionDays:
    Description: 'Number of days to retain flow logs'
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 3650
  
  BucketName:
    Description: 'Name for the S3 bucket (will have suffix appended)'
    Type: String
    Default: 'flow-logs-bucket'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::AccountId}-${AWS::Region}'
      AccessControl: LogDeliveryWrite
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: LogRetention
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-FlowLogsBucket'

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${FlowLogsBucket}'
              - !Sub 'arn:aws:s3:::${FlowLogsBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'
          - Effect: Allow
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action:
              - 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${FlowLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Effect: Allow
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action:
              - 's3:GetBucketAcl'
            Resource: !Sub 'arn:aws:s3:::${FlowLogsBucket}'

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'vpc-flow-logs.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: FlowLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                  - 'logs:DescribeLogGroups'
                  - 'logs:DescribeLogStreams'
                Resource: '*'

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn
      LogDestinationType: 's3'
      LogDestination: !Sub 'arn:aws:s3:::${FlowLogsBucket}/${LogFilePrefix}'
      ResourceId: !Ref VPC
      ResourceType: 'VPC'
      TrafficType: !Ref TrafficType

Outputs:
  VPCId:
    Description: 'ID of the created VPC'
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'

  FlowLogsBucketName:
    Description: 'Name of the S3 bucket for flow logs'
    Value: !Ref FlowLogsBucket
    Export:
      Name: !Sub '${AWS::StackName}-FlowLogsBucketName'

  FlowLogsRoleArn:
    Description: 'ARN of the IAM role for flow logs'
    Value: !GetAtt FlowLogsRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FlowLogsRoleArn'