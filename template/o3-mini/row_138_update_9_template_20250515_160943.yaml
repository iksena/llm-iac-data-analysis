AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template for a web application environment.
  It creates a VPC with a public subnet, an EC2 instance running Apache/PHP with preloaded files,
  an S3 bucket for static assets, a DynamoDB table "AWS-Services" with composite keys, and
  an IAM role that grants the EC2 instance full access to S3 and DynamoDB.

Parameters:
  InstanceType:
    Description: EC2 instance type for the web server.
    Type: String
    Default: t2.micro
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access.
    Type: AWS::EC2::KeyPair::KeyName

Resources:
  WebAppVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WebAppVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebAppVPC
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebAppVPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP (80) and SSH (22) access"
      VpcId: !Ref WebAppVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: InstanceSG

  WebAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-webassets"
    DeletionPolicy: Retain

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "AWS-Services"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EC2Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-InstanceProfile"
      Roles:
        - !Ref EC2Role

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs}}"
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: WebServerInstance
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              yum update -y
              amazon-linux-extras install -y lamp-mariadb10.2-php7.2 php7.2
              yum install -y httpd aws-cli php-cli php-json unzip
              systemctl start httpd
              systemctl enable httpd
              cd /var/www/html
              curl -sS https://getcomposer.org/installer | php
              php composer.phar require aws/aws-sdk-php
              cat > /var/www/html/index.php <<'EOS'
              <?php
              echo "<h1>Welcome to the Web Application</h1>";
              echo "<p>This instance hosts the web application environment.</p>";
              $region = "${AWS::Region}";
              $bucket = "${Bucket}";
              echo "<p>Region: " . $region . "</p>";
              echo "<p>S3 Bucket: " . $bucket . "</p>";
              ?>
              EOS
              aws s3 cp /var/www/html/index.php s3://${Bucket}/index.php --region ${AWS::Region}
              cat > /tmp/sample-data.json <<'DDBEOF'
              {
                "PK": {"S": "Service#001"},
                "SK": {"S": "metadata"},
                "Name": {"S": "Example Service"},
                "Description": {"S": "This is a sample entry in DynamoDB."}
              }
              DDBEOF
              aws dynamodb put-item --table-name AWS-Services --item file:///tmp/sample-data.json --region ${AWS::Region}
            - {Bucket: !Ref WebAssetsBucket}

Outputs:
  VPCId:
    Description: "VPC Id for the web application environment."
    Value: !Ref WebAppVPC
  InstancePublicIP:
    Description: "Public IP address of the EC2 instance."
    Value: !GetAtt WebServerInstance.PublicIp
  S3BucketName:
    Description: "Name of the S3 bucket hosting static assets."
    Value: !Ref WebAssetsBucket
  DynamoDBTableName:
    Description: "Name of the DynamoDB table for structured data storage."
    Value: !Ref DynamoDBTable