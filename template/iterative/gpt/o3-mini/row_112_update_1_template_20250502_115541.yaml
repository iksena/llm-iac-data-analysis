AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an S3 bucket with an SQS queue for event-driven object upload notifications.
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: S3NotificationQueue

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: s3-notification-bucket
      NotificationConfiguration:
        QueueConfigurations:
          - Event: "s3:ObjectCreated:*"
            Queue: !GetAtt SQSQueue.Arn

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ToSendMessage
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: "SQS:SendMessage"
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Join 
                  - ""
                  - - "arn:aws:s3:::"
                    - !Ref S3Bucket
Outputs:
  S3BucketName:
    Description: "Name of the S3 bucket"
    Value: !Ref S3Bucket
  SQSQueueURL:
    Description: "URL of the SQS queue"
    Value: !Ref SQSQueue
  SQSQueueARN:
    Description: "ARN of the SQS queue"
    Value: !GetAtt SQSQueue.Arn