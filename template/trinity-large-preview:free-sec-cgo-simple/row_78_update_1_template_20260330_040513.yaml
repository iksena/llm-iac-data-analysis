AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IP Address Manager for managing IP address allocation
      OperatingRegions:
        - Name: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IPAM'
        - Key: Environment
          Value: !Ref 'AWS::StackName'
Outputs:
  IPAMARN:
    Description: IPAM ARN
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ARN'
  IPAMID:
    Description: IPAM ID
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ID'
  DefaultPublicScopeID:
    Description: Default Public Scope ID
    Value: !GetAtt IPAM.DefaultPublicScopeId
    Export:
      Name: !Sub '${AWS::StackName}-Default-Public-Scope-ID'
  DefaultPrivateScopeID:
    Description: Default Private Scope ID
    Value: !GetAtt IPAM.DefaultPrivateScopeId
    Export:
      Name: !Sub '${AWS::StackName}-Default-Private-Scope-ID'