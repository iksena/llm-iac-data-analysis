AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: DynamoDB table name
  EventBusName:
    Type: String
    Default: OrdersEventBus
    Description: EventBridge event bus name

Resources:
  # DynamoDB Table with Streams Enabled
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # EventBridge Event Bus
  OrdersEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
      EventSourceName: dynamodb

  # Lambda Function for INSERT Events
  InsertEventHandler:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          eventbridge = boto3.client('eventbridge')

          def handler(event, context):
              for record in event['Records']:
                  if record['eventName'] == 'INSERT':
                      eventbridge.put_events(
                          Entries=[
                              {
                                  'Source': 'dynamodb',
                                  'DetailType': 'DynamoDB Stream',
                                  'Detail': json.dumps(record),
                                  'EventBusName': 'OrdersEventBus',
                                  'Time': record['eventTimestamp']
                              }
                          ]
                      )

  # Lambda Function for MODIFY Events
  ModifyEventHandler:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          eventbridge = boto3.client('eventbridge')

          def handler(event, context):
              for record in event['Records']:
                  if record['eventName'] == 'MODIFY':
                      eventbridge.put_events(
                          Entries=[
                              {
                                  'Source': 'dynamodb',
                                  'DetailType': 'DynamoDB Stream',
                                  'Detail': json.dumps(record),
                                  'EventBusName': 'OrdersEventBus',
                                  'Time': record['eventTimestamp']
                              }
                          ]
                      )

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersTable.StreamArn
        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'

  # DynamoDB Stream Trigger for INSERT Events
  InsertStreamTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrdersTable.StreamArn
      FunctionName: !Ref InsertEventHandler
      StartingPosition: LATEST
      BatchSize: 100

  # DynamoDB Stream Trigger for MODIFY Events
  ModifyStreamTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrdersTable.StreamArn
      FunctionName: !Ref ModifyEventHandler
      StartingPosition: LATEST
      BatchSize: 100

Outputs:
  EventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref TableName
  TableStreamArn:
    Description: DynamoDB Table Stream ARN
    Value: !GetAtt OrdersTable.StreamArn