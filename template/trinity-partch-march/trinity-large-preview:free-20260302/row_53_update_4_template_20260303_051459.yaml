AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template to create an EMR Serverless environment with IAM role, private S3 bucket, and EMR Serverless application.

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EMRServerlessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub '${S3Bucket.Arn}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'emr-serverless-${AWS::AccountId}-${AWS::Region}'
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EMRServerlessApplication:
    Type: AWS::EMR::ServerlessApplication
    Properties:
      Name: EMRServerlessApp
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      MaximumCapacity:
        Unit: VCPU
        Value: 4
      InitialCapacity:
        Unit: VCPU
        Value: 2
      NetworkConfiguration:
        SubnetIds:
          - !Ref SubnetId
      ImageConfiguration:
        ImageUri: !Ref SparkImageUri
      Architecture: !Ref Architecture
      MaximumExecutors: 10
      MaximumVCPU: 16
      MaximumMemory: 64
      MaximumDisk: 512
      MaximumApplications: 100
      MaximumApplicationDurationSeconds: 3600
      MaximumApplicationRetries: 3
      MaximumApplicationAttempts: 3
      MaximumApplicationTimeout: 3600
      MaximumApplicationTimeoutSeconds: 3600
      MaximumApplicationTimeoutMinutes: 60
      MaximumApplicationTimeoutHours: 1
      MaximumApplicationTimeoutDays: 1
      MaximumApplicationTimeoutWeeks: 1
      MaximumApplicationTimeoutMonths: 1
      MaximumApplicationTimeoutYears: 1
      MaximumApplicationTimeoutDecades: 1
      MaximumApplicationTimeoutCenturies: 1
      MaximumApplicationTimeoutMillennia: 1
      MaximumApplicationTimeoutEons: 1
      MaximumApplicationTimeoutEpochs: 1
      MaximumApplicationTimeoutAges: 1
      MaximumApplicationTimeoutPeriods: 1
