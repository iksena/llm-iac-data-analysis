AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready real-time data pipeline using Kinesis Data Stream, Firehose, and S3'

Parameters:
  StreamShardCount:
    Type: Number
    Default: 2
    MinValue: 1
    Description: 'Number of shards for Kinesis Data Stream (minimum 1)'
  S3BucketName:
    Type: String
    Description: 'Globally unique name for the S3 bucket (must follow DNS naming rules)'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9\-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be 3-63 characters, start/end with alphanumeric, and contain only alphanumeric and hyphens'
  CompressionFormat:
    Type: String
    Default: UNCOMPRESSED
    AllowedValues:
      - UNCOMPRESSED
      - GZIP
      - ZIP
      - HADOOP_SNAPPY
    Description: 'Compression format for data in S3'

Resources:
  DataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub '${AWS::StackName}-DataStream'
      ShardCount: !Ref StreamShardCount

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: KinesisFirehoseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kinesis:DescribeStream'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                  - 'kinesis:ListShards'
                Resource: !GetAtt DataStream.Arn
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:ListBucket'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-Firehose'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: !Ref CompressionFormat
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'

Outputs:
  KinesisStreamName:
    Description: 'Name of the Kinesis Data Stream'
    Value: !Ref DataStream
  FirehoseDeliveryStreamName:
    Description: 'Name of the Firehose Delivery Stream'
    Value: !Ref FirehoseDeliveryStream
  S3BucketName:
    Description: 'Name of the destination S3 bucket'
    Value: !Ref S3BucketName
  FirehoseARN:
    Description: 'ARN of the Firehose Delivery Stream'
    Value: !GetAtt FirehoseDeliveryStream.Arn