AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Organizations Data Collection and Analysis Pipeline'

Parameters:
  ManagementAccountId:
    Type: String
    Description: 'AWS Organizations management account ID'
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: 'Must be a valid 12-digit AWS account ID'

  S3BucketName:
    Type: String
    Description: 'Name for the S3 bucket to store organization data'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name'

  AthenaDBName:
    Type: String
    Description: 'Name for the Athena/Glue database'
    Default: 'managementcur'
    AllowedPattern: '^[a-z0-9_]*$'
    ConstraintDescription: 'Must contain only lowercase letters, numbers, and underscores'

  ScheduleExpression:
    Type: String
    Description: 'Schedule expression for data collection'
    Default: 'rate(7 days)'

Resources:
  DataEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'KMS key for organization data encryption'
      EnableKeyRotation: true
      PendingWindowInDays: 7
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowLambdaAndGlueUse
            Effect: Allow
            Principal:
              AWS: 
                - !GetAtt LambdaExecutionRole.Arn
                - !GetAtt GlueCrawlerRole.Arn
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  OrganizationDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt DataEncryptionKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DataRetention
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 90
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: 'org-data-logs/'

  LoggingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  OrganizationDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OrganizationDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceEncryptedTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${OrganizationDataBucket.Arn}/*'
              - !GetAtt OrganizationDataBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrganizationDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub '${OrganizationDataBucket.Arn}/*'
              - Effect: Allow
                Action: 
                  - sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/OrganizationDataCollectorRole'
              - Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:ListOrganizationalUnitsForParent
                  - organizations:ListTagsForResource
                Resource: '*'

  OrganizationDataCollector:
    Type: AWS::Lambda::Function
    DependsOn: 
      - OrganizationDataBucket
      - LambdaExecutionRole
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import datetime
          import os
          
          def handler(event, context):
              try:
                  sts = boto3.client('sts')
                  assumed_role = sts.assume_role(
                      RoleArn=f"arn:aws:iam::{os.environ['MANAGEMENT_ACCOUNT_ID']}:role/OrganizationDataCollectorRole",
                      RoleSessionName='OrgDataCollection'
                  )
                  
                  org_client = boto3.client(
                      'organizations',
                      aws_access_key_id=assumed_role['Credentials']['AccessKeyId'],
                      aws_secret_access_key=assumed_role['Credentials']['SecretAccessKey'],
                      aws_session_token=assumed_role['Credentials']['SessionToken']
                  )
                  
                  accounts = org_client.list_accounts()
                  
                  s3 = boto3.client('s3')
                  date_prefix = datetime.datetime.now().strftime('%Y/%m/%d')
                  
                  s3.put_object(
                      Bucket=os.environ['BUCKET_NAME'],
                      Key=f'{date_prefix}/accounts.json',
                      Body=json.dumps(accounts),
                      ServerSideEncryption='aws:kms',
                      SSEKMSKeyId=os.environ['KMS_KEY_ARN']
                  )
                  
                  return {
                      'statusCode': 200,
                      'body': 'Successfully collected organization data'
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'body': f"Error collecting organization data: {str(e)}"
                  }
      Runtime: python3.9
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId
          BUCKET_NAME: !Ref S3BucketName
          KMS_KEY_ARN: !GetAtt DataEncryptionKey.Arn

  DataCollectionSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Schedule for organization data collection'
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrganizationDataCollector.Arn
          Id: CollectOrganizationData

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrganizationDataCollector.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DataCollectionSchedule.Arn

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDBName
        Description: 'Database for AWS Organization data analysis'

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub '${OrganizationDataBucket.Arn}/*'
                  - !GetAtt OrganizationDataBucket.Arn

  OrganizationDataCrawler:
    Type: AWS::Glue::Crawler
    DependsOn:
      - GlueDatabase
      - OrganizationDataBucket
    Properties:
      Name: !Sub ${AWS::StackName}-crawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref GlueDatabase
      Schedule:
        ScheduleExpression: cron(0 0 ? * SUN *)
      Targets:
        S3Targets:
          - Path: !Sub s3://${S3BucketName}
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

Outputs:
  S3BucketArn:
    Description: 'ARN of the S3 bucket storing organization data'
    Value: !GetAtt OrganizationDataBucket.Arn

  LambdaFunctionArn:
    Description: 'ARN of the Lambda function collecting organization data'
    Value: !GetAtt OrganizationDataCollector.Arn

  GlueDatabaseName:
    Description: 'Name of the Glue/Athena database'
    Value: !Ref GlueDatabase

  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt DataEncryptionKey.Arn

  LoggingBucketName:
    Description: 'Name of the S3 bucket used for access logging'
    Value: !Ref LoggingBucket