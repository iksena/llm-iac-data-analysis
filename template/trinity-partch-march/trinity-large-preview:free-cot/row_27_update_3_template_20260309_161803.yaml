AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time Data Ingestion and Storage Pipeline using Kinesis Data Stream and Firehose'

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'kinesis-firehose-data'
    Description: 'Prefix for the S3 bucket name'
  StreamName:
    Type: String
    Default: 'kinesis-data-stream'
    Description: 'Name for the Kinesis Data Stream'
  FirehoseName:
    Type: String
    Default: 'kinesis-firehose-delivery'
    Description: 'Name for the Kinesis Data Firehose delivery stream'
  ShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards for the Kinesis Data Stream'
  RetentionPeriod:
    Type: Number
    Default: 24
    Description: 'Retention period in hours for the Kinesis Data Stream'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::StackName}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriod

  FirehoseIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseServiceRolePolicy
      Policies:
        - PolicyName: FirehoseS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}'
                  - !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseIAMRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        Prefix: 'kinesis-data/'
        BufferingHints:
          SizeInMBs: 128
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          NoEncryptionConfig: 'NoEncryption'
        RoleARN: !GetAtt FirehoseIAMRole.Arn

  KinesisStreamIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: KinesisStreamAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
            Resource: !GetAtt KinesisStream.Arn
      Roles:
        - !Ref FirehoseIAMRole

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket'
    Value: !Ref S3Bucket
  KinesisStreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn
  FirehoseDeliveryStreamARN:
    Description: 'ARN of the Kinesis Data Firehose delivery stream'
    Value: !GetAtt KinesisFirehoseDeliveryStream.Arn