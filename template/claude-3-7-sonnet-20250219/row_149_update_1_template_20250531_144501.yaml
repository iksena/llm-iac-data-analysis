AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EFS with EC2 integration across multiple AZs'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for EC2 instance and EFS mount target

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for EC2 instance and EFS mount target

  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: Latest Amazon Linux 2 AMI from SSM Parameter Store

  EFSPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: EFS performance mode

  EFSThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: EFS throughput mode

  EFSProvisionedThroughput:
    Type: Number
    Default: 100
    MinValue: 1
    Description: EFS provisioned throughput in MiB/s (only used if throughput mode is provisioned)

Resources:
  # Security Groups
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt EC2SecurityGroup.GroupId
          Description: Allow NFS traffic from EC2 instances

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # IAM Role for EC2 instances
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
      Path: /

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  # EFS File System
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref EFSPerformanceMode
      ThroughputMode: !Ref EFSThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref EFSProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  # EFS Mount Targets
  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # EC2 Instances
  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: MountTarget1
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Instance1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system
          yum update -y
          
          # Install EFS utilities
          yum install -y amazon-efs-utils
          
          # Create mount directory if it doesn't exist
          mkdir -p /home
          
          # Backup existing home directory content if any
          if [ "$(ls -A /home)" ]; then
            mkdir -p /home_backup
            cp -r /home/* /home_backup/
          fi
          
          # Add EFS mount to fstab for persistence across reboots
          echo "${EFSFileSystem}:/ /home efs _netdev,tls,iam 0 0" >> /etc/fstab
          
          # Mount EFS
          mount -a
          
          # Restore home directory content if backup was created
          if [ -d "/home_backup" ] && [ "$(ls -A /home_backup)" ]; then
            cp -r /home_backup/* /home/
            rm -rf /home_backup
          fi
          
          # Set appropriate permissions
          chmod 755 /home

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Instance2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system
          yum update -y
          
          # Install EFS utilities
          yum install -y amazon-efs-utils
          
          # Create mount directory if it doesn't exist
          mkdir -p /home
          
          # Backup existing home directory content if any
          if [ "$(ls -A /home)" ]; then
            mkdir -p /home_backup
            cp -r /home/* /home_backup/
          fi
          
          # Add EFS mount to fstab for persistence across reboots
          echo "${EFSFileSystem}:/ /home efs _netdev,tls,iam 0 0" >> /etc/fstab
          
          # Mount EFS
          mount -a
          
          # Restore home directory content if backup was created
          if [ -d "/home_backup" ] && [ "$(ls -A /home_backup)" ]; then
            cp -r /home_backup/* /home/
            rm -rf /home_backup
          fi
          
          # Set appropriate permissions
          chmod 755 /home

  # CloudWatch Alarms
  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS burst credit balance is too low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS IO limit is approaching maximum
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic

  StorageBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS storage usage is high
      Namespace: AWS/EFS
      MetricName: StorageBytes
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 10000000000  # 10GB, adjust as needed
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic

  EFSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      TopicName: !Sub ${AWS::StackName}-EFS-Alarms

Conditions:
  IsProvisionedThroughput: !Equals [!Ref EFSThroughputMode, provisioned]

Outputs:
  EFSFileSystemId:
    Description: ID of the EFS File System
    Value: !Ref EFSFileSystem

  EFSFileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  EC2Instance1Id:
    Description: ID of the first EC2 instance
    Value: !Ref EC2Instance1

  EC2Instance2Id:
    Description: ID of the second EC2 instance
    Value: !Ref EC2Instance2

  EFSMountCommand:
    Description: Command to mount the EFS file system manually
    Value: !Sub "sudo mount -t efs -o tls ${EFSFileSystem}:/ /mnt/efs"

  BurstCreditBalanceAlarmARN:
    Description: ARN of the EFS Burst Credit Balance Alarm
    Value: !GetAtt BurstCreditBalanceAlarm.Arn

  PercentIOLimitAlarmARN:
    Description: ARN of the EFS Percent IO Limit Alarm
    Value: !GetAtt PercentIOLimitAlarm.Arn

  StorageBytesAlarmARN:
    Description: ARN of the EFS Storage Bytes Alarm
    Value: !GetAtt StorageBytesAlarm.Arn