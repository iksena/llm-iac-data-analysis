AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating a DynamoDB table'

Parameters:
  TableName:
    Type: String
    Description: 'Name of the DynamoDB table'
    Default: 'MyDynamoDBTable'
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9._-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters, dots, hyphens, and underscores'
  ReadCapacityUnits:
    Type: Number
    Description: 'Provisioned read capacity units for the DynamoDB table'
    Default: 5
    MinValue: 1
  WriteCapacityUnits:
    Type: Number
    Description: 'Provisioned write capacity units for the DynamoDB table'
    Default: 5
    MinValue: 1

Resources:
  DynamoDBTable:
    Type: 'AWS::DynamoDB::Table'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table'
    Value: !Ref DynamoDBTable
  TableArn:
    Description: 'ARN of the created DynamoDB table'
    Value: !GetAtt DynamoDBTable.Arn