AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Static Website with CloudFront CDN and Automated Content Management

Parameters:
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM Certificate ARN for HTTPS (leave empty for HTTP-only)
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
  CacheTTL:
    Type: Number
    Default: 60
    MinValue: 0
    MaxValue: 31536000
    Description: Cache TTL in seconds (default 60 seconds)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}/*'
                  - !Sub 'arn:aws:s3:::${S3Bucket}'

  ContentManagementLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              try:
                  request_type = event['RequestType']
                  bucket_name = event['ResourceProperties']['BucketName']

                  if request_type == 'Create':
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body=b'<html><head><title>Static Website</title></head><body><h1>Welcome to our secure static website!</h1></body></html>',
                          ContentType='text/html'
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  elif request_type == 'Delete':
                      try:
                          objects = s3.list_objects_v2(Bucket=bucket_name)
                          if 'Contents' in objects:
                              delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects['Contents']]}
                              s3.delete_objects(Bucket=bucket_name, Delete=delete_keys)
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      except Exception as e:
                          cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: BucketOwnerFullControl
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      Description: Secure S3 access for CloudFront
      OriginAccessControlOriginType: S3
      SigningProtocol: sigv4
      SigningBehavior: always
      Name: !Sub '${AWS::StackName}-OAC'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        Origins:
          - DomainName: !GetAtt S3Bucket.DomainName
            Id: S3Origin
            OriginAccessControlId: !Ref OriginAccessControl
            OriginPath: ''
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: !If [HasCertificate, 'redirect-to-https', 'allow-all']
          CachePolicyId: !Ref CachePolicy
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedHTTPMethods:
            - GET
            - HEAD
            - OPTIONS
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: !If [HasCertificate, 'sni-only', 'vip']
          MinimumProtocolVersion: !If [HasCertificate, 'TLSv1.2_2021', 'SSLv3']
      Tags:
        - Key: Environment
          Value: production

  CachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CustomCachePolicy
        MinTTL: !Ref CacheTTL
        MaxTTL: 31536000
        DefaultTTL: !Ref CacheTTL
        Comment: Custom cache policy with 60-second TTL
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: false
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${OriginAccessControl}'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - !Sub 'arn:aws:s3:::${S3Bucket}'

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ContentManagementLambda.Arn
      Principal: cloudformation.amazonaws.com

  ContentManagementResource:
    Type: Custom::ContentManagement
    Version: '1.0'
    Properties:
      ServiceToken: !GetAtt ContentManagementLambda.Arn
      BucketName: !Ref S3Bucket

  HasCertificate:
    Fn::Not:
      - Fn::Equals:
        - !Ref CertificateArn
        - ''

Outputs:
  WebsiteURL:
    Description: URL of the static website hosted on S3
    Value: !GetAtt S3Bucket.WebsiteURL
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  CloudFrontDistributionId:
    Description: ID of the CloudFront distribution
    Value: !Ref CloudFrontDistribution