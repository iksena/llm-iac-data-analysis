AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS file system with monitoring and automated backups'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for mount targets (minimum 2 subnets recommended)

  EnableBackups:
    Type: String
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'true'
    Description: Enable automated backups

  BackupSchedule:
    Type: String
    Default: 'cron(0 5 ? * * *)'
    Description: CRON expression for backup schedule

  PerformanceMode:
    Type: String
    AllowedValues: 
      - generalPurpose
      - maxIO
    Default: generalPurpose
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    AllowedValues: 
      - bursting
      - provisioned
    Default: bursting
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    Default: 128
    MinValue: 1
    MaxValue: 1024
    Description: Provisioned throughput in MiB/s (only applicable for provisioned mode)

Conditions:
  IsBackupEnabled: !Equals [!Ref EnableBackups, 'true']
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs
        - Key: Environment
          Value: Production
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-io-utilization
      AlarmDescription: Alert when I/O utilization is high
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ActionsEnabled: true

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-burst-credits
      AlarmDescription: Alert when burst credit balance is low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000000
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ActionsEnabled: true

  StorageUsageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-storage-usage
      AlarmDescription: Alert when storage usage is high
      MetricName: StorageBytes
      Namespace: AWS/EFS
      Statistic: Average
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1000000000000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ActionsEnabled: true

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-backup-vault

  BackupRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-backup-plan
        BackupPlanRule:
          - RuleName: DailyBackups
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 120
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFSBackupSelection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem

  FileSystemDNS:
    Description: EFS File System DNS Name
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  FileSystemArn:
    Description: EFS File System ARN
    Value: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  MountCommand:
    Description: Example mount command
    Value: !Sub 'sudo mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ efs'