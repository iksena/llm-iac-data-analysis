AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralizedEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption key for managed services
      KeyUsage: ENCRYPT_DECRYPT
      EnableKeyRotation: true
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  CentralizedEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/centralized-encryption-key
      TargetKeyId: !Ref CentralizedEncryptionKey

Outputs:
  KeyId:
    Description: KMS Key ID for centralized encryption
    Value: !Ref CentralizedEncryptionKey