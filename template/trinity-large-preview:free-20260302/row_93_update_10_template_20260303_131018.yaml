AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an auto-configuring EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager (SSM).

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketForLogs}/*'
                  - !Sub 'arn:aws:s3:::${S3BucketForLogs}'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  S3BucketForLogs:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'logs-${AWS::StackName}-${AWS::Region}'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref 'AWS::Region', !Ref 'AWS::AccountId']
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: NginxServer
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  SSMAutomationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-ApplyPatchBaseline
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        InstallNginx:
          - 'true'
      ScheduleExpression: 'rate(1 day)'

  NginxInstallDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '1.2'
        description: Install and start Nginx web server
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: installNginx
            inputs:
              runCommand:
                - 'yum install -y nginx'
                - 'systemctl start nginx'
                - 'systemctl enable nginx'
      DocumentType: Command

  SSMAutomationAssociationNginx:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref NginxInstallDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        InstallNginx:
          - 'true'
      ScheduleExpression: 'rate(1 day)'

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      'ami-0c55b159cbfafe1f0': Amazon Linux 2
    us-west-2:
      'ami-0d1cd67c26f5fca19': Amazon Linux 2

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the newly created EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  S3BucketName:
    Description: Name of the S3 bucket for centralized logging
    Value: !Ref S3BucketForLogs