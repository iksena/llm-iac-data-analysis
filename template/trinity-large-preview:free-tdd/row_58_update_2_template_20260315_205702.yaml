AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Parameters:
  EnableAutomatedBackups:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  BackupSchedule:
    Type: String
    Default: "cron(0 0 * * ? *)"
  VPC:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000001

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      BackupPolicy:
        Status: ENABLED

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref EFSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref EFSecurityGroup

  EFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC

  CloudWatchAlarmIO:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS IO Utilization Alarm
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  CloudWatchAlarmBurstCredits:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS Burst Credit Balance Alarm
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  CloudWatchAlarmThroughput:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS Throughput Alarm
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub "${AWS::StackName}-backup-vault"

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlanName: !Sub "${AWS::StackName}-backup-plan"
      Rules:
        - RuleName: EFSBackupRule
          TargetBackupVault: !Ref BackupVault
          ScheduleExpression: !Ref BackupSchedule
          StartWindowMinutes: 60
          CompletionWindowMinutes: 480
          Lifecycle:
            DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Sub "arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}"

  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  MountTarget1Id:
    Description: EFS Mount Target 1 ID
    Value: !Ref MountTarget1
  MountTarget2Id:
    Description: EFS Mount Target 2 ID
    Value: !Ref MountTarget2