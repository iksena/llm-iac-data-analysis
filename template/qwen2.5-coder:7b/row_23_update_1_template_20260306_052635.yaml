AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table
    Default: MyDynamoDBTable
  AttributeName:
    Type: String
    Description: The name of the attribute
    Default: id
  AttributeType:
    Type: String
    Description: The type of the attribute
    Default: S
  KeyType:
    Type: String
    Description: The type of the key
    Default: HASH

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref AttributeName
          AttributeType: !Ref AttributeType
      KeySchema:
        - AttributeName: !Ref AttributeName
          KeyType: !Ref KeyType
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

Outputs:
  TableName:
    Description: The name of the created DynamoDB table
    Value: !Ref MyDynamoDBTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Description: The ARN of the created DynamoDB table
    Value: !GetAtt MyDynamoDBTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'