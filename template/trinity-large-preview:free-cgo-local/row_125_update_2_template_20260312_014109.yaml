AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  ApiName:
    Type: String
    Default: EmailAPI
  LambdaRuntime:
    Type: String
    Default: python3.12
  ThrottleRate:
    Type: Number
    Default: 500
  QuotaLimit:
    Type: Number
    Default: 10000
  QuotaPeriod:
    Type: String
    Default: MONTH

Resources:
  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: API for sending templated emails via SES

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: PayloadValidator
      RestApiId: !Ref EmailApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  EmailApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref EmailApiDeployment
      RestApiId: !Ref EmailApi
      StageName: prod
      Description: Production stage

  EmailApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmailApiMethod
    Properties:
      RestApiId: !Ref EmailApi

  EmailApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref EmailApiResource
      RestApiId: !Ref EmailApi
      RequestValidatorId: !Ref RequestValidator
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt EmailLambda.Arn

  EmailApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: emails
      RestApiId: !Ref EmailApi

  EmailLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def handler(event, context):
              try:
                  ses = boto3.client('ses', region_name=event['requestContext']['region'])
                  body = json.loads(event['body'])
                  response = ses.send_email(
                      Source=body['from'],
                      Destination={'ToAddresses': [body['to']]},
                      Message={
                          'Subject': {'Data': body['subject']},
                          'Body': {
                              'Text': {'Data': body['text']},
                              'Html': {'Data': body['html']}
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPISecretKey
      Description: API key for email service
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: !Ref EmailApiStage
      Description: Usage plan for email API
      Quota:
        Limit: !Ref QuotaLimit
        Period: !Ref QuotaPeriod
      Throttle:
        BurstLimit: !Ref ThrottleRate
        RateLimit: !Ref ThrottleRate
      UsagePlanName: EmailAPIUsagePlan

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/prod/emails
  ApiKey:
    Description: API Key for authentication
    Value: !Ref ApiKey