AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-account private API Gateway with Lambda integration and VPC endpoint access'

Parameters:
  VpcEndpointId:
    Type: String
    Description: 'ID of the VPC Endpoint to restrict API access (vpce-xxxxxx)'
    AllowedPattern: '^vpce-[a-z0-9]+$'
    ConstraintDescription: 'Must be a valid VPC Endpoint ID starting with vpce-'
  
  CustomDomainName:
    Type: String
    Description: 'Custom domain name for the API (e.g., api.example.com)'
    AllowedPattern: '^[a-zA-Z0-9.-]+$'
    ConstraintDescription: 'Must be a valid domain name'
  
  CertificateArn:
    Type: String
    Description: 'ARN of ACM certificate for custom domain'
    AllowedPattern: '^arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Must be a valid ACM certificate ARN'
  
  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID'
    AllowedPattern: '^[A-Z0-9]+$'
    ConstraintDescription: 'Must be a valid Route53 Hosted Zone ID'

  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: 
      - 'dev'
      - 'staging'
      - 'prod'
    Description: 'Environment name for resource naming'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaCustomPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ApiGatewayInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-apigw-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvocationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'lambda:InvokeFunction'
                Resource: !GetAtt BackendFunction.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  BackendFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${AWS::StackName}-backend-${Environment}'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: 'Hello from private API',
                timestamp: new Date().toISOString()
              })
            };
          };
      Runtime: nodejs18.x
      Timeout: 29
      MemorySize: 128
      Tags:
        - Key: Environment
          Value: !Ref Environment

  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-private-api-${Environment}'
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: 'execute-api:/*'
          - Effect: Deny
            Principal: '*'
            Action: 'execute-api:Invoke'
            Resource: 'execute-api:/*'
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref VpcEndpointId
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: 'api'
      RestApiId: !Ref PrivateApi

  ApiMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: ApiGatewayInvocationRole
    Properties:
      HttpMethod: GET
      ResourceId: !Ref ApiResource
      RestApiId: !Ref PrivateApi
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BackendFunction.Arn}/invocations'
        Credentials: !GetAtt ApiGatewayInvocationRole.Arn
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - ApiMethod
      - ApiResource
    Properties:
      RestApiId: !Ref PrivateApi
      Description: !Sub 'Deployment for ${Environment} environment'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref PrivateApi
      StageName: !Ref Environment
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LambdaPermission:
    Type: AWS::Lambda::Permission
    DependsOn: BackendFunction
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*/*'

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
      Tags:
        - Key: Environment
          Value: !Ref Environment

  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: 
      - ApiStage
      - CustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref PrivateApi
      Stage: !Ref Environment

  DnsRecord:
    Type: AWS::Route53::RecordSet
    DependsOn: CustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/api'

  CustomDomainUrl:
    Description: 'Custom Domain URL'
    Value: !Sub 'https://${CustomDomainName}/api'

  ApiId:
    Description: 'API Gateway ID'
    Value: !Ref PrivateApi

  LambdaArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt BackendFunction.Arn

  ApiGatewayRoleArn:
    Description: 'API Gateway Invocation Role ARN'
    Value: !GetAtt ApiGatewayInvocationRole.Arn