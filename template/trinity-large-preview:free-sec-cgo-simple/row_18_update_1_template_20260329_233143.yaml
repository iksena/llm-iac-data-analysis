AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${AWS::StackName}-dynamodb-events"

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Source:
        SourceType: DynamoDB
        SourceConfig:
          SourceArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        TargetType: EventBridge
        Target:
          Arn: !GetAtt EventBridgeBus.Arn
          DetailType: UserAvatarUpdated
          Source: com.example.user.avatar
      FilterCriteria:
        Filters:
          - JsonPath: $.Records[0].dynamodb.NewImage.avatarUrl.S
            Operator: endsWith
            Value: ".png"

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Bus Name
    Value: !Ref EventBridgeBus