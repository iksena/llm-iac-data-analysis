AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AppConfigurationParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${AWS::StackName}/app/config'
      Type: String
      Value: 'This is A/B'
  ApplicationSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub '${AWS::StackName}-app-credentials'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "app_user"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'
        ExcludePunctuation: false
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: ParameterAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'ssm:GetParameter'
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AppConfigurationParameter}'
              - Effect: Allow
                Action: 'secretsmanager:GetSecretValue'
                Resource: !GetAtt ApplicationSecret.Arn
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-config-retriever:*'
  LambdaLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-config-retriever'
      RetentionInDays: 7
  LambdaFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn:
      - LambdaExecutionRole
      - LambdaLogGroup
    Properties:
      FunctionName: !Sub '${AWS::StackName}-config-retriever'
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SSM_PARAM_PATH: !Ref AppConfigurationParameter
          SECRET_ARN: !GetAtt ApplicationSecret.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          def lambda_handler(event, context):
              ssm = boto3.client('ssm', region_name=os.environ['AWS_REGION'])
              secrets_manager = boto3.client('secretsmanager', region_name=os.environ['AWS_REGION'])
              
              try:
                  # Retrieve SSM parameter
                  ssm_response = ssm.get_parameter(
                      Name=os.environ['SSM_PARAM_PATH'],
                      WithDecryption=False
                  )
                  ssm_value = ssm_response['Parameter']['Value']
                  
                  # Retrieve secret
                  secret_response = secrets_manager.get_secret_value(
                      SecretId=os.environ['SECRET_ARN']
                  )
                  secret = secret_response['SecretString']
                  
                  logger.info(f"Successfully retrieved SSM parameter and secret")
                  return {
                      'ssm_value': ssm_value,
                      'secret': secret
                  }
              except Exception as e:
                  logger.error(f"Error retrieving parameters: {str(e)}")
                  raise
Outputs:
  SSMParameterName:
    Description: Name of the SSM configuration parameter
    Value: !Ref AppConfigurationParameter
  SecretARN:
    Description: ARN of the application credentials secret
    Value: !GetAtt ApplicationSecret.Arn
  LambdaFunctionName:
    Description: Name of the configuration retrieval Lambda function
    Value: !Ref LambdaFunction
  SecretUsername:
    Description: Predefined username for the application secret
    Value: app_user