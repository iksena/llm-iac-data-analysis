AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template to create a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication for centralized user management."

Parameters:
  UserPoolName:
    Type: String
    Description: "The name of the Cognito User Pool."
    Default: "SecureUserPool"
  InviteEmailSubject:
    Type: String
    Description: "The subject line for the invitation email sent to new users."
    Default: "Welcome to Our Service"
  InviteEmailMessage:
    Type: String
    Description: "The body of the invitation email sent to new users."
    Default: "Your account has been created. Please follow the instructions to set your password."

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: !Ref InviteEmailSubject
          EmailMessage: !Ref InviteEmailMessage
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: "AppClient"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - CUSTOM_AUTH_FLOW_ONLY
        - USER_PASSWORD_AUTH

Outputs:
  CognitoUserPoolId:
    Description: "The ID of the created Cognito User Pool."
    Value: !Ref CognitoUserPool
  CognitoUserPoolClientId:
    Description: "The client ID for the Cognito User Pool Client."
    Value: !Ref CognitoUserPoolClient