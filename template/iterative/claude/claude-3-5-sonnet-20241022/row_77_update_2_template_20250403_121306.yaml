AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table for supporter product data with environment-specific configurations'

Parameters:
  Stage:
    Type: String
    AllowedValues: 
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

  TableNamePrefix:
    Type: String
    Default: SupporterProductData
    Description: Prefix for the DynamoDB table name

  TTLAttributeName:
    Type: String
    Default: expiryDate
    Description: Name of the TTL attribute

  ReadCapacityUnits:
    Type: Number
    Default: 20
    Description: Read capacity units for PROD environment

  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for PROD environment

  MaxWriteCapacityUnits:
    Type: Number
    Default: 500
    Description: Maximum write capacity units for auto scaling

  TargetUtilization:
    Type: Number
    Default: 70
    Description: Target utilization percentage for auto scaling

Conditions:
  IsProd: !Equals [!Ref Stage, PROD]

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TableNamePrefix}-${Stage}
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !If 
        - IsProd
        - PROVISIONED
        - PAY_PER_REQUEST
      ProvisionedThroughput: !If
        - IsProd
        - 
          ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Backup
          Value: Required
        - Key: Application
          Value: SupporterProduct
        - Key: Stage
          Value: !Ref Stage

  ScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAutoScalingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                Resource: !GetAtt DynamoDBTable.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:DeleteAlarms
                Resource: "*"

  WriteScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    DependsOn: DynamoDBTable
    Properties:
      MaxCapacity: !Ref MaxWriteCapacityUnits
      MinCapacity: !Ref WriteCapacityUnits
      ResourceId: !Sub "table/${DynamoDBTable}"
      RoleARN: !GetAtt ScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    DependsOn: WriteScalingTarget
    Properties:
      PolicyName: !Sub ${TableNamePrefix}-${Stage}-WriteAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref TargetUtilization
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn

  BillingMode:
    Description: Table billing mode
    Value: !If [IsProd, 'PROVISIONED', 'PAY_PER_REQUEST']

  WriteCapacitySetting:
    Description: Write capacity configuration
    Value: !If [IsProd, !Sub 'Min: ${WriteCapacityUnits}, Max: ${MaxWriteCapacityUnits}', 'On-Demand']