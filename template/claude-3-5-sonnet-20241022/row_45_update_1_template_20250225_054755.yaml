AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Kinesis Firehose with AWS KMS encryption and CloudWatch error logging'

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}-delivery-stream'
      RetentionInDays: 7

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'FirehoseErrorLogs'

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole

  FirehosePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-firehose-policy
      Roles:
        - !Ref FirehoseRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:PutLogEvents
              - logs:CreateLogStream
            Resource: !Sub ${FirehoseLogGroup.Arn}/*
          - Effect: Allow
            Action:
              - kms:GenerateDataKey
              - kms:Decrypt
            Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/firehose

  DeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseLogStream
      - FirehosePolicy
    Properties:
      DeliveryStreamName: !Sub ${AWS::StackName}-delivery-stream
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub arn:aws:s3:::dummy-bucket
        RoleARN: !GetAtt FirehoseRole.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  FirehoseArn:
    Description: 'ARN of the Kinesis Firehose Delivery Stream'
    Value: !GetAtt DeliveryStream.Arn

  LogGroupArn:
    Description: 'ARN of the CloudWatch Log Group'
    Value: !GetAtt FirehoseLogGroup.Arn

  FirehoseRoleArn:
    Description: 'ARN of the Firehose IAM Role'
    Value: !GetAtt FirehoseRole.Arn