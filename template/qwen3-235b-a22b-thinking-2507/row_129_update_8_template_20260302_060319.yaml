AWSTemplateFormatVersion: '2010-09-09'
Description: Secure AWS Config setup with customizable retention policies and delivery configurations

Parameters:
  CreateNewS3Bucket:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to create a new S3 bucket or use existing
  ExistingS3BucketName:
    Type: String
    Default: ''
    Description: Name of existing S3 bucket (required if CreateNewS3Bucket is false)
  S3KmsKeyArn:
    Type: String
    Default: ''
    Description: KMS key ARN for S3 bucket encryption (optional)
  CreateNewSnsTopic:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to create a new SNS topic or use existing
  ExistingSnsTopicArn:
    Type: String
    Default: ''
    Description: ARN of existing SNS topic (required if CreateNewSnsTopic is false)
  DeliveryFrequency:
    Type: String
    Default: Twelve_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
    Description: Frequency of configuration snapshot delivery
  MaxAgeDays:
    Type: Number
    Default: 2557
    MinValue: 30
    MaxValue: 2557
    Description: Retention period for configuration history in days
  IamPermissionBoundary:
    Type: String
    Default: ''
    Description: IAM permission boundary ARN (optional)

Conditions:
  CreateNewS3BucketCondition: !Equals [!Ref CreateNewS3Bucket, 'true']
  CreateNewSnsTopicCondition: !Equals [!Ref CreateNewSnsTopic, 'true']
  UseKmsEncryption: !Not [!Equals [!Ref S3KmsKeyArn, '']]
  ApplyPermissionBoundary: !Not [!Equals [!Ref IamPermissionBoundary, '']]

Rules:
  ExistingS3BucketNameRequired:
    RuleCondition: !Equals [!Ref CreateNewS3Bucket, 'false']
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: ExistingS3BucketName
                - ''
        AssertDescription: "ExistingS3BucketName must be provided when CreateNewS3Bucket is false"
      - Assert:
          Fn::Or:
            - Fn::And:
                - Fn::Not:
                    Fn::Equals:
                      - Fn::FindInMap: [BucketNameValidation, !Ref ExistingS3BucketName, IsValid]
                      - 'false'
                - Fn::Not:
                    Fn::Equals:
                      - Fn::FindInMap: [BucketNameValidation, !Ref ExistingS3BucketName, LengthValid]
                      - 'false'
        AssertDescription: "ExistingS3BucketName must be a valid S3 bucket name"

  ExistingSnsTopicArnRequired:
    RuleCondition: !Equals [!Ref CreateNewSnsTopic, 'false']
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: ExistingSnsTopicArn
                - ''
        AssertDescription: "ExistingSnsTopicArn must be provided when CreateNewSnsTopic is false"
      - Assert:
          Fn::And:
            - Fn::Equals:
                - Fn::Select: [0, Fn::Split: [':', !Ref ExistingSnsTopicArn]]
                - 'arn'
            - Fn::Equals:
                - Fn::Select: [1, Fn::Split: [':', !Ref ExistingSnsTopicArn]]
                - 'aws'
            - Fn::Equals:
                - Fn::Select: [2, Fn::Split: [':', !Ref ExistingSnsTopicArn]]
                - 'sns'
        AssertDescription: "ExistingSnsTopicArn must be a valid SNS topic ARN"

Mappings:
  BucketNameValidation:
    default:
      IsValid: 'true'
      LengthValid: 'true'

Resources:
  ConfigS3Bucket:
    Condition: CreateNewS3BucketCondition
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub config-bucket-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption: !If
        - UseKmsEncryption
        - ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: aws:kms
                KMSMasterKeyID: !Ref S3KmsKeyArn
        - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: AWSConfig

  ConfigS3BucketPolicy:
    Condition: CreateNewS3BucketCondition
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ConfigS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLRequestsOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${ConfigS3Bucket}'
              - !Sub 'arn:aws:s3:::${ConfigS3Bucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'
          - Sid: AWSConfigPermissions
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${ConfigS3Bucket}/config/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

  ConfigSnsTopic:
    Condition: CreateNewSnsTopicCondition
    Type: AWS::SNS::Topic
    Properties:
      TopicName: aws-config-notifications
      DisplayName: AWS Config Notifications
      Tags:
        - Key: Application
          Value: AWSConfig

  ConfigSnsTopicPolicy:
    Condition: CreateNewSnsTopicCondition
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref ConfigSnsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSConfigSnsPublish
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref ConfigSnsTopic

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSConfigRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [ApplyPermissionBoundary, !Ref IamPermissionBoundary, !Ref AWS::NoValue]
      Policies:
        - PolicyName: ConfigS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetBucketAcl
                Resource:
                  - !If
                    - CreateNewS3BucketCondition
                    - !Sub 'arn:aws:s3:::${ConfigS3Bucket}'
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}'
                  - !If
                    - CreateNewS3BucketCondition
                    - !Sub 'arn:aws:s3:::${ConfigS3Bucket}/config/*'
                    - !Sub 'arn:aws:s3:::${ExistingS3BucketName}/config/*'
              - !If
                - UseKmsEncryption
                - Effect: Allow
                  Action: kms:GenerateDataKey
                  Resource: !Ref S3KmsKeyArn
                - !Ref AWS::NoValue
        - PolicyName: ConfigSnsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !If
                  - CreateNewSnsTopicCondition
                  - !Ref ConfigSnsTopic
                  - !Ref ExistingSnsTopicArn

  ConfigurationRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RoleARN: !GetAtt ConfigRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true

  DeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    DependsOn: ConfigurationRecorder
    Properties:
      Name: default
      S3BucketName: !If
        - CreateNewS3BucketCondition
        - !Ref ConfigS3Bucket
        - !Ref ExistingS3BucketName
      SnsTopicARN: !If
        - CreateNewSnsTopicCondition
        - !Ref ConfigSnsTopic
        - !Ref ExistingSnsTopicArn
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency

  ConfigRetentionLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ConfigRetentionLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [ApplyPermissionBoundary, !Ref IamPermissionBoundary, !Ref AWS::NoValue]
      Policies:
        - PolicyName: ConfigAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:PutDeliveryChannel
                  - config:DescribeDeliveryChannels
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  ConfigRetentionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ConfigRetentionManager
      Handler: index.handler
      Role: !GetAtt ConfigRetentionLambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          def handler(event, context):
              config = boto3.client('config')
              try:
                  request_type = event['RequestType']
                  max_age_days = int(event['ResourceProperties']['MaxAgeDays'])
                  delivery_channel_name = event['ResourceProperties'].get('DeliveryChannelName', 'default')
                  
                  if request_type == 'Delete':
                      return {'Status': 'SUCCESS'}
                  
                  response = config.describe_delivery_channels(
                      DeliveryChannelNames=[delivery_channel_name]
                  )
                  if not response['DeliveryChannels']:
                      raise ValueError("Delivery channel not found")
                  
                  delivery_channel = response['DeliveryChannels'][0]
                  snapshot_props = delivery_channel.get('configSnapshotDeliveryProperties', {})
                  delivery_frequency = snapshot_props.get('deliveryFrequency', 'Twelve_Hours')
                  
                  config.put_delivery_channel(
                      DeliveryChannel={
                          'name': delivery_channel_name,
                          'configSnapshotDeliveryProperties': {
                              'deliveryFrequency': delivery_frequency,
                              'maxAgeDays': max_age_days
                          }
                      }
                  )
                  return {'Status': 'SUCCESS'}
              except Exception as e:
                  return {
                      'Status': 'FAILED',
                      'Reason': str(e)
                  }

  ConfigRetentionCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: DeliveryChannel
    Properties:
      ServiceToken: !GetAtt ConfigRetentionLambda.Arn
      MaxAgeDays: !Ref MaxAgeDays
      DeliveryChannelName: default

Outputs:
  S3BucketName:
    Value: !If
      - CreateNewS3BucketCondition
      - !Ref ConfigS3Bucket
      - !Ref ExistingS3BucketName
    Description: Name of the S3 bucket used for configuration snapshots
  SnsTopicArn:
    Value: !If
      - CreateNewSnsTopicCondition
      - !Ref ConfigSnsTopic
      - !Ref ExistingSnsTopicArn
    Description: ARN of the SNS topic used for notifications
  ConfigRoleArn:
    Value: !GetAtt ConfigRole.Arn
    Description: ARN of the IAM role used by AWS Config
  DeliveryChannelName:
    Value: default
    Description: Name of the AWS Config Delivery Channel
  RetentionLambdaArn:
    Value: !GetAtt ConfigRetentionLambda.Arn
    Description: ARN of the Lambda function managing retention policies