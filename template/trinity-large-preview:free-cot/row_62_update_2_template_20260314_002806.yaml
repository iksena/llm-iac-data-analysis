AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Aurora MySQL Cluster with two db.t3.large instances and custom parameter group'

Parameters:
  DatabaseName:
    Type: String
    Default: aurora_db
    Description: The name of the first database to be created when the cluster is created
  MasterUsername:
    Type: String
    Default: admin
    Description: The master username for the cluster
  MasterUserPassword:
    Type: String
    Default: '{{resolve:secretsmanager:aurora-master-password:SecretString:password}}'
    NoEcho: true
    Description: The master password for the cluster
  EngineVersion:
    Type: String
    Default: '5.7.mysql_aurora.2.07.2'
    Description: Aurora MySQL engine version
  InstanceClass:
    Type: String
    Default: db.t3.large
    Description: The instance class for the database instances
  PubliclyAccessible:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether the database instances are publicly accessible

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Aurora-VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Aurora-Public-Subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Aurora-Public-Subnet-2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: Aurora-DB-Subnet-Group

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: Aurora-Security-Group

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: "UTC"
        sql_mode: "STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO"
      Tags:
        - Key: Name
          Value: Aurora-Parameter-Group

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      DBClusterParameterGroupName: !Ref DBParameterGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'mon:04:00-mon:05:00'
      Port: 3306
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: Aurora-Cluster

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref InstanceClass
      PubliclyAccessible: !Ref PubliclyAccessible
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt SecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      Tags:
        - Key: Name
          Value: Aurora-Instance-1

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref InstanceClass
      PubliclyAccessible: !Ref PubliclyAccessible
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt SecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      Tags:
        - Key: Name
          Value: Aurora-Instance-2

Outputs:
  ClusterEndpoint:
    Description: The cluster endpoint for the Aurora cluster
    Value: !GetAtt DBCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint for the Aurora cluster
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  Instance1Endpoint:
    Description: The endpoint for the first database instance
    Value: !GetAtt DBInstance1.Endpoint.Address
  Instance2Endpoint:
    Description: The endpoint for the second database instance
    Value: !GetAtt DBInstance2.Endpoint.Address