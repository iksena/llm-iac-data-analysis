AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating secure S3 buckets with replication and logging'

Parameters:
  MainBucketName:
    Type: String
    Description: Name for the main S3 bucket
    Default: secure-main-bucket

  ReplicaBucketName:
    Type: String
    Description: Name for the replica S3 bucket
    Default: secure-replica-bucket

  LogBucketName:
    Type: String
    Description: Name for the access logs S3 bucket
    Default: secure-logs-bucket

  ReplicationEnabled:
    Type: String
    Description: Enable replication to the replica bucket
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  ReplicationIsEnabled: !Equals [!Ref ReplicationEnabled, 'true']

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref LogBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 90

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${LogBucket}'
              - !Sub 'arn:aws:s3:::${LogBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ReplicaBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: replica-bucket-logs/

  ReplicaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReplicaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${ReplicaBucket}'
              - !Sub 'arn:aws:s3:::${ReplicaBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  MainBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref MainBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: main-bucket-logs/

  MainBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${MainBucket}'
              - !Sub 'arn:aws:s3:::${MainBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  # Create replication configuration separately to avoid circular dependency
  ReplicationRole:
    Type: AWS::IAM::Role
    Condition: ReplicationIsEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReplicationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetReplicationConfiguration'
                  - 's3:ListBucket'
                Resource: !Sub 'arn:aws:s3:::${MainBucketName}'
              - Effect: Allow
                Action:
                  - 's3:GetObjectVersion'
                  - 's3:GetObjectVersionAcl'
                  - 's3:GetObjectVersionTagging'
                Resource: !Sub 'arn:aws:s3:::${MainBucketName}/*'
              - Effect: Allow
                Action:
                  - 's3:ReplicateObject'
                  - 's3:ReplicateDelete'
                  - 's3:ReplicateTags'
                Resource: !Sub 'arn:aws:s3:::${ReplicaBucketName}/*'

  # Add replication configuration as a separate resource to avoid circular dependency
  MainBucketReplication:
    Type: AWS::S3::BucketReplicationConfiguration
    Condition: ReplicationIsEnabled
    DependsOn: 
      - MainBucketPolicy
      - ReplicaBucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      Role: !GetAtt ReplicationRole.Arn
      Rules:
        - Status: Enabled
          Id: ReplicateEverything
          Prefix: ''
          Destination:
            Bucket: !Sub 'arn:aws:s3:::${ReplicaBucketName}'

Outputs:
  MainBucketName:
    Description: Name of the main secure bucket
    Value: !Ref MainBucket

  MainBucketARN:
    Description: ARN of the main secure bucket
    Value: !GetAtt MainBucket.Arn

  ReplicaBucketName:
    Description: Name of the replica bucket
    Value: !Ref ReplicaBucket

  ReplicaBucketARN:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn

  LogBucketName:
    Description: Name of the logging bucket
    Value: !Ref LogBucket

  LogBucketARN:
    Description: ARN of the logging bucket
    Value: !GetAtt LogBucket.Arn