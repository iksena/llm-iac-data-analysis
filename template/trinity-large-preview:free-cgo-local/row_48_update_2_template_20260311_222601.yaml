AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GlueRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptBucket}'
                  - !Sub 'arn:aws:s3:::${GlueScriptBucket}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub 'GlueETLJob-${AWS::StackName}'
      Command:
        Name: pythonshell
        PythonVersion: '3'
        ScriptLocation: !Sub 's3://${GlueScriptBucket}/gue_scripts/sample_convert.py'
      DefaultArguments:
        '--enable-glue-datacatalog': 'true'
        '--job-bookmark-option': 'job-bookmark-enable'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      NumberOfWorkers: 2
      WorkerType: G.1X
      Role: !GetAtt GlueIAMRole.Arn
      Timeout: 60

Outputs:
  GlueJobName:
    Description: Name of the created Glue ETL Job
    Value: !Ref GlueETLJob
  ScriptBucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptBucket