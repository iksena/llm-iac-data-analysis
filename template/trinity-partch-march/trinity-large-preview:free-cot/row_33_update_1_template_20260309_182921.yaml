AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for EC2 instances with read-only access to IAM metadata

Resources:
  EC2ReadOnlyIAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read-only IAM permissions for EC2 instances
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'

  EC2ReadOnlyIAMRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole1
      Description: EC2 role with read-only IAM access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref EC2ReadOnlyIAMPolicy

  EC2ReadOnlyIAMRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole2
      Description: EC2 role with read-only IAM access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref EC2ReadOnlyIAMPolicy