AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure static website with S3, CloudFront CDN, and automated content management'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique). Leave blank for auto-generated name.
    Default: ''
  
  DefaultTTL:
    Type: Number
    Description: Default TTL for CloudFront cache in seconds
    Default: 60
    MinValue: 0
  
  PriceClass:
    Type: String
    Description: CloudFront distribution price class
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Conditions:
  CreateBucketWithGeneratedName: !Equals [!Ref BucketName, '']

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !If [CreateBucketWithGeneratedName, !Ref 'AWS::NoValue', !Ref BucketName]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-OAC'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${S3Bucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-CachePolicy'
        DefaultTTL: !Ref DefaultTTL
        MinTTL: 0
        MaxTTL: 31536000  # 1 year in seconds
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt S3Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: !Ref PriceClass
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CloudFrontCachePolicy
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub '${S3Bucket.Arn}/*'

  BucketInitializerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          s3 = boto3.client('s3')
          
          def handler(event, context):
              logger.info('Received event: %s', json.dumps(event))
              
              request_type = event['RequestType']
              properties = event['ResourceProperties']
              bucket_name = properties['BucketName']
              
              try:
                  if request_type == 'Create' or request_type == 'Update':
                      logger.info('Initializing bucket %s', bucket_name)
                      
                      # Create a simple index.html file
                      index_content = """
                      <!DOCTYPE html>
                      <html>
                      <head>
                          <title>Welcome to your S3 Static Website</title>
                          <style>
                              body {
                                  font-family: Arial, sans-serif;
                                  margin: 40px;
                                  line-height: 1.6;
                              }
                              h1 {
                                  color: #333;
                              }
                          </style>
                      </head>
                      <body>
                          <h1>Welcome to your S3 Static Website!</h1>
                          <p>This page was created by CloudFormation as a default landing page.</p>
                          <p>Replace this content with your own website files.</p>
                      </body>
                      </html>
                      """
                      
                      # Create error.html file
                      error_content = """
                      <!DOCTYPE html>
                      <html>
                      <head>
                          <title>Error - Page Not Found</title>
                          <style>
                              body {
                                  font-family: Arial, sans-serif;
                                  margin: 40px;
                                  line-height: 1.6;
                              }
                              h1 {
                                  color: #cc0000;
                              }
                          </style>
                      </head>
                      <body>
                          <h1>Error - Page Not Found</h1>
                          <p>The page you are looking for does not exist.</p>
                          <p><a href="/">Return to homepage</a></p>
                      </body>
                      </html>
                      """
                      
                      # Upload the files to S3
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body=index_content,
                          ContentType='text/html'
                      )
                      
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='error.html',
                          Body=error_content,
                          ContentType='text/html'
                      )
                      
                      logger.info('Successfully initialized bucket %s', bucket_name)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      
                  elif request_type == 'Delete':
                      logger.info('Emptying bucket %s for clean deletion', bucket_name)
                      
                      # List and delete all objects in the bucket
                      try:
                          objects = s3.list_objects_v2(Bucket=bucket_name)
                          if 'Contents' in objects:
                              delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects['Contents']]}
                              s3.delete_objects(Bucket=bucket_name, Delete=delete_keys)
                              
                              # Check if there are more objects to delete (pagination)
                              while objects['IsTruncated']:
                                  objects = s3.list_objects_v2(
                                      Bucket=bucket_name,
                                      ContinuationToken=objects['NextContinuationToken']
                                  )
                                  if 'Contents' in objects:
                                      delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects['Contents']]}
                                      s3.delete_objects(Bucket=bucket_name, Delete=delete_keys)
                          
                          logger.info('Successfully emptied bucket %s', bucket_name)
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      except Exception as e:
                          logger.error('Error emptying bucket: %s', str(e))
                          cfnresponse.send(event, context, cfnresponse.FAILED, {})
                  else:
                      logger.info('Unsupported request type %s', request_type)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  BucketInitializer:
    Type: Custom::BucketInitializer
    DependsOn: S3BucketPolicy
    Properties:
      ServiceToken: !GetAtt BucketInitializerFunction.Arn
      BucketName: !Ref S3Bucket

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  CloudFrontDistributionId:
    Description: ID of the CloudFront distribution
    Value: !Ref CloudFrontDistribution
  
  CloudFrontDomainName:
    Description: Domain name of the CloudFront distribution
    Value: !GetAtt CloudFrontDistribution.DomainName
  
  WebsiteURL:
    Description: URL to access the website via CloudFront
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'