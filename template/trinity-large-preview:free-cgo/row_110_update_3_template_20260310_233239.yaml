AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for cross-account private API Gateway integrated with Lambda, custom domain, and VPC endpoint access control

Parameters:
  VpcEndpointId:
    Type: String
    Description: VPC endpoint ID that is allowed to access the private API Gateway
    Default: vpce-1234567890abcdef0
  CustomDomainName:
    Type: String
    Description: Custom domain name for the API Gateway
    Default: api.example.com
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: prod

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from private API Gateway!'
              }

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateApiGateway
      ProtocolType: HTTP
      RouteSelectionExpression: '$request.method $request.path'

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations'

  Route:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /'
      Target: !Sub 'integrations/${Integration}'

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: !Ref StageName
      AutoDeploy: true

  DomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref ApiGateway
      DomainName: !Ref DomainName
      Stage: !Ref StageName
      ApiMappingKey: ''

Outputs:
  ApiGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub 'https://${CustomDomainName}'
  LambdaArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn