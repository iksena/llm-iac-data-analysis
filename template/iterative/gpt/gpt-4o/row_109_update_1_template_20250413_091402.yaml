AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeIAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: EventBridgeInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'execute-api:Invoke'
                Resource: '*'

  DeadLetterQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'EventBridgeDLQ'

  EventBus:
    Type: 'AWS::Events::EventBus'
    Properties:
      Name: 'CustomEventBus'

  ApiDestination:
    Type: 'AWS::Events::ApiDestination'
    Properties:
      Name: 'MongoDBApiDestination'
      ConnectionArn: !GetAtt ApiConnection.Arn
      InvocationEndpoint: 'https://www.testanu.com'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  ApiConnection:
    Type: 'AWS::Events::Connection'
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'test_name'
          ApiKeyValue: 'test_value'
      Name: 'MongoDBConnection'

  EventRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Name: 'RouteToMongoDB'
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - 'custom.myApp'
      Targets:
        - Id: 'MongoDBTarget'
          Arn: !Ref ApiDestination
          RoleArn: !GetAtt EventBridgeIAMRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the EventBridge Event Bus'
    Value: !GetAtt EventBus.Arn

  DeadLetterQueueUrl:
    Description: 'URL of the SQS Dead Letter Queue'
    Value: !Ref DeadLetterQueue

  EventBridgeIAMRoleArn:
    Description: 'ARN of the IAM Role for EventBridge'
    Value: !GetAtt EventBridgeIAMRole.Arn
```