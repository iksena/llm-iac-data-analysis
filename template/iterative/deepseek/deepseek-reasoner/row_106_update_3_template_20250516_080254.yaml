AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Events:
              - 's3:ObjectCreated:*'
            TopicArn: !Ref SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt S3Bucket.Arn
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'

Outputs:
  S3BucketName:
    Value: !Ref S3Bucket
  SNSTopicArn:
    Value: !Ref SNSTopic