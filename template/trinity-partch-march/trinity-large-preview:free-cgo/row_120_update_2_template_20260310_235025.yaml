AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-00000000000000000
  BatchJobQueueName:
    Type: String
    Default: OrderProcessingQueue
  BatchJobDefinitionName:
    Type: String
    Default: OrderProcessingJob
  BatchImage:
    Type: String
    Default: amazon/aws-cli
  BatchMemory:
    Type: Number
    Default: 2048
  BatchVcpus:
    Type: Number
    Default: 2
  EventBridgePipeName:
    Type: String
    Default: OrderCreatedToBatchPipe

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - optimal
        Subnets: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
      ServiceRole: !GetAtt BatchServiceRole.Arn

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      JobQueueName: !Ref BatchJobQueueName

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref BatchImage
        Command:
          - "echo"
          - "Processing order"
        Memory: !Ref BatchMemory
        Vcpus: !Ref BatchVcpus
      JobDefinitionName: !Ref BatchJobDefinitionName

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: !GetAtt BatchJobQueue.Arn

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Ref EventBridgePipeName
      EventPattern:
        source:
          - "aws.sqs"
        detail:
          queueName:
            - !GetAtt SQSQueue.QueueName
          eventType:
            - "OrderCreated"
      Targets:
        - Arn: !GetAtt BatchJobQueue.Arn
          Id: BatchTarget
          RoleArn: !GetAtt EventBridgePipeRole.Arn

Outputs:
  SQSQueueURL:
    Description: SQS Queue URL
    Value: !Ref SQSQueue
  BatchJobQueueARN:
    Description: Batch Job Queue ARN
    Value: !GetAtt BatchJobQueue.Arn
  EventBridgeRuleName:
    Description: EventBridge Rule Name
    Value: !Ref EventBridgeRule