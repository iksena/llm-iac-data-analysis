AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge rule with SNS topic

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EventBridgeDemoTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to capture events from demo.cli source
      EventPattern:
        source:
          - demo.cli
      Targets:
        - Arn: !Ref SNSTopic
          Id: EventBridgeTarget

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

Outputs:
  SNSTopicARN:
    Description: ARN of the created SNS topic
    Value: !Ref SNSTopic