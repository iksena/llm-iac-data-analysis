AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create and manage an AWS account-wide IAM password policy with customizable security requirements.

Parameters:
  MinPasswordLength:
    Type: Number
    Default: 14
    MinValue: 8
    Description: Minimum password length for IAM users
  RequireUppercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require at least one uppercase character in passwords
  RequireLowercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require at least one lowercase character in passwords
  RequireNumbers:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require at least one number in passwords
  RequireSymbols:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Require at least one non-alphanumeric character in passwords
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Number of days before passwords expire
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    Description: Number of previous passwords to prevent reuse
  AllowUsersToChangePassword:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Allow IAM users to change their own passwords

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  PasswordPolicyManager:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              client = boto3.client('iam')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      client.update_account_password_policy(
                          MinimumPasswordLength=event['ResourceProperties']['MinPasswordLength'],
                          RequireUppercase=event['ResourceProperties']['RequireUppercase'],
                          RequireLowercase=event['ResourceProperties']['RequireLowercase'],
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'],
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'],
                          MaxPasswordAge=event['ResourceProperties']['MaxPasswordAge'],
                          PasswordReusePrevention=event['ResourceProperties']['PasswordReusePrevention'],
                          AllowUsersToChangePassword=event['ResourceProperties']['AllowUsersToChangePassword']
                      )
                  elif event['RequestType'] == 'Delete':
                      client.update_account_password_policy(
                          MinimumPasswordLength=8,
                          RequireUppercase=False,
                          RequireLowercase=False,
                          RequireNumbers=False,
                          RequireSymbols=False,
                          MaxPasswordAge=0,
                          PasswordReusePrevention=0,
                          AllowUsersToChangePassword=False
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref PasswordPolicyManager
      Principal: 'events.amazonaws.com'

  LambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:UpdateAccountPasswordPolicy'
              - 'iam:DeleteAccountPasswordPolicy'
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  TestUser:
    Type: AWS::IAM::User
    Properties:
      UserName: TestUser

  TestUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref TestUser
      Status: Active

Outputs:
  PasswordPolicyStatus:
    Value: 'Active'
    Description: IAM Password Policy is active