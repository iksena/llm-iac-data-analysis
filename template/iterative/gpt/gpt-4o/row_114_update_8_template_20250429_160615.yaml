AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create a B2B Data Interchange (B2BI) pipeline
  for transforming EDI X12_214 documents into JSON format.

Parameters:
  BusinessContactName:
    Type: String
    Description: The name of the business contact.
    Default: "John Doe"
  BusinessContactEmail:
    Type: String
    Description: The email of the business contact.
    Default: "contact@example.com"
  BusinessContactPhone:
    Type: String
    Description: The phone number of the business contact.
    Default: "+1234567890"
  InputBucketName:
    Type: String
    Description: The name of the S3 bucket to receive raw EDI files.
    Default: "input-bucket-example"
  OutputBucketName:
    Type: String
    Description: The name of the S3 bucket to store transformed JSON data.
    Default: "output-bucket-example"

Resources:
  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join 
        - "-"
        - - !Ref InputBucketName
          - !Ref "AWS::AccountId"
          - !Ref "AWS::Region"

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join 
        - "-"
        - - !Ref OutputBucketName
          - !Ref "AWS::AccountId"
          - !Ref "AWS::Region"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${InputS3Bucket}
                  - !Sub arn:aws:s3:::${InputS3Bucket}/*
                  - !Sub arn:aws:s3:::${OutputS3Bucket}
                  - !Sub arn:aws:s3:::${OutputS3Bucket}/*

  EDITransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  # Placeholder for EDI to JSON transformation logic
                  # Example: Read from input bucket, transform, and write to output bucket
                  print(f"Processing file {key} from bucket {bucket}")
              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation complete')
              }
      Runtime: python3.12
      Timeout: 60
      Environment:
        Variables:
          INPUT_BUCKET: !Ref InputS3Bucket
          OUTPUT_BUCKET: !Ref OutputS3Bucket
          BUSINESS_CONTACT_NAME: !Ref BusinessContactName
          BUSINESS_CONTACT_EMAIL: !Ref BusinessContactEmail
          BUSINESS_CONTACT_PHONE: !Ref BusinessContactPhone

Outputs:
  InputBucketName:
    Description: The name of the input S3 bucket.
    Value: !Ref InputS3Bucket

  OutputBucketName:
    Description: The name of the output S3 bucket.
    Value: !Ref OutputS3Bucket

  LambdaFunctionARN:
    Description: The ARN of the EDI Transformer Lambda function.
    Value: !GetAtt EDITransformerFunction.Arn