AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready CloudFormation template creating a single ENI with primary/secondary private IPs and two associated EIPs in a public subnet for multi-public IP support on one EC2 instance.'

Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: !Select [0, !GetAZs '']
    Description: 'Availability Zone for the ENI and subnet (defaults to first AZ in region).'
  VPCCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: 'CIDR block for the VPC.'
    AllowedPattern: '^(10\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.0)/(1[6-9]|2[0-8])$'
    ConstraintDescription: 'Must be a valid CIDR like 10.0.0.0/16.'
  SubnetCidrBlock:
    Type: String
    Default: 10.0.1.0/24
    Description: 'CIDR block for the public subnet.'
    AllowedPattern: '^(10\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.0)/(24|25|26|27|28|29|30)$'
    ConstraintDescription: 'Must be a valid /24-/30 CIDR like 10.0.1.0/24.'
  PrimaryPrivateIPAddress:
    Type: String
    Default: 10.0.1.10
    Description: 'Primary private IPv4 address for the ENI (must be in SubnetCidrBlock).'
  SecondaryPrivateIPAddress:
    Type: String
    Default: 10.0.1.11
    Description: 'Secondary private IPv4 address for the ENI (must be in SubnetCidrBlock, different from primary).'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnet'

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-RouteTable'

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
    DependsOn: GatewayAttachment

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for ENI allowing SSH inbound and all outbound.'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ENI-SG'

  MyENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PublicSubnet
      Description: !Sub 'ENI with primary ${PrimaryPrivateIPAddress} and secondary ${SecondaryPrivateIPAddress} private IPs for multi-public IP EC2 support'
      PrivateIpAddress: !Ref PrimaryPrivateIPAddress
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref SecondaryPrivateIPAddress
      SecurityGroups:
        - !Ref SecurityGroup
    DependsOn:
      - SubnetRouteTableAssociation
      - SecurityGroup

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-EIP1-Primary'

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-EIP2-Secondary'

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Ref PrimaryPrivateIPAddress
    DependsOn:
      - MyENI
      - EIP1

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Ref SecondaryPrivateIPAddress
    DependsOn:
      - MyENI
      - EIP2

Outputs:
  NetworkInterfaceId:
    Description: 'ID of the Elastic Network Interface (attach to your EC2 instance)'
    Value: !Ref MyENI
    Export:
      Name: !Sub '${AWS::StackName}-ENIID'

  PrimaryPrivateIPAddress:
    Description: 'Primary private IP of the ENI'
    Value: !GetAtt MyENI.PrimaryPrivateIpAddress
    Export:
      Name: !Sub '${AWS::StackName}-PrimaryPrivateIP'

  SecondaryPrivateIPAddress:
    Description: 'Secondary private IP of the ENI'
    Value: !Ref SecondaryPrivateIPAddress
    Export:
      Name: !Sub '${AWS::StackName}-SecondaryPrivateIP'

  EIP1PublicIPAddress:
    Description: 'Public IP of the first EIP (associated to primary private IP)'
    Value: !Ref EIP1
    Export:
      Name: !Sub '${AWS::StackName}-EIP1PublicIP'

  EIP1AllocationId:
    Description: 'Allocation ID of the first EIP'
    Value: !GetAtt EIP1.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-EIP1AllocId'

  EIP2PublicIPAddress:
    Description: 'Public IP of the second EIP (associated to secondary private IP)'
    Value: !Ref EIP2
    Export:
      Name: !Sub '${AWS::StackName}-EIP2PublicIP'

  EIP2AllocationId:
    Description: 'Allocation ID of the second EIP'
    Value: !GetAtt EIP2.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-EIP2AllocId'

  SecurityGroupId:
    Description: 'ID of the Security Group attached to the ENI'
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SGID'

  VPCId:
    Description: 'ID of the VPC'
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCID'

  SubnetId:
    Description: 'ID of the public subnet'
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub '${AWS::StackName}-SubnetID'

  AvailabilityZone:
    Description: 'Availability Zone used'
    Value: !Ref AvailabilityZone
    Export:
      Name: !Sub '${AWS::StackName}-AZ'