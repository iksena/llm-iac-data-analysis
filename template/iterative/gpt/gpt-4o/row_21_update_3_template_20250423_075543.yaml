AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon Timestream database and four tables with configurable retention policies.

Parameters:
  MemoryRetentionHours:
    Type: Number
    Default: 24
    Description: The duration in hours for which data must be stored in the memory store.
    MinValue: 1
    MaxValue: 8766

  MagneticRetentionDays:
    Type: Number
    Default: 7
    Description: The duration in days for which data must be stored in the magnetic store.
    MinValue: 1
    MaxValue: 36500

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: poc-timestream-db

  TimestreamTable01:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

  TimestreamTable02:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: 0

  TimestreamTable03:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 1
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

  TimestreamTable04:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays

Outputs:
  TimestreamDatabaseName:
    Description: The name of the Timestream database.
    Value: !Ref TimestreamDatabase

  TimestreamTable01Name:
    Description: The name of the first Timestream table.
    Value: !Ref TimestreamTable01

  TimestreamTable02Name:
    Description: The name of the second Timestream table.
    Value: !Ref TimestreamTable02

  TimestreamTable03Name:
    Description: The name of the third Timestream table.
    Value: !Ref TimestreamTable03

  TimestreamTable04Name:
    Description: The name of the fourth Timestream table.
    Value: !Ref TimestreamTable04