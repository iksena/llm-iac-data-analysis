AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline routing messages from IoT Core to SQS via SNS

Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  IoTTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: IoTDeviceDataTopic
      TopicName: IoTDeviceDataTopic
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  TopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt IoTDataQueue.Arn
      TopicArn: !Ref IoTTopic
      RawMessageDelivery: true

  IoTDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IoTTopic

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: RouteDeviceDataToSNS
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTTopic
              RoleArn: !GetAtt IoTRole.Arn
        RuleDisabled: false
        AwsIotSqlVersion: '2016-03-23'

  IoTRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTPublishToSNS
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTTopic
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue receiving IoT messages
    Value: !Ref IoTDataQueue
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref IoTTopic
  IoTRuleARN:
    Description: ARN of the IoT Rule
    Value: !GetAtt IoTRule.Arn