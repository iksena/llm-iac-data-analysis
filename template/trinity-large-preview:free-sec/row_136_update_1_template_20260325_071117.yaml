AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  EnableBoundaryEnforcement:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Toggle to enable/disable strict permission boundary enforcement
  PermissionBoundaryName:
    Type: String
    Default: DeveloperBoundaryPolicy
    Description: Name of the permission boundary policy
  TeamPrefix:
    Type: String
    Default: MyTeam
    Description: Required naming prefix for developer-created IAM resources

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EnableBoundaryEnforcement
    Properties:
      ManagedPolicyName: !Ref PermissionBoundaryName
      Description: Default permission boundary restricting to S3 and read-only IAM
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
            Resource: '*'

  DeveloperIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperGovernanceRole
      Description: IAM role with configurable permission boundaries for developer governance
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      PermissionsBoundary: !If [EnableBoundaryEnforcement, !GetAtt PermissionBoundaryPolicy.Arn, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - !If [EnableBoundaryEnforcement, !Ref 'AWS::NoValue', 'arn:aws:iam::aws:policy/IAMFullAccess']
      Policies:
        - PolicyName: DeveloperGovernancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:AttachRolePolicy
                  - iam:TagRole
                  - iam:TagPolicy
                Resource: '*'
                Condition:
                  StringEquals:
                    'iam:ResourceTag/Owner': 'true'
                  StringLike:
                    'iam:RoleArn': !Sub 'arn:aws:iam::${AWS::AccountId}:role/${TeamPrefix}*'
                    'iam:PolicyArn': !Sub 'arn:aws:iam::${AWS::AccountId}:policy/${TeamPrefix}*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:CreatePolicy
                  - iam:CreatePolicyVersion
                  - iam:AttachRolePolicy
                  - iam:TagRole
                  - iam:TagPolicy
                Resource: '*'
                Condition:
                  StringEquals:
                    'iam:PermissionsBoundary': !If [EnableBoundaryEnforcement, !GetAtt PermissionBoundaryPolicy.Arn, !Ref 'AWS::NoValue']

Outputs:
  DeveloperIAMRoleArn:
    Description: ARN of the Developer Governance IAM Role
    Value: !GetAtt DeveloperIAMRole.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy (if enabled)
    Value: !If [EnableBoundaryEnforcement, !GetAtt PermissionBoundaryPolicy.Arn, !Ref 'AWS::NoValue']