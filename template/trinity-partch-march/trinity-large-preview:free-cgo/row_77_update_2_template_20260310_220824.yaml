AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for supporter product data with environment-specific configurations

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      BillingMode:
        Fn::If:
          - IsProdStage
          - PROVISIONED
          - PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: backup
          Value: true
      ProvisionedThroughput:
        Fn::If:
          - IsProdStage
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue

  SupporterProductDataTableWriteScaling:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProdStage
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Join
        - '/'
        - - table
          - !Ref SupporterProductDataTable
      RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/dynamodb.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_DynamoDBTable'
      ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
      ServiceNamespace: dynamodb

  SupporterProductDataTableWriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProdStage
    Properties:
      PolicyName: WriteCapacityScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref SupporterProductDataTableWriteScaling
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        DisableScaleIn: false

Conditions:
  IsProdStage:
    Fn::Equals:
      - !Ref Stage
      - PROD

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SupporterProductDataTable