AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance deployment with SSM-based Nginx installation automation'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: 
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for EC2 instance
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for EC2 instance
  Environment:
    Type: String
    Default: Production
    AllowedValues: [Development, Staging, Production]
    Description: Environment name for resource tagging

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Nginx instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-sg
        - Key: Environment
          Value: !Ref Environment

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
      Policies:
        - PolicyName: SSMAutomationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAutomationExecution
                  - ssm:GetAutomationExecution
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ec2-role
        - Key: Environment
          Value: !Ref Environment

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  SSMAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole
      Policies:
        - PolicyName: SSMAutomationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-automation-role
        - Key: Environment
          Value: !Ref Environment

  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-nginx
        - Key: Environment
          Value: !Ref Environment
        - Key: nginx
          Value: Yes
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          amazon-linux-extras install -y nginx1
          systemctl start nginx
          systemctl enable nginx

  NginxInstallAutomation:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: 'Install and configure Nginx with validation'
        parameters:
          InstanceId:
            type: String
            description: Target EC2 instance
        mainSteps:
          - name: updateOS
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - "{{ InstanceId }}"
              Parameters:
                commands:
                  - yum update -y
                timeoutSeconds: 600
          - name: waitForUpdate
            action: aws:sleep
            inputs:
              Duration: PT1M
          - name: installNginx
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - "{{ InstanceId }}"
              Parameters:
                commands:
                  - amazon-linux-extras install -y nginx1
                  - systemctl start nginx
                  - systemctl enable nginx
                timeoutSeconds: 300
          - name: validateNginx
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - "{{ InstanceId }}"
              Parameters:
                commands:
                  - curl -s http://localhost | grep "Welcome to nginx" || exit 1
                timeoutSeconds: 60

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref NginxInstance
  PublicDNS:
    Description: Instance Public DNS
    Value: !GetAtt NginxInstance.PublicDnsName
  AutomationDocument:
    Description: SSM Automation Document Name
    Value: !Ref NginxInstallAutomation
  SecurityGroup:
    Description: Security Group ID
    Value: !Ref EC2SecurityGroup