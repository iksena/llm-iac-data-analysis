AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted EFS file system in us-east-1a Availability Zone with required networking resources

Parameters:
  KMSKeyDescription:
    Type: String
    Default: 'Key for EFS encryption'
    Description: 'Description for the KMS key'
  PerformanceMode:
    Type: String
    Default: 'generalPurpose'
    AllowedValues:
      - 'generalPurpose'
      - 'maxIO'
    Description: 'Performance mode of the file system'
  VpcCidrBlock:
    Type: String
    Description: 'CIDR block for the VPC (e.g., 10.0.0.0/16)'
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: 'Must be a valid CIDR block of the form x.x.x.x/x'
  SubnetCidrBlock:
    Type: String
    Description: 'CIDR block for the subnet (e.g., 10.0.1.0/24)'
    Default: '10.0.1.0/24'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: 'Must be a valid CIDR block of the form x.x.x.x/x'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'EFS-VPC'

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: 'us-east-1a'
      Tags:
        - Key: Name
          Value: 'EFS-Subnet-us-east-1a'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: 'EFS-IGW'

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: 'EFS-RouteTable'

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EFSKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KMSKeyDescription
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-default-1'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: 'alias/efs-encryption-key'
      TargetKeyId: !Ref EFSKMSKey

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for EFS mount target'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidrBlock

  EncryptedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !GetAtt EFSKMSKey.Arn
      PerformanceMode: !Ref PerformanceMode
      AvailabilityZoneName: 'us-east-1a'
      FileSystemTags:
        - Key: Name
          Value: 'EncryptedOneZoneEFS'

  MountTarget:
    Type: AWS::EFS::MountTarget
    DependsOn: 
      - GatewayAttachment
      - SubnetRouteTableAssociation
    Properties:
      FileSystemId: !Ref EncryptedFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !GetAtt MountTargetSecurityGroup.GroupId

Outputs:
  FileSystemId:
    Description: 'The ID of the created EFS file system'
    Value: !Ref EncryptedFileSystem
  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt EFSKMSKey.Arn
  MountTargetSecurityGroupId:
    Description: 'Security Group ID for EFS access'
    Value: !Ref MountTargetSecurityGroup
  VpcId:
    Description: 'ID of the created VPC'
    Value: !Ref VPC
  SubnetId:
    Description: 'ID of the created subnet in us-east-1a'
    Value: !Ref Subnet