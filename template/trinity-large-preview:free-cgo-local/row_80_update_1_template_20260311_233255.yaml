AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /bedrock/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockFoundationModelsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'
        - PolicyName: LambdaIntegrationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: '*'
        - PolicyName: BedrockAgentScope
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:*
                Resource: arn:aws:bedrock:*:*:agent/*
                Condition:
                  StringEquals:
                    bedrock:AgentId: '*'
Outputs:
  BedrockAgentRoleArn:
    Description: ARN of the Bedrock Agent IAM Role
    Value: !GetAtt BedrockAgentRole.Arn