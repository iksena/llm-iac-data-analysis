AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Grants iOS application read/write access to ios-apps.sagebridge.org bucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BucketOperations
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: arn:aws:s3:::ios-apps.sagebridge.org
          - Sid: ObjectOperations
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: arn:aws:s3:::ios-apps.sagebridge.org/*
  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Explicitly denies destructive DynamoDB operations to prevent accidental data loss'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PreventDeletion
            Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: '*'
  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Blocks destructive RDS operations to safeguard databases and backups'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PreventDeletion
            Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
            Resource: '*'
Outputs:
  S3PolicyArn:
    Description: 'ARN of the S3 access policy'
    Value: !Ref S3AccessPolicy
  DynamoDBPolicyArn:
    Description: 'ARN of the DynamoDB protection policy'
    Value: !Ref DynamoDBProtectionPolicy
  RDSPolicyArn:
    Description: 'ARN of the RDS protection policy'
    Value: !Ref RDSProtectionPolicy