AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EventBus:
    Type: 'AWS::Events::EventBus'
    Properties:
      Name: default

  Connection:
    Type: 'AWS::Events::Connection'
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value

  ApiDestination:
    Type: 'AWS::Events::ApiDestination'
    Properties:
      ConnectionArn: !GetAtt Connection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST

  Role:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:InvokeApiDestination'
                Resource: !GetAtt ApiDestination.Arn

  DeadLetterQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3