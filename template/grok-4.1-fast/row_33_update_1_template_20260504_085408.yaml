AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates two IAM roles for EC2 instances with read-only access to IAM resources using IAMReadOnlyAccess managed policy.'

Parameters:
  RoleName1:
    Type: String
    Default: EC2-IAM-ReadOnly-Role-1
    Description: Name for the first EC2 IAM read-only role.
  RoleName2:
    Type: String
    Default: EC2-IAM-ReadOnly-Role-2
    Description: Name for the second EC2 IAM read-only role.
  Environment:
    Type: String
    Default: Production
    Description: Environment tag for the roles.
    AllowedValues:
      - Development
      - Staging
      - Production

Resources:
  EC2IAMReadOnlyRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName1
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Tags:
        - Key: Environment
          Value: !Ref Environment

  EC2IAMReadOnlyRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  EC2IAMReadOnlyRole1Arn:
    Description: ARN of the first EC2 IAM read-only role
    Value: !GetAtt EC2IAMReadOnlyRole1.Arn
    Export:
      Name: !Sub '${AWS::StackName}-Role1Arn'

  EC2IAMReadOnlyRole1Name:
    Description: Name of the first EC2 IAM read-only role
    Value: !Ref EC2IAMReadOnlyRole1
    Export:
      Name: !Sub '${AWS::StackName}-Role1Name'

  EC2IAMReadOnlyRole2Arn:
    Description: ARN of the second EC2 IAM read-only role
    Value: !GetAtt EC2IAMReadOnlyRole2.Arn
    Export:
      Name: !Sub '${AWS::StackName}-Role2Arn'

  EC2IAMReadOnlyRole2Name:
    Description: Name of the second EC2 IAM read-only role
    Value: !Ref EC2IAMReadOnlyRole2
    Export:
      Name: !Sub '${AWS::StackName}-Role2Name'