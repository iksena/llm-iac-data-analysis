AWSTemplateFormatVersion: '2010-09-09'
Description: EFS Shared Storage with Multi-AZ EC2 Instances and Monitoring
Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  SubnetACidr:
    Type: String
    Default: 10.0.1.0/24
  SubnetBCidr:
    Type: String
    Default: 10.0.2.0/24
  InstanceType:
    Type: String
    Default: t3.micro
  KeyName:
    Type: String
    Default: ''
  EFSPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues: [generalPurpose, maxIO]
  EFSThroughputMode:
    Type: String
    Default: provisioned
    AllowedValues: [provisioned, bursting]
  ProvisionedThroughput:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 1024
  AlarmEmail:
    Type: String
    Default: ''

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-west-2:
      AMI: ami-0d70546e43a941d70

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  IsProvisioned: !Equals [!Ref EFSThroughputMode, 'provisioned']
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref RouteTable

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref RouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 Instance Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - !If
          - HasKeyName
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
          - !Ref "AWS::NoValue"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt EC2SecurityGroup.GroupId

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref EFSPerformanceMode
      ThroughputMode: !Ref EFSThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisioned, !Ref ProvisionedThroughput, !Ref "AWS::NoValue"]

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetA
      SecurityGroups: [!GetAtt EFSSecurityGroup.GroupId]

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetB
      SecurityGroups: [!GetAtt EFSSecurityGroup.GroupId]

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: [sts:AssumeRole]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EFSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt EFSFileSystem.Arn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2InstanceRole]

  EC2InstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds: [!GetAtt EC2SecurityGroup.GroupId]
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs -o tls ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs; do sleep 10; done
          echo "${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs efs _netdev,tls 0 0" >> /etc/fstab
          /opt/aws/bin/cfn-signal --exit-code $? --stack ${AWS::StackName} --resource EC2InstanceA --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1

  EC2InstanceB:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SubnetId: !Ref PublicSubnetB
      SecurityGroupIds: [!GetAtt EC2SecurityGroup.GroupId]
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs -o tls ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs; do sleep 10; done
          echo "${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs efs _netdev,tls 0 0" >> /etc/fstab
          /opt/aws/bin/cfn-signal --exit-code $? --stack ${AWS::StackName} --resource EC2InstanceB --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        !If
        - HasAlarmEmail
        - - Protocol: email
            Endpoint: !Ref AlarmEmail
        - !Ref "AWS::NoValue"

  HighIOAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'EFS I/O Limit >= 95%'
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 95
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions: [!Ref AlarmTopic]

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProvisioned
    Properties:
      AlarmDescription: 'EFS Throughput >= 80%'
      Namespace: AWS/EFS
      MetricName: ThroughputPercentage
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions: [!Ref AlarmTopic]

Outputs:
  EFSID:
    Value: !Ref EFSFileSystem
  InstanceAIP:
    Value: !GetAtt EC2InstanceA.PublicIp
  InstanceBIP:
    Value: !GetAtt EC2InstanceB.PublicIp
  AlarmTopicARN:
    Value: !Ref AlarmTopic
  IOAlarmName:
    Value: !Ref HighIOAlarm
  ThroughputAlarmName:
    Value: !If [IsProvisioned, !Ref ThroughputAlarm, "Not applicable (bursting mode)"]