AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Kinesis Firehose with encryption and CloudWatch logging

Resources:
  FirehoseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'firehose-delivery-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FirehoseBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FirehoseBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetBucketLocation
            Resource:
              - !GetAtt FirehoseBucket.Arn
              - !Sub '${FirehoseBucket.Arn}/*'

  FirehoseDeliveryStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseDeliveryStreamPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt FirehoseBucket.Arn
                  - !Sub '${FirehoseBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*:log-stream:*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource:
                  - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
                Condition:
                  StringLike:
                    kms:ViaService: !Sub 's3.${AWS::Region}.amazonaws.com'

  FirehoseErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/kinesisfirehose/FirehoseDeliveryErrors
      RetentionInDays: 7

  FirehoseErrorLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseErrorLogGroup
      LogStreamName: FirehoseDeliveryErrorStream

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: FirehoseDeliveryStream
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt FirehoseBucket.Arn
        RoleARN: !GetAtt FirehoseDeliveryStreamRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/s3'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseErrorLogGroup
          LogStreamName: !Ref FirehoseErrorLogStream
        ErrorOutputPrefix: 'errors/'
        Prefix: 'data/'
        ProcessingConfiguration:
          Enabled: false

Outputs:
  FirehoseDeliveryStreamARN:
    Description: ARN of the created Kinesis Firehose Delivery Stream
    Value: !GetAtt FirehoseDeliveryStream.Arn
  FirehoseBucketName:
    Description: Name of the S3 bucket for Firehose delivery
    Value: !Ref FirehoseBucket
  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group for error logging
    Value: !Ref FirehoseErrorLogGroup