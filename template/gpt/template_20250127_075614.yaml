AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted One Zone EFS file system in us-east-1a

Parameters:
  FileSystemName:
    Type: String
    Description: Name of the EFS file system
    Default: MyEncryptedEFS

Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      FileSystemTags:
        - Key: Name
          Value: !Ref FileSystemName
      Encrypted: true
      PerformanceMode: GeneralPurpose
      ProvisionedThroughputInMibps: 0
      LifecyclePolicies:
        - TransitionToIa: AFTER_30_DAYS
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: efs:ClientMount
            Resource: '*'
      AvailabilityZoneName: us-east-1a
      ThroughputMode: Bursting

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref MyEFSFileSystem
  FileSystemDNSName:
    Description: The DNS name of the EFS file system
    Value: !GetAtt MyEFSFileSystem.DnsName