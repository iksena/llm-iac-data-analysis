AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create a basic AWS SQS queue with minimal configuration.

Resources:
  BasicSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: BasicSQSQueue

Outputs:
  QueueURL:
    Description: "The URL of the created SQS Queue"
    Value: !Ref BasicSQSQueue