AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates IAM role and instance profile for EC2 with CloudWatch and SSM integration'

Resources:
  EC2ServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2ServiceRole'
      Description: 'IAM role for EC2 instances with CloudWatch and SSM integration'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy'
      Path: '/'
      Tags:
        - Key: Purpose
          Value: EC2-CloudWatch-SSM-Integration

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-EC2InstanceProfile'
      Path: '/'
      Roles:
        - !Ref EC2ServiceRole

Outputs:
  RoleARN:
    Description: 'ARN of the created IAM Role'
    Value: !GetAtt EC2ServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'

  InstanceProfileARN:
    Description: 'ARN of the created Instance Profile'
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileARN'

  InstanceProfileName:
    Description: 'Name of the created Instance Profile'
    Value: !Ref EC2InstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileName'