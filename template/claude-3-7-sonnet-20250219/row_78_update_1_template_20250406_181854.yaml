AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating an EC2 IP Address Manager (IPAM) with public and private scopes'

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: 'IPAM for managing IP address allocation'
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: MainIPAM
        - Key: Environment
          Value: Production

  IPAMPrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      Description: 'Private scope for internal IP address management'
      IpamId: !Ref IPAM
      Tags:
        - Key: Name
          Value: PrivateScope
        - Key: Type
          Value: Private

  IPAMPublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      Description: 'Public scope for external IP address management'
      IpamId: !Ref IPAM
      Tags:
        - Key: Name
          Value: PublicScope
        - Key: Type
          Value: Public

Outputs:
  IPAMID:
    Description: 'ID of the created IPAM'
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAMID'

  IPAMARN:
    Description: 'ARN of the created IPAM'
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMARN'

  IPAMPrivateScopeID:
    Description: 'ID of the private scope'
    Value: !Ref IPAMPrivateScope
    Export:
      Name: !Sub '${AWS::StackName}-IPAMPrivateScopeID'

  IPAMPublicScopeID:
    Description: 'ID of the public scope'
    Value: !Ref IPAMPublicScope
    Export:
      Name: !Sub '${AWS::StackName}-IPAMPublicScopeID'