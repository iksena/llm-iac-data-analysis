AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard for Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'Client VPN Endpoint ID to monitor'
    AllowedPattern: '^cvpn-endpoint-[a-zA-Z0-9]+$'
    ConstraintDescription: 'Must be a valid Client VPN Endpoint ID starting with cvpn-endpoint-'
    MinLength: 1
    Default: 'cvpn-endpoint-0123456789abcdef0'
    
  DashboardName:
    Type: String
    Description: 'Name for the CloudWatch Dashboard'
    Default: 'ClientVPNMonitoring'
    AllowedPattern: '[a-zA-Z0-9_-]+'
    ConstraintDescription: 'Dashboard name can only contain alphanumeric characters, underscores, and hyphens'

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub '{"widgets":[{"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{"view":"timeSeries","stacked":false,"metrics":[["AWS/ClientVPN","ActiveConnectionsCount","Endpoint","${VPNEndpointId}"]],"period":300,"stat":"Average","region":"${AWS::Region}","title":"Active VPN Connections"}},{"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{"view":"timeSeries","stacked":false,"metrics":[["AWS/ClientVPN","ConnectionAttemptCount","Endpoint","${VPNEndpointId}"]],"period":300,"stat":"Sum","region":"${AWS::Region}","title":"Connection Attempts"}},{"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{"view":"timeSeries","stacked":true,"metrics":[["AWS/ClientVPN","IngressBytes","Endpoint","${VPNEndpointId}"],["AWS/ClientVPN","EgressBytes","Endpoint","${VPNEndpointId}"]],"period":300,"stat":"Sum","region":"${AWS::Region}","title":"Data Transfer (Bytes)"}},{"type":"metric","x":12,"y":6,"width":12,"height":6,"properties":{"view":"timeSeries","stacked":false,"metrics":[["AWS/ClientVPN","AuthenticationFailures","Endpoint","${VPNEndpointId}"]],"period":300,"stat":"Sum","region":"${AWS::Region}","title":"Authentication Failures"}}]}'

Outputs:
  DashboardURL:
    Description: 'URL for the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'