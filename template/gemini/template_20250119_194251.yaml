AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Analytics resources for data processing.
Resources:
  IoTAnalyticsChannel:
    Type: AWS::IoTAnalytics::Channel
    Properties:
      ChannelName: MyChannel
      ChannelStorage:
        ServiceManagedS3: {}
  IoTAnalyticsDatastore:
    Type: AWS::IoTAnalytics::Datastore
    Properties:
      DatastoreName: MyDatastore
      DatastoreStorage:
        ServiceManagedS3: {}
      RetentionPeriod:
        NumberOfDays: 30
  IoTAnalyticsPipeline:
    Type: AWS::IoTAnalytics::Pipeline
    Properties:
      PipelineName: MyPipeline
      PipelineActivities:
      - Channel:
          Name: ChannelActivity
          Next: DatastoreActivity
          ChannelName: !Ref IoTAnalyticsChannel
      - Datastore:
          Name: DatastoreActivity
          DatastoreName: !Ref IoTAnalyticsDatastore
      - AddAttributes:
          Name: AddAttributesActivity
          Attributes:
          - Name: timestamp
            Value: $$.timestamp
      - QueryAction:
          Name: QueryAction
          SqlQuery: "SELECT * FROM MyDatastore"
          Next: DatastoreActivity2
      - Datastore:
          Name: DatastoreActivity2
          DatastoreName: !Ref IoTAnalyticsDatastore2
  IoTAnalyticsDataset:
    Type: AWS::IoTAnalytics::Dataset
    Properties:
      DatasetDescription: MyDataset
      DatasetName: MyDataset
      ContentVersioningConfiguration:
        ContentType: DELTA
      RetentionPeriod:
        NumberOfDays: 30
      LateDataRules:
        - RuleName: LateDataRule
          Action: DROP
      Triggers:
      - DatasetName: MyDataset
        Schedule: cron(0 12 * * ? *)
  IoTAnalyticsDatastore2:
    Type: AWS::IoTAnalytics::Datastore
    Properties:
      DatastoreName: MyDatastore2
      DatastoreStorage:
        ServiceManagedS3: {}
      RetentionPeriod:
        NumberOfDays: 30

Outputs:
  ChannelArn:
    Value: !GetAtt IoTAnalyticsChannel.Arn
    Description: ARN of the created channel
  DatastoreArn:
    Value: !GetAtt IoTAnalyticsDatastore.Arn
    Description: ARN of the created datastore
  PipelineArn:
    Value: !GetAtt IoTAnalyticsPipeline.Arn
    Description: ARN of the created pipeline
  DatasetArn:
    Value: !GetAtt IoTAnalyticsDataset.Arn
    Description: ARN of the created dataset

