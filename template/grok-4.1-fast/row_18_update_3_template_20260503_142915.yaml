AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB Streams to EventBridge integration via Pipes. Filters events where NewImage.avatarUrl.S ends with .png and routes to custom EventBus with custom Source/DetailType.'

Parameters:
  TableName:
    Type: String
    Default: AvatarTable
    Description: Name of the DynamoDB table.
  BusName:
    Type: String
    Default: AvatarEventBus
    Description: Name of the custom EventBridge bus.
  PipeName:
    Type: String
    Default: AvatarDdbPipe
    Description: Name of the EventBridge Pipe.
  EventSource:
    Type: String
    Default: dynamodb.avatar.png
    Description: Source value for routed events.
  EventDetailType:
    Type: String
    Default: UserAvatarPngUpdated
    Description: DetailType value for routed events.

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref BusName

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListShards
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt EventBus.Arn

  PipesPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref PipeName
      RoleArn: !GetAtt PipeRole.Arn
      SourceArn: !GetAtt DynamoDBTable.StreamArn
      TargetArn: !GetAtt EventBus.Arn
      FilterCriteria:
        Filter:
          Pattern: '{"dynamodb":[{"NewImage":[{"avatarUrl":[{"S":[{"suffix":".png"}]}]}]}]}'
      TargetParameters:
        InputTransformer:
          InputTemplate: !Sub '{"Source": "${EventSource}", "DetailType": "${EventDetailType}", "Detail": "<aws.events.event>"}'

Outputs:
  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  DynamoDBTableStreamArn:
    Description: ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusArn:
    Description: ARN of the EventBridge bus
    Value: !GetAtt EventBus.Arn
  EventBusName:
    Description: Name of the EventBridge bus
    Value: !Ref EventBus
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !Ref PipesPipe
  PipeName:
    Description: Name of the EventBridge Pipe
    Value: !GetAtt PipesPipe.Name
  PipeRoleArn:
    Description: ARN of the IAM role used by the Pipe
    Value: !GetAtt PipeRole.Arn