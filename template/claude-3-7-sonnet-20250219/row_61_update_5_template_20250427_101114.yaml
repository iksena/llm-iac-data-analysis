AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a private Route 53 Hosted Zone for internal DNS management within a VPC'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-VPC"

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: example.com.
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref AWS::Region

  WwwRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: www.example.com.
      Type: CNAME
      TTL: '300'
      ResourceRecords:
        - example.com.

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !Ref VPC
  
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
  
  DomainName:
    Description: The domain name
    Value: example.com
  
  WwwDomainName:
    Description: The www subdomain
    Value: www.example.com