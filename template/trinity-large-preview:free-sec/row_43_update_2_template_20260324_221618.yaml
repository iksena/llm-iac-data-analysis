AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with KMS Encryption, Lifecycle Management, and Tagging

Parameters:
  ProjectTag:
    Type: String
    Default: MyProject
  EnvironmentTag:
    Type: String
    Default: Production
  OwnerTag:
    Type: String
    Default: CloudTeam

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for S3 Bucket Encryption
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow S3 Service Principal
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Enabled: true
      EnableKeyRotation: true

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/s3-encryption-key
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !GetAtt KMSKey.Arn
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: NoncurrentVersionTransition
            Status: Enabled
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
            NoncurrentVersionExpiration:
              NewerNoncurrentVersions: 0
              NoncurrentDays: 365
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket
  KMSKeyId:
    Description: KMS Key ID
    Value: !Ref KMSKey
  KMSKeyAlias:
    Description: KMS Key Alias
    Value: !Ref KMSKeyAlias