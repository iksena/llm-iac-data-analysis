AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Timestream database and tables with configurable retention policies

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: poc-database
      KmsKeyId: alias/aws/timestream
    Metadata:
      Effect: encrypted

  TableBatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-01-batch-write
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 7
    Metadata:
      Effect: versioned
    DependsOn: TimestreamDatabase

  TableOlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-02-older-records-memonly
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 0
    Metadata:
      Effect: versioned
    DependsOn: TimestreamDatabase

  TableOlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-03-older-records-magnetic
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 30
    Metadata:
      Effect: versioned
    DependsOn: TimestreamDatabase

  TableCommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-04-common-attributes
      DatabaseName: !Ref TimestreamDatabase
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 7
    Metadata:
      Effect: versioned
    DependsOn: TimestreamDatabase

Metadata:
  Invariants:
    - All tables must be created within the same database
    - Retention policies must be configurable per table
    - Database must be encrypted at rest
    - Tables must support versioning for data integrity