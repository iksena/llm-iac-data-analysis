AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Logs Insights queries and dashboard for Client VPN usage reporting.
Resources:
  ClientVPNLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/cvpn/ClientVPNLogs
      RetentionInDays: 30
  ClientVPNInsightsQueries:
    Type: AWS::CloudWatch::LogInsights
    Properties:
      LogGroupName: !Ref ClientVPNLogGroup
      Queries:
        - QueryString: fields @timestamp, @message | filter @message like /Connection established/ | stats count(*) as Connections, avg(connectionDuration) as AvgConnectionDuration by @timestamp | sort @timestamp asc
          Name: ConnectionCountsAndDurations
        - QueryString: fields @timestamp, username, authenticationMethod, bytesSent, bytesReceived | filter @message like /Connection established/ | stats sum(bytesSent) as TotalBytesSent, sum(bytesReceived) as TotalBytesReceived by username, authenticationMethod | sort TotalBytesSent desc
          Name: DataTransferByUserAndAuth
        - QueryString: fields @timestamp, username, authenticationMethod, connectionDuration | filter @message like /Connection established/ | stats count(*) as Connections by authenticationMethod | sort Connections desc
          Name: ConnectionCountsByAuthMethod
        - QueryString: fields @timestamp, username, connectionDuration | stats count(*) as ConnectionCount, avg(connectionDuration) as AvgConnectionDuration by username | sort ConnectionCount desc
          Name: ConnectionCountsAndDurationsByUser
  ClientVPNUsageDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNUsageDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# Client VPN Usage Report"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["FILL_IN_METRICS_HERE"]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "FILL_IN_REGION_HERE"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["FILL_IN_METRICS_HERE"]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "FILL_IN_REGION_HERE"
              }
            }
          ]
        }

Metadata:
  TemplateVersion: 1.0
Outputs:
  DashboardName:
    Value: !Ref ClientVPNUsageDashboard
    Description: Name of the created CloudWatch dashboard.
  LogGroupName:
    Value: !Ref ClientVPNLogGroup
    Description: Name of the Client VPN log group.

