AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
        - AttributeName: TicketSales
          AttributeType: N
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        Enabled: true
      PointInTimeRecoverySpecification:
        Enabled: true
      TableName: ArtistConcertTicketSales
      Tags:
        - Key: Environment
          Value: Production
        - Key: Application
          Value: MusicAnalytics