AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready Aurora MySQL cluster with CloudWatch Logs integration and multi-AZ deployment'

Parameters:
  DBSubnetIds:
    Description: 'Comma-separated list of two public subnet IDs for the DB cluster'
    Type: CommaDelimitedList
    MinLength: 2
    MaxLength: 2
  VPCSecurityGroupIds:
    Description: 'Comma-separated list of VPC security group IDs for the DB cluster'
    Type: CommaDelimitedList
    MinLength: 1
  MasterUsername:
    Description: 'Master database username'
    Type: String
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
    Default: 'admin'
  MasterUserSecretName:
    Description: 'Name of the secret in AWS Secrets Manager containing the master password'
    Type: String
    MinLength: 1
    Default: 'AuroraMasterSecret'
  EngineVersion:
    Description: 'Aurora MySQL engine version'
    Type: String
    Default: '5.7.mysql_aurora.2.10.2'
    AllowedValues:
      - '5.7.mysql_aurora.2.10.2'
      - '8.0.mysql_aurora.3.04.0'
  DBInstanceClass:
    Description: 'DB instance type for cluster members'
    Type: String
    Default: 'db.t3.large'
    AllowedValues:
      - 'db.t3.large'
      - 'db.r5.large'
      - 'db.r5.xlarge'
  DatabaseName:
    Description: 'Optional database name to create'
    Type: String
    Default: 'mydb'
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9_]+'

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora MySQL cluster'
      SubnetIds: !Ref DBSubnetIds

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${MasterUserSecretName}:SecretString:password}}'
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      DatabaseName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds: !Ref VPCSecurityGroupIds
      BackupRetentionPeriod: 7
      EnableCloudwatchLogsExports:
        - error
      DBClusterIdentifier: !Sub '${AWS::StackName}Cluster'
      Port: 3306
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: false
      DeletionProtection: true
      CopyTagsToSnapshot: true
      PreferredBackupWindow: '05:00-06:00'
      PreferredMaintenanceWindow: 'sun:07:00-sun:08:00'

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}Instance1'
      AvailabilityZone: !Select [0, !GetAZs '']
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: !Ref VPCSecurityGroupIds

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}Instance2'
      AvailabilityZone: !Select [1, !GetAZs '']
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: !Ref VPCSecurityGroupIds

Outputs:
  ClusterEndpoint:
    Description: 'Aurora cluster endpoint for write operations'
    Value: !GetAtt DBCluster.Endpoint.Address
  ClusterReadEndpoint:
    Description: 'Aurora cluster reader endpoint for read operations'
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  Instance1Endpoint:
    Description: 'Direct endpoint for first DB instance'
    Value: !GetAtt DBInstance1.Endpoint.Address
  Instance2Endpoint:
    Description: 'Direct endpoint for second DB instance'
    Value: !GetAtt DBInstance2.Endpoint.Address
  CloudWatchLogGroup:
    Description: 'CloudWatch Logs group name for error logs'
    Value: !Sub 'aws/rds/cluster/${DBCluster}/error'