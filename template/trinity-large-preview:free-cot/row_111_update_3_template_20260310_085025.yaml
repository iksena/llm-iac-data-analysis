AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to DataDog Log Forwarding Integration

Parameters:
  DataDogApiKey:
    Type: String
    Description: DataDog API key for authentication
    Default: testanu
    NoEcho: true

Resources:
  # IAM Role for EventBridge API Destination
  EventBridgeToDataDogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeToDataDogRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationPublishAccess

  # SSM Parameter for DataDog API Key
  DataDogApiParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /DataDog/LogForwarding/ApiKey
      Type: String
      Value: !Ref DataDogApiKey

  # EventBridge Event Bus
  MyDataDogAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppEventBus

  # API Destination Connection
  DataDogApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: !Sub '{{resolve:ssm-secure:/DataDog/LogForwarding/ApiKey}}'

  # API Destination
  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogApiConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  # Dead-Letter SQS Queue
  DataDogLogForwardingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogLogForwardingDLQ
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30

  # Event Rule to route events to DataDog
  DataDogLogForwardingRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyDataDogAppEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          Id: DataDogLogForwardingTarget
          RoleArn: !GetAtt EventBridgeToDataDogRole.Arn
          SqsParameters:
            MessageGroupId: DataDogLogForwardingGroup
          DeadLetterConfig:
            Arn: !GetAtt DataDogLogForwardingDLQ.Arn

Outputs:
  EventBusName:
    Description: EventBridge Event Bus Name
    Value: !Ref MyDataDogAppEventBus
  ApiDestinationArn:
    Description: DataDog API Destination ARN
    Value: !GetAtt DataDogApiDestination.Arn
  DeadLetterQueueUrl:
    Description: Dead-Letter Queue URL
    Value: !Ref DataDogLogForwardingDLQ