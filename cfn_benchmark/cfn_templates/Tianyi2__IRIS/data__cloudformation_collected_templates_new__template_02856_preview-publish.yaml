      Threshold: 90
      Tags:
      - Key: Name
        Value: Critical Preview Publish CPU Utilization Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm