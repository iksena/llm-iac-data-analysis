AWSTemplateFormatVersion: '2010-09-09'
Description: AppSync GraphQL API with Lambda backend for pet inventory service

Parameters:
  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: Lambda runtime version

Resources:
  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda Function
  PetInventoryLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              pets = [
                  {"id": "1", "name": "Max", "type": "Dog"},
                  {"id": "2", "name": "Bella", "type": "Cat"},
                  {"id": "3", "name": "Charlie", "type": "Bird"}
              ]
              return {
                  "statusCode": 200,
                  "body": pets
              }

  # AppSync GraphQL API
  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY

  # AppSync DataSource (Lambda)
  PetShopDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetInventoryLambda
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetInventoryLambda.Arn

  # AppSync Lambda Invocation Role
  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppSyncInvokeFullAccess

  # AppSync Resolver for getPets query
  PetShopResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetShopDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

  # Lambda Permission for AppSync
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PetInventoryLambda.Arn
      Principal: appsync.amazonaws.com
      SourceArn: !Join
        - ""
        - - "arn:aws:appsync:"
          - !Ref AWS::Region
          - ":"
          - !Ref AWS::AccountId
          - ":apis/"
          - !GetAtt PetShopAPI.ApiId
          - "/types/Query/fields/getPets"

Outputs:
  ApiId:
    Description: AppSync API ID
    Value: !GetAtt PetShopAPI.ApiId
  ApiKey:
    Description: AppSync API Key
    Value: !GetAtt PetShopAPI.ApiKey