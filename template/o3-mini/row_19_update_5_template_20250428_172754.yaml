AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to deploy an Amazon EventBridge configuration that routes custom events
  from a dedicated Event Bus to an external HTTPS API endpoint using an API Destination secured by an API key.

Parameters:
  ApiKeyValue:
    Description: API key for authenticating requests to the external API endpoint.
    Type: String
    NoEcho: true

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  APIConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "x-api-key"
          ApiKeyValue: !Ref ApiKeyValue

  APIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Description: API Destination for routing events to the external HTTPS endpoint.
      ConnectionArn: !GetAtt APIConnection.Arn
      InvocationEndpoint: "https://webhook.site/testtest"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  EventsInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: "events:InvokeApiDestination"
                Resource: !GetAtt APIDestination.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to route custom events from the custom event bus to the API destination.
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "custom.myapp"
      Targets:
        - Id: ApiDestinationTarget
          Arn: !GetAtt APIDestination.Arn
          RoleArn: !GetAtt EventsInvocationRole.Arn

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge event bus.
    Value: !Ref CustomEventBus
  APIConnectionArn:
    Description: ARN of the EventBridge Connection.
    Value: !GetAtt APIConnection.Arn
  APIDestinationArn:
    Description: ARN of the API Destination.
    Value: !GetAtt APIDestination.Arn
  InvocationRoleArn:
    Description: ARN of the IAM Role used for API destination invocations.
    Value: !GetAtt EventsInvocationRole.Arn