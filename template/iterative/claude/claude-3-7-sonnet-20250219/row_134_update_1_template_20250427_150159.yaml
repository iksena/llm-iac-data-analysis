AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a basic AWS Lambda function with CloudWatch Logs permissions'

Parameters:
  NodejsRuntime:
    Type: String
    Default: 'nodejs18.x'
    AllowedValues:
      - 'nodejs16.x'
      - 'nodejs18.x'
      - 'nodejs20.x'
    Description: The runtime version for the Lambda function

  FunctionName:
    Type: String
    Default: 'BasicLambdaFunction'
    Description: Name of the Lambda function

  MemorySize:
    Type: Number
    Default: 128
    MinValue: 128
    MaxValue: 10240
    Description: Memory size for the Lambda function in MB

  Timeout:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 900
    Description: Timeout for the Lambda function in seconds

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: /
      RoleName: !Sub "${FunctionName}-ExecutionRole"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref NodejsRuntime
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      Code:
        ZipFile: |
          exports.handler = async (event, context) => {
            try {
              // Log the event details
              console.log('Event received:', JSON.stringify(event, null, 2));
              
              // Extract a value from the input or provide a default
              const inputValue = event.key || 'No input key provided';
              
              // Log the extracted value
              console.log('Extracted value:', inputValue);
              
              // Return a response
              const response = {
                statusCode: 200,
                body: JSON.stringify({
                  message: 'Lambda function executed successfully',
                  input: inputValue
                })
              };
              
              return response;
            } catch (error) {
              // Log any errors
              console.error('Error:', error);
              
              // Return an error response
              return {
                statusCode: 500,
                body: JSON.stringify({
                  message: 'Error executing Lambda function',
                  error: error.message
                })
              };
            }
          }

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn

  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction

  LambdaRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn