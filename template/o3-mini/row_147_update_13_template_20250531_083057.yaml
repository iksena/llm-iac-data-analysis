AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a serverless slot machine web application.
  This template provisions an S3 bucket for static website hosting (with public read access via website configuration),
  two Lambda functions (one for simulating slot spins and one for deploying website assets via a custom resource),
  a Cognito Identity Pool for anonymous access, and associated IAM roles and policies.
  NOTE: Ensure that your account and bucket settings allow public read access for website hosting.

Resources:
  S3StaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "slot-machine-web-assets-${AWS::Region}-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  SlotMachineLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "SlotMachineLambdaExecutionRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaLoggingPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  SlotMachineLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "SlotMachineFunction-${AWS::StackName}"
      Handler: index.lambda_handler
      Role: !GetAtt SlotMachineLambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 10
      Code:
        ZipFile: |
          import json, random
          
          def lambda_handler(event, context):
              symbols = ["Cherry", "Lemon", "Bell", "Seven"]
              result = [random.choice(symbols) for _ in range(3)]
              win = (result[0] == result[1] == result[2])
              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "result": result,
                      "win": win
                  })
              }

  WebsiteSetupLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "WebsiteSetupLambdaExecutionRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: WebsiteSetupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: 
                  Fn::Join:
                    - ""
                    - - "arn:aws:s3:::"
                      - !Ref S3StaticBucket
                      - "/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  WebsiteSetupLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "WebsiteSetupFunction-${AWS::StackName}"
      Handler: index.lambda_handler
      Role: !GetAtt WebsiteSetupLambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib3
          import boto3
          import urllib.request
          
          SUCCESS = "SUCCESS"
          FAILED = "FAILED"
          
          def send(event, context, responseStatus, responseData, physicalResourceId=None, noEcho=False):
              responseUrl = event['ResponseURL']
              responseBody = {
                  'Status': responseStatus,
                  'Reason': 'See CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physicalResourceId or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'NoEcho': noEcho,
                  'Data': responseData
              }
              json_responseBody = json.dumps(responseBody)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_responseBody))
              }
              http = urllib3.PoolManager()
              http.request('PUT', responseUrl, body=json_responseBody, headers=headers)
          
          def lambda_handler(event, context):
              responseData = {}
              try:
                  request_type = event.get('RequestType')
                  if request_type == 'Delete':
                      send(event, context, SUCCESS, responseData)
                      return
                  if request_type in ['Create', 'Update']:
                      # Simulation: Download the pre-built ZIP file containing website assets.
                      zip_url = "https://example.com/slotmachine_assets.zip"
                      local_zip = "/tmp/slotmachine_assets.zip"
                      urllib.request.urlretrieve(zip_url, local_zip)
                      
                      # Create a simple index.html with embedded configuration.
                      bucket_name = event['ResourceProperties']['BucketName']
                      cognito_id = event['ResourceProperties']['CognitoIdentityPoolId']
                      region = event['ResourceProperties']['Region']
                      index_content = (
                          "<html>\n"
                          "  <head><title>Slot Machine</title></head>\n"
                          "  <body>\n"
                          "    <h1>Welcome to the Slot Machine</h1>\n"
                          "    <script>\n"
                          "      window.cognitoIdentityPoolId = '{0}';\n"
                          "      window.awsRegion = '{1}';\n"
                          "    </script>\n"
                          "  </body>\n"
                          "</html>\n"
                      ).format(cognito_id, region)
                      s3 = boto3.client('s3')
                      s3.put_object(Bucket=bucket_name, Key="index.html", Body=index_content, ACL="public-read")
                  send(event, context, SUCCESS, responseData)
              except Exception as e:
                  responseData = {'Error': str(e)}
                  send(event, context, FAILED, responseData)

  WebsiteDeploymentCustomResource:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt WebsiteSetupLambdaFunction.Arn
      BucketName: !Ref S3StaticBucket
      CognitoIdentityPoolId: !Ref SlotMachineCognitoIdentityPool
      Region: !Ref AWS::Region

  SlotMachineCognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "SlotMachineIdentityPool-${AWS::StackName}"
      AllowUnauthenticatedIdentities: true

  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "CognitoUnauthRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: 
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref SlotMachineCognitoIdentityPool
              ForAnyValue:StringLike:
                "cognito-identity.amazonaws.com:amr": "unauthenticated"
      Policies:
        - PolicyName: CognitoInvokeLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambdaFunction.Arn

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref SlotMachineCognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

Outputs:
  WebsiteURL:
    Description: "URL for the static website hosted on S3."
    Value: !GetAtt S3StaticBucket.WebsiteURL
  CognitoIdentityPoolId:
    Description: "Cognito Identity Pool ID for anonymous user access."
    Value: !Ref SlotMachineCognitoIdentityPool
  SlotMachineLambdaArn:
    Description: "ARN of the Slot Machine Lambda Function."
    Value: !GetAtt SlotMachineLambdaFunction.Arn