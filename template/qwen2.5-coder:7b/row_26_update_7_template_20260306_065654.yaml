AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  ProjectName:
    Type: String
    Description: The name of the project
  Environment:
    Type: String
    Description: The environment (e.g., dev, prod)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-bucket
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBusArn: !GetAtt EventBridgeEventBus.Arn

  EventBridgeEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-event-bus

  SNS:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${Environment}-topic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeEventBus
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Arn: !Ref SNS
          Id: SNS

Outputs:
  S3BucketName:
    Description: The name of the S3 bucket
    Value: !Ref S3Bucket

  SNSTopicArn:
    Description: The ARN of the SNS topic
    Value: !Ref SNS

  EventBridgeRuleArn:
    Description: The ARN of the EventBridge rule
    Value: !Ref EventBridgeRule