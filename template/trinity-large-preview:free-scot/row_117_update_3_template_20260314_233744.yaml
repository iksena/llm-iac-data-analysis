AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  TableName:
    Type: String
    Default: OrdersTable

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TableName: !Ref TableName
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  DynamoDBStream:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt DynamoDBTable.StreamArn
      FunctionName: !GetAtt LambdaFunction.Arn
      StartingPosition: LATEST

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          eventbridge = boto3.client('eventbridge')

          def handler(event, context):
              for record in event['Records']:
                  eventName = record['eventName']
                  if eventName in ['INSERT', 'MODIFY']:
                      detail = {
                          'eventName': eventName,
                          'tableName': record['eventSourceARN'].split('/')[1],
                          'item': record['dynamodb'].get('NewImage') or record['dynamodb'].get('OldImage')
                      }
                      try:
                          response = eventbridge.put_events(
                              Entries=[
                                  {
                                      'Source': 'dynamodb.stream',
                                      'DetailType': eventName,
                                      'Detail': json.dumps(detail),
                                      'EventBusName': 'default'
                                  }
                              ]
                          )
                      except ClientError as e:
                          print(f"Error sending event to EventBridge: {e}")
      Runtime: python3.12
      Timeout: 30

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonDynamoDBReadOnlyAccess
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess

Outputs:
  DynamoDBStreamArn:
    Value: !GetAtt DynamoDBTable.StreamArn