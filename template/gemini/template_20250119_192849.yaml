AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an Aurora RDS instance, DMS instance, S3 bucket, and DMS task for data migration.
Resources:
  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.t3.medium
      Engine: aurora-mysql
      MasterUsername: myuser
      MasterUserPassword: MySecretPassword!
      DBName: mydb
      VpcSecurityGroupIds: !Ref VPCSecurityGroup
      DeletionProtection: false
      EngineVersion: 2.08
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  VPCSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all inbound traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 3306
        ToPort: 3306
        CidrIp: 0.0.0.0/0
  S3Bucket:
    Type: AWS::S3::Bucket
  DMSInstance:
    Type: AWS::DMS::ReplicationInstance
    Properties:
      AllocatedStorage: 200
      EngineVersion: 3.4.6
      ReplicationInstanceClass: dms.t2.medium
      VpcSecurityGroupIds:
      - !Ref VPCSecurityGroup
      PubliclyAccessible: false
      SubnetGroupName: !Ref SubnetGroup
  SubnetGroup:
    Type: AWS::DMS::ReplicationSubnetGroup
    Properties:
      SubnetIds:
      - !Ref Subnet
      Description: Subnet group for DMS instance
      ReplicationSubnetGroupIdentifier: DMSSubnetGroup
  DMSTask:
    Type: AWS::DMS::ReplicationTask
    Properties:
      ReplicationInstanceArn: !GetAtt DMSInstance.ReplicationInstanceArn
      ReplicationTaskIdentifier: MyReplicationTask
      SourceEndpointArn: !GetAtt SourceEndpoint.EndpointArn
      TargetEndpointArn: !GetAtt TargetEndpoint.EndpointArn
      MigrationType: full-load-and-cdc
      TableMappings:
        RuleMappings:
        - RuleType: selection
          RuleId: 1
          RuleName: 1
          ObjectLocator:
            SchemaName: mydb
            TableName: mytable
          Selected: true
  SourceEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: SourceEndpoint
      EngineName: aurora-mysql
      EndpointType: source
      Username: myuser
      Password: MySecretPassword!
      DatabaseName: mydb
      ServerName: !GetAtt AuroraInstance.Endpoint.Address
      Port: 3306
  TargetEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: TargetEndpoint
      EndpointType: target
      EngineName: s3
      S3BucketName: !Ref S3Bucket
      ServiceAccessRoleArn: !GetAtt ServiceRole.Arn
  ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: dms.amazonaws.com
          Action: sts:AssumeRole
      Path: /
      Policies:
      - PolicyName: DMSServiceRolePolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:CreateBucket
            - s3:ListBucket
            - s3:PutObject
            - s3:GetObject
            Resource: arn:aws:s3:::*
Outputs:
  AuroraEndpoint:
    Value: !GetAtt AuroraInstance.Endpoint.Address
    Description: Aurora RDS instance endpoint
  S3BucketName:
    Value: !Ref S3Bucket
    Description: S3 bucket name