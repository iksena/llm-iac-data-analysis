AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow for SQS message enrichment with external API data

Parameters:
  LogGroupName:
    Type: String
    Default: EventBridgePipesEnrichmentLogs
  ApiDestinationName:
    Type: String
    Default: ZipCodeApiDestination
  PipeName:
    Type: String
    Default: SqsToApiEnrichmentPipe
  QueueName:
    Type: String
    Default: EnrichmentSourceQueue

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName

  ApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: !Ref ApiDestinationName
      Description: API destination for zip code enrichment
      EndpointConfiguration:
        Uri: https://api.zippopotam.us/us/*
        Method: GET
      InvocationRateLimitPerSecond: 5

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipesRoleForSqs
      Policies:
        - PolicyName: PipesApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn
        - PolicyName: PipesLogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  EnrichmentPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: !Ref PipeName
      Description: Enriches SQS messages with zip code API data and logs results
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SourceQueue.QueueUrl
      Enrichment:
        Type: ApiDestination
        Parameters:
          ApiDestination: !GetAtt ApiDestination.Arn
          RequestParameters:
            PathParameterValues:
              - $.body.zipCode
      Target:
        TargetType: CloudWatchLogs
        TargetParameters:
          LogStreamName: enrichment-logs
          InputTemplate: |-
            {
              "message": {
                "original": $,
                "enriched": $ enrichment.result
              }
            }
      RoleArn: !GetAtt PipesRole.Arn

Outputs:
  QueueUrl:
    Description: SQS Queue URL
    Value: !GetAtt SourceQueue.QueueUrl
  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref LogGroup
  PipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EnrichmentPipe.Arn