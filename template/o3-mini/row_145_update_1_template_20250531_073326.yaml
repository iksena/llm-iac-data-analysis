AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy a secure static website hosted in S3 with CloudFront CDN,
  enforced HTTPS, a custom cache policy, and automated bucket initialization/cleanup using a Lambda custom resource.

Resources:

  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    DeletionPolicy: Delete

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnEncryptedObjectUploads
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${StaticSiteBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: AES256

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: MyS3OAC
        Description: Origin Access Control for secure S3 access via CloudFront
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CustomCachePolicy60Sec
        DefaultTTL: 60
        MinTTL: 60
        MaxTTL: 60
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CloudFrontCachePolicy
        PriceClass: PriceClass_100

  BucketInitLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: BucketInitLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt StaticSiteBucket.Arn
                  - !Sub "${StaticSiteBucket.Arn}/*"

  BucketInitLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt BucketInitLambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              bucket_name = event.get('ResourceProperties', {}).get('BucketName')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      # Create a default index.html file in the bucket if it doesn't exist
                      s3.put_object(Bucket=bucket_name, Key='index.html', Body=b"<html><body><h1>Welcome to the static site</h1></body></html>", ContentType='text/html')
                  elif event['RequestType'] == 'Delete':
                      # List objects and delete them to empty the bucket
                      response = s3.list_objects_v2(Bucket=bucket_name)
                      if 'Contents' in response:
                          delete_keys = [{'Key': obj['Key']} for obj in response['Contents']]
                          s3.delete_objects(Bucket=bucket_name, Delete={'Objects': delete_keys})
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print("Error:", str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Message': str(e)})
                  raise

  BucketInitCustomResource:
    Type: Custom::BucketInit
    DependsOn: [StaticSiteBucket, BucketInitLambda]
    Properties:
      ServiceToken: !GetAtt BucketInitLambda.Arn
      BucketName: !Ref StaticSiteBucket

Outputs:
  CloudFrontDomainName:
    Description: "Domain name of the CloudFront Distribution"
    Value: !GetAtt CloudFrontDistribution.DomainName

  S3BucketName:
    Description: "Name of the S3 bucket hosting the website content"
    Value: !Ref StaticSiteBucket