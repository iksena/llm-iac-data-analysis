AWSTemplateFormatVersion: "2010-09-09"
Description: >
  This CloudFormation template creates an Amazon Aurora MySQL cluster with CloudWatch Logs integration.
  It deploys a multi-AZ Aurora cluster with two publicly accessible db.t3.large instances across two subnets.
  Error log exports to CloudWatch are enabled for monitoring and troubleshooting.

Parameters:
  DBSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: The first public subnet ID for the Aurora cluster.
  DBSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: The second public subnet ID for the Aurora cluster.
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
    Description: The identifier for the Aurora cluster.
  DBName:
    Type: String
    Default: mydatabase
    Description: The database name for the Aurora cluster.
  MasterUsername:
    Type: String
    Description: The master username for the Aurora cluster.
  MasterUserSecretARN:
    Type: String
    Description: >
      The ARN of the AWS Secrets Manager secret that contains the master user password.
      The secret must have a key "password" holding the master password.

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets for Aurora MySQL cluster"
      SubnetIds:
        - !Ref DBSubnet1
        - !Ref DBSubnet2

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.11.6"
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${MasterUserSecretARN}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
    DependsOn:
      - AuroraDBCluster

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
    DependsOn:
      - AuroraDBCluster

Outputs:
  DBClusterEndpoint:
    Description: "Aurora MySQL DB Cluster writer endpoint address"
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  DBReaderEndpoint:
    Description: "Aurora MySQL DB Cluster reader endpoint address"
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address
  DBClusterIdentifierOutput:
    Description: "Aurora DB Cluster Identifier"
    Value: !Ref AuroraDBCluster