AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to manage AWS Security Hub controls by selectively disabling specific compliance checks.

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Set to 'true' to disable CIS Benchmarks controls
  DisableAWSFoundationalSecurityBestPractices:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Set to 'true' to disable AWS Foundational Security Best Practices controls
  PermissionsBoundaryArn:
    Type: String
    Default: ''
    Description: ARN of the IAM permissions boundary to use for the Lambda role
  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
    Description: Number of days to retain CloudWatch Logs for the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'SecurityHubControlManagerRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateStandardsControl
                  - securityhub:DescribeStandardsControls
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'SecurityHubControlManager-${AWS::StackName}'
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          DISABLE_CIS_CONTROLS: !Ref DisableCIS140Controls
          DISABLE_AWS_FOUNDATIONAL: !Ref DisableAWSFoundationalSecurityBestPractices
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError
          import os

          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')
              disable_cis = os.environ.get('DISABLE_CIS_CONTROLS', 'false').lower() == 'true'
              disable_aws_foundational = os.environ.get('DISABLE_AWS_FOUNDATIONAL', 'false').lower() == 'true'

              try:
                  if disable_cis:
                      response = securityhub.update_standards_control(
                          StandardsControlArn='arn:aws:securityhub:::standards/cis-aws-foundations-benchmark/v/1.2.0',
                          ControlStatus='DISABLED',
                          DisabledReason='Disabled by CloudFormation template'
                      )
                  if disable_aws_foundational:
                      response = securityhub.update_standards_control(
                          StandardsControlArn='arn:aws:securityhub:::standards/aws-foundational-security-best-practices/v/1.0.0',
                          ControlStatus='DISABLED',
                          DisabledReason='Disabled by CloudFormation template'
                      )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Security Hub controls updated successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error updating Security Hub controls: {str(e)}')
                  }

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/SecurityHubControlManager-${AWS::StackName}'
      RetentionInDays: !Ref LogRetentionInDays

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: events.amazonaws.com

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, '']]

Outputs:
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn