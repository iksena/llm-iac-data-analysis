AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for Lambda artifacts and a KMS key for encryption

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join
        - '-'
        - - 'lambda-artifacts'
          - !Select
            - 0
            - Fn::Split:
              - '-'
              - Fn::Select:
                - 0
                - Fn::GetAZs: ''
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${LambdaArtifactsBucket}/*'

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Lambda Artifacts Encryption Key
      KeyUsage: ENCRYPT_DECRYPT
      CustomerMasterKeySpec: SYMMETRIC_DEFAULT
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
          - Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
          - Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      EnableKeyRotation: true

  LambdaArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKMSKey

  LambdaArtifactsKMSAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaArtifactsKMSAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: !GetAtt LambdaArtifactsKMSKey.Arn
      Users:
        - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'

  LambdaArtifactsKMSUsagePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaArtifactsKMSUsagePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !GetAtt LambdaArtifactsKMSKey.Arn
      Users:
        - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'

Parameters:
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the KMS key
    Default: ''

Outputs:
  LambdaArtifactsBucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
  LambdaArtifactsKMSKeyId:
    Description: ID of the KMS key for Lambda artifacts
    Value: !Ref LambdaArtifactsKMSKey
  LambdaArtifactsKMSKeyArn:
    Description: ARN of the KMS key for Lambda artifacts
    Value: !GetAtt LambdaArtifactsKMSKey.Arn