AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon EFS file system with basic configurations for testing environment

Resources:
  DefaultVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-Test-VPC

  DefaultSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DefaultVpc
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: EFS-Test-Subnet

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref DefaultVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      FileSystemTags:
        - Key: Environment
          Value: testing
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: EFS encryption is enabled

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref DefaultSubnet
      SecurityGroups:
        - !Ref EfsSecurityGroup

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-FileSystemId"

  MountTargetId:
    Description: EFS Mount Target ID
    Value: !Ref EfsMountTarget
    Export:
      Name: !Sub "${AWS::StackName}-MountTargetId"

  SecurityGroupId:
    Description: EFS Security Group ID
    Value: !Ref EfsSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  VpcId:
    Description: VPC ID
    Value: !Ref DefaultVpc
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  SubnetId:
    Description: Subnet ID
    Value: !Ref DefaultSubnet
    Export:
      Name: !Sub "${AWS::StackName}-SubnetId"