AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with S3 Storage and IAM Permissions

Parameters:
  S3BucketName:
    Type: String
    Default: emr-serverless-scripts-data
    Description: Name of the S3 bucket for storing scripts and data

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
        - PolicyName: CloudWatchLogsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ScriptsDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  EMRServerlessApplication:
    Type: AWS::EMR::Cluster
    Properties:
      Name: emr-serverless-spark-app
      ReleaseLabel: emr-6.15.0
      Applications:
        - Name: Spark
      ServiceRole: !GetAtt EMRServerlessRole.Arn
      JobFlowRole: !GetAtt EMRServerlessRole.Arn
      VisibleToAllUsers: true
      Configurations:
        - Classification: spark-defaults
          Properties:
            spark.dynamicAllocation.enabled: 'true'
            spark.shuffle.service.enabled: 'true'

Outputs:
  EMRServerlessApplicationId:
    Description: EMR Serverless Application ID
    Value: !Ref EMRServerlessApplication
  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref ScriptsDataBucket