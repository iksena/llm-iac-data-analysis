AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an Amazon EFS file system with mount target in us-east-1a'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID in us-east-1a

  Environment:
    Type: String
    Default: testing
    AllowedValues:
      - testing
      - staging
      - production
    Description: Environment tag value

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VpcId.CidrBlock
      Tags:
        - Key: Name
          Value: !Sub efs-sg-${Environment}
        - Key: Environment
          Value: !Ref Environment

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub efs-${Environment}
        - Key: Environment
          Value: !Ref Environment
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

  AccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: '/data'
        CreationInfo:
          OwnerGid: '1000'
          OwnerUid: '1000'
          Permissions: '755'

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !Join
      - ''
      - - !Ref FileSystem
        - '.efs.'
        - !Ref 'AWS::Region'
        - '.amazonaws.com'

  MountTargetIP:
    Description: EFS Mount Target IP Address
    Value: !GetAtt MountTarget.IpAddress

  SecurityGroupId:
    Description: Security Group ID for EFS
    Value: !Ref EFSSecurityGroup

  AccessPointId:
    Description: EFS Access Point ID
    Value: !Ref AccessPoint