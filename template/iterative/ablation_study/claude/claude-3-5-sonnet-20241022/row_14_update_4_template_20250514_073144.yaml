AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with multiple EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the ENI will be created

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID for the ENI

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: Network Interface with multiple IPs
      GroupSet: 
        - !Ref SecurityGroupId
      PrivateIpAddresses:
        - Primary: true
          PrivateIpAddress: !Select [0, !Cidr [!Select [0, !Split ["/", !Select [1, !Split [" ", !Sub "${SubnetId}"]]], 16], 1, 8]]
        - Primary: false
          PrivateIpAddress: !Select [1, !Cidr [!Select [0, !Split ["/", !Select [1, !Split [" ", !Sub "${SubnetId}"]]], 16], 1, 8]]
      Tags:
        - Key: Name
          Value: Multi-IP ENI
        - Key: Purpose
          Value: Multiple IP Configuration

  FirstEIP:
    Type: AWS::EC2::EIP
    DependsOn: NetworkInterface
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Primary-EIP
        - Key: Association
          Value: Primary-IP

  SecondEIP:
    Type: AWS::EC2::EIP
    DependsOn: NetworkInterface
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Secondary-EIP
        - Key: Association
          Value: Secondary-IP

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NetworkInterface
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: FirstEIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface

  PrimaryPrivateIP:
    Description: Primary Private IP of the ENI
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondaryPrivateIP:
    Description: Secondary Private IP of the ENI
    Value: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

  FirstPublicIP:
    Description: First Elastic IP Address
    Value: !GetAtt FirstEIP.PublicIp

  SecondPublicIP:
    Description: Second Elastic IP Address
    Value: !GetAtt SecondEIP.PublicIp