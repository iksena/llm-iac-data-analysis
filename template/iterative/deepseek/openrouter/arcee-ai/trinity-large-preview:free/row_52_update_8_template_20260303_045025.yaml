AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for multi-region application failover architecture using Amazon Route 53 Application Recovery Controller (ARC)

Parameters:
  ClusterName:
    Type: String
    Description: Name of the recovery cluster
  ControlPanelName:
    Type: String
    Description: Name of the control panel
  Region1:
    Type: String
    Description: First AWS region
  Region2:
    Type: String
    Description: Second AWS region

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::RecoveryCluster
    Properties:
      Name: !Ref ClusterName

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Ref ControlPanelName
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControl1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub 'routing-control-${Region1}'
      ControlPanelArn: !GetAtt ControlPanel.Arn

  RoutingControl2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub 'routing-control-${Region2}'
      ControlPanelArn: !GetAtt ControlPanel.Arn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.Arn
      Name: 'at-least-one-active-region'
      RuleConfig:
        Rules:
          - Name: 'at-least-one-active'
            RuleType: 'ATLEAST'
            Threshold: 1
            EvaluationPeriod: 1
            WaitPeriod: 0
        GatingControls: []
        TargetControls:
          - !GetAtt RoutingControl1.RoutingControlArn
          - !GetAtt RoutingControl2.RoutingControlArn
      SafetyRuleType: 'GATING'

  CloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'route53-recovery-control.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'CloudWatchAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudwatch:GetMetricStatistics'
                  - 'cloudwatch:ListMetrics'
                Resource: '*'

  HealthCheck1:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      HealthCheckConfig:
        HealthCheckType: 'CLOUDWATCH'
        HealthCheckCustomConfig:
          CloudwatchRoleArn: !GetAtt CloudWatchRole.Arn
      RoutingControlArn: !GetAtt RoutingControl1.RoutingControlArn

  HealthCheck2:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      HealthCheckConfig:
        HealthCheckType: 'CLOUDWATCH'
        HealthCheckCustomConfig:
          CloudwatchRoleArn: !GetAtt CloudWatchRole.Arn
      RoutingControlArn: !GetAtt RoutingControl2.RoutingControlArn

Outputs:
  RecoveryClusterArn:
    Description: ARN of the recovery cluster
    Value: !GetAtt RecoveryCluster.Arn
  ControlPanelArn:
    Description: ARN of the control panel
    Value: !GetAtt ControlPanel.Arn
  RoutingControl1Arn:
    Description: ARN of the first routing control
    Value: !GetAtt RoutingControl1.RoutingControlArn
  RoutingControl2Arn:
    Description: ARN of the second routing control
    Value: !GetAtt RoutingControl2.RoutingControlArn
  SafetyRuleArn:
    Description: ARN of the safety rule
    Value: !GetAtt SafetyRule.Arn