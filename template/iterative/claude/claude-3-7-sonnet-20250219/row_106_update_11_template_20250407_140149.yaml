AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with event-driven notifications to an SNS topic'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    Default: s3-event-notification-bucket-unique
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Bucket name must be between 3 and 63 characters, start and end with a lowercase letter or number, and can contain lowercase letters, numbers, dots, and hyphens.

  TopicName:
    Type: String
    Description: Name of the SNS topic to create
    Default: s3-event-notifications
    AllowedPattern: '^[a-zA-Z0-9_-]{1,256}$'
    ConstraintDescription: Topic name must be between 1 and 256 characters and can contain letters, numbers, hyphens, and underscores.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${BucketName}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  BucketPermission:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowBucketNotifications
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt S3Bucket.Arn

  BucketNotification:
    Type: Custom::BucketNotification
    DependsOn: BucketPermission
    Properties:
      ServiceToken: !GetAtt BucketNotificationFunction.Arn
      BucketName: !Ref S3Bucket
      NotificationConfiguration:
        TopicConfigurations:
          - Topic: !Ref SNSTopic
            Events: 
              - s3:ObjectCreated:*

  BucketNotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt BucketNotificationRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              print('Received event: ' + json.dumps(event))
              
              response_data = {}
              physical_resource_id = event.get('PhysicalResourceId')
              
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      bucket_name = event['ResourceProperties']['BucketName']
                      notification_configuration = event['ResourceProperties']['NotificationConfiguration']
                      
                      # Convert the notification configuration to the format expected by boto3
                      if 'TopicConfigurations' in notification_configuration:
                          for config in notification_configuration['TopicConfigurations']:
                              if 'Events' in config:
                                  config['Events'] = config['Events'] if isinstance(config['Events'], list) else [config['Events']]
                      
                      # Put the notification configuration
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name,
                          NotificationConfiguration=notification_configuration
                      )
                      
                      physical_resource_id = bucket_name
                      response_data['Message'] = f'Successfully configured notifications for bucket {bucket_name}'
                  
                  elif event['RequestType'] == 'Delete':
                      bucket_name = event['ResourceProperties']['BucketName']
                      
                      # Clear the notification configuration
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name,
                          NotificationConfiguration={}
                      )
                      
                      response_data['Message'] = f'Successfully cleared notifications for bucket {bucket_name}'
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_resource_id)
              
              except Exception as e:
                  print(e)
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data, physical_resource_id)

  BucketNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3BucketNotificationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                Resource: !Sub arn:aws:s3:::${BucketName}-${AWS::AccountId}

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn

  TopicName:
    Description: Name of the SNS topic
    Value: !GetAtt SNSTopic.TopicName

  TopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic