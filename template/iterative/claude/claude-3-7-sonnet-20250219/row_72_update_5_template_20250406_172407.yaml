AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for deploying a secure, web-based VS Code development environment with code-server on EC2, accessible via CloudFront'

Parameters:
  CodeServerVersion:
    Description: Version of code-server to install
    Type: String
    Default: '4.16.1'
  
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
  
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: String
    Default: ''
  
  AdditionalAllowedCIDR:
    Description: Additional CIDR block to allow access to the EC2 instance (optional)
    Type: String
    Default: '0.0.0.0/0'

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac
    eu-west-1:
      AMI: ami-0694d931cee176e7d
    eu-west-2:
      AMI: ami-0505148b3591e4c07
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-northeast-1:
      AMI: ami-0d52744dc1906a2c8
    ap-northeast-2:
      AMI: ami-0f3a440bbcff3d043
    ap-southeast-1:
      AMI: ami-0df7a207adb9748c7
    ap-southeast-2:
      AMI: ami-0310483fb2b488153
    sa-east-1:
      AMI: ami-0af6e9042ea5a4e3e

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VS Code server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Allow access to code-server from anywhere (for CloudFront)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdditionalAllowedCIDR
          Description: SSH access (if key pair is provided)
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SecurityGroup

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SSMInstanceRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ElasticIP

  EC2WaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  EC2WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: EC2Instance
    Properties:
      Handle: !Ref EC2WaitHandle
      Timeout: '900'
      Count: 1

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: InternetGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref SSMInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          
          # Setup logging
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          echo "Starting user data script execution at $(date)"
          
          # Update system
          echo "Updating system packages..."
          apt-get update
          apt-get upgrade -y
          
          # Install dependencies
          echo "Installing dependencies..."
          apt-get install -y curl wget unzip apt-transport-https ca-certificates gnupg lsb-release python3-pip
          
          # Install code-server
          echo "Installing code-server version ${CodeServerVersion}..."
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version=${CodeServerVersion}
          
          # Configure code-server
          echo "Configuring code-server..."
          mkdir -p /home/ubuntu/.config/code-server
          cat > /home/ubuntu/.config/code-server/config.yaml << EOF
          bind-addr: 0.0.0.0:8080
          auth: none
          cert: false
          EOF
          
          # Set ownership
          chown -R ubuntu:ubuntu /home/ubuntu/.config
          
          # Create systemd service
          echo "Creating code-server systemd service..."
          cat > /etc/systemd/system/code-server.service << EOF
          [Unit]
          Description=code-server
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          ExecStart=/usr/bin/code-server
          Restart=always
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Enable and start code-server
          echo "Starting code-server service..."
          systemctl enable code-server
          systemctl start code-server
          
          # Verify code-server is running
          echo "Verifying code-server is running..."
          for i in {1..10}; do
            if systemctl is-active --quiet code-server; then
              echo "code-server is running"
              break
            fi
            echo "Waiting for code-server to start... attempt $i"
            sleep 5
          done
          
          # Install SSM agent
          echo "Ensuring SSM agent is running..."
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
          
          # Install CloudFormation helper scripts
          echo "Installing CloudFormation helper scripts..."
          pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
          
          # Test code-server is accessible
          echo "Testing code-server accessibility..."
          for i in {1..5}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "code-server is accessible"
              break
            fi
            echo "Waiting for code-server to be accessible... attempt $i"
            sleep 10
          done
          
          # Signal success
          echo "Signaling completion to CloudFormation..."
          /usr/local/bin/cfn-signal -e $? -d "Server setup complete" '${EC2WaitHandle}'
          
          echo "User data script completed at $(date)"
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub ${AWS::StackName}-LongTermCachePolicy
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2WaitCondition
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_All
        Origins:
          - Id: EC2Origin
            DomainName: !Sub ${ElasticIP.PublicIp}.nip.io
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CloudFrontCachePolicy
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontURL:
    Description: URL to access the VS Code environment
    Value: !Sub https://${CloudFrontDistribution.DomainName}
  
  EC2InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance
  
  EC2PublicIP:
    Description: Public IP of the EC2 instance
    Value: !Ref ElasticIP
  
  EC2PublicDNS:
    Description: Public DNS of the EC2 instance (nip.io format)
    Value: !Sub ${ElasticIP.PublicIp}.nip.io
  
  DirectAccessURL:
    Description: Direct URL to access the VS Code environment (bypassing CloudFront)
    Value: !Sub http://${ElasticIP.PublicIp}.nip.io:8080