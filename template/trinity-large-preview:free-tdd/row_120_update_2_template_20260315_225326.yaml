AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  BatchJobQueueName:
    Type: String
    Default: OrderProcessingQueue
    Description: Name for the Batch job queue
  BatchJobDefinitionName:
    Type: String
    Default: OrderProcessingJob
    Description: Name for the Batch job definition
  BatchComputeEnvironmentName:
    Type: String
    Default: OrderProcessingCE
    Description: Name for the Batch compute environment
  SQSQueueName:
    Type: String
    Default: OrderProcessingQueue
    Description: Name for the SQS queue
  PipeName:
    Type: String
    Default: OrderProcessingPipe
    Description: Name for the EventBridge Pipe
  ECSExecutionRoleName:
    Type: String
    Default: ECSExecutionRole
    Description: Name for the ECS execution role
  BatchRoleName:
    Type: String
    Default: BatchRole
    Description: Name for the Batch role
  PipesRoleName:
    Type: String
    Default: PipesRole
    Description: Name for the Pipes role

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: OrderProcessingVPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: BatchSecurityGroup

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SQSQueueName
      Tags:
        - Key: Name
          Value: OrderProcessingQueue

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 256
        DesiredvCpus: 0
        InstanceTypes:
          - optimal
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref SecurityGroup
      ServiceRole: !GetAtt BatchRole.Arn
      ComputeEnvironmentName: !Ref BatchComputeEnvironmentName

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      JobQueueName: !Ref BatchJobQueueName

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: amazon/aws-cli:latest
        Memory: 1024
        Vcpus: 1
        Command:
          - /bin/sh
          - -c
          - echo "Processing order"
      JobDefinitionName: !Ref BatchJobDefinitionName

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref ECSExecutionRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  BatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref BatchRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - batch.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref PipesRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: PipesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: !GetAtt BatchJobDefinition.Arn

  EventBridgePipe:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref PipeName

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Ref PipeName
      EventPattern:
        source:
          - aws.sqs
        detail:
          body:
            OrderStatus:
              - OrderCreated
      State: ENABLED
      Targets:
        - Arn: !GetAtt BatchJobDefinition.Arn
          Id: BatchTarget
          RoleArn: !GetAtt PipesRole.Arn
          BatchParameters:
            JobDefinition: !Ref BatchJobDefinition
            JobName: OrderProcessingJob
            JobQueue: !Ref BatchJobQueue

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  BatchJobQueueARN:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn