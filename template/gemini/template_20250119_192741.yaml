AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with security group
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701 # Amazon Linux 2 AMI - replace with your desired AMI
      InstanceType: t2.micro
      KeyName: MyKeyPair # Replace with your KeyPair name
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # Replace with your desired CIDR
      VpcId: vpc-xxxxxxxxxxxxxxxxx # Replace with your VPC ID

Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: Instance ID
  PublicIp:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address of the instance
  PublicDNSName:
    Value: !GetAtt EC2Instance.PublicDnsName
    Description: Public DNS Name of the instance

