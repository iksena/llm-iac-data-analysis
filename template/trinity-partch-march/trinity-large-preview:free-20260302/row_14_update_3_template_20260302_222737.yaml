AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ENI with two EIPs and secondary private IPs

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The ID of the VPC
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The ID of the subnet
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: The IDs of the security groups
  NumberOfSecondaryPrivateIPs:
    Type: Number
    Default: 2
    Description: The number of secondary private IP addresses to associate with the ENI

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Primary network interface
      SubnetId: !Ref SubnetId
      GroupSet: !Ref SecurityGroupIds
      SourceDestCheck: true

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref NetworkInterface

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref NetworkInterface

  SecondaryPrivateIPs:
    Type: AWS::EC2::NetworkInterfaceSecondaryPrivateIpAddress
    Properties:
      NetworkInterfaceId: !Ref NetworkInterface
      SecondaryPrivateIpAddressCount: !Ref NumberOfSecondaryPrivateIPs

Outputs:
  NetworkInterfaceId:
    Description: The ID of the network interface
    Value: !Ref NetworkInterface
  EIP1AllocationId:
    Description: The allocation ID of the first EIP
    Value: !GetAtt EIP1.AllocationId
  EIP2AllocationId:
    Description: The allocation ID of the second EIP
    Value: !GetAtt EIP2.AllocationId
  PrivateIPAddresses:
    Description: The private IP addresses associated with the ENI
    Value: !Join [",", !GetAtt NetworkInterface.PrivateIpAddresses]