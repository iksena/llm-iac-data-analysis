AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Instance Scheduling Lab Environment with SSM Support'

Parameters:
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: VPC CIDR block
  
  SubnetCidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: Public Subnet CIDR block

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: SchedulingLabVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SchedulingLabIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTPS outbound traffic
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  AdminInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AdminInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - cloudformation:Describe*
                  - cloudformation:List*
                Resource: '*'

  AdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AdminInstanceRole

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref AdminInstanceProfile
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          dnf update -y
          dnf install -y aws-cli python3-pip
          pip3 install boto3
      Tags:
        - Key: Name
          Value: AdminInstance

  ManagedInstances:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt CreateInstancesFunction.Arn
      Count: 5
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}'
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: 
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: environment
          Value: dev

  CreateInstancesFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      ec2 = boto3.client('ec2')
                      count = event['ResourceProperties']['Count']
                      instances = []
                      
                      for i in range(int(count)):
                          response = ec2.run_instances(
                              ImageId=event['ResourceProperties']['ImageId'],
                              InstanceType=event['ResourceProperties']['InstanceType'],
                              SubnetId=event['ResourceProperties']['SubnetId'],
                              SecurityGroupIds=event['ResourceProperties']['SecurityGroupIds'],
                              IamInstanceProfile={'Name': event['ResourceProperties']['IamInstanceProfile']},
                              MinCount=1,
                              MaxCount=1,
                              TagSpecifications=[{
                                  'ResourceType': 'instance',
                                  'Tags': [
                                      {'Key': 'Name', 'Value': f'ManagedInstance{i+1}'},
                                      {'Key': 'environment', 'Value': 'dev'}
                                  ]
                              }]
                          )
                          instances.append(response['Instances'][0]['InstanceId'])
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, 
                                     {'InstanceIds': ','.join(instances)})
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, 
                                 {'Error': str(e)})
      Runtime: python3.9
      Timeout: 300
      MemorySize: 128

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2ManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                  - iam:PassRole
                Resource: '*'

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  SubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet

  AdminInstanceId:
    Description: Admin Instance ID
    Value: !Ref AdminInstance

  ManagedInstanceIds:
    Description: Managed Instance IDs
    Value: !GetAtt ManagedInstances.InstanceIds