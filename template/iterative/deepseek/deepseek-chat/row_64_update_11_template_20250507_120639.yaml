AWSTemplateFormatVersion: '2010-09-09'
Description: 'Web application environment with public EC2 instance in VPC'

Parameters:
  VpcCidr:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  PublicSubnetCidr:
    Description: 'CIDR block for the public subnet'
    Type: String
    Default: '10.0.1.0/24'
  
  InstanceType:
    Description: 'EC2 instance type'
    Type: String
    Default: 't3.micro'
    AllowedValues:
      - t3.micro
      - t3.small
      - t2.micro
      - t2.small
  
  KeyName:
    Description: 'Name of an existing EC2 KeyPair to enable SSH access (leave blank if not needed)'
    Type: String
    Default: ''
    ConstraintDescription: 'Must be the name of an existing EC2 KeyPair or left blank.'

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: 'ami-0aa7d40eeae50c9b9'  # Amazon Linux 2 AMI (HVM), SSD Volume Type
    us-west-2:
      AMI: 'ami-0d70546e43a941d70'  # Amazon Linux 2 AMI (HVM), SSD Volume Type
    eu-west-1:
      AMI: 'ami-0bbc25e23a7640b9b'  # Amazon Linux 2 AMI (HVM), SSD Volume Type

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: WebAppPublicSubnet

  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  DefaultPublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  WebServerSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Enable HTTP and SSH access'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '0.0.0.0/0'
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: WebServerSG

  WebServer:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -ex
          yum update -y
          yum install -y httpd php
          systemctl start httpd
          systemctl enable httpd
          echo "<?php phpinfo(); ?>" > /var/www/html/info.php
          cat > /var/www/html/index.html <<EOF
          <html>
          <body>
          <h1>Inventory Application</h1>
          <p>Sample inventory application is running</p>
          </body>
          </html>
          EOF
          chown -R apache:apache /var/www/html
      Tags:
        - Key: Name
          Value: WebServer

Outputs:
  InstancePublicIP:
    Description: 'Public IP address of the web server'
    Value: !GetAtt WebServer.PublicIp
  
  WebURL:
    Description: 'URL of the web server'
    Value: !Sub 'http://${WebServer.PublicIp}'
  
  VPCId:
    Description: 'VPC ID'
    Value: !Ref VPC