AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ECR repository with a repository policy granting root user permissions.

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: kubernetes-container-images
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE

  ECRRepositoryPolicy:
    Type: AWS::ECR::RepositoryPolicy
    Properties:
      RepositoryName: !Ref ECRRepository
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserFullAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:root:${AWS::AccountId}:root'
            Action:
              - 'ecr:GetDownloadUrlForLayer'
              - 'ecr:BatchGetImage'
              - 'ecr:BatchCheckLayerAvailability'
              - 'ecr:PutImage'
              - 'ecr:InitiateLayerUpload'
              - 'ecr:UploadLayerPart'
              - 'ecr:CompleteLayerUpload'
              - 'ecr:DescribeRepositories'
              - 'ecr:GetRepositoryPolicy'
              - 'ecr:ListImages'
              - 'ecr:DeleteRepository'
              - 'ecr:BatchDeleteImage'
              - 'ecr:SetRepositoryPolicy'
              - 'ecr:PutLifecyclePolicy'
              - 'ecr:PutRegistryPolicy'
              - 'ecr:PutReplicationConfiguration'
              - 'ecr:StartLifecyclePolicyPreview'
              - 'ecr:GetLifecyclePolicy'
              - 'ecr:GetLifecyclePolicyPreview'
              - 'ecr:GetDownloadUrlForLayer'
              - 'ecr:GetAuthorizationToken'