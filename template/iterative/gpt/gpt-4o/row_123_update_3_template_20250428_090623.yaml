AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge integration with Stripe's product API.

Parameters:
  StripeApiKey:
    Type: String
    Description: The API key for authenticating requests to Stripe.
    NoEcho: true

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus

  EventBusPolicy:
    Type: AWS::Events::EventBusPolicy
    Properties:
      EventBusName: !Ref EventBus
      StatementId: AllowPartnerAppEvents
      Action: events:PutEvents
      Principal: '*'
      Condition:
        Type: StringEquals
        Key: aws:SourceArn
        Value: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/PartnerAppEventBus

  StripeApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: StripeApiKeySecret
      SecretString: !Ref StripeApiKey

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeApiPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref StripeApiKeySecret
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  StripeApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Ref StripeApiKey

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeApiDestination
      ConnectionArn: !GetAtt StripeApiConnection.ConnectionArn
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: PartnerAppEventRule
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - PartnerApp
        detail-type:
          - PartnerAppDetailType
      Targets:
        - Id: StripeApiTarget
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge event bus.
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: The ARN of the API Destination.
    Value: !GetAtt StripeApiDestination.Arn