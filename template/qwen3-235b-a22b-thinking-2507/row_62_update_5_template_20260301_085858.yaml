AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready Aurora MySQL cluster with two publicly accessible instances and custom parameter groups'

Parameters:
  VpcId:
    Description: VPC ID where the database will be deployed
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Description: Two subnets in different Availability Zones (comma-delimited)
    Type: List<AWS::EC2::Subnet::Id>
    MinLength: 2
    MaxLength: 2
  DBName:
    Description: Database name
    Type: String
    Default: mydb
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[\w]+'
    ConstraintDescription: Must contain only alphanumeric characters and underscores
  DBMasterUsername:
    Description: Master database username
    Type: String
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[\w]+'
    ConstraintDescription: Must contain only alphanumeric characters and underscores
  MasterUserPasswordSecretName:
    Description: Name of Secrets Manager secret containing master password
    Type: String
    MinLength: 1
    MaxLength: 256
  DBPort:
    Description: Database port
    Type: Number
    Default: 3306
    MinValue: 1150
    MaxValue: 65535
  EngineVersion:
    Description: Aurora MySQL engine version
    Type: String
    Default: 5.7.mysql_aurora.2.10.2
  TimeZone:
    Description: Time zone for database cluster
    Type: String
    Default: UTC
  SqlMode:
    Description: SQL mode configuration
    Type: String
    Default: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
  AllowedCIDR:
    Description: CIDR range for database access
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]{1,2})$'
    ConstraintDescription: Must be a valid CIDR block (e.g., 10.0.0.0/16)

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${AWS::StackName} Aurora Subnet Group'
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} Aurora Security Group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DBPort
          ToPort: !Ref DBPort
          CidrIp: !Ref AllowedCIDR

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: !Sub '${AWS::StackName} Cluster Parameter Group'
      Family: aurora-mysql5.7
      Parameters:
        time_zone: !Ref TimeZone

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: !Sub '${AWS::StackName} Instance Parameter Group'
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: !Ref SqlMode

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${MasterUserPasswordSecretName}:SecretString}}'
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      DatabaseName: !Ref DBName
      Port: !Ref DBPort
      EngineVersion: !Ref EngineVersion
      BackupRetentionPeriod: 7
      StorageEncrypted: true

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBParameterGroupName: !Ref DBParameterGroup

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBParameterGroupName: !Ref DBParameterGroup

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint for primary database
    Value: !GetAtt DBCluster.Endpoint.Address
  ClusterPort:
    Description: Cluster port
    Value: !GetAtt DBCluster.Endpoint.Port
  ReaderEndpoint:
    Description: Reader endpoint for read replicas
    Value: !GetAtt DBCluster.ReaderEndpoint
  PrimaryInstanceEndpoint:
    Description: Primary instance endpoint
    Value: !GetAtt DBInstance1.Endpoint.Address
  PrimaryInstancePort:
    Description: Primary instance port
    Value: !GetAtt DBInstance1.Endpoint.Port
  ReplicaInstanceEndpoint:
    Description: Replica instance endpoint
    Value: !GetAtt DBInstance2.Endpoint.Address
  ReplicaInstancePort:
    Description: Replica instance port
    Value: !GetAtt DBInstance2.Endpoint.Port
  MasterUserPasswordSecretName:
    Description: Name of Secrets Manager secret containing master password
    Value: !Ref MasterUserPasswordSecretName