AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a private Route 53 Hosted Zone for internal DNS management'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC to associate with the private hosted zone
  
  DomainName:
    Type: String
    Default: example.com
    Description: The domain name for the private hosted zone
  
  Comment:
    Type: String
    Default: Private hosted zone for internal DNS management
    Description: Optional comment for the hosted zone

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Ref Comment
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref AWS::Region

Outputs:
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
  
  HostedZoneName:
    Description: The name of the private hosted zone
    Value: !Ref DomainName