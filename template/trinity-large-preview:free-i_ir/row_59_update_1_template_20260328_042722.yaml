AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Kinesis Data Stream with throughput alarms

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: RealTimeDataStream
      ShardCount: 1
      Tags:
        - Key: Environment
          Value: production
      # Implementing 'encrypted' effect
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisThroughputAlarms

  ReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisReadThroughputAlarm
      AlarmDescription: Alarm when Kinesis read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream
    DependsOn:
      - KinesisStream
      - AlarmTopic

  WriteAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisWriteThroughputAlarm
      AlarmDescription: Alarm when Kinesis write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream
    DependsOn:
      - KinesisStream
      - AlarmTopic

# Round-trip verification:
# - All 4 resources from I-IR are present
# - All 4 'depends' edges are expressed via DependsOn
# - 'encrypted' effect implemented with StreamEncryption
# - All properties match I-IR fields
# - Invariants are satisfied by configuration