AWSTemplateFormatVersion: '2010-09-09'
Description: 'Highly Available Jenkins Deployment with Auto Scaling and Load Balancer'

Parameters:
  VpcCidr:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  PublicSubnet1Cidr:
    Description: 'CIDR block for Public Subnet 1 (AZ1)'
    Type: String
    Default: '10.0.1.0/24'
  
  PublicSubnet2Cidr:
    Description: 'CIDR block for Public Subnet 2 (AZ2)'
    Type: String
    Default: '10.0.2.0/24'
  
  InstanceType:
    Description: 'EC2 instance type'
    Type: String
    Default: 't3.medium'
    AllowedValues: 
      - 't3.medium'
      - 't3.large'
      - 'm5.large'
  
  KeyPairName:
    Description: 'Name of an existing EC2 KeyPair in this region (leave empty if using SSM)'
    Type: String
    Default: ''
    ConstraintDescription: 'Must be the name of an existing EC2 KeyPair or empty'
  
  JenkinsAdminUser:
    Description: 'Jenkins admin username'
    Type: String
    Default: 'admin'
    MinLength: 3
    MaxLength: 16
  
  JenkinsAdminPassword:
    Description: 'Jenkins admin password (must be at least 8 characters)'
    Type: String
    NoEcho: true
    Default: 'defaultPassword123'
    MinLength: 8
    ConstraintDescription: 'Must be at least 8 characters'

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Mappings:
  AMIMap:
    us-east-1:
      AMI: 'ami-0c2b8ca1dad447f8a'
    us-west-2:
      AMI: 'ami-0d70546e43a941d70'
    eu-west-1:
      AMI: 'ami-0bbc25e23a7640b9b'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Jenkins-VPC

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: Jenkins-IGW

  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Jenkins-Public-Subnet-1

  PublicSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Jenkins-Public-Subnet-2

  PublicRouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Jenkins-Public-RouteTable

  PublicRoute:
    Type: 'AWS::EC2::Route'
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  JenkinsSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for Jenkins instances'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '0.0.0.0/0'
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: Jenkins-SG

  JenkinsIAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
            Action: 
              - sts:AssumeRole
      Path: '/'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly'

  JenkinsInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref JenkinsIAMRole

  JenkinsLaunchTemplate:
    Type: 'AWS::EC2::LaunchTemplate'
    Properties:
      LaunchTemplateName: 'JenkinsLaunchTemplate'
      LaunchTemplateData:
        ImageId: !FindInMap [AMIMap, !Ref 'AWS::Region', AMI]
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref JenkinsInstanceProfile
        SecurityGroupIds:
          - !GetAtt JenkinsSecurityGroup.GroupId
        UserData: 
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            # Update and install required packages
            yum update -y
            yum install -y java-1.8.0-openjdk-devel git
            
            # Install Jenkins
            wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
            rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io.key
            yum install -y jenkins
            
            # Start Jenkins service
            systemctl daemon-reload
            systemctl enable jenkins
            systemctl start jenkins
            
            # Wait for Jenkins to fully initialize
            sleep 120
            
            # Create admin user
            cat > /tmp/create_admin.groovy <<EOF
            import jenkins.model.*
            import hudson.security.*
            def instance = Jenkins.getInstance()
            def hudsonRealm = new HudsonPrivateSecurityRealm(false)
            hudsonRealm.createAccount("${JenkinsAdminUser}", "${JenkinsAdminPassword}")
            instance.setSecurityRealm(hudsonRealm)
            def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
            instance.setAuthorizationStrategy(strategy)
            instance.save()
            EOF
            
            java -jar /var/cache/jenkins/war/WEB-INF/jenkins-cli.jar -s http://localhost:8080/ groovy = < /tmp/create_admin.groovy
    Condition: HasKeyPair

  JenkinsLaunchTemplateNoKey:
    Type: 'AWS::EC2::LaunchTemplate'
    Properties:
      LaunchTemplateName: 'JenkinsLaunchTemplateNoKey'
      LaunchTemplateData:
        ImageId: !FindInMap [AMIMap, !Ref 'AWS::Region', AMI]
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref JenkinsInstanceProfile
        SecurityGroupIds:
          - !GetAtt JenkinsSecurityGroup.GroupId
        UserData: 
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            # Update and install required packages
            yum update -y
            yum install -y java-1.8.0-openjdk-devel git
            
            # Install Jenkins
            wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
            rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io.key
            yum install -y jenkins
            
            # Start Jenkins service
            systemctl daemon-reload
            systemctl enable jenkins
            systemctl start jenkins
            
            # Wait for Jenkins to fully initialize
            sleep 120
            
            # Create admin user
            cat > /tmp/create_admin.groovy <<EOF
            import jenkins.model.*
            import hudson.security.*
            def instance = Jenkins.getInstance()
            def hudsonRealm = new HudsonPrivateSecurityRealm(false)
            hudsonRealm.createAccount("${JenkinsAdminUser}", "${JenkinsAdminPassword}")
            instance.setSecurityRealm(hudsonRealm)
            def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
            instance.setAuthorizationStrategy(strategy)
            instance.save()
            EOF
            
            java -jar /var/cache/jenkins/war/WEB-INF/jenkins-cli.jar -s http://localhost:8080/ groovy = < /tmp/create_admin.groovy
    Condition: !Not [HasKeyPair]

  JenkinsTargetGroup:
    Type: 'AWS::ElasticLoadBalancingV2::TargetGroup'
    Properties:
      Name: 'Jenkins-TargetGroup'
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckPath: '/login'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      TargetType: 'instance'

  JenkinsLoadBalancer:
    Type: 'AWS::ElasticLoadBalancingV2::LoadBalancer'
    Properties:
      Name: 'Jenkins-LoadBalancer'
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !GetAtt JenkinsSecurityGroup.GroupId
      Scheme: 'internet-facing'
      Type: 'application'
      IpAddressType: 'ipv4'

  JenkinsListener:
    Type: 'AWS::ElasticLoadBalancingV2::Listener'
    Properties:
      DefaultActions:
        - Type: 'forward'
          TargetGroupArn: !Ref JenkinsTargetGroup
      LoadBalancerArn: !Ref JenkinsLoadBalancer
      Port: 80
      Protocol: 'HTTP'

  JenkinsAutoScalingGroup:
    Type: 'AWS::AutoScaling::AutoScalingGroup'
    DependsOn: JenkinsListener
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !If [HasKeyPair, !Ref JenkinsLaunchTemplate, !Ref JenkinsLaunchTemplateNoKey]
        Version: !If [HasKeyPair, !GetAtt JenkinsLaunchTemplate.LatestVersionNumber, !GetAtt JenkinsLaunchTemplateNoKey.LatestVersionNumber]
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      HealthCheckType: 'EC2'
      HealthCheckGracePeriod: 300
      TargetGroupARNs:
        - !Ref JenkinsTargetGroup
      Tags:
        - Key: Name
          Value: Jenkins-Instance
          PropagateAtLaunch: true

Outputs:
  JenkinsURL:
    Description: 'URL to access Jenkins'
    Value: !Sub 'http://${JenkinsLoadBalancer.DNSName}'
  SSMCommand:
    Description: 'Command to connect via SSM'
    Value: !Sub 'aws ssm start-session --target $(aws ec2 describe-instances --filters Name=tag:aws:autoscaling:groupName,Values=${JenkinsAutoScalingGroup} Name=instance-state-name,Values=running --query "Reservations[0].Instances[0].InstanceId" --output text --region ${AWS::Region})'
  AutoScalingGroupName:
    Description: 'The name of the Auto Scaling Group'
    Value: !Ref JenkinsAutoScalingGroup
  LoadBalancerDNS:
    Description: 'DNS name of the Load Balancer'
    Value: !GetAtt JenkinsLoadBalancer.DNSName