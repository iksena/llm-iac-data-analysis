

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudWatch Dashboard with log widgets for VPC flow logs of NAT Gateway.

Parameters:
  DashboardName:
    Type: String
    Default: "NATGatewayFlowLogsDashboard"
    Description: The name of the CloudWatch Dashboard.
  
  LogGroupName:
    Type: String
    Default: "/aws/vpc/flow-logs"
    Description: The name of the CloudWatch Log Group for VPC flow logs.

Resources:
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | sort @timestamp desc | limit 20",
                "logGroupNames": ["${LogGroupName}"],
                "title": "Recent NAT Gateway Flow Logs"
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 0,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, srcAddr, dstAddr, action | filter action = 'ACCEPT' | sort @timestamp desc | limit 20",
                "logGroupNames": ["${LogGroupName}"],
                "title": "Accepted NAT Gateway Connections"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, srcAddr, dstAddr, action | filter action = 'REJECT' | sort @timestamp desc | limit 20",
                "logGroupNames": ["${LogGroupName}"],
                "title": "Rejected NAT Gateway Connections"
              }
            },
            {
              "type": "log",
              "x": 6,
              "y": 6,
              "width": 6,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, bytes, action | sort @timestamp desc | limit 20",
                "logGroupNames": ["${LogGroupName}"],
                "title": "NAT Gateway Traffic Volume"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL of the created CloudWatch Dashboard
    Value: !Sub "https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"