AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  EnableStrictBoundaryEnforcement:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Resources:
  DeveloperGovernanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperGovernanceRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      PermissionsBoundary:
        Fn::If:
          - EnableStrictBoundaryEnforcement
          - Ref: PermissionBoundaryPolicy
          - !Ref AWS::NoValue
      Tags:
        - Key: Owner
          Value: GovernanceTeam
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "*"
            Action: "sts:AssumeRole"

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Default permission boundary restricting to S3 and read-only IAM
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
            Resource: "*"

  DeveloperIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DeveloperIAMPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PassRole
              - iam:GetRole
              - iam:ListRoles
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:GetPolicy
              - iam:ListPolicies
            Resource: "*"
      Roles:
        - Ref: DeveloperGovernanceRole