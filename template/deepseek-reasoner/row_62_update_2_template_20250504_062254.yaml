AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database cluster
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of public subnet IDs for DB subnet group
  MasterUsername:
    Type: String
    Default: admin
    Description: Master username for database access
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Master password for database access

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Aurora Public Subnet Group
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora MySQL Public Access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  InstanceParamGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom instance parameter group
      Family: aurora-mysql8.0
      Parameters:
        time_zone: UTC
        sql_mode: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 8.0.mysql_aurora.3.02.0
      DatabaseName: applicationDB
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      StorageEncrypted: true

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref InstanceParamGroup

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref InstanceParamGroup

Outputs:
  ClusterEndpoint:
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  SecurityGroupId:
    Value: !Ref DBSecurityGroup