AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket Trigger Lambda Function
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: MyS3Bucket
      AccessControl: PublicRead
  LambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://my-bucket/lambda-function.zip
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref S3Bucket
            Events:
              - s3:ObjectCreated:*
Outputs:
  LambdaFunctionArn:
    Value: !GetAtt LambdaFunction.Arn
    Description: The ARN of the Lambda function
  S3BucketName:
    Value: !Ref S3Bucket
    Description: The name of the S3 bucket

