AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  EnableStrictBoundary:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Toggle to enable/disable strict permission boundary enforcement

Resources:
  DeveloperGovernanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperGovernanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iam.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [EnableStrictBoundaryCondition, !GetAtt PermissionBoundaryPolicy.Arn, !Ref AWS::NoValue]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Policies:
        - PolicyName: DeveloperGovernancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:ResourceTag/Owner: 'true'
                  StringLike:
                    iam:RoleArn: arn:aws:iam::*:role/MyTeam*
              - Effect: Allow
                Action:
                  - iam:Get*
                  - iam:List*
                Resource: '*'

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EnableStrictBoundaryCondition
    Properties:
      Description: Permission boundary restricting to S3 and read-only IAM operations
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:Get*
              - s3:List*
              - iam:Get*
              - iam:List*
            Resource: '*'

Conditions:
  EnableStrictBoundaryCondition:
    !Equals [!Ref EnableStrictBoundary, 'true']

Outputs:
  DeveloperGovernanceRoleArn:
    Description: ARN of the Developer Governance Role
    Value: !GetAtt DeveloperGovernanceRole.Arn
    Export:
      Name: DeveloperGovernanceRoleArn