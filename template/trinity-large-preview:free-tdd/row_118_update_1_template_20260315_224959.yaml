AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow to enrich SQS messages with external API data and log results

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgePipesQueue

  APIDestination:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ZipCodeAPI
      Description: API Destination for Zip Code lookup
      EndpointConfiguration:
        Types:
          - REGIONAL

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: EventBridgePipesLogGroup
      RetentionInDays: 30

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipesRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:endpoint/api/*'

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: ZipCodeEnrichmentPipe
      Source:
        SourceType: SQS
        SourceParameters:
          SQS:
            QueueARN: !GetAtt SQSQueue.Arn
      Target:
        TargetType: AwsManaged
        TargetParameters:
          AwsManaged:
            EndpointId: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:endpoint/api/*'
            InvocationType: SYNC
            InputTemplate: '{"query": {"zip": "$.zipCode"}}'
        PipeTargetDetails:
          LogGroup:
            LogGroupArn: !GetAtt LogGroup.Arn