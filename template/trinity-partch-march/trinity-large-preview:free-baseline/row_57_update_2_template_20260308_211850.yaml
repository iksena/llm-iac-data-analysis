AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with Monitoring Capabilities'

Parameters:
  ClusterName:
    Type: String
    Default: 'my-ecs-cluster'
    Description: 'Name of the ECS cluster'
  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable CloudWatch monitoring for the cluster'
  InstanceType:
    Type: String
    Default: 't3.medium'
    Description: 'EC2 instance type for container instances'
  DesiredCapacity:
    Type: Number
    Default: 2
    Description: 'Desired number of container instances'

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ecs-task-execution-role-${ClusterName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ecs-service-role-${ClusterName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceRole

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnableMonitoring
    Properties:
      LogGroupName: !Sub '/ecs/${ClusterName}/application'
      RetentionInDays: 30

  CloudWatchContainerInsights:
    Type: AWS::CloudWatch::InsightRule
    Condition: EnableMonitoring
    Properties:
      RuleName: !Sub 'ecs-container-insights-${ClusterName}'
      RuleState: ENABLED
      RuleBody: |
        {
          "Schema": {
            "Name": "CloudWatchLog",
            "Version": 2
          },
          "Definition": {
            "Start": "FILTER @message like /ECS/ | STATS count(*) as TotalCount by bin(1m)",
            "Actions": [
              {
                "SNS": {
                  "TopicArn": "arn:aws:sns:us-east-1:123456789012:ECSAlerts",
                  "Message": "ECS Container Insights Alert: {{ TotalCount }}"
                }
              }
            ]
          }
        }

Conditions:
  EnableMonitoring: !Equals [!Ref EnableMonitoring, 'true']

Outputs:
  ClusterArn:
    Description: 'ECS Cluster ARN'
    Value: !Ref ECSCluster
  ClusterName:
    Description: 'ECS Cluster Name'
    Value: !Ref ClusterName
  TaskExecutionRoleArn:
    Description: 'ECS Task Execution Role ARN'
    Value: !GetAtt ECSTaskExecutionRole.Arn