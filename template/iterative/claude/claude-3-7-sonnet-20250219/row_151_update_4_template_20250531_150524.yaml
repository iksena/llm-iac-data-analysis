AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  CloudFormation template for Lambda function to be used with AWS Bedrock Agent for stock price lookup.
  Note: Bedrock Agent resources must be created manually in the AWS Console or via AWS CLI after deploying this template.

Parameters:
  LambdaFunctionName:
    Type: String
    Default: StockPriceLookupFunction
    Description: Name for the Lambda function that returns stock prices
  
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Timeout for the Lambda function in seconds
    MinValue: 3
    MaxValue: 900
  
  LambdaMemorySize:
    Type: Number
    Default: 128
    Description: Memory size for the Lambda function in MB
    MinValue: 128
    MaxValue: 10240
    
Resources:
  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: /

  # Lambda function that returns stock price
  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs18.x
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Event received:', JSON.stringify(event, null, 2));
            
            // Extract the stock symbol from the event
            const stockSymbol = event.parameters && event.parameters.stockSymbol 
              ? event.parameters.stockSymbol 
              : 'UNKNOWN';
            
            // Return a hard-coded stock price as a placeholder
            const response = {
              stockSymbol: stockSymbol,
              price: 100.00,
              currency: 'USD',
              timestamp: new Date().toISOString()
            };
            
            console.log('Response:', JSON.stringify(response, null, 2));
            return response;
          };

  # IAM Role for Bedrock Agent (to be used when creating the agent manually)
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentLambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt StockPriceLambdaFunction.Arn
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/*
      Path: /

  # Lambda Permission for Bedrock
  LambdaPermissionForBedrock:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StockPriceLambdaFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function to be used with Bedrock Agent
    Value: !GetAtt StockPriceLambdaFunction.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref StockPriceLambdaFunction
    
  BedrockAgentRoleArn:
    Description: ARN of the IAM role to be used when creating the Bedrock Agent
    Value: !GetAtt BedrockAgentRole.Arn
    
  ManualSetupInstructions:
    Description: Instructions for manual setup of Bedrock Agent
    Value: >
      After deploying this stack, create a Bedrock Agent manually in the AWS Console or via AWS CLI.
      Use the Lambda function ARN and IAM role ARN from the outputs of this stack.
      Configure the agent with a foundation model like Claude 3 Sonnet and create an action group
      with a getStockPrice action that invokes the Lambda function.