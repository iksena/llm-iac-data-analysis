AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  KeyName:
    Type: String
    Description: Name of the SSH key pair to use for the EC2 instance
  InstanceType:
    Type: String
    Description: Type of EC2 instance to launch
    Default: t2.micro
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: ID of the VPC to launch the EC2 instance in
  Subnet:
    Type: AWS::EC2::Subnet::Id
    Description: ID of the subnet to launch the EC2 instance in

Resources:
  MyEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0  # Example AMI ID, replace with region-specific ID
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref MySecurityGroup
      SubnetId: !Ref Subnet
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
        yum install -y httpd
        systemctl start httpd
        systemctl enable httpd

Outputs:
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt MyEIP.PublicIp
    Export:
      Name: MyEC2InstancePublicIP

  SSHCommand:
    Description: SSH command to connect to the EC2 instance
    Value: "ssh -i /path/to/your/key.pem ec2-user@!GetAtt MyEIP.PublicIp"
    Export:
      Name: MyEC2InstanceSSHCommand