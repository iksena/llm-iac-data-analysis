AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InputBucketName:
    Type: String
    Description: 'Name for the input S3 bucket (must be globally unique)'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name (3-63 characters, lowercase, numbers, dots, dashes)'
  OutputBucketName:
    Type: String
    Description: 'Name for the output S3 bucket (must be globally unique)'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name (3-63 characters, lowercase, numbers, dots, dashes)'
  CompanyEdiId:
    Type: String
    Description: 'EDI ID for business identity (e.g., DUNS number)'
    MinLength: 1
  BusinessName:
    Type: String
    Description: 'Business contact name'
    MinLength: 1
  BusinessEmail:
    Type: String
    Description: 'Business contact email'
    MinLength: 5
  BusinessPhone:
    Type: String
    Description: 'Business contact phone number'
    MinLength: 7
  MappingTemplate:
    Type: String
    Description: 'JSON mapping template for X12_214 to JSON transformation'
    Default: |
      {
        "shipment_status": {
          "transaction_set": "${/ST[01]}",
          "reference_number": "${/ST[02]}",
          "shipments": [
            {
              "pro_number": "${/B4[01]}",
              "status_code": "${/L11[01]}",
              "status_date": "${/L11[02]}"
            }
          ]
        }
      }
Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  TransferRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: transfer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TransferS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${InputBucketName}'
                  - !Sub 'arn:aws:s3:::${InputBucketName}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OutputBucketName}/*'

  B2BPartner:
    Type: AWS::Transfer::Partner
    Properties:
      ProfileType: LOCAL
      BusinessObjects:
        - BusinessIdentity:
            Id: !Ref CompanyEdiId
            Qualifier: LOCAL
          Contact:
            Name: !Ref BusinessName
            Email: !Ref BusinessEmail
            Phone: !Ref BusinessPhone

  EdiTransformer:
    Type: AWS::Transfer::Transformer
    Properties:
      Type: INPUT
      FileFormat: EDI_X12
      MappingTemplate: !Ref MappingTemplate
      Input:
        S3StorageConfig:
          Bucket: !Ref InputBucketName
          Role: !GetAtt TransferRole.Arn
      Output:
        S3StorageConfig:
          Bucket: !Ref OutputBucketName
          Role: !GetAtt TransferRole.Arn
      ProfileId: !Ref B2BPartner
Outputs:
  InputBucketName:
    Description: 'Name of the input S3 bucket for raw EDI files'
    Value: !Ref InputBucketName
  OutputBucketName:
    Description: 'Name of the output S3 bucket for transformed JSON'
    Value: !Ref OutputBucketName
  PartnerId:
    Description: 'ID of the B2B partner profile'
    Value: !Ref B2BPartner
  TransformerId:
    Description: 'ID of the EDI transformation resource'
    Value: !Ref EdiTransformer
  RoleArn:
    Description: 'ARN of the IAM role used for S3 access'
    Value: !GetAtt TransferRole.Arn