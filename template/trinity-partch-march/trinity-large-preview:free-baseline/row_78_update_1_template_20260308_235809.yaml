AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS EC2 IP Address Manager (IPAM)

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IP Address Manager for managing IP address allocation

Outputs:
  IPAMARN:
    Description: The Amazon Resource Name (ARN) of the IPAM
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IPAM-ARN"

  IPAMID:
    Description: The ID of the IPAM
    Value: !Ref IPAM
    Export:
      Name: !Sub "${AWS::StackName}-IPAM-ID"

  DefaultPublicScopeID:
    Description: The ID of the default public scope
    Value: !GetAtt IPAM.PublicDefaultScopeId
    Export:
      Name: !Sub "${AWS::StackName}-Public-Scope-ID"

  DefaultPrivateScopeID:
    Description: The ID of the default private scope
    Value: !GetAtt IPAM.PrivateDefaultScopeId
    Export:
      Name: !Sub "${AWS::StackName}-Private-Scope-ID"