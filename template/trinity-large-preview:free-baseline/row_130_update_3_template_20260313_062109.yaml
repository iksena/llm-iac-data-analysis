AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create and manage AWS account-wide IAM password policy with customizable security requirements.

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum length of the password policy (6-128 characters)
  RequireUppercaseCharacters:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether to require at least one uppercase character
  RequireLowercaseCharacters:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether to require at least one lowercase character
  RequireNumbers:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether to require at least one number
  RequireSymbols:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether to require at least one non-alphanumeric character
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Number of days before password expiration (1-1095 days)
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to prevent reuse (1-24)
  AllowUsersToChangePassword:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Whether users can change their own passwords
  PermissionBoundaryArn:
    Type: String
    Default: ""
    Description: Optional IAM permission boundary ARN to apply to IAM users

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          iam_client = boto3.client('iam')

          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      params = event['ResourceProperties']
                      iam_client.update_account_password_policy(
                          MinimumPasswordLength=int(params['MinimumPasswordLength']),
                          RequireUppercaseCharacters=params['RequireUppercaseCharacters'].lower() == 'true',
                          RequireLowercaseCharacters=params['RequireLowercaseCharacters'].lower() == 'true',
                          RequireNumbers=params['RequireNumbers'].lower() == 'true',
                          RequireSymbols=params['RequireSymbols'].lower() == 'true',
                          MaxPasswordAge=int(params['MaxPasswordAge']),
                          PasswordReusePrevention=int(params['PasswordReusePrevention']),
                          AllowUsersToChangePassword=params['AllowUsersToChangePassword'].lower() == 'true'
                      )
                  elif event['RequestType'] == 'Delete':
                      iam_client.delete_account_password_policy()

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt PasswordPolicyLambda.Arn
  LambdaExecutionRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn