AWSTemplateFormatVersion: '2010-09-09'
Description: Enables AWS Security Hub with default standards handling existing configurations
Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true
      ControlFindingGenerator: SECURITY_CONTROL

  StandardsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:EnableStandards
                  - securityhub:DisableStandards
                  - securityhub:DescribeStandards
                Resource: '*'

  StandardsLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt StandardsLambdaRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          
          securityhub = boto3.client('securityhub')
          
          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                      
                  standard_arn = event['ResourceProperties']['StandardArn']
                  response = securityhub.describe_standards()
                  
                  # Check if standard is already enabled
                  subscriptions = securityhub.get_enabled_standards()['StandardsSubscriptions']
                  existing = [s for s in subscriptions if s['StandardsArn'] == standard_arn]
                  
                  if not existing:
                      securityhub.batch_enable_standards(StandardsSubscriptionRequests=[{'StandardsArn': standard_arn}])
                      
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  CISStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 'arn:aws:securityhub:${AWS::Region}::standards/cis-aws-foundations-benchmark/v/1.4.0'
    DependsOn: SecurityHub

  AWSFoundationalStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 'arn:aws:securityhub:${AWS::Region}::standards/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

  PCIStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 'arn:aws:securityhub:${AWS::Region}::standards/pci-dss/v/3.2.1'
    DependsOn: SecurityHub