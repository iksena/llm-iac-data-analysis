AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
    Metadata:
      Effect: versioned

  MySNSTopic:
    Type: AWS::SNS::Topic
    Properties: {}
    Metadata:
      Effect: []

  S3TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref MySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref MySNSTopic
            Condition:
              ArnLike:
                AWS:SourceArn: !Join
                  - ''
                  - - 'arn:aws:s3:::'
                    - !Ref MyS3Bucket

  S3BucketNotification:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Topic: !Ref MySNSTopic
            Event: s3:ObjectCreated:*

Metadata:
  Invariants:
    - SNS topic policy restricts S3 service access to specific bucket and account
    - S3 bucket sends notifications for all object creation events
    - Notification configuration links bucket events to SNS topic