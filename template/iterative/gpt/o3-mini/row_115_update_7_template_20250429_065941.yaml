AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an automated monitoring and alerting system 
  for AWS Secrets Manager lifecycle events. It utilizes EventBridge to capture Secrets Manager API calls
  (tracked via CloudTrail) and sends alerts to an SNS topic that triggers email notifications.

Parameters:
  NotificationEmail:
    Description: "Email address to receive alert notifications for critical Secrets Manager events."
    Type: String
    Default: "user@example.com"
    ConstraintDescription: "Must be a valid email address."

Resources:
  SecretsManagerAlertsSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "SecretsManager Alerts Topic"
      TopicName: "SecretsManagerAlertsTopic"

  SecretsManagerAlertsSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref SecretsManagerAlertsSNSTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "EventBridge rule to capture Secrets Manager lifecycle events and route them to SNS."
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "secretsmanager.amazonaws.com"
          eventName:
            - CreateSecret
            - UpdateSecret
            - DeleteSecret
            - RotateSecret
      State: "ENABLED"
      Targets:
        - Id: "SNSTopicTarget"
          Arn: !Ref SecretsManagerAlertsSNSTopic

  SecretsManagerSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsManagerAlertsSNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowEventBridgePublish"
            Effect: "Allow"
            Principal:
              Service: "events.amazonaws.com"
            Action: "sns:Publish"
            Resource: !Ref SecretsManagerAlertsSNSTopic
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt SecretsManagerEventRule.Arn

Outputs:
  SNSTopicARN:
    Description: "ARN of the SNS topic for Secrets Manager alerts."
    Value: !Ref SecretsManagerAlertsSNSTopic
  EventRuleARN:
    Description: "ARN of the EventBridge rule capturing Secrets Manager lifecycle events."
    Value: !GetAtt SecretsManagerEventRule.Arn