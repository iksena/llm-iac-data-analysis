AWSTemplateFormatVersion: '2010-09-09'

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: TestTopic
      Subscription:
        - Protocol: email
          Endpoint: test@test.com

Outputs:
  SNSTopicArn:
    Description: The ARN of the SNS Topic
    Value: !Ref SNSTopic