AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'kinesis-firehose-${AWS::AccountId}-${AWS::Region}'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub 'kinesis-firehose-${AWS::AccountId}-${AWS::Region}'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      DestinationConfiguration:
        S3DestinationConfiguration:
          BucketARN: !GetAtt S3Bucket.Arn
          Prefix: 'firehose/'
          ErrorOutputPrefix: 'error/'
          BufferingHints:
            SizeInMBs: 5
            IntervalInSeconds: 300
          CompressionFormat: UNCOMPRESSED
          RoleARN: !GetAtt FirehoseRole.Arn

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseServiceRolePolicy

Outputs:
  KinesisStreamARN:
    Description: Kinesis Data Stream ARN
    Value: !GetAtt KinesisDataStream.Arn
  FirehoseDeliveryStreamARN:
    Description: Kinesis Firehose DeliveryStream ARN
    Value: !Ref KinesisFirehoseDeliveryStream