AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Transit Gateway and Resource Access Manager share

Parameters:
  TransitGatewayName:
    Type: String
    Default: CentralTransitGateway
    Description: Name for the Transit Gateway
  ResourceShareName:
    Type: String
    Default: TransitGatewayShare
    Description: Name for the Resource Share
  SharedAccount:
    Type: String
    Default: '644519422710'
    Description: AWS Account ID to share the Transit Gateway with

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - Key: Name
          Value: !Ref TransitGatewayName

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: !Ref ResourceShareName
      AllowExternalPrincipals: true
      Principals:
        - !Ref SharedAccount
      Tags:
        - Key: Name
          Value: !Ref ResourceShareName

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub "${AWS::StackName}-TransitGatewayId"

  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref ResourceShare
    Export:
      Name: !Sub "${AWS::StackName}-ResourceShareId"