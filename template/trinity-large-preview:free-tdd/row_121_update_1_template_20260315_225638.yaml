AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled Automation Workflow with EventBridge Scheduler and SSM

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances

Resources:
  # IAM Role for EC2 instances with SSM and S3 access
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # SSM Document for cross-platform automation
  HelloWorldDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Cross-platform Hello World automation
        mainSteps:
          - name: executeScript
            action: aws:runShellScript
            inputs:
              runCommand:
                - echo "Hello World!"

  # Linux EC2 Instance
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyName
      Tags:
        - Key: HelloWorld
          Value: 'true'

  # Windows EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyName
      Tags:
        - Key: HelloWorld
          Value: 'true'

  # SSM Association to target tagged instances
  HelloWorldAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'

  # IAM Role for EventBridge Scheduler
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole

  # EventBridge Schedule to trigger SSM Association
  HelloWorldSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: OFF
      ScheduleExpression: rate(15 minutes)
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:send-command'
        RoleArn: !GetAtt SchedulerRole.Arn

  # S3 Bucket for logs
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'hello-world-automation-logs-${AWS::AccountId}-${AWS::Region}'

Outputs:
  InstanceIds:
    Description: IDs of the EC2 instances
    Value: !Join [',', [!Ref LinuxInstance, !Ref WindowsInstance]]
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt HelloWorldSchedule.Arn