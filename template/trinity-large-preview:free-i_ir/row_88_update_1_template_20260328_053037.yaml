AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog with S3 and Lambda permissions

Resources:
  ServiceCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ServiceCatalogPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ServiceCatalogCustomPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - servicecatalog:*
              - iam:CreateRole
              - iam:CreatePolicy
              - iam:AttachRolePolicy
              - iam:PassRole
              - lambda:CreateFunction
              - lambda:InvokeFunction
              - lambda:UpdateFunctionConfiguration
              - lambda:DeleteFunction
              - cloudformation:CreateStack
              - cloudformation:DescribeStacks
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - sns:CreateTopic
              - sns:Publish
            Resource: '*'
      Roles:
        - !Ref ServiceCatalogRole

Outputs:
  ServiceCatalogRoleArn:
    Description: ARN of the Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogRole.Arn