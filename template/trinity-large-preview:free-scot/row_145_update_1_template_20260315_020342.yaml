AWSTemplateFormatVersion: '2010-09-09'

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: BucketOwnerFullControl
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Join ['', ['arn:aws:s3:::', !Ref WebsiteBucket, '/*']]

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAC for WebsiteBucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Join ['', ['origin-access-identity/cloudfront/', !Ref OriginAccessIdentity]]
        DefaultCacheBehavior:
          ViewerProtocolPolicy: HTTPS_ONLY
          CachePolicyId: '658327ea-f89d-4fab-a63d-7e88639e58f6' # 60-second TTL cache policy
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          TargetOriginId: S3Origin
        Enabled: true
        HttpVersion: HTTP2
        PriceClass: PRICE_CLASS_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ContentManagerPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${WebsiteBucket}'
              - !Sub 'arn:aws:s3:::${WebsiteBucket}/*'
      Roles:
        - !Ref LambdaExecutionRole

  ContentManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket = event['ResourceProperties']['BucketName']

              try:
                  if event['RequestType'] == 'Create':
                      s3.put_object(
                          Bucket=bucket,
                          Key='index.html',
                          Body=b'<html><body><h1>Welcome to our secure static website!</h1></body></html>',
                          ContentType='text/html'
                      )
                  elif event['RequestType'] == 'Delete':
                      objects = s3.list_objects_v2(Bucket=bucket)
                      if 'Contents' in objects:
                          delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects['Contents']]}
                          s3.delete_objects(Bucket=bucket, Delete=delete_keys)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, error=str(e))

  BucketInitializer:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ContentManagerLambda.Arn
      BucketName: !Ref WebsiteBucket

Outputs:
  WebsiteURL:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: CloudFront Distribution URL for the static website