AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for CloudFront distribution fronting API Gateway with mock backend

Parameters:
  APIName:
    Type: String
    Default: HelloWorldAPI
    Description: Name of the API Gateway REST API
  APIDescription:
    Type: String
    Default: API Gateway with mock backend
    Description: Description of the API Gateway
  StageName:
    Type: String
    Default: prod
    Description: Name of the deployment stage
  CacheTTL:
    Type: Number
    Default: 0
    Description: Cache TTL in seconds (0 to disable caching)

Resources:
  HelloWorldAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref APIName
      Description: !Ref APIDescription
      EndpointConfiguration:
        Types:
          - REGIONAL

  HelloWorldResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HelloWorldAPI
      ParentId: !GetAtt HelloWorldAPI.RootResourceId
      PathPart: hello

  HelloWorldMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HelloWorldAPI
      ResourceId: !Ref HelloWorldResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: '{"message": "hello world"}'
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
          ResponseParameters:
            method.response.header.Content-Type: true

  HelloWorldDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: HelloWorldMethod
    Properties:
      RestApiId: !Ref HelloWorldAPI
      Description: Deployment for production stage

  HelloWorldStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref HelloWorldAPI
      DeploymentId: !Ref HelloWorldDeployment
      StageName: !Ref StageName
      Description: Production stage
      CacheClusterEnabled: false
      TracingEnabled: false

  APIGatewayCloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: Origin access identity for API Gateway

  HelloWorldCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !Sub "${HelloWorldAPI}.execute-api.${AWS::Region}.amazonaws.com"
            Id: APIGatewayOrigin
            OriginPath: !Sub "/${StageName}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
                - TLSv1.3
        Enabled: true
        DefaultRootObject: ""
        DefaultCacheBehavior:
          TargetOriginId: APIGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: false
          ForwardedValues:
            QueryString: true
            Headers:
              - Authorization
              - Content-Type
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: !Ref CacheTTL
          MaxTTL: !Ref CacheTTL
        PriceClass: PriceClass_100
        ViewerCertificate:
          MinimumProtocolVersion: TLSv1.2_2021
          SSLSupportMethod: sni-only
        Restrictions:
          GeoRestriction:
            RestrictionType: none

Outputs:
  APIGatewayURL:
    Description: API Gateway endpoint URL for the production environment
    Value: !Sub "https://${HelloWorldAPI}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/hello"
  CloudFrontDistribution:
    Description: CloudFront distribution domain name
    Value: !GetAtt HelloWorldCloudFrontDistribution.DomainName
  CloudFrontURL:
    Description: CloudFront URL for the API
    Value: !Sub "https://${HelloWorldCloudFrontDistribution.DomainName}/hello"