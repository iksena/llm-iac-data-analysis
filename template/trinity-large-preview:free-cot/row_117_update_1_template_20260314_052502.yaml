AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: DynamoDB table name
  EventBusName:
    Type: String
    Default: OrdersEventBus
    Description: EventBridge event bus name

Resources:
  # DynamoDB Table with Streams Enabled
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # EventBridge Event Bus
  OrdersEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: !Ref EventBusName
      EventSourceName: dynamodb

  # IAM Role for Pipe Execution
  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersTable.StreamArn
        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt OrdersEventBus.Arn

  # EventBridge Pipe for INSERT Events
  DynamoDBInsertPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: DynamoDBInsertPipe
      Source:
        DynamoDBStreamParameters:
          StreamArn: !GetAtt OrdersTable.StreamArn
      Destinations:
        - EventBridgeDestination:
            EventBusName: !GetAtt OrdersEventBus.Name
      Filter:
        EventPattern:
          detail-type:
            - 'DynamoDB Stream'
          detail:
            eventName:
              - 'INSERT'
      RoleArn: !GetAtt PipeExecutionRole.Arn

  # EventBridge Pipe for MODIFY Events
  DynamoDBModifyPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: DynamoDBModifyPipe
      Source:
        DynamoDBStreamParameters:
          StreamArn: !GetAtt OrdersTable.StreamArn
      Destinations:
        - EventBridgeDestination:
            EventBusName: !GetAtt OrdersEventBus.Name
      Filter:
        EventPattern:
          detail-type:
            - 'DynamoDB Stream'
          detail:
            eventName:
              - 'MODIFY'
      RoleArn: !GetAtt PipeExecutionRole.Arn

Outputs:
  EventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !GetAtt OrdersEventBus.Arn
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref TableName
  TableStreamArn:
    Description: DynamoDB Table Stream ARN
    Value: !GetAtt OrdersTable.StreamArn