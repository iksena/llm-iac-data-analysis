AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Sub "${AWS::StackName}-recovery-cluster"

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub "${AWS::StackName}-control-panel"
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControl1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.Arn
      Name: !Sub "${AWS::StackName}-routing-control-1"

  RoutingControl2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.Arn
      Name: !Sub "${AWS::StackName}-routing-control-2"

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Sub "${AWS::StackName}-safety-rule"
      ControlPanelArn: !GetAtt ControlPanel.Arn
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
      SafetyRuleType: AVAILABILITY
      WaitPeriodMs: 0
      RoutingControls:
        - !GetAtt RoutingControl1.RoutingControlArn
        - !GetAtt RoutingControl2.RoutingControlArn

  HealthCheck1:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: /health
      Tags:
        - Key: routingControlArn
          Value: !GetAtt RoutingControl1.RoutingControlArn

  HealthCheck2:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: /health
      Tags:
        - Key: routingControlArn
          Value: !GetAtt RoutingControl2.RoutingControlArn