AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge configuration for routing custom events to external API endpoint'

Parameters:
  ApiEndpoint:
    Type: String
    Description: 'External API endpoint URL'
    Default: 'https://webhook.site/testtest'

  ApiKeyValue:
    Type: String
    Description: 'API Key for authentication'
    NoEcho: true

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-custom-bus
      
  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: 'Connection with API key authentication'
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'x-api-key'
          ApiKeyValue: !Ref ApiKeyValue
      Name: !Sub ${AWS::StackName}-connection

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      Description: 'API destination for external endpoint'
      InvocationEndpoint: !Ref ApiEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300
      Name: !Sub ${AWS::StackName}-api-destination

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      Description: 'Route custom events to API destination'
      EventPattern:
        source:
          - custom.events
      Name: !Sub ${AWS::StackName}-rule
      State: ENABLED
      Targets:
        - Id: ApiDestinationTarget
          Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the custom event bus'
    Value: !GetAtt CustomEventBus.Arn

  ApiDestinationArn:
    Description: 'ARN of the API destination'
    Value: !GetAtt ApiDestination.Arn

  ConnectionArn:
    Description: 'ARN of the connection'
    Value: !GetAtt EventBridgeConnection.Arn

  EventBusName:
    Description: 'Name of the custom event bus'
    Value: !Ref CustomEventBus