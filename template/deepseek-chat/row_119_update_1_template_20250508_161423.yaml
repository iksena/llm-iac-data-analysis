AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge to Kinesis integration'

Parameters:
  EventBusName:
    Type: String
    Default: 'default'
    Description: 'Name of the EventBridge event bus'
  
  KinesisStreamName:
    Type: String
    Default: 'ApplicationEventsStream'
    Description: 'Name of the Kinesis data stream'
  
  ShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards for the Kinesis stream'
  
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: 'Data retention period in hours for the Kinesis stream'
    MinValue: 24
    MaxValue: 8760

Resources:
  KinesisStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours
      StreamEncryption:
        EncryptionType: 'KMS'
        KeyId: 'alias/aws/kinesis'

  EventBridgeRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'events.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'PutToKinesis'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action: 'kinesis:PutRecord'
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: 'AWS::Events::Rule'
    Properties:
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - 'my-application'
      State: 'ENABLED'
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: 'KinesisTarget'
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  KinesisStreamArn:
    Description: 'ARN of the Kinesis data stream'
    Value: !GetAtt KinesisStream.Arn
  
  EventBusArn:
    Description: 'ARN of the EventBridge event bus'
    Value: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
  
  EventBridgeRoleArn:
    Description: 'ARN of the IAM role for EventBridge'
    Value: !GetAtt EventBridgeRole.Arn