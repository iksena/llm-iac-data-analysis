AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: "123456789012"
    AllowedPattern: "^[0-9]{12}$"
    Description: AWS Account ID for Identity Management Account
  TrustedToolingManagementAccount:
    Type: String
    Default: "234567890123"
    AllowedPattern: "^[0-9]{12}$"
    Description: AWS Account ID for Tooling Management Account
  Environment:
    Type: String
    Default: "development"
    AllowedValues:
      - development
      - production
    Description: Deployment environment

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdminGroup
      Policies:
        - PolicyName: AssumePrivilegedAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !GetAtt PrivilegedAdminRole.Arn

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdminGroup
      Policies:
        - PolicyName: AssumeRestrictedAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !GetAtt RestrictedAdminRole.Arn

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdminGroup
      Policies:
        - PolicyName: AssumeIdentityAdminRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !GetAtt IdentityAdminRole.Arn

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: accounts.google.com
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Policies:
        - PolicyName: MFARequiredForSensitiveActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                NotAction:
                  - iam:*
                  - organizations:*
                  - sts:*
                Resource: "*"
                Condition:
                  Bool:
                    aws:MultiFactorAuthPresent: false

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: accounts.google.com
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: RestrictedOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - aws-portal:*
                  - cloudhsm:*
                Resource: "*"

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: accounts.google.com
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Policies:
        - PolicyName: IdentityManagementAccountRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: iam:*
                Resource: "*"
                Condition:
                  StringNotEquals:
                    aws:PrincipalAccount: !Ref TrustedIdentityManagementAccount

  CrossAccountTrustRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountTrustRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Policies:
        - PolicyName: CloudFormationStackManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PassRole
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource: "*"

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationStackSetExecutionRole

  CloudFormationInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref CloudFormationExecutionRole

Conditions:
  EnvironmentEqualsProduction:
    Fn::Equals:
      - !Ref Environment
      - "production"