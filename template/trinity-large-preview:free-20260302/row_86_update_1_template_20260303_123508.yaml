AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS GuardDuty detector for continuous security monitoring of EC2 instances.

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES

Outputs:
  GuardDutyDetectorId:
    Description: The ID of the created GuardDuty detector
    Value: !Ref GuardDutyDetector
    Export:
      Name: GuardDutyDetectorId