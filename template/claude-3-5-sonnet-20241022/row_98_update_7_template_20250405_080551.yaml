AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for TodoApp Amplify deployment'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[A-Za-z0-9-]+'
  
  Repository:
    Type: String
    Description: Repository URL for the application
    Default: https://github.com/username/repository
    MinLength: 1

  AccessToken:
    Type: String
    Description: GitHub personal access token
    NoEcho: true
    MinLength: 1

  BranchName:
    Type: String
    Description: Name of the branch to deploy
    Default: production
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[A-Za-z0-9-/_]+'

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      OauthToken: !Ref AccessToken
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      Platform: WEB

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyAppURL:
    Description: Amplify Application URL
    Value: !Sub https://${BranchName}.${AmplifyApp.DefaultDomain}

  BranchName:
    Description: Branch Name
    Value: !Ref BranchName