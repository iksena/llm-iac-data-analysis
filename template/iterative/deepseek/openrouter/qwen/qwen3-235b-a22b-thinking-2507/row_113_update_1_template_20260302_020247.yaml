AWSTemplateFormatVersion: '2010-09-09'
Resources:
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: DemoCLIEventNotifications
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Captures demo.cli events and forwards to SNS
      EventPattern:
        source:
          - demo.cli
      Targets:
        - Id: SnsNotificationTarget
          Arn: !Ref NotificationTopic
  SnsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref NotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref NotificationTopic
Outputs:
  SnsTopicArn:
    Description: ARN of the SNS topic for demo.cli events
    Value: !Ref NotificationTopic
  EventRuleArn:
    Description: ARN of the EventBridge rule capturing demo.cli events
    Value: !GetAtt EventBridgeRule.Arn