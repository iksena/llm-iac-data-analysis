AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EventBridge integration with DataDog for centralized log forwarding.

Parameters:
  DataDogApiKey:
    Type: String
    Description: The API key for DataDog.
    NoEcho: true

Resources:
  DataDogApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: DataDogApiKey
      SecretString: !Ref DataDogApiKey

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppEventBus

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDLQ

  DataDogApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: !Ref DataDogApiKeySecret

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogApiDestination
      ConnectionArn: !GetAtt DataDogApiConnection.Arn
      InvocationEndpoint: 'https://http-intake.logs.datadoghq.com'
      HttpMethod: POST

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: MyDataDogAppRule
      EventBusName: !Ref EventBridgeEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Id: DataDogApiDestinationTarget
          Arn: !Ref DataDogApiDestination
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge Event Bus
    Value: !GetAtt EventBridgeEventBus.Arn

  DeadLetterQueueUrl:
    Description: The URL of the Dead Letter Queue
    Value: !Ref DeadLetterQueue

  EventBridgeRoleArn:
    Description: The ARN of the IAM Role for EventBridge
    Value: !GetAtt EventBridgeRole.Arn