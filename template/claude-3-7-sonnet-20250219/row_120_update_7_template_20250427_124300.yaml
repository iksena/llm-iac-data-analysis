AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch job processing pipeline with SQS and Lambda'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the Batch compute environment will be created

  PrivateSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the Batch compute environment (minimum of 2 recommended)

  ContainerImage:
    Type: String
    Description: URI of the container image to use for the Batch job
    Default: amazon/amazon-ecs-sample

  InstanceTypes:
    Type: CommaDelimitedList
    Description: Instance types to use for the Batch compute environment
    Default: optimal

  MinvCpus:
    Type: Number
    Description: Minimum number of vCPUs for the Batch compute environment
    Default: 0
    MinValue: 0

  MaxvCpus:
    Type: Number
    Description: Maximum number of vCPUs for the Batch compute environment
    Default: 16
    MinValue: 1

  JobMemory:
    Type: Number
    Description: Memory (in MiB) required for the Batch job
    Default: 2048
    MinValue: 4

  JobvCpus:
    Type: Number
    Description: vCPUs required for the Batch job
    Default: 1
    MinValue: 1

  MessageRetentionPeriod:
    Type: Number
    Description: SQS message retention period in seconds
    Default: 345600  # 4 days
    MinValue: 60
    MaxValue: 1209600  # 14 days

Resources:
  # IAM Roles
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Security Group
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Batch compute environment
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # SQS Queue
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: 300  # 5 minutes
      Tags:
        - Key: Name
          Value: EventDrivenBatchQueue

  # AWS Batch Resources
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      State: ENABLED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: !Ref MinvCpus
        MaxvCpus: !Ref MaxvCpus
        InstanceTypes: !Ref InstanceTypes
        Subnets: !Ref PrivateSubnets
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        InstanceRole: !GetAtt BatchInstanceProfile.Arn
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        Tags:
          Name: BatchComputeEnvironment

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/batch/job/${AWS::StackName}
      RetentionInDays: 14

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Memory: !Ref JobMemory
        Vcpus: !Ref JobvCpus
        ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref BatchLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: batch
      RetryStrategy:
        Attempts: 3
      Timeout:
        AttemptDurationSeconds: 900  # 15 minutes

  # Lambda function to poll SQS and submit Batch jobs
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BatchJobSubmission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource:
                  - !Sub "arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}"
                  - !Sub "arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-definition/${BatchJobDefinition}"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EventQueue.Arn

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-processor
      RetentionInDays: 14

  SQSPollerFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-processor"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Timeout: 60
      Environment:
        Variables:
          BATCH_JOB_QUEUE: !Ref BatchJobQueue
          BATCH_JOB_DEFINITION: !Ref BatchJobDefinition
          JOB_NAME_PREFIX: !Sub "${AWS::StackName}-job"
      Code:
        ZipFile: |
          const { BatchClient, SubmitJobCommand } = require('@aws-sdk/client-batch');
          const batchClient = new BatchClient();
          
          exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event, null, 2));
            
            for (const record of event.Records) {
              try {
                const messageBody = JSON.parse(record.body);
                console.log('Processing message:', JSON.stringify(messageBody, null, 2));
                
                const jobName = `${process.env.JOB_NAME_PREFIX}-${Date.now()}`;
                const params = {
                  jobName: jobName,
                  jobQueue: process.env.BATCH_JOB_QUEUE,
                  jobDefinition: process.env.BATCH_JOB_DEFINITION,
                  parameters: {
                    messageId: record.messageId,
                    messageBody: JSON.stringify(messageBody)
                  }
                };
                
                const command = new SubmitJobCommand(params);
                const response = await batchClient.send(command);
                console.log('Job submitted successfully:', response);
              } catch (error) {
                console.error('Error processing message:', error);
                // Don't throw the error to allow processing of other messages
                // and to prevent the message from being returned to the queue
              }
            }
            
            return { statusCode: 200, body: 'Processing complete' };
          };

  SQSEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      Enabled: true
      EventSourceArn: !GetAtt EventQueue.Arn
      FunctionName: !Ref SQSPollerFunction

Outputs:
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref EventQueue

  QueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn

  BatchJobQueueName:
    Description: Name of the Batch job queue
    Value: !Ref BatchJobQueue

  BatchJobDefinitionName:
    Description: Name of the Batch job definition
    Value: !Ref BatchJobDefinition

  LambdaFunctionName:
    Description: Name of the Lambda function that processes SQS messages
    Value: !Ref SQSPollerFunction