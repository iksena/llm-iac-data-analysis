AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon EFS file system with an associated mount target.
  The file system is intended for a testing environment with shared storage in the us-east-1a availability zone.

Parameters:
  MountTargetSubnetId:
    Description: The subnet ID in the us-east-1a availability zone where the EFS mount target will be created.
    Type: AWS::EC2::Subnet::Id
  MountTargetSecurityGroupId:
    Description: The security group ID for controlling access to the EFS mount target.
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIa: AFTER_14_DAYS

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    DependsOn: EfsFileSystem
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref MountTargetSubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created Amazon EFS file system.
    Value: !Ref EfsFileSystem
  MountTargetId:
    Description: The ID of the created EFS mount target.
    Value: !Ref EfsMountTarget