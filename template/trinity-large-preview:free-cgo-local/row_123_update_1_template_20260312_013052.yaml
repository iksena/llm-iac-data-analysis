AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API for automated product creation

Parameters:
  StripeApiKey:
    Type: String
    Description: Stripe API key for authentication
    Default: 'sk_test_dummykey'
    NoEcho: true

Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus

  StripeApiDestinationConnection:
    Type: AWS::Events::ApiDestinationConnection
    Properties:
      Name: StripeApiConnection
      AuthorizationType: API_KEY
      ApiKeyName: Authorization
      ApiKey: !Ref StripeApiKey
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductApiDestination
      ConnectionArn: !GetAtt StripeApiDestinationConnection.Arn
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  PartnerAppEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref PartnerAppEventBus
      EventPattern:
        source:
          - PartnerApp
        detail-type:
          - PartnerAppDetailType
      Targets:
        - Arn: !GetAtt StripeApiDestination.Arn
          Id: StripeProductTarget

Outputs:
  EventBusName:
    Description: EventBridge bus name
    Value: !Ref PartnerAppEventBus
  ApiDestinationArn:
    Description: Stripe API destination ARN
    Value: !GetAtt StripeApiDestination.Arn