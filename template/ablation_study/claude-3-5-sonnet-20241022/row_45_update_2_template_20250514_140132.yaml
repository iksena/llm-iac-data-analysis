AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template for Kinesis Firehose with encryption and CloudWatch logging'

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}'
      RetentionInDays: 14

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'ErrorLogging'

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: 
                  - !Sub ${FirehoseLogGroup.Arn}
                  - !Sub ${FirehoseLogGroup.Arn}:*
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*'
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::${DeliveryBucket}'
                  - !Sub 'arn:aws:s3:::${DeliveryBucket}/*'

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn: 
      - FirehoseRole
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${DeliveryBucket}'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream
        ProcessingConfiguration:
          Enabled: false

Parameters:
  DeliveryBucket:
    Type: String
    Description: 'Name of the S3 bucket for Firehose delivery'

Outputs:
  FirehoseStreamName:
    Description: 'Name of the Kinesis Firehose Delivery Stream'
    Value: !Ref FirehoseStream

  FirehoseStreamArn:
    Description: 'ARN of the Kinesis Firehose Delivery Stream'
    Value: !GetAtt FirehoseStream.Arn

  LogGroupName:
    Description: 'Name of the CloudWatch Log Group'
    Value: !Ref FirehoseLogGroup