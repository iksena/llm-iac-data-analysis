AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-kernel-5.10-hvm-2.0-x86_64-gp2'
      KeyName: !Ref KeyPair
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
        - DeviceName: /dev/xvdb
          VirtualName: ephemeral0
        - DeviceName: /dev/xvdc
          VirtualName: ephemeral1
      InstanceType: t3.micro
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !ImportValue DefaultSubnetID

  KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref KeyPairName

Parameters:
  KeyPairName:
    Type: String
    Default: default-key
    Description: Name of the SSH key pair to create for EC2 access

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance