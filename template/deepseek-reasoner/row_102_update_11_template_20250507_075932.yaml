AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda function code
    Default: lambda-code-bucket
  AssessmentLambdaKey:
    Type: String
    Description: S3 key for risk assessment Lambda code
    Default: assessment-v1.zip
  ResponseLambdaKey:
    Type: String
    Description: S3 key for risk response Lambda code
    Default: response-v1.zip
  KMSKeyARN:
    Type: String
    Description: ARN of KMS key used for S3 object encryption (if applicable)
    Default: ""

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-LambdaDynamoDBAccess"
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
            Resource: !GetAtt RiskManagementTable.Arn

  LambdaS3AccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-LambdaS3Access"
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${LambdaCodeBucket}"
              - !Sub "arn:aws:s3:::${LambdaCodeBucket}/*"
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: !If [HasKMSKey, !Ref KMSKeyARN, "*"]

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    DependsOn: 
      - LambdaDynamoDBPolicy
      - LambdaS3AccessPolicy
    Properties:
      Runtime: python3.9
      Timeout: 30
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref AssessmentLambdaKey
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  RiskResponseFunction:
    Type: AWS::Lambda::Function
    DependsOn: 
      - LambdaDynamoDBPolicy
      - LambdaS3AccessPolicy
    Properties:
      Runtime: python3.9
      Timeout: 30
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref ResponseLambdaKey
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-RiskAlertsTopic"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSMOpsCenterPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Conditions:
  HasKMSKey: !Not [!Equals [!Ref KMSKeyARN, ""]]

Outputs:
  DynamoDBTableName:
    Value: !Ref RiskManagementTable
  RiskAssessmentLambdaARN:
    Value: !GetAtt RiskAssessmentFunction.Arn
  RiskResponseLambdaARN:
    Value: !GetAtt RiskResponseFunction.Arn
  NotificationTopicARN:
    Value: !Ref RiskNotificationTopic
  LambdaRoleARN:
    Value: !GetAtt LambdaExecutionRole.Arn