AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DemoTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Demo CLI Events Topic
  DemoTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref DemoTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref DemoTopic
  DemoEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for demo.cli events
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref DemoTopic
          Id: DemoTopicTarget
Outputs:
  DemoTopicArn:
    Description: SNS Topic ARN for demo.cli events
    Value: !Ref DemoTopic
    Export:
      Name: DemoTopicArn