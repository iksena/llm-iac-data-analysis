AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog to provision S3 and Lambda resources

Resources:
  ServiceCatalogProvisioningRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalog-ProvisioningRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambdaFullAccess
      Policies:
        - PolicyName: ServiceCatalogOperationsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:CreateProvisionedProductPlan
                  - servicecatalog:DeleteProvisionedProductPlan
                  - servicecatalog:ListProvisionedProductPlans
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:TerminateProvisionedProduct
                  - servicecatalog:UpdateProvisionedProduct
                Resource: '*'

        - PolicyName: IAMManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                Resource: '*'

        - PolicyName: LambdaLifecyclePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:GetFunction
                  - lambda:ListFunctions
                Resource: '*'

        - PolicyName: CloudFormationOperationsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: '*'

        - PolicyName: SNSIntegrationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Publish
                  - sns:ListTopics
                Resource: '*'

Outputs:
  ServiceCatalogProvisioningRoleArn:
    Description: ARN of the Service Catalog Provisioning Role
    Value: !GetAtt ServiceCatalogProvisioningRole.Arn
    Export:
      Name: ServiceCatalog-ProvisioningRoleArn