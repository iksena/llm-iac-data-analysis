AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      MaximumMessageSize: 262144
      DelaySeconds: 0
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
Outputs:
  QueueURL:
    Description: URL of the created SQS Queue
    Value: !Ref SQSQueue