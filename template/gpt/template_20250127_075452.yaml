AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS queue with basic configuration.
Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyBasicQueue
Outputs:
  QueueURL:
    Description: The URL of the created SQS queue
    Value: !Ref MySQSQueue