AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR block
  SubnetACidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR for subnet A
  SubnetBCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for subnet B
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues: [generalPurpose, maxIO]
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues: [bursting, provisioned]
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 50
    Description: Required if ThroughputMode=provisioned (1-1024)
  EnableBackups:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  BackupScheduleExpression:
    Type: String
    Default: cron(0 12 * * ? *)
  BackupRetentionDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
  BurstCreditBalanceThreshold:
    Type: Number
    Default: 1000000000
  PercentIOLimitThreshold:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 100
  ThroughputThresholdBytes:
    Type: Number
    Default: 104857600
    Description: Threshold in bytes

Conditions:
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, provisioned]
  IsBackupEnabled: !Equals [!Ref EnableBackups, 'true']

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetACidr
      AvailabilityZone: !Select [0, !GetAZs '']

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs '']

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref AWS::NoValue]

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS security group allowing NFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidr

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetA
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetB
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "EFS burst credits below threshold"
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ComparisonOperator: LessThanThreshold
      Threshold: !Ref BurstCreditBalanceThreshold
      EvaluationPeriods: 1
      Period: 300
      Statistic: Average
      TreatMissingData: notBreaching

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "EFS IO utilization exceeded"
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Threshold: !Ref PercentIOLimitThreshold
      EvaluationPeriods: 5
      Period: 60
      Statistic: Average
      TreatMissingData: missing

  ThroughputThresholdAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "EFS throughput exceeded threshold"
      Namespace: AWS/EFS
      MetricName: TotalThroughput
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Threshold: !Ref ThroughputThresholdBytes
      EvaluationPeriods: 1
      Period: 60
      Statistic: Average
      TreatMissingData: ignore

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub "EFSBackupVault-${AWS::StackName}"

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "EFSBackupPlan-${AWS::StackName}"
        BackupPlanRule:
          - RuleName: DailyBackups
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupScheduleExpression
            Lifecycle:
              DeleteAfterDays: !Ref BackupRetentionDays

  BackupRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: "EFSBackupSelection"
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt EFSFileSystem.Arn

Outputs:
  EFSFileSystemId:
    Value: !Ref EFSFileSystem
  EFSArn:
    Value: !GetAtt EFSFileSystem.Arn
  EFSSecurityGroupId:
    Value: !Ref EFSSecurityGroup
  VPCId:
    Value: !Ref VPC
  SubnetIds:
    Value: !Join [",", [!Ref SubnetA, !Ref SubnetB]]
  BackupPlanArn:
    Condition: IsBackupEnabled
    Value: !Ref BackupPlan