AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for a serverless ECS cluster using Fargate

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the ECS cluster will be deployed
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for Fargate tasks
  
  ClusterName:
    Type: String
    Description: Name for the ECS cluster
    Default: FargateCluster
    MinLength: 1
    MaxLength: 255

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ecs-tasks.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ContainerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ClusterName}'
      RetentionInDays: 7

Outputs:
  ClusterName:
    Description: The name of the ECS Cluster
    Value: !Ref ClusterName
  
  ExecutionRoleArn:
    Description: The ARN of the ECS task execution role
    Value: !GetAtt TaskExecutionRole.Arn
  
  LogGroupName:
    Description: The name of the CloudWatch Log Group for container logs
    Value: !Ref ContainerLogGroup