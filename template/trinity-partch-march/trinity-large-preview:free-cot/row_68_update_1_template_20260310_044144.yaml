AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with CloudWatch and SSM Integration for EC2 Instances

Parameters:
  RoleName:
    Type: String
    Default: CloudWatchSSMIAMRole
    Description: Name of the IAM role to create

Resources:
  CloudWatchSSMIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  CloudWatchSSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${RoleName}-InstanceProfile
      Roles:
        - !Ref CloudWatchSSMIAMRole

Outputs:
  IAMRoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt CloudWatchSSMIAMRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-IAMRoleArn

  InstanceProfileName:
    Description: Name of the created instance profile
    Value: !Ref CloudWatchSSMInstanceProfile
    Export:
      Name: !Sub ${AWS::StackName}-InstanceProfileName