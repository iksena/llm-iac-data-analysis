AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS GuardDuty detector for continuous security monitoring
  of malicious activity in EC2 instances.

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      # Optional: Set the finding publishing frequency if desired.
      # FindingPublishingFrequency: FIFTEEN_MINUTES

Outputs:
  DetectorId:
    Description: "The ID of the GuardDuty Detector created."
    Value: !Ref GuardDutyDetector