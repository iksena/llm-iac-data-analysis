AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to manage AWS Security Hub controls via a Lambda function.

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to disable CIS 1.4.0 controls.

  PermissionsBoundary:
    Type: String
    Default: ''
    Description: Optional permissions boundary for the IAM role.

  LogRetentionInDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Retention period for CloudWatch Logs in days.

Resources:
  SecurityHubLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecurityHubLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateStandardsControl
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref 'AWS::NoValue'

  SecurityHubLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${SecurityHubLambdaFunction}'
      RetentionInDays: !Ref LogRetentionInDays

  SecurityHubLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt SecurityHubLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os

          def handler(event, context):
              client = boto3.client('securityhub')
              disable_cis_140 = os.environ['DISABLE_CIS_140_CONTROLS'] == 'true'
              
              # Example logic to update controls
              if disable_cis_140:
                  # Logic to disable specific CIS 1.4.0 controls
                  pass
              else:
                  # Logic to enable specific CIS 1.4.0 controls
                  pass

          return {'status': 'completed'}
      Runtime: python3.8
      Environment:
        Variables:
          DISABLE_CIS_140_CONTROLS: !Ref DisableCIS140Controls
      Timeout: 60

Outputs:
  LambdaFunctionARN:
    Description: ARN of the Security Hub Lambda function
    Value: !GetAtt SecurityHubLambdaFunction.Arn

  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref SecurityHubLambdaLogGroup

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, '']]