AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights widgets for NAT Gateway monitoring

Resources:
  TopSourceIPsByOutboundTrafficQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsByOutboundTraffic
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::Region}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'ACCEPT' and destinationPort != 22
        | stats sum(bytes) as bytes by srcAddr
        | sort bytes desc
        | limit 10

  TopSourceIPsByRejectedConnectionsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsByRejectedConnections
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::Region}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count() as rejected by srcAddr
        | sort rejected desc
        | limit 10

  TopDestinationIPsByOutboundTrafficQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPsByOutboundTraffic
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::Region}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'ACCEPT' and destinationPort != 22
        | stats sum(bytes) as bytes by dstAddr
        | sort bytes desc
        | limit 10

  TopDestinationIPsByRejectedConnectionsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPsByRejectedConnections
      LogGroupNames:
        - !Sub 'vpc-flow-logs-${AWS::Region}'
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count() as rejected by dstAddr
        | sort rejected desc
        | limit 10

  VPCFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: VPCFlowLogsNATGatewayDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${TopSourceIPsByOutboundTrafficQuery}' | stats sum(bytes) as bytes by srcAddr | sort bytes desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Source IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${TopSourceIPsByRejectedConnectionsQuery}' | stats count() as rejected by srcAddr | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Source IPs by Rejected Connections"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${TopDestinationIPsByOutboundTrafficQuery}' | stats sum(bytes) as bytes by dstAddr | sort bytes desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Destination IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${TopDestinationIPsByRejectedConnectionsQuery}' | stats count() as rejected by dstAddr | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Destination IPs by Rejected Connections"
              }
            }
          ]
        }