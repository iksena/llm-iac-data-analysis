AWSTemplateFormatVersion: '2010-09-09'
Description: EMR Serverless environment with S3 bucket and IAM permissions

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket to store scripts and data
    AllowedPattern: ^[a-z0-9-.]{3,63}$
    ConstraintDescription: Bucket name must follow S3 naming rules
  ApplicationName:
    Type: String
    Description: Name for the EMR Serverless application
    Default: spark-emr-serverless-app

Resources:
  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EMRServerlessServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
      Path: /

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    DependsOn: EMRServerlessServiceRole
    Properties:
      Name: !Ref ApplicationName
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      MaximumCapacity:
        Cpu: 16vCPU
        Memory: 64GB
      NetworkConfiguration:
        SubnetIds:
          - !ImportValue DefaultVPC-PrivateSubnet-1
        SecurityGroupIds:
          - !ImportValue DefaultVPC-DefaultSecurityGroup
      RuntimeRole: !GetAtt EMRServerlessServiceRole.Arn

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref BucketName
    Export:
      Name: !Sub ${AWS::StackName}-S3BucketName
  EMRServerlessAppId:
    Description: ID of the EMR Serverless application
    Value: !Ref EMRServerlessApplication
    Export:
      Name: !Sub ${AWS::StackName}-EMRServerlessAppId
  EMRServerlessRoleArn:
    Description: ARN of the IAM role for EMR Serverless
    Value: !GetAtt EMRServerlessServiceRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-EMRServerlessRoleArn