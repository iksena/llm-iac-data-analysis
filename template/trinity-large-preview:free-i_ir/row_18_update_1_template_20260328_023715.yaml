AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB Streams to EventBridge integration

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserProfiles
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: BillingMode PAY_PER_REQUEST is appropriate for this use case

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventBus

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:DescribeStream
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Ref EventBridgeBus
      Tags:
        - Key: Encryption
          Value: KMS

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeEnrichment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: '*'
      Tags:
        - Key: Encryption
          Value: KMS

  EnrichmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              detailType: 'UserProfileUpdated',
              source: 'com.example.userprofile'
            };
          };
      Timeout: 30
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref EventBridgeBus
      Tags:
        - Key: Encryption
          Value: KMS

  EventBridgePipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: DynamoDBToEventBridge
      Source: AWS::DynamoDB
      Target:
        Arn: !Ref EventBridgeBus
        RoleArn: !GetAtt PipeRole.Arn
      Enrichment:
        Type: AWS::Lambda
        Parameters:
          FunctionArn: !Ref EnrichmentFunction
          InputTemplate: |
            {
              "source": "AWS::DynamoDB",
              "detail": <input>
            }
      Filter:
        Pattern:
          detail:
            eventName:
              - MODIFY
            dynamodb:
              NewImage:
                avatarUrl:
                  endsWith: ".png"
    DependsOn:
      - DynamoDBTable
      - PipeRole
      - EnrichmentFunction
      - EventBridgeBus

Outputs:
  DynamoDBStreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBridgePipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn