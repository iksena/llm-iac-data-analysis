AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketNamePrefix:
    Type: String
    Default: cloudwatch-export
    Description: Prefix for S3 bucket name (will be combined with account/region)
  VersioningStatus:
    Type: String
    Default: Enabled
    AllowedValues: [Enabled, Suspended]
  GlacierTransitionDays:
    Type: Number
    Default: 30
    MinValue: 1
  NonCurrentExpirationDays:
    Type: Number
    Default: 365
    MinValue: 1
  MultipartUploadAbortDays:
    Type: Number
    Default: 7
    MinValue: 1
Resources:
  ExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: AutoArchiveRule
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref GlacierTransitionDays
                StorageClass: GLACIER
            NoncurrentVersionTransitions:
              - TransitionInDays: !Ref GlacierTransitionDays
                StorageClass: GLACIER
            NoncurrentVersionExpirationInDays: !Ref NonCurrentExpirationDays
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: !Ref MultipartUploadAbortDays
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action:
              - s3:GetBucketAcl
              - s3:PutObject
            Resource:
              - !GetAtt ExportBucket.Arn
              - !Sub ${ExportBucket.Arn}/*
Outputs:
  ExportBucketName:
    Value: !Ref ExportBucket
  ExportBucketArn:
    Value: !GetAtt ExportBucket.Arn