AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Number of days to retain CloudWatch Logs
  QueueName:
    Type: String
    Default: EventBridgePipesSourceQueue
    Description: Name of the SQS source queue
Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 1209600

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SourceQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgeReceive
            Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
            Resource: !GetAtt SourceQueue.Arn

  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/pipes/zipcode-enrichment-logs
      RetentionInDays: !Ref LogRetentionInDays

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ZippopotamConnection
      AuthorizationType: NONE

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: USZipCodeApi
      ConnectionArn: !Ref ApiConnection
      HttpMethod: GET
      InvocationEndpoint: https://api.zippopotam.us/us/{zipcode}
      InvocationRateLimitPerSecond: 300

  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !Ref ApiDestination
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudWatchLogsGroup.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: ZipCodeEnrichmentPipe
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt SourceQueue.Arn
      Target: !GetAtt CloudWatchLogsGroup.Arn
      Enrichment: !Ref ApiDestination
      EnrichmentParameters:
        HttpParameters:
          PathParameterValues:
            - $.body.zipcode
      InputTemplate: '{"zipcode": <$.body.zipcode>}'
Outputs:
  SourceQueueUrl:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue
  LogGroupName:
    Description: Name of the CloudWatch Logs group
    Value: !Ref CloudWatchLogsGroup
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !Ref EventBridgePipe
  ApiDestinationArn:
    Description: ARN of the API Destination
    Value: !Ref ApiDestination