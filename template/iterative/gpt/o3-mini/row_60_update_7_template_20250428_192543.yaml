AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS KMS Key for centralized encryption management,
  including a customizable alias for the key.

Parameters:
  KeyAliasSuffix:
    Type: String
    Default: centralized-encryption
    Description: >
      The alias suffix for the KMS key. The final alias will be formatted as "alias/YourValue".

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key for centralized encryption management"
      KeyUsage: ENCRYPT_DECRYPT
      Origin: AWS_KMS
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "AdminPermissions"
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${KeyAliasSuffix}"
      TargetKeyId: !Ref KMSKey

Outputs:
  KMSKeyId:
    Description: "The ID of the created KMS Key"
    Value: !Ref KMSKey
  KMSKeyArn:
    Description: "The ARN of the created KMS Key"
    Value: !GetAtt KMSKey.Arn
  KMSKeyAliasName:
    Description: "The alias of the created KMS Key"
    Value: !Sub "alias/${KeyAliasSuffix}"