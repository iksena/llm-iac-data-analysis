AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to deploy an EC2 instance with an associated Security Group that allows SSH access (port 22) in a specified VPC and Subnet."

Mappings:
  RegionMap:
    us-east-1:
      AMI: "ami-0c94855ba95c71c99"
    us-west-2:
      AMI: "ami-0bdb828fd58c52235"
    eu-west-1:
      AMI: "ami-047bb4163c506cd98"

Parameters:
  InstanceType:
    Description: "EC2 instance type"
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    ConstraintDescription: "Must be a valid EC2 instance type."
  KeyName:
    Description: "Name of an existing EC2 KeyPair to enable SSH access"
    Type: AWS::EC2::KeyPair::KeyName
  VpcId:
    Description: "VPC ID where the EC2 instance and Security Group will be deployed"
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: "Subnet ID within the specified VPC for deploying the EC2 instance"
    Type: AWS::EC2::Subnet::Id

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security Group allowing SSH access on port 22"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: "Name"
          Value: "EC2InstanceSecurityGroup"

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap 
        - RegionMap
        - !Ref "AWS::Region"
        - AMI
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: "Name"
          Value: "MyEC2Instance"

Outputs:
  InstanceId:
    Description: "The ID of the deployed EC2 instance"
    Value: !Ref MyEC2Instance
  SecurityGroupId:
    Description: "The ID of the deployed Security Group"
    Value: !Ref InstanceSecurityGroup