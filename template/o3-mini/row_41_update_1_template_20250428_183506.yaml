AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a production ready SQS Standard Queue.

Parameters:
  QueueName:
    Description: "Name of the SQS Standard Queue."
    Type: String
    Default: "MyStandardQueue"
    MinLength: 1
    MaxLength: 80
    ConstraintDescription: "Queue name must be between 1 and 80 characters."

Resources:
  StandardQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      # Additional properties can be added here if needed
      VisibilityTimeout: 30  # Visibility timeout in seconds, optional production setting

Outputs:
  QueueURL:
    Description: "URL of the created SQS queue."
    Value: !Ref StandardQueue
  QueueARN:
    Description: "ARN of the created SQS queue."
    Value: !GetAtt StandardQueue.Arn