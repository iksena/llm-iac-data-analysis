AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating a sample Lambda function'

Parameters:
  LambdaRuntime:
    Type: String
    Default: 'python3.9'
    Description: 'Runtime for Lambda function'
    AllowedValues:
      - 'python3.9'
      - 'nodejs18.x'
      - 'java11'

Resources:
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service:
                - 'lambda.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Tags:
        - Key: 'Purpose'
          Value: 'Lambda Execution'

  SampleLambdaFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn: 'LambdaExecutionRole'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-sample-function'
      Handler: 'index.handler'
      Role: !GetAtt 'LambdaExecutionRole.Arn'
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: !Ref 'LambdaRuntime'
      MemorySize: 128
      Timeout: 3
      Tags:
        - Key: 'Purpose'
          Value: 'Sample Function'

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt 'SampleLambdaFunction.Arn'

  LambdaFunctionName:
    Description: 'Name of the Lambda function'
    Value: !Ref 'SampleLambdaFunction'