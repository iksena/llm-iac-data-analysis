AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to provision a B2B Data Interchange pipeline for transforming EDI X12_214 documents into JSON.
  This template sets up S3 buckets (for input and output), a Lambda function to process and transform the data,
  and custom resources for B2BI profile (with business contact details) and transformer (with mapping logic).

Parameters:
  ContactName:
    Description: "Business contact name for the B2BI profile."
    Type: String
  ContactEmail:
    Description: "Business contact email for the B2BI profile."
    Type: String
  ContactPhone:
    Description: "Business contact phone for the B2BI profile."
    Type: String
  MappingLogic:
    Description: "Mapping logic to transform EDI X12_214 to JSON (provided as a JSON string)."
    Type: String
    Default: '{"TransactionType": "X12_214", "Mapping": {"Field1": "Value1", "Field2": "Value2"}}'

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt EDITransformerFunction.Arn

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-TransformerLambdaRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TransformerLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${InputBucket}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${OutputBucket}/*"

  EDITransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EDITransformer"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.8
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          
          s3 = boto3.client('s3')
          
          def handler(event, context):
              # Log the received event
              print("Received event: " + json.dumps(event))
              for record in event.get('Records', []):
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  try:
                      response = s3.get_object(Bucket=bucket, Key=key)
                      edi_data = response['Body'].read().decode('utf-8')
                      # Dummy transformation logic: Convert EDI text to a JSON structure
                      transformed_data = {
                          "original": edi_data,
                          "message": "This is a transformed JSON representation of the EDI X12_214 message."
                      }
                      output_bucket = os.environ.get('OUTPUT_BUCKET')
                      output_key = key.rsplit('.', 1)[0] + '.json'
                      s3.put_object(Bucket=output_bucket, Key=output_key, Body=json.dumps(transformed_data))
                      print(f"Successfully transformed and put object {output_key} into bucket {output_bucket}")
                  except Exception as e:
                      print("Error processing file {} from bucket {}. Error: {}".format(key, bucket, str(e)))
              return {"status": "completed"}
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucket

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EDITransformerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InputBucket.Arn

  B2BIHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BIHandlerRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: B2BIHandlerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  B2BIHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-B2BIHandler"
      Handler: index.handler
      Role: !GetAtt B2BIHandlerRole.Arn
      Runtime: python3.8
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import cfnresponse
          
          def handler(event, context):
              print("Received event: " + json.dumps(event))
              
              responseData = {}
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      properties = event.get('ResourceProperties', {})
                      # For B2BI profile, return an ID based on the contact details.
                      if event['ResourceType'] == 'Custom::B2BIProfile':
                          contact_info = {
                              "Name": properties.get('ContactName', ''),
                              "Email": properties.get('ContactEmail', ''),
                              "Phone": properties.get('ContactPhone', '')
                          }
                          responseData['B2BIProfileId'] = "Profile-" + contact_info["Name"].replace(" ", "")
                      # For B2BI transformer, just echo back the mapping and transformer function ARN.
                      elif event['ResourceType'] == 'Custom::B2BITransformer':
                          responseData['MappingLogic'] = properties.get('MappingLogic', '')
                          responseData['TransformerFunctionArn'] = properties.get('TransformerFunctionArn', '')
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
              except Exception as e:
                  print("Error: " + str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData)

  B2BIProfileResource:
    Type: Custom::B2BIProfile
    Properties:
      ServiceToken: !GetAtt B2BIHandlerFunction.Arn
      ContactName: !Ref ContactName
      ContactEmail: !Ref ContactEmail
      ContactPhone: !Ref ContactPhone

  B2BITransformerResource:
    Type: Custom::B2BITransformer
    Properties:
      ServiceToken: !GetAtt B2BIHandlerFunction.Arn
      MappingLogic: !Ref MappingLogic
      TransformerFunctionArn: !GetAtt EDITransformerFunction.Arn

Outputs:
  InputBucketName:
    Description: "Name of the input S3 bucket for raw EDI files."
    Value: !Ref InputBucket
  OutputBucketName:
    Description: "Name of the output S3 bucket for transformed JSON data."
    Value: !Ref OutputBucket
  EDITransformerFunctionArn:
    Description: "ARN of the Lambda function that transforms EDI to JSON."
    Value: !GetAtt EDITransformerFunction.Arn
  B2BIProfileId:
    Description: "The ID generated for the B2BI profile based on the provided contact details."
    Value: !GetAtt B2BIProfileResource.B2BIProfileId