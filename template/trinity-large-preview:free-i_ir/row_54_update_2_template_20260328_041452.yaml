AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized Amazon SNS Topic for Cross-Service Notifications and Email Alerts

Resources:
  CentralizedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralizedAlertsTopic
      DisplayName: Centralized Alerts and Events
      KmsMasterKeyId: alias/aws/sns
    Metadata:
      Effect: encrypted

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - sns:Publish
              - sns:Subscribe
              - sns:Receive
            Resource: !Ref CentralizedSNSTopic
            Condition:
              ArnLike:
                AWS:SourceArn:
                  - "arn:aws:cloudformation:*:*:*"
                  - "arn:aws:cloudwatch:*:*:*"
                  - "arn:aws:lambda:*:*:*"
                  - "arn:aws:s3:*:*:*"
                  - "arn:aws:sns:*:*:*"
    Metadata:
      Effect: secure

  EmailEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /CentralizedAlerts/EmailEndpoint
      Type: String
      Value: alerts@example.com
    Metadata:
      Effect: secure-parameter

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      TopicArn: !Ref CentralizedSNSTopic
    Metadata:
      Effect: email-subscription

Metadata:
  EffectMappings:
    encrypted: KmsMasterKeyId set to alias/aws/sns
    secure: Topic policy with service-based conditions
    email-subscription: Standard SNS subscription with email protocol
    secure-parameter: SSM Parameter Store for sensitive data