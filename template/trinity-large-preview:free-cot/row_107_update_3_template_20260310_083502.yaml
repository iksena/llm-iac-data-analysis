AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with SQS queue for HTTP-based message retrieval

Parameters:
  QueueName:
    Type: String
    Default: MessageQueue
    Description: Name of the SQS queue
  ApiGatewayName:
    Type: String
    Default: MessageRetrievalAPI
    Description: Name of the API Gateway
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage name for API Gateway

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      MaximumMessageSize: 262144

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: APIGatewaySQSAccessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: SQSAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn

  MessageRetrievalAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiGatewayName
      Description: API for retrieving messages from SQS queue

  MessagesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MessageRetrievalAPI
      ParentId: !GetAtt MessageRetrievalAPI.RootResourceId
      PathPart: messages

  MessagesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MessageRetrievalAPI
      ResourceId: !Ref MessagesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::Region}/${AWS::AccountId}/${QueueName}
          - QueueName: !Ref QueueName
        Credentials: !GetAtt APIGatewayRole.Arn
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: !Sub |
            Action=ReceiveMessage
            &Version=2012-11-05
            &MaxNumberOfMessages=1
            &WaitTimeSeconds=0
            &VisibilityTimeout=30
            &QueueUrl=https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${QueueName}

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: MessagesMethod
    Properties:
      RestApiId: !Ref MessageRetrievalAPI
      StageName: !Ref StageName

Outputs:
  QueueURL:
    Description: URL of the created SQS queue
    Value: !Ref SQSQueue
  QueueARN:
    Description: ARN of the created SQS queue
    Value: !GetAtt SQSQueue.Arn
  APIGatewayURL:
    Description: URL of the deployed API Gateway
    Value: !Sub
      - https://${APIId}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
      - APIId: !Ref MessageRetrievalAPI
        Stage: !Ref StageName