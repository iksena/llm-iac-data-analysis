AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Glue ETL Job Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name for resource tagging
  
  GlueJobName:
    Type: String
    Default: sample-convert-job
    Description: Name of the Glue ETL job
    
  GlueWorkerType:
    Type: String
    Default: G.1X
    AllowedValues:
      - G.1X
      - G.2X
    Description: Type of worker for Glue job
    
  NumberOfWorkers:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10
    Description: Number of workers for Glue job

Resources:
  GlueScriptsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  GlueServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  GlueJob:
    Type: 'AWS::Glue::Job'
    Properties:
      Command:
        Name: glueetl
        PythonVersion: '3'
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/glue_scripts/sample_convert.py'
      DefaultArguments:
        '--job-language': python
        '--continuous-log-logGroup': !Sub '/aws-glue/jobs/${GlueJobName}'
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-metrics': 'true'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      MaxRetries: 0
      Name: !Ref GlueJobName
      NumberOfWorkers: !Ref NumberOfWorkers
      Role: !GetAtt GlueServiceRole.Arn
      Timeout: 2880
      WorkerType: !Ref GlueWorkerType

Outputs:
  GlueScriptsBucketName:
    Description: Name of the S3 bucket storing Glue scripts
    Value: !Ref GlueScriptsBucket

  GlueJobName:
    Description: Name of the created Glue job
    Value: !Ref GlueJob

  GlueServiceRoleArn:
    Description: ARN of the Glue service role
    Value: !GetAtt GlueServiceRole.Arn