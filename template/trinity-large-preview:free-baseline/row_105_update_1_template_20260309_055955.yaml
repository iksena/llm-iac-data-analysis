AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for cross-service automation workflows with SSM, EC2, and monitoring permissions

Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossServiceAutomationRole
      Description: IAM Role for cross-service automation workflows with SSM, EC2, and monitoring permissions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess

Outputs:
  RoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt CrossServiceAutomationRole.Arn