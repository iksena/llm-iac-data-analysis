AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS Bedrock Agent with Lambda integration for stock price lookup'

Parameters:
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: The Bedrock foundational model ID to use for the agent
  
  AgentName:
    Type: String
    Default: StockPriceAgent
    Description: Name for the Bedrock Agent
  
  AgentDescription:
    Type: String
    Default: An agent that provides stock price information
    Description: Description for the Bedrock Agent
  
  LambdaFunctionName:
    Type: String
    Default: StockPriceLookupFunction
    Description: Name for the Lambda function that returns stock prices

Resources:
  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: /

  # IAM Role for Bedrock Agent
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: BedrockAgentLambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt StockPriceLambdaFunction.Arn
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
      Path: /

  # Lambda function that returns stock price
  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Event received:', JSON.stringify(event, null, 2));
            
            // Extract the stock symbol from the event
            const stockSymbol = event.parameters && event.parameters.stockSymbol 
              ? event.parameters.stockSymbol 
              : 'UNKNOWN';
            
            // Return a hard-coded stock price as a placeholder
            const response = {
              stockSymbol: stockSymbol,
              price: 100.00,
              currency: 'USD',
              timestamp: new Date().toISOString()
            };
            
            console.log('Response:', JSON.stringify(response, null, 2));
            return response;
          };

  # Lambda Permission for Bedrock
  LambdaPermissionForBedrock:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StockPriceLambdaFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*

  # Bedrock Agent
  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref AgentName
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      Description: !Ref AgentDescription
      IdleSessionTTLInSeconds: 1800
      Instruction: |
        You are a helpful financial assistant that provides stock price information.
        When a user asks about a stock price, use the getStockPrice action to retrieve the current price.
        Always ask for the stock symbol if the user doesn't provide it.
        Respond in a professional and concise manner.
        Format the price with the currency symbol and two decimal places.
      FoundationModel: !Ref BedrockModelId

  # Bedrock Agent Action Group
  StockPriceActionGroup:
    Type: AWS::Bedrock::AgentActionGroup
    Properties:
      AgentId: !GetAtt BedrockAgent.AgentId
      ActionGroupName: StockPriceActions
      ActionGroupExecutor:
        Lambda: !GetAtt StockPriceLambdaFunction.Arn
      Description: Action group for retrieving stock prices
      ActionGroupState: ENABLED
      ApiSchema:
        Payload: |
          {
            "openapi": "3.0.0",
            "info": {
              "title": "Stock Price API",
              "version": "1.0.0",
              "description": "API for retrieving stock prices"
            },
            "paths": {
              "/getStockPrice": {
                "post": {
                  "summary": "Get the current price of a stock",
                  "operationId": "getStockPrice",
                  "requestBody": {
                    "required": true,
                    "content": {
                      "application/json": {
                        "schema": {
                          "type": "object",
                          "required": ["stockSymbol"],
                          "properties": {
                            "stockSymbol": {
                              "type": "string",
                              "description": "The stock symbol to look up (e.g., AAPL, MSFT, AMZN)"
                            }
                          }
                        }
                      }
                    }
                  },
                  "responses": {
                    "200": {
                      "description": "Stock price information",
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "object",
                            "properties": {
                              "stockSymbol": {
                                "type": "string",
                                "description": "The stock symbol"
                              },
                              "price": {
                                "type": "number",
                                "description": "The current stock price"
                              },
                              "currency": {
                                "type": "string",
                                "description": "The currency of the price"
                              },
                              "timestamp": {
                                "type": "string",
                                "format": "date-time",
                                "description": "The timestamp when the price was retrieved"
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }

  # Bedrock Agent Alias
  BedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    DependsOn: StockPriceActionGroup
    Properties:
      AgentId: !GetAtt BedrockAgent.AgentId
      AgentAliasName: Latest
      Description: Latest version of the Stock Price Agent
      RoutingConfiguration:
        - AgentVersion: DRAFT

Outputs:
  BedrockAgentId:
    Description: ID of the created Bedrock Agent
    Value: !GetAtt BedrockAgent.AgentId
  
  BedrockAgentAliasId:
    Description: ID of the agent alias
    Value: !GetAtt BedrockAgentAlias.AgentAliasId
  
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref StockPriceLambdaFunction