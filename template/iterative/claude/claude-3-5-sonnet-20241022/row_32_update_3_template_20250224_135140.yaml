AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for creating a sample Lambda function

Parameters:
  RuntimeParameter:
    Type: String
    Default: python3.9
    AllowedValues:
      - python3.9
      - nodejs18.x
      - java11
    Description: Runtime for Lambda function

  MemorySize:
    Type: Number
    Default: 128
    MinValue: 128
    MaxValue: 10240
    Description: Memory size for Lambda function in MB

  TimeoutSeconds:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 900
    Description: Timeout for Lambda function in seconds

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: /

  SampleLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-SampleFunction
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: !Ref RuntimeParameter
      MemorySize: !Ref MemorySize
      Timeout: !Ref TimeoutSeconds
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt SampleLambdaFunction.Arn
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref SampleLambdaFunction