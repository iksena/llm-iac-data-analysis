AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      DeletionPolicy: Delete
      UpdateReplacePolicy: Delete
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - E0105
  MyEFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !ImportValue SubnetId
      SecurityGroups:
        - !ImportValue SecurityGroupId
  MyEFSFileSystemPolicy:
    Type: AWS::EFS::FileSystemPolicy
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !ImportValue IAMRoleArn
            Action:
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
            Resource: !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${MyEFSFileSystem}'
Outputs:
  FileSystemId:
    Value: !Ref MyEFSFileSystem
  FileSystemArn:
    Value: !GetAtt MyEFSFileSystem.Arn