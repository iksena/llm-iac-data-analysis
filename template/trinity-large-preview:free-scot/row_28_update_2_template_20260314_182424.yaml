AWSTemplateFormatVersion: '2010-09-09'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SecretsManagerEventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerNotificationTopic

  NotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          sns_client = boto3.client('sns')

          def handler(event, context):
              try:
                  secret_name = event['detail']['secretId']
                  event_type = event['detail-type']
                  message = {
                      'event_type': event_type,
                      'secret_name': secret_name,
                      'timestamp': event['time']
                  }
                  sns_client.publish(
                      TopicArn='{{resolve:ssm-secure:/sns/topic/arn}}',
                      Message=json.dumps(message),
                      Subject=f'Secrets Manager Event: {event_type}'
                  )
              except ClientError as e:
                  print(f"Error publishing to SNS: {e}")
      Role: !GetAtt LambdaExecutionRole.Arn

  AllowSecretsManagerInvoke:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt NotificationFunction.Arn
      Principal: secretsmanager.amazonaws.com

  TestSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /example/secret
      Description: Example secret for testing notifications
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref TestSecret
      RotationLambdaARN: !GetAtt NotificationFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  SecretCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - Secret Created
      State: ENABLED

  SecretUpdatedRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - Secret Updated
      State: ENABLED

  SecretAccessedRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - Secret Access
      State: ENABLED

  LambdaSecretsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSecretsManagerAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref TestSecret
      Roles:
        - !Ref LambdaExecutionRole

  LambdaSNSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSNSPublish
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sns:Publish
            Resource: !Ref NotificationTopic
      Roles:
        - !Ref LambdaExecutionRole

  LambdaEventsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaEventsAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - events:PutTargets
              - events:PutRule
            Resource: !Ref SecretCreatedRule
      Roles:
        - !Ref LambdaExecutionRole

Outputs:
  NotificationTopicArn:
    Description: SNS Topic ARN for Secrets Manager notifications
    Value: !Ref NotificationTopic
    Export:
      Name: SecretsManagerNotificationTopicArn

  TestSecretArn:
    Description: ARN of the test secret
    Value: !Ref TestSecret
    Export:
      Name: TestSecretArn