AWSTemplateFormatVersion: '2010-09-09'
Description: Real-time data ingestion and storage pipeline using Kinesis Data Stream and Firehose

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: RealTimeDataStream
      ShardCount: 1

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: data-ingestion-bucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref AWS::AccountId
      Path: /

  FirehosePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: FirehoseAccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:DescribeStream
              - kinesis:GetShardIterator
              - kinesis:GetRecords
              - kinesis:ListStreams
            Resource: !GetAtt KinesisDataStream.Arn
          - Effect: Allow
            Action:
              - s3:AbortMultipartUpload
              - s3:GetBucketLocation
              - s3:GetObject
              - s3:ListBucket
              - s3:PutObject
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Join ["", [!GetAtt S3Bucket.Arn, "/*"]]
      Roles:
        - !Ref FirehoseRole

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: FirehoseToS3
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      DestinationId: S3Destination
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: kinesis/
        ErrorOutputPrefix: error/
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          NoEncryptionConfig: NoEncryption
    DependsOn:
      - KinesisDataStream
      - S3Bucket
      - FirehoseRole