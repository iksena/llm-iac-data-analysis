AWSTemplateFormatVersion: '2010-09-09'
Description: AWS GuardDuty Detector for continuous security monitoring of EC2 instances

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: ONE_HOUR

Outputs:
  DetectorId:
    Description: ID of the created GuardDuty Detector
    Value: !Ref GuardDutyDetector
    Export:
      Name: GuardDutyDetectorId