AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table.

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table.
    Default: MyDynamoDBTable
    AllowedPattern: '^[a-zA-Z0-9_.-]{3,255}$'
    ConstraintDescription: Must be between 3 and 255 characters in length and can contain alphanumeric characters, underscores, periods, and hyphens.
  ReadCapacityUnits:
    Type: Number
    Description: The number of read capacity units for the table.
    Default: 5
    MinValue: 1
    MaxValue: 1000
    ConstraintDescription: Must be between 1 and 1000.
  WriteCapacityUnits:
    Type: Number
    Description: The number of write capacity units for the table.
    Default: 5
    MinValue: 1
    MaxValue: 1000
    ConstraintDescription: Must be between 1 and 1000.
  HashKeyElementName:
    Type: String
    Description: The name of the hash key element.
    Default: Id
    AllowedPattern: '^[a-zA-Z0-9_.-]{1,255}$'
    ConstraintDescription: Must be between 1 and 255 characters in length and can contain alphanumeric characters, underscores, periods, and hyphens.
  HashKeyElementType:
    Type: String
    Description: The type of the hash key element.
    Default: S
    AllowedPattern: '[S|N]'
    ConstraintDescription: Must be one of the following types: S (String), N (Number).

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties: 
      TableName: !Ref TableName
      AttributeDefinitions: 
        - AttributeName: !Ref HashKeyElementName
          AttributeType: !Ref HashKeyElementType
      KeySchema: 
        - AttributeName: !Ref HashKeyElementName
          KeyType: HASH
      ProvisionedThroughput: 
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: The name of the DynamoDB table.
    Value: !Ref DynamoDBTable
  TableArn:
    Description: The ARN of the DynamoDB table.
    Value: !GetAtt DynamoDBTable.Arn