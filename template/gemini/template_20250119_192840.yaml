AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights for NAT Gateway
Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogsDashboard
      DashboardBody:
        !Sub |
          {
            "widgets": [
              {
                "type": "logs",
                "width": 12,
                "height": 6,
                "x": 0,
                "y": 0,
                "properties": {
                  "region": !Ref AWS::Region,
                  "title": "NAT Gateway Outbound Flow Logs",
                  "period": 300,
                  "query": "fields @message | filter @message like /src=%22natgateway-id%22/ | stats count(*) as OutboundFlows by @timestamp | sort @timestamp desc | limit 100",
                  "view": "table"
                }
              },
              {
                "type": "logs",
                "width": 12,
                "height": 6,
                "x": 0,
                "y": 6,
                "properties": {
                  "region": !Ref AWS::Region,
                  "title": "NAT Gateway Inbound Flow Logs",
                  "period": 300,
                  "query": "fields @message | filter @message like /dst=%22natgateway-id%22/ | stats count(*) as InboundFlows by @timestamp | sort @timestamp desc | limit 100",
                  "view": "table"
                }
              },
              {
                "type": "logs",
                "width": 12,
                "height": 6,
                "x": 0,
                "y": 12,
                "properties": {
                  "region": !Ref AWS::Region,
                  "title": "NAT Gateway Top Talkers (Outbound)",
                  "period": 300,
                  "query": "fields @message | filter @message like /src=%22natgateway-id%22/ | stats count(*) as OutboundFlows by srcAddr | sort OutboundFlows desc | limit 10",
                  "view": "table"
                }
              },
              {
                "type": "logs",
                "width": 12,
                "height": 6,
                "x": 0,
                "y": 18,
                "properties": {
                  "region": !Ref AWS::Region,
                  "title": "NAT Gateway Top Talkers (Inbound)",
                  "period": 300,
                  "query": "fields @message | filter @message like /dst=%22natgateway-id%22/ | stats count(*) as InboundFlows by dstAddr | sort InboundFlows desc | limit 10",
                  "view": "table"
                }
              }
            ]
          }

Outputs:
  DashboardURL:
    Value: !Sub https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${NATGatewayDashboard}
    Description: URL of the CloudWatch Dashboard

