AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Kinesis Firehose with AWS KMS encryption and CloudWatch error logging'

Resources:
  FirehoseLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}-errors'
      RetentionInDays: 14

  FirehoseLogStream:
    Type: 'AWS::Logs::LogStream'
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'FirehoseErrorLogs'

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Path: '/'

  FirehoseRolePolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: firehose-error-logging
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:PutLogEvents'
              - 'logs:CreateLogStream'
            Resource: !GetAtt FirehoseLogGroup.Arn
          - Effect: Allow
            Action:
              - 'kms:GenerateDataKey'
              - 'kms:Decrypt'
            Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/firehose'
      Roles:
        - !Ref FirehoseRole

  FirehoseStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamType: 'DirectPut'
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      S3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::dummy-bucket'  # Required placeholder
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  FirehoseStreamArn:
    Description: 'ARN of the created Kinesis Firehose Stream'
    Value: !GetAtt FirehoseStream.Arn

  FirehoseLogGroupName:
    Description: 'Name of the CloudWatch Log Group for Firehose errors'
    Value: !Ref FirehoseLogGroup

  FirehoseLogStreamName:
    Description: 'Name of the CloudWatch Log Stream for Firehose errors'
    Value: !Ref FirehoseLogStream