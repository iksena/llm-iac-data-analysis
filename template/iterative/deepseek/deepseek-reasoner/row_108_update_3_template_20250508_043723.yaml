AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  UserPoolName:
    Type: String
    Default: SecureUserPool
  DomainPrefix:
    Type: String
    Default: mysecureapp-auth
  CallbackURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3000/callback"
  LogoutURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3000/logout"
  PasswordMinLength:
    Type: Number
    Default: 12
  RequireNumbers:
    Type: Boolean
    Default: true
  RequireSymbols:
    Type: Boolean
    Default: true
  RequireLowercase:
    Type: Boolean
    Default: true
  RequireUppercase:
    Type: Boolean
    Default: true

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: Your verification code is {####}
        EmailSubject: Your verification code
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireNumbers: !Ref RequireNumbers
          RequireSymbols: !Ref RequireSymbols
          RequireLowercase: !Ref RequireLowercase
          RequireUppercase: !Ref RequireUppercase
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: SecureAppClient
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Value: !GetAtt UserPoolDomain.Domain