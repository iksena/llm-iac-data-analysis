AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and cost-optimized S3 bucket for CloudWatch export data with versioning and lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: !Sub 'cloudwatch-exports-${AWS::AccountId}'
    Description: Name of the S3 bucket for CloudWatch export data
  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable or disable versioning for the bucket

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref VersioningEnabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveToGlacier
            Status: Enabled
            Transition:
              Days: 30
              StorageClass: GLACIER
          - Id: DeleteAfterOneYear
            Status: Enabled
            ExpirationInDays: 365
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  CloudWatchExportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 's3:PutObject'
            Resource: !Sub '${CloudWatchExportBucket.Arn}/*'

Outputs:
  BucketARN:
    Description: ARN of the CloudWatch export bucket
    Value: !GetAtt CloudWatchExportBucket.Arn
  CanonicalUserID:
    Description: Canonical user ID for cross-account access
    Value: !GetAtt CloudWatchExportBucket.CanonicalUserID