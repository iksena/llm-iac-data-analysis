AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
    MinLength: 1
    MaxLength: 120
  BranchName:
    Type: String
    Default: production
    Description: Name of the production branch
    MinLength: 1
    MaxLength: 255
Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AmplifyCodeCommitAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codecommit:GetRepository
                  - codecommit:GitPull
                Resource: !Sub 'arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${AppName}-repo'
  TodoAppRepository:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Sub '${AppName}-repo'
      RepositoryDescription: 'Code repository for TodoApp'
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub '${AppName}-${AWS::StackName}'
      Repository: !GetAtt TodoAppRepository.CloneUrlHttp
      Platform: WEB
      RoleArn: !GetAtt AmplifyServiceRole.Arn
  TodoAppProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref TodoAppAmplifyApp
      BranchName: !Ref BranchName
Outputs:
  AmplifyAppId:
    Description: ID of the Amplify application
    Value: !Ref TodoAppAmplifyApp
  AmplifyBranchName:
    Description: Name of the production branch
    Value: !Ref BranchName
  AmplifyAppUrl:
    Description: URL of the deployed application
    Value: !Sub 'https://${BranchName}.${TodoAppAmplifyApp.DefaultDomain}'