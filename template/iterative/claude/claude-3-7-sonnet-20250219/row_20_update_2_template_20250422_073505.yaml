AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS Client VPN monitoring with CloudWatch Dashboard and Logs Insights queries'

Parameters:
  VpnEndpointIds:
    Type: CommaDelimitedList
    Description: List of Client VPN Endpoint IDs to monitor (comma-separated)
    Default: 'cvpn-endpoint-0123456789abcdef0'
  
  LogGroupName:
    Type: String
    Description: CloudWatch Logs group containing Client VPN logs
    Default: '/aws/clientvpn'
  
  DashboardName:
    Type: String
    Description: Name for the CloudWatch Dashboard
    Default: 'ClientVPNMonitoring'
  
  RefreshRate:
    Type: Number
    Description: Dashboard refresh rate in seconds
    Default: 300
    MinValue: 60
    MaxValue: 3600

Resources:
  # CloudWatch Logs Insights Query Folders
  ConnectionMetricsFolder:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/ConnectionMetrics'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | limit 1
      LogGroupNames:
        - !Ref LogGroupName

  DataTransferMetricsFolder:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/DataTransferMetrics'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | limit 1
      LogGroupNames:
        - !Ref LogGroupName

  UserActivityMetricsFolder:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/UserActivityMetrics'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | limit 1
      LogGroupNames:
        - !Ref LogGroupName

  AuthenticationMetricsFolder:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/AuthenticationMetrics'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | limit 1
      LogGroupNames:
        - !Ref LogGroupName

  # Connection Metrics Queries
  AverageConnectionDurationQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/ConnectionMetrics/AverageConnectionDuration'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "client-ip: * " as clientIp
        | parse @message "username: * " as username
        | parse @message "endpoint-id: * " as endpointId
        | filter event in ["connection-attempt", "connection-attempt-succeeded", "connection-attempt-failed", "connection-ended"]
        | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId, username, clientIp, endpointId
        | filter ispresent(connectionStart) and ispresent(connectionEnd)
        | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, "seconds")
        | stats avg(connectionDurationSeconds) as avgDurationSeconds, max(connectionDurationSeconds) as maxDurationSeconds by username
        | sort avgDurationSeconds desc
        | limit 100
      LogGroupNames:
        - !Ref LogGroupName

  ConnectionDurationByEndpointQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/ConnectionMetrics/ConnectionDurationByEndpoint'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "endpoint-id: * " as endpointId
        | filter event in ["connection-attempt", "connection-attempt-succeeded", "connection-attempt-failed", "connection-ended"]
        | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId, endpointId
        | filter ispresent(connectionStart) and ispresent(connectionEnd)
        | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, "seconds")
        | stats sum(connectionDurationSeconds) as totalDurationSeconds, count(connectionId) as connectionCount by endpointId
        | sort totalDurationSeconds desc
      LogGroupNames:
        - !Ref LogGroupName

  ConnectionDurationDistributionQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/ConnectionMetrics/ConnectionDurationDistribution'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | filter event in ["connection-attempt", "connection-attempt-succeeded", "connection-attempt-failed", "connection-ended"]
        | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId
        | filter ispresent(connectionStart) and ispresent(connectionEnd)
        | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, "seconds")
        | eval durationBucket = 
            case(connectionDurationSeconds < 300, "< 5 min",
                 connectionDurationSeconds < 1800, "5-30 min",
                 connectionDurationSeconds < 3600, "30-60 min",
                 connectionDurationSeconds < 7200, "1-2 hours",
                 connectionDurationSeconds < 14400, "2-4 hours",
                 connectionDurationSeconds < 28800, "4-8 hours",
                 "8+ hours")
        | stats count(connectionId) as connectionCount by durationBucket
        | sort durationBucket asc
      LogGroupNames:
        - !Ref LogGroupName

  # Data Transfer Metrics Queries
  IngressDataVolumeQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/DataTransferMetrics/IngressDataVolume'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "endpoint-id: * " as endpointId
        | parse @message "bytes-in: * " as bytesIn
        | filter ispresent(bytesIn)
        | stats sum(bytesIn) as totalBytesIn by endpointId
        | sort totalBytesIn desc
        | eval totalMBIn = totalBytesIn / 1024 / 1024
        | display endpointId, totalMBIn
      LogGroupNames:
        - !Ref LogGroupName

  EgressDataVolumeQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/DataTransferMetrics/EgressDataVolume'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "endpoint-id: * " as endpointId
        | parse @message "bytes-out: * " as bytesOut
        | filter ispresent(bytesOut)
        | stats sum(bytesOut) as totalBytesOut by endpointId
        | sort totalBytesOut desc
        | eval totalMBOut = totalBytesOut / 1024 / 1024
        | display endpointId, totalMBOut
      LogGroupNames:
        - !Ref LogGroupName

  DataTransferByUserQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/DataTransferMetrics/DataTransferByUser'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "username: * " as username
        | parse @message "bytes-in: * " as bytesIn
        | parse @message "bytes-out: * " as bytesOut
        | filter ispresent(bytesIn) or ispresent(bytesOut)
        | stats sum(bytesIn) as totalBytesIn, sum(bytesOut) as totalBytesOut by username
        | eval totalMBIn = totalBytesIn / 1024 / 1024
        | eval totalMBOut = totalBytesOut / 1024 / 1024
        | eval totalMB = totalMBIn + totalMBOut
        | sort totalMB desc
        | limit 100
      LogGroupNames:
        - !Ref LogGroupName

  # User Activity Metrics Queries
  ActiveUsersPerDayQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/UserActivityMetrics/ActiveUsersPerDay'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "username: * " as username
        | filter ispresent(username)
        | stats count_distinct(username) as uniqueUsers by bin(1d)
        | sort @timestamp desc
      LogGroupNames:
        - !Ref LogGroupName

  ConnectionAttemptsQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/UserActivityMetrics/ConnectionAttempts'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "connection-id: * " as connectionId
        | parse @message "username: * " as username
        | filter event in ["connection-attempt", "connection-attempt-succeeded", "connection-attempt-failed"]
        | stats 
            count(event="connection-attempt") as totalAttempts,
            count(event="connection-attempt-succeeded") as successfulAttempts,
            count(event="connection-attempt-failed") as failedAttempts
            by username
        | eval successRate = 100 * successfulAttempts / totalAttempts
        | sort totalAttempts desc
        | limit 100
      LogGroupNames:
        - !Ref LogGroupName

  # Authentication Type Analysis Queries
  AuthenticationTypeBreakdownQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/AuthenticationMetrics/AuthenticationTypeBreakdown'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "authentication-type: * " as authType
        | filter ispresent(authType)
        | stats count(*) as connectionCount by authType
        | sort connectionCount desc
      LogGroupNames:
        - !Ref LogGroupName

  AuthenticationSuccessRateQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'VPN/AuthenticationMetrics/AuthenticationSuccessRate'
      QueryString: |
        fields @timestamp, @message
        | filter @logStream like /^ClientVPN-/
        | parse @message "authentication-type: * " as authType
        | filter event in ["connection-attempt", "connection-attempt-succeeded", "connection-attempt-failed"]
        | filter ispresent(authType)
        | stats 
            count(event="connection-attempt") as totalAttempts,
            count(event="connection-attempt-succeeded") as successfulAttempts,
            count(event="connection-attempt-failed") as failedAttempts
            by authType
        | eval successRate = 100 * successfulAttempts / totalAttempts
        | sort successRate desc
      LogGroupNames:
        - !Ref LogGroupName

  # CloudWatch Dashboard
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: 
        Fn::Sub:
          - |
            {
              "widgets": [
                {
                  "type": "text",
                  "x": 0,
                  "y": 0,
                  "width": 24,
                  "height": 1,
                  "properties": {
                    "markdown": "# AWS Client VPN Monitoring Dashboard\nThis dashboard provides insights into VPN usage patterns, connection metrics, and authentication statistics."
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 1,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${AverageConnectionDurationQuery}",
                    "region": "${AWS::Region}",
                    "title": "Average Connection Duration by User",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 12,
                  "y": 1,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${ConnectionDurationByEndpointQuery}",
                    "region": "${AWS::Region}",
                    "title": "Total Connection Time by Endpoint",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 7,
                  "width": 8,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${ConnectionDurationDistributionQuery}",
                    "region": "${AWS::Region}",
                    "title": "Connection Duration Distribution",
                    "view": "pie"
                  }
                },
                {
                  "type": "log",
                  "x": 8,
                  "y": 7,
                  "width": 8,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${IngressDataVolumeQuery}",
                    "region": "${AWS::Region}",
                    "title": "Ingress Data Volume by Endpoint (MB)",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 16,
                  "y": 7,
                  "width": 8,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${EgressDataVolumeQuery}",
                    "region": "${AWS::Region}",
                    "title": "Egress Data Volume by Endpoint (MB)",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 13,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${DataTransferByUserQuery}",
                    "region": "${AWS::Region}",
                    "title": "Data Transfer by User (MB)",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 12,
                  "y": 13,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${ActiveUsersPerDayQuery}",
                    "region": "${AWS::Region}",
                    "title": "Active Users per Day",
                    "view": "timeSeries",
                    "stacked": false
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 19,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${ConnectionAttemptsQuery}",
                    "region": "${AWS::Region}",
                    "title": "Connection Attempts by User",
                    "view": "table"
                  }
                },
                {
                  "type": "log",
                  "x": 12,
                  "y": 19,
                  "width": 6,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${AuthenticationTypeBreakdownQuery}",
                    "region": "${AWS::Region}",
                    "title": "Authentication Type Breakdown",
                    "view": "pie"
                  }
                },
                {
                  "type": "log",
                  "x": 18,
                  "y": 19,
                  "width": 6,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE '${LogGroupName}' | ${AuthenticationSuccessRateQuery}",
                    "region": "${AWS::Region}",
                    "title": "Authentication Success Rate by Type",
                    "view": "table"
                  }
                }
              ]
            }
          - AverageConnectionDurationQuery: !GetAtt AverageConnectionDurationQuery.QueryString
            ConnectionDurationByEndpointQuery: !GetAtt ConnectionDurationByEndpointQuery.QueryString
            ConnectionDurationDistributionQuery: !GetAtt ConnectionDurationDistributionQuery.QueryString
            IngressDataVolumeQuery: !GetAtt IngressDataVolumeQuery.QueryString
            EgressDataVolumeQuery: !GetAtt EgressDataVolumeQuery.QueryString
            DataTransferByUserQuery: !GetAtt DataTransferByUserQuery.QueryString
            ActiveUsersPerDayQuery: !GetAtt ActiveUsersPerDayQuery.QueryString
            ConnectionAttemptsQuery: !GetAtt ConnectionAttemptsQuery.QueryString
            AuthenticationTypeBreakdownQuery: !GetAtt AuthenticationTypeBreakdownQuery.QueryString
            AuthenticationSuccessRateQuery: !GetAtt AuthenticationSuccessRateQuery.QueryString

Outputs:
  DashboardURL:
    Description: URL to access the created CloudWatch Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"
  
  ConnectionMetricsFolderName:
    Description: Name of the Connection Metrics query folder
    Value: !Ref ConnectionMetricsFolder
  
  DataTransferMetricsFolderName:
    Description: Name of the Data Transfer Metrics query folder
    Value: !Ref DataTransferMetricsFolder
  
  UserActivityMetricsFolderName:
    Description: Name of the User Activity Metrics query folder
    Value: !Ref UserActivityMetricsFolder
  
  AuthenticationMetricsFolderName:
    Description: Name of the Authentication Metrics query folder
    Value: !Ref AuthenticationMetricsFolder