AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket with SNS notifications for object creation events'
Parameters:
  BucketName:
    Type: String
    Description: Optional custom name for S3 bucket (must be DNS-compliant). Leave empty for auto-generated name.
    Default: ''
    AllowedPattern: '^(|[a-z0-9](?!.*[-]{2})[a-z0-9-]{1,61}[a-z0-9])$'
    ConstraintDescription: >-
      Bucket name must be 3-63 characters long, start and end with lowercase alphanumeric,
      contain only lowercase alphanumeric and hyphens (no consecutive hyphens)
Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]
Resources:
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-s3-notifications'
      DisplayName: S3 Object Creation Events
  
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      AccessControl: Private
  
  SnsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SnsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !GetAtt SnsTopic.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
  
  BucketNotificationConfiguration:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref S3Bucket
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref SnsTopic
Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'
  
  SnsTopicArn:
    Description: ARN of the SNS topic for object creation events
    Value: !Ref SnsTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'