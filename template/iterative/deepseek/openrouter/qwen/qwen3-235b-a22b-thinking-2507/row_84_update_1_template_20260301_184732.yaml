AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: ENABLED
      DataSources:
        S3:
          AutoEnable: true
Outputs:
  SessionArn:
    Description: ARN of the created Macie session
    Value: !GetAtt MacieSession.Arn
  SessionId:
    Description: ID of the created Macie session
    Value: !Ref MacieSession