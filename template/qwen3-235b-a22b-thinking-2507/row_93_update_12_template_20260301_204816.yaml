AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  SSHLocation:
    Description: CIDR for SSH access (restrict in production!)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    ConstraintDescription: Must be a valid CIDR range
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Nginx-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Nginx-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Nginx-Public-Subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Nginx-Public-RouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  NginxLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt NginxLogsBucket.Arn
                  - !Sub "${NginxLogsBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HTTP access and restricted SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      SubnetId: !Ref PublicSubnet
      Monitoring: true
      Tags:
        - Key: Nginx
          Value: installed

  SSMNginxAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      AssociationName: nginx-installation
      Targets:
        - Key: tag:Nginx
          Values: [installed]
      Parameters:
        commands:
          - !Sub
            - |
              #!/bin/bash
              sudo amazon-linux-extras install -y nginx1
              sudo systemctl start nginx
              sudo systemctl enable nginx
              if ! command -v aws &> /dev/null; then
                sudo yum install -y awscli
              fi
              LOG_DIR=/var/log/nginx
              BUCKET_NAME=${BucketName}
              UPLOAD_SCRIPT=/usr/local/bin/upload_nginx_logs.sh
              cat << 'EOF' > $$${UPLOAD_SCRIPT}
              #!/bin/bash
              aws s3 sync $$${LOG_DIR} s3://$$${BUCKET_NAME}/nginx-logs/ --delete
              EOF
              chmod +x $$${UPLOAD_SCRIPT}
              (crontab -l 2>/dev/null | grep -v 'upload_nginx_logs.sh' || true; echo "0 * * * * $$${UPLOAD_SCRIPT}") | crontab -
            - BucketName: !Ref NginxLogsBucket

Outputs:
  InstanceURL:
    Description: Public URL of Nginx server
    Value: !Sub "http://${EC2Instance.PublicDnsName}"
    Export:
      Name: !Sub "${AWS::StackName}-InstanceURL"
  LogBucketName:
    Description: S3 bucket for centralized logs
    Value: !Ref NginxLogsBucket
    Export:
      Name: !Sub "${AWS::StackName}-LogBucketName"
  SSMAssociationId:
    Description: SSM association identifier
    Value: !Ref SSMNginxAssociation
    Export:
      Name: !Sub "${AWS::StackName}-SSMAssociationId"