AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with Lambda trigger'

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    Default: s3-lambda-trigger-bucket
  
  LambdaFunctionName:
    Type: String
    Description: Name of the Lambda function to create
    Default: s3-event-processor
  
  LambdaRuntime:
    Type: String
    Description: Runtime for the Lambda function
    Default: python3.9
    AllowedValues:
      - python3.8
      - python3.9
      - python3.10
      - nodejs16.x
      - nodejs18.x
      - nodejs20.x
  
  LambdaMemorySize:
    Type: Number
    Description: Memory size for the Lambda function (in MB)
    Default: 128
    MinValue: 128
    MaxValue: 10240
  
  LambdaTimeout:
    Type: Number
    Description: Timeout for the Lambda function (in seconds)
    Default: 30
    MinValue: 1
    MaxValue: 900

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
  
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  - !Sub arn:aws:s3:::${S3BucketName}/*
  
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          BUCKET_NAME: !Ref S3BucketName
      Code:
        ZipFile: |
          import json
          import urllib.parse
          import boto3
          import os

          s3 = boto3.client('s3')

          def handler(event, context):
              # Get the object from the event
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'], encoding='utf-8')
              
              try:
                  # Log event details
                  print(f"Processing object: {key} from bucket: {bucket}")
                  
                  # Get object metadata
                  response = s3.head_object(Bucket=bucket, Key=key)
                  print(f"Object metadata: {response}")
                  
                  # Return success
                  return {
                      'statusCode': 200,
                      'body': json.dumps(f'Successfully processed {key} from {bucket}')
                  }
              except Exception as e:
                  print(e)
                  print(f'Error processing object {key} from bucket {bucket}')
                  raise e
  
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt S3Bucket.Arn

  # Custom resource to configure S3 bucket notification
  ConfigureBucketNotification:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt NotificationFunction.Arn
      BucketName: !Ref S3Bucket
      LambdaArn: !GetAtt LambdaFunction.Arn
      NotificationEvent: "s3:ObjectCreated:*"

  # Lambda function to configure S3 bucket notification
  NotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt NotificationFunctionRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              responseData = {}
              
              try:
                  if event['RequestType'] == 'Delete':
                      print("Request Type: Delete")
                      # Remove notification configuration
                      s3.put_bucket_notification_configuration(
                          Bucket=event['ResourceProperties']['BucketName'],
                          NotificationConfiguration={}
                      )
                  else:
                      print("Request Type: Create/Update")
                      bucket_name = event['ResourceProperties']['BucketName']
                      lambda_arn = event['ResourceProperties']['LambdaArn']
                      notification_event = event['ResourceProperties']['NotificationEvent']
                      
                      # Configure bucket notification
                      notification_config = {
                          'LambdaFunctionConfigurations': [
                              {
                                  'LambdaFunctionArn': lambda_arn,
                                  'Events': [notification_event]
                              }
                          ]
                      }
                      
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name,
                          NotificationConfiguration=notification_config
                      )
                      
                      responseData['Message'] = f"Notification configured for bucket {bucket_name}"
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
              except Exception as e:
                  print(e)
                  responseData['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData)

  # IAM role for the notification function
  NotificationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3NotificationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                  - s3:PutBucketNotificationConfiguration
                  - s3:GetBucketNotificationConfiguration
                Resource: !Sub arn:aws:s3:::${S3BucketName}

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction
  
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn