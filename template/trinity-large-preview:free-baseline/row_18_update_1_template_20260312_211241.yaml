AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge Pipe that filters DynamoDB stream events based on avatarUrl field.

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table with streams enabled
  StreamARN:
    Type: String
    Default: arn:aws:dynamodb:us-east-1:123456789012:table/MyDynamoDBTable/stream/2024-01-01T00:00:00.000
    Description: ARN of the DynamoDB stream
  EventSource:
    Type: String
    Default: com.example.source
    Description: Source value for EventBridge events
  DetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType value for EventBridge events

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  PipeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetDynamoDBStreamsFullAccess

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: DynamoDBToEventBridgePipe
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 0
          StreamARN: !Ref StreamARN
      Target:
        EventBridgeParameters:
          DetailType: !Ref DetailType
          Source: !Ref EventSource
        PipeTargetDetails:
          Type: EventBridge
      Filter:
        EventPattern:
          source:
            - !Ref EventSource
          detail:
            avatarUrl:
              endsWith:
                - '.png'
      RoleArn: !GetAtt PipeIAMRole.Arn

Outputs:
  PipeARN:
    Description: ARN of the created EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  PipeName:
    Description: Name of the created EventBridge Pipe
    Value: !Ref EventBridgePipe