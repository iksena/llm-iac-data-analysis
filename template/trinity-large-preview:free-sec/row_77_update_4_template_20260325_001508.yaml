AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB tables for supporter product data with environment-specific configurations

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
  KmsKeyId:
    Type: String
    Default: ''

Resources:
  SupporterProductData:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      BillingMode:
        Fn::If:
          - IsProd
          - PROVISIONED
          - PAY_PER_REQUEST
      ProvisionedThroughput:
        Fn::If:
          - IsProd
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref KmsKeyId
        SSEType: KMS
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: backup
          Value: true

  WriteScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub 'table/SupporterProductData-${Stage}'
      RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/DynamoDBAutoscaleRole'
      ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
      ServiceNamespace: dynamodb

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Conditions:
  IsProd:
    Fn::Equals:
      - Ref: Stage
      - PROD

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref SupporterProductData
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt SupporterProductData.Arn