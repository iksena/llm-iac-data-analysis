AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Aurora MySQL cluster with two instances and custom parameter groups'

Parameters:
  VpcId:
    Type: String
    Description: 'VPC ID for the database deployment (must exist in your account)'
    Default: ''
    AllowedPattern: '^$|^vpc-[a-f0-9]{8}(?:[a-f0-9]{9})?$'
    ConstraintDescription: 'Must be empty or a valid VPC ID (e.g., vpc-1a2b3c4d)'
  
  SubnetIds:
    Type: CommaDelimitedList
    Description: 'Comma-separated list of subnet IDs for the DB subnet group (minimum 2 for multi-AZ)'
    Default: ''
    ConstraintDescription: 'Must be valid subnet IDs in the specified VPC'
  
  DBName:
    Type: String
    Description: 'The name of the database to create'
    Default: 'auroradb'
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
  
  MasterUsername:
    Type: String
    Description: 'Username for the master database user'
    Default: 'admin'
    NoEcho: true
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
    MinLength: 1
    MaxLength: 16
  
  DBInstanceClass:
    Type: String
    Description: 'Database instance class'
    Default: 'db.t3.large'
    AllowedValues: 
      - db.t3.large
      - db.t3.xlarge
      - db.r5.large
    ConstraintDescription: 'Must be a valid Aurora MySQL instance class'

Conditions:
  HasVpcId: !Not [!Equals [!Ref VpcId, '']]
  HasSubnetIds: !Not [!Equals [!Join ['', !Ref SubnetIds], '']]

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: HasSubnetIds
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora cluster'
      SubnetIds: !Ref SubnetIds

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: 'Custom cluster parameter group for Aurora MySQL'
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        server_audit_logging: '1'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Custom instance parameter group for Aurora MySQL'
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasVpcId
    Properties:
      GroupDescription: 'Security group for Aurora cluster'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: '{{resolve:secretsmanager:MyAuroraSecret:SecretString:password}}'
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DBSubnetGroupName: !If [HasSubnetIds, !Ref DBSubnetGroup, !Ref 'AWS::NoValue']
      EngineMode: provisioned
      StorageEncrypted: true
      VpcSecurityGroupIds:
        - !If [HasVpcId, !GetAtt DBSecurityGroup.GroupId, !Ref 'AWS::NoValue']
      EnableHttpEndpoint: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      DeletionProtection: false
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Primary

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Secondary

Outputs:
  ClusterEndpoint:
    Description: 'Cluster endpoint for the Aurora DB cluster'
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  
  ReaderEndpoint:
    Description: 'Reader endpoint for the Aurora DB cluster'
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address
  
  PrimaryInstanceEndpoint:
    Description: 'Endpoint for the primary DB instance'
    Value: !GetAtt AuroraInstance1.Endpoint.Address
  
  SecondaryInstanceEndpoint:
    Description: 'Endpoint for the secondary DB instance'
    Value: !GetAtt AuroraInstance2.Endpoint.Address
  
  ClusterIdentifier:
    Description: 'Identifier for the Aurora DB cluster'
    Value: !Ref AuroraDBCluster
  
  SecurityGroupId:
    Description: 'Security Group ID for the Aurora cluster'
    Value: !If [HasVpcId, !Ref DBSecurityGroup, 'No security group created']