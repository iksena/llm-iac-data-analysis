AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyDataDogAppEventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: MyDataDogApp
      Description: Event bus for DataDog log forwarding

  DataDogConnection:
    Type: AWS::EventSchemas::ApiDestinationConnection
    Properties:
      Name: DataDogConnection
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: testanu

  DataDogLogIngestionApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: DataDogLogIngestion
      ConnectionName: !Ref DataDogConnection
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      InvocationRateLimitPerSecond: 5

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogLogIngestionApiDestination.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  ApiDestinationPolicy:
    Type: AWS::EventSchemas::ApiDestinationPolicy
    Properties:
      ApiDestinationName: !Ref DataDogLogIngestionApiDestination
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: events:InvokeApiDestination
            Resource: !GetAtt DataDogLogIngestionApiDestination.Arn

Outputs:
  EventBusArn:
    Value: !GetAtt MyDataDogAppEventBus.Arn
  ApiDestinationArn:
    Value: !GetAtt DataDogLogIngestionApiDestination.Arn
  QueueUrl:
    Value: !Ref DeadLetterQueue