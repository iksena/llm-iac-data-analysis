AWSTemplateFormatVersion: '2010-09-09'
Description: Lab environment for EC2 instance scheduling automation

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties: {}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select
        - 0
        - Fn::GetAZs: ''

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  AdminInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: AdminInstancePolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - cloudformation:*
                Resource: '*'

  AdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AdminInstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all outbound traffic
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::FindInMap:
          - AWSRegionArch2AMI
          - !Ref 'AWS::Region'
          - Fn::FindInMap:
              - AWSInstanceType2Arch
              - t3.nano
              - Arch
      InstanceType: t3.nano
      IamInstanceProfile: !Ref AdminInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - "#!/bin/bash\n"
              - "yum update -y\n"
              - "yum install -y aws-cli\n"
              - "curl -o aws-instance-scheduler-cli.zip https://github.com/awslabs/aws-instance-scheduler-cli/releases/latest/download/aws-instance-scheduler-cli.zip\n"
              - "unzip aws-instance-scheduler-cli.zip -d /opt/aws-instance-scheduler-cli\n"
              - "export PATH=$PATH:/opt/aws-instance-scheduler-cli\n"
              - "echo 'Instance Scheduler CLI installed'\n"
      Tags:
        - Key: environment
          Value: dev

  DevInstances:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::FindInMap:
          - AWSRegionArch2AMI
          - !Ref 'AWS::Region'
          - Fn::FindInMap:
              - AWSInstanceType2Arch
              - t3.nano
              - Arch
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: environment
          Value: dev

Mappings:
  AWSInstanceType2Arch:
    t3.nano:
      Arch: '64'
  AWSRegionArch2AMI:
    us-east-1:
      '64': ami-0c55b159cbfafe1f0
    us-east-2:
      '64': ami-0c55b159cbfafe1f0
    us-west-1:
      '64': ami-0c55b159cbfafe1f0
    us-west-2:
      '64': ami-0c55b159cbfafe1f0
    eu-west-1:
      '64': ami-0c55b159cbfafe1f0
    eu-west-2:
      '64': ami-0c55b159cbfafe1f0
    eu-west-3:
      '64': ami-0c55b159cbfafe1f0
    eu-central-1:
      '64': ami-0c55b159cbfafe1f0
    ap-northeast-1:
      '64': ami-0c55b159cbfafe1f0
    ap-northeast-2:
      '64': ami-0c55b159cbfafe1f0
    ap-southeast-1:
      '64': ami-0c55b159cbfafe1f0
    ap-southeast-2:
      '64': ami-0c55b159cbfafe1f0
    ap-south-1:
      '64': ami-0c55b159cbfafe1f0
    sa-east-1:
      '64': ami-0c55b159cbfafe1f0

Outputs:
  AdminInstanceId:
    Description: Instance ID of the admin instance
    Value: !Ref AdminInstance
  DevInstanceIds:
    Description: Instance IDs of the dev instances
    Value: !Ref DevInstances