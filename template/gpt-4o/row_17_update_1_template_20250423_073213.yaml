AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create AWS billing alarms with SNS notifications.

Parameters:
  EmailAddress:
    Description: Email address to receive billing alerts
    Type: String
    Default: xxxxx@gmail.com

Resources:
  BillingSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alerts Topic

  BillingSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref EmailAddress
      TopicArn: !Ref BillingSNSTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm5
      AlarmDescription: Alarm when estimated charges exceed $5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600 # 6 hours in seconds
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingSNSTopic

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm10
      AlarmDescription: Alarm when estimated charges exceed $10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600 # 6 hours in seconds
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingSNSTopic

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm20
      AlarmDescription: Alarm when estimated charges exceed $20
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600 # 6 hours in seconds
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingSNSTopic

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm40
      AlarmDescription: Alarm when estimated charges exceed $40
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600 # 6 hours in seconds
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingSNSTopic

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS Topic for billing alerts
    Value: !Ref BillingSNSTopic