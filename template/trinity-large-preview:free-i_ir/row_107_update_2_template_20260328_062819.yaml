AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for REST API Gateway integrated with SQS queue

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  SQSPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

  APIRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  RestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQSRestAPI

  SQSRootResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestAPI.RootResourceId
      PathPart: messages
      RestApiId: !Ref RestAPI

  SQSSQSMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !Ref SQSRootResource
      RestApiId: !Ref RestAPI
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Join
          - ""
          - - "arn:aws:apigateway:"
            - !Ref AWS::Region
            - ":sqs:action/ReceiveMessage"
        Credentials: !GetAtt APIRole.Arn
        RequestParameters:
          "integration.request.header.Content-Type": "'application/x-www-form-urlencoded'"
        RequestTemplates:
          "application/json": !Join
            - ""
            - - "Action=ReceiveMessage&QueueUrl="
              - !Ref SQSQueue
              - "&Version=2012-11-05"
        PassthroughBehavior: WHEN_NO_TEMPLATES
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              "application/json": "#set($inputRoot = $input.path('$')){}"

  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref RestAPI
      StageName: prod

Outputs:
  QueueURL:
    Value: !Ref SQSQueue
  QueueARN:
    Value: !GetAtt SQSQueue.Arn
  APIEndpoint:
    Value: !Sub "https://${RestAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/messages"