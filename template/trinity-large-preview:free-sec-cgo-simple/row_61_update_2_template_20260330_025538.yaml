AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      HostedZoneConfig:
        Comment: Private hosted zone for internal use
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref VPCRegion

Parameters:
  VPCId:
    Type: String
    Default: vpc-00000000000000000
  VPCRegion:
    Type: String
    Default: us-east-1

Outputs:
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
    Export:
      Name: PrivateHostedZoneID