AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval workflows using AWS Systems Manager (SSM) Parameter Store and Secrets Manager.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParametersByPath
            Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*'
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !GetAtt MySecret.Arn
      Roles:
        - !Ref LambdaExecutionRole

  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/config/ab_value'
      Type: String
      Value: 'This is A/B'

  MySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${AWS::StackName}/my_secret'
      SecretString: !Sub '{"username": "admin", "password": "${GenerateSecret}"}'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        ExcludeCharacters: '"@/\'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Retrieve SSM parameter
              ssm_param = ssm_client.get_parameter(Name='/${AWS::StackName}/config/ab_value')
              ab_value = ssm_param['Parameter']['Value']

              # Retrieve Secrets Manager secret
              secret = secrets_client.get_secret_value(SecretId='/${AWS::StackName}/my_secret')
              secret_value = json.loads(secret['SecretString'])

              response = {
                  'statusCode': 200,
                  'body': json.dumps({
                      'SSM Parameter': ab_value,
                      'Secrets Manager Secret': secret_value
                  })
              }
              return response
      Runtime: python3.8
      Timeout: 10

Outputs:
  SSMParameterArn:
    Description: The ARN of the SSM Parameter
    Value: !Ref SSMParameter
  SecretsManagerSecretArn:
    Description: The ARN of the Secrets Manager Secret
    Value: !GetAtt MySecret.Arn
  LambdaFunctionArn:
    Description: The ARN of the Lambda Function
    Value: !GetAtt LambdaFunction.Arn