AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with Amazon Kinesis Data Streams for HTTP-based streaming data interaction

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-stream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  APIGatewayIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-api-gateway-kinesis-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  APIGatewayAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  PutRecordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: PUT /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref PutRecordIntegration

  PutRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: POST /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref PutRecordsIntegration

  GetRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: GET /records/{shardId}
      Target: !Join
        - '/'
        - - integrations
          - !Ref GetRecordsIntegration

  StreamMetadataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: GET /stream/metadata
      Target: !Join
        - '/'
        - - integrations
          - !Ref StreamMetadataIntegration

  PutRecordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        - region: !Ref AWS::Region
      ConnectionType: INTERNET
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt APIGatewayIAMRole.Arn
      RequestParameters:
        DestinationArn: !GetAtt KinesisStream.Arn
      RequestTemplates:
        'application/json': |
          {
            "StreamName": "$context.apiId",
            "Data": "$util.base64Encode($input.body)",
            "PartitionKey": "$context.requestId"
          }

  PutRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
        - region: !Ref AWS::Region
      ConnectionType: INTERNET
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt APIGatewayIAMRole.Arn
      RequestTemplates:
        'application/json': |
          {
            "StreamName": "$context.apiId",
            "Records": [
              #foreach($record in $input.body)
              {
                "Data": "$util.base64Encode($record.data)",
                "PartitionKey": "$record.partitionKey"
              }
              #if($foreach.hasNext),#end
              #end
            ]
          }

  GetRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        - region: !Ref AWS::Region
      ConnectionType: INTERNET
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt APIGatewayIAMRole.Arn
      RequestTemplates:
        'application/json': |
          {
            "ShardIterator": "$input.params('shardId')"
          }

  StreamMetadataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
        - region: !Ref AWS::Region
      ConnectionType: INTERNET
      PayloadFormatVersion: '2.0'
      CredentialsArn: !GetAtt APIGatewayIAMRole.Arn

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGatewayAPI
      StageName: $default
      AutoDeploy: true

Outputs:
  APIGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${APIGatewayAPI}.execute-api.${AWS::Region}.amazonaws.com
  KinesisStreamARN:
    Description: Kinesis Stream ARN
    Value: !GetAtt KinesisStream.Arn