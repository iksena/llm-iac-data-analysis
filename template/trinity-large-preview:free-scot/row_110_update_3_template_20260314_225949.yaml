AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a cross-account private API Gateway integrated with Lambda, secured via VPC endpoint and custom domain.

Parameters:
  VpcEndpointId:
    Type: String
    Default: vpc-endpoint-id
    Description: ID of the VPC endpoint for private API Gateway access
  CustomDomainName:
    Type: String
    Default: api.example.com
    Description: Custom domain name for the API
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage name

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  APIGatewayExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from private API Gateway!'
              }
      Role: !GetAtt LambdaExecutionRole.Arn

  PrivateApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateAPI
      ProtocolType: HTTP
      Target: !GetAtt LambdaFunction.Arn

  VpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: VpcLink
      SubnetIds:
        - !Select [0, !GetAZs '']
        - !Select [1, !GetAZs '']

  CustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - CertificateArn: arn:aws:acm:us-east-1:123456789012:certificate/abcd-1234

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref PrivateApi
      DomainName: !Ref CustomDomain
      Stage: !Ref StageName

  PrivateStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PrivateApi
      StageName: !Ref StageName
      AccessLogSettings:
        DestinationArn: arn:aws:logs:us-east-1:123456789012:log-group:/aws/apigateway/access-logs
        Format: '{"requestId":"$context.requestId","sourceIp":"$context.identity.sourceIp","status":"$context.status","httpMethod":"$context.httpMethod","path":"$context.path","protocol":"$context.protocol","userAgent":"$context.identity.userAgent"}'

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*'
      FunctionName: !GetAtt LambdaFunction.Arn

Outputs:
  ApiEndpoint:
    Description: The endpoint URL of the private API Gateway
    Value: !Sub 'https://${CustomDomainName}/${StageName}'