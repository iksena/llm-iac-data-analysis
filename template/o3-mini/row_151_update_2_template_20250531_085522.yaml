AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to deploy an AWS Bedrock Agent integrated
  with a Lambda function. The Lambda function returns a hard-coded stock price (100)
  as a placeholder for future business logic integration. The Bedrock Agent is configured
  with the "Claude 3 Sonnet" foundational model and a custom getStockPrice action.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              # Hard-coded stock price lookup placeholder.
              return {"stockPrice": 100}
      Timeout: 10

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock-agent.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentInvokeModelPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: StockPriceBedrockAgent
      ModelName: "Claude 3 Sonnet"
      AgentRoleArn: !GetAtt BedrockAgentRole.Arn
      Actions:
        - Name: getStockPrice
          LambdaFunctionArn: !GetAtt StockPriceLambda.Arn
          Schema:
            type: object
            properties:
              stockSymbol:
                type: string

Outputs:
  StockPriceLambdaARN:
    Description: "ARN of the Stock Price Lookup Lambda function."
    Value: !GetAtt StockPriceLambda.Arn

  LambdaExecutionRoleARN:
    Description: "ARN of the Lambda Execution Role."
    Value: !GetAtt LambdaExecutionRole.Arn

  BedrockAgentId:
    Description: "Identifier of the Bedrock Agent."
    Value: !Ref BedrockAgent