AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create EventBridge-to-Kinesis integration for real-time event streaming

Parameters:
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis data stream
  EventSourceName:
    Type: String
    Default: my-application
    Description: Name of the event source to match in EventBridge
  KinesisStreamName:
    Type: String
    Default: EventBridgeToKinesisStream
    Description: Name of the Kinesis data stream

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeToKinesisPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: EventBridgeToKinesisEventBus

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeEventBus
      EventPattern:
        source:
          - !Ref EventSourceName
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeIAMRole.Arn

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref EventBridgeEventBus
  KinesisStreamARN:
    Description: ARN of the Kinesis data stream
    Value: !GetAtt KinesisStream.Arn
  IAMRoleARN:
    Description: ARN of the IAM role for EventBridge
    Value: !GetAtt EventBridgeIAMRole.Arn