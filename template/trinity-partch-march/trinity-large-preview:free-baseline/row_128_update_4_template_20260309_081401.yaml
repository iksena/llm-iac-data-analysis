AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to manage AWS Security Hub controls by selectively disabling specific compliance checks.

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to disable CIS Benchmarks controls in Security Hub

  DisableAWSFoundationalSecurityBestPractices:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to disable AWS Foundational Security Best Practices controls in Security Hub

  PermissionsBoundary:
    Type: String
    Default: ''
    Description: ARN of an IAM permissions boundary to use for the Lambda role (optional)

  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
    Description: Number of days to retain CloudWatch Logs (default 30)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundary, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
      Policies:
        - PolicyName: SecurityHubControlUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateSecurityHubConfiguration
                  - securityhub:BatchUpdateStandardsControlAssociations
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          DISABLE_CIS_CONTROLS: !Ref DisableCIS140Controls
          DISABLE_FOUNDATIONAL_CONTROLS: !Ref DisableAWSFoundationalSecurityBestPractices
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          securityhub = boto3.client('securityhub')

          def lambda_handler(event, context):
              try:
                  disable_cis = event.get('DisableCIS140Controls', 'false').lower() == 'true'
                  disable_foundational = event.get('DisableAWSFoundationalSecurityBestPractices', 'false').lower() == 'true'

                  if disable_cis:
                      disable_cis_controls()

                  if disable_foundational:
                      disable_foundational_controls()

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Security Hub controls updated successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error updating Security Hub controls: {str(e)}')
                  }

          def disable_cis_controls():
              # Implementation to disable CIS Benchmarks controls
              pass

          def disable_foundational_controls():
              # Implementation to disable AWS Foundational Security Best Practices controls
                  pass

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: !Ref LogRetentionInDays

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, '']]

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn

  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction