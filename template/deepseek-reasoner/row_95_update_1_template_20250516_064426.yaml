AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM automation for Nginx deployment'
Parameters:
  LatestAmi:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for instance deployment'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSM and outbound access'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmi
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: nginx
          Value: 'Yes'

  NginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: 'Automated OS updates and Nginx installation'
        parameters:
          TagKey:
            type: String
            default: 'nginx'
          TagValue:
            type: String
            default: 'Yes'
        mainSteps:
          - name: SelectTargets
            action: aws:targetByTag
            inputs:
              TagKey: '{{TagKey}}'
              TagValue: '{{TagValue}}'
            outputs:
              - name: instanceIds
                selector: '$.InstanceIds'

          - name: UpdateSystem
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{SelectTargets.instanceIds}}'
              Parameters:
                commands:
                  - sudo yum update -y

          - name: RebootCheck
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{SelectTargets.instanceIds}}'
              Parameters:
                commands:
                  - if needs-restarting -r; then exit 100; fi

          - name: EvaluateReboot
            action: aws:branch
            inputs:
              Choices:
                - NextStep: PerformReboot
                  Variable: '{{RebootCheck.aws:runCommand.0.ExitCode}}'
                  NumericEquals: 100
              Default: InstallNginx

          - name: PerformReboot
            action: aws:rebootInstance
            inputs:
              InstanceIds: '{{SelectTargets.instanceIds}}'
            nextStep: WaitForReboot

          - name: WaitForReboot
            action: aws:waitForInstanceStatus
            inputs:
              InstanceIds: '{{SelectTargets.instanceIds}}'
              DesiredStatus: OK
            nextStep: InstallNginx

          - name: InstallNginx
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{SelectTargets.instanceIds}}'
              Parameters:
                commands:
                  - sudo amazon-linux-extras install -y nginx1
                  - sudo systemctl start nginx
                  - sudo systemctl enable nginx

          - name: ValidateInstall
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{SelectTargets.instanceIds}}'
              Parameters:
                commands:
                  - curl -sIf http://localhost || exit 1

Outputs:
  InstanceId:
    Value: !Ref NginxInstance
  AutomationDocument:
    Value: !Ref NginxAutomationDocument