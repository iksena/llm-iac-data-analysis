AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EmailAddress:
    Type: String
    Default: xxxxx@gmail.com
    Description: Email address for SNS notifications

Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alarms Topic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EstimatedCharges 5 USD
      AlarmDescription: Alarm if EstimatedCharges exceeds 5 USD
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      DatapointsToAlarm: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref BillingAlarmTopic
      OKActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm10:
