AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCidrBlock1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  SubnetCidrBlock2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  ContainerImage:
    Type: String
    Default: amazon/aws-cli
    Description: Container image for Batch jobs
  BatchJobMemory:
    Type: Number
    Default: 2048
    Description: Memory in MB for Batch job
  BatchJobVcpus:
    Type: Number
    Default: 2
    Description: VCPUs for Batch job

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: BatchProcessingVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: BatchProcessingIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock1
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock2
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: BatchProcessingSG

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Tags:
        - Key: Name
          Value: BatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: BatchInstanceRole

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  BatchECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: BatchECSExecutionRole

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        DesiredvCpus: 0
        MaxvCpus: 256
        InstanceTypes:
          - optimal
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !Ref BatchInstanceProfile
      ServiceRole: !Ref BatchServiceRole

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Memory: !Ref BatchJobMemory
        Vcpus: !Ref BatchJobVcpus
        Command:
          - echo
          - Processing order
        ExecutionRoleArn: !GetAtt BatchECSExecutionRole.Arn
        ResourceRequirements:
          - Type: VCPU
            Value: !Ref BatchJobVcpus
          - Type: MEMORY
            Value: !Ref BatchJobMemory
      RetryStrategy:
        Attempts: 1

  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: alias/aws/sqs

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SqsQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                  - batch:DescribeJobQueues
                Resource: !GetAtt BatchJobQueue.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: OrderProcessingPipe
      Source:
        Type: SQS
        SourceParameters:
          QueueUrl: !Ref SqsQueue
      Target:
        Type: AWS_BATCH_JOB
        TargetParameters:
          BatchJobParameters:
            JobDefinition: !Ref BatchJobDefinition
            JobName: OrderProcessingJob
            JobQueue: !Ref BatchJobQueue
            ContainerOverrides:
              Command:
                - echo
                - Processing order
      Enrichment: NONE
      FilterCriteria:
        Filters:
          - JsonPath: event.detail.type
            Value: OrderCreated
      RoleArn: !GetAtt PipeRole.Arn

Outputs:
  BatchJobQueueArn:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt BatchJobQueue.Arn
  SqsQueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref SqsQueue
  EventBridgePipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn