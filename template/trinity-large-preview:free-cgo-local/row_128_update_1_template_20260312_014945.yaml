AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to manage Security Hub controls via Lambda function

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to disable CIS 1.4.0 controls in Security Hub
  DisableAWSFoundationalSecurityBestPractices:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to disable AWS Foundational Security Best Practices controls
  LambdaPermissionsBoundary:
    Type: String
    Default: ''
    Description: Optional IAM permissions boundary ARN for Lambda execution role
  LogRetentionInDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 7
      - 14
      - 30
      - 365
    Description: CloudWatch Logs retention period in days

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref LambdaPermissionsBoundary, !Ref AWS::NoValue]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:BatchUpdateStandardsControlAssociations
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          securityhub = boto3.client('securityhub')

          def lambda_handler(event, context):
              try:
                  controls_to_update = []

                  if event['DisableCIS140Controls'] == 'true':
                      controls_to_update.extend([
                          {'StandardsControlArn': 'arn:aws:securityhub:us-east-1:default:control/cis-aws-foundations-benchmark/v/1.4.0/1.1', 'ControlStatus': 'DISABLED'},
                          {'StandardsControlArn': 'arn:aws:securityhub:us-east-1:default:control/cis-aws-foundations-benchmark/v/1.4.0/1.2', 'ControlStatus': 'DISABLED'}
                          # Add more CIS controls as needed
                      ])

                  if event['DisableAWSFoundationalSecurityBestPractices'] == 'true':
                      controls_to_update.extend([
                          {'StandardsControlArn': 'arn:aws:securityhub:us-east-1:default:control/aws-foundational-security-best-practices/v/1.0.0/1.1', 'ControlStatus': 'DISABLED'},
                          {'StandardsControlArn': 'arn:aws:securityhub:us-east-1:default:control/aws-foundational-security-best-practices/v/1.0.0/1.2', 'ControlStatus': 'DISABLED'}
                          # Add more AWS Foundational controls as needed
                      ])

                  if controls_to_update:
                      response = securityhub.batch_update_standards_control_associations(
                          StandardsControlsAssociationUpdates=controls_to_update
                      )
                      return {
                          'statusCode': 200,
                          'body': json.dumps(response)
                      }
                  else:
                      return {
                          'statusCode': 200,
                          'body': json.dumps({'message': 'No controls to update'})
                      }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${LambdaFunction}'
      RetentionInDays: !Ref LogRetentionInDays

  LambdaFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: cloudformation.amazonaws.com

  LambdaFunctionSSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /SecurityHubControlManager/LambdaFunctionArn
      Type: String
      Value: !GetAtt LambdaFunction.Arn

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for Lambda function errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold

  LambdaInvokeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for Lambda function invocation errors
      Namespace: AWS/Lambda
      MetricName: InvocationErrors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold

  WaitConditionHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: LambdaFunction
    Properties:
      Handle: !Ref WaitConditionHandle
      Timeout: '300'
      Count: 1

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref LambdaPermissionsBoundary, '']]

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Security Hub Controls
        Parameters:
          - DisableCIS140Controls
          - DisableAWSFoundationalSecurityBestPractices
      - Label:
          default: Lambda Configuration
        Parameters:
          - LambdaPermissionsBoundary
      - Label:
          default: Logging
        Parameters:
          - LogRetentionInDays

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  LambdaLogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref LambdaLogGroup
  LambdaFunctionSSMParameterName:
    Description: Name of the SSM Parameter storing Lambda ARN
    Value: !Ref LambdaFunctionSSMParameter