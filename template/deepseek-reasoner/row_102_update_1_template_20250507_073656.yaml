AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaDynamoDBAccess
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt RiskManagementTable.Arn

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskAssessmentFunction
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: your-lambda-code-bucket
        S3Key: risk-assessment-v1.zip
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  RiskResponseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskResponseFunction
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: your-lambda-code-bucket
        S3Key: risk-response-v1.zip
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskAlertsTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableName:
    Value: !Ref RiskManagementTable
  RiskAssessmentLambdaARN:
    Value: !GetAtt RiskAssessmentFunction.Arn
  RiskResponseLambdaARN:
    Value: !GetAtt RiskResponseFunction.Arn
  NotificationTopicARN:
    Value: !Ref RiskNotificationTopic
  LambdaRoleARN:
    Value: !GetAtt LambdaExecutionRole.Arn