AWSTemplateFormatVersion: '2010-09-09'
Description: AWS IAM Password Policy with Dynamic Management

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    Description: Minimum password length (8-128)
    MinValue: 8
    MaxValue: 128
  RequireUppercase:
    Type: String
    Default: 'true'
    Description: Require at least one uppercase letter
    AllowedValues: ['true', 'false']
  RequireLowercase:
    Type: String
    Default: 'true'
    Description: Require at least one lowercase letter
    AllowedValues: ['true', 'false']
  RequireNumbers:
    Type: String
    Default: 'true'
    Description: Require at least one number
    AllowedValues: ['true', 'false']
  RequireSymbols:
    Type: String
    Default: 'true'
    Description: Require at least one symbol
    AllowedValues: ['true', 'false']
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    Description: Allow users to change their own password
    AllowedValues: ['true', 'false']
  MaxPasswordAge:
    Type: Number
    Default: 90
    Description: Number of days before password expires
    MinValue: 1
    MaxValue: 1095
  PasswordReusePrevention:
    Type: Number
    Default: 24
    Description: Number of previous passwords to remember
    MinValue: 1
    MaxValue: 24
  HardExpiry:
    Type: String
    Default: 'false'
    Description: Prevent password reset after expiration
    AllowedValues: ['true', 'false']
  PermissionBoundaryArn:
    Type: String
    Default: ''
    Description: Optional IAM permission boundary ARN for Lambda role

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, '']]

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref 'AWS::NoValue']
      Path: /
      Policies:
        - PolicyName: PasswordPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/aws/lambda/IAMPasswordPolicyManager'
      RetentionInDays: 30

  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: IAMPasswordPolicyManager
      Description: Manages IAM password policy settings
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import json
          
          def handler(event, context):
              iam = boto3.client('iam')
              
              try:
                  response = iam.update_account_password_policy(
                      MinimumPasswordLength=int(event.get('MinimumPasswordLength', 14)),
                      RequireUppercaseCharacters=event.get('RequireUppercase', 'true').lower() == 'true',
                      RequireLowercaseCharacters=event.get('RequireLowercase', 'true').lower() == 'true',
                      RequireNumbers=event.get('RequireNumbers', 'true').lower() == 'true',
                      RequireSymbols=event.get('RequireSymbols', 'true').lower() == 'true',
                      AllowUsersToChangePassword=event.get('AllowUsersToChangePassword', 'true').lower() == 'true',
                      MaxPasswordAge=int(event.get('MaxPasswordAge', 90)),
                      PasswordReusePrevention=int(event.get('PasswordReusePrevention', 24)),
                      HardExpiry=event.get('HardExpiry', 'false').lower() == 'true'
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Password policy updated successfully')
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error updating password policy: {str(e)}')
                  }

Outputs:
  LambdaFunctionARN:
    Description: ARN of the password policy management Lambda function
    Value: !GetAtt LambdaFunction.Arn
  PolicySummary:
    Description: Summary of password policy settings
    Value: !Sub |
      Minimum Password Length: ${MinimumPasswordLength}
      Require Uppercase: ${RequireUppercase}
      Require Lowercase: ${RequireLowercase}
      Require Numbers: ${RequireNumbers}
      Require Symbols: ${RequireSymbols}
      Allow Users To Change Password: ${AllowUsersToChangePassword}
      Max Password Age: ${MaxPasswordAge} days
      Password Reuse Prevention: ${PasswordReusePrevention} passwords
      Hard Expiry: ${HardExpiry}