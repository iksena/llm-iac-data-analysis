AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template provisions an event-driven integration between AWS EventBridge
  and a MongoDB API endpoint for processing or logging application events.
  It includes an EventBridge event bus, a Connection using API key authentication, an API Destination,
  an IAM role to invoke the API Destination, and a dead-letter SQS queue for fault tolerance.

Resources:
  MongoDBEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MongoDBEventBus

  MongoDBDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDLQQueue

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: MongoDBConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "test_name"
          ApiKeyValue: "test_value"
      Description: "Connection for MongoDB API endpoint using API key authentication."

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      ConnectionArn: !GetAtt MongoDBConnection.ConnectionArn
      InvocationEndpoint: "https://www.testanu.com"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt MongoDBApiDestination.ApiDestinationArn

  MongoDBEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: MongoDBEventRule
      EventBusName: !Ref MongoDBEventBus
      EventPattern:
        source:
          - "custom.application"
        detail-type:
          - "MongoDBEvent"
      Targets:
        - Id: "Target0"
          Arn: !GetAtt MongoDBApiDestination.ApiDestinationArn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt MongoDBDeadLetterQueue.Arn

Outputs:
  EventBusName:
    Description: "Name of the EventBridge Event Bus"
    Value: !Ref MongoDBEventBus
  ApiDestinationArn:
    Description: "ARN of the MongoDB API Destination"
    Value: !GetAtt MongoDBApiDestination.ApiDestinationArn
  DeadLetterQueueArn:
    Description: "ARN of the Dead-Letter SQS Queue"
    Value: !GetAtt MongoDBDeadLetterQueue.Arn