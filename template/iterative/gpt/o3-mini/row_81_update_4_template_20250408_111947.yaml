AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS Resource Group using tag-based filters
  to include instances from services such as EC2, RDS, SageMaker, and SSM.
Parameters:
  GroupName:
    Description: "The name for the resource group."
    Type: String
  TagKey:
    Description: "The tag key used for filtering resources."
    Type: String
    Default: "Environment"
  TagValue:
    Description: "The tag value used for filtering resources."
    Type: String
    Default: "Production"
Resources:
  MyResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Ref GroupName
      Description: "Resource group defined by tag-based filters for multiple AWS service instances."
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query: !Sub "{\"ResourceTypeFilters\": [\"AWS::EC2::Instance\", \"AWS::RDS::DBInstance\", \"AWS::SageMaker::NotebookInstance\", \"AWS::SSM::ManagedInstance\"], \"TagFilters\": [{\"Key\": \"${TagKey}\", \"Values\": [\"${TagValue}\"]}]}"
      Tags:
        - Key: GroupCreatedBy
          Value: CloudFormation
Outputs:
  ResourceGroupName:
    Description: "The name of the created resource group."
    Value: !Ref MyResourceGroup
  ResourceGroupArn:
    Description: "The ARN of the created resource group."
    Value: !GetAtt MyResourceGroup.Arn