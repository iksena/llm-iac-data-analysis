AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway with SES Integration for Email Service'

Parameters:
  APIGatewayStageName:
    Type: String
    Default: 'prod'
    Description: 'Stage name for API Gateway deployment'
    AllowedPattern: '^[a-zA-Z0-9]+$'
    ConstraintDescription: 'Only alphanumeric characters allowed'

  UsagePlanQuota:
    Type: Number
    Default: 10000
    Description: 'Monthly quota for API usage plan'
    MinValue: 1000

  ThrottlingRate:
    Type: Number
    Default: 500
    Description: 'Requests per second throttling rate'
    MinValue: 1

Resources:
  APIGatewayRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'apigateway.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
      Policies:
        - PolicyName: 'SESAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - 'ses:SendEmail'
                  - 'ses:SendRawEmail'
                Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:*'

  EmailAPI:
    Type: 'AWS::ApiGateway::RestApi'
    Properties:
      Name: 'EmailService'
      Description: 'API for sending emails via SES'
      EndpointConfiguration:
        Types:
          - REGIONAL

  EmailResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref EmailAPI
      ParentId: !GetAtt EmailAPI.RootResourceId
      PathPart: 'email'

  EmailModel:
    Type: 'AWS::ApiGateway::Model'
    Properties:
      RestApiId: !Ref EmailAPI
      ContentType: 'application/json'
      Name: 'EmailRequest'
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        title: 'EmailRequest'
        type: 'object'
        required:
          - to
          - from
          - subject
        properties:
          to:
            type: 'string'
            pattern: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
          from:
            type: 'string'
            pattern: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
          subject:
            type: 'string'
            minLength: 1
            maxLength: 256
          content:
            type: 'object'
            properties:
              text:
                type: 'string'
              html:
                type: 'string'

  EmailMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: 'POST'
      AuthorizationType: 'NONE'
      ApiKeyRequired: true
      RequestModels:
        application/json: !Ref EmailModel
      Integration:
        Type: 'AWS'
        Credentials: !GetAtt APIGatewayRole.Arn
        IntegrationHttpMethod: 'POST'
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail'
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: |
            #set($inputRoot = $input.path('$'))
            Action=SendEmail
            &Source=$util.urlEncode($inputRoot.from)
            &Destination.ToAddresses.member.1=$util.urlEncode($inputRoot.to)
            &Message.Subject.Data=$util.urlEncode($inputRoot.subject)
            #if($inputRoot.content.text)
            &Message.Body.Text.Data=$util.urlEncode($inputRoot.content.text)
            #end
            #if($inputRoot.content.html)
            &Message.Body.Html.Data=$util.urlEncode($inputRoot.content.html)
            #end
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"messageId":"$input.path(''$.MessageId'')","status":"success"}'
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: '{"message":"$input.path(''$.message'')"}'
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: '{"message":"Internal server error"}'
      MethodResponses:
        - StatusCode: '200'
        - StatusCode: '400'
        - StatusCode: '500'

  APIDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    DependsOn: 
      - EmailMethod
    Properties:
      RestApiId: !Ref EmailAPI
      Description: 'Production deployment'

  APIStage:
    Type: 'AWS::ApiGateway::Stage'
    Properties:
      DeploymentId: !Ref APIDeployment
      RestApiId: !Ref EmailAPI
      StageName: !Ref APIGatewayStageName
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  APIUsagePlan:
    Type: 'AWS::ApiGateway::UsagePlan'
    DependsOn: APIStage
    Properties:
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: !Ref APIGatewayStageName
      Description: 'Email Service Usage Plan'
      Quota:
        Limit: !Ref UsagePlanQuota
        Period: 'MONTH'
      Throttle:
        BurstLimit: !Ref ThrottlingRate
        RateLimit: !Ref ThrottlingRate

  APIKey:
    Type: 'AWS::ApiGateway::ApiKey'
    DependsOn: APIStage
    Properties:
      Name: 'EmailServiceKey'
      Description: 'API Key for Email Service'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailAPI
          StageName: !Ref APIGatewayStageName

  UsagePlanKey:
    Type: 'AWS::ApiGateway::UsagePlanKey'
    Properties:
      KeyId: !Ref APIKey
      KeyType: 'API_KEY'
      UsagePlanId: !Ref APIUsagePlan

Outputs:
  APIEndpoint:
    Description: 'API Endpoint URL'
    Value: !Sub 'https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com/${APIGatewayStageName}/email'

  APIKeyId:
    Description: 'API Key ID'
    Value: !Ref APIKey

  UsagePlanId:
    Description: 'Usage Plan ID'
    Value: !Ref APIUsagePlan