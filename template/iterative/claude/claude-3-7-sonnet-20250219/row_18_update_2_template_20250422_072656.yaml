AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an integration between DynamoDB streams and EventBridge using Pipes'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: UserTable
  
  StreamViewType:
    Type: String
    Description: Type of data to be streamed from DynamoDB
    Default: NEW_AND_OLD_IMAGES
    AllowedValues:
      - NEW_IMAGE
      - OLD_IMAGE
      - NEW_AND_OLD_IMAGES
      - KEYS_ONLY
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge bus
    Default: default
  
  EventSource:
    Type: String
    Description: Source value for the EventBridge event
    Default: com.mycompany.users
  
  EventDetailType:
    Type: String
    Description: DetailType value for the EventBridge event
    Default: UserAvatarUpdated

Conditions:
  IsCustomEventBus: !Not [!Equals [!Ref EventBusName, 'default']]

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: !Ref StreamViewType

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Condition: IsCustomEventBus
    Properties:
      Name: !Ref EventBusName

  DLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${TableName}-pipe-dlq'
      MessageRetentionPeriod: 1209600

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDynamoDBReadOnlyAccess
      Policies:
        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
        - PolicyName: SQSPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DLQueue.Arn

  DynamoDBToEventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${TableName}-to-eventbridge'
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
          DeadLetterConfig:
            Arn: !GetAtt DLQueue.Arn
          MaximumBatchingWindowInSeconds: 60
          MaximumRecordAgeInSeconds: 86400
      Enrichment: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:dummy'
      Target: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: !Ref EventDetailType
          Source: !Ref EventSource

Outputs:
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  
  StreamArn:
    Description: ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn
  
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt DynamoDBToEventBridgePipe.Arn
  
  EventBusArn:
    Description: ARN of the EventBridge bus
    Value: !If 
      - IsCustomEventBus
      - !GetAtt EventBridgeBus.Arn
      - !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default'