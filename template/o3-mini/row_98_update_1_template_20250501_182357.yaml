AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS Amplify web application and a production branch
  to host and deploy a TodoApp.

Parameters:
  AppName:
    Description: "Name of the Amplify App for the TodoApp project"
    Type: String
    Default: "TodoAppAmplifyApp"
  RepositoryURL:
    Description: "URL of the Git repository containing the TodoApp source code"
    Type: String
  OAuthToken:
    Description: "OAuth token for accessing the Git repository (if needed)"
    Type: String
    NoEcho: true
    Default: ""
  BranchName:
    Description: "The name of the branch to deploy. Default to production."
    Type: String
    Default: "production"

Resources:
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Description: "Amplify App hosting the TodoApp project"
      Repository: !Ref RepositoryURL
      OauthToken: !Ref OAuthToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - echo "Starting pre-build..."
            build:
              commands:
                - echo "Building the TodoApp..."
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      EnvironmentVariables:
        - Name: ENV
          Value: "production"

  ProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref TodoAppAmplifyApp
      BranchName: !Ref BranchName
      Description: "Production branch for the TodoApp deployment"
      Stage: "PRODUCTION"

Outputs:
  AmplifyAppId:
    Description: "ID of the created Amplify App"
    Value: !Ref TodoAppAmplifyApp
  AmplifyBranchName:
    Description: "Production branch name used for deployment"
    Value: !Ref ProductionBranch