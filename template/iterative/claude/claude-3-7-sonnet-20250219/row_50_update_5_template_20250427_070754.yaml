AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a scalable URL-to-PNG screenshot service with SQS and S3 integration'

Parameters:
  InstanceType:
    Description: EC2 instance type for worker nodes
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
    ConstraintDescription: Must be a valid EC2 instance type

  LoadTestInstanceType:
    Description: EC2 instance type for load test instance
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair

  VpcId:
    Description: VPC ID for the instances
    Type: AWS::EC2::VPC::Id

  SubnetIds:
    Description: List of subnet IDs (minimum 2 for high availability)
    Type: List<AWS::EC2::Subnet::Id>
    ConstraintDescription: Must be a list of at least two existing subnet IDs

  MinInstances:
    Description: Minimum number of worker instances
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2

  MaxInstances:
    Description: Maximum number of worker instances
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10

  S3BucketPrefix:
    Description: Prefix for S3 bucket name
    Type: String
    Default: screenshot-service
    AllowedPattern: '[a-z0-9][a-z0-9-]*'
    ConstraintDescription: S3 bucket prefix can include numbers, lowercase letters, and hyphens

  SQSQueueName:
    Description: Name for SQS queue
    Type: String
    Default: screenshot-requests
    AllowedPattern: '[a-zA-Z0-9_-]+'
    ConstraintDescription: SQS queue name can include alphanumeric characters, hyphens, and underscores

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac
    eu-west-1:
      AMI: ami-0905a3c97561e0b69
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-northeast-1:
      AMI: ami-0f903fb156f24adbf
    ap-southeast-1:
      AMI: ami-0b825ad86ddcfb907
    ap-southeast-2:
      AMI: ami-04f5097681773b989

Resources:
  # S3 Bucket for storing screenshots
  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${S3BucketPrefix}-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldScreenshots
            Status: Enabled
            ExpirationInDays: 30

  # Dead Letter Queue for failed screenshot requests
  ScreenshotDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${SQSQueueName}-dlq"
      MessageRetentionPeriod: 1209600  # 14 days

  # SQS Queue for screenshot requests
  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SQSQueueName
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600  # 4 days
      DelaySeconds: 0
      ReceiveMessageWaitTimeSeconds: 20  # Enable long polling
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScreenshotDeadLetterQueue.Arn
        maxReceiveCount: 5

  # IAM Role for Worker Instances
  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  # IAM Policy for Worker Instances
  WorkerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: WorkerInstancePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt ScreenshotQueue.Arn
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt ScreenshotBucket.Arn
              - !Sub "${ScreenshotBucket.Arn}/*"
      Roles:
        - !Ref WorkerRole

  # IAM Instance Profile for Worker Instances
  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref WorkerRole

  # IAM Role for Load Test Instance
  LoadTestRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  # IAM Policy for Load Test Instance
  LoadTestPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LoadTestInstancePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: !GetAtt ScreenshotQueue.Arn
      Roles:
        - !Ref LoadTestRole

  # IAM Instance Profile for Load Test Instance
  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref LoadTestRole

  # Security Group for Worker Instances
  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for screenshot worker instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Security Group for Load Test Instance
  LoadTestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for load test instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Launch Template for Worker Instances
  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-worker-launch-template"
      VersionDescription: Initial version
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref WorkerSecurityGroup
        IamInstanceProfile:
          Name: !Ref WorkerInstanceProfile
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64:
            !Join
              - ""
              - - |
                  #!/bin/bash -xe
                  # Update system
                  yum update -y
                  yum install -y amazon-linux-extras

                  # Install required packages
                  amazon-linux-extras install -y epel
                  yum install -y gcc-c++ make git unzip wget jq

                  # Install Node.js
                  curl -sL https://rpm.nodesource.com/setup_16.x | bash -
                  yum install -y nodejs

                  # Install Chromium and dependencies
                  yum install -y chromium

                  # Create service directory
                  mkdir -p /opt/screenshot-service
                  cd /opt/screenshot-service

                  # Create package.json
                  cat > package.json << 'EOFPKG'
                  {
                    "name": "screenshot-service",
                    "version": "1.0.0",
                    "description": "URL to PNG screenshot service",
                    "main": "index.js",
                    "dependencies": {
                      "aws-sdk": "^2.1048.0",
                      "puppeteer-core": "^13.0.0",
                      "uuid": "^8.3.2"
                    }
                  }
                  EOFPKG

                  # Install dependencies
                  npm install

                  # Create service script
                  cat > index.js << 'EOFJS'
                  const AWS = require('aws-sdk');
                  const puppeteer = require('puppeteer-core');
                  const { v4: uuidv4 } = require('uuid');
                  const fs = require('fs');
                  const path = require('path');
                  const { URL } = require('url');

                  // Configure AWS
                  AWS.config.update({ region: process.env.AWS_REGION });
                  const s3 = new AWS.S3();
                  const sqs = new AWS.SQS();

                  const QUEUE_URL = process.env.QUEUE_URL;
                  const BUCKET_NAME = process.env.BUCKET_NAME;
                  const TEMP_DIR = '/tmp/screenshots';

                  // Ensure temp directory exists
                  if (!fs.existsSync(TEMP_DIR)) {
                    fs.mkdirSync(TEMP_DIR, { recursive: true });
                  }

                  async function takeScreenshot(url) {
                    console.log(`Taking screenshot of ${url}`);
                    
                    const browser = await puppeteer.launch({
                      executablePath: '/usr/bin/chromium-browser',
                      args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'],
                      headless: true
                    });
                    
                    try {
                      const page = await browser.newPage();
                      await page.setViewport({ width: 1280, height: 800 });
                      await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
                      
                      // Generate a safe filename
                      const urlObj = new URL(url);
                      const hostname = urlObj.hostname;
                      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                      const filename = `${hostname}-${timestamp}-${uuidv4()}.png`;
                      const filePath = path.join(TEMP_DIR, filename);
                      
                      await page.screenshot({ path: filePath, fullPage: true });
                      console.log(`Screenshot saved to ${filePath}`);
                      
                      // Upload to S3
                      const fileContent = fs.readFileSync(filePath);
                      const params = {
                        Bucket: BUCKET_NAME,
                        Key: `screenshots/${filename}`,
                        Body: fileContent,
                        ContentType: 'image/png'
                      };
                      
                      await s3.upload(params).promise();
                      console.log(`Screenshot uploaded to S3: ${params.Key}`);
                      
                      // Clean up local file
                      fs.unlinkSync(filePath);
                      
                      return filename;
                    } finally {
                      await browser.close();
                    }
                  }

                  async function processMessages() {
                    try {
                      const receiveParams = {
                        QueueUrl: QUEUE_URL,
                        MaxNumberOfMessages: 1,
                        WaitTimeSeconds: 20,
                        VisibilityTimeout: 300
                      };
                      
                      const data = await sqs.receiveMessage(receiveParams).promise();
                      
                      if (!data.Messages || data.Messages.length === 0) {
                        console.log('No messages to process');
                        return;
                      }
                      
                      const message = data.Messages[0];
                      console.log(`Processing message: ${message.MessageId}`);
                      
                      try {
                        const body = JSON.parse(message.Body);
                        const url = body.url;
                        
                        if (!url) {
                          throw new Error('No URL found in message');
                        }
                        
                        await takeScreenshot(url);
                        
                        // Delete message after successful processing
                        const deleteParams = {
                          QueueUrl: QUEUE_URL,
                          ReceiptHandle: message.ReceiptHandle
                        };
                        
                        await sqs.deleteMessage(deleteParams).promise();
                        console.log(`Message ${message.MessageId} deleted from queue`);
                      } catch (err) {
                        console.error(`Error processing message: ${err.message}`);
                        // Message will return to queue after visibility timeout
                      }
                    } catch (err) {
                      console.error(`Error receiving messages: ${err.message}`);
                    }
                  }

                  // Main loop
                  async function main() {
                    while (true) {
                      await processMessages();
                    }
                  }

                  main().catch(err => {
                    console.error(`Fatal error: ${err.message}`);
                    process.exit(1);
                  });
                  EOFJS
                - |

                  # Create systemd service
                  cat > /etc/systemd/system/screenshot-service.service << EOFSVC
                - !Sub |
                  [Unit]
                  Description=URL to PNG Screenshot Service
                  After=network.target

                  [Service]
                  Environment=AWS_REGION=${AWS::Region}
                  Environment=QUEUE_URL=${ScreenshotQueue.QueueUrl}
                  Environment=BUCKET_NAME=${ScreenshotBucket}
                  Type=simple
                  User=root
                  WorkingDirectory=/opt/screenshot-service
                  ExecStart=/usr/bin/node /opt/screenshot-service/index.js
                  Restart=always
                  RestartSec=10

                  [Install]
                  WantedBy=multi-user.target
                - |
                  EOFSVC

                  # Enable and start service
                  systemctl enable screenshot-service
                  systemctl start screenshot-service

                  # Send signal to CloudFormation
                - !Sub |
                  /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource WorkerAutoScalingGroup --region ${AWS::Region}

  # Auto Scaling Group for Worker Instances
  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${AWS::StackName}-worker-asg"
      MinSize: !Ref MinInstances
      MaxSize: !Ref MaxInstances
      DesiredCapacity: !Ref MinInstances
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-worker"
          PropagateAtLaunch: true
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: !Ref MinInstances
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT15M
        WaitOnResourceSignals: true
        SuspendProcesses:
          - HealthCheck
          - ReplaceUnhealthy
          - AZRebalance
          - AlarmNotification
          - ScheduledActions

  # CloudWatch Alarm for Scaling Up
  QueueDepthAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if queue depth grows beyond threshold
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  # CloudWatch Alarm for Scaling Down
  QueueDepthAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if queue depth is low
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 2
      ComparisonOperator: LessThanOrEqualToThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

  # Auto Scaling Policy for Scaling Up
  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  # Auto Scaling Policy for Scaling Down
  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  # Load Test Instance
  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref LoadTestInstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref LoadTestSecurityGroup
      SubnetId: !Select [0, !Ref SubnetIds]
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-load-test"
      UserData:
        Fn::Base64:
          !Join
            - ""
            - - |
                #!/bin/bash -xe
                # Update system
                yum update -y
                
                # Install Node.js
                curl -sL https://rpm.nodesource.com/setup_16.x | bash -
                yum install -y nodejs
                
                # Create load test directory
                mkdir -p /opt/load-test
                cd /opt/load-test
                
                # Create package.json
                cat > package.json << 'EOFPKG'
                {
                  "name": "screenshot-load-test",
                  "version": "1.0.0",
                  "description": "Load test for screenshot service",
                  "main": "index.js",
                  "dependencies": {
                    "aws-sdk": "^2.1048.0"
                  }
                }
                EOFPKG
                
                # Install dependencies
                npm install
                
                # Create load test script
                cat > index.js << 'EOFJS'
                const AWS = require('aws-sdk');
                
                // Configure AWS
                AWS.config.update({ region: process.env.AWS_REGION });
                const sqs = new AWS.SQS();
                
                const QUEUE_URL = process.env.QUEUE_URL;
                
                // List of popular websites to test
                const websites = [
                  'https://www.google.com',
                  'https://www.amazon.com',
                  'https://www.microsoft.com',
                  'https://www.apple.com',
                  'https://www.netflix.com',
                  'https://www.facebook.com',
                  'https://www.twitter.com',
                  'https://www.instagram.com',
                  'https://www.linkedin.com',
                  'https://www.github.com',
                  'https://www.reddit.com',
                  'https://www.wikipedia.org',
                  'https://www.nytimes.com',
                  'https://www.cnn.com',
                  'https://www.bbc.com',
                  'https://www.yahoo.com',
                  'https://www.ebay.com',
                  'https://www.twitch.tv',
                  'https://www.spotify.com',
                  'https://www.airbnb.com'
                ];
                
                async function sendMessage(url) {
                  const params = {
                    QueueUrl: QUEUE_URL,
                    MessageBody: JSON.stringify({ url }),
                    MessageAttributes: {
                      'Source': {
                        DataType: 'String',
                        StringValue: 'load-test'
                      }
                    }
                  };
                  
                  try {
                    const data = await sqs.sendMessage(params).promise();
                    console.log(`Message sent for ${url}, ID: ${data.MessageId}`);
                    return data;
                  } catch (err) {
                    console.error(`Error sending message for ${url}: ${err.message}`);
                    throw err;
                  }
                }
                
                async function runLoadTest() {
                  console.log('Starting load test...');
                  
                  // Send each URL to the queue
                  for (const url of websites) {
                    await sendMessage(url);
                    
                    // Random delay between 1-5 seconds
                    const delay = Math.floor(Math.random() * 4000) + 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                  }
                  
                  console.log('Load test completed');
                }
                
                // Run load test every hour
                async function main() {
                  while (true) {
                    try {
                      await runLoadTest();
                      console.log('Waiting for next load test cycle...');
                      await new Promise(resolve => setTimeout(resolve, 3600000)); // 1 hour
                    } catch (err) {
                      console.error(`Error in load test: ${err.message}`);
                      await new Promise(resolve => setTimeout(resolve, 60000)); // 1 minute before retry
                    }
                  }
                }
                
                main().catch(err => {
                  console.error(`Fatal error: ${err.message}`);
                  process.exit(1);
                });
                EOFJS
              - |

                # Create systemd service
                cat > /etc/systemd/system/load-test.service << EOFSVC
              - !Sub |
                [Unit]
                Description=Screenshot Service Load Test
                After=network.target
                
                [Service]
                Environment=AWS_REGION=${AWS::Region}
                Environment=QUEUE_URL=${ScreenshotQueue.QueueUrl}
                Type=simple
                User=root
                WorkingDirectory=/opt/load-test
                ExecStart=/usr/bin/node /opt/load-test/index.js
                Restart=always
                RestartSec=10
                
                [Install]
                WantedBy=multi-user.target
              - |
                EOFSVC
                
                # Enable and start service
                systemctl enable load-test
                systemctl start load-test

Outputs:
  ScreenshotBucketName:
    Description: Name of the S3 bucket storing screenshots
    Value: !Ref ScreenshotBucket

  ScreenshotQueueURL:
    Description: URL of the SQS queue for screenshot requests
    Value: !Ref ScreenshotQueue

  WorkerAutoScalingGroupName:
    Description: Name of the Auto Scaling Group for worker instances
    Value: !Ref WorkerAutoScalingGroup

  LoadTestInstanceId:
    Description: ID of the load test instance
    Value: !Ref LoadTestInstance