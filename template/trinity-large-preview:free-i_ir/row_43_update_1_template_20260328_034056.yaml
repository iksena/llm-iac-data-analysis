AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for S3 bucket with KMS encryption and lifecycle management

Resources:
  MyKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      EnableKeyRotation: true
    Metadata:
      Effect: encrypted

  MyKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/MyKMSKeyAlias
      TargetKeyId: !Ref MyKMSKey
    Metadata:
      Effect: key-management

  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-encrypted-bucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref MyKMSKeyAlias
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            Transition:
              - Days: 30
                StorageClass: STANDARD_IA
              - Days: 90
                StorageClass: GLACIER
      Tags:
        - Key: Environment
          Value: Production
        - Key: Project
          Value: DataAnalytics
    Metadata:
      Effect: encrypted
      Effect: lifecycle-managed
      Effect: tagged
    DependsOn:
      - MyKMSKeyAlias

Metadata:
  Invariants:
    - S3 bucket must use KMS encryption
    - Lifecycle management must transition objects to STANDARD_IA after 30 days and GLACIER after 90 days
    - KMS key must be rotated automatically
    - Bucket must be tagged for organizational tracking