AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyApiKey:
    Type: String
    NoEcho: true
    Description: Shopify Admin API Key for authentication

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: ShopifyProductEventBus

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyApiKey
      Name: ShopifyAPIConnection

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://testanu.myshopify.com/admin/api/2023-04/products.json'
      Name: ShopifyProductAPIDestination
      InvocationRateLimitPerSecond: 5

  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - "MyShopifyApp"
      Name: ShopifyProductEventRule
      State: ENABLED
      Targets:
        - Id: ShopifyProductTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the Shopify Event Bus
    Value: !GetAtt ShopifyEventBus.Arn

  ApiDestinationArn:
    Description: ARN of the Shopify API Destination
    Value: !GetAtt ShopifyApiDestination.Arn

  EventRuleArn:
    Description: ARN of the Event Rule
    Value: !GetAtt ShopifyEventRule.Arn