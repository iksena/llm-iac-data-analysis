AWSTemplateFormatVersion: "2010-09-09"
Description: >
  This CloudFormation template creates an Amazon Aurora MySQL cluster with CloudWatch Logs integration.
  It deploys a multi-AZ Aurora cluster with two publicly accessible db.t3.large instances across two subnets.
  Error log exports to CloudWatch are enabled for monitoring and troubleshooting.

Parameters:
  DBSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: The first public subnet ID for the Aurora cluster.
  DBSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: The second public subnet ID for the Aurora cluster.
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
    Description: The identifier for the Aurora cluster.
  DBName:
    Type: String
    Default: mydatabase
    Description: The database name for the Aurora cluster.
  MasterUsername:
    Type: String
    Description: The master user name for the Aurora cluster.
  MasterUserPassword:
    Type: AWS::SecretsManager::Secret::Value<String>
    NoEcho: true
    Description: The master user password for the Aurora cluster.

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets for Aurora MySQL cluster"
      SubnetIds:
        - !Ref DBSubnet1
        - !Ref DBSubnet2

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.07.1"
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      # Optionally, you can set tags or additional properties
    DependsOn: AuroraDBCluster

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
    DependsOn: AuroraDBCluster

Outputs:
  DBClusterEndpoint:
    Description: "Aurora MySQL DB Cluster Endpoint"
    Value: !GetAtt AuroraDBCluster.Endpoint
  DBReaderEndpoint:
    Description: "Aurora MySQL DB Cluster Reader Endpoint"
    Value: !GetAtt AuroraDBCluster.ReadEndpoint
  DBClusterIdentifierOutput:
    Description: "Aurora DB Cluster Identifier"
    Value: !Ref AuroraDBCluster