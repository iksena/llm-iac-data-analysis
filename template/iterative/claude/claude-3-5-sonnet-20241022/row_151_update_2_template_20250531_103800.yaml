AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Bedrock Agent with Lambda integration for stock price lookup'

Parameters:
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: Bedrock foundation model ID
  
  AgentName:
    Type: String
    Default: StockPriceAgent
    Description: Name of the Bedrock Agent
    
  LambdaFunctionName:
    Type: String
    Default: getStockPriceFunction
    Description: Name of the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const stockSymbol = event.stockSymbol;
            return {
              stockSymbol: stockSymbol,
              price: 100.00
            };
          };
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - bedrock.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt StockPriceLambdaFunction.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}'

  StockPriceAgent:
    Type: AWS::Bedrock::Agent
    DependsOn: BedrockAgentRole
    Properties:
      AgentName: !Ref AgentName
      FoundationModel: !Ref BedrockModelId
      Description: Agent for retrieving stock prices
      IdleSessionTTLInSeconds: 1800
      RoleArn: !GetAtt BedrockAgentRole.Arn
      Instruction: You are a stock price lookup assistant. When asked about stock prices, use the getStockPrice action to retrieve the current price for the requested stock symbol.

  StockPriceActionGroup:
    Type: AWS::Bedrock::AgentActionGroup
    DependsOn: StockPriceAgent
    Properties:
      AgentId: !Ref StockPriceAgent
      ActionGroupName: StockPriceActions
      Description: Action group for stock price operations
      ActionGroupExecutor: AWS_LAMBDA
      ActionGroupState: ENABLED
      ApiSchema: >-
        {
          "openapi": "3.0.0",
          "info": {
            "title": "Stock Price API",
            "version": "1.0.0"
          },
          "paths": {
            "/getStockPrice": {
              "post": {
                "operationId": "getStockPrice",
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "object",
                        "properties": {
                          "stockSymbol": {
                            "type": "string"
                          }
                        },
                        "required": ["stockSymbol"]
                      }
                    }
                  }
                },
                "responses": {
                  "200": {
                    "description": "Success",
                    "content": {
                      "application/json": {
                        "schema": {
                          "type": "object",
                          "properties": {
                            "stockSymbol": {
                              "type": "string"
                            },
                            "price": {
                              "type": "number"
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      LambdaFunctionArn: !GetAtt StockPriceLambdaFunction.Arn

Outputs:
  BedrockAgentId:
    Description: ID of the created Bedrock Agent
    Value: !Ref StockPriceAgent

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt StockPriceLambdaFunction.Arn

  BedrockAgentRoleArn:
    Description: ARN of the Bedrock Agent Role
    Value: !GetAtt BedrockAgentRole.Arn