AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for managing IAM account password policy'

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 8
    MaxValue: 128
    Description: Minimum length of password

  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords that users are prevented from reusing

  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Number of days before password expires

  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase letter in password

  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase letter in password

  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one number in password

  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one symbol in password

  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow users to change their own password

  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Prevent users from changing expired password

Resources:
  PasswordPolicyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PasswordPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt PasswordPolicyLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          def handler(event, context):
              iam = boto3.client('iam')
              response_data = {}
              
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      iam.update_account_password_policy(
                          MinimumPasswordLength=int(event['ResourceProperties']['MinimumPasswordLength']),
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'] == 'true',
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'] == 'true',
                          RequireUppercaseCharacters=event['ResourceProperties']['RequireUppercase'] == 'true',
                          RequireLowercaseCharacters=event['ResourceProperties']['RequireLowercase'] == 'true',
                          AllowUsersToChangePassword=event['ResourceProperties']['AllowUsersToChangePassword'] == 'true',
                          MaxPasswordAge=int(event['ResourceProperties']['MaxPasswordAge']),
                          PasswordReusePrevention=int(event['ResourceProperties']['PasswordReusePrevention']),
                          HardExpiry=event['ResourceProperties']['HardExpiry'] == 'true'
                      )
                      response_data['Message'] = 'Password policy updated successfully'
                  elif event['RequestType'] == 'Delete':
                      iam.delete_account_password_policy()
                      response_data['Message'] = 'Password policy deleted'
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Runtime: python3.9
      Timeout: 30
      MemorySize: 128

  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      PasswordReusePrevention: !Ref PasswordReusePrevention
      MaxPasswordAge: !Ref MaxPasswordAge
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry: !Ref HardExpiry

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PasswordPolicyLambda}
      RetentionInDays: 14

Outputs:
  PasswordPolicyStatus:
    Description: Status of the password policy deployment
    Value: !GetAtt PasswordPolicyCustomResource.Message

  LambdaFunctionArn:
    Description: ARN of the Lambda function managing the password policy
    Value: !GetAtt PasswordPolicyLambda.Arn