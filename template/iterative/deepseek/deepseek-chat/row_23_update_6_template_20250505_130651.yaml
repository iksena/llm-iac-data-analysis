AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for creating a DynamoDB table

Parameters:
  TableName:
    Description: Name of the DynamoDB table
    Type: String
    Default: MyDynamoDBTable
    AllowedPattern: ^[a-zA-Z0-9_.-]+$
    ConstraintDescription: Table name can only contain alphanumeric characters, dots, hyphens, and underscores.

  BillingMode:
    Description: Choose between PROVISIONED or PAY_PER_REQUEST billing mode
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Description: Number of read capacity units (required if PROVISIONED)
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000
    ConstraintDescription: Must be between 1 and 40000

  WriteCapacityUnits:
    Description: Number of write capacity units (required if PROVISIONED)
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000
    ConstraintDescription: Must be between 1 and 40000

  PrimaryKeyName:
    Description: Name of the primary key attribute
    Type: String
    Default: id

  PrimaryKeyType:
    Description: Data type of the primary key attribute
    Type: String
    Default: S
    AllowedValues:
      - S
      - N
      - B

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, "PROVISIONED"]

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref PrimaryKeyName
          AttributeType: !Ref PrimaryKeyType
      KeySchema:
        - AttributeName: !Ref PrimaryKeyName
          KeyType: HASH
      BillingMode: !Ref BillingMode
      ProvisionedThroughput:
        !If
        - IsProvisioned
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref "AWS::NoValue"
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableARN:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableARN"