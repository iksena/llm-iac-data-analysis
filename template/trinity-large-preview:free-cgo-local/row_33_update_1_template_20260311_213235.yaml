AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2IAMReadOnlyRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2IAMReadOnlyRole1'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Description: IAM role for EC2 instances with read-only access to IAM metadata

  EC2IAMReadOnlyRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2IAMReadOnlyRole2'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Description: IAM role for EC2 instances with read-only access to IAM metadata

Outputs:
  Role1Arn:
    Description: ARN of the first IAM role
    Value: !GetAtt EC2IAMReadOnlyRole1.Arn
  Role2Arn:
    Description: ARN of the second IAM role
    Value: !GetAtt EC2IAMReadOnlyRole2.Arn