AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates an IAM role with configurable
  permission boundary enforcement and governance policies for developer-created IAM resources.

Parameters:
  StrictBoundaryEnforcement:
    Description: "Toggle strict permission boundary enforcement. Choose 'Enabled' to enforce boundary constraints; 'Disabled' to allow broader IAM actions."
    Type: String
    Default: "Enabled"
    AllowedValues:
      - Enabled
      - Disabled
  DeveloperOwnerTag:
    Description: "Team-specific Owner tag value required for developer-managed IAM resources."
    Type: String
    Default: "MyTeam"

Conditions:
  IsStrict: !Equals [ !Ref StrictBoundaryEnforcement, "Enabled" ]

Resources:
  DefaultPermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DefaultPermissionBoundaryPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
            Resource: "*"
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
              - iam:Generate*
            Resource: "*"

  DeveloperIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperIAMRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      # Conditionally attach the permission boundary if strict enforcement is enabled.
      PermissionsBoundary: !If 
        - IsStrict
        - !Ref DefaultPermissionBoundaryPolicy
        - !Ref "AWS::NoValue"
      Path: /
      Policies:
        - PolicyName: IAMDevManagementPolicy
          PolicyDocument: 
            Version: '2012-10-17'
            Statement: !If
              - IsStrict
              - 
                - Effect: Allow
                  Action:
                    - iam:CreateRole
                    - iam:UpdateRole
                    - iam:AttachRolePolicy
                    - iam:DetachRolePolicy
                    - iam:CreatePolicy
                    - iam:UpdatePolicy
                    - iam:DeletePolicy
                  Resource: "*"
                  Condition:
                    StringEquals:
                      aws:RequestTag/Owner: !Ref DeveloperOwnerTag
                      iam:PermissionsBoundary: !Ref DefaultPermissionBoundaryPolicy
                    StringLike:
                      iam:RoleName: "MyTeam*"
              -
                - Effect: Allow
                  Action:
                    - iam:CreateRole
                    - iam:UpdateRole
                    - iam:AttachRolePolicy
                    - iam:DetachRolePolicy
                    - iam:CreatePolicy
                    - iam:UpdatePolicy
                    - iam:DeletePolicy
                  Resource: "*"

Outputs:
  DeveloperIAMRoleArn:
    Description: "ARN of the developer management IAM role"
    Value: !GetAtt DeveloperIAMRole.Arn
  DefaultPermissionBoundaryPolicyArn:
    Description: "ARN of the default permission boundary policy"
    Value: !Ref DefaultPermissionBoundaryPolicy