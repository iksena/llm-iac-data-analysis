AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: RolePassingPrivileges
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    'iam:PassedToService': 'fis.amazonaws.com'
                  StringLike:
                    'aws:ResourceTag/workshop': '*'
        - PolicyName: ServiceLinkedRoleCreation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    'iam:AWSServiceName': 'fis.amazonaws.com'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/environment': 'prod'

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISLimitedAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:Get*'
                  - 'fis:List*'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
              - Effect: Allow
                Action: 'fis:TagResource'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/environment': 'prod'

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'

Outputs:
  SecurityAdminsRoleArn:
    Description: ARN of the Security Admins role
    Value: !GetAtt SecurityAdminsRole.Arn
  AdminsRoleArn:
    Description: ARN of the Admins role
    Value: !GetAtt AdminsRole.Arn
  UsersRoleArn:
    Description: ARN of the Users role
    Value: !GetAtt UsersRole.Arn
  NonUsersRoleArn:
    Description: ARN of the Non-Users role
    Value: !GetAtt NonUsersRole.Arn