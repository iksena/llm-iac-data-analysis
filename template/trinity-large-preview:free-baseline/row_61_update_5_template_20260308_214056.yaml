AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a private Route 53 Hosted Zone for internal DNS management within a VPC.

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID to associate with the private hosted zone
    Default: vpc-00000000000000000
  DomainName:
    Type: String
    Default: www.example.com
    Description: The domain name for the private hosted zone

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management

Outputs:
  HostedZoneID:
    Description: The ID of the created hosted zone
    Value: !Ref PrivateHostedZone