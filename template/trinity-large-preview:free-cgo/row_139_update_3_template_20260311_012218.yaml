AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with custom Lambda resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
    Description: First number for arithmetic operation
  SecondNumber:
    Type: Number
    Default: 5
    Description: Second number for arithmetic operation
  Operator:
    Type: String
    Default: +
    AllowedValues:
      - +
      - -
      - *
      - /
    Description: Arithmetic operator to use
  SimulateFailure:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: Simulate custom resource failure for testing

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import cfnresponse
          import json

          def lambda_handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, "delete")
                      return

                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']
                  simulate_failure = event['ResourceProperties']['SimulateFailure']

                  if simulate_failure.lower() == 'true':
                      raise Exception("Simulated failure for testing")

                  if operator == '+':
                      result = first_number + second_number
                  elif operator == '-':
                      result = first_number - second_number
                  elif operator == '*':
                      result = first_number * second_number
                  elif operator == '/':
                      if second_number == 0:
                          raise Exception("Division by zero error")
                      result = first_number / second_number
                  else:
                      raise Exception("Invalid operator")

                  response_data = {
                      'Result': result,
                      'Message': f"Calculation successful: {first_number} {operator} {second_number} = {result}"
                  }

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, "arithmetic-result")
              except Exception as e:
                  error_message = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, error_message)

  CustomArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomArithmeticResource.Result
  ResponseMessage:
    Description: Lambda function response message
    Value: !GetAtt CustomArithmeticResource.Message