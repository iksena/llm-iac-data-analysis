AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an RDS DB instance with a DB parameter group.
Resources:
  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: My DB Parameter Group
      Family: mysql8.0
      Parameters:
        character_set_server: utf8
  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.t3.micro
      DBInstanceIdentifier: MyDBInstance
      DBName: MyDatabase
      Engine: mysql
      EngineVersion: 8.0
      MasterUsername: masteruser
      MasterUserPassword: MyStrongPassword!
      DBParameterGroupName: !Ref DBParameterGroup
      DeletionProtection: false
      StorageType: gp2
      SkipFinalSnapshot: true
      VpcSecurityGroupIds:
        - !Ref SecurityGroup
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic on port 3306
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      VpcId: !Ref VPC
Outputs:
  DBInstanceEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Description: The endpoint of the DB instance
  DBInstancePort:
    Value: !GetAtt DBInstance.Endpoint.Port
    Description: The port of the DB instance

Parameters:
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
