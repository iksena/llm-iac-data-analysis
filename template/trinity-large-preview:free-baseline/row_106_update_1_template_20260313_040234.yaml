AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with event-driven notifications to an SNS topic

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-bucket
      NotificationConfiguration:
        TopicConfigurations:
          - Topic: !Ref SNSTopic
            Events:
              - s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: ""

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-topic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:s3:::${S3Bucket}
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId

Outputs:
  BucketName:
    Description: The name of the created S3 bucket
    Value: !Ref S3Bucket
  TopicARN:
    Description: The ARN of the created SNS topic
    Value: !Ref SNSTopic