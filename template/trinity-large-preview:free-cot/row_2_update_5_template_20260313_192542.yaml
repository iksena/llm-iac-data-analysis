AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon S3 bucket with defaults

Parameters:
  BucketName:
    Type: String
    Default: my-default-bucket
    Description: Name of the S3 bucket (must be globally unique)
    MinLength: 3
    MaxLength: 63
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
  EnableVersioning:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Enable S3 versioning for the bucket
  EnableEncryption:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Enable server-side encryption for the bucket
  AccessLoggingBucket:
    Type: String
    Default: ''
    Description: Optional S3 bucket for access logging (leave blank to disable)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !If [EnableVersioning, Enabled, Suspended]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: default

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'