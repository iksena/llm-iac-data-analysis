AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub ${AWS::StackName}-ResourceGroup
      Description: Resource Group for tagged instances across multiple services
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - "AWS::EC2::Instance"
            - "AWS::RDS::DBInstance"
            - "AWS::SageMaker::NotebookInstance"
            - "AWS::SSM::ManagedInstanceInventory"
          TagFilters:
            - Key: Environment
              Values:
                - Production
                - Development
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.Arn
  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ResourceGroup