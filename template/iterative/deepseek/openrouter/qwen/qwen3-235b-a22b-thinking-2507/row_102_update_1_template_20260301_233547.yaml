AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Lambda1S3Bucket:
    Type: String
    Description: S3 bucket containing the code for the first Lambda function
  Lambda1S3Key:
    Type: String
    Description: S3 key for the code of the first Lambda function
  Lambda2S3Bucket:
    Type: String
    Description: S3 bucket containing the code for the second Lambda function
  Lambda2S3Key:
    Type: String
    Description: S3 key for the code of the second Lambda function
Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TableName: RiskManagementData
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt RiskManagementTable.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
  RiskDataIngestionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskDataIngestion
      Runtime: python3.9
      Handler: lambda_function.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref Lambda1S3Bucket
        S3Key: !Ref Lambda1S3Key
      Timeout: 30
      MemorySize: 256
  RiskAnalysisFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskAnalysis
      Runtime: python3.9
      Handler: lambda_function.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref Lambda2S3Bucket
        S3Key: !Ref Lambda2S3Key
      Timeout: 30
      MemorySize: 256
  RiskAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskManagementAlerts
  RiskAlertsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskAlertsTopic
      PolicyDocument:
        Version: '2008-10-17'
        Statement:
          - Sid: AllowSSMOpsCenterPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskAlertsTopic
Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table for risk management data
    Value: !Ref RiskManagementTable
  IngestionFunctionName:
    Description: Name of the risk data ingestion Lambda function
    Value: !Ref RiskDataIngestionFunction
  AnalysisFunctionName:
    Description: Name of the risk analysis Lambda function
    Value: !Ref RiskAnalysisFunction
  AlertsTopicArn:
    Description: ARN of the SNS topic for risk notifications
    Value: !Ref RiskAlertsTopic