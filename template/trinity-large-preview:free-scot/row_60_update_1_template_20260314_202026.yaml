AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption key for AWS resources
      Enabled: true
      KeyUsage: ENCRYPT_DECRYPT
      CustomerMasterKeySpec: SYMMETRIC_DEFAULT
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - kms:*
            Resource: '*'

  MyKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/my-centralized-encryption-key
      TargetKeyId: !Ref MyKMSKey