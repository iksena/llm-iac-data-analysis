AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with ephemeral storage in default VPC'

Parameters:
  LatestAmiParameter:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'

Resources:
  DefaultSubnetLookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2LookupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                Resource: '*'

  DefaultSubnetLookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          ec2 = boto3.client('ec2')

          def lambda_handler(event, context):
            try:
              request_type = event['RequestType']
              
              if request_type == 'Create':
                # Find default VPC
                vpcs = ec2.describe_vpcs(Filters=[{'Name': 'is-default', 'Values': ['true']}])
                if not vpcs['Vpcs']:
                  raise Exception("No default VPC found")
                vpc_id = vpcs['Vpcs'][0]['VpcId']
                
                # Find first subnet in default VPC
                subnets = ec2.describe_subnets(Filters=[
                  {'Name': 'vpc-id', 'Values': [vpc_id]},
                  {'Name': 'default-for-az', 'Values': ['true']}
                ])
                if not subnets['Subnets']:
                  raise Exception("No default subnets found in default VPC")
                
                subnet_id = subnets['Subnets'][0]['SubnetId']
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {'SubnetId': subnet_id}, subnet_id)
              
              else:
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, '')
                
            except Exception as e:
              logger.error('Error: %s', e)
              cfnresponse.send(event, context, cfnresponse.FAILED, {'error': str(e)})

      Handler: index.lambda_handler
      Role: !GetAtt DefaultSubnetLookupRole.Arn
      Runtime: python3.14
      Timeout: 30

  DefaultSubnetId:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt DefaultSubnetLookupFunction.Arn

  EC2KeyPairRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2KeyPairPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                Resource: '*'

  EC2KeyPairFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          ec2 = boto3.client('ec2')

          def lambda_handler(event, context):
            try:
              request_type = event['RequestType']
              props = event['ResourceProperties']
              physical_id = event.get('PhysicalResourceId')

              if request_type == 'Create':
                key_name = props['KeyName']
                response = ec2.create_key_pair(KeyName=key_name)
                cfnresponse.send(
                  event, 
                  context, 
                  cfnresponse.SUCCESS, 
                  {
                    'KeyName': response['KeyName'],
                    'PrivateKey': response['KeyMaterial']
                  },
                  key_name
                )
              elif request_type == 'Delete':
                ec2.delete_key_pair(KeyName=physical_id)
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
              else:
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
            except Exception as e:
              logger.error('Exception: %s', e)
              cfnresponse.send(event, context, cfnresponse.FAILED, {'error': str(e)})
      Handler: index.lambda_handler
      Role: !GetAtt EC2KeyPairRole.Arn
      Runtime: python3.14
      Timeout: 30

  EC2KeyPair:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt EC2KeyPairFunction.Arn
      KeyName: !Sub '${AWS::StackName}-KeyPair'

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiParameter
      InstanceType: m5d.large
      KeyName: !GetAtt EC2KeyPair.KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !GetAtt DefaultSubnetId.SubnetId
      BlockDeviceMappings:
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          echo "Instance initialized with ephemeral storage"

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  KeyPairName:
    Description: Name of the generated SSH key pair
    Value: !GetAtt EC2KeyPair.KeyName
  PrivateKey:
    Description: WARNING - Private key material - store securely and delete from CloudFormation events
    Value: !GetAtt EC2KeyPair.PrivateKey
  SecurityGroup:
    Description: Security group ID for SSH access
    Value: !Ref InstanceSecurityGroup