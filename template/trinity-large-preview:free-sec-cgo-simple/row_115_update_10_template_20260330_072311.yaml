AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecretsManagerAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerAlertTopic
      TopicName: SecretsManagerAlertTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for Secrets Manager API calls
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - DeleteSecret
            - UpdateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerAlertTopic
          Id: SendToSNS

  EventBridgeToSNSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EventBridgeToSNSPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sns:Publish
            Resource: !Ref SecretsManagerAlertTopic
      Roles:
        - !GetAtt [AWS::Events::Rule, Arn]

Outputs:
  SNSAlertTopicARN:
    Description: ARN of the SNS topic for Secrets Manager alerts
    Value: !Ref SecretsManagerAlertTopic
  EventBridgeRuleARN:
    Description: ARN of the EventBridge rule for Secrets Manager API calls
    Value: !Ref SecretsManagerEventRule