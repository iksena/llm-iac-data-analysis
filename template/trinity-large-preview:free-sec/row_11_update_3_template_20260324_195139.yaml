AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MobileNotifications
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: sentTime
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: alias/aws/dynamodb

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref MobileNotificationsTable
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt MobileNotificationsTable.Arn