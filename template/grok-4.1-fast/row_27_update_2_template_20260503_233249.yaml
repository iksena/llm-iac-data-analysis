AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready real-time data pipeline: Kinesis Stream -> Firehose -> S3'

Parameters:
  StreamName:
    Type: String
    Default: 'my-data-stream'
    Description: 'Name for the Kinesis Data Stream'
    MinLength: 1
    MaxLength: 128
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1000
    Description: 'Number of shards for the Kinesis Stream'
  DeliveryStreamName:
    Type: String
    Default: 'my-firehose-delivery-stream'
    Description: 'Name for the Kinesis Data Firehose Delivery Stream'
    MinLength: 1
    MaxLength: 64
  BucketName:
    Type: String
    Description: 'Globally unique S3 bucket name (must be DNS compliant)'
  RetentionPeriodHours:
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168
    Description: 'Kinesis Stream data retention in hours'
  StartingPosition:
    Type: String
    Default: 'LATEST'
    AllowedValues:
      - LATEST
      - TRIM_HORIZON
    Description: 'Starting position for Firehose consumption from Kinesis Stream'

Resources:
  DataBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref BucketName

  DataBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt FirehoseRole.Arn
            Action:
              - 's3:PutObject'
              - 's3:PutObjectAcl'
            Resource: !Sub '${DataBucket.Arn}/*'
    DependsOn: DataBucket

  # CloudWatch Log Group for Firehose logging
  FirehoseLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/kinesis-firehose/${DeliveryStreamName}'
      RetentionInDays: 14
      Tags:
        - Key: Name
          Value: !Sub '${DeliveryStreamName}-logs'

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'firehose.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'KinesisReadPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kinesis:DescribeStream'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                  - 'kinesis:ListShards'
                Resource: !GetAtt DataStream.Arn
        - PolicyName: 'S3WritePolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:PutObjectAcl'
                Resource: !Sub '${DataBucket.Arn}/*'
        - PolicyName: 'CloudWatchLogsPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesis-firehose/${DeliveryStreamName}:*'
      Tags:
        - Key: Name
          Value: !Sub '${DeliveryStreamName}-role'

  DataStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours
      Tags:
        - Key: Name
          Value: !Ref StreamName

  DeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Ref DeliveryStreamName
      DeliveryStreamType: 'KinesisStreamAsSource'
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        StartingPosition: !Ref StartingPosition
      S3DestinationConfiguration:
        RoleARN: !GetAtt FirehoseRole.Arn
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          SizeInMBs: 1
          IntervalInSeconds: 60
        CompressionFormat: UNCOMPRESSED
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        ErrorPrefix: 'error/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Sub '${DeliveryStreamName}'
      Tags:
        - Key: Name
          Value: !Ref DeliveryStreamName
    DependsOn:
      - DataStream
      - FirehoseRole
      - DataBucket
      - DataBucketPolicy
      - FirehoseLogGroup

Outputs:
  KinesisStreamName:
    Description: 'Name of the Kinesis Data Stream'
    Value: !Ref DataStream
  KinesisStreamArn:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt DataStream.Arn
  DeliveryStreamName:
    Description: 'Name of the Firehose Delivery Stream'
    Value: !Ref DeliveryStream
  DeliveryStreamArn:
    Description: 'ARN of the Firehose Delivery Stream'
    Value: !GetAtt DeliveryStream.Arn
  S3BucketName:
    Description: 'Name of the S3 Bucket'
    Value: !Ref DataBucket
  S3BucketArn:
    Description: 'ARN of the S3 Bucket'
    Value: !GetAtt DataBucket.Arn
  FirehoseRoleArn:
    Description: 'ARN of the Firehose IAM Role'
    Value: !GetAtt FirehoseRole.Arn
  FirehoseLogGroup:
    Description: 'CloudWatch Log Group for Firehose'
    Value: !Ref FirehoseLogGroup