AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that deploys an EC2 instance with an
  associated Elastic IP and SSH access controls. This template creates its own VPC,
  public Subnet, Internet Gateway, and required routing resources.

Parameters:
  KeyName:
    Description: "Optional: Name of an existing EC2 KeyPair to enable SSH access. Leave empty to launch without a key pair."
    Type: String
    Default: ""
  InstanceType:
    Description: "EC2 Instance Type."
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.nano
      - t2.micro
      - t2.small
      - t2.medium

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: "ami-0c94855ba95c71c99"
    us-west-2:
      AMI: "ami-09d95fab7fff3776c"
    eu-west-1:
      AMI: "ami-0b0dcb5067f052a63"

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "MyVPC"

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "10.0.0.0/24"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "MyPublicSubnet"

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: "MyInternetGateway"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  MyRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: "MyRouteTable"

  MyRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref MyRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref MyInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet
      RouteTableId: !Ref MyRouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security Group for SSH access on port 22"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "EC2SecurityGroup"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::FindInMap:
          - AWSRegionToAMI
          - !Ref "AWS::Region"
          - AMI
      InstanceType: !Ref InstanceType
      SubnetId: !Ref MySubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      KeyName: !If
        - HasKeyName
        - !Ref KeyName
        - !Ref "AWS::NoValue"
      Tags:
        - Key: Name
          Value: "MyEC2Instance"

  EC2ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: "vpc"

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EC2ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

Outputs:
  VPCId:
    Description: "The ID of the VPC created."
    Value: !Ref MyVPC
  SubnetId:
    Description: "The ID of the public Subnet created."
    Value: !Ref MySubnet
  InstanceId:
    Description: "The ID of the deployed EC2 instance."
    Value: !Ref EC2Instance
  ElasticIP:
    Description: "The Elastic IP address allocated to the instance."
    Value: !Ref EC2ElasticIP
  SecurityGroupId:
    Description: "The ID of the security group associated with the EC2 instance."
    Value: !Ref EC2SecurityGroup