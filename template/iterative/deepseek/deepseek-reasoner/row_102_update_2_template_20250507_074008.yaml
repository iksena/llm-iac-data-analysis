AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda function code
  AssessmentLambdaKey:
    Type: String
    Description: S3 key for risk assessment Lambda code
  ResponseLambdaKey:
    Type: String
    Description: S3 key for risk response Lambda code

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaDynamoDBAccess
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
            Resource: !GetAtt RiskManagementTable.Arn

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskAssessmentFunction
      Runtime: python3.9
      Timeout: 30
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref AssessmentLambdaKey
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
      DependsOn: LambdaDynamoDBPolicy

  RiskResponseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskResponseFunction
      Runtime: python3.9
      Timeout: 30
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref ResponseLambdaKey
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
      DependsOn: LambdaDynamoDBPolicy

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskAlertsTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableName:
    Value: !Ref RiskManagementTable
  RiskAssessmentLambda:
    Value: !Ref RiskAssessmentFunction
  RiskResponseLambda:
    Value: !Ref RiskResponseFunction
  NotificationTopicARN:
    Value: !Ref RiskNotificationTopic
  LambdaRoleARN:
    Value: !GetAtt LambdaExecutionRole.Arn