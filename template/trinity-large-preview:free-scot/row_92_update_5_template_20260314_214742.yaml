AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  S3BucketName:
    Type: String
    Default: nginx-logs-bucket
    Description: Unique name for the S3 bucket to store SSM logs

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${LogsBucket}/*'

  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              yum update -y
              yum install -y nginx
              systemctl start nginx
              systemctl enable nginx
              echo "Nginx running on $(hostname)" > /var/www/html/index.html
            - { InstanceId: !Ref NginxInstance }

  NginxInstallAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      DocumentVersion: '$LATEST'
      Parameters:
        commands:
          - yum -y install nginx
          - systemctl start nginx
          - systemctl enable nginx
          - echo "Nginx running" > /var/www/html/index.html
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref NginxInstance
      ScheduleExpression: rate(1 minute)
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref S3BucketName
          OutputS3KeyPrefix: logs/ssm/

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx server
    Value: !Ref NginxInstance
  PublicIp:
    Description: Public IP address of the Nginx server
    Value: !GetAtt NginxInstance.PublicIp
  S3BucketName:
    Description: Name of the S3 bucket for SSM logs
    Value: !Ref LogsBucket