AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for VPC flow logs with lifecycle management and access controls

Parameters:
  BucketName:
    Type: String
    Description: Optional custom name for the S3 bucket (default: vpc-flow-logs-<random>)
    Default: ''
  VersioningStatus:
    Type: String
    Description: Versioning status for the S3 bucket (Enabled/Disabled)
    Default: Suspended
    AllowedValues:
      - Enabled
      - Suspended
  LifecycleTransitionDays:
    Type: Number
    Description: Number of days before transitioning logs to Glacier (default: 30)
    Default: 30
    MinValue: 1
    MaxValue: 1000
  LifecycleExpirationDays:
    Type: Number
    Description: Number of days before deleting logs (default: 365000)
    Default: 365000
    MinValue: 1
    MaxValue: 1000000

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Join ['-', ['vpc-flow-logs', !Ref 'AWS::AccountId']]]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${VPCFlowLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  VPCFlowLogsLifecycleConfiguration:
    Type: AWS::S3::BucketLifecycleConfiguration
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      Rules:
        - Id: TransitionToGlacier
          Status: Enabled
          Transitions:
            - TransitionInDays: !Ref LifecycleTransitionDays
              StorageClass: GLACIER
          ExpirationInDays: !Ref LifecycleExpirationDays

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Outputs:
  BucketName:
    Description: Name of the S3 bucket for VPC flow logs
    Value: !Ref VPCFlowLogsBucket
  BucketArn:
    Description: ARN of the S3 bucket for VPC flow logs
    Value: !GetAtt VPCFlowLogsBucket.Arn