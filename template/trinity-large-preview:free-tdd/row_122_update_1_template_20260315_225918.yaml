AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify's product creation API

Parameters:
  ShopifyAdminApiKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: "dummy-key"  # Default value to prevent deployment failures

Resources:
  MyShopifyAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ShopifyConnection
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyAdminApiKey

  ShopifyProductCreationApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      ConnectionName: !Ref ShopifyConnection
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2023-07/products.json
      HttpMethod: POST

  ShopifyProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyProductCreationApiDestination.Arn
          Id: ShopifyProductCreationTarget

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: MyShopifyApp