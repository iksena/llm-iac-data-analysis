AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  MyEventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Source:
        DynamoDBStreamParameters:
          StreamArn: !GetAtt MyDynamoDBTable.StreamArn
      Target:
        Arn: !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:default"
        RoleArn: !GetAtt PipeTargetRole.Arn
        EventBridgeParameters:
          DetailType: "UserAvatarUpdate"
          Source: "com.example.user.avatar"
      Enrichment:
        Type: FILTER
        Parameters:
          InputPath: "$"
          Filter:
            EventPattern:
              detail:
                NewImage:
                  avatarUrl:
                    EndsWith: ".png"

  PipeTargetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetRolePolicy