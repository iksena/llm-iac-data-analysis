AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instance with Nginx and SSM logging to S3'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
    ConstraintDescription: Must be a valid EC2 instance type.

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance (optional)
    Type: String
    Default: ''
    
  VpcId:
    Description: VPC where the EC2 instance will be launched
    Type: AWS::EC2::VPC::Id
    
  SubnetId:
    Description: Subnet where the EC2 instance will be launched
    Type: AWS::EC2::Subnet::Id

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-east-2:
      AMI: ami-02d1e544b84bf7502
    us-west-1:
      AMI: ami-0d9858aa3c6322f73
    us-west-2:
      AMI: ami-098e42ae54c764c35
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d
    eu-central-1:
      AMI: ami-0a1ee2fb28fe05df3
    ap-northeast-1:
      AMI: ami-0ab0bbbd329f565e6
    ap-southeast-1:
      AMI: ami-0f62aafc6efe8fd7b
    ap-southeast-2:
      AMI: ami-0186908e2fdeea8f3

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  LoggingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: SSM Logging Bucket
        - Key: Purpose
          Value: Nginx SSM Logs

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt LoggingBucket.Arn
                  - !Sub "${LoggingBucket.Arn}/*"
      Tags:
        - Key: Name
          Value: EC2-SSM-Role
        - Key: Purpose
          Value: Nginx Automation

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2Role

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server with HTTP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: WebServerSecurityGroup
        - Key: Purpose
          Value: Nginx Web Server

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasKeyName
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access
      Tags:
        - Key: Name
          Value: SSHSecurityGroup
        - Key: Purpose
          Value: SSH Access

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: !If
        - HasKeyName
        - [!Ref WebServerSecurityGroup, !Ref SSHSecurityGroup]
        - [!Ref WebServerSecurityGroup]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: NginxWebServer
        - Key: Purpose
          Value: Web Hosting
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system packages
          yum update -y
          
          # Ensure SSM agent is running
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
          
          # Install Nginx directly in user data
          amazon-linux-extras install nginx1 -y
          
          # Create a custom index page
          cat > /usr/share/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Welcome to Nginx on Amazon Linux 2</title>
              <style>
                  body {
                      width: 35em;
                      margin: 0 auto;
                      font-family: Tahoma, Verdana, Arial, sans-serif;
                  }
              </style>
          </head>
          <body>
              <h1>Welcome to Nginx on Amazon Linux 2!</h1>
              <p>If you see this page, the nginx web server is successfully installed and
              working.</p>
              <p>This instance was deployed using AWS CloudFormation and configured with AWS Systems Manager.</p>
              <p>Instance ID: $(curl -s http://169.254.169.254/latest/meta-data/instance-id)</p>
              <p>Availability Zone: $(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone)</p>
          </body>
          </html>
          EOF
          
          # Configure Nginx to start on boot and start it now
          systemctl enable nginx
          systemctl start nginx
          
          # Create a script to log Nginx status to S3
          cat > /tmp/log-nginx-status.sh << 'EOF'
          #!/bin/bash
          TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
          INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
          LOG_FILE="/tmp/nginx-status-$TIMESTAMP.log"
          
          echo "Nginx Status Check - $TIMESTAMP" > $LOG_FILE
          echo "Instance ID: $INSTANCE_ID" >> $LOG_FILE
          echo "-----------------------------------" >> $LOG_FILE
          systemctl status nginx >> $LOG_FILE 2>&1
          echo "-----------------------------------" >> $LOG_FILE
          echo "Nginx Configuration:" >> $LOG_FILE
          cat /etc/nginx/nginx.conf >> $LOG_FILE
          
          # Upload to S3
          aws s3 cp $LOG_FILE s3://${LoggingBucket}/logs/nginx-status/$INSTANCE_ID/
          rm $LOG_FILE
          EOF
          
          chmod +x /tmp/log-nginx-status.sh
          /tmp/log-nginx-status.sh
          
          # Create a cron job to run the script every 15 minutes
          echo "*/15 * * * * /tmp/log-nginx-status.sh" | crontab -

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LoggingBucket
          OutputS3KeyPrefix: logs/ssm-commands
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref WebServerInstance
      Parameters:
        commands:
          - |
            #!/bin/bash
            # Check if Nginx is running
            if systemctl is-active --quiet nginx; then
              echo "Nginx is running"
            else
              echo "Nginx is not running, attempting to start"
              systemctl start nginx
            fi
            
            # Log system information
            echo "System information:"
            uname -a
            free -m
            df -h
            
            # Log Nginx version
            nginx -v
            
            # Log date and time
            echo "Check completed at $(date)"

Outputs:
  WebServerInstanceId:
    Description: ID of the EC2 instance
    Value: !Ref WebServerInstance
    
  WebServerPublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicIp
    
  WebServerPublicDNS:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicDnsName
    
  WebsiteURL:
    Description: URL to access the Nginx web server
    Value: !Sub "http://${WebServerInstance.PublicDnsName}"
    
  LoggingBucketName:
    Description: Name of the S3 bucket storing SSM logs
    Value: !Ref LoggingBucket
    
  LoggingBucketPath:
    Description: Path to the SSM logs in the S3 bucket
    Value: !Sub "s3://${LoggingBucket}/logs/"