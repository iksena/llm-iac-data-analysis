AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Managed Policies for S3 Access and Database Protection

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read/Write access to ios-apps.sagebridge.org S3 bucket for iOS application
      Path: /
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - arn:aws:s3:::ios-apps.sagebridge.org
              - arn:aws:s3:::ios-apps.sagebridge.org/*

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Protection policy to prevent DynamoDB table deletion and schema modifications
      Path: /
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:UpdateTableReplicaAutoScaling
              - dynamodb:UpdateGlobalTable
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Protection policy to prevent destructive RDS operations
      Path: /
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
            Resource: '*'

Outputs:
  S3AccessPolicyArn:
    Description: ARN of the S3 Access Policy
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyArn:
    Description: ARN of the DynamoDB Protection Policy
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyArn:
    Description: ARN of the RDS Protection Policy
    Value: !Ref RDSProtectionPolicy