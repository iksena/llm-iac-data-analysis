AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create and manage AWS account-wide IAM password policy with customizable security requirements

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    Description: Minimum password length for IAM users
  RequireSymbols:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one symbol in passwords
  RequireNumbers:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one number in passwords
  RequireUppercaseCharacters:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one uppercase character in passwords
  RequireLowercaseCharacters:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one lowercase character in passwords
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Maximum age (in days) before passwords expire
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    Description: Number of previous passwords to prevent reuse
  AllowUsersToChangePassword:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Allow IAM users to change their own passwords
  EnablePermissionBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Enable IAM permission boundary for users
  PermissionBoundaryName:
    Type: String
    Default: IAMUserPermissionBoundary
    Description: Name of the IAM permission boundary policy

Resources:
  IAMPasswordPolicy:
    Type: AWS::IAM::AccountPasswordPolicy
    Properties:
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireSymbols: !Ref RequireSymbols
      RequireNumbers: !Ref RequireNumbers
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EnablePermissionBoundary
    Properties:
      ManagedPolicyName: !Ref PermissionBoundaryName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:CreateAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def lambda_handler(event, context):
              client = boto3.client('iam')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      client.update_account_password_policy(
                          MinimumPasswordLength=int(event['ResourceProperties']['MinimumPasswordLength']),
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'] == 'true',
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'] == 'true',
                          RequireUppercaseCharacters=event['ResourceProperties']['RequireUppercaseCharacters'] == 'true',
                          RequireLowercaseCharacters=event['ResourceProperties']['RequireLowercaseCharacters'] == 'true',
                          MaxPasswordAge=int(event['ResourceProperties']['MaxPasswordAge']),
                          PasswordReusePrevention=int(event['ResourceProperties']['PasswordReusePrevention']),
                          AllowUsersToChangePassword=event['ResourceProperties']['AllowUsersToChangePassword'] == 'true'
                      )
                  elif event['RequestType'] == 'Delete':
                      client.delete_account_password_policy()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyManagerLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireSymbols: !Ref RequireSymbols
      RequireNumbers: !Ref RequireNumbers
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

Outputs:
  PasswordPolicyStatus:
    Description: Current IAM password policy settings
    Value: !Join
      - ', '
      - - !If [EnablePermissionBoundary, !Ref PermissionBoundaryPolicy, 'No permission boundary']
        - !Join
          - ' '
          - - 'Min Length:'
            - !Ref MinimumPasswordLength
        - !Join
          - ' '
          - - 'Require Symbols:'
            - !Ref RequireSymbols
        - !Join
          - ' '
          - - 'Require Numbers:'
            - !Ref RequireNumbers
        - !Join
          - ' '
          - - 'Require Uppercase:'
            - !Ref RequireUppercaseCharacters
        - !Join
          - ' '
          - - 'Require Lowercase:'
            - !Ref RequireLowercaseCharacters
        - !Join
          - ' '
          - - 'Max Age (days):'
            - !Ref MaxPasswordAge
        - !Join
          - ' '
          - - 'Reuse Prevention:'
            - !Ref PasswordReusePrevention
        - !Join
          - ' '
          - - 'Allow Changes:'
            - !Ref AllowUsersToChangePassword
  LambdaFunctionArn:
    Description: ARN of the password policy management Lambda function
    Value: !GetAtt PasswordPolicyManagerLambda.Arn