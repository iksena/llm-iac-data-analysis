AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create EventBridge configuration for routing custom events to an external API endpoint via HTTPS

Parameters:
  APIKey:
    Type: String
    Description: API key for authentication to the external API endpoint
    NoEcho: true
    Default: 'dummy-api-key'  # Default value for testing, should be replaced in production

  APIEndpointURL:
    Type: String
    Description: The URL of the external API endpoint
    Default: 'https://webhook.site/testtest'

  ConnectionName:
    Type: String
    Description: Name for the EventBridge connection
    Default: 'EventBridgeConnectionToExternalAPI'

Resources:
  APISecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'EventBridgeAPISecret-${AWS::StackName}'
      SecretString: !Ref APIKey

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Name: !Ref ConnectionName
      ApiKeyAuthParameters:
        ApiKeyName: 'x-api-key'
        ApiKeyValue: !Sub '{{resolve:secretsmanager:${APISecret}::SecretString}}'

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: 'CustomEventBus'

  EventBridgeAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: 'ExternalAPIDestination'
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: !Ref APIEndpointURL
      HttpMethod: 'POST'

Outputs:
  EventBusName:
    Description: The name of the created EventBridge event bus
    Value: !Ref EventBridgeEventBus

  APIDestinationName:
    Description: The name of the created API destination
    Value: !Ref EventBridgeAPIDestination

  ConnectionName:
    Description: The name of the created EventBridge connection
    Value: !Ref EventBridgeConnection