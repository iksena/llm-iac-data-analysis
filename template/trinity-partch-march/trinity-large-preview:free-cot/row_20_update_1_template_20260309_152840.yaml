AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Client VPN Monitoring Dashboard and Logs Insights Queries

Parameters:
  DashboardName:
    Type: String
    Default: ClientVPNAnalytics
    Description: Name for the CloudWatch Dashboard
  TimeRange:
    Type: Number
    Default: 24
    Description: Time range in hours for dashboard queries
  LogGroupName:
    Type: String
    Default: /aws/vpn-endpoint
    Description: CloudWatch Logs group name for Client VPN

Resources:
  ClientVPNAnalyticsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${DashboardName}-${AWS::Region}-${AWS::AccountId}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Analytics Dashboard\n\n**Time Range:** Last ${TimeRange} hours"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": {
                  "expression": "SOURCE_SQL_QUERY_1",
                  "id": "query1"
                },
                "region": "${AWS::Region}",
                "title": "Connection Duration Analysis"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": {
                  "expression": "SOURCE_SQL_QUERY_2",
                  "id": "query2"
                },
                "region": "${AWS::Region}",
                "title": "Data Transfer Analysis"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 7,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": {
                  "expression": "SOURCE_SQL_QUERY_3",
                  "id": "query3"
                },
                "region": "${AWS::Region}",
                "title": "User Activity Analysis"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 7,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": {
                  "expression": "SOURCE_SQL_QUERY_4",
                  "id": "query4"
                },
                "region": "${AWS::Region}",
                "title": "Endpoint Usage Analysis"
              }
            }
          ]
        }

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationAnalysis
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, duration
        | filter @message like /connection established/
        | stats avg(duration) as avg_duration, max(duration) as max_duration, min(duration) as min_duration
        | sort avg_duration desc
        | limit 100

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DataTransferAnalysis
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, bytes_in, bytes_out
        | filter @message like /connection closed/
        | stats sum(bytes_in) as total_ingress, sum(bytes_out) as total_egress
        | sort total_ingress desc
        | limit 100

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: UserActivityAnalysis
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, user_name, authentication_type
        | filter @message like /connection established/
        | stats count(*) as connection_count by user_name, authentication_type
        | sort connection_count desc
        | limit 100

  EndpointUsageQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: EndpointUsageAnalysis
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, endpoint_id
        | filter @message like /connection established/
        | stats count(*) as connection_count by endpoint_id
        | sort connection_count desc
        | limit 50

  AuthenticationBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: AuthenticationBreakdown
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, authentication_type
        | filter @message like /connection established/
        | stats count(*) as connection_count by authentication_type
        | sort connection_count desc

  ActiveUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ActiveUsersAnalysis
      LogGroupName: !Ref LogGroupName
      QueryString: !Sub |
        fields @timestamp, @message, user_name
        | filter @message like /connection established/
        | stats count(*) as connection_count by user_name
        | filter connection_count > 1
        | sort connection_count desc
        | limit 50

Outputs:
  DashboardURL:
    Description: URL for the CloudWatch Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}-${AWS::Region}-${AWS::AccountId}
  ConnectionDurationQueryARN:
    Description: ARN for Connection Duration Query
    Value: !GetAtt ConnectionDurationQuery.Arn
  DataTransferQueryARN:
    Description: ARN for Data Transfer Query
    Value: !GetAtt DataTransferQuery.Arn
  UserActivityQueryARN:
    Description: ARN for User Activity Query
    Value: !GetAtt UserActivityQuery.Arn
  EndpointUsageQueryARN:
    Description: ARN for Endpoint Usage Query
    Value: !GetAtt EndpointUsageQuery.Arn