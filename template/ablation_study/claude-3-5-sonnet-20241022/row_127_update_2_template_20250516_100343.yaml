AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template to create Amazon EFS file system in us-east-1a'

Parameters:
  VpcId:
    Type: String
    Description: 'VPC ID where EFS will be created'

  SubnetId:
    Type: String
    Description: 'Subnet ID in us-east-1a'

Resources:
  EFSSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for EFS mount targets'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: 'efs-security-group'

  FileSystem:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: 'test-efs'

  MountTarget:
    Type: 'AWS::EFS::MountTarget'
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: 'EFS File System ID'
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: 'EFS File System DNS Name'
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'

  MountTargetId:
    Description: 'EFS Mount Target ID'
    Value: !Ref MountTarget