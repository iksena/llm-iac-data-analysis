AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Secrets Manager monitoring and alerting system

Parameters:
  EmailTopicDisplayName:
    Type: String
    Default: SecretsManagerAlerts
    Description: Display name for the SNS topic
  EventSchemaName:
    Type: String
    Default: SecretsManagerEventSchema
    Description: Name for the Event Schema
  EventSchemaVersion:
    Type: String
    Default: '1.0'
    Description: Version for the Event Schema

Resources:
  SecretsManagerAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Ref EmailTopicDisplayName
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  SecretsManagerEventSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content:
        Type: JSON
        Schema: '{"$schema": "http://json-schema.org/draft-07/schema#", "type": "object", "properties": {"detail": {"type": "object", "properties": {"eventName": {"type": "string"}, "requestParameters": {"type": "object", "properties": {"secretId": {"type": "string"}, "versionId": {"type": "string"}}}}}}}}'
      Description: Schema for Secrets Manager API events
      RegistryName: SecretsManagerEvents
      SchemaName: !Ref EventSchemaName
      SchemaVersion: !Ref EventSchemaVersion
      Tags:
        - Key: Purpose
          Value: EventSchema

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Event rule for Secrets Manager API calls
      EventPattern:
        source:
          - 'aws.secretsmanager'
        detail:
          eventName:
            - 'PutSecretValue'
            - 'DeleteSecret'
            - 'RestoreSecret'
            - 'RotateSecret'
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerAlertTopic
          Id: SendToSNS
          InputTransformer:
            InputPathsMap:
              secretId: "$.detail.requestParameters.secretId"
              eventName: "$.detail.eventName"
            InputTemplate: '{"default": "Secrets Manager Event: <eventName> occurred for secret <secretId>"}'

  EventBridgeInvokePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EventBridgeInvokePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sns:Publish
            Resource: !Ref SecretsManagerAlertTopic
      Roles:
        - !GetAtt SecretsManagerEventRule.Arn

Outputs:
  SNSAlertTopicARN:
    Description: ARN of the SNS topic for Secrets Manager alerts
    Value: !Ref SecretsManagerAlertTopic
  EventRuleARN:
    Description: ARN of the EventBridge rule
    Value: !Ref SecretsManagerEventRule