AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to create an S3 bucket with an SQS queue for event-driven object upload notifications."

Parameters:
  SQSQueueName:
    Description: "The name of the SQS queue."
    Type: String
    Default: "S3NotificationQueue"

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SQSQueueName

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${AWS::Region}-bucket"
      NotificationConfiguration:
        QueueConfigurations:
          - Event: "s3:ObjectCreated:*"
            Queue: !GetAtt SQSQueue.Arn

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowS3BucketSendMessage"
            Effect: Allow
            Principal:
              Service: "s3.amazonaws.com"
            Action: "SQS:SendMessage"
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${BucketName}"
                # Substitute BucketName with the actual S3 bucket name by referencing the S3Bucket resource
                # The "BucketName" variable is defined in the mapping below
                # Note: !Ref S3Bucket returns the bucket name when BucketName property is explicitly set.
                BucketName: !Ref S3Bucket

Outputs:
  S3BucketNameOutput:
    Description: "The name of the created S3 bucket."
    Value: !Ref S3Bucket
  SQSQueueURL:
    Description: "The URL of the created SQS queue."
    Value: !Ref SQSQueue
  SQSQueueARN:
    Description: "The ARN of the created SQS queue."
    Value: !GetAtt SQSQueue.Arn