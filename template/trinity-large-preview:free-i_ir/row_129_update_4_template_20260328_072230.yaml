AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and compliant AWS Config setup with customizable retention policies and delivery configurations

Resources:
  ConfigS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: config-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ConfigRetention
            Status: Enabled
            ExpirationInDays: 2557

  ConfigSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: config-topic

  ConfigRecorderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: config-recorder-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: config-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketAcl
                  - s3:PutObject
                Resource:
                  - !GetAtt ConfigS3Bucket.Arn
                  - !Sub '${ConfigS3Bucket.Arn}/*'
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref ConfigSnsTopic
              - Effect: Allow
                Action: iam:PassRole
                Resource: '*'

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: config-recorder
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true
      RoleARN: !GetAtt ConfigRecorderRole.Arn

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      Name: config-delivery-channel
      S3BucketName: !Ref ConfigS3Bucket

  ConfigRetentionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: config-retention-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lambda-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action: s3:PutLifecycleConfiguration
                Resource: !GetAtt ConfigS3Bucket.Arn

  ConfigRetentionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: config-retention-manager
      Runtime: python3.14
      Handler: index.handler
      Code:
        ZipFile: |
          def handler(event, context):
              # Lambda code to manage retention periods
              return {}
      Role: !GetAtt ConfigRetentionLambdaRole.Arn

  ConfigRetentionCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ConfigRetentionLambda.Arn
      RetentionDays: 2557

Outputs:
  ConfigBucketName:
    Description: Name of the Config S3 bucket
    Value: !Ref ConfigS3Bucket
  ConfigTopicARN:
    Description: ARN of the Config SNS topic
    Value: !Ref ConfigSnsTopic
  ConfigRecorderARN:
    Description: ARN of the Config recorder
    Value: !GetAtt ConfigRecorder.Id