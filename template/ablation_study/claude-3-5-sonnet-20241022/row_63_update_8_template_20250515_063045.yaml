AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL cluster with CloudWatch Logs integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the DB cluster will be deployed

  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for DB cluster

  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for DB cluster

  DBName:
    Type: String
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    Default: 'mydb'

  DBMasterUsername:
    Type: String
    Description: Database admin username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    Default: 'admin'

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: 
        - !Ref Subnet1
        - !Ref Subnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  RDSMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Aurora database secret
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBMasterUsername}"}'
        GenerateStringKey: password
        ExcludeCharacters: '"@/\'
        PasswordLength: 16

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.04.3'
      DatabaseName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds: 
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      Port: 3306

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      PubliclyAccessible: true
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      AutoMinorVersionUpgrade: true
      AvailabilityZone: !Select [0, !GetAZs '']

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      PubliclyAccessible: true
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSMonitoringRole.Arn
      AutoMinorVersionUpgrade: true
      AvailabilityZone: !Select [1, !GetAZs '']

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt AuroraDBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address

  SecretARN:
    Description: Secret ARN for database credentials
    Value: !Ref DBSecret

  DBInstanceEndpoint1:
    Description: First DB Instance Endpoint
    Value: !GetAtt DBInstance1.Endpoint.Address

  DBInstanceEndpoint2:
    Description: Second DB Instance Endpoint
    Value: !GetAtt DBInstance2.Endpoint.Address