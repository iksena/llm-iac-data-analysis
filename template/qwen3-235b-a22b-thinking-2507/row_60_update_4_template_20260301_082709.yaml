AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS KMS Key with Alias for centralized encryption management'
Parameters:
  KeyAliasName:
    Type: String
    Default: my-encryption-key
    Description: 'Name for the KMS key alias (without "alias/" prefix)'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '[a-zA-Z0-9/_-]+'
    ConstraintDescription: >-
      Alias name can only contain alphanumeric characters, forward slashes, underscores, and hyphens
  KeyDescription:
    Type: String
    Default: 'KMS key for centralized encryption management'
    Description: 'Description of the KMS key'
    MinLength: 1
    MaxLength: 4096
Resources:
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KeyDescription
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      EnableKeyRotation: true
  KeyAliasResource:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${KeyAliasName}'
      TargetKeyId: !Ref EncryptionKey
Outputs:
  KeyId:
    Value: !Ref EncryptionKey
    Description: 'ID of the KMS key'
  KeyArn:
    Value: !GetAtt EncryptionKey.Arn
    Description: 'ARN of the KMS key'
  AliasName:
    Value: !Sub 'alias/${KeyAliasName}'
    Description: 'Complete alias name for the KMS key'