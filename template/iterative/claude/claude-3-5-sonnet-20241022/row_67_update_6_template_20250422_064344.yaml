AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket with optional AWS Organization-wide access'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*$'
    ConstraintDescription: Bucket name must contain only lowercase letters, numbers, dots (.), and hyphens (-)

  OrganizationId:
    Type: String
    Description: (Optional) AWS Organization ID for organization-wide access
    Default: ''

  EnableOrganizationAccess:
    Type: String
    Description: Enable access for the entire organization
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'false'

Conditions:
  IsOrganizationAccessEnabled: 
    Fn::Equals: 
      - Ref: EnableOrganizationAccess
      - 'true'
  HasOrganizationId: 
    Fn::Not: 
      - Fn::Equals: 
          - Ref: OrganizationId
          - ''
  CreateOrgPolicy: 
    Fn::And:
      - Condition: IsOrganizationAccessEnabled
      - Condition: HasOrganizationId

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: 
        Ref: BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateOrgPolicy
    Properties:
      Bucket: 
        Ref: S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccess
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - Fn::Sub: 'arn:aws:s3:::${S3Bucket}'
              - Fn::Sub: 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: 
                  Ref: OrganizationId

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: 
      Ref: S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: 
      Fn::GetAtt: 
        - S3Bucket
        - Arn

  BucketDomainName:
    Description: Domain name of the created S3 bucket
    Value: 
      Fn::GetAtt: 
        - S3Bucket
        - DomainName

  OrganizationAccess:
    Description: Organization access status
    Value: 
      Fn::If: 
        - CreateOrgPolicy
        - 'Enabled'
        - 'Disabled'