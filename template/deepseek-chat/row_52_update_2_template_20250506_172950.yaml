AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region application failover architecture using Route 53 ARC'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: 'Primary AWS region for the application'
  
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: 'Secondary AWS region for failover'
  
  ClusterName:
    Type: String
    Default: 'ApplicationRecoveryCluster'
    Description: 'Name for the recovery cluster'
  
  ControlPanelName:
    Type: String
    Default: 'ApplicationControlPanel'
    Description: 'Name for the control panel'

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: !Ref ClusterName
      Tags:
        - Key: Purpose
          Value: 'ApplicationFailover'

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Ref ControlPanelName
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      Tags:
        - Key: Purpose
          Value: 'ApplicationFailover'

  RoutingControlPrimary:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: 'PrimaryRegionRoutingControl'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  RoutingControlSecondary:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: 'SecondaryRegionRoutingControl'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: 'AtLeastOneActiveRegionRule'
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      RuleConfig:
        Type: 'AND'
        Inverted: false
        Threshold: 1
      AssertionRule:
        WaitPeriodMs: 5000
        AssertedControls:
          - !GetAtt RoutingControlPrimary.RoutingControlArn
          - !GetAtt RoutingControlSecondary.RoutingControlArn

  HealthCheckPrimary:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: 'CLOUDWATCH_METRIC'
        AlarmIdentifier:
          Name: 'ApplicationHealthAlarm'
          Region: !Ref PrimaryRegion
        InsufficientDataHealthStatus: 'Unhealthy'
      HealthCheckTags:
        - Key: 'Region'
          Value: !Ref PrimaryRegion

  HealthCheckSecondary:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: 'CLOUDWATCH_METRIC'
        AlarmIdentifier:
          Name: 'ApplicationHealthAlarm'
          Region: !Ref SecondaryRegion
        InsufficientDataHealthStatus: 'Unhealthy'
      HealthCheckTags:
        - Key: 'Region'
          Value: !Ref SecondaryRegion

  ARCServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'route53-recovery-control.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSRoute53RecoveryControlConfigServiceRolePolicy'

Outputs:
  ClusterArn:
    Description: 'ARN of the recovery cluster'
    Value: !GetAtt RecoveryCluster.ClusterArn
  
  ControlPanelArn:
    Description: 'ARN of the control panel'
    Value: !GetAtt ControlPanel.ControlPanelArn
  
  PrimaryRoutingControlArn:
    Description: 'ARN of the primary region routing control'
    Value: !GetAtt RoutingControlPrimary.RoutingControlArn
  
  SecondaryRoutingControlArn:
    Description: 'ARN of the secondary region routing control'
    Value: !GetAtt RoutingControlSecondary.RoutingControlArn
  
  PrimaryHealthCheckId:
    Description: 'ID of the primary region health check'
    Value: !Ref HealthCheckPrimary
  
  SecondaryHealthCheckId:
    Description: 'ID of the secondary region health check'
    Value: !Ref HealthCheckSecondary