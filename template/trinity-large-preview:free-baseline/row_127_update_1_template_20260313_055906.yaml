AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon EFS file system for testing environment

Parameters:
  Environment:
    Type: String
    Default: testing
    Description: Environment name for tagging
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system
  ProvisionedThroughput:
    Type: Number
    Default: 0
    MinValue: 0
    Description: Provisioned throughput in MiB/s (only applicable if ThroughputMode is provisioned)

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps:
        !If [IsProvisionedThroughput, !Ref ProvisionedThroughput, !Ref AWS::NoValue]
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub ${Environment}-efs
        - Key: Environment
          Value: !Ref Environment

Conditions:
  IsProvisionedThroughput: !And
    - !Equals [!Ref ThroughputMode, "provisioned"]
    - !Not [!Equals [!Ref ProvisionedThroughput, 0]]

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EfsFileSystem
  FileSystemDNSName:
    Description: The DNS name of the created EFS file system
    Value: !Sub ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com