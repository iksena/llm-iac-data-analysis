AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with EC2 Integration and Monitoring'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  InstanceType:
    Type: String
    Default: t3.micro
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VpcId.CidrBlock

  EfsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEFSFullAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EfsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EfsInstanceRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EfsInstanceProfile
      SubnetId: !Ref Subnet1
      SecurityGroupIds:
        - !Ref EfsSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          echo "${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-Instance-1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EfsInstanceProfile
      SubnetId: !Ref Subnet2
      SecurityGroupIds:
        - !Ref EfsSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          echo "${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-Instance-2

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when EFS burst credit balance is low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  EfsIOPercentAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when EFS IO percent is high
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  MountTarget1Id:
    Description: Mount Target 1 ID
    Value: !Ref MountTarget1
  MountTarget2Id:
    Description: Mount Target 2 ID
    Value: !Ref MountTarget2
  Instance1Id:
    Description: EC2 Instance 1 ID
    Value: !Ref EC2Instance1
  Instance2Id:
    Description: EC2 Instance 2 ID
    Value: !Ref EC2Instance2