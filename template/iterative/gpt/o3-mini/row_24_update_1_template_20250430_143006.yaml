AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template for a VPC with two subnets,
  an Auto Scaling Group with Internet-accessible instances, and an ElastiCache
  replication group configured for automated snapshot management and failover.
  A Lambda function with an associated IAM role is included to dynamically enable/disable
  snapshotting.

Parameters:
  VpcCIDR:
    Type: String
    Description: CIDR block for the VPC
    Default: "10.0.0.0/16"
  Subnet1CIDR:
    Type: String
    Description: CIDR block for Subnet 1
    Default: "10.0.1.0/24"
  Subnet2CIDR:
    Type: String
    Description: CIDR block for Subnet 2
    Default: "10.0.2.0/24"
  ASGInstanceType:
    Type: String
    Description: EC2 Instance Type for Auto Scaling Group instances
    Default: "t2.micro"
  CacheNodeType:
    Type: String
    Description: ElastiCache Node Type for production environment
    Default: "cache.m3.medium"
  SnapshotRetentionDays:
    Type: Number
    Description: Number of days to retain ElastiCache snapshots (set to 0 to disable)
    Default: 7

Mappings:
  RegionToAZ:
    us-east-1:
      AZ1: "us-east-1a"
      AZ2: "us-east-1b"
    us-west-2:
      AZ1: "us-west-2a"
      AZ2: "us-west-2b"
  AWSRegionToAMI:
    us-east-1:
      AMI: "ami-0c94855ba95c71c99"  # Amazon Linux 2 AMI for us-east-1
    us-west-2:
      AMI: "ami-0a887e401f7654935"  # Amazon Linux 2 AMI for us-west-2

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "ProdVPC"

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CIDR
      AvailabilityZone: !FindInMap [ RegionToAZ, !Ref "AWS::Region", AZ1 ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "ProdSubnet1"

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CIDR
      AvailabilityZone: !FindInMap [ RegionToAZ, !Ref "AWS::Region", AZ2 ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "ProdSubnet2"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: "ProdIGW"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: "ProdRouteTable"

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  EC2InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Enable SSH and HTTP access"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 0
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "ProdInstanceSG"

  LaunchConfiguration:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: !FindInMap [ AWSRegionToAMI, !Ref "AWS::Region", AMI ]
      InstanceType: !Ref ASGInstanceType
      SecurityGroups:
        - !Ref EC2InstanceSecurityGroup
      UserData: 
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchConfigurationName: !Ref LaunchConfiguration
      MinSize: "1"
      MaxSize: "3"
      DesiredCapacity: "2"
      VPCZoneIdentifier:
        - !Ref Subnet1
        - !Ref Subnet2
      Tags:
        - Key: Name
          Value: "ProdASGInstance"
          PropagateAtLaunch: true

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: "Production ElastiCache replication group with automated snapshots and failover"
      Engine: redis
      CacheNodeType: !Ref CacheNodeType
      ReplicasPerNodeGroup: 1
      AutomaticFailoverEnabled: true
      SnapshotRetentionLimit: !Ref SnapshotRetentionDays
      SnapshotWindow: "05:00-06:00"
      AtRestEncryptionEnabled: false
      TransitEncryptionEnabled: false
      Tags:
        - Key: Name
          Value: "ProdElastiCacheRG"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: "LambdaSnapshotMgmtPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:DescribeReplicationGroups
                  - elasticache:ModifyReplicationGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  SnapshotManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "SnapshotManagementFunction"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs14.x
      Timeout: 300
      Code:
        ZipFile: |
          'use strict';
          const AWS = require("aws-sdk");
          const elasticache = new AWS.ElastiCache();
          
          exports.handler = async (event) => {
              // This function enables/disables snapshot retention based on an input parameter.
              // For demonstration, it reads a parameter "EnableSnapshot" from the event.
              const enableSnapshot = event.EnableSnapshot;
              // Describe the replication groups (assuming one replication group)
              let rgData = await elasticache.describeReplicationGroups({}).promise();
              if(!rgData.ReplicationGroups || rgData.ReplicationGroups.length === 0){
                  throw new Error("No replication groups found.");
              }
              let rgId = rgData.ReplicationGroups[0].ReplicationGroupId;
              let params = {
                  ReplicationGroupId: rgId,
                  // If enableSnapshot is false, set retention to 0 to disable; otherwise, set a predefined value.
                  SnapshotRetentionLimit: enableSnapshot ? 7 : 0
              };
              await elasticache.modifyReplicationGroup(params).promise();
              return { status: "Snapshot retention updated", replicationGroupId: rgId, newRetention: params.SnapshotRetentionLimit };
          };

Outputs:
  VPCId:
    Description: "VPC ID"
    Value: !Ref VPC
  Subnet1Id:
    Description: "Subnet 1 ID"
    Value: !Ref Subnet1
  Subnet2Id:
    Description: "Subnet 2 ID"
    Value: !Ref Subnet2
  AutoScalingGroupName:
    Description: "Auto Scaling Group Name"
    Value: !Ref AutoScalingGroup
  ElastiCacheReplicationGroupId:
    Description: "ElastiCache Replication Group ID"
    Value: !Ref ElastiCacheReplicationGroup
  SnapshotManagementFunctionARN:
    Description: "ARN of the Lambda function for snapshot management"
    Value: !GetAtt SnapshotManagementFunction.Arn