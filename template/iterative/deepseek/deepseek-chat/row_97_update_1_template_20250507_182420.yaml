AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline for AWS Organizations data collection and analysis

Parameters:
  ManagementAccountID:
    Type: String
    Description: AWS Account ID of the Organizations management account
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: Name for the Athena database
  S3BucketName:
    Type: String
    Description: Name for the S3 bucket to store Organizations data
  OrganizationTagsToInclude:
    Type: CommaDelimitedList
    Default: "CostCenter,Environment,Project"
    Description: List of Organization tags to include in reports
  ScheduleExpression:
    Type: String
    Default: "rate(7 days)"
    Description: CloudWatch Events schedule expression for data collection

Resources:
  OrganizationsDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAfter5Years
            Status: Enabled
            ExpirationInDays: 1825

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
        - PolicyName: S3WriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3BucketName}"
        - PolicyName: AssumeCrossAccountRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub "arn:aws:iam::${ManagementAccountID}:role/OrganizationDataCollectorRole"

  OrganizationsDataCollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: OrganizationsDataCollector
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import datetime
          import os
          
          def handler(event, context):
              sts_client = boto3.client('sts')
              s3_client = boto3.client('s3')
              
              # Assume role in management account
              assumed_role = sts_client.assume_role(
                  RoleArn=f"arn:aws:iam::{os.environ['MANAGEMENT_ACCOUNT_ID']}:role/OrganizationDataCollectorRole",
                  RoleSessionName="OrganizationDataCollection"
              )
              
              credentials = assumed_role['Credentials']
              org_client = boto3.client(
                  'organizations',
                  aws_access_key_id=credentials['AccessKeyId'],
                  aws_secret_access_key=credentials['SecretAccessKey'],
                  aws_session_token=credentials['SessionToken']
              )
              
              # Collect organization data
              org_data = {
                  'timestamp': datetime.datetime.utcnow().isoformat(),
                  'accounts': [],
                  'ous': [],
                  'tags': []
              }
              
              # Get accounts
              paginator = org_client.get_paginator('list_accounts')
              for page in paginator.paginate():
                  org_data['accounts'].extend(page['Accounts'])
              
              # Get OUs
              root_id = org_client.list_roots()['Roots'][0]['Id']
              org_data['ous'] = get_ous_recursive(org_client, root_id)
              
              # Get specified tags
              tags_to_include = os.environ['TAGS_TO_INCLUDE'].split(',')
              for tag in tags_to_include:
                  if tag.strip():
                      try:
                          tag_data = org_client.list_tags_for_resource(
                              ResourceId=root_id,
                              ResourceType='ROOT'
                          )
                          org_data['tags'].extend(tag_data['Tags'])
                      except Exception as e:
                          print(f"Error getting tag {tag}: {str(e)}")
              
              # Write to S3
              date_str = datetime.datetime.utcnow().strftime('%Y/%m/%d')
              s3_key = f"organization-data/{date_str}/data.json"
              s3_client.put_object(
                  Bucket=os.environ['S3_BUCKET'],
                  Key=s3_key,
                  Body=json.dumps(org_data, indent=2)
              )
              
              return {
                  'statusCode': 200,
                  'body': json.dumps('Organization data collected successfully')
              }
              
          def get_ous_recursive(org_client, parent_id):
              ous = []
              paginator = org_client.get_paginator('list_organizational_units_for_parent')
              for page in paginator.paginate(ParentId=parent_id):
                  for ou in page['OrganizationalUnits']:
                      ou_details = org_client.describe_organizational_unit(
                          OrganizationalUnitId=ou['Id']
                      )['OrganizationalUnit']
                      ou_details['child_ous'] = get_ous_recursive(org_client, ou['Id'])
                      ous.append(ou_details)
              return ous
      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountID
          TAGS_TO_INCLUDE: !Join [",", !Ref OrganizationTagsToInclude]
      Timeout: 300

  WeeklyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Weekly schedule for Organizations data collection
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrganizationsDataCollectorFunction.Arn
          Id: OrganizationsDataCollectorLambdaTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrganizationsDataCollectorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WeeklyScheduleRule.Arn

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName
        Description: Database for AWS Organizations metadata

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3BucketName}"
        - PolicyName: GlueServiceAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:CreateTable
                  - glue:UpdateTable
                Resource: "*"

  OrganizationsDataCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrganizationsDataCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub "s3://${S3BucketName}/organization-data/"
      Configuration: |
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": { "AddOrUpdateBehavior": "InheritFromTable" }
          },
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          }
        }
      Schedule:
        ScheduleExpression: "cron(0 12 ? * SUN *)"
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE

  CrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: OrganizationDataCollectorRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref AWS::AccountId
      Policies:
        - PolicyName: OrganizationsReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:ListOrganizationalUnitsForParent
                  - organizations:DescribeOrganizationalUnit
                  - organizations:ListRoots
                  - organizations:ListTagsForResource
                Resource: "*"

Outputs:
  S3BucketARN:
    Description: ARN of the S3 bucket storing Organizations data
    Value: !GetAtt OrganizationsDataBucket.Arn
  LambdaFunctionARN:
    Description: ARN of the Organizations data collector Lambda function
    Value: !GetAtt OrganizationsDataCollectorFunction.Arn
  GlueDatabaseName:
    Description: Name of the Glue database for querying Organizations data
    Value: !Ref AthenaDatabaseName
  GlueCrawlerName:
    Description: Name of the Glue crawler for Organizations data
    Value: !Ref OrganizationsDataCrawler
  CrossAccountRoleARN:
    Description: ARN of the cross-account role for data collection
    Value: !GetAtt CrossAccountRole.Arn