AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an ENI with two EIPs and secondary private IPs'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the ENI will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet where the ENI will be created

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group to associate with the ENI

  SecondaryPrivateIp1:
    Type: String
    Description: First secondary private IP address for the ENI
    Default: "10.0.0.10"

  SecondaryPrivateIp2:
    Type: String
    Description: Second secondary private IP address for the ENI
    Default: "10.0.0.11"

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: Network Interface with secondary private IPs
      GroupSet:
        - !Ref SecurityGroupId
      SecondaryPrivateIpAddresses:
        - PrivateIpAddress: !Ref SecondaryPrivateIp1
        - PrivateIpAddress: !Ref SecondaryPrivateIp2

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  ElasticIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp1

Outputs:
  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface

  ElasticIp1:
    Description: First Elastic IP address
    Value: !Ref ElasticIP1

  ElasticIp2:
    Description: Second Elastic IP address
    Value: !Ref ElasticIP2