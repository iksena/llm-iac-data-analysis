AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-VPC

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: EFS-Subnet-A

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: EFS-Subnet-B

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: EFS-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: EFS-Public-Route-Table

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  DefaultSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Default security group for EFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EFS-Default-SG

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      BackupPolicy:
        Status: ENABLED
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: EFS encryption is enabled

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Security group for EFS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !GetAtt DefaultSecurityGroup.GroupId

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetA
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetB
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarms

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS IO Utilization High
      AlarmDescription: Alarm when EFS IO utilization exceeds 80%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS Burst Credit Low
      AlarmDescription: Alarm when EFS burst credits fall below 20%
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS Throughput High
      AlarmDescription: Alarm when EFS throughput exceeds 90% of provisioned
      Namespace: AWS/EFS
      MetricName: PermittedThroughput
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

  EFSBackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: EFSBackupVault

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: EFS Backup Plan
        BackupPlanRule:
          - RuleName: Daily EFS Backup
            TargetBackupVault: !Ref EFSBackupVault
            ScheduleExpression: 'cron(0 2 * * ? *)'
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFS_Backup_Selection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt EFSFileSystem.Arn

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  MountTargetA:
    Description: Mount Target A ID
    Value: !Ref MountTargetA
  MountTargetB:
    Description: Mount Target B ID
    Value: !Ref MountTargetB
  SecurityGroupId:
    Description: EFS Security Group ID
    Value: !GetAtt EFSSecurityGroup.GroupId
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  SubnetA:
    Description: Public Subnet A ID
    Value: !Ref PublicSubnetA
  SubnetB:
    Description: Public Subnet B ID
    Value: !Ref PublicSubnetB