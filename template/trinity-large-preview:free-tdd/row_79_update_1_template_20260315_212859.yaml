AWSTemplateFormatVersion: '2010-09-09'

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - arn:aws:s3:::ios-apps.sagebridge.org
              - arn:aws:s3:::ios-apps.sagebridge.org/*

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
            Resource: '*'

Outputs:
  S3AccessPolicyArn:
    Description: ARN of the S3 Access Policy
    Value: !Ref S3AccessPolicy
    Export:
      Name: S3AccessPolicyArn

  DynamoDBProtectionPolicyArn:
    Description: ARN of the DynamoDB Protection Policy
    Value: !Ref DynamoDBProtectionPolicy
    Export:
      Name: DynamoDBProtectionPolicyArn

  RDSProtectionPolicyArn:
    Description: ARN of the RDS Protection Policy
    Value: !Ref RDSProtectionPolicy
    Export:
      Name: RDSProtectionPolicyArn