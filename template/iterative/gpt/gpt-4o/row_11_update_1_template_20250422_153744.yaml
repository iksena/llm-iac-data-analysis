AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a DynamoDB table for mobile notifications reporting
  with a global secondary index on 'type' and 'sentTime', configured for pay-per-request
  billing and TTL for automatic cleanup of stale data.

Resources:
  NotificationsDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MobileNotifications
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  DynamoDBTableName:
    Description: The name of the DynamoDB table
    Value: !Ref NotificationsDynamoDBTable
  DynamoDBTableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt NotificationsDynamoDBTable.Arn