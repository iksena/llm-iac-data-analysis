AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway with DynamoDB for Music Data Management

Parameters:
  ApiKeyName:
    Type: String
    Default: music-api-key
    Description: Name of the API key for authentication
  UsagePlanName:
    Type: String
    Default: music-usage-plan
    Description: Name of the usage plan for rate limiting
  TableName:
    Type: String
    Default: Music
    Description: Name of the DynamoDB table
  ApiStageName:
    Type: String
    Default: prod
    Description: Name of the API Gateway stage

Resources:
  # DynamoDB Table for Music Data
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true

  # IAM Role for API Gateway to invoke Lambda
  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: APIGatewayMusicRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: APIGatewayInvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt MusicLambdaFunction.Arn

  # IAM Role for Lambda to access DynamoDB
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaMusicRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaDynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  # Lambda Function for POST (Create Music Entry)
  MusicLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MusicPOSTFunction
      Handler: index.handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('Music')

          def handler(event, context):
              try:
                  data = json.loads(event['body'])
                  artist = data['artist']
                  album = data['album']

                  table.put_item(
                      Item={
                          'Artist': artist,
                          'Album': album
                      }
                  )

                  return {
                      'statusCode': 201,
                      'body': json.dumps({'message': 'Music entry created successfully'})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'message': str(e)})
                  }
              except KeyError:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'message': 'Invalid input'})
                  }

  # Lambda Function for GET (Query by Artist)
  MusicGetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MusicGETFunction
      Handler: index.handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('Music')

          def handler(event, context):
              try:
                  artist = event['queryStringParameters']['artist']

                  response = table.query(
                      IndexName: 'Artist-Index',
                      KeyConditionExpression: 'Artist = :artist',
                      ExpressionAttributeValues: {
                          ':artist': artist
                      }
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps(response['Items'])
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'message': str(e)})
                  }
              except KeyError:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'message': 'Invalid input'})
                  }

  # API Gateway REST API
  MusicAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicAPI
      Description: API for managing music data

  # API Gateway Resource (/music)
  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicAPI
      ParentId: !GetAtt MusicAPI.RootResourceId
      PathPart: music

  # API Gateway POST Method
  MusicPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicAPI
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt MusicLambdaFunction.Arn
        Credentials: !GetAtt APIGatewayRole.Arn

  # API Gateway GET Method
  MusicGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicAPI
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt MusicGetLambdaFunction.Arn
        Credentials: !GetAtt APIGatewayRole.Arn

  # API Gateway Deployment
  MusicAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - MusicPostMethod
      - MusicGetMethod
    Properties:
      RestApiId: !Ref MusicAPI
      StageName: !Ref ApiStageName

  # API Key for Authentication
  MusicAPIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Ref ApiKeyName
      Description: API key for music API access
      Enabled: true

  # Usage Plan with Rate Limiting
  MusicUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: !Ref UsagePlanName
      Description: Usage plan for music API with rate limiting
      ApiStages:
        - ApiId: !Ref MusicAPI
          Stage: !Ref ApiStageName
      Throttle:
        BurstLimit: 5000
        RateLimit: 10000
      Quota:
        Limit: 100000
        Period: MONTH

  # Usage Plan Key Association
  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicUsagePlan

  # Lambda Permissions for API Gateway
  LambdaInvokePermissionPOST:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt MusicLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiId}/*/*/*'
        - apiId: !Ref MusicAPI

  LambdaInvokePermissionGET:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt MusicGetLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiId}/*/*/*'
        - apiId: !Ref MusicAPI

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub
      - 'https://${apiId}.execute-api.${AWS::Region}.amazonaws.com/${stage}'
      - apiId: !Ref MusicAPI
        stage: !Ref ApiStageName
  DynamoDBTable:
    Description: DynamoDB table name
    Value: !Ref TableName