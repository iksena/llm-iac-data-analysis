AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for arithmetic custom resource with Lambda

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for the arithmetic operation
    Default: 10

  SecondNumber:
    Type: Number
    Description: Second number for the arithmetic operation
    Default: 5

  Operator:
    Type: String
    Description: Arithmetic operation to perform
    AllowedValues: [Add, Subtract, Multiply, Divide]
    Default: Add

  SimulateFailure:
    Type: String
    Description: Simulate custom resource failure (true/false)
    AllowedValues: [true, false]
    Default: 'false'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambda:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: ArithmeticCalculator
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import cfnresponse
          def handler(event, context):
              response_data = {}
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      return
                  
                  first_num = float(event['ResourceProperties']['FirstNumber'])
                  second_num = float(event['ResourceProperties']['SecondNumber'])
                  operator = event['ResourceProperties']['Operator']
                  simulate_failure = event['ResourceProperties']['SimulateFailure'].lower() == 'true'
                  
                  if simulate_failure:
                      raise Exception("Simulated failure requested")
                  
                  if operator == 'Add':
                      result = first_num + second_num
                  elif operator == 'Subtract':
                      result = first_num - second_num
                  elif operator == 'Multiply':
                      result = first_num * second_num
                  elif operator == 'Divide':
                      if second_num == 0:
                          raise ValueError("Cannot divide by zero")
                      result = first_num / second_num
                  else:
                      raise ValueError("Invalid operator")
                  
                  response_data = {
                      'Result': str(result),
                      'Operation': f"{first_num} {operator} {second_num}"
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  response_data = {'Error': str(e)}
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  ArithmeticCustomResource:
    Type: Custom::ArithmeticCalculator
    DependsOn: ArithmeticLambda
    Properties:
      ServiceToken: !GetAtt ArithmeticLambda.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt ArithmeticCustomResource.Result
  OperationPerformed:
    Description: The arithmetic operation that was performed
    Value: !GetAtt ArithmeticCustomResource.Operation