AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for MySQL RDS instance with Provisioned IOPS in a VPC'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'The VPC ID where the RDS instance will be deployed'
  
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'First private subnet ID (Availability Zone A)'
  
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: 'Second private subnet ID (Availability Zone B)'
  
  DBName:
    Type: String
    Default: 'mydatabase'
    Description: 'The database name'
  
  DBUsername:
    Type: String
    Default: 'admin'
    Description: 'The database admin username'
    NoEcho: true
  
  DBPassword:
    Type: String
    Description: 'The database admin password'
    NoEcho: true
    AllowedPattern: '(?=^.{8,}$)(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[^A-Za-z0-9]).*$'
    ConstraintDescription: 'Must be at least 8 characters with uppercase, lowercase, number, and special character'
  
  AllocatedStorage:
    Type: Number
    Default: 100
    Description: 'The allocated storage size in GB'
    MinValue: 100
    MaxValue: 65536
  
  IOPS:
    Type: Number
    Default: 1000
    Description: 'The Provisioned IOPS value'
    MinValue: 1000
    MaxValue: 80000

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for MySQL RDS instance'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !GetAtt VpcId.CidrBlock

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for MySQL RDS instance'
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: mysql
      EngineVersion: '8.0.35'
      DBInstanceClass: db.r5.large
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: io1
      Iops: !Ref IOPS
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      MultiAZ: true
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionProtection: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'

Outputs:
  RDSInstanceEndpoint:
    Description: 'MySQL RDS instance endpoint'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  
  RDSSecurityGroupId:
    Description: 'Security Group ID for RDS instance'
    Value: !Ref RDSSecurityGroup