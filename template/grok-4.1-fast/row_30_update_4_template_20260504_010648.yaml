AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production EFS multi-AZ EC2 IAM mount, CW alarms, secure VPC/NACL/SG'

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  PublicSubnet1CidrBlock:
    Type: String
    Default: 10.0.1.0/24
    Description: Public subnet AZ1 CIDR
  PublicSubnet2CidrBlock:
    Type: String
    Default: 10.0.2.0/24
    Description: Public subnet AZ2 CIDR
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 KeyPair name
  AmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Amazon Linux 2 AMI
  AlarmBurstCreditThreshold:
    Type: Number
    Default: 50000000
    Description: BurstCreditBalance threshold for alarm

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  GatewayToInternet:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select ['0', !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CidrBlock
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select ['1', !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CidrBlock
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-2'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayToInternet
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nacl'

  NACLInboundSSH:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 100
      Protocol: 6
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      FromPort: 22
      ToPort: 22
      Egress: false

  NACLInboundNFSTCP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 200
      Protocol: 6
      RuleAction: allow
      CidrBlock: !Ref VpcCidrBlock
      FromPort: 2049
      ToPort: 2049
      Egress: false

  NACLInboundNFSUDP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 210
      Protocol: 17
      RuleAction: allow
      CidrBlock: !Ref VpcCidrBlock
      FromPort: 2049
      ToPort: 2049
      Egress: false

  NACLInboundEphemeralTCP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 300
      Protocol: 6
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      FromPort: 1024
      ToPort: 65535
      Egress: false

  NACLInboundEphemeralUDP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 310
      Protocol: 17
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      FromPort: 1024
      ToPort: 65535
      Egress: false

  NACLInboundDeny:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 32766
      Protocol: -1
      RuleAction: deny
      CidrBlock: 0.0.0.0/0
      Egress: false

  NACLOutboundEphemeralTCP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 100
      Protocol: 6
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      FromPort: 1024
      ToPort: 65535
      Egress: true

  NACLOutboundEphemeralUDP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 110
      Protocol: 17
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      FromPort: 1024
      ToPort: 65535
      Egress: true

  NACLOutboundNFSTCP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 200
      Protocol: 6
      RuleAction: allow
      CidrBlock: !Ref VpcCidrBlock
      FromPort: 2049
      ToPort: 2049
      Egress: true

  NACLOutboundNFSUDP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 210
      Protocol: 17
      RuleAction: allow
      CidrBlock: !Ref VpcCidrBlock
      FromPort: 2049
      ToPort: 2049
      Egress: true

  NACLOutboundDeny:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNo: 32766
      Protocol: -1
      RuleAction: deny
      CidrBlock: 0.0.0.0/0
      Egress: true

  PublicSubnet1NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref NetworkAcl

  PublicSubnet2NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref NetworkAcl

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 instances SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2-sg'

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS NFS from EC2 SG
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs-sg'

  EfsSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EfsSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref EC2SecurityGroup

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
      Policies:
        - PolicyName: !Sub '${AWS::StackName}-signal-efs'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:SignalResource
                  - efs:DescribeMountTargets
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2-role'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    Properties:
      PerformanceMode: generalPurpose
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'

  EFSFileSystemPolicy:
    Type: AWS::EFS::FileSystemPolicy
    Properties:
      FileSystemId: !Ref EFSFileSystem
      Policy: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "AllowEC2Access",
              "Effect": "Allow",
              "Principal": {
                "AWS": "${IAMRole.Arn}"
              },
              "Actions": [
                "elasticfilesystem:ClientMount",
                "elasticfilesystem:ClientRootAccess",
                "elasticfilesystem:ClientWrite"
              ],
              "Condition": {
                "Bool": {
                  "aws:SecureTransport": "true"
                }
              }
            }
          ]
        }

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-efs-alarms'

  EFSIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EFSFileSystem} PercentIOLimit 95%'
      AlarmDescription: EFS I/O >=95%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 95
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmTopic

  EFSThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EFSFileSystem} BurstCreditBalance'
      AlarmDescription: EFS throughput high utilization
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref AlarmBurstCreditThreshold
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  EC2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    DependsOn:
      - EFSMountTarget1
      - EFSMountTarget2
      - EFSFileSystemPolicy
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      AssociatePublicIpAddress: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          yum install -y aws-cfn-bootstrap amazon-efs-utils
          mkdir -p /mnt/efs
          EFS_ID=${EFSFileSystem}
          EFS_DNS=${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com
          until aws efs describe-mount-targets --file-system-id $EFS_ID --query 'length(MountTargets[?LifeCycleState==`available`])' --output text | grep -q '^2$'; do
            echo "Waiting for mount targets..."
            sleep 30
          done
          mount -t efs -o tls,iam $EFS_DNS:/ /mnt/efs
          if df /mnt/efs > /dev/null 2>&1; then
            echo "EFS mounted successfully"
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}
          else
            echo "EFS mount failed"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}
          fi
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance-1'

  EC2Instance2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    DependsOn:
      - EFSMountTarget1
      - EFSMountTarget2
      - EFSFileSystemPolicy
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      AssociatePublicIpAddress: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          yum install -y aws-cfn-bootstrap amazon-efs-utils
          mkdir -p /mnt/efs
          EFS_ID=${EFSFileSystem}
          EFS_DNS=${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com
          until aws efs describe-mount-targets --file-system-id $EFS_ID --query 'length(MountTargets[?LifeCycleState==`available`])' --output text | grep -q '^2$'; do
            echo "Waiting for mount targets..."
            sleep 30
          done
          mount -t efs -o tls,iam $EFS_DNS:/ /mnt/efs
          if df /mnt/efs > /dev/null 2>&1; then
            echo "EFS mounted successfully"
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}
          else
            echo "EFS mount failed"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}
          fi
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance-2'

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'
  EFSFileSystemId:
    Description: EFS ID
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub '${AWS::StackName}-EFSId'
  EFSFileSystemDns:
    Description: EFS DNS
    Value: !Sub '${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com'
  EC2Instance1Id:
    Description: Instance 1 ID
    Value: !Ref EC2Instance1
  EC2Instance1PublicDns:
    Description: Instance 1 DNS
    Value: !GetAtt EC2Instance1.PublicDnsName
  EC2Instance2Id:
    Description: Instance 2 ID
    Value: !Ref EC2Instance2
  EC2Instance2PublicDns:
    Description: Instance 2 DNS
    Value: !GetAtt EC2Instance2.PublicDnsName
  AlarmTopicArn:
    Description: Alarm Topic
    Value: !Ref AlarmTopic
  EFSIOLimitAlarmArn:
    Description: IO Alarm
    Value: !Ref EFSIOLimitAlarm
  EFSThroughputAlarmArn:
    Description: Throughput Alarm
    Value: !Ref EFSThroughputAlarm