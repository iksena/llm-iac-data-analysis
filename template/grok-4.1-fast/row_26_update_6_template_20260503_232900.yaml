AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket with EventBridge and SNS integration for Object Created events'

Parameters:
  BucketName:
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    Description: 'Globally unique name for the S3 bucket (lowercase letters, numbers, hyphens)'
  TopicName:
    Type: String
    Default: 's3-object-created-topic'
    Description: 'Name for the SNS topic'

Resources:
  Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls