AWSTemplateFormatVersion: '2010-09-09'
Description: 'MySQL RDS instance with VPC and Secrets Manager integration'

Parameters:
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for VPC
  
  PrivateSubnet1Cidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: CIDR block for private subnet 1
  
  PrivateSubnet2Cidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: CIDR block for private subnet 2
    
  DBName:
    Type: String
    Default: mydb
    Description: Database name
    
  DBPort:
    Type: Number
    Default: 3306
    Description: Database port
    
  Environment:
    Type: String
    Default: production
    AllowedValues: 
      - development
      - staging
      - production
    Description: Environment name

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-vpc'

  PrivateSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet1Cidr
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-private-subnet-1'

  PrivateSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet2Cidr
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-private-subnet-2'

  DBSubnetGroup:
    Type: 'AWS::RDS::DBSubnetGroup'
    Properties:
      DBSubnetGroupDescription: 'Subnet group for RDS'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DBSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for RDS'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DBPort
          ToPort: !Ref DBPort
          CidrIp: !Ref VpcCidr

  DBParameterGroup:
    Type: 'AWS::RDS::DBParameterGroup'
    Properties:
      Family: 'mysql8.0'
      Description: 'Custom parameter group for MySQL'
      Parameters:
        max_connections: '100'
        character_set_server: 'utf8mb4'
        collation_server: 'utf8mb4_unicode_ci'

  DatabaseSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub '${Environment}/database/credentials'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  RDSInstance:
    Type: 'AWS::RDS::DBInstance'
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0.28'
      AllocatedStorage: 20
      DBName: !Ref DBName
      Port: !Ref DBPort
      DBParameterGroupName: !Ref DBParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      MasterUsername: '{{resolve:secretsmanager:{{Ref:DatabaseSecret}}:SecretString:username}}'
      MasterUserPassword: '{{resolve:secretsmanager:{{Ref:DatabaseSecret}}:SecretString:password}}'
      PubliclyAccessible: false
      StorageType: gp2
      StorageEncrypted: true
      MultiAZ: false
      BackupRetentionPeriod: 7
      DeletionProtection: true

Outputs:
  DBEndpoint:
    Description: 'Database endpoint'
    Value: !GetAtt RDSInstance.Endpoint.Address

  SecretARN:
    Description: 'Secret ARN for database credentials'
    Value: !Ref DatabaseSecret

  VPCId:
    Description: 'VPC ID'
    Value: !Ref VPC

  PrivateSubnet1Id:
    Description: 'Private Subnet 1 ID'
    Value: !Ref PrivateSubnet1

  PrivateSubnet2Id:
    Description: 'Private Subnet 2 ID'
    Value: !Ref PrivateSubnet2