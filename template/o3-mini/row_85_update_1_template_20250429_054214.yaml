AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Produces a secure and cost-optimized S3 bucket for storing CloudWatch export data.
  The bucket is configured with server-side encryption, configurable versioning, automated lifecycle management,
  and enforced public access blocking.

Parameters:
  BucketName:
    Description: "The name of the S3 bucket. Must be globally unique."
    Type: String
  Versioning:
    Description: "Set to 'Enabled' to enable bucket versioning. Use 'Suspended' to disable versioning."
    Type: String
    AllowedValues: ["Enabled", "Suspended"]
    Default: "Enabled"
  ExpirationDays:
    Description: "Number of days after which objects in the bucket expire."
    Type: Number
    Default: 30

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref Versioning
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldObjects
            Status: Enabled
            ExpirationInDays: !Ref ExpirationDays
            Prefix: ""
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  S3BucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Properties:
      Bucket: !Ref S3Bucket
      BlockPublicAcls: true
      BlockPublicPolicy: true
      IgnorePublicAcls: true
      RestrictPublicBuckets: true

Outputs:
  BucketNameOutput:
    Description: "The name of the S3 bucket."
    Value: !Ref S3Bucket
  BucketArn:
    Description: "The ARN of the S3 bucket."
    Value: !GetAtt S3Bucket.Arn