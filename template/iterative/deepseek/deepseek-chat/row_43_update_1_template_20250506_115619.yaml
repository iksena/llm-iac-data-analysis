AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket with KMS encryption and lifecycle management'

Parameters:
  BucketName:
    Description: 'Name of the S3 bucket'
    Type: String
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters and can contain only lowercase letters, numbers, hyphens, and periods'
  
  RetentionDays:
    Description: 'Number of days after which objects transition to another storage class'
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
  
  StorageClass:
    Description: 'Target storage class for lifecycle transition'
    Type: String
    Default: 'STANDARD_IA'
    AllowedValues:
      - 'STANDARD_IA'
      - 'ONEZONE_IA'
      - 'INTELLIGENT_TIERING'
      - 'GLACIER'
      - 'DEEP_ARCHIVE'
  
  EnvironmentTag:
    Description: 'Environment tag value for the bucket'
    Type: String
    Default: 'Production'
    AllowedValues:
      - 'Development'
      - 'Staging'
      - 'Production'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: 'TransitionRule'
            Status: 'Enabled'
            Transitions:
              - TransitionInDays: !Ref RetentionDays
                StorageClass: !Ref StorageClass
            ExpirationInDays: 3650
      Tags:
        - Key: 'Name'
          Value: !Ref BucketName
        - Key: 'Environment'
          Value: !Ref EnvironmentTag
        - Key: 'ManagedBy'
          Value: 'CloudFormation'

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'KMS key for encrypting S3 bucket objects'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-default-1'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: 'Allow S3 to use the key'
            Effect: 'Allow'
            Principal:
              Service: 's3.amazonaws.com'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${BucketName}-key'
      TargetKeyId: !Ref KMSKey

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref BucketName
  
  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn
  
  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt KMSKey.Arn