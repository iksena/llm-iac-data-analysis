AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EfsVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-Testing-VPC
  EfsSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EfsVpc
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: us-east-1a
      Tags:
        - Key: Name
          Value: EFS-Testing-Subnet
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount target
      VpcId: !Ref EfsVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt EfsVpc.CidrBlock
      Tags:
        - Key: Name
          Value: EFS-SecurityGroup
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Tags:
        - Key: Name
          Value: EFS-FileSystem
  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref EfsSubnet
      SecurityGroups:
        - !Ref EfsSecurityGroup
Outputs:
  FileSystemId:
    Description: ID of the EFS file system
    Value: !Ref FileSystem
  MountTargetDNS:
    Description: DNS name for mounting the file system
    Value: !Sub "${FileSystem}.efs.${AWS::Region}.amazonaws.com"
  SecurityGroupID:
    Description: ID of the EFS security group
    Value: !Ref EfsSecurityGroup
  SubnetID:
    Description: ID of the subnet used for mount target
    Value: !Ref EfsSubnet