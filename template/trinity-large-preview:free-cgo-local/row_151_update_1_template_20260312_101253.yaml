AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': '100'
              }
      Timeout: 30

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'

  BedrockAgent:
    Type: AWS::AmazonBedrock::Agent
    Properties:
      AgentName: StockPriceAgent
      Description: Agent for stock price lookup
      ModelId: anthropic.claude-3-sonnet-20240229
      AgentInstructions:
        Content: |
          You are a stock price lookup assistant. When users ask about stock prices, use the getStockPrice action to retrieve the current price.
      ActionGroups:
        - Name: StockPriceActions
          Description: Actions for stock price lookup
          Actions:
            - Name: getStockPrice
              Description: Get current stock price
              ActionFunction:
                Lambda:
                  Arn: !GetAtt LambdaFunction.Arn
                  Payload:
                    Type: JSON
                    Format: '1.0'
                    Schema:
                      type: object
                      properties:
                        symbol:
                          type: string
                          description: Stock symbol to look up
                      required:
                        - symbol

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'

Outputs:
  BedrockAgentId:
    Description: Amazon Bedrock Agent ID
    Value: !Ref BedrockAgent
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn