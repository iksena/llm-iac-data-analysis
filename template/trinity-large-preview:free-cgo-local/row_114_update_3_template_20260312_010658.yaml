AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  InputBucketName:
    Type: String
    Default: b2bi-input-bucket
  OutputBucketName:
    Type: String
    Default: b2bi-output-bucket

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  OutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${InputBucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${InputBucketName}/*'

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${OutputBucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${OutputBucketName}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucketName
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  response = s3.get_object(Bucket=bucket, Key=key)
                  edi_content = response['Body'].read().decode('utf-8')
                  json_content = transform_edi_to_json(edi_content)
                  output_bucket = os.environ['OUTPUT_BUCKET']
                  output_key = key.replace('.edi', '.json')
                  s3.put_object(Bucket=output_bucket, Key=output_key, Body=json_content)
              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation completed successfully!')
              }

          def transform_edi_to_json(edi_content):
              segments = edi_content.split('~')
              json_data = {}
              for segment in segments:
                  if segment:
                      elements = segment.split('*')
                      segment_id = elements[0]
                      json_data[segment_id] = elements[1:]
              return json.dumps(json_data)

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${InputBucketName}/*'
                  - !Sub 'arn:${AWS::Partition}:s3:::${OutputBucketName}/*'

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${InputBucketName}'

  S3BucketEventSubscription:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !Sub 'arn:${AWS::Partition}:s3:::${InputBucketName}'
      FunctionName: !GetAtt LambdaFunction.Arn
      Enabled: true
      StartingPosition: LATEST
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 0

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
  InputBucketArn:
    Description: Input S3 Bucket ARN
    Value: !GetAtt InputBucket.Arn
  OutputBucketArn:
    Description: Output S3 Bucket ARN
    Value: !GetAtt OutputBucket.Arn