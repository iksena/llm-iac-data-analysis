AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcEndpointId:
    Type: String
    Description: ID of the VPC endpoint to restrict API Gateway access
  DomainName:
    Type: String
    Description: Custom domain name for the API (e.g., api.example.com)
  CertificateArn:
    Type: String
    Description: ARN of ACM certificate for the custom domain (must be in the same region as API Gateway)
  StageName:
    Type: String
    Default: prod
    Description: Stage name for the API deployment
  LambdaFunctionName:
    Type: String
    Default: SimpleResponseFunction
    Description: Name of the Lambda function

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs24.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Hello from private API!' }),
            };
          };

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PrivateApiGateway
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "execute-api:Invoke",
                  "Resource": "execute-api:/*/*/*",
                  "Condition": {
                    "StringEquals": {
                      "aws:sourceVpce": "${vpcEndpointId}"
                    }
                  }
                }
              ]
            }
          - vpcEndpointId: !Ref VpcEndpointId

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*/*

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: data
      RestApiId: !Ref ApiGateway

  ApiMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: LambdaPermission
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiResource
      RestApiId: !Ref ApiGateway
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
      MethodResponses:
        - StatusCode: '200'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiMethod
    Properties:
      Description: Initial deployment
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: CustomDomain
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref ApiGateway
      StageName: !Ref StageName

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref CertificateArn

  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ApiStage
    Properties:
      DomainName: !Ref CustomDomain
      RestApiId: !Ref ApiGateway
      Stage: !Ref StageName

Outputs:
  ApiGatewayUrl:
    Description: Private API Gateway invoke URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  CustomDomainUrl:
    Description: Custom domain URL for the API
    Value: !Sub https://${DomainName}/${StageName}
  ApiGatewayId:
    Description: API Gateway identifier
    Value: !Ref ApiGateway