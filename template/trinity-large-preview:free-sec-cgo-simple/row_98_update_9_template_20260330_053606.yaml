AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      Description: Amplify App for TodoApp
      Repository: https://github.com/yourusername/TodoApp.git
      OauthToken: '{{resolve:secretsmanager:YourGitHubOAuthToken:SecretString}}'
      AutoBranchCreationConfig:
        EnableAutoBranchCreation: true
        AutoBranchCreationPatterns:
          - master
          - main
          - production
        EnableAutoBuild: true
      BuildSpec: amplify.yml
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      Framework: react
      Stage: PRODUCTION
      Tags:
        - Key: Name
          Value: production

  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AmplifyServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                  - amplifybackend:*
                  - codebuild:*
                  - logs:*
                  - s3:*
                  - cloudformation:*
                  - iam:*
                  - lambda:*
                  - cloudfront:*
                  - route53:*
                  - route53domains:*
                  - cognito:*
                  - appsync:*
                  - pinpoint:*
                  - ssm:*
                  - secretsmanager:*
                  - xray:*
                  - ec2:*
                  - elasticloadbalancing:*
                  - waf:*
                  - waf-regional:*
                  - wafv2:*
                  - cloudwatch:*
                  - tag:GetResources
                Resource: '*'

Outputs:
  AppId:
    Description: Amplify App ID
    Value: !Ref AmplifyApp
  AppArn:
    Description: Amplify App ARN
    Value: !GetAtt AmplifyApp.Arn
  DefaultDomain:
    Description: Default Domain for the Amplify App
    Value: !GetAtt AmplifyApp.DefaultDomain