AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption key for AWS resources
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
    Metadata:
      Effect: encrypted
      KeyRotation: enabled

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/central-encryption-key
      TargetKeyId: !Ref KMSKey
    Metadata:
      Effect: key-alias

Metadata:
  Invariants:
    - KMS key must be enabled and have key rotation enabled
    - Root account must have full permissions to the key
    - Alias must reference the KMS key