AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Security Hub Hub with default standards enabled and the Control Finding Generator set to SECURITY_CONTROL.

Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      EnableDefaultStandards: true
      ControlFindingGenerator: "SECURITY_CONTROL"

Outputs:
  SecurityHubHubArn:
    Description: "ARN of the created AWS Security Hub Hub."
    Value: !GetAtt SecurityHubHub.ARN