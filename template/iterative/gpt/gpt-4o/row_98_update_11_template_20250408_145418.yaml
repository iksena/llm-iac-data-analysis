AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application for a TodoApp.'

Parameters:
  GitHubRepositoryOwner:
    Type: String
    Description: 'The owner of the GitHub repository containing the TodoApp source code.'
  GitHubRepositoryName:
    Type: String
    Description: 'The name of the GitHub repository containing the TodoApp source code.'
  GitHubBranchName:
    Type: String
    Description: 'The branch of the GitHub repository to deploy.'
    Default: 'main'
  GitHubOAuthToken:
    Type: String
    Description: 'The OAuth token for accessing the GitHub repository.'
    NoEcho: true

Resources:
  AmplifyApp:
    Type: 'AWS::Amplify::App'
    Properties:
      Name: 'TodoApp'
      Tags:
        - Key: 'Project'
          Value: 'TodoApp'

  AmplifyBranch:
    Type: 'AWS::Amplify::Branch'
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: !Ref GitHubBranchName
      Stage: 'PRODUCTION'
      EnvironmentVariables:
        - Name: 'GITHUB_REPO_OWNER'
          Value: !Ref GitHubRepositoryOwner
        - Name: 'GITHUB_REPO_NAME'
          Value: !Ref GitHubRepositoryName
        - Name: 'GITHUB_OAUTH_TOKEN'
          Value: !Ref GitHubOAuthToken

Outputs:
  AmplifyAppURL:
    Description: 'The URL of the deployed AWS Amplify application.'
    Value: !Sub 'https://${GitHubBranchName}.${AmplifyApp.DefaultDomain}'
  AmplifyAppArn:
    Description: 'The ARN of the AWS Amplify application.'
    Value: !GetAtt [AmplifyApp, Arn]