AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  LambdaFunctionName:
    Type: String
    Default: SESEmailSenderFunction
    Description: Name of the Lambda function
  ApiGatewayName:
    Type: String
    Default: SESEmailAPI
    Description: Name of the API Gateway
  EmailFromAddress:
    Type: String
    Default: noreply@example.com
    Description: Default email address for 'from' field
  EmailSubject:
    Type: String
    Default: Notification
    Description: Default email subject
  ThrottleRateLimit:
    Type: Number
    Default: 500
    Description: API Gateway throttling rate limit (requests/second)
  QuotaLimit:
    Type: Number
    Default: 10000
    Description: API Gateway quota limit (requests/month)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ses_client = boto3.client('ses')

          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  to_addresses = body.get('to')
                  from_address = body.get('from', 'noreply@example.com')
                  subject = body.get('subject', 'Notification')
                  text_content = body.get('text')
                  html_content = body.get('html')

                  if not to_addresses or not (text_content or html_content):
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Missing required fields: to, and either text or html'})
                      }

                  message = {
                      'Subject': {'Data': subject},
                      'Body': {}
                  }
                  if text_content:
                      message['Body']['Text'] = {'Data': text_content}
                  if html_content:
                      message['Body']['Html'] = {'Data': html_content}

                  response = ses_client.send_email(
                      Source=from_address,
                      Destination={'ToAddresses': to_addresses},
                      Message=message
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiGatewayName
      Description: API Gateway for sending templated emails via SES

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: BodyRequestValidator
      RestApiId: !Ref RestApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  Model:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref RestApi
      Name: EmailRequestModel
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        title: EmailRequest
        type: object
        required:
          - to
          - from
          - subject
          - text
          - html
        properties:
          to:
            type: array
            items:
              type: string
              format: email
          from:
            type: string
            format: email
          subject:
            type: string
          text:
            type: string
          html:
            type: string

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref RequestValidator
      RequestModels:
        application/json: !Ref Model
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt LambdaFunction.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PostMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: Deployment for production stage

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiGatewayDeployment
      RestApiId: !Ref RestApi
      StageName: prod
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingRateLimit: !Ref ThrottleRateLimit
          ThrottlingBurstLimit: !Ref ThrottleRateLimit

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: SESEmailAPIKey
      Description: API key for SES email sending API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref RestApi
          StageName: !Ref ApiGatewayStage.StageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: SESEmailUsagePlan
      Description: Usage plan with throttling and quota limits
      ApiStages:
        - ApiId: !Ref RestApi
          Stage: !Ref ApiGatewayStage
      Throttle:
        RateLimit: !Ref ThrottleRateLimit
        BurstLimit: !Ref ThrottleRateLimit
      Quota:
        Limit: !Ref QuotaLimit
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/

Outputs:
  ApiGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  ApiKey:
    Description: API Key for accessing the API
    Value: !Ref ApiKey
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn