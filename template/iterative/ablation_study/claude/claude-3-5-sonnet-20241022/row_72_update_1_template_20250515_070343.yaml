AWSTemplateFormatVersion: '2010-09-09'
Description: 'VS Code Web Development Environment with CloudFront Distribution'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues: [t3.micro, t3.small, t3.medium]

  CodeServerVersion:
    Type: String
    Default: '4.16.1'
    Description: code-server version to install

  EnvironmentName:
    Type: String
    Default: 'dev'
    Description: Environment name for resource tagging

  VpcCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: VPC CIDR block

  SubnetCIDR:
    Type: String
    Default: '10.0.1.0/24'
    Description: Public subnet CIDR block

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-0efcece6bed30fd98
    eu-west-1:
      AMI: ami-0905a3c97561e0b69

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VS Code server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-sg

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: "/"

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref SSMInstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt-get update
          apt-get install -y curl
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version=${CodeServerVersion}
          mkdir -p ~/.config/code-server/
          echo "bind-addr: 0.0.0.0:8080" > ~/.config/code-server/config.yaml
          echo "auth: none" >> ~/.config/code-server/config.yaml
          systemctl enable --now code-server@$USER
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vscode-server

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
          TargetOriginId: VSCodeServer
          ViewerProtocolPolicy: redirect-to-https
          DefaultTTL: 31536000
        Origins:
          - DomainName: !Sub ${EC2Instance.PublicDnsName}
            Id: VSCodeServer
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        PriceClass: PriceClass_100

Outputs:
  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !Sub ${CloudFrontDistribution.DomainName}

  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  SSMConnectionCommand:
    Description: Command to connect via SSM
    Value: !Sub "aws ssm start-session --target ${EC2Instance}"

  VSCodeURL:
    Description: VS Code Server URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}