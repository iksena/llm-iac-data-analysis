AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for mobile notifications reporting with GSI and TTL.

Parameters:
  TableName:
    Type: String
    Default: MobileNotificationsReportingTable
    Description: Name of the DynamoDB table
  TtlAttributeName:
    Type: String
    Default: ttl
    Description: Name of the attribute for TTL expiry (Unix timestamp in seconds)

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TTLSpecification:
        AttributeName: !Ref TtlAttributeName
        Enabled: true

Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref NotificationsTable
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
  GsiArn:
    Description: ARN of the TypeSentTimeIndex Global Secondary Index
    Value: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${NotificationsTable}/index/TypeSentTimeIndex'