AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure parameter storage and retrieval using SSM Parameter Store, Secrets Manager, and Lambda for serverless config management.'

Resources:
  ConfigParameter:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '/${AWS::StackName}/config/feature'
      Type: String
      Value: 'This is A/B'
      Description: 'Non-sensitive configuration value under stack-specific namespace'

  AppSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub '${AWS::StackName}-app-secret'
      Description: 'Application secret with predefined username and generated password'
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 20
        ExcludeCharacters: '"@/\\\\'

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'AccessSSMAndSecrets'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:GetParametersByPath'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/*'
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-secret'

  FetchLambdaFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-fetcher'
      Handler: 'index.lambda_handler'
      Role: !Ref LambdaExecutionRole
      Runtime: 'python3.12'
      Timeout: 30
      Environment:
        Variables:
          NAMESPACE_PATH: !Sub '/${AWS::StackName}/'
          SECRET_ARN: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-secret'
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          def lambda_handler(event, context):
              ssm_client = boto3.client('ssm')
              namespace_path = os.environ['NAMESPACE_PATH']
              ssm_response = ssm_client.get_parameters_by_path(
                  Path=namespace_path,
                  Recursive=True,
                  WithDecryption=True
              )
              print('SSM Parameters:', json.dumps(ssm_response, default=str))

              secrets_client = boto3.client('secretsmanager')
              secret_arn = os.environ['SECRET_ARN']
              secret_response = secrets_client.get_secret_value(SecretId=secret_arn)
              print('Secret:', json.dumps(secret_response['SecretString']))

              return {
                  'statusCode': 200,
                  'body': json.dumps('Parameters and secret fetched successfully')
              }

Outputs:
  FetchLambdaArn:
    Description: 'ARN of the Lambda function that fetches SSM parameters and secrets'
    Value: !Ref FetchLambdaFunction
    Export:
      Name: !Sub '${AWS::StackName}-FetchLambdaArn'

  ConfigParameterName:
    Description: 'Name of the SSM configuration parameter'
    Value: !Ref ConfigParameter
    Export:
      Name: !Sub '${AWS::StackName}-ConfigParameterName'

  AppSecretArn:
    Description: 'ARN of the Secrets Manager secret'
    Value: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AWS::StackName}-app-secret'
    Export:
      Name: !Sub '${AWS::StackName}-AppSecretArn'