AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access) via CloudTrail management events to S3, EventBridge real-time alerts to SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique lowercase S3 bucket name for CloudTrail logs.'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: '3-63 lowercase letters, numbers, hyphens. Start/end alphanumeric.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '^[a-zA-Z0-9-_./]{3,128}$'
    Default: 'SecretsManagerMonitoringTrail'
  SNSTopicName:
    Type: String
    Description: 'Name of the SNS topic for alerts.'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-_]{1,256}$'
    Default: 'SecretsManagerAlerts'

Resources:
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:GetBucketAcl'
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Ref CloudTrailTrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - IncludeManagementEvents: true
          ReadWriteType: All
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring
    DependsOn: CloudTrailBucketPolicy

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Sub '${SNSTopicName} - Secrets Manager Alerts'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-SecretsManagerEvents'
      Description: 'Real-time alerts on Secrets Manager management events (CreateSecret, UpdateSecret, DescribeSecret, etc.) via CloudTrail.'
      State: ENABLED
      EventPattern:
        source:
          - aws.secretsmanager
        'detail-type':
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - DescribeSecret
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridge
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnEquals:
                'aws:SourceArn': !GetAtt EventBridgeRule.Arn
    DependsOn: EventBridgeRule

Outputs:
  SNSTopicArn:
    Description: 'SNS topic ARN - subscribe endpoints (email, Lambda) for secret lifecycle alerts.'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  EventBridgeRuleArn:
    Description: 'EventBridge rule ARN for Secrets Manager event monitoring.'
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudTrailTrailName:
    Description: 'CloudTrail trail name logging Secrets Manager management events to S3.'
    Value: !Ref CloudTrailTrailName
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailTrailName'

  CloudTrailBucketName:
    Description: 'S3 bucket for CloudTrail logs (query with Athena for full audits).'
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailBucketName'