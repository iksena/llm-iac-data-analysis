AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template that provisions an EC2 instance with a Security Group for SSH access in a specified VPC and Subnet.

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    ConstraintDescription: Must be a valid EC2 instance type.
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  AmiId:
    Description: AMI ID for the EC2 instance.
    Type: AWS::EC2::Image::Id
  VpcId:
    Description: VPC Id where the EC2 instance and Security Group will be deployed.
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: Subnet Id in the selected VPC to launch the EC2 instance.
    Type: AWS::EC2::Subnet::Id

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EC2 instance allowing SSH access on port 22.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2InstanceSecurityGroup

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: MyEC2Instance

Outputs:
  InstanceId:
    Description: The Instance ID of the EC2 instance.
    Value: !Ref MyEC2Instance
  SecurityGroupId:
    Description: The ID of the Security Group associated with the EC2 instance.
    Value: !Ref InstanceSecurityGroup