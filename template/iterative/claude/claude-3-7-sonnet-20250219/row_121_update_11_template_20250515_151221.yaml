AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for scheduled automation using EventBridge and SSM'

Parameters:
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for Linux
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  WindowsInstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type for Windows
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
    ConstraintDescription: Must be a valid EC2 instance type.

  ScheduleExpression:
    Type: String
    Default: rate(30 minutes)
    Description: Schedule expression for EventBridge Rule (minimum 30 minutes for SSM Association)

Resources:
  # VPC for our resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: HelloWorldVPC

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: HelloWorldIGW

  # Attach Internet Gateway to VPC
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: HelloWorldPublicSubnet

  # Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: HelloWorldPublicRT

  # Route to Internet
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Associate Route Table with Subnet
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # S3 Bucket for logs
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  # IAM Role for EC2 instances
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${LogBucket.Arn}/*

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # IAM Role for EventBridge
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMRunCommand
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/${SSMDocument}
                  - !Sub arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*

  # Security Group for EC2 instances
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Linux EC2 Instance
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref LinuxInstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: HelloWorld-Linux
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  # Windows EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref WindowsInstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base}}'
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: HelloWorld-Windows
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          <powershell>
          # Ensure SSM agent is running
          Start-Service AmazonSSMAgent
          </powershell>

  # SSM Document for cross-platform commands
  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Cross-platform Hello World command'
        parameters: {}
        mainSteps:
          - action: aws:runPowerShellScript
            name: RunPowerShellOnWindows
            precondition:
              StringEquals:
                - platformType
                - Windows
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
                - '$timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"'
                - 'Write-Host "Current time: $timestamp"'
          - action: aws:runShellScript
            name: RunShellOnLinux
            precondition:
              StringEquals:
                - platformType
                - Linux
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
                - 'echo "Current time: $(date)"'

  # EventBridge Rule to trigger SSM Run Command
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to trigger SSM Run Command every 15 minutes
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Id: SSMRunCommandTarget
          Arn: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/${SSMDocument}
          RoleArn: !GetAtt EventBridgeRole.Arn
          RunCommandParameters:
            RunCommandTargets:
              - Key: tag:HelloWorld
                Values:
                  - 'true'

  # SSM State Manager Association
  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      AssociationName: HelloWorldAssociation
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-output
      ScheduleExpression: !Ref ScheduleExpression

Outputs:
  LinuxInstanceId:
    Description: ID of the Linux EC2 instance
    Value: !Ref LinuxInstance

  WindowsInstanceId:
    Description: ID of the Windows EC2 instance
    Value: !Ref WindowsInstance

  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket

  SSMDocumentName:
    Description: Name of the SSM Document
    Value: !Ref SSMDocument

  EventBridgeRuleARN:
    Description: ARN of the EventBridge Rule
    Value: !GetAtt EventBridgeRule.Arn

  VpcId:
    Description: ID of the VPC
    Value: !Ref VPC

  SubnetId:
    Description: ID of the Subnet
    Value: !Ref PublicSubnet