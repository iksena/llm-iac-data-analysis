AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Bedrock Agent with Lambda integration'

Parameters:
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: Bedrock foundation model ID
  
  AgentName:
    Type: String
    Default: StockPriceAgent
    Description: Name of the Bedrock Agent

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({
                stockSymbol: event.stockSymbol || 'DEMO',
                price: 100.00
              })
            };
          };
      Runtime: nodejs18.x
      Timeout: 29
      MemorySize: 128

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - bedrock.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentBasicPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt StockPriceLambdaFunction.Arn

  StockPriceAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref AgentName
      FoundationModel: !Ref BedrockModelId
      Description: Stock price lookup agent powered by AI to provide real-time stock price information
      IdleSessionTTLInSeconds: 1800
      Instruction: You are a specialized stock price lookup assistant. Your primary function is to help users retrieve current stock prices using the provided API endpoints. When users ask about stock prices, you should utilize the available actions to fetch accurate price information and present it in a clear, professional manner.

  StockPriceActionGroupAssociation:
    Type: AWS::Bedrock::AgentActionGroupAssociation
    Properties:
      AgentId: !Ref StockPriceAgent
      ActionGroupName: StockPriceActions
      Description: Stock price lookup actions
      ActionGroupExecutor: AWS_LAMBDA
      ApiSchema: '{"openapi":"3.0.0","info":{"title":"StockAPI","version":"1.0.0"},"paths":{"/price":{"get":{"operationId":"getPrice","parameters":[{"name":"symbol","in":"query","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Success","content":{"application/json":{"schema":{"type":"object","properties":{"price":{"type":"number"}}}}}}}}}}'
      LambdaFunctionArn: !GetAtt StockPriceLambdaFunction.Arn

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !Ref StockPriceAgent
  
  LambdaArn:
    Description: Lambda Function ARN
    Value: !GetAtt StockPriceLambdaFunction.Arn