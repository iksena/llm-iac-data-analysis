AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer IAM Access

Parameters:
  EnforcementMode:
    Description: Enable strict permission boundary enforcement
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  
  TeamName:
    Description: Name of the development team for resource naming and tagging
    Type: String
    MinLength: 2
    MaxLength: 32
    Default: 'MyTeam'
  
  CustomBoundaryArn:
    Description: '(Optional) ARN of custom permission boundary policy'
    Type: String
    Default: ''

Conditions:
  HasCustomBoundary: !Not [!Equals [!Ref CustomBoundaryArn, '']]

Resources:
  DefaultPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${TeamName}-DefaultBoundary'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:*'
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:Simulate*'
            Resource: '*'
      Description: !Sub 'Default permission boundary for ${TeamName} developers'
      Path: '/'

  DeveloperRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${TeamName}-DeveloperPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'iam:*'
            Resource: '*'
            Condition:
              StringLike:
                'iam:ResourceTag/Owner': !Ref TeamName
                'iam:PermissionsBoundary': !If [HasCustomBoundary, !Ref CustomBoundaryArn, !GetAtt DefaultPermissionBoundary.Arn]
                'iam:PolicyName': !Sub '${TeamName}*'
                'iam:RoleName': !Sub '${TeamName}*'
              StringEquals:
                'aws:RequestTag/Owner': !Ref TeamName
      Description: !Sub 'Policy for ${TeamName} developers with conditional IAM permissions'
      Path: '/'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TeamName}-DeveloperRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref DeveloperRolePolicy
      PermissionsBoundary: !If [HasCustomBoundary, !Ref CustomBoundaryArn, !GetAtt DefaultPermissionBoundary.Arn]
      Tags:
        - Key: Owner
          Value: !Ref TeamName

Outputs:
  DeveloperRoleArn:
    Description: ARN of the created developer role
    Value: !GetAtt DeveloperRole.Arn
  
  PermissionBoundaryArn:
    Description: ARN of the active permission boundary
    Value: !If [HasCustomBoundary, !Ref CustomBoundaryArn, !GetAtt DefaultPermissionBoundary.Arn]
  
  DeveloperPolicyArn:
    Description: ARN of the developer managed policy
    Value: !Ref DeveloperRolePolicy
  
  CurrentEnforcementMode:
    Description: Current permission boundary enforcement mode
    Value: !Ref EnforcementMode