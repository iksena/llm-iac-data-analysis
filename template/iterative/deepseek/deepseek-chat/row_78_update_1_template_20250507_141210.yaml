AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS EC2 IP Address Manager (IPAM) with public and private scopes'

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: 'Default IP Address Manager'
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      Description: 'Default public IPAM scope'

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      Description: 'Default private IPAM scope'

Outputs:
  IPAMArn:
    Description: 'ARN of the created IPAM'
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMArn'

  IPAMId:
    Description: 'ID of the created IPAM'
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAMId'

  PublicScopeId:
    Description: 'ID of the default public scope'
    Value: !Ref PublicScope
    Export:
      Name: !Sub '${AWS::StackName}-PublicScopeId'

  PrivateScopeId:
    Description: 'ID of the default private scope'
    Value: !Ref PrivateScope
    Export:
      Name: !Sub '${AWS::StackName}-PrivateScopeId'