AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready DynamoDB table with one Local Secondary Index and one Global Secondary Index'

Parameters:
  TableName:
    Type: String
    Default: ExampleDynamoDBTable
    Description: 'Name of the DynamoDB table'
  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: 'Billing mode for the table and GSI'
  ReadCapacityUnits:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100000
    Description: 'Read capacity units for provisioned mode (table)'
  WriteCapacityUnits:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100000
    Description: 'Write capacity units for provisioned mode (table)'
  GSIReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100000
    Description: 'Read capacity units for provisioned mode (GSI)'
  GSIWriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100000
    Description: 'Write capacity units for provisioned mode (GSI)'

Conditions:
  UseProvisionedBilling: !Equals
    - !Ref BillingMode
    - PROVISIONED

Resources:
  ExampleDynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      SSEEnabled: true
      ProvisionedThroughput:
        Fn::If:
          - UseProvisionedBilling
          - ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - !Ref AWS::NoValue
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: status
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
          ProvisionedThroughput:
            Fn::If:
              - UseProvisionedBilling
              - ReadCapacityUnits: !Ref GSIReadCapacityUnits
                WriteCapacityUnits: !Ref GSIWriteCapacityUnits
              - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: 'Name of the DynamoDB table'
    Value: !Ref ExampleDynamoDBTable
  TableArn:
    Description: 'ARN of the DynamoDB table'
    Value: !GetAtt ExampleDynamoDBTable.Arn