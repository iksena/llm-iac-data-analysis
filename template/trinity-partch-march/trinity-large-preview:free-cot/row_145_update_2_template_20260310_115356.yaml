AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Static Website with S3, CloudFront, and Automated Content Management

Parameters:
  BucketName:
    Type: String
    Default: !Join ['-', [!Ref 'AWS::StackName', 'static-website']]
    Description: Name of the S3 bucket for static website hosting
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
  CacheTTL:
    Type: Number
    Default: 60
    Description: Default TTL for CloudFront cache in seconds
  PriceClass:
    Type: String
    Default: PriceClass_100
    Description: CloudFront price class
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  # S3 Bucket for Static Website
  StaticWebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
      Tags:
        - Key: Name
          Value: !Ref BucketName

  # Origin Access Control for CloudFront
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: OAC for static website bucket
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: when-in-use
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt StaticWebsiteBucket.DomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${OriginAccessControl}'
            OriginAccessControl:
              Id: !Ref OriginAccessControl
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021
        Restrictions:
          GeoRestriction:
            RestrictionType: none
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CustomCachePolicy
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
            Headers:
              - Origin

  # Custom Cache Policy
  CustomCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-cache-policy'
        MinTTL: !Ref CacheTTL
        MaxTTL: 31536000
        DefaultTTL: !Ref CacheTTL
        Comment: Custom cache policy with 60-second TTL
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSLambdaExecute
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StaticWebsiteBucket.Arn
                  - !Sub '${StaticWebsiteBucket.Arn}/*'

  # Lambda Function for Custom Resource
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              try:
                  request_type = event['RequestType']
                  bucket_name = event['ResourceProperties']['BucketName']

                  if request_type == 'Create':
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body=b'<html><head><title>Static Website</title></head><body><h1>Welcome to our static website!</h1></body></html>',
                          ContentType='text/html'
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  elif request_type == 'Update':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  elif request_type == 'Delete':
                      objects = s3.list_objects_v2(Bucket=bucket_name)
                      if 'Contents' in objects:
                          delete_keys = [{'Key': obj['Key']} for obj in objects['Contents']]
                          s3.delete_objects(
                              Bucket=bucket_name,
                              Delete={'Objects': delete_keys}
                          )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # Lambda Custom Resource
  LambdaCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      BucketName: !Ref BucketName

  # Deletion Policies
  LambdaFunction:
    DeletionPolicy: Retain
  LambdaExecutionRole:
    DeletionPolicy: Retain

Outputs:
  WebsiteURL:
    Value: !GetAtt StaticWebsiteBucket.WebsiteURL
    Description: URL of the static website hosted on S3
  CloudFrontURL:
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Description: CloudFront distribution URL
  BucketName:
    Value: !Ref BucketName
    Description: Name of the S3 bucket