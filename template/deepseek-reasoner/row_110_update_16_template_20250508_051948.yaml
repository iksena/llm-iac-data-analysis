AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcEndpointId:
    Type: String
    Description: "REQUIRED: ID of the VPC endpoint (format: vpce-xxxxxxxx)"
    AllowedPattern: "^vpce-[a-zA-Z0-9]{17}$"
    ConstraintDescription: "Must be a valid VPC endpoint ID starting with 'vpce-'"
  DomainName:
    Type: String
    Description: "REQUIRED: Custom domain name (e.g., api.example.com)"
    AllowedPattern: "^[a-zA-Z0-9.-]+$"
    ConstraintDescription: "Must be a valid domain name"
  CertificateArn:
    Type: String
    Description: "REQUIRED: ACM certificate ARN (from same region)"
    AllowedPattern: "^arn:aws:acm:[a-z0-9-]+:[0-9]+:certificate/[a-zA-Z0-9-]+$"
    ConstraintDescription: "Must be a valid ACM certificate ARN"
  HostedZoneId:
    Type: String
    Description: "REQUIRED: Route53 hosted zone ID (e.g., ZABC12345678)"
    AllowedPattern: "^Z[A-Z0-9]{12,}$"
    ConstraintDescription: "Must be a valid Route53 hosted zone ID"

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {'statusCode': 200, 'body': 'Hello from Private API'}
      Timeout: 10

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PrivateApiGateway
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "*"
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref VpcEndpointId
          - Effect: Allow
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "*"

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: test

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations"
          - LambdaArn: !GetAtt LambdaFunction.Arn

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiDeployment

  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: !Ref ApiStage

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId
        DNSName: !GetAtt ApiDomainName.RegionalDomainName

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/prod/*"
        - RestApiId: !Ref ApiGatewayRestApi

Outputs:
  ApiUrl:
    Value: !Sub
      - "https://${RestApiId}.execute-api.${AWS::Region}.amazonaws.com/prod"
      - RestApiId: !Ref ApiGatewayRestApi
  CustomDomainUrl:
    Value: !Sub "https://${DomainName}/test"
  InvokeUrl:
    Value: !Sub "https://${ApiDomainName.RegionalDomainName}/prod/test"