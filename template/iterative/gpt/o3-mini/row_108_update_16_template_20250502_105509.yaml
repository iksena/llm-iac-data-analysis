AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS CloudFormation template to create a secure AWS Cognito user management system with email verification,
  custom password policy, admin-managed user provisioning, and a preconfigured domain for hosted login pages
  with OAuth support.

Parameters:
  UserPoolName:
    Type: String
    Description: "The name for the Cognito User Pool."
    Default: "MyCognitoUserPool"
  DomainPrefix:
    Type: String
    Description: "The prefix for the Cognito User Pool Domain (must be globally unique, lowercase, no spaces)."
    Default: "mycognito-domain"
    AllowedPattern: "[a-z0-9-]+"
    MinLength: 1
    MaxLength: 63
    ConstraintDescription: "Domain prefix must contain only lowercase letters, numbers, and dashes, and be between 1 and 63 characters."
  CallbackURLs:
    Type: CommaDelimitedList
    Description: "Comma separated list of allowed callback URLs for the User Pool Client."
    Default: "https://example.com/callback"
  SignOutURLs:
    Type: CommaDelimitedList
    Description: "Comma separated list of allowed sign-out URLs for the User Pool Client."
    Default: "https://example.com/signout"
  PasswordMinimumLength:
    Type: Number
    Description: "Minimum length for the user password."
    Default: 8
  RequireUppercase:
    Type: String
    AllowedValues: ["true", "false"]
    Description: "Whether to require uppercase letters in the user password."
    Default: "true"
  RequireLowercase:
    Type: String
    AllowedValues: ["true", "false"]
    Description: "Whether to require lowercase letters in the user password."
    Default: "true"
  RequireNumbers:
    Type: String
    AllowedValues: ["true", "false"]
    Description: "Whether to require numbers in the user password."
    Default: "true"
  RequireSymbols:
    Type: String
    AllowedValues: ["true", "false"]
    Description: "Whether to require symbols in the user password."
    Default: "false"

Conditions:
  IsRequireUppercase: !Equals [!Ref RequireUppercase, "true"]
  IsRequireLowercase: !Equals [!Ref RequireLowercase, "true"]
  IsRequireNumbers: !Equals [!Ref RequireNumbers, "true"]
  IsRequireSymbols: !Equals [!Ref RequireSymbols, "true"]

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireUppercase: !If [IsRequireUppercase, true, false]
          RequireLowercase: !If [IsRequireLowercase, true, false]
          RequireNumbers: !If [IsRequireNumbers, true, false]
          RequireSymbols: !If [IsRequireSymbols, true, false]
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: "AppClient"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref SignOutURLs

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref CognitoUserPool

Outputs:
  UserPoolId:
    Description: "The ID of the Cognito User Pool."
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: "The Client ID for the Cognito User Pool Client."
    Value: !Ref CognitoUserPoolClient
  UserPoolDomainOutput:
    Description: "The domain for the Cognito User Pool hosted login pages."
    Value: !Ref CognitoUserPoolDomain