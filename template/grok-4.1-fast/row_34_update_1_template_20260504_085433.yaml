AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready MySQL RDS (db.r5.large, io1) in dedicated VPC with private subnets, DB Subnet Group, and security group for internal VPC access only.'

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: !Select [0, !GetAZs '']
    Description: Availability Zone for subnet 1
  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: !Select [1, !GetAZs '']
    Description: Availability Zone for subnet 2
  DBName:
    Type: String
    Default: mydb
    Description: Initial database name
    MinLength: 1
    MaxLength: 64
  MasterUsername:
    Type: String
    Default: admin
    Description: RDS master username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9]*$'
  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    Description: RDS master password
  DBAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 100
    MaxValue: 16384
    Description: RDS allocated storage (GiB)
  DBIops:
    Type: Number
    Default: 1000
    MinValue: 1000
    MaxValue: 16000
    Description: Provisioned IOPS for io1 storage

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: Production

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet-1'
        - Key: Environment
          Value: Production

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-subnet-2'
        - Key: Environment
          Value: Production

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub 'DB Subnet Group for ${AWS::StackName}'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-dbsubnetgroup'
        - Key: Environment
          Value: Production
    DependsOn:
      - PrivateSubnet1
      - PrivateSubnet2

  RDSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for MySQL RDS instance - internal VPC access only'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCidr
      Egress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-rds-sg'
        - Key: Environment
          Value: Production

  MySQLRDS:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-mysql'
      DBInstanceClass: db.r5.large
      Engine: mysql
      EngineVersion: 8.0
      LicenseModel: general-public-license
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBName: !Ref DBName
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: io1
      Iops: !Ref DBIops
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSecurityGroup
      MultiAZ: true
      PubliclyAccessible: false
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'Sun:05:00-Sun:06:00'
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt EnhancedMonitoringRole.Arn
      DeletionProtection: true
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-mysql-rds'
        - Key: Environment
          Value: Production
    DependsOn:
      - DBSubnetGroup
      - RDSecurityGroup

Outputs:
  RDSEndpointAddress:
    Description: RDS MySQL endpoint address
    Value: !Ref MySQLRDS.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-RDSEndpointAddress'
  RDSEndpointPort:
    Description: RDS MySQL endpoint port
    Value: !Ref MySQLRDS.Endpoint.Port
    Export:
      Name: !Sub '${AWS::StackName}-RDSEndpointPort'
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'
  PrivateSubnet1Id:
    Description: Private Subnet 1 ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Id'
  PrivateSubnet2Id:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Id'
  DBSubnetGroupName:
    Description: DB Subnet Group Name
    Value: !Ref DBSubnetGroup
    Export:
      Name: !Sub '${AWS::StackName}-DBSubnetGroupName'
  RDSecurityGroupId:
    Description: RDS Security Group ID
    Value: !Ref RDSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-RDSecurityGroupId'