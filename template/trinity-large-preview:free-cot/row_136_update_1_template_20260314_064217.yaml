AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Governance Control Template with Configurable Permission Boundaries

Parameters:
  EnablePermissionBoundary:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Enable strict permission boundary enforcement (true/false)
  TeamOwnerTag:
    Type: String
    Default: "MyTeam"
    AllowedPattern: "^[a-zA-Z0-9-_]+$"
    Description: Team identifier for Owner tag (alphanumeric, hyphens, underscores)

Resources:
  # Permission Boundary Policy - Restricts to S3 and read-only IAM
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permission boundary restricting to S3 and read-only IAM operations
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
              - iam:Generate*
            Resource: "*"

  # Base IAM Policy for Developer Role
  DeveloperIAMPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: IAM policy for developers with naming prefix and tagging controls
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:TagRole
              - iam:UntagRole
              - iam:ListAttachedRolePolicies
              - iam:GetRole
              - iam:ListPolicies
            Resource: "*"

  # Conditional Policy for Naming Prefix Enforcement
  NamingPrefixPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EnablePermissionBoundary
    Properties:
      Description: Enforces MyTeam* naming prefix when permission boundary is enabled
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iam:*
            Resource:
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/MyTeam*"
              - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/MyTeam*"

  # Developer Governance Role with Permission Boundary
  DeveloperGovernanceRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for developers with configurable permission boundary
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref PermissionBoundaryPolicy
        - !Ref DeveloperIAMPolicy
      Policies:
        - PolicyName: NamingPrefixEnforcement
          PolicyDocument: !If [EnablePermissionBoundary, !Ref NamingPrefixPolicy, !Ref AWS::NoValue]
      Tags:
        - Key: Owner
          Value: !Ref TeamOwnerTag

  # Custom Resource for IAM Resource Validation
  IAMResourceValidator:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IAMResourceValidator
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:CreatePolicy
            Resource: "*"
            Condition:
              StringLike:
                iam:ResourceTag/Owner: !Ref TeamOwnerTag
              StringLike:
                iam:ResourceTag/aws:RequestTag/Owner: !Ref TeamOwnerTag
              StringEquals:
                iam:CreatePolicyPermissionBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/PermissionBoundaryPolicy"
                iam:CreateRolePermissionBoundary: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/PermissionBoundaryPolicy"

Conditions:
  EnablePermissionBoundary: !Equals [ !Ref EnablePermissionBoundary, "true" ]

Outputs:
  DeveloperGovernanceRoleArn:
    Description: ARN of the Developer Governance Role
    Value: !GetAtt DeveloperGovernanceRole.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !Ref PermissionBoundaryPolicy