AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for multi-threshold AWS billing alarms with SNS notifications'

Resources:
  BillingAlertsSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 'AWS Billing Alerts'
      TopicName: 'BillingAlertsTopic'

  BillingAlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: 'xxxxx@gmail.com'
      Protocol: email
      TopicArn: !Ref BillingAlertsSNSTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'MonthlyBillingAlarm-5'
      AlarmDescription: 'Alarm when AWS monthly charges exceed $5'
      Namespace: 'AWS/Billing'
      MetricName: 'EstimatedCharges'
      Dimensions:
        - Name: 'Currency'
          Value: 'USD'
      Statistic: 'Maximum'
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref BillingAlertsSNSTopic

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'MonthlyBillingAlarm-10'
      AlarmDescription: 'Alarm when AWS monthly charges exceed $10'
      Namespace: 'AWS/Billing'
      MetricName: 'EstimatedCharges'
      Dimensions:
        - Name: 'Currency'
          Value: 'USD'
      Statistic: 'Maximum'
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref BillingAlertsSNSTopic

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'MonthlyBillingAlarm-20'
      AlarmDescription: 'Alarm when AWS monthly charges exceed $20'
      Namespace: 'AWS/Billing'
      MetricName: 'EstimatedCharges'
      Dimensions:
        - Name: 'Currency'
          Value: 'USD'
      Statistic: 'Maximum'
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref BillingAlertsSNSTopic

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: 'MonthlyBillingAlarm-40'
      AlarmDescription: 'Alarm when AWS monthly charges exceed $40'
      Namespace: 'AWS/Billing'
      MetricName: 'EstimatedCharges'
      Dimensions:
        - Name: 'Currency'
          Value: 'USD'
      Statistic: 'Maximum'
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref BillingAlertsSNSTopic

Outputs:
  SNSTopicARN:
    Description: 'ARN of the SNS topic for billing alerts'
    Value: !Ref BillingAlertsSNSTopic
  Alarm5ARN:
    Description: 'ARN of the $5 billing alarm'
    Value: !Ref BillingAlarm5
  Alarm10ARN:
    Description: 'ARN of the $10 billing alarm'
    Value: !Ref BillingAlarm10
  Alarm20ARN:
    Description: 'ARN of the $20 billing alarm'
    Value: !Ref BillingAlarm20
  Alarm40ARN:
    Description: 'ARN of the $40 billing alarm'
    Value: !Ref BillingAlarm40