AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EventBridge rule with an SNS topic. 
  The rule matches events from the source 'demo.cli' and forwards them to the SNS topic.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EventBridgeDemoSNSTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: 
              - Ref: SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DemoCLIRule
      EventPattern:
        source:
          - demo.cli
      Targets:
        - Arn: 
            Ref: SNSTopic
          Id: "SNSTarget"

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS Topic
    Value: 
      Ref: SNSTopic

  EventBridgeRuleARN:
    Description: The ARN of the EventBridge Rule
    Value: 
      Fn::GetAtt: 
        - EventBridgeRule
        - Arn