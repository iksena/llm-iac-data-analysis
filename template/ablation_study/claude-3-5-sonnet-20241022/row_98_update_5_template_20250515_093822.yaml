AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for TodoApp Amplify Application'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: Only alphanumeric characters and hyphens are allowed

  RepositoryUrl:
    Type: String
    Description: URL of the source code repository (e.g., https://github.com/username/repo)
    MinLength: 1
    MaxLength: 512
    AllowedPattern: '^https:\/\/.*'
    ConstraintDescription: Must be a valid HTTPS repository URL

  AccessToken:
    Type: String
    Description: Personal access token for repository access (GitHub/BitBucket/etc)
    MinLength: 8
    NoEcho: true
    Required: true
    ConstraintDescription: Access token is required for repository access

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole
      Path: /
      RoleName: !Sub ${AppName}-AmplifyRole

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      OauthToken: !Ref AccessToken
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: production
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: production

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyAppARN:
    Description: Amplify Application ARN
    Value: !GetAtt AmplifyApp.Arn

  AmplifyDefaultDomain:
    Description: Default domain for the Amplify application
    Value: !Sub https://${AmplifyBranch.BranchName}.${AmplifyApp.DefaultDomain}

  ProductionBranchURL:
    Description: URL for the production branch
    Value: !Sub https://production.${AmplifyApp.DefaultDomain}