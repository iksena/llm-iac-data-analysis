AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EmailAddress:
    Type: String
    Description: Email address for receiving secret management alerts

Resources:
  SecretsAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Secrets-Manager-Critical-Events-Alerts

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SecretsAlertTopic
      Topics:
        - !Ref SecretsAlertTopic

  SecretsEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Detects critical Secrets Manager API operations"
      EventBusName: default
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - DeleteSecret
            - RotateSecret
            - UpdateSecret
            - PutSecretValue
            - CreateSecret
          awsRegion:
            - !Ref AWS::Region
      Targets:
        - Arn: !Ref SecretsAlertTopic
          Id: SecretsManagerAlertTarget

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SecretsAlertTopic
      Protocol: email
      Endpoint: !Ref EmailAddress

Outputs:
  AlertTopicARN:
    Description: ARN of the alert notification topic
    Value: !Ref SecretsAlertTopic