AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to enable AWS Security Hub with default standards and consolidated control findings'

Resources:
  SecurityHubHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties: {}

  AWSFoundationalStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0'
      DependsOn: SecurityHubHub

  CISStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0'
      DependsOn: SecurityHubHub

  PCIStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::ruleset/pci-dss/v/3.2.1'
      DependsOn: SecurityHubHub

  SecurityHubConfiguration:
    Type: 'AWS::SecurityHub::ConfigurationPolicy'
    Properties:
      ServiceEnabled: true
      ConfigurationPolicy:
        Policy:
          Service:
            SecurityHub:
              Configuration:
                SecurityControlsConfiguration:
                  EnableDefaultStandards: true
                  SecurityControlCustomParameters: []
                EnabledStandardArns:
                  - 'arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0'
                  - 'arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0'
                  - 'arn:aws:securityhub:::ruleset/pci-dss/v/3.2.1'
        ConfigurationPolicyId: 'default'
        Description: 'Default Security Hub configuration with consolidated controls'
        Name: 'DefaultSecurityHubConfiguration'
        Tags: {}

Outputs:
  SecurityHubARN:
    Description: 'ARN of the Security Hub resource'
    Value: !GetAtt SecurityHubHub.Arn
  ConsolidatedFindingsStatus:
    Description: 'Status of consolidated control findings'
    Value: !GetAtt SecurityHubConfiguration.ServiceEnabled