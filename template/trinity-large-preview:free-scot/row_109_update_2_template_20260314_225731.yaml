AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB API integration with dead-letter queue

Parameters:
  MongoDBURL:
    Type: String
    Default: www.testanu.com
    Description: MongoDB API endpoint URL
  ApiKeyName:
    Type: String
    Default: test_name
    Description: API key name for authentication
  ApiKeyValue:
    Type: String
    Default: test_value
    Description: API key value for authentication

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: custom-event-bus

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: !Ref ApiKeyName
        ApiKeyValue: !Ref ApiKeyValue

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: '*'

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: !Ref MongoDBURL
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      InvocationRoleArn: !GetAtt EventBridgeInvokeRole.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      MaximumMessageSize: 262144

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  ApiDestinationArn:
    Description: ARN of the MongoDB API destination
    Value: !Ref MongoDBApiDestination
  DeadLetterQueueUrl:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue