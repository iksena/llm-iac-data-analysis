AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application (will be combined with stack name for uniqueness)
    MinLength: 1
    MaxLength: 255
  RepositoryUrl:
    Type: String
    Default: 'https://github.com/aws-samples/amplify-todo-app-example.git'
    Description: URL of the Git repository (must be valid and accessible)
    MinLength: 1
  BranchName:
    Type: String
    Default: production
    Description: Name of the production branch
    MinLength: 1
    MaxLength: 255
  AccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Personal access token for private repositories (optional for public repositories)
Conditions:
  HasAccessToken: !Not
    - !Equals
      - !Ref AccessToken
      - ''
Resources:
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub '${AppName}-${AWS::StackName}'
      Repository: !Ref RepositoryUrl
      Platform: WEB
      AccessToken: !If [HasAccessToken, !Ref AccessToken, !Ref AWS::NoValue]
  TodoAppProductionBranch:
    Type: AWS::Amplify::Branch
    DependsOn: TodoAppAmplifyApp
    Properties:
      AppId: !Ref TodoAppAmplifyApp
      BranchName: !Ref BranchName
Outputs:
  AmplifyAppId:
    Description: ID of the Amplify application
    Value: !Ref TodoAppAmplifyApp
  AmplifyBranchName:
    Description: Name of the production branch
    Value: !Ref BranchName
  AmplifyAppUrl:
    Description: URL of the deployed application
    Value: !Sub
      - 'https://${branchName}.${appDomain}'
      - branchName: !Ref BranchName
        appDomain: !GetAtt TodoAppAmplifyApp.DefaultDomain