AWSTemplateFormatVersion: '2010-09-09'
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: LabVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: LabIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  AdminInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'
        - PolicyName: CloudFormationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                Resource: '*'

  AdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AdminInstanceRole

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          sudo yum update -y
          sudo yum install -y aws-instance-scheduler-cli
          sudo systemctl enable aws-instance-scheduler
          sudo systemctl start aws-instance-scheduler
      Tags:
        - Key: Name
          Value: AdminInstance
        - Key: environment
          Value: dev

  DevInstance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance1
        - Key: environment
          Value: dev

  DevInstance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance2
        - Key: environment
          Value: dev

  DevInstance3:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance3
        - Key: environment
          Value: dev

  DevInstance4:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance4
        - Key: environment
          Value: dev

  DevInstance5:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref AdminInstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance5
        - Key: environment
          Value: dev

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all outbound traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

Outputs:
  AdminInstanceId:
    Description: Instance ID of the admin instance
    Value: !Ref AdminInstance
  DevInstanceIds:
    Description: Instance IDs of the development instances
    Value: !Join [",", [!Ref DevInstance1, !Ref DevInstance2, !Ref DevInstance3, !Ref DevInstance4, !Ref DevInstance5]]
  VPCId:
    Description: ID of the created VPC
    Value: !Ref VPC
  PublicSubnetId:
    Description: ID of the public subnet
    Value: !Ref PublicSubnet