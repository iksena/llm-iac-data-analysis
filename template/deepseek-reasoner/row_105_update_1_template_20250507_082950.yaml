AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossServiceAutomationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ssm.amazonaws.com
                - ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
      Policies:
        - PolicyName: SSMAutomationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAutomationExecution
                  - ssm:SendCommand
                  - ssm:GetParameter*
                  - ssm:DescribeInstanceInformation
                Resource: '*'
              - Effect: Allow
                Action:
                  - ssm:CreateAssociation
                  - ssm:ListCommands
                Resource: arn:aws:ssm:*:*:*
Outputs:
  RoleARN:
    Value: !GetAtt AutomationRole.Arn
    Description: ARN of the cross-service automation role