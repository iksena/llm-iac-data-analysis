AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      KeyUsage: ENCRYPT_DECRYPT
      PendingWindowInDays: 30

  MyKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/MyS3EncryptionKey
      TargetKeyId: !Ref MyKMSKey

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - SSEKMSEncryption:
              KeyId: !Ref MyKMSKey
      LifecycleConfiguration:
        Rules:
          - NoncurrentVersionExpiration:
              Days: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Environment
          Value: Production
        - Key: Owner
          Value: CloudTeam
        - Key: Project
          Value: DataLake

  MyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Join
              - ""
              - - "arn:aws:s3:::"
                - !Ref MyS3Bucket
                - "/*"