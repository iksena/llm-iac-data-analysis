AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the Aurora cluster will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of two subnet IDs for multi-AZ deployment
  DatabaseName:
    Type: String
    Default: mydatabase
    Description: Name of the database to create in the cluster
  MasterUsername:
    Type: String
    Default: admin
    Description: Database master username
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Database master password
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  EngineVersion:
    Type: String
    Default: 5.7.mysql_aurora.2.07.2
    Description: Aurora MySQL engine version

Resources:
  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt AuroraSecurityGroup.GroupId
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      Port: 3306
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: false
      StorageEncrypted: true
      EnableCloudwatchLogsExports:
        - error
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt AuroraSecurityGroup.GroupId
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt AuroraSecurityGroup.GroupId
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  DatabaseName:
    Description: Database name
    Value: !Ref DatabaseName