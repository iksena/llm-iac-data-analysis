AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralizedTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alert Topic
      Subscription:
        - Endpoint: example@example.com
          Protocol: email

  TopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralizedTopic
      Protocol: email
      Endpoint: example@example.com

Outputs:
  TopicArn:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedTopic