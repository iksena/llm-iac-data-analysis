AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to create an Amazon Aurora MySQL cluster
  with two publicly accessible db.t3.large instances and custom DB parameter groups.
  The master user password is securely generated and stored in AWS Secrets Manager.

Parameters:
  DBClusterIdentifier:
    Type: String
    Description: "The DB Cluster identifier."
  DatabaseName:
    Type: String
    Description: "The name of the initial database to create."
  MasterUsername:
    Type: String
    Description: "The master username for the Aurora cluster."
  DBSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "A list of subnet IDs for the RDS DBSubnetGroup. At least two subnets are required."
  VpcSecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: "A list of VPC Security Group IDs for the Aurora cluster."

Resources:
  AuroraClusterMasterPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${DBClusterIdentifier}-MasterUserPassword"
      Description: "Master user password for the Aurora cluster, automatically generated."
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: "password"
        ExcludeCharacters: "\"@/\\"
        PasswordLength: 16

  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: "Custom Aurora MySQL DB Cluster Parameter Group enforcing sql_mode."
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

  AuroraInstanceParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: "Custom Aurora MySQL DB Instance Parameter Group enforcing time_zone."
      Family: aurora-mysql5.7
      Parameters:
        time_zone: "UTC"

  AuroraDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for the Aurora MySQL cluster"
      SubnetIds: !Ref DBSubnetIds

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.11.6"
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub
        - "{{resolve:secretsmanager:${SecretARN}:SecretString:password}}"
        - {SecretARN: !Ref AuroraClusterMasterPasswordSecret}
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VpcSecurityGroupIds: !Ref VpcSecurityGroupIds
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: !Sub "${DBClusterIdentifier}-instance1"
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraInstanceParameterGroup

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: !Sub "${DBClusterIdentifier}-instance2"
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraInstanceParameterGroup

Outputs:
  DBClusterARN:
    Description: "ARN of the Aurora MySQL DB Cluster."
    Value: !GetAtt [AuroraDBCluster, DBClusterArn]
  DBInstance1Endpoint:
    Description: "Endpoint of the first DB Instance."
    Value: !GetAtt [AuroraDBInstance1, Endpoint.Address]
  DBInstance2Endpoint:
    Description: "Endpoint of the second DB Instance."
    Value: !GetAtt [AuroraDBInstance2, Endpoint.Address]
  MasterPasswordSecretARN:
    Description: "ARN of the Secrets Manager secret containing the master user password."
    Value: !Ref AuroraClusterMasterPasswordSecret