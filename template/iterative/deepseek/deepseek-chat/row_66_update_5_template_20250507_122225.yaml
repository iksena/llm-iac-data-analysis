AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with single public subnet and internet access for demonstration purposes

Parameters:
  VPCCidrBlock:
    Description: CIDR block for the VPC (e.g., 10.0.0.0/16)
    Type: String
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid IPv4 CIDR block
  
  PublicSubnetCidrBlock:
    Description: CIDR block for the public subnet (must be within VPC CIDR)
    Type: String
    Default: '10.0.1.0/24'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid IPv4 CIDR block
  
  AvailabilityZone:
    Description: '(Optional) Availability Zone for the public subnet. Leave blank to let AWS choose.'
    Type: String
    Default: ''
    AllowedPattern: '^[a-z]{2}-[a-z]+-[1-9][a-z]?$|^$'
    ConstraintDescription: Must be a valid AWS Availability Zone format (e.g., us-east-1a) or empty

Mappings:
  RegionMap:
    us-east-1:
      AZ1: "us-east-1a"
    us-west-2:
      AZ1: "us-west-2a"
    eu-west-1:
      AZ1: "eu-west-1a"
    # Add more regions as needed

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: DemoVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: DemoInternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidrBlock
      AvailabilityZone: !If 
        - HasAvailabilityZone
        - !Ref AvailabilityZone
        - !FindInMap [RegionMap, !Ref "AWS::Region", AZ1]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

Conditions:
  HasAvailabilityZone: !Not [!Equals [!Ref AvailabilityZone, '']]

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
  
  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
  
  InternetGatewayId:
    Description: Internet Gateway ID
    Value: !Ref InternetGateway
  
  PublicRouteTableId:
    Description: Public Route Table ID
    Value: !Ref PublicRouteTable
  
  SubnetAvailabilityZone:
    Description: Availability Zone where the subnet was created
    Value: !GetAtt PublicSubnet.AvailabilityZone