AWSTemplateFormatVersion: '2010-09-09'
Description: 'SNS-to-SQS fanout system with filtered message routing for different metric types'

Parameters:
  Environment:
    Type: String
    Default: prod
    Description: Environment name used for resource naming
    AllowedValues:
      - dev
      - test
      - stage
      - prod
  
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Time (in seconds) that messages will be kept in SQS queues (4 days)
  
  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: The visibility timeout for the queue (in seconds)
  
  MaxReceiveCount:
    Type: Number
    Default: 5
    Description: Maximum number of times a message can be received before being sent to the DLQ

Resources:
  # SNS Topic for all metrics
  MetricsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${Environment}-metrics-topic"
      DisplayName: Metrics Topic

  # Dead Letter Queues
  AllMetricsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-all-metrics-dlq"
      MessageRetentionPeriod: !Ref MessageRetentionPeriod

  TemperatureDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-temperature-metrics-dlq"
      MessageRetentionPeriod: !Ref MessageRetentionPeriod

  HumidityDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-humidity-metrics-dlq"
      MessageRetentionPeriod: !Ref MessageRetentionPeriod

  # Main SQS Queues
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-all-metrics-queue"
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDlq.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-temperature-metrics-queue"
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDlq.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-humidity-metrics-queue"
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDlq.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  # Queue Policies
  AllMetricsSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  TemperatureSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  HumiditySqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  # SNS Subscriptions
  AllMetricsSqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
      RawMessageDelivery: true

  TemperatureSqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      RawMessageDelivery: true
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      RawMessageDelivery: true
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  MetricsTopicArn:
    Description: ARN of the SNS Topic for metrics
    Value: !Ref MetricsTopic

  AllMetricsQueueUrl:
    Description: URL of the SQS Queue for all metrics
    Value: !Ref AllMetricsSqsQueue

  AllMetricsQueueArn:
    Description: ARN of the SQS Queue for all metrics
    Value: !GetAtt AllMetricsSqsQueue.Arn

  TemperatureQueueUrl:
    Description: URL of the SQS Queue for temperature metrics
    Value: !Ref TemperatureSqsQueue

  TemperatureQueueArn:
    Description: ARN of the SQS Queue for temperature metrics
    Value: !GetAtt TemperatureSqsQueue.Arn

  HumidityQueueUrl:
    Description: URL of the SQS Queue for humidity metrics
    Value: !Ref HumiditySqsQueue

  HumidityQueueArn:
    Description: ARN of the SQS Queue for humidity metrics
    Value: !GetAtt HumiditySqsQueue.Arn