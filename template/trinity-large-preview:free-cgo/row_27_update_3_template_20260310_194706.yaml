AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for real-time data ingestion and storage pipeline using Amazon Kinesis Data Stream and Kinesis Data Firehose, delivering data to an S3 bucket.

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis Data Stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours for the Kinesis Data Stream
  S3BucketName:
    Type: String
    Default: my-kinesis-firehose-delivery-bucket
    Description: Name of the S3 bucket for Kinesis Data Firehose delivery
  S3Prefix:
    Type: String
    Default: firehose/
    Description: Prefix for objects in the S3 bucket

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-stream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub ${AWS::StackName}-firehose-delivery-stream
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        Prefix: !Ref S3Prefix
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn

  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-firehose-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Join ['', [!GetAtt S3Bucket.Arn, '/*']]

Outputs:
  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref KinesisStream
  FirehoseDeliveryStreamName:
    Description: Name of the Kinesis Data Firehose DeliveryStream
    Value: !Ref FirehoseDeliveryStream
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket