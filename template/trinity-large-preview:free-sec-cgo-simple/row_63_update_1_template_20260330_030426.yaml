AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-00000000000000000,subnet-00000000000000001
  DatabaseMasterUserPassword:
    Type: String
    NoEcho: true
    Default: 'YourSecurePassword123!'

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBClusterParameterGroupName: default.aurora-mysql5.7
      MasterUsername: admin
      MasterUserPassword: !Ref DatabaseMasterUserPassword
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      EnableCloudwatchLogsExports:
        - error
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBClusterSecurityGroup.GroupId

  DBInstance1:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      PerformanceInsightsEnabled: true
      PerformanceInsightsRetentionPeriod: 7

  DBInstance2:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      PerformanceInsightsEnabled: true
      PerformanceInsightsRetentionPeriod: 7

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Aurora Reader Endpoint
    Value: !GetAtt AuroraCluster.ReaderEndpoint.Address