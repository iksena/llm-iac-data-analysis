AWSTemplateFormatVersion: '2010-09-09'
Description: Web application with S3, DynamoDB, and EC2 integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Enter your VPC ID (e.g., vpc-1a2b3c4d)
    Default: vpc-yourvpcid
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Enter your public subnet ID (e.g., subnet-1a2b3c4d)
    Default: subnet-yoursubnetid
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Enter an existing EC2 Key Pair name
    Default: your-key-pair-name
  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
  LabFilesURL:
    Type: String
    Default: https://github.com/example/lab-files/archive/main.zip
  DataJSONURL:
    Type: String
    Default: https://example.com/data.json
  BucketName:
    Type: String
    Description: Unique S3 bucket name
    Default: webapp-sample-bucket

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceType
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceType
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              Service: [ec2.amazonaws.com]
            Action: [sts:AssumeRole]
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:*
                Resource: 
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
              - Effect: Allow
                Action: 
                  - dynamodb:*
                Resource: !GetAtt DynamoDBTable.Arn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: WebServer Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet: [!Ref InstanceSecurityGroup]
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          # Create PHP configuration
          mkdir -p /var/www/html
          cat > /var/www/html/config.php << EOF
          <?php
          define('BUCKET_NAME', '${BucketName}');
          define('REGION', '${AWS::Region}');
          define('DYNAMODB_TABLE', 'AWS-Services');
          ?>
          EOF

          # System setup
          yum update -y
          yum install -y httpd php aws-cli php-pdo php-mbstring php-xml
          systemctl start httpd && systemctl enable httpd
          
          # Install dependencies
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          cd /var/www/html && composer require aws/aws-sdk-php
          
          # Deploy application files
          curl -sSL "${LabFilesURL}" -o labfiles.zip
          unzip -qo labfiles.zip -d /var/www/html/ || { echo "Extract failed"; exit 1; }
          
          # Upload static assets
          aws s3 sync /var/www/html/static/ s3://${BucketName}/ --delete
          
          # Import DynamoDB data
          curl -sSL "${DataJSONURL}" -o /tmp/data.json
          php /var/www/html/scripts/import-data.php /tmp/data.json || echo "Data import warning"
          
          # Set permissions
          chown -R apache:apache /var/www/html
          systemctl restart httpd

Outputs:
  WebsiteURL:
    Value: !Sub "http://${WebServerInstance.PublicDnsName}"
  S3BucketName:
    Value: !Ref S3Bucket
  DynamoDBTable:
    Value: !Ref DynamoDBTable