AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/workshop-*'
        - PolicyName: ServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Admins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISLimitedAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
                Condition:
                  StringNotEquals:
                    fis:ResourceTag/Environment: prod
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/workshop-*'
        - PolicyName: ServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISExperimentActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                  - fis:Get*
                  - fis:List*
                  - fis:TagResource
                Resource: '*'
                Condition:
                  StringNotEquals:
                    fis:ResourceTag/Environment: prod
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/workshop-*'

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUsers
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: DenyFISActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: fis:*
                Resource: '*'

Outputs:
  SecurityAdminsRoleArn:
    Description: ARN of the SecurityAdmins IAM Role
    Value: !GetAtt SecurityAdminsRole.Arn
  AdminsRoleArn:
    Description: ARN of the Admins IAM Role
    Value: !GetAtt AdminsRole.Arn
  UsersRoleArn:
    Description: ARN of the Users IAM Role
    Value: !GetAtt UsersRole.Arn
  NonUsersRoleArn:
    Description: ARN of the NonUsers IAM Role
    Value: !GetAtt NonUsersRole.Arn