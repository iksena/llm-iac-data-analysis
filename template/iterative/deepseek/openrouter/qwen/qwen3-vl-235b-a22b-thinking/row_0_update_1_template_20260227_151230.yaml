AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  QueueName:
    Type: String
    Default: BasicSQSQueue
    Description: Name for the SQS queue
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
Outputs:
  QueueUrl:
    Value: !Ref SQSQueue
    Description: URL of the SQS queue