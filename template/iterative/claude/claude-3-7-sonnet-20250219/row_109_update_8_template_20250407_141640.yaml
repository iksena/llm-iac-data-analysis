AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge integration with MongoDB API endpoint'

Parameters:
  MongoDBURL:
    Type: String
    Default: 'https://www.testanu.com'
    Description: 'URL for the MongoDB API endpoint'

  ApiKeyName:
    Type: String
    Default: 'test_name'
    Description: 'Name of the API key for MongoDB authentication'

  ApiKeyValue:
    Type: String
    Default: 'test_value'
    Description: 'Value of the API key for MongoDB authentication'
    NoEcho: true

  EventBusName:
    Type: String
    Default: 'MongoDBEventBus'
    Description: 'Name of the EventBridge event bus'

Resources:
  # SQS Dead Letter Queue for failed event deliveries
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-${EventBusName}-DLQ'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30
      Tags:
        - Key: Purpose
          Value: EventBridge-MongoDB-DLQ

  # IAM Role for EventBridge to invoke the API destination and use SQS
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EventBridgeRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationsExecutionAccess
      Policies:
        - PolicyName: EventBridgeSQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  # SQS Queue Policy to allow EventBridge to send messages to the DLQ
  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn
      Queues:
        - !Ref DeadLetterQueue

  # EventBridge Event Bus
  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-${EventBusName}'
      Tags:
        - Key: Purpose
          Value: MongoDB-Integration

  # EventBridge Connection with API Key Authentication
  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub '${AWS::StackName}-MongoDB-Connection'
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: !Ref ApiKeyName
          ApiKeyValue: !Ref ApiKeyValue

  # EventBridge API Destination
  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub '${AWS::StackName}-MongoDB-ApiDestination'
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: !Ref MongoDBURL
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  # EventBridge Rule to route events to the API destination
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-MongoDB-Rule'
      Description: 'Rule to route events to MongoDB API'
      EventBusName: !Ref EventBridgeBus
      EventPattern:
        source:
          - 'com.myapplication'
        detail-type:
          - 'MongoDB Event'
      State: ENABLED
      Targets:
        - Id: MongoDBTarget
          Arn: !GetAtt EventBridgeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the EventBridge event bus'
    Value: !GetAtt EventBridgeBus.Arn

  EventBusName:
    Description: 'Name of the EventBridge event bus'
    Value: !Ref EventBridgeBus

  ApiDestinationArn:
    Description: 'ARN of the API destination'
    Value: !GetAtt EventBridgeApiDestination.Arn

  DeadLetterQueueURL:
    Description: 'URL of the dead-letter queue'
    Value: !Ref DeadLetterQueue

  DeadLetterQueueArn:
    Description: 'ARN of the dead-letter queue'
    Value: !GetAtt DeadLetterQueue.Arn

  ConnectionArn:
    Description: 'ARN of the EventBridge connection'
    Value: !GetAtt EventBridgeConnection.Arn