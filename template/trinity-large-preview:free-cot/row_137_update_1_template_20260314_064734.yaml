AWSTemplateFormatVersion: '2010-09-09'
Description: AppSync GraphQL API with Lambda backend for pet inventory service

Parameters:
  ApiKeyExpiration:
    Type: String
    Default: 7
    Description: API Key expiration in days

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PetShopLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AppSyncDataSourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PetShopAppSyncDataSourceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt LambdaFunction.Arn

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PetShopLambdaFunction
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const mockPets = [
              { id: "1", name: "Max", type: "Dog" },
              { id: "2", name: "Bella", type: "Cat" },
              { id: "3", name: "Charlie", type: "Bird" }
            ];
            return {
              statusCode: 200,
              body: JSON.stringify(mockPets)
            };
          };

  AppSyncApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      ApiKeyConfig:
        ExpiresAfter: !Ref ApiKeyExpiration

  AppSyncDataSource:
    Type: AWS::AppSync::DataSource
    DependsOn: AppSyncApi
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Name: PetShopLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncDataSourceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt LambdaFunction.Arn

  AppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    DependsOn: AppSyncApi
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

  AppSyncResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: AppSyncSchema
    Properties:
      ApiId: !GetAtt AppSyncApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt AppSyncDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "method": "POST",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

Outputs:
  ApiId:
    Description: AppSync API ID
    Value: !GetAtt AppSyncApi.ApiId
  GraphQLUrl:
    Description: AppSync GraphQL endpoint URL
    Value: !GetAtt AppSyncApi.GraphQLUrl
  ApiKey:
    Description: AppSync API Key
    Value: !GetAtt AppSyncApi.ApiKey