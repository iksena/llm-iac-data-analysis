AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Policies:
        - PolicyName: EC2IAMReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:Get*
                  - iam:List*
                Resource: '*'
      Path: /
      Tags:
        - Key: Name
          Value: EC2IAMReadOnlyRole
Outputs:
  EC2IAMReadOnlyRoleARN:
    Description: ARN of the EC2 IAM Read-Only Role
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: EC2IAMReadOnlyRoleARN