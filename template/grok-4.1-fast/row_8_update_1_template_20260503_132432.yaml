AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard with Logs Insights widgets for NAT Gateway VPC Flow Logs analysis - top source IPs by outbound traffic and rejected connections.'

Parameters:
  DashboardName:
    Type: String
    Default: 'NATGatewayFlowLogsDashboard'
    Description: 'Name of the CloudWatch Dashboard.'
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Logs group containing VPC Flow Logs (e.g., /aws/vpc/flowlogs/nat-xxxx).'

Resources:
  NATFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Outbound Bytes (ACCEPT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets\n| filter interfaceid like /eni-/\n| filter action = \"ACCEPT\"\n| stats sum(bytes) as totalBytes by srcaddr\n| sort totalBytes desc\n| limit 20",
                  "LogGroups": [
                    {
                      "LogGroupName": "${LogGroupName}",
                      "Status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Outbound Packets (ACCEPT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets\n| filter interfaceid like /eni-/\n| filter action = \"ACCEPT\"\n| stats sum(packets) as totalPackets by srcaddr\n| sort totalPackets desc\n| limit 20",
                  "LogGroups": [
                    {
                      "LogGroupName": "${LogGroupName}",
                      "Status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Rejected Bytes (REJECT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets\n| filter interfaceid like /eni-/\n| filter action = \"REJECT\"\n| stats sum(bytes) as totalBytes by srcaddr\n| sort totalBytes desc\n| limit 20",
                  "LogGroups": [
                    {
                      "LogGroupName": "${LogGroupName}",
                      "Status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Top Source IPs by Rejected Packets (REJECT)",
                "width": 12,
                "height": 6,
                "query": {
                  "Region": "${AWS::Region}",
                  "QueryString": "fields @timestamp, interfaceid, srcaddr, dstaddr, action, bytes, packets\n| filter interfaceid like /eni-/\n| filter action = \"REJECT\"\n| stats sum(packets) as totalPackets by srcaddr\n| sort totalPackets desc\n| limit 20",
                  "LogGroups": [
                    {
                      "LogGroupName": "${LogGroupName}",
                      "Status": "Relevant"
                    }
                  ]
                },
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: Name of the created CloudWatch Dashboard.
    Value: !Ref NATFlowLogsDashboard
  DashboardUrl:
    Description: URL to view the dashboard in CloudWatch console.
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name/${DashboardName}'