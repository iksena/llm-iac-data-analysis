AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure REST API Gateway integrated with Amazon SES
  for sending templated emails with validation and rate limits.

Parameters:
  FromEmailAddress:
    Type: String
    Description: The verified email address to send emails from.
    Default: "default@example.com"  # Replace with a valid default email address

Resources:
  SESInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SESInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  EmailTransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              ses = boto3.client('ses')
              body = json.loads(event['body'])
              response = ses.send_email(
                  Source=os.environ['FROM_EMAIL'],
                  Destination={'ToAddresses': [body['to']]},
                  Message={
                      'Subject': {'Data': body['subject']},
                      'Body': {
                          'Text': {'Data': body['text']},
                          'Html': {'Data': body['html']}
                      }
                  }
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps({'messageId': response['MessageId']})
              }
      Runtime: python3.12
      Timeout: 10
      Environment:
        Variables:
          FROM_EMAIL: !Ref FromEmailAddress

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailApi

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: send
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref ApiGatewayResource
      RestApiId: !Ref ApiGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt EmailTransformerFunction.Arn
      RequestValidatorId: !Ref ApiGatewayRequestValidator
      ApiKeyRequired: true

  ApiGatewayRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: Validate body
      RestApiId: !Ref ApiGatewayRestApi
      ValidateRequestBody: true

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
    DependsOn: ApiGatewayMethod

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiGatewayDeployment

  ApiGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: EmailApiUsagePlan
      ApiStages:
        - ApiId: !Ref ApiGatewayRestApi
          Stage: !Ref ApiGatewayStage
      Throttle:
        RateLimit: 500
        BurstLimit: 100
      Quota:
        Limit: 10000
        Period: MONTH

  ApiGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Enabled: true
      Name: EmailApiKey

  ApiGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiGatewayApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ApiGatewayUsagePlan

Outputs:
  ApiGatewayUrl:
    Description: "The URL of the API Gateway"
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send"
  ApiKeyId:
    Description: "The ID of the API Key"
    Value: !Ref ApiGatewayApiKey
  LambdaFunctionArn:
    Description: "The ARN of the Lambda function"
    Value: !GetAtt EmailTransformerFunction.Arn