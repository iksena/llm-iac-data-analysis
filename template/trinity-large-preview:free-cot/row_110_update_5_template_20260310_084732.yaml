AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-Account Private API Gateway with Lambda Backend

Parameters:
  VpcEndpointId:
    Type: String
    Description: VPC Endpoint ID for private API access
    Default: vpce-1234567890abcdef0
    MinLength: 1
  DomainName:
    Type: String
    Description: Custom domain name for the API
    Default: api.example.com
    MinLength: 1
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for the custom domain
    Default: arn:aws:acm:us-east-1:123456789012:certificate/1234-5678-90ab-cdef-1234567890ab
    MinLength: 1
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: prod
    AllowedPattern: ^[a-zA-Z0-9_-]+$

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Hello from private API Gateway!'})
              }
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      MemorySize: 128
      Timeout: 3
      PackageType: Zip

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt LambdaFunction.Arn

  PrivateAPIGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PrivateAPIGateway
      EndpointConfiguration:
        Types:
          - PRIVATE
        VpcEndpointIds:
          - !Ref VpcEndpointId
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: execute-api:/*

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateAPIGateway}/*/*

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PrivateAPIGateway
      ParentId: !GetAtt PrivateAPIGateway.RootResourceId
      PathPart: '{proxy+}'

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PrivateAPIGateway
      ResourceId: !Ref APIGatewayResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt LambdaFunction.Arn

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - APIGatewayMethod
    Properties:
      RestApiId: !Ref PrivateAPIGateway
      StageName: !Ref StageName

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      CertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - PRIVATE

  APIMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref CustomDomain
      RestApiId: !Ref PrivateAPIGateway
      Stage: !Ref StageName

Outputs:
  APIGatewayURL:
    Description: URL of the private API Gateway
    Value: !Sub https://${DomainName}/${StageName}
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  APIGatewayId:
    Description: ID of the API Gateway
    Value: !Ref PrivateAPIGateway