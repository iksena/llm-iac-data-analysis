AWSTemplateFormatVersion: '2010-09-09'
Description: AppSync GraphQL API with Lambda backend for pet inventory service

Parameters:
  ApiName:
    Type: String
    Default: PetShopAPI
  LambdaTimeout:
    Type: Number
    Default: 10
  LambdaMemory:
    Type: Number
    Default: 128

Resources:
  PetShopLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  PetShopLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt PetShopLambdaRole.Arn
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              pets = [
                  {"id": "1", "name": "Max", "type": "Dog"},
                  {"id": "2", "name": "Bella", "type": "Cat"},
                  {"id": "3", "name": "Charlie", "type": "Bird"}
              ]
              return {
                  "statusCode": 200,
                  "body": pets
              }

  PetShopGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Ref ApiName
      AuthenticationType: API_KEY

  PetShopApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Description: Anonymous access key
      Expires: !Select [0, !Split("-", !GetAZs '')]

  PetShopLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Name: PetShopLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaExecutionRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetShopLambdaFunction.Arn

  AppSyncLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PetShopLambdaFunction.Arn

  PetShopGraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  PetShopResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetShopLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "method": "POST",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

Outputs:
  GraphQLApiUrl:
    Description: GraphQL API URL
    Value: !GetAtt PetShopGraphQLApi.GraphQLUrl
  GraphQLApiKey:
    Description: GraphQL API Key
    Value: !GetAtt PetShopApiKey.Id