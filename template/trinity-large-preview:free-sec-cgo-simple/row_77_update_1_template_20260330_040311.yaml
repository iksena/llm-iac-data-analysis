AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for environment-specific DynamoDB tables to store supporter product data

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      BillingMode:
        Fn::If:
          - IsProdStage
          - PROVISIONED
          - PAY_PER_REQUEST
      ProvisionedThroughput:
        Fn::If:
          - IsProdStage
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: 'true'

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProdStage
    Properties:
      PolicyName: WriteCapacityAutoScaling
      PolicyType: TargetTrackingScaling
      ScalingTarget:
        MaxCapacity: 500
        MinCapacity: 5
        ResourceId: !Sub 'table/SupporterProductData-${Stage}'
        RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/DynamoDBAutoscaleRole'
        ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
        ServiceNamespace: dynamodb
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

Conditions:
  IsProdStage:
    Fn::Equals:
      - Ref: Stage
      - PROD

Outputs:
  TableName:
    Description: Name of the provisioned DynamoDB table
    Value: !Ref SupporterProductDataTable