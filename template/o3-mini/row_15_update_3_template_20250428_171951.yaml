AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a REST API using Amazon API Gateway with a Lambda non-proxy integration.

Resources:
  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "MyLambdaFunction"
      Handler: "index.handler"
      Role: "arn:aws:iam::123456789012:role/lambda-execution-role"
      Runtime: python3.8
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }

  LambdaPermissionForAPIGateway:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MyLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/*"
    Metadata:
      Comment: "Allow API Gateway to invoke Lambda, where RestApiId is assigned from MyRestApi."

  MyRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "MyNonProxyApi"
      Description: "API Gateway with Lambda non-proxy integration"

  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MyRestApi
      ResourceId: !GetAtt MyRestApi.RootResourceId
      HttpMethod: "POST"
      AuthorizationType: "NONE"
      Integration:
        Type: "AWS"
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MyLambdaFunction.Arn}/invocations"
        RequestTemplates:
          application/json: |
            {
              "statusCode": 200
            }
        IntegrationResponses:
          - StatusCode: "200"
            ResponseTemplates:
              application/json: |
                {
                  "message": "Lambda invocation succeeded"
                }
      MethodResponses:
        - StatusCode: "200"
          ResponseModels:
            application/json: "Empty"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: RootMethod
    Properties:
      RestApiId: !Ref MyRestApi
      StageName: "prod"

Outputs:
  ApiEndpoint:
    Description: "The URL of the API Gateway endpoint"
    Value: !Sub "https://${restApiId}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: ApiEndpoint
    Metadata:
      restApiId: !Ref MyRestApi
  LambdaFunctionArn:
    Description: "ARN of the Lambda function"
    Value: !GetAtt MyLambdaFunction.Arn
    Export:
      Name: LambdaFunctionArn