AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready web server environment with VPC, EC2, Apache, PHP and S3 content deployment'
Parameters:
  VpcCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: '10.0.0.0/16'
    AllowedPattern: '^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}/[0-9]{1,2}$'
    ConstraintDescription: Must be a valid CIDR range in x.x.x.x/y format
  SubnetCidr:
    Description: CIDR block for the public subnet
    Type: String
    Default: '10.0.0.0/24'
    AllowedPattern: '^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}/[0-9]{1,2}$'
    ConstraintDescription: Must be a valid CIDR range in x.x.x.x/y format
  S3BucketName:
    Description: Name of the S3 bucket containing the website content ZIP file
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '[a-z0-9][a-z0-9\\-]{1,61}[a-z0-9]'
    ConstraintDescription: Must be a valid S3 bucket name (lowercase, 3-63 characters)
  S3ObjectKey:
    Description: Path to the ZIP file in S3 bucket (e.g., web-content.zip)
    Type: String
    MinLength: 1
    ConstraintDescription: Cannot be empty

Resources:
  WebServerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebServerVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebServerIGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref WebServerVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebServerVPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebServerVPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server
      VpcId: !Ref WebServerVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: WebSecurityGroup

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/${S3ObjectKey}'
      Tags:
        - Key: Name
          Value: WebServerInstanceRole

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: SubnetRouteTableAssociation
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          yum update -y
          yum install -y httpd php unzip aws-cli
          systemctl start httpd
          systemctl enable httpd
          aws s3 cp s3://${S3BucketName}/${S3ObjectKey} /tmp/content.zip || { echo "Failed to download content"; exit 1; }
          unzip -o /tmp/content.zip -d /var/www/html || { echo "Failed to unzip content"; exit 1; }
          chown -R apache:apache /var/www/html
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: WebServerInstance

Outputs:
  WebsiteURL:
    Description: URL to access the deployed website
    Value: !Sub 'http://${WebServerInstance.PublicDnsName}'
  InstancePublicIp:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp