AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Config Automated Deployment with Customizable Retention Policies'

Parameters:
  S3BucketName:
    Type: String
    Default: !Sub 'config-bucket-${AWS::AccountId}-${AWS::Region}'
    Description: 'S3 bucket name for storing configuration snapshots'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
  SNSTopicName:
    Type: String
    Default: !Sub 'config-notifications-${AWS::Region}'
    Description: 'SNS topic name for notifications'
    AllowedPattern: '^[a-zA-Z0-9-_]+$'
  RetentionPeriodDays:
    Type: Number
    Default: 2557
    Description: 'Retention period in days for configuration snapshots'
    MinValue: 1
    MaxValue: 7305
  DeliveryFrequency:
    Type: String
    Default: TwentyFour_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
    Description: 'Frequency of configuration snapshot delivery'
  IAMPermissionBoundary:
    Type: String
    Default: ''
    Description: 'Optional IAM permission boundary ARN'

Resources:
  # S3 Bucket for Config Snapshots
  ConfigS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  # SNS Topic for Notifications
  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  # IAM Role for AWS Config
  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AWSConfigRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - config.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref IAMPermissionBoundary, !Ref AWS::NoValue]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSConfigRole
      Policies:
        - PolicyName: ConfigS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketAcl
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource:
                  - !Sub 'arn:aws:s3:::${ConfigS3Bucket}'
                  - !Sub 'arn:aws:s3:::${ConfigS3Bucket}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ConfigSNSTopic

  # Lambda Function for Retention Management
  RetentionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ConfigRetentionManager-${AWS::Region}'
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 30
      Role: !GetAtt RetentionLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              s3 = boto3.client('s3')
              retention_days = int(event['ResourceProperties']['RetentionPeriodDays'])

              try:
                  bucket_name = event['ResourceProperties']['S3BucketName']
                  s3.put_bucket_retention(
                      Bucket=bucket_name,
                      RetentionPeriodInDays=retention_days,
                      BypassGovernanceRetention=True
                  )
                  return {
                      'Status': 'SUCCESS',
                      'Data': {'Message': 'Retention period updated successfully'}
                  }
              except ClientError as e:
                  return {
                      'Status': 'FAILED',
                      'Data': {'Error': str(e)}
                  }

  # IAM Role for Lambda Function
  RetentionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ConfigRetentionLambdaRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref IAMPermissionBoundary, !Ref AWS::NoValue]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3RetentionManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketEncryption
                  - s3:PutBucketVersioning
                Resource: !Sub 'arn:aws:s3:::${ConfigS3Bucket}'

  # Custom Resource for Retention Management
  RetentionManager:
    Type: Custom::RetentionManager
    Properties:
      ServiceToken: !GetAtt RetentionLambdaFunction.Arn
      S3BucketName: !Ref ConfigS3Bucket
      RetentionPeriodDays: !Ref RetentionPeriodDays

  # AWS Config Recorder
  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true
      RoleARN: !GetAtt ConfigRole.Arn

  # AWS Config Delivery Channel
  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      name: default
      s3BucketName: !Ref ConfigS3Bucket
      snsTopicARN: !Ref ConfigSNSTopic
      configSnapshotDeliveryProperties:
        deliveryFrequency: !Ref DeliveryFrequency
    DependsOn: ConfigRecorder

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref IAMPermissionBoundary, '']]

Outputs:
  S3BucketName:
    Description: S3 bucket for Config snapshots
    Value: !Ref ConfigS3Bucket
  SNSTopicARN:
    Description: SNS topic for Config notifications
    Value: !Ref ConfigSNSTopic
  ConfigRecorderName:
    Description: AWS Config recorder name
    Value: !Ref ConfigRecorder
  LambdaFunctionName:
    Description: Lambda function for retention management
    Value: !Ref RetentionLambdaFunction