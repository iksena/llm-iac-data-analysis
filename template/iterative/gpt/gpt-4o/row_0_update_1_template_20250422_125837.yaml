AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS SQS queue with basic configuration.

Resources:
  BasicSQSQueue:
    Type: AWS::SQS::Queue
    Properties: {}

Outputs:
  QueueURL:
    Description: The URL of the created SQS queue
    Value: !Ref BasicSQSQueue

  QueueARN:
    Description: The ARN of the created SQS queue
    Value: !GetAtt BasicSQSQueue.Arn