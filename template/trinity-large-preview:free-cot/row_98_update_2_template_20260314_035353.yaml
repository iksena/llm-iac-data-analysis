AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify Web Application with CodeCommit Repository for TodoApp

Parameters:
  RepositoryName:
    Type: String
    Default: TodoApp-Repository
    Description: Name of the CodeCommit repository
  BranchName:
    Type: String
    Default: production
    Description: Branch name for automatic deployment
  ServiceRoleName:
    Type: String
    Default: AmplifyServiceRole
    Description: Name of the IAM service role for Amplify

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref ServiceRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeCommitReadOnly
        - arn:aws:iam::aws:policy/AWSAmplifyConsoleFullAccess

  TodoAppRepository:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      RepositoryDescription: Repository for TodoApp source code

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      Description: Amplify web application for TodoApp
      Repository: !GetAtt TodoAppRepository.CloneUrlHttp
      OauthToken: ""
      Platform: WEB
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn
      AutoBranchCreationConfig:
        Stage: PRODUCTION
        Framework: null
        EnableAutoBuild: true
        BuildSpec: amplify.yml
        EnableAutoBranchCreation: false

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      Description: Production branch for TodoApp
      Framework: null
      Stage: PRODUCTION
      EnableAutoBuild: true
      BuildSpec: amplify.yml
      EnableAutoBranchCreation: false

Outputs:
  AmplifyAppUrl:
    Description: URL of the Amplify web application
    Value: !GetAtt AmplifyApp.DefaultDomain
  RepositoryCloneUrlHttp:
    Description: HTTP clone URL of the CodeCommit repository
    Value: !GetAtt TodoAppRepository.CloneUrlHttp
  RepositoryCloneUrlSsh:
    Description: SSH clone URL of the CodeCommit repository
    Value: !GetAtt TodoAppRepository.CloneUrlSsh