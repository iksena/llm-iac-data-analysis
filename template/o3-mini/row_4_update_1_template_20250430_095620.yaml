AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation Template to create an EC2 Instance running the latest Amazon Linux 2 AMI.

Parameters:
  InstanceType:
    Description: EC2 Instance Type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.
  KeyName:
    Description: (Optional) Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
    Default: ""
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EC2 instance allowing SSH access.
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs}}"
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: 
        Fn::If:
          - HasKeyName
          - !Ref KeyName
          - !Ref "AWS::NoValue"
Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Outputs:
  InstanceId:
    Description: The Instance ID of the EC2 instance.
    Value: !Ref EC2Instance
  InstancePublicIP:
    Description: The public IP address of the EC2 instance.
    Value: !GetAtt EC2Instance.PublicIp