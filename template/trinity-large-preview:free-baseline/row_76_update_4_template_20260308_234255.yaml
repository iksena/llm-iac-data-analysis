AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles with Tiered Permissions for FIS Access Control

Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:CreateServiceLinkedRole
                Resource: '*'
        - PolicyName: ServiceLinkedRoleCreation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Admins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISAdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/environment: 'prod'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                  - iam:CreateServiceLinkedRole
                Resource: '*'
        - PolicyName: ServiceLinkedRoleCreation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISUserAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                  - fis:Get*
                  - fis:List*
                  - fis:TagResource
                  - fis:UntagResource
                Resource: '*'
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/environment: 'prod'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUsers
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: fis:*
                Resource: '*'