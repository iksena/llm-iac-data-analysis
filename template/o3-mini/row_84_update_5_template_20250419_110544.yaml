AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to enable an AWS Macie session using a Custom Resource,
  which leverages a Lambda function to call the Macie2 API UpdateMacieSession. This allows
  automated sensitive data discovery and security monitoring across AWS accounts.

Parameters:
  FindingPublishingFrequency:
    Description: "The finding publishing frequency for the Macie session. Valid values: FIFTEEN_MINUTES, ONE_HOUR, SIX_HOURS."
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
  MacieStatus:
    Description: "The status for the Macie session. Valid values: ENABLED, PAUSED."
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED

Resources:
  MacieLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "MacieSessionLambdaExecutionRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MacieSessionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - macie2:UpdateMacieSession
                  - macie2:EnableMacie
                Resource: "*"

  MacieSessionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "MacieSessionHandler-${AWS::StackName}"
      Handler: index.lambda_handler
      Role: !GetAtt MacieLambdaExecutionRole.Arn
      Runtime: python3.8
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import traceback

          # cfnresponse module code (simplified inline version)
          SUCCESS = "SUCCESS"
          FAILED = "FAILED"

          def send_response(event, context, response_status, response_data, physical_resource_id=None):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              import urllib.request
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type' : '',
                  'content-length' : str(len(json_response_body))
              }
              try:
                  req = urllib.request.Request(response_url, data=json_response_body.encode('utf-8'), headers=headers, method='PUT')
                  urllib.request.urlopen(req)
              except Exception as e:
                  print("Failed to send response: " + str(e))

          def lambda_handler(event, context):
              print("Received event: " + json.dumps(event))
              client = boto3.client('macie2')
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      params = event.get('ResourceProperties', {})
                      finding_frequency = params.get('FindingPublishingFrequency', 'FIFTEEN_MINUTES')
                      macie_status = params.get('MacieStatus', 'ENABLED')
                      # Enable Macie first (if needed)
                      try:
                          client.enable_macie()
                      except Exception as enable_error:
                          print("enable_macie might already be enabled or not required: " + str(enable_error))
                      # Update Macie session with provided parameters
                      client.update_macie_session(
                          findingPublishingFrequency=finding_frequency,
                          status=macie_status
                      )
                      send_response(event, context, SUCCESS, {"Message": "Macie session updated"})
                  elif event['RequestType'] == 'Delete':
                      # Optionally, you may choose to pause Macie when the stack is deleted.
                      client.update_macie_session(
                          findingPublishingFrequency="SIX_HOURS",
                          status="PAUSED"
                      )
                      send_response(event, context, SUCCESS, {"Message": "Macie session paused on delete"})
              except Exception as e:
                  print("Exception: " + str(e))
                  print(traceback.format_exc())
                  send_response(event, context, FAILED, {"Message": str(e)})

  MacieSessionCustomResource:
    Type: Custom::MacieSession
    Properties:
      ServiceToken: !GetAtt MacieSessionFunction.Arn
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      MacieStatus: !Ref MacieStatus

Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Lambda function handling the Macie session custom resource."
    Value: !GetAtt MacieSessionFunction.Arn
  CustomResourceStatus:
    Description: "Status message from the Macie session custom resource."
    Value: "Submitted (Check CloudWatch logs for details)"