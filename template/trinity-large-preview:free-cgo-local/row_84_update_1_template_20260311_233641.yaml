AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Macie session for automated sensitive data discovery and security monitoring

Resources:
  MacieSession:
    Type: AWS::Macie::MacieSession
    Properties:
      IsEnabled: true
      AdminAccount: !Ref AdminAccountId
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  MacieSessionArn:
    Description: ARN of the created Macie session
    Value: !GetAtt MacieSession.Arn
  MacieSessionStatus:
    Description: Current status of the Macie session
    Value: !GetAtt MacieSession.Status

Parameters:
  AdminAccountId:
    Type: String
    Description: AWS Account ID that will serve as the Macie administrator account
    Default: '123456789012'
    AllowedPattern: '^\d{12}$'