AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ProductionResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: Production-Resources-Group
      Description: Production resources group EC2 RDS SageMaker SSM
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::Document
            - AWS::SSM::ManagedInstanceInventory
          TagFilters:
            - Key: Environment
              Values:
                - Production
Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ProductionResourceGroup.Arn
  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ProductionResourceGroup