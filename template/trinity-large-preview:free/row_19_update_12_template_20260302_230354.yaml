AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge configuration for routing custom events to an external API endpoint via HTTPS.

Parameters:
  APIKey:
    Type: String
    Description: API key for authentication to the external API endpoint
    NoEcho: true
    Default: ''
  EndpointURL:
    Type: String
    Description: The URL of the external API endpoint
    Default: https://webhook.site/testtest

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: x-api-key
          ApiKeyValue: !Ref APIKey
      Description: Connection to external API using API key

  APIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: !Ref EndpointURL
      HttpMethod: POST
      Name: ExternalAPIDestination
      InvocationRateLimitPerSecond: 5

Outputs:
  EventBusArn:
    Description: The ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn
  APIDestinationArn:
    Description: The ARN of the created API Destination
    Value: !GetAtt APIDestination.Arn