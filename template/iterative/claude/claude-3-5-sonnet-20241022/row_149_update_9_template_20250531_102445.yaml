AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS file system with EC2 integration across AZs and monitoring'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS and EC2 instances will be deployed

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for EFS mount target and EC2

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for EFS mount target and EC2

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

  Environment:
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production
    Description: Environment name for resource tagging

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0e731c8a588258d0d
    us-east-2:
      AMI: ami-0c20d88b0021158c6
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac

Resources:
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'
        - Key: Environment
          Value: !Ref Environment

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref Ec2SecurityGroup

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: MountTarget1
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet1
          GroupSet: 
            - !Ref Ec2SecurityGroup
      UserData: 
        Fn::Base64: 
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /home
            echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home efs _netdev,tls 0 0" >> /etc/fstab
            mount -a
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance1'

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet2
          GroupSet: 
            - !Ref Ec2SecurityGroup
      UserData: 
        Fn::Base64: 
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /home
            echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home efs _netdev,tls 0 0" >> /etc/fstab
            mount -a
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance2'

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EFS burst credits are low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      ActionsEnabled: true
      TreatMissingData: missing
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  EfsStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EFS storage usage is high
      MetricName: StorageBytes
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      ActionsEnabled: true
      TreatMissingData: missing
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem

  FileSystemDns:
    Description: EFS File System DNS Name
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'

  Instance1Id:
    Description: First EC2 Instance ID
    Value: !Ref EC2Instance1

  Instance2Id:
    Description: Second EC2 Instance ID
    Value: !Ref EC2Instance2

  MountTarget1Id:
    Description: First Mount Target ID
    Value: !Ref MountTarget1

  MountTarget2Id:
    Description: Second Mount Target ID
    Value: !Ref MountTarget2

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcId
          - PublicSubnet1
          - PublicSubnet2
      - Label:
          default: "Instance Configuration"
        Parameters:
          - InstanceType
          - Environment
    ParameterLabels:
      VpcId:
        default: "Which VPC should this be deployed to?"
      PublicSubnet1:
        default: "Which public subnet in the first AZ?"
      PublicSubnet2:
        default: "Which public subnet in the second AZ?"
      InstanceType:
        default: "EC2 Instance Type"
      Environment:
        default: "Environment"