AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB Streams to EventBridge integration using EventBridge Pipes'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: OrdersTable
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9_.-]+'
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge custom event bus
    Default: OrdersEventBus
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '[a-zA-Z0-9_.-]+'

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSEventBridgePipesFullAccess
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt EventBus.Arn

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: 
      - PipeRole
      - DynamoDBTable
      - EventBus
    Properties:
      Name: !Sub ${TableName}-insert-pipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
          FilterCriteria:
            Filters:
              - Pattern: '{"eventName": ["INSERT"]}'
      Target: !GetAtt EventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: OrderInserted
          Source: orders.system

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: 
      - PipeRole
      - DynamoDBTable
      - EventBus
    Properties:
      Name: !Sub ${TableName}-modify-pipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
          FilterCriteria:
            Filters:
              - Pattern: '{"eventName": ["MODIFY"]}'
      Target: !GetAtt EventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: OrderModified
          Source: orders.system

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn

  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn

  EventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !GetAtt EventBus.Arn

  InsertPipeArn:
    Description: Insert Events Pipe ARN
    Value: !Ref InsertEventPipe

  ModifyPipeArn:
    Description: Modify Events Pipe ARN
    Value: !Ref ModifyEventPipe