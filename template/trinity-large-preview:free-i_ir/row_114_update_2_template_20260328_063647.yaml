AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Resources:
  B2BIPartnerProfile:
    Type: AWS::B2BI::PartnerProfile
    Properties:
      Name: BusinessPartner
      BusinessContact:
        Name: John Doe
        Email: john.doe@example.com
        Phone: "+1-555-0123"
      Status: ACTIVE

  EDITransformer:
    Type: AWS::B2BI::Transformer
    Properties:
      Name: X12_214_to_JSON
      Status: ACTIVE
      # MappingLogic, InputFormat, OutputFormat are not valid properties
      # These would need to be defined in the actual transformation logic
      # or through a separate configuration mechanism

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: edi-x12-214-input
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: edi-x12-214-output
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  B2BIPipeline:
    Type: AWS::B2BI::Pipeline
    Properties:
      Name: EDI-X12-214-Transformer
      Description: Pipeline for transforming EDI X12_214 documents to JSON
      PartnerProfile: !Ref B2BIPartnerProfile
      Transformer: !Ref EDITransformer
      InputBucket: !Ref InputBucket
      OutputBucket: !Ref OutputBucket
    DependsOn:
      - B2BIPartnerProfile
      - EDITransformer
      - InputBucket
      - OutputBucket

Outputs:
  InputBucketName:
    Description: Name of the input S3 bucket for EDI files
    Value: !Ref InputBucket
  OutputBucketName:
    Description: Name of the output S3 bucket for transformed JSON
    Value: !Ref OutputBucket