AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForAmplify
      Policies:
        - PolicyName: AmplifyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                  - codebuild:*
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - cloudformation:Describe*
                  - cloudformation:Get*
                  - cloudformation:List*
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - iam:PassRole
                Resource:
                  - !Sub 'arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:app/*'
                  - !Sub 'arn:${AWS::Partition}:codebuild:${AWS::Region}:${AWS::AccountId}:project/*'
                  - !Sub 'arn:${AWS::Partition}:s3:::codepipeline-${AWS::Region}-*'
                  - !Sub 'arn:${AWS::Partition}:s3:::elasticbeanstalk-*'
                  - !Sub 'arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/amplify-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'
                  - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/AWSCodeDeploy*'

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      OauthToken: '{{resolve:secretsmanager:GitHubOAuthToken}}'
      Repository: https://github.com/yourusername/TodoApp.git
      Platform: WEB
      IAMServiceRole: !GetAtt AmplifyRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      Stage: PRODUCTION
      Framework: react
      BuildSpec: |
        version: 0.2
        phases:
          build:
            commands:
              - npm install
              - npm run build
      EnablePullRequestPreview: false

Outputs:
  AppId:
    Description: Amplify Application ID
    Value: !Ref AmplifyApp
  DefaultDomain:
    Description: Default domain for the Amplify application
    Value: !GetAtt AmplifyApp.DefaultDomain