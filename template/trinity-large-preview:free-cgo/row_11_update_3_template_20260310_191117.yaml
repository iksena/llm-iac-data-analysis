AWSTemplateFormatVersion: '2010-09-09'
Resources:
  NotificationReportingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Notifications
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
        - AttributeName: ttl
          AttributeType: N
      GlobalSecondaryIndexes:
        - IndexName: type-sentTime-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref NotificationReportingTable
  StreamArn:
    Description: DynamoDB stream ARN
    Value: !GetAtt NotificationReportingTable.StreamArn