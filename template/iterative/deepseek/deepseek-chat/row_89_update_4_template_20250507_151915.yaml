AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to enable AWS Security Hub with default security standards'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      AutoEnableControls: true

Outputs:
  SecurityHubStatus:
    Description: 'Security Hub enabled status'
    Value: !Ref SecurityHub
  DefaultStandardsEnabled:
    Description: 'Whether default standards are enabled'
    Value: !GetAtt SecurityHub.EnableDefaultStandards