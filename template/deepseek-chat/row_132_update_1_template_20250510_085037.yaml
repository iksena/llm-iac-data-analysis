AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Batch environment for containerized batch jobs with S3 integration

Parameters:
  VpcCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
  SubnetCidr:
    Description: CIDR block for the subnet
    Type: String
    Default: 10.0.0.0/24
  InstanceType:
    Description: EC2 instance type for Batch compute environment
    Type: String
    Default: m5.large
    AllowedValues:
      - m5.large
      - m5.xlarge
      - m5.2xlarge
  DockerImage:
    Description: Docker image for the Batch job definition
    Type: String
    Default: amazonlinux
  S3BucketName:
    Description: Name for the S3 bucket (must be globally unique)
    Type: String

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: BatchVPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: BatchSubnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: BatchIGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: BatchRouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled

  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 8
        DesiredvCpus: 0
        InstanceTypes:
          - !Ref InstanceType
        Subnets:
          - !Ref Subnet
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        InstanceRole: !GetAtt EC2InstanceProfile.Arn
      State: ENABLED

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  JobQueue:
    Type: AWS::Batch::JobQueue
    DependsOn: ComputeEnvironment
    Properties:
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment

  JobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref DockerImage
        Vcpus: 1
        Memory: 1024
        Command:
          - "bash"
          - "-c"
          - |
            yum install -y awscli
            aws s3 cp s3://${!Ref DataBucket}/input.txt /tmp/input.txt
            aws s3 cp /tmp/input.txt s3://${!Ref DataBucket}/output.txt
        Volumes:
          - Host:
              SourcePath: /tmp
            Name: tmp
        MountPoints:
          - ContainerPath: /tmp
            ReadOnly: false
            SourceVolume: tmp
      RetryStrategy:
        Attempts: 3

Outputs:
  JobQueueARN:
    Description: ARN of the created Job Queue
    Value: !Ref JobQueue
  ComputeEnvironmentARN:
    Description: ARN of the Compute Environment
    Value: !Ref ComputeEnvironment
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref DataBucket