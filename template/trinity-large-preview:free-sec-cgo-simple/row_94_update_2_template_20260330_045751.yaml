AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LatestAmiId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      Type: String
      Value: ''

  AmiLookup:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              try:
                  response = ssm.get_parameter(Name='/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2')
                  ami_id = response['Parameter']['Value']
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'AmiId': ami_id})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  AmiLookupCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt AmiLookup.Arn

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !GetAtt AmiLookupCustomResource.AmazonLinux2Ami
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Multi-step SSM Automation for OS updates, Nginx installation, and validation
        mainSteps:
          - name: UpdateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo shutdown -r now
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum install -y nginx
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/ || exit 1

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      ScheduleExpression: 'rate(1 day)'

Outputs:
  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  S3BucketEndpoint:
    Description: HTTPS endpoint of the S3 bucket
    Value: !Sub 'https://${S3Bucket}.s3.amazonaws.com'