AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Timestream database and four tables with configurable retention policies.

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Sub 'timestream-db-poc-${AWS::StackName}'

  PocTable01BatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 7

  PocTable02OlderRecordsMemonly:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 168
        MagneticStoreRetentionPeriodInDays: 1

  PocTable03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 0
        MagneticStoreRetentionPeriodInDays: 365

  PocTable04CommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 72
        MagneticStoreRetentionPeriodInDays: 30

Outputs:
  DatabaseName:
    Description: The name of the Timestream database
    Value: !Ref TimestreamDatabase

  Table01BatchWrite:
    Description: The name of the first Timestream table
    Value: !Ref PocTable01BatchWrite

  Table02OlderRecordsMemonly:
    Description: The name of the second Timestream table
    Value: !Ref PocTable02OlderRecordsMemonly

  Table03OlderRecordsMagnetic:
    Description: The name of the third Timestream table
    Value: !Ref PocTable03OlderRecordsMagnetic

  Table04CommonAttributes:
    Description: The name of the fourth Timestream table
    Value: !Ref PocTable04CommonAttributes