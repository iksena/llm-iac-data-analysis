AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with S3 Bucket and IAM Role

Parameters:
  S3BucketName:
    Type: String
    Default: emr-serverless-scripts-data
    Description: Name of the S3 bucket for storing scripts and data

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  - !Sub arn:aws:s3:::${S3BucketName}/*

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: emr-serverless-spark-app
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      InitialCapacity:
        - WorkerCount: 1
          WorkerType: "EMR_SERVERLESS_Default"
      MaximumAllowedResources:
        VCPU: 16
        Memory: 64
      Architecture: ARM64
      ImageConfiguration:
        ImageUri: "public.ecr.aws/lambda/python:3.12"

Outputs:
  EMRServerlessApplicationArn:
    Description: ARN of the EMR Serverless Application
    Value: !GetAtt EMRServerlessApplication.Arn
  EMRServerlessBucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref EMRServerlessBucket