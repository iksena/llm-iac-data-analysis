AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 500
    Description: Number of shards for the Kinesis stream (1-500)
  ThresholdPercentage:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: Percentage of shard capacity to trigger alarms (1-100)
  AlarmPeriod:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 86400
    Description: Alarm evaluation period in seconds (multiple of 60)
  AlarmEvaluationPeriods:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 5
    Description: Number of periods before alarm triggers
  StreamName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[a-zA-Z0-9_.-]{1,128}$'
    Description: Optional custom name for the Kinesis stream (leave empty for auto-generated)
Conditions:
  StreamNameSpecified: !Not [!Equals [!Ref StreamName, '']]
Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !If [StreamNameSpecified, !Ref StreamName, !Ref AWS::NoValue]
      ShardCount: !Ref ShardCount
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-KinesisAlerts'
  WriteBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-WriteBytes-Exceeded'
      AlarmDescription: Write throughput (bytes) exceeded threshold
      Namespace: AWS/Kinesis
      MetricName: IncomingBytes
      Dimensions:
        - Name: StreamName
          Value: !GetAtt KinesisStream.Name
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Sub
        - !Join ['', ['{{resolve:math:', !Ref ShardCount, '* 1000000 * (', !Ref ThresholdPercentage, ' / 100) * ', !Ref AlarmPeriod, '}}']]
        - {}
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      OKActions:
        - !Ref SNSTopic
      AlarmActions:
        - !Ref SNSTopic
  WriteRecordsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-WriteRecords-Exceeded'
      AlarmDescription: Write throughput (records) exceeded threshold
      Namespace: AWS/Kinesis
      MetricName: IncomingRecords
      Dimensions:
        - Name: StreamName
          Value: !GetAtt KinesisStream.Name
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Sub
        - !Join ['', ['{{resolve:math:', !Ref ShardCount, ' * 1000 * (', !Ref ThresholdPercentage, ' / 100) * ', !Ref AlarmPeriod, '}}']]
        - {}
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      OKActions:
        - !Ref SNSTopic
      AlarmActions:
        - !Ref SNSTopic
  ReadBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ReadBytes-Exceeded'
      AlarmDescription: Read throughput (bytes) exceeded threshold
      Namespace: AWS/Kinesis
      MetricName: OutgoingBytes
      Dimensions:
        - Name: StreamName
          Value: !GetAtt KinesisStream.Name
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Sub
        - !Join ['', ['{{resolve:math:', !Ref ShardCount, ' * 2000000 * (', !Ref ThresholdPercentage, ' / 100) * ', !Ref AlarmPeriod, '}}']]
        - {}
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      OKActions:
        - !Ref SNSTopic
      AlarmActions:
        - !Ref SNSTopic
  ReadRecordsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ReadRecords-Exceeded'
      AlarmDescription: Read throughput (records) exceeded threshold
      Namespace: AWS/Kinesis
      MetricName: OutgoingRecords
      Dimensions:
        - Name: StreamName
          Value: !GetAtt KinesisStream.Name
      Statistic: Sum
      Period: !Ref AlarmPeriod
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Sub
        - !Join ['', ['{{resolve:math:', !Ref ShardCount, ' * 1000 * (', !Ref ThresholdPercentage, ' / 100) * ', !Ref AlarmPeriod, '}}']]
        - {}
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      OKActions:
        - !Ref SNSTopic
      AlarmActions:
        - !Ref SNSTopic
Outputs:
  StreamName:
    Description: Name of the Kinesis data stream
    Value: !GetAtt KinesisStream.Name
  StreamARN:
    Description: ARN of the Kinesis data stream
    Value: !Ref KinesisStream
  SNSTopicARN:
    Description: ARN of the SNS topic for alarms
    Value: !Ref SNSTopic
  WriteBytesAlarmName:
    Description: Name of the write bytes throughput alarm
    Value: !Ref WriteBytesAlarm
  WriteRecordsAlarmName:
    Description: Name of the write records throughput alarm
    Value: !Ref WriteRecordsAlarm
  ReadBytesAlarmName:
    Description: Name of the read bytes throughput alarm
    Value: !Ref ReadBytesAlarm
  ReadRecordsAlarmName:
    Description: Name of the read records throughput alarm
    Value: !Ref ReadRecordsAlarm