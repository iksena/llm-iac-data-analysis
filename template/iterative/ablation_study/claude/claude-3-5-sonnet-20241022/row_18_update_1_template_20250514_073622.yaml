AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB Streams to EventBridge integration via Pipes'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: UserTable
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge bus
    Default: UserEventBus
    
  EventSource:
    Type: String
    Description: Source identifier for events
    Default: com.user.profile
    
  EventDetailType:
    Type: String
    Description: Detail type for events
    Default: UserAvatarChange

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole

  PipeDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PipeDynamoDBAccess
      Roles: 
        - !Ref PipeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource: !GetAtt DynamoDBTable.StreamArn

  PipeEventBridgePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PipeEventBridgeAccess
      Roles: 
        - !Ref PipeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource: !GetAtt EventBus.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-dynamo-to-eventbridge
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
        FilterCriteria:
          Filters:
            - Pattern: '{"dynamodb":{"NewImage":{"avatarUrl":{"S":[{"suffix":".png"}]}}}}'
      Target: !GetAtt EventBus.Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: !Ref EventDetailType
          Source: !Ref EventSource

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn
    
  TableStreamArn:
    Description: DynamoDB Table Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
    
  EventBusArn:
    Description: EventBridge Bus ARN
    Value: !GetAtt EventBus.Arn
    
  PipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn