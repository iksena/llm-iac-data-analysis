AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AutomationRoleName:
    Type: String
    Default: CentralAutomationRole
    Description: Name of the IAM role for cross-service automation workflows
  SsmParameterPath:
    Type: String
    Default: '/'
    Description: SSM Parameter Store path to grant access to (e.g., '/central/automation/'). Must start and end with a slash.
Resources:
  AutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref AutomationRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CentralAutomationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAutomationExecution
                  - ssm:SendCommand
                  - ssm:GetAutomationExecution
                  - ssm:ListCommands
                  - ssm:GetCommandInvocation
                  - ssm:DescribeInstanceInformation
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPath}*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeTags
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*/log-stream:*'
Outputs:
  AutomationRoleArn:
    Description: ARN of the IAM role for cross-service automation workflows
    Value: !GetAtt AutomationRole.Arn