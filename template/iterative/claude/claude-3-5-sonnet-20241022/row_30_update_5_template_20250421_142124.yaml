AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with Multi-AZ EC2 instances and monitoring'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: 
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
    
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of existing EC2 KeyPair

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: efs-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref Ec2SecurityGroup

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  MountTarget1:
    Type: AWS::EFS::MountTarget
    DependsOn: AttachGateway
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    DependsOn: AttachGateway
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2Role

  WaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: 
      - EC2Instance1
      - EC2Instance2
    Properties:
      Handle: !Ref WaitHandle
      Timeout: '900'
      Count: 2

  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-0aa7d40eeae50c9a9
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs -o tls ${EfsFileSystem}:/ /mnt/efs; do
            echo "Attempting to mount EFS..."
            sleep 10
          done
          /opt/aws/bin/cfn-signal -e $? -d "EFS mounted successfully" '${WaitHandle}'

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-0aa7d40eeae50c9a9
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          until mount -t efs -o tls ${EfsFileSystem}:/ /mnt/efs; do
            echo "Attempting to mount EFS..."
            sleep 10
          done
          /opt/aws/bin/cfn-signal -e $? -d "EFS mounted successfully" '${WaitHandle}'

  EfsAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Monitoring-Alerts

  EfsIoAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EFS I/O utilization exceeds 95%
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 95
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      AlarmActions:
        - !Ref EfsAlarmTopic

Outputs:
  EfsDnsName:
    Description: EFS DNS Name
    Value: !Sub ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com

  EC2Instance1Id:
    Description: Instance 1 ID
    Value: !Ref EC2Instance1

  EC2Instance2Id:
    Description: Instance 2 ID
    Value: !Ref EC2Instance2

  EfsFileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem

  EfsAlarmTopicArn:
    Description: SNS Topic ARN for EFS Alarms
    Value: !Ref EfsAlarmTopic