AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with tag-driven SSM automation for OS updates and Nginx installation

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
    Description: VPC ID where the instance will be launched
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
    Description: Subnet ID where the instance will be launched

Resources:
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2SSMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      Tags:
        - Key: nginx
          Value: Yes
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  SSMNginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Install and validate Nginx on EC2 instances
        parameters:
          InstanceId:
            type: String
            description: (Required) The instance IDs where the automation will run
        mainSteps:
          - name: updateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo reboot
          - name: installNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo amazon-linux-extras install -y nginx1
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: validateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/ || echo "Nginx validation failed"

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp