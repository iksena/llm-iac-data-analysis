

AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard with VPC Flow Logs Insights widgets for NAT Gateway monitoring'

Parameters:
  LogGroupName:
    Type: String
    Description: 'VPC Flow Logs Group Name'
    Default: '/aws/vpc/flowlogs'
  
  DashboardName:
    Type: String
    Description: 'Name for the CloudWatch Dashboard'
    Default: 'NATGatewayMonitoring'

Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | fields @timestamp, sourceAddress, destinationAddress, action\n| filter interfaceId like 'eni-' and action='ACCEPT' and protocol=6\n| stats count(*) as requestCount by sourceAddress\n| sort requestCount desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top 10 Source IPs through NAT Gateway",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | fields @timestamp, sourceAddress, destinationAddress, action\n| filter interfaceId like 'eni-' and action='ACCEPT' and protocol=6\n| stats count(*) as requestCount by destinationAddress\n| sort requestCount desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top 10 Destination IPs through NAT Gateway",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | fields @timestamp, sourceAddress, destinationAddress, action\n| filter interfaceId like 'eni-' and action='REJECT'\n| stats count(*) as rejectCount by sourceAddress, destinationAddress, action\n| sort rejectCount desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Rejected Traffic Patterns",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | fields @timestamp, bytes\n| filter interfaceId like 'eni-' and action='ACCEPT'\n| stats sum(bytes) as totalBytes by bin(1h)",
                "region": "${AWS::Region}",
                "title": "Traffic Volume Over Time",
                "view": "line"
              }
            }
          ]
        }

Outputs:
  DashboardARN:
    Description: 'ARN of the created CloudWatch Dashboard'
    Value: !Sub 'arn:aws:cloudwatch::${AWS::AccountId}:dashboard/${DashboardName}'
  
  DashboardURL:
    Description: 'URL to access the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'