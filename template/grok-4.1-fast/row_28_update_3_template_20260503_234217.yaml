AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update) via EventBridge->SNS. Access events logged to CloudTrail S3 bucket.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique S3 bucket name for CloudTrail logs (lowercase only).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: '3-63 lowercase letters/numbers/hyphens; start/end alphanum.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '^[a-zA-Z0-9-_./]{3,128}$'
    Default: 'SecretsManagerMonitoringTrail'
  SNSTopicName:
    Type: String
    Description: 'Name of the SNS topic.'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-_]{1,256}$'
    Default: 'SecretsManagerAlerts'

Resources:
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
    DependsOn: CloudTrailBucket

  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Ref CloudTrailTrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - IncludeManagementEvents: true
          ReadWriteType: All
          DataEvents:
            - DataResourceType: AWS::SecretsManager::Secret
              Values:
                - '*'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring
    DependsOn: CloudTrailBucketPolicy

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Sub '${SNSTopicName} - Secrets Manager Alerts'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-SecretsManagerEvents'
      Description: 'Alerts on Secrets Manager management events (create/update/describe) via CloudTrail. Data events (GetSecretValue/PutSecretValue) in S3 logs.'
      State: ENABLED
      EventPattern:
        source:
          - aws.secretsmanager
        'detail-type':
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - DescribeSecret
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

Outputs:
  SNSTopicArn:
    Description: 'SNS topic ARN. Subscribe your endpoints (email/Lambda) for real-time alerts.'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  EventBridgeRuleArn:
    Description: 'EventBridge rule ARN monitoring Secrets Manager events.'
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudTrailTrailName:
    Description: 'CloudTrail trail name (management + data events for SecretsManager).'
    Value: !Ref CloudTrailTrailName
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailTrailName'

  CloudTrailBucketName:
    Description: 'S3 bucket for CloudTrail logs (query data events like GetSecretValue with Athena).'
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailBucketName'