AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-platform automation using EventBridge Scheduler and Systems Manager'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where instances will be launched
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for EC2 instances
    
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Key pair for EC2 instances
    
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium

Mappings:
  RegionMap:
    us-east-1:
      Linux: ami-0261755bbcb8c4a84
      Windows: ami-0d3055bd54ca2f52d
    us-west-2:
      Linux: ami-0c65adc9a5c1b5d7c
      Windows: ami-0d26dbd2f0bc18f4f

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: 
                  - !Sub ${LogBucket.Arn}/*
                  - !Sub ${LogBucket.Arn}

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                  - ssm:UpdateAssociationStatus
                  - ssm:GetAssociation
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/*

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  LinuxInstance:
    Type: AWS::EC2::Instance
    DependsOn: EC2InstanceProfile
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', Linux]
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds: 
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyPairName
      Tags:
        - Key: Name
          Value: Linux-HelloWorld
        - Key: HelloWorld
          Value: 'true'

  WindowsInstance:
    Type: AWS::EC2::Instance
    DependsOn: EC2InstanceProfile
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', Windows]
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds: 
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyPairName
      Tags:
        - Key: Name
          Value: Windows-HelloWorld
        - Key: HelloWorld
          Value: 'true'

  HelloWorldSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Cross-platform Hello World command'
        parameters: {}
        mainSteps:
          - action: aws:runPowerShellScript
            name: WindowsHello
            precondition:
              StringEquals:
                - platformType
                - Windows
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
                - '$timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"'
                - 'Write-Host "Executed at: $timestamp"'
          - action: aws:runShellScript
            name: LinuxHello
            precondition:
              StringEquals:
                - platformType
                - Linux
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
                - 'echo "Executed at: $(date)"'

  SSMAssociation:
    Type: AWS::SSM::Association
    DependsOn: 
      - LinuxInstance
      - WindowsInstance
      - HelloWorldSSMDocument
    Properties:
      Name: !Ref HelloWorldSSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-outputs/
      AssociationName: HelloWorldAssociation
      WaitForSuccessTimeoutSeconds: 300

  HelloWorldSchedule:
    Type: AWS::Scheduler::Schedule
    DependsOn: SSMAssociation
    Properties:
      FlexibleTimeWindow:
        Mode: 'OFF'
      ScheduleExpression: 'rate(15 minutes)'
      Target:
        RoleArn: !GetAtt SchedulerRole.Arn
        Arn: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}
        Input: '{}'
      State: ENABLED

Outputs:
  LinuxInstanceId:
    Description: ID of Linux Instance
    Value: !Ref LinuxInstance

  WindowsInstanceId:
    Description: ID of Windows Instance
    Value: !Ref WindowsInstance

  LogBucketName:
    Description: Name of S3 bucket for logs
    Value: !Ref LogBucket

  ScheduleArn:
    Description: ARN of EventBridge Schedule
    Value: !GetAtt HelloWorldSchedule.Arn

  SSMAssociationId:
    Description: ID of SSM Association
    Value: !Ref SSMAssociation