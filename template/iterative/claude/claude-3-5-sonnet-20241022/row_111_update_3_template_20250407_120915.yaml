AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with DataDog for centralized log forwarding'

Parameters:
  DataDogApiKey:
    Type: String
    NoEcho: true
    Description: DataDog API Key for authentication
    MinLength: 1
  
  DataDogEndpoint:
    Type: String
    Default: 'https://http-intake.logs.datadoghq.com/api/v2/logs'
    Description: DataDog Log Intake API Endpoint
  
  SourceName:
    Type: String
    Default: 'MyDataDogApp'
    Description: Source name for the events

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'DD-API-KEY'
          ApiKeyValue: !Ref DataDogApiKey
      Description: 'Connection to DataDog API'

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref DataDogEndpoint
      InvocationRateLimitPerSecond: 300

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Forward logs to DataDog'
      EventPattern:
        source:
          - !Ref SourceName
      State: ENABLED
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Id: DataDogTarget
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 86400
            MaximumRetryAttempts: 3

Outputs:
  DeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref DeadLetterQueue

  EventRuleArn:
    Description: ARN of the Event Rule
    Value: !GetAtt EventRule.Arn

  DataDogConnectionArn:
    Description: ARN of the DataDog Connection
    Value: !GetAtt DataDogConnection.Arn