AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with Monitoring, Backups, and Performance Safeguards'

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be created
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for EFS mount targets
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: EFS throughput mode
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 0
    Description: Provisioned throughput in MiB/s (required if ThroughputMode is provisioned)
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups
  BackupEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable automated backups

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps:
        Fn::If:
          - ProvisionedThroughputProvided
          - !Ref ProvisionedThroughputInMibps
          - !Ref AWS::NoValue
      BackupPolicy:
        Status: !Ref BackupEnabled

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SecurityGroups:
        - !Ref EFSSecurityGroup
      SubnetId: !Select [0, !Ref SubnetIds]

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SecurityGroups:
        - !Ref EFSSecurityGroup
      SubnetId: !Select [1, !Ref SubnetIds]

  IOBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-IOBytesAlarm'
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: BurstCreditBalance
      Namespace: AWS/EBS
      Period: 300
      Statistic: Average
      Threshold: 1000000000
      AlarmActions:
        - !Ref AlarmTopic

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-BurstCreditAlarm'
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 1000000000
      AlarmActions:
        - !Ref AlarmTopic

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-ThroughputAlarm'
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub '${AWS::StackName}-BackupVault'

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-BackupPlan'
        Rules:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

Conditions:
  ProvisionedThroughputProvided:
    Fn::And:
      - Fn::Equals:
          - !Ref ThroughputMode
          - provisioned
      - Fn::Not:
          - Fn::Equals:
              - !Ref ProvisionedThroughputInMibps
              - 0

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !Sub '${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com'
  SecurityGroupIds:
    Description: EFS Security Group IDs
    Value: !Join [',', [!Ref EFSSecurityGroup]]
  AlarmTopicArn:
    Description: SNS Topic ARN for Alarms
    Value: !Ref AlarmTopic