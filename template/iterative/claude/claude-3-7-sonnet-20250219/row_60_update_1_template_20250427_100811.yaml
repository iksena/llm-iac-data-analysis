AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an AWS KMS Key with an Alias'

Parameters:
  KeyDescription:
    Type: String
    Default: 'KMS key for centralized encryption management'
    Description: Description for the KMS key
  
  KeyAliasName:
    Type: String
    Default: 'alias/centralized-encryption-key'
    Description: Alias name for the KMS key (must start with 'alias/')
    AllowedPattern: 'alias/[a-zA-Z0-9/_-]+'
    ConstraintDescription: 'Alias must start with alias/ followed by alphanumeric characters, /, _, or -'
  
  EnableKeyRotation:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable automatic key rotation (yearly)
  
  DeletionWindowInDays:
    Type: Number
    Default: 30
    MinValue: 7
    MaxValue: 30
    Description: Number of days before the key is deleted (between 7-30 days)

Resources:
  KMSKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: !Ref KeyDescription
      EnableKeyRotation: !Ref EnableKeyRotation
      PendingWindowInDays: !Ref DeletionWindowInDays
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-policy'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: 'Allow administration of the key'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:Create*'
              - 'kms:Describe*'
              - 'kms:Enable*'
              - 'kms:List*'
              - 'kms:Put*'
              - 'kms:Update*'
              - 'kms:Revoke*'
              - 'kms:Disable*'
              - 'kms:Get*'
              - 'kms:Delete*'
              - 'kms:TagResource'
              - 'kms:UntagResource'
              - 'kms:ScheduleKeyDeletion'
              - 'kms:CancelKeyDeletion'
            Resource: '*'
          - Sid: 'Allow use of the key'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
      Tags:
        - Key: Name
          Value: 'Centralized Encryption Key'
        - Key: Environment
          Value: 'Production'
        - Key: ManagedBy
          Value: 'CloudFormation'

  KMSKeyAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: !Ref KeyAliasName
      TargetKeyId: !Ref KMSKey

Outputs:
  KMSKeyId:
    Description: 'KMS Key ID'
    Value: !Ref KMSKey
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyId'
  
  KMSKeyArn:
    Description: 'KMS Key ARN'
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyArn'
  
  KMSKeyAliasArn:
    Description: 'KMS Key Alias ARN'
    Value: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${KeyAliasName}'
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyAliasArn'