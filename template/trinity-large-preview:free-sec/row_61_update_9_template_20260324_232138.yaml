AWSTemplateFormatVersion: '2010-09-09'

Resources:
  InternalDNSHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      HostedZoneConfig:
        Comment: Private Hosted Zone for internal DNS management
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000

Outputs:
  HostedZoneID:
    Description: ID of the created Hosted Zone
    Value: !Ref InternalDNSHostedZone
    Export:
      Name: InternalDNSHostedZoneID