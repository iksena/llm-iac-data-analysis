AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Integration - Security Enhanced

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: Name of the S3 bucket for website hosting
  SlotMachineLambdaName:
    Type: String
    Default: SlotMachineLambda
    Description: Name of the slot machine Lambda function
  CustomResourceLambdaName:
    Type: String
    Default: CustomResourceLambda
    Description: Name of the custom resource Lambda function
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool
  FrontendZipUrl:
    Type: String
    Default: https://example.com/slot-machine-frontend.zip
    Description: URL to download the pre-built frontend ZIP file

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref WebsiteBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: s3-access-logs/

  AccessLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${WebsiteBucketName}-access-logs'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'

  SlotMachineLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DLQPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt LambdaDLQueue.Arn

  LambdaDLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SlotMachineLambdaDLQ

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref SlotMachineLambdaName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SlotMachineLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import random
          import os

          def handler(event, context):
              symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎']
              result = [random.choice(symbols) for _ in range(3)]
              win = result[0] == result[1] == result[2]
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'win': win,
                      'message': 'Jackpot!' if win else 'Try again!'
                  })
              }
      ReservedConcurrentExecutions: 10
      DeadLetterConfig:
        TargetArn: !GetAtt LambdaDLQueue.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: false

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UnauthenticatedUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: UnauthenticatedUserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  CustomResourceLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CustomResourceLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn
        - PolicyName: DLQPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt CustomResourceDLQueue.Arn

  CustomResourceDLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CustomResourceLambdaDLQ

  CustomResourceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref CustomResourceLambdaName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CustomResourceLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import zipfile
          import os
          import cfnresponse
          import io

          def handler(event, context):
              s3 = boto3.client('s3')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      frontend_zip_url = os.environ['FRONTEND_ZIP_URL']
                      bucket_name = os.environ['WEBSITE_BUCKET_NAME']
                      region = os.environ['AWS_REGION']
                      identity_pool_id = os.environ['COGNITO_IDENTITY_POOL_ID']

                      # Download frontend ZIP
                      response = s3.get_object(Bucket='source-bucket', Key='slot-machine-frontend.zip')
                      zip_data = response['Body'].read()

                      # Extract and modify files
                      with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                          for file_name in z.namelist():
                              with z.open(file_name) as f:
                                  content = f.read().decode('utf-8')
                                  # Inject configuration (example)
                                  content = content.replace('{{REGION}}', region)
                                  content = content.replace('{{IDENTITY_POOL_ID}}', identity_pool_id)
                                  s3.put_object(Bucket=bucket_name, Key=file_name, Body=content)

                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'error': str(e)})
      ReservedConcurrentExecutions: 5
      DeadLetterConfig:
        TargetArn: !GetAtt CustomResourceDLQueue.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet

  CustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt CustomResourceLambda.Arn
      FrontendZipUrl: !Ref FrontendZipUrl
      WebsiteBucketName: !Ref WebsiteBucketName
      CognitoIdentityPoolId: !Ref CognitoIdentityPool

Outputs:
  WebsiteURL:
    Description: URL of the website
    Value: !GetAtt WebsiteBucket.WebsiteURL
  WebsiteDomainName:
    Description: Domain name of the website
    Value: !GetAtt WebsiteBucket.RegionalDomainName