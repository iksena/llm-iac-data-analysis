AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-account private API Gateway with Lambda integration and VPC endpoint access'

Parameters:
  VpcEndpointId:
    Type: String
    Description: 'VPC Endpoint ID for API access restriction'
    AllowedPattern: '^vpce-[a-z0-9]{17}$'

  CustomDomainName:
    Type: String
    Description: 'Custom domain name for the API'
    AllowedPattern: '^[a-zA-Z0-9][a-zA-Z0-9.-]+[a-zA-Z0-9]$'

  CertificateArn:
    Type: String
    Description: 'ARN of ACM certificate for custom domain'

  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID'

  StageName:
    Type: String
    Default: 'prod'
    Description: 'Stage name for API deployment'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt BackendFunction.Arn

  BackendFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({
                message: 'Hello from private API',
                timestamp: new Date().toISOString()
              })
            };
          };
      Runtime: nodejs18.x
      Timeout: 29
      MemorySize: 128

  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-private-api'
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: execute-api:/*
            Condition:
              StringEquals:
                aws:SourceVpce: !Ref VpcEndpointId

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: 'api'
      RestApiId: !Ref PrivateApi

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !Ref ApiResource
      RestApiId: !Ref PrivateApi
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BackendFunction.Arn}/invocations'
        Credentials: !GetAtt ApiGatewayRole.Arn

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref PrivateApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref PrivateApi
      StageName: !Ref StageName

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*/api'

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref PrivateApi
      Stage: !Ref StageName

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Description: 'Private API Gateway endpoint URL'
    Value: !Sub 'https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api'

  CustomDomainUrl:
    Description: 'Custom Domain URL'
    Value: !Sub 'https://${CustomDomainName}/api'

  LambdaArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt BackendFunction.Arn