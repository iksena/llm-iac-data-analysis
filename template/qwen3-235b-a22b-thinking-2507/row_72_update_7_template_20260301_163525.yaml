AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure web-based VS Code environment using code-server on EC2 with CloudFront'
Parameters:
  CodeServerVersion:
    Type: String
    Default: '4.87.1'
    Description: 'Version of code-server to install'
    AllowedPattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
    ConstraintDescription: 'Must be in format X.X.X'
  InstanceType:
    Type: String
    Default: 't3.medium'
    Description: 'EC2 instance type for the development environment'
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CodeServer-VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CodeServer-IGW
  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: CodeServer-PublicSubnet
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CodeServer-PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for code-server instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourcePrefixListId: 'pl-7ca54014'
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: CodeServer-SG
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: CodeServer-InstanceRole
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: PublicSubnetRouteTableAssociation
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceRole
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - '#!/bin/bash\n'
              - 'set -e\n'
              - 'apt-get update\n'
              - 'apt-get install -y curl\n'
              - 'curl -fL https://github.com/coder/code-server/releases/download/v'
              - !Ref CodeServerVersion
              - '/code-server-'
              - !Ref CodeServerVersion
              - '-linux-amd64.tar.gz -o /tmp/code-server.tar.gz\n'
              - 'tar -xzvf /tmp/code-server.tar.gz -C /tmp\n'
              - 'mv /tmp/code-server-'
              - !Ref CodeServerVersion
              - '-linux-amd64 /usr/local/bin/code-server\n'
              - 'cat <<EOF > /etc/systemd/system/code-server.service\n'
              - '[Unit]\n'
              - 'Description=code-server\n'
              - 'After=network.target\n'
              - '[Service]\n'
              - 'User=root\n'
              - 'WorkingDirectory=/root\n'
              - 'ExecStart=/usr/local/bin/code-server --bind-addr 0.0.0.0:8080 --auth none\n'
              - 'Restart=always\n'
              - 'RestartSec=5\n'
              - '[Install]\n'
              - 'WantedBy=multi-user.target\n'
              - 'EOF\n'
              - 'systemctl daemon-reload\n'
              - 'systemctl enable code-server\n'
              - 'systemctl start code-server\n'
      Tags:
        - Key: Name
          Value: CodeServer-Instance
  CodeServerCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CodeServer-OneYearTTL
        Comment: Cache policy with 1-year TTL for static assets
        MinTTL: 31536000
        MaxTTL: 31536000
        DefaultTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: EC2Origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CodeServerCachePolicy
        DefaultRootObject: /
        Comment: CloudFront for code-server
Outputs:
  CloudFrontURL:
    Description: URL of the CloudFront distribution
    Value: !Sub 'https://${WebDistribution.DomainName}'
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  SSMCommand:
    Description: Command to start SSM session
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'