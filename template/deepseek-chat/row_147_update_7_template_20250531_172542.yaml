AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application

Parameters:
  SourceCodeBucket:
    Description: S3 bucket containing the frontend ZIP file
    Type: String
  SourceCodeKey:
    Description: Key for the frontend ZIP file in source bucket
    Type: String

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'slot-machine-website-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucket}/*'

  SlotMachineLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineProcessor
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt SlotMachineLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const symbols = ['cherry', 'lemon', 'orange', 'plum', 'bell', 'bar'];
              const reels = [
                  symbols[Math.floor(Math.random() * symbols.length)],
                  symbols[Math.floor(Math.random() * symbols.length)],
                  symbols[Math.floor(Math.random() * symbols.length)]
              ];
              
              let winAmount = 0;
              if (reels[0] === reels[1] && reels[1] === reels[2]) {
                  winAmount = 10;
              }
              
              return {
                  statusCode: 200,
                  headers: {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*'
                  },
                  body: JSON.stringify({
                      reels: reels,
                      winAmount: winAmount
                  })
              };
          };

  DeploymentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DeploymentLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${SourceCodeBucket}/${SourceCodeKey}'
                  - !Sub 'arn:aws:s3:::${WebsiteBucket}/*'
                  - !Sub 'arn:aws:s3:::${WebsiteBucket}'

  DeploymentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WebsiteDeployer
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt DeploymentLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          WEBSITE_BUCKET: !Ref WebsiteBucket
          SOURCE_CODE_BUCKET: !Ref SourceCodeBucket
          SOURCE_CODE_KEY: !Ref SourceCodeKey
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const s3 = new AWS.S3();
          
          exports.handler = async (event) => {
              try {
                  const source = await s3.getObject({
                      Bucket: process.env.SOURCE_CODE_BUCKET,
                      Key: process.env.SOURCE_CODE_KEY
                  }).promise();
                  
                  await s3.putObject({
                      Bucket: process.env.WEBSITE_BUCKET,
                      Key: 'index.html',
                      Body: source.Body,
                      ContentType: 'text/html',
                      ACL: 'public-read'
                  }).promise();
                  
                  return { status: 'SUCCESS' };
              } catch (err) {
                  console.error(err);
                  throw err;
              }
          };

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true
      IdentityPoolName: !Sub 'SlotMachineIdentityPool-${AWS::StackName}'

  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeSlotMachineLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  CognitoIdentityPoolRoles:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

Outputs:
  WebsiteURL:
    Description: URL of the website
    Value: !Sub 'http://${WebsiteBucket}.s3-website-${AWS::Region}.amazonaws.com'
  SlotMachineLambdaARN:
    Description: ARN of the Slot Machine Lambda function
    Value: !GetAtt SlotMachineLambda.Arn
  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref CognitoIdentityPool