AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Apache HTTP Server deployed via cfn-init and cfn-signal

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        config:
          packages:
            yum:
              httpd: []
          services:
            sysvinit:
              httpd:
                enabled: true
                ensureRunning: true
          files:
            /var/www/html/index.html:
              content: |
                <html>
                  <body>
                    <h1>CloudFormation EC2 Instance with Apache</h1>
                    <p>Deployed successfully via cfn-init</p>
                  </body>
                </html>
              mode: '000644'
              owner: root
              group: root
          commands:
            createSamplePage:
              command: echo "Sample page created by cfn-init" >> /var/www/html/index.html
    Properties:
      InstanceType: !Ref InstanceType
      ImageId:
        Fn::ImportValue: !Sub 'LatestAmiId'
      KeyName: !Ref KeyPair
      SecurityGroups:
        - !Ref InstanceSecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash -xe
          yum update -y
          yum install -y aws-cfn-bootstrap
          /opt/aws/bin/cfn-init -v --stack !Ref AWS::StackName --resource EC2Instance --region !Ref AWS::Region
          /opt/aws/bin/cfn-signal -e $? --stack !Ref AWS::StackName --resource EC2Instance --region !Ref AWS::Region
      Tags:
        - Key: Name
          Value: CloudFormation-EC2-Apache
    CreationPolicy:
      ResourceSignal:
        Timeout: PT5M

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Apache HTTP Server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: CloudFormation-EC2-SG

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: cfn-hup-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackEvents
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  PublicDNS:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName