AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Security Hub template to enable default standards and consolidated control findings

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true
      ControlFindingGenerator: STANDARD_CONTROL

Outputs:
  SecurityHubId:
    Description: Security Hub ID
    Value: !Ref SecurityHub