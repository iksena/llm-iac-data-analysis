AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: Name of the ECS cluster to be created
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '^[0-9a-zA-Z_-]+$'
  ContainerInsights:
    Type: String
    Default: disabled
    Description: Enable or disable Container Insights monitoring for the cluster
    AllowedValues:
      - enabled
      - disabled
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref ContainerInsights
Outputs:
  ECSClusterName:
    Description: Name of the created ECS cluster
    Value: !Ref ECSCluster
  ECSClusterArn:
    Description: ARN of the created ECS cluster
    Value: !GetAtt ECSCluster.Arn