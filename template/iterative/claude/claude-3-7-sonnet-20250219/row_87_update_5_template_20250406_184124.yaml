AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an S3 bucket for Lambda artifacts and a KMS key for encryption'

Parameters:
  BucketNameSuffix:
    Type: String
    Description: Suffix for the S3 bucket name (will be appended to a unique prefix)
    Default: lambda-artifacts
    AllowedPattern: '[a-z0-9][a-z0-9.-]*'
    ConstraintDescription: Must contain only lowercase letters, numbers, periods, and hyphens.
    
  KeyAliasName:
    Type: String
    Description: Name for the KMS key alias (without the alias/ prefix)
    Default: lambda-artifacts-key
    
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the KMS key (leave empty if not needed)
    Default: ''

Conditions:
  HasServiceRole: !Not [!Equals [!Ref ServiceRoleArn, '']]

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join 
        - '-'
        - - !Ref 'AWS::AccountId'
          - !Ref 'BucketNameSuffix'
          - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      Tags:
        - Key: Purpose
          Value: LambdaArtifacts

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: LambdaArtifactsBucket
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${LambdaArtifactsBucket}/*'

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting Lambda artifacts
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowCloudFormationServiceToUseTheKey
            Effect: Allow
            Principal:
              Service: 'cloudformation.amazonaws.com'
            Action:
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
          - Sid: AllowS3ServiceToUseTheKey
            Effect: Allow
            Principal:
              Service: 's3.amazonaws.com'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
          - !If
            - HasServiceRole
            - Sid: AllowServiceRoleToUseTheKey
              Effect: Allow
              Principal:
                AWS: !Ref ServiceRoleArn
              Action:
                - 'kms:Encrypt'
                - 'kms:Decrypt'
                - 'kms:ReEncrypt*'
                - 'kms:GenerateDataKey*'
                - 'kms:DescribeKey'
              Resource: '*'
            - !Ref AWS::NoValue
      Tags:
        - Key: Purpose
          Value: LambdaArtifactsEncryption

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${KeyAliasName}'
      TargetKeyId: !Ref KMSKey

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
    
  S3BucketArn:
    Description: ARN of the S3 bucket for Lambda artifacts
    Value: !GetAtt LambdaArtifactsBucket.Arn
    
  S3BucketURL:
    Description: URL of the S3 bucket for Lambda artifacts
    Value: !Sub 'https://${LambdaArtifactsBucket}.s3.amazonaws.com'
    
  KMSKeyId:
    Description: ID of the KMS key
    Value: !Ref KMSKey
    
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt KMSKey.Arn
    
  KMSKeyAlias:
    Description: Alias of the KMS key
    Value: !Sub 'alias/${KeyAliasName}'