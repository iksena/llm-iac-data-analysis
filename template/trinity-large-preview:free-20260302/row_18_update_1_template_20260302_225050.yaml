AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an integration between DynamoDB streams and Amazon EventBridge.

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyDynamoDBTable
    Description: The name of the DynamoDB table
  EventBridgeBusName:
    Type: String
    Default: my-event-bus
    Description: The name of the EventBridge bus
  FilterPattern:
    Type: String
    Default: '{ $.avatarUrl LIKE "\*.png" }'
    Description: The filter pattern for the EventBridge Pipe

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBridgeBusName

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: MyDynamoDBToEventBridgePipe
      Source:
        Type: DynamoDBStreams
        Parameters:
          EventSourceArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Type: EventBridgeEventBus
        Parameters:
          DetailType: UserAvatarUpdated
          EventBusName: !Ref EventBridgeBusName
          Source: com.example.user.avatar
      Enrichment:
        Type: Filter
        Parameters:
          FilterPattern: !Ref FilterPattern

Outputs:
  DynamoDBTableName:
    Description: The name of the DynamoDB table
    Value: !Ref DynamoDBTableName
  EventBridgeBusName:
    Description: The name of the EventBridge bus
    Value: !Ref EventBridgeBusName
  EventBridgePipeName:
    Description: The name of the EventBridge pipe
    Value: !Ref EventBridgePipe