AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a secure REST API Gateway integrated with DynamoDB for managing music data.

Parameters:
  ApiGatewayStageName:
    Type: String
    Default: prod
    Description: The stage name for the API Gateway deployment.

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi
      Description: REST API for managing music data

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem
          - credentials: !Sub arn:aws:iam::${AWS::AccountId}:role/${ApiGatewayRole}
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "Artist": {
                  "S": "$input.path('$.artist')"
                },
                "Album": {
                  "S": "$input.path('$.album')"
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query
          - credentials: !Sub arn:aws:iam::${AWS::AccountId}:role/${ApiGatewayRole}
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": {
                  "S": "$input.params('artist')"
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayRole.Arn

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicApiKey
      Description: API key for Music API
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: MusicUsagePlan
      Description: Usage plan for Music API
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref ApiGatewayStageName
      Throttle:
        RateLimit: 100
        BurstLimit: 10

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId: !Ref MusicApi
      StageName: !Ref ApiGatewayStageName

Outputs:
  ApiUrl:
    Description: The URL of the deployed API
    Value: !Sub https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStageName}/music
  ApiKey:
    Description: The API key for accessing the API
    Value: !Ref ApiKey