AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for managing AWS Security Hub controls with Lambda

Parameters:
  ControlsToDisable:
    Type: CommaDelimitedList
    Description: List of Security Hub control IDs to disable (e.g., CIS.1.1,FSBP.EC2.1)
    Default: ''
  
  LogRetentionDays:
    Type: Number
    Description: Number of days to retain CloudWatch logs
    Default: 30
    MinValue: 1
    MaxValue: 3653
  
  PermissionsBoundaryARN:
    Type: String
    Description: ARN of IAM permissions boundary (optional)
    Default: ''
  
  EnableCISControls:
    Type: String
    Description: Enable CIS Benchmark controls
    Default: 'true'
    AllowedValues: ['true', 'false']
  
  EnableAWSFoundationalControls:
    Type: String
    Description: Enable AWS Foundational Security Best Practices controls
    Default: 'true'
    AllowedValues: ['true', 'false']

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryARN, '']]

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryARN, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: SecurityHubControlManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateStandardsControl
                  - securityhub:DescribeStandardsControls
                  - securityhub:GetEnabledStandards
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/SecurityHubControlsManager:*'
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubControlsManager
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          import json
          
          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')
              controls_to_disable = os.getenv('CONTROLS_TO_DISABLE', '').split(',')
              enable_cis = os.getenv('ENABLE_CIS', 'true').lower() == 'true'
              enable_aws_foundational = os.getenv('ENABLE_AWS_FOUNDATIONAL', 'true').lower() == 'true'
              
              standards = []
              if enable_cis:
                  standards.append('cis-aws-foundations-benchmark/v/1.2.0')
              if enable_aws_foundational:
                  standards.append('aws-foundational-security-best-practices/v/1.0.0')
              
              for standard in standards:
                  try:
                      controls = securityhub.describe_standards_controls(
                          StandardsSubscriptionArn=f'arn:aws:securityhub:{os.environ["AWS_DEFAULT_REGION"]}:{os.environ["ACCOUNT_ID"]}:subscription/{standard}'
                      )['Controls']
                      
                      for control in controls:
                          control_id = control['ControlId']
                          if control_id in controls_to_disable:
                              securityhub.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='DISABLED',
                                  DisabledReason='Disabled via CloudFormation template'
                              )
                          else:
                              securityhub.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='ENABLED'
                              )
                  except Exception as e:
                      print(f'Error processing standard {standard}: {str(e)}')
              
              return {
                  'statusCode': 200,
                  'body': json.dumps('Security Hub controls updated successfully')
              }
      Environment:
        Variables:
          CONTROLS_TO_DISABLE: !Join [',', !Ref ControlsToDisable]
          ENABLE_CIS: !Ref EnableCISControls
          ENABLE_AWS_FOUNDATIONAL: !Ref EnableAWSFoundationalControls
          ACCOUNT_ID: !Ref 'AWS::AccountId'
          AWS_DEFAULT_REGION: !Ref 'AWS::Region'
      Timeout: 300

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/aws/lambda/SecurityHubControlsManager'
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  LambdaFunctionARN:
    Description: ARN of the Security Hub Controls Lambda function
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionARN'

  SecurityHubControlsModified:
    Description: List of Security Hub controls that were modified
    Value: !Join [',', !Ref ControlsToDisable]