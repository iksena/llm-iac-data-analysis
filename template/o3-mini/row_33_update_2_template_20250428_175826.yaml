AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create two IAM roles for EC2 instances that allow read-only access 
  to IAM metadata. Both roles trust the EC2 service and have an attached managed policy 
  granting permissions for iam:Get* and iam:List* actions on all IAM resources.

Resources:
  IAMReadOnlyManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: IAMReadOnlyAccessForEC2
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: "*"

  EC2IAMRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2IAMReadOnlyRole1
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref IAMReadOnlyManagedPolicy

  EC2IAMRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2IAMReadOnlyRole2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref IAMReadOnlyManagedPolicy

Outputs:
  EC2IAMRole1ARN:
    Description: ARN of the first EC2 IAM Role
    Value: !GetAtt EC2IAMRole1.Arn

  EC2IAMRole2ARN:
    Description: ARN of the second EC2 IAM Role
    Value: !GetAtt EC2IAMRole2.Arn