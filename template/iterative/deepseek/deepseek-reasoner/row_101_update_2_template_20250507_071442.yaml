AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketNamePrefix:
    Type: String
    Default: vpc-flow-logs
    Description: Prefix for S3 bucket name (will be suffixed with account-region)
  TrafficType:
    Type: String
    Default: ALL
    AllowedValues: [ALL, ACCEPT, REJECT]
  LogFilePrefix:
    Type: String
    Default: ""
    Description: Optional prefix for log file organization
  KMSKeyArn:
    Type: String
    Default: ""
    Description: ARN of KMS CMK for encryption (leave blank for AES-256)
    NoEcho: true

Conditions:
  UseCMKEncryption: !Not [!Equals [!Ref KMSKeyArn, ""]]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: !If [UseCMKEncryption, aws:kms, AES256]
              KMSMasterKeyID: !If [UseCMKEncryption, !Ref KMSKeyArn, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSSL
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource: 
              - !GetAtt FlowLogsBucket.Arn
              - !Sub "${FlowLogsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"
          - Sid: AllowLogDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${FlowLogsBucket.Arn}/${LogFilePrefix}*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3WriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub "${FlowLogsBucket.Arn}/${LogFilePrefix}*"
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !If [UseCMKEncryption, !Ref KMSKeyArn, !Ref AWS::NoValue]
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn
      LogDestination: !Sub "s3://${FlowLogsBucket}/${LogFilePrefix}"
      LogDestinationType: s3
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: !Ref TrafficType
      LogFormat: "version account-id interface-id srcaddr dstaddr srcport dstport protocol packets bytes start end action log-status"

Outputs:
  FlowLogsBucketName:
    Value: !Ref FlowLogsBucket
    Description: Name of the created flow logs bucket