AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for CloudWatch Dashboard and Logs Insights Queries monitoring AWS Client VPN usage: connections, durations, data transfer, users, auth breakdowns (AD/SAML/Mutual). Queries organized in ClientVPN/Usage folder.'

Parameters:
  LogGroupName:
    Type: String
    Description: 'CloudWatch Log Group name for Client VPN logs (e.g., /aws/vpn/control)'
    MinLength: '1'
  DashboardName:
    Type: String
    Default: 'ClientVPN-Monitoring-Dashboard'
    Description: 'Name of the CloudWatch Dashboard'

Resources:
  ByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByEndpoint'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          count() as Connections,
          avg(duration) as AvgDurationSec,
          sum(duration)/3600 as ConnHours,
          sum(bytesReceived)/1073741824.0 as IngressGB,
          sum(bytesSent)/1073741824.0 as EgressGB,
          count_distinct(username) as DistinctUsers
        by endpointId
        | sort Connections desc
        | limit 50

  AuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByAuth'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, toLower(reason) as reason_lower
        | filter event = "connect"
        | stats count() as Authentications
        by bin(1h),
          case(
            reason_lower like /saml/, "SAML",
            reason_lower like /active directory/, "AD",
            reason_lower like /certificate/, "Mutual Auth",
            "Mixed/Other"
          )
        | sort @timestamp desc
        | limit 20

  TopUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/TopUsers'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          count() as Sessions,
          avg(duration) as AvgDurationSec,
          sum(bytesReceived + bytesSent)/1073741824.0 as TotalGB
        by username, endpointId
        | sort Sessions desc
        | limit 20

  DataTrendsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/DataTrends'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          sum(bytesReceived)/1073741824.0 as IngressGB,
          sum(bytesSent)/1073741824.0 as EgressGB,
          sum(duration)/3600 as ConnHours
        by bin(1h)
        | sort @timestamp desc
        | limit 100

  ClientVpnDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "width": 24,
              "height": 3,
              "properties": {
                "markdown": "# AWS Client VPN Usage Monitoring Dashboard\n\n**Metrics:** Connection durations, data transfer (ingress/egress GB), user activity, auth breakdowns (SAML/AD/Mutual/Mixed).\\n**Endpoints/Users/Timeseries** views below."
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 9,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${ByEndpointQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Endpoint Usage: Connections, Avg Duration (sec), Conn Hours, Ingress/Egress GB, Distinct Users"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${AuthBreakdownQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Auth Breakdown: SAML/AD/Mutual/Mixed (Authentications per Hour)"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${TopUsersQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Top Users: Sessions, Avg Duration (sec), Total Data GB (per Endpoint)"
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 7,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${DataTrendsQuery.QueryDefinitionId}"
                },
                "view": "timeSeries",
                "title": "Hourly Trends: Ingress/Egress GB, Connection Hours"
              }
            }
          ]
        }
      Tags:
        - Key: Purpose
          Value: ClientVPN-Monitoring
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  DashboardName:
    Description: 'Name of the created CloudWatch Dashboard'
    Value: !Ref ClientVpnDashboard
  DashboardUrl:
    Description: 'Console URL for the Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  ByEndpointQueryId:
    Description: 'QueryDefinitionId for Endpoint-Specific Usage'
    Value: !GetAtt ByEndpointQuery.QueryDefinitionId
  AuthBreakdownQueryId:
    Description: 'QueryDefinitionId for Auth Type Breakdown'
    Value: !GetAtt AuthBreakdownQuery.QueryDefinitionId
  TopUsersQueryId:
    Description: 'QueryDefinitionId for Top Users'
    Value: !GetAtt TopUsersQuery.QueryDefinitionId
  DataTrendsQueryId:
    Description: 'QueryDefinitionId for Data Trends'
    Value: !GetAtt DataTrendsQuery.QueryDefinitionId