AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication.

Parameters:
  UserPoolName:
    Type: String
    Description: Name of the Cognito User Pool
    Default: MyUserPool
  EmailVerificationMessage:
    Type: String
    Description: Custom message for email verification
    Default: Your verification code is {####}
  EmailVerificationSubject:
    Type: String
    Description: Subject for email verification
    Default: Your verification code

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      MfaConfiguration: 'OFF'
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

Outputs:
  UserPoolId:
    Description: ID of the created user pool
    Value: !Ref UserPool
  UserPoolArn:
    Description: ARN of the created user pool
    Value: !GetAtt UserPool.Arn