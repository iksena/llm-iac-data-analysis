AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Parameter Storage and Retrieval Workflows using SSM Parameter Store and Secrets Manager

Parameters:
  Namespace:
    Type: String
    Default: myapp
    Description: Stack-specific namespace prefix for parameters and secrets

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${Namespace}/config/ab-test'
      Type: String
      Value: 'This is A/B'
      Description: Non-sensitive configuration value for A/B testing
      AllowedPattern: '^[A-Za-z0-9 /]+$'

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${Namespace}/credentials/service'
      Description: Service credentials with predefined username
      SecretString: !Sub |
        {
          "username": "service_user",
          "password": "{{resolve:secretsmanager:${AWS::StackName}-GeneratedPassword}}"
        }
      GenerateSecretString:
        SecretStringTemplate: '{"username": "service_user"}'
        GenerateStringKey: 'password'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  GeneratedPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${Namespace}/generated-password'
      Description: Dynamically generated password for demonstration
      GenerateSecretString:
        GenerateStringKey: 'password'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              try:
                  # Retrieve SSM parameter
                  ssm_response = ssm_client.get_parameter(
                      Name=f"/{event['namespace']}/config/ab-test",
                      WithDecryption=False
                  )
                  ssm_value = ssm_response['Parameter']['Value']

                  # Retrieve Secrets Manager secret
                  secrets_response = secrets_client.get_secret_value(
                      SecretId=f"/{event['namespace']}/credentials/service"
                  )
                  secrets_value = json.loads(secrets_response['SecretString'])

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'ssm_value': ssm_value,
                          'secrets': secrets_value
                      })
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

      Environment:
        Variables:
          NAMESPACE: !Ref Namespace

  LambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSSMSecretsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParametersByPath
            Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${Namespace}/*'
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret/${Namespace}/*'
      Roles:
        - !Ref LambdaExecutionRole

Outputs:
  SSMParameterARN:
    Description: ARN of the SSM Parameter
    Value: !Ref SSMParameter
  SecretsManagerSecretARN:
    Description: ARN of the Secrets Manager Secret
    Value: !Ref SecretsManagerSecret
  LambdaFunctionARN:
    Description: ARN of the Lambda Function
    Value: !GetAtt LambdaFunction.Arn