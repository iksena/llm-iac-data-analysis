AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue

  SnsTopic:
    Type: AWS::SNS::Topic

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
      Protocol: sqs

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  SnsTopicArn:
    Description: SNS Topic ARN
    Value: !Ref SnsTopic
  AllMetricsQueueArn:
    Description: All Metrics Queue ARN
    Value: !GetAtt AllMetricsSqsQueue.Arn
  TemperatureQueueArn:
    Description: Temperature Queue ARN
    Value: !GetAtt TemperatureSqsQueue.Arn
  HumidityQueueArn:
    Description: Humidity Queue ARN
    Value: !GetAtt HumiditySqsQueue.Arn