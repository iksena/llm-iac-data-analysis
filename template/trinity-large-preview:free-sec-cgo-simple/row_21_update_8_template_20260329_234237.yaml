AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create Timestream database and tables with configurable retention policies

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-db
    Description: Name of the Timestream database to create

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      KmsKeyId: alias/aws/timestream
      Tags:
        - Key: Name
          Value: !Ref DatabaseName
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  TimestreamTableBatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 365
      Tags:
        - Key: Name
          Value: poc-table-01-batch-write

  TimestreamTableOlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 0
      Tags:
        - Key: Name
          Value: poc-table-02-older-records-memonly

  TimestreamTableOlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 0
        MagneticStoreRetentionPeriodInDays: 365
      Tags:
        - Key: Name
          Value: poc-table-03-older-records-magnetic

  TimestreamTableCommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: 365
      Tags:
        - Key: Name
          Value: poc-table-04-common-attributes

Outputs:
  DatabaseName:
    Description: Timestream Database Name
    Value: !Ref DatabaseName
  DatabaseARN:
    Description: Timestream Database ARN
    Value: !GetAtt TimestreamDatabase.Arn