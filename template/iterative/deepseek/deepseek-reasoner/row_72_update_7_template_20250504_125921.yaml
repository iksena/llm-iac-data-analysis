AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CodeServerVersion:
    Type: String
    Default: 4.4.0
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t2.micro
      - t3.medium
      - t3.large

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-0d70546e43a941d70

Resources:
  # ... [All other resources remain unchanged from previous version] ...

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: SecurityGroupIngressRule
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref AWS::Region, AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref CloudFrontSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash -xe
            apt-get update -y
            curl -fsSL https://code-server.dev/install.sh | sh -s -- --version ${CodeServerVersion}
            mkdir -p /root/.config/code-server
            cat <<EOF > /root/.config/code-server/config.yaml
            bind-addr: 0.0.0.0:8080
            auth: none
            EOF
            systemctl enable --now code-server@root

  # ... [Remaining resources and outputs unchanged] ...