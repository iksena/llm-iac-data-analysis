AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ServiceRoleArn:
    Type: String
    Default: ''
    Description: (Optional) ARN of an IAM role allowed to use the KMS key
    AllowedPattern: ^$|^arn:aws:iam::\d{12}:role/[\w+=,.@-]+$
Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: ObjectWriter
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt LambdaArtifactsKey.Arn
  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${LambdaArtifactsBucket}/*'
  LambdaArtifactsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-policy
        Statement:
          - Sid: EnableRootAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: AllowServiceRoleUsage
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition: !If 
              - HasServiceRole
              - StringEquals:
                  kms:CallerAccount: !Ref AWS::AccountId
              - !Ref AWS::NoValue
          - Sid: AllowS3Service
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:GenerateDataKey
              - kms:Decrypt
            Resource: '*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
  LambdaArtifactsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKey
Conditions:
  HasServiceRole: !Not [!Equals [!Ref ServiceRoleArn, '']]
Outputs:
  BucketName:
    Value: !Ref LambdaArtifactsBucket
  BucketARN:
    Value: !GetAtt LambdaArtifactsBucket.Arn
  KMSKeyARN:
    Value: !GetAtt LambdaArtifactsKey.Arn
  KMSKeyID:
    Value: !Ref LambdaArtifactsKey
  KMSAliasName:
    Value: !Ref LambdaArtifactsKeyAlias