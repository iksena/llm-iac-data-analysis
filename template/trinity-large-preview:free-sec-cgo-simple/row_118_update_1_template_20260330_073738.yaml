AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-EventSourceQueue

  APIDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: !Sub ${AWS::StackName}-ZipAPI
      Description: API Destination for Zip Code Lookup
      Endpoint: https://api.zippopotam.us/us/*
      HttpMethod: GET
      InvocationRateLimitPerSecond: 5

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-EnrichedLogs
      RetentionInDays: 30

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-PipesRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipesAccess
      Policies:
        - PolicyName: SQSAPILogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - eventschemas:InvokeApiDestination
                Resource: !GetAtt APIDestination.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-MessageEnricher
      Description: Enriches SQS messages with Zip Code API data
      RoleArn: !GetAtt PipesRole.Arn
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SQSQueue.QueueUrl
      Target:
        TargetType: LogGroup
        TargetParameters:
          LogGroup:
            LogGroupName: !Ref LogGroup
            LogStreamName: !Sub ${AWS::StackName}-EnrichedStream
      Enrichment:
        EnrichmentType: ApiDestination
        EnrichmentParameters:
          ApiDestination:
            ApiDestinationArn: !GetAtt APIDestination.Arn
            InvocationType: SYNC
            RequestParameters:
              HttpMethod: GET
              PathTemplate: !Sub /${AWS::StackName}/enrich
              QueryParameters:
                zip: $.message.body.zipCode

Outputs:
  QueueURL:
    Description: SQS Queue URL
    Value: !Ref SQSQueue
  APIDestinationARN:
    Description: API Destination ARN
    Value: !GetAtt APIDestination.Arn
  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref LogGroup