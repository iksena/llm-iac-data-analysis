AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AvailabilityZoneParam:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZoneParam
      CidrBlock: 10.0.0.0/24
      VpcId: !Ref VPC

  FileSystemSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16

  EncryptedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      AvailabilityZoneName: !Ref AvailabilityZoneParam
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !GetAtt FileSystemSecurityGroup.GroupId

Outputs:
  FileSystemId:
    Value: !Ref EncryptedFileSystem
  MountTargetIpAddress:
    Value: !GetAtt MountTarget.IpAddress
  SecurityGroupId:
    Value: !Ref FileSystemSecurityGroup
  SubnetId:
    Value: !Ref Subnet
  VpcId:
    Value: !Ref VPC
  AvailabilityZone:
    Value: !Ref AvailabilityZoneParam