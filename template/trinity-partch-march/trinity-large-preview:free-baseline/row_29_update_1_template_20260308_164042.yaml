AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval workflows using SSM Parameter Store and Secrets Manager

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaSSMSecretsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt MySecret.Arn

  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/config/ab-test'
      Type: String
      Value: 'This is A/B'
      Description: Non-sensitive configuration parameter

  MySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${AWS::StackName}/app/credentials'
      Description: Secret for Lambda function with predefined username
      SecretString:
        Username: 'admin'
      GenerateSecretString:
        SecretStringTemplate: '{"Username": "admin"}'
        GenerateStringKey: 'Password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-ParameterRetriever'
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def lambda_handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Retrieve SSM parameter
              ssm_param = ssm_client.get_parameter(Name='/${AWS::StackName}/config/ab-test')
              ssm_value = ssm_param['Parameter']['Value']

              # Retrieve Secrets Manager secret
              secret = secrets_client.get_secret_value(SecretId='/${AWS::StackName}/app/credentials')
              secret_value = json.loads(secret['SecretString'])

              response = {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secret_value': secret_value
                  })
              }

              return response
      Timeout: 10
      MemorySize: 128

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn