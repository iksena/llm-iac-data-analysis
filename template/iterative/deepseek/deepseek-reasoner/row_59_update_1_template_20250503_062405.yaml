AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: RealTimeDataStream
  ShardCount:
    Type: Number
    Description: Number of shards for the stream
    Default: 1
  ReadThroughputThreshold:
    Type: Number
    Description: Threshold for read throughput exceeded alerts
    Default: 1
  WriteThroughputThreshold:
    Type: Number
    Description: Threshold for write throughput exceeded alerts
    Default: 1
  SNSTopicName:
    Type: String
    Description: Name for the alert notification SNS topic
    Default: KinesisAlertsTopic

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: 24
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${StreamName}-ReadThroughputExceeded
      AlarmDescription: Alarm when read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ReadThroughputThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${StreamName}-WriteThroughputExceeded
      AlarmDescription: Alarm when write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref WriteThroughputThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  StreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
  AlertTopicARN:
    Description: ARN for notification topic
    Value: !Ref AlertTopic