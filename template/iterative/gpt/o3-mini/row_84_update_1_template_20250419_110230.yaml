AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create a Macie session for automated sensitive data discovery
  and security monitoring across AWS accounts.

Parameters:
  FindingPublishingFrequency:
    Description: "The finding publishing frequency for the Macie session (FIFTEEN_MINUTES, ONE_HOUR, or SIX_HOURS)."
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
  MacieStatus:
    Description: "The status for Macie session. Use ENABLED to activate the session or PAUSED to disable it."
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      Status: !Ref MacieStatus

Outputs:
  MacieSessionRef:
    Description: "Reference to the created Macie session."
    Value: !Ref MacieSession