AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Pool for secure user management with admin provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  UserPoolDomainName:
    Type: String
    Default: myappdomain
    Description: Domain name for the Cognito hosted UI
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
    Description: Custom message for email verification
  EmailVerificationSubject:
    Type: String
    Default: Your verification code
    Description: Custom subject for email verification
  PasswordPolicyMinLength:
    Type: Number
    Default: 8
    Description: Minimum password length
  PasswordPolicyRequireLowercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require lowercase characters in passwords
  PasswordPolicyRequireUppercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require uppercase characters in passwords
  PasswordPolicyRequireNumbers:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require numbers in passwords
  PasswordPolicyRequireSymbols:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require symbols in passwords

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordPolicyMinLength
          RequireLowercase: !Ref PasswordPolicyRequireLowercase
          RequireUppercase: !Ref PasswordPolicyRequireUppercase
          RequireNumbers: !Ref PasswordPolicyRequireNumbers
          RequireSymbols: !Ref PasswordPolicyRequireSymbols
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: OFF
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref UserPoolDomainName
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${UserPoolName}-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
        - REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      ReadAttributes:
        - email
      WriteAttributes:
        - email
      GenerateSecret: false

Outputs:
  UserPoolId:
    Description: ID of the created Cognito User Pool
    Value: !Ref UserPool
  UserPoolArn:
    Description: ARN of the created Cognito User Pool
    Value: !GetAtt UserPool.Arn
  UserPoolDomain:
    Description: Domain for the Cognito hosted UI
    Value: !Sub ${UserPoolDomainName}.auth.us-east-1.amazoncognito.com