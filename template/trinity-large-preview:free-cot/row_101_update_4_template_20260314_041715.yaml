AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Flow Logging and Secure S3 Storage'

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
  FlowLogTrafficType:
    Type: String
    Default: ALL
    Description: Type of traffic to log
    AllowedValues:
      - ACCEPT
      - REJECT
      - ALL
  LogPrefix:
    Type: String
    Default: ''
    Description: Optional prefix for S3 log file keys

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-FlowLog-Monitoring

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join ['-', ['vpc-flowlogs', !Ref 'AWS::AccountId', !Select [0, !Split ['-', !Ref 'AWS::Region']]]]
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: VPC-FlowLogs-Bucket

  FlowLogDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: VPCFlowLogDeliveryRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  FlowLogDeliveryPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: VPCFlowLogDeliveryPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
      Roles:
        - !Ref FlowLogDeliveryRole

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt FlowLogDeliveryRole.Arn
            Action:
              - s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogDeliveryRole.Arn
      LogDestinationType: s3
      LogDestination: !GetAtt S3Bucket.Arn
      TrafficType: !Ref FlowLogTrafficType
      LogFormat: 'plain-text'
      MaxAggregationInterval: 600
      ResourceId: !Ref VPC
      ResourceType: VPC

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  S3BucketName:
    Description: S3 Bucket Name for Flow Logs
    Value: !Ref S3Bucket
  FlowLogId:
    Description: VPC Flow Log ID
    Value: !Ref VPCFlowLog