AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue

Parameters:
  QueueName:
    Type: String
    Default: MySQSQueue.fifo
    Description: The name of the SQS FIFO queue (must end with .fifo)
  ContentBasedDeduplication:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enables content-based deduplication for the FIFO queue
  DelaySeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 900
    Description: The time in seconds that the delivery of all messages in the queue will be delayed
  MaximumMessageSize:
    Type: Number
    Default: 262144
    MinValue: 1024
    MaxValue: 262144
    Description: The limit of how many bytes a message can contain before Amazon SQS rejects it
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
    Description: The number of seconds Amazon SQS retains a message
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 20
    Description: The time for which a ReceiveMessage call will wait for a message to arrive
  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200
    Description: The length of time during which a message will be unavailable once a message is delivered from the queue

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
      VisibilityTimeout: !Ref VisibilityTimeout
      FifoQueue: true

Outputs:
  QueueURL:
    Description: The URL of the SQS FIFO queue
    Value: !Ref SQSQueue
  QueueARN:
    Description: The ARN of the SQS FIFO queue
    Value: !GetAtt SQSQueue.QueueArn