AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted S3 bucket for ALB access logs with a 90-day retention policy and restricted access.

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'alb-access-logs-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
            Prefix: ''
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBLogDelivery
            Effect: Allow
            Principal:
              Service: 
                - delivery.logs.amazonaws.com
                - elb.amazonaws.com
            Action: 's3:PutObject'
            Resource: !Sub '${ALBAccessLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

Outputs:
  ALBAccessLogsBucketName:
    Description: The name of the S3 bucket for ALB access logs
    Value: !Ref ALBAccessLogsBucket