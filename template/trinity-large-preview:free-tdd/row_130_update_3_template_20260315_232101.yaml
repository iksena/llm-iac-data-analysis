AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Account-Wide IAM Password Policy with Lambda Management

Parameters:
  MinPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    Description: Minimum password length for IAM users
  RequireUppercaseCharacters:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one uppercase character in password
  RequireLowercaseCharacters:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one lowercase character in password
  RequireNumbers:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one number in password
  RequireSymbols:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require at least one symbol in password
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Maximum age (in days) before password must be changed
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    Description: Number of previous passwords to prevent reuse
  AllowUsersToChangePassword:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Allow IAM users to change their own passwords

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaIAMPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:UpdateAccountPasswordPolicy
              - iam:DeleteAccountPasswordPolicy
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              client = boto3.client('iam')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      client.update_account_password_policy(
                          MinimumPasswordLength=event['ResourceProperties']['MinimumPasswordLength'],
                          RequireUppercaseCharacters=event['ResourceProperties']['RequireUppercaseCharacters'],
                          RequireLowercaseCharacters=event['ResourceProperties']['RequireLowercaseCharacters'],
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'],
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'],
                          MaxPasswordAge=event['ResourceProperties']['MaxPasswordAge'],
                          PasswordReusePrevention=event['ResourceProperties']['PasswordReusePrevention'],
                          AllowUsersToChangePassword=event['ResourceProperties']['AllowUsersToChangePassword']
                      )
                  elif event['RequestType'] == 'Delete':
                      client.delete_account_password_policy()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: events.amazonaws.com

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn