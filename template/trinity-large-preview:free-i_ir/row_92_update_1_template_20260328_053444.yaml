AWSTemplateFormatVersion: '2010-09-09'
Description: Self-configuring EC2 instance with automated Nginx installation and SSM logging

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: t3.micro
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - "#!/bin/bash\n"
              - "yum update -y\n"
              - "amazon-linux-extras install nginx1 -y\n"
              - "systemctl start nginx\n"
              - "systemctl enable nginx\n"
    DependsOn:
      - InstanceProfile

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  SSMBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ssm-logs-bucket
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref SSMBucket
        LogFilePrefix: logs/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        commands:
          - Fn::Join:
              - ''
              - - "#!/bin/bash\n"
                - "yum update -y\n"
                - "amazon-linux-extras install nginx1 -y\n"
                - "systemctl start nginx\n"
                - "systemctl enable nginx"
      OutputLocation:
        S3Location:
          BucketName: !Ref SSMBucket
          OutputS3Prefix: logs/ssm/
    DependsOn:
      - EC2Instance

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS Name
    Value: !GetAtt EC2Instance.PublicDnsName
  S3BucketName:
    Description: SSM Logs Bucket Name
    Value: !Ref SSMBucket