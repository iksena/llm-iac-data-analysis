AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for S3 bucket triggering Lambda function

Parameters:
  BucketName:
    Type: String
    Default: s3-trigger-bucket
    Description: Name of the S3 bucket (must be globally unique)
    MinLength: 3
    MaxLength: 63
    AllowedPattern: "[a-z0-9-]*"
    ConstraintDescription: Bucket name can only contain lowercase letters, numbers, and hyphens

  LambdaFunctionName:
    Type: String
    Default: S3TriggerFunction
    Description: Name of the Lambda function
    MinLength: 1
    MaxLength: 64

  LambdaRuntime:
    Type: String
    Default: python3.14
    Description: Runtime environment for the Lambda function (using current non-deprecated versions)
    AllowedValues:
      - nodejs24.x
      - python3.14

  LambdaHandler:
    Type: String
    Default: index.handler
    Description: Entry point for the Lambda function
    MinLength: 1
    MaxLength: 128

Mappings:
  LambdaCode:
    python3.14:
      Code: |
        import json
        def handler(event, context):
            print("Received event: " + json.dumps(event))
            return {'statusCode': 200}
    nodejs24.x:
      Code: |
        exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event));
            return { statusCode: 200 };
        };

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: !Ref LambdaRuntime
      Handler: !Ref LambdaHandler
      Code:
        ZipFile: !FindInMap [LambdaCode, !Ref LambdaRuntime, Code]
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::${BucketName}'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt LambdaFunction.Arn

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn