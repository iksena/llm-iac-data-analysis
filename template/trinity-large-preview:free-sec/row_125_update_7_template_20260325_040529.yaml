AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  ApiName:
    Type: String
    Default: EmailAPI
  LambdaTimeout:
    Type: Number
    Default: 30
  LambdaMemory:
    Type: Number
    Default: 128
  ApiStageName:
    Type: String
    Default: prod

Resources:
  EmailApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: REST
      ApiKeySelectionExpression: $request.header.x-api-key
      Description: API for sending templated emails via SES

  EmailModel:
    Type: AWS::ApiGatewayV2::Model
    Properties:
      ApiId: !Ref EmailApi
      Name: EmailModel
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        type: object
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          text:
            type: string
          html:
            type: string
        required:
          - to
          - from
          - subject
          - text

  EmailApiDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn: EmailApiRoute
    Properties:
      ApiId: !Ref EmailApi

  EmailApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref EmailApi
      DeploymentId: !Ref EmailApiDeployment
      StageName: !Ref ApiStageName
      AutoDeploy: true
      DefaultRouteSettings:
        DataTraceEnabled: false
        DetailedMetricsEnabled: true

  EmailApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EmailApi
      RouteKey: POST /send
      AuthorizationType: NONE
      ModelSelectionExpression: $request.body
      RequestModels:
        application/json: !Ref EmailModel
      Target: !Join
        - '/'
        - - integrations
          - !Ref EmailApiIntegration

  EmailApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EmailApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
        - LambdaArn: !GetAtt EmailLambda.Arn
      PayloadFormatVersion: '2.0'

  EmailLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ses = boto3.client('ses')

          def handler(event, context):
              try:
                  body = json.loads(event['body'])
                  response = ses.send_email(
                      Source=body['from'],
                      Destination={'ToAddresses': [body['to']]},
                      Message={
                          'Subject': {'Data': body['subject']},
                          'Body': {
                              'Text': {'Data': body.get('text', '')},
                              'Html': {'Data': body.get('html', '')}
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': str(e)})
                  }
      Role: !GetAtt EmailLambdaRole.Arn

  EmailLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  EmailApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt EmailLambda.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiId}/*
        - ApiId: !Ref EmailApi

  EmailApiKey:
    Type: AWS::ApiGatewayV2::ApiKey
    Properties:
      ApiId: !Ref EmailApi
      Description: API Key for Email API
      Enabled: true

  EmailApiUsagePlan:
    Type: AWS::ApiGatewayV2::UsagePlan
    Properties:
      ApiId: !Ref EmailApi
      Description: Usage plan for Email API
      ApiKeys:
        - !Ref EmailApiKey
      UsagePlanName: EmailAPIUsagePlan
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Offset: 0
        Period: MONTH

  EmailApiUsagePlanAssociation:
    Type: AWS::ApiGatewayV2::UsagePlanKey
    Properties:
      KeyId: !Ref EmailApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref EmailApiUsagePlan

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub
      - https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
      - ApiId: !Ref EmailApi
        Stage: !Ref ApiStageName
  ApiKeyId:
    Description: API Key ID
    Value: !Ref EmailApiKey
  ApiKeyValue:
    Description: API Key Value (sensitive)
    Value: !GetAtt EmailApiKey.Value
    Export:
      Name: EmailApiKeyValue