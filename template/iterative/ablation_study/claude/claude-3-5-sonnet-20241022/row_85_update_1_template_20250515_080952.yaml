AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for secure S3 bucket to store CloudWatch export data'

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'cloudwatch-exports'
    Description: 'Prefix for the S3 bucket name'
    
  EnableVersioning:
    Type: String
    Default: 'Yes'
    AllowedValues: 
      - 'Yes'
      - 'No'
    Description: 'Enable versioning on the bucket'
    
  RetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 3650
    Description: 'Number of days to retain objects before moving to Glacier'
    
  Environment:
    Type: String
    Default: 'Production'
    AllowedValues:
      - 'Development'
      - 'Staging'
      - 'Production'
    Description: 'Environment tag for the bucket'

Resources:
  CloudWatchExportBucketKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: 'KMS key for CloudWatch export bucket encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  CloudWatchExportBucketKeyAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: !Sub 'alias/${BucketNamePrefix}-key'
      TargetKeyId: !Ref CloudWatchExportBucketKey

  CloudWatchExportBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: !If [EnableVersioningCondition, 'Enabled', 'Suspended']
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt CloudWatchExportBucketKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: 'ArchiveRule'
            Status: 'Enabled'
            Transitions:
              - TransitionInDays: !Ref RetentionDays
                StorageClass: 'GLACIER'
      Tags:
        - Key: 'Environment'
          Value: !Ref Environment

  CloudWatchExportBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'DenyUnencryptedObjectUploads'
            Effect: 'Deny'
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${CloudWatchExportBucket.Arn}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'aws:kms'
          - Sid: 'DenyHTTP'
            Effect: 'Deny'
            Principal: '*'
            Action: 's3:*'
            Resource: !Sub '${CloudWatchExportBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

Conditions:
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, 'Yes']

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref CloudWatchExportBucket

  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt CloudWatchExportBucket.Arn

  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt CloudWatchExportBucketKey.Arn