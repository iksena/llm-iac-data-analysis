AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon EFS file system with a mount target in the us-east-1a availability zone,
  configured for a testing environment with shared storage.

Parameters:
  MountTargetSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID in us-east-1a where the EFS mount target will be created.
  MountTargetSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: The security group ID to associate with the EFS mount target for controlling network access.

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIa: AFTER_14_DAYS

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    DependsOn: EfsFileSystem
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref MountTargetSubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system.
    Value: !Ref EfsFileSystem
  MountTargetId:
    Description: The ID of the created EFS mount target.
    Value: !Ref EfsMountTarget