AWSTemplateFormatVersion: '2010-09-09'
Description: AppSync GraphQL API with Lambda backend for pet inventory service

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - Fn::Join:
            - ':'
            - - 'arn'
              - Ref: AWS::Partition
              - 'iam'
              - Ref: AWS::AccountId
              - 'policy'
              - 'service-role'
              - 'AWSLambdaBasicExecutionRole'

  PetShopLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs24.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              pets: [
                { id: '1', name: 'Max', type: 'Dog' },
                { id: '2', name: 'Bella', type: 'Cat' },
                { id: '3', name: 'Charlie', type: 'Bird' }
              ]
            };
          };
      Timeout: 10
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PetShopLambda.Arn

  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      AdditionalAuthenticationProviders: []

  PetShopLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !Ref PetShopAPI
      Name: PetShopLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetShopLambda.Arn

  PetShopSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !Ref PetShopAPI
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        type Query {
          getPets: [Pet!]!
        }

  PetQueryResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !Ref PetShopAPI
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetShopLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        #set($pets = $ctx.result.pets)
        #return($pets)

Outputs:
  ApiId:
    Value: !Ref PetShopAPI
  ApiKey:
    Value: !GetAtt PetShopAPI.ApiKey
  ApiUrl:
    Value: !GetAtt PetShopAPI.GraphQLUrl