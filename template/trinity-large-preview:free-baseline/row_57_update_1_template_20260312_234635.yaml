AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with Monitoring Capabilities'

Parameters:
  ClusterName:
    Type: String
    Default: 'MyECSCluster'
    Description: 'Name of the ECS cluster'
  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
    Description: 'Number of days to retain CloudWatch logs'
  CPUUtilizationThreshold:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: 'CPU utilization threshold for alarm (in percent)'
  MemoryUtilizationThreshold:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: 'Memory utilization threshold for alarm (in percent)'

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ClusterName}/container-logs'
      RetentionInDays: !Ref LogRetentionInDays

  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ECSServiceRole-${ClusterName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ECSTaskExecutionRole-${ClusterName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  CPUMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ECS-${ClusterName}-High-CPU-Memory-Utilization'
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Period: 300
      Statistic: Average
      Threshold: !Ref CPUUtilizationThreshold
      AlarmActions:
        - !Sub 'arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm-actions'
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName

  MemoryUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ECS-${ClusterName}-High-Memory-Utilization'
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Period: 300
      Statistic: Average
      Threshold: !Ref MemoryUtilizationThreshold
      AlarmActions:
        - !Sub 'arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm-actions'
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName

Outputs:
  ClusterArn:
    Description: 'ECS Cluster ARN'
    Value: !Ref ECSCluster
  LogGroupName:
    Description: 'CloudWatch Log Group Name'
    Value: !Ref CloudWatchLogGroup
  ServiceRoleArn:
    Description: 'ECS Service Role ARN'
    Value: !GetAtt ECSServiceRole.Arn
  TaskExecutionRoleArn:
    Description: 'ECS Task Execution Role ARN'
    Value: !GetAtt ECSTaskExecutionRole.Arn