AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Account-Wide IAM Password Policy with Lambda Management

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum length of IAM user passwords
  RequireUppercaseCharacters:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether passwords must contain at least one uppercase character
  RequireLowercaseCharacters:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether passwords must contain at least one lowercase character
  RequireNumbers:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether passwords must contain at least one number
  RequireSymbols:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether passwords must contain at least one special character
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Number of days password is valid before requiring change
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to prevent reuse
  AllowUsersToChangePassword:
    Type: String
    Default: true
    AllowedValues: [true, false]
    Description: Whether users can change their own passwords
  PermissionBoundaryArn:
    Type: String
    Default: ""
    Description: ARN of IAM permission boundary to apply to Lambda role

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref "AWS::NoValue"]

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          iam_client = boto3.client('iam')

          def lambda_handler(event, context):
              try:
                  request_type = event['RequestType']
                  if request_type == 'Create' or request_type == 'Update':
                      params = event['ResourceProperties']
                      set_password_policy(params)
                  elif request_type == 'Delete':
                      delete_password_policy()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def set_password_policy(params):
              policy = {
                  'MinimumPasswordLength': int(params['MinimumPasswordLength']),
                  'RequireUppercaseCharacters': params['RequireUppercaseCharacters'].lower() == 'true',
                  'RequireLowercaseCharacters': params['RequireLowercaseCharacters'].lower() == 'true',
                  'RequireNumbers': params['RequireNumbers'].lower() == 'true',
                  'RequireSymbols': params['RequireSymbols'].lower() == 'true',
                  'MaxPasswordAge': int(params['MaxPasswordAge']),
                  'PasswordReusePrevention': int(params['PasswordReusePrevention']),
                  'AllowUsersToChangePassword': params['AllowUsersToChangePassword'].lower() == 'true'
              }
              iam_client.update_account_password_policy(**policy)

          def delete_password_policy():
              iam_client.delete_account_password_policy()

  LambdaCustomResource:
    Type: Custom::PasswordPolicyManager
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, ""]]

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn