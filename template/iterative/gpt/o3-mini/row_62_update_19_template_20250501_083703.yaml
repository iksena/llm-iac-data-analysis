AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to create an Amazon Aurora MySQL cluster
  with two publicly accessible db.t3.large instances and custom DB parameter groups.
  Network components (VPC, subnets, internet gateway, route tables, and security group)
  are defined in the Resources section.

Parameters:
  DBClusterIdentifier:
    Type: String
    Description: "The DB Cluster identifier. Provide a unique name for the Aurora cluster."
  DatabaseName:
    Type: String
    Description: "The name of the initial database to create."
  MasterUsername:
    Type: String
    Description: "The master username for the Aurora cluster."

Resources:
  # VPC
  AuroraVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "AuroraVPC"

  # Subnets
  AuroraSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AuroraVPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "AuroraSubnet1"

  AuroraSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AuroraVPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [ 1, !GetAZs "" ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "AuroraSubnet2"

  # Internet Gateway and Attachment
  AuroraInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: "AuroraIGW"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AuroraVPC
      InternetGatewayId: !Ref AuroraInternetGateway

  # Public Route Table
  AuroraPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AuroraVPC
      Tags:
        - Key: Name
          Value: "AuroraPublicRouteTable"

  AuroraPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref AuroraPublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref AuroraInternetGateway

  AuroraSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AuroraSubnet1
      RouteTableId: !Ref AuroraPublicRouteTable

  AuroraSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AuroraSubnet2
      RouteTableId: !Ref AuroraPublicRouteTable

  # Security Group for Aurora Cluster
  AuroraDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for Aurora MySQL cluster"
      VpcId: !Ref AuroraVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "AuroraDBSecurityGroup"

  # Secrets Manager for Master Password
  AuroraClusterMasterPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${DBClusterIdentifier}-MasterUserPassword"
      Description: "Master user password for the Aurora cluster, automatically generated."
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: "password"
        ExcludeCharacters: "\"@/\\"
        PasswordLength: 16

  # DB Cluster Parameter Group
  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: "Custom Aurora MySQL DB Cluster Parameter Group enforcing sql_mode."
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

  # DB Instance Parameter Group
  AuroraInstanceParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: "Custom Aurora MySQL DB Instance Parameter Group enforcing time_zone."
      Family: aurora-mysql5.7
      Parameters:
        time_zone: "UTC"

  # DB Subnet Group using the created subnets
  AuroraDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for the Aurora MySQL cluster"
      SubnetIds:
        - !Ref AuroraSubnet1
        - !Ref AuroraSubnet2

  # Aurora DB Cluster
  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: "5.7.mysql_aurora.2.11.6"
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub
        - "{{resolve:secretsmanager:${SecretARN}:SecretString:password}}"
        - { SecretARN: !Ref AuroraClusterMasterPasswordSecret }
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraDBSecurityGroup
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup

  # Aurora DB Instance 1
  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: !Sub "${DBClusterIdentifier}-instance1"
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraInstanceParameterGroup

  # Aurora DB Instance 2
  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: !Sub "${DBClusterIdentifier}-instance2"
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraInstanceParameterGroup

Outputs:
  DBClusterARN:
    Description: "ARN of the Aurora MySQL DB Cluster."
    Value: !GetAtt AuroraDBCluster.DBClusterArn
  DBInstance1Endpoint:
    Description: "Endpoint of the first DB Instance."
    Value: !GetAtt AuroraDBInstance1.Endpoint.Address
  DBInstance2Endpoint:
    Description: "Endpoint of the second DB Instance."
    Value: !GetAtt AuroraDBInstance2.Endpoint.Address
  MasterPasswordSecretARN:
    Description: "ARN of the Secrets Manager secret containing the master user password."
    Value: !Ref AuroraClusterMasterPasswordSecret