AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create and manage an AWS account-wide IAM password policy
  with customizable security requirements and a Lambda function to apply/remove the policy.

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    Description: Minimum length for IAM user passwords.
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to require at least one uppercase letter in passwords.
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to require at least one lowercase letter in passwords.
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to require at least one number in passwords.
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to require at least one symbol in passwords.
  PasswordExpirationDays:
    Type: Number
    Default: 90
    Description: Number of days before password expiration.
  PasswordReusePrevention:
    Type: Number
    Default: 24
    Description: Number of previous passwords to prevent reuse.
  LambdaFunctionName:
    Type: String
    Default: 'IAMPasswordPolicyManager'
    Description: Name of the Lambda function to manage the IAM password policy.

Resources:
  IAMPasswordPolicy:
    Type: AWS::IAM::AccountPasswordPolicy
    Properties:
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercase
      RequireLowercaseCharacters: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref PasswordExpirationDays
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaIAMPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                Resource: '*'

  IAMPasswordPolicyManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Code:
        ZipFile: |
          import boto3
          import json

          def handler(event, context):
              iam = boto3.client('iam')
              response = iam.update_account_password_policy(
                  MinimumPasswordLength=int(event['MinimumPasswordLength']),
                  RequireUppercaseCharacters=event['RequireUppercase'] == 'true',
                  RequireLowercaseCharacters=event['RequireLowercase'] == 'true',
                  RequireNumbers=event['RequireNumbers'] == 'true',
                  RequireSymbols=event['RequireSymbols'] == 'true',
                  MaxPasswordAge=int(event['PasswordExpirationDays']),
                  PasswordReusePrevention=int(event['PasswordReusePrevention']),
                  AllowUsersToChangePassword=True
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Password policy updated successfully')
              }

Outputs:
  LambdaFunctionArn:
    Description: The ARN of the Lambda function managing the IAM password policy.
    Value: !GetAtt IAMPasswordPolicyManagerFunction.Arn