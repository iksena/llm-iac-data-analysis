AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyDataDogAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogApp

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: testanu

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST

  EventBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogApiDestination.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue

  LogForwardingRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyDataDogAppEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          Id: DataDogTarget
          RoleArn: !GetAtt EventBridgeExecutionRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusName:
    Value: !Ref MyDataDogAppEventBus
  ApiDestinationArn:
    Value: !GetAtt DataDogApiDestination.Arn
  SqsQueueUrl:
    Value: !Ref DeadLetterQueue