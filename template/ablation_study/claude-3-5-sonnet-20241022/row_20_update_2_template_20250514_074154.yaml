AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Log Insights Queries for AWS Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'ID of the Client VPN Endpoint to monitor'
  
  DashboardName:
    Type: String
    Default: 'ClientVPNMonitoring'
    Description: 'Name of the CloudWatch Dashboard'
    
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Log Group containing Client VPN logs'
    
  RefreshRate:
    Type: Number
    Default: 300
    Description: 'Dashboard refresh rate in seconds'
    MinValue: 60
    MaxValue: 3600

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Join
        - ''
        - - '{"widgets":['
          - '{'
          - '"type":"log",'
          - '"x":0,"y":0,"width":12,"height":6,'
          - '"properties":{'
          - !Sub '"query":"SOURCE ${LogGroupName} | fields @timestamp, user, authentication_type, bytes_in, bytes_out | filter endpoint_id = ${VPNEndpointId} | stats sum(bytes_in) as total_ingress, sum(bytes_out) as total_egress by user, authentication_type | sort by total_ingress desc",'
          - !Sub '"region":"${AWS::Region}",'
          - '"title":"VPN Data Transfer by User",'
          - '"view":"table"'
          - '}},'
          - '{'
          - '"type":"log",'
          - '"x":12,"y":0,"width":12,"height":6,'
          - '"properties":{'
          - !Sub '"query":"SOURCE ${LogGroupName} | fields @timestamp, user, authentication_type | filter endpoint_id = ${VPNEndpointId} | stats count_distinct(user) as unique_users by authentication_type | sort by unique_users desc",'
          - !Sub '"region":"${AWS::Region}",'
          - '"title":"Active Users by Authentication Type",'
          - '"view":"table"'
          - '}},'
          - '{'
          - '"type":"log",'
          - '"x":0,"y":6,"width":24,"height":6,'
          - '"properties":{'
          - !Sub '"query":"SOURCE ${LogGroupName} | fields @timestamp, connection_id, user | filter endpoint_id = ${VPNEndpointId} | stats count(*) as connection_count by bin(1h)",'
          - !Sub '"region":"${AWS::Region}",'
          - '"title":"Connection Trends (Hourly)",'
          - '"view":"timeSeries"'
          - '}}'
          - ']}'

  ConnectionAnalysisQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'vpn-connection-analysis'
      QueryString: !Sub |
        SOURCE '${LogGroupName}'
        | fields @timestamp, connection_id, user, authentication_type
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            count(*) as total_connections,
            count_distinct(connection_id) as unique_connections,
            count_distinct(user) as unique_users
            by authentication_type
        | sort by total_connections desc
      LogGroupNames: 
        - !Ref LogGroupName

  DataTransferQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'vpn-data-transfer-metrics'
      QueryString: !Sub |
        SOURCE '${LogGroupName}'
        | fields @timestamp, bytes_in, bytes_out
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            sum(bytes_in) as total_ingress_bytes,
            sum(bytes_out) as total_egress_bytes,
            avg(bytes_in) as avg_ingress_bytes,
            avg(bytes_out) as avg_egress_bytes
            by bin(1h)
      LogGroupNames:
        - !Ref LogGroupName

  UserActivityQuery:
    Type: AWS::CloudWatchLogs::QueryDefinition
    Properties:
      Name: 'vpn-user-activity'
      QueryString: !Sub |
        SOURCE '${LogGroupName}'
        | fields @timestamp, user, authentication_type, connection_id
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            count(*) as connection_count,
            earliest(@timestamp) as first_connection,
            latest(@timestamp) as last_connection
            by user, authentication_type
        | sort by connection_count desc
      LogGroupNames:
        - !Ref LogGroupName

Outputs:
  DashboardURL:
    Description: 'URL of the created CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
    
  ConnectionAnalysisQueryId:
    Description: 'ID of the Connection Analysis Query'
    Value: !Ref ConnectionAnalysisQuery
    
  DataTransferQueryId:
    Description: 'ID of the Data Transfer Query'
    Value: !Ref DataTransferQuery
    
  UserActivityQueryId:
    Description: 'ID of the User Activity Query'
    Value: !Ref UserActivityQuery