AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventEnrichmentQueue

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/events/enriched-events
      RetentionInDays: 7

  ZippopotamusConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ZippopotamusConnection
      AuthorizationType: NONE
      AuthParameters:
        InvocationHttpParameters:
          BodyParameters: []
          HeaderParameters: []
          QueryStringParameters: []

  ZippopotamusAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ZippopotamusAPIDestination
      ConnectionArn: !GetAtt ZippopotamusConnection.Arn
      InvocationEndpoint: https://api.zippopotam.us/us/{zip}
      HttpMethod: GET
      InvocationRateLimitPerSecond: 1

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
        - PolicyName: APIDestinationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ZippopotamusAPIDestination.Arn
        - PolicyName: CloudWatchLogsPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/events/enriched-events:*"

  EnrichmentPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: EnrichmentPipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt SQSQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 0
      Enrichment: !GetAtt ZippopotamusAPIDestination.Arn
      EnrichmentParameters:
        InputTemplate: |
          {
            "pathParameters": {
              "zip": "{{$.zipcode}}"
            }
          }
      Target: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/events/enriched-events"
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamName: "enriched-events"
        InputTemplate: |
          {
            "originalEvent": "$aws.pipes.event.json",
            "enrichedData": "$aws.pipes.enrichment.json"
          }

Outputs:
  SQSQueueURL:
    Value: !Ref SQSQueue
  EnrichmentPipeARN:
    Value: !GetAtt EnrichmentPipe.Arn
  LogGroupName:
    Value: !Ref LogGroup