AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Config setup with customizable retention policies and delivery configurations'

Parameters:
  ConfigBucketName:
    Type: String
    Description: Name of the S3 bucket to store AWS Config data (must be globally unique)
    Default: aws-config-data-bucket
  
  CreateNewBucket:
    Type: String
    Description: Create a new S3 bucket or use an existing one
    Default: true
    AllowedValues:
      - true
      - false
  
  RetentionPeriod:
    Type: Number
    Description: Number of days to retain configuration history (default is 7 years)
    Default: 2557
    MinValue: 30
  
  DeliveryFrequency:
    Type: String
    Description: How often AWS Config delivers configuration snapshots
    Default: Six_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
  
  GlobalResourceTypes:
    Type: String
    Description: Whether to include global resource types in recording
    Default: true
    AllowedValues:
      - true
      - false
  
  NotificationEmail:
    Type: String
    Description: Email address to receive AWS Config notifications (leave empty to disable)
    Default: ""
  
  PermissionBoundaryARN:
    Type: String
    Description: ARN of the IAM permission boundary to apply (leave empty to disable)
    Default: ""

Conditions:
  CreateS3Bucket: !Equals [!Ref CreateNewBucket, 'true']
  UsePermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryARN, '']]
  EnableSNSNotifications: !Not [!Equals [!Ref NotificationEmail, '']]
  IncludeGlobalResources: !Equals [!Ref GlobalResourceTypes, 'true']

Resources:
  # S3 Bucket for AWS Config data (if creating new)
  ConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateS3Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ConfigBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ConfigDataRetention
            Status: Enabled
            ExpirationInDays: !Ref RetentionPeriod
      LoggingConfiguration:
        DestinationBucketName: !Ref ConfigBucketName
        LogFilePrefix: access-logs/

  # S3 Bucket Policy to enforce SSL and restrict access
  ConfigBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateS3Bucket
    Properties:
      Bucket: !Ref ConfigBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ForceSSLOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${ConfigBucket}'
              - !Sub 'arn:aws:s3:::${ConfigBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}'
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/Config/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

  # SNS Topic for AWS Config notifications
  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Config Notifications
      TopicName: aws-config-notifications

  # SNS Topic Subscription (if email provided)
  ConfigSNSSubscription:
    Type: AWS::SNS::Subscription
    Condition: EnableSNSNotifications
    Properties:
      TopicArn: !Ref ConfigSNSTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # IAM Role for AWS Config
  ConfigServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole
      PermissionsBoundary: !If [UsePermissionBoundary, !Ref PermissionBoundaryARN, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: ConfigDeliveryPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${ConfigBucketName}/AWSLogs/${AWS::AccountId}/Config/*'
                Condition:
                  StringEquals:
                    's3:x-amz-acl': 'bucket-owner-full-control'
              - Effect: Allow
                Action:
                  - s3:GetBucketAcl
                Resource: !Sub 'arn:aws:s3:::${ConfigBucketName}'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ConfigSNSTopic

  # IAM Role for Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If [UsePermissionBoundary, !Ref PermissionBoundaryARN, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: ConfigRetentionManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:PutConfigurationRecorder
                  - config:PutDeliveryChannel
                  - config:DescribeConfigurationRecorders
                  - config:DescribeDeliveryChannels
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetLifecycleConfiguration
                  - s3:PutLifecycleConfiguration
                Resource: !Sub 'arn:aws:s3:::${ConfigBucketName}'

  # Lambda function for retention management
  RetentionManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import time

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              logger.info('Received event: %s', event)
              
              # Initialize response data
              response_data = {}
              
              try:
                  # Get parameters from the event
                  props = event['ResourceProperties']
                  bucket_name = props.get('BucketName')
                  retention_days = int(props.get('RetentionDays', 2557))
                  delivery_frequency = props.get('DeliveryFrequency', 'Six_Hours')
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      # Update S3 bucket lifecycle if the bucket exists
                      if bucket_name:
                          s3 = boto3.client('s3')
                          try:
                              # Check if bucket exists
                              s3.head_bucket(Bucket=bucket_name)
                              
                              # Update lifecycle configuration
                              lifecycle_config = {
                                  'Rules': [
                                      {
                                          'ID': 'ConfigDataRetention',
                                          'Status': 'Enabled',
                                          'ExpirationInDays': retention_days,
                                          'Prefix': 'AWSLogs/',
                                      }
                                  ]
                              }
                              s3.put_bucket_lifecycle_configuration(
                                  Bucket=bucket_name,
                                  LifecycleConfiguration=lifecycle_config
                              )
                              logger.info(f"Updated S3 bucket {bucket_name} lifecycle to {retention_days} days")
                              response_data['BucketLifecycle'] = f"Updated to {retention_days} days"
                          except s3.exceptions.NoSuchBucket:
                              logger.warning(f"Bucket {bucket_name} does not exist")
                              response_data['BucketLifecycle'] = "Bucket does not exist"
                          except Exception as e:
                              logger.error(f"Error updating bucket lifecycle: {str(e)}")
                              response_data['BucketLifecycle'] = f"Error: {str(e)}"
                      
                      # Update AWS Config delivery channel
                      config = boto3.client('config')
                      try:
                          # Get existing delivery channels
                          delivery_channels = config.describe_delivery_channels()
                          
                          if delivery_channels['DeliveryChannels']:
                              # Update existing delivery channel
                              channel = delivery_channels['DeliveryChannels'][0]
                              channel_name = channel['name']
                              
                              config.put_delivery_channel(
                                  DeliveryChannel={
                                      'name': channel_name,
                                      's3BucketName': bucket_name,
                                      'snsTopicARN': props.get('SNSTopicArn', ''),
                                      'configSnapshotDeliveryProperties': {
                                          'deliveryFrequency': delivery_frequency
                                      }
                                  }
                              )
                              logger.info(f"Updated delivery channel {channel_name} frequency to {delivery_frequency}")
                              response_data['DeliveryChannel'] = f"Updated frequency to {delivery_frequency}"
                          else:
                              logger.warning("No delivery channels found to update")
                              response_data['DeliveryChannel'] = "No channels found"
                      except Exception as e:
                          logger.error(f"Error updating delivery channel: {str(e)}")
                          response_data['DeliveryChannel'] = f"Error: {str(e)}"
                  
                  # Send success response
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # Custom Resource to invoke Lambda for retention management
  RetentionManager:
    Type: Custom::RetentionManager
    Properties:
      ServiceToken: !GetAtt RetentionManagementFunction.Arn
      BucketName: !Ref ConfigBucketName
      RetentionDays: !Ref RetentionPeriod
      DeliveryFrequency: !Ref DeliveryFrequency
      SNSTopicArn: !Ref ConfigSNSTopic

  # AWS Config Recorder
  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: !If [IncludeGlobalResources, true, false]
      RoleARN: !GetAtt ConfigServiceRole.Arn

  # AWS Config Delivery Channel
  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    DependsOn: ConfigRecorder
    Properties:
      Name: default
      S3BucketName: !Ref ConfigBucketName
      S3KeyPrefix: 'AWSLogs'
      SnsTopicARN: !Ref ConfigSNSTopic
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency

Outputs:
  ConfigBucketName:
    Description: Name of the S3 bucket used for AWS Config data
    Value: !Ref ConfigBucketName

  ConfigBucketARN:
    Description: ARN of the S3 bucket used for AWS Config data
    Value: !If [CreateS3Bucket, !GetAtt ConfigBucket.Arn, !Sub 'arn:aws:s3:::${ConfigBucketName}']

  ConfigSNSTopicARN:
    Description: ARN of the SNS topic for AWS Config notifications
    Value: !Ref ConfigSNSTopic

  ConfigRecorderName:
    Description: Name of the AWS Config Recorder
    Value: !Ref ConfigRecorder

  DeliveryChannelName:
    Description: Name of the AWS Config Delivery Channel
    Value: !Ref ConfigDeliveryChannel

  RetentionPeriodDays:
    Description: Number of days AWS Config data will be retained
    Value: !Ref RetentionPeriod