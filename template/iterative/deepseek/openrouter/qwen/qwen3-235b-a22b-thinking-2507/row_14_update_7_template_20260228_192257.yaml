AWSTemplateFormatVersion: '2010-09-09'
Description: 'ENI with secondary IPs and unassociated EIPs - requires manual association after instance attachment'
Parameters:
  SubnetId:
    Description: 'Subnet for ENI (OVERRIDE in production). Default: valid format placeholder'
    Type: AWS::EC2::Subnet::Id
    Default: 'subnet-00000000'
  SecondaryPrivateIp1:
    Description: 'First secondary IP (OVERRIDE in production). Default: TEST-NET-3 address'
    Type: String
    Default: '192.0.2.100'
    AllowedPattern: '^([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\.([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])){3}$'
    ConstraintDescription: Must be valid IPv4 address
  SecondaryPrivateIp2:
    Description: 'Second secondary IP (OVERRIDE in production). Default: TEST-NET-3 address'
    Type: String
    Default: '192.0.2.101'
    AllowedPattern: '^([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\.([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])){3}$'
    ConstraintDescription: Must be valid IPv4 address and different from first IP
Resources:
  PrimaryNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      SourceDestCheck: false
      SecondaryPrivateIpAddresses:
        - !Ref SecondaryPrivateIp1
        - !Ref SecondaryPrivateIp2
  PublicElasticIp1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  PublicElasticIp2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
Outputs:
  NetworkInterfaceId:
    Description: ID of ENI (attach to EC2 instance FIRST before association)
    Value: !Ref PrimaryNetworkInterface
  EipAllocationId1:
    Description: Allocation ID for first EIP (use with EC2 AttachNetworkInterface THEN associate)
    Value: !GetAtt PublicElasticIp1.AllocationId
  EipAllocationId2:
    Description: Allocation ID for second EIP (use with EC2 AttachNetworkInterface THEN associate)
    Value: !GetAtt PublicElasticIp2.AllocationId
  PublicIp1:
    Description: First public IP (unassociated - associate AFTER attaching ENI to instance)
    Value: !GetAtt PublicElasticIp1.PublicIp
  PublicIp2:
    Description: Second public IP (unassociated - associate AFTER attaching ENI to instance)
    Value: !GetAtt PublicElasticIp2.PublicIp
  PrivateIp1:
    Description: First secondary private IP address
    Value: !Ref SecondaryPrivateIp1
  PrivateIp2:
    Description: Second secondary private IP address
    Value: !Ref SecondaryPrivateIp2