AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard for NAT Gateway VPC Flow Logs Analysis

Parameters:
  LogGroupName:
    Type: String
    Default: '/aws/vpc/flow-logs'
    Description: CloudWatch Log Group name where VPC Flow Logs are stored
  DashboardName:
    Type: String
    Default: 'NATGatewayFlowLogsDashboard'
    Description: Name for the CloudWatch Dashboard
  TimeRange:
    Type: String
    Default: '3h'
    Description: Time range for the dashboard widgets

Resources:
  DashboardRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - logs.amazonaws.com
                - cloudwatch.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: CloudWatchLogsInsightsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:GetDashboard
                  - cloudwatch:PutDashboard
                Resource: '*'

  QueryDefinitionTopSourceIPsOutbound:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsOutbound
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and destinationPort != 22
        | stats sum(bytes) as bytes by srcAddr
        | sort bytes desc
        | limit 10

  QueryDefinitionTopSourceIPsRejected:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopSourceIPsRejected
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedConnections by srcAddr
        | sort rejectedConnections desc
        | limit 10

  QueryDefinitionTopDestinationIPs:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TopDestinationIPs
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and destinationPort != 22
        | stats sum(bytes) as bytes by dstAddr
        | sort bytes desc
        | limit 10

  QueryDefinitionTrafficOverTime:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: TrafficOverTime
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        filter interfaceId like 'eni-' and destinationPort != 22
        | stats sum(bytes) as bytes by bin(1h)
        | sort bin asc

  NATGatewayFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '~${QueryDefinitionTopSourceIPsOutbound}' | head 100",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic",
                "timeRange": { "type": "relative", "range": "${TimeRange}", "unit": "hours" }
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '~${QueryDefinitionTopSourceIPsRejected}' | head 100",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connections",
                "timeRange": { "type": "relative", "range": "${TimeRange}", "unit": "hours" }
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '~${QueryDefinitionTopDestinationIPs}' | head 100",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Outbound Traffic",
                "timeRange": { "type": "relative", "range": "${TimeRange}", "unit": "hours" }
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '~${QueryDefinitionTrafficOverTime}' | head 100",
                "view": "timeSeries",
                "region": "${AWS::Region}",
                "title": "Traffic Volume Over Time",
                "timeRange": { "type": "relative", "range": "${TimeRange}", "unit": "hours" }
              }
            }
          ]
        }

Outputs:
  DashboardUrl:
    Description: URL for the CloudWatch Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}