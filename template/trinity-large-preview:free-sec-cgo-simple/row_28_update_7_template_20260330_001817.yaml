AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated monitoring and notification system for AWS Secrets Manager secret lifecycle events

Parameters:
  SecretName:
    Type: String
    Default: MySecret
    Description: Name of the Secrets Manager secret to monitor
  RotationLambdaArn:
    Type: String
    Default: ''
    Description: ARN of the rotation lambda function (optional)
  SNSTopicName:
    Type: String
    Default: SecretsManagerNotifications
    Description: Name of the SNS topic for notifications
  SNSEmail:
    Type: String
    Default: admin@example.com
    Description: Email address to subscribe to notifications

Resources:
  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Secret for automated monitoring and notification system

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: Production

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def lambda_handler(event, context):
              sns_client = boto3.client('sns')
              topic_arn = os.environ['SNS_TOPIC_ARN']
              message = json.dumps(event)
              sns_client.publish(
                  TopicArn=topic_arn,
                  Subject='Secrets Manager Event Notification',
                  Message=message
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Notification sent successfully')
              }
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SNSTopic
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: LambdaSecurityGroup

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: LambdaSubnet

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: LambdaVPC

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret/${SecretName}*'
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SNSTopic

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: SecretsManagerEventTarget

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventRule.Arn

  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref SecretsManagerSecret
      RotationLambdaARN: !Ref RotationLambdaArn
      RotationRules:
        AutomaticallyAfterDays: 30

  SNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref SNSEmail
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  LambdaFunctionARN:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn