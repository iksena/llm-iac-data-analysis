AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for enabling AWS Macie session'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: Frequency for publishing updated findings

  SessionStatus:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED
    Description: Status of the Macie session

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: !Ref SessionStatus
      FindingPublishingFrequency: !Ref FindingPublishingFrequency

Outputs:
  MacieSessionId:
    Description: The unique identifier for the Macie session
    Value: !Ref MacieSession