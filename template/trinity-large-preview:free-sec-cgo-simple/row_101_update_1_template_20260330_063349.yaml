AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with Flow Logging to S3 Bucket

Parameters:
  LogPrefix:
    Type: String
    Default: vpc-flow-logs/
    Description: Optional prefix for log files in the S3 bucket

Resources:
  FlowLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${Bucket}/${Prefix}AWSLogs/${AccountID}/*
              - Bucket: !Ref FlowLogBucket
                Prefix: !Ref LogPrefix
                AccountID: !Ref 'AWS::AccountId'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      FlowLogConfiguration:
        DestinationType: s3
        DestinationArn: !GetAtt FlowLogBucket.Arn
        Format: json
        LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'
        TrafficType: ALL
        FileFormat: json
        FileFormatVersion: '2'
        LogDestinationType: s3
        LogDestination: !GetAtt FlowLogBucket.Arn
        LogDestinationPrefix: !Ref LogPrefix

Outputs:
  FlowLogBucketName:
    Description: Name of the S3 bucket storing VPC flow logs
    Value: !Ref FlowLogBucket