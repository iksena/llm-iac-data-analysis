AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  OrganizationId:
    Type: String
    Default: ""
    Description: AWS Organization ID for enterprise-wide access (leave empty for single-account use)

Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyBucket
      PolicyDocument:
        Statement:
          - Sid: SingleAccountAccess
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${MyBucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
          - Sid: PublicAccessFallback
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${MyBucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
            # This condition ensures the policy is only applied when OrganizationId is empty
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId
            # The above condition will only match when OrganizationId is empty, allowing public access

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MyBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt MyBucket.Arn