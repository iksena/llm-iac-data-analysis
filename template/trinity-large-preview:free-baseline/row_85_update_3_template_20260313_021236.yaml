AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for CloudWatch export data with versioning and lifecycle management'

Parameters:
  BucketName:
    Type: String
    Default: cloudwatch-exports
    Description: Name of the S3 bucket for CloudWatch exports
  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable S3 versioning
  LifecycleEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable lifecycle management
  TransitionToIA:
    Type: Number
    Default: 30
    Description: Days before moving objects to Infrequent Access
  TransitionToGlacier:
    Type: Number
    Default: 60
    Description: Days before moving objects to Glacier

Conditions:
  VersioningEnabled:
    !Equals [!Ref VersioningEnabled, 'true']
  LifecycleEnabled:
    !Equals [!Ref LifecycleEnabled, 'true']

Resources:
  CloudWatchExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !If [VersioningEnabled, 'Enabled', 'Suspended']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: !If [LifecycleEnabled, 'Enabled', 'Disabled']
            Transition:
              Days: !Ref TransitionToIA
              StorageClass: INTELLIGENT_TIERING
          - Id: TransitionToGlacier
            Status: !If [LifecycleEnabled, 'Enabled', 'Disabled']
            Transition:
              Days: !Ref TransitionToGlacier
              StorageClass: GLACIER
          - Id: ExpireOldVersions
            Status: !If [LifecycleEnabled, 'Enabled', 'Disabled']
            NoncurrentVersionExpiration:
              NoncurrentDays: 365

Outputs:
  BucketName:
    Description: Name of the CloudWatch exports S3 bucket
    Value: !Ref CloudWatchExportsBucket