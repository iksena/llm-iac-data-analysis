AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for creating an SNS topic with email subscription to test@test.com

Resources:
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: TestNotificationTopic
      TopicName: TestNotificationTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: test@test.com
      Protocol: email
      TopicArn: !Ref NotificationTopic

Outputs:
  TopicARN:
    Description: ARN of the created SNS topic
    Value: !Ref NotificationTopic
  SubscriptionARN:
    Description: ARN of the created subscription
    Value: !Ref EmailSubscription