AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus
      Description: Event bus for routing custom events to external API

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: ApiKey
        ApiKeyValue: '{{resolve:secretsmanager:MyApiKeySecret:SecretString:apiKey}}'
      Description: Connection to external API with API key authentication
      Name: ExternalApiConnection

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      Description: API destination for external webhook
      Endpoint: https://webhook.site/testtest
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1
      Name: WebhookApiDestination

  ApiDestinationRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "com.example"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ApiDestination.Arn
          Id: WebhookTarget

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  ConnectionArn:
    Description: ARN of the API connection
    Value: !GetAtt ApiConnection.Arn
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn