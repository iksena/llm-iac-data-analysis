AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DemoSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Demo CLI Events Topic
      TopicName: DemoCLIEventTopic

  DemoSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref DemoSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref DemoSNSTopic

  DemoEventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DemoCLIEventRule
      Description: Rule for demo.cli source events
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref DemoSNSTopic
          Id: DemoCLIEventTarget

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref DemoSNSTopic
  EventBridgeRuleARN:
    Description: ARN of the EventBridge rule
    Value: !GetAtt DemoEventBridgeRule.Arn