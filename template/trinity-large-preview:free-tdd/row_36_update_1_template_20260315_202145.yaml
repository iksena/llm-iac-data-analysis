AWSTemplateFormatVersion: '2010-09-09'
Description: MySQL RDS instance with VPC, Secrets Manager integration, and secure network isolation

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCIDR1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for subnet 1
  SubnetCIDR2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for subnet 2
  DBName:
    Type: String
    Default: MyDatabase
    Description: The database name
  DBUsername:
    Type: String
    Default: admin
    Description: The database admin username
  DBClass:
    Type: String
    Default: db.t3.micro
    Description: The database instance class
  DBAllocatedStorage:
    Type: Number
    Default: 20
    Description: The size of the database (GiB)
  DBEngine:
    Type: String
    Default: mysql
    Description: The database engine
  DBEngineVersion:
    Type: String
    Default: 8.0.30
    Description: The database engine version
  DBParameterGroupFamily:
    Type: String
    Default: mysql8.0
    Description: The database parameter group family

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: RDS-VPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR1
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: RDS-Subnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR2
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: RDS-Subnet2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for RDS instances
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for MySQL
      Family: !Ref DBParameterGroupFamily
      Parameters:
        max_connections: 200

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: RDSAdminSecret
      Description: Secret for RDS admin credentials
      GenerateSecretString:
        SecretStringTemplate: !Join ['', ['{"username":"', !Ref DBUsername, '"}']]
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      DBInstanceClass: !Ref DBClass
      Engine: !Ref DBEngine
      EngineVersion: !Ref DBEngineVersion
      AllocatedStorage: !Ref DBAllocatedStorage
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBSecret
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

Outputs:
  DatabaseEndpoint:
    Description: Endpoint for the RDS instance
    Value: !GetAtt DBInstance.Endpoint.Address
  DatabasePort:
    Description: Port for the RDS instance
    Value: !GetAtt DBInstance.Endpoint.Port
  SecretARN:
    Description: ARN of the Secrets Manager secret
    Value: !Ref DBSecret