AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with S3, Lambda, and Cognito

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: Name of the S3 bucket for website hosting
  LambdaFunctionName:
    Type: String
    Default: SlotMachineLambda
    Description: Name of the Lambda function for slot machine logic
  IdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool
  CustomResourceFunctionName:
    Type: String
    Default: WebsiteDeployerLambda
    Description: Name of the Lambda function for custom resource deployment

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${WebsiteBucketName}/*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-ExecutionRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import random

          def lambda_handler(event, context):
              symbols = ['🍒', '🍋', '🍇', '🔔', '💎', '7️⃣']
              spin_result = [random.choice(symbols) for _ in range(3)]
              win = spin_result[0] == spin_result[1] == spin_result[2]
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'spin': spin_result,
                      'win': win
                  })
              }

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: true

  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${IdentityPoolName}-UnauthRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

  CustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${CustomResourceFunctionName}-Role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${WebsiteBucketName}/*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  WebsiteDeployerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref CustomResourceFunctionName
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CustomResourceRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib.request
          import zipfile
          import io
          import re

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      s3 = boto3.client('s3')
                      lambda_client = boto3.client('lambda')

                      # Download pre-built ZIP
                      url = 'https://example.com/slot-machine-website.zip'
                      with urllib.request.urlopen(url) as response:
                          zip_data = response.read()

                      # Extract and modify HTML
                      with zipfile.ZipFile(io.BytesIO(zip_data)) as z:
                          for file_name in z.namelist():
                              with z.open(file_name) as f:
                                  content = f.read().decode('utf-8')
                                  if file_name == 'index.html':
                                      # Inject Cognito and region configs
                                      region = boto3.session.Session().region_name
                                      identity_pool_id = event['ResourceProperties']['IdentityPoolId']
                                      content = re.sub(
                                          r'REGION_PLACEHOLDER',
                                          region,
                                          content
                                      )
                                      content = re.sub(
                                          r'IDENTITY_POOL_ID_PLACEHOLDER',
                                          identity_pool_id,
                                          content
                                      )
                                  s3.put_object(
                                      Bucket=event['ResourceProperties']['BucketName'],
                                      Key=file_name,
                                      Body=content,
                                      ContentType='text/html' if file_name.endswith('.html') else 'application/octet-stream',
                                      ACL='public-read'
                                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  WebsiteDeployerCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt WebsiteDeployerLambda.Arn
      BucketName: !Ref WebsiteBucketName
      IdentityPoolId: !Ref CognitoIdentityPool

Outputs:
  WebsiteURL:
    Description: URL of the slot machine website
    Value: !GetAtt WebsiteBucket.WebsiteURL
  WebsiteDomainName:
    Description: HTTPS DomainName of the S3 bucket
    Value: !Sub '${WebsiteBucketName}.s3-website-${AWS::Region}.amazonaws.com'