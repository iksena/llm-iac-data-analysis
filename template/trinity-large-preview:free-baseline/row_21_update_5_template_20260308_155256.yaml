AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create Amazon Timestream database and tables with configurable retention policies

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-poc-db
    Description: Name of the Timestream database
  BatchWriteTableName:
    Type: String
    Default: poc-table-01-batch-write
    Description: Name of the batch write table
  OlderRecordsMemOnlyTableName:
    Type: String
    Default: poc-table-02-older-records-memonly
    Description: Name of the older records memory-only table
  OlderRecordsMagneticTableName:
    Type: String
    Default: poc-table-03-older-records-magnetic
    Description: Name of the older records magnetic table
  CommonAttributesTableName:
    Type: String
    Default: poc-table-04-common-attributes
    Description: Name of the common attributes table
  MagneticStoreRetentionPeriodInDays:
    Type: Number
    Default: 365
    Description: Magnetic store retention period in days
  MemoryStoreRetentionPeriodInHours:
    Type: Number
    Default: 24
    Description: Memory store retention period in hours

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      KmsKeyId: alias/aws/timestream

  BatchWriteTable:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: !Ref BatchWriteTableName
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionPeriodInDays
        MemoryStoreRetentionPeriodInHours: !Ref MemoryStoreRetentionPeriodInHours

  OlderRecordsMemOnlyTable:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: !Ref OlderRecordsMemOnlyTableName
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionPeriodInDays
        MemoryStoreRetentionPeriodInHours: !Ref MemoryStoreRetentionPeriodInHours

  OlderRecordsMagneticTable:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: !Ref OlderRecordsMagneticTableName
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionPeriodInDays
        MemoryStoreRetentionPeriodInHours: !Ref MemoryStoreRetentionPeriodInHours

  CommonAttributesTable:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: !Ref CommonAttributesTableName
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionPeriodInDays
        MemoryStoreRetentionPeriodInHours: !Ref MemoryStoreRetentionPeriodInHours

Outputs:
  DatabaseArn:
    Description: Timestream Database ARN
    Value: !GetAtt TimestreamDatabase.Arn
  BatchWriteTableArn:
    Description: Batch Write Table ARN
    Value: !GetAtt BatchWriteTable.Arn
  OlderRecordsMemOnlyTableArn:
    Description: Older Records Memory-Only Table ARN
    Value: !GetAtt OlderRecordsMemOnlyTable.Arn
  OlderRecordsMagneticTableArn:
    Description: Older Records Magnetic Table ARN
    Value: !GetAtt OlderRecordsMagneticTable.Arn
  CommonAttributesTableArn:
    Description: Common Attributes Table ARN
    Value: !GetAtt CommonAttributesTable.Arn