AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production Web Server Environment with VPC, EC2, and Apache/PHP'

Parameters:
  KeyPairName:
    Type: String
    Description: 'Name of existing EC2 KeyPair for SSH access (optional)'
    Default: ''
  
  WebContentS3Bucket:
    Type: String
    Description: 'S3 bucket containing web content ZIP file (optional)'
    Default: ''
    AllowedPattern: '^[a-zA-Z0-9-]*$|^$'
    ConstraintDescription: 'Bucket name can include numbers, lowercase letters, uppercase letters, and hyphens (-)'
  
  WebContentS3Key:
    Type: String
    Description: 'S3 key (path) to web content ZIP file (optional)'
    Default: ''
    AllowedPattern: '^[a-zA-Z0-9-/_.]*$|^$'
    ConstraintDescription: 'S3 key can include numbers, letters, hyphens (-), forward slashes (/), underscores (_), and periods (.)'

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasS3Content: !And 
    - !Not [!Equals [!Ref WebContentS3Bucket, '']]
    - !Not [!Equals [!Ref WebContentS3Key, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - !If 
          - HasKeyPair
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
          - !Ref AWS::NoValue

  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !If 
          - HasS3Content
          - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
          - !Ref AWS::NoValue
      Path: /

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: AttachGateway
    Properties:
      InstanceType: t2.micro
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData: 
        Fn::Base64: !Sub 
          - |
            #!/bin/bash -xe
            # Install required packages
            yum update -y
            yum install -y httpd php
            
            # Start and enable Apache
            systemctl start httpd
            systemctl enable httpd
            
            # Create default content if no S3 content specified
            if [ "${HasS3Content}" = "true" ]; then
              yum install -y unzip
              aws s3 cp s3://${WebContentS3Bucket}/${WebContentS3Key} /tmp/content.zip
              unzip /tmp/content.zip -d /var/www/html/
            else
              echo "<html><body><h1>Welcome to Apache Web Server</h1><p>Default test page</p></body></html>" > /var/www/html/index.html
            fi
            
            chmod -R 755 /var/www/html/
            systemctl restart httpd
          - {HasS3Content: !If [HasS3Content, 'true', 'false']}
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServer

Outputs:
  WebsiteURL:
    Description: Website URL
    Value: !Sub http://${WebServerInstance.PublicDnsName}
  
  PublicIP:
    Description: Server Public IP
    Value: !GetAtt WebServerInstance.PublicIp
  
  VPCId:
    Description: VPC ID
    Value: !Ref VPC