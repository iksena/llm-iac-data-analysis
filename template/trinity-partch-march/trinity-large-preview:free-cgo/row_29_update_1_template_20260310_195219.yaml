AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval workflows using AWS Systems Manager Parameter Store and Secrets Manager

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/config/value"
      Type: String
      Value: "This is A/B"

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-secret"
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "admin"}'
        GenerateStringKey: "password"
        ExcludeCharacters: "/@\""

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ParameterRetriever"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              # Retrieve SSM parameter
              ssm_response = ssm_client.get_parameter(
                  Name=f"/{context.function_name.split('-')[0]}/config/value",
                  WithDecryption=False
              )
              ssm_value = ssm_response['Parameter']['Value']

              # Retrieve Secrets Manager secret
              secrets_response = secrets_client.get_secret_value(
                  SecretId=context.function_name.split('-')[0] + '-secret'
              )
              secrets_value = json.loads(secrets_response['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secrets_value': secrets_value
                  })
              }

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  SSMParameterName:
    Description: Name of the SSM parameter
    Value: !Ref SSMParameter
  SecretsManagerSecretArn:
    Description: ARN of the Secrets Manager secret
    Value: !Ref SecretsManagerSecret