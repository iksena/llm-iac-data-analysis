AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway integrated with Amazon Kinesis Data Streams'

Parameters:
  KinesisStreamName:
    Type: String
    Default: 'kinesis-api-stream'
    Description: 'Name of the Kinesis Data Stream'
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards in the Kinesis stream'
  ApiGatewayStageName:
    Type: String
    Default: 'prod'
    Description: 'API Gateway deployment stage name'

Resources:
  KinesisStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount
      RetentionPeriodHours: 24

  KinesisAPIGatewayRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'KinesisAPIGatewayExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'apigateway.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
      Policies:
        - PolicyName: 'KinesisAccessPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kinesis:PutRecord'
                  - 'kinesis:PutRecords'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                  - 'kinesis:DescribeStream'
                  - 'kinesis:ListStreams'
                Resource: !GetAtt KinesisStream.Arn

  PutRecordFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'PutRecordHandler'
      Runtime: 'python3.12'
      Handler: 'put_record.lambda_handler'
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import base64
          import boto3
          import os
          from http import HTTPStatus

          kinesis_client = boto3.client('kinesis')
          stream_name = os.environ['STREAM_NAME']

          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  partition_key = body.get('partitionKey')
                  data = body.get('data')

                  if not partition_key or not data:
                      return {
                          'statusCode': HTTPStatus.BAD_REQUEST,
                          'body': json.dumps({'error': 'partitionKey and data are required'})
                      }

                  kinesis_client.put_record(
                      StreamName=stream_name,
                      Data=base64.b64decode(data),
                      PartitionKey=partition_key
                  )

                  return {
                      'statusCode': HTTPStatus.OK,
                      'body': json.dumps({'message': 'Record successfully added'})
                  }
              except Exception as e:
                  return {
                      'statusCode': HTTPStatus.INTERNAL_SERVER_ERROR,
                      'body': json.dumps({'error': str(e)})
                  }

  PutRecordsFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'PutRecordsHandler'
      Runtime: 'python3.12'
      Handler: 'put_records.lambda_handler'
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import base64
          import boto3
          import os
          from http import HTTPStatus

          kinesis_client = boto3.client('kinesis')
          stream_name = os.environ['STREAM_NAME']

          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  records = body.get('records', [])

                  if not records:
                      return {
                          'statusCode': HTTPStatus.BAD_REQUEST,
                          'body': json.dumps({'error': 'records array is required'})
                      }

                  kinesis_records = []
                  for record in records:
                      partition_key = record.get('partitionKey')
                      data = record.get('data')
                      if partition_key and data:
                          kinesis_records.append({
                              'Data': base64.b64decode(data),
                              'PartitionKey': partition_key
                          })

                  if kinesis_records:
                      kinesis_client.put_records(
                          StreamName=stream_name,
                          Records=kinesis_records
                      )

                  return {
                      'statusCode': HTTPStatus.OK,
                      'body': json.dumps({'message': 'Records successfully added'})
                  }
              except Exception as e:
                  return {
                      'statusCode': HTTPStatus.INTERNAL_SERVER_ERROR,
                      'body': json.dumps({'error': str(e)})
                  }

  GetRecordsFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'GetRecordsHandler'
      Runtime: 'python3.12'
      Handler: 'get_records.lambda_handler'
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from http import HTTPStatus

          kinesis_client = boto3.client('kinesis')
          stream_name = os.environ['STREAM_NAME']

          def lambda_handler(event, context):
              try:
                  query_params = event['queryStringParameters'] or {}
                  shard_id = query_params.get('shardId')
                  shard_iterator_type = query_params.get('shardIteratorType', 'LATEST')
                  starting_sequence_number = query_params.get('startingSequenceNumber')

                  if not shard_id:
                      return {
                          'statusCode': HTTPStatus.BAD_REQUEST,
                          'body': json.dumps({'error': 'shardId is required'})
                      }

                  shard_iterator_params = {
                      'StreamName': stream_name,
                      'ShardId': shard_id,
                      'ShardIteratorType': shard_iterator_type
                  }

                  if starting_sequence_number:
                      shard_iterator_params['StartingSequenceNumber'] = starting_sequence_number

                  response = kinesis_client.get_shard_iterator(**shard_iterator_params)
                  shard_iterator = response['ShardIterator']

                  records_response = kinesis_client.get_records(ShardIterator=shard_iterator)

                  return {
                      'statusCode': HTTPStatus.OK,
                      'body': json.dumps({
                          'records': [
                              {
                                  'sequenceNumber': record['SequenceNumber'],
                                  'data': base64.b64encode(record['Data']).decode('utf-8'),
                                  'partitionKey': record['PartitionKey']
                              }
                              for record in records_response['Records']
                          ],
                          'nextShardIterator': records_response.get('NextShardIterator')
                      })
                  }
              except Exception as e:
                  return {
                      'statusCode': HTTPStatus.INTERNAL_SERVER_ERROR,
                      'body': json.dumps({'error': str(e)})
                  }

  StreamMetadataFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: 'StreamMetadataHandler'
      Runtime: 'python3.12'
      Handler: 'stream_metadata.lambda_handler'
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          from http import HTTPStatus

          kinesis_client = boto3.client('kinesis')
          stream_name = os.environ['STREAM_NAME']

          def lambda_handler(event, context):
              try:
                  response = kinesis_client.describe_stream(StreamName=stream_name)
                  stream_description = response['StreamDescription']

                  return {
                      'statusCode': HTTPStatus.OK,
                      'body': json.dumps({
                          'streamName': stream_description['StreamName'],
                          'streamARN': stream_description['StreamARN'],
                          'streamStatus': stream_description['StreamStatus'],
                          'shardCount': stream_description['Shards']
                      })
                  }
              except Exception as e:
                  return {
                      'statusCode': HTTPStatus.INTERNAL_SERVER_ERROR,
                      'body': json.dumps({'error': str(e)})
                  }

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'KinesisAPIGatewayLambdaExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'KinesisAccessPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kinesis:PutRecord'
                  - 'kinesis:PutRecords'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                  - 'kinesis:DescribeStream'
                  - 'kinesis:ListStreams'
                Resource: !GetAtt KinesisStream.Arn

  APIGatewayRestApi:
    Type: 'AWS::ApiGateway::RestApi'
    Properties:
      Name: 'KinesisAPIGateway'
      Description: 'REST API Gateway for Kinesis Data Streams'

  RecordsResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: 'records'

  BatchResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: 'batch'

  MetadataResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: 'metadata'

  PutRecordMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: 'PUT'
      AuthorizationType: 'NONE'
      Integration:
        Type: 'AWS_PROXY'
        IntegrationHttpMethod: 'POST'
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt PutRecordFunction.Arn

  PutRecordsMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref BatchResource
      HttpMethod: 'PUT'
      AuthorizationType: 'NONE'
      Integration:
        Type: 'AWS_PROXY'
        IntegrationHttpMethod: 'POST'
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt PutRecordsFunction.Arn

  GetRecordsMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: 'GET'
      AuthorizationType: 'NONE'
      Integration:
        Type: 'AWS_PROXY'
        IntegrationHttpMethod: 'POST'
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt GetRecordsFunction.Arn

  GetMetadataMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref MetadataResource
      HttpMethod: 'GET'
      AuthorizationType: 'NONE'
      Integration:
        Type: 'AWS_PROXY'
        IntegrationHttpMethod: 'POST'
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt StreamMetadataFunction.Arn

  APIGatewayDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      StageName: !Ref ApiGatewayStageName
    DependsOn:
      - PutRecordMethod
      - PutRecordsMethod
      - GetRecordsMethod
      - GetMetadataMethod

  PutRecordFunctionPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt PutRecordFunction.Arn
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGatewayRestApi}/*/*/*'

  PutRecordsFunctionPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt PutRecordsFunction.Arn
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGatewayRestApi}/*/*/*'

  GetRecordsFunctionPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt GetRecordsFunction.Arn
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGatewayRestApi}/*/*/*'

  StreamMetadataFunctionPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt StreamMetadataFunction.Arn
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${APIGatewayRestApi}/*/*/*'

Outputs:
  KinesisStreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn
  APIGatewayEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${APIGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStageName}'