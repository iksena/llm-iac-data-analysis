AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe Products API'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Required Configuration"
        Parameters:
          - StripeApiKey
      - Label:
          default: "Optional Configuration"
        Parameters:
          - SourceAppName
    ParameterLabels:
      StripeApiKey:
        default: "Stripe Secret API Key (Required)"
      SourceAppName:
        default: "Source Application Name (Optional)"

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: |
      [REQUIRED] Enter your Stripe Secret API Key for authentication. 
      This key must start with 'sk_test_' for test keys or 'sk_live_' for live keys.
      Example: sk_test_1234567890abcdefghijklmn
      Note: This is a required parameter and must be provided during stack creation.
    MinLength: 20
    MaxLength: 100
    AllowedPattern: '^sk_(test|live)_[A-Za-z0-9]+$'
    ConstraintDescription: 'Must be a valid Stripe API key starting with sk_test_ or sk_live_'

  SourceAppName:
    Type: String
    Default: 'PartnerApp'
    Description: 'Source application name for events (defaults to PartnerApp if not specified)'
    AllowedPattern: '[A-Za-z0-9-_]+'
    ConstraintDescription: 'Source app name must contain only alphanumeric characters, hyphens, and underscores'

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-stripe-integration'
      Tags:
        - Key: Purpose
          Value: StripeIntegration
        - Key: Stack
          Value: !Ref AWS::StackName

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeApiDestinationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'
      Tags:
        - Key: Purpose
          Value: StripeIntegration
        - Key: Stack
          Value: !Ref AWS::StackName

  StripeApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub 'Bearer ${StripeApiKey}'
      Description: !Sub 'Stripe API Connection for ${AWS::StackName}'
      Name: !Sub '${AWS::StackName}-stripe-connection'

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt StripeApiConnection.Arn
      Description: !Sub 'Stripe Products API Destination for ${AWS::StackName}'
      HttpMethod: POST
      InvocationEndpoint: 'https://api.stripe.com/v1/products'
      InvocationRateLimitPerSecond: 1
      Name: !Sub '${AWS::StackName}-stripe-destination'

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      Description: 'Forward product creation events to Stripe API'
      EventPattern:
        source:
          - !Ref SourceAppName
        detail-type:
          - PartnerAppDetailType
      Name: !Sub '${AWS::StackName}-stripe-rule'
      State: ENABLED
      Targets:
        - Id: StripeProductsTarget
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              productName: "$.detail.name"
              productDescription: "$.detail.description"
            InputTemplate: '{"name": <productName>, "description": <productDescription>}'

Outputs:
  EventBusArn:
    Description: 'Event Bus ARN'
    Value: !GetAtt CustomEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'

  EventBusName:
    Description: 'Event Bus Name'
    Value: !Ref CustomEventBus
    Export:
      Name: !Sub '${AWS::StackName}-EventBusName'

  ConnectionArn:
    Description: 'Stripe API Connection ARN'
    Value: !GetAtt StripeApiConnection.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ConnectionArn'

  ApiDestinationArn:
    Description: 'Stripe API Destination ARN'
    Value: !GetAtt StripeApiDestination.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ApiDestinationArn'

  RuleArn:
    Description: 'EventBridge Rule ARN'
    Value: !GetAtt EventRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'