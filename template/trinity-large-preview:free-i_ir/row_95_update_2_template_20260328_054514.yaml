AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM Automation for Nginx Installation and Validation

Resources:
  SSMRole:
    Type: AWS::IAM::InstanceProfile
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: t3.micro
      IamInstanceProfile: !Ref SSMRole
      Tags:
        - Key: nginx
          Value: Yes
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '1.0'
        description: Install Nginx and validate
        parameters: {}
        mainSteps:
          - name: UpdateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo shutdown -r now
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum install -y nginx
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/ || exit 1
      DocumentType: Automation
      Tags:
        - Key: nginx
          Value: Yes

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  AutomationDocumentName:
    Description: SSM Automation Document Name
    Value: !Ref SSMAutomationDocument