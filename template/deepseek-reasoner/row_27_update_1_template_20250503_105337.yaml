AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for Kinesis Data Stream
  BufferInterval:
    Type: Number
    Default: 60
    Description: Buffer interval in seconds for Firehose delivery
  BufferSize:
    Type: Number
    Default: 1
    Description: Buffer size in MBs for Firehose delivery

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: !Ref ShardCount

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:ListShards
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub "${S3Bucket.Arn}/*"

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        BufferingHints:
          IntervalInSeconds: !Ref BufferInterval
          SizeInMBs: !Ref BufferSize
        CompressionFormat: GZIP
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: data/
        ErrorOutputPrefix: errors/
        EncryptionConfiguration:
          NoEncryptionConfig: NoEncryption

Outputs:
  KinesisStreamName:
    Value: !Ref KinesisStream
  FirehoseDeliveryStreamName:
    Value: !Ref FirehoseDeliveryStream
  S3BucketName:
    Value: !Ref S3Bucket