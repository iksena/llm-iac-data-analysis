AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Parameter Storage and Retrieval Workflows using SSM Parameter Store and Secrets Manager

Parameters:
  StackName:
    Type: String
    Default: secure-parameter-store
    Description: Name of the CloudFormation stack
  SecretUsername:
    Type: String
    Default: app-user
    Description: Username for the Secrets Manager secret

Resources:
  # SSM Parameter for non-sensitive configuration
  ABTestParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${StackName}/config/ab-test
      Type: String
      Value: This is A/B
      Description: A/B test configuration parameter

  # Secrets Manager secret with dynamic password
  ApplicationSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub /${StackName}/secrets/app-credentials
      Description: Application credentials with dynamic password
      SecretString: !Sub |
        {
          "username": "${SecretUsername}",
          "password": "DynamicallyGeneratedPassword"
        }
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${SecretUsername}"}'
        GenerateStringKey: "password"
        ExcludeCharacters: "\"@/\\"
        PasswordLength: 32

  # Lambda function for parameter retrieval
  ParameterRetrievalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${StackName}-ParameterRetrievalFunction
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              try:
                  # Retrieve SSM parameters
                  ssm_params = ssm_client.get_parameters(
                      Names=[
                          f"/{event['stack_name']}/config/ab-test"
                      ],
                      WithDecryption=True
                  )

                  # Retrieve Secrets Manager secret
                  secret = secrets_client.get_secret_value(
                      SecretId=f"/{event['stack_name']}/secrets/app-credentials"
                  )

                  # Parse and return results
                  ssm_values = {param['Name']: param['Value'] for param in ssm_params['Parameters']}
                  secret_values = json.loads(secret['SecretString'])

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'ssm_parameters': ssm_values,
                          'secret': secret_values
                      })
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # IAM Policy for SSM access
  LambdaSSMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${StackName}-LambdaSSMPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
            Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/*
      Roles:
        - !Ref LambdaExecutionRole

  # IAM Policy for Secrets Manager access
  LambdaSecretsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${StackName}-LambdaSecretsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret/${StackName}/*
      Roles:
        - !Ref LambdaExecutionRole

  # CloudWatch Log Group for Lambda function
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${StackName}-ParameterRetrievalFunction
      RetentionInDays: 30

Outputs:
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref ParameterRetrievalFunction
  SecretARN:
    Description: ARN of the Secrets Manager secret
    Value: !Ref ApplicationSecret
  SSMParameterName:
    Description: Name of the SSM parameter
    Value: !Ref ABTestParameter