AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drives in default VPC using latest Amazon Linux 2 AMI'

Parameters:
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: 'Name of an existing EC2 KeyPair to enable SSH access (create with CLI first)'
  InstanceType:
    Type: String
    Default: 'm5d.large'
    Description: 'EC2 instance type (m5d.large supports ephemeral instance store)'
    AllowedValues:
      - 'm5d.large'
      - 'm5d.xlarge'
      - 'c5d.large'
    ConstraintDescription: 'must be a valid instance type with instance store support'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VpcId of the pre-existing default VPC'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'SubnetId in the default VPC'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR IP range allowed to access EC2 instance on SSH (22)'
    AllowedPattern: '^((\\d{1,3}\\.){3}\\d{1,3}(/([0-2][0-9]|3[0-2]))?)$'
    ConstraintDescription: 'must be a valid CIDR range (e.g., 203.0.113.0/24 or 0.0.0.0/0)'

Resources:
  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for EC2 instance with SSH access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  Ec2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id::/aws/service/ami-amazon-linux-latest/al2-ami-kernel-5.10-hvm-2.0-x86_64-gp2'
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2'
    DependsOn: InstanceSecurityGroup

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref Ec2Instance
  PublicIpAddress:
    Description: 'Public IP of the EC2 Instance (use for SSH)'
    Value: !Sub '${Ec2Instance.PublicIpAddress}'
  KeyName:
    Description: 'KeyPair name used for SSH access'
    Value: !Ref KeyName
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup