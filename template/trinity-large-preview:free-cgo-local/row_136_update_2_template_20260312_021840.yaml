AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  EnableBoundaryEnforcement:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Toggle to enable/disable strict permission boundary enforcement

Conditions:
  BoundaryEnforcementEnabled: !Equals [!Ref EnableBoundaryEnforcement, 'true']

Resources:
  DeveloperIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'DeveloperIAMRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [BoundaryEnforcementEnabled, !Ref PermissionBoundaryPolicy, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Tags:
        - Key: Owner
          Value: !Sub 'MyTeam-${AWS::Region}'

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: BoundaryEnforcementEnabled
    Properties:
      ManagedPolicyName: DeveloperPermissionBoundary
      Description: Permission boundary restricting developers to S3 and read-only IAM operations
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
            Resource: '*'

  DeveloperIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DeveloperIAMPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
            Resource: '*'
            Condition:
              StringEquals:
                iam:PermissionsBoundary: !If [BoundaryEnforcementEnabled, !Ref PermissionBoundaryPolicy, !Ref 'AWS::NoValue']
              StringLike:
                iam:ResourceTag/Owner: 'MyTeam*'
      Roles:
        - !Ref DeveloperIAMRole

Outputs:
  DeveloperIAMRoleArn:
    Description: ARN of the Developer IAM Role
    Value: !GetAtt DeveloperIAMRole.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !If [BoundaryEnforcementEnabled, !Ref PermissionBoundaryPolicy, !Ref 'AWS::NoValue']