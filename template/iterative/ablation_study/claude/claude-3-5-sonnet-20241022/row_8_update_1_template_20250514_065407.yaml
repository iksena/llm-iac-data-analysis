AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard for NAT Gateway VPC Flow Logs Analysis'

Parameters:
  LogGroupName:
    Type: String
    Description: VPC Flow Logs Log Group Name
    Default: '/aws/vpc/flowlogs'
  
  DashboardName:
    Type: String
    Description: Name for the CloudWatch Dashboard
    Default: 'nat-gateway-monitoring'

Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats count(*) as requests by srcAddr | sort requests desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Number of Requests",
                "view": "bar"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(bytes) as totalBytes by srcAddr | sort totalBytes desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Traffic Volume (Bytes)",
                "view": "bar"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' and action='REJECT' | stats count(*) as rejections by srcAddr | sort rejections desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Rejected Connections by Source IP",
                "view": "bar"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' and action='REJECT' | stats count(*) as rejections by bin(1h)",
                "region": "${AWS::Region}",
                "title": "Rejected Connections Timeline",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  DashboardARN:
    Description: ARN of the created CloudWatch Dashboard
    Value: !Sub 'arn:aws:cloudwatch::${AWS::AccountId}:dashboard/${DashboardName}'
  
  DashboardURL:
    Description: URL to access the CloudWatch Dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'