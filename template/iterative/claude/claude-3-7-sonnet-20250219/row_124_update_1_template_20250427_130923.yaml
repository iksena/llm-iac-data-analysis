AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure REST API Gateway integrated with DynamoDB for music data management'

Parameters:
  StageName:
    Type: String
    Default: 'prod'
    Description: API Gateway deployment stage name
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units for DynamoDB table
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for DynamoDB table
  RateLimit:
    Type: Number
    Default: 100
    Description: Rate limit for API requests per second
  BurstLimit:
    Type: Number
    Default: 200
    Description: Burst limit for API requests

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        SSEEnabled: true

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: 
                  - !GetAtt MusicTable.Arn
                  - !Sub "${MusicTable.Arn}/index/*"

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicAPI
      Description: API for music data management
      EndpointConfiguration:
        Types:
          - REGIONAL
      ApiKeySourceType: HEADER

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: 'music'

  PostMusicMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "Id": {"S": "$context.requestId"},
                "Artist": {"S": "$input.path('$.artist')"},
                "Album": {"S": "$input.path('$.album')"},
                "CreatedAt": {"S": "$context.requestTime"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                {
                  "id": "$context.requestId",
                  "artist": "$input.path('$.artist')",
                  "album": "$input.path('$.album')",
                  "message": "Music entry created successfully"
                }
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
          ResponseParameters:
            method.response.header.Content-Type: true
            method.response.header.Access-Control-Allow-Origin: true

  GetMusicByArtistMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": {"S": "$input.params('artist')"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "items": [
                    #foreach($item in $inputRoot.Items)
                    {
                      "id": "$item.Id.S",
                      "artist": "$item.Artist.S",
                      "album": "$item.Album.S"
                    }#if($foreach.hasNext),#end
                    #end
                  ]
                }
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
          ResponseParameters:
            method.response.header.Content-Type: true
            method.response.header.Access-Control-Allow-Origin: true

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMusicMethod
      - GetMusicByArtistMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref MusicApi
      Description: Deployment for Music API

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref MusicApi
      StageName: !Ref StageName
      Description: Stage for Music API
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: MusicApiKey
      Description: API Key for Music API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref MusicApi
          StageName: !Ref StageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: MusicApiUsagePlan
      Description: Usage plan for Music API
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref StageName
      Quota:
        Limit: 10000
        Period: MONTH
      Throttle:
        RateLimit: !Ref RateLimit
        BurstLimit: !Ref BurstLimit

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: URL of the API endpoint
    Value: !Sub https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  
  ApiKeyId:
    Description: ID of the API Key (retrieve value from AWS Console or CLI)
    Value: !Ref ApiKey
  
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref MusicTable
  
  ApiStageName:
    Description: Name of the API Gateway stage
    Value: !Ref StageName