AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table for supporter product data with environment-specific configurations'

Parameters:
  Stage:
    Type: String
    AllowedValues: 
      - PROD
      - CODE
    Description: Deployment environment (PROD or CODE)
  
  TableNamePrefix:
    Type: String
    Default: 'SupporterProductData'
    Description: Prefix for the DynamoDB table name

Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']

Resources:
  SupporterProductTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${TableNamePrefix}-${Stage}'
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      ProvisionedThroughput: !If 
        - IsProd
        - 
          ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref AWS::NoValue
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Application
          Value: SupporterProduct
        - Key: Backup
          Value: Required
        - Key: CreatedBy
          Value: CloudFormation

  ScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSApplicationAutoscalingDynamoDBTablePolicy
      Tags:
        - Key: Environment
          Value: !Ref Stage

  WriteScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    DependsOn: 
      - SupporterProductTable
      - ScalingRole
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub 'table/${SupporterProductTable}'
      RoleARN: !GetAtt ScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    DependsOn: WriteScalingTarget
    Properties:
      PolicyName: !Sub '${TableNamePrefix}-${Stage}-WriteAutoScalingPolicy'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SupporterProductTable

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt SupporterProductTable.Arn

  ScalingRoleArn:
    Description: ARN of the Auto Scaling IAM Role
    Condition: IsProd
    Value: !GetAtt ScalingRole.Arn