AWSTemplateFormatVersion: '2010-09-09'
Description: EFS Shared Storage with Multi-AZ EC2 Instances and Monitoring
Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  SubnetACidr:
    Type: String
    Default: 10.0.1.0/24
  SubnetBCidr:
    Type: String
    Default: 10.0.2.0/24
  InstanceType:
    Type: String
    Default: t3.micro
  KeyName:
    Type: String
    Default: ''
  EFSPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues: [generalPurpose, maxIO]
  EFSThroughputMode:
    Type: String
    Default: provisioned
    AllowedValues: [provisioned, bursting]
  ProvisionedThroughput:
    Type: Number
    Default: 50
    MinValue: 1
    MaxValue: 1024
  AlarmEmail:
    Type: String
    Default: ''

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-west-2:
      AMI: ami-0d70546e43a941d70

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]
  IsProvisioned: !Equals [!Ref EFSThroughputMode, 'provisioned']
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Resources:
  # ... (all previous resources remain unchanged until AlarmTopic)

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        !If
        - HasAlarmEmail
        - - Protocol: email
            Endpoint: !Ref AlarmEmail
        - !Ref "AWS::NoValue"

  # ... (rest of the template remains unchanged)

Outputs:
  EFSID:
    Value: !Ref EFSFileSystem
  InstanceAIP:
    Value: !GetAtt EC2InstanceA.PublicIp
  InstanceBIP:
    Value: !GetAtt EC2InstanceB.PublicIp
  AlarmTopicARN:
    Value: !Ref AlarmTopic
  IOAlarmName:
    Value: !Ref HighIOAlarm
  ThroughputAlarmName:
    Value: !If [IsProvisioned, !Ref ThroughputAlarm, "Not applicable (bursting mode)"]