AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create a private Amazon Route 53 Hosted Zone for internal DNS management within a VPC.
Parameters:
  VPCId:
    Description: "The ID of the VPC to associate the private Hosted Zone with."
    Type: String
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      HostedZoneConfig:
        Comment: "Private Hosted Zone for internal DNS management."
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
Outputs:
  HostedZoneId:
    Description: "The ID of the created Route 53 Hosted Zone."
    Value: !Ref PrivateHostedZone