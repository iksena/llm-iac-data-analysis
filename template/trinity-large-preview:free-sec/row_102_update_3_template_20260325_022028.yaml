AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: alias/aws/dynamodb
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  RiskManagementTopic:
    Type: AWS::SNS::Topic
    Properties:
      KmsMasterKeyId: alias/aws/sns
      DisplayName: RiskManagementTopic

  RiskManagementTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.opscenter.amazonaws.com
            Action:
              - sns:Publish
            Resource: !Ref RiskManagementTopic
      Topics:
        - !Ref RiskManagementTopic

  RiskManagementRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementTable.Arn
        - PolicyName: SNSTopicAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskManagementTopic

  LambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction1
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RiskManagementRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')
          sns = boto3.client('sns')

          def handler(event, context):
              try:
                  table.put_item(
                      Item={
                          'workload_id': event['workload_id'],
                          'question_id': event['question_id'],
                          'data': event['data']
                      }
                  )
                  sns.publish(
                      TopicArn='{{resolve:ssm:/risk-management/sns-topic-arn}}',
                      Message=json.dumps(event)
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Success')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet
      DeadLetterConfig:
        TargetArn: !Ref LambdaDLQ
      ReservedConcurrentExecutions: 10

  LambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction2
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RiskManagementRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')

          def handler(event, context):
              try:
                  response = table.get_item(
                      Key={
                          'workload_id': event['workload_id'],
                          'question_id': event['question_id']
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response.get('Item', {}))
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet
      DeadLetterConfig:
        TargetArn: !Ref LambdaDLQ
      ReservedConcurrentExecutions: 10

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24

  LambdaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: RiskManagementDLQ

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref RiskManagementTable
  TopicArn:
    Description: SNS Topic ARN
    Value: !Ref RiskManagementTopic
  Function1Arn:
    Description: Lambda Function 1 ARN
    Value: !GetAtt LambdaFunction1.Arn
  Function2Arn:
    Description: Lambda Function 2 ARN
    Value: !GetAtt LambdaFunction2.Arn