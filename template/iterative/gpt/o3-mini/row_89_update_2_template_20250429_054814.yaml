AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready CloudFormation template to enable AWS Security Hub with default security standards and consolidated control findings.

Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties: {}

  OrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    DependsOn: SecurityHubHub
    Properties:
      AutoEnable: true

  SecurityHubFindingAggregator:
    Type: AWS::SecurityHub::FindingAggregator
    DependsOn: SecurityHubHub
    Properties:
      FindingAggregationRegion: !Ref AWS::Region

  StandardsSubscriptionCIS:
    Type: AWS::SecurityHub::StandardsSubscription
    DependsOn: SecurityHubHub
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0

  StandardsSubscriptionAWSFSBP:
    Type: AWS::SecurityHub::StandardsSubscription
    DependsOn: SecurityHubHub
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0

Outputs:
  SecurityHubHubArn:
    Description: "ARN of the enabled AWS Security Hub Hub"
    Value: !GetAtt SecurityHubHub.Arn

  OrganizationConfigurationStatus:
    Description: "Status of the Security Hub Organization Configuration (AutoEnable)"
    Value: "AutoEnable is set to true"

  FindingAggregatorRegion:
    Description: "Region used for consolidated control findings via Finding Aggregator"
    Value: !Ref AWS::Region

  CISStandardSubscription:
    Description: "Subscription to CIS AWS Foundations Benchmark standard created"
    Value: "Enabled subscription with ARN: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0"

  AWSFSBPStandardSubscription:
    Description: "Subscription to AWS Foundational Security Best Practices standard created"
    Value: "Enabled subscription with ARN: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0"