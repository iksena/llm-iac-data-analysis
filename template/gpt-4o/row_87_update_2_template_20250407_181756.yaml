AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an S3 bucket for Lambda artifacts and a KMS key for encryption.

Parameters:
  BucketName:
    Description: The name of the S3 bucket to create.
    Type: String
  ServiceRoleArn:
    Description: The ARN of the service role that will use the KMS key.
    Type: String

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting S3 bucket contents
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: 'kms:*'
            Resource: '*'
          - Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
      EnableKeyRotation: true

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}-kms-key
      TargetKeyId: !Ref KMSKey

Outputs:
  S3BucketName:
    Description: The name of the S3 bucket
    Value: !Ref S3Bucket

  KMSKeyArn:
    Description: The ARN of the KMS key
    Value: !GetAtt KMSKey.Arn

  KMSKeyAliasName:
    Description: The alias of the KMS key
    Value: !Ref KMSKeyAlias