AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and cost-optimized S3 bucket for CloudWatch export data with configurable versioning and automated lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: 'Optional. Custom bucket name (must be globally unique DNS name). Leave empty for auto-generated name.'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$|^$'
    ConstraintDescription: >-
      Bucket name must be 3-63 characters long, start and end with a letter or number,
      and contain only lowercase letters, numbers, and hyphens/dots (no consecutive dots)

  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable versioning for object recovery (true) or disable (false)'

  TransitionToStandardIAAfterDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 364
    Description: 'Days after creation to transition to Standard-IA storage class'

  TransitionToGlacierAfterDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: 'Days after creation to transition to Glacier storage class'

  ExpirationAfterDays:
    Type: Number
    Default: 365
    MinValue: 1
    Description: 'Days after creation to expire/delete objects'

Rules:
  LifecycleDayValidation:
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: TransitionToStandardIAAfterDays
                - 0
        AssertDescription: "Transition to Standard-IA must be at least 1 day"
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: TransitionToGlacierAfterDays
                - 0
        AssertDescription: "Transition to Glacier must be at least 1 day"
      - Assert:
          Fn::Not:
            - Fn::Equals:
                - Ref: ExpirationAfterDays
                - 0
        AssertDescription: "Expiration must be at least 1 day"
      - Assert:
          Fn::Or:
            - Fn::Equals:
                - Ref: TransitionToStandardIAAfterDays
                - Ref: AWS::NoValue
            - Fn::Or:
                - Fn::Equals:
                    - Ref: TransitionToGlacierAfterDays
                    - Ref: AWS::NoValue
                - Fn::And:
                    - Fn::Not:
                        - Fn::Equals:
                            - Ref: TransitionToStandardIAAfterDays
                            - Ref: TransitionToGlacierAfterDays
                    - Fn::Not:
                        - Fn::GreaterThan:
                            - Ref: TransitionToStandardIAAfterDays
                            - Ref: TransitionToGlacierAfterDays
        AssertDescription: >-
          Glacier transition days must be greater than Standard-IA transition days

Conditions:
  UseProvidedBucketName: !Not [!Equals [!Ref BucketName, '']]
  VersioningEnabled: !Equals [!Ref VersioningEnabled, 'true']

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseProvidedBucketName, !Ref BucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !If [VersioningEnabled, 'Enabled', 'Suspended']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToStandardIARule
            Status: Enabled
            Prefix: ''
            Transitions:
              - StorageClass: STANDARD_IA
                Days: !Ref TransitionToStandardIAAfterDays
          - Id: TransitionToGlacierRule
            Status: Enabled
            Prefix: ''
            Transitions:
              - StorageClass: GLACIER
                Days: !Ref TransitionToGlacierAfterDays
          - Id: ExpirationRule
            Status: Enabled
            Prefix: ''
            ExpirationInDays: !Ref ExpirationAfterDays

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref CloudWatchExportBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn