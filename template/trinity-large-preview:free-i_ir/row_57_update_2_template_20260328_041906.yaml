AWSTemplateFormatVersion: '2010-09-09'
Description: Basic Amazon ECS Cluster with Configurable Monitoring Capabilities

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties: {}

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/cluster-logs
      RetentionInDays: 30

  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  ECSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ecs-service-policy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - ec2:Describe*
              - elasticloadbalancing:DeregisterInstancesFromLoadBalancer
              - elasticloadbalancing:DeregisterTargets
              - elasticloadbalancing:Describe*
              - elasticloadbalancing:RegisterInstancesWithLoadBalancer
              - elasticloadbalancing:RegisterTargets
            Resource: "*"
      Roles:
        - !Ref ECSServiceRole

  CloudWatchAlarmCPU:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ECSClusterCPUUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions: []
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster

  CloudWatchAlarmMemory:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ECSClusterMemoryUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions: []
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster

Outputs:
  ClusterName:
    Description: Name of the ECS Cluster
    Value: !Ref ECSCluster