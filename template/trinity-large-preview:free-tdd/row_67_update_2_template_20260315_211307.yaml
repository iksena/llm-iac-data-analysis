AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-level access support

Parameters:
  OrganizationId:
    Type: String
    Default: ""
    Description: Optional Organization ID for enterprise-wide access. Leave empty for single-account use.

Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "org-access-bucket-${AWS::AccountId}"

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: OrgAccess
            Effect: Allow
            Principal:
              AWS: !If
                - HasOrganizationId
                - !Sub "arn:aws:organizations::${OrganizationId}:organization/organizations"
                - !Ref AWS::NoValue
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:DeleteObject"
            Resource: !Sub "arn:aws:s3:::${MyS3Bucket}/*"
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId

Conditions:
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, ""]]