AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to manage AWS Security Hub controls by selectively disabling CIS Benchmarks and AWS Foundational Security Best Practices checks.

Parameters:
  DisableCIS140Controls:
    Type: Boolean
    Default: false
    Description: Disable CIS Benchmarks controls if set to true
  DisableAWSFoundationalControls:
    Type: Boolean
    Default: false
    Description: Disable AWS Foundational Security Best Practices controls if set to true
  PermissionsBoundaryArn:
    Type: String
    Default: ""
    Description: Optional IAM permissions boundary ARN
  CloudWatchLogsRetention:
    Type: Number
    Default: 30
    Description: CloudWatch Logs retention period in days

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref "AWS::NoValue"]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/SecurityAudit

  LambdaAdditionalPermissions:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecurityHubControlManagement
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - securityhub:Update*
              - securityhub:Describe*
            Resource: "*"
      Roles:
        - !Ref LambdaExecutionRole

  SecurityHubControlManager:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import boto3

          securityhub = boto3.client('securityhub')

          def handler(event, context):
              try:
                  # CIS Benchmarks controls
                  if event['DisableCIS140Controls']:
                      disable_controls('CIS AWS Foundations Benchmark')
                  # AWS Foundational Security Best Practices controls
                  if event['DisableAWSFoundationalControls']:
                      disable_controls('AWS Foundational Security Best Practices')
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Security Hub controls updated successfully')
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }

          def disable_controls(standards_name):
              try:
                  # Get current standards subscription
                  response = securityhub.get_enabled_standards()
                  standards = response.get('StandardsSubscriptions', [])

                  for standard in standards:
                      if standard['StandardsSubscriptionArn'].split('/')[-1] == standards_name:
                          # Get controls for this standard
                          paginator = securityhub.get_paginator('list_controls')
                          page_iterator = paginator.paginate(
                              ControlStatusUpdateCriteria={
                                  'ControlStatus': 'ENABLED'
                              },
                              StandardsSubscriptionArn=standard['StandardsSubscriptionArn']
                          )

                          for page in page_iterator:
                              for control in page['ControlSummaries']:
                                  # Disable the control
                                  securityhub.update_security_hub_standards_control(
                                      StandardsSubscriptionArn=standard['StandardsSubscriptionArn'],
                                      ControlId=control['Id'],
                                      ControlStatus='DISABLED'
                                  )
              except Exception as e:
                  print(f"Error disabling controls for {standards_name}: {str(e)}")
                  raise

      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SecurityHubControlManager}
      RetentionInDays: !Ref CloudWatchLogsRetention

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SecurityHubControlManager.Arn
      Principal: events.amazonaws.com

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, ""]]

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SecurityHubControlManager.Arn
  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref SecurityHubControlManager