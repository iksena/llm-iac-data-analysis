AWSTemplateFormatVersion: '2010-09-09'
Description: Custom Lambda Arithmetic Resource demonstrating dynamic parameter processing and controlled failure scenarios

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
    Description: First number for arithmetic operation

  SecondNumber:
    Type: Number
    Default: 5
    Description: Second number for arithmetic operation

  Operator:
    Type: String
    Default: +
    AllowedValues:
      - +
      - -
      - *
      - /
    Description: Arithmetic operator to use

  ForceFailure:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: Force the custom resource to fail for testing

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              print("Received event: " + json.dumps(event))
              response_data = {}
              physical_resource_id = "ArithmeticOperation"

              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_resource_id)
                      return

                  first_number = event['ResourceProperties'].get('FirstNumber')
                  second_number = event['ResourceProperties'].get('SecondNumber')
                  operator = event['ResourceProperties'].get('Operator')
                  force_failure = event['ResourceProperties'].get('ForceFailure') == 'true'

                  if force_failure:
                      raise ValueError("Forced failure for testing purposes")

                  operations = {
                      '+': lambda a, b: a + b,
                      '-': lambda a, b: a - b,
                      '*': lambda a, b: a * b,
                      '/': lambda a, b: a / b if b != 0 else None
                  }

                  if operator not in operations:
                      raise ValueError(f"Invalid operator: {operator}")

                  if second_number == 0 and operator == '/':
                      raise ValueError("Division by zero is not allowed")

                  result = operations[operator](first_number, second_number)
                  operation_str = f"{first_number} {operator} {second_number} = {result}"

                  response_data = {
                      'Result': result,
                      'Operation': operation_str
                  }

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_resource_id)

              except Exception as e:
                  response_data = {
                      'Error': str(e)
                  }
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data, physical_resource_id)

  CustomArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      ForceFailure: !Ref ForceFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomArithmeticResource.Result
    Export:
      Name: !Sub "${AWS::StackName}-CalculationResult"

  OperationDetails:
    Description: Details of the operation performed
    Value: !GetAtt CustomArithmeticResource.Operation
    Export:
      Name: !Sub "${AWS::StackName}-OperationDetails"

  ResourceStatus:
    Description: Status of the custom resource operation
    Value: !GetAtt CustomArithmeticResource.Status
    Export:
      Name: !Sub "${AWS::StackName}-ResourceStatus"