AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a VPC, Subnet, Security Group, ENI with two EIPs and secondary private IPs'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ENI-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ENI-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: ENI-Subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ENI-RouteTable

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for ENI
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Description: 'Network Interface with multiple IPs'
      GroupSet: 
        - !Ref SecurityGroup
      SecondaryPrivateIpAddressCount: 1

  FirstEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  SecondEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: FirstEIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: 'ID of the created Network Interface'
    Value: !Ref NetworkInterface

  PrimaryPrivateIP:
    Description: 'Primary Private IP of the ENI'
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  FirstEIPAddress:
    Description: 'First Elastic IP Address'
    Value: !Ref FirstEIP

  SecondEIPAddress:
    Description: 'Second Elastic IP Address'
    Value: !Ref SecondEIP