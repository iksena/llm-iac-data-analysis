AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a cross-account private API Gateway with a Lambda backend, secured via VPC endpoint and custom domain.

Parameters:
  VPCId:
    Type: String
    Description: The ID of the VPC where the API Gateway will be accessible.
    Default: 'vpc-12345678'  # Replace with your actual VPC ID
  VPCEndpointId:
    Type: String
    Description: The ID of the VPC endpoint to allow access to the API Gateway.
    Default: 'vpce-12345678'  # Replace with your actual VPC endpoint ID
  LambdaFunctionName:
    Type: String
    Description: The name of the Lambda function.
    Default: 'MyLambdaFunction'  # Replace with your desired Lambda function name
  CustomDomainName:
    Type: String
    Description: The custom domain name for the API Gateway.
    Default: 'api.example.com'  # Replace with your actual custom domain name
  CertificateArn:
    Type: String
    Description: The ARN of the ACM certificate for the custom domain.
    Default: 'arn:aws:acm:region:account-id:certificate/certificate-id'  # Replace with your actual certificate ARN

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: python3.12

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-PrivateApi"
      EndpointConfiguration:
        Types:
          - PRIVATE
        VpcEndpointIds:
          - !Ref VPCEndpointId

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: "{proxy+}"
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: ANY
      ResourceId: !Ref ApiGatewayResource
      RestApiId: !Ref ApiGatewayRestApi
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: prod
    DependsOn: ApiGatewayMethod

  ApiGatewayDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref CertificateArn

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiGatewayDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: prod

Outputs:
  ApiGatewayEndpoint:
    Description: The endpoint URL of the API Gateway.
    Value: !Sub 'https://${CustomDomainName}'

  LambdaFunctionArn:
    Description: The ARN of the Lambda function.
    Value: !GetAtt LambdaFunction.Arn

  CustomDomainName:
    Description: The custom domain name for the API Gateway.
    Value: !Ref CustomDomainName