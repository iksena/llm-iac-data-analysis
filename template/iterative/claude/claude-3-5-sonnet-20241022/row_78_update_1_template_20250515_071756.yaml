AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating EC2 IPAM with public and private scopes'

Resources:
  IPAM:
    Type: 'AWS::EC2::IPAM'
    Properties:
      Description: 'Enterprise IP Address Manager'
      OperatingRegions: 
        - RegionName: !Ref 'AWS::Region'
      Tags: 
        - Key: Name
          Value: Enterprise-IPAM
        - Key: Environment
          Value: Production

Outputs:
  IPAMId:
    Description: 'ID of the created IPAM'
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAMId'

  IPAMArn:
    Description: 'ARN of the created IPAM'
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMArn'

  IPAMDefaultPrivateScopeId:
    Description: 'ID of the default private scope'
    Value: !GetAtt IPAM.PrivateDefaultScopeId
    Export:
      Name: !Sub '${AWS::StackName}-PrivateScopeId'

  IPAMDefaultPublicScopeId:
    Description: 'ID of the default public scope'
    Value: !GetAtt IPAM.PublicDefaultScopeId
    Export:
      Name: !Sub '${AWS::StackName}-PublicScopeId'