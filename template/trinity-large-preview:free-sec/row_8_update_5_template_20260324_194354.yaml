AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights for NAT Gateway Analysis

Parameters:
  LogGroupName:
    Type: String
    Default: vpc-flow-logs
    Description: VPC Flow Logs log group name

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowAnalysis
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | stats sum(bytes) as bytes by srcAddr | sort bytes desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Source IPs by Outbound Traffic",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(Rejected) as rejected by srcAddr | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Source IPs by Rejected Connections",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(Rejected) as rejected by dstAddr | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Destination IPs by Rejected Connections",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(Rejected) as rejected by dstPort | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "view": "table",
                "title": "Top Destination Ports by Rejected Connections",
                "stacked": false
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: Name of the created CloudWatch Dashboard
    Value: !Ref Dashboard