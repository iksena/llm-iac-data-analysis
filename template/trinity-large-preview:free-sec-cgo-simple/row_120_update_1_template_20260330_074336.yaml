AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-00000000000000000,subnet-00000000000000000
  BatchJobQueueName:
    Type: String
    Default: OrderProcessingQueue
  BatchJobDefinitionName:
    Type: String
    Default: OrderProcessingJob
  ContainerImage:
    Type: String
    Default: amazon/aws-cli:latest
  ContainerCommand:
    Type: String
    Default: "echo 'Processing order'"
  BatchComputeEnvironmentName:
    Type: String
    Default: OrderProcessingEnv
  EventPipeName:
    Type: String
    Default: OrderProcessingPipe
  SqsQueueName:
    Type: String
    Default: OrderProcessingQueue

Resources:
  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SqsQueueName

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        Subnets: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceTypes:
          - optimal
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeEnvironmentName: !Ref BatchComputeEnvironmentName

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Ref BatchJobQueueName
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      JobDefinitionName: !Ref BatchJobDefinitionName
      ContainerProperties:
        Image: !Ref ContainerImage
        Command: !Split [" ", !Ref ContainerCommand]
        ResourceRequirements:
          - Type: VCPU
            Value: 1
          - Type: MEMORY
            Value: 512
        ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSBatchFullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess

  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: !Ref EventPipeName
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SqsQueue.Arn
      Target:
        TargetType: BATCH_JOB_QUEUE
        TargetParameters:
          BatchParameters:
            JobDefinition: !Ref BatchJobDefinition
            JobName: "OrderProcessingJob"
            RetryStrategy:
              Attempts: 3
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      FilterCriteria:
        Filters:
          - Pattern: '{"detail": {"eventType": ["OrderCreated"]}}'

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

Outputs:
  BatchJobQueueArn:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt BatchJobQueue.Arn
  SqsQueueUrl:
    Description: URL of the SQS Queue
    Value: !Ref SqsQueue