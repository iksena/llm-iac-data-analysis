AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  S3BucketName:
    Type: String
    Default: 'kk-admin'
    Description: Name of the S3 bucket containing CloudTrail logs
  S3Prefix:
    Type: String
    Default: 'cloud-trail/AWSLogs/'
    Description: Prefix path within S3 bucket for CloudTrail logs
Resources:
  GlueServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub 'GlueCrawlerRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:ListBucket'
                  - 's3:GetObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/${S3Prefix}*'
  CloudTrailDatabase:
    Type: 'AWS::Glue::Database'
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: cloudtrail_database
        Description: Database for CloudTrail log metadata
  CloudTrailCrawler:
    Type: 'AWS::Glue::Crawler'
    DependsOn:
      - GlueServiceRole
      - CloudTrailDatabase
    Properties:
      Name: cloudtrail_crawler
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/${S3Prefix}'
      Classifiers:
        - cloudtrail
      TablePrefix: cloudtrail_
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG
      RecrawlPolicy:
        RecrawlBehavior: UPDATE_IN_DATABASE
      Configuration: >
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": { "AddOrUpdateBehavior": "InheritFromTable" }
          }
        }
Outputs:
  GlueDatabaseName:
    Value: !Ref CloudTrailDatabase
    Description: Name of the Glue database for CloudTrail metadata
  GlueCrawlerName:
    Value: !Ref CloudTrailCrawler
    Description: Name of the Glue crawler configured for CloudTrail logs
  IAMRoleName:
    Value: !Ref GlueServiceRole
    Description: IAM role used by the Glue crawler