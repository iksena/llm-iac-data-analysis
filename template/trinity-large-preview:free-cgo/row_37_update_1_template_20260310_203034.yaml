AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PrimaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'secure-bucket-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      AccessControl: Private
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PrimaryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${PrimaryBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'true'

  ReplicationBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'replication-bucket-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      AccessControl: Private
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'access-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      AccessControl: Private
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  PrimaryBucketARN:
    Description: ARN of the primary secure bucket
    Value: !GetAtt PrimaryBucket.Arn
  ReplicationBucketARN:
    Description: ARN of the replication bucket
    Value: !GetAtt ReplicationBucket.Arn
  AccessLogBucketARN:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn