AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for supporter product data with environment-specific configurations

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      BillingMode:
        Fn::If:
          - IsProdStage
          - PROVISIONED
          - PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: backup
          Value: true
      ProvisionedThroughput:
        Fn::If:
          - IsProdStage
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue
      AutoScalingSettings:
        Fn::If:
          - IsProdStage
          - WriteCapacityUnits:
              TargetTrackingScalingPolicyConfiguration:
                TargetValue: 70.0
                ScaleInCooldown: 60
                ScaleOutCooldown: 60
                DisableScaleIn: false
            MinCapacity: 5
            MaxCapacity: 500
          - Ref: AWS::NoValue

Conditions:
  IsProdStage:
    Fn::Equals:
      - !Ref Stage
      - PROD

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SupporterProductDataTable