AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Service Automation Workflows

Resources:
  AutomationWorkflowRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AutomationWorkflowRole
      Description: IAM Role for cross-service automation workflows with SSM, EC2, and monitoring tools
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
                - ec2.amazonaws.com
                - monitoring.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EC2ReadOnlyAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:Get*
                Resource: '*'

Outputs:
  AutomationWorkflowRoleArn:
    Description: ARN of the Automation Workflow IAM Role
    Value: !GetAtt AutomationWorkflowRole.Arn
    Export:
      Name: AutomationWorkflowRoleArn