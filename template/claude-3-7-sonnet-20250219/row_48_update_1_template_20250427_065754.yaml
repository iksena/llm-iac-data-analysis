AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating AWS Glue ETL job infrastructure'

Parameters:
  GlueJobName:
    Type: String
    Default: 'sample-glue-etl-job'
    Description: 'Name of the AWS Glue ETL job'
  
  GlueScriptS3Key:
    Type: String
    Default: 'glue_scripts/sample_convert.py'
    Description: 'S3 key for the Glue script'
  
  GlueVersion:
    Type: String
    Default: '4.0'
    Description: 'Version of AWS Glue to use'
    AllowedValues:
      - '3.0'
      - '4.0'
  
  PythonVersion:
    Type: String
    Default: '3'
    Description: 'Python version to use'
    AllowedValues:
      - '3'
  
  MaxConcurrentRuns:
    Type: Number
    Default: 1
    Description: 'Maximum concurrent runs for the Glue job'
    MinValue: 1
  
  MaxRetries:
    Type: Number
    Default: 0
    Description: 'Maximum retries for the Glue job'
    MinValue: 0
  
  Timeout:
    Type: Number
    Default: 60
    Description: 'Timeout for the Glue job in minutes'
    MinValue: 1
  
  WorkerType:
    Type: String
    Default: 'G.1X'
    Description: 'Type of worker to use'
    AllowedValues:
      - 'G.1X'
      - 'G.2X'
      - 'G.4X'
      - 'G.8X'
  
  NumberOfWorkers:
    Type: Number
    Default: 2
    Description: 'Number of workers to use'
    MinValue: 2

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Purpose
          Value: GlueETLScriptsAndLogs

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Tags:
        - Key: Purpose
          Value: GlueETLJobExecution

  GlueS3AccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: GlueS3AccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'
      Roles:
        - !Ref GlueServiceRole

  GlueJob:
    Type: AWS::Glue::Job
    DependsOn: GlueS3AccessPolicy
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        PythonVersion: !Ref PythonVersion
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/${GlueScriptS3Key}'
      MaxRetries: !Ref MaxRetries
      Timeout: !Ref Timeout
      MaxCapacity: !If [IsG1X, !Ref NumberOfWorkers, !Ref 'AWS::NoValue']
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      ExecutionProperty:
        MaxConcurrentRuns: !Ref MaxConcurrentRuns
      DefaultArguments:
        '--job-language': 'python'
        '--enable-spark-ui': 'true'
        '--enable-job-insights': 'true'
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-metrics': 'true'
        '--spark-event-logs-path': !Sub 's3://${GlueScriptsBucket}/spark-logs/'
        '--TempDir': !Sub 's3://${GlueScriptsBucket}/temp/'
      Tags:
        Purpose: GlueETLJob

Conditions:
  IsG1X: !Equals [!Ref WorkerType, 'G.1X']

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket for Glue scripts and logs'
    Value: !Ref GlueScriptsBucket
  
  GlueJobName:
    Description: 'Name of the created Glue job'
    Value: !Ref GlueJob
  
  IAMRoleARN:
    Description: 'ARN of the IAM role created for Glue'
    Value: !GetAtt GlueServiceRole.Arn