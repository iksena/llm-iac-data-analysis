AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Transit Gateway and shares it via RAM for cross-account networking'

Parameters:
  ShareWithAccount:
    Type: String
    Description: AWS Account ID to share the Transit Gateway with
    Default: '644519422710'
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: 'enable'
      DefaultRouteTableAssociation: 'enable'
      DefaultRouteTablePropagation: 'enable'
      Tags:
        - Key: Name
          Value: Central-Transit-Gateway

  ResourceShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: 'TGW-Share'
      AllowExternalPrincipals: false
      Principals:
        - !Ref ShareWithAccount
      ResourceArns:
        - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Tags:
        - Key: Purpose
          Value: 'Cross-account-network-sharing'

Outputs:
  TransitGatewayId:
    Description: 'The ID of the created Transit Gateway'
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareId:
    Description: 'The ID of the RAM Resource Share'
    Value: !Ref ResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'