AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Region Application Failover Architecture with Route 53 ARC

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: MultiRegionRecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: RegionalFailoverControlPanel
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: Region1RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: Region2RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: AtLeastOneRegionActive
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      SafetyRuleConfig:
        Status: PENDING
        SafetyRules:
          - Type: ATLEAST
            Threshold: 1
            RoutingControls:
              - RoutingControlArn: !GetAtt RoutingControlRegion1.RoutingControlArn
              - RoutingControlArn: !GetAtt RoutingControlRegion2.RoutingControlArn

Outputs:
  RecoveryClusterArn:
    Value: !GetAtt RecoveryCluster.Arn
    Description: ARN of the recovery cluster
  ControlPanelArn:
    Value: !GetAtt ControlPanel.ControlPanelArn
    Description: ARN of the control panel
  SafetyRuleArn:
    Value: !GetAtt SafetyRule.SafetyRuleArn
    Description: ARN of the safety rule