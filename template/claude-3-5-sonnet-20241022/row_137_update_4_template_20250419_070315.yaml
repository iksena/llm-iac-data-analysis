AWSTemplateFormatVersion: '2010-09-09'
Description: 'PetShop GraphQL API with Lambda backend'

Resources:
  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      XrayEnabled: true

  PetShopAPIKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Description: 'API Key for PetShop GraphQL API'
      Expires: 1735689600

  PetShopSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        type Query {
          getPets: [Pet]
        }
        schema {
          query: Query
        }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const pets = [
              { id: '1', name: 'Max', type: 'Dog' },
              { id: '2', name: 'Whiskers', type: 'Cat' },
              { id: '3', name: 'Hoppy', type: 'Rabbit' }
            ];
            return pets;
          };
      Runtime: nodejs18.x
      MemorySize: 128
      Timeout: 30

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaFunction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PetLambdaFunction.Arn

  PetLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: PetLambdaDataSource
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: "$util.toJson($context.result)"

Outputs:
  GraphQLApiEndpoint:
    Description: 'GraphQL API Endpoint URL'
    Value: !GetAtt PetShopAPI.GraphQLUrl

  GraphQLApiId:
    Description: 'GraphQL API ID'
    Value: !GetAtt PetShopAPI.ApiId

  GraphQLApiKey:
    Description: 'GraphQL API Key'
    Value: !GetAtt PetShopAPIKey.ApiKey

  LambdaFunctionArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt PetLambdaFunction.Arn