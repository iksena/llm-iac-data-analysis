AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  GlueDatabaseName:
    Type: String
    Default: CloudTrailDatabase
  S3BucketName:
    Type: String
    Default: kk-admin
  S3Prefix:
    Type: String
    Default: cloud-trail/AWSLogs/

Resources:
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref GlueDatabaseName
        Description: Database for CloudTrail log analysis

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3CloudTrailAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject*
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub '${AWS::StackName}-CloudTrailCrawler'
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref GlueDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/${S3Prefix}'
            Exclusions: 
              - "**/$$folder$$/**"
              - "**/$folder$/**"
      TablePrefix: cloudtrail_
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      Configuration: |
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": {
              "AddOrUpdateBehavior": "InheritFromTable"
            },
            "Tables": {
              "AddOrUpdateBehavior": "MergeNewColumns"
            }
          }
        }

Outputs:
  DatabaseName:
    Value: !Ref GlueDatabaseName
  CrawlerName:
    Value: !Ref CloudTrailCrawler
  CrawlerRoleARN:
    Value: !GetAtt GlueCrawlerRole.Arn