AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an AWS Security Hub resource,
  enabling default standards and turning on consolidated control findings.

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub

Outputs:
  SecurityHubId:
    Description: The ID of the Security Hub
    Value: !Ref SecurityHub

# Note: The SecurityHubDefaultStandards resource was removed because the error indicates that the standard is already enabled.
# This template assumes that the default standards are already enabled in the account.