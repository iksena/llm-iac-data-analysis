AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table with Local and Global Secondary Indexes

Parameters:
  TableName:
    Type: String
    Default: MyDynamoTable
    Description: Name for the DynamoDB table

  BillingMode:
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: Billing mode for the table

  ReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100000
    Description: Read capacity units (required for PROVISIONED mode)

  WriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100000
    Description: Write capacity units (required for PROVISIONED mode)

  LocalSecondaryIndexName:
    Type: String
    Default: LocalIndex
    Description: Name for the local secondary index

  GlobalSecondaryIndexName:
    Type: String
    Default: GlobalIndex
    Description: Name for the global secondary index

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, PROVISIONED]

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: LSI1SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: 
        !If 
          - IsProvisioned
          - 
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - !Ref "AWS::NoValue"
      LocalSecondaryIndexes:
        - IndexName: !Ref LocalSecondaryIndexName
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: LSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: !Ref GlobalSecondaryIndexName
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput: 
            !If 
              - IsProvisioned
              - 
                ReadCapacityUnits: !Ref ReadCapacityUnits
                WriteCapacityUnits: !Ref WriteCapacityUnits
              - !Ref "AWS::NoValue"

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref TableName
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn
  LocalIndexName:
    Description: Local Secondary Index Name
    Value: !Ref LocalSecondaryIndexName
  GlobalIndexName:
    Description: Global Secondary Index Name
    Value: !Ref GlobalSecondaryIndexName