AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with tag-driven Nginx installation and enhanced monitoring using SSM

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "nginx-logs-${AWS::AccountId}-${AWS::Region}"
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt InstanceRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub "${S3Bucket.Arn}/*"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "${S3Bucket.Arn}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: ami-0c55b159cbfafe1f0
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Application
          Value: Nginx
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  SSMAutomationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-ConfigureCloudWatchLogs
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        IsEnabled:
          - 'True'
        IsDefaultLogGroup:
          - 'False'
        LogGroupName:
          - '/var/log/nginx/access.log'
        LogStreamName:
          - 'nginx-access'
        LogType:
          - 'IISLog'
        RetentionInDays:
          - '30'
        S3BucketName:
          - !Ref S3Bucket
        S3KeyPrefix:
          - 'nginx-logs'

  SSMAutomationAssociationNginx:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-InstallApplication
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        Action:
          - Install
        Name:
          - nginx
        Version:
          - '1.20'
        Arguments:
          - 'install'
        WorkingDirectory:
          - '/tmp'
        TimeoutSeconds:
          - '300'
      ScheduleExpression: 'rate(1 day)'

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the instance
    Value: !GetAtt EC2Instance.PublicIp
  S3BucketName:
    Description: S3 bucket name for logs
    Value: !Ref S3Bucket