AWSTemplateFormatVersion: '2010-09-09'
Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Options:
        AmazonSideAsn: 65000
        AutoAcceptSharedAttachments: enable
        DefaultRouteTableAssociation: enable
        DefaultRouteTablePropagation: enable

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: TransitGatewayResourceShare
      Resources:
        - Fn::GetAtt:
            - TransitGateway
            - Id
      Principals:
        - 644519422710

Outputs:
  TransitGatewayId:
    Description: The ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: TransitGatewayId

  ResourceShareId:
    Description: The ID of the created Resource Share
    Value: !Ref ResourceShare
    Export:
      Name: ResourceShareId