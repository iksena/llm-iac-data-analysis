AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval using SSM Parameter Store and Secrets Manager

Resources:
  # IAM Role for Lambda function with least-privilege access
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaSSMSecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt MySecret.Arn

  # Lambda function to fetch and decrypt parameters/secrets
  ParameterRetrievalLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import base64
          import os

          def lambda_handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Retrieve SSM parameters
              try:
                  ssm_params = ssm_client.get_parameters_by_path(
                      Path=f"/{os.environ['STACK_NAME']}/",
                      WithDecryption=True
                  )
                  ssm_values = {param['Name'].split('/')[-1]: param['Value'] for param in ssm_params['Parameters']}
              except Exception as e:
                  ssm_values = {'error': str(e)}

              # Retrieve Secrets Manager secret
              try:
                  secret = secrets_client.get_secret_value(SecretId=os.environ['SECRET_NAME'])
                  if 'SecretString' in secret:
                      secret_value = secret['SecretString']
                  else:
                      secret_value = base64.b64decode(secret['SecretBinary']).decode('utf-8')
              except Exception as e:
                  secret_value = {'error': str(e)}

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_parameters': ssm_values,
                      'secret': secret_value
                  })
              }
      Environment:
        Variables:
          STACK_NAME: !Ref AWS::StackName
          SECRET_NAME: !Ref MySecret
      Timeout: 30

  # SSM Parameter for non-sensitive configuration
  SsmParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${AWS::StackName}/config'
      Type: String
      Value: 'This is A/B'
      Description: Non-sensitive configuration parameter

  # Secrets Manager secret with dynamic password generation
  MySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${AWS::StackName}/my-secret'
      Description: Secret with dynamically generated password
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
        IncludeSpace: false

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ParameterRetrievalLambda.Arn
  SecretArn:
    Description: ARN of the Secrets Manager secret
    Value: !GetAtt MySecret.Arn
  SsmParameterName:
    Description: Name of the SSM parameter
    Value: !Ref SsmParameter