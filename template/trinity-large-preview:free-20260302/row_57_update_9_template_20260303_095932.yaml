AWSTemplateFormatVersion: '2010-09-09'
Description: A basic Amazon ECS cluster with configurable monitoring capabilities.

Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS cluster
  EnableCloudWatchContainerInsights:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable CloudWatch Container Insights for the ECS cluster

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      Configuration:
        ExecuteCommandConfiguration:
          Logging: OVERRIDE

  CloudWatchContainerInsights:
    Type: AWS::CloudWatch::InsightRule
    Condition: EnableCloudWatchContainerInsights
    Properties:
      RuleName: !Sub "${ClusterName}-ContainerInsights"
      RuleState: ENABLED
      RuleBody: |
        {
          "Schema": {
            "Name": "CloudWatchLogRule",
            "Version": 1
          },
          "LogGroupNames": [
            !Sub "/aws/ecs/${ClusterName}"
          ],
          "LogFormat": "json"
        }

Conditions:
  EnableCloudWatchContainerInsights: !Equals [ !Ref EnableCloudWatchContainerInsights, 'true' ]

Outputs:
  ClusterName:
    Description: The name of the ECS cluster
    Value: !Ref ECSCluster
  ClusterArn:
    Description: The Amazon Resource Name (ARN) of the ECS cluster
    Value: !GetAtt ECSCluster.Arn