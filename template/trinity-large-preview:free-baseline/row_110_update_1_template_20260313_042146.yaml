AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a cross-account private API Gateway with Lambda backend

Parameters:
  VPCEndpointId:
    Type: String
    Description: VPC Endpoint ID to allow access to the private API
    Default: vpce-1234567890abcdef0
  CustomDomainName:
    Type: String
    Description: Custom domain name for the API
    Default: api.example.com
  StageName:
    Type: String
    Description: Deployment stage name for the API
    Default: prod
  LambdaRuntime:
    Type: String
    Description: Lambda function runtime
    Default: python3.12
    AllowedValues:
      - python3.12
      - nodejs20.x

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  APIGatewayVPCConnection:
    Type: AWS::EC2::VPCEndpointConnection
    Properties:
      VPCEndpointId: !Ref VPCEndpointId
      ServiceType:
        - Api
      ServiceId: !Sub 'execute-api.${AWS::Region}.amazonaws.com'

  APIGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateAPI
      ProtocolType: HTTP
      Target: !GetAtt LambdaFunction.Arn
      VpcEndpointIds:
        - !Ref VPCEndpointId
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${CustomDomainName}'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGateway
      StageName: !Ref StageName
      AutoDeploy: true

  CustomDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref CertificateArn

  CertificateArn:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS

  APIGatewayMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref APIGateway
      DomainName: !Ref CustomDomainName
      Stage: !Ref StageName

Outputs:
  ApiEndpoint:
    Description: The endpoint URL of the private API
    Value: !Sub 'https://${CustomDomainName}/${StageName}'
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  CustomDomainName:
    Description: The custom domain name
    Value: !Ref CustomDomainName