AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted S3 bucket for ALB access logs with private access, enforced ownership, and 90-day retention policy.

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: alb-access-logs-bucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      VersioningConfiguration:
        Status: Enabled

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBLogging
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${BucketName}/AWSLogs/${AWS::AccountId}/*
              - BucketName: !Ref ALBAccessLogsBucket
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: AllowELBLogging2
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${BucketName}/AWSLogs/${AWS::AccountId}/*
              - BucketName: !Ref ALBAccessLogsBucket
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control