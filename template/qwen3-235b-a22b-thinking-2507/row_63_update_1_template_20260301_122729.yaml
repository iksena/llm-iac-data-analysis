AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  MasterUsername:
    Type: String
    Description: Master database username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must start with a letter and contain only alphanumeric characters (1-16 characters)'
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Master database password
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[ -~]+'
    ConstraintDescription: 'Password must be 8-41 characters'
  SubnetIds:
    Type: CommaDelimitedList
    Description: 'Two public subnet IDs for the DB instances (across different AZs)'
  VPCId:
    Type: String
    Description: VPC ID for database deployment
  AllowedCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'CIDR block allowed to access the database'
    AllowedPattern: '(\\d{1,3}\\.){3}\\d{1,3}/(\\d{1,2})'
    ConstraintDescription: 'Must be a valid CIDR range'
  DBInstanceClass:
    Type: String
    Default: 'db.t3.large'
    Description: 'Database instance type (must be db.t3.large per requirements)'
    AllowedValues:
      - 'db.t3.large'
  EngineVersion:
    Type: String
    Default: '5.7.mysql_aurora.2.10.2'
    Description: Aurora MySQL engine version
  DBName:
    Type: String
    Default: ''
    Description: Optional database name to create
Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora MySQL cluster'
      SubnetIds: !Ref SubnetIds
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for Aurora MySQL cluster'
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref AllowedCIDR
  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBClusterIdentifier: !Sub '${AWS::StackName}-cluster'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      Port: 3306
      DatabaseName: !Ref DBName
      EngineVersion: !Ref EngineVersion
      EnableCloudwatchLogsExports:
        - error
      BackupRetentionPeriod: 7
      DBClusterParameterGroupName: default.aurora-mysql5.7
    DeletionPolicy: Snapshot
    DependsOn:
      - DBSubnetGroup
      - DBSecurityGroup
  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance1'
  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance2'
Outputs:
  ClusterEndpoint:
    Description: 'DNS address of the cluster writer endpoint'
    Value: !GetAtt DBCluster.Endpoint.Address
  ClusterPort:
    Description: 'Port for cluster connections'
    Value: !GetAtt DBCluster.Endpoint.Port
  ClusterReadEndpoint:
    Description: 'DNS address of the cluster reader endpoint'
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  ClusterIdentifier:
    Description: 'Database cluster identifier'
    Value: !Ref DBCluster