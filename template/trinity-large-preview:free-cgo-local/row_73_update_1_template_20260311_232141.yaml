AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AWS::StackName}-Cluster
      CapacityProviders:
        - Fargate
        - FargateSpot
      DefaultCapacityProviderStrategy:
        - Base: 0
          Weight: 1
          CapacityProvider: FargateSpot
        - Base: 1
          Weight: 1
          CapacityProvider: Fargate

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: Fargate
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/${AWS::StackName}-Fargate-ASG
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FargateSpot
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/${AWS::StackName}-FargateSpot-ASG
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED

Outputs:
  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
  ClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn