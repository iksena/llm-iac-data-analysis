AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EventBusName:
    Type: String
    Default: MyApplicationEventBus
    Description: Name of the custom EventBridge event bus
  KinesisStreamName:
    Type: String
    Default: ApplicationEventsStream
    Description: Name of the Kinesis data stream
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of shards for the Kinesis data stream
Resources:
  ApplicationEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
  ApplicationKinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref ShardCount
  EventBridgeToKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Description: Role allowing EventBridge to write to Kinesis
      Policies:
        - PolicyName: KinesisWritePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt ApplicationKinesisStream.Arn
  EventToKinesisRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBusName
      Name: RouteMyApplicationEventsToKinesis
      EventPattern:
        source:
          - my-application
      Targets:
        - Id: KinesisTarget
          Arn: !GetAtt ApplicationKinesisStream.Arn
          RoleArn: !GetAtt EventBridgeToKinesisRole.Arn
Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref EventBusName
  KinesisStreamName:
    Description: Name of the Kinesis data stream
    Value: !Ref KinesisStreamName
  EventRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventToKinesisRule