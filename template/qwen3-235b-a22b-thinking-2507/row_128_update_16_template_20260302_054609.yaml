AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DisableCISv140:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable CIS v1.4 controls'
  DisableCISv120:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable CIS v1.2 controls'
  DisableAWSFoundational:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable AWS Foundational Security Best Practices'
  LambdaMemorySize:
    Type: Number
    Default: 128
    MinValue: 128
    MaxValue: 10240
    Description: 'Amount of memory available to the Lambda function'
  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 1
    MaxValue: 900
    Description: 'Maximum allowed execution time for the Lambda function'
  PermissionsBoundary:
    Type: String
    Default: ''
    Description: 'Optional ARN of permissions boundary policy'
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: 'Number of days to retain CloudWatch Logs'
Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, '']]
Resources:
  SecurityHubControlManagerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-SHM'
      RetentionInDays: !Ref LogRetentionDays
  SecurityHubControlManagerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref 'AWS::NoValue'
      Policies:
        - PolicyName: SecurityHubControlManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: securityhub:UpdateStandardsControl
                Resource: '*'
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-SHM'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-SHM:log-stream:*'
  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    DependsOn: SecurityHubControlManagerLogGroup
    Properties:
      FunctionName: !Sub '${AWS::StackName}-SHM'
      Code:
        ZipFile: |
          import boto3
          import os
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')
              region = os.environ['AWS_REGION']
              account_id = boto3.client('sts').get_caller_identity()['Account']
              
              disable_cis_140 = os.getenv('DISABLE_CIS_V140', 'false') == 'true'
              disable_cis_120 = os.getenv('DISABLE_CIS_V120', 'false') == 'true'
              disable_aws_foundational = os.getenv('DISABLE_AWS_FOUNDATIONAL', 'false') == 'true'
              
              try:
                  if disable_cis_140:
                      _disable_controls(securityhub, region, account_id, 'cis-aws-foundations-benchmark', '1.4.0')
                  if disable_cis_120:
                      _disable_controls(securityhub, region, account_id, 'cis-aws-foundations-benchmark', '1.2.0')
                  if disable_aws_foundational:
                      _disable_controls(securityhub, region, account_id, 'aws-foundational-security-best-practices', '1.0.0')
                  return {'status': 'success'}
              except Exception as e:
                  logger.error("Operation failed: " + str(e))
                  raise
          
          def _disable_controls(client, region, account_id, standard_id, version):
              standards_subscription_arn = 'arn:aws:securityhub:' + region + ':' + account_id + ':subscription/' + standard_id + '/v/' + version
              try:
                  paginator = client.get_paginator('describe_standards_controls')
                  for page in paginator.paginate(StandardsSubscriptionArn=standards_subscription_arn):
                      for control in page['Controls']:
                          if control['ControlStatus'] != 'DISABLED':
                              client.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='DISABLED',
                                  DisabledReason='Managed by CloudFormation'
                              )
              except Exception as e:
                  logger.warning("Standard not enabled: " + str(e))
      Handler: index.lambda_handler
      Role: !GetAtt SecurityHubControlManagerRole.Arn
      Runtime: python3.12
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          DISABLE_CIS_V140: !Ref DisableCISv140
          DISABLE_CIS_V120: !Ref DisableCISv120
          DISABLE_AWS_FOUNDATIONAL: !Ref DisableAWSFoundational
Outputs:
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref SecurityHubControlManagerFunction
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt SecurityHubControlManagerFunction.Arn
  IamRoleName:
    Description: Name of the IAM role used by the Lambda function
    Value: !Ref SecurityHubControlManagerRole