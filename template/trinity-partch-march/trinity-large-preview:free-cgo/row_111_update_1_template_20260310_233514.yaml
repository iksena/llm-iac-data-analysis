AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EventBridge integration with DataDog for centralized log forwarding

Parameters:
  DataDogApiKey:
    Type: String
    Description: DataDog API key for authentication
    Default: testanu
    NoEcho: true

Resources:
  MyDataDogAppBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: MyDataDogAppBus
      Description: Event bus for DataDog log forwarding

  DataDogConnection:
    Type: AWS::EventSchemas::ApiDestinationConnection
    Properties:
      Name: DataDogConnection
      Description: Secure connection to DataDog API
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: !Ref DataDogApiKey

  DataDogLogDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: DataDogLogDestination
      Description: API destination for DataDog log ingestion
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeDataDogRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: DataDogApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: apigateway:Invoke
                Resource: !GetAtt DataDogLogDestination.Arn

  DataDogDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DataDogDeadLetterQueue.Arn
        maxReceiveCount: 3

  DataDogApiDestinationPolicy:
    Type: AWS::EventSchemas::ApiDestinationPolicy
    Properties:
      ApiDestinationArn: !GetAtt DataDogLogDestination.Arn
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EventBridgeRole.Arn
            Action: apigateway:Invoke
            Resource: !GetAtt DataDogLogDestination.Arn

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref MyDataDogAppBus
  ApiDestinationArn:
    Description: ARN of the DataDog API destination
    Value: !GetAtt DataDogLogDestination.Arn
  ConnectionArn:
    Description: ARN of the DataDog API connection
    Value: !GetAtt DataDogConnection.Arn
  QueueUrl:
    Description: URL of the DataDog dead-letter queue
    Value: !Ref DataDogDeadLetterQueue