AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for encrypted S3 bucket with ALB access logs

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 90

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - "arn:aws:iam::552958791618:root"
                - "arn:aws:iam::602026542331:root"
                - "arn:aws:iam::617741335675:root"
                - "arn:aws:iam::800080808080:root"
                - "arn:aws:iam::858058791618:root"
                - "arn:aws:iam::896398065558:root"
                - "arn:aws:iam::975596993436:root"
            Action:
              - "s3:PutObject"
            Resource:
              - "arn:aws:s3:::alb-access-logs-bucket/AWSLogs/123456789012/*"
          - Effect: Allow
            Principal:
              Service: "delivery.logs.amazonaws.com"
            Action: "s3:PutObject"
            Resource: "arn:aws:s3:::alb-access-logs-bucket/AWSLogs/123456789012/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"
          - Effect: Allow
            Principal:
              Service: "delivery.logs.amazonaws.com"
            Action: "s3:GetBucketAcl"
            Resource: "arn:aws:s3:::alb-access-logs-bucket"

Outputs:
  BucketName:
    Description: Name of the ALB access logs bucket
    Value: !Ref ALBAccessLogsBucket