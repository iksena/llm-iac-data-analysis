AWSTemplateFormatVersion: '2010-09-09'
Description: Template to deploy an EC2 instance with Amazon Linux 2

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  VpcId:
    Type: String
    Description: VPC where the EC2 instance will be launched
  SubnetId:
    Type: String
    Description: Subnet where the EC2 instance will be launched

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '${AWS::Region}.images.amazon.com/amazon/amzn2-ami-hvm-2.0.20230727.0-x86_64-gp2'
      SubnetId: !Ref SubnetId
      SecurityGroupIds: 
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: EC2-Instance

Outputs:
  InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance
  PrivateIP:
    Description: Private IP of the EC2 instance
    Value: !GetAtt EC2Instance.PrivateIp