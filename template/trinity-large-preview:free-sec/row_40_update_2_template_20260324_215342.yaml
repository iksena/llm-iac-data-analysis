AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyFifoQueue:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      ContentBasedDeduplication: true
      QueueName: MyFifoQueue.fifo
      KmsMasterKeyId: alias/aws/sqs
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
  MyFifoQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MyFifoQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt MyFifoQueue.Arn
Outputs:
  QueueARN:
    Description: ARN of the FIFO queue
    Value: !GetAtt MyFifoQueue.Arn
  QueueName:
    Description: Name of the FIFO queue
    Value: !GetAtt MyFifoQueue.QueueName