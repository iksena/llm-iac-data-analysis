AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3AccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::ios-apps.sagebridge.org'
              - !Sub 'arn:${AWS::Partition}:s3:::ios-apps.sagebridge.org/*'

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DynamoDBProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RDSProtectionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
            Resource: '*'

Outputs:
  S3AccessPolicyARN:
    Description: ARN of the S3 Access Policy
    Value: !Ref S3AccessPolicy
    Export:
      Name: S3AccessPolicyARN

  DynamoDBProtectionPolicyARN:
    Description: ARN of the DynamoDB Protection Policy
    Value: !Ref DynamoDBProtectionPolicy
    Export:
      Name: DynamoDBProtectionPolicyARN

  RDSProtectionPolicyARN:
    Description: ARN of the RDS Protection Policy
    Value: !Ref RDSProtectionPolicy
    Export:
      Name: RDSProtectionPolicyARN