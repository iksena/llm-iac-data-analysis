AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  BatchJobQueueName:
    Type: String
    Default: order-processing-queue
  BatchJobDefinitionName:
    Type: String
    Default: order-processing-job
  BatchJobMemory:
    Type: Number
    Default: 2048
  BatchJobVCPU:
    Type: Number
    Default: 1
  VPCId:
    Type: String
    Default: vpc-12345678
  SubnetIds:
    Type: CommaDelimitedList
    Default: subnet-12345678,subnet-87654321
  SecurityGroupIds:
    Type: CommaDelimitedList
    Default: sg-12345678
  EventPattern:
    Type: String
    Default: '{"source": ["aws.sqs"], "detail": {"message": {"prefix": "OrderCreated"}}}'

Resources:
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetBatchPolicy

  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300

  ManagedComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: SPOT
        MinvCpus: 0
        MaxvCpus: 64
        Subnets: !Ref SubnetIds
        SecurityGroupIds: !Ref SecurityGroupIds

  OrderProcessingQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ManagedComputeEnvironment

  OrderProcessingJob:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: busybox:latest
        Memory: !Ref BatchJobMemory
        Vcpus: !Ref BatchJobVCPU
        Command:
          - echo
          - Processing order
      RetryStrategy:
        Attempts: 3

  OrderRegistry:
    Type: AWS::EventSchemas::Registry
    Properties:
      Name: OrderRegistry

  OrderCreatedSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      RegistryName: !Ref OrderRegistry
      Type: JSON
      Content: |
        {
          "type": "object",
          "properties": {
            "message": {
              "type": "string",
              "pattern": "^OrderCreated.*"
            }
          },
          "required": ["message"]
        }

  OrderProcessingPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt OrderQueue.Arn
      Target:
        TargetType: Batch
        TargetParameters:
          BatchParameters:
            JobDefinition: !Ref OrderProcessingJob
            JobQueue: !Ref OrderProcessingQueue
      Enrichment:
        EnrichmentType: EventBridgeSchema
        EnrichmentParameters:
          EventBridgeSchemaParameters:
            RegistryName: !Ref OrderRegistry
            SchemaName: !Ref OrderCreatedSchema
      FilterCriteria:
        EventPattern: !Ref EventPattern

  BatchComputeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Batch compute security group
      VpcId: !Ref VPCId

  BatchComputeSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref BatchComputeSG

  BatchComputeSGEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      DestinationSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref BatchComputeSG

  VPCSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC security group
      VpcId: !Ref VPCId

  VPCSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref VPCSG

Outputs:
  OrderQueueUrl:
    Description: URL of the SQS queue
    Value: !Ref OrderQueue
  OrderProcessingPipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt OrderProcessingPipe.Arn