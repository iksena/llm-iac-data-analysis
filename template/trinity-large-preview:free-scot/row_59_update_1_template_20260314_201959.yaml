AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
      RetentionPeriodHours: 24

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Kinesis stream throughput exceeded:', JSON.stringify(event, null, 2));
            return {
              statusCode: 200,
              body: JSON.stringify('Success', null, 2)
            };
          };

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: kinesis.amazonaws.com
      SourceArn: !GetAtt MyStream.Arn

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisReadThroughputAlarm
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !GetAtt LambdaFunction.Arn
      Dimensions:
        - Name: StreamName
          Value: !Ref MyStream

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisWriteThroughputAlarm
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !GetAtt LambdaFunction.Arn
      Dimensions:
        - Name: StreamName
          Value: !Ref MyStream