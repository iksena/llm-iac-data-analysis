AWSTemplateFormatVersion: '2010-09-09'
Description: EFS with cross-AZ EC2 instances and performance monitoring

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key-pair

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC

  NetworkAclEntryIngress:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 2049
        To: 2049

  NetworkAclEntryEgress:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 2049
        To: 2049

  SubnetNetworkAclAssociation1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref NetworkAcl

  SubnetNetworkAclAssociation2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref NetworkAcl

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EFSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:CreateAccessPoint
                  - elasticfilesystem:DeleteAccessPoint
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientRootAccess
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      Encrypted: true
      ThroughputMode: bursting

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref SecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref SecurityGroup

  EC2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            EFS_ID=${FileSystem}
            MOUNT_POINT=/mnt/efs
            mkdir -p $MOUNT_POINT
            while ! ping -c 1 -W 2 ${FileSystem}.efs.${AWS::Region}.amazonaws.com &> /dev/null; do
              echo "Waiting for EFS mount target..."
              sleep 10
            done
            echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ $MOUNT_POINT efs _netdev,tls,iam 0 0" >> /etc/fstab
            mount -a
            if [ $? -eq 0 ]; then
              /opt/aws/bin/cfn-signal -e 0 -r "EFS mount successful" '${WaitHandle1}'
            else
              /opt/aws/bin/cfn-signal -e 1 -r "EFS mount failed" '${WaitHandle1}'
            fi

  EC2Instance2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            EFS_ID=${FileSystem}
            MOUNT_POINT=/mnt/efs
            mkdir -p $MOUNT_POINT
            while ! ping -c 1 -W 2 ${FileSystem}.efs.${AWS::Region}.amazonaws.com &> /dev/null; do
              echo "Waiting for EFS mount target..."
              sleep 10
            done
            echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ $MOUNT_POINT efs _netdev,tls,iam 0 0" >> /etc/fstab
            mount -a
            if [ $? -eq 0 ]; then
              /opt/aws/bin/cfn-signal -e 0 -r "EFS mount successful" '${WaitHandle2}'
            else
              /opt/aws/bin/cfn-signal -e 1 -r "EFS mount failed" '${WaitHandle2}'
            fi

  WaitHandle1:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition1:
    Type: AWS::CloudFormation::WaitCondition
    Properties:
      Handle: !Ref WaitHandle1
      Timeout: 900
      Count: 1

  WaitHandle2:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition2:
    Type: AWS::CloudFormation::WaitCondition
    Properties:
      Handle: !Ref WaitHandle2
      Timeout: 900
      Count: 1

  AlarmIO:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-IO-Limit-95
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 5000000000
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  AlarmThroughput:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-Throughput-80
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem
  EC2Instance1Id:
    Description: EC2 Instance 1 ID
    Value: !Ref EC2Instance1
  EC2Instance2Id:
    Description: EC2 Instance 2 ID
    Value: !Ref EC2Instance2
  MountTarget1Id:
    Description: Mount Target 1 ID
    Value: !Ref MountTarget1
  MountTarget2Id:
    Description: Mount Target 2 ID
    Value: !Ref MountTarget2
  AlarmIOArn:
    Description: I/O Limit Alarm ARN
    Value: !Ref AlarmIO
  AlarmThroughputArn:
    Description: Throughput Alarm ARN
    Value: !Ref AlarmThroughput