AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Resources:
  DynamoDbTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: BillingMode PAY_PER_REQUEST is appropriate for this use case

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrdersEventBus

  InsertPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: InsertPipe
      Source:
        DynamoDBStream:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
      Target:
        EventBridgeEventBus:
          EventBusName:
            Ref: EventBus
      Enrichment: NONE
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - INSERT
      RequiredCreateRolePermissions: PIPE_TARGET_EVENT_BUS

  ModifyPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: ModifyPipe
      Source:
        DynamoDBStream:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
      Target:
        EventBridgeEventBus:
          EventBusName:
            Ref: EventBus
      Enrichment: NONE
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - MODIFY
      RequiredCreateRolePermissions: PIPE_TARGET_EVENT_BUS

Outputs:
  DynamoDbTableArn:
    Description: ARN of the DynamoDB table
    Value:
      Fn::GetAtt:
        - DynamoDbTable
        - Arn
  EventBusName:
    Description: Name of the EventBridge event bus
    Value:
      Ref: EventBus