AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an automated monitoring and alerting system
  for AWS Secrets Manager activities, sending email notifications for critical
  secret lifecycle events.

Parameters:
  NotificationEmail:
    Description: Email address to receive notifications about Secrets Manager events.
    Type: String

Resources:
  SecretsManagerEventTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  SecretsManagerEventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PublishToSNSTopic
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SecretsManagerEventTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to capture AWS Secrets Manager API calls and send notifications.
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - DeleteSecret
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerEventTopic
          Id: TargetSNS
          RoleArn: !GetAtt SecretsManagerEventRole.Arn

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS Topic for Secrets Manager events.
    Value: !Ref SecretsManagerEventTopic

  EventBridgeRuleName:
    Description: Name of the EventBridge Rule capturing Secrets Manager events.
    Value: !Ref SecretsManagerEventRule