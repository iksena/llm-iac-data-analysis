AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates an S3 bucket with a bucket policy to enable cross-account access.
Parameters:
  CrossAccountAccountId:
    Type: String
    Description: The AWS account ID to grant cross-account access to.
    MinLength: 12
    MaxLength: 12
  BucketName:
    Type: String
    Description: A globally unique name for the S3 bucket.
    MinLength: 3
    MaxLength: 63
    AllowedPattern: "[a-z0-9][a-z0-9-]{1,61}[a-z0-9]"
    ConstraintDescription: Must be a globally unique name.
Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCrossAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${CrossAccountAccountId}:root
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${BucketName}
              - !Sub arn:aws:s3:::${BucketName}/*

Outputs:
  BucketNameOutput:
    Value: !Ref MyBucket
    Description: The name of the created S3 bucket.
  BucketArnOutput:
    Value: !GetAtt MyBucket.Arn
    Description: The ARN of the created S3 bucket.

