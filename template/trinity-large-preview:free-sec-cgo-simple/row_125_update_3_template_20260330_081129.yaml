AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  FromEmail:
    Type: String
    Default: noreply@example.com
    Description: Default sender email address

Resources:
  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SESAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  EmailAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: EmailAPI
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type
          - Authorization

  EmailIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref EmailAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail
        - region: !Ref 'AWS::Region'
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  EmailRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref EmailAPI
      RouteKey: POST /send
      Target: !Join
        - '/'
        - - integrations
          - !Ref EmailIntegration
      ModelSelectionExpression: $request.body
      RequestModels:
        application/json: RequestSchema

  RequestSchema:
    Type: AWS::ApiGatewayV2::Model
    Properties:
      ApiId: !Ref EmailAPI
      Name: RequestSchema
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        type: object
        required:
          - to
          - from
          - subject
          - text
          - html
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          text:
            type: string
          html:
            type: string

  EmailStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref EmailAPI
      StageName: $default
      AutoDeploy: true
      DeploymentId: !Ref EmailDeployment

  EmailDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - EmailRoute
    Properties:
      ApiId: !Ref EmailAPI

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: EmailUsagePlan
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: $default
      Throttle:
        - Type: TOKEN
          BurstLimit: 500
          RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  APIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPIKey
      Description: API Key for Email Service
      Enabled: true

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  InvokeURL:
    Description: API Gateway Invoke URL
    Value: !Sub 'https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com'
  APIKey:
    Description: API Key for authentication
    Value: !Ref APIKey