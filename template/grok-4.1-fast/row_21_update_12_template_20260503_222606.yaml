AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Timestream Database and Tables with configurable retention policies. Four tables: poc-table-01-batch-write, poc-table-02-older-records-memonly, poc-table-03-older-records-magnetic, poc-table-04-common-attributes.'

Parameters:
  DatabaseName:
    Type: String
    Default: 'PocTimestreamDB'
    AllowedPattern: '^[a-zA-Z0-9._-]{1,64}$'
    Description: 'Name of the Timestream database (1-64 chars: alphanumeric, _, -, .).'
  Table01MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-01-batch-write (1-8760).'
  Table01MagneticDays:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 73000
    Description: 'Magnetic retention in days for poc-table-01-batch-write (0 = disable).'
  Table02MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-02-older-records-memonly (1-8760).'
  Table02MagneticDays:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 73000
    Description: 'Magnetic retention in days for poc-table-02-older-records-memonly (0 = disable).'
  Table03MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-03-older-records-magnetic (1-8760).'
  Table03MagneticDays:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 73000
    Description: 'Magnetic retention in days for poc-table-03-older-records-magnetic (0 = disable).'
  Table04MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-04-common-attributes (1-8760).'
  Table04MagneticDays:
    Type: Number
    Default: 365
    MinValue: 0
    MaxValue: 73000
    Description: 'Magnetic retention in days for poc-table-04-common-attributes (0 = disable).'

Conditions:
  UseMagnetic01: !Not [ !Equals [ !Ref Table01MagneticDays, 0 ] ]
  UseMagnetic02: !Not [ !Equals [ !Ref Table02MagneticDays, 0 ] ]
  UseMagnetic03: !Not [ !Equals [ !Ref Table03MagneticDays, 0 ] ]
  UseMagnetic04: !Not [ !Equals [ !Ref Table04MagneticDays, 0 ] ]

Resources:
  TimestreamDB:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  PocTable01BatchWrite:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table01MemoryHours
        MagneticStoreRetentionPeriodInDays: !If [ UseMagnetic01, !Ref Table01MagneticDays, !Ref 'AWS::NoValue' ]

  PocTable02OlderRecordsMemonly:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table02MemoryHours
        MagneticStoreRetentionPeriodInDays: !If [ UseMagnetic02, !Ref Table02MagneticDays, !Ref 'AWS::NoValue' ]

  PocTable03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table03MemoryHours
        MagneticStoreRetentionPeriodInDays: !If [ UseMagnetic03, !Ref Table03MagneticDays, !Ref 'AWS::NoValue' ]

  PocTable04CommonAttributes:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table04MemoryHours
        MagneticStoreRetentionPeriodInDays: !If [ UseMagnetic04, !Ref Table04MagneticDays, !Ref 'AWS::NoValue' ]

Outputs:
  DatabaseName:
    Description: 'Name of the Timestream database.'
    Value: !Ref DatabaseName
  DatabaseArn:
    Description: 'ARN of the Timestream database.'
    Value: !GetAtt TimestreamDB.Arn
  Table01Arn:
    Description: 'ARN of poc-table-01-batch-write.'
    Value: !GetAtt PocTable01BatchWrite.Arn
  Table02Arn:
    Description: 'ARN of poc-table-02-older-records-memonly.'
    Value: !GetAtt PocTable02OlderRecordsMemonly.Arn
  Table03Arn:
    Description: 'ARN of poc-table-03-older-records-magnetic.'
    Value: !GetAtt PocTable03OlderRecordsMagnetic.Arn
  Table04Arn:
    Description: 'ARN of poc-table-04-common-attributes.'
    Value: !GetAtt PocTable04CommonAttributes.Arn