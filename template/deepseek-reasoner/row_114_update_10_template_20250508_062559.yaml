AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CompanyName:
    Type: String
    Description: Name of the business organization
  ContactEmail:
    Type: String
    Description: Contact email for B2BI profile
  ContactPhone:
    Type: String
    Description: Contact phone number
  InputBucketName:
    Type: String
    Description: Name for raw EDI input bucket
  OutputBucketName:
    Type: String
    Description: Name for transformed JSON output bucket

Resources:
  B2BIProfile:
    Type: AWS::B2BI::Profile
    Properties:
      Name: !Ref CompanyName
      Email: !Ref ContactEmail
      Phone: !Ref ContactPhone
      BusinessName: !Ref CompanyName
      Logging: ENABLED

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  B2BIS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3FullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${InputBucketName}
                  - !Sub arn:aws:s3:::${InputBucketName}/*
                  - !Sub arn:aws:s3:::${OutputBucketName}
                  - !Sub arn:aws:s3:::${OutputBucketName}/*

  X12ToJSONTransformer:
    Type: AWS::B2BI::Transformer
    DependsOn: B2BIS3AccessRole
    Properties:
      Name: X12_214_Transformer
      EdiType:
        X12Details:
          TransactionSet: X12_214
          Version: VERSION_4010
      FileFormat: JSON
      MappingTemplate: |
        {
          "ReferenceID": "functional_groups.transactions[0].segments[0].B10_01",
          "ShipmentID": "functional_groups.transactions[0].segments[0].B10_02",
          "BillOfLandingNumber": "functional_groups.transactions[0].segments[1].L11_01",
          "From": "functional_groups.transactions[0].segments[4].'0100_loop'[2].* ~> $join(\",\")",
          "To": "functional_groups.transactions[0].segments[4].'0100_loop'[4].* ~> $join(\",\")",
          "ShipmentStatusCode": "functional_groups.transactions[0].**.AT7_01"
        }
      Status: active

Outputs:
  B2BIProfileARN:
    Value: !GetAtt B2BIProfile.ProfileArn
  TransformerARN:
    Value: !GetAtt X12ToJSONTransformer.TransformerArn
  InputBucketARN:
    Value: !GetAtt InputBucket.Arn
  OutputBucketName:
    Value: !Ref OutputBucket