AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an AWS Resource Group using tag-based filters for multiple services'

Parameters:
  EnvironmentTag:
    Type: String
    Default: 'production'
    AllowedValues:
      - 'development'
      - 'staging'
      - 'production'
    Description: 'Environment tag value for resource filtering'

  ApplicationTag:
    Type: String
    Default: 'myapp'
    Description: 'Application name tag value for resource filtering'

  OwnerTag:
    Type: String
    Description: 'Owner tag value for resource filtering'

Resources:
  MultiServiceResourceGroup:
    Type: 'AWS::ResourceGroups::Group'
    Properties:
      Name: !Sub '${ApplicationTag}-${EnvironmentTag}-resource-group'
      Description: !Sub 'Resource group for ${ApplicationTag} ${EnvironmentTag} environment'
      ResourceQuery:
        Type: 'TAG_FILTERS_1_0'
        Query:
          ResourceTypeFilters:
            - 'AWS::EC2::Instance'
            - 'AWS::RDS::DBInstance'
            - 'AWS::SageMaker::NotebookInstance'
            - 'AWS::SSM::ManagedInstance'
            - 'AWS::EC2::Volume'
            - 'AWS::RDS::DBCluster'
          TagFilters:
            - Key: 'Environment'
              Values:
                - !Ref EnvironmentTag
            - Key: 'Application'
              Values:
                - !Ref ApplicationTag
            - Key: 'Owner'
              Values:
                - !Ref OwnerTag
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: Application
          Value: !Ref ApplicationTag
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  ResourceGroupARN:
    Description: 'ARN of the created Resource Group'
    Value: !GetAtt MultiServiceResourceGroup.Arn

  ResourceGroupName:
    Description: 'Name of the created Resource Group'
    Value: !Ref MultiServiceResourceGroup

  ResourceGroupConsoleURL:
    Description: 'AWS Console URL for the Resource Group'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/resource-groups/groups/${MultiServiceResourceGroup}'