AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM role for AWS Service Catalog with permissions for S3, Lambda, CloudFormation, and SNS operations.

Resources:
  ServiceCatalogIAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'ServiceCatalogProvisioningRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'servicecatalog.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'ServiceCatalogCustomPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'servicecatalog:ProvisionProduct'
                  - 'servicecatalog:UpdateProvisionedProduct'
                  - 'servicecatalog:TerminateProvisionedProduct'
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:PassRole'
                  - 'lambda:CreateFunction'
                  - 'lambda:DeleteFunction'
                  - 'lambda:UpdateFunctionCode'
                  - 'lambda:UpdateFunctionConfiguration'
                  - 'cloudformation:CreateStack'
                  - 'cloudformation:DeleteStack'
                  - 'cloudformation:UpdateStack'
                  - 'sns:Publish'
                  - 'sns:Subscribe'
                Resource: '*'

Outputs:
  ServiceCatalogIAMRoleArn:
    Description: 'ARN of the IAM Role for Service Catalog provisioning'
    Value: !GetAtt ServiceCatalogIAMRole.Arn