AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Business Contact"
    Description: Name of the business contact person
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: Email address of the business contact person
  BusinessContactPhone:
    Type: String
    Default: "+1234567890"
    Description: Phone number of the business contact person

Resources:
  B2BIDataInterchangeProfile:
    Type: AWS::B2B::Profile
    Properties:
      ProfileName: !Sub "${AWS::StackName}-Profile"
      BusinessContact:
        Name: !Ref BusinessContactName
        Email: !Ref BusinessContactEmail
        Phone: !Ref BusinessContactPhone
      ProfileDescription: "Profile for EDI X12_214 transformation pipeline"

  B2BIDataInterchangeTransformer:
    Type: AWS::B2B::Transformer
    Properties:
      TransformerName: !Sub "${AWS::StackName}-Transformer"
      ProfileArn: !GetAtt B2BIDataInterchangeProfile.Arn
      TransformerType: "EDI_TO_JSON"
      TransformerConfiguration:
        DocumentType: "X12_214"
        TargetFormat: "JSON"
      TransformerDescription: "Transformer for converting EDI X12_214 to JSON"

  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  B2BIDataInterchangePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-B2BI-Policy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt InputS3Bucket.Arn
              - !Sub "${InputS3Bucket.Arn}/*"
              - !GetAtt OutputS3Bucket.Arn
              - !Sub "${OutputS3Bucket.Arn}/*"
      Roles:
        - !Ref B2BIDataInterchangeRole

  B2BIDataInterchangeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BI-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2b.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSB2BDataInterchangeServiceRolePolicy

Outputs:
  InputS3BucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputS3Bucket
  OutputS3BucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputS3Bucket
  B2BIDataInterchangeProfileArn:
    Description: ARN of the B2B Data Interchange profile
    Value: !GetAtt B2BIDataInterchangeProfile.Arn