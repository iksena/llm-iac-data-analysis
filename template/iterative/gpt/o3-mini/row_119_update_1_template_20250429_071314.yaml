AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EventBridge-to-Kinesis integration.
  This template provisions an EventBridge custom event bus, a Kinesis data stream,
  an IAM role granting EventBridge permissions to publish to Kinesis,
  and an EventBridge rule that routes events from the source 'my-application' to the Kinesis stream.

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: MyKinesisDataStream
      ShardCount: 1

  EventBridgeToKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeToKinesisRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AllowPutRecordToKinesis
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisDataStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: EventBridgeToKinesisRule
      Description: "Rules to filter events from 'my-application' and send them to Kinesis"
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "my-application"
      Targets:
        - Id: "KinesisTarget"
          Arn: !GetAtt KinesisDataStream.Arn
          RoleArn: !GetAtt EventBridgeToKinesisRole.Arn
          KinesisParameters:
            PartitionKeyPath: "$.detail.partitionKey"

Outputs:
  EventBusName:
    Description: "Name of the custom EventBridge event bus"
    Value: !Ref CustomEventBus

  KinesisStreamArn:
    Description: "ARN of the Kinesis data stream"
    Value: !GetAtt KinesisDataStream.Arn

  EventBridgeToKinesisRoleArn:
    Description: "ARN of the IAM role for EventBridge to publish to Kinesis"
    Value: !GetAtt EventBridgeToKinesisRole.Arn