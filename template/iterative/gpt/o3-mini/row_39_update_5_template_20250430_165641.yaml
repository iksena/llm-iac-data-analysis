AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template creates an Amazon ECR repository with an embedded repository policy
  that grants the AWS account root user permissions to perform critical ECR actions for Kubernetes container image management.
Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: k8s-container-images
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootUserECRActions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:PutImage
            Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/k8s-container-images"
Outputs:
  RepositoryUri:
    Description: "The URI of the created Amazon ECR repository"
    Value: !GetAtt ECRRepository.RepositoryUri