AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an event-driven integration between AWS EventBridge
  and a MongoDB API endpoint. This template provisions an EventBridge event bus, 
  an SQS dead-letter queue for failed event deliveries, a Connection resource with API key authentication,
  an API Destination for the MongoDB endpoint, an IAM role to allow EventBridge to invoke the API destination,
  and an EventBridge rule to route custom events to the API destination.

Resources:
  MongoDBEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MongoDBEventBus

  MongoDBDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDLQQueue

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: MongoDBConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "test_name"
          ApiKeyValue: "test_value"
      Description: "Connection for MongoDB API endpoint using API key authentication."

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: "https://www.testanu.com"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt MongoDBApiDestination.Arn

  MongoDBEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: MongoDBEventRule
      EventBusName: !Ref MongoDBEventBus
      EventPattern:
        source:
          - "custom.application"
        detail-type:
          - "MongoDBEvent"
      Targets:
        - Id: Target0
          Arn: !GetAtt MongoDBApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt MongoDBDeadLetterQueue.Arn

Outputs:
  EventBusName:
    Description: "Name of the EventBridge Event Bus"
    Value: !Ref MongoDBEventBus
  ApiDestinationArn:
    Description: "ARN of the MongoDB API Destination"
    Value: !GetAtt MongoDBApiDestination.Arn
  DeadLetterQueueArn:
    Description: "ARN of the Dead-Letter SQS Queue"
    Value: !GetAtt MongoDBDeadLetterQueue.Arn