AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket with optional AWS Organization-wide access'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*$'
    ConstraintDescription: Bucket name must contain only lowercase letters, numbers, dots (.), and hyphens (-)

  OrganizationId:
    Type: String
    Description: (Optional) AWS Organization ID for organization-wide access
    Default: ''
    AllowedPattern: '^(o-[a-z0-9]{10,32})?$'
    ConstraintDescription: Must be a valid AWS Organization ID or empty

  OrganizationalUnitId:
    Type: String
    Description: (Optional) AWS Organizational Unit ID for OU-specific access
    Default: ''
    AllowedPattern: '^(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32})?$'
    ConstraintDescription: Must be a valid AWS Organizational Unit ID or empty

  EnableOrganizationAccess:
    Type: String
    Description: Enable access for the entire organization or OU
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'false'

Conditions:
  IsOrganizationAccessEnabled: !Equals [!Ref EnableOrganizationAccess, 'true']
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, '']]
  HasOUId: !Not [!Equals [!Ref OrganizationalUnitId, '']]
  CreateOrgPolicy: !And 
    - !Condition IsOrganizationAccessEnabled
    - !Or [!Condition HasOrganizationId, !Condition HasOUId]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateOrgPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOrganizationAccess
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${S3Bucket}
              - !Sub arn:aws:s3:::${S3Bucket}/*
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !If [HasOrganizationId, !Ref OrganizationId, !Ref AWS::NoValue]
                aws:PrincipalOrgPaths: !If [HasOUId, !Sub '/aws-organizations/${OrganizationalUnitId}/', !Ref AWS::NoValue]

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn

  BucketDomainName:
    Description: Domain name of the created S3 bucket
    Value: !GetAtt S3Bucket.DomainName

  OrganizationAccess:
    Description: Organization access status
    Value: !If [CreateOrgPolicy, 'Enabled', 'Disabled']