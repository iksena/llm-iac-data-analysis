AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Mobile Notifications DynamoDB Table with GSI'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: mobile-notifications
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9._-]+'
  
  TTLAttributeName:
    Type: String
    Description: Name of the TTL attribute
    Default: expiryTime
    MinLength: 1
    MaxLength: 255

  PrimaryKeyName:
    Type: String
    Description: Name of the primary key attribute
    Default: notificationId
    MinLength: 1
    MaxLength: 255

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: !Ref PrimaryKeyName
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
      KeySchema:
        - AttributeName: !Ref PrimaryKeyName
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true
      Tags:
        - Key: Purpose
          Value: MobileNotifications
        - Key: Environment
          Value: Production

Outputs:
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TableArn

  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref NotificationsTable
    Export:
      Name: !Sub ${AWS::StackName}-TableName

  GSIName:
    Description: Name of the Global Secondary Index
    Value: TypeSentTimeIndex
    Export:
      Name: !Sub ${AWS::StackName}-GSIName