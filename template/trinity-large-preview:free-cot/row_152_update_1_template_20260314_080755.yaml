AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Aurora MySQL Cluster with RDS Proxy Integration'

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for public subnet 1
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 2
  PublicSubnet3CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 3
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.10.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.11.0/24
    Description: CIDR block for private subnet 2
  PrivateSubnet3CIDR:
    Type: String
    Default: 10.0.12.0/24
    Description: CIDR block for private subnet 3
  DatabaseName:
    Type: String
    Default: aurora_db
    Description: Name of the primary database
  MasterUsername:
    Type: String
    Default: admin
    Description: Username for the master database user
  MasterUserPassword:
    Type: String
    NoEcho: true
    Default: 'Aurora123!'
    Description: Password for the master database user
  EngineVersion:
    Type: String
    Default: 5.7.mysql_aurora.2.07.2
    Description: Aurora MySQL engine version
  InstanceClass:
    Type: String
    Default: db.r6g.large
    Description: DB instance class for Aurora instances
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
    Description: Daily time range for backups
  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
    Description: Weekly time range for maintenance
  MaxConnectionsPercent:
    Type: Number
    Default: 100
    Description: Maximum connections as percentage of database limit
  MaxIdleConnectionsPercent:
    Type: Number
    Default: 50
    Description: Maximum idle connections as percentage of database limit

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: AuroraIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet3CIDR
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet3

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet3CIDR
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet3

  PublicSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      Tags:
        - Key: Name
          Value: AuroraDBSubnetGroup

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: AuroraSecurityGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: LambdaSecurityGroup

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Aurora encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/aurora-kms-key
      TargetKeyId: !Ref KMSKey

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: aurora-cluster-secret
      Description: Secret for Aurora cluster credentials
      SecretString: !Sub '{"username": "${MasterUsername}", "password": "${MasterUserPassword}"}'
      Tags:
        - Key: Name
          Value: AuroraSecret

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DatabaseName: !Ref DatabaseName
      DBSubnetGroupName: !Ref DBSubnetGroup
      Engine: aurora-mysql
      EngineVersion: !Ref EngineVersion
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      StorageEncrypted: true
      KmsKeyId: !Ref KMSKey
      EnableIAMDatabaseAuthentication: true
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      DBClusterParameterGroupName: default.aurora-mysql5.7
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      Port: 3306
      Tags:
        - Key: Name
          Value: AuroraCluster

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref InstanceClass
      Engine: aurora-mysql
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      DBParameterGroupName: default.aurora-mysql5.7
      Tags:
        - Key: Name
          Value: AuroraInstance1

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref InstanceClass
      Engine: aurora-mysql
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      DBParameterGroupName: default.aurora-mysql5.7
      Tags:
        - Key: Name
          Value: AuroraInstance2

  DBInstance3:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref InstanceClass
      Engine: aurora-mysql
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      DBParameterGroupName: default.aurora-mysql5.7
      Tags:
        - Key: Name
          Value: AuroraInstance3

  RDSProxyIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretsManagerSecret
      Tags:
        - Key: Name
          Value: RDSProxyIAMRole

  RDSProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: aurora-proxy
      EngineFamily: MYSQL
      RoleArn: !GetAtt RDSProxyIAMRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref SecretsManagerSecret
          IAMAuth: REQUIRED
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      RequireTLS: true
      Tags:
        - Key: Name
          Value: AuroraProxy

  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !Ref DBCluster
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: !Ref MaxConnectionsPercent
        MaxIdleConnectionsPercent: !Ref MaxIdleConnectionsPercent
        ConnectionBorrowTimeout: 120
        SessionPinningFilters: ["EXCLUDE_VARIABLE_SETS"]

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/rds/cluster/aurora-cluster
      RetentionInDays: 30

  EnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EnhancedMonitoringPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                  - ec2:DescribeTags
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: '*'
      Tags:
        - Key: Name
          Value: EnhancedMonitoringRole

  CloudWatchAlarmCPU:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AuroraCPUUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmDescription: Alarm if CPU utilization exceeds 80%
      AlarmActions:
        - !Ref SNSAlarmTopic
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DBCluster

  CloudWatchAlarmConnections:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AuroraConnectionCount
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Period: 300
      Statistic: Average
      Threshold: 1000
      AlarmDescription: Alarm if connection count exceeds 1000
      AlarmActions:
        - !Ref SNSAlarmTopic
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref DBCluster

  SNSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AuroraAlarms
      Tags:
        - Key: Name
          Value: AuroraAlarmTopic

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: AuroraDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "CPUUtilization", "DBClusterIdentifier", "${DBCluster}" ],
                  [ "AWS/RDS", "DatabaseConnections", "DBClusterIdentifier", "${DBCluster}" ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Cluster Performance"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/RDS", "FreeableMemory", "DBClusterIdentifier", "${DBCluster}" ],
                  [ "AWS/RDS", "FreeStorageSpace", "DBClusterIdentifier", "${DBCluster}" ]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Storage Metrics"
              }
            }
          ]
        }

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCID'
  DBClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt DBCluster.Endpoint
    Export:
      Name: !Sub '${AWS::StackName}-ClusterEndpoint'
  RDSProxyEndpoint:
    Description: RDS Proxy Endpoint
    Value: !GetAtt RDSProxy.Endpoint
    Export:
      Name: !Sub '${AWS::StackName}-ProxyEndpoint'
  SecurityGroup:
    Description: Security Group ID
    Value: !GetAtt SecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupID'
  LambdaSecurityGroup:
    Description: Lambda Security Group ID
    Value: !GetAtt LambdaSecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-LambdaSecurityGroupID'