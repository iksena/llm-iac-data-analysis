AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      FileSystemType: ONEWZONE_IA
      Encrypted: true
      AvailabilityZoneName: us-east-1a
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedOneZoneFileSystem
      SubnetId: !ImportValue SubnetId
      SecurityGroups:
        - !ImportValue SecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref EncryptedOneZoneFileSystem
  FileSystemArn:
    Description: The ARN of the created file system
    Value: !GetAtt EncryptedOneZoneFileSystem.Arn