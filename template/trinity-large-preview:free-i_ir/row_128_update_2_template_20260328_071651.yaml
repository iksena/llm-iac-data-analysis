AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Security Hub Controls Manager

Resources:
  SecurityHubControlManagerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubControlManagerRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary:
        Ref: SecurityHubControlManagerPermissionBoundary
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateSecurityHubConfiguration
                  - securityhub:DescribeStandardsControls
                  - securityhub:BatchUpdateStandardsControls
                Resource: "*"

  SecurityHubControlManagerPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"

  SecurityHubControlManagerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  SecurityHubControlManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs24.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Lambda logic here
          };
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          DISABLE_CIS_140_CONTROLS: "false"
          DISABLE_FOUNDATIONAL_BEST_PRACTICES: "false"
      Role:
        Fn::GetAtt:
          - SecurityHubControlManagerRole
          - Arn

  SecurityHubControlManagerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Ref: SecurityHubControlManagerLambda
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
          - SecurityHubControlManagerEventSource
          - Arn

  SecurityHubControlManagerEventSource:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  SecurityHubControlManagerLogSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn:
        Fn::GetAtt:
          - SecurityHubControlManagerLogDestination
          - Arn
      FilterPattern: ""
      LogGroupName:
        Ref: SecurityHubControlManagerLogGroup

  SecurityHubControlManagerLogDestination:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  SecurityHubControlManagerLogDestinationPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecurityHubControlManagerLogDestinationPolicy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
            Resource:
              Fn::GetAtt:
                - SecurityHubControlManagerLogDestination
                - Arn
      Roles:
        - Ref: SecurityHubControlManagerRole

  SecurityHubControlManagerEventSourcePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecurityHubControlManagerEventSourcePolicy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
            Resource:
              Fn::GetAtt:
                - SecurityHubControlManagerEventSource
                - Arn
      Roles:
        - Ref: SecurityHubControlManagerRole