AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon EFS file system with a mount target in the us-east-1a availability zone.
  This template is configured for a testing environment with shared storage.

Parameters:
  MountTargetSubnetId:
    Description: The subnet ID in us-east-1a for the EFS mount target.
    Type: AWS::EC2::Subnet::Id
  MountTargetSecurityGroupId:
    Description: The security group ID for the EFS mount target.
    Type: AWS::EC2::SecurityGroup::Id

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIa: AFTER_14_DAYS
    DeletionPolicy: Retain

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    DependsOn: EfsFileSystem
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref MountTargetSubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system.
    Value: !Ref EfsFileSystem
  MountTargetId:
    Description: The ID of the created EFS mount target.
    Value: !Ref EfsMountTarget