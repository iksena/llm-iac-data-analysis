AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an AWS Resource Group using tag-based filters to include resources from various AWS services'

Parameters:
  ResourceGroupName:
    Type: String
    Description: Name of the Resource Group
    Default: MyResourceGroup
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_\.-]+'
    ConstraintDescription: Must contain only alphanumeric characters, underscores, hyphens, and periods.

  EnvironmentTagKey:
    Type: String
    Description: The tag key for environment
    Default: Environment
    MinLength: 1
    MaxLength: 128

  EnvironmentTagValue:
    Type: String
    Description: The tag value for environment
    Default: Production
    MinLength: 1
    MaxLength: 256

  ApplicationTagKey:
    Type: String
    Description: The tag key for application
    Default: Application
    MinLength: 1
    MaxLength: 128

  ApplicationTagValue:
    Type: String
    Description: The tag value for application
    Default: MyApp
    MinLength: 1
    MaxLength: 256

  OwnerTagKey:
    Type: String
    Description: The tag key for owner
    Default: Owner
    MinLength: 1
    MaxLength: 128

  OwnerTagValue:
    Type: String
    Description: The tag value for owner
    Default: DevOpsTeam
    MinLength: 1
    MaxLength: 256

Resources:
  TagBasedResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Ref ResourceGroupName
      Description: 'Resource group containing resources with specific tags'
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - 'AWS::EC2::Instance'
            - 'AWS::RDS::DBInstance'
            - 'AWS::SageMaker::NotebookInstance'
            - 'AWS::SSM::ManagedInstance'
            - 'AWS::EC2::Volume'
            - 'AWS::EC2::SecurityGroup'
            - 'AWS::S3::Bucket'
            - 'AWS::Lambda::Function'
            - 'AWS::DynamoDB::Table'
            - 'AWS::ElasticLoadBalancingV2::LoadBalancer'
          TagFilters:
            - Key: !Ref EnvironmentTagKey
              Values:
                - !Ref EnvironmentTagValue
            - Key: !Ref ApplicationTagKey
              Values:
                - !Ref ApplicationTagValue
            - Key: !Ref OwnerTagKey
              Values:
                - !Ref OwnerTagValue
      Tags:
        - Key: !Ref EnvironmentTagKey
          Value: !Ref EnvironmentTagValue
        - Key: !Ref ApplicationTagKey
          Value: !Ref ApplicationTagValue
        - Key: !Ref OwnerTagKey
          Value: !Ref OwnerTagValue

Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt TagBasedResourceGroup.Arn

  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref TagBasedResourceGroup