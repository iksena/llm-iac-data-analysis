AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with custom Lambda resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for arithmetic operation
  SecondNumber:
    Type: Number
    Description: Second number for arithmetic operation
  Operator:
    Type: String
    AllowedValues:
      - add
      - subtract
      - multiply
      - divide
    Description: Arithmetic operator to use
  ForceFail:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: Force the custom resource to fail for testing

Resources:
  HelperLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelperLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Code:
        ZipFile:
          Fn::Join:
            - ''
            - - 'const response = require(''cfn-response'');'
              - 'exports.handler = async (event, context) => {'
              - '    console.log(''Event: '' + JSON.stringify(event));'
              - '    try {'
              - '        const firstNumber = parseFloat(event.ResourceProperties.FirstNumber);'
              - '        const secondNumber = parseFloat(event.ResourceProperties.SecondNumber);'
              - '        const operator = event.ResourceProperties.Operator;'
              - '        const forceFail = event.ResourceProperties.ForceFail === ''true'';'
              - ''
              - '        if (forceFail) {'
              - '            throw new Error(''Forced failure for testing'');'
              - '        }'
              - ''
              - '        let result;'
              - '        switch(operator) {'
              - '            case ''add'':'
              - '                result = firstNumber + secondNumber;'
              - '                break;'
              - '            case ''subtract'':'
              - '                result = firstNumber - secondNumber;'
              - '                break;'
              - '            case ''multiply'':'
              - '                result = firstNumber * secondNumber;'
              - '                break;'
              - '            case ''divide'':'
              - '                if (secondNumber === 0) throw new Error(''Division by zero'');'
              - '                result = firstNumber / secondNumber;'
              - '                break;'
              - '            default:'
              - '                throw new Error(''Invalid operator'');'
              - '        }'
              - ''
              - '        const responseData = {'
              - '            Result: result.toString(),'
              - '            Operation: `${firstNumber} ${operator} ${secondNumber} = ${result}`'
              - '        };'
              - ''
              - '        await response.send(event, context, response.SUCCESS, responseData);'
              - '        return responseData;'
              - '    } catch (err) {'
              - '        console.error(err);'
              - '        await response.send(event, context, response.FAILED, { Error: err.message });'
              - '        throw err;'
              - '    }'
              - '};'
      Timeout: 30
      Role:
        Fn::GetAtt:
          - HelperLambdaExecutionRole
          - Arn
    DependsOn:
      - HelperLambdaExecutionRole

  HelperLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
          - HelperLambdaFunction
          - Arn
      Principal: cloudformation.amazonaws.com
    DependsOn:
      - HelperLambdaFunction

  CustomHelperResource:
    Type: Custom::helper
    Properties:
      ServiceToken:
        Fn::GetAtt:
          - HelperLambdaFunction
          - Arn
      FirstNumber:
        Ref: FirstNumber
      SecondNumber:
        Ref: SecondNumber
      Operator:
        Ref: Operator
      ForceFail:
        Ref: ForceFail
    DependsOn:
      - HelperLambdaFunction

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value:
      Fn::GetAtt:
        - CustomHelperResource
        - Result
  OperationDetails:
    Description: Details of the arithmetic operation performed
    Value:
      Fn::GetAtt:
        - CustomHelperResource
        - Operation