AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-stream
      ShardCount: 1
      RetentionPeriodHours: 24
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-kinesis-stream

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-read-throughput-exceeded
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 60
      Statistic: Sum
      Threshold: 1
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-write-throughput-exceeded
      ComparisonOperator: GreaterThanOrEqualToThreshold
      EvaluationPeriods: 1
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 60
      Statistic: Sum
      Threshold: 1
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream

  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisStreamThroughputAlarms
      TopicName: !Sub ${AWS::StackName}-kinesis-alarms

Outputs:
  KinesisStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
    Export:
      Name: !Sub ${AWS::StackName}-kinesis-stream-arn

  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref KinesisStream
    Export:
      Name: !Sub ${AWS::StackName}-kinesis-stream-name