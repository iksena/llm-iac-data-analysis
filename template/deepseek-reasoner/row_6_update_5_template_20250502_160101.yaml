AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Security Group
Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
  KeyName:
    Description: Name of existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
  SSHLocation:
    Description: Allowed SSH IP range
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d+\.){3}\d+/\d+$'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the security group will be created
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for EC2 instance placement

Mappings:
  AWSRegionAMI:
    us-east-1:
      AMIID: ami-0c55b159cbfafe1f0
    us-west-2:
      AMIID: ami-0e8c04af2729ff1bb
    eu-west-1:
      AMIID: ami-0a8e758f5e873d1c1

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-SSH-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSRegionAMI, !Ref "AWS::Region", AMIID]
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: CFN-EC2-Instance

Outputs:
  InstancePublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  SecurityGroupId:
    Description: Created Security Group ID
    Value: !Ref SecurityGroup