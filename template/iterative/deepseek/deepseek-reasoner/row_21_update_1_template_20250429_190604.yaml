AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DatabaseName:
    Type: String
    Default: poc-database
    Description: Name for the Timestream database
  Table01MemoryRetention:
    Type: Number
    Default: 720
    Description: Memory retention in hours for Batch Write table (30 days)
  Table01MagneticRetention:
    Type: Number
    Default: 365
    Description: Magnetic retention in days for Batch Write table
  Table02MemoryRetention:
    Type: Number
    Default: 720
    Description: Memory retention in hours for Older Records MemOnly
  Table02MagneticRetention:
    Type: Number
    Default: 0
    Description: Magnetic retention disabled (0) for MemOnly table
  Table03MemoryRetention:
    Type: Number
    Default: 24
    Description: Short memory retention for Magnetic table
  Table03MagneticRetention:
    Type: Number
    Default: 365
    Description: Long magnetic retention for Magnetic table
  Table04MemoryRetention:
    Type: Number
    Default: 168
    Description: Memory retention for Common Attributes table (7 days)
  Table04MagneticRetention:
    Type: Number
    Default: 365
    Description: Magnetic retention for Common Attributes table

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  Table01BatchWrite:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table01MemoryRetention
        MagneticStoreRetentionPeriodInDays: !Ref Table01MagneticRetention

  Table02OlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table02MemoryRetention
        MagneticStoreRetentionPeriodInDays: !Ref Table02MagneticRetention

  Table03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table03MemoryRetention
        MagneticStoreRetentionPeriodInDays: !Ref Table03MagneticRetention

  Table04CommonAttributes:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table04MemoryRetention
        MagneticStoreRetentionPeriodInDays: !Ref Table04MagneticRetention

Outputs:
  DatabaseARN:
    Value: !GetAtt TimestreamDatabase.Arn
  Table01ARN:
    Value: !GetAtt Table01BatchWrite.Arn
  Table02ARN:
    Value: !GetAtt Table02OlderRecordsMemOnly.Arn
  Table03ARN:
    Value: !GetAtt Table03OlderRecordsMagnetic.Arn
  Table04ARN:
    Value: !GetAtt Table04CommonAttributes.Arn