AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Aurora MySQL Cluster with RDS Proxy Integration

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PrivateSubnetCIDR1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnetCIDR2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  DatabaseUsername:
    Type: String
    Default: admin
    Description: Database master username
  DatabasePassword:
    Type: String
    NoEcho: true
    Default: Admin123!
    Description: Database master password
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
    Description: Aurora cluster identifier
  DBProxyIdentifier:
    Type: String
    Default: aurora-proxy
    Description: RDS Proxy identifier

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetCIDR1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetCIDR2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster and RDS Proxy
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${DBClusterIdentifier}-secret"
      Description: Secret for Aurora cluster credentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DatabaseUsername}"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true
      EnableHttpEndpoint: true
      BackupRetentionPeriod: 7
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DatabaseSecurityGroup.GroupId
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery
      MonitoringInterval: 60
      EnablePerformanceInsights: true
      DBClusterIdentifier: !Ref DBClusterIdentifier

  DBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      EngineFamily: MYSQL
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: DISABLED
          SecretArn: !Ref DatabaseSecret
      RequireTLS: true
      VpcSecurityGroupIds:
        - !GetAtt DatabaseSecurityGroup.GroupId
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      IdleClientTimeout: 1800
      MaxConnectionsPercent: 80
      DBProxyIdentifier: !Ref DBProxyIdentifier
      RoleArn: !GetAtt DBProxyRole.Arn
      DBProxyTargetGroups:
        - TargetGroupName: !Ref DBCluster

  DBProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:ListSecrets
                Resource: !Ref DatabaseSecret

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.r6g.large
      Engine: aurora-mysql
      MonitoringInterval: 60
      EnablePerformanceInsights: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DatabaseSecurityGroup.GroupId

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: db.r6g.large
      Engine: aurora-mysql
      MonitoringInterval: 60
      EnablePerformanceInsights: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DatabaseSecurityGroup.GroupId

Outputs:
  DBClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt DBCluster.Endpoint
  DBProxyEndpoint:
    Description: RDS Proxy endpoint
    Value: !GetAtt DBProxy.Endpoint
  DatabaseSecretARN:
    Description: Database secret ARN
    Value: !Ref DatabaseSecret