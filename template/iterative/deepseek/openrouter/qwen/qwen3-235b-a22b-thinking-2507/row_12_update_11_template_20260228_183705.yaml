AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with Elastic IP and SSH access in default VPC (self-contained)'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2Describe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
  GetDefaultVpcFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          def handler(event, context):
            try:
              if event['RequestType'] == 'Delete':
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                return
              ec2 = boto3.client('ec2')
              vpcs = ec2.describe_vpcs(Filters=[{'Name': 'is-default', 'Values': ['true']}])['Vpcs']
              if not vpcs:
                raise Exception("No default VPC found")
              vpc_id = vpcs[0]['VpcId']
              subnets = ec2.describe_subnets(
                Filters=[
                  {'Name': 'vpc-id', 'Values': [vpc_id]},
                  {'Name': 'defaultForAz', 'Values': ['true']}
                ]
              )['Subnets']
              if not subnets:
                raise Exception("No default subnet found")
              subnet_id = subnets[0]['SubnetId']
              cfnresponse.send(
                event, 
                context, 
                cfnresponse.SUCCESS, 
                {'VpcId': vpc_id, 'SubnetId': subnet_id},
                physical_resource_id=vpc_id
              )
            except Exception as e:
              logger.error(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
  GetDefaultVpc:
    Type: Custom::GetDefaultVpc
    Properties:
      ServiceToken: !GetAtt GetDefaultVpcFunction.Arn
  KeyPairLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2KeyPair
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                Resource: '*'
        - PolicyName: SecretsManager
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                Resource: '*'
  GenerateKeyPairFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          def handler(event, context):
            try:
              ec2 = boto3.client('ec2')
              secrets = boto3.client('secretsmanager')
              stack_name = event['StackId'].split('/')[1]
              request_type = event['RequestType']
              resource_id = event['LogicalResourceId']
              secret_name = f"{stack_name}-{resource_id}-key"
              key_name = f"{stack_name}-{resource_id}"
              if request_type == 'Delete':
                try:
                  ec2.delete_key_pair(KeyName=key_name)
                except Exception as e:
                  logger.error(f"Delete key pair error: {e}")
                try:
                  secrets.delete_secret(SecretId=secret_name, ForceDeleteWithoutRecovery=True)
                except Exception as e:
                  logger.error(f"Delete secret error: {e}")
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_resource_id=key_name)
                return
              if request_type == 'Create':
                response = ec2.create_key_pair(KeyName=key_name)
                private_key = response['KeyMaterial']
                secrets.create_secret(Name=secret_name, SecretString=private_key)
                cfnresponse.send(
                  event, 
                  context, 
                  cfnresponse.SUCCESS, 
                  {'KeyName': key_name, 'SecretName': secret_name},
                  physical_resource_id=key_name
                )
              else:
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_resource_id=key_name)
            except Exception as e:
              logger.error(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))
      Handler: index.handler
      Role: !GetAtt KeyPairLambdaRole.Arn
      Runtime: python3.12
      Timeout: 30
  MyKeyPair:
    Type: Custom::GenerateKeyPair
    Properties:
      ServiceToken: !GetAtt GenerateKeyPairFunction.Arn
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !GetAtt GetDefaultVpc.VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSH-Security-Group
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - InstanceSecurityGroup
      - MyKeyPair
    Properties:
      ImageId: !Ref 'AWS::SSM::Parameter::Value</aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2>'
      InstanceType: t2.micro
      KeyName: !GetAtt MyKeyPair.KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !GetAtt GetDefaultVpc.SubnetId
      Tags:
        - Key: Name
          Value: SSH-Accessible-Instance
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  ElasticIPAddress:
    Description: Elastic IP address
    Value: !GetAtt ElasticIP.PublicIp
  SSHCommand:
    Description: Command to connect via SSH (retrieve key from Secrets Manager)
    Value: !Sub 'ssh -i <(aws secretsmanager get-secret-value --secret-id ${MyKeyPair.SecretName} --query SecretString --output text) ec2-user@${ElasticIP.PublicIp}'
  KeySecretArn:
    Description: Secrets Manager ARN for private key
    Value: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MyKeyPair.SecretName}'