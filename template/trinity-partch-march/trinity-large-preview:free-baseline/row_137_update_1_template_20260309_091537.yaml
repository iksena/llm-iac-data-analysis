AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AppSync GraphQL API with Lambda backend for pet inventory service

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - appsync:GraphQL
                Resource: !Sub 'arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/${GraphQLApi.Arn}'

  PetInventoryLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          def handler(event, context):
              pets = [
                  {"id": "1", "name": "Max", "type": "Dog"},
                  {"id": "2", "name": "Bella", "type": "Cat"},
                  {"id": "3", "name": "Charlie", "type": "Bird"},
                  {"id": "4", "name": "Lucy", "type": "Dog"},
                  {"id": "5", "name": "Rocky", "type": "Dog"}
              ]
              return {
                  "statusCode": 200,
                  "body": {
                      "pets": pets
                  }
              }

  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      SchemaDefinition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  ApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Description: API Key for PetShopAPI
      Expires: !Select [0, !Split ["-", !Select [1, !Split ["T", !GetAtt GraphQLApi.CreationDate]]]]

  LambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: PetInventoryLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt LambdaInvocationRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetInventoryLambda.Arn

  LambdaInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetInventoryLambda.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt LambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "method": "POST",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body.pets)

Outputs:
  GraphQLAPIUrl:
    Description: URL for the GraphQL API
    Value: !GetAtt GraphQLApi.GraphQLUrl
  GraphQLAPIApiKey:
    Description: API Key for the GraphQL API
    Value: !GetAtt ApiKey.ApiKey
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt PetInventoryLambda.Arn