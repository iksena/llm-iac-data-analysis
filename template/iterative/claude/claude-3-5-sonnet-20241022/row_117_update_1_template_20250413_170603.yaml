AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge Pipes integration with DynamoDB Streams'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: OrdersTable
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge custom event bus
    Default: OrdersEventBus
    
  BillingMode:
    Type: String
    Description: DynamoDB billing mode
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt EventBus.Arn

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${TableName}-insert-pipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt EventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
          FilterCriteria:
            Filters:
              - Pattern: '{"eventName": ["INSERT"]}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'OrderInserted'
          Source: 'custom.orders'

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${TableName}-modify-pipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt EventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
          FilterCriteria:
            Filters:
              - Pattern: '{"eventName": ["MODIFY"]}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'OrderModified'
          Source: 'custom.orders'

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TableArn

  TableStreamArn:
    Description: DynamoDB Table Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
    Export:
      Name: !Sub ${AWS::StackName}-StreamArn

  EventBusArn:
    Description: EventBridge Bus ARN
    Value: !GetAtt EventBus.Arn
    Export:
      Name: !Sub ${AWS::StackName}-EventBusArn

  InsertPipeArn:
    Description: Insert Event Pipe ARN
    Value: !GetAtt InsertEventPipe.Arn
    Export:
      Name: !Sub ${AWS::StackName}-InsertPipeArn

  ModifyPipeArn:
    Description: Modify Event Pipe ARN
    Value: !GetAtt ModifyEventPipe.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ModifyPipeArn