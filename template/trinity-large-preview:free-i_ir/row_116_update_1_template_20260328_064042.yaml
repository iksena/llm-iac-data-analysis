AWSTemplateFormatVersion: '2010-09-09'
Description: SNS-to-SQS Fanout System with Filtered Message Routing

Resources:
  CentralSnsTopic:
    Type: AWS::SNS::Topic
    Properties: {}

  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  AllMetricsDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
      Protocol: sqs
      TopicArn: !Ref CentralSnsTopic
    DependsOn:
      - CentralSnsTopic
      - AllMetricsSqsQueue

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      Protocol: sqs
      TopicArn: !Ref CentralSnsTopic
      FilterPolicy:
        MetricType:
          - Temperature
    DependsOn:
      - CentralSnsTopic
      - TemperatureSqsQueue

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      Protocol: sqs
      TopicArn: !Ref CentralSnsTopic
      FilterPolicy:
        MetricType:
          - Humidity
    DependsOn:
      - CentralSnsTopic
      - HumiditySqsQueue

Outputs:
  CentralSnsTopicArn:
    Description: ARN of the central SNS topic
    Value: !Ref CentralSnsTopic
  AllMetricsSqsQueueArn:
    Description: ARN of the all-metrics SQS queue
    Value: !GetAtt AllMetricsSqsQueue.Arn
  TemperatureSqsQueueArn:
    Description: ARN of the temperature-filtered SQS queue
    Value: !GetAtt TemperatureSqsQueue.Arn
  HumiditySqsQueueArn:
    Description: ARN of the humidity-filtered SQS queue
    Value: !GetAtt HumiditySqsQueue.Arn