AWSTemplateFormatVersion: '2010-09-09'
Description: EMR Cluster for Spark or S3 backed Hbase with role management
Resources:
  EMRRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: elasticmapreduce.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonS3FullAccess
      - arn:aws:iam::aws:policy/AmazonElasticMapReduceFullAccess
      - arn:aws:iam::aws:policy/service-role/AmazonElasticMapReduceRole
  EMRCluster:
    Type: AWS::EMR::Cluster
    Properties:
      Name: MyEMRCluster
      ReleaseLabel: emr-6.10.0
      Applications:
      - Name: Spark
      - Name: Hive
      - Name: Hadoop
      Instances:
        InstanceGroups:
        - Name: Master
          InstanceRole: MASTER
          InstanceType: m5.xlarge
          InstanceCount: 1
        - Name: Core
          InstanceRole: CORE
          InstanceType: m5.xlarge
          InstanceCount: 2
        - Name: Task
          InstanceRole: TASK
          InstanceType: m5.xlarge
          InstanceCount: 2
        KeepJobFlowAliveWhenNoSteps: true
        TerminationProtected: false
      VisibleToAllUsers: true
      ServiceRole: !Ref EMRRole
      JobFlowRole: !Ref EMRRole
      Tags:
      - Key: Name
        Value: MyEMRCluster
Outputs:
  ClusterId:
    Value: !Ref EMRCluster
    Description: EMR Cluster ID
  ClusterDNS:
    Value: !GetAtt EMRCluster.MasterPublicDnsName
    Description: EMR Master Node Public DNS Name

