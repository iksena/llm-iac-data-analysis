AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy an EC2 instance in the default VPC/subnet with an Elastic IP and a Security Group
  that allows SSH access. The template is parameterized for flexibility and uses a mapping for the AMI based on region.

Parameters:
  VpcId:
    Description: The VPC ID in which to deploy the EC2 instance (default VPC recommended).
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: The Subnet ID within the specified VPC to deploy the instance (default subnet recommended).
    Type: AWS::EC2::Subnet::Id
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.nano
      - t2.micro
      - t2.small
      - t2.medium
  # No default for ImageId; using mapping for region-specific Amazon Linux 2 AMIs.

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c94855ba95c71c99
    us-west-2:
      AMI: ami-09d95fab7fff3776c
    eu-west-1:
      AMI: ami-0b0dcb5067f052a63

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EC2 instance allowing SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup

  EC2ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn:
      - EC2Instance
      - EC2ElasticIP
    Properties:
      AllocationId: !GetAtt EC2ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

Outputs:
  InstanceId:
    Description: ID of the deployed EC2 instance
    Value: !Ref EC2Instance
  ElasticIP:
    Description: Elastic IP address allocated to the instance
    Value: !Ref EC2ElasticIP
  SecurityGroupId:
    Description: Security Group ID attached to the EC2 instance
    Value: !Ref EC2SecurityGroup