AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a custom resource using AWS Lambda to perform arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
  SecondNumber:
    Type: Number
    Default: 5
  Operator:
    Type: String
    Default: +
    AllowedValues:
      - +
      - -
      - *
      - /
  ForceFailure:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              print("Received event: " + json.dumps(event, indent=2))

              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              try:
                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']
                  force_failure = event['ResourceProperties']['ForceFailure']

                  if force_failure.lower() == 'true':
                      raise ValueError("Forced failure for testing")

                  if operator == '+':
                      result = first_number + second_number
                  elif operator == '-':
                      result = first_number - second_number
                  elif operator == '*':
                      result = first_number * second_number
                  elif operator == '/':
                      if second_number == 0:
                          raise ValueError("Division by zero")
                      result = first_number / second_number
                  else:
                      raise ValueError("Invalid operator")

                  response_data = {
                      'Result': result
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  print(str(e))
                  response_data = {
                      'Error': str(e)
                  }
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  CustomArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      ForceFailure: !Ref ForceFailure

Outputs:
  CalculationResult:
    Value: !GetAtt CustomArithmeticResource.Result