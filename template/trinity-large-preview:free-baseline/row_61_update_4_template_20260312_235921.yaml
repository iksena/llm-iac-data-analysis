AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a private Amazon Route 53 Hosted Zone for internal DNS management within a VPC.

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
    Description: The ID of the VPC to associate with the hosted zone.
  HostedZoneName:
    Type: String
    Default: www.example.com.
    Description: The name of the hosted zone.
    AllowedPattern: "^[a-zA-Z0-9-.]+\\.$"
    ConstraintDescription: The hosted zone name must end with a dot.

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref HostedZoneName
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management

Outputs:
  HostedZoneID:
    Description: The ID of the hosted zone.
    Value: !Ref PrivateHostedZone
  NameServers:
    Description: The name servers for the hosted zone.
    Value: !Join [",", !GetAtt PrivateHostedZone.NameServers]