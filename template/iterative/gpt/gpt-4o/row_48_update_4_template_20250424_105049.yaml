AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an AWS Glue ETL job infrastructure,
  including an S3 bucket for scripts and logs, an IAM role for Glue, and a Glue job.

Parameters:
  S3BucketName:
    Description: The name of the S3 bucket to store Glue scripts and logs.
    Type: String
    Default: my-glue-scripts-bucket
    AllowedPattern: '^[a-z0-9.-]+$'
    ConstraintDescription: Must be a valid S3 bucket name.

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${S3BucketName}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub arn:aws:s3:::${S3BucketName}

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: SampleGlueETLJob
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub s3://${S3BucketName}/glue_scripts/sample_convert.py
        PythonVersion: '3'
      GlueVersion: '4.0'
      MaxRetries: 1
      Timeout: 2880
      DefaultArguments:
        '--job-bookmark-option': 'job-bookmark-enable'
        '--enable-metrics': ''
        '--enable-continuous-logging': 'true'

Outputs:
  S3BucketName:
    Description: The name of the S3 bucket for Glue scripts and logs.
    Value: !Ref GlueScriptsBucket

  GlueJobName:
    Description: The name of the Glue ETL job.
    Value: !Ref GlueETLJob