AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EnableBoundaryEnforcement:
    Type: Boolean
    Default: true
    Description: Toggle for strict boundary enforcement
  PermissionBoundaryName:
    Type: String
    Default: MyTeamBoundary
    Description: Naming prefix for permission boundary
  TeamOwnerTag:
    Type: String
    Default: MyTeam
    Description: Team-specific owner tag

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
              - s3:PutObject
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:Create*
              - iam:Delete*
              - iam:Attach*
              - iam:Detach*
              - iam:Update*
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iam.amazonaws.com
            Action: sts:AssumeRole
      Path: '/'
      PermissionsBoundary:
        Fn::If:
          - EnableBoundaryEnforcement
          - !Ref PermissionBoundaryPolicy
          - !Ref AWS::NoValue

  DeveloperPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DeveloperPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:PassRole
              - iam:TagRole
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:TagPolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
            Resource: '*'
            Condition:
              StringLike:
                iam:ResourceTag/Owner: !Ref TeamOwnerTag
                iam:ResourceTag/Name: !Sub '${PermissionBoundaryName}*'
      Roles:
        - !Ref DeveloperRole

Outputs:
  DeveloperRoleArn:
    Description: ARN of the Developer Role
    Value: !GetAtt DeveloperRole.Arn