AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket with KMS encryption and lifecycle management'

Parameters:
  Environment:
    Type: String
    Description: Environment name for resource tagging
    AllowedValues: 
      - dev
      - staging
      - prod
    Default: dev

Resources:
  S3KMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'KMS key for ${AWS::StackName} S3 bucket encryption'
      EnableKeyRotation: true
      PendingWindowInDays: 7
      Tags:
        - Key: Environment
          Value: !Ref Environment
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'
          - Sid: AllowS3ServiceToUseKey
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:GenerateDataKey
              - kms:Decrypt
            Resource: '*'

  S3KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}-s3-key
      TargetKeyId: !Ref S3KMSKey

  EncryptedS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt S3KMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionRule
            Status: Enabled
            Prefix: ''
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
              - TransitionInDays: 180
                StorageClass: GLACIER
            ExpirationInDays: 365
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EncryptedS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSSLOnly
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub ${EncryptedS3Bucket.Arn}/*
              - !GetAtt EncryptedS3Bucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref EncryptedS3Bucket
  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt EncryptedS3Bucket.Arn
  KMSKeyId:
    Description: ID of the KMS key
    Value: !Ref S3KMSKey
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt S3KMSKey.Arn