AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      AttributeDefinitions:
        - AttributeName: SongId
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: SongId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt MusicTable.Arn
                  - !Sub "${MusicTable.Arn}/index/Artist-Index"

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi
      Description: API for managing music data

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem"
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "SongId": {"S": "$input.path('$.SongId')"},
                "Artist": {"S": "$input.path('$.Artist')"},
                "Album": {"S": "$input.path('$.Album')"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: ""
      MethodResponses:
        - StatusCode: 200

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query"
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": {"S": "$input.params('artist')"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($items = $input.path('$.Items'))
                [
                #foreach($item in $items)
                  {
                    "SongId": "$item.SongId.S",
                    "Artist": "$item.Artist.S",
                    "Album": "$item.Album.S"
                  }#if($foreach.hasNext),#end
                #end
                ]
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId: !Ref MusicApi

  ProdStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      RestApiId: !Ref MusicApi
      DeploymentId: !Ref ApiDeployment
      StageName: Prod

  MusicApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ProdStage
    Properties:
      UsagePlanName: MusicApiUsagePlan
      Throttle:
        RateLimit: 100
        BurstLimit: 50
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: Prod

  MusicApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicApiKey
      Enabled: true

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    DependsOn: 
      - MusicApiUsagePlan
      - MusicApiKey
    Properties:
      KeyId: !Ref MusicApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicApiUsagePlan

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/music"
  ApiKey:
    Value: !Ref MusicApiKey