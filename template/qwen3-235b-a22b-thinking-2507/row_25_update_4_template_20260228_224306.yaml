AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
  IoTDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSnsTopic
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: sqs:SendMessage
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref IoTDataTopic
  IoTDataTopic:
    Type: AWS::SNS::Topic
  IoTDataTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref IoTDataTopic
      Protocol: sqs
      Endpoint: !GetAtt IoTDataQueue.Arn
  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SnsPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTDataTopic
  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Description: "Route messages from device/data to SNS"
        RuleDisabled: false
        RoleArn: !GetAtt IoTRuleRole.Arn
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              MessageFormat: "JSON"
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref IoTDataQueue
  TopicArn:
    Description: ARN of the SNS topic
    Value: !Ref IoTDataTopic
  RuleName:
    Description: Name of the IoT Rule
    Value: !Ref IoTDataRule