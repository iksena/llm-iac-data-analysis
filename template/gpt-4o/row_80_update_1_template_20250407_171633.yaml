AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM Role for Bedrock service to invoke foundation models and trigger Lambda functions.

Resources:
  BedrockServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'BedrockServiceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'bedrock.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'BedrockServicePolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: 'arn:aws:bedrock:*:*:foundation-model/*'
              - Effect: Allow
                Action:
                  - 'lambda:InvokeFunction'
                Resource: 'arn:aws:lambda:*:*:function:*'

Outputs:
  BedrockServiceRoleArn:
    Description: 'The ARN of the IAM Role for Bedrock service'
    Value: !GetAtt BedrockServiceRole.Arn