AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyApplicationEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: my-application-event-bus

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisStream.Arn

  EventBridgePermission:
    Type: AWS::Events::Permission
    Properties:
      Action: 'events:PutEvents'
      Principal: events.amazonaws.com
      EventBusName: !Ref MyApplicationEventBus
      Condition:
        ArnEquals:
          'AWS:SourceArn': !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyApplicationEventBus
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  KinesisStreamARN:
    Description: Kinesis Stream ARN
    Value: !Ref KinesisStream
  EventBusName:
    Description: EventBridge Event Bus Name
    Value: !Ref MyApplicationEventBus