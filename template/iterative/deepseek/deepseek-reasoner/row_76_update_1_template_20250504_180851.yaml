AWSTemplateFormatVersion: '2010-09-09'
Description: Tiered IAM roles for FIS access management with granular permissions

Resources:
  SecurityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: SecurityAdminPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: FullFISAccess
                Effect: Allow
                Action: fis:*
                Resource: '*'
              - Sid: ServiceLinkedRoleCreation
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
              - Sid: WorkshopRolePassing
                Effect: Allow
                Action: iam:PassRole
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/WorkshopRole: 'true'

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: AdminPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: FISAccess
                Effect: Allow
                Action: fis:*
                Resource: '*'
              - Sid: DenyProductionFIS
                Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: 'prod'

  UserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: UserPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: LimitedFISAccess
                Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                  - fis:List*
                  - fis:Get*
                  - fis:TagResource
                Resource: '*'
              - Sid: PreventProductionAccess
                Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: 'prod'

  NonUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: BlockFISAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DenyAllFIS
                Effect: Deny
                Action: fis:*
                Resource: '*'

Outputs:
  SecurityAdminRoleARN:
    Description: ARN of Security Admin Role
    Value: !GetAtt SecurityAdminRole.Arn
  AdminRoleARN:
    Description: ARN of Admin Role
    Value: !GetAtt AdminRole.Arn
  UserRoleARN:
    Description: ARN of User Role
    Value: !GetAtt UserRole.Arn
  NonUserRoleARN:
    Description: ARN of Non-User Role
    Value: !GetAtt NonUserRole.Arn