AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled automation workflow using EventBridge Scheduler and AWS Systems Manager (SSM).

Parameters:
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  WindowsInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
  LogBucketName:
    Type: String
    Default: hello-world-logs

Resources:
  LinuxInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  WindowsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  LinuxInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LinuxInstanceRole

  WindowsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WindowsInstanceRole

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref LinuxInstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LinuxInstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref WindowsInstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref WindowsInstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Hello World script for Linux and Windows'
        parameters: {}
        mainSteps:
          - action: 'aws:runShellScript'
            name: 'linuxStep'
            inputs:
              runCommand:
                - 'echo "Hello World!"'
          - action: 'aws:runPowerShellScript'
            name: 'windowsStep'
            inputs:
              runCommand:
                - 'Write-Host "Hello World!"'

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: 'tag:HelloWorld'
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'

  EventBridgeScheduleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: 'hello-world-schedule'
      Description: 'Schedule to trigger SSM Association every 15 minutes'
      ScheduleExpression: 'rate(15 minutes)'
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}'
        RoleArn: !GetAtt EventBridgeScheduleRole.Arn

  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - 's3:PutObject'
              - 's3:GetBucketLocation'
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${LogBucketName}/*'
              - !Sub 'arn:${AWS::Partition}:s3:::${LogBucketName}'

Outputs:
  LinuxInstanceId:
    Description: ID of the Linux instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: ID of the Windows instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn