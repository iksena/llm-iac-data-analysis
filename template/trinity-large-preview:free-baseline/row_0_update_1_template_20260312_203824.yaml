AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template to create an SQS queue with basic configuration.

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If [UseCustomQueueName, !Ref QueueName, !Ref AWS::NoValue]
      VisibilityTimeout: !If [UseCustomVisibilityTimeout, !Ref VisibilityTimeout, !Ref AWS::NoValue]

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue (optional)
    Default: ''
  VisibilityTimeout:
    Type: Number
    Description: Visibility timeout for the queue in seconds (optional)
    Default: 0
  UseCustomQueueName:
    Type: String
    Description: Whether to use a custom queue name
    AllowedValues: ['true', 'false']
    Default: 'false'
  UseCustomVisibilityTimeout:
    Type: String
    Description: Whether to use a custom visibility timeout
    AllowedValues: ['true', 'false']
    Default: 'false'

Outputs:
  QueueURL:
    Description: URL of the created SQS queue
    Value: !Ref MySQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueURL'