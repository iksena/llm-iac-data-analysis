AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with Elastic IP and SSH access in default VPC'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  SSHLocation:
    Description: The IP range (CIDR) for SSH access
    Type: String
    MinLength: '9'
    MaxLength: '18'
    Default: 0.0.0.0/0
    AllowedPattern: '([0-9]{1,3})\\.([0-9]{1,3})\\.([0-9]{1,3})\\.([0-9]{1,3})/([0-9]{1,2})'
    ConstraintDescription: Must be a valid CIDR format (e.g., 203.0.113.0/24)
  SubnetId:
    Description: Subnet to deploy the instance into (select default subnet)
    Type: AWS::EC2::Subnet::Id
Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !GetAtt Subnet.VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      Tags:
        - Key: Name
          Value: SSH-Security-Group
  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      SubnetId: !Ref SubnetId
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, AWS::Region, AMI]
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: SSH-Accessible-Instance
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0f748cb24e7f16a62
    us-west-1:
      AMI: ami-0c1666cb0992a8730
    us-west-2:
      AMI: ami-0cb16c0fa1b9d2a61
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  ElasticIPAddress:
    Description: Elastic IP address
    Value: !GetAtt ElasticIP.PublicIp
  SSHCommand:
    Description: Command to connect via SSH
    Value: !Sub 'ssh -i <key-file>.pem ec2-user@${ElasticIPAddress}'