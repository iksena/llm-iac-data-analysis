AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with CloudWatch Alarms'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: 'my-kinesis-stream'

  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    Default: 1
    MinValue: 1

  AlarmEmail:
    Type: String
    Description: Email address for alarm notifications

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: 24
      StreamModeDetails:
        StreamMode: PROVISIONED

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisAlerts

  AlertSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  WriteAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisWriteAlarm
      AlarmDescription: Alarm for write throughput exceeded
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      AlarmActions:
        - !Ref AlertTopic

  ReadAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: KinesisReadAlarm
      AlarmDescription: Alarm for read throughput exceeded
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  StreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn

  AlertTopicArn:
    Description: ARN of the SNS Topic
    Value: !Ref AlertTopic