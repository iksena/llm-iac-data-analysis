AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis integration for real-time event streaming

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: my-application-events

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisPutPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  EventBusName:
    Description: EventBridge bus name
    Value: !Ref EventBus
  KinesisStreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt KinesisStream.Arn