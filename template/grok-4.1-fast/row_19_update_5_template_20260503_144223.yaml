AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge setup for routing custom events to an external HTTPS API endpoint via API key authenticated connection'

Parameters:
  EventBusName:
    Type: String
    Default: CustomEventBus
    Description: Name of the custom EventBridge event bus
  SecretName:
    Type: String
    Default: WebhookApiKeySecret
    Description: Name of the SecretsManager secret for API key
  ConnectionName:
    Type: String
    Default: WebhookConnection
    Description: Name of the EventBridge connection
  ApiDestinationName:
    Type: String
    Default: WebhookApiDestination
    Description: Name of the EventBridge API destination
  RuleName:
    Type: String
    Default: RouteToWebhookRule
    Description: Name of the EventBridge rule for routing events
  ApiEndpoint:
    Type: String
    Default: https://webhook.site/testtest
    Description: HTTPS endpoint for the API destination
    AllowedPattern: '^https://.*'
  ApiKeyName:
    Type: String
    Default: X-API-Key
    Description: Name of the API key header
  ApiKeyValue:
    Type: String
    NoEcho: true
    Description: Secret value for the API key (stored in SecretsManager)

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: API key for EventBridge connection to webhook
      SecretString: !Ref ApiKeyValue

  Connection:
    Type: AWS::Events::Connection
    DependsOn: ApiKeySecret
    Properties:
      AuthorizationType: API_KEY
      Name: !Ref ConnectionName
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: !Ref ApiKeyName
          ApiKeyValue: !Sub '{{resolve:secretsmanager:${ApiKeySecret.Arn}:SecretString}}'

  ApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn: Connection
    Properties:
      ConnectionArn: !GetAtt Connection.Arn
      Name: !Ref ApiDestinationName
      InvocationEndpoint: !Ref ApiEndpoint
      HttpMethod: POST

  Rule:
    Type: AWS::Events::Rule
    DependsOn:
      - EventBus
      - ApiDestination
    Properties:
      Description: Route custom events to webhook API
      EventBusName: !Ref EventBusName
      Name: !Ref RuleName
      State: ENABLED
      EventPattern:
        source:
          - custom.myapp
      Targets:
        - Id: ApiDestinationTarget
          Arn: !GetAtt ApiDestination.Arn

Outputs:
  EventBusArn:
    Description: ARN of the EventBridge event bus
    Value: !GetAtt EventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref EventBusName
    Export:
      Name: !Sub '${AWS::StackName}-EventBusName'
  SecretArn:
    Description: ARN of the SecretsManager secret containing the API key
    Value: !Ref ApiKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-SecretArn'
  ConnectionArn:
    Description: ARN of the EventBridge connection
    Value: !GetAtt Connection.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ConnectionArn'
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ApiDestinationArn'
  RuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt Rule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'