AWSTemplateFormatVersion: '2010-09-09'
Description: Secure web-based VS Code development environment with CloudFront

Parameters:
  CodeServerVersion:
    Type: String
    Default: "4.12.0"
    Description: Code-server version to install

  AMIId:
    Type: AWS::EC2::Image::Id
    Default: ami-0c02fb55956c7d316"
    Description: EC2 instance AMI ID (Ubuntu 22.04 LTS recommended)

  InstanceType:
    Type: String
    Default: "t3.medium"
    Description: EC2 instance type

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from CloudFront
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      KeyName: default
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Join:
            - ""
            - - "#!/bin/bash -xe\n"
              - "sudo apt update\n"
              - "sudo apt install -y curl wget gnupg2\n"
              - "curl -fsSL https://code-server.dev/install.sh | sh -s -- --version "
              - !Ref CodeServerVersion
              - "\n"
              - "sudo systemctl enable code-server@codespace\n"
              - "sudo systemctl start code-server@codespace\n"
              - "echo 'code-server started on port 8080'\n"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: EC2Origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: allow-all
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
          MinTTL: 31536000
          DefaultTTL: 31536000
          MaxTTL: 31536000
        Comment: CloudFront for code-server
        Enabled: true

  SSMParameterCodeServerVersion:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /code-server/version
      Type: String
      Value: !Ref CodeServerVersion
      Description: Code-server version

  SSMParameterAMIId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /code-server/ami-id
      Type: String
      Value: !Ref AMIId
      Description: AMI ID used for code-server instance

Outputs:
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  EC2PublicDNS:
    Description: EC2 instance public DNS
    Value: !GetAtt EC2Instance.PublicDnsName
  EC2PublicIP:
    Description: EC2 instance public IP
    Value: !GetAtt EC2Instance.PublicIp