AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe API for product creation automation'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: 'API key for Stripe authentication (must start with sk_)'
    AllowedPattern: '^sk_.*$'
    MinLength: 10
    ConstraintDescription: 'Stripe API key must be provided and start with sk_'
    Default: 'REPLACE_WITH_YOUR_STRIPE_API_KEY'  # Forces user to provide a value

Resources:
  ProductEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: 'StripeProductEventBus'

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: 'StripeAPIConnection'
      AuthorizationType: 'API_KEY'
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'Authorization'
          ApiKeyValue: !Sub 'Bearer ${StripeApiKey}'

  StripeAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: 'StripeProductAPIDestination'
      ConnectionArn: !GetAtt StripeConnection.Arn
      HttpMethod: 'POST'
      InvocationEndpoint: 'https://api.stripe.com/v1/products'
      InvocationRateLimitPerSecond: 10

  EventBridgeInvokeAPIRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAPIDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt StripeAPIDestination.Arn

  ProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: 'StripeProductCreationRule'
      EventBusName: !Ref ProductEventBus
      EventPattern:
        source:
          - !Ref EventSource
        detail-type:
          - !Ref EventDetailType
      State: 'ENABLED'
      Targets:
        - Arn: !GetAtt StripeAPIDestination.Arn
          Id: 'StripeProductAPIDestinationTarget'
          RoleArn: !GetAtt EventBridgeInvokeAPIRole.Arn
          InputTransformer:
            InputPathsMap:
              productName: '$.detail.productName'
              productDescription: '$.detail.productDescription'
            InputTemplate: '{"name": <productName>, "description": <productDescription>}'

Outputs:
  EventBusArn:
    Description: 'ARN of the EventBridge bus'
    Value: !GetAtt ProductEventBus.Arn
  RuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt ProductCreationRule.Arn
  APIDestinationArn:
    Description: 'ARN of the API Destination'
    Value: !GetAtt StripeAPIDestination.Arn
  ConnectionArn:
    Description: 'ARN of the Connection resource'
    Value: !GetAtt StripeConnection.Arn