AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IotDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IotDataQueue

  IotDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IotDataTopic

  IotDataTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IotDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TopicArn: !Ref IotDataTopic
              RoleArn: !GetAtt IotDataRuleRole.Arn

  IotDataRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IotDataRuleRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IotDataRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IotDataTopic

  SnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref IotDataTopic
      Protocol: sqs
      Endpoint: !GetAtt IotDataQueue.Arn

Outputs:
  QueueUrl:
    Description: SQS Queue URL
    Value: !Ref IotDataQueue
  QueueArn:
    Description: SQS Queue ARN
    Value: !GetAtt IotDataQueue.Arn
  TopicArn:
    Description: SNS Topic ARN
    Value: !Ref IotDataTopic