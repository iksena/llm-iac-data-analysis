AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB Streams to EventBridge integration via Pipes. Filters events where NewImage.avatarUrl.S ends with .png and routes to custom EventBus with custom Source/DetailType.'

Parameters:
  TableName:
    Type: String
    Default: AvatarTable
    Description: Name of the DynamoDB table.
  BusName:
    Type: String
    Default: AvatarEventBus
    Description: Name of the custom EventBridge bus.
  PipeName:
    Type: String
    Default: