AWSTemplateFormatVersion: '2010-09-09'
Description: "Production-ready CloudFormation template that provisions an EC2 instance running Amazon Linux 2, performs automated OS updates, installs Nginx, and validates the web server using a custom SSM Automation Document. The instance employs least-privilege IAM roles for SSM, CloudWatch, and S3 logging."

Parameters:
  InstanceType:
    Description: "EC2 instance type"
    Type: String
    Default: t3.micro

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::${LogBucketName}" 
                    # Mapping provided below
                  - !Sub
                    - "arn:aws:s3:::${LogBucketName}/*"
                    - { LogBucketName: !Ref LogBucket }

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2InstanceRole

  AutomationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMAutomationRole
      Policies:
        - PolicyName: AutomationS3LoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${LogBucketName}/*"
                    - { LogBucketName: !Ref LogBucket }

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: "Production-EC2-Instance"

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      DocumentFormat: YAML
      Name: CustomEC2SetupAutomation
      Content:
        schemaVersion: '0.3'
        description: >
          Automation document to perform OS updates, perform a reboot if necessary,
          install Nginx, and validate the web server using curl.
        assumeRole: !GetAtt AutomationExecutionRole.Arn
        mainSteps:
          - name: OSUpdate
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo yum update -y"
          - name: RebootIfNecessary
            action: aws:runShellScript
            inputs:
              runCommand:
                - |
                  if [ -f /var/run/reboot-required ]; then
                    echo 'Reboot required - initiating reboot'
                    sudo shutdown -r now
                  else
                    echo 'No reboot required'
                  fi
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo amazon-linux-extras install -y nginx1.12"
                - "sudo systemctl start nginx"
                - "sudo systemctl enable nginx"
          - name: ValidateWebServer
            action: aws:runShellScript
            inputs:
              runCommand:
                - "curl -sf http://localhost || (echo 'Validation failed' && exit 1)"

Outputs:
  InstanceId:
    Description: "The InstanceId of the EC2 instance."
    Value: !Ref EC2Instance
  LogBucketName:
    Description: "Name of the S3 bucket used for logging."
    Value: !Ref LogBucket
  SSMDocumentName:
    Description: "Name of the custom SSM Automation Document."
    Value: !Ref SSMAutomationDocument