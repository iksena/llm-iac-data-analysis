AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to deploy an auto-configuring Amazon Linux 2 EC2 instance.
  The instance installs Nginx via an SSM Association (triggered by the InstallNginx tag),
  sends logs to an S3 bucket, and enables CloudWatch monitoring.
  This template provisions its own VPC, Subnet, Internet Gateway, and related resources so that
  no external VpcId or SubnetId parameters are required.

Resources:
  # VPC and Networking Resources
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CFN-VPC

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CFN-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs "" ]
      Tags:
        - Key: Name
          Value: CFN-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: CFN-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref MyInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Logging Bucket
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-logs-bucket"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 30

  # IAM Role and Instance Profile for EC2
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: "/"
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::StackName}-logs-bucket"
                  - !Sub "arn:aws:s3:::${AWS::StackName}-logs-bucket/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
      Path: "/"

  # Security Group for EC2 Instance
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow SSH (port 22) and HTTP (port 80) access"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"

  # EC2 Instance
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref PublicSubnet
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Monitoring: true
      Tags:
        - Key: Name
          Value: AutoConfiguredEC2
        - Key: InstallNginx
          Value: "True"

  # SSM Association to install Nginx based on Tag
  SSMAssociationNginxInstall:
    Type: AWS::SSM::Association
    DependsOn: EC2Instance
    Properties:
      Name: AWS-RunShellScript
      AssociationName: InstallNginxOnTaggedInstances
      Targets:
        - Key: "tag:InstallNginx"
          Values:
            - "True"
      Parameters:
        commands:
          - "sudo yum install -y nginx"
          - "sudo systemctl start nginx"
          - "sudo systemctl enable nginx"
      ComplianceSeverity: UNSPECIFIED

  # CloudWatch Alarm for EC2 CPU Utilization
  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm if CPU utilization exceeds 80% over a 5-minute period."
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      TreatMissingData: notBreaching

Outputs:
  VPCId:
    Description: "The ID of the VPC created."
    Value: !Ref MyVPC
  SubnetId:
    Description: "The ID of the public subnet created."
    Value: !Ref PublicSubnet
  InstanceId:
    Description: "The ID of the deployed EC2 instance."
    Value: !Ref EC2Instance
  LogsBucketName:
    Description: "The name of the S3 bucket used for logging."
    Value: !Ref LogsBucket