AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify Console App for TodoApp

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      Description: Amplify App for TodoApp
      Platform: WEB
      BuildSpec: |
        version: 0.1
        frontend:
          phases:
            build:
              commands:
                - npm install
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AmplifyAppUrl:
    Description: URL of the Amplify App
    Value: !GetAtt AmplifyApp.DefaultDomain
    Export:
      Name: TodoApp-AmplifyUrl