AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with S3, DynamoDB, and EC2

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  S3BucketName:
    Type: String
    Default: my-static-assets-bucket
  DynamoDBTableName:
    Type: String
    Default: AWS-Services

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceType
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceType
          AttributeType: S
      BillingMode: PAY_PER_REQUEST

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnetId
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y httpd php php-cli php-common php-json php-xml php-mbstring php-zip php-curl php-gd php-mysqlnd php-pear php-devel php-intl php-bcmath php-opcache php-fpm php-pdo php-soap php-xmlrpc php-zip php-pecl-apcu php-pecl-mcrypt php-pecl-memcache php-pecl-memcached php-pecl-redis php-pecl-xdebug php-pecl-zip php-pecl-zlib php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-imagick php-pecl-