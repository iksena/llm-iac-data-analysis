AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with EventBridge and SNS integration for object creation notifications

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          Enabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: S3ObjectCreationNotifications

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Triggers on S3 ObjectCreated events
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - 'PutObject'
            - 'CompleteMultipartUpload'
          requestParameters:
            bucketName:
              - !Ref S3Bucket
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSNotificationTarget

  EventBridgeInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleARN:
    Description: ARN of the EventBridge rule
    Value: !Ref EventBridgeRule