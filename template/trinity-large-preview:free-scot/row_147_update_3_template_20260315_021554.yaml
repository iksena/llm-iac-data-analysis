AWSTemplateFormatVersion: '2010-09-09'
Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Join
              - ''
              - - 'arn:aws:s3:::'
                - !Ref WebsiteBucket
                - /*
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SlotMachineFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import random

          def handler(event, context):
              symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎']
              result = [random.choice(symbols) for _ in range(3)]
              winnings = 0
              if result[0] == result[1] == result[2]:
                  winnings = 100
              elif result[0] == result[1] or result[1] == result[2] or result[0] == result[2]:
                  winnings = 10
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'winnings': winnings
                  })
              }
      Role: !GetAtt LambdaExecutionRole.Arn

  CognitoIdentityPoolRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated:
                - cognito-identity.amazonaws.com
            Action:
              - sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'cognito-identity.amazonaws.com:aud': !Ref IdentityPool
              'ForAnyValue:StringLike':
                'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt SlotMachineFunction.Arn

  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoIdentityPoolRole.Arn

  SlotMachineInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: cognito-identity.amazonaws.com
      FunctionName: !GetAtt SlotMachineFunction.Arn

  WebsiteDeployer:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      s3.put_object(
                          Bucket=event['ResourceProperties']['BucketName'],
                          Key='index.html',
                          Body=b'''
                          <!DOCTYPE html>
                          <html>
                          <head>
                              <title>Slot Machine</title>
                              <script src="https://sdk.amazonaws.com/js/aws-sdk-2.7.13.min.js"></script>
                              <script>
                                  AWS.config.region = "''' + event['ResourceProperties']['CognitoRegion'] + '''";
                                  AWS.config.credentials = new AWS.CognitoIdentityCredentials({
                                      IdentityPoolId: "''' + event['ResourceProperties']['IdentityPoolId'] + '''"
                                  });
                                  var lambda = new AWS.Lambda();
                                  function spin() {
                                      lambda.invoke({
                                          FunctionName: "''' + event['ResourceProperties']['SlotMachineFunctionArn'] + '''",
                                          Payload: JSON.stringify({})
                                      }, function(err, data) {
                                          if (err) {
                                              alert("Error: " + err);
                                          } else {
                                              var result = JSON.parse(data.Payload);
                                              document.getElementById("result").innerHTML = result.result.join(" ");
                                              document.getElementById("winnings").innerHTML = "Winnings: $" + result.winnings;
                                          }
                                      });
                                  }
                              </script>
                          </head>
                          <body>
                              <h1>Slot Machine</h1>
                              <button onclick="spin()">Spin</button>
                              <div id="result"></div>
                              <div id="winnings"></div>
                          </body>
                          </html>
                          ''',
                          ContentType='text/html'
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'error': str(e)})

      Role: !GetAtt LambdaExecutionRole.Arn

  WebsiteDeployerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: 'cloudformation.amazonaws.com'
      FunctionName: !GetAtt WebsiteDeployer.Arn