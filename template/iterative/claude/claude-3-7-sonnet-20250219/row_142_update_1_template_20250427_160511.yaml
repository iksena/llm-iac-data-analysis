AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instances managed by AWS Systems Manager (SSM)'

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet in AZ 1
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the public subnet in AZ 2
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for Linux instances
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
  WindowsInstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type for Windows instances
    AllowedValues:
      - t2.small
      - t2.medium
      - t3.small
      - t3.medium
  LinuxASGMinSize:
    Type: Number
    Default: 1
    Description: Minimum size for Linux Auto Scaling Group
  LinuxASGMaxSize:
    Type: Number
    Default: 3
    Description: Maximum size for Linux Auto Scaling Group
  LinuxASGDesiredCapacity:
    Type: Number
    Default: 2
    Description: Desired capacity for Linux Auto Scaling Group
  WindowsASGMinSize:
    Type: Number
    Default: 1
    Description: Minimum size for Windows Auto Scaling Group
  WindowsASGMaxSize:
    Type: Number
    Default: 3
    Description: Maximum size for Windows Auto Scaling Group
  WindowsASGDesiredCapacity:
    Type: Number
    Default: 2
    Description: Desired capacity for Windows Auto Scaling Group
  EnvironmentName:
    Type: String
    Default: Production
    Description: Environment name for resource tagging

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    us-east-2:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    us-west-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    us-west-2:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    eu-west-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    eu-central-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    ap-northeast-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    ap-southeast-1:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    ap-southeast-2:
      LinuxAMIParameter: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      WindowsAMIParameter: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base

Resources:
  # VPC and Networking Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # Security Group
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for instances managed by SSM
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access for SSM
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-InstanceSG

  # IAM Role for SSM
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SSMRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMRole

  # Launch Templates
  LinuxLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-LinuxLaunchTemplate
      VersionDescription: Initial version
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:${RegionMap.${AWS::Region}.LinuxAMIParameter}}}'
        InstanceType: !Ref LinuxInstanceType
        IamInstanceProfile:
          Name: !Ref SSMInstanceProfile
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            # Ensure SSM agent is installed and running
            yum install -y amazon-ssm-agent
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent
            # Install CloudWatch agent
            yum install -y amazon-cloudwatch-agent
            # Additional setup as needed
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${EnvironmentName}-Linux-Instance
              - Key: Environment
                Value: !Ref EnvironmentName

  WindowsLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-WindowsLaunchTemplate
      VersionDescription: Initial version
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:${RegionMap.${AWS::Region}.WindowsAMIParameter}}}'
        InstanceType: !Ref WindowsInstanceType
        IamInstanceProfile:
          Name: !Ref SSMInstanceProfile
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${EnvironmentName}-Windows-Instance
              - Key: Environment
                Value: !Ref EnvironmentName

  # Auto Scaling Groups
  LinuxAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${EnvironmentName}-LinuxASG
      MinSize: !Ref LinuxASGMinSize
      MaxSize: !Ref LinuxASGMaxSize
      DesiredCapacity: !Ref LinuxASGDesiredCapacity
      LaunchTemplate:
        LaunchTemplateId: !Ref LinuxLaunchTemplate
        Version: !GetAtt LinuxLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Linux-ASG
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref EnvironmentName
          PropagateAtLaunch: true

  WindowsAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${EnvironmentName}-WindowsASG
      MinSize: !Ref WindowsASGMinSize
      MaxSize: !Ref WindowsASGMaxSize
      DesiredCapacity: !Ref WindowsASGDesiredCapacity
      LaunchTemplate:
        LaunchTemplateId: !Ref WindowsLaunchTemplate
        Version: !GetAtt WindowsLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Windows-ASG
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref EnvironmentName
          PropagateAtLaunch: true

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPC

  PublicSubnet1:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnet2

  InstanceSecurityGroup:
    Description: Security Group ID for instances
    Value: !GetAtt InstanceSecurityGroup.GroupId
    Export:
      Name: !Sub ${AWS::StackName}-InstanceSG

  SSMRole:
    Description: IAM Role for SSM
    Value: !GetAtt SSMRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SSMRole

  LinuxAutoScalingGroup:
    Description: Linux Auto Scaling Group Name
    Value: !Ref LinuxAutoScalingGroup
    Export:
      Name: !Sub ${AWS::StackName}-LinuxASG

  WindowsAutoScalingGroup:
    Description: Windows Auto Scaling Group Name
    Value: !Ref WindowsAutoScalingGroup
    Export:
      Name: !Sub ${AWS::StackName}-WindowsASG