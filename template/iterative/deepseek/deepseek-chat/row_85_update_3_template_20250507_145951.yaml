AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure S3 bucket for CloudWatch export data with versioning and lifecycle management'

Parameters:
  BucketName:
    Description: 'Name of the S3 bucket for CloudWatch export data'
    Type: String
    AllowedPattern: '^[a-z0-9-]{3,63}$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters and can contain only lowercase letters, numbers, and hyphens'

  VersioningEnabled:
    Description: 'Enable versioning for the S3 bucket'
    Type: String
    Default: 'Enabled'
    AllowedValues: ['Enabled', 'Suspended']
    
  LifecycleTransitionDays:
    Description: 'Number of days before transitioning objects to Infrequent Access'
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    
  LifecycleExpirationDays:
    Description: 'Number of days before objects expire'
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 3650
    
  KMSKeyARN:
    Description: 'ARN of KMS key for server-side encryption (leave blank for AWS managed key)'
    Type: String
    Default: ''
    AllowedPattern: '^arn:aws:kms:.*|^$'

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref VersioningEnabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: 'aws:kms'
            KMSMasterKeyID: !If 
              - HasCustomKMSKey
              - !Ref KMSKeyARN
              - !Ref 'AWS::NoValue'
      LifecycleConfiguration:
        Rules:
        - Id: 'TransitionToIA'
          Status: 'Enabled'
          Transitions:
          - StorageClass: 'STANDARD_IA'
            TransitionInDays: !Ref LifecycleTransitionDays
          ExpirationInDays: !Ref LifecycleExpirationDays
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Purpose
        Value: CloudWatchExportStorage

  CloudWatchBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: logs.amazonaws.com
          Action: 
          - s3:GetBucketAcl
          - s3:PutObject
          Resource:
          - !GetAtt CloudWatchExportBucket.Arn
          - !Sub '${CloudWatchExportBucket.Arn}/*'
          Condition:
            StringEquals:
              aws:SourceAccount: !Ref 'AWS::AccountId'
              aws:SourceArn: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

Conditions:
  HasCustomKMSKey: !Not [!Equals [!Ref KMSKeyARN, '']]

Outputs:
  BucketARN:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt CloudWatchExportBucket.Arn
    
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref BucketName
    
  BucketDomainName:
    Description: 'Domain name of the created S3 bucket'
    Value: !GetAtt CloudWatchExportBucket.DomainName