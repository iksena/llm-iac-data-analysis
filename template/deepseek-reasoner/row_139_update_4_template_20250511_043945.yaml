AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  FirstNumber:
    Type: Number
    Default: 0
    Description: First operand for the arithmetic operation
  SecondNumber:
    Type: Number
    Default: 0
    Description: Second operand for the arithmetic operation
  Operator:
    Type: String
    Default: '+'
    AllowedValues: ['+', '-', '*', '/']
    Description: Arithmetic operator to apply
  SimulateFailure:
    Type: String
    Default: ''
    Description: Enter any value to force resource failure (testing only)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: 'arn:aws:logs:*:*:*'

  ArithmeticFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import cfnresponse
          def handler(event, context):
              response_data = {}
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, 'ArithmeticHelper')
                      return
                  if event['ResourceProperties'].get('SimulateFailure'):
                      raise ValueError('Simulated failure requested')
                  a = int(event['ResourceProperties']['FirstNumber'])
                  b = int(event['ResourceProperties']['SecondNumber'])
                  op = event['ResourceProperties']['Operator']
                  if op == '+': result = a + b
                  elif op == '-': result = a - b
                  elif op == '*': result = a * b
                  elif op == '/':
                      if b == 0: raise ZeroDivisionError('Division by zero')
                      result = a / b
                  else: raise ValueError('Invalid operator')
                  response_data['Result'] = str(result)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, 'ArithmeticHelper')
              except Exception as e:
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data, 'ArithmeticHelper')

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ArithmeticFunction.Arn
      Principal: cloudformation.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'

  ArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Value: !GetAtt ArithmeticResource.Result