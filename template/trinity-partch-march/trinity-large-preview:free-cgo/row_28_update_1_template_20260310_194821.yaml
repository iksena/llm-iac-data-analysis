AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated monitoring and notification system for AWS Secrets Manager secret lifecycle events

Parameters:
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds
  LambdaMemorySize:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerLifecycleNotifications

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource: '*'
        - PolicyName: SNSpublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          sns_client = boto3.client('sns')

          def lambda_handler(event, context):
              try:
                  detail = event['detail']
                  secret_arn = detail.get('secretArn')
                  secret_name = detail.get('secretName')
                  operation = detail.get('operation')

                  message = {
                      'SecretARN': secret_arn,
                      'SecretName': secret_name,
                      'Operation': operation,
                      'Region': os.environ['AWS_REGION']
                  }

                  response = sns_client.publish(
                      TopicArn=os.environ['SNS_TOPIC_ARN'],
                      Message=json.dumps({'default': json.dumps(message)}),
                      MessageStructure='json'
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Notification sent successfully')
                  }
              except Exception as e:
                  print(f"Error processing event: {str(e)}")
                  raise e

      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SNSTopic

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: secretsmanager.amazonaws.com

  TestSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: SecretsManagerLifecycleTestSecret
      Description: Test secret for triggering lifecycle events
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref TestSecret
      RotationLambdaARN: !GetAtt LambdaFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for Secrets Manager lifecycle events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: SecretsManagerEventTarget

  LambdaFunctionPolicy:
    Type: AWS::Lambda::Function
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain

Outputs:
  SNSTopicARN:
    Description: SNS Topic ARN for receiving Secrets Manager notifications
    Value: !Ref SNSTopic
  LambdaFunctionARN:
    Description: Lambda Function ARN processing Secrets Manager events
    Value: !GetAtt LambdaFunction.Arn
  TestSecretARN:
    Description: Test Secret ARN for triggering lifecycle events
    Value: !Ref TestSecret