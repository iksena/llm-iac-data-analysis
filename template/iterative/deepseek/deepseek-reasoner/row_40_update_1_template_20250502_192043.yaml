AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an SQS FIFO queue with configurable properties
Parameters:
  QueueNamePrefix:
    Type: String
    MinLength: 1
    MaxLength: 75
    AllowedPattern: ^[a-zA-Z0-9-_]+$
    Description: Prefix for queue name (will have .fifo appended)
  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  MaximumMessageSize:
    Type: Number
    Default: 262144
    MinValue: 1024
    MaxValue: 262144
  DelaySeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 900
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 20
  ContentBasedDeduplication:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  DeduplicationScope:
    Type: String
    Default: 'queue'
    AllowedValues: ['messageGroup', 'queue']
    Description: Required when ContentBasedDeduplication=false
  FifoThroughputLimit:
    Type: String
    Default: 'perQueue'
    AllowedValues: ['perMessageGroupId', 'perQueue']
    Description: Required when ContentBasedDeduplication=false
Conditions:
  IsContentBasedDeduplicationEnabled: !Equals [!Ref ContentBasedDeduplication, 'true']
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${QueueNamePrefix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
      DeduplicationScope: !If [IsContentBasedDeduplicationEnabled, 'messageGroup', !Ref DeduplicationScope]
      FifoThroughputLimit: !If [IsContentBasedDeduplicationEnabled, 'perMessageGroupId', !Ref FifoThroughputLimit]
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
Outputs:
  QueueARN:
    Value: !GetAtt SQSQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-QueueARN"
  QueueURL:
    Value: !Ref SQSQueue
    Export:
      Name: !Sub "${AWS::StackName}-QueueURL"