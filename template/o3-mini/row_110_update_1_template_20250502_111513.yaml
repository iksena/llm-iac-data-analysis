AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a cross-account private API Gateway integrated with a Lambda function.
  The API is accessible only from a specified VPC endpoint and uses a custom domain name.

Parameters:
  VpcEndpointId:
    Type: String
    Description: The VPC Endpoint ID allowed to access the private API Gateway.
  CustomDomainName:
    Type: String
    Description: The custom domain name for the API Gateway (e.g., api.example.com).
  CertificateArn:
    Type: String
    Description: The ARN of the ACM certificate for the custom domain.
  LambdaHandler:
    Type: String
    Default: index.lambda_handler
    Description: Lambda function handler.
  LambdaRuntime:
    Type: String
    Default: python3.8
    Description: Runtime environment for the Lambda function.
  LambdaTimeout:
    Type: Number
    Default: 10
    Description: Timeout (in seconds) for the Lambda function.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRoleForPrivateAPIGateway
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
  
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PrivateAPILambdaFunction
      Handler: !Ref LambdaHandler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Hello from Lambda behind Private API Gateway"
              }

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PrivateAPIWithLambda
      EndpointConfiguration:
        Types:
          - PRIVATE
        VpcEndpointIds:
          - !Ref VpcEndpointId
      Policy: 
        Fn::Sub: >
          {
              "Version": "2012-10-17",
              "Statement": [
                  {
                      "Effect": "Allow",
                      "Principal": "*",
                      "Action": "execute-api:Invoke",
                      "Resource": "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/*",
                      "Condition": {
                          "StringEquals": {
                              "aws:SourceVpce": "${VpcEndpointId}"
                          }
                      }
                  }
              ]
          }

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: lambda

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
      MethodResponses:
        - StatusCode: 200

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: prod

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiGatewayDeployment

  ApiGatewayDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiGatewayDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: prod

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub >
        arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/*/GET/lambda

Outputs:
  ApiGatewayId:
    Description: The ID of the API Gateway.
    Value: !Ref ApiGatewayRestApi
  ApiInvokeURL:
    Description: The invoke URL of the API Gateway.
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  CustomDomainURL:
    Description: The custom domain URL for the API Gateway.
    Value: !Sub "https://${CustomDomainName}/"
  LambdaFunctionARN:
    Description: ARN of the Lambda function.
    Value: !GetAtt LambdaFunction.Arn