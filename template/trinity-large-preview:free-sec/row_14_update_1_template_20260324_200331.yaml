AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Network Interface with multiple IPs and EIPs
      SubnetId: !Ref SubnetId
      PrivateIpAddress: !Ref PrimaryPrivateIp
      SecondaryPrivateIpAddressCount: !Ref SecondaryPrivateIpCount
      SecurityGroupIds:
        - !Ref SecurityGroupId
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: !Ref NetworkInterfaceName

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface
      PublicIpv4Pool: amazon

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkInterfaceId: !Ref MyNetworkInterface
      PublicIpv4Pool: amazon

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  PrimaryPrivateIp:
    Type: String
    Default: 10.0.0.10
  SecondaryPrivateIpCount:
    Type: Number
    Default: 2
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-12345678
  NetworkInterfaceName:
    Type: String
    Default: MultiIP-ENI

Outputs:
  NetworkInterfaceId:
    Value: !Ref MyNetworkInterface
  EIP1PublicIp:
    Value: !GetAtt EIP1.PublicIp
  EIP2PublicIp:
    Value: !GetAtt EIP2.PublicIp
  PrivateIpAddresses:
    Value: !GetAtt MyNetworkInterface.PrivateIpAddresses