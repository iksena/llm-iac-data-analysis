AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: ProductionResources
      Description: Resource Group for Production Resources
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          TagFilters:
            - Key: Environment
              Values:
                - Production
                - Development
                - Staging
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
Outputs:
  GroupId:
    Description: Resource Group ID
    Value: !GetAtt ResourceGroup.GroupId
    Export:
      Name: !Sub "${AWS::StackName}-GroupId"
  GroupName:
    Description: Resource Group Name
    Value: !Ref ResourceGroup
    Export:
      Name: !Sub "${AWS::StackName}-GroupName"