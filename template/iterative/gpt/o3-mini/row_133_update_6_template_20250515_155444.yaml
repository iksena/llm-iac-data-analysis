AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates a self-contained web server environment.
  It provisions a VPC, subnet, Internet gateway, route table, security group, IAM role & instance profile,
  and an EC2 instance preconfigured with Apache, PHP, and sample web content from S3.

Parameters:
  S3BucketName:
    Description: "Name of the S3 bucket containing the ZIP file with web content"
    Type: String
  S3Key:
    Description: "S3 object key for the ZIP file containing the web content"
    Type: String
  KeyName:
    Description: "Name of an existing EC2 KeyPair to enable SSH access to the instance (optional)"
    Type: AWS::EC2::KeyPair::KeyName
    Default: ""
    AllowedPattern: ".*"
    ConstraintDescription: "Must be the name of an existing EC2 KeyPair."
    
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: PublicSubnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ProductionIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP access from anywhere"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: WebServerSG

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "ec2.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Path: "/"
      Policies:
        - PolicyName: "S3AccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "s3:GetObject"
                Resource:
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"
      Tags:
        - Key: Name
          Value: EC2InstanceRole

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - SubnetRouteTableAssociation
      - InternetRoute
      - VPCGatewayAttachment
    Properties:
      InstanceType: t2.micro
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If 
        - HasKeyName
        - !Ref KeyName
        - !Ref "AWS::NoValue"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd php unzip aws-cli
          systemctl enable httpd
          systemctl start httpd
          cd /var/www/html
          aws s3 cp s3://${S3BucketName}/${S3Key} /tmp/content.zip --region ${AWS::Region}
          unzip -o /tmp/content.zip -d /var/www/html
          chown -R apache:apache /var/www/html
      Tags:
        - Key: Name
          Value: WebServerInstance

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Outputs:
  InstancePublicIP:
    Description: "Public IP address of the web server instance"
    Value: !GetAtt EC2Instance.PublicIp
  VPCID:
    Description: "The VPC ID of the created network"
    Value: !Ref VPC