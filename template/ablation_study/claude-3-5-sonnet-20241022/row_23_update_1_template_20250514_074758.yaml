AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating a DynamoDB table'

Parameters:
  TableName:
    Type: String
    Description: 'Name of the DynamoDB table'
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9._-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters, dots, hyphens, and underscores'

  BillingMode:
    Type: String
    Description: 'DynamoDB billing mode'
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Type: Number
    Description: 'Read capacity units for the table (only applicable for PROVISIONED billing mode)'
    Default: 5
    MinValue: 1
    MaxValue: 100000

  WriteCapacityUnits:
    Type: Number
    Description: 'Write capacity units for the table (only applicable for PROVISIONED billing mode)'
    Default: 5
    MinValue: 1
    MaxValue: 100000

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        Fn::If:
          - IsProvisionedBilling
          - ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - Ref: AWS::NoValue
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: Production

Conditions:
  IsProvisionedBilling: !Equals 
    - !Ref BillingMode
    - PROVISIONED

Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table'
    Value: !Ref DynamoDBTable

  TableArn:
    Description: 'ARN of the created DynamoDB table'
    Value: !GetAtt DynamoDBTable.Arn