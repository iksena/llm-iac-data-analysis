AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted One Zone file system in the us-east-1a Availability Zone

Parameters:
  FileSystemName:
    Type: String
    Description: Name of the file system
  KmsKeyId:
    Type: String
    Description: KMS Key ID to use for encryption (optional)
    Default: ''
  ThroughputMode:
    Type: String
    Description: Throughput mode for the file system
    AllowedValues:
      - bursting
      - provisioned
    Default: bursting

Resources:
  KmsKey:
    Type: AWS::KMS::Key
    Condition: CreateKmsKey
    Properties:
      Description: KMS Key for EFS encryption
      Enabled: true
      EnableKeyRotation: false
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyId]
      PerformanceMode: generalPurpose
      ThroughputMode: !Ref ThroughputMode
      FileSystemTags:
        - Key: Name
          Value: !Ref FileSystemName
      AvailabilityZoneName: us-east-1a

Conditions:
  CreateKmsKey: !Equals [!Ref KmsKeyId, '']

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref FileSystem
  FileSystemArn:
    Description: The ARN of the created file system
    Value: !GetAtt FileSystem.Arn