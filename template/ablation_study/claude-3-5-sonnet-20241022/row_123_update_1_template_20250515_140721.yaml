AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe Products API'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: 'Stripe API Key for authentication'

  StripeEndpoint:
    Type: String
    Default: 'https://api.stripe.com/v1/products'
    Description: 'Stripe Products API endpoint'

  SourceAppName:
    Type: String
    Default: 'PartnerApp'
    Description: 'Source application name for events'

  EventDetailType:
    Type: String
    Default: 'PartnerAppDetailType'
    Description: 'Detail type for the events'

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-stripe-integration
      Tags:
        - Key: Purpose
          Value: StripeIntegration

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub Bearer ${StripeApiKey}
      Description: 'Connection for Stripe API authentication'
      Name: !Sub ${AWS::StackName}-stripe-connection

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt StripeConnection.Arn
      Description: 'API Destination for Stripe Products API'
      HttpMethod: POST
      InvocationEndpoint: !Ref StripeEndpoint
      Name: !Sub ${AWS::StackName}-stripe-destination

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      Description: 'Rule to capture events and forward to Stripe'
      EventPattern:
        source:
          - !Ref SourceAppName
        detail-type:
          - !Ref EventDetailType
      State: ENABLED
      Targets:
        - Id: StripeProductsTarget
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the created Event Bus'
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: 'ARN of the API Destination'
    Value: !GetAtt StripeApiDestination.Arn

  RuleArn:
    Description: 'ARN of the EventBridge Rule'
    Value: !GetAtt EventRule.Arn

  EventBusName:
    Description: 'Name of the Event Bus'
    Value: !Ref EventBus