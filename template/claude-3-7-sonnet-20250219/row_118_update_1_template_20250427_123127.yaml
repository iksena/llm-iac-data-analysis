AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge Pipes workflow to enrich SQS messages with external API data'

Parameters:
  QueueName:
    Type: String
    Default: 'enrichment-source-queue'
    Description: Name of the SQS queue that will be the source for EventBridge Pipes

  ApiEndpointUrl:
    Type: String
    Default: 'https://api.zippopotam.us'
    Description: Base URL for the API destination

  LogGroupName:
    Type: String
    Default: '/aws/events/enriched-messages'
    Description: Name of the CloudWatch Log Group for storing enriched messages

  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Number of days to retain logs
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

Resources:
  # Source SQS Queue
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600 # 4 days
      Tags:
        - Key: Purpose
          Value: EventBridgePipesSource

  # Dead Letter Queue for the Source Queue
  SourceQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${QueueName}-dlq"
      MessageRetentionPeriod: 1209600 # 14 days
      Tags:
        - Key: Purpose
          Value: EventBridgePipesSourceDLQ

  # Update Source Queue with DLQ
  UpdateSourceQueueWithDLQ:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SourceQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:*'
            Resource: !GetAtt SourceQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt SourceQueueDLQ.Arn

  # CloudWatch Log Group for target
  EnrichedMessagesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: !Ref LogRetentionInDays
      Tags:
        - Key: Purpose
          Value: EventBridgePipesTarget

  # IAM Role for EventBridge Pipes
  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipesExecutionRole
      Policies:
        - PolicyName: EventBridgePipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt EnrichedMessagesLogGroup.Arn
      Tags:
        - Key: Purpose
          Value: EventBridgePipesExecution

  # EventBridge Connection for API Destination
  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'Accept'
          ApiKeyValue: 'application/json'
      Name: ZippopotamConnection
      Description: Connection to Zippopotam.us API

  # EventBridge API Destination
  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ZippopotamApiDestination
      ConnectionArn: !GetAtt ApiConnection.Arn
      InvocationEndpoint: !Sub "${ApiEndpointUrl}/us/{zipcode}"
      HttpMethod: GET
      InvocationRateLimitPerSecond: 10
      Description: API Destination for Zippopotam.us

  # EventBridge Pipe
  EnrichmentPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SQStoAPItoLogsEnrichmentPipe
      RoleArn: !GetAtt EventBridgePipesRole.Arn
      Source: !GetAtt SourceQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 30
      Enrichment: !GetAtt ApiDestination.Arn
      EnrichmentParameters:
        HttpParameters:
          PathParameterValues:
            - "$.body.zipcode"
      Target: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${EnrichedMessagesLogGroup}:*"
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamName: enriched-messages-stream
          Timestamp: "$.time"
      Description: Pipe that enriches SQS messages with location data from Zippopotam API and logs to CloudWatch
      Tags:
        Purpose: MessageEnrichment

Outputs:
  SourceQueueURL:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue

  SourceQueueARN:
    Description: ARN of the source SQS queue
    Value: !GetAtt SourceQueue.Arn

  EnrichmentPipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EnrichmentPipe.Arn

  LogGroupName:
    Description: Name of the CloudWatch Log Group for enriched messages
    Value: !Ref EnrichedMessagesLogGroup

  ApiDestinationARN:
    Description: ARN of the API Destination
    Value: !GetAtt ApiDestination.Arn