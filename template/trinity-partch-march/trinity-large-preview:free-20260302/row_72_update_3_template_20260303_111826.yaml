AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a secure, web-based VS Code development environment on an EC2 instance with code-server, CloudFront integration, and SSM management.'

Parameters:
  CodeServerVersion:
    Type: String
    Default: '4.10.0'
    Description: 'Version of code-server to install'
  InstanceType:
    Type: String
    Default: 't3.medium'
    Description: 'EC2 instance type'
  KeyName:
    Type: String
    Default: ''
    Description: 'Name of an existing EC2 KeyPair for SSH access (optional)'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CodeServerVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CodeServerIG

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: CodeServerPublicSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CodeServerRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for code-server allowing HTTP from CloudFront
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0  # This will be restricted to CloudFront IPs in the user data script
      Tags:
        - Key: Name
          Value: CodeServerSecurityGroup

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Path: /
      Tags:
        - Key: Name
          Value: CodeServerIAMRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316  # Ubuntu 22.04 LTS
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Update package lists
          sudo apt-get update -y

          # Install dependencies
          sudo apt-get install -y curl wget gnupg2

          # Install code-server
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version {{CodeServerVersion}}

          # Configure code-server to run on port 8080 without authentication
          sudo sed -i 's/^bind-addr.*/bind-addr: 0.0.0.0:8080/' /home/ubuntu/.config/code-server/config.yaml
          sudo sed -i 's/^auth.*/auth: none/' /home/ubuntu/.config/code-server/config.yaml

          # Start code-server as a service
          sudo systemctl enable code-server
          sudo systemctl start code-server

          # Get CloudFront IP ranges and update security group
          CLOUDFRONT_IPS=$(curl -s https://ip-ranges.amazonaws.com/ip-ranges.json | jq -r '.prefixes[] | select(.service == "CLOUDFRONT") | .ip_prefix' | tr '\n' ',' | sed 's/,$//')
          sudo ufw --force enable
          sudo ufw allow from $CLOUDFRONT_IPS to any port 8080

          # Install SSM agent if not already installed
          sudo snap install amazon-ssm-agent --classic
          sudo systemctl enable amazon-ssm-agent
          sudo systemctl start amazon-ssm-agent
      Tags:
        - Key: Name
          Value: CodeServerInstance

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: 'Origin access identity for code-server'

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt EC2Instance.PublicDnsName
            Id: CodeServerOrigin
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        Enabled: true
        DefaultRootObject: ''
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: '/'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: CodeServerOrigin
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
          ViewerProtocolPolicy: allow-all
        PriceClass: PriceClass_All
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none
      Tags:
        - Key: Name
          Value: CodeServerCloudFront

  CustomCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: 'CodeServerCachePolicy'
        MinTTL: 0
        MaxTTL: 31536000  # 1 year in seconds
        DefaultTTL: 31536000
        Comment: 'Custom cache policy for code-server with 1-year TTL'
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: all
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

Outputs:
  CloudFrontURL:
    Description: URL of the CloudFront distribution
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  EC2PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  EC2InstanceID:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance