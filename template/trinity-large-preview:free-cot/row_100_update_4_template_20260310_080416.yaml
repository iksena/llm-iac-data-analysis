AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust'

Parameters:
  IdentityManagementAccountId:
    Type: String
    Default: '123456789012'
    Description: 'Account ID for Identity Management Account'
  ToolingManagementAccountId:
    Type: String
    Default: '234567890123'
    Description: 'Account ID for Tooling Management Account'
  PermissionBoundaryArn:
    Type: String
    Default: 'arn:aws:iam::123456789012:policy/PermissionBoundary'
    Description: 'ARN of the permission boundary to apply to roles'

Conditions:
  CreatePrivilegedAdminRole: !Not [!Equals [!Ref 'AWS::AccountId', '123456789012']]
  CreateRestrictedAdminRole: !Not [!Equals [!Ref 'AWS::AccountId', '123456789012']]
  CreateIdentityAdminRole: !Not [!Equals [!Ref 'AWS::AccountId', '123456789012']]
  CreateCloudFormationAdminRole: !Not [!Equals [!Ref 'AWS::AccountId', '123456789012']]

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Policies:
        - PolicyName: MFAEnforcement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateVirtualMFADevice', 'iam:EnableMFADevice', 'iam:ResyncMFADevice']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:*']
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': false

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: BillingRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['aws-portal:*']
                Resource: '*'
        - PolicyName: CloudHSMRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['cloudhsm:*']
                Resource: '*'

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Policies:
        - PolicyName: UserManagementRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateUser', 'iam:DeleteUser', 'iam:UpdateUser']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:CreateLoginProfile', 'iam:DeleteLoginProfile']
                Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Condition: CreatePrivilegedAdminRole
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: 'sts:AssumeRole'
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingManagementAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      PermissionsBoundary: !Ref PermissionBoundaryArn

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Condition: CreateRestrictedAdminRole
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: 'sts:AssumeRole'
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingManagementAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: BillingRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['aws-portal:*']
                Resource: '*'
        - PolicyName: CloudHSMRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['cloudhsm:*']
                Resource: '*'
      PermissionsBoundary: !Ref PermissionBoundaryArn

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Condition: CreateIdentityAdminRole
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: 'sts:AssumeRole'
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingManagementAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Policies:
        - PolicyName: UserManagementRestriction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateUser', 'iam:DeleteUser', 'iam:UpdateUser']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:CreateLoginProfile', 'iam:DeleteLoginProfile']
                Resource: '*'
      PermissionsBoundary: !Ref PermissionBoundaryArn

  CloudFormationAdminRole:
    Type: AWS::IAM::Role
    Condition: CreateCloudFormationAdminRole
    Properties:
      RoleName: CloudFormationAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: 'sts:AssumeRole'
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingManagementAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
      Policies:
        - PolicyName: StackSetExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['cloudformation:CreateStackInstances', 'cloudformation:DeleteStackInstances', 'cloudformation:ListStackInstances']
                Resource: '*'
      PermissionsBoundary: !Ref PermissionBoundaryArn

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ['cloudformation.amazonaws.com']
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationStackSetExecution

Outputs:
  PrivilegedAdminGroupArn:
    Description: 'ARN of the PrivilegedAdmin Group'
    Value: !GetAtt PrivilegedAdminGroup.Arn
  RestrictedAdminGroupArn:
    Description: 'ARN of the RestrictedAdmin Group'
    Value: !GetAtt RestrictedAdminGroup.Arn
  IdentityAdminGroupArn:
    Description: 'ARN of the IdentityAdmin Group'
    Value: !GetAtt IdentityAdminGroup.Arn
  PrivilegedAdminRoleArn:
    Description: 'ARN of the PrivilegedAdmin Role'
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: 'ARN of the RestrictedAdmin Role'
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: 'ARN of the IdentityAdmin Role'
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationAdminRoleArn:
    Description: 'ARN of the CloudFormationAdmin Role'
    Value: !GetAtt CloudFormationAdminRole.Arn
  StackSetExecutionRoleArn:
    Description: 'ARN of the StackSetExecution Role'
    Value: !GetAtt StackSetExecutionRole.Arn