AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Transit Gateway and shares it via RAM to specified AWS account'

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Description: 'Centralized Transit Gateway for cross-account networking'
      DnsSupport: enable
      VpnEcmpSupport: enable
      Tags:
        - Key: Name
          Value: Centralized-TGW

  RAMResourceShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: 'TGW-Resource-Share'
      AllowExternalPrincipals: false
      Principals: 
        - !Sub 'arn:${AWS::Partition}:iam::644519422710:root'
      ResourceArns: 
        - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Tags:
        - Key: Purpose
          Value: Transit-Gateway-Sharing

Outputs:
  TransitGatewayId:
    Description: 'ID of the created Transit Gateway'
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TGW-ID'

  ResourceShareArn:
    Description: 'ARN of the RAM Resource Share'
    Value: !GetAtt RAMResourceShare.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RAM-Share-ARN'