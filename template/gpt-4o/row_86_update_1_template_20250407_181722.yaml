AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an AWS GuardDuty detector for continuous security monitoring of EC2 instances.

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true

Outputs:
  DetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector