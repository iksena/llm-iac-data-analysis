AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for Cognito User Pool with admin-managed user provisioning

Parameters:
  UserPoolName:
    Description: Name of the Cognito User Pool
    Type: String
    Default: SecureUserPool
  EmailVerificationSubject:
    Description: Email subject for verification messages
    Type: String
    Default: Your verification code
  EmailVerificationMessage:
    Description: Email message for verification
    Type: String
    Default: Your verification code is {####}
  PasswordPolicyMinLength:
    Description: Minimum password length
    Type: Number
    Default: 8
    MinValue: 6
    MaxValue: 99
  PasswordPolicyRequireLowercase:
    Description: Require lowercase letters in password
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  PasswordPolicyRequireUppercase:
    Description: Require uppercase letters in password
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  PasswordPolicyRequireNumbers:
    Description: Require numbers in password
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  PasswordPolicyRequireSymbols:
    Description: Require symbols in password
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  DomainPrefix:
    Description: Prefix for Cognito hosted domain
    Type: String
    Default: secure-auth
  CallbackURL:
    Description: Callback URL for OAuth flows
    Type: String
    Default: https://example.com/callback
  LogoutURL:
    Description: Logout URL for OAuth flows
    Type: String
    Default: https://example.com/logout

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationSubject: !Ref EmailVerificationSubject
      EmailVerificationMessage: !Ref EmailVerificationMessage
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordPolicyMinLength
          RequireLowercase: !Ref PasswordPolicyRequireLowercase
          RequireUppercase: !Ref PasswordPolicyRequireUppercase
          RequireNumbers: !Ref PasswordPolicyRequireNumbers
          RequireSymbols: !Ref PasswordPolicyRequireSymbols
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UsernameAttributes:
        - email

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${UserPoolName}Client
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      RefreshTokenValidity: 30
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackURL
      LogoutURLs:
        - !Ref LogoutURL
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true

Outputs:
  UserPoolId:
    Description: ID of the created User Pool
    Value: !Ref CognitoUserPool
  UserPoolArn:
    Description: ARN of the created User Pool
    Value: !GetAtt CognitoUserPool.Arn
  UserPoolClientId:
    Description: ID of the created User Pool Client
    Value: !Ref CognitoUserPoolClient
  UserPoolDomain:
    Description: Domain of the created User Pool
    Value: !GetAtt CognitoUserPoolDomain.Domain
  HostedUIDomain:
    Description: Hosted UI Domain
    Value: !Sub ${CognitoUserPoolDomain.Domain}.auth.${AWS::Region}.amazoncognito.com