AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drives using block device mappings, latest Amazon Linux 2 AMI via SSM, auto-created SSH key pair, in pre-existing default VPC/subnet'

Parameters:
  InstanceType:
    Type: String
    Default: m5d.2xlarge
    Description: 'EC2 instance type supporting multiple NVMe instance stores (ephemeral drives)'
    AllowedValues:
      - m5d.2xlarge
      - m5d.4xlarge
      - m5d.12xlarge
      - c5d.2xlarge
      - c5d.4xlarge
    ConstraintDescription: 'must support at least 2 instance store volumes (NVMe ephemeral)'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Pre-existing default VPC ID (aws ec2 describe-vpcs --filters "Name=is-default,Values=true")'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Public subnet ID in default VPC (MapPublicIpOnLaunch=true; aws ec2 describe-subnets --filters "Name=vpc-id,Values=vpc-xxx" "Name=default-for-az,Values=true")'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR range allowed for SSH ingress (port 22)'
    AllowedPattern: "^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:/(?:3[0-2]|[12]?[0-9]))?$"
    ConstraintDescription: 'must be valid CIDR notation (e.g., 0.0.0.0/0 or 10.0.0.0/24)'

Resources:
  InstanceKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-SSHKey'
      KeyType: rsa
      KeyFormat: pem
    Tags:
      - Key: Name
        Value: !Sub '${AWS::StackName}-KeyPair'

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSH access (port 22)'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2-ami-kernel-5.10-hvm-2.0-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref InstanceKeyPair
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Instance'

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref Ec2Instance
  PublicIp:
    Description: 'Public IP address (SSH: ssh -i key.pem ec2-user@PublicIp)'
    Value: !GetAtt Ec2Instance.PublicIp
  KeyName:
    Description: 'Name of the created EC2 KeyPair'
    Value: !Ref InstanceKeyPair
  KeyMaterial:
    Description: 'Base64-encoded PEM private key (decode: echo "Value" | base64 --decode > key.pem; chmod 400 key.pem)'
    Value: !GetAtt InstanceKeyPair.KeyMaterial
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup