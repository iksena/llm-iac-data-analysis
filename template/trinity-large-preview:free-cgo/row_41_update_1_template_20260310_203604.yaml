AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-StandardQueue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
Outputs:
  QueueURL:
    Description: URL of the SQS Standard Queue
    Value: !Ref SQSQueue
    Export:
      Name: !Sub ${AWS::StackName}-QueueURL