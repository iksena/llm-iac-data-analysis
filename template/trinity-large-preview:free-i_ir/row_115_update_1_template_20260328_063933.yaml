AWSTemplateFormatVersion: '2010-09-09'
Description: Automated monitoring and alerting system for AWS Secrets Manager activities

Resources:
  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        "detail-type":
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - DeleteSecret
            - RotateSecret
            - PutSecretValue
      State: ENABLED
      Targets:
        - Id: SecretsManagerEventTarget
          Arn: !Ref SecretsManagerSNSTopic

  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerAlertTopic

  SecretsManagerSNSTubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref SecretsManagerSNSTopic

Parameters:
  EmailAddress:
    Type: String
    Description: Email address to receive Secrets Manager alerts

Outputs:
  SecretsManagerSNSTopicArn:
    Description: ARN of the SNS topic for Secrets Manager alerts
    Value: !Ref SecretsManagerSNSTopic