AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready VPC network infrastructure with one public and two private subnets,
  security groups, an internal ALB with a fixed error listener, an ECR repository with image scanning,
  and storing critical resource IDs in SSM Parameter Store.

Parameters:
  VPCCIDR:
    Type: String
    Default: "10.0.0.0/16"
    Description: "CIDR block for the VPC"

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ProductionIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ProductionPublicSubnet

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ProductionPrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.3.0/24"
      AvailabilityZone: !Select [2, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ProductionPrivateSubnet2

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: ProductionNATGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ProductionPublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ProductionPrivateRouteTable

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  DefaultSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP, HTTPS, SSH, PostgreSQL and all internal VPC traffic"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "-1"
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: DefaultSecurityGroup

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow inbound HTTP traffic from within the VPC for ALB"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: ALBSecurityGroup

  InternalALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: InternalALB
      Scheme: internal
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      IpAddressType: ipv4
      Tags:
        - Key: Name
          Value: InternalALB

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    DependsOn: InternalALB
    Properties:
      LoadBalancerArn: !Ref InternalALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            MessageBody: "Service unavailable"
            ContentType: "text/plain"
            StatusCode: "503"

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: production-container-app
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire unused images after 30 days",
                "selection": {
                  "tagStatus": "any",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      RepositoryPolicyText: |
        {
          "Version": "2012-10-17",
          "Statement": []
        }

  SSMParameterVPCID:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/id
      Type: String
      Value: !Ref VPC
      Description: "VPC ID for the production VPC"

  SSMParameterPublicSubnet:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/publicSubnet
      Type: String
      Value: !Ref PublicSubnet
      Description: "Public Subnet ID for the production VPC"

  SSMParameterPrivateSubnet1:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/privateSubnet1
      Type: String
      Value: !Ref PrivateSubnet1
      Description: "Private Subnet 1 ID for the production VPC"

  SSMParameterPrivateSubnet2:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/privateSubnet2
      Type: String
      Value: !Ref PrivateSubnet2
      Description: "Private Subnet 2 ID for the production VPC"

  SSMParameterDefaultSG:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/defaultSG
      Type: String
      Value: !Ref DefaultSecurityGroup
      Description: "Default Security Group ID for the production VPC"

  SSMParameterALBSG:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/albSG
      Type: String
      Value: !Ref ALBSecurityGroup
      Description: "ALB Security Group ID for the production VPC"

  SSMParameterALBListener:
    Type: AWS::SSM::Parameter
    DependsOn: ALBListener
    Properties:
      Name: /prod/alb/listenerArn
      Type: String
      Value: !GetAtt ALBListener.ListenerArn
      Description: "ALB Listener ARN for the internal ALB"

Outputs:
  VPCId:
    Description: "VPC ID"
    Value: !Ref VPC
  PublicSubnetId:
    Description: "Public Subnet ID"
    Value: !Ref PublicSubnet
  PrivateSubnet1Id:
    Description: "Private Subnet 1 ID"
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: "Private Subnet 2 ID"
    Value: !Ref PrivateSubnet2
  InternalALBArn:
    Description: "Internal ALB ARN"
    Value: !GetAtt InternalALB.LoadBalancerArn
  ECRRepositoryName:
    Description: "ECR Repository Name"
    Value: !Ref ECRRepository