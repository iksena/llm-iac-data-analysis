AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  HostedZoneID:
    Description: ID of the created Hosted Zone
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub "${AWS::StackName}-HostedZoneID"
  NameServers:
    Description: Name servers for the Hosted Zone
    Value: !Join [",", !GetAtt PrivateHostedZone.NameServers]
    Export:
      Name: !Sub "${AWS::StackName}-NameServers"

Parameters:
  VPCId:
    Type: String
    Description: VPC ID where the Hosted Zone will be associated
    Default: vpc-0000000000000000
    AllowedPattern: ^vpc-(([0-9A-Fa-f]{8})|([0-9A-Fa-f]{17}))$