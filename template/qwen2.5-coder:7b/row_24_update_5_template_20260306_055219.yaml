AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  VpcCidrBlock:
    Type: String
    Description: CIDR block for the VPC
    Default: 10.0.0.0/16
  Subnet1CidrBlock:
    Type: String
    Description: CIDR block for the first subnet
    Default: 10.0.1.0/24
  Subnet2CidrBlock:
    Type: String
    Description: CIDR block for the second subnet
    Default: 10.0.2.0/24
  AutoScalingGroupSize:
    Type: Number
    Description: Number of instances in the Auto Scaling Group
    Default: 2
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t2.micro
  ElastiCacheNodeType:
    Type: String
    Description: ElastiCache node type
    Default: cache.m3.medium
  SnapshotRetentionPeriod:
    Type: Number
    Description: Retention period for snapshots in days
    Default: 7
  EnableSnapshotManagement:
    Type: Boolean
    Description: Enable snapshot management
    Default: true
  RegionAZs:
    Type: List<String>
    Description: List of Availability Zones
    Default:
      - us-east-1a
      - us-east-1b
      - us-east-1c

Mappings:
  AZs:
    us-east-1:
      - us-east-1a
      - us-east-1b
      - us-east-1c

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CidrBlock
      AvailabilityZone: !Select [0, !Ref RegionAZs]

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CidrBlock
      AvailabilityZone: !Select [1, !Ref RegionAZs]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      VpcId: !Ref VPC

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
      MinSize: !Ref AutoScalingGroupSize
      MaxSize: !Ref AutoScalingGroupSize
      VPCZoneIdentifier:
        - !Ref Subnet1
        - !Ref Subnet2

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: ami-0c55b159cbfafe1f0
        InstanceType: !Ref InstanceType
        KeyName: my-key-pair
        SecurityGroupIds:
          - !Ref SecurityGroup
        UserData: !Base64 |
          #!/bin/bash
          yum update -y
          yum install -y awscli
          aws s3 cp s3://my-bucket/my-script.sh /home/ec2-user/my-script.sh
          chmod +x /home/ec2-user/my-script.sh
          /home/ec2-user/my-script.sh

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ElastiCacheCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: my-redis-cluster
      PrimaryAvailabilityZone: !Select [0, !Ref RegionAZs]
      NumCacheNodes: !Ref AutoScalingGroupSize
      CacheNodeType: !Ref ElastiCacheNodeType
      Engine: redis
      EngineVersion: 6.x
      CacheSubnetGroupName: my-cache-subnet-group
      SecurityGroupIds:
        - !Ref SecurityGroup

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: my-cache-subnet-group
      Description: My cache subnet group
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: my-lambda-function
      Runtime: python3.14
      Handler: index.handler
      Code:
        S3Bucket: my-bucket
        S3Key: my-lambda-function.zip
      Role: !GetAtt LambdaExecutionRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:log-group:/aws/lambda/my-lambda-function

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: my-eventbridge-rule
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance State-change Notification
        detail:
          state:
            - running
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: LambdaFunctionTarget

  EventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  Subnet1Id:
    Description: Subnet 1 ID
    Value: !Ref Subnet1
  Subnet2Id:
    Description: Subnet 2 ID
    Value: !Ref Subnet2
  InternetGatewayId:
    Description: Internet Gateway ID
    Value: !Ref InternetGateway
  RouteTableId:
    Description: Route Table ID
    Value: !Ref RouteTable
  SubnetRouteTableAssociation1Id:
    Description: Subnet Route Table Association 1 ID
    Value: !Ref SubnetRouteTableAssociation1
  SubnetRouteTableAssociation2Id:
    Description: Subnet Route Table Association 2 ID
    Value: !Ref SubnetRouteTableAssociation2
  AutoScalingGroupId:
    Description: Auto Scaling Group ID
    Value: !Ref AutoScalingGroup
  LaunchTemplateId:
    Description: Launch Template ID
    Value: !Ref LaunchTemplate
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref SecurityGroup
  ElastiCacheClusterId:
    Description: ElastiCache Cluster ID
    Value: !Ref ElastiCacheCluster
  CacheSubnetGroupId:
    Description: Cache Subnet Group ID
    Value: !Ref CacheSubnetGroup
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
  EventBridgeRuleName:
    Description: EventBridge Rule Name
    Value: !Ref EventBridgeRule
  EventBridgePermissionId:
    Description: EventBridge Permission ID
    Value: !Ref EventBridgePermission