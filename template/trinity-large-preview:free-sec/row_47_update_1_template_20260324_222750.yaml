AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

Outputs:
  EC2IAMReadOnlyRoleArn:
    Description: ARN of the IAM role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: EC2IAMReadOnlyRoleArn