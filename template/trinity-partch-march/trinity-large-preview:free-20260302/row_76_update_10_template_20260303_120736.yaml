AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create four IAM roles with tiered permissions for FIS management

Resources:
  SecurityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*'
        - PolicyName: CreateServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISAccessExceptProd
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*'
        - PolicyName: CreateServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'

  UserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: FISUserActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:Get*'
                  - 'fis:List*'
                  - 'fis:TagResource'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
        - PolicyName: DenyFISProdAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/environment': 'prod'

  NonUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSReadOnlyAccess'
      Policies:
        - PolicyName: DenyAllFISActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'