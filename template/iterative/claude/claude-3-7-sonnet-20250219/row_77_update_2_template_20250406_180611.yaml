AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for environment-specific DynamoDB tables to store supporter product data'

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: Deployment environment (PROD or CODE)

Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']
  IsCode: !Equals [!Ref Stage, 'CODE']

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub SupporterProductData-${Stage}
      BillingMode: !If [IsProd, 'PROVISIONED', 'PAY_PER_REQUEST']
      ProvisionedThroughput: !If 
        - IsProd
        - ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref AWS::NoValue
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Backup
          Value: true
        - Key: Application
          Value: SupporterProductData

  ScalableTargetWriteCapacity:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Join 
        - /
        - - table
          - !Ref SupporterProductDataTable
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTargetWriteCapacity
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SupporterProductDataTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt SupporterProductDataTable.Arn