AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with DynamoDB for music data management

Parameters:
  TableName:
    Type: String
    Default: Music
    Description: DynamoDB table name
  
  ApiName:
    Type: String
    Default: MusicAPI
    Description: API Gateway name
  
  StageName:
    Type: String
    Default: prod
    Description: API Gateway stage name

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: ID
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: ID
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt MusicTable.Arn
                  - !Sub ${MusicTable.Arn}/index/*

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: API for music data management
      EndpointConfiguration:
        Types:
          - REGIONAL

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: '{"TableName": "${TableName}","Item": {"ID": {"S": "$context.requestId"},"Artist": {"S": "$input.path(''$.artist'')"},"Album": {"S": "$input.path(''$.album'')"}}}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"message": "Item added successfully"}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: Empty

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: '{"TableName": "${TableName}","IndexName": "Artist-Index","KeyConditionExpression": "Artist = :v1","ExpressionAttributeValues": {":v1": {"S": "$input.params(''artist'')"}}}'
        IntegrationResponses:
          - StatusCode: '200'
      MethodResponses:
        - StatusCode: '200'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId: !Ref MusicApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref MusicApi
      StageName: !Ref StageName

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: MusicApiKey
      Description: API Key for Music API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref MusicApi
          StageName: !Ref StageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: MusicApiUsagePlan
      Description: Usage plan for Music API
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref StageName
      Quota:
        Limit: 1000
        Period: MONTH
      Throttle:
        BurstLimit: 10
        RateLimit: 5

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/music

  ApiKeyId:
    Description: API Key ID
    Value: !Ref ApiKey

  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt MusicTable.Arn

  UsagePlanId:
    Description: Usage Plan ID
    Value: !Ref UsagePlan