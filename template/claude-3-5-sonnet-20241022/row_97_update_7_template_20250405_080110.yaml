AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Organizations Data Collection and Analysis Pipeline'

Parameters:
  S3BucketName:
    Type: String
    Description: Name for the S3 bucket to store organization data
    Default: org-data-collector-bucket-123456
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: Must be valid S3 bucket name

  AthenaDBName:
    Type: String
    Description: Name for the Athena/Glue database
    Default: managementcur
    AllowedPattern: '^[a-z0-9_]*$'
    ConstraintDescription: Must contain only lowercase letters, numbers, and underscores

  ScheduleExpression:
    Type: String
    Description: CloudWatch Events schedule expression
    Default: 'rate(7 days)'

  OrganizationRoleArn:
    Type: String
    Description: ARN of the role to assume in management account
    Default: 'arn:aws:iam::123456789012:role/OrganizationDataAccessRole'
    AllowedPattern: '^arn:aws:iam::[0-9]{12}:role/[a-zA-Z0-9+=,.@\-_/]+$'

Conditions:
  IsDefaultBucket: !Equals 
    - !Ref S3BucketName
    - 'org-data-collector-bucket-123456'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      Description: KMS key for organization data encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowLambdaAndGlue
            Effect: Allow
            Principal:
              AWS: 
                - !GetAtt LambdaExecutionRole.Arn
                - !GetAtt GlueRole.Arn
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  OrganizationDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !If 
        - IsDefaultBucket
        - !Sub '${AWS::StackName}-${AWS::AccountId}-${AWS::Region}'
        - !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

