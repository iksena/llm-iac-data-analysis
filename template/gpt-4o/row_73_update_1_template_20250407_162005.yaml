AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an Amazon ECS Cluster with Fargate and Fargate Spot capacity providers.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the ECS Cluster will be deployed.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: The Subnet IDs where the ECS Cluster will be deployed.
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS Cluster.

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FARGATE
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FARGATE_SPOT
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED

  ECSClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - !Ref FargateCapacityProvider
        - !Ref FargateSpotCapacityProvider
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !Ref FargateCapacityProvider
          Weight: 1
        - CapacityProvider: !Ref FargateSpotCapacityProvider
          Weight: 1

Outputs:
  ECSClusterARN:
    Description: The ARN of the ECS Cluster.
    Value: !GetAtt ECSCluster.Arn
  ECSClusterName:
    Description: The name of the ECS Cluster.
    Value: !Ref ECSCluster