AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an EC2 instance with the latest Amazon Linux 2 AMI in the default VPC with SSH access.'

Parameters:
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: 'Name of an existing EC2 KeyPair to enable SSH access to the instance'
  InstanceType:
    Type: String
    Default: t3.micro
    Description: 'EC2 instance type'
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: 'must be a valid EC2 instance type.'
  AllowedSSHFrom:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'IP range (CIDR) allowed to SSH into the EC2 instance'
    ConstraintDescription: 'must be a valid CIDR range (e.g., 203.0.113.0/24 or 0.0.0.0/0).'
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: 'Latest Amazon Linux 2 AMI ID (resolved from SSM Parameter Store)'

Resources:
  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Security group for EC2 instance allowing SSH access.'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHFrom
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      AssociatePublicIpAddress: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          echo 'EC2 instance ready' > /var/tmp/ready.txt

Outputs:
  InstanceId:
    Description: 'ID of the EC2 instance'
    Value: !Ref EC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  InstancePublicIp:
    Description: 'Public IP address of the EC2 instance'
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'

  InstancePublicDns:
    Description: 'Public DNS name of the EC2 instance'
    Value: !GetAtt EC2Instance.PublicDnsName
    Export:
      Name: !Sub '${AWS::StackName}-PublicDns'