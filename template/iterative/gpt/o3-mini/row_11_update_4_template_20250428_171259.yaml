AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS CloudFormation template for creating a production-ready DynamoDB table for mobile notifications reporting.
  The table uses PAY_PER_REQUEST billing mode, includes a global secondary index on 'type' and 'sentTime' for time-based queries,
  and has TTL enabled for automatic cleanup of stale data.

Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "MobileNotificationsReporting"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: "NotificationId"
          AttributeType: "S"
        - AttributeName: "type"
          AttributeType: "S"
        - AttributeName: "sentTime"
          AttributeType: "N"
      KeySchema:
        - AttributeName: "NotificationId"
          KeyType: "HASH"
      GlobalSecondaryIndexes:
        - IndexName: "TypeSentTimeIndex"
          KeySchema:
            - AttributeName: "type"
              KeyType: "HASH"
            - AttributeName: "sentTime"
              KeyType: "RANGE"
          Projection:
            ProjectionType: "ALL"
      TimeToLiveSpecification:
        AttributeName: "ttl"
        Enabled: true

Outputs:
  MobileNotificationsTableName:
    Description: "The DynamoDB table name for mobile notifications reporting."
    Value: !Ref MobileNotificationsTable