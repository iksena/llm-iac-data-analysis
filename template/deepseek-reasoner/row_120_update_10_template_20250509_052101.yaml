AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID for compute resources (e.g., vpc-abcdef12)
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Comma-separated list of private subnets for Batch compute
  Image:
    Type: String
    Description: ECR image URI for batch job container (e.g., 123456789012.dkr.ecr.region.amazonaws.com/repo:tag)

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderEventsQueue

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Batch compute
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [batch.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ecs-tasks.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: FARGATE
        MaxvCpus: 256
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        Subnets: !Ref SubnetIds
        SecurityGroupIds: [!GetAtt BatchSecurityGroup.GroupId]
      State: ENABLED

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      State: ENABLED

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      PlatformCapabilities: [FARGATE]
      ContainerProperties:
        Image: !Ref Image
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
        ResourceRequirements:
          - Type: VCPU
            Value: '1'
          - Type: MEMORY
            Value: '2048'
        NetworkConfiguration:
          AssignPublicIp: DISABLED

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [pipes.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: PipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action: ['batch:SubmitJob']
                Resource:
                  - !Ref BatchJobQueue
                  - !Sub arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-definition/${BatchJobDefinition}

  EventProcessingPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: OrderEventProcessor
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt EventQueue.Arn
      Target: !Sub arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 30
        FilterCriteria:
          Filters:
            - Pattern: '{"body": {"eventType": ["OrderCreated"]}}'
      TargetParameters:
        BatchJobParameters:
          JobName: !Sub OrderProcessingJob-${AWS::StackName}
          JobDefinition: !Ref BatchJobDefinition
          Parameters:
            EventBody: "$.body"

Outputs:
  SQSQueueURL:
    Value: !Ref EventQueue
  BatchJobQueueARN:
    Value: !Ref BatchJobQueue
  EventBridgePipeName:
    Value: !Ref EventProcessingPipe