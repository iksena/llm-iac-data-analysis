AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AMIId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
    Description: 'The AMI ID for the Windows Server 2019 instance.'
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: 'EC2 instance type.'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet ID for the EC2 instance.'
    Default: ''
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for the EC2 instance.'
    Default: ''

Resources:
  DefaultVPC:
    Type: 'AWS::EC2::VPC'
    Condition: UseDefaultVPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true

  DefaultSubnet:
    Type: 'AWS::EC2::Subnet'
    Condition: UseDefaultSubnet
    Properties:
      VpcId: !If [UseDefaultVPC, !Ref DefaultVPC, !Ref VpcId]
      CidrBlock: '10.0.1.0/24'
      MapPublicIpOnLaunch: true

  EC2InstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles:
        - Ref: EC2InstanceRole

  FISRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FISPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ec2:DescribeInstances
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EC2SecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Enable RDP access'
      VpcId: !If [UseDefaultVPC, !Ref DefaultVPC, !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AMIId
      SubnetId: !If [UseDefaultSubnet, !Ref DefaultSubnet, !Ref SubnetId]
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup

  SSMDocument:
    Type: 'AWS::SSM::Document'
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Simulate CPU stress by spawning threads.'
        mainSteps:
          - action: aws:runPowerShellScript
            name: stressTest
            inputs:
              runCommand:
                - |
                  $logicalProcessors = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
                  $duration = 60
                  $endTime = (Get-Date).AddSeconds($duration)
                  while ((Get-Date) -lt $endTime) {
                      1..$logicalProcessors | ForEach-Object {
                          Start-Job -ScriptBlock { while ($true) { } }
                      }
                      Start-Sleep -Seconds 1
                  }
                  Get-Job | Stop-Job | Remove-Job

  CloudWatchLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: '/aws/ec2/cpu-stress-test'
      RetentionInDays: 7

Conditions:
  UseDefaultVPC: !Equals [!Ref VpcId, '']
  UseDefaultSubnet: !Equals [!Ref SubnetId, '']

Outputs:
  InstanceId:
    Description: 'Instance ID of the newly created EC2 instance'
    Value: !Ref EC2Instance
  InstancePublicIP:
    Description: 'Public IP address of the newly created EC2 instance'
    Value: !GetAtt EC2Instance.PublicIp
  SSMDocumentName:
    Description: 'Name of the SSM Document for CPU stress test'
    Value: !Ref SSMDocument