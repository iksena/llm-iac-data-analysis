AWSTemplateFormatVersion: '2010-09-09'
Description: 'Custom Resource Calculator using Lambda for arithmetic operations'

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for calculation
    Default: 10
  
  SecondNumber:
    Type: Number
    Description: Second number for calculation
    Default: 5
  
  Operator:
    Type: String
    Description: Arithmetic operator
    AllowedValues: ['+', '-', '*', '/']
    Default: '+'
  
  SimulateFailure:
    Type: String
    Description: Simulate custom resource failure
    AllowedValues: ['Yes', 'No']
    Default: 'No'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CalculatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import logging
          import cfnresponse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def perform_calculation(first, second, operator):
              operations = {
                  '+': lambda x, y: x + y,
                  '-': lambda x, y: x - y,
                  '*': lambda x, y: x * y,
                  '/': lambda x, y: x / y if y != 0 else None
              }
              
              if operator not in operations:
                  raise ValueError(f"Invalid operator: {operator}")
              
              if operator == '/' and second == 0:
                  raise ValueError("Division by zero")
                  
              return operations[operator](first, second)

          def handler(event, context):
              logger.info('Received event: %s', event)
              response_data = {}
              
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      props = event['ResourceProperties']
                      first = float(props['FirstNumber'])
                      second = float(props['SecondNumber'])
                      operator = props['Operator']
                      simulate_failure = props.get('SimulateFailure', 'No')
                      
                      if simulate_failure == 'Yes':
                          raise Exception("Simulated failure")
                          
                      result = perform_calculation(first, second, operator)
                      
                      response_data = {
                          'Result': str(result),
                          'Operation': f"{first} {operator} {second}",
                          'Status': 'SUCCESS'
                      }
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Timeout: 30
      MemorySize: 128

  CalculatorHelper:
    Type: Custom::Helper
    Properties:
      ServiceToken: !GetAtt CalculatorFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the calculation
    Value: !GetAtt CalculatorHelper.Result
    
  OperationPerformed:
    Description: The operation that was performed
    Value: !GetAtt CalculatorHelper.Operation
    
  Status:
    Description: Status of the calculation
    Value: !GetAtt CalculatorHelper.Status