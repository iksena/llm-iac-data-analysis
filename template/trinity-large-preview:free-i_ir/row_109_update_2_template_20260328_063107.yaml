AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB API integration with dead-letter queue

Resources:
  EventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: CustomEventBus
      Description: Custom event bus for MongoDB integration

  MongoDBConnection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: MongoDBConnection
      Description: MongoDB API key credentials
      SecretString: !Sub '{"apiKeyName": "test_name", "apiKeyValue": "test_value"}'
      KmsKeyId: alias/aws/secretsmanager

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDB
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  MongoDBApiDestination:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: MongoDBApiDestination
      ProtocolType: HTTP
      Description: MongoDB API endpoint
      Target: www.testanu.com
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type
          - Authorization
      RouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 10
      Body:
        openapi: 3.0.0
        info:
          title: MongoDB API
          version: 1.0.0
        paths:
          /:
            post:
              x-amazon-apigateway-integration:
                type: HTTP_PROXY
                httpMethod: POST
                uri: https://www.testanu.com
                connectionType: INTERNET
                connectionId: !Ref EventBridgeRole
                credentialsArn: !GetAtt EventBridgeRole.Arn
                requestParameters:
                  integration.request.header.Content-Type: 'application/json'
                requestTemplates:
                  application/json: |
                    {
                      "body": $input.json('$')
                    }
                responses:
                  default:
                    statusCode: 200
      Tags:
        - Key: IntegrationType
          Value: EventBridge

Metadata:
  Invariants:
    - EventBridge must have IAM permissions to invoke MongoDB API endpoint
    - MongoDB API key authentication must be securely stored
    - Dead-letter queue must be configured for fault tolerance