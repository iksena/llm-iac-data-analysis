AWSTemplateFormatVersion: '2010-09-09'
Description: Auto-configuring EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager (SSM)

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
    Metadata:
      Effect: ssm-access

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole
    Metadata:
      Effect: ssm-access

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: nginx-logs-bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    Metadata:
      Effect: encrypted, versioned

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt InstanceRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
    Metadata:
      Effect: s3-access

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0f0
      InstanceType: t3.micro
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: NginxInstance
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y nginx
          systemctl start nginx
          systemctl enable nginx
          echo "Nginx installed and started" > /var/log/nginx/install.log
    Metadata:
      Effect: encrypted, monitored

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-ConfigureS3Bucket
      Targets:
        - Key: tag:InstallNginx
          Values:
            - 'true'
      Parameters:
        installNginx:
          - 'true'
        s3BucketName:
          - !Ref S3Bucket
      ScheduleExpression: rate(1 hour)
    Metadata:
      Effect: auto-config

  CloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighCPUUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions: []
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
    Metadata:
      Effect: monitored

Metadata:
  Template:
    Description: Auto-configuring EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager (SSM)
    Invariants:
      - EC2 instance must have SSM permissions
      - Nginx installation must be tag-driven
      - Logs must be centralized in S3
      - Instance must be monitored via CloudWatch
      - S3 bucket must be encrypted and versioned