AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an API Gateway REST API with a /hello endpoint
  returning a static "hello world" JSON response using a MOCK integration and a 
  CloudFront distribution that fronts the API Gateway production stage with HTTPS only 
  origin communication and viewer protocol redirection to HTTPS. Caching is disabled.

Resources:
  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MockApiGateway
      Description: REST API with /hello GET endpoint returning "hello world" via MOCK integration.

  ApiGatewayResourceHello:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId:
        Fn::GetAtt:
          - ApiGatewayRestApi
          - RootResourceId
      PathPart: hello
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayMethodHelloGet:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResourceHello
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationHttpMethod: GET
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"message": "hello world"}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: Empty

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethodHelloGet
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: prod

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: ""
        Origins:
          - Id: ApiGatewayOrigin
            DomainName:
              Fn::Join:
                - '.'
                - - !Ref ApiGatewayRestApi
                  - execute-api
                  - !Ref "AWS::Region"
                  - amazonaws
                  - com
            OriginPath: /prod
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              HTTPPort: 80
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontDomainName:
    Description: "The CloudFront distribution domain name"
    Value: !GetAtt CloudFrontDistribution.DomainName