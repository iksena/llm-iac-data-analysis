AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Cross-Account Trust and Role-Based Access Controls

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: '123456789012'
  TrustedToolingManagementAccount:
    Type: String
    Default: '234567890123'

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'cloudformation:*'
                  - 's3:*'
                  - 'ec2:*'
                  - 'rds:*'
                  - 'lambda:*'
                  - 'sqs:*'
                  - 'sns:*'
                  - 'dynamodb:*'
                  - 'elasticache:*'
                  - 'elasticloadbalancing:*'
                  - 'autoscaling:*'
                  - 'cloudwatch:*'
                  - 'logs:*'
                  - 'events:*'
                  - 'ssm:*'
                  - 'kms:*'
                  - 'secretsmanager:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'guardduty:*'
                  - 'inspector:*'
                  - 'waf:*'
                  - 'shield:*'
                  - 'route53:*'
                  - 'acm:*'
                  - 'elasticbeanstalk:*'
                  - 'opsworks:*'
                  - 'cloudfront:*'
                  - 'directconnect:*'
                  - 'datapipeline:*'
                  - 'workspaces:*'
                  - 'storagegateway:*'
                  - 'importexport:*'
                  - 'support:*'
                  - 'aws-portal:*'
                  - 'budgets:*'
                  - 'cur:*'
                  - 'pricing:*'
                  - 'dms:*'
                  - 'redshift:*'
                  - 'elasticmapreduce:*'
                  - 'datasync:*'
                  - 'fsx:*'
                  - 'backup:*'
                  - 'resource-groups:*'
                  - 'service-quotas:*'
                  - 'wellarchitected:*'
                  - 'trustedadvisor:*'
                  - 'costexplorer:*'
                  - 'savingsplans:*'
                  - 'ce:*'
                Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/PowerUserAccess'
      Policies:
        - PolicyName: DenySensitiveOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              -