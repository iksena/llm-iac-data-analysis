AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT Core to SQS via SNS data pipeline'

Resources:
  IoTDataQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  IoTDataTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  IoTDataTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref IoTDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIoTPublish
            Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sns:Publish
            Resource: !GetAtt IoTDataTopic.TopicArn

  QueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt IoTDataTopic.TopicArn

  QueueSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref IoTDataTopic
      Protocol: sqs
      Endpoint: !GetAtt IoTDataQueue.Arn
      RawMessageDelivery: true

  IoTRuleRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTSNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !GetAtt IoTDataTopic.TopicArn

  IoTDataRule:
    Type: 'AWS::IoT::TopicRule'
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !GetAtt IoTDataTopic.TopicArn
              RoleArn: !GetAtt IoTRuleRole.Arn
              MessageFormat: RAW

Outputs:
  QueueURL:
    Description: 'URL of the SQS Queue'
    Value: !Ref IoTDataQueue

  QueueARN:
    Description: 'ARN of the SQS Queue'
    Value: !GetAtt IoTDataQueue.Arn

  TopicARN:
    Description: 'ARN of the SNS Topic'
    Value: !GetAtt IoTDataTopic.TopicArn