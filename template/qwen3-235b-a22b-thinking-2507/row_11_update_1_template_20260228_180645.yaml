AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  TableName:
    Type: String
    Default: MobileNotificationsTable
    Description: Name of the DynamoDB table for mobile notifications
    MinLength: 3
    MaxLength: 255
  TTLAttributeName:
    Type: String
    Default: ttl
    Description: Name of the TTL attribute for automatic data expiration
    MinLength: 1
    MaxLength: 255
Resources:
  NotificationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true
Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref NotificationTable
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt NotificationTable.Arn