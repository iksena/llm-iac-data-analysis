AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for supporter product data with environment-specific configurations

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      SSESpecification:
        Enabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: Enabled
      ProvisionedThroughput: !If
        - IsProd
        - ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref AWS::NoValue

  ScalableWriteTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub 'table/SupporterProductData-${Stage}'
      RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/DynamoDBAutoscaleRole'
      ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
      ServiceNamespace: dynamodb

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteCapacityUtilization
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableWriteTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Conditions:
  IsProd: !Equals [ !Ref Stage, PROD ]

Outputs:
  TableName:
    Value: !Ref SupporterProductDataTable
    Description: Name of the DynamoDB table