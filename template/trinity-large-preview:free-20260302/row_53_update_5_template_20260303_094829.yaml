AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template to create an EMR Serverless environment with IAM role, S3 bucket, and EMR Serverless application.

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EMRServerlessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt EMRServerlessBucket.Arn
                  - !Sub '${EMRServerlessBucket.Arn}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'emr-serverless-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled

  EMRServerlessBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EMRServerlessBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EMRServerlessRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt EMRServerlessBucket.Arn
              - !Sub '${EMRServerlessBucket.Arn}/*'

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: EMRServerlessApp
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      Architecture: ARM64
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      MaximumCapacity:
        Unit: VCPU
        Value: 50
      Networks:
        - SubnetIds:
            - subnet-12345678901234567
      InitialCapacity:
        Worker:
          Quantity: 2
          ConfigurationOverrides:
            ExecutionRole: !GetAtt EMRServerlessRole.Arn
            SparkConfiguration:
              Runtime: emr-6.15.0
              ApplicationConfiguration:
                - Classification: spark-defaults
                  Properties:
                    spark.executor.instances: '2'
                    spark.executor.memory: '2G'
                    spark.executor.cores: '1'
                    spark.driver.memory: '1G'
                    spark.driver.cores: '1'
      ImageConfiguration:
        ImageUri: 763104351884.dkr.ecr.us-east-1.amazonaws.com/spark:2.4.8-1.0.0-2.4.8-1-1