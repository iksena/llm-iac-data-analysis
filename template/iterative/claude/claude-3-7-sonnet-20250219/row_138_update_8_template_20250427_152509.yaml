AWSTemplateFormatVersion: '2010-09-09'
Description: 'Web Application Environment with S3, DynamoDB, and EC2 resources'

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String
    Default: WebApp

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

  VpcCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16

  PublicSubnetCIDR:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.1.0/24

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0d382e80be7ffdae5
    us-west-2:
      AMI: ami-0ceecbb0f30a902a6
    eu-west-1:
      AMI: ami-0bb3fad3c0286ebd5
    eu-central-1:
      AMI: ami-0a1ee2fb28fe05df3
    ap-northeast-1:
      AMI: ami-0ab0bbbd329f565e6
    ap-southeast-1:
      AMI: ami-0f62aafc6efe8fd7b
    ap-southeast-2:
      AMI: ami-0c635ee4f691a2310

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-WebServerSG

  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
            AllowedOrigins:
              - '*'
            MaxAge: 3000
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-StaticAssets

  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${StaticAssetsBucket}/*'

  ServicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${EnvironmentName}-Services
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: Category
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: Category
          KeyType: RANGE
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ServicesTable

  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-WebServerRole

  WebServerRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${EnvironmentName}-WebServerPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:DeleteObject
              - s3:PutObjectAcl
            Resource:
              - !Sub 'arn:aws:s3:::${StaticAssetsBucket}'
              - !Sub 'arn:aws:s3:::${StaticAssetsBucket}/*'
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:BatchGetItem
              - dynamodb:BatchWriteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt ServicesTable.Arn
      Roles:
        - !Ref WebServerRole

  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WebServerRole

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref WebServerSecurityGroup
          SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref WebServerInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-WebServer
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          
          # Enable logging
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          # Update system packages
          yum update -y
          
          # Install Apache, PHP, and required extensions
          yum install -y httpd php php-mbstring php-xml php-json
          
          # Start Apache
          systemctl enable httpd
          systemctl start httpd
          
          # Create a simple test page
          echo "<html><body><h1>Web Server is running!</h1></body></html>" > /var/www/html/index.html
          
          # Install AWS CLI
          yum install -y aws-cli
          
          # Install AWS SDK for PHP
          cd /var/www/html
          mkdir -p vendor
          curl -sS https://getcomposer.org/installer | php
          php composer.phar require aws/aws-sdk-php
          
          # Create a configuration file for the application
          cat > /var/www/html/config.php << 'EOFCONFIG'
          <?php
          return [
              'region' => '${AWS::Region}',
              's3_bucket' => '${StaticAssetsBucket}',
              'dynamodb_table' => '${ServicesTable}'
          ];
          EOFCONFIG
          
          # Create a sample index.php file
          cat > /var/www/html/app.php << 'EOFINDEX'
          <?php
          require 'vendor/autoload.php';
          $config = require 'config.php';
          
          use Aws\S3\S3Client;
          use Aws\DynamoDb\DynamoDbClient;
          
          echo "<h1>Web Application with AWS Integration</h1>";
          echo "<p>S3 Bucket: " . $config['s3_bucket'] . "</p>";
          echo "<p>DynamoDB Table: " . $config['dynamodb_table'] . "</p>";
          
          try {
              $s3 = new S3Client([
                  'version' => 'latest',
                  'region' => $config['region']
              ]);
              
              echo "<p>S3 Client initialized successfully</p>";
          } catch (Exception $e) {
              echo "<p>Error initializing S3 client: " . $e->getMessage() . "</p>";
          }
          
          try {
              $dynamodb = new DynamoDbClient([
                  'version' => 'latest',
                  'region' => $config['region']
              ]);
              
              echo "<p>DynamoDB Client initialized successfully</p>";
              
              // Display some sample data from DynamoDB
              $result = $dynamodb->scan([
                  'TableName' => $config['dynamodb_table']
              ]);
              
              echo "<h2>AWS Services</h2>";
              echo "<ul>";
              foreach ($result['Items'] as $item) {
                  echo "<li>" . $item['ServiceName']['S'] . " - Category: " . $item['Category']['S'] . "</li>";
              }
              echo "</ul>";
          } catch (Exception $e) {
              echo "<p>Error with DynamoDB: " . $e->getMessage() . "</p>";
          }
          EOFINDEX
          
          # Create a sample JSON file with AWS services data
          cat > /tmp/aws-services.json << 'EOFJSON'
          [
              {
                  "ServiceName": "Amazon EC2",
                  "Category": "Compute",
                  "Description": "Virtual servers in the cloud"
              },
              {
                  "ServiceName": "Amazon S3",
                  "Category": "Storage",
                  "Description": "Scalable storage in the cloud"
              },
              {
                  "ServiceName": "Amazon DynamoDB",
                  "Category": "Database",
                  "Description": "Managed NoSQL database"
              },
              {
                  "ServiceName": "Amazon RDS",
                  "Category": "Database",
                  "Description": "Managed relational database service"
              },
              {
                  "ServiceName": "AWS Lambda",
                  "Category": "Compute",
                  "Description": "Run code without thinking about servers"
              },
              {
                  "ServiceName": "Amazon VPC",
                  "Category": "Networking",
                  "Description": "Isolated cloud resources"
              }
          ]
          EOFJSON
          
          # Create a PHP script to populate DynamoDB
          cat > /tmp/populate-dynamodb.php << 'EOFDDB'
          <?php
          require '/var/www/html/vendor/autoload.php';
          $config = require '/var/www/html/config.php';
          
          use Aws\DynamoDb\DynamoDbClient;
          use Aws\DynamoDb\Exception\DynamoDbException;
          
          try {
              $dynamodb = new DynamoDbClient([
                  'version' => 'latest',
                  'region' => $config['region']
              ]);
              
              $json = file_get_contents('/tmp/aws-services.json');
              $services = json_decode($json, true);
              
              foreach ($services as $service) {
                  try {
                      $dynamodb->putItem([
                          'TableName' => $config['dynamodb_table'],
                          'Item' => [
                              'ServiceName' => ['S' => $service['ServiceName']],
                              'Category' => ['S' => $service['Category']],
                              'Description' => ['S' => $service['Description']]
                          ]
                      ]);
                      echo "Added " . $service['ServiceName'] . "\n";
                  } catch (DynamoDbException $e) {
                      echo "Error adding " . $service['ServiceName'] . ": " . $e->getMessage() . "\n";
                  }
              }
          } catch (Exception $e) {
              echo "Error: " . $e->getMessage() . "\n";
          }
          EOFDDB
          
          # Create a script to upload to S3
          cat > /tmp/upload-to-s3.php << 'EOFS3'
          <?php
          require '/var/www/html/vendor/autoload.php';
          $config = require '/var/www/html/config.php';
          
          use Aws\S3\S3Client;
          use Aws\S3\Exception\S3Exception;
          
          try {
              $s3 = new S3Client([
                  'version' => 'latest',
                  'region' => $config['region']
              ]);
              
              // Create a simple HTML file to upload
              $htmlContent = '<html><head><title>Static Asset</title></head><body><h1>This is a static asset from S3</h1></body></html>';
              file_put_contents('/tmp/sample.html', $htmlContent);
              
              // Create directory for jQuery
              if (!file_exists('/tmp/js')) {
                  mkdir('/tmp/js', 0755, true);
              }
              
              // Create a simple text file for jQuery (mock)
              $jqueryContent = '/* jQuery mock file */';
              file_put_contents('/tmp/js/jquery.min.js', $jqueryContent);
              
              // Upload HTML file
              $s3->putObject([
                  'Bucket' => $config['s3_bucket'],
                  'Key' => 'sample.html',
                  'Body' => $htmlContent,
                  'ContentType' => 'text/html',
                  'ACL' => 'public-read'
              ]);
              
              // Upload jQuery file
              $s3->putObject([
                  'Bucket' => $config['s3_bucket'],
                  'Key' => 'js/jquery.min.js',
                  'Body' => $jqueryContent,
                  'ContentType' => 'application/javascript',
                  'ACL' => 'public-read'
              ]);
              
          } catch (Exception $e) {
              echo "Error: " . $e->getMessage() . "\n";
          }
          EOFS3
          
          # Wait for AWS resources to be fully available
          sleep 30
          
          # Run the scripts to populate DynamoDB and S3
          php /tmp/populate-dynamodb.php
          php /tmp/upload-to-s3.php
          
          # Set proper permissions
          chown -R apache:apache /var/www/html
          chmod -R 755 /var/www/html

Outputs:
  WebsiteURL:
    Description: URL for the web application
    Value: !Sub http://${WebServerInstance.PublicDnsName}

  WebsiteAppURL:
    Description: URL for the PHP application
    Value: !Sub http://${WebServerInstance.PublicDnsName}/app.php

  S3BucketName:
    Description: Name of the S3 bucket for static assets
    Value: !Ref StaticAssetsBucket

  S3BucketURL:
    Description: URL of the S3 bucket
    Value: !Sub https://${StaticAssetsBucket}.s3.amazonaws.com

  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref ServicesTable

  EC2InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref WebServerInstance

  EC2PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicIp