AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template creates a CloudWatch Dashboard that includes
  four CloudWatch Logs Insights widgets querying VPC flow logs for NAT Gateway.
  Widgets display top source IPs by outbound traffic and rejected connections,
  as well as traffic and rejected connection trends.

Parameters:
  LogGroupName:
    Type: String
    Description: "The CloudWatch Logs log group name containing the VPC flow logs for NAT Gateway."

Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: "NATGatewayLogDashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter interfaceId like /eni-/ | stats sum(bytes) as outboundBytes by srcAddr | sort outboundBytes desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Outbound Traffic",
                "queryType": "CLOUDWATCH_LOGS_INSIGHTS",
                "logGroupNames": [ "${LogGroupName}" ]
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter interfaceId like /eni-/ and action = \"REJECT\" | stats count(*) as rejectedCount by srcAddr | sort rejectedCount desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Rejected Connections",
                "queryType": "CLOUDWATCH_LOGS_INSIGHTS",
                "logGroupNames": [ "${LogGroupName}" ]
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, bytes, srcAddr | filter interfaceId like /eni-/ | stats sum(bytes) as totalBytes by bin(1m)",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Outbound Traffic Trend",
                "queryType": "CLOUDWATCH_LOGS_INSIGHTS",
                "logGroupNames": [ "${LogGroupName}" ]
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "fields @timestamp, @message | filter interfaceId like /eni-/ and action = \"REJECT\" | stats count(*) as rejectCount by bin(1m)",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Rejected Connections Trend",
                "queryType": "CLOUDWATCH_LOGS_INSIGHTS",
                "logGroupNames": [ "${LogGroupName}" ]
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: "The name of the created CloudWatch Dashboard"
    Value: !Ref NATGatewayDashboard