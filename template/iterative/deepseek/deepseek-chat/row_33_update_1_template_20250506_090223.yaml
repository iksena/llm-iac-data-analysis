AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating two IAM roles with read-only IAM access for EC2 instances'

Resources:
  ReadOnlyIAMRole1:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Path: /
      RoleName: EC2ReadOnlyIAMRole1

  ReadOnlyIAMRole2:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess
      Path: /
      RoleName: EC2ReadOnlyIAMRole2

  EC2InstanceProfile1:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref ReadOnlyIAMRole1
      InstanceProfileName: EC2ReadOnlyInstanceProfile1

  EC2InstanceProfile2:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref ReadOnlyIAMRole2
      InstanceProfileName: EC2ReadOnlyInstanceProfile2

Outputs:
  Role1ARN:
    Description: 'ARN of the first read-only IAM role'
    Value: !GetAtt ReadOnlyIAMRole1.Arn
  Role2ARN:
    Description: 'ARN of the second read-only IAM role'
    Value: !GetAtt ReadOnlyIAMRole2.Arn
  InstanceProfile1ARN:
    Description: 'ARN of the first instance profile'
    Value: !GetAtt EC2InstanceProfile1.Arn
  InstanceProfile2ARN:
    Description: 'ARN of the second instance profile'
    Value: !GetAtt EC2InstanceProfile2.Arn