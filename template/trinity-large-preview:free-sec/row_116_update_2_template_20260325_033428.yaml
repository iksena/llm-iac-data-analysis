AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AllMetricsTopic
      KmsMasterKeyId: alias/aws/sns

  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDlq.Arn
        maxReceiveCount: 3

  AllMetricsSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: AllMetricsQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref AllMetricsSnsTopic

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDlq.Arn
        maxReceiveCount: 3

  TemperatureSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: TemperatureQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref AllMetricsSnsTopic

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDlq.Arn
        maxReceiveCount: 3

  HumiditySqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: HumidityQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref AllMetricsSnsTopic

  AllMetricsDlq:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs

  TemperatureDlq:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs

  HumidityDlq:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      KmsMasterKeyId: alias/aws/sqs

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AllMetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
      RawMessageDelivery: true

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AllMetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      RawMessageDelivery: true
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AllMetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      RawMessageDelivery: true
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  SnsTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref AllMetricsSnsTopic
  AllMetricsQueueArn:
    Description: ARN of the all metrics SQS queue
    Value: !GetAtt AllMetricsSqsQueue.Arn
  TemperatureQueueArn:
    Description: ARN of the temperature SQS queue
    Value: !GetAtt TemperatureSqsQueue.Arn
  HumidityQueueArn:
    Description: ARN of the humidity SQS queue
    Value: !GetAtt HumiditySqsQueue.Arn
  AllMetricsDlqArn:
    Description: ARN of the all metrics dead-letter queue
    Value: !GetAtt AllMetricsDlq.Arn
  TemperatureDlqArn:
    Description: ARN of the temperature dead-letter queue
    Value: !GetAtt TemperatureDlq.Arn
  HumidityDlqArn:
    Description: ARN of the humidity dead-letter queue
    Value: !GetAtt HumidityDlq.Arn