AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an encrypted One Zone EFS file system in us-east-1a'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EFS will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet in us-east-1a where the mount target will be created

  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system

  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system

  ProvisionedThroughputInMibps:
    Type: Number
    Default: 1
    MinValue: 1
    Description: The throughput, measured in MiB/s, that you want to provision for the file system. Required if ThroughputMode is provisioned.

  AllowedCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block to allow NFS access from

Conditions:
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, provisioned]

Resources:
  EfsEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EFS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EfsEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-efs-key'
      TargetKeyId: !Ref EfsEncryptionKey

  FileSystemSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref AllowedCidr
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs-sg'

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !GetAtt EfsEncryptionKey.Arn
      AvailabilityZoneName: us-east-1a
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughputInMibps
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'
      BackupPolicy:
        Status: ENABLED

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref FileSystemSecurityGroup

Outputs:
  FileSystemId:
    Description: ID of the EFS file system
    Value: !Ref FileSystem

  FileSystemArn:
    Description: ARN of the EFS file system
    Value: !GetAtt FileSystem.Arn

  MountTargetId:
    Description: ID of the mount target
    Value: !Ref MountTarget

  MountTargetDnsName:
    Description: DNS name to use for mounting
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'

  FileSystemDnsName:
    Description: DNS name for the file system
    Value: !Sub '${AWS::Region}.${FileSystem}.efs.${AWS::Region}.amazonaws.com'

  KmsKeyId:
    Description: ID of the KMS key used for encryption
    Value: !Ref EfsEncryptionKey