AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access via GetSecretValue/DescribeSecret) using CloudTrail management events, EventBridge, and SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique lowercase S3 bucket name for CloudTrail logs (create before deploy).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: '3-63 lowercase letters, numbers, hyphens. Start/end alphanumeric.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '^[a-zA-Z0-9-_./]{3,128}$'
    Default: 'SecretsManagerMonitoringTrail'
  SNSTopicName:
    Type: String
    Description: 'Name of the SNS topic for alerts.'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-_]{1,256}$'
    Default: 'SecretsManagerAlerts'

Resources:
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action:
              - s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Ref CloudTrailTrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - IncludeManagementEvents: true
          ReadWriteType: All
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Sub '${SNSTopicName} - Secrets Manager Alerts'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-SecretsManagerEvents'
      Description: 'Real-time SNS alerts for Secrets Manager lifecycle events (CreateSecret, UpdateSecret, PutSecretValue, GetSecretValue, DescribeSecret) via CloudTrail.'
      State: ENABLED
      EventPattern:
        source:
          - aws.secretsmanager
        'detail-type':
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - GetSecretValue
            - DescribeSecret
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

Outputs:
  SNSTopicArn:
    Description: 'SNS Topic ARN - Subscribe email/phone/Lambda/etc. to receive alerts on secret create/update/access.'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  EventBridgeRuleArn:
    Description: 'EventBridge Rule ARN monitoring Secrets Manager CloudTrail events.'
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudTrailTrailName:
    Description: 'CloudTrail Trail Name (logs all Secrets Manager mgmt events to S3 for audit).'
    Value: !Ref CloudTrailTrailName
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailTrailName'

  CloudTrailBucketName:
    Description: 'S3 Bucket Name for CloudTrail logs (query via Athena for detailed analysis).'
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailBucketName'