AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Batch environment for executing containerized batch jobs.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket for input/output data

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyBatchVPC

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MyBatchSubnet

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to Batch instances
      VpcId: !Ref MyVPC

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref BatchInstanceRole

  MyComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: MyBatchComputeEnvironment
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - m5.large
        Subnets:
          - !Ref MySubnet
        SecurityGroupIds:
          - !GetAtt MySecurityGroup.GroupId
        InstanceRole: !Ref BatchInstanceProfile

  MyJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: MyBatchJobQueue
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref MyComputeEnvironment

  MyJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: MyBatchJobDefinition
      Type: container
      ContainerProperties:
        Image: amazonlinux
        Vcpus: 1
        Memory: 1024
        Command:
          - /bin/bash
          - -c
          - |
            yum install -y aws-cli
            aws s3 cp s3://<input-bucket>/input.txt /tmp/input.txt
            aws s3 cp /tmp/input.txt s3://<output-bucket>/output.txt
        JobRoleArn: !GetAtt BatchInstanceRole.Arn

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref MyVPC

  SubnetId:
    Description: Subnet ID
    Value: !Ref MySubnet

  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref MyS3Bucket

  ComputeEnvironmentArn:
    Description: Compute Environment ARN
    Value: !GetAtt MyComputeEnvironment.Arn

  JobQueueArn:
    Description: Job Queue ARN
    Value: !GetAtt MyJobQueue.Arn

  JobDefinitionArn:
    Description: Job Definition ARN
    Value: !GetAtt MyJobDefinition.Arn