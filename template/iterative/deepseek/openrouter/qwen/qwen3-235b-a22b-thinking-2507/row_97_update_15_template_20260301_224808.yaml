AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless pipeline for AWS Organization data collection, storage, and analysis'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique name for the S3 bucket storing organizational data'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '[a-z0-9][a-z0-9\-]{1,61}[a-z0-9]'
    ConstraintDescription: 'Must be a valid S3 bucket name (alphanumeric, hyphens, 3-63 chars)'
    Default: 'org-data-eval-bucket-12345'

  IncludedTags:
    Type: CommaDelimitedList
    Description: 'Tag keys to include in reports (e.g., Environment,Owner)'
    Default: 'Environment,Owner'

  ManagementAccountId:
    Type: String
    Description: '12-digit AWS account ID of the management account'
    MinLength: 12
    MaxLength: 12
    AllowedPattern: '\d{12}'
    ConstraintDescription: 'Must be a 12-digit AWS account ID'
    Default: '111111111111'

  ManagementAccountOrgRoleName:
    Type: String
    Description: 'Name of IAM role in management account with Organizations read access'
    Default: 'OrganizationReadRole'

  AthenaDatabaseName:
    Type: String
    Description: 'Name for the Athena/Glue database'
    Default: 'managementcur'
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9_]+'
    ConstraintDescription: 'Alphanumeric characters and underscores only'

  LambdaCodeS3Bucket:
    Type: String
    Description: 'EXISTING S3 bucket containing Lambda deployment package (MUST EXIST in the same region as this stack)'
    MinLength: 3
    Default: 'lambda-code-bucket-please-replace'

  LambdaCodeS3Key:
    Type: String
    Description: 'S3 key for Lambda deployment package (ZIP file that MUST EXIST in the specified bucket)'
    MinLength: 1
    Default: 'lambda-function-please-replace.zip'

Resources:
  OrganizationDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OrganizationDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaWrite
            Effect: Allow
            Principal:
              AWS: !GetAtt LambdaExecutionRole.Arn
            Action:
              - s3:PutObject
              - s3:GetBucketLocation
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'
          - Sid: AllowGlueRead
            Effect: Allow
            Principal:
              AWS: !GetAtt GlueCrawlerRole.Arn
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'
          - Sid: DenyUnencryptedUploads
            Effect: Deny
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'AES256'
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/${ManagementAccountOrgRoleName}'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Timeout: 300
      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName
          TAGS_TO_INCLUDE: !Join [',', !Ref IncludedTags]
          MANAGEMENT_ACCOUNT_ROLE_ARN: !Sub 'arn:aws:iam::${ManagementAccountId}:role/${ManagementAccountOrgRoleName}'

  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: 'cron(0 0 ? * SUN *)'
      State: ENABLED
      Targets:
        - Id: OrganizationDataCollectorTarget
          Arn: !GetAtt LambdaFunction.Arn

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: 'lambda:InvokeFunction'
      Principal: 'events.amazonaws.com'
      SourceArn: !GetAtt CloudWatchEventRule.Arn

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueCrawlerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action:
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTable
                  - glue:GetTables
                Resource:
                  - 'arn:aws:glue:*:*:catalog'
                  - !Sub 'arn:aws:glue:*:*:database/${AthenaDatabaseName}'
                  - !Sub 'arn:aws:glue:*:*:table/${AthenaDatabaseName}/*'

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName

  GlueCrawler:
    Type: AWS::Glue::Crawler
    DependsOn: GlueDatabase
    Properties:
      Name: !Sub '${AWS::StackName}-organization-data-crawler'
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/'
      Schedule:
        ScheduleExpression: 'cron(0 3 ? * SUN *)'
      Configuration: '{"Version":1.0,"CrawlerOutput":{"Partitions":{"AddOrUpdateBehavior":"InheritFromTable"}},"Grouping":{"TableGroupingPolicy":"CombineCompatibleSchemas"}}'

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket for organizational data'
    Value: !Ref S3BucketName
    Export:
      Name: !Sub '${AWS::StackName}-S3BucketName'

  LambdaFunctionArn:
    Description: 'ARN of the Lambda function for data collection'
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionArn'

  GlueDatabaseName:
    Description: 'Name of the Glue/Athena database'
    Value: !Ref AthenaDatabaseName
    Export:
      Name: !Sub '${AWS::StackName}-GlueDatabaseName'

  GlueCrawlerName:
    Description: 'Name of the Glue crawler for cataloging'
    Value: !Ref GlueCrawler
    Export:
      Name: !Sub '${AWS::StackName}-GlueCrawlerName'