AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production ready CloudFormation template provisioning a secure API Gateway integrated with SES
  for sending templated emails with request validation, API key enforcement, throttling and quotas.

Resources:
  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailAPI

  SendResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: send
      RestApiId: !Ref EmailApi

  ApiRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: BodyValidator
      RestApiId: !Ref EmailApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  EmailModel:
    Type: AWS::ApiGateway::Model
    Properties:
      ContentType: application/json
      Name: EmailModel
      RestApiId: !Ref EmailApi
      Schema:
        type: object
        required:
          - to
          - from
          - subject
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          html:
            type: string
          text:
            type: string

  ApiGatewayToSESRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayToSESRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendEmailPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"

  SendEmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref SendResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestModels:
        application/json: !Ref EmailModel
      RequestValidatorId: !Ref ApiRequestValidator
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt ApiGatewayToSESRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail"
        RequestTemplates:
          application/json: >
            #set($inputRoot = $input.path('$'))
            Action=SendEmail&
            Source=$util.urlEncode($inputRoot.from)&
            Destination.ToAddresses.member.1=$util.urlEncode($inputRoot.to)&
            Message.Subject.Data=$util.urlEncode($inputRoot.subject)&
            #if($inputRoot.html)
            Message.Body.Html.Data=$util.urlEncode($inputRoot.html)&
            #end
            #if($inputRoot.text)
            Message.Body.Text.Data=$util.urlEncode($inputRoot.text)
            #end
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailApiKey
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: EmailUsagePlan
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: Prod
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref EmailApi
      StageName: Prod
    DependsOn:
      - SendEmailMethod

Outputs:
  RestApiId:
    Description: The ID of the API Gateway REST API.
    Value: !Ref EmailApi
  ApiEndpoint:
    Description: The URL of the deployed API endpoint.
    Value: !Sub "https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/send"