AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AlarmEmail:
    Type: String
    Default: 'xxxxx@gmail.com'
    Description: Email address to receive billing alerts
Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Billing Alerts
  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref AlarmEmail
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic
  BillingAlarm5USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-5USD
      AlarmDescription: Triggers when monthly AWS charges exceed $5
      Namespace: 'AWS/Billing'
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: breaching
  BillingAlarm10USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-10USD
      AlarmDescription: Triggers when monthly AWS charges exceed $10
      Namespace: 'AWS/Billing'
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: breaching
  BillingAlarm20USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-20USD
      AlarmDescription: Triggers when monthly AWS charges exceed $20
      Namespace: 'AWS/Billing'
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: breaching
  BillingAlarm40USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-40USD
      AlarmDescription: Triggers when monthly AWS charges exceed $40
      Namespace: 'AWS/Billing'
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: breaching
Outputs:
  BillingAlarmTopicARN:
    Description: ARN of the SNS topic for billing notifications
    Value: !Ref BillingAlarmTopic