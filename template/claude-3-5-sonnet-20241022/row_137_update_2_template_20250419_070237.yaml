AWSTemplateFormatVersion: '2010-09-09'
Description: 'PetShop GraphQL API with Lambda backend'

Resources:
  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub ${AWS::StackName}-PetShopAPI
      AuthenticationType: API_KEY
      XrayEnabled: true
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  PetShopAPIKey:
    Type: AWS::AppSync::ApiKey
    DependsOn: PetShopAPI
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Description: 'API Key for PetShop GraphQL API'
      Expires: 1735689600

  PetShopSchema:
    Type: AWS::AppSync::GraphQLSchema
    DependsOn: PetShopAPI
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        type Query {
          getPets: [Pet]
        }
        schema {
          query: Query
        }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub ${AWS::StackName}-pet-function
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            try {
              const pets = [
                { id: '1', name: 'Max', type: 'Dog' },
                { id: '2', name: 'Whiskers', type: 'Cat' },
                { id: '3', name: 'Hoppy', type: 'Rabbit' }
              ];
              return pets;
            } catch (error) {
              console.error('Error:', error);
              throw new Error('Internal server error');
            }
          };
      Runtime: nodejs18.x
      MemorySize: 128
      Timeout: 30
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-appsync-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-lambda-invoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt PetLambdaFunction.Arn
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  PetLambdaDataSource:
    Type: AWS::AppSync::DataSource
    DependsOn: 
      - PetShopAPI
      - PetLambdaFunction
      - AppSyncLambdaRole
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: 
      - PetShopSchema
      - PetLambdaDataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        #if($ctx.error)
          $util.error($ctx.error.message, $ctx.error.type)
        #end
        $util.toJson($ctx.result)

Outputs:
  GraphQLApiEndpoint:
    Description: 'GraphQL API Endpoint URL'
    Value: !GetAtt PetShopAPI.GraphQLUrl

  GraphQLApiId:
    Description: 'GraphQL API ID'
    Value: !GetAtt PetShopAPI.ApiId

  GraphQLApiKey:
    Description: 'GraphQL API Key'
    Value: !GetAtt PetShopAPIKey.ApiKey
    Sensitive: true

  LambdaFunctionArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt PetLambdaFunction.Arn