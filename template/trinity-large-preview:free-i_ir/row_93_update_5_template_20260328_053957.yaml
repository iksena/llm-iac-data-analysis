AWSTemplateFormatVersion: '2010-09-09'
Description: Auto-configuring EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager (SSM)

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c55b159cbfafe0f0
    us-east-2:
      AMI: ami-0c55b159cbfafe0f0
    us-west-1:
      AMI: ami-0c55b159cbfafe0f0
    us-west-2:
      AMI: ami-0c55b159cbfafe0f0
    eu-west-1:
      AMI: ami-0c55b159cbfafe0f0
    eu-west-2:
      AMI: ami-0c55b159cbfafe0f0
    eu-central-1:
      AMI: ami-0c55b159cbfafe0f0
    ap-southeast-1:
      AMI: ami-0c55b159cbfafe0f0
    ap-southeast-2:
      AMI: ami-0c55b159cbfafe0f0
    ap-northeast-1:
      AMI: ami-0c55b159cbfafe0f0
    ap-northeast-2:
      AMI: ami-0c55b159cbfafe0f0
    sa-east-1:
      AMI: ami-0c55b159cbfafe0f0
    ca-central-1:
      AMI: ami-0c55b159cbfafe0f0

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub '${S3Bucket.Arn}/*'
    Metadata:
      Effect: ssm-access

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole
    Metadata:
      Effect: ssm-access

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: nginx-logs-bucket
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    Metadata:
      Effect: encrypted, versioned

  SSMInstallNginxDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '1.0'
        description: Install and configure Nginx
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: installNginx
            inputs:
              runCommand:
                - yum update -y
                - yum install -y nginx
                - systemctl start nginx
                - systemctl enable nginx
                - echo "Nginx installed and started" > /var/log/nginx/install.log
                - aws s3 cp /var/log/nginx/install.log s3://nginx-logs-bucket/
    Metadata:
      Effect: auto-config

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      InstanceType: t3.micro
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: NginxInstance
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y nginx
          systemctl start nginx
          systemctl enable nginx
          echo "Nginx installed and started" > /var/log/nginx/install.log
    Metadata:
      Effect: encrypted, monitored

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMInstallNginxDocument
      Targets:
        - Key: tag:InstallNginx
          Values:
            - 'true'
      Parameters: {}
    Metadata:
      Effect: auto-config

  CloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighCPUUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions: []
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
    Metadata:
      Effect: monitored

Metadata:
  Template:
    Description: Auto-configuring EC2 instance with tag-driven Nginx installation and enhanced monitoring using AWS Systems Manager (SSM)
    Invariants:
      - EC2 instance must have SSM permissions
      - Nginx installation must be tag-driven
      - Logs must be centralized in S3
      - Instance must be monitored via CloudWatch
      - S3 bucket must be encrypted and versioned