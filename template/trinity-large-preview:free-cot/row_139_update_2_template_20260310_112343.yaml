AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for custom resource with Lambda arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
    Description: First number for arithmetic operation
  SecondNumber:
    Type: Number
    Default: 5
    Description: Second number for arithmetic operation
  Operator:
    Type: String
    Default: +
    AllowedValues:
      - +
      - -
      - *
      - /
    Description: Arithmetic operator to use
  SimulateFailure:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: Simulate failure for testing purposes

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-ArithmeticFunction
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import cfnresponse
          import json

          def handler(event, context):
              try:
                  print("Received event: " + json.dumps(event))
                  request_type = event['RequestType']
                  properties = event['ResourceProperties']

                  first_number = properties['FirstNumber']
                  second_number = properties['SecondNumber']
                  operator = properties['Operator']
                  simulate_failure = properties.get('SimulateFailure', 'false').lower() == 'true'

                  if simulate_failure:
                      raise ValueError("Simulated failure for testing")

                  if request_type == 'Delete':
                      response_data = {'Message': 'Resource deleted'}
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      return

                  if operator == '+':
                      result = first_number + second_number
                  elif operator == '-':
                      result = first_number - second_number
                  elif operator == '*':
                      result = first_number * second_number
                  elif operator == '/':
                      if second_number == 0:
                          raise ZeroDivisionError("Division by zero is not allowed")
                      result = first_number / second_number
                  else:
                      raise ValueError(f"Unsupported operator: {operator}")

                  response_data = {
                      'Result': result,
                      'Message': f'Calculation successful: {first_number} {operator} {second_number} = {result}'
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  response_data = {'Error': str(e)}
                  print(response_data)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  CustomHelperResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomHelperResource.Result
  CalculationMessage:
    Description: Message from the arithmetic operation
    Value: !GetAtt CustomHelperResource.Message