AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template creating an IAM role for Bedrock service with permissions to invoke models and Lambda functions

Resources:
  BedrockAgentRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'BedrockAgentServiceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'bedrock.amazonaws.com'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'
      ManagedPolicyArns:
        - !Ref BedrockAgentPolicy
        - !Ref BedrockAgentLambdaPolicy

  BedrockAgentPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: 'BedrockAgentPermissions'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Action:
              - 'bedrock:InvokeModel'
              - 'bedrock:InvokeModelWithResponseStream'
              - 'bedrock:ListFoundationModels'
              - 'bedrock:GetFoundationModel'
            Resource: '*'

  BedrockAgentLambdaPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: 'BedrockAgentLambdaPermissions'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Action: 'lambda:InvokeFunction'
            Resource: '*'

Outputs:
  BedrockAgentRoleArn:
    Description: 'ARN of the Bedrock Agent IAM Role'
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockAgentRoleArn'