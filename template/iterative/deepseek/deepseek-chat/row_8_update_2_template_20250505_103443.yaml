AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for CloudWatch Dashboard with NAT Gateway VPC Flow Logs insights'

Parameters:
  DashboardName:
    Description: 'Name for the CloudWatch Dashboard'
    Type: String
    Default: 'NATGatewayFlowLogsDashboard'
  
  LogGroupName:
    Description: 'Name of the VPC Flow Logs log group'
    Type: String
    Default: '/aws/vpc/flowlogs'

Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}'\n| filter interfaceId like 'eni-'\n| stats sum(bytes) as bytesTransferred by srcAddr\n| sort bytesTransferred desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic (Bytes)",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}'\n| filter interfaceId like 'eni-' and action='REJECT'\n| stats count() as rejectedConnections by srcAddr\n| sort rejectedConnections desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connections",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}'\n| filter interfaceId like 'eni-'\n| stats sum(bytes) as bytesTransferred by bin(1h)\n| sort bin(1h) asc",
                "region": "${AWS::Region}",
                "title": "Outbound Traffic Over Time",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}'\n| filter interfaceId like 'eni-' and action='REJECT'\n| stats count() as rejectedConnections by bin(1h)\n| sort bin(1h) asc",
                "region": "${AWS::Region}",
                "title": "Rejected Connections Over Time",
                "view": "timeSeries",
                "stacked": false
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: 'URL to access the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'