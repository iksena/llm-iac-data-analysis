AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region application failover architecture using Amazon Route 53 Application Recovery Controller (ARC)'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS region for the application
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1

  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS region for the application
    AllowedValues:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - eu-west-1
      - eu-central-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1

  PrimaryEndpointHost:
    Type: String
    Description: Hostname for the primary region application (without protocol)
    Default: primary-region.example.com

  PrimaryEndpointPath:
    Type: String
    Description: Path for the primary region health check
    Default: /health

  SecondaryEndpointHost:
    Type: String
    Description: Hostname for the secondary region application (without protocol)
    Default: secondary-region.example.com

  SecondaryEndpointPath:
    Type: String
    Description: Path for the secondary region health check
    Default: /health

  HealthCheckInterval:
    Type: Number
    Description: Interval between health checks in seconds
    Default: 30
    AllowedValues: [10, 30, 60, 300]

  HealthCheckThreshold:
    Type: Number
    Description: Number of consecutive failed checks to trigger failover
    Default: 3
    MinValue: 1
    MaxValue: 10

Resources:
  # Recovery Cluster
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: MultiRegionAppCluster

  # Control Panel
  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: MultiRegionAppControlPanel
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  # Routing Control for Primary Region
  PrimaryRegionRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub "${PrimaryRegion}RoutingControl"
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  # Routing Control for Secondary Region
  SecondaryRegionRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub "${SecondaryRegion}RoutingControl"
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  # Safety Rule to ensure at least one region is active
  AtLeastOneActiveRegionSafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: AtLeastOneActiveRegionRule
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      RuleConfig:
        Type: ATLEAST
        Threshold: 1
        Inverted: false
        WaitPeriodMs: 5000
      Status: DEPLOYED

  # Health Check for Primary Region
  PrimaryRegionHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref PrimaryEndpointHost
        Port: 443
        ResourcePath: !Ref PrimaryEndpointPath
        RequestInterval: !Ref HealthCheckInterval
        FailureThreshold: !Ref HealthCheckThreshold
        MeasureLatency: true
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub "PrimaryRegion-${PrimaryRegion}-HealthCheck"

  # Health Check for Secondary Region
  SecondaryRegionHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref SecondaryEndpointHost
        Port: 443
        ResourcePath: !Ref SecondaryEndpointPath
        RequestInterval: !Ref HealthCheckInterval
        FailureThreshold: !Ref HealthCheckThreshold
        MeasureLatency: true
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub "SecondaryRegion-${SecondaryRegion}-HealthCheck"

  # CloudWatch Alarm for Primary Region Health Check
  PrimaryRegionHealthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "PrimaryRegion-${PrimaryRegion}-HealthAlarm"
      AlarmDescription: !Sub "Alarm when primary region ${PrimaryRegion} is unhealthy"
      MetricName: HealthCheckStatus
      Namespace: AWS/Route53
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: HealthCheckId
          Value: !GetAtt PrimaryRegionHealthCheck.HealthCheckId
      TreatMissingData: breaching

  # CloudWatch Alarm for Secondary Region Health Check
  SecondaryRegionHealthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "SecondaryRegion-${SecondaryRegion}-HealthAlarm"
      AlarmDescription: !Sub "Alarm when secondary region ${SecondaryRegion} is unhealthy"
      MetricName: HealthCheckStatus
      Namespace: AWS/Route53
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: HealthCheckId
          Value: !GetAtt SecondaryRegionHealthCheck.HealthCheckId
      TreatMissingData: breaching

Outputs:
  RecoveryClusterArn:
    Description: ARN of the Recovery Cluster
    Value: !GetAtt RecoveryCluster.ClusterArn

  ControlPanelArn:
    Description: ARN of the Control Panel
    Value: !GetAtt ControlPanel.ControlPanelArn

  PrimaryRegionRoutingControlArn:
    Description: ARN of the Primary Region Routing Control
    Value: !GetAtt PrimaryRegionRoutingControl.RoutingControlArn

  SecondaryRegionRoutingControlArn:
    Description: ARN of the Secondary Region Routing Control
    Value: !GetAtt SecondaryRegionRoutingControl.RoutingControlArn

  PrimaryRegionHealthCheckId:
    Description: ID of the Primary Region Health Check
    Value: !GetAtt PrimaryRegionHealthCheck.HealthCheckId

  SecondaryRegionHealthCheckId:
    Description: ID of the Secondary Region Health Check
    Value: !GetAtt SecondaryRegionHealthCheck.HealthCheckId

  SafetyRuleArn:
    Description: ARN of the Safety Rule
    Value: !GetAtt AtLeastOneActiveRegionSafetyRule.SafetyRuleArn