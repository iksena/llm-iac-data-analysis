AWSTemplateFormatVersion: '2010-09-09'
Description: Enables AWS Security Hub with default standards and consolidated control findings
Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
  SecurityHubCISStandard:
    Type: AWS::SecurityHub::Standard
    Properties:
      HubArn: !Ref SecurityHubHub
      StandardsArn: 'arn:aws:securityhub:::standard/cis-aws-foundations-benchmark/v/1.2.0'
  SecurityHubAWSStandard:
    Type: AWS::SecurityHub::Standard
    Properties:
      HubArn: !Ref SecurityHubHub
      StandardsArn: 'arn:aws:securityhub:::standard/aws-foundational-security-best-practices/v/1.0.0'
  SecurityHubOrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    Properties:
      AutoEnable: true
Outputs:
  HubArn:
    Description: ARN of the Security Hub resource
    Value: !GetAtt SecurityHubHub.ARN
  OrganizationConfigStatus:
    Description: Status of organization-wide findings consolidation
    Value: 'Enabled'