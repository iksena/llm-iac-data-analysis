AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with Monitoring and Automated Backups'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be created
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for EFS mount targets
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: EFS throughput mode
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 0
    Description: Provisioned throughput in MiB/s (0 if using bursting mode)
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON expression for backup schedule
  BackupRetentionPeriod:
    Type: Number
    Default: 30
    Description: Number of days to retain backups
  CpuUtilizationThreshold:
    Type: Number
    Default: 80
    Description: CPU utilization threshold for CloudWatch alarm
  BurstCreditBalanceThreshold:
    Type: Number
    Default: 20000000000
    Description: Burst credit balance threshold for CloudWatch alarm
  PercentIOLimitThreshold:
    Type: Number
    Default: 90
    Description: Percent IO limit threshold for CloudWatch alarm

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref "AWS::NoValue"]
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  CpuUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if CPU utilization exceeds threshold
      MetricName: CPUUtilization
      Namespace: AWS/EBS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref CpuUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if burst credit balance is too low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref BurstCreditBalanceThreshold
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if percent IO limit is too high
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref PercentIOLimitThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlanName: EFSBackupPlan
      Rules:
        - RuleName: DailyBackup
          TargetBackupVault: !Ref BackupVault
          ScheduleExpression: !Ref BackupSchedule
          StartWindowMinutes: 60
          CompletionWindowMinutes: 180
          Lifecycle:
            DeleteAfterDays: !Ref BackupRetentionPeriod
          BackupPlanRule: !Ref "AWS::NoValue"

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: EFSBackupVault

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EfsFileSystem}'
      BackupPlanId: !Ref BackupPlan

  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

Conditions:
  IsProvisionedThroughput: !Not [!Equals [!Ref ProvisionedThroughputInMibps, 0]]

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !Sub '${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com'
  AlarmTopicArn:
    Description: SNS Topic ARN for Alarms
    Value: !Ref AlarmTopic