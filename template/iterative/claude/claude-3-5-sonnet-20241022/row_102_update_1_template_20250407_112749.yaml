AWSTemplateFormatVersion: '2010-09-09'
Description: 'Risk Management System with Lambda, DynamoDB, and SNS integration'

Parameters:
  EnvironmentStage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment stage for the deployment
  
  TableNamePrefix:
    Type: String
    Default: risk-management
    Description: Prefix for the DynamoDB table name

  TopicName:
    Type: String
    Default: risk-alerts
    Description: Name for the SNS topic

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TableNamePrefix}-${EnvironmentStage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${TopicName}-${EnvironmentStage}
      DisplayName: Risk Management Notifications

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource: !GetAtt RiskManagementTable.Arn
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref RiskNotificationTopic

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub risk-assessment-${EnvironmentStage}
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Function implementation
            return { statusCode: 200, body: 'Success' };
          }
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          TOPIC_ARN: !Ref RiskNotificationTopic
          ENVIRONMENT: !Ref EnvironmentStage

  RiskMonitoringFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub risk-monitoring-${EnvironmentStage}
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // Function implementation
            return { statusCode: 200, body: 'Success' };
          }
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          TOPIC_ARN: !Ref RiskNotificationTopic
          ENVIRONMENT: !Ref EnvironmentStage

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref RiskManagementTable

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt RiskManagementTable.Arn

  TopicArn:
    Description: ARN of the SNS topic
    Value: !Ref RiskNotificationTopic

  AssessmentFunctionArn:
    Description: ARN of the Risk Assessment Lambda function
    Value: !GetAtt RiskAssessmentFunction.Arn

  MonitoringFunctionArn:
    Description: ARN of the Risk Monitoring Lambda function
    Value: !GetAtt RiskMonitoringFunction.Arn