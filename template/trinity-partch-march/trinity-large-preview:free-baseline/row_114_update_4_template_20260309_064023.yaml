AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Business Contact"
    Description: Name of the business contact person
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: Email address of the business contact person
  BusinessContactPhone:
    Type: String
    Default: "+1234567890"
    Description: Phone number of the business contact person

Resources:
  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-Lambda-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EDI-Transformer"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          s3 = boto3.client('s3')

          def handler(event, context):
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = event['Records'][0]['s3']['object']['key']

              obj = s3.get_object(Bucket=bucket, Key=key)
              edi_content = obj['Body'].read().decode('utf-8')

              # Simple EDI to JSON transformation logic
              json_data = {
                  "documentType": "X12_214",
                  "originalContent": edi_content,
                  "transformed": True
              }

              output_bucket = os.environ['OUTPUT_BUCKET']
              output_key = key.replace('.edi', '.json')

              s3.put_object(
                  Bucket=output_bucket,
                  Key=output_key,
                  Body=json.dumps(json_data),
                  ContentType='application/json'
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation successful')
              }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InputS3Bucket.Arn
      SourceAccount: !Ref "AWS::AccountId"

  InputBucketNotification:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .edi
            Function: !GetAtt LambdaFunction.Arn
      DependsOn:
        - LambdaInvokePermission

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt LambdaExecutionRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub "${OutputS3Bucket.Arn}/*"

  LambdaEnvironment:
    Type: AWS::Lambda::Function
    Properties:
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputS3Bucket
      FunctionName: !Ref LambdaFunction

Outputs:
  InputS3BucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputS3Bucket
  OutputS3BucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputS3Bucket
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction