AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SSM-WebServer-VPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SSM-WebServer-IGW
  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ssm-logs-${AWS::StackName}'
      VersioningConfiguration:
        Status: Enabled
  SSMAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub '${S3Bucket.Arn}/*'
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt SSMAutomationRole.Arn
            Action: s3:PutObject
            Resource: !Sub '${S3Bucket.Arn}/*'
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Nginx web server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          echo "SSM Agent pre-installed on Amazon Linux 2"
  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        Fn::Sub:
          - |
            schemaVersion: '0.3'
            description: 'Performs OS updates, Nginx installation, and validation'
            assumeRole: '${RoleArn}'
            mainSteps:
              - name: updateOS
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{source.instanceId}}'
                  Parameters:
                    commands:
                      - 'sudo yum update -y'
              - name: rebootInstance
                action: 'aws:rebootInstance'
                inputs:
                  InstanceIds:
                    - '{{source.instanceId}}'
                  RebootOption: 'Reboot'
                  TimeoutSeconds: '600'
              - name: installNginx
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{source.instanceId}}'
                  Parameters:
                    commands:
                      - 'sudo yum install -y nginx'
                      - 'sudo systemctl start nginx'
              - name: validateNginx
                action: 'aws:runCommand'
                inputs:
                  DocumentName: AWS-RunShellScript
                  InstanceIds:
                    - '{{source.instanceId}}'
                  Parameters:
                    commands:
                      - 'until curl -f http://localhost; do sleep 5; done'
          - RoleArn: !GetAtt SSMAutomationRole.Arn
  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref S3Bucket
          OutputS3KeyPrefix: automation-logs
Outputs:
  InstanceId:
    Description: EC2 instance identifier
    Value: !Ref EC2Instance
  S3BucketName:
    Description: S3 bucket for automation logs
    Value: !Ref S3Bucket
  SSMAutomationDocumentName:
    Description: SSM Automation document name
    Value: !Ref SSMAutomationDocument
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName