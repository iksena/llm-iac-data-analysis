AWSTemplateFormatVersion: '2010-09-09'
Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::AccountId}-firehose-test'
        Prefix: 'firehose/'
        ErrorOutputPrefix: 'errors/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
                - ParameterName: LambdaArn
                  ParameterValue: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:firehose-processor'
        RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/firehose-role'

Outputs:
  FirehoseStreamARN:
    Description: Firehose Delivery Stream ARN
    Value: !GetAtt FirehoseDeliveryStream.Arn
  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref FirehoseLogGroup