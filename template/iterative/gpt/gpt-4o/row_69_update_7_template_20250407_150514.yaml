AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC, Security Group, S3 Bucket, and DynamoDB Table with deletion protection.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.
  S3BucketName:
    Type: String
    Description: Globally unique name of the S3 bucket.
    AllowedPattern: '^[a-z0-9.-]+$'
    ConstraintDescription: Must be a valid S3 bucket name.
    Default: !Sub '${AWS::StackName}-s3bucket'
  DynamoDBTableName:
    Type: String
    Description: Name of the DynamoDB table.
    Default: !Sub '${AWS::StackName}-dynamodb-table'

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for my application
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MySecurityGroup

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: MyS3Bucket

  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      DeletionProtectionEnabled: true
      Tags:
        - Key: Name
          Value: MyDynamoDBTable

Outputs:
  VPCId:
    Description: The ID of the VPC
    Value: !Ref MyVPC
  SecurityGroupId:
    Description: The ID of the Security Group
    Value: !Ref MySecurityGroup
  S3BucketName:
    Description: The name of the S3 Bucket
    Value: !Ref MyS3Bucket
  DynamoDBTableName:
    Description: The name of the DynamoDB Table
    Value: !Ref MyDynamoDBTable