AWSTemplateFormatVersion: '2010-09-09'
Description: Enables AWS GuardDuty detector for EC2 security monitoring
Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: SIX_HOURS
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: Frequency for publishing findings
Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
Outputs:
  DetectorId:
    Description: The ID of the GuardDuty Detector
    Value: !Ref GuardDutyDetector