AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join
        - ''
        - - 'ssm-execution-logs-'
          - !Select [0, !Split ['-', !Ref AWS::StackName]]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${LogBucket}/ssm/*'

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EC2LogUpload
            Effect: Allow
            Principal:
              AWS: !GetAtt EC2InstanceRole.Arn
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${LogBucket}/ssm/*'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:StartAssociationsOnce
                Resource: '*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: HelloWorld-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: HelloWorld-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: HelloWorld-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: HelloWorld-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LinuxEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: t3.micro
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'
        - Key: Name
          Value: HelloWorld-Linux

  WindowsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base}}'
      InstanceType: t3.micro
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'
        - Key: Name
          Value: HelloWorld-Windows

  HelloWorldSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '2.2'
        description: Cross-platform Hello World script
        parameters: {}
        runtimeConfig:
          'aws:runShellScript':
            properties:
              - id: '0.aws:runShellScript'
                runCommand:
                  - "echo 'Hello World!'"
          'aws:runPowerShellScript':
            properties:
              - id: '0.aws:runPowerShellScript'
                runCommand:
                  - "Write-Output 'Hello World!'"
      DocumentType: Command

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldSSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub 'HelloWorldSchedule-${AWS::StackName}'
      ScheduleExpression: 'rate(15 minutes)'
      Target:
        Arn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:*'
        RoleArn: !GetAtt EventBridgeRole.Arn
        Input: !Sub '{"AssociationIds": ["${SSMAssociation}"]}'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
Outputs:
  LinuxInstanceId:
    Description: ID of the Linux EC2 instance
    Value: !Ref LinuxEC2Instance
  WindowsInstanceId:
    Description: ID of the Windows EC2 instance
    Value: !Ref WindowsEC2Instance
  LogBucketName:
    Description: Name of the S3 bucket for execution logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of the EventBridge schedule
    Value: !GetAtt EventBridgeSchedule.Arn
  EventBridgeRoleName:
    Description: Name of the EventBridge IAM role
    Value: !Ref EventBridgeRole