AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an API Gateway integrated with an SQS queue for HTTP-based message retrieval'

Parameters:
  QueueName:
    Type: String
    Default: 'api-gateway-sqs-queue'
    Description: Name of the SQS queue
  
  ApiName:
    Type: String
    Default: 'sqs-api'
    Description: Name of the API Gateway
  
  StageName:
    Type: String
    Default: 'prod'
    Description: Name of the API Gateway stage

Resources:
  # SQS Queue
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600  # 4 days
      
  # SQS Queue Policy to allow API Gateway to access it
  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'
  
  # IAM Role for API Gateway
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
  
  # IAM Policy for API Gateway to access SQS
  ApiGatewaySQSPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ApiGatewaySQSPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'sqs:ReceiveMessage'
              - 'sqs:GetQueueAttributes'
              - 'sqs:GetQueueUrl'
            Resource: !GetAtt SQSQueue.Arn
      Roles:
        - !Ref ApiGatewayRole
  
  # API Gateway REST API
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: 'API Gateway for SQS integration'
      EndpointConfiguration:
        Types:
          - REGIONAL
  
  # API Gateway Resource for messages
  MessagesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'messages'
  
  # API Gateway GET Method
  GetMessagesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref MessagesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestParameters:
          integration.request.querystring.MaxNumberOfMessages: 'method.request.querystring.maxMessages'
          integration.request.querystring.VisibilityTimeout: 'method.request.querystring.visibilityTimeout'
          integration.request.querystring.WaitTimeSeconds: 'method.request.querystring.waitTimeSeconds'
        RequestTemplates:
          application/json: |
            Action=ReceiveMessage
            #if($input.params('maxMessages') != "")
            &MaxNumberOfMessages=$input.params('maxMessages')
            #else
            &MaxNumberOfMessages=1
            #end
            #if($input.params('visibilityTimeout') != "")
            &VisibilityTimeout=$input.params('visibilityTimeout')
            #end
            #if($input.params('waitTimeSeconds') != "")
            &WaitTimeSeconds=$input.params('waitTimeSeconds')
            #end
            &AttributeName=All
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "messages": [
                    #foreach($message in $inputRoot.ReceiveMessageResponse.ReceiveMessageResult.Message)
                    {
                      "messageId": "$message.MessageId",
                      "receiptHandle": "$message.ReceiptHandle",
                      "body": "$util.escapeJavaScript($message.Body)",
                      "md5OfBody": "$message.MD5OfBody",
                      "attributes": {
                        #foreach($entry in $message.Attribute.entry)
                        "$entry.Name": "$entry.Value"#if($foreach.hasNext),#end
                        #end
                      }
                    }#if($foreach.hasNext),#end
                    #end
                  ]
                }
      RequestParameters:
        method.request.querystring.maxMessages: false
        method.request.querystring.visibilityTimeout: false
        method.request.querystring.waitTimeSeconds: false
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
  
  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetMessagesMethod
    Properties:
      RestApiId: !Ref ApiGateway
      Description: 'Deployment for SQS API'
  
  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      Description: 'Stage for SQS API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

Outputs:
  QueueURL:
    Description: 'URL of the SQS queue'
    Value: !Ref SQSQueue
  
  QueueARN:
    Description: 'ARN of the SQS queue'
    Value: !GetAtt SQSQueue.Arn
  
  ApiEndpoint:
    Description: 'URL of the API Gateway endpoint'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/messages'