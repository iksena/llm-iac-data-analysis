AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API Gateway with Lambda non-proxy integration.
Resources:
  MyLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://your-s3-bucket/lambda-code.zip
      Policies:
        - AWSLambdaBasicExecutionRole
  MyApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      DefinitionBody:
        openapi: 3.0.1
        info:
          title: MyApi
          version: v1
        paths:
          /hello:
            get:
              x-amazon-apigateway-integration:
                integrationSubtype: aws_proxy
                integrationType: aws_proxy
                integrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MyLambdaFunction.Arn}/invocations
                credentials: !GetAtt MyApiGateway.Arn
        components:
          securitySchemes:
            ApiKeyAuth:
              type: apiKey
              in: header
              name: x-api-key
        security:
          - ApiKeyAuth: []
      DefinitionUri: !Sub https://s3.amazonaws.com/${AWS::Region}/${YourS3Bucket}/api-gateway-definition.yaml
  MyApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MyApiKey
      Enabled: true


Outputs:
  ApiEndpoint:
    Value: !Sub https://${MyApiGateway.RestApiId}.execute-api.${AWS::Region}.amazonaws.com/prod
    Description: API Gateway Endpoint
  LambdaArn:
    Value: !Ref MyLambdaFunction
    Description: Lambda Function ARN
  ApiKey:
    Value: !Ref MyApiKey
    Description: API Key

