AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for creating a secure Amazon Cognito User Pool with admin-controlled provisioning and email authentication

Parameters:
  UserPoolName:
    Type: String
    Description: Name for the Cognito User Pool
    Default: AdminManagedUserPool
  EmailSender:
    Type: String
    Description: Email address for sending verification emails
    Default: no-reply@example.com
  AutoVerifiedAttributes:
    Type: CommaDelimitedList
    Description: Attributes to automatically verify
    Default: email

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes: !Ref AutoVerifiedAttributes
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        From: !Ref EmailSender
        SourceArn: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${EmailSender}
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UsernameAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: 'Your verification code is {####}'
        EmailSubject: 'Your verification code'

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AdminClient
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${UserPoolName}-domain
      UserPoolId: !Ref CognitoUserPool

Outputs:
  UserPoolId:
    Description: ID of the created Cognito User Pool
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId
  UserPoolClientId:
    Description: ID of the admin client
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId
  UserPoolDomain:
    Description: Domain for the Cognito hosted UI
    Value: !GetAtt UserPoolDomain.Domain
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolDomain