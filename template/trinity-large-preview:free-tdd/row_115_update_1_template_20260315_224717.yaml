AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecretsManagerAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        - Protocol: email
          Endpoint: example@example.com

  SecretsManagerAlertRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        "detail-type":
          - AWS API Call via CloudTrail
      Targets:
        - Arn: !Ref SecretsManagerAlertTopic
          Id: SecretsManagerAlertTarget

Outputs:
  TopicArn:
    Value: !Ref SecretsManagerAlertTopic