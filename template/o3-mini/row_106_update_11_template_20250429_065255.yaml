AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates an S3 bucket with event-driven notifications
  to an SNS topic. When new objects are uploaded to the S3 bucket, an event is triggered and sent
  to the SNS topic. A Lambda-backed custom resource is used to update the bucket notification configuration
  after the S3 bucket, SNS topic, and SNS topic policy are in place.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Event Notification Topic"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowS3Publish"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "sns:Publish"
            Resource: !GetAtt SNSTopic.TopicArn
            Condition:
              ArnLike:
                aws:SourceArn: 
                  Fn::Sub: "arn:aws:s3:::${S3Bucket}"
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties: {}

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: LambdaS3NotificationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:PutBucketNotificationConfiguration
                Resource: !Sub "arn:aws:s3:::${S3Bucket}"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      bucket = event['ResourceProperties']['BucketName']
                      topicArn = event['ResourceProperties']['SNSTopicArn']
                      configuration = {
                          'TopicConfigurations': [
                              {
                                  'TopicArn': topicArn,
                                  'Events': ['s3:ObjectCreated:*']
                              }
                          ]
                      }
                      s3.put_bucket_notification_configuration(Bucket=bucket, NotificationConfiguration=configuration)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Message': str(e)})

  BucketNotification:
    Type: Custom::BucketNotification
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      BucketName: !Ref S3Bucket
      SNSTopicArn: !GetAtt SNSTopic.TopicArn
    DependsOn:
      - SNSTopicPolicy

Outputs:
  SNSTopicARN:
    Description: "SNS Topic ARN for S3 notifications"
    Value: !GetAtt SNSTopic.TopicArn
  S3BucketName:
    Description: "S3 Bucket Name"
    Value: !Ref S3Bucket