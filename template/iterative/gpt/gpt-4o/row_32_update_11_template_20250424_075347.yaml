AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a sample AWS Lambda function with inline code.

Parameters:
  FunctionName:
    Type: String
    Description: The name of the Lambda function.
    Default: SampleLambdaFunction
  Runtime:
    Type: String
    Description: The runtime environment for the Lambda function.
    Default: python3.8
    AllowedValues:
      - nodejs14.x
      - python3.8
      - python3.9
  Handler:
    Type: String
    Description: The function within your code that Lambda calls to begin execution.
    Default: index.handler

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  SampleLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref FunctionName
      Runtime: !Ref Runtime
      Handler: !Ref Handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              print("Hello, World!")
              return "Hello, World!"

Outputs:
  LambdaFunctionARN:
    Description: The ARN of the Lambda function
    Value: !GetAtt SampleLambdaFunction.Arn
  LambdaFunctionName:
    Description: The name of the Lambda function
    Value: !Ref SampleLambdaFunction