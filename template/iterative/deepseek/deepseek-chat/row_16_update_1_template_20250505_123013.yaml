AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS Glue resources to crawl CloudTrail logs in S3'

Resources:
  GlueDatabase:
    Type: 'AWS::Glue::Database'
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: 'cloudtrail_logs_db'
        Description: 'Database for CloudTrail logs metadata'

  GlueCrawlerRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'glue.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/'
      Policies:
        - PolicyName: 'GlueCrawlerPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                Resource: 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*'
              - Effect: 'Allow'
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: 'Allow'
                Action:
                  - 'glue:GetDatabase'
                  - 'glue:GetTable'
                  - 'glue:CreateTable'
                  - 'glue:UpdateTable'
                  - 'glue:GetPartition'
                  - 'glue:GetPartitions'
                  - 'glue:CreatePartition'
                  - 'glue:UpdatePartition'
                  - 'glue:BatchCreatePartition'
                Resource: '*'

  GlueCrawler:
    Type: 'AWS::Glue::Crawler'
    Properties:
      Name: 'cloudtrail_logs_crawler'
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref GlueDatabase
      Description: 'Crawler for CloudTrail logs in S3'
      Targets:
        S3Targets:
          - Path: 's3://kk-admin/cloud-trail/AWSLogs/'
      TablePrefix: 'cloudtrail_'
      SchemaChangePolicy:
        UpdateBehavior: 'UPDATE_IN_DATABASE'
        DeleteBehavior: 'DEPRECATE_IN_DATABASE'
      Configuration: '{
        "Version": 1.0,
        "CrawlerOutput": {
          "Partitions": {
            "AddOrUpdateBehavior": "InheritFromTable"
          }
        }
      }'

Outputs:
  DatabaseName:
    Description: 'Name of the Glue Database created'
    Value: !Ref GlueDatabase
  CrawlerName:
    Description: 'Name of the Glue Crawler created'
    Value: !Ref GlueCrawler
  CrawlerRoleARN:
    Description: 'ARN of the IAM Role for the Glue Crawler'
    Value: !GetAtt GlueCrawlerRole.Arn