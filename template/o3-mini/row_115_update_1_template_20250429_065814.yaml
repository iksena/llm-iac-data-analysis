AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an automated monitoring and alerting system for AWS Secrets Manager activities.
  The template provisions an EventBridge rule to detect Secrets Manager API calls and routes these events to an SNS topic for email notifications.

Parameters:
  NotificationEmail:
    Description: "Email address to receive alert notifications for critical Secrets Manager events."
    Type: String
    ConstraintDescription: "Must be a valid email address."

Resources:
  SecretsManagerAlertsSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "SecretsManager Alerts Topic"
      TopicName: "SecretsManagerAlertsTopic"

  SecretsManagerAlertsSNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref SecretsManagerAlertsSNSTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "SecretsManagerCriticalEventsRule"
      Description: "EventBridge rule to capture Secrets Manager critical lifecycle events and route them to SNS."
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - CreateSecret
            - UpdateSecret
            - DeleteSecret
            - RotateSecret
      State: "ENABLED"
      Targets:
        - Id: "SNSTopicTarget"
          Arn: !Ref SecretsManagerAlertsSNSTopic

Outputs:
  SNSTopicARN:
    Description: "ARN of the SNS topic for Secrets Manager alerts."
    Value: !Ref SecretsManagerAlertsSNSTopic