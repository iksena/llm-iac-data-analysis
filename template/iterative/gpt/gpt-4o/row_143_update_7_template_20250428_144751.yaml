AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  WebsiteBucketName:
    Description: The name of the S3 bucket to host the static website
    Type: String
    Default: !Sub '${AWS::StackName}-website-bucket'
    AllowedPattern: '^[a-z0-9.-]+$'
    ConstraintDescription: Must be a valid S3 bucket name.

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: Access Identity for S3 bucket

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity/${CloudFrontOAI}
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${WebsiteBucketName}/*

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: 
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        PriceClass: PriceClass_100

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${WebsiteBucketName}/*

  PopulateS3BucketFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              response_data = {}
              try:
                  bucket_name = os.environ['BUCKET_NAME']
                  if event['RequestType'] == 'Create':
                      s3.put_object(Bucket=bucket_name, Key='index.html', Body='<html><body><h1>Welcome to the Static Website</h1></body></html>', ContentType='text/html')
                  elif event['RequestType'] == 'Delete':
                      s3.delete_object(Bucket=bucket_name, Key='index.html')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

      Runtime: python3.12
      Environment:
        Variables:
          BUCKET_NAME: !Ref WebsiteBucketName

  CustomResource:
    Type: Custom::PopulateS3Bucket
    Properties:
      ServiceToken: !GetAtt PopulateS3BucketFunction.Arn

Outputs:
  CloudFrontDistributionDomainName:
    Description: The domain name of the CloudFront distribution
    Value: !GetAtt CloudFrontDistribution.DomainName

  S3BucketName:
    Description: The name of the S3 bucket hosting the static website
    Value: !Ref WebsiteBucketName