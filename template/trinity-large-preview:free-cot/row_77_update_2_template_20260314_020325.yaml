AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create environment-specific DynamoDB tables for supporter product data

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

Conditions:
  IsProduction: !Equals [!Ref Stage, "PROD"]
  IsCode: !Equals [!Ref Stage, "CODE"]

Resources:
  SupporterProductDataPROD:
    Type: AWS::DynamoDB::Table
    Condition: IsProduction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "SupporterProductData-${Stage}"
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 20
        WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Backup
          Value: "true"

  SupporterProductDataCODE:
    Type: AWS::DynamoDB::Table
    Condition: IsCode
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "SupporterProductData-${Stage}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Backup
          Value: "true"

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProduction
    Properties:
      MinCapacity: 5
      MaxCapacity: 500
      ResourceId: !Sub "table/${SupporterProductDataPROD}"
      ScalableDimension: "dynamodb:table:WriteCapacityUnits"
      ServiceNamespace: "dynamodb"
      RoleARN: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/aws-service-role/dynamodb.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_DynamoDBTable"

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProduction
    Properties:
      PolicyName: WriteCapacityAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Outputs:
  PRODTableName:
    Condition: IsProduction
    Value: !Ref SupporterProductDataPROD
    Description: Name of the PROD DynamoDB table
  CODETableName:
    Condition: IsCode
    Value: !Ref SupporterProductDataCODE
    Description: Name of the CODE DynamoDB table