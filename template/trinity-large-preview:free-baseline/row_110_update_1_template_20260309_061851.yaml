AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a cross-account private API Gateway with Lambda backend and custom domain.

Parameters:
  VpcEndpointId:
    Type: String
    Description: The VPC endpoint ID that can access the private API Gateway
    Default: vpce-1234567890abcdef0
  DomainName:
    Type: String
    Description: The custom domain name for the API Gateway
    Default: api.example.com
  CertificateArn:
    Type: String
    Description: The ARN of the ACM certificate for the custom domain
    Default: arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012
  StageName:
    Type: String
    Description: The stage name for the API Gateway deployment
    Default: prod

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: python3.12
      Timeout: 10

  CustomDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref DomainName
      CertificateArn: !Ref CertificateArn

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PrivateAPIGateway
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'arn:aws:execute-api:*:*:*'
            Condition:
              StringEquals:
                aws:sourceVpce: !Ref VpcEndpointId

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: '{proxy+}'

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt LambdaFunction.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: !Ref StageName

  ApiGatewayVpcEndpointPolicy:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayId}/*/*/*
          ApiGatewayId: !Ref ApiGatewayRestApi

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: !Ref StageName

Outputs:
  ApiUrl:
    Description: The URL of the deployed API
    Value: !Sub
      - https://${DomainName}/${StageName}
      - DomainName: !Ref CustomDomainName
        StageName: !Ref StageName
  LambdaArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  ApiGatewayId:
    Description: The ID of the API Gateway
    Value: !Ref ApiGatewayRestApi