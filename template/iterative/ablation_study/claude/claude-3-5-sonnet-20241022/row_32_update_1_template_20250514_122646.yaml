AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating a sample Lambda function'

Parameters:
  LambdaRuntime:
    Type: String
    Default: python3.9
    Description: Runtime for Lambda function
    AllowedValues:
      - python3.9
      - nodejs18.x
      - java11
  
  LambdaMemorySize:
    Type: Number
    Default: 128
    Description: Memory size for Lambda function
    MinValue: 128
    MaxValue: 10240
    
  LambdaTimeout:
    Type: Number
    Default: 3
    Description: Timeout for Lambda function
    MinValue: 1
    MaxValue: 900

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: "/"

  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub ${AWS::StackName}-sample-function
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          STACK_NAME: !Ref AWS::StackName
      Tags:
        - Key: CreatedBy
          Value: CloudFormation

  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref LambdaFunction

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-lambda-arn

  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub ${AWS::StackName}-lambda-name

  LambdaFunctionUrl:
    Description: URL of the Lambda function
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl
    Export:
      Name: !Sub ${AWS::StackName}-lambda-url