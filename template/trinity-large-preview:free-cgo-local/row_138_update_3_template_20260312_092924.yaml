AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with S3, DynamoDB, and EC2

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'webapp-assets-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceCategory
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceCategory
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WebAppSG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0c55b159cbfafe1f0
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd php php-cli php-common php-mbstring php-xml php-json php-zip php-curl php-gd php-intl php-mcrypt php-pear php-soap php-xmlrpc php-zip php-devel php-pecl-apcu php-pecl-apcu-bc php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-devel php-pecl-ap