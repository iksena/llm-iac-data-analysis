AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for VPC Flow Logs with lifecycle management and security controls'

Parameters:
  BucketName:
    Type: String
    Description: '(Optional) Name for the S3 bucket. Leave blank for auto-generated name.'
    Default: ''
    MaxLength: 63
    AllowedPattern: '^$|(?!^(\d{1,3}\.){3}\d{1,3}$)(^[a-z0-9][-a-z0-9]*[a-z0-9]$)'
    ConstraintDescription: 'Bucket name must be lowercase, contain only numbers, letters, and hyphens, and cannot be an IP address format'

  EnableVersioning:
    Type: String
    Description: 'Enable versioning for the S3 bucket'
    Default: 'Yes'
    AllowedValues:
      - 'Yes'
      - 'No'

  TransitionToDaysGlacier:
    Type: Number
    Description: 'Number of days before transitioning objects to Glacier'
    Default: 30
    MinValue: 1
    MaxValue: 365

  RetentionInDays:
    Type: Number
    Description: 'Number of days to retain objects before deletion'
    Default: 365000
    MinValue: 1
    MaxValue: 365000

  Environment:
    Type: String
    Description: 'Environment tag for the bucket'
    Default: 'Production'
    AllowedValues:
      - 'Development'
      - 'Staging'
      - 'Production'

Resources:
  FlowLogsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If 
        - HasBucketName
        - !Ref BucketName
        - !Ref 'AWS::NoValue'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      VersioningConfiguration:
        Status: !If 
          - IsVersioningEnabled
          - 'Enabled'
          - 'Suspended'
      LifecycleConfiguration:
        Rules:
          - Id: 'TransitionToGlacierAndExpire'
            Status: 'Enabled'
            Transitions:
              - StorageClass: 'GLACIER'
                TransitionInDays: !Ref TransitionToDaysGlacier
            ExpirationInDays: !Ref RetentionInDays
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: 'Environment'
          Value: !Ref Environment
        - Key: 'Purpose'
          Value: 'VPC Flow Logs'

  FlowLogsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'AWSLogDeliveryWrite'
            Effect: 'Allow'
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action: 's3:PutObject'
            Resource: !Sub '${FlowLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Sid: 'AWSLogDeliveryAclCheck'
            Effect: 'Allow'
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action: 's3:GetBucketAcl'
            Resource: !GetAtt FlowLogsBucket.Arn

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]
  IsVersioningEnabled: !Equals [!Ref EnableVersioning, 'Yes']

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref FlowLogsBucket

  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt FlowLogsBucket.Arn

  BucketRegion:
    Description: 'Region where the bucket was created'
    Value: !Ref 'AWS::Region'