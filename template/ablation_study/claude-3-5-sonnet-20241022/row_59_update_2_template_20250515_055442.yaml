AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with CloudWatch Alarms'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'

  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    MinValue: 1
    Default: 1

  RetentionPeriod:
    Type: Number
    Description: Data retention period in hours
    MinValue: 24
    MaxValue: 8760
    Default: 24

  AlarmThreshold:
    Type: Number
    Description: Throughput exceeded threshold (percentage)
    Default: 80
    MinValue: 1
    MaxValue: 100

  AlarmEmail:
    Type: String
    Description: Email address to receive alarm notifications

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED
      Tags:
        - Key: Name
          Value: !Ref StreamName

  StreamAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub 'Kinesis-${AWS::StackName}-Alarms'

  StreamAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      TopicArn: !Ref StreamAlarmTopic
      Endpoint: !Ref AlarmEmail

  WriteThresholdAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: KinesisStream
    Properties:
      AlarmDescription: !Sub 'Write throughput exceeded for ${AWS::StackName}'
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      AlarmActions:
        - !Ref StreamAlarmTopic

  ReadThresholdAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: KinesisStream
    Properties:
      AlarmDescription: !Sub 'Read throughput exceeded for ${AWS::StackName}'
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      AlarmActions:
        - !Ref StreamAlarmTopic

Outputs:
  StreamArn:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn

  TopicArn:
    Description: 'ARN of the SNS Topic for alarms'
    Value: !Ref StreamAlarmTopic