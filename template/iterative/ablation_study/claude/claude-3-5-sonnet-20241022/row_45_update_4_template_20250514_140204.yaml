AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Kinesis Firehose with encryption and CloudWatch logging'

Resources:
  FirehoseLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/firehose/${AWS::StackName}'
      RetentionInDays: 14

  FirehoseLogStream:
    Type: 'AWS::Logs::LogStream'
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: 'DeliveryErrors'

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSKinesisFirehoseServiceRole'
      Policies:
        - PolicyName: FirehoseLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:PutLogEvents'
                Resource: !Sub '${FirehoseLogGroup.Arn}:*'

  FirehoseDeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Sub '${AWS::StackName}-stream'
      DeliveryStreamType: 'DirectPut'
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: 'AWS_OWNED_CMK'
      S3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::StackName}-destination'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: 'UNCOMPRESSED'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream

Outputs:
  FirehoseStreamARN:
    Description: 'ARN of the Kinesis Firehose Delivery Stream'
    Value: !GetAtt FirehoseDeliveryStream.Arn

  LogGroupName:
    Description: 'Name of the CloudWatch Log Group'
    Value: !Ref FirehoseLogGroup