AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy an EC2 instance in the default VPC/subnet with an Elastic IP and a Security Group
  that allows SSH access.

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EC2 instance allowing SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0  # Example Amazon Linux 2 AMI (update as needed per region)
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      KeyName: ''  # Optionally set to your existing key pair name if SSH access is needed; leave empty if not used

  EC2ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EC2ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

Outputs:
  InstanceId:
    Description: ID of the deployed EC2 instance
    Value: !Ref EC2Instance
  ElasticIP:
    Description: Elastic IP address allocated to the instance
    Value: !Ref EC2ElasticIP
  SecurityGroupId:
    Description: Security Group ID associated with the EC2 instance
    Value: !Ref EC2SecurityGroup