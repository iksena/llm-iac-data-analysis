AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates IAM roles for EC2 instances with read-only access to IAM metadata'

Resources:
  IAMReadOnlyPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Allows read-only access to IAM resources'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  EC2IAMReadOnlyRole1:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-iam-readonly-role-1'
      Description: 'EC2 role with read-only access to IAM resources'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref IAMReadOnlyPolicy
      Tags:
        - Key: Purpose
          Value: IAMReadOnly

  EC2IAMReadOnlyRole2:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-iam-readonly-role-2'
      Description: 'EC2 role with read-only access to IAM resources'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref IAMReadOnlyPolicy
      Tags:
        - Key: Purpose
          Value: IAMReadOnly

Outputs:
  Role1ARN:
    Description: 'ARN of the first EC2 IAM read-only role'
    Value: !GetAtt EC2IAMReadOnlyRole1.Arn

  Role2ARN:
    Description: 'ARN of the second EC2 IAM read-only role'
    Value: !GetAtt EC2IAMReadOnlyRole2.Arn

  Role1Name:
    Description: 'Name of the first EC2 IAM read-only role'
    Value: !Ref EC2IAMReadOnlyRole1

  Role2Name:
    Description: 'Name of the second EC2 IAM read-only role'
    Value: !Ref EC2IAMReadOnlyRole2