

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an encrypted One Zone EFS file system in us-east-1a'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet ID in us-east-1a where EFS mount target will be created'

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for the EFS mount target security group'

Resources:
  EFSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EFSEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-efs-key'
      TargetKeyId: !Ref EFSEncryptionKey

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !Ref EFSEncryptionKey
      AvailabilityZoneName: us-east-1a
      BackupPolicy:
        Status: DISABLED
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups: 
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemArn:
    Description: ARN of the EFS File System
    Value: !GetAtt FileSystem.Arn

  MountTargetDNS:
    Description: DNS name for the mount target
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'