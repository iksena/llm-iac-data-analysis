AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: CustomEventBus
      Description: Event bus for custom application events

  Connection:
    Type: AWS::EventSchemas::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value
      Description: Connection to MongoDB API endpoint
      Name: MongoDBConnection

  ApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      ConnectionArn: !GetAtt Connection.Arn
      Description: API destination for MongoDB
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      Name: MongoDBApiDestination
      DeadLetterConfig:
        Arn: !GetAtt DeadLetterQueue.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue
      MessageRetentionPeriod: 1209600

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref EventBus
  ApiDestinationArn:
    Description: ARN of the MongoDB API destination
    Value: !GetAtt ApiDestination.Arn