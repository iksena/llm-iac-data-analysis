AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Kinesis Data Firehose stream with server-side encryption and error logging to CloudWatch.

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-firehose-bucket

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-FirehoseRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseRole

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-FirehoseErrorLogs

  CloudWatchLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref CloudWatchLogGroup
      LogStreamName: !Sub ${AWS::StackName}-FirehoseErrorLogStream

  KinesisFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub ${AWS::StackName}-FirehoseStream
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        ErrorOutputPrefix: error/!{firehose:error-output-type}/
        Prefix: logs/
        RoleARN: !GetAtt FirehoseRole.Arn
      EncryptionConfiguration:
        KMSEncryptionConfig:
          AWSKMSKeyARN: !Sub arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/kinesis
      CloudWatchLoggingOptions:
        Enabled: true
        LogGroupName: !Ref CloudWatchLogGroup
        LogStreamName: !GetAtt CloudWatchLogStream.LogStreamName

Outputs:
  DeliveryStreamArn:
    Description: The ARN of the Kinesis Data Firehose delivery stream
    Value: !GetAtt KinesisFirehoseDeliveryStream.Arn