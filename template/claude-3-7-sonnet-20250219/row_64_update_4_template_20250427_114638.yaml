AWSTemplateFormatVersion: '2010-09-09'
Description: 'Web Application Environment with EC2 in a VPC'

Parameters:
  VpcCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-8]))$
    ConstraintDescription: CIDR block must be in the format x.x.x.x/16-28

  PublicSubnetCIDR:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-8]))$
    ConstraintDescription: CIDR block must be in the format x.x.x.x/16-28

  PrivateSubnetCIDR:
    Description: CIDR block for the private subnet
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/(1[6-9]|2[0-8]))$
    ConstraintDescription: CIDR block must be in the format x.x.x.x/16-28

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair

  SSHLocation:
    Description: The IP address range that can be used to SSH to the EC2 instances
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
    ConstraintDescription: Must be a valid IP CIDR range of the form x.x.x.x/x

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      HVM64: ami-0cff7528ff583bf9a
    us-east-2:
      HVM64: ami-0ebc8f6f580a04647
    us-west-1:
      HVM64: ami-008d8ed4bd7dc2485
    us-west-2:
      HVM64: ami-0d593311db5abb72b
    eu-west-1:
      HVM64: ami-0ea0f26a6d50850c5
    eu-central-1:
      HVM64: ami-0a1ee2fb28fe05df3
    ap-northeast-1:
      HVM64: ami-0b276ad6e5507979f
    ap-southeast-1:
      HVM64: ami-0753e0e42b20e96e3
    ap-southeast-2:
      HVM64: ami-0a709bebf4fa9246f

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select 
        - 0
        - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select 
        - 0
        - Fn::GetAZs: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
          Description: Allow SSH access from specified IP range
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServerSG

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: PublicRoute
    Properties:
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !GetAtt WebServerSecurityGroup.GroupId
      KeyName: !Ref KeyName
      ImageId: !FindInMap [AWSRegionArch2AMI, !Ref 'AWS::Region', HVM64]
      SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: |
          #!/bin/bash -xe
          # Update system
          yum update -y
          
          # Install Apache and PHP
          yum install -y httpd php
          
          # Start and enable Apache
          systemctl start httpd
          systemctl enable httpd
          
          # Create a simple inventory application
          cat > /var/www/html/index.php << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Simple Inventory Application</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 20px; }
                  h1 { color: #333; }
                  table { border-collapse: collapse; width: 100%; }
                  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                  th { background-color: #f2f2f2; }
                  tr:nth-child(even) { background-color: #f9f9f9; }
              </style>
          </head>
          <body>
              <h1>Inventory Management System</h1>
              <h2>Sample Inventory Items</h2>
              <table>
                  <tr>
                      <th>ID</th>
                      <th>Item Name</th>
                      <th>Category</th>
                      <th>Quantity</th>
                      <th>Price</th>
                  </tr>
                  <?php
                  $items = [
                      ['id' => 1, 'name' => 'Laptop', 'category' => 'Electronics', 'quantity' => 25, 'price' => 999.99],
                      ['id' => 2, 'name' => 'Desk Chair', 'category' => 'Furniture', 'quantity' => 15, 'price' => 189.50],
                      ['id' => 3, 'name' => 'Coffee Maker', 'category' => 'Appliances', 'quantity' => 30, 'price' => 49.99],
                      ['id' => 4, 'name' => 'Wireless Mouse', 'category' => 'Electronics', 'quantity' => 50, 'price' => 24.95],
                      ['id' => 5, 'name' => 'Bookshelf', 'category' => 'Furniture', 'quantity' => 10, 'price' => 129.99]
                  ];
                  
                  foreach ($items as $item) {
                      echo "<tr>";
                      echo "<td>{$item['id']}</td>";
                      echo "<td>{$item['name']}</td>";
                      echo "<td>{$item['category']}</td>";
                      echo "<td>{$item['quantity']}</td>";
                      echo "<td>\${$item['price']}</td>";
                      echo "</tr>";
                  }
                  ?>
              </table>
              <p>Server Info: <?php echo php_uname(); ?></p>
              <p>PHP Version: <?php echo phpversion(); ?></p>
          </body>
          </html>
          EOF
          
          # Create a simple info page
          echo "<?php phpinfo(); ?>" > /var/www/html/info.php
          
          # Set permissions
          chown -R apache:apache /var/www/html
          
          # Ensure httpd is running
          systemctl restart httpd
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServer

  WebServerEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  WebServerEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt WebServerEIP.AllocationId
      InstanceId: !Ref WebServerInstance

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPCID

  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnetID

  PrivateSubnetId:
    Description: Private Subnet ID
    Value: !Ref PrivateSubnet
    Export:
      Name: !Sub ${AWS::StackName}-PrivateSubnetID

  WebServerPublicIP:
    Description: Public IP address of the web server
    Value: !Ref WebServerEIP
    Export:
      Name: !Sub ${AWS::StackName}-WebServerPublicIP

  WebServerURL:
    Description: URL of the web server
    Value: !Sub http://${WebServerEIP}
    Export:
      Name: !Sub ${AWS::StackName}-WebServerURL

  WebServerSecurityGroupID:
    Description: Security Group ID for the web server
    Value: !GetAtt WebServerSecurityGroup.GroupId
    Export:
      Name: !Sub ${AWS::StackName}-WebServerSecurityGroupID