AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role with Permission Boundaries for Developer IAM Resource Management'

Parameters:
  EnableStrictBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Enable strict permission boundary enforcement

  TeamNamePrefix:
    Type: String
    Default: 'MyTeam'
    MinLength: 3
    MaxLength: 32
    AllowedPattern: '^[a-zA-Z]+[a-zA-Z0-9]*$'
    Description: Prefix for IAM resources created by developers

  RequiredOwnerTag:
    Type: String
    Default: 'Development'
    MinLength: 3
    MaxLength: 32
    Description: Required value for Owner tag on IAM resources

Conditions:
  IsStrictMode: !Equals [!Ref EnableStrictBoundary, 'true']

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permission boundary for developer-created IAM resources
      ManagedPolicyName: !Sub ${TeamNamePrefix}-PermissionBoundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Actions
            Effect: Allow
            Action:
              - 's3:*'
            Resource: '*'
          - Sid: AllowIAMReadOnly
            Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${TeamNamePrefix}-DeveloperRole
      Description: Role for developers to manage IAM resources with boundaries
      PermissionsBoundary: !Ref PermissionBoundaryPolicy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iam.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Owner
          Value: !Ref RequiredOwnerTag

  DeveloperPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for developer IAM resource management
      ManagedPolicyName: !Sub ${TeamNamePrefix}-DeveloperPolicy
      Roles:
        - !Ref DeveloperRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: StrictModePermissions
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:CreatePolicy'
              - 'iam:PutRolePermissionsBoundary'
              - 'iam:TagRole'
              - 'iam:TagPolicy'
            Resource: !If 
              - IsStrictMode
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${TeamNamePrefix}*'
              - '*'
            Condition:
              StringEquals:
                'aws:RequestTag/Owner': !Ref RequiredOwnerTag
              StringLike:
                'aws:RequestTag/Name': !Sub ${TeamNamePrefix}*
          - Sid: RequireBoundaryForCreation
            Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:CreatePolicy'
            Resource: '*'
            Condition:
              StringEquals:
                'iam:PermissionsBoundary': !Ref PermissionBoundaryPolicy

Outputs:
  DeveloperRoleArn:
    Description: ARN of the developer role
    Value: !GetAtt DeveloperRole.Arn

  PermissionBoundaryPolicyArn:
    Description: ARN of the permission boundary policy
    Value: !Ref PermissionBoundaryPolicy