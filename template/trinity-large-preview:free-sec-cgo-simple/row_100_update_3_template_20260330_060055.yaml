AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Parameters:
  IdentityManagementAccountId:
    Type: String
    Default: '123456789012'
    Description: Account ID of the Identity Management Account
  ToolingManagementAccountId:
    Type: String
    Default: '234567890123'
    Description: Account ID of the Tooling Management Account
  ExternalId:
    Type: String
    Default: 'iam-baseline-external-id'
    Description: External ID for cross-account role assumption

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'aws-portal:*'
                  - 'cloudformation:*'
                  - 'cloudtrail:*'
                  - 'config:*'
                  - 'sts:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'cloudhsm:*'
                  - 'billing:*'
                Resource: '*'

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:ChangePassword'
                  - 'iam:GetUser'
                  - 'iam:ListUsers'
                  - 'iam:ListGroups'
                  - 'iam:ListRoles'
                  - 'iam:ListPolicies'
                  - 'iam:ListVirtualMFADevices'
                  - 'iam:ListAccessKeys'
                  - 'iam:ListMFADevices'
                  - 'iam:ListSigningCertificates'
                  - 'iam:ListSSHPublicKeys'
                  - 'iam:ListServiceSpecificCredentials'
                  - 'iam:ListUserPolicies'
                  - 'iam:ListUserTags'
                  - 'iam:ListGroupsForUser'
                  - 'iam:GetAccountSummary'
                  - 'iam:GetAccountPasswordPolicy'
                  - 'iam:GetContextKeysForPrincipalPolicy'
                  - 'iam:GetContextKeysForCustomPolicy'
                  - 'iam:GenerateCredentialReport'
                  - 'iam:GetCredentialReport'
                  - 'iam:SimulatePrincipalPolicy'
                  - 'iam:SimulateCustomPolicy'
                  - 'iam:GetPolicy'
                  - 'iam:GetPolicyVersion'
                  - 'iam:GetRole'
                  - 'iam:GetRolePolicy'
                  - 'iam:GetUserPolicy'
                  - 'iam:GetGroup'
                  - 'iam:GetGroupPolicy'
                  - 'iam:GetServerCertificate'
