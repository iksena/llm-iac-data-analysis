AWSTemplateFormatVersion: '2010-09-09'
Description: Security Hub Controls Management Solution

Parameters:
  CISControlsToDisable:
    Type: CommaDelimitedList
    Default: ''
    Description: Comma-separated list of CIS control IDs to disable (e.g., CIS.1.1,CIS.1.2)
  AWSFoundationalControlsToDisable:
    Type: CommaDelimitedList
    Default: ''
    Description: Comma-separated list of AWS Foundational control IDs to disable (e.g., Config.1,EC2.1)
  PermissionsBoundary:
    Type: String
    Default: ''
    Description: (Optional) IAM Permissions Boundary ARN for Lambda role
  LogRetentionInDays:
    Type: Number
    Default: 7
    Description: CloudWatch Logs retention period in days

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, '']]

Resources:
  SecurityHubEnabled:
    Type: AWS::SecurityHub::Hub

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundary, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: SecurityHubControlManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateStandardsControl
                  - securityhub:DescribeStandardsControls
                Resource: '*'
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ControlManagementFunction}:*'

  ControlManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging
          import os
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          securityhub = boto3.client('securityhub')
          
          def disable_controls(controls, standard_type):
              account_id = boto3.client('sts').get_caller_identity().get('Account')
              region = os.environ['AWS_REGION']
              disabled_reason = 'Disabled via CloudFormation template'
          
              for control_id in controls:
                  if standard_type == 'CIS':
                      standards_arn = f'arn:aws:securityhub:{region}:{account_id}:control/cis-aws-foundations-benchmark/v/1.4.0/{control_id}'
                  elif standard_type == 'AWS_FOUNDATIONAL':
                      standards_arn = f'arn:aws:securityhub:{region}:{account_id}:control/aws-foundational-security-best-practices/v/1.0.0/{control_id}'
                  else:
                      continue
          
                  try:
                      securityhub.update_standards_control(
                          StandardsControlArn=standards_arn,
                          ControlStatus='DISABLED',
                          DisabledReason=disabled_reason
                      )
                      logger.info(f"Successfully disabled control: {control_id}")
                  except Exception as e:
                      logger.error(f"Error disabling control {control_id}: {str(e)}")
                      raise e
          
          def lambda_handler(event, context):
              logger.info(f"Received event: {event}")
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      cis_controls = os.environ.get('CIS_CONTROLS', '').split(',')
                      aws_controls = os.environ.get('AWS_FOUNDATIONAL_CONTROLS', '').split(',')
          
                      cis_controls = list(filter(None, cis_controls))
                      aws_controls = list(filter(None, aws_controls))
          
                      if cis_controls:
                          disable_controls(cis_controls, 'CIS')
                      if aws_controls:
                          disable_controls(aws_controls, 'AWS_FOUNDATIONAL')
          
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Execution error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 180
      MemorySize: 128
      Environment:
        Variables:
          CIS_CONTROLS: !Join [',', !Ref CISControlsToDisable]
          AWS_FOUNDATIONAL_CONTROLS: !Join [',', !Ref AWSFoundationalControlsToDisable]

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ControlManagementFunction}
      RetentionInDays: !Ref LogRetentionInDays

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ControlManagementFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cloudformation.amazonaws.com

  ControlManagementTrigger:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - SecurityHubEnabled
      - ControlManagementFunction
    Properties:
      ServiceToken: !GetAtt ControlManagementFunction.Arn

Outputs:
  LambdaFunctionArn:
    Value: !GetAtt ControlManagementFunction.Arn
  LambdaExecutionRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
  LogGroupName:
    Value: !Ref LambdaLogGroup