AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"

  IAMReadOnlyPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IAMReadOnlyAccess
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - iam:List*
              - iam:Get*
            Resource: "*"
      Roles:
        - !Ref IAMReadOnlyRole

  IAMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref IAMReadOnlyRole

  # Dependencies are expressed via !Ref in Roles list
  # No explicit DependsOn needed since CloudFormation resolves in correct order