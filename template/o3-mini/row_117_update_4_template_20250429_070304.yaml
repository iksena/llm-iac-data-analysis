AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that provisions an event-driven integration between DynamoDB Streams and EventBridge.
  It creates a DynamoDB table with stream enabled, a centralized EventBridge event bus, an IAM role for AWS Pipes,
  and two EventBridge Pipes for filtering INSERT and MODIFY events.

Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: OrderID
          AttributeType: S
      KeySchema:
        - AttributeName: OrderID
          KeyType: HASH
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES

  OrdersEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrdersEventBus

  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PipesExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: PipesAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  Fn::GetAtt:
                    - OrdersTable
                    - StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  Fn::GetAtt:
                    - OrdersEventBus
                    - Arn

  NewOrdersPipe:
    Type: AWS::Pipes::Pipe
    DependsOn:
      - OrdersTable
      - OrdersEventBus
      - PipesExecutionRole
    Properties:
      Name: NewOrdersPipe
      Description: Pipe for forwarding INSERT events from DynamoDB stream to EventBridge bus
      RoleArn: 
        Fn::GetAtt:
          - PipesExecutionRole
          - Arn
      Source: 
        Fn::GetAtt:
          - OrdersTable
          - StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 100
      Target: 
        Fn::GetAtt:
          - OrdersEventBus
          - Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "NewOrder"
          Source: "com.mycompany.orders"
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["INSERT"]}'

  OrderUpdatePipe:
    Type: AWS::Pipes::Pipe
    DependsOn:
      - OrdersTable
      - OrdersEventBus
      - PipesExecutionRole
    Properties:
      Name: OrderUpdatePipe
      Description: Pipe for forwarding MODIFY events from DynamoDB stream to EventBridge bus
      RoleArn: 
        Fn::GetAtt:
          - PipesExecutionRole
          - Arn
      Source: 
        Fn::GetAtt:
          - OrdersTable
          - StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 100
      Target: 
        Fn::GetAtt:
          - OrdersEventBus
          - Arn
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "OrderUpdate"
          Source: "com.mycompany.orders"
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["MODIFY"]}'

Outputs:
  OrdersTableName:
    Description: "Name of the DynamoDB Orders table"
    Value: !Ref OrdersTable

  OrdersEventBusName:
    Description: "Name of the EventBridge event bus"
    Value: !Ref OrdersEventBus

  NewOrdersPipeArn:
    Description: "ARN of the pipe forwarding new order INSERT events"
    Value:
      Fn::GetAtt:
        - NewOrdersPipe
        - Arn

  OrderUpdatePipeArn:
    Description: "ARN of the pipe forwarding order update MODIFY events"
    Value:
      Fn::GetAtt:
        - OrderUpdatePipe
        - Arn