AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for API Gateway integrated with Kinesis Data Streams'

Parameters:
  KinesisStreamName:
    Type: String
    Default: 'DataIngestionStream'
    Description: 'Name of the Kinesis Data Stream'
  APIGatewayStageName:
    Type: String
    Default: 'prod'
    Description: 'Stage name for API Gateway deployment'
  APIGatewayDeploymentDescription:
    Type: String
    Default: 'Initial deployment'
    Description: 'Description for API Gateway deployment'

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-KinesisAPI'
      Description: 'API Gateway for Kinesis Data Stream operations'

  RecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'records'

  RecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt APIGatewayRole.Arn
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord'
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${KinesisStreamName}",
              "Data": "$util.base64Encode($input.json('$.data'))",
              "PartitionKey": "$input.json('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: '{"status": "Record added to stream"}'
      MethodResponses:
        - StatusCode: 200

  BatchRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt APIGatewayRole.Arn
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords'
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${KinesisStreamName}",
              "Records": [
                #foreach($elem in $input.path('$.records'))
                {
                  "Data": "$util.base64Encode($elem.data)",
                  "PartitionKey": "$elem.partitionKey"
                }#if($foreach.hasNext),#end
                #end
              ]
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: '{"status": "Records batch added to stream"}'
      MethodResponses:
        - StatusCode: 200

  ShardsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'shards'

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ShardsResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.querystring.shardId: true
        method.request.querystring.shardIteratorType: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt APIGatewayRole.Arn
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords'
        RequestTemplates:
          application/json: |
            {
              "ShardId": "$input.params('shardId')",
              "ShardIterator": "$context.authorizer.shardIterator"
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: '$input.json('$')'
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RecordsMethod
      - BatchRecordsMethod
      - GetRecordsMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Ref APIGatewayDeploymentDescription

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref APIGatewayStageName
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment

Outputs:
  ApiGatewayUrl:
    Description: 'URL of the API Gateway'
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${APIGatewayStageName}'
  KinesisStreamArn:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn
  IamRoleArn:
    Description: 'ARN of the IAM role for API Gateway'
    Value: !GetAtt APIGatewayRole.Arn