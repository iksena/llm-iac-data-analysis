AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a secure REST API Gateway integrated with Amazon SES for sending templated emails

Parameters:
  EmailTemplateContent:
    Type: String
    Default: '<html><body><h1>Notification</h1><p>Dear Customer, your email content here.</p></body></html>'
    Description: The HTML content of the email template
  FromEmail:
    Type: String
    Default: 'noreply@example.com'
    Description: The sender email address
  Subject:
    Type: String
    Default: 'Notification from API Gateway'
    Description: The subject of the email
  APIKeyName:
    Type: String
    Default: 'email-api-key'
    Description: The name of the API key
  APIKeyDescription:
    Type: String
    Default: 'API key for email service'
    Description: Description for the API key

Resources:
  APIGatewayIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: APIGatewaySESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ses:SendEmail'
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              try:
                  # Extract data from API Gateway event
                  body = json.loads(event['body'])
                  to = body['to']
                  from_email = body['from']
                  subject = body['subject']
                  text = body['text']
                  html = body['html']

                  # Create SES client
                  client = boto3.client('ses')

                  # Send email
                  response = client.send_email(
                      Source=from_email,
                      Destination={'ToAddresses': [to]},
                      Message={
                          'Subject': {'Data': subject},
                          'Body': {
                              'Text': {'Data': text},
                              'Html': {'Data': html}
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'message': 'Email sent successfully'})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: LambdaSESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - 'ses:SendEmail'
                Resource: '*'

  EmailTemplateParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /email-service/template
      Type: String
      Value: !Ref EmailTemplateContent
      Description: Email template content

  APIModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref APIRestApi
      ContentType: 'application/json'
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        title: EmailRequest
        type: object
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          text:
            type: string
          html:
            type: string
        required:
          - to
          - from
          - subject
          - text
          - html

  APIRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: ContentValidator
      RestApiId: !Ref APIRestApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  APIRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailServiceAPI
      Description: API for sending emails via SES

  APIPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: POST
      ResourceId: !Ref APIResource
      RestApiId: !Ref APIRestApi
      MethodResponses:
        - StatusCode: 200
      RequestValidatorId: !Ref APIRequestValidator
      RequestModels:
        'application/json': !Ref APIModel
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt LambdaFunction.Arn

  APIResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt APIRestApi.RootResourceId
      PathPart: email
      RestApiId: !Ref APIRestApi

  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - APIPostMethod
    Properties:
      RestApiId: !Ref APIRestApi
      Description: Deployment of the email service API

  APIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: EmailServiceUsagePlan
      Description: Usage plan for email service API
      ApiStages:
        - ApiId: !Ref APIRestApi
          Stage: !Ref APIDeployment
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  APIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Ref APIKeyName
      Description: !Ref APIKeyDescription
      Enabled: true

  APIKeyUsagePlan:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIKey
      KeyType: API_KEY
      UsagePlanId: !Ref APIUsagePlan

  APIPeriod:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIDeployment
      RestApiId: !Ref APIRestApi
      StageName: prod

Outputs:
  APIEndpoint:
    Description: The URL of the deployed API
    Value: !Sub 'https://${APIRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/email'
  APIKey:
    Description: The API key for authentication
    Value: !Ref APIKey