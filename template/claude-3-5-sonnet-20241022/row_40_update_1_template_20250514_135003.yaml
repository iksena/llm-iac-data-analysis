AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating an SQS FIFO queue'

Parameters:
  QueueName:
    Type: String
    Description: Name of the FIFO queue (must end with .fifo)
    Default: 'myqueue.fifo'
    AllowedPattern: '^[a-zA-Z0-9_-]+\.fifo$'
    ConstraintDescription: Queue name must end with .fifo
  
  MessageRetentionPeriod:
    Type: Number
    Description: 'The number of seconds that messages will be retained (1 min to 14 days)'
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  
  VisibilityTimeout:
    Type: Number
    Description: 'The visibility timeout for the queue in seconds'
    Default: 30
    MinValue: 0
    MaxValue: 43200

Resources:
  SQSFifoQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: true
      DeduplicationScope: 'messageGroup'
      FifoThroughputLimit: 'perMessageGroupId'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Name
          Value: !Ref QueueName
        - Key: Environment
          Value: Production

Outputs:
  QueueURL:
    Description: 'URL of the created SQS FIFO Queue'
    Value: !Ref SQSFifoQueue
  
  QueueARN:
    Description: 'ARN of the created SQS FIFO Queue'
    Value: !GetAtt SQSFifoQueue.Arn
  
  QueueName:
    Description: 'Name of the created SQS FIFO Queue'
    Value: !GetAtt SQSFifoQueue.QueueName