AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Client VPN Monitoring Dashboard and Logs Insights Queries

Parameters:
  DashboardName:
    Type: String
    Default: ClientVPNAnalyticsDashboard
    Description: Name for the CloudWatch dashboard
  LogGroupName:
    Type: String
    Default: /aws/vpn/logs
    Description: CloudWatch Logs group for Client VPN logs
  Region:
    Type: String
    Default: us-east-1
    Description: AWS Region for deployment

Resources:
  # IAM Role for CloudWatch Dashboard Creation
  CloudWatchDashboardRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ClientVPNAnalyticsRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsReadOnlyAccess

  # CloudWatch Logs Insights Query Definitions

  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionDurationQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /connection/
        | stats count(*) as TotalConnections, avg(duration) as AvgDuration, min(duration) as MinDuration, max(duration) as MaxDuration
        | sort by TotalConnections desc

  ConnectionFrequencyQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ConnectionFrequencyQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection/
        | stats count(*) as Connections by bin(1h)
        | sort by bin_1h

  EndpointDistributionQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: EndpointDistributionQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /connection/
        | stats count(*) as Connections by endpoint
        | sort by Connections desc

  IngressVolumeQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: IngressVolumeQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /ingress/
        | stats sum(bytes) as TotalIngress by bin(1h)
        | sort by bin_1h

  EgressVolumeQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: EgressVolumeQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /egress/
        | stats sum(bytes) as TotalEgress by bin(1h)
        | sort by bin_1h

  DistinctUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: DistinctUsersQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /authentication/
        | stats count_distinct(user) as DistinctUsers by bin(1d)
        | sort by bin_1d

  LoginPatternsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: LoginPatternsQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /authentication/
        | stats count(*) as LoginAttempts by bin(30m)
        | sort by bin_30m

  ADSAMLBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ADSAMLBreakdownQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /authentication/
        | stats count(*) as AuthCount by authMethod
        | sort by AuthCount desc

  MutualAuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MutualAuthBreakdownQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /mutual-auth/
        | stats count(*) as MutualAuthCount by endpoint
        | sort by MutualAuthCount desc

  MixedAuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MixedAuthBreakdownQuery
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, @message, @logStream
        | filter @message like /mixed-auth/
        | stats count(*) as MixedAuthCount by user
        | sort by MixedAuthCount desc

  # CloudWatch Dashboard
  ClientVPNAnalyticsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Analytics Dashboard\n### Region: ${Region}"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ConnectionDuration", { "label": "Connection Duration (seconds)" } ]
                ],
                "region": "${Region}",
                "title": "Connection Duration Metrics"
              }
            },
            {
              "type": "table",
              "x": 12,
              "y": 1,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "DataTransfer", { "label": "Data Transfer (bytes)" } ]
                ],
                "region": "${Region}",
                "title": "Data Transfer Volumes"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 7,
              "width": 24,
              "height": 8,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "UserActivity", { "label": "User Activity" } ]
                ],
                "region": "${Region}",
                "title": "User Activity Patterns"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 15,
              "width": 24,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "AuthenticationMethods", { "label": "Authentication Methods" } ]
                ],
                "region": "${Region}",
                "title": "Authentication Method Breakdown"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL for the CloudWatch Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#/dashboards/d/ClientVPNAnalyticsDashboard
  DashboardName:
    Description: Name of the created dashboard
    Value: !Ref DashboardName