AWSTemplateFormatVersion: '2010-09-09'
Description: Secure static website with S3 and CloudFront CDN

Parameters:
  SiteName:
    Type: String
    Default: my-static-site
    Description: Name for the static website (used in bucket naming)
  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: Lambda runtime version
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub ${SiteName}-static-site
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub arn:${AWS::Partition}:s3:::${S3Bucket}/*
          - Effect: Allow
            Principal: '*'
            Action: s3:ListBucket
            Resource: !GetAtt S3Bucket.Arn

  OriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for static site

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt S3Bucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${OriginAccessIdentity}
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          Compress: false
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Restrictions:
          GeoRestriction:
            RestrictionType: none

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub arn:${AWS::Partition}:s3:::${S3Bucket}/*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket = event['ResourceProperties']['BucketName']

              try:
                  if event['RequestType'] == 'Create':
                      s3.put_object(
                          Bucket=bucket,
                          Key='index.html',
                          Body=b'<html><body><h1>Welcome to your static site!</h1></body></html>',
                          ContentType='text/html'
                      )
                  elif event['RequestType'] == 'Delete':
                      objects = s3.list_objects_v2(Bucket=bucket)
                      if 'Contents' in objects:
                          delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects['Contents']]}
                          s3.delete_objects(Bucket=bucket, Delete=delete_keys)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, None)
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, None)

  LambdaFunctionCustomResource:
    Type: Custom::LambdaFunction
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      BucketName: !Ref S3Bucket

Outputs:
  WebsiteURL:
    Value: !GetAtt S3Bucket.WebsiteURL
    Description: URL of the static website hosted on S3
  CloudFrontURL:
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Description: URL of the CloudFront distribution