AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ShopifyAdminApiKey:
    Type: String
    NoEcho: true
    Description: Shopify Admin API Access Token for authentication
  ShopName:
    Type: String
    Default: testanu
    Description: Name of your Shopify shop (e.g., testanu)

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: ShopifyIntegrationBus

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyAdminApiKey

  ProductApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn: ShopifyConnection
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://${ShopName}.myshopify.com/admin/api/2023-10/products.json'
      InvocationRateLimitPerSecond: 10

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    DependsOn: ProductApiDestination
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ProductApiDestination.Arn

  ProductUpdateRule:
    Type: AWS::Events::Rule
    DependsOn:
      - ProductApiDestination
      - EventBridgeInvokeRole
    Properties:
      EventBusName: !GetAtt ShopifyEventBus.Name
      EventPattern:
        source:
          - MyShopifyApp
      State: ENABLED
      Targets:
        - Arn: !GetAtt ProductApiDestination.Arn
          Id: ShopifyProductTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

Outputs:
  EventBusARN:
    Value: !GetAtt ShopifyEventBus.Arn
  ApiDestinationARN:
    Value: !GetAtt ProductApiDestination.Arn
  ConnectionARN:
    Value: !GetAtt ShopifyConnection.Arn
  RuleARN:
    Value: !GetAtt ProductUpdateRule.Arn