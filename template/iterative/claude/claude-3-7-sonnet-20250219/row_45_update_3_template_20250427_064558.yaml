AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Amazon Kinesis Data Firehose with server-side encryption and CloudWatch error logging'

Parameters:
  FirehoseStreamName:
    Type: String
    Default: 'my-firehose-stream'
    Description: Name of the Firehose delivery stream
  
  LogGroupName:
    Type: String
    Default: '/aws/firehose/error-logs'
    Description: Name of the CloudWatch Log Group for error logging
  
  LogStreamName:
    Type: String
    Default: 'firehose-error-stream'
    Description: Name of the CloudWatch Log Stream for error logging
  
  S3BucketName:
    Type: String
    Default: ''
    Description: Name of the S3 bucket for Firehose destination (leave empty to auto-generate)
  
  BufferingInterval:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 900
    Description: Buffer incoming data for the specified period of time, in seconds (60-900)
  
  BufferingSize:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 128
    Description: Buffer incoming data to the specified size, in MBs (1-128)

Conditions:
  CreateNewBucket: !Equals [!Ref S3BucketName, '']

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If 
        - CreateNewBucket
        - !Sub 'firehose-destination-${AWS::AccountId}-${AWS::Region}'
        - !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 7

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      LogStreamName: !Ref LogStreamName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref 'AWS::AccountId'

  FirehosePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: firehose-s3-cloudwatch-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:AbortMultipartUpload'
              - 's3:GetBucketLocation'
              - 's3:GetObject'
              - 's3:ListBucket'
              - 's3:ListBucketMultipartUploads'
              - 's3:PutObject'
            Resource:
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
          - Effect: Allow
            Action:
              - 'logs:PutLogEvents'
              - 'logs:CreateLogStream'
              - 'logs:CreateLogGroup'
            Resource:
              - !GetAtt FirehoseLogGroup.Arn
              - !Sub '${FirehoseLogGroup.Arn}:*'
          - Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
      Roles:
        - !Ref FirehoseRole

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehosePolicy
      - FirehoseLogStream
      - S3Bucket
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        BufferingHints:
          IntervalInSeconds: !Ref BufferingInterval
          SizeInMBs: !Ref BufferingSize
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref LogGroupName
          LogStreamName: !Ref LogStreamName

Outputs:
  FirehoseStreamARN:
    Description: ARN of the Firehose delivery stream
    Value: !GetAtt FirehoseStream.Arn
  
  FirehoseStreamName:
    Description: Name of the Firehose delivery stream
    Value: !Ref FirehoseStream
  
  S3BucketName:
    Description: Name of the S3 bucket for Firehose destination
    Value: !Ref S3Bucket
  
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref FirehoseLogGroup
  
  LogStreamName:
    Description: Name of the CloudWatch Log Stream
    Value: !Ref FirehoseLogStream