AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready AWS SQS queue template with basic configuration'
Parameters:
  QueueName:
    Type: String
    Default: 'basic-queue'
    Description: 'Name of the SQS queue (must be unique within your AWS account; alphanumeric with hyphens/underscores, max 80 characters)'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
Outputs:
  QueueUrl:
    Value: !Ref SQSQueue
    Description: 'URL of the created SQS queue'
  QueueArn:
    Value: !GetAtt SQSQueue.Arn
    Description: 'ARN of the created SQS queue'