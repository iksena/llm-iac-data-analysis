AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API for automated product creation

Parameters:
  StripeApiKey:
    Type: String
    Description: Stripe API key for authentication
    Default: dummy-key
    NoEcho: true

  EventBusName:
    Type: String
    Description: Name of the custom event bus
    Default: PartnerAppEventBus

  ApiDestinationName:
    Type: String
    Description: Name of the API destination
    Default: StripeProductApi

Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeStripeExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeApiCallPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: StripeApiConnection
      Description: Connection for Stripe API authentication
      AuthorizationType: API_KEY
      AuthParameters:
        API_KEY:
          Name: Authorization
          Value: !Ref StripeApiKey

  StripeProductApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Ref ApiDestinationName
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      ConnectionArn: !GetAtt StripeConnection.Arn

  PartnerAppEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: PartnerAppProductCreationRule
      EventBusName: !Ref PartnerAppEventBus
      Description: Rule to trigger Stripe product creation for PartnerApp events
      EventPattern:
        source:
          - PartnerApp
        detail-type:
          - PartnerAppDetailType
      Targets:
        - Arn: !GetAtt StripeProductApiDestination.Arn
          Id: StripeProductTarget

Outputs:
  EventBusName:
    Description: Name of the created event bus
    Value: !Ref PartnerAppEventBus
  ApiDestinationName:
    Description: Name of the created API destination
    Value: !Ref StripeProductApiDestination
  ExecutionRoleArn:
    Description: ARN of the EventBridge execution role
    Value: !GetAtt EventBridgeExecutionRole.Arn