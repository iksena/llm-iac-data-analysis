AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"
              StringLike:
                aws:SourceArn: !Sub "arn:aws:pipes:${AWS::Region}:${AWS::AccountId}:pipe/DynamoDBToEventBridgePipe"
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"

  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: DynamoDBToEventBridgePipe
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      SourceParameters:
        DynamoDBStreamParameters:
          BatchSize: 10
          StartingPosition: LATEST
          MaximumRetryAttempts: 3
      FilterCriteria:
        Filters:
          - Pattern: |
              {
                "dynamodb": {
                  "NewImage": {
                    "avatarUrl": {
                      "S": { "suffix": ".png" }
                    }
                  }
                }
              }
      TargetParameters:
        InputTemplate: |
          {
            "Detail": <aws.pipes.event.json>,
            "DetailType": "UserAvatarUpdated",
            "Source": "myapp.users"
          }