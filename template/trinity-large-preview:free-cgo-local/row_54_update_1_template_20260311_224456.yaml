AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralizedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Name
          Value: Centralized-Alerts-Topic
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - s3.amazonaws.com
                - lambda.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralizedSNSTopic
      Protocol: email
      Endpoint: admin@example.com

Outputs:
  SNSTopicARN:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedSNSTopic