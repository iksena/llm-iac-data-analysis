AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT Core to SQS via SNS message routing infrastructure'

Resources:
  IoTDataQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600

  IoTDataTopic:
    Type: 'AWS::SNS::Topic'

  IoTDataQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues: 
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'AllowSNSToSendMessage'
            Effect: Allow
            Principal:
              Service: 'sns.amazonaws.com'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref IoTDataTopic

  IoTRuleRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'iot.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSIoTRuleActions'

  IoTRulePolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${AWS::StackName}-iot-rule-policy'
      Roles:
        - !Ref IoTRuleRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'sns:Publish'
            Resource: !Ref IoTDataTopic

  IoTDataSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      Protocol: 'sqs'
      TopicArn: !Ref IoTDataTopic
      Endpoint: !GetAtt IoTDataQueue.Arn

  IoTDataRule:
    Type: 'AWS::IoT::TopicRule'
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTRuleRole.Arn

Outputs:
  QueueURL:
    Description: 'URL of the SQS Queue'
    Value: !Ref IoTDataQueue

  QueueARN:
    Description: 'ARN of the SQS Queue'
    Value: !GetAtt IoTDataQueue.Arn

  TopicARN:
    Description: 'ARN of the SNS Topic'
    Value: !Ref IoTDataTopic