AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy a Lambda function that manages AWS Security Hub controls.
  The function selectively disables specific compliance checks (CIS Benchmarks and AWS Foundational Security Best Practices)
  based on the parameter DisableCIS140Controls. It includes an IAM role for Lambda with an optional permissions boundary and
  CloudWatch Logs retention policies.

Parameters:
  DisableCIS140Controls:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: "Set to 'true' to disable CIS 1.4 controls for Security Hub; otherwise 'false'."
    
  PermissionsBoundary:
    Type: String
    Default: ""
    Description: "Enter the ARN of the permissions boundary to attach to IAM roles. Leave empty if not used."

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubControlManagerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:DescribeStandards
                  - securityhub:UpdateStandardsControl
                Resource: "*"
      Metadata:
        Comment: "Attach PermissionsBoundary if provided"
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref "AWS::NoValue"

  HasPermissionsBoundary:
    Type: "AWS::CloudFormation::CustomResource"
    Properties:
      ServiceToken: "dummy"  # This resource is used only in the intrinsic function below and never actually created.

  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubControlManagerFunction
      Runtime: python3.8
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import os
          import boto3
          import json

          def lambda_handler(event, context):
              disable_cis = os.environ.get('DISABLE_CIS140_CONTROLS', 'false').lower() == 'true'
              client = boto3.client('securityhub')
              # Fetch list of standards from Security Hub
              standards = client.describe_standards()['Standards']
              
              response_results = []
              
              # Loop over standards and update controls based on parameter
              for std in standards:
                  if 'CIS' in std.get('Name', '') and disable_cis:
                      # Example logic to update CIS controls
                      controls = client.describe_standards_controls(
                          StandardsArn=std['StandardsArn']
                      ).get('Controls', [])
                      for control in controls:
                          if '1.4' in control.get('ControlId', ''):
                              # Disable control by updating its enablement status
                              update_response = client.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='DISABLED'
                              )
                              response_results.append({'ControlId': control.get('ControlId'),
                                                       'Status': 'DISABLED'})
                  elif 'AWS Foundational' in std.get('Name', ''):
                      # Sample logic: ensure foundational controls remain enabled
                      controls = client.describe_standards_controls(
                          StandardsArn=std['StandardsArn']
                      ).get('Controls', [])
                      for control in controls:
                          update_response = client.update_standards_control(
                              StandardsControlArn=control['StandardsControlArn'],
                              ControlStatus='ENABLED'
                          )
                          response_results.append({'ControlId': control.get('ControlId'),
                                                   'Status': 'ENABLED'})
              return {
                  'statusCode': 200,
                  'body': json.dumps(response_results)
              }
      Environment:
        Variables:
          DISABLE_CIS140_CONTROLS: !Ref DisableCIS140Controls

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SecurityHubControlManagerFunction}"
      RetentionInDays: 14

Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Security Hub Control Manager Lambda Function"
    Value: !GetAtt SecurityHubControlManagerFunction.Arn
  LambdaExecutionRoleArn:
    Description: "ARN of the Lambda execution role"
    Value: !GetAtt LambdaExecutionRole.Arn