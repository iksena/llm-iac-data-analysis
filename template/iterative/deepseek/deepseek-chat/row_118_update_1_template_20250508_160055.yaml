AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow to enrich SQS messages with external API data and log results

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventPipeSourceQueue
      KmsMasterKeyId: alias/aws/sqs
      MessageRetentionPeriod: 1209600  # 14 days in seconds

  ApiGatewayConnection:
    Type: AWS::ApiGatewayV2::Connection
    Properties:
      Name: ZippopotamusConnection
      ConnectionType: HTTP
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyValue: 'dummy-key'  # Replace with actual key if required

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ZippopotamusApiDestination
      ConnectionArn: !GetAtt ApiGatewayConnection.Arn
      InvocationEndpoint: 'https://api.zippopotam.us/us'
      HttpMethod: GET
      InvocationRateLimitPerSecond: 10

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/event-pipes/enriched-messages
      RetentionInDays: 7

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  EnrichmentPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SqsToLogsWithEnrichment
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt SourceQueue.Arn
      Target: !GetAtt LogGroup.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 10
          MaximumBatchingWindowInSeconds: 30
      EnrichmentParameters:
        HttpParameters:
          PathParameterValues:
            - !Sub '${$.body.zipcode}'  # Assumes message contains zipcode field
      Enrichment: !GetAtt ApiDestination.Arn
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamName: enriched-messages

Outputs:
  SourceQueueUrl:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EnrichmentPipe.Arn
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref LogGroup
  ApiDestinationArn:
    Description: ARN of the API Destination
    Value: !GetAtt ApiDestination.Arn