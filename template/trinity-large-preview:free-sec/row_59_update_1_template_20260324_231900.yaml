AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
      RetentionPeriodHours: 24

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisStreamAlarms

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ReadProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 300
      Statistic: Sum
      Threshold: 1
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: WriteProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 300
      Statistic: Sum
      Threshold: 1
      AlarmActions:
        - Ref: AlarmTopic
      Dimensions:
        - Name: StreamName
          Value:
            Ref: KinesisStream

Outputs:
  StreamName:
    Description: Kinesis Data Stream Name
    Value:
      Ref: KinesisStream
  StreamARN:
    Description: Kinesis Data Stream ARN
    Value:
      Fn::GetAtt:
        - KinesisStream
        - StreamARN