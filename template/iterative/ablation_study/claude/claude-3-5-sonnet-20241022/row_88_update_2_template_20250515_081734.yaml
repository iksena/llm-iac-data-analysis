AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for AWS Service Catalog with S3 and Lambda permissions'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Role Configuration"
        Parameters:
          - RoleNamePrefix

Parameters:
  RoleNamePrefix:
    Type: String
    Default: 'sc-role'
    Description: 'Prefix for the IAM role name'
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9-]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters and hyphens'

Resources:
  ServiceCatalogRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${RoleNamePrefix}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - servicecatalog.amazonaws.com
            Action: 
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
      Path: '/service-role/'
      Tags:
        - Key: Purpose
          Value: ServiceCatalogAutomation

  ServiceCatalogPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Policy for Service Catalog to manage S3 and Lambda resources'
      Path: '/service-role/'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ServiceCatalogPermissions
            Effect: Allow
            Action:
              - 'servicecatalog:ProvisionProduct'
              - 'servicecatalog:UpdateProvisionedProduct'
              - 'servicecatalog:TerminateProvisionedProduct'
              - 'servicecatalog:ListProvisionedProducts'
            Resource: '*'
          
          - Sid: CloudFormationPermissions
            Effect: Allow
            Action:
              - 'cloudformation:CreateStack'
              - 'cloudformation:UpdateStack'
              - 'cloudformation:DeleteStack'
              - 'cloudformation:DescribeStacks'
              - 'cloudformation:ListStackResources'
            Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*'
          
          - Sid: LambdaPermissions
            Effect: Allow
            Action:
              - 'lambda:CreateFunction'
              - 'lambda:DeleteFunction'
              - 'lambda:GetFunction'
              - 'lambda:InvokeFunction'
              - 'lambda:UpdateFunctionCode'
              - 'lambda:UpdateFunctionConfiguration'
            Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*'
          
          - Sid: IAMPermissions
            Effect: Allow
            Action:
              - 'iam:GetRole'
              - 'iam:CreateRole'
              - 'iam:DeleteRole'
              - 'iam:PutRolePolicy'
              - 'iam:DeleteRolePolicy'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/service-role/*'
          
          - Sid: SNSPermissions
            Effect: Allow
            Action:
              - 'sns:CreateTopic'
              - 'sns:DeleteTopic'
              - 'sns:Publish'
              - 'sns:Subscribe'
            Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*'
      Roles:
        - !Ref ServiceCatalogRole

Outputs:
  ServiceCatalogRoleArn:
    Description: 'ARN of the Service Catalog Role'
    Value: !GetAtt ServiceCatalogRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
  
  ServiceCatalogRoleName:
    Description: 'Name of the Service Catalog Role'
    Value: !Ref ServiceCatalogRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'