AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for mobile notifications DynamoDB table with GSI and TTL

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: MobileNotifications
      AttributeDefinitions:
        - AttributeName: notificationId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
        - AttributeName: expiryTime
          AttributeType: N
      KeySchema:
        - AttributeName: notificationId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true
      Tags:
        - Key: Purpose
          Value: MobileNotifications
        - Key: Environment
          Value: Production

Outputs:
  TableARN:
    Description: ARN of the DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref NotificationsTable
  GSIName:
    Description: Name of the Global Secondary Index
    Value: TypeSentTimeIndex