AWSTemplateFormatVersion: '2010-09-09'
Description: AWS IP Address Manager (IPAM) with public/private scopes

Parameters:
  IpamDescription:
    Type: String
    Default: "Production IP Address Management"
    Description: "Description for the IPAM instance"

Resources:
  Ipam:
    Type: AWS::EC2::IPAM
    Properties:
      Description: !Ref IpamDescription
      OperatingRegions:
        - RegionName: !Ref "AWS::Region"

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !GetAtt Ipam.IpamId
      Description: "Public IP address scope"

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !GetAtt Ipam.IpamId
      Description: "Private IP address scope"

Outputs:
  IpamArn:
    Value: !GetAtt Ipam.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IpamArn"
  IpamId:
    Value: !Ref Ipam
    Export:
      Name: !Sub "${AWS::StackName}-IpamId"
  PublicScopeId:
    Value: !Ref PublicScope
    Export:
      Name: !Sub "${AWS::StackName}-PublicScopeId"
  PrivateScopeId:
    Value: !Ref PrivateScope
    Export:
      Name: !Sub "${AWS::StackName}-PrivateScopeId"