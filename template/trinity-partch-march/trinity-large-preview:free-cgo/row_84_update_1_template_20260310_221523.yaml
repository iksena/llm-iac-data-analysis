AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Macie session for automated sensitive data discovery and security monitoring.

Resources:
  MacieSession:
    Type: AWS::Macie::MacieSession
    Properties:
      FindingPublishingFrequency: FIFTEEN_MINUTES
      Status: ENABLED
      ServiceRoleArn: !GetAtt MacieServiceRole.Arn

  MacieServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: macie.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonMacieServiceRolePolicy

  MacieKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Macie encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: macie.amazonaws.com
            Action: kms:GenerateDataKey
            Resource: '*'

  MacieKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/macie-kms-key
      TargetKeyId: !Ref MacieKmsKey

Outputs:
  MacieSessionId:
    Description: Macie Session ID
    Value: !Ref MacieSession
    Export:
      Name: MacieSessionId

  MacieServiceRoleArn:
    Description: Macie Service Role ARN
    Value: !GetAtt MacieServiceRole.Arn
    Export:
      Name: MacieServiceRoleArn