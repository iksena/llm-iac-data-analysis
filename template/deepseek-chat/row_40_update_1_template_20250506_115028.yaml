AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for creating an SQS FIFO Queue

Parameters:
  QueueName:
    Type: String
    Default: MyQueue.fifo
    Description: Name of the FIFO queue (must end with .fifo suffix)
    AllowedPattern: '^[a-zA-Z0-9_-]+\.fifo$'
    ConstraintDescription: Queue name must end with .fifo suffix

  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: The visibility timeout in seconds for messages in the queue
    MinValue: 0
    MaxValue: 43200

  ContentBasedDeduplication:
    Type: String
    Default: 'false'
    Description: Enable content-based deduplication
    AllowedValues: ['true', 'false']

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Environment
          Value: Production
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  QueueURL:
    Description: URL of the created SQS FIFO Queue
    Value: !Ref SQSQueue

  QueueARN:
    Description: ARN of the created SQS FIFO Queue
    Value: !GetAtt SQSQueue.Arn