AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates a secure and cost-optimized S3 bucket for storing CloudWatch export data.
  The bucket is configured with server-side encryption, configurable versioning, automated lifecycle management,
  and enforced public access blocking (where supported).

Parameters:
  BucketName:
    Description: "The globally unique name for the S3 bucket."
    Type: String
  Versioning:
    Description: "Bucket versioning state: 'Enabled' or 'Suspended'."
    Type: String
    AllowedValues:
      - Enabled
      - Suspended
    Default: Enabled
  ExpirationDays:
    Description: "Number of days after which objects in the bucket will expire."
    Type: Number
    Default: 30

Conditions:
  DeployPublicAccessBlock: !Not [ !Equals [ !Ref "AWS::Region", "us-east-1" ] ]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref Versioning
      LifecycleConfiguration:
        Rules:
          - Id: ExpireObjectsRule
            Status: Enabled
            ExpirationInDays: !Ref ExpirationDays
            # To apply the rule to all objects, omit the Filter (do not set Prefix)
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      AccessControl: Private

  S3BucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Condition: DeployPublicAccessBlock
    DependsOn: S3Bucket
    Properties:
      Bucket: !Ref BucketName
      BlockPublicAcls: true
      BlockPublicPolicy: true
      IgnorePublicAcls: true
      RestrictPublicBuckets: true

Outputs:
  BucketNameOutput:
    Description: "The name of the S3 bucket."
    Value: !Ref S3Bucket
  BucketArn:
    Description: "The ARN of the S3 bucket."
    Value: !Join 
      - ""
      - - "arn:aws:s3:::"
        - !Ref S3Bucket