AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB and EventBridge

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: Name of the DynamoDB table
  EventBusName:
    Type: String
    Default: OrdersEventBus
    Description: Name of the EventBridge event bus

Resources:
  # IAM Role for EventBridge Pipes
  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-PipeExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetAccess-PipeAccess
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt OrdersEventBus.Arn

  # DynamoDB Table with Streams Enabled
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # EventBridge Event Bus
  OrdersEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
      EventSourceName: aws.partner/example.com/orders

  # Lambda Function for New Orders (INSERT)
  NewOrdersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: NewOrdersFunction
      Handler: index.handler
      Runtime: nodejs24.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = {
              statusCode: 200,
              body: JSON.stringify('New order processed'),
            };
            return response;
          };

  # Lambda Function for Order Updates (MODIFY)
  OrderUpdatesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: OrderUpdatesFunction
      Handler: index.handler
      Runtime: nodejs24.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = {
              statusCode: 200,
              body: JSON.stringify('Order updated'),
            };
            return response;
          };

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt OrdersEventBus.Arn

  # EventBridge Rule for New Orders (INSERT)
  NewOrdersRule:
    Type: AWS::Events::Rule
    Properties:
      Name: NewOrdersRule
      EventPattern:
        source:
          - aws.dynamodb
        detail-type:
          - 'DynamoDB Stream Record'
        detail:
          eventName:
            - INSERT
      Targets:
        - Arn: !GetAtt NewOrdersFunction.Arn
          Id: NewOrdersFunctionTarget

  # EventBridge Rule for Order Updates (MODIFY)
  OrderUpdatesRule:
    Type: AWS::Events::Rule
    Properties:
      Name: OrderUpdatesRule
      EventPattern:
        source:
          - aws.dynamodb
        detail-type:
          - 'DynamoDB Stream Record'
        detail:
          eventName:
            - MODIFY
      Targets:
        - Arn: !GetAtt OrderUpdatesFunction.Arn
          Id: OrderUpdatesFunctionTarget

Outputs:
  OrdersTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt OrdersTable.Arn
  OrdersEventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !GetAtt OrdersEventBus.Arn
  NewOrdersFunctionArn:
    Description: New Orders Function ARN
    Value: !GetAtt NewOrdersFunction.Arn
  OrderUpdatesFunctionArn:
    Description: Order Updates Function ARN
    Value: !GetAtt OrderUpdatesFunction.Arn