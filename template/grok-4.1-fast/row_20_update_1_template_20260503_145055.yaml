AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a CloudWatch Dashboard and Logs Insights Queries for monitoring AWS Client VPN usage patterns, including connections, data transfer, users, and auth breakdowns.'

Parameters:
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Log Group containing Client VPN logs (e.g., /aws/vpn/control)'
  DashboardName:
    Type: String
    Default: 'ClientVPN-Monitoring-Dashboard'
    Description: 'Name for the CloudWatch Dashboard'

Resources:
  ByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByEndpoint'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, endpointId, username, bytesReceived, bytesSent
        | filter event = "disconnect"
        | stats
          count() as Connections,
          sum(bytesReceived)/pow(1024,3) as IngressGB,
          sum(bytesSent)/pow(1024,3) as EgressGB,
          count_distinct(username) as DistinctUsers
        by endpointId
        | sort Connections desc
        | limit 50

  AuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByAuth'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, reason
        | filter event = "connect"
        | stats count() as Authentications
        by bin(1h),
          if(reason like /SAML/, "SAML",
            if(reason like /Active Directory/, "AD",
              if(reason like /certificate/, "Mutual Auth", "Other")))
        | sort @timestamp desc
        | limit 20

  TopUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/TopUsers'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, endpointId, username, bytesReceived, bytesSent
        | filter event = "disconnect"
        | stats
          count() as Sessions,
          sum(bytesReceived + bytesSent)/pow(1024,3) as TotalGB
        by username, endpointId
        | sort Sessions desc
        | limit 20

  DataTrendsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/DataTrends'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |
        fields @timestamp, bytesReceived, bytesSent
        | filter event = "disconnect"
        | stats
          sum(bytesReceived)/pow(1024,3) as IngressGB,
          sum(bytesSent)/pow(1024,3) as EgressGB
        by bin(1h)
        | sort @timestamp desc
        | limit 100

  ClientVpnDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "width": 24,
              "height": 3,
              "properties": {
                "markdown": "# AWS Client VPN Usage Monitoring\n\nCentralized view of connection durations, data transfer (ingress/egress), user activity, and auth breakdowns (AD/SAML, Mutual, Mixed)."
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 8,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${ByEndpointQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Endpoint-Specific Usage: Connections, Data Transfer, Distinct Users"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${AuthBreakdownQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Auth Type Breakdown (SAML/AD/Mutual/Other)"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${TopUsersQuery.QueryDefinitionId}"
                },
                "view": "table",
                "title": "Top Users: Sessions & Total Data"
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "queryDefinitionId": "${DataTrendsQuery.QueryDefinitionId}"
                },
                "view": "timeSeries",
                "title": "Data Transfer Trends (Ingress/Egress GB per Hour)"
              }
            }
          ]
        }
      Tags:
        - Key: Purpose
          Value: ClientVPNMonitoring

Outputs:
  DashboardName:
    Description: Name of the created dashboard
    Value: !Ref ClientVpnDashboard
  DashboardUrl:
    Description: Console URL to view the dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  ByEndpointQueryId:
    Description: ID of the ByEndpoint query
    Value: !GetAtt ByEndpointQuery.QueryDefinitionId
  AuthBreakdownQueryId:
    Description: ID of the AuthBreakdown query
    Value: !GetAtt AuthBreakdownQuery.QueryDefinitionId
  TopUsersQueryId:
    Description: ID of the TopUsers query
    Value: !GetAtt TopUsersQuery.QueryDefinitionId
  DataTrendsQueryId:
    Description: ID of the DataTrends query
    Value: !GetAtt DataTrendsQuery.QueryDefinitionId