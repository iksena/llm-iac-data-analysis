AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  SubnetId:
    Description: Subnet where the network interface will be created
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: Must be a valid subnet ID in the selected VPC
  SecondaryPrivateIp1:
    Description: First secondary private IP address for the ENI
    Type: String
    AllowedPattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$'
    ConstraintDescription: Must be a valid IPv4 address
  SecondaryPrivateIp2:
    Description: Second secondary private IP address for the ENI
    Type: String
    AllowedPattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$'
    ConstraintDescription: Must be a valid IPv4 address
Resources:
  PrimaryNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      SourceDestCheck: false
      SecondaryPrivateIpAddresses:
        - !Ref SecondaryPrivateIp1
        - !Ref SecondaryPrivateIp2
  PublicElasticIp1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  PublicElasticIp2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  IpAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PublicElasticIp1.AllocationId
      NetworkInterfaceId: !Ref PrimaryNetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp1
  IpAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PublicElasticIp2.AllocationId
      NetworkInterfaceId: !Ref PrimaryNetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp2
Outputs:
  NetworkInterfaceId:
    Description: ID of the created Elastic Network Interface
    Value: !Ref PrimaryNetworkInterface
  PublicIp1:
    Description: First public IP address
    Value: !GetAtt PublicElasticIp1.PublicIp
  PublicIp2:
    Description: Second public IP address
    Value: !GetAtt PublicElasticIp2.PublicIp
  PrivateIp1:
    Description: First secondary private IP address
    Value: !Ref SecondaryPrivateIp1
  PrivateIp2:
    Description: Second secondary private IP address
    Value: !Ref SecondaryPrivateIp2