AWSTemplateFormatVersion: '2010-09-09'
Description: Aurora MySQL Cluster with Custom Parameter Groups

Parameters:
  DBClusterIdentifier:
    Type: String
    Default: my-aurora-cluster
  MasterUsername:
    Type: String
    Default: admin
  DatabaseName:
    Type: String
    Default: mydatabase

Resources:
  CustomDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO'

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.12.0
      DBClusterIdentifier: !Ref DBClusterIdentifier
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:aurora-master-password:SecretString:password}}'
      DatabaseName: !Ref DatabaseName
      DBClusterParameterGroupName: !Ref CustomDBParameterGroup
      Port: 3306
      StorageEncrypted: true
      EnableHttpEndpoint: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref CustomDBParameterGroup

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref CustomDBParameterGroup

Outputs:
  MasterUsername:
    Description: Database master username
    Value: !Ref MasterUsername
  Endpoint:
    Description: Database endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  Port:
    Description: Database port
    Value: !GetAtt AuroraCluster.Endpoint.Port