AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create multi-threshold billing alarms using CloudWatch and SNS.
  It creates four CloudWatch alarms that monitor the AWS EstimatedCharges metric and send email notifications 
  via SNS when spending exceeds thresholds of $5, $10, $20, and $40. Alarms evaluate every 6 hours.

Resources:
  BillingAlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: BillingAlarmsNotifications
      Subscription:
        - Endpoint: xxxxx@gmail.com
          Protocol: email
  
  EstimatedChargesAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EstimatedChargesAlarm-$5"
      AlarmDescription: "Alarm when estimated AWS charges exceed $5"
      Namespace: "AWS/Billing"
      MetricName: "EstimatedCharges"
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: "USD"
      TreatMissingData: missing

  EstimatedChargesAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EstimatedChargesAlarm-$10"
      AlarmDescription: "Alarm when estimated AWS charges exceed $10"
      Namespace: "AWS/Billing"
      MetricName: "EstimatedCharges"
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: "USD"
      TreatMissingData: missing

  EstimatedChargesAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EstimatedChargesAlarm-$20"
      AlarmDescription: "Alarm when estimated AWS charges exceed $20"
      Namespace: "AWS/Billing"
      MetricName: "EstimatedCharges"
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: "USD"
      TreatMissingData: missing

  EstimatedChargesAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EstimatedChargesAlarm-$40"
      AlarmDescription: "Alarm when estimated AWS charges exceed $40"
      Namespace: "AWS/Billing"
      MetricName: "EstimatedCharges"
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - Ref: BillingAlarmSNSTopic
      Dimensions:
        - Name: Currency
          Value: "USD"
      TreatMissingData: missing

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic for billing alarms notifications.
    Value: !Ref BillingAlarmSNSTopic