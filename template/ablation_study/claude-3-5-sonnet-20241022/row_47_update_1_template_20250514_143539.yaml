AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role with Read-Only IAM Access for EC2 Instances'

Resources:
  EC2ReadOnlyIAMPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Allows read-only access to IAM resources'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  EC2IAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-ec2-iam-readonly-role'
      Description: 'Role for EC2 instances with read-only IAM access'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref EC2ReadOnlyIAMPolicy
      Path: '/'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-ec2-instance-profile'
      Path: '/'
      Roles:
        - !Ref EC2IAMRole

Outputs:
  RoleARN:
    Description: 'ARN of the created IAM Role'
    Value: !GetAtt EC2IAMRole.Arn

  RoleName:
    Description: 'Name of the created IAM Role'
    Value: !Ref EC2IAMRole

  InstanceProfileName:
    Description: 'Name of the created Instance Profile'
    Value: !Ref EC2InstanceProfile

  InstanceProfileARN:
    Description: 'ARN of the created Instance Profile'
    Value: !GetAtt EC2InstanceProfile.Arn