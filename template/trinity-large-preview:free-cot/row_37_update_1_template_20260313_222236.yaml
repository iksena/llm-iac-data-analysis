AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 Bucket Architecture with Replication and Access Logging

Parameters:
  PrimaryBucketName:
    Type: String
    Default: !Sub "secure-bucket-${AWS::AccountId}"
    Description: Name for the primary secure bucket
  ReplicaBucketName:
    Type: String
    Default: !Sub "replica-bucket-${AWS::AccountId}"
    Description: Name for the replica bucket
  LogBucketName:
    Type: String
    Default: !Sub "access-logs-${AWS::AccountId}"
    Description: Name for the access log bucket

Resources:
  # Access Log Bucket
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      AccessControl: Private
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 365

  # Replica Bucket
  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ReplicaBucketName
      AccessControl: Private
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER

  # Primary Secure Bucket
  PrimarySecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref PrimaryBucketName
      AccessControl: Private
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucketName
        LogPrefix: primary-bucket-logs/
      LifecycleConfiguration:
        Rules:
          - Id: ReplicateToReplica
            Status: Enabled
            Prefix: ""
            Destination:
              Bucket: !GetAtt ReplicaBucket.Arn
              StorageClass: STANDARD
            Status: Enabled

  # Bucket Policy for Secure Transport
  PrimaryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimarySecureBucket
      PolicyDocument:
        Version: "2012-10-17"
        Id: SecureTransportOnlyPolicy
        Statement:
          - Sid: RequireSecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${PrimaryBucketName}"
              - !Sub "arn:aws:s3:::${PrimaryBucketName}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  # Analytics Configuration for Monitoring
  PrimaryBucketAnalytics:
    Type: AWS::S3::BucketAnalyticsConfiguration
    Properties:
      Bucket: !Ref PrimarySecureBucket
      Id: AnalyticsConfig
      StorageClassAnalysis:
        DataExport:
          OutputSchemaVersion: V_1
          Destination:
            S3BucketDestination:
              Bucket: !GetAtt ReplicaBucket.Arn
              Prefix: analytics/

Outputs:
  PrimaryBucketName:
    Description: Name of the primary secure bucket
    Value: !Ref PrimarySecureBucket
  PrimaryBucketArn:
    Description: ARN of the primary secure bucket
    Value: !GetAtt PrimarySecureBucket.Arn
  ReplicaBucketName:
    Description: Name of the replica bucket
    Value: !Ref ReplicaBucket
  ReplicaBucketArn:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn
  LogBucketName:
    Description: Name of the access log bucket
    Value: !Ref AccessLogBucket
  LogBucketArn:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn