AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a private Route 53 hosted zone for internal DNS management'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'Select the VPC for the private hosted zone'

  DomainName:
    Type: String
    Default: 'www.example.com'
    Description: 'The domain name for the private hosted zone'
    AllowedPattern: '^([a-zA-Z0-9]+(-[a-zA-Z0-9]+)*\.)+[a-zA-Z]{2,}$'
    ConstraintDescription: 'Must be a valid domain name'

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS management'
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref AWS::Region
      HostedZoneTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-hosted-zone'
        - Key: Environment
          Value: Production

Outputs:
  HostedZoneId:
    Description: 'The ID of the hosted zone'
    Value: !Ref PrivateHostedZone

  DomainName:
    Description: 'The domain name of the hosted zone'
    Value: !Ref DomainName

  AssociatedVPC:
    Description: 'The VPC associated with the hosted zone'
    Value: !Ref VpcId