AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication.

Parameters:
  UserPoolName:
    Type: String
    Default: MyCognitoUserPool
    Description: The name of the Cognito User Pool.

  EmailVerificationSubject:
    Type: String
    Default: "Your verification code"
    Description: The subject of the email sent for verification.

  EmailVerificationMessage:
    Type: String
    Default: "Your verification code is {####}"
    Description: The message of the email sent for verification.

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      EmailVerificationSubject: !Ref EmailVerificationSubject
      EmailVerificationMessage: !Ref EmailVerificationMessage
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

Outputs:
  UserPoolId:
    Description: The ID of the Cognito User Pool
    Value: !Ref CognitoUserPool

  UserPoolArn:
    Description: The ARN of the Cognito User Pool
    Value: !GetAtt CognitoUserPool.Arn