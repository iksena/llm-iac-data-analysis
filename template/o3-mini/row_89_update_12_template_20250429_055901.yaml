AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready AWS CloudFormation template to create an AWS Security Hub instance,
  enable default security standards (CIS AWS Foundations Benchmark and AWS Foundational Security Best Practices),
  and optionally configure organization auto-enable using a Lambda-backed custom resource.

Parameters:
  EnableOrganizationConfiguration:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: "Set to true if this account is a Security Hub administrator for your Organization and you want to enable Organization Configuration; otherwise false."

Conditions:
  CreateOrganizationConfiguration:
    Fn::Equals: [!Ref EnableOrganizationConfiguration, "true"]

Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties: {}

  OrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    Condition: CreateOrganizationConfiguration
    DependsOn: SecurityHubHub
    Properties:
      AutoEnable: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EnableStandardsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:BatchEnableStandards
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  EnableStandardsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: EnableSecurityHubStandardsFunction
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import logging
          import boto3
          import urllib3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          http = urllib3.PoolManager()

          def send(event, context, responseStatus, responseData, physicalResourceId=None, noEcho=False):
              responseUrl = event['ResponseURL']
              responseBody = {
                  "Status": responseStatus,
                  "Reason": "See details in CloudWatch Log Stream: " + context.log_stream_name,
                  "PhysicalResourceId": physicalResourceId or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": noEcho,
                  "Data": responseData
              }
              json_responseBody = json.dumps(responseBody)
              headers = {
                  "content-type": "",
                  "content-length": str(len(json_responseBody))
              }
              response = http.request("PUT", responseUrl, body=json_responseBody, headers=headers)
              logger.info("CFN response status: %s", response.status)
              return response.status

          def lambda_handler(event, context):
              logger.info("Received event: %s", event)
              responseData = {}
              try:
                  if event["RequestType"] in ["Create", "Update"]:
                      client = boto3.client("securityhub")
                      standards = event["ResourceProperties"].get("StandardsArns", [])
                      if standards:
                          requests = [{"StandardsArn": arn} for arn in standards]
                          client.batch_enable_standards(StandardsSubscriptionRequests=requests)
                      responseData["Message"] = "Standards enabled successfully."
                      send(event, context, "SUCCESS", responseData)
                  elif event["RequestType"] == "Delete":
                      responseData["Message"] = "Delete request received. No action taken."
                      send(event, context, "SUCCESS", responseData)
              except Exception as e:
                  logger.exception("Error enabling standards: %s", e)
                  responseData["Message"] = str(e)
                  send(event, context, "FAILED", responseData)
                  raise

  EnableStandardsCustomResource:
    Type: Custom::EnableStandards
    DependsOn: SecurityHubHub
    Properties:
      ServiceToken: !GetAtt EnableStandardsFunction.Arn
      StandardsArns:
        - "arn:aws:securityhub:::standards/cis-aws-foundations-benchmark/v/1.2.0"
        - "arn:aws:securityhub:::standards/aws-foundational-security-best-practices/v/1.0.0"

Outputs:
  SecurityHubHubARN:
    Description: "ARN of the created AWS Security Hub instance."
    Value: !GetAtt SecurityHubHub.ARN

  OrganizationConfigurationStatus:
    Condition: CreateOrganizationConfiguration
    Description: "Indicates that Organization Configuration is enabled."
    Value: "Organization auto-enable configuration is active."

  StandardsEnablementStatus:
    Description: "Indicates that the security standards have been enabled via the custom resource."
    Value: "CIS AWS Foundations Benchmark and AWS Foundational Security Best Practices standards enabled."