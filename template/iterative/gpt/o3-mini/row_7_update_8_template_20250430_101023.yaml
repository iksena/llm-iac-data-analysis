AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation Template to deploy an EC2 instance (t3.micro) with AWS Systems Manager (SSM)
  enabled for secure remote management. The instance uses a region-specific AMI, is launched in a 
  specified subnet, and attaches a minimal security group within the provided VPC.

Parameters:
  VpcId:
    Description: VPC ID for creating the Security Group. Provide a valid VPC ID.
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: Subnet ID where the EC2 instance will be launched. Provide a valid Subnet ID.
    Type: AWS::EC2::Subnet::Id

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c94855ba95c71c99
    us-east-2:
      AMI: ami-0703c9afc4e1c3fa3
    us-west-1:
      AMI: ami-0bdb828fd58c52235
    us-west-2:
      AMI: ami-062f7200baf2fa504

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Minimal Security Group for EC2 instance with secure SSM access.
      VpcId: !Ref VpcId
      SecurityGroupIngress: []
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: SSM-Managed-Instance-SG

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: SSMInstanceRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref SSMInstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !FindInMap
        - RegionMap
        - !Ref "AWS::Region"
        - AMI
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: SSM-Managed-EC2Instance

Outputs:
  InstanceId:
    Description: The Instance ID of the EC2 instance.
    Value: !Ref EC2Instance