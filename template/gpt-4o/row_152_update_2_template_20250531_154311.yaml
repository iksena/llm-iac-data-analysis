AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create a secure, scalable Amazon Aurora MySQL cluster with RDS Proxy integration.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.
  Subnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the first subnet.
  Subnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the second subnet.
  DBInstanceClass:
    Type: String
    Default: db.r5.large
    Description: The instance class for the Aurora MySQL instances.
  AuroraMySQLVersion:
    Type: String
    Default: '5.7.mysql_aurora.2.10.0'
    Description: Aurora MySQL engine version.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1Cidr
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: AuroraSubnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2Cidr
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: AuroraSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL and RDS Proxy
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora MySQL
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: !Ref AuroraMySQLVersion
      MasterUsername: admin
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${Secret.Arn}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref SecurityGroup
      StorageEncrypted: true

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql

  Secret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: AuroraDBSecret
      Description: Secret for Aurora MySQL credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  RDSProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RDSProxySecretAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref Secret

  RDSProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: AuroraProxy
      EngineFamily: MYSQL
      RoleArn: !GetAtt RDSProxyRole.Arn
      VpcSubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2
      VpcSecurityGroupIds:
        - !Ref SecurityGroup
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref Secret
          IAMAuth: REQUIRED
      RequireTLS: true

Outputs:
  VPCId:
    Description: The VPC ID
    Value: !Ref VPC

  SubnetIds:
    Description: The Subnet IDs
    Value: !Join [',', [!Ref Subnet1, !Ref Subnet2]]

  AuroraClusterEndpoint:
    Description: The endpoint of the Aurora Cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address

  RDSProxyEndpoint:
    Description: The endpoint of the RDS Proxy
    Value: !GetAtt RDSProxy.Endpoint

  SecurityGroupId:
    Description: The Security Group ID
    Value: !Ref SecurityGroup