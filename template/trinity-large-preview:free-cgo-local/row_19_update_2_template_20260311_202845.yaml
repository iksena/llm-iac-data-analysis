AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection to external API with API key authentication
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: x-api-key
          ApiKeyValue:
            StaticValue:
              IsValueSecret: true
              Value: dummy-api-key

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      Description: API destination for webhook.site
      HttpMethod: POST
      InvocationEndpoint: https://webhook.site/testtest
      InvocationRateLimitPerSecond: 1

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      Description: Rule to send events to external API every minute
      ScheduleExpression: rate(1 minute)
      Targets:
        - Arn: !GetAtt ApiDestination.Arn
          Id: ApiDestinationTarget

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  ConnectionArn:
    Description: ARN of the API connection
    Value: !GetAtt ApiConnection.Arn
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn