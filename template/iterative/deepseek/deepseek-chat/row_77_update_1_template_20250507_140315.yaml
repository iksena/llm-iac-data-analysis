AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table for Supporter Product Data with environment-specific configurations'

Parameters:
  Stage:
    Type: String
    Description: 'Deployment environment stage'
    AllowedValues: [PROD, CODE]
    Default: CODE
    ConstraintDescription: 'Must be PROD or CODE'

  TableNamePrefix:
    Type: String
    Description: 'Prefix for DynamoDB table name'
    Default: 'SupporterProductData'
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Only alphanumeric characters and hyphens allowed'

Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']
  IsCode: !Equals [!Ref Stage, 'CODE']

Resources:
  SupporterProductTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TableNamePrefix}-${Stage}'
      AttributeDefinitions:
        - AttributeName: 'id'
          AttributeType: 'S'
        - AttributeName: 'expiryDate'
          AttributeType: 'N'
      KeySchema:
        - AttributeName: 'id'
          KeyType: 'HASH'
      BillingMode: !If [IsProd, 'PROVISIONED', 'PAY_PER_REQUEST']
      ProvisionedThroughput: !If 
        - IsProd
        - ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref 'AWS::NoValue'
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: 'expiryDate'
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: 'Environment'
          Value: !Ref Stage
        - Key: 'BackupRetention'
          Value: '35'
    DeletionPolicy: !If [IsProd, Retain, Delete]

  WriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Sub 'table/${SupporterProductTable}'
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/dynamodb.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_DynamoDBTable'
      ScalableDimension: 'dynamodb:table:WriteCapacityUnits'
      ServiceNamespace: 'dynamodb'

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: !Sub '${TableNamePrefix}-${Stage}-WriteScalingPolicy'
      PolicyType: 'TargetTrackingScaling'
      ScalableTargetARN: !Ref WriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: 'DynamoDBWriteCapacityUtilization'

Outputs:
  TableName:
    Description: 'Name of the DynamoDB table'
    Value: !Ref SupporterProductTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'

  TableArn:
    Description: 'ARN of the DynamoDB table'
    Value: !GetAtt SupporterProductTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'

  TableStage:
    Description: 'Stage of the deployed table'
    Value: !Ref Stage
    Export:
      Name: !Sub '${AWS::StackName}-TableStage'