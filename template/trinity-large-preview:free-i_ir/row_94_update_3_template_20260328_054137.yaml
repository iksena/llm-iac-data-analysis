AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with SSM Automation for OS updates, Nginx installation, and validation

Resources:
  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - Ref: IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::Sub: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      InstanceType: t3.micro
      IamInstanceProfile:
        Ref: InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Join:
            - ""
            - - "#!/bin/bash\n"
              - "sudo yum update -y\n"
              - "sudo yum install -y nginx\n"
              - "sudo systemctl start nginx\n"
              - "sudo systemctl enable nginx\n"

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: "1.0"
        description: Update OS, install Nginx, validate
        parameters: {}
        mainSteps:
          - name: UpdateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo yum update -y"
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - "sudo yum install -y nginx"
                - "sudo systemctl start nginx"
          - name: Validate
            action: aws:runShellScript
            inputs:
              runCommand:
                - "curl -f http://localhost || exit 1"
      DocumentType: Automation

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ssm-automation-logs
      VersioningConfiguration:
        Status: Enabled

  SSMAutomationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name:
        Ref: SSMAutomationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - Ref: EC2Instance

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value:
      Ref: EC2Instance
  AutomationDocumentName:
    Description: SSM Automation Document Name
    Value:
      Ref: SSMAutomationDocument