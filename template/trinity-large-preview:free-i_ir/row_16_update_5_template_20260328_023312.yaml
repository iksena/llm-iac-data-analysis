AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue resources for crawling and cataloging CloudTrail logs stored in S3

Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub 'cloudtrail_logs_${AWS::AccountId}'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: CloudTrailAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*
              - Effect: Allow
                Action:
                  - glue:*
                  - s3:GetBucketLocation
                  - s3:ListAllMyBuckets
                Resource: '*'

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: CloudTrailCrawler
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      Schedule:
        ScheduleExpression: 'cron(0 2 * * ? *)'
      Configuration: !Sub |
        {
          "Version":1.0,
          "CrawlerOutput": {
            "Tables": {
              "TablePrefix": "cloudtrail_"
            }
          },
          "SchemaChangePolicy": {
            "UpdateBehavior": "UpdateInDatabase",
            "DeleteBehavior": "DeprecateInDatabase"
          }
        }

Metadata:
  cfn-lint:
    config: {}