AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production EFS multi-AZ EC2 IAM mount, CW alarms, secure VPC/NACL/SG'

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  PublicSubnet1CidrBlock:
    Type: String
    Default: 10.0.1.0/24
    Description: Public subnet AZ1 CIDR
  PublicSubnet2CidrBlock:
    Type: String
    Default: 10.0.2.0/24
    Description: Public subnet AZ2 CIDR
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 KeyPair name
  AmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::