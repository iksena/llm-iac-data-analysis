AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with S3 Bucket and IAM Role

Parameters:
  EMRApplicationName:
    Type: String
    Default: emr-serverless-app
    Description: Name of the EMR Serverless application
  
  EMRVersion:
    Type: String
    Default: emr-6.15.0
    Description: EMR version for the serverless application
    
  MaximumCPU:
    Type: Number
    Default: 4
    Description: Maximum CPU units
    
  MaximumMemory:
    Type: Number
    Default: 8
    Description: Maximum memory in GB
    
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    Description: Idle timeout in minutes before auto-stop

Resources:
  EMRServerlessS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRServerlessServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub ${EMRServerlessS3Bucket.Arn}/*
                  - !GetAtt EMRServerlessS3Bucket.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*
              - Effect: Allow
                Action:
                  - emr-serverless:*
                Resource: '*'

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    DependsOn: EMRServerlessRole
    Properties:
      Name: !Ref EMRApplicationName
      ReleaseLabel: !Ref EMRVersion
      Type: Spark
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      MaximumCapacity:
        Cpu: !Ref MaximumCPU
        Memory: !Ref MaximumMemory

Outputs:
  EMRApplicationId:
    Description: EMR Serverless Application ID
    Value: !Ref EMRServerlessApplication

  S3BucketName:
    Description: S3 Bucket Name for EMR Serverless
    Value: !Ref EMRServerlessS3Bucket

  EMRServerlessRoleARN:
    Description: ARN of EMR Serverless IAM Role
    Value: !GetAtt EMRServerlessRole.Arn