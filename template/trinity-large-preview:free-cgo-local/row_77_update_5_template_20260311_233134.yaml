AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create environment-specific DynamoDB tables for supporter product data

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub SupporterProductData-${Stage}
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      ProvisionedThroughput:
        !If
          - IsProd
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: Enabled
      AutoScalingSettings:
        !If
          - IsProd
          - WriteCapacityUnits:
              MinUnits: 5
              MaxUnits: 500
              TargetTrackingScalingPolicyConfiguration:
                TargetValue: 70
                ScaleInCooldown: 60
                ScaleOutCooldown: 60
          - !Ref AWS::NoValue

Conditions:
  IsProd: !Equals [!Ref Stage, PROD]

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref SupporterProductDataTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt SupporterProductDataTable.Arn