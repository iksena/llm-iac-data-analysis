AWSTemplateFormatVersion: '2010-09-09'

Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      PermissionsBoundary: !Ref PermissionsBoundaryArn

  BedrockAgentPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BedrockAgentPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: '*'
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource:
              - arn:aws:lambda:*:*:*
      Roles:
        - !Ref BedrockAgentRole

Outputs:
  RoleArn:
    Description: ARN of the Bedrock Agent IAM Role
    Value: !GetAtt BedrockAgentRole.Arn