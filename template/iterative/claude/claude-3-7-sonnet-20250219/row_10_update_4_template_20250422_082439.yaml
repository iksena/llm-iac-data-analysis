AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instance with ephemeral drives in default VPC'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: m5d.large
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5d.large
      - m5d.xlarge
      - c5d.large
      - r5d.large
    ConstraintDescription: Must be a valid EC2 instance type with ephemeral storage support.

  KeyPairName:
    Description: Name of the SSH key pair
    Type: String
    Default: ec2-ephemeral-keypair

  RootVolumeSize:
    Description: Size of the root volume in GB
    Type: Number
    Default: 8
    MinValue: 8
    MaxValue: 100

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance with SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref KeyPairName

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      KeyName: !Ref EC2KeyPair
      SecurityGroupIds:
        - !GetAtt EC2SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      Tags:
        - Key: Name
          Value: EC2WithEphemeralDrives

Outputs:
  InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance

  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp

  KeyPairId:
    Description: ID of the created key pair
    Value: !GetAtt EC2KeyPair.KeyPairId

  KeyFingerprint:
    Description: Fingerprint of the created key pair
    Value: !GetAtt EC2KeyPair.KeyFingerprint

  SSHCommand:
    Description: Command to SSH into the instance (use your private key file)
    Value: !Sub "ssh -i ${KeyPairName}.pem ec2-user@${EC2Instance.PublicIp}"