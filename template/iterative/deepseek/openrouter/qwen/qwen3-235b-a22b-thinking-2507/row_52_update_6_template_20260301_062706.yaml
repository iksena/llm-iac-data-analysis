AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Region1Name:
    Type: String
    Default: us-east-1
    Description: Primary AWS region for application deployment
  Region2Name:
    Type: String
    Default: us-west-2
    Description: Secondary AWS region for application deployment
  HealthCheckEndpointRegion1:
    Type: String
    Description: Fully qualified domain name for region 1 application endpoint
    MinLength: 1
  HealthCheckEndpointRegion2:
    Type: String
    Description: Fully qualified domain name for region 2 application endpoint
    MinLength: 1
  HealthCheckProtocol:
    Type: String
    Default: HTTPS
    AllowedValues:
      - HTTP
      - HTTPS
    Description: Protocol for health checks
  WaitPeriodMs:
    Type: Number
    Default: 300000
    MinValue: 5000
    Description: Wait period in milliseconds before allowing routing changes (minimum 5000)

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControlConfig::Cluster
    Properties:
      Name: !Sub 'RecoveryCluster-${AWS::StackName}'
    Metadata:
      AWS::CloudFormation::DependsOn: []

  ControlPanel:
    Type: AWS::Route53RecoveryControlConfig::ControlPanel
    Properties:
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      Name: !Sub 'ControlPanel-${AWS::StackName}'
    Metadata:
      AWS::CloudFormation::DependsOn: RecoveryCluster

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControlConfig::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: !Sub 'RoutingControl-${Region1Name}'
    Metadata:
      AWS::CloudFormation::DependsOn: ControlPanel

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControlConfig::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: !Sub 'RoutingControl-${Region2Name}'
    Metadata:
      AWS::CloudFormation::DependsOn: ControlPanel

  SafetyRuleRegion1:
    Type: AWS::Route53RecoveryControlConfig::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: !Sub 'PreventLastActiveOff-${Region1Name}'
      SafetyRuleType: GATING
      WaitPeriodMs: !Ref WaitPeriodMs
      GatingControls:
        - !GetAtt RoutingControlRegion2.RoutingControlArn
      TargetControls:
        - !GetAtt RoutingControlRegion1.RoutingControlArn
    Metadata:
      AWS::CloudFormation::DependsOn:
        - RoutingControlRegion1
        - RoutingControlRegion2

  SafetyRuleRegion2:
    Type: AWS::Route53RecoveryControlConfig::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: !Sub 'PreventLastActiveOff-${Region2Name}'
      SafetyRuleType: GATING
      WaitPeriodMs: !Ref WaitPeriodMs
      GatingControls:
        - !GetAtt RoutingControlRegion1.RoutingControlArn
      TargetControls:
        - !GetAtt RoutingControlRegion2.RoutingControlArn
    Metadata:
      AWS::CloudFormation::DependsOn:
        - RoutingControlRegion1
        - RoutingControlRegion2

  HealthCheckRegion1:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: !Ref HealthCheckProtocol
        FullyQualifiedDomainName: !Ref HealthCheckEndpointRegion1
        RequestInterval: 30
        FailureThreshold: 3
        MeasureLatency: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub 'HealthCheck-${Region1Name}'

  HealthCheckRegion2:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: !Ref HealthCheckProtocol
        FullyQualifiedDomainName: !Ref HealthCheckEndpointRegion2
        RequestInterval: 30
        FailureThreshold: 3
        MeasureLatency: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub 'HealthCheck-${Region2Name}'

Outputs:
  ClusterArn:
    Description: ARN of the ARC cluster
    Value: !GetAtt RecoveryCluster.ClusterArn
  ControlPanelArn:
    Description: ARN of the ARC control panel
    Value: !GetAtt ControlPanel.ControlPanelArn
  RoutingControlRegion1Arn:
    Description: ARN of region 1 routing control
    Value: !GetAtt RoutingControlRegion1.RoutingControlArn
  RoutingControlRegion2Arn:
    Description: ARN of region 2 routing control
    Value: !GetAtt RoutingControlRegion2.RoutingControlArn
  SafetyRuleRegion1Arn:
    Description: ARN of region 1 safety rule
    Value: !GetAtt SafetyRuleRegion1.SafetyRuleArn
  SafetyRuleRegion2Arn:
    Description: ARN of region 2 safety rule
    Value: !GetAtt SafetyRuleRegion2.SafetyRuleArn
  HealthCheckRegion1Id:
    Description: ID of region 1 health check
    Value: !Ref HealthCheckRegion1
  HealthCheckRegion2Id:
    Description: ID of region 2 health check
    Value: !Ref HealthCheckRegion2