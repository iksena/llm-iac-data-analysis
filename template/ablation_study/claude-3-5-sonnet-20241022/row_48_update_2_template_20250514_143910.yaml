AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Glue ETL Job Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Environment name
  
  GlueJobName:
    Type: String
    Default: sample-etl-job
    Description: Name of the Glue ETL job
    
  GlueWorkerType:
    Type: String
    Default: G.1X
    AllowedValues:
      - G.1X
      - G.2X
    Description: The type of predefined worker that is allocated
    
  NumberOfWorkers:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10
    Description: Number of workers for the Glue job

Resources:
  GlueScriptsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${AWS::AccountId}-${Environment}-glue-scripts'
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  GlueServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Policies:
        - PolicyName: !Sub '${Environment}-glue-s3-access'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  GlueJob:
    Type: 'AWS::Glue::Job'
    DependsOn: GlueServiceRole
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: '4.0'
      Command:
        Name: glueetl
        PythonVersion: '3'
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/glue_scripts/sample_convert.py'
      DefaultArguments:
        '--job-language': python
        '--continuous-log-logGroup': !Sub '/aws-glue/jobs/${GlueJobName}'
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-metrics': 'true'
      MaxRetries: 0
      NumberOfWorkers: !Ref NumberOfWorkers
      WorkerType: !Ref GlueWorkerType
      ExecutionProperty:
        MaxConcurrentRuns: 1
      Tags:
        Environment: !Ref Environment

Outputs:
  ScriptsBucketName:
    Description: Name of the S3 bucket storing Glue scripts
    Value: !Ref GlueScriptsBucket

  GlueJobARN:
    Description: ARN of the created Glue job
    Value: !Ref GlueJob

  GlueServiceRoleARN:
    Description: ARN of the Glue service role
    Value: !GetAtt GlueServiceRole.Arn