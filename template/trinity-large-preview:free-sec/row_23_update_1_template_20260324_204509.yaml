AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: MyTable
      AttributeDefinitions:
        - AttributeName: PartitionKey
          AttributeType: S
        - AttributeName: SortKey
          AttributeType: N
      KeySchema:
        - AttributeName: PartitionKey
          KeyType: HASH
        - AttributeName: SortKey
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  DynamoDBTablePolicy:
    Type: AWS::DynamoDB::TablePolicy
    Properties:
      PolicyName: MyTablePolicy
      TableName: !Ref MyDynamoDBTable
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/MyIAMRole'
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt MyDynamoDBTable.Arn

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt MyDynamoDBTable.Arn
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref MyDynamoDBTable