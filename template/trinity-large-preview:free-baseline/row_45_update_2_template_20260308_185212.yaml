AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Kinesis Data Firehose stream with server-side encryption and CloudWatch error logging

Resources:
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  CloudWatchLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref CloudWatchLogGroup

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseRole

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamEncryptionConfigurationInput:
        KeyARN: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/s3'
        KeyType: AWS_OWNED_CMK
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:${AWS::Partition}:s3:::${AWS::NoValue}'
        ErrorOutputPrefix: 'error/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref CloudWatchLogGroup
          LogStreamName: !Ref CloudWatchLogStream
        ProcessingConfiguration:
          Enabled: false
        S3BackupMode: Disabled
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        Prefix: 'firehose/'
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn

Outputs:
  FirehoseStreamName:
    Description: The name of the created Firehose delivery stream
    Value: !Ref FirehoseDeliveryStream