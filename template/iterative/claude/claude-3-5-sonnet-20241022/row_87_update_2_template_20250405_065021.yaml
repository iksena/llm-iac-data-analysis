AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an S3 bucket for Lambda artifacts and KMS key for encryption'

Parameters:
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the KMS key
    AllowedPattern: '^arn:aws:iam::\d{12}:role/[a-zA-Z0-9+=,.@\-_/]+$'
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    MinLength: 3
    MaxLength: 63

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda artifacts encryption
      EnableKeyRotation: true
      PendingWindowInDays: 7
      Tags:
        - Key: Purpose
          Value: LambdaArtifacts
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-policy
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowServiceRoleAccess
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-lambda-artifacts'
      TargetKeyId: !Ref KMSKey

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Purpose
          Value: LambdaArtifacts

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${ArtifactsBucket.Arn}/*'
            Condition:
              IpAddress:
                aws:SourceIp:
                  - '0.0.0.0/0'

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref ArtifactsBucket
  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt ArtifactsBucket.Arn
  KMSKeyId:
    Description: ID of the created KMS key
    Value: !Ref KMSKey
  KMSKeyArn:
    Description: ARN of the created KMS key
    Value: !GetAtt KMSKey.Arn
  KMSKeyAlias:
    Description: Alias of the created KMS key
    Value: !Ref KMSKeyAlias