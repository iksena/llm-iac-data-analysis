AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Creates a Greengrass group with supporting AWS services.

Resources:
  GreengrassGroup:
    Type: AWS::Greengrass::Group
    Properties:
      Name: MyGreengrassGroup
      RoleArn: !GetAtt GreengrassGroupRole.Arn

  GreengrassGroupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: greengrass.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: GreengrassGroupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - greengrass:*
                  - logs:*
                  - iot:*
                  - lambda:*
                  - ec2:DescribeInstances
                Resource: '*'

  GreengrassCoreDefinition:
    Type: AWS::Greengrass::CoreDefinition
    Properties:
      Name: MyCoreDefinition
      InitialVersion:
        Cores:
          - Id: Core1
            CertificateArn: !Ref GreengrassCoreCertificate
            SyncShadow: true

  GreengrassCoreDefinitionVersion:
    Type: AWS::Greengrass::CoreDefinitionVersion
    Properties:
      CoreDefinitionId: !Ref GreengrassCoreDefinition
      Cores:
        - Id: Core1
          CertificateArn: !Ref GreengrassCoreCertificate
          SyncShadow: true

  GreengrassCoreCertificate:
    Type: AWS::Greengrass::CoreDefinitionVersion
    Properties:
      CoreDefinitionId: !Ref GreengrassCoreDefinition
      Cores:
        - Id: Core1
          CertificateArn: !Ref GreengrassCoreCertificate
          SyncShadow: true

  GreengrassDeviceDefinition:
    Type: AWS::Greengrass::DeviceDefinition
    Properties:
      Name: MyDeviceDefinition
      InitialVersion:
        Devices: []

  GreengrassDeviceDefinitionVersion:
    Type: AWS::Greengrass::DeviceDefinitionVersion
    Properties:
      DeviceDefinitionId: !Ref GreengrassDeviceDefinition
      Devices: []

  GreengrassSubscriptionDefinition:
    Type: AWS::Greengrass::SubscriptionDefinition
    Properties:
      Name: MySubscriptionDefinition
      InitialVersion:
        Subscriptions: []

  GreengrassSubscriptionDefinitionVersion:
    Type: AWS::Greengrass::SubscriptionDefinitionVersion
    Properties:
      SubscriptionDefinitionId: !Ref GreengrassSubscriptionDefinition
      Subscriptions: []

  GreengrassFunctionDefinition:
    Type: AWS::Greengrass::FunctionDefinition
    Properties:
      Name: MyFunctionDefinition
      InitialVersion:
        Functions: []

  GreengrassFunctionDefinitionVersion:
    Type: AWS::Greengrass::FunctionDefinitionVersion
    Properties:
      FunctionDefinitionId: !Ref GreengrassFunctionDefinition
      Functions: []

  MyLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://my-bucket/my-lambda-function.zip
      MemorySize: 128
      Timeout: 30

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701
      InstanceType: t2.micro


Outputs:
  GreengrassGroupId:
    Value: !Ref GreengrassGroup
    Description: The ARN of the Greengrass Group.
  GreengrassGroupRoleArn:
    Value: !GetAtt GreengrassGroupRole.Arn
    Description: The ARN of the Greengrass Group Role.

