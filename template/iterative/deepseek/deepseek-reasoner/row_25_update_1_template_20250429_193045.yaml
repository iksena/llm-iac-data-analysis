AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DeviceDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDeviceDataQueue

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeviceDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IoTTopic
      Queues:
        - !Ref DeviceDataQueue

  IoTTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: IoTDeviceDataTopic

  SNSToSQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref IoTTopic
      Protocol: sqs
      Endpoint: !GetAtt DeviceDataQueue.Arn

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SNSPublishAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTTopic

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTTopic
              RoleArn: !GetAtt IoTRuleRole.Arn
        AwsIotSqlVersion: '2016-03-23'

Outputs:
  SQSQueueURL:
    Value: !Ref DeviceDataQueue
  SQSQueueARN:
    Value: !GetAtt DeviceDataQueue.Arn
  SNSTopicARN:
    Value: !Ref IoTTopic
  IoTRuleName:
    Value: !Ref IoTRule