AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB table with streaming and EventBridge integration

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: Name of the DynamoDB table
  StreamViewType:
    Type: String
    Default: NEW_AND_OLD_IMAGES
    AllowedValues:
      - NEW_AND_OLD_IMAGES
      - NEW_IMAGE
      - OLD_IMAGE
      - KEYS_ONLY
    Description: Type of data to capture in DynamoDB stream

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: !Ref StreamViewType
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgeEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: OrdersEventBus

  DynamoDBStreamPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: DynamoDBStreamToEventBridge
      Source:
        DynamoDBStream:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        EventBridgeEventBus:
          EventBusName: !Ref EventBridgeEventBus
      Enrichment: NONE
      Filter:
        EventPattern:
          source:
            - aws:dynamodb
          detail:
            operation:
              - INSERT
              - MODIFY
      RoleArn: !GetAtt PipeRole.Arn

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBridgeEventBus}'

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref DynamoDBTable
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref EventBridgeEventBus
  PipeArn:
    Description: Pipe ARN
    Value: !GetAtt DynamoDBStreamPipe.Arn