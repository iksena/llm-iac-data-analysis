AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB Table with Local and Global Secondary Indexes

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  PartitionKey:
    Type: String
    Default: id
    Description: Primary partition key name
  SortKey:
    Type: String
    Default: timestamp
    Description: Primary sort key name (if needed)
  CategoryKey:
    Type: String
    Default: category
    Description: Attribute name for GSI partition key

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKey
          AttributeType: S
        - AttributeName: !Ref SortKey
          AttributeType: S
        - AttributeName: !Ref CategoryKey
          AttributeType: S
      KeySchema:
        - AttributeName: !Ref PartitionKey
          KeyType: HASH
        - AttributeName: !Ref SortKey
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      LocalSecondaryIndexes:
        - IndexName: LSIByTimestamp
          KeySchema:
            - AttributeName: !Ref PartitionKey
              KeyType: HASH
            - AttributeName: !Ref SortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSIByCategory
          KeySchema:
            - AttributeName: !Ref CategoryKey
              KeyType: HASH
            - AttributeName: !Ref SortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref MyDynamoDBTable
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt MyDynamoDBTable.Arn