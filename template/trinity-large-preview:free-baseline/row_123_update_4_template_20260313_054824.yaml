AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API

Parameters:
  StripeAPIKey:
    Type: String
    Description: Stripe API key for authentication
    Default: sk_test_dummykey
    NoEcho: true
  EventSourceName:
    Type: String
    Description: Event source name for the event bus
    Default: aws.partner/PartnerApp/PartnerAppDetailType

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: StripeIntegrationBus
      EventSourceName: !Ref EventSourceName

  APIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductAPI
      Description: API destination for Stripe product creation
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt Connection.Arn

  Connection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: Authorization
        ApiKeyValue: !Ref StripeAPIKey

Outputs:
  EventBusArn:
    Description: Event Bus ARN
    Value: !GetAtt EventBus.Arn
  APIDestinationArn:
    Description: API Destination ARN
    Value: !GetAtt APIDestination.Arn