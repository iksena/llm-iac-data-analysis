AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EC2 IP Address Manager (IPAM) with exported identifiers for cross-stack references

Parameters:
  IPAMName:
    Type: String
    Default: DefaultIPAM
    Description: Name for the IPAM
  Description:
    Type: String
    Default: Managed IP Address Manager
    Description: Description for the IPAM
  OperatingRegions:
    Type: String
    Default: !Ref 'AWS::Region'
    Description: Comma-separated list of regions where IPAM will be active

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      IpamName: !Ref IPAMName
      Description: !Ref Description
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      IpamScopeType: public
      IpamScopeName: PublicScope
      CidrAuthorizationContext:
        Message: Public IP address scope
        Signature: default

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref IPAM
      IpamScopeType: private
      IpamScopeName: PrivateScope
      CidrAuthorizationContext:
        Message: Private IP address scope
        Signature: default

  PublicPool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamId: !Ref IPAM
      IpamScopeId: !Ref PublicScope
      PoolName: PublicPool
      Cidr: 0.0.0.0/0
      Description: Public IP address pool
      AllocationMethod: automatic

  PrivatePool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamId: !Ref IPAM
      IpamScopeId: !Ref PrivateScope
      PoolName: PrivatePool
      Cidr: 10.0.0.0/8
      Description: Private IP address pool
      AllocationMethod: automatic

Outputs:
  IPAMARN:
    Description: IPAM ARN
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ARN'
  IPAMID:
    Description: IPAM ID
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAM-ID'
  PublicScopeID:
    Description: Public Scope ID
    Value: !Ref PublicScope
    Export:
      Name: !Sub '${AWS::StackName}-Public-Scope-ID'
  PrivateScopeID:
    Description: Private Scope ID
    Value: !Ref PrivateScope
    Export:
      Name: !Sub '${AWS::StackName}-Private-Scope-ID'