AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with S3, Lambda, and Cognito

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-assets
    Description: Name of the S3 bucket for static website hosting
  LambdaFunctionName:
    Type: String
    Default: SlotMachineFunction
    Description: Name of the Lambda function for slot machine logic
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool
  SourceZipUrl:
    Type: String
    Default: https://example.com/slot-machine-assets.zip
    Description: URL to download the pre-built website assets ZIP file

Resources:
  SlotMachineLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SlotMachineLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt SlotMachineLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎'];
            const results = [
              symbols[Math.floor(Math.random() * symbols.length)],
              symbols[Math.floor(Math.random() * symbols.length)],
              symbols[Math.floor(Math.random() * symbols.length)]
            ];
            const isWin = results[0] === results[1] && results[1] === results[2];
            const payout = isWin ? 100 : 0;
            return {
              statusCode: 200,
              body: JSON.stringify({
                results,
                isWin,
                payout
              })
            };
          };

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true

  CognitoIdentityPoolRoleMapping:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthRole.Arn

  UnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${CognitoIdentityPoolName}-UnauthRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action:
              - sts:AssumeRole
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambdaFunction.Arn

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${WebsiteBucketName}/*

  CustomDeployWebsite:
    Type: Custom::DeployWebsite
    Properties:
      ServiceToken: !GetAtt DeployLambdaFunction.Arn
      SourceZipUrl: !Ref SourceZipUrl
      WebsiteBucketName: !Ref WebsiteBucketName
      CognitoIdentityPoolId: !Ref CognitoIdentityPool
      LambdaFunctionName: !Ref LambdaFunctionName
      AwsRegion: !Ref AWS::Region

  DeployLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeployLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${WebsiteBucketName}/*

  DeployLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: DeployLambdaFunction
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt DeployLambdaRole.Arn
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const https = require('https');
          const zlib = require('zlib');

          exports.handler = async (event) => {
            const s3 = new AWS.S3();
            const bucketName = event.ResourceProperties.WebsiteBucketName;
            const cognitoId = event.ResourceProperties.CognitoIdentityPoolId;
            const lambdaName = event.ResourceProperties.LambdaFunctionName;
            const region = event.ResourceProperties.AwsRegion;
            const zipUrl = event.ResourceProperties.SourceZipUrl;

            // Download ZIP file
            const zipData = await new Promise((resolve, reject) => {
              https.get(zipUrl, (res) => {
                const chunks = [];
                res.on('data', (chunk) => chunks.push(chunk));
                res.on('end', () => resolve(Buffer.concat(chunks)));
                res.on('error', reject);
              }).on('error', reject);
            });

            // Extract ZIP
            const archive = await new Promise((resolve, reject) => {
              zlib.gunzip(zipData, (err, buffer) => {
                if (err) reject(err);
                else resolve(buffer);
              });
            });

            // Parse as ZIP (simplified - in real implementation would use a ZIP library)
            // For this example, we'll assume it's a single HTML file with placeholders
            const htmlContent = archive.toString();

            // Replace placeholders
            const modifiedContent = htmlContent
              .replace('{{COGNITO_IDENTITY_POOL_ID}}', cognitoId)
              .replace('{{LAMBDA_FUNCTION_NAME}}', lambdaName)
              .replace('{{AWS_REGION}}', region);

            // Upload to S3
            await s3.putObject({
              Bucket: bucketName,
              Key: 'index.html',
              Body: modifiedContent,
              ContentType: 'text/html'
            }).promise();

            return {
              Status: 'SUCCESS',
              PhysicalResourceId: bucketName,
              Reason: 'Website deployed successfully'
            };
          };

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the static website
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineLambdaFunction.Arn
    Description: ARN of the Lambda function
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: ID of the Cognito Identity Pool