AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating KMS Key with Alias'

Parameters:
  KeyDescription:
    Type: String
    Default: 'KMS key for encryption'
    Description: 'Description for the KMS key'
  
  DeletionWindowInDays:
    Type: Number
    Default: 30
    MinValue: 7
    MaxValue: 30
    Description: 'Duration in days before the key is deleted'
  
  EnableKeyRotation:
    Type: String
    Default: 'true'
    AllowedValues: 
      - 'true'
      - 'false'
    Description: 'Enable automatic key rotation'

Resources:
  EncryptionKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: !Ref KeyDescription
      EnableKeyRotation: !Ref EnableKeyRotation
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      PendingWindowInDays: !Ref DeletionWindowInDays
      Tags:
        - Key: 'Purpose'
          Value: 'Encryption'
        - Key: 'Environment'
          Value: 'Production'
        - Key: 'ManagedBy'
          Value: 'CloudFormation'

  EncryptionKeyAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: 'alias/encryption-key'
      TargetKeyId: !Ref EncryptionKey

Outputs:
  KeyId:
    Description: 'KMS Key ID'
    Value: !Ref EncryptionKey
    Export:
      Name: !Sub '${AWS::StackName}-KeyId'

  KeyArn:
    Description: 'KMS Key ARN'
    Value: !GetAtt EncryptionKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KeyArn'

  KeyAlias:
    Description: 'KMS Key Alias'
    Value: !Ref EncryptionKeyAlias
    Export:
      Name: !Sub '${AWS::StackName}-KeyAlias'

  KeyAliasArn:
    Description: 'KMS Key Alias ARN'
    Value: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:${EncryptionKeyAlias}'
    Export:
      Name: !Sub '${AWS::StackName}-KeyAliasArn'