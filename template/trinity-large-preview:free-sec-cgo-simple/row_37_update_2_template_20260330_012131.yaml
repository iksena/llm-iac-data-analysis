AWSTemplateFormatVersion: '2010-09-09'

Resources:
  PrimaryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'secure-bucket-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: primary-bucket-logs/
      Metadata:
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain

  PrimaryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PrimaryBucket
      PolicyDocument:
        Version: '2012-10-17'
        Id: SecureTransportPolicy
        Statement:
          - Sid: RequireSecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${PrimaryBucket}/*'
              - !Sub 'arn:aws:s3:::${PrimaryBucket}'
            Condition:
              Bool:
                'aws:SecureTransport': false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'replica-bucket-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Metadata:
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain

  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'access-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Metadata:
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain

Outputs:
  PrimaryBucketWebsiteURL:
    Description: Primary Bucket Website URL
    Value: !GetAtt PrimaryBucket.WebsiteURL
  PrimaryBucketDomainName:
    Description: Primary Bucket Domain Name
    Value: !GetAtt PrimaryBucket.DomainName