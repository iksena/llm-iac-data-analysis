AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon EFS file system in us-east-1a for testing environment'

Parameters:
  VpcId:
    Type: 'AWS::EC2::VPC::Id'
    Description: 'The VPC ID where the EFS file system will be created'
    Default: ''
  
  SubnetId:
    Type: 'AWS::EC2::Subnet::Id'
    Description: 'The subnet ID in us-east-1a where the mount target will be created'
    Default: ''
  
  VpcCidr:
    Type: 'String'
    Description: 'CIDR block of the VPC for security group access'
    Default: '10.0.0.0/16'

Conditions:
  HasVpcId: !Not [!Equals [!Ref VpcId, '']]
  HasSubnetId: !Not [!Equals [!Ref SubnetId, '']]

Resources:
  EFSSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Condition: HasVpcId
    Properties:
      GroupDescription: 'Security group for EFS access'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref VpcCidr

  EFSFileSystem:
    Type: 'AWS::EFS::FileSystem'
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  EFSMountTarget:
    Type: 'AWS::EFS::MountTarget'
    Condition: HasSubnetId
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !If [HasVpcId, !GetAtt EFSSecurityGroup.GroupId, !Ref 'AWS::NoValue']

Outputs:
  FileSystemId:
    Description: 'The ID of the created EFS file system'
    Value: !Ref EFSFileSystem
  MountTargetId:
    Description: 'The ID of the mount target'
    Value: !If [HasSubnetId, !Ref EFSMountTarget, !Ref 'AWS::NoValue']
  SecurityGroupId:
    Description: 'The ID of the security group created for EFS access'
    Value: !If [HasVpcId, !Ref EFSSecurityGroup, !Ref 'AWS::NoValue']