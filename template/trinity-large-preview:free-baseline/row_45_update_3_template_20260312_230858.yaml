AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Kinesis Data Firehose stream with server-side encryption and error logging to CloudWatch.

Resources:
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-FirehoseErrorLogGroup

  CloudWatchLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref CloudWatchLogGroup
      LogStreamName: !Sub ${AWS::StackName}-FirehoseErrorLogStream

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub ${AWS::StackName}-FirehoseStream
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub arn:${AWS::Partition}:s3:::${AWS::NoValue}
        ErrorOutputPrefix: error-logs/
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref CloudWatchLogGroup
          LogStreamName: !Ref CloudWatchLogStream
        EncryptionConfiguration:
          NoEncryptionConfig: NoEncryption
        Prefix: firehose/
        RoleARN: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/firehose_delivery_role

Outputs:
  DeliveryStreamName:
    Description: The name of the created Kinesis Data Firehose delivery stream
    Value: !Ref FirehoseDeliveryStream