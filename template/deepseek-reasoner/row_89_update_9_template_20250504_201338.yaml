AWSTemplateFormatVersion: '2010-09-09'
Description: Security Hub with idempotent standards enablement and proper custom resource handling
Parameters:
  Region:
    Type: String
    Default: us-east-1
Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true
      ControlFindingGenerator: SECURITY_CONTROL

  StandardsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:*
                Resource: '*'

  StandardsLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt StandardsLambdaRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          from botocore.config import Config
          
          config = Config(retries={'max_attempts': 10, 'mode': 'standard'})
          securityhub = boto3.client('securityhub', config=config)
          
          def lambda_handler(event, context):
              response_data = {}
              physical_id = 'securityhub-standard-' + event['ResourceProperties']['StandardArn'].split('/')[-2]
              
              try:
                  # Handle delete event
                  if event['RequestType'] == 'Delete':
                      subscriptions = securityhub.get_enabled_standards()['StandardsSubscriptions']
                      sub_id = next((s['StandardsSubscriptionArn'] for s in subscriptions 
                                  if s['StandardsArn'] == event['ResourceProperties']['StandardArn']), None)
                      if sub_id:
                          securityhub.batch_disable_standards(
                              StandardsSubscriptionArns=[sub_id]
                          )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_id)
                      return
                  
                  standard_arn = event['ResourceProperties']['StandardArn']
                  
                  # Check existing standards
                  enabled_standards = securityhub.get_enabled_standards()['StandardsSubscriptions']
                  existing = next((s for s in enabled_standards if s['StandardsArn'] == standard_arn), None)
                  
                  if not existing:
                      # Enable standard with retries
                      securityhub.batch_enable_standards(
                          StandardsSubscriptionRequests=[{'StandardsArn': standard_arn}]
                      )
                      response_data['Message'] = f"Enabled standard {standard_arn}"
                  else:
                      response_data['Message'] = f"Standard {standard_arn} already enabled"
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physical_id)
              
              except Exception as e:
                  response_data['Error'] = str(e)
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data, physical_id)

  CISStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 
        - 'arn:aws:securityhub:${Region}::standards/cis-aws-foundations-benchmark/v/1.4.0'
        - { Region: !Ref Region }
    DependsOn: SecurityHub

  AWSFoundationalStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 
        - 'arn:aws:securityhub:${Region}::standards/aws-foundational-security-best-practices/v/1.0.0'
        - { Region: !Ref Region }
    DependsOn: SecurityHub

  PCIStandard:
    Type: Custom::SecurityHubStandard
    Properties:
      ServiceToken: !GetAtt StandardsLambda.Arn
      StandardArn: !Sub 
        - 'arn:aws:securityhub:${Region}::standards/pci-dss/v/3.2.1'
        - { Region: !Ref Region }
    DependsOn: SecurityHub

Outputs:
  SecurityHubStatus:
    Value: !Ref SecurityHub
    Description: Security Hub activation status
  CISStandardStatus:
    Value: !GetAtt CISStandard.Message
  AWSFoundationalStandardStatus:
    Value: !GetAtt AWSFoundationalStandard.Message
  PCIStandardStatus:
    Value: !GetAtt PCIStandard.Message