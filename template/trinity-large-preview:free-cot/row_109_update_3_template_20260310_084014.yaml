AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB API Integration with Dead-Letter Queue

Parameters:
  MongoDBURL:
    Type: String
    Default: 'www.testanu.com'
    Description: MongoDB API endpoint URL
  ApiKeyName:
    Type: String
    Default: 'test_name'
    Description: Name of the API key for authentication
  ApiKeyValue:
    Type: String
    Default: 'test_value'
    Description: Value of the API key for authentication
  EventBusName:
    Type: String
    Default: 'CustomEventBus'
    Description: Name of the custom EventBridge event bus
  ApiDestinationName:
    Type: String
    Default: 'MongoDBApiDestination'
    Description: Name of the API destination
  ConnectionName:
    Type: String
    Default: 'MongoDBConnection'
    Description: Name of the EventBridge connection
  QueueName:
    Type: String
    Default: 'EventBridgeDeadLetterQueue'
    Description: Name of the dead-letter SQS queue
  IAMRoleName:
    Type: String
    Default: 'EventBridgeMongoDBInvokerRole'
    Description: Name of the IAM role for EventBridge

Resources:
  EventBridgeDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      MessageRetentionPeriod: 1209600 # 14 days in seconds

  EventBridgeDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventBridgeDeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EventBridgeDeadLetterQueue.Arn

  EventBridgeMongoDBInvokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref IAMRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:apidestination/${ApiDestinationName}'

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Ref ConnectionName
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: !Ref ApiKeyName
        ApiKeyValue: !Ref ApiKeyValue

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Ref ApiDestinationName
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: !Ref MongoDBURL
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

Outputs:
  CustomEventBusArn:
    Description: ARN of the custom EventBridge event bus
    Value: !GetAtt CustomEventBus.Arn
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn
  DeadLetterQueueUrl:
    Description: URL of the dead-letter SQS queue
    Value: !Ref EventBridgeDeadLetterQueue