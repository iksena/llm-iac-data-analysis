AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  StrictBoundaryEnforcement:
    Type: Boolean
    Default: true
    Description: Enable strict permission boundary enforcement for developer-created IAM resources

Resources:
  DeveloperIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperIAMRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      PermissionsBoundary:
        Fn::If:
          - StrictBoundaryEnforcement
          - !Ref DeveloperPermissionBoundaryPolicy
          - !Ref AWS::NoValue
      Tags:
        - Key: Owner
          Value: !Sub ${AWS::StackName}-Team

  DeveloperPermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: StrictBoundaryEnforcement
    Properties:
      ManagedPolicyName: DeveloperPermissionBoundaryPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
              - iam:Get*
              - iam:List*
              - iam:Generate*
            Resource: '*'

  DeveloperIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DeveloperIAMPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:TagRole
              - iam:UntagRole
              - iam:TagPolicy
              - iam:UntagPolicy
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:*
            Resource: '*'
            Condition:
              StringNotLike:
                iam:RolePath: '*/MyTeam*'
          - Effect: Deny
            Action:
              - iam:*
            Resource: '*'
            Condition:
              StringNotLike:
                iam:TagKeys: 'Owner'
      Roles:
        - !Ref DeveloperIAMRole

Outputs:
  DeveloperIAMRoleArn:
    Description: ARN of the Developer IAM Role
    Value: !GetAtt DeveloperIAMRole.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !Ref DeveloperPermissionBoundaryPolicy