AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT Core to SQS via SNS message routing infrastructure'

Resources:
  IoTDataQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Sub '${AWS::StackName}-iot-data-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: 'alias/aws/sqs'

  IoTDataQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'sns.amazonaws.com'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref IoTDataTopic

  IoTDataTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Sub '${AWS::StackName}-iot-data-topic'
      KmsMasterKeyId: 'alias/aws/sns'

  IoTDataTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref IoTDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'iot.amazonaws.com'
            Action: 'sns:Publish'
            Resource: !Ref IoTDataTopic

  IoTDataSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      Protocol: 'sqs'
      TopicArn: !Ref IoTDataTopic
      Endpoint: !GetAtt IoTDataQueue.Arn

  IoTRuleRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'iot.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'IoTRuleSNSPublish'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'sns:Publish'
                Resource: !Ref IoTDataTopic

  IoTDataRule:
    Type: 'AWS::IoT::TopicRule'
    Properties:
      RuleName: !Sub '${AWS::StackName}_data_rule'
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTRuleRole.Arn
        ErrorAction:
          Republish:
            RoleArn: !GetAtt IoTRuleRole.Arn
            Topic: 'error/device/data'

Outputs:
  QueueURL:
    Description: 'URL of the SQS Queue'
    Value: !Ref IoTDataQueue

  QueueARN:
    Description: 'ARN of the SQS Queue'
    Value: !GetAtt IoTDataQueue.Arn

  TopicARN:
    Description: 'ARN of the SNS Topic'
    Value: !Ref IoTDataTopic

  RuleARN:
    Description: 'ARN of the IoT Rule'
    Value: !GetAtt IoTDataRule.Arn