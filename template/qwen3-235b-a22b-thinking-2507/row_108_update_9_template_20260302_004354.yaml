AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Cognito User Pool for admin-managed user provisioning with email verification and OAuth support'
Parameters:
  DomainPrefix:
    Type: String
    Description: Prefix for the Cognito hosted domain (alphanumeric and hyphens only)
    MinLength: 1
    MaxLength: 63
    AllowedPattern: '^[a-z0-9\-]+$'
    ConstraintDescription: Domain prefix must be lowercase alphanumeric and hyphens only
  PasswordMinimumLength:
    Type: Number
    Default: 8
    MinValue: 6
    MaxValue: 99
    Description: Minimum password length (6-99 characters)
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require uppercase characters in passwords
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require lowercase characters in passwords
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require numeric characters in passwords
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require symbol characters in passwords
  TemporaryPasswordValidityDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 365
    Description: Days temporary passwords remain valid
  EmailVerificationSubject:
    Type: String
    Default: 'Verify your email address'
    Description: Subject line for email verification
  EmailVerificationMessage:
    Type: String
    Default: 'Your verification code is {####}'
    Description: Message for email verification (must contain {####})
  CallbackURLs:
    Type: String
    Default: 'http://localhost:3000/oauth2/idpresponse'
    Description: Comma-separated list of OAuth callback URLs
  LogoutURLs:
    Type: String
    Default: 'http://localhost:3000/logout'
    Description: Comma-separated list of OAuth logout URLs
  AllowedOAuthScopes:
    Type: String
    Default: 'openid,email,profile'
    Description: Comma-separated list of OAuth scopes
Mappings:
  BooleanMap:
    'true':
      Value: true
    'false':
      Value: false
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${AWS::StackName}-UserPool'
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireUppercase: !FindInMap [BooleanMap, !Ref RequireUppercase, Value]
          RequireLowercase: !FindInMap [BooleanMap, !Ref RequireLowercase, Value]
          RequireNumbers: !FindInMap [BooleanMap, !Ref RequireNumbers, Value]
          RequireSymbols: !FindInMap [BooleanMap, !Ref RequireSymbols, Value]
          TemporaryPasswordValidityDays: !Ref TemporaryPasswordValidityDays
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      VerificationMessageTemplate:
        EmailSubject: !Ref EmailVerificationSubject
        EmailMessage: !Ref EmailVerificationMessage
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: admin_only
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: OFF
      UsernameConfiguration:
        CaseSensitive: false
      UserPoolTags:
        Application: CognitoUserManagement
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub '${AWS::StackName}-Client'
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes: !Split [',', !Ref AllowedOAuthScopes]
      CallbackURLs: !Split [',', !Ref CallbackURLs]
      LogoutURLs: !Split [',', !Ref LogoutURLs]
      GenerateSecret: false
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool
Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref UserPool
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref UserPoolClient
  UserPoolDomainURL:
    Description: URL of the Cognito Hosted UI domain
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'