AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an SQS Standard Queue'

Parameters:
  QueueName:
    Type: String
    Description: 'Name of the SQS queue'
    Default: 'MyStandardQueue'
  
  VisibilityTimeout:
    Type: Number
    Description: 'The visibility timeout for the queue in seconds'
    Default: 30
  
  MessageRetentionPeriod:
    Type: Number
    Description: 'The number of seconds messages will remain in queue'
    Default: 345600
  
  MaxMessageSize:
    Type: Number
    Description: 'The maximum message size in bytes'
    Default: 262144
  
  DelaySeconds:
    Type: Number
    Description: 'The delivery delay in seconds'
    Default: 0

Resources:
  StandardQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      MaximumMessageSize: !Ref MaxMessageSize
      DelaySeconds: !Ref DelaySeconds
      Tags:
        - Key: Name
          Value: !Ref QueueName
        - Key: Environment
          Value: Production

Outputs:
  QueueUrl:
    Description: 'URL of the created SQS queue'
    Value: !Ref StandardQueue
  
  QueueArn:
    Description: 'ARN of the created SQS queue'
    Value: !GetAtt StandardQueue.Arn