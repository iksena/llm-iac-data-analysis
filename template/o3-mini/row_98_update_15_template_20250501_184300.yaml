AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Minimal CloudFormation template to create an AWS Amplify web application for the TodoApp with a production branch.

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: "todoApp"
      Tags:
        - Key: "Project"
          Value: "TodoApp"
        - Key: "Environment"
          Value: "Production"

  ProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Sub "${AmplifyApp.AppId}"
      BranchName: "production"
      Stage: "PRODUCTION"
      EnableAutoBuild: true

Outputs:
  AmplifyAppId:
    Description: "The App ID of the created Amplify App."
    Value: !GetAtt AmplifyApp.AppId
  AmplifyBranchName:
    Description: "The production branch used for deployment."
    Value: "production"