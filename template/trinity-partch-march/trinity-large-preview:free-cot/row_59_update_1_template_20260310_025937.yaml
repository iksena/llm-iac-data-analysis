AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Kinesis Data Stream with CloudWatch Alarms for read/write throughput monitoring

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of shards for the Kinesis Data Stream

  RetentionPeriod:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: Data retention period in hours

  EnhancedMonitoring:
    Type: Number
    Default: 0
    AllowedValues: [0, 1, 2]
    Description: Enhanced monitoring level (0-2)

  ReadThroughputThreshold:
    Type: Number
    Default: 1000000
    Description: Read throughput threshold (in bytes)

  WriteThroughputThreshold:
    Type: Number
    Default: 1000000
    Description: Write throughput threshold (in bytes)

  AlarmRecipientEmail:
    Type: String
    Default: admin@example.com
    Description: Email address for alarm notifications

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-DataStream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriod
      EnhancedMonitoring:
        - ShardLevelMetrics: !Ref EnhancedMonitoring
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DataStream

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisDataStreamAlarms
      Subscription:
        - Endpoint: !Ref AlarmRecipientEmail
          Protocol: email

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-ReadThroughputExceeded
      AlarmDescription: Alarm when read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref ReadThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisDataStream

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-WriteThroughputExceeded
      AlarmDescription: Alarm when write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref WriteThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisDataStream

Outputs:
  KinesisDataStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref KinesisDataStream
    Export:
      Name: !Sub ${AWS::StackName}-DataStreamName

  KinesisDataStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn
    Export:
      Name: !Sub ${AWS::StackName}-DataStreamArn

  ReadThroughputAlarmArn:
    Description: ARN of the Read Throughput Alarm
    Value: !Ref ReadThroughputAlarm
    Export:
      Name: !Sub ${AWS::StackName}-ReadThroughputAlarmArn

  WriteThroughputAlarmArn:
    Description: ARN of the Write Throughput Alarm
    Value: !Ref WriteThroughputAlarm
    Export:
      Name: !Sub ${AWS::StackName}-WriteThroughputAlarmArn