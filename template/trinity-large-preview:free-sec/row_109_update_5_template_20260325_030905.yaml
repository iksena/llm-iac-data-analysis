AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBus:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CustomEventBus

  Connection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: MongoDBConnection
      SecretString: '{"ApiKeyName": "test_name", "ApiKeyValue": "test_value"}'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*

  ApiDestination:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MongoDBApiDestination
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt EventBridgeRole.Arn
      Environment:
        Variables:
          MONGODB_URL: www.testanu.com
          API_KEY_NAME: test_name
          API_KEY_VALUE: test_value
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const https = require('https');
            const response = await https.request({
              hostname: 'www.testanu.com',
              path: '/events',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                [process.env.API_KEY_NAME]: process.env.API_KEY_VALUE
              }
            });
            return response;
          }

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue
      MessageRetentionPeriod: 1209600

Outputs:
  EventBusArn:
    Description: Event Bus ARN
    Value: !GetAtt EventBus.Arn
  ApiDestinationArn:
    Description: API Destination ARN
    Value: !GetAtt ApiDestination.Arn
  DeadLetterQueueUrl:
    Description: Dead Letter Queue URL
    Value: !Ref DeadLetterQueue