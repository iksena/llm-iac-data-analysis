AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template to create an Amazon Aurora MySQL Cluster with CloudWatch Logs integration.'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: AuroraInternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties: 
      DBSubnetGroupDescription: 'Subnet group for Aurora DB Cluster'
      SubnetIds: 
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties: 
      GroupDescription: 'Security group for Aurora DB Cluster'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: AuroraDBPassword
      Description: 'Secret for Aurora DB Master User Password'
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties: 
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.12.4'
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBPasswordSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBPasswordSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds: 
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '07:00-09:00'
      PreferredMaintenanceWindow: 'Mon:03:00-Mon:04:00'
      EnableCloudwatchLogsExports: 
        - 'error'

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties: 
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      Engine: aurora-mysql

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties: 
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      Engine: aurora-mysql

Outputs:
  DBClusterEndpoint:
    Description: 'The endpoint address of the Aurora DB Cluster'
    Value: !GetAtt 
      - AuroraDBCluster
      - Endpoint.Address

  DBClusterReaderEndpoint:
    Description: 'The reader endpoint address of the Aurora DB Cluster'
    Value: !GetAtt 
      - AuroraDBCluster
      - ReadEndpoint.Address

  CloudWatchLogGroup:
    Description: 'The CloudWatch Log Group for Aurora error logs'
    Value: !Join ['', ['/aws/rds/cluster/', !Ref AuroraDBCluster, '/error']]