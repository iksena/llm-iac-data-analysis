AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable URL-to-PNG Screenshot Service with Automated Load Testing

Resources:
  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ScreenshotQueue
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: screenshot-service-results
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  WorkerLaunchConfig:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: ami-0123456789abcdef0
      InstanceType: t3.medium
      IamInstanceProfile: !Ref WorkerRole
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Chromium screenshot script
          yum update -y
          amazon-linux-extras install -y epel
          yum install -y chromium-browser
          # Screenshot processing script here

  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${AWS::StackName}-PublicSubnet1"
        - Fn::ImportValue: !Sub "${AWS::StackName}-PublicSubnet2"
      LaunchConfigurationName: !Ref WorkerLaunchConfig
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0123456789abcdef0
      InstanceType: t3.small
      SubnetId:
        Fn::ImportValue: !Sub "${AWS::StackName}-PublicSubnet1"
      IamInstanceProfile: !Ref WorkerRole
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Load test script to populate SQS
          yum update -y
          # Load test script here

  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: QueueDepthHigh
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      AutoScalingGroupName: !Ref WorkerASG
      Cooldown: 300

  LowQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: QueueDepthLow
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      AutoScalingGroupName: !Ref WorkerASG
      Cooldown: 300