AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Kinesis Data Firehose with SSE-KMS and CloudWatch error logging

Resources:
  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: FirehoseErrorLogs
      RetentionInDays: 30

  CloudWatchLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref CloudWatchLogGroup
      LogStreamName: FirehoseErrorStream

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: EncryptedFirehoseStream
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: arn:aws:s3:::example-bucket
        ErrorOutputPrefix: "error/!{firehose:error-output-type}/"
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: arn:aws:kms:us-east-1:123456789012:key/abcd1234-abcd-1234-abcd-123456789012
          NoEncryptionConfig: NoEncryption
        RoleARN: arn:aws:iam::123456789012:role/FirehoseDeliveryRole
    DependsOn:
      - CloudWatchLogGroup
      - CloudWatchLogStream

Outputs:
  FirehoseStreamName:
    Description: Name of the created Firehose delivery stream
    Value: !Ref FirehoseDeliveryStream