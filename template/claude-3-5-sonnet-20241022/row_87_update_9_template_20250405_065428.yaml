AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an S3 bucket for Lambda artifacts and KMS key for encryption

Parameters:
  BucketNamePrefix:
    Type: String
    Description: Prefix for the S3 bucket name (will be combined with stack name for uniqueness)
    Default: 'lambda-artifacts'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    MinLength: 3
    MaxLength: 37

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: KMS key for Lambda artifacts encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
              - kms:GenerateDataKey
              - kms:Decrypt
              - kms:Encrypt
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}
      TargetKeyId: !Ref KMSKey

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${BucketNamePrefix}-${AWS::StackName}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadAccess
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${ArtifactsBucket}/*

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref ArtifactsBucket
  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt ArtifactsBucket.Arn
  KMSKeyId:
    Description: ID of the created KMS key
    Value: !Ref KMSKey
  KMSKeyArn:
    Description: ARN of the created KMS key
    Value: !GetAtt KMSKey.Arn