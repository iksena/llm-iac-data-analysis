AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an EventBridge rule with an SNS topic for event forwarding'

Parameters:
  EventSourceName:
    Type: String
    Default: 'demo.cli'
    Description: 'The source name to match in the EventBridge rule'
  
  TopicName:
    Type: String
    Default: 'EventBridgeNotificationTopic'
    Description: 'Name of the SNS topic to create'

Resources:
  EventNotificationTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref TopicName
      DisplayName: 'EventBridge Notification Topic'
      Tags:
        - Key: Purpose
          Value: EventBridgeNotifications

  EventNotificationTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref EventNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: 'EventBridgeToSNSPolicy'
        Statement:
          - Sid: 'AllowEventBridgeToPublishToSNS'
            Effect: 'Allow'
            Principal:
              Service: 'events.amazonaws.com'
            Action: 'sns:Publish'
            Resource: !Ref EventNotificationTopic

  EventBridgeRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Name: !Sub '${AWS::StackName}-EventRule'
      Description: 'Rule to capture events from specified source and forward to SNS'
      State: 'ENABLED'
      EventPattern:
        source:
          - !Ref EventSourceName
      Targets:
        - Arn: !Ref EventNotificationTopic
          Id: 'SNSTarget'

Outputs:
  SNSTopicARN:
    Description: 'ARN of the SNS topic'
    Value: !Ref EventNotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicARN'
  
  EventBridgeRuleARN:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt EventBridgeRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleARN'