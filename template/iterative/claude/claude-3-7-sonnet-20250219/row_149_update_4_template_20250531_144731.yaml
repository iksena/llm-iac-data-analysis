AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EFS with EC2 integration across multiple AZs'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: Latest Amazon Linux 2 AMI from SSM Parameter Store

  EFSPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: EFS performance mode

  EFSThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: EFS throughput mode

  EFSProvisionedThroughput:
    Type: Number
    Default: 100
    MinValue: 1
    Description: EFS provisioned throughput in MiB/s (only used if throughput mode is provisioned)

  KeyName:
    Type: String
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances (optional)
    Default: ""

Conditions:
  IsProvisionedThroughput: !Equals [!Ref EFSThroughputMode, provisioned]
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  # VPC and Network Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # Security Groups
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow NFS traffic from EC2 instances

  # IAM Role for EC2 instances
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWriteAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  # EFS File System
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref EFSPerformanceMode
      ThroughputMode: !Ref EFSThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref EFSProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  # EFS Access Point for better access control
  EFSAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: 1000
        Gid: 1000
      RootDirectory:
        Path: "/"
        CreationInfo:
          OwnerUid: 1000
          OwnerGid: 1000
          Permissions: "755"

  # EFS Mount Targets
  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # EC2 Instances
  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - EFSAccessPoint
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Instance1
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Install AWS CloudFormation helper scripts
          yum install -y aws-cfn-bootstrap
          
          # Update system and install required packages
          yum update -y
          yum install -y amazon-efs-utils
          
          # Create mount directory
          mkdir -p /home
          
          # Backup existing home directory content if any
          if [ "$(ls -A /home)" ]; then
            mkdir -p /home_backup
            cp -r /home/* /home_backup/
          fi
          
          # Wait for EFS to be fully available
          sleep 30
          
          # Add EFS mount to fstab for persistence across reboots
          echo "${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home efs _netdev,tls,iam 0 0" >> /etc/fstab
          
          # Mount EFS with retry logic
          mount_attempts=0
          max_attempts=5
          
          until mount -a || [ $mount_attempts -ge $max_attempts ]; do
            mount_attempts=$((mount_attempts+1))
            echo "Mount attempt $mount_attempts failed, retrying in 10 seconds..."
            sleep 10
          done
          
          if [ $mount_attempts -ge $max_attempts ]; then
            echo "Failed to mount EFS after $max_attempts attempts"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}
            exit 1
          fi
          
          # Restore home directory content if backup was created
          if [ -d "/home_backup" ] && [ "$(ls -A /home_backup)" ]; then
            cp -r /home_backup/* /home/
            rm -rf /home_backup
          fi
          
          # Set appropriate permissions
          chmod 755 /home
          
          # Signal success
          /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance1 --region ${AWS::Region}

    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget2
      - EFSAccessPoint
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Instance2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Install AWS CloudFormation helper scripts
          yum install -y aws-cfn-bootstrap
          
          # Update system and install required packages
          yum update -y
          yum install -y amazon-efs-utils
          
          # Create mount directory
          mkdir -p /home
          
          # Backup existing home directory content if any
          if [ "$(ls -A /home)" ]; then
            mkdir -p /home_backup
            cp -r /home/* /home_backup/
          fi
          
          # Wait for EFS to be fully available
          sleep 30
          
          # Add EFS mount to fstab for persistence across reboots
          echo "${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home efs _netdev,tls,iam 0 0" >> /etc/fstab
          
          # Mount EFS with retry logic
          mount_attempts=0
          max_attempts=5
          
          until mount -a || [ $mount_attempts -ge $max_attempts ]; do
            mount_attempts=$((mount_attempts+1))
            echo "Mount attempt $mount_attempts failed, retrying in 10 seconds..."
            sleep 10
          done
          
          if [ $mount_attempts -ge $max_attempts ]; then
            echo "Failed to mount EFS after $max_attempts attempts"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}
            exit 1
          fi
          
          # Restore home directory content if backup was created
          if [ -d "/home_backup" ] && [ "$(ls -A /home_backup)" ]; then
            cp -r /home_backup/* /home/
            rm -rf /home_backup
          fi
          
          # Set appropriate permissions
          chmod 755 /home
          
          # Signal success
          /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance2 --region ${AWS::Region}

    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  # SNS Topic for Alarms
  EFSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      TopicName: !Sub ${AWS::StackName}-EFS-Alarms

  # CloudWatch Alarms
  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS burst credit balance is too low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic
      TreatMissingData: notBreaching

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS IO limit is approaching maximum
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic
      TreatMissingData: notBreaching

  StorageBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EFS storage usage is high
      Namespace: AWS/EFS
      MetricName: StorageBytes
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 10000000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref EFSAlarmTopic
      InsufficientDataActions:
        - !Ref EFSAlarmTopic
      TreatMissingData: notBreaching

Outputs:
  VpcId:
    Description: ID of the VPC
    Value: !Ref VPC

  PublicSubnet1Id:
    Description: ID of the first public subnet
    Value: !Ref PublicSubnet1

  PublicSubnet2Id:
    Description: ID of the second public subnet
    Value: !Ref PublicSubnet2

  EFSFileSystemId:
    Description: ID of the EFS File System
    Value: !Ref EFSFileSystem

  EFSFileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  EFSAccessPointId:
    Description: ID of the EFS Access Point
    Value: !Ref EFSAccessPoint

  EC2Instance1Id:
    Description: ID of the first EC2 instance
    Value: !Ref EC2Instance1

  EC2Instance1PublicIP:
    Description: Public IP address of the first EC2 instance
    Value: !GetAtt EC2Instance1.PublicIp

  EC2Instance2Id:
    Description: ID of the second EC2 instance
    Value: !Ref EC2Instance2

  EC2Instance2PublicIP:
    Description: Public IP address of the second EC2 instance
    Value: !GetAtt EC2Instance2.PublicIp

  EFSMountCommand:
    Description: Command to mount the EFS file system manually
    Value: !Sub "sudo mount -t efs -o tls ${EFSFileSystem}:/ /mnt/efs"

  AlarmTopicARN:
    Description: ARN of the SNS Topic for EFS Alarms
    Value: !Ref EFSAlarmTopic