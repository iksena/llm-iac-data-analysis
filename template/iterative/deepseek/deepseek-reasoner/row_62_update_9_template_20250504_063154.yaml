AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database cluster (e.g., vpc-12345678)
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of public subnet IDs across multiple AZs (e.g., [subnet-12345678, subnet-87654321])
  MasterUsername:
    Type: String
    Default: admin
    Description: Master username for database access
  SecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing master password (e.g., arn:aws:secretsmanager:REGION:ACCOUNT-ID:secret:SECRET-NAME)

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Aurora Public Subnet Group
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora MySQL Public Access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  ClusterParamGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Custom cluster parameter group
      Family: aurora-mysql8.0
      Parameters:
        server_audit_logging: 1

  InstanceParamGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom instance parameter group
      Family: aurora-mysql8.0
      Parameters:
        time_zone: UTC
        sql_mode: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 8.0.mysql_aurora.3.07.1
      DatabaseName: applicationDB
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${SecretArn}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      DBClusterParameterGroupName: !Ref ClusterParamGroup
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "03:00-04:00"

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref InstanceParamGroup
      EnablePerformanceInsights: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref InstanceParamGroup
      EnablePerformanceInsights: true

Outputs:
  ClusterEndpoint:
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  SecurityGroupId:
    Value: !Ref DBSecurityGroup