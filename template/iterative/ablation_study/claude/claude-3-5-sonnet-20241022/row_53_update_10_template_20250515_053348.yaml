AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS EMR Serverless environment with S3 bucket and IAM roles'

Parameters:
  EMRApplicationName:
    Type: String
    Default: 'emr-serverless-app'
    Description: 'Name of the EMR Serverless application'
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9-_]*'
  
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    Description: 'Idle timeout in minutes before auto-stop'
    MinValue: 1
    MaxValue: 1440

Resources:
  EMRServerlessS3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Application
          Value: EMRServerless

  EMRServerlessRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'emr-serverless.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSEmrServerlessServiceRole'
      Tags:
        - Key: Application
          Value: EMRServerless

  EMRServerlessPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${AWS::StackName}-emr-serverless-policy'
      Roles:
        - !Ref EMRServerlessRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:GetObject'
              - 's3:PutObject'
              - 's3:DeleteObject'
              - 's3:ListBucket'
            Resource:
              - !Sub 'arn:aws:s3:::${EMRServerlessS3Bucket}/*'
              - !Sub 'arn:aws:s3:::${EMRServerlessS3Bucket}'
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogGroups'
              - 'logs:DescribeLogStreams'
            Resource: 
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*/*'

  EMRServerlessApplication:
    Type: 'AWS::EMRServerless::Application'
    DependsOn: 
      - EMRServerlessRole
      - EMRServerlessPolicy
    Properties:
      Name: !Ref EMRApplicationName
      ReleaseLabel: 'emr-6.15.0'
      Type: 'SPARK'
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      MaximumCapacity:
        Cpu: '20vCPU'
        Memory: '40GB'
        Disk: '20GB'
      Tags:
        Application: EMRServerless

Outputs:
  EMRApplicationId:
    Description: 'EMR Serverless Application ID'
    Value: !Ref EMRServerlessApplication
  
  S3BucketName:
    Description: 'S3 Bucket Name for EMR Serverless'
    Value: !Ref EMRServerlessS3Bucket
  
  EMRServerlessRoleARN:
    Description: 'ARN of EMR Serverless IAM Role'
    Value: !GetAtt EMRServerlessRole.Arn