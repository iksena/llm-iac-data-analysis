AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an Amazon RDS DB instance with provisioned IOPS'
Resources:
  MyDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.m5.large
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: MyDBUser
      MasterUserPassword: MyStrongPassword!
      DBName: MyDatabase
      Iops: 1000
      StorageType: gp2
      DeletionProtection: false
      MultiAZ: false
      PubliclyAccessible: false
      VPCSecurityGroups:
        - !Ref MySecurityGroup
      SubnetGroupName: default
      Tags:
        - Key: Name
          Value: MyDBInstance
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound traffic on port 3306
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MyDBSecurityGroup

Outputs:
  DBInstanceEndpoint:
    Value: !GetAtt MyDBInstance.Endpoint.Address
    Description: The endpoint of the DB instance
  DBInstancePort:
    Value: !GetAtt MyDBInstance.Endpoint.Port
    Description: The port of the DB instance

Metadata:
  Comment: This template creates a simple RDS instance.  Remember to replace placeholder values with your own.
