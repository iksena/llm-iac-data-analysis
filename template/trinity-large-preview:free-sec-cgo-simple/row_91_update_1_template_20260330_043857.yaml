AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for VPC Flow Logs with Encryption, Lifecycle Management, and Access Controls

Parameters:
  BucketName:
    Type: String
    Default: vpc-flow-logs
    Description: Name of the S3 bucket for VPC flow logs
  VersioningStatus:
    Type: String
    Default: Suspended
    AllowedValues: [Enabled, Suspended]
    Description: Enable or suspend versioning for the bucket
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning objects to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before permanently deleting objects

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransitionAndExpiration
            Status: Enabled
            Transitions:
              - Days: !Ref LifecycleTransitionDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref LifecycleExpirationDays
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${VPCFlowLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Description: Name of the VPC Flow Logs S3 bucket
    Value: !Ref VPCFlowLogsBucket
  BucketARN:
    Description: ARN of the VPC Flow Logs S3 bucket
    Value: !GetAtt VPCFlowLogsBucket.Arn