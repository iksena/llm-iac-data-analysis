AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-Account Private API Gateway with Lambda Integration

Parameters:
  VPCEndpointId:
    Type: String
    Default: vpce-1234567890abcdef0
    Description: VPC Endpoint ID for private API Gateway access
  CustomDomainName:
    Type: String
    Default: api.example.com
    Description: Custom domain name for API Gateway
  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012
    Description: ACM Certificate ARN for custom domain
  SecurityGroupId:
    Type: String
    Default: sg-1234567890abcdef0
    Description: Security Group ID for VPC Link
  SubnetId1:
    Type: String
    Default: subnet-1234567890abcdef0
    Description: First Subnet ID for VPC Link
  SubnetId2:
    Type: String
    Default: subnet-1234567890abcdef1
    Description: Second Subnet ID for VPC Link

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps('Hello from private API Gateway!')
              }

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  APIGatewayInvokePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: APIGatewayInvokePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource: !GetAtt LambdaFunction.Arn
      Roles:
        - !Ref APIGatewayRole

  PrivateApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateAPI
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref CustomDomainName
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  VPCLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: PrivateAPIVPCLink
      SecurityGroupIds:
        - !Ref SecurityGroupId
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2

  APIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PrivateApi
      RouteKey: 'GET /'
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref LambdaIntegration

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PrivateApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PrivateApi
      StageName: prod
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt LambdaFunction.Arn
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context.httpMethod $context.routeKey" $context.status $context.responseLength $context.requestId

  CustomDomainNameResource:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref CertificateArn

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref PrivateApi
      DomainName: !Ref CustomDomainNameResource
      Stage: prod

  VPCEndpointAccess:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: VPCEndpointAccessLink
      SecurityGroupIds:
        - !Ref SecurityGroupId
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2
      Tags:
        - Key: Name
          Value: VPCEndpointAccessLink

  VPCEndpointAccessPolicy:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: VPCEndpointAccessPolicy
      SecurityGroupIds:
        - !Ref SecurityGroupId
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2
      Tags:
        - Key: Name
          Value: VPCEndpointAccessPolicy

Outputs:
  ApiEndpoint:
    Value: !Sub 'https://${CustomDomainName}'
    Description: API Gateway endpoint URL
  LambdaFunctionArn:
    Value: !GetAtt LambdaFunction.Arn
    Description: Lambda function ARN