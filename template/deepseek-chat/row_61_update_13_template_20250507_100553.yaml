AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a VPC and private Route53 hosted zone for example.com'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'PrivateHostedZone-VPC'

  PrivateHostedZone:
    Type: 'AWS::Route53::HostedZone'
    Properties:
      Name: 'example.com.'
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for example.com'

Outputs:
  VpcId:
    Description: 'The ID of the created VPC'
    Value: !Ref VPC
  HostedZoneId:
    Description: 'The ID of the created private hosted zone'
    Value: !Ref PrivateHostedZone
  HostedZoneNameServers:
    Description: 'The name servers for the hosted zone'
    Value: !Join [',', !GetAtt PrivateHostedZone.NameServers]