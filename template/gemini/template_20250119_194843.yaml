AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster for Fargate
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: FargateCluster
Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Description: Name of ECS Cluster
    Export:
      Name: FargateClusterName
