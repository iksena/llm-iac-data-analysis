AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure REST API Gateway with SES Integration for Templated Email Sending'

Parameters:
  APIName:
    Type: String
    Default: EmailAPI
    Description: Name of the API Gateway
  APIDescription:
    Type: String
    Default: API for sending templated emails via SES
    Description: Description of the API Gateway
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds
  LambdaMemory:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB
  ThrottleRate:
    Type: Number
    Default: 500
    Description: API Gateway throttling rate (requests/second)
  QuotaLimit:
    Type: Number
    Default: 10000
    Description: API Gateway quota limit (requests/month)
  StageName:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SESAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  EmailLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-EmailSender
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ses_client = boto3.client('ses')

          def lambda_handler(event, context):
              try:
                  # Parse and validate input
                  body = json.loads(event['body'])
                  to = body.get('to')
                  from_email = body.get('from')
                  subject = body.get('subject')
                  text = body.get('text')
                  html = body.get('html')

                  if not all([to, from_email, subject, text]):
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Missing required fields: to, from, subject, text'})
                      }

                  # Construct SES request
                  message = {
                      'Destination': {
                          'ToAddresses': [to]
                      },
                      'Message': {
                          'Body': {},
                          'Subject': {
                              'Data': subject
                          }
                      },
                      'Source': from_email
                  }

                  if text:
                      message['Message']['Body']['Text'] = {'Data': text}
                  if html:
                      message['Message']['Body']['Html'] = {'Data': html}

                  # Send email via SES
                  response = ses_client.send_email(**message)

                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }

              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': 'Internal server error'})
                  }

  EmailAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref APIName
      Description: !Ref APIDescription
      FailOnWarnings: true

  EmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailAPI
      ParentId: !GetAtt EmailAPI.RootResourceId
      PathPart: email

  EmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.header.Content-Type: true
      RequestModels:
        application/json: Error
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
        - StatusCode: 400
          ResponseModels:
            application/json: Error
        - StatusCode: 401
          ResponseModels:
            application/json: Error
        - StatusCode: 429
          ResponseModels:
            application/json: Error
        - StatusCode: 500
          ResponseModels:
            application/json: Error
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt EmailLambdaFunction.Arn

  APIGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt EmailLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EmailAPI}/*/POST/email

  EmailAPIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: EmailAPIUsagePlan
      Description: Usage plan for email API with throttling and quota
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: !Ref StageName
      Throttle:
        BurstLimit: !Ref ThrottleRate
        RateLimit: !Ref ThrottleRate
      Quota:
        Limit: !Ref QuotaLimit
        Period: MONTH

  EmailAPIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPIKey
      Description: API key for email sending service
      Enabled: true

  APIKeyUsagePlanMapping:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref EmailAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref EmailAPIUsagePlan

  EmailAPIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref EmailAPI
      StageName: !Ref StageName
      DeploymentId: !Ref EmailAPIDeployment
      AccessLogSetting:
        DestinationArn: !GetAtt APILogsGroup.Arn
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context HttpMethod $context requestPath $context.protocol" $context.status $context.responseLength $context.requestId

  EmailAPIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - EmailMethod
    Properties:
      RestApiId: !Ref EmailAPI
      Description: Deployment of email API

  APILogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${APIName}
      RetentionInDays: 30

  APILogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-APILogsRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  APILogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: APILogsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:PutLogEvents
            Resource: !GetAtt APILogsGroup.Arn
      Roles:
        - !Ref APILogsRole

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/email
  APIKey:
    Description: API Key for authentication
    Value: !Ref EmailAPIKey
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt EmailLambdaFunction.Arn