AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon EFS file system with basic configurations
  for a testing environment in the us-east-1a availability zone.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      Tags:
        - Key: Name
          Value: EFS-Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EFS-SecurityGroup

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref SecurityGroup

Outputs:
  FileSystemId:
    Description: The ID of the EFS file system.
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub "${AWS::StackName}-EFSFileSystemId"

  MountTargetIpAddress:
    Description: The IP address of the EFS mount target.
    Value: !GetAtt MountTarget.IpAddress
    Export:
      Name: !Sub "${AWS::StackName}-EFSMountTargetIpAddress"