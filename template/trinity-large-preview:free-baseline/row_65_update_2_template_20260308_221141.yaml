AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Lambda function with Node.js 20.x runtime that prints hello world

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaCodeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete

  LambdaCodeObject:
    Type: AWS::S3::BucketObject
    Properties:
      Bucket: !Ref LambdaCodeBucket
      Key: lambda-code.zip
      ContentEncoding: base64
      Content: |
        