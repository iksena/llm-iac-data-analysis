AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EventBridge SNS Topic

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref MyTopic
            Condition:
              ArnLike:
                AWS:SourceArn: !Ref EventRule
      Topics:
        - !Ref MyTopic

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Arn: !Ref MyTopic
          Id: MyTopicTarget