AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Bedrock Service Access with Agent and Lambda Permissions

Resources:
  BedrockServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockServiceRole
      Description: IAM Role assumable by Bedrock service for agent operations and Lambda integration
      Tags:
        - Key: Name
          Value: BedrockServiceRole
        - Key: Purpose
          Value: Bedrock Service Access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockFoundationModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: arn:aws:bedrock:*:*:foundation-model/*
        - PolicyName: LambdaFunctionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: arn:aws:lambda:*:*:function:*
        - PolicyName: BedrockAgentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:*
                Resource: arn:aws:bedrock:*:*:agent/*

Outputs:
  BedrockServiceRoleArn:
    Description: ARN of the Bedrock Service Role
    Value: !GetAtt BedrockServiceRole.Arn
    Export:
      Name: BedrockServiceRoleArn