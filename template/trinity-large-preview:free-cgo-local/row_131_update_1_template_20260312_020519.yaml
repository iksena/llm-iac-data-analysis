AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized alerting system with SNS topic, subscriptions, and fallback monitoring

Parameters:
  EmailEndpoint:
    Type: String
    Description: Email address for SNS notifications (optional)
    Default: ''
  HttpsEndpoint:
    Type: String
    Description: HTTPS endpoint URL for SNS notifications (optional)
    Default: ''
  TopicDisplayName:
    Type: String
    Description: Display name for the SNS topic
    Default: CentralizedAlertingSystem

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, '']]
  HasHttpsEndpoint: !Not [!Equals [!Ref HttpsEndpoint, '']]

Resources:
  PrimarySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Ref TopicDisplayName
      TopicPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - monitoring.amazonaws.com
                - budgets.amazonaws.com
                - s3.amazonaws.com
                - rds.amazonaws.com
            Action: sns:Publish
            Resource: !Ref PrimarySNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      TopicArn: !Ref PrimarySNSTopic

  HttpsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHttpsEndpoint
    Properties:
      Endpoint: !Ref HttpsEndpoint
      Protocol: https
      TopicArn: !Ref PrimarySNSTopic
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 20
          maxDelayTarget: 20
          numRetries: 3
          numMaxDelayRetries: 0
          backoffFunction: arithmetic

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: FallbackAlertingSystem

  NotificationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationAlarm
      AlarmDescription: Monitors failed SNS notifications
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic

Outputs:
  PrimaryTopicARN:
    Description: ARN of the primary SNS topic
    Value: !Ref PrimarySNSTopic
  FallbackTopicARN:
    Description: ARN of the fallback SNS topic
    Value: !Ref FallbackSNSTopic