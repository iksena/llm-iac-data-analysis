AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure and cost-optimized S3 bucket for storing CloudWatch export data with configurable versioning and automated lifecycle management.

Parameters:
  EnableVersioning:
    Type: String
    Default: 'Enabled'
    AllowedValues:
      - 'Enabled'
      - 'Suspended'
    Description: Enable or suspend versioning for the S3 bucket.

  TransitionToGlacierDays:
    Type: Number
    Default: 30
    Description: Number of days after which objects are transitioned to Glacier.

  ExpirationDays:
    Type: Number
    Default: 365
    Description: Number of days after which objects expire.

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cloudwatch-export-bucket-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref TransitionToGlacierDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref ExpirationDays
            NoncurrentVersionExpirationInDays: !Ref ExpirationDays

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - 's3:GetObject'
            Resource: !Sub '${CloudWatchExportBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'true'

Outputs:
  BucketName:
    Description: The name of the S3 bucket
    Value: !Ref CloudWatchExportBucket

  BucketArn:
    Description: The ARN of the S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn
```