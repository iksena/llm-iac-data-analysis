AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an EC2 instance with multiple static IPs in an existing VPC.
Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701 # Replace with your AMI ID
      InstanceType: t2.micro
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: subnet-0abcdef1234567890 # Replace with your subnet ID
          Groups:
            - sg-0abcdef1234567890 # Replace with your security group ID
          PrivateIpAddress: 10.0.0.10 # Replace with your desired private IP
          SecondaryPrivateIpAddresses:
            - PrivateIpAddress: 10.0.0.11 # Replace with your desired secondary IP
            - PrivateIpAddress: 10.0.0.12 # Replace with your desired secondary IP

Outputs:
  InstanceId:
    Value: !Ref MyEC2Instance
    Description: ID of the created EC2 instance
  PublicIp:
    Value: !GetAtt MyEC2Instance.PublicIp
    Description: Public IP address of the created EC2 instance
  PrivateIp:
    Value: !GetAtt MyEC2Instance.PrivateIp
    Description: Private IP address of the created EC2 instance

