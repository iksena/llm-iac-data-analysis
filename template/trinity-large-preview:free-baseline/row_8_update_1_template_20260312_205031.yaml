AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudWatch Dashboard with VPC flow logs insights widgets for NAT Gateway.

Parameters:
  LogGroupName:
    Type: String
    Default: 'vpc-flow-logs'
    Description: The name of the CloudWatch Logs group containing VPC flow logs

Resources:
  VPCFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: VPCFlowLogsNATGatewayDashboard
      DashboardBody:
        Fn::Sub:
          - |
            {
              "widgets": [
                {
                  "type": "log",
                  "x": 0,
                  "y": 0,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}' | stats sum(bytes) as bytes by srcAddr | sort bytes desc | limit 10",
                    "region": "${AWS::Region}",
                    "title": "Top Source IPs by Outbound Traffic",
                    "view": "table",
                    "stacked": false
                  }
                },
                {
                  "type": "log",
                  "x": 12,
                  "y": 0,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}' | filter interfaceId like 'eni-' | stats count(*) as rejected by srcAddr | sort rejected desc | limit 10",
                    "region": "${AWS::Region}",
                    "title": "Top Source IPs by Rejected Connections",
                    "view": "table",
                    "stacked": false
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 6,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}' | filter interfaceId like 'eni-' and action = 'REJECT' | stats count(*) as rejected by srcAddr | sort rejected desc | limit 10",
                    "region": "${AWS::Region}",
                    "title": "Top Source IPs with Rejected Connections (NAT)",
                    "view": "table",
                    "stacked": false
                  }
                },
                {
                  "type": "log",
                  "x": 12,
                  "y": 6,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(bytes) as bytes by srcAddr | sort bytes desc | limit 10",
                    "region": "${AWS::Region}",
                    "title": "Top Source IPs by Outbound Traffic (NAT)",
                    "view": "table",
                    "stacked": false
                  }
                }
              ]
            }
          - LogGroupName: !Ref LogGroupName

Outputs:
  DashboardUrl:
    Description: URL of the created CloudWatch Dashboard
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#!/dashboards/view/${VPCFlowLogsDashboard}'