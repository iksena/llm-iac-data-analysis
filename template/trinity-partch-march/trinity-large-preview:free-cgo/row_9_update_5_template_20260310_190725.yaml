AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678901234567

Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      PerformanceMode: generalPurpose
      ProvisionedThroughputInMibps: 1
      ThroughputMode: provisioned
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedOneZoneFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref AWS::NoValue

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref EncryptedOneZoneFileSystem
  FileSystemArn:
    Description: The ARN of the created file system
    Value: !GetAtt EncryptedOneZoneFileSystem.Arn