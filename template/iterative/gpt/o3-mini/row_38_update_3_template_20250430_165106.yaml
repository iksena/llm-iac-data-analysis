AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation Template to create an S3 Bucket with a trigger Lambda Function.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: S3TriggerFunction
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.8
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              print("Event Received:", json.dumps(event))
              return {
                  'statusCode': 200,
                  'body': json.dumps('Hello from Lambda triggered by S3!')
              }
      Timeout: 60

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MyLambdaFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: 
        !Sub
          - "arn:aws:s3:::${BucketName}"
          - { BucketName: !Ref S3Bucket }
    DependsOn:
      - MyLambdaFunction

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-s3-bucket"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt MyLambdaFunction.Arn
    DependsOn:
      - LambdaInvokePermission

Outputs:
  S3BucketName:
    Description: "Name of the S3 Bucket"
    Value: !Ref S3Bucket
  LambdaFunctionARN:
    Description: "ARN of the Lambda Function triggered by the S3 Bucket"
    Value: !GetAtt MyLambdaFunction.Arn