AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure REST API Gateway with SES Integration for Templated Email Sending'

Parameters:
  SenderEmail:
    Type: String
    Default: 'no-reply@example.com'
    Description: 'Default sender email address for SES'
  ApiStageName:
    Type: String
    Default: 'prod'
    Description: 'API Gateway deployment stage name'
  ApiKeyName:
    Type: String
    Default: 'default-api-key'
    Description: 'Name for the API key'
  UsagePlanQuotaLimit:
    Type: Number
    Default: 10000
    Description: 'Monthly quota limit for API usage'
  UsagePlanQuotaPeriod:
    Type: String
    Default: 'MONTH'
    AllowedValues: ['DAY', 'WEEK', 'MONTH']
    Description: 'Time period for quota limit'
  UsagePlanBurstLimit:
    Type: Number
    Default: 500
    Description: 'Rate limit (requests per second)'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ['lambda.amazonaws.com']
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: LambdaSESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['ses:SendEmail']
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: 'python3.12'
      Handler: 'index.lambda_handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ses_client = boto3.client('ses')

          def lambda_handler(event, context):
              try:
                  body = json.loads(event['body'])
                  
                  # Validate required fields
                  required_fields = ['to', 'from', 'subject']
                  for field in required_fields:
                      if field not in body:
                          return {
                              'statusCode': 400,
                              'body': json.dumps({'error': f'Missing required field: {field}'})
                          }

                  # Prepare SES message
                  message = {
                      'Destination': {
                          'ToAddresses': [body['to']]
                      },
                      'Message': {
                          'Body': {},
                          'Subject': {
                              'Data': body['subject']
                          }
                      },
                      'Source': body['from']
                  }

                  if 'text' in body:
                      message['Message']['Body']['Text'] = {'Data': body['text']}
                  if 'html' in body:
                      message['Message']['Body']['Html'] = {'Data': body['html']}

                  # Send email via SES
                  response = ses_client.send_email(**message)
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except json.JSONDecodeError:
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': 'Invalid JSON format'})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: 'EmailSendingAPI'
      Description: 'API for sending templated emails via SES'

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: 'send-email'

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref APIGatewayResource
      HttpMethod: 'POST'
      AuthorizationType: 'NONE'
      ApiKeyRequired: true
      RequestParameters:
        'method.request.header.Content-Type': true
      RequestValidatorId: !Ref APIGatewayRequestValidator
      Integration:
        Type: 'AWS_PROXY'
        IntegrationHttpMethod: 'POST'
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt LambdaFunction.Arn
        PassthroughBehavior: 'WHEN_NO_TEMPLATES'
        RequestTemplates:
          'application/json': |
            {
              "body" : $input.json('$')
            }

  APIGatewayRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: 'EmailRequestValidator'
      RestApiId: !Ref APIGatewayRestApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      Description: 'Deployment for production stage'

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestApi
      StageName: !Ref ApiStageName
      Description: 'Production stage'
      AccessLogSetting:
        DestinationArn: !GetAtt APIGatewayAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'

  APIGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: 'EmailSendingUsagePlan'
      Description: 'Usage plan with rate limits for email sending API'
      ApiStages:
        - ApiId: !Ref APIGatewayRestApi
          Stage: !Ref ApiStageName
      Throttle:
        BurstLimit: !Ref UsagePlanBurstLimit
        RateLimit: !Ref UsagePlanBurstLimit
      Quota:
        Limit: !Ref UsagePlanQuotaLimit
        Period: !Ref UsagePlanQuotaPeriod

  APIGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Ref ApiKeyName
      Description: 'API key for email sending service'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref APIGatewayRestApi
          StageName: !Ref ApiStageName

  APIGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIGatewayApiKey
      KeyType: 'API_KEY'
      UsagePlanId: !Ref APIGatewayUsagePlan

  APIGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/aws/apigateway/EmailSendingAPI'
      RetentionInDays: 30

  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub
        - 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiId}/*/*/*'
        - apiId: !Ref APIGatewayRestApi

Outputs:
  ApiGatewayUrl:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${APIGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/send-email'
  ApiKey:
    Description: 'API Key for authentication'
    Value: !Ref APIGatewayApiKey
  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt LambdaFunction.Arn