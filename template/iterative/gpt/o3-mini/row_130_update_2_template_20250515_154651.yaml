AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to manage an account-wide IAM password policy.
  This template enforces strong IAM user password policies with customizable security settings
  and includes a Lambda function to dynamically apply or remove the policy via AWS SDK.

Parameters:
  MinimumPasswordLength:
    Description: "Minimum password length for the IAM account password policy."
    Type: Number
    Default: 14
  RequireUppercaseCharacters:
    Description: "Enforce at least one uppercase character (true/false)."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  RequireLowercaseCharacters:
    Description: "Enforce at least one lowercase character (true/false)."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  RequireNumbers:
    Description: "Enforce at least one numeric character (true/false)."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  RequireSymbols:
    Description: "Enforce at least one symbol character (true/false)."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  MaxPasswordAge:
    Description: "Maximum number of days a password is valid."
    Type: Number
    Default: 90
  PasswordReusePrevention:
    Description: "Number of previous passwords disallowed."
    Type: Number
    Default: 24
  AllowUsersToChangePassword:
    Description: "Allow IAM users to change their own passwords (true/false)."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "true"
  LambdaExecutionRolePermissionBoundary:
    Description: >
      (Optional) ARN of the IAM permission boundary to apply to the Lambda execution role.
      Leave as empty string if not used.
    Type: String
    Default: ""

Conditions:
  UsePermissionBoundary: !Not [ !Equals [ !Ref LambdaExecutionRolePermissionBoundary, "" ] ]

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "PasswordPolicyLambdaExecutionRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: "PasswordPolicyLambdaPolicy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
      PermissionsBoundary: !If
        - UsePermissionBoundary
        - !Ref LambdaExecutionRolePermissionBoundary
        - !Ref "AWS::NoValue"

  PasswordPolicyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "PasswordPolicyManager-${AWS::StackName}"
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import traceback
          
          http = urllib3.PoolManager()
          
          def send_response(event, context, response_status, response_data, physical_resource_id):
              response_url = event['ResponseURL']
              
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              
              json_response_body = json.dumps(response_body)
              
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              
              try:
                  response = http.request('PUT', response_url, body=json_response_body, headers=headers)
              except Exception as e:
                  print("send_response failed:", e)
          
          def lambda_handler(event, context):
              physical_resource_id = event.get('PhysicalResourceId') or context.log_stream_name
              try:
                  print("Received event:", json.dumps(event))
                  client = boto3.client('iam')
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      params = {}
                      props = event.get('ResourceProperties', {})
                      if 'MinimumPasswordLength' in props:
                          params['MinimumPasswordLength'] = int(props['MinimumPasswordLength'])
                      if 'RequireUppercaseCharacters' in props:
                          params['RequireUppercaseCharacters'] = (props['RequireUppercaseCharacters'].lower() == "true")
                      if 'RequireLowercaseCharacters' in props:
                          params['RequireLowercaseCharacters'] = (props['RequireLowercaseCharacters'].lower() == "true")
                      if 'RequireNumbers' in props:
                          params['RequireNumbers'] = (props['RequireNumbers'].lower() == "true")
                      if 'RequireSymbols' in props:
                          params['RequireSymbols'] = (props['RequireSymbols'].lower() == "true")
                      if 'AllowUsersToChangePassword' in props:
                          params['AllowUsersToChangePassword'] = (props['AllowUsersToChangePassword'].lower() == "true")
                      if 'MaxPasswordAge' in props:
                          params['MaxPasswordAge'] = int(props['MaxPasswordAge'])
                      if 'PasswordReusePrevention' in props:
                          params['PasswordReusePrevention'] = int(props['PasswordReusePrevention'])
                      
                      print("Updating account password policy with parameters:", params)
                      client.update_account_password_policy(**params)
                      response_data = {"Message": "Password policy updated successfully."}
                  
                  elif event['RequestType'] == 'Delete':
                      print("Deleting the account password policy")
                      client.delete_account_password_policy()
                      response_data = {"Message": "Password policy deleted successfully."}
                  
                  send_response(event, context, "SUCCESS", response_data, physical_resource_id)
              except Exception as e:
                  print("Exception:", str(e))
                  print(traceback.format_exc())
                  send_response(event, context, "FAILED", {"Message": str(e)}, physical_resource_id)

  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambdaFunction.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention

Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Password Policy Lambda Function."
    Value: !GetAtt PasswordPolicyLambdaFunction.Arn