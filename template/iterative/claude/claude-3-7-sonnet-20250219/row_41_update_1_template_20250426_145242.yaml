AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon SQS Standard Queue'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    Default: MyStandardQueue
  
  MessageRetentionPeriod:
    Type: Number
    Description: The number of seconds that Amazon SQS retains a message (1 minute to 14 days)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  
  VisibilityTimeout:
    Type: Number
    Description: The visibility timeout for the queue in seconds
    Default: 30
    MinValue: 0
    MaxValue: 43200
  
  DelaySeconds:
    Type: Number
    Description: The time in seconds for which the delivery of all messages in the queue is delayed
    Default: 0
    MinValue: 0
    MaxValue: 900
  
  EnableDeadLetterQueue:
    Type: String
    Description: Enable a Dead Letter Queue
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  MaxReceiveCount:
    Type: Number
    Description: Maximum number of times a message can be received before being sent to the Dead Letter Queue
    Default: 3
    MinValue: 1
    MaxValue: 1000

Conditions:
  CreateDeadLetterQueue: !Equals [!Ref EnableDeadLetterQueue, 'true']

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Condition: CreateDeadLetterQueue
    Properties:
      QueueName: !Sub '${QueueName}-DLQ'
      MessageRetentionPeriod: 1209600  # 14 days (maximum)
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Name
          Value: !Sub '${QueueName}-DLQ'
        - Key: Environment
          Value: Production

  MainQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      DelaySeconds: !Ref DelaySeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      RedrivePolicy: !If
        - CreateDeadLetterQueue
        - !Sub |
          {
            "deadLetterTargetArn": "${DeadLetterQueue.Arn}",
            "maxReceiveCount": ${MaxReceiveCount}
          }
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Ref QueueName
        - Key: Environment
          Value: Production

Outputs:
  QueueURL:
    Description: URL of the main SQS Queue
    Value: !Ref MainQueue
  
  QueueARN:
    Description: ARN of the main SQS Queue
    Value: !GetAtt MainQueue.Arn
  
  QueueName:
    Description: Name of the main SQS Queue
    Value: !GetAtt MainQueue.QueueName
  
  DeadLetterQueueURL:
    Description: URL of the Dead Letter Queue
    Condition: CreateDeadLetterQueue
    Value: !Ref DeadLetterQueue
  
  DeadLetterQueueARN:
    Description: ARN of the Dead Letter Queue
    Condition: CreateDeadLetterQueue
    Value: !GetAtt DeadLetterQueue.Arn