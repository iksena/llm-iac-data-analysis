AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with EC2 Instances and Monitoring'

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed
    Default: vpc-12345678
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of two public subnet IDs (one per AZ)
    Default: [subnet-12345678,subnet-87654321]
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key
  ThroughputMode:
    Type: String
    Description: EFS throughput mode
    Default: bursting
    AllowedValues: [bursting,provisioned]
  ProvisionedThroughputInMibps:
    Type: Number
    Description: The amount of throughput, in MiB/s, for the file system to provision in provisioned mode
    Default: 1
    MinValue: 1
    MaxValue: 1024

Resources:
  EFSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EFS encryption
      Enabled: true
      EnableKeyRotation: false
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !GetAtt EFSEncryptionKey.Arn
      PerformanceMode: generalPurpose
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedMode,!Ref ProvisionedThroughputInMibps,!Ref AWS::NoValue]
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS'

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0,!Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1,!Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSecurityGroup

  EFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: EFSFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:*
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2IAMRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Select [0,!Ref SubnetIds]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          mount -t efs ${EFSFileSystem}:/ /home/efs
          echo "${EFSFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2-Instance-1'

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Select [1,!Ref SubnetIds]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          mount -t efs ${EFSFileSystem}:/ /home/efs
          echo "${EFSFileSystem}:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2-Instance-2'

  CloudWatchAlarmBurstCreditBalance:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when BurstCreditBalance is below threshold
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  CloudWatchAlarmPercentIOLimit:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when PercentIOLimit is above threshold
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

Conditions:
  IsProvisionedMode: !Equals [ !Ref ThroughputMode, 'provisioned' ]

Outputs:
  EFSFileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EFSFileSystem
  EFSDNSName:
    Description: The DNS name of the created EFS file system
    Value: !GetAtt EFSFileSystem.DNSName
  EC2Instance1Id:
    Description: The ID of the first EC2 instance
    Value: !Ref EC2Instance1
  EC2Instance2Id:
    Description: The ID of the second EC2 instance
    Value: !Ref EC2Instance2