AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an Amazon ECS Cluster with Fargate and Fargate Spot capacity providers, including the creation of a VPC.

Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS Cluster.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-vpc"

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-subnet-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ClusterName}-subnet-2"

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS cluster
      VpcId: !Ref VPC

  ECSClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

Outputs:
  ECSClusterARN:
    Description: The ARN of the ECS Cluster.
    Value: !GetAtt ECSCluster.Arn
  ECSClusterName:
    Description: The name of the ECS Cluster.
    Value: !Ref ECSCluster
  VpcId:
    Description: The ID of the created VPC.
    Value: !Ref VPC
  SubnetIds:
    Description: The IDs of the created subnets.
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]