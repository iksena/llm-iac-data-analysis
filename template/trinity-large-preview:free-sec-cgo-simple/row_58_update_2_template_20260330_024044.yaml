AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Parameters:
  VPCId:
    Type: String
    Default: vpc-12345678
    Description: VPC ID where EFS will be deployed
    AllowedPattern: ^vpc-[a-f0-9]{8}$
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups (default: daily at midnight)
    AllowedPattern: ^cron\([^)]+\)$

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !GetAZs '']
      SecurityGroups:
        - !Ref EFSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !GetAZs '']
      SecurityGroups:
        - !Ref EFSecurityGroup

  MountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [2, !GetAZs '']
      SecurityGroups:
        - !Ref EFSecurityGroup

  EFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Join ['.', [!Select [0, !Split ['.', !GetAtt 'VPC', 'CidrBlock']], !Select [1, !Split ['.', !GetAtt 'VPC', 'CidrBlock']], !Select [2, !Split ['.', !GetAtt 'VPC', 'CidrBlock']], '0/24']]

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: EFSBackupPlan
        Rules:
          - BackupRuleName: DailyBackupRule
            TargetBackupVaultName: !Ref 'AWS::AccountId'
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

  BackupServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-BurstCreditBalance'
      AlarmDescription: 'EFS Burst Credit Balance below threshold'
      Namespace: 'AWS/EFS'
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-PercentIOLimit'
      AlarmDescription: 'EFS Percent IO Limit above threshold'
      Namespace: 'AWS/EFS'
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-Throughput'
      AlarmDescription: 'EFS Throughput exceeding limit'
      Namespace: 'AWS/EFS'
      MetricName: Throughput
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub '${AWS::StackName}-EFS-Alarms'

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  DNSName:
    Description: EFS DNS Name
    Value: !GetAtt EFSFileSystem.DNSName
  BackupPlanArn:
    Description: Backup Plan ARN
    Value: !Sub 'arn:${AWS::Partition}:backup:${AWS::Region}:${AWS::AccountId}:plan/${BackupPlan}'