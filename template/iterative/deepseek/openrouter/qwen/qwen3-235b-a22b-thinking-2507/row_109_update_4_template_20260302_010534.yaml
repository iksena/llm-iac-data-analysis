AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDLQ.fifo
      FifoQueue: true

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiDestinationInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Ref MongoDBApiDestination

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: test_name
          ApiKeyValue: test_value
      Name: MongoDBConnection

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !Ref MongoDBConnection
      HttpMethod: POST
      InvocationEndpoint: https://www.testanu.com
      InvocationRateLimitPerSecond: 300
      Name: MongoDBApiDestination

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: custom-application-events

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - custom.application
      State: ENABLED
      Targets:
        - Arn: !Ref MongoDBApiDestination
          Id: MongoDBTarget
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  ApiDestinationArn:
    Description: ARN of the MongoDB API destination
    Value: !Ref MongoDBApiDestination
  DLQUrl:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue