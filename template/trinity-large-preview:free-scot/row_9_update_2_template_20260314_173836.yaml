AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
            Resource: !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${FileSystemId}'
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      ProvisionedThroughputInMibps: 1
      AvailabilityZoneName: us-east-1a
      KmsKeyId: alias/aws/ebs

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref SecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref MyFileSystem