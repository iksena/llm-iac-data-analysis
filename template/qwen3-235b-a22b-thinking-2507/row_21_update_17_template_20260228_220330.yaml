AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready Timestream database with four configured tables for different retention and error handling scenarios'
Parameters:
  DatabaseName:
    Type: String
    Default: poc-database
    Description: Name of the Timestream database
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9_.-]+'
  RejectedDataS3Bucket:
    Type: String
    Description: 'S3 bucket name for rejected records (required when magnetic store writes are enabled)'
    MinLength: 3
    MaxLength: 63
  Table01MemoryRetentionHours:
    Type: Number
    Default: 720
    Description: 'Memory store retention period in hours for poc-table-01-batch-write (1-876600)'
    MinValue: 1
    MaxValue: 876600
  Table01MagneticRetentionDays:
    Type: Number
    Default: 3650
    Description: 'Magnetic store retention period in days for poc-table-01-batch-write (1-73000)'
    MinValue: 1
    MaxValue: 73000
  Table01EnableMagneticStoreWrites:
    Type: String
    Default: 'true'
    Description: 'Enable magnetic store writes for poc-table-01-batch-write'
    AllowedValues:
      - 'true'
      - 'false'
  Table02MemoryRetentionHours:
    Type: Number
    Default: 876600
    Description: 'Memory store retention period in hours for poc-table-02-older-records-memonly (1-876600)'
    MinValue: 1
    MaxValue: 876600
  Table02MagneticRetentionDays:
    Type: Number
    Default: 1
    Description: 'Magnetic store retention period in days for poc-table-02-older-records-memonly (1-73000)'
    MinValue: 1
    MaxValue: 73000
  Table02EnableMagneticStoreWrites:
    Type: String
    Default: 'false'
    Description: 'Enable magnetic store writes for poc-table-02-older-records-memonly'
    AllowedValues:
      - 'true'
      - 'false'
  Table03MemoryRetentionHours:
    Type: Number
    Default: 24
    Description: 'Memory store retention period in hours for poc-table-03-older-records-magnetic (1-876600)'
    MinValue: 1
    MaxValue: 876600
  Table03MagneticRetentionDays:
    Type: Number
    Default: 3650
    Description: 'Magnetic store retention period in days for poc-table-03-older-records-magnetic (1-73000)'
    MinValue: 1
    MaxValue: 73000
  Table03EnableMagneticStoreWrites:
    Type: String
    Default: 'true'
    Description: 'Enable magnetic store writes for poc-table-03-older-records-magnetic'
    AllowedValues:
      - 'true'
      - 'false'
  Table04MemoryRetentionHours:
    Type: Number
    Default: 168
    Description: 'Memory store retention period in hours for poc-table-04-common-attributes (1-876600)'
    MinValue: 1
    MaxValue: 876600
  Table04MagneticRetentionDays:
    Type: Number
    Default: 3650
    Description: 'Magnetic store retention period in days for poc-table-04-common-attributes (1-73000)'
    MinValue: 1
    MaxValue: 73000
  Table04EnableMagneticStoreWrites:
    Type: String
    Default: 'true'
    Description: 'Enable magnetic store writes for poc-table-04-common-attributes'
    AllowedValues:
      - 'true'
      - 'false'
Conditions:
  Table01MagneticWritesEnabled:
    Fn::Equals:
      - !Ref Table01EnableMagneticStoreWrites
      - 'true'
  Table02MagneticWritesEnabled:
    Fn::Equals:
      - !Ref Table02EnableMagneticStoreWrites
      - 'true'
  Table03MagneticWritesEnabled:
    Fn::Equals:
      - !Ref Table03EnableMagneticStoreWrites
      - 'true'
  Table04MagneticWritesEnabled:
    Fn::Equals:
      - !Ref Table04EnableMagneticStoreWrites
      - 'true'
Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
  Table01BatchWrite:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      EncryptionConfig:
        Type: SSE_Timestream
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table01MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table01MagneticRetentionDays
      MagneticStoreWriteProperties: !If
        - Table01MagneticWritesEnabled
        - 
          EnableMagneticStoreWrites: true
          MagneticStoreRejectedDataLocation:
            S3Configuration:
              BucketName: !Ref RejectedDataS3Bucket
        - !Ref AWS::NoValue
  Table02MemoryOnly:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      EncryptionConfig:
        Type: SSE_Timestream
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table02MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table02MagneticRetentionDays
      MagneticStoreWriteProperties: !If
        - Table02MagneticWritesEnabled
        - 
          EnableMagneticStoreWrites: true
          MagneticStoreRejectedDataLocation:
            S3Configuration:
              BucketName: !Ref RejectedDataS3Bucket
        - !Ref AWS::NoValue
  Table03MagneticFocused:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      EncryptionConfig:
        Type: SSE_Timestream
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table03MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table03MagneticRetentionDays
      MagneticStoreWriteProperties: !If
        - Table03MagneticWritesEnabled
        - 
          EnableMagneticStoreWrites: true
          MagneticStoreRejectedDataLocation:
            S3Configuration:
              BucketName: !Ref RejectedDataS3Bucket
        - !Ref AWS::NoValue
  Table04CommonAttributes:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      EncryptionConfig:
        Type: SSE_Timestream
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table04MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table04MagneticRetentionDays
      MagneticStoreWriteProperties: !If
        - Table04MagneticWritesEnabled
        - 
          EnableMagneticStoreWrites: true
          MagneticStoreRejectedDataLocation:
            S3Configuration:
              BucketName: !Ref RejectedDataS3Bucket
        - !Ref AWS::NoValue
Outputs:
  DatabaseName:
    Description: Name of the Timestream database
    Value: !Ref DatabaseName
  Table01Name:
    Description: Name of the batch write table
    Value: !Ref Table01BatchWrite
  Table02Name:
    Description: Name of the memory-only records table
    Value: !Ref Table02MemoryOnly
  Table03Name:
    Description: Name of the magnetic-focused records table
    Value: !Ref Table03MagneticFocused
  Table04Name:
    Description: Name of the common attributes table
    Value: !Ref Table04CommonAttributes