AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for S3 bucket with KMS encryption and lifecycle management'

Parameters:
  BucketNameSuffix:
    Type: String
    Description: Suffix for the S3 bucket name (will be appended to a unique identifier)
    Default: encrypted-bucket
    
  KMSKeyAliasName:
    Type: String
    Description: Name for the KMS key alias (without the 'alias/' prefix)
    Default: s3-encryption-key
    
  OrganizationName:
    Type: String
    Description: Organization name for tagging
    Default: MyOrganization
    
  LifecycleTransitionDays:
    Type: Number
    Description: Number of days after which objects transition to Standard-IA
    Default: 30
    MinValue: 30
    
  LifecycleExpirationDays:
    Type: Number
    Description: Number of days after which objects expire
    Default: 365
    MinValue: 90

Resources:
  S3KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowS3ServiceToUseKey
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
      Tags:
        - Key: Organization
          Value: !Ref OrganizationName
        - Key: Name
          Value: S3EncryptionKey

  S3KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${KMSKeyAliasName}'
      TargetKeyId: !Ref S3KMSKey

  EncryptedS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-${BucketNameSuffix}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt S3KMSKey.Arn
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToStandardIA
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref LifecycleTransitionDays
                StorageClass: STANDARD_IA
            ExpirationInDays: !Ref LifecycleExpirationDays
      Tags:
        - Key: Organization
          Value: !Ref OrganizationName
        - Key: Name
          Value: !Sub '${AWS::StackName}-${BucketNameSuffix}'

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EncryptedS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedObjectUploads
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub 'arn:aws:s3:::${EncryptedS3Bucket}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'aws:kms'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref EncryptedS3Bucket
    
  BucketARN:
    Description: ARN of the S3 bucket
    Value: !GetAtt EncryptedS3Bucket.Arn
    
  KMSKeyId:
    Description: ID of the KMS key
    Value: !Ref S3KMSKey
    
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt S3KMSKey.Arn
    
  KMSKeyAlias:
    Description: Alias of the KMS key
    Value: !Sub 'alias/${KMSKeyAliasName}'