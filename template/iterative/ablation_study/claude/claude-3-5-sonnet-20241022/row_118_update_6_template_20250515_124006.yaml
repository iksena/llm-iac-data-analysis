AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge Pipes workflow to enrich SQS messages with API data and log results'

Parameters:
  LogRetentionDays:
    Type: Number
    Default: 30
    Description: Number of days to retain logs
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]

Resources:
  MessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/events/enriched-messages-${AWS::StackName}'
      RetentionInDays: !Ref LogRetentionDays

  ApiConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      Name: !Sub '${AWS::StackName}-zippopotam-connection'
      AuthorizationType: BASIC
      AuthParameters:
        BasicAuthParameters:
          Username: ''
          Password: ''

  ApiDestination:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      Name: !Sub '${AWS::StackName}-zippopotam-destination'
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: GET
      InvocationEndpoint: 'https://api.zippopotam.us/us/'
      InvocationRateLimitPerSecond: 10

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole

  PipeRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${AWS::StackName}-pipe-policy'
      Roles: 
        - !Ref PipeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MessageQueue.Arn
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt LogGroup.Arn
          - Effect: Allow
            Action:
              - events:InvokeApiDestination
            Resource: !GetAtt ApiDestination.Arn

  EnrichmentPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${AWS::StackName}-enrichment-pipe'
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt MessageQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 30
      Enrichment: !GetAtt ApiDestination.Arn
      EnrichmentParameters:
        InputTemplate: '{"zipcode": "$.body.zipCode"}'
      Target: !GetAtt LogGroup.Arn
      TargetParameters:
        InputTemplate: '{"timestamp": "$.time", "enrichedData": "$.enrichmentResult"}'

Outputs:
  QueueUrl:
    Description: 'URL of the SQS queue'
    Value: !Ref MessageQueue

  QueueArn:
    Description: 'ARN of the SQS queue'
    Value: !GetAtt MessageQueue.Arn

  LogGroupName:
    Description: 'Name of the CloudWatch Log Group'
    Value: !Ref LogGroup

  PipeArn:
    Description: 'ARN of the EventBridge Pipe'
    Value: !GetAtt EnrichmentPipe.Arn