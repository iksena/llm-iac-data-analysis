AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for VPC Flow Logs with Encryption and Lifecycle Management

Parameters:
  BucketName:
    Type: String
    Default: vpc-flow-logs-bucket
    Description: Name of the S3 bucket for VPC flow logs
  VersioningStatus:
    Type: String
    Default: Suspended
    AllowedValues:
      - Enabled
      - Suspended
    Description: Enable or suspend versioning for the bucket
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning logs to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before permanently deleting logs

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Prefix: ''
            Transition:
              StorageClass: GLACIER
              TransitionDate: !Select [0, !Split [",", !Ref LifecycleTransitionDays]]
          - Id: Expiration
            Status: Enabled
            Prefix: ''
            ExpirationInDays: !Ref LifecycleExpirationDays

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${VPCFlowLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Description: Name of the VPC Flow Logs S3 Bucket
    Value: !Ref VPCFlowLogsBucket
  BucketArn:
    Description: ARN of the VPC Flow Logs S3 Bucket
    Value: !GetAtt VPCFlowLogsBucket.Arn