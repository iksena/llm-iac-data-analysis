AWSTemplateFormatVersion: '2010-09-09'
Description: Load balanced sample web site with ELB stickiness enabled.
Resources:
  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701
      InstanceType: t2.micro
      KeyName: MyEC2KeyPair
      SecurityGroups:
        - !Ref EC2SecurityGroup
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
        yum install httpd -y
        systemctl start httpd
        systemctl enable httpd
        echo "<h1>Hello from EC2 Instance 1</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: EC2Instance1
  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701
      InstanceType: t2.micro
      KeyName: MyEC2KeyPair
      SecurityGroups:
        - !Ref EC2SecurityGroup
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
        yum install httpd -y
        systemctl start httpd
        systemctl enable httpd
        echo "<h1>Hello from EC2 Instance 2</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: EC2Instance2
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8888
          ToPort: 8888
          CidrIp: 0.0.0.0/0
  LoadBalancer:
    Type: AWS::ElasticLoadBalancing::LoadBalancer
    Properties:
      Listeners:
        - LoadBalancerPort: 80
          InstancePort: 8888
          Protocol: HTTP
      HealthCheck:
        HealthyThreshold: 2
        UnhealthyThreshold: 2
        Interval: 5
        Timeout: 3
        Target: HTTP:8888/
      Instances:
        - !Ref EC2Instance1
        - !Ref EC2Instance2
      Scheme: internet-facing
      CrossZone: true
      ConnectionDrainingPolicy:
        Enabled: true
        Timeout: 300
      AppCookieStickinessPolicy:
        CookieName: MyCookie
        PolicyName: AppCookieStickinessPolicy


Outputs:
  LoadBalancerDNSName:
    Value: !GetAtt LoadBalancer.DNSName
    Description: The DNS name of the load balancer.
