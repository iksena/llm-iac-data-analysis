AWSTemplateFormatVersion: '2010-09-09'
Description: 'Kinesis Data Stream with CloudWatch Alarms for Throughput Monitoring'

Parameters:
  StreamName:
    Type: String
    Default: 'kinesis-stream-default'
    Description: 'Name of the Kinesis Data Stream'
  ShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards for the Kinesis stream'
  RetentionPeriod:
    Type: Number
    Default: 24
    Description: 'Retention period in hours'
  AlarmActions:
    Type: String
    Default: ''
    Description: 'Comma-separated list of alarm actions (ARNs)'

Resources:
  KinesisStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriod

  ReadThroughputAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${StreamName}-ReadThroughputExceeded'
      AlarmDescription: 'Alarm when read throughput exceeds provisioned capacity'
      Namespace: 'AWS/Kinesis'
      MetricName: 'ReadProvisionedThroughputExceeded'
      Dimensions:
        - Name: 'StreamName'
          Value: !Ref StreamName
      Period: 300
      EvaluationPeriods: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Statistic: Sum
      Threshold: 1
      AlarmActions: !Split [',', !Ref AlarmActions]
      DependsOn: KinesisStream

  WriteThroughputAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${StreamName}-WriteThroughputExceeded'
      AlarmDescription: 'Alarm when write throughput exceeds provisioned capacity'
      Namespace: 'AWS/Kinesis'
      MetricName: 'WriteProvisionedThroughputExceeded'
      Dimensions:
        - Name: 'StreamName'
          Value: !Ref StreamName
      Period: 300
      EvaluationPeriods: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Statistic: Sum
      Threshold: 1
      AlarmActions: !Split [',', !Ref AlarmActions]
      DependsOn: KinesisStream

Outputs:
  StreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn
  StreamName:
    Description: 'Name of the Kinesis Data Stream'
    Value: !Ref StreamName