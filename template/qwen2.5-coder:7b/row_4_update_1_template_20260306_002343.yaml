AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0  # Latest Amazon Linux 2 AMI as of the time of writing
      InstanceType: t2.micro
      KeyName: my-key-pair  # Replace with your actual key pair name
      SecurityGroupIds:
        - sg-0123456789abcdef0  # Replace with your actual security group ID
      SubnetId: subnet-0123456789abcdef0  # Replace with your actual subnet ID

Outputs:
  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIpAddress
    Export:
      Name: EC2InstancePublicIP

  InstanceID:
    Description: Instance ID of the EC2 instance
    Value: !Ref EC2Instance
    Export:
      Name: EC2InstanceID