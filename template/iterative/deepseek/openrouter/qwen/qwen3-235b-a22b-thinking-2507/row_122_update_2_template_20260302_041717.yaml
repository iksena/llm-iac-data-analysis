AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ShopifyShopName:
    Type: String
    Default: testanu
    Description: The name of the Shopify store (without .myshopify.com)
    MinLength: 1
    AllowedPattern: '^[a-z0-9][-a-z0-9]*[a-z0-9]$'
    ConstraintDescription: Must be a valid Shopify store name (alphanumeric with hyphens)
  ShopifyApiKey:
    Type: String
    NoEcho: true
    Description: Shopify Admin API access token
    MinLength: 10
  ShopifyApiVersion:
    Type: String
    Default: '2023-10'
    Description: Shopify API version to use
    AllowedValues:
      - '2023-04'
      - '2023-07'
      - '2023-10'
      - '2024-01'
      - '2024-04'
Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub 'MyShopifyApp-EventBus-${AWS::StackName}'
  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub 'Shopify-Connection-${AWS::StackName}'
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeySecret: !Ref ShopifyApiKey
  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub 'Shopify-ApiDestination-${AWS::StackName}'
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://${ShopifyShopName}.myshopify.com/admin/api/${ShopifyApiVersion}/products.json'
      InvocationRateLimitPerSecond: 2
  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'Shopify-Product-Creation-Rule-${AWS::StackName}'
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !Ref ShopifyApiDestination
          Id: ShopifyProductTarget
Outputs:
  EventBusName:
    Description: Name of the custom EventBridge event bus
    Value: !Ref ShopifyEventBus
  EventRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt ShopifyEventRule.Arn
  ApiDestinationArn:
    Description: ARN of the API Destination
    Value: !Ref ShopifyApiDestination
  ConnectionArn:
    Description: ARN of the Connection resource
    Value: !GetAtt ShopifyConnection.Arn