AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with KMS Encryption and Lifecycle Management

Parameters:
  Environment:
    Type: String
    Default: Production
    Description: Environment tag for the resources
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Days before transitioning to Intelligent-Tiering
  LifecycleGlacierDays:
    Type: Number
    Default: 365
    Description: Days before transitioning to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 1095
    Description: Days before expiring objects

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow S3 Service
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-s3-encryption-key'
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !GetAtt KMSKey.Arn
              SSEAlgorithm: aws:kms
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ToEncryptWithKMS
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: !GetAtt KMSKey.Arn
            Condition:
              StringLike:
                kms:ViaService: !Sub 's3.${AWS::Region}.amazonaws.com'
                kms:CallerAccount: !Ref 'AWS::AccountId'

  S3BucketLifecycleConfiguration:
    Type: AWS::S3::BucketLifecycleConfiguration
    Properties:
      Bucket: !Ref S3Bucket
      Rules:
        - Id: IntelligentTieringTransition
          Status: Enabled
          Transitions:
            - Days: !Ref LifecycleTransitionDays
              StorageClass: INTELLIGENT_TIERING
        - Id: GlacierTransition
          Status: Enabled
          Transitions:
            - Days: !Ref LifecycleGlacierDays
              StorageClass: GLACIER
        - Id: Expiration
          Status: Enabled
          ExpirationInDays: !Ref LifecycleExpirationDays

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt KMSKey.Arn