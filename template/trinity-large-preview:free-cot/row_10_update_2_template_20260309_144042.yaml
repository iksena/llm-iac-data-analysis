AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Ephemeral Drives using Latest Amazon Linux 2 AMI

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of the SSH key pair to use for the EC2 instance
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type

Resources:
  EC2KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref KeyName
      KeyType: rsa

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      BlockDeviceMappings:
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address
    Value: !GetAtt EC2Instance.PublicIp
  KeyPairName:
    Description: Key pair name
    Value: !Ref KeyName