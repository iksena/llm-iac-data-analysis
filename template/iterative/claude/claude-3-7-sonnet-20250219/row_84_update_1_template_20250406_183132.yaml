AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to create an AWS Macie session for automated sensitive data discovery'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: The frequency with which Macie publishes updates to policy findings
  
  MacieStatus:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED
    Description: The status of the Macie session
  
  AutoEnableOrganizationMembers:
    Type: String
    Default: NONE
    AllowedValues:
      - ALL
      - NEW
      - NONE
    Description: Automatically enable Macie for AWS Organizations member accounts

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: !Ref MacieStatus
      FindingPublishingFrequency: !Ref FindingPublishingFrequency

  MacieConfigurationForOrganization:
    Type: AWS::Macie::AllowList
    Condition: IsOrganizationMaster
    Properties:
      Criteria:
        SimpleCondition:
          Key: S3_OBJECT_EXTENSION
          Values:
            - tmp
            - bak
      Name: DefaultAllowList
      Description: Default allow list for common non-sensitive file extensions

  SensitiveDataDiscoveryJob:
    Type: AWS::Macie::ClassificationJob
    Properties:
      JobType: ONE_TIME
      Name: InitialSensitiveDataDiscovery
      Description: Initial sensitive data discovery job across all S3 buckets
      S3JobDefinition:
        BucketDefinitions:
          - AccountId: !Ref AWS::AccountId
            Buckets: []  # Empty array means all buckets in the account
      SamplingPercentage: 100
      InitialRun: true
      JobStatus: RUNNING
      Schedule:
        FrequencyUnit: MONTH
        Frequency: 1
      DependsOn: MacieSession

  CustomPiiDataIdentifier:
    Type: AWS::Macie::CustomDataIdentifier
    Properties:
      Name: CustomEmployeeID
      Description: Custom pattern to detect employee IDs
      Regex: 'EMP-[0-9]{6}'
      MaximumMatchDistance: 50
      Keywords:
        - employee
        - employee id
        - employee number
      IgnoreWords:
        - test
        - sample
      DependsOn: MacieSession

Outputs:
  MacieSessionId:
    Description: The ID of the created Macie session
    Value: !Ref MacieSession
  
  SensitiveDataDiscoveryJobId:
    Description: The ID of the sensitive data discovery job
    Value: !Ref SensitiveDataDiscoveryJob
  
  CustomPiiDataIdentifierId:
    Description: The ID of the custom PII data identifier
    Value: !Ref CustomPiiDataIdentifier

Conditions:
  IsOrganizationMaster: !Equals [!Ref AutoEnableOrganizationMembers, 'ALL']