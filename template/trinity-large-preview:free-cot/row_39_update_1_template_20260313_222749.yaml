AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon ECR repository with repository policy for Kubernetes container image management

Parameters:
  RepositoryName:
    Type: String
    Default: kubernetes-repo
    Description: Name of the ECR repository to create

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName

  ECRRepositoryPolicy:
    Type: AWS::ECR::RepositoryPolicy
    Properties:
      RepositoryName: !Ref ECRRepository
      PolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserFullAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload

Outputs:
  RepositoryName:
    Description: Name of the created ECR repository
    Value: !Ref ECRRepository
  RepositoryArn:
    Description: ARN of the created ECR repository
    Value: !GetAtt ECRRepository.Arn