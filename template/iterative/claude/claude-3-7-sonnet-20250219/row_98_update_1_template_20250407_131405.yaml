AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application with a production branch for TodoApp'

Parameters:
  AppName:
    Type: String
    Default: 'TodoApp'
    Description: Name of the Amplify application
  
  RepositoryUrl:
    Type: String
    Description: URL of the repository containing the TodoApp code
  
  RepositoryBranch:
    Type: String
    Default: 'production'
    Description: Name of the branch to deploy
  
  AccessToken:
    Type: String
    NoEcho: true
    Description: Personal access token for the repository
  
  BuildSpecContent:
    Type: String
    Default: |
      version: 1
      frontend:
        phases:
          preBuild:
            commands:
              - npm install
          build:
            commands:
              - npm run build
        artifacts:
          baseDirectory: build
          files:
            - '**/*'
        cache:
          paths:
            - node_modules/**/*
    Description: Build specification for the Amplify application

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      AccessToken: !Ref AccessToken
      BuildSpec: !Ref BuildSpecContent
      CustomRules:
        - Source: '</^[^.]+$|\\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)>'
          Target: '/index.html'
          Status: '200'
      EnvironmentVariables:
        - Name: AMPLIFY_DIFF_DEPLOY
          Value: 'false'
        - Name: AMPLIFY_MONOREPO_APP_ROOT
          Value: '/'
        - Name: NODE_ENV
          Value: 'production'
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref RepositoryBranch
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: 'production'

  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess-Amplify

Outputs:
  AmplifyAppId:
    Description: ID of the Amplify App
    Value: !GetAtt AmplifyApp.AppId
  
  AmplifyAppURL:
    Description: URL of the Amplify App
    Value: !Sub https://${RepositoryBranch}.${AmplifyApp.DefaultDomain}
  
  AmplifyConsoleURL:
    Description: URL to the Amplify Console
    Value: !Sub https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp.AppId}