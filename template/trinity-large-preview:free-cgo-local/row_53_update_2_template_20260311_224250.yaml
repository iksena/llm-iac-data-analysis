AWSTemplateFormatVersion: '2010-09-09'
Description: EMR Serverless Environment with Private S3 Bucket and IAM Role

Parameters:
  S3BucketName:
    Type: String
    Default: emr-serverless-scripts-data
    Description: Name of the private S3 bucket for scripts and data

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEMRServerlessPolicy
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - Fn::Sub: arn:aws:s3:::${S3BucketName}/*
                  - Fn::Sub: arn:aws:s3:::${S3BucketName}
        - PolicyName: CloudWatchLogsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  PrivateS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: emr-serverless-spark-app
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      InitialCapacity:
        - Capacity: 1
          Configuration:
            WorkerType: TASK
            WorkerCount: 1
      NetworkConfiguration:
        SubnetIds:
          - Fn::Select:
              - 0
              - Fn::GetAZs: !Ref 'AWS::Region'
      ExecutionRoleArn: !GetAtt EMRServerlessRole.Arn

Outputs:
  ApplicationId:
    Description: EMR Serverless Application ID
    Value: !GetAtt EMRServerlessApplication.ApplicationId
  ApplicationArn:
    Description: EMR Serverless Application ARN
    Value: !GetAtt EMRServerlessApplication.Arn
  S3BucketName:
    Description: Private S3 Bucket Name
    Value: !Ref PrivateS3Bucket