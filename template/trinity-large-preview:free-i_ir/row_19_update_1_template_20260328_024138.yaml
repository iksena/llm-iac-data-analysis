AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: CustomEventBus

  WebhookConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      Name: WebhookConnection
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: x-api-key
        ApiKey: your-api-key-here

  WebhookAPIEndpoint:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      Name: WebhookAPIEndpoint
      ConnectionArn: !GetAtt WebhookConnection.Arn
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST
    DependsOn: WebhookConnection

Outputs:
  CustomEventBusArn:
    Value: !GetAtt CustomEventBus.Arn
    Export:
      Name: CustomEventBusArn
  WebhookConnectionArn:
    Value: !GetAtt WebhookConnection.Arn
    Export:
      Name: WebhookConnectionArn
  WebhookAPIEndpointArn:
    Value: !GetAtt WebhookAPIEndpoint.Arn
    Export:
      Name: WebhookAPIEndpointArn