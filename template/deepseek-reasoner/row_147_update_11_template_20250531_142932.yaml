AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AssetZipUrl:
    Type: String
    Description: URL of the frontend assets ZIP file
    Default: 'https://example.com/default-assets.zip'

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${WebsiteBucket}/*"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SlotFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async () => {
            const symbols = ['cherry','lemon','orange','plum','bell'];
            const results = Array(3).fill().map(() => 
              symbols[Math.floor(Math.random() * symbols.length)]
            );
            const win = results[0] === results[1] && results[1] === results[2];
            return {
              statusCode: 200,
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({results, win})
            };
          }

  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref IdentityPool
              ForAnyValue:StringLike:
                "cognito-identity.amazonaws.com:amr": unauthenticated
      Policies:
        - PolicyName: InvokeSlotFunctionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotFunction.Arn

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  DeploymentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DeploymentAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${WebsiteBucket.Arn}/*"
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt WebsiteBucket.Arn
        - PolicyName: LambdaLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  DeploymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt DeploymentLambdaRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import urllib.request
          import zipfile
          import os
          import json
          import tempfile
          import mimetypes
          import logging
          import traceback
          import cfnresponse
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          def handler(event, context):
              try:
                  logger.info(f"Received event: {json.dumps(event)}")
                  
                  if event['RequestType'] == 'Delete':
                      logger.info("Delete operation - skipping deployment")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  bucket_name = event['ResourceProperties']['BucketName']
                  identity_pool = event['ResourceProperties']['IdentityPoolId']
                  region = event['ResourceProperties']['Region']
                  lambda_name = event['ResourceProperties']['LambdaName']
                  asset_url = event['ResourceProperties']['AssetUrl']
                  
                  s3 = boto3.client('s3')
                  
                  with tempfile.TemporaryDirectory() as tmpdir:
                      zip_path = os.path.join(tmpdir, 'assets.zip')
                      logger.info(f"Downloading assets from {asset_url}")
                      urllib.request.urlretrieve(asset_url, zip_path)
                      
                      extract_path = os.path.join(tmpdir, 'extracted')
                      os.makedirs(extract_path, exist_ok=True)
                      logger.info(f"Extracting to {extract_path}")
                      with zipfile.ZipFile(zip_path, 'r') as zip_ref:
                          zip_ref.extractall(extract_path)
                      
                      config = {
                          "region": region,
                          "identityPoolId": identity_pool,
                          "lambdaFunctionName": lambda_name
                      }
                      config_path = os.path.join(extract_path, 'config.json')
                      logger.info(f"Creating config: {config_path}")
                      with open(config_path, 'w') as f:
                          json.dump(config, f)
                      
                      for root, _, files in os.walk(extract_path):
                          for file in files:
                              local_path = os.path.join(root, file)
                              s3_path = os.path.relpath(local_path, extract_path)
                              
                              content_type, _ = mimetypes.guess_type(local_path)
                              extra_args = {}
                              if content_type:
                                  extra_args['ContentType'] = content_type
                              
                              logger.info(f"Uploading {local_path} to {s3_path}")
                              s3.upload_file(local_path, bucket_name, s3_path, ExtraArgs=extra_args)
                  
                  logger.info("Deployment completed successfully")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Deployment failed: {str(e)}")
                  logger.error(traceback.format_exc())
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

  WebsiteDeployment:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt DeploymentFunction.Arn
      BucketName: !Ref WebsiteBucket
      IdentityPoolId: !Ref IdentityPool
      Region: !Ref AWS::Region
      LambdaName: !Ref SlotFunction
      AssetUrl: !Ref AssetZipUrl

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL for slot machine website
  IdentityPoolId:
    Value: !Ref IdentityPool
    Description: Cognito Identity Pool ID for frontend