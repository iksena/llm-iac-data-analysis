AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with dual public and private IPs
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701  # Replace with a valid AMI ID for your region
      InstanceType: t2.micro
      KeyName: MyKeyPair  # Replace with your KeyPair name
      NetworkInterfaces:
        - DeviceIndex: 0
          GroupSet:
            - Ref: MySecurityGroup
          AssociatePublicIpAddress: true
          PrivateIpAddresses:
            - Primary: true
              PrivateIpAddress: 10.0.0.10
            - PrivateIpAddress: 10.0.0.11
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP inbound traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      VpcId: vpc-xxxxxxxxxxxxxxxxx # Replace with your VPC ID

Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: Instance ID
  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address of the instance
  PrivateIPs:
    Value: !GetAtt EC2Instance.PrivateIpAddress
    Description: Private IP address of the instance

