AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryEndpoint:
    Type: String
    Description: Primary region application endpoint URL
    AllowedPattern: '^[a-zA-Z0-9.-]+$'
  
  SecondaryEndpoint:
    Type: String
    Description: Secondary region application endpoint URL
    AllowedPattern: '^[a-zA-Z0-9.-]+$'

Resources:
  RecoveryCluster:
    Type: 'AWS::Route53RecoveryControl::Cluster'
    Properties:
      Name: 'failover-cluster'

  ControlPanel:
    Type: 'AWS::Route53RecoveryControl::ControlPanel'
    Properties:
      Name: 'failover-panel'
      ClusterArn: !Ref RecoveryCluster

  PrimaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: 'primary-control'
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel

  SecondaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: 'secondary-control'
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel

  SafetyRule:
    Type: 'AWS::Route53RecoveryControl::SafetyRule'
    Properties:
      Name: 'minimum-active-rule'
      ControlPanelArn: !Ref ControlPanel
      AssertionRule:
        AssertedControls: 
          - !Ref PrimaryRoutingControl
          - !Ref SecondaryRoutingControl
        WaitPeriodMs: 5000
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST

  PrimaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        MeasureLatency: false
      HealthCheckTags:
        - Key: Name
          Value: 'primary-health-check'

  SecondaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        MeasureLatency: false
      HealthCheckTags:
        - Key: Name
          Value: 'secondary-health-check'

Outputs:
  ClusterArn:
    Description: Recovery Cluster ARN
    Value: !Ref RecoveryCluster

  ControlPanelArn:
    Description: Control Panel ARN
    Value: !Ref ControlPanel

  PrimaryRoutingControlArn:
    Description: Primary Routing Control ARN
    Value: !Ref PrimaryRoutingControl

  SecondaryRoutingControlArn:
    Description: Secondary Routing Control ARN
    Value: !Ref SecondaryRoutingControl