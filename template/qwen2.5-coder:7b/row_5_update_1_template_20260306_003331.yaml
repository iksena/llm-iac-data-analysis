AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ArtistConcertTicketSales
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

Outputs:
  ArtistConcertTicketSalesTableArn:
    Description: The ARN of the ArtistConcertTicketSales DynamoDB table
    Value: !GetAtt ArtistConcertTicketSalesTable.Arn