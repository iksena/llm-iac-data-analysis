AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - Routes messages from AWS IoT Core to SQS via SNS

Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      MaximumMessageSize: 262144

  IoTDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTDataTopic
      DisplayName: IoT Data Topic

  IoTDataRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IoTDataRuleRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - iot.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTLogging
      Policies:
        - PolicyName: IoTDataRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref IoTDataTopic
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt IoTDataQueue.Arn
              - Effect: Allow
                Action:
                  - iot:Connect
                  - iot:Publish
                  - iot:Subscribe
                  - iot:Receive
                Resource:
                  - '*'

  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTDataRuleRole.Arn
              MessageFormat: RAW
          - Sqs:
              QueueUrl: !Ref IoTDataQueue
              RoleArn: !GetAtt IoTDataRuleRole.Arn
              UseBase64: false
        RuleDisabled: false
        AwsIotSqlVersion: '2016-03-31'

Outputs:
  QueueUrl:
    Description: URL of the IoT Data SQS Queue
    Value: !Ref IoTDataQueue
  TopicArn:
    Description: ARN of the IoT Data SNS Topic
    Value: !Ref IoTDataTopic
  RuleArn:
    Description: ARN of the IoT Data Rule
    Value: !GetAtt IoTDataRule.Arn