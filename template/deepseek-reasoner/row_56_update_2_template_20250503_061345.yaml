AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  UserPoolName:
    Type: String
    Default: AdminManagedUserPool
    Description: Name for the Cognito User Pool
  EmailFromAddress:
    Type: String
    Description: Verified SES email address for sending emails
  EmailReplyToAddress:
    Type: String
    Description: Reply-to email address for user communications
  SESIdentityArn:
    Type: String
    Description: ARN of verified SES email identity

Resources:
  CognitoEmailRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cognito-idp.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SESEmailSendingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: !Ref SESIdentityArn

  AdminManagedUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        From: !Ref EmailFromAddress
        ReplyToEmailAddress: !Ref EmailReplyToAddress
        SourceArn: !Ref SESIdentityArn
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: "Your verification code is {####}."
        EmailSubject: "Your verification code"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AdminManagementClient
      UserPoolId: !Ref AdminManagedUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

Outputs:
  UserPoolId:
    Value: !Ref AdminManagedUserPool
    Description: ID of the created Cognito User Pool
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: Client ID for application integration
  CognitoEmailRoleArn:
    Value: !GetAtt CognitoEmailRole.Arn
    Description: IAM Role ARN for email delivery configuration