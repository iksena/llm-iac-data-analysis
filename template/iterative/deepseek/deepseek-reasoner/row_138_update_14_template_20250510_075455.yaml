AWSTemplateFormatVersion: '2010-09-09'
Description: Web application with S3, DynamoDB, and EC2 integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC ID (e.g., vpc-1a2b3c4d)
    AllowedPattern: "^vpc-[0-9a-f]{8,17}$"
    ConstraintDescription: Must be a valid VPC ID format
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet ID (e.g., subnet-1a2b3c4d)
    AllowedPattern: "^subnet-[0-9a-f]{8,17}$"
    ConstraintDescription: Must be a valid Subnet ID format
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 Key Pair name
    ConstraintDescription: Must be an existing key pair in this region
  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^((\d{1,3}\.){3}\d{1,3}/\d{1,2})$"
  LabFilesURL:
    Type: String
    Default: https://github.com/example/lab-files/archive/main.zip
  DataJSONURL:
    Type: String
    Default: https://example.com/data.json
  BucketName:
    Type: String
    Description: Unique S3 bucket name
    Default: webapp-sample-bucket
    AllowedPattern: "^[a-z0-9.-]{3,63}$"
    ConstraintDescription: Must follow S3 bucket naming rules

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0cd3dfa4e37921605
    eu-west-1:
      AMI: ami-0bd2230cfb28832f7

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceType
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceType
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              Service: 
                - ec2.amazonaws.com
            Action: 
              - sts:AssumeRole
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"
              - Effect: Allow
                Action: 
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt DynamoDBTable.Arn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: 
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: WebServer Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet: 
            - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          yum update -y
          yum install -y httpd php aws-cli php-pdo php-mbstring php-xml
          systemctl start httpd && systemctl enable httpd
          
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          cd /var/www/html && composer require aws/aws-sdk-php
          
          curl -sSL "${LabFilesURL}" -o labfiles.zip
          unzip -qo labfiles.zip -d /var/www/html/ || { echo "Extract failed"; exit 1; }
          
          AWS_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          sed -i -e "s/%%BUCKET_NAME%%/${BucketName}/g" \
                 -e "s/%%AWS_REGION%%/${AWS_REGION}/g" \
                 /var/www/html/config.php
          
          aws s3 sync /var/www/html/static/ s3://${BucketName}/ --delete
          
          curl -sSL "${DataJSONURL}" -o /tmp/data.json
          php /var/www/html/scripts/import-data.php /tmp/data.json || echo "Data import warning"
          
          chown -R apache:apache /var/www/html
          systemctl restart httpd

Outputs:
  WebsiteURL:
    Value: !Sub "http://${WebServerInstance.PublicDnsName}"
  S3BucketName:
    Value: !Ref S3Bucket
  DynamoDBTable:
    Value: !Ref DynamoDBTable