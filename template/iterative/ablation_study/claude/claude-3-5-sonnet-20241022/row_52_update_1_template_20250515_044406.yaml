AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS Region for the application
  
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS Region for the application
    
  ApplicationName:
    Type: String
    Description: Name of the application for resource naming
    
  PrimaryEndpoint:
    Type: String
    Description: Health check endpoint for primary region
    
  SecondaryEndpoint:
    Type: String
    Description: Health check endpoint for secondary region

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: !Sub ${ApplicationName}-cluster
      
  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub ${ApplicationName}-control-panel
      ClusterArn: !Ref RecoveryCluster
      
  PrimaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${ApplicationName}-primary-control
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel
      
  SecondaryRoutingControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${ApplicationName}-secondary-control
      ClusterArn: !Ref RecoveryCluster
      ControlPanelArn: !Ref ControlPanel
      
  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Sub ${ApplicationName}-safety-rule
      ControlPanelArn: !Ref ControlPanel
      AssertionRule:
        AssertedControls: 
          - !Ref PrimaryRoutingControl
          - !Ref SecondaryRoutingControl
        WaitPeriodMs: 5000
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
        
  PrimaryHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        Port: 443
        RequestInterval: 30
        FailureThreshold: 3
        MeasureLatency: true
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub ${ApplicationName}-primary-health-check
          
  SecondaryHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        Port: 443
        RequestInterval: 30
        FailureThreshold: 3
        MeasureLatency: true
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub ${ApplicationName}-secondary-health-check

Outputs:
  RecoveryClusterArn:
    Description: ARN of the Recovery Cluster
    Value: !Ref RecoveryCluster
    
  ControlPanelArn:
    Description: ARN of the Control Panel
    Value: !Ref ControlPanel
    
  PrimaryRoutingControlArn:
    Description: ARN of the Primary Region Routing Control
    Value: !Ref PrimaryRoutingControl
    
  SecondaryRoutingControlArn:
    Description: ARN of the Secondary Region Routing Control
    Value: !Ref SecondaryRoutingControl
    
  PrimaryHealthCheckId:
    Description: ID of the Primary Region Health Check
    Value: !Ref PrimaryHealthCheck
    
  SecondaryHealthCheckId:
    Description: ID of the Secondary Region Health Check
    Value: !Ref SecondaryHealthCheck