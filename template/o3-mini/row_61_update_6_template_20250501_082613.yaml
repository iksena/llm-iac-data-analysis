AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template that creates a private Amazon Route 53 Hosted Zone for internal DNS management.
  The hosted zone's domain is "www.example.com", and it is associated with the specified VPC.

Parameters:
  VPCId:
    Description: "Provide a valid VPC ID (e.g., vpc-12345678) for associating the private hosted zone."
    Type: AWS::EC2::VPC::Id
    AllowedPattern: "^vpc-[a-zA-Z0-9]+$"
    ConstraintDescription: "The VPCId must be a valid VPC ID, e.g., vpc-12345678."

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      HostedZoneConfig:
        Comment: "Private Route 53 Hosted Zone for internal DNS management."
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref AWS::Region

Outputs:
  HostedZoneId:
    Description: "The ID of the created private Route 53 hosted zone."
    Value: !Ref PrivateHostedZone