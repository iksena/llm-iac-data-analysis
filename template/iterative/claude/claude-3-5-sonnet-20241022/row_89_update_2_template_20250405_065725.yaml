AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable Security Hub with default standards'

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      EnableDefaultStandards: true
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub resource
    Value: !Sub arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:hub/default