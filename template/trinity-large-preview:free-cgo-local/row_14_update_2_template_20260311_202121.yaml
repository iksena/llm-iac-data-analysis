AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Elastic Network Interface (ENI) with two Elastic IPs (EIPs) and secondary private IPs.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the ENI will be created
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: List of security group IDs to associate with the ENI
    Default: []
  SecondaryPrivateIpCount:
    Type: Number
    Description: Number of secondary private IP addresses to assign to the ENI
    Default: 1
    MinValue: 0
    MaxValue: 10

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: ENI with two EIPs and secondary private IPs
      PrivateIpAddress: !Select [0, !GetAZs '']
      SecondaryPrivateIpAddressCount: !Ref SecondaryPrivateIpCount
      GroupSet: !Ref SecurityGroupIds
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ENI

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

Outputs:
  NetworkInterfaceId:
    Description: The ID of the created network interface
    Value: !Ref NetworkInterface
  EIP1AllocationId:
    Description: The allocation ID of the first EIP
    Value: !GetAtt EIP1.AllocationId
  EIP2AllocationId:
    Description: The allocation ID of the second EIP
    Value: !GetAtt EIP2.AllocationId
  PrimaryPrivateIpAddress:
    Description: The primary private IP address of the ENI
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress
  SecondaryPrivateIpAddresses:
    Description: The list of secondary private IP addresses of the ENI
    Value: !Join [',', !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]