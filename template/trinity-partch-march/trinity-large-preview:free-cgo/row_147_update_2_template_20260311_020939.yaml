AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Integration

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website-bucket
    Description: Name of the S3 bucket for website hosting
  LambdaFunctionName:
    Type: String
    Default: SlotMachineLambda
    Description: Name of the Lambda function
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool
  DeploymentZipUrl:
    Type: String
    Default: https://example.com/slot-machine.zip
    Description: URL to download the pre-built website ZIP file

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSLambdaExecute

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎'];
            const spin = () => symbols[Math.floor(Math.random() * symbols.length)];
            const result = [spin(), spin(), spin()];
            const isWin = result.every(s => s === result[0]);
            return {
              statusCode: 200,
              body: JSON.stringify({
                result,
                win: isWin,
                message: isWin ? 'Jackpot!' : 'Try again!'
              })
            };
          };

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineUnauthenticatedRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  WebsiteDeploymentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineWebsiteDeployment
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const https = require('https');
          const zlib = require('zlib');

          exports.handler = async (event) => {
            const s3 = new AWS.S3();
            const bucketName = process.env.BUCKET_NAME;
            const zipUrl = process.env.DEPLOYMENT_ZIP_URL;

            // Download ZIP file
            const zipData = await new Promise((resolve, reject) => {
              https.get(zipUrl, (res) => {
                const chunks = [];
                res.on('data', (chunk) => chunks.push(chunk));
                res.on('end', () => resolve(Buffer.concat(chunks)));
                res.on('error', reject);
              }).on('error', reject);
            });

            // Extract ZIP
            const archive = await new Promise((resolve, reject) => {
              zlib.gunzip(zipData, (err, buffer) => {
                if (err) reject(err);
                else resolve(buffer);
              });
            });

            // Upload files to S3
            const files = archive.toString().split('\n').filter(f => f.endsWith('/'));
            for (const file of files) {
              const key = file.replace(/.*\//, '');
              await s3.putObject({
                Bucket: bucketName,
                Key: key,
                Body: archive,
                ContentType: 'application/octet-stream'
              }).promise();
            }

            return { statusCode: 200, body: 'Deployment complete' };
          };
      Environment:
        Variables:
          BUCKET_NAME: !Ref WebsiteBucketName
          DEPLOYMENT_ZIP_URL: !Ref DeploymentZipUrl

  WebsiteDeploymentCustomResource:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt WebsiteDeploymentLambda.Arn
      StackName: !Ref AWS::StackName

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the slot machine website
  WebsiteDomainName:
    Value: !GetAtt WebsiteBucket.DomainName
    Description: Domain name of the S3 bucket
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineLambda.Arn
    Description: ARN of the slot machine Lambda function
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: ID of the Cognito Identity Pool