AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure static website hosted on S3 with CloudFront CDN integration'

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'static-website'
    Description: 'Prefix for the S3 bucket name'
    AllowedPattern: '[a-zA-Z0-9-]+'
    ConstraintDescription: 'Bucket prefix can include numbers, lowercase letters, uppercase letters, and hyphens (-)'
    
  CloudFrontPriceClass:
    Type: String
    Default: 'PriceClass_100'
    AllowedValues:
      - 'PriceClass_100'
      - 'PriceClass_200'
      - 'PriceClass_All'
    Description: 'Price class for the CloudFront distribution'

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub '${BucketNamePrefix}-bucket'

  CloudFrontOriginAccessIdentity:
    Type: 'AWS::CloudFront::CloudFrontOriginAccessIdentity'
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${BucketNamePrefix} website'

  S3BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  CloudFrontDistribution:
    Type: 'AWS::CloudFront::Distribution'
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt S3Bucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}'
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
          DefaultTTL: 0
          MinTTL: 0
          MaxTTL: 0
        PriceClass: !Ref CloudFrontPriceClass
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2
        IPV6Enabled: true

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}'
                  - !Sub 'arn:aws:s3:::${S3Bucket}/*'

  S3ContentManagementFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          import urllib.request

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          s3 = boto3.client('s3')

          def create_default_content(bucket_name):
              logger.info(f"Creating default content in bucket: {bucket_name}")
              
              # Default HTML content
              html_content = """
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Welcome to My Static Website</title>
                  <style>
                      body {
                          font-family: Arial, sans-serif;
                          line-height: 1.6;
                          margin: 0;
                          padding: 20px;
                          color: #333;
                          max-width: 800px;
                          margin: 0 auto;
                      }
                      h1 {
                          color: #0066cc;
                      }
                      footer {
                          margin-top: 40px;
                          font-size: 0.8em;
                          color: #666;
                      }
                  </style>
              </head>
              <body>
                  <h1>Welcome to My Static Website</h1>
                  <p>This is a default page created by CloudFormation. Replace this content with your own website files.</p>
                  <p>This website is served through CloudFront CDN for optimal performance and security.</p>
                  <footer>
                      <p>Created with AWS CloudFormation, S3, and CloudFront</p>
                  </footer>
              </body>
              </html>
              """
              
              # Error HTML content
              error_content = """
              <!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Error - Page Not Found</title>
                  <style>
                      body {
                          font-family: Arial, sans-serif;
                          line-height: 1.6;
                          margin: 0;
                          padding: 20px;
                          color: #333;
                          max-width: 800px;
                          margin: 0 auto;
                      }
                      h1 {
                          color: #cc0000;
                      }
                      footer {
                          margin-top: 40px;
                          font-size: 0.8em;
                          color: #666;
                      }
                  </style>
              </head>
              <body>
                  <h1>Error - Page Not Found</h1>
                  <p>The page you are looking for does not exist.</p>
                  <p><a href="/">Return to homepage</a></p>
                  <footer>
                      <p>Created with AWS CloudFormation, S3, and CloudFront</p>
                  </footer>
              </body>
              </html>
              """
              
              try:
                  # Upload index.html
                  s3.put_object(
                      Bucket=bucket_name,
                      Key='index.html',
                      Body=html_content,
                      ContentType='text/html'
                  )
                  
                  # Upload error.html
                  s3.put_object(
                      Bucket=bucket_name,
                      Key='error.html',
                      Body=error_content,
                      ContentType='text/html'
                  )
                  
                  logger.info("Successfully created default content")
                  return True
              except Exception as e:
                  logger.error(f"Error creating default content: {str(e)}")
                  return False

          def empty_bucket(bucket_name):
              logger.info(f"Emptying bucket: {bucket_name}")
              try:
                  # List all objects in the bucket
                  response = s3.list_objects_v2(Bucket=bucket_name)
                  
                  if 'Contents' in response and len(response['Contents']) > 0:
                      delete_keys = {'Objects': [{'Key': obj['Key']} for obj in response['Contents']]}
                      s3.delete_objects(Bucket=bucket_name, Delete=delete_keys)
                      
                      # Check if there are more objects to delete (pagination)
                      while response.get('IsTruncated', False):
                          response = s3.list_objects_v2(
                              Bucket=bucket_name,
                              ContinuationToken=response['NextContinuationToken']
                          )
                          if 'Contents' in response and len(response['Contents']) > 0:
                              delete_keys = {'Objects': [{'Key': obj['Key']} for obj in response['Contents']]}
                              s3.delete_objects(Bucket=bucket_name, Delete=delete_keys)
                  
                  logger.info("Successfully emptied bucket")
                  return True
              except Exception as e:
                  logger.error(f"Error emptying bucket: {str(e)}")
                  return False

          def send_response(event, context, response_status, response_data):
              response_body = {
                  'Status': response_status,
                  'Reason': f'See details in CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              
              response_body_json = json.dumps(response_body)
              logger.info(f"Response body: {response_body_json}")
              
              headers = {
                  'Content-Type': '',
                  'Content-Length': str(len(response_body_json))
              }
              
              try:
                  req = urllib.request.Request(
                      url=event['ResponseURL'],
                      data=response_body_json.encode('utf-8'),
                      headers=headers,
                      method='PUT'
                  )
                  response = urllib.request.urlopen(req)
                  logger.info(f"Status code: {response.getcode()}")
                  logger.info(f"Status message: {response.msg}")
                  return True
              except Exception as e:
                  logger.error(f"Error sending response: {str(e)}")
                  return False

          def handler(event, context):
              logger.info("Received event: " + json.dumps(event))
              
              response_data = {}
              
              try:
                  bucket_name = event['ResourceProperties']['BucketName']
                  
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      success = create_default_content(bucket_name)
                      response_data['Message'] = "Content created successfully" if success else "Failed to create content"
                      send_response(event, context, 'SUCCESS', response_data)
                  elif event['RequestType'] == 'Delete':
                      success = empty_bucket(bucket_name)
                      response_data['Message'] = "Bucket emptied successfully" if success else "Failed to empty bucket"
                      send_response(event, context, 'SUCCESS', response_data)
              except Exception as e:
                  logger.error(f"Exception: {str(e)}")
                  response_data['Error'] = str(e)
                  send_response(event, context, 'FAILED', response_data)

  S3ContentManagement:
    Type: 'Custom::S3ContentManagement'
    DependsOn: S3BucketPolicy
    Properties:
      ServiceToken: !GetAtt S3ContentManagementFunction.Arn
      BucketName: !Ref S3Bucket

Outputs:
  CloudFrontDomainName:
    Description: 'Domain name of the CloudFront distribution'
    Value: !GetAtt CloudFrontDistribution.DomainName
    
  S3BucketName:
    Description: 'Name of the S3 bucket'
    Value: !Ref S3Bucket
    
  CloudFrontURL:
    Description: 'URL of the CloudFront distribution'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'