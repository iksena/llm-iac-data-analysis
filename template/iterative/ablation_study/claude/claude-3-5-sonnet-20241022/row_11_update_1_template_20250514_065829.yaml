AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table for mobile notifications reporting with GSI and TTL'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: mobile-notifications
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9._-]+'
  
  TTLAttributeName:
    Type: String
    Description: Name of the TTL attribute
    Default: expiryTime
    MinLength: 1
    MaxLength: 255

  Environment:
    Type: String
    Description: Environment name for resource tagging
    Default: production
    AllowedValues:
      - development
      - staging
      - production

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: MobileNotifications

Outputs:
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TableArn

  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref NotificationsTable
    Export:
      Name: !Sub ${AWS::StackName}-TableName

  GSIName:
    Description: Name of the Global Secondary Index
    Value: TypeSentTimeIndex
    Export:
      Name: !Sub ${AWS::StackName}-GSIName