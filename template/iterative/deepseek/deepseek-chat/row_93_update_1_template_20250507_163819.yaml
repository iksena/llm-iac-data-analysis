AWSTemplateFormatVersion: '2010-09-09'
Description: 'Auto-configuring EC2 instance with Nginx via SSM and enhanced monitoring'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type
  KeyPairName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: String
    Default: ''
  LogBucketName:
    Description: Name for the S3 bucket to store logs
    Type: String
    Default: nginx-logs-${AWS::AccountId}-${AWS::Region}
  EnvironmentTag:
    Description: Environment tag to apply to resources
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0e472933a1395e172
    eu-west-1:
      AMI: ami-0d729a60
    ap-southeast-1:
      AMI: ami-0f02b24005e4aec36

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      AccessControl: LogDeliveryWrite
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: SSMAndS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${LogBucketName}
                  - !Sub arn:aws:s3:::${LogBucketName}/*
              - Effect: Allow
                Action:
                  - ssm:DescribeAssociation
                  - ssm:GetDeployablePatchSnapshotForInstance
                  - ssm:GetDocument
                  - ssm:DescribeDocument
                  - ssm:GetManifest
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:ListAssociations
                  - ssm:ListInstanceAssociations
                  - ssm:PutInventory
                  - ssm:PutComplianceItems
                  - ssm:PutConfigurePackageResult
                  - ssm:UpdateAssociationStatus
                  - ssm:UpdateInstanceAssociationStatus
                  - ssm:UpdateInstanceInformation
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - ec2messages:AcknowledgeMessage
                  - ec2messages:DeleteMessage
                  - ec2messages:FailMessage
                  - ec2messages:GetEndpoint
                  - ec2messages:GetMessages
                  - ec2messages:SendReply
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentTag}-Nginx-WebServer
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          mkdir -p /var/log/nginx
          aws s3 cp /var/log/nginx/ s3://${LogBucketName}/nginx-logs/ --recursive --include "*" --region ${AWS::Region}

  NginxInstallationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Install and configure Nginx web server
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: InstallNginx
            inputs:
              runCommand:
                - yum update -y
                - amazon-linux-extras install nginx1 -y
                - systemctl start nginx
                - systemctl enable nginx
                - echo "server { listen 80; location / { return 200 'Hello from Nginx!'; }}" > /etc/nginx/conf.d/default.conf
                - systemctl restart nginx

  NginxInstallationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref NginxInstallationDocument
      Targets:
        - Key: tag:InstallNginx
          Values:
            - 'true'
      ScheduleExpression: 'rate(5 minutes)'
      MaxConcurrency: '1'
      MaxErrors: '1'

  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when CPU exceeds 70% for 5 minutes
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref WebServerInstance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx web server
    Value: !Ref WebServerInstance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt WebServerInstance.PublicDnsName
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucketName
  SSMAssociationId:
    Description: SSM Association ID for Nginx installation
    Value: !Ref NginxInstallationAssociation