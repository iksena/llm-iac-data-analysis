AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with Lambda custom resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 0
  SecondNumber:
    Type: Number
    Default: 0
  Operator:
    Type: String
    Default: +
    AllowedValues:
      - +
      - -
      - *
      - /
  SimulateFailure:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false

Resources:
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              try:
                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']
                  simulate_failure = event['ResourceProperties']['SimulateFailure']

                  if simulate_failure.lower() == 'true':
                      raise ValueError("Simulated failure")

                  if operator == '+':
                      result = first_number + second_number
                  elif operator == '-':
                      result = first_number - second_number
                  elif operator == '*':
                      result = first_number * second_number
                  elif operator == '/':
                      if second_number == 0:
                          raise ValueError("Division by zero")
                      result = first_number / second_number
                  else:
                      raise ValueError("Invalid operator")

                  response_data = {
                      'Result': result,
                      'Status': 'Success'
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  response_data = {
                      'Result': str(e),
                      'Status': 'Failure'
                  }
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  CustomHelper:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomHelper.Result
  CalculationStatus:
    Description: Status of the calculation
    Value: !GetAtt CustomHelper.Status