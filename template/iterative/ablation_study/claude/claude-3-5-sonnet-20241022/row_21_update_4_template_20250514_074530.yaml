AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Timestream Database and Tables with configurable retention policies'

Parameters:
  DatabaseName:
    Type: String
    Description: Name of the Timestream database (3-64 characters, alphanumeric, underscore, period, hyphen)
    MinLength: 3
    MaxLength: 64
    AllowedPattern: ^[a-zA-Z0-9_.-]+$
    ConstraintDescription: Must be 3-64 characters containing only alphanumeric, underscore, period, or hyphen.
    Default: 'timestreamdb'

  MemoryRetentionHours:
    Type: Number
    Description: Memory store retention period in hours (1-8766)
    MinValue: 1
    MaxValue: 8766
    Default: 24
    ConstraintDescription: Must be between 1 and 8766 hours (approximately 1 year)

  MagneticRetentionDays:
    Type: Number
    Description: Magnetic store retention period in days (1-73000)
    MinValue: 1
    MaxValue: 73000
    Default: 7
    ConstraintDescription: Must be between 1 and 73000 days (approximately 200 years)

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: TimeSeries

  BatchWriteTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: TableType
          Value: BatchWrite

  MemoryOnlyTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: 1
      Tags:
        - Key: TableType
          Value: MemoryOnly

  MagneticTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: TableType
          Value: Magnetic

  CommonAttributesTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticRetentionDays
      Tags:
        - Key: TableType
          Value: CommonAttributes

Outputs:
  DatabaseArn:
    Description: ARN of the created Timestream database
    Value: !GetAtt TimestreamDatabase.Arn

  BatchWriteTableArn:
    Description: ARN of the batch write table
    Value: !GetAtt BatchWriteTable.Arn

  MemoryOnlyTableArn:
    Description: ARN of the memory-only table
    Value: !GetAtt MemoryOnlyTable.Arn

  MagneticTableArn:
    Description: ARN of the magnetic storage table
    Value: !GetAtt MagneticTable.Arn

  CommonAttributesTableArn:
    Description: ARN of the common attributes table
    Value: !GetAtt CommonAttributesTable.Arn