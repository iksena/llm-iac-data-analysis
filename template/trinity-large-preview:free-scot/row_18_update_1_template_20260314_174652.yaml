AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB table with stream and EventBridge Pipe for event-driven workflows

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyTable
    Description: Name of the DynamoDB table
  EventBridgeBusName:
    Type: String
    Default: default
    Description: Name of the EventBridge bus
  FilterPattern:
    Type: String
    Default: '{ "avatarUrl": { "endsWith": ".png" } }'
    Description: JSON filter pattern for EventBridge Pipe

Resources:
  MyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  Registry:
    Type: AWS::EventSchemas::Registry
    Properties:
      RegistryName: my-registry

  Schema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content: |
        {
          "type": "object",
          "properties": {
            "Records": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "eventName": { "type": "string" },
                  "dynamodb": {
                    "type": "object",
                    "properties": {
                      "NewImage": {
                        "type": "object",
                        "properties": {
                          "avatarUrl": { "type": "string" }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      RegistryName: !Ref Registry
      SchemaName: dynamodb-stream
      Type: JSON

  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt MyTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBridgeBusName}'

  MyPipe:
    Type: AWS::EventBridge::Pipe
    Properties:
      Name: DynamoDBToEventBridgePipe
      Source:
        Type: dynamodb-streams
        DetailType: 'DynamoDB Stream'
      Enrichment: NONE
      Target:
        Type: eventbridge
        DetailType: !Ref FilterPattern
        Source: 'com.example.dynamodb'
        EventBusName: !Ref EventBridgeBusName
      FilterCriteria:
        Filters:
          - Path: avatarUrl
            Type: string
            Value: '.png'
      RoleArn: !GetAtt PipeExecutionRole.Arn