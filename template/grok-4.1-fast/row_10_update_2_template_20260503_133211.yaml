AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drives in default VPC using latest Amazon Linux 2 AMI'

Parameters:
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: 'Name of an existing EC2 KeyPair to enable SSH access (create with "aws ec2 create-key-pair --key-name MyKey --query "KeyMaterial" --output text > MyKey.pem" first)'
  InstanceType:
    Type: String
    Default: 'm5d.large'
    Description: 'EC2 instance type (must support instance store volumes like m5d.*)'
    AllowedValues:
      - 'm5d.large'
      - 'm5d.xlarge'
      - 'm5d.2xlarge'
      - 'c5d.large'
    ConstraintDescription: 'must be a valid instance type with NVMe instance store support'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'ID of the pre-existing default VPC'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'ID of a public subnet in the default VPC (for public IP)'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR IP range allowed to access EC2 instance on SSH port 22'
    AllowedPattern: '^((\\d{1,3}\\.){3}\\d{1,3}(/([0-2][0-9]|3[0-2]))?)$'
    ConstraintDescription: 'must be a valid CIDR range of the form x.x.x.x/x or x.x.x.x (e.g. 203.0.113.0/24 or 0.0.0.0/0)'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSH access to EC2 instance'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2-SG'

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId:
        Fn::Sub: 'resolve:ssm:/aws/service/ami-amazon-linux-latest/al2-ami-kernel-5.10-hvm-2.0-x86_64-gp2'
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref InstanceSecurityGroup
          AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Instance'
    DependsOn: InstanceSecurityGroup

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Ec2Instance
  PublicIpAddress:
    Description: Public IP address of the EC2 instance (SSH: ssh -i key.pem ec2-user@IP)
    Value: !GetAtt Ec2Instance.PublicIpAddress
  KeyName:
    Description: Name of the KeyPair used for SSH access
    Value: !Ref KeyName
  SecurityGroupId:
    Description: ID of the instance security group
    Value: !Ref InstanceSecurityGroup