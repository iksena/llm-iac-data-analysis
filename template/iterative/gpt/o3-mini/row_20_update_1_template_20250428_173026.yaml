AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create a CloudWatch Dashboard and CloudWatch Logs Insights
  Query Definitions to monitor AWS Client VPN usage patterns including connection durations,
  data transfer volumes, and user activity with authentication type breakdowns.

Resources:
  QueryDefinitionConnectionDurations:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/Usage/ConnectionDurations"
      QueryString: "fields @timestamp, connectionDuration | stats avg(connectionDuration) as avgConnectionDuration by bin(5m)"

  QueryDefinitionDataTransfer:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/Usage/DataTransfer"
      QueryString: "fields @timestamp, ingressBytes, egressBytes | stats sum(ingressBytes) as totalIngress, sum(egressBytes) as totalEgress by bin(5m)"

  QueryDefinitionUserActivity:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/Usage/UserActivity"
      QueryString: "fields @timestamp, user, authType | stats count_distinct(user) as distinctUsers by authType, bin(5m)"

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: "ClientVPNUsageDashboard"
      DashboardBody: 
        Fn::Sub:
          - |
            {
              "widgets": [
                {
                  "type": "log",
                  "x": 0,
                  "y": 0,
                  "width": 24,
                  "height": 6,
                  "properties": {
                    "queryDefinitionId": "${QueryDefConnId}",
                    "title": "Client VPN Connection Durations"
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 7,
                  "width": 24,
                  "height": 6,
                  "properties": {
                    "queryDefinitionId": "${QueryDefDataTransferId}",
                    "title": "Client VPN Data Transfer Volumes"
                  }
                },
                {
                  "type": "log",
                  "x": 0,
                  "y": 14,
                  "width": 24,
                  "height": 6,
                  "properties": {
                    "queryDefinitionId": "${QueryDefUserActivityId}",
                    "title": "Client VPN User Activity & Auth Breakdown"
                  }
                }
              ]
            }
          - {
              QueryDefConnId: !Ref QueryDefinitionConnectionDurations,
              QueryDefDataTransferId: !Ref QueryDefinitionDataTransfer,
              QueryDefUserActivityId: !Ref QueryDefinitionUserActivity
            }

Outputs:
  DashboardURL:
    Description: "URL to view the CloudWatch Dashboard"
    Value: !Sub "https://console.aws.amazon.com/cloudwatch/home#dashboards:name=${CloudWatchDashboard}"
  QueryDefinitionConnectionDurationsId:
    Description: "ID of the Connection Durations Query Definition"
    Value: !Ref QueryDefinitionConnectionDurations
  QueryDefinitionDataTransferId:
    Description: "ID of the Data Transfer Query Definition"
    Value: !Ref QueryDefinitionDataTransfer
  QueryDefinitionUserActivityId:
    Description: "ID of the User Activity Query Definition"
    Value: !Ref QueryDefinitionUserActivity