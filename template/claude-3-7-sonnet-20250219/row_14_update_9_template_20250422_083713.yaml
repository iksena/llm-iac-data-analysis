AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an ENI with two EIPs and secondary private IPs'

Parameters:
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC

  SubnetCidr:
    Type: String
    Default: '10.0.0.0/24'
    Description: CIDR block for the subnet

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Subnet'

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-RouteTable'

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for ENI
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Description: Network Interface with secondary private IPs
      GroupSet:
        - !Ref SecurityGroup
      SecondaryPrivateIpAddressCount: 1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ENI'

  PrimaryElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrimaryEIP'

  SecondaryElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SecondaryEIP'

  PrimaryElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PrimaryElasticIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  SecondaryElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    DependsOn: PrimaryElasticIPAssociation
    Properties:
      AllocationId: !GetAtt SecondaryElasticIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  VpcId:
    Description: ID of the created VPC
    Value: !Ref VPC

  SubnetId:
    Description: ID of the created Subnet
    Value: !Ref Subnet

  SecurityGroupId:
    Description: ID of the created Security Group
    Value: !Ref SecurityGroup

  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface

  PrimaryPrivateIp:
    Description: Primary private IP address of the Network Interface
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondaryPrivateIps:
    Description: Secondary private IP addresses of the Network Interface
    Value: !Join [', ', !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

  PrimaryElasticIpAddress:
    Description: Primary Elastic IP address
    Value: !Ref PrimaryElasticIP

  SecondaryElasticIpAddress:
    Description: Secondary Elastic IP address
    Value: !Ref SecondaryElasticIP