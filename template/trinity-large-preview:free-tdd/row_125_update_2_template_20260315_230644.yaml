AWSTemplateFormatVersion: '2010-09-09'
Description: Secure REST API Gateway integrated with Amazon SES for templated email sending

Parameters:
  ApiName:
    Type: String
    Default: EmailAPI
    Description: Name of the API Gateway REST API
  StageName:
    Type: String
    Default: prod
    Description: Name of the API Gateway stage
  ApiKeyDescription:
    Type: String
    Default: API Key for Email API
    Description: Description for the API Key
  UsagePlanName:
    Type: String
    Default: EmailAPIUsagePlan
    Description: Name of the Usage Plan
  RequestValidatorName:
    Type: String
    Default: EmailAPIValidator
    Description: Name of the Request Validator
  ModelName:
    Type: String
    Default: EmailAPIModel
    Description: Name of the Model
  RoleName:
    Type: String
    Default: APIGatewaySESRole
    Description: Name of the IAM Role
  PolicyName:
    Type: String
    Default: APIGatewaySESPolicies
    Description: Name of the IAM Policy

Resources:
  # API Gateway REST API
  EmailAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: API for sending templated emails via SES

  # IAM Role for API Gateway to access SES
  APIGatewaySESRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayInvokeFullAccess

  # IAM Policy for SES SendEmail permission
  APIGatewaySESPolicies:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Ref PolicyName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: ses:SendEmail
            Resource: '*'
      Roles:
        - !Ref APIGatewaySESRole

  # API Gateway Model for request validation
  EmailAPIModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref EmailAPI
      Name: !Ref ModelName
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        type: object
        properties:
          to:
            type: string
          from:
            type: string
          subject:
            type: string
          text:
            type: string
          html:
            type: string
        required:
          - to
          - from
          - subject

  # API Gateway Request Validator
  EmailAPIValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: !Ref RequestValidatorName
      RestApiId: !Ref EmailAPI
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # API Gateway API Key
  EmailAPIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Sub ${ApiName}-key
      Description: !Ref ApiKeyDescription
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailAPI
          StageName: !Ref StageName

  # API Gateway Usage Plan
  EmailAPIUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: !Ref StageName
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  # API Gateway Usage Plan Key
  EmailAPIUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref EmailAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref EmailAPIUsagePlan

  # API Gateway Resource (root)
  EmailAPIResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailAPI
      ParentId: !GetAtt EmailAPI.RootResourceId
      PathPart: '{proxy+}'

  # API Gateway Method
  EmailAPIMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailAPIResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref EmailAPIValidator
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewaySESRole.Arn
        RequestTemplates:
          application/json: !Sub |
            {
              "Action": "SendEmail",
              "SourceArn": "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${from}",
              "Destination": {
                "ToAddresses": [
                  "$input.path('$.to')"
                ]
              },
              "Message": {
                "Subject": {
                  "Data": "$input.path('$.subject')"
                },
                "Body": {
                  "Text": {
                    "Data": "$input.path('$.text')"
                  },
                  "Html": {
                    "Data": "$input.path('$.html')"
                  }
                }
              }
            }
        IntegrationResponses:
          - StatusCode: 200

  # API Gateway Deployment
  EmailAPIDeployment:
    DependsOn: EmailAPIMethod
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref EmailAPI
      Description: Deployment of the Email API

  # API Gateway Stage
  EmailAPIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref EmailAPI
      DeploymentId: !Ref EmailAPIDeployment
      StageName: !Ref StageName
      Description: Production stage for Email API
      CacheClusterEnabled: false
      TracingEnabled: false
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          CachingEnabled: false
          DataTraceEnabled: false
          LoggingLevel: OFF
          MetricsEnabled: false
          ThrottlingBurstLimit: 500
          ThrottlingRateLimit: 500

Outputs:
  ApiURL:
    Description: URL of the deployed API
    Value: !Sub https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  ApiKeyId:
    Description: ID of the API Key
    Value: !Ref EmailAPIKey
  ApiKey:
    Description: API Key value (for testing purposes)
    Value: !GetAtt EmailAPIKey.Value