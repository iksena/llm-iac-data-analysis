AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge configuration to route custom events to external API endpoint

Resources:
  WebhookAPIKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: WebhookAPIKey
      Description: API key for webhook.site authentication
      SecretString: "your-api-key-here"  # Replace with actual API key or use dynamic reference

  WebhookConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      Name: WebhookConnection
      Description: Connection to webhook.site with API key authentication
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: x-api-key
        ApiKeyValue: !Sub '{{resolve:secretsmanager:${WebhookAPIKey}::SecretString}}'
      InvocationEndpoint: https://webhook.site/testtest
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  WebhookAPIDestination:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      Name: WebhookAPIDestination
      ConnectionName: !Ref WebhookConnection
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  CustomEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: CustomEventBus
      Description: Custom event bus for routing to external API

  EventBridgeServiceLinkedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSServiceRoleForEventBridgeApiDestinations
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationsFullAccess