AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  AMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: '/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
  SubnetId:
    Type: String
    Default: ''
  KeyName:
    Type: String
    Default: 'default-key'

Conditions:
  UseDefaultVPC: !Equals [!Ref SubnetId, '']

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Condition: UseDefaultVPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: UseDefaultVPC

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: UseDefaultVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Condition: UseDefaultVPC
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']

  RouteTable:
    Type: AWS::EC2::RouteTable
    Condition: UseDefaultVPC
    Properties:
      VpcId: !Ref VPC

  InternetRoute:
    Type: AWS::EC2::Route
    Condition: UseDefaultVPC
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: UseDefaultVPC
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow RDP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WindowsRDP

  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId:
        Fn::If:
          - UseDefaultVPC
          - !Ref Subnet
          - !Ref SubnetId
      UserData:
        Fn::Base64:
          |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config '@{MaxTimeoutms="1800000"}'
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          net stop winrm
          sc.exe config winrm start= auto
          net start winrm
          </powershell>

  CPUMonitor:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '1.2'
        description: CPU Stress Test Document
        parameters:
          duration:
            type: String
            default: '300'
          threads:
            type: String
            default: '0'
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: 'runCPUStress'
            inputs:
              runCommand:
                - |
                  $duration = [int]$duration
                  $threads = [int]$threads
                  if ($threads -eq 0) {
                    $threads = [System.Environment]::ProcessorCount
                  }
                  Write-Host "Starting CPU stress test with $threads threads for $duration seconds"
                  $jobs = @()
                  for ($i = 0; $i -lt $threads; $i++) {
                    $job = Start-Job -ScriptBlock {
                      $startTime = Get-Date
                      while ((Get-Date) -lt ($startTime).AddSeconds($using:duration)) {
                        $result = 1
                        for ($j = 0; $j -lt 1000000; $j++) {
                          $result *= $j
                        }
                      }
                    }
                    $jobs += $job
                  }
                  Wait-Job -Job $jobs -Timeout $duration
                  Remove-Job -Job $jobs -Force
                  Write-Host "CPU stress test completed"

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSFISReplayAccess
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref WindowsInstance
  PublicDNS:
    Description: Public DNS Name
    Value: !GetAtt WindowsInstance.PublicDnsName