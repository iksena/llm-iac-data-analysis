AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an Amazon Linux 2 EC2 instance'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type
  KeyPairName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: 'AWS::EC2::KeyPair::KeyName'
    ConstraintDescription: Must be the name of an existing EC2 KeyPair

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-east-2:
      AMI: ami-0e83be366243f524a
    us-west-1:
      AMI: ami-0f8e81a3da6e2510a
    us-west-2:
      AMI: ami-0d70546e43a941d70
    eu-west-1:
      AMI: ami-0d75513e7706cf2d9
    eu-central-1:
      AMI: ami-0d527b8c289b4af7f
    ap-southeast-1:
      AMI: ami-0b4fdb56a00cd61e6
    ap-southeast-2:
      AMI: ami-0b7dcd6e6fd797935
    ap-northeast-1:
      AMI: ami-0b8b10b5bf11f3a22
    ap-northeast-2:
      AMI: ami-0a0c8eebcdd6dcbd0
    sa-east-1:
      AMI: ami-0faf2c48fc9c8f966

Resources:
  EC2InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Enable SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      SecurityGroupIds:
        - !GetAtt EC2InstanceSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: AmazonLinux2Instance

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicIP:
    Description: Public IP address of the newly created EC2 instance
    Value: !GetAtt EC2Instance.PublicIp