AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy a resilient Jenkins CI/CD server on AWS.

Parameters:
  InstanceType:
    Description: EC2 instance type for Jenkins server
    Type: String
    Default: t3.medium
    AllowedValues: [t2.micro, t2.small, t2.medium, t3.micro, t3.small, t3.medium]
    ConstraintDescription: Must be a valid EC2 instance type.
  
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

  VpcId:
    Description: VPC ID where the instance will be deployed
    Type: AWS::EC2::VPC::Id

  SubnetId:
    Description: Subnet ID where the instance will be deployed
    Type: AWS::EC2::Subnet::Id

Resources:
  JenkinsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and ICMP access to the Jenkins server
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  JenkinsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  JenkinsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref JenkinsRole]

  JenkinsElasticIP:
    Type: AWS::EC2::EIP

  JenkinsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref JenkinsSecurityGroup]
      IamInstanceProfile: !Ref JenkinsInstanceProfile
      ImageId: ami-0abcdef1234567890 # Replace with a valid Jenkins AMI ID
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y java-1.8.0
          wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo
          rpm --import https://pkg.jenkins.io/redhat/jenkins.io.key
          yum install -y jenkins
          service jenkins start
          chkconfig jenkins on

  JenkinsElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref JenkinsInstance
      AllocationId: !GetAtt JenkinsElasticIP.AllocationId

  JenkinsRecoveryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: JenkinsInstanceRecovery
      AlarmDescription: Recover Jenkins instance if it becomes unhealthy
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed_System
      Dimensions:
        - Name: InstanceId
          Value: !Ref JenkinsInstance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Sub arn:aws:automate:${AWS::Region}:ec2:recover

Outputs:
  JenkinsURL:
    Description: URL to access the Jenkins server
    Value: !Sub http://${JenkinsElasticIP}

  InstanceId:
    Description: Instance ID of the Jenkins server
    Value: !Ref JenkinsInstance