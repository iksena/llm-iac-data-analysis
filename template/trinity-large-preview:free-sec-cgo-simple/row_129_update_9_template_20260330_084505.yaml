AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Config setup with secure S3 storage, SNS notifications, and automated retention management

Parameters:
  RetentionPeriodDays:
    Type: Number
    Default: 2557
    Description: Retention period in days for S3 object lock (default: 2557 days)
  DeliveryFrequency:
    Type: String
    Default: One_Hour
    AllowedValues:
      - One_Hour
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
    Description: Frequency for delivering configuration snapshots to S3

Resources:
  ConfigS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Days: !Ref RetentionPeriodDays
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ConfigS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ConfigS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${ConfigS3Bucket}'
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${ConfigS3Bucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${ConfigS3Bucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWSConfigNotifications

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSConfigRole
        - arn:aws:iam::aws:policy/service-role/AWSConfigRoleForOrganizations

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: ConfigRecorder
      RecordingGroup:
        allSupported: true
        includeGlobalResourceTypes: true
      RoleARN: !GetAtt ConfigRole.Arn

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      name: ConfigDeliveryChannel
      s3BucketName: !Ref ConfigS3Bucket
      snsTopicARN: !Ref ConfigSNSTopic
      configSnapshotDeliveryProperties:
        deliveryFrequency: !Ref DeliveryFrequency

  ConfigRule:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: PeriodicEvaluationRule
      Scope:
        ComplianceResourceTypes:
          - '*'
      Source:
        Owner: AWS
        SourceIdentifier: AWS_CONFIG_RULE_EVALUATION_STATUS
      MaximumExecutionFrequency: TwentyFour_Hours

  RetentionManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket_name = event['ResourceProperties']['BucketName']
              retention_days = int(event['ResourceProperties']['RetentionDays'])

              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      s3.put_object_lock_configuration(
                          Bucket=bucket_name,
                          ObjectLockConfiguration:
                          {
                              'Rule': {
                                  'DefaultRetention': {
                                      'Mode': 'COMPLIANCE',
                                      'Days': retention_days
                                  }
                              }
                          }
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ObjectLockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObjectLockConfiguration
                  - s3:GetObjectLockConfiguration
                Resource: !Sub 'arn:${AWS::Partition}:s3:::${ConfigS3Bucket}'

  RetentionManagerCustomResource:
    Type: Custom::RetentionManager
    Properties:
      ServiceToken: !GetAtt RetentionManagerLambda.Arn
      BucketName: !Ref ConfigS3Bucket
      RetentionDays: !Ref RetentionPeriodDays

Outputs:
  ConfigS3BucketName:
    Description: Name of the S3 bucket for Config data
    Value: !Ref ConfigS3Bucket
  ConfigSNSTopicARN:
    Description: ARN of the SNS topic for Config notifications
    Value: !Ref ConfigSNSTopic
  ConfigRecorderName:
    Description: Name of the Config recorder
    Value: !Ref ConfigRecorder