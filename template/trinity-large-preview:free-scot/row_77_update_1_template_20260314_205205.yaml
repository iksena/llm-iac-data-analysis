AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE

Resources:
  SupporterProductData-PROD:
    Type: AWS::DynamoDB::Table
    Condition: IsProd
    Properties:
      TableName: SupporterProductData-PROD
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 20
        WriteCapacityUnits: 5
      SSESpecification:
        Enabled: true
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiryDate
      Tags:
        - Key: backup
          Value: 'true'

  SupporterProductData-CODE:
    Type: AWS::DynamoDB::Table
    Condition: IsCode
    Properties:
      TableName: SupporterProductData-CODE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        Enabled: true
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiryDate
      Tags:
        - Key: backup
          Value: 'true'

  WriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      ServiceNamespace: dynamodb
      ResourceId: !Join
        - '/'
        - - table
          - !Ref SupporterProductData-PROD
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      MinCapacity: 5
      MaxCapacity: 500
      RoleARN: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/DynamoDBAutoscaleRole'

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: SupporterProductData-PROD-WriteScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']
  IsCode: !Equals [!Ref Stage, 'CODE']

Outputs:
  PRODTableName:
    Value: !Ref SupporterProductData-PROD
    Condition: IsProd
  CODETableName:
    Value: !Ref SupporterProductData-CODE
    Condition: IsCode