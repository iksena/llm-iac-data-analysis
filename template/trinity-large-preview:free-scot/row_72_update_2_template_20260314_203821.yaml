AWSTemplateFormatVersion: '2010-09-09'
Description: Secure web-based VS Code development environment with CloudFront

Parameters:
  CodeServerVersion:
    Type: String
    Default: 4.16.0
    AllowedValues:
      - 4.16.0
      - 4.15.0
      - 4.14.0
    Description: Version of code-server to install
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: code-server-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: code-server-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: code-server-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: code-server-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for code-server EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: code-server-sg

  CloudFrontSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CloudFront IPs
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: cloudfront-sg

  CloudFrontIPIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref EC2SecurityGroup
      GroupId: !Ref CloudFrontSecurityGroup

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: code-server-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  CodeServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            sudo apt update -y
            sudo apt install -y curl wget
            curl -fsSL https://code-server.dev/install.sh | sh -s -- --version ${CodeServerVersion}
            sudo systemctl enable code-server
            sudo systemctl start code-server
            sudo sed -i 's/auth: password/auth: none/' /etc/code-server/config.yaml
            sudo systemctl restart code-server
      Tags:
        - Key: Name
          Value: code-server-instance

  CachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CodeServerCachePolicy
        MinTTL: 31536000
        MaxTTL: 31536000
        DefaultTTL: 31536000
        Comment: Cache policy with 1-year TTL for code-server
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  OriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: CodeServerOriginRequestPolicy
        Comment: Origin request policy for code-server
        HeadersConfig:
          HeaderBehavior: none
        CookiesConfig:
          CookieBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: none

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: CodeServerOrigin
          ViewerProtocolPolicy: allow-all
          CachePolicyId: !Ref CachePolicy
          OriginRequestPolicyId: !Ref OriginRequestPolicy
        Origins:
          - Id: CodeServerOrigin
            DomainName: !GetAtt CodeServerInstance.PublicDnsName
            OriginPath: /
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 8080
              OriginProtocolPolicy: http-only
        Comment: CloudFront distribution for code-server
        PriceClass: PriceClass_All

  InstanceMetadata:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /code-server/instance-metadata
      Type: String
      Value: !Sub |
        Instance ID: ${CodeServerInstance}
        Public IP: ${CodeServerInstance.PublicIp}
        Public DNS: ${CodeServerInstance.PublicDnsName}
        CloudFront URL: https://${CloudFrontDistribution.DomainName}

  WaitHandle:
    Type: AWS::CloudFront::WaitConditionHandle

  WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    Properties:
      Handle: !Ref WaitHandle
      Timeout: 300
      Count: 1

Outputs:
  CloudFrontURL:
    Description: CloudFront URL for code-server
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  InstancePublicIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt CodeServerInstance.PublicIp
  InstancePublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt CodeServerInstance.PublicDnsName