AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Authentication

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website-bucket
    Description: Name of the S3 bucket for static website hosting
  LambdaFunctionName:
    Type: String
    Default: SlotMachineLambda
    Description: Name of the Lambda function for slot machine logic
  DeploymentLambdaName:
    Type: String
    Default: SlotMachineDeploymentLambda
    Description: Name of the Lambda function for automated deployment
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool

Resources:
  # S3 Bucket for Static Website
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  # S3 Bucket Policy for Public Read Access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'

  # Lambda Function for Slot Machine Logic
  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 10
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎'];
            const spin = () => symbols[Math.floor(Math.random() * symbols.length)];
            const result = [spin(), spin(), spin()];
            const isWin = result.every(s => s === result[0]);
            return {
              statusCode: 200,
              body: JSON.stringify({
                result,
                win: isWin,
                message: isWin ? 'Jackpot!' : 'Try again!'
              })
            };
          };
      Role: !GetAtt LambdaExecutionRole.Arn

  # Lambda Execution Role with Logging Permissions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # Cognito Identity Pool for Anonymous Access
  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true

  # IAM Role for Cognito Unauthenticated Identities
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineCognitoUnauthRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  # Custom Lambda Function for Automated Deployment
  DeploymentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref DeploymentLambdaName
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 300
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const https = require('https');
          const zlib = require('zlib');

          exports.handler = async (event) => {
            const s3 = new AWS.S3();
            const bucketName = process.env.WEBSITE_BUCKET_NAME;

            // Download pre-built ZIP file (simulated)
            const zipData = await new Promise((resolve, reject) => {
              https.get('https://example.com/slot-machine.zip', (res) => {
                const chunks = [];
                res.on('data', (chunk) => chunks.push(chunk));
                res.on('end', () => resolve(Buffer.concat(chunks)));
              }).on('error', reject);
            });

            // Extract and upload files to S3
            const files = await new Promise((resolve, reject) => {
              zlib.unzip(zipData, (err, buffer) => {
                if (err) reject(err);
                else resolve(buffer.toString().split('\n'));
              });
            });

            for (const file of files) {
              if (file.trim()) {
                await s3.putObject({
                  Bucket: bucketName,
                  Key: file,
                  Body: '/* File content */',
                  ContentType: 'text/html'
                }).promise();
              }
            }

            return { statusCode: 200, body: 'Deployment complete' };
          };
      Environment:
        Variables:
          WEBSITE_BUCKET_NAME: !Ref WebsiteBucket
      Role: !GetAtt DeploymentLambdaRole.Arn

  # IAM Role for Deployment Lambda
  DeploymentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineDeploymentLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3FullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:*
                Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn
        - PolicyName: LoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # Lambda Permission for Cognito Role
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: cognito-identity.amazonaws.com
      FunctionName: !GetAtt SlotMachineLambda.Arn
      SourceArn: !GetAtt CognitoIdentityPool.Arn

Outputs:
  WebsiteURL:
    Description: URL of the static website
    Value: !GetAtt WebsiteBucket.WebsiteURL
  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref CognitoIdentityPool
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt SlotMachineLambda.Arn