AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EventDrivenTable
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CentralizedEventBus

  InsertPipe:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeEventBus
      EventPattern:
        source:
          - aws.dynamodb
        detail:
          eventName:
            - INSERT
      Targets:
        - Arn: !GetAtt DynamoDBTable.StreamArn
          Id: InsertTarget

  ModifyPipe:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeEventBus
      EventPattern:
        source:
          - aws.dynamodb
        detail:
          eventName:
            - MODIFY
      Targets:
        - Arn: !GetAtt DynamoDBTable.StreamArn
          Id: ModifyTarget