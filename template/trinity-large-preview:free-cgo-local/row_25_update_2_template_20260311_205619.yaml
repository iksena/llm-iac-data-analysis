AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTSNSTopic

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTSNSTopic
              RoleArn: !GetAtt IoTTopicRuleRole.Arn
        RuleDisabled: false

  IoTTopicRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTRuleAction

  IoTTopicRulePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IoTTopicRulePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sns:Publish
            Resource: !Ref IoTSNSTopic
      Roles:
        - !Ref IoTTopicRuleRole

Outputs:
  QueueURL:
    Description: SQS Queue URL
    Value: !Ref IoTDataQueue
  SNSTopicARN:
    Description: SNS Topic ARN
    Value: !Ref IoTSNSTopic