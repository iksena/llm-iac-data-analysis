AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to integrate AWS EventBridge with Shopify's product creation API.
  This template provisions a custom EventBus, a Connection using API key authentication,
  an API Destination targeting Shopify's product creation endpoint, an IAM Role for EventBridge Rule execution,
  and an Event Rule that triggers the API Destination for events from "MyShopifyApp".

Parameters:
  ShopifyAdminAPIKey:
    Description: "Shopify admin API key for authenticating API destination requests. Replace with actual key."
    Type: String
    NoEcho: true
    Default: "ENTER_SHOPIFY_ADMIN_API_KEY_HERE"

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: "MyShopifyAppEventBus"
      
  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: "ShopifyAPIConnection"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "X-Shopify-Access-Token"
          ApiKeyValue: !Ref ShopifyAdminAPIKey

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: "ShopifyProductCreationApiDestination"
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      InvocationEndpoint: "https://testanu.myshopify.com/admin/api/products.json"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  ShopifyRuleExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "ShopifyIntegrationRuleExecutionRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "events.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "InvokeApiDestinationPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action: "events:InvokeApiDestination"
                Resource: !GetAtt ShopifyApiDestination.Arn

  ShopifyIntegrationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "ShopifyProductCreationRule"
      Description: "Triggers the API Destination when events from MyShopifyApp are received."
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - "MyShopifyApp"
      Targets:
        - Id: "ShopifyProductCreationTarget"
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt ShopifyRuleExecutionRole.Arn

Outputs:
  EventBusArn:
    Description: "ARN of the custom EventBridge event bus used for Shopify integration."
    Value: !GetAtt ShopifyEventBus.Arn

  ApiDestinationArn:
    Description: "ARN of the API Destination for Shopify product creation."
    Value: !GetAtt ShopifyApiDestination.Arn