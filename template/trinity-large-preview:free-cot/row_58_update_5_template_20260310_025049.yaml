AWSTemplateFormatVersion: '2010-09-09'
Description: 'Scalable Amazon EFS with Monitoring and Automated Backups'

Parameters:
  BackupEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable automated backups via AWS Backup
  BackupSchedule:
    Type: String
    Default: 'cron(0 2 * * ? *)'
    Description: CRON schedule for automated backups
  PerformanceMode:
    Type: String
    Default: 'generalPurpose'
    AllowedValues: ['generalPurpose', 'maxIO']
    Description: EFS performance mode
  ThroughputMode:
    Type: String
    Default: 'bursting'
    AllowedValues: ['bursting', 'provisioned']
    Description: EFS throughput mode
  ProvisionedThroughput:
    Type: Number
    Default: 0
    MinValue: 0
    Description: Provisioned throughput in MiB/s (0 for bursting mode)

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-RT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet-A

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet-B

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetB
      RouteTableId: !Ref PublicRouteTable

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughput, !Ref AWS::NoValue]
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  EFSMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetA
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetB
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS-SG

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-BurstCreditBalance
      AlarmDescription: Alarm when burst credit balance is low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20000000000
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-PercentIOLimit
      AlarmDescription: Alarm when IO utilization is high
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProvisionedThroughput
    Properties:
      AlarmName: !Sub ${AWS::StackName}-Throughput
      AlarmDescription: Alarm when throughput is high
      Namespace: AWS/EFS
      MetricName: TotalIOBytes
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !If [IsProvisionedThroughput, !Ref ProvisionedThroughput, !Ref AWS::NoValue]
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      TopicName: !Sub ${AWS::StackName}-EFS-Alarms

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-BackupVault
      EncryptionKeyArn: !GetAtt BackupKey.Arn
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-BackupVault

  BackupKey:
    Type: AWS::KMS::Key
    Condition: IsBackupEnabled
    Properties:
      Description: KMS key for EFS backups
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  BackupServiceRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
      Path: /
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-BackupRole

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-BackupPlan
        Rules:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupServiceRole.Arn
      Resources:
        - !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

Conditions:
  IsProvisionedThroughput: !And
    - !Equals [ !Ref ThroughputMode, 'provisioned' ]
    - !Not [ !Equals [ !Ref ProvisionedThroughput, 0 ] ]
  IsBackupEnabled: !Equals [ !Ref BackupEnabled, 'true' ]

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  MountTargetA:
    Description: Mount Target ID in Subnet A
    Value: !Ref EFSMountTargetA
  MountTargetB:
    Description: Mount Target ID in Subnet B
    Value: !Ref EFSMountTargetB
  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !GetAtt EFSFileSystem.DNSName