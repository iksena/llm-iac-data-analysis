AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to launch an Amazon Linux 2 EC2 instance with ephemeral drives.
  The instance retrieves the latest Amazon Linux 2 AMI ID from the SSM Parameter Store,
  and a Lambda-backed custom resource creates an SSH key pair for secure access.
  The instance is deployed into a pre-existing default VPC/Subnet.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The ID of an existing subnet (in the default VPC) where the instance will be deployed.

Resources:
  KeyPairLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-KeyPairLambdaRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KeyPairManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                  - ec2:DescribeKeyPairs
                Resource: "*"

  KeyPairLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-KeyPairFunction"
      Handler: index.lambda_handler
      Role: !GetAtt KeyPairLambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import traceback

          http = urllib3.PoolManager()

          def send_response(event, context, response_status, response_data, physical_resource_id):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              try:
                  response = http.request('PUT', response_url, body=json_response_body, headers=headers)
              except Exception as e:
                  print("send_response failed: " + str(e))

          def lambda_handler(event, context):
              print("Received event: " + json.dumps(event))
              response_data = {}
              physical_resource_id = None
              try:
                  if event['RequestType'] == 'Create':
                      ec2 = boto3.client('ec2')
                      # Generate a unique key pair name using stack name and request id.
                      key_name = event['ResourceProperties'].get('KeyPairName', 'CFNKeyPair-' + context.aws_request_id[:8])
                      create_response = ec2.create_key_pair(KeyName=key_name)
                      response_data = {
                          "KeyName": create_response["KeyName"],
                          "KeyMaterial": create_response["KeyMaterial"]
                      }
                      physical_resource_id = create_response["KeyName"]
                  elif event['RequestType'] == 'Update':
                      # For update, retain the existing key
                      physical_resource_id = event['PhysicalResourceId']
                      response_data = {"KeyName": physical_resource_id}
                  elif event['RequestType'] == 'Delete':
                      ec2 = boto3.client('ec2')
                      key_name = event['PhysicalResourceId']
                      try:
                          ec2.delete_key_pair(KeyName=key_name)
                      except Exception as e:
                          print("DeleteKeyPair Exception: " + str(e))
                      physical_resource_id = key_name
                      response_data = {}
                  send_response(event, context, "SUCCESS", response_data, physical_resource_id)
              except Exception as e:
                  print("Exception: " + traceback.format_exc())
                  send_response(event, context, "FAILED", {"Message": str(e)}, physical_resource_id)

  EC2KeyPairCustomResource:
    Type: Custom::EC2KeyPair
    Properties:
      ServiceToken: !GetAtt KeyPairLambda.Arn
      # Optionally, you can pass a desired key pair name using KeyPairName property.
      # If omitted, the Lambda function will generate a default name.
      KeyPairName: !Sub "${AWS::StackName}-InstanceKeyPair"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      KeyName: !GetAtt EC2KeyPairCustomResource.KeyName
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs:1}}"
      BlockDeviceMappings:
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1

Outputs:
  InstanceId:
    Description: The ID of the launched EC2 instance.
    Value: !Ref EC2Instance
  SSHKeyPairName:
    Description: The name of the SSH key pair created for the instance.
    Value: !GetAtt EC2KeyPairCustomResource.KeyName