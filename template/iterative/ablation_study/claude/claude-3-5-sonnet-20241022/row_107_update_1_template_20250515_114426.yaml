AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway integrated with SQS queue for HTTP-based message retrieval'

Parameters:
  QueueName:
    Type: String
    Default: 'my-message-queue'
    Description: 'Name of the SQS queue'
  
  StageName:
    Type: String
    Default: 'prod'
    Description: 'API Gateway deployment stage name'
    
  WaitTimeSeconds:
    Type: Number
    Default: 20
    Description: 'Long polling wait time in seconds'
    MinValue: 0
    MaxValue: 20

Resources:
  MessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      ReceiveMessageWaitTimeSeconds: !Ref WaitTimeSeconds

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: 
        - !Ref MessageQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MessageQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*'

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ApiGatewaySQSPolicy
      Roles: 
        - !Ref ApiGatewayRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt MessageQueue.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQSMessageRetrieval
      Description: API Gateway for retrieving messages from SQS queue

  MessagesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'messages'

  MessagesMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref MessagesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}'
        RequestParameters:
          integration.request.querystring.MaxNumberOfMessages: 'method.request.querystring.maxMessages'
          integration.request.querystring.WaitTimeSeconds: 'method.request.querystring.waitTime'
        RequestTemplates:
          application/json: '{"Action": "ReceiveMessage"}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: '$input.body'
      RequestParameters:
        method.request.querystring.maxMessages: false
        method.request.querystring.waitTime: false
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: MessagesMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref RestApi
      StageName: !Ref StageName

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL for retrieving messages'
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/messages'
  
  QueueArn:
    Description: 'ARN of the SQS queue'
    Value: !GetAtt MessageQueue.Arn
    
  QueueURL:
    Description: 'URL of the SQS queue'
    Value: !Ref MessageQueue