AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready AWS CloudFormation template to create an AWS Security Hub instance,
  enable default security standards (CIS AWS Foundations Benchmark and AWS Foundational Security Best Practices),
  and turn on consolidated control findings via organization auto-enable configuration.

Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties: {}

  OrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    DependsOn: SecurityHubHub
    Properties:
      AutoEnable: true

  StandardsSubscriptionCIS:
    Type: AWS::SecurityHub::StandardsSubscription
    DependsOn: SecurityHubHub
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0

  StandardsSubscriptionAWSFSBP:
    Type: AWS::SecurityHub::StandardsSubscription
    DependsOn: SecurityHubHub
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0

Outputs:
  SecurityHubHubArn:
    Description: "ARN of the created AWS Security Hub instance."
    Value: !GetAtt SecurityHubHub.Arn

  OrganizationConfigurationStatus:
    Description: "Indicates that Security Hub Organization Configuration is enabled (AutoEnable true)."
    Value: "AutoEnable is true"

  CISStandardSubscription:
    Description: "Subscription to the CIS AWS Foundations Benchmark standard."
    Value: "Enabled: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0"

  AWSFSBPStandardSubscription:
    Description: "Subscription to the AWS Foundational Security Best Practices standard."
    Value: "Enabled: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0"