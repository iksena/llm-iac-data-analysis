AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
  EventBridgePipe:
    Type: AWS::Events::Pipe
    Properties:
      Source:
        SourceType: DynamoDBStream
        SourceConfig:
          SourceArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        TargetType: EventBridgeManaged
        EventBridgeManagedTarget:
          DetailType: UserAvatarUpdate
          Source: com.example.user.avatar
          EventBusName: default
      Enrichment:
        EnrichmentType: Filter
        FilterEnrichment:
          FilterPattern: '{ $.avatarUrl LIKE "*png" }'
      RoleArn: !GetAtt PipeRole.Arn
  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetEventBridgePolicy
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: dynamodb:DescribeStream
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: dynamodb:GetRecords
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: '*'
Outputs:
  DynamoDBStreamArn:
    Value: !GetAtt DynamoDBTable.StreamArn
  PipeArn:
    Value: !Ref EventBridgePipe