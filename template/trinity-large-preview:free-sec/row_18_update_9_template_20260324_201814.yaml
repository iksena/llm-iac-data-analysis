AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB to EventBridge integration with EventBridge Pipes

Parameters:
  TableName:
    Type: String
    Default: UserDataTable
    Description: Name of the DynamoDB table
  PipeName:
    Type: String
    Default: DynamoDBToEventBridgePipe
    Description: Name of the EventBridge Pipe
  EventBusName:
    Type: String
    Default: default
    Description: Name of the EventBridge bus to send events to
  DetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType for the EventBridge event
  Source:
    Type: String
    Default: com.example.user.avatar
    Description: Source for the EventBridge event

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      BillingMode: PAY_PER_REQUEST

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSPipesServiceRolePolicy

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref PipeName
      Source:
        DynamoDBStreamArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Arn: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}
        RoleArn: !GetAtt PipeRole.Arn
        EventBridgeParameters:
          DetailType: !Ref DetailType
          Source: !Ref Source
      RoleArn: !GetAtt PipeRole.Arn
      Enrichment: NONE
      Filter:
        EventPattern:
          detail:
            avatarUrl:
              endsWith: [".png"]

Outputs:
  PipeArn:
    Description: The ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  DynamoDBStreamArn:
    Description: The ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn