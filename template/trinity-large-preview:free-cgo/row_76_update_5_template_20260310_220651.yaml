AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: RolePassingWorkshopRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: 'arn:aws:iam::*:role/workshop-*'
        - PolicyName: CreateServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: 'arn:aws:iam::*:role/aws-service-role/*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'Admins-${AWS::AccountId}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISAccessExceptProd
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'fis:ResourceTag/Environment': 'prod'
        - PolicyName: RolePassingWorkshopRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: 'arn:aws:iam::*:role/workshop-*'
        - PolicyName: CreateServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: 'arn:aws:iam::*:role/aws-service-role/*'

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'Users-${AWS::AccountId}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISExperimentActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:Get*'
                  - 'fis:List*'
                  - 'fis:TagResource'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'fis:ResourceTag/Environment': 'prod'
        - PolicyName: RolePassingWorkshopRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: 'arn:aws:iam::*:role/workshop-*'

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'NonUsers-${AWS::AccountId}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: DenyAllFISActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'