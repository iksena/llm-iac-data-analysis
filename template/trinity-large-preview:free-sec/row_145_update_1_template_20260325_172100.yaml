AWSTemplateFormatVersion: '2010-09-09'
Description: Secure static website with CloudFront CDN and automated S3 content management

Parameters:
  BucketName:
    Type: String
    Default: my-secure-static-website
    Description: Name of the S3 bucket for website hosting
  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: Lambda runtime version
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds

Resources:
  StaticWebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: S3-OAC
        OriginAccessControlOriginType: s3
        SigningProtocol: sigv4
        SigningBehavior: always
        Description: Origin Access Control for S3 bucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt StaticWebsiteBucket.DomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessControlId: !Ref OriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CustomCachePolicy
          Compress: true
        Enabled: true
        HttpVersion: http2

  CustomCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: Custom60SecondTTL
        MinTTL: 0
        DefaultTTL: 60
        MaxTTL: 31536000
        Comment: Custom cache policy with 60-second default TTL

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          s3 = boto3.client('s3')

          def handler(event, context):
              try:
                  bucket = event['ResourceProperties']['BucketName']
                  request_type = event['RequestType']

                  if request_type == 'Create':
                      s3.put_object(
                          Bucket=bucket,
                          Key='index.html',
                          Body=b'<html><body><h1>Welcome to our secure static website!</h1></body></html>',
                          ContentType='text/html'
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  elif request_type == 'Delete':
                      objects = s3.list_objects_v2(Bucket=bucket).get('Contents', [])
                      if objects:
                          delete_keys = {'Objects': [{'Key': obj['Key']} for obj in objects]}
                          s3.delete_objects(Bucket=bucket, Delete=delete_keys)
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  LambdaCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      BucketName: !Ref BucketName

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticWebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OriginAccessControl.PrincipalId
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${BucketName}/*'

Outputs:
  CloudFrontDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  WebsiteURL:
    Description: S3 website URL
    Value: !GetAtt StaticWebsiteBucket.WebsiteURL