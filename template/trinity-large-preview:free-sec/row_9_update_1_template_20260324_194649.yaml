AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EncryptedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  FileSystemAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EncryptedFileSystem
      PosixUser:
        Uid: 1000
        Gid: 1000
      RootDirectory:
        Path: "/"
        CreationInfo:
          OwnerUid: 1000
          OwnerGid: 1000
          Permissions: "777"

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedFileSystem
      SubnetId: !Select [0, !GetAZs '']
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount target
      VpcId: !ImportValue VPCId

Outputs:
  FileSystemId:
    Description: The ID of the encrypted EFS file system
    Value: !Ref EncryptedFileSystem
  FileSystemArn:
    Description: The ARN of the encrypted EFS file system
    Value: !GetAtt EncryptedFileSystem.Arn
  MountTargetId:
    Description: The ID of the mount target
    Value: !Ref MountTarget