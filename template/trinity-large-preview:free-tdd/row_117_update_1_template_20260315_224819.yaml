AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EventDrivenTable
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CentralizedEventBus

  InsertPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: InsertPipe
      Source:
        Type: DynamoDBStream
        DynamoDBStreamParameters:
          ResourceArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Type: EventBus
        EventBusParameters:
          EventBusName: !Ref EventBridgeEventBus
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - INSERT

  ModifyPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: ModifyPipe
      Source:
        Type: DynamoDBStream
        DynamoDBStreamParameters:
          ResourceArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Type: EventBus
        EventBusParameters:
          EventBusName: !Ref EventBridgeEventBus
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - MODIFY