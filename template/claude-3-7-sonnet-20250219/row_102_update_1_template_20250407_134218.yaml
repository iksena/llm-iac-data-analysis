AWSTemplateFormatVersion: '2010-09-09'
Description: 'Risk Management System for AWS Workloads with Lambda, DynamoDB, and SNS'

Parameters:
  DynamoDBTableName:
    Type: String
    Default: 'RiskManagementTable'
    Description: 'Name of the DynamoDB table for storing risk management data'
  
  LambdaFunctionPrefix:
    Type: String
    Default: 'RiskManagement'
    Description: 'Prefix for Lambda function names'
  
  SNSTopicName:
    Type: String
    Default: 'RiskManagementNotifications'
    Description: 'Name of the SNS topic for risk management notifications'
  
  LambdaRuntime:
    Type: String
    Default: 'nodejs18.x'
    Description: 'Runtime for Lambda functions'
    AllowedValues:
      - 'nodejs16.x'
      - 'nodejs18.x'
      - 'python3.9'
      - 'python3.10'
      - 'python3.11'
  
  LambdaMemorySize:
    Type: Number
    Default: 256
    Description: 'Memory size for Lambda functions (MB)'
    MinValue: 128
    MaxValue: 10240
  
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: 'Timeout for Lambda functions (seconds)'
    MinValue: 3
    MaxValue: 900

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Purpose
          Value: RiskManagement

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt RiskManagementTable.Arn

  RiskDataProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${LambdaFunctionPrefix}DataProcessor"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC_ARN: !Ref RiskNotificationTopic
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event, null, 2));
            
            // This is a placeholder function that would process risk data
            // In a real implementation, this would:
            // 1. Extract workload_id and question_id from the event
            // 2. Process risk-related data
            // 3. Store the data in DynamoDB
            // 4. Optionally publish notifications to SNS
            
            return {
              statusCode: 200,
              body: JSON.stringify('Risk data processed successfully'),
            };
          };
      Tags:
        - Key: Purpose
          Value: RiskManagement

  RiskAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${LambdaFunctionPrefix}Analyzer"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC_ARN: !Ref RiskNotificationTopic
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event, null, 2));
            
            // This is a placeholder function that would analyze risk data
            // In a real implementation, this would:
            // 1. Query DynamoDB for risk data
            // 2. Analyze the data for risk patterns or thresholds
            // 3. Generate risk reports or alerts
            // 4. Publish notifications to SNS when risks are identified
            
            return {
              statusCode: 200,
              body: JSON.stringify('Risk analysis completed successfully'),
            };
          };
      Tags:
        - Key: Purpose
          Value: RiskManagement

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: 'Risk Management Notifications'
      Tags:
        - Key: Purpose
          Value: RiskManagement

  RiskNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSMOpsCenter
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic
          - Sid: AllowLambdaPublish
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableName:
    Description: 'Name of the DynamoDB table'
    Value: !Ref RiskManagementTable
  
  DynamoDBTableArn:
    Description: 'ARN of the DynamoDB table'
    Value: !GetAtt RiskManagementTable.Arn
  
  DataProcessorFunctionArn:
    Description: 'ARN of the Risk Data Processor Lambda function'
    Value: !GetAtt RiskDataProcessorFunction.Arn
  
  AnalyzerFunctionArn:
    Description: 'ARN of the Risk Analyzer Lambda function'
    Value: !GetAtt RiskAnalyzerFunction.Arn
  
  SNSTopicArn:
    Description: 'ARN of the SNS topic for notifications'
    Value: !Ref RiskNotificationTopic