AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket with EventBridge and SNS integration for object creation notifications

Resources:
  ObjectCreatedBucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          Enabled: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    DependsOn: EventBridgeRule

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties: {}

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.s3
        "detail-type":
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - PutObject
      Targets:
        - Arn: !Ref SnsTopic
          Id: SnsTarget
    DependsOn: SnsTopic

Outputs:
  BucketName:
    Value: !Ref ObjectCreatedBucket
    Description: Name of the S3 bucket
  TopicArn:
    Value: !Ref SnsTopic
    Description: ARN of the SNS topic