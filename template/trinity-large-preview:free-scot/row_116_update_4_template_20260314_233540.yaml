AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MetricsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricsTopic

  AllMetricsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'TemperatureSqsQueue-${AWS::StackName}'
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDeadLetterQueue.Arn
        maxReceiveCount: 5

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'HumiditySqsQueue-${AWS::StackName}'
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDeadLetterQueue.Arn
        maxReceiveCount: 5

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'TemperatureDeadLetterQueue-${AWS::StackName}'

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'HumidityDeadLetterQueue-${AWS::StackName}'

  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt AllMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  TemperatureSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  HumiditySqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'LambdaExecutionRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'

  LambdaExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecutionPolicy
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource: '*'

  TemperatureFilterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'TemperatureFilterFunction-${AWS::StackName}'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def handler(event, context):
              sqs = boto3.client('sqs')
              for record in event['Records']:
                  message = json.loads(record['body'])
                  if 'MetricType' in message and message['MetricType'] == 'Temperature':
                      try:
                          response = sqs.send_message(
                              QueueUrl='<<TemperatureSqsQueueUrl>>',
                              MessageBody=json.dumps(message)
                          )
                      except ClientError as e:
                          print(f"Error sending message to TemperatureSqsQueue: {e}")
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }
      Runtime: python3.12
      Timeout: 30

  HumidityFilterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'HumidityFilterFunction-${AWS::StackName}'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def handler(event, context):
              sqs = boto3.client('sqs')
              for record in event['Records']:
                  message = json.loads(record['body'])
                  if 'MetricType' in message and message['MetricType'] == 'Humidity':
                      try:
                          response = sqs.send_message(
                              QueueUrl='<<HumiditySqsQueueUrl>>',
                              MessageBody=json.dumps(message)
                          )
                      except ClientError as e:
                          print(f"Error sending message to HumiditySqsQueue: {e}")
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }
      Runtime: python3.12
      Timeout: 30

  TemperatureFilterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref TemperatureFilterFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref MetricsTopic

  HumidityFilterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref HumidityFilterFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref MetricsTopic

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: lambda
      Endpoint: !GetAtt TemperatureFilterFunction.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: lambda
      Endpoint: !GetAtt HumidityFilterFunction.Arn
      FilterPolicy:
        MetricType:
          - Humidity