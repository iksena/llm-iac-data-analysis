AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EC2 instance with HTTP access and an S3 bucket, including the creation of an EC2 KeyPair.

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    ConstraintDescription: must be a valid EC2 instance type.

  LatestAmiId:
    Description: Latest Amazon Linux 2 AMI ID
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  MyKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-keypair'
      KeyType: rsa

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref MyKeyPair
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      ImageId: !Ref LatestAmiId
  
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access via port 80
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  
  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'my-s3-bucket-${AWS::StackName}-${AWS::Region}'
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  KeyPairName:
    Description: The name of the created EC2 KeyPair
    Value: !Ref MyKeyPair

  InstanceId:
    Description: The Instance ID of the newly created EC2 instance
    Value: !Ref MyEC2Instance

  InstancePublicIP:
    Description: The public IP address of the EC2 instance
    Value: !GetAtt MyEC2Instance.PublicIp

  S3BucketName:
    Description: The name of the S3 bucket
    Value: !Ref MyS3Bucket

# Note: The KeyPair will be created as part of the stack. Ensure you have permissions to create KeyPairs and access the private key securely.