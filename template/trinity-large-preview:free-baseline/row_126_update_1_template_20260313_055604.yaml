AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  StreamName:
    Type: String
    Default: kinesis-stream
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  ApiName:
    Type: String
    Default: kinesis-api
    Description: Name of the API Gateway
  LambdaRuntime:
    Type: String
    Default: nodejs20.x
    Description: Runtime for Lambda functions
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Timeout for Lambda functions in seconds

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  KinesisIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListStreams
                Resource: !GetAtt KinesisStream.Arn

  PutRecordLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout
      Role: !GetAtt PutRecordLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const kinesis = new AWS.Kinesis();
            const params = {
              Data: event.body,
              PartitionKey: event.queryStringParameters.partitionKey,
              StreamName: process.env.STREAM_NAME
            };
            const result = await kinesis.putRecord(params).promise();
            return {
              statusCode: 200,
              body: JSON.stringify(result)
            };
          };
      Environment:
        Variables:
          STREAM_NAME: !Ref StreamName

  PutRecordLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt KinesisStream.Arn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  GetRecordsLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout
      Role: !GetAtt GetRecordsLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const kinesis = new AWS.Kinesis();
            const params = {
              ShardIterator: event.queryStringParameters.shardIterator,
              Limit: event.queryStringParameters.limit || 100
            };
            const result = await kinesis.getRecords(params).promise();
            return {
              statusCode: 200,
              body: JSON.stringify(result)
            };
          };
      Environment:
        Variables:
          STREAM_NAME: !Ref StreamName

  GetRecordsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                Resource: !GetAtt KinesisStream.Arn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName
      Description: API Gateway for Kinesis Data Streams

  ApiGatewayResourcePutRecord:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: 'put-record'

  ApiGatewayMethodPutRecord:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResourcePutRecord
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt PutRecordLambdaFunction.Arn

  ApiGatewayResourceGetRecords:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: 'get-records'

  ApiGatewayMethodGetRecords:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResourceGetRecords
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt GetRecordsLambdaFunction.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethodPutRecord
      - ApiGatewayMethodGetRecords
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: prod

Outputs:
  KinesisStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
  ApiEndpoint:
    Description: Endpoint URL of the API Gateway
    Value: !Sub 'https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  ApiId:
    Description: ID of the API Gateway
    Value: !Ref ApiGatewayRestApi