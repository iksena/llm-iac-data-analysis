AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  KeyName:
    Type: String
    Description: Name of the EC2 Key Pair to use for SSH access
  SecurityGroupIds:
    Type: List<String>
    Description: List of Security Group IDs to associate with the EC2 instance
  SubnetId:
    Type: String
    Description: ID of the subnet in which to launch the EC2 instance

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0  # Latest Amazon Linux 2 AMI as of the time of writing
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds: !Ref SecurityGroupIds
      SubnetId: !Ref SubnetId

Outputs:
  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIpAddress
    Export:
      Name: EC2InstancePublicIP

  InstanceID:
    Description: Instance ID of the EC2 instance
    Value: !Ref EC2Instance
    Export:
      Name: EC2InstanceID