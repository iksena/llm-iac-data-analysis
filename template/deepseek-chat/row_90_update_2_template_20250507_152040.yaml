AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 Image Builder infrastructure including IAM roles and S3 log bucket'

Resources:
  ImageBuilderRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder

  ImageBuilderInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: /
      Roles:
        - !Ref ImageBuilderRole

  ImageBuilderLogsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  ImageBuilderS3AccessPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: ImageBuilderS3Access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
            Resource: '*'
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub '${ImageBuilderLogsBucket.Arn}/*'
      Roles:
        - !Ref ImageBuilderRole

Outputs:
  ImageBuilderRoleARN:
    Description: ARN of the IAM role for Image Builder
    Value: !GetAtt ImageBuilderRole.Arn
  ImageBuilderInstanceProfileARN:
    Description: ARN of the instance profile for Image Builder
    Value: !GetAtt ImageBuilderInstanceProfile.Arn
  LogsBucketName:
    Description: Name of the S3 bucket for storing build logs
    Value: !Ref ImageBuilderLogsBucket
  S3AccessPolicyARN:
    Description: ARN of the IAM policy for S3 access
    Value: !Ref ImageBuilderS3AccessPolicy