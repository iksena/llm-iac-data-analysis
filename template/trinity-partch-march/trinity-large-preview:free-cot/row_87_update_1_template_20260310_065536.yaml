AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for Lambda artifacts and a KMS key for encryption

Parameters:
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the S3 bucket and KMS key
    Default: ''

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'lambda-artifacts-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketPolicy:
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub 'arn:${AWS::Partition}:s3:::${LambdaArtifactsBucket}/*'
            - Effect: Allow
              Principal:
                AWS: !Ref ServiceRoleArn
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub 'arn:${AWS::Partition}:s3:::${LambdaArtifactsBucket}/*'

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting Lambda artifacts in S3
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow service role to manage key
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
          - Sid: Allow service role to use key
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'

  LambdaArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/lambda-artifacts-${AWS::Region}'
      TargetKeyId: !Ref LambdaArtifactsKMSKey

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
    Export:
      Name: LambdaArtifactsBucketName

  KMSKeyId:
    Description: ID of the KMS key for Lambda artifacts
    Value: !Ref LambdaArtifactsKMSKey
    Export:
      Name: LambdaArtifactsKMSKeyId

  KMSKeyArn:
    Description: ARN of the KMS key for Lambda artifacts
    Value: !GetAtt LambdaArtifactsKMSKey.Arn
    Export:
      Name: LambdaArtifactsKMSKeyArn