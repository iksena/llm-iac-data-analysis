AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready CloudFormation template for an encrypted One Zone EFS file system in us-east-1a with backups and One Zone IA lifecycle policy.'

Resources:
  OneZoneEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      AvailabilityZoneName: us-east-1a
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToOneZoneIA: AFTER_7_DAYS

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref OneZoneEFSFileSystem
  FileSystemArn:
    Description: EFS File System ARN
    Value: !GetAtt OneZoneEFSFileSystem.Arn
  AvailabilityZoneName:
    Description: Availability Zone used for One Zone storage
    Value: us-east-1a