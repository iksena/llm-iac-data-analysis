AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Default Contact"
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
  BusinessContactPhone:
    Type: String
    Default: "+1234567890"
  EDIProfileName:
    Type: String
    Default: "DefaultEDIProfile"

Resources:
  EDIProfile:
    Type: AWS::B2B::Profile
    Properties:
      ProfileName: !Ref EDIProfileName
      BusinessContactName: !Ref BusinessContactName
      BusinessContactEmail: !Ref BusinessContactEmail
      BusinessContactPhone: !Ref BusinessContactPhone

  EDIToJSONTransformer:
    Type: AWS::B2B::Transformer
    Properties:
      TransformerName: "X12_214ToJSON"
      ProfileId: !Ref EDIProfile
      MappingLogic: "EDI X12_214 to JSON transformation rules"

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "edi-input-bucket"

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "arn:aws:s3:::${InputBucket}/*"

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "edi-output-bucket"

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
            Resource: !Sub "arn:aws:s3:::${OutputBucket}/*"

Outputs:
  ProfileId:
    Description: EDI Profile ID
    Value: !Ref EDIProfile
  TransformerId:
    Description: EDI Transformer ID
    Value: !Ref EDIToJSONTransformer
  InputBucketName:
    Description: Input S3 Bucket Name
    Value: !Ref InputBucket
  OutputBucketName:
    Description: Output S3 Bucket Name
    Value: !Ref OutputBucket