AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM role for EC2 instances with read-only access to IAM metadata.

Resources:
  EC2IAMReadOnlyPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EC2IAMReadOnlyPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:List*
              - iam:Get*
            Resource: '*'
      Roles:
        - Ref: EC2IAMRole

  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2IAMReadOnlyRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2IAMReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:List*
                  - iam:Get*
                Resource: '*'

Outputs:
  EC2IAMRoleArn:
    Description: The ARN of the IAM Role for EC2 instances with read-only access to IAM metadata.
    Value: !GetAtt EC2IAMRole.Arn