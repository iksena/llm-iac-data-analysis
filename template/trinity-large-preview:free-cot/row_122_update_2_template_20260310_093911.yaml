AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for automated product creation

Parameters:
  ShopifyApiKey:
    Type: String
    Default: dummy-api-key
    Description: Shopify admin API key for authentication
    AllowedPattern: "[a-zA-Z0-9-]+"
  ShopifyShopName:
    Type: String
    Default: testanu
    Description: Shopify shop name (without .myshopify.com)
  EventSourceName:
    Type: String
    Default: MyShopifyApp
    Description: Event source name for EventBridge events
  ShopifyApiVersion:
    Type: String
    Default: 2024-01
    Description: Shopify API version to use

Resources:
  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ShopifyEventBridgeIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ShopifyApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: "*"

  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: ShopifyIntegrationBus
      EventSourceName: !Sub "aws.partner/${ShopifyShopName}/${EventSourceName}"

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      ConnectionArn: !GetAtt ShopifyApiConnection.Arn
      InvocationEndpoint: !Sub "https://${ShopifyShopName}.myshopify.com/admin/api/${ShopifyApiVersion}/products.json"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  ShopifyApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Name: ShopifyApiConnection
      AuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyApiKey

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge bus
    Value: !Ref ShopifyEventBus
  ApiDestinationArn:
    Description: ARN of the Shopify API destination
    Value: !GetAtt ShopifyApiDestination.Arn
  IamRoleArn:
    Description: ARN of the IAM role for EventBridge
    Value: !GetAtt EventBridgeIAMRole.Arn