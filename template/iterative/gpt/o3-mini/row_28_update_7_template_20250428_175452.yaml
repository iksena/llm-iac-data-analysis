AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an automated monitoring and notification system
  for AWS Secrets Manager secret lifecycle events. This template sets up an SNS topic with an email
  subscription, an SNS topic policy allowing EventBridge to publish messages, and an EventBridge rule
  that triggers on the lifecycle events of Secrets Manager (secret creation, update, and access).

Parameters:
  NotificationEmail:
    Description: "Email address to receive SNS notifications for AWS Secrets Manager events. Replace the default value with your email."
    Type: String
    Default: "change-me@example.com"

Resources:
  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "SecretsManagerLifecycleAlerts"
      TopicName: "SecretsManagerLifecycleAlertsTopic"

  SecretsManagerSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsManagerSNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowEventBridgePublish"
            Effect: "Allow"
            Principal:
              Service: "events.amazonaws.com"
            Action: "SNS:Publish"
            Resource: !Ref SecretsManagerSNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/SecretsManagerEventRule"

  SecretsManagerSNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref NotificationEmail
      TopicArn: !Ref SecretsManagerSNSTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "SecretsManagerEventRule"
      Description: "EventBridge rule to capture AWS Secrets Manager lifecycle events and trigger SNS notifications."
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - "CreateSecret"
            - "UpdateSecret"
            - "GetSecretValue"
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SecretsManagerSNSTopic

Outputs:
  SNSTopicARN:
    Description: "ARN of the SNS Topic for Secrets Manager lifecycle alerts."
    Value: !Ref SecretsManagerSNSTopic
  EventRuleARN:
    Description: "ARN of the EventBridge rule that monitors Secrets Manager events."
    Value: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/SecretsManagerEventRule"