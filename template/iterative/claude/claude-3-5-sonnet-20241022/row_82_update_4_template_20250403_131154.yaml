AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an encrypted S3 bucket for ALB access logs with 90-day retention'

Mappings:
  ELBRegionMap:
    us-east-1:
      AccountId: '127311923021'
    us-east-2:
      AccountId: '033677994240'
    us-west-1:
      AccountId: '027434742980'
    us-west-2:
      AccountId: '797873946194'

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBAccountWrite
            Effect: Allow
            Principal:
              AWS: !Join 
                - ''
                - - 'arn:aws:iam::'
                  - !FindInMap [ELBRegionMap, !Ref 'AWS::Region', AccountId]
                  - ':root'
            Action: s3:PutObject
            Resource: !Join 
              - ''
              - - !GetAtt ALBAccessLogsBucket.Arn
                - '/*'
          - Sid: AllowLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Join 
              - ''
              - - !GetAtt ALBAccessLogsBucket.Arn
                - '/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

Outputs:
  BucketName:
    Description: Name of the ALB access logs bucket
    Value: !Ref ALBAccessLogsBucket
  BucketArn:
    Description: ARN of the ALB access logs bucket
    Value: !GetAtt ALBAccessLogsBucket.Arn