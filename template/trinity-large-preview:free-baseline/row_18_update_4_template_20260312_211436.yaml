AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an integration between DynamoDB streams and Amazon EventBridge to automate event-driven workflows based on specific data changes.

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table with streams enabled
  EventSource:
    Type: String
    Default: com.example.source
    Description: Source value for EventBridge events
  DetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType value for EventBridge events

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  LambdaIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaIAMRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              eventbridge = boto3.client('eventbridge')
              for record in event['Records']:
                  if 'avatarUrl' in record['dynamodb']['NewImage']:
                      avatar_url = record['dynamodb']['NewImage']['avatarUrl']['S']
                      if avatar_url.endswith('.png'):
                          eventbridge.put_events(
                              Entries=[
                                  {
                                      'Source': 'com.example.source',
                                      'DetailType': 'UserAvatarUpdated',
                                      'Detail': json.dumps(record),
                                      'EventBusName': 'default'
                                  }
                              ]
                          )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule to trigger Lambda on DynamoDB stream events
      EventPattern:
        source:
          - !Ref EventSource
        detail:
          avatarUrl:
            endsWith:
              - '.png'
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: LambdaTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com

Outputs:
  LambdaARN:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  LambdaName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction