AWSTemplateFormatVersion: '2010-09-09'
Description: 'Risk Management System with Lambda, DynamoDB, and SNS integration'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: 
      - dev
      - test
      - prod
    Description: Environment name for resource naming
  
  DynamoDBTableName:
    Type: String
    Default: workload-risk-table
    Description: Name of the DynamoDB table
    
  SNSTopicName:
    Type: String
    Default: risk-notifications
    Description: Name of the SNS topic

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${DynamoDBTableName}-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${SNSTopicName}-${Environment}

  RiskNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics: 
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSMOpsPublish
            Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !GetAtt RiskNotificationTopic.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementTable.Arn

  RiskAssessmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub risk-assessment-${Environment}
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify('Risk Assessment Function')
            };
          }
      Runtime: nodejs16.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          TOPIC_ARN: !Ref RiskNotificationTopic

  RiskMonitoringFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub risk-monitoring-${Environment}
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify('Risk Monitoring Function')
            };
          }
      Runtime: nodejs16.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable
          TOPIC_ARN: !Ref RiskNotificationTopic

Outputs:
  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt RiskManagementTable.Arn

  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref RiskNotificationTopic

  RiskAssessmentFunctionArn:
    Description: ARN of the Risk Assessment Lambda function
    Value: !GetAtt RiskAssessmentFunction.Arn

  RiskMonitoringFunctionArn:
    Description: ARN of the Risk Monitoring Lambda function
    Value: !GetAtt RiskMonitoringFunction.Arn