AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EventBridge with API Destination integration

Parameters:
  APIKey:
    Description: API Key for authenticating with the external API (leave empty if no authentication needed)
    Type: String
    NoEcho: true
    Default: ''
  EndpointURL:
    Description: External API endpoint URL
    Type: String
    Default: 'https://webhook.site/testtest'
  EventBusName:
    Description: Name for the custom event bus
    Type: String
    Default: 'CustomEventBus'

Conditions:
  HasAPIKey: !Not [!Equals [!Ref APIKey, '']]

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  ApiDestinationConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ExternalApiConnection
      AuthorizationType: !If [HasAPIKey, 'API_KEY', 'NONE']
      AuthParameters: !If
        - HasAPIKey
        - ApiKeyAuthParameters:
            ApiKeyName: Authorization
            ApiKeyValue: !Ref APIKey
        - !Ref 'AWS::NoValue'

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ExternalApiDestination
      ConnectionArn: !GetAtt ApiDestinationConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref EndpointURL
      InvocationRateLimitPerSecond: 10

  EventBridgeInvokeApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeInvokeApiDestinationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: RouteToExternalApi
      Description: Rule to route events to external API
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source: 
          - custom.myapp
      State: ENABLED
      Targets:
        - Arn: !GetAtt ApiDestination.Arn
          Id: ExternalApiTarget
          RoleArn: !GetAtt EventBridgeInvokeApiDestinationRole.Arn

Outputs:
  EventBusName:
    Description: Name of the created Event Bus
    Value: !Ref CustomEventBus
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt CustomEventBus.Arn
  ApiDestinationArn:
    Description: ARN of the API Destination
    Value: !GetAtt ApiDestination.Arn
  ConnectionArn:
    Description: ARN of the Connection
    Value: !GetAtt ApiDestinationConnection.Arn
  EventRuleArn:
    Description: ARN of the Event Rule
    Value: !GetAtt EventRule.Arn