AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with Private S3 Bucket

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the subnet
  BucketName:
    Type: String
    Default: !Sub 'emr-serverless-${AWS::StackName}-${AWS::Region}'
    Description: Name for the S3 bucket
  ApplicationName:
    Type: String
    Default: emr-serverless-app
    Description: Name for the EMR Serverless application

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EMRServerlessExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEMRServerlessRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: EMRServerlessBucket

  EMRServerlessBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EMRServerlessBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EMRServerlessRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${BucketName}'
              - !Sub 'arn:aws:s3:::${BucketName}/*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EMRServerlessVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: EMRServerlessIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: EMRServerlessRouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      AvailabilityZone: !Select [0, !GetAZs !Ref 'AWS::Region']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: EMRServerlessSubnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EMRServerlessApplication:
    Type: AWS::EMR::ServerlessApplication
    Properties:
      Name: !Ref ApplicationName
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      InitialCapacity:
        - WorkerCount: 1
          WorkerType:
            Name: SPARK
            Configuration:
              WorkerCount: 1
      AutoStartConfig:
        Enabled: true
        StartupTimeout: PT5M
      AutoStopConfig:
        Enabled: true
        IdleTimeout: PT5M
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcId: !Ref VPC
      ImageConfiguration:
        ApplicationName: spark
        ImageUri: !Sub 'public.ecr.aws/emr-serverless/spark:6.15.0'
      RoleArn: !GetAtt EMRServerlessRole.Arn
      Tags:
        - Key: Name
          Value: EMRServerlessApp

Outputs:
  EMRServerlessApplicationArn:
    Description: EMR Serverless Application ARN
    Value: !GetAtt EMRServerlessApplication.Arn
  EMRServerlessBucketName:
    Description: S3 Bucket Name
    Value: !Ref EMRServerlessBucket
  EMRServerlessRoleArn:
    Description: EMR Serverless Execution Role ARN
    Value: !GetAtt EMRServerlessRole.Arn