AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow to enrich SQS messages with external API data and log results

Resources:
  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 30

  ApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      ConnectionArn: !Ref EventBridgeConnectionArn
      InvocationEndpoint: https://api.zippopotam.us/us/*
      HttpMethod: GET

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:ReceiveMessage
                Resource: !GetAtt MyQueue.Arn
        - PolicyName: ApiDestinationInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ApiDestination.Arn
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  MyPipe:
    Type: AWS::EventSchemas::Pipe
    Properties:
      Source: !GetAtt MyQueue.Arn
      Target: !GetAtt LogGroup.Arn
      Enrichment: !GetAtt ApiDestination.Arn
      RoleArn: !GetAtt PipesRole.Arn
      Description: Enriches SQS messages with external API data and logs results
      SourceParameters:
        SQSParameters:
          BatchSize: 10
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamNamePrefix: enriched-messages
      EnrichmentParameters:
        ApiDestinationParameters:
          HttpMethod: GET
          PathParameterNames:
            - '*'
          QueryStringParameters:
            - zip
          HeaderParameters:
            - Content-Type
          BodyParameters:
            - message
          ResponseParameters:
            - location
          ErrorParameters:
            - error
          Timeout: 30
          RetryAttempts: 3
          RetryDelay: 1
          RetryBackoff: 2
          RetryJitter: 0.1
          RetryMaxAttempts: 5
          RetryMaxDelay: 60
          RetryMaxBackoff: 30
          RetryMaxJitter: 0.5
          RetryMaxAttempts: 10
          RetryMaxDelay: 300
          RetryMaxBackoff: 60
