AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Windows EC2 instance with CPU stress testing capabilities via SSM'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    ConstraintDescription: Must be a valid EC2 instance type from t3.nano to t3.large.

  SubnetId:
    Description: The subnet ID to launch the instance into (optional, will use default VPC if not specified)
    Type: String
    Default: ''

  WindowsAMIId:
    Description: The ID of the Windows Server 2019 AMI
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base

  CPUStressDuration:
    Description: Duration for the CPU stress test in seconds
    Type: Number
    Default: 300
    MinValue: 10
    MaxValue: 3600

  AllowRDPAccess:
    Description: Allow RDP access to the instance (not recommended for production)
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  RDPSourceCIDR:
    Description: CIDR block for RDP access (only used if AllowRDPAccess is true)
    Type: String
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'

Conditions:
  UseSpecifiedSubnet: !Not [!Equals [!Ref SubnetId, '']]
  AllowRDP: !Equals [!Ref AllowRDPAccess, 'true']

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FISCustomPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: '*'
              - Effect: Allow
                Action:
                  - ssm:DescribeInstanceInformation
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                Resource: '*'

  WindowsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Windows EC2 instance with CPU stress testing
      SecurityGroupIngress: !If
        - AllowRDP
        - - IpProtocol: tcp
            FromPort: 3389
            ToPort: 3389
            CidrIp: !Ref RDPSourceCIDR
            Description: Allow RDP access from specified CIDR
        - []

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMIId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt WindowsSecurityGroup.GroupId
      SubnetId: !If [UseSpecifiedSubnet, !Ref SubnetId, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: !Join ['-', [!Ref 'AWS::StackName', 'CPUStressInstance']]
      UserData:
        Fn::Base64: |
          <powershell>
          # Ensure SSM agent is running
          Start-Service AmazonSSMAgent
          # Set execution policy to allow scripts
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Force
          </powershell>

  CPUStressSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Run CPU stress test on Windows instance'
        parameters:
          DurationSeconds:
            type: String
            description: 'Duration of the CPU stress test in seconds'
            default: '300'
        mainSteps:
          - action: aws:runPowerShellScript
            name: RunCPUStressTest
            inputs:
              runCommand:
                - |
                  # Get the number of logical processors
                  $logicalProcessors = (Get-WmiObject -Class Win32_ComputerSystem).NumberOfLogicalProcessors
                  Write-Host "Starting CPU stress test with $logicalProcessors threads for $env:DurationSeconds seconds"
                  
                  # Create a simple CPU stress function
                  function Start-CPUStress {
                    param (
                      [int]$DurationSeconds
                    )
                    
                    $startTime = Get-Date
                    $endTime = $startTime.AddSeconds($DurationSeconds)
                    
                    while ((Get-Date) -lt $endTime) {
                      # Simple CPU-intensive calculation
                      $result = 1
                      for ($i = 1; $i -lt 9999; $i++) {
                        $result *= $i
                        $result %= 9999999
                      }
                    }
                  }
                  
                  # Create and start jobs for each logical processor
                  $jobs = @()
                  for ($i = 0; $i -lt $logicalProcessors; $i++) {
                    $scriptBlock = {
                      param($duration)
                      
                      # Define the function within the scriptblock
                      function Start-CPUStress {
                        param (
                          [int]$DurationSeconds
                        )
                        
                        $startTime = Get-Date
                        $endTime = $startTime.AddSeconds($DurationSeconds)
                        
                        while ((Get-Date) -lt $endTime) {
                          # Simple CPU-intensive calculation
                          $result = 1
                          for ($i = 1; $i -lt 9999; $i++) {
                            $result *= $i
                            $result %= 9999999
                          }
                        }
                      }
                      
                      # Call the function
                      Start-CPUStress -DurationSeconds $duration
                    }
                    
                    $jobs += Start-Job -ScriptBlock $scriptBlock -ArgumentList ([int]$env:DurationSeconds)
                  }
                  
                  # Wait for all jobs to complete
                  Write-Host "Waiting for all CPU stress jobs to complete..."
                  $jobs | Wait-Job | Out-Null
                  
                  # Clean up jobs
                  $jobs | Remove-Job -Force
                  
                  Write-Host "CPU stress test completed successfully"

Outputs:
  InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref WindowsInstance

  InstancePublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt WindowsInstance.PublicDnsName

  SSMDocumentName:
    Description: Name of the SSM document for CPU stress testing
    Value: !Ref CPUStressSSMDocument

  FISRoleARN:
    Description: ARN of the IAM role for Fault Injection Simulator
    Value: !GetAtt FISRole.Arn

  RunStressTestCommand:
    Description: Command to run the CPU stress test via AWS CLI
    Value: !Join ['', ['aws ssm send-command --document-name ', !Ref CPUStressSSMDocument, ' --targets Key=instanceids,Values=', !Ref WindowsInstance, ' --parameters DurationSeconds=', !Ref CPUStressDuration]]