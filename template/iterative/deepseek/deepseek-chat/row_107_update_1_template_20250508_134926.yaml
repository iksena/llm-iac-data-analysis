AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for API Gateway integrated with SQS queue for message retrieval'

Resources:
  MessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: message-queue

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sqs-access-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:ReceiveMessage
                Resource: !GetAtt MessageQueue.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: sqs-message-api
      Description: API for retrieving messages from SQS queue

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: messages

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 
          - arn:aws:apigateway:${AWS::Region}:sqs:path//${AWS::AccountId}/${QueueName}
          - QueueName: !GetAtt MessageQueue.QueueName
        Credentials: !GetAtt ApiGatewayRole.Arn
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.querystring.MaxNumberOfMessages: method.request.querystring.MaxNumberOfMessages
          integration.request.querystring.VisibilityTimeout: method.request.querystring.VisibilityTimeout
          integration.request.querystring.WaitTimeSeconds: method.request.querystring.WaitTimeSeconds
        RequestTemplates:
          application/json: "{}"
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref RestApi
      StageName: prod

Outputs:
  ApiEndpoint:
    Description: URL of the API Gateway endpoint
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/messages
  SqsQueueUrl:
    Description: URL of the SQS queue
    Value: !Ref MessageQueue