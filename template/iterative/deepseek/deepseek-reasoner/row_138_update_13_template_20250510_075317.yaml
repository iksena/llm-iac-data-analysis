AWSTemplateFormatVersion: '2010-09-09'
Description: Web application with S3, DynamoDB, and EC2 integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC ID (e.g., vpc-1a2b3c4d)
    AllowedPattern: "^vpc-[0-9a-f]{8,17}$"
    ConstraintDescription: Must be a valid VPC ID
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet ID (e.g., subnet-1a2b3c4d)
    AllowedPattern: "^subnet-[0-9a-f]{8,17}$"
    ConstraintDescription: Must be a valid Subnet ID
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 Key Pair name
    ConstraintDescription: Must be an existing key pair in this region
  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$"
  LabFilesURL:
    Type: String
    Default: https://github.com/example/lab-files/archive/main.zip
  DataJSONURL:
    Type: String
    Default: https://example.com/data.json
  BucketName:
    Type: String
    Description: Unique S3 bucket name
    Default: webapp-sample-bucket
    AllowedPattern: ^[a-z0-9.-]{3,63}$
    ConstraintDescription: Must follow S3 bucket naming rules

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceType
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceType
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              Service: [ec2.amazonaws.com]
            Action: [sts:AssumeRole]
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub arn:aws:s3:::${BucketName}
                  - !Sub arn:aws:s3:::${BucketName}/*
              - Effect: Allow
                Action: 
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt DynamoDBTable.Arn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: WebServer Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: tcp
          ToPort: 80
          FromPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          ToPort: 443
          FromPort: 443
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet: [!Ref InstanceSecurityGroup]
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          # System updates
          yum update -y
          yum install -y httpd php aws-cli php-pdo php-mbstring php-xml
          systemctl start httpd && systemctl enable httpd
          
          # Install PHP dependencies
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          cd /var/www/html && composer require aws/aws-sdk-php
          
          # Application setup
          LAB_FILES_URL="${LabFilesURL}"
          curl -sSL "$LAB_FILES_URL" -o labfiles.zip
          unzip -qo labfiles.zip -d /var/www/html/ || { echo "Failed to extract lab files"; exit 1; }
          
          # Environment configuration
          AWS_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          sed -i -e "s/%%BUCKET_NAME%%/${BucketName}/g" \
                 -e "s/%%AWS_REGION%%/$AWS_REGION/g" \
                 /var/www/html/config.php
          
          # Asset upload
          aws s3 sync /var/www/html/static/ s3://${BucketName}/ --delete
          
          # Data import
          DATA_URL="${DataJSONURL}"
          curl -sSL "$DATA_URL" -o /tmp/data.json
          php /var/www/html/scripts/import-data.php /tmp/data.json || echo "Data import failed"
          
          # Permissions
          chown -R apache:apache /var/www/html
          systemctl restart httpd

Outputs:
  WebsiteURL:
    Value: !Sub http://${WebServerInstance.PublicDnsName}
  S3BucketName:
    Value: !Ref S3Bucket
  DynamoDBTable:
    Value: !Ref DynamoDBTable