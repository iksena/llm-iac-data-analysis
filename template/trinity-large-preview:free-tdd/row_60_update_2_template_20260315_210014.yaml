AWSTemplateFormatVersion: '2010-09-09'

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption key for AWS resources
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/central-encryption-key
      TargetKeyId: !Ref KMSKey

Outputs:
  KMSKeyId:
    Description: The ID of the created KMS Key
    Value: !Ref KMSKey
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyId'