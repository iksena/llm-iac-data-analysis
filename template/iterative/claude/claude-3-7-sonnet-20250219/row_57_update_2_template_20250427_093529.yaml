AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a basic Amazon ECS cluster with configurable monitoring capabilities'

Parameters:
  ClusterName:
    Type: String
    Default: 'ECSCluster'
    Description: 'Name of the ECS cluster'

  EnhancedMonitoringEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Enable enhanced monitoring for the ECS cluster'

  MetricsCollectionInterval:
    Type: Number
    Default: 60
    Description: 'Interval in seconds for metrics collection'
    MinValue: 1
    MaxValue: 3600

  CPUUtilizationThreshold:
    Type: Number
    Default: 80
    Description: 'Threshold for CPU utilization alarm (percentage)'
    MinValue: 1
    MaxValue: 100

  MemoryUtilizationThreshold:
    Type: Number
    Default: 80
    Description: 'Threshold for memory utilization alarm (percentage)'
    MinValue: 1
    MaxValue: 100

  TaskCountThreshold:
    Type: Number
    Default: 5
    Description: 'Threshold for running task count alarm'
    MinValue: 1

Conditions:
  IsEnhancedMonitoringEnabled: !Equals [!Ref EnhancedMonitoringEnabled, 'true']

Resources:
  # IAM Roles and Policies
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Path: /

  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSServiceRolePolicy'
      Path: /

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref EnhancedMonitoringEnabled
      Configuration:
        ExecuteCommandConfiguration:
          Logging: DEFAULT

  # CloudWatch Dashboard
  ClusterDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsEnhancedMonitoringEnabled
    Properties:
      DashboardName: !Sub "${ClusterName}-Dashboard"
      DashboardBody: !Sub 
        |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "CPUUtilization", "ClusterName", "${ClusterName}" ]
                ],
                "period": ${MetricsCollectionInterval},
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "CPU Utilization"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "MemoryUtilization", "ClusterName", "${ClusterName}" ]
                ],
                "period": ${MetricsCollectionInterval},
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Memory Utilization"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "RunningTaskCount", "ClusterName", "${ClusterName}" ]
                ],
                "period": ${MetricsCollectionInterval},
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Running Task Count"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/ECS", "PendingTaskCount", "ClusterName", "${ClusterName}" ]
                ],
                "period": ${MetricsCollectionInterval},
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Pending Task Count"
              }
            }
          ]
        }

  # CloudWatch Alarms
  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsEnhancedMonitoringEnabled
    Properties:
      AlarmName: !Sub "${ClusterName}-CPUUtilizationAlarm"
      AlarmDescription: !Sub "Alarm if CPU utilization exceeds ${CPUUtilizationThreshold}%"
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: !Ref MetricsCollectionInterval
      EvaluationPeriods: 3
      Threshold: !Ref CPUUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      TreatMissingData: notBreaching

  MemoryUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsEnhancedMonitoringEnabled
    Properties:
      AlarmName: !Sub "${ClusterName}-MemoryUtilizationAlarm"
      AlarmDescription: !Sub "Alarm if Memory utilization exceeds ${MemoryUtilizationThreshold}%"
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: !Ref MetricsCollectionInterval
      EvaluationPeriods: 3
      Threshold: !Ref MemoryUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      TreatMissingData: notBreaching

  RunningTaskCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsEnhancedMonitoringEnabled
    Properties:
      AlarmName: !Sub "${ClusterName}-RunningTaskCountAlarm"
      AlarmDescription: !Sub "Alarm if Running Task Count is less than ${TaskCountThreshold}"
      MetricName: RunningTaskCount
      Namespace: AWS/ECS
      Statistic: Sum
      Period: !Ref MetricsCollectionInterval
      EvaluationPeriods: 3
      Threshold: !Ref TaskCountThreshold
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      TreatMissingData: breaching

Outputs:
  ClusterName:
    Description: 'Name of the ECS cluster'
    Value: !Ref ClusterName
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterArn:
    Description: 'ARN of the ECS cluster'
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  TaskExecutionRoleArn:
    Description: 'ARN of the ECS Task Execution Role'
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TaskExecutionRoleArn"

  ServiceRoleArn:
    Description: 'ARN of the ECS Service Role'
    Value: !GetAtt ECSServiceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceRoleArn"

  DashboardURL:
    Description: 'URL to the CloudWatch Dashboard'
    Condition: IsEnhancedMonitoringEnabled
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ClusterName}-Dashboard"
    Export:
      Name: !Sub "${AWS::StackName}-DashboardURL"