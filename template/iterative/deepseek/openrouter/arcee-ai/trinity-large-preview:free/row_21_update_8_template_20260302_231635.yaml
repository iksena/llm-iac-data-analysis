AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Timestream database and tables with configurable retention policies and error handling.

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-database
    Description: Name of the Timestream database to create
  RetentionPeriodTable1:
    Type: Number
    Default: 30
    Description: Retention period in days for poc-table-01-batch-write
  RetentionPeriodTable2:
    Type: Number
    Default: 30
    Description: Retention period in days for poc-table-02-older-records-memonly
  RetentionPeriodTable3:
    Type: Number
    Default: 30
    Description: Retention period in days for poc-table-03-older-records-magnetic
  RetentionPeriodTable4:
    Type: Number
    Default: 30
    Description: Retention period in days for poc-table-04-common-attributes

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      # Database creation with default settings

  TimestreamTable1:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: !Ref RetentionPeriodTable1
      # Table with configurable retention period

  TimestreamTable2:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: !Ref RetentionPeriodTable2
      # Table with configurable retention period

  TimestreamTable3:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: !Ref RetentionPeriodTable3
      # Table with configurable retention period

  TimestreamTable4:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: 24
        MagneticStoreRetentionPeriodInDays: !Ref RetentionPeriodTable4
      # Table with configurable retention period

Outputs:
  DatabaseName:
    Description: Name of the created Timestream database
    Value: !Ref TimestreamDatabase
  TableNames:
    Description: Names of the created Timestream tables
    Value: !Join [", ", [!Ref TimestreamTable1, !Ref TimestreamTable2, !Ref TimestreamTable3, !Ref TimestreamTable4]]
  # Outputs for easy reference after deployment