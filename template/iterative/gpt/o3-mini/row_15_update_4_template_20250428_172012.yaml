AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a REST API using API Gateway with Lambda non-proxy integration.

Resources:
  MyLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "MyLambdaFunction"
      Handler: "index.handler"
      Role: "arn:aws:iam::123456789012:role/lambda-execution-role"
      Runtime: python3.12
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }

  LambdaPermissionForAPIGateway:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MyLambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${restapi}/*"
    DependsOn:
      - MyLambdaFunction
      - MyRestApi

  MyRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "MyNonProxyApi"
      Description: "API Gateway with Lambda non-proxy integration"

  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MyRestApi
      ResourceId: !GetAtt MyRestApi.RootResourceId
      HttpMethod: "POST"
      AuthorizationType: "NONE"
      Integration:
        Type: "AWS"
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MyLambdaFunction.Arn}/invocations"
        RequestTemplates:
          application/json: |
            {
              "statusCode": 200
            }
        IntegrationResponses:
          - StatusCode: "200"
            ResponseTemplates:
              application/json: |
                {
                  "message": "Lambda invocation succeeded"
                }
      MethodResponses:
        - StatusCode: "200"
          ResponseModels:
            application/json: "Empty"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: RootMethod
    Properties:
      RestApiId: !Ref MyRestApi
      StageName: "prod"

Outputs:
  ApiEndpoint:
    Description: "The URL of the API Gateway endpoint"
    Value: !Sub "https://${restapi}.execute-api.${AWS::Region}.amazonaws.com/prod" 
    Export:
      Name: ApiEndpoint
  LambdaFunctionArn:
    Description: "ARN of the Lambda function"
    Value: !GetAtt MyLambdaFunction.Arn
    Export:
      Name: LambdaFunctionArn

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups: []
    ParameterLabels: {}

Mappings: {}

Conditions: {}

Transform: {}

# Substitution mapping for the restapi variable in !Sub functions.
# This is handled by CloudFormation substitution by referencing the logical resource "MyRestApi".
# In our template, when using the restapi variable, CloudFormation will use the value of:
#   restapi: !Ref MyRestApi
# To ensure this mapping, we can adjust the definition using "Parameters" section if needed.
# However, in this simplified template, CloudFormation's intrinsic function resolves "!Ref MyRestApi" directly.