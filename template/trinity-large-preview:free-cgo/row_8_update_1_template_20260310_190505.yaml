AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with NAT Gateway Flow Log Analysis

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogAnalysis
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flow-logs/*' | stats sum(bytes) as totalBytes by srcAddr | sort totalBytes desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flow-logs/*' | filter interfaceId like 'eni-' and action = 'REJECT' | stats count(*) as rejectedConnections by srcAddr | sort rejectedConnections desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs with Rejected Connections"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flow-logs/*' | filter interfaceId like 'eni-' and action = 'ACCEPT' and dstPort = 443 | stats count(*) as httpsConnections by srcAddr | sort httpsConnections desc | limit 10",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by HTTPS Connections"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flow-logs/*' | filter interfaceId like 'eni-' | stats count(*) as totalConnections by protocol | sort totalConnections desc",
                "view": "table",
                "region": "${AWS::Region}",
                "title": "Protocol Distribution"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Description: Name of the CloudWatch Dashboard
    Value: !Ref Dashboard
  DashboardArn:
    Description: ARN of the CloudWatch Dashboard
    Value: !GetAtt Dashboard.Arn