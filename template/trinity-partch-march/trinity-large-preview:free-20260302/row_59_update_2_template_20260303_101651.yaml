AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Kinesis Data Stream with throughput alarms

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Description: Number of shards for the stream
    Default: 1
  RetentionPeriodHours:
    Type: Number
    Description: Data retention period in hours
    Default: 24
  ReadThroughputAlarmThreshold:
    Type: Number
    Description: Threshold for read throughput alarm (in MB/s)
    Default: 5
  WriteThroughputAlarmThreshold:
    Type: Number
    Description: Threshold for write throughput alarm (in MB/s)
    Default: 5

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-ReadThroughputAlarm"
      AlarmDescription: Alarm for Kinesis Data Stream read throughput
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref ReadThroughputAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-WriteThroughputAlarm"
      AlarmDescription: Alarm for Kinesis Data Stream write throughput
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref WriteThroughputAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisStreamAlarms
      Subscription:
        - Endpoint: admin@example.com
          Protocol: email

Outputs:
  StreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
  ReadThroughputAlarmARN:
    Description: ARN of the read throughput alarm
    Value: !Ref ReadThroughputAlarm
  WriteThroughputAlarmARN:
    Description: ARN of the write throughput alarm
    Value: !Ref WriteThroughputAlarm