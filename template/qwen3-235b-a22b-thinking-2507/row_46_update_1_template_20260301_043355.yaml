AWSTemplateFormatVersion: '2010-09-09'
Description: 'Resilient Jenkins CI/CD Server with Auto-Recovery and SSM Access'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    AllowedPattern: '^(?:|[-_ a-zA-Z0-9:+@.]{1,255})$'
    ConstraintDescription: Must be a valid EC2 KeyPair name
    MaxLength: 255
  InstanceType:
    Description: EC2 instance type for Jenkins server
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge
  VpcCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid CIDR range
  SubnetCidr:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.0.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid CIDR range
  JenkinsAdminPassword:
    Description: Password for Jenkins admin user (minimum 8 characters)
    Type: AWS::SSM::Parameter::Value<String>
    Default: /jenkins/admin/password
    MinLength: 8
    NoEcho: true

Resources:
  JenkinsVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Jenkins-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Jenkins-IGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref JenkinsVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref JenkinsVPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Jenkins-Public-Subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref JenkinsVPC
      Tags:
        - Key: Name
          Value: Jenkins-Public-Route-Table

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  JenkinsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Jenkins server
      VpcId: !Ref JenkinsVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
          Description: Jenkins HTTP access
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
          Description: ICMP for troubleshooting
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Jenkins-SG

  JenkinsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: Jenkins-SSM-Role

  JenkinsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref JenkinsInstanceRole
      Tags:
        - Key: Name
          Value: Jenkins-Instance-Profile

  JenkinsServer:
    Type: AWS::EC2::Instance
    DependsOn: 
      - SubnetRouteTableAssociation
      - JenkinsSecurityGroup
    Properties:
      ImageId: 
        Fn::FindInMap: 
          - AWSRegionArch2AMI
          - !Ref 'AWS::Region'
          - HVM64
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref JenkinsInstanceProfile
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref JenkinsSecurityGroup
      Tags:
        - Key: Name
          Value: Jenkins-Server
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y java-11-amazon-corretto wget
          wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
          rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
          yum install -y jenkins
          systemctl enable jenkins
          systemctl start jenkins
          # Set admin password from SSM parameter
          ADMIN_PASSWORD=$(aws ssm get-parameter --name "${JenkinsAdminPassword}" --with-decryption --query "Parameter.Value" --output text --region ${AWS::Region})
          echo "jenkins.model.Jenkins.instance.securityRealm.createAccount('admin', '${ADMIN_PASSWORD}')" | java -jar /usr/lib/jenkins/jenkins-cli.jar -s http://localhost:8080/ groovy = || true
          # Wait for Jenkins to fully initialize
          sleep 30
          systemctl restart jenkins

  JenkinsEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref JenkinsServer

  JenkinsRecoveryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Auto-recovery for system status check failures
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed_System
      Dimensions:
        - Name: InstanceId
          Value: !Ref JenkinsServer
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      ActionsEnabled: true
      AlarmActions:
        - !Sub 'arn:${AWS::Partition}:automate:${AWS::Region}:ec2:recover'
      TreatMissingData: notBreaching

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      HVM64: ami-0c7217cdde317cfec
    us-east-2:
      HVM64: ami-036575888dca80e97
    us-west-1:
      HVM64: ami-01f87c43e618e5541
    us-west-2:
      HVM64: ami-00e93f8b141f1350e

Outputs:
  JenkinsURL:
    Description: URL to access Jenkins console
    Value: !Sub 'http://${JenkinsEIP}/'
    Export:
      Name: JenkinsURL
  InstanceId:
    Description: EC2 Instance ID for SSM management
    Value: !Ref JenkinsServer
    Export:
      Name: JenkinsInstanceId
  SSMConnectCommand:
    Description: Command to connect via SSM Session Manager
    Value: !Sub 'aws ssm start-session --target ${JenkinsServer}'