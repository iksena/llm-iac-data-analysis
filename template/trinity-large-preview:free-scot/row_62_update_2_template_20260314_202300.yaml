AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Aurora MySQL cluster with two database instances and customized database parameter groups.

Parameters:
  DBName:
    Type: String
    Default: myaurora
    Description: The name of the database
  DBUsername:
    Type: String
    Default: admin
    Description: The database admin username
  DBPassword:
    Type: String
    NoEcho: true
    Default: admin1234
    Description: The database admin password
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues:
      - db.t3.large
      - db.r5.large
    Description: The instance class for the database instances
  VPCId:
    Type: String
    Default: vpc-12345678
    Description: The ID of the VPC
  SubnetIds:
    Type: CommaDelimitedList
    Default: subnet-12345678,subnet-87654321
    Description: The IDs of the subnets for the Aurora cluster

Resources:
  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora DB Security Group
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: aurora-subnet-group
      DBSubnetGroupDescription: Aurora DB Subnet Group
      SubnetIds: !Ref SubnetIds

  AuroraParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: aurora-mysql5.7
      Description: Aurora MySQL Parameter Group
      Parameters:
        time_zone: UTC
        sql_mode: STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBClusterIdentifier: aurora-cluster
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      DBClusterParameterGroupName: !Ref AuroraParameterGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: 03:00-04:00
      PreferredMaintenanceWindow: sun:04:00-sun:05:00
      Port: 3306
      StorageEncrypted: true

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref AuroraParameterGroup
      PubliclyAccessible: true

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref AuroraParameterGroup
      PubliclyAccessible: true

Outputs:
  ClusterEndpoint:
    Description: The endpoint of the Aurora cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint of the Aurora cluster
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  ClusterResourceId:
    Description: The resource ID of the Aurora cluster
    Value: !GetAtt AuroraCluster.DbClusterResourceId