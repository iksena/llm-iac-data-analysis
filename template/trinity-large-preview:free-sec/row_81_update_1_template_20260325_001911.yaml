AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub '${AWS::StackName}-Resource-Group'
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          TagFilters:
            - TagKey: "Service"
              TagValue: "EC2"
            - TagKey: "Service"
              TagValue: "RDS"
            - TagKey: "Service"
              TagValue: "SageMaker"
            - TagKey: "Service"
              TagValue: "SSM"
            - TagKey: "Service"
              TagValue: "OtherService"
      Tags:
        - Key: "Environment"
          Value: "Production"
        - Key: "Owner"
          Value: "DevOpsTeam"

Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.GroupArn
    Export:
      Name: !Sub '${AWS::StackName}-ResourceGroupArn'

  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ResourceGroup
    Export:
      Name: !Sub '${AWS::StackName}-ResourceGroupName'