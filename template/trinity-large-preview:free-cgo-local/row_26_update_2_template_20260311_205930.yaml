AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template creating an S3 bucket integrated with EventBridge and SNS for object creation notifications

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 's3-eventbridge-sns-${AWS::AccountId}'
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 's3-object-created-topic-${AWS::AccountId}'

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Triggers on S3 ObjectCreated events
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - PutObject
            - PostObject
            - CopyObject
            - CompleteMultipartUpload
          requestParameters:
            bucketName:
              - !Ref S3Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: S3ObjectCreatedTarget
          InputTransformer:
            InputPathsMap:
              objectKey: $.detail.requestParameters.key
              bucketName: $.detail.requestParameters.bucketName
            InputTemplate: '{"default": "Object created in bucket <bucketName> with key <objectKey>"}'

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule