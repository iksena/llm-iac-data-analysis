AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template to create a private Route 53 hosted zone'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: PrivateHostedZoneVPC

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: example.com
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone

  HostedZoneName:
    Description: 'The name of the private hosted zone'
    Value: example.com

  VpcId:
    Description: 'The ID of the created VPC'
    Value: !Ref VPC