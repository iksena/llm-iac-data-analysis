AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with Two Publicly Accessible Instances and Custom Parameter Groups'

Parameters:
  MasterUsername:
    Type: String
    Default: admin
    MinLength: 1
    MaxLength: 16
    Description: Database master username
  MasterUserPassword:
    Type: String
    Default: admin123
    NoEcho: true
    MinLength: 8
    Description: Database master user password
  DBSubnetGroupName:
    Type: String
    Default: default
    Description: Existing DB subnet group name
  VPCSecurityGroups:
    Type: List<String>
    Default: sg-0000000000000000
    Description: VPC security group IDs for the database instances

Resources:
  CustomDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: aurora-mysql5.7
      Description: Custom parameter group for Aurora MySQL cluster
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO'

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBClusterParameterGroupName: !Ref CustomDBParameterGroup
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VpcSecurityGroupIds: !Ref VPCSecurityGroups
      Port: 3306
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroupName
      VPCSecurityGroups: !Ref VPCSecurityGroups

Outputs:
  MasterUsername:
    Description: Database master username
    Value: !Ref MasterUsername
  Endpoint:
    Description: Database endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  Port:
    Description: Database port
    Value: !GetAtt AuroraCluster.Endpoint.Port