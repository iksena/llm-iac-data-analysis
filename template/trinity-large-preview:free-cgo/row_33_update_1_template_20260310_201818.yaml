AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create IAM roles for EC2 instances with read-only access to IAM metadata

Resources:
  EC2ReadOnlyIAMRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2-ReadOnly-IAM-1'
      Description: IAM role for EC2 instances with read-only access to IAM metadata
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  EC2ReadOnlyIAMRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2-ReadOnly-IAM-2'
      Description: IAM role for EC2 instances with read-only access to IAM metadata
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  Role1ARN:
    Description: ARN of the first EC2 ReadOnly IAM Role
    Value: !GetAtt EC2ReadOnlyIAMRole1.Arn
  Role2ARN:
    Description: ARN of the second EC2 ReadOnly IAM Role
    Value: !GetAtt EC2ReadOnlyIAMRole2.Arn