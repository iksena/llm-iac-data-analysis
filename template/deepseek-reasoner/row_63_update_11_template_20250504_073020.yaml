AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: REQUIRED - Existing VPC ID for Aurora cluster (e.g., vpc-1a2b3c4d)
    AllowedPattern: ^vpc-[0-9a-f]{8,17}$
    ConstraintDescription: Must be a valid VPC ID starting with 'vpc-'
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: REQUIRED - Two public subnets in different AZs (comma-separated, e.g., subnet-1234,subnet-5678)
    AllowedPattern: ^subnet-[0-9a-f]{8,17}(,subnet-[0-9a-f]{8,17})?$
    ConstraintDescription: Must provide exactly two valid subnet IDs

  DBName:
    Type: String
    Default: mydatabase
    Description: Initial database name
  
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues: [db.t3.medium, db.t3.large, db.r5.large]
    Description: DB instance class type

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network Configuration
        Parameters: [VpcId, SubnetIds]
      - Label:
          default: Database Configuration
        Parameters: [DBName, DBInstanceClass]

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'aurora-secret-${AWS::StackName}'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.12.0
      DatabaseName: !Ref DBName
      MasterUsername: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt RDSSecurityGroup.GroupId
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance-1'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance-2'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      PubliclyAccessible: true

Outputs:
  ClusterEndpoint:
    Value: !GetAtt DBCluster.Endpoint.Address
    Description: Writer endpoint for the Aurora cluster
  ReaderEndpoint:
    Value: !GetAtt DBCluster.ReadEndpoint.Address
    Description: Load-balanced reader endpoint
  SecretARN:
    Value: !Ref DBSecret
    Description: ARN of the Secrets Manager secret containing credentials