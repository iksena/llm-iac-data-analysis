AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL Cluster with Two db.t3.large Instances and Custom Parameter Groups

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      MasterUsername: admin
      MasterUserPassword: password123
      Port: 3306
      BackupRetentionPeriod: 1
      DBSubnetGroupName: default
      VpcSecurityGroupIds:
        - sg-123456
      StorageEncrypted: true
      PubliclyAccessible: true

  CustomDBParameters:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        sql_mode: STRICT_TRANS_TABLES

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBParameterGroupName: !Ref CustomDBParameters
      PubliclyAccessible: true
    DependsOn: AuroraCluster

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBParameterGroupName: !Ref CustomDBParameters
      PubliclyAccessible: true
    DependsOn: AuroraCluster

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint
  ReaderEndpoint:
    Description: Aurora Reader Endpoint
    Value: !GetAtt AuroraCluster.ReaderEndpoint