AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Billing Alarm Notifications
      TopicName: BillingAlarmTopic

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: xxxxx@gmail.com
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm5USD
      AlarmDescription: Billing alarm for $5 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 5.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm10USD
      AlarmDescription: Billing alarm for $10 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 10.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm20USD
      AlarmDescription: Billing alarm for $20 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 20.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: Currency
          Value: USD

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm40USD
      AlarmDescription: Billing alarm for $40 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 40.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: Currency
          Value: USD

Outputs:
  BillingAlarmTopicArn:
    Description: SNS Topic ARN for billing alarms
    Value: !Ref BillingAlarmTopic