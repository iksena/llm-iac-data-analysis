AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value
      Description: Connection to MongoDB API endpoint
      Name: MongoDBConnection

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeConnection
                Resource: !GetAtt MongoDBConnection.Arn

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      Name: MongoDBApiDestination

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route events to MongoDB API endpoint
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - custom.application
      Targets:
        - Arn: !GetAtt MongoDBApiDestination.Arn
          Id: MongoDBTarget
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

Outputs:
  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !GetAtt EventBridgeRule.Arn
  MongoDBConnectionArn:
    Description: ARN of the MongoDB connection
    Value: !GetAtt MongoDBConnection.Arn
  DeadLetterQueueUrl:
    Description: URL of the dead-letter SQS queue
    Value: !GetAtt DeadLetterQueue.QueueUrl