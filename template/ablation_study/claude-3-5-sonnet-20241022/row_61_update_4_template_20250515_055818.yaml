AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a private Route 53 hosted zone for internal DNS resolution'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'ID of the VPC where the private hosted zone will be associated'
    ConstraintDescription: 'Must be a valid VPC ID'
    AllowedPattern: '^vpc-[a-z0-9]{8,}$'
    MinLength: 12
    MaxLength: 21

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: 'www.example.com.'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS resolution'
      HostedZoneTags:
        - Key: Name
          Value: 'www.example.com Private Zone'
        - Key: Environment
          Value: !Ref 'AWS::StackName'
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref 'AWS::Region'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneId'

  HostedZoneName:
    Description: 'The domain name of the private hosted zone'
    Value: 'www.example.com'
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneName'