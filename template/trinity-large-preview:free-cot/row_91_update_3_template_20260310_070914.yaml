AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for VPC Flow Logs with Lifecycle Management and Access Controls

Parameters:
  BucketName:
    Type: String
    Default: vpc-flow-logs-bucket
    Description: Name of the S3 bucket for VPC flow logs
  EnableVersioning:
    Type: String
    AllowedValues: [ 'true', 'false' ]
    Default: 'false'
    Description: Enable S3 bucket versioning (true/false)
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning logs to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before deleting old logs

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !If [EnableVersioning, Enabled, Suspended]
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  VPCFlowLogsBucketLifecycle:
    Type: AWS::S3::BucketLifecycleConfiguration
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      Rules:
        - Id: TransitionToGlacier
          Status: Enabled
          Transitions:
            - Days: !Ref LifecycleTransitionDays
              StorageClass: GLACIER
        - Id: Expiration
          Status: Enabled
          ExpirationInDays: !Ref LifecycleExpirationDays

Outputs:
  BucketName:
    Description: Name of the VPC Flow Logs S3 bucket
    Value: !Ref VPCFlowLogsBucket
  BucketArn:
    Description: ARN of the VPC Flow Logs S3 bucket
    Value: !GetAtt VPCFlowLogsBucket.Arn