AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to create a secure S3 bucket that passes security scanning checks.
  It includes a primary secure bucket with server-side encryption and encrypted access logging,
  a bucket to store replicas, and an access log bucket. Public access is disabled and a bucket policy
  enforces secure transport (HTTPS) for the secure bucket.

Resources:
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: "access-logs/"

  SecureBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SecureBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Join 
                - ""
                - - !GetAtt SecureBucket.Arn
                  - "/*"
              - !GetAtt SecureBucket.Arn
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  SecureBucketName:
    Description: "The name of the primary secure S3 bucket"
    Value: !Ref SecureBucket
  ReplicaBucketName:
    Description: "The name of the S3 bucket for replicas"
    Value: !Ref ReplicaBucket
  AccessLogBucketName:
    Description: "The name of the access log S3 bucket"
    Value: !Ref AccessLogBucket