AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify Web Application with Production Branch for TodoApp

Parameters:
  RepositoryName:
    Type: String
    Default: TodoAppRepo
    Description: Name of the CodeCommit repository
  AmplifyAppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
  BranchName:
    Type: String
    Default: production
    Description: Name of the Amplify branch for production deployment

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AmplifyServiceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeCommitPowerUser

  CodeCommitRepository:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
      RepositoryDescription: Repository for TodoApp source code

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AmplifyAppName
      Repository: !GetAtt CodeCommitRepository.CloneUrlHttp
      OauthToken: '{{resolve:secretsmanager:amplify-oauth-token:SecretString}}'
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      Description: Production branch for TodoApp
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId
  AmplifyBranchName:
    Description: Amplify Branch Name
    Value: !Ref BranchName
  RepositoryCloneUrl:
    Description: CodeCommit Repository Clone URL
    Value: !GetAtt CodeCommitRepository.CloneUrlHttp