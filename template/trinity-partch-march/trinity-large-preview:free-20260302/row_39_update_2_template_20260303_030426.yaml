AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon ECR repository with a repository policy granting AWS account root user permissions for Kubernetes container image management.

Resources:
  ECRRepository:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName: !Sub 'kubernetes-images-${AWS::AccountId}'
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - 'ecr:GetDownloadUrlForLayer'
              - 'ecr:BatchGetImage'
              - 'ecr:BatchCheckLayerAvailability'
              - 'ecr:PutImage'
              - 'ecr:InitiateLayerUpload'
              - 'ecr:UploadLayerPart'
              - 'ecr:CompleteLayerUpload'
              - 'ecr:DescribeRepositories'
              - 'ecr:GetRepositoryPolicy'
              - 'ecr:ListImages'
              - 'ecr:DeleteRepository'
              - 'ecr:BatchDeleteImage'
              - 'ecr:SetRepositoryPolicy'
              - 'ecr:PutLifecyclePolicy'
              - 'ecr:DescribeImages'
              - 'ecr:DescribeImageScanFindings'
              - 'ecr:StartImageScan'
              - 'ecr:GetAuthorizationToken'
              - 'ecr:ListTagsForResource'

Outputs:
  RepositoryName:
    Description: The name of the ECR repository
    Value: !Ref ECRRepository
    Export:
      Name: !Sub '${AWS::StackName}-RepositoryName'