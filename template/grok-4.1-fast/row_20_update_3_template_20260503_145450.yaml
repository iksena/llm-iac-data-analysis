AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production CloudFormation template for CloudWatch Dashboard and folder-organized Logs Insights Queries monitoring AWS Client VPN: connections/durations, ingress/egress GB, top users/distinct, auth breakdowns (SAML/AD/Mutual/Mixed).'

Parameters:
  LogGroupName:
    Type: String
    Description: 'CloudWatch Log Group for Client VPN logs (e.g., /aws/vpn/control)'
    MinLength: '1'
  DashboardName:
    Type: String
    Default: 'ClientVPN-Monitoring-Dashboard'
    Description: 'CloudWatch Dashboard name'

Resources:
  ByEndpointQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByEndpoint'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |-
        fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          count() as Connections,
          avg(duration) as AvgDurationSec,
          sum(duration)/3600 as ConnHours,
          sum(bytesReceived)/1073741824.0 as IngressGB,
          sum(bytesSent)/1073741824.0 as EgressGB,
          count_distinct(username) as DistinctUsers
        by endpointId
        | sort Connections desc
        | limit 50

  AuthBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/ByAuth'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |-
        fields @timestamp, toLower(reason) as reason_lower
        | filter event = "connect"
        | stats count() as Authentications
        by bin(1h),
          case(
            reason_lower like /saml/, "SAML",
            reason_lower like /active directory/, "AD",
            reason_lower like /certificate/, "Mutual Auth",
            "Mixed/Other"
          )
        | sort @timestamp desc
        | limit 20

  TopUsersQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/TopUsers'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |-
        fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          count() as Sessions,
          avg(duration) as AvgDurationSec,
          sum(bytesReceived + bytesSent)/1073741824.0 as TotalGB
        by username, endpointId
        | sort Sessions desc
        | limit 20

  DataTrendsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub 'ClientVPN/Usage/DataTrends'
      LogGroupNames:
        - !Ref LogGroupName
      QueryString: |-
        fields @timestamp, bytesReceived, bytesSent, duration
        | filter event = "disconnect"
        | stats
          sum(bytesReceived)/1073741824.0 as IngressGB,
          sum(bytesSent)/1073741824.0 as EgressGB,
          sum(duration)/3600 as ConnHours
        by bin(1h)
        | sort @timestamp desc
        | limit 100

  ClientVpnDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "width": 24,
              "height": 3,
              "properties": {
                "markdown": "# AWS Client VPN Usage Monitoring\\n\\n**Key Metrics:** Connection durations (avg/sum hours), data transfer (ingress/egress GB), distinct/top users, auth breakdowns (SAML/AD/Mutual/Mixed).\\n**Views:** Endpoints, auth hourly, top users, trends."
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 9,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "logGroupNames": ["${LogGroupName}"],
                  "queryString": "fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration\\n| filter event = \\"disconnect\\"\\n| stats\\n  count() as Connections,\\n  avg(duration) as AvgDurationSec,\\n  sum(duration)/3600 as ConnHours,\\n  sum(bytesReceived)/1073741824.0 as IngressGB,\\n  sum(bytesSent)/1073741824.0 as EgressGB,\\n  count_distinct(username) as DistinctUsers\\nby endpointId\\n| sort Connections desc\\n| limit 50"
                },
                "view": "table",
                "title": "Endpoint Usage: Connections, Avg Duration(s), Conn Hours, Ingress/Egress GB, Distinct Users"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "logGroupNames": ["${LogGroupName}"],
                  "queryString": "fields @timestamp, toLower(reason) as reason_lower\\n| filter event = \\"connect\\"\\n| stats count() as Authentications\\nby bin(1h),\\n  case(\\n    reason_lower like /saml/, \\"SAML\\",\\n    reason_lower like /active directory/, \\"AD\\",\\n    reason_lower like /certificate/, \\"Mutual Auth\\",\\n    \\"Mixed/Other\\"\\n  )\\n| sort @timestamp desc\\n| limit 20"
                },
                "view": "table",
                "title": "Auth Breakdown: SAML/AD/Mutual/Mixed (per Hour)"
              }
            },
            {
              "type": "log",
              "width": 12,
              "height": 6,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "logGroupNames": ["${LogGroupName}"],
                  "queryString": "fields @timestamp, endpointId, username, bytesReceived, bytesSent, duration\\n| filter event = \\"disconnect\\"\\n| stats\\n  count() as Sessions,\\n  avg(duration) as AvgDurationSec,\\n  sum(bytesReceived + bytesSent)/1073741824.0 as TotalGB\\nby username, endpointId\\n| sort Sessions desc\\n| limit 20"
                },
                "view": "table",
                "title": "Top Users: Sessions, Avg Duration(s), Total GB (by Endpoint)"
              }
            },
            {
              "type": "log",
              "width": 24,
              "height": 7,
              "properties": {
                "query": {
                  "region": "${AWS::Region}",
                  "logGroupNames": ["${LogGroupName}"],
                  "queryString": "fields @timestamp, bytesReceived, bytesSent, duration\\n| filter event = \\"disconnect\\"\\n| stats\\n  sum(bytesReceived)/1073741824.0 as IngressGB,\\n  sum(bytesSent)/1073741824.0 as EgressGB,\\n  sum(duration)/3600 as ConnHours\\nby bin(1h)\\n| sort @timestamp desc\\n| limit 100"
                },
                "view": "timeSeries",
                "title": "Hourly Trends: Ingress/Egress GB, Connection Hours"
              }
            }
          ]
        }
      Tags:
        - Key: Purpose
          Value: ClientVPN-Monitoring
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  DashboardName:
    Description: 'CloudWatch Dashboard Name'
    Value: !Ref DashboardName
  DashboardUrl:
    Description: 'Console URL to view Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  ByEndpointQueryId:
    Description: 'Saved Query ID: Endpoint Usage'
    Value: !GetAtt ByEndpointQuery.QueryDefinitionId
  AuthBreakdownQueryId:
    Description: 'Saved Query ID: Auth Breakdown'
    Value: !GetAtt AuthBreakdownQuery.QueryDefinitionId
  TopUsersQueryId:
    Description: 'Saved Query ID: Top Users'
    Value: !GetAtt TopUsersQuery.QueryDefinitionId
  DataTrendsQueryId:
    Description: 'Saved Query ID: Data Trends'
    Value: !GetAtt DataTrendsQuery.QueryDefinitionId