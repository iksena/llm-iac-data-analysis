AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with S3, DynamoDB, and EC2

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MyInternetGateway

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref MyVPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSH access
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${AWS::StackName}-static-assets
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${StaticAssetsBucket}/*'

  AWServicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceCategory
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceCategory
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  WebServerInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      ImageId: !Sub 'arn:aws:ssm:${AWS::Region}:amazon/linux-ami/amzn2-ami-hvm-x86_64-gp2:latest'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            # Install Apache and PHP
            yum update -y
            yum install -y httpd php php-cli php-common php-mbstring php-xml php-json php-pdo php-mysqlnd php-gd php-curl php-zip php-dom php-simplexml php-xmlreader php-fileinfo
            systemctl start httpd
            systemctl enable httpd

            # Install AWS CLI
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            ./aws/install

            # Create web directory and download lab files
            mkdir -p /var/www/html/lab
            cd /var/www/html/lab

            # Download static assets from S3
            aws s3 sync s3://${StaticAssetsBucket} /var/www/html/lab/assets

            # Create PHP application
            cat > /var/www/html/index.php << 'EOF'
            <?php
            echo "<h1>AWS Services Application</h1>";
            echo "<p>Region: " . aws configure get region . "</p>";
            echo "<p>Static assets served from: ${StaticAssetsBucket}</p>";
            ?>
            EOF

            # Populate DynamoDB table
            aws dynamodb batch-write-item --request-items file://dynamodb-data.json

            # Create sample DynamoDB data
            cat > /var/www/html/lab/dynamodb-data.json << 'EOF'
            [
              {
                "PutRequest": {
                  "Item": {
                    "ServiceName": {"S": "EC2"},
                    "ServiceCategory": {"S": "Compute"},
                    "Description": {"S": "Elastic Compute Cloud"}
                  }
                }
              },
              {
                "PutRequest": {
                  "Item": {
                    "ServiceName": {"S": "S3"},
                    "ServiceCategory": {"S": "Storage"},
                    "Description": {"S": "Simple Storage Service"}
                  }
                }
              }
            ]
            EOF

            # Signal CloudFormation completion
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource WebServerInstance
      Tags:
        - Key: Name
          Value: WebServerInstance

Outputs:
  WebsiteURL:
    Description: URL of the web application
    Value: !Sub 'http://${WebServerInstance.PublicDnsName}'
  S3BucketName:
    Description: Name of the static assets S3 bucket
    Value: !Ref StaticAssetsBucket
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref AWServicesTable