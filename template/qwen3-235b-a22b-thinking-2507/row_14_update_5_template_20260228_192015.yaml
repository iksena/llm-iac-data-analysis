AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for ENI with two secondary IPs and associated EIPs'
Parameters:
  SubnetId:
    Description: Subnet where the network interface will be created (must match VPC of instance)
    Type: AWS::EC2::Subnet::Id
  SecondaryPrivateIp1:
    Description: First secondary private IP address (must be available in subnet CIDR)
    Type: String
    AllowedPattern: '^([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\.([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])){3}$'
    ConstraintDescription: Must be a valid IPv4 address within the subnet range
  SecondaryPrivateIp2:
    Description: Second secondary private IP address (must be available in subnet CIDR and unique from first)
    Type: String
    AllowedPattern: '^([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\\.([0-9]{1,2}|1[0-9]{2}|2[0-4][0-9]|25[0-5])){3}$'
    ConstraintDescription: Must be a valid IPv4 address within the subnet range and different from first secondary IP
Resources:
  PrimaryNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      SourceDestCheck: false
      SecondaryPrivateIpAddresses:
        - !Ref SecondaryPrivateIp1
        - !Ref SecondaryPrivateIp2
  PublicElasticIp1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  PublicElasticIp2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
  IpAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PublicElasticIp1.AllocationId
      NetworkInterfaceId: !Ref PrimaryNetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp1
  IpAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt PublicElasticIp2.AllocationId
      NetworkInterfaceId: !Ref PrimaryNetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp2
Outputs:
  NetworkInterfaceId:
    Description: ID of the created Elastic Network Interface (attach to EC2 instance)
    Value: !Ref PrimaryNetworkInterface
  PublicIp1:
    Description: First public IP address associated with secondary private IP
    Value: !GetAtt PublicElasticIp1.PublicIp
  PublicIp2:
    Description: Second public IP address associated with secondary private IP
    Value: !GetAtt PublicElasticIp2.PublicIp
  PrivateIp1:
    Description: First secondary private IP address
    Value: !Ref SecondaryPrivateIp1
  PrivateIp2:
    Description: Second secondary private IP address
    Value: !Ref SecondaryPrivateIp2