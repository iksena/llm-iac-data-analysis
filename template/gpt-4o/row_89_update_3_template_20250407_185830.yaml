AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an AWS Security Hub resource,
  enabling default standards and turning on consolidated control findings.

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub

  SecurityHubDefaultStandards:
    Type: AWS::SecurityHub::Standard
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:::standard/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

  SecurityHubConsolidatedControlFindings:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub
    Value: !GetAtt SecurityHub.Arn