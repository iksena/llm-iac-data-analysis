AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyApiKey:
    Type: String
    NoEcho: true
    Description: 'Shopify Admin API Key for authentication'
  
  ShopifyDomain:
    Type: String
    Default: 'testanu.myshopify.com'
    Description: 'Your myshopify domain'

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: shopify-events

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyApiKey
      Name: shopify-connection
      Description: 'Shopify API authentication connection'

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn: ShopifyConnection
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://${ShopifyDomain}/admin/api/2023-07/products.json'
      Name: shopify-destination
      InvocationRateLimitPerSecond: 5

  EventRule:
    Type: AWS::Events::Rule
    DependsOn: ShopifyApiDestination
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - 'MyShopifyApp'
        detail-type:
          - 'ProductCreation'
      Name: shopify-product-rule
      State: ENABLED
      Targets:
        - Id: ShopifyTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              productTitle: "$.detail.title"
              productDescription: "$.detail.description"
              productType: "$.detail.type"
            InputTemplate: '{"product": {"title": "<productTitle>", "body_html": "<productDescription>", "product_type": "<productType>"}}'

Outputs:
  EventBusArn:
    Description: 'Event Bus ARN'
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: 'API Destination ARN'
    Value: !GetAtt ShopifyApiDestination.Arn

  ConnectionArn:
    Description: 'Connection ARN'
    Value: !GetAtt ShopifyConnection.Arn