AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ApiGatewaySesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SesSendPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource: '*'

  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SecureEmailService
      Description: Production-ready email sending API with SES integration
      FailOnWarnings: true

  SendResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: send

  EmailRequestModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref EmailApi
      Name: EmailRequest
      ContentType: application/json
      Schema: |
        {
          "title": "EmailRequest",
          "type": "object",
          "required": ["to", "from", "subject"],
          "properties": {
            "to": {"type": "string"},
            "from": {"type": "string"},
            "subject": {"type": "string"},
            "text": {"type": "string"},
            "html": {"type": "string"}
          },
          "oneOf": [
            {"required": ["text"]},
            {"required": ["html"]}
          ],
          "additionalProperties": false
        }

  BodyRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: EmailBodyValidator
      RestApiId: !Ref EmailApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  SendEmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref SendResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref BodyRequestValidator
      RequestModels:
        application/json: !Ref EmailRequestModel
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
        - StatusCode: '400'
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail'
        Credentials: !GetAtt ApiGatewaySesRole.Arn
        RequestTemplates:
          application/json: |
            #set($inputRoot = $input.path('$'))
            {
              "Destination": {
                "ToAddresses": ["$inputRoot.to"]
              },
              "Source": "$inputRoot.from",
              "Message": {
                "Subject": {
                  "Data": "$inputRoot.subject"
                },
                "Body": {
                  #if($inputRoot.text && $inputRoot.text != '')
                  "Text": {
                    "Data": "$inputRoot.text"
                  }#if($inputRoot.html && $inputRoot.html != ''),
                  #end
                  #if($inputRoot.html && $inputRoot.html != '')
                  "Html": {
                    "Data": "$inputRoot.html"
                  }
                  #end
                }
              }
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: '''*'''
          - StatusCode: '400'
            SelectionPattern: '.*\\[InvalidParameterValue\\].*'
          - StatusCode: '400'
            SelectionPattern: '.*\\[ValidationException\\].*'
          - StatusCode: '400'
            SelectionPattern: '.*\\[MissingRequiredParameter\\].*'
        PassthroughBehavior: WHEN_NO_TEMPLATES

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: SendEmailMethod
    Properties:
      RestApiId: !Ref EmailApi
      Description: Production deployment
      StageName: prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: ProductionUsagePlan
      Description: Rate limits and quotas for production email service
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: prod
      Throttle:
        BurstLimit: 1000
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: ProductionApiKey
      Enabled: true
      Description: Key for production email API access

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan
Outputs:
  ApiEndpoint:
    Description: URL of the email sending API
    Value: !Sub 'https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/prod/send'
  ApiKeyId:
    Description: ID of the API key (use with x-api-key header)
    Value: !Ref ApiKey
  UsagePlanId:
    Description: ID of the configured usage plan
    Value: !Ref UsagePlan