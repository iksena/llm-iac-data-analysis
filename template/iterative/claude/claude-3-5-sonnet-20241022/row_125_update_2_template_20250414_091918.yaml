AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway with SES Integration for Email Sending'

Parameters:
  EmailDomain:
    Type: String
    Description: 'Verified SES domain for sending emails'
  
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
    Description: 'Deployment environment'
    
  ApiStageName:
    Type: String
    Default: v1
    Description: 'API Gateway stage name'
    
  UsagePlanQuota:
    Type: Number
    Default: 10000
    Description: 'Monthly quota for API usage'
    
  ThrottlingRate:
    Type: Number
    Default: 500
    Description: 'Requests per second throttling limit'

Resources:
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: ApiGatewaySESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'

  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'email-service-${Environment}'
      Description: 'API for sending emails via SES'
      EndpointConfiguration:
        Types:
          - REGIONAL

  EmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: 'email'

  EmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail'
        IntegrationHttpMethod: POST
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: |
            #set($inputRoot = $input.path('$'))
            Action=SendEmail&Version=2010-12-01
            &Source=$util.urlEncode($inputRoot.from)
            &Destination.ToAddresses.member.1=$util.urlEncode($inputRoot.to)
            &Message.Subject.Data=$util.urlEncode($inputRoot.subject)
            &Message.Body.Text.Data=$util.urlEncode($inputRoot.content.text)
            &Message.Body.Html.Data=$util.urlEncode($inputRoot.content.html)
        IntegrationResponses:
          - StatusCode: 200
            SelectionPattern: '2\d{2}'
            ResponseTemplates:
              application/json: '{"message": "Email sent successfully"}'
          - StatusCode: 400
            SelectionPattern: '4\d{2}'
            ResponseTemplates:
              application/json: '{"message": "Bad request"}'
          - StatusCode: 500
            SelectionPattern: '5\d{2}'
            ResponseTemplates:
              application/json: '{"message": "Internal server error"}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: 400
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: 500
          ResponseModels:
            application/json: 'Empty'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmailMethod
    Properties:
      RestApiId: !Ref EmailApi
      Description: 'Deployment for email service API'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref EmailApi
      StageName: !Ref ApiStageName

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub 'email-service-key-${Environment}'
      Description: 'API Key for email service'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: !Ref ApiStageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub 'email-service-usage-plan-${Environment}'
      Description: 'Usage plan for email service'
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: !Ref ApiStageName
      Quota:
        Limit: !Ref UsagePlanQuota
        Period: MONTH
      Throttle:
        RateLimit: !Ref ThrottlingRate
        BurstLimit: !Ref ThrottlingRate

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: 'API Endpoint URL'
    Value: !Sub 'https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/email'

  ApiKeyId:
    Description: 'API Key ID'
    Value: !Ref ApiKey

  UsagePlanId:
    Description: 'Usage Plan ID'
    Value: !Ref UsagePlan