AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to deploy a MySQL RDS instance (db.t3.micro) with automated snapshots
  in a VPC with public subnets across two Availability Zones and an Internet Gateway for external connectivity.
  The DB instance retrieves its master user password using a dynamic reference from AWS Systems Manager Parameter Store.

Parameters:
  VpcCIDR:
    Description: "CIDR block for the VPC"
    Type: String
    Default: "10.0.0.0/16"
  PublicSubnet1CIDR:
    Description: "CIDR block for public subnet 1"
    Type: String
    Default: "10.0.1.0/24"
  PublicSubnet2CIDR:
    Description: "CIDR block for public subnet 2"
    Type: String
    Default: "10.0.2.0/24"
  DBName:
    Description: "The name of the database"
    Type: String
    Default: "mydatabase"
  DBMasterUsername:
    Description: "The master username for the database"
    Type: String
    Default: "admin"
  DBAllocatedStorage:
    Description: "Allocated storage size for the database (in GB)"
    Type: Number
    Default: 20
  DBSecurityGroupCIDR:
    Description: "CIDR range allowed to access the DB (e.g., 0.0.0.0/0 for public access)"
    Type: String
    Default: "0.0.0.0/0"

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "MyVPC"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: "MyInternetGateway"
  
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway
  
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: "PublicRouteTable"
  
  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway
  
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: "PublicSubnet1"
  
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: "PublicSubnet2"
  
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable
  
  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
  
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnet group for RDS instance"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: "MyDBSubnetGroup"
  
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow MySQL access on port 3306"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref DBSecurityGroupCIDR
      Tags:
        - Key: Name
          Value: "MyDBSecurityGroup"
  
  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: !Ref DBAllocatedStorage
      DBInstanceClass: "db.t3.micro"
      Engine: "MySQL"
      EngineVersion: "8.0.40"
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: "{{resolve:ssm-secure:/my/dbpassword:1}}"
      DBName: !Ref DBName
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DBSubnetGroup
      MultiAZ: false
      PubliclyAccessible: true
      BackupRetentionPeriod: 7
      StorageEncrypted: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: "MySQLRDSInstance"

Outputs:
  VPCId:
    Description: "VPC Identifier"
    Value: !Ref MyVPC
  PublicSubnet1Id:
    Description: "Public Subnet 1 Identifier"
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: "Public Subnet 2 Identifier"
    Value: !Ref PublicSubnet2
  RDSInstanceEndpoint:
    Description: "RDS MySQL Instance Endpoint"
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  RDSInstanceIdentifier:
    Description: "RDS Instance Identifier"
    Value: !Ref MySQLRDSInstance