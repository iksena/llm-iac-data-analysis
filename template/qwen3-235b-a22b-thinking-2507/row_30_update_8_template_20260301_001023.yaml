AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS with multi-AZ EC2 instances, monitoring, and automated mounting'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  InstanceType:
    Description: EC2 instance type for application servers
    Type: String
    Default: c5.large
    AllowedValues:
      - c5.large
      - c5.xlarge
      - m5.large
  VpcCidr:
    Description: CIDR block for VPC
    Type: String
    Default: 10.0.0.0/16
  PublicSubnetCidr1:
    Description: CIDR block for first public subnet
    Type: String
    Default: 10.0.1.0/24
  PublicSubnetCidr2:
    Description: CIDR block for second public subnet
    Type: String
    Default: 10.0.2.0/24
  EfsThroughputThreshold:
    Description: Percentage threshold for EFS throughput alarm
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
  EfsIoLimitThreshold:
    Description: Percentage threshold for EFS I/O usage alarm
    Type: Number
    Default: 95
    MinValue: 1
    MaxValue: 100
  SnsTopicArnForIoAlarm:
    Description: SNS topic ARN for I/O limit alarms
    Type: String
    MinLength: 20
    AllowedPattern: 'arn:aws:sns:.*'
    ConstraintDescription: Must be a valid SNS topic ARN
  SnsTopicArnForThroughputAlarm:
    Description: SNS topic ARN for throughput threshold alarms
    Type: String
    MinLength: 20
    AllowedPattern: 'arn:aws:sns:.*'
    ConstraintDescription: Must be a valid SNS topic ARN

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EfsMultiAzVpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: EfsMultiAzIGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr1
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr2
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicNetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicNetworkAcl

  PublicSubnet1AclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref PublicNetworkAcl

  PublicSubnet2AclAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref PublicNetworkAcl

  PublicAclInboundSSH:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22

  PublicAclInboundNFS:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNetworkAcl
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcCidr
      PortRange:
        From: 2049
        To: 2049

  PublicAclInboundHTTP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNetworkAcl
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  PublicAclEgressAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNetworkAcl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: EfsSecurityGroup

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Ec2SecurityGroup

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: SharedStorageFileSystem

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EfsAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt EfsFileSystem.Arn

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2InstanceRole

  WaitConditionHandle1:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition1:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: Instance1
    Properties:
      Handle: !Ref WaitConditionHandle1
      Timeout: '900'
      Count: 1

  WaitConditionHandle2:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition2:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: Instance2
    Properties:
      Handle: !Ref WaitConditionHandle2
      Timeout: '900'
      Count: 1

  Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Ref PublicSubnet1
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -e
            yum update -y
            yum install -y nfs-utils
            MOUNT_POINT=/mnt/efs
            mkdir -p $$MOUNT_POINT
            
            MAX_RETRIES=30
            RETRY_COUNT=0
            while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
              if mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/ $$MOUNT_POINT; then
                echo "Successfully mounted EFS"
                break
              fi
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ $$RETRY_COUNT -eq $$MAX_RETRIES ]; then
              echo "Failed to mount EFS after $$MAX_RETRIES attempts"
              exit 1
            fi
            
            echo "EFS mount test" > $$MOUNT_POINT/testfile
            if [ -f "$$MOUNT_POINT/testfile" ]; then
              echo "Write verification successful"
            else
              echo "Write verification failed"
              exit 1
            fi
            
            /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource ${WaitConditionHandle1} --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: ApplicationInstance1

  Instance2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
        Count: 1
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Ref PublicSubnet2
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -e
            yum update -y
            yum install -y nfs-utils
            MOUNT_POINT=/mnt/efs
            mkdir -p $$MOUNT_POINT
            
            MAX_RETRIES=30
            RETRY_COUNT=0
            while [ $$RETRY_COUNT -lt $$MAX_RETRIES ]; do
              if mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/ $$MOUNT_POINT; then
                echo "Successfully mounted EFS"
                break
              fi
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            done
            
            if [ $$RETRY_COUNT -eq $$MAX_RETRIES ]; then
              echo "Failed to mount EFS after $$MAX_RETRIES attempts"
              exit 1
            fi
            
            echo "EFS mount test" > $$MOUNT_POINT/testfile
            if [ -f "$$MOUNT_POINT/testfile" ]; then
              echo "Write verification successful"
            else
              echo "Write verification failed"
              exit 1
            fi
            
            /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource ${WaitConditionHandle2} --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: ApplicationInstance2

  EfsIoLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub 'Alarm when EFS I/O usage exceeds ${EfsIoLimitThreshold}% of limit'
      Metrics:
        - Id: m1
          Label: IOUsage
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/EFS
              MetricName: IOUsage
              Dimensions:
                - Name: FileSystemId
                  Value: !Ref EfsFileSystem
            Period: 300
            Stat: Average
        - Id: m2
          Label: IOLimit
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/EFS
              MetricName: IOLimit
              Dimensions:
                - Name: FileSystemId
                  Value: !Ref EfsFileSystem
            Period: 300
            Stat: Average
        - Id: e1
          Label: IOPSUsagePercentage
          ReturnData: true
          Expression: "100 * m1 / m2"
      EvaluationPeriods: 1
      Threshold: !Ref EfsIoLimitThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SnsTopicArnForIoAlarm

  EfsThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub 'Alarm when EFS throughput exceeds ${EfsThroughputThreshold}% of limit'
      Namespace: AWS/EFS
      MetricName: ThroughputPercentage
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref EfsThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SnsTopicArnForThroughputAlarm

Outputs:
  EfsFileSystemId:
    Description: ID of the EFS file system
    Value: !Ref EfsFileSystem
  Instance1Id:
    Description: ID of the first EC2 instance
    Value: !Ref Instance1
  Instance2Id:
    Description: ID of the second EC2 instance
    Value: !Ref Instance2
  Instance1PublicIp:
    Description: Public IP address of first EC2 instance
    Value: !GetAtt Instance1.PublicIp
  Instance2PublicIp:
    Description: Public IP address of second EC2 instance
    Value: !GetAtt Instance2.PublicIp
  MountCommand:
    Description: Example command to mount EFS
    Value: !Sub 'mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs'