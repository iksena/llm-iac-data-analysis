AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready DynamoDB table for mobile notifications reporting with GSI on type/sentTime, on-demand billing, and TTL.'

Parameters:
  TableName:
    Type: String
    Default: MobileNotificationsReportingTable
    MinLength: '3'
    MaxLength: '255'
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'
    Description: 'Physical name for the DynamoDB table (3-255 alphanumeric chars + _ . -)'
  TtlAttributeName:
    Type: String
    Default: ttl
    MinLength: '1'
    MaxLength: '255'
    AllowedPattern: '^[a-zA-Z0-9_]+$'
    Description: 'Attribute name for TTL (Unix epoch seconds); managed by application'

Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TTLSpecification:
        AttributeName: !Ref TtlAttributeName
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Purpose
          Value: 'Mobile notifications reporting'

Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table'
    Value: !Ref NotificationsTable
  TableArn:
    Description: 'ARN of the created DynamoDB table'
    Value: !GetAtt NotificationsTable.Arn
  GsiArn:
    Description: 'ARN of the TypeSentTimeIndex Global Secondary Index'
    Value: !Sub 'arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/index/TypeSentTimeIndex'