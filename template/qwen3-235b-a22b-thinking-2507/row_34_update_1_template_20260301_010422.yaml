AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready MySQL RDS instance in private subnets with Provisioned IOPS'

Parameters:
  DBName:
    Type: String
    Default: ''
    Description: 'Optional database name to create'
  MasterUsername:
    Type: String
    NoEcho: true
    Description: 'Master database username'
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: 'must contain only alphanumeric characters'
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: 'Master database password'
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: 'must contain only alphanumeric characters'
  EngineVersion:
    Type: String
    Default: '8.0.34'
    Description: 'MySQL engine version'
  AllocatedStorage:
    Type: Number
    Default: 100
    Description: 'Allocated storage in GB (minimum 100 for io1)'
    MinValue: 100
  Iops:
    Type: Number
    Default: 1000
    Description: 'Provisioned IOPS (1000-64000)'
    MinValue: 1000
    MaxValue: 64000
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'VPC CIDR block'
  PrivateSubnet1Cidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: 'Private subnet 1 CIDR'
  PrivateSubnet2Cidr:
    Type: String
    Default: '10.0.2.0/24'
    Description: 'Private subnet 2 CIDR'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnet1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PrivateSubnet2'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${AWS::StackName}-DBSubnetGroup'
      DBSubnetGroupDescription: 'Subnet group for MySQL RDS instance'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for MySQL RDS instance'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !GetAtt VPC.CidrBlock

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub 'mysql-rds-${AWS::StackName}'
      DBName: !Ref DBName
      Engine: MySQL
      EngineVersion: !Ref EngineVersion
      DBInstanceClass: db.r5.large
      AllocatedStorage: !Ref AllocatedStorage
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DatabaseSecurityGroup.GroupId
      StorageType: io1
      Iops: !Ref Iops
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
    DeletionPolicy: Snapshot

Outputs:
  DBEndpointAddress:
    Description: 'RDS endpoint address'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  DBEndpointPort:
    Description: 'RDS endpoint port'
    Value: !GetAtt MySQLRDSInstance.Endpoint.Port