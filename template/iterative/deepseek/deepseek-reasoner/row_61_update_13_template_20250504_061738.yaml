AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a private Route53 Hosted Zone with dedicated VPC for www.example.com
Resources:
  InternalVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: InternalDNSVPC

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com.
      VPCs:
        - VPCId: !Ref InternalVPC
          VPCRegion: !Ref AWS::Region

Outputs:
  HostedZoneId:
    Description: ID of the created private hosted zone
    Value: !Ref PrivateHostedZone
  CreatedVpcId:
    Description: ID of the automatically created VPC
    Value: !Ref InternalVPC