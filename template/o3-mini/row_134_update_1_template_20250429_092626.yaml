AWSTemplateFormatVersion: '2010-09-09'
Description: A CloudFormation template that creates a Lambda function with inline Node.js code and an IAM role for CloudWatch Logs.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaLoggingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
                
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: BasicNodeFunction
      Handler: index.handler
      Runtime: nodejs14.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log("Received event:", JSON.stringify(event));
              return event.value;
          };
      Description: A basic Lambda function that logs the event and returns a value from the input.
      Timeout: 10

Outputs:
  LambdaFunctionARN:
    Description: ARN of the created Lambda function
    Value: !GetAtt LambdaFunction.Arn