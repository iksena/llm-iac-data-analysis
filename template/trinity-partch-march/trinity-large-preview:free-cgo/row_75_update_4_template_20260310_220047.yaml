AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: ''
    Description: Subnet ID for the EC2 instance (leave blank to use default VPC)
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: ''
    Description: VPC ID for the EC2 instance (leave blank to use default VPC)
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
    Description: EC2 KeyPair name (leave blank for no SSH access)

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: FIS-SSM-CloudWatch-EC2-Permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: '*'

  WindowsAMI:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
      Type: String
      Value: ami-0c55b159cbfafe1f0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !If [UseDefaultVPC, !Select [0, !GetAZs ''], !Ref SubnetId]
      UserData:
        Fn::Base64: |
          <script>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          netsh advfirewall set allprofiles state off
          </script>

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: CPU stress testing script
        parameters:
          duration:
            type: String
            description: Duration in seconds for CPU stress
            default: '60'
        mainSteps:
          - action: aws:runPowerShellScript
            name: runStressTest
            inputs:
              runCommand:
                - $duration = {{ duration }}
                - $logicalProcessors = [System.Environment]::ProcessorCount
                - $scriptBlock = {
                    param($duration)
                    $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
                    while ($stopwatch.Elapsed.TotalSeconds -lt $duration) {
                        # CPU intensive operation
                        $result = 1
                        for ($i = 0; $i -lt 1000000; $i++) {
                            $result *= $i
                        }
                    }
                  }
                - 1..$logicalProcessors | ForEach-Object {
                    Start-Job -ScriptBlock $scriptBlock -ArgumentList $duration
                  }
                - Get-Job | Wait-Job
                - Remove-Job *

Conditions:
  UseDefaultVPC: !Equals [!Ref VPCId, '']

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  SSMDocumentName:
    Description: Name of the SSM document for CPU stress testing
    Value: !Ref SSMDocument
  FISRoleArn:
    Description: ARN of the FIS role
    Value: !GetAtt FISRole.Arn