AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to launch an EC2 instance
  with the latest Amazon Linux 2 AMI and a security group permitting SSH access.

Parameters:
  InstanceType:
    Description: "EC2 Instance Type"
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: "Must be a valid EC2 instance type."
  KeyName:
    Description: "(Optional) Name of an existing EC2 KeyPair for SSH access."
    Type: AWS::EC2::KeyPair::KeyName
    Default: ""
    ConstraintDescription: "Must be an existing EC2 KeyPair if provided."

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security Group permitting SSH access to the EC2 instance."
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs}}"
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]

Outputs:
  InstanceId:
    Description: "The EC2 instance ID."
    Value: !Ref EC2Instance
  InstancePublicIP:
    Description: "The public IP address of the EC2 instance."
    Value: !GetAtt [EC2Instance, PublicIp]