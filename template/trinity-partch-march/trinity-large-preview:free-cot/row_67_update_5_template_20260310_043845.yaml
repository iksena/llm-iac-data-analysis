AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-Wide Access Support

Parameters:
  BucketName:
    Type: String
    Default: organization-access-bucket
    Description: Name of the S3 bucket to create (must be 3-63 characters, lowercase, numbers, hyphens, and periods only)
    MinLength: 3
    MaxLength: 63
    AllowedPattern: ^[a-z0-9][a-z0-9.-]*[a-z0-9]$
  OrganizationId:
    Type: String
    Default: ''
    Description: Organization ID for enterprise-wide access (e.g., o-xxxxxxxxxx)
  AccessLevel:
    Type: String
    Default: Private
    AllowedValues:
      - Private
      - Organization
      - Public
    Description: Access level for the S3 bucket

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasOrganizationAccess
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'

Conditions:
  HasOrganizationAccess: !Not [!Equals [!Ref OrganizationId, '']]

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn