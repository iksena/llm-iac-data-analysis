AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange pipeline for EDI X12_214 to JSON transformation

Parameters:
  ProfileName:
    Type: String
    Default: DefaultProfile
    Description: Name of the B2B profile
  ContactName:
    Type: String
    Default: Default Contact
    Description: Business contact name
  ContactEmail:
    Type: String
    Default: contact@example.com
    Description: Business contact email
  ContactPhone:
    Type: String
    Default: +1234567890
    Description: Business contact phone number
  InputBucketName:
    Type: String
    Default: edi-input-bucket
    Description: Name of the input S3 bucket for EDI files
  OutputBucketName:
    Type: String
    Default: json-output-bucket
    Description: Name of the output S3 bucket for JSON files

Resources:
  InputEDIBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  OutputJSONBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${InputEDIBucket}'
                  - !Sub 'arn:aws:s3:::${InputEDIBucket}/*'
                  - !Sub 'arn:aws:s3:::${OutputJSONBucket}'
                  - !Sub 'arn:aws:s3:::${OutputJSONBucket}/*'
        - PolicyName: LambdaVPCAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                Resource: '*'

  EDIParserLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: EDIParser214ToJSON
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  if bucket == os.environ['INPUT_BUCKET']:
                      edi_file = s3.get_object(Bucket=bucket, Key=key)
                      edi_content = edi_file['Body'].read().decode('utf-8')
                      json_content = parse_edi_to_json(edi_content)
                      output_key = key.replace('.edi', '.json')
                      s3.put_object(
                          Bucket=os.environ['OUTPUT_BUCKET'],
                          Key=output_key,
                          Body=json.dumps(json_content),
                          ContentType='application/json'
                      )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }

          def parse_edi_to_json(edi_content):
              # Simplified EDI parsing logic
              segments = edi_content.split('~')
              json_data = {}
              for segment in segments:
                  if segment.startswith('ST'):
                      json_data['transaction'] = segment
                  elif segment.startswith('B10'):
                      json_data['carrierDetails'] = segment
              return json_data

      Environment:
        Variables:
          INPUT_BUCKET: !Ref InputEDIBucket
          OUTPUT_BUCKET: !Ref OutputJSONBucket
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Select [0, !GetAZs !Ref 'AWS::Region']
          - !Select [1, !GetAZs !Ref 'AWS::Region']

  InputBucketTrigger:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt EDIParserLambda.Arn
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InputEDIBucket.Arn
      SourceAccount: !Ref 'AWS::AccountId'

  InputBucketNotification:
    Type: Custom::S3BucketNotification
    Properties:
      ServiceToken: !GetAtt NotificationLambda.Arn
      BucketName: !Ref InputEDIBucket
      NotificationConfiguration:
        LambdaFunctionConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .edi
            Function: !GetAtt EDIParserLambda.Arn

  NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      s3.put_bucket_notification_configuration(
                          Bucket=event['ResourceProperties']['BucketName'],
                          NotificationConfiguration=event['ResourceProperties']['NotificationConfiguration']
                      )
                  elif event['RequestType'] == 'Delete':
                      s3.put_bucket_notification_configuration(
                          Bucket=event['ResourceProperties']['BucketName'],
                          NotificationConfiguration={}
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Select [0, !GetAZs !Ref 'AWS::Region']
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0

  B2BIPipeline:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/b2bi/${ProfileName}/pipeline-config'
      Type: String
      Value: !Sub |
        {
          "profile": "${ProfileName}",
          "businessContact": {
            "name": "${ContactName}",
            "email": "${ContactEmail}",
            "phone": "${ContactPhone}"
          },
          "inputBucket": "${InputEDIBucket}",
          "outputBucket": "${OutputJSONBucket}",
          "transformer": {
            "type": "X12_214",
            "mappingLogic": {
              "ST": "transaction",
              "B10": "carrierDetails"
            }
          }
        }
      Description: B2B Data Interchange pipeline configuration

Outputs:
  InputBucketUrl:
    Description: URL of the input EDI bucket
    Value: !GetAtt InputEDIBucket.WebsiteURL
  OutputBucketUrl:
    Description: URL of the output JSON bucket
    Value: !GetAtt OutputJSONBucket.WebsiteURL