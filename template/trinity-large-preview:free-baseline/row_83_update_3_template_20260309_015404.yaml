AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Transit Gateway and share it via RAM

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-TGW

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: !Sub ${AWS::StackName}-TGW-Share
      AllowExternalPrincipals: false
      Principals:
        - 644519422710
      ResourceArns:
        - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-TGW-Share

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub ${AWS::StackName}-TGW-ID

  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref ResourceShare
    Export:
      Name: !Sub ${AWS::StackName}-TGW-Share-ID