AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: DynamoDBChangeEventBus

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Target:
        EventBridgeEventBusTarget:
          Arn: !GetAtt EventBridgeBus.Arn
      Enrichment: NONE
      FilterCriteria:
        Filters:
          - Source: "aws:dynamodb"
            Detail:
              OperationType:
                - "INSERT"
      RequiredCreateRolePolicies:
        - "events:PutEvents"

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Target:
        EventBridgeEventBusTarget:
          Arn: !GetAtt EventBridgeBus.Arn
      Enrichment: NONE
      FilterCriteria:
        Filters:
          - Source: "aws:dynamodb"
            Detail:
              OperationType:
                - "MODIFY"
      RequiredCreateRolePolicies:
        - "events:PutEvents"

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Bus Name
    Value: !Ref EventBridgeBus