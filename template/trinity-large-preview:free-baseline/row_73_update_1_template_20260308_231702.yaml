AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ECS cluster with Fargate and Fargate Spot capacity providers

Resources:
  ECSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AWS::StackName}-ECSCluster

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: Fargate
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Fargate

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FargateSpot
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-FargateSpot

  ECSDefaultCapacityProviderStrategy:
    Type: AWS::ECS::CapacityProviderStrategy
    Properties:
      Name: DefaultStrategy
      CapacityProviders:
        - Fargate
        - FargateSpot
      Weight: 1
      Base: 1

Outputs:
  ECSClusterArn:
    Description: The ARN of the ECS cluster
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ECSClusterArn

  FargateCapacityProviderArn:
    Description: The ARN of the Fargate capacity provider
    Value: !Ref FargateCapacityProvider
    Export:
      Name: !Sub ${AWS::StackName}-FargateCPArn

  FargateSpotCapacityProviderArn:
    Description: The ARN of the Fargate Spot capacity provider
    Value: !Ref FargateSpotCapacityProvider
    Export:
      Name: !Sub ${AWS::StackName}-FargateSpotCPArn