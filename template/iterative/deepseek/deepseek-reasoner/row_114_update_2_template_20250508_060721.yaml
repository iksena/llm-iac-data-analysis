AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CompanyName:
    Type: String
    Description: Name of the business organization
  ContactEmail:
    Type: String
    Description: Contact email for B2BI profile
  ContactPhone:
    Type: String
    Description: Contact phone number
  InputBucketName:
    Type: String
    Description: Name for raw EDI input bucket
  OutputBucketName:
    Type: String
    Description: Name for transformed JSON output bucket
  XslUrl:
    Type: String
    Description: S3 URL for XSLT mapping file (e.g., s3://bucket-name/key)

Resources:
  B2BIProfile:
    Type: AWS::B2BI::Profile
    Properties:
      Name: !Ref CompanyName
      Email: !Ref ContactEmail
      Phone: !Ref ContactPhone
      BusinessName: !Ref CompanyName
      Logging: ENABLED

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  B2BIS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${InputBucketName}/*
                  - !Sub arn:aws:s3:::${OutputBucketName}/*

  X12ToJSONTransformer:
    Type: AWS::B2BI::Transformer
    Properties:
      Name: X12_214_Transformer
      EdiType:
        X12:
          TransactionSet: 214
          Version: 004010
      FileFormat: X12
      MappingTemplate:
        XslUrl: !Ref XslUrl
      Status: active

Outputs:
  B2BIProfileARN:
    Value: !GetAtt B2BIProfile.ProfileArn
  TransformerARN:
    Value: !GetAtt X12ToJSONTransformer.TransformerArn
  InputBucketARN:
    Value: !GetAtt InputBucket.Arn
  OutputBucketName:
    Value: !Ref OutputBucket