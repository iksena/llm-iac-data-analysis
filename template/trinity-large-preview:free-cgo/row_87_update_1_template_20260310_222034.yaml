AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for S3 bucket for Lambda artifacts and KMS key for encryption

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${LambdaArtifactsBucket}/*'

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting Lambda artifacts
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow service role to use key
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      KeySpec: SYMMETRIC_DEFAULT

  LambdaArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKMSKey

Parameters:
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the KMS key

Outputs:
  LambdaArtifactsBucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
  LambdaArtifactsKMSKeyArn:
    Description: ARN of the KMS key for Lambda artifacts
    Value: !GetAtt LambdaArtifactsKMSKey.Arn