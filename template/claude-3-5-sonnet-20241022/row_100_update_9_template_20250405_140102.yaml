AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls'

Resources:
  BaselineMFAPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA requirement for IAM users
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            NotAction:
              - 'iam:ChangePassword'
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListUsers'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'false'

  PowerUserGroup:
    Type: AWS::IAM::Group
    Properties:
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/PowerUserAccess'

  ViewOnlyGroup:
    Type: AWS::IAM::Group
    Properties:
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/job-function/ViewOnlyAccess'

  CloudFormationServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSCloudFormationFullAccess'

Outputs:
  PowerUserGroupArn:
    Description: ARN of Power User Group
    Value: !GetAtt PowerUserGroup.Arn

  ViewOnlyGroupArn:
    Description: ARN of View Only Group
    Value: !GetAtt ViewOnlyGroup.Arn

  CloudFormationRoleArn:
    Description: ARN of CloudFormation Service Role
    Value: !GetAtt CloudFormationServiceRole.Arn