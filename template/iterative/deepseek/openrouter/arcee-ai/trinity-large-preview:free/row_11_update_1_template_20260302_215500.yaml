AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table for mobile notifications reporting with a global secondary index and TTL.

Parameters:
  TableName:
    Type: String
    Default: MobileNotifications
    Description: The name of the DynamoDB table
  TTLAttributeName:
    Type: String
    Default: ttl
    Description: The name of the attribute used for TTL
  GSITypeName:
    Type: String
    Default: type-index
    Description: The name of the global secondary index on type
  GSISentTimeName:
    Type: String
    Default: sentTime-index
    Description: The name of the global secondary index on sentTime

Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
        - AttributeName: !Ref TTLAttributeName
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: !Ref GSITypeName
          KeySchema:
            - AttributeName: type
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: !Ref GSISentTimeName
          KeySchema:
            - AttributeName: sentTime
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref MobileNotificationsTable