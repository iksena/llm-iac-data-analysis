AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an AWS Resource Group with tag-based filtering for multiple services'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name for resource tagging
  
  ProjectName:
    Type: String
    Description: Project name for resource tagging
    MinLength: 1
    MaxLength: 128
    Default: myproject

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-group'
      Description: !Sub 'Resource group for ${ProjectName} ${Environment} environment'
      Configuration:
        - Parameters:
            - Name: aws:resourcegroups:expression
              Values: 
                - !Sub '[{"ResourceTypeFilters":["AWS::AllSupported"],"TagFilters":[{"Key":"Environment","Values":["${Environment}"]},{"Key":"Project","Values":["${ProjectName}"]}]}]'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.Arn
  
  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ResourceGroup