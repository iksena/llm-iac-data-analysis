AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable URL-to-PNG Screenshot Service with Load Testing and S3/SQS Integration

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type for worker nodes
  S3BucketName:
    Type: String
    Default: screenshot-service-bucket
    Description: Name of the S3 bucket to store screenshots
  QueueName:
    Type: String
    Default: screenshot-queue
    Description: Name of the SQS queue for screenshot requests

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ScreenshotServiceVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ScreenshotServiceIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotServicePublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotServicePublicSubnet2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ScreenshotServiceRouteTable

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for screenshot workers
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ScreenshotServiceWorkerSG

  LoadTestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for load test instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ScreenshotServiceLoadTestSG

  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: ScreenshotServiceQueue

  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      Tags:
        - Key: Name
          Value: ScreenshotServiceBucket

  ScreenshotBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ScreenshotBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:PutObject
            Resource: !Join ['', ['arn:aws:s3:::', !Ref ScreenshotBucket, '/*']]

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
      Tags:
        - Key: Name
          Value: ScreenshotServiceEC2Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
      Tags:
        - Key: Name
          Value: ScreenshotServiceLambdaRole

  LoadTestFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Runtime: python3.12
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import random
          import time

          def handler(event, context):
              sqs = boto3.client('sqs')
              queue_url = event['queue_url']
              urls = [
                  'https://www.amazon.com',
                  'https://www.google.com',
                  'https://www.github.com',
                  'https://www.twitter.com',
                  'https://www.reddit.com'
              ]

              for _ in range(100):
                  url = random.choice(urls)
                  message = {
                      'url': url,
                      'timestamp': int(time.time())
                  }
                  sqs.send_message(
                      QueueUrl=queue_url,
                      MessageBody=str(message)
                  )
                  time.sleep(1)
      Tags:
        - Key: Name
          Value: ScreenshotServiceLoadTestFunction

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateName: ScreenshotServiceLaunchTemplate
        Version: '1'
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      TargetGroupARNs: []
      Tags:
        - Key: Name
          Value: ScreenshotServiceWorkerASG
          PropagateAtLaunch: true
      CreationPolicy:
        ResourceSignal:
          Count: 1
          Timeout: PT10M

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: ScreenshotServiceLaunchTemplate
      LaunchTemplateData:
        ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        SecurityGroupIds:
          - !Ref WorkerSecurityGroup
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            amazon-linux-extras install -y epel
            yum install -y chromium-browser nodejs npm
            npm install -g puppeteer
            echo "Installation complete" > /home/ec2-user/installation.log
            /opt/aws/bin/cfn-signal -e 0 -r "Instance setup complete" 'https://cloudformation-waitcondition-us-east-1.s3.amazonaws.com/...

  QueueDepthHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ScreenshotQueueDepthHigh
      AlarmDescription: Alarm when queue depth exceeds 50 messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Sum
      Period: 300
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Ref ScaleUpPolicy

  QueueDepthLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ScreenshotQueueDepthLow
      AlarmDescription: Alarm when queue depth falls below 5 messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Sum
      Period: 300
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      AlarmActions:
        - !Ref ScaleDownPolicy

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  ScreenshotServiceDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ScreenshotServiceDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", !GetAtt ScreenshotQueue.QueueName ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": !Ref "AWS::Region",
                "title": "SQS Queue Depth"
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization", "AutoScalingGroupName", !Ref AutoScalingGroup ]
                ],
                "period": 300,
                "stat": "Average",
                "region": !Ref "AWS::Region",
                "title": "Worker CPU Utilization"
              }
            }
          ]
        }

Outputs:
  ScreenshotBucketURL:
    Description: URL of the S3 bucket for screenshots
    Value: !GetAtt ScreenshotBucket.WebsiteURL
  QueueURL:
    Description: URL of the SQS queue
    Value: !Ref ScreenshotQueue