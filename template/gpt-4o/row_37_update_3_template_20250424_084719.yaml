AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure S3 bucket with server-side encryption,
  a replica bucket, and an access log bucket. Public access is disabled and secure
  transport is enforced.

Resources:
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: LogDeliveryWrite
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SecureS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: 'logs/'

  ReplicaS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SecureTransportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SecureS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceTLS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${SecureS3Bucket}/*'
              - !Sub 'arn:aws:s3:::${SecureS3Bucket}'
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  MainBucketName:
    Description: The name of the main secure S3 bucket
    Value: !Ref SecureS3Bucket

  ReplicaBucketName:
    Description: The name of the replica S3 bucket
    Value: !Ref ReplicaS3Bucket

  AccessLogBucketName:
    Description: The name of the access log S3 bucket
    Value: !Ref AccessLogBucket