AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating VPC, Security Group, S3 Bucket, and DynamoDB Table with deletion protection'

Parameters:
  EnvironmentName:
    Description: 'Environment name (dev/stage/prod)'
    Type: String
    Default: 'dev'
    AllowedValues: ['dev', 'stage', 'prod']
    ConstraintDescription: 'Must be dev, stage, or prod'

  VPCCidrBlock:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: 'Must be a valid CIDR range (x.x.x.x/y)'

  S3BucketNamePrefix:
    Description: 'Prefix for S3 bucket name (will append random string)'
    Type: String
    MinLength: 3
    MaxLength: 37
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Bucket name prefix can only contain lowercase letters, numbers, and hyphens'

  DynamoDBTableName:
    Description: 'Name for the DynamoDB table (3-255 chars)'
    Type: String
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '^[a-zA-Z0-9-._]+$'
    ConstraintDescription: 'Table name must be 3-255 chars, alphanumeric, hyphens, periods or underscores'

  ReadCapacityUnits:
    Description: 'Provisioned read capacity units for DynamoDB'
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000

  WriteCapacityUnits:
    Description: 'Provisioned write capacity units for DynamoDB'
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'
        - Key: Environment
          Value: !Ref EnvironmentName

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Default security group for VPC'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SecurityGroup'
        - Key: Environment
          Value: !Ref EnvironmentName

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${S3BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Bucket'
        - Key: Environment
          Value: !Ref EnvironmentName
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PROVISIONED
      AttributeDefinitions:
        - AttributeName: 'id'
          AttributeType: 'S'
      KeySchema:
        - AttributeName: 'id'
          KeyType: 'HASH'
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        SSEEnabled: true
      DeletionProtectionEnabled: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DynamoDBTable'
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  VPCId:
    Description: 'The ID of the created VPC'
    Value: !Ref VPC
  
  SecurityGroupId:
    Description: 'The ID of the created Security Group'
    Value: !Ref SecurityGroup
  
  S3BucketName:
    Description: 'The name of the created S3 bucket'
    Value: !Ref S3Bucket
  
  DynamoDBTableArn:
    Description: 'The ARN of the created DynamoDB table'
    Value: !GetAtt DynamoDBTable.Arn