AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Timestream Database and Tables with configurable retention policies. Four tables: poc-table-01-batch-write, poc-table-02-older-records-memonly, poc-table-03-older-records-magnetic, poc-table-04-common-attributes.'

Parameters:
  DatabaseName:
    Type: String
    Default: PocTimestreamDB
    AllowedPattern: '^[A-Za-z0-9''._-]{1,64}$'
    Description: Name of the Timestream database (1-64 chars: alphanumeric, _, -, ., ').
  Table01MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: Memory retention in hours for poc-table-01-batch-write (1-8760 hours).
  Table01MagneticDays:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 73000
    Description: Magnetic retention in days for poc-table-01-batch-write (0 disables).
  Table02MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: Memory retention in hours for poc-table-02-older-records-memonly (1-8760 hours).
  Table02MagneticDays:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 73000
    Description: Magnetic retention in days for poc-table-02-older-records-memonly (0 disables).
  Table03MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: Memory retention in hours for poc-table-03-older-records-magnetic (1-8760 hours).
  Table03MagneticDays:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 73000
    Description: Magnetic retention in days for poc-table-03-older-records-magnetic (~30 days).
  Table04MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: Memory retention in hours for poc-table-04-common-attributes (1-8760 hours).
  Table04MagneticDays:
    Type: Number
    Default: 365
    MinValue: 0
    MaxValue: 73000
    Description: Magnetic retention in days for poc-table-04-common-attributes (~1 year).

Resources:
  TimestreamDB:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  PocTable01BatchWrite:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table01MemoryHours
        MagneticStoreRetentionPeriodInDays: !Ref Table01MagneticDays

  PocTable02OlderRecordsMemonly:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table02MemoryHours
        MagneticStoreRetentionPeriodInDays: !Ref Table02MagneticDays

  PocTable03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table03MemoryHours
        MagneticStoreRetentionPeriodInDays: !Ref Table03MagneticDays

  PocTable04CommonAttributes:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table04MemoryHours
        MagneticStoreRetentionPeriodInDays: !Ref Table04MagneticDays

Outputs:
  DatabaseName:
    Description: Name of the Timestream database.
    Value: !Ref DatabaseName
  DatabaseArn:
    Description: ARN of the Timestream database.
    Value: !GetAtt TimestreamDB.Arn
  Table01Arn:
    Description: ARN of poc-table-01-batch-write.
    Value: !GetAtt PocTable01BatchWrite.Arn
  Table02Arn:
    Description: ARN of poc-table-02-older-records-memonly.
    Value: !GetAtt PocTable02OlderRecordsMemonly.Arn
  Table03Arn:
    Description: ARN of poc-table-03-older-records-magnetic.
    Value: !GetAtt PocTable03OlderRecordsMagnetic.Arn
  Table04Arn:
    Description: ARN of poc-table-04-common-attributes.
    Value: !GetAtt PocTable04CommonAttributes.Arn