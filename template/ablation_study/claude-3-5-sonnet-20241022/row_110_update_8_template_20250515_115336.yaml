AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Cross-account private API Gateway with Lambda integration and VPC endpoint access.
  Example parameters:
  VpcEndpointId: vpce-0123456789abcdef0
  CustomDomainName: api.example.com
  CertificateArn: arn:aws:acm:region:account:certificate/12345678-1234-1234-1234-123456789012
  HostedZoneId: Z2FDTNDATAQYW2

Parameters:
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues:
      - dev
      - test
      - prod
    Description: 'Environment name for resource naming'

  VpcEndpointId:
    Type: String
    Default: 'vpce-0123456789abcdef0'
    Description: 'VPC Endpoint ID for API access restriction'

  EnableCustomDomain:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Enable custom domain configuration'

  CustomDomainName:
    Type: String
    Default: 'api.example.com'
    Description: 'Custom domain name for the API (only required if EnableCustomDomain is true)'

  CertificateArn:
    Type: String
    Default: 'arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012'
    Description: 'ARN of ACM certificate for custom domain (only required if EnableCustomDomain is true)'

  HostedZoneId:
    Type: String
    Default: 'Z2FDTNDATAQYW2'
    Description: 'Route53 Hosted Zone ID (only required if EnableCustomDomain is true)'

  StageName:
    Type: String
    Default: 'v1'
    Description: 'Stage name for API deployment'
    AllowedPattern: '^[a-zA-Z0-9]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters'

Conditions:
  UseCustomDomain: !Equals [!Ref EnableCustomDomain, 'true']

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt BackendFunction.Arn

  BackendFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({
                message: 'Hello from private API',
                environment: process.env.ENVIRONMENT,
                timestamp: new Date().toISOString()
              })
            };
          };
      Runtime: nodejs18.x
      Timeout: 29
      MemorySize: 128
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment

  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-private-api-${Environment}'
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: execute-api:/*
            Condition:
              StringEquals:
                aws:SourceVpce: !Ref VpcEndpointId

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: 'api'
      RestApiId: !Ref PrivateApi

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !Ref ApiResource
      RestApiId: !Ref PrivateApi
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BackendFunction.Arn}/invocations'
        Credentials: !GetAtt ApiGatewayRole.Arn

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref PrivateApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref PrivateApi
      StageName: !Ref StageName

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*/api'

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: UseCustomDomain
    DependsOn: ApiStage
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref PrivateApi
      Stage: !Ref StageName

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Description: 'Private API Gateway endpoint URL'
    Value: !Sub 'https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api'

  CustomDomainUrl:
    Description: 'Custom Domain URL'
    Condition: UseCustomDomain
    Value: !Sub 'https://${CustomDomainName}/api'

  LambdaArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt BackendFunction.Arn

  ApiId:
    Description: 'API Gateway ID'
    Value: !Ref PrivateApi