AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with EventBridge for avatar URL change events

Parameters:
  TableName:
    Type: String
    Default: IntegrationTable
    Description: Name of the DynamoDB table
  PartitionKey:
    Type: String
    Default: id
    Description: Partition key for the DynamoDB table
  Source:
    Type: String
    Default: com.company.dynamodb
    Description: Source value for EventBridge events
  DetailType:
    Type: String
    Default: UserAvatarUpdate
    Description: DetailType value for EventBridge events

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKey
          AttributeType: S
      KeySchema:
        - AttributeName: !Ref PartitionKey
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgePipe:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${TableName}-EventBus

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${TableName}-PipeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt EventBridgePipe.Arn

  Rule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgePipe
      EventPattern:
        source:
          - !Ref Source
        detail:
          NewImage:
            avatarUrl:
              endsWith: [".png"]
      State: ENABLED
      Targets:
        - Arn: !GetAtt EventBridgePipe.Arn
          Id: TargetFunctionV1
          InputTransformer:
            InputPathsMap:
              detail: "$.detail"
            InputTemplate: |
              {
                "Source": <Source>,
                "DetailType": <DetailType>,
                "Detail": <detail>
              }

Outputs:
  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  DynamoDBStreamArn:
    Description: ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusArn:
    Description: ARN of the EventBridge bus
    Value: !GetAtt EventBridgePipe.Arn