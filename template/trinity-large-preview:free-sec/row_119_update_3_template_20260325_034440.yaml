AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis integration for real-time event streaming

Parameters:
  KinesisStreamName:
    Type: String
    Default: my-application-events-stream
    Description: Name of the Kinesis data stream
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  EventBusName:
    Type: String
    Default: my-application-event-bus
    Description: Name of the EventBridge event bus

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: kinesis:PutRecord
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn
    DependsOn: EventBus

Outputs:
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref EventBusName
  KinesisStreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt KinesisStream.Arn
  EventBridgeKinesisRoleArn:
    Description: IAM role ARN for EventBridge to Kinesis integration
    Value: !GetAtt EventBridgeKinesisRole.Arn