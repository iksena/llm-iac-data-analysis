AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Security Group
Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
  KeyName:
    Description: REQUIRED - Name of existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
  SSHLocation:
    Description: Allowed SSH IP range
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d+\.){3}\d+/\d+$'
  VpcId:
    Description: REQUIRED - VPC ID for security group
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: REQUIRED - Public subnet for EC2 instance
    Type: AWS::EC2::Subnet::Id

Mappings:
  AWSRegionAMI:
    us-east-1:
      AMIID: ami-0aa7d40eeae50c9b9
    us-west-2:
      AMIID: ami-0d70546e43a941d70
    eu-west-1:
      AMIID: ami-0d75513e7706cf2d9

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2-SSH-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSRegionAMI, !Ref "AWS::Region", AMIID]
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet:
            - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: CFN-EC2-Instance

Outputs:
  InstancePublicIP:
    Description: Public IP of EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  SecurityGroupId:
    Description: Created Security Group ID
    Value: !Ref SecurityGroup