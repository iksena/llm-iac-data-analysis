

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an encrypted One Zone EFS file system in us-east-1a'

Resources:
  EFSEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow EFS to use the key
            Effect: Allow
            Principal:
              Service: elasticfilesystem.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !Ref EFSEncryptionKey
      AvailabilityZoneName: us-east-1a
      BackupPolicy:
        Status: DISABLED
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemArn:
    Description: ARN of the EFS File System
    Value: !GetAtt FileSystem.Arn

  FileSystemDNS:
    Description: DNS name for the file system
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'