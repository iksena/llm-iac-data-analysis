AWSTemplateFormatVersion: '2010-09-09'
Description: Lab environment for EC2 instance scheduling automation with VPC, managed instances, and admin instance

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name used for resource naming and tagging
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues: [t3.nano, t3.micro, t3.small]
    Description: EC2 instance type for test instances
  AdminInstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.small, t3.medium]
    Description: EC2 instance type for admin instance

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMIID: ami-0c55b159cbfafe1f0
    us-west-2:
      AMIID: ami-0e472933a1395e172
    eu-west-1:
      AMIID: ami-0d729a60

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-VPC
        - Key: Environment
          Value: !Ref EnvironmentName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-IGW
        - Key: Environment
          Value: !Ref EnvironmentName

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-PublicSubnet
        - Key: Environment
          Value: !Ref EnvironmentName

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-RouteTable
        - Key: Environment
          Value: !Ref EnvironmentName

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-SchedulerLab-SG
      GroupDescription: Enable SSH access and unrestricted outbound
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-SG
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AWSCloudFormationReadOnlyAccess
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref AdminInstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Admin
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        yum install -y aws-cli jq
        pip install aws-instance-scheduler-cli
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

  TestInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Test1
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

  TestInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Test2
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

  TestInstance3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Test3
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

  TestInstance4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Test4
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

  TestInstance5:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMIID]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SchedulerLab-Test5
        - Key: Environment
          Value: !Ref EnvironmentName
      UserData: |
        #!/bin/bash
        yum update -y
        systemctl enable amazon-ssm-agent
        systemctl start amazon-ssm-agent

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnetId:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
  AdminInstanceId:
    Description: Admin Instance ID
    Value: !Ref AdminInstance
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
  AdminInstancePublicIP:
    Description: Public IP address of the admin instance
    Value: !GetAtt AdminInstance.PublicIp