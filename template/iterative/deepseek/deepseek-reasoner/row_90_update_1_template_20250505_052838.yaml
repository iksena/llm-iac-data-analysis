AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: OwnerEmail
          Value: u12345678@anu.edu.au

  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt LogsBucket.Arn
              - !Sub "${LogsBucket.Arn}/*"
          - Effect: Allow
            Action: s3:ListAllMyBuckets
            Resource: '*'

  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Ref S3AccessPolicy
      Policies:
        - PolicyName: ImageBuilderOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - imagebuilder:*
                  - ec2:CreateTags
                Resource: '*'

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ImageBuilderRole

Outputs:
  LogsBucketName:
    Value: !Ref LogsBucket
  ImageBuilderRoleARN:
    Value: !GetAtt ImageBuilderRole.Arn
  InstanceProfileARN:
    Value: !GetAtt ImageBuilderInstanceProfile.Arn