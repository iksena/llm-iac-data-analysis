AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven integration between DynamoDB streams and EventBridge using Pipes for avatar URL filtering'

Resources:
  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  UserEventsBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventsBus

  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBToEventBridgePipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                Resource: !GetAtt UserTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt UserEventsBus.Arn

  AvatarUpdatePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: AvatarUpdatePipe
      RoleArn: !GetAtt PipeExecutionRole.Arn
      Source: !GetAtt UserTable.StreamArn
      Target: !Ref UserEventsBus
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
        FilterCriteria:
          Filters:
            - Pattern: >
                {
                  "dynamodb": {
                    "NewImage": {
                      "avatarUrl": {
                        "S": [{ "suffix": ".png" }]
                      }
                    }
                  }
                }
      EnrichmentParameters: null
      InputTemplate: '{"Source": "com.example.users", "DetailType": "UserAvatarUpdate", "Detail": <$.dynamodb.NewImage>}'

Outputs:
  PipeName:
    Description: Name of the EventBridge Pipe
    Value: !Ref AvatarUpdatePipe
    Export:
      Name: AvatarUpdatePipeName
  EventBusName:
    Description: Name of the EventBridge custom bus
    Value: !Ref UserEventsBus
    Export:
      Name: UserEventsBusName
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref UserTable
    Export:
      Name: UsersTableName
  PipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt AvatarUpdatePipe.Arn
    Export:
      Name: AvatarUpdatePipeARN