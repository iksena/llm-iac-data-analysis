AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Anonymous Access

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: S3 bucket name for website hosting (will be prefixed with account ID)
  IdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Cognito Identity Pool name

Resources:
  # IAM Role for Lambda Execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::${AWS::AccountId}-${WebsiteBucketName}/*'

  # S3 Bucket for Static Website
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::AccountId}-${WebsiteBucketName}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
      Tags:
        - Key: Name
          Value: SlotMachineWebsiteBucket

  # S3 Bucket Policy for Public Access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${AWS::AccountId}-${WebsiteBucketName}/*'

  # Lambda Function for Slot Machine Logic
  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineLambda
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import random
          import os

          # Predefined card combinations
          CARDS = ['7', 'BAR', 'Cherry', 'Diamond', 'Lemon', 'Bell']
          WINNING_COMBINATIONS = {
              ('7', '7', '7'): 100,
              ('BAR', 'BAR', 'BAR'): 50,
              ('Cherry', 'Cherry', 'Cherry'): 25,
              ('Diamond', 'Diamond', 'Diamond'): 20,
              ('Lemon', 'Lemon', 'Lemon'): 15,
              ('Bell', 'Bell', 'Bell'): 10,
              ('7', '7', '*'): 5,
              ('BAR', 'BAR', '*'): 3
          }

          def lambda_handler(event, context):
              # Simulate slot spin
              result = [random.choice(CARDS) for _ in range(3)]
              win_amount = determine_win(result)

              response = {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'win': win_amount > 0,
                      'amount': win_amount
                  })
              }
              return response

          def determine_win(result):
              # Check for winning combinations
              for combo, payout in WINNING_COMBINATIONS.items():
                  if all(combo[i] == result[i] or combo[i] == '*' for i in range(3)):
                      return payout
              return 0

  # Custom Resource Lambda for Automated Deployment
  CustomResourceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineCustomResourceLambda
      Handler: index.handler
      Runtime: python3.12
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib.request
          import zipfile
          import io
          import os
          import logging

          # Configure logging
          logging.basicConfig(level=logging.INFO)
          logger = logging.getLogger()

          S3_CLIENT = boto3.client('s3')

          def handler(event, context):
              try:
                  logger.info(f"Received event: {json.dumps(event)}")
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      deploy_website(event['ResourceProperties'])
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Error occurred: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def deploy_website(properties):
              bucket_name = properties['BucketName']
              region = properties['Region']
              identity_pool_id = properties['IdentityPoolId']

              # Use embedded assets instead of external URL
              embedded_assets = {
                  'index.html': get_index_html(region, identity_pool_id),
                  'style.css': get_style_css(),
                  'script.js': get_script_js(region, identity_pool_id)
              }

              # Upload files to S3
              for file_name, content in embedded_assets.items():
                  S3_CLIENT.put_object(
                      Bucket=bucket_name,
                      Key=file_name,
                      Body=content,
                      ContentType=get_content_type(file_name)
                  )
              logger.info("Website deployment completed successfully")

          def get_index_html(region, identity_pool_id):
              return f'''<!DOCTYPE html>
              <html lang="en">
              <head>
                  <meta charset="UTF-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Slot Machine</title>
                  <link rel="stylesheet" href="style.css">
              </head>
              <body>
                  <div class="container">
                      <h1>Slot Machine</h1>
                      <div id="slot-machine">
                          <div class="slot" id="slot1">?</div>
                          <div class="slot" id="slot2">?</div>
                          <div class="slot" id="slot3">?</div>
                      </div>
                      <button id="spin-btn">Spin!</button>
                      <div id="result"></div>
                  </div>
                  <script>
                      const region = '{region}';
                      const identityPoolId = '{identity_pool_id}';
                      const lambdaArn = 'arn:aws:lambda:{region}:{aws_account_id}:function:SlotMachineLambda';
                  </script>
                  <script src="script.js"></script>
              </body>
              </html>'''

          def get_style_css():
              return '''body {
                  font-family: Arial, sans-serif;
                  background-color: #333;
                  color: white;
                  text-align: center;
              }
              .container {
                  margin: 50px auto;
                  max-width: 600px;
              }
              .slot {
                  display: inline-block;
                  width: 100px;
                  height: 100px;
                  margin: 10px;
                  background-color: #444;
                  border: 2px solid #fff;
                  font-size: 24px;
                  line-height: 100px;
                  border-radius: 10px;
              }
              #spin-btn {
                  background-color: #4CAF50;
                  color: white;
                  padding: 15px 32px;
                  text-align: center;
                  text-decoration: none;
                  display: inline-block;
                  font-size: 16px;
                  margin: 4px 2px;
                  cursor: pointer;
                  border: none;
                  border-radius: 5px;
              }
              #spin-btn:hover {
                  background-color: #45a049;
              }
              #result {
                  margin-top: 20px;
                  font-size: 18px;
              }'''

          def get_script_js(region, identity_pool_id):
              return f'''document.getElementById('spin-btn').addEventListener('click', async () => {
                  const slots = document.querySelectorAll('.slot');
                  slots.forEach(slot => slot.textContent = '?');

                  // Simulate loading
                  await new Promise(resolve => setTimeout(resolve, 1000));

                  try {
                      const response = await fetch(`https://lambda.{region}.amazonaws.com/2015-03-31/functions/SlotMachineLambda/invocations`, {
                          method: 'POST',
                          headers: {
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({})
                      });

                      const result = await response.json();
                      const [slot1, slot2, slot3] = result.result;

                      document.getElementById('slot1').textContent = slot1;
                      document.getElementById('slot2').textContent = slot2;
                      document.getElementById('slot3').textContent = slot3;

                      const resultDiv = document.getElementById('result');
                      if (result.win) {
                          resultDiv.textContent = `You won ${result.amount} points!`;
                          resultDiv.style.color = 'gold';
                      } else {
                          resultDiv.textContent = 'Try again!';
                          resultDiv.style.color = 'red';
                      }
                  } catch (error) {
                      console.error('Error:', error);
                      document.getElementById('result').textContent = 'Error occurred. Please try again.';
                  }
              });'''

          def get_content_type(file_name):
              if file_name.endswith('.html'):
                  return 'text/html'
              elif file_name.endswith('.css'):
                  return 'text/css'
              elif file_name.endswith('.js'):
                  return 'application/javascript'
              else:
                  return 'application/octet-stream'

  # Custom Resource for Automated Deployment
  WebsiteDeployment:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt CustomResourceLambda.Arn
      BucketName: !Sub '${AWS::AccountId}-${WebsiteBucketName}'
      Region: !Ref AWS::Region
      IdentityPoolId: !Ref CognitoIdentityPool

  # Cognito Identity Pool
  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: true

  # IAM Role for Unauthenticated Users
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CognitoUnauthRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: LambdaInvocationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  # Lambda Resource-based Policy for Cognito Access
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: cognito-identity.amazonaws.com
      FunctionName: !GetAtt SlotMachineLambda.Arn
      SourceArn: !GetAtt SlotMachineLambda.Arn

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the deployed slot machine website
  IdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: Cognito Identity Pool ID for frontend configuration
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineLambda.Arn
    Description: ARN of the Slot Machine Lambda function