AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-threshold AWS Billing Alarms with CloudWatch and SNS

Parameters:
  EmailAddress:
    Type: String
    Default: default@example.com
    Description: Email address to receive billing alerts

Resources:
  BillingAlarmsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Billing Alarms
      TopicName: BillingAlarmsTopic

  BillingAlarmsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref BillingAlarmsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.amazonaws.com
            Action: sns:Publish
            Resource: !Ref BillingAlarmsTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref BillingAlarmsTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-$5
      AlarmDescription: Alarm when estimated charges exceed $5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmsTopic
      TreatMissingData: breaching

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-$10
      AlarmDescription: Alarm when estimated charges exceed $10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmsTopic
      TreatMissingData: breaching

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-$20
      AlarmDescription: Alarm when estimated charges exceed $20
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmsTopic
      TreatMissingData: breaching

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BillingAlarm-$40
      AlarmDescription: Alarm when estimated charges exceed $40
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmsTopic
      TreatMissingData: breaching

Outputs:
  BillingAlarmsTopicArn:
    Description: ARN of the billing alarms SNS topic
    Value: !Ref BillingAlarmsTopic