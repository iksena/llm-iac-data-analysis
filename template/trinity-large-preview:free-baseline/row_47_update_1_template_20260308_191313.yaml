AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for EC2 instances with read-only access to IAM metadata

Resources:
  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2IAMReadOnlyRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: IAMReadOnlyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:GetRole
                  - iam:ListPolicies
                  - iam:GetPolicy
                  - iam:ListUsers
                  - iam:GetUser
                  - iam:ListGroups
                  - iam:GetGroup
                  - iam:ListInstanceProfiles
                  - iam:GetInstanceProfile
                  - iam:ListAttachedRolePolicies
                  - iam:ListAttachedUserPolicies
                  - iam:ListAttachedGroupPolicies
                Resource: '*'

  EC2IAMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: EC2IAMReadOnlyInstanceProfile
      Roles:
        - !Ref EC2IAMReadOnlyRole

Outputs:
  IAMRoleArn:
    Description: ARN of the IAM Role created
    Value: !GetAtt EC2IAMReadOnlyRole.Arn