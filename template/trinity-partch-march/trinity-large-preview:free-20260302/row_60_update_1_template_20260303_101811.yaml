AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS KMS Key with an Alias for centralized encryption management.

Parameters:
  KeyDescription:
    Type: String
    Description: Description for the KMS Key
    Default: 'Centralized encryption key'
  AliasName:
    Type: String
    Description: Alias name for the KMS Key
    Default: 'alias/centralized-encryption-key'

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KeyDescription
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref AliasName
      TargetKeyId: !Ref KMSKey

Outputs:
  KeyId:
    Description: The ID of the created KMS Key
    Value: !Ref KMSKey
  AliasName:
    Description: The alias name of the KMS Key
    Value: !Ref AliasName