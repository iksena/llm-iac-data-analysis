AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a secure REST API Gateway integrated with DynamoDB for music data management

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: The stage name for the API Gateway
  ApiKeyName:
    Type: String
    Default: music-api-key
    Description: The name of the API key
  RateLimit:
    Type: Number
    Default: 100
    Description: The rate limit (requests per second) for the usage plan
  BurstLimit:
    Type: Number
    Default: 5
    Description: The burst limit (maximum concurrent requests) for the usage plan

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  MusicLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  MusicLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt MusicLambdaRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('Music')

          def handler(event, context):
              if event['httpMethod'] == 'POST':
                  data = json.loads(event['body'])
                  artist = data.get('artist')
                  album = data.get('album')
                  if not artist or not album:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Missing artist or album'})
                      }
                  table.put_item(Item={'Artist': artist, 'Album': album})
                  return {
                      'statusCode': 201,
                      'body': json.dumps({'message': 'Music added successfully'})
                  }
              elif event['httpMethod'] == 'GET':
                  artist = event['queryStringParameters'].get('artist')
                  if not artist:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Missing artist parameter'})
                      }
                  response = table.query(
                      IndexName='Artist-Index',
                      KeyConditionExpression=Key('Artist').eq(artist)
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response['Items'])
                  }
              else:
                  return {
                      'statusCode': 405,
                      'body': json.dumps({'error': 'Method not allowed'})
                  }

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi
      Description: API for managing music data

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: music

  ApiGatewayPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt MusicLambdaFunction.Arn

  ApiGatewayGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt MusicLambdaFunction.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayPostMethod
      - ApiGatewayGetMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: !Ref StageName

  ApiGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: MusicUsagePlan
      ApiStages:
        - ApiId: !Ref ApiGatewayRestApi
          Stage: !Ref StageName
      Throttle:
        RateLimit: !Ref RateLimit
        BurstLimit: !Ref BurstLimit

  ApiGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: !Ref ApiKeyName
      Enabled: true

  ApiGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiGatewayApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ApiGatewayUsagePlan

  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt MusicLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiId}/*/*/*
          - apiId: !Ref ApiGatewayRestApi

Outputs:
  ApiEndpoint:
    Description: The endpoint URL of the API Gateway
    Value: !Sub
      - https://${apiId}.execute-api.${AWS::Region}.amazonaws.com/${stage}
        - apiId: !Ref ApiGatewayRestApi
          stage: !Ref StageName
  ApiKey:
    Description: The API key for authentication
    Value: !Ref ApiGatewayApiKey
  MusicTableName:
    Description: The name of the DynamoDB table
    Value: !Ref MusicTable