AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create a KMS Key with an Alias for centralized encryption management.

Resources:
  MyKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Key for centralized encryption management
      Enabled: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: 'kms:*'
            Resource: '*'

  MyKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/my-centralized-key
      TargetKeyId: !Ref MyKMSKey

Outputs:
  KeyId:
    Description: The ID of the KMS Key
    Value: !Ref MyKMSKey
    Export:
      Name: MyKMSKeyId

  AliasArn:
    Description: The ARN of the KMS Alias
    Value: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/my-centralized-key
    Export:
      Name: MyKMSAliasArn