AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated AWS Security Hub controls management

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  DisableFoundationalBestPractices:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  PermissionsBoundaryArn:
    Type: String
    Default: ''
  LogRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: ''
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: ''
  DeadLetterQueueArn:
    Type: String
    Default: ''
  KmsKeyId:
    Type: String
    Default: ''
  ReservedConcurrentExecutions:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 1000

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:Describe*
                  - securityhub:Get*
                  - securityhub:List*
                  - securityhub:Update*
                  - securityhub:BatchUpdateSecurityControls
                Resource: '*'
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${AWS::AccountId}-securityhub-config/*'

  SecurityHubLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')
              controls_to_disable = []

              if event['DisableCIS140Controls'].lower() == 'true':
                  controls_to_disable.extend(['CIS.1.1', 'CIS.1.2', 'CIS.1.3'])  # Example CIS controls

              if event['DisableFoundationalBestPractices'].lower() == 'true':
                  controls_to_disable.extend(['AWS-FSBP-1', 'AWS-FSBP-2'])  # Example Foundational controls

              for control in controls_to_disable:
                  try:
                      securityhub.batch_update_security_controls(
                          SecurityControlUpdates=[
                              {
                                  'SecurityControlId': control,
                                  'ControlStatus': 'DISABLED'
                              }
                          ]
                      )
                  except ClientError as e:
                      print(f"Failed to disable control {control}: {e}")

              return {
                  'statusCode': 200,
                  'body': json.dumps('Security Hub controls updated successfully')
              }
      Environment:
        Variables:
          DisableCIS140Controls: !Ref DisableCIS140Controls
          DisableFoundationalBestPractices: !Ref DisableFoundationalBestPractices
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroup
        SubnetIds: !Ref SubnetIds
      DeadLetterConfig:
        TargetArn: !Ref DeadLetterQueueArn
      KmsKeyArn: !If [HasKmsKey, !Ref KmsKeyId, !Ref 'AWS::NoValue']
      ReservedConcurrentExecutions: !Ref ReservedConcurrentExecutions

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !If [HasKmsKey, !Ref KmsKeyId, !Ref 'AWS::NoValue']

  SecurityHubControlSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 day)
      Targets:
        - Arn: !GetAtt SecurityHubLambdaFunction.Arn
          Id: SecurityHubLambdaTarget
          Input: !Sub |
            {
              "DisableCIS140Controls": "${DisableCIS140Controls}",
              "DisableFoundationalBestPractices": "${DisableFoundationalBestPractices}"
            }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SecurityHubLambdaFunction.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SecurityHubControlSchedule.Arn

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda security group
      VpcId: !If [HasVpc, !Ref VpcId, !Ref 'AWS::NoValue']

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, '']]
  HasKmsKey: !Not [!Equals [!Ref KmsKeyId, '']]
  HasVpc: !Not [!Equals [!Ref VpcId, '']]

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SecurityHubLambdaFunction.Arn
  LogGroupName:
    Description: CloudWatch Log Group name
    Value: !Ref LambdaLogGroup