AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM Automation for Nginx Deployment

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'arn:aws:ssm:${AWS::Region}:amazon/linux-2/latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
      Tags:
        - Key: nginx
          Value: Yes

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP/HTTPS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Install Nginx and validate web server
        parameters: {}
        mainSteps:
          - name: updateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo shutdown -r now
            timeoutSeconds: 300
          - name: installNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo amazon-linux-extras install nginx1 -y
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
            timeoutSeconds: 300
          - name: validateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/
              timeoutSeconds: 60

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMAutomationDocument
      Targets:
        - Key: ResourceTag/nginx
          Values:
            - Yes

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  SSMDocumentArn:
    Description: SSM Automation Document ARN
    Value: !Ref SSMAutomationDocument