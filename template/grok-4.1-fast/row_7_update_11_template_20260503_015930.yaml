AWSTemplateFormatVersion: '2010-09-09'
Description: 'Basic EC2 t3.micro instance with SSM for secure remote management - fully standalone'

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c55b159cbfafe1de
    us-east-2:
      AMI: ami-0a313d6098716f372
    us-west-1:
      AMI: ami-0bdb828fd58c522ec
    us-west-2:
      AMI: ami-0d5d9d301c853a04a
    eu-west-1:
      AMI: ami-0c8b9f713e163a5e1
    eu-central-1:
      AMI: ami-0e01e5d1ed7e3b1b9
    ap-southeast-1:
      AMI: ami-0f5d12d98bfd55121
    ap-southeast-2:
      AMI: ami-0b2c68468b0df452c
    ca-central-1:
      AMI: ami-0d3d77fd7169a0e5b

Resources:
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: SSMRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SSMVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SSMInternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: SSMPublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: SSMPublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
    DependsOn: VPCGatewayAttachment

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Minimal security group for SSM-managed EC2 instance (no inbound ports)'
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: SSMInstanceSG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      InstanceType: t3.micro
      IamInstanceProfile: !Ref SSMInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: SSMEC2Instance

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref EC2Instance
  PrivateIpAddress:
    Description: 'Private IP of the instance'
    Value: !GetAtt EC2Instance.PrivateIp
  PublicIpAddress:
    Description: 'Public IP of the instance'
    Value: !GetAtt EC2Instance.PublicIp
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup
  VpcId:
    Description: 'VPC ID'
    Value: !Ref VPC
  SubnetId:
    Description: 'Subnet ID'
    Value: !Ref PublicSubnet