AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
  BackupEnabled:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
  BackupSchedule:
    Type: String
    Default: 'cron(0 0 * * ? *)'
    Description: CRON schedule for automated backups (UTC)
  VPC:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
  BurstCreditBalanceThreshold:
    Type: Number
    Default: 1000000000
    Description: Burst credit balance threshold (in bytes)
  PercentIOLimitThreshold:
    Type: Number
    Default: 80
    Description: Percent IO limit threshold (%)

Resources:
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      Encrypted: true
      BackupPolicy:
        Status: !If [BackupEnabled, ENABLED, DISABLED]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs
        - Key: Environment
          Value: !Ref Environment
        - Key: BackupEnabled
          Value: !Ref BackupEnabled

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [0, !GetAZs '']
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [1, !GetAZs '']
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTarget3:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [2, !GetAZs '']
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VPC.CidrBlock

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: BackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-efs-backup-plan
        Rules:
          - RuleName: DailyBackup
            TargetBackupVaultName: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: BackupEnabled
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-efs-backup-vault

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: BackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSFileSystemSelection
      IamRoleArn: !GetAtt BackupRole.Arn
      Resources:
        - !Sub arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${FileSystem}

  BackupRole:
    Type: AWS::IAM::Role
    Condition: BackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-BurstCreditBalanceLow
      AlarmDescription: EFS burst credit balance is low
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref BurstCreditBalanceThreshold
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  PercentIOLimitAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-PercentIOLimitHigh
      AlarmDescription: EFS percent IO limit is high
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref PercentIOLimitThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Conditions:
  BackupEnabled: !Equals [!Ref BackupEnabled, 'true']

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem
  FileSystemArn:
    Description: EFS File System ARN
    Value: !GetAtt FileSystem.Arn
  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !GetAtt FileSystem.DNSName
  MountTargetSecurityGroup:
    Description: Security Group for EFS Mount Targets
    Value: !GetAtt MountTargetSecurityGroup.GroupId