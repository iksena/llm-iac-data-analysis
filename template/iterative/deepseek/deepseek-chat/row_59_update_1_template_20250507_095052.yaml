AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with throughput monitoring'

Parameters:
  KinesisStreamName:
    Type: String
    Description: 'Name of the Kinesis Data Stream'
    Default: 'MyDataStream'
  
  ShardCount:
    Type: Number
    Description: 'Number of shards for the Kinesis stream'
    Default: 1
    MinValue: 1
    MaxValue: 500
  
  RetentionPeriodHours:
    Type: Number
    Description: 'Data retention period in hours'
    Default: 24
    MinValue: 24
    MaxValue: 8760
  
  AlarmEmail:
    Type: String
    Description: 'Email address to receive throughput alerts'
  
  ReadThroughputThreshold:
    Type: Number
    Description: 'Threshold for read throughput alarm (percentage)'
    Default: 80
    MinValue: 1
    MaxValue: 100
  
  WriteThroughputThreshold:
    Type: Number
    Description: 'Threshold for write throughput alarm (percentage)'
    Default: 80
    MinValue: 1
    MaxValue: 100

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 'Kinesis Throughput Alarms'
      TopicName: 'KinesisThroughputAlarms'

  AlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref AlarmEmail
      Protocol: email
      TopicArn: !Ref AlarmSNSTopic

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${KinesisStreamName}-ReadThroughputExceeded'
      AlarmDescription: 'Alarm when Kinesis read throughput exceeds threshold'
      Namespace: 'AWS/Kinesis'
      MetricName: 'ReadProvisionedThroughputExceeded'
      Dimensions:
        - Name: 'StreamName'
          Value: !Ref KinesisStreamName
      Statistic: 'Sum'
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref ReadThroughputThreshold
      ComparisonOperator: 'GreaterThanThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref AlarmSNSTopic

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${KinesisStreamName}-WriteThroughputExceeded'
      AlarmDescription: 'Alarm when Kinesis write throughput exceeds threshold'
      Namespace: 'AWS/Kinesis'
      MetricName: 'WriteProvisionedThroughputExceeded'
      Dimensions:
        - Name: 'StreamName'
          Value: !Ref KinesisStreamName
      Statistic: 'Sum'
      Period: 60
      EvaluationPeriods: 1
      Threshold: !Ref WriteThroughputThreshold
      ComparisonOperator: 'GreaterThanThreshold'
      TreatMissingData: 'notBreaching'
      AlarmActions:
        - !Ref AlarmSNSTopic

Outputs:
  KinesisStreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisDataStream.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KinesisStreamARN'

  SNSTopicARN:
    Description: 'ARN of the SNS Topic for alarms'
    Value: !Ref AlarmSNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicARN'