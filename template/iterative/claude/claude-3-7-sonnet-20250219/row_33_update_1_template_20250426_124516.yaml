AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates two IAM roles for EC2 instances with read-only access to IAM metadata'

Resources:
  IAMReadOnlyRole1:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'EC2-IAMReadOnlyRole1'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/IAMReadOnlyAccess'
      Path: '/'
      Description: 'Role for EC2 instances to read IAM metadata'

  IAMReadOnlyRole2:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'EC2-IAMReadOnlyRole2'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/IAMReadOnlyAccess'
      Path: '/'
      Description: 'Role for EC2 instances to read IAM metadata'

  IAMReadOnlyInstanceProfile1:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: 'EC2-IAMReadOnlyInstanceProfile1'
      Path: '/'
      Roles:
        - !Ref IAMReadOnlyRole1

  IAMReadOnlyInstanceProfile2:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: 'EC2-IAMReadOnlyInstanceProfile2'
      Path: '/'
      Roles:
        - !Ref IAMReadOnlyRole2

Outputs:
  IAMReadOnlyRole1ARN:
    Description: 'ARN of the first IAM role with read-only access to IAM metadata'
    Value: !GetAtt IAMReadOnlyRole1.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMReadOnlyRole1ARN'

  IAMReadOnlyRole2ARN:
    Description: 'ARN of the second IAM role with read-only access to IAM metadata'
    Value: !GetAtt IAMReadOnlyRole2.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMReadOnlyRole2ARN'

  IAMReadOnlyInstanceProfile1ARN:
    Description: 'ARN of the first instance profile for EC2 instances'
    Value: !GetAtt IAMReadOnlyInstanceProfile1.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMReadOnlyInstanceProfile1ARN'

  IAMReadOnlyInstanceProfile2ARN:
    Description: 'ARN of the second instance profile for EC2 instances'
    Value: !GetAtt IAMReadOnlyInstanceProfile2.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMReadOnlyInstanceProfile2ARN'