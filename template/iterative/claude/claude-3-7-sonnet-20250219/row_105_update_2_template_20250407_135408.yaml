AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an IAM role for cross-service automation workflows, centralizing permissions for Systems Manager (SSM), EC2, and monitoring tools.'

Parameters:
  RoleName:
    Type: String
    Default: CrossServiceAutomationRole
    Description: Name of the IAM role to be created
  
  EnableEC2Access:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable EC2 access for the role
  
  EnableSSMAccess:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable Systems Manager access for the role
  
  EnableMonitoringAccess:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable CloudWatch monitoring access for the role

Conditions:
  EC2AccessEnabled: !Equals [!Ref EnableEC2Access, 'true']
  SSMAccessEnabled: !Equals [!Ref EnableSSMAccess, 'true']
  MonitoringAccessEnabled: !Equals [!Ref EnableMonitoringAccess, 'true']

Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
                - lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns: 
        - !If [EC2AccessEnabled, 'arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess', !Ref 'AWS::NoValue']
      Path: /
      Tags:
        - Key: Purpose
          Value: CrossServiceAutomation

  EC2ManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EC2AccessEnabled
    Properties:
      Description: Managed policy for EC2 access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
            Resource: '*'
      Roles:
        - !Ref CrossServiceAutomationRole

  SSMManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: SSMAccessEnabled
    Properties:
      Description: Managed policy for SSM access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ssm:GetParameter'
              - 'ssm:GetParameters'
              - 'ssm:GetParametersByPath'
              - 'ssm:PutParameter'
              - 'ssm:DeleteParameter'
              - 'ssm:DeleteParameters'
              - 'ssm:StartAutomationExecution'
              - 'ssm:GetAutomationExecution'
              - 'ssm:DescribeAutomationExecutions'
              - 'ssm:SendCommand'
              - 'ssm:ListCommands'
              - 'ssm:ListCommandInvocations'
              - 'ssm:GetCommandInvocation'
            Resource: '*'
      Roles:
        - !Ref CrossServiceAutomationRole

  MonitoringManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: MonitoringAccessEnabled
    Properties:
      Description: Managed policy for monitoring access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudwatch:PutMetricData'
              - 'cloudwatch:GetMetricData'
              - 'cloudwatch:GetMetricStatistics'
              - 'cloudwatch:ListMetrics'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogStreams'
              - 'logs:DescribeLogGroups'
            Resource: 
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ssm/*'
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ec2/*'
      Roles:
        - !Ref CrossServiceAutomationRole

Outputs:
  RoleARN:
    Description: ARN of the created IAM role
    Value: !GetAtt CrossServiceAutomationRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleARN"
  
  RoleName:
    Description: Name of the created IAM role
    Value: !Ref CrossServiceAutomationRole
    Export:
      Name: !Sub "${AWS::StackName}-RoleName"