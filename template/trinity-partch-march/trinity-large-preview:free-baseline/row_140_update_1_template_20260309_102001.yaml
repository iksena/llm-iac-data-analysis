AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Calculator Workflow using Step Functions and Lambda

Resources:
  CalculatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt CalculatorFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          import operator

          def handler(event, context):
              try:
                  operator = event.get('operator')
                  operands = event.get('operands', [])

                  if not operator or not operands:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Missing operator or operands'})
                      }

                  operations = {
                      'add': lambda x, y: x + y,
                      'subtract': lambda x, y: x - y,
                      'multiply': lambda x, y: x * y,
                      'divide': lambda x, y: x / y if y != 0 else 'Division by zero error'
                  }

                  if operator not in operations:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Unsupported operator'})
                      }

                  result = operations[operator](*operands)
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'result': result})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128

  CalculatorFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CalculatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CalculatorFunction}"
      RetentionInDays: 3

  CalculatorStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      DefinitionString: !Sub |
        {
          "StartAt": "Calculate",
          "States": {
            "Calculate": {
              "Type": "Task",
              "Resource": "${CalculatorFunction.Arn}",
              "ResultPath": "$.result",
              "End": true
            }
          }
        }
      RoleArn: !GetAtt StateMachineRole.Arn

  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - states.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSStepFunctionsFullAccess