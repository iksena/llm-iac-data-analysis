AWSTemplateFormatVersion: '2010-09-09'
Description: Cross-account private API Gateway with Lambda backend and custom domain

Parameters:
  VpcEndpointId:
    Type: String
    Default: vpce-1234567890abcdef0
    Description: VPC endpoint ID for private API access
  CustomDomainName:
    Type: String
    Default: api.example.com
    Description: Custom domain name for the API
  StageName:
    Type: String
    Default: prod
    Description: API deployment stage name

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from private API'
              }

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt LambdaFunction.Arn

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: PrivateApi
      ProtocolType: HTTP
      DisableExecuteApiEndpoint: true
      RouteSelectionExpression: '$request.method $request.path'

  ApiGatewayVpcConfig:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: PrivateApiVpcLink
      SubnetIds:
        - !Select [0, !GetAZs '']
      SecurityGroupIds:
        - !Ref SecurityGroup

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for private API
      VpcId: !ImportValue VPCId

  ApiGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      ConnectionType: VPC_LINK
      ConnectionId: !Ref ApiGatewayVpcConfig

  ApiGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'ANY /'
      Target: !Join
        - '/'
        - - integrations
          - !Ref ApiGatewayIntegration

  ApiGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: !Ref StageName
      AutoDeploy: true

  CustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL

  ApiGatewayMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      ApiId: !Ref ApiGateway
      DomainName: !Ref CustomDomain
      Stage: !Ref StageName

  ApiGatewayAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ApiGatewayAccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: execute-api:Invoke
            Resource: !Sub 'arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'
      Roles:
        - !Ref ApiGatewayRole

Outputs:
  ApiGatewayUrl:
    Description: Private API Gateway URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}'
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub 'https://${CustomDomainName}'