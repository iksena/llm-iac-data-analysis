AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: cloudtrail_logs_db
        Description: Database for CloudTrail logs metadata

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail_crawler
      Role: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/AWSGlueServiceRoleDefault'
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      Configuration: '{"Version":1.0,"Grouping": {"TableGroupingPolicy": "CombineCompatibleSchemas"}}'

Outputs:
  DatabaseName:
    Description: Name of the Glue Database
    Value: !Ref CloudTrailDatabase
  CrawlerName:
    Description: Name of the Glue Crawler
    Value: !Ref CloudTrailCrawler