AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an environment-specific DynamoDB table for storing
  supporter product data with configurations for production (PROD) and non-production (CODE).

Parameters:
  Stage:
    Description: "The deployment stage. Use 'PROD' for production and 'CODE' for non-production environments."
    Type: String
    AllowedValues:
      - PROD
      - CODE
    Default: CODE

Conditions:
  IsProd: !Equals [ !Ref Stage, "PROD" ]

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Join [ "-", [ "SupporterProductData", !Ref Stage ] ]
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !If [ IsProd, "PROVISIONED", "PAY_PER_REQUEST" ]
      ProvisionedThroughput: !If
        - IsProd
        - { ReadCapacityUnits: 20, WriteCapacityUnits: 5 }
        - !Ref "AWS::NoValue"
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Backup
          Value: Enabled

  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - application-autoscaling.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: DynamoDBAutoScalingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:SetAlarmState
                  - cloudwatch:DeleteAlarms
                Resource: "*"      
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                Resource: !GetAtt SupporterProductDataTable.Arn

  DynamoDBWriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: 500
      MinCapacity: 5
      ResourceId: !Join [ "/", [ "table", !Ref SupporterProductDataTable ] ]
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  DynamoDBWriteCapacityScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: DynamoDBWriteCapacityScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref DynamoDBWriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
        ScaleInCooldown: 60
        ScaleOutCooldown: 60

Outputs:
  TableName:
    Description: "The name of the DynamoDB table."
    Value: !Ref SupporterProductDataTable
  TableArn:
    Description: "The ARN of the DynamoDB table."
    Value: !GetAtt SupporterProductDataTable.Arn