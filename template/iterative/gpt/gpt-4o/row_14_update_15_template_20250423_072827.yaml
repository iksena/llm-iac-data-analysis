AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a VPC, Subnet, ENI with two Elastic IPs (EIPs) and secondary private IPs.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MyInternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MySubnet

  MyRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: MyRouteTable

  MyRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref MyRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MyInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MySubnet
      RouteTableId: !Ref MyRouteTable

  MyENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref MySubnet
      Description: ENI with multiple IPs
      SecondaryPrivateIpAddressCount: 2
      Tags:
        - Key: Name
          Value: MyENI

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Select
        - "0"
        - !GetAtt MyENI.SecondaryPrivateIpAddresses

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: !Select
        - "1"
        - !GetAtt MyENI.SecondaryPrivateIpAddresses

Outputs:
  VPCId:
    Description: The ID of the created VPC
    Value: !Ref MyVPC

  SubnetId:
    Description: The ID of the created Subnet
    Value: !Ref MySubnet

  ENIId:
    Description: The ID of the created ENI
    Value: !Ref MyENI

  EIP1Address:
    Description: The first Elastic IP address
    Value: !GetAtt EIP1.PublicIp

  EIP2Address:
    Description: The second Elastic IP address
    Value: !GetAtt EIP2.PublicIp