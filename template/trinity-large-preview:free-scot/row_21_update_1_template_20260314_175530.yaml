AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-db
  RetentionHours:
    Type: Number
    Default: 24
  MagneticStoreRetentionDays:
    Type: Number
    Default: 365

Resources:
  TimestreamDB:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  Table01BatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-01-batch-write
      DatabaseName: !Ref TimestreamDB
      RetentionHours: !Ref RetentionHours
      MagneticStoreRetentionDays: !Ref MagneticStoreRetentionDays

  Table02OlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-02-older-records-memonly
      DatabaseName: !Ref TimestreamDB
      RetentionHours: !Ref RetentionHours
      MagneticStoreRetentionDays: 0

  Table03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-03-older-records-magnetic
      DatabaseName: !Ref TimestreamDB
      RetentionHours: !Ref RetentionHours
      MagneticStoreRetentionDays: !Ref MagneticStoreRetentionDays

  Table04CommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      TableName: poc-table-04-common-attributes
      DatabaseName: !Ref TimestreamDB
      RetentionHours: !Ref RetentionHours
      MagneticStoreRetentionDays: !Ref MagneticStoreRetentionDays

Outputs:
  DatabaseName:
    Value: !Ref TimestreamDB
  TableNames:
    Value: !Join [",", ["poc-table-01-batch-write", "poc-table-02-older-records-memonly", "poc-table-03-older-records-magnetic", "poc-table-04-common-attributes"]]