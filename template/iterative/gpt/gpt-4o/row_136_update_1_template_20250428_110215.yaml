AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IAM role with configurable permission boundaries for governance controls.

Parameters:
  StrictBoundaryEnforcement:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Toggle to enable or disable strict permission boundary enforcement.
  NamingPrefix:
    Type: String
    Default: 'MyTeam'
    Description: The required prefix for IAM resources created by developers.
  OwnerTag:
    Type: String
    Default: 'MyTeamOwner'
    Description: The required Owner tag for IAM resources.

Conditions:
  IsStrictBoundary:
    Fn::Equals: [!Ref StrictBoundaryEnforcement, 'true']

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: PermissionBoundaryPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:*'
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  DeveloperPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DeveloperPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:CreateRole'
              - 'iam:PutRolePolicy'
              - 'iam:AttachRolePolicy'
              - 'iam:CreatePolicy'
            Resource: '*'
            Condition:
              StringLike:
                iam:ResourceName: !Sub '${NamingPrefix}*'
          - Effect: Allow
            Action:
              - 'iam:TagRole'
              - 'iam:TagPolicy'
            Resource: '*'
            Condition:
              StringEquals:
                aws:RequestTag/Owner: !Ref OwnerTag

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref DeveloperPolicy
      PermissionsBoundary: !If 
        - IsStrictBoundary
        - !Ref PermissionBoundaryPolicy
        - !Ref 'AWS::NoValue'
      Tags:
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  DeveloperRoleArn:
    Description: The ARN of the Developer IAM Role
    Value: !GetAtt DeveloperRole.Arn
  PermissionBoundaryPolicyArn:
    Description: The ARN of the Permission Boundary Policy
    Value: !Ref PermissionBoundaryPolicy
  DeveloperPolicyArn:
    Description: The ARN of the Developer Policy
    Value: !Ref DeveloperPolicy