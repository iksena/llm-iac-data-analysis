AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 Image Builder supporting resources for secure AMI creation'
Resources:
  ImageBuilderLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessForImageBuilder
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ImageBuilderLogsBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${ImageBuilderLogsBucket}"
  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ImageBuilderRole
Outputs:
  LogsBucketName:
    Description: Name of the S3 bucket for Image Builder logs
    Value: !Ref ImageBuilderLogsBucket
  LogsBucketArn:
    Description: ARN of the S3 bucket for Image Builder logs
    Value: !GetAtt ImageBuilderLogsBucket.Arn
  ImageBuilderInstanceProfileArn:
    Description: ARN of the instance profile for Image Builder
    Value: !Ref ImageBuilderInstanceProfile