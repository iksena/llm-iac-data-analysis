AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating an AWS Amplify TodoApp with production branch'

Parameters:
  AppName:
    Type: String
    Description: 'Name of the Amplify application'
    MinLength: 1
    MaxLength: 255
    ConstraintDescription: 'App name must be between 1 and 255 characters'

  Repository:
    Type: String
    Description: 'Git repository URL for the TodoApp source code'
    MinLength: 1
    ConstraintDescription: 'Repository URL is required'

  ProductionBranch:
    Type: String
    Description: 'Name of the production branch'
    Default: 'main'
    MinLength: 1
    MaxLength: 255
    ConstraintDescription: 'Branch name must be between 1 and 255 characters'

Resources:
  AmplifyApp:
    Type: 'AWS::Amplify::App'
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: dist
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  ProductionBranch:
    Type: 'AWS::Amplify::Branch'
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref ProductionBranch
      Stage: 'PRODUCTION'
      EnableAutoBuild: true
      EnablePerformanceMode: false
      EnablePullRequestPreview: false

Outputs:
  AppId:
    Description: 'Amplify App ID'
    Value: !GetAtt AmplifyApp.AppId

  AppArn:
    Description: 'Amplify App ARN'
    Value: !GetAtt AmplifyApp.Arn

  DefaultDomain:
    Description: 'Amplify default domain'
    Value: !GetAtt AmplifyApp.DefaultDomain