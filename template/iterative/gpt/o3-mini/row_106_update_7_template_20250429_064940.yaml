AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates an S3 bucket with event-driven notifications
  to an SNS topic. When new objects are uploaded to the S3 bucket, an event is triggered and sent
  to the SNS topic.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Event Notification Topic"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: "s3:ObjectCreated:*"
            Topic: !GetAtt SNSTopic.TopicArn

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowS3Publish"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "sns:Publish"
            Resource: !GetAtt SNSTopic.TopicArn
            Condition:
              ArnLike:
                aws:SourceArn:
                  Fn::Join:
                    - ""
                    - - "arn:aws:s3:::"
                      - !Ref S3Bucket
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"

Outputs:
  SNSTopicARN:
    Description: "SNS Topic ARN for S3 notifications"
    Value: !GetAtt SNSTopic.TopicArn
  S3BucketName:
    Description: "S3 Bucket name"
    Value: !Ref S3Bucket