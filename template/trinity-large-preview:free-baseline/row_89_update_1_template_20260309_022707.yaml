AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Security Hub with default standards and consolidated control findings enabled

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true

  CISAWSFoundations:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0
      HubArn: !GetAtt SecurityHub.Arn

  AWSFoundationalSecurityBestPractices:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0
      HubArn: !GetAtt SecurityHub.Arn

Outputs:
  SecurityHubArn:
    Description: ARN of the Security Hub
    Value: !GetAtt SecurityHub.Arn