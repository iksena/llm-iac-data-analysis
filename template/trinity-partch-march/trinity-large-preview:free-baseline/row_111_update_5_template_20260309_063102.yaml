AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with DataDog for centralized log forwarding

Resources:
  DataDogDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogDeadLetterQueue

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeDataDogRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeDataDogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                  - events:TestEventPattern
                Resource: '*'

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Name: DataDogConnection
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: testanu

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogApiDestination
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5

  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogAppEventBus

  DataDogEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DataDogLogForwardingRule
      EventBusName: !Ref DataDogEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          Id: DataDogTarget

Outputs:
  EventBusName:
    Description: Name of the EventBridge bus
    Value: !Ref DataDogEventBus
  ApiDestinationArn:
    Description: ARN of the DataDog API Destination
    Value: !GetAtt DataDogApiDestination.Arn