AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with Cross-AZ EC2 Instances and Performance Monitoring'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: String
    Default: default-key
  PerformanceAlarmEmail:
    Type: String
    Default: admin@example.com
    AllowedPattern: ^[\w\.-]+@[\w\.-]+\.\w+$

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  InternetRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  VPCEFSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all traffic within VPC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS access from VPC instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref VPCEFSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  CloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - cloudwatch.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess

  PerformanceAlarmsTopic:
    Type: AWS::SNS::Topic

  PerformanceAlarmsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PerformanceAlarmsTopic
      Endpoint: !Ref PerformanceAlarmEmail
      Protocol: email

  EC2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AmazonLinux2]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref Subnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
        - !Ref VPCEFSecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash -xe
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /mnt/efs
            while ! ping -c 1 -W 1 ${MountTarget1}; do
              echo "Waiting for mount target to be available..."
              sleep 5
            done
            while ! mount -t efs ${EFSFileSystem}:/ /mnt/efs; do
              echo "Retrying EFS mount..."
              sleep 5
            done
            echo "${EFSFileSystem}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance1

  EC2Instance2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AmazonLinux2]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref Subnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
        - !Ref VPCEFSecurityGroup
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash -xe
            yum update -y
            yum install -y amazon-efs-utils
            mkdir -p /mnt/efs
            while ! ping -c 1 -W 1 ${MountTarget2}; do
              echo "Waiting for mount target to be available..."
              sleep 5
            done
            while ! mount -t efs ${EFSFileSystem}:/ /mnt/efs; do
              echo "Retrying EFS mount..."
              sleep 5
            done
            echo "${EFSFileSystem}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
            /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource EC2Instance2

  EFSIOAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-IO-Limit-Alarm
      AlarmDescription: Triggers when EFS I/O utilization exceeds 95%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 95
      DatapointsToAlarm: 1
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref PerformanceAlarmsTopic
      TreatMissingData: notBreaching

  EFSThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-Throughput-Alarm
      AlarmDescription: Triggers when EFS throughput utilization exceeds 80%
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5000000000
      DatapointsToAlarm: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref PerformanceAlarmsTopic
      TreatMissingData: notBreaching

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AmazonLinux2: ami-0c55b159cbfafe1f0
    us-east-2:
      AmazonLinux2: ami-0d8f6eb4f641ef691
    us-west-1:
      AmazonLinux2: ami-0a36eba867091f37c
    us-west-2:
      AmazonLinux2: ami-0d1cd67c26f5fca19
    eu-west-1:
      AmazonLinux2: ami-0bb93ffed17a0d97a
    eu-west-2:
      AmazonLinux2: ami-0a669f3e492ea0edd
    eu-west-3:
      AmazonLinux2: ami-0dd7eb6b5544c9b1b
    eu-central-1:
      AmazonLinux2: ami-02e680f1f9b1de33f
    ap-northeast-1:
      AmazonLinux2: ami-0b65f69a0a70ff0b7
    ap-northeast-2:
      AmazonLinux2: ami-0b6a548f0c1e0a4e1
    ap-southeast-1:
      AmazonLinux2: ami-0d0b9b78c3a4a7e36
    ap-southeast-2:
      AmazonLinux2: ami-0c4e15a3262c4d3b9
    ap-south-1:
      AmazonLinux2: ami-0d2692b8e3230a508
    sa-east-1:
      AmazonLinux2: ami-0b658973c39d92b02
    ca-central-1:
      AmazonLinux2: ami-0d4e6b9b3c5e6b9b2

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  EC2Instance1PublicIP:
    Description: Public IP of EC2 Instance 1
    Value: !GetAtt EC2Instance1.PublicIp
  EC2Instance2PublicIP:
    Description: Public IP of EC2 Instance 2
    Value: !GetAtt EC2Instance2.PublicIp