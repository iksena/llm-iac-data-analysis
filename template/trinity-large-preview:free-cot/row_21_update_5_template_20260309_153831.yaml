AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Timestream Database and Tables with Configurable Retention Policies

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-poc-database
    Description: Name of the Timestream database
  RetentionPeriodInDays:
    Type: Number
    Default: 7
    Description: Retention period in days for memory store
  Tags:
    Type: String
    Default: '{}'
    Description: JSON string of tags to apply to resources

Resources:
  TimestreamServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: timestream.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonTimestreamFullAccess

  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      KmsKeyId: alias/aws/timestream
      Tags: !If [HasTags, !Ref Tags, !Ref AWS::NoValue]
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PocTable01BatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref RetentionPeriodInDays
        MagneticStoreRetentionPeriodInDays: 30
      Tags: !If [HasTags, !Ref Tags, !Ref AWS::NoValue]
    DependsOn: TimestreamDatabase

  PocTable02OlderRecordsMemonly:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref RetentionPeriodInDays
        MagneticStoreRetentionPeriodInDays: 0
      Tags: !If [HasTags, !Ref Tags, !Ref AWS::NoValue]
    DependsOn: TimestreamDatabase

  PocTable03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref RetentionPeriodInDays
        MagneticStoreRetentionPeriodInDays: 30
      Tags: !If [HasTags, !Ref Tags, !Ref AWS::NoValue]
    DependsOn: TimestreamDatabase

  PocTable04CommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref RetentionPeriodInDays
        MagneticStoreRetentionPeriodInDays: 30
      Tags: !If [HasTags, !Ref Tags, !Ref AWS::NoValue]
    DependsOn: TimestreamDatabase

Conditions:
  HasTags: !Not [!Equals [!Ref Tags, '{}']]

Outputs:
  DatabaseArn:
    Description: Timestream Database ARN
    Value: !GetAtt TimestreamDatabase.Arn
  DatabaseName:
    Description: Timestream Database Name
    Value: !Ref DatabaseName
  TableArns:
    Description: ARNs of all created tables
    Value: !Join [",", [
      !GetAtt PocTable01BatchWrite.Arn,
      !GetAtt PocTable02OlderRecordsMemonly.Arn,
      !GetAtt PocTable03OlderRecordsMagnetic.Arn,
      !GetAtt PocTable04CommonAttributes.Arn
    ]]