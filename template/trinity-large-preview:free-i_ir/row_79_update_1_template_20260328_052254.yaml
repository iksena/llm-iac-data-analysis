AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Managed Policies for S3 Access and Database Protection

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - !Sub "arn:aws:s3:::ios-apps.sagebridge.org"
              - !Sub "arn:aws:s3:::ios-apps.sagebridge.org/*"
      Description: Grants iOS application read/write access to ios-apps.sagebridge.org S3 bucket

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:TagResource
              - dynamodb:UntagResource
              - dynamodb:RestoreTableFromBackup
              - dynamodb:RestoreTableToPointInTime
            Resource: "*"
      Description: Prevents deletion and schema modification of DynamoDB tables

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteEventSubscription
              - rds:DeleteOptionGroup
              - rds:DeleteDBSubnetGroup
              - rds:DeleteDBParameterGroup
              - rds:DeleteDBSecurityGroup
            Resource: "*"
      Description: Blocks destructive RDS operations to protect databases and backups

Outputs:
  S3AccessPolicyArn:
    Description: ARN of the S3 Access Policy
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyArn:
    Description: ARN of the DynamoDB Protection Policy
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyArn:
    Description: ARN of the RDS Protection Policy
    Value: !Ref RDSProtectionPolicy