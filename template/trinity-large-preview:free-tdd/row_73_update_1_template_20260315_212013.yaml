AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - Base: 0
          Weight: 1
          CapacityProvider: FARGATE
        - Base: 0
          Weight: 1
          CapacityProvider: FARGATE_SPOT