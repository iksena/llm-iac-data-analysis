AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an S3 bucket configured for website hosting with a DeletionPolicy'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    Default: my-website-bucket
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*$'
    ConstraintDescription: Bucket name can include numbers, lowercase letters, periods, and hyphens. It cannot start with a period or hyphen.

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      OwnershipControls:
        Rules:
          - ObjectOwnership: ObjectWriter

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadForGetBucketObjects
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Join ['', ['arn:aws:s3:::', !Ref WebsiteBucket, '/*']]

Outputs:
  WebsiteURL:
    Description: URL for the website hosted on S3
    Value: !GetAtt WebsiteBucket.WebsiteURL
  
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
  
  S3BucketDomainName:
    Description: Domain name of the S3 bucket
    Value: !GetAtt WebsiteBucket.DomainName