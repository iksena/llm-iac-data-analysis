AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ENI with two EIPs and secondary private IPs

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID where the ENI will be created
    Default: subnet-00000000000000000
  SecondaryPrivateIpAddressCount:
    Type: Number
    Description: Number of secondary private IP addresses to assign to the ENI
    Default: 0
    MinValue: 0

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Primary network interface with secondary IPs
      SubnetId: !Ref SubnetId
      SecondaryPrivateIpAddressCount: !Ref SecondaryPrivateIpAddressCount
      SourceDestCheck: true

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

Outputs:
  NetworkInterfaceId:
    Description: ID of the created network interface
    Value: !Ref NetworkInterface
  EIP1Address:
    Description: Elastic IP 1 address
    Value: !GetAtt EIP1.PublicIp
  EIP2Address:
    Description: Elastic IP 2 address
    Value: !GetAtt EIP2.PublicIp