AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a validated SQS FIFO queue with proper conditional handling
Parameters:
  QueueNamePrefix:
    Type: String
    MinLength: 1
    MaxLength: 70
    AllowedPattern: ^[a-zA-Z0-9_-]+$
    Description: Prefix for queue name (.fifo suffix will be added automatically)
  VisibilityTimeout:
    Type: Number
    Default: 30
    MinValue: 0
    MaxValue: 43200
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  MaximumMessageSize:
    Type: Number
    Default: 262144
    MinValue: 1024
    MaxValue: 262144
  DelaySeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 900
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 20
  ContentBasedDeduplication:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  DeduplicationScope:
    Type: String
    Default: 'queue'
    AllowedValues: ['messageGroup', 'queue']
    Description: Required only when ContentBasedDeduplication is false
  FifoThroughputLimit:
    Type: String
    Default: 'perQueue'
    AllowedValues: ['perMessageGroupId', 'perQueue']
    Description: Required only when ContentBasedDeduplication is false
Conditions:
  IsContentBasedDeduplicationEnabled: !Equals [!Ref ContentBasedDeduplication, 'true']
  IsContentBasedDeduplicationDisabled: !Not [IsContentBasedDeduplicationEnabled]
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${QueueNamePrefix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: !If [IsContentBasedDeduplicationEnabled, true, false]
      DeduplicationScope: !If [IsContentBasedDeduplicationDisabled, !Ref DeduplicationScope, !Ref "AWS::NoValue"]
      FifoThroughputLimit: !If [IsContentBasedDeduplicationDisabled, !Ref FifoThroughputLimit, !Ref "AWS::NoValue"]
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      MaximumMessageSize: !Ref MaximumMessageSize
      DelaySeconds: !Ref DelaySeconds
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
Outputs:
  QueueARN:
    Value: !GetAtt SQSQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-QueueARN"
  QueueURL:
    Value: !Ref SQSQueue
    Export:
      Name: !Sub "${AWS::StackName}-QueueURL"