AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway integration with Kinesis Data Streams for data ingestion and retrieval'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis stream
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'
  
  RetentionPeriod:
    Type: Number
    Description: Stream retention period in hours (24-168)
    Default: 24
    MinValue: 24
    MaxValue: 168
  
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis stream
    Default: 1
    MinValue: 1
  
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: 'prod'
    AllowedPattern: '[a-zA-Z0-9]+'

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-KinesisAPI
      Description: API Gateway for Kinesis Stream operations
      EndpointConfiguration:
        Types:
          - REGIONAL

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: 'RequestValidator'
      RestApiId: !Ref RestApi
      ValidateRequestBody: true
      ValidateRequestParameters: true

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'records'

  PutRecordModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref RestApi
      ContentType: application/json
      Name: PutRecordModel
      Schema:
        type: object
        required:
          - data
          - partitionKey
        properties:
          data:
            type: string
          partitionKey:
            type: string

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: AWS_IAM
      RequestValidatorId: !Ref RequestValidator
      RequestModels:
        application/json: !Ref PutRecordModel
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: !Sub |
            {
              "StreamName": "${StreamName}",
              "Data": "$util.base64Encode($input.path('$.data'))",
              "PartitionKey": "$input.path('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                {
                  "SequenceNumber": "$input.path('$.SequenceNumber')",
                  "ShardId": "$input.path('$.ShardId')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.path('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.path('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
          ResponseParameters:
            method.response.header.Content-Type: true
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
          ResponseParameters:
            method.response.header.Content-Type: true
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'
          ResponseParameters:
            method.response.header.Content-Type: true

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: AWS_IAM
      RequestParameters:
        method.request.querystring.shardIterator: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')",
              "Limit": #if($input.params('limit'))$input.params('limit')#else 100#end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                {
                  "Records": $input.json('$.Records'),
                  "NextShardIterator": "$input.path('$.NextShardIterator')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.path('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
          ResponseParameters:
            method.response.header.Content-Type: true
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
          ResponseParameters:
            method.response.header.Content-Type: true

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PutRecordMethod
      - GetRecordsMethod
      - OptionsMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref RestApi
      StageName: !Ref StageName
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  StreamArn:
    Description: ARN of the Kinesis stream
    Value: !GetAtt KinesisStream.Arn

  StreamName:
    Description: Name of the Kinesis stream
    Value: !Ref StreamName