AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create multi-threshold AWS billing alarms with SNS notifications

Parameters:
  EmailAddress:
    Type: String
    Default: xxxxx@gmail.com
    Description: Email address to receive billing alerts

Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Billing Alarms
      TopicName: BillingAlarmsTopic

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS-Billing-Alert-5
      AlarmDescription: Alarm when estimated charges exceed $5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: notBreaching

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS-Billing-Alert-10
      AlarmDescription: Alarm when estimated charges exceed $10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: notBreaching

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS-Billing-Alert-20
      AlarmDescription: Alarm when estimated charges exceed $20
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: notBreaching

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS-Billing-Alert-40
      AlarmDescription: Alarm when estimated charges exceed $40
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      TreatMissingData: notBreaching

Outputs:
  BillingAlarmTopicArn:
    Description: ARN of the SNS topic for billing alarms
    Value: !Ref BillingAlarmTopic