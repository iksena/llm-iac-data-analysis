AWSTemplateFormatVersion: '2010-09-09'
Description: Production-ready DynamoDB table for ArtistId, Concert, and TicketSales data

Parameters:
  TableName:
    Type: String
    Default: ArtistConcertTicketSalesTable
    Description: Name of the DynamoDB table
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'

Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: AWS_MANAGED
      ContributorInsightsSpecification:
        ContributorInsightsEnabled: true
      Tags:
        - Key: Purpose
          Value: ArtistConcertTicketSales
        - Key: ManagedBy
          Value: !Sub '${AWS::StackName}'

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref ArtistConcertTicketSalesTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt ArtistConcertTicketSalesTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'