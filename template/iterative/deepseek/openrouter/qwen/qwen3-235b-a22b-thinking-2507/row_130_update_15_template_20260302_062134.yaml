AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Account-wide IAM Password Policy with customizable security requirements.
  Uses Lambda custom resource to manage password policy configuration.

Parameters:
  MinPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum password length (6-128 characters)
  
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase character
  
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase character
  
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one numeric character
  
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one special character
  
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Days before password expiration (1-1095)
  
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to remember (1-24)
  
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow IAM users to change their own password
  
  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enforce immediate password change upon expiration

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PasswordPolicyUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:UpdateAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          const aws = require('aws-sdk');
          const https = require('https');
          const url = require('url');
          
          exports.handler = async (event, context) => {
            const iam = new aws.IAM();
            const props = event.ResourceProperties;
            
            try {
              if (event.RequestType === 'Delete') {
                try {
                  await iam.updateAccountPasswordPolicy({
                    MinimumPasswordLength: 6,
                    RequireSymbols: false,
                    RequireNumbers: false,
                    RequireUppercaseCharacters: false,
                    RequireLowercaseCharacters: false,
                    AllowUsersToChangePassword: true
                  }).promise();
                } catch (e) {
                  console.log('Error resetting policy:', e.message);
                }
              } else {
                await iam.updateAccountPasswordPolicy({
                  MinimumPasswordLength: parseInt(props.MinPasswordLength),
                  RequireSymbols: props.RequireSymbols === 'true',
                  RequireNumbers: props.RequireNumbers === 'true',
                  RequireUppercaseCharacters: props.RequireUppercase === 'true',
                  RequireLowercaseCharacters: props.RequireLowercase === 'true',
                  AllowUsersToChangePassword: props.AllowUsersToChangePassword === 'true',
                  MaxPasswordAge: parseInt(props.MaxPasswordAge),
                  PasswordReusePrevention: parseInt(props.PasswordReusePrevention),
                  HardExpiry: props.HardExpiry === 'true'
                }).promise();
              }
              
              await sendResponse(event, context, 'SUCCESS');
            } catch (e) {
              console.error('Error:', e);
              await sendResponse(event, context, 'FAILED', { Error: e.message });
            }
          };
          
          function sendResponse(event, context, responseStatus, responseData = {}) {
            return new Promise((resolve, reject) => {
              const responseBody = JSON.stringify({
                Status: responseStatus,
                Reason: 'See CloudWatch Logs for details',
                PhysicalResourceId: context.logStreamName || context.awsRequestId,
                StackId: event.StackId,
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
                Data: responseData
              });
              
              const parsedUrl = url.parse(event.ResponseURL);
              const options = {
                hostname: parsedUrl.hostname,
                port: 443,
                path: parsedUrl.path,
                method: 'PUT',
                headers: {
                  'Content-Type': '',
                  'Content-Length': responseBody.length
                }
              };
              
              const req = https.request(options, res => {
                res.on('end', () => resolve());
                res.resume();
              });
              
              req.on('error', error => reject(error));
              req.write(responseBody);
              req.end();
            });
          }
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 128

  AccountPasswordPolicy:
    Type: Custom::AccountPasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinPasswordLength: !Ref MinPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry: !Ref HardExpiry
    DeletionPolicy: Delete

Outputs:
  MinPasswordLength:
    Value: !Ref MinPasswordLength
    Description: Configured minimum password length
  RequireUppercase:
    Value: !Ref RequireUppercase
    Description: Uppercase character requirement
  RequireLowercase:
    Value: !Ref RequireLowercase
    Description: Lowercase character requirement
  RequireNumbers:
    Value: !Ref RequireNumbers
    Description: Numeric character requirement
  RequireSymbols:
    Value: !Ref RequireSymbols
    Description: Special character requirement
  MaxPasswordAge:
    Value: !Ref MaxPasswordAge
    Description: Password expiration period in days
  PasswordReusePrevention:
    Value: !Ref PasswordReusePrevention
    Description: Number of previous passwords prevented from reuse
  AllowUsersToChangePassword:
    Value: !Ref AllowUsersToChangePassword
    Description: Self-service password change capability
  HardExpiry:
    Value: !Ref HardExpiry
    Description: Immediate password change enforcement upon expiration