AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated monitoring and notification system for AWS Secrets Manager secret lifecycle events

Parameters:
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds
  LambdaMemorySize:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerLifecycleNotifications

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource: '*'
        - PolicyName: SNSpublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |