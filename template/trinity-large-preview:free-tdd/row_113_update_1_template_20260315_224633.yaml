AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EventBridgeDemoTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - demo.cli
      Targets:
        - Arn: !Ref SnsTopic
          Id: SnsTarget

  SnsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SnsTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SnsTopic