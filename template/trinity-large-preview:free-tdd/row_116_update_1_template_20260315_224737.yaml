AWSTemplateFormatVersion: '2010-09-09'
Resources:
  # SNS Topic for fanout messaging
  MetricsSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricsSnsTopic

  # Dead Letter Queue for all SQS queues
  MetricsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MetricsDLQ

  # SQS Queue for all metrics (no filtering)
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MetricsDlq.Arn
        maxReceiveCount: 3

  # SQS Queue for temperature metrics with filter policy
  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MetricsDlq.Arn
        maxReceiveCount: 3

  # SQS Queue for humidity metrics with filter policy
  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MetricsDlq.Arn
        maxReceiveCount: 3

  # SNS Subscription for AllMetricsSqsQueue (no filter)
  AllMetricsSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn

  # SNS Subscription for TemperatureSqsQueue with filter policy
  TemperatureSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  # SNS Subscription for HumiditySqsQueue with filter policy
  HumiditySnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity