AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Amazon Kinesis Data Firehose with server-side encryption and CloudWatch error logging'

Parameters:
  FirehoseStreamName:
    Type: String
    Default: 'my-firehose-stream'
    Description: Name of the Firehose delivery stream
  
  LogGroupName:
    Type: String
    Default: '/aws/firehose/error-logs'
    Description: Name of the CloudWatch Log Group for error logging
  
  LogStreamName:
    Type: String
    Default: 'firehose-error-stream'
    Description: Name of the CloudWatch Log Stream for error logging
  
  BufferingInterval:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 900
    Description: Buffer incoming data for the specified period of time, in seconds (60-900)
  
  BufferingSize:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 128
    Description: Buffer incoming data to the specified size, in MBs (1-128)

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 7

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: !Ref LogStreamName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref 'AWS::AccountId'

  FirehosePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: firehose-s3-cloudwatch-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:AbortMultipartUpload'
              - 's3:GetBucketLocation'
              - 's3:GetObject'
              - 's3:ListBucket'
              - 's3:ListBucketMultipartUploads'
              - 's3:PutObject'
            Resource:
              - 'arn:aws:s3:::*'
          - Effect: Allow
            Action:
              - 'logs:PutLogEvents'
            Resource: !GetAtt FirehoseLogGroup.Arn
          - Effect: Allow
            Action:
              - 'kinesis:DescribeStream'
              - 'kinesis:GetShardIterator'
              - 'kinesis:GetRecords'
              - 'kinesis:ListShards'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
            Condition:
              StringEquals:
                'kms:ViaService': !Sub 'kinesis.${AWS::Region}.amazonaws.com'
      Roles:
        - !Ref FirehoseRole

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehosePolicy
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      S3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::AccountId}-firehose-delivery-bucket'
        BufferingHints:
          IntervalInSeconds: !Ref BufferingInterval
          SizeInMBs: !Ref BufferingSize
        CompressionFormat: UNCOMPRESSED
        RoleARN: !GetAtt FirehoseRole.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref LogGroupName
          LogStreamName: !Ref LogStreamName

Outputs:
  FirehoseStreamARN:
    Description: ARN of the Firehose delivery stream
    Value: !GetAtt FirehoseStream.Arn
  
  FirehoseStreamName:
    Description: Name of the Firehose delivery stream
    Value: !Ref FirehoseStream
  
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref FirehoseLogGroup
  
  LogStreamName:
    Description: Name of the CloudWatch Log Stream
    Value: !Ref FirehoseLogStream