AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating KMS Key with Alias'

Resources:
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'KMS key for centralized encryption management'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow administration of the key
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
      Tags:
        - Key: Purpose
          Value: Encryption
        - Key: Environment
          Value: Production

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: 'alias/centralized-encryption-key'
      TargetKeyId: !Ref EncryptionKey

Outputs:
  KeyId:
    Description: 'KMS Key ID'
    Value: !Ref EncryptionKey
    Export:
      Name: !Sub '${AWS::StackName}-KeyId'
  
  KeyArn:
    Description: 'KMS Key ARN'
    Value: !GetAtt EncryptionKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KeyArn'
  
  AliasArn:
    Description: 'KMS Alias ARN'
    Value: !Ref EncryptionKeyAlias
    Export:
      Name: !Sub '${AWS::StackName}-AliasArn'