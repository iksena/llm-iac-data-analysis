AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BedrockServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      Description: IAM role for Bedrock service access with agent and Lambda permissions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole

  BedrockPermissionsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BedrockServicePermissions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock:InvokeAgent
              - bedrock:InvokeInlineAgent
            Resource: '*'
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: '*'
      Roles:
        - !Ref BedrockServiceRole