AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized alerting system with SNS topic, subscriptions, and failure monitoring

Parameters:
  EmailEndpoint:
    Type: String
    Default: ''
    Description: Email address for SNS notifications (optional)
  HttpsEndpoint:
    Type: String
    Default: ''
    Description: HTTPS endpoint for SNS notifications (optional)
  FallbackEmail:
    Type: String
    Default: ''
    Description: Email address for fallback notifications (required)
  FailureThreshold:
    Type: Number
    Default: 5
    Description: Number of failed notifications before triggering fallback

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, '']]
  HasHttpsEndpoint: !Not [!Equals [!Ref HttpsEndpoint, '']]
  HasValidEndpoints: !Or [Condition: HasEmailEndpoint, Condition: HasHttpsEndpoint]

Resources:
  PrimarySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Primary Alert Notifications

  PrimarySNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref PrimarySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - monitoring.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
                - budgets.amazonaws.com
            Action: sns:Publish
            Resource: !Ref PrimarySNSTopic

  PrimarySNSTopicSubscriptionEmail:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: email
      Endpoint: !Ref EmailEndpoint

  PrimarySNSTopicSubscriptionHTTPS:
    Type: AWS::SNS::Subscription
    Condition: HasHttpsEndpoint
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: https
      Endpoint: !Ref HttpsEndpoint
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 20
          maxDelayTarget: 20
          numRetries: 3
          numMaxDelayRetries: 0
          backoffFunction: arithmetic

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Fallback Alert Notifications

  FallbackSNSTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref FallbackSNSTopic
      Protocol: email
      Endpoint: !Ref FallbackEmail

  FailedNotificationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: SNS_FailedNotifications_Alarm
      AlarmDescription: Triggers when SNS notifications fail
      Namespace: AWS/SNS
      MetricName: NumberOfFailedNotifications
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref FailureThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic
      Dimensions:
        - Name: TopicArn
          Value: !Ref PrimarySNSTopic

Outputs:
  PrimarySNSTopicArn:
    Description: ARN of the primary SNS topic
    Value: !Ref PrimarySNSTopic
  FallbackSNSTopicArn:
    Description: ARN of the fallback SNS topic
    Value: !Ref FallbackSNSTopic