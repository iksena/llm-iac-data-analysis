AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: x-api-key
        ApiKeyValue: dummy-api-key

  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: default

  MyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MyApiDestination
      ConnectionArn: !GetAtt MyConnection.Arn
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5

Outputs:
  ConnectionArn:
    Value: !Ref MyConnection
  EventBusName:
    Value: !GetAtt MyEventBus.Name
  ApiDestinationArn:
    Value: !Ref MyApiDestination