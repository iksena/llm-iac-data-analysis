AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create AWS Glue resources for crawling CloudTrail logs

Parameters:
  DatabaseName:
    Type: String
    Default: cloudtrail_logs_db
    Description: Name of the Glue Database to create
  CrawlerName:
    Type: String
    Default: cloudtrail_crawler
    Description: Name of the Glue Crawler to create
  S3TargetPath:
    Type: String
    Default: s3://kk-admin/cloud-trail/AWSLogs/
    Description: S3 path where CloudTrail logs are stored

Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSGlueServiceRole-CloudTrailCrawler
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueCloudTrailAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Ref DatabaseName

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Ref CrawlerName
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref DatabaseName
      Targets:
        S3Targets:
          - Path: !Ref S3TargetPath
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_NEW_FOLDERS_ONLY
      TablePrefix: cloudtrail_
      Configuration: |
        {
          "Version":1.0,
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          }
        }

Outputs:
  DatabaseName:
    Description: Name of the created Glue Database
    Value: !Ref DatabaseName
  CrawlerName:
    Description: Name of the created Glue Crawler
    Value: !Ref CrawlerName