AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  DynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music
      RestApiId: !Ref MusicApi

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt PostLambda.Arn

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt GetLambda.Arn

  PostLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const dynamodb = new AWS.DynamoDB.DocumentClient();
            const body = JSON.parse(event.body);
            const params = {
              TableName: process.env.TABLE_NAME,
              Item: {
                Artist: body.Artist,
                Album: body.Album
              }
            };
            await dynamodb.put(params).promise();
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Item added successfully' })
            };
          };
      Role: !GetAtt DynamoDBRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MusicTable

  GetLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const dynamodb = new AWS.DynamoDB.DocumentClient();
            const artist = event.queryStringParameters.Artist;
            const params = {
              TableName: process.env.TABLE_NAME,
              IndexName: 'Artist-Index',
              KeyConditionExpression: 'Artist = :artist',
              ExpressionAttributeValues: {
                ':artist': artist
              }
            };
            const data = await dynamodb.query(params).promise();
            return {
              statusCode: 200,
              body: JSON.stringify(data.Items)
            };
          };
      Role: !GetAtt DynamoDBRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref MusicTable

  PostLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostLambda.Arn
      Principal: apigateway.amazonaws.com

  GetLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt GetLambda.Arn
      Principal: apigateway.amazonaws.com

  MusicUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Name: MusicUsagePlan
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref ApiGatewayDeployment
      Throttle:
        BurstLimit: 100
        RateLimit: 50

  MusicApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicApiKey
      Enabled: true

  MusicUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MusicUsagePlan

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref MusicApi
      StageName: prod