AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
    Description: ID of the VPC where EFS will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-12345678,subnet-87654321
    Description: List of subnet IDs for EFS mount targets
  EnableBackup:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Whether to enable automated backups
  BackupSchedule:
    Type: String
    Default: cron(0 0 * * ? *)
    Description: CRON schedule for backups
  FileSystemSize:
    Type: Number
    Default: 100
    Description: Size of the EFS file system in GB
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system
  ProvisionedThroughput:
    Type: Number
    Default: 0
    Description: Provisioned throughput in MiB/s if ThroughputMode is provisioned

Resources:
  MyEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps:
        !If [ProvisionedThroughputEnabled, !Ref ProvisionedThroughput, !Ref AWS::NoValue]
      Encrypted: true
      BackupPolicy:
        Status: ENABLED
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EFS Security Group
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EFSSecurityGroup

  MountTargets:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFS
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  IOUtilAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS IO Utilization Alarm
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSAlarmTopic

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS Burst Credit Balance Alarm
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref SNSAlarmTopic

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: EFS Throughput Alarm
      Namespace: AWS/EFS
      MetricName: TotalIOBytes
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10737418240
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSAlarmTopic

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultBackupRetentionPolicy

  BackupSelectionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultBackupRetentionPolicy

  EFSBackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: EnableBackup
    Properties:
      BackupPlan:
        BackupPlanName: EFS Backup Plan
        Rules:
          - RuleName: Daily Backup
            TargetBackupVaultName: Default
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30

  EFSBackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: EnableBackup
    Properties:
      BackupPlanId: !Ref EFSBackupPlan
      SelectionName: EFS Backup Selection
      IamRoleArn: !GetAtt BackupSelectionRole.Arn
      Resources:
        - !Ref MyEFS

  SNSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic

Conditions:
  ProvisionedThroughputEnabled: !And
    - !Equals [!Ref ThroughputMode, provisioned]
    - !Not [!Equals [!Ref ProvisionedThroughput, 0]]
  EnableBackup: !Equals [!Ref EnableBackup, "true"]

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref MyEFS
  MountTargetDNSNames:
    Description: EFS Mount Target DNS Names
    Value: !Join [",", !GetAtt MyEFS.MountTargetDNSNames]