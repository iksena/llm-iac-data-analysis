AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueScriptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyPublicAccess
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource: 
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: ScriptBucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 
                  - 'arn:aws:s3:::${BucketName}/gue_scripts/*'
                  - BucketName: !Ref GlueScriptsBucket

  SampleGlueJob:
    Type: AWS::Glue::Job
    Properties:
      Name: sample-convert-job
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/gue_scripts/sample_convert.py'
      DefaultArguments:
        '--TempDir': !Sub 's3://${GlueScriptsBucket}/temp/'
        '--spark-event-logs.dir': !Sub 's3://${GlueScriptsBucket}/spark_logs/'
      GlueVersion: '4.0'
      WorkerType: G.1X
      NumberOfWorkers: 10

Outputs:
  ScriptBucketName:
    Value: !Ref GlueScriptsBucket
  GlueJobName:
    Value: !Ref SampleGlueJob