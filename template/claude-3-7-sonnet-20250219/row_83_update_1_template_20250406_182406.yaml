AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Transit Gateway and shares it with another AWS account via Resource Access Manager'

Parameters:
  TransitGatewayName:
    Type: String
    Default: 'SharedTransitGateway'
    Description: 'Name for the Transit Gateway'
  
  ResourceShareName:
    Type: String
    Default: 'TransitGatewayShare'
    Description: 'Name for the Resource Access Manager share'
  
  PrincipalId:
    Type: String
    Default: '644519422710'
    Description: 'AWS Account ID to share the Transit Gateway with'
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: 'Must be a valid 12-digit AWS account ID'

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: 'enable'
      DefaultRouteTableAssociation: 'enable'
      DefaultRouteTablePropagation: 'enable'
      Description: 'Transit Gateway for cross-VPC and cross-account connectivity'
      Tags:
        - Key: Name
          Value: !Ref TransitGatewayName

  TransitGatewayResourceShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: !Ref ResourceShareName
      AllowExternalPrincipals: true
      Principals:
        - !Sub 'arn:aws:organizations::${PrincipalId}:account/${PrincipalId}'
      ResourceArns:
        - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Tags:
        - Key: Name
          Value: !Ref ResourceShareName

Outputs:
  TransitGatewayId:
    Description: 'ID of the Transit Gateway'
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'
  
  ResourceShareId:
    Description: 'ID of the Resource Share'
    Value: !Ref TransitGatewayResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'