AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Production-ready CloudFormation template for AWS Glue ETL infrastructure with S3 storage, IAM role, and Glue job v4.0

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt GlueScriptsBucket.Arn
                  - !Sub '${GlueScriptsBucket.Arn}/*'

  GlueEtlJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        PythonVersion: '3'
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/gue_scripts/sample_convert.py'
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: '4.0'
      DefaultArguments:
        '--temp-dir': !Sub 's3://${GlueScriptsBucket}/temp/'
        '--enable-logging': ''
    DependsOn:
      - GlueScriptsBucket
      - GlueServiceRole

Outputs:
  ScriptsBucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptsBucket
  GlueJobName:
    Description: Name of the Glue ETL job
    Value: !Ref GlueEtlJob