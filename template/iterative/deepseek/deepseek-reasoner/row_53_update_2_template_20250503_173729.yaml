AWSTemplateFormatVersion: '2010-09-09'
Description: EMR Serverless environment with S3 bucket and IAM permissions

Parameters:
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    MinValue: 1
    MaxValue: 10080
    Description: Idle timeout in minutes for auto-stop (1-10080)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRServerlessAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}'
                  - !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                  - logs:CreateLogStream
                  - logs:CreateLogGroup
                Resource: "*"

  EMRServerlessApp:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: SparkApp
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      MonitoringConfiguration:
        S3MonitoringConfiguration:
          LogUri: !Sub 's3://${S3Bucket}/logs'

Outputs:
  S3BucketName:
    Value: !Ref S3Bucket
    Description: Name of the private S3 bucket for scripts/data
  EMRApplicationId:
    Value: !Ref EMRServerlessApp
    Description: EMR Serverless Application ID
  EMRServiceRoleArn:
    Value: !GetAtt EMRServerlessRole.Arn
    Description: IAM Role ARN for EMR Serverless permissions