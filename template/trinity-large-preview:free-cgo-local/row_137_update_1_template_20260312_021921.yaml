AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AppSync GraphQL API with Lambda backend for pet inventory service

Parameters:
  LambdaTimeout:
    Type: Number
    Default: 3
    Description: Lambda function timeout in seconds
  LambdaMemory:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  PetShopLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole
      Policies:
        - PolicyName: AppSyncInvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetShopLambdaFunction.Arn

  PetShopLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt PetShopLambdaRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Code:
        ZipFile: |
          def handler(event, context):
              pets = [
                  {"id": "1", "name": "Max", "type": "Dog"},
                  {"id": "2", "name": "Bella", "type": "Cat"},
                  {"id": "3", "name": "Charlie", "type": "Bird"}
              ]
              return {
                  "statusCode": 200,
                  "body": pets
              }

  PetShopGraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      OpenIDConnectConfig:
        Issuer: "https://example.com"
        ClientId: "example-client-id"
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY

  PetShopGraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

        schema {
          query: Query
        }

  PetShopLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Name: PetShopLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetShopLambdaFunction.Arn

  PetShopResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetShopLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

  PetShopApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopGraphQLApi.ApiId
      Description: API Key for PetShopAPI
      Expires: 2025-12-31T00:00:00Z

Outputs:
  GraphQLApiId:
    Description: GraphQL API ID
    Value: !GetAtt PetShopGraphQLApi.ApiId
  GraphQLApiKey:
    Description: GraphQL API Key
    Value: !GetAtt PetShopApiKey.ApiKey
  GraphQLEndpoint:
    Description: GraphQL API Endpoint
    Value: !GetAtt PetShopGraphQLApi.GraphQLUrl