AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ENI with two EIPs and secondary private IPs

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the ENI will be created
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID where the ENI will be created
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: Security group IDs to associate with the ENI
  Description:
    Type: String
    Default: Primary ENI for EC2 instance
    Description: Description for the ENI

Resources:
  PrimaryENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: !Ref Description
      SubnetId: !Ref SubnetId
      GroupSet: !Ref SecurityGroupIds
      SourceDestCheck: true
      PrivateIpAddresses:
        - PrivateIpAddress: !Select [0, !GetAZs ""]
        - PrivateIpAddress: !Select [1, !GetAZs ""]

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      EIP: !Ref EIP1
      NetworkInterfaceId: !Ref PrimaryENI

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      EIP: !Ref EIP2
      NetworkInterfaceId: !Ref PrimaryENI

Outputs:
  ENIId:
    Description: ID of the created ENI
    Value: !Ref PrimaryENI
  EIP1Address:
    Description: Elastic IP 1 address
    Value: !GetAtt EIP1.PublicIp
  EIP2Address:
    Description: Elastic IP 2 address
    Value: !GetAtt EIP2.PublicIp