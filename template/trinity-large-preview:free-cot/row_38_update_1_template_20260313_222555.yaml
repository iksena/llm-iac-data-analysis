AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template that creates a S3 bucket trigger lambda function

Parameters:
  BucketName:
    Type: String
    Default: my-s3-lambda-trigger-bucket
    Description: Name of the S3 bucket that will trigger the Lambda function

  LambdaFunctionName:
    Type: String
    Default: S3TriggerLambdaFunction
    Description: Name of the Lambda function

  LambdaRuntime:
    Type: String
    Default: python3.12
    Description: Lambda runtime environment
    AllowedValues:
      - python3.12
      - nodejs20.x
      - java17
      - dotnet6

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: !Ref LambdaRuntime
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import urllib.parse
          import boto3

          s3_client = boto3.client('s3')

          def lambda_handler(event, context):
              # Log the received event
              print("Received event: " + json.dumps(event, indent=2))

              # Get the bucket name and key from the event
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'])

              try:
                  # Get the object from S3
                  response = s3_client.get_object(Bucket=bucket, Key=key)
                  print("CONTENT TYPE: " + response['ContentType'])

                  # Return a successful response
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Success')
                  }
              except Exception as e:
                  print(e)
                  raise e
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
      Tags:
        - Key: Name
          Value: !Ref LambdaFunctionName
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Suspended
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref BucketName
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt LambdaFunction.Arn

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref 'AWS::AccountId'
      SourceArn: !Sub arn:aws:s3:::${BucketName}

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: lambda:InvokeFunction
            Resource: !GetAtt LambdaFunction.Arn
            Condition:
              ArnLike:
                AWS:SourceArn: !Sub arn:aws:s3:::${BucketName}

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
  S3BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket