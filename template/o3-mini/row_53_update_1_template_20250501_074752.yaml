AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready CloudFormation template to provision an AWS EMR Serverless Spark environment,
  including an S3 bucket for scripts and data, and an IAM role with permissions for S3 and CloudWatch Logs.
  
Resources:
  EmrServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EmrServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EmrServerlessS3andCloudWatchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !GetAtt EmrServerlessBucket.Arn
                  - !Sub "${EmrServerlessBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: "*"

  EmrServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: EMRServerlessSparkApp
      ReleaseLabel: emr-6.15.0
      Type: Spark
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        IdleTimeoutMinutes: 10

Outputs:
  EmrServerlessApplicationId:
    Description: "EMR Serverless Application ID"
    Value: !Ref EmrServerlessApplication
  S3BucketName:
    Description: "Name of the S3 bucket for scripts and data storage"
    Value: !Ref EmrServerlessBucket