AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ApplicationName:
    Type: String
    Default: SparkApp
    Description: Name for the EMR Serverless application
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  SubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: Base CIDR block for subnets
  LogRetention:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
    Description: CloudWatch Logs retention in days

Resources:
  EMRVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EMR-Serverless-VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EMRVPC
      CidrBlock: !Select [0, !Cidr [!Ref SubnetCidr, 2, 25]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EMRVPC
      CidrBlock: !Select [1, !Cidr [!Ref SubnetCidr, 2, 25]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EMRVPC
      Tags:
        - Key: Name
          Value: PrivateRouteTable

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref EMRVPC
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  EMRSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EMR Serverless
      VpcId: !Ref EMRVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EMR-Serverless-SG

  ScriptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Purpose
          Value: EMR-Serverless-Scripts

  ScriptsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ScriptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource: !Sub '${ScriptsBucket.Arn}/*'
            Condition:
              StringNotEquals:
                'aws:SourceVpc': !Ref EMRVPC

  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/emr-serverless/${ApplicationName}'
      RetentionInDays: !Ref LogRetention

  EMRRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRServerlessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ScriptsBucket.Arn
                  - !Sub '${ScriptsBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${CloudWatchLogsGroup.Arn}:*'
      Tags:
        - Key: Purpose
          Value: EMR-Serverless-Execution

  EMRApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      Name: !Ref ApplicationName
      InitialCapacity:
        - Key: Default
          Value:
            WorkerCount: 1
            WorkerConfiguration:
              Cpu: '4vCPU'
              Memory: '16GB'
              Disk: '64GB'
      MaximumCapacity:
        Cpu: '16vCPU'
        Memory: '64GB'
        Disk: '256GB'
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      NetworkConfiguration:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref EMRSecurityGroup
      JobRoleArn: !GetAtt EMRRole.Arn

Outputs:
  ApplicationId:
    Description: EMR Serverless Application ID
    Value: !Ref EMRApplication
  RoleArn:
    Description: IAM Role ARN for EMR Serverless
    Value: !GetAtt EMRRole.Arn
  ScriptsBucket:
    Description: S3 Bucket for scripts and data
    Value: !Ref ScriptsBucket
  VpcId:
    Description: VPC ID for network configuration
    Value: !Ref EMRVPC