AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  StripeAPIKey:
    Type: String
    NoEcho: true
    Default: sk_test_dummykey
    Description: Secure Stripe API key for authentication
  EventSourceName:
    Type: String
    Default: PartnerApp
    Description: Source name for events

Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventSourceName

  ApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayInvokeFullAccess

  StripeProductApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductAPI
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt ApiDestinationRole.Arn
      AuthorizationType: HTTP
      HttpParameters:
        HeaderParameters:
          Authorization: !Join
            - ' '
            - - 'Bearer'
              - !Ref StripeAPIKey

Outputs:
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref PartnerAppEventBus
  ApiDestinationArn:
    Description: API destination ARN
    Value: !GetAtt StripeProductApiDestination.Arn