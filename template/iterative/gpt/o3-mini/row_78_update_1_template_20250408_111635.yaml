AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a production-ready AWS EC2 IP Address Manager (IPAM) for managing IP address allocation.
Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: "Production IPAM for managing IP address allocations"
      OperatingRegions:
        - RegionName: !Ref "AWS::Region"
Outputs:
  IPAMArn:
    Description: "ARN of the created IPAM resource"
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IPAMArn"
  IPAMId:
    Description: "ID of the created IPAM resource"
    Value: !GetAtt IPAM.IpamId
    Export:
      Name: !Sub "${AWS::StackName}-IPAMId"
  DefaultPublicScopeId:
    Description: "Default Public Scope ID of the IPAM"
    Value: !GetAtt IPAM.DefaultScopePublicId
    Export:
      Name: !Sub "${AWS::StackName}-DefaultPublicScopeId"
  DefaultPrivateScopeId:
    Description: "Default Private Scope ID of the IPAM"
    Value: !GetAtt IPAM.DefaultScopePrivateId
    Export:
      Name: !Sub "${AWS::StackName}-DefaultPrivateScopeId"