AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted EFS file system in us-east-1a Availability Zone

Parameters:
  KMSKeyDescription:
    Type: String
    Default: 'Key for EFS encryption'
    Description: 'Description for the KMS key'
  PerformanceMode:
    Type: String
    Default: 'generalPurpose'
    AllowedValues:
      - 'generalPurpose'
      - 'maxIO'
    Description: 'Performance mode of the file system'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where the EFS mount target will be created'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet ID in us-east-1a for the mount target'

Resources:
  EFSKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KMSKeyDescription
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-default-1'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: 'alias/efs-encryption-key'
      TargetKeyId: !Ref EFSKMSKey

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for EFS mount target'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VpcId.CidrBlock

  EncryptedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !GetAtt EFSKMSKey.Arn
      PerformanceMode: !Ref PerformanceMode
      AvailabilityZoneName: 'us-east-1a'
      FileSystemTags:
        - Key: Name
          Value: 'EncryptedOneZoneEFS'

  MountTarget:
    Type: AWS::EFS::MountTarget
    DependsOn: 
      - MountTargetSecurityGroup
      - EncryptedFileSystem
    Properties:
      FileSystemId: !Ref EncryptedFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !GetAtt MountTargetSecurityGroup.GroupId

Outputs:
  FileSystemId:
    Description: 'The ID of the created EFS file system'
    Value: !Ref EncryptedFileSystem
  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt EFSKMSKey.Arn
  MountTargetSecurityGroupId:
    Description: 'Security Group ID for EFS access'
    Value: !Ref MountTargetSecurityGroup