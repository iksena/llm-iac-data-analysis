AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB table for ArtistId, Concert, and TicketSales

Resources:
  ConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConcertTicketSales
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref ConcertTicketSalesTable
    Export:
      Name: ConcertTicketSalesTableName