AWSTemplateFormatVersion: '2010-09-09'
Description: 'EMR Serverless environment with S3 bucket and IAM permissions'

Parameters:
  BucketName:
    Type: String
    Description: 'Name for the S3 bucket to store scripts and data'
    AllowedPattern: '^[a-z0-9-.]{3,63}$'
    ConstraintDescription: 'Bucket name must follow S3 naming rules'
  ApplicationName:
    Type: String
    Description: 'Name for the EMR Serverless application'
    Default: 'spark-emr-serverless-app'
  AutoStartEnabled:
    Type: String
    Description: 'Enable auto-start for the EMR Serverless application (true/false)'
    Default: 'true'
    AllowedValues: ['true', 'false']
  AutoStopEnabled:
    Type: String
    Description: 'Enable auto-stop for the EMR Serverless application (true/false)'
    Default: 'true'
    AllowedValues: ['true', 'false']

Resources:
  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256

  EMRServerlessServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: emr-serverless.amazonaws.com
          Action: sts:AssumeRole
      Path: /
      Policies:
      - PolicyName: S3AccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
            Resource:
            - !Sub 'arn:aws:s3:::${BucketName}'
            - !Sub 'arn:aws:s3:::${BucketName}/*'
      - PolicyName: CloudWatchLogsPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            - logs:DescribeLogGroups
            - logs:DescribeLogStreams
            Resource: 'arn:aws:logs:*:*:*'

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref ApplicationName
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      AutoStartConfiguration:
        Enabled: !Equals [!Ref AutoStartEnabled, 'true']
      AutoStopConfiguration:
        Enabled: !Equals [!Ref AutoStopEnabled, 'true']
        IdleTimeoutMinutes: 15
      InitialCapacity:
      - WorkerType: DRIVER
        WorkerCount: 1
        WorkerConfiguration:
          Cpu: '4vCPU'
          Memory: '16GB'
      MaximumCapacity:
        Cpu: '16vCPU'
        Memory: '64GB'

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket for scripts and data'
    Value: !Ref BucketName
  EMRServerlessAppId:
    Description: 'ID of the EMR Serverless application'
    Value: !Ref EMRServerlessApplication
  EMRServerlessRoleArn:
    Description: 'ARN of the IAM role for EMR Serverless'
    Value: !GetAtt EMRServerlessServiceRole.Arn