AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Config setup with customizable retention policies and delivery configurations

Parameters:
  S3BucketName:
    Type: String
    Default: ''
    Description: Name of existing S3 bucket for configuration snapshots (leave empty to create new)
  S3BucketPrefix:
    Type: String
    Default: 'aws-config/'
    Description: Prefix for S3 bucket (for organizing snapshots)
  S3KeyPrefix:
    Type: String
    Default: 'AWSLogs/{{AWS::AccountId}}/Config/'
    Description: Key prefix for S3 bucket (for organizing snapshots)
  DeliveryFrequency:
    Type: String
    Default: 'One_Hour'
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
    Description: Frequency of configuration snapshot delivery
  RetentionPeriod:
    Type: Number
    Default: 2557
    Description: Retention period in days (default: 2557 days)
  NotificationEmail:
    Type: String
    Default: 'admin@example.com'
    Description: Email address for SNS notifications
  IAMPermissionBoundary:
    Type: String
    Default: ''
    Description: IAM permission boundary ARN (optional)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Condition: CreateNewS3Bucket
    Properties:
      BucketName: !If [CreateNewS3Bucket, !Ref 'AWS::AccountId', !Ref 'AWS::NoValue']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt S3Bucket.Arn
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${S3Bucket.Arn}/${S3KeyPrefix}*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ConfigBucket'

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Config Notifications
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ConfigTopic'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Ref IAMPermissionBoundary
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:Put*
                  - config:Get*
                  - config:Describe*
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-LambdaRole'

  RetentionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              config = boto3.client('config')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      retention_period = event['ResourceProperties']['RetentionPeriod']
                      config.put_configuration_recorder(
                          ConfigurationRecorderName='default',
                          ConfigurationRecorderConfiguration={
                              'recordingGroup': {
                                  'allSupported': True,
                                  'includeGlobalResourceTypes': True,
                                  'resourceTypes': []
                              }
                          }
                      )
                      config.put_retention_configuration(
                          RetentionPeriodInDays=retention_period
                      )
                      response_data = {'Status': 'SUCCESS'}
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  response_data = {'Status': 'FAILURE', 'Reason': str(e)}
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: default
      RecordingGroup:
        allSupported: true
        includeGlobalResourceTypes: true
        resourceTypes: []
      RoleARN: !GetAtt ConfigRole.Arn

  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Ref IAMPermissionBoundary
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSConfigRole
      Policies:
        - PolicyName: ConfigPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: !If [CreateNewS3Bucket, !GetAtt S3Bucket.Arn, !Sub 'arn:aws:s3:::${S3BucketName}']
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SNSTopic
              - Effect: Allow
                Action:
                  - config:Put*
                  - config:Get*
                  - config:Describe*
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ConfigRole'

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      Name: default
      S3BucketName: !If [CreateNewS3Bucket, !Ref 'AWS::AccountId', !Ref S3BucketName]
      S3KeyPrefix: !Ref S3BucketPrefix
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency
      SNSTopicARN: !Ref SNSTopic

  RetentionCustomResource:
    Type: Custom::RetentionManager
    Properties:
      ServiceToken: !GetAtt RetentionLambdaFunction.Arn
      RetentionPeriod: !Ref RetentionPeriod

Conditions:
  CreateNewS3Bucket: !Equals [!Ref S3BucketName, '']

Outputs:
  S3BucketName:
    Description: S3 Bucket Name
    Value: !If [CreateNewS3Bucket, !Ref 'AWS::AccountId', !Ref S3BucketName]
  S3BucketArn:
    Description: S3 Bucket ARN
    Value: !If [CreateNewS3Bucket, !GetAtt S3Bucket.Arn, !Sub 'arn:aws:s3:::${S3BucketName}']
  SNSTopicArn:
    Description: SNS Topic ARN
    Value: !Ref SNSTopic
  ConfigRecorderName:
    Description: Config Recorder Name
    Value: default
  ConfigDeliveryChannelName:
    Description: Config Delivery Channel Name
    Value: default