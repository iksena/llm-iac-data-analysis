AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM role for AWS Service Catalog. This role enables secure provisioning
  and management of S3 and Lambda resources by attaching pre-defined managed policies and an inline policy
  with granular permissions for Service Catalog operations, IAM, Lambda, CloudFormation, and SNS.

Resources:
  ServiceCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogProvisioningRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceCatalogGranularPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ServiceCatalog operations
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:ListProvisionedProductPlans
                  - servicecatalog:DescribeRecord
                Resource: "*"
              # IAM role and policy management
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRoles
                  - iam:GetRole
                Resource: "*"
              # Lambda lifecycle actions
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:ListFunctions
                Resource: "*"
              # CloudFormation stack operations
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: "*"
              # SNS integration for notifications
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"

Outputs:
  RoleName:
    Description: "The name of the created IAM role."
    Value: !Ref ServiceCatalogRole
  RoleArn:
    Description: "The ARN of the created IAM role."
    Value: !GetAtt ServiceCatalogRole.Arn