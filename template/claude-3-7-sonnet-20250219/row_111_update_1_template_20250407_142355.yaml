AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge integration with DataDog for centralized log forwarding'

Parameters:
  DataDogApiKey:
    Type: String
    Description: DataDog API key for authentication
    NoEcho: true
  
  DataDogEndpoint:
    Type: String
    Default: 'https://http-intake.logs.datadoghq.com/api/v2/logs'
    Description: DataDog log ingestion endpoint URL
  
  EventSourceName:
    Type: String
    Default: 'MyDataDogApp'
    Description: Name of the event source

Resources:
  # Dead Letter Queue for failed log deliveries
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600  # 14 days
      VisibilityTimeout: 30
      QueueName: !Sub '${AWS::StackName}-DeadLetterQueue'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DeadLetterQueue'

  # Queue Policy to allow EventBridge to send messages to the queue
  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt EventBridgeRule.Arn

  # IAM Role for EventBridge to invoke the API destination
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:api-destination/${DataDogApiDestination}/*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  # EventBridge Event Bus
  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-DataDogEventBus'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DataDogEventBus'

  # EventBridge Connection to DataDog
  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKey:
          Key: 'DD-API-KEY'
          Value: !Ref DataDogApiKey
      Name: !Sub '${AWS::StackName}-DataDogConnection'
      Description: 'Connection to DataDog API for log forwarding'

  # EventBridge API Destination
  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      InvocationEndpoint: !Ref DataDogEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300
      Name: !Sub '${AWS::StackName}-DataDogApiDestination'
      Description: 'API Destination for DataDog log ingestion'

  # EventBridge Rule to route events to DataDog
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-DataDogForwardingRule'
      Description: 'Rule to forward logs to DataDog'
      EventBusName: !Ref EventBridgeBus
      EventPattern:
        source:
          - !Ref EventSourceName
      State: ENABLED
      Targets:
        - Id: DataDogTarget
          Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge event bus
    Value: !GetAtt EventBridgeBus.Arn
  
  DeadLetterQueueUrl:
    Description: The URL of the dead-letter queue for failed log deliveries
    Value: !Ref DeadLetterQueue
  
  ApiDestinationArn:
    Description: The ARN of the DataDog API destination
    Value: !GetAtt DataDogApiDestination.Arn