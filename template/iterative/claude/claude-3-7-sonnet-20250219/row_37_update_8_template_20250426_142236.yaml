AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating secure S3 buckets with replication and logging'

Parameters:
  MainBucketName:
    Type: String
    Description: Name for the main S3 bucket
    Default: secure-main-bucket

  ReplicaBucketName:
    Type: String
    Description: Name for the replica S3 bucket
    Default: secure-replica-bucket

  LogBucketName:
    Type: String
    Description: Name for the access logs S3 bucket
    Default: secure-logs-bucket

  ReplicationEnabled:
    Type: String
    Description: Enable replication to the replica bucket
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  ReplicationIsEnabled: !Equals [!Ref ReplicationEnabled, 'true']

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref LogBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 365
            NoncurrentVersionExpirationInDays: 90

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${LogBucket}'
              - !Sub 'arn:aws:s3:::${LogBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ReplicaBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: replica-bucket-logs/

  ReplicaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReplicaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${ReplicaBucket}'
              - !Sub 'arn:aws:s3:::${ReplicaBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  MainBucketNoReplication:
    Type: AWS::S3::Bucket
    Condition: !Not [ReplicationIsEnabled]
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref MainBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: main-bucket-logs/

  ReplicationRole:
    Type: AWS::IAM::Role
    Condition: ReplicationIsEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  MainBucketWithReplication:
    Type: AWS::S3::Bucket
    Condition: ReplicationIsEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn:
      - ReplicationRole
      - ReplicaBucket
    Properties:
      BucketName: !Ref MainBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: main-bucket-logs/
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Id: ReplicateEverything
            Status: Enabled
            Prefix: ''
            Destination:
              Bucket: !GetAtt ReplicaBucket.Arn

  MainBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !If [ReplicationIsEnabled, !Ref MainBucketWithReplication, !Ref MainBucketNoReplication]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${MainBucketName}'
              - !Sub 'arn:aws:s3:::${MainBucketName}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

Outputs:
  MainBucketName:
    Description: Name of the main secure bucket
    Value: !If [ReplicationIsEnabled, !Ref MainBucketWithReplication, !Ref MainBucketNoReplication]

  MainBucketARN:
    Description: ARN of the main secure bucket
    Value: !If [ReplicationIsEnabled, !GetAtt MainBucketWithReplication.Arn, !GetAtt MainBucketNoReplication.Arn]

  ReplicaBucketName:
    Description: Name of the replica bucket
    Value: !Ref ReplicaBucket

  ReplicaBucketARN:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn

  LogBucketName:
    Description: Name of the logging bucket
    Value: !Ref LogBucket

  LogBucketARN:
    Description: ARN of the logging bucket
    Value: !GetAtt LogBucket.Arn