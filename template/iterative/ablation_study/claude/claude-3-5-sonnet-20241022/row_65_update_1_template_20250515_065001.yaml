AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Hello World Lambda function using Node.js 20.x'

Resources:
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  HelloWorldFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-hello-world'
      Handler: 'index.handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log('Hello World');
              const response = {
                  statusCode: 200,
                  body: JSON.stringify('Hello World!'),
              };
              return response;
          };
      Runtime: nodejs20.x
      Timeout: 3
      MemorySize: 128
      Environment:
        Variables:
          STACK_NAME: !Ref 'AWS::StackName'

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt HelloWorldFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-function-arn'
  
  LambdaFunctionName:
    Description: 'Name of the Lambda function'
    Value: !Ref HelloWorldFunction
    Export:
      Name: !Sub '${AWS::StackName}-function-name'
  
  LambdaRoleArn:
    Description: 'ARN of the Lambda IAM Role'
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-role-arn'