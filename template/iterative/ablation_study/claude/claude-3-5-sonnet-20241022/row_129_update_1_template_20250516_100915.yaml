AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Config Setup with Customizable Retention and Security Controls'

Parameters:
  ConfigRetentionDays:
    Type: Number
    Default: 2557
    Description: 'Number of days to retain AWS Config data'
    MinValue: 30
    MaxValue: 7300

  DeliveryFrequency:
    Type: String
    Default: 'Six_Hours'
    AllowedValues:
      - 'One_Hour'
      - 'Three_Hours'
      - 'Six_Hours'
      - 'Twelve_Hours'
      - 'TwentyFour_Hours'
    Description: 'The frequency with which AWS Config delivers configuration snapshots'

  ExistingS3BucketName:
    Type: String
    Description: 'Optional: Existing S3 bucket name for AWS Config data'
    Default: ''

  EnablePermissionBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Enable IAM permission boundary for AWS Config role'

  EnableGlobalResourceRecording:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: 'Enable recording of global resources'

Conditions:
  CreateNewBucket: !Equals [!Ref ExistingS3BucketName, '']
  UsePermissionBoundary: !Equals [!Ref EnablePermissionBoundary, 'true']
  RecordGlobalResources: !Equals [!Ref EnableGlobalResourceRecording, 'true']

Resources:
  ConfigBucket:
    Type: 'AWS::S3::Bucket'
    Condition: CreateNewBucket
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ConfigBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Condition: CreateNewBucket
    Properties:
      Bucket: !Ref ConfigBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}'
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

  ConfigTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      KmsMasterKeyId: alias/aws/sns

  ConfigTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref ConfigTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSConfigSNSPolicy
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sns:Publish
            Resource: !Ref ConfigTopic

  ConfigRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole
      PermissionsBoundary: !If
        - UsePermissionBoundary
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/ConfigPermissionBoundary'
        - !Ref 'AWS::NoValue'

  ConfigurationRecorder:
    Type: 'AWS::Config::ConfigurationRecorder'
    Properties:
      RoleARN: !GetAtt ConfigRole.Arn
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResources: !Ref EnableGlobalResourceRecording
      
  ConfigurationRecorderStatus:
    Type: 'AWS::Config::ConfigurationRecorderStatus'
    Properties:
      ConfigurationRecorderName: !Ref ConfigurationRecorder
      Recording: true
    DependsOn: ConfigurationRecorder

  DeliveryChannel:
    Type: 'AWS::Config::DeliveryChannel'
    Properties:
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency
      S3BucketName: !If [CreateNewBucket, !Ref ConfigBucket, !Ref ExistingS3BucketName]
      SnsTopicARN: !Ref ConfigTopic
    DependsOn: ConfigurationRecorder

  RetentionFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      Handler: index.handler
      Role: !GetAtt RetentionLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      config = boto3.client('config')
                      retention_days = event['ResourceProperties']['RetentionDays']
                      config.put_retention_configuration(
                          RetentionPeriodInDays=int(retention_days)
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
      Runtime: python3.9
      Timeout: 30
      MemorySize: 128

  RetentionLambdaRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigRetentionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: config:PutRetentionConfiguration
                Resource: '*'

  RetentionConfiguration:
    Type: 'Custom::ConfigRetention'
    Properties:
      ServiceToken: !GetAtt RetentionFunction.Arn
      RetentionDays: !Ref ConfigRetentionDays

Outputs:
  ConfigBucketName:
    Description: 'Name of the AWS Config S3 bucket'
    Value: !If [CreateNewBucket, !Ref ConfigBucket, !Ref ExistingS3BucketName]

  ConfigTopicARN:
    Description: 'ARN of the AWS Config SNS topic'
    Value: !Ref ConfigTopic

  ConfigRoleARN:
    Description: 'ARN of the AWS Config IAM role'
    Value: !GetAtt ConfigRole.Arn