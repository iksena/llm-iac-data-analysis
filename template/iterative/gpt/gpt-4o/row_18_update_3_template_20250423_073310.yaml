AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with Amazon EventBridge using EventBridge Pipes.

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserTable
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventBus

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub arn:aws:events:${AWS::AccountId}:event-bus/UserEventBus

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !Sub arn:aws:events:${AWS::AccountId}:event-bus/UserEventBus
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 100
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: "DynamoDB Stream Event"
          Source: "com.mycompany.dynamodb"
      FilterCriteria:
        Filters:
          - Pattern: '{"dynamodb": {"NewImage": {"avatarUrl": {"S": [{"suffix": ".png"}]}}}}'

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB Table
    Value: !Ref DynamoDBTable

  EventBusName:
    Description: Name of the EventBridge Event Bus
    Value: !Ref EventBus

  EventBridgePipeName:
    Description: Name of the EventBridge Pipe
    Value: !Ref EventBridgePipe