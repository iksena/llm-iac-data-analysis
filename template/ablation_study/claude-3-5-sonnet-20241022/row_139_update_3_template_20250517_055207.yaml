AWSTemplateFormatVersion: '2010-09-09'
Description: 'Custom resource calculator using Lambda for arithmetic operations'

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for arithmetic operation
    Default: 10
  
  SecondNumber:
    Type: Number
    Description: Second number for arithmetic operation
    Default: 5
  
  Operator:
    Type: String
    Description: Arithmetic operator to use
    AllowedValues: 
      - 'add'
      - 'subtract'
      - 'multiply'
      - 'divide'
    Default: 'add'
  
  SimulateFailure:
    Type: String
    Description: Simulate custom resource failure for testing
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'false'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CalculatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              response_data = {}
              
              try:
                  logger.info('Received event: %s', event)
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      props = event['ResourceProperties']
                      first = float(props['FirstNumber'])
                      second = float(props['SecondNumber'])
                      operator = props['Operator']
                      simulate_failure = props.get('SimulateFailure', 'false').lower() == 'true'
                      
                      if simulate_failure:
                          raise Exception("Simulated failure requested")
                      
                      result = None
                      if operator == 'add':
                          result = first + second
                      elif operator == 'subtract':
                          result = first - second
                      elif operator == 'multiply':
                          result = first * second
                      elif operator == 'divide':
                          if second == 0:
                              raise ValueError("Division by zero")
                          result = first / second
                      
                      response_data = {
                          'Result': str(result),
                          'Operation': f"{first} {operator} {second}",
                          'Error': ''
                      }
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  response_data = {
                      'Result': '',
                      'Operation': '',
                      'Error': str(e)
                  }
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      
      Timeout: 30
      MemorySize: 128

  CalculatorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${CalculatorFunction}'
      RetentionInDays: 14

  CalculatorHelper:
    Type: Custom::Helper
    Properties:
      ServiceToken: !GetAtt CalculatorFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CalculatorHelper.Result

  Operation:
    Description: Operation performed
    Value: !GetAtt CalculatorHelper.Operation

  ErrorMessage:
    Description: Error message if operation failed
    Value: !GetAtt CalculatorHelper.Error