AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure EC2 instance deployment with VPC networking'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large
      - m5.xlarge
    ConstraintDescription: Must be a valid EC2 instance type

  KeyPairName:
    Description: Name of an existing EC2 KeyPair (leave blank if using SSM)
    Type: String
    Default: ""
    ConstraintDescription: Must be the name of an existing EC2 KeyPair or empty

  SSHLocation:
    Description: Allowed SSH IP range (CIDR)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid CIDR range

  VpcId:
    Description: Target VPC ID
    Type: AWS::EC2::VPC::Id
    ConstraintDescription: Must be a valid VPC ID

  SubnetId:
    Description: Target subnet ID in the selected VPC
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: Must be a valid subnet ID

  AmiId:
    Description: AMI ID for the instance (e.g., ami-0abcdef1234567890)
    Type: String
    MinLength: 12
    MaxLength: 21
    AllowedPattern: '^ami-[0-9a-f]{8,17}$'
    ConstraintDescription: Must be a valid AMI ID starting with 'ami-'

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0e5b6b6a9f3db6db8
    eu-west-1:
      AMI: ami-0d1bf5b68307103c2

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  UseDefaultAMI: !Equals [!Ref AmiId, ""]

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2InstanceSecurityGroup

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles: [!Ref EC2InstanceRole]

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !If [UseDefaultAMI, !FindInMap [RegionMap, !Ref "AWS::Region", AMI], !Ref AmiId]
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!Ref EC2SecurityGroup]
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: ProductionEC2Instance
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true

Outputs:
  InstanceId:
    Description: Instance ID of the deployed EC2
    Value: !Ref EC2Instance

  InstancePublicIP:
    Description: Public IP address
    Value: !GetAtt EC2Instance.PublicIp

  InstancePrivateIP:
    Description: Private IP address
    Value: !GetAtt EC2Instance.PrivateIp

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref EC2SecurityGroup

  VpcIdUsed:
    Description: VPC ID used for deployment
    Value: !Ref VpcId

  AMIUsed:
    Description: AMI ID used for deployment
    Value: !If [UseDefaultAMI, !FindInMap [RegionMap, !Ref "AWS::Region", AMI], !Ref AmiId]