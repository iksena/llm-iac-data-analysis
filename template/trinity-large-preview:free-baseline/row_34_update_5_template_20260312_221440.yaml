AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a MySQL RDS instance with Provisioned IOPS in a VPC

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  Subnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the first private subnet
  Subnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the second private subnet
  DBInstanceClass:
    Type: String
    Default: db.r5.large
    Description: DB instance class
  DBStorage:
    Type: Number
    Default: 100
    Description: DB storage size in GB
  DBStorageType:
    Type: String
    Default: io1
    Description: DB storage type
  DBEngine:
    Type: String
    Default: mysql
    Description: DB engine
  DBEngineVersion:
    Type: String
    Default: '8.0'
    Description: DB engine version
  DBName:
    Type: String
    Default: mydatabase
    Description: DB name
  DBMasterUsername:
    Type: String
    Default: admin
    Description: DB master username
  DBPort:
    Type: Number
    Default: 3306
    Description: DB port
  DBParameterGroupFamily:
    Type: String
    Default: mysql8.0
    Description: DB parameter group family
  DBBackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: DB backup retention period in days
  DBMaintenanceWindow:
    Type: String
    Default: 'sun:05:00-sun:06:00'
    Description: DB maintenance window
  DBMultiAZDeployment:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: DB multi-AZ deployment
  DBPubliclyAccessible:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: DB publicly accessible
  DBDeletionProtection:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: DB deletion protection
  DBCopyTagsToSnapshot:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: DB copy tags to snapshot
  DBAutoMinorVersionUpgrade:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: DB auto minor version upgrade
  DBStorageEncrypted:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: DB storage encrypted

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DBPort
          ToPort: !Ref DBPort
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DBSecurityGroup

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DBSubnetGroup

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBStorage
      StorageType: !Ref DBStorageType
      Engine: !Ref DBEngine
      EngineVersion: !Ref DBEngineVersion
      DBName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      Port: !Ref DBPort
      DBParameterGroupName: !Ref DBParameterGroupFamily
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: !Ref DBBackupRetentionPeriod
      PreferredMaintenanceWindow: !Ref DBMaintenanceWindow
      MultiAZ: !Ref DBMultiAZDeployment
      PubliclyAccessible: !Ref DBPubliclyAccessible
      DeletionProtection: !Ref DBDeletionProtection
      CopyTagsToSnapshot: !Ref DBCopyTagsToSnapshot
      AutoMinorVersionUpgrade: !Ref DBAutoMinorVersionUpgrade
      StorageEncrypted: !Ref DBStorageEncrypted
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RDSInstance

Outputs:
  DBEndpointAddress:
    Description: DB endpoint address
    Value: !GetAtt RDSInstance.Endpoint.Address
  DBName:
    Description: DB name
    Value: !Ref DBName
  DBPort:
    Description: DB port
    Value: !Ref DBPort
  DBInstanceIdentifier:
    Description: DB instance identifier
    Value: !Ref RDSInstance
  DBSubnetGroupName:
    Description: DB subnet group name
    Value: !Ref DBSubnetGroup
  DBSecurityGroupID:
    Description: DB security group ID
    Value: !GetAtt DBSecurityGroup.GroupId