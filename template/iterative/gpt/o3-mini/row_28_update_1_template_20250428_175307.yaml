AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an automated monitoring and notification system for AWS Secrets Manager secret lifecycle events.
Parameters:
  NotificationEmail:
    Description: "Email address to receive SNS notifications for AWS Secrets Manager events."
    Type: String
Resources:
  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "SecretsManagerLifecycleAlerts"
      TopicName: "SecretsManagerLifecycleAlertsTopic"
  
  SecretsManagerSNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref NotificationEmail
      TopicArn: !Ref SecretsManagerSNSTopic
  
  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Rule to capture AWS Secrets Manager lifecycle events (creation, update, access) via CloudTrail and notify SNS."
      EventPattern:
        source:
          - "aws.secretsmanager"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventName:
            - "CreateSecret"
            - "UpdateSecret"
            - "GetSecretValue"
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SecretsManagerSNSTopic
Outputs:
  SNSTopicARN:
    Description: "ARN of the SNS Topic for Secrets Manager lifecycle alerts."
    Value: !Ref SecretsManagerSNSTopic
  EventRuleName:
    Description: "Name of the EventBridge rule that monitors Secrets Manager events."
    Value: !GetAtt SecretsManagerEventRule.Name