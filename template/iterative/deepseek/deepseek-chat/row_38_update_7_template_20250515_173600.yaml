AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for S3 bucket trigger lambda function

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket that will trigger the Lambda function
    Default: my-s3-trigger-bucket
  LambdaFunctionName:
    Type: String
    Description: Name of the Lambda function to be triggered by S3
    Default: s3-trigger-lambda-function

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Description: Lambda function triggered by S3 events
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              print("Received S3 event: " + json.dumps(event))
              return {
                  'statusCode': 200,
                  'body': json.dumps('S3 event processed successfully')
              }
      Timeout: 30
      MemorySize: 128

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${BucketName}"
      SourceAccount: !Ref "AWS::AccountId"

  BucketNotification:
    Type: Custom::S3BucketNotification
    Properties:
      ServiceToken: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:aws-cfn-s3-notification"
      BucketName: !Ref BucketName
      NotificationConfiguration:
        LambdaFunctionConfigurations:
          - Event: "s3:ObjectCreated:*"
            LambdaFunctionArn: !GetAtt LambdaFunction.Arn

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref BucketName
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  LambdaExecutionRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn