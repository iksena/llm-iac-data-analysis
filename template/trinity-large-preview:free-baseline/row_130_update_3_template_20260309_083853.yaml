AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create and manage an AWS account-wide IAM password policy with customizable security requirements.

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum length of the password policy (6-128 characters)
  RequireUppercaseCharacters:
    Type: String
    AllowedValues: ["True", "False"]
    Default: "True"
    Description: Whether to require at least one uppercase character
  RequireLowercaseCharacters:
    Type: String
    AllowedValues: ["True", "False"]
    Default: "True"
    Description: Whether to require at least one lowercase character
  RequireNumbers:
    Type: String
    AllowedValues: ["True", "False"]
    Default: "True"
    Description: Whether to require at least one number
  RequireSymbols:
    Type: String
    AllowedValues: ["True", "False"]
    Default: "True"
    Description: Whether to require at least one non-alphanumeric character
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Number of days before password expiration (1-1095 days)
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to prevent reuse (1-24)
  AllowUsersToChangePassword:
    Type: String
    AllowedValues: ["True", "False"]
    Default: "True"
    Description: Whether users can change their own passwords
  PermissionBoundaryArn:
    Type: String
    Default: ""
    Description: Optional IAM permission boundary ARN to apply to the Lambda role

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'
      Path: /
      PermissionsBoundary: !If [HasPermissionBoundary, !Ref PermissionBoundaryArn, !Ref "AWS::NoValue"]

  IAMPasswordPolicy:
    Type: AWS::IAM::AccountPasswordPolicy
    Properties:
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

Conditions:
  HasPermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryArn, ""]]

Outputs:
  IAMPasswordPolicyStatus:
    Description: Status of the IAM password policy
    Value: "Applied successfully"