AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AWS Glue ETL job infrastructure

Parameters:
  BucketName:
    Type: String
    Default: glue-scripts-and-logs-${AWS::AccountId}
    Description: Name of the S3 bucket for Glue scripts and Spark logs
  GlueJobName:
    Type: String
    Default: sample-convert-job
    Description: Name of the Glue ETL job
  ScriptPath:
    Type: String
    Default: glue_scripts/sample_convert.py
    Description: S3 path to the Python script for the Glue job
  GlueVersion:
    Type: String
    Default: '4.0'
    Description: Glue version for the ETL job
    AllowedValues: ['1.0', '2.0', '3.0', '4.0']

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      LifecycleConfiguration:
        Rules:
          - Id: LogsExpirationRule
            Status: Enabled
            ExpirationInDays: 30
            Prefix: logs/

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${BucketName}/*

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: glueetl
        ScriptLocation: !Sub s3://${BucketName}/${ScriptPath}
      DefaultArguments:
        '--job-language': python
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-metrics': ''
      ExecutionProperty:
        MaxConcurrentRuns: 1
      MaxRetries: 0
      WorkerType: G.1X
      NumberOfWorkers: 10

Outputs:
  BucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref BucketName
  GlueJobName:
    Description: Name of the Glue ETL job
    Value: !Ref GlueJobName
  GlueServiceRoleARN:
    Description: ARN of the IAM role for Glue
    Value: !GetAtt GlueServiceRole.Arn