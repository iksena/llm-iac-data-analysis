AWSTemplateFormatVersion: '2010-09-09'
Description: Redis ElastiCache cluster with SSM-enabled EC2 instance

Parameters:
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for deployment
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 1 for Redis
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet 2 for Redis
  PublicSubnet:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for EC2 instance
  AMI:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for EC2 instance
  RedisAuthToken:
    Type: String
    Description: Redis auth token (password)
    NoEcho: true
  EC2UserData:
    Type: String
    Description: Base64-encoded user data for EC2 instance

Resources:
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for Redis cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Redis cluster
      VpcId: !Ref VPC

  RedisSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RedisSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref EC2SecurityGroup

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      AtRestEncryptionEnabled: true
      AuthToken: !Ref RedisAuthToken
      AutomaticFailoverEnabled: true
      CacheNodeType: cache.t3.micro
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      Engine: redis
      NumCacheClusters: 2
      Port: 6379
      ReplicationGroupDescription: Redis cluster for caching solution
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      TransitEncryptionEnabled: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance
      VpcId: !Ref VPC

  EC2SecurityGroupIngressSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMI
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !Ref PublicSubnet
      UserData: !Ref EC2UserData

Outputs:
  RedisPrimaryEndpoint:
    Description: Primary endpoint of Redis cluster
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
  EC2InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance