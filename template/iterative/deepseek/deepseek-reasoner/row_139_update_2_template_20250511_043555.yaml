AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  FirstNumber:
    Type: Number
    Description: First operand for the arithmetic operation
  SecondNumber:
    Type: Number
    Description: Second operand for the arithmetic operation
  Operator:
    Type: String
    AllowedValues: ['+', '-', '*', '/']
    Description: Arithmetic operator to apply
  SimulateFailure:
    Type: String
    Default: ''
    Description: Enter any value to force resource failure (testing only)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import urllib.request

          def handler(event, context):
              response_data = {}
              try:
                  props = event['ResourceProperties']
                  
                  if props.get('SimulateFailure', ''):
                      raise ValueError('Simulated failure requested')

                  a = int(props['FirstNumber'])
                  b = int(props['SecondNumber'])
                  op = props['Operator']

                  if op == '+': result = a + b
                  elif op == '-': result = a - b
                  elif op == '*': result = a * b
                  elif op == '/':
                      if b == 0: raise ZeroDivisionError('Division by zero')
                      result = a / b
                  else: raise ValueError('Invalid operator')

                  response_data['Result'] = str(result)
                  response_data['RequestId'] = event['RequestId']
                  status = 'SUCCESS'
              except Exception as e:
                  response_data['Error'] = str(e)
                  status = 'FAILED'

              response = {
                  'Status': status,
                  'Reason': 'Operation completed' if status == 'SUCCESS' else response_data['Error'],
                  'PhysicalResourceId': event.get('PhysicalResourceId', 'ArithmeticHelper'),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }

              req = urllib.request.Request(
                  event['ResponseURL'],
                  data=json.dumps(response).encode('utf-8'),
                  headers={'Content-Type': 'application/json'},
                  method='PUT'
              )
              urllib.request.urlopen(req)

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ArithmeticFunction.Arn
      Principal: cloudformation.amazonaws.com

  ArithmeticResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Value: !GetAtt ArithmeticResource.Result
  OperationRequestId:
    Value: !GetAtt ArithmeticResource.RequestId