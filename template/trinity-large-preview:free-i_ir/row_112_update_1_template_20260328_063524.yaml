AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W9002

  MyQueue:
    Type: AWS::SQS::Queue
    Properties: {}

  BucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref MyBucket
      QueueConfigurations:
        - Event: s3:ObjectCreated:*
          QueueArn: !GetAtt MyQueue.Arn
    DependsOn:
      - MyBucket
      - MyQueue

Outputs:
  BucketName:
    Value: !Ref MyBucket
  QueueUrl:
    Value: !Ref MyQueue