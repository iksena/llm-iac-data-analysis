AWSTemplateFormatVersion: '2010-09-09'

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTDataTopic

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref SNSTopic
      RoleArn: !GetAtt IoTTopicRuleRole.Arn

  IoTTopicRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTLoggingPolicy

Outputs:
  SQSQueueARN:
    Description: ARN of the SQS Queue
    Value: !GetAtt SQSQueue.Arn
    Export:
      Name: IoTDataSQSQueueARN

  SNSTopicARN:
    Description: ARN of the SNS Topic
    Value: !Ref SNSTopic
    Export:
      Name: IoTDataSNSTopicARN