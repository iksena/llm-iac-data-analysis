AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an integration between DynamoDB streams and Amazon EventBridge.

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyDynamoDBTable
    Description: The name of the DynamoDB table
  EventBridgeBusName:
    Type: String
    Default: my-event-bus
    Description: The name of the EventBridge bus

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBridgeBusName

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeBusName
      EventPattern:
        source:
          - com.example.user.avatar
        detail-type:
          - UserAvatarUpdated
        detail:
          avatarUrl:
            - prefix: "*.png"
      Targets:
        - Arn: !GetAtt DynamoDBTable.StreamArn
          Id: DynamoDBStreamTarget

Outputs:
  DynamoDBTableName:
    Description: The name of the DynamoDB table
    Value: !Ref DynamoDBTableName
  EventBridgeBusName:
    Description: The name of the EventBridge bus
    Value: !Ref EventBridgeBusName
  EventBridgeRuleName:
    Description: The name of the EventBridge rule
    Value: !Ref EventBridgeRule