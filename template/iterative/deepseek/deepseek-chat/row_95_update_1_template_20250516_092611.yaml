AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM automation for Nginx deployment'

Parameters:
  InstanceType:
    Description: 'EC2 instance type'
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    ConstraintDescription: 'Must be a valid EC2 instance type'
  KeyPairName:
    Description: 'Name of an existing EC2 KeyPair to enable SSH access'
    Type: String
    Default: ''

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: 'ami-0cff7528ff583bf9a'
    us-east-2:
      AMI: 'ami-0e01ce4ee18447327'
    us-west-1:
      AMI: 'ami-0d9858aa3c6322f73'
    us-west-2:
      AMI: 'ami-0d1cd67c26f5fca19'
    eu-west-1:
      AMI: 'ami-0bbc25e23a7640b9b'
    ap-southeast-1:
      AMI: 'ami-0f74c08b8b5effa56'

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMInstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable HTTP access and SSH access'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: NginxWebServer
        - Key: nginx
          Value: 'Yes'
        - Key: Environment
          Value: Production

  NginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: 'Automation for OS updates, Nginx installation and validation'
        parameters:
          InstanceId:
            type: 'String'
            description: 'Instance ID to target'
        mainSteps:
          - name: UpdateOS
            action: 'aws:runCommand'
            inputs:
              DocumentName: 'AWS-RunShellScript'
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - 'sudo yum update -y'
                  - 'if [ -f /var/run/reboot-required ]; then sudo reboot; fi'
          - name: InstallNginx
            action: 'aws:runCommand'
            inputs:
              DocumentName: 'AWS-RunShellScript'
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - 'sudo amazon-linux-extras install -y nginx1'
                  - 'sudo systemctl start nginx'
                  - 'sudo systemctl enable nginx'
          - name: ValidateNginx
            action: 'aws:runCommand'
            inputs:
              DocumentName: 'AWS-RunShellScript'
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - 'response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)'
                  - 'if [ "$response" -eq 200 ]; then echo "Nginx is running successfully"; else exit 1; fi'

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Outputs:
  InstanceId:
    Description: 'Instance ID of the Nginx web server'
    Value: !Ref WebServerInstance
  AutomationDocumentName:
    Description: 'Name of the SSM Automation document'
    Value: !Ref NginxAutomationDocument
  InstancePublicDNS:
    Description: 'Public DNS name of the instance'
    Value: !GetAtt WebServerInstance.PublicDnsName