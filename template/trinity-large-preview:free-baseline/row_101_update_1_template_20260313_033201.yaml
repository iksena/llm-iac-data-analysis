AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC with VPC Flow Logs configured to an S3 bucket.

Parameters:
  LogFilePrefix:
    Type: String
    Description: Optional prefix for organizing flow logs in the S3 bucket
    Default: ''
  TrafficType:
    Type: String
    Description: The type of traffic to capture
    Default: ALL
    AllowedValues:
      - ACCEPT
      - REJECT
      - ALL

Resources:
  VPCFlowLogS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: VPCFlowLogBucket

  VPCFlowLogS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${BucketName}/AWSLogs/${AccountID}/*
              - BucketName: !Ref VPCFlowLogS3Bucket
                AccountID: !Ref 'AWS::AccountId'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPCWithFlowLogs

  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSAccess
      Policies:
        - PolicyName: FlowLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: !Ref TrafficType
      LogDestinationType: s3
      LogDestination: !Sub
        - arn:aws:s3:::${BucketName}/AWSLogs/${AccountID}/
        - BucketName: !Ref VPCFlowLogS3Bucket
          AccountID: !Ref 'AWS::AccountId'
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status} ${vpc-id} ${subnet-id} ${instance-id} ${tcp-flags} ${type} ${pkt-srcaddr} ${pkt-dstaddr}'
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn

Outputs:
  FlowLogS3BucketName:
    Description: The name of the S3 bucket where VPC Flow Logs are stored
    Value: !Ref VPCFlowLogS3Bucket