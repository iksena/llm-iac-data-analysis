AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates an Amazon Kinesis Data Stream for real-time data ingestion and processing.
  It also sets up CloudWatch Alarms to alert if the read or write throughput exceeds specified thresholds.

Parameters:
  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream.
    Default: MyKinesisStream
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream.
    Default: 1
  RetentionPeriodHours:
    Type: Number
    Description: Data retention period in hours for the Kinesis Data Stream.
    Default: 24
  ReadThroughputThreshold:
    Type: Number
    Description: Threshold for the read throughput exceeded alarm.
    Default: 1
  WriteThroughputThreshold:
    Type: Number
    Description: Threshold for the write throughput exceeded alarm.
    Default: 1
  EvaluationPeriods:
    Type: Number
    Description: Number of periods over which data is evaluated for the alarms.
    Default: 1
  Period:
    Type: Number
    Description: The period in seconds over which the alarm metric is evaluated.
    Default: 300

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${KinesisStreamName}-ReadThroughputExceeded"
      AlarmDescription: "Alarm when the read throughput of the Kinesis stream exceeds the defined threshold."
      Namespace: "AWS/Kinesis"
      MetricName: "ReadProvisionedThroughputExceeded"
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisDataStream
      Statistic: Sum
      Period: !Ref Period
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref ReadThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${KinesisStreamName}-WriteThroughputExceeded"
      AlarmDescription: "Alarm when the write throughput of the Kinesis stream exceeds the defined threshold."
      Namespace: "AWS/Kinesis"
      MetricName: "WriteProvisionedThroughputExceeded"
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisDataStream
      Statistic: Sum
      Period: !Ref Period
      EvaluationPeriods: !Ref EvaluationPeriods
      Threshold: !Ref WriteThroughputThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  KinesisDataStreamARN:
    Description: ARN of the created Kinesis Data Stream.
    Value: !GetAtt KinesisDataStream.Arn
  ReadThroughputAlarmName:
    Description: Name of the CloudWatch alarm for read throughput.
    Value: !Ref ReadThroughputAlarm
  WriteThroughputAlarmName:
    Description: Name of the CloudWatch alarm for write throughput.
    Value: !Ref WriteThroughputAlarm