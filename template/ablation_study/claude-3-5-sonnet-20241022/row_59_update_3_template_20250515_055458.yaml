AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Kinesis Data Stream with CloudWatch Alarms'

Parameters:
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'

  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    MinValue: 1
    Default: 1

  RetentionPeriod:
    Type: Number
    Description: Data retention period in hours
    MinValue: 24
    MaxValue: 8760
    Default: 24

  AlarmThreshold:
    Type: Number
    Description: Throughput exceeded threshold (percentage)
    Default: 80
    MinValue: 1
    MaxValue: 100

  AlarmEmail:
    Type: String
    Description: Email address to receive alarm notifications

Resources:
  KinesisStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref StreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED
      Tags:
        - Key: Name
          Value: !Ref StreamName

  AlarmTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Sub '${AWS::StackName}-alarms'

  AlarmTopicSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  WriteProvisionedAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${AWS::StackName}-write-throughput-exceeded'
      AlarmDescription: 'Alarm when write throughput exceeds threshold'
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      AlarmActions:
        - !Ref AlarmTopic

  ReadProvisionedAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${AWS::StackName}-read-throughput-exceeded'
      AlarmDescription: 'Alarm when read throughput exceeds threshold'
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref AlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  StreamARN:
    Description: ARN of the created Kinesis Stream
    Value: !GetAtt KinesisStream.Arn

  TopicARN:
    Description: ARN of the SNS Topic for alarms
    Value: !Ref AlarmTopic