AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a single ENI with two EIPs and secondary private IPs

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCidrBlock:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet
  PrimaryPrivateIp:
    Type: String
    Default: 10.0.0.10
    Description: Primary private IP address for the network interface
  SecondaryPrivateIps:
    Type: CommaDelimitedList
    Default: "10.0.0.11,10.0.0.12"
    Description: Secondary private IP addresses for the network interface

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Multi-IP-ENI-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Multi-IP-ENI-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Multi-IP-ENI-RouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Multi-IP-ENI-Subnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for multi-IP ENI
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Multi-IP-ENI-SG

  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Description: Network interface with multiple IPs
      PrivateIpAddress: !Ref PrimaryPrivateIp
      SecondaryPrivateIpAddressCount: !Length !Ref SecondaryPrivateIps
      GroupSet:
        - !Ref SecurityGroup
      SourceDestCheck: true
      Tags:
        - Key: Name
          Value: Multi-IP-ENI

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !Ref SecondaryPrivateIps]

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [1, !Ref SecondaryPrivateIps]

Outputs:
  NetworkInterfaceId:
    Description: ID of the created network interface
    Value: !Ref NetworkInterface
  PrimaryPrivateIp:
    Description: Primary private IP address
    Value: !Ref PrimaryPrivateIp
  SecondaryPrivateIps:
    Description: Secondary private IP addresses
    Value: !Join [",", !Ref SecondaryPrivateIps]
  EIP1:
    Description: First Elastic IP address
    Value: !Ref EIP1
  EIP2:
    Description: Second Elastic IP address
    Value: !Ref EIP2