AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  StreamName:
    Type: String
    Default: mykinesisstream
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  ApiStageName:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  APIGatewayKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonKinesisFullAccess
      Policies:
        - PolicyName: KinesisAPIPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  KinesisApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: KinesisAPI
      ProtocolType: HTTP

  PutRecordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KinesisApi
      RouteKey: POST /putrecord
      AuthorizationType: NONE

  PutRecordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KinesisApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayKinesisRole.Arn
      PayloadFormatVersion: '2.0'

  PutRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KinesisApi
      RouteKey: POST /putrecords
      AuthorizationType: NONE

  PutRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KinesisApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayKinesisRole.Arn
      PayloadFormatVersion: '2.0'

  GetShardIteratorRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KinesisApi
      RouteKey: POST /getsharditerator
      AuthorizationType: NONE

  GetShardIteratorIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KinesisApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetShardIterator
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayKinesisRole.Arn
      PayloadFormatVersion: '2.0'

  GetRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KinesisApi
      RouteKey: POST /getrecords
      AuthorizationType: NONE

  GetRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KinesisApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayKinesisRole.Arn
      PayloadFormatVersion: '2.0'

  GetStreamMetadataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref KinesisApi
      RouteKey: GET /metadata
      AuthorizationType: NONE

  GetStreamMetadataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref KinesisApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayKinesisRole.Arn
      PayloadFormatVersion: '2.0'

  KinesisApiDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    Properties:
      ApiId: !Ref KinesisApi

  KinesisApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref KinesisApi
      DeploymentId: !Ref KinesisApiDeployment
      StageName: !Ref ApiStageName

Outputs:
  ApiEndpoint:
    Description: The endpoint URL of the API Gateway
    Value: !Sub https://${KinesisApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}
  KinesisStreamArn:
    Description: The ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn