AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge rule with an SNS topic for demo.cli events

Parameters:
  TopicName:
    Type: String
    Default: EventBridgeDemoTopic
    Description: The name of the SNS topic to create
  EventSourceName:
    Type: String
    Default: demo.cli
    Description: The event source name to match in the EventBridge rule

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: EventBridgeDemoRule
      Description: Rule to forward demo.cli events to SNS topic
      EventPattern:
        source:
          - !Ref EventSourceName
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
          InputTransformer:
            InputPathsMap:
              source: $.source
              detail: $.detail
            InputTemplate: '{ "Source": <source>, "Detail": <detail> }'

Outputs:
  SNSTopicARN:
    Description: The ARN of the created SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: The name of the created EventBridge rule
    Value: !Ref EventBridgeRule