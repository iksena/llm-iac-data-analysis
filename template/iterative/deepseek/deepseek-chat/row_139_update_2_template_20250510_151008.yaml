AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for arithmetic custom resource with Lambda

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for the arithmetic operation
    Default: 10

  SecondNumber:
    Type: Number
    Description: Second number for the arithmetic operation
    Default: 5

  Operator:
    Type: String
    Description: Arithmetic operation to perform
    AllowedValues: [Add, Subtract, Multiply, Divide]
    Default: Add

  SimulateFailure:
    Type: String
    Description: Simulate custom resource failure (true/false)
    AllowedValues: [true, false]
    Default: 'false'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                  - 'logs:CreateLogStream'
                  - 'logs:PutLogEvents'
                Resource: 'arn:aws:logs:*:*:*'

  ArithmeticLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import cfnresponse
          import json

          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              try:
                  first_num = float(event['ResourceProperties']['FirstNumber'])
                  second_num = float(event['ResourceProperties']['SecondNumber'])
                  operator = event['ResourceProperties']['Operator']
                  simulate_failure = event['ResourceProperties']['SimulateFailure'].lower() == 'true'

                  if simulate_failure:
                      raise Exception("Simulated failure as requested")

                  if operator == 'Add':
                      result = first_num + second_num
                      operation = f"{first_num} + {second_num}"
                  elif operator == 'Subtract':
                      result = first_num - second_num
                      operation = f"{first_num} - {second_num}"
                  elif operator == 'Multiply':
                      result = first_num * second_num
                      operation = f"{first_num} * {second_num}"
                  elif operator == 'Divide':
                      if second_num == 0:
                          raise ValueError("Division by zero")
                      result = first_num / second_num
                      operation = f"{first_num} / {second_num}"
                  else:
                      raise ValueError("Invalid operator")

                  response_data = {
                      'Result': str(result),
                      'Operation': operation
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  response_data = {'Error': str(e)}
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  ArithmeticHelper:
    Type: Custom::ArithmeticHelper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambda.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  CalculationResult:
    Description: The result of the arithmetic operation
    Value: !GetAtt ArithmeticHelper.Result

  OperationPerformed:
    Description: The arithmetic operation that was performed
    Value: !GetAtt ArithmeticHelper.Operation