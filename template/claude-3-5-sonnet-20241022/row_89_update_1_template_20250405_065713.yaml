AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable Security Hub with default standards and consolidated findings'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      Tags:
        - Key: Purpose
          Value: Security-Monitoring
        - Key: Environment
          Value: Production
      ControlFindingsFormat: CONSOLIDATED

  CISFoundationStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:subscription/cis-aws-foundations-benchmark/v/1.4.0'
    DependsOn: SecurityHub

  AWSFoundationalSecurityBestPractices:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:subscription/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

  PCIDSSStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:subscription/pci-dss/v/3.2.1'
    DependsOn: SecurityHub

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub resource
    Value: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:hub/default'

  EnabledStandards:
    Description: List of enabled security standards
    Value: 'CIS AWS Foundations Benchmark, AWS Foundational Security Best Practices, PCI DSS'