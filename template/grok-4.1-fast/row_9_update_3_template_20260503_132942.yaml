AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready CloudFormation template for an encrypted One Zone EFS file system in us-east-1a with backups and One Zone IA lifecycle policy enabled.'

Resources:
  OneZoneEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      AvailabilityZoneName: us-east-1a
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      BackupPolicy:
        Status: ENABLED
      LifecyclePolicies:
        - TransitionToIA: ONE_ZONE_IA
      Tags:
        - Key: Name
          Value: OneZoneEncryptedEFS
        - Key: Purpose
          Value: OneZoneEncryptedFileSystem

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref OneZoneEFSFileSystem
  FileSystemArn:
    Description: EFS File System ARN
    Value: !GetAtt OneZoneEFSFileSystem.Arn
  DNSName:
    Description: EFS File System DNS Name
    Value: !GetAtt OneZoneEFSFileSystem.DNSName
  AvailabilityZoneName:
    Description: Availability Zone used for One Zone storage
    Value: us-east-1a