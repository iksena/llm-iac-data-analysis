AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to store Glue scripts and logs
  ScriptPath:
    Type: String
    Description: Path to the Glue script in the S3 bucket
    Default: glue_scripts/sample_convert.py
  LogPath:
    Type: String
    Description: Path in the S3 bucket for storing Spark logs
    Default: logs/spark

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: SampleConvertJob
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub 's3://${BucketName}/${ScriptPath}'
        PythonVersion: '3'
      DefaultArguments:
        '--job-language': 'python'
        '--job-bookmark-option': 'job-bookmark-disable'
        '--TempDir': !Sub 's3://${BucketName}/temp'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      MaxCapacity: 0.0625
      Timeout: 60

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref GlueScriptBucket
  GlueJobName:
    Description: Name of the Glue ETL job
    Value: !Ref GlueETLJob