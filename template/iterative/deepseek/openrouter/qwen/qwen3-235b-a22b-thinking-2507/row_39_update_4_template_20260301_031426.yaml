AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready ECR repository for Kubernetes container image management with root user permissions'
Parameters:
  RepositoryName:
    Type: String
    Default: k8s-images
    Description: 'Name for the ECR repository (lowercase, alphanumeric with hyphens/underscores, max 256 chars)'
    MinLength: 2
    MaxLength: 256
    AllowedPattern: '^[a-z0-9]+(?:[._-][a-z0-9]+)*$'
    ConstraintDescription: 'Repository name must be lowercase alphanumeric with hyphens, underscores, or periods'
Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref RepositoryName
  ECRRepositoryPolicy:
    Type: AWS::ECR::RepositoryPolicy
    Properties:
      RepositoryName: !Ref ECRRepository
      PolicyText: !Sub
        - |
          {
            "Version": "2008-10-17",
            "Statement": [
              {
                "Sid": "RootUserAccess",
                "Effect": "Allow",
                "Principal": {
                  "AWS": "${RootAccount}"
                },
                "Action": [
                  "ecr:*"
                ]
              }
            ]
          }
        - RootAccount: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
Outputs:
  RepositoryUri:
    Description: URI for pushing/pulling container images
    Value: !GetAtt ECRRepository.RepositoryUri