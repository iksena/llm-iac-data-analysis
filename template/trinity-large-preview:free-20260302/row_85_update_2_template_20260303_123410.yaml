AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a secure and cost-optimized S3 bucket for storing CloudWatch export data with configurable versioning and automated lifecycle management.

Parameters:
  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable or disable versioning for the S3 bucket.
  LifecycleExpirationInDays:
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 3650
    Description: Number of days before objects expire and are deleted.

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: !Ref VersioningEnabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpirationRule
            Status: Enabled
            ExpirationInDays: !Ref LifecycleExpirationInDays
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: CloudWatchExportBucket

Outputs:
  BucketName:
    Description: The name of the created S3 bucket
    Value: !Ref CloudWatchExportBucket
  BucketARN:
    Description: The ARN of the created S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn