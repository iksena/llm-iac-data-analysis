AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for an S3 bucket that can be accessed by an AWS Organization or Organizational Unit'

Parameters:
  BucketName:
    Type: String
    Description: 'Name of the S3 bucket to create'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters, start and end with a lowercase letter or number, and can contain lowercase letters, numbers, dots, and hyphens.'

  OrganizationId:
    Type: String
    Description: 'AWS Organization ID (o-xxxxxxxxxx) to grant access to (leave blank for single account use)'
    Default: ''
    AllowedPattern: '^(o-[a-z0-9]{10})?$'
    ConstraintDescription: 'Organization ID must be in the format o-xxxxxxxxxx or left blank'

  OrganizationalUnitId:
    Type: String
    Description: 'AWS Organizational Unit ID (ou-xxxx-xxxxxxxx) to grant access to (leave blank for single account or entire organization use)'
    Default: ''
    AllowedPattern: '^(ou-[a-z0-9]{4}-[a-z0-9]{8})?$'
    ConstraintDescription: 'Organizational Unit ID must be in the format ou-xxxx-xxxxxxxx or left blank'

  EnableVersioning:
    Type: String
    Description: 'Enable versioning for the S3 bucket'
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  EnableEncryption:
    Type: String
    Description: 'Enable server-side encryption for the S3 bucket'
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  LoggingBucketName:
    Type: String
    Description: 'Name of the S3 bucket to store access logs (leave blank to disable logging)'
    Default: ''

  LoggingPrefix:
    Type: String
    Description: 'Prefix for log objects (leave blank for no prefix)'
    Default: ''

Conditions:
  HasOrganizationId: !Not [!Equals [!Ref OrganizationId, '']]
  HasOrganizationalUnitId: !Not [!Equals [!Ref OrganizationalUnitId, '']]
  HasAnyOrgAccess: !Or [!Condition HasOrganizationId, !Condition HasOrganizationalUnitId]
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, 'true']
  EnableEncryptionCondition: !Equals [!Ref EnableEncryption, 'true']
  EnableLoggingCondition: !Not [!Equals [!Ref LoggingBucketName, '']]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: !If [EnableVersioningCondition, 'Enabled', 'Suspended']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - !If
            - EnableEncryptionCondition
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
            - !Ref AWS::NoValue
      LoggingConfiguration: !If
        - EnableLoggingCondition
        - DestinationBucketName: !Ref LoggingBucketName
          LogFilePrefix: !Ref LoggingPrefix
        - !Ref AWS::NoValue

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasAnyOrgAccess
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - !If
            - HasOrganizationId
            - Sid: AllowOrganizationAccess
              Effect: Allow
              Principal: '*'
              Action:
                - 's3:GetObject'
                - 's3:PutObject'
                - 's3:ListBucket'
              Resource:
                - !Sub 'arn:aws:s3:::${S3Bucket}'
                - !Sub 'arn:aws:s3:::${S3Bucket}/*'
              Condition:
                StringEquals:
                  'aws:PrincipalOrgID': !Ref OrganizationId
            - !If
              - HasOrganizationalUnitId
              - Sid: AllowOrganizationalUnitAccess
                Effect: Allow
                Principal: '*'
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}'
                  - !Sub 'arn:aws:s3:::${S3Bucket}/*'
                Condition:
                  StringLike:
                    'aws:PrincipalOrgPaths': !Sub '/${OrganizationalUnitId}/*'
              - !Ref AWS::NoValue
          - Sid: EnforceHTTPS
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket

  BucketARN:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn

  BucketDomainName:
    Description: 'Domain name of the created S3 bucket'
    Value: !GetAtt S3Bucket.DomainName

  OrganizationAccess:
    Description: 'Type of organization access configured'
    Value: !If [HasOrganizationId, !Sub 'Organization: ${OrganizationId}', !If [HasOrganizationalUnitId, !Sub 'Organizational Unit: ${OrganizationalUnitId}', 'None (Single Account)']]