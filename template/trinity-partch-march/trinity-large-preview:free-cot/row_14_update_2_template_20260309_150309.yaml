AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ENI with two EIPs and secondary private IPs

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
    Description: VPC ID where the ENI will be created
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
    Description: Subnet ID where the ENI will be created

Resources:
  ElasticNetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: ENI with multiple IPs for single EC2 instance
      SubnetId: !Ref SubnetId
      SourceDestCheck: false
      GroupSet:
        - !Ref DefaultSecurityGroup
      PrivateIpAddress: 10.0.0.5
      SecondaryPrivateIpAddresses:
        - 10.0.0.10
        - 10.0.0.11
      Tags:
        - Key: Name
          Value: Multi-IP-ENI

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkBorderGroup: !Ref 'AWS::Region'

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkBorderGroup: !Ref 'AWS::Region'

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP1.AllocationId
      NetworkInterfaceId: !Ref ElasticNetworkInterface
      PrivateIpAddress: 10.0.0.10

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP2.AllocationId
      NetworkInterfaceId: !Ref ElasticNetworkInterface
      PrivateIpAddress: 10.0.0.11

  DefaultSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Default security group for ENI
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

Outputs:
  ENIID:
    Description: ID of the created ENI
    Value: !Ref ElasticNetworkInterface
  EIP1:
    Description: Elastic IP 1 associated with ENI
    Value: !Ref ElasticIP1
  EIP2:
    Description: Elastic IP 2 associated with ENI
    Value: !Ref ElasticIP2
  PrimaryPrivateIP:
    Description: Primary private IP of the ENI
    Value: !GetAtt ElasticNetworkInterface.PrimaryPrivateIpAddress
  SecondaryPrivateIPs:
    Description: Secondary private IPs of the ENI
    Value: !Join [",", [10.0.0.10, 10.0.0.11]]