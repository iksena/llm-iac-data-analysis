AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  AMI:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    Description: AMI ID for Windows Server 2019 (default uses latest from SSM)
  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)
  Subnet:
    Type: AWS::EC2::Subnet::Id
    Default: ''
    Description: Subnet ID for the EC2 instance (leave blank to use default VPC)
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access

Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Windows EC2 instance
      VpcId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !ImportValue 'DefaultVPCId']
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !GetAtt SecurityGroup.GroupId
          SubnetId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref Subnet]
      UserData:
        Fn::Base64: |
          <powershell>
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          </powershell>

  CPUMaxStressSSM:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '1.0'
        description: CPU stress testing script
        parameters:
          duration:
            type: String
            description: Duration in seconds for CPU stress test
            default: '60'
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: runCPUStress
            inputs:
              runCommand:
                - '$procs = [System.Diagnostics.Process]::GetProcesses()'
                - '$threads = @()'
                - 'for($i=0; $i -lt $procs.Count; $i++) {'
                - '  $threads += Start-Job -ScriptBlock {'
                - '    param($duration)'
                - '    $start = Get-Date'
                - '    while(((Get-Date) - $start).TotalSeconds -lt $duration) {'
                - '      $null = 1 * 2'
                - '    }'
                - '  } -ArgumentList @(@duration)'
                - '}'
                - 'Wait-Job -Job $threads -Timeout @duration'
                - 'Remove-Job -Job $threads -Force'

Conditions:
  UseDefaultVPC: !Equals [!Ref Subnet, '']

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp