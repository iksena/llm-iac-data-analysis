AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge integration with Shopify's product creation API.

Parameters:
  ShopifyAdminApiKey:
    Type: String
    Description: The Shopify admin API key for authentication.
    NoEcho: true
    Default: 'testanu'
    MinLength: 1
    ConstraintDescription: "The Shopify admin API key must be provided and cannot be empty."

  ShopifyProductCreationEndpoint:
    Type: String
    Default: 'https://testanu.myshopify.com/admin/api/2023-10/products.json'
    Description: The Shopify product creation endpoint URL.

Resources:
  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyAppEventBus

  ApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  ShopifyApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyAdminApiKey
      Name: ShopifyApiConnection

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreationApiDestination
      ConnectionArn: !GetAtt ShopifyApiConnection.Arn
      InvocationEndpoint: !Ref ShopifyProductCreationEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Id: ShopifyApiDestinationTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt ApiDestinationRole.Arn

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge event bus.
    Value: !GetAtt EventBridgeBus.Arn

  ApiDestinationId:
    Description: The ID of the API destination.
    Value: !Ref ShopifyApiDestination