AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an integration between DynamoDB streams and Amazon EventBridge

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyDynamoDBTable
    Description: The name of the DynamoDB table
  EventBusName:
    Type: String
    Default: my-event-bus
    Description: The name of the EventBridge bus

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn

  EventBridgePipe:
    Type: AWS::Events::EventBusPolicy
    Properties:
      EventBusName: !Ref EventBusName
      Action: 'events:PutEvents'
      Principal: '*'
      StatementId: AllowEventBridgePipe

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - 'aws.dynamodb'
        detail:
          eventName:
            - 'MODIFY'
          dynamodb:
            keys:
              avatarUrl:
                - 'endsWith'
                - '.png'
      Targets:
        - Arn: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}'
          Id: DynamoDBTarget

Outputs:
  DynamoDBStreamArn:
    Description: The ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: The name of the EventBridge bus
    Value: !Ref EventBusName