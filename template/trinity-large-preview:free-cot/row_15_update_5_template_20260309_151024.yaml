AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const response = {
                  statusCode: 200,
                  body: JSON.stringify('Hello from Lambda!'),
              };
              return response;
          };

  MyRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MyRestApi
      Description: REST API with Lambda non-proxy integration

  MyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MyRestApi
      ParentId: !GetAtt MyRestApi.RootResourceId
      PathPart: hello

  MyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MyRestApi
      ResourceId: !Ref MyResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations
          - lambdaArn: !GetAtt HelloWorldFunction.Arn
        RequestParameters:
          integration.request.header.Content-Type: "'application/json'"
        RequestTemplates:
          application/json: |
            {
              "body": $input.json('$')
            }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt HelloWorldFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub
        - arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${apiId}/*/GET/hello
        - apiId: !Ref MyRestApi

  MyDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: MyMethod
    Properties:
      RestApiId: !Ref MyRestApi

  MyStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref MyDeployment
      RestApiId: !Ref MyRestApi
      StageName: prod

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: API Configuration
        Parameters:
          - StageName
      - Label:
          default: Lambda Configuration
        Parameters:
          - Runtime
          - MemorySize
          - Timeout

    ParameterLabels:
      StageName:
        default: API Stage Name
      Runtime:
        default: Lambda Runtime
      MemorySize:
        default: Lambda Memory Size (MB)
      Timeout:
        default: Lambda Timeout (seconds)

Parameters:
  StageName:
    Type: String
    Default: prod
    Description: The name of the API Gateway stage

  Runtime:
    Type: String
    Default: nodejs20.x
    Description: The runtime for the Lambda function

  MemorySize:
    Type: Number
    Default: 128
    Description: The memory allocated to the Lambda function in MB

  Timeout:
    Type: Number
    Default: 30
    Description: The timeout for the Lambda function in seconds

Outputs:
  ApiUrl:
    Description: The URL of the deployed API
    Value: !Sub
      - https://${apiId}.execute-api.${AWS::Region}.amazonaws.com/${stage}
      - apiId: !Ref MyRestApi
        stage: !Ref StageName

Capabilities:
  - CAPABILITY_AUTO_EXPAND