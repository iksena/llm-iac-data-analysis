AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Pool with admin-managed user provisioning, email verification, and OAuth support

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
    Description: Custom email verification message
  EmailVerificationSubject:
    Type: String
    Default: Your verification code
    Description: Custom email verification subject
  PasswordPolicyMinLength:
    Type: Number
    Default: 8
    Description: Minimum password length
  PasswordPolicyRequireLowercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require lowercase characters in password
  PasswordPolicyRequireUppercase:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require uppercase characters in password
  PasswordPolicyRequireNumbers:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require numbers in password
  PasswordPolicyRequireSymbols:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Require symbols in password
  DomainPrefix:
    Type: String
    Default: myapp
    Description: Prefix for the Cognito domain
  AllowedOAuthFlows:
    Type: String
    Default: "implicit,code"
    Description: Allowed OAuth flows (comma-separated)
  AllowedOAuthScopes:
    Type: String
    Default: "email,openid,profile,aws.cognito.signin.user.admin"
    Description: Allowed OAuth scopes (comma-separated)

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordPolicyMinLength
          RequireLowercase: !Ref PasswordPolicyRequireLowercase
          RequireUppercase: !Ref PasswordPolicyRequireUppercase
          RequireNumbers: !Ref PasswordPolicyRequireNumbers
          RequireSymbols: !Ref PasswordPolicyRequireSymbols
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      MfaConfiguration: OPTIONAL
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${UserPoolName}-client
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - REFRESH_TOKEN_AUTH
        - USER_PASSWORD_AUTH
      AllowedOAuthFlows: !Split [",", !Ref AllowedOAuthFlows]
      AllowedOAuthScopes: !Split [",", !Ref AllowedOAuthScopes]
      CallbackURLs:
        - !Sub https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse
      LogoutURLs:
        - !Sub https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/logout
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Description: ID of the created Cognito User Pool
    Value: !Ref UserPool
  UserPoolClientId:
    Description: ID of the created Cognito User Pool Client
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Description: Domain for the Cognito hosted UI
    Value: !Sub ${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com