AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  TableName:
    Type: String
    Default: MobileNotificationsReportingTable
    Description: Name of the DynamoDB table
  TtlAttributeName:
    Type: String
    Default: ttl
    Description: Name of the attribute for TTL expiry (Unix timestamp)
Resources:
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TTLSpecification:
        AttributeName: !Ref TtlAttributeName
        Enabled: true
Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref NotificationsTable
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt NotificationsTable.Arn
  GsiArn:
    Description: ARN of the TypeSentTimeIndex GSI
    Value: !GetAtt NotificationsTable.TypeSentTimeIndex-arn