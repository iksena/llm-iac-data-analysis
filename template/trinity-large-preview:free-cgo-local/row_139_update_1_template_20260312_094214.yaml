AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with custom Lambda resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
  SecondNumber:
    Type: Number
    Default: 5
  Operator:
    Type: String
    AllowedValues:
      - ADD
      - SUBTRACT
      - MULTIPLY
      - DIVIDE
    Default: ADD
  Fail:
    Type: Boolean
    Default: false

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              try:
                  if event['ResourceProperties']['Fail']:
                      raise ValueError("Forced failure for testing")

                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']

                  if operator == 'ADD':
                      result = first_number + second_number
                  elif operator == 'SUBTRACT':
                      result = first_number - second_number
                  elif operator == 'MULTIPLY':
                      result = first_number * second_number
                  elif operator == 'DIVIDE':
                      if second_number == 0:
                          raise ValueError("Division by zero")
                      result = first_number / second_number
                  else:
                      raise ValueError("Invalid operator")

                  response_data = {
                      'Result': result,
                      'Operation': f"{first_number} {operator} {second_number} = {result}"
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  error_message = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': error_message})

  CustomHelperResource:
    Type: AWS::CloudFormation::CustomResource
    CreationPolicy:
      ResourceSignal:
        Timeout: PT60S
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      Fail: !Ref Fail
    DependsOn: ArithmeticLambdaFunction

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt CustomHelperResource.Result
  OperationDetails:
    Description: Details of the arithmetic operation performed
    Value: !GetAtt CustomHelperResource.Operation