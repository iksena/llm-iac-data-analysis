AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IoT data pipeline routing messages from AWS IoT Core to an SQS queue via SNS.

Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTDataTopic

  IoTDataTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: IoTDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "sns:Publish"
            Resource: 
              Ref: IoTDataTopic
            Condition:
              ArnEquals:
                aws:SourceArn: 
                  Fn::Sub: "arn:aws:iot:${AWS::Region}:${AWS::AccountId}:rule/IoTDataRule"

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: "sns:Publish"
                Resource: 
                  Ref: IoTDataTopic

  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: 
                Ref: IoTDataTopic
              RoleArn: 
                Fn::GetAtt: [ IoTRuleRole, Arn ]

Outputs:
  SQSQueueARN:
    Description: The ARN of the SQS Queue
    Value: 
      Fn::GetAtt: [ IoTDataQueue, Arn ]

  SNSTopicARN:
    Description: The ARN of the SNS Topic
    Value: 
      Ref: IoTDataTopic

  IoTRuleName:
    Description: The name of the IoT Rule
    Value: 
      Ref: IoTDataRule