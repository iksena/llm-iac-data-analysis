AWSTemplateFormatVersion: '2010-09-09'
Description: >
  A production ready CloudFormation template that creates an S3 bucket with integrated AWS KMS encryption,
  lifecycle management, a KMS key alias for simplified key management, and organizational tagging.

Resources:
  KmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key for S3 bucket encryption"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "Allow administration of the key"
            Effect: "Allow"
            Principal:
              AWS: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:root"
            Action:
              - "kms:*"
            Resource: "*"
  KmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: "alias/s3EncryptionKey"
      TargetKeyId: !Ref KmsKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KmsKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: "ExpireOldObjects"
            Status: "Enabled"
            ExpirationInDays: 365
            Prefix: ""
      Tags:
        - Key: "Environment"
          Value: "Production"
        - Key: "Project"
          Value: "S3BucketWithKMSEncryption"

Outputs:
  BucketName:
    Description: "Name of the created S3 bucket"
    Value: !Ref S3Bucket
  KmsKeyArn:
    Description: "ARN of the KMS Key used for S3 bucket encryption"
    Value: !GetAtt KmsKey.Arn