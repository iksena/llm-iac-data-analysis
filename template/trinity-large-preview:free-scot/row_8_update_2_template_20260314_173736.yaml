AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights widgets for NAT Gateway monitoring

Parameters:
  VPCFlowLogGroup:
    Type: String
    Default: '/aws/vpc/flow-logs'
    Description: The CloudWatch Logs group containing VPC flow logs
  NATGatewayENI:
    Type: String
    Default: 'eni-'
    Description: The ENI ID prefix for NAT Gateway interfaces

Resources:
  TopSourceIPsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      LogGroupNames:
        - !Ref VPCFlowLogGroup
      Name: TopSourceIPs
      QueryString: |
        filter interfaceId like 'eni-'
        | stats sum(bytes) as totalBytes by srcAddr
        | sort totalBytes desc
        | limit 10

  RejectedConnectionsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      LogGroupNames:
        - !Ref VPCFlowLogGroup
      Name: RejectedConnections
      QueryString: |
        filter interfaceId like 'eni-' and action = 'REJECT'
        | stats count(*) as rejectedCount by srcAddr
        | sort rejectedCount desc
        | limit 10

  TopDestinationIPsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      LogGroupNames:
        - !Ref VPCFlowLogGroup
      Name: TopDestinationIPs
      QueryString: |
        filter interfaceId like 'eni-'
        | stats sum(bytes) as totalBytes by dstAddr
        | sort totalBytes desc
        | limit 10

  ConnectionSummaryQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      LogGroupNames:
        - !Ref VPCFlowLogGroup
      Name: ConnectionSummary
      QueryString: |
        filter interfaceId like 'eni-'
        | stats count(*) as connectionCount by protocol
        | sort connectionCount desc

  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayMonitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "namespace:\/aws\/vpc\/flow-logs sourceType:\"VPC/Flow Logs\" view:\"Logs\" queryId:\"${TopSourceIPsQuery}\"",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "namespace:\/aws\/vpc\/flow-logs sourceType:\"VPC/Flow Logs\" view:\"Logs\" queryId:\"${RejectedConnectionsQuery}\"",
                "region": "${AWS::Region}",
                "title": "Rejected Connections by Source"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "namespace:\/aws\/vpc\/flow-logs sourceType:\"VPC/Flow Logs\" view:\"Logs\" queryId:\"${TopDestinationIPsQuery}\"",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "namespace:\/aws\/vpc\/flow-logs sourceType:\"VPC/Flow Logs\" view:\"Logs\" queryId:\"${ConnectionSummaryQuery}\"",
                "region": "${AWS::Region}",
                "title": "Connection Summary by Protocol"
              }
            }
          ]
        }