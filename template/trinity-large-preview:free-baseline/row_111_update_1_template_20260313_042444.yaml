AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with DataDog for centralized log forwarding

Parameters:
  DataDogApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /datadog/apikey
    Description: DataDog API key stored in SSM Parameter Store
  DataDogEndpoint:
    Type: String
    Default: https://http-intake.logs.datadoghq.com
    Description: DataDog log ingestion endpoint
  EventSourceName:
    Type: String
    Default: MyDataDogApp
    Description: Event source name for EventBridge

Resources:
  EventBridgeDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeDeadLetterQueue

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeDataDogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt EventBridgeDeadLetterQueue.Arn

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: !Ref DataDogApiKey
      Name: DataDogConnection

  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: !Ref DataDogEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10
      Name: DataDogApiDestination
      InvocationHttpParameters:
        PathParameters:
          path: /v1/input
      InvocationRateLimit: 10
      InvocationRateLimitUnit: Seconds
      InvocationRateLimitType: Standard
      InvocationRateLimitValue: 10
      InvocationRateLimitUnit: Seconds
      InvocationRateLimitType: Standard
