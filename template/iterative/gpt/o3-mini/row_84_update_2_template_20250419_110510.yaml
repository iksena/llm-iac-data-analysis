AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an AWS Macie session (Macie2)
  to enable automated sensitive data discovery and security monitoring.

Parameters:
  FindingPublishingFrequency:
    Description: "The finding publishing frequency for the Macie session. Valid values: FIFTEEN_MINUTES, ONE_HOUR, SIX_HOURS."
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
  MacieStatus:
    Description: "The status for the Macie session. Valid values: ENABLED, PAUSED."
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED

Resources:
  MacieSession:
    Type: AWS::Macie2::Session
    Properties:
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      Status: !Ref MacieStatus

Outputs:
  MacieSessionId:
    Description: "Identifier for the created Macie session."
    Value: !Ref MacieSession