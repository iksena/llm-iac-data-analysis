AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 Bucket with Replication and Access Logging
Resources:
  MainBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketName: MySecureBucket
      VersioningConfiguration:
        Status: Enabled
  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketName: MySecureBucketReplica
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketName: MySecureBucketAccessLogs
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: SecureTransport
            Effect: Allow
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${MainBucket}/*'
              - !Sub 'arn:aws:s3:::${MainBucket}'
            Condition:
              Bool:
                aws:SecureTransport: 'true'
  ReplicationConfiguration:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${MainBucket}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: 'private'
  AccessLogConfiguration:
    Type: AWS::S3::Bucket
    Properties:
      Bucket: !Ref MainBucket
      LoggingEnabled:
        TargetBucket: !Ref AccessLogBucket
        TargetPrefix: access_logs/
Outputs:
  MainBucketName:
    Value: !Ref MainBucket
    Description: Name of the main bucket
  ReplicaBucketName:
    Value: !Ref ReplicaBucket
    Description: Name of the replica bucket
  AccessLogBucketName:
    Value: !Ref AccessLogBucket
    Description: Name of the access log bucket

