AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instance with SSM-based Nginx installation and validation'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: String
    Default: ''
    
  VpcId:
    Description: VPC where the EC2 instance will be deployed
    Type: AWS::EC2::VPC::Id
    
  SubnetId:
    Description: Subnet where the EC2 instance will be deployed
    Type: AWS::EC2::Subnet::Id

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-east-2:
      AMI: ami-02d1e544b84bf7502
    us-west-1:
      AMI: ami-0d9858aa3c6322f73
    us-west-2:
      AMI: ami-098e42ae54c764c35
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d
    eu-west-2:
      AMI: ami-0d37e07bd4ff37148
    eu-central-1:
      AMI: ami-0dcc0ebde7b2e00db
    ap-northeast-1:
      AMI: ami-0ab0bbbd329f565e6
    ap-northeast-2:
      AMI: ami-0e1d09d8b7c751816
    ap-southeast-1:
      AMI: ami-0dc5785603ad4ff54
    ap-southeast-2:
      AMI: ami-0bd2230cfb28832f7
    ap-south-1:
      AMI: ami-0ad704c126371a549

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMInstanceRole

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server with HTTP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access from anywhere (for troubleshooting)
      Tags:
        - Key: Name
          Value: WebServerSecurityGroup

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      SecurityGroupIds:
        - !GetAtt WebServerSecurityGroup.GroupId
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref SSMInstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: NginxWebServer
        - Key: nginx
          Value: Yes
    Conditions:
      HasKeyName: !Not [!Equals [!Ref KeyName, '']]

  NginxInstallationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Name: NginxInstallationAndValidation
      Content:
        schemaVersion: '0.3'
        description: 'Automates the installation and validation of Nginx on Amazon Linux 2'
        assumeRole: '{{AutomationAssumeRole}}'
        parameters:
          AutomationAssumeRole:
            type: String
            description: '(Optional) The ARN of the role that allows Automation to perform the actions on your behalf.'
            default: ''
          InstanceIds:
            type: StringList
            description: '(Optional) The instance IDs to target. If not specified, will use tag-based targeting.'
            default: []
        mainSteps:
          - name: GetInstancesByTag
            action: aws:executeAwsApi
            onFailure: Abort
            inputs:
              Service: ec2
              Api: DescribeInstances
              Filters:
                - Name: 'tag:nginx'
                  Values:
                    - 'Yes'
                - Name: 'instance-state-name'
                  Values:
                    - 'running'
            outputs:
              - Name: InstanceIds
                Selector: '$.Reservations[*].Instances[*].InstanceId'
                Type: StringList
          
          - name: UpdateOS
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{ GetInstancesByTag.InstanceIds }}'
              Parameters:
                commands:
                  - 'sudo yum update -y'
            
          - name: CheckIfRebootNeeded
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{ GetInstancesByTag.InstanceIds }}'
              Parameters:
                commands:
                  - 'if [ -f /var/run/reboot-required ]; then echo "Reboot required"; else echo "No reboot needed"; fi'
            outputs:
              - Name: RebootOutput
                Selector: '$.CommandInvocations[*].CommandPlugins[*].Output'
                Type: StringList
          
          - name: RebootIfNeeded
            action: aws:branch
            inputs:
              Choices:
                - NextStep: WaitForInstancesOnline
                  Variable: '{{ CheckIfRebootNeeded.RebootOutput }}'
                  Contains: 'Reboot required'
              Default: InstallNginx
          
          - name: RebootInstances
            action: aws:executeAwsApi
            inputs:
              Service: ec2
              Api: RebootInstances
              InstanceIds: '{{ GetInstancesByTag.InstanceIds }}'
            isEnd: false
          
          - name: WaitForInstancesOnline
            action: aws:waitForAwsResourceProperty
            inputs:
              Service: ssm
              Api: DescribeInstanceInformation
              InstanceInformationFilterList:
                - key: InstanceIds
                  valueSet: '{{ GetInstancesByTag.InstanceIds }}'
              PropertySelector: '$.InstanceInformationList[0].PingStatus'
              DesiredValues:
                - 'Online'
            timeoutSeconds: 300
          
          - name: InstallNginx
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{ GetInstancesByTag.InstanceIds }}'
              Parameters:
                commands:
                  - 'sudo amazon-linux-extras install nginx1 -y'
                  - 'sudo systemctl start nginx'
                  - 'sudo systemctl enable nginx'
          
          - name: ValidateNginxInstallation
            action: aws:runCommand
            onFailure: Abort
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{ GetInstancesByTag.InstanceIds }}'
              Parameters:
                commands:
                  - 'curl -s http://localhost:80 > /tmp/nginx_test.html'
                  - 'if grep -q "nginx" /tmp/nginx_test.html; then echo "Nginx validation successful"; else echo "Nginx validation failed"; exit 1; fi'
                  - 'systemctl status nginx'

Outputs:
  InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance
  
  PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  
  SSMDocumentName:
    Description: Name of the SSM Automation Document
    Value: !Ref NginxInstallationDocument
  
  SSMExecutionCommand:
    Description: Command to execute the SSM Automation Document
    Value: !Sub "aws ssm start-automation-execution --document-name ${NginxInstallationDocument} --region ${AWS::Region}"