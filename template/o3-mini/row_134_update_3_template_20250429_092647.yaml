AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS Lambda function with inline Node.js code.
  The function logs event details and returns a value from the input.
  It also provisions an IAM role with permissions to write logs to CloudWatch.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaCloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: BasicNodeFunction
      Handler: index.handler
      Runtime: nodejs14.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log("Received event:", JSON.stringify(event));
              return event.value;
          };
      Description: "A simple Lambda function that logs the event object and returns a specific value."
      Timeout: 10

Outputs:
  LambdaFunctionARN:
    Description: "ARN of the created Lambda function"
    Value: !GetAtt LambdaFunction.Arn