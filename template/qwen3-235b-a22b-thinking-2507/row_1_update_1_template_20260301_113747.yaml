AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for SNS topic with email subscription to test@test.com'
Resources:
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: ProductionNotificationTopic
      TopicName: ProductionNotifications
  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: test@test.com
      Protocol: email
      TopicArn: !Ref NotificationTopic
Outputs:
  TopicARN:
    Description: ARN of the SNS topic for notifications
    Value: !Ref NotificationTopic