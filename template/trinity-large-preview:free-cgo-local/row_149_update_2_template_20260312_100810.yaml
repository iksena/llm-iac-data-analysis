AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with EC2 Integration and Monitoring'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  InstanceType:
    Type: String
    Default: t3.micro
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key

Resources:
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
            Resource: !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${FileSystem}'

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEFSFullAccess
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref Subnet1
      SecurityGroupIds:
        - !Ref MountTargetSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-Instance-1

  Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref Subnet2
      SecurityGroupIds:
        - !Ref MountTargetSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /home/efs
          echo "${FileSystem}.efs.${AWS::Region}.amazonaws.com:/ /home/efs efs defaults,_netdev 0 0" >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-Instance-2

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'EFS Burst Credit Balance Alarm'
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  PercentIOAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'EFS Percent I/O Limit Alarm'
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref FileSystem

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 'EFS Alarm Topic'
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem
  MountTarget1Id:
    Description: Mount Target 1 ID
    Value: !Ref MountTarget1
  MountTarget2Id:
    Description: Mount Target 2 ID
    Value: !Ref MountTarget2
  Instance1PublicDNS:
    Description: Public DNS of Instance 1
    Value: !GetAtt Instance1.PublicDnsName
  Instance2PublicDNS:
    Description: Public DNS of Instance 2
    Value: !GetAtt Instance2.PublicDnsName