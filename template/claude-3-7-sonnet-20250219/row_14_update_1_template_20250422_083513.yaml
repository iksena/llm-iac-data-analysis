AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an ENI with two EIPs and secondary private IPs'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the ENI will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet where the ENI will be created

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group to associate with the ENI

  SecondaryPrivateIpCount:
    Type: Number
    Default: 2
    MinValue: 2
    Description: Number of secondary private IPs to allocate (minimum 2 for the 2 EIPs)

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: Network Interface with secondary private IPs
      GroupSet:
        - !Ref SecurityGroupId
      SecondaryPrivateIpAddressCount: !Ref SecondaryPrivateIpCount

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EIP1'

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EIP2'

  ElasticIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  ElasticIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface

  PrimaryPrivateIp:
    Description: Primary private IP address of the Network Interface
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondaryPrivateIps:
    Description: Secondary private IP addresses of the Network Interface
    Value: !Join [', ', !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

  ElasticIp1:
    Description: First Elastic IP address
    Value: !Ref ElasticIP1

  ElasticIp2:
    Description: Second Elastic IP address
    Value: !Ref ElasticIP2