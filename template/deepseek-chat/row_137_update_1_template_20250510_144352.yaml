AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AppSync PetShop API with Lambda backend

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: "*"

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs18.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: [
                { id: "1", name: "Fluffy", type: "Cat" },
                { id: "2", name: "Rex", type: "Dog" },
                { id: "3", name: "Tweety", type: "Bird" }
              ]
            };
          };

  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY

  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        
        type Query {
          getPets: [Pet]
        }
        
        schema {
          query: Query
        }

  LambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt LambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2017-02-28",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: |
        #if($ctx.error)
          $util.error($ctx.error.message, $ctx.error.type)
        #end
        $util.toJson($ctx.result.body)

  GraphQLApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId

Outputs:
  GraphQLApiUrl:
    Description: The URL of the GraphQL API
    Value: !GetAtt PetShopAPI.GraphQLUrl
  GraphQLApiKey:
    Description: The API Key for the GraphQL API
    Value: !GetAtt GraphQLApiKey.ApiKey
  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt PetLambdaFunction.Arn