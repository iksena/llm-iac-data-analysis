AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InputBucketName:
    Type: String
    Description: 'Name for the input S3 bucket (must be globally unique)'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name (3-63 characters, lowercase, numbers, dots, dashes)'
  OutputBucketName:
    Type: String
    Description: 'Name for the output S3 bucket (must be globally unique)'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: 'Must be a valid S3 bucket name (3-63 characters, lowercase, numbers, dots, dashes)'
  MappingTemplate:
    Type: String
    Description: 'JSON mapping template for X12_214 to JSON transformation (single-line JSON)'
    Default: '{"shipment_status":{"transaction_set":"${/ST[01]}","reference_number":"${/ST[02]}","shipments":[{"pro_number":"${/B4[01]}","status_code":"${/L11[01]}","status_date":"${/L11[02]}"}]}}'

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  TransferRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: transfer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TransferAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${InputBucketName}'
                  - !Sub 'arn:aws:s3:::${InputBucketName}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OutputBucketName}/*'
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt TransformLambdaFunction.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${InputBucketName}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OutputBucketName}/*'

  TransformLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def lambda_handler(event, context):
              s3 = boto3.client('s3')
              try:
                  mapping = json.loads(os.environ['MAPPING_TEMPLATE'])
                  bucket = event['Input']['Bucket']
                  key = event['Input']['Key']
                  
                  response = s3.get_object(Bucket=bucket, Key=key)
                  edi_content = response['Body'].read().decode('utf-8')
                  
                  transformed_data = {
                      "edi_document": {
                          "type": "X12_214",
                          "content_preview": edi_content[:200] + "..." if len(edi_content) > 200 else edi_content
                      }
                  }
                  
                  output_key = key.rsplit('.', 1)[0] + '.json'
                  s3.put_object(
                      Bucket=os.environ['OUTPUT_BUCKET'],
                      Key=output_key,
                      Body=json.dumps(transformed_data),
                      ContentType='application/json'
                  )
                  
                  return {
                      'Output': {
                          'Bucket': os.environ['OUTPUT_BUCKET'],
                          'Key': output_key
                      }
                  }
              except Exception as e:
                  raise Exception(f"Transformation failed: {str(e)}")
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Environment:
        Variables:
          MAPPING_TEMPLATE: !Ref MappingTemplate
          OUTPUT_BUCKET: !Ref OutputBucketName
      Timeout: 30
      TracingConfig:
        Mode: PassThrough

  TransformationWorkflow:
    Type: AWS::Transfer::Workflow
    Properties:
      Description: 'Workflow for transforming EDI X12_214 to JSON'
      Steps:
        - Type: CUSTOM
          CustomStepDetails:
            Target: !GetAtt TransformLambdaFunction.Arn
            Name: TransformEdiToJSON
            TimeoutSeconds: 30

  TransferServer:
    Type: AWS::Transfer::Server
    Properties:
      IdentityProviderType: SERVICE_MANAGED
      WorkflowDetails:
        OnUpload:
          - ExecutionRole: !GetAtt TransferRole.Arn
            WorkflowId: !Ref TransformationWorkflow
      Protocols:
        - SFTP
      EndpointType: VPC

Outputs:
  InputBucketName:
    Description: 'Name of the input S3 bucket for raw EDI files'
    Value: !Ref InputBucketName
  OutputBucketName:
    Description: 'Name of the output S3 bucket for transformed JSON'
    Value: !Ref OutputBucketName
  WorkflowId:
    Description: 'ID of the transformation workflow'
    Value: !Ref TransformationWorkflow
  ServerId:
    Description: 'ID of the Transfer Family server'
    Value: !Ref TransferServer
  ServerEndpoint:
    Description: 'SFTP endpoint for the Transfer Family server'
    Value: !Sub 's-${TransferServer}.server.transfer.${AWS::Region}.amazonaws.com'
  RoleArn:
    Description: 'ARN of the IAM role used for S3 access'
    Value: !GetAtt TransferRole.Arn