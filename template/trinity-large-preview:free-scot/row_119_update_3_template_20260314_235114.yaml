AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  EventSourceName:
    Type: String
    Default: my-application
    AllowedPattern: ^[a-zA-Z0-9-]+$'
  KinesisStreamName:
    Type: String
    Default: my-event-stream
    AllowedPattern: ^[a-zA-Z0-9-_]+$'

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventSourceName

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole

  EventBridgeKinesisPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EventBridgeKinesisPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: kinesis:PutRecord
            Resource: !GetAtt KinesisStream.Arn
      Roles:
        - !Ref EventBridgeKinesisRole

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - my-application
      State: ENABLED
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  EventBusName:
    Description: The name of the EventBridge event bus
    Value: !Ref EventBus
  KinesisStreamArn:
    Description: The ARN of the Kinesis data stream
    Value: !GetAtt KinesisStream.Arn