AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes'

# [Previous parameters section remains the same]
Parameters:
  ContainerImage:
    Type: String
    Description: URI of the container image to run
    Default: amazon/amazon-ecs-sample
    
  MaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum vCPUs for the compute environment
    MinValue: 0
    MaxValue: 256
    
  MinvCpus:
    Type: Number
    Default: 0
    Description: Minimum vCPUs for the compute environment
    MinValue: 0
    MaxValue: 256
    
  DesiredvCpus:
    Type: Number
    Default: 0
    Description: Desired vCPUs for the compute environment
    MinValue: 0
    MaxValue: 256

Resources:
  # [Previous VPC, Subnet, NAT Gateway, Route Tables, and Security Group resources remain the same]
  # [Previous IAM roles remain the same]
  # [Previous Batch Compute Environment and Job Queue resources remain the same]

  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-event-queue
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Vcpus: 1
        Memory: 2048
        ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
        ReadonlyRootFilesystem: false
        Privileged: false
      RetryStrategy:
        Attempts: 3
      Timeout:
        AttemptDurationSeconds: 300

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action:
                  - 'batch:SubmitJob'
                  - 'batch:DescribeJobs'
                  - 'batch:TerminateJob'
                Resource: '*'

  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-event-pipe
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt EventQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 30
      Target: !Join 
        - ''
        - - 'arn:aws:batch:'
          - !Ref 'AWS::Region'
          - ':'
          - !Ref 'AWS::AccountId'
          - ':job-queue/'
          - !Ref BatchJobQueue
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: "ProcessOrder"
          RetryStrategy:
            Attempts: 3
          Parameters: 
            OrderId: $.messageId
        InputTemplate: |
          {
            "JobName": "ProcessOrder-<$.messageId>",
            "Parameters": {
              "OrderId": "<$.body.orderId>"
            }
          }
      Enrichment: !Sub arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-definition/${BatchJobDefinition}
      SourceFilter:
        Filters:
          - Pattern: '{"body": {"eventType": ["OrderCreated"]}}'

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref EventQueue

  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn

  JobQueueArn:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn

  JobDefinitionArn:
    Description: ARN of the Batch job definition
    Value: !Ref BatchJobDefinition

  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventPipe.Arn