AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Account-wide IAM Password Policy with customizable security requirements.
  Uses Lambda custom resource to manage password policy configuration.

Parameters:
  MinPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
    Description: Minimum password length (6-128 characters)
  
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase character
  
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase character
  
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one numeric character
  
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one special character
  
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Days before password expiration (1-1095)
  
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords to remember (1-24)
  
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow IAM users to change their own password
  
  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enforce immediate password change upon expiration

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PasswordPolicyUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:UpdateAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import json
          import cfnresponse
          import boto3
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          iam = boto3.client('iam')
          
          def lambda_handler(event, context):
              response_data = {}
              try:
                  props = event['ResourceProperties']
                  request_type = event['RequestType']
                  
                  if request_type == 'Delete':
                      try:
                          iam.update_account_password_policy(
                              MinimumPasswordLength=6,
                              RequireSymbols=False,
                              RequireNumbers=False,
                              RequireUppercaseCharacters=False,
                              RequireLowercaseCharacters=False,
                              AllowUsersToChangePassword=True
                          )
                      except iam.exceptions.NoSuchEntityException:
                          logger.info("Password policy doesn't exist, skipping delete")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      return
                  
                  # Handle Create and Update
                  iam.update_account_password_policy(
                      MinimumPasswordLength=int(props['MinPasswordLength']),
                      RequireSymbols=props['RequireSymbols'].lower() == 'true',
                      RequireNumbers=props['RequireNumbers'].lower() == 'true',
                      RequireUppercaseCharacters=props['RequireUppercase'].lower() == 'true',
                      RequireLowercaseCharacters=props['RequireLowercase'].lower() == 'true',
                      AllowUsersToChangePassword=props['AllowUsersToChangePassword'].lower() == 'true',
                      MaxPasswordAge=int(props['MaxPasswordAge']),
                      PasswordReusePrevention=int(props['PasswordReusePrevention']),
                      HardExpiry=props['HardExpiry'].lower() == 'true'
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.14
      Timeout: 30
      MemorySize: 128

  AccountPasswordPolicy:
    Type: Custom::AccountPasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinPasswordLength: !Ref MinPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry: !Ref HardExpiry
    DeletionPolicy: Delete

Outputs:
  MinPasswordLength:
    Value: !Ref MinPasswordLength
    Description: Configured minimum password length
  RequireUppercase:
    Value: !Ref RequireUppercase
    Description: Uppercase character requirement
  RequireLowercase:
    Value: !Ref RequireLowercase
    Description: Lowercase character requirement
  RequireNumbers:
    Value: !Ref RequireNumbers
    Description: Numeric character requirement
  RequireSymbols:
    Value: !Ref RequireSymbols
    Description: Special character requirement
  MaxPasswordAge:
    Value: !Ref MaxPasswordAge
    Description: Password expiration period in days
  PasswordReusePrevention:
    Value: !Ref PasswordReusePrevention
    Description: Number of previous passwords prevented from reuse
  AllowUsersToChangePassword:
    Value: !Ref AllowUsersToChangePassword
    Description: Self-service password change capability
  HardExpiry:
    Value: !Ref HardExpiry
    Description: Immediate password change enforcement upon expiration