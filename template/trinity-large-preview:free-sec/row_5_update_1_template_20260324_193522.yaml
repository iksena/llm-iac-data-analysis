AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ArtistConcertTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ArtistConcertTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
        - AttributeName: TicketSales
          AttributeType: N
      GlobalSecondaryIndexes:
        - IndexName: TicketSalesIndex
          KeySchema:
            - AttributeName: TicketSales
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true

  TableAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:GetItem
            Resource: !GetAtt ArtistConcertTable.Arn

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt ArtistConcertTable.Arn
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref ArtistConcertTable