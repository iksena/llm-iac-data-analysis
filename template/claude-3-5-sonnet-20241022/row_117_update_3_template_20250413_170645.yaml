AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB Streams to EventBridge integration using EventBridge Pipes'

Parameters:
  TableName:
    Type: String
    Description: 'Name of the DynamoDB table'
    Default: 'OrdersTable'

  EventBusName:
    Type: String
    Description: 'Name of the EventBridge event bus'
    Default: 'OrdersEventBus'

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole

  EventBridgePipePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource: !GetAtt DynamoDBTable.StreamArn
          - Effect: Allow
            Action: events:PutEvents
            Resource: !GetAtt CustomEventBus.Arn
      Roles: 
        - !Ref EventBridgePipeRole

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: EventBridgePipePolicy
    Properties:
      Name: !Sub '${AWS::StackName}-insert-pipe'
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt CustomEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: OrderInserted
          Source: custom.orders

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    DependsOn: EventBridgePipePolicy
    Properties:
      Name: !Sub '${AWS::StackName}-modify-pipe'
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !GetAtt CustomEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: OrderModified
          Source: custom.orders

Outputs:
  TableArn:
    Description: 'DynamoDB Table ARN'
    Value: !GetAtt DynamoDBTable.Arn

  StreamArn:
    Description: 'DynamoDB Stream ARN'
    Value: !GetAtt DynamoDBTable.StreamArn

  EventBusArn:
    Description: 'EventBridge Bus ARN'
    Value: !GetAtt CustomEventBus.Arn

  InsertPipeArn:
    Description: 'Insert Event Pipe ARN'
    Value: !GetAtt InsertEventPipe.Arn

  ModifyPipeArn:
    Description: 'Modify Event Pipe ARN'
    Value: !GetAtt ModifyEventPipe.Arn