AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with Amazon EventBridge using EventBridge Rules.

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserTable
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: UserEventBus

  EventBridgeRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/UserEventBus

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - aws.dynamodb
        detail-type:
          - DynamoDB Update
        detail:
          dynamodb:
            NewImage:
              avatarUrl:
                Suffix: ".png"
      Targets:
        - Id: TargetEventBus
          Arn: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/UserEventBus
          RoleArn: !GetAtt EventBridgeRuleRole.Arn

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB Table
    Value: !Ref DynamoDBTable

  EventBusName:
    Description: Name of the EventBridge Event Bus
    Value: !Ref EventBus

  EventBridgeRuleName:
    Description: Name of the EventBridge Rule
    Value: !Ref EventBridgeRule