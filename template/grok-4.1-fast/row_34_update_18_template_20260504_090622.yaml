AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready MySQL RDS (db.r5.large, io1) in dedicated VPC with private subnets across AZs, DB Subnet Group, security group for internal VPC access (3306).'

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  DBName:
    Type: String
    Default: mydb
    Description: Initial database name
    MinLength: 1
    MaxLength: 64
  MasterUsername:
    Type: String
    Default: admin
    Description: RDS master username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9]*$'
  DBAllocatedStorage:
    Type: Number
    Default: 100
    MinValue: 100
    MaxValue: 16384
    Description: RDS allocated storage (GiB) for io1
  DBIops:
    Type: Number
    Default: 1000
    MinValue: 1000
    MaxValue: 16000
    Description: Provisioned IOPS for io1 storage

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'
        - Key: Environment
          Value: Production

  AvailabilityZone1:
    Type: String
    Default:
      Fn::Select:
        - 0
        - Fn::GetAZs: ''

  AvailabilityZone2:
    Type: String
    Default:
      Fn::