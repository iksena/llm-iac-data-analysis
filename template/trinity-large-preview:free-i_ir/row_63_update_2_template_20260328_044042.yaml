AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL Cluster with CloudWatch Logs Integration

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      EngineVersion: "5.7.mysql_aurora.2.07.2"
      DBClusterParameterGroupName: default.aurora-mysql5.7
      MasterUsername: admin
      MasterUserPassword: password
      Port: 3306
      BackupRetentionPeriod: 1
      PreferredBackupWindow: "07:00-08:00"
      PreferredMaintenanceWindow: "mon:03:00-mon:04:00"
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      DeletionProtection: true
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      EnablePerformanceInsights: true
      PerformanceInsightsKMSKeyId: !Ref PerformanceInsightsKMSKey

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      AvailabilityZone: us-east-1a

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      AvailabilityZone: us-east-1b

  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - subnet-12345678
        - subnet-87654321

  PerformanceInsightsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Aurora Performance Insights
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Id: "key-default-1"
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address