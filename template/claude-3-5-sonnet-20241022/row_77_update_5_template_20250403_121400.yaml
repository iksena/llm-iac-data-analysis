AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table for supporter product data with environment-specific configurations'

Parameters:
  Stage:
    Type: String
    AllowedValues: 
      - PROD
      - CODE
    Description: Environment stage (PROD or CODE)
    Default: CODE

  TableNamePrefix:
    Type: String
    Default: SupporterProductData
    Description: Prefix for the DynamoDB table name

  TTLAttributeName:
    Type: String
    Default: expiryDate
    Description: Name of the TTL attribute

  ReadCapacityUnits:
    Type: Number
    Default: 20
    Description: Read capacity units for PROD environment
    MinValue: 1
    MaxValue: 1000

  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for PROD environment
    MinValue: 1
    MaxValue: 1000

  MaxWriteCapacityUnits:
    Type: Number
    Default: 500
    Description: Maximum write capacity units for auto scaling
    MinValue: 5
    MaxValue: 1000

  TargetUtilization:
    Type: Number
    Default: 70
    Description: Target utilization percentage for auto scaling
    MinValue: 20
    MaxValue: 90

Conditions:
  IsProd: !Equals [!Ref Stage, 'PROD']

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TableNamePrefix}-${Stage}'
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !If [IsProd, 'PROVISIONED', 'PAY_PER_REQUEST']
      ProvisionedThroughput: !If 
        - IsProd
        - 
          ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: !Ref TTLAttributeName
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Stage
        - Key: Backup
          Value: Required

  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSApplicationAutoscalingDynamoDBTablePolicy

  WriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      MaxCapacity: !Ref MaxWriteCapacityUnits
      MinCapacity: !Ref WriteCapacityUnits
      ResourceId: !Sub 'table/${DynamoDBTable}'
      RoleARN: !GetAtt AutoScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  WriteAutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref TargetUtilization
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable

  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn

  BillingMode:
    Description: Table billing mode
    Value: !If [IsProd, 'PROVISIONED', 'PAY_PER_REQUEST']