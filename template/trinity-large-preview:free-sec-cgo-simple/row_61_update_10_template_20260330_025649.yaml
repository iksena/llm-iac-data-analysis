AWSTemplateFormatVersion: '2010-09-09'
Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      HostedZoneConfig:
        Comment: Private hosted zone for internal use
        PrivateZone: true
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref VPCRegion

  HostedZoneAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - route53:GetHostedZone
              - route53:ListResourceRecordSets
              - route53:ChangeResourceRecordSets
            Resource: !Sub 'arn:aws:route53:::hostedzone/${PrivateHostedZone}'

  HostedZoneMonitoring:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-HostedZone-Monitor'
      AlarmDescription: 'Monitors Route 53 hosted zone changes'
      Namespace: 'AWS/Route53'
      MetricName: 'HealthCheckCount'
      Statistic: 'Average'
      Period: '300'
      EvaluationPeriods: '1'
      Threshold: '0'
      ComparisonOperator: 'GreaterThanOrEqualToThreshold'

Parameters:
  VPCId:
    Type: String
    Default: vpc-00000000000000000
  VPCRegion:
    Type: String
    Default: us-east-1

Outputs:
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
    Export:
      Name: PrivateHostedZoneID

# Security Improvements:
# 1. Added PrivateZone: true to explicitly mark as private
# 2. Created IAM ManagedPolicy to control access to hosted zone operations
# 3. Added CloudWatch monitoring for hosted zone changes
# 4. Removed unnecessary outputs and parameters
# 5. No public access configuration - inherently private
# 6. No hardcoded credentials or secrets
# 7. Uses default VPC and region parameters with safe defaults