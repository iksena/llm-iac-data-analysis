AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify TodoApp with Production Branch

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      Repository: https://github.com/example/todoapp.git
      OauthToken: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      IAMServiceRole: arn:aws:iam::123456789012:role/AmplifyServiceRole
      AutoBranchCreationConfig:
        EnableAutoBuild: true
        Stage: DEVELOPMENT
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm ci
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: production

  ProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      Stage: PRODUCTION
      EnableAutoBuild: true
      Framework: react
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm ci
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyDomain:
    Type: AWS::Amplify::Domain
    Properties:
      AppId: !Ref AmplifyApp
      DomainName: todoapp.example.com
      SubDomainSettings:
        - BranchName: production
          Prefix: www

Outputs:
  AmplifyAppId:
    Description: Amplify App ID
    Value: !Ref AmplifyApp
  ProductionBranchName:
    Description: Production Branch Name
    Value: !GetAtt ProductionBranch.BranchName
  AmplifyDomain:
    Description: Amplify Domain
    Value: !Ref AmplifyDomain