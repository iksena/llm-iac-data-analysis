AWSTemplateFormatVersion: '2010-09-09'
Description: Secure web-based VS Code development environment with CloudFront

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from CloudFront
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t3.medium
      KeyName: default
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: SSMInstanceProfile
      UserData:
        Fn::Base64:
          Fn::Join:
            - ""
            - - "#!/bin/bash\n"
              - "sudo apt update\n"
              - "sudo apt install -y curl wget\n"
              - "wget https://github.com/coder/code-server/releases/download/v4.12.0/code-server_4.12.0_amd64.deb\n"
              - "sudo dpkg -i code-server_4.12.0_amd64.deb\n"
              - "sudo systemctl enable code-server@codespace\n"
              - "sudo systemctl start code-server@codespace\n"
              - "echo 'code-server started on port 8080'\n"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: EC2Origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: allow-all
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
          MinTTL: 31536000
          DefaultTTL: 31536000
          MaxTTL: 31536000
        Comment: CloudFront for code-server
        Enabled: true

  SSMParameterCodeServerVersion:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /code-server/version
      Type: String
      Value: 4.12.0
      Description: Code-server version

Outputs:
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  EC2PublicDNS:
    Description: EC2 instance public DNS
    Value: !GetAtt EC2Instance.PublicDnsName
  EC2PublicIP:
    Description: EC2 instance public IP
    Value: !GetAtt EC2Instance.PublicIp