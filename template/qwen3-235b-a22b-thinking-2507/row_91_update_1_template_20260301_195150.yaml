AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Optional custom name for the S3 bucket (leave empty for auto-generated name)
    AllowedPattern: '[a-z0-9][a-z0-9\\.-]{1,61}[a-z0-9]'
    MaxLength: '63'
    MinLength: '3'
    ConstraintDescription: Bucket name must be 3-63 characters, lowercase alphanumeric, start/end with alphanumeric
  VersioningConfiguration:
    Type: String
    Default: 'Enabled'
    Description: Versioning status for the bucket (Enabled/Suspended)
    AllowedValues:
      - 'Enabled'
      - 'Suspended'
  DaysTransition:
    Type: Number
    Default: 30
    Description: Number of days before transitioning logs to Glacier
    MinValue: 0
  DaysExpire:
    Type: Number
    Default: 365000
    Description: Number of days before deleting logs (set to large value for long retention)
    MinValue: 0
Conditions:
  UseCustomName: !Not [!Equals [!Ref BucketName, '']]
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseCustomName, !Ref BucketName, !Ref AWS::NoValue]
      VersioningConfiguration:
        Status: !Ref VersioningConfiguration
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: FlowLogLifecycle
            Status: Enabled
            Prefix: ''
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref DaysTransition
            ExpirationInDays: !Ref DaysExpire
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Sid: AllowVPCFlowLogs
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Join ['', [!GetAtt S3Bucket.Arn, '/*']]
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
Outputs:
  BucketName:
    Value: !Ref S3Bucket
    Description: Name of the S3 bucket for VPC flow logs
  BucketArn:
    Value: !GetAtt S3Bucket.Arn
    Description: ARN of the S3 bucket for VPC flow logs