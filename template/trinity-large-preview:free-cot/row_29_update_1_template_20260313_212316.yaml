AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Parameter Storage and Retrieval for Serverless Applications

Parameters:
  StackPrefix:
    Type: String
    Default: myapp
    Description: Prefix for all stack resources
  ConfigValue:
    Type: String
    Default: "This is A/B"
    Description: Non-sensitive configuration value to store in SSM
  SecretUsername:
    Type: String
    Default: admin
    Description: Username for Secrets Manager secret
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds
  LambdaMemory:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  # IAM Role for Lambda with least privilege
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${StackPrefix}-LambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackPrefix}/*
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt DatabaseCredentials.Arn

  # SSM Parameter for non-sensitive configuration
  AppConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${StackPrefix}/config/app-config
      Type: String
      Value: !Ref ConfigValue
      Description: Application configuration parameter

  # Secrets Manager secret for database credentials
  DatabaseCredentials:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${StackPrefix}-db-credentials
      Description: Database credentials for application
      SecretString: !Sub |
        {
          "username": "${SecretUsername}",
          "password": "REPLACE_WITH_GENERATED_PASSWORD"
        }
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${SecretUsername}"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: "/@"

  # Lambda function to retrieve parameters and secrets
  ParameterRetrievalFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${StackPrefix}-ParameterRetrieval
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              try:
                  # Retrieve SSM parameters by path
                  ssm_params = ssm_client.get_parameters_by_path(
                      Path=f"/{event.get('stack_prefix', 'myapp')}/config/",
                      Recursive=True,
                      WithDecryption=True
                  )

                  # Retrieve Secrets Manager secret
                  secret_name = f"{event.get('stack_prefix', 'myapp')}-db-credentials"
                  secret = secrets_client.get_secret_value(SecretId=secret_name)

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'ssm_parameters': ssm_params.get('Parameters', []),
                          'secret': json.loads(secret['SecretString'])
                      })
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  # Permission for Lambda to be invoked
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt ParameterRetrievalFunction.Arn
      Principal: events.amazonaws.com

  # Test event for Lambda function
  TestEvent:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !GetAtt ParameterRetrievalFunction.Arn
      MaximumRetryAttempts: 0
      DestinationConfig:
        OnSuccess:
          Type: "SQS"
          Destination: !GetAtt TestQueue.Arn

  # SQS Queue for test destination
  TestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${StackPrefix}-TestQueue

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ParameterRetrievalFunction.Arn
  SecretArn:
    Description: Secrets Manager secret ARN
    Value: !GetAtt DatabaseCredentials.Arn
  AppConfigParameter:
    Description: SSM Parameter name
    Value: !Ref AppConfigParameter