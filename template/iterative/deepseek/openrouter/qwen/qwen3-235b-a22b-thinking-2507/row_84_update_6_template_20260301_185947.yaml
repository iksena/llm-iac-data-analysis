AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: 'ENABLED'
      Configuration:
        schemaVersion: '1.0'
Outputs:
  ServiceRole:
    Description: 'Service role ARN for Macie session'
    Value: !GetAtt MacieSession.ServiceRole
  AwsAccountId:
    Description: 'AWS Account ID for the Macie session'
    Value: !GetAtt MacieSession.AwsAccountId