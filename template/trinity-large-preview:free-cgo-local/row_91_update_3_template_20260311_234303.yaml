AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for VPC flow logs with encryption, lifecycle management, and secure access controls

Parameters:
  BucketName:
    Type: String
    Default: vpc-flow-logs
    Description: Name of the S3 bucket for VPC flow logs
  VersioningStatus:
    Type: String
    Default: Suspended
    AllowedValues:
      - Enabled
      - Suspended
    Description: Enable or suspend versioning for the S3 bucket

Resources:
  FlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionDate: !Select [0, !Split [",", !Select [1, !Split ["=", !FindInMap [LifecycleMap, GLACIER, Transition]]]]]
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 365000

  FlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowDeliveryLogs
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${FlowLogsBucket}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control

Mappings:
  LifecycleMap:
    GLACIER:
      Transition: "30"

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref FlowLogsBucket
  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt FlowLogsBucket.Arn