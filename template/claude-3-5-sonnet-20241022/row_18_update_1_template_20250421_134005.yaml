AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for DynamoDB Streams to EventBridge integration'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: UserTable
  
  EventBusName:
    Type: String
    Description: Name of the EventBridge bus
    Default: default
    
  EventSource:
    Type: String
    Description: Source identifier for events
    Default: com.user.profile
    
  EventDetailType:
    Type: String
    Description: Detail type for events
    Default: UserAvatarUpdate

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole

  EventBridgePipePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EventBridgePipePolicy
      Roles: 
        - !Ref EventBridgePipeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:DescribeStream
              - dynamodb:GetRecords
              - dynamodb:GetShardIterator
              - dynamodb:ListStreams
            Resource: !GetAtt DynamoDBTable.StreamArn
          - Effect: Allow
            Action:
              - events:PutEvents
            Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-dynamodb-to-eventbridge
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 1
        FilterCriteria:
          Filters:
            - Pattern: '{"dynamodb": {"NewImage": {"avatarUrl": {"S": ["ends_with", ".png"]}}}}'
      Target: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: !Ref EventDetailType
          Source: !Ref EventSource

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn
    
  TableStreamArn:
    Description: DynamoDB Table Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
    
  PipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn