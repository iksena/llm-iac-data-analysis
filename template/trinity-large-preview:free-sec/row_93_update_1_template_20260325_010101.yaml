AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM-driven Nginx installation and centralized logging

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
  InstallNginxTag:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false

Resources:
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-logging-bucket
        - Key: Environment
          Value: !Ref Environment

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::${LoggingBucket}/*
              - !Sub arn:${AWS::Partition}:s3:::${LoggingBucket}

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${LoggingBucket}/*
                  - !Sub arn:${AWS::Partition}:s3:::${LoggingBucket}

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          !Sub /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ec2-instance
        - Key: Environment
          Value: !Ref Environment
        - Key: InstallNginx
          Value: !Ref InstallNginxTag
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-ssm-agent
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent

  NginxAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      Targets:
        - Key: tag:InstallNginx
          Values:
            - !Ref InstallNginxTag
      Parameters:
        commands:
          - !Sub |
            #!/bin/bash
            yum install -y nginx
            systemctl start nginx
            systemctl enable nginx
            echo "Nginx installed and started successfully" > /var/log/nginx/install.log
      ScheduleExpression: "rate(1 hour)"

  CPUMetricAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-CPU-Utilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub ${AWS::StackName}-Alarms

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-Dashboard
      DashboardBody:
        Fn::Sub:
          - |
            {
              "widgets": [
                {
                  "type": "metric",
                  "x": 0,
                  "y": 0,
                  "width": 12,
                  "height": 6,
                  "properties": {
                    "metrics": [
                      [ "AWS/EC2", "CPUUtilization", "InstanceId", "${InstanceId}" ]
                    ],
                    "period": 300,
                    "stat": "Average",
                    "region": "${AWS::Region}",
                    "title": "CPU Utilization"
                  }
                }
              ]
            }
          - InstanceId: !Ref EC2Instance

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP Address
    Value: !GetAtt EC2Instance.PublicIp
  CloudWatchDashboardUrl:
    Description: CloudWatch Dashboard URL
    Value: !Sub https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#/dashboard/!Ref CloudWatchDashboard