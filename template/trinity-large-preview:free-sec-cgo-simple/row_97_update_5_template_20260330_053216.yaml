AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data for centralized governance and reporting

Parameters:
  S3BucketName:
    Type: String
    Default: organization-data-bucket
    AllowedPattern: ^[a-z0-9.-]{3,63}$
    Description: Name of the S3 bucket to store organizational data
  TagsToInclude:
    Type: String
    Default: "Environment,Owner,Project"
    Description: Comma-separated list of tags to include in reports
  ManagementAccountId:
    Type: String
    Default: "123456789012"
    AllowedPattern: ^\d{12}$
    Description: AWS Management Account ID for cross-account access
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: Name of the Athena database for cataloging data

Resources:
  OrganizationDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BlockPublicAccess:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: Production

  OrganizationDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OrganizationDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${OrganizationDataBucket}/*'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - organizations:Describe*
                  - organizations:List*
                Resource: '*'
        - PolicyName: CrossAccountAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/OrganizationDataReader'
        - PolicyName: S3WriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OrganizationDataBucket}/*'
      Tags:
        - Key: Environment
          Value: Production

  OrganizationDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          DATA_BUCKET: !Ref S3BucketName
          TAGS_TO_INCLUDE: !Ref TagsToInclude
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          def lambda_handler(event, context):
              org_client = boto3.client('organizations')
              s3_client = boto3.client('s3')

              # Fetch organization data
              accounts = org_client.list_accounts()
              ous = org_client.list_organizational_units_for_parent(ParentId='r-root')
              tags = org_client.list_tags_for_resource(ResourceId='r-root')

              # Filter tags based on parameter
              tags_to_include = os.environ['TAGS_TO_INCLUDE'].split(',')
              filtered_tags = {tag['Key']: tag['Value'] for tag in tags['Tags'] if tag['Key'] in tags_to_include}

              # Prepare data
              data = {
                  'timestamp': datetime.now().isoformat(),
                  'accounts': accounts,
                  'ous': ous,
                  'tags': filtered_tags
              }

              # Write to S3
              s3_key = f"organization-data/{datetime.now().strftime('%Y/%m/%d')}/data.json"
              s3_client.put_object(
                  Bucket=os.environ['DATA_BUCKET'],
                  Key=s3_key,
                  Body=json.dumps(data),
                  ContentType='application/json'
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Organization data collected successfully')
              }
      Tags:
        - Key: Environment
          Value: Production

  WeeklyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Weekly trigger for organization data collection
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn: !GetAtt OrganizationDataLambda.Arn
          Id: OrganizationDataLambdaTarget

  OrganizationDataLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OrganizationDataLambda
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WeeklyScheduleRule.Arn

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${OrganizationDataBucket}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt OrganizationDataBucket.Arn
      Tags:
        - Key: Environment
          Value: Production

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrganizationDataCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${OrganizationDataBucket}/organization-data/'
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Organization Data Lambda Function
    Value: !GetAtt OrganizationDataLambda.Arn
  S3BucketName:
    Description: Name of the S3 bucket storing organizational data
    Value: !Ref OrganizationDataBucket
  GlueCrawlerName:
    Description: Name of the Glue Crawler
    Value: !GetAtt GlueCrawler.Name
  AthenaDatabaseName:
    Description: Name of the Athena database
    Value: !Ref AthenaDatabaseName