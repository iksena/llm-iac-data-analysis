AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard with VPC Flow Logs Insights Widgets for NAT Gateway

Resources:
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NATGatewayFlowLogsDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": "SOURCE '/aws/vpc/flow_logs' | filter interfaceId like 'eni-' | stats count(*) as Total by srcAddr | sort Total desc | limit 20",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic",
                "start": "-P30D",
                "end": "now"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": "SOURCE '/aws/vpc/flow_logs' | filter interfaceId like 'eni-' and action = 'REJECT' | stats count(*) as Rejected by srcAddr | sort Rejected desc | limit 20",
                "region": "${AWS::Region}",
                "title": "Rejected Connections",
                "start": "-P30D",
                "end": "now"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": "SOURCE '/aws/vpc/flow_logs' | filter interfaceId like 'eni-' and action = 'ACCEPT' and dstAddr like '10.%' | stats count(*) as InternalTraffic by dstAddr | sort InternalTraffic desc | limit 20",
                "region": "${AWS::Region}",
                "title": "Internal Traffic Destinations",
                "start": "-P30D",
                "end": "now"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "view": "table",
                "query": "SOURCE '/aws/vpc/flow_logs' | filter interfaceId like 'eni-' and protocol = '6' | stats count(*) as TCPConnections by srcAddr | sort TCPConnections desc | limit 20",
                "region": "${AWS::Region}",
                "title": "Top TCP Connections",
                "start": "-P30D",
                "end": "now"
              }
            }
          ]
        }