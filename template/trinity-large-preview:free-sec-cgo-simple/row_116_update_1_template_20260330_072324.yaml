AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDeadLetterQueue.Arn
        maxReceiveCount: 3

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDeadLetterQueue.Arn
        maxReceiveCount: 3

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDeadLetterQueue

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDeadLetterQueue

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricsTopic

  AllMetricsSqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: SQS
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
      FilterPolicy: null

  TemperatureSqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: SQS
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: SQS
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  SnsTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SnsTopic
  AllMetricsSqsQueueArn:
    Description: ARN of the AllMetrics SQS queue
    Value: !GetAtt AllMetricsSqsQueue.Arn
  TemperatureSqsQueueArn:
    Description: ARN of the Temperature SQS queue
    Value: !GetAtt TemperatureSqsQueue.Arn
  HumiditySqsQueueArn:
    Description: ARN of the Humidity SQS queue
    Value: !GetAtt HumiditySqsQueue.Arn
  TemperatureDeadLetterQueueArn:
    Description: ARN of the Temperature Dead Letter Queue
    Value: !GetAtt TemperatureDeadLetterQueue.Arn
  HumidityDeadLetterQueueArn:
    Description: ARN of the Humidity Dead Letter Queue
    Value: !GetAtt HumidityDeadLetterQueue.Arn