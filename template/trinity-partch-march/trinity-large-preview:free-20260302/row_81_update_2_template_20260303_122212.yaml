AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Resource Group using tag-based filters for EC2, RDS, SageMaker, SSM, and other services.

Parameters:
  TagKey:
    Type: String
    Description: The tag key to filter resources
  TagValue:
    Type: String
    Description: The tag value to filter resources

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub 'resource-group-${TagKey}-${TagValue}'
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - "AWS::EC2::Instance"
            - "AWS::RDS::DBInstance"
            - "AWS::SageMaker::NotebookInstance"
            - "AWS::SSM::ManagedInstance"
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue

Outputs:
  ResourceGroupArn:
    Description: The ARN of the Resource Group
    Value: !GetAtt ResourceGroup.GroupArn