AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready web application environment with S3, DynamoDB, and EC2 integration'
Parameters:
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0f65671a86f061fcd
    us-west-1:
      AMI: ami-0c94855ba95c71e0f
    us-west-2:
      AMI: ami-0f53b7b5e5e3c6a18
    ap-south-1:
      AMI: ami-0f79fbcc7c2d273b5
    ap-northeast-1:
      AMI: ami-0d2bc6cf5b4b310e2
    ap-southeast-1:
      AMI: ami-08556e2956d660a66
    ap-southeast-2:
      AMI: ami-0c25b3b4a8f5f9c18
    eu-central-1:
      AMI: ami-0c9e55909c6c1875a
    eu-west-1:
      AMI: ami-0d5d9d301c853a04a
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PublicSubnet
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from anywhere
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WebAppSG
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadForStaticAssets
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${S3Bucket}/*"
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: Version
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: Version
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                  - dynamodb:*
                Resource: '*'
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: DynamoDBTable
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Sub: 
            - |
              #!/bin/bash
              yum update -y
              yum install -y httpd php php-cli aws-cli jq
              systemctl start httpd
              systemctl enable httpd
              
              cat > /var/www/html/index.php <<'EOF'
              <html>
              <head>
                <title>Lab Application</title>
                <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
              </head>
              <body>
                <h1>Welcome to the Lab Application</h1>
                <img src="https://${S3Bucket}.${AWS::URLSuffix}/sample.jpg" alt="Sample">
              </body>
              </html>
              EOF
              
              echo "Sample image content" > /tmp/sample.jpg
              aws s3 cp /tmp/sample.jpg s3://${S3Bucket}/sample.jpg
              
              cat > /tmp/data.json <<'EOT'
              {
                "ServiceName": {"S": "EC2"},
                "Version": {"S": "2023"}
              }
              EOT
              
              for i in {1..30}; do
                aws dynamodb describe-table --table-name AWS-Services --query "Table.TableStatus" --output text | grep -q "ACTIVE" && break
                sleep 5
              done
              
              aws dynamodb put-item --table-name AWS-Services --item file:///tmp/data.json
              
              systemctl restart httpd
            - S3Bucket: !Ref S3Bucket
Outputs:
  EC2PublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt EC2Instance.PublicIp
  S3BucketName:
    Description: Name of the S3 bucket for static assets
    Value: !Ref S3Bucket
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: AWS-Services