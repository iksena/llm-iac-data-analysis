AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  DisableCISv140:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable CIS v1.4 controls'
  DisableCISv120:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable CIS v1.2 controls'
  DisableAWSFoundational:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to disable AWS Foundational Security Best Practices'
  LambdaMemorySize:
    Type: Number
    Default: 128
    MinValue: 128
    MaxValue: 10240
    Description: 'Amount of memory available to the Lambda function'
  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 1
    MaxValue: 900
    Description: 'Maximum allowed execution time for the Lambda function'
  PermissionsBoundary:
    Type: String
    Default: ''
    Description: 'Optional ARN of permissions boundary policy'
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: 'Number of days to retain CloudWatch Logs'
Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, '']]
Resources:
  SecurityHubControlManagerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-SecurityHubManager'
      RetentionInDays: !Ref LogRetentionDays
  SecurityHubControlManagerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref 'AWS::NoValue'
      Policies:
        - PolicyName: SecurityHubControlManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: securityhub:UpdateStandardsControl
                Resource: '*'
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-SecurityHubManager'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-SecurityHubManager:log-stream:*'
  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    DependsOn: SecurityHubControlManagerLogGroup
    Properties:
      FunctionName: !Sub '${AWS::StackName}-SecurityHubManager'
      Code:
        ZipFile: |
          import boto3,os,logging
          logger=logging.getLogger()
          logger.setLevel(logging.INFO)
          def lambda_handler(e,c):
              s=boto3.client('securityhub')
              r=os.environ['AWS_REGION']
              a=boto3.client('sts').get_caller_identity()['Account']
              d14=os.getenv('DISABLE_CIS_V140','false').lower()=='true'
              d12=os.getenv('DISABLE_CIS_V120','false').lower()=='true'
              daf=os.getenv('DISABLE_AWS_FOUNDATIONAL','false').lower()=='true'
              try:
                  if d14:logger.info("Disabling CIS v1.4");_d(s,r,a,'cis-aws-foundations-benchmark','1.4.0')
                  if d12:logger.info("Disabling CIS v1.2");_d(s,r,a,'cis-aws-foundations-benchmark','1.2.0')
                  if daf:logger.info("Disabling AWS Foundational");_d(s,r,a,'aws-foundational-security-best-practices','1.0.0')
                  return{'status':'success'}
              except Exception as x:logger.error(f"Failed: {str(x)}");raise
          def _d(c,r,a,sid,v):
              a_arn=f'arn:aws:securityhub:{r}:{a}:subscription/{sid}/v/{v}'
              try:
                  for p in c.get_paginator('describe_standards_controls').paginate(StandardsSubscriptionArn=a_arn):
                      for ctrl in p['Controls']:
                          if ctrl['ControlStatus']!='DISABLED':
                              c.update_standards_control(StandardsControlArn=ctrl['StandardsControlArn'],ControlStatus='DISABLED',DisabledReason='Managed by CFN')
              except Exception as e:logger.warning(f"Skipped: {str(e)}")
      Handler: index.lambda_handler
      Role: !GetAtt SecurityHubControlManagerRole.Arn
      Runtime: python3.12
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Environment:
        Variables:
          DISABLE_CIS_V140: !Ref DisableCISv140
          DISABLE_CIS_V120: !Ref DisableCISv120
          DISABLE_AWS_FOUNDATIONAL: !Ref DisableAWSFoundational
Outputs:
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref SecurityHubControlManagerFunction
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt SecurityHubControlManagerFunction.Arn
  IamRoleName:
    Description: Name of the IAM role used by the Lambda function
    Value: !Ref SecurityHubControlManagerRole