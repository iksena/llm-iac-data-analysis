AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Pool with secure admin-managed user provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
  DomainPrefix:
    Type: String
    Default: myapp
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
  EmailVerificationSubject:
    Type: String
    Default: Your verification code

Resources:
  MyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      UsernameAttributes:
        - email
      MfaConfiguration: OFF
      EmailConfiguration:
        EmailVerificationMessage: !Ref EmailVerificationMessage
        EmailVerificationSubject: !Ref EmailVerificationSubject
      Schema:
        - Name: email
          Required: true
          Mutable: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  MyUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MyUserPoolClient
      UserPoolId: !Ref MyUserPool
      GenerateSecret: false
      RefreshTokenValidity: 30
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - phone
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - https://myapp.com/callback
      LogoutURLs:
        - https://myapp.com/logout

  MyUserPoolResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: https://myapp.com
      Name: MyUserPoolResourceServer
      UserPoolId: !Ref MyUserPool
      Scopes:
        - ScopeName: phone
          ScopeDescription: Access phone number
        - ScopeName: email
          ScopeDescription: Access email address
        - ScopeName: openid
          ScopeDescription: Access openid
        - ScopeName: profile
          ScopeDescription: Access user profile
        - ScopeName: aws.cognito.signin.user.admin
          ScopeDescription: Access user admin

  MyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref MyUserPool

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref MyUserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref MyUserPoolClient
  UserPoolDomain:
    Description: Cognito User Pool Domain
    Value: !Sub '${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'