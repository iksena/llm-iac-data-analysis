AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time data ingestion pipeline using Kinesis Data Streams and Firehose'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'prod'
    Description: Environment name for resource naming
    
  StreamRetentionHours:
    Type: Number
    Default: 24
    Description: Retention period for Kinesis Stream in hours
    MinValue: 24
    MaxValue: 168
    
  FirehoseBufferInterval:
    Type: Number
    Default: 300
    Description: Buffer interval in seconds for Firehose
    MinValue: 60
    MaxValue: 900
    
  FirehoseBufferSize:
    Type: Number
    Default: 5
    Description: Buffer size in MB for Firehose
    MinValue: 1
    MaxValue: 128

Resources:
  DataBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  KMSKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: 'KMS key for data pipeline encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  DataStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Sub '${EnvironmentName}-data-stream'
      RetentionPeriodHours: !Ref StreamRetentionHours
      StreamEncryption:
        EncryptionType: KMS
        KeyId: !GetAtt KMSKey.Arn
      ShardCount: 1

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: FirehoseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 'kinesis:DescribeStream'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                Resource: !GetAtt DataStream.Arn
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:GenerateDataKey'
                Resource: !GetAtt KMSKey.Arn

  DeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Sub '${EnvironmentName}-delivery-stream'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          IntervalInSeconds: !Ref FirehoseBufferInterval
          SizeInMBs: !Ref FirehoseBufferSize
        CompressionFormat: GZIP
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN: !GetAtt KMSKey.Arn
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        ErrorOutputPrefix: 'errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        RoleARN: !GetAtt FirehoseRole.Arn

Outputs:
  KinesisStreamArn:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt DataStream.Arn
    
  FirehoseDeliveryStreamArn:
    Description: 'ARN of the Kinesis Firehose Delivery Stream'
    Value: !GetAtt DeliveryStream.Arn
    
  S3BucketName:
    Description: 'Name of the S3 bucket for data storage'
    Value: !Ref DataBucket