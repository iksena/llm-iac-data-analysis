AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-threshold AWS Billing Alarms with CloudWatch and SNS

Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties: {}

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: xxxxx@gmail.com
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS Billing Alarm - $5
      AlarmDescription: Alarm when AWS estimated charges exceed $5
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      OKActions:
        - !Ref BillingAlarmTopic

  BillingAlarm10:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS Billing Alarm - $10
      AlarmDescription: Alarm when AWS estimated charges exceed $10
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      OKActions:
        - !Ref BillingAlarmTopic

  BillingAlarm20:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS Billing Alarm - $20
      AlarmDescription: Alarm when AWS estimated charges exceed $20
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      OKActions:
        - !Ref BillingAlarmTopic

  BillingAlarm40:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AWS Billing Alarm - $40
      AlarmDescription: Alarm when AWS estimated charges exceed $40
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Dimensions:
        - Name: Currency
          Value: USD
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40.0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      OKActions:
        - !Ref BillingAlarmTopic

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Billing Alarm Configuration
        Parameters:
          - BillingAlarmTopic
          - BillingAlarmSubscription
          - BillingAlarm5
          - BillingAlarm10
          - BillingAlarm20
          - BillingAlarm40
    ParameterLabels:
      BillingAlarmTopic:
        default: SNS Topic for Billing Alarms
      BillingAlarmSubscription:
        default: Email Subscription
      BillingAlarm5:
        default: $5 Threshold Alarm
      BillingAlarm10:
        default: $10 Threshold Alarm
      BillingAlarm20:
        default: $20 Threshold Alarm
      BillingAlarm40:
        default: $40 Threshold Alarm