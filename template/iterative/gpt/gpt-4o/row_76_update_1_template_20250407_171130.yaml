AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create IAM roles with tiered permissions for Security Admins, Admins, Users, and Non-Users.

Resources:
  SecurityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, fis.amazonaws.com]
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SecurityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, fis.amazonaws.com]
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  UserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, fis.amazonaws.com]
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:ListExperiments'
                  - 'fis:TagResource'
                Resource: '*'
                Condition:
                  StringNotEquals:
                    'aws:ResourceTag/environment': 'prod'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  NonUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, fis.amazonaws.com]
            Action: sts:AssumeRole
      Policies:
        - PolicyName: NonUserPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  SecurityAdminRoleArn:
    Description: ARN of the Security Admin Role
    Value: !GetAtt SecurityAdminRole.Arn

  AdminRoleArn:
    Description: ARN of the Admin Role
    Value: !GetAtt AdminRole.Arn

  UserRoleArn:
    Description: ARN of the User Role
    Value: !GetAtt UserRole.Arn

  NonUserRoleArn:
    Description: ARN of the Non-User Role
    Value: !GetAtt NonUserRole.Arn