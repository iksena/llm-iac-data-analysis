AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Secrets Manager Monitoring and Notification System

Parameters:
  NotificationEmail:
    Type: String
    Default: admin@example.com
    Description: Email address to receive notifications
  SecretNamePattern:
    Type: String
    Default: '*'
    Description: Secret name pattern to monitor (supports wildcards)
  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda function timeout in seconds
  LambdaMemory:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  SecretsManagerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerNotificationTopic

  SecretsManagerNotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref SecretsManagerNotificationTopic

  SecretsManagerNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerNotificationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SecretsManagerNotificationTopic
              - Effect: Allow
                Action:
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:ListSecrets
                Resource: '*'

  SecretsManagerNotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt SecretsManagerNotificationRole.Arn
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          sns_client = boto3.client('sns')

          def lambda_handler(event, context):
              try:
                  detail = event['detail']
                  secret_id = detail.get('SecretId', 'Unknown')
                  event_type = detail.get('EventType', 'Unknown')
                  timestamp = detail.get('Timestamp', 'Unknown')

                  message = f"Secrets Manager Event Alert\\n\\n"
                  message += f"Event Type: {event_type}\\n"
                  message += f"Secret ID: {secret_id}\\n"
                  message += f"Timestamp: {timestamp}\\n"
                  message += f"Request ID: {detail.get('RequestId', 'Unknown')}\\n"

                  if event_type == 'GetSecretValue':
                      message += f"ARN: {detail.get('ARN', 'Unknown')}\\n"

                  sns_client.publish(
                      TopicArn=os.environ['SNS_TOPIC_ARN'],
                      Subject=f"Secrets Manager {event_type} Alert",
                      Message=message
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Notification sent successfully')
                  }
              except Exception as e:
                  print(f"Error processing event: {str(e)}")
                  raise e

      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SecretsManagerNotificationTopic

  SecretsManagerNotificationRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Monitor Secrets Manager lifecycle events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
          requestParameters:
            secretId:
              - !Ref SecretNamePattern
      State: ENABLED
      Targets:
        - Arn: !GetAtt SecretsManagerNotificationFunction.Arn
          Id: SecretsManagerNotificationTarget

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SecretsManagerNotificationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SecretsManagerNotificationRule.Arn

Outputs:
  SNSTopicARN:
    Description: SNS Topic ARN for Secrets Manager notifications
    Value: !Ref SecretsManagerNotificationTopic
  LambdaFunctionARN:
    Description: Lambda Function ARN
    Value: !GetAtt SecretsManagerNotificationFunction.Arn
  EventRuleName:
    Description: EventBridge Rule Name
    Value: !Ref SecretsManagerNotificationRule