AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a simple Node.js 20.x Lambda function that prints Hello World

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: lambda-basic-execution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HelloWorldFunction
      Description: A simple Lambda function that returns Hello World
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const response = {
                  statusCode: 200,
                  body: JSON.stringify('Hello World!'),
              };
              return response;
          };
      Timeout: 3
      MemorySize: 128

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Hello World Lambda function
    Value: !GetAtt HelloWorldFunction.Arn
    Export:
      Name: HelloWorldLambdaArn

  LambdaFunctionName:
    Description: Name of the Hello World Lambda function
    Value: !Ref HelloWorldFunction
    Export:
      Name: HelloWorldLambdaName