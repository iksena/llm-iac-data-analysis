AWSTemplateFormatVersion: '2010-09-09'

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      EnableDefaultStandards: true
      EnableControlFinding: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SecurityHub'

Outputs:
  SecurityHubArn:
    Description: Security Hub ARN
    Value: !GetAtt SecurityHub.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SecurityHubArn'