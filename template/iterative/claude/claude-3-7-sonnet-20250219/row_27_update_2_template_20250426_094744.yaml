AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for real-time data ingestion and storage pipeline using Kinesis Data Stream and Firehose to S3'

Parameters:
  KinesisStreamName:
    Type: String
    Default: 'data-ingestion-stream'
    Description: Name of the Kinesis Data Stream
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: Must contain only alphanumeric characters, underscores, hyphens, and periods.

  KinesisStreamShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
    Description: Number of shards for the Kinesis Data Stream

  KinesisStreamRetentionPeriod:
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168
    Description: Retention period in hours for data in Kinesis Data Stream

  FirehoseDeliveryStreamName:
    Type: String
    Default: 'data-delivery-stream'
    Description: Name of the Firehose Delivery Stream
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: Must contain only alphanumeric characters, underscores, hyphens, and periods.

  S3BucketPrefix:
    Type: String
    Default: 'data/'
    Description: Prefix for organizing data in the S3 bucket

  FirehoseBufferingInterval:
    Type: Number
    Default: 60
    MinValue: 60
    MaxValue: 900
    Description: Buffer interval in seconds for Firehose

  FirehoseBufferingSize:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 128
    Description: Buffer size in MB for Firehose

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToStandardIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref KinesisStreamRetentionPeriod
      ShardCount: !Ref KinesisStreamShardCount
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole

  FirehoseDeliveryPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: firehose-delivery-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:DescribeStream
              - kinesis:GetShardIterator
              - kinesis:GetRecords
              - kinesis:ListShards
            Resource: !GetAtt KinesisDataStream.Arn
          - Effect: Allow
            Action:
              - s3:AbortMultipartUpload
              - s3:GetBucketLocation
              - s3:GetObject
              - s3:ListBucket
              - s3:ListBucketMultipartUploads
              - s3:PutObject
            Resource:
              - !GetAtt DataBucket.Arn
              - !Sub '${DataBucket.Arn}/*'
          - Effect: Allow
            Action:
              - logs:PutLogEvents
              - logs:CreateLogGroup
              - logs:CreateLogStream
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/${FirehoseDeliveryStreamName}:*'
      Roles:
        - !Ref FirehoseDeliveryRole

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/kinesisfirehose/${FirehoseDeliveryStreamName}'
      RetentionInDays: 7

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseDeliveryPolicy
    Properties:
      DeliveryStreamName: !Ref FirehoseDeliveryStreamName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          IntervalInSeconds: !Ref FirehoseBufferingInterval
          SizeInMBs: !Ref FirehoseBufferingSize
        CompressionFormat: GZIP
        Prefix: !Ref S3BucketPrefix
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: 'S3Delivery'
        ProcessingConfiguration:
          Enabled: false
        S3BackupMode: Disabled

Outputs:
  KinesisStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn

  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref KinesisDataStream

  FirehoseDeliveryStreamARN:
    Description: ARN of the Firehose Delivery Stream
    Value: !GetAtt FirehoseDeliveryStream.Arn

  FirehoseDeliveryStreamName:
    Description: Name of the Firehose Delivery Stream
    Value: !Ref FirehoseDeliveryStream

  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref DataBucket

  S3BucketARN:
    Description: ARN of the S3 bucket
    Value: !GetAtt DataBucket.Arn