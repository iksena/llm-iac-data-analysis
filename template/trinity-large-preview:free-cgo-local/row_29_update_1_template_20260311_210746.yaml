AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval workflows using AWS Systems Manager Parameter Store and Secrets Manager

Parameters:
  NamespacePrefix:
    Type: String
    Default: "/myapp"
    Description: Stack-specific namespace prefix for SSM parameters

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "${NamespacePrefix}/config"
      Type: String
      Value: "This is A/B"
      Description: Non-sensitive configuration parameter

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${NamespacePrefix}/secret"
      Description: Secure secret with predefined username and generated password
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "admin"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'
        ExcludePunctuation: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${NamespacePrefix}/*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt SecretsManagerSecret.Arn

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ParameterRetriever"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              # Retrieve SSM parameter
              ssm_response = ssm_client.get_parameter(Name='/myapp/config', WithDecryption=False)
              ssm_value = ssm_response['Parameter']['Value']

              # Retrieve Secrets Manager secret
              secret_response = secrets_client.get_secret_value(SecretId='/myapp/secret')
              secret_value = json.loads(secret_response['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secret': secret_value
                  })
              }
      Environment:
        Variables:
          SSM_PARAMETER_PATH: !Sub "${NamespacePrefix}/config"
          SECRET_NAME: !Sub "${NamespacePrefix}/secret"

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  SecretsManagerSecretArn:
    Description: ARN of the Secrets Manager secret
    Value: !GetAtt SecretsManagerSecret.Arn
  SSMParameterArn:
    Description: ARN of the SSM parameter
    Value: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${NamespacePrefix}/config"