AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a CloudWatch Dashboard with widgets for analyzing NAT Gateway VPC Flow Logs.

Parameters:
  LogGroupName:
    Type: String
    Description: The name of the CloudWatch Log Group containing VPC Flow Logs.
    Default: /aws/vpc/flowlogs  # Default value added to ensure parameter is provided
  DashboardName:
    Type: String
    Default: NATGatewayFlowLogsDashboard
    Description: The name of the CloudWatch Dashboard to be created.

Resources:
  NATGatewayFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: 
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "log",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message | filter interfaceId like 'eni-' | stats sum(bytes) as totalBytes by srcAddr | sort totalBytes desc | limit 10",
                  "region": "${AWS::Region}",
                  "title": "Top Source IPs by Outbound Traffic",
                  "logGroupNames": ["${LogGroupName}"]
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message | filter interfaceId like 'eni-' and action='REJECT' | stats count() as rejections by srcAddr | sort rejections desc | limit 10",
                  "region": "${AWS::Region}",
                  "title": "Top Source IPs by Rejected Connections",
                  "logGroupNames": ["${LogGroupName}"]
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message | filter interfaceId like 'eni-' | stats sum(bytes) as totalBytes by dstAddr | sort totalBytes desc | limit 10",
                  "region": "${AWS::Region}",
                  "title": "Top Destination IPs by Outbound Traffic",
                  "logGroupNames": ["${LogGroupName}"]
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 6,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "fields @timestamp, @message | filter interfaceId like 'eni-' and action='REJECT' | stats count() as rejections by dstAddr | sort rejections desc | limit 10",
                  "region": "${AWS::Region}",
                  "title": "Top Destination IPs by Rejected Connections",
                  "logGroupNames": ["${LogGroupName}"]
                }
              }
            ]
          }

Outputs:
  DashboardURL:
    Description: URL of the CloudWatch Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"