AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyAdminAPIKey:
    Description: 'Shopify Admin API Key for authentication'
    Type: String
    NoEcho: true
  ShopifyShopName:
    Description: 'Name of your Shopify shop (without .myshopify.com)'
    Type: String
    Default: 'testanu'
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Shop name must only contain alphanumeric characters and hyphens'
  EventBusName:
    Description: 'Name for the EventBridge event bus'
    Type: String
    Default: 'MyShopifyAppEventBus'

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  ShopifyAPIConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub 'shopify-api-connection-${ShopifyShopName}'
      Description: 'Connection to Shopify Admin API'
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'X-Shopify-Access-Token'
          ApiKeyValue: !Ref ShopifyAdminAPIKey

  ShopifyAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub 'shopify-product-api-${ShopifyShopName}'
      Description: 'API Destination for Shopify product creation'
      ConnectionArn: !GetAtt ShopifyAPIConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://${ShopifyShopName}.myshopify.com/admin/api/2023-10/products.json'
      InvocationRateLimitPerSecond: 10

  EventBridgeInvokeAPIRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'EventBridgeInvokeShopifyAPI-${ShopifyShopName}'
      Description: 'IAM Role allowing EventBridge to invoke Shopify API Destination'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAPIDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ShopifyAPIDestination.Arn

  ShopifyProductUpdateRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'shopify-product-update-rule-${ShopifyShopName}'
      Description: 'Rule to trigger Shopify product creation on events'
      EventBusName: !Ref EventBusName
      EventPattern:
        source:
          - !Ref EventBusName
        detail-type:
          - 'ProductCreated'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ShopifyAPIDestination.Arn
          Id: 'ShopifyProductAPIDestination'
          RoleArn: !GetAtt EventBridgeInvokeAPIRole.Arn

Outputs:
  EventBusARN:
    Description: 'ARN of the EventBridge Event Bus'
    Value: !GetAtt ShopifyEventBus.Arn
  APIEndpoint:
    Description: 'Shopify API Endpoint URL'
    Value: !Sub 'https://${ShopifyShopName}.myshopify.com/admin/api/2023-10/products.json'
  RuleARN:
    Description: 'ARN of the EventBridge Rule'
    Value: !GetAtt ShopifyProductUpdateRule.Arn
  ConnectionARN:
    Description: 'ARN of the API Connection'
    Value: !GetAtt ShopifyAPIConnection.Arn