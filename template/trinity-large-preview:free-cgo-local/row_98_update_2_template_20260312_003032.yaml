AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: TodoApp
      Repository: https://github.com/your-repo/TodoApp.git
      Platform: WEB
      AutoBranchCreationConfig:
        EnableAutoBranchCreation: true
        AutoBranchCreationPatterns:
          - production
        EnableAutoBuild: true
        BuildSpec: |
          version: 1
          frontend:
            phases:
              build:
                commands:
                  - npm ci
                  - npm run build
            artifacts:
              baseDirectory: build
              files:
                - '**/*'
            cache:
              paths:
                - node_modules/**/*

  AmplifyProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      BranchName: production
      AppId: !GetAtt AmplifyApp.AppId
      EnableAutoBuild: true

  AmplifyAppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AmplifyAppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                  - codecommit:*
                  - s3:*
                  - cloudformation:*
                  - logs:*
                  - iam:*
                Resource: '*'

Outputs:
  AppId:
    Description: The ID of the Amplify App
    Value: !Ref AmplifyApp
  Arn:
    Description: The ARN of the Amplify App
    Value: !GetAtt AmplifyApp.Arn
  DefaultDomain:
    Description: The default domain of the Amplify App
    Value: !GetAtt AmplifyApp.DefaultDomain