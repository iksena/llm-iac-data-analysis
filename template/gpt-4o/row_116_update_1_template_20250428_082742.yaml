AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralMetricsTopic

  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDeadLetterQueue.Arn
        maxReceiveCount: 5

  AllMetricsDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsDeadLetterQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDeadLetterQueue.Arn
        maxReceiveCount: 5

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDeadLetterQueue

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDeadLetterQueue.Arn
        maxReceiveCount: 5

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDeadLetterQueue

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  CentralSnsTopicArn:
    Description: ARN of the central SNS topic
    Value: !Ref CentralSnsTopic

  AllMetricsSqsQueueArn:
    Description: ARN of the All Metrics SQS Queue
    Value: !GetAtt AllMetricsSqsQueue.Arn

  TemperatureSqsQueueArn:
    Description: ARN of the Temperature SQS Queue
    Value: !GetAtt TemperatureSqsQueue.Arn

  HumiditySqsQueueArn:
    Description: ARN of the Humidity SQS Queue
    Value: !GetAtt HumiditySqsQueue.Arn

  AllMetricsDeadLetterQueueArn:
    Description: ARN of the All Metrics Dead-Letter Queue
    Value: !GetAtt AllMetricsDeadLetterQueue.Arn

  TemperatureDeadLetterQueueArn:
    Description: ARN of the Temperature Dead-Letter Queue
    Value: !GetAtt TemperatureDeadLetterQueue.Arn

  HumidityDeadLetterQueueArn:
    Description: ARN of the Humidity Dead-Letter Queue
    Value: !GetAtt HumidityDeadLetterQueue.Arn