AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates an S3 bucket with event-driven notifications
  to an SNS topic. When new objects are uploaded to the S3 bucket, an event is triggered and sent
  to the SNS topic.

Parameters:
  BucketName:
    Description: "The name of the S3 bucket. Must be globally unique and contain only lower-case letters, numbers, dots, and hyphens."
    Type: String
    MinLength: 3
    MaxLength: 63
    AllowedPattern: "^[a-z0-9.-]+$"
    ConstraintDescription: "Bucket name must be 3-63 characters long and contain only lower-case letters, numbers, dots, and hyphens."

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Event Notification Topic"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowS3Publish"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "sns:Publish"
            Resource: !GetAtt SNSTopic.TopicArn
            Condition:
              ArnLike:
                aws:SourceArn: 
                  Fn::Sub: "arn:aws:s3:::${BucketName}"
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        TopicConfigurations:
          - Event: "s3:ObjectCreated:*"
            Topic: !GetAtt SNSTopic.TopicArn

Outputs:
  SNSTopicARN:
    Description: "SNS Topic ARN for S3 notifications"
    Value: !GetAtt SNSTopic.TopicArn
  S3BucketName:
    Description: "S3 Bucket name"
    Value: !Ref S3Bucket