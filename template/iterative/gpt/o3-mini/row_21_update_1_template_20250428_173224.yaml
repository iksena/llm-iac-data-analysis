AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon Timestream Database and four tables with configurable retention policies.
Parameters:
  TimestreamDatabaseName:
    Type: String
    Description: "Name of the Timestream Database"
    Default: "poc-timestream-database"
  BatchWriteMemoryRetentionInHours:
    Type: Number
    Description: "Memory store retention period in hours for poc-table-01-batch-write"
    Default: 24
  BatchWriteMagneticRetentionInDays:
    Type: Number
    Description: "Magnetic store retention period in days for poc-table-01-batch-write"
    Default: 7
  OlderMemOnlyMemoryRetentionInHours:
    Type: Number
    Description: "Memory store retention period in hours for poc-table-02-older-records-memonly"
    Default: 720
  OlderMemOnlyMagneticRetentionInDays:
    Type: Number
    Description: "Magnetic store retention period in days for poc-table-02-older-records-memonly"
    Default: 1
  OlderMagneticMemoryRetentionInHours:
    Type: Number
    Description: "Memory store retention period in hours for poc-table-03-older-records-magnetic"
    Default: 24
  OlderMagneticMagneticRetentionInDays:
    Type: Number
    Description: "Magnetic store retention period in days for poc-table-03-older-records-magnetic"
    Default: 365
  CommonAttributesMemoryRetentionInHours:
    Type: Number
    Description: "Memory store retention period in hours for poc-table-04-common-attributes"
    Default: 48
  CommonAttributesMagneticRetentionInDays:
    Type: Number
    Description: "Magnetic store retention period in days for poc-table-04-common-attributes"
    Default: 14

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref TimestreamDatabaseName

  BatchWriteTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabaseName
      TableName: "poc-table-01-batch-write"
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref BatchWriteMemoryRetentionInHours
        MagneticStoreRetentionPeriodInDays: !Ref BatchWriteMagneticRetentionInDays

  OlderRecordsMemonlyTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabaseName
      TableName: "poc-table-02-older-records-memonly"
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref OlderMemOnlyMemoryRetentionInHours
        MagneticStoreRetentionPeriodInDays: !Ref OlderMemOnlyMagneticRetentionInDays

  OlderRecordsMagneticTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabaseName
      TableName: "poc-table-03-older-records-magnetic"
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref OlderMagneticMemoryRetentionInHours
        MagneticStoreRetentionPeriodInDays: !Ref OlderMagneticMagneticRetentionInDays

  CommonAttributesTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref TimestreamDatabaseName
      TableName: "poc-table-04-common-attributes"
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref CommonAttributesMemoryRetentionInHours
        MagneticStoreRetentionPeriodInDays: !Ref CommonAttributesMagneticRetentionInDays

Outputs:
  DatabaseName:
    Description: "The name of the Timestream Database"
    Value: !Ref TimestreamDatabaseName
  BatchWriteTableARN:
    Description: "ARN of the poc-table-01-batch-write table"
    Value: !GetAtt BatchWriteTable.Arn
  OlderRecordsMemonlyTableARN:
    Description: "ARN of the poc-table-02-older-records-memonly table"
    Value: !GetAtt OlderRecordsMemonlyTable.Arn
  OlderRecordsMagneticTableARN:
    Description: "ARN of the poc-table-03-older-records-magnetic table"
    Value: !GetAtt OlderRecordsMagneticTable.Arn
  CommonAttributesTableARN:
    Description: "ARN of the poc-table-04-common-attributes table"
    Value: !GetAtt CommonAttributesTable.Arn