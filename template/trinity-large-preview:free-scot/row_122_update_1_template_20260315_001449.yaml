AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify's product creation API

Parameters:
  ShopifyAPIKey:
    Type: String
    NoEcho: true
    Default: dummy-api-key
    Description: Shopify admin API key for authentication
  EventSource:
    Type: String
    Default: MyShopifyApp
    Description: Source of events to be captured by EventBridge
  ShopifyEndpoint:
    Type: String
    Default: https://testanu.myshopify.com/admin/api/2023-07/products.json
    Description: Shopify product creation endpoint

Resources:
  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp
      EventSourceName: !Ref EventSource

  ApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      InvocationEndpoint: !Ref ShopifyEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt ApiDestinationRole.Arn
      InvocationHttpParameters:
        Header:
          - Key: Content-Type
            Value: application/json
          - Key: X-Shopify-Access-Token
            Value: !Ref ShopifyAPIKey

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref MyEventBus
  ApiDestinationArn:
    Description: ARN of the Shopify API destination
    Value: !GetAtt ShopifyApiDestination.Arn