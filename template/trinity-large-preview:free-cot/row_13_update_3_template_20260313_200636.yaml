AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Apache HTTP Server using cfn-init and cfn-signal

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      VpcId:
        Fn::ImportValue: !Sub '${AWS::Region}:vpc::id'

  EC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT5M
    Properties:
      ImageId: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId:
            Fn::ImportValue: !Sub '${AWS::Region}:subnet::id'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}

  EC2InstanceConfig:
    Type: AWS::CloudFormation::Init
    Properties:
      config:
        packages:
          yum:
            httpd: []
        services:
          sysvinit:
            httpd:
              enabled: true
              ensureRunning: true
        files:
          /var/www/html/index.html:
            content: |
              <html>
                <body>
                  <h1>Hello from CloudFormation!</h1>
                  <p>This page is served by Apache HTTP Server running on EC2.</p>
                </body>
              </html>
            mode: '000644'
            owner: root
            group: root
        commands:
          01_cfn_hup:
            command: !Sub |
              cat > /etc/cfn/hooks.d/cfn-auto-reloader.conf << EOF
              [cfn-auto-reloader-hook]
              triggers=post.update
              path=Resources.EC2Instance.Metadata.AWS::CloudFormation::Init
              action=/opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
              runas=root
              EOF
              cat > /etc/cfn/cfn-hup.conf << EOF
              [main]
              stack=${AWS::StackName}
              region=${AWS::Region}
              EOF
              cfn-hup
              chkconfig cfn-hup on

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS Name
    Value: !GetAtt EC2Instance.PublicDnsName
  PublicIP:
    Description: Public IP Address
    Value: !GetAtt EC2Instance.PublicIp