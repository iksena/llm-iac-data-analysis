AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Production ready AWS CloudFormation template that creates a DynamoDB table 
  with a Local Secondary Index (LSI) and a Global Secondary Index (GSI) using provisioned throughput.

Parameters:
  DynamoDBTableName:
    Type: String
    Description: "The name of the DynamoDB table."
    Default: "MyDynamoDBTable"
  ReadCapacityUnits:
    Type: Number
    Description: "Provisioned read capacity units for the table and global secondary index."
    Default: 5
  WriteCapacityUnits:
    Type: Number
    Description: "Provisioned write capacity units for the table and global secondary index."
    Default: 5

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: LSI_SK
          AttributeType: S
        - AttributeName: GSI_PK
          AttributeType: S
        - AttributeName: GSI_SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: LSIIndex
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: LSI_SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSIIndex
          KeySchema:
            - AttributeName: GSI_PK
              KeyType: HASH
            - AttributeName: GSI_SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  DynamoDBTableNameOutput:
    Description: "The name of the DynamoDB table."
    Value: !Ref MyDynamoDBTable
  DynamoDBTableArnOutput:
    Description: "The ARN of the DynamoDB table."
    Value: !GetAtt MyDynamoDBTable.Arn