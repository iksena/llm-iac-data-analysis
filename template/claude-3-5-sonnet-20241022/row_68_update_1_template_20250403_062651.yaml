AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role and Instance Profile for EC2 with CloudWatch and SSM integration'

Resources:
  EC2ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2ServiceRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
      Tags:
        - Key: Purpose
          Value: EC2-CloudWatch-SSM-Integration

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-EC2InstanceProfile'
      Path: /
      Roles:
        - !Ref EC2ServiceRole

Outputs:
  RoleARN:
    Description: ARN of the created IAM Role
    Value: !GetAtt EC2ServiceRole.Arn

  RoleName:
    Description: Name of the created IAM Role
    Value: !Ref EC2ServiceRole

  InstanceProfileARN:
    Description: ARN of the created Instance Profile
    Value: !GetAtt EC2InstanceProfile.Arn

  InstanceProfileName:
    Description: Name of the created Instance Profile
    Value: !Ref EC2InstanceProfile