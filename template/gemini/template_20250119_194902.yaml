AWSTemplateFormatVersion: '2010-09-09'
Description: Create GitLab repos, build SageMaker pipeline, deploy to staging and production.
Resources:
  GitLabRepo1:
    Type: 'AWS::CloudFormation::CustomResource'
    Properties:
      ServiceToken: !GetAtt GitLabCustomResource.Arn
      RepoName: 'model-repo-1'
      Description: 'Source code for model 1'
  GitLabRepo2:
    Type: 'AWS::CloudFormation::CustomResource'
    Properties:
      ServiceToken: !GetAtt GitLabCustomResource.Arn
      RepoName: 'model-repo-2'
      Description: 'Source code for model 2'
  GitLabCustomResource:
    Type: 'AWS::Serverless::Function'
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://your-s3-bucket/gitlab-custom-resource.zip
      Role: !GetAtt GitLabCustomResourceRole.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
  GitLabCustomResourceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: GitLabAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - gitlab:*
                Resource: '*' # Replace with specific GitLab API resources if possible
  SageMakerPipeline:
    Type: 'AWS::SageMaker::Pipeline'
    Properties:
      PipelineName: 'sagemaker-pipeline'
      PipelineDefinition: !Sub |
        {
          "PipelineName": "sagemaker-pipeline",
          "PipelineDefinition": {
            "Steps":[
              {"Name":"Training","PrimaryContainer":{"Image":"your-training-image","Environment":{},"ModelDataUrl":"s3://your-s3-bucket/model"},"Arguments":[],"Type":"Training"},
              {"Name":"RegisterModel","PrimaryContainer":{"Image":"your-register-model-image"},"Arguments":[],"Type":"Processing"}
            ]
          }
        }
  SageMakerModelRegistry:
    Type: 'AWS::SageMaker::Model'
    Properties:
      ModelName: 'my-model'
      PrimaryContainer:
        Image: 'your-model-image'
        ModelDataUrl: !GetAtt SageMakerPipeline.PipelineDefinition.Steps.1.Output.ModelDataUrl
  StageDeployment1:
    Type: 'AWS::CloudFormation::CustomResource'
    Properties:
      ServiceToken: !GetAtt DeploymentCustomResource.Arn
      Stage: 'staging'
      ModelName: !Ref SageMakerModelRegistry
  StageDeployment2:
    Type: 'AWS::CloudFormation::CustomResource'
    Properties:
      ServiceToken: !GetAtt DeploymentCustomResource.Arn
      Stage: 'production'
      ModelName: !Ref SageMakerModelRegistry
  DeploymentCustomResource:
    Type: 'AWS::Serverless::Function'
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://your-s3-bucket/deployment-custom-resource.zip
      Role: !GetAtt DeploymentCustomResourceRole.Arn
      Policies:
        - AWSLambdaBasicExecutionRole
  DeploymentCustomResourceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: SageMakerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:*
                Resource: '*' # Replace with specific SageMaker resources if possible

Outputs:
  GitLabRepo1Url:
    Value: !GetAtt GitLabRepo1.RepoUrl
  GitLabRepo2Url:
    Value: !GetAtt GitLabRepo2.RepoUrl

