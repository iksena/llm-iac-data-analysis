AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SNS topic with email subscription

Parameters:
  EmailAddress:
    Type: String
    Description: Email address to subscribe to the SNS topic
    Default: test@test.com

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Production SNS Topic

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  SNSTopicArn:
    Description: The ARN of the SNS topic
    Value: !Ref SNSTopic