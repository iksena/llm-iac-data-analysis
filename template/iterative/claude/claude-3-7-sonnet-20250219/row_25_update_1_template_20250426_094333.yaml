AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT data pipeline to route messages from AWS IoT Core to an SQS queue via SNS'

Parameters:
  SQSQueueName:
    Type: String
    Default: 'IoTDataQueue'
    Description: Name of the SQS queue to store IoT messages
  
  SNSTopicName:
    Type: String
    Default: 'IoTDataTopic'
    Description: Name of the SNS topic to act as a pub/sub intermediary
  
  IoTRuleName:
    Type: String
    Default: 'IoTDataRule'
    Description: Name of the IoT rule to capture messages
  
  MQTTTopicFilter:
    Type: String
    Default: 'device/data'
    Description: MQTT topic filter to capture messages from

Resources:
  # SQS Queue to store messages
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SQSQueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600  # 4 days in seconds

  # SNS Topic to act as a pub/sub intermediary
  IoTDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  # SNS Subscription to connect SNS to SQS
  IoTDataSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt IoTDataQueue.Arn
      TopicArn: !Ref IoTDataTopic
      RawMessageDelivery: true

  # SQS Queue Policy to allow SNS to send messages to SQS
  IoTDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IoTDataTopic

  # IAM Role for IoT Rule to publish to SNS
  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTRuleSNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTDataTopic

  # IoT Rule to capture messages from MQTT topic and send to SNS
  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Ref IoTRuleName
      TopicRulePayload:
        Description: 'Rule to capture IoT device data and send to SNS'
        RuleDisabled: false
        AwsIotSqlVersion: '2016-03-23'
        Sql: !Sub "SELECT * FROM '${MQTTTopicFilter}'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTRuleRole.Arn
              MessageFormat: 'RAW'

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref IoTDataQueue
  
  SQSQueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt IoTDataQueue.Arn
  
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref IoTDataTopic
  
  IoTRuleARN:
    Description: ARN of the IoT rule
    Value: !GetAtt IoTDataRule.Arn