AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: MyECSCluster

  ECSFargateRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  ECSFargateExecutionRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSFargateExecutionRolePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'
          - Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: '*'
      Roles:
        - !Ref ECSFargateRole

  ECSFargateTaskRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSFargateTaskRolePolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ecs:StartTask
              - ecs:StopTask
              - ecs:DescribeTasks
            Resource: '*'
      Roles:
        - !Ref ECSFargateRole