AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Bedrock Agent with Lambda stock price lookup

Parameters:
  BedrockModelName:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229
    Description: The foundational model to use for the Bedrock Agent

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': '100'
              }
      Timeout: 10

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: bedrock.amazonaws.com

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:foundationmodel/${BedrockModelName}'

  ActionGroup:
    Type: AWS::Bedrock::ActionGroup
    Properties:
      Name: StockPriceActionGroup
      Description: Action group for stock price lookup
      Actions:
        - Name: getStockPrice
          Description: Get stock price for a given symbol
          InputSchema:
            type: object
            properties:
              symbol:
                type: string
                description: Stock symbol to lookup
            required: [symbol]

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      Name: StockPriceAgent
      Description: Agent for automated stock price lookup
      ModelId: !Ref BedrockModelName
      Instructions: |
        You are a stock price lookup assistant. When users ask about stock prices, use the getStockPrice action to retrieve the current price.
        Only respond with stock price information when explicitly requested.
      ActionGroup:
        ActionGroupName: !Ref ActionGroup
      AgentIntegration:
        IntegrationType: Lambda
        IntegrationConfig:
          LambdaConfig:
            FunctionArn: !GetAtt LambdaFunction.Arn

Outputs:
  BedrockAgentArn:
    Description: ARN of the created Bedrock Agent
    Value: !GetAtt BedrockAgent.Arn
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn