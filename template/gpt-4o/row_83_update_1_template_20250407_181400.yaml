AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS Transit Gateway and a Resource Access Manager (RAM) resource share for cross-account network connectivity.

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable

  TransitGatewayRAMShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: !Sub 'TransitGatewayShare-${AWS::StackName}'
      ResourceArns:
        - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Principals:
        - '644519422710'

Outputs:
  TransitGatewayId:
    Description: The ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareId:
    Description: The ID of the created RAM Resource Share
    Value: !Ref TransitGatewayRAMShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'