AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a private Amazon Route 53 Hosted Zone for internal DNS management within a VPC.

Parameters:
  VPCId:
    Description: The ID of the VPC where the private hosted zone will be associated.
    Type: AWS::EC2::VPC::Id
    ConstraintDescription: Must be a valid VPC ID.
    MinLength: 1
    Default: vpc-12345678  # Example default value, replace with a valid VPC ID or ensure it's provided during stack creation.

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: example.com
      VPCs:
        - VPCId: !Ref VPCId
          VPCRegion: !Ref "AWS::Region"
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management

Outputs:
  HostedZoneId:
    Description: The ID of the created private hosted zone.
    Value: !Ref PrivateHostedZone