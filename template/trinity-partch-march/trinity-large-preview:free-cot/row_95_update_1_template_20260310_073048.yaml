AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EC2 instance with SSM automation for Nginx deployment

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Default: default-key

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance with HTTP and SSH access
      VpcId: !ImportValue DefaultVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref EC2SecurityGroup
          SubnetId: !ImportValue DefaultPublicSubnet
      Tags:
        - Key: nginx
          Value: Yes

  SSMNginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        description: Automation document to update OS, install Nginx, and validate
        parameters: []
        mainSteps:
          - name: UpdateOS
            action: aws:runPatchBaseline
            inputs:
              Operation: Install
              RebootOption: RebootIfNeeded
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo amazon-linux-extras install -y nginx1
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/ || exit 1
      DocumentType: Automation
      DocumentFormat: JSON

  SSMAutomationExecution:
    Type: AWS::SSM::AutomationExecution
    Properties:
      DocumentName: !Ref SSMNginxAutomationDocument
      Parameters: {}
      TargetParameterName: tag:nginx
      Targets:
        - Key: tag:nginx
          Values:
            - Yes