AWSTemplateFormatVersion: '2010-09-09'
Description: Secure static website hosted on S3 with CloudFront CDN integration

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: BucketOwnerFullControl
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt OAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Join ['', ['arn:aws:s3:::', !Ref WebsiteBucket, '/*']]

  OAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for secure S3 access

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Join ['', ['origin-access-identity/cloudfront/', !Ref OAI]]
        Enabled: true
        DefaultRootObject: index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: '658327ea-f89d-4fab-a63d-7e88639ec960'
        PriceClass: PriceClass_100

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  LambdaExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaS3Access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
            Resource: !Join ['', ['arn:aws:s3:::', !Ref WebsiteBucket, '/*']]
      Roles:
        - !Ref LambdaExecutionRole

  PopulateS3Bucket:
    Type: Custom::PopulateS3Bucket
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn
      BucketName: !Ref WebsiteBucket
      Operation: create

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib3

          def handler(event, context):
              bucket_name = event['ResourceProperties']['BucketName']
              operation = event['ResourceProperties']['Operation']
              s3 = boto3.client('s3')

              if operation == 'create':
                  s3.put_object(
                      Bucket=bucket_name,
                      Key='index.html',
                      Body=b'<html><body><h1>Welcome to our secure static website!</h1></body></html>',
                      ContentType='text/html'
                  )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              elif operation == 'delete':
                  s3_objects = s3.list_objects_v2(Bucket=bucket_name)
                  if 'Contents' in s3_objects:
                      for obj in s3_objects['Contents']:
                          s3.delete_object(Bucket=bucket_name, Key=obj['Key'])
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              else:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

      Runtime: python3.12
      Timeout: 30

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: 'cloudformation.amazonaws.com'

Outputs:
  WebsiteURL:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: URL of the CloudFront distribution
  S3BucketName:
    Value: !Ref WebsiteBucket
    Description: Name of the S3 bucket