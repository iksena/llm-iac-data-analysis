AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an IAM role with permissions for SSM, EC2, and monitoring tools'

Parameters:
  RoleName:
    Type: String
    Default: CrossServiceAutomationRole
    Description: 'Name for the IAM role'

Resources:
  AutomationRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action: 'sts:AssumeRole'
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2AutomationPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: EC2AutomationPermissions
      Roles:
        - !Ref RoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:DescribeInstanceStatus'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
            Resource: '*'

  SSMAutomationPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: SSMAutomationPermissions
      Roles:
        - !Ref RoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ssm:SendCommand'
              - 'ssm:ListCommands'
              - 'ssm:ListCommandInvocations'
              - 'ssm:GetCommandInvocation'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'ssm:DescribeInstanceInformation'
              - 'ssm:DescribeInstanceProperties'
            Resource: '*'

Outputs:
  RoleARN:
    Description: 'ARN of the created IAM role'
    Value: !GetAtt AutomationRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'