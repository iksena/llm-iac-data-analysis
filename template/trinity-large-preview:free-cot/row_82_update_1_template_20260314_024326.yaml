AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted S3 bucket for ALB access logs with 90-day retention policy

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ALBAccessLogsBucket
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: LogRetention
            Status: Enabled
            ExpirationInDays: 90
            Transitions:
              - TransitionInDays: 30
                StorageClass: GLACIER

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBLogging
            Effect: Allow
            Principal:
              AWS:
                - 'arn:aws:iam::552958791618:root'  # us-east-1 ELB account
                - 'arn:aws:iam::326872442916:root'  # us-west-2 ELB account
                - 'arn:aws:iam::844612086735:root'  # eu-west-1 ELB account
                - 'arn:aws:iam::754344324525:root'  # ap-northeast-1 ELB account
                - 'arn:aws:iam::507241528517:root'  # ap-southeast-1 ELB account
                - 'arn:aws:iam::942967768980:root'  # eu-central-1 ELB account
                - 'arn:aws:iam::563860758832:root'  # ap-southeast-2 ELB account
                - 'arn:aws:iam::018999577071:root'  # eu-north-1 ELB account
                - 'arn:aws:iam::064240690247:root'  # eu-west-3 ELB account
                - 'arn:aws:iam::155246799665:root'  # ap-northeast-2 ELB account
                - 'arn:aws:iam::662462828752:root'  # ap-south-1 ELB account
                - 'arn:aws:iam::417530812821:root'  # sa-east-1 ELB account
                - 'arn:aws:iam::580479247687:root'  # ca-central-1 ELB account
                - 'arn:aws:iam::384282573498:root'  # eu-west-2 ELB account
                - 'arn:aws:iam::048115594331:root'  # us-gov-west-1 ELB account
                - 'arn:aws:iam::536577586292:root'  # us-gov-east-1 ELB account
                - 'arn:aws:iam::644160558196:root'  # cn-north-1 ELB account
                - 'arn:aws:iam::491913684174:root'  # cn-northwest-1 ELB account
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*/ALB/*'

          - Sid: AllowDeliveryLogs
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*/ALB/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

          - Sid: AllowDeliveryLogsGetBucketAcl
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBAccessLogsBucket.Arn

Outputs:
  BucketName:
    Description: Name of the ALB access logs bucket
    Value: !Ref ALBAccessLogsBucket
  BucketArn:
    Description: ARN of the ALB access logs bucket
    Value: !GetAtt ALBAccessLogsBucket.Arn