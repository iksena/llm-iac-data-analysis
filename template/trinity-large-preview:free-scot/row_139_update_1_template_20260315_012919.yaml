AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template with Lambda custom resource for arithmetic operations

Parameters:
  FirstNumber:
    Type: Number
    Default: 10
  SecondNumber:
    Type: Number
    Default: 5
  Operator:
    Type: String
    Default: add
    AllowedValues:
      - add
      - subtract
      - multiply
      - divide
  ForceFailure:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  first_number = event['ResourceProperties']['FirstNumber']
                  second_number = event['ResourceProperties']['SecondNumber']
                  operator = event['ResourceProperties']['Operator']
                  force_failure = event['ResourceProperties']['ForceFailure']

                  if force_failure.lower() == 'true':
                      raise ValueError("Forced failure for testing")

                  if operator == 'add':
                      result = first_number + second_number
                  elif operator == 'subtract':
                      result = first_number - second_number
                  elif operator == 'multiply':
                      result = first_number * second_number
                  elif operator == 'divide':
                      if second_number == 0:
                          raise ValueError("Division by zero")
                      result = first_number / second_number
                  else:
                      raise ValueError("Invalid operator")

                  response_data = {
                      'Result': result,
                      'Status': 'Success'
                  }
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)

              except Exception as e:
                  response_data = {
                      'Result': None,
                      'Status': f'Failure: {str(e)}'
                  }
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)

  ArithmeticResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ArithmeticLambda.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      ForceFailure: !Ref ForceFailure

Outputs:
  ResultOutput:
    Description: Calculation result
    Value: !GetAtt ArithmeticResource.Result
  StatusOutput:
    Description: Operation status
    Value: !GetAtt ArithmeticResource.Status