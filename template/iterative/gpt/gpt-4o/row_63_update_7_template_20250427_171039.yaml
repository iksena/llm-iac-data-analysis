AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template to create an Amazon Aurora MySQL Cluster with CloudWatch Logs integration.'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for the Aurora Cluster'
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'Subnets for the Aurora Cluster instances'
  DBUsername:
    Type: String
    Description: 'The database admin account username'
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters.'
  DBPasswordSecretArn:
    Type: String
    Description: 'The ARN of the Secrets Manager secret containing the database password'

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties: 
      DBSubnetGroupDescription: 'Subnet group for Aurora DB Cluster'
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties: 
      GroupDescription: 'Security group for Aurora DB Cluster'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties: 
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.12.4'
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBPasswordSecretArn}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds: 
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '07:00-09:00'
      PreferredMaintenanceWindow: 'Mon:03:00-Mon:04:00'
      EnableCloudwatchLogsExports: 
        - 'error'

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties: 
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      Engine: aurora-mysql

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties: 
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      Engine: aurora-mysql

Outputs:
  DBClusterEndpoint:
    Description: 'The endpoint address of the Aurora DB Cluster'
    Value: !GetAtt 
      - AuroraDBCluster
      - Endpoint.Address

  DBClusterReaderEndpoint:
    Description: 'The reader endpoint address of the Aurora DB Cluster'
    Value: !GetAtt 
      - AuroraDBCluster
      - ReadEndpoint.Address

  CloudWatchLogGroup:
    Description: 'The CloudWatch Log Group for Aurora error logs'
    Value: !Join ['', ['/aws/rds/cluster/', !Ref AuroraDBCluster, '/error']]