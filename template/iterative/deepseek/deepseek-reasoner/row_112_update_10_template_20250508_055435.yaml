AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketName:
    Type: String
    Description: Enter valid S3 bucket name (3-63 chars, lowercase, numbers, hyphens)
    Default: !Sub "${AWS::StackName}-${AWS::AccountId}"
    AllowedPattern: ^[a-z0-9-]{3,63}$
    ConstraintDescription: Must follow S3 bucket naming rules
Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 345600

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Notifications
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EventQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${BucketName}"
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  DataBucket:
    Type: AWS::S3::Bucket
    DependsOn: QueuePolicy
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        QueueConfigurations:
          - Events:
              - s3:ObjectCreated:*
            QueueArn: !GetAtt EventQueue.Arn
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
Outputs:
  S3BucketName:
    Value: !Ref DataBucket
  SQSQueueArn:
    Value: !GetAtt EventQueue.Arn
  SQSQueueURL:
    Value: !Ref EventQueue