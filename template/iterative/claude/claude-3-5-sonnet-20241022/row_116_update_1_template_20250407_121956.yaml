AWSTemplateFormatVersion: '2010-09-09'
Description: 'SNS-to-SQS fanout system with filtered message routing for metrics processing'

Parameters:
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: 'Message retention period in seconds (4 days)'
  
  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: 'Visibility timeout for messages in seconds'
    
  MaxReceiveCount:
    Type: Number
    Default: 3
    Description: 'Maximum number of times a message can be received before sending to DLQ'

Resources:
  MetricsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 'Metrics Processing Topic'
      TopicName: 'metrics-processing-topic'

  AllMetricsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'all-metrics-dlq'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout

  TemperatureDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'temperature-metrics-dlq'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout

  HumidityDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'humidity-metrics-dlq'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout

  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'all-metrics-queue'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'temperature-metrics-queue'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: 'humidity-metrics-queue'
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDLQ.Arn
        maxReceiveCount: !Ref MaxReceiveCount

  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  TemperatureQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  HumidityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType: ['Temperature']

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType: ['Humidity']

Outputs:
  MetricsTopicArn:
    Description: 'ARN of the SNS Topic'
    Value: !Ref MetricsTopic

  AllMetricsQueueUrl:
    Description: 'URL of the All Metrics Queue'
    Value: !Ref AllMetricsSqsQueue

  TemperatureQueueUrl:
    Description: 'URL of the Temperature Queue'
    Value: !Ref TemperatureSqsQueue

  HumidityQueueUrl:
    Description: 'URL of the Humidity Queue'
    Value: !Ref HumiditySqsQueue

  AllMetricsDLQUrl:
    Description: 'URL of the All Metrics Dead Letter Queue'
    Value: !Ref AllMetricsDLQ

  TemperatureDLQUrl:
    Description: 'URL of the Temperature Dead Letter Queue'
    Value: !Ref TemperatureDLQ

  HumidityDLQUrl:
    Description: 'URL of the Humidity Dead Letter Queue'
    Value: !Ref HumidityDLQ