AWSTemplateFormatVersion: '2010-09-09'
Description: 'Transit Gateway and Resource Access Manager Resource Share for Centralized Network Connectivity'

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Description: Centralized Transit Gateway for cross-VPC connectivity
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-TGW'
        - Key: Environment
          Value: !Ref AWS::StackName
        - Key: Project
          Value: NetworkCentralization

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      AllowExternalPrincipals: true
      Name: TGW-Central-Resource-Share
      Principals:
        - 644519422710
      ResourceArns:
        - !GetAtt TransitGateway.TransitGatewayArn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ResourceShare'
        - Key: Environment
          Value: !Ref AWS::StackName

Outputs:
  TGWId:
    Description: Transit Gateway ID
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TGWId'

  ResourceShareId:
    Description: Resource Share ID
    Value: !Ref ResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'