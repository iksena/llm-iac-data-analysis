AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EMR Serverless with S3 bucket and IAM role'

Parameters:
  EMRServerlessApplicationName:
    Type: String
    Default: 'emr-serverless-spark-app'
    Description: Name for the EMR Serverless application
    
  EMRServerlessReleaseLabel:
    Type: String
    Default: 'emr-6.15.0'
    Description: EMR release version
    
  S3BucketSuffix:
    Type: String
    Default: 'emr-serverless-data'
    Description: Suffix for the S3 bucket name (will be prefixed with stack name)
    
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    Description: Number of minutes after which an idle application will stop
    MinValue: 1
    MaxValue: 10080
    
  AutoStartEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Whether to enable auto-start for the EMR Serverless application
    
  MaximumCpuCapacity:
    Type: Number
    Default: 20
    Description: Maximum vCPU capacity for the application
    
  MaximumMemoryCapacity:
    Type: Number
    Default: 81920
    Description: Maximum memory capacity in MB for the application

Resources:
  EMRServerlessS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Join ['-', [!Ref 'AWS::StackName', !Ref 'S3BucketSuffix', !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]]]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EMRServerlessServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessServiceRolePolicy

  EMRServerlessJobExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole

  EMRServerlessJobExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EMRServerlessJobExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !GetAtt EMRServerlessS3Bucket.Arn
              - !Sub '${EMRServerlessS3Bucket.Arn}/*'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*'
      Roles:
        - !Ref EMRServerlessJobExecutionRole

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref EMRServerlessApplicationName
      ReleaseLabel: !Ref EMRServerlessReleaseLabel
      Type: SPARK
      AutoStartConfiguration:
        Enabled: !Ref AutoStartEnabled
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      MaximumCapacity:
        Cpu: !Ref MaximumCpuCapacity
        Memory: !Ref MaximumMemoryCapacity

Outputs:
  EMRServerlessApplicationId:
    Description: The ID of the EMR Serverless application
    Value: !Ref EMRServerlessApplication
    
  EMRServerlessApplicationARN:
    Description: The ARN of the EMR Serverless application
    Value: !GetAtt EMRServerlessApplication.Arn
    
  S3BucketName:
    Description: The name of the S3 bucket for EMR Serverless scripts and data
    Value: !Ref EMRServerlessS3Bucket
    
  S3BucketARN:
    Description: The ARN of the S3 bucket
    Value: !GetAtt EMRServerlessS3Bucket.Arn
    
  JobExecutionRoleARN:
    Description: The ARN of the IAM role for EMR Serverless job execution
    Value: !GetAtt EMRServerlessJobExecutionRole.Arn
    
  ServiceRoleARN:
    Description: The ARN of the IAM service role for EMR Serverless
    Value: !GetAtt EMRServerlessServiceRole.Arn