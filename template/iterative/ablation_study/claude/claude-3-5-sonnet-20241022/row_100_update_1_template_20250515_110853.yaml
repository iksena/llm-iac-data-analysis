AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
    
  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
    
  Environment:
    Type: String
    Description: Environment type
    AllowedValues: 
      - Development
      - Production
    Default: Development
    
  MFARequirementDuration:
    Type: Number
    Description: Duration (in seconds) for MFA token validity
    Default: 43200
    MinValue: 3600
    MaxValue: 86400

Resources:
  # MFA Enforcement Policy
  MFARequirementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA for sensitive operations
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceMFA
            Effect: Deny
            NotAction:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
            Condition:
              BoolIfExists:
                aws:MultiFactorAuthPresent: false

  # Explicit Deny Policy for Sensitive Operations
  ExplicitDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Explicitly denies access to sensitive services
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenySensitiveServices
            Effect: Deny
            Action:
              - 'cloudhsm:*'
              - 'billing:*'
              - 'account:*'
            Resource: '*'

  # Privileged Admin Group and Role
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdminGroup
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - arn:aws:iam::aws:policy/AdministratorAccess

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
        - !Ref ExplicitDenyPolicy

  # Restricted Admin Group and Role
  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdminGroup
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - arn:aws:iam::aws:policy/PowerUserAccess

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
        - !Ref ExplicitDenyPolicy

  # CloudFormation Execution Role
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # StackSet Execution Role
  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSCloudFormationStackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
        - !Ref ExplicitDenyPolicy

Outputs:
  PrivilegedAdminRoleArn:
    Description: ARN of the Privileged Admin Role
    Value: !GetAtt PrivilegedAdminRole.Arn
    
  RestrictedAdminRoleArn:
    Description: ARN of the Restricted Admin Role
    Value: !GetAtt RestrictedAdminRole.Arn
    
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn
    
  StackSetExecutionRoleArn:
    Description: ARN of the StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn