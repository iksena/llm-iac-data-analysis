AWSTemplateFormatVersion: '2010-09-09'
Description: 'Self-configuring EC2 with Nginx and SSM logging'

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
    Description: EC2 instance type

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-west-2:
      AMI: ami-03f65b8614a860c29
    eu-west-1:
      AMI: ami-0d1a7c811b5103231

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'nginx-logs-${AWS::AccountId}-${AWS::Region}'
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 7

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: ['s3:PutObject', 's3:GetObject']
            Resource: !Sub 'arn:aws:s3:::${LogsBucket}/logs/*'

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:PutObject', 's3:GetObject']
                Resource: !Sub 'arn:aws:s3:::${LogsBucket}/*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  WebServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref WebServerSG]
      Tags:
        - Key: Name
          Value: NginxWebServer

  NginxInstallation:
    Type: AWS::SSM::Association
    DependsOn: WebServer
    Properties:
      Name: AWS-RunShellScript
      Parameters:
        commands:
          - 'sudo yum install -y nginx'
          - 'sudo systemctl start nginx'
          - 'sudo systemctl enable nginx'
      Targets:
        - Key: InstanceIds
          Values: [!Ref WebServer]
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogsBucket
          OutputS3KeyPrefix: 'logs/'

Outputs:
  InstanceId:
    Value: !Ref WebServer
    Description: EC2 Instance ID
  PublicDNS:
    Value: !GetAtt WebServer.PublicDnsName
    Description: Nginx server public DNS
  LogBucketName:
    Value: !Ref LogsBucket
    Description: S3 bucket for SSM logs
  AssociationId:
    Value: !Ref NginxInstallation
    Description: SSM Association ID for tracking