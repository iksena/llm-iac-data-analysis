AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EnableStrictBoundary:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Enable strict enforcement of naming conventions and tags'
  RoleNamePrefix:
    Type: String
    Default: 'MyTeam'
    Description: 'Prefix for developer-created IAM resources'
  OwnerTagValue:
    Type: String
    Description: 'Mandatory ownership tag value for all developer resources'
    MinLength: 1

Conditions:
  StrictBoundaryEnabled: !Equals [!Ref EnableStrictBoundary, 'true']

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DeveloperPermissionBoundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:*'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DeveloperRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: DeveloperPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateRole'
                Resource: '*'
                Condition:
                  ArnEquals:
                    iam:PermissionsBoundary: !Ref PermissionBoundaryPolicy
                  StringEquals:
                    'aws:RequestTag/Owner': !Ref OwnerTagValue
                  StringLike:
                    iam:RoleName: 
                      Fn::If:
                        - StrictBoundaryEnabled
                        - !Sub '${RoleNamePrefix}*'
                        - '*'
              - Effect: Allow
                Action: 'iam:CreatePolicy'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestTag/Owner': !Ref OwnerTagValue
                  StringLike:
                    iam:PolicyName: 
                      Fn::If:
                        - StrictBoundaryEnabled
                        - !Sub '${RoleNamePrefix}*'
                        - '*'
              - Effect: Allow
                Action:
                  - 'iam:TagRole'
                  - 'iam:TagPolicy'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestTag/Owner': !Ref OwnerTagValue

Outputs:
  DeveloperRoleArn:
    Description: 'ARN of the developer IAM role'
    Value: !GetAtt DeveloperRole.Arn
  PermissionBoundaryArn:
    Description: 'ARN of the permission boundary policy'
    Value: !GetAtt PermissionBoundaryPolicy.PolicyArn