AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates EventBridge rule with SNS topic target for demo.cli source events'

Resources:
  EventNotificationTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      DisplayName: 'Event Notification Topic'
      TopicName: !Sub '${AWS::StackName}-event-notifications'

  EventNotificationTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref EventNotificationTopic
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/*'
      Topics:
        - !Ref EventNotificationTopic

  EventRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Description: 'Rule to capture demo.cli events and forward to SNS'
      EventPattern:
        source:
          - 'demo.cli'
      State: 'ENABLED'
      Targets:
        - Arn: !Ref EventNotificationTopic
          Id: 'SendToSNS'

Outputs:
  TopicArn:
    Description: 'ARN of the SNS topic'
    Value: !Ref EventNotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'

  RuleArn:
    Description: 'ARN of the EventBridge rule'
    Value: !GetAtt EventRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RuleArn'

  TopicName:
    Description: 'Name of the SNS topic'
    Value: !GetAtt EventNotificationTopic.TopicName
    Export:
      Name: !Sub '${AWS::StackName}-TopicName'