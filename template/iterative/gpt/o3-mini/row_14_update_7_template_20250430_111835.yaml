AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a single Elastic Network Interface (ENI) configured with one primary 
  and two secondary private IP addresses, along with two Elastic IPs associated to the secondary private IPs.
  For proper deployment, an EC2 instance is provisioned and the ENI is attached as its primary network interface.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The Subnet ID where the ENI and EC2 instance will be created.
    Default: subnet-12345678
  PrimaryPrivateIp:
    Type: String
    Description: The primary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.0.10
  PrivateIp1:
    Type: String
    Description: The first secondary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.0.11
  PrivateIp2:
    Type: String
    Description: The second secondary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.0.12
  ImageId:
    Type: AWS::EC2::Image::Id
    Description: The AMI ID for the EC2 instance.
    Default: ami-0c55b159cbfafe1f0
  InstanceType:
    Type: String
    Default: t3.micro
    Description: The instance type for the EC2 instance.

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: "ENI with one primary and two secondary private IP addresses"
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref PrimaryPrivateIp
          Primary: true
        - PrivateIpAddress: !Ref PrivateIp1
          Primary: false
        - PrivateIpAddress: !Ref PrivateIp2
          Primary: false
      Tags:
        - Key: Name
          Value: MultiIP-ENI

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP1, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp1

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP2, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp2

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref ImageId
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref NetworkInterface
          DeviceIndex: 0

Outputs:
  InstanceId:
    Description: "The ID of the EC2 instance that hosts the ENI."
    Value: !Ref EC2Instance
  NetworkInterfaceId:
    Description: "The ID of the created Elastic Network Interface."
    Value: !Ref NetworkInterface
  SecondaryElasticIP1:
    Description: "The public Elastic IP associated with the first secondary private IP."
    Value: !GetAtt [ElasticIP1, PublicIp]
  SecondaryElasticIP2:
    Description: "The public Elastic IP associated with the second secondary private IP."
    Value: !GetAtt [ElasticIP2, PublicIp]