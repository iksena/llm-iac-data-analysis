AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Ref: LambdaArtifactsKMSKey

  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: LambdaArtifactsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              Fn::Join:
                - ''
                - - 'arn:aws:s3:::'
                  - Ref: LambdaArtifactsBucket
                  - /*
        Version: '2012-10-17'

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: lambda-artifacts-key-policy
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS:
                Fn::Join:
                  - ''
                  - - 'arn:aws:iam::'
                    - Ref: AWS::AccountId
                    - ':root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow service role usage
            Effect: Allow
            Principal:
              AWS:
                Ref: ServiceRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
        Version: '2012-10-17'

  LambdaArtifactsKMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId:
        Ref: LambdaArtifactsKMSKey

Parameters:
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs KMS key access

Outputs:
  LambdaArtifactsBucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value:
      Ref: LambdaArtifactsBucket
  LambdaArtifactsKMSKeyId:
    Description: ID of the KMS key for Lambda artifact encryption
    Value:
      Ref: LambdaArtifactsKMSKey