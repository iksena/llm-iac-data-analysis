AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM Automation for OS Updates, Nginx Installation, and Validation

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Default: default-key

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      KeyName: !Ref KeyName
      Tags:
        - Key: nginx
          Value: Yes

  SSMUpdateNginxDocument:
    Type: AWS::SSM::AutomationDocument
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Automation document to update OS, install Nginx, and validate
        parameters: {}
        mainSteps:
          - name: UpdateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum install -y nginx
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo systemctl start nginx
                - curl -f http://localhost
            timeoutSeconds: 60
            onFailure: Abort
            onExit: Continue
            targets:
              - Key: tag:nginx
                Values:
                  - Yes