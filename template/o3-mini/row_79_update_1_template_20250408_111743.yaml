AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template that creates three IAM Managed Policies:
  1. S3 Access Policy for read/write and listing/location permissions on the S3 bucket ios-apps.sagebridge.org.
  2. DynamoDB Protection Policy to deny deletion or schema-modification actions.
  3. RDS Protection Policy to block destructive RDS operations.

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3AccessPolicy
      Description: "Grants an iOS application read/write access and bucket listing/location permissions for ios-apps.sagebridge.org."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: arn:aws:s3:::ios-apps.sagebridge.org
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: arn:aws:s3:::ios-apps.sagebridge.org/*

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DynamoDBProtectionPolicy
      Description: "Explicitly denies deletion and schema modifications in DynamoDB to prevent accidental data loss."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
            Resource: "*"

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RDSProtectionPolicy
      Description: "Denies destructive RDS operations to safeguard databases and backups."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
            Resource: "*"

Outputs:
  S3AccessPolicyARN:
    Description: "ARN of the S3 Access Managed Policy"
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyARN:
    Description: "ARN of the DynamoDB Protection Managed Policy"
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyARN:
    Description: "ARN of the RDS Protection Managed Policy"
    Value: !Ref RDSProtectionPolicy