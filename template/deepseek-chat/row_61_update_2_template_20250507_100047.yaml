AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a private Route53 hosted zone for www.example.com

Parameters:
  VpcId:
    Description: ID of the VPC to associate with the private hosted zone
    Type: AWS::EC2::VPC::Id
    ConstraintDescription: Must be a valid VPC ID

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      HostedZoneConfig:
        Comment: Private hosted zone for www.example.com
        PrivateZone: true
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref AWS::Region

Outputs:
  HostedZoneId:
    Description: The ID of the created private hosted zone
    Value: !Ref PrivateHostedZone
  HostedZoneName:
    Description: The domain name of the hosted zone
    Value: !GetAtt PrivateHostedZone.Name