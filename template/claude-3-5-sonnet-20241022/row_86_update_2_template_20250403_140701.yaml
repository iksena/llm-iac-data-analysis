AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template to enable GuardDuty detector for EC2 security monitoring

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES
      DataSources:
        S3Logs:
          Enable: true
        Kubernetes:
          AuditLogs:
            Enable: false
        MalwareProtection:
          ScanEc2InstanceWithFindings:
            Enable: true

Outputs:
  DetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector

  DetectorArn:
    Description: The ARN of the GuardDuty detector
    Value: !GetAtt GuardDutyDetector.Arn