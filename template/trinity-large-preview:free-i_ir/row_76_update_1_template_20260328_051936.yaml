AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles for FIS Workshop with Tiered Permissions

Resources:
  SecurityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/FISWorkshop*'
                  - arn:aws:iam::aws:role/aws-service-role/*
        - PolicyName: ServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISLimitedAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/environment: prod
        - PolicyName: RolePassing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/FISWorkshop*'
                  - arn:aws:iam::aws:role/aws-service-role/*

  UserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISUserActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                  - fis:Get*
                  - fis:List*
                  - fis:TagResource
                Resource: '*'
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/environment: prod

  NonUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: fis:*
                Resource: '*'

Outputs:
  SecurityAdminRoleArn:
    Description: ARN of the Security Admin Role
    Value: !GetAtt SecurityAdminRole.Arn
  AdminRoleArn:
    Description: ARN of the Admin Role
    Value: !GetAtt AdminRole.Arn
  UserRoleArn:
    Description: ARN of the User Role
    Value: !GetAtt UserRole.Arn
  NonUserRoleArn:
    Description: ARN of the Non-User Role
    Value: !GetAtt NonUserRole.Arn