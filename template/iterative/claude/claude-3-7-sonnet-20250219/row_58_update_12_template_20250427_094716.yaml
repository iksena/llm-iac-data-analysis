AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a scalable and monitored Amazon EFS file system with automated backups'

Parameters:
  UseExistingVpc:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' if you want to use an existing VPC, 'false' to create a new VPC

  ExistingVpcId:
    Type: String
    Default: ''
    Description: If UseExistingVpc is 'true', specify the VPC ID here. Leave blank to create a new VPC.

  ExistingSubnetIds:
    Type: CommaDelimitedList
    Default: ''
    Description: If UseExistingVpc is 'true', specify comma-separated subnet IDs. Leave blank to create new subnets.

  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC (if creating a new VPC)

  SubnetCidr1:
    Type: String
    Default: '10.0.1.0/24'
    Description: CIDR block for the first subnet (if creating new subnets)

  SubnetCidr2:
    Type: String
    Default: '10.0.2.0/24'
    Description: CIDR block for the second subnet (if creating new subnets)

  SubnetCidr3:
    Type: String
    Default: '10.0.3.0/24'
    Description: CIDR block for the third subnet (if creating new subnets)

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: 'us-east-1a'
    Description: Availability Zone for the first subnet

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: 'us-east-1b'
    Description: Availability Zone for the second subnet

  AvailabilityZone3:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: 'us-east-1c'
    Description: Availability Zone for the third subnet

  CreateMultiAZ:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Create mount targets in multiple Availability Zones

  BackupEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable or disable automated backups via AWS Backup

  BackupSchedule:
    Type: String
    Default: 'cron(0 1 * * ? *)'
    Description: CRON expression for backup schedule (default is daily at 1:00 AM UTC)

  BackupRetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: Number of days to retain backups

  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1024
    Description: Provisioned throughput in MiB/s (only applicable if ThroughputMode is provisioned)

  BurstCreditLowThreshold:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: Threshold percentage for burst credit low alarm

  IOUtilizationThreshold:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: Threshold percentage for IO utilization alarm

  ThroughputUtilizationThreshold:
    Type: Number
    Default: 80
    MinValue: 1
    MaxValue: 100
    Description: Threshold percentage for throughput utilization alarm

  EncryptEFS:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable or disable EFS encryption
    
  AlarmEmail:
    Type: String
    Description: Email address to receive alarm notifications (optional)
    Default: ''

Conditions:
  IsBackupEnabled: !Equals [!Ref BackupEnabled, 'true']
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']
  IsEncrypted: !Equals [!Ref EncryptEFS, 'true']
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]
  UseExistingVpc: !Equals [!Ref UseExistingVpc, 'true']
  CreateNewVpc: !Not [!Condition UseExistingVpc]
  CreateMultipleAZ: !Equals [!Ref CreateMultiAZ, 'true']

Resources:
  # VPC Resources (if creating new VPC)
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVpc
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVpc
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVpc
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref SubnetCidr1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Subnet1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref SubnetCidr2
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Subnet2'

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Ref AvailabilityZone3
      CidrBlock: !Ref SubnetCidr3
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Subnet3'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVpc
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicRT'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVpc
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVpc
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVpc
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVpc
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet3

  # EFS Resources
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !If [UseExistingVpc, !Ref ExistingVpcId, !Ref VPC]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS-SG'

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughput, !Ref 'AWS::NoValue']
      Encrypted: !If [IsEncrypted, true, false]
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS'

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !If [UseExistingVpc, !Select [0, !Ref ExistingSubnetIds], !Ref PublicSubnet1]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Condition: CreateMultipleAZ
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !If [UseExistingVpc, !Select [1, !Ref ExistingSubnetIds], !Ref PublicSubnet2]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget3:
    Type: AWS::EFS::MountTarget
    Condition: CreateMultipleAZ
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !If [UseExistingVpc, !Select [2, !Ref ExistingSubnetIds], !Ref PublicSubnet3]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub '${AWS::StackName}-EFS-Alarms'
      TopicName: !Sub '${AWS::StackName}-EFS-Alarms'

  EFSAlarmSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref EFSAlarmTopic

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub 'Alarm when burst credit balance for ${EFSFileSystem} falls below ${BurstCreditLowThreshold}%'
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref BurstCreditLowThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions:
        - !Ref EFSAlarmTopic
      OKActions:
        - !Ref EFSAlarmTopic

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub 'Alarm when IO utilization for ${EFSFileSystem} exceeds ${IOUtilizationThreshold}%'
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref IOUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions:
        - !Ref EFSAlarmTopic
      OKActions:
        - !Ref EFSAlarmTopic

  ThroughputUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsProvisionedThroughput
    Properties:
      AlarmDescription: !Sub 'Alarm when throughput utilization for ${EFSFileSystem} exceeds ${ThroughputUtilizationThreshold}%'
      MetricName: PercentThroughputUtilization
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: !Ref ThroughputUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions:
        - !Ref EFSAlarmTopic
      OKActions:
        - !Ref EFSAlarmTopic

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub '${AWS::StackName}-EFS-Backup-Vault'

  BackupRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-EFS-Backup-Plan'
        BackupPlanRule:
          - RuleName: !Sub '${AWS::StackName}-EFS-Backup-Rule'
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: !Ref BackupRetentionDays

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub '${AWS::StackName}-EFS-Backup-Selection'
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !If [UseExistingVpc, !Ref ExistingVpcId, !Ref VPC]

  SubnetIds:
    Description: The IDs of the subnets
    Value: !If 
      - UseExistingVpc
      - !Join [", ", !Ref ExistingSubnetIds]
      - !Join [", ", [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]

  EfsId:
    Description: The ID of the EFS file system
    Value: !Ref EFSFileSystem

  EfsDnsName:
    Description: The DNS name for mounting the EFS file system
    Value: !Sub '${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com'

  MountCommand:
    Description: Example command to mount the EFS file system
    Value: !Sub 'sudo mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ /mnt/efs'

  BackupPlanId:
    Description: The ID of the backup plan
    Condition: IsBackupEnabled
    Value: !Ref BackupPlan

  BurstCreditAlarmArn:
    Description: ARN of the burst credit balance alarm
    Value: !GetAtt BurstCreditBalanceAlarm.Arn

  IOUtilizationAlarmArn:
    Description: ARN of the IO utilization alarm
    Value: !GetAtt IOUtilizationAlarm.Arn

  ThroughputUtilizationAlarmArn:
    Description: ARN of the throughput utilization alarm
    Condition: IsProvisionedThroughput
    Value: !GetAtt ThroughputUtilizationAlarm.Arn

  EFSAlarmTopicArn:
    Description: ARN of the SNS topic for EFS alarms
    Value: !Ref EFSAlarmTopic