AWSTemplateFormatVersion: '2010-09-09'
Description: Windows EC2 Instance with CPU Stress Testing via SSM and FIS Integration

Parameters:
  AMIId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    Description: Windows Server 2019 AMI ID (SSM Parameter)

  InstanceType:
    Type: String
    Default: t3.nano
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: EC2 Key Pair name

  UseDefaultVPC:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false
    Description: Use default VPC instead of creating new VPC

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: null
    Description: Subnet ID (required if not using default VPC)

  StressDurationSeconds:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 3600
    Description: CPU stress test duration in seconds

  RDPSourceIP:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}/\d{1,2}
    Description: IP range for RDP access (e.g., 192.168.1.0/24)

Conditions:
  CreateNewVPC: !Equals [!Ref UseDefaultVPC, 'false']

Resources:
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-EC2-SSM-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${AWS::StackName}-Instance-Profile
      Roles:
        - !Ref EC2SSMRole

  FISIntegrationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-FIS-Integration-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - faults-injection-simulator.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: FISIntegrationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetDocument
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: '*'

  StressTestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${AWS::StackName}/CPUStressTest
      RetentionInDays: 30

  CPUStressTestDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: CPUStressTest
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: CPU Stress Test for Windows
        parameters:
          Duration:
            type: String
            default: '300'
        mainSteps:
          - name: ExecuteStressTest
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - $duration = {{Duration}}
                - $processorCount = (Get-WmiObject -Class Win32_Processor).NumberOfLogicalProcessors
                - Write-Host "Starting CPU stress test with $processorCount logical processors for $duration seconds"
                - Write-CWLogEvent -LogGroupName "/aws/ssm/CPUStressTest" -Message "Test started: Processors=$processorCount, Duration=$duration"
                - $scriptBlock = {
                    $i = 0
                    while ($true) {
                        $i++
                        [Math]::Sqrt($i)
                    }
                  }
                - 1..$processorCount | ForEach-Object {
                    Start-Job -ScriptBlock $scriptBlock
                  }
                - Start-Sleep -Seconds $duration
                - Get-Job | Stop-Job
                - Get-Job | Remove-Job
                - Write-Host "CPU stress test completed"
                - Write-CWLogEvent -LogGroupName "/aws/ssm/CPUStressTest" -Message "Test completed successfully"

  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateNewVPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateNewVPC

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-Subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateNewVPC
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-Route-Table

  DefaultRoute:
    Type: AWS::EC2::Route
    Condition: CreateNewVPC
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateNewVPC
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CPU stress test instance
      VpcId:
        Fn::If:
          - CreateNewVPC
          - !Ref VPC
          - Fn::ImportValue: !Sub "${AWS::AccountId}:default-vpc-id"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref RDPSourceIP
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId:
            Fn::If:
              - CreateNewVPC
              - !Ref PublicSubnet
              - !Ref SubnetId
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Windows-Instance

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WindowsInstance
  PublicIp:
    Description: Public IP Address
    Value: !GetAtt WindowsInstance.PublicIp
  InstanceProfile:
    Description: EC2 Instance Profile
    Value: !Ref EC2InstanceProfile
  FISIntegrationRole:
    Description: FIS Integration Role ARN
    Value: !GetAtt FISIntegrationRole.Arn
  CPUStressTestDocument:
    Description: SSM Document Name
    Value: !Ref CPUStressTestDocument