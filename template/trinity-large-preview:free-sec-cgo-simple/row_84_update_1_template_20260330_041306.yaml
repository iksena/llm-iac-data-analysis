AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MacieSession:
    Type: AWS::Macie::MacieSession
    Properties:
      IsEnabled: true
      AdminAccountId: !Ref AWS::AccountId
      FindingPublishingFrequency: IMMEDIATE

Outputs:
  MacieSessionArn:
    Description: ARN of the Macie session
    Value: !GetAtt MacieSession.MacieSessionArn
  MacieSessionStatus:
    Description: Status of the Macie session
    Value: !GetAtt MacieSession.Status