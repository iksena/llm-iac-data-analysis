AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for scheduled automation using EventBridge Scheduler and SSM'

Parameters:
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for Linux
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: Must be a valid EC2 instance type.

  WindowsInstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type for Windows
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
    ConstraintDescription: Must be a valid EC2 instance type.

  ScheduleExpression:
    Type: String
    Default: rate(15 minutes)
    Description: Schedule expression for EventBridge Scheduler

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where instances will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet where instances will be launched

  TagKey:
    Type: String
    Default: HelloWorld
    Description: Tag key for targeting instances

  TagValue:
    Type: String
    Default: 'true'
    Description: Tag value for targeting instances

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMI: ami-0261755bbcb8c4a84  # Amazon Linux 2023
      WindowsAMI: ami-0be0e902919675894  # Windows Server 2022
    us-east-2:
      LinuxAMI: ami-0430580de6244e02e  # Amazon Linux 2023
      WindowsAMI: ami-0d5c0c9ad45af9e0f  # Windows Server 2022
    us-west-1:
      LinuxAMI: ami-0b695b365a2f65e69  # Amazon Linux 2023
      WindowsAMI: ami-0487b1fe70c8a1d0d  # Windows Server 2022
    us-west-2:
      LinuxAMI: ami-0c0ba4e76e4392ce9  # Amazon Linux 2023
      WindowsAMI: ami-0b0af3577fe5e3532  # Windows Server 2022
    eu-west-1:
      LinuxAMI: ami-0694d931cee176e7d  # Amazon Linux 2023
      WindowsAMI: ami-0e3c7a8d17a4dd9e9  # Windows Server 2022

Resources:
  # S3 Bucket for logs
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  # IAM Role for EC2 instances
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${LogBucket.Arn}/*

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # IAM Role for EventBridge Scheduler
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMStartAssociationExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                Resource: '*'

  # Security Group for EC2 instances
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Linux EC2 Instance
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref LinuxInstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', LinuxAMI]
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: HelloWorld-Linux
        - Key: !Ref TagKey
          Value: !Ref TagValue
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  # Windows EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref WindowsInstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', WindowsAMI]
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: HelloWorld-Windows
        - Key: !Ref TagKey
          Value: !Ref TagValue
      UserData:
        Fn::Base64: |
          <powershell>
          # Ensure SSM agent is running
          Start-Service AmazonSSMAgent
          </powershell>

  # SSM Document for cross-platform commands
  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Cross-platform Hello World command'
        parameters: {}
        mainSteps:
          - action: aws:runPowerShellScript
            name: RunPowerShellOnWindows
            precondition:
              StringEquals:
                - platformType
                - Windows
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
                - '$timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"'
                - 'Write-Host "Current time: $timestamp"'
          - action: aws:runShellScript
            name: RunShellOnLinux
            precondition:
              StringEquals:
                - platformType
                - Linux
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
                - 'echo "Current time: $(date)"'

  # SSM State Manager Association
  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      AssociationName: HelloWorldAssociation
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: ssm-output

  # EventBridge Rule to trigger SSM Association
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to trigger SSM Association every 15 minutes
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: SSMAssociationTarget
          Arn: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}
          RoleArn: !GetAtt SchedulerRole.Arn

Outputs:
  LinuxInstanceId:
    Description: ID of the Linux EC2 instance
    Value: !Ref LinuxInstance

  WindowsInstanceId:
    Description: ID of the Windows EC2 instance
    Value: !Ref WindowsInstance

  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket

  SSMDocumentName:
    Description: Name of the SSM Document
    Value: !Ref SSMDocument

  EventBridgeRuleARN:
    Description: ARN of the EventBridge Rule
    Value: !GetAtt EventBridgeRule.Arn