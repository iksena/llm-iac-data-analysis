AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled automation workflow using EventBridge Scheduler and AWS Systems Manager (SSM)

Parameters:
  LinuxInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  WindowsInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
  S3LogBucketName:
    Type: String
    Default: ssm-automation-logs

Resources:
  LinuxInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  WindowsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  LinuxInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref LinuxInstanceRole

  WindowsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WindowsInstanceRole

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref LinuxInstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LinuxInstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
      Tags:
        - Key: HelloWorld
          Value: true

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref WindowsInstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref WindowsInstanceProfile
      UserData:
        Fn::Base64: |
          <powershell>
          Install-WindowsFeature -Name "AmazonSSMAgent"
          Start-Service AmazonSSMAgent
          </powershell>
      Tags:
        - Key: HelloWorld
          Value: true

  SSMHelloDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Hello World Document
        parameters: {}
        mainSteps:
          - action: 'aws:runShellScript'
            name: linuxStep
            inputs:
              runCommand:
                - echo "Hello World from Linux!"
          - action: 'aws:runPowerShellScript'
            name: windowsStep
            inputs:
              runCommand:
                - Write-Host "Hello World from Windows!"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMHelloDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'

  EventBridgeScheduleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole

  EventBridgeSchedule:
    Type: AWS::EventBridge::Schedule
    Properties:
      Name: SSMAssociationSchedule
      Description: Schedule to trigger SSM Association every 15 minutes
      ScheduleExpression: 'rate(15 minutes)'
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}'
        RoleArn: !GetAtt EventBridgeScheduleRole.Arn

  S3LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3LogBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Versioning:
        Status: Enabled
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  S3LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${S3LogBucketName}/logs/*'

Outputs:
  LinuxInstanceId:
    Description: Instance ID of the Linux instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Instance ID of the Windows instance
    Value: !Ref WindowsInstance
  S3LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref S3LogBucket
  EventBridgeScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn