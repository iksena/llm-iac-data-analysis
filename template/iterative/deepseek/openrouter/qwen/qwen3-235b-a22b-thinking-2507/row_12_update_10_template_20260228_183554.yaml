AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with Elastic IP and SSH access in default VPC'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  SSHLocation:
    Description: The IP range (CIDR) for SSH access
    Type: String
    MinLength: '9'
    MaxLength: '18'
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 203.0.113.0/24)
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2Describe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
  GetDefaultVpcFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
            try:
              if event['RequestType'] == 'Delete':
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                return

              ec2 = boto3.client('ec2')
              
              # Get default VPC
              vpcs = ec2.describe_vpcs(Filters=[{'Name': 'is-default', 'Values': ['true']}])['Vpcs']
              if not vpcs:
                raise Exception("No default VPC found in account")
              vpc_id = vpcs[0]['VpcId']

              # Get default subnet in first AZ
              subnets = ec2.describe_subnets(
                Filters=[
                  {'Name': 'vpc-id', 'Values': [vpc_id]},
                  {'Name': 'defaultForAz', 'Values': ['true']}
                ]
              )['Subnets']
              
              if not subnets:
                raise Exception("No default subnet found in default VPC")
              subnet_id = subnets[0]['SubnetId']

              cfnresponse.send(
                event, 
                context, 
                cfnresponse.SUCCESS, 
                {'VpcId': vpc_id, 'SubnetId': subnet_id},
                physical_resource_id=vpc_id
              )
            except Exception as e:
              logger.error(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.14
      Timeout: 30
  GetDefaultVpc:
    Type: Custom::GetDefaultVpc
    Properties:
      ServiceToken: !GetAtt GetDefaultVpcFunction.Arn
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !GetAtt GetDefaultVpc.VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      Tags:
        - Key: Name
          Value: SSH-Security-Group
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !GetAtt GetDefaultVpc.SubnetId
      Tags:
        - Key: Name
          Value: SSH-Accessible-Instance
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  ElasticIPAddress:
    Description: Elastic IP address
    Value: !GetAtt ElasticIP.PublicIp
  SSHCommand:
    Description: Command to connect via SSH (replace <key-file> with your key)
    Value: !Sub 'ssh -i <key-file>.pem ec2-user@${ElasticIP.PublicIp}'