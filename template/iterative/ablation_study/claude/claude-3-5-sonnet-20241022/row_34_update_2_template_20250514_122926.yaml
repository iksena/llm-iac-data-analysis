AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production ready MySQL RDS deployment with IOPS storage in private subnets'

Parameters:
  VpcCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC

  PrivateSubnet1CIDR:
    Type: String
    Default: '10.0.1.0/24'
    Description: CIDR block for private subnet 1

  PrivateSubnet2CIDR:
    Type: String
    Default: '10.0.2.0/24'
    Description: CIDR block for private subnet 2

  DBName:
    Type: String
    Default: 'mydb'
    Description: MySQL database name

  DBUsername:
    Type: String
    Default: 'admin'
    Description: Username for MySQL database access

  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for MySQL database access

  AllocatedStorage:
    Type: Number
    Default: 100
    Description: Allocated storage size in GB

  Iops:
    Type: Number
    Default: 3000
    Description: Provisioned IOPS value

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: RDS VPC

  PrivateSubnet1:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: Private Subnet 1

  PrivateSubnet2:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select 
        - 1
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: Private Subnet 2

  DBSubnetGroup:
    Type: 'AWS::RDS::DBSubnetGroup'
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS MySQL instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DBSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Security group for RDS MySQL instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCIDR

  MySQLDB:
    Type: 'AWS::RDS::DBInstance'
    Properties:
      DBInstanceClass: db.r5.large
      Engine: mysql
      EngineVersion: '8.0.28'
      MultiAZ: true
      StorageType: io1
      Iops: !Ref Iops
      AllocatedStorage: !Ref AllocatedStorage
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      PubliclyAccessible: false
      StorageEncrypted: true
      DeletionProtection: true

Outputs:
  DBEndpoint:
    Description: Database endpoint
    Value: !GetAtt MySQLDB.Endpoint.Address

  DBPort:
    Description: Database port
    Value: !GetAtt MySQLDB.Endpoint.Port