AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready real-time data pipeline: Kinesis Stream -> Firehose -> S3 with logging and least-privilege IAM'

Parameters:
  StreamName:
    Type: String
    Default: my-data-stream
    MinLength: 1
    MaxLength: 128
    Description: Name for the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 1000
    Description: Number of shards for the Kinesis Stream
  DeliveryStreamName:
    Type: String
    Default: my-firehose-delivery-stream
    MinLength: 1
    MaxLength: 64
    Description: Name for the Kinesis Data Firehose Delivery Stream
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name (DNS compliant, no default)
  RetentionPeriodHours:
    Type: Number
    Default: 24
    MinValue: 24
    MaxValue: 168
    Description: Kinesis Stream data retention in hours
  StartingPosition:
    Type: String
    Default: LATEST
    AllowedValues:
      - LATEST
      - TRIM_HORIZON
    Description: Starting position for Firehose consumption from Kinesis Stream
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues:
      - 1
      - 3
      - 5
      - 7
      - 14
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
      - 365
      - 400
      - 545
      - 731
      - 1827
      - 3653
    Description: Retention days for Firehose CloudWatch logs

Resources:
  DataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours
      Tags:
        - Key: Name
          Value: !Ref StreamName

  KinesisSourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !Sub 'arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${StreamName}'
      Tags:
        - Key: Name
          Value: !Sub '${DeliveryStreamName}-kinesis-source-role'

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/kinesis-firehose/${DeliveryStreamName}'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Name
          Value: !Sub '${DeliveryStreamName}-logs'

  S3DestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3WriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${BucketName}/*'
        - PolicyName: LogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesis-firehose/${DeliveryStreamName}:*'
      Tags:
        - Key: Name
          Value: !Sub '${DeliveryStreamName}-s3-destination-role'

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Ref BucketName

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt S3DestinationRole.Arn
            Action:
              - s3:PutObject
              - s3:PutObjectAcl
            Resource: !Sub '${DataBucket.Arn}/*'
    DependsOn:
      - DataBucket
      - S3DestinationRole

  DeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref DeliveryStreamName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt KinesisSourceRole.Arn
        StartingPosition: !Ref StartingPosition
      S3DestinationConfiguration:
        RoleARN: !GetAtt S3DestinationRole.Arn
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          SizeInMBs: 1
          IntervalInSeconds: 60
        CompressionFormat: UNCOMPRESSED
        Prefix: data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/
        ErrorPrefix: error/
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Sub '${DeliveryStreamName}-S3'
      Tags:
        - Key: Name
          Value: !Ref DeliveryStreamName
    DependsOn:
      - DataStream
      - KinesisSourceRole
      - S3DestinationRole
      - DataBucket
      - DataBucketPolicy
      - FirehoseLogGroup

Outputs:
  KinesisStreamName:
    Description: Name of the Kinesis Data Stream
    Value: !Ref DataStream
  KinesisStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt DataStream.Arn
  DeliveryStreamName:
    Description: Name of the Firehose Delivery Stream
    Value: !Ref DeliveryStream
  DeliveryStreamArn:
    Description: ARN of the Firehose Delivery Stream
    Value: !GetAtt DeliveryStream.Arn
  S3BucketName:
    Description: Name of the S3 Bucket
    Value: !Ref DataBucket
  S3BucketArn:
    Description: ARN of the S3 Bucket
    Value: !GetAtt DataBucket.Arn
  KinesisSourceRoleArn:
    Description: ARN of the Kinesis Source IAM Role
    Value: !GetAtt KinesisSourceRole.Arn
  S3DestinationRoleArn:
    Description: ARN of the S3 Destination IAM Role
    Value: !GetAtt S3DestinationRole.Arn
  FirehoseLogGroupName:
    Description: Name of the CloudWatch Log Group for Firehose
    Value: !Ref FirehoseLogGroup