AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating IAM role and instance profile for EC2 with CloudWatch and SSM permissions'

Resources:
  EC2SSMCloudWatchRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Path: '/'
      RoleName: 'EC2-SSM-CloudWatch-Role'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref EC2SSMCloudWatchRole
      InstanceProfileName: 'EC2-SSM-CloudWatch-Instance-Profile'

Outputs:
  IAMRoleARN:
    Description: 'ARN of the IAM role created for EC2 instances'
    Value: !GetAtt EC2SSMCloudWatchRole.Arn
    Export:
      Name: 'EC2SSMCloudWatchRoleARN'

  InstanceProfileARN:
    Description: 'ARN of the instance profile created for EC2 instances'
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: 'EC2SSMCloudWatchInstanceProfileARN'