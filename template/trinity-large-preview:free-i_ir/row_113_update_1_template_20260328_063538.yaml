AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties: {}
  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - Ref: SNSTopic
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource:
              Ref: SNSTopic
  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Id: Target0
          Arn:
            Ref: SNSTopic
    DependsOn:
      - TopicPolicy