AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  BucketName:
    Type: String
    Default: VPCFlowLogsBucket
    Description: Optional custom name for the S3 bucket
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
  Versioning:
    Type: String
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended
    Description: Enable or disable versioning for the bucket
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning logs to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before deleting logs

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !Ref Versioning
      LifecycleConfiguration:
        Rules:
          - Id: LogLifecycleRule
            Status: Enabled
            Transitions:
              - Days: !Ref LifecycleTransitionDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref LifecycleExpirationDays
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Join
              - '/'
              - - !GetAtt VPCFlowLogsBucket.Arn
                - 'AWSLogs'
                - !Ref AWS::AccountId
                - 'vpcflowlogs/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Description: Name of the S3 bucket for VPC flow logs
    Value: !Ref VPCFlowLogsBucket
  BucketArn:
    Description: ARN of the S3 bucket for VPC flow logs
    Value: !GetAtt VPCFlowLogsBucket.Arn