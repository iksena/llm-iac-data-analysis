AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'

  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'

  MFARequirementDuration:
    Type: Number
    Description: Duration in seconds for MFA token validity
    Default: 43200
    MinValue: 3600
    MaxValue: 86400

Resources:
  MFARequirementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA requirement for IAM users
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: MFARequired
            Effect: Deny
            NotAction:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
            Condition:
              BoolIfExists:
                aws:MultiFactorAuthPresent: false

  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmins
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - arn:aws:iam::aws:policy/AdministratorAccess

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmins
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy

  RestrictedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminAccess
      Groups: 
        - !Ref RestrictedAdminGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:Describe*'
              - 's3:List*'
              - 's3:Get*'
              - 'cloudwatch:Get*'
              - 'cloudwatch:List*'
            Resource: '*'

  CrossAccountAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountAccess
      Description: Role for cross-account access from trusted accounts
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecution
      Description: Role for CloudFormation service to execute changes
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  PrivilegedAdminGroupArn:
    Description: ARN of Privileged Admin Group
    Value: !GetAtt PrivilegedAdminGroup.Arn

  RestrictedAdminGroupArn:
    Description: ARN of Restricted Admin Group
    Value: !GetAtt RestrictedAdminGroup.Arn

  CrossAccountAccessRoleArn:
    Description: ARN of Cross-Account Access Role
    Value: !GetAtt CrossAccountAccessRole.Arn

  CloudFormationExecutionRoleArn:
    Description: ARN of CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn