AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with wait condition
Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701 
      InstanceType: t2.micro
      KeyName: MyEC2KeyPair
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
  MyWaitCondition:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701
      InstanceType: t2.micro
      KeyName: MyEC2KeyPair
      UserData: !Base64 |
        #!/bin/bash
        echo "Waiting..."
        sleep 60
        echo "Done!"
  MyWaitConditionHandle:
    Type: AWS::CloudFormation::WaitConditionHandle
  MyWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    Properties:
      Handle: !Ref MyWaitConditionHandle
      Timeout: 300
      Count: 1


Outputs:
  InstanceId:
    Value: !Ref MyEC2Instance
    Description: Instance ID
  WaitConditionHandle:
      Value: !Ref MyWaitConditionHandle
      Description: Wait Condition Handle

Metadata:
  Comment: This template creates an EC2 instance with a wait condition.

Conditions:
  CreateEC2Instance: true
