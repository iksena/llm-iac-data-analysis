AWSTemplateFormatVersion: '2010-09-09'
Description: Jenkins CI/CD Server with Automated Recovery and Secure Access

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - m5.large
    Description: EC2 instance type for Jenkins server
  JenkinsAdminPassword:
    Type: String
    NoEcho: true
    Default: admin1234
    Description: Jenkins admin user password

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: JenkinsVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: JenkinsIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: JenkinsSubnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: JenkinsSubnet2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: JenkinsRouteTable

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  VPCSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all internal VPC traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: VPCInternalSG

  JenkinsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and ICMP for Jenkins
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: 8
          ToPort: 0
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: JenkinsSG

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  JenkinsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /
      Tags:
        - Key: Name
          Value: JenkinsInstanceRole

  JenkinsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref JenkinsInstanceRole

  JenkinsServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref JenkinsInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref VPCSecurityGroup
            - !Ref JenkinsSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y java-1.8.0-openjdk
          wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
          rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io.key
          yum install -y jenkins
          systemctl enable jenkins
          systemctl start jenkins
          sleep 30
          JENKINS_URL="http://localhost:8080"
          ADMIN_PASSWORD="!Ref JenkinsAdminPassword"
          curl -X POST "$JENKINS_URL/setupWizard/configureSecurity" -H "Content-Type: application/x-www-form-urlencoded" --data-urlencode "useSecurity=true" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=false" --data-urlencode "useJceksKeyStore=fa