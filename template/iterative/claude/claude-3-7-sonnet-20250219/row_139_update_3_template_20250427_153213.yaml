AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates a custom resource using Lambda for arithmetic operations'

Parameters:
  FirstNumber:
    Type: Number
    Description: First number for arithmetic operation
    Default: 10
  
  SecondNumber:
    Type: Number
    Description: Second number for arithmetic operation
    Default: 5
  
  Operator:
    Type: String
    Description: Arithmetic operator to use
    Default: Add
    AllowedValues:
      - Add
      - Subtract
      - Multiply
      - Divide
  
  ForceFailure:
    Type: String
    Description: Set to true to force the custom resource to fail (for testing)
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs18.x
      Timeout: 30
      Code:
        ZipFile: |
          const https = require('https');
          
          function sendResponse(event, context, responseStatus, responseData, physicalResourceId, reason) {
            return new Promise((resolve, reject) => {
              const responseBody = JSON.stringify({
                Status: responseStatus,
                Reason: reason || 'See the details in CloudWatch Log Stream: ' + context.logStreamName,
                PhysicalResourceId: physicalResourceId || context.logStreamName,
                StackId: event.StackId,
                RequestId: event.RequestId,
                LogicalResourceId: event.LogicalResourceId,
                NoEcho: false,
                Data: responseData
              });
              
              console.log('Response body:', responseBody);
              
              // Parse the ResponseURL
              const responseUrl = new URL(event.ResponseURL);
              
              const options = {
                hostname: responseUrl.hostname,
                port: 443,
                path: responseUrl.pathname + responseUrl.search,
                method: 'PUT',
                headers: {
                  'Content-Type': '',
                  'Content-Length': responseBody.length
                }
              };
              
              const request = https.request(options, (response) => {
                console.log(`Status code: ${response.statusCode}`);
                resolve();
              });
              
              request.on('error', (error) => {
                console.log('send(..) failed:', error);
                reject(error);
              });
              
              request.write(responseBody);
              request.end();
            });
          }
          
          exports.handler = async function(event, context) {
            console.log('REQUEST RECEIVED:', JSON.stringify(event));
            
            // For Delete requests, immediately send a success response
            if (event.RequestType === 'Delete') {
              await sendResponse(event, context, 'SUCCESS', {});
              return;
            }
            
            try {
              // Get parameters
              const firstNumber = Number(event.ResourceProperties.FirstNumber);
              const secondNumber = Number(event.ResourceProperties.SecondNumber);
              const operator = event.ResourceProperties.Operator;
              const forceFailure = event.ResourceProperties.ForceFailure === 'true';
              
              // Check if we should force a failure
              if (forceFailure) {
                throw new Error('Forced failure for testing purposes');
              }
              
              // Perform the calculation
              let result;
              let expression;
              
              switch(operator) {
                case 'Add':
                  result = firstNumber + secondNumber;
                  expression = `${firstNumber} + ${secondNumber}`;
                  break;
                case 'Subtract':
                  result = firstNumber - secondNumber;
                  expression = `${firstNumber} - ${secondNumber}`;
                  break;
                case 'Multiply':
                  result = firstNumber * secondNumber;
                  expression = `${firstNumber} * ${secondNumber}`;
                  break;
                case 'Divide':
                  if (secondNumber === 0) {
                    throw new Error('Division by zero is not allowed');
                  }
                  result = firstNumber / secondNumber;
                  expression = `${firstNumber} / ${secondNumber}`;
                  break;
                default:
                  throw new Error(`Unknown operator: ${operator}`);
              }
              
              // Send success response
              await sendResponse(event, context, 'SUCCESS', {
                Result: result,
                Expression: expression
              });
            } catch (error) {
              console.error('Error:', error);
              await sendResponse(event, context, 'FAILED', {}, null, error.message);
            }
          };

  ArithmeticHelper:
    Type: Custom::Helper
    DependsOn: ArithmeticLambdaFunction
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      ForceFailure: !Ref ForceFailure

Outputs:
  CalculationResult:
    Description: Result of the arithmetic operation
    Value: !GetAtt ArithmeticHelper.Result
  
  CalculationExpression:
    Description: The expression that was evaluated
    Value: !GetAtt ArithmeticHelper.Expression