AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with two EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'The Subnet ID where the ENI will be created'
  
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: 'The Security Group ID to associate with the ENI'
  
  PrimaryPrivateIp:
    Type: String
    Description: 'Primary private IP address for the ENI'
    Default: '10.0.0.10'
  
  SecondaryPrivateIp:
    Type: String
    Description: 'Secondary private IP address for the ENI'
    Default: '10.0.0.11'

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: 'ENI with multiple IP addresses'
      GroupSet:
        - !Ref SecurityGroupId
      PrivateIpAddresses:
        - Primary: true
          PrivateIpAddress: !Ref PrimaryPrivateIp
        - Primary: false
          PrivateIpAddress: !Ref SecondaryPrivateIp
      Tags:
        - Key: Name
          Value: 'Multi-IP-ENI'

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: 'Primary-EIP'

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: 'Secondary-EIP'

  EIP1Association:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NetworkInterface
    Properties:
      AllocationId: !GetAtt ElasticIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrimaryPrivateIp

  EIP2Association:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NetworkInterface
    Properties:
      AllocationId: !GetAtt ElasticIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIp

Outputs:
  ENIId:
    Description: 'The ID of the created Elastic Network Interface'
    Value: !Ref NetworkInterface
  
  EIP1AllocationId:
    Description: 'Allocation ID of the first Elastic IP'
    Value: !GetAtt ElasticIP1.AllocationId
  
  EIP2AllocationId:
    Description: 'Allocation ID of the second Elastic IP'
    Value: !GetAtt ElasticIP2.AllocationId
  
  EIP1PublicIP:
    Description: 'Public IP address of the first Elastic IP'
    Value: !GetAtt ElasticIP1.PublicIp
  
  EIP2PublicIP:
    Description: 'Public IP address of the second Elastic IP'
    Value: !GetAtt ElasticIP2.PublicIp