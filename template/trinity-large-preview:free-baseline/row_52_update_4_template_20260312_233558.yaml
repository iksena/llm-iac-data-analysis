AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for multi-region application failover using Route 53 ARC

Parameters:
  ClusterName:
    Type: String
    Default: MultiRegionRecoveryCluster
    Description: Name of the recovery cluster
  ControlPanelName:
    Type: String
    Default: MultiRegionControlPanel
    Description: Name of the control panel
  RoutingControlNames:
    Type: String
    Default: Region1RoutingControl,Region2RoutingControl
    Description: Names of routing controls for each region, comma-separated
  SafetyRuleName:
    Type: String
    Default: AtLeastOneActiveRegion
    Description: Name of the safety rule
  HealthCheckRegions:
    Type: String
    Default: us-east-1,us-west-2
    Description: AWS regions where health checks will be created, comma-separated

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Ref ClusterName

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Ref ControlPanelName
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControls:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Select [0, !Split [",", !Ref RoutingControlNames]]
      ControlPanelArn: !GetAtt ControlPanel.Arn
    DependsOn: ControlPanel

  RoutingControls2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Select [1, !Split [",", !Ref RoutingControlNames]]
      ControlPanelArn: !GetAtt ControlPanel.Arn
    DependsOn: ControlPanel

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Ref SafetyRuleName
      ControlPanelArn: !GetAtt ControlPanel.Arn
      SafetyRules:
        - Type: ATLEAST
          Threshold: 1
          RoutingControlArnList:
            - !GetAtt RoutingControls.Arn
            - !GetAtt RoutingControls2.Arn
    DependsOn:
      - RoutingControls
      - RoutingControls2

  HealthCheck1:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region1.com
        Regions: [!Select [0, !Split [",", !Ref HealthCheckRegions]]]
        EnableSNI: true

  HealthCheck2:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTP
        ResourcePath: /health
        FullyQualifiedDomainName: example-region2.com
        Regions: [!Select [1, !Split [",", !Ref HealthCheckRegions]]]
        EnableSNI: true

Outputs:
  RecoveryClusterArn:
    Description: ARN of the recovery cluster
    Value: !GetAtt RecoveryCluster.Arn
  ControlPanelArn:
    Description: ARN of the control panel
    Value: !GetAtt ControlPanel.Arn
  RoutingControlArns:
    Description: ARNs of the routing controls
    Value: !Join [",", [!GetAtt RoutingControls.Arn, !GetAtt RoutingControls2.Arn]]
  SafetyRuleArn:
    Description: ARN of the safety rule
    Value: !GetAtt SafetyRule.Arn
  HealthCheckIds:
    Description: IDs of the health checks
    Value: !Join [",", [!Ref HealthCheck1, !Ref HealthCheck2]]