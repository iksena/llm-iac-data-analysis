AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready MySQL RDS instance with network isolation and Secrets Manager integration'

Parameters:
  VpcCidr:
    Description: CIDR block for VPC
    Type: String
    Default: '10.0.0.0/16'
  SubnetCidr1:
    Description: CIDR block for first subnet
    Type: String
    Default: '10.0.1.0/24'
  SubnetCidr2:
    Description: CIDR block for second subnet
    Type: String
    Default: '10.0.2.0/24'
  DBEngineVersion:
    Description: MySQL engine version
    Type: String
    Default: '8.0.35'
    AllowedValues:
      - '5.7.44'
      - '8.0.35'
  DBName:
    Description: Optional database name
    Type: String
    Default: ''
    AllowedPattern: '[a-zA-Z0-9_]*'
    MaxLength: '64'
  MasterUsername:
    Description: Database admin username
    Type: String
    Default: 'admin'
    MinLength: '1'
    MaxLength: '16'
    AllowedPattern: '[a-zA-Z0-9]*'
  SecretNamePrefix:
    Description: Prefix for secret name
    Type: String
    Default: 'MySqlDBSecret'
    MinLength: '1'
    MaxLength: '256'
  KmsKeyDescription:
    Description: Description for KMS key
    Type: String
    Default: 'RDS Encryption Key'
    MaxLength: '8192'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: RDS-VPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr1
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs:
              Ref: AWS::Region
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet-1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr2
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs:
              Ref: AWS::Region
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet-2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Private-Route-Table

  RouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  RouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: RDS-Security-Group

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref KmsKeyDescription
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - 'kms:*'
            Resource: '*'
          - Sid: Allow RDS to use the key
            Effect: Allow
            Principal:
              Service: !Sub 'rds.${AWS::URLSuffix}'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:Describe*'
            Resource: '*'
          - Sid: Allow Secrets Manager to use the key
            Effect: Allow
            Principal:
              Service: !Sub 'secretsmanager.${AWS::URLSuffix}'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:Describe*'
            Resource: '*'
      EnableKeyRotation: true

  MasterUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${SecretNamePrefix}-${AWS::StackName}'
      Description: 'Auto-generated RDS master credentials'
      KmsKeyId: !Ref KMSKey
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${MasterUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 30
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Purpose
          Value: RDS-Credentials

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom MySQL parameter group
      Family: !Sub 'mysql${DBEngineVersion}'
      Parameters:
        max_connections: '100'
        slow_query_log: '1'
      Tags:
        - Key: Environment
          Value: Production

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2
      Tags:
        - Key: Tier
          Value: Database

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: !Ref DBEngineVersion
      AllocatedStorage: '20'
      DBName: !Ref DBName
      MasterUserSecret:
        SecretArn: !Ref MasterUserSecret
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      StorageEncrypted: true
      KmsKeyId: !Ref KMSKey
      DBParameterGroupName: !Ref DBParameterGroup
      BackupRetentionPeriod: 7
      DeletionProtection: true
      Tags:
        - Key: Application
          Value: MySQL-Database

Outputs:
  DBEndpoint:
    Description: RDS instance endpoint
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub '${AWS::StackName}-DBEndpoint'
  SecretArn:
    Description: ARN of the Secrets Manager secret
    Value: !Ref MasterUserSecret
    Export:
      Name: !Sub '${AWS::StackName}-SecretArn'
  SecurityGroupId:
    Description: Security group ID for database access
    Value: !GetAtt DBSecurityGroup.GroupId
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'
  DBSubnetGroupName:
    Description: Name of the DB subnet group
    Value: !Ref DBSubnetGroup
    Export:
      Name: !Sub '${AWS::StackName}-DBSubnetGroupName'