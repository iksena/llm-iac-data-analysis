AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 instance with ephemeral drives in default VPC

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: 'AWS::EC2::KeyPair::KeyName'
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.

Resources:
  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Enable SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: m5d.large
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      Tags:
        - Key: Name
          Value: EphemeralStorageInstance

Outputs:
  InstanceId:
    Description: Instance ID of the newly created EC2 instance
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  KeyPairName:
    Description: Name of the key pair used for SSH access
    Value: !Ref KeyName

Key changes made:
1. Removed the problematic SSM parameter resource and replaced it with the correct SSM parameter resolution syntax directly in the ImageId property
2. Used the {{resolve:ssm:}} intrinsic function to dynamically fetch the latest Amazon Linux 2 AMI
3. Maintained all other functionality including ephemeral storage configuration and security group setup
4. Ensured proper YAML formatting and CloudFormation syntax throughout

This template should now pass syntax validation and deploy successfully.