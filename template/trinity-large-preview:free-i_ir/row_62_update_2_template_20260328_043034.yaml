AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL Cluster with Two db.t3.large Instances and Custom Parameter Groups

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      MasterUsername: admin
      MasterUserPassword: !Ref MasterUserPassword
      Port: 3306
      BackupRetentionPeriod: 1
      DBSubnetGroupName: default
      VpcSecurityGroupIds:
        - !Ref DBClusterSecurityGroup
      StorageEncrypted: true

  CustomDBParameters:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        sql_mode: STRICT_TRANS_TABLES

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBParameterGroupName: !Ref CustomDBParameters

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBParameterGroupName: !Ref CustomDBParameters

  DBClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

Parameters:
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Master user password for the Aurora cluster

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Aurora Reader Endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address