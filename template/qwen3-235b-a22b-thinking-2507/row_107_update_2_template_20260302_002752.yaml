AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  QueueName:
    Type: String
    Default: "MessageRetrievalQueue"
    Description: "Name of the SQS queue for message storage"
    MinLength: 1
    MaxLength: 80
    AllowedPattern: "[a-zA-Z0-9_-]+"
    ConstraintDescription: "Queue name must contain only alphanumeric characters, hyphens, and underscores"
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SqsReceivePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ApiGatewayRole.Arn
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "MessageRetrievalApi"
      Description: "API Gateway for HTTP-based SQS message retrieval"
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: "NONE"
      HttpMethod: "GET"
      ResourceId: !GetAtt RestApi.RootResourceId
      RestApiId: !Ref RestApi
      RequestParameters:
        "method.request.querystring.MaxNumberOfMessages": true
        "method.request.querystring.WaitTimeSeconds": true
      Integration:
        Type: "AWS"
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}"
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestParameters:
          "integration.request.querystring.MaxNumberOfMessages": "method.request.querystring.MaxNumberOfMessages"
          "integration.request.querystring.WaitTimeSeconds": "method.request.querystring.WaitTimeSeconds"
        IntegrationResponses:
          - StatusCode: "200"
      MethodResponses:
        - StatusCode: "200"

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      Description: "Deployment of message retrieval API"
      RestApiId: !Ref RestApi

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiGatewayDeployment
      RestApiId: !Ref RestApi
      StageName: "prod"
      Description: "Production stage for message retrieval API"
      TracingEnabled: false

Outputs:
  ApiGatewayInvokeUrl:
    Description: "API Gateway invoke URL for message retrieval"
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
    Export:
      Name: "ApiGatewayInvokeUrl"
  SQSQueueUrl:
    Description: "URL of the SQS queue"
    Value: !GetAtt SQSQueue.QueueUrl
    Export:
      Name: "SQSQueueUrl"
  ApiGatewayRestApiId:
    Description: "REST API ID for management operations"
    Value: !Ref RestApi
    Export:
      Name: "ApiGatewayRestApiId"