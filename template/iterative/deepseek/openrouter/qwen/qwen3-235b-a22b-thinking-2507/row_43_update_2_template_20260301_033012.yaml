AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ProjectName:
    Type: String
    Default: 'MyProject'
    Description: 'Name of the project for organizational tagging'
  Environment:
    Type: String
    Default: 'Production'
    AllowedValues:
      - 'Production'
      - 'Development'
      - 'Testing'
    Description: 'Environment type for resource tracking'
  KeyAlias:
    Type: String
    Default: 'alias/s3-encrypted-bucket'
    Description: 'Alias name for the KMS key (must start with alias/)'
    MinLength: 7
    MaxLength: 256
    AllowedPattern: '^alias/[a-zA-Z0-9/_-]{1,250}$'
Resources:
  S3EncryptionKey:
    Type: 'AWS::KMS::Key'
    Properties:
      Description: 'KMS key for S3 bucket server-side encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: 's3-kms-key-policy'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: 'Allow S3 Service'
            Effect: 'Allow'
            Principal:
              Service: 's3.amazonaws.com'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
      Tags:
        - Key: 'Project'
          Value: !Ref ProjectName
        - Key: 'Environment'
          Value: !Ref Environment
  S3EncryptionKeyAlias:
    Type: 'AWS::KMS::Alias'
    Properties:
      AliasName: !Ref KeyAlias
      TargetKeyId: !Ref S3EncryptionKey
  EncryptedS3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !GetAtt S3EncryptionKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: 'TransitionToStandardIA'
            Status: 'Enabled'
            Filter: ''
            Transitions:
              - StorageClass: 'STANDARD_IA'
                TransitionInDays: 30
            ExpirationInDays: 365
      Tags:
        - Key: 'Project'
          Value: !Ref ProjectName
        - Key: 'Environment'
          Value: !Ref Environment
Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref EncryptedS3Bucket
  KMSKeyARN:
    Description: 'ARN of the KMS encryption key'
    Value: !GetAtt S3EncryptionKey.Arn
  KMSKeyAliasName:
    Description: 'Name of the KMS key alias'
    Value: !Ref KeyAlias