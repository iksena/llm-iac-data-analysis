AWSTemplateFormatVersion: '2010-09-09'
Description: MySQL RDS instance with custom parameter group and Secrets Manager integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-00000000000000000
  DatabaseName:
    Type: String
    Default: MyDatabase
  DatabaseUser:
    Type: String
    Default: admin
  DatabasePassword:
    Type: String
    Default: Password123!
    NoEcho: true
  AllowedCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref AllowedCidr

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom MySQL parameter group
      Family: mysql8.0
      Parameters:
        max_connections: '151'
        character_set_server: utf8mb4

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: RDSAdminSecret
      Description: Secret for RDS admin credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DatabaseName
      AllocatedStorage: 20
      DBInstanceClass: db.t3.micro
      Engine: MySQL
      EngineVersion: 8.0.28
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Ref DatabasePassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      BackupRetentionPeriod: 7

  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref RDSInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  RDSEndpoint:
    Description: RDS instance endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
  RDSSecretARN:
    Description: Secrets Manager secret ARN
    Value: !Ref DBSecret