AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge configuration with API destination and connection for external API integration'

Parameters:
  ApiEndpointUrl:
    Type: String
    Description: 'API endpoint URL for the destination'
    Default: 'https://webhook.site/testtest'
    AllowedPattern: '^https://.*'
    ConstraintDescription: 'Must be a valid HTTPS URL'
  
  ApiKey:
    Type: String
    Description: 'API key for authentication'
    NoEcho: true
    MinLength: 1

Resources:
  EventBridgeRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - events.amazonaws.com
            Action: 
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess'
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:InvokeApiDestination'
                Resource: '*'

  CustomEventBus:
    Type: 'AWS::Events::EventBus'
    Properties:
      Name: !Sub '${AWS::StackName}-event-bus'

  ApiConnection:
    Type: 'AWS::Events::Connection'
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'x-api-key'
          ApiKeyValue: !Ref ApiKey
      Description: 'Connection for external API integration'
      Name: !Sub '${AWS::StackName}-api-connection'

  ApiDestination:
    Type: 'AWS::Events::ApiDestination'
    DependsOn: ApiConnection
    Properties:
      ConnectionArn: !GetAtt ApiConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref ApiEndpointUrl
      InvocationRateLimitPerSecond: 100
      Name: !Sub '${AWS::StackName}-api-destination'
      Description: 'API Destination for external endpoint'

  EventRule:
    Type: 'AWS::Events::Rule'
    DependsOn: 
      - ApiDestination
      - EventBridgeRole
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - 'custom.events'
      Name: !Sub '${AWS::StackName}-event-rule'
      Description: 'Route custom events to API destination'
      State: ENABLED
      Targets:
        - Id: 'ApiDestinationTarget'
          Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'ARN of the custom event bus'
    Value: !GetAtt CustomEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'

  ApiDestinationArn:
    Description: 'ARN of the API destination'
    Value: !GetAtt ApiDestination.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ApiDestinationArn'

  ConnectionArn:
    Description: 'ARN of the connection'
    Value: !GetAtt ApiConnection.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ConnectionArn'