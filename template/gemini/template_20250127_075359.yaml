
AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a DynamoDB table for ArtistId, Concert, and TicketSales.
Resources:
  ArtistConcertSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ArtistConcertSales
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      BillingMode: PAY_PER_REQUEST
Outputs:
  TableName:
    Value: !Ref ArtistConcertSalesTable
    Description: The name of the DynamoDB table.

