AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with IAM Role, S3 Bucket, and Auto-Start/Stop Application

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessRole
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Ref ScriptsBucket
                  - !Sub 'arn:aws:s3:::${ScriptsBucket}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'emr-serverless-scripts-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  EMRServerlessApplication:
    Type: AWS::EMR::Application
    Properties:
      Name: EMRServerlessSparkApp
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      InitialCapacity:
        Worker:
          WorkerCount:
            Value: 1
          WorkerConfiguration:
            CPU: 2 vCPU
            Memory: 4 GB
            Disk: 10 GB
      MaximumCapacity:
        CPU: 16 vCPU
        Memory: 32 GB
        Disk: 100 GB
      NetworkConfiguration:
        SubnetIds:
          - subnet-0abcd1234efgh5678
      Architecture: ARM64
      AutoStartConfig:
        Enabled: true
        IdleTimeoutMinutes: 5
      AutoStopConfig:
        Enabled: true
        IdleTimeoutMinutes: 10
      ImageConfiguration:
        ImageUri: public.ecr.aws/lambda/provided:al2-arm64
      RoleArn: !GetAtt EMRServerlessRole.Arn
      WorkerTypeSpecifications:
        Worker:
          WorkerCount:
            Value: 1
          WorkerConfiguration:
            CPU: 2 vCPU
            Memory: 4 GB
            Disk: 10 GB

Outputs:
  EMRServerlessApplicationArn:
    Description: ARN of the EMR Serverless Application
    Value: !GetAtt EMRServerlessApplication.Arn
  ScriptsBucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref ScriptsBucket