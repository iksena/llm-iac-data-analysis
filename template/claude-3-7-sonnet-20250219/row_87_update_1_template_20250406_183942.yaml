AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an S3 bucket for Lambda artifacts and a KMS key for encryption'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket to store Lambda artifacts
    Default: lambda-artifacts-bucket
    
  KeyAlias:
    Type: String
    Description: Alias for the KMS key
    Default: alias/lambda-artifacts-key
    
  ServiceRoleArn:
    Type: String
    Description: ARN of the service role that needs access to the KMS key
    Default: ''

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: PublicRead
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      Tags:
        - Key: Purpose
          Value: LambdaArtifacts

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${LambdaArtifactsBucket}/*'

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting Lambda artifacts
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-policy
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Service Role to use the key
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
            Condition:
              StringEquals:
                'kms:CallerAccount': !Ref AWS::AccountId
      Tags:
        - Key: Purpose
          Value: LambdaArtifactsEncryption

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref KeyAlias
      TargetKeyId: !Ref KMSKey

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
    
  S3BucketArn:
    Description: ARN of the S3 bucket for Lambda artifacts
    Value: !GetAtt LambdaArtifactsBucket.Arn
    
  KMSKeyId:
    Description: ID of the KMS key
    Value: !Ref KMSKey
    
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt KMSKey.Arn
    
  KMSKeyAlias:
    Description: Alias of the KMS key
    Value: !Ref KeyAlias