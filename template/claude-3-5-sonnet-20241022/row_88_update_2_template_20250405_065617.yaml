AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for AWS Service Catalog to manage S3 and Lambda resources'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Role Configuration"
        Parameters:
          - RolePathPrefix

Parameters:
  RolePathPrefix:
    Type: String
    Default: '/service-catalog/'
    Description: Path prefix for the IAM role

Resources:
  ServiceCatalogRole:
    Type: AWS::IAM::Role
    Properties:
      Path: !Ref RolePathPrefix
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Tags:
        - Key: Purpose
          Value: ServiceCatalogAutomation

  ServiceCatalogCustomPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Custom permissions for Service Catalog role
      Path: !Ref RolePathPrefix
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ServiceCatalogPermissions
            Effect: Allow
            Action:
              - servicecatalog:ProvisionProduct
              - servicecatalog:UpdateProvisionedProduct
              - servicecatalog:TerminateProvisionedProduct
              - servicecatalog:ListProvisionedProducts
            Resource: '*'
          - Sid: IAMPermissions
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:PassRole
            Resource: 
              - !Sub arn:aws:iam::${AWS::AccountId}:role${RolePathPrefix}*
          - Sid: LambdaPermissions
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:DeleteFunction
              - lambda:GetFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:ListFunctions
            Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*
          - Sid: CloudFormationPermissions
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStacks
            Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/*
          - Sid: SNSPermissions
            Effect: Allow
            Action:
              - sns:ListTopics
              - sns:Publish
            Resource: !Sub arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*
      Roles:
        - !Ref ServiceCatalogRole

Outputs:
  ServiceCatalogRoleARN:
    Description: ARN of the Service Catalog execution role
    Value: !GetAtt ServiceCatalogRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-RoleARN

  ServiceCatalogRoleName:
    Description: Name of the Service Catalog execution role
    Value: !Ref ServiceCatalogRole
    Export:
      Name: !Sub ${AWS::StackName}-RoleName