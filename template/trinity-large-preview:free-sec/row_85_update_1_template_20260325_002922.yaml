AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and cost-optimized S3 bucket for CloudWatch export data with versioning and lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: cloudwatch-exports-bucket
    Description: Name of the S3 bucket for CloudWatch export data
  ExportRoleArn:
    Type: String
    Default: ''
    Description: ARN of the IAM role allowed to export CloudWatch data to this bucket

Resources:
  CloudWatchExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      Versioning:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransitionAndExpiration
            Status: Enabled
            Transitions:
              - Days: 30
                StorageClass: GLACIER
            Expiration:
              Days: 365

  CloudWatchExportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ExportRoleArn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt CloudWatchExportsBucket.Arn
              - !Join ['', [!GetAtt CloudWatchExportsBucket.Arn, '/*']]

Outputs:
  BucketName:
    Description: Name of the CloudWatch exports S3 bucket
    Value: !Ref CloudWatchExportsBucket
  BucketArn:
    Description: ARN of the CloudWatch exports S3 bucket
    Value: !GetAtt CloudWatchExportsBucket.Arn