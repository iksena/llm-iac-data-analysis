AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge to DataDog Integration for Log Forwarding with Dead Letter Queue Support'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'DataDog Configuration'
        Parameters:
          - DataDogApiKey
          - ApplicationSource
          - Environment
    ParameterLabels:
      DataDogApiKey:
        default: 'DataDog API Key'

Parameters:
  DataDogApiKey:
    Type: String
    Default: 'testanu'
    NoEcho: true
    Description: 'DataDog API Key for authentication'
    MinLength: 1
    MaxLength: 40
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: 'API Key must contain only alphanumeric characters'
    
  ApplicationSource:
    Type: String
    Default: 'MyDataDogApp'
    Description: 'The source application name for event filtering'
    MinLength: 1
    MaxLength: 256
    
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: 
      - 'dev'
      - 'staging'
      - 'prod'
    Description: 'Environment tag for resource identification'

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-datadog-dlq'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: 'DataDog Log Forwarding DLQ'

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: 
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 
              - sqs:SendMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeCustomPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt DeadLetterQueue.Arn

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'DD-API-KEY'
          ApiKeyValue: !Ref DataDogApiKey
      Name: !Sub '${Environment}-datadog-connection'
      Description: 'Connection to DataDog API for log forwarding'

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: 'https://http-intake.logs.datadoghq.com/v1/input'
      Name: !Sub '${Environment}-datadog-destination'
      InvocationRateLimitPerSecond: 300

  EventBusRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${Environment}-datadog-forwarder'
      Description: 'Forward application events to DataDog'
      State: ENABLED
      EventPattern:
        source:
          - !Ref ApplicationSource
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Id: 'SendToDataDog'
          RetryPolicy:
            MaximumRetryAttempts: 3
            MaximumEventAgeInSeconds: 86400
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  DataDogConnectionArn:
    Description: 'ARN of the DataDog Connection'
    Value: !GetAtt DataDogConnection.Arn

  ApiDestinationArn:
    Description: 'ARN of the DataDog API Destination'
    Value: !GetAtt DataDogApiDestination.Arn

  DeadLetterQueueUrl:
    Description: 'URL of the Dead Letter Queue'
    Value: !Ref DeadLetterQueue

  DeadLetterQueueArn:
    Description: 'ARN of the Dead Letter Queue'
    Value: !GetAtt DeadLetterQueue.Arn