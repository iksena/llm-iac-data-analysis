AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Lambda function with Node.js 20.x runtime that prints hello world.

Resources:
  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-HelloWorldFunction'
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Hello World!');
            return {
              statusCode: 200,
              body: JSON.stringify('Hello World!'),
            };
          };
      Role: !GetAtt LambdaExecutionRole.Arn
      PackageType: Zip
      Architectures:
        - x86_64
      VpcConfig:
        SubnetIds:
          - !Ref LambdaSubnet
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-LambdaExecutionRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VpcId

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: 10.0.1.0/24

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where Lambda will be deployed