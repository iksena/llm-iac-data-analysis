AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with ephemeral drives
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b31ad2299a701 # Replace with a valid AMI ID for your region
      InstanceType: t2.micro
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp2
            VolumeSize: 8
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      KeyName: MyKeyPair # Replace with your KeyPair name
      SecurityGroupIds:
        - !Ref SecurityGroup
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH inbound traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: Instance ID
  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address of the instance

