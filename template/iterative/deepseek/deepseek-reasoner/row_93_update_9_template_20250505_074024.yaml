AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
    Description: EC2 instance type
  BucketName:
    Type: String
    Description: Unique S3 bucket name for logs
    AllowedPattern: ^[a-z0-9-.]{3,63}$
    ConstraintDescription: Must follow S3 bucket naming rules
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC for resources
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Target subnet for EC2 instance
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Latest Amazon Linux 2 AMI ID

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 7
            Prefix: "nginx-logs/"

  LogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: SSMInstanceRole
    Properties:
      Bucket: !Ref LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt SSMInstanceRole.Arn
            Action: 
              - s3:PutObject
              - s3:PutObjectAcl
            Resource: !Sub "arn:aws:s3:::${BucketName}/nginx-logs/*"

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and SSM access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3LogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:ListBucket
                Resource: 
                  - !Sub "arn:aws:s3:::${BucketName}"
                  - !Sub "arn:aws:s3:::${BucketName}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  WebServer:
    Type: AWS::EC2::Instance
    DependsOn: InstanceProfile
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: InstallNginx
          Value: "true"
      Monitoring: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          sudo systemctl start amazon-ssm-agent

  NginxInstallationAssociation:
    Type: AWS::SSM::Association
    DependsOn: WebServer
    Properties:
      Name: AWS-RunShellScript
      Parameters:
        commands:
          - !Sub |
              #!/bin/bash
              yum update -y
              amazon-linux-extras install -y nginx1
              systemctl start nginx
              systemctl enable nginx
              
              mkdir -p /usr/local/bin
              echo '#!/bin/bash
              aws s3 sync /var/log/nginx s3://${BucketName}/nginx-logs/$$(date +\\%Y-\\%m-\\%d) --region ${AWS::Region}' > /usr/local/bin/sync_nginx_logs.sh
              chmod +x /usr/local/bin/sync_nginx_logs.sh
              
              (crontab -l 2>/dev/null; echo "0 0 * * * /usr/local/bin/sync_nginx_logs.sh") | crontab -
              
              /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c ssm:AmazonCloudWatch-linux
      Targets:
        - Key: tag:InstallNginx
          Values: ["true"]

Outputs:
  InstanceId:
    Value: !Ref WebServer
  WebsiteURL:
    Value: !Sub "http://${WebServer.PublicDnsName}"
  LogsBucketName:
    Value: !Ref LogsBucket
  SSMCommandStatus:
    Value: !GetAtt NginxInstallationAssociation.AssociationId