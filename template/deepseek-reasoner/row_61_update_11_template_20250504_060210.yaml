AWSTemplateFormatVersion: '2010-09-09'  
Description: Creates a private Route53 Hosted Zone for www.example.com associated with a VPC  
Parameters:  
  VpcId:  
    Type: AWS::EC2::VPC::Id  
    Description: >-  
      REQUIRED - ID of an existing VPC to associate with the private hosted zone.  
      Must be in the current AWS region.  
    AllowedPattern: "^vpc-[a-f0-9]{8}(?:[a-f0-9]{9})?$"  
    ConstraintDescription: Must be a valid VPC ID starting with 'vpc-'  
Resources:  
  PrivateHostedZone:  
    Type: AWS::Route53::HostedZone  
    Properties:  
      Name: www.example.com.  
      VPCs:  
        - VPCId: !Ref VpcId  
          VPCRegion: !Ref 'AWS::Region'  
Outputs:  
  HostedZoneId:  
    Description: ID of the created private hosted zone  
    Value: !Ref PrivateHostedZone  
  HostedZoneNameServers:  
    Description: Name servers of the hosted zone  
    Value: !Join [',', !GetAtt PrivateHostedZone.NameServers]