AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a scalable and monitored Amazon EFS file system
  with automated backups and performance safeguards in a VPC-based environment.

Parameters:
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the EFS will be deployed.
    # Ensure this parameter is provided with a valid VPC ID during stack creation
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: The first Subnet ID for the EFS mount target.
    # Ensure this parameter is provided with a valid Subnet ID during stack creation
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: The second Subnet ID for the EFS mount target.
    # Ensure this parameter is provided with a valid Subnet ID during stack creation
  BackupSchedule:
    Type: String
    Default: 'cron(0 12 * * ? *)'
    Description: CRON expression for AWS Backup schedule.

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId1
      SecurityGroups: 
        - !Ref MountTargetSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref SubnetId2
      SecurityGroups: 
        - !Ref MountTargetSecurityGroup

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  CloudWatchAlarmIOUtilization:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for EFS IO Utilization
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions: []

  CloudWatchAlarmBurstCredits:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for EFS Burst Credits
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions: []

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: EFSBackupVault

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: EFSBackupPlan
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30
            RecoveryPointTags:
              Application: EFS

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFSBackupSelection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - efs:DescribeFileSystems
                  - efs:DescribeMountTargets
                  - efs:DescribeTags
                Resource: '*'

Outputs:
  FileSystemId:
    Description: The ID of the EFS file system
    Value: !Ref EFSFileSystem

  BackupVaultName:
    Description: The name of the backup vault
    Value: !Ref BackupVault

  CloudWatchAlarmIOUtilizationArn:
    Description: The ARN of the CloudWatch Alarm for IO Utilization
    Value: !GetAtt CloudWatchAlarmIOUtilization.Arn

  CloudWatchAlarmBurstCreditsArn:
    Description: The ARN of the CloudWatch Alarm for Burst Credits
    Value: !GetAtt CloudWatchAlarmBurstCredits.Arn