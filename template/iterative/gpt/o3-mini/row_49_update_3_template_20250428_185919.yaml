AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS CloudFormation Template that creates an Amazon ECS Cluster configured for AWS Fargate,
  along with a VPC, two public subnets, an Internet Gateway, route table, and necessary associations.

Resources:
  VPCCustom:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CFN-VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCCustom
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: 
        !Select 
          - 0
          - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: CFN-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCCustom
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: 
        !Select 
          - 1
          - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: CFN-PublicSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: CFN-InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPCCustom
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCCustom
      Tags:
        - Key: Name
          Value: CFN-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: CFN-ECS-Fargate-Cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT

Outputs:
  VPCId:
    Description: "The ID of the created VPC"
    Value: !Ref VPCCustom
  PublicSubnet1Id:
    Description: "The ID of the first public subnet"
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: "The ID of the second public subnet"
    Value: !Ref PublicSubnet2
  ECSClusterName:
    Description: "The name of the ECS Cluster"
    Value: !Ref ECSCluster