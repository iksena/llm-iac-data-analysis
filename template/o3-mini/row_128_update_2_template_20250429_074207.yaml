AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template for deploying a Lambda function that manages AWS Security Hub controls.
  It selectively disables CIS 1.4 controls for the CIS Benchmarks standard based on the DisableCIS140Controls parameter.
  The template includes an IAM role with an optional permissions boundary and a CloudWatch Logs log group with a retention policy.

Parameters:
  DisableCIS140Controls:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: "Set to 'true' to disable CIS 1.4 controls in Security Hub; otherwise set to 'false'."
    
  PermissionsBoundary:
    Type: String
    Default: ""
    Description: "ARN of the permissions boundary for the IAM role. Leave empty if not used."

Conditions:
  UsePermissionsBoundary: !Not [ !Equals [ !Ref PermissionsBoundary, "" ] ]

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubControlManagerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:DescribeStandards
                  - securityhub:DescribeStandardsControls
                  - securityhub:UpdateStandardsControl
                Resource: "*"
      PermissionsBoundary: !If [ UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref "AWS::NoValue" ]

  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubControlManagerFunction
      Runtime: python3.8
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import os
          import boto3
          import json

          def lambda_handler(event, context):
              disable_cis = os.environ.get('DISABLE_CIS140_CONTROLS', 'false').lower() == 'true'
              client = boto3.client('securityhub')
              response_results = []

              # Retrieve available standards
              standards = client.describe_standards().get('Standards', [])

              for std in standards:
                  standard_name = std.get('Name', '')
                  standards_arn = std.get('StandardsArn')
                  # Process CIS Benchmark standards
                  if 'CIS' in standard_name and disable_cis:
                      controls = client.describe_standards_controls(StandardsArn=standards_arn).get('Controls', [])
                      for control in controls:
                          if '1.4' in control.get('ControlId', ''):
                              client.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='DISABLED'
                              )
                              response_results.append({
                                  'ControlId': control.get('ControlId'),
                                  'Status': 'DISABLED'
                              })
                  # Ensure AWS Foundational controls remain enabled
                  elif 'AWS Foundational' in standard_name:
                      controls = client.describe_standards_controls(StandardsArn=standards_arn).get('Controls', [])
                      for control in controls:
                          client.update_standards_control(
                              StandardsControlArn=control['StandardsControlArn'],
                              ControlStatus='ENABLED'
                          )
                          response_results.append({
                              'ControlId': control.get('ControlId'),
                              'Status': 'ENABLED'
                          })
              return {
                  'statusCode': 200,
                  'body': json.dumps(response_results)
              }
      Environment:
        Variables:
          DISABLE_CIS140_CONTROLS: !Ref DisableCIS140Controls

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SecurityHubControlManagerFunction}"
      RetentionInDays: 14

Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Security Hub Control Manager Lambda function"
    Value: !GetAtt SecurityHubControlManagerFunction.Arn
  LambdaExecutionRoleArn:
    Description: "ARN of the Lambda execution role"
    Value: !GetAtt LambdaExecutionRole.Arn