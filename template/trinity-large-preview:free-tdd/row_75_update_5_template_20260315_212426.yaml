AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Windows EC2 instance with CPU stress testing capabilities

Parameters:
  AMIId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
  SubnetId:
    Type: String
    Default: ''

Resources:
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSFISFullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: EC2Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:RebootInstances
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !If [UseDefaultSubnet, !Ref 'AWS::NoValue', !Ref SubnetId]
      UserData:
        Fn::Base64: |
          <powershell>
          # Enable SSM Agent
          Start-Process -FilePath "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/windows_amd64/AmazonSSMAgentSetup.exe" -ArgumentList "/install" -Wait
          </powershell>
      Tags:
        - Key: Name
          Value: WindowsCPUStressTest

  CPUMaxStressDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '1.0'
        description: PowerShell script to stress CPU by spawning threads equal to logical processors
        parameters:
          duration:
            type: String
            description: Duration in seconds for CPU stress
            default: '60'
        mainSteps:
          - action: 'aws:runPowerShellScript'
            name: 'stressCPU'
            inputs:
              runCommand:
                - '$duration = "{duration}"'
                - '$logicalProcessors = [int](Get-WmiObject -Class Win32_Processor | Measure-Object -Property NumberOfLogicalProcessors -Sum | Select-Object -ExpandProperty Sum)'
                - 'Write-Host "Starting CPU stress with $logicalProcessors threads for $duration seconds"'
                - '1..$logicalProcessors | ForEach-Object { Start-Job -ScriptBlock { $stopwatch = [System.Diagnostics.Stopwatch]::StartNew(); while ($stopwatch.Elapsed.TotalSeconds -lt $duration) { $result = 1; 1..1000000 | ForEach-Object { $result *= $_ } } } }'
                - 'Write-Host "CPU stress completed"'

Conditions:
  UseDefaultSubnet: !Equals [!Ref SubnetId, '']

Outputs:
  InstanceId:
    Description: Instance ID of the Windows EC2 instance
    Value: !Ref WindowsInstance
  CPUMaxStressDocumentName:
    Description: Name of the SSM document for CPU stress testing
    Value: !Ref CPUMaxStressDocument