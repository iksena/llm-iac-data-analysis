AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a secure REST API Gateway integrated with DynamoDB for music data management

Parameters:
  ApiGatewayStageName:
    Type: String
    Default: prod
    Description: The name of the API Gateway stage

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: MusicAPI
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
        AllowHeaders:
          - Content-Type
          - Authorization
      DisableExecuteApiEndpoint: false

  ApiGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: !Ref ApiGatewayStageName
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/api-gateway/${ApiGateway}
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context.httpMethod $context.routeKey $context.protocol" $context.status $context.responseLength $context.requestId

  PostMusicRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: POST /music
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiGatewayAuthorizer
      Target: !Sub integrations/${PostMusicIntegration}

  GetMusicByArtistRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /music/{artist}
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiGatewayAuthorizer
      Target: !Sub integrations/${GetMusicByArtistIntegration}

  PostMusicIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:dynamodb:action/PutItem
      CredentialsArn: !GetAtt ApiGatewayRole.Arn
      RequestParameters:
        integration.request.header.Content-Type: "'application/x-amz-json-1.0'"
      RequestTemplates:
        application/json: |
          {
            "TableName": "Music",
            "Item": {
              "Artist": {
                "S": "$input.path('$.artist')"
              },
              "Album": {
                "S": "$input.path('$.album')"
              }
            }
          }
      PayloadFormatVersion: '2.0'

  GetMusicByArtistIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:dynamodb:action/Query
      CredentialsArn: !GetAtt ApiGatewayRole.Arn
      RequestParameters:
        integration.request.header.Content-Type: "'application/x-amz-json-1.0'"
      RequestTemplates:
        application/json: |
          {
            "TableName": "Music",
            "IndexName": "Artist-Index",
            "KeyConditionExpression": "Artist = :artist",
            "ExpressionAttributeValues": {
              ":artist": {
                "S": "$input.params('artist')"
              }
            }
          }
      PayloadFormatVersion: '2.0'

  ApiGatewayAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref ApiGateway
      AuthorizerType: REQUEST
      AuthorizerPayloadFormatVersion: '2.0'
      IdentitySource: ['$request.header.Authorization']
      Name: ApiKeyAuthorizer
      AuthorizerUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:ApiKeyValidator/invocations

  ApiKey:
    Type: AWS::ApiGatewayV2::ApiKey
    Properties:
      Description: API Key for Music API
      Enabled: true
      StageKeys:
        - ApiId: !Ref ApiGateway
          StageName: !Ref ApiGatewayStageName

  UsagePlan:
    Type: AWS::ApiGatewayV2::UsagePlan
    Properties:
      Name: MusicAPIUsagePlan
      ApiStages:
        - ApiId: !Ref ApiGateway
          Stage: !Ref ApiGatewayStage
      Throttle:
        RateLimit: 100
        BurstLimit: 200

  UsagePlanKey:
    Type: AWS::ApiGatewayV2::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  ApiKeyValidatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt ApiKeyValidatorRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const apiKey = event.headers['authorization'];
            // Validate API key logic here
            if (apiKey === 'valid-api-key') {
              return {
                isAuthorized: true
              };
            } else {
              return {
                isAuthorized: false,
                context: {
                  errorMessage: 'Invalid API key'
                }
              };
            }
          };

  ApiKeyValidatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

Outputs:
  ApiEndpoint:
    Description: The API Gateway endpoint URL
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  ApiKey:
    Description: The API Key for accessing the API
    Value: !Ref ApiKey