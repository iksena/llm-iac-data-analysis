AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Security Hub with default standards and consolidated control findings enabled

Resources:
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      AutoEnableControls: true

  CISAWSFoundations:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:us-east-1::standards/cis-aws-foundations-benchmark/v/1.2.0
      StandardsInput:
        EnableDefault: true

  AWSFoundationalSecurityBestPractices:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:us-east-1::standards/aws-foundational-security-best-practices/v/1.0.0
      StandardsInput:
        EnableDefault: true

Outputs:
  SecurityHubId:
    Description: ID of the Security Hub
    Value: !Ref SecurityHub