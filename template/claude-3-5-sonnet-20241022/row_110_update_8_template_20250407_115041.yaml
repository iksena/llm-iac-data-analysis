AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-account private API Gateway with Lambda integration and VPC endpoint access'

Parameters:
  VpcEndpointId:
    Type: String
    Description: ID of the VPC Endpoint for API Gateway access
    Default: vpce-0123456789abcdef0
  
  CustomDomainName:
    Type: String
    Description: Custom domain name for the API
    Default: api.example.com
    
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID
    Default: Z0123456789ABCDEFGHIJ
    
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for the custom domain
    Default: arn:aws:acm:region:account:certificate/12345678-1234-1234-1234-123456789012
    
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: 'prod'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: "/"
      
  LambdaInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - lambda:InvokeFunction
            Resource: !GetAtt LambdaFunction.Arn
      Roles:
        - !Ref ApiGatewayRole
      
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Hello from Lambda!' })
            };
          }
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 128
      
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Path: "/"

  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-private-api
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/*/*
            Condition:
              StringEquals:
                aws:SourceVpce: !Ref VpcEndpointId

  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*/*
                
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PrivateApi
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: 'api'
      
  ApiMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: 
      - ApiGatewayLambdaPermission
      - LambdaInvokePolicy
    Properties:
      RestApiId: !Ref PrivateApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
        Credentials: !GetAtt ApiGatewayRole.Arn
        
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref PrivateApi
      Description: 'Production deployment'
        
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref PrivateApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      
  CustomDomainNameResource:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2
          
  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ApiStage
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref PrivateApi
      Stage: !Ref StageName
      
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomainNameResource.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomainNameResource.RegionalHostedZoneId

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${CustomDomainName}/api
    
  LambdaArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
    
  ApiId:
    Description: API Gateway ID
    Value: !Ref PrivateApi