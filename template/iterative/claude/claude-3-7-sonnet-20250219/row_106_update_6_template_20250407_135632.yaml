AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with event-driven notifications to an SNS topic'

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    Default: s3-event-notification-bucket
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    ConstraintDescription: Bucket name must be between 3 and 63 characters, start and end with a lowercase letter or number, and can contain lowercase letters, numbers, dots, and hyphens.

  TopicName:
    Type: String
    Description: Name of the SNS topic to create
    Default: s3-event-notifications
    AllowedPattern: '^[a-zA-Z0-9_-]{1,256}$'
    ConstraintDescription: Topic name must be between 1 and 256 characters and can contain letters, numbers, hyphens, and underscores.

  NotificationPrefix:
    Type: String
    Description: Optional prefix filter for S3 notifications (e.g., 'uploads/'). Leave empty for all objects.
    Default: ''

Conditions:
  HasPrefix: !Not [!Equals [!Ref NotificationPrefix, '']]

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName
      KmsMasterKeyId: alias/aws/sns

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: S3EventNotificationPolicy
        Statement:
          - Sid: AllowS3EventNotifications
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${BucketName}'

  S3Bucket:
    Type: AWS::S3::Bucket
    DependsOn: SNSTopicPolicy
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      NotificationConfiguration: 
        TopicConfigurations:
          - !If
            - HasPrefix
            - Topic: !Ref SNSTopic
              Event: s3:ObjectCreated:*
              Filter:
                S3Key:
                  Rules:
                    - Name: prefix
                      Value: !Ref NotificationPrefix
            - Topic: !Ref SNSTopic
              Event: s3:ObjectCreated:*

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn

  TopicName:
    Description: Name of the SNS topic
    Value: !GetAtt SNSTopic.TopicName

  TopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic