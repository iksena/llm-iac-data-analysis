AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyStack/Config/ThisIsAB
      Type: String
      Value: This is A/B

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /MyStack/Secrets/MySecret
      GenerateSecretString:
        ExcludeCharacters: '"@/\'
        GenerateStringKey: password
        PasswordLength: 32
        SecretStringTemplate: '{"username": "myuser"}'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaExecutionPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParametersByPath
            Resource: '*'
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: '*'
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def handler(event, context):
              # Get SSM parameter
              ssm_param = ssm_client.get_parameter(Name='/MyStack/Config/ThisIsAB')
              ssm_value = ssm_param['Parameter']['Value']

              # Get Secrets Manager secret
              secret = secrets_client.get_secret_value(SecretId='/MyStack/Secrets/MySecret')
              secret_value = json.loads(secret['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_value': ssm_value,
                      'secret': secret_value
                  })
              }