AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with multiple EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet ID where the ENI will be created'
  
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: 'Security Group ID for the ENI'
  
  PrimaryPrivateIP:
    Type: String
    Description: 'Primary private IP address for the ENI'
    Default: '10.0.1.10'
  
  SecondaryPrivateIP:
    Type: String
    Description: 'Secondary private IP address for the ENI'
    Default: '10.0.1.11'

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: 'Network Interface with multiple IPs'
      GroupSet: 
        - !Ref SecurityGroupId
      PrivateIpAddresses:
        - Primary: true
          PrivateIpAddress: !Ref PrimaryPrivateIP
        - Primary: false
          PrivateIpAddress: !Ref SecondaryPrivateIP
      Tags:
        - Key: Name
          Value: Multi-IP ENI

  FirstEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Primary-EIP

  SecondEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Secondary-EIP

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrimaryPrivateIP

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIP

Outputs:
  NetworkInterfaceId:
    Description: 'ID of the created Network Interface'
    Value: !Ref NetworkInterface

  PrimaryPrivateIPAddress:
    Description: 'Primary Private IP of the ENI'
    Value: !Ref PrimaryPrivateIP

  SecondaryPrivateIPAddress:
    Description: 'Secondary Private IP of the ENI'
    Value: !Ref SecondaryPrivateIP

  FirstPublicIP:
    Description: 'First Elastic IP Address'
    Value: !Ref FirstEIP

  SecondPublicIP:
    Description: 'Second Elastic IP Address'
    Value: !Ref SecondEIP