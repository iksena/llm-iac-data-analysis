AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure S3 Bucket with KMS encryption and lifecycle management'

Parameters:
  BucketName:
    Description: 'Name of the S3 bucket (leave blank for auto-generated name)'
    Type: String
    Default: ''
    AllowedPattern: '^$|^[a-z0-9-.]{3,63}$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters and can contain only lowercase letters, numbers, hyphens, and periods'
  
  RetentionDays:
    Description: 'Number of days after which objects transition to another storage class'
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
  
  StorageClass:
    Description: 'Target storage class for lifecycle transition'
    Type: String
    Default: STANDARD_IA
    AllowedValues:
      - STANDARD_IA
      - ONEZONE_IA
      - INTELLIGENT_TIERING
      - GLACIER
      - DEEP_ARCHIVE
  
  EnvironmentTag:
    Description: 'Environment tag value for the bucket'
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: !Sub 'KMS key for encrypting ${BucketName} S3 bucket objects'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-s3-encryption
        Statement:
          - Sid: AllowRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowS3Use
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
                aws:SourceArn: !Sub 'arn:aws:s3:::${BucketName}'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/s3/${BucketName}-key'
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt KMSKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: TransitionRule
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref RetentionDays
                StorageClass: !Ref StorageClass
            NoncurrentVersionTransitions:
              - TransitionInDays: !Ref RetentionDays
                StorageClass: !Ref StorageClass
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !If [HasBucketName, !Ref BucketName, !Sub '${AWS::StackName}-bucket']
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: ManagedBy
          Value: CloudFormation

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !If [HasBucketName, !Ref BucketName, !Ref S3Bucket]
  
  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn
  
  KMSKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !GetAtt KMSKey.Arn
  
  KMSKeyAliasName:
    Description: 'Alias of the KMS key'
    Value: !Ref KMSKeyAlias