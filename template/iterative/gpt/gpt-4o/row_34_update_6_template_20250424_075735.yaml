AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a MySQL RDS instance with Provisioned IOPS in a dedicated VPC.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  Subnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the first subnet
  Subnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the second subnet
  DBInstanceIdentifier:
    Type: String
    Default: mydbinstance
    Description: The DB instance identifier
  DBName:
    Type: String
    Default: mydatabase
    Description: The name of the database
  MasterUsername:
    Type: String
    Default: admin
    Description: The master username for the database

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref Subnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Subnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref Subnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Subnet2

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL access within VPC
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VpcCidr

  MyDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  MyRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Ref DBInstanceIdentifier
      AllocatedStorage: 100
      DBInstanceClass: db.r5.large
      Engine: mysql
      EngineVersion: '8.0.40'
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:ssm-secure:/myapp/dbpassword:1}}'
      DBName: !Ref DBName
      StorageType: io1
      Iops: 1000
      VPCSecurityGroups:
        - !Ref MySecurityGroup
      DBSubnetGroupName: !Ref MyDBSubnetGroup
      MultiAZ: true
      BackupRetentionPeriod: 7

Outputs:
  RDSInstanceEndpoint:
    Description: The endpoint of the RDS instance
    Value: !GetAtt MyRDSInstance.Endpoint.Address
  VPCId:
    Description: The VPC ID
    Value: !Ref MyVPC
  Subnet1Id:
    Description: The ID of the first subnet
    Value: !Ref Subnet1
  Subnet2Id:
    Description: The ID of the second subnet
    Value: !Ref Subnet2
  SecurityGroupId:
    Description: The ID of the security group
    Value: !Ref MySecurityGroup