AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
  RepositoryUrl:
    Type: String
    Default: https://github.com/aws-samples/aws-amplify-todo-sample
  AccessToken:
    Type: String
    NoEcho: true
    Description: "Required GitHub personal access token for repository connection"
    AllowedPattern: ".*\\S.*"
    ConstraintDescription: "Access token must not be empty"
  BranchName:
    Type: String
    Default: production

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      AccessToken: !Ref AccessToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: dist
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: !Ref BranchName
      Stage: PRODUCTION
      EnableAutoBuild: true
      EnablePerformanceMode: true

Outputs:
  AmplifyAppId:
    Value: !Ref AmplifyApp
  ProductionBranchURL:
    Value: !Sub "${BranchName}.${AmplifyApp.DefaultDomain}"