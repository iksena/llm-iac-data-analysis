AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create networking resources including a VPC, a Subnet,
  a single Elastic Network Interface (ENI) configured with one primary and two secondary
  private IP addresses, and two Elastic IPs that are associated with the secondary private IPs.
  
Parameters:
  PrimaryPrivateIp:
    Type: String
    Description: The primary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.1.10
  PrivateIp1:
    Type: String
    Description: The first secondary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.1.11
  PrivateIp2:
    Type: String
    Description: The second secondary private IP address for the ENI. Must be within the Subnet's CIDR block.
    Default: 10.0.1.12

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MultiIP-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: MultiIP-Subnet

  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Description: "ENI with one primary and two secondary private IP addresses"
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref PrimaryPrivateIp
          Primary: true
        - PrivateIpAddress: !Ref PrivateIp1
          Primary: false
        - PrivateIpAddress: !Ref PrivateIp2
          Primary: false
      Tags:
        - Key: Name
          Value: MultiIP-ENI

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP1, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp1

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP2, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp2

Outputs:
  VpcId:
    Description: "The ID of the created VPC."
    Value: !Ref VPC
  SubnetId:
    Description: "The ID of the created Subnet."
    Value: !Ref Subnet
  NetworkInterfaceId:
    Description: "The ID of the created Elastic Network Interface."
    Value: !Ref NetworkInterface
  SecondaryElasticIP1:
    Description: "The public Elastic IP associated with the first secondary private IP."
    Value: !GetAtt [ElasticIP1, PublicIp]
  SecondaryElasticIP2:
    Description: "The public Elastic IP associated with the second secondary private IP."
    Value: !GetAtt [ElasticIP2, PublicIp]