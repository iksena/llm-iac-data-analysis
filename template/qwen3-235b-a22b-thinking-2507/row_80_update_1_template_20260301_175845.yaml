AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an IAM role for Amazon Bedrock agent execution with necessary permissions
Parameters:
  RoleName:
    Type: String
    Default: BedrockAgentExecutionRole
    Description: Name of the IAM role for Bedrock agent execution
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[\w+=,.@-]+'
    ConstraintDescription: Alphanumeric characters and +=,.@- symbols only
Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - bedrock:GetAgent
                  - bedrock:InvokeAgent
                  - bedrock:PrepareAgent
                Resource: arn:aws:bedrock:*:*:agent/*
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: arn:aws:lambda:*:*:function/*
Outputs:
  RoleName:
    Description: Name of the created IAM role
    Value: !Ref BedrockAgentRole
  RoleArn:
    Description: ARN of the created IAM role
    Value: !GetAtt BedrockAgentRole.Arn