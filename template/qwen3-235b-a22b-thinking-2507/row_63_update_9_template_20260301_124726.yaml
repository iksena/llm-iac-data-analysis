AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  MasterUsername:
    Type: String
    Description: Master database username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must start with a letter and contain only alphanumeric characters (1-16 characters)
  SubnetIds:
    Type: CommaDelimitedList
    Description: Two public subnet IDs for the DB instances (across different AZs)
  VPCId:
    Type: String
    Description: VPC ID for database deployment
  AllowedCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block allowed to access the database
    AllowedPattern: '^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}/[0-9]{1,2}$'
    ConstraintDescription: Must be a valid CIDR range in x.x.x.x/y format
  DBInstanceClass:
    Type: String
    Default: 'db.t3.large'
    Description: Database instance type
    AllowedValues:
      - 'db.t3.large'
  EngineVersion:
    Type: String
    Default: '5.7.mysql_aurora.2.10.2'
    Description: Aurora MySQL engine version
  DBName:
    Type: String
    Default: ''
    Description: Optional database name to create

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora MySQL cluster
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL cluster
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref AllowedCIDR

  DBCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  DBMasterUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}-master-password'
      Description: Master password for Aurora cluster
      GenerateSecretString:
        PasswordLength: 30
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${AWS::StackName}-master-password:SecretString:password}}'
      DBClusterIdentifier: !Sub '${AWS::StackName}-cluster'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      Port: 3306
      DatabaseName: !Ref DBName
      EngineVersion: !Ref EngineVersion
      EnableCloudwatchLogsExports:
        - error
      BackupRetentionPeriod: 7
      AssociatedRoles:
        - RoleArn: !GetAtt DBCloudWatchLogsRole.Arn
          FeatureName: cloudwatch-logs
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    DependsOn: DBMasterUserSecret

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance1'

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${AWS::StackName}-instance2'

Outputs:
  ClusterEndpoint:
    Description: DNS address of the cluster writer endpoint
    Value: !GetAtt DBCluster.Endpoint.Address
  ClusterPort:
    Description: Port for cluster connections
    Value: !GetAtt DBCluster.Endpoint.Port
  ClusterReadEndpoint:
    Description: DNS address of the cluster reader endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  ClusterIdentifier:
    Description: Database cluster identifier
    Value: !Ref DBCluster
  MasterUserSecretArn:
    Description: ARN of the secret containing the master password
    Value: !Ref DBMasterUserSecret