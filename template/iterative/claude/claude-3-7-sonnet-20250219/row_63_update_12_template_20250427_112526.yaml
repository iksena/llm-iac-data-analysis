AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues:
      - db.t3.large
      - db.r5.large
      - db.r5.xlarge
      - db.r5.2xlarge
    Description: Database instance class

  DBName:
    Type: String
    Default: mydb
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  MasterUsername:
    Type: String
    Default: admin
    Description: Username for the master DB user
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  BackupRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: The number of days to retain automated backups

  PreferredBackupWindow:
    Type: String
    Default: 02:00-03:00
    Description: The daily time range during which automated backups are created

  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
    Description: The weekly time range during which system maintenance can occur

Resources:
  # VPC and Networking Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Aurora-MySQL-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Aurora-MySQL-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Aurora-MySQL-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Aurora-MySQL-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Aurora-MySQL-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # Database Resources
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora MySQL cluster
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: Aurora-MySQL-SubnetGroup

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Cluster parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
      Tags:
        - Key: Name
          Value: Aurora-MySQL-ClusterParamGroup

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL instances
      Family: aurora-mysql5.7
      Parameters:
        max_connections: '1000'
      Tags:
        - Key: Name
          Value: Aurora-MySQL-InstanceParamGroup

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL cluster
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Aurora-MySQL-SecurityGroup

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Secret for Aurora MySQL database
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${MasterUsername}"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Join ['', ['{{resolve:secretsmanager:', !Ref DBSecret, ':SecretString:password}}']]
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Cluster

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: aurora-instance-1
      DBInstanceClass: !Ref DBInstanceClass
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !GetAtt PublicSubnet1.AvailabilityZone
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Instance-1

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: aurora-instance-2
      DBInstanceClass: !Ref DBInstanceClass
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !GetAtt PublicSubnet2.AvailabilityZone
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Instance-2

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !Ref VPC

  PublicSubnet1:
    Description: The ID of the first public subnet
    Value: !Ref PublicSubnet1

  PublicSubnet2:
    Description: The ID of the second public subnet
    Value: !Ref PublicSubnet2

  ClusterEndpoint:
    Description: The connection endpoint for the Aurora DB cluster
    Value: !GetAtt DBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: The reader endpoint for the Aurora DB cluster
    Value: !GetAtt DBCluster.ReadEndpoint.Address

  DBInstance1Endpoint:
    Description: The connection endpoint for the first DB instance
    Value: !GetAtt DBInstance1.Endpoint.Address

  DBInstance2Endpoint:
    Description: The connection endpoint for the second DB instance
    Value: !GetAtt DBInstance2.Endpoint.Address

  SecretARN:
    Description: The ARN of the secret containing database credentials
    Value: !Ref DBSecret