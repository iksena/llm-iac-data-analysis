AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create AWS Glue resources for crawling CloudTrail logs in S3

Parameters:
  DatabaseName:
    Type: String
    Default: cloudtrail_logs
    Description: Name of the Glue Database to create
  CrawlerName:
    Type: String
    Default: cloudtrail_crawler
    Description: Name of the Glue Crawler to create
  S3TargetPath:
    Type: String
    Default: s3://kk-admin/cloud-trail/AWSLogs/
    Description: S3 path where CloudTrail logs are stored
  TablePrefix:
    Type: String
    Default: cloudtrail_
    Description: Prefix to add to table names created by the crawler

Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref DatabaseName
        Description: Database for CloudTrail logs metadata

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Ref CrawlerName
      Role: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/AWSGlueServiceRole'
      DatabaseName: !Ref DatabaseName
      Targets:
        S3Targets:
          - Path: !Ref S3TargetPath
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      Configuration: '{"Version":1.0,"CrawlerOutput":{"Partitions":{"AddOrUpdateBehavior":"InheritFromTable"},"Tables":{"AddOrUpdateBehavior":"MergeNewColumns"},"Crawlers":{"AddOrUpdateBehavior":"InheritFromTable"}}}'
      TablePrefix: !Ref TablePrefix
      Schedule:
        ScheduleExpression: "cron(0/15 * * * ? *)"
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_NEW_FOLDERS_ONLY

Outputs:
  DatabaseName:
    Description: Name of the created Glue Database
    Value: !Ref DatabaseName
  CrawlerName:
    Description: Name of the created Glue Crawler
    Value: !Ref CrawlerName