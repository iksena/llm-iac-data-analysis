AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MobileNotifications
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: sentTime
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: type-sentTime-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt MobileNotificationsTable.Arn
    Export:
      Name: MobileNotificationsTableArn
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref MobileNotificationsTable
    Export:
      Name: MobileNotificationsTableName