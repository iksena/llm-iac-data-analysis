AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    Default: 'IoTDataQueue'
  TopicName:
    Type: String
    Description: Name of the SNS topic
    Default: 'IoTDataTopic'
  IoTTopic:
    Type: String
    Description: MQTT topic to subscribe to
    Default: 'device/data'

Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName

  IoTDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM '${IoTTopic}'"
        Actions:
          - Sns:
              TopicArn: !GetAtt IoTDataTopic.Arn
              MessageFormat: RAW

Outputs:
  IoTDataQueueURL:
    Description: URL of the IoT Data Queue
    Value: !GetAtt IoTDataQueue.QueueUrl
    Export:
      Name: IoTDataQueueURL

  IoTDataTopicARN:
    Description: ARN of the IoT Data Topic
    Value: !GetAtt IoTDataTopic.Arn
    Export:
      Name: IoTDataTopicARN