AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Windows EC2 instance with SSM integration for CPU stress testing

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type (t3.nano to t3.large)

  AMIId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    Description: AMI ID for Windows Server 2019 (fetched via SSM Parameter Store)

  SubnetId:
    Type: String
    Default: ''
    Description: Subnet ID for the EC2 instance (leave empty to use default VPC)

  CpuStressDuration:
    Type: Number
    Default: 60
    Description: Duration in seconds for CPU stress test

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - fis.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSFISRole
      Policies:
        - PolicyName: FIS-SSM-CloudWatch-Permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: '*'

  CpuStressSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: PowerShell script to simulate CPU stress
        parameters:
          duration:
            type: String
            description: Duration in seconds for CPU stress test
            default: !Ref CpuStressDuration
        mainSteps:
          - action: aws:runPowerShellScript
            name: cpuStressTest
            inputs:
              runCommand:
                - >-
                  $duration = {{ duration }}
                - >-
                  $logicalProcessors = [System.Environment]::ProcessorCount
                - >-
                  Write-Host "Starting CPU stress test with $logicalProcessors threads for $duration seconds"
                - >-
                  $threads = @()
                - >-
                  for ($i = 0; $i -lt $logicalProcessors; $i++) {
                  $thread = [System.Threading.Thread]::new({
                  $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
                  while ($stopwatch.Elapsed.TotalSeconds -lt $duration) {
                  [System.Math]::Sqrt([System.Math]::PI)
                  }
                  })
                  $threads += $thread
                  $thread.Start()
                  }
                - >-
                  Write-Host "Started all threads. Waiting for completion..."
                - >-
                  foreach ($thread in $threads) {
                  $thread.Join()
                  }
                - >-
                  Write-Host "CPU stress test completed"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !If [UseDefaultVPC, !Ref 'AWS::NoValue', !Ref SubnetId]
      UserData:
        Fn::Base64:
          <powershell>
          # Install and configure SSM agent
          Install-WindowsFeature -Name "AmazonSSMAgent"
          Restart-Service AmazonSSMAgent
          </powershell>
      Tags:
        - Key: Name
          Value: Windows-CPU-Stress-Test-Instance

  DefaultVPC:
    Type: AWS::EC2::VPC
    Condition: CreateDefaultVPC
    Properties:
      CidrBlock: 172.31.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Default-VPC-for-CPU-Stress-Test

  DefaultSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateDefaultVPC
    Properties:
      VpcId: !Ref DefaultVPC
      CidrBlock: 172.31.0.0/20
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Default-Subnet-for-CPU-Stress-Test

Conditions:
  UseDefaultVPC: !Equals [!Ref SubnetId, '']
  CreateDefaultVPC: !Equals [!Ref SubnetId, '']

Outputs:
  InstancePublicDnsName:
    Description: Public DNS name of the Windows EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstancePublicIp:
    Description: Public IP address of the Windows EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  CpuStressDocumentName:
    Description: Name of the custom SSM document for CPU stress testing
    Value: !Ref CpuStressSSMDocument
  FISRoleName:
    Description: Name of the IAM role for AWS FIS
    Value: !Ref FISRole