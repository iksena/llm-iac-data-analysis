AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EnableMonitoring:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable CloudWatch monitoring including Container Insights, alarms, and dashboard.
  AlarmEvaluationPeriods:
    Type: Number
    Default: 3
    Description: Number of periods to evaluate for alarms.
  AlarmThresholdCPU:
    Type: Number
    Default: 80
    Description: CPU utilization percentage threshold for alarms.
  AlarmThresholdMemory:
    Type: Number
    Default: 80
    Description: Memory utilization percentage threshold for alarms.
  NotificationEmail:
    Type: String
    Default: ''
    Description: Email for alarm notifications (optional).

Conditions:
  CreateMonitoring: !Equals [!Ref EnableMonitoring, 'true']
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterSettings:
        !If:
        - CreateMonitoring
        - - Name: containerInsights
            Value: enabled
        - !Ref "AWS::NoValue"

  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      TopicName: !Sub '${AWS::StackName}-Alerts'

  AlarmNotificationSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref AlarmNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateMonitoring
    Properties:
      AlarmDescription: ECS Cluster CPU Utilization Alarm
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref AlarmThresholdCPU
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: ignore
      AlarmActions:
        !If [HasNotificationEmail, [!Ref AlarmNotificationTopic], !Ref "AWS::NoValue"]

  MemoryUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: CreateMonitoring
    Properties:
      AlarmDescription: ECS Cluster Memory Utilization Alarm
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSCluster
      Statistic: Average
      Period: 300
      EvaluationPeriods: !Ref AlarmEvaluationPeriods
      Threshold: !Ref AlarmThresholdMemory
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: ignore
      AlarmActions:
        !If [HasNotificationEmail, [!Ref AlarmNotificationTopic], !Ref "AWS::NoValue"]

  ECSServiceDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: CreateMonitoring
    Properties:
      DashboardName: !Sub '${AWS::StackName}-Dashboard'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ECS", "CPUUtilization", "ClusterName", "${ECSCluster}"]
                ],
                "period": 300,
                "region": "${AWS::Region}",
                "title": "CPU Utilization",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ECS", "MemoryUtilization", "ClusterName", "${ECSCluster}"]
                ],
                "period": 300,
                "region": "${AWS::Region}",
                "title": "Memory Utilization",
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
  DashboardName:
    Condition: CreateMonitoring
    Value: !Ref ECSServiceDashboard
  CPUAlarmARN:
    Condition: CreateMonitoring
    Value: !Ref CPUUtilizationAlarm
  MemoryAlarmARN:
    Condition: CreateMonitoring
    Value: !Ref MemoryUtilizationAlarm
  NotificationTopicARN:
    Condition: HasNotificationEmail
    Value: !Ref AlarmNotificationTopic