AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an S3 bucket for Lambda artifacts and a KMS key for encryption.

Parameters:
  BucketName:
    Description: The name of the S3 bucket to create. Ensure this name is globally unique.
    Type: String
    Default: testanus3

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${S3Bucket.Arn}/*'

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting S3 bucket contents
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowServiceRoleAccess
            Effect: Allow
            Principal:
              AWS: !If
                - HasServiceRoleArn
                - !Ref ServiceRoleArn
                - !Ref 'AWS::NoValue'
            Action:
              - 'kms:Encrypt'
              - 'kms:Decrypt'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:DescribeKey'
            Resource: '*'
      EnableKeyRotation: true

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}-kms-key
      TargetKeyId: !Ref KMSKey

Conditions:
  HasServiceRoleArn: !Not [!Equals [!Ref ServiceRoleArn, '']]

Outputs:
  S3BucketName:
    Description: The name of the S3 bucket
    Value: !Ref S3Bucket

  KMSKeyArn:
    Description: The ARN of the KMS key
    Value: !GetAtt KMSKey.Arn

  KMSKeyAliasName:
    Description: The alias of the KMS key
    Value: !Ref KMSKeyAlias

# Fixes:
# 1. Removed the ServiceRoleArn parameter and replaced its usage with AWS::NoValue.
# 2. Added a default value for the BucketName parameter as "testanus3".
# 3. Used a condition to handle the optional ServiceRoleArn logic.