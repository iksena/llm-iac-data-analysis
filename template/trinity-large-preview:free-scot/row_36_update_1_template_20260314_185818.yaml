AWSTemplateFormatVersion: '2010-09-09'
Description: MySQL RDS instance with custom parameter group and secure network isolation

Parameters:
  DBName:
    Type: String
    Default: mydatabase
    Description: The database name
  DBUsername:
    Type: String
    Default: admin
    Description: The database admin username
  DBClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
    Description: The database instance class
  DBAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 5
    MaxValue: 100
    Description: The allocated storage in GB
  VPCName:
    Type: String
    Default: MyVPC
    Description: The name of the VPC
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: The CIDR block for the VPC
  SubnetCIDR1:
    Type: String
    Default: 10.0.1.0/24
    Description: The CIDR block for subnet 1
  SubnetCIDR2:
    Type: String
    Default: 10.0.2.0/24
    Description: The CIDR block for subnet 2

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Ref VPCName

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref SubnetCIDR1
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${VPCName}-Subnet1"

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref SubnetCIDR2
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${VPCName}-Subnet2"

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref MyVPC
      GroupDescription: Security group for RDS instance
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${VPCName}-RDS-SG"

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Ref VPCName
      DBSubnetGroupDescription: Subnets for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: RDSAdminSecret
      Description: Secret for RDS admin credentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'

  MyDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      AllocatedStorage: !Ref DBAllocatedStorage
      DBInstanceClass: !Ref DBClass
      Engine: MySQL
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !GetAtt DBSecret.SecretString
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot
      Tags:
        - Key: Name
          Value: !Sub "${VPCName}-MySQLDB"

  AttachSecretToRDS:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref MyDBInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  DBEndpoint:
    Description: The endpoint of the RDS instance
    Value: !GetAtt MyDBInstance.Endpoint.Address
  DBPort:
    Description: The port of the RDS instance
    Value: !GetAtt MyDBInstance.Endpoint.Port
  SecretARN:
    Description: The ARN of the secret
    Value: !Ref DBSecret