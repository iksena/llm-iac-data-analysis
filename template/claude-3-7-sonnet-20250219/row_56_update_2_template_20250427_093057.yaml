AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication'

Parameters:
  UserPoolName:
    Type: String
    Default: 'SecureUserPool'
    Description: 'Name of the Cognito User Pool'
  
  EmailVerificationSubject:
    Type: String
    Default: 'Verify your email for our application'
    Description: 'Subject line for the email verification message'
  
  EmailVerificationMessage:
    Type: String
    Default: 'Thank you for signing up. Your verification code is {####}'
    Description: 'Content of the email verification message. Must include {####} placeholder for the verification code'
  
  AdminCreateUserOnly:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Set to true to allow only administrators to create user profiles'
  
  PasswordMinimumLength:
    Type: Number
    Default: 12
    MinValue: 8
    MaxValue: 99
    Description: 'Minimum length required for user passwords'
  
  PasswordRequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Require at least one lowercase letter in passwords'
  
  PasswordRequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Require at least one uppercase letter in passwords'
  
  PasswordRequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Require at least one number in passwords'
  
  PasswordRequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Require at least one symbol in passwords'
  
  TemporaryPasswordValidityDays:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 365
    Description: 'Number of days a temporary password is valid'

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: !Ref AdminCreateUserOnly
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireLowercase: !Ref PasswordRequireLowercase
          RequireNumbers: !Ref PasswordRequireNumbers
          RequireSymbols: !Ref PasswordRequireSymbols
          RequireUppercase: !Ref PasswordRequireUppercase
          TemporaryPasswordValidityDays: !Ref TemporaryPasswordValidityDays
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: phone_number
          AttributeDataType: String
          Mutable: true
          Required: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-client'
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      ReadAttributes:
        - email
        - name
        - phone_number
        - email_verified
        - phone_number_verified
      WriteAttributes:
        - name
        - phone_number

Outputs:
  UserPoolId:
    Description: 'ID of the Cognito User Pool'
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'
  
  UserPoolArn:
    Description: 'ARN of the Cognito User Pool'
    Value: !GetAtt CognitoUserPool.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolArn'
  
  UserPoolClientId:
    Description: 'ID of the Cognito User Pool Client'
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'
  
  UserPoolProviderURL:
    Description: 'Provider URL for the Cognito User Pool'
    Value: !GetAtt CognitoUserPool.ProviderURL
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolProviderURL'