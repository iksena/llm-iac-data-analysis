AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IoT data pipeline.
  Routes messages from AWS IoT Core to an SQS Queue via SNS.

Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Allow-SNS-SendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: "sqs:SendMessage"
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref IoTDataTopic

  IoTDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTDataTopic

  IoTDataSNSToSQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt IoTDataQueue.Arn
      Protocol: sqs
      TopicArn: !Ref IoTDataTopic

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IoTRuleSNSTopicRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AllowSNSPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTDataTopic

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataPipelineRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        AwsIotSqlVersion: "2016-03-23"
        RuleDisabled: false
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTRuleRole.Arn

Outputs:
  SQSQueueURL:
    Description: "The URL of the SQS Queue"
    Value: !Ref IoTDataQueue

  SNSTopicARN:
    Description: "The ARN of the SNS Topic"
    Value: !Ref IoTDataTopic

  IoTTopicRuleName:
    Description: "The name of the IoT Topic Rule"
    Value: !Ref IoTTopicRule