AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog with S3 and Lambda permissions

Resources:
  ServiceCatalogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogS3LambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambdaExecute
      Policies:
        - PolicyName: ServiceCatalogProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:CreateProvisionedProduct
                  - servicecatalog:UpdateProvisionedProduct
                  - servicecatalog:TerminateProvisionedProduct
                Resource: '*'
        - PolicyName: IAMManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: '*'
        - PolicyName: LambdaLifecycle
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:InvokeFunction
                  - lambda:GetFunction
                Resource: '*'
        - PolicyName: CloudFormationOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                Resource: '*'
        - PolicyName: SNSIntegration
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Publish
                  - sns:Subscribe
                Resource: '*'
        - PolicyName: S3GranularOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource: '*'
        - PolicyName: LambdaFunctionPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:InvokeFunction
                  - lambda:GetFunction
                Resource: '*'

Outputs:
  ServiceCatalogIAMRoleARN:
    Description: ARN of the Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogIAMRole.Arn