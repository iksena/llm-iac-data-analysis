AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  DashboardName:
    Type: String
    Description: The name of the CloudWatch Dashboard
  LogsGroupName:
    Type: String
    Description: The name of the CloudWatch Logs group
  ADAuthMethod:
    Type: String
    Description: The name of the AD authentication method
  SAMLAuthMethod:
    Type: String
    Description: The name of the SAML authentication method
  MutualAuthMethod:
    Type: String
    Description: The name of the Mutual Auth authentication method
  MixedAuthMethod:
    Type: String
    Description: The name of the Mixed Auth authentication method

Resources:
  ClientVPNCustomMetrics:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LogsGroupName
      FilterPattern: '{ $.eventName == "ClientVpnConnectionEstablished" }'
      MetricTransformations:
        - MetricName: ConnectionDuration
          MetricNamespace: ClientVPN
          MetricValue: !Sub '${$.duration}'
        - MetricName: DataTransferIngress
          MetricNamespace: ClientVPN
          MetricValue: !Sub '${$.dataTransferIngress}'
        - MetricName: DataTransferEgress
          MetricNamespace: ClientVPN
          MetricValue: !Sub '${$.dataTransferEgress}'

  ADAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ADAuthQuery
      QueryString: !Sub |
        fields @timestamp, @message
        | filter @message like /ClientVpnConnectionEstablished/
        | stats count by @message
      LogGroupNames:
        - !Ref LogsGroupName

  SAMLAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: SAMLAuthQuery
      QueryString: !Sub |
        fields @timestamp, @message
        | filter @message like /ClientVpnConnectionEstablished/
        | stats count by @message
      LogGroupNames:
        - !Ref LogsGroupName

  MutualAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MutualAuthQuery
      QueryString: !Sub |
        fields @timestamp, @message
        | filter @message like /ClientVpnConnectionEstablished/
        | stats count by @message
      LogGroupNames:
        - !Ref LogsGroupName

  MixedAuthQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: MixedAuthQuery
      QueryString: !Sub |
        fields @timestamp, @message
        | filter @message like /ClientVpnConnectionEstablished/
        | stats count by @message
      LogGroupNames:
        - !Ref LogsGroupName

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "logs",
              "properties": {
                "view": "logs",
                "query": "fields @timestamp, @message | filter @message like /ClientVpnConnectionEstablished/",
                "region": "${AWS::Region}",
                "title": "Client VPN Connection Events"
              }
            },
            {
              "type": "logs",
              "properties": {
                "view": "logs",
                "query": "fields @timestamp, @message | filter @message like /ClientVpnConnectionEstablished/ | stats count by @message",
                "region": "${AWS::Region}",
                "title": "Client VPN Connection Events by Authentication Method"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: The URL of the created CloudWatch Dashboard
    Value: !GetAtt CloudWatchDashboard.DashboardArn