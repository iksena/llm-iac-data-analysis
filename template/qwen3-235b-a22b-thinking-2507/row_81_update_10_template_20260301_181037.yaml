AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready resource group for tagged EC2 RDS SageMaker and SSM resources'
Parameters:
  ResourceGroupName:
    Type: String
    Default: DefaultResourceGroup
    Description: 'Name of the resource group (1-128 characters)'
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'
    ConstraintDescription: 'Must contain only alphanumeric characters, underscores, periods, and hyphens'
  ResourceGroupTagKey:
    Type: String
    Description: 'Tag key to filter resources'
    MinLength: 1
  ResourceGroupTagValue:
    Type: String
    Description: 'Tag value to filter resources'
    MinLength: 1
Resources:
  ResourceGroup:
    Type: 'AWS::ResourceGroups::Group'
    Properties:
      Name: !Ref ResourceGroupName
      Description: 'Resource group for tagged EC2 RDS SageMaker SSM resources'
      ResourceQuery:
        Type: 'TAG_FILTERS_1_0'
        Query:
          ResourceTypeFilters:
            - 'AWS::EC2::Instance'
            - 'AWS::RDS::DBInstance'
            - 'AWS::SageMaker::Endpoint'
            - 'AWS::SageMaker::Model'
            - 'AWS::SageMaker::NotebookInstance'
            - 'AWS::SSM::ManagedInstance'
          TagFilters:
            - Key: !Ref ResourceGroupTagKey
              Values:
                - !Ref ResourceGroupTagValue
Outputs:
  ResourceGroupName:
    Description: 'Name of the created resource group'
    Value: !Ref ResourceGroup
  ResourceGroupArn:
    Description: 'ARN of the resource group'
    Value: !GetAtt ResourceGroup.Arn