AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to create an S3 bucket with an SQS queue for event-driven object upload notifications."

Parameters:
  SQSQueueName:
    Description: "The name of the SQS queue."
    Type: String
    Default: "S3NotificationQueue"

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SQSQueueName

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowS3BucketSendMessage"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "SQS:SendMessage"
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${S3Bucket}"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        QueueConfigurations:
          - Event: "s3:ObjectCreated:*"
            Queue: !GetAtt SQSQueue.Arn

Outputs:
  S3BucketNameOutput:
    Description: "Name of the created S3 bucket."
    Value: !Ref S3Bucket
  SQSQueueURL:
    Description: "URL of the created SQS queue."
    Value: !Ref SQSQueue
  SQSQueueARN:
    Description: "ARN of the created SQS queue."
    Value: !GetAtt SQSQueue.Arn