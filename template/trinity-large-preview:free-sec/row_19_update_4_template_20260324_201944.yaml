AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CustomEventBus
      Description: SQS queue for routing events to external API

  ApiConnection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: ApiConnection
      Description: Secret for API key authentication
      SecretString: '{"X-API-Key": "{{resolve:secretsmanager:MyApiKeySecret}}"}'

  ApiDestination:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ApiDestination
      Description: Lambda function to forward events to external webhook
      Runtime: nodejs20.x
      Handler: index.handler
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = await fetch('https://webhook.site/testtest', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-API-Key': process.env.API_KEY
              },
              body: JSON.stringify(event)
            });
            return response;
          };
      Environment:
        Variables:
          API_KEY: !Sub '{{resolve:secretsmanager:MyApiKeySecret}}'

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref CustomEventBus
  SecretArn:
    Description: ARN of the API connection secret
    Value: !Ref ApiConnection
  FunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ApiDestination.Arn