AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Static Website with S3, CloudFront, and Lambda Custom Resource

Parameters:
  S3BucketName:
    Type: String
    Default: my-static-website-bucket
    Description: Name of the S3 bucket for the static website

Resources:
  # S3 Bucket with Origin Access Control
  StaticWebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda Function for Bucket Initialization
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const s3 = new AWS.S3();
            const bucketName = process.env.BUCKET_NAME;

            if (event.RequestType === 'Create' || event.RequestType === 'Update') {
              await s3.putObject({
                Bucket: bucketName,
                Key: 'index.html',
                Body: '<html><body><h1>Welcome to our static website!</h1></body></html>',
                ContentType: 'text/html'
              }).promise();
            } else if (event.RequestType === 'Delete') {
              const objects = await s3.listObjectsV2({ Bucket: bucketName }).promise();
              if (objects.Contents && objects.Contents.length > 0) {
                await s3.deleteObjects({
                  Bucket: bucketName,
                  Delete: {
                    Objects: objects.Contents.map(obj => ({ Key: obj.Key }))
                  }
                }).promise();
              }
            }

            return {
              PhysicalResourceId: bucketName,
              Data: { message: 'Bucket initialization completed' }
            };
          };
      Environment:
        Variables:
          BUCKET_NAME: !Ref StaticWebsiteBucket
      Role: !GetAtt LambdaExecutionRole.Arn

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${StaticWebsiteBucket}'
                  - !Sub 'arn:aws:s3:::${StaticWebsiteBucket}/*'

  # Custom Resource to Trigger Lambda
  CustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt LambdaFunction.Arn

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt StaticWebsiteBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          CachePolicyId: 658327ea-f89d-4390-9f45-5400d71a971d  # Managed-CachingOptimized
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
        CacheBehaviors:
          - PathPattern: "*.jpg"
            CachePolicyId: 658327ea-f89d-4390-9f45-5400d71a971d  # Managed-CachingOptimized
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  # Outputs section for CloudFront Distribution URL
  Outputs:
    CloudFrontDistributionUrl:
      Description: URL of the CloudFront distribution
      Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E0000  # Ignore missing Description for resources