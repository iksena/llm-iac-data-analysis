AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB table with Local and Global Secondary Indexes'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: MyDynamoDBTable
  ReadCapacityUnits:
    Type: Number
    Description: Read Capacity Units for the table
    Default: 5
    MinValue: 1
  WriteCapacityUnits:
    Type: Number
    Description: Write Capacity Units for the table
    Default: 5
    MinValue: 1

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      LocalSecondaryIndexes:
        - IndexName: LSI1
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable