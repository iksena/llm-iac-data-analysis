AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 Bucket for ALB Access Logs with encryption and retention policy'

Mappings:
  ELBRegionalAccounts:
    us-east-1:
      AccountId: '127311923021'
    us-east-2:
      AccountId: '033677994240'
    us-west-1:
      AccountId: '027434742980'
    us-west-2:
      AccountId: '797873946194'
    eu-west-1:
      AccountId: '156460612806'

Resources:
  ALBAccessLogsBucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  ALBAccessLogsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref 'ALBAccessLogsBucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBAccountWrite
            Effect: Allow
            Principal:
              AWS: !Sub 
                - 'arn:aws:iam::${AccountId}:root'
                - AccountId: !FindInMap [ELBRegionalAccounts, !Ref 'AWS::Region', AccountId]
            Action: 's3:PutObject'
            Resource: !Sub '${ALBAccessLogsBucket.Arn}/*'
          - Sid: AllowLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action: 's3:PutObject'
            Resource: !Sub '${ALBAccessLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
                'aws:SourceAccount': !Ref 'AWS::AccountId'

Outputs:
  BucketName:
    Description: 'Name of the ALB access logs bucket'
    Value: !Ref 'ALBAccessLogsBucket'
  BucketArn:
    Description: 'ARN of the ALB access logs bucket'
    Value: !GetAtt 'ALBAccessLogsBucket.Arn'