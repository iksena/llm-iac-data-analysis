AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: '111111111111'
    Description: AWS Account ID for Identity Management Account
  TrustedToolingManagementAccount:
    Type: String
    Default: '222222222222'
    Description: AWS Account ID for Tooling Management Account

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdmin
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MFAProtection
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Condition:
                  Bool:
                    aws:MultiFactorAuthPresent: true

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdmin
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: sts:AssumeRole

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdmin
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DenySensitiveOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - aws-portal:*
                  - cloudhsm:*
                Resource: '*'

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - cloudformation:CreateStackSet
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StackSetPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - cloudformation:CreateStackSet
                Resource: '*'

Outputs:
  PrivilegedAdminRoleArn:
    Description: ARN of the PrivilegedAdmin role
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of the RestrictedAdmin role
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of the IdentityAdmin role
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormationExecutionRole
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of the StackSetExecutionRole
    Value: !GetAtt StackSetExecutionRole.Arn