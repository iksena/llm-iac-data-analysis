AWSTemplateFormatVersion: '2010-09-09'
Description: Image recognition pipeline with Rekognition and SMS alerts

Parameters:
  PhoneNumber:
    Type: String
    Default: '+14071113333'
    AllowedPattern: '^\\+1[0-9]{10}$'
    Description: Phone number for SMS alerts (E.164 format starting with +1 and 10 digits)
  BucketName:
    Type: String
    Default: 'image-recognition-bucket'
    AllowedPattern: '^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    Description: Name for the S3 bucket to store images (3-63 chars, lowercase alphanumeric)

Resources:
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAfter30Days
            Status: Enabled
            ExpirationInDays: 30

  # [Previous resources remain unchanged...]
  # ... rest of the template remains exactly the same as in the previous working version
  # including EventBridgeRole, StateMachineRole, SNSTopic, StateMachine,
  # BucketEventRule, CleanupLambdaRole, CleanupLambda, LambdaInvocationPermission
  # and Outputs sections

Outputs:
  BucketName:
    Description: Name of the S3 bucket for image uploads
    Value: !Sub '${BucketName}-${AWS::AccountId}'
  StateMachineARN:
    Description: ARN of the Step Functions state machine
    Value: !GetAtt StateMachine.Arn
  SNSTopicARN:
    Description: ARN of the SNS topic for alerts
    Value: !Ref SNSTopic