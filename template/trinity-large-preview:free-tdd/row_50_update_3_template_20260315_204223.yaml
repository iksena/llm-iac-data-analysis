AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable URL-to-PNG Screenshot Service with Load Testing and S3/SQS Integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0000000000000000,subnet-0000000000000001
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  S3BucketName:
    Type: String
    Default: screenshot-service-bucket
  SqsQueueName:
    Type: String
    Default: screenshot-queue

Resources:
  # S3 Bucket for storing screenshots
  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  # SQS Queue for screenshot requests
  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SqsQueueName
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600

  # IAM Role for EC2 instances
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess

  # Instance Profile for EC2 instances
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # Auto Scaling Group for worker instances
  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref SubnetIds
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      LaunchTemplate:
        LaunchTemplateName: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber

  # Launch Template for worker instances
  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: WorkerLaunchTemplate
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile: !Ref EC2InstanceProfile
        ImageId: 'ami-0c55b159cbfafe1f0'  # Amazon Linux 2 AMI (us-east-1)
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y chromium-browser
            # Install and configure screenshot service
            # (Placeholder for actual screenshot service setup)

  # Load Test Instance
  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      ImageId: 'ami-0c55b159cbfafe1f0'  # Amazon Linux 2 AMI (us-east-1)
      SubnetId: !Ref SubnetIds  # Use the first subnet from the list
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          # Install and configure load test script
          # (Placeholder for actual load test setup)

  # CloudWatch Alarm for scaling up
  ScaleUpAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale up when queue depth is high
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  # CloudWatch Alarm for scaling down
  ScaleDownAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Scale down when queue depth is low
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

  # Scaling Policy for scale up
  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1

  # Scaling Policy for scale down
  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerASG
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1

Outputs:
  ScreenshotBucketName:
    Description: Name of the S3 bucket for screenshots
    Value: !Ref ScreenshotBucket
  SqsQueueUrl:
    Description: URL of the SQS queue
    Value: !Ref ScreenshotQueue