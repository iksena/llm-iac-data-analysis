AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates a standardized IAM baseline with secure,
  role-based access controls and cross-account trust configurations for AWS account governance.

Parameters:
  ResourcePrefix:
    Description: "Prefix used for IAM resource names to avoid naming collisions."
    Type: String
    Default: "Standard"
  IdentityManagementAccountId:
    Description: "AWS Account ID for Identity Management Account (12-digit numeric ID)"
    Type: String
    Default: "012345678901"
    AllowedPattern: "\d{12}"
    ConstraintDescription: "IdentityManagementAccountId must be a 12-digit AWS account number."
  ToolingManagementAccountId:
    Description: "AWS Account ID for Tooling Management Account (12-digit numeric ID)"
    Type: String
    Default: "098765432109"
    AllowedPattern: "\d{12}"
    ConstraintDescription: "ToolingManagementAccountId must be a 12-digit AWS account number."

Resources:

  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${ResourcePrefix}-PrivilegedAdmin"
      Path: "/"

  PrivilegedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ResourcePrefix}-PrivilegedAdminPolicy"
      Groups:
        - !Ref PrivilegedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "RequireMFAForAllActions"
            Effect: Allow
            Action: "*"
            Resource: "*"
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${ResourcePrefix}-RestrictedAdmin"
      Path: "/"

  RestrictedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ResourcePrefix}-RestrictedAdminPolicy"
      Groups:
        - !Ref RestrictedAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowReadOnlyAccess"
            Effect: Allow
            Action:
              - "ec2:Describe*"
              - "cloudwatch:Describe*"
              - "logs:Describe*"
            Resource: "*"

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${ResourcePrefix}-IdentityAdmin"
      Path: "/"

  IdentityAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ResourcePrefix}-IdentityAdminPolicy"
      Groups:
        - !Ref IdentityAdminGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "IAMAndOrganizationsFullAccessWithMFA"
            Effect: Allow
            Action:
              - "iam:*"
              - "organizations:*"
            Resource: "*"
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"

  CrossAccountGovernanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourcePrefix}-CrossAccountGovernanceRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCrossAccountAssumeRoleWithMFA"
            Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                - !Sub "arn:aws:iam::${ToolingManagementAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"
      Policies:
        - PolicyName: !Sub "${ResourcePrefix}-CrossAccountGovernancePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "ExplicitDenySensitiveOperations"
                Effect: Deny
                Action:
                  - "aws-portal:*"
                  - "cloudhsm:*"
                Resource: "*"
              - Sid: "AllowAllOtherActions"
                Effect: Allow
                Action: "*"
                Resource: "*"

  CFNExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourcePrefix}-CFNExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationAssumeRole"
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ResourcePrefix}-CFNExecutionPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "CFNPermissions"
                Effect: Allow
                Action:
                  - "cloudformation:CreateStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:ValidateTemplate"
                  - "iam:PassRole"
                Resource: "*"

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourcePrefix}-StackSetExecutionRole"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowCloudFormationForStackSet"
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${ResourcePrefix}-StackSetExecutionPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "StackSetPermissions"
                Effect: Allow
                Action:
                  - "cloudformation:CreateStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:DeleteStack"
                  - "iam:PassRole"
                Resource: "*"

Outputs:
  PrivilegedAdminGroupName:
    Description: "Name of the Privileged Admin IAM Group"
    Value: !Ref PrivilegedAdminGroup
  RestrictedAdminGroupName:
    Description: "Name of the Restricted Admin IAM Group"
    Value: !Ref RestrictedAdminGroup
  IdentityAdminGroupName:
    Description: "Name of the Identity Admin IAM Group"
    Value: !Ref IdentityAdminGroup
  CrossAccountGovernanceRoleARN:
    Description: "ARN of the Cross-Account Governance Role"
    Value: !GetAtt CrossAccountGovernanceRole.Arn
  CFNExecutionRoleARN:
    Description: "ARN of the CloudFormation Execution Role"
    Value: !GetAtt CFNExecutionRole.Arn
  StackSetExecutionRoleARN:
    Description: "ARN of the StackSet Execution Role"
    Value: !GetAtt StackSetExecutionRole.Arn