AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus
      EventSourceName: CustomApplicationEvents

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        Name: test_name
        Value: test_value

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeMongoDBAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      InvocationHttpParameters:
        PathParameterList: []
        QueryStringParameterList: []
        HeaderParameterList: []
        BodyParameterList: []

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - CustomApplicationEvents
      Targets:
        - Arn: !GetAtt MongoDBApiDestination.Arn
          Id: MongoDBTarget
          RoleArn: !GetAtt EventBridgeIAMRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

  EventBusPolicy:
    Type: AWS::Events::EventBusPolicy
    Properties:
      Action: events:PutEvents
      Principal: '*'
      EventBusName: !Ref CustomEventBus

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus
  DeadLetterQueueUrl:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue