AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a private Route 53 Hosted Zone for internal DNS management within a VPC. IMPORTANT: You must specify an existing VPC ID when deploying this template.'

Parameters:
  VpcId:
    Type: String
    Description: The VPC to associate with the private hosted zone (required)
  
  DomainName:
    Type: String
    Default: example.com
    Description: The domain name for the private hosted zone (do not include www prefix)

Resources:
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Sub "${DomainName}."
      HostedZoneConfig:
        Comment: Private hosted zone for internal DNS management
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref AWS::Region

  WwwRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Sub "www.${DomainName}."
      Type: CNAME
      TTL: '300'
      ResourceRecords:
        - !Sub "${DomainName}."

Outputs:
  HostedZoneId:
    Description: The ID of the private hosted zone
    Value: !Ref PrivateHostedZone
  
  HostedZoneName:
    Description: The name of the private hosted zone
    Value: !Ref DomainName
  
  WwwDomainName:
    Description: The www subdomain
    Value: !Sub "www.${DomainName}"