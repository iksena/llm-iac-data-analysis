AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': '100'
              }

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess

  BedrockAgent:
    Type: AWS::AmazonBedrock::Agent
    Properties:
      AgentName: StockPriceAgent
      ModelConfiguration:
        ModelId: anthropic.claude-3-sonnet-20240229
      Instructions: >
        You are a stock price lookup assistant. When users ask about stock prices,
        use the getStockPrice action to retrieve the current price for the requested symbol.
      ActionGroups:
        - Name: GetStockPriceAction
          Type: Lambda
          Parameters:
            - Name: symbol
              Type: String
          LambdaConfig:
            FunctionArn: !GetAtt LambdaFunction.Arn

  LambdaPermissions:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaPermissions
      Roles:
        - !Ref LambdaExecutionRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
            Resource: arn:aws:logs:*:*:*

  BedrockAgentPermissions:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: BedrockAgentPermissions
      Roles:
        - !Ref BedrockAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: '*'