AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a VPC and private Route 53 hosted zone for internal DNS management'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: www.example.com
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS resolution'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneId'
  DomainName:
    Description: 'The domain name of the private hosted zone'
    Value: www.example.com
  VpcId:
    Description: 'The VPC ID associated with the private hosted zone'
    Value: !Ref VPC