AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an S3 bucket with flexible access scope (single account or organization-wide)

Parameters:
  BucketName:
    Description: Name of the S3 bucket to create
    Type: String
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: Bucket name must be between 3 and 63 characters and can contain only lowercase letters, numbers, hyphens, and periods

  OrganizationId:
    Description: AWS Organization ID for organization-wide access (leave blank for single account)
    Type: String
    Default: ''

  OrganizationUnitId:
    Description: AWS Organization Unit ID for OU-wide access (leave blank for organization-wide or single account)
    Type: String
    Default: ''

  SingleAccountAccess:
    Description: Set to true to restrict access to current account only
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  IsOrganizationAccess: !And
    - !Not [!Equals [!Ref OrganizationId, '']]
    - !Equals [!Ref SingleAccountAccess, 'false']

  IsOUAccess: !And
    - !Not [!Equals [!Ref OrganizationUnitId, '']]
    - !Equals [!Ref SingleAccountAccess, 'false']
    - !Not [!Equals [!Ref OrganizationId, '']]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsOrganizationAccess
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OrganizationAccess
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                aws:PrincipalOrgID: !Ref OrganizationId

  OUAccessPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsOUAccess
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: OUAccess
            Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}'
              - !Sub 'arn:aws:s3:::${S3Bucket}/*'
            Condition:
              StringLike:
                aws:PrincipalOrgPaths: !Sub '${OrganizationId}/*/${OrganizationUnitId}/*'

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket

  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn