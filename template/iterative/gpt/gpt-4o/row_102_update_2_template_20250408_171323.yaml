AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RiskManagementDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaDynamoDBPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementDynamoDBTable.Arn

  RiskManagementLambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction1
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return "Function 1 executed"
      Runtime: python3.8

  RiskManagementLambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction2
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return "Function 2 executed"
      Runtime: python3.8

  RiskManagementSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskManagementTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskManagementSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskManagementSNSTopic

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref RiskManagementDynamoDBTable

  SNSTopicARN:
    Description: ARN of the SNS Topic
    Value: !Ref RiskManagementSNSTopic

  LambdaFunction1ARN:
    Description: ARN of the first Lambda function
    Value: !GetAtt RiskManagementLambdaFunction1.Arn

  LambdaFunction2ARN:
    Description: ARN of the second Lambda function
    Value: !GetAtt RiskManagementLambdaFunction2.Arn