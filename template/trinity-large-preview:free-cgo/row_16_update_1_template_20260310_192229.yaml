AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CloudTrailGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: cloudtrail_logs_db

  CloudTrailGlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail_crawler
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref CloudTrailGlueDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      Configuration: |
        {
          "Version": 1.0,
          "CrawlerOutput": {
            "Partitions": {
              "AddOrUpdateBehavior": "InheritFromTable"
            },
            "Tables": {
              "AddOrUpdateBehavior": "MergeNewColumns"
            }
          },
          "Grouping": {
            "TableGroupingPolicy": "CombineCompatibleSchemas"
          }
        }

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*'
                  - !Sub 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs'

Outputs:
  GlueDatabaseName:
    Description: Name of the Glue Database for CloudTrail logs
    Value: !Ref CloudTrailGlueDatabase
  GlueCrawlerName:
    Description: Name of the Glue Crawler for CloudTrail logs
    Value: !Ref CloudTrailGlueCrawler