AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL Cluster with CloudWatch Logs Integration

Parameters:
  MasterUsername:
    Type: String
    Default: admin
    NoEcho: true
  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: VPC where Aurora cluster will be deployed
  DBClusterParameterGroupName:
    Type: String
    Default: default.aurora-mysql5.7
  DBParameterGroupName:
    Type: String
    Default: default.aurora-mysql5.7
  EngineVersion:
    Type: String
    Default: "5.7.mysql_aurora.2.07.2"
    Description: Aurora MySQL engine version

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      EngineVersion: !Ref EngineVersion
      DBClusterParameterGroupName: !Ref DBClusterParameterGroupName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: "{{resolve:secretsmanager:aurora-master-password:SecretString:password}}"
      Port: 3306
      BackupRetentionPeriod: 1
      PreferredBackupWindow: "07:00-08:00"
      PreferredMaintenanceWindow: "mon:03:00-mon:04:00"
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      DeletionProtection: true
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - Fn::Select:
          - 0
          - Fn::Split:
            - ","
            - Fn::ImportValue:
                Fn::Sub: "${VPC}-PrivateSubnets"
        - Fn::Select:
          - 1
          - Fn::Split:
            - ","
            - Fn::ImportValue:
                Fn::Sub: "${VPC}-PrivateSubnets"

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroupName

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroupName

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address