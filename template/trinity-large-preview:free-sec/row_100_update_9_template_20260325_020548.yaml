AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Cross-Account Trust and Role-Based Access Controls

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: '123456789012'
  TrustedToolingManagementAccount:
    Type: String
    Default: '234567890123'

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:CreateUser'
                  - 'iam:CreateRole'
                  - 'iam:CreatePolicy'
                  - 'iam:AttachRolePolicy'
                  - 'iam:PutUserPolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:UpdateAssumeRolePolicy'
                  - 'iam:PassRole'
                  - 'organizations:DescribeOrganization'
                  - 'organizations:DescribeAccount'
                  - 'organizations:DescribeOrganizationalUnit'
                  - 'organizations:DescribePolicy'
                  - 'organizations:ListAccounts'
                  - 'organizations:ListAccountsForParent'
                  - 'organizations:ListAWSServiceAccessForOrganization'
                  - 'organizations:ListChildren'
                  - 'organizations:ListParents'
                  - 'organizations:ListPoliciesForTarget'
                  - 'organizations:ListRoots'
                  - 'organizations:ListTagsForResource'
                  - 'organizations:ListTargetsForPolicy'
