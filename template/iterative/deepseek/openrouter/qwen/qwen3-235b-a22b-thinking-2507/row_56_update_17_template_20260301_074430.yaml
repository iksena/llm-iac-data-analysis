AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Cognito User Pool for admin-controlled user provisioning with email authentication
Parameters:
  UserPoolName:
    Type: String
    Default: AdminManagedUserPool
    Description: Name for the Cognito User Pool
    MinLength: 1
    MaxLength: 128
  AppClientName:
    Type: String
    Default: AdminProvisionedAppClient
    Description: Name for the Cognito User Pool Client
    MinLength: 1
    MaxLength: 128
Resources:
  ManagedUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      MfaConfiguration: OFF
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserPoolAddOns:
        AdvancedSecurityMode: AUDIT
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: true
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      VerificationMessageTemplate:
        EmailMessage: 'Your verification code is {####}'
        EmailSubject: 'Verify your email address'
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref AppClientName
      UserPoolId: !Ref ManagedUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - 'https://example.com'
      LogoutURLs:
        - 'https://example.com'
      SupportedIdentityProviders:
        - COGNITO
Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref ManagedUserPool
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref UserPoolClient
  UserPoolArn:
    Description: ARN of the Cognito User Pool
    Value: !GetAtt ManagedUserPool.Arn