AWSTemplateFormatVersion: '2010-09-09'
Description: Production-ready web server infrastructure with ALB and Auto Scaling

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the infrastructure into
    Default: vpc-0123456789abcdef0
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for Application Load Balancer (across multiple AZs)
    Default: "subnet-0123456789abcdef0,subnet-0123456789abcdef1"
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for EC2 instances (across multiple AZs)
    Default: "subnet-0123456789abcdef2,subnet-0123456789abcdef3"
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for web servers
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair for SSH access
    Default: my-test-key
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: SSM parameter for latest Amazon Linux 2 AMI

Resources:
  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Application
          Value: WebServer

  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WebServerRole

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access from internet to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Application
          Value: WebServer

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic only from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Application
          Value: WebServer

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: WebServerALB
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      Scheme: internet-facing
      Tags:
        - Key: Application
          Value: WebServer

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: WebServerTargetGroup
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Application
          Value: WebServer

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  WebServerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: WebServerLaunchTemplate
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        IamInstanceProfile:
          Arn: !GetAtt WebServerInstanceProfile.Arn
        UserData: 
          Fn::Base64: |
            #!/bin/bash
            set -e
            exec > /var/log/user-data.log 2>&1
            echo "Starting user data script at $(date)"
            yum update -y
            yum install -y httpd
            systemctl start httpd
            systemctl enable httpd
            if ! systemctl is-active --quiet httpd; then
                echo "ERROR: httpd service failed to start" >&2
                exit 1
            fi
            echo "<html><body><h1>Hello from $(hostname)</h1></body></html>" > /var/www/html/index.html
            echo "User data script completed successfully at $(date)"
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Application
                Value: WebServer
              - Key: Name
                Value: WebServerInstance

  WebServerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref PrivateSubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref WebServerLaunchTemplate
        Version: !GetAtt WebServerLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 5
      DesiredCapacity: 2
      TargetGroupARNs:
        - !Ref WebTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600
      Tags:
        - Key: Application
          Value: WebServer
          PropagateAtLaunch: true
        - Key: Name
          Value: WebServerInstance
          PropagateAtLaunch: true

Outputs:
  ALBEndpoint:
    Description: URL of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: WebServerALBEndpoint
  AutoScalingGroupName:
    Description: Name of the Auto Scaling group
    Value: !Ref WebServerAutoScalingGroup
    Export:
      Name: WebServerASGName