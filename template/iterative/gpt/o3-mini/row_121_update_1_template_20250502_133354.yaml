AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to provision Linux and Windows EC2 instances (with SSM agent roles),
  an SSM Document with OS-specific commands, an SSM Association targeting instances tagged "HelloWorld": "true",
  and an EventBridge Scheduler that triggers the SSM Association every 15 minutes.
Parameters:
  LinuxAmi:
    Description: "AMI ID for the Linux instance"
    Type: String
  WindowsAmi:
    Description: "AMI ID for the Windows instance"
    Type: String
  InstanceTypeLinux:
    Description: "EC2 instance type for Linux"
    Type: String
    Default: t3.micro
  InstanceTypeWindows:
    Description: "EC2 instance type for Windows"
    Type: String
    Default: t3.micro
  KeyName:
    Description: "Optional EC2 KeyPair name to enable SSH/RDP access"
    Type: AWS::EC2::KeyPair::KeyName
    Default: ""
Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ssm-execution-logs-${AWS::AccountId}-${AWS::Region}-${AWS::StackName}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 30

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EC2InstanceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${LogBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-EC2InstanceProfile"
      Roles:
        - !Ref EC2InstanceRole

  LinuxEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeLinux
      ImageId: !Ref LinuxAmi
      KeyName: !If 
        - HasKeyName
        - !Ref KeyName
        - !Ref "AWS::NoValue"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-LinuxInstance"
    Condition: HasKeyNameCondition

  WindowsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeWindows
      ImageId: !Ref WindowsAmi
      KeyName: !If 
        - HasKeyName
        - !Ref KeyName
        - !Ref "AWS::NoValue"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: "true"
        - Key: Name
          Value: !Sub "${AWS::StackName}-WindowsInstance"
    Condition: HasKeyNameCondition

  # Condition to check if KeyName parameter is provided (non-empty string)
  HasKeyNameCondition:
    Type: "AWS::CloudFormation::Condition"
    Properties:
      Expression: !Not [!Equals [!Ref KeyName, ""]]

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: !Sub "${AWS::StackName}-HelloWorldDocument"
      Content:
        schemaVersion: '2.2'
        description: "Document to echo Hello World! for Linux and Windows"
        mainSteps:
          - name: runLinuxCommand
            action: aws:runShellScript
            inputs:
              runCommand:
                - "echo Hello World!"
            onFailure: Continue
          - name: runWindowsCommand
            action: aws:runPowerShellScript
            inputs:
              runCommand:
                - "Write-Output 'Hello World!'"
            onFailure: Continue

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      # Target all instances tagged with HelloWorld=true
      Targets:
        - Key: "tag:HelloWorld"
          Values:
            - "true"
      # Note: Not providing ScheduleExpression so it must be triggered externally

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-SchedulerRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AllowSSMInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                Resource: "*"

  EventBridgeScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-Scheduler"
      Description: "Schedule to trigger SSM Association every 15 minutes"
      ScheduleExpression: "rate(15 minutes)"
      FlexibleTimeWindow:
        Mode: OFF
      Target:
        RoleArn: !GetAtt SchedulerRole.Arn
        # The Target ARN is set to the SSM service using a constructed ARN.
        Arn: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association"
        # Pass the Association ID from the SSMAssociation resource so that SSM:StartAssociationsOnce API can act upon it.
        Input: !Sub '{"AssociationId": "${AssociationId}"}'
    DependsOn:
      - SSMAssociation
    Metadata:
      # Capture the Association ID from the SSMAssociation resource output (Ref returns the Association ID)
      AssociationId: !Ref SSMAssociation

Outputs:
  LinuxInstanceId:
    Description: "The Instance ID of the Linux instance"
    Value: !Ref LinuxEC2Instance
  WindowsInstanceId:
    Description: "The Instance ID of the Windows instance"
    Value: !Ref WindowsEC2Instance
  LogBucketName:
    Description: "Name of the S3 bucket to store execution logs"
    Value: !Ref LogBucket
  ScheduleARN:
    Description: "ARN of the EventBridge Scheduler"
    Value: !GetAtt EventBridgeScheduler.Arn