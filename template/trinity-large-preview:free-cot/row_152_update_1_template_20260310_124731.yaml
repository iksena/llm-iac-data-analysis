AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Aurora MySQL Cluster with RDS Proxy Integration'

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for public subnet 1
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 2
  PublicSubnet3Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 3
  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.10.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.11.0/24
    Description: CIDR block for private subnet 2
  PrivateSubnet3Cidr:
    Type: String
    Default: 10.0.12.0/24
    Description: CIDR block for private subnet 3
  DatabaseName:
    Type: String
    Default: aurora_db
    Description: Name of the primary database
  DatabaseMasterUsername:
    Type: String
    Default: admin
    Description: Database master username
  DatabaseInstanceClass:
    Type: String
    Default: db.r6g.large
    Description: Database instance class
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
    Description: Preferred backup window in UTC
  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
    Description: Preferred maintenance window in UTC
  EnablePerformanceInsights:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable Performance Insights
  PerformanceInsightsRetention:
    Type: Number
    Default: 7
    Description: Performance Insights retention period in days
  EnableEnhancedMonitoring:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable enhanced monitoring
  MonitoringInterval:
    Type: Number
    Default: 1
    Description: Monitoring interval in seconds
  EnableIAMDatabaseAuthentication:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable IAM database authentication
  EnableAutoPause:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable auto pause for Aurora Serverless
  MaxCapacity:
    Type: Number
    Default: 2
    Description: Maximum Aurora capacity units for auto scaling
  MinCapacity:
    Type: Number
    Default: 2
    Description: Minimum Aurora capacity units for auto scaling
  AutoPauseTimeout:
    Type: Number
    Default: 5
    Description: Auto pause timeout in minutes
  EnableDataApi:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable Data API
  EnableHttpEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable HTTP endpoint
  EnableLogExports:
    Type: CommaDelimitedList
    Default: 'general, slowquery, audit'
    Description: Comma-separated list of log types to export

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet2

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet3Cidr
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet3

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet2

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet3Cidr
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet3

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
    DependsOn: VPCGatewayAttachment

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateRouteTable

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref RdsProxySecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraSecurityGroup

  RdsProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS Proxy
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RdsProxySecurityGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-LambdaSecurityGroup

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}-DatabaseSecret
      Description: Secret for Aurora database credentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DatabaseMasterUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 30
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DatabaseSecret

  EnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EnhancedMonitoringRole

  RdsProxySecretRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RdsProxySecretAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DatabaseSecret
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RdsProxySecretRole

  IamDatabaseAuthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IamDatabaseAuth
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub 'arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:${AuroraCluster.Arn}/*'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IamDatabaseAuthRole

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref DatabaseMasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DatabaseSecret}::password}}'
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      Port: 3306
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: !Ref EnableIAMDatabaseAuthentication
      EnableHttpEndpoint: !Ref EnableHttpEndpoint
      EnableDataApi: !Ref EnableDataApi
      EnablePerformanceInsights: !Ref EnablePerformanceInsights
      PerformanceInsightsRetentionPeriod: !Ref PerformanceInsightsRetention
      EnableCloudwatchLogsExports: !Ref EnableLogExports
      ScalingConfiguration:
        MinCapacity: !Ref MinCapacity
        MaxCapacity: !Ref MaxCapacity
        AutoPause: !Ref EnableAutoPause
        SecondsUntilAutoPause: !Ref AutoPauseTimeout
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraCluster

  AuroraReaderInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      AvailabilityZone: !Select [0, !GetAZs '']
      PromotionTier: 1
      EnablePerformanceInsights: !Ref EnablePerformanceInsights
      PerformanceInsightsRetentionPeriod: !Ref PerformanceInsightsRetention
      EnableCloudwatchLogsExports: !Ref EnableLogExports
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraReaderInstance1

  AuroraReaderInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      AvailabilityZone: !Select [1, !GetAZs '']
      PromotionTier: 2
      EnablePerformanceInsights: !Ref EnablePerformanceInsights
      PerformanceInsightsRetentionPeriod: !Ref PerformanceInsightsRetention
      EnableCloudwatchLogsExports: !Ref EnableLogExports
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraReaderInstance2

  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraSubnetGroup

  RdsProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub ${AWS::StackName}-RdsProxy
      EngineFamily: MYSQL
      RoleArn: !GetAtt RdsProxySecretRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref DatabaseSecret
          IAMAuth: true
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      VpcSecurityGroupIds:
        - !Ref RdsProxySecurityGroup
      RequireTLS: true
      IdleClientTimeout: 1800
      DebugLogging: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RdsProxy

  RdsProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RdsProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !Ref AuroraCluster
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 120
        SessionPinningFilters: ['EXCLUDE_VARIABLE_SETS']
        InitQuery: 'SET SESSION sql_mode=(SELECT REPLACE(@@sql_mode,''ONLY_FULL_GROUP_BY'',''''))'

  AuroraCloudwatchLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/rds/cluster/${AuroraCluster}
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraCloudwatchLogs

  RdsProxyCloudwatchLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/rds/proxy/${RdsProxy}
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RdsProxyCloudwatchLogs

  AuroraCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AuroraCluster}-CPU-Utilization-High
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: AWS/RDS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref AuroraCluster
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraCpuAlarm

  AuroraConnectionAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AuroraCluster}-Database-Connections-High
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: DatabaseConnections
      Namespace: AWS/RDS
      Period: 300
      Statistic: Average
      Threshold: 1000
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: DBClusterIdentifier
          Value: !Ref AuroraCluster
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AuroraConnectionAlarm

  RdsProxyConnectionAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${RdsProxy}-ClientConnections-High
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: ClientConnections
      Namespace: AWS/RDS
      Period: 300
      Statistic: Average
      Threshold: 5000
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: DBProxyName
          Value: !Ref RdsProxy
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-RdsProxyConnectionAlarm

  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Aurora-RDS-Proxy-Alarms
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AlarmNotificationTopic

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPC

  AuroraClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub ${AWS::StackName}-AuroraClusterEndpoint

  AuroraReaderEndpoint:
    Description: Aurora reader endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
    Export:
      Name: !Sub ${AWS::StackName}-AuroraReaderEndpoint

  RdsProxyEndpoint:
    Description: RDS Proxy endpoint
    Value: !GetAtt RdsProxy.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-RdsProxyEndpoint

  AuroraSecurityGroup:
    Description: Aurora security group ID
    Value: !Ref AuroraSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-AuroraSecurityGroup

  RdsProxySecurityGroup:
    Description: RDS Proxy security group ID
    Value: !Ref RdsProxySecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-RdsProxySecurityGroup

  LambdaSecurityGroup:
    Description: Lambda security group ID
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub ${AWS::StackName}-LambdaSecurityGroup

  DatabaseSecretArn:
    Description: Database secret ARN
    Value: !Ref DatabaseSecret
    Export:
      Name: !Sub ${AWS::StackName}-DatabaseSecretArn

  IamDatabaseAuthRoleArn:
    Description: IAM database auth role ARN
    Value: !GetAtt IamDatabaseAuthRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-IamDatabaseAuthRoleArn

  AlarmNotificationTopicArn:
    Description: Alarm notification topic ARN
    Value: !Ref AlarmNotificationTopic
    Export:
      Name: !Sub ${AWS::StackName}-AlarmNotificationTopicArn