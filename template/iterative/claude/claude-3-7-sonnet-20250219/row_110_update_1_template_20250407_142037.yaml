AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a cross-account private API Gateway with Lambda integration, VPC endpoint access, and custom domain'

Parameters:
  VpcEndpointId:
    Type: String
    Description: The ID of the VPC endpoint to restrict API Gateway access to

  CustomDomainName:
    Type: String
    Description: The custom domain name for the API Gateway

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the custom domain

  StageName:
    Type: String
    Default: prod
    Description: Name of the API Gateway stage

  LambdaFunctionName:
    Type: String
    Default: CrossAccountApiFunction
    Description: Name of the Lambda function

  SourceAccountId:
    Type: String
    Description: The account ID where the API Gateway will be deployed

  TargetAccountId:
    Type: String
    Description: The account ID where the Lambda function will be deployed

  LambdaRuntime:
    Type: String
    Default: nodejs18.x
    Description: Runtime for the Lambda function
    AllowedValues:
      - nodejs16.x
      - nodejs18.x
      - python3.9
      - python3.10
      - python3.11

Resources:
  # Lambda Function Resources
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Path: /

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Event received:', JSON.stringify(event));
            return {
              statusCode: 200,
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: 'Hello from cross-account private API Gateway Lambda!',
                timestamp: new Date().toISOString()
              })
            };
          };

  # API Gateway Resources
  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: CrossAccountPrivateApi
      Description: Private API Gateway with cross-account Lambda integration
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*/*/*'
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref VpcEndpointId
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*/*/*'

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: 'api'

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/arn:aws:lambda:${AWS::Region}:${TargetAccountId}:function:${LambdaFunctionName}/invocations
        Credentials: !GetAtt ApiGatewayRole.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      Description: Deployment for cross-account private API

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiGatewayDeployment
      StageName: !Ref StageName
      Description: Stage for cross-account private API
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  ApiGatewayDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref CertificateArn

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn:
      - ApiGatewayStage
      - ApiGatewayDomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: !Ref StageName

  # IAM Roles and Permissions
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: CrossAccountLambdaInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${TargetAccountId}:function:${LambdaFunctionName}

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayRole.Arn

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${SourceAccountId}:${ApiGatewayRestApi}/*/*/*
      SourceAccount: !Ref SourceAccountId

Outputs:
  ApiGatewayId:
    Description: ID of the API Gateway REST API
    Value: !Ref ApiGatewayRestApi

  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api

  CustomDomainUrl:
    Description: Custom domain URL of the API Gateway
    Value: !Sub https://${CustomDomainName}/api

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn