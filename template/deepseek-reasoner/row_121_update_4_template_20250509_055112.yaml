AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled automation workflow with EventBridge, SSM, and EC2 instances

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMI: ami-0c55b159cbfafe1f0
      WindowsAMI: ami-0d4d02c4e0d6c5b6e
    us-west-2:
      LinuxAMI: ami-0b36cd6786bcfe120
      WindowsAMI: ami-0aab355e1bfa1e0e1

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SSMLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetBucketLocation
            Resource:
              - !Sub ${LogBucket.Arn}
              - !Sub ${LogBucket.Arn}/*

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, LinuxAMI]
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref AWS::Region, WindowsAMI]
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'

  HelloWorldSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Cross-platform hello world command
        mainSteps:
          - action: aws:runShellScript
            name: LinuxHello
            precondition:
              StringEquals:
                platformType: Linux
            inputs:
              runCommand:
                - echo "Hello World from Linux!"
          - action: aws:runPowerShellScript
            name: WindowsHello
            precondition:
              StringEquals:
                platformType: Windows
            inputs:
              runCommand:
                - Write-Output "Hello World from Windows!"

  HelloWorldAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldSSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values: ['true']
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: execution-logs/

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMAssociationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:StartAssociationsOnce
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:association/*

  AutomationSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: 'OFF'  # Fixed value as string
      ScheduleExpression: rate(15 minutes)
      Target:
        Arn: arn:aws:scheduler:::aws-sdk:ssm:startAssociationsOnce
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        Input: !Sub '{"AssociationIds":["${HelloWorldAssociation}"]}'

Outputs:
  LinuxInstanceId:
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Value: !Ref WindowsInstance
  LogBucketName:
    Value: !Ref LogBucket
  ScheduleARN:
    Value: !GetAtt AutomationSchedule.Arn