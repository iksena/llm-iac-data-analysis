AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template that creates an S3 bucket integrated with Amazon EventBridge,
  an SNS topic to notify subscribers on object creation events, and an EventBridge rule that triggers on these events.

Parameters:
  BucketNameParam:
    Description: "Optional custom bucket name. If not provided, CloudFormation will generate a unique physical ID."
    Type: String
    Default: ""
    MinLength: 0
    MaxLength: 63

Resources:

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 
        Fn::If:
          - UseCustomBucketName
          - !Ref BucketNameParam
          - !Ref AWS::NoValue
      NotificationConfiguration:
        EventBridgeConfiguration: {}

  UseCustomBucketName:
    Type: "AWS::CloudFormation::Condition"
    Properties: {}

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Object Created Notifications"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "SNS:Publish"
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "S3ObjectCreatedRule"
      Description: "Triggers on S3 object creation events and forwards messages to SNS"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SNSTopic

Outputs:
  BucketName:
    Description: "The name of the S3 bucket"
    Value: !Ref S3Bucket

  SNSTopicARN:
    Description: "The ARN of the SNS topic"
    Value: !Ref SNSTopic

  EventBridgeRuleName:
    Description: "The name of the EventBridge rule"
    Value: !Ref EventBridgeRule