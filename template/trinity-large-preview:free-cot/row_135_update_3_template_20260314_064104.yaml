AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for CloudFront distribution fronting a regional API Gateway REST API with mock backend

Parameters:
  APIName:
    Type: String
    Default: MockAPI
    Description: Name of the API Gateway REST API
  ResourcePath:
    Type: String
    Default: hello
    Description: Path for the API resource (alphanumeric only)
  MethodType:
    Type: String
    Default: GET
    Description: HTTP method type for the API endpoint

Resources:
  APIRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref APIName
      Description: Regional REST API with mock backend

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIRestApi
      ParentId: !GetAtt APIRestApi.RootResourceId
      PathPart: !Ref ResourcePath

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIRestApi
      ResourceId: !Ref APIGatewayResource
      HttpMethod: !Ref MethodType
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: '{"message": "hello world"}'
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty
          ResponseParameters:
            method.response.header.Content-Type: true

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIRestApi
      Description: Deployment for production stage

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref APIRestApi
      DeploymentId: !Ref APIGatewayDeployment
      StageName: prod
      Description: Production stage

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: APIGatewayStage
    Properties:
      DistributionConfig:
        Comment: CloudFront distribution for API Gateway
        Origins:
          - DomainName: !Sub "${APIRestApi}.execute-api.${AWS::Region}.amazonaws.com"
            Id: APIGatewayOrigin
            OriginPath: /prod
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1
                - TLSv1.1
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: APIGatewayOrigin
          ForwardedValues:
            QueryString: true
            Headers:
              - Authorization
              - Content-Type
            Cookies:
              Forward: all
          ViewerProtocolPolicy: redirect-to-https
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Enabled: true

Outputs:
  CloudFrontDistributionURL:
    Description: URL of the CloudFront distribution
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
  APIGatewayInvokeURL:
    Description: Invoke URL of the API Gateway
    Value: !Sub "https://${APIRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/${ResourcePath}"