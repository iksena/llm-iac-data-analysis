AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Aurora MySQL cluster with two instances and custom parameter groups

Parameters:
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs (at least 2 for high availability)
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: List of security group IDs to associate with the cluster
  DatabaseName:
    Type: String
    Default: mydatabase
    Description: Name of the primary database
  MasterUsername:
    Type: String
    Default: admin
    Description: Username for the master database user
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
    Description: Daily time range for backups in UTC

Resources:
  AuroraDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  AuroraDBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        sql_mode: STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: '{{resolve:secretsmanager:MyAuroraMasterPassword:SecretString:password}}'
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VpcSecurityGroupIds: !Ref SecurityGroupIds
      DBClusterParameterGroupName: !Ref AuroraDBParameterGroup
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      Port: 3306
      StorageEncrypted: true
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: false

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraDBParameterGroup
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VPCSecurityGroups: !Ref SecurityGroupIds

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraDBParameterGroup
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VPCSecurityGroups: !Ref SecurityGroupIds

Outputs:
  ClusterEndpoint:
    Description: Database cluster endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Database reader endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  DatabaseName:
    Description: Name of the primary database
    Value: !Ref DatabaseName
  MasterUsername:
    Description: Master username for the database
    Value: !Ref MasterUsername