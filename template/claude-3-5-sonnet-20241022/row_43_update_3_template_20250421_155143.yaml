AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket with KMS encryption and lifecycle management'

Parameters:
  BucketNamePrefix:
    Type: String
    Description: Prefix for the S3 bucket name
    MinLength: 3
    MaxLength: 37
    AllowedPattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
    ConstraintDescription: Must contain only lowercase letters, numbers, and hyphens
  Environment:
    Type: String
    Description: Environment name for resource tagging
    AllowedValues: 
      - dev
      - staging
      - prod
    Default: dev

Resources:
  S3KMSKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    Properties:
      Description: !Sub 'KMS key for ${AWS::StackName} S3 bucket encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow S3 Service
            Effect: Allow
            Principal:
              Service: 's3.amazonaws.com'
            Action:
              - 'kms:GenerateDataKey*'
              - 'kms:Decrypt'
            Resource: '*'

  S3KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-key'
      TargetKeyId: !Ref S3KMSKey

  EncryptedS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt S3KMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 180
                StorageClass: GLACIER
            ExpirationInDays: 365
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref EncryptedS3Bucket
  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !GetAtt EncryptedS3Bucket.Arn
  KMSKeyId:
    Description: ID of the KMS key
    Value: !Ref S3KMSKey
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt S3KMSKey.Arn