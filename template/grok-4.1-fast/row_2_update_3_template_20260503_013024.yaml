AWSTemplateFormatVersion: '2010-09-09'
Description: "Production-ready Amazon S3 bucket with secure defaults: server-side encryption, public access blocked, versioning enabled, retain on delete."

Resources:
  DefaultS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Ref DefaultS3Bucket

Outputs:
  BucketName:
    Description: "Name of the S3 bucket (auto-generated)"
    Value: !Ref DefaultS3Bucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"
  BucketArn:
    Description: "ARN of the S3 bucket"
    Value: !GetAtt DefaultS3Bucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"