AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application

Parameters:
  SourceCodeBucket:
    Description: S3 bucket containing the frontend ZIP file
    Type: String
  SourceCodeKey:
    Description: Key for the frontend ZIP file in source bucket
    Type: String
  WebsiteAssetsVersion:
    Description: Version identifier for website assets (cache busting)
    Type: String
    Default: v1

Mappings:
  RegionMap:
    us-east-1:
      LambdaRuntime: nodejs18.x
    us-west-2:
      LambdaRuntime: nodejs18.x
    eu-west-1:
      LambdaRuntime: nodejs18.x

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucket}/*'

  SlotMachineLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineProcessor
      Handler: index.handler
      Runtime: !FindInMap [RegionMap, !Ref 'AWS::Region', LambdaRuntime]
      Role: !GetAtt SlotMachineLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              const symbols = ['cherry', 'lemon', 'orange', 'plum', 'bell', 'bar'];
              const reels = [
                  symbols[Math.floor(Math.random() * symbols.length)],
                  symbols[Math.floor(Math.random() * symbols.length)],
                  symbols[Math.floor(Math.random() * symbols.length)]
              ];
              
              let winAmount = 0;
              // Simple win logic - 3 of a kind
              if (reels[0] === reels[1] && reels[1] === reels[2]) {
                  winAmount = 10; // Example win amount
              }
              
              return {
                  statusCode: 200,
                  body: JSON.stringify({
                      reels: reels,
                      winAmount: winAmount
                  })
              };
          };

  DeploymentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: DeploymentLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${SourceCodeBucket}/${SourceCodeKey}'
                  - !Sub 'arn:aws:s3:::${WebsiteBucket}/*'
                  - !Sub 'arn:aws:s3:::${WebsiteBucket}'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  DeploymentLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: WebsiteDeployer
      Handler: index.handler
      Runtime: !FindInMap [RegionMap, !Ref 'AWS::Region', LambdaRuntime]
      Role: !GetAtt DeploymentLambdaRole.Arn
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const s3 = new AWS.S3();
          const fs = require('fs');
          const path = require('path');
          const extract = require('extract-zip');
          
          exports.handler = async (event, context) => {
              try {
                  // Download the frontend zip
                  const sourceZip = await s3.getObject({
                      Bucket: '${SourceCodeBucket}',
                      Key: '${SourceCodeKey}'
                  }).promise();
                  
                  // Process and upload files
                  const tempDir = '/tmp/website';
                  await extractZip(Buffer.from(sourceZip.Body), tempDir);
                  
                  // Inject configuration
                  await injectConfig(tempDir);
                  
                  // Upload to website bucket
                  await uploadDirectory(tempDir);
                  
                  return { status: 'SUCCESS' };
              } catch (err) {
                  console.error(err);
                  throw err;
              }
          };
          
          async function extractZip(buffer, dir) {
              // Implementation omitted for brevity
          }
          
          async function injectConfig(dir) {
              // Inject Cognito and Lambda ARN into frontend config
              const configPath = path.join(dir, 'js/config.js');
              let config = await fs.promises.readFile(configPath, 'utf8');
              
              config = config.replace('{{IDENTITY_POOL_ID}}', '${IdentityPool.Ref}');
              config = config.replace('{{REGION}}', '${AWS::Region}');
              config = config.replace('{{LAMBDA_ARN}}', '${SlotMachineLambda.Arn}');
              
              await fs.promises.writeFile(configPath, config);
          }
          
          async function uploadDirectory(dir) {
              // Implementation omitted for brevity
          }

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      AllowUnauthenticatedIdentities: true
      IdentityPoolName: SlotMachineIdentityPool

  CognitoIdentityPoolRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Path: /
      Policies:
        - PolicyName: InvokeSlotMachineLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  WebsiteDeploymentCustomResource:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt DeploymentLambda.Arn
      Version: !Ref WebsiteAssetsVersion

Outputs:
  WebsiteURL:
    Description: URL of the website
    Value: !GetAtt WebsiteBucket.WebsiteURL
  SlotMachineLambdaARN:
    Description: ARN of the Slot Machine Lambda function
    Value: !GetAtt SlotMachineLambda.Arn
  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !Ref CognitoIdentityPool