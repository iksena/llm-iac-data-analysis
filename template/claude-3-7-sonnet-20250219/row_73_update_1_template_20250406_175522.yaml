AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an Amazon ECS cluster with Fargate and Fargate Spot capacity providers'

Parameters:
  ClusterName:
    Type: String
    Default: 'ECSCluster'
    Description: 'Name of the ECS cluster'
  
  FargateWeight:
    Type: Number
    Default: 1
    Description: 'Weight for the Fargate capacity provider'
    MinValue: 0
    MaxValue: 1000
  
  FargateSpotWeight:
    Type: Number
    Default: 1
    Description: 'Weight for the Fargate Spot capacity provider'
    MinValue: 0
    MaxValue: 1000
  
  FargateBase:
    Type: Number
    Default: 1
    Description: 'Base value for the Fargate capacity provider'
    MinValue: 0
    MaxValue: 100
  
  FargateSpotBase:
    Type: Number
    Default: 0
    Description: 'Base value for the Fargate Spot capacity provider'
    MinValue: 0
    MaxValue: 100

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: !Ref FargateWeight
          Base: !Ref FargateBase
        - CapacityProvider: FARGATE_SPOT
          Weight: !Ref FargateSpotWeight
          Base: !Ref FargateSpotBase
      Tags:
        - Key: Name
          Value: !Ref ClusterName

Outputs:
  ClusterName:
    Description: 'The name of the ECS cluster'
    Value: !Ref ECSCluster
  
  ClusterArn:
    Description: 'The ARN of the ECS cluster'
    Value: !GetAtt ECSCluster.Arn