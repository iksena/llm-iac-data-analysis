AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create Amazon Data Firehose stream with server-side encryption and CloudWatch Logs for destination errors

Parameters:
  FirehoseDeliveryStreamName:
    Type: String
    Default: firehose-delivery-stream
    Description: Name of the Firehose delivery stream
  LogGroupName:
    Type: String
    Default: firehose-destination-errors
    Description: Name of the CloudWatch Log Group
  LogStreamName:
    Type: String
    Default: firehose-errors
    Description: Name of the CloudWatch Log Stream
  KinesisFirehoseRole:
    Type: String
    Default: FirehoseKinesisRole
    Description: Name of the IAM Role for Firehose

Resources:
  FirehoseKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref KinesisFirehoseRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseServiceRolePolicy

  FirehoseKinesisPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: FirehoseKinesisPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - firehose:PutRecord
              - firehose:PutRecordBatch
            Resource: !GetAtt FirehoseDeliveryStream.Arn
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${LogGroupName}:*'
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:Encrypt
            Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/kinesis'
      Roles:
        - !Ref FirehoseKinesisRole

  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref LogGroupName
      LogStreamName: !Ref LogStreamName

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseDeliveryStreamName
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::AccountId}-firehose-backup'
        Prefix: 'firehose/'
        ErrorOutputPrefix: 'errors/'
        BufferingHints:
          SizeInMBs: 5
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref LogGroupName
          LogStreamName: !Ref LogStreamName

Outputs:
  FirehoseDeliveryStreamArn:
    Description: ARN of the Firehose delivery stream
    Value: !GetAtt FirehoseDeliveryStream.Arn
  FirehoseLogGroupArn:
    Description: ARN of the CloudWatch Log Group
    Value: !GetAtt FirehoseLogGroup.Arn