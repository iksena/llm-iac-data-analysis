AWSTemplateFormatVersion: "2010-09-09"
Description: "Production-ready CloudFormation template that creates a DynamoDB table with customizable parameters, deletion protection, and a unique table name to avoid conflicts."

Parameters:
  BaseTableName:
    Description: "The base name for the DynamoDB table. A unique name is generated by combining the stack name with this value."
    Type: String
    Default: "MyDynamoDBTable"
  ReadCapacityUnits:
    Description: "Provisioned read capacity units for the DynamoDB table."
    Type: Number
    Default: 5
  WriteCapacityUnits:
    Description: "Provisioned write capacity units for the DynamoDB table."
    Type: Number
    Default: 5

Resources:
  DynamoDBTable:
    Type: "AWS::DynamoDB::Table"
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-${BaseTableName}"
      AttributeDefinitions:
        - AttributeName: "Id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "Id"
          KeyType: "HASH"
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      Tags:
        - Key: Environment
          Value: "Production"

Outputs:
  TableNameOutput:
    Description: "Name of the created DynamoDB table."
    Value: !Ref DynamoDBTable
  TableArnOutput:
    Description: "ARN of the created DynamoDB table."
    Value: !GetAtt DynamoDBTable.Arn