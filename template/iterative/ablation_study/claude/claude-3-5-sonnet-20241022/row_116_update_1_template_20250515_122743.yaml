AWSTemplateFormatVersion: '2010-09-09'
Description: 'SNS-SQS fanout system with filtered message routing for metrics processing'

Resources:
  MainMetricsTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      DisplayName: 'Metrics Processing Topic'
      TopicName: 'metrics-processing-topic'

  AllMetricsDLQ:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'all-metrics-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      VisibilityTimeout: 30

  TemperatureMetricsDLQ:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'temperature-metrics-dlq'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30

  HumidityMetricsDLQ:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'humidity-metrics-dlq'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30

  AllMetricsQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'all-metrics-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600  # 4 days
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQ.Arn
        maxReceiveCount: 3

  TemperatureMetricsQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'temperature-metrics-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureMetricsDLQ.Arn
        maxReceiveCount: 3

  HumidityMetricsQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'humidity-metrics-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityMetricsDLQ.Arn
        maxReceiveCount: 3

  AllMetricsQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref AllMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainMetricsTopic

  TemperatureMetricsQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref TemperatureMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainMetricsTopic

  HumidityMetricsQueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref HumidityMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt HumidityMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MainMetricsTopic

  AllMetricsSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref MainMetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsQueue.Arn

  TemperatureMetricsSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref MainMetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureMetricsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumidityMetricsSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      TopicArn: !Ref MainMetricsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumidityMetricsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  MetricsTopicArn:
    Description: 'ARN of the main metrics SNS topic'
    Value: !Ref MainMetricsTopic

  AllMetricsQueueUrl:
    Description: 'URL of the all metrics queue'
    Value: !Ref AllMetricsQueue

  AllMetricsQueueArn:
    Description: 'ARN of the all metrics queue'
    Value: !GetAtt AllMetricsQueue.Arn

  TemperatureMetricsQueueUrl:
    Description: 'URL of the temperature metrics queue'
    Value: !Ref TemperatureMetricsQueue

  TemperatureMetricsQueueArn:
    Description: 'ARN of the temperature metrics queue'
    Value: !GetAtt TemperatureMetricsQueue.Arn

  HumidityMetricsQueueUrl:
    Description: 'URL of the humidity metrics queue'
    Value: !Ref HumidityMetricsQueue

  HumidityMetricsQueueArn:
    Description: 'ARN of the humidity metrics queue'
    Value: !GetAtt HumidityMetricsQueue.Arn

  AllMetricsDLQUrl:
    Description: 'URL of the all metrics dead-letter queue'
    Value: !Ref AllMetricsDLQ

  TemperatureMetricsDLQUrl:
    Description: 'URL of the temperature metrics dead-letter queue'
    Value: !Ref TemperatureMetricsDLQ

  HumidityMetricsDLQUrl:
    Description: 'URL of the humidity metrics dead-letter queue'
    Value: !Ref HumidityMetricsDLQ