AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a secure AWS Cognito user management system
  with admin-managed user provisioning, email verification, customizable password
  policy, and a preconfigured domain for hosted login pages.

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: The name of the Cognito User Pool.
  DomainPrefix:
    Type: String
    Description: The prefix for the Cognito User Pool Domain. Must be globally unique.
    MinLength: 1
    MaxLength: 63
    AllowedPattern: '^[a-zA-Z0-9-]+$'
    ConstraintDescription: Must be a valid domain prefix consisting of alphanumeric characters and hyphens.
  PasswordMinLength:
    Type: Number
    Default: 8
    Description: Minimum length for user passwords.
  PasswordRequireUppercase:
    Type: String
    AllowedValues: [true, false]
    Default: true
    Description: Whether to require uppercase letters in passwords.
  PasswordRequireLowercase:
    Type: String
    AllowedValues: [true, false]
    Default: true
    Description: Whether to require lowercase letters in passwords.
  PasswordRequireNumbers:
    Type: String
    AllowedValues: [true, false]
    Default: true
    Description: Whether to require numbers in passwords.
  PasswordRequireSymbols:
    Type: String
    AllowedValues: [true, false]
    Default: true
    Description: Whether to require symbols in passwords.
  CallbackURL:
    Type: String
    Default: https://example.com/callback
    Description: The callback URL for the Cognito User Pool Client.
  LogoutURL:
    Type: String
    Default: https://example.com/logout
    Description: The logout URL for the Cognito User Pool Client.

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinLength
          RequireUppercase: !Ref PasswordRequireUppercase
          RequireLowercase: !Ref PasswordRequireLowercase
          RequireNumbers: !Ref PasswordRequireNumbers
          RequireSymbols: !Ref PasswordRequireSymbols
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Join ['-', [!Ref DomainPrefix, !Ref AWS::StackName]]
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackURL
      LogoutURLs:
        - !Ref LogoutURL

Outputs:
  UserPoolId:
    Description: The ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolDomainURL:
    Description: The URL of the Cognito User Pool Domain
    Value: !Sub 'https://${CognitoUserPoolDomain.Domain}.auth.${AWS::Region}.amazoncognito.com'
  UserPoolClientId:
    Description: The ID of the Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient