AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create environment-specific DynamoDB tables for supporter product data.

Parameters:
  Stage:
    Type: String
    Default: CODE
    AllowedValues:
      - PROD
      - CODE
    Description: The stage of the environment (PROD or CODE)

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'SupporterProductData-${Stage}'
      BillingMode:
        Fn::If:
          - IsProd
          - PROVISIONED
          - PAY_PER_REQUEST
      ProvisionedThroughput:
        Fn::If:
          - IsProd
          - ReadCapacityUnits: 20
            WriteCapacityUnits: 5
          - Ref: AWS::NoValue
      SSESpecification:
        Enabled: true
      TimeToLiveSpecification:
        AttributeName: expiryDate
        Enabled: true
      Tags:
        - Key: Backup
          Value: true
      GlobalSecondaryIndexes:
        - IndexName: expiryDate-index
          KeySchema:
            - AttributeName: expiryDate
              KeyType: HASH
          Projection:
            NonKeyAttributes:
              - supporterId
              - productId
            ProjectionType: INCLUDE
          ProvisionedThroughput:
            Fn::If:
              - IsProd
              - ReadCapacityUnits: 5
                WriteCapacityUnits: 1
              - Ref: AWS::NoValue
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: expiryDate
          AttributeType: S
        - AttributeName: supporterId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  AutoScalingWriteCapacity:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: WriteCapacityAutoScalingPolicy
      PolicyType: TargetTrackingScaling
      ScalingTarget:
        MaxCapacity: 500
        MinCapacity: 5
        ResourceId: !Sub "table/SupporterProductData-${Stage}"
        RoleARN: !GetAtt AutoScalingRole.Arn
        ScalableDimension: "dynamodb:table:WriteCapacityUnits"
        ServiceNamespace: dynamodb
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDynamoDBFullAccess

Conditions:
  IsProd:
    Fn::Equals:
      - Ref: Stage
      - PROD

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref SupporterProductDataTable