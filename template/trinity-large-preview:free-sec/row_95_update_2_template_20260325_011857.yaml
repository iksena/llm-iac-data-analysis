AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM Automation for Nginx Deployment

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue: LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile:
        Fn::ImportValue: SSMInstanceProfile
      Tags:
        - Key: nginx
          Value: Yes

  SSMAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Install Nginx and validate
        parameters:
          InstanceIds:
            type: StringList
            description: Target instance IDs
            default: TARGET_TAGS
        mainSteps:
          - name: UpdateOS
            action: aws:runPatchBaseline
            inputs:
              Operation: Install
              RebootOption: RebootIfNeeded
          - name: InstallNginx
            action: aws:configureAWSPackage
            inputs:
              name: nginx
              action: Install
              version: ''
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              commands:
                - 'curl -f http://localhost/ || exit 1'

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicIp:
    Description: Public IP Address
    Value: !GetAtt EC2Instance.PublicIp
  AutomationDocument:
    Description: SSM Automation Document Name
    Value: !Ref SSMAutomationDocument