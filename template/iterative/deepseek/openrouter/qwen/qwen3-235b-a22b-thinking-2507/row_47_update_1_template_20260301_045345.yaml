AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSIAMReadOnlyAccess
Outputs:
  RoleName:
    Description: Name of the IAM role created for EC2 instances
    Value: !Ref IAMReadOnlyRole
  RoleArn:
    Description: ARN of the IAM role created for EC2 instances
    Value: !GetAtt IAMReadOnlyRole.Arn