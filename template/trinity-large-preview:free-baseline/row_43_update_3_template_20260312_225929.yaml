AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with KMS encryption and lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: my-encrypted-bucket
    Description: Name of the S3 bucket to create

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/s3-encryption-key
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !Ref KMSKey
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transition:
              Days: 30
              StorageClass: GLACIER
            ExpirationInDays: 365
      Tags:
        - Key: Environment
          Value: Production
        - Key: Project
          Value: DataLake

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:PutObject*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'
            Condition:
              StringEquals:
                s3:x-amz-server-side-encryption: aws:kms

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  KMSKeyId:
    Description: ID of the KMS key used for encryption
    Value: !Ref KMSKey