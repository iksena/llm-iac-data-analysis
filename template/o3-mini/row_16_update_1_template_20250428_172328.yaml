AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create an AWS Glue Database and Crawler for crawling and cataloging
  CloudTrail logs stored in S3 (s3://kk-admin/cloud-trail/AWSLogs/) with table prefix "cloudtrail_"
  for organized metadata used by Athena.

Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      DatabaseInput:
        Name: cloudtrail_logs_db
        Description: "Glue database for CloudTrail logs catalog."

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail-crawler
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref GlueDatabase
      TablePrefix: cloudtrail_
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      # Optional crawler configuration to enable schema changes; configuring defaults for incremental schema change handling
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

Outputs:
  GlueDatabaseName:
    Description: "The name of the Glue Database"
    Value: !Ref GlueDatabase
  GlueCrawlerName:
    Description: "The name of the Glue Crawler"
    Value: !Ref GlueCrawler