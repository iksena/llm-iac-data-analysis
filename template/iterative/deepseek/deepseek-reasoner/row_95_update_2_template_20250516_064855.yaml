AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with automated Nginx deployment via SSM Automation'
Parameters:
  LatestAmi:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for instance deployment'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSM access'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmi
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: nginx
          Value: 'Yes'
        - Key: Name
          Value: 'SSM-Managed-Nginx-Instance'

  NginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: 'Automated system updates and Nginx installation'
        parameters:
          InstanceIds:
            type: StringList
            default: []
        mainSteps:
          - name: UpdateSystem
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{InstanceIds}}'
              Parameters:
                commands:
                  - sudo yum install -y yum-utils
                  - sudo yum update -y --security

          - name: CheckRebootNeeded
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{InstanceIds}}'
              Parameters:
                commands:
                  - if sudo needs-restarting -r; then echo "REBOOT_REQUIRED"; else echo "NO_REBOOT_NEEDED"; fi
            outputs:
              - name: rebootStatus
                selector: "$.Payloads[\"aws:runCommand\"][\"0\"].output"

          - name: EvaluateReboot
            action: aws:branch
            inputs:
              Choices:
                - NextStep: RebootInstance
                  StringEquals: 'REBOOT_REQUIRED'
                  Variable: '{{CheckRebootNeeded.rebootStatus}}'
              Default: InstallNginx

          - name: RebootInstance
            action: aws:rebootInstance
            inputs:
              InstanceIds: '{{InstanceIds}}'
            nextStep: WaitForReboot

          - name: WaitForReboot
            action: aws:waitForInstanceStatus
            inputs:
              InstanceIds: '{{InstanceIds}}'
              DesiredStatus: OK
              DurationSeconds: 600
            nextStep: InstallNginx

          - name: InstallNginx
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{InstanceIds}}'
              Parameters:
                commands:
                  - sudo amazon-linux-extras install -y nginx1
                  - sudo systemctl start nginx
                  - sudo systemctl enable nginx

          - name: ValidateInstallation
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds: '{{InstanceIds}}'
              Parameters:
                commands:
                  - curl -sIf http://localhost || exit 1
                  - echo "Validation successful"

  AutomationTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartAutomationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:StartAutomationExecution
                Resource: !Ref NginxAutomationDocument

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Trigger Nginx automation on tag change'
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - 'EC2 Instance State-change Notification'
        detail:
          state:
            - running
          tags:
            nginx:
              - 'Yes'
      Targets:
        - Arn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:automation-definition/${NginxAutomationDocument}:$DEFAULT'
          RoleArn: !GetAtt AutomationTriggerRole.Arn
          Id: 'NginxAutomationTrigger'

Outputs:
  InstanceId:
    Value: !Ref NginxInstance
  AutomationDocument:
    Value: !Ref NginxAutomationDocument
  SecurityGroupId:
    Value: !Ref InstanceSecurityGroup