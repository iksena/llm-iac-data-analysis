AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon S3 bucket for static website hosting with DeletionPolicy Retain.

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket. Must be globally unique, 3-63 characters, lowercase letters, numbers, periods, hyphens.
    MinLength: 3
    MaxLength: 63
  IndexDocument:
    Type: String
    Default: index.html
    Description: Index document for the website.
    MinLength: 1
  ErrorDocument:
    Type: String
    Default: error.html
    Description: Error document for the website.
    MinLength: 1

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      WebsiteConfiguration:
        IndexDocument: !Ref IndexDocument
        ErrorDocument: !Ref ErrorDocument
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Purpose
          Value: WebsiteHosting

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${WebsiteBucket.Arn}/*'

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
  WebsiteURL:
    Description: Static website hosting endpoint URL
    Value: !GetAtt WebsiteBucket.WebsiteURL