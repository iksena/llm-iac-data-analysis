AWSTemplateFormatVersion: '2010-09-09'
Description: Windows EC2 instance with CPU stress testing capabilities via SSM

Parameters:
  InstanceType:
    Description: EC2 instance type for stress testing
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    ConstraintDescription: Must be a valid T3 instance type

  StressTestDuration:
    Description: Duration of CPU stress test in seconds
    Type: String
    Default: '300'
    AllowedPattern: '^[1-9][0-9]*$'
    ConstraintDescription: Must be a positive integer

  WindowsAMI:
    Description: Windows Server 2019 AMI ID
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-VPC

  Subnet:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.0.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-Subnet

  InternetGateway:
    Type: 'AWS::EC2::InternetGateway'
    Properties:
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-IGW

  VPCGatewayAttachment:
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: 'AWS::EC2::RouteTable'
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-RouteTable

  Route:
    Type: 'AWS::EC2::Route'
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: 'AWS::EC2::SubnetRouteTableAssociation'
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  EC2Role:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Path: '/'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Enable RDP access from anywhere
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: '0.0.0.0/0'

  StressTestInstance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      SubnetId: !Ref Subnet
      Monitoring: true
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-Instance

  CPUTestSSMDocument:
    Type: 'AWS::SSM::Document'
    Properties:
      Name: 'CPUTestDocument'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: CPU Stress Test Script
        parameters:
          durationSeconds:
            type: String
            description: Duration of stress test in seconds
            default: !Ref StressTestDuration
        mainSteps:
          - action: aws:runPowerShellScript
            name: CPULoadTest
            inputs:
              runCommand:
                - |
                  $duration = ${{ durationSeconds }}
                  $threads = (Get-WmiObject Win32_ComputerSystem).NumberOfLogicalProcessors
                  Write-Output "Starting CPU stress test with $threads threads for $duration seconds"
                  $job = Start-Job -ScriptBlock {
                      param($threads, $duration)
                      $endTime = (Get-Date).AddSeconds($duration)
                      while ((Get-Date) -lt $endTime) {
                          1..$threads | ForEach-Object {
                              Start-Job -ScriptBlock {
                                  $result = 1
                                  for ($i = 0; $i -lt 2147483647; $i++) {
                                      $result = $result * $i
                                  }
                              }
                          }
                          Get-Job | Wait-Job | Remove-Job
                      }
                  } -ArgumentList $threads, $duration
                  Wait-Job $job
                  Receive-Job $job
                  Remove-Job $job
                  Write-Output "CPU stress test completed"

  FIStestRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Path: '/'
      Policies:
        - PolicyName: FISPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource:
                  - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/${CPUTestSSMDocument}'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action: ec2:DescribeInstances
                Resource: '*'

Outputs:
  InstanceId:
    Description: ID of the stress test instance
    Value: !Ref StressTestInstance

  SSMDocumentName:
    Description: Name of the SSM document for CPU stress testing
    Value: !Ref CPUTestSSMDocument

  FISRoleARN:
    Description: ARN of the IAM role for FIS experiments
    Value: !GetAtt FIStestRole.Arn

  InstancePublicIP:
    Description: Public IP address of the instance
    Value: !GetAtt StressTestInstance.PublicIp