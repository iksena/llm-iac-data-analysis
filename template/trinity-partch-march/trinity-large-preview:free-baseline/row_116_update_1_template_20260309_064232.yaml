AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for SNS-to-SQS fanout system with filtered message routing

Resources:
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDeadLetterQueue.Arn
        maxReceiveCount: 3

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDeadLetterQueue

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDeadLetterQueue.Arn
        maxReceiveCount: 3

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDeadLetterQueue

  MetricsSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricsSnsTopic

  TemperatureSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity

  AllMetricsSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MetricsSnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn