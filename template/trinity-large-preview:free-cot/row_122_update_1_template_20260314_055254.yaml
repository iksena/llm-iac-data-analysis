AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for automated product creation

Parameters:
  ShopifyApiKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: ''
    NoEcho: true
    MinLength: 1
    MaxLength: 256

Resources:
  MyShopifyAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyAppBus
      EventSourceName: MyShopifyApp

  ShopifyApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeApiDestinationAccess

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      Description: API destination for creating products in Shopify
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2024-01/products.json
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt ShopifyApiConnection.Arn
      InvocationHttpParameters:
        HeaderParameters:
          Content-Type: application/json
          X-Shopify-Access-Token: !Ref ShopifyApiKey

  ShopifyApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyApiKey

  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ShopifyProductCreationRule
      Description: Rule to trigger Shopify product creation
      EventBusName: !Ref MyShopifyAppEventBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyApiDestination.Arn
          Id: ShopifyProductTarget

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref MyShopifyAppEventBus
  ApiDestinationName:
    Description: Name of the Shopify API destination
    Value: !Ref ShopifyApiDestination