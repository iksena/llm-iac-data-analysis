AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Authentication

Parameters:
  FrontendZipUrl:
    Type: String
    Default: 'https://example.com/slot-machine-frontend.zip'
    Description: URL to download the pre-built frontend ZIP file
  CognitoIdentityPoolName:
    Type: String
    Default: 'SlotMachineIdentityPool'
    Description: Name for the Cognito Identity Pool

Resources:
  # S3 Bucket for Static Website
  SlotMachineBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html

  # S3 Bucket Policy for Public Access
  SlotMachineBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SlotMachineBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${SlotMachineBucket}/*'

  # IAM Role for Lambda Execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # Lambda Function for Slot Machine Logic
  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import random

          def handler(event, context):
              symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎', '7']
              result = [random.choice(symbols) for _ in range(3)]

              if result[0] == result[1] == result[2]:
                  outcome = 'win'
                  message = f'Jackpot! {result[0]} {result[1]} {result[2]}'
              elif result[0] == result[1] or result[1] == result[2] or result[0] == result[2]:
                  outcome = 'win'
                  message = f'Win! {result[0]} {result[1]} {result[2]}'
              else:
                  outcome = 'lose'
                  message = f'Lose! {result[0]} {result[1]} {result[2]}'

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'outcome': outcome,
                      'message': message
                  })
              }

  # IAM Role for Cognito Unauthenticated Users
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: 'sts:AssumeRoleWithWebIdentity'
            Condition:
              StringEquals:
                'cognito-identity.amazonaws.com:aud': !Ref CognitoIdentityPool
              'ForAnyValue:StringLike':
                'cognito-identity.amazonaws.com:amr': unauthenticated
      Policies:
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'lambda:InvokeFunction'
                Resource: !GetAtt SlotMachineLambda.Arn

  # Cognito Identity Pool
  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true

  # Role Attachment for Cognito Identity Pool
  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

  # Custom Resource Lambda for Frontend Deployment
  FrontendDeployerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 256
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import zipfile
          import urllib.request
          import cfnresponse
          import os
          import tempfile

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      s3 = boto3.client('s3')
                      bucket_name = event['ResourceProperties']['BucketName']
                      zip_url = event['ResourceProperties']['ZipUrl']
                      cognito_id = event['ResourceProperties']['CognitoIdentityPoolId']
                      region = event['ResourceProperties']['Region']

                      with urllib.request.urlopen(zip_url) as zip_response:
                          zip_data = zip_response.read()

                      with tempfile.TemporaryDirectory() as temp_dir:
                          zip_path = os.path.join(temp_dir, 'frontend.zip')
                          with open(zip_path, 'wb') as f:
                              f.write(zip_data)

                          with zipfile.ZipFile(zip_path, 'r') as zip_ref:
                              zip_ref.extractall(temp_dir)

                          for root, dirs, files in os.walk(temp_dir):
                              for file in files:
                                  if file.endswith('.js') or file.endswith('.html'):
                                      file_path = os.path.join(root, file)
                                      with open(file_path, 'r', encoding='utf-8') as f:
                                          content = f.read()

                                      new_content = content.replace(
                                          '/* COGNITO_CONFIG */',
                                          f"""
                                          const COGNITO_CONFIG = {{
                                              IdentityPoolId: '{cognito_id}',
                                              Region: '{region}'
                                          }};
                                          """
                                      )

                                      with open(file_path, 'w', encoding='utf-8') as f:
                                          f.write(new_content)

                          for root, dirs, files in os.walk(temp_dir):
                              for file in files:
                                  local_path = os.path.join(root, file)
                                  s3_key = os.path.relpath(local_path, temp_dir)
                                  s3.upload_file(local_path, bucket_name, s3_key)

                  elif event['RequestType'] == 'Delete':
                      pass

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # Custom Resource for Frontend Deployment
  FrontendDeployer:
    Type: Custom::FrontendDeployer
    Properties:
      ServiceToken: !GetAtt FrontendDeployerLambda.Arn
      BucketName: !Ref SlotMachineBucket
      ZipUrl: !Ref FrontendZipUrl
      CognitoIdentityPoolId: !Ref CognitoIdentityPool
      Region: !Ref 'AWS::Region'

Outputs:
  WebsiteURL:
    Value: !GetAtt SlotMachineBucket.WebsiteURL
    Description: URL of the slot machine website
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: Cognito Identity Pool ID for frontend configuration