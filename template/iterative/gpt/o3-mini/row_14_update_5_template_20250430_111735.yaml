AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Elastic Network Interface (ENI)
  with one primary and two secondary private IP addresses, and to associate
  two Elastic IPs with the secondary private IPs for multi-public IP capabilities.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The Subnet ID where the ENI will be created.
  PrimaryPrivateIp:
    Type: String
    Description: The primary private IP address for the ENI. Must be within the subnet CIDR.
  PrivateIp1:
    Type: String
    Description: The first secondary private IP address for the ENI. Must be within the subnet CIDR.
  PrivateIp2:
    Type: String
    Description: The second secondary private IP address for the ENI. Must be within the subnet CIDR.

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: "ENI with one primary and two secondary private IP addresses."
      PrivateIpAddresses:
        - PrivateIpAddress: !Ref PrimaryPrivateIp
          Primary: true
        - PrivateIpAddress: !Ref PrivateIp1
          Primary: false
        - PrivateIpAddress: !Ref PrivateIp2
          Primary: false
      Tags:
        - Key: Name
          Value: MultiIP-ENI

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP1, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp1

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt [ElasticIP2, AllocationId]
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp2

Outputs:
  NetworkInterfaceId:
    Description: "The ID of the created Elastic Network Interface."
    Value: !Ref NetworkInterface
  SecondaryElasticIP1:
    Description: "The public Elastic IP associated with the first secondary private IP."
    Value: !GetAtt [ElasticIP1, PublicIp]
  SecondaryElasticIP2:
    Description: "The public Elastic IP associated with the second secondary private IP."
    Value: !GetAtt [ElasticIP2, PublicIp]