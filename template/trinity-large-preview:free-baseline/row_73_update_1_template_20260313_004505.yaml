AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster with Fargate and Fargate Spot Capacity Providers

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AWS::StackName}-ECSCluster

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: Fargate
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/FargateAutoScalingGroup
        ManagedScaling:
          MaximumScalingStepSize: 100
          MinimumScalingStepSize: 1
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: Fargate

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FargateSpot
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/FargateSpotAutoScalingGroup
        ManagedScaling:
          MaximumScalingStepSize: 100
          MinimumScalingStepSize: 1
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: FargateSpot

  ClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - !Ref FargateCapacityProvider
        - !Ref FargateSpotCapacityProvider
      DefaultCapacityProviderStrategy:
        - Base: 0
          Weight: 1
          CapacityProvider: Fargate
        - Base: 0
          Weight: 1
          CapacityProvider: FargateSpot