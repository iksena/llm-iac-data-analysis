AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates a CloudWatch Dashboard with four CloudWatch Logs Insights widgets for NAT Gateway VPC flow logs'

Parameters:
  LogGroupName:
    Type: String
    Description: The name of the VPC Flow Logs log group to query
    Default: '/aws/vpc/flowlogs'
  
  DashboardName:
    Type: String
    Description: Name for the CloudWatch Dashboard
    Default: 'NAT-Gateway-Traffic-Dashboard'
    
  TimeRangeInHours:
    Type: Number
    Description: Time range for the dashboard widgets in hours
    Default: 24
    MinValue: 1
    MaxValue: 168

Resources:
  NATGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | filter action = 'ACCEPT' | stats count() as requestCount by srcAddr | sort requestCount desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Outbound Traffic Count",
                "view": "table",
                "period": ${TimeRangeInHours * 3600}
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | filter action = 'ACCEPT' | stats sum(bytes) as totalBytes by srcAddr | sort totalBytes desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Outbound Traffic Bytes",
                "view": "table",
                "period": ${TimeRangeInHours * 3600}
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | filter action = 'REJECT' | stats count() as rejectedCount by srcAddr | sort rejectedCount desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Rejected Connections Count",
                "view": "table",
                "period": ${TimeRangeInHours * 3600}
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | filter action = 'REJECT' | stats sum(bytes) as rejectedBytes by srcAddr | sort rejectedBytes desc | limit 10",
                "region": "${AWS::Region}",
                "stacked": false,
                "title": "Top Source IPs by Rejected Connections Bytes",
                "view": "table",
                "period": ${TimeRangeInHours * 3600}
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL to access the NAT Gateway Traffic Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"