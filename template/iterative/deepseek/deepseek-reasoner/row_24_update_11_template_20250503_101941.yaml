AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VPCCidr:
    Type: String
    Default: 10.0.0.0/16
  Subnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
  Subnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
  InstanceType:
    Type: String
    Default: t3.micro
  AMIId:
    Type: AWS::EC2::Image::Id
    Description: Latest Amazon Linux 2 AMI
  CacheNodeType:
    Type: String
    Default: cache.t3.micro
    AllowedValues:
      - cache.t3.micro
      - cache.m4.large
      - cache.r5.large
  SnapshotRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 35
  EnableSnapshotting:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Mappings:
  RegionMap:
    us-east-1:
      AZ1: us-east-1a
      AZ2: us-east-1b
    us-west-2:
      AZ1: us-west-2a
      AZ2: us-west-2b
    eu-west-1:
      AZ1: eu-west-1a
      AZ2: eu-west-1b

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1Cidr
      AvailabilityZone: !FindInMap [RegionMap, !Ref "AWS::Region", AZ1]

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2Cidr
      AvailabilityZone: !FindInMap [RegionMap, !Ref "AWS::Region", AZ2]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Enable HTTP/HTTPS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: ElastiCache Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EC2SecurityGroup

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AMIId
        InstanceType: !Ref InstanceType
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups: [!Ref EC2SecurityGroup]
            AssociatePublicIpAddress: true
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      VPCZoneIdentifier: [!Ref Subnet1, !Ref Subnet2]

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: ElastiCache Subnet Group
      SubnetIds: [!Ref Subnet1, !Ref Subnet2]

  ReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: "ElastiCache Replication Group"
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      CacheNodeType: !Ref CacheNodeType
      NumNodeGroups: 1
      ReplicasPerNodeGroup: 1
      Engine: redis
      EngineVersion: '6.x'
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds: [!Ref ElastiCacheSecurityGroup]
      SnapshotRetentionLimit: !If [EnableSnapshottingCondition, !Ref SnapshotRetentionPeriod, 0]
      SnapshotWindow: "05:00-09:00"

  SnapshotLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [lambda.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: ElastiCacheSnapshotPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['elasticache:ModifyReplicationGroup']
                Resource: !Sub "arn:aws:elasticache:${AWS::Region}:${AWS::AccountId}:replicationgroup:${ReplicationGroup}"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SnapshotLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt SnapshotLambdaRole.Arn
      Environment:
        Variables:
          REPLICATION_GROUP_ID: !Ref ReplicationGroup
      Code:
        ZipFile: |
          import os
          import boto3
          def lambda_handler(event, context):
              client = boto3.client('elasticache')
              group_id = os.environ['REPLICATION_GROUP_ID']
              retention = event.get('SnapshotRetentionPeriod', 7)
              client.modify_replication_group(
                  ReplicationGroupId=group_id,
                  SnapshotRetentionLimit=int(retention),
                  ApplyImmediately=True
              )
      Timeout: 30

Conditions:
  EnableSnapshottingCondition: !Equals [!Ref EnableSnapshotting, 'true']

Outputs:
  VPCID:
    Value: !Ref VPC
  SubnetIDs:
    Value: !Join [",", [!Ref Subnet1, !Ref Subnet2]]
  ElastiCachePrimaryEndpoint:
    Value: !GetAtt ReplicationGroup.PrimaryEndPoint.Address
  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
  LambdaARN:
    Value: !GetAtt SnapshotLambda.Arn