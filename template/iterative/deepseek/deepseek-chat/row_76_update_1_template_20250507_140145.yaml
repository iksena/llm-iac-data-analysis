AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Roles with tiered permissions for FIS access control'

Resources:
  SecurityAdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'SecurityAdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: 'SecurityAdminFISPermissions'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action: 'fis:*'
                Resource: '*'
              - Effect: 'Allow'
                Action: 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/fis.amazonaws.com/*'
              - Effect: 'Allow'
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'
                Condition:
                  StringLike:
                    'iam:AWSServiceName': 'fis.amazonaws.com'

  AdminRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'AdminRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: 'AdminFISPermissions'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringNotLike:
                    'aws:ResourceTag/Environment': 'prod'
              - Effect: 'Allow'
                Action: 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/fis.amazonaws.com/*'

  UserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'UserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: 'UserFISPermissions'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:List*'
                  - 'fis:Get*'
                  - 'fis:TagResource'
                Resource: '*'
                Condition:
                  StringNotLike:
                    'aws:ResourceTag/Environment': 'prod'

  NonUserRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'NonUserRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: 'NonUserFISRestrictions'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Deny'
                Action: 'fis:*'
                Resource: '*'

Outputs:
  SecurityAdminRoleARN:
    Description: 'ARN of the Security Admin role'
    Value: !GetAtt SecurityAdminRole.Arn
  AdminRoleARN:
    Description: 'ARN of the Admin role'
    Value: !GetAtt AdminRole.Arn
  UserRoleARN:
    Description: 'ARN of the User role'
    Value: !GetAtt UserRole.Arn
  NonUserRoleARN:
    Description: 'ARN of the Non-User role'
    Value: !GetAtt NonUserRole.Arn