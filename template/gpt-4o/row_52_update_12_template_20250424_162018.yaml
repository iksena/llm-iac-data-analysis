AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a multi-region application failover architecture
  using Amazon Route 53 Application Recovery Controller (ARC).

Parameters:
  HealthCheckEndpointPrimary:
    Type: String
    Description: The endpoint URL for the primary region health check.
    Default: example-primary.com
  HealthCheckEndpointSecondary:
    Type: String
    Description: The endpoint URL for the secondary region health check.
    Default: example-secondary.com

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: MultiRegionRecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      ClusterArn: !Ref RecoveryCluster
      Name: MultiRegionControlPanel

  RoutingControlPrimary:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !Ref ControlPanel
      Name: PrimaryRegionRoutingControl

  RoutingControlSecondary:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !Ref ControlPanel
      Name: SecondaryRegionRoutingControl

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !Ref ControlPanel
      Name: AtLeastOneRegionActiveRule
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
      AssertionRule:
        AssertedControls:
          - !Ref RoutingControlPrimary
          - !Ref RoutingControlSecondary
        WaitPeriodMs: 5000

  HealthCheckPrimary:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        ResourcePath: /
        FullyQualifiedDomainName: !Ref HealthCheckEndpointPrimary
        RequestInterval: 30
        FailureThreshold: 3

  HealthCheckSecondary:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        ResourcePath: /
        FullyQualifiedDomainName: !Ref HealthCheckEndpointSecondary
        RequestInterval: 30
        FailureThreshold: 3

Outputs:
  RecoveryClusterArn:
    Description: The ARN of the recovery cluster.
    Value: !Ref RecoveryCluster

  ControlPanelArn:
    Description: The ARN of the control panel.
    Value: !Ref ControlPanel

  RoutingControlPrimaryArn:
    Description: The ARN of the primary region routing control.
    Value: !Ref RoutingControlPrimary

  RoutingControlSecondaryArn:
    Description: The ARN of the secondary region routing control.
    Value: !Ref RoutingControlSecondary

  SafetyRuleArn:
    Description: The ARN of the safety rule.
    Value: !Ref SafetyRule

  HealthCheckPrimaryId:
    Description: The ID of the primary region health check.
    Value: !Ref HealthCheckPrimary

  HealthCheckSecondaryId:
    Description: The ID of the secondary region health check.
    Value: !Ref HealthCheckSecondary