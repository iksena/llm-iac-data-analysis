AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an Amazon ECS Cluster with Fargate and Fargate Spot capacity providers.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the ECS Cluster will be deployed.
    Default: vpc-12345678  # Replace with a valid default VPC ID or ensure it's provided during stack creation.

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster

  ECSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS cluster
      VpcId: !Ref VpcId

  ECSClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

Outputs:
  ECSClusterARN:
    Description: The ARN of the ECS Cluster.
    Value: !GetAtt ECSCluster.Arn
  ECSClusterName:
    Description: The name of the ECS Cluster.
    Value: !Ref ECSCluster

# Note: Ensure that you provide a valid VPC ID when deploying this template. If a default is set, replace it with a valid VPC ID.