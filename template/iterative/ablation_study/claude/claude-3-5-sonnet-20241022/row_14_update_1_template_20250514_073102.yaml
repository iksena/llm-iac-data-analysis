AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with multiple EIPs and secondary private IPs'

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the ENI will be created

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security Group ID for the ENI

  SecondaryPrivateIpCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 5
    Description: Number of secondary private IP addresses to allocate

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: Network Interface with multiple IPs
      GroupSet: 
        - !Ref SecurityGroupId
      SecondaryPrivateIpAddressCount: !Ref SecondaryPrivateIpCount

  FirstEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  SecondEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Select [0, !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

Outputs:
  NetworkInterfaceId:
    Description: ID of the created Network Interface
    Value: !Ref NetworkInterface
    Export:
      Name: !Sub "${AWS::StackName}-ENI-ID"

  PrimaryPrivateIP:
    Description: Primary Private IP of the ENI
    Value: !GetAtt NetworkInterface.PrimaryPrivateIpAddress

  SecondaryPrivateIPs:
    Description: Secondary Private IPs of the ENI
    Value: !Join [", ", !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]

  FirstPublicIP:
    Description: First Elastic IP Address
    Value: !Ref FirstEIP

  SecondPublicIP:
    Description: Second Elastic IP Address
    Value: !Ref SecondEIP