AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Elastic Network Interface (ENI) with one primary and two secondary
  private IP addresses, and to associate two Elastic IP addresses with the secondary private IPs.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The Subnet ID where the ENI will be created.
  PrimaryPrivateIp:
    Type: String
    Description: The primary private IP address for the ENI. Must be within the subnet's CIDR.
  PrivateIp1:
    Type: String
    Description: The first secondary private IP address for the ENI. Must be within the subnet's CIDR.
  PrivateIp2:
    Type: String
    Description: The second secondary private IP address for the ENI. Must be within the subnet's CIDR.

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: "ENI configured with one primary and two secondary private IP addresses."
      PrivateIpAddresses:
        - Primary: true
          PrivateIpAddress: !Ref PrimaryPrivateIp
        - Primary: false
          PrivateIpAddress: !Ref PrivateIp1
        - Primary: false
          PrivateIpAddress: !Ref PrivateIp2
      Tags:
        - Key: Name
          Value: MultiIP-ENI

  ElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp1
    DependsOn:
      - NetworkInterface
      - ElasticIP1

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrivateIp2
    DependsOn:
      - NetworkInterface
      - ElasticIP2

Outputs:
  NetworkInterfaceId:
    Description: "The ID of the created Elastic Network Interface."
    Value: !Ref NetworkInterface
  SecondaryElasticIP1:
    Description: "The allocated Elastic IP associated with the first secondary private IP."
    Value: !GetAtt ElasticIP1.PublicIp
  SecondaryElasticIP2:
    Description: "The allocated Elastic IP associated with the second secondary private IP."
    Value: !GetAtt ElasticIP2.PublicIp