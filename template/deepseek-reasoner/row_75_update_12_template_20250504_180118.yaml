AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC ID for the EC2 instance (use existing VPC)
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID for instance placement (use existing subnet)
  InstanceType:
    Type: String
    AllowedValues: [t3.nano, t3.micro, t3.small, t3.medium, t3.large]
    Default: t3.micro
    Description: EC2 instance type for stress testing
  AMIId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base
    Description: Windows Server 2019 AMI from SSM

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSM access
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: CPU-Stress-Tester

  StressTestSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: CPU stress test via thread generation
        parameters:
          Duration:
            type: String
            default: '60'
            description: Test duration in seconds
        mainSteps:
          - action: aws:runPowerShellScript
            name: StressCPU
            inputs:
              runCommand:
                - |
                  $duration = {{ Duration }}
                  $procCount = (Get-WmiObject Win32_ComputerSystem).NumberOfLogicalProcessors
                  
                  $threads = @()
                  for ($i=0; $i -lt $procCount; $i++) {
                      $threads += [System.Threading.Thread]::new({
                          $endTime = (Get-Date).AddSeconds($duration)
                          while ((Get-Date) -lt $endTime) {}
                      })
                  }
                  $threads.ForEach({ $_.Start() })
                  $threads.ForEach({ $_.Join() })

  FISExperimentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FISPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: '*'

Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: Stress test instance ID
  SSMDocumentName:
    Value: !Ref StressTestSSMDocument
    Description: SSM document for CPU stress testing
  FISRoleARN:
    Value: !GetAtt FISExperimentRole.Arn
    Description: IAM role ARN for FIS experiments