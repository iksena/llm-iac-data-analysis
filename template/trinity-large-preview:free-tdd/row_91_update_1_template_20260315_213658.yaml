AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for VPC Flow Logs with Lifecycle Management and Access Controls

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket for VPC flow logs
    Default: vpc-flow-logs-bucket
  VersioningStatus:
    Type: String
    Description: Versioning status for the S3 bucket (Enabled/Disabled)
    Default: Enabled
    AllowedValues:
      - Enabled
      - Suspended
  TransitionDays:
    Type: Number
    Description: Number of days before transitioning logs to Glacier
    Default: 30
  ExpirationDays:
    Type: Number
    Description: Number of days before deleting logs
    Default: 365000

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransitionRule
            Status: Enabled
            Transitions:
              - Days: !Ref TransitionDays
                StorageClass: GLACIER
            Expiration:
              Days: !Ref ExpirationDays

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${VPCFlowLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Description: Name of the VPC Flow Logs S3 Bucket
    Value: !Ref VPCFlowLogsBucket
  BucketArn:
    Description: ARN of the VPC Flow Logs S3 Bucket
    Value: !GetAtt VPCFlowLogsBucket.Arn