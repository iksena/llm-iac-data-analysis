AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready Aurora MySQL cluster with CloudWatch Logs integration'
Parameters:
  DBName:
    Type: String
    Default: 'mydb'
    Description: 'Database name'
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9_]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters and underscores'
  DBUsername:
    Type: String
    Default: 'admin'
    Description: 'Master database username'
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
  DBPassword:
    Type: String
    NoEcho: true
    Description: 'Master database password'
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9]+'
    ConstraintDescription: 'Must contain only alphanumeric characters'
  EngineVersion:
    Type: String
    Default: '5.7.mysql_aurora.2.10.2'
    Description: 'Aurora MySQL engine version'
  InstanceType:
    Type: String
    Default: 'db.t3.large'
    Description: 'DB instance class'
  SubnetIds:
    Type: CommaDelimitedList
    Description: 'At least two VPC subnet IDs in different Availability Zones'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where the cluster will be deployed'

Resources:
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for Aurora MySQL cluster'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: 'Aurora-Cluster-SG'

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora MySQL cluster'
      SubnetIds: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: 'Aurora-Subnet-Group'

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: 'Parameter group enabling CloudWatch Logs for Aurora MySQL'
      Family: 'aurora-mysql5.7'
      Parameters:
        log_output: 'none'
      Tags:
        - Key: Name
          Value: 'Aurora-CloudWatch-Params'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: 'aurora-mysql'
      EngineVersion: !Ref EngineVersion
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      EnableCloudwatchLogsExports:
        - 'error'
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DatabaseName: !Ref DBName
      BackupRetentionPeriod: 7
      Port: 3306
      Tags:
        - Key: Name
          Value: 'Aurora-MySQL-Cluster'

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref InstanceType
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: 'Aurora-Instance-Primary'

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: !Ref InstanceType
      DBClusterIdentifier: !Ref DBCluster
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: 'Aurora-Instance-Secondary'

Outputs:
  ClusterEndpoint:
    Description: 'Cluster endpoint for writer connections'
    Value: !GetAtt DBCluster.Endpoint.Address
  ClusterPort:
    Description: 'Cluster port'
    Value: !GetAtt DBCluster.Endpoint.Port
  ReaderEndpoint:
    Description: 'Cluster reader endpoint'
    Value: !GetAtt DBCluster.ReaderEndpoint.Address
  PrimaryInstanceEndpoint:
    Description: 'Primary instance endpoint'
    Value: !GetAtt DBInstance1.Endpoint.Address
  SecondaryInstanceEndpoint:
    Description: 'Secondary instance endpoint'
    Value: !GetAtt DBInstance2.Endpoint.Address