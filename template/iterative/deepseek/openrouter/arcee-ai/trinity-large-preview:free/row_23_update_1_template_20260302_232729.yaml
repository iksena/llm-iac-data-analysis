AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: The name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: The read capacity units for the table
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: The write capacity units for the table
  BillingMode:
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: The billing mode for the table

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !Ref BillingMode
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref MyDynamoDBTable
  TableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt MyDynamoDBTable.Arn