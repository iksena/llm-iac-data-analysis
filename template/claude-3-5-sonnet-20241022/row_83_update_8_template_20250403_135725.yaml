AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Transit Gateway and shares it via RAM to specified AWS account'

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: 'enable'
      DefaultRouteTableAssociation: 'enable'
      DefaultRouteTablePropagation: 'enable'
      Description: 'Transit Gateway for cross-account network connectivity'
      Tags:
        - Key: Name
          Value: CrossAccountTransitGateway
        - Key: Purpose
          Value: NetworkConnectivity

  ResourceShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: 'TransitGatewayShare'
      AllowExternalPrincipals: true
      Principals: 
        - '644519422710'
      ResourceArns:
        - !Sub 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Tags:
        - Key: Purpose
          Value: TransitGatewaySharing

Outputs:
  TransitGatewayId:
    Description: 'ID of the created Transit Gateway'
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareArn:
    Description: 'ARN of the RAM Resource Share'
    Value: !Ref ResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareArn'