AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template that integrates AWS EventBridge with Stripe's product API.
  It provisions an Event Bus for PartnerApp events, a Connection using an API key,
  an API Destination pointing to StripeˇŻs endpoint, an IAM Role for invocation,
  and an EventBridge Rule to forward matching events.

Parameters:
  StripeApiKey:
    Description: The API key used for authenticating with Stripe's product API.
    Type: String
    NoEcho: true

Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus

  StripeApiConnection:
    Type: AWS::Events::Connection
    Properties:
      ConnectionName: StripeApiConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Ref StripeApiKey

  StripeProductApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductApiDestination
      ConnectionArn: !GetAtt StripeApiConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: "https://api.stripe.com/v1/products"
      InvocationRateLimitPerSecond: 10

  EventBridgeApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeApiDestinationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt StripeProductApiDestination.Arn

  PartnerAppToStripeProductRule:
    Type: AWS::Events::Rule
    Properties:
      Name: PartnerAppToStripeProductRule
      Description: Forward PartnerApp events to Stripe's product API.
      EventBusName: !Ref PartnerAppEventBus
      EventPattern:
        source:
          - "PartnerApp"
        detail-type:
          - "PartnerAppDetailType"
      Targets:
        - Id: StripeProductApiDestinationTarget
          Arn: !GetAtt StripeProductApiDestination.Arn
          RoleArn: !GetAtt EventBridgeApiDestinationRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the EventBridge event bus.
    Value: !GetAtt PartnerAppEventBus.Arn
  StripeApiConnectionArn:
    Description: ARN of the Connection resource to Stripe's API.
    Value: !GetAtt StripeApiConnection.Arn
  StripeProductApiDestinationArn:
    Description: ARN of the API Destination for Stripe's product API.
    Value: !GetAtt StripeProductApiDestination.Arn
  EventBridgeApiDestinationRoleArn:
    Description: ARN of the IAM Role used by EventBridge for invoking the API Destination.
    Value: !GetAtt EventBridgeApiDestinationRole.Arn