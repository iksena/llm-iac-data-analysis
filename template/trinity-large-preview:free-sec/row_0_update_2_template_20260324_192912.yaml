AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs

Outputs:
  QueueUrl:
    Description: URL of the created SQS queue
    Value: !Ref MySQSQueue
  QueueArn:
    Description: ARN of the created SQS queue
    Value: !GetAtt MySQSQueue.Arn