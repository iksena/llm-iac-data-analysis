AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template to create a private Route 53 hosted zone'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where the private hosted zone will be associated'

Resources:
  PrivateHostedZone:
    Type: 'AWS::Route53::HostedZone'
    Properties:
      Name: 'www.example.com'
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref 'AWS::Region'
      HostedZoneConfig:
        Comment: 'Private hosted zone for internal DNS resolution'
      Tags:
        - Key: Name
          Value: 'www.example.com Private Zone'

Outputs:
  HostedZoneId:
    Description: 'The ID of the private hosted zone'
    Value: !Ref PrivateHostedZone

  DomainName:
    Description: 'The domain name of the private hosted zone'
    Value: 'www.example.com'