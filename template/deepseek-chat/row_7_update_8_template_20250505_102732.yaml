AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM remote management capabilities'

Parameters:
  KeyName:
    Description: 'Name of an existing EC2 KeyPair to enable SSH access'
    Type: 'AWS::EC2::KeyPair::KeyName'
    Default: ''
  EnvironmentType:
    Description: 'Environment type'
    Type: String
    Default: 'dev'
    AllowedValues: 
      - 'dev'
      - 'test'
      - 'prod'
    ConstraintDescription: 'Must be dev, test, or prod'
  VpcId:
    Description: 'ID of the VPC'
    Type: 'AWS::EC2::VPC::Id'
  SubnetId:
    Description: 'ID of the subnet for the instance'
    Type: 'AWS::EC2::Subnet::Id'

Mappings:
  RegionMap:
    us-east-1:
      AMI: 'ami-0c2b8ca1dad447f8a' # Amazon Linux 2 AMI
    us-west-2:
      AMI: 'ami-0efcece6bed30fd98' # Amazon Linux 2 AMI
    eu-west-1:
      AMI: 'ami-0d1a7f811ae1b6b0e' # Amazon Linux 2 AMI
    ap-southeast-1:
      AMI: 'ami-0b0f138edf5a5c0a9' # Amazon Linux 2 AMI

Resources:
  SSMInstanceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Path: '/'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ssm-role'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - Ref: SSMInstanceRole

  InstanceSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Enable outbound access for SSM'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: 'Allow all outbound traffic'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  EC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !FindInMap ['RegionMap', !Ref 'AWS::Region', 'AMI']
      InstanceType: 't3.micro'
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-instance'
        - Key: Environment
          Value: !Ref EnvironmentType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      UserData:
        Fn::Base64: |
          #!/bin/bash
          sudo yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          sudo systemctl enable amazon-ssm-agent
          sudo systemctl start amazon-ssm-agent

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Outputs:
  InstanceId:
    Description: 'Instance ID of the EC2 instance'
    Value: !Ref EC2Instance
  InstancePrivateIp:
    Description: 'Private IP address of the instance'
    Value: !GetAtt EC2Instance.PrivateIp
  SSMCommand:
    Description: 'Command to start SSM session'
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'