<cdk_assertions>
    # Assert IAM Groups exist
    template.resource_count_is("AWS::IAM::Group", 3)

    # Assert IAM Roles exist
    template.resource_count_is("AWS::IAM::Role", 5)

    # Assert PrivilegedAdminRole with MFA protection
    template.has_resource_properties("AWS::IAM::Role", {
        "RoleName": "PrivilegedAdmin",
        "Policies": Match.array_with({
            "PolicyName": "MFAProtection",
            "PolicyDocument": Match.object_like({
                "Statement": Match.array_with({
                    "Effect": "Allow",
                    "Action": "sts:AssumeRole",
                    "Condition": Match.object_like({
                        "Bool": Match.object_like({
                            "aws:MultiFactorAuthPresent": True
                        })
                    })
                })
            })
        })
    })

    # Assert RestrictedAdminRole with cross-account trust
    template.has_resource_properties("AWS::IAM::Role", {
        "RoleName": "RestrictedAdmin",
        "AssumeRolePolicyDocument": Match.object_like({
            "Statement": Match.array_with({
                "Effect": "Allow",
                "Principal": Match.object_like({
                    "AWS": Match.array_with(
                        Match.string_like_regexp(r"arn:aws:iam::\d{12}:root")
                    )
                }),
                "Action": "sts:AssumeRole"
            })
        })
    })

    # Assert IdentityAdminRole with deny policies
    template.has_resource_properties("AWS::IAM::Role", {
        "RoleName": "IdentityAdmin",
        "Policies": Match.array_with({
            "PolicyName": "DenySensitiveOperations",
            "PolicyDocument": Match.object_like({
                "Statement": Match.array_with({
                    "Effect": "Deny",
                    "Action": Match.array_with("aws-portal:*", "cloudhsm:*"),
                    "Resource": "*"
                })
            })
        })
    })

    # Assert CloudFormationExecutionRole exists
    template.has_resource_properties("AWS::IAM::Role", {
        "RoleName": "CloudFormationExecutionRole",
        "AssumeRolePolicyDocument": Match.object_like({
            "Statement": Match.array_with({
                "Effect": "Allow",
                "Principal": Match.object_like({
                    "Service": "cloudformation.amazonaws.com"
                }),
                "Action": "sts:AssumeRole"
            })
        })
    })

    # Assert StackSetExecutionRole exists
    template.has_resource_properties("AWS::IAM::Role", {
        "RoleName": "StackSetExecutionRole",
        "AssumeRolePolicyDocument": Match.object_like({
            "Statement": Match.array_with({
                "Effect": "Allow",
                "Principal": Match.object_like({
                    "Service": "cloudformation.amazonaws.com"
                }),
                "Action": "sts:AssumeRole"
            })
        })
    })

    # Assert Outputs exist
    template.has_output("PrivilegedAdminRoleArn")
    template.has_output("RestrictedAdminRoleArn")
    template.has_output("IdentityAdminRoleArn")
    template.has_output("CloudFormationExecutionRoleArn")
    template.has_output("StackSetExecutionRoleArn")
</cdk_assertions>