AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Static Website on S3 with CloudFront CDN and Automated Deployment

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
  Region:
    Type: String
    Default: !Ref AWS::Region
    AllowedPattern: "^[a-z]{2}-[a-z]+-\d$"

Resources:
  StaticWebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Join ['-', [!Ref 'AWS::StackName', 'static-website', !Select [0, !Split ['-', !Ref 'AWS::Region']]]]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      WebsiteConfiguration:
        IndexDocument: index.html
      Tags:
        - Key: Name
          Value: !Join ['-', [!Ref 'AWS::StackName', 'static-website-bucket']]
        - Key: Environment
          Value: !Ref Environment

  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Join [' ', [!Ref 'AWS::StackName', 'OAI for static website']]

  StaticWebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticWebsiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Join ['', ['arn:aws:s3:::', !Ref StaticWebsiteBucket, '/*']]

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DeploymentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Join ['', ['arn:aws:s3:::', !Ref StaticWebsiteBucket, '/*']]
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  DeploymentLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket_name = event['ResourceProperties']['BucketName']

              try:
                  if event['RequestType'] == 'Create':
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body=b'<html><head><title>Static Website</title></head><body><h1>Welcome to our secure static website!</h1></body></html>',
                          ContentType='text/html'
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, None)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, None)

  DeploymentTrigger:
    Type: Custom::DeploymentTrigger
    Properties:
      ServiceToken: !GetAtt DeploymentLambda.Arn
      BucketName: !Ref StaticWebsiteBucket

  CleanupLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket_name = event['ResourceProperties']['BucketName']

              try:
                  if event['RequestType'] == 'Delete':
                      bucket_versioning = s3.get_bucket_versioning(Bucket=bucket_name)
                      delete_objects = {
                          'Objects': []
                      }

                      list_response = s3.list_objects_v2(Bucket=bucket_name)
                      if 'Contents' in list_response:
                          for content in list_response['Contents']:
                              delete_objects['Objects'].append({'Key': content['Key']})

                      if bucket_versioning.get('Status') == 'Enabled':
                          list_response = s3.list_object_versions(Bucket=bucket_name)
                          if 'Versions' in list_response:
                              for version in list_response['Versions']:
                                  delete_objects['Objects'].append({
                                      'Key': version['Key'],
                                      'VersionId': version['VersionId']
                                  })
                          if 'DeleteMarkers' in list_response:
                              for marker in list_response['DeleteMarkers']:
                                  delete_objects['Objects'].append({
                                      'Key': marker['Key'],
                                      'VersionId': marker['VersionId']
                                  })

                      if delete_objects['Objects']:
                          s3.delete_objects(Bucket=bucket_name, Delete=delete_objects)

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, None)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, None)

  CleanupTrigger:
    Type: Custom::CleanupTrigger
    DependsOn: DeploymentTrigger
    Properties:
      ServiceToken: !GetAtt CleanupLambda.Arn
      BucketName: !Ref StaticWebsiteBucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: CleanupTrigger
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt StaticWebsiteBucket.DomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Join ['', ['origin-access-identity/cloudfront/', !Ref CloudFrontOriginAccessIdentity]]
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_All
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          Compress: true
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        Restrictions:
          GeoRestriction:
            RestrictionType: none

Outputs:
  WebsiteURL:
    Description: URL of the static website
    Value: !GetAtt StaticWebsiteBucket.WebsiteURL
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Join ['', ['https://', !GetAtt CloudFrontDistribution.DomainName]]
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref StaticWebsiteBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution