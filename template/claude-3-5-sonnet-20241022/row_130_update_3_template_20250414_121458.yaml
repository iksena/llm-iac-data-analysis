AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for managing IAM account password policy with Lambda-based implementation'

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 8
    MaxValue: 128
    Description: Minimum length of IAM user passwords

  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase letter in passwords

  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase letter in passwords

  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one number in passwords

  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one symbol in passwords

  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: Number of days before password expires

  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords that users cannot reuse

  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow users to change their own passwords

  HardExpiry:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Prevent users from changing expired passwords

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PasswordPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:GetAccountPasswordPolicy
                Resource: '*'

  PasswordPolicyFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              iam = boto3.client('iam')
              response_data = {}
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      props = event['ResourceProperties']
                      iam.update_account_password_policy(
                          MinimumPasswordLength=int(props['MinimumPasswordLength']),
                          RequireSymbols=props['RequireSymbols'] == 'true',
                          RequireNumbers=props['RequireNumbers'] == 'true',
                          RequireUppercaseCharacters=props['RequireUppercase'] == 'true',
                          RequireLowercaseCharacters=props['RequireLowercase'] == 'true',
                          AllowUsersToChangePassword=props['AllowUsersToChangePassword'] == 'true',
                          MaxPasswordAge=int(props['MaxPasswordAge']),
                          PasswordReusePrevention=int(props['PasswordReusePrevention']),
                          HardExpiry=props['HardExpiry'] == 'true'
                      )
                      response_data['Status'] = 'SUCCESS'
                  elif event['RequestType'] == 'Delete':
                      iam.delete_account_password_policy()
                      response_data['Status'] = 'SUCCESS'
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Runtime: python3.9
      Timeout: 30
      MemorySize: 128

  PasswordPolicy:
    Type: Custom::PasswordPolicy
    DependsOn: PasswordPolicyFunction
    Properties:
      ServiceToken: !GetAtt PasswordPolicyFunction.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword
      HardExpiry: !Ref HardExpiry

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt PasswordPolicyFunction.Arn

  LambdaRoleArn:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn