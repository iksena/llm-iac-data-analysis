AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table with local and global secondary indexes
Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyTable
      AttributeDefinitions:
        - AttributeName: MyHashKey
          AttributeType: S
        - AttributeName: MyRangeKey
          AttributeType: N
        - AttributeName: MyGlobalKey
          AttributeType: S
      KeySchema:
        - AttributeName: MyHashKey
          KeyType: HASH
        - AttributeName: MyRangeKey
          KeyType: RANGE
      LocalSecondaryIndex:
        - IndexName: MyLocalIndex
          KeySchema:
            - AttributeName: MyHashKey
              KeyType: HASH
            - AttributeName: MyRangeKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndex:
        - IndexName: MyGlobalIndex
          KeySchema:
            - AttributeName: MyGlobalKey
              KeyType: HASH
            - AttributeName: MyRangeKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true

Outputs:
  MyDynamoDBTableArn:
    Value: !GetAtt MyDynamoDBTable.Arn
    Description: The ARN of the DynamoDB table
  MyDynamoDBTableName:
    Value: !Ref MyDynamoDBTable
    Description: The name of the DynamoDB table

