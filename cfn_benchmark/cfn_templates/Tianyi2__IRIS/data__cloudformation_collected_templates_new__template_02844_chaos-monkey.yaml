AWSTemplateFormatVersion: '2010-09-09'
Description: Create the Compute resources for the AEM Chaos Monkey
Outputs:
  ChaosMonkeyAutoScalingGroup:
    Description: The Chaos Monkey Auto Scaling Group
    Export:
      Name:
        Fn::Sub: ${MainStackPrefixParameter}-ChaosMonkeyAutoScalingGroup
    Value:
      Ref: ChaosMonkeyAutoScalingGroup
  ChaosMonkeyLaunchTemplate:
    Description: The Chaos Monkey Launch Template
    Value:
      Ref: ChaosMonkeyLaunchTemplate
Parameters:
  AemAwsStackProvisionerVersionParameter:
    Description: AEM AWS Stack Provisioner version number
    Type: String
  ChaosMonkeyASGAvailabilityZoneListParameter:
    Description: The Chaos Monkey Availability Zone List
    Type: List<AWS::EC2::AvailabilityZone::Name>
  ChaosMonkeyImageParameter:
    Description: The Chaos Monkey Image Id
    Type: AWS::EC2::Image::Id
  ChaosMonkeyImageRootDevice:
    Default: /dev/sda1
    Description: The root device name for the Chaos Monkey Image Id
    Type: String
  ChaosMonkeyInstanceTypeParameter:
    Description: The Chaos Monkey Instance Type
    Type: String
  ChaosMonkeyRootVolSizeParameter:
    Description: Chaos Monkey Instances Root EBS Volum Size
    Type: Number
  ChaosMonkeyEnableVolEncryptionParameter:
    AllowedValues:
    - true
    - false
    Description: Wether to enable or disable EBS volume encryption.
    Type: String
  ComputeKeyPairNameParameter:
    Description: The Compute Resources Key Pair Name
    Type: AWS::EC2::KeyPair::KeyName
  DataBucketNameParameter:
    Description: Bucket name that stores Stack data files
    Type: String
  MainStackPrefixParameter:
    Description: The AEM Stack Compute Resources Stack Prefix
    Type: String
  NetworkStackPrefixParameter:
    Description: The AEM Stack Network Resources Stack Prefix
    Type: String
  PrerequisitesStackPrefixParameter:
    Description: The AEM Stack Prerequisite Resources Stack Prefix
    Type: String
  HttpProxyParameter:
    Description: http_proxy parameter
    Type: String
  HttpsProxyParameter:
    Description: https_proxy parameter
    Type: String
  PreviewPublisherASG:
    Description: The Preview Publish Auto Scaling Group
    Type: String
    Default: ''
  PreviewPublisherDispatcherASG:
    Description: The Preview Publish Dispatcher Auto Scaling Group
    Type: String
    Default: ''
  NoProxyParameter:
    Description: no_proxy parameter
    Type: String
Resources:
  ChaosMonkeyAutoScalingGroup:
    Properties:
      AvailabilityZones:
        Ref: ChaosMonkeyASGAvailabilityZoneListParameter
      HealthCheckGracePeriod: 300
      HealthCheckType: EC2
      LaunchTemplate:
        Version:
          Fn::GetAtt:
          - ChaosMonkeyLaunchTemplate
          - LatestVersionNumber
        LaunchTemplateId:
          Ref: ChaosMonkeyLaunchTemplate
      MaxSize: 1
      MetricsCollection:
      - Granularity: 1Minute
        Metrics:
        - GroupMinSize
        - GroupMaxSize
        - GroupDesiredCapacity
        - GroupInServiceInstances
        - GroupPendingInstances
        - GroupStandbyInstances
        - GroupTerminatingInstances
        - GroupTotalInstances
      MinSize: 1
      Tags:
      - Key: Name
        PropagateAtLaunch: true
        Value: AEM Chaos Monkey
      - Key: StackPrefix
        PropagateAtLaunch: true
        Value:
          Ref: MainStackPrefixParameter
      - Key: Component
        PropagateAtLaunch: true
        Value: chaos-monkey
      - Key: OrchestratorASG
        PropagateAtLaunch: true
        Value:
          Fn::ImportValue:
            Fn::Sub: ${MainStackPrefixParameter}-OrchestratorAutoScalingGroup
      - Key: PublisherASG
        PropagateAtLaunch: true
        Value:
          Fn::ImportValue:
            Fn::Sub: ${MainStackPrefixParameter}-PublishAutoScalingGroup
      - Key: PreviewPublisherASG
        PropagateAtLaunch: true
        Value:
          Ref: PreviewPublisherASG
      - Key: PublisherDispatcherASG
        PropagateAtLaunch: true
        Value:
          Fn::ImportValue:
            Fn::Sub: ${MainStackPrefixParameter}-PublishDispatcherAutoScalingGroup
      - Key: PreviewPublisherDispatcherASG
        PropagateAtLaunch: true
        Value:
          Ref: PreviewPublisherDispatcherASG
      - Key: AuthorDispatcherASG
        PropagateAtLaunch: true
        Value:
          Fn::ImportValue:
            Fn::Sub: ${MainStackPrefixParameter}-AuthorDispatcherAutoScalingGroup
      VPCZoneIdentifier:
        Fn::Split:
        - ','
        - Fn::ImportValue:
            Fn::Sub: ${NetworkStackPrefixParameter}-ChaosMonkeySubnetList
    Type: AWS::AutoScaling::AutoScalingGroup
  ChaosMonkeyLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        BlockDeviceMappings:
        - DeviceName:
            Ref: ChaosMonkeyImageRootDevice
          Ebs:
            DeleteOnTermination: true
            Encrypted:
              Ref: ChaosMonkeyEnableVolEncryptionParameter
            VolumeSize:
              Ref: ChaosMonkeyRootVolSizeParameter
            VolumeType: gp2
        IamInstanceProfile:
          Name:
            Fn::ImportValue:
              Fn::Sub: ${PrerequisitesStackPrefixParameter}-ChaosMonkeyInstanceProfile
        ImageId:
          Ref: ChaosMonkeyImageParameter
        Monitoring:
          Enabled: false
        InstanceType:
          Ref: ChaosMonkeyInstanceTypeParameter
        KeyName:
          Ref: ComputeKeyPairNameParameter
        SecurityGroupIds:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-ChaosMonkeySecurityGroup
        UserData:
          Fn::Base64:
            Fn::Sub: |
              #cloud-config
              repo_upgrade: false
              repo_upgrade: false
              package_update: false
              package_upgrade: false

              runcmd:
              - set -x
              - export AWS_DEFAULT_REGION=${AWS::Region}
              - export no_proxy=${NoProxyParameter}
              - export http_proxy=${HttpProxyParameter}
              - export https_proxy=${HttpsProxyParameter}
              - source /etc/profile
              - mkdir -p /opt/shinesolutions/aem-aws-stack-builder/
              - until [[ $(aws s3 ls s3://${DataBucketNameParameter}/${MainStackPrefixParameter}/stack-init.sh) ]]; do echo "Waiting for EC2 initilsation to finish.";done
              - aws s3 cp s3://${DataBucketNameParameter}/${MainStackPrefixParameter}/stack-init.sh /opt/shinesolutions/aem-aws-stack-builder/stack-init.sh
              - chmod 755 /opt/shinesolutions/aem-aws-stack-builder/stack-init.sh
              - /opt/shinesolutions/aem-aws-stack-builder/stack-init.sh ${DataBucketNameParameter} ${MainStackPrefixParameter} chaos-monkey ${AemAwsStackProvisionerVersionParameter}
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
          - Key: Name
            Value: AEM Chaos Monkey Launch Template
          - Key: StackPrefix
            Value:
              Ref: MainStackPrefixParameter
  WarningChaosMonkeyNoInstanceAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
      - Fn::ImportValue:
          Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      AlarmDescription: No Chaos Monkey Instance in Service
      AlarmName:
        Fn::Sub: ${MainStackPrefixParameter}-Warning-ChaosMonkey-NoInstanceAlarm
      ComparisonOperator: LessThanThreshold
      Dimensions:
      - Name: AutoScalingGroupName
        Value:
          Ref: ChaosMonkeyAutoScalingGroup
      EvaluationPeriods: 5
      MetricName: GroupInServiceInstances
      Namespace: AWS/AutoScaling
      OKActions:
      - Fn::ImportValue:
          Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      Period: 60
      Statistic: Average
      Threshold: 1
      Tags:
      - Key: Name
        Value: Warning Chaos Monkey No Instance Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm

  WarningChaosMonkeyMemoryHighAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      AlarmDescription: Memory Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Warning-ChaosMonkey-MemoryHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
      EvaluationPeriods: 1
      MetricName: MemoryUtilization
      Namespace: "System/Linux"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      Period: 300
      Statistic: Average
      Threshold: 80
      Tags:
      - Key: Name
        Value: Warning Chaos Monkey Memory High Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm
  CriticalChaosMonkeyMemoryHighAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      AlarmDescription: Memory Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Critical-ChaosMonkey-MemoryHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
      EvaluationPeriods: 1
      MetricName: MemoryUtilization
      Namespace: "System/Linux"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      Period: 300
      Statistic: Average
      Threshold: 90
      Tags:
      - Key: Name
        Value: Critical Chaos Monkey Memory High Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm
  WarningChaosMonkeyRootDiskSpaceUtilizationAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      AlarmDescription: Disk Space Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Warning-ChaosMonkey-RootDiskSpaceHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
        - Name: MountPath
          Value: "/"
        - Name: Filesystem
          Value: "/"
      EvaluationPeriods: 1
      MetricName: DiskSpaceUtilization
      Namespace: "System/Linux"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      Period: 300
      Statistic: Average
      Threshold: 80
      Tags:
      - Key: Name
        Value: Warning Chaos Monkey Root Disk Space Utilization Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm
  CriticalChaosMonkeyRootDiskSpaceUtilizationAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      AlarmDescription: Disk Space Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Critical-ChaosMonkey-RootDiskSpaceHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
        - Name: MountPath
          Value: "/"
        - Name: Filesystem
          Value: "/"
      EvaluationPeriods: 1
      MetricName: DiskSpaceUtilization
      Namespace: "System/Linux"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      Period: 300
      Statistic: Average
      Threshold: 90
      Tags:
      - Key: Name
        Value: Critical Chaos Monkey Root Disk Space Utilization Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm
  WarningChaosMonkeyCPUUtilizationAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      AlarmDescription: CPU Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Warning-ChaosMonkey-CPUHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: "AWS/EC2"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-WarningAlarmNotificationTopic
      Period: 300
      Statistic: Maximum
      Threshold: 60
      Tags:
      - Key: Name
        Value: Warning Chaos Monkey CPU Utilization Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm
  CriticalChaosMonkeyCPUUtilizationAlarm:
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      AlarmDescription: CPU Utilization is high
      AlarmName:
        Fn::Sub:
          - "${MainStackPrefixParameter}-Critical-ChaosMonkey-CPUHighAlarm"
          - MainStackPrefixParameter:
              Ref: 'MainStackPrefixParameter'
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: "AutoScalingGroupName"
          Value:
            Ref: ChaosMonkeyAutoScalingGroup
      EvaluationPeriods: 1
      MetricName: CPUUtilization
      Namespace: "AWS/EC2"
      OKActions:
        - Fn::ImportValue:
            Fn::Sub: ${PrerequisitesStackPrefixParameter}-CriticalAlarmNotificationTopic
      Period: 300
      Statistic: Maximum
      Threshold: 90
      Tags:
      - Key: Name
        Value: Critical Chaos Monkey CPU Utilization Alarm
      - Key: StackPrefix
        Value:
          Ref: MainStackPrefixParameter
    Type: AWS::CloudWatch::Alarm