AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - IoT Core to SQS via SNS

Resources:
  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        - Protocol: sqs
          Endpoint: !GetAtt SqsQueue.Arn

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: DeviceDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref SnsTopic
              RoleArn: !GetAtt IoTRuleRole.Arn
      AwsIotSqlVersion: "2016-03-23"

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTRulePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SnsTopic

Outputs:
  SqsQueueUrl:
    Value: !Ref SqsQueue
  SnsTopicArn:
    Value: !Ref SnsTopic