AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS CloudFormation template to provision an AWS Batch environment for containerized batch jobs.
  This template creates a VPC with a public subnet, an S3 bucket for data I/O, IAM roles and an instance profile,
  along with AWS Batch components: a compute environment (using m5.large instances), a job queue, and a job definition
  that demonstrates basic workflow automation by installing the AWS CLI and copying files from/to S3.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "BatchVPC"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ""
      Tags:
        - Key: Name
          Value: "BatchPublicSubnet"

  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: "BatchIGW"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: "BatchPublicRouteTable"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref MyInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for AWS Batch compute environment"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "BatchSecurityGroup"

  BatchDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "batch-data-${AWS::AccountId}-${AWS::Region}"
      AccessControl: Private

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "BatchInstanceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
      Path: "/"

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: "BatchInstanceProfile"
      Roles:
        - !Ref BatchInstanceRole

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "AWSBatchServiceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Path: "/"

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: "BatchComputeEnvironment"
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        AllocationStrategy: BEST_FIT
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - m5.large
        Subnets:
          - !Ref PublicSubnet
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !Ref BatchInstanceProfile

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: "BatchJobQueue"
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: "BatchJobDefinition"
      Type: container
      ContainerProperties:
        Image: "amazonlinux"
        Vcpus: 1
        Memory: 1024
        Command:
          - "sh"
          - "-c"
          - !Sub "yum install -y aws-cli && aws s3 cp s3://${BatchDataBucket}/input.txt /tmp/input.txt && aws s3 cp /tmp/input.txt s3://${BatchDataBucket}/output.txt"

Outputs:
  VPCId:
    Description: "The ID of the created VPC"
    Value: !Ref MyVPC
  S3BucketName:
    Description: "The name of the S3 bucket for data input/output"
    Value: !Ref BatchDataBucket
  BatchJobQueueName:
    Description: "The name of the AWS Batch Job Queue"
    Value: !Ref BatchJobQueue