AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a real-time data ingestion and storage pipeline using
  Amazon Kinesis Data Stream and Amazon Kinesis Data Firehose delivering data to an S3 bucket.

Parameters:
  ShardCount:
    Description: Number of shards for the Kinesis Data Stream.
    Type: Number
    Default: 1
    MinValue: 1

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  DataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: !Ref ShardCount

  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: FirehoseDeliveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                Resource: !GetAtt DataStream.Arn

  DataIngestionFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt DataStream.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        Prefix: "ingested-data/"

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket used for data storage.
    Value: !Ref DataBucket
  KinesisStreamName:
    Description: Name of the Kinesis Data Stream.
    Value: !Ref DataStream
  FirehoseDeliveryStreamName:
    Description: Name of the Kinesis Firehose Delivery Stream.
    Value: !Ref DataIngestionFirehose