AWSTemplateFormatVersion: '2010-09-09'
Description: AppSync GraphQL API with Lambda backend for pet inventory service

Parameters:
  ApiName:
    Type: String
    Default: PetShopAPI
  LambdaTimeout:
    Type: Number
    Default: 10
  LambdaMemory:
    Type: Number
    Default: 128

Resources:
  PetShopLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  PetShopLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt PetShopLambdaRole.