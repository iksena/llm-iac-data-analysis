AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Integration

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: Name of the S3 bucket for website hosting
  LambdaFunctionName:
    Type: String
    Default: SlotMachineLambda
    Description: Name of the Lambda function for slot machine logic
  CognitoIdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Name of the Cognito Identity Pool
  FrontendZipUrl:
    Type: String
    Default: https://example.com/slot-machine-frontend.zip
    Description: URL to download the pre-built frontend ZIP file

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebsiteBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: production
      BlockPublicAccess:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'
            Condition:
              IpAddress:
                aws:SourceIp:
                  - '0.0.0.0/0'

  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import json
          import random

          def handler(event, context):
              symbols = ['🍒', '🍋', '🍇', '🍊', '🔔', '💎']
              result = [random.choice(symbols) for _ in range(3)]
              win = result[0] == result[1] == result[2]
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'win': win
                  })
              }
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          NODE_ENV: production
          LOG_LEVEL: INFO
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet
      Tags:
        - Key: Environment
          Value: production

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
        - PolicyName: XRayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: LambdaSecurityGroup

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: LambdaSubnet

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SlotMachineVPC

  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref CognitoIdentityPoolName
      AllowUnauthenticatedIdentities: true
      CognitoIdentityProviders: []
      SupportedLoginProviders:
        graph.facebook.com: '1234567890'
        accounts.google.com: '1234567890'
      Tags:
        - Key: Environment
          Value: production

  UnauthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn
                Condition:
                  StringEquals:
                    aws:SourceVpc: !Ref VPC
        - PolicyName: CloudWatchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'

  CognitoIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthenticatedRole.Arn

  FrontendDeployerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        ZipFile: |
          import boto3
          import zipfile
          import os
          import urllib.request
          import json

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket_name = event['ResourceProperties']['BucketName']
              zip_url = event['ResourceProperties']['ZipUrl']
              cognito_pool_id = event['ResourceProperties']['CognitoPoolId']
              region = event['ResourceProperties']['Region']

              # Download ZIP file
              zip_path = '/tmp/frontend.zip'
              urllib.request.urlretrieve(zip_url, zip_path)

              # Extract ZIP
              with zipfile.ZipFile(zip_path, 'r') as zip_ref:
                  zip_ref.extractall('/tmp/frontend')

              # Modify frontend configuration
              config_path = '/tmp/frontend/config.json'
              with open(config_path, 'r') as f:
                  config = json.load(f)

              config['cognito']['identityPoolId'] = cognito_pool_id
              config['region'] = region

              with open(config_path, 'w') as f:
                  json.dump(config, f)

              # Upload to S3
              for root, dirs, files in os.walk('/tmp/frontend'):
                  for file in files:
                      local_path = os.path.join(root, file)
                      s3_key = os.path.relpath(local_path, '/tmp/frontend')
                      s3.upload_file(local_path, bucket_name, s3_key)

              return {'Status': 'SUCCESS'}
      Role: !GetAtt FrontendDeployerRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          NODE_ENV: production
          LOG_LEVEL: INFO
      VpcConfig:
        SecurityGroupIds:
          - !Ref FrontendDeployerSecurityGroup
        SubnetIds:
          - !Ref FrontendDeployerSubnet
      Tags:
        - Key: Environment
          Value: production

  FrontendDeployerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${WebsiteBucketName}'
                  - !Sub 'arn:aws:s3:::${WebsiteBucketName}/*'
                Condition:
                  StringEquals:
                    aws:SourceVpc: !Ref VPC
        - PolicyName: CloudWatchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'
        - PolicyName: XRayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: '*'

  FrontendDeployerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for frontend deployer Lambda
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: FrontendDeployerSecurityGroup

  FrontendDeployerSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: FrontendDeployerSubnet

  FrontendDeployer:
    Type: Custom::FrontendDeployer
    Properties:
      ServiceToken: !GetAtt FrontendDeployerLambda.Arn
      BucketName: !Ref WebsiteBucketName
      ZipUrl: !Ref FrontendZipUrl
      CognitoPoolId: !Ref CognitoIdentityPool
      Region: !Ref AWS::Region

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the slot machine website
  WebsiteEndpoint:
    Value: !GetAtt WebsiteBucket.DomainName
    Description: S3 website endpoint
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineLambda.Arn
    Description: ARN of the slot machine Lambda function
  CognitoIdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: ID of the Cognito Identity Pool