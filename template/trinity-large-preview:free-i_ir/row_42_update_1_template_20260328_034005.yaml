AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with public and private subnets across two Availability Zones

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone:
        Fn::FindInMap:
          - RegionMap
          - !Ref 'AWS::Region'
          - PublicSubnet1AZ

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:
        Fn::FindInMap:
          - RegionMap
          - !Ref 'AWS::Region'
          - PublicSubnet2AZ

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone:
        Fn::FindInMap:
          - RegionMap
          - !Ref 'AWS::Region'
          - PrivateSubnet1AZ

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone:
        Fn::FindInMap:
          - RegionMap
          - !Ref 'AWS::Region'
          - PrivateSubnet2AZ

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

Mappings:
  RegionMap:
    us-east-1:
      PublicSubnet1AZ: us-east-1a
      PublicSubnet2AZ: us-east-1b
      PrivateSubnet1AZ: us-east-1a
      PrivateSubnet2AZ: us-east-1b
    us-west-2:
      PublicSubnet1AZ: us-west-2a
      PublicSubnet2AZ: us-west-2b
      PrivateSubnet1AZ: us-west-2a
      PrivateSubnet2AZ: us-west-2b
    eu-west-1:
      PublicSubnet1AZ: eu-west-1a
      PublicSubnet2AZ: eu-west-1b
      PrivateSubnet1AZ: eu-west-1a
      PrivateSubnet2AZ: eu-west-1b