AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Scalable URL-to-PNG screenshot service with automated load testing,
  S3/SQS integration, and dynamic Auto Scaling triggered by CloudWatch alarms.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC Id for the resources.
  WorkerSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for Auto Scaling worker instances (should span at least two AZs).
  LoadTestSubnet:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the load test instance.
  WorkerInstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type for worker instances.
  LoadTestInstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for the load test instance.
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 KeyPair to enable SSH access to instances.
  ImageId:
    Type: AWS::EC2::Image::Id
    Description: AMI Id for the instances (must support required software installation).
    Default: ami-0c55b159cbfafe1f0

Resources:

  ScreenshotS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "screenshot-service-${AWS::StackName}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled

  ScreenshotRequestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ScreenshotRequestQueue-${AWS::StackName}"
      VisibilityTimeout: 60

  WorkerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "WorkerInstanceRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "WorkerInstanceProfile-${AWS::StackName}"
      Roles:
        - !Ref WorkerInstanceRole

  LoadTestInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "LoadTestInstanceRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess

  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "LoadTestInstanceProfile-${AWS::StackName}"
      Roles:
        - !Ref LoadTestInstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for worker and load test instances.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "WorkerLaunchTemplate-${AWS::StackName}"
      LaunchTemplateData:
        ImageId: !Ref ImageId
        InstanceType: !Ref WorkerInstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: !Ref WorkerInstanceProfile
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            amazon-linux-extras install epel -y
            yum install -y chromium
            echo "Starting worker service..."
            while true; do
              # Placeholder for processing SQS messages and generating screenshots
              sleep 30
            done

  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "WorkerASG-${AWS::StackName}"
      VPCZoneIdentifier: !Ref WorkerSubnets
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      Tags:
        - Key: Name
          Value: WorkerInstance
          PropagateAtLaunch: true

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  QueueScaleUpAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "QueueScaleUpAlarm-${AWS::StackName}"
      AlarmDescription: "Scale up workers when SQS queue visible messages exceed threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotRequestQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !GetAtt ScaleUpPolicy.Arn

  QueueScaleDownAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "QueueScaleDownAlarm-${AWS::StackName}"
      AlarmDescription: "Scale down workers when SQS queue visible messages fall below threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotRequestQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !GetAtt ScaleDownPolicy.Arn

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref LoadTestInstanceType
      SubnetId: !Ref LoadTestSubnet
      ImageId: !Ref ImageId
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y curl python3
          QUEUE_URL=${ScreenshotRequestQueue}
          while true; do
            for j in $(seq 1 5); do
              MESSAGE="{\"url\":\"http://example.com/page$${j}\"}"
              aws sqs send-message --queue-url ${QUEUE_URL} --message-body "$MESSAGE" --region ${AWS::Region}
            done
            sleep 60
          done

Outputs:
  S3BucketName:
    Description: "S3 Bucket for storing screenshots"
    Value: !Ref ScreenshotS3Bucket
  SQSQueueURL:
    Description: "URL of the SQS queue for screenshot requests"
    Value: !Ref ScreenshotRequestQueue
  WorkerASGName:
    Description: "Auto Scaling Group name for worker instances"
    Value: !Ref WorkerAutoScalingGroup
  LoadTestInstancePublicIP:
    Description: "Public IP address of the load test instance"
    Value: !GetAtt LoadTestInstance.PublicIp