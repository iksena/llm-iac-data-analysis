AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that deploys an EC2 instance in the
  specified VPC/Subnet with an associated Elastic IP and a security group configured for SSH access.

Parameters:
  VpcId:
    Description: "The VPC ID where the EC2 instance will be deployed."
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: "The Subnet ID within the specified VPC to launch the instance."
    Type: AWS::EC2::Subnet::Id
  KeyName:
    Description: "Name of an existing EC2 KeyPair to enable SSH access."
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Description: "EC2 Instance Type."
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.nano
      - t2.micro
      - t2.small
      - t2.medium

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: "ami-0c94855ba95c71c99"
    us-west-2:
      AMI: "ami-09d95fab7fff3776c"
    eu-west-1:
      AMI: "ami-0b0dcb5067f052a63"

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security Group allowing SSH access (port 22)"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::FindInMap:
          - AWSRegionToAMI
          - !Ref AWS::Region
          - AMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup

  EC2ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EC2ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

Outputs:
  InstanceId:
    Description: "The ID of the deployed EC2 instance."
    Value: !Ref EC2Instance
  ElasticIP:
    Description: "The Elastic IP address allocated to the instance."
    Value: !Ref EC2ElasticIP
  SecurityGroupId:
    Description: "The ID of the security group associated with the EC2 instance."
    Value: !Ref EC2SecurityGroup