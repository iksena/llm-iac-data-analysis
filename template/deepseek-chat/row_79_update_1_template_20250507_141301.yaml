AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates three IAM managed policies for S3 access, DynamoDB protection, and RDS protection'

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Grants read/write access to the ios-apps.sagebridge.org S3 bucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: arn:aws:s3:::ios-apps.sagebridge.org
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: arn:aws:s3:::ios-apps.sagebridge.org/*

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Prevents destructive actions on DynamoDB tables'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:UpdateTimeToLive
              - dynamodb:UpdateContinuousBackups
              - dynamodb:UpdateGlobalTable
              - dynamodb:UpdateTableReplicaAutoScaling
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: 'Blocks destructive RDS operations to protect databases'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteDBSnapshot
              - rds:ModifyDBInstance
              - rds:ModifyDBCluster
              - rds:RestoreDBInstanceFromDBSnapshot
              - rds:RestoreDBClusterFromSnapshot
            Resource: '*'

Outputs:
  S3AccessPolicyARN:
    Description: 'ARN of the S3 Access Policy'
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyARN:
    Description: 'ARN of the DynamoDB Protection Policy'
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyARN:
    Description: 'ARN of the RDS Protection Policy'
    Value: !Ref RDSProtectionPolicy