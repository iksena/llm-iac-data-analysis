AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to deploy AWS Glue Database and Crawler for cataloging CloudTrail logs in S3, enabling Athena querying with schema inference, updates, and table prefixing.'

Parameters:
  DatabaseName:
    Type: String
    Default: 'cloudtrail_glue_db'
    Description: 'Name of the Glue Database'
  CrawlerName:
    Type: String
    Default: 'cloudtrail_glue_crawler'
    Description: 'Name of the Glue Crawler'
  S3BucketName:
    Type: String
    Default: 'kk-admin'
    Description: 'S3 bucket name containing CloudTrail logs'
  S3Prefix:
    Type: String
    Default: 'cloud-trail/AWSLogs/'
    Description: 'S3 prefix/path for CloudTrail logs'

Resources:
  CloudTrailGlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessForCloudTrailCrawler
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/${S3Prefix}*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
                Condition:
                  StringLike:
                    's3:prefix':
                      - !Sub '${S3Prefix}'
                      - !Sub '${S3Prefix}*'

  CloudTrailGlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Ref DatabaseName
        Description: 'Glue Database for CloudTrail logs cataloged by crawler'

  CloudTrailGlueCrawler:
    Type: AWS::Glue::Crawler
    DependsOn: CloudTrailGlueDatabase
    Properties:
      Name: !Ref CrawlerName
      Role: !GetAtt CloudTrailGlueRole.Arn
      DatabaseName: !Ref DatabaseName
      Description: 'Glue Crawler to infer schema from CloudTrail JSON logs in S3 and create prefixed tables'
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/${S3Prefix}'
      SchemaChangePolicy:
        DeleteBehavior: DEPRECATE_IN_DATABASE
        UpdateBehavior: UPDATE_IN_DATABASE
      Configuration: '{"Version":1.0,"CrawlerOutput":{"Partitions":{"AddOrUpdateBehavior":"InheritFromTable","DeleteBehavior":"InheritFromTable"},"Tables":{"AddOrUpdateBehavior":"MergeNewColumns"}},"TablePrefix":"cloudtrail_"}'

Outputs:
  DatabaseName:
    Description: 'Name of the created Glue Database'
    Value: !Ref DatabaseName
  CrawlerName:
    Description: 'Name of the created Glue Crawler (run it manually via Console/CLI to populate tables)'
    Value: !Ref CrawlerName
  CrawlerArn:
    Description: 'ARN of the Glue Crawler'
    Value: !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:crawler/${CrawlerName}'
  DatabaseArn:
    Description: 'ARN of the Glue Database'
    Value: !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${DatabaseName}'
  S3DataPath:
    Description: 'S3 path crawled by the Glue Crawler'
    Value: !Sub 's3://${S3BucketName}/${S3Prefix}'