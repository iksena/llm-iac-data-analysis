AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template for an event-driven AWS Batch job processing pipeline.
  It provisions an SQS queue as the event source, an AWS Batch compute environment with a job queue and job definition,
  and an EventBridge Pipe that triggers Batch jobs. The template also includes IAM roles, a VPC with private subnets,
  and security groups to isolate compute resources.

Parameters: {}

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "BatchProcessingVPC"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select 
        - 0
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "PrivateSubnet1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.2.0/24"
      AvailabilityZone: !Select 
        - 1
        - !GetAZs ""
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: "PrivateSubnet2"

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for AWS Batch compute resources"
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: "BatchSecurityGroup"

  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "OrderQueue"

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "BatchServiceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "batch.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole"

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "BatchInstanceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "ec2.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role"
        - "arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: "BatchInstanceProfile"
      Roles:
        - !Ref BatchInstanceRole

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "ECSExecutionRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "ecs-tasks.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "PipesRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "pipes.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "PipesToBatchAndSQSPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "batch:SubmitJob"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                Resource: !GetAtt OrderQueue.Arn

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: "BatchComputeEnv"
      ServiceRole: !GetAtt BatchServiceRole.Arn
      Type: "MANAGED"
      ComputeResources:
        Type: "EC2"
        AllocationStrategy: "BEST_FIT"
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - "optimal"
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !GetAtt BatchInstanceProfile.Arn

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: "BatchJobQueue"
      State: "ENABLED"
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: "BatchJobDefinition"
      Type: "container"
      ContainerProperties:
        Image: "amazonlinux:2"
        Vcpus: 1
        Memory: 1024
        Command:
          - "echo"
          - "Processing OrderCreated event"
        JobRoleArn: !GetAtt ECSExecutionRole.Arn

  OrderEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: "OrderEventPipe"
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt OrderQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
      Target: !GetAtt BatchJobQueue.JobQueueArn
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: "OrderProcessingJob"

Outputs:
  VPCId:
    Description: "The VPC ID for the Batch Processing VPC"
    Value: !Ref VPC

  OrderQueueARN:
    Description: "ARN of the SQS Order Queue"
    Value: !GetAtt OrderQueue.Arn

  BatchComputeEnvironmentArn:
    Description: "ARN of the AWS Batch Compute Environment"
    Value: !GetAtt BatchComputeEnvironment.ComputeEnvironmentArn

  BatchJobQueueArn:
    Description: "ARN of the AWS Batch Job Queue"
    Value: !GetAtt BatchJobQueue.JobQueueArn

  BatchJobDefinitionName:
    Description: "Name of the AWS Batch Job Definition"
    Value: !Ref BatchJobDefinition