AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-s3-events-queue'

  S3EventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref S3EventQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: S3EventQueuePolicy
        Statement:
          - Sid: AllowS3ToPublish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt S3EventQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-${AWS::Region}-${AWS::AccountId}-${Timestamp}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  S3BucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref S3Bucket
      QueueConfigurations:
        - Event: s3:ObjectCreated:*
          Filter: {}
          Queue: !GetAtt S3EventQueue.Arn

  Timestamp:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /s3-sqs-timestamp
      Type: String
      Value: !Select [0, !Split [" ", !Ref "AWS::Timestamp"]]
      Overwrite: true