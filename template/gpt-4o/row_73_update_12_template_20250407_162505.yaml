AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation template to create an Amazon ECS Cluster with Fargate and Fargate Spot capacity providers.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the ECS Cluster will be deployed.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: The Subnet IDs where the ECS Cluster will be deployed.
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS Cluster.

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ECS cluster
      VpcId: !Ref VpcId

  ECSClusterCapacityProviderAssociations:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ECSClusterSecurityGroup

Outputs:
  ECSClusterARN:
    Description: The ARN of the ECS Cluster.
    Value: !GetAtt ECSCluster.Arn
  ECSClusterName:
    Description: The name of the ECS Cluster.
    Value: !Ref ECSCluster

# Note: Ensure that you provide valid VPC and Subnet IDs when deploying this template.