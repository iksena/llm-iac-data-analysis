AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket to store the data
  KinesisDataStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
  KinesisDataFirehoseName:
    Type: String
    Description: Name of the Kinesis Data Firehose delivery stream
  KinesisDataFirehoseDeliveryStreamType:
    Type: String
    Description: Type of delivery stream (DirectPut, KinesisStreamAsSource)
    Default: DirectPut

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      StreamName: !Ref KinesisDataStreamName
      ShardCount: 1

  KinesisDataFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref KinesisDataFirehoseName
      DeliveryStreamType: !Ref KinesisDataFirehoseDeliveryStreamType
      S3DestinationConfiguration:
        BucketARN: !GetAtt S3Bucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        EncryptionConfiguration:
          EncryptionOption: SSE_KMS
          KmsKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehosePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub '${S3Bucket.Arn}/*'

  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting data in Firehose
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: kms:*
            Resource: '*'

Outputs:
  KinesisDataFirehoseDeliveryStreamArn:
    Description: ARN of the Kinesis Data Firehose delivery stream
    Value: !GetAtt KinesisDataFirehose.Arn
  S3BucketURL:
    Description: URL of the S3 bucket
    Value: !Sub 'https://s3.amazonaws.com/${S3BucketName}'