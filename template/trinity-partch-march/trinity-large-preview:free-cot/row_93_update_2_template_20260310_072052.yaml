AWSTemplateFormatVersion: '2010-09-09'
Description: 'Tag-Driven Nginx Installation with SSM Automation and Enhanced Monitoring'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t2.micro
      - t2.small
      - t2.medium
  S3BucketName:
    Type: String
    Description: Name for the S3 bucket to store logs
    Default: nginx-logs-bucket
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the instance will be launched
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID where the instance will be launched

Resources:
  # IAM Role for SSM Access and S3 Permissions
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'

  # Instance Profile for EC2
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # S3 Bucket for Centralized Logging
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 Bucket Policy for Enhanced Security
  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt InstanceRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'

  # Security Group for EC2 Instance
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Nginx instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # EC2 Instance with SSM Access
  NginxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: NginxInstance
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  # SSM Document for Nginx Installation
  NginxInstallDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      DocumentFormat: YAML
      Content:
        schemaVersion: '0.3'
        description: Install and start Nginx web server
        parameters: {}
        mainSteps:
          - name: installNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo amazon-linux-extras install -y nginx1
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
                - sudo systemctl status nginx

  # SSM Association for Tag-Driven Automation
  NginxInstallAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref NginxInstallDocument
      Targets:
        - Key: InstanceTags
          Values:
            - 'InstallNginx=true'

  # CloudWatch Log Group for Instance Monitoring
  InstanceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: '/ec2/nginx-instance'
      RetentionInDays: 30

  # CloudWatch Metric Filter for Nginx Access Logs
  NginxAccessLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref InstanceLogGroup
      FilterPattern: '{ $.eventTime = "*" }'
      MetricTransformations:
        - MetricName: NginxAccessCount
          MetricNamespace: Nginx/Metrics
          MetricValue: '1'

  # CloudWatch Alarm for High CPU Utilization
  HighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if CPU exceeds 80% for 5 minutes
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref NginxInstance
      AlarmActions:
        - !Ref InstanceLogGroup

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx server
    Value: !Ref NginxInstance
  PublicIp:
    Description: Public IP address of the Nginx server
    Value: !GetAtt NginxInstance.PublicIp
  LogBucket:
    Description: S3 bucket for storing logs
    Value: !Ref LogBucket