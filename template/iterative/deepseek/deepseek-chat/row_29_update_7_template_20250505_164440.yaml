AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized configuration management for serverless applications using SSM Parameter Store and Secrets Manager

Parameters:
  StackName:
    Description: Name of the CloudFormation stack (used for parameter namespace)
    Type: String
    Default: ServerlessConfigDemo
  LambdaRuntime:
    Description: Lambda function runtime
    Type: String
    Default: python3.9
    AllowedValues:
      - python3.8
      - python3.9
      - python3.10
  LambdaTimeout:
    Description: Lambda function timeout in seconds
    Type: Number
    Default: 30
  LambdaMemory:
    Description: Lambda function memory allocation in MB
    Type: Number
    Default: 128
  SecretUsername:
    Description: Username to store in Secrets Manager
    Type: String
    Default: app_user
  ExcludeCharacters:
    Description: Characters to exclude from generated password
    Type: String
    Default: '%+~`#$&*()|[]{}:;<>?!\'/\\=@'

Resources:
  ConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${StackName}/app/config'
      Type: String
      Value: 'This is A/B'
      Description: Non-sensitive application configuration
      Tier: Standard

  SecureConfigParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${StackName}/app/secure_config'
      Type: SecureString
      Value: 'SensitiveValue123'
      Description: Sensitive application configuration
      Tier: Standard

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackName}/app/credentials'
      Description: Application credentials
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${SecretUsername}"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: !Ref ExcludeCharacters

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SSMAndSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackName}/*'
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !GetAtt AppSecret.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ConfigReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${StackName}-ConfigReader'
      Description: Reads configuration from SSM Parameter Store and Secrets Manager
      Handler: index.lambda_handler
      Runtime: !Ref LambdaRuntime
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          
          def lambda_handler(event, context):
              ssm = boto3.client('ssm')
              secrets = boto3.client('secretsmanager')
              
              config_param = ssm.get_parameter(
                  Name=os.environ['CONFIG_PARAM'],
                  WithDecryption=False
              )
              
              secure_param = ssm.get_parameter(
                  Name=os.environ['SECURE_PARAM'],
                  WithDecryption=True
              )
              
              secret = secrets.get_secret_value(
                  SecretId=os.environ['SECRET_ARN']
              )
              
              return {
                  'config_param': config_param['Parameter']['Value'],
                  'secure_param': secure_param['Parameter']['Value'],
                  'secret': secret['SecretString']
              }
      Environment:
        Variables:
          CONFIG_PARAM: !Ref ConfigParameter
          SECURE_PARAM: !Ref SecureConfigParameter
          SECRET_ARN: !Ref AppSecret

Outputs:
  ConfigParameterPath:
    Description: Path to the configuration parameter in SSM
    Value: !Ref ConfigParameter
  SecureConfigParameterPath:
    Description: Path to the secure configuration parameter in SSM
    Value: !Ref SecureConfigParameter
  SecretARN:
    Description: ARN of the Secrets Manager secret
    Value: !Ref AppSecret
  LambdaFunctionARN:
    Description: ARN of the configuration reader Lambda function
    Value: !GetAtt ConfigReaderFunction.Arn
  LambdaExecutionRoleARN:
    Description: ARN of the Lambda execution role
    Value: !GetAtt LambdaExecutionRole.Arn