AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ReadOnlyIAMRole1:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      RoleName: ReadOnlyIAMRole1
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  ReadOnlyIAMRole2:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      RoleName: ReadOnlyIAMRole2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

Outputs:
  Role1Arn:
    Description: ARN of the first IAM role
    Value: !GetAtt ReadOnlyIAMRole1.Arn
  Role2Arn:
    Description: ARN of the second IAM role
    Value: !GetAtt ReadOnlyIAMRole2.Arn