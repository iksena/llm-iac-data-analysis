AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB table with GSI for mobile notifications reporting

Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MobileNotifications
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: S
        - AttributeName: ttl
          AttributeType: N
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true