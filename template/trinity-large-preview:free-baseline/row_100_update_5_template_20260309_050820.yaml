AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Description: Account ID of the Identity Management Account for cross-account trust
    Default: '123456789012'
    AllowedPattern: '[\d]{12}'
  TrustedToolingManagementAccount:
    Type: String
    Description: Account ID of the Tooling Management Account for cross-account trust
    Default: '234567890123'
    AllowedPattern: '[\d]{12}'

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      Description: Role for privileged administrators with full access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/PermissionBoundary'
      Policies:
        - PolicyName: MFAPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateVirtualMFADevice', 'iam:EnableMFADevice', 'iam:ResyncMFADevice']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:*']
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': false

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      Description: Role for restricted administrators with limited access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/PermissionBoundary'
      Policies:
        - PolicyName: MFAPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateVirtualMFADevice', 'iam:EnableMFADevice', 'iam:ResyncMFADevice']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:*']
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': false
        - PolicyName: DenyBilling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['aws-portal:*']
                Resource: '*'
        - PolicyName: DenyCloudHSM
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['cloudhsm:*']
                Resource: '*'

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      Description: Role for identity administrators with IAM access
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/PermissionBoundary'
      Policies:
        - PolicyName: MFAPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['iam:CreateVirtualMFADevice', 'iam:EnableMFADevice', 'iam:ResyncMFADevice']
                Resource: '*'
              - Effect: Deny
                Action: ['iam:*']
                Resource: '*'
                Condition:
                  Bool:
                    'aws:MultiFactorAuthPresent': false
        - PolicyName: DenyBilling
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['aws-portal:*']
                Resource: '*'
        - PolicyName: DenyCloudHSM
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: ['cloudhsm:*']
                Resource: '*'

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateCloudFormationExecutionRole
    Properties:
      RoleName: CloudFormationExecutionRole
      Description: Role for CloudFormation template execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ['cloudformation.amazonaws.com']
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/PermissionBoundary'
      Policies:
        - PolicyName: TemplateValidation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['cloudformation:ValidateTemplate']
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateStackSetExecutionRole
    Properties:
      RoleName: StackSetExecutionRole
      Description: Role for AWS CloudFormation StackSets execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ['cloudformation.amazonaws.com']
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationStackSetAdministration
      PermissionsBoundary: !Sub 'arn:aws:iam::${AWS::AccountId}:policy/PermissionBoundary'
      Policies:
        - PolicyName: StackSetManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['cloudformation:CreateStackInstances', 'cloudformation:DeleteStackInstances', 'cloudformation:UpdateStackInstances', 'cloudformation:ListStackInstances', 'cloudformation:DescribeStackInstance']
                Resource: '*'
              - Effect: Allow
                Action: ['cloudformation:CreateStackSet', 'cloudformation:DeleteStackSet', 'cloudformation:UpdateStackSet', 'cloudformation:ListStackSets', 'cloudformation:DescribeStackSet']
                Resource: '*'

Conditions:
  CreateCloudFormationExecutionRole: !Not [!GetAtt 'AWS::NoValue']
  CreateStackSetExecutionRole: !Not [!GetAtt 'AWS::NoValue']

Outputs:
  PrivilegedAdminRoleArn:
    Description: ARN of the PrivilegedAdminRole
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of the RestrictedAdminRole
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of the IdentityAdminRole
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormationExecutionRole
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of the StackSetExecutionRole
    Value: !GetAtt StackSetExecutionRole.Arn