

AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS App Runner service deployment from ECR repository'

Parameters:
  ServiceName:
    Type: String
    Description: Name of the App Runner service
    MinLength: 1
    MaxLength: 40

  ECRRepositoryArn:
    Type: String
    Description: ARN of the existing ECR repository

  ImageTag:
    Type: String
    Description: ECR image tag to deploy
    Default: latest

  InstanceCPU:
    Type: String
    Description: CPU units for the instance
    Default: '1 vCPU'
    AllowedValues:
      - '1 vCPU'
      - '2 vCPU'
      - '4 vCPU'

  InstanceMemory:
    Type: String
    Description: Memory for the instance
    Default: '2 GB'
    AllowedValues:
      - '2 GB'
      - '3 GB'
      - '4 GB'

  Port:
    Type: Number
    Description: Port number for the container
    Default: 8080
    MinValue: 1
    MaxValue: 65535

Resources:
  AppRunnerServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

  AppRunnerService:
    Type: AWS::AppRunner::Service
    DependsOn: AppRunnerServiceRole
    Properties:
      ServiceName: !Ref ServiceName
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerServiceRole.Arn
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Sub ${ECRRepositoryArn}:${ImageTag}
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: !Ref Port
      InstanceConfiguration:
        Cpu: !Ref InstanceCPU
        Memory: !Ref InstanceMemory

Outputs:
  ServiceURL:
    Description: URL of the App Runner service
    Value: !GetAtt AppRunnerService.ServiceUrl

  ServiceARN:
    Description: ARN of the App Runner service
    Value: !GetAtt AppRunnerService.ServiceArn

  ServiceStatus:
    Description: Status of the App Runner service
    Value: !GetAtt AppRunnerService.Status