AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an S3 bucket configured for website hosting with a DeletionPolicy'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    Default: my-website-bucket
    
  DeletionPolicy:
    Type: String
    Description: Specify what happens to the bucket when the stack is deleted
    Default: Retain
    AllowedValues:
      - Retain
      - Delete

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !Ref DeletionPolicy
    Properties:
      BucketName: !Ref BucketName
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3000
      Tags:
        - Key: Purpose
          Value: WebsiteHosting

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Action:
              - s3:GetObject
            Effect: Allow
            Resource: !Join ['', ['arn:aws:s3:::', !Ref WebsiteBucket, '/*']]
            Principal: '*'

Outputs:
  WebsiteURL:
    Description: URL for the website hosted on S3
    Value: !GetAtt WebsiteBucket.WebsiteURL
    
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
    
  S3BucketDomainName:
    Description: Domain name of the S3 bucket
    Value: !GetAtt WebsiteBucket.DomainName