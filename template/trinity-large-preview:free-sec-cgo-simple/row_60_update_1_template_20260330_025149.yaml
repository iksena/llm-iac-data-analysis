AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - kms:CreateGrant
              - kms:DescribeKey
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:RetireGrant
            Resource: '*'
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/centralized-encryption-key
      TargetKeyId: !Ref KMSKey
Outputs:
  KeyId:
    Description: KMS Key ID
    Value: !Ref KMSKey
  KeyArn:
    Description: KMS Key ARN
    Value: !GetAtt KMSKey.Arn