AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template for a centralized alerting system using Amazon SNS.
  It provisions a primary SNS topic with a policy allowing publishing from CloudWatch, RDS, S3, and Budgets,
  conditional subscriptions for email and HTTPS endpoints with retry policies, a fallback SNS topic and a CloudWatch alarm monitoring failed notifications.

Parameters:

  EmailSubscription:
    Type: String
    Description: "Email endpoint for receiving notifications. Leave empty if not used."
    Default: ""

  HTTPSSubscription:
    Type: String
    Description: "HTTP/HTTPS endpoint (URL) for receiving notifications. Leave empty if not used."
    Default: ""

  FallbackEmail:
    Type: String
    Description: "Fallback email endpoint triggered by the CloudWatch alarm when notifications fail. Leave empty if not used."
    Default: ""

Conditions:

  HasEmailSubscription: !Not [!Equals [!Ref EmailSubscription, ""]]
  HasHTTPSSubscription: !Not [!Equals [!Ref HTTPSSubscription, ""]]
  HasFallbackEmail: !Not [!Equals [!Ref FallbackEmail, ""]]

Resources:

  PrimarySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "CentralizedAlertingTopic"
      TopicName: "CentralizedAlertingTopic"

  PrimarySNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref PrimarySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: "AllowAuthorizedServicesPublish"
            Effect: Allow
            Principal:
              Service:
                - cloudwatch.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
                - budgets.amazonaws.com
            Action: "SNS:Publish"
            Resource: !Ref PrimarySNSTopic

  EmailSubscriptionResource:
    Condition: HasEmailSubscription
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: email
      Endpoint: !Ref EmailSubscription

  HTTPSSubscriptionResource:
    Condition: HasHTTPSSubscription
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref PrimarySNSTopic
      Protocol: https
      Endpoint: !Ref HTTPSSubscription
      # DeliveryPolicy with retry settings for HTTP/HTTPS endpoints
      DeliveryPolicy: >
        {
          "http": {
            "defaultHealthyRetryPolicy": {
              "minDelayTarget": 20,
              "maxDelayTarget": 20,
              "numRetries": 3,
              "numMaxDelayRetries": 0,
              "backoffFunction": "linear"
            },
            "disableSubscriptionOverrides": false
          }
        }

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "FallbackAlertingTopic"
      TopicName: "FallbackAlertingTopic"

  FallbackEmailSubscription:
    Condition: HasFallbackEmail
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref FallbackSNSTopic
      Protocol: email
      Endpoint: !Ref FallbackEmail

  NotificationsFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "SNSNotificationsFailedAlarm"
      AlarmDescription: "Alarm if SNS notifications from the primary topic fail."
      Namespace: "AWS/SNS"
      MetricName: "NumberOfNotificationsFailed"
      Dimensions:
        - Name: TopicName
          Value: !GetAtt PrimarySNSTopic.TopicName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic
      TreatMissingData: notBreaching

Outputs:

  PrimarySNSTopicARN:
    Description: "ARN of the Primary SNS Topic"
    Value: !Ref PrimarySNSTopic

  FallbackSNSTopicARN:
    Description: "ARN of the Fallback SNS Topic"
    Value: !Ref FallbackSNSTopic