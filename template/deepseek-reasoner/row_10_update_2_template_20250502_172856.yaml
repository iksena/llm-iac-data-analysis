AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  KeyPairPublicKey:
    Type: String
    Description: Public key material for SSH access
  InstanceType:
    Type: String
    Default: c5d.large
    AllowedValues:
      - c5d.large
      - m5d.large
      - r5d.large
      - i3.large
    Description: EC2 instance type with ephemeral storage (NVMe)
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the default VPC
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: ID of default VPC's subnet
Resources:
  KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-keypair'
      PublicKeyMaterial: !Ref KeyPairPublicKey
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPair
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt EC2SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        - DeviceName: /dev/xvdb
          VirtualName: ephemeral0
Outputs:
  InstancePublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address for SSH access
  KeyPairName:
    Value: !Ref KeyPair
    Description: Name of created SSH key pair
  InstanceId:
    Value: !Ref EC2Instance
    Description: EC2 instance ID