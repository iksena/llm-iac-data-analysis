AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0000000000000000,subnet-0000000000000001
  BatchImage:
    Type: String
    Default: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-batch-image:latest
  BatchMemory:
    Type: Number
    Default: 2048
  BatchVcpus:
    Type: Number
    Default: 1
  BatchCommand:
    Type: String
    Default: "echo 'Processing OrderCreated event'"

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BatchServiceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Policies:
        - PolicyName: BatchPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - batch:*
                  - logs:*
                  - s3:*
                Resource: '*'

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ECSTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ContainerPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeEnvironmentName: OrderProcessingCE
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - optimal
        Subnets: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        Tags:
          Name: OrderProcessingCE
      State: ENABLED

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: BatchProcessingSG
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      Tags:
        Name: BatchProcessingSG

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: OrderProcessingQueue
      Priority: 100
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: OrderProcessingJob
      Type: container
      ContainerProperties:
        Image: !Ref BatchImage
        Command: !Split [",", !Ref BatchCommand]
        Memory: !Ref BatchMemory
        Vcpus: !Ref BatchVcpus
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
        JobRoleArn: !GetAtt BatchServiceRole.Arn

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: !GetAtt BatchJobQueue.Arn

  EventBridgePipe:
    Type: AWS::Events::EventBusPolicy
    Properties:
      Action: 'events:PutEvents'
      Principal: '*'
      Resource: !GetAtt SQSQueue.Arn
      StatementId: AllowSQSToEventBridge

Outputs:
  SQSQueueURL:
    Description: SQS Queue URL for Order Processing
    Value: !Ref SQSQueue
  BatchJobQueueARN:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt BatchJobQueue.Arn
  BatchSecurityGroup:
    Description: Security Group ID for Batch Compute Resources
    Value: !Ref BatchSecurityGroup