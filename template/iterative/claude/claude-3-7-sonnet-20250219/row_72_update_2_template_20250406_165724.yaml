AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for deploying a secure, web-based VS Code development environment with code-server on EC2, accessible via CloudFront'

Parameters:
  CodeServerVersion:
    Description: Version of code-server to install
    Type: String
    Default: '4.16.1'
  
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
  
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Type: String
    Default: ''
  
  AdditionalAllowedCIDR:
    Description: Additional CIDR block to allow access to the EC2 instance (optional)
    Type: String
    Default: '0.0.0.0/0'

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac
    eu-west-1:
      AMI: ami-0694d931cee176e7d
    eu-west-2:
      AMI: ami-0505148b3591e4c07
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-northeast-1:
      AMI: ami-0d52744dc1906a2c8
    ap-northeast-2:
      AMI: ami-0f3a440bbcff3d043
    ap-southeast-1:
      AMI: ami-0df7a207adb9748c7
    ap-southeast-2:
      AMI: ami-0310483fb2b488153
    sa-east-1:
      AMI: ami-0af6e9042ea5a4e3e

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VS Code server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 120.52.22.96/27
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 205.251.249.0/24
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 180.163.57.128/26
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 204.246.168.0/22
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 205.251.252.0/23
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 54.192.0.0/16
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 204.246.173.0/24
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 54.230.200.0/21
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 120.253.240.192/26
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 99.86.0.0/16
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 13.32.0.0/15
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 13.224.0.0/14
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 70.132.0.0/18
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 15.158.0.0/16
          Description: CloudFront - GLOBAL
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Ref AdditionalAllowedCIDR
          Description: Additional allowed CIDR
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SecurityGroup

  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SSMInstanceRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    DependsOn: InternetGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref SSMInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system
          apt-get update
          apt-get upgrade -y

          # Install dependencies
          apt-get install -y curl wget unzip apt-transport-https ca-certificates gnupg lsb-release

          # Install code-server
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version=${CodeServerVersion}

          # Configure code-server
          mkdir -p /home/ubuntu/.config/code-server
          cat > /home/ubuntu/.config/code-server/config.yaml << EOF
          bind-addr: 0.0.0.0:8080
          auth: none
          cert: false
          EOF

          # Set ownership
          chown -R ubuntu:ubuntu /home/ubuntu/.config

          # Create systemd service
          cat > /etc/systemd/system/code-server.service << EOF
          [Unit]
          Description=code-server
          After=network.target

          [Service]
          Type=simple
          User=ubuntu
          ExecStart=/usr/bin/code-server
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          # Enable and start code-server
          systemctl enable code-server
          systemctl start code-server

          # Install SSM agent (already included in Ubuntu 22.04 AMIs, but ensure it's running)
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

          # Signal completion
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub ${AWS::StackName}-LongTermCachePolicy
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 86400
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2Instance
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: ''
        HttpVersion: http2
        PriceClass: PriceClass_All
        Origins:
          - Id: EC2Origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: EC2Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: !Ref CloudFrontCachePolicy
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontURL:
    Description: URL to access the VS Code environment
    Value: !Sub https://${CloudFrontDistribution.DomainName}
  
  EC2InstanceId:
    Description: ID of the EC2 instance
    Value: !Ref EC2Instance
  
  EC2PublicIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  
  EC2PublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  
  DirectAccessURL:
    Description: Direct URL to access the VS Code environment (bypassing CloudFront)
    Value: !Sub http://${EC2Instance.PublicDnsName}:8080