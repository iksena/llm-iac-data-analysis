AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge rule with SNS topic integration'

Resources:
  EventNotificationTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Sub '${AWS::StackName}-notifications'

  EventNotificationTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref EventNotificationTopic
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt EventBridgeRule.Arn
      Topics:
        - !Ref EventNotificationTopic

  EventBridgeRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Name: !Sub '${AWS::StackName}-event-rule'
      Description: 'Rule to capture events from demo.cli source'
      EventPattern:
        source:
          - 'demo.cli'
      State: 'ENABLED'
      Targets:
        - Arn: !Ref EventNotificationTopic
          Id: 'SNSTarget'

Outputs:
  TopicArn:
    Description: 'ARN of the created SNS topic'
    Value: !Ref EventNotificationTopic

  TopicName:
    Description: 'Name of the created SNS topic'
    Value: !GetAtt EventNotificationTopic.TopicName

  RuleArn:
    Description: 'ARN of the created EventBridge rule'
    Value: !GetAtt EventBridgeRule.Arn