AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EventBridge integration with Stripe's product API.

Parameters:
  StripeApiKey:
    Type: String
    Description: The API key for authenticating requests to Stripe.
    NoEcho: true
    MinLength: 1
    Default: testanu

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppEventBus

  StripeApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: StripeApiKeySecret
      SecretString: !Ref StripeApiKey

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeApiPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref StripeApiKeySecret
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  StripeApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Ref StripeApiKey

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeApiDestination
      ConnectionArn: !GetAtt StripeApiConnection.Arn
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: PartnerAppEventRule
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - PartnerApp
        detail-type:
          - PartnerAppDetailType
      Targets:
        - Id: StripeApiTarget
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: PartnerAppQueue

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt EventBus.Arn

Outputs:
  EventBusArn:
    Description: The ARN of the EventBridge event bus.
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: The ARN of the API Destination.
    Value: !GetAtt StripeApiDestination.Arn

  SQSQueueUrl:
    Description: The URL of the SQS Queue.
    Value: !Ref SQSQueue