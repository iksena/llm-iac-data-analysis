AWSTemplateFormatVersion: '2010-09-09'
Description: EMR Serverless environment with S3 bucket and IAM permissions

Parameters:
  ApplicationName:
    Type: String
    Description: Name for the EMR Serverless application
    Default: spark-emr-serverless-app
  VPCId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EMR Serverless will be deployed (required)
    NoEcho: true
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID where EMR Serverless will be deployed (required)
    NoEcho: true

Resources:
  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "s3-emr-serverless-demo-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  EMRServerlessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EMR Serverless
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  EMRServerlessServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::s3-emr-serverless-demo-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::s3-emr-serverless-demo-${AWS::AccountId}/*"
        - PolicyName: EMRServerlessLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: arn:aws:logs:*:*:*

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref ApplicationName
      ReleaseLabel: emr-6.15.0
      Type: SPARK
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      NetworkConfiguration:
        SubnetIds:
          - !Ref SubnetId
        SecurityGroupIds:
          - !GetAtt EMRServerlessSecurityGroup.GroupId

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for scripts and data
    Value: !Sub "s3-emr-serverless-demo-${AWS::AccountId}"
  EMRServerlessAppId:
    Description: ID of the EMR Serverless application
    Value: !Ref EMRServerlessApplication
  EMRServerlessRoleArn:
    Description: ARN of the IAM role for EMR Serverless
    Value: !GetAtt EMRServerlessServiceRole.Arn