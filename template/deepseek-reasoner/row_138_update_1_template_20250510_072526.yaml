AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC for the EC2 instance
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for EC2 instance
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t3.micro]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair
  SSHLocation:
    Type: String
    Default: 0.0.0.0/0
  LabFilesURL:
    Type: String
    Default: https://github.com/example/lab-files/archive/main.zip
  DataJSONURL:
    Type: String
    Default: https://example.com/data.json
  BucketName:
    Type: String
    Description: Unique S3 bucket name for static assets

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      AttributeDefinitions:
        - AttributeName: ServiceName
          AttributeType: S
        - AttributeName: ServiceType
          AttributeType: S
      KeySchema:
        - AttributeName: ServiceName
          KeyType: HASH
        - AttributeName: ServiceType
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: S3DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:*
                Resource: 
                  - !Sub 'arn:aws:s3:::${BucketName}'
                  - !Sub 'arn:aws:s3:::${BucketName}/*'
              - Effect: Allow
                Action: dynamodb:*
                Resource: !GetAtt DynamoDBTable.Arn

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: WebServer Security Group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-0c55b159cbfafe1f0
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet: [!Ref InstanceSecurityGroup]
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: 
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y httpd php aws-cli php-pdo php-mbstring php-xml
          systemctl start httpd
          systemctl enable httpd
          
          # Install Composer
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer
          chmod +x /usr/local/bin/composer
          
          # Install AWS SDK
          cd /var/www/html
          composer require aws/aws-sdk-php
          
          # Download and extract lab files
          curl -L ${LabFilesURL} -o labfiles.zip
          unzip -o labfiles.zip -d /var/www/html/
          
          # Configure environment
          AWS_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
          sed -i "s/%%BUCKET_NAME%%/${BucketName}/g" /var/www/html/config.php
          sed -i "s/%%AWS_REGION%%/$AWS_REGION/g" /var/www/html/config.php
          
          # Upload assets to S3
          aws s3 cp /var/www/html/static/ s3://${BucketName}/ --recursive
          
          # Import DynamoDB data
          curl -L ${DataJSONURL} -o /tmp/data.json
          php /var/www/html/scripts/import-data.php /tmp/data.json
          
          chown -R apache:apache /var/www/html
          systemctl restart httpd

Outputs:
  WebsiteURL:
    Value: !Sub http://${WebServerInstance.PublicIp}
  S3BucketName:
    Value: !Ref S3Bucket
  DynamoDBTable:
    Value: !Ref DynamoDBTable