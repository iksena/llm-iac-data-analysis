AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to deploy an S3 bucket integrated with Amazon EventBridge,
  an SNS topic for notifications on S3 object creation events, and an EventBridge rule
  to trigger notifications when an object is created.

Parameters:
  BucketNameParam:
    Description: "Optional custom S3 bucket name. Leave blank to auto-generate a unique name."
    Type: String
    Default: ""
    MinLength: 0
    MaxLength: 63

Conditions:
  UseCustomBucketName: !Not [ !Equals [ !Ref BucketNameParam, "" ] ]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: 
        !If
          - UseCustomBucketName
          - !Ref BucketNameParam
          - !Ref AWS::NoValue
      NotificationConfiguration:
        EventBridgeConfiguration: {}

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Object Created Notifications"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowEventBridgePublish"
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: "SNS:Publish"
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "S3ObjectCreatedRule"
      Description: "EventBridge rule triggering on S3 object creation events to forward notifications to SNS"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SNSTopic

Outputs:
  BucketName:
    Description: "Name of the S3 bucket"
    Value: !Ref S3Bucket
  SNSTopicARN:
    Description: "ARN of the SNS topic"
    Value: !Ref SNSTopic
  EventBridgeRuleName:
    Description: "Name of the EventBridge rule"
    Value: !Ref EventBridgeRule