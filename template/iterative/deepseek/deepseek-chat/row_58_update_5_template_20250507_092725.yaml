AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable Amazon EFS with automated backups and monitoring

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for EFS mount targets

  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues: [generalPurpose, maxIO]
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues: [bursting, provisioned]
    Description: EFS throughput mode

  ProvisionedThroughputInMibps:
    Type: Number
    Default: 1
    Description: Provisioned throughput in MiB/s (only if throughput mode is provisioned)
    MinValue: 1
    MaxValue: 1024

  Encrypted:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable encryption for EFS

  EnableBackups:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable automated backups via AWS Backup

  BackupSchedule:
    Type: String
    Default: 'cron(0 5 ? * * *)'
    Description: CRON expression for backup schedule

  BurstCreditBalanceThreshold:
    Type: Number
    Default: 1000000000
    Description: Alarm threshold for burst credit balance (bytes)

  PercentIOLimitThreshold:
    Type: Number
    Default: 90
    Description: Alarm threshold for IO utilization percentage
    MinValue: 1
    MaxValue: 100

Conditions:
  EnableBackupsCondition: !Equals [!Ref EnableBackups, 'true']
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VpcId.CidrBlock

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      Encrypted: !Ref Encrypted
      ProvisionedThroughputInMibps: 
        !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref 'AWS::NoValue']
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EFS'

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: EnableBackupsCondition
    Properties:
      BackupVaultName: !Sub '${AWS::StackName}-EFS-BackupVault'

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: EnableBackupsCondition
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${AWS::StackName}-EFS-BackupPlan'
        BackupPlanRule:
          - RuleName: 'DailyBackup'
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            Lifecycle:
              DeleteAfterDays: 35
            EnableContinuousBackup: false

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: EnableBackupsCondition
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: 'EFSBackupSelection'
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

  BackupRole:
    Type: AWS::IAM::Role
    Condition: EnableBackupsCondition
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: 'BackupEFSPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'elasticfilesystem:DescribeFileSystems'
                  - 'elasticfilesystem:DescribeMountTargets'
                  - 'ec2:DescribeSubnets'
                  - 'ec2:DescribeNetworkInterfaces'
                  - 'ec2:CreateNetworkInterface'
                  - 'ec2:DeleteNetworkInterface'
                  - 'ec2:DescribeInstances'
                  - 'ec2:CreateTags'
                Resource: '*'

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'Alarm when EFS burst credits are low'
      Namespace: 'AWS/EFS'
      MetricName: 'BurstCreditBalance'
      Dimensions:
        - Name: 'FileSystemId'
          Value: !Ref EFSFileSystem
      Statistic: 'Minimum'
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref BurstCreditBalanceThreshold
      ComparisonOperator: 'LessThanThreshold'
      AlarmActions:
        - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic'

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'Alarm when EFS IO utilization is high'
      Namespace: 'AWS/EFS'
      MetricName: 'PercentIOLimit'
      Dimensions:
        - Name: 'FileSystemId'
          Value: !Ref EFSFileSystem
      Statistic: 'Maximum'
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref PercentIOLimitThreshold
      ComparisonOperator: 'GreaterThanThreshold'
      AlarmActions:
        - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic'

Outputs:
  FileSystemId:
    Description: 'EFS File System ID'
    Value: !Ref EFSFileSystem

  SecurityGroupId:
    Description: 'Security Group ID for EFS access'
    Value: !GetAtt EFSSecurityGroup.GroupId

  BackupVaultArn:
    Condition: EnableBackupsCondition
    Description: 'Backup Vault ARN'
    Value: !GetAtt BackupVault.BackupVaultArn