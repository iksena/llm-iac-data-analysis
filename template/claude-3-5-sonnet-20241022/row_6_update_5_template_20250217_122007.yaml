

AWSTemplateFormatVersion: '2010-09-09'
Description: Basic EC2 instance with security group

Resources:
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: vpc-0e29c0d6e0c5c2f9c
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0440d3b780d96b29d
      InstanceType: t2.micro
      SubnetId: subnet-0f3f4d6e0c5c2f9c1
      SecurityGroupIds:
        - !Ref MySecurityGroup
      Tags:
        - Key: Name
          Value: Simple EC2 Instance

Outputs:
  InstanceId:
    Description: The Instance ID
    Value: !Ref MyEC2Instance