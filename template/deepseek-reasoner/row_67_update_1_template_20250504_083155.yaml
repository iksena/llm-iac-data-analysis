AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketName:
    Type: String
    Default: ''
    AllowedPattern: ^[a-z0-9.-]*$
    Description: '(Optional) Name for the S3 bucket. Must follow S3 naming rules. If not provided, a unique name will be generated.'
  OrganizationId:
    Type: String
    Default: ''
    Description: '(Optional) AWS Organization ID (e.g., o-xxxxxxxxxx) to grant access. If specified, the bucket will be accessible to the entire organization or specified OU.'
  AllowedOUId:
    Type: String
    Default: ''
    Description: '(Optional) Organizational Unit ID (e.g., ou-xxxx-xxxxxxxx) to restrict access within the organization. Requires OrganizationId to be provided.'

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, '']]
  HasOrgId: !Not [!Equals [!Ref OrganizationId, '']]
  HasOUId: !And [!Condition HasOrgId, !Not [!Equals [!Ref AllowedOUId, '']]]

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource: 
              - !GetAtt S3Bucket.Arn
              - !Sub '${S3Bucket.Arn}/*'
            Condition: 
              !If [
                HasOUId,
                {"StringLike": {"aws:PrincipalOrgPaths": !Sub "o-${OrganizationId}/ou-${AllowedOUId}/*"}},
                !If [
                  HasOrgId,
                  {"StringEquals": {"aws:PrincipalOrgID": !Ref OrganizationId}},
                  {"StringEquals": {"aws:PrincipalAccount": !Ref "AWS::AccountId"}}
                ]
              ]

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket
  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn