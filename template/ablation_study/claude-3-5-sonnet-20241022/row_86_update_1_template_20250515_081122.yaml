AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable GuardDuty detector for security monitoring'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: Frequency for publishing updated findings

Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      DataSources:
        S3Logs:
          Enable: true
        Kubernetes:
          AuditLogs:
            Enable: true
        MalwareProtection:
          ScanEc2InstanceWithFindings:
            Enable: true
      Tags:
        - Key: Environment
          Value: Production
        - Key: Service
          Value: SecurityMonitoring
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  GuardDutyDetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector

  GuardDutyDetectorArn:
    Description: The ARN of the GuardDuty detector
    Value: !GetAtt GuardDutyDetector.Arn

  GuardDutyStatus:
    Description: The current status of GuardDuty detector
    Value: Enabled