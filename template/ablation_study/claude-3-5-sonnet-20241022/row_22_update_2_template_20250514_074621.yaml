AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for DynamoDB Table with LSI and GSI'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9._-]+'
  
  BillingMode:
    Type: String
    Description: DynamoDB billing mode
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Type: Number
    Description: Provisioned read capacity units
    Default: 5
    MinValue: 1
    
  WriteCapacityUnits:
    Type: Number
    Description: Provisioned write capacity units
    Default: 5
    MinValue: 1

Conditions:
  IsProvisionedBilling: !Equals 
    - !Ref BillingMode
    - PROVISIONED

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: LSI1
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: LSI_1
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: LSI1
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSI_1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput: !If
            - IsProvisionedBilling
            - ReadCapacityUnits: !Ref ReadCapacityUnits
              WriteCapacityUnits: !Ref WriteCapacityUnits
            - !Ref AWS::NoValue
      ProvisionedThroughput: !If
        - IsProvisionedBilling
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn