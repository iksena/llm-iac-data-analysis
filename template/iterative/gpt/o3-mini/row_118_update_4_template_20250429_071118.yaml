AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template that provisions an SQS queue, a CloudWatch Log Group,
  an IAM Role with required permissions, an API Connection and API Destination for
  calling https://api.zippopotam.us/us, and an EventBridge Pipe that reads from the SQS,
  enriches messages via the API Destination, and sends results to CloudWatch Logs.

Resources:
  MyQueue:
    Type: "AWS::SQS::Queue"
    Properties:
      QueueName: "EventSourceQueue"

  MyLogGroup:
    Type: "AWS::Logs::LogGroup"
    Properties:
      LogGroupName: "EnrichedMessagesLogGroup"
      RetentionInDays: 14

  EventBridgePipesRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "EventBridgePipesRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "pipes.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: "EventBridgePipesPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "sqs:ReceiveMessage"
                  - "sqs:DeleteMessage"
                  - "sqs:GetQueueAttributes"
                Resource: 
                  !GetAtt MyQueue.Arn
              - Effect: "Allow"
                Action:
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: 
                  Fn::Sub:
                    - "${LogGroupArn}:*"
                    - LogGroupArn: !GetAtt MyLogGroup.Arn
              - Effect: "Allow"
                Action:
                  - "events:InvokeApiDestination"
                Resource: 
                  !GetAtt MyApiDestination.Arn

  MyApiConnection:
    Type: "AWS::Events::Connection"
    Properties:
      AuthorizationType: "NONE"
      ConnectionName: "MyApiConnection"

  MyApiDestination:
    Type: "AWS::Events::ApiDestination"
    Properties:
      ApiDestinationName: "MyApiDestination"
      ConnectionArn: !GetAtt MyApiConnection.Arn
      InvocationEndpoint: "https://api.zippopotam.us/us"
      HttpMethod: "GET"
      InvocationRateLimitPerSecond: 10

  MyPipe:
    Type: "AWS::Pipes::Pipe"
    Properties:
      Description: "Pipe that reads from an SQS queue, enriches the message by invoking an external API, and logs the enriched messages to CloudWatch Logs."
      RoleArn: !GetAtt EventBridgePipesRole.Arn
      Source: !GetAtt MyQueue.Arn
      SourceParameters:
        SqsParameters:
          BatchSize: 1
      Target: !GetAtt MyLogGroup.Arn
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamName: "EnrichedMessagesStream"
      Enrichment: !GetAtt MyApiDestination.Arn

Outputs:
  QueueURL:
    Description: "URL of the SQS Queue serving as the event source."
    Value: !Ref MyQueue
  LogGroupName:
    Description: "Name of the CloudWatch Log Group storing enriched messages."
    Value: !Ref MyLogGroup
  PipeArn:
    Description: "ARN of the EventBridge Pipe workflow."
    Value: !GetAtt MyPipe.Arn