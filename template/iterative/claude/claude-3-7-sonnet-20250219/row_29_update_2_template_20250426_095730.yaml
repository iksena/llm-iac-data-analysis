AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for secure parameter storage and retrieval using SSM Parameter Store and Secrets Manager'

Parameters:
  NamespacePrefix:
    Type: String
    Default: '/config'
    Description: 'Prefix for SSM parameter namespace'
  
  LambdaRuntimePython:
    Type: String
    Default: 'python3.9'
    Description: 'Runtime for the Lambda function'
    AllowedValues:
      - 'python3.8'
      - 'python3.9'
      - 'python3.10'
      - 'python3.11'

Resources:
  # SSM Parameters
  ConfigParameterA:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '${NamespacePrefix}/demo/paramA'
      Type: 'String'
      Value: 'This is A'
      Description: 'Demo parameter A'
      Tier: 'Standard'

  ConfigParameterB:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '${NamespacePrefix}/demo/paramB'
      Type: 'String'
      Value: 'This is B'
      Description: 'Demo parameter B'
      Tier: 'Standard'

  ConfigParameterSecure:
    Type: 'AWS::SSM::Parameter'
    Properties:
      Name: !Sub '${NamespacePrefix}/demo/secure-param'
      Type: 'SecureString'
      Value: 'This is a secure value'
      Description: 'Demo secure parameter'
      Tier: 'Standard'

  # Secrets Manager Secret
  DemoSecret:
    Type: 'AWS::SecretsManager::Secret'
    Properties:
      Name: !Sub '${AWS::StackName}-demo-secret'
      Description: 'Demo secret with username and generated password'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "demouser"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: 'Purpose'
          Value: 'Demo'

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: 'SSMParameterAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'ssm:GetParameter'
                  - 'ssm:GetParameters'
                  - 'ssm:GetParametersByPath'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${NamespacePrefix}/*'
        - PolicyName: 'SecretsManagerAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !GetAtt DemoSecret.Arn

  # Lambda Function
  ParameterRetrievalFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-parameter-retrieval'
      Handler: 'index.handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntimePython
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          PARAMETER_PATH: !Ref NamespacePrefix
          SECRET_NAME: !Ref DemoSecret
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          import logging

          # Configure logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Initialize clients
          ssm_client = boto3.client('ssm')
          secrets_client = boto3.client('secretsmanager')

          def handler(event, context):
              try:
                  # Get environment variables
                  parameter_path = os.environ.get('PARAMETER_PATH', '/config')
                  secret_name = os.environ.get('SECRET_NAME')
                  
                  logger.info(f"Retrieving parameters from path: {parameter_path}")
                  logger.info(f"Retrieving secret: {secret_name}")
                  
                  # Get parameters by path
                  response = ssm_client.get_parameters_by_path(
                      Path=parameter_path,
                      Recursive=True,
                      WithDecryption=True
                  )
                  
                  parameters = {}
                  for param in response['Parameters']:
                      parameters[param['Name']] = param['Value']
                      logger.info(f"Retrieved parameter: {param['Name']}")
                  
                  # Get individual parameters
                  param_a = ssm_client.get_parameter(
                      Name=f"{parameter_path}/demo/paramA",
                      WithDecryption=True
                  )
                  
                  param_b = ssm_client.get_parameter(
                      Name=f"{parameter_path}/demo/paramB",
                      WithDecryption=True
                  )
                  
                  secure_param = ssm_client.get_parameter(
                      Name=f"{parameter_path}/demo/secure-param",
                      WithDecryption=True
                  )
                  
                  # Get secret
                  secret_response = secrets_client.get_secret_value(
                      SecretId=secret_name
                  )
                  
                  secret_value = json.loads(secret_response['SecretString'])
                  
                  # Prepare result
                  result = {
                      'parameters_by_path': parameters,
                      'individual_parameters': {
                          'param_a': param_a['Parameter']['Value'],
                          'param_b': param_b['Parameter']['Value'],
                          'secure_param': secure_param['Parameter']['Value']
                      },
                      'secret': {
                          'username': secret_value.get('username'),
                          'password_length': len(secret_value.get('password', ''))
                      }
                  }
                  
                  logger.info("Successfully retrieved all parameters and secrets")
                  return {
                      'statusCode': 200,
                      'body': json.dumps(result)
                  }
                  
              except Exception as e:
                  logger.error(f"Error retrieving parameters: {str(e)}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'error': str(e)
                      })
                  }

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Lambda function'
    Value: !GetAtt ParameterRetrievalFunction.Arn
    
  ParameterNamespace:
    Description: 'Namespace for SSM parameters'
    Value: !Ref NamespacePrefix
    
  SecretArn:
    Description: 'ARN of the Secrets Manager secret'
    Value: !Ref DemoSecret
    
  InvokeCommand:
    Description: 'Command to invoke the Lambda function'
    Value: !Sub 'aws lambda invoke --function-name ${ParameterRetrievalFunction} output.json'