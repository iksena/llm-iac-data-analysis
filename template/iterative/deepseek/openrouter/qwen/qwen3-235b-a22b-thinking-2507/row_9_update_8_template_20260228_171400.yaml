AWSTemplateFormatVersion: "2010-09-09"
Description: "Self-contained encrypted One Zone EFS file system in us-east-1a"

Resources:
  EFSVPC:
    Type: "AWS::EC2::VPC"
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "EFS-VPC"

  EFSInternetGateway:
    Type: "AWS::EC2::InternetGateway"
    Properties:
      Tags:
        - Key: Name
          Value: "EFS-IGW"

  EFSVPCGatewayAttachment:
    Type: "AWS::EC2::VPCGatewayAttachment"
    Properties:
      InternetGatewayId: !Ref EFSInternetGateway
      VpcId: !Ref EFSVPC

  EFSSubnet:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref EFSVPC
      CidrBlock: "10.0.0.0/24"
      AvailabilityZone: "us-east-1a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "EFS-Subnet-us-east-1a"

  EFSSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Security group for EFS mount target"
      VpcId: !Ref EFSVPC
      SecurityGroupIngress:
        - IpProtocol: "tcp"
          FromPort: 2049
          ToPort: 2049
          CidrIp: "10.0.0.0/16"
      Tags:
        - Key: Name
          Value: "EFS-SG"

  EncryptedEFSFileSystem:
    Type: "AWS::EFS::FileSystem"
    Properties:
      AvailabilityZoneName: "us-east-1a"
      Encrypted: true
      PerformanceMode: "generalPurpose"
      ThroughputMode: "bursting"
    DeletionPolicy: "Retain"
    UpdateReplacePolicy: "Retain"

  EFSMountTarget:
    Type: "AWS::EFS::MountTarget"
    Properties:
      FileSystemId: !Ref EncryptedEFSFileSystem
      SubnetId: !Ref EFSSubnet
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: "ID of the encrypted EFS file system"
    Value: !Ref EncryptedEFSFileSystem
  DNSName:
    Description: "DNS name for mounting the file system"
    Value: !Sub "${EncryptedEFSFileSystem}.efs.${AWS::Region}.amazonaws.com"
  MountTargetId:
    Description: "ID of the EFS mount target"
    Value: !Ref EFSMountTarget