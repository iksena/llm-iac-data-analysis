AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an EventBridge Pipes workflow which reads messages from SQS,
  enriches the messages by calling an external API (https://api.zippopotam.us/us/*) using an API Destination,
  and logs the enriched messages to a CloudWatch Log Group. An IAM role with necessary permissions is provisioned.

Resources:
  # SQS Queue as event source
  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "EventSourceQueue"

  # CloudWatch Log Group as target for enriched messages
  MyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "EnrichedMessagesLogGroup"
      RetentionInDays: 14

  # IAM Role for EventBridge Pipes with permissions to read from SQS, invoke API Destination, and write to CloudWatch Logs
  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "EventBridgePipesRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: "EventBridgePipesPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Permissions for SQS operations
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: 
                  Fn::GetAtt: [ MyQueue, Arn ]
              # Permissions for CloudWatch Logs operations
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 
                  Fn::Sub: "${MyLogGroup.Arn}:*"
              # Permission to invoke the API Destination
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: 
                  Fn::GetAtt: [ MyApiDestination, Arn ]

  # API Connection for API Destination (no authentication needed)
  MyApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: NONE
      ConnectionName: "MyApiConnection"

  # API Destination to call the external API (endpoint will be composed as base URL)
  MyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ApiDestinationName: "MyApiDestination"
      ConnectionArn: 
        Fn::GetAtt: [ MyApiConnection, Arn ]
      InvocationEndpoint: "https://api.zippopotam.us/us"
      HttpMethod: GET
      InvocationRateLimitPerSecond: 10

  # EventBridge Pipe to orchestrate the flow: SQS -> API enrichment -> CloudWatch Logs
  MyPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Description: "Pipe that reads from SQS, enriches message data by calling the external API, and logs enriched messages."
      RoleArn: 
        Fn::GetAtt: [ EventBridgePipesRole, Arn ]
      Source: 
        Fn::GetAtt: [ MyQueue, Arn ]
      SourceParameters:
        SqsParameters:
          BatchSize: 1
      Target: 
        Fn::GetAtt: [ MyLogGroup, Arn ]
      TargetParameters:
        CloudWatchLogsParameters:
          LogStreamName: "EnrichedMessagesStream"
      # The enrichment property uses the API Destination ARN for data augmentation.
      Enrichment: 
        Fn::GetAtt: [ MyApiDestination, Arn ]

Outputs:
  QueueURL:
    Description: "URL of the SQS Queue serving as the event source"
    Value:
      Ref: MyQueue
  LogGroupName:
    Description: "Name of the CloudWatch Log Group that logs enriched messages"
    Value:
      Ref: MyLogGroup
  PipeArn:
    Description: "ARN of the EventBridge Pipe workflow"
    Value:
      Fn::GetAtt: [ MyPipe, Arn ]