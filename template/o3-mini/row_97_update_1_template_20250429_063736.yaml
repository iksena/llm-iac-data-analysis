AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to create a serverless pipeline for collecting, storing, and analyzing AWS Organization data. 
  The template provisions an encrypted S3 bucket for data storage, a Lambda function (with a weekly CloudWatch Event trigger) to retrieve AWS Organizations data,
  and a Glue Crawler to catalog the data into an Athena database. All resources use secure IAM roles and parameterized inputs.

Parameters:
  S3BucketName:
    Description: "Name of the S3 bucket where organizational data will be stored."
    Type: String
  ManagementAccountId:
    Description: "AWS Management Account ID used for cross-account role assumption."
    Type: String
  ReportTags:
    Description: "Tags to include in reports (comma-separated key=value pairs)."
    Type: String
    Default: ""
  AthenaDatabaseName:
    Description: "Name of the Athena database to catalog the data."
    Type: String
    Default: "managementcur"

Resources:
  S3DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    DeletionPolicy: Retain

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3DataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyUnEncryptedObjectUploads
            Effect: Deny
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "${S3DataBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: "AES256"
          - Sid: RestrictBucketAccess
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt S3DataBucket.Arn
              - !Sub "${S3DataBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-LambdaExecutionRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaOrgDataAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - organizations:ListAccounts
                  - organizations:ListOrganizationalUnitsForParent
                  - organizations:DescribeOrganization
                  - organizations:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !Sub "arn:aws:iam::${ManagementAccountId}:role/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-FetchOrgData"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.8
      Timeout: 300
      Environment:
        Variables:
          S3_BUCKET: !Ref S3DataBucket
          MANAGEMENT_ACCOUNT_ID: !Ref ManagementAccountId
          REPORT_TAGS: !Ref ReportTags
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          def handler(event, context):
              s3 = boto3.client('s3')
              # Placeholder: assume cross-account role logic to fetch org data
              # For example, using boto3.client('organizations') after assuming role if required.
              org_data = {
                  "Accounts": [],
                  "OrganizationalUnits": [],
                  "Tags": os.environ.get('REPORT_TAGS', "")
              }
              bucket = os.environ.get('S3_BUCKET')
              key = "org_data_{}.json".format(context.aws_request_id)
              s3.put_object(Bucket=bucket, Key=key, Body=json.dumps(org_data))
              return {"status": "success", "s3_key": key}

  LambdaCloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-WeeklyScheduleRule"
      Description: "Triggers Lambda every week to fetch AWS Organization data."
      ScheduleExpression: "rate(7 days)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: "LambdaTarget"
    DependsOn: LambdaFunction

  LambdaPermissionForEvents:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LambdaCloudWatchEventRule.Arn

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-GlueServiceRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt S3DataBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${S3DataBucket.Arn}/*"

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${AWS::StackName}-Crawler"
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref GlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub "s3://${S3DataBucket}/"
      Schedule:
        ScheduleExpression: "cron(0 0 ? * SUN *)"
      SchemaChangePolicy:
        UpdateBehavior: LOG
        DeleteBehavior: LOG

Outputs:
  S3BucketARN:
    Description: "ARN of the S3 bucket storing organizational data."
    Value: !GetAtt S3DataBucket.Arn
  LambdaFunctionARN:
    Description: "ARN of the Lambda function that fetches AWS Organizations data."
    Value: !GetAtt LambdaFunction.Arn
  GlueCrawlerName:
    Description: "Name of the Glue crawler used to catalog the S3 data."
    Value: !Ref GlueCrawler