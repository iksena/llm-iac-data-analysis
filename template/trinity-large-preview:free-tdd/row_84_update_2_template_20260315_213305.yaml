AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: ENABLED

Outputs:
  MacieSessionAwsAccountId:
    Description: The AWS Account ID of the Macie Session
    Value: !GetAtt MacieSession.AwsAccountId
    Export:
      Name: MacieSessionAwsAccountId