AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify App with Production Branch for TodoApp

Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify App
  BranchName:
    Type: String
    Default: main
    Description: Name of the branch to deploy
  Repository:
    Type: String
    Description: URL of the source repository
  OAuthToken:
    Type: String
    NoEcho: true
    Description: OAuth token for the source repository

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AmplifyServiceRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                  - s3:Put*
                  - s3:DeleteObject
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      OauthToken: !Ref OAuthToken
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      Description: Production branch for TodoApp
      Stage: PRODUCTION
      EnableAutoBuild: true
      Framework: react
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm install
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  ArtifactStore:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AppName}-artifacts'

Outputs:
  AmplifyAppId:
    Description: Amplify App ID
    Value: !GetAtt AmplifyApp.AppId
  BranchName:
    Description: Branch Name
    Value: !Ref BranchName