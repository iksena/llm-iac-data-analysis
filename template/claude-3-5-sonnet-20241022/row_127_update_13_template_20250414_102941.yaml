AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EFS file system in testing environment'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: EFS-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Join ["", [!Ref "AWS::Region", "a"]]
      Tags:
        - Key: Name
          Value: EFS-Subnet

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Sub ${FileSystem}.efs.${AWS::Region}.amazonaws.com

  MountTargetId:
    Description: ID of the Mount Target
    Value: !Ref MountTarget

  VPCId:
    Description: ID of the VPC
    Value: !Ref VPC

  SubnetId:
    Description: ID of the Subnet
    Value: !Ref Subnet

  SecurityGroupId:
    Description: ID of the Security Group created for EFS
    Value: !Ref EFSSecurityGroup