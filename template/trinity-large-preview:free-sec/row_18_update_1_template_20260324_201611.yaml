AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB to EventBridge integration with EventBridge Pipes

Parameters:
  TableName:
    Type: String
    Default: UserDataTable
    Description: Name of the DynamoDB table
  PipeName:
    Type: String
    Default: DynamoDBToEventBridgePipe
    Description: Name of the EventBridge Pipe
  EventBusName:
    Type: String
    Default: default
    Description: Name of the EventBridge bus to send events to
  DetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType for the EventBridge event
  Source:
    Type: String
    Default: com.example.user.avatar
    Description: Source for the EventBridge event

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      BillingMode: PAY_PER_REQUEST

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref PipeName
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 0
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        EventBridgeTargetParameters:
          DetailType: !Ref DetailType
          Source: !Ref Source
          EventBusName: !Ref EventBusName
      Enrichment: NONE
      Filter:
        EventPattern:
          detail:
            avatarUrl:
              endsWith: [".png"]
      RequiredCreateOrUpdatePermissions:
        Create: true
        Update: true
        Delete: true

Outputs:
  PipeArn:
    Description: The ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  DynamoDBStreamArn:
    Description: The ARN of the DynamoDB stream
    Value: !GetAtt DynamoDBTable.StreamArn