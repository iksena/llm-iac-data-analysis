AWSTemplateFormatVersion: "2010-09-09"
Description: "Encrypted One Zone EFS file system in us-east-1a"

Parameters:
  SubnetId:
    Description: "Subnet ID in us-east-1a for EFS mount target"
    Type: "AWS::EC2::Subnet::Id"
  SecurityGroupIds:
    Description: "List of security group IDs for EFS mount target"
    Type: "List<AWS::EC2::SecurityGroup::Id>"

Resources:
  EncryptedEFSFileSystem:
    Type: "AWS::EFS::FileSystem"
    Properties:
      AvailabilityZoneName: "us-east-1a"
      Encrypted: true
    DeletionPolicy: "Retain"

  EFSMountTarget:
    Type: "AWS::EFS::MountTarget"
    Properties:
      FileSystemId: !Ref EncryptedEFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups: !Ref SecurityGroupIds

Outputs:
  FileSystemId:
    Description: "ID of the encrypted EFS file system"
    Value: !Ref EncryptedEFSFileSystem
  DNSName:
    Description: "DNS name for mounting the file system"
    Value: !Sub "${EncryptedEFSFileSystem}.efs.${AWS::Region}.amazonaws.com"
  MountTargetId:
    Description: "ID of the EFS mount target"
    Value: !Ref EFSMountTarget