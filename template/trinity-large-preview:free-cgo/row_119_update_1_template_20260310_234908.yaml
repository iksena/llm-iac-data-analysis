AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis integration for real-time event streaming

Resources:
  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: my-application

  MyKinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1

  EventBridgeToKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt MyKinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyEventBus
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt MyKinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeToKinesisRole.Arn

Outputs:
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref MyEventBus
  KinesisStreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt MyKinesisStream.Arn