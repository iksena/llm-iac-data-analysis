AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog with S3, Lambda, and deployment permissions
Resources:
  ServiceCatalogExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalog-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
      Policies:
        - PolicyName: ServiceCatalog-GranularPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:UpdateProvisionedProduct
                  - servicecatalog:TerminateProvisionedProduct
                  - servicecatalog:DescribeProvisionedProduct
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:PassRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:AddPermission
                  - lambda:RemovePermission
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:Publish
                Resource: '*'
Outputs:
  ExecutionRoleARN:
    Description: ARN of the Service Catalog execution role
    Value: !GetAtt ServiceCatalogExecutionRole.Arn
    Export:
      Name: ServiceCatalogExecutionRoleARN