AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for VPC Flow Logs with lifecycle management and security controls'

Parameters:
  BucketName:
    Type: String
    Description: 'Optional custom name for the S3 bucket (leave blank for auto-generated name)'
    Default: ''
    AllowedPattern: '^$|^[a-z0-9][a-z0-9.-]*[a-z0-9]$'
    ConstraintDescription: 'Bucket name must be lowercase and contain only alphanumeric characters, hyphens and dots'

  EnableVersioning:
    Type: String
    Description: 'Enable versioning for the S3 bucket'
    Default: 'Yes'
    AllowedValues:
      - 'Yes'
      - 'No'

  TransitionToDaysGlacier:
    Type: Number
    Description: 'Number of days before transitioning objects to Glacier'
    Default: 30
    MinValue: 1

  RetentionInDays:
    Type: Number
    Description: 'Number of days to retain objects before deletion'
    Default: 365000
    MinValue: 1

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, '']]
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, 'Yes']

Resources:
  FlowLogsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If [UseCustomBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: !If [EnableVersioningCondition, 'Enabled', 'Suspended']
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: 'TransitionToGlacierAndExpire'
            Status: 'Enabled'
            Transitions:
              - StorageClass: 'GLACIER'
                TransitionInDays: !Ref TransitionToDaysGlacier
            ExpirationInDays: !Ref RetentionInDays
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  FlowLogsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref FlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'AWSLogDeliveryWrite'
            Effect: 'Allow'
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action: 's3:PutObject'
            Resource: !Sub '${FlowLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Sid: 'AWSLogDeliveryAclCheck'
            Effect: 'Allow'
            Principal:
              Service: 'delivery.logs.amazonaws.com'
            Action: 's3:GetBucketAcl'
            Resource: !GetAtt FlowLogsBucket.Arn

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref FlowLogsBucket

  BucketArn:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt FlowLogsBucket.Arn