AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway with DynamoDB integration for music data management'

Parameters:
  StageName:
    Type: String
    Default: 'prod'
    Description: 'API Gateway deployment stage name'
  
  RateLimitValue:
    Type: Number
    Default: 1000
    Description: 'Number of requests per second'
  
  BurstLimitValue:
    Type: Number
    Default: 2000
    Description: 'Maximum burst size'
  
  TableReadCapacity:
    Type: Number
    Default: 5
    Description: 'DynamoDB table read capacity units'
  
  TableWriteCapacity:
    Type: Number
    Default: 5
    Description: 'DynamoDB table write capacity units'

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Music
      AttributeDefinitions:
        - AttributeName: MusicId
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: MusicId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref TableReadCapacity
            WriteCapacityUnits: !Ref TableWriteCapacity
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref TableReadCapacity
        WriteCapacityUnits: !Ref TableWriteCapacity

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: 
                  - !GetAtt MusicTable.Arn
                  - !Sub ${MusicTable.Arn}/index/*

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-MusicAPI
      Description: API for music data management
      EndpointConfiguration:
        Types:
          - REGIONAL

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: 'music'

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: |
            {
              "TableName": "${MusicTable}",
              "Item": {
                "MusicId": {"S": "$context.requestId"},
                "Artist": {"S": "$input.path('$.artist')"},
                "Album": {"S": "$input.path('$.album')"}
              }
            }
        IntegrationResponses:
          - StatusCode: '200'
      MethodResponses:
        - StatusCode: '200'

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: |
            {
              "TableName": "${MusicTable}",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :v1",
              "ExpressionAttributeValues": {
                ":v1": {"S": "$input.parameters('artist')"}
              }
            }
        IntegrationResponses:
          - StatusCode: '200'
      MethodResponses:
        - StatusCode: '200'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId: !Ref MusicApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref MusicApi
      StageName: !Ref StageName

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub ${AWS::StackName}-ApiKey
      Description: API Key for music API
      Enabled: true
      StageKeys:
        - RestApiId: !Ref MusicApi
          StageName: !Ref StageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub ${AWS::StackName}-UsagePlan
      Description: Usage plan for music API
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref StageName
      Throttle:
        RateLimit: !Ref RateLimitValue
        BurstLimit: !Ref BurstLimitValue

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/music

  ApiKeyId:
    Description: 'API Key ID'
    Value: !Ref ApiKey

  DynamoDBTableName:
    Description: 'DynamoDB table name'
    Value: !Ref MusicTable