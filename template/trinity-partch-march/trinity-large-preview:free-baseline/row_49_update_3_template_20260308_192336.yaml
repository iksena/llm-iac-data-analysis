AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster with Fargate for serverless container deployment

Parameters:
  ClusterName:
    Type: String
    Default: MyFargateCluster
    Description: Name of the ECS cluster
  TaskName:
    Type: String
    Default: MyFargateTask
    Description: Name of the ECS task definition
  ContainerImage:
    Type: String
    Default: nginx:latest
    Description: Container image to deploy
  LogRetentionInDays:
    Type: Number
    Default: 30
    Description: Log retention period in days

Resources:
  ECSServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceRole

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ecs-tasks.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ClusterName}/fargate"
      RetentionInDays: !Ref LogRetentionInDays

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSFargateTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Ref TaskName
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: !Ref TaskName
          Image: !Ref ContainerImage
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECSFargateService:
    Type: AWS::ECS::Service
    DependsOn: CloudWatchLogGroup
    Properties:
      ServiceName: !Ref TaskName
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSFargateTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::Select:
              - 0
              - Fn::GetAZs: !Ref AWS::Region
          SecurityGroups:
            - Fn::GetAtt:
              - ECSFargateSecurityGroup
              - GroupId

  ECSFargateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Fargate tasks
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "default-vpc"

Outputs:
  ClusterArn:
    Value: !GetAtt ECSCluster.Arn
    Description: ECS Cluster ARN
  ServiceName:
    Value: !GetAtt ECSFargateService.Name
    Description: ECS Service Name
  TaskDefinitionArn:
    Value: !Ref ECSFargateTaskDefinition
    Description: ECS Task Definition ARN