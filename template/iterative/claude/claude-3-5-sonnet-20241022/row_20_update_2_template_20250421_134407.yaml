AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Logs Insights Queries for Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'Client VPN Endpoint ID to monitor'
  
  LogGroupName:
    Type: String
    Description: 'Log group name containing Client VPN logs'
    
  DashboardName:
    Type: String
    Description: 'Name for the CloudWatch Dashboard'
    Default: 'ClientVPNMonitoring'
    
  RefreshRate:
    Type: Number
    Description: 'Dashboard refresh rate in seconds'
    Default: 300
    MinValue: 60
    MaxValue: 3600

Resources:
  ConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub '${AWS::StackName}-connection-duration'
      QueryString: !Sub |
        fields @timestamp, user, connection_id
        | filter @logStream like /${VPNEndpointId}/
        | stats avg(connection_duration) as avg_duration,
                max(connection_duration) as max_duration,
                count(*) as connection_count by user
        | sort avg_duration desc
      LogGroupNames: 
        - !Ref LogGroupName

  DataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub '${AWS::StackName}-data-transfer'
      QueryString: !Sub |
        fields @timestamp, bytes_in, bytes_out, connection_id
        | filter @logStream like /${VPNEndpointId}/
        | stats sum(bytes_in) as total_ingress,
                sum(bytes_out) as total_egress by connection_id
        | sort total_ingress desc
      LogGroupNames:
        - !Ref LogGroupName

  AuthenticationTypeQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub '${AWS::StackName}-auth-types'
      QueryString: !Sub |
        fields @timestamp, authentication_method
        | filter @logStream like /${VPNEndpointId}/
        | stats count(*) as auth_count by authentication_method
        | sort auth_count desc
      LogGroupNames:
        - !Ref LogGroupName

  VPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    DependsOn: 
      - ConnectionDurationQuery
      - DataTransferQuery
      - AuthenticationTypeQuery
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: 
        !Join
          - ''
          - - '{"widgets":['
            - '{"type":"log","x":0,"y":0,"width":12,"height":6,"properties":{'
            - '"query":"'
            - !Sub "fields @timestamp, user, connection_id | filter @logStream like /${VPNEndpointId}/ | stats avg(connection_duration) as avg_duration, max(connection_duration) as max_duration, count(*) as connection_count by user | sort avg_duration desc"
            - '","region":"'
            - !Ref AWS::Region
            - '","title":"Connection Duration by User","view":"table"}},'
            - '{"type":"log","x":12,"y":0,"width":12,"height":6,"properties":{'
            - '"query":"'
            - !Sub "fields @timestamp, bytes_in, bytes_out, connection_id | filter @logStream like /${VPNEndpointId}/ | stats sum(bytes_in) as total_ingress, sum(bytes_out) as total_egress by connection_id | sort total_ingress desc"
            - '","region":"'
            - !Ref AWS::Region
            - '","title":"Data Transfer Volumes","view":"table"}},'
            - '{"type":"log","x":0,"y":6,"width":24,"height":6,"properties":{'
            - '"query":"'
            - !Sub "fields @timestamp, authentication_method | filter @logStream like /${VPNEndpointId}/ | stats count(*) as auth_count by authentication_method | sort auth_count desc"
            - '","region":"'
            - !Ref AWS::Region
            - '","title":"Authentication Methods Distribution","view":"pie"}}'
            - ']}'

Outputs:
  DashboardURL:
    Description: 'URL for the CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
    
  ConnectionDurationQueryId:
    Description: 'Query ID for Connection Duration Analysis'
    Value: !Ref ConnectionDurationQuery
    
  DataTransferQueryId:
    Description: 'Query ID for Data Transfer Analysis'
    Value: !Ref DataTransferQuery
    
  AuthenticationTypeQueryId:
    Description: 'Query ID for Authentication Type Analysis'
    Value: !Ref AuthenticationTypeQuery