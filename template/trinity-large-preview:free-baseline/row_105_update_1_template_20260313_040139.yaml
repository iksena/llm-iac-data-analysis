AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for Cross-Service Automation Workflows with SSM, EC2, and Monitoring Permissions

Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossServiceAutomationRole
      Description: IAM Role for cross-service automation workflows with SSM, EC2, and monitoring permissions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  CrossServiceAutomationPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CrossServiceAutomationPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ec2:Describe*
              - cloudwatch:Get*
              - cloudwatch:List*
              - cloudwatch:PutMetricData
            Resource: '*'
      Roles:
        - !Ref CrossServiceAutomationRole

Outputs:
  RoleArn:
    Description: ARN of the created IAM Role
    Value: !GetAtt CrossServiceAutomationRole.Arn