AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable Security Hub with default standards and consolidated control findings'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      AutoEnableControls: true

  CISFoundationStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/cis-aws-foundations-benchmark/v/1.2.0'
    DependsOn: SecurityHub

  AWSFoundationalSecurityBestPractices:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/aws-foundational-security-best-practices/v/1.0.0'
    DependsOn: SecurityHub

  PCIDSSStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/pci-dss/v/3.2.1'
    DependsOn: SecurityHub

  NISTStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}::standards/nist-800-53/v/5.0.0'
    DependsOn: SecurityHub

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub resource
    Value: !GetAtt SecurityHub.Arn