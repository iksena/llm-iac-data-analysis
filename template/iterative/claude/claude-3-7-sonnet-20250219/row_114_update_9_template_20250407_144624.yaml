AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for EDI X12_214 to JSON transformation pipeline'

Resources:
  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "edi-input-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "json-output-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  B2BIServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Path: /service-role/

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt B2BIServiceRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${InputS3Bucket}"
              - !Sub "arn:aws:s3:::${InputS3Bucket}/*"

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt B2BIServiceRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${OutputS3Bucket}"
              - !Sub "arn:aws:s3:::${OutputS3Bucket}/*"

Outputs:
  InputBucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputS3Bucket
    
  OutputBucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputS3Bucket
    
  InputBucketArn:
    Description: ARN of the input S3 bucket
    Value: !GetAtt InputS3Bucket.Arn
    
  OutputBucketArn:
    Description: ARN of the output S3 bucket
    Value: !GetAtt OutputS3Bucket.Arn
    
  B2BIServiceRoleArn:
    Description: ARN of the IAM role for B2BI service
    Value: !GetAtt B2BIServiceRole.Arn
    
  SetupInstructions:
    Description: Instructions for completing the B2BI setup
    Value: "Use the AWS B2BI console to create a profile, transformer, capability, and partnership using the created S3 buckets and IAM role."