AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted S3 bucket for ALB access logs with retention policy and required access permissions

Mappings:
  ELBAccountIds:
    us-east-1:
      accountID: 127311923021
    us-east-2:
      accountID: 033677994240
    us-west-1:
      accountID: 027434742980
    us-west-2:
      accountID: 797873946194
    eu-west-1:
      accountID: 156460612806
    ap-south-1:
      accountID: 718504428378
    ap-northeast-1:
      accountID: 582318560864
    ap-northeast-2:
      accountID: 600734575887
    ap-southeast-1:
      accountID: 114774131450
    ap-southeast-2:
      accountID: 783225319266
    ca-central-1:
      accountID: 985666609251
    eu-central-1:
      accountID: 054676820928
    eu-west-2:
      accountID: 652711504416
    sa-east-1:
      accountID: 507241528517

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ELBAccessLogs
            Effect: Allow
            Principal:
              AWS: !FindInMap [ELBAccountIds, !Ref "AWS::Region", accountID]
            Action: 
              - s3:PutObject
            Resource: !Sub "${ALBAccessLogsBucket.Arn}/*"
          - Sid: LogDeliveryWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: 
              - s3:PutObject
            Resource: !Sub "${ALBAccessLogsBucket.Arn}/*"
            Condition:
              StringEquals:
                's3:x-amz-acl': bucket-owner-full-control
          - Sid: LogDeliveryCheck
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: 
              - s3:GetBucketAcl
            Resource: !GetAtt ALBAccessLogsBucket.Arn

Outputs:
  BucketName:
    Value: !Ref ALBAccessLogsBucket
    Description: Name of the created S3 bucket for ALB access logs