AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a cross-account private API Gateway with Lambda integration and VPC endpoint access'

Parameters:
  VpcEndpointId:
    Type: String
    Description: The ID of the VPC endpoint to restrict API Gateway access to
    Default: vpce-0123456789abcdef0

  StageName:
    Type: String
    Default: prod
    Description: Name of the API Gateway stage

  TargetAccountId:
    Type: String
    Description: The account ID where the Lambda function is deployed
    Default: 123456789012

  TargetLambdaName:
    Type: String
    Description: The name of the Lambda function in the target account
    Default: CrossAccountApiFunction

  ApiGatewayName:
    Type: String
    Description: Name for the API Gateway
    Default: CrossAccountPrivateApi

Resources:
  # API Gateway Resources
  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiGatewayName
      Description: Private API Gateway with cross-account Lambda integration
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*/*/*'
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref VpcEndpointId
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*/*/*'

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: 'api'

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/arn:aws:lambda:${AWS::Region}:${TargetAccountId}:function:${TargetLambdaName}/invocations
        Credentials: !GetAtt ApiGatewayRole.Arn

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      Description: Deployment for cross-account private API

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiGatewayDeployment
      StageName: !Ref StageName
      Description: Stage for cross-account private API

  # IAM Roles and Permissions
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ApiGatewayRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CrossAccountLambdaInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${TargetAccountId}:function:${TargetLambdaName}

Outputs:
  ApiGatewayId:
    Description: ID of the API Gateway REST API
    Value: !Ref ApiGatewayRestApi

  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api
    
  ApiGatewayRoleArn:
    Description: ARN of the API Gateway execution role
    Value: !GetAtt ApiGatewayRole.Arn

  VpcEndpointAccess:
    Description: This API is only accessible through the specified VPC Endpoint
    Value: !Ref VpcEndpointId