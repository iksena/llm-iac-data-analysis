AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MobileNotificationsReporting
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: "notificationId"
          AttributeType: "S"
        - AttributeName: "timestamp"
          AttributeType: "N"
        - AttributeName: "type"
          AttributeType: "S"
        - AttributeName: "sentTime"
          AttributeType: "N"
      KeySchema:
        - AttributeName: "notificationId"
          KeyType: "HASH"
        - AttributeName: "timestamp"
          KeyType: "RANGE"
      GlobalSecondaryIndexes:
        - IndexName: "TypeSentTimeIndex"
          KeySchema:
            - AttributeName: "type"
              KeyType: "HASH"
            - AttributeName: "sentTime"
              KeyType: "RANGE"
          Projection:
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 1
            WriteCapacityUnits: 1
      TimeToLiveSpecification:
        AttributeName: "ttl"
        Enabled: true