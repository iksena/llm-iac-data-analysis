AWSTemplateFormatVersion: '2010-09-09'

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Join
              - ''
              - - 'arn:aws:s3:::'
                - !Ref LambdaArtifactsBucket
                - '/*'

  LambdaArtifactsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Lambda artifacts encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
          - Sid: Allow root account to use key
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
          - Sid: Allow service role to use key
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:role/MyServiceRole
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey

  LambdaArtifactsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKey