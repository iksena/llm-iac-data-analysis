AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Batch Environment for Containerized Batch Jobs

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
  SubnetCidrBlock:
    Type: String
    Default: 10.0.0.0/24
  BatchJobQueueName:
    Type: String
    Default: MyBatchJobQueue
  BatchJobDefinitionName:
    Type: String
    Default: MyBatchJobDefinition
  S3InputBucketName:
    Type: String
    Default: my-batch-input-bucket
  S3OutputBucketName:
    Type: String
    Default: my-batch-output-bucket
  DockerImage:
    Type: String
    Default: amazonlinux

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Batch Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: !Ref VpcCidrBlock
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Path: /

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2Role

  S3InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  S3InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3InputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              - !Sub 'arn:aws:s3:::${S3InputBucketName}/*'

  S3OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  S3OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3OutputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              - !Sub 'arn:aws:s3:::${S3OutputBucketName}/*'

  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        InstanceRole: !Ref InstanceProfile
        InstanceTypes:
          - m5.large
        MinvCpus: 0
        MaxvCpus: 16
        Subnets:
          - !Ref Subnet
        SecurityGroupIds:
          - !Ref SecurityGroup

  JobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Ref BatchJobQueueName
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment
      Priority: 1

  JobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Ref BatchJobDefinitionName
      Type: container
      ContainerProperties:
        Image: !Ref DockerImage
        Command:
          - sh
          - -c
          - |
            yum install -y awscli
            aws s3 cp s3://my-batch-input-bucket/input.txt /tmp/input.txt
            aws s3 cp /tmp/input.txt s3://my-batch-output-bucket/output.txt
        Vcpus: 2
        Memory: 2048

Outputs:
  BatchJobQueueArn:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt JobQueue.JobQueueArn
  BatchJobDefinitionArn:
    Description: ARN of the Batch Job Definition
    Value: !GetAtt JobDefinition.JobDefinitionArn
  S3InputBucketName:
    Description: Name of the S3 Input Bucket
    Value: !Ref S3InputBucket
  S3OutputBucketName:
    Description: Name of the S3 Output Bucket
    Value: !Ref S3OutputBucket
  VPCId:
    Description: ID of the VPC
    Value: !Ref VPC