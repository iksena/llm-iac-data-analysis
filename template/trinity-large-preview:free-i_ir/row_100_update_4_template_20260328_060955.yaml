AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
              - Effect: Deny
                Action:
                  - billing:*
                  - cloudhsm:*
                Resource: '*'

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      Policies:
        - PolicyName: IdentityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PrivilegedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword
        - arn:aws:iam::aws:policy/IAMSelfManageServiceSpecificCredentials
        - arn:aws:iam::aws:policy/IAMUserSSHKeys
      MaxSessionDuration: 43200

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RestrictedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
              - Effect: Deny
                Action:
                  - billing:*
                  - cloudhsm:*
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword
        - arn:aws:iam::aws:policy/IAMSelfManageServiceSpecificCredentials
        - arn:aws:iam::aws:policy/IAMUserSSHKeys
      MaxSessionDuration: 43200

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IdentityAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword
        - arn:aws:iam::aws:policy/IAMSelfManageServiceSpecificCredentials
        - arn:aws:iam::aws:policy/IAMUserSSHKeys
      MaxSessionDuration: 43200

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword
        - arn:aws:iam::aws:policy/IAMSelfManageServiceSpecificCredentials
        - arn:aws:iam::aws:policy/IAMUserSSHKeys
      MaxSessionDuration: 43200

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StackSetExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:*
                  - organizations:*
                  - sts:*
                  - cloudtrail:*
                  - config:*
                  - cloudwatch:*
                  - logs:*
                  - s3:*
                  - ec2:*
                  - rds:*
                  - lambda:*
                  - sqs:*
                  - sns:*
                  - dynamodb:*
                  - elasticache:*
                  - elasticloadbalancing:*
                  - autoscaling:*
                  - cloudformation:*
                  - eks:*
                  - ecs:*
                  - route53:*
                  - elasticbeanstalk:*
                  - elasticmapreduce:*
                  - workspaces:*
                  - storagegateway:*
                  - datapipeline:*
                  - opsworks:*
                  - cloudfront:*
                  - waf:*
                  - shield:*
                  - directconnect:*
                  - globalaccelerator:*
                  - networkmanager:*
                  - ram:*
                  - servicecatalog:*
                  - ssm:*
                  - ssmmessages:*
                  - ec2messages:*
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword
        - arn:aws:iam::aws:policy/IAMSelfManageServiceSpecificCredentials
        - arn:aws:iam::aws:policy/IAMUserSSHKeys
      MaxSessionDuration: 43200

  MFAEnforcementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: MFAEnforcementPolicy
      Description: Requires MFA for elevated actions
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:*
              - organizations:*
              - sts:*
              - cloudtrail:*
              - config:*
              - cloudwatch:*
              - logs:*
              - s3:*
              - ec2:*
              - rds:*
              - lambda:*
              - sqs:*
              - sns:*
              - dynamodb:*
              - elasticache:*
              - elasticloadbalancing:*
              - autoscaling:*
              - cloudformation:*
              - eks:*
              - ecs:*
              - route53:*
              - elasticbeanstalk:*
              - elasticmapreduce:*
              - workspaces:*
              - storagegateway:*
              - datapipeline:*
              - opsworks:*
              - cloudfront:*
              - waf:*
              - shield:*
              - directconnect:*
              - globalaccelerator:*
              - networkmanager:*
              - ram:*
              - servicecatalog:*
              - ssm:*
              - ssmmessages:*
              - ec2messages:*
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

Parameters:
  IdentityManagementAccount:
    Type: String
    Description: Account ID for Identity Management Account (required for cross-account role assumption)
  ToolingManagementAccount:
    Type: String
    Description: Account ID for Tooling Management Account (required for cross-account role assumption)

Outputs:
  PrivilegedAdminGroupArn:
    Description: ARN of the PrivilegedAdmin Group
    Value: !Ref PrivilegedAdminGroup
  RestrictedAdminGroupArn:
    Description: ARN of the RestrictedAdmin Group
    Value: !Ref RestrictedAdminGroup
  IdentityAdminGroupArn:
    Description: ARN of the IdentityAdmin Group
    Value: !Ref IdentityAdminGroup
  PrivilegedAdminRoleArn:
    Description: ARN of the PrivilegedAdmin Role
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of the RestrictedAdmin Role
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of the IdentityAdmin Role
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of the StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn