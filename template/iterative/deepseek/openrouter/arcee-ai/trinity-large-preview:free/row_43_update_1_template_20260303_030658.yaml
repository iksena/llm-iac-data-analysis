AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with KMS encryption and lifecycle management

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for S3 bucket encryption
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/S3EncryptionKey
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'encrypted-bucket-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !Ref KMSKey
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
          - Id: ExpireObjects
            Status: Enabled
            ExpirationInDays: 365
      Tags:
        - Key: Environment
          Value: Production
        - Key: Project
          Value: DataLake

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  KMSKeyId:
    Description: ID of the KMS key used for encryption
    Value: !Ref KMSKey
  KMSKeyAlias:
    Description: Alias of the KMS key used for encryption
    Value: !Ref KMSKeyAlias