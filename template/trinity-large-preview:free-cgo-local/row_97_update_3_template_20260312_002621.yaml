AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data for centralized governance and reporting

Parameters:
  S3BucketName:
    Type: String
    Default: org-data-central-bucket
    Description: Name of the S3 bucket to store organizational data
  ManagementAccountId:
    Type: String
    Default: '123456789012'
    Description: Management account ID for cross-account role assumption
  AthenaDatabaseName:
    Type: String
    Default: managementcur
    Description: Name of the Athena database for Glue catalog
  TagsToInclude:
    Type: String
    Default: 'Environment,CostCenter,Owner'
    Description: Comma-separated list of tags to include in reports

Resources:
  OrgDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Ref S3BucketName

  OrgDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OrgDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt LambdaRole.Arn
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${OrgDataBucket}/*'

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - organizations:Describe*
                  - organizations:List*
                Resource: '*'
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/OrganizationReaderRole'
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OrgDataBucket}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          def lambda_handler(event, context):
              org_client = boto3.client('organizations')
              s3_client = boto3.client('s3')

              # Fetch organization data
              accounts = org_client.list_accounts()
              ous = org_client.list_organizational_units_for_parent(ParentId='root')
              tags = org_client.list_tags_for_resource(ResourceId='root')

              # Prepare data
              data = {
                  'timestamp': datetime.now().isoformat(),
                  'accounts': accounts,
                  'ous': ous,
                  'tags': tags
              }

              # Write to S3
              s3_key = f'org-data/{datetime.now().strftime("%Y/%m/%d")}/data.json'
              s3_client.put_object(
                  Bucket=os.environ['S3_BUCKET'],
                  Key=s3_key,
                  Body=json.dumps(data),
                  ContentType='application/json'
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Organization data collected successfully')
              }

      Environment:
        Variables:
          S3_BUCKET: !Ref S3BucketName

  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: OrgDataCollectionTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudWatchEventRule.Arn

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrgDataCrawler
      Role: !GetAtt GlueRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${OrgDataBucket}/org-data/'
      SchemaChangePolicy:
        UpdateBehavior: LOG
        DeleteBehavior: LOG

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${OrgDataBucket}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt OrgDataBucket.Arn

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
  S3BucketName:
    Description: S3 bucket name
    Value: !Ref OrgDataBucket
  GlueCrawlerName:
    Description: Glue crawler name
    Value: !Ref GlueCrawler