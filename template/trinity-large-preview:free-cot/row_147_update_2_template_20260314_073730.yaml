AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless Slot Machine Web Application with Cognito Anonymous Access

Parameters:
  WebsiteBucketName:
    Type: String
    Default: slot-machine-website
    Description: S3 bucket name for website hosting (will be prefixed with account ID)
  Region:
    Type: String
    Default: !Ref AWS::Region
    Description: AWS Region for deployment
  IdentityPoolName:
    Type: String
    Default: SlotMachineIdentityPool
    Description: Cognito Identity Pool name

Resources:
  # IAM Role for Lambda Execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SlotMachineLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # S3 Bucket for Static Website
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::AccountId}-${WebsiteBucketName}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
      Tags:
        - Key: Name
          Value: SlotMachineWebsiteBucket

  # S3 Bucket Policy for Public Access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${AWS::AccountId}-${WebsiteBucketName}/*'

  # Lambda Function for Slot Machine Logic
  SlotMachineLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineLambda
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 10
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import random
          import os

          # Predefined card combinations
          CARDS = ['7', 'BAR', 'Cherry', 'Diamond', 'Lemon', 'Bell']
          WINNING_COMBINATIONS = {
              ('7', '7', '7'): 100,
              ('BAR', 'BAR', 'BAR'): 50,
              ('Cherry', 'Cherry', 'Cherry'): 25,
              ('Diamond', 'Diamond', 'Diamond'): 20,
              ('Lemon', 'Lemon', 'Lemon'): 15,
              ('Bell', 'Bell', 'Bell'): 10,
              ('7', '7', '*'): 5,
              ('BAR', 'BAR', '*'): 3
          }

          def lambda_handler(event, context):
              # Simulate slot spin
              result = [random.choice(CARDS) for _ in range(3)]
              win_amount = determine_win(result)

              response = {
                  'statusCode': 200,
                  'body': json.dumps({
                      'result': result,
                      'win': win_amount > 0,
                      'amount': win_amount
                  })
              }
              return response

          def determine_win(result):
              # Check for winning combinations
              for combo, payout in WINNING_COMBINATIONS.items():
                  if all(combo[i] == result[i] or combo[i] == '*' for i in range(3)):
                      return payout
              return 0

  # Custom Resource Lambda for Automated Deployment
  CustomResourceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SlotMachineCustomResourceLambda
      Handler: index.handler
      Runtime: python3.12
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import urllib.request
          import zipfile
          import io
          import os

          S3_CLIENT = boto3.client('s3')

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      deploy_website(event['ResourceProperties'])
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def deploy_website(properties):
              bucket_name = properties['BucketName']
              region = properties['Region']
              identity_pool_id = properties['IdentityPoolId']

              # Download pre-built ZIP from source (example URL)
              zip_url = 'https://example.com/slot-machine-assets.zip'
              print(f"Downloading assets from {zip_url}")
              response = urllib.request.urlopen(zip_url)
              zip_data = response.read()

              # Extract and modify files
              with zipfile.ZipFile(io.BytesIO(zip_data)) as zip_ref:
                  for file_name in zip_ref.namelist():
                      with zip_ref.open(file_name) as file:
                          content = file.read().decode('utf-8')

                          # Inject configuration into HTML files
                          if file_name.endswith('.html'):
                              content = inject_config(content, region, identity_pool_id)

                          # Upload to S3
                          S3_CLIENT.put_object(
                              Bucket=bucket_name,
                              Key=file_name,
                              Body=content,
                              ContentType=get_content_type(file_name)
                          )
              print("Website deployment completed successfully")

          def inject_config(content, region, identity_pool_id):
              # Simple string replacement for configuration injection
              content = content.replace('{{REGION}}', region)
              content = content.replace('{{IDENTITY_POOL_ID}}', identity_pool_id)
              return content

          def get_content_type(file_name):
              if file_name.endswith('.html'):
                  return 'text/html'
              elif file_name.endswith('.css'):
                  return 'text/css'
              elif file_name.endswith('.js'):
                  return 'application/javascript'
              elif file_name.endswith('.png'):
                  return 'image/png'
              elif file_name.endswith('.jpg') or file_name.endswith('.jpeg'):
                  return 'image/jpeg'
              else:
                  return 'application/octet-stream'

  # Custom Resource for Automated Deployment
  WebsiteDeployment:
    Type: Custom::WebsiteDeployment
    Properties:
      ServiceToken: !GetAtt CustomResourceLambda.Arn
      BucketName: !Sub '${AWS::AccountId}-${WebsiteBucketName}'
      Region: !Ref Region
      IdentityPoolId: !Ref CognitoIdentityPool

  # Cognito Identity Pool
  CognitoIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Ref IdentityPoolName
      AllowUnauthenticatedIdentities: true

  # IAM Role for Unauthenticated Users
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CognitoUnauthRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref CognitoIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: unauthenticated
      Policies:
        - PolicyName: LambdaInvocationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SlotMachineLambda.Arn

  # Lambda Resource-based Policy for Cognito Access
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      Principal: cognito-identity.amazonaws.com
      FunctionName: !GetAtt SlotMachineLambda.Arn
      SourceArn: !GetAtt SlotMachineLambda.Arn

Outputs:
  WebsiteURL:
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Description: URL of the deployed slot machine website
  IdentityPoolId:
    Value: !Ref CognitoIdentityPool
    Description: Cognito Identity Pool ID for frontend configuration
  LambdaFunctionArn:
    Value: !GetAtt SlotMachineLambda.Arn
    Description: ARN of the Slot Machine Lambda function