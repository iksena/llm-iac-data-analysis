AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an SNS Topic with an email subscription to test@test.com'

Parameters:
  TopicName:
    Type: String
    Default: MySNSTopic
    Description: 'Name for the SNS Topic'
  EmailAddress:
    Type: String
    Default: test@test.com
    Description: 'Email address to subscribe to the SNS Topic'

Resources:
  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Ref TopicName
      DisplayName: !Ref TopicName

  EmailSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  TopicArn:
    Description: 'ARN of the SNS Topic'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-TopicArn'

  SubscriptionArn:
    Description: 'ARN of the Email Subscription (Pending Confirmation)'
    Value: !Ref EmailSubscription
    Export:
      Name: !Sub '${AWS::StackName}-SubscriptionArn'