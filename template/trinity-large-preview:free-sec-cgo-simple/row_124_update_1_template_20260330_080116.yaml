AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: Album
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: Album
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: APIGatewayDynamoDBRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess

  MusicApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: MusicApi
      ProtocolType: HTTP
      ApiKeySelectionExpression: $request.header.x-api-key
      Target: !GetAtt APIGatewayRole.Arn

  PostMusicFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: PostMusicFunction
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          def handler(event, context):
              dynamodb = boto3.resource('dynamodb')
              table = dynamodb.Table('Music')
              artist = event['queryStringParameters']['artist']
              album = event['queryStringParameters']['album']
              table.put_item(Item={'Artist': artist, 'Album': album})
              return {
                  'statusCode': 200,
                  'body': json.dumps('Music entry added successfully')
              }

  GetMusicFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GetMusicFunction
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          def handler(event, context):
              dynamodb = boto3.resource('dynamodb')
              table = dynamodb.Table('Music')
              artist = event['pathParameters']['artist']
              response = table.query(
                  IndexName='Artist-Index',
                  KeyConditionExpression=Key('Artist').eq(artist)
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps(response['Items'])
              }

  PostMusicIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MusicApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
        - LambdaArn: !GetAtt PostMusicFunction.Arn

  GetMusicIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MusicApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
        - LambdaArn: !GetAtt GetMusicFunction.Arn

  PostMusicRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MusicApi
      RouteKey: POST /music
      Target: !Join
        - '/'
        - - integrations
          - !Ref PostMusicIntegration

  GetMusicRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MusicApi
      RouteKey: GET /music/{artist}
      Target: !Join
        - '/'
        - - integrations
          - !Ref GetMusicIntegration

  ApiKey:
    Type: AWS::ApiGatewayV2::ApiKey
    Properties:
      ApiId: !Ref MusicApi
      Description: API Key for Music API
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGatewayV2::UsagePlan
    Properties:
      ApiId: !Ref MusicApi
      Description: Usage Plan for Music API
      Throttle:
        RateLimit: 100
        BurstLimit: 10

  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MusicApi
      StageName: $default
      AutoDeploy: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !GetAtt MusicApi.ApiEndpoint