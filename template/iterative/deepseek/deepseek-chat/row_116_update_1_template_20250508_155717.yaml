AWSTemplateFormatVersion: '2010-09-09'
Description: SNS-to-SQS fanout system with filtered message routing for metric processing

Resources:
  MetricsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: MetricsFanoutTopic
      TopicName: MetricsFanoutTopic

  AllMetricsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsDLQ
      MessageRetentionPeriod: 1209600 # 14 days in seconds
      KmsMasterKeyId: alias/aws/sqs

  TemperatureDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDLQ
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  HumidityDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDLQ
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  AllMetricsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsQueue
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600 # 4 days
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQ.Arn
        maxReceiveCount: 5
      KmsMasterKeyId: alias/aws/sqs

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDLQ.Arn
        maxReceiveCount: 5
      KmsMasterKeyId: alias/aws/sqs

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDLQ.Arn
        maxReceiveCount: 5
      KmsMasterKeyId: alias/aws/sqs

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsQueue.Arn
      TopicArn: !Ref MetricsTopic

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      TopicArn: !Ref MetricsTopic
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      TopicArn: !Ref MetricsTopic
      FilterPolicy:
        MetricType:
          - Humidity

  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  TemperatureQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

  HumidityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MetricsTopic

Outputs:
  MetricsTopicARN:
    Description: ARN of the central SNS topic
    Value: !Ref MetricsTopic

  AllMetricsQueueARN:
    Description: ARN of the queue receiving all metrics
    Value: !GetAtt AllMetricsQueue.Arn

  TemperatureQueueARN:
    Description: ARN of the temperature metrics queue
    Value: !GetAtt TemperatureSqsQueue.Arn

  HumidityQueueARN:
    Description: ARN of the humidity metrics queue
    Value: !GetAtt HumiditySqsQueue.Arn

  AllMetricsDLQARN:
    Description: ARN of the all metrics dead letter queue
    Value: !GetAtt AllMetricsDLQ.Arn

  TemperatureDLQARN:
    Description: ARN of the temperature dead letter queue
    Value: !GetAtt TemperatureDLQ.Arn

  HumidityDLQARN:
    Description: ARN of the humidity dead letter queue
    Value: !GetAtt HumidityDLQ.Arn