AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  KeyPairPublicKey:
    Type: String
    Description: >-
      REQUIRED - Valid SSH public key in OpenSSH format (starting with 'ssh-rsa').
      Example: ssh-rsa AAAAB3NzaC1yc2E... user@host
    AllowedPattern: 'ssh-rsa AAAA[0-9A-Za-z+/]+[=]{0,3}( [^@]+@[^@]+)?'
    ConstraintDescription: Must be a valid SSH public key starting with 'ssh-rsa'
  InstanceType:
    Type: String
    Default: c5d.large
    AllowedValues:
      - c5d.large
      - m5d.large
      - r5d.large
      - i3.large
    Description: EC2 instance type with local NVMe ephemeral storage
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >-
      REQUIRED - Default VPC ID. Find using CLI:
      aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId"
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >-
      REQUIRED - Public subnet ID from default VPC. Find using CLI:
      aws ec2 describe-subnets --filters "Name=default-for-az,Values=true" --query "Subnets[0].SubnetId"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Required Parameters (No Defaults)"
        Parameters:
          - VpcId
          - SubnetId
          - KeyPairPublicKey
      - Label:
          default: "Instance Configuration"
        Parameters:
          - InstanceType
    ParameterLabels:
      VpcId:
        default: "Default VPC ID *MANDATORY*"
      SubnetId:
        default: "Public Subnet ID *MANDATORY*"
      KeyPairPublicKey:
        default: "SSH Public Key *MANDATORY*"
      InstanceType:
        default: "Instance Type"

Resources:
  KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${AWS::StackName}-keypair'
      PublicKeyMaterial: !Ref KeyPairPublicKey

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPair
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref SubnetId
          GroupSet:
            - !GetAtt EC2SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp2
            DeleteOnTermination: true
        - DeviceName: /dev/nvme1n1
          VirtualName: ephemeral0

Outputs:
  InstancePublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address for SSH access
  KeyPairName:
    Value: !Ref KeyPair
    Description: Name of the created SSH key pair
  InstanceId:
    Value: !Ref EC2Instance
    Description: EC2 instance ID