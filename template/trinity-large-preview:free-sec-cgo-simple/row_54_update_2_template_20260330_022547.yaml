AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralizedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alert Aggregation Topic
      TopicName: CentralizedAlertTopic

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Id: TopicPolicy
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - monitoring.amazonaws.com
                - cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: admin@example.com
      Protocol: email
      TopicArn: !Ref CentralizedSNSTopic

  TopicRetention:
    Type: AWS::SNS::Topic
    Properties:
      Topic: !Ref CentralizedSNSTopic
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

Outputs:
  TopicARN:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedSNSTopic
    Export:
      Name: CentralizedAlertTopicARN