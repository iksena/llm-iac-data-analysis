AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM-based Nginx automation and OS updates'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance will be launched
  
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID where the EC2 instance will be launched
  
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: SSMAutomationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAutomationExecution
                  - ssm:GetAutomationExecution
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                Resource: '*'

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMInstanceRole

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Nginx web server
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: nginx-web-server-sg

  NginxAutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: 'Automate Nginx installation and configuration'
        parameters:
          InstanceId:
            type: String
            description: Target EC2 instance ID
        mainSteps:
          - name: assertInstanceOnline
            action: aws:waitForAwsResourceProperty
            timeoutSeconds: 300
            inputs:
              Service: ssm
              Api: DescribeInstanceInformation
              PropertySelector: '$.InstanceInformationList[0].PingStatus'
              DesiredValues:
                - Online
              InstanceInformationFilterList:
                - key: InstanceIds
                  valueSet:
                    - '{{ InstanceId }}'
          
          - name: updateOS
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - yum update -y
                  - needs-restarting -r || shutdown -r +1
              InstanceIds:
                - '{{ InstanceId }}'
          
          - name: waitForInstance
            action: aws:sleep
            inputs:
              Duration: PT2M
          
          - name: installNginx
            action: aws:runCommand
            maxAttempts: 3
            onFailure: Continue
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - amazon-linux-extras install nginx1 -y
                  - systemctl start nginx
                  - systemctl enable nginx
              InstanceIds:
                - '{{ InstanceId }}'
          
          - name: validateNginx
            action: aws:runCommand
            maxAttempts: 2
            inputs:
              DocumentName: AWS-RunShellScript
              Parameters:
                commands:
                  - systemctl is-active nginx
                  - curl -s --fail http://localhost
              InstanceIds:
                - '{{ InstanceId }}'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds: 
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: nginx-web-server
        - Key: nginx
          Value: Yes
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y aws-cfn-bootstrap
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  AutomationDocumentArn:
    Description: SSM Automation Document ARN
    Value: !Ref NginxAutomationDocument

  InstancePublicDNS:
    Description: Public DNS of EC2 Instance
    Value: !GetAtt EC2Instance.PublicDnsName