AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for VPC, Auto Scaling Group, and ElastiCache with snapshot management

Parameters:
  SnapshotRetentionLimit:
    Type: Number
    Default: 7
    Description: Number of days to retain ElastiCache snapshots
  UseCustomSnapshotRetention:
    Type: String
    Default: false
    AllowedValues: [true, false]
    Description: Whether to use custom snapshot retention limit

Mappings:
  AZRegionMap:
    us-east-1:
      AZ1: us-east-1a
      AZ2: us-east-1b
    us-east-2:
      AZ1: us-east-2a
      AZ2: us-east-2b
    us-west-1:
      AZ1: us-west-1a
      AZ2: us-west-1b
    us-west-2:
      AZ1: us-west-2a
      AZ2: us-west-2b
    eu-west-1:
      AZ1: eu-west-1a
      AZ2: eu-west-1b
    eu-west-2:
      AZ1: eu-west-2a
      AZ2: eu-west-2b
    eu-central-1:
      AZ1: eu-central-1a
      AZ2: eu-central-1b
    ap-southeast-1:
      AZ1: ap-southeast-1a
      AZ2: ap-southeast-1b
    ap-southeast-2:
      AZ1: ap-southeast-2a
      AZ2: ap-southeast-2b
    ap-northeast-1:
      AZ1: ap-northeast-1a
      AZ2: ap-northeast-1b
    ap-northeast-2:
      AZ1: ap-northeast-2a
      AZ2: ap-northeast-2b
    sa-east-1:
      AZ1: sa-east-1a
      AZ2: sa-east-1b

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !FindInMap [AZRegionMap, !Ref "AWS::Region", AZ1]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !FindInMap [AZRegionMap, !Ref "AWS::Region", AZ2]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  LaunchConfig:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId: ami-0123456789abcdef0
      InstanceType: t3.micro
      AssociatePublicIpAddress: true

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      LaunchConfigurationName: !Ref LaunchConfig
      MinSize: "1"
      MaxSize: "3"
      DesiredCapacity: "2"

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: ElastiCache subnet group
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  ElastiCacheCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      CacheNodeType: cache.m3.medium
      Engine: redis
      NumCacheNodes: "1"
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      Port: "6379"
      SnapshotRetentionLimit: !If [UseCustomSnapshotRetention, !Ref SnapshotRetentionLimit, 7]
      SnapshotWindow: "03:00-04:00"
      AutoMinorVersionUpgrade: true

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: ElastiCache replication group with automatic failover
      PrimaryClusterId: !Ref ElastiCacheCluster
      AutomaticFailoverEnabled: true
      NumCacheClusters: "2"
      CacheNodeType: cache.m3.medium
      Engine: redis
      Port: "6379"
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ElastiCachePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ElastiCachePolicy
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - elasticache:CreateSnapshot
              - elasticache:DeleteSnapshot
            Resource: "*"
      Roles:
        - !Ref LambdaExecutionRole

  SnapshotLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = (event, context, callback) => {
            // Lambda code to enable/disable snapshotting
          }
      Runtime: nodejs18.x
      Timeout: 30

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  AutoScalingGroupId:
    Description: Auto Scaling Group ID
    Value: !Ref AutoScalingGroup
  ElastiCacheClusterId:
    Description: ElastiCache Cluster ID
    Value: !Ref ElastiCacheCluster
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt SnapshotLambdaFunction.Arn