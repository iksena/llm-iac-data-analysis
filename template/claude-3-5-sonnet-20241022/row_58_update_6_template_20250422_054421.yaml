AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS deployment with monitoring and automated backups'

Mappings:
  RegionMap:
    us-east-1:
      VPC: vpc-1234567890abcdef0
      Subnet: subnet-1234567890abcdef0
      VpcCidr: 10.0.0.0/16
    us-west-2:
      VPC: vpc-0987654321fedcba0
      Subnet: subnet-0987654321fedcba0
      VpcCidr: 172.16.0.0/16

Parameters:
  PerformanceMode:
    Type: String
    AllowedValues: [generalPurpose, maxIO]
    Default: generalPurpose
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    AllowedValues: [bursting, provisioned]
    Default: bursting
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    MinValue: 1
    MaxValue: 1024
    Default: 128
    Description: Provisioned throughput in MiB/s

Conditions:
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !FindInMap [RegionMap, !Ref 'AWS::Region', VPC]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !FindInMap [RegionMap, !Ref 'AWS::Region', VpcCidr]

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !FindInMap [RegionMap, !Ref 'AWS::Region', Subnet]
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-io-utilization
      AlarmDescription: IO Utilization above threshold
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-burst-credits
      AlarmDescription: Burst credit balance is low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000000
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem

  FileSystemDNS:
    Description: EFS DNS Name
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  MountTargetId:
    Description: Mount Target ID
    Value: !Ref MountTarget

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref EFSSecurityGroup