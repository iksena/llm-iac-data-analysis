AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instances managed by SSM with Auto Scaling Groups for Linux and Windows'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where instances will be launched'
    Default: ''

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: 'First public subnet for instance deployment'
    Default: ''

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: 'Second public subnet for instance deployment'
    Default: ''

  LinuxInstanceType:
    Type: String
    Default: t3.medium
    Description: 'EC2 instance type for Linux instances'
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large

  WindowsInstanceType:
    Type: String
    Default: t3.large
    Description: 'EC2 instance type for Windows instances'
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge

  LinuxDesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: 'Desired number of Linux instances'

  WindowsDesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: 'Desired number of Windows instances'

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: 'Optional key pair for EC2 instances'
    Default: ''

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  HasVpcId: !Not [!Equals [!Ref VpcId, ""]]
  HasSubnet1: !Not [!Equals [!Ref PublicSubnet1, ""]]
  HasSubnet2: !Not [!Equals [!Ref PublicSubnet2, ""]]
  CreateVPC: !Equals [!Ref VpcId, ""]
  CreateSubnet1: !And [!Equals [!Ref PublicSubnet1, ""], !Condition CreateVPC]
  CreateSubnet2: !And [!Equals [!Ref PublicSubnet2, ""], !Condition CreateVPC]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Condition: CreateVPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SSM-Managed-Instances-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateVPC
    Properties:
      Tags:
        - Key: Name
          Value: SSM-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateVPC
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet1
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-A

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet2
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-B

  RouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateVPC
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Public-RouteTable

  Route:
    Type: AWS::EC2::Route
    Condition: CreateVPC
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociationA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateSubnet1
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociationB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateSubnet2
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref RouteTable

  SSMIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: /

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMIAMRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable HTTP access and SSM'
      VpcId: !If [CreateVPC, !Ref VPC, !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  LinuxLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", LinuxAMI]
        InstanceType: !Ref LinuxInstanceType
        IamInstanceProfile:
          Arn: !GetAtt SSMInstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId
        KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent

  WindowsLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", WindowsAMI]
        InstanceType: !Ref WindowsInstanceType
        IamInstanceProfile:
          Arn: !GetAtt SSMInstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId
        KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]

  LinuxAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LinuxLaunchTemplate
        Version: !GetAtt LinuxLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 10
      DesiredCapacity: !Ref LinuxDesiredCapacity
      VPCZoneIdentifier:
        - !If [HasSubnet1, !Ref PublicSubnet1, !If [CreateSubnet1, !Ref PublicSubnetA, !Ref "AWS::NoValue"]]
        - !If [HasSubnet2, !Ref PublicSubnet2, !If [CreateSubnet2, !Ref PublicSubnetB, !Ref "AWS::NoValue"]]
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300

  WindowsAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WindowsLaunchTemplate
        Version: !GetAtt WindowsLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 10
      DesiredCapacity: !Ref WindowsDesiredCapacity
      VPCZoneIdentifier:
        - !If [HasSubnet1, !Ref PublicSubnet1, !If [CreateSubnet1, !Ref PublicSubnetA, !Ref "AWS::NoValue"]]
        - !If [HasSubnet2, !Ref PublicSubnet2, !If [CreateSubnet2, !Ref PublicSubnetB, !Ref "AWS::NoValue"]]
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMI: "ami-0c55b159cbfafe1f0"
      WindowsAMI: "ami-0b898040803850657"
    us-west-2:
      LinuxAMI: "ami-0d70546e43a941d70"
      WindowsAMI: "ami-0d705db840ec5c0c5"

Outputs:
  LinuxASGName:
    Description: 'Name of the Linux Auto Scaling Group'
    Value: !Ref LinuxAutoScalingGroup

  WindowsASGName:
    Description: 'Name of the Windows Auto Scaling Group'
    Value: !Ref WindowsAutoScalingGroup

  SSMInstanceRoleARN:
    Description: 'ARN of the IAM role for SSM'
    Value: !GetAtt SSMIAMRole.Arn

  InstanceSecurityGroupID:
    Description: 'Security Group ID for instances'
    Value: !GetAtt InstanceSecurityGroup.GroupId

  VPCId:
    Description: 'VPC ID created by the stack'
    Value: !If [CreateVPC, !Ref VPC, !Ref VpcId]

  PublicSubnetIds:
    Description: 'Public Subnet IDs created by the stack'
    Value: !Join 
      - ","
      - - !If [HasSubnet1, !Ref PublicSubnet1, !If [CreateSubnet1, !Ref PublicSubnetA, !Ref "AWS::NoValue"]]
        - !If [HasSubnet2, !Ref PublicSubnet2, !If [CreateSubnet2, !Ref PublicSubnetB, !Ref "AWS::NoValue"]]