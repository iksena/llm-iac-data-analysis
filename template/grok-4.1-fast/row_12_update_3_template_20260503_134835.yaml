AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for an EC2 instance with Elastic IP and SSH access controls in specified VPC/Subnet (use defaults).'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  SSHCidrIp:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR IP range allowed to connect via SSH
  AmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
    Description: AMI ID for Amazon Linux 2
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID to launch resources in (use default VPC)
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID to launch instance in (use default subnet)

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidrIp
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SG'

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2'

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: MyEC2Instance
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EIP'

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref MyEC2Instance

Outputs:
  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref MyEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-EC2InstanceId'
  InstancePrivateIP:
    Description: Private IP of the EC2 instance
    Value: !GetAtt MyEC2Instance.PrivateIp
  ElasticIPAddress:
    Description: Elastic IP address of the EC2 instance
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'