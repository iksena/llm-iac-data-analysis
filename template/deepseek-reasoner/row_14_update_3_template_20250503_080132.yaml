AWSTemplateFormatVersion: '2010-09-09'
Description: Creates ENI with multiple EIPs and secondary IPs
Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Target subnet for the ENI
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for the ENI
Resources:
  ENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      GroupSet:
        - !Ref SecurityGroupId
      Description: Multi-EIP ENI
      SecondaryPrivateIpAddressCount: 2

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP1Association:
    Type: AWS::EC2::EIPAssociation
    DependsOn:
      - ENI
      - EIP1
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref ENI
      PrivateIpAddress: !Select [0, !GetAtt ENI.SecondaryPrivateIpAddresses]

  EIP2Association:
    Type: AWS::EC2::EIPAssociation
    DependsOn:
      - ENI
      - EIP2
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref ENI
      PrivateIpAddress: !Select [1, !GetAtt ENI.SecondaryPrivateIpAddresses]

Outputs:
  EIP1PublicIP:
    Value: !Ref EIP1
  EIP2PublicIP:
    Value: !Ref EIP2
  ENIId:
    Value: !Ref ENI
  SecondaryIPs:
    Value: !Join [",", !GetAtt ENI.SecondaryPrivateIpAddresses]