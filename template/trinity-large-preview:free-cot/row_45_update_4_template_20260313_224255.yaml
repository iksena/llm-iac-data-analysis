AWSTemplateFormatVersion: '2010-09-09'
Resources:
  FirehoseErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: FirehoseErrorLogs
      RetentionInDays: 30

  FirehoseErrorLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseErrorLogGroup
      LogStreamName: FirehoseErrorStream

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: FirehoseAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::firehose-encrypted-destination'
                  - !Sub 'arn:${AWS::Partition}:s3:::firehose-encrypted-destination/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:FirehoseErrorLogs:log-stream:FirehoseErrorStream'

  EncryptedFirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: EncryptedFirehoseStream
      DeliveryStreamEncryptionConfigurationInput:
        KeyARN: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/s3'
        KeyType: AWS_OWNED_CMK
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:${AWS::Partition}:s3:::firehose-encrypted-destination'
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: GZIP
        ErrorOutputPrefix: error-logs/
        Prefix: logs/
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseErrorLogGroup
          LogStreamName: !Ref FirehoseErrorLogStream
        RoleARN: !GetAtt FirehoseRole.Arn