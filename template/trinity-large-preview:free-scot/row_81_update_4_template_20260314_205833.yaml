AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: MyResourceTagGroup
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          TagFilters:
            - Key: service
              Values:
                - EC2
                - RDS
                - SageMaker
                - SSM
                - Lambda
                - S3
                - DynamoDB
            - Key: environment
              Values:
                - production
                - development
                - staging
      Tags:
        - Key: Owner
          Value: auto-generated
        - Key: Project
          Value: auto-generated
        - Key: CostCenter
          Value: auto-generated
      Description: Resource Group containing tagged resources across multiple AWS services

Outputs:
  ResourceGroupName:
    Description: The name of the created Resource Group
    Value: !Ref MyResourceGroup
  ResourceGroupArn:
    Description: The ARN of the created Resource Group
    Value: !GetAtt MyResourceGroup.Arn