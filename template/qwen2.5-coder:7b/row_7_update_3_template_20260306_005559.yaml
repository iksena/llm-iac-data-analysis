AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: String
    Description: SSH key pair name for EC2 instance
  SecurityGroupIngress:
    Type: List<Map>
    Description: List of ingress rules for the security group
    Default:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 0.0.0.0/0

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0a53c90173e52de92
    eu-west-1:
      AMI: ami-0b1cf71af89b86455

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress: !Ref SecurityGroupIngress

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData: !Base64 |
        #!/bin/bash
        yum update -y
        yum install -y awscli
        aws ssm send-command --document-name "AWS-RunShellScript" --targets "Key=instanceids,Values=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)" --parameters '{"commands":["echo Hello, World! > /tmp/hello.txt"]}'
      Tags:
        - Key: Name
          Value: MyEC2Instance

Outputs:
  InstancePublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIpAddress
    Export:
      Name: MyEC2InstancePublicIP

  InstanceID:
    Description: Instance ID of the EC2 instance
    Value: !Ref EC2Instance
    Export:
      Name: MyEC2InstanceID