AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify's product creation API

Parameters:
  ShopifyApiKey:
    Type: String
    Description: Shopify admin API key for authentication
    NoEcho: true

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyAppBus

  Connection:
    Type: AWS::Events::Connection
    Properties:
      Name: ShopifyConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Ref ShopifyApiKey

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      ConnectionArn: !GetAtt Connection.Arn
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2023-04/products.json
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  Rule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - MyShopifyApp
        "detail-type":
          - ProductCreated
      Targets:
        - Arn: !GetAtt ApiDestination.Arn
          Id: ShopifyProductCreationTarget

Outputs:
  EventBusArn:
    Value: !GetAtt EventBus.Arn
    Description: EventBridge event bus ARN
  ApiDestinationArn:
    Value: !GetAtt ApiDestination.Arn
    Description: API destination ARN