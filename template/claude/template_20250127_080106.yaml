

AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Concert DynamoDB table'

Resources:
  ConcertTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConcertTicketSales
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: ConcertManagement

Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref ConcertTable
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt ConcertTable.Arn
  PrimaryKey:
    Description: Primary key structure
    Value: ArtistId (Partition) and Concert (Sort)