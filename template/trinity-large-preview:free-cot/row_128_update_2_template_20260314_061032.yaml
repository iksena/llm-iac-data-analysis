AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Security Hub Controls Management Solution

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: "false"
    AllowedPattern: "^(true|false)$"
    Description: Disable CIS AWS Foundations Benchmark v1.4.0 controls (140.x series)

  DisableFoundationalControls:
    Type: String
    Default: "false"
    AllowedPattern: "^(true|false)$"
    Description: Disable AWS Foundational Security Best Practices controls

  PermissionsBoundaryArn:
    Type: String
    Default: ""
    Description: Optional IAM permissions boundary ARN

  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    Description: CloudWatch Logs retention period in days

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref "AWS::NoValue"]
      Policies:
        - PolicyName: SecurityHubControlsManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:BatchUpdateStandardsControlAssociations
                  - securityhub:DescribeStandardsControls
                Resource: '*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json

          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')

              controls_to_update = []

              if event.get('DisableCIS140Controls', 'false').lower() == 'true':
                  controls_to_update.extend([
                      {'StandardsControlArn': 'CIS-aws-foundations-benchmark/v/1.4.0/140.1', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'CIS-aws-foundations-benchmark/v/1.4.0/140.2', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'CIS-aws-foundations-benchmark/v/1.4.0/140.3', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'CIS-aws-foundations-benchmark/v/1.4.0/140.4', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'CIS-aws-foundations-benchmark/v/1.4.0/140.5', 'ControlStatus': 'DISABLED'}
                  ])

              if event.get('DisableFoundationalControls', 'false').lower() == 'true':
                  controls_to_update.extend([
                      {'StandardsControlArn': 'AWS-foundational-security-best-practices/v/1.0.0/1.1', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'AWS-foundational-security-best-practices/v/1.0.0/1.2', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'AWS-foundational-security-best-practices/v/1.0.0/1.3', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'AWS-foundational-security-best-practices/v/1.0.0/1.4', 'ControlStatus': 'DISABLED'},
                      {'StandardsControlArn': 'AWS-foundational-security-best-practices/v/1.0.0/1.5', 'ControlStatus': 'DISABLED'}
                  ])

              if controls_to_update:
                  try:
                      response = securityhub.batch_update_standards_control_associations(
                          StandardsControlAssociationUpdates=controls_to_update
                      )
                      return {
                          'statusCode': 200,
                          'body': json.dumps(response)
                      }
                  except Exception as e:
                      return {
                          'statusCode': 500,
                          'body': json.dumps({'error': str(e)})
                      }
              return {'statusCode': 200, 'body': 'No controls to update'}

      Timeout: 30
      MemorySize: 128

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LambdaFunction}
      RetentionInDays: !Ref LogRetentionInDays

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, ""]]

Outputs:
  LambdaFunctionName:
    Description: Lambda function name for Security Hub controls management
    Value: !Ref LambdaFunction
    Export:
      Name: !Sub ${AWS::StackName}-LambdaFunctionName

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-LambdaFunctionArn