AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  EnableStrictBoundary:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  ResourcePrefix:
    Type: String
    Default: 'MyTeam'
  OwnerTag:
    Type: String
    Default: 'Development'
  TrustedPrincipalArn:
    Type: String
    Default: !Sub 'arn:aws:iam::${AWS::AccountId}:root'

Conditions:
  EnforceStrictBoundary: !Equals [ !Ref EnableStrictBoundary, 'true' ]

Resources:
  DefaultPermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub '${ResourcePrefix}-PermissionBoundary'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:*'
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:Describe*'
            Resource: '*'

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ResourcePrefix}-DeveloperRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: DeveloperPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:CreatePolicy'
                  - 'iam:AttachRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:TagRole'
                Resource: '*'
                Condition: 
                  !If 
                    - EnforceStrictBoundary
                    - 
                      StringLike:
                        'iam:ResourceName': !Sub '${ResourcePrefix}*'
                        'aws:RequestTag/Owner': !Ref OwnerTag
                      StringEquals:
                        'iam:PermissionsBoundary': !Ref DefaultPermissionBoundaryPolicy
                    - 
                      StringLike:
                        'iam:ResourceName': !Sub '${ResourcePrefix}*'
                        'aws:RequestTag/Owner': !Ref OwnerTag
      Tags:
        - Key: Owner
          Value: !Ref OwnerTag

Outputs:
  DeveloperRoleArn:
    Value: !GetAtt DeveloperRole.Arn
  PermissionBoundaryArn:
    Value: !Ref DefaultPermissionBoundaryPolicy