AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 Image Builder resources including IAM roles and S3 bucket for logs'

Parameters:
  OwnerEmail:
    Type: String
    Default: 'u12345678@anu.edu.au'
    Description: 'Email address of the owner for resource tagging'
  
  BucketNamePrefix:
    Type: String
    Default: 'imagebuilder-logs'
    Description: 'Prefix for the S3 bucket name that will store Image Builder logs'
  
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues:
      - 'dev'
      - 'test'
      - 'prod'
    Description: 'Environment name for resource tagging'

Resources:
  # S3 Bucket for Image Builder logs
  ImageBuilderLogsBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      VersioningConfiguration:
        Status: 'Enabled'
      Tags:
        - Key: 'Owner'
          Value: !Ref OwnerEmail
        - Key: 'Environment'
          Value: !Ref Environment
        - Key: 'Purpose'
          Value: 'ImageBuilderLogs'

  # IAM Policy for Image Builder to access S3
  ImageBuilderS3AccessPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Policy for EC2 Image Builder to access S3 logs bucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:DeleteObject'
            Resource: !Sub 'arn:aws:s3:::${ImageBuilderLogsBucket}/*'
          - Effect: 'Allow'
            Action:
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
            Resource: !GetAtt ImageBuilderLogsBucket.Arn
          - Effect: 'Allow'
            Action:
              - 's3:ListAllMyBuckets'
            Resource: '*'

  # IAM Role for EC2 Image Builder
  ImageBuilderRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service:
                - 'ec2.amazonaws.com'
                - 'imagebuilder.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref ImageBuilderS3AccessPolicy
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder'
      Tags:
        - Key: 'Owner'
          Value: !Ref OwnerEmail
        - Key: 'Environment'
          Value: !Ref Environment

  # IAM Instance Profile for EC2 instances used by Image Builder
  ImageBuilderInstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      InstanceProfileName: !Sub 'ImageBuilderInstanceProfile-${AWS::StackName}'
      Roles:
        - !Ref ImageBuilderRole

  # S3 Bucket Policy to enforce security
  ImageBuilderLogsBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref ImageBuilderLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: 'DenyUnencryptedObjectUploads'
            Effect: 'Deny'
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${ImageBuilderLogsBucket.Arn}/*'
            Condition:
              StringNotEquals:
                's3:x-amz-server-side-encryption': 'AES256'
          - Sid: 'DenyInsecureConnections'
            Effect: 'Deny'
            Principal: '*'
            Action: 's3:*'
            Resource: !Sub '${ImageBuilderLogsBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Outputs:
  LogsBucketName:
    Description: 'Name of the S3 bucket for Image Builder logs'
    Value: !Ref ImageBuilderLogsBucket
  
  LogsBucketArn:
    Description: 'ARN of the S3 bucket for Image Builder logs'
    Value: !GetAtt ImageBuilderLogsBucket.Arn
  
  ImageBuilderRoleArn:
    Description: 'ARN of the IAM role for EC2 Image Builder'
    Value: !GetAtt ImageBuilderRole.Arn
  
  ImageBuilderInstanceProfileArn:
    Description: 'ARN of the IAM instance profile for EC2 Image Builder'
    Value: !GetAtt ImageBuilderInstanceProfile.Arn