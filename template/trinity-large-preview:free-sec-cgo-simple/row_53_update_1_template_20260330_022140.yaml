AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: serverless.emr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/EMRFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Path: /
      RoleName: EMRServerlessRole

  EMRScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: emr-serverless-scripts-bucket
      AccessControl: Private
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  EMRServerlessApplication:
    Type: AWS::EMR::ServerlessApplication
    Properties:
      Name: emr-serverless-spark-app
      Engine: Spark
      EngineVersion: emr-6.15.0
      ApplicationConfiguration:
        JobDriver:
          ApplicationRole: !GetAtt EMRServerlessRole.Arn
      AutoStartConfig:
        Enabled: true
        IdleTimeoutMinutes: 5
      AutoStopConfig:
        Enabled: true
        IdleTimeoutMinutes: 10

Outputs:
  EMRApplicationName:
    Description: EMR Serverless Application Name
    Value: !Ref EMRServerlessApplication
  EMRApplicationArn:
    Description: EMR Serverless Application ARN
    Value: !GetAtt EMRServerlessApplication.Arn