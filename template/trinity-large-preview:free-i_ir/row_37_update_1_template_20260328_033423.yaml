AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 infrastructure with encrypted buckets and access logging

Resources:
  SecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: secure-bucket
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      BucketPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${SecureBucket}'
              - !Sub 'arn:aws:s3:::${SecureBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: replica-bucket
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    DependsOn: SecureBucket

  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: access-log-bucket
      AccessControl: LogDeliveryWrite
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    DependsOn: SecureBucket

Outputs:
  SecureBucketArn:
    Description: ARN of the secure bucket
    Value: !GetAtt SecureBucket.Arn
  ReplicaBucketArn:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn
  AccessLogBucketArn:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn