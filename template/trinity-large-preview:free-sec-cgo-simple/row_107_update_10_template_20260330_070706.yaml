AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for REST API Gateway integrated with SQS queue for HTTP-based message retrieval

Parameters:
  QueueName:
    Type: String
    Default: MessageQueue
    Description: Name of the SQS queue
  VisibilityTimeout:
    Type: Number
    Default: 30
    Description: Visibility timeout for the SQS queue in seconds
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period for the SQS queue in seconds
  Origin:
    Type: String
    Default: https://example.com
    Description: Allowed origin for CORS

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: !Ref VisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      KmsMasterKeyId: alias/aws/sqs
      KmsDataKeyReusePeriodSeconds: 300

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueUrl
                Resource: !GetAtt SQSQueue.Arn
        - PolicyName: KMSPermission
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/sqs'

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt APIGatewayRole.Arn
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

  APIGatewayAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: SQSMessageAPI
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref Origin
        AllowMethods:
          - GET
        AllowHeaders:
          - '*'
      DisableExecuteApiEndpoint: false

  APIGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}
        - QueueName: !Ref QueueName
      ConnectionType: INTERNET
      PayloadFormatVersion: '1.0'

  APIGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: GET /
      Target: !Join
        - '/'
        - - integrations
          - !Ref APIGatewayIntegration

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGatewayAPI
      StageName: $default
      AutoDeploy: true

Outputs:
  APIGatewayInvokeURL:
    Description: Invoke URL for the API Gateway
    Value: !GetAtt APIGatewayAPI.ApiEndpoint
    Export:
      Name: SQSMessageAPI-InvokeURL