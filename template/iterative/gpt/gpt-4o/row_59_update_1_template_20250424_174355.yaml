AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon Kinesis Data Stream for real-time data ingestion
  and processing, with CloudWatch Alarms for monitoring read and write throughput.

Parameters:
  StreamName:
    Type: String
    Description: The name of the Kinesis Data Stream.
    Default: MyKinesisStream
  ShardCount:
    Type: Number
    Description: The number of shards for the Kinesis Data Stream.
    Default: 1
    MinValue: 1

Resources:
  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-ReadThroughputAlarm"
      AlarmDescription: Alarm if the read throughput exceeds the threshold
      Namespace: AWS/Kinesis
      MetricName: GetRecords.Bytes
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: []
      OKActions: []

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-WriteThroughputAlarm"
      AlarmDescription: Alarm if the write throughput exceeds the threshold
      Namespace: AWS/Kinesis
      MetricName: PutRecord.Bytes
      Dimensions:
        - Name: StreamName
          Value: !Ref StreamName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: []
      OKActions: []

Outputs:
  KinesisStreamARN:
    Description: The ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn

  ReadThroughputAlarmName:
    Description: The name of the read throughput CloudWatch Alarm
    Value: !Ref ReadThroughputAlarm

  WriteThroughputAlarmName:
    Description: The name of the write throughput CloudWatch Alarm
    Value: !Ref WriteThroughputAlarm