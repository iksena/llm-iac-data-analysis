AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an IAM role for AWS Service Catalog.
  This role enables secure provisioning and management of S3 and Lambda resources.
  It attaches pre-defined managed policies for S3 and Lambda as well as an inline policy
  providing granular permissions for Service Catalog operations, IAM, Lambda lifecycle,
  CloudFormation stack operations, and SNS integration.

Resources:
  ServiceCatalogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceCatalogGranularPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Permissions for Service Catalog operations
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:ListProvisionedProductPlans
                  - servicecatalog:DescribeRecord
                Resource: "*"
              # Permissions for IAM role and policy management
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:ListRoles
                  - iam:GetRole
                Resource: "*"
              # Permissions for Lambda function lifecycle actions
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:ListFunctions
                Resource: "*"
              # Permissions for CloudFormation stack operations
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                Resource: "*"
              # Permissions for SNS integration
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"

Outputs:
  RoleName:
    Description: "The generated name of the created IAM role."
    Value: !Ref ServiceCatalogIAMRole
  RoleArn:
    Description: "The ARN of the created IAM role."
    Value: !GetAtt ServiceCatalogIAMRole.Arn