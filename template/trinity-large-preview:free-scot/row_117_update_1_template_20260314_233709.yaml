AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
  StreamViewType:
    Type: String
    Default: NEW_AND_OLD_IMAGES
    AllowedValues:
      - NEW_AND_OLD_IMAGES
      - NEW_IMAGE
      - OLD_IMAGE
      - KEYS_ONLY

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: !Ref StreamViewType
      TableName: !Ref TableName
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  CustomEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: orders-event-bus

  DynamoDBPipeInsert:
    Type: AWS::EventBridge::Pipe
    Properties:
      Source: DynamoDBStream
      SourceConfig:
        DynamoDBStreamParameters:
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Enrichment: None
      Target:
        EventBridgeRule:
          EventBusName: !Ref CustomEventBus
          DetailType: INSERT
      Name: !Join
        - '-'
        - - DynamoDBPipe
          - INSERT

  DynamoDBPipeModify:
    Type: AWS::EventBridge::Pipe
    Properties:
      Source: DynamoDBStream
      SourceConfig:
        DynamoDBStreamParameters:
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Enrichment: None
      Target:
        EventBridgeRule:
          EventBusName: !Ref CustomEventBus
          DetailType: MODIFY
      Name: !Join
        - '-'
        - - DynamoDBPipe
          - MODIFY

Outputs:
  DynamoDBStreamArn:
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Value: !Ref CustomEventBus