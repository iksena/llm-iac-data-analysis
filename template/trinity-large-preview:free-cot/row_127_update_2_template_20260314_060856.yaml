AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon EFS Testing Environment with Basic Configurations

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-Testing-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: EFS-Testing-Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: EFS-Testing-SG

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: false
      FileSystemTags:
        - Key: Name
          Value: EFS-Testing-Filesystem

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !GetAtt SecurityGroup.GroupId

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref FileSystem
  MountTargetId:
    Description: EFS Mount Target ID
    Value: !Ref MountTarget
  FileSystemDNSName:
    Description: EFS File System DNS Name
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'