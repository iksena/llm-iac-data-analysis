AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready IAM role and instance profile for EC2 instances with CloudWatch and SSM integration'
Resources:
  EC2SSMCloudWatchRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Roles:
        - !Ref EC2SSMCloudWatchRole
Outputs:
  InstanceProfileName:
    Description: 'Name of the instance profile to assign to EC2 instances'
    Value: !Ref EC2InstanceProfile
  RoleName:
    Description: 'Name of the IAM role for reference'
    Value: !Ref EC2SSMCloudWatchRole
  RoleARN:
    Description: 'ARN of the IAM role for cross-resource permissions'
    Value: !GetAtt EC2SSMCloudWatchRole.Arn