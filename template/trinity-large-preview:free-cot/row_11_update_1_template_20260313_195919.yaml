AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB table for mobile notifications reporting with GSI and TTL

Resources:
  MobileNotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: MobileNotificationsReporting
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
        - AttributeName: type
          AttributeType: S
        - AttributeName: sentTime
          AttributeType: N
        - AttributeName: ttl
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: TypeSentTimeIndex
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: sentTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true