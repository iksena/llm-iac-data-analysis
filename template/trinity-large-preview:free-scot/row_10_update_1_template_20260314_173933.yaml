AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Ephemeral Drives and SSH Key Pair

Parameters:
  KeyPairName:
    Type: String
    Default: default-key
    Description: Name of the SSH key pair to create

Resources:
  MyKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Ref KeyPairName
      KeyType: rsa
      KeyLength: 2048

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          Fn::Sub: 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      BlockDeviceMappings:
        - DeviceName: /dev/xvdb
          Ebs:
            VolumeType: gp2
            VolumeSize: 8
            DeleteOnTermination: true
        - DeviceName: /dev/xvdc
          Ebs:
            VolumeType: gp2
            VolumeSize: 8
            DeleteOnTermination: true
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - Fn::ImportValue:
                Fn::Sub: 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
          SubnetId:
            Fn::Select:
              - 0
              - Fn::GetAZs: ''

Outputs:
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt MyEC2Instance.PublicIp
  InstanceId:
    Description: Instance ID of the EC2 instance
    Value: !Ref MyEC2Instance
  KeyFingerprint:
    Description: Fingerprint of the SSH key pair
    Value: !GetAtt MyKeyPair.KeyFingerprint