AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an EventBridge-to-Kinesis integration for real-time event streaming.

Parameters:
  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: MyKinesisStream

  KinesisShardCount:
    Type: Number
    Description: Number of shards for the Kinesis Data Stream
    Default: 1

  EventBusName:
    Type: String
    Description: Name of the EventBridge Event Bus
    Default: MyEventBus

Resources:
  MyKinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount

  MyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeKinesisPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: kinesis:PutRecord
                Resource: !GetAtt MyKinesisStream.Arn

  MyEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyEventBus
      EventPattern:
        source:
          - my-application
      Targets:
        - Id: KinesisTarget
          Arn: !GetAtt MyKinesisStream.Arn
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  KinesisStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt MyKinesisStream.Arn

  EventBusArn:
    Description: ARN of the EventBridge Event Bus
    Value: !GetAtt MyEventBus.Arn

  EventBridgeRoleName:
    Description: Name of the IAM Role used by EventBridge
    Value: !Ref EventBridgeKinesisRole