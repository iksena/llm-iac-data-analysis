AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue.

Parameters:
  QueueName:
    Type: String
    Description: The name of the SQS FIFO Queue.
    Default: MyFifoQueue.fifo
    AllowedPattern: '^[a-zA-Z0-9_-]{1,75}\.fifo$'
    ConstraintDescription: Must be 1 to 75 characters long and end with '.fifo'.

Resources:
  MyFifoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: true

Outputs:
  QueueURL:
    Description: The URL of the SQS FIFO Queue.
    Value: !Ref MyFifoQueue

  QueueARN:
    Description: The ARN of the SQS FIFO Queue.
    Value: !GetAtt MyFifoQueue.Arn