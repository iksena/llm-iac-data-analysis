AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready AWS CloudFormation template to create an IAM Role for cross-service 
  automation workflows. This role centralizes permissions for Systems Manager (SSM), 
  EC2, and monitoring tools (using CloudWatch as a representative).
Resources:
  CrossServiceAutomationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossServiceAutomationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
                - ec2.amazonaws.com
                - cloudwatch.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: CrossServiceAutomationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:*
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:*
                  - logs:*
                Resource: "*"
Outputs:
  RoleARN:
    Description: ARN of the IAM Role created for cross-service automation workflows.
    Value: !GetAtt CrossServiceAutomationRole.Arn