AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 instance with automated OS updates, Nginx installation, and SSM Automation validation

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key-pair
  LogBucketName:
    Type: String
    Default: my-ec2-automation-logs

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${LogBucketName}/*'
        - PolicyName: CloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
      Tags:
        - Key: Name
          Value: SSM-Automation-Instance

  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${LogBucketName}/*'

  SSMValidationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        description: Multi-step SSM Automation for OS updates, Nginx installation, and validation
        mainSteps:
          - name: updateOS
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum update -y
                - sudo shutdown -r now
          - name: installNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - sudo yum install -y nginx
                - sudo systemctl start nginx
                - sudo systemctl enable nginx
          - name: validateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost || exit 1

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMValidationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      ScheduleExpression: 'rate(1 day)'

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDnsName:
    Description: Public DNS Name of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  LogBucketName:
    Description: S3 Bucket for logs
    Value: !Ref LogBucket