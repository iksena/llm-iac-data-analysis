AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that provisions a secure REST API Gateway integrated 
  with AWS Lambda to invoke Amazon SES and send templated emails. The template enforces JSON 
  request validation, API key authentication, throttling, and monthly quota limits.

Resources:
  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailAPI

  SendResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: "send"

  ApiRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: "EmailRequestValidator"
      RestApiId: !Ref EmailApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  EmailModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref EmailApi
      Name: "EmailModel"
      ContentType: "application/json"
      Schema:
        type: object
        required:
          - to
          - from
          - subject
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          html:
            type: string
          text:
            type: string

  SendEmailLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: "LambdaBasicExecution"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
        - PolicyName: "SESPermissionPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"

  SendEmailLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.handler"
      Role: !GetAtt SendEmailLambdaRole.Arn
      Runtime: python3.8
      Code:
        ZipFile: |
          import json
          import boto3
          
          def handler(event, context):
              ses = boto3.client('ses')
              try:
                  payload = json.loads(event.get('body', '{}'))
                  source = payload['from']
                  destination = payload['to']
                  subject = payload['subject']
                  html_body = payload.get('html', '')
                  text_body = payload.get('text', '')
                  
                  response = ses.send_email(
                      Source=source,
                      Destination={'ToAddresses': [destination]},
                      Message={
                          'Subject': {'Data': subject},
                          'Body': {
                              'Html': {'Data': html_body},
                              'Text': {'Data': text_body}
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps({'message': 'Email sent', 'response': response})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SendEmailLambda
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EmailApi}/*/POST/send"

  SendEmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref SendResource
      HttpMethod: "POST"
      AuthorizationType: "NONE"
      ApiKeyRequired: true
      RequestValidatorId: !Ref ApiRequestValidator
      RequestModels:
        "application/json": !Ref EmailModel
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SendEmailLambda.Arn}/invocations"
      MethodResponses:
        - StatusCode: "200"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - SendEmailMethod
    Properties:
      RestApiId: !Ref EmailApi
      StageName: "Prod"
      Description: "Deployment of the Email API"

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: "EmailApiKey"
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: 
      - ApiDeployment
    Properties:
      UsagePlanName: "EmailUsagePlan"
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: "Prod"
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: "MONTH"

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: "API_KEY"
      UsagePlanId: !Ref UsagePlan

Outputs:
  RestApiId:
    Description: "The ID of the API Gateway REST API."
    Value: !Ref EmailApi
  ApiEndpoint:
    Description: "The endpoint URL for sending emails."
    Value: !Sub "https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/send"