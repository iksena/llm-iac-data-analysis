AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to create an AWS Macie session for automated sensitive data discovery'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: The frequency with which Macie publishes updates to policy findings
  
  MacieStatus:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - PAUSED
    Description: The status of the Macie session
  
  EnableAutomatedSensitiveDataDiscovery:
    Type: String
    Default: YES
    AllowedValues:
      - YES
      - NO
    Description: Enable automated sensitive data discovery for S3 buckets

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      Status: !Ref MacieStatus
      FindingPublishingFrequency: !Ref FindingPublishingFrequency

  AutomatedDiscoveryConfiguration:
    Type: AWS::Macie::FindingsFilter
    Condition: EnableDiscovery
    Properties:
      Name: AutomatedDiscoveryFindings
      Description: Filter for automated discovery findings
      Action: ARCHIVE
      Position: 1
      FindingCriteria:
        Criterion:
          type:
            eq:
              - SENSITIVE_DATA_DISCOVERY

Conditions:
  EnableDiscovery: !Equals [!Ref EnableAutomatedSensitiveDataDiscovery, 'YES']

Outputs:
  MacieSessionId:
    Description: The ID of the created Macie session
    Value: !Ref MacieSession