AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) Pipeline for EDI X12_214 to JSON Transformation

Parameters:
  BusinessContactName:
    Type: String
    Default: "Default Contact"
    Description: "Business contact name for B2B profile"
  
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: "Business contact email"
  
  BusinessContactPhone:
    Type: String
    Default: "+1-555-0123"
    Description: "Business contact phone number"
  
  InputBucketName:
    Type: String
    Default: "b2bi-input-edi"
    Description: "Name for input S3 bucket"
  
  OutputBucketName:
    Type: String
    Default: "b2bi-output-json"
    Description: "Name for output S3 bucket"

Resources:
  B2BIServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bintegration.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: B2BIPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${InputBucketName}"
                  - !Sub "arn:aws:s3:::${InputBucketName}/*"
                  - !Sub "arn:aws:s3:::${OutputBucketName}"
                  - !Sub "arn:aws:s3:::${OutputBucketName}/*"

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bintegration.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${InputBucketName}/*"
          - Effect: Allow
            Principal:
              AWS: !GetAtt B2BIServiceRole.Arn
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${InputBucketName}/*"

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bintegration.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${OutputBucketName}/*"
          - Effect: Allow
            Principal:
              AWS: !GetAtt B2BIServiceRole.Arn
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${OutputBucketName}/*"

  B2BIPartnerConfiguration:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/b2bi/partner/configuration"
      Type: "String"
      Value: |
        {
          "profileName": "EDI_X12_214_Profile",
          "businessContact": {
            "name": !Ref BusinessContactName,
            "email": !Ref BusinessContactEmail,
            "phone": !Ref BusinessContactPhone
          },
          "partnerInformation": {
            "partnerName": "BusinessPartner",
            "partnerId": "BP001",
            "communicationProtocol": "AS2"
          }
        }

  TransformationLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucketName
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          s3 = boto3.client('s3')

          def handler(event, context):
            try:
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = event['Records'][0]['s3']['object']['key']

              edi_file = s3.get_object(Bucket=bucket, Key=key)
              edi_content = edi_file['Body'].read().decode('utf-8')

              # Transform EDI to JSON logic here
              json_data = transform_edi_to_json(edi_content)

              output_key = key.replace('edi/', 'json/') + '.json'
              s3.put_object(
                Bucket=os.environ['OUTPUT_BUCKET'],
                Key=output_key,
                Body=json.dumps(json_data),
                ContentType='application/json'
              )

              return {
                'statusCode': 200,
                'body': json.dumps('Transformation complete')
              }
            except Exception as e:
              print(f"Error processing file: {str(e)}")
              raise e

          def transform_edi_to_json(edi_content):
            # Implement X12_214 to JSON transformation logic
            # This is a placeholder implementation
            return {
              "status": "success",
              "data": edi_content
            }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${InputBucketName}/*"
                  - !Sub "arn:aws:s3:::${OutputBucketName}/*"

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt TransformationLambda.Arn
      Principal: s3.amazonaws.com
      SourceAccount: !Ref "AWS::AccountId"
      SourceArn: !Sub "arn:aws:s3:::${InputBucketName}"

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "B2BI_Transformation_Errors"

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref BusinessContactEmail
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  InputBucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputBucketName
  OutputBucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputBucketName
  SNSTopicArn:
    Description: ARN of the SNS topic for error notifications
    Value: !Ref SNSTopic