AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with Cross-AZ EC2 Instances and Performance Monitoring'

Parameters:
  KeyPairName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instances
  NotificationEmail:
    Type: String
    Default: admin@example.com
    Description: Email address for CloudWatch alarm notifications

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-NetworkAcl

  NetworkAclEntryInbound:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0

  NetworkAclEntryOutbound:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  SubnetNetworkAclAssociation1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref NetworkAcl

  SubnetNetworkAclAssociation2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref NetworkAcl

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFS

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EFSSecurityGroup

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientReadWrite
      Path: /
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IAMRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref IAMRole

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2SecurityGroup

  EC2Instance1:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            EFS_ID=${!Ref EFSFileSystem}
            MOUNT_POINT=/mnt/efs
            mkdir -p $MOUNT_POINT
            echo "Waiting for EFS mount targets to become available..."
            timeout=600
            elapsed=0
            while [ $elapsed -lt $timeout ]; do
              if ping -c 1 -W 1 ${EFS_ID}.efs.${AWS::Region}.amazonaws.com &> /dev/null; then
                echo "EFS mount target is available. Mounting EFS..."
                echo "${EFS_ID}.efs.${AWS::Region}.amazonaws.com:/ $MOUNT_POINT efs _netdev,nofail 0 0" >> /etc/fstab
                mount -a -t efs
                if mountpoint -q $MOUNT_POINT; then
                  echo "EFS mounted successfully"
                  /opt/aws/bin/cfn-signal -e 0 -r "EFS mounted successfully" '${WaitHandle1}'
                  exit 0
                else
                  echo "Failed to mount EFS"
                  /opt/aws/bin/cfn-signal -e 1 -r "Failed to mount EFS" '${WaitHandle1}'
                  exit 1
                fi
              else
                echo "EFS mount target not available yet. Waiting..."
                sleep 10
                elapsed=$((elapsed + 10))
              fi
            done
            echo "Timeout waiting for EFS mount target"
            /opt/aws/bin/cfn-signal -e 1 -r "Timeout waiting for EFS mount target" '${WaitHandle1}'
            exit 1
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance1

  EC2Instance2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            yum update -y
            yum install -y amazon-efs-utils
            EFS_ID=${!Ref EFSFileSystem}
            MOUNT_POINT=/mnt/efs
            mkdir -p $MOUNT_POINT
            echo "Waiting for EFS mount targets to become available..."
            timeout=600
            elapsed=0
            while [ $elapsed -lt $timeout ]; do
              if ping -c 1 -W 1 ${EFS_ID}.efs.${AWS::Region}.amazonaws.com &> /dev/null; then
                echo "EFS mount target is available. Mounting EFS..."
                echo "${EFS_ID}.efs.${AWS::Region}.amazonaws.com:/ $MOUNT_POINT efs _netdev,nofail 0 0" >> /etc/fstab
                mount -a -t efs
                if mountpoint -q $MOUNT_POINT; then
                  echo "EFS mounted successfully"
                  /opt/aws/bin/cfn-signal -e 0 -r "EFS mounted successfully" '${WaitHandle2}'
                  exit 0
                else
                  echo "Failed to mount EFS"
                  /opt/aws/bin/cfn-signal -e 1 -r "Failed to mount EFS" '${WaitHandle2}'
                  exit 1
                fi
              else
                echo "EFS mount target not available yet. Waiting..."
                sleep 10
                elapsed=$((elapsed + 10))
              fi
            done
            echo "Timeout waiting for EFS mount target"
            /opt/aws/bin/cfn-signal -e 1 -r "Timeout waiting for EFS mount target" '${WaitHandle2}'
            exit 1
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-EC2Instance2

  WaitHandle1:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition1:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: EC2Instance1
    Properties:
      Handle: !Ref WaitHandle1
      Timeout: 900

  WaitHandle2:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition2:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: EC2Instance2
    Properties:
      Handle: !Ref WaitHandle2
      Timeout: 900

  CloudWatchAlarmEFSIO:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EFS-IO-Limit
      AlarmDescription: Alarm when EFS I/O usage exceeds 95%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 95
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSTopic

  CloudWatchAlarmEFSThroughput:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EFS-Throughput
      AlarmDescription: Alarm when EFS throughput usage exceeds 80%
      Namespace: AWS/EFS
      MetricName: PercentThroughputLimit
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SNSTopic

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref NotificationEmail
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
  EFSFileSystem:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  EC2Instance1:
    Description: EC2 Instance 1 ID
    Value: !Ref EC2Instance1
  EC2Instance2:
    Description: EC2 Instance 2 ID
    Value: !Ref EC2Instance2