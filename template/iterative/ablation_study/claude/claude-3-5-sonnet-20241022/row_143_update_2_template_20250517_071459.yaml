AWSTemplateFormatVersion: '2010-09-09'
Description: 'Static website with S3, CloudFront and automated content management'

Parameters:
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name for the stack'

Resources:
  WebsiteBucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${AWS::StackName}-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CloudFrontOAI:
    Type: 'AWS::CloudFront::CloudFrontOriginAccessIdentity'
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub 'OAI for ${AWS::StackName}'

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    DependsOn: WebsiteBucket
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: 's3:GetObject'
            Resource: !Sub '${WebsiteBucket.Arn}/*'

  CloudFrontDistribution:
    Type: 'AWS::CloudFront::Distribution'
    DependsOn: 
      - WebsiteBucket
      - CloudFrontOAI
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        Enabled: true
        DefaultRootObject: 'index.html'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          DefaultTTL: 0
          MinTTL: 0
          MaxTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2
        IPV6Enabled: true

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource:
                  - !GetAtt WebsiteBucket.Arn
                  - !Sub '${WebsiteBucket.Arn}/*'

  BucketContentFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn: 
      - LambdaExecutionRole
      - WebsiteBucket
    Properties:
      Handler: 'index.handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import traceback

          def handler(event, context):
              response_data = {}
              try:
                  print(f"Received event: {event}")
                  
                  if 'ResourceProperties' not in event:
                      raise Exception("No ResourceProperties in event")
                      
                  bucket_name = event['ResourceProperties']['BucketName']
                  s3 = boto3.client('s3')
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      print(f"Creating/Updating content in bucket: {bucket_name}")
                      default_content = '<html><body><h1>Welcome to your static website!</h1></body></html>'
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body=default_content,
                          ContentType='text/html'
                      )
                      response_data['Message'] = 'Content created successfully'
                      
                  elif event['RequestType'] == 'Delete':
                      print(f"Deleting content from bucket: {bucket_name}")
                      try:
                          paginator = s3.get_paginator('list_objects_v2')
                          for page in paginator.paginate(Bucket=bucket_name):
                              if 'Contents' in page:
                                  objects = [{'Key': obj['Key']} for obj in page['Contents']]
                                  if objects:
                                      s3.delete_objects(
                                          Bucket=bucket_name,
                                          Delete={'Objects': objects}
                                      )
                          response_data['Message'] = 'Content deleted successfully'
                      except s3.exceptions.NoSuchBucket:
                          print("Bucket already deleted")
                          response_data['Message'] = 'Bucket already deleted'
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  print(f"Traceback: {traceback.format_exc()}")
                  response_data['Error'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Runtime: python3.9
      Timeout: 60
      MemorySize: 128

  BucketContentHandler:
    Type: 'Custom::BucketContent'
    DependsOn: 
      - BucketContentFunction
      - WebsiteBucket
    Properties:
      ServiceToken: !GetAtt BucketContentFunction.Arn
      BucketName: !Ref WebsiteBucket
      Version: '1.0'

Outputs:
  CloudFrontDomainName:
    Description: 'CloudFront Distribution Domain Name'
    Value: !GetAtt CloudFrontDistribution.DomainName

  BucketName:
    Description: 'Name of S3 bucket'
    Value: !Ref WebsiteBucket

  DistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution