AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: HelloWorldApi
  ApiGatewayResourceHello:
    Type: AWS::ApiGateway::Resource
    DependsOn: ApiGatewayRestApi
    Properties:
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: hello
      RestApiId: !Ref ApiGatewayRestApi
  ApiGatewayMethodHelloGet:
    Type: AWS::ApiGateway::Method
    DependsOn: ApiGatewayResourceHello
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiGatewayResourceHello
      RestApiId: !Ref ApiGatewayRestApi
      Integration:
        Type: MOCK
        IntegrationHttpMethod: POST
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: '{"message": "hello world"}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: Empty
  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiGatewayMethodHelloGet
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      Description: Deployment for prod stage
  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiGatewayDeployment
    Properties:
      DeploymentId: !Ref ApiGatewayDeployment
      StageName: prod
      RestApiId: !Ref ApiGatewayRestApi
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: ApiGatewayStage
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !Sub '${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com'
            Id: ApiGatewayOrigin
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            OriginPath: /prod
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-64cd-4d1d-a0ab-5fd1a3d1d3c3
        Enabled: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
Outputs:
  CloudFrontDistributionDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName