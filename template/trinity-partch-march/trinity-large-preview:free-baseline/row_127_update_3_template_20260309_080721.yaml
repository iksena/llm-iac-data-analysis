AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon EFS file system for testing environment

Parameters:
  EnvironmentName:
    Type: String
    Default: Testing
    Description: Name of the environment (used for tagging)
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 0
    MinValue: 0
    Description: Provisioned throughput in MiB/s (only applicable if ThroughputMode is provisioned)

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref "AWS::NoValue"]
      Encrypted: true
      FileSystemTags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EFS
        - Key: Environment
          Value: !Ref EnvironmentName

Conditions:
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, "provisioned"]

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EfsFileSystem
  FileSystemDNSName:
    Description: The DNS name of the created EFS file system
    Value: !Sub ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com