AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon Timestream database and tables with configurable retention policies.

Parameters:
  DatabaseName:
    Type: String
    Default: timestream-db-poc
    Description: Name of the Timestream database to create.

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref DatabaseName

  TimestreamTableBatchWrite:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-01-batch-write
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: 30

  TimestreamTableOlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-02-older-records-memonly
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: 0

  TimestreamTableOlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-03-older-records-magnetic
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: 365

  TimestreamTableCommonAttributes:
    Type: AWS::Timestream::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DatabaseName: !Ref TimestreamDatabase
      TableName: poc-table-04-common-attributes
      RetentionProperties:
        MagneticStoreRetentionPeriodInDays: 30

Outputs:
  DatabaseName:
    Description: Name of the Timestream database
    Value: !Ref TimestreamDatabase
  TableNames:
    Description: Names of the Timestream tables
    Value: !Join [",", [!Ref TimestreamTableBatchWrite, !Ref TimestreamTableOlderRecordsMemOnly, !Ref TimestreamTableOlderRecordsMagnetic, !Ref TimestreamTableCommonAttributes]]