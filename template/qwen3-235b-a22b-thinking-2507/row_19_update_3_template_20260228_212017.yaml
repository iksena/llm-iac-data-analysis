AWSTemplateFormatVersion: '2010-09-09'
Description: 'Deploys EventBridge configuration to route custom events to external API endpoint via API key authentication'

Parameters:
  ApiEndpoint:
    Type: String
    Default: 'https://webhook.site/testtest'
    Description: 'The HTTPS endpoint for the external API destination'
    AllowedPattern: '^https://.*$'
    ConstraintDescription: 'Must be a valid HTTPS URL'
  ApiKeyName:
    Type: String
    Default: 'x-api-key'
    Description: 'The HTTP header name for API key authentication'
  SecretName:
    Type: String
    Default: '/eventbridge/api-key'
    Description: 'Name for the Secrets Manager secret'

Resources:
  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      GenerateSecretString:
        SecretStringTemplate: '{"api_key": ""}'
        GenerateStringKey: 'api_key'
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
        ExcludePunctuation: true

  SecretPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref ApiKeySecret
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: secretsmanager:GetSecretValue
            Resource: '*'

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: api-connection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuth:
          ApiKeyName: !Ref ApiKeyName
          ApiKeyValue: !Sub '{{resolve:secretsmanager:${SecretName}:SecretString:api_key}}'

  WebhookApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: webhook-destination
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref ApiEndpoint

  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: custom-events-bus

  RouteToWebhookRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      Name: route-to-webhook
      EventPattern:
        source:
          - custom.my-app
      Targets:
        - Id: WebhookTarget
          Arn: !GetAtt WebhookApiDestination.Arn

Outputs:
  SecretArn:
    Description: ARN of the API key secret
    Value: !Ref ApiKeySecret
  ConnectionArn:
    Description: ARN of the EventBridge connection
    Value: !GetAtt EventBridgeConnection.Arn
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt WebhookApiDestination.Arn
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref CustomEventBus