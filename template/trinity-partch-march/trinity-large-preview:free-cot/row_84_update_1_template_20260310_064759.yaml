AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Macie Session CloudFormation Template

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: ONE_HOUR
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: How often Macie publishes findings

  Status:
    Type: String
    Default: ENABLED
    AllowedValues:
      - PAUSED
      - ENABLED
    Description: Status of the Macie session

Resources:
  MacieSession:
    Type: AWS::Macie::Session
    Properties:
      FindingPublishingFrequency: !Ref FindingPublishingFrequency
      Status: !Ref Status

Outputs:
  MacieSessionArn:
    Description: ARN of the Macie session
    Value: !GetAtt MacieSession.Arn

  MacieSessionStatus:
    Description: Status of the Macie session
    Value: !GetAtt MacieSession.Status