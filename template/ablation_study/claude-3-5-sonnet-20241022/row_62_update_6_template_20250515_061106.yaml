AWSTemplateFormatVersion: '2010-09-09'
Description: 'Aurora MySQL Cluster with two instances and custom parameter groups'

Parameters:
  DBName:
    Type: String
    Default: mydb
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  DBMasterUsername:
    Type: String
    Default: admin
    Description: Database admin username
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database cluster

  DBSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for the database cluster

  DBSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for the database cluster

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First Availability Zone

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second Availability Zone

Resources:
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: aurora-security-group

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - !Ref DBSubnet1
        - !Ref DBSubnet2
      Tags:
        - Key: Name
          Value: aurora-subnet-group

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Custom cluster parameter group
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        character_set_server: utf8mb4
        character_set_client: utf8mb4
      Tags:
        - Key: Name
          Value: aurora-cluster-parameter-group

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Custom instance parameter group
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
        max_connections: '1000'
      Tags:
        - Key: Name
          Value: aurora-db-parameter-group

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref DBMasterUsername
      ManageMasterUserPassword: true
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      Port: 3306
      AvailabilityZones:
        - !Ref AvailabilityZone1
        - !Ref AvailabilityZone2
      Tags:
        - Key: Name
          Value: aurora-cluster

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !Ref AvailabilityZone1
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: aurora-instance-1

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !Ref AvailabilityZone2
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: aurora-instance-2

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint
    Value: !GetAtt AuroraDBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address

  DatabaseName:
    Description: Database name
    Value: !Ref DBName

  ClusterPort:
    Description: Database port
    Value: !GetAtt AuroraDBCluster.Endpoint.Port

  SecretArn:
    Description: Secret ARN for database credentials
    Value: !GetAtt AuroraDBCluster.MasterUserSecret.SecretArn