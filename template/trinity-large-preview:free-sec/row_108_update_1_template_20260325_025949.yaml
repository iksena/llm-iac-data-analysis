AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Management System with Admin Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  UserPoolDomainPrefix:
    Type: String
    Default: myapp-auth
    Description: Prefix for the Cognito hosted domain
  ClientName:
    Type: String
    Default: MyAppClient
    Description: Name of the Cognito User Pool Client
  MinPasswordLength:
    Type: Number
    Default: 8
    Description: Minimum password length
  RequireNumbers:
    Type: Boolean
    Default: true
    Description: Require numbers in password
  RequireSymbols:
    Type: Boolean
    Default: true
    Description: Require symbols in password
  RequireUppercase:
    Type: Boolean
    Default: true
    Description: Require uppercase letters in password
  RequireLowercase:
    Type: Boolean
    Default: true
    Description: Require lowercase letters in password
  TokenValidityDays:
    Type: Number
    Default: 30
    Description: Refresh token validity in days

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref MinPasswordLength
          RequireNumbers: !Ref RequireNumbers
          RequireSymbols: !Ref RequireSymbols
          RequireUppercase: !Ref RequireUppercase
          RequireLowercase: !Ref RequireLowercase
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: 'OFF'
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: phone_number
          AttributeDataType: String
          Mutable: true
          Required: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: true

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref UserPoolDomainPrefix
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref ClientName
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      RefreshTokenValidity: !Ref TokenValidityDays
      AllowedOAuthFlows:
        - code
        - implicit
        - client_credentials
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - https://yourapp.com/callback
      LogoutURLs:
        - https://yourapp.com/logout
      SupportedIdentityProviders:
        - COGNITO

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  UserPoolDomain:
    Description: Cognito Hosted Domain
    Value: !GetAtt CognitoUserPoolDomain.Domain
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
  UserPoolClientSecret:
    Description: Cognito User Pool Client Secret
    Value: !GetAtt CognitoUserPoolClient.ClientSecret