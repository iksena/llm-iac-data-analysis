AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CodeServerVersion:
    Type: String
    Default: 4.4.0
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t2.micro
      - t3.medium
      - t3.large

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-0d70546e43a941d70

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  CloudFrontSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow CloudFront access to code-server
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  CloudFrontPrefixListLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DescribePrefixLists
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: ec2:DescribeManagedPrefixLists
                Resource: '*'
              - Effect: Allow
                Action: logs:CreateLogGroup
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:log-group:/aws/lambda/*'

  CloudFrontPrefixListLambda:
    Type: AWS::Lambda::Function
    DependsOn: CloudFrontPrefixListLambdaRole
    Properties:
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const response = require('cfn-response');
          
          exports.handler = (event, context) => {
              const ec2 = new AWS.EC2({region: event.ResourceProperties.Region});
              ec2.describeManagedPrefixLists({
                  Filters: [{ Name: 'prefix-list-name', Values: ['com.amazonaws.global.cloudfront.origin-facing'] }]
              }, (err, data) => {
                  if (err) {
                      console.error(err);
                      response.send(event, context, response.FAILED, {error: err.message});
                  } else if (data.PrefixLists.length === 0) {
                      response.send(event, context, response.FAILED, {error: 'CloudFront prefix list not found'});
                  } else {
                      response.send(event, context, response.SUCCESS, {PrefixListId: data.PrefixLists[0].PrefixListId});
                  }
              });
          };
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt CloudFrontPrefixListLambdaRole.Arn
      Timeout: 30

  GetCloudFrontPrefixList:
    Type: Custom::GetCloudFrontPrefixList
    Properties:
      ServiceToken: !GetAtt CloudFrontPrefixListLambda.Arn
      Region: !Ref AWS::Region

  SecurityGroupIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    DependsOn: GetCloudFrontPrefixList
    Properties:
      GroupId: !Ref CloudFrontSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourcePrefixListId: !GetAtt GetCloudFrontPrefixList.PrefixListId

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CodeServerCachePolicy
        Comment: 1-year TTL cache policy
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: SecurityGroupIngressRule
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref AWS::Region, AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref CloudFrontSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: !Base64
        !Sub |
          #!/bin/bash -xe
          apt-get update -y
          curl -fsSL https://code-server.dev/install.sh | sh -s -- --version ${CodeServerVersion}
          mkdir -p /root/.config/code-server
          cat <<EOF > /root/.config/code-server/config.yaml
          bind-addr: 0.0.0.0:8080
          auth: none
          EOF
          systemctl enable --now code-server@root

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2Instance
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Code-server distribution
        DefaultCacheBehavior:
          TargetOriginId: origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref CloudFrontCachePolicy
        Origins:
          - Id: origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 8080
              OriginProtocolPolicy: http-only
        PriceClass: PriceClass_All

Outputs:
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  EC2InstanceId:
    Value: !Ref EC2Instance
  PublicDNS:
    Value: !GetAtt EC2Instance.PublicDnsName