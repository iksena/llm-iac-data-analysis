AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role with Configurable Permission Boundaries for Developer Governance

Parameters:
  EnableBoundaryEnforcement:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Toggle to enable/disable strict permission boundary enforcement

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:*
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
            Resource: '*'

  IAMRoleWithBoundary:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action: sts:AssumeRole
      PermissionsBoundary:
        Fn::If:
          - EnableBoundaryEnforcement
          - Ref: PermissionBoundaryPolicy
          - !Ref AWS::NoValue
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess
      Policies:
        - PolicyName: IAMPolicyValidation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: 'arn:aws:iam::123456789012:role/MyTeam*'
              - Effect: Deny
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: '*'
        - PolicyName: IAMTagValidation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:ResourceTag/Owner: MyTeam
              - Effect: Deny
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:UpdateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:SetDefaultPolicyVersion
                Resource: '*'

  IAMRoleWithoutBoundary:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::123456789012:root
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMFullAccess

  IAMPolicyValidation:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IAMPolicyValidation
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
            Resource: 'arn:aws:iam::123456789012:role/MyTeam*'
          - Effect: Deny
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
            Resource: '*'
      Roles:
        - !Ref IAMRoleWithBoundary

  IAMTagValidation:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IAMTagValidation
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
            Resource: '*'
            Condition:
              StringEquals:
                iam:ResourceTag/Owner: MyTeam
          - Effect: Deny
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateRole
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:SetDefaultPolicyVersion
            Resource: '*'
      Roles:
        - !Ref IAMRoleWithBoundary

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Boundary Enforcement Configuration
        Parameters:
          - EnableBoundaryEnforcement
    ParameterLabels:
      EnableBoundaryEnforcement:
        default: Enable Permission Boundary Enforcement

Conditions:
  EnableBoundaryEnforcement: !Equals [!Ref EnableBoundaryEnforcement, "true"]

Outputs:
  IAMRoleWithBoundaryArn:
    Description: ARN of the IAM Role with Boundary
    Value: !GetAtt IAMRoleWithBoundary.Arn
  IAMRoleWithoutBoundaryArn:
    Description: ARN of the IAM Role without Boundary
    Value: !GetAtt IAMRoleWithoutBoundary.Arn
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !Ref PermissionBoundaryPolicy