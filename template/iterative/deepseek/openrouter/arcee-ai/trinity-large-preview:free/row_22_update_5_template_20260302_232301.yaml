AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table with local and global secondary indexes.

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: The name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: The read capacity units for the table
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: The write capacity units for the table
  HashKey:
    Type: String
    Default: id
    Description: The hash key for the table
  RangeKey:
    Type: String
    Default: timestamp
    Description: The range key for the table
  LSISortKey:
    Type: String
    Default: someAttribute
    Description: The sort key for the local secondary index
  GSISortKey:
    Type: String
    Default: anotherAttribute
    Description: The sort key for the global secondary index

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref HashKey
          AttributeType: S
        - AttributeName: !Ref RangeKey
          AttributeType: S
        - AttributeName: !Ref LSISortKey
          AttributeType: S
        - AttributeName: !Ref GSISortKey
          AttributeType: S
      KeySchema:
        - AttributeName: !Ref HashKey
          KeyType: HASH
        - AttributeName: !Ref RangeKey
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      LocalSecondaryIndexes:
        - IndexName: LSIIndex
          KeySchema:
            - AttributeName: !Ref HashKey
              KeyType: HASH
            - AttributeName: !Ref LSISortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSIIndex
          KeySchema:
            - AttributeName: !Ref GSISortKey
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref DynamoDBTable
  TableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn