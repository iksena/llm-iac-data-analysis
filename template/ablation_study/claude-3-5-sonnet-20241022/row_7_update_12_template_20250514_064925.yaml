AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM access configuration in default VPC'

Parameters:
  EnvironmentType:
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production
    Description: Environment type for the deployment

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-east-2:
      AMI: ami-02d1e544b84bf7502
    us-west-1:
      AMI: ami-0d9858aa3c6322f73
    us-west-2:
      AMI: ami-098e42ae54c764c35
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d
    eu-central-1:
      AMI: ami-0dcc0ebde7b2e00db

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - ec2.amazonaws.com
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Purpose
          Value: SSM-Management
        - Key: Environment
          Value: !Ref EnvironmentType

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMInstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSM-managed instance
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: SSM-Instance-SG
        - Key: Environment
          Value: !Ref EnvironmentType

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap 
        - RegionMap
        - !Ref 'AWS::Region'
        - AMI
      InstanceType: t3.micro
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroups: 
        - !Ref InstanceSecurityGroup
      Monitoring: true
      Tags:
        - Key: Name
          Value: !Sub SSM-Managed-Instance-${EnvironmentType}
        - Key: Environment
          Value: !Ref EnvironmentType
        - Key: ManagementType
          Value: SSM

Outputs:
  InstanceId:
    Description: ID of the created EC2 instance
    Value: !Ref EC2Instance
  SSMConnectionCommand:
    Description: Command to connect to instance using SSM Session Manager
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'
  SecurityGroupId:
    Description: ID of the created Security Group
    Value: !Ref InstanceSecurityGroup
  InstanceAZ:
    Description: Availability Zone of the created instance
    Value: !GetAtt EC2Instance.AvailabilityZone