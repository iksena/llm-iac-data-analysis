AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GlueServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*'
                  - 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs'

  GlueDatabase:
    Type: 'AWS::Glue::Database'
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: 'cloudtrail_logs'

  GlueCrawler:
    Type: 'AWS::Glue::Crawler'
    Properties:
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref GlueDatabase
      Targets:
        S3Targets:
          - Path: 's3://kk-admin/cloud-trail/AWSLogs/'
      TablePrefix: 'cloudtrail_'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      CrawlerSecurityConfiguration: !Ref GlueServiceRole

Outputs:
  GlueDatabaseName:
    Description: 'The name of the Glue Database created for CloudTrail logs.'
    Value: !Ref GlueDatabase

  GlueCrawlerName:
    Description: 'The name of the Glue Crawler created for cataloging CloudTrail logs.'
    Value: !Ref GlueCrawler