AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template for creating an encrypted One Zone EFS file system in us-east-1a'

Parameters:
  PerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system

  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system

  BackupPolicy:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Whether to enable automatic backups

Resources:
  EFSKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for EFS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  EFSKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-efs-key'
      TargetKeyId: !Ref EFSKMSKey

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      KmsKeyId: !Ref EFSKMSKey
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      AvailabilityZoneName: us-east-1a
      BackupPolicy:
        Status: !Ref BackupPolicy
      FileSystemTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-efs'

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Sub '${FileSystem}.efs.${AWS::Region}.amazonaws.com'

  KMSKeyId:
    Description: ID of the KMS Key used for encryption
    Value: !Ref EFSKMSKey