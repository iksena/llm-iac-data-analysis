AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard for VPC Flow Logs Analysis with NAT Gateway focus

Resources:
  VPCFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: VPCFlowLogsDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "filter interfaceId like 'eni-' | stats sum(bytes) as bytes by srcAddr | sort bytes desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Traffic",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "filter interfaceId like 'eni-' and action='REJECT' | stats count(*) as rejected by srcAddr | sort rejected desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connections",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "filter interfaceId like 'eni-' and action='ACCEPT' | stats sum(bytes) as bytes by dstAddr | sort bytes desc | limit 10",
                "region": "${AWS::Region}",
                "title": "Top Destination IPs by Accepted Traffic",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 18,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "filter interfaceId like 'eni-' | stats count(*) as connections by action | sort connections desc",
                "region": "${AWS::Region}",
                "title": "Connection Summary by Action",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL to access the VPC Flow Logs Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=VPCFlowLogsDashboard"