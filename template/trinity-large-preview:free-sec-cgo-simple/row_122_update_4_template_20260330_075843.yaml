AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for product creation automation

Parameters:
  ShopifyApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /shopify/api-key
    Description: Shopify admin API key stored in SSM Parameter Store

Resources:
  MyShopifyAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp
      Description: Event bus for Shopify product creation events

  ShopifyApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue:
          Ref: ShopifyApiKey

  ShopifyProductCreationApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreation
      ConnectionArn: !GetAtt ShopifyApiConnection.Arn
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2024-01/products.json
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  ShopifyProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref MyShopifyAppEventBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyProductCreationApiDestination.Arn
          Id: ShopifyProductCreationTarget

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref MyShopifyAppEventBus
  ApiDestinationArn:
    Description: ARN of the Shopify API destination
    Value: !GetAtt ShopifyProductCreationApiDestination.Arn
  ConnectionArn:
    Description: ARN of the Shopify API connection
    Value: !GetAtt ShopifyApiConnection.Arn