AWSTemplateFormatVersion: '2010-09-09'
Description: REST API Gateway integrated with Amazon Kinesis Data Streams

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: StreamingData
      ShardCount: 1
      # Effect: encrypted - Kinesis streams are encrypted by default with AWS-managed KMS

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListStreams
                Resource: !GetAtt KinesisStream.Arn
      # Effect: least-privilege - only Kinesis actions granted

  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisDataAPI
    # Effect: public - no authorization restrictions on the API itself

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref APIGatewayRestApi
    DependsOn:
      - PutRecordMethod
      - PutRecordsMethod
      - GetRecordsMethod
      - GetShardIteratorMethod
      - DescribeStreamMethod
    # Effect: public - deployment makes API accessible

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestApi
      StageName: prod
    # Effect: public - stage exposes API endpoints

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: POST
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn
      ResourceId: !GetAtt APIGatewayRestApi.RootResourceId
      RestApiId: !Ref APIGatewayRestApi
    # Effect: public - accessible via HTTP POST

  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: POST
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn
      ResourceId: !GetAtt APIGatewayRestApi.RootResourceId
      RestApiId: !Ref APIGatewayRestApi
    # Effect: public - accessible via HTTP POST

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn
      ResourceId: !GetAtt APIGatewayRestApi.RootResourceId
      RestApiId: !Ref APIGatewayRestApi
    # Effect: public - accessible via HTTP GET

  GetShardIteratorMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetShardIterator
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn
      ResourceId: !GetAtt APIGatewayRestApi.RootResourceId
      RestApiId: !Ref APIGatewayRestApi
    # Effect: public - accessible via HTTP GET

  DescribeStreamMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: AWS_IAM
      HttpMethod: GET
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
          - AWS::Region: !Ref AWS::Region
        Credentials: !GetAtt APIGatewayRole.Arn
      ResourceId: !GetAtt APIGatewayRestApi.RootResourceId
      RestApiId: !Ref APIGatewayRestApi
    # Effect: public - accessible via HTTP GET

# Mapping back to I-IR:
# - All resources from I-IR are present
# - DependsOn relationships implemented via DependsOn or implicit Ref/GetAtt
# - 'encrypted' effect: Kinesis streams are encrypted by default
# - 'least-privilege' effect: IAM role only has Kinesis permissions
# - 'public' effects: No API Gateway authorization restrictions, public stage
# - All IAM credentials reference the APIGatewayRole
# - All integration URIs use AWS_PROXY with proper region substitution