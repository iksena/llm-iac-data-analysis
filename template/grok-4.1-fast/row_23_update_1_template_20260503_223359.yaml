AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a production-ready DynamoDB table with flexible billing and key schema.'

Parameters:
  TableName:
    Type: String
    Default: 'MyDynamoDBTable'
    Description: 'The name of the DynamoDB table.'
  PartitionKeyName:
    Type: String
    Default: 'id'
    Description: 'The name of the partition key attribute.'
  PartitionKeyType:
    Type: String
    Default: 'S'
    AllowedValues:
      - S
      - N
      - B
    Description: 'The data type of the partition key (S=String, N=Number, B=Binary).'
  BillingMode:
    Type: String
    Default: 'PAY_PER_REQUEST'
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
    Description: 'Specifies how you are charged for read and write throughput (PAY_PER_REQUEST or PROVISIONED).'
  ReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000
    Description: 'Read capacity units for PROVISIONED billing mode.'
  WriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000
    Description: 'Write capacity units for PROVISIONED billing mode.'

Conditions:
  UseProvisionedCapacity: !Equals [!Ref BillingMode, 'PROVISIONED']

Resources:
  DynamoDBTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKeyName
          AttributeType: !Ref PartitionKeyType
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: HASH
      ProvisionedThroughput:
        Fn::If:
          - UseProvisionedCapacity
          - ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - !Ref 'AWS::NoValue'

Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table.'
    Value: !Ref TableName
  TableArn:
    Description: 'ARN of the created DynamoDB table.'
    Value: !GetAtt DynamoDBTable.Arn