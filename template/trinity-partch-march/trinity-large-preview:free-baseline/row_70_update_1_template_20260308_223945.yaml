AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-AZ VPC with public and private subnets, route tables, and internet access

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  AvailabilityZones:
    Type: List<AWS::EC2::AvailabilityZone::Name>
    Default: !Join [',', !GetAZs '']
    Description: List of Availability Zones to use
  PublicSubnetCidrs:
    Type: String
    Default: 10.0.0.0/24,10.0.1.0/24
    Description: Comma-separated list of CIDR blocks for public subnets
  PrivateSubnetCidrs:
    Type: String
    Default: 10.0.2.0/24,10.0.3.0/24
    Description: Comma-separated list of CIDR blocks for private subnets

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-RT

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  EIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Select [0, !Ref PublicSubnets]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-NATGW

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Private-RT

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PublicSubnets:
    Type: AWS::EC2::Subnet::List
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidrs
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Public-Subnet

  PrivateSubnets:
    Type: AWS::EC2::Subnet::List
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidrs
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Private-Subnet

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [0, !Ref PublicSubnets]
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [0, !Ref PrivateSubnets]
      RouteTableId: !Ref PrivateRouteTable

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnetIds:
    Description: Public Subnet IDs
    Value: !Join [',', !Ref PublicSubnets]
  PrivateSubnetIds:
    Description: Private Subnet IDs
    Value: !Join [',', !Ref PrivateSubnets]
  InternetGatewayId:
    Description: Internet Gateway ID
    Value: !Ref InternetGateway
  NATGatewayId:
    Description: NAT Gateway ID
    Value: !Ref NATGateway