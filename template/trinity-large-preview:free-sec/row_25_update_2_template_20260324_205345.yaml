AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IotDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-iot-data-queue'

  IotDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-iot-data-topic'

  IotDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: !Sub '${AWS::StackName}-iot-data-rule'
      TopicRulePayload:
        Sql: 'SELECT * FROM "device/data"'
        Actions:
          - Sns:
              TargetArn: !Ref IotDataTopic
              RoleArn: !GetAtt IotDataRuleRole.Arn
              MessageFormat: RAW

  IotDataRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-iot-data-rule-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IotDataRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IotDataTopic

Outputs:
  QueueUrl:
    Description: SQS Queue URL
    Value: !Ref IotDataQueue
  TopicArn:
    Description: SNS Topic ARN
    Value: !Ref IotDataTopic