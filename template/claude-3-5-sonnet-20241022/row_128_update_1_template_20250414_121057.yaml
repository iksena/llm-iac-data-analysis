AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated solution for managing AWS Security Hub controls'

Parameters:
  DisableCIS140Controls:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Disable CIS 1.4.0 controls'

  EnablePermissionBoundary:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: 'Enable IAM permission boundary for Lambda role'

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: 'CloudWatch Logs retention period in days'

  CustomSecurityHubControls:
    Type: CommaDelimitedList
    Description: 'Comma-separated list of Security Hub control IDs to manage'
    Default: 'CIS.1.1,CIS.1.2,FSBP.1.1'

Resources:
  SecurityHubLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:GetEnabledStandards
                  - securityhub:BatchUpdateStandardsControlStatus
                  - securityhub:DescribeStandardsControls
                Resource: '*'
      PermissionsBoundary: !If 
        - UsePermissionBoundary
        - !Ref SecurityHubLambdaPermissionBoundary
        - !Ref AWS::NoValue
      Tags:
        - Key: Purpose
          Value: SecurityHubControl

  SecurityHubLambdaPermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Condition: UsePermissionBoundary
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - securityhub:*
              - logs:*
            Resource: '*'

  SecurityHubControlFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt SecurityHubLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import os
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          securityhub = boto3.client('securityhub')

          def handler(event, context):
              try:
                  disable_cis = os.environ['DISABLE_CIS_140'] == 'true'
                  custom_controls = os.environ['CUSTOM_CONTROLS'].split(',')
                  
                  standards_response = securityhub.get_enabled_standards()
                  for standard in standards_response['StandardsSubscriptions']:
                      controls = securityhub.describe_standards_controls(
                          StandardsSubscriptionArn=standard['StandardsSubscriptionArn']
                      )
                      
                      for control in controls['Controls']:
                          if disable_cis and control['StandardsControlArn'].find('CIS') >= 0:
                              update_control_status(control['StandardsControlArn'], 'DISABLED')
                          elif control['ControlId'] in custom_controls:
                              update_control_status(control['StandardsControlArn'], 'DISABLED')
                  
                  return {'StatusCode': 200, 'Message': 'Successfully updated controls'}
              except Exception as e:
                  logger.error(f"Error updating controls: {str(e)}")
                  raise

          def update_control_status(control_arn, status):
              securityhub.batch_update_standards_control_status(
                  StandardsControlArn=control_arn,
                  ControlStatus=status,
                  DisabledReason='Disabled via automation'
              )
      Runtime: python3.9
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          DISABLE_CIS_140: !Ref DisableCIS140Controls
          CUSTOM_CONTROLS: !Join [',', !Ref CustomSecurityHubControls]
      Tags:
        - Key: Purpose
          Value: SecurityHubControl

  SecurityHubControlFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SecurityHubControlFunction}
      RetentionInDays: !Ref LogRetentionDays

Conditions:
  UsePermissionBoundary: !Equals 
    - !Ref EnablePermissionBoundary
    - 'true'

Outputs:
  LambdaFunctionArn:
    Description: 'ARN of the Security Hub control management Lambda function'
    Value: !GetAtt SecurityHubControlFunction.Arn

  LambdaRoleArn:
    Description: 'ARN of the Lambda execution role'
    Value: !GetAtt SecurityHubLambdaRole.Arn

  SecurityHubControlStatus:
    Description: 'Status of Security Hub control management setup'
    Value: 'Security Hub controls management automation deployed successfully'