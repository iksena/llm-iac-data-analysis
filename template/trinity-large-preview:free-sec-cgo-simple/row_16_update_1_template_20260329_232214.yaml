AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: CloudTrailDB

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: CloudTrailCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      Configuration: '{"Version":1.0,"Grouping": {"TableGroupingPolicy": "CombineCompatibleSchemas"}}'

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*
              - Effect: Allow
                Action:
                  - s3:Put*
                  - s3:Delete*
                Resource: arn:aws:s3:::aws-glue-scripts-*

Outputs:
  DatabaseName:
    Description: Name of the created Glue Database
    Value: !Ref CloudTrailDatabase
  CrawlerName:
    Description: Name of the created Glue Crawler
    Value: !Ref CloudTrailCrawler