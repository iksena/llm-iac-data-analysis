AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Security Hub Controls Management Solution

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: "false"
    Description: Set to 'true' to disable CIS 1.4.0 controls, 'false' to keep them enabled

  PermissionsBoundary:
    Type: String
    Default: ""
    Description: Optional IAM permissions boundary ARN

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      PermissionsBoundary: !Ref PermissionsBoundary
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3

          def handler(event, context):
              securityhub = boto3.client('securityhub')
              # Example logic to disable CIS controls based on parameter
              disable_cis = event.get('DisableCIS140Controls', 'false').lower() == 'true'
              # Implementation would call securityhub.update_standards_control()
              return {
                  'statusCode': 200,
                  'body': json.dumps('Security Hub controls updated successfully')
              }

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  LambdaPermissions:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecurityHubManagementPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - securityhub:*
            Resource: "*"
      Roles:
        - !Ref LambdaExecutionRole