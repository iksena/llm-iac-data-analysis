AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with SQS queue for object upload notifications

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket to create
    Default: my-s3-bucket-for-notifications
    MinLength: 3
    MaxLength: 63
    AllowedPattern: ^[a-z0-9.-]+$
    ConstraintDescription: S3 bucket name can contain lowercase letters, numbers, periods, and hyphens.

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-notification-queue

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub arn:${AWS::Partition}:s3:::${S3BucketName}

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt SQSQueue.Arn

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub ${AWS::StackName}-S3BucketName

  SQSQueueURL:
    Description: URL of the created SQS queue
    Value: !GetAtt SQSQueue.QueueName
    Export:
      Name: !Sub ${AWS::StackName}-SQSQueueURL