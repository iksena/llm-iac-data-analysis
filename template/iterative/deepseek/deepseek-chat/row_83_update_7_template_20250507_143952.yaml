AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates a Transit Gateway and shares it via RAM for cross-account networking'

Parameters:
  ShareWithAccount:
    Type: String
    Description: 'AWS Account ID to share the Transit Gateway with (must be in same AWS Organization)'
    Default: '644519422710'
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: 'Must be a valid 12-digit AWS account ID'
  
  EnableSharingWithAwsOrganization:
    Type: String
    Description: 'Enable sharing with AWS Organization (true/false)'
    Default: 'true'
    AllowedValues: ['true', 'false']

Resources:
  TransitGateway:
    Type: 'AWS::EC2::TransitGateway'
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: 'enable'
      DefaultRouteTableAssociation: 'enable'
      DefaultRouteTablePropagation: 'enable'
      Description: 'Central Transit Gateway for cross-account networking'
      Tags:
        - Key: 'Name'
          Value: !Sub '${AWS::StackName}-TGW'

  RAMResourceShare:
    Type: 'AWS::RAM::ResourceShare'
    Properties:
      Name: !Sub '${AWS::StackName}-TGW-Share'
      AllowExternalPrincipals: !If [EnableSharingWithAwsOrganization, false, true]
      PermissionArns:
        - !Sub 'arn:${AWS::Partition}:ram::aws:permission/AWSRAMDefaultPermissionTransitGateway'
      Principals:
        - !If 
          - EnableSharingWithAwsOrganization
          - !Sub 'arn:${AWS::Partition}:organizations::${AWS::AccountId}:organization/o-${AWS::AccountId}'
          - !Ref ShareWithAccount
      ResourceArns:
        - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway/${TransitGateway}'
      Tags:
        - Key: 'Purpose'
          Value: 'Cross-account-network-sharing'

Outputs:
  TransitGatewayId:
    Description: 'The ID of the created Transit Gateway'
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareArn:
    Description: 'The ARN of the RAM Resource Share'
    Value: !GetAtt 'RAMResourceShare.Arn'
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareArn'