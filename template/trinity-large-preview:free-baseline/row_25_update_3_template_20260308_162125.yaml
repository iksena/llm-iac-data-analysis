AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - Routes messages from AWS IoT Core to SQS via SNS

Resources:
  IotDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IotDataQueue

  IotDataTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IotDataTopic

  IotDataTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref IotDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sns:Publish
            Resource: !Ref IotDataTopic

  IotDataQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref IotDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt IotDataQueue.Arn

  IotDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IotDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IotDataTopic
              MessageFormat: RAW
        RuleDisabled: false

Outputs:
  IotDataQueueUrl:
    Description: URL of the IoT Data SQS Queue
    Value: !Ref IotDataQueue
  IotDataTopicArn:
    Description: ARN of the IoT Data SNS Topic
    Value: !Ref IotDataTopic
  IotDataRuleName:
    Description: Name of the IoT Data Rule
    Value: !Ref IotDataRule