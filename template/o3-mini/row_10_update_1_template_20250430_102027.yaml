AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to launch an Amazon Linux 2 EC2 instance with ephemeral drives.
  The instance uses the latest Amazon Linux 2 AMI retrieved from SSM Parameter Store, attaches ephemeral drives,
  and deploys into a pre-existing default VPC/Subnet. An SSH KeyPair is created for secure access.

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The ID of a subnet in the default VPC where the instance will be deployed.

Resources:
  InstanceKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub "${AWS::StackName}-KeyPair"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      KeyName: !Ref InstanceKeyPair
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2:1}}"
      BlockDeviceMappings:
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1

Outputs:
  InstanceId:
    Description: The EC2 Instance ID.
    Value: !Ref EC2Instance
  SSHKeyPairName:
    Description: The name of the SSH key pair created for the instance.
    Value: !Ref InstanceKeyPair