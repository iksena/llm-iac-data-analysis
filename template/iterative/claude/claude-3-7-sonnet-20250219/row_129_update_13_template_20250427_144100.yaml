AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Config setup with customizable retention policies and delivery configurations'

Parameters:
  ConfigBucketName:
    Type: String
    Description: Name of the S3 bucket to store AWS Config data (must be globally unique)
    Default: aws-config-data

  CreateNewBucket:
    Type: String
    Description: Create a new S3 bucket or use an existing one
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  RetentionPeriod:
    Type: Number
    Description: Number of days to retain configuration history (default is 7 years)
    Default: 2557
    MinValue: 30
  
  DeliveryFrequency:
    Type: String
    Description: How often AWS Config delivers configuration snapshots
    Default: Six_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
  
  GlobalResourceTypes:
    Type: String
    Description: Whether to include global resource types in recording
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  NotificationEmail:
    Type: String
    Description: Email address to receive AWS Config notifications (leave empty to disable)
    Default: ""
  
  PermissionBoundaryARN:
    Type: String
    Description: ARN of the IAM permission boundary to apply (leave empty to disable)
    Default: ""

Conditions:
  CreateS3Bucket: !Equals [!Ref CreateNewBucket, 'true']
  UsePermissionBoundary: !Not [!Equals [!Ref PermissionBoundaryARN, '']]
  EnableSNSNotifications: !Not [!Equals [!Ref NotificationEmail, '']]
  IncludeGlobalResources: !Equals [!Ref GlobalResourceTypes, 'true']

Resources:
  # S3 Bucket for AWS Config data (if creating new)
  ConfigBucket:
    Type: AWS::S3::Bucket
    Condition: CreateS3Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ConfigBucketName}-tau-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ConfigDataRetention
            Status: Enabled
            ExpirationInDays: !Ref RetentionPeriod
            Prefix: "AWSLogs/"

  # S3 Bucket Policy to enforce SSL and restrict access
  ConfigBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateS3Bucket
    Properties:
      Bucket: !Ref ConfigBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ForceSSLOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub 'arn:aws:s3:::${ConfigBucket}'
              - !Sub 'arn:aws:s3:::${ConfigBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false
          - Sid: AWSConfigBucketPermissionsCheck
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}'
          - Sid: AWSConfigBucketDelivery
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/Config/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'

  # SNS Topic for AWS Config notifications
  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Sub 'AWS-Config-Notifications-${AWS::StackName}'
      TopicName: !Sub 'AWS-Config-Notifications-${AWS::StackName}'

  # SNS Topic Policy
  ConfigSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref ConfigSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowConfigPublish
            Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sns:Publish
            Resource: !Ref ConfigSNSTopic

  # SNS Topic Subscription (if email provided)
  ConfigSNSSubscription:
    Type: AWS::SNS::Subscription
    Condition: EnableSNSNotifications
    Properties:
      TopicArn: !Ref ConfigSNSTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # IAM Role for AWS Config
  ConfigServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ConfigServiceRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole
      PermissionsBoundary: !If [UsePermissionBoundary, !Ref PermissionBoundaryARN, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: ConfigDeliveryPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: 
                  - !If [CreateS3Bucket, !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/Config/*', !Sub 'arn:aws:s3:::${ConfigBucketName}/AWSLogs/${AWS::AccountId}/Config/*']
                  - !If [CreateS3Bucket, !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/${AWS::AccountId}/*', !Sub 'arn:aws:s3:::${ConfigBucketName}/AWSLogs/${AWS::AccountId}/*']
                  - !If [CreateS3Bucket, !Sub 'arn:aws:s3:::${ConfigBucket}/AWSLogs/*', !Sub 'arn:aws:s3:::${ConfigBucketName}/AWSLogs/*']
                Condition:
                  StringEquals:
                    's3:x-amz-acl': 'bucket-owner-full-control'
              - Effect: Allow
                Action:
                  - s3:GetBucketAcl
                Resource: !If [CreateS3Bucket, !Sub 'arn:aws:s3:::${ConfigBucket}', !Sub 'arn:aws:s3:::${ConfigBucketName}']
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ConfigSNSTopic

  # AWS Config Recorder
  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: !Sub 'ConfigRecorder-${AWS::StackName}'
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: !If [IncludeGlobalResources, true, false]
      RoleARN: !GetAtt ConfigServiceRole.Arn

  # AWS Config Delivery Channel
  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      Name: !Sub 'ConfigDeliveryChannel-${AWS::StackName}'
      S3BucketName: !If [CreateS3Bucket, !Ref ConfigBucket, !Ref ConfigBucketName]
      S3KeyPrefix: 'AWSLogs'
      SnsTopicARN: !Ref ConfigSNSTopic
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency

  # IAM Role for Lambda function
  ConfigStartRecordingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'ConfigStartRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If [UsePermissionBoundary, !Ref PermissionBoundaryARN, !Ref 'AWS::NoValue']
      Policies:
        - PolicyName: ConfigStartRecording
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:StartConfigurationRecorder
                  - config:DescribeConfigurationRecorderStatus
                Resource: '*'

  # Custom Resource to start AWS Config recording
  ConfigStartRecordingFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'ConfigStartFn-${AWS::StackName}'
      Handler: index.handler
      Role: !GetAtt ConfigStartRecordingRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import logging
          import traceback
          import urllib.request

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def send_response(event, context, response_status, response_data):
              response_body = {
                  'Status': response_status,
                  'Reason': f'See details in CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              
              response_body_json = json.dumps(response_body)
              logger.info(f"Response body: {response_body_json}")
              
              headers = {
                  'Content-Type': '',
                  'Content-Length': str(len(response_body_json))
              }
              
              try:
                  req = urllib.request.Request(
                      url=event['ResponseURL'],
                      data=response_body_json.encode('utf-8'),
                      headers=headers,
                      method='PUT'
                  )
                  response = urllib.request.urlopen(req)
                  logger.info(f"Status code: {response.getcode()}")
                  logger.info(f"Status message: {response.msg}")
                  return True
              except Exception as e:
                  logger.error(f"send_response error: {str(e)}")
                  logger.error(traceback.format_exc())
                  return False

          def handler(event, context):
              logger.info('Received event: %s', json.dumps(event))
              
              # Initialize response data
              response_data = {}
              
              try:
                  # Get parameters from the event
                  props = event['ResourceProperties']
                  recorder_name = props.get('RecorderName')
                  
                  if event['RequestType'] in ['Create', 'Update']:
                      # Start AWS Config recording
                      config = boto3.client('config')
                      try:
                          # Start recording
                          config.start_configuration_recorder(
                              ConfigurationRecorderName=recorder_name
                          )
                          logger.info(f"Started configuration recorder {recorder_name}")
                          response_data['Status'] = f"Started configuration recorder {recorder_name}"
                      except Exception as e:
                          logger.error(f"Error starting configuration recorder: {str(e)}")
                          response_data['Error'] = f"Error: {str(e)}"
                  
                  # Send success response
                  send_response(event, context, 'SUCCESS', response_data)
              
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  logger.error(traceback.format_exc())
                  send_response(event, context, 'FAILED', {'Error': str(e)})

  # Custom Resource to start AWS Config recording
  StartConfigRecording:
    Type: Custom::StartConfigRecording
    Properties:
      ServiceToken: !GetAtt ConfigStartRecordingFunction.Arn
      RecorderName: !Sub 'ConfigRecorder-${AWS::StackName}'

Outputs:
  ConfigBucketName:
    Description: Name of the S3 bucket used for AWS Config data
    Value: !If [CreateS3Bucket, !Ref ConfigBucket, !Ref ConfigBucketName]

  ConfigBucketARN:
    Description: ARN of the S3 bucket used for AWS Config data
    Value: !If [CreateS3Bucket, !GetAtt ConfigBucket.Arn, !Sub 'arn:aws:s3:::${ConfigBucketName}']

  ConfigSNSTopicARN:
    Description: ARN of the SNS topic for AWS Config notifications
    Value: !Ref ConfigSNSTopic

  ConfigRecorderName:
    Description: Name of the AWS Config Recorder
    Value: !Ref ConfigRecorder

  DeliveryChannelName:
    Description: Name of the AWS Config Delivery Channel
    Value: !Ref ConfigDeliveryChannel

  RetentionPeriodDays:
    Description: Number of days AWS Config data will be retained
    Value: !Ref RetentionPeriod