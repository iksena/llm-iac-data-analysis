AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdmins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: ServiceRolePass
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
        - PolicyName: ServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Admins
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: ProdFISDeny
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'fis:ResourceTag/Environment': 'prod'
        - PolicyName: ServiceRolePass
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:PassRole'
                Resource: '*'
        - PolicyName: ServiceLinkedRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'iam:CreateServiceLinkedRole'
                Resource: '*'

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: Users
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISUserActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'fis:StartExperiment'
                  - 'fis:StopExperiment'
                  - 'fis:Get*'
                  - 'fis:List*'
                  - 'fis:TagResource'
                  - 'fis:UntagResource'
                Resource: '*'
        - PolicyName: ProdFISDeny
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'fis:ResourceTag/Environment': 'prod'

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUsers
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'ec2.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISDenyAll
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'