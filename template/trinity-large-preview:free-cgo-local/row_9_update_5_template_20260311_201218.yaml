AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_7_DAYS
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      AvailabilityZoneName: us-east-1a
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount target
      VpcId: !Ref VpcId

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EncryptedOneZoneFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: The subnet ID where the mount target will be created
    Default: subnet-12345678
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID where the mount target will be created
    Default: vpc-12345678

Outputs:
  FileSystemId:
    Description: The ID of the created EFS file system
    Value: !Ref EncryptedOneZoneFileSystem
  FileSystemArn:
    Description: The ARN of the created EFS file system
    Value: !GetAtt EncryptedOneZoneFileSystem.Arn