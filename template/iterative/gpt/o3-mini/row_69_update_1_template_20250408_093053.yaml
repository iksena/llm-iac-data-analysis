AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template creating a VPC, a Security Group, an S3 Bucket, and a DynamoDB Table with deletion protection enabled.

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security Group for ProductionVPC"
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: ProductionSecurityGroup

  MyS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: ProductionBucket

  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ProductionTable
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      Tags:
        - Key: Name
          Value: ProductionDynamoDBTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  VPCId:
    Description: "The VPC ID"
    Value: !Ref MyVPC
  SecurityGroupId:
    Description: "The Security Group ID"
    Value: !Ref MySecurityGroup
  S3BucketName:
    Description: "The S3 Bucket Name"
    Value: !Ref MyS3Bucket
  DynamoDBTableARN:
    Description: "The ARN of the DynamoDB Table"
    Value: !GetAtt MyDynamoDBTable.Arn