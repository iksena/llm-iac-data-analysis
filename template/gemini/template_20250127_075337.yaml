

AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a basic SQS queue.
Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyBasicQueue
Outputs:
  QueueArn:
    Value: !GetAtt MySQSQueue.Arn
    Description: The ARN of the created SQS queue
    Export:
      Name: MySQSQueueArn
