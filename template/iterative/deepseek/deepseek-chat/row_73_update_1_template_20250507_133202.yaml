AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with Fargate and Fargate Spot capacity providers'

Parameters:
  ClusterName:
    Type: String
    Description: Name of the ECS Cluster
    Default: 'FargateCluster'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the ECS cluster will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for the ECS cluster

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 3

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FARGATE
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 10000
        ManagedTerminationProtection: ENABLED

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FARGATE_SPOT
      AutoScalingGroupProvider:
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
          MinimumScalingStepSize: 1
          MaximumScalingStepSize: 10000
        ManagedTerminationProtection: ENABLED

  ClusterCapacityProviderAssociation:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      Cluster: !Ref ECSCluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 3

Outputs:
  ECSClusterName:
    Description: 'Name of the ECS Cluster'
    Value: !Ref ECSCluster
  ECSClusterArn:
    Description: 'ARN of the ECS Cluster'
    Value: !GetAtt ECSCluster.Arn