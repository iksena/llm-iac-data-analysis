AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an AWS EC2 IPAM with exported identifiers for cross-stack references

Resources:
  IPAMResource:
    Type: AWS::EC2::IPAM
    Properties:
      OperatingRegions:
        - RegionName: !Ref AWS::Region

Outputs:
  IPAMArn:
    Description: ARN of the IPAM resource
    Value: !GetAtt IPAMResource.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMArn'
  IPAMId:
    Description: ID of the IPAM resource
    Value: !Ref IPAMResource
    Export:
      Name: !Sub '${AWS::StackName}-IPAMId'
  DefaultPublicScopeId:
    Description: Default Public Scope ID for public IP allocations
    Value: !GetAtt IPAMResource.DefaultPublicScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPublicScopeId'
  DefaultPrivateScopeId:
    Description: Default Private Scope ID for private IP allocations
    Value: !GetAtt IPAMResource.DefaultPrivateScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPrivateScopeId'