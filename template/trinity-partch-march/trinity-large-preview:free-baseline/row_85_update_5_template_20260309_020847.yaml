AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure and cost-optimized S3 bucket for CloudWatch export data with configurable versioning and automated lifecycle management'

Parameters:
  VersioningEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable versioning for the S3 bucket
  LifecycleEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable lifecycle management for the S3 bucket
  NoncurrentVersionExpirationInDays:
    Type: Number
    Default: 365
    Description: Number of days before noncurrent versions expire
  AccessLoggingEnabled:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable access logging for the S3 bucket
  AccessLoggingTargetBucket:
    Type: String
    Default: ''
    Description: Target bucket for access logs (required if AccessLoggingEnabled is true)

Resources:
  CloudWatchExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cloudwatch-exports-${AWS::AccountId}'
      VersioningConfiguration:
        Status: !If [VersioningEnabled, 'Enabled', 'Suspended']
      LifecycleConfiguration:
        Rules:
          - Id: NoncurrentVersionExpiration
            Status: !If [LifecycleEnabled, 'Enabled', 'Disabled']
            NoncurrentVersionExpirationInDays: !Ref NoncurrentVersionExpirationInDays
          - Id: TransitionToGlacier
            Status: !If [LifecycleEnabled, 'Enabled', 'Disabled']
            Transition:
              Days: 30
              StorageClass: GLACIER
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LoggingConfiguration:
        !If
        - AccessLoggingEnabled
        - DestinationBucketName: !Ref AccessLoggingTargetBucket
          LogFilePrefix: cloudwatch-exports/
        - !Ref AWS::NoValue

  CloudWatchExportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${CloudWatchExportBucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${CloudWatchExportBucket}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${CloudWatchExportBucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${CloudWatchExportBucket}/*'

Outputs:
  BucketName:
    Description: The name of the CloudWatch export S3 bucket
    Value: !Ref CloudWatchExportBucket
  BucketArn:
    Description: The ARN of the CloudWatch export S3 bucket
    Value: !GetAtt CloudWatchExportBucket.Arn