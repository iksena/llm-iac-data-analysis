AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API for automated product creation

Parameters:
  StripeApiKey:
    Type: String
    Default: "sk_test_dummykey123"
    Description: "Stripe API key for authentication"
    
  EventBusName:
    Type: String
    Default: "PartnerAppBus"
    Description: "Name for the custom EventBridge bus"
    
  ApiDestinationName:
    Type: String
    Default: "StripeProductsApi"
    Description: "Name for the Stripe API destination"
    
  ConnectionName:
    Type: String
    Default: "StripeConnection"
    Description: "Name for the EventBridge connection"

Resources:
  StripeApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: StripeApiKey
      Description: Stripe API key for EventBridge integration
      SecretString: !Ref StripeApiKey
      
  EventBridgeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeStripeExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeInvocationPolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !GetAtt StripeApiSecret.Arn

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Ref ConnectionName
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyName: Authorization
        ApiKeyValue: !Ref StripeApiKey

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Ref ApiDestinationName
      ConnectionArn: !GetAtt StripeConnection.Arn
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref PartnerAppEventBus
      Description: Route PartnerApp events to Stripe API
      EventPattern:
        source:
          - "PartnerApp"
        detail-type:
          - "PartnerAppDetailType"
      Targets:
        - Arn: !GetAtt StripeApiDestination.Arn
          Id: StripeProductTarget

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge bus
    Value: !Ref PartnerAppEventBus
    
  ApiDestinationArn:
    Description: ARN of the Stripe API destination
    Value: !GetAtt StripeApiDestination.Arn
    
  ConnectionArn:
    Description: ARN of the EventBridge connection
    Value: !GetAtt StripeConnection.Arn