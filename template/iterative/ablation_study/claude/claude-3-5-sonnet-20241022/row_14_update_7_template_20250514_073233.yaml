AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an ENI with multiple EIPs and secondary private IPs including VPC infrastructure'

Parameters:
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'CIDR block for the VPC'

  SubnetCidr:
    Type: String
    Default: '10.0.1.0/24'
    Description: 'CIDR block for the subnet'

  PrimaryPrivateIP:
    Type: String
    Description: 'Primary private IP address for the ENI'
    Default: '10.0.1.10'
  
  SecondaryPrivateIP:
    Type: String
    Description: 'Secondary private IP address for the ENI'
    Default: '10.0.1.11'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ENI-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ENI-IGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ENI-Subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ENI-RouteTable

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for ENI'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: ENI-SecurityGroup

  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet
      Description: 'Network Interface with multiple IPs'
      GroupSet: 
        - !Ref SecurityGroup
      PrivateIpAddresses:
        - Primary: true
          PrivateIpAddress: !Ref PrimaryPrivateIP
        - Primary: false
          PrivateIpAddress: !Ref SecondaryPrivateIP
      Tags:
        - Key: Name
          Value: Multi-IP ENI

  FirstEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Primary-EIP

  SecondEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: Secondary-EIP

  FirstEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt FirstEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref PrimaryPrivateIP

  SecondEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt SecondEIP.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
      PrivateIpAddress: !Ref SecondaryPrivateIP

Outputs:
  VpcId:
    Description: 'ID of the created VPC'
    Value: !Ref VPC

  SubnetId:
    Description: 'ID of the created Subnet'
    Value: !Ref Subnet

  SecurityGroupId:
    Description: 'ID of the created Security Group'
    Value: !Ref SecurityGroup

  NetworkInterfaceId:
    Description: 'ID of the created Network Interface'
    Value: !Ref NetworkInterface

  PrimaryPrivateIPAddress:
    Description: 'Primary Private IP of the ENI'
    Value: !Ref PrimaryPrivateIP

  SecondaryPrivateIPAddress:
    Description: 'Secondary Private IP of the ENI'
    Value: !Ref SecondaryPrivateIP

  FirstPublicIP:
    Description: 'First Elastic IP Address'
    Value: !Ref FirstEIP

  SecondPublicIP:
    Description: 'Second Elastic IP Address'
    Value: !Ref SecondEIP