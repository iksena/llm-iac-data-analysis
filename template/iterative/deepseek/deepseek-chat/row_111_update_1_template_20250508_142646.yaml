AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EventBridge integration with DataDog for log forwarding

Parameters:
  DataDogAPIKey:
    Type: String
    Description: DataDog API key for authentication
    NoEcho: true
  EventSource:
    Type: String
    Description: Source identifier for the events
    Default: MyDataDogApp
  DataDogEndpoint:
    Type: String
    Description: DataDog log ingestion endpoint
    Default: https://http-intake.logs.datadoghq.com

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub DataDogEventBus-${AWS::StackName}

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub DataDogDeadLetterQueue-${AWS::StackName}
      MessageRetentionPeriod: 1209600 # 14 days in seconds
      KmsMasterKeyId: alias/aws/sqs

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAPIDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:api-destination/DataDogLogDestination/*

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub DataDogConnection-${AWS::StackName}
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: !Ref DataDogAPIKey

  DataDogAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub DataDogAPIDestination-${AWS::StackName}
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref DataDogEndpoint
      InvocationRateLimitPerSecond: 100

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub DataDogForwardingRule-${AWS::StackName}
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref EventSource
      Targets:
        - Arn: !GetAtt DataDogAPIDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Id: DataDogAPIDestinationTarget
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: !Ref EventBus
  APIDestinationARN:
    Description: ARN of the API Destination
    Value: !GetAtt DataDogAPIDestination.Arn
  DeadLetterQueueURL:
    Description: URL of the dead-letter queue
    Value: !Ref DeadLetterQueue