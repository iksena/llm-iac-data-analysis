AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the database cluster
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two public subnets for multi-AZ deployment
  DBName:
    Type: String
    Default: mydatabase
    Description: Initial database name
  MasterUsername:
    Type: String
    Default: admin
    Description: Database admin username
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Database admin password
  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues: [db.t3.medium, db.t3.large, db.r5.large]
    Description: DB instance class type

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt RDSSecurityGroup.GroupId
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      ScalingConfiguration:
        MinCapacity: 2
        MaxCapacity: 2

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      PubliclyAccessible: true

Outputs:
  ClusterEndpoint:
    Value: !GetAtt DBCluster.Endpoint.Address
  ReaderEndpoint:
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  DBInstance1Endpoint:
    Value: !GetAtt DBInstance1.Endpoint.Address
  DBInstance2Endpoint:
    Value: !GetAtt DBInstance2.Endpoint.Address
  SecurityGroupId:
    Value: !Ref RDSSecurityGroup
  DBSubnetGroupName:
    Value: !Ref DBSubnetGroup