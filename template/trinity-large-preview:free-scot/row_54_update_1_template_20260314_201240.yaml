AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alert Topic
      KmsMasterKeyId: alias/aws/sns
      FifoTopic: false

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - SNS:Publish
            Resource: !Ref MyTopic
          - Effect: Allow
            Principal: '*'
            Action:
              - SNS:Subscribe
            Resource: !Ref MyTopic
      Topics:
        - !Ref MyTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: admin@example.com
      Protocol: email
      TopicArn: !Ref MyTopic

Outputs:
  TopicArn:
    Value: !Ref MyTopic
  TopicName:
    Value: !GetAtt MyTopic.TopicName