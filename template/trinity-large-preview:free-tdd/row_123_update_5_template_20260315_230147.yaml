AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API

Parameters:
  StripeApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Description: Stripe API key stored in SSM Parameter Store
    Default: /stripe/api-key

Resources:
  PartnerAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerApp

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: Authorization
        ApiKeyValue: !Ref StripeApiKey

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductsApi
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      ConnectionArn: !GetAtt StripeConnection.Arn

Outputs:
  EventBusName:
    Description: Name of the EventBridge event bus
    Value: PartnerApp
    Export:
      Name: PartnerAppEventBusName