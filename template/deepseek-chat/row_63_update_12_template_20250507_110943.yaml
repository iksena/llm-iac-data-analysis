AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for Amazon Aurora MySQL cluster with CloudWatch Logs integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the Aurora cluster will be deployed (must exist in your account)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for the Aurora cluster (minimum 2 across AZs, must exist in your account)

  DBClusterIdentifier:
    Type: String
    Description: Identifier for the Aurora cluster
    Default: aurora-mysql-cluster
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9-]*$'
    ConstraintDescription: Must start with a letter and contain only alphanumeric characters and hyphens
    MaxLength: 63

  DBName:
    Type: String
    Description: Name of the initial database
    Default: appdb
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: Must start with a letter and contain only alphanumeric characters and underscores
    MaxLength: 64

  MasterUsername:
    Type: String
    Description: Master username for the database
    Default: admin
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9]*$'
    ConstraintDescription: Must start with a letter and contain only alphanumeric characters
    MaxLength: 16

  SecretsManagerSecretName:
    Type: String
    Description: Name of the Secrets Manager secret containing the database password
    Default: MyAuroraSecret
    AllowedPattern: '^[a-zA-Z0-9/_+=.@-]+$'
    ConstraintDescription: Must be a valid Secrets Manager secret name

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora MySQL cluster
      SubnetIds: !Ref SubnetIds

  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

  LogExportRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      Policies:
        - PolicyName: CloudWatchLogsExport
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: arn:aws:logs:*:*:log-group:/aws/rds/instance/*

  AuroraMySQLCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.11.2'
      DBClusterIdentifier: !Ref DBClusterIdentifier
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${SecretsManagerSecretName}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      EnableCloudwatchLogsExports:
        - error
      EngineMode: provisioned
      Port: 3306
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DeletionProtection: false
      VpcSecurityGroupIds:
        - !GetAtt ClusterSecurityGroup.GroupId
      AssociatedRoles:
        - RoleArn: !GetAtt LogExportRole.Arn
      Tags:
        - Key: Name
          Value: !Ref DBClusterIdentifier

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraMySQLCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance1'
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: !Sub '${DBClusterIdentifier}-instance1'

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraMySQLCluster
      PubliclyAccessible: true
      DBInstanceIdentifier: !Sub '${DBClusterIdentifier}-instance2'
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: !Sub '${DBClusterIdentifier}-instance2'

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint for the Aurora MySQL cluster
    Value: !GetAtt AuroraMySQLCluster.Endpoint.Address

  ReaderEndpoint:
    Description: Reader endpoint for the Aurora MySQL cluster
    Value: !GetAtt AuroraMySQLCluster.ReadEndpoint.Address

  Instance1Endpoint:
    Description: Endpoint for the first DB instance
    Value: !GetAtt AuroraInstance1.Endpoint.Address

  Instance2Endpoint:
    Description: Endpoint for the second DB instance
    Value: !GetAtt AuroraInstance2.Endpoint.Address

  SecurityGroupId:
    Description: Security Group ID for the Aurora cluster
    Value: !Ref ClusterSecurityGroup