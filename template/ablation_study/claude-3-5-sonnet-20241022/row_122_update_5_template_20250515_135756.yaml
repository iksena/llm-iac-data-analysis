AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyApiKey:
    Type: String
    NoEcho: true
    Description: 'Shopify Admin API Key for authentication'
  
  ShopifyDomain:
    Type: String
    Default: 'testanu.myshopify.com'
    Description: 'Your myshopify domain'

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-shopify-event-bus'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeInvokeAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                  - events:InvokeConnection
                Resource: '*'

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyApiKey
      Name: !Sub '${AWS::StackName}-shopify-connection'
      Description: 'Connection for Shopify API authentication'

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://${ShopifyDomain}/admin/api/2023-07/products.json'
      Name: !Sub '${AWS::StackName}-shopify-api-destination'
      InvocationRateLimitPerSecond: 5
      Description: 'API Destination for Shopify Product Creation'

  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - 'MyShopifyApp'
        detail-type:
          - 'ProductCreation'
      Name: !Sub '${AWS::StackName}-shopify-product-rule'
      State: ENABLED
      Targets:
        - Id: ShopifyProductTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 86400
            MaximumRetryAttempts: 3
          InputTransformer:
            InputPathsMap:
              productTitle: "$.detail.title"
              productDescription: "$.detail.description"
              productType: "$.detail.type"
            InputTemplate: |
              {
                "product": {
                  "title": <productTitle>,
                  "body_html": <productDescription>,
                  "product_type": <productType>
                }
              }

Outputs:
  EventBusArn:
    Description: 'ARN of the Shopify Event Bus'
    Value: !GetAtt ShopifyEventBus.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBusArn'

  ApiDestinationArn:
    Description: 'ARN of the Shopify API Destination'
    Value: !GetAtt ShopifyApiDestination.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ApiDestinationArn'

  ConnectionArn:
    Description: 'ARN of the Shopify Connection'
    Value: !GetAtt ShopifyConnection.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ConnectionArn'

  EventRuleArn:
    Description: 'ARN of the Event Rule'
    Value: !GetAtt ShopifyEventRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventRuleArn'