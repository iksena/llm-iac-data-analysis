AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Default Contact"
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
  BusinessContactPhone:
    Type: String
    Default: "+1234567890"
  EDIProfileName:
    Type: String
    Default: "DefaultEDIProfile"

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "edi-input-bucket"

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:PutObject"
            Resource: !Sub "arn:aws:s3:::${InputBucket}/*"

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: "edi-output-bucket"

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
            Resource: !Sub "arn:aws:s3:::${OutputBucket}/*"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: "lambda.amazonaws.com"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"

  EDILambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: "index.handler"
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          def handler(event, context):
            s3 = boto3.client('s3')
            for record in event['Records']:
              bucket = record['s3']['bucket']['name']
              key = record['s3']['object']['key']
              edi_file = s3.get_object(Bucket=bucket, Key=key)
              edi_content = edi_file['Body'].read().decode('utf-8')
              # Transform EDI X12_214 to JSON logic here
              json_data = {"transformed": "data"}
              output_key = key.replace('.edi', '.json')
              s3.put_object(Bucket='edi-output-bucket', Key=output_key, Body=json.dumps(json_data))
            return {'statusCode': 200, 'body': 'Transformation complete'}
      Runtime: "python3.12"
      Timeout: 30

  InputBucketTrigger:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !GetAtt EDILambdaFunction.Arn
      Principal: "s3.amazonaws.com"
      SourceArn: !Sub "arn:aws:s3:::${InputBucket}"
      SourceAccount: !Ref "AWS::AccountId"

  InputBucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref InputBucket
      LambdaFunctionConfigurations:
        - Event: "s3:ObjectCreated:*"
          Filter:
            S3Key:
              Rules:
                - Name: "suffix"
                  Value: ".edi"
          Function: !GetAtt EDILambdaFunction.Arn

Outputs:
  InputBucketName:
    Description: Input S3 Bucket Name
    Value: !Ref InputBucket
  OutputBucketName:
    Description: Output S3 Bucket Name
    Value: !Ref OutputBucket