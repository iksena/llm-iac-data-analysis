AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with IAM Role, S3 Bucket, and EMR Serverless Application

Parameters:
  EMRApplicationName:
    Type: String
    Default: "EMRServerlessApp"
    Description: Name of the EMR Serverless Application
  S3BucketName:
    Type: String
    Default: "emr-serverless-scripts-data"
    Description: Name of the S3 bucket for storing scripts and data
  EMRRuntime:
    Type: String
    Default: "emr-6.15.0"
    AllowedValues:
      - "emr-6.15.0"
      - "emr-6.14.0"
    Description: EMR Runtime version

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "emr-serverless.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonS3FullAccess"
        - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"

  ScriptsDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ScriptsDataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "emr-serverless.amazonaws.com"
            Action:
              - "s3:GetObject"
            Resource:
              - !Sub "arn:aws:s3:::${ScriptsDataBucket}/*"

  EMRServerlessApp:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref EMRApplicationName
      ReleaseLabel: !Ref EMRRuntime
      Type: "Spark"
      Architecture: "x86_64"
      AutoStart: true
      AutoStop: true
      InitialCapacity:
        - WorkerCount: 1
          WorkerType: "Spark"
      NetworkConfiguration:
        Subnets:
          - !Ref DefaultSubnet
      ArchitectureConfiguration:
        - Architecture: "x86_64"
      MaximumCapacity:
        - Unit: "vCPU"
          Value: 16
      MaximumExecutorsPerJob: 10
      MaximumRetries: 3
      MaximumTimeout: 3600
      MaximumJobDuration: 3600
      MaximumJobSize: 1024
      MaximumJobMemory: 16384
      MaximumJobStorage: 1024
      MaximumJobNetwork: 1024
      MaximumJobCPU: 16
      MaximumJobGPU: 0
      MaximumJobRAM: 16384
      MaximumJobDisk: 1024
      MaximumJobNetwork: 1024
      MaximumJobCPU: 16
