AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready S3 bucket for Lambda artifacts with customer-managed KMS encryption'

Parameters:
  S3BucketName:
    Type: String
    Description: Name for the S3 bucket (must be globally unique)
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9][a-z0-9\.\-]{1,61}[a-z0-9]$'
    ConstraintDescription: >-
      Bucket name must be 3-63 characters long, start and end with a letter or number,
      and contain only lowercase letters, numbers, periods, and hyphens

  KmsKeyAlias:
    Type: String
    Default: alias/lambda-artifacts-kms
    Description: Alias name for the KMS key (must start with 'alias/')
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^alias/[a-zA-Z0-9:/_-]{1,253}$'
    ConstraintDescription: >-
      Alias must start with 'alias/' followed by 1-253 alphanumeric characters,
      hyphens, underscores, slashes, or colons

  ServiceRoleArn:
    Type: String
    Description: ARN of the service role requiring KMS key access (optional)
    Default: ''
    MinLength: 0
    MaxLength: 2048
    AllowedPattern: '^$|^arn:aws:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]{1,64}$'
    ConstraintDescription: Must be a valid IAM role ARN or empty

  Region:
    Type: String
    Default: !Ref 'AWS::Region'
    Description: AWS Region for resource creation (prevents cross-region issues)

Resources:
  ArtifactKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Customer-managed key for encrypting Lambda deployment artifacts
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRootAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowServiceRoleUsage
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'false'
            Effect: Allow
            Principal:
              AWS: !Ref ServiceRoleArn
            Action:
              - kms:Decrypt
              - kms:Encrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                'kms:CallerAccount': !Ref 'AWS::AccountId'
          - Sid: AllowS3ServiceAccess
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                'kms:EncryptionContext:aws:s3:arn': !Sub "arn:aws:s3:::${S3BucketName}"

  ArtifactKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref KmsKeyAlias
      TargetKeyId: !Ref ArtifactKmsKey

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt ArtifactKmsKey.Arn

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadAccess
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt ArtifactBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BucketArn"

  KmsKeyId:
    Description: ID of the KMS encryption key
    Value: !Ref ArtifactKmsKey
    Export:
      Name: !Sub "${AWS::StackName}-KeyId"

  KmsKeyArn:
    Description: ARN of the KMS encryption key
    Value: !GetAtt ArtifactKmsKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KeyArn"

  KmsKeyAlias:
    Description: Alias for simplified KMS key reference
    Value: !Ref KmsKeyAlias
    Export:
      Name: !Sub "${AWS::StackName}-KeyAlias"