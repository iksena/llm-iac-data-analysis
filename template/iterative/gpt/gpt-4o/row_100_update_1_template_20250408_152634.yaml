AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a standardized IAM baseline with secure, role-based access controls and cross-account trust configurations.

Parameters:
  IdentityManagementAccountId:
    Type: String
    Description: The AWS Account ID for the Identity Management Account.
  ToolingManagementAccountId:
    Type: String
    Description: The AWS Account ID for the Tooling Management Account.

Resources:
  PrivilegedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

  RestrictedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ec2:Describe*
              - s3:ListBucket
            Resource: '*'
          - Effect: Deny
            Action:
              - billing:*
              - cloudhsm:*
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:ListUsers
            Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Ref IdentityManagementAccountId
                - !Ref ToolingManagementAccountId
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Ref: PrivilegedAdminPolicy

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Ref IdentityManagementAccountId
                - !Ref ToolingManagementAccountId
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Ref: RestrictedAdminPolicy

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Ref IdentityManagementAccountId
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IdentityAdminPolicy
          PolicyDocument:
            Ref: IdentityAdminPolicy

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                Resource: '*'

Outputs:
  PrivilegedAdminRoleArn:
    Description: The ARN of the Privileged Admin Role
    Value: !GetAtt PrivilegedAdminRole.Arn

  RestrictedAdminRoleArn:
    Description: The ARN of the Restricted Admin Role
    Value: !GetAtt RestrictedAdminRole.Arn

  IdentityAdminRoleArn:
    Description: The ARN of the Identity Admin Role
    Value: !GetAtt IdentityAdminRole.Arn

  CloudFormationExecutionRoleArn:
    Description: The ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn