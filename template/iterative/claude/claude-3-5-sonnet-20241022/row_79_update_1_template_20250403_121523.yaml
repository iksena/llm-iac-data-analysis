AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates IAM managed policies for S3 access and protection policies for DynamoDB and RDS'

Resources:
  S3AccessPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: 'S3AccessPolicy-iOSApp'
      Description: 'Grants iOS application read/write access to specific S3 bucket'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org'
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org/*'

  DynamoDBProtectionPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: 'DynamoDBProtectionPolicy'
      Description: 'Explicitly denies destructive DynamoDB operations'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:DeleteBackup
              - dynamodb:DeleteGlobalTable
            Resource: 'arn:aws:dynamodb:*:*:table/*'

  RDSProtectionPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      ManagedPolicyName: 'RDSProtectionPolicy'
      Description: 'Blocks destructive RDS operations'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteDBParameterGroup
              - rds:DeleteDBSecurityGroup
              - rds:DeleteDBSubnetGroup
            Resource: '*'

Outputs:
  S3AccessPolicyArn:
    Description: 'ARN of S3 Access Policy'
    Value: !Ref S3AccessPolicy
  DynamoDBProtectionPolicyArn:
    Description: 'ARN of DynamoDB Protection Policy'
    Value: !Ref DynamoDBProtectionPolicy
  RDSProtectionPolicyArn:
    Description: 'ARN of RDS Protection Policy'
    Value: !Ref RDSProtectionPolicy