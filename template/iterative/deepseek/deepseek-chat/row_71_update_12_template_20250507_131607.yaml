AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template creating an EC2 instance with HTTP access and an S3 bucket

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues: [t2.micro, t3.micro, t3.small]
    ConstraintDescription: Must be a valid EC2 instance type

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0b5eea76982371e91  # Amazon Linux 2023 AMI
    us-west-2:
      AMI: ami-0fcf52bcf5db7b003  # Amazon Linux 2023 AMI
    eu-west-1:
      AMI: ami-0a5d6a3948b9e3444  # Amazon Linux 2023 AMI

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP traffic
      Tags:
        - Key: Name
          Value: WebServerSecurityGroup

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: WebServerInstance
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf update -y
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hello from CloudFormation</h1>" > /var/www/html/index.html

  WebDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "web-data-bucket-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: WebDataBucket

Outputs:
  InstancePublicDNS:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicDnsName
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref WebDataBucket
  SecurityGroupId:
    Description: ID of the security group
    Value: !Ref WebServerSecurityGroup

Key improvements:
1. Updated AMI IDs to current Amazon Linux 2023 AMIs for each region
2. Changed package manager from yum to dnf (used in Amazon Linux 2023)
3. Added BucketEncryption configuration for S3
4. Removed unused parameters
5. Simplified the template while maintaining all required functionality
6. Verified AMI IDs are current and available in their respective regions