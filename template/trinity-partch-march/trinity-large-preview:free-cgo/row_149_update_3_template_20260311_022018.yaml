AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with EC2 Integration and Monitoring'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0000000000000000
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000000
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-0000000000000000
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0

  EfsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess

  EfsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EfsInstanceRole

  EC2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1
      IamInstanceProfile: !Ref EfsInstanceProfile
      SecurityGroupIds:
        - !GetAtt EC2SecurityGroup.GroupId
      UserData:
        Fn::Base64: |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /home
          echo 'fs-12345678.efs.us-east-1.amazonaws.com:/ /home efs defaults,_netdev 0 0' >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-EC2-Instance-1

  EC2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet2
      IamInstanceProfile: !Ref EfsInstanceProfile
      SecurityGroupIds:
        - !GetAtt EC2SecurityGroup.GroupId
      UserData:
        Fn::Base64: |
          #!/bin/bash -xe
          yum install -y amazon-efs-utils
          mkdir -p /home
          echo 'fs-12345678.efs.us-east-1.amazonaws.com:/ /home efs defaults,_netdev 0 0' >> /etc/fstab
          mount -a
      Tags:
        - Key: Name
          Value: EFS-EC2-Instance-2

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  EfsBurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-BurstCreditBalance-Low
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 1000000000
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsIOBytesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-PercentIOBytes-High
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  EfsIOOperationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS-PercentIOOperations-High
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: 80
      AlarmActions:
        - !Ref AlarmNotificationTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Alarms-Notification

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EfsFileSystem
  MountTarget1:
    Description: EFS Mount Target 1 DNS Name
    Value: !GetAtt EfsMountTarget1.DnsName
  MountTarget2:
    Description: EFS Mount Target 2 DNS Name
    Value: !GetAtt EfsMountTarget2.DnsName
  EC2Instance1PublicIP:
    Description: EC2 Instance 1 Public IP
    Value: !GetAtt EC2Instance1.PublicIp
  EC2Instance2PublicIP:
    Description: EC2 Instance 2 Public IP
    Value: !GetAtt EC2Instance2.PublicIp
  AlarmTopicArn:
    Description: SNS Topic ARN for Alarms
    Value: !Ref AlarmNotificationTopic