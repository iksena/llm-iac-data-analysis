AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with SSM-driven Nginx Installation and Centralized Logging

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  NginxInstallTag:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Tag value to trigger Nginx installation via SSM

Resources:
  NginxLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Versioning:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 30

  NginxLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref NginxLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EC2InstanceRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${NginxLogsBucket}/*'

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3AccessForLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${NginxLogsBucket}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      Monitoring: true
      Tags:
        - Key: Name
          Value: NginxSSMInstance
        - Key: NginxInstall
          Value: !Ref NginxInstallTag
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  NginxSSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-ConfigureSsmAgent
      DocumentVersion: '1.0'
      Targets:
        - Key: tag:NginxInstall
          Values:
            - !Ref NginxInstallTag
      Parameters:
        sourceBucketName:
          - !Ref NginxLogsBucket
      ScheduleExpression: 'rate(1 hour)'
      AutomationTargetParameterName: InstanceIds
      MaxConcurrency: '100%'
      MaxErrors: '1'

  NginxInstallDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      Content:
        schemaVersion: '0.3'
        assumeRole: !GetAtt EC2InstanceRole.Arn
        description: Install and configure Nginx
        parameters:
          sourceBucketName:
            type: String
            description: S3 bucket for logs
        mainSteps:
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - yum install -y nginx
                - systemctl start nginx
                - systemctl enable nginx
                - echo "Nginx installed and started" > /var/log/nginx/install.log
                - aws s3 cp /var/log/nginx/install.log s3://${sourceBucketName}/nginx-install.log

  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if CPU exceeds 80% for 10 minutes
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      AlarmActions:
        - !Ref SNSTopic

  DiskSpaceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if disk space is less than 10% for 15 minutes
      Namespace: System/Linux
      MetricName: DiskSpaceUtilization
      Statistic: Average
      Period: 900
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      AlarmActions:
        - !Ref SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EC2NginxAlarms

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: admin@example.com
      Protocol: email
      TopicArn: !Ref SNSTopic

Outputs:
  InstanceURL:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstanceIP:
    Description: Public IP of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp
  LogsBucket:
    Description: S3 bucket for Nginx logs
    Value: !Ref NginxLogsBucket