AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Kinesis Data Stream with throughput alarms

Parameters:
  StreamName:
    Type: String
    Default: kinesis-stream
    Description: Name of the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours
  ReadThroughputAlarmThreshold:
    Type: Number
    Default: 1000
    Description: Read throughput alarm threshold (in megabytes)
  WriteThroughputAlarmThreshold:
    Type: Number
    Default: 1000
    Description: Write throughput alarm threshold (in megabytes)

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-ReadThroughputExceeded"
      AlarmDescription: Alarm when read throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: ReadProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref ReadThroughputAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${StreamName}-WriteThroughputExceeded"
      AlarmDescription: Alarm when write throughput exceeds threshold
      Namespace: AWS/Kinesis
      MetricName: WriteProvisionedThroughputExceeded
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref WriteThroughputAlarmThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisStreamAlarms
      TopicName: KinesisStreamAlarms

Outputs:
  StreamARN:
    Description: Kinesis Data Stream ARN
    Value: !GetAtt KinesisStream.Arn
  StreamName:
    Description: Kinesis Data Stream Name
    Value: !Ref KinesisStream