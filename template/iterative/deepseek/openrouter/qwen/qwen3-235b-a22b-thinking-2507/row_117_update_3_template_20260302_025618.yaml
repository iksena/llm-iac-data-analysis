AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven integration between DynamoDB streams and EventBridge for real-time order processing'
Parameters:
  DynamoDBTableName:
    Type: String
    Default: 'Orders'
    Description: 'Name of the DynamoDB table for order data'
    MinLength: 3
    MaxLength: 255
  PartitionKeyName:
    Type: String
    Default: 'OrderId'
    Description: 'Partition key name for the DynamoDB table'
  PartitionKeyType:
    Type: String
    Default: 'S'
    AllowedValues:
      - 'S'
      - 'N'
      - 'B'
    Description: 'Data type for the partition key (S=String, N=Number, B=Binary)'
  StreamViewType:
    Type: String
    Default: 'NEW_AND_OLD_IMAGES'
    AllowedValues:
      - 'KEYS_ONLY'
      - 'NEW_IMAGE'
      - 'OLD_IMAGE'
      - 'NEW_AND_OLD_IMAGES'
    Description: 'Stream view type determining what data is written to the stream'
  EventBusName:
    Type: String
    Default: 'CentralEventBus'
    Description: 'Name of the custom EventBridge event bus'
    MinLength: 1
    MaxLength: 255
  InsertPipeName:
    Type: String
    Default: 'DynamoDBInsertPipe'
    Description: 'Name for the INSERT events EventBridge Pipe'
  ModifyPipeName:
    Type: String
    Default: 'DynamoDBModifyPipe'
    Description: 'Name for the MODIFY events EventBridge Pipe'
Resources:
  OrdersDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKeyName
          AttributeType: !Ref PartitionKeyType
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: !Ref StreamViewType
  CentralEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
  PipesExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBToEventBridgePipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersDynamoDBTable.StreamArn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt CentralEventBus.Arn
  DynamoDBInsertPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref InsertPipeName
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt OrdersDynamoDBTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
      FilterCriteria:
        Filters:
          - Pattern: '{"detail": {"eventName": ["INSERT"]}}'
  DynamoDBModifyPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref ModifyPipeName
      RoleArn: !GetAtt PipesExecutionRole.Arn
      Source: !GetAtt OrdersDynamoDBTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
      FilterCriteria:
        Filters:
          - Pattern: '{"detail": {"eventName": ["MODIFY"]}}'
Outputs:
  DynamoDBTableName:
    Description: 'Name of the DynamoDB table'
    Value: !Ref DynamoDBTableName
  EventBusName:
    Description: 'Name of the EventBridge event bus'
    Value: !Ref EventBusName
  InsertPipeArn:
    Description: 'ARN of the INSERT events EventBridge Pipe'
    Value: !GetAtt DynamoDBInsertPipe.Arn
  ModifyPipeArn:
    Description: 'ARN of the MODIFY events EventBridge Pipe'
    Value: !GetAtt DynamoDBModifyPipe.Arn