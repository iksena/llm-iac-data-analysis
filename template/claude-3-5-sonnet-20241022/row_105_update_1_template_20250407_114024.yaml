AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for Cross-Service Automation Workflows including SSM, EC2, and Monitoring'

Resources:
  AutomationServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-automation-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
                - ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMFullAccess'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      
  AutomationEC2Policy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${AWS::StackName}-ec2-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ec2:DescribeInstances'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
              - 'ec2:DescribeInstanceStatus'
            Resource: '*'
      Roles:
        - !Ref AutomationServiceRole

  AutomationMonitoringPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${AWS::StackName}-monitoring-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudwatch:PutMetricData'
              - 'cloudwatch:GetMetricStatistics'
              - 'cloudwatch:ListMetrics'
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogStreams'
            Resource: '*'
      Roles:
        - !Ref AutomationServiceRole

Outputs:
  AutomationRoleARN:
    Description: 'ARN of the created IAM Role'
    Value: !GetAtt AutomationServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'
  
  AutomationRoleName:
    Description: 'Name of the created IAM Role'
    Value: !Ref AutomationServiceRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'