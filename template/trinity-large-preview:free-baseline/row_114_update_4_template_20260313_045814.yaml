AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Parameters:
  BusinessContactName:
    Type: String
    Default: "Business Contact"
    Description: Name of the business contact person
  BusinessContactEmail:
    Type: String
    Default: "contact@example.com"
    Description: Email address of the business contact person
  BusinessContactPhone:
    Type: String
    Default: "+1-555-123-4567"
    Description: Phone number of the business contact person

Resources:
  InputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OutputS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  B2BIDataInterchangeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BI-Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: b2b.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: B2BIDataInterchangePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt InputS3Bucket.Arn
                  - !Sub "${InputS3Bucket.Arn}/*"
                  - !GetAtt OutputS3Bucket.Arn
                  - !Sub "${OutputS3Bucket.Arn}/*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EDI-Transformer"
      Handler: index.handler
      Role: !GetAtt B2BIDataInterchangeRole.Arn
      Runtime: python3.12
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputS3Bucket
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              s3 = boto3.client('s3')
              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  obj = s3.get_object(Bucket=bucket, Key=key)
                  edi_data = obj['Body'].read().decode('utf-8')
                  # Simple transformation logic (replace with actual EDI parsing)
                  json_data = {"original_edi": edi_data}
                  output_key = key.replace('.edi', '.json')
                  s3.put_object(Bucket=os.environ['OUTPUT_BUCKET'], Key=output_key, Body=json.dumps(json_data))
              return {
                  'statusCode': 200,
                  'body': json.dumps('Transformation complete')
              }

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt InputS3Bucket.Arn
      SourceAccount: !Ref AWS::AccountId

  InputBucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref InputS3Bucket
      LambdaFunctionConfigurations:
        - Event: s3:ObjectCreated:*
          Filter:
            S3Key:
              Rules:
                - Name: suffix
                  Value: .edi
          Function: !GetAtt LambdaFunction.Arn

  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputS3Bucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt B2BIDataInterchangeRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt OutputS3Bucket.Arn
              - !Sub "${OutputS3Bucket.Arn}/*"

Outputs:
  InputS3BucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputS3Bucket
  OutputS3BucketName:
    Description: Name of the output S3 bucket
    Value: !Ref OutputS3Bucket
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction