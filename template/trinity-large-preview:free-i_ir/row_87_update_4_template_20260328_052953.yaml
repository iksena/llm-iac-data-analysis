AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Lambda artifacts S3 bucket and KMS key

Resources:
  LambdaArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
    Metadata:
      Effect: public-read,versioned

  LambdaArtifactsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LambdaArtifactsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${LambdaArtifactsBucket}/*'
    Metadata:
      Effect: public-read

  LambdaArtifactsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for Lambda artifacts encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow service role usage
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/ServiceRole'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
    Metadata:
      Effect: encrypted,auto-rotate

  LambdaArtifactsKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambda-artifacts-key
      TargetKeyId: !Ref LambdaArtifactsKMSKey
    Metadata:
      Effect: key-alias

Outputs:
  LambdaArtifactsBucketName:
    Description: Name of the S3 bucket for Lambda artifacts
    Value: !Ref LambdaArtifactsBucket
  LambdaArtifactsKMSKeyId:
    Description: ID of the KMS key for Lambda artifacts encryption
    Value: !Ref LambdaArtifactsKMSKey
  LambdaArtifactsKMSKeyAlias:
    Description: Alias of the KMS key for Lambda artifacts encryption
    Value: !Ref LambdaArtifactsKMSKeyAlias

Metadata:
  Invariants:
    - S3 bucket must be publicly accessible for Lambda artifact distribution
    - KMS key must support automatic rotation
    - KMS key must allow root account administration and service role usage
    - KMS key alias must reference the correct key