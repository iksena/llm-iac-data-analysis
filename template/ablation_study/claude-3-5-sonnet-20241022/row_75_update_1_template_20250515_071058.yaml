AWSTemplateFormatVersion: '2010-09-09'
Description: 'Windows EC2 instance setup for CPU stress testing via SSM'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type

  SubnetId:
    Type: String
    Description: Target subnet ID (optional)
    Default: ''

  CPUStressDuration:
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 3600
    Description: Duration of CPU stress test in seconds

Conditions:
  UseSpecifiedSubnet: !Not [!Equals [!Ref SubnetId, '']]

Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  FISRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FISExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - ec2:DescribeInstances
                  - cloudwatch:PutMetricData
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  CPUStressSSMDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Execute CPU stress test using PowerShell'
        parameters:
          duration:
            type: String
            description: Duration in seconds
            default: '300'
        mainSteps:
          - action: aws:runPowerShellScript
            name: CPUStressTest
            inputs:
              runCommand:
                - |
                  $duration = [int]${duration}
                  $cores = (Get-WmiObject Win32_Processor).NumberOfLogicalProcessors
                  $scriptBlock = {
                    param($duration)
                    $endTime = (Get-Date).AddSeconds($duration)
                    while ((Get-Date) -lt $endTime) {
                      $result = 1
                      for ($i = 1; $i -lt 2147483647; $i++) {
                        $result = $result * $i
                      }
                    }
                  }
                  1..$cores | ForEach-Object {
                    Start-Job -ScriptBlock $scriptBlock -ArgumentList $duration
                  }
                  Wait-Job *
                  Remove-Job *

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CPU stress test instance
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base}}'
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      SubnetId: !If 
        - UseSpecifiedSubnet
        - !Ref SubnetId
        - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: CPU-Stress-Test-Instance

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WindowsInstance

  SSMDocumentArn:
    Description: SSM Document ARN
    Value: !Ref CPUStressSSMDocument

  FISRoleArn:
    Description: FIS Role ARN
    Value: !GetAtt FISRole.Arn

  InstancePublicDNS:
    Description: Instance Public DNS Name
    Value: !GetAtt WindowsInstance.PublicDnsName