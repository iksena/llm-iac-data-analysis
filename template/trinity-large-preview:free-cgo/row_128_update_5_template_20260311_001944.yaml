AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated Security Hub controls management

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  DisableAWSFoundationControls:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  PermissionsBoundary:
    Type: String
    Default: ''
  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !Ref PermissionsBoundary
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
      Policies:
        - PolicyName: SecurityHubControlManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateStandardsControl
                Resource: '*'

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: !Ref LogRetentionInDays

  SecurityHubControlLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          securityhub = boto3.client('securityhub')

          def lambda_handler(event, context):
              try:
                  disable_cis = event.get('DisableCIS140Controls', 'false').lower() == 'true'
                  disable_aws_foundation = event.get('DisableAWSFoundationControls', 'false').lower() == 'true'

                  if disable_cis:
                      update_control('CIS AWS Foundations Benchmark', 'CIS.1.1.1')
                      update_control('CIS AWS Foundations Benchmark', 'CIS.1.1.2')
                      # Add other CIS controls to disable

                  if disable_aws_foundation:
                      update_control('AWS Foundational Security Best Practices', 'AWS-1')
                      update_control('AWS Foundational Security Best Practices', 'AWS-2')
                      # Add other AWS Foundation controls to disable

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Security Hub controls updated successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error updating controls: {str(e)}')
                  }

          def update_control(standard_arn, control_id):
              securityhub.update_standards_control(
                  StandardsControlArn=f'arn:aws:securityhub:{region}::{account}:standard/{standard_arn}/control/{control_id}',
                  ControlStatus='DISABLED',
                  DisabledReason='Control disabled via automated management'
              )

  LambdaScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 day)
      Targets:
        - Arn: !GetAtt SecurityHubControlLambda.Arn
          Id: SecurityHubControlLambda
          Input: !Sub |
            {
              "DisableCIS140Controls": "${DisableCIS140Controls}",
              "DisableAWSFoundationControls": "${DisableAWSFoundationControls}"
            }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SecurityHubControlLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LambdaScheduleRule.Arn

  ControlManagementAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: SecurityHubControlManagementFailures
      AlarmDescription: Alarm for Security Hub control management Lambda failures
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SecurityHubControlLambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !ImportValue SecurityHubControlManagementSNSTopicArn

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN for Security Hub control management
    Value: !GetAtt SecurityHubControlLambda.Arn
  LogGroupName:
    Description: CloudWatch log group name for Lambda function
    Value: !Ref LambdaLogGroup