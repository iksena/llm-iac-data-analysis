AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IP Address Manager for network address allocation
      OperatingRegions:
        - Name: !Ref 'AWS::Region'
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IPAM
Outputs:
  IPAMArn:
    Description: IPAM Amazon Resource Name
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub ${AWS::StackName}-IPAM-ARN
  IPAMId:
    Description: IPAM Unique Identifier
    Value: !Ref IPAM
    Export:
      Name: !Sub ${AWS::StackName}-IPAM-ID
  PublicScopeId:
    Description: Default Public Scope ID
    Value: !GetAtt IPAM.PublicDefaultScopeId
    Export:
      Name: !Sub ${AWS::StackName}-Public-Scope-ID
  PrivateScopeId:
    Description: Default Private Scope ID
    Value: !GetAtt IPAM.PrivateDefaultScopeId
    Export:
      Name: !Sub ${AWS::StackName}-Private-Scope-ID