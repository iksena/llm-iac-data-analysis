AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe Products API'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: 'Stripe API Key for authentication'

  StripeEndpoint:
    Type: String
    Default: 'https://api.stripe.com/v1/products'
    Description: 'Stripe Products API endpoint'

  SourceAppName:
    Type: String
    Default: 'PartnerApp'
    Description: 'Source application name for events'

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-stripe-bus'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'events:InvokeApiDestination'
                Resource: '*'

  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'Authorization'
          ApiKeyValue: !Sub 'Bearer ${StripeApiKey}'
      Description: 'Stripe API Authentication Connection'
      Name: !Sub '${AWS::StackName}-stripe-conn'

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt StripeConnection.Arn
      Description: 'Stripe Products API Destination'
      HttpMethod: POST
      InvocationEndpoint: !Ref StripeEndpoint
      InvocationRateLimitPerSecond: 1
      Name: !Sub '${AWS::StackName}-stripe-dest'

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      Description: 'Forward events to Stripe Products API'
      EventPattern:
        source:
          - !Ref SourceAppName
        detail-type:
          - 'ProductCreation'
      State: ENABLED
      Targets:
        - Id: StripeProductsTarget
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              "name": "$.detail.name"
              "description": "$.detail.description"
            InputTemplate: |
              {
                "name": <name>,
                "description": <description>
              }

Outputs:
  EventBusArn:
    Description: 'Event Bus ARN'
    Value: !GetAtt EventBus.Arn

  EventBusName:
    Description: 'Event Bus Name'
    Value: !Ref EventBus

  ApiDestinationArn:
    Description: 'API Destination ARN'
    Value: !GetAtt StripeApiDestination.Arn