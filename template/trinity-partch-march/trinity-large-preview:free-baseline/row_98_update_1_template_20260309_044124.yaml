AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify web application with production branch for TodoApp

Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
  Repository:
    Type: String
    Default: https://github.com/yourusername/todoapp.git
    Description: Git repository URL for the application
  OAuthToken:
    Type: String
    NoEcho: true
    Description: OAuth token for accessing the repository

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AppName}-AmplifyRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAmplifyServiceRolePolicy

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      OauthToken: !Ref OAuthToken
      BuildSpecFile: buildspec.yml
      ServiceRoleArn: !GetAtt AmplifyServiceRole.Arn
      AutoBranchCreationConfig:
        EnableAutoBuild: true
        EnableAutoBranchCreation: true
        EnablePullRequestPreview: true
        PullRequestEnvironmentName: pull-request
        Stage: DEVELOPMENT
        BuildSpec: |
          version: 1
          frontend:
            phases:
              build:
                commands:
                  - npm install
                  - npm run build
            artifacts:
              baseDirectory: build
              files:
                - '**/*'
            cache:
              paths:
                - node_modules/**/*

  AmplifyProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      EnableBasicAuth: false
      EnableNotification: false
      EnablePullRequestPreview: false
      Stage: PRODUCTION
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm install
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId
  AmplifyAppUrl:
    Description: Amplify Application URL
    Value: !GetAtt AmplifyApp.DefaultDomain