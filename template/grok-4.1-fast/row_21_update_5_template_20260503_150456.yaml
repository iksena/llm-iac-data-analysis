AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Timestream Database and Tables with configurable retention policies. Four tables: poc-table-01-batch-write, poc-table-02-older-records-memonly, poc-table-03-older-records-magnetic, poc-table-04-common-attributes.'

Parameters:
  DatabaseName:
    Type: String
    Default: 'PocTimestreamDB'
    AllowedPattern: '^[a-zA-Z0-9_.-]{1,64}$'
    Description: 'Name of the Timestream database (1-64 chars: alphanumeric, _, -, .).'
  Table01MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-01-batch-write (1 hour to 365 days).'
  Table01MagneticHours:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 1752000
    Description: 'Magnetic retention in hours for poc-table-01-batch-write (0 to disable, up to 200 years).'
  Table02MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-02-older-records-memonly (1 hour to 365 days).'
  Table02MagneticHours:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 1752000
    Description: 'Magnetic retention in hours for poc-table-02-older-records-memonly (0 to disable).'
  Table03MemoryHours:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-03-older-records-magnetic (1 hour to 365 days).'
  Table03MagneticHours:
    Type: Number
    Default: 720
    MinValue: 0
    MaxValue: 1752000
    Description: 'Magnetic retention in hours for poc-table-03-older-records-magnetic (~30 days default).'
  Table04MemoryHours:
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8760
    Description: 'Memory retention in hours for poc-table-04-common-attributes (1 hour to 365 days).'
  Table04MagneticHours:
    Type: Number
    Default: 8760
    MinValue: 0
    MaxValue: 1752000
    Description: 'Magnetic retention in hours for poc-table-04-common-attributes (~1 year default).'

Resources:
  TimestreamDB:
    Type: 'AWS::Timestream::Database'
    Properties:
      DatabaseName: !Ref DatabaseName

  PocTable01BatchWrite:
    Type: 'AWS::Timestream::Table'
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-01-batch-write'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table01MemoryHours
        MagneticStoreRetentionPeriodInHours:MagneticStoreRetentionInHours: !Ref Table01MagneticHours

  PocTable02OlderRecordsMemonly:
    Type: 'AWS::Timestream::Table'
    DependsOn: TimestreamDB
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-02-older-records-memonly'
      RetentionProperties:
        MemoryStoreRetention