AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  FlowLogsLogGroupName:
    Type: String
    Description: Name of the CloudWatch Logs log group containing VPC flow logs for NAT Gateway
    MinLength: 1
Resources:
  NatGatewayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: NatGatewayFlowLogsDashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE ${FlowLogsLogGroupName} | fields srcaddr, SUM(bytes) as total_bytes\n| filter interfaceId like 'eni-%' and action = 'ACCEPT'\n| stats total_bytes by srcaddr\n| sort total_bytes desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Bytes"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE ${FlowLogsLogGroupName} | fields srcaddr, SUM(packets) as total_packets\n| filter interfaceId like 'eni-%' and action = 'ACCEPT'\n| stats total_packets by srcaddr\n| sort total_packets desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Outbound Packets"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE ${FlowLogsLogGroupName} | fields srcaddr, COUNT(*) as reject_count\n| filter interfaceId like 'eni-%' and action = 'REJECT'\n| stats reject_count by srcaddr\n| sort reject_count desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Connection Count"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE ${FlowLogsLogGroupName} | fields srcaddr, SUM(bytes) as reject_bytes\n| filter interfaceId like 'eni-%' and action = 'REJECT'\n| stats reject_bytes by srcaddr\n| sort reject_bytes desc\n| limit 10",
                "region": "${AWS::Region}",
                "title": "Top Source IPs by Rejected Bytes"
              }
            }
          ]
        }
Outputs:
  DashboardName:
    Description: Name of the created CloudWatch Dashboard
    Value: !Ref NatGatewayDashboard