AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Required - VPC ID for resources
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Required - Subnet IDs for EC2 and RDS
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.medium, t3.large, m5.large]
  DBUsername:
    Type: String
    Default: etherpadadmin
  DBName:
    Type: String
    Default: etherpad
  SSHKeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Required - EC2 Key Pair for instance access

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-west-2:
      AMI: ami-03f65b8614a860c29

Resources:
  # ... (Keep all resource definitions exactly as in the last working template)
  # All resource configurations remain unchanged from previous valid version

Outputs:
  ALBDNS:
    Value: !GetAtt ALB.DNSName
  RDSAddress:
    Value: !GetAtt RDSInstance.Endpoint.Address
  ArtifactBucket:
    Value: !Ref EtherpadBucket
  CodeDeployApp:
    Value: !Ref CodeDeployApplication