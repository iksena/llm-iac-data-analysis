AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create a scalable and monitored Amazon EFS file system with automated backups
  and performance safeguards, designed for shared storage in a VPC-based environment.
Parameters:
  SubnetIds:
    Description: "List of Subnet IDs in the VPC for the EFS mount target(s). Only the first subnet will be used."
    Type: List<AWS::EC2::Subnet::Id>
  MountTargetSecurityGroup:
    Description: "Security Group ID for the EFS mount target."
    Type: AWS::EC2::SecurityGroup::Id
  EfsPerformanceMode:
    Description: "The performance mode of the EFS file system. Options: generalPurpose or maxIO."
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
  ThroughputMode:
    Description: "The throughput mode of the EFS file system. Options: bursting or provisioned."
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
  EnableAutomatedBackups:
    Description: "Set to true to enable automated backups via AWS Backup."
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  BackupScheduleExpression:
    Description: "The CRON schedule expression for automated backups (e.g., cron(0 12 * * ? *))."
    Type: String
    Default: "cron(0 12 * * ? *)"
  IOUtilizationThreshold:
    Description: "Threshold for IO utilization alarm (in percent)."
    Type: Number
    Default: 80
  BurstCreditsThreshold:
    Description: "Threshold for burst credit balance alarm."
    Type: Number
    Default: 100
  ThroughputThreshold:
    Description: "Threshold for throughput alarm (in MB/s)."
    Type: Number
    Default: 1024
Conditions:
  EnableBackups:
    Fn::Equals: [ !Ref EnableAutomatedBackups, "true" ]
Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref EfsPerformanceMode
      ThroughputMode: !Ref ThroughputMode
      Encrypted: true
  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref MountTargetSecurityGroup
  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EFS-IOUtilization-Alarm"
      AlarmDescription: "Alarm if EFS IO utilization exceeds the defined threshold."
      Namespace: "AWS/EFS"
      MetricName: "PercentIOLimit"
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref IOUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Unit: Percent
  BurstCreditsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EFS-BurstCredits-Alarm"
      AlarmDescription: "Alarm if the EFS burst credit balance falls below the defined threshold."
      Namespace: "AWS/EFS"
      MetricName: "BurstCreditBalance"
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref BurstCreditsThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: "EFS-Throughput-Alarm"
      AlarmDescription: "Alarm if EFS throughput falls below the defined threshold."
      Namespace: "AWS/EFS"
      MetricName: "Throughput"
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref ThroughputThreshold
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
  BackupRole:
    Type: AWS::IAM::Role
    Condition: EnableBackups
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [backup.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: EnableBackups
    Properties:
      BackupVaultName: !Sub "${AWS::StackName}-EFSBackupVault"
  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: EnableBackups
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "${AWS::StackName}-EFSBackupPlan"
        BackupPlanRule:
          - RuleName: "DailyBackup"
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupScheduleExpression
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30
            RecoveryPointTags:
              BackupType: "Automated"
  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: EnableBackups
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: "EFSBackupSelection"
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt EFSFileSystem.Arn
Outputs:
  FileSystemId:
    Description: "The ID of the created EFS file system."
    Value: !Ref EFSFileSystem
  BackupVaultName:
    Condition: EnableBackups
    Description: "The name of the AWS Backup Vault used for automated backups."
    Value: !Ref BackupVault
  BackupPlanId:
    Condition: EnableBackups
    Description: "The ID of the AWS Backup Plan created for the EFS file system."
    Value: !Ref BackupPlan