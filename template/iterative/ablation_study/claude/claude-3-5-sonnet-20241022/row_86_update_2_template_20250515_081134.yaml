AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable GuardDuty detector for security monitoring'

Parameters:
  FindingPublishingFrequency:
    Type: String
    Default: FIFTEEN_MINUTES
    AllowedValues:
      - FIFTEEN_MINUTES
      - ONE_HOUR
      - SIX_HOURS
    Description: Frequency for publishing updated findings

Resources:
  GuardDutyDetector:
    Type: 'AWS::GuardDuty::Detector'
    Properties:
      Enable: true
      FindingPublishingFrequency: !Ref FindingPublishingFrequency

Outputs:
  DetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector
  
  DetectorArn:
    Description: The ARN of the GuardDuty detector
    Value: !GetAtt GuardDutyDetector.Arn