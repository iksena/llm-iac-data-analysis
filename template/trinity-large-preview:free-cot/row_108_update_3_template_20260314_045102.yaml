AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Management System with Admin Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyAppUserPool
    Description: Name of the Cognito User Pool

  HostedUIDomainPrefix:
    Type: String
    Default: myapp
    Description: Prefix for the hosted UI domain

  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}.
    Description: Custom email verification message

  EnableMfa:
    Type: String
    Default: FALSE
    AllowedValues: [TRUE, FALSE]
    Description: Enable Multi-Factor Authentication

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      AutoVerifiedAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: !Ref EmailVerificationMessage
        EmailSubject: Your verification code
      MfaConfiguration: !Ref EnableMfa
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7
        InviteMessageTemplate:
          EmailMessage: Your username is {username} and temporary password is {####}.
          EmailSubject: Your temporary password
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      DeviceConfiguration:
        ChallengeRequiredOnNewDevice: false
        DeviceOnlyRememberedOnUserPrompt: true
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MyAppClient
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email
      RefreshTokenValidity: 30
      IdTokenValidity: 60
      AccessTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      CustomDomainConfig:
        CertificateArn: !Sub arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/dummy-cert
      Domain: !Sub ${HostedUIDomainPrefix}-${AWS::AccountId}-${AWS::Region}
      UserPoolId: !Ref UserPool

  UserPoolResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: https://myapp.com/oauth
      Name: MyApp API
      UserPoolId: !Ref UserPool
      Scopes:
        - ScopeName: email
          ScopeDescription: Access email address
        - ScopeName: openid
          ScopeDescription: Access openid
        - ScopeName: profile
          ScopeDescription: Access profile information

Outputs:
  UserPoolId:
    Description: ID of the created user pool
    Value: !Ref UserPool
  UserPoolArn:
    Description: ARN of the created user pool
    Value: !GetAtt UserPool.Arn
  UserPoolClientId:
    Description: ID of the created user pool client
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Description: Hosted UI domain
    Value: !GetAtt UserPoolDomain.Domain
  UserPoolResourceServerId:
    Description: ID of the resource server
    Value: !Ref UserPoolResourceServer