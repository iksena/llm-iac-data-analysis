AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application for a TodoApp.'

Parameters:
  GitHubRepositoryName:
    Type: String
    Description: 'The name of the GitHub repository containing the TodoApp source code.'
  GitHubBranchName:
    Type: String
    Description: 'The branch of the GitHub repository to deploy.'
  GitHubOAuthToken:
    Type: String
    Description: 'The OAuth token for accessing the GitHub repository.'
    NoEcho: true

Resources:
  AmplifyApp:
    Type: 'AWS::Amplify::App'
    Properties:
      Name: 'TodoApp'
      Repository: !Sub 'https://github.com/${GitHubRepositoryName}'
      OauthToken: !Ref GitHubOAuthToken
      Branches:
        - BranchName: !Ref GitHubBranchName
          Stage: 'PRODUCTION'
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: /build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

Outputs:
  AmplifyAppURL:
    Description: 'The URL of the deployed AWS Amplify application.'
    Value: !GetAtt [AmplifyApp, DefaultDomain]
  AmplifyAppArn:
    Description: 'The ARN of the AWS Amplify application.'
    Value: !GetAtt [AmplifyApp, Arn]