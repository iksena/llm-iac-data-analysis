AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub '${AWS::StackName}-Resource-Group'
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - "AWS::EC2::Instance"
            - "AWS::RDS::DBInstance"
            - "AWS::SageMaker::NotebookInstance"
            - "AWS::SSM::ManagedInstanceInventory"
          TagFilters:
            - Key: "Service"
              Values:
                - "EC2"
                - "RDS"
                - "SageMaker"
                - "SSM"
                - "OtherService"
      Tags:
        - Key: "Environment"
          Value: "Production"
        - Key: "Owner"
          Value: "DevOpsTeam"

Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ResourceGroupArn'

  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ResourceGroup
    Export:
      Name: !Sub '${AWS::StackName}-ResourceGroupName'