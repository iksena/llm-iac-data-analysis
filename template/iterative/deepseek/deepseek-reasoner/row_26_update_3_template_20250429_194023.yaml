AWSTemplateFormatVersion: '2010-09-09'
Description: S3 EventBridge integration with SNS notifications
Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  SNSTopic:
    Type: AWS::SNS::Topic

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SNSTopic

  ObjectCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: default
      EventPattern:
        source: 
          - aws.s3
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name: 
              - !Ref S3Bucket
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  S3BucketName:
    Value: !Ref S3Bucket
  SNSTopicARN:
    Value: !Ref SNSTopic