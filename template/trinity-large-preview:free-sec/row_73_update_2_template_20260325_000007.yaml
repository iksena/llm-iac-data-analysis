AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      CapacityProviders:
        - !Ref FargateCapacityProvider
        - !Ref FargateSpotCapacityProvider
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !Ref FargateCapacityProvider
          Weight: 1
        - CapacityProvider: !Ref FargateSpotCapacityProvider
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: Fargate
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub 'arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/fargate-default'
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FargateSpot
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub 'arn:aws:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/fargate-spot'
        ManagedScaling:
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED