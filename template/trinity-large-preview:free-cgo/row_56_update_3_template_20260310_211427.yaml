AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a secure Amazon Cognito User Pool with administrator-controlled user provisioning and email-based authentication.

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  EmailVerificationMessage:
    Type: String
    Default: Your verification code is {####}
    Description: Custom email verification message
  EmailVerificationSubject:
    Type: String
    Default: Your verification code
    Description: Custom email verification subject
  EmailSendingAccount:
    Type: String
    Default: COGNITO_DEFAULT
    AllowedValues:
      - COGNITO_DEFAULT
      - DEVELOPER
    Description: Email sending account type
  MfaConfiguration:
    Type: String
    Default: OPTIONAL
    AllowedValues:
      - OFF
      - OPTIONAL
      - REQUIRED
    Description: MFA configuration for the user pool

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      EmailConfiguration:
        EmailSendingAccount: !Ref EmailSendingAccount
      MfaConfiguration: !Ref MfaConfiguration
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      MfaConfiguration: !Ref MfaConfiguration

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MyUserPoolClient
      UserPoolId: !Ref CognitoUserPool
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_CUSTOM_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true

Outputs:
  UserPoolId:
    Description: The ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: The ID of the Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient