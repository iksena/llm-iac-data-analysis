AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway integration with Kinesis Data Streams for data ingestion and retrieval'

Parameters:
  StreamName:
    Type: String
    Description: 'Name of the Kinesis stream'
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    Default: 'default-kinesis-stream'
    
  RetentionPeriod:
    Type: Number
    Description: 'Stream retention period in hours (24-168)'
    Default: 24
    MinValue: 24
    MaxValue: 168
    
  ShardCount:
    Type: Number
    Description: 'Number of shards for the Kinesis stream'
    Default: 1
    MinValue: 1
    
  StageName:
    Type: String
    Description: 'API Gateway deployment stage name'
    Default: 'prod'
    AllowedPattern: '[a-zA-Z0-9]+'

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub '${AWS::StackName}-${StreamName}'
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-${StreamName}'

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: !Sub '${AWS::StackName}-KinesisAccess'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-KinesisAPI'
      Description: API Gateway for Kinesis Stream operations
      EndpointConfiguration:
        Types:
          - REGIONAL

  KinesisErrorModel:
    Type: AWS::ApiGateway::Model
    DependsOn: RestApi
    Properties:
      RestApiId: !Ref RestApi
      ContentType: application/json
      Name: !Sub '${AWS::StackName}-ErrorModel'
      Schema:
        type: object
        properties:
          message:
            type: string
          error:
            type: string

  ApiResource:
    Type: AWS::ApiGateway::Resource
    DependsOn: RestApi
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'records'

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: [ApiResource, KinesisErrorModel]
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: AWS_IAM
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: !Sub |
            {
              "StreamName": "${AWS::StackName}-${StreamName}",
              "Data": "$util.base64Encode($input.path('$.data'))",
              "PartitionKey": "$input.path('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "SequenceNumber": "$input.path('$.SequenceNumber')",
                  "ShardId": "$input.path('$.ShardId')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: '{"error": "Bad Request", "message": $input.path("$.message")}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: !Ref KinesisErrorModel

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: [ApiResource, KinesisErrorModel]
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: AWS_IAM
      RequestParameters:
        method.request.querystring.shardIterator: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-amz-json-1.1'"
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "Records": $input.json('$.Records'),
                  "NextShardIterator": "$input.path('$.NextShardIterator')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: '{"error": "Bad Request", "message": $input.path("$.message")}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: !Ref KinesisErrorModel

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - PutRecordMethod
      - GetRecordsMethod
    Properties:
      RestApiId: !Ref RestApi
      Description: !Sub '${AWS::StackName} deployment'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref RestApi
      StageName: !Ref StageName
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}

  StreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt KinesisStream.Arn

  StreamName:
    Description: Kinesis stream name
    Value: !Sub '${AWS::StackName}-${StreamName}'

  ApiId:
    Description: REST API ID
    Value: !Ref RestApi