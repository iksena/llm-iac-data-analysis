AWSTemplateFormatVersion: '2010-09-09'
Description: Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events

Parameters:
  SNSTopicName:
    Type: String
    Default: SecretsManagerLifecycleAlerts
  LambdaTimeout:
    Type: Number
    Default: 30
  LambdaMemory:
    Type: Number
    Default: 128

Resources:
  SecretsManagerSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  SecretsManagerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                Resource: '*'
        - PolicyName: SNSpublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SecretsManagerSNSTopic

  SecretsManagerLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Role: !GetAtt SecretsManagerLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          sns_client = boto3.client('sns')

          def lambda_handler(event, context):
              try:
                  secret_id = event['detail']['secretId']
                  event_type = event['detail']['eventType']
                  message = f"Secrets Manager Event: {event_type}\nSecret ID: {secret_id}\nEvent Time: {event['time']}"

                  sns_client.publish(
                      TopicArn=os.environ['SNS_TOPIC_ARN'],
                      Message=message,
                      Subject='Secrets Manager Lifecycle Alert'
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Notification sent successfully')
                  }
              except Exception as e:
                  print(f"Error processing event: {str(e)}")
                  raise e

      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SecretsManagerSNSTopic

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SecretsManagerLambdaFunction.Arn
      Principal: secretsmanager.amazonaws.com

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Capture Secrets Manager lifecycle events
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !GetAtt SecretsManagerLambdaFunction.Arn
          Id: SecretsManagerTarget

  SecretsManagerRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      SecretId: !Ref SecretsManagerSecret
      RotationLambdaARN: !GetAtt RotationLambdaFunction.Arn
      AutomaticallyAfterDays: 30

  RotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRotation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:UpdateSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:DeleteSecret
                Resource: '*'

  RotationLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: rotation.lambda_handler
      Timeout: 60
      MemorySize: 256
      Role: !GetAtt RotationLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json

          client = boto3.client('secretsmanager')

          def lambda_handler(event, context):
              secret_id = event['SecretId']
              client_version = event['ClientRequestToken']
              step = event['Step']

              if step == 'createSecret':
                  create_secret(secret_id, client_version)
              elif step == 'setSecret':
                  set_secret(secret_id, client_version)
              elif step == 'testSecret':
                  test_secret(secret_id, client_version)
              elif step == 'finishSecret':
                  finish_secret(secret_id, client_version)
              else:
                  raise ValueError(f'Invalid step parameter: {step}')

          def create_secret(secret_id, client_version):
              pass

          def set_secret(secret_id, client_version):
              pass

          def test_secret(secret_id, client_version):
              pass

          def finish_secret(secret_id, client_version):
              pass

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Example secret for rotation testing
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

Outputs:
  SNSTopicARN:
    Description: SNS Topic ARN for receiving alerts
    Value: !Ref SecretsManagerSNSTopic
  LambdaFunctionARN:
    Description: Lambda function ARN processing Secrets Manager events
    Value: !GetAtt SecretsManagerLambdaFunction.Arn