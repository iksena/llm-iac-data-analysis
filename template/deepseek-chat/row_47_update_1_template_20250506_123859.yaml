AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating IAM role for EC2 instances with read-only IAM access'

Resources:
  EC2IAMReadOnlyPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Policy allowing read-only access to IAM resources'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:SimulatePrincipalPolicy'
            Resource: '*'

  EC2IAMReadOnlyRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'ec2.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref EC2IAMReadOnlyPolicy
      Path: '/'

  EC2InstanceProfile:
    Type: 'AWS::IAM::InstanceProfile'
    Properties:
      Path: '/'
      Roles:
        - !Ref EC2IAMReadOnlyRole

Outputs:
  IAMRoleARN:
    Description: 'ARN of the IAM role with read-only IAM access'
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMRoleARN'

  InstanceProfileARN:
    Description: 'ARN of the instance profile for EC2 instances'
    Value: !GetAtt EC2InstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileARN'