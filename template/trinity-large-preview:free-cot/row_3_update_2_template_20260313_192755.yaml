AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket for Static Website Hosting with DeletionPolicy

Parameters:
  BucketNamePrefix:
    Type: String
    Default: my-website
    Description: Prefix for the S3 bucket name

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::Region}-${AWS::AccountId}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*.html'

Outputs:
  WebsiteURL:
    Value: !GetAtt S3Bucket.WebsiteURL
    Description: URL of the website hosted on S3
  BucketName:
    Value: !Ref S3Bucket
    Description: Name of the S3 bucket