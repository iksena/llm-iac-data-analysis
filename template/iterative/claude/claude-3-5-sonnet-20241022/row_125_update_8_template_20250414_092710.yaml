AWSTemplateFormatVersion: '2010-09-09'
Description: API Gateway with SES Integration for Email Sending

Parameters:
  ApiStageName:
    Type: String
    Default: v1
    Description: API Gateway stage name
  UsagePlanQuota:
    Type: Number
    Default: 10000
    Description: Monthly quota for API usage
  ThrottlingRate:
    Type: Number
    Default: 500
    Description: Requests per second throttling limit

Resources:
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: ApiGatewaySESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:*

  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${AWS::StackName}-email-api
      Description: API for sending emails via SES
      EndpointConfiguration:
        Types:
          - REGIONAL

  EmailResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref EmailApi
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: send

  EmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:email:action/SendEmail
        IntegrationHttpMethod: POST
        PassthroughBehavior: NEVER
        Type: AWS
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: "Action=SendEmail&Source=$input.path('$.from')&Destination.ToAddresses.member.1=$input.path('$.to')&Message.Subject.Data=$input.path('$.subject')&Message.Body.Text.Data=$input.path('$.content.text')&Message.Body.Html.Data=$input.path('$.content.html')&Version=2010-12-01"
        IntegrationResponses:
          - StatusCode: '200'
            SelectionPattern: '2\d{2}'
            ResponseTemplates:
              application/json: '{"message":"Email sent successfully"}'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: Empty

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: EmailMethod
    Properties:
      RestApiId: !Ref EmailApi
      Description: Initial deployment

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref EmailApi
      StageName: !Ref ApiStageName
      MethodSettings:
        - ResourcePath: /*
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub ${AWS::StackName}-key
      Description: API Key for email service
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: !Ref ApiStageName

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub ${AWS::StackName}-usage-plan
      Description: Usage plan for email service
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: !Ref ApiStageName
      Quota:
        Limit: !Ref UsagePlanQuota
        Period: MONTH
      Throttle:
        RateLimit: !Ref ThrottlingRate
        BurstLimit: !Ref ThrottlingRate

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: API Endpoint URL
    Value: !Sub https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}/send
  ApiKeyId:
    Description: API Key ID
    Value: !Ref ApiKey
  UsagePlanId:
    Description: Usage Plan ID
    Value: !Ref UsagePlan