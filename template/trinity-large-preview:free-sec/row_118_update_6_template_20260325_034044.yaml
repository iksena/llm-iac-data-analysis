AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow for SQS message enrichment with external API data

Parameters:
  LogGroupName:
    Type: String
    Default: EventBridgePipesEnrichmentLogs
  PipeName:
    Type: String
    Default: SqsToApiEnrichmentPipe
  QueueName:
    Type: String
    Default: EnrichmentSourceQueue
  KmsKeyId:
    Type: String
    Default: alias/aws/sqs
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-xxxxxxxx
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-xxxxxxxx

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      KmsMasterKeyId: !Ref KmsKeyId

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 30
      KmsKeyId: !Sub 'arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/logs'

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: PipesSqsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SourceQueue.Arn
        - PolicyName: PipesApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: '*'
        - PolicyName: PipesLogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  EnrichmentRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Ref PipeName
      Description: Rule to trigger enrichment workflow
      EventPattern:
        source:
          - aws.sqs
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:EnrichmentFunction'
          Id: EnrichmentTarget
          InputTransformer:
            InputPathsMap:
              body: $.body
            InputTemplate: '{"zipCode": <body>}'

  EnrichmentFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Code:
        ZipFile: |
          import json
          import urllib.request
          import os

          def handler(event, context):
              zip_code = event['zipCode']
              try:
                  with urllib.request.urlopen(f'https://api.zippopotam.us/us/{zip_code}') as response:
                      api_data = json.loads(response.read().decode())
                      enriched_message = {
                          'original': event,
                          'enriched': api_data
                      }
                      log_message = json.dumps(enriched_message)
                      print(log_message)
                      return enriched_message
              except Exception as e:
                  error_message = f"Enrichment failed: {str(e)}"
                  print(error_message)
                  return {'error': error_message}
      Role: !GetAtt PipesRole.Arn
      Timeout: 30
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref SubnetId
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      ReservedConcurrentExecutions: 5

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VpcId

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EnrichmentDLQ

Outputs:
  QueueUrl:
    Description: SQS Queue URL
    Value: !GetAtt SourceQueue.QueueUrl
  LogGroupName:
    Description: CloudWatch Log Group Name
    Value: !Ref LogGroup
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt EnrichmentFunction.Arn