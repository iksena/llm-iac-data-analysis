AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyApiKey:
    Type: String
    NoEcho: true
    Description: Shopify Admin API Key for authentication
    MinLength: 1

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: ShopifyProductEventBus

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyApiKey
      Name: ShopifyApiConnection
      Description: Connection to Shopify API

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn: ShopifyConnection
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub 'https://testanu.myshopify.com/admin/api/2023-04/products.json'
      Name: ShopifyProductApiDestination
      InvocationRateLimitPerSecond: 1
      Description: API Destination for Shopify Product Creation

  ProductEventRule:
    Type: AWS::Events::Rule
    DependsOn: 
      - ShopifyApiDestination
      - EventBridgeRole
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - 'MyShopifyApp'
        detail-type:
          - 'ProductUpdate'
        detail:
          status:
            - 'PENDING'
            - 'READY'
      Name: ShopifyProductEventRule
      State: ENABLED
      Targets:
        - Id: ShopifyProductTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: ARN of the Shopify API Destination
    Value: !GetAtt ShopifyApiDestination.Arn

  ConnectionArn:
    Description: ARN of the Shopify Connection
    Value: !GetAtt ShopifyConnection.Arn

  RuleArn:
    Description: ARN of the Event Rule
    Value: !GetAtt ProductEventRule.Arn