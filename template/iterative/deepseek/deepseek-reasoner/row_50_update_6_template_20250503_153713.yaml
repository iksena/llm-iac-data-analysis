AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: ''
  LoadTestInstanceType:
    Type: String
    Default: t3.micro
  SampleURLCount:
    Type: Number
    Default: 10
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    MinLength: 2
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: WorkerPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['sqs:ReceiveMessage', 'sqs:DeleteMessage', 'sqs:GetQueueAttributes']
                Resource: !GetAtt ScreenshotQueue.Arn
              - Effect: Allow
                Action: ['s3:PutObject']
                Resource: !Sub 'arn:aws:s3:::${ScreenshotBucket}/*'

  LoadTestRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: LoadTestPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['sqs:SendMessage']
                Resource: !GetAtt ScreenshotQueue.Arn

  WorkerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Worker security group
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  LoadTestSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Load test instance security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref WorkerRole]

  WorkerLT:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        SecurityGroupIds: [!GetAtt WorkerSG.GroupId]
        IamInstanceProfile:
          Arn: !GetAtt WorkerInstanceProfile.Arn
        UserData: 
          Fn::Base64: !Sub |
            #!/bin/bash
            sudo amazon-linux-extras install epel -y
            sudo yum install -y chromium xorg-x11-server-Xvfb jq
            cat <<'EOF' > /home/ec2-user/process_queue.sh
            #!/bin/bash
            while true; do
              RESPONSE=\$(aws sqs receive-message --queue-url ${ScreenshotQueue} --visibility-timeout 300 --wait-time-seconds 20)
              [ -z "\$RESPONSE" ] && continue
              URL=\$(echo \$RESPONSE | jq -r '.Messages[0].Body')
              RECEIPT=\$(echo \$RESPONSE | jq -r '.Messages[0].ReceiptHandle')
              xvfb-run --server-args="-screen 0 1280x1024x24" chromium --headless --disable-gpu --screenshot --no-sandbox "\$URL"
              aws s3 cp screenshot.png "s3://${ScreenshotBucket}/\$(date +%s).png"
              aws sqs delete-message --queue-url ${ScreenshotQueue} --receipt-handle "\$RECEIPT"
            done
            EOF
            chmod +x /home/ec2-user/process_queue.sh
            sudo -u ec2-user /home/ec2-user/process_queue.sh &

  WorkerASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLT
        Version: !GetAtt WorkerLT.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      VPCZoneIdentifier: !Ref SubnetIds
      HealthCheckType: EC2

  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-ScaleOut"
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref WorkerASG
      Cooldown: 300
      ScalingAdjustment: 1

  ScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-ScaleIn"
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref WorkerASG
      Cooldown: 300
      ScalingAdjustment: -1

  HighQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'Scale out when queue depth > 10'
      Namespace: 'AWS/SQS'
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions: 
        - !Ref ScaleOutPolicy

  LowQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'Scale in when queue depth < 5'
      Namespace: 'AWS/SQS'
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      AlarmActions: 
        - !Ref ScaleInPolicy

  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref LoadTestRole]

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref LoadTestInstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds: [!GetAtt LoadTestSG.GroupId]
      SubnetId: !Select [0, !Ref SubnetIds]
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          sudo yum install -y jq
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install
          for i in {1..${SampleURLCount}}; do
            aws sqs send-message --queue-url ${ScreenshotQueue} --message-body "https://example.com/page$i"
          done

Outputs:
  ScreenshotBucketName:
    Value: !Ref ScreenshotBucket
  ScreenshotQueueURL:
    Value: !Ref ScreenshotQueue
  LoadTestInstanceIP:
    Value: !GetAtt LoadTestInstance.PublicIp