AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Bedrock Agent with Lambda Integration for Stock Price Lookup

Parameters:
  LambdaFunctionName:
    Type: String
    Default: StockPriceLookupFunction
    Description: Name of the Lambda function
  BedrockAgentName:
    Type: String
    Default: StockPriceAgent
    Description: Name of the Bedrock Agent
  ModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229
    Description: Bedrock model ID to use
  LambdaTimeout:
    Type: Number
    Default: 10
    Description: Lambda function timeout in seconds
  LambdaMemorySize:
    Type: Number
    Default: 128
    Description: Lambda function memory size in MB

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              try:
                  stock_symbol = event.get('stockSymbol', 'UNKNOWN')
                  # Hard-coded stock price as placeholder
                  stock_price = 100
                  response = {
                      'stockSymbol': stock_symbol,
                      'stockPrice': stock_price,
                      'message': f'The current price of {stock_symbol} is ${stock_price}'
                  }
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response)
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${BedrockAgentName}-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:foundation-model/${ModelId}

  StockPriceActionGroup:
    Type: AWS::Bedrock::ActionGroup
    Properties:
      Name: StockPriceActions
      Description: Action group for stock price lookup
      Actions:
        - Name: getStockPrice
          Description: Get stock price for a given symbol
          ActionId: getStockPrice
          Schema: |
            {
              "type": "object",
              "properties": {
                "stockSymbol": {
                  "type": "string",
                  "description": "Stock symbol to lookup (e.g., AAPL, GOOGL)"
                }
              },
              "required": ["stockSymbol"]
            }
          Lambda:
            Arn: !GetAtt StockPriceLambdaFunction.Arn
            Region: !Ref AWS::Region

  StockPriceBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      Name: !Ref BedrockAgentName
      Description: Agent for handling stock price queries
      RoleArn: !GetAtt BedrockAgentRole.Arn
      AgentInstructions: |
        You are a helpful assistant that can provide stock price information.
        When users ask about stock prices, use the getStockPrice action to retrieve the current price.
        Always ask for clarification if the stock symbol is not provided.
        If the stock symbol is invalid or not found, respond appropriately.
      ActionGroupName: !GetAtt StockPriceActionGroup.Name
      ModelId: !Ref ModelId
      FqdnList: []

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt StockPriceLambdaFunction.Arn
  BedrockAgentArn:
    Description: Bedrock Agent ARN
    Value: !GetAtt StockPriceBedrockAgent.Arn
  BedrockAgentName:
    Description: Bedrock Agent Name
    Value: !Ref BedrockAgentName