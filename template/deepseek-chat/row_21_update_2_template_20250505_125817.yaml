AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Timestream database with four tables with configurable retention policies'

Parameters:
  DatabaseName:
    Description: 'Name of the Timestream database'
    Type: String
    Default: 'poc-database'
    AllowedPattern: '^[a-zA-Z0-9_.-]+$'
    ConstraintDescription: 'Database name can only contain alphanumeric characters, underscores, periods, and hyphens'
  
  BatchWriteTableRetention:
    Description: 'Retention period in hours (1-8766) for batch write table memory store'
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 8766
    
  OlderRecordsMemOnlyRetention:
    Description: 'Retention period in hours (1-8766) for older records memory-only table'
    Type: Number
    Default: 720
    MinValue: 1
    MaxValue: 8766
    
  OlderRecordsMagneticRetention:
    Description: 'Retention period in hours (1-8766) for older records magnetic table memory store'
    Type: Number
    Default: 8760
    MinValue: 1
    MaxValue: 8766
    
  CommonAttributesRetention:
    Description: 'Retention period in hours (1-8766) for common attributes table memory store'
    Type: Number
    Default: 168
    MinValue: 1
    MaxValue: 8766

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName
      Tags:
        - Key: Purpose
          Value: ProofOfConcept
        - Key: ManagedBy
          Value: CloudFormation

  BatchWriteTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-01-batch-write'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref BatchWriteTableRetention
        MagneticStoreRetentionPeriodInDays: 365
      Tags:
        - Key: Purpose
          Value: BatchWrites
        - Key: Retention
          Value: !Sub 'Memory=${BatchWriteTableRetention}hrs,Magnetic=365days'

  OlderRecordsMemOnlyTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-02-older-records-memonly'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref OlderRecordsMemOnlyRetention
        MagneticStoreRetentionPeriodInDays: 0
      Tags:
        - Key: Purpose
          Value: MemoryOnlyStorage
        - Key: Retention
          Value: !Sub 'Memory=${OlderRecordsMemOnlyRetention}hrs,Magnetic=0days'

  OlderRecordsMagneticTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-03-older-records-magnetic'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref OlderRecordsMagneticRetention
        MagneticStoreRetentionPeriodInDays: 3650
      Tags:
        - Key: Purpose
          Value: LongTermStorage
        - Key: Retention
          Value: !Sub 'Memory=${OlderRecordsMagneticRetention}hrs,Magnetic=3650days'

  CommonAttributesTable:
    Type: AWS::Timestream::Table
    DependsOn: TimestreamDatabase
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-04-common-attributes'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref CommonAttributesRetention
        MagneticStoreRetentionPeriodInDays: 365
      Tags:
        - Key: Purpose
          Value: CommonAttributes
        - Key: Retention
          Value: !Sub 'Memory=${CommonAttributesRetention}hrs,Magnetic=365days'

Outputs:
  DatabaseArn:
    Description: 'ARN of the created Timestream database'
    Value: !GetAtt TimestreamDatabase.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseArn'
  
  DatabaseName:
    Description: 'Name of the created Timestream database'
    Value: !Ref DatabaseName
    Export:
      Name: !Sub '${AWS::StackName}-DatabaseName'
  
  BatchWriteTableArn:
    Description: 'ARN of the batch write table'
    Value: !GetAtt BatchWriteTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchWriteTableArn'
  
  OlderRecordsMemOnlyTableArn:
    Description: 'ARN of the older records memory-only table'
    Value: !GetAtt OlderRecordsMemOnlyTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OlderRecordsMemOnlyTableArn'
  
  OlderRecordsMagneticTableArn:
    Description: 'ARN of the older records magnetic table'
    Value: !GetAtt OlderRecordsMagneticTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OlderRecordsMagneticTableArn'
  
  CommonAttributesTableArn:
    Description: 'ARN of the common attributes table'
    Value: !GetAtt CommonAttributesTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CommonAttributesTableArn'