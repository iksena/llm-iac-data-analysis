AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template that deploys a simulated AWS Bedrock Agent integrated
  with a Lambda function. The StockPrice Lambda returns a hard-coded stock price (100) as a 
  placeholder. A custom resource (Custom::BedrockAgent) simulates Bedrock Agent creation with 
  configuration for the "Claude 3 Sonnet" model and a custom getStockPrice action.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              # Placeholder: returns a hard-coded stock price.
              return {"stockPrice": 100}
      Timeout: 10

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentInvokeModelPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"

  BedrockAgentHandlerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BedrockAgentHandlerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt BedrockAgentHandlerLambdaRole.Arn
      Code:
        ZipFile: |
          import json, urllib.request, urllib.error
          def send_response(event, context, responseStatus, responseData, physicalResourceId):
              responseUrl = event['ResponseURL']
              responseBody = {
                  'Status': responseStatus,
                  'Reason': 'See details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physicalResourceId,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': responseData
              }
              json_responseBody = json.dumps(responseBody)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_responseBody))
              }
              request = urllib.request.Request(url=responseUrl, data=json_responseBody.encode('utf-8'), headers=headers, method='PUT')
              try:
                  with urllib.request.urlopen(request) as response:
                      print("Status code:", response.getcode())
                      print("Response:", response.read().decode('utf-8'))
              except urllib.error.HTTPError as e:
                  print("Failed to send response:", e.code, e.reason)
          def handler(event, context):
              print("Received event:", json.dumps(event))
              responseData = {}
              try:
                  requestType = event.get('RequestType')
                  if requestType in ['Create', 'Update']:
                      # Simulate creation/update of Bedrock Agent.
                      physical_id = "simulated-agent-id"
                      responseData['AgentId'] = physical_id
                  elif requestType == 'Delete':
                      physical_id = "simulated-agent-id-deleted"
                      responseData['AgentId'] = physical_id
                  else:
                      physical_id = context.log_stream_name
                  send_response(event, context, "SUCCESS", responseData, physical_id)
              except Exception as e:
                  print("Exception:", str(e))
                  send_response(event, context, "FAILED", {'Message': str(e)}, context.log_stream_name)
      Timeout: 30

  BedrockAgent:
    Type: Custom::BedrockAgent
    Properties:
      ServiceToken: !GetAtt BedrockAgentHandlerLambda.Arn
      AgentName: "StockPriceBedrockAgent"
      ModelName: "Claude 3 Sonnet"
      AgentRoleArn: !GetAtt BedrockAgentRole.Arn
      Actions:
        - Name: getStockPrice
          LambdaFunctionArn: !GetAtt StockPriceLambda.Arn
          Schema:
            type: object
            properties:
              stockSymbol:
                type: string

Outputs:
  StockPriceLambdaARN:
    Description: "ARN of the Stock Price Lookup Lambda function."
    Value: !GetAtt StockPriceLambda.Arn

  LambdaExecutionRoleARN:
    Description: "ARN of the Lambda Execution Role."
    Value: !GetAtt LambdaExecutionRole.Arn

  BedrockAgentId:
    Description: "Simulated Bedrock Agent identifier returned by the custom resource."
    Value: !GetAtt BedrockAgent.AgentId