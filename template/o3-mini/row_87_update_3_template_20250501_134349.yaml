AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to provision a publicly accessible S3 bucket for Lambda artifacts,
  a customer-managed KMS key for encryption with automatic rotation,
  and a KMS key alias for simplified reference. The KMS key policy grants full permissions to the
  account root and usage/administration permissions to an imported service role.

Parameters:
  ImportedServiceRoleArn:
    Description: "ARN of the imported service role to allow usage and administration of the KMS key."
    Type: String

Resources:
  S3BucketLambdaArtifacts:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: PublicRead

  S3BucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Properties:
      Bucket: !Ref S3BucketLambdaArtifacts
      BlockPublicAcls: false
      BlockPublicPolicy: false
      IgnorePublicAcls: false
      RestrictPublicBuckets: false

  KMSKeyEncryption:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key used to encrypt Lambda artifacts and static assets."
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowRootAccountFullAccess
            Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowServiceRoleKeyUsage
            Effect: Allow
            Principal:
              AWS: !Ref ImportedServiceRoleArn
            Action:
              - "kms:Encrypt"
              - "kms:Decrypt"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:DescribeKey"
            Resource: "*"
          - Sid: AllowServiceRoleKeyAdministration
            Effect: Allow
            Principal:
              AWS: !Ref ImportedServiceRoleArn
            Action:
              - "kms:Create*"
              - "kms:Describe*"
              - "kms:Enable*"
              - "kms:List*"
              - "kms:Put*"
              - "kms:Update*"
              - "kms:Revoke*"
              - "kms:Disable*"
              - "kms:Get*"
              - "kms:Delete*"
            Resource: "*"

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambdaArtifactsKey
      TargetKeyId: !Ref KMSKeyEncryption

Outputs:
  S3BucketName:
    Description: "Name of the S3 Bucket for Lambda artifacts"
    Value: !Ref S3BucketLambdaArtifacts
  KMSKeyArn:
    Description: "ARN of the KMS key used for encryption"
    Value: !GetAtt KMSKeyEncryption.Arn
  KMSKeyAliasName:
    Description: "Alias name of the KMS key"
    Value: alias/lambdaArtifactsKey