AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for AWS Glue ETL job infrastructure

Parameters:
  BucketNamePrefix:
    Type: String
    Default: 'glue-scripts-and-logs'
    Description: Prefix for the S3 bucket name for Glue scripts and Spark logs
  GlueJobName:
    Type: String
    Default: 'sample-convert-job'
    Description: Name of the Glue ETL job
  ScriptPath:
    Type: String
    Default: 'glue_scripts/sample_convert.py'
    Description: S3 path to the Python script for the Glue job
  GlueVersion:
    Type: String
    Default: '4.0'
    Description: Glue version for the ETL job
    AllowedValues: ['1.0', '2.0', '3.0', '4.0']

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: 'LogsExpirationRule'
            Status: Enabled
            ExpirationInDays: 30
            Prefix: 'logs/'

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource: 
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'
              - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'glue.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Policies:
        - PolicyName: 'S3AccessPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource: !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Ref GlueJobName
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: !Ref GlueVersion
      Command:
        Name: 'glueetl'
        ScriptLocation: !Sub 's3://${GlueScriptsBucket}/${ScriptPath}'
      DefaultArguments:
        '--job-language': 'python'
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-metrics': ''
      ExecutionProperty:
        MaxConcurrentRuns: 1
      MaxRetries: 0
      WorkerType: 'G.1X'
      NumberOfWorkers: 10

Outputs:
  BucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptsBucket
  GlueJobName:
    Description: Name of the Glue ETL job
    Value: !Ref GlueJobName
  GlueServiceRoleARN:
    Description: ARN of the IAM role for Glue
    Value: !GetAtt GlueServiceRole.Arn