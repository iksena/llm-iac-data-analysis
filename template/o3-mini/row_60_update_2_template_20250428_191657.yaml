AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an AWS KMS Key for centralized encryption management,
  including an alias for the key.

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key for centralized encryption management"
      KeyUsage: ENCRYPT_DECRYPT
      Origin: AWS_KMS
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "EnableRootAndAdminAccess"
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: "*"

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: "alias/centralized-encryption"
      TargetKeyId: !Ref KMSKey

Outputs:
  KMSKeyId:
    Description: "The ID of the created KMS Key"
    Value: !Ref KMSKey
  KMSKeyAlias:
    Description: "The alias of the created KMS Key"
    Value: !Ref KMSKeyAlias