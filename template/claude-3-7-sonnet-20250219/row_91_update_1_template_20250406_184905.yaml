AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for S3 bucket to store VPC flow logs with lifecycle management and access controls'

Parameters:
  BucketName:
    Type: String
    Description: 'Optional custom name for the S3 bucket. Leave blank for auto-generated name.'
    Default: ''
  
  EnableVersioning:
    Type: String
    Description: 'Enable or suspend versioning for the S3 bucket'
    Default: 'Enabled'
    AllowedValues:
      - 'Enabled'
      - 'Suspended'
  
  TransitionToGlacierDays:
    Type: Number
    Description: 'Number of days before transitioning objects to Glacier storage class'
    Default: 30
    MinValue: 1
  
  LogRetentionDays:
    Type: Number
    Description: 'Number of days to retain logs before deletion'
    Default: 365000
    MinValue: 1

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  VPCFlowLogsS3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If [UseCustomBucketName, !Ref BucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: !Ref EnableVersioning
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacierAndExpire
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref TransitionToGlacierDays
            ExpirationInDays: !Ref LogRetentionDays

  VPCFlowLogsS3BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref VPCFlowLogsS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action:
              - 's3:PutObject'
            Resource: !Sub '${VPCFlowLogsS3Bucket.Arn}/*'
            Condition:
              StringEquals:
                's3:x-amz-acl': 'bucket-owner-full-control'
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action:
              - 's3:GetBucketAcl'
            Resource: !GetAtt VPCFlowLogsS3Bucket.Arn
          - Sid: DenyNonSecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt VPCFlowLogsS3Bucket.Arn
              - !Sub '${VPCFlowLogsS3Bucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': false

Outputs:
  S3BucketName:
    Description: 'Name of the S3 bucket for VPC flow logs'
    Value: !Ref VPCFlowLogsS3Bucket
  
  S3BucketArn:
    Description: 'ARN of the S3 bucket for VPC flow logs'
    Value: !GetAtt VPCFlowLogsS3Bucket.Arn