AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito User Management System with Admin Provisioning

Parameters:
  UserPoolName:
    Type: String
    Default: MyUserPool
    Description: Name of the Cognito User Pool
  UserPoolDomain:
    Type: String
    Default: myappdomain
    Description: Domain name for hosted UI (Amazon-provided)
  PasswordPolicyMinLength:
    Type: Number
    Default: 8
    Description: Minimum password length
  PasswordPolicyRequireLowercase:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require lowercase characters
  PasswordPolicyRequireUppercase:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require uppercase characters
  PasswordPolicyRequireNumbers:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require numbers
  PasswordPolicyRequireSymbols:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: Require special characters
  AllowedOAuthFlows:
    Type: String
    Default: 'code,implicit'
    Description: Allowed OAuth flows (comma-separated)
  CallbackURLs:
    Type: String
    Default: 'https://yourapp.com/callback'
    Description: Callback URLs for OAuth (comma-separated)
  LogoutURLs:
    Type: String
    Default: 'https://yourapp.com/logout'
    Description: Logout URLs for OAuth (comma-separated)

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordPolicyMinLength
          RequireLowercase: !Ref PasswordPolicyRequireLowercase
          RequireUppercase: !Ref PasswordPolicyRequireUppercase
          RequireNumbers: !Ref PasswordPolicyRequireNumbers
          RequireSymbols: !Ref PasswordPolicyRequireSymbols
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: 'OFF'
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref UserPoolDomain
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: MyUserPoolClient
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows: !Split [',', !Ref AllowedOAuthFlows]
      AllowedOAuthScopes:
        - 'phone'
        - 'email'
        - 'openid'
        - 'profile'
        - 'aws.cognito.signin.user.admin'
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs: !Split [',', !Ref CallbackURLs]
      LogoutURLs: !Split [',', !Ref LogoutURLs]
      SupportedIdentityProviders:
        - COGNITO

  CognitoUserPoolResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: myapi
      Name: My API
      UserPoolId: !Ref CognitoUserPool
      Scopes:
        - ScopeName: read
          ScopeDescription: Read access
        - ScopeName: write
          ScopeDescription: Write access

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt CognitoUserPool.Arn
  UserPoolDomain:
    Description: Cognito Hosted UI Domain
    Value: !GetAtt CognitoUserPoolDomain.Domain
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient