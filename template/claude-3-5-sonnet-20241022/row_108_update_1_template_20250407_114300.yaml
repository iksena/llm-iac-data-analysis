AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for Cognito User Pool with admin-managed users'

Parameters:
  UserPoolName:
    Type: String
    Description: Name of the Cognito User Pool
    Default: MyUserPool
  
  CustomDomainPrefix:
    Type: String
    Description: Prefix for the Cognito domain
    AllowedPattern: ^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$
    
  PasswordMinimumLength:
    Type: Number
    Default: 12
    MinValue: 8
    MaxValue: 99
    
  EmailVerificationMessage:
    Type: String
    Default: 'Please click the link below to verify your email address: {####}'
    
  EmailVerificationSubject:
    Type: String
    Default: 'Verify your email for our app'
    
  TokenValidityUnits:
    Type: Number
    Default: 24
    Description: Access token validity in hours

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolAddOns:
        AdvancedSecurityMode: ENFORCED
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_LINK
        EmailMessage: !Ref EmailVerificationMessage
        EmailSubject: !Ref EmailVerificationSubject

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CustomDomainPrefix
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: DefaultClient
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: !Ref TokenValidityUnits
      IdTokenValidity: !Ref TokenValidityUnits
      TokenValidityUnits:
        AccessToken: 'hours'
        IdToken: 'hours'
        RefreshToken: 'days'
      AllowedOAuthFlows:
        - authorization_code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      SupportedIdentityProviders:
        - COGNITO

Outputs:
  UserPoolId:
    Description: ID of the Cognito User Pool
    Value: !Ref CognitoUserPool
    
  UserPoolClientId:
    Description: ID of the Cognito User Pool Client
    Value: !Ref CognitoUserPoolClient
    
  UserPoolDomain:
    Description: Domain name for the Cognito hosted UI
    Value: !Sub ${CustomDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
    
  HostedUIURL:
    Description: URL for the Cognito hosted UI
    Value: !Sub https://${CustomDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/login