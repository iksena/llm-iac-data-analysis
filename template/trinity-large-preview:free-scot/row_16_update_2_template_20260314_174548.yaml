AWSTemplateFormatVersion: '2010-09-09'

Resources:
  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: cloudtrail_logs

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail_crawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref CloudTrailDatabase
      Targets:
        S3Targets:
          - Path: s3://kk-admin/cloud-trail/AWSLogs/
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: cloudtrail_
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_NEW_FOLDERS_ONLY
      Configuration: |
        {
          "CrawlerOutput": {
            "Tables": {
              "Prefix": "cloudtrail_"
            }
          }
        }

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:Get*
                  - s3:List*
                Resource: arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*

Outputs:
  DatabaseName:
    Value: !Ref CloudTrailDatabase
  CrawlerName:
    Value: !Ref CloudTrailCrawler