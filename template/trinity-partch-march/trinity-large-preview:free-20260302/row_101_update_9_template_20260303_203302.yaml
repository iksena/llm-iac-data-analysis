AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC with flow logging configured to an S3 bucket.

Parameters:
  LogFilePrefix:
    Type: String
    Description: Optional prefix for log files in the S3 bucket
    Default: ''
  TrafficType:
    Type: String
    Description: The type of traffic to log
    AllowedValues:
      - ACCEPT
      - REJECT
      - ALL
    Default: ALL
  LogFormatVersion:
    Type: String
    Description: The format version of the flow logs
    AllowedValues:
      - v2
      - v1
    Default: v2

Resources:
  FlowLogS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'vpc-flow-logs-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: VPC Flow Logs Bucket

  FlowLogS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${FlowLogS3Bucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC with Flow Logs

  FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogS3BucketPolicy.Arn
      LogDestinationType: s3
      LogDestination: !GetAtt FlowLogS3Bucket.Arn
      LogFormat: !Ref LogFormatVersion
      TrafficType: !Ref TrafficType
      ResourceId: !Ref VPC
      ResourceType: VPC
      MaxAggregationInterval: 600

Outputs:
  FlowLogS3BucketName:
    Description: The name of the S3 bucket where VPC flow logs are stored
    Value: !Ref FlowLogS3Bucket
    Export:
      Name: FlowLogS3BucketName