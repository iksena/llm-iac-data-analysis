AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time Data Ingestion and Storage Pipeline using Kinesis Data Stream and Firehose'

Parameters:
  KinesisStreamShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis Data Stream
  KinesisStreamRetentionPeriod:
    Type: Number
    Default: 24
    Description: Data retention period in hours for the Kinesis Data Stream
  FirehoseBufferSize:
    Type: Number
    Default: 5
    Description: Buffer size in MB for Kinesis Data Firehose
  FirehoseBufferInterval:
    Type: Number
    Default: 300
    Description: Buffer interval in seconds for Kinesis Data Firehose

Resources:
  DataIngestionS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'data-ingestion-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataIngestionS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataIngestionS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !Sub '${DataIngestionS3Bucket.Arn}'
              - !Sub '${DataIngestionS3Bucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

  FirehoseIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'FirehoseDeliveryRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Sub '${AWS::AccountId}'
      Policies:
        - PolicyName: FirehoseS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:PutObject'
                Resource:
                  - !Sub '${DataIngestionS3Bucket.Arn}'
                  - !Sub '${DataIngestionS3Bucket.Arn}/*'

  KinesisDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub 'DataIngestionStream-${AWS::Region}'
      ShardCount: !Ref KinesisStreamShardCount
      RetentionPeriodHours: !Ref KinesisStreamRetentionPeriod
      StreamModeDetails:
        StreamMode: PROVISIONED

  KinesisDataFirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub 'DataIngestionFirehose-${AWS::Region}'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseIAMRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataIngestionS3Bucket.Arn
        BufferingHints:
          SizeInMBs: !Ref FirehoseBufferSize
          IntervalInSeconds: !Ref FirehoseBufferInterval
        CompressionFormat: UNCOMPRESSED
        Prefix: 'firehose/'
        ErrorOutputPrefix: 'firehose/error/'

Outputs:
  KinesisDataStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisDataStream.Arn
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref DataIngestionS3Bucket