AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StreamName:
    Type: String
    Default: MyStream
  ShardCount:
    Type: Number
    Default: 1

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAPIPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !Sub "arn:aws:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${StreamName}"

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisAPIGateway

  RecordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: record

  RecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref RecordResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:kinesis:action/PutRecord"
        RequestTemplates:
          application/json: !Sub |
            {
              "Data": "$util.base64Encode($input.path('$.Data'))",
              "PartitionKey": "$input.path('$.PartitionKey')",
              "StreamName": "${StreamName}"
            }
        IntegrationResponses:
          - StatusCode: 200
        PassthroughBehavior: NEVER
      MethodResponses:
        - StatusCode: 200

  RecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: records

  BatchRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:kinesis:action/PutRecords"
        RequestTemplates:
          application/json: !Sub |
            #set($inputRoot = $input.path('$'))
            {
              "Records": [
                #foreach($rec in $inputRoot.records)
                {
                  "Data": "$util.base64Encode($rec.Data)",
                  "PartitionKey": "$rec.PartitionKey"
                }#if($foreach.hasNext),#end
                #end
              ],
              "StreamName": "${StreamName}"
            }
        IntegrationResponses:
          - StatusCode: 200
        PassthroughBehavior: NEVER
      MethodResponses:
        - StatusCode: 200

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.querystring.shardIterator: true
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:kinesis:action/GetRecords"
        RequestParameters:
          integration.request.querystring.ShardIterator: method.request.querystring.shardIterator
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('ShardIterator')"
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                {
                  "Records": [
                    #foreach($rec in $input.path('$.Records'))
                    {
                      "Data": "$util.base64Decode($rec.Data)",
                      "PartitionKey": "$rec.PartitionKey",
                      "SequenceNumber": "$rec.SequenceNumber"
                    }#if($foreach.hasNext),#end
                    #end
                  ],
                  "NextShardIterator": "$input.path('$.NextShardIterator')"
                }
        PassthroughBehavior: NEVER
      MethodResponses:
        - StatusCode: 200

  ShardIteratorResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: shard-iterator

  ShardIteratorMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ShardIteratorResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:kinesis:action/GetShardIterator"
        RequestTemplates:
          application/json: !Sub |
            {
              "StreamName": "${StreamName}",
              "ShardId": "$input.path('$.ShardId')",
              "ShardIteratorType": "$input.path('$.ShardIteratorType')"
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                {
                  "ShardIterator": "$input.path('$.ShardIterator')"
                }
        PassthroughBehavior: NEVER
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RecordMethod
      - BatchRecordsMethod
      - GetRecordsMethod
      - ShardIteratorMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiDeployment

Outputs:
  APIEndpoint:
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  KinesisStreamName:
    Value: !Ref StreamName
  RoleARN:
    Value: !GetAtt ApiGatewayRole.Arn