AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Amazon Cognito User Pool with Administrator-Controlled Provisioning and Email Authentication'

Parameters:
  UserPoolName:
    Type: String
    Default: "SecureUserPool"
    Description: "Name of the Cognito User Pool"
  
  AdminEmail:
    Type: String
    Default: "admin@example.com"
    Description: "Administrator email for notifications"
  
  EmailVerificationMessage:
    Type: String
    Default: "Your verification code is {####}"
    Description: "Email verification message template"
  
  EmailVerificationSubject:
    Type: String
    Default: "Your verification code"
    Description: "Email verification subject line"
  
  MfaConfiguration:
    Type: String
    Default: "OFF"
    AllowedValues: ["OFF", "ON", "OPTIONAL"]
    Description: "MFA configuration for the user pool"

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:*
                Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
        - PolicyName: SESAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  AdminApprovalLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event, context) => {
            console.log('Admin Approval Lambda triggered:', JSON.stringify(event));
            const { triggerSource, request } = event;
            const { userPoolId, userName, userAttributes } = request;

            if (triggerSource === 'PreSignUp_AdminCreateUser') {
              // Admin approval logic
              if (userAttributes.email.endsWith('@example.com')) {
                return event;
              } else {
                throw new Error('User not authorized for this domain');
              }
            }
            return event;
          };
      Timeout: 10
      MemorySize: 128
      PackageType: Zip
      Architectures:
        - x86_64

  EmailVerificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const ses = new AWS.SES();

          exports.handler = async (event, context) => {
            console.log('Email Verification Lambda triggered:', JSON.stringify(event));
            const { triggerSource, request, response } = event;

            if (triggerSource === 'CustomMessage_SignUp' || triggerSource === 'CustomMessage_ResendCode') {
              const { userPoolId, userName, clientMetadata } = request;
              const email = request.codeParameter;

              const params = {
                Destination: {
                  ToAddresses: [email]
                },
                Message: {
                  Subject: {
                    Data: 'Your verification code'
                  },
                  Body: {
                    Text: {
                      Data: `Your verification code is: ${response.codeParameter}`
                    }
                  }
                },
                Source: 'admin@example.com'
              };

              try {
                await ses.sendEmail(params).promise();
                response.smsMessage = 'Verification code sent via email';
                response.emailSubject = 'Your verification code';
                response.emailMessage = `Your verification code is: ${response.codeParameter}`;
              } catch (error) {
                console.error('Error sending verification email:', error);
                throw new Error('Failed to send verification email');
              }
            }
            return response;
          };
      Timeout: 15
      MemorySize: 128
      PackageType: Zip
      Architectures:
        - x86_64

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: !Ref MfaConfiguration
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      VerificationMessageTemplate:
        DefaultEmailOption: "CONFIRM_WITH_CODE"
        EmailMessage: !Ref EmailVerificationMessage
        EmailSubject: !Ref EmailVerificationSubject
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        UnusedAccountValidityDays: 7
      LambdaConfig:
        PreSignUp: !GetAtt AdminApprovalLambda.Arn
        CustomMessage: !GetAtt EmailVerificationLambda.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: "WebAppClient"
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - CUSTOM_AUTH
        - USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: "secure-user-pool"
      UserPoolId: !Ref UserPool

  SSMAdminEmailParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/cognito/admin-email"
      Type: String
      Value: !Ref AdminEmail
      Description: "Administrator email for Cognito notifications"

Outputs:
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
    Export:
      Name: "CognitoUserPoolId"
  
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient
    Export:
      Name: "CognitoUserPoolClientId"
  
  UserPoolArn:
    Description: "Cognito User Pool ARN"
    Value: !GetAtt UserPool.Arn
    Export:
      Name: "CognitoUserPoolArn"