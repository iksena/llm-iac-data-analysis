AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable GuardDuty detector for EC2 security monitoring'

Resources:
  GuardDutyDetector:
    Type: 'AWS::GuardDuty::Detector'
    Properties:
      Enable: true
      FindingPublishingFrequency: 'SIX_HOURS'
      DataSources:
        EC2:
          Enable: true
      Tags:
        - Key: Environment
          Value: Production
        - Key: Service
          Value: SecurityMonitoring
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  GuardDutyDetectorId:
    Description: 'The ID of the GuardDuty detector'
    Value: !Ref GuardDutyDetector
  
  GuardDutyDetectorArn:
    Description: 'The ARN of the GuardDuty detector'
    Value: !GetAtt GuardDutyDetector.Arn
  
  AccountId:
    Description: 'The AWS Account ID where GuardDuty is enabled'
    Value: !Ref 'AWS::AccountId'