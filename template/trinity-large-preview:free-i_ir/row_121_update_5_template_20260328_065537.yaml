AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled Automation Workflow with EventBridge Scheduler and SSM

Resources:
  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  EC2SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  EC2LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe0d6  # Amazon Linux 2 AMI (us-east-1)
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      Tags:
        - Key: HelloWorld
          Value: 'true'

  EC2WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0b1d3d4c4d4d4d4d  # Windows Server 2019 Base (us-east-1)
      InstanceType: t3.micro
      IamInstanceProfile: !Ref EC2SSMInstanceProfile
      UserData:
        Fn::Base64: |
          <powershell>
          # Install SSM Agent if not present
          $agentPath = "C:\Program Files\Amazon\SSM\amazon-ssm-agent.exe"
          if (-Not (Test-Path $agentPath)) {
              Write-Host "Installing SSM Agent..."
              $url = "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/windows_amd64/AmazonSSMAgentSetup.exe"
              $output = "C:\AmazonSSMAgentSetup.exe"
              Invoke-WebRequest -Uri $url -OutFile $output
              Start-Process -FilePath $output -ArgumentList "/S" -Wait
          }
          # Start SSM Agent service
          Start-Service -Name "AmazonSSMAgent"
          </powershell>
      Tags:
        - Key: HelloWorld
          Value: 'true'

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '1.2'
        description: Cross-platform Hello World script
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: linuxStep
            inputs:
              runCommand:
                - echo 'Hello World! (Linux)'
            precondition:
              type: Platform
              StringEquals:
                - platformType
                - Linux
          - action: aws:runPowerShellScript
            name: windowsStep
            inputs:
              runCommand:
                - Write-Host 'Hello World! (Windows)'
            precondition:
              type: Platform
              StringEquals:
                - platformType
                - Windows

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: rate(15 minutes)

  EventBridgeInvokeSSMIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeSSM
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: FLEXIBLE
      Name: SSMSyncSchedule
      ScheduleExpression: rate(15 minutes)
      Target:
        Arn: arn:aws:ssm:us-east-1:123456789012:state-manager-run-association
        RoleArn: !GetAtt EventBridgeInvokeSSMIAMRole.Arn
        Input: '{}'

  S3LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ssm-automation-logs-123456789012

  S3LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub arn:aws:s3:::${S3LogBucket}/*

Outputs:
  LinuxInstanceId:
    Description: ID of the Linux EC2 instance
    Value: !Ref EC2LinuxInstance
  WindowsInstanceId:
    Description: ID of the Windows EC2 instance
    Value: !Ref EC2WindowsInstance
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref S3LogBucket
  ScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn