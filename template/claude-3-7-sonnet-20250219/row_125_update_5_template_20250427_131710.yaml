AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure REST API Gateway integrated with Amazon SES for sending templated emails via Lambda'

Parameters:
  SESRegion:
    Type: String
    Default: 'us-east-1'
    Description: 'The AWS region where SES is configured'
    
  EmailSender:
    Type: String
    Default: 'noreply@example.com'
    Description: 'The email address that will be used as the sender (must be verified in SES)'
    
  APIKeyName:
    Type: String
    Default: 'EmailServiceAPIKey'
    Description: 'Name for the API Key'
    
  UsagePlanName:
    Type: String
    Default: 'EmailServiceUsagePlan'
    Description: 'Name for the Usage Plan'
    
  MonthlyQuota:
    Type: Number
    Default: 10000
    Description: 'Monthly quota for API calls'
    
  RateLimit:
    Type: Number
    Default: 500
    Description: 'Rate limit for API calls per second'

Resources:
  # IAM Role for Lambda to invoke SES
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Path: '/'

  # IAM Policy for SES permissions
  SESLambdaPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: SESSendEmailPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ses:SendEmail'
              - 'ses:SendRawEmail'
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  # Lambda Function to send emails via SES
  EmailSenderFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn: SESLambdaPolicy
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs14.x
      Timeout: 30
      Environment:
        Variables:
          DEFAULT_SENDER: !Ref EmailSender
          SES_REGION: !Ref SESRegion
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          
          exports.handler = async (event, context) => {
            try {
              // Parse the incoming request body
              const body = JSON.parse(event.body);
              
              // Validate required fields
              if (!body.to || !body.subject || !body.body || !body.body.html) {
                return {
                  statusCode: 400,
                  headers: {
                    'Content-Type': 'application/json',
                    'Access-Control-Allow-Origin': '*'
                  },
                  body: JSON.stringify({
                    message: 'Bad request',
                    error: 'Missing required fields'
                  })
                };
              }
              
              // Configure SES
              const ses = new AWS.SES({ region: process.env.SES_REGION });
              
              // Prepare email parameters
              const params = {
                Source: body.from || process.env.DEFAULT_SENDER,
                Destination: {
                  ToAddresses: body.to
                },
                Message: {
                  Subject: {
                    Data: body.subject
                  },
                  Body: {
                    Html: {
                      Data: body.body.html
                    }
                  }
                }
              };
              
              // Add CC if provided
              if (body.cc && body.cc.length > 0) {
                params.Destination.CcAddresses = body.cc;
              }
              
              // Add BCC if provided
              if (body.bcc && body.bcc.length > 0) {
                params.Destination.BccAddresses = body.bcc;
              }
              
              // Add text body if provided
              if (body.body.text) {
                params.Message.Body.Text = {
                  Data: body.body.text
                };
              }
              
              // Send the email
              const result = await ses.sendEmail(params).promise();
              
              // Return success response
              return {
                statusCode: 200,
                headers: {
                  'Content-Type': 'application/json',
                  'Access-Control-Allow-Origin': '*'
                },
                body: JSON.stringify({
                  messageId: result.MessageId,
                  status: 'success'
                })
              };
            } catch (error) {
              console.error('Error sending email:', error);
              
              // Return error response
              return {
                statusCode: 500,
                headers: {
                  'Content-Type': 'application/json',
                  'Access-Control-Allow-Origin': '*'
                },
                body: JSON.stringify({
                  message: 'Internal server error',
                  error: error.message
                })
              };
            }
          };

  # Lambda Permission for API Gateway
  LambdaPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      Action: 'lambda:InvokeFunction'
      FunctionName: !Ref EmailSenderFunction
      Principal: 'apigateway.amazonaws.com'
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EmailAPI}/*'

  # API Gateway REST API
  EmailAPI:
    Type: 'AWS::ApiGateway::RestApi'
    Properties:
      Name: EmailService
      Description: 'API for sending emails via SES'
      EndpointConfiguration:
        Types:
          - REGIONAL
      ApiKeySourceType: HEADER

  # API Gateway Model for request validation
  EmailRequestModel:
    Type: 'AWS::ApiGateway::Model'
    Properties:
      RestApiId: !Ref EmailAPI
      ContentType: 'application/json'
      Description: 'Schema for email request validation'
      Name: EmailRequestModel
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        title: EmailRequest
        type: object
        required:
          - to
          - subject
          - body
        properties:
          to:
            type: array
            items:
              type: string
            minItems: 1
          cc:
            type: array
            items:
              type: string
          bcc:
            type: array
            items:
              type: string
          from:
            type: string
          subject:
            type: string
            minLength: 1
          body:
            type: object
            required:
              - html
            properties:
              html:
                type: string
              text:
                type: string

  # API Gateway Request Validator
  EmailRequestValidator:
    Type: 'AWS::ApiGateway::RequestValidator'
    Properties:
      RestApiId: !Ref EmailAPI
      Name: EmailRequestValidator
      ValidateRequestBody: true
      ValidateRequestParameters: false

  # API Gateway Resource
  EmailResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref EmailAPI
      ParentId: !GetAtt EmailAPI.RootResourceId
      PathPart: 'email'

  # API Gateway Method
  EmailPostMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestModels:
        'application/json': !Ref EmailRequestModel
      RequestValidatorId: !Ref EmailRequestValidator
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            'application/json': 'Empty'
          ResponseParameters:
            'method.response.header.Access-Control-Allow-Origin': true
        - StatusCode: '400'
          ResponseModels:
            'application/json': 'Error'
          ResponseParameters:
            'method.response.header.Access-Control-Allow-Origin': true
        - StatusCode: '500'
          ResponseModels:
            'application/json': 'Error'
          ResponseParameters:
            'method.response.header.Access-Control-Allow-Origin': true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EmailSenderFunction.Arn}/invocations'

  # API Gateway OPTIONS Method for CORS
  EmailOptionsMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      ApiKeyRequired: false
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            'method.response.header.Access-Control-Allow-Headers': true
            'method.response.header.Access-Control-Allow-Methods': true
            'method.response.header.Access-Control-Allow-Origin': true
          ResponseModels:
            'application/json': 'Empty'
      Integration:
        Type: MOCK
        RequestTemplates:
          'application/json': '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              'method.response.header.Access-Control-Allow-Headers': "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              'method.response.header.Access-Control-Allow-Methods': "'OPTIONS,POST'"
              'method.response.header.Access-Control-Allow-Origin': "'*'"
            ResponseTemplates:
              'application/json': ''

  # API Gateway Deployment
  EmailAPIDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    DependsOn:
      - EmailPostMethod
      - EmailOptionsMethod
    Properties:
      RestApiId: !Ref EmailAPI
      Description: 'Deployment for Email API'

  # API Gateway Stage
  EmailAPIStage:
    Type: 'AWS::ApiGateway::Stage'
    Properties:
      RestApiId: !Ref EmailAPI
      DeploymentId: !Ref EmailAPIDeployment
      StageName: 'prod'
      Description: 'Production stage for Email API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  # API Gateway API Key
  EmailAPIKey:
    Type: 'AWS::ApiGateway::ApiKey'
    DependsOn:
      - EmailAPIStage
    Properties:
      Name: !Ref APIKeyName
      Description: 'API Key for Email Service'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailAPI
          StageName: 'prod'

  # API Gateway Usage Plan
  EmailUsagePlan:
    Type: 'AWS::ApiGateway::UsagePlan'
    DependsOn:
      - EmailAPIStage
    Properties:
      UsagePlanName: !Ref UsagePlanName
      Description: 'Usage plan for Email API'
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: 'prod'
      Quota:
        Limit: !Ref MonthlyQuota
        Period: MONTH
      Throttle:
        RateLimit: !Ref RateLimit
        BurstLimit: !Ref RateLimit

  # API Gateway Usage Plan Key
  EmailUsagePlanKey:
    Type: 'AWS::ApiGateway::UsagePlanKey'
    Properties:
      KeyId: !Ref EmailAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref EmailUsagePlan

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL for prod stage'
    Value: !Sub 'https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/email'
  
  ApiKeyId:
    Description: 'API Key ID'
    Value: !Ref EmailAPIKey
  
  ApiKeyValue:
    Description: 'API Key Value (retrieve from AWS Console or CLI)'
    Value: !Sub 'Use AWS CLI command: aws apigateway get-api-key --api-key ${EmailAPIKey} --include-value --region ${AWS::Region}'
  
  UsagePlanId:
    Description: 'Usage Plan ID'
    Value: !Ref EmailUsagePlan
  
  LambdaFunction:
    Description: 'Lambda function that processes email requests'
    Value: !Ref EmailSenderFunction