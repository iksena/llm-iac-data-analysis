AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with Secure Role-Based Access Controls and Cross-Account Trust

Parameters:
  TrustedIdentityManagementAccount:
    Type: String
    Default: '123456789012'
    Description: Account ID of the Identity Management Account
  TrustedToolingManagementAccount:
    Type: String
    Default: '234567890123'
    Description: Account ID of the Tooling Management Account

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      Policies:
        - PolicyName: PrivilegedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'sts:AssumeRole'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:MultiFactorAuthPresent': 'true'

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      Policies:
        - PolicyName: RestrictedAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:MultiFactorAuthPresent': 'true'

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      Policies:
        - PolicyName: IdentityAdminPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:MultiFactorAuthPresent': 'true'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: PrivilegedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                  - 'sts:AssumeRole'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:ViewBilling'
                  - 'cloudhsm:*'
                Resource: '*'

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: RestrictedAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:ViewBilling'
                  - 'cloudhsm:*'
                Resource: '*'

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${AWS::AccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedIdentityManagementAccount}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'aws:MultiFactorAuthPresent': 'true'
      Policies:
        - PolicyName: IdentityAdminRolePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:*'
                  - 'organizations:*'
                Resource: '*'
              - Effect: Deny
                Action:
                  - 'aws-portal:ViewBilling'
                  - 'cloudhsm:*'
                Resource: '*'

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:*'
                  - 'iam:*'
                  - 'ec2:*'
                  - 's3:*'
                  - 'rds:*'
                  - 'logs:*'
                Resource: '*'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSCloudFormationStackSetAdministrationPolicy'

Outputs:
  PrivilegedAdminGroupArn:
    Description: ARN of the PrivilegedAdmin Group
    Value: !GetAtt PrivilegedAdminGroup.Arn
  RestrictedAdminGroupArn:
    Description: ARN of the RestrictedAdmin Group
    Value: !GetAtt RestrictedAdminGroup.Arn
  IdentityAdminGroupArn:
    Description: ARN of the IdentityAdmin Group
    Value: !GetAtt IdentityAdminGroup.Arn
  PrivilegedAdminRoleArn:
    Description: ARN of the PrivilegedAdmin Role
    Value: !GetAtt PrivilegedAdminRole.Arn
  RestrictedAdminRoleArn:
    Description: ARN of the RestrictedAdmin Role
    Value: !GetAtt RestrictedAdminRole.Arn
  IdentityAdminRoleArn:
    Description: ARN of the IdentityAdmin Role
    Value: !GetAtt IdentityAdminRole.Arn
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleArn:
    Description: ARN of the StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn