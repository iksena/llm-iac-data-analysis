AWSTemplateFormatVersion: '2010-09-09'
Description: 'IoT Core to SQS via SNS data pipeline with improved security and reliability'

Resources:
  IoTDataQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Join 
        - '-'
        - - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
          - 'iot-data-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  IoTDataTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Join 
        - '-'
        - - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
          - 'iot-data-topic'
      Tags:
        - Key: Purpose
          Value: IoTDataPipeline

  IoTDataTopicPolicy:
    Type: 'AWS::SNS::TopicPolicy'
    DependsOn: IoTDataTopic
    Properties:
      Topics:
        - !Ref IoTDataTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIoTPublish
            Effect: Allow
            Principal:
              Service: 'iot.amazonaws.com'
            Action: 'sns:Publish'
            Resource: !Ref IoTDataTopic

  QueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    DependsOn: IoTDataQueue
    Properties:
      Queues:
        - !Ref IoTDataQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: 'sns.amazonaws.com'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt IoTDataQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref IoTDataTopic

  QueueSubscription:
    Type: 'AWS::SNS::Subscription'
    DependsOn: 
      - IoTDataTopic
      - IoTDataQueue
    Properties:
      TopicArn: !Ref IoTDataTopic
      Protocol: 'sqs'
      Endpoint: !GetAtt IoTDataQueue.Arn
      RawMessageDelivery: true

  IoTRuleRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'iot.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns: []
      Policies:
        - PolicyName: !Join 
            - '-'
            - - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
              - 'iot-sns-publish'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sns:Publish'
                Resource: !Ref IoTDataTopic

  IoTDataRule:
    Type: 'AWS::IoT::TopicRule'
    DependsOn: 
      - IoTRuleRole
      - IoTDataTopic
    Properties:
      RuleName: !Join 
        - '_'
        - - !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
          - 'data_rule'
      TopicRulePayload:
        RuleDisabled: false
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTDataTopic
              RoleArn: !GetAtt IoTRuleRole.Arn
              MessageFormat: 'RAW'
        ErrorAction:
          RepublishAction:
            RoleArn: !GetAtt IoTRuleRole.Arn
            Topic: 'error/device/data'

Outputs:
  QueueURL:
    Description: 'URL of the SQS Queue'
    Value: !Ref IoTDataQueue

  QueueARN:
    Description: 'ARN of the SQS Queue'
    Value: !GetAtt IoTDataQueue.Arn

  TopicARN:
    Description: 'ARN of the SNS Topic'
    Value: !Ref IoTDataTopic

  RuleName:
    Description: 'Name of the IoT Rule'
    Value: !Ref IoTDataRule