AWSTemplateFormatVersion: '2010-09-09'
Resources:
  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub ${AWS::StackName}-firehose-stream
      DeliveryStreamType: DirectPut
      DeliveryStreamEncryptionConfigurationInput:
        KeyType: AWS_OWNED_CMK
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub arn:${AWS::Partition}:s3:::${AWS::NoValue}
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 5
        CompressionFormat: UNCOMPRESSED
        ErrorOutputPrefix: error/!{firehose:error-output-type}
        Prefix: logs/
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref CloudWatchLogsLogGroup
          LogStreamName: !Ref CloudWatchLogsLogStream
        RoleARN: !GetAtt FirehoseRole.Arn

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseServiceRolePolicy

  CloudWatchLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-firehose-errors
      RetentionInDays: 30

  CloudWatchLogsLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref CloudWatchLogsLogGroup
      LogStreamName: !Sub ${AWS::StackName}-firehose-error-stream

Outputs:
  DeliveryStreamName:
    Description: The name of the Firehose delivery stream
    Value: !Ref FirehoseDeliveryStream
    Export:
      Name: !Sub ${AWS::StackName}-DeliveryStreamName

  DeliveryStreamARN:
    Description: The ARN of the Firehose delivery stream
    Value: !GetAtt FirehoseDeliveryStream.Arn
    Export:
      Name: !Sub ${AWS::StackName}-DeliveryStreamARN