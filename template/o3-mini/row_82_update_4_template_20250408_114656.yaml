AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted, private S3 bucket for ALB access logs with a 90-day auto-expiration policy and a bucket policy that allows AWS ELB accounts and delivery.logs.amazonaws.com to write logs.
Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: albaccesslogsbucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowELBLogDelivery_PutObject
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"
          - Sid: AllowELBLogDelivery_PutObjectAcl
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObjectAcl
            Resource: !Sub "arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*"
          - Sid: AllowAWS_ELB_Account_PutObject
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::127311923021:root
            Action: s3:PutObject
            Resource: !Sub "arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": "bucket-owner-full-control"
          - Sid: AllowAWS_ELB_Account_PutObjectAcl
            Effect: Allow
            Principal:
              AWS: arn:aws:iam::127311923021:root
            Action: s3:PutObjectAcl
            Resource: !Sub "arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/*"
Outputs:
  BucketName:
    Description: Name of the ALB access logs S3 bucket.
    Value: !Ref ALBAccessLogsBucket
  BucketArn:
    Description: ARN of the ALB access logs S3 bucket.
    Value: !GetAtt ALBAccessLogsBucket.Arn