AWSTemplateFormatVersion: '2010-09-09'
Description: >
  This CloudFormation template creates a centralized Amazon SNS Topic with secure cross-service
  notification capabilities and an email subscription for aggregated alerts and events from AWS services.

Parameters:
  EmailAddress:
    Description: "The email address to subscribe to SNS notifications."
    Type: String

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "Centralized Alerts Topic"
      TopicName: "centralized-alerts-topic"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: "AllowPublishFromSameAccount"
            Effect: Allow
            Principal:
              AWS: "*"
            Action:
              - "SNS:Publish"
            Resource: !Ref SNSTopic
            Condition:
              StringEquals:
                "AWS:SourceOwner": !Ref AWS::AccountId

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: email
      Endpoint: !Ref EmailAddress
      TopicArn: !Ref SNSTopic

Outputs:
  SNSTopicARN:
    Description: "The ARN of the centralized SNS Topic."
    Value: !Ref SNSTopic