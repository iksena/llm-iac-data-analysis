AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Macie session for automated sensitive data discovery and security monitoring.

Resources:
  MacieSession:
    Type: AWS::Macie2::Macie
    Properties:
      Status: ENABLED

Outputs:
  MacieSessionStatus:
    Description: Status of the Macie session
    Value: !GetAtt MacieSession.Status