AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SNSTopic:
    Type: AWS::SNS::Topic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${S3Bucket}'
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref SNSTopic

Outputs:
  S3BucketName:
    Value: !Ref S3Bucket
  SNSTopicArn:
    Value: !Ref SNSTopic