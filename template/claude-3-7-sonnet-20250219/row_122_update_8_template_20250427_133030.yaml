AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge integration with Shopify product creation API'

Parameters:
  ShopifyAdminAPIKey:
    Type: String
    Description: Shopify Admin API Key for authentication
    NoEcho: true
    Default: dummy-api-key-for-testing-replace-in-production
  
  ShopifyShopName:
    Type: String
    Description: The name of your Shopify shop (e.g., 'testanu' for testanu.myshopify.com)
    Default: testanu
  
  ShopifyAPIVersion:
    Type: String
    Description: Shopify API version to use
    Default: '2023-10'
  
  EventSourceName:
    Type: String
    Description: The source name for events to be captured
    Default: MyShopifyApp

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: ShopifyBus
      
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeInvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'
      
  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: ShopifyConn
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Shopify-Access-Token
          ApiKeyValue: !Ref ShopifyAdminAPIKey
          
  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyDest
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      InvocationEndpoint: !Sub 'https://${ShopifyShopName}.myshopify.com/admin/api/${ShopifyAPIVersion}/products.json'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      
  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ShopifyRule
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - !Ref EventSourceName
        detail-type:
          - "Product Update"
      State: ENABLED
      Targets:
        - Id: ShopifyTarget
          Arn: !GetAtt ShopifyApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              title: "$.detail.title"
              description: "$.detail.description"
              price: "$.detail.price"
              vendor: "$.detail.vendor"
            InputTemplate: '{"product":{"title":<title>,"body_html":<description>,"vendor":<vendor>,"variants":[{"price":<price>}]}}'

Outputs:
  EventBusArn:
    Description: ARN of the EventBridge Event Bus
    Value: !GetAtt ShopifyEventBus.Arn
    
  EventBusName:
    Description: Name of the EventBridge Event Bus
    Value: !Ref ShopifyEventBus
    
  ApiDestinationArn:
    Description: ARN of the Shopify API Destination
    Value: !GetAtt ShopifyApiDestination.Arn
    
  ConnectionArn:
    Description: ARN of the Shopify Connection
    Value: !GetAtt ShopifyConnection.Arn