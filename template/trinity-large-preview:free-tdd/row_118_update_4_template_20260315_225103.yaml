AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow to enrich SQS messages with external API data and log results

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgePipesQueue

  APIDestination:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ZipCodeAPI
      Description: API Destination for Zip Code lookup
      EndpointConfiguration:
        Types:
          - REGIONAL

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: EventBridgePipesLogGroup
      RetentionInDays: 30

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipesRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:endpoint/api/*'

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ZipCodeEnrichmentRule
      EventPattern:
        source:
          - aws.sqs
        detail-type:
          - SQS Message
        detail:
          queueArn:
            - !GetAtt SQSQueue.Arn
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${APIDestination.Id}/execute-api'
          Id: ZipCodeAPI
          RoleArn: !GetAtt IAMRole.Arn
          InputTransformer:
            InputPathsMap:
              zipCode: "$.body"
            InputTemplate: '{"query": {"zip": <zipCode>}}'

  LogSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      LogGroupName: !Ref LogGroup
      FilterPattern: ""
      DestinationArn: !Sub 'arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${APIDestination.Id}/execute-api'