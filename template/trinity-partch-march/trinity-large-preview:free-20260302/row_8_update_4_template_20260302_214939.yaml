AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudWatch Dashboard with VPC flow logs insights for NAT Gateway

Parameters:
  DashboardName:
    Type: String
    Default: NATGatewayFlowLogsDashboard
    Description: Name of the CloudWatch Dashboard
  LogGroupName:
    Type: String
    Default: /aws/vpc/flow-logs
    Description: Name of the CloudWatch Log Group containing VPC flow logs
  Region:
    Type: String
    Default: us-east-1
    Description: AWS Region where the resources are located

Resources:
  NATGatewayFlowLogsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' | stats sum(bytes) as totalBytes by srcAddr | sort totalBytes desc | limit 10",
                "region": "${Region}",
                "view": "table",
                "stacked": false,
                "title": "Top Source IPs by Outbound Traffic"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' and action = 'REJECT' | stats count(*) as rejectedConnections by srcAddr | sort rejectedConnections desc | limit 10",
                "region": "${Region}",
                "view": "table",
                "stacked": false,
                "title": "Top Source IPs by Rejected Connections"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' and action = 'ACCEPT' and dstAddr like '10.%' | stats sum(bytes) as totalBytes by dstAddr | sort totalBytes desc | limit 10",
                "region": "${Region}",
                "view": "table",
                "stacked": false,
                "title": "Top Destination IPs by Accepted Connections"
              }
            },
            {
              "type": "log",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "query": "SOURCE '${LogGroupName}' | filter interfaceId like 'eni-' and action = 'REJECT' and dstAddr like '10.%' | stats count(*) as rejectedConnections by dstAddr | sort rejectedConnections desc | limit 10",
                "region": "${Region}",
                "view": "table",
                "stacked": false,
                "title": "Top Destination IPs by Rejected Connections"
              }
            }
          ]
        }

Outputs:
  DashboardUrl:
    Description: URL of the created CloudWatch Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#/dashboards/view/${DashboardName}