AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Amplify web application with production branch for TodoApp

Parameters:
  AppName:
    Type: String
    Default: TodoApp
    Description: Name of the Amplify application
  Repository:
    Type: String
    Default: https://github.com/yourusername/todoapp.git
    Description: Git repository URL for the application
  OAuthToken:
    Type: String
    NoEcho: true
    Default: dummy-token
    Description: OAuth token for accessing the repository

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AppName}-AmplifyRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AmplifyPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - amplify:*
                  - amplifybackend:*
                  - amplifyuibuilder:*
                  - apps:*
                  - cloudformation:*
                  - codebuild:*
                  - cognito:*
                  - dynamodb:*
                  - ec2:*
                  - elasticloadbalancing:*
                  - events:*
                  - iam:*
                  - lambda:*
                  - logs:*
                  - s3:*
                  - ssm:*
                  - tag:getResources
                Resource: '*'

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      OauthToken: !Ref OAuthToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm install
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      AutoBranchCreationConfig:
        EnableAutoBuild: true
        EnableAutoBranchCreation: true
        EnablePullRequestPreview: true
        PullRequestEnvironmentName: pull-request
        Stage: DEVELOPMENT
        BuildSpec: |
          version: 1
          frontend:
            phases:
              build:
                commands:
                  - npm install
                  - npm run build
            artifacts:
              baseDirectory: build
              files:
                - '**/*'
            cache:
              paths:
                - node_modules/**/*

  AmplifyProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: production
      Description: Production branch for TodoApp
      EnableAutoBuild: true
      Stage: PRODUCTION
      BuildSpec: |
        version: 1
        frontend:
          phases:
            build:
              commands:
                - npm install
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId
  AmplifyAppUrl:
    Description: Amplify Application URL
    Value: !GetAtt AmplifyApp.DefaultDomain