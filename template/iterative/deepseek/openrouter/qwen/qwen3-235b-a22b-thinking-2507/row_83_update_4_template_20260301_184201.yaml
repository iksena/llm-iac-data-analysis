AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a Transit Gateway with RAM sharing for cross-account VPC connectivity
Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      TransitGatewayName: !Sub '${AWS::StackName}-TransitGateway'
      BgpAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: !Sub '${AWS::StackName}-TGW-Share'
      ResourceArns:
        - !Sub
            - 'arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:transit-gateway:${tgwId}'
            tgwId: !Ref TransitGateway
      Principals:
        - '644519422710'
    DependsOn: TransitGateway
Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'
  ResourceShareId:
    Description: ID of the RAM Resource Share
    Value: !Select [1, !Split ["/", !Ref ResourceShare]]
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'