AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a Transit Gateway and share it via RAM

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable
      Description: Centralized Transit Gateway for cross-VPC connectivity
      Tags:
        - Key: Name
          Value: CentralizedTGW

  TransitGatewayResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      allowExternalPrincipals: false
      clientToken: !Sub '${AWS::StackName}-${AWS::Region}-resource-share'
      name: TransitGatewayResourceShare
      principals:
        - '644519422710'
      resourceArns:
        - !GetAtt TransitGateway.Arn
      tags:
        - Key: Name
          Value: TransitGatewayResourceShare

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref TransitGatewayResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'