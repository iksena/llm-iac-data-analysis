AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template that creates a VPC with a public subnet,
  then launches an Amazon Linux 2 EC2 instance with ephemeral drives.
  The instance retrieves the latest Amazon Linux 2 AMI ID from SSM Parameter Store.
  A Lambda-backed custom resource creates an SSH key pair for secure SSH access.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-VPC"

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-PublicSubnet"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-IGW"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-PublicRT"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  KeyPairLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: KeyPairManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                  - ec2:DescribeKeyPairs
                Resource: "*"

  KeyPairLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt KeyPairLambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import traceback

          http = urllib3.PoolManager()

          def send_response(event, context, response_status, response_data, physical_resource_id):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': 'See CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              try:
                  http.request('PUT', response_url, body=json_response_body, headers=headers)
              except Exception as e:
                  print("send_response failed: " + str(e))

          def lambda_handler(event, context):
              print("Received event: " + json.dumps(event))
              response_data = {}
              physical_resource_id = None
              try:
                  if event['RequestType'] == 'Create':
                      ec2 = boto3.client('ec2')
                      key_name = event['ResourceProperties'].get('KeyPairName', 'CFNKeyPair-' + context.aws_request_id[:8])
                      create_response = ec2.create_key_pair(KeyName=key_name)
                      response_data = {
                          "KeyName": create_response["KeyName"],
                          "KeyMaterial": create_response["KeyMaterial"]
                      }
                      physical_resource_id = create_response["KeyName"]
                  elif event['RequestType'] == 'Update':
                      physical_resource_id = event['PhysicalResourceId']
                      response_data = {"KeyName": physical_resource_id}
                  elif event['RequestType'] == 'Delete':
                      ec2 = boto3.client('ec2')
                      key_name = event['PhysicalResourceId']
                      try:
                          ec2.delete_key_pair(KeyName=key_name)
                      except Exception as e:
                          print("DeleteKeyPair Exception: " + str(e))
                      physical_resource_id = key_name
                      response_data = {}
                  send_response(event, context, "SUCCESS", response_data, physical_resource_id)
              except Exception as e:
                  print("Exception: " + traceback.format_exc())
                  send_response(event, context, "FAILED", {"Message": str(e)}, physical_resource_id)

  EC2KeyPairCustomResource:
    Type: Custom::EC2KeyPair
    Properties:
      ServiceToken: !GetAtt KeyPairLambda.Arn
      KeyPairName: !Sub "${AWS::StackName}-InstanceKeyPair"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref PublicSubnet
      KeyName: !GetAtt EC2KeyPairCustomResource.KeyName
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-ebs:1}}"
      BlockDeviceMappings:
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1

Outputs:
  VPCId:
    Description: The ID of the created VPC.
    Value: !Ref VPC
  SubnetId:
    Description: The ID of the public subnet.
    Value: !Ref PublicSubnet
  InstanceId:
    Description: The ID of the launched EC2 instance.
    Value: !Ref EC2Instance
  SSHKeyPairName:
    Description: The name of the SSH key pair created for secure access.
    Value: !GetAtt EC2KeyPairCustomResource.KeyName