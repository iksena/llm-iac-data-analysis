AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Music API with API Gateway and DynamoDB integration

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      AttributeDefinitions:
        - AttributeName: SongId
          AttributeType: S
        - AttributeName: Artist
          AttributeType: S
      KeySchema:
        - AttributeName: SongId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: APIGatewayDynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt MusicTable.Arn

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicApi
      Description: API for managing music data

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: music

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem"
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "SongId": {"S": "$context.requestId"},
                "Artist": {"S": "$input.path('$.artist')"},
                "Album": {"S": "$input.path('$.album')"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                {
                  "status": "success"
                }
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: "Empty"

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query"
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :artist",
              "ExpressionAttributeValues": {
                ":artist": {"S": "$input.params('artist')"}
              }
            }
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "items": $inputRoot.Items
                }
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: "Empty"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId: !Ref MusicApi
      Description: Production deployment

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref MusicApi
      DeploymentId: !Ref ApiDeployment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: true

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicApiKey
      Enabled: true
      StageKeys:
        - RestApiId: !Ref MusicApi
          StageName: !Ref ApiStage

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      Description: Music API Usage Plan
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: !Ref ApiStage
      Throttle:
        BurstLimit: 100
        RateLimit: 50
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  ApiEndpoint:
    Description: Base URL for API Gateway stage
    Value: !Sub "https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  ApiKey:
    Description: API Key for accessing the Music API
    Value: !Ref ApiKey
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref MusicTable