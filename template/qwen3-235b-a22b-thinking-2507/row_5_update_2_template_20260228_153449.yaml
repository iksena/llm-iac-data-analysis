AWSTemplateFormatVersion: '2010-09-09'
Description: Production-ready DynamoDB table for artist concert ticket sales tracking
Parameters:
  TableName:
    Type: String
    Default: ArtistConcertTicketSalesTable
    Description: Name of the DynamoDB table to be created
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: Must be a valid DynamoDB table name
  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    Description: Billing mode for the DynamoDB table
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
  ReadCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000
    Description: Read capacity units for PROVISIONED billing mode
  WriteCapacityUnits:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10000
    Description: Write capacity units for PROVISIONED billing mode
Conditions:
  UseProvisionedBilling:
    Fn::Equals:
      - Ref: BillingMode
      - PROVISIONED
Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: !If
        - UseProvisionedBilling
        - 
          ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      PointInTimeRecoverySpecification:
        Enabled: true
    DeletionPolicy: Retain
Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref ArtistConcertTicketSalesTable
  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt ArtistConcertTicketSalesTable.Arn