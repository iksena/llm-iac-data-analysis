AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ALBAccessLogsBucket
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90
            Filter:
              Prefix: ""
      Tags:
        - Key: Name
          Value: ALBAccessLogsBucket

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ELBLoggingPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'
          - Sid: ELBAccountPermissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'
          - Sid: DeliveryLogsPermissions
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: DeliveryLogsGetObject
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetObjectAcl
            Resource: !Sub 'arn:aws:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'