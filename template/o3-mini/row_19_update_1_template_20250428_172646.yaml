AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to configure Amazon EventBridge to route custom events from a custom event bus
  to an external API endpoint via HTTPS using an API Destination and Connection secured by an API Key.

Parameters:
  ApiKeyValue:
    Description: API key used for authenticating requests to the external endpoint.
    Type: String
    NoEcho: true

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  APIConnection:
    Type: AWS::Events::Connection
    Properties:
      ConnectionName: ApiKeyConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: x-api-key
          ApiKeyValue: !Ref ApiKeyValue

  APIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ApiDestinationName: ExternalWebhookDestination
      Description: API Destination for routing events to external HTTPS endpoint.
      ConnectionArn: !GetAtt APIConnection.Arn
      InvocationEndpoint: 'https://webhook.site/testtest'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  EventsInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeInvocationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt APIConnection.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: CustomEventRule
      Description: Rule to route custom events from the custom event bus to the API destination.
      EventBusName: !Ref CustomEventBus
      EventPattern:
        source:
          - "custom.myapp"
      Targets:
        - Id: ApiDestinationTarget
          Arn: !GetAtt APIDestination.Arn
          RoleArn: !GetAtt EventsInvocationRole.Arn

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge event bus.
    Value: !Ref CustomEventBus
  APIConnectionArn:
    Description: ARN of the EventBridge API Connection.
    Value: !GetAtt APIConnection.Arn
  APIDestinationArn:
    Description: ARN of the EventBridge API Destination.
    Value: !GetAtt APIDestination.Arn
  InvocationRoleArn:
    Description: ARN of the IAM Role used by EventBridge for API invocation.
    Value: !GetAtt EventsInvocationRole.Arn