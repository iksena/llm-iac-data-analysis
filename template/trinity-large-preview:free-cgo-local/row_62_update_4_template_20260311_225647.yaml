AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '3.02.0'
      DatabaseName: myDatabase
      MasterUsername: admin
      MasterUserPassword: {{resolve:secretsmanager:aurora-admin-secret:SecretString:password}}
      DBClusterParameterGroupName: default.aurora-mysql3.02
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref DBParameterGroup
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBClusterIdentifier: !Ref AuroraCluster
      DBParameterGroupName: !Ref DBParameterGroup
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: aurora-mysql3.02
      Description: Custom parameter group for Aurora MySQL
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO'

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Aurora Reader Endpoint
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address