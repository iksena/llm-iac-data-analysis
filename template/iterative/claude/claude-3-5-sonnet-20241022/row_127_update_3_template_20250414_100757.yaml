AWSTemplateFormatVersion: '2010-09-01'
Description: 'CloudFormation template for EFS file system in testing environment'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be created

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet ID in us-east-1a for EFS mount target

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: efs-security-group
        - Key: Environment
          Value: Testing

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Tags:
        - Key: Name
          Value: TestEFSFileSystem
        - Key: Environment
          Value: Testing

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  FileSystemId:
    Description: ID of the EFS File System
    Value: !Ref FileSystem

  FileSystemDNSName:
    Description: DNS name of the EFS File System
    Value: !Join 
      - ''
      - - !Ref FileSystem
        - .efs.
        - !Ref AWS::Region
        - .amazonaws.com

  MountTargetId:
    Description: ID of the Mount Target
    Value: !Ref MountTarget

  SecurityGroupId:
    Description: ID of the Security Group created for EFS
    Value: !Ref EFSSecurityGroup