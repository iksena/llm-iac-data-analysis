AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog with S3 and Lambda permissions

Resources:
  ServiceCatalogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalogS3LambdaRole
      Path: /servicecatalog/
      Description: IAM Role for AWS Service Catalog to provision S3 and Lambda resources
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ServiceCatalogOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:TerminateProvisionedProduct
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:DeleteFunction
                  - lambda:UpdateFunctionCode
                  - lambda:InvokeFunction
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:UpdateStack
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:Publish
                  - sns:Subscribe
                Resource: '*'

Outputs:
  ServiceCatalogIAMRoleArn:
    Description: ARN of the Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogIAMRole.Arn
    Export:
      Name: ServiceCatalogIAMRoleArn