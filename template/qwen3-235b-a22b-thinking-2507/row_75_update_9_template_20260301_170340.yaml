AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready Windows CPU Stress Testing Environment with SSM and FIS Integration'

Parameters:
  InstanceType:
    Description: EC2 instance type for stress testing (t3.nano to t3.large)
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
    ConstraintDescription: Must be a valid t3 instance type between nano and large

  KeyName:
    Description: Name of an existing EC2 key pair for RDP access (optional)
    Type: String
    Default: ''
    AllowedPattern: '^(?:[a-zA-Z0-9/_\-.]+)?$'
    MaxLength: '255'
    ConstraintDescription: Can contain only alphanumeric characters, spaces, underscores, hyphens, and periods

  SubnetId:
    Description: Subnet ID for EC2 instance deployment
    Type: AWS::EC2::Subnet::Id

  VpcId:
    Description: VPC ID containing the specified subnet
    Type: AWS::EC2::VPC::Id

  WindowsAMI:
    Description: SSM Parameter Store path for Windows Server 2019 AMI
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'

  StressDuration:
    Description: Duration of CPU stress test in seconds
    Type: Number
    Default: 300
    MinValue: 60
    MaxValue: 3600
    ConstraintDescription: Must be between 60-3600 seconds

  SsmDocumentName:
    Description: Name for the custom SSM document
    Type: String
    Default: CPU-Stress-Test
    AllowedPattern: '^[a-zA-Z0-9_\-.]{3,128}$'
    ConstraintDescription: Must contain only alphanumeric characters, underscores, hyphens, and periods (3-128 characters)

  FisRoleName:
    Description: Name for the FIS service role
    Type: String
    Default: FIS-SSM-Role
    AllowedPattern: '^[a-zA-Z0-9_+=,.@-]{1,64}$'
    ConstraintDescription: Must contain only alphanumeric characters and _+=,.@- (1-64 characters)

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EC2-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-EC2-Profile'
      Roles:
        - !Ref EC2InstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Windows stress testing instance
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAMI
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      UserData:
        Fn::Base64: |
          <powershell>
          try {
            Set-WSManQuickConfig -Force -SkipNetworkProfileCheck
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force | Out-Null
            Install-Module -Name ThreadJob -Force -AllowClobber | Out-Null
            Write-Output "Successfully configured instance for stress testing"
          }
          catch {
            Write-Output "Error configuring instance: $_"
            exit 1
          }
          </powershell>
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Stress-Test-Instance'

  CpuStressDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Ref SsmDocumentName
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'Runs CPU stress test matching logical processor count'
        parameters:
          Duration:
            type: Integer
            description: 'Duration of stress test in seconds'
            default: !Ref StressDuration
            minValue: 60
            maxValue: 3600
        runtimeConfig:
          aws:runPowerShellScript:
            properties:
              - id: runScript
                runCommand:
                  - |
                    $duration = {{ Duration }}
                    $cores = [System.Environment]::ProcessorCount
                    Write-Output "Starting CPU stress test for $duration seconds with $cores threads"
                    1..$cores | ForEach-Object {
                      Start-ThreadJob -ScriptBlock {
                        param($secs)
                        $endTime = (Get-Date).AddSeconds($secs)
                        while ((Get-Date) -lt $endTime) {
                          $null = 1 + 1
                        }
                      } -ArgumentList $duration
                    }
                    Get-Job | Wait-Job | Out-Null
                    Get-Job | Receive-Job
                    Get-Job | Remove-Job | Out-Null

  FisRole:
    Type: AWS::IAM::Role
    DependsOn: CpuStressDocument
    Properties:
      RoleName: !Ref FisRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: fis.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FisSsmExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:GetCommandInvocation
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:document/${SsmDocumentName}'
                  - !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:instance/*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WindowsInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  SsmDocumentNameOutput:
    Description: SSM Document Name for CPU stress test
    Value: !Ref SsmDocumentName
    Export:
      Name: !Sub '${AWS::StackName}-SsmDocument'

  FisRoleArn:
    Description: ARN of FIS service role for experiment execution
    Value: !GetAtt FisRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FisRoleArn'

  InstancePublicIp:
    Description: Public IP address of the Windows instance
    Value: !GetAtt WindowsInstance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'