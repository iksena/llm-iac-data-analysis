AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB streams with EventBridge for event-driven workflows

Parameters:
  TableName:
    Type: String
    Default: UserDataTable
    Description: Name of the DynamoDB table
  EventBusName:
    Type: String
    Default: UserDataTableEventBus
    Description: Name of the EventBridge event bus
  PipeName:
    Type: String
    Default: UserDataTableToEventBridgePipe
    Description: Name of the EventBridge pipe

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Ref PipeName
      Source:
        Type: DynamoDB
        Parameters:
          SourceAccessConfiguration:
            - Type: BASIC_AUTH
              Value: !GetAtt PipeRole.Arn
      Target:
        Type: EventBridgeEventBus
        Parameters:
          DetailType: UserAvatarUpdated
          Source: com.company.user.avatar
          EventBusName: !Ref EventBusName
      FilterCriteria:
        Filters:
          - Field: detail.avatarUrl
            Type: StringEndsWith
            Value: .png
      Enrichment:
        Type: Static
        Parameters:
          StaticValue:
            Value:
              detailType: UserAvatarUpdated
              source: com.company.user.avatar
      RoleArn: !GetAtt PipeRole.Arn

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge event bus name
    Value: !Ref EventBridgeBus