AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Managed Policies for S3 Access and Protection of DynamoDB/RDS Resources'

Resources:
  S3AccessPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Grants iOS application read/write access to ios-apps.sagebridge.org S3 bucket'
      ManagedPolicyName: 'S3-iOS-App-Access-Policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:ListBucket'
              - 's3:GetBucketLocation'
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org'
          - Effect: Allow
            Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:DeleteObject'
            Resource: 'arn:aws:s3:::ios-apps.sagebridge.org/*'

  DynamoDBProtectionPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Explicitly denies destructive DynamoDB operations'
      ManagedPolicyName: 'DynamoDB-Protection-Policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - 'dynamodb:DeleteTable'
              - 'dynamodb:UpdateTable'
              - 'dynamodb:DeleteBackup'
              - 'dynamodb:DeleteGlobalTable'
              - 'dynamodb:UpdateGlobalTable'
            Resource: 'arn:aws:dynamodb:*:*:table/*'

  RDSProtectionPolicy:
    Type: 'AWS::IAM::ManagedPolicy'
    Properties:
      Description: 'Explicitly denies destructive RDS operations'
      ManagedPolicyName: 'RDS-Protection-Policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - 'rds:DeleteDBInstance'
              - 'rds:DeleteDBCluster'
              - 'rds:DeleteDBSnapshot'
              - 'rds:DeleteDBClusterSnapshot'
              - 'rds:DeleteAutomatedBackup'
              - 'rds:DeleteDBParameterGroup'
              - 'rds:DeleteDBClusterParameterGroup'
            Resource: '*'