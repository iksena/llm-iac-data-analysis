AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for EC2 Image Builder automated AMI creation, management, and logging

Resources:
  ImageBuilderIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AWSImageBuilderFullAccess
      Tags:
        - Key: Encrypted
          Value: true

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ImageBuilderIAMRole
    DependsOn:
      - ImageBuilderIAMRole

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: image-builder-logs-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Owner
          Value: u12345678@anu.edu.au

  LogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ImageBuilderIAMRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt LogsBucket.Arn
              - !Join
                - ''
                - - !GetAtt LogsBucket.Arn
                  - /*
    DependsOn:
      - LogsBucket
      - ImageBuilderIAMRole

Outputs:
  InstanceProfileName:
    Description: Instance Profile Name for EC2 Image Builder
    Value: !Ref ImageBuilderInstanceProfile
  LogsBucketName:
    Description: S3 Bucket Name for Image Builder Logs
    Value: !Ref LogsBucket