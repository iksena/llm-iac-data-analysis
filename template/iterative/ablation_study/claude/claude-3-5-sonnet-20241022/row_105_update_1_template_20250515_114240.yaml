AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for Cross-Service Automation Workflows'

Resources:
  AutomationServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-automation-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
                - ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Path: '/'
      Tags:
        - Key: Purpose
          Value: CrossServiceAutomation

  AutomationServicePolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: !Sub '${AWS::StackName}-automation-policy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ssm:*'
              - 'ec2:DescribeInstances'
              - 'ec2:StartInstances'
              - 'ec2:StopInstances'
              - 'ec2:RebootInstances'
              - 'cloudwatch:PutMetricData'
              - 'cloudwatch:GetMetricStatistics'
              - 'cloudwatch:ListMetrics'
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
              - 'logs:DescribeLogStreams'
            Resource: '*'
      Roles:
        - !Ref AutomationServiceRole

Outputs:
  RoleARN:
    Description: ARN of the created IAM Role
    Value: !GetAtt AutomationServiceRole.Arn

  RoleName:
    Description: Name of the created IAM Role
    Value: !Ref AutomationServiceRole

  PolicyARN:
    Description: ARN of the created IAM Policy
    Value: !Ref AutomationServicePolicy