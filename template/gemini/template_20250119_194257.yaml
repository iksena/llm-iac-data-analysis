AWSTemplateFormatVersion: '2010-09-09'
Description: 'Highly available RDS DB instance with a read replica'
Resources:
  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.m5.large
      DBName: mydb
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: mymasteruser
      MasterUserPassword: MyStrongPassword!
      MultiAZ: true
      DeletionProtection: false
      StorageType: gp2
  ReadReplica:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.m5.large
      DBName: mydb
      Engine: mysql
      EngineVersion: '8.0'
      ReadReplicaSourceDBInstanceIdentifier: !Ref DBInstance
      StorageType: gp2
      DeletionProtection: false
Outputs:
  DBInstanceEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Description: Endpoint of the primary DB instance
  ReadReplicaEndpoint:
    Value: !GetAtt ReadReplica.Endpoint.Address
    Description: Endpoint of the read replica
  DBInstanceIdentifier:
    Value: !Ref DBInstance
    Description: Identifier of the primary DB instance
  ReadReplicaIdentifier:
    Value: !Ref ReadReplica
    Description: Identifier of the read replica

Metadata:
  'AWS::CloudFormation::Interface':
    ParameterGroups:
    - Label:
        default: Database Configuration
      Parameters:
      - MasterUsername
      - MasterUserPassword
      - DBInstanceClass
      - AllocatedStorage
    ParameterLabels:
      MasterUsername: Master Username
      MasterUserPassword: Master User Password
      DBInstanceClass: Instance Class
      AllocatedStorage: Allocated Storage
