AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for VPC flow logs with encryption, lifecycle management, and strict access controls.

Parameters:
  BucketName:
    Type: String
    Default: ''
    Description: Optional custom name for the S3 bucket. Leave blank for auto-generated name.
  VersioningStatus:
    Type: String
    Default: Suspended
    AllowedValues:
      - Enabled
      - Suspended
    Description: Enable or suspend versioning for the S3 bucket.
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning objects to Glacier.
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before permanently deleting objects.

Resources:
  VPCFlowLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref BucketName, !Ref "AWS::NoValue"]
      VersioningConfiguration:
        Status: !Ref VersioningStatus
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                Days: !Ref LifecycleTransitionDays
          - Id: Expiration
            Status: Enabled
            ExpirationInDays: !Ref LifecycleExpirationDays
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  VPCFlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowDeliveryLogsService
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${VPCFlowLogBucket}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: DenyAllOtherWrites
            Effect: Deny
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${VPCFlowLogBucket}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-acl: bucket-owner-full-control

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Outputs:
  BucketName:
    Description: Name of the S3 bucket for VPC flow logs
    Value: !Ref VPCFlowLogBucket
  BucketARN:
    Description: ARN of the S3 bucket for VPC flow logs
    Value: !GetAtt VPCFlowLogBucket.Arn