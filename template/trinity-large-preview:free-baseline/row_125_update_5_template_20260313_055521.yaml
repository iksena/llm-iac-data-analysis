AWSTemplateFormatVersion: '2010-09-09'
Description: 'API Gateway with SES Email Integration'

Parameters:
  EmailTemplateContent:
    Type: String
    Description: Email template content in JSON format
    Default: '{"HtmlPart": {"Data": "Hello {{name}},\n\n{{message}}\n\nBest regards,\n{{sender}}"},"TextPart": {"Data": "Hello {{name}},\n\n{{message}}\n\nBest regards,\n{{sender}}"}}'
  EmailFromAddress:
    Type: String
    Description: Email address to send from
    Default: 'noreply@example.com'
  EmailSubject:
    Type: String
    Description: Email subject line
    Default: 'Notification from API Gateway'
  EmailRegion:
    Type: String
    Description: AWS Region for SES
    Default: 'us-east-1'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaSESPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: '*'

  EmailLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          def lambda_handler(event, context):
              try:
                  # Extract payload
                  body = json.loads(event['body'])
                  to = body.get('to')
                  from_email = body.get('from', 'noreply@example.com')
                  subject = body.get('subject', 'Notification')
                  html_content = body.get('html')
                  text_content = body.get('text')

                  if not to:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': 'Recipient email (to) is required'})
                      }

                  # Create SES client
                  client = boto3.client('ses', region_name='us-east-1')

                  # Prepare email
                  message = {
                      'Subject': {
                          'Data': subject
                      },
                      'Body': {}
                  }

                  if html_content:
                      message['Body']['Html'] = {
                          'Data': html_content
                      }

                  if text_content:
                      message['Body']['Text'] = {
                          'Data': text_content
                      }

                  # Send email
                  response = client.send_email(
                      Source=from_email,
                      Destination={'ToAddresses': [to]},
                      Message=message
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps({'messageId': response['MessageId']})
                  }

              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  APIGatewayRestAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailAPI
      Description: API for sending emails via SES

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      ParentId: !GetAtt APIGatewayRestAPI.RootResourceId
      PathPart: emails

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      ResourceId: !Ref APIGatewayResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        'method.request.header.Content-Type': true
      RequestModels:
        'application/json': Empty
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${lambdaArn}/invocations'
          - lambdaArn: !GetAtt EmailLambdaFunction.Arn

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIGatewayRestAPI
      Description: Deployment for production

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestAPI
      StageName: prod
      Description: Production stage
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingRateLimit: 500
          ThrottlingBurstLimit: 100

  APIGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId: !Ref APIGatewayRestAPI
          Stage: !Ref APIGatewayStage
      Throttle:
        BurstLimit: 100
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  APIGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailAPIKey
      Description: API key for email service
      Enabled: true

  APIGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref APIGatewayApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref APIGatewayUsagePlan

  EmailTemplateParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /EmailService/EmailTemplate
      Type: String
      Value: !Ref EmailTemplateContent
      Description: Email template for SES

Outputs:
  APIGatewayURL:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${APIGatewayRestAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/emails'
  APIGatewayKey:
    Description: API Key for accessing the API
    Value: !Ref APIGatewayApiKey
  LambdaFunctionARN:
    Description: Lambda Function ARN
    Value: !GetAtt EmailLambdaFunction.Arn