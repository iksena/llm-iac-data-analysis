AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads

Parameters:
  WorkloadProcessorFunctionName:
    Type: String
    Default: WorkloadProcessor
    Description: Name of the workload processing Lambda function
  RiskAnalyzerFunctionName:
    Type: String
    Default: RiskAnalyzer
    Description: Name of the risk analysis Lambda function
  DynamoDBTableName:
    Type: String
    Default: RiskManagementData
    Description: Name of the DynamoDB table
  SNSTopicName:
    Type: String
    Default: RiskManagementNotifications
    Description: Name of the SNS topic for notifications

Resources:
  RiskManagementIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub RiskManagementSystemRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt RiskManagementDynamoDBTable.Arn
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskManagementSNSTopic

  RiskManagementDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  RiskManagementSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: Risk Management System Alerts

  RiskManagementSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskManagementSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: opscenter.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskManagementSNSTopic

  WorkloadProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref WorkloadProcessorFunctionName
      Runtime: python3.12
      Handler: workload_processor.lambda_handler
      Role: !GetAtt RiskManagementIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('!Ref DynamoDBTableName')
          sns = boto3.client('sns')
          topic_arn = '!Ref RiskManagementSNSTopic'

          def lambda_handler(event, context):
              try:
                  workload_id = event['workload_id']
                  question_id = event['question_id']
                  data = event['data']

                  table.put_item(
                      Item={
                          'workload_id': workload_id,
                          'question_id': question_id,
                          'data': data
                      }
                  )

                  response = sns.publish(
                      TopicArn=topic_arn,
                      Message=json.dumps({'workload_id': workload_id, 'question_id': question_id}),
                      Subject='New Workload Data'
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Workload data processed successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error processing workload data: {str(e)}')
                  }
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTableName
          SNS_TOPIC_ARN: !Ref RiskManagementSNSTopic

  RiskAnalyzerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref RiskAnalyzerFunctionName
      Runtime: python3.12
      Handler: risk_analyzer.lambda_handler
      Role: !GetAtt RiskManagementIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('!Ref DynamoDBTableName')
          sns = boto3.client('sns')
          topic_arn = '!Ref RiskManagementSNSTopic'

          def lambda_handler(event, context):
              try:
                  workload_id = event['workload_id']
                  question_id = event['question_id']
                  risk_score = event['risk_score']

                  table.update_item(
                      Key={
                          'workload_id': workload_id,
                          'question_id': question_id
                      },
                      UpdateExpression='SET risk_score = :val',
                      ExpressionAttributeValues={
                          ':val': risk_score
                      }
                  )

                  if risk_score > 7:
                      response = sns.publish(
                          TopicArn=topic_arn,
                          Message=json.dumps({'workload_id': workload_id, 'question_id': question_id, 'risk_score': risk_score}),
                          Subject='High Risk Alert'
                      )

                  return {
                      'statusCode': 200,
                      'body': json.dumps('Risk analysis completed successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(f'Error analyzing risk: {str(e)}')
                  }
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTableName
          SNS_TOPIC_ARN: !Ref RiskManagementSNSTopic

Outputs:
  WorkloadProcessorFunctionArn:
    Description: ARN of the Workload Processor Lambda function
    Value: !GetAtt WorkloadProcessorFunction.Arn
  RiskAnalyzerFunctionArn:
    Description: ARN of the Risk Analyzer Lambda function
    Value: !GetAtt RiskAnalyzerFunction.Arn
  DynamoDBTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt RiskManagementDynamoDBTable.Arn
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref RiskManagementSNSTopic