AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for VPC with Security Group'

Parameters:
  VPCCidrBlock:
    Description: 'CIDR block for the VPC'
    Type: String
    Default: '10.0.0.0/16'
  
  SecurityGroupName:
    Description: 'Name for the security group'
    Type: String
    Default: 'DefaultSecurityGroup'
  
  SecurityGroupDescription:
    Description: 'Description for the security group'
    Type: String
    Default: 'Default security group for VPC'
  
  Environment:
    Description: 'Environment type (prod/dev/test)'
    Type: String
    Default: 'dev'
    AllowedValues:
      - 'prod'
      - 'dev'
      - 'test'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VPCCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-VPC'
        - Key: Environment
          Value: !Ref Environment

  SecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupName: !Ref SecurityGroupName
      GroupDescription: !Ref SecurityGroupDescription
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: '0.0.0.0/0'
          Description: 'Allow SSH access'
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: '0.0.0.0/0'
          Description: 'Allow HTTP access'
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: 'Allow HTTPS access'
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-SecurityGroup'
        - Key: Environment
          Value: !Ref Environment

Outputs:
  VPCId:
    Description: 'VPC ID'
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCId'
  
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref SecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'