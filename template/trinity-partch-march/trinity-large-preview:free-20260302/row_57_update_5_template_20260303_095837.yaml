AWSTemplateFormatVersion: '2010-09-09'
Description: A basic Amazon ECS cluster with configurable monitoring capabilities.

Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: The name of the ECS cluster
  EnableCloudWatchContainerInsights:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable CloudWatch Container Insights for the ECS cluster

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      Configuration:
        ClusterConfiguration:
          ExecuteCommandConfiguration:
            KmsKeyId: !Ref KmsKeyId
            LogConfiguration:
              CloudWatchLogGroupName: !Ref CloudWatchLogGroupName
              S3BucketName: !Ref S3BucketName
              S3KeyPrefix: !Ref S3KeyPrefix
            Logging: !Ref Logging
          ContainerInsights: !Ref EnableCloudWatchContainerInsights

Outputs:
  ClusterName:
    Description: The name of the ECS cluster
    Value: !Ref ECSCluster
  ClusterArn:
    Description: The Amazon Resource Name (ARN) of the ECS cluster
    Value: !GetAtt ECSCluster.Arn