AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Nginx and SSM Logging

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          !Sub 'LatestAmiId'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      AvailabilityZone: !Select [0, !GetAZs '']
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - '#!/bin/bash -xe\n'
              - 'yum update -y\n'
              - 'amazon-ssm-agent -start\n'
              - 'yum install -y nginx\n'
              - 'systemctl start nginx\n'
              - 'systemctl enable nginx\n'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LoggingAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${S3Bucket}/logs/*'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt InstanceRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource:
              - !Sub 'arn:aws:s3:::${S3Bucket}/logs/*'

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      Parameters:
        commands:
          - |
            yum -y install nginx
            systemctl start nginx
            systemctl enable nginx
      OutputLocation:
        S3Location:
          OutputS3KeyPrefix: logs/ssm-outputs/

Outputs:
  InstancePublicDNS:
    Description: Public DNS Name of the EC2 instance
    Value: !GetAtt EC2Instance.PublicDnsName
  InstancePublicIP:
    Description: Public IP Address of the EC2 instance
    Value: !GetAtt EC2Instance.PublicIp