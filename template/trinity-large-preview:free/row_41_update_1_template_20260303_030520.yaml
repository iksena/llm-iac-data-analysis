AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS Standard Queue

Parameters:
  QueueName:
    Type: String
    Default: ''
    Description: (Optional) The name of the queue. If not specified, AWS CloudFormation generates a unique physical ID.

  DelaySeconds:
    Type: Number
    Default: 0
    Description: (Optional) The time in seconds that the delivery of all messages in the queue will be delayed.

  MaximumMessageSize:
    Type: Number
    Default: 262144
    Description: (Optional) The limit of how many bytes a message can contain before Amazon SQS rejects it.

  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: (Optional) The number of seconds Amazon SQS retains a message.

  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: (Optional) The time for which a ReceiveMessage call will wait for a message to arrive.

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If [HasCustomQueueName, !Ref QueueName, !Ref AWS::NoValue]
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds

Conditions:
  HasCustomQueueName: !Not [!Equals [!Ref QueueName, '']]

Outputs:
  QueueARN:
    Description: The ARN of the SQS queue
    Value: !GetAtt SQSQueue.Arn

  QueueURL:
    Description: The URL of the SQS queue
    Value: !Ref SQSQueue