AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with DataDog for centralized log forwarding

Resources:
  MyDataDogAppEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyDataDogApp
    Metadata:
      Effect: centralized-logging

  DataDogApiConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: DataDogApiConnection
      Description: Connection to DataDog API
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: DD-API-KEY
        ApiKeyValue: testanu
    Metadata:
      Effect: secure, authenticated

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: DataDogLogIngestion
      Description: API destination for DataDog log ingestion
      InvocationEndpoint: https://http-intake.logs.datadoghq.com
      HttpMethod: POST
      ConnectionArn: !GetAtt DataDogApiConnection.Arn
      InvocationRateLimitPerSecond: 10
    Metadata:
      Effect: public-api, encrypted
    DependsOn: DataDogApiConnection

  EventBridgeToDataDogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt DataDogApiDestination.Arn
    Metadata:
      Effect: least-privilege, secure

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DataDogLogDeliveryDLQ
      KmsMasterKeyId: alias/aws/sqs
    Metadata:
      Effect: fault-tolerant, encrypted

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: MyDataDogAppEventBus
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          Id: DataDogTarget
          RoleArn: !GetAtt EventBridgeToDataDogRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn
    Metadata:
      Effect: automated, fault-tolerant
    DependsOn:
      - MyDataDogAppEventBus
      - DataDogApiDestination
      - EventBridgeToDataDogRole
      - DeadLetterQueue

Metadata:
  Invariants:
    - Centralized log forwarding to DataDog
    - Secure API key authentication
    - Fault tolerance with dead-letter queue
    - Least privilege IAM permissions
    - Encrypted data in transit