          - Action:
            - ec2:Describe*
            - ec2:CreateTags
            - ec2:AttachVolume
            - ec2:CreateVolume
            - ec2:DetachVolume
            - ec2:CreateSnapshot
            - ec2:ModifyInstanceAttribute
            - cloudformation:Describe*
            - cloudformation:List*
            - autoscaling:CreateOrUpdateTags
            - cloudwatch:PutMetricData
            Effect: Allow
            Resource: '*'
          - Action:
            - ssm:GetParameter
            Effect: Allow
            Resource:
            - Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aem-opencloud/*"
            - Fn::Sub: "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aem-opencloud/*/*"
          - Action:
            - s3:Get*
            - s3:List*
            - s3:Put*
            Effect: Allow
            Resource: '*'
          - Action:
            - logs:*
            Effect: Allow
