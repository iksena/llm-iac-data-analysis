AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    Default: my-key-pair
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
  SSHLocation:
    Description: The IP address range allowed to access SSH (CIDR format)
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block
  VpcCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block
  PublicSubnetCidr:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block
  PrivateSubnetCidr:
    Description: CIDR block for the private subnet
    Type: String
    Default: 10.0.2.0/24
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block
  InstanceType:
    Description: EC2 instance type for the web server
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
Mappings:
  AWSRegion2AMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0d47a8dc2e9a1d6bb
    us-west-1:
      AMI: ami-0c29c4b62bc001f87
    us-west-2:
      AMI: ami-00c007a0a287b12e2
    ap-south-1:
      AMI: ami-0f6c9a9c4d6a9d6e2
    ap-northeast-1:
      AMI: ami-0b2638c1e3d3d4d5e
    ap-southeast-1:
      AMI: ami-0d0e1a9b3d4b9f8e7
    ap-southeast-2:
      AMI: ami-0b2d3d4c5e6f7a8b9
    eu-central-1:
      AMI: ami-0d123456789abcdef0
    eu-west-1:
      AMI: ami-0f123456789abcdef0
Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW
  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PrivateSubnet
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PrivateRouteTable
  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server with HTTP and SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WebSecurityGroup
  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: PublicSubnetRouteTableAssociation
    Properties:
      ImageId: !FindInMap [AWSRegion2AMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !GetAtt WebSecurityGroup.GroupId
      SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e
          yum update -y
          yum install -y httpd php
          systemctl start httpd
          systemctl enable httpd
          cat > /var/www/html/index.php <<'EOF'
          <?php
          header('Content-Type: text/html');
          $inventory = [
              ['id' => 1, 'name' => 'Laptop', 'quantity' => 15],
              ['id' => 2, 'name' => 'Monitor', 'quantity' => 30],
              ['id' => 3, 'name' => 'Keyboard', 'quantity' => 45]
          ];
          echo '<html><head><title>Inventory System</title></head><body>';
          echo '<h1>Company Inventory</h1>';
          echo '<table border="1" cellpadding="5">';
          echo '<tr><th>ID</th><th>Item</th><th>Quantity</th></tr>';
          foreach ($inventory as $item) {
              echo '<tr>';
              echo '<td>' . $item['id'] . '</td>';
              echo '<td>' . $item['name'] . '</td>';
              echo '<td>' . $item['quantity'] . '</td>';
              echo '</tr>';
          }
          echo '</table></body></html>';
          ?>
          EOF
          chown apache:apache /var/www/html/index.php
          chmod 644 /var/www/html/index.php
          systemctl is-active --quiet httpd || (echo "Apache failed to start" && exit 1)
      Tags:
        - Key: Name
          Value: WebServerInstance
Outputs:
  PublicIPAddress:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp
  PublicDNSName:
    Description: Public DNS name of the web server
    Value: !GetAtt WebServerInstance.PublicDnsName
  ApplicationURL:
    Description: URL to access the inventory application
    Value: !Sub 'http://${WebServerInstance.PublicDnsName}'
  SecurityGroupID:
    Description: Security group ID for the web server
    Value: !GetAtt WebSecurityGroup.GroupId