AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS Client VPN monitoring with CloudWatch Dashboard'

Parameters:
  VpnEndpointIds:
    Type: CommaDelimitedList
    Description: List of Client VPN Endpoint IDs to monitor (comma-separated)
    Default: 'cvpn-endpoint-0123456789abcdef0'
  
  LogGroupName:
    Type: String
    Description: CloudWatch Logs group containing Client VPN logs
    Default: '/aws/clientvpn'
  
  DashboardName:
    Type: String
    Description: Name for the CloudWatch Dashboard
    Default: 'ClientVPNMonitoring'
  
  RefreshRate:
    Type: Number
    Description: Dashboard refresh rate in seconds
    Default: 300
    MinValue: 60
    MaxValue: 3600

Resources:
  # CloudWatch Dashboard
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody:
        Fn::Join:
          - ''
          - - '{"widgets":['
            - '{"type":"text","x":0,"y":0,"width":24,"height":1,"properties":{"markdown":"# AWS Client VPN Monitoring Dashboard\nThis dashboard provides insights into VPN usage patterns, connection metrics, and authentication statistics. Monitoring VPN Endpoints: '
            - !Join [', ', !Ref VpnEndpointIds]
            - '. Auto-refresh rate: '
            - !Ref RefreshRate
            - ' seconds"}}'
            
            # Connection Duration Metrics
            - ',{"type":"log","x":0,"y":1,"width":12,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"client-ip: * \" as clientIp | parse @message \"username: * \" as username | parse @message \"endpoint-id: * \" as endpointId | filter event in [\"connection-attempt\", \"connection-attempt-succeeded\", \"connection-attempt-failed\", \"connection-ended\"] | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId, username, clientIp, endpointId | filter ispresent(connectionStart) and ispresent(connectionEnd) | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, \"seconds\") | stats avg(connectionDurationSeconds) as avgDurationSeconds, max(connectionDurationSeconds) as maxDurationSeconds by username | sort avgDurationSeconds desc | limit 100","region":"'
            - !Ref "AWS::Region"
            - '","title":"Average Connection Duration by User","view":"table"}}'
            
            - ',{"type":"log","x":12,"y":1,"width":12,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"endpoint-id: * \" as endpointId | filter event in [\"connection-attempt\", \"connection-attempt-succeeded\", \"connection-attempt-failed\", \"connection-ended\"] | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId, endpointId | filter ispresent(connectionStart) and ispresent(connectionEnd) | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, \"seconds\") | stats sum(connectionDurationSeconds) as totalDurationSeconds, count(connectionId) as connectionCount by endpointId | sort totalDurationSeconds desc","region":"'
            - !Ref "AWS::Region"
            - '","title":"Total Connection Time by Endpoint","view":"table"}}'
            
            - ',{"type":"log","x":0,"y":7,"width":8,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | filter event in [\"connection-attempt\", \"connection-attempt-succeeded\", \"connection-attempt-failed\", \"connection-ended\"] | stats min(@timestamp) as connectionStart, max(@timestamp) as connectionEnd by connectionId | filter ispresent(connectionStart) and ispresent(connectionEnd) | eval connectionDurationSeconds = dateDiff(connectionStart, connectionEnd, \"seconds\") | eval durationBucket = case(connectionDurationSeconds < 300, \"< 5 min\", connectionDurationSeconds < 1800, \"5-30 min\", connectionDurationSeconds < 3600, \"30-60 min\", connectionDurationSeconds < 7200, \"1-2 hours\", connectionDurationSeconds < 14400, \"2-4 hours\", connectionDurationSeconds < 28800, \"4-8 hours\", \"8+ hours\") | stats count(connectionId) as connectionCount by durationBucket | sort durationBucket asc","region":"'
            - !Ref "AWS::Region"
            - '","title":"Connection Duration Distribution","view":"pie"}}'
            
            # Data Transfer Metrics
            - ',{"type":"log","x":8,"y":7,"width":8,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"endpoint-id: * \" as endpointId | parse @message \"bytes-in: * \" as bytesIn | filter ispresent(bytesIn) | stats sum(bytesIn) as totalBytesIn by endpointId | sort totalBytesIn desc | eval totalMBIn = totalBytesIn / 1024 / 1024 | display endpointId, totalMBIn","region":"'
            - !Ref "AWS::Region"
            - '","title":"Ingress Data Volume by Endpoint (MB)","view":"table"}}'
            
            - ',{"type":"log","x":16,"y":7,"width":8,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"endpoint-id: * \" as endpointId | parse @message \"bytes-out: * \" as bytesOut | filter ispresent(bytesOut) | stats sum(bytesOut) as totalBytesOut by endpointId | sort totalBytesOut desc | eval totalMBOut = totalBytesOut / 1024 / 1024 | display endpointId, totalMBOut","region":"'
            - !Ref "AWS::Region"
            - '","title":"Egress Data Volume by Endpoint (MB)","view":"table"}}'
            
            - ',{"type":"log","x":0,"y":13,"width":12,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"username: * \" as username | parse @message \"bytes-in: * \" as bytesIn | parse @message \"bytes-out: * \" as bytesOut | filter ispresent(bytesIn) or ispresent(bytesOut) | stats sum(bytesIn) as totalBytesIn, sum(bytesOut) as totalBytesOut by username | eval totalMBIn = totalBytesIn / 1024 / 1024 | eval totalMBOut = totalBytesOut / 1024 / 1024 | eval totalMB = totalMBIn + totalMBOut | sort totalMB desc | limit 100","region":"'
            - !Ref "AWS::Region"
            - '","title":"Data Transfer by User (MB)","view":"table"}}'
            
            # User Activity Metrics
            - ',{"type":"log","x":12,"y":13,"width":12,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"username: * \" as username | filter ispresent(username) | stats count_distinct(username) as uniqueUsers by bin(1d) | sort @timestamp desc","region":"'
            - !Ref "AWS::Region"
            - '","title":"Active Users per Day","view":"timeSeries","stacked":false}}'
            
            - ',{"type":"log","x":0,"y":19,"width":12,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"connection-id: * \" as connectionId | parse @message \"username: * \" as username | filter event in [\"connection-attempt\", \"connection-attempt-succeeded\", \"connection-attempt-failed\"] | stats count(event=\"connection-attempt\") as totalAttempts, count(event=\"connection-attempt-succeeded\") as successfulAttempts, count(event=\"connection-attempt-failed\") as failedAttempts by username | eval successRate = 100 * successfulAttempts / totalAttempts | sort totalAttempts desc | limit 100","region":"'
            - !Ref "AWS::Region"
            - '","title":"Connection Attempts by User","view":"table"}}'
            
            # Authentication Metrics
            - ',{"type":"log","x":12,"y":19,"width":6,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"authentication-type: * \" as authType | filter ispresent(authType) | stats count(*) as connectionCount by authType | sort connectionCount desc","region":"'
            - !Ref "AWS::Region"
            - '","title":"Authentication Type Breakdown","view":"pie"}}'
            
            - ',{"type":"log","x":18,"y":19,"width":6,"height":6,"properties":{"query":"fields @timestamp, @message | filter @logStream like /^ClientVPN-/ | parse @message \"authentication-type: * \" as authType | filter event in [\"connection-attempt\", \"connection-attempt-succeeded\", \"connection-attempt-failed\"] | filter ispresent(authType) | stats count(event=\"connection-attempt\") as totalAttempts, count(event=\"connection-attempt-succeeded\") as successfulAttempts, count(event=\"connection-attempt-failed\") as failedAttempts by authType | eval successRate = 100 * successfulAttempts / totalAttempts | sort successRate desc","region":"'
            - !Ref "AWS::Region"
            - '","title":"Authentication Success Rate by Type","view":"table"}}'
            - ']}'

Outputs:
  DashboardURL:
    Description: URL to access the created CloudWatch Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}"