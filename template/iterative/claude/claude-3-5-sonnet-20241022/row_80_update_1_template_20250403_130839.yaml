AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Role for Bedrock service with permissions to invoke foundation models and Lambda functions'

Resources:
  BedrockServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-bedrock-service-role'
      Description: 'IAM role for Bedrock service to invoke foundation models and Lambda functions'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns: []
      Policies:
        - PolicyName: BedrockServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'lambda:InvokeFunction'
                Resource: '*'
              - Effect: Allow
                Action:
                  - 'bedrock:*'
                Resource: 
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'

Outputs:
  BedrockServiceRoleARN:
    Description: 'ARN of the created IAM Role for Bedrock service'
    Value: !GetAtt BedrockServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-bedrock-service-role-arn'
  
  BedrockServiceRoleName:
    Description: 'Name of the created IAM Role for Bedrock service'
    Value: !Ref BedrockServiceRole
    Export:
      Name: !Sub '${AWS::StackName}-bedrock-service-role-name'