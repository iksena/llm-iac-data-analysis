AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: pythonshell
        ScriptLocation: !Sub
          - s3://${BucketName}/glue_scripts/sample_convert.py
          - BucketName: !Ref GlueScriptsBucket
      DefaultArguments:
        '--job-language': 'python'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: '4.0'
      NumberOfWorkers: 2
      Role: !GetAtt GlueIAMRole.Arn
      WorkerType: G.1X

Outputs:
  GlueJobName:
    Description: Name of the created Glue ETL Job
    Value: !Ref GlueETLJob
  ScriptsBucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptsBucket