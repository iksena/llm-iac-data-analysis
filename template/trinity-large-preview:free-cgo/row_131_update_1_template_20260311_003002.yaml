AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized alerting system using Amazon SNS with fallback notifications

Parameters:
  EmailEndpoint:
    Type: String
    Default: ''
    Description: Email address for primary notifications (optional)
  HttpsEndpoint:
    Type: String
    Default: ''
    Description: HTTPS endpoint for primary notifications (optional)
  FallbackEmail:
    Type: String
    Default: admin@example.com
    Description: Email address for fallback notifications
  FailureThreshold:
    Type: Number
    Default: 5
    Description: Number of failed deliveries to trigger fallback
  RetryAttempts:
    Type: Number
    Default: 3
    Description: Number of retry attempts for HTTP(S) endpoints

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, '']]
  HasHttpsEndpoint: !Not [!Equals [!Ref HttpsEndpoint, '']]

Resources:
  PrimarySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralizedAlertingTopic
      DisplayName: Centralized Alerting System
      KmsMasterKeyId: alias/aws/sns
      DeliveryPolicy:
        http:
          defaultHealthyRetryPolicy:
            minDelayTarget: 20
            maxDelayTarget: 20
            numRetries: !Ref RetryAttempts
            numMaxDelayRetries: 0
            numNoDelayRetries: 0
            numMinDelayRetries: 0
            backoffFunction: arithmetic
      TopicPolicy:
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - monitoring.amazonaws.com
                  - rds.amazonaws.com
                  - s3.amazonaws.com
                  - budgets.amazonaws.com
              Action: sns:Publish
              Resource: !Ref PrimarySNSTopic

  PrimaryEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      TopicArn: !Ref PrimarySNSTopic

  PrimaryHttpsSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHttpsEndpoint
    Properties:
      Endpoint: !Ref HttpsEndpoint
      Protocol: https
      TopicArn: !Ref PrimarySNSTopic
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 20
          maxDelayTarget: 20
          numRetries: !Ref RetryAttempts
          numMaxDelayRetries: 0
          numNoDelayRetries: 0
          numMinDelayRetries: 0
          backoffFunction: arithmetic

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: AlertingFallbackTopic
      DisplayName: Alerting Fallback Notifications
      KmsMasterKeyId: alias/aws/sns
      TopicPolicy:
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - cloudwatch.amazonaws.com
              Action: sns:Publish
              Resource: !Ref FallbackSNSTopic

  FallbackEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref FallbackEmail
      Protocol: email
      TopicArn: !Ref FallbackSNSTopic

  FailedNotificationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationAlarm
      AlarmDescription: Triggers when notification delivery failures exceed threshold
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Dimensions:
        - Name: TopicName
          Value: !GetAtt PrimarySNSTopic.TopicName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref FailureThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic

  PrimarySNSTopicRetentionPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref PrimarySNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sns:SetTopicAttributes
            Resource: !Ref PrimarySNSTopic

  FallbackSNSTopicRetentionPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref FallbackSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sns:SetTopicAttributes
            Resource: !Ref FallbackSNSTopic

Outputs:
  PrimarySNSTopicARN:
    Description: ARN of the primary SNS topic
    Value: !Ref PrimarySNSTopic
  FallbackSNSTopicARN:
    Description: ARN of the fallback SNS topic
    Value: !Ref FallbackSNSTopic
  FailedNotificationAlarmARN:
    Description: ARN of the failed notification alarm
    Value: !Ref FailedNotificationAlarm