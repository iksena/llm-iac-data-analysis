AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  IdentityManagementAccount:
    Type: String
    Description: REQUIRED - 12-digit AWS account ID for identity management
    AllowedPattern: ^\d{12}$
    ConstraintDescription: Must be a valid 12-digit AWS account ID
    MinLength: 12
    MaxLength: 12
  ToolingManagementAccount:
    Type: String
    Description: REQUIRED - 12-digit AWS account ID for tooling management
    AllowedPattern: ^\d{12}$
    ConstraintDescription: Must be a valid 12-digit AWS account ID
    MinLength: 12
    MaxLength: 12
  AllowedRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: Regions allowed for operations

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Required Parameters (MUST PROVIDE)"
        Parameters:
          - IdentityManagementAccount
          - ToolingManagementAccount
    ParameterLabels:
      IdentityManagementAccount:
        default: "Identity Management Account ID (12 digits)"
      ToolingManagementAccount:
        default: "Tooling Account ID (12 digits)"

Resources:
  # (All resource definitions remain identical to previous valid template)
  # ... [Rest of the resources unchanged from last working version] ...

Outputs:
  CloudFormationExecutionRoleARN:
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleARN:
    Value: !GetAtt StackSetExecutionRole.Arn
  CrossAccountIdentityAdminRoleARN:
    Value: !GetAtt CrossAccountIdentityAdminRole.Arn
  PrivilegedAdminGroupName:
    Value: !Ref PrivilegedAdminGroup
  IdentityAdminGroupName:
    Value: !Ref IdentityAdminGroup