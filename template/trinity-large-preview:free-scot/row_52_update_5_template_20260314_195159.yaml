AWSTemplateFormatVersion: '2010-09-09'

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: ApplicationFailoverCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: ApplicationFailoverControlPanel
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControl1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: RoutingControl-us-east-1
      ControlPanelArn: !GetAtt ControlPanel.Arn

  RoutingControl2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: RoutingControl-us-west-2
      ControlPanelArn: !GetAtt ControlPanel.Arn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: AtLeastOneActiveRegion
      ControlPanelArn: !GetAtt ControlPanel.Arn
      RuleConfig:
        RoutingControlCount: 1
        RoutingControls:
          - !GetAtt RoutingControl1.RoutingControlArn
          - !GetAtt RoutingControl2.RoutingControlArn
        Status: always-open

  HealthCheck:
    Type: AWS::Route53RecoveryControl::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: CLOUDWATCH_METRIC
        ResourcePath: !Join
          - '/'
          - - !GetAtt RecoveryCluster.Arn
            - !GetAtt ControlPanel.Arn
        FailureThreshold: 1
      RoutingControlArn: !GetAtt RoutingControl1.RoutingControlArn

Outputs:
  ClusterArn:
    Description: ARN of the recovery cluster
    Value: !GetAtt RecoveryCluster.Arn
  ControlPanelArn:
    Description: ARN of the control panel
    Value: !GetAtt ControlPanel.Arn
  RoutingControl1Arn:
    Description: ARN of the first routing control
    Value: !GetAtt RoutingControl1.Arn
  RoutingControl2Arn:
    Description: ARN of the second routing control
    Value: !GetAtt RoutingControl2.Arn
  SafetyRuleArn:
    Description: ARN of the safety rule
    Value: !GetAtt SafetyRule.Arn
  HealthCheckArn:
    Description: ARN of the health check
    Value: !GetAtt HealthCheck.Arn