AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 30

  MyTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: IoTDataTopic

  IoTDataRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: DeviceDataRule
      TopicRulePayload:
        Actions:
          - Sns:
              TargetArn: !Ref MyTopic
          - Sqs:
              QueueUrl: !Ref MyQueue
        AwsIotSqlVersion: "2016-03-31"
        Sql: "SELECT * FROM 'device/data'"
        RoleArn: !GetAtt IotRole.Arn

  IotRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSIoTLogging

Outputs:
  QueueURL:
    Value: !Ref MyQueue
  TopicARN:
    Value: !Ref MyTopic