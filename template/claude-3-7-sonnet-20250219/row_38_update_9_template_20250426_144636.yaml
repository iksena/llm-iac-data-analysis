AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates an S3 bucket with Lambda trigger'

Parameters:
  LambdaRuntime:
    Type: String
    Description: Runtime for the Lambda function
    Default: python3.9
    AllowedValues:
      - python3.8
      - python3.9
      - python3.10
  
  LambdaMemorySize:
    Type: Number
    Description: Memory size for the Lambda function (in MB)
    Default: 128
    MinValue: 128
    MaxValue: 10240
  
  LambdaTimeout:
    Type: Number
    Description: Timeout for the Lambda function (in seconds)
    Default: 30
    MinValue: 1
    MaxValue: 900

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt S3Bucket.Arn
                  - !Sub "${S3Bucket.Arn}/*"

  ProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeout
      Code:
        ZipFile: |
          import json
          import urllib.parse
          import boto3
          import os

          s3 = boto3.client('s3')

          def handler(event, context):
              # Get the object from the event
              bucket = event['Records'][0]['s3']['bucket']['name']
              key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'], encoding='utf-8')
              
              try:
                  # Log event details
                  print(f"Processing object: {key} from bucket: {bucket}")
                  
                  # Get object metadata
                  response = s3.head_object(Bucket=bucket, Key=key)
                  print(f"Object metadata: {response}")
                  
                  # Return success
                  return {
                      'statusCode': 200,
                      'body': json.dumps(f'Successfully processed {key} from {bucket}')
                  }
              except Exception as e:
                  print(e)
                  print(f'Error processing object {key} from bucket {bucket}')
                  raise e

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ProcessorFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt S3Bucket.Arn

  NotificationConfigurationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3NotificationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                  - s3:PutBucketNotificationConfiguration
                  - s3:GetBucketNotificationConfiguration
                Resource: !GetAtt S3Bucket.Arn

  NotificationConfigurationFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt NotificationConfigurationRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          import cfnresponse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          s3 = boto3.client('s3')
          
          def handler(event, context):
              logger.info('Received event: %s', json.dumps(event))
              
              response_data = {}
              physical_resource_id = event.get('PhysicalResourceId', None)
              
              try:
                  request_type = event['RequestType']
                  resource_properties = event['ResourceProperties']
                  
                  bucket_name = resource_properties['BucketName']
                  lambda_arn = resource_properties['LambdaArn']
                  
                  if request_type == 'Create' or request_type == 'Update':
                      logger.info('Setting notification configuration on bucket %s for lambda %s', 
                                 bucket_name, lambda_arn)
                      
                      notification_config = {
                          'LambdaFunctionConfigurations': [
                              {
                                  'LambdaFunctionArn': lambda_arn,
                                  'Events': ['s3:ObjectCreated:*']
                              }
                          ]
                      }
                      
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name,
                          NotificationConfiguration=notification_config
                      )
                      
                      physical_resource_id = f"{bucket_name}-notification"
                      response_data['Message'] = f"Successfully configured notifications for {bucket_name}"
                      
                  elif request_type == 'Delete':
                      logger.info('Removing notification configuration from bucket %s', bucket_name)
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket_name,
                          NotificationConfiguration={}
                      )
                      response_data['Message'] = f"Successfully removed notifications from {bucket_name}"
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, 
                                  response_data, physical_resource_id)
                  
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED, 
                                  {'Error': str(e)}, physical_resource_id)

  BucketNotificationConfiguration:
    Type: Custom::BucketNotification
    Properties:
      ServiceToken: !GetAtt NotificationConfigurationFunction.Arn
      BucketName: !Ref S3Bucket
      LambdaArn: !GetAtt ProcessorFunction.Arn

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  
  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt S3Bucket.Arn
  
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref ProcessorFunction
  
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ProcessorFunction.Arn