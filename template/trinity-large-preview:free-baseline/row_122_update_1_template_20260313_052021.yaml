AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for product creation automation

Parameters:
  ShopifyAdminAPIKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: 'your-shopify-api-key-here'
    NoEcho: true

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyAppEventBus

  ShopifyApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ShopifyApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt ShopifyApiDestination.Arn

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ShopifyProductCreationApiDestination
      Description: API destination for Shopify product creation
      InvocationEndpoint: 'https://testanu.myshopify.com/admin/api/2023-04/products.json'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1
      ConnectionArn: ''
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1
      ConnectionArn: ''
      InvocationEndpoint: 'https://testanu.myshopify.com/admin/api/2023-04/products.json'
