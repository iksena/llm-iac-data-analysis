AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an event-driven integration between DynamoDB streams and EventBridge.

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CentralEventBus

  DynamoDBStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn

  EventBridgePipeInsert:
    Type: AWS::Pipes::Pipe
    Properties:
      RoleArn: !GetAtt DynamoDBStreamRole.Arn
      Source: 
        Type: DynamoDBStream
        Parameters:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target: 
        Type: EventBridgeEventBus
        Parameters:
          EventBusName: !Ref EventBus
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["INSERT"]}'

  EventBridgePipeModify:
    Type: AWS::Pipes::Pipe
    Properties:
      RoleArn: !GetAtt DynamoDBStreamRole.Arn
      Source: 
        Type: DynamoDBStream
        Parameters:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target: 
        Type: EventBridgeEventBus
        Parameters:
          EventBusName: !Ref EventBus
      FilterCriteria:
        Filters:
          - Pattern: '{"eventName": ["MODIFY"]}'

Outputs:
  DynamoDBTableName:
    Description: The name of the DynamoDB table.
    Value: !Ref DynamoDBTable

  EventBusArn:
    Description: The ARN of the EventBridge event bus.
    Value: !GetAtt EventBus.Arn

  PipeInsertArn:
    Description: The ARN of the EventBridge Pipe for INSERT events.
    Value: !Ref EventBridgePipeInsert

  PipeModifyArn:
    Description: The ARN of the EventBridge Pipe for MODIFY events.
    Value: !Ref EventBridgePipeModify