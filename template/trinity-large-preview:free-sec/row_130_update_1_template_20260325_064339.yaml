AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Account-Wide Password Policy with Lambda Management

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 6
    MaxValue: 128
  RequireUppercaseCharacters:
    Type: Boolean
    Default: true
  RequireLowercaseCharacters:
    Type: Boolean
    Default: true
  RequireNumbers:
    Type: Boolean
    Default: true
  RequireSymbols:
    Type: Boolean
    Default: true
  MaxPasswordAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
  PasswordReusePrevention:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
  AllowUsersToChangePassword:
    Type: Boolean
    Default: true
  EnablePermissionBoundary:
    Type: Boolean
    Default: false
  PermissionBoundaryPolicy:
    Type: String
    Default: ''
    Description: IAM policy document for permission boundary (JSON format)

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IAMPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:AttachUserPolicy
                  - iam:DetachUserPolicy
                Resource: '*'

  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def lambda_handler(event, context):
              client = boto3.client('iam')
              try:
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      params = event['ResourceProperties']
                      client.update_account_password_policy(
                          MinimumPasswordLength=params['MinimumPasswordLength'],
                          RequireUppercaseCharacters=params['RequireUppercaseCharacters'],
                          RequireLowercaseCharacters=params['RequireLowercaseCharacters'],
                          RequireNumbers=params['RequireNumbers'],
                          RequireSymbols=params['RequireSymbols'],
                          MaxPasswordAge=params['MaxPasswordAge'],
                          PasswordReusePrevention=params['PasswordReusePrevention'],
                          AllowUsersToChangePassword=params['AllowUsersToChangePassword']
                      )
                  elif event['RequestType'] == 'Delete':
                      client.delete_account_password_policy()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercaseCharacters: !Ref RequireUppercaseCharacters
      RequireLowercaseCharacters: !Ref RequireLowercaseCharacters
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      MaxPasswordAge: !Ref MaxPasswordAge
      PasswordReusePrevention: !Ref PasswordReusePrevention
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: EnablePermissionBoundary
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'

Outputs:
  PasswordPolicyConfiguration:
    Description: Current IAM password policy configuration
    Value: !Join
      - ', '
      - - !Sub 'MinimumLength: ${MinimumPasswordLength}'
        - !Sub 'RequireUppercase: ${RequireUppercaseCharacters}'
        - !Sub 'RequireLowercase: ${RequireLowercaseCharacters}'
        - !Sub 'RequireNumbers: ${RequireNumbers}'
        - !Sub 'RequireSymbols: ${RequireSymbols}'
        - !Sub 'MaxAge: ${MaxPasswordAge} days'
        - !Sub 'ReusePrevention: ${PasswordReusePrevention}'
        - !Sub 'AllowChanges: ${AllowUsersToChangePassword}'
  PermissionBoundaryArn:
    Description: Permission boundary ARN (if enabled)
    Value: !If
      - EnablePermissionBoundary
      - !Ref PermissionBoundaryPolicy
      - ''