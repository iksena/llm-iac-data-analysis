AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with DataDog for centralized log forwarding'

Parameters:
  DataDogApiKey:
    Type: String
    NoEcho: true
    Description: DataDog API Key for authentication
    
  ApplicationSource:
    Type: String
    Default: 'MyDataDogApp'
    Description: Source application name for event filtering
    
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: 
      - 'dev'
      - 'staging'
      - 'prod'
    Description: Environment name for resource tagging

Resources:
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq-${Environment}'
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: 
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                  - sqs:SendMessage
                Resource: 
                  - '*'
                  - !GetAtt DeadLetterQueue.Arn

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'DD-API-KEY'
          ApiKeyValue: !Ref DataDogApiKey
      Name: !Sub 'datadog-connection-${Environment}'
      Description: 'Connection to DataDog API'

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: 'https://http-intake.logs.datadoghq.com/api/v2/logs'
      Name: !Sub 'datadog-destination-${Environment}'
      InvocationRateLimitPerSecond: 300

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'datadog-rule-${Environment}'
      Description: 'Forward events to DataDog'
      State: ENABLED
      EventPattern:
        source:
          - !Ref ApplicationSource
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Id: 'SendToDataDog'
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  DataDogConnectionArn:
    Description: ARN of the DataDog Connection
    Value: !GetAtt DataDogConnection.Arn

  ApiDestinationArn:
    Description: ARN of the DataDog API Destination
    Value: !GetAtt DataDogApiDestination.Arn

  DeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref DeadLetterQueue

  DeadLetterQueueArn:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DeadLetterQueue.Arn