AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  RetentionPeriod:
    Type: Number
    Default: 24
    Description: Data retention period in hours

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-stream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriod

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-api-gateway-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  APIGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api-gateway
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
        AllowHeaders:
          - Content-Type
          - Authorization

  PutRecordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: PUT /records
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref PutRecordIntegration
      AuthorizationType: NONE

  PutRecordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord'
        - region: !Ref AWS::Region
      IntegrationMethod: POST
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      RequestParameters:
        Destination: 'integration.request.header.Content-Type'
        Value: "'application/x-amz-json-1.1'"
      RequestTemplates:
        application/json: |
          {
            "StreamName": "$context.requestOverride.path.streamName",
            "Data": "$util.base64Encode($input.json('$.data'))",
            "PartitionKey": "$input.json('$.partitionKey')"
          }

  PutRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: POST /records
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref PutRecordsIntegration
      AuthorizationType: NONE

  PutRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords'
        - region: !Ref AWS::Region
      IntegrationMethod: POST
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      RequestParameters:
        Destination: 'integration.request.header.Content-Type'
        Value: "'application/x-amz-json-1.1'"
      RequestTemplates:
        application/json: |
          {
            "StreamName": "$context.requestOverride.path.streamName",
            "Records": [
              #foreach($elem in $input.path('$'))
              {
                "Data": "$util.base64Encode($elem.data)",
                "PartitionKey": "$elem.partitionKey"
              }
              #if($foreach.hasNext),#end
              #end
            ]
          }

  GetRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /records
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref GetRecordsIntegration
      AuthorizationType: NONE

  GetRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords'
        - region: !Ref AWS::Region
      IntegrationMethod: POST
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      RequestParameters:
        Destination: 'integration.request.header.Content-Type'
        Value: "'application/x-amz-json-1.1'"
      RequestTemplates:
        application/json: |
          {
            "ShardIterator": "$input.params('shardIterator')"
          }
      PayloadFormatVersion: '2.0'

  MetadataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /metadata
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref MetadataIntegration
      AuthorizationType: NONE

  MetadataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream'
        - region: !Ref AWS::Region
      IntegrationMethod: POST
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      RequestParameters:
        Destination: 'integration.request.header.Content-Type'
        Value: "'application/x-amz-json-1.1'"
      RequestTemplates:
        application/json: |
          {
            "StreamName": "$context.requestOverride.path.streamName"
          }
      PayloadFormatVersion: '2.0'

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGateway
      StageName: $default
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt APILogGroup.Arn
        Format: $context.identity.sourceIp - - [$context.requestTime] "$context.httpMethod $context.routeKey" $context.status $context.responseLength $context.requestId

  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/api-gateway/${AWS::StackName}
      RetentionInDays: 30

Outputs:
  APIGatewayEndpoint:
    Description: The endpoint URL of the API Gateway
    Value: !Sub 'https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com'
  KinesisStreamARN:
    Description: The ARN of the Kinesis stream
    Value: !GetAtt KinesisStream.Arn