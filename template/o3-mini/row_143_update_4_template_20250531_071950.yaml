AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a secure static website hosted on S3 with CloudFront CDN integration.
  A Lambda-backed custom resource automatically deploys a default index.html file on stack creation and cleans up the bucket on deletion.

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
    DeletionPolicy: Delete

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${WebsiteBucket}/*"

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for bucket ${WebsiteBucket}"

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !Sub "${WebsiteBucket}.s3.amazonaws.com"
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOAI}"
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: LambdaS3Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${WebsiteBucket}"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${WebsiteBucket}/*"

  S3DeploymentFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3
          import traceback
          
          http = urllib3.PoolManager()
          
          def send_response(event, context, responseStatus, responseData, physicalResourceId):
              responseUrl = event['ResponseURL']
              responseBody = {
                  'Status': responseStatus,
                  'Reason': 'See CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physicalResourceId or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': responseData
              }
              json_responseBody = json.dumps(responseBody)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_responseBody))
              }
              try:
                  http.request('PUT', responseUrl, body=json_responseBody, headers=headers)
              except Exception as e:
                  print("send_response failed: " + str(e))
          
          def handler(event, context):
              physical_resource_id = context.log_stream_name
              try:
                  s3 = boto3.client('s3')
                  bucket_name = event['ResourceProperties']['BucketName']
                  if event['RequestType'] == 'Create':
                      s3.put_object(
                          Bucket=bucket_name,
                          Key='index.html',
                          Body='<html><body><h1>Welcome to the CloudFront backed static site!</h1></body></html>',
                          ContentType='text/html'
                      )
                  elif event['RequestType'] == 'Update':
                      pass
                  elif event['RequestType'] == 'Delete':
                      response = s3.list_objects_v2(Bucket=bucket_name)
                      if 'Contents' in response:
                          for obj in response['Contents']:
                              s3.delete_object(Bucket=bucket_name, Key=obj['Key'])
                  send_response(event, context, "SUCCESS", {"Message": "Operation successful"}, physical_resource_id)
              except Exception as e:
                  print("Error: " + str(e))
                  traceback.print_exc()
                  send_response(event, context, "FAILED", {"Message": str(e)}, physical_resource_id)

  S3DeploymentCustomResource:
    Type: Custom::S3Deployment
    Properties:
      ServiceToken: !GetAtt S3DeploymentFunction.Arn
      BucketName: !Ref WebsiteBucket

Outputs:
  CloudFrontDistributionDomainName:
    Description: "The domain name of the CloudFront distribution."
    Value: !GetAtt CloudFrontDistribution.DomainName
  WebsiteBucketName:
    Description: "The name of the S3 bucket hosting the website content."
    Value: !Ref WebsiteBucket