AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API for automated product creation

Parameters:
  StripeApiKey:
    Type: String
    Description: Stripe API key for authentication
    NoEcho: true
    Default: ''
  EventSourceName:
    Type: String
    Description: Event source name for EventBridge
    Default: PartnerApp
  EventDetailType:
    Type: String
    Description: Event detail type for EventBridge
    Default: PartnerAppDetailType

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: StripeIntegrationBus

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: StripeProductApi
      Description: API destination for Stripe product creation
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      ConnectionArn: !GetAtt Connection.Arn
      ApiDestinationState: ACTIVE

  Connection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Name: StripeApiConnection
      Description: Connection to Stripe API with API key authentication
      ApiKeyAuthParameters:
        Key: Authorization
        Value: !Ref StripeApiKey

  EventBusPolicy:
    Type: AWS::Events::EventBusPolicy
    Properties:
      EventBusName: !Ref EventBus
      Action: 'events:PutEvents'
      Principal: '*'
      Condition:
        Type: ArnEquals
        Key: 'aws:PrincipalArn'
        Value: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'

Outputs:
  EventBusName:
    Description: Name of the created EventBridge bus
    Value: !Ref EventBus
  ApiDestinationName:
    Description: Name of the created API destination
    Value: !Ref ApiDestination