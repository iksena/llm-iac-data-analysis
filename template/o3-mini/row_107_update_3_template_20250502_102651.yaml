AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a REST API Gateway integrated with an SQS Queue.
  The API Gateway provides a GET endpoint at /messages which triggers the SQS ReceiveMessage action.

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: ProductionQueue

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAPIGatewayReceiveMessage
            Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/*/GET/messages"

  ApiGatewaySqsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewaySQSIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQSIntegrationAPI
      Description: API Gateway integrated with SQS to retrieve messages via HTTP

  ApiGatewayResourceMessages:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: messages
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayMethodGetMessages:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId: !Ref ApiGatewayResourceMessages
      RestApiId: !Ref ApiGatewayRestApi
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:sqs:action/ReceiveMessage"
        Credentials: !GetAtt ApiGatewaySqsRole.Arn
        RequestTemplates:
          application/x-www-form-urlencoded:
            Fn::Sub: |
              Action=ReceiveMessage&QueueUrl=$util.urlEncode("${QueueUrl}")&MaxNumberOfMessages=$input.params('MaxNumberOfMessages')&VisibilityTimeout=$input.params('VisibilityTimeout')&WaitTimeSeconds=$input.params('WaitTimeSeconds')
            Variables:
              QueueUrl: !Ref SQSQueue
        PassthroughBehavior: NEVER
        IntegrationResponses:
          - StatusCode: 200
      MethodResponses:
        - StatusCode: 200

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethodGetMessages
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: prod

Outputs:
  ApiEndpoint:
    Description: "Invoke URL of the API"
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/messages"
  SQSQueueURL:
    Description: "URL of the SQS Queue"
    Value: !Ref SQSQueue
  ApiGatewayId:
    Description: "ID of the API Gateway"
    Value: !Ref ApiGatewayRestApi