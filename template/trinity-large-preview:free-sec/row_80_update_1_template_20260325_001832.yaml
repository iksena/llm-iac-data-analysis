AWSTemplateFormatVersion: '2010-09-09'
Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentIntegrationRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: BedrockModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: arn:aws:bedrock:*:*:foundationmodel/*
        - PolicyName: LambdaFunctionAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: arn:aws:lambda:*:*:function:*
        - PolicyName: BedrockAgentScope
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:*
                Resource: arn:aws:bedrock:*:*:agent/*
Outputs:
  BedrockAgentRoleArn:
    Description: ARN of the Bedrock Agent Integration Role
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: BedrockAgentRoleArn