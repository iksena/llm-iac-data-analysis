AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      CapacityProviders:
        - Fargate
        - FargateSpot
      DefaultCapacityProviderStrategy:
        - Base: 1
          Weight: 0
          CapacityProvider: Fargate
        - Base: 0
          Weight: 1
          CapacityProvider: FargateSpot
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  FargateSpotCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: FargateSpot
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/${AWS::NoValue}/autoScalingGroupName
        ManagedScaling:
          MaximumScalingStepSize: 100
          MinimumScalingStepSize: 1
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: FargateSpot-CapacityProvider

  FargateCapacityProvider:
    Type: AWS::ECS::CapacityProvider
    Properties:
      Name: Fargate
      AutoScalingGroupProvider:
        AutoScalingGroupArn: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup/${AWS::NoValue}/autoScalingGroupName
        ManagedScaling:
          MaximumScalingStepSize: 100
          MinimumScalingStepSize: 1
          Status: ENABLED
          TargetCapacity: 100
        ManagedTerminationProtection: ENABLED
      Tags:
        - Key: Name
          Value: Fargate-CapacityProvider

Outputs:
  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
  ClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn