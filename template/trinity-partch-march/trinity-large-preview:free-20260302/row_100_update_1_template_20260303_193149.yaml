AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Baseline with secure, role-based access controls and cross-account trust configurations

Parameters:
  TrustedAccountIds:
    Type: List<String>
    Description: List of trusted account IDs for cross-account access
  ToolingManagementAccountId:
    Type: String
    Description: ID of the tooling management account

Resources:
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  PrivilegedAdminRole:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdminRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  RestrictedAdminRole:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdminRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  IdentityAdminRole:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdminRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  CloudFormationRole:
    Type: AWS::IAM::Group
    Properties:
      GroupName: CloudFormationRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  StackSetRole:
    Type: AWS::IAM::Group
    Properties:
      GroupName: StackSetRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMUserChangePassword

  PrivilegedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminPolicy
      Groups:
        - !Ref PrivilegedAdminGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  RestrictedAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminPolicy
      Groups:
        - !Ref RestrictedAdminGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'iam:*'
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminPolicy
      Groups:
        - !Ref IdentityAdminGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'organizations:*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  CloudFormationPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudFormationPolicy
      Groups:
        - !Ref CloudFormationRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:*'
              - 's3:GetObject'
              - 's3:GetObjectVersion'
            Resource: '*'
          - Effect: Allow
            Action:
              - 's3:PutObject'
            Resource:
              - 'arn:aws:s3:::*-templates/*'
          - Effect: Allow
            Action:
              - 's3:List*'
            Resource: '*'

  StackSetPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StackSetPolicy
      Groups:
        - !Ref StackSetRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:CreateStackInstances'
              - 'cloudformation:CreateStackSet'
              - 'cloudformation:DeleteStackInstances'
              - 'cloudformation:DeleteStackSet'
              - 'cloudformation:Describe*'
              - 'cloudformation:List*'
              - 'cloudformation:UpdateStackInstances'
              - 'cloudformation:UpdateStackSet'
            Resource: '*'

  PrivilegedAdminRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminRolePolicy
      Roles:
        - !Ref PrivilegedAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  RestrictedAdminRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminRolePolicy
      Roles:
        - !Ref RestrictedAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'iam:*'
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  IdentityAdminRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminRolePolicy
      Roles:
        - !Ref IdentityAdminRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'organizations:*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'

  CloudFormationRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudFormationRolePolicy
      Roles:
        - !Ref CloudFormationRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:*'
              - 's3:GetObject'
              - 's3:GetObjectVersion'
            Resource: '*'
          - Effect: Allow
            Action:
              - 's3:PutObject'
            Resource:
              - 'arn:aws:s3:::*-templates/*'
          - Effect: Allow
            Action:
              - 's3:List*'
            Resource: '*'

  StackSetRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: StackSetRolePolicy
      Roles:
        - !Ref StackSetRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:CreateStackInstances'
              - 'cloudformation:CreateStackSet'
              - 'cloudformation:DeleteStackInstances'
              - 'cloudformation:DeleteStackSet'
              - 'cloudformation:Describe*'
              - 'cloudformation:List*'
              - 'cloudformation:UpdateStackInstances'
              - 'cloudformation:UpdateStackSet'
            Resource: '*'

  PrivilegedAdminRoleTrust:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRoleTrust
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

  RestrictedAdminRoleTrust:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRoleTrust
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

  IdentityAdminRoleTrust:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRoleTrust
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedAccountIds
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

  CloudFormationRoleTrust:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationRoleTrust
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ToolingManagementAccountId
            Action: 'sts:AssumeRole'

  StackSetRoleTrust:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetRoleTrust
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ToolingManagementAccountId
            Action: 'sts:AssumeRole'