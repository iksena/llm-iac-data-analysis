AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Organization-wide or Single-Account Access

Parameters:
  OrganizationId:
    Type: String
    Default: ''
    Description: AWS Organization ID for enterprise-wide access (leave empty for single-account use)

Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'my-s3-bucket-${AWS::AccountId}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  S3BucketPolicySingleAccount:
    Type: AWS::S3::BucketPolicy
    Condition: SingleAccountAccess
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${MyS3Bucket}/*'

  S3BucketPolicyOrganization:
    Type: AWS::S3::BucketPolicy
    Condition: OrganizationAccess
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${MyS3Bucket}/*'

Conditions:
  SingleAccountAccess: !Equals [!Ref OrganizationId, '']
  OrganizationAccess: !Not [!Equals [!Ref OrganizationId, '']]

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MyS3Bucket
  BucketARN:
    Description: ARN of the S3 bucket
    Value: !GetAtt MyS3Bucket.Arn