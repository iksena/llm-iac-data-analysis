AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready AWS CloudFormation template to create an AWS Security Hub instance,
  enable default security standards (CIS AWS Foundations Benchmark and AWS Foundational Security Best Practices),
  and turn on consolidated control findings via organization auto-enable configuration using a Lambda-backed custom resource.

Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties: {}

  OrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    DependsOn: SecurityHubHub
    Properties:
      AutoEnable: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubEnableStandardsLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EnableStandardsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:BatchEnableStandards
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  EnableStandardsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: EnableSecurityHubStandardsFunction
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import logging
          import boto3
          try:
              import cfnresponse
          except ImportError:
              # cfnresponse module is provided by Lambda environment
              pass

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.info("Event: %s", event)
              responseData = {}
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      client = boto3.client('securityhub')
                      standards = event['ResourceProperties'].get('StandardsArns', [])
                      if standards:
                          requests = [{'StandardsArn': arn} for arn in standards]
                          client.batch_enable_standards(StandardsSubscriptionRequests=requests)
                      responseData['Message'] = "Standards enabled successfully."
                  elif event['RequestType'] == 'Delete':
                      responseData['Message'] = "Delete request received. No action taken."
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
              except Exception as e:
                  logger.exception("Error enabling standards: %s", e)
                  responseData['Message'] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData)
                  raise

  EnableStandardsCustomResource:
    Type: Custom::EnableStandards
    DependsOn: SecurityHubHub
    Properties:
      ServiceToken: !GetAtt EnableStandardsFunction.Arn
      StandardsArns:
        - "arn:aws:securityhub:::standards/cis-aws-foundations-benchmark/v/1.2.0"
        - "arn:aws:securityhub:::standards/aws-foundational-security-best-practices/v/1.0.0"

Outputs:
  SecurityHubHubARN:
    Description: "ARN of the created AWS Security Hub instance."
    Value: !GetAtt SecurityHubHub.ARN

  StandardsEnablementStatus:
    Description: "Message indicating that the security standards have been enabled via the custom resource."
    Value: "CIS AWS Foundations Benchmark and AWS Foundational Security Best Practices standards enabled."