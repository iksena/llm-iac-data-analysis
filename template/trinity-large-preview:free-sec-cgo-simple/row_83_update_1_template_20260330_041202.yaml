AWSTemplateFormatVersion: '2010-09-09'
Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      ResourceOwner: SELF
      Name: TGW-Share
      AllowExternalPrincipals: true

  ResourceShareAssociation:
    Type: AWS::RAM::ResourceShareAssociation
    Properties:
      ResourceArn: !Ref TransitGateway
      Principal: 644519422710
      ResourceShareArn: !Ref ResourceShare

Outputs:
  TransitGatewayId:
    Description: ID of the created Transit Gateway
    Value: !Ref TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  ResourceShareId:
    Description: ID of the created Resource Share
    Value: !Ref ResourceShare
    Export:
      Name: !Sub '${AWS::StackName}-ResourceShareId'