AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to create a secure and scalable Amazon Aurora MySQL cluster
  with RDS Proxy integration. This template provisions a VPC with private subnets across multiple Availability Zones,
  deploys an Aurora MySQL cluster with primary and reader instances, integrates RDS Proxy with a target group for connection pooling,
  manages credentials via Secrets Manager, and enables IAM authentication, CloudWatch logging, enhanced monitoring,
  and performance insights.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: "10.0.1.0/24"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: "10.0.2.0/24"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets available for Aurora DB cluster."
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      DBSubnetGroupName: "aurora-dbsubnet-group"

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for Lambda functions authorized to access the DB."
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: LambdaAccessSecurityGroup

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for Aurora DB cluster; allows inbound access from authorized resources."
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: AuroraDBSecurityGroup

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: "aurora-mysql-credentials"
      Description: "Secret for Aurora MySQL cluster master credentials"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "dbadmin"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 16

  RDSEnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "RDSEnhancedMonitoringRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole"

  RDSProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "RDSProxyRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: "RDSProxySecretsManagerAccess"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "secretsmanager:GetSecretValue"
                  - "secretsmanager:DescribeSecret"
                Resource: !Ref DBSecret

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: "aurora-mysql"
      EngineMode: "provisioned"
      EngineVersion: "5.7.mysql_aurora.2.11.6"
      DBClusterIdentifier: "aurora-mysql-cluster"
      MasterUsername: "dbadmin"
      MasterUserPassword: !Join ["", ["{{resolve:secretsmanager:", !Ref DBSecret, ":SecretString:password}}"]]
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true
      PreferredBackupWindow: "07:00-09:00"
      PreferredMaintenanceWindow: "sat:10:00-sat:11:00"
      EnableCloudwatchLogsExports:
        - "error"
        - "general"
        - "slowquery"
      PerformanceInsightsEnabled: true
      PerformanceInsightsRetentionPeriod: 7
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt RDSEnhancedMonitoringRole.Arn
      Tags:
        - Key: Name
          Value: AuroraMySQLCluster

  AuroraDBInstancePrimary:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: "aurora-mysql-primary"
      Engine: "aurora-mysql"
      DBInstanceClass: "db.r5.large"
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: AuroraMySQLPrimary

  AuroraDBInstanceReader:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceIdentifier: "aurora-mysql-reader"
      Engine: "aurora-mysql"
      DBInstanceClass: "db.r5.large"
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: AuroraMySQLReader

  RDSProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: "aurora-mysql-proxy"
      EngineFamily: "MYSQL"
      RoleArn: !GetAtt RDSProxyRole.Arn
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      RequireTLS: true
      IdleClientTimeout: 1800
      DebugLogging: true
      Auth:
        - AuthScheme: "SECRETS"
          Description: "Authentication using Secrets Manager"
          SecretArn: !Ref DBSecret
          IAMAuth: "ENABLED"

  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: "default"
      ConnectionPoolConfigurationInfo:
        ConnectionBorrowTimeout: 120
        MaxConnectionsPercent: 100
        MaxIdleConnectionsPercent: 50
      DBClusterIdentifiers:
        - !Ref AuroraDBCluster

Outputs:
  VPCId:
    Description: "VPC ID for the created VPC"
    Value: !Ref VPC
  AuroraClusterEndpoint:
    Description: "Aurora MySQL Cluster Endpoint"
    Value: !Join ["", [ !GetAtt AuroraDBCluster.Endpoint ]]
  RDSProxyEndpoint:
    Description: "RDS Proxy Endpoint"
    Value: !Join ["", [ !GetAtt RDSProxy.Endpoint ]]
  DBSecretARN:
    Description: "ARN of the Secrets Manager secret for Aurora MySQL credentials"
    Value: !Ref DBSecret