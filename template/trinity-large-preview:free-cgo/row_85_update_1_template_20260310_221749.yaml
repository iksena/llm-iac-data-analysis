AWSTemplateFormatVersion: '2010-09-09'
Description: Secure and cost-optimized S3 bucket for CloudWatch export data with versioning and lifecycle management

Parameters:
  BucketName:
    Type: String
    Default: cloudwatch-exports
    Description: Name of the S3 bucket for CloudWatch export data
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning objects to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365
    Description: Number of days before permanently deleting objects

Resources:
  CloudWatchExportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      Versioning:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: GlacierTransition
            Status: Enabled
            Transition:
              Days: !Ref LifecycleTransitionDays
              StorageClass: GLACIER
          - Id: Expiration
            Status: Enabled
            ExpirationInDays: !Ref LifecycleExpirationDays
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LoggingConfiguration:
        DestinationBucketName: !Ref BucketName
        LogFilePrefix: logs/

  CloudWatchExportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudWatchExportsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}'
              - !Sub 'arn:${AWS::Partition}:s3:::${BucketName}/*'
            Condition:
              StringNotLike:
                aws:userId:
                  - !Sub '${AWS::AccountId}:root'
                  - !Sub '${AWS::AccountId}:cloudwatch-exports-role'

Outputs:
  BucketARN:
    Description: ARN of the CloudWatch exports bucket
    Value: !GetAtt CloudWatchExportsBucket.Arn
  BucketName:
    Description: Name of the CloudWatch exports bucket
    Value: !Ref CloudWatchExportsBucket