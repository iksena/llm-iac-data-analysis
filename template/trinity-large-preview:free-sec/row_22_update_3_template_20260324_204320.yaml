AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for DynamoDB table with local and global secondary indexes

Parameters:
  ReadCapacityUnits:
    Type: Number
    Default: 5
  WriteCapacityUnits:
    Type: Number
    Default: 5
  BillingMode:
    Type: String
    Default: PROVISIONED
    AllowedValues: [PROVISIONED, PAY_PER_REQUEST]
  PointInTimeRecovery:
    Type: String
    Default: true
    AllowedValues: [true, false]
  KmsKeyId:
    Type: String
    Default: alias/aws/dynamodb

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Table
      BillingMode: !Ref BillingMode
      KeySchema:
        - AttributeName: PartitionKey
          KeyType: HASH
        - AttributeName: SortKey
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PartitionKey
          AttributeType: S
        - AttributeName: SortKey
          AttributeType: S
        - AttributeName: LSIKey
          AttributeType: S
        - AttributeName: GSIKey
          AttributeType: S
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      LocalSecondaryIndexes:
        - IndexName: LSIIndex
          KeySchema:
            - AttributeName: PartitionKey
              KeyType: HASH
            - AttributeName: LSIKey
              KeyType: RANGE
          Projection:
            ProjectionType: KEYS_ONLY
      GlobalSecondaryIndexes:
        - IndexName: GSIIndex
          KeySchema:
            - AttributeName: GSIKey
              KeyType: HASH
            - AttributeName: SortKey
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !Ref PointInTimeRecovery
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref KmsKeyId
      Tags:
        - Key: Environment
          Value: !Sub ${AWS::StackName}

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref DynamoDBTable
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt DynamoDBTable.Arn
  TableStreamArn:
    Description: DynamoDB table stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn