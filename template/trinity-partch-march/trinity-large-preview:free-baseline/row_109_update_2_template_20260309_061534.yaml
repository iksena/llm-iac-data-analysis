AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: MongoDBEventBus
      Description: Event bus for MongoDB integration

  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: MongoDBApiKey
      Description: API key for MongoDB authentication
      SecretString: '{"test_name": "test_value"}'

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  MongoDBApiDestination:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      Description: API destination for MongoDB
      ConnectionArn: !GetAtt EventBridgeIAMRole.Arn
      InvocationEndpoint: 'https://www.testanu.com'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDeadLetterQueue
      MessageRetentionPeriod: 1209600

Outputs:
  EventBusArn:
    Value: !Ref EventBridgeEventBus
    Description: ARN of the EventBridge event bus
  ApiDestinationArn:
    Value: !Ref MongoDBApiDestination
    Description: ARN of the API destination
  QueueUrl:
    Value: !Ref DeadLetterQueue
    Description: URL of the dead-letter queue