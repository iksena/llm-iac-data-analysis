AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table for storing ArtistId, Concert, and TicketSales information.

Parameters:
  TableName:
    Type: String
    Description: The name of the DynamoDB table
    Default: ArtistConcertTicketSales
  ReadCapacityUnits:
    Type: Number
    Description: The number of read capacity units for the DynamoDB table
    Default: 5
  WriteCapacityUnits:
    Type: Number
    Description: The number of write capacity units for the DynamoDB table
    Default: 5

Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref ArtistConcertTicketSalesTable