AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure S3 Bucket with Replica and Access Logging'

Parameters:
  MainBucketName:
    Type: String
    Description: 'Name for the main S3 bucket'
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must follow S3 naming rules'
  
  ReplicaBucketName:
    Type: String
    Description: 'Name for the replica S3 bucket'
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must follow S3 naming rules'
  
  AccessLogBucketName:
    Type: String
    Description: 'Name for the access log S3 bucket'
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must follow S3 naming rules'
  
  KmsKeyArn:
    Type: String
    Description: 'ARN of KMS key for encryption (leave blank to create new)'
    Default: ''

Resources:
  KmsKey:
    Type: 'AWS::KMS::Key'
    Condition: CreateKmsKey
    Properties:
      Description: 'KMS key for S3 bucket encryption'
      KeyPolicy:
        Version: '2012-10-17'
        Id: 'key-default-1'
        Statement:
          - Sid: 'Enable IAM User Permissions'
            Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  KmsKeyAlias:
    Type: 'AWS::KMS::Alias'
    Condition: CreateKmsKey
    Properties:
      AliasName: 'alias/s3-bucket-key'
      TargetKeyId: !Ref KmsKey

  AccessLogBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref AccessLogBucketName
      AccessControl: LogDeliveryWrite
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  MainBucket:
    Type: 'AWS::S3::Bucket'
    DependsOn: AccessLogBucket
    Properties:
      BucketName: !Ref MainBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: 'main-bucket-logs/'
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Destination:
              Bucket: !GetAtt ReplicaBucket.Arn
              StorageClass: STANDARD
            Status: Enabled
            Prefix: ''

  ReplicaBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref ReplicaBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ReplicationRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 's3.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'ReplicationPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 's3:GetReplicationConfiguration'
                  - 's3:ListBucket'
                Resource: !GetAtt MainBucket.Arn
              - Effect: 'Allow'
                Action:
                  - 's3:GetObjectVersion'
                  - 's3:GetObjectVersionAcl'
                  - 's3:GetObjectVersionTagging'
                Resource: !Sub '${MainBucket.Arn}/*'
              - Effect: 'Allow'
                Action:
                  - 's3:ReplicateObject'
                  - 's3:ReplicateDelete'
                  - 's3:ReplicateTags'
                Resource: !Sub '${ReplicaBucket.Arn}/*'
              - Effect: 'Allow'
                Action:
                  - 'kms:Decrypt'
                  - 'kms:Encrypt'
                  - 'kms:GenerateDataKey'
                Resource: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]

  MainBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Deny'
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt MainBucket.Arn
              - !Sub '${MainBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Conditions:
  CreateKmsKey: !Equals [!Ref KmsKeyArn, '']

Outputs:
  MainBucketArn:
    Description: 'ARN of the main S3 bucket'
    Value: !GetAtt MainBucket.Arn
  ReplicaBucketArn:
    Description: 'ARN of the replica S3 bucket'
    Value: !GetAtt ReplicaBucket.Arn
  AccessLogBucketArn:
    Description: 'ARN of the access log S3 bucket'
    Value: !GetAtt AccessLogBucket.Arn
  KmsKeyArn:
    Description: 'ARN of the KMS key used for encryption'
    Value: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
    Condition: CreateKmsKey