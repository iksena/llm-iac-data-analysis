AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with event-driven notifications to an SNS topic

Parameters:
  S3BucketName:
    Type: String
    Default: 's3-events-bucket'
    Description: Name of the S3 bucket (must be DNS-compliant)
  SNSTopicName:
    Type: String
    Default: 's3-events-topic'
    Description: Name of the SNS topic (must be DNS-compliant)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      NotificationConfiguration:
        TopicConfigurations:
          - Event: 's3:ObjectCreated:*'
            Topic: !Ref SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ToPublishEvents
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Sub 'arn:${AWS::Partition}:sns:${AWS::Region}:${AWS::AccountId}:${SNSTopicName}'
            Condition:
              ArnLike:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${S3BucketName}'

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  S3BucketArn:
    Description: ARN of the created S3 bucket
    Value: !GetAtt S3Bucket.Arn
  SNSTopicArn:
    Description: ARN of the created SNS topic
    Value: !Ref SNSTopic
  SNSTopicName:
    Description: Name of the created SNS topic
    Value: !Ref SNSTopic