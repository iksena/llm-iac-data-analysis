AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2IAMReadOnlyRole1:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  EC2IAMReadOnlyRole2:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  IAMMetadataReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allows read-only access to IAM metadata
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'
      Roles:
        - !GetAtt EC2IAMReadOnlyRole1.RoleName
        - !GetAtt EC2IAMReadOnlyRole2.RoleName

Outputs:
  Role1ARN:
    Value: !GetAtt EC2IAMReadOnlyRole1.Arn
  Role2ARN:
    Value: !GetAtt EC2IAMReadOnlyRole2.Arn
  ManagedPolicyARN:
    Value: !Ref IAMMetadataReadPolicy