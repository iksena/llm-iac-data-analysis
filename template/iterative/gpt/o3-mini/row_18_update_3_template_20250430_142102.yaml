AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template to integrate DynamoDB Streams with Amazon EventBridge using EventBridge Pipes. Filters DynamoDB stream events for records where the 'avatarUrl' field ends with '.png' and routes matching events to the default EventBridge bus."

Parameters:
  DynamoDBTableName:
    Description: "Name of the DynamoDB table."
    Type: String
    Default: "UserTable"

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_IMAGE

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "DynamoDBPipeRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - pipes.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: "PipeDynamoDBEventBridgePolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.StreamArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"

  DynamoDBStreamToEventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: "DynamoDBStreamToEventBridgePipe"
      RoleArn: !GetAtt PipeRole.Arn
      Source: !GetAtt DynamoDBTable.StreamArn
      Target: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: TRIM_HORIZON
          BatchSize: 100
      TargetParameters:
        EventBridgeEventParameters:
          DetailType: "DynamoDB_Stream_Event"
          Source: "custom.dynamodb"
      FilterCriteria:
        Filters:
          - '{"detail": {"dynamodb": {"NewImage": {"avatarUrl": [{"suffix": ".png"}]}}}}'

Outputs:
  DynamoDBTableOutput:
    Description: "The name of the DynamoDB table created."
    Value: !Ref DynamoDBTable
  EventBridgePipeOutput:
    Description: "The ARN of the EventBridge Pipe connecting DynamoDB Streams to EventBridge."
    Value: !GetAtt DynamoDBStreamToEventBridgePipe.Arn