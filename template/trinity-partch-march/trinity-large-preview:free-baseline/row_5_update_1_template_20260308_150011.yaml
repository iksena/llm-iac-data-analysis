AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table for ArtistId, Concert, and TicketSales

Resources:
  ArtistConcertTicketSalesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Parameters:
  TableName:
    Type: String
    Default: ArtistConcertTicketSales
    Description: The name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units for the DynamoDB table
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for the DynamoDB table

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref ArtistConcertTicketSalesTable