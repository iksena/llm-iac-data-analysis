AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with EventBridge using Pipes

Parameters:
  TableName:
    Type: String
    Default: IntegrationTable
    Description: Name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: DynamoDB read capacity units
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: DynamoDB write capacity units
  EventDetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType for EventBridge events
  EventSource:
    Type: String
    Default: com.company.avatar
    Description: Source for EventBridge events

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-EventBridgePipeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub pipes.${AWS::Region}.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetEventBridgePolicy
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/stream/*
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: '*'

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-DynamoDBToEventBridgePipe
      PipeState: RUNNING
      SourceConfig:
        SourceType: DYNAMODB
        SourceParameters:
          DynamoDBStreamParameters:
            StreamArn: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/stream/*
      Target:
        Type: EVENTBRIDGE
        TargetParameters:
          EventBridgeParameters:
            DetailType: !Ref EventDetailType
            Source: !Ref EventSource
            EventBusName: default
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Enrichment: NONE
      TargetBatchSize: 100
      RetryStrategy:
        MaximumRetryAttempts: 3
        MaximumEventAgeInSeconds: 86400

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-AvatarFilterRule
      EventPattern:
        source:
          - !Ref EventSource
        detail-type:
          - !Ref EventDetailType
        detail:
          avatarUrl:
            endWith:
              - '.png'
      State: ENABLED
      EventBusName: default

Outputs:
  DynamoDBTableArn:
    Description: DynamoDB Table ARN
    Value: !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}
  EventBridgePipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn