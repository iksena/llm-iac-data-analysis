AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with EventBridge and SNS Integration for Object Creation Notifications

Parameters:
  BucketName:
    Type: String
    Default: !Sub 's3-eventbridge-sns-${AWS::AccountId}-${AWS::Region}'
    Description: Name of the S3 bucket
  SNSTopicName:
    Type: String
    Default: 's3-object-creation-notifications'
    Description: Name of the SNS topic
  SubscriptionEmail:
    Type: String
    Default: 'user@example.com'
    Description: Email address to subscribe to notifications
    AllowedPattern: '^[\w\.\+\-]+@[\w\.-]+\.\w{2,}$'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref SubscriptionEmail
      Protocol: email
      TopicArn: !Ref SNSTopic

  S3BucketNotification:
    Type: AWS::S3::BucketNotification
    Properties:
      Bucket: !Ref S3Bucket
      EventBridgeEventBusConfig:
        Arn: !GetAtt S3Bucket.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for S3 object creation events
      EventPattern:
        source:
          - aws.s3
        detail:
          eventNames:
            - 'ObjectCreated:*'
          bucket:
            name:
              - !Ref BucketName
      State: ENABLED
      Targets:
        - Arn: !Ref SNSTopic
          Id: S3ObjectCreationTarget

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  EventBridgeRuleArn:
    Description: ARN of the EventBridge rule
    Value: !Ref EventBridgeRule