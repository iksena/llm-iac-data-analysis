AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS file system with monitoring and automated backups'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where EFS will be deployed

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of subnet IDs for mount targets (minimum 2 subnets recommended)

  EnableBackups:
    Type: String
    AllowedValues: 
      - 'true'
      - 'false'
    Default: 'true'
    Description: Enable automated backups

  BackupSchedule:
    Type: String
    Default: 'cron(0 5 ? * * *)'
    Description: CRON expression for backup schedule
    AllowedPattern: '^cron\([-,*/0-9 ]+ [-,*/0-9 ]+ [-,*/0-9? ]+ [-,*/0-9 ]+ [-,*/0-9? ]+ [-,*/0-9 ]*\)$'

  PerformanceMode:
    Type: String
    AllowedValues: 
      - generalPurpose
      - maxIO
    Default: generalPurpose
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    AllowedValues: 
      - bursting
      - provisioned
    Default: bursting
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    Default: 128
    MinValue: 1
    MaxValue: 1024
    Description: Provisioned throughput in MiB/s (only applicable for provisioned mode)

  Environment:
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production
    Description: Environment tag for resources

Conditions:
  IsBackupEnabled: !Equals [!Ref EnableBackups, 'true']
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Select [0, !Cidr [!ImportValue !Sub "${VpcId}-CidrBlock", 1, 8]]
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs-sg
        - Key: Environment
          Value: !Ref Environment

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs
        - Key: Environment
          Value: !Ref Environment
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      BackupPolicy:
        Status: !If [IsBackupEnabled, ENABLED, DISABLED]

  MountTarget1:
    Type: AWS::EFS::MountTarget
    DependsOn: EFSFileSystem
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    DependsOn: 
      - EFSFileSystem
      - MountTarget1
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: IsBackupEnabled
    Properties:
      BackupVaultName: !Sub ${AWS::StackName}-backup-vault
      Tags:
        - Key: Environment
          Value: !Ref Environment

  BackupRole:
    Type: AWS::IAM::Role
    Condition: IsBackupEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
      Policies:
        - PolicyName: EFSBackupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:Backup
                  - elasticfilesystem:Restore
                  - elasticfilesystem:CreateFilesystem
                  - elasticfilesystem:DescribeFilesystems
                Resource: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: IsBackupEnabled
    DependsOn: BackupRole
    Properties:
      BackupPlan:
        BackupPlanName: !Sub ${AWS::StackName}-backup-plan
        BackupPlanRule:
          - RuleName: DailyBackups
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 120
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: IsBackupEnabled
    DependsOn: BackupPlan
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFSBackupSelection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  EFSAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-efs-alarms
      Tags:
        - Key: Environment
          Value: !Ref Environment

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: EFSFileSystem
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-io-utilization
      AlarmDescription: Alert when I/O utilization is high
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem
      AlarmActions:
        - !Ref EFSAlarmTopic
      ActionsEnabled: true

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem

  FileSystemDNS:
    Description: EFS File System DNS Name
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  FileSystemArn:
    Description: EFS File System ARN
    Value: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}

  MountCommand:
    Description: Example mount command
    Value: !Sub 'sudo mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com:/ efs'

  BackupVaultName:
    Condition: IsBackupEnabled
    Description: Name of the backup vault
    Value: !Ref BackupVault

  SecurityGroupId:
    Description: Security Group ID for EFS
    Value: !Ref EFSSecurityGroup