AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub 'kubernetes-images-${AWS::AccountId}'
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:BatchGetImage
              - ecr:DescribeRepositories
              - ecr:GetDownloadUrlForLayer
              - ecr:GetRepositoryPolicy
              - ecr:ListImages
              - ecr:DescribeImages
      Tags:
        - Key: Environment
          Value: Production
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: KubernetesContainerImages
Outputs:
  RepositoryUri:
    Description: ECR Repository URI for Kubernetes deployments
    Value: !GetAtt ECRRepository.RepositoryUri