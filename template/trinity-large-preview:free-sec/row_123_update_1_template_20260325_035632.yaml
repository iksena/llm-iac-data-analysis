AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Stripe's product API

Parameters:
  StripeApiKey:
    Type: String
    Default: "sk_test_placeholder"
    AllowedPattern: "^sk_test_[a-zA-Z0-9]{24}$"
    Description: Stripe API key for authentication

Resources:
  PartnerAppBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: PartnerAppBus

  StripeApiConnection:
    Type: AWS::Events::ApiDestinationConnection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyName: Authorization
      ApiKeyValue: !Ref StripeApiKey

  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionName: !Ref StripeApiConnection
      InvocationEndpoint: https://api.stripe.com/v1/products
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  PartnerAppRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref PartnerAppBus
      EventPattern:
        source:
          - PartnerApp
        "detail-type":
          - PartnerAppDetailType
      Targets:
        - Arn: !GetAtt StripeApiDestination.ApiDestinationArn
          Id: StripeProductTarget

Outputs:
  EventBusName:
    Description: EventBridge bus name
    Value: !Ref PartnerAppBus
  ApiDestinationArn:
    Description: Stripe API destination ARN
    Value: !GetAtt StripeApiDestination.ApiDestinationArn