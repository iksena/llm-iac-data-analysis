AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: index.handler
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const records = event.Records || [];
            for (const record of records) {
              if (record.eventName === 'MODIFY' && record.dynamodb.NewImage.avatarUrl.S.endsWith('.png')) {
                const eventBridgeEvent = {
                  Source: 'com.example.user.avatar',
                  DetailType: 'UserAvatarUpdate',
                  Detail: JSON.stringify(record.dynamodb.NewImage),
                  EventBusName: 'default'
                };
                const response = await fetch('https://events.amazonaws.com/', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/x-amz-json-1.1',
                    'X-Amz-Target': 'AWSEvents.PutEvents'
                  },
                  body: JSON.stringify(eventBridgeEvent)
                });
                return response.json();
              }
            }
          };
      Role: !GetAtt LambdaRole.Arn
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: '*'
  LambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt DynamoDBTable.StreamArn
      FunctionName: !Ref LambdaFunction
      StartingPosition: LATEST
      BatchSize: 100
Outputs:
  DynamoDBStreamArn:
    Value: !GetAtt DynamoDBTable.StreamArn
  LambdaArn:
    Value: !GetAtt LambdaFunction.Arn