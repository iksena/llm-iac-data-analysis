AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time data ingestion pipeline with Kinesis Data Stream, Kinesis Data Firehose, and S3'

Parameters:
  KinesisStreamName:
    Type: String
    Description: 'Name of the Kinesis Data Stream'
    Default: 'DataIngestionStream'
  
  FirehoseDeliveryStreamName:
    Type: String
    Description: 'Name of the Kinesis Data Firehose Delivery Stream'
    Default: 'DataDeliveryStream'
  
  S3BucketName:
    Type: String
    Description: 'Name of the S3 bucket for data storage'
    Default: 'data-ingestion-bucket'
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Bucket name must be lowercase and can contain only letters, numbers, and hyphens'
  
  BufferIntervalInSeconds:
    Type: Number
    Description: 'Buffer interval in seconds for Firehose'
    Default: 60
    MinValue: 60
    MaxValue: 900
  
  BufferSizeInMBs:
    Type: Number
    Description: 'Buffer size in MBs for Firehose'
    Default: 5
    MinValue: 1
    MaxValue: 128

Resources:
  KinesisDataStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: 1
      RetentionPeriodHours: 24

  DataBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: 'DeleteOldData'
            Status: Enabled
            ExpirationInDays: 365

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'firehose.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/service-role/'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonKinesisFullAccess'
      Policies:
        - PolicyName: 'FirehoseS3AccessPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:GenerateDataKey'
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:ViaService': 's3.amazonaws.com'
                  StringLike:
                    'kms:EncryptionContext:aws:s3:arn': !Sub 'arn:aws:s3:::${S3BucketName}/*'

  FirehoseDeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Ref FirehoseDeliveryStreamName
      DeliveryStreamType: 'KinesisStreamAsSource'
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${S3BucketName}'
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: !Ref BufferIntervalInSeconds
          SizeInMBs: !Ref BufferSizeInMBs
        CompressionFormat: 'GZIP'
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        ErrorOutputPrefix: 'errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: '/aws/kinesisfirehose/DeliveryStreamLogs'
          LogStreamName: !Sub '${FirehoseDeliveryStreamName}-S3Delivery'

Outputs:
  KinesisStreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisDataStream.Arn
  
  FirehoseDeliveryStreamARN:
    Description: 'ARN of the Kinesis Data Firehose Delivery Stream'
    Value: !GetAtt FirehoseDeliveryStream.Arn
  
  S3BucketName:
    Description: 'Name of the S3 bucket for data storage'
    Value: !Ref S3BucketName
  
  FirehoseRoleARN:
    Description: 'ARN of the IAM role for Firehose'
    Value: !GetAtt FirehoseRole.Arn