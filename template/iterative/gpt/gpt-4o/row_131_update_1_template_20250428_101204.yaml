AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a centralized alerting system using Amazon SNS,
  aggregating notifications from multiple AWS services and routing them to configurable endpoints.

Parameters:
  EmailEndpoint:
    Description: "Email address to receive notifications"
    Type: String
    Default: ""
  HttpEndpoint:
    Description: "HTTPS URL to receive notifications"
    Type: String
    Default: ""

Conditions:
  HasEmailEndpoint: !Not [!Equals [!Ref EmailEndpoint, ""]]
  HasHttpEndpoint: !Not [!Equals [!Ref HttpEndpoint, ""]]

Resources:
  AlertingSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralizedAlertingTopic

  AlertingSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AlertingSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - cloudwatch.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
                - budgets.amazonaws.com
            Action: 'SNS:Publish'
            Resource: !Ref AlertingSNSTopic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmailEndpoint
    Properties:
      TopicArn: !Ref AlertingSNSTopic
      Protocol: email
      Endpoint: !Ref EmailEndpoint

  HttpSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasHttpEndpoint
    Properties:
      TopicArn: !Ref AlertingSNSTopic
      Protocol: https
      Endpoint: !Ref HttpEndpoint
      DeliveryPolicy:
        healthyRetryPolicy:
          minDelayTarget: 20
          maxDelayTarget: 20
          numRetries: 3
          numMaxDelayRetries: 0
          numNoDelayRetries: 0
          numMinDelayRetries: 0
          backoffFunction: linear

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: FallbackAlertingTopic

  CloudWatchAlarmForFailedNotifications:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationAlarm
      AlarmDescription: "Alarm for failed SNS notifications"
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Dimensions:
        - Name: TopicName
          Value: !GetAtt AlertingSNSTopic.TopicName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic

Outputs:
  MainSNSTopicARN:
    Description: "ARN of the main SNS topic for alerting"
    Value: !Ref AlertingSNSTopic

  FallbackSNSTopicARN:
    Description: "ARN of the fallback SNS topic"
    Value: !Ref FallbackSNSTopic

  FailedNotificationAlarmName:
    Description: "Name of the CloudWatch Alarm for failed notifications"
    Value: !Ref CloudWatchAlarmForFailedNotifications