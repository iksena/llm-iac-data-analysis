AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MessageQueue

  SQSPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt SQSQueue.Arn

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSAPIGatewayPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQSMessagesAPI
      Description: API Gateway for retrieving SQS messages

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !GetAtt ApiGateway.RootResourceId
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.querystring.maxNumberOfMessages: false
        method.request.querystring.visibilityTimeout: false
        method.request.querystring.waitTimeSeconds: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: GET
        Credentials: !GetAtt ApiGatewayRole.Arn
        Uri: !Sub 
          - 'arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}'
          - QueueName: !GetAtt SQSQueue.QueueName
        PassthroughBehavior: NEVER
        RequestParameters:
          integration.request.querystring.Action: "'ReceiveMessage'"
          integration.request.querystring.Version: "'2012-11-05'"
          integration.request.querystring.MaxNumberOfMessages: "method.request.querystring.maxNumberOfMessages"
          integration.request.querystring.VisibilityTimeout: "method.request.querystring.visibilityTimeout"
          integration.request.querystring.WaitTimeSeconds: "method.request.querystring.waitTimeSeconds"
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: "#set($inputRoot = $input.path('$'))\n$inputRoot"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref ApiGateway

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod"