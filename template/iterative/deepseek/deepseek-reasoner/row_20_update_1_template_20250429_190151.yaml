AWSTemplateFormatVersion: '2010-09-09'
Description: CloudWatch Dashboard and Logs Insights queries for Client VPN monitoring

Resources:
  ClientVPNDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPN-Monitoring
      DashboardBody:
        Fn::Sub: |
          {
            "widgets": [
              {
                "type": "text",
                "x": 0,
                "y": 0,
                "width": 24,
                "height": 2,
                "properties": {
                  "markdown": "# Client VPN Usage Dashboard\n## Overall Metrics and Usage Patterns"
                }
              },
              {
                "type": "metric",
                "x": 0,
                "y": 2,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "ActiveConnections", { "stat": "Sum" } ]
                  ],
                  "view": "singleValue",
                  "region": "${AWS::Region}",
                  "title": "Active Connections"
                }
              },
              {
                "type": "metric",
                "x": 8,
                "y": 2,
                "width": 8,
                "height": 6,
                "properties": {
                  "metrics": [
                    [ "AWS/ClientVPN", "DataTransferIn", { "stat": "Sum" } ],
                    [ ".", "DataTransferOut", { "stat": "Sum" } ]
                  ],
                  "view": "timeSeries",
                  "region": "${AWS::Region}",
                  "title": "Data Transfer Volumes"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 8,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "SOURCE '/aws/clientvpn/connections' | fields @timestamp, user, endpoint\n| filter eventType = 'connection-established' or eventType = 'connection-terminated'\n| parse @message /user=(?<user>[^\\s]+)/\n| stats max(@timestamp) - min(@timestamp) as duration by user, endpoint\n| sort duration desc",
                  "region": "${AWS::Region}",
                  "view": "table",
                  "title": "Connection Durations by User/Endpoint"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 14,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '/aws/clientvpn/authentication' | fields authentication.method\n| stats count() by authentication.method\n| sort authentication.method asc",
                  "region": "${AWS::Region}",
                  "view": "pie",
                  "title": "Authentication Type Distribution"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 14,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "SOURCE '/aws/clientvpn/connections' | fields endpoint, user\n| stats count() as Connections by endpoint, user\n| sort Connections desc",
                  "region": "${AWS::Region}",
                  "view": "table",
                  "title": "Endpoint Usage Statistics"
                }
              }
            ]
          }

  ConnectionDurationsQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/ConnectionDurations"
      QueryString: |
        fields @timestamp, user, endpoint
        | filter eventType = 'connection-established' or eventType = 'connection-terminated'
        | parse @message /user=(?<user>[^\s]+)/
        | stats max(@timestamp) - min(@timestamp) as duration by user, endpoint
        | sort duration desc
      LogGroupNames:
        - "/aws/clientvpn/connections"

  AuthTypeBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/AuthTypeBreakdown"
      QueryString: |
        fields authentication.method
        | stats count() by authentication.method
        | sort authentication.method asc
      LogGroupNames:
        - "/aws/clientvpn/authentication"

  EndpointUsageQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/EndpointUsage"
      QueryString: |
        fields endpoint, user
        | stats count() as Connections by endpoint, user
        | sort Connections desc
      LogGroupNames:
        - "/aws/clientvpn/connections"

  UserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: "ClientVPN/UserActivity"
      QueryString: |
        fields user, authentication.type
        | stats count() as ActivityCount by user, authentication.type
        | sort ActivityCount desc
      LogGroupNames:
        - "/aws/clientvpn/authentication"
        - "/aws/clientvpn/connections"

Outputs:
  DashboardName:
    Value: !Ref ClientVPNDashboard
    Description: Name of the CloudWatch Dashboard
  SavedQueries:
    Value: !Join
      - ", "
      - - "ClientVPN/ConnectionDurations"
        - "ClientVPN/AuthTypeBreakdown"
        - "ClientVPN/EndpointUsage"
        - "ClientVPN/UserActivity"
    Description: List of saved CloudWatch Logs Insights queries