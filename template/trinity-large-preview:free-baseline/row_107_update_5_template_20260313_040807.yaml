AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with SQS for message retrieval

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If [UseCustomQueueName, !Ref QueueName, !Ref 'AWS::NoValue']

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  APIGatewayPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: APIGatewaySQSPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:GetQueueUrl
            Resource: !GetAtt SQSQueue.Arn
      Roles:
        - !Ref APIGatewayRole

  APIGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !If [UseCustomApiName, !Ref ApiName, !Ref 'AWS::NoValue']
      ProtocolType: HTTP

  APIGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${SQSQueue}
        - !If [UseCustomQueueName, !Ref QueueName, !Ref 'AWS::NoValue']
      ConnectionType: INTERNET
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '1.0'

  APIGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /
      Target: !Join
        - '/'
        - - integrations
          - !Ref APIGatewayIntegration

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGateway
      StageName: !If [UseCustomStageName, !Ref StageName, 'prod']
      AutoDeploy: true

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt APIGatewayRole.Arn
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

Parameters:
  QueueName:
    Type: String
    Default: ''
    Description: Optional custom name for the SQS queue
  ApiName:
    Type: String
    Default: ''
    Description: Optional custom name for the API Gateway
  StageName:
    Type: String
    Default: ''
    Description: Optional custom name for the API Gateway stage

Conditions:
  UseCustomQueueName: !Not [!Equals [!Ref QueueName, '']]
  UseCustomApiName: !Not [!Equals [!Ref ApiName, '']]
  UseCustomStageName: !Not [!Equals [!Ref StageName, '']]

Outputs:
  QueueUrl:
    Description: URL of the created SQS queue
    Value: !GetAtt SQSQueue.QueueUrl
  ApiEndpoint:
    Description: Endpoint URL of the API Gateway
    Value: !Sub 'https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com/${APIGatewayStage}'