AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  QueueName:
    Type: String
    Default: basic-sqs-queue
    Description: Name of the SQS queue
    AllowedPattern: '^[a-zA-Z0-9-_]{1,80}$'
    ConstraintDescription: Queue name must be 1-80 alphanumeric characters, hyphens, or underscores.
  VisibilityTimeoutSeconds:
    Type: Number
    Default: 30
    Description: Visibility timeout for messages in seconds
    MinValue: 0
    MaxValue: 43200
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Retention period for messages in seconds
    MinValue: 60
    MaxValue: 1209600
  DelaySeconds:
    Type: Number
    Default: 0
    Description: Delay for message delivery in seconds
    MinValue: 0
    MaxValue: 900
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: Wait time for ReceiveMessage in seconds
    MinValue: 0
    MaxValue: 20
Resources:
  BasicSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeout: !Ref VisibilityTimeoutSeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      DelaySeconds: !Ref DelaySeconds
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref BasicSQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueUrl'
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt BasicSQSQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'