AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  Stage:
    Type: String
    AllowedValues: [PROD, CODE]
    Default: PROD
    Description: Deployment environment stage (PROD/CODE)

Conditions:
  IsProd: !Equals [!Ref Stage, PROD]

Resources:
  SupporterProductDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub SupporterProductData-${Stage}
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: !If [IsProd, PROVISIONED, PAY_PER_REQUEST]
      ProvisionedThroughput: !If
        - IsProd
        - ReadCapacityUnits: 20
          WriteCapacityUnits: 5
        - !Ref AWS::NoValue
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiryDate
      Tags:
        - Key: Backup
          Value: enabled
        - Key: Environment
          Value: !Ref Stage

  WriteCapacityScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: IsProd
    Properties:
      ServiceNamespace: dynamodb
      ResourceId: !Sub 'table/${SupporterProductDataTable}'
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      MinCapacity: 5
      MaxCapacity: 500
      RoleARN: !GetAtt AutoScalingRole.Arn

  WriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      PolicyName: !Sub '${SupporterProductDataTable}-WriteScaling'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WriteCapacityScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 50.0
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization
        ScaleOutCooldown: 60
        ScaleInCooldown: 60

  AutoScalingRole:
    Type: AWS::IAM::Role
    Condition: IsProd
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [application-autoscaling.amazonaws.com]
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSApplicationAutoscalingDynamoDBTablePolicy

Outputs:
  TableName:
    Value: !Ref SupporterProductDataTable
    Description: DynamoDB Table Name
  TableARN:
    Value: !GetAtt SupporterProductDataTable.Arn
    Description: DynamoDB Table ARN