AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with Elastic IP and auto-generated SSH key in default VPC'
Parameters:
  SSHLocation:
    Description: The IP range (CIDR) for SSH access
    Type: String
    MinLength: '9'
    MaxLength: '18'
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 203.0.113.0/24)
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2Describe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
  GetDefaultVpcFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib3
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          http = urllib3.PoolManager()
          def send_response(event, context, response_status, response_data, physical_resource_id=None):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              try:
                  response = http.request('PUT', response_url, body=json_response_body, headers=headers)
                  logger.info("Status code: " + str(response.status))
              except Exception as e:
                  logger.error("send_response failed: " + str(e))
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      send_response(event, context, 'SUCCESS', {}, physical_resource_id=event['PhysicalResourceId'])
                      return
                  ec2 = boto3.client('ec2')
                  vpcs = ec2.describe_vpcs(Filters=[{'Name': 'is-default', 'Values': ['true']}])['Vpcs']
                  if not vpcs:
                      raise Exception("No default VPC found")
                  vpc_id = vpcs[0]['VpcId']
                  subnets = ec2.describe_subnets(
                      Filters=[
                          {'Name': 'vpc-id', 'Values': [vpc_id]},
                          {'Name': 'defaultForAz', 'Values': ['true']}
                      ]
                  )['Subnets']
                  if not subnets:
                      raise Exception("No default subnet found")
                  subnet_id = subnets[0]['SubnetId']
                  send_response(
                      event, 
                      context, 
                      'SUCCESS', 
                      {'VpcId': vpc_id, 'SubnetId': subnet_id},
                      physical_resource_id=vpc_id
                  )
              except Exception as e:
                  logger.error(e)
                  send_response(event, context, 'FAILED', {}, reason=str(e))
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30
  GetDefaultVpc:
    Type: Custom::GetDefaultVpc
    Properties:
      ServiceToken: !GetAtt GetDefaultVpcFunction.Arn
  KeyPairLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EC2KeyPair
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateKeyPair
                  - ec2:DeleteKeyPair
                Resource: '*'
        - PolicyName: SecretsManager
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                Resource: '*'
  GenerateKeyPairFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          import json
          import urllib3
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          http = urllib3.PoolManager()
          def send_response(event, context, response_status, response_data, physical_resource_id=None):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': 'See the details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              try:
                  response = http.request('PUT', response_url, body=json_response_body, headers=headers)
                  logger.info("Status code: " + str(response.status))
              except Exception as e:
                  logger.error("send_response failed: " + str(e))
          def handler(event, context):
              try:
                  request_type = event['RequestType']
                  stack_name = event['StackId'].split('/')[1]
                  resource_id = event['LogicalResourceId']
                  secret_name = f"{stack_name}-{resource_id}-key"
                  key_name = f"{stack_name}-{resource_id}"
                  if request_type == 'Delete':
                      try:
                          ec2 = boto3.client('ec2')
                          ec2.delete_key_pair(KeyName=key_name)
                      except Exception as e:
                          logger.error(f"Delete key pair error: {e}")
                      try:
                          secrets = boto3.client('secretsmanager')
                          secrets.delete_secret(SecretId=secret_name, ForceDeleteWithoutRecovery=True)
                      except Exception as e:
                          logger.error(f"Delete secret error: {e}")
                      send_response(event, context, 'SUCCESS', {}, physical_resource_id=key_name)
                      return
                  if request_type == 'Create':
                      ec2 = boto3.client('ec2')
                      secrets = boto3.client('secretsmanager')
                      response = ec2.create_key_pair(KeyName=key_name)
                      private_key = response['KeyMaterial']
                      secrets.create_secret(Name=secret_name, SecretString=private_key)
                      response_data = {'KeyName': key_name, 'SecretName': secret_name}
                      send_response(event, context, 'SUCCESS', response_data, physical_resource_id=key_name)
                  else:
                      send_response(event, context, 'SUCCESS', {}, physical_resource_id=key_name)
              except Exception as e:
                  logger.error(e)
                  send_response(event, context, 'FAILED', {}, reason=str(e))
      Handler: index.handler
      Role: !GetAtt KeyPairLambdaRole.Arn
      Runtime: python3.12
      Timeout: 30
  MyKeyPair:
    Type: Custom::GenerateKeyPair
    Properties:
      ServiceToken: !GetAtt GenerateKeyPairFunction.Arn
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !GetAtt GetDefaultVpc.VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      Tags:
        - Key: Name
          Value: SSH-Security-Group
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      KeyName: !GetAtt MyKeyPair.KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !GetAtt GetDefaultVpc.SubnetId
      Tags:
        - Key: Name
          Value: SSH-Accessible-Instance
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  ElasticIPAddress:
    Description: Elastic IP address
    Value: !GetAtt ElasticIP.PublicIp
  SSHCommand:
    Description: Command to connect via SSH (retrieve key from Secrets Manager)
    Value: !Sub 'aws secretsmanager get-secret-value --secret-id ${MyKeyPair.SecretName} --query SecretString --output text > ${MyKeyPair.KeyName}.pem && chmod 400 ${MyKeyPair.KeyName}.pem && ssh -i ${MyKeyPair.KeyName}.pem ec2-user@${ElasticIP.PublicIp}'
  KeySecretArn:
    Description: Secrets Manager ARN for private key
    Value: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${MyKeyPair.SecretName}'