AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized SNS Topic with Secure Cross-Service Notification Capabilities

Parameters:
  EmailSubscription:
    Type: String
    Default: admin@example.com
    Description: Email address for notifications
  TopicDisplayName:
    Type: String
    Default: Centralized Alerts
    Description: Display name for SNS topic

Resources:
  CentralizedAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Ref TopicDisplayName
      KmsMasterKeyId: aws/sns
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: Centralized Alerts

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref CentralizedAlertTopic

  NotificationLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref CentralizedAlertTopic
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const AWS = require('aws-sdk');
            const sns = new AWS.SNS();
            
            const message = JSON.stringify(event, null, 2);
            const params = {
              Message: message,
              TopicArn: process.env.SNS_TOPIC_ARN,
              Subject: 'Centralized Alert Notification'
            };
            
            try {
              await sns.publish(params).promise();
              return {
                statusCode: 200,
                body: JSON.stringify('Message published successfully')
              };
            } catch (error) {
              console.error('Error publishing message:', error);
              throw error;
            }
          };

  CloudWatchEventsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt NotificationLambdaFunction.Arn
      Principal: events.amazonaws.com

  CloudWatchAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route CloudWatch Alarms to SNS
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
      State: ENABLED
      Targets:
        - Arn: !GetAtt NotificationLambdaFunction.Arn
          Id: CloudWatchAlarmTarget

  ConfigRuleChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Route Config Rule Changes to SNS
      EventPattern:
        source:
          - aws.config
        detail-type:
          - Config Configuration Item Change
      State: ENABLED
      Targets:
        - Arn: !GetAtt NotificationLambdaFunction.Arn
          Id: ConfigChangeTarget

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailSubscription
      Protocol: email
      TopicArn: !Ref CentralizedAlertTopic
      FilterPolicy:
        event:
          - alarm
          - config
          - cloudtrail
          - budget

Outputs:
  TopicARN:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedAlertTopic
  LambdaARN:
    Description: ARN of the notification Lambda function
    Value: !GetAtt NotificationLambdaFunction.Arn
  SubscriptionARN:
    Description: ARN of the email subscription
    Value: !Ref SNSSubscription