AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
  MyEFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !ImportValue SubnetId
      SecurityGroups:
        - !ImportValue SecurityGroupId
  MyEFSFileSystemPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EFSFileSystemPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
            Resource: !Sub 'arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${MyEFSFileSystem}'
      Roles:
        - !ImportValue IAMRoleName
Outputs:
  FileSystemId:
    Value: !Ref MyEFSFileSystem
  FileSystemArn:
    Value: !GetAtt MyEFSFileSystem.Arn