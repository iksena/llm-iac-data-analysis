AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge integration with Stripe Product API'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: API key for Stripe authentication
  
  PartnerAppSource:
    Type: String
    Default: "PartnerApp"
    Description: Source name for the partner application events
  
  PartnerAppDetailType:
    Type: String
    Default: "PartnerAppDetailType"
    Description: Detail type for the partner application events
  
  StripeApiEndpoint:
    Type: String
    Default: "https://api.stripe.com/v1/products"
    Description: Stripe API endpoint for product creation
  
  EventBusName:
    Type: String
    Default: "StripeIntegrationBus"
    Description: Name for the EventBridge event bus

Resources:
  StripeIntegrationEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  StripeApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "Authorization"
          ApiKeyValue: !Sub "Bearer ${StripeApiKey}"
        InvocationHttpParameters:
          HeaderParameters:
            - Key: "Content-Type"
              Value: "application/x-www-form-urlencoded"
      Name: "StripeApiConnection"
      Description: "Connection to Stripe API with API Key authentication"

  StripeProductApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: "StripeProductApiDestination"
      Description: "API Destination for Stripe Products API"
      ConnectionArn: !GetAtt StripeApiConnection.Arn
      InvocationEndpoint: !Ref StripeApiEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  EventBridgeApiDestinationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEventBridgeFullAccess
      Policies:
        - PolicyName: EventBridgeApiDestinationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:*
                Resource: '*'
      Description: Role for EventBridge to invoke Stripe API Destination

  StripeProductCreationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "StripeProductCreationRule"
      Description: "Rule to capture product creation events and send to Stripe API"
      EventBusName: !Ref StripeIntegrationEventBus
      EventPattern:
        source:
          - !Ref PartnerAppSource
        detail-type:
          - !Ref PartnerAppDetailType
      State: ENABLED
      Targets:
        - Id: "StripeProductApiTarget"
          Arn: !GetAtt StripeProductApiDestination.Arn
          RoleArn: !GetAtt EventBridgeApiDestinationRole.Arn
          InputPath: "$.detail"

Outputs:
  EventBusArn:
    Description: ARN of the created EventBridge Event Bus
    Value: !GetAtt StripeIntegrationEventBus.Arn
  
  EventBusName:
    Description: Name of the created EventBridge Event Bus
    Value: !Ref StripeIntegrationEventBus
  
  ApiDestinationArn:
    Description: ARN of the Stripe API Destination
    Value: !GetAtt StripeProductApiDestination.Arn
  
  ConnectionArn:
    Description: ARN of the Stripe API Connection
    Value: !GetAtt StripeApiConnection.Arn