AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to deploy an auto-configuring Amazon Linux 2 EC2 instance.
  The instance is configured to install Nginx via an SSM Association based on tagging,
  send logs to an S3 bucket, and enable CloudWatch monitoring.
  NOTE: Update the VpcId and SubnetId parameter default values with valid IDs for your environment.

Parameters:
  VpcId:
    Description: "ID of the VPC where resources will be deployed."
    Type: AWS::EC2::VPC::Id
    Default: "vpc-12345678"
  SubnetId:
    Description: "ID of the Subnet where the EC2 instance will be launched."
    Type: AWS::EC2::Subnet::Id
    Default: "subnet-12345678"

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-logs-bucket"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 30

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${AWS::StackName}-logs-bucket"
                  - !Sub "arn:aws:s3:::${AWS::StackName}-logs-bucket/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
      Path: "/"

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow SSH (port 22) and HTTP (port 80) access"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Monitoring: true
      Tags:
        - Key: Name
          Value: AutoConfiguredEC2
        - Key: InstallNginx
          Value: "True"

  SSMAssociationNginxInstall:
    Type: AWS::SSM::Association
    DependsOn: EC2Instance
    Properties:
      Name: AWS-RunShellScript
      AssociationName: InstallNginxOnTaggedInstances
      Targets:
        - Key: "tag:InstallNginx"
          Values:
            - "True"
      Parameters:
        commands:
          - "sudo yum install -y nginx"
          - "sudo systemctl start nginx"
          - "sudo systemctl enable nginx"
      ComplianceSeverity: UNSPECIFIED

  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm if CPU utilization exceeds 80% over a 5-minute period."
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      TreatMissingData: notBreaching

Outputs:
  InstanceId:
    Description: "The ID of the deployed EC2 instance."
    Value: !Ref EC2Instance
  LogsBucketName:
    Description: "The name of the S3 bucket used for logging."
    Value: !Ref LogsBucket