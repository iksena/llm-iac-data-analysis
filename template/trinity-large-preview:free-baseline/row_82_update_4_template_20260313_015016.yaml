AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an encrypted S3 bucket for ALB access logs with retention policy and appropriate permissions

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ALBAccessLogsBucket
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90
      VersioningConfiguration:
        Status: Enabled

  ALBAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ELBLoggingPermissions
            Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
                - !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS::AccountId}:role/AWSLog${AWS: