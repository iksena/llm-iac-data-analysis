AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  Environment:
    Type: String
    Description: Environment type
    AllowedValues: 
      - Development
      - Production
    Default: Development

Resources:
  MFARequirementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: MFARequirementPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceMFA
            Effect: Deny
            NotAction:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
            Condition:
              BoolIfExists:
                aws:MultiFactorAuthPresent: false

  ExplicitDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ExplicitDenyPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenySensitiveServices
            Effect: Deny
            Action:
              - 'cloudhsm:*'
              - 'aws-portal:*'
              - 'account:*'
            Resource: '*'

  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub 'PrivilegedAdminGroup-${Environment}'
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'PrivilegedAdminRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
        - !Ref ExplicitDenyPolicy

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub 'RestrictedAdminGroup-${Environment}'
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - 'arn:aws:iam::aws:policy/PowerUserAccess'

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'RestrictedAdminRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/PowerUserAccess'
        - !Ref ExplicitDenyPolicy

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'CloudFormationExecutionRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'AWSCloudFormationStackSetExecutionRole-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
        - !Ref ExplicitDenyPolicy

Outputs:
  PrivilegedAdminRoleArn:
    Description: ARN of the Privileged Admin Role
    Value: !GetAtt PrivilegedAdminRole.Arn
  
  RestrictedAdminRoleArn:
    Description: ARN of the Restricted Admin Role
    Value: !GetAtt RestrictedAdminRole.Arn
  
  CloudFormationExecutionRoleArn:
    Description: ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn
  
  StackSetExecutionRoleArn:
    Description: ARN of the StackSet Execution Role
    Value: !GetAtt StackSetExecutionRole.Arn