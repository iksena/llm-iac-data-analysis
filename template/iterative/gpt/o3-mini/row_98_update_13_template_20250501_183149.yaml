AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready AWS Amplify web application for hosting and deploying the TodoApp with a production branch.

Parameters:
  AppName:
    Description: "Name of the Amplify App for the TodoApp project."
    Type: String
    Default: "TodoAppAmplifyApp"
  RepositoryURL:
    Description: "URL of the Git repository containing the TodoApp source code."
    Type: String
    Default: "https://github.com/example/todo-app.git"
  OAuthToken:
    Description: "OAuth token for accessing the Git repository. Provide a valid token."
    Type: String
    NoEcho: true
    AllowedPattern: ".+"
    ConstraintDescription: "A valid non-empty OAuth token must be provided."
  BranchName:
    Description: "The name of the branch to deploy (typically production)."
    Type: String
    Default: "production"

Resources:
  TodoAppAmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Description: "Amplify App hosting the TodoApp project."
      Repository: !Ref RepositoryURL
      OauthToken: !Ref OAuthToken
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - echo "Starting pre-build..."
            build:
              commands:
                - echo "Building the TodoApp..."
        artifacts:
          baseDirectory: build
          files:
            - "**/*"
        cache:
          paths:
            - node_modules/**/*
      EnvironmentVariables:
        - Name: ENV
          Value: "production"

  ProductionBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref TodoAppAmplifyApp
      BranchName: !Ref BranchName
      Description: "Production branch for the TodoApp deployment."
      Stage: "PRODUCTION"
      EnableAutoBuild: true

Outputs:
  AmplifyAppId:
    Description: "The App ID of the created Amplify App."
    Value: !Ref TodoAppAmplifyApp
  AmplifyBranchName:
    Description: "The name of the production branch used for deployment."
    Value: !Ref ProductionBranch