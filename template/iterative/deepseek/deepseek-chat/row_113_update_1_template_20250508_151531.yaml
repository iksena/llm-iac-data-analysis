AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EventBridge rule with SNS topic integration'

Resources:
  EventBridgeSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: 'EventBridge Demo Topic'

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventBridgeSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EventBridgeSNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Rule to forward demo.cli events to SNS'
      EventPattern:
        source:
          - 'demo.cli'
      Targets:
        - Arn: !Ref EventBridgeSNSTopic
          Id: 'EventBridgeToSNSTarget'

Outputs:
  SNSTopicARN:
    Description: 'ARN of the created SNS Topic'
    Value: !Ref EventBridgeSNSTopic
  EventBridgeRuleARN:
    Description: 'ARN of the created EventBridge Rule'
    Value: !GetAtt EventBridgeRule.Arn