AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an EMR Serverless environment with S3 and IAM configurations.

Parameters:
  S3BucketName:
    Description: Name of the S3 bucket to store scripts and data
    Type: String
    Default: emr-serverless-scripts-data
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: Must be a lowercase string with numbers and hyphens.

  EMRApplicationName:
    Description: Name of the EMR Serverless application
    Type: String
    Default: emr-serverless-spark-app

  SubnetId:
    Description: Subnet ID for the EMR Serverless application
    Type: AWS::EC2::Subnet::Id
    ConstraintDescription: Must be an existing subnet ID in your VPC.

  SecurityGroupId:
    Description: Security Group ID for the EMR Serverless application
    Type: AWS::EC2::SecurityGroup::Id
    ConstraintDescription: Must be an existing security group ID in your VPC.

Resources:
  EMRServerlessIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EMRServerlessS3CloudWatchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  - !Sub arn:aws:s3:::${S3BucketName}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EMRServerlessS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  EMRServerlessS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref EMRServerlessS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: 
              AWS: !GetAtt EMRServerlessIAMRole.Arn
            Action:
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
            Resource:
              - !Sub arn:aws:s3:::${S3BucketName}
              - !Sub arn:aws:s3:::${S3BucketName}/*

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Ref EMRApplicationName
      ReleaseLabel: emr-6.15.0
      Type: Spark
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      InitialCapacity:
        - Key: Driver
          Value:
            WorkerCount: 1
            WorkerConfiguration:
              Cpu: "2 vCPU"
              Memory: "4 GB"
        - Key: Executor
          Value:
            WorkerCount: 2
            WorkerConfiguration:
              Cpu: "2 vCPU"
              Memory: "4 GB"
      NetworkConfiguration:
        SubnetIds: 
          - !Ref SubnetId
        SecurityGroupIds:
          - !Ref SecurityGroupId

Outputs:
  S3BucketNameOutput:
    Description: Name of the S3 bucket for scripts and data
    Value: !Ref EMRServerlessS3Bucket

  EMRServerlessApplicationId:
    Description: ID of the EMR Serverless application
    Value: !Ref EMRServerlessApplication

  EMRServerlessIAMRoleArn:
    Description: ARN of the IAM Role for EMR Serverless
    Value: !GetAtt EMRServerlessIAMRole.Arn