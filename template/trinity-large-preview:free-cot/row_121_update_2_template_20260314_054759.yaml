AWSTemplateFormatVersion: '2010-09-09'
Description: 'Scheduled SSM Automation Workflow with EventBridge Scheduler'

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH/RDP access

Resources:
  # IAM Roles
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SSMExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:StartAssociationsOnce
                Resource: "*"

  # VPC and Network
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  InternetRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # Security Groups
  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  RDPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDP access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  # EC2 Instances
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SSHSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: true

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref RDPSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: true

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # SSM Document
  HelloWorldDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '2.2'
        description: Cross-platform Hello World script
        parameters: {}
        mainSteps:
          - action: 'aws:runShellScript'
            name: linuxStep
            inputs:
              runCommand:
                - 'echo "Hello World from Linux!"'
            precondition:
              StringEquals:
                - platformType
                - Linux
          - action: 'aws:runPowerShellScript'
            name: windowsStep
            inputs:
              runCommand:
                - 'Write-Host "Hello World from Windows!"'
            precondition:
              StringEquals:
                - platformType
                - Windows

  # SSM State Manager Association
  HelloWorldAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref HelloWorldDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'

  # S3 Bucket for Logs
  ExecutionLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # EventBridge Scheduler
  HelloWorldScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: HelloWorldSchedule
      Description: Triggers SSM association every 15 minutes
      ScheduleExpression: 'rate(15 minutes)'
      FlexibleTimeWindow:
        Mode: FLEXIBLE
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:association/HelloWorldAssociation'
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        Input: '{}'
      ScheduleExpressionTimezone: 'UTC'

Outputs:
  LinuxInstanceId:
    Description: Linux Instance ID
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: Windows Instance ID
    Value: !Ref WindowsInstance
  LogsBucketName:
    Description: S3 Bucket for Execution Logs
    Value: !Ref ExecutionLogsBucket
  ScheduleArn:
    Description: EventBridge Schedule ARN
    Value: !GetAtt HelloWorldScheduler.Arn
  LinuxPublicIp:
    Description: Linux Instance Public IP
    Value: !GetAtt LinuxInstance.PublicIp
  WindowsPublicIp:
    Description: Windows Instance Public IP
    Value: !GetAtt WindowsInstance.PublicIp