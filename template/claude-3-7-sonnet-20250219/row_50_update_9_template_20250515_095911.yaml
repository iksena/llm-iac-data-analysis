AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a scalable URL-to-PNG screenshot service with SQS and S3 integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the resources will be deployed

  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet ID for the Auto Scaling group (in AZ 1)

  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet ID for the Auto Scaling group (in AZ 2)

  KeyName:
    Type: String
    Description: (Optional) Name of an existing EC2 KeyPair to enable SSH access to the instances. Leave blank to disable SSH access.
    Default: ""

  WorkerInstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type for worker nodes

  LoadTestInstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type for load test instance

  S3BucketPrefix:
    Type: String
    Default: screenshot-service
    Description: Prefix for the S3 bucket name (will be appended with account ID and region)

  MinCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 2
    Description: Minimum number of instances in the Auto Scaling group

  MaxCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 2
    Description: Maximum number of instances in the Auto Scaling group

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-05fb0b8c1424f266b
    us-west-1:
      AMI: ami-0ce2cb35386fc22e9
    us-west-2:
      AMI: ami-008fe2fc65df48dac
    eu-west-1:
      AMI: ami-0905a3c97561e0b69
    eu-central-1:
      AMI: ami-0faab6bdbac9486fb
    ap-northeast-1:
      AMI: ami-0f903fb156f24adbf
    ap-southeast-1:
      AMI: ami-0fa377108253bf620
    ap-southeast-2:
      AMI: ami-04f5097681773b989

Resources:
  # S3 Bucket for storing screenshots
  ScreenshotBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${S3BucketPrefix}-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldScreenshots
            Status: Enabled
            ExpirationInDays: 30

  # Dead Letter Queue for failed screenshot requests
  ScreenshotDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "screenshot-dlq-${AWS::StackName}"
      MessageRetentionPeriod: 1209600

  # SQS Queue for screenshot requests
  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "screenshot-queue-${AWS::StackName}"
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      DelaySeconds: 0
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScreenshotDLQ.Arn
        maxReceiveCount: 5

  # IAM Role for worker instances
  ScreenshotServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  # IAM Policy for worker instances
  ScreenshotServicePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "ScreenshotServicePolicy-${AWS::StackName}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
              - sqs:GetQueueUrl
            Resource: !GetAtt ScreenshotQueue.Arn
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt ScreenshotBucket.Arn
              - !Sub "${ScreenshotBucket.Arn}/*"
          - Effect: Allow
            Action:
              - cloudwatch:PutMetricData
            Resource: '*'
      Roles:
        - !Ref ScreenshotServiceRole

  # IAM Role for load test instance
  LoadTestRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /

  # IAM Policy for load test instance
  LoadTestPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "LoadTestPolicy-${AWS::StackName}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:GetQueueAttributes
              - sqs:GetQueueUrl
            Resource: !GetAtt ScreenshotQueue.Arn
      Roles:
        - !Ref LoadTestRole

  # Instance Profile for worker instances
  ScreenshotServiceInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref ScreenshotServiceRole

  # Instance Profile for load test instance
  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref LoadTestRole

  # Security Group for worker instances
  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for screenshot worker instances
      VpcId: !Ref VpcId
      SecurityGroupIngress: !If
        - HasKeyName
        - - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
            Description: SSH access
        - []
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Security Group for load test instance
  LoadTestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for load test instance
      VpcId: !Ref VpcId
      SecurityGroupIngress: !If
        - HasKeyName
        - - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: 0.0.0.0/0
            Description: SSH access
        - []
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic

  # Launch Template for worker instances
  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "ScreenshotWorker-${AWS::StackName}"
      VersionDescription: Initial version
      LaunchTemplateData:
        ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
        InstanceType: !Ref WorkerInstanceType
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
        SecurityGroupIds:
          - !GetAtt WorkerSecurityGroup.GroupId
        IamInstanceProfile:
          Name: !Ref ScreenshotServiceInstanceProfile
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            # Update system
            yum update -y
            
            # Install required packages
            yum install -y amazon-cloudwatch-agent jq aws-cli
            amazon-linux-extras install -y epel
            yum install -y chromium
            
            # Install Node.js
            curl -sL https://rpm.nodesource.com/setup_14.x | bash -
            yum install -y nodejs
            
            # Create working directory
            mkdir -p /opt/screenshot-service
            cd /opt/screenshot-service
            
            # Create package.json
            cat > package.json << 'EOL'
            {
              "name": "screenshot-service",
              "version": "1.0.0",
              "description": "URL to PNG screenshot service",
              "main": "worker.js",
              "dependencies": {
                "aws-sdk": "^2.1048.0"
              }
            }
            EOL
            
            # Install dependencies
            npm install
            
            # Create worker script
            cat > worker.js << 'EOL'
            const AWS = require('aws-sdk');
            const { spawn } = require('child_process');
            const fs = require('fs');
            const crypto = require('crypto');
            
            // AWS Configuration
            AWS.config.update({ region: '${AWS::Region}' });
            const sqs = new AWS.SQS();
            const s3 = new AWS.S3();
            const cloudwatch = new AWS.CloudWatch();
            
            // Get queue URL
            async function getQueueUrl() {
              const params = {
                QueueName: '${ScreenshotQueue.QueueName}'
              };
              const data = await sqs.getQueueUrl(params).promise();
              return data.QueueUrl;
            }
            
            // Take a screenshot of a URL using Chromium
            function takeScreenshot(url) {
              return new Promise((resolve, reject) => {
                const filename = '/tmp/' + crypto.randomBytes(16).toString('hex') + '.png';
                console.log('Taking screenshot of ' + url);
                
                const chrome = spawn('chromium-browser', [
                  '--headless',
                  '--disable-gpu',
                  '--no-sandbox',
                  '--screenshot=' + filename,
                  '--window-size=1280,1024',
                  url
                ]);
                
                let errorOutput = '';
                chrome.stderr.on('data', (data) => {
                  errorOutput += data.toString();
                });
                
                chrome.on('close', (code) => {
                  if (code !== 0) {
                    console.error('Chrome error output:', errorOutput);
                    return reject(new Error('Chrome process exited with code ' + code));
                  }
                  
                  if (fs.existsSync(filename)) {
                    resolve(filename);
                  } else {
                    reject(new Error('Screenshot file was not created'));
                  }
                });
              });
            }
            
            // Process a message from the queue
            async function processMessage(queueUrl, message) {
              try {
                const body = JSON.parse(message.Body);
                const url = body.url;
                
                if (!url) {
                  throw new Error('URL is required in the message body');
                }
                
                console.log('Processing URL: ' + url);
                const startTime = Date.now();
                
                // Take screenshot
                const screenshotPath = await takeScreenshot(url);
                
                // Generate a safe key for S3
                const urlHash = crypto.createHash('md5').update(url).digest('hex');
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const s3Key = 'screenshots/' + timestamp + '_' + urlHash + '.png';
                
                // Upload to S3
                await s3.putObject({
                  Bucket: '${ScreenshotBucket}',
                  Key: s3Key,
                  Body: fs.readFileSync(screenshotPath),
                  ContentType: 'image/png',
                  Metadata: {
                    'original-url': url
                  }
                }).promise();
                
                // Clean up temp file
                fs.unlinkSync(screenshotPath);
                
                // Record processing time metric
                const processingTime = Date.now() - startTime;
                await cloudwatch.putMetricData({
                  Namespace: 'ScreenshotService',
                  MetricData: [{
                    MetricName: 'ProcessingTime',
                    Value: processingTime,
                    Unit: 'Milliseconds'
                  }]
                }).promise();
                
                console.log('Successfully processed ' + url + ', saved to s3://${ScreenshotBucket}/' + s3Key);
                
                // Delete message from queue
                await sqs.deleteMessage({
                  QueueUrl: queueUrl,
                  ReceiptHandle: message.ReceiptHandle
                }).promise();
                
              } catch (error) {
                console.error('Error processing message:', error);
                throw error;
              }
            }
            
            // Poll the queue for messages
            async function pollQueue(queueUrl) {
              try {
                const response = await sqs.receiveMessage({
                  QueueUrl: queueUrl,
                  MaxNumberOfMessages: 1,
                  WaitTimeSeconds: 20,
                  VisibilityTimeout: 300
                }).promise();
                
                if (response.Messages && response.Messages.length > 0) {
                  await processMessage(queueUrl, response.Messages[0]);
                }
              } catch (error) {
                console.error('Error polling queue:', error);
              }
              
              // Continue polling
              setTimeout(() => pollQueue(queueUrl), 1000);
            }
            
            // Start the service
            async function startService() {
              try {
                const queueUrl = await getQueueUrl();
                console.log('Starting screenshot worker service');
                console.log('Queue URL: ' + queueUrl);
                console.log('Bucket: ${ScreenshotBucket}');
                pollQueue(queueUrl);
              } catch (error) {
                console.error('Failed to start service:', error);
                // Retry after delay
                setTimeout(startService, 10000);
              }
            }
            
            // Start the service
            startService();
            EOL
            
            # Create systemd service
            cat > /etc/systemd/system/screenshot-worker.service << 'EOL'
            [Unit]
            Description=Screenshot Worker Service
            After=network.target
            
            [Service]
            Environment=AWS_REGION=${AWS::Region}
            WorkingDirectory=/opt/screenshot-service
            ExecStart=/usr/bin/node worker.js
            Restart=always
            User=ec2-user
            Group=ec2-user
            
            [Install]
            WantedBy=multi-user.target
            EOL
            
            # Set permissions
            chown -R ec2-user:ec2-user /opt/screenshot-service
            
            # Start the service
            systemctl enable screenshot-worker
            systemctl start screenshot-worker

  # Auto Scaling Group for worker instances
  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "ScreenshotWorkerASG-${AWS::StackName}"
      MinSize: !Ref MinCapacity
      MaxSize: !Ref MaxCapacity
      DesiredCapacity: !Ref MinCapacity
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref SubnetId1
        - !Ref SubnetId2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub "ScreenshotWorker-${AWS::StackName}"
          PropagateAtLaunch: true

  # CloudWatch Alarm for scaling up
  QueueDepthAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "HighQueueDepth-${AWS::StackName}"
      AlarmDescription: Alarm if queue depth grows beyond threshold
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  # CloudWatch Alarm for scaling down
  QueueDepthAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "LowQueueDepth-${AWS::StackName}"
      AlarmDescription: Alarm if queue depth is low
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

  # Auto Scaling Policy for scaling up
  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  # Auto Scaling Policy for scaling down
  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  # Load Test EC2 Instance
  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref LoadTestInstanceType
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SecurityGroupIds:
        - !GetAtt LoadTestSecurityGroup.GroupId
      SubnetId: !Ref SubnetId1
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub "ScreenshotLoadTester-${AWS::StackName}"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system
          yum update -y
          
          # Install required packages
          yum install -y jq aws-cli
          
          # Install Node.js
          curl -sL https://rpm.nodesource.com/setup_14.x | bash -
          yum install -y nodejs
          
          # Create working directory
          mkdir -p /opt/load-tester
          cd /opt/load-tester
          
          # Create package.json
          cat > package.json << 'EOL'
          {
            "name": "screenshot-load-tester",
            "version": "1.0.0",
            "description": "Load tester for screenshot service",
            "main": "load-test.js",
            "dependencies": {
              "aws-sdk": "^2.1048.0"
            }
          }
          EOL
          
          # Install dependencies
          npm install
          
          # Create load test script
          cat > load-test.js << 'EOL'
          const AWS = require('aws-sdk');
          
          // AWS Configuration
          AWS.config.update({ region: '${AWS::Region}' });
          const sqs = new AWS.SQS();
          
          // Get queue URL
          async function getQueueUrl() {
            const params = {
              QueueName: '${ScreenshotQueue.QueueName}'
            };
            const data = await sqs.getQueueUrl(params).promise();
            return data.QueueUrl;
          }
          
          // List of sample URLs to test
          const sampleUrls = [
            'https://aws.amazon.com',
            'https://google.com',
            'https://github.com',
            'https://stackoverflow.com',
            'https://reddit.com',
            'https://news.ycombinator.com',
            'https://twitter.com',
            'https://netflix.com',
            'https://amazon.com',
            'https://wikipedia.org'
          ];
          
          // Function to send a message to SQS
          async function sendMessage(queueUrl, url) {
            const params = {
              QueueUrl: queueUrl,
              MessageBody: JSON.stringify({
                url: url,
                timestamp: new Date().toISOString()
              })
            };
            
            try {
              const result = await sqs.sendMessage(params).promise();
              console.log('Message sent for URL ' + url + ', MessageId: ' + result.MessageId);
              return result;
            } catch (error) {
              console.error('Error sending message for URL ' + url + ':', error);
              throw error;
            }
          }
          
          // Function to run a load test
          async function runLoadTest(queueUrl, numMessages) {
            console.log('Starting load test with ' + numMessages + ' messages');
            
            for (let i = 0; i < numMessages; i++) {
              // Pick a random URL from the sample list
              const url = sampleUrls[Math.floor(Math.random() * sampleUrls.length)];
              try {
                await sendMessage(queueUrl, url);
                // Small delay to avoid throttling
                await new Promise(resolve => setTimeout(resolve, 100));
              } catch (error) {
                console.error('Failed to send message:', error);
              }
            }
            
            console.log('Load test completed. Sent ' + numMessages + ' messages.');
          }
          
          // Run a load test every hour with a random number of messages
          function scheduleLoadTests(queueUrl) {
            // Run an initial test
            const initialMessages = Math.floor(Math.random() * 10) + 5; // 5-15 messages
            console.log('Starting initial load test with ' + initialMessages + ' messages');
            runLoadTest(queueUrl, initialMessages);
            
            // Schedule hourly tests
            setInterval(() => {
              const messages = Math.floor(Math.random() * 20) + 10; // 10-30 messages
              console.log('Starting hourly load test with ' + messages + ' messages');
              runLoadTest(queueUrl, messages);
            }, 60 * 60 * 1000); // Every hour
          }
          
          // Start the load testing
          async function startService() {
            try {
              const queueUrl = await getQueueUrl();
              console.log('Starting load test service');
              console.log('Queue URL: ' + queueUrl);
              scheduleLoadTests(queueUrl);
            } catch (error) {
              console.error('Failed to start service:', error);
              // Retry after delay
              setTimeout(startService, 10000);
            }
          }
          
          // Start the service
          startService();
          EOL
          
          # Create systemd service
          cat > /etc/systemd/system/load-tester.service << 'EOL'
          [Unit]
          Description=Screenshot Service Load Tester
          After=network.target
          
          [Service]
          Environment=AWS_REGION=${AWS::Region}
          WorkingDirectory=/opt/load-tester
          ExecStart=/usr/bin/node load-test.js
          Restart=always
          User=ec2-user
          Group=ec2-user
          
          [Install]
          WantedBy=multi-user.target
          EOL
          
          # Set permissions
          chown -R ec2-user:ec2-user /opt/load-tester
          
          # Start the service
          systemctl enable load-tester
          systemctl start load-tester

Outputs:
  ScreenshotBucketName:
    Description: Name of the S3 bucket storing screenshots
    Value: !Ref ScreenshotBucket

  ScreenshotQueueURL:
    Description: URL of the SQS queue for screenshot requests
    Value: !Ref ScreenshotQueue

  ScreenshotQueueARN:
    Description: ARN of the SQS queue for screenshot requests
    Value: !GetAtt ScreenshotQueue.Arn

  WorkerAutoScalingGroupName:
    Description: Name of the Auto Scaling group for worker instances
    Value: !Ref WorkerAutoScalingGroup

  LoadTestInstanceId:
    Description: Instance ID of the load test instance
    Value: !Ref LoadTestInstance