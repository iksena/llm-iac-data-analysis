AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      FifoQueue: true
      ContentBasedDeduplication: true
      QueueNamePrefix: 'myapp-'
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  MySQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref MySQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - sqs:SendMessage
            Resource: !GetAtt MySQSQueue.Arn

Outputs:
  QueueName:
    Description: FIFO Queue Name
    Value: !GetAtt MySQSQueue.QueueName
  QueueArn:
    Description: FIFO Queue ARN
    Value: !GetAtt MySQSQueue.Arn