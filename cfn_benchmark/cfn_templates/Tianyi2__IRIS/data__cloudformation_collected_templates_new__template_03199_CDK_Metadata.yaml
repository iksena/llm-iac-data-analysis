AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Minimal CloudFormation template including an AWS::CDK::Metadata resource.
  This resource is typically auto-generated by AWS CDK.

Resources:
  CDKMetadata:
    Type: AWS::CDK::Metadata
    Properties:
      # Indicates whether CDK analytics data should be sent to AWS.
      # Set to false to disable analytics.
      Analytics: false

      # Optional identifier for the CDK application that generated the stack.
      # This is usually auto-populated by the CDK CLI.
      App: "example-cdk-app"

    Metadata:
      # Arbitrary metadata section.
      # CDK may use this to store additional information.
      Comment: "This resource is used by AWS CDK to track stack metadata."