AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge to Kinesis integration for real-time event streaming'

Parameters:
  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: 'event-stream'
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[a-zA-Z0-9_.-]+'

  EventSourceName:
    Type: String
    Description: Source name for the events
    Default: 'my-application'
    MinLength: 1
    MaxLength: 256

  EventBusName:
    Type: String
    Description: Name of the custom event bus
    Default: 'application-events'
    MinLength: 1
    MaxLength: 256

  StreamRetentionPeriod:
    Type: Number
    Description: Retention period for the Kinesis stream (hours)
    Default: 24
    MinValue: 24
    MaxValue: 168

  StreamShardCount:
    Type: Number
    Description: Number of shards for the Kinesis stream
    Default: 1
    MinValue: 1
    MaxValue: 50

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref StreamRetentionPeriod
      ShardCount: !Ref StreamShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Path: /service-role/
      ManagedPolicyArns: []

  EventBridgeKinesisPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-eventbridge-kinesis-policy
      Roles:
        - !Ref EventBridgeKinesisRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - kinesis:PutRecord
              - kinesis:PutRecords
            Resource: !GetAtt KinesisStream.Arn

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref EventSourceName
      State: ENABLED
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: 'KinesisTarget'
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn

  KinesisStreamArn:
    Description: ARN of the created Kinesis Stream
    Value: !GetAtt KinesisStream.Arn

  EventRuleArn:
    Description: ARN of the created Event Rule
    Value: !GetAtt EventRule.Arn