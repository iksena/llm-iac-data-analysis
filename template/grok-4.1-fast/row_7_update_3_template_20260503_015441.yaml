AWSTemplateFormatVersion: '2010-09-09'
Description: 'Basic EC2 t3.micro instance with SSM for secure remote management'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for the security group and instance'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'Subnet ID for the instance (use public subnet for SSM internet access if no VPC endpoints)'

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-east-2:
      AMI: ami-0a313d6098716f372
    us-west-1:
      AMI: ami-0bdb828fd58c522ec
    us-west-2:
      AMI: ami-0d5d9d301c853a04a
    eu-west-1:
      AMI: ami-0c8b9f713e163a5e1
    eu-central-1:
      AMI: ami-0e01e5d1ed7e3b1b9
    ap-southeast-1:
      AMI: ami-0f5d12d98bfd55121
    ap-southeast-2:
      AMI: ami-0b2c68468b0df452c
    ca-central-1:
      AMI: ami-0d3d77fd7169a0e5b

Resources:
  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: SSMRole

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Minimal security group for SSM-managed EC2 instance (no inbound ports)'
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: SSMInstanceSG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref "AWS::Region", AMI]
      InstanceType: t3.micro
      IamInstanceProfile: !Ref SSMInstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Tags:
        - Key: Name
          Value: SSMEC2Instance
    DependsOn: SSMInstanceProfile

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref EC2Instance
  PrivateIpAddress:
    Description: 'Private IP of the instance'
    Value: !GetAtt EC2Instance.PrivateIp
  PublicIpAddress:
    Description: 'Public IP of the instance (if launched in public subnet)'
    Value: !GetAtt EC2Instance.PublicIp
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup