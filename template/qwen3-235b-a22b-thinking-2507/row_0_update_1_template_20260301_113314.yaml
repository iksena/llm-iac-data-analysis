AWSTemplateFormatVersion: '2010-09-09'
Description: 'Basic SQS Queue - Production Ready Template'
Parameters:
  QueueName:
    Type: String
    Default: !Sub '${AWS::StackName}-basic-queue'
    Description: 'Name of the SQS queue (must be unique within your AWS account)'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
Outputs:
  QueueUrl:
    Value: !Ref SQSQueue
    Description: URL of the created SQS queue
  QueueArn:
    Value: !GetAtt SQSQueue.Arn
    Description: ARN of the created SQS queue