AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsDlq

  TemperatureDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDlq

  HumidityDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDlq

  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - AllMetricsDlq
            - Arn
        maxReceiveCount: 5

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - TemperatureDlq
            - Arn
        maxReceiveCount: 5

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
            - HumidityDlq
            - Arn
        maxReceiveCount: 5

  MetricsFanoutTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricsFanoutTopic

  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint:
        Fn::GetAtt:
          - AllMetricsSqsQueue
          - Arn
      Protocol: sqs
      TopicArn:
        Ref: MetricsFanoutTopic

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint:
        Fn::GetAtt:
          - TemperatureSqsQueue
          - Arn
      Protocol: sqs
      TopicArn:
        Ref: MetricsFanoutTopic
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint:
        Fn::GetAtt:
          - HumiditySqsQueue
          - Arn
      Protocol: sqs
      TopicArn:
        Ref: MetricsFanoutTopic
      FilterPolicy:
        MetricType:
          - Humidity

  AllMetricsSqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: AllMetricsSqsPolicy
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource:
              Fn::GetAtt:
                - AllMetricsSqsQueue
                - Arn
            Condition:
              ArnEquals:
                aws:SourceArn:
                  Ref: MetricsFanoutTopic

  TemperatureSqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: TemperatureSqsPolicy
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource:
              Fn::GetAtt:
                - TemperatureSqsQueue
                - Arn
            Condition:
              ArnEquals:
                aws:SourceArn:
                  Ref: MetricsFanoutTopic

  HumiditySqsPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - Ref: HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: HumiditySqsPolicy
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource:
              Fn::GetAtt:
                - HumiditySqsQueue
                - Arn
            Condition:
              ArnEquals:
                aws:SourceArn:
                  Ref: MetricsFanoutTopic