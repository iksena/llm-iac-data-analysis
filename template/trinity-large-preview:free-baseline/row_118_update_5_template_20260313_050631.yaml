AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create EventBridge Pipes workflow for SQS message enrichment with external API data and logging

Parameters:
  QueueName:
    Type: String
    Default: SQSQueueForEventBridgePipe
    Description: Name of the SQS queue to be created
  LogGroupName:
    Type: String
    Default: EventBridgePipeLogs
    Description: Name of the CloudWatch Log Group
  ApiEndpoint:
    Type: String
    Default: https://api.zippopotam.us/us/
    Description: Base URL of the external API for enrichment

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 30

  EventBridgePipesIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eventbridge.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipesInvoke
      Policies:
        - PolicyName: SQSAndLogPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudWatchLogGroup.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SQSMessageEnrichmentPipe
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SQSQueue.QueueUrl
      Target:
        TargetType: LogGroup
        TargetParameters:
          LogGroup:
            LogGroupName: !Ref LogGroupName
            SourceType: EVENT
      Enrichment:
        EnrichmentType: ApiDestination
        EnrichmentParameters:
          ApiDestination:
            ApiDestinationArn: !GetAtt ApiDestination.Arn
      RoleArn: !GetAtt EventBridgePipesIAMRole.Arn
      PipeState: ACTIVE

  ApiDestination:
    Type: AWS::Pipes::ApiDestination
    Properties:
      Name: ZipCodeApiDestination
      ConnectionArn: !GetAtt ApiConnection.Arn
      InvocationEndpoint: !Ref ApiEndpoint
      HttpMethod: GET
      InvocationRateLimitPerSecond: 10

  ApiConnection:
    Type: AWS::Pipes::ApiConnection
    Properties:
      Name: ZipCodeApiConnection
      AuthorizationType: HTTP
      Description: Connection to external API for zip code enrichment

Outputs:
  SQSQueueURL:
    Description: URL of the created SQS queue
    Value: !GetAtt SQSQueue.QueueUrl
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref CloudWatchLogGroup