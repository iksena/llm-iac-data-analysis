AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to provision a publicly accessible S3 bucket for Lambda artifacts,
  along with a customer-managed KMS key for encryption (with automatic rotation) and a KMS key alias.
  The template disables the S3 BlockPublicPolicy feature for the bucket so that a bucket policy can be applied.
  
Parameters:
  ImportedServiceRoleArn:
    Description: "ARN of the imported service role to allow usage and administration of the KMS key. Use 'NONE' if not applicable."
    Type: String
    Default: "NONE"

Conditions:
  HasImportedServiceRole: !Not [ !Equals [ !Ref ImportedServiceRoleArn, "NONE" ] ]

Resources:
  S3BucketLambdaArtifacts:
    Type: AWS::S3::Bucket
    Properties:
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  S3BucketPublicAccessBlock:
    Type: AWS::S3::BucketPublicAccessBlock
    Properties:
      Bucket: !Ref S3BucketLambdaArtifacts
      BlockPublicAcls: false
      BlockPublicPolicy: false
      IgnorePublicAcls: false
      RestrictPublicBuckets: false

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn:
      - S3BucketPublicAccessBlock
    Properties:
      Bucket: !Ref S3BucketLambdaArtifacts
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${S3BucketLambdaArtifacts.Arn}/*"

  KMSKeyEncryption:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key used to encrypt Lambda artifacts and static assets."
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowRootAccountFullAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - !If 
            - HasImportedServiceRole
            - { Sid: "AllowServiceRoleKeyUsage", Effect: "Allow", Principal: { AWS: !Ref ImportedServiceRoleArn }, Action: [ "kms:Encrypt", "kms:Decrypt", "kms:ReEncrypt*", "kms:GenerateDataKey*", "kms:DescribeKey" ], Resource: "*" }
            - !Ref "AWS::NoValue"
          - !If 
            - HasImportedServiceRole
            - { Sid: "AllowServiceRoleKeyAdministration", Effect: "Allow", Principal: { AWS: !Ref ImportedServiceRoleArn }, Action: [ "kms:Create*", "kms:Describe*", "kms:Enable*", "kms:List*", "kms:Put*", "kms:Update*", "kms:Revoke*", "kms:Disable*", "kms:Get*", "kms:Delete*" ], Resource: "*" }
            - !Ref "AWS::NoValue"

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lambdaArtifactsKey
      TargetKeyId: !Ref KMSKeyEncryption

Outputs:
  S3BucketName:
    Description: "Name of the S3 Bucket for Lambda artifacts"
    Value: !Ref S3BucketLambdaArtifacts
  KMSKeyArn:
    Description: "ARN of the KMS key used for encryption"
    Value: !GetAtt KMSKeyEncryption.Arn
  KMSKeyAliasName:
    Description: "Alias name of the KMS key"
    Value: alias/lambdaArtifactsKey