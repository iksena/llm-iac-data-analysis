AWSTemplateFormatVersion: '2010-09-09'
Description: 'Template for VPC with Security Group'

Parameters:
  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'CIDR block for VPC'

Resources:
  VPC:
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: 'Main VPC'

  SecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: 'Default Security Group'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: '-1'
          FromPort: '-1'
          ToPort: '-1'
          CidrIp: !Ref VpcCidr

Outputs:
  VpcId:
    Description: 'VPC ID'
    Value: !Ref VPC

  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref SecurityGroup