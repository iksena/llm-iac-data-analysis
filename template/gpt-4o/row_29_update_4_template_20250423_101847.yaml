AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create secure parameter storage and retrieval workflows using SSM Parameter Store and Secrets Manager for serverless applications.

Parameters:
  StackNamespace:
    Type: String
    Description: The namespace for SSM Parameters specific to this stack.
    Default: "defaultNamespace"
  SecretUsername:
    Type: String
    Description: The predefined username for the Secrets Manager secret.
    Default: "defaultUser"

Resources:
  SSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${StackNamespace}/config/ABTest"
      Type: String
      Value: "This is A/B"
      Description: "Non-sensitive configuration value for A/B testing."

  SecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${StackNamespace}/MySecret"
      Description: "Secret containing a dynamically generated password and predefined username."
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${SecretUsername}"}'
        GenerateStringKey: "password"
        ExcludeCharacters: '"@/\\'
        PasswordLength: 16

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaSSMSecretsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParameterHistory
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${StackNamespace}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackNamespace}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${StackNamespace}-FetchSecretsFunction:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${StackNamespace}-FetchSecretsFunction"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Code:
        ZipFile: |
          import boto3
          import os
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              ssm_client = boto3.client('ssm')
              secrets_client = boto3.client('secretsmanager')

              # Fetch SSM Parameter
              ssm_response = ssm_client.get_parameter(
                  Name=os.environ['SSM_PARAMETER_NAME'],
                  WithDecryption=False
              )
              logger.info(f"SSM Parameter Value: {ssm_response['Parameter']['Value']}")

              # Fetch Secrets Manager Secret
              secret_response = secrets_client.get_secret_value(
                  SecretId=os.environ['SECRET_ID']
              )
              logger.info(f"Secret Value: {secret_response['SecretString']}")

              return {
                  'statusCode': 200,
                  'body': 'Secrets and parameters fetched successfully.'
              }
      Environment:
        Variables:
          SSM_PARAMETER_NAME: !Ref SSMParameter
          SECRET_ID: !Ref SecretsManagerSecret

Outputs:
  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn

  SSMParameterName:
    Description: Name of the SSM Parameter
    Value: !Ref SSMParameter

  SecretsManagerSecretName:
    Description: Name of the Secrets Manager Secret
    Value: !Ref SecretsManagerSecret