AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow for SQS message enrichment with external API data

Parameters:
  SourceQueueName:
    Type: String
    Default: EventBridgePipeSourceQueue
    Description: Name of the source SQS queue
  LogGroupName:
    Type: String
    Default: /aws/eventbridge/pipes/zip-enrichment
    Description: Name of the CloudWatch Log Group
  RetentionInDays:
    Type: Number
    Default: 30
    Description: Number of days to retain log events
  MaximumRetryAttempts:
    Type: Number
    Default: 3
    Description: Maximum number of retry attempts for failed messages
  MaximumEventAgeInSeconds:
    Type: Number
    Default: 86400
    Description: Maximum age of events to retain for retry

Resources:
  SourceQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref SourceQueueName
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      MaximumMessageSize: 262144

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: !Ref RetentionInDays

  ApiConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Name: ZipCodeAPIAuth
      Description: Connection for ZipCode API

  ZipCodeAPI:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ZipCodeAPI
      ConnectionArn: !GetAtt ApiConnection.Arn
      InvocationEndpoint: 'https://api.zippopotam.us/us/'
      HttpMethod: GET
      InvocationRateLimitPerSecond: 1

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgePipeExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: SQSAndLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SourceQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                Resource: '*'

  ZipDataEnrichmentPipe:
    Type: AWS::Events::Rule
    Properties:
      Name: ZipDataEnrichmentPipe
      Description: EventBridge rule for SQS message enrichment
      EventPattern:
        source:
          - aws.sqs
        detail-type:
          - SQS Message
        detail:
          queue-arn:
            - !GetAtt SourceQueue.Arn
      State: ENABLED
      Targets:
        - Arn: !GetAtt LogGroup.Arn
          Id: LogTarget
          InputTransformer:
            InputPathsMap:
              message: $.detail.body
            InputTemplate: '{"message": <enriched_message_logic>}'
          RoleArn: !GetAtt ExecutionRole.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${SourceQueueName}-DLQ'
      MessageRetentionPeriod: 1209600

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt SourceQueue.Arn

Outputs:
  SourceQueueURL:
    Description: URL of the source SQS queue
    Value: !Ref SourceQueue
  SourceQueueARN:
    Description: ARN of the source SQS queue
    Value: !GetAtt SourceQueue.Arn
  LogGroup:
    Description: Name of the CloudWatch Log Group
    Value: !Ref LogGroupName
  RuleName:
    Description: Name of the EventBridge Rule
    Value: ZipDataEnrichmentPipe
  DeadLetterQueueURL:
    Description: URL of the dead letter queue
    Value: !Ref DeadLetterQueue