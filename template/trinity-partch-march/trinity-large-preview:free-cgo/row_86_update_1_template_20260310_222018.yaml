AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
Outputs:
  DetectorId:
    Description: The ID of the GuardDuty detector
    Value: !Ref GuardDutyDetector
    Export:
      Name: !Sub '${AWS::StackName}-DetectorId'