AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to provision an SNS Topic, an SNS Topic Policy,
  and an EventBridge rule that forwards events from source "demo.cli" to the SNS Topic.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: DemoEventSNSTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sns:Publish'
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: DemoCLIEventRule
      Description: "Rules for capturing events from demo.cli and forwarding to SNS Topic"
      EventPattern:
        source:
          - demo.cli
      State: ENABLED
      Targets:
        - Id: "TargetSNSTopic"
          Arn: !Ref SNSTopic
          InputPath: "$"

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS Topic.
    Value: !Ref SNSTopic

  EventBridgeRuleName:
    Description: The name of the EventBridge rule.
    Value: !Ref EventBridgeRule