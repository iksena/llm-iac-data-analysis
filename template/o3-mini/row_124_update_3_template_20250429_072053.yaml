AWSTemplateFormatVersion: "2010-09-09"
Description: "Production ready CloudFormation template for a secure API Gateway integrated with DynamoDB for managing music data with API key authentication and usage throttling."

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "Music"
      AttributeDefinitions:
        - AttributeName: "MusicId"
          AttributeType: "S"
        - AttributeName: "Artist"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "MusicId"
          KeyType: "HASH"
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: "Artist-Index"
          KeySchema:
            - AttributeName: "Artist"
              KeyType: "HASH"
          Projection:
            ProjectionType: "ALL"
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  ApiGatewayDynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "ApiGatewayDynamoDBRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "apigateway.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "DynamoDBAccessPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "dynamodb:PutItem"
                  - "dynamodb:Query"
                Resource:
                  - !GetAtt MusicTable.Arn
                  - !Sub "${MusicTable.Arn}/index/Artist-Index"

  MusicApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "MusicApi"
      Description: "API Gateway for managing music data via integration with DynamoDB."

  MusicApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref MusicApi
      ParentId: !GetAtt MusicApi.RootResourceId
      PathPart: "music"

  PostMusicMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicApiResource
      HttpMethod: "POST"
      AuthorizationType: "NONE"
      ApiKeyRequired: true
      Integration:
        Type: "AWS"
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/PutItem"
        Credentials: !GetAtt ApiGatewayDynamoDBRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "Item": {
                "MusicId": {"S": "$context.requestId"},
                "Artist": {"S": "$input.path('$.artist')"},
                "Album": {"S": "$input.path('$.album')"}
              }
            }
      MethodResponses:
        - StatusCode: "200"

  GetMusicMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref MusicApi
      ResourceId: !Ref MusicApiResource
      HttpMethod: "GET"
      AuthorizationType: "NONE"
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.artist: true
      Integration:
        Type: "AWS"
        IntegrationHttpMethod: "POST"
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:dynamodb:action/Query"
        Credentials: !GetAtt ApiGatewayDynamoDBRole.Arn
        RequestTemplates:
          application/json: |
            {
              "TableName": "Music",
              "IndexName": "Artist-Index",
              "KeyConditionExpression": "Artist = :v_artist",
              "ExpressionAttributeValues": {
                ":v_artist": {"S": "$input.params('artist')"}
              }
            }
      MethodResponses:
        - StatusCode: "200"

  MusicDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMusicMethod
      - GetMusicMethod
    Properties:
      RestApiId: !Ref MusicApi

  MusicApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: "prod"
      Description: "Production stage"
      RestApiId: !Ref MusicApi
      DeploymentId: !Ref MusicDeployment

  MusicApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: "MusicApiKey"
      Enabled: true

  MusicUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: "MusicUsagePlan"
      Description: "Usage plan with rate limiting for the Music API."
      ApiStages:
        - ApiId: !Ref MusicApi
          Stage: "prod"
      Throttle:
        BurstLimit: 200
        RateLimit: 100

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref MusicApiKey
      KeyType: "API_KEY"
      UsagePlanId: !Ref MusicUsagePlan

Outputs:
  ApiEndpoint:
    Description: "The URL of the Music API endpoint"
    Value: !Sub "https://${MusicApi}.execute-api.${AWS::Region}.amazonaws.com/prod/music"
  ApiKey:
    Description: "The API Key to access the Music API"
    Value: !Ref MusicApiKey