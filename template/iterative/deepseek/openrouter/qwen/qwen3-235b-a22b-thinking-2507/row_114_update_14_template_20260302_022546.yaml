AWSTemplateFormatVersion: '2010-09-09'
Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${InputBucket}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OutputBucket}/*'

  TransformLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'Output': {
                      'Bucket': event['Input']['Bucket'],
                      'Key': event['Input']['Key'].replace('.edi', '.json')
                  }
              }
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 30

  TransferRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: transfer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TransferAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${InputBucket}'
                  - !Sub 'arn:aws:s3:::${InputBucket}/*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${OutputBucket}/*'
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt TransformLambdaFunction.Arn

  TransformationWorkflow:
    Type: AWS::Transfer::Workflow
    Properties:
      Description: 'Workflow for transforming EDI X12_214 to JSON'
      Steps:
        - Type: CUSTOM
          CustomStepDetails:
            Target: !GetAtt TransformLambdaFunction.Arn
            Name: TransformEdiToJSON
            TimeoutSeconds: 30

  TransferServer:
    Type: AWS::Transfer::Server
    Properties:
      IdentityProviderType: SERVICE_MANAGED
      WorkflowDetails:
        OnUpload:
          - ExecutionRole: !GetAtt TransferRole.Arn
            WorkflowId: !Ref TransformationWorkflow
      Protocols:
        - SFTP
      EndpointType: VPC

Outputs:
  InputBucketName:
    Description: 'Name of the input S3 bucket for raw EDI files'
    Value: !Ref InputBucket
  OutputBucketName:
    Description: 'Name of the output S3 bucket for transformed JSON'
    Value: !Ref OutputBucket
  WorkflowId:
    Description: 'ID of the transformation workflow'
    Value: !Ref TransformationWorkflow
  ServerId:
    Description: 'ID of the Transfer Family server'
    Value: !Ref TransferServer
  ServerEndpoint:
    Description: 'SFTP endpoint for the Transfer Family server'
    Value: !Sub 's-${TransferServer}.server.transfer.${AWS::Region}.amazonaws.com'
  RoleArn:
    Description: 'ARN of the IAM role used for S3 access'
    Value: !GetAtt TransferRole.Arn