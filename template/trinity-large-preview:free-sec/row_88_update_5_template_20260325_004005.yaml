AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AWS Service Catalog with S3 and Lambda permissions

Resources:
  ServiceCatalogIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ServiceCatalog-S3-Lambda-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - servicecatalog.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AWSLambdaFullAccess
      Policies:
        - PolicyName: ServiceCatalogProvisioning
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - servicecatalog:ProvisionProduct
                  - servicecatalog:DescribeProvisionedProduct
                  - servicecatalog:UpdateProvisionedProduct
                Resource: '*'
        - PolicyName: IAMManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:CreatePolicy
                  - iam:AttachRolePolicy
                  - iam:PassRole
                Resource: 'arn:aws:iam::*:role/*'
        - PolicyName: LambdaLifecycle
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:InvokeFunction
                  - lambda:UpdateFunctionCode
                  - lambda:DeleteFunction
                Resource: 'arn:aws:lambda:*:*:function:*'
        - PolicyName: CloudFormationOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                Resource: 'arn:aws:cloudformation:*:*:stack/*'
        - PolicyName: SNSIntegration
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:Publish
                  - sns:Subscribe
                  - sns:Unsubscribe
                Resource: 'arn:aws:sns:*:*:*'
        - PolicyName: S3BucketLifecycle
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: 'arn:aws:s3:::*'

Outputs:
  ServiceCatalogIAMRoleArn:
    Description: ARN of the Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogIAMRole.Arn
    Export:
      Name: ServiceCatalogIAMRoleArn