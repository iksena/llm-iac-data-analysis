AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SecretsManagerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerNotifications

  SecretsManagerNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecretsManagerNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref SecretsManagerNotificationTopic

  SecretsManagerEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.secretsmanager
        "detail-type":
          - AWS API Call via CloudTrail
          - Secrets Manager Secret State Change
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - GetSecretValue
      Targets:
        - Arn: !Ref SecretsManagerNotificationTopic
          Id: SendToSNS