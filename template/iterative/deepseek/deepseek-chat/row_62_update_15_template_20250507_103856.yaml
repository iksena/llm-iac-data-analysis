AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Aurora MySQL cluster with two instances, network resources, and Secrets Manager integration'

Parameters:
  DBName:
    Type: String
    Description: 'The name of the database to create'
    Default: 'auroradb'
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
  
  MasterUsername:
    Type: String
    Description: 'Username for the master database user'
    Default: 'admin'
    NoEcho: true
    AllowedPattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
    ConstraintDescription: 'Must begin with a letter and contain only alphanumeric characters'
    MinLength: 1
    MaxLength: 16
  
  DBInstanceClass:
    Type: String
    Description: 'Database instance class'
    Default: 'db.t3.large'
    AllowedValues: 
      - db.t3.large
      - db.t3.xlarge
      - db.r5.large
    ConstraintDescription: 'Must be a valid Aurora MySQL instance class'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: '10.0.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: AuroraSubnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.2.0/24'
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: AuroraSubnet2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: AuroraIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: AuroraRouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora cluster'
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for Aurora cluster'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: '0.0.0.0/0'

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'AuroraDBSecret-${AWS::StackName}'
      Description: 'Database credentials for Aurora MySQL cluster'
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${MasterUsername}"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: 'Custom cluster parameter group for Aurora MySQL'
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
        server_audit_logging: '1'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Custom instance parameter group for Aurora MySQL'
      Family: aurora-mysql5.7
      Parameters:
        sql_mode: STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION

  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBSecret}:SecretString:password}}'
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      EngineMode: provisioned
      StorageEncrypted: true
      VpcSecurityGroupIds:
        - !GetAtt DBSecurityGroup.GroupId
      EnableHttpEndpoint: false
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'
      DeletionProtection: false
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Primary

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: !Ref DBInstanceClass
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: Aurora-MySQL-Secondary

Outputs:
  ClusterEndpoint:
    Description: 'Cluster endpoint for the Aurora DB cluster'
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  
  ReaderEndpoint:
    Description: 'Reader endpoint for the Aurora DB cluster'
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address
  
  PrimaryInstanceEndpoint:
    Description: 'Endpoint for the primary DB instance'
    Value: !GetAtt AuroraInstance1.Endpoint.Address
  
  SecondaryInstanceEndpoint:
    Description: 'Endpoint for the secondary DB instance'
    Value: !GetAtt AuroraInstance2.Endpoint.Address
  
  ClusterIdentifier:
    Description: 'Identifier for the Aurora DB cluster'
    Value: !Ref AuroraDBCluster
  
  SecurityGroupId:
    Description: 'Security Group ID for the Aurora cluster'
    Value: !Ref DBSecurityGroup
  
  SecretArn:
    Description: 'ARN of the Secrets Manager secret containing database credentials'
    Value: !Ref DBSecret