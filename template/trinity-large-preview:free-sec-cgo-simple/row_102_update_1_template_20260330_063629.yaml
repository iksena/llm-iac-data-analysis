AWSTemplateFormatVersion: '2010-09-09'
Resources:
  RiskManagementDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      SSESpecification:
        SSEEnabled: true

  LambdaIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt RiskManagementDynamoDBTable.Arn

  LambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction1
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')

          def handler(event, context):
              try:
                  response = table.put_item(
                      Item={
                          'workload_id': event['workload_id'],
                          'question_id': event['question_id'],
                          'data': event['data']
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Item created successfully')
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(e.response['Error']['Message'])
                  }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementDynamoDBTable
          SNS_TOPIC_ARN: !Ref RiskManagementSNSTopic

  LambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction2
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from botocore.exceptions import ClientError

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('RiskManagementTable')

          def handler(event, context):
              try:
                  response = table.get_item(
                      Key={
                          'workload_id': event['workload_id'],
                          'question_id': event['question_id']
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response.get('Item', {}))
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(e.response['Error']['Message'])
                  }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementDynamoDBTable
          SNS_TOPIC_ARN: !Ref RiskManagementSNSTopic

  RiskManagementSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskManagementTopic

  RiskManagementSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskManagementSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm-opscenter.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskManagementSNSTopic

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref RiskManagementDynamoDBTable
  LambdaFunction1ARN:
    Description: ARN of Lambda Function 1
    Value: !GetAtt LambdaFunction1.Arn
  LambdaFunction2ARN:
    Description: ARN of Lambda Function 2
    Value: !GetAtt LambdaFunction2.Arn
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref RiskManagementSNSTopic