AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  AppName:
    Type: String
    Default: TodoApp
  RepositoryUrl:
    Type: String
    Default: https://github.com/aws-samples/aws-amplify-todo-sample
  AccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: "Required GitHub personal access token for private repositories (leave empty for public repos)"
  BranchName:
    Type: String
    Default: production

Conditions:
  HasAccessToken: !Not [!Equals [!Ref AccessToken, '']]

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      AccessToken: !If [HasAccessToken, !Ref AccessToken, !Ref AWS::NoValue]
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: dist
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: !Ref BranchName
      Stage: PRODUCTION
      EnableAutoBuild: true
      EnablePerformanceMode: true

Outputs:
  AmplifyAppId:
    Value: !Ref AmplifyApp
  ProductionBranchURL:
    Value: !Sub "${BranchName}.${AmplifyApp.DefaultDomain}"