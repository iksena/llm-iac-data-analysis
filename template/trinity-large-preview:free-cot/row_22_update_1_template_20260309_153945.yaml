AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB Table with Local and Global Secondary Indexes

Parameters:
  TableName:
    Type: String
    Default: MyDynamoDBTable
    Description: Name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Read capacity units for the table and GSIs
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Write capacity units for the table and GSIs
  EnablePointInTimeRecovery:
    Type: Boolean
    Default: false
    Description: Enable point-in-time recovery for the table

Resources:
  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !Ref EnablePointInTimeRecovery
      LocalSecondaryIndexes:
        - IndexName: LSI_1
          KeySchema:
            - AttributeName: id
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: GSI_1
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: category
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
        - IndexName: GSI_2
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref MyDynamoDBTable
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt MyDynamoDBTable.Arn