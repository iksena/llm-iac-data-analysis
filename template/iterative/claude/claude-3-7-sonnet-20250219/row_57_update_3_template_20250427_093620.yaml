AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a basic Amazon ECS cluster with configurable monitoring capabilities'

Parameters:
  ClusterName:
    Type: String
    Default: 'ECSCluster'
    Description: 'Name of the ECS cluster'

  EnableContainerInsights:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Enable Container Insights for the ECS cluster'

  MetricsCollectionInterval:
    Type: Number
    Default: 60
    Description: 'Interval in seconds for metrics collection'
    MinValue: 60
    MaxValue: 3600

  CPUUtilizationThreshold:
    Type: Number
    Default: 80
    Description: 'Threshold for CPU utilization alarm (percentage)'
    MinValue: 1
    MaxValue: 100

  MemoryUtilizationThreshold:
    Type: Number
    Default: 80
    Description: 'Threshold for memory utilization alarm (percentage)'
    MinValue: 1
    MaxValue: 100

Conditions:
  IsMonitoringEnabled: !Equals [!Ref EnableContainerInsights, 'true']

Resources:
  # IAM Role for ECS Task Execution
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      ClusterSettings:
        - Name: containerInsights
          Value: !Ref EnableContainerInsights

  # CloudWatch Dashboard
  ClusterDashboard:
    Type: AWS::CloudWatch::Dashboard
    Condition: IsMonitoringEnabled
    Properties:
      DashboardName: !Sub "${ClusterName}-Dashboard"
      DashboardBody: !Sub '{"widgets":[{"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{"metrics":[["AWS/ECS","CPUUtilization","ClusterName","${ClusterName}"]],"period":${MetricsCollectionInterval},"stat":"Average","region":"${AWS::Region}","title":"CPU Utilization"}},{"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{"metrics":[["AWS/ECS","MemoryUtilization","ClusterName","${ClusterName}"]],"period":${MetricsCollectionInterval},"stat":"Average","region":"${AWS::Region}","title":"Memory Utilization"}},{"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{"metrics":[["AWS/ECS","RunningTaskCount","ClusterName","${ClusterName}"]],"period":${MetricsCollectionInterval},"stat":"Sum","region":"${AWS::Region}","title":"Running Task Count"}},{"type":"metric","x":12,"y":6,"width":12,"height":6,"properties":{"metrics":[["AWS/ECS","PendingTaskCount","ClusterName","${ClusterName}"]],"period":${MetricsCollectionInterval},"stat":"Sum","region":"${AWS::Region}","title":"Pending Task Count"}}]}'

  # CloudWatch Alarms
  CPUUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsMonitoringEnabled
    Properties:
      AlarmName: !Sub "${ClusterName}-CPUUtilizationAlarm"
      AlarmDescription: !Sub "Alarm if CPU utilization exceeds ${CPUUtilizationThreshold}%"
      MetricName: CPUUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: !Ref MetricsCollectionInterval
      EvaluationPeriods: 3
      Threshold: !Ref CPUUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      TreatMissingData: notBreaching

  MemoryUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: IsMonitoringEnabled
    Properties:
      AlarmName: !Sub "${ClusterName}-MemoryUtilizationAlarm"
      AlarmDescription: !Sub "Alarm if Memory utilization exceeds ${MemoryUtilizationThreshold}%"
      MetricName: MemoryUtilization
      Namespace: AWS/ECS
      Statistic: Average
      Period: !Ref MetricsCollectionInterval
      EvaluationPeriods: 3
      Threshold: !Ref MemoryUtilizationThreshold
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      TreatMissingData: notBreaching

Outputs:
  ClusterName:
    Description: 'Name of the ECS cluster'
    Value: !Ref ClusterName
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ClusterArn:
    Description: 'ARN of the ECS cluster'
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  TaskExecutionRoleArn:
    Description: 'ARN of the ECS Task Execution Role'
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TaskExecutionRoleArn"

  DashboardURL:
    Description: 'URL to the CloudWatch Dashboard'
    Condition: IsMonitoringEnabled
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ClusterName}-Dashboard"