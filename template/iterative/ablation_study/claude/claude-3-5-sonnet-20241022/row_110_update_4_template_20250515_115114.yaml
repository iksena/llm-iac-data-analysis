AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready private API Gateway with Lambda integration, VPC endpoint access, and custom domain'

Parameters:
  VpcEndpointId:
    Type: String
    Description: 'VPC Endpoint ID for API access restriction'
    AllowedPattern: '^vpce-[a-z0-9]{17}$'
    ConstraintDescription: 'Must be a valid VPC Endpoint ID (vpce-xxxxxxxxxxxxxxxxx)'

  CustomDomainName:
    Type: String
    Description: 'Custom domain name for the API'
    AllowedPattern: '^[a-zA-Z0-9][a-zA-Z0-9.-]+[a-zA-Z0-9]$'
    ConstraintDescription: 'Must be a valid domain name'

  CertificateArn:
    Type: String
    Description: 'ARN of ACM certificate for custom domain'
    AllowedPattern: '^arn:aws:acm:[a-z0-9-]+:[0-9]{12}:certificate/[a-zA-Z0-9-]+$'
    ConstraintDescription: 'Must be a valid ACM certificate ARN'

  HostedZoneId:
    Type: String
    Description: 'Route53 Hosted Zone ID'
    AllowedPattern: '^[A-Z0-9]+$'
    ConstraintDescription: 'Must be a valid Route53 Hosted Zone ID'

  StageName:
    Type: String
    Default: 'prod'
    AllowedValues: 
      - 'dev'
      - 'test'
      - 'staging'
      - 'prod'
    Description: 'Stage name for API deployment'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-apigw-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaInvocation
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt BackendFunction.Arn

  BackendFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Sub '${AWS::StackName}-backend'
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: {
                'Content-Type': 'application/json',
                'X-Custom-Header': 'Private API Response'
              },
              body: JSON.stringify({
                message: 'Hello from private API',
                timestamp: new Date().toISOString(),
                requestId: event.requestContext.requestId
              })
            };
          };
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128
      Tags:
        - Key: Stack
          Value: !Ref AWS::StackName

  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-private-api'
      Description: 'Private API with VPC Endpoint restriction'
      EndpointConfiguration:
        Types:
          - PRIVATE
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*'
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref VpcEndpointId
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: 'execute-api:/*'

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: 'api'
      RestApiId: !Ref PrivateApi

  ApiMethod:
    Type: AWS::ApiGateway::Method
    DependsOn: ApiGatewayRole
    Properties:
      HttpMethod: GET
      ResourceId: !Ref ApiResource
      RestApiId: !Ref PrivateApi
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BackendFunction.Arn}/invocations'
        Credentials: !GetAtt ApiGatewayRole.Arn
      MethodResponses:
        - StatusCode: '200'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: 
      - ApiMethod
      - ApiResource
    Properties:
      RestApiId: !Ref PrivateApi
      Description: !Sub 'Deployment for ${StageName} stage'

  ApiStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: ApiDeployment
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref PrivateApi
      StageName: !Ref StageName
      Description: !Sub '${StageName} stage for private API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  LambdaPermission:
    Type: AWS::Lambda::Permission
    DependsOn: BackendFunction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref BackendFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*/*/*'

  CustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  BasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: 
      - ApiStage
      - CustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      RestApiId: !Ref PrivateApi
      Stage: !Ref StageName

  DnsRecord:
    Type: AWS::Route53::RecordSet
    DependsOn: CustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt CustomDomain.RegionalHostedZoneId

Outputs:
  ApiId:
    Description: 'API Gateway ID'
    Value: !Ref PrivateApi

  ApiEndpoint:
    Description: 'Private API Gateway endpoint URL'
    Value: !Sub 'https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/api'

  CustomDomainUrl:
    Description: 'Custom Domain URL'
    Value: !Sub 'https://${CustomDomainName}/api'

  LambdaArn:
    Description: 'Lambda Function ARN'
    Value: !GetAtt BackendFunction.Arn

  ApiGatewayRoleArn:
    Description: 'API Gateway IAM Role ARN'
    Value: !GetAtt ApiGatewayRole.Arn