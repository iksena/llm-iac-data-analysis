AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB integration with DLQ support

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MongoDBIntegrationBus

  DLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EventBridgeToMongoDB-DLQ
      MessageRetentionPeriod: 1209600 # 14 days in seconds

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeAPIDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:api-destination/*

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: MongoDBAPIConnection
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: test_name
          ApiKeyValue: test_value

  MongoDBAPIDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: MongoDBAPIEndpoint
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      InvocationEndpoint: www.testanu.com
      HttpMethod: POST
      InvocationRateLimitPerSecond: 100

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      Name: RouteToMongoDB
      EventPattern:
        source:
          - custom.myapplication
      Targets:
        - Arn: !GetAtt MongoDBAPIDestination.Arn
          Id: MongoDBAPITarget
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DLQueue.Arn

Outputs:
  EventBusARN:
    Description: ARN of the EventBridge Event Bus
    Value: !GetAtt EventBus.Arn
  DLQARN:
    Description: ARN of the Dead Letter Queue
    Value: !GetAtt DLQueue.Arn
  ConnectionARN:
    Description: ARN of the API Connection
    Value: !GetAtt MongoDBConnection.Arn
  APIDestinationARN:
    Description: ARN of the API Destination
    Value: !GetAtt MongoDBAPIDestination.Arn
  RuleARN:
    Description: ARN of the EventBridge Rule
    Value: !GetAtt EventRule.Arn