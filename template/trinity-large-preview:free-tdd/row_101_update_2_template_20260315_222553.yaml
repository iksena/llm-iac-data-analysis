AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with Flow Logs and Secure S3 Bucket for Log Storage

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  FlowLogTrafficType:
    Type: String
    Default: ALL
    AllowedValues:
      - ACCEPT
      - REJECT
      - ALL
    Description: Type of traffic to log
  FlowLogPrefix:
    Type: String
    Default: flow-logs/
    Description: Optional prefix for log files in S3 bucket

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: FlowLogVPC

  FlowLogS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: FlowLogBucket

  FlowLogS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${BucketName}/AWSLogs/${AccountID}/*
              - BucketName: !Ref FlowLogS3Bucket
                AccountID: !Ref AWS::AccountId
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt FlowLogS3Bucket.Arn

  FlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: !Ref FlowLogTrafficType
      LogDestinationType: s3
      LogDestination: !GetAtt FlowLogS3Bucket.Arn
      LogFormat: 'version'
      MaxAggregationInterval: 600

Outputs:
  FlowLogBucketName:
    Description: ARN of the S3 bucket for flow logs
    Value: !GetAtt FlowLogS3Bucket.Arn