AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven integration between DynamoDB streams and EventBridge'

Parameters:
  TableName:
    Type: String
    Default: 'OrdersTable'
    Description: 'Name of the DynamoDB table'
  EventBusName:
    Type: String
    Default: 'CentralEventBus'
    Description: 'Name of the EventBridge event bus'
  PartitionKeyName:
    Type: String
    Default: 'id'
    Description: 'Name of the DynamoDB partition key'
  BillingMode:
    Type: String
    Default: 'PAY_PER_REQUEST'
    AllowedValues:
      - 'PAY_PER_REQUEST'
      - 'PROVISIONED'
    Description: 'DynamoDB billing mode'

Resources:
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: !Ref PartitionKeyName
          AttributeType: 'S'
      KeySchema:
        - AttributeName: !Ref PartitionKeyName
          KeyType: 'HASH'
      BillingMode: !Ref BillingMode
      StreamSpecification:
        StreamViewType: 'NEW_AND_OLD_IMAGES'

  CentralEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt OrdersTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !GetAtt CentralEventBus.Arn

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${TableName}-Insert-Pipe'
      RoleArn: !GetAtt PipeExecutionRole.Arn
      Source: !GetAtt OrdersTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
        FilterCriteria:
          Filters:
            - Pattern: '{"eventName": ["INSERT"]}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'DynamoDBInsert'
          Source: !Sub 'dynamodb.${AWS::Region}.${AWS::AccountId}'

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${TableName}-Modify-Pipe'
      RoleArn: !GetAtt PipeExecutionRole.Arn
      Source: !GetAtt OrdersTable.StreamArn
      Target: !GetAtt CentralEventBus.Arn
      SourceParameters:
        DynamoDBStreamParameters:
          StartingPosition: LATEST
          BatchSize: 10
        FilterCriteria:
          Filters:
            - Pattern: '{"eventName": ["MODIFY"]}'
      TargetParameters:
        EventBridgeEventBusParameters:
          DetailType: 'DynamoDBModify'
          Source: !Sub 'dynamodb.${AWS::Region}.${AWS::AccountId}'

Outputs:
  DynamoDBTableARN:
    Description: 'ARN of the DynamoDB table'
    Value: !GetAtt OrdersTable.Arn
  EventBusARN:
    Description: 'ARN of the EventBridge event bus'
    Value: !GetAtt CentralEventBus.Arn
  InsertPipeARN:
    Description: 'ARN of the INSERT event pipe'
    Value: !Ref InsertEventPipe
  ModifyPipeARN:
    Description: 'ARN of the MODIFY event pipe'
    Value: !Ref ModifyEventPipe