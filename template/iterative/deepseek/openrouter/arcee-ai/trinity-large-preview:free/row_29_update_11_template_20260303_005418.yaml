AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure parameter storage and retrieval workflows using AWS Systems Manager (SSM) Parameter Store and Secrets Manager.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws