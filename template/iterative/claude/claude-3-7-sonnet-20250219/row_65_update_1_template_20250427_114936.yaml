AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a Hello World Lambda function using Node.js 20.x runtime'

Resources:
  HelloWorldLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Description: IAM Role for Hello World Lambda function execution

  HelloWorldLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HelloWorldFunction
      Description: A simple Lambda function that prints Hello World
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt HelloWorldLambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Hello World!');
            return {
              statusCode: 200,
              body: JSON.stringify({
                message: 'Hello World!'
              }),
            };
          };
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          ENVIRONMENT: production

Outputs:
  HelloWorldLambdaFunctionArn:
    Description: ARN of the Hello World Lambda function
    Value: !GetAtt HelloWorldLambdaFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"
  
  HelloWorldLambdaFunctionName:
    Description: Name of the Hello World Lambda function
    Value: !Ref HelloWorldLambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"