AWSTemplateFormatVersion: '2010-09-09'
Description: Redis caching solution with EC2 instance and SSM access

Parameters:
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.3.0/24
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.4.0/24
    AllowedPattern: (\d{1,3}\.){3}\d{1,3}\/\d{1,2}

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: RedisVPC
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: SSMRole
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMRole

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref ElastiCacheSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EC2SecurityGroup
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ElastiCache cluster
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ElastiCacheSecurityGroup
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for ElastiCache cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  ElastiCacheCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      CacheNodeType: cache.t3.micro
      Engine: redis
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt ElastiCacheSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: RedisCluster
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId:
        Fn::ImportValue:
          !Sub '${AWS::Region}/AMAZON_LINUX_2023_AMI'
      IamInstanceProfile: !Ref SSMInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !GetAtt EC2SecurityGroup.GroupId
          SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: RedisEC2Instance
        - Key: Environment
          Value: Production
        - Key: Application
          Value: RedisCacheSolution

Outputs:
  ElastiCachePrimaryEndpoint:
    Description: ElastiCache Primary Endpoint Address
    Value: !GetAtt ElastiCacheCluster.PrimaryEndPoint.Address
  ElastiCachePort:
    Description: ElastiCache Port
    Value: !GetAtt ElastiCacheCluster.PrimaryEndPoint.Port
  EC2PublicDNS:
    Description: EC2 Instance Public DNS Name
    Value: !GetAtt EC2Instance.PublicDnsName
  EC2PublicIP:
    Description: EC2 Instance Public IP Address
    Value: !GetAtt EC2Instance.PublicIp