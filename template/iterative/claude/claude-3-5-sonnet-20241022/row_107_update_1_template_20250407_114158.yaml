AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway integrated with SQS queue for HTTP-based message retrieval'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS queue
    Default: my-api-queue
  
  StageName:
    Type: String
    Description: API Gateway stage name
    Default: prod
    
  WaitTimeSeconds:
    Type: Number
    Description: Long polling wait time in seconds
    Default: 20
    MinValue: 0
    MaxValue: 20

Resources:
  Queue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      ReceiveMessageWaitTimeSeconds: !Ref WaitTimeSeconds

  QueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: 
        - !Ref Queue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - sqs:ReceiveMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt Queue.Arn

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ApiGatewaySQSPolicy
      Roles: 
        - !Ref ApiGatewayRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:GetQueueAttributes
            Resource: !GetAtt Queue.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: SQS-Message-API
      Description: API Gateway for SQS message retrieval

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: messages

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}
        RequestParameters:
          integration.request.querystring.MaxNumberOfMessages: method.request.querystring.maxMessages
          integration.request.querystring.WaitTimeSeconds: method.request.querystring.waitTime
        RequestTemplates:
          application/json: '{"Action": "ReceiveMessage"}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: $input.body
      RequestParameters:
        method.request.querystring.maxMessages: false
        method.request.querystring.waitTime: false
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref RestApi
      StageName: !Ref StageName

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/messages

  QueueURL:
    Description: URL of the SQS Queue
    Value: !Ref Queue

  QueueARN:
    Description: ARN of the SQS Queue
    Value: !GetAtt Queue.Arn