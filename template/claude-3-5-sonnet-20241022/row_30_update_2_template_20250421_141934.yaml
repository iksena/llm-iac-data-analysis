AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS with Multi-AZ EC2 instances and monitoring - Enhanced Version'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'production'
    Description: Environment name for resource tagging
  
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: 
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type
    
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of existing EC2 KeyPair
    
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC

  AllowedCidrForSSH:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed for SSH access

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 8]]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-2

  PublicNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-nacl

  PublicNACLInboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 0
        To: 65535

  PublicNACLOutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref PublicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 0
        To: 65535

  PublicSubnet1NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      NetworkAclId: !Ref PublicNACL

  PublicSubnet2NACLAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      NetworkAclId: !Ref PublicNACL

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-routes

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-efs-sg

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrForSSH
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ec2-sg

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-efs

  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonElasticFileSystemClientFullAccess
      Policies:
        - PolicyName: CloudWatchMetricsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  WaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: 
      - EC2Instance1
      - EC2Instance2
    Properties:
      Handle: !Ref WaitHandle
      Timeout: '900'
      Count: 2

  EC2Instance1:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref 'AWS::SSM::Parameter::Value:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          
          # Function to check mount target availability
          check_mount_targets() {
            aws efs describe-mount-targets --file-system-id ${EfsFileSystem} \
              --region ${AWS::Region} | grep -q "available"
            return $?
          }
          
          # Wait for mount targets
          counter=0
          until check_mount_targets || [ $counter -eq 30 ]; do
            echo "Waiting for mount targets to be available..."
            sleep 10
            ((counter++))
          done
          
          if [ $counter -eq 30 ]; then
            /opt/aws/bin/cfn-signal -e 1 "${WaitHandle}"
            exit 1
          fi
          
          # Mount EFS
          EFS_MOUNT="${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/"
          mount -t efs -o tls $EFS_MOUNT /mnt/efs
          
          if [ $? -eq 0 ]; then
            echo "EFS mounted successfully"
            /opt/aws/bin/cfn-signal -e 0 "${WaitHandle}"
          else
            /opt/aws/bin/cfn-signal -e 1 "${WaitHandle}"
            exit 1
          fi

  EC2Instance2:
    Type: AWS::EC2::Instance
    DependsOn: 
      - MountTarget1
      - MountTarget2
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref 'AWS::SSM::Parameter::Value:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      SubnetId: !Ref PublicSubnet2
      SecurityGroupIds:
        - !Ref Ec2SecurityGroup
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          
          # Function to check mount target availability
          check_mount_targets() {
            aws efs describe-mount-targets --file-system-id ${EfsFileSystem} \
              --region ${AWS::Region} | grep -q "available"
            return $?
          }
          
          # Wait for mount targets
          counter=0
          until check_mount_targets || [ $counter -eq 30 ]; do
            echo "Waiting for mount targets to be available..."
            sleep 10
            ((counter++))
          done
          
          if [ $counter -eq 30 ]; then
            /opt/aws/bin/cfn-signal -e 1 "${WaitHandle}"
            exit 1
          fi
          
          # Mount EFS
          EFS_MOUNT="${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com:/"
          mount -t efs -o tls $EFS_MOUNT /mnt/efs
          
          if [ $? -eq 0 ]; then
            echo "EFS mounted successfully"
            /opt/aws/bin/cfn-signal -e 0 "${WaitHandle}"
          else
            /opt/aws/bin/cfn-signal -e 1 "${WaitHandle}"
            exit 1
          fi

  EfsAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS-Monitoring-Alerts

  EfsIoAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EFS I/O utilization exceeds 95%
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 95
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      AlarmActions:
        - !Ref EfsAlarmTopic

  EfsThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EFS throughput utilization exceeds 80%
      MetricName: ThroughputIOPS
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem
      AlarmActions:
        - !Ref EfsAlarmTopic

Outputs:
  EfsDnsName:
    Description: EFS DNS Name
    Value: !Sub ${EfsFileSystem}.efs.${AWS::Region}.amazonaws.com

  EC2Instance1Id:
    Description: Instance 1 ID
    Value: !Ref EC2Instance1

  EC2Instance2Id:
    Description: Instance 2 ID
    Value: !Ref EC2Instance2

  EC2Instance1IP:
    Description: Public IP of Instance 1
    Value: !GetAtt EC2Instance1.PublicIp

  EC2Instance2IP:
    Description: Public IP of Instance 2
    Value: !GetAtt EC2Instance2.PublicIp

  EfsAlarmTopicArn:
    Description: SNS Topic ARN for EFS Alarms
    Value: !Ref EfsAlarmTopic