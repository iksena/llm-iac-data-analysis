AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ECR repository with root account access policy for Kubernetes container images

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: kubernetes-container-images
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      RepositoryPolicyText:
        Version: '2012-10-17'
        Statement:
        - Sid: RootAccountECRAccess
          Effect: Allow
          Principal:
            AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
          Action:
          - ecr:GetDownloadUrlForLayer
          - ecr:BatchGetImage
          - ecr:BatchCheckLayerAvailability
          - ecr:PutImage
          - ecr:InitiateLayerUpload
          - ecr:UploadLayerPart
          - ecr:CompleteLayerUpload
          - ecr:DescribeRepositories
          - ecr:GetRepositoryPolicy
          - ecr:ListImages
          - ecr:DeleteRepository
          - ecr:BatchDeleteImage
          - ecr:SetRepositoryPolicy
          - ecr:DeleteRepositoryPolicy

Outputs:
  RepositoryArn:
    Description: ARN of the created ECR repository
    Value: !GetAtt ECRRepository.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RepositoryArn'

  RepositoryUri:
    Description: URI of the created ECR repository
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}'
    Export:
      Name: !Sub '${AWS::StackName}-RepositoryUri'