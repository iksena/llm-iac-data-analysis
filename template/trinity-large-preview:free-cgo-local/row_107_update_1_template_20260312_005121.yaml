AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-messages-queue

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSReceiveMessagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  APIGatewayAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-sqs-api
      ProtocolType: HTTP

  APIGatewayIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGatewayAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${QueueName}
        - QueueName: !Ref SQSQueue
      IntegrationMethod: POST
      PayloadFormatVersion: '1.0'
      PassthroughBehavior: WHEN_NO_TEMPLATES

  APIGatewayRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGatewayAPI
      RouteKey: GET /messages
      Target: !Sub integrations/${APIGatewayIntegration}

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SQSQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt APIGatewayRole.Arn
            Action: sqs:ReceiveMessage
            Resource: !GetAtt SQSQueue.Arn

Outputs:
  APIGatewayURL:
    Description: URL to retrieve messages from SQS
    Value: !Sub https://${APIGatewayAPI}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${AWS::StackName}-APIGatewayURL