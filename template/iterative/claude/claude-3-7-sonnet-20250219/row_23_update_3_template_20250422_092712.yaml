AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a DynamoDB table'

Parameters:
  TableName:
    Type: String
    Description: Name of the DynamoDB table
    Default: MyDynamoDBTable
  
  BillingMode:
    Type: String
    Description: DynamoDB billing mode
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST
  
  ReadCapacityUnits:
    Type: Number
    Description: Provisioned read capacity units
    Default: 5
    MinValue: 1
  
  WriteCapacityUnits:
    Type: Number
    Description: Provisioned write capacity units
    Default: 5
    MinValue: 1

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: 
        Fn::If:
          - IsProvisionedBilling
          - ReadCapacityUnits: !Ref ReadCapacityUnits
            WriteCapacityUnits: !Ref WriteCapacityUnits
          - !Ref AWS::NoValue
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Ref TableName

Conditions:
  IsProvisionedBilling: !Equals [!Ref BillingMode, 'PROVISIONED']

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt DynamoDBTable.Arn