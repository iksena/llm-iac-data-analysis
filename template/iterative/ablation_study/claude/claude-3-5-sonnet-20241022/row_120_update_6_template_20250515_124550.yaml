AWSTemplateFormatVersion: '2010-09-09'
Description: 'Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed
  
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for compute environment
    
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for compute environment
    
  ContainerImage:
    Type: String
    Description: URI of the container image to run
    
  MaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum vCPUs for the compute environment
    MinValue: 0
    MaxValue: 256

  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: Deployment environment

Resources:
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment
      
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-batch-sg'
        - Key: Environment
          Value: !Ref Environment
          
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        
  EcsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        
  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PipesPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'sqs:ReceiveMessage'
                  - 'sqs:DeleteMessage'
                  - 'sqs:GetQueueAttributes'
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action:
                  - 'batch:SubmitJob'
                  - 'batch:DescribeJobs'
                  - 'batch:TerminateJob'
                Resource: '*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
                  
  EcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: "/"
      Roles:
        - !Ref EcsInstanceRole
        
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: EC2
        MaxvCpus: !Ref MaxvCpus
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        InstanceRole: !GetAtt EcsInstanceProfile.Arn
        InstanceTypes:
          - optimal
        AllocationStrategy: BEST_FIT_PROGRESSIVE
      ServiceRole: !GetAtt BatchServiceRole.Arn
      Tags:
        Environment: !Ref Environment
      
  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Tags:
        Environment: !Ref Environment
          
  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Vcpus: 1
        Memory: 2048
        JobRoleArn: !GetAtt EcsTaskRole.Arn
        ExecutionRoleArn: !GetAtt EcsTaskRole.Arn
        ReadonlyRootFilesystem: true
        Privileged: false
      RetryStrategy:
        Attempts: 3
      Timeout:
        AttemptDurationSeconds: 300
      Tags:
        Environment: !Ref Environment
        
  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub '${AWS::StackName}-event-pipe'
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt EventQueue.Arn
      SourceParameters:
        SqsQueueParameters:
          BatchSize: 1
          MaximumBatchingWindowInSeconds: 30
      Target: !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}'
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: "ProcessOrder"
      
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref EventQueue
    
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn
    
  JobQueueArn:
    Description: ARN of the Batch job queue
    Value: !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/${BatchJobQueue}'
    
  JobDefinitionArn:
    Description: ARN of the Batch job definition
    Value: !Ref BatchJobDefinition
    
  PipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventPipe.Arn