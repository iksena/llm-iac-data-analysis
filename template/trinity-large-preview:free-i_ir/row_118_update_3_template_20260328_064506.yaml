AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge Pipes workflow to enrich SQS messages with external API data and log results

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties: {}
    Metadata:
      Effect: source-queue

  APIConnection:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      ApiDestinationName: ZippopotamAPIConnection
      ConnectionArn: !GetAtt IAMRole.Arn
      InvocationEndpoint: https://api.zippopotam.us/us/*
      HttpMethod: GET
    Metadata:
      Effect: api-connection

  APIDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      ApiDestinationName: ZippopotamAPI
      ConnectionArn: !GetAtt APIConnection.Arn
      InvocationEndpoint: https://api.zippopotam.us/us/*
      HttpMethod: GET
    Metadata:
      Effect: external-api

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: EventBridgePipesEnrichmentLogs
      RetentionInDays: 30
    Metadata:
      Effect: enriched-logs

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipesPermissions
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt APIDestination.ApiDestinationArn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn
    Metadata:
      Effect: service-role

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: SQSToAPIPipe
      Source:
        SqsQueue:
          QueueUrl: !GetAtt SQSQueue.QueueUrl
      Transform:
        ApiDestination:
          ApiDestinationArn: !GetAtt APIDestination.ApiDestinationArn
      Target:
        CloudWatchLogs:
          LogGroup: !Ref LogGroup
      RoleArn: !GetAtt IAMRole.Arn
    Metadata:
      Effect: data-enrichment
      Effect: event-driven

Metadata:
  Invariants:
    - EventBridge Pipe must have permissions to read SQS, invoke API, and write logs
    - API destination must use HTTPS with US zip code path parameter
    - Log group must retain enriched data for 30 days
    - IAM role must be assumable by EventBridge Pipes service
    - Message enrichment must dynamically append API response data