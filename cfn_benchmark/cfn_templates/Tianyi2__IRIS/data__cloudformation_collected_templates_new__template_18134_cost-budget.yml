AWSTemplateFormatVersion: '2010-09-09'
Description: Cost budget with SNS notifications. Replace {{SNS_TOPIC_ARN}} before deployment.
Resources:
  Budget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: MonthlyBudget
        BudgetLimit:
          Amount: 100
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
          Subscribers:
            - SubscriptionType: SNS
              Address: '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN