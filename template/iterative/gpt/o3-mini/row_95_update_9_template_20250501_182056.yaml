AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to deploy an Amazon Linux 2 EC2 instance tagged with "nginx: Yes",
  an IAM role and instance profile for SSM access, a custom SSM Command Document to perform OS updates,
  Nginx installation, and validation, and an SSM Association that targets instances based on the tag.

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: "/"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
      Path: "/"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: nginx
          Value: "Yes"

  SSMCommandDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Name: EC2-Nginx-Command-Document
      Content:
        schemaVersion: '2.2'
        description: "Custom command document to update the OS, install Nginx, and validate the web server."
        mainSteps:
          - action: aws:runShellScript
            name: runShellScript
            inputs:
              runCommand:
                - "sudo yum update -y"
                - "sudo amazon-linux-extras install nginx1 -y"
                - "sudo systemctl start nginx"
                - "status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost)"
                - "if [ $status -ne 200 ]; then exit 1; fi"

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMCommandDocument
      AssociationName: EC2-Nginx-Association
      Targets:
        - Key: "tag:nginx"
          Values:
            - "Yes"

Outputs:
  InstanceId:
    Description: The ID of the EC2 instance
    Value: !Ref EC2Instance
  SSMCommandDocumentName:
    Description: The name of the custom SSM Command Document
    Value: !Ref SSMCommandDocument