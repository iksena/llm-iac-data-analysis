AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  IdentityManagementAccount:
    Type: String
    Description: Account ID for identity management
  ToolingManagementAccount:
    Type: String
    Description: Account ID for tooling management
  AllowedRegions:
    Type: CommaDelimitedList
    Default: 'us-east-1,us-west-2'
    Description: Regions allowed for operations

Resources:
  MFAEnforcedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: MFAEnforcedPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'true'

  IdentityAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: IdentityAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'sts:*'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'true'

  SensitiveActionsDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SensitiveActionsDenyPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - 'aws-portal:*'
              - 'cloudhsm:*'
            Resource: '*'
          - Effect: Deny
            Action: 'sts:AssumeRole'
            Resource: '*'
            Condition:
              StringNotEquals:
                'aws:RequestedRegion': !Ref AllowedRegions

  PermissionsBoundaryForIdentityAdmin:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: IdentityAdmin-Boundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - 'iam:Delete*'
              - 'iam:Put*'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'iam:*'
              - 'sts:*'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'true'

  CloudFormationPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: CFN-Permissions-Boundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:*'
              - 's3:GetObject'
              - 'iam:PassRole'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'iam:DeleteRole'
              - 'organizations:*'
            Resource: '*'

  StackSetPermissionsBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: StackSet-Permissions-Boundary
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'cloudformation:*'
              - 'sts:AssumeRole'
            Resource: '*'

  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin
      ManagedPolicyArns:
        - !Ref MFAEnforcedPolicy

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin
      Policies:
        - PolicyName: RestrictedAdminPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:*'
                  - 's3:*'
                Resource: '*'
                Condition:
                  BoolIfExists:
                    'aws:MultiFactorAuthPresent': 'true'
      ManagedPolicyArns:
        - !Ref SensitiveActionsDenyPolicy

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin
      ManagedPolicyArns:
        - !Ref IdentityAdminPolicy

  CrossAccountIdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountIdentityAdmin
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${IdentityManagementAccount}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
      ManagedPolicyArns:
        - !Ref IdentityAdminPolicy
      PermissionsBoundary: !Ref PermissionsBoundaryForIdentityAdmin

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSCloudFormationFullAccess'
      PermissionsBoundary: !Ref CloudFormationPermissionsBoundary

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${ToolingManagementAccount}:root'
              Service: 'cloudformation.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSCloudFormationFullAccess'
      PermissionsBoundary: !Ref StackSetPermissionsBoundary

Outputs:
  CloudFormationExecutionRoleARN:
    Value: !GetAtt CloudFormationExecutionRole.Arn
  StackSetExecutionRoleARN:
    Value: !GetAtt StackSetExecutionRole.Arn
  CrossAccountIdentityAdminRoleARN:
    Value: !GetAtt CrossAccountIdentityAdminRole.Arn
  PrivilegedAdminGroupName:
    Value: !Ref PrivilegedAdminGroup
  IdentityAdminGroupName:
    Value: !Ref IdentityAdminGroup