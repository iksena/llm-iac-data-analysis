AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an Amazon S3 bucket with defaults

Parameters:
  BucketName:
    Type: String
    Default: !Sub '${AWS::StackName}-${AWS::Region}-${AWS::NoValue}'
    Description: Name of the S3 bucket (will be made unique with stack and region info)
  EnableVersioning:
    Type: Boolean
    Default: true
    Description: Enable S3 versioning for the bucket
  EnableEncryption:
    Type: Boolean
    Default: true
    Description: Enable server-side encryption for the bucket
  AccessLoggingBucket:
    Type: String
    Default: ''
    Description: Optional S3 bucket for access logging (leave blank to disable)

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: !If [EnableVersioning, Enabled, Suspended]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: !Sub '${AWS::StackName}'

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

  S3AccessLogging:
    Type: AWS::S3::Bucket
    Condition: HasAccessLoggingBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref AccessLoggingBucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Conditions:
  HasAccessLoggingBucket: !Not [!Equals [!Ref AccessLoggingBucket, '']]

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  BucketARN:
    Description: ARN of the created S3 bucket
    Value: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
  WebsiteURL:
    Description: Website URL of the created S3 bucket (if configured)
    Value: !GetAtt S3Bucket.WebsiteURL
    Condition: HasWebsiteConfiguration