AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure REST API Gateway integrated with Amazon SES for sending templated emails'

Parameters:
  SESRegion:
    Type: String
    Default: 'us-east-1'
    Description: 'The AWS region where SES is configured'
    
  EmailSender:
    Type: String
    Description: 'The email address that will be used as the sender (must be verified in SES)'
    
  APIKeyName:
    Type: String
    Default: 'EmailServiceAPIKey'
    Description: 'Name for the API Key'
    
  UsagePlanName:
    Type: String
    Default: 'EmailServiceUsagePlan'
    Description: 'Name for the Usage Plan'
    
  MonthlyQuota:
    Type: Number
    Default: 10000
    Description: 'Monthly quota for API calls'
    
  RateLimit:
    Type: Number
    Default: 500
    Description: 'Rate limit for API calls per second'

Resources:
  # IAM Role for API Gateway to invoke SES
  APIGatewayToSESRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
      Path: '/'

  # IAM Policy for SES permissions
  SESPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: SESSendEmailPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ses:SendEmail'
              - 'ses:SendRawEmail'
            Resource: '*'
      Roles:
        - !Ref APIGatewayToSESRole

  # API Gateway REST API
  EmailAPI:
    Type: 'AWS::ApiGateway::RestApi'
    Properties:
      Name: EmailService
      Description: 'API for sending emails via SES'
      EndpointConfiguration:
        Types:
          - REGIONAL
      ApiKeySourceType: HEADER

  # API Gateway Error Model
  ErrorModel:
    Type: 'AWS::ApiGateway::Model'
    Properties:
      RestApiId: !Ref EmailAPI
      ContentType: 'application/json'
      Description: 'Error response model'
      Name: ErrorModel
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        title: ErrorResponse
        type: object
        properties:
          message:
            type: string
          error:
            type: string

  # API Gateway Model for request validation
  EmailRequestModel:
    Type: 'AWS::ApiGateway::Model'
    Properties:
      RestApiId: !Ref EmailAPI
      ContentType: 'application/json'
      Description: 'Schema for email request validation'
      Name: EmailRequestModel
      Schema:
        $schema: 'http://json-schema.org/draft-04/schema#'
        title: EmailRequest
        type: object
        required:
          - to
          - subject
          - body
        properties:
          to:
            type: array
            items:
              type: string
            minItems: 1
          cc:
            type: array
            items:
              type: string
          bcc:
            type: array
            items:
              type: string
          from:
            type: string
          subject:
            type: string
            minLength: 1
          body:
            type: object
            required:
              - html
            properties:
              html:
                type: string
              text:
                type: string

  # API Gateway Request Validator
  EmailRequestValidator:
    Type: 'AWS::ApiGateway::RequestValidator'
    Properties:
      RestApiId: !Ref EmailAPI
      Name: EmailRequestValidator
      ValidateRequestBody: true
      ValidateRequestParameters: false

  # API Gateway Resource
  EmailResource:
    Type: 'AWS::ApiGateway::Resource'
    Properties:
      RestApiId: !Ref EmailAPI
      ParentId: !GetAtt EmailAPI.RootResourceId
      PathPart: 'email'

  # API Gateway Method
  EmailPostMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestModels:
        'application/json': !Ref EmailRequestModel
      RequestValidatorId: !Ref EmailRequestValidator
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            'application/json': 'Empty'
        - StatusCode: '400'
          ResponseModels:
            'application/json': !Ref ErrorModel
        - StatusCode: '500'
          ResponseModels:
            'application/json': !Ref ErrorModel
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${SESRegion}:ses:action/SendEmail'
        Credentials: !GetAtt APIGatewayToSESRole.Arn
        PassthroughBehavior: NEVER
        RequestParameters:
          'integration.request.header.Content-Type': "'application/x-www-form-urlencoded'"
        RequestTemplates:
          'application/json': !Sub |
            #set($inputRoot = $input.path('$'))
            #set($from = $inputRoot.from)
            #if($from == '' || !$from)
              #set($from = "${EmailSender}")
            #end
            
            Action=SendEmail&Source=$util.urlEncode($from)
            
            #foreach($toAddress in $inputRoot.to)
              &Destination.ToAddresses.member.$foreach.count=$util.urlEncode($toAddress)
            #end
            
            #if($inputRoot.cc && $inputRoot.cc.size() > 0)
              #foreach($ccAddress in $inputRoot.cc)
                &Destination.CcAddresses.member.$foreach.count=$util.urlEncode($ccAddress)
              #end
            #end
            
            #if($inputRoot.bcc && $inputRoot.bcc.size() > 0)
              #foreach($bccAddress in $inputRoot.bcc)
                &Destination.BccAddresses.member.$foreach.count=$util.urlEncode($bccAddress)
              #end
            #end
            
            &Message.Subject.Data=$util.urlEncode($inputRoot.subject)
            
            #if($inputRoot.body.html)
              &Message.Body.Html.Data=$util.urlEncode($inputRoot.body.html)
            #end
            
            #if($inputRoot.body.text)
              &Message.Body.Text.Data=$util.urlEncode($inputRoot.body.text)
            #end
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              'application/json': |
                {
                  "messageId": "$input.path('$.SendEmailResponse.SendEmailResult.MessageId')",
                  "status": "success"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              'application/json': |
                {
                  "message": "Bad request",
                  "error": "$util.escapeJavaScript($input.path('$.errorMessage'))"
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              'application/json': |
                {
                  "message": "Internal server error",
                  "error": "$util.escapeJavaScript($input.path('$.errorMessage'))"
                }

  # API Gateway OPTIONS Method for CORS
  EmailOptionsMethod:
    Type: 'AWS::ApiGateway::Method'
    Properties:
      RestApiId: !Ref EmailAPI
      ResourceId: !Ref EmailResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      ApiKeyRequired: false
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            'method.response.header.Access-Control-Allow-Headers': true
            'method.response.header.Access-Control-Allow-Methods': true
            'method.response.header.Access-Control-Allow-Origin': true
          ResponseModels:
            'application/json': 'Empty'
      Integration:
        Type: MOCK
        RequestTemplates:
          'application/json': '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              'method.response.header.Access-Control-Allow-Headers': "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              'method.response.header.Access-Control-Allow-Methods': "'OPTIONS,POST'"
              'method.response.header.Access-Control-Allow-Origin': "'*'"
            ResponseTemplates:
              'application/json': ''

  # API Gateway Deployment
  EmailAPIDeployment:
    Type: 'AWS::ApiGateway::Deployment'
    DependsOn:
      - EmailPostMethod
      - EmailOptionsMethod
    Properties:
      RestApiId: !Ref EmailAPI
      Description: 'Deployment for Email API'

  # API Gateway Stage
  EmailAPIStage:
    Type: 'AWS::ApiGateway::Stage'
    Properties:
      RestApiId: !Ref EmailAPI
      DeploymentId: !Ref EmailAPIDeployment
      StageName: 'prod'
      Description: 'Production stage for Email API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: true
          LoggingLevel: INFO

  # API Gateway API Key
  EmailAPIKey:
    Type: 'AWS::ApiGateway::ApiKey'
    DependsOn:
      - EmailAPIStage
    Properties:
      Name: !Ref APIKeyName
      Description: 'API Key for Email Service'
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailAPI
          StageName: 'prod'

  # API Gateway Usage Plan
  EmailUsagePlan:
    Type: 'AWS::ApiGateway::UsagePlan'
    DependsOn:
      - EmailAPIStage
    Properties:
      UsagePlanName: !Ref UsagePlanName
      Description: 'Usage plan for Email API'
      ApiStages:
        - ApiId: !Ref EmailAPI
          Stage: 'prod'
      Quota:
        Limit: !Ref MonthlyQuota
        Period: MONTH
      Throttle:
        RateLimit: !Ref RateLimit
        BurstLimit: !Ref RateLimit

  # API Gateway Usage Plan Key
  EmailUsagePlanKey:
    Type: 'AWS::ApiGateway::UsagePlanKey'
    Properties:
      KeyId: !Ref EmailAPIKey
      KeyType: API_KEY
      UsagePlanId: !Ref EmailUsagePlan

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL for prod stage'
    Value: !Sub 'https://${EmailAPI}.execute-api.${AWS::Region}.amazonaws.com/prod/email'
  
  ApiKeyId:
    Description: 'API Key ID'
    Value: !Ref EmailAPIKey
  
  ApiKeyValue:
    Description: 'API Key Value (retrieve from AWS Console or CLI)'
    Value: !Sub 'Use AWS CLI command: aws apigateway get-api-key --api-key ${EmailAPIKey} --include-value --region ${AWS::Region}'
  
  UsagePlanId:
    Description: 'Usage Plan ID'
    Value: !Ref EmailUsagePlan