AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for API Gateway integration with Kinesis Data Streams'

Parameters:
  KinesisStreamName:
    Type: String
    Default: 'api-gateway-kinesis-stream'
    Description: 'Name of the Kinesis Data Stream'
  
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: 'Number of shards for the Kinesis Data Stream'
    MinValue: 1
  
  ApiGatewayName:
    Type: String
    Default: 'kinesis-api'
    Description: 'Name of the API Gateway'
  
  ApiGatewayStageName:
    Type: String
    Default: 'prod'
    Description: 'Name of the API Gateway stage'

Resources:
  # Kinesis Data Stream
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount
      StreamModeDetails:
        StreamMode: PROVISIONED
      RetentionPeriodHours: 24
      Tags:
        - Key: Name
          Value: !Ref KinesisStreamName

  # IAM Role for API Gateway to access Kinesis
  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs'
      Path: '/'

  # IAM Policy for API Gateway to perform Kinesis actions
  ApiGatewayPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ApiGatewayKinesisPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'kinesis:DescribeStream'
              - 'kinesis:PutRecord'
              - 'kinesis:PutRecords'
              - 'kinesis:GetShardIterator'
              - 'kinesis:GetRecords'
              - 'kinesis:ListShards'
            Resource: !GetAtt KinesisStream.Arn
      Roles:
        - !Ref ApiGatewayRole

  # API Gateway REST API
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiGatewayName
      Description: 'API Gateway for Kinesis Data Stream integration'
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource for Stream
  StreamResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'stream'

  # API Gateway Method for Describing Stream (GET)
  DescribeStreamMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref StreamResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${stageVariables.streamName}"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "StreamDescription": {
                    "StreamName": "$inputRoot.StreamDescription.StreamName",
                    "StreamARN": "$inputRoot.StreamDescription.StreamARN",
                    "StreamStatus": "$inputRoot.StreamDescription.StreamStatus",
                    "RetentionPeriodHours": $inputRoot.StreamDescription.RetentionPeriodHours,
                    "StreamCreationTimestamp": "$inputRoot.StreamDescription.StreamCreationTimestamp",
                    "Shards": [
                      #foreach($shard in $inputRoot.StreamDescription.Shards)
                      {
                        "ShardId": "$shard.ShardId",
                        "HashKeyRange": {
                          "StartingHashKey": "$shard.HashKeyRange.StartingHashKey",
                          "EndingHashKey": "$shard.HashKeyRange.EndingHashKey"
                        },
                        "SequenceNumberRange": {
                          "StartingSequenceNumber": "$shard.SequenceNumberRange.StartingSequenceNumber"
                          #if($shard.SequenceNumberRange.EndingSequenceNumber),
                          "EndingSequenceNumber": "$shard.SequenceNumberRange.EndingSequenceNumber"
                          #end
                        }
                      }#if($foreach.hasNext),#end
                      #end
                    ]
                  }
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Resource for Records
  RecordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'record'

  # API Gateway Method for Putting a Record (PUT)
  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref RecordResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${stageVariables.streamName}",
              "Data": "$util.base64Encode($input.json('$.data'))",
              "PartitionKey": "$input.json('$.partitionKey')"
              #if($input.json('$.sequenceNumberForOrdering') && "$input.json('$.sequenceNumberForOrdering')" != ""),
              "SequenceNumberForOrdering": "$input.json('$.sequenceNumberForOrdering')"
              #end
              #if($input.json('$.explicitHashKey') && "$input.json('$.explicitHashKey')" != ""),
              "ExplicitHashKey": "$input.json('$.explicitHashKey')"
              #end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "ShardId": "$input.path('$.ShardId')",
                  "SequenceNumber": "$input.path('$.SequenceNumber')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Resource for Batch Records
  BatchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'records'

  # API Gateway Method for Putting Multiple Records (PUT)
  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref BatchResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${stageVariables.streamName}",
              "Records": [
                #foreach($record in $input.path('$.records'))
                {
                  "Data": "$util.base64Encode($record.data)",
                  "PartitionKey": "$record.partitionKey"
                  #if($record.explicitHashKey && "$record.explicitHashKey" != ""),
                  "ExplicitHashKey": "$record.explicitHashKey"
                  #end
                }#if($foreach.hasNext),#end
                #end
              ]
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "FailedRecordCount": $input.path('$.FailedRecordCount'),
                  "Records": [
                    #foreach($record in $input.path('$.Records'))
                    {
                      "SequenceNumber": "$record.SequenceNumber",
                      "ShardId": "$record.ShardId"
                      #if($record.ErrorCode),
                      "ErrorCode": "$record.ErrorCode",
                      "ErrorMessage": "$record.ErrorMessage"
                      #end
                    }#if($foreach.hasNext),#end
                    #end
                  ]
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Resource for Shards
  ShardsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'shards'

  # API Gateway Method for Listing Shards (GET)
  ListShardsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ShardsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/ListShards'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${stageVariables.streamName}"
              #if($input.params('NextToken') && "$input.params('NextToken')" != ""),
              "NextToken": "$input.params('NextToken')"
              #end
              #if($input.params('MaxResults') && "$input.params('MaxResults')" != ""),
              "MaxResults": $input.params('MaxResults')
              #end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "Shards": [
                    #foreach($shard in $input.path('$.Shards'))
                    {
                      "ShardId": "$shard.ShardId",
                      "HashKeyRange": {
                        "StartingHashKey": "$shard.HashKeyRange.StartingHashKey",
                        "EndingHashKey": "$shard.HashKeyRange.EndingHashKey"
                      },
                      "SequenceNumberRange": {
                        "StartingSequenceNumber": "$shard.SequenceNumberRange.StartingSequenceNumber"
                        #if($shard.SequenceNumberRange.EndingSequenceNumber),
                        "EndingSequenceNumber": "$shard.SequenceNumberRange.EndingSequenceNumber"
                        #end
                      }
                    }#if($foreach.hasNext),#end
                    #end
                  ]
                  #if($input.path('$.NextToken')),
                  "NextToken": "$input.path('$.NextToken')"
                  #end
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Resource for Shard Iterator
  ShardIteratorResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ShardsResource
      PathPart: '{shardId}'

  # API Gateway Resource for Iterator
  IteratorResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ShardIteratorResource
      PathPart: 'iterator'

  # API Gateway Method for Getting a Shard Iterator (GET)
  GetShardIteratorMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref IteratorResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.path.shardId: true
        method.request.querystring.type: false
        method.request.querystring.sequenceNumber: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetShardIterator'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${stageVariables.streamName}",
              "ShardId": "$input.params('shardId')",
              "ShardIteratorType": #if($input.params('type'))"$input.params('type')"#else"TRIM_HORIZON"#end
              #if($input.params('sequenceNumber') && "$input.params('sequenceNumber')" != ""),
              "StartingSequenceNumber": "$input.params('sequenceNumber')"
              #end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "ShardIterator": "$input.path('$.ShardIterator')"
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Resource for Records from a Shard
  ShardRecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !Ref ShardIteratorResource
      PathPart: 'records'

  # API Gateway Method for Getting Records from a Shard (GET)
  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ShardRecordsResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.path.shardId: true
        method.request.querystring.iterator: true
        method.request.querystring.limit: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords'
        Credentials: !GetAtt ApiGatewayRole.Arn
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('iterator')"
              #if($input.params('limit') && "$input.params('limit')" != ""),
              "Limit": $input.params('limit')
              #end
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: |
                {
                  "Records": [
                    #foreach($record in $input.path('$.Records'))
                    {
                      "Data": "$util.base64Decode($record.Data)",
                      "PartitionKey": "$record.PartitionKey",
                      "SequenceNumber": "$record.SequenceNumber",
                      "ApproximateArrivalTimestamp": $record.ApproximateArrivalTimestamp
                    }#if($foreach.hasNext),#end
                    #end
                  ],
                  "NextShardIterator": "$input.path('$.NextShardIterator')",
                  "MillisBehindLatest": $input.path('$.MillisBehindLatest')
                }
          - StatusCode: '400'
            SelectionPattern: '4\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Bad request",
                  "message": $input.json('$.message')
                }
          - StatusCode: '500'
            SelectionPattern: '5\\d{2}'
            ResponseTemplates:
              application/json: |
                {
                  "error": "Internal server error",
                  "message": $input.json('$.message')
                }
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'
        - StatusCode: '400'
          ResponseModels:
            application/json: 'Error'
        - StatusCode: '500'
          ResponseModels:
            application/json: 'Error'

  # API Gateway Deployment
  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - DescribeStreamMethod
      - PutRecordMethod
      - PutRecordsMethod
      - ListShardsMethod
      - GetShardIteratorMethod
      - GetRecordsMethod
    Properties:
      RestApiId: !Ref ApiGateway
      Description: 'Deployment for Kinesis API Gateway'

  # API Gateway Stage
  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiGatewayDeployment
      RestApiId: !Ref ApiGateway
      StageName: !Ref ApiGatewayStageName
      Description: 'Stage for Kinesis API Gateway'
      Variables:
        streamName: !Ref KinesisStreamName

Outputs:
  KinesisStreamArn:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisStream.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KinesisStreamArn'

  ApiGatewayUrl:
    Description: 'URL of the API Gateway'
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiGatewayStageName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  ApiGatewayId:
    Description: 'ID of the API Gateway'
    Value: !Ref ApiGateway
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'