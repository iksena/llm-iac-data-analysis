AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CentralizedSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: Centralized Alert and Event Aggregation Topic
      TopicName: Centralized-Alert-Topic
      KmsMasterKeyId: alias/aws/sns
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: AlertAggregation
  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - s3.amazonaws.com
                - lambda.amazonaws.com
                - cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic
  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: admin@example.com
      Protocol: email
      TopicArn: !Ref CentralizedSNSTopic
      FilterPolicy:
        event:
          - alert
          - critical
          - warning
      RawMessageDelivery: true
  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CentralizedSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sns:Publish
            Resource: !Ref CentralizedSNSTopic
Outputs:
  SNSTopicARN:
    Description: ARN of the centralized SNS topic
    Value: !Ref CentralizedSNSTopic
    Export:
      Name: CentralizedSNSTopicARN
  TopicDisplayName:
    Description: Display name of the SNS topic
    Value: !GetAtt CentralizedSNSTopic.DisplayName