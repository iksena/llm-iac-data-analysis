AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Scalable URL-to-PNG screenshot service with automated load testing,
  S3/SQS integration, and dynamic Auto Scaling triggered by CloudWatch alarms.

Mappings:
  AMIMap:
    us-east-1:
      AMI: ami-0c94855ba95c71c99
    us-west-1:
      AMI: ami-083654bd07b5da81d
    us-west-2:
      AMI: ami-062f7200baf2fa504
    eu-west-1:
      AMI: ami-047bb4163c506cd98

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: "ScreenshotServiceVPC"

  WorkerSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "WorkerSubnet1"

  WorkerSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "WorkerSubnet2"

  LoadTestSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: "LoadTestSubnet"

  ScreenshotS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "screenshot-service-${AWS::StackName}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled

  ScreenshotQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ScreenshotQueue-${AWS::StackName}"
      VisibilityTimeout: 60

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for worker and load test instances."
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WorkerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "WorkerInstanceRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess

  WorkerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "WorkerInstanceProfile-${AWS::StackName}"
      Roles:
        - !Ref WorkerInstanceRole

  LoadTestInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "LoadTestInstanceRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess

  LoadTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "LoadTestInstanceProfile-${AWS::StackName}"
      Roles:
        - !Ref LoadTestInstanceRole

  WorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "WorkerLaunchTemplate-${AWS::StackName}"
      LaunchTemplateData:
        ImageId: !FindInMap [AMIMap, !Ref "AWS::Region", AMI]
        InstanceType: t3.small
        KeyName: your-keypair   # Replace with your key pair name or remove if not needed
        IamInstanceProfile:
          Name: !Ref WorkerInstanceProfile
        SecurityGroupIds:
          - !Ref InstanceSecurityGroup
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            amazon-linux-extras install epel -y
            yum install -y chromium
            echo "Starting worker service..."
            while true; do
              # Placeholder for processing SQS messages and generating screenshots
              sleep 30
            done

  WorkerAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "WorkerASG-${AWS::StackName}"
      VPCZoneIdentifier:
        - !Ref WorkerSubnet1
        - !Ref WorkerSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref WorkerLaunchTemplate
        Version: !GetAtt WorkerLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '2'
      DesiredCapacity: '1'
      Tags:
        - Key: Name
          Value: WorkerInstance
          PropagateAtLaunch: true

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref WorkerAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  QueueScaleUpAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "QueueScaleUpAlarm-${AWS::StackName}"
      AlarmDescription: "Scale up workers when SQS queue visible messages exceed threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !GetAtt ScaleUpPolicy.Arn

  QueueScaleDownAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "QueueScaleDownAlarm-${AWS::StackName}"
      AlarmDescription: "Scale down workers when SQS queue visible messages fall below threshold."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ScreenshotQueue.QueueName
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !GetAtt ScaleDownPolicy.Arn

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Ref LoadTestSubnet
      ImageId: !FindInMap [AMIMap, !Ref "AWS::Region", AMI]
      KeyName: your-keypair   # Replace with your key pair name or remove if not needed
      IamInstanceProfile: !Ref LoadTestInstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -ex
          for i in `seq 1 25`;
          do
            aws sqs send-message --queue-url ${ScreenshotQueue.QueueUrl} --message-body "{\"id\": \"$i.www.wordpress.com\", \"url\": \"http://www.wordpress.com\"}" --region ${AWS::Region}
          done

Outputs:
  S3BucketName:
    Description: "S3 Bucket for storing screenshots"
    Value: !Ref ScreenshotS3Bucket
  SQSQueueURL:
    Description: "URL of the SQS queue for screenshot requests"
    Value: !Ref ScreenshotQueue
  WorkerASGName:
    Description: "Auto Scaling Group name for worker instances"
    Value: !Ref WorkerAutoScalingGroup
  LoadTestInstancePublicIP:
    Description: "Public IP address of the load test instance"
    Value: !GetAtt LoadTestInstance.PublicIp