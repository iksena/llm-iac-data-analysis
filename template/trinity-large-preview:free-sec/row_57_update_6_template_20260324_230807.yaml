AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Cluster with Monitoring Capabilities

Parameters:
  ClusterName:
    Type: String
    Default: MyECSCluster
    Description: Name of the ECS cluster
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for ECS container instances
  MinSize:
    Type: Number
    Default: 1
    Description: Minimum number of instances in the Auto Scaling group
  MaxSize:
    Type: Number
    Default: 3
    Description: Maximum number of instances in the Auto Scaling group
  DesiredCapacity:
    Type: Number
    Default: 2
    Description: Desired number of instances in the Auto Scaling group
  VPC:
    Type: AWS::EC2::VPC::Id
    Default: vpc-00000000000000000
    Description: VPC ID for the ECS cluster
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-00000000000000000
    Description: Subnets for the ECS cluster instances

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  ECSRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ECSRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS Security Group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LaunchConfiguration:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:
      ImageId:
        Fn::ImportValue:
          /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroups:
        - !Ref SecurityGroup
      UserData:
        Fn::Base64:
          Fn::Join:
            - ''
            - - |
                #!/bin/bash
                yum update -y
                amazon-linux-extras enable ecs
                yum install -y ecs-init
                systemctl enable --now ecs
                echo 'ECS_CLUSTER='
                !Ref ECSCluster
                > /etc/ecs/ecs.config
                mkdir -p /etc/ecs
                cat << EOF > /etc/ecs/ecs.config
                ECS_CLUSTER=
                !Ref ECSCluster
                ECS_ENABLE_CONTAINER_INSIGHTS=true
                EOF

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier: !Ref Subnets
      LaunchConfigurationName: !Ref LaunchConfiguration
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacity
      TargetGroupARNs: []

Outputs:
  ClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
  AutoScalingGroupName:
    Description: Auto Scaling Group Name
    Value: !Ref AutoScalingGroup