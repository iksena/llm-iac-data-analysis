AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an encrypted one zone EFS file system within a VPC,
  using a subnet in a user-specified Availability Zone, with an associated security group for NFS access.

Parameters:
  AvailabilityZone:
    Description: The Availability Zone for the Subnet.
    Type: String
    Default: us-east-1a

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: OneZoneEFS-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: OneZoneEFS-Subnet

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound NFS access on port 2049 for EFS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: OneZoneEFS-SG

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      FileSystemTags:
        - Key: Name
          Value: OneZoneEFS-FileSystem

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref EFSSecurityGroup

Outputs:
  VPCId:
    Description: ID of the VPC created for the one zone EFS setup.
    Value: !Ref VPC
  SubnetId:
    Description: ID of the Subnet in the selected Availability Zone.
    Value: !Ref Subnet
  EFSFileSystemId:
    Description: ID of the encrypted EFS File System.
    Value: !Ref EFSFileSystem
  EFSMountTargetId:
    Description: ID of the EFS Mount Target.
    Value: !Ref EFSMountTarget