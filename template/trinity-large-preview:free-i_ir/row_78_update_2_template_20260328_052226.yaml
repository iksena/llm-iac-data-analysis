AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EC2 IP Address Manager (IPAM) with default public and private scopes

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: Managed IP Address Manager for VPC and subnet allocation
      OperatingRegions:
        - RegionName: us-east-1

  PublicScope:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamScopeId: !GetAtt IPAM.DefaultResourceDiscoveryId
      Description: Default public IP scope for internet-facing resources
      PoolDepth: 0
      IsDefault: true
      AddressFamily: ipv4
    DependsOn: IPAM

  PrivateScope:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamScopeId: !GetAtt IPAM.DefaultResourceDiscoveryId
      Description: Default private IP scope for internal resources
      PoolDepth: 0
      IsDefault: true
      AddressFamily: ipv4
    DependsOn: IPAM

Outputs:
  IPAMArn:
    Description: ARN of the created IPAM
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IPAM-ARN"

  IPAMId:
    Description: ID of the created IPAM
    Value: !Ref IPAM
    Export:
      Name: !Sub "${AWS::StackName}-IPAM-ID"

  PublicScopeId:
    Description: ID of the default public IP scope
    Value: !Ref PublicScope
    Export:
      Name: !Sub "${AWS::StackName}-Public-Scope-ID"

  PrivateScopeId:
    Description: ID of the default private IP scope
    Value: !Ref PrivateScope
    Export:
      Name: !Sub "${AWS::StackName}-Private-Scope-ID"