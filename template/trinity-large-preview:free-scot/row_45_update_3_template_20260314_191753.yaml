AWSTemplateFormatVersion: '2010-09-09'

Resources:
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: FirehoseErrorLogStream

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonKinesisFirehoseServiceRolePolicy

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !Sub 'arn:aws:s3:::${AWS::AccountId}-firehose-test'
        Prefix: 'firehose/'
        ErrorOutputPrefix: 'errors/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: !Ref FirehoseLogStream
        ProcessingConfiguration:
          Enabled: true
          Processors:
            - Type: Lambda
              Parameters:
                - ParameterName: LambdaArn
                  ParameterValue: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:firehose-processor'
        RoleARN: !GetAtt FirehoseRole.Arn

Outputs:
  FirehoseStreamArn:
    Description: The ARN of the Firehose delivery stream
    Value: !GetAtt FirehoseStream.Arn