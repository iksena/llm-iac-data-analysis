AWSTemplateFormatVersion: '2010-09-09'
Description: URL-to-PNG Screenshot Service with Auto Scaling and Load Testing

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key
  InstanceType:
    Type: String
    Description: EC2 instance type for worker nodes
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t2.medium
    ConstraintDescription: Please choose a valid instance type.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ScreenshotService-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ScreenshotService-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone:
        Fn::Select:
          - 0
          Fn::GetAZs: !Ref AWS::Region
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotService-Public1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:
        Fn::Select:
          - 1
          Fn::GetAZs: !Ref AWS::Region
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ScreenshotService-Public2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone:
        Fn::Select:
          - 0
          Fn::GetAZs: !Ref AWS::Region
      Tags:
        - Key: Name
          Value: ScreenshotService-Private1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone:
        Fn::Select:
          - 1
          Fn::GetAZs: !Ref AWS::Region
      Tags:
        - Key: Name
          Value: ScreenshotService-Private2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ScreenshotService-PublicRT

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub screenshot-service-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: ScreenshotService-S3Bucket

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt EC2Role.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub ${S3Bucket.Arn}/*

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Name
          Value: ScreenshotService-SQS

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSQSFullAccess
      Policies:
        - PolicyName: ScreenshotServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub ${S3Bucket.Arn}/*
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
      Tags:
        - Key: Name
          Value: ScreenshotService-EC2Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for screenshot workers
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ScreenshotService-EC2SG

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: ScreenshotService-LT
      LaunchTemplateData:
        ImageId:
          Fn::ImportValue:
            Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Name: !Ref EC2InstanceProfile
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y chromium-browser python3
            pip3 install boto3
            # Install screenshot script
            cat > /usr/local/bin/screenshot-worker.py << 'EOF'
            import boto3
            import subprocess
            import os
            import time

            def process_message(message):
                try:
                    body = message.body
                    url = body.get('url')
                    if not url:
                        return False

                    timestamp = int(time.time())
                    filename = f"screenshot-{timestamp}.png"
                    filepath = f"/tmp/{filename}"

                    # Take screenshot using Chromium
                    subprocess.run([
                        'chromium-browser',
                        '--headless',
                        '--disable-gpu',
                        '--screenshot',
                        '--window-size=1920,1080',
                        url,
                        '--virtual-time-budget=10000'
                    ], capture_output=True, timeout=30)

                    # Move screenshot to correct location
                    if os.path.exists('/tmp/screenshot.png'):
                        os.rename('/tmp/screenshot.png', filepath)

                        # Upload to S3
                        s3 = boto3.client('s3')
                        s3.upload_file(filepath, os.environ['S3_BUCKET'], filename)
                        os.remove(filepath)
                        return True
                except Exception as e:
                    print(f"Error processing message: {e}")
                    return False

            if __name__ == "__main__":
                sqs = boto3.client('sqs')
                queue_url = os.environ['SQS_QUEUE_URL']

                while True:
                    try:
                        response = sqs.receive_message(
                            QueueUrl=queue_url,
                            MaxNumberOfMessages=1,
                            VisibilityTimeout=300,
                            WaitTimeSeconds=10
                        )
                        if 'Messages' in response:
                            for message in response['Messages']:
                                if process_message(message):
                                    sqs.delete_message(
                                        QueueUrl=queue_url,
                                        ReceiptHandle=message['ReceiptHandle']
                                    )
                    except Exception as e:
                        print(f"Error in main loop: {e}")
                        time.sleep(5)
            EOF
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ScreenshotService-Worker

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      TargetGroupARNs: []
      Tags:
        - Key: Name
          Value: ScreenshotService-ASG
          PropagateAtLaunch: true

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      PolicyName: ScreenshotService-ScaleUp
      AutoScalingGroupName: !Ref AutoScalingGroup
      ScalingAdjustment: 1
      AdjustmentType: ChangeInCapacity
      Cooldown: 300

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      PolicyName: ScreenshotService-ScaleDown
      AutoScalingGroupName: !Ref AutoScalingGroup
      ScalingAdjustment: -1
      AdjustmentType: ChangeInCapacity
      Cooldown: 300

  QueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ScreenshotService-QueueDepthHigh
      AlarmDescription: Trigger scale-up when queue depth exceeds 10
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SQSQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy

  QueueDepthLowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ScreenshotService-QueueDepthLow
      AlarmDescription: Trigger scale-down when queue depth is below 2
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt SQSQueue.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy

  LoadTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y python3
          pip3 install boto3
          # Install load test script
          cat > /usr/local/bin/load-test.py << 'EOF'
          import boto3
          import random
          import time

          def generate_test_urls():
              base_urls = [
                  'https://www.google.com',
                  'https://www.amazon.com',
                  'https://www.github.com',
                  'https://www.wikipedia.org',
                  'https://www.reddit.com'
              ]
              return [random.choice(base_urls) for _ in range(10)]

          if __name__ == "__main__":
              sqs = boto3.client('sqs')
              queue_url = os.environ['SQS_QUEUE_URL']

              while True:
                  try:
                      urls = generate_test_urls()
                      for url in urls:
                          message = {
                              'url': url
                          }
                          sqs.send_message(
                              QueueUrl=queue_url,
                              MessageBody=str(message)
                          )
                      time.sleep(60)
                  except Exception as e:
                      print(f"Error in load test: {e}")
                      time.sleep(30)
          EOF
      Tags:
        - Key: Name
          Value: ScreenshotService-LoadTest

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
  S3Bucket:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket
  SQSQueueURL:
    Description: SQS Queue URL
    Value: !Ref SQSQueue
  LoadTestInstance:
    Description: Load Test Instance ID
    Value: !Ref LoadTestInstance