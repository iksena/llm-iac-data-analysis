AWSTemplateFormatVersion: '2010-09-09'
Description: 'EFS File System with Monitoring and Automated Backups'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be created
    Default: vpc-00000000000000000
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of Subnet IDs for EFS mount targets
    Default: subnet-00000000000000000
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: List of Security Group IDs for EFS access
    Default: sg-00000000000000000
  BackupSchedule:
    Type: String
    Description: CRON expression for backup schedule (e.g., 'cron(0 0 * * ? *)' for daily)
    Default: 'cron(0 0 * * ? *)'
  BackupVaultName:
    Type: String
    Description: Name of the backup vault
    Default: efs-backup-vault
  EnableBackups:
    Type: String
    Description: Enable automated backups
    AllowedValues: ['true', 'false']
    Default: 'true'

Resources:
  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Select [0, !Ref SecurityGroupIds]

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      BackupPolicy:
        Status: !Ref EnableBackups

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  CloudWatchAlarmIO:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for EFS IO Burst Credit Balance
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000000000
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  CloudWatchAlarmThroughput:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm for EFS Throughput
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarm Topic
      Subscription:
        - Protocol: email
          Endpoint: admin@example.com

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Ref BackupVaultName
      EncryptionKeyArn: !GetAtt BackupKey.Arn

  BackupKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for EFS Backups
      EnableKeyRotation: true

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: EFSBackupPlan
        Rules:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: !Ref BackupSchedule
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      SelectionName: EFSBackupSelection
      IamRoleArn: !GetAtt BackupRole.Arn
      Resources:
        - !Sub 'arn:${AWS::Partition}:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}'

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

Outputs:
  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  EFSDNSName:
    Description: EFS DNS Name
    Value: !Sub '${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com'
  CloudWatchAlarmIOArn:
    Description: CloudWatch Alarm ARN for IO Burst Credit Balance
    Value: !Ref CloudWatchAlarmIO
  CloudWatchAlarmThroughputArn:
    Description: CloudWatch Alarm ARN for Throughput
    Value: !Ref CloudWatchAlarmThroughput
  BackupVaultArn:
    Description: Backup Vault ARN
    Value: !Ref BackupVault