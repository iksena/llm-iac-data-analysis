AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled automation workflow using EventBridge Scheduler and AWS Systems Manager (SSM).

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: default-key-pair

Resources:
  # Linux EC2 Instance
  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: true

  # Windows EC2 Instance
  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: HelloWorld
          Value: true

  # SSM Document
  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '2.2'
        description: SSM document for cross-platform commands
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: linuxStep
            inputs:
              runCommand:
                - echo "Hello World!"
          - action: aws:runPowerShellScript
            name: windowsStep
            inputs:
              runCommand:
                - Write-Host "Hello World!"

  # SSM State Manager Association
  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - true
      ScheduleExpression: rate(15 minutes)

  # EventBridge Schedule
  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: SSMSchedule
      Description: Schedule to trigger SSM Association
      FlexibleTimeWindow:
        Mode: OFF
      ScheduleExpression: rate(15 minutes)
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:association/${SSMAssociation}'
        RoleArn: !GetAtt EventBridgeRole.Arn

  # IAM Role for EC2 Instances
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  # IAM Role for EventBridge
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - scheduler.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: SSMInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'

  # S3 Bucket for Logs
  LogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${LogBucket}/*'

Outputs:
  LinuxInstanceId:
    Description: ID of the Linux EC2 instance
    Value: !Ref LinuxInstance
  WindowsInstanceId:
    Description: ID of the Windows EC2 instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket
  ScheduleArn:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn