AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template creating an S3 bucket with SNS notifications for object uploads'

Parameters:
  BucketName:
    Description: 'Name of the S3 bucket to create'
    Type: String
    AllowedPattern: '^[a-z0-9.-]{3,63}$'
    ConstraintDescription: 'Bucket name must be between 3 and 63 characters, lowercase, and can contain numbers, hyphens, and periods'
  
  TopicName:
    Description: 'Name of the SNS topic to create'
    Type: String
    AllowedPattern: '^[a-zA-Z0-9_-]{1,256}$'
    ConstraintDescription: 'Topic name can contain alphanumeric characters, hyphens, and underscores'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    DependsOn: SNSTopic
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !GetAtt SNSTopic.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${BucketName}'
      Topics:
        - !Ref SNSTopic

  BucketNotification:
    Type: AWS::S3::Bucket
    DependsOn: 
      - SNSTopicPolicy
      - S3Bucket
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        TopicConfigurations:
          - Event: 's3:ObjectCreated:*'
            Topic: !GetAtt SNSTopic.Arn

Outputs:
  S3BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket
  
  SNSTopicARN:
    Description: 'ARN of the created SNS topic'
    Value: !GetAtt SNSTopic.Arn