AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EC2ReadOnlyIAMRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole1
      Description: EC2 role with read-only IAM access
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  EC2ReadOnlyIAMRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole2
      Description: EC2 role with read-only IAM access
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess