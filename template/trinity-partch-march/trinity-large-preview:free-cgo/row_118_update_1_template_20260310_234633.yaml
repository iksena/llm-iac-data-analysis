AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-EventSourceQueue

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-EventPipeLogs
      RetentionInDays: 30

  APIDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: ZipCodeAPI
      Description: API destination for fetching location data from zippopotam.us
      EndpointConfiguration:
        InvocationEndpoint: https://api.zippopotam.us/us/
        HttpMethod: GET
      ConnectionArn: !GetAtt EventBridgeConnection.Arn

  EventBridgeConnection:
    Type: AWS::EventSchemas::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection to external API with API key
      Name: ZipCodeAPIConnection
      ApiKeyAuthParameters:
        ApiKeyName: x-api-key
        ApiKeyValue: !Ref APISecret

  EventBridgePipe:
    Type: AWS::EventSchemas::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-EventPipe
      Description: Pipe to enrich SQS messages with API data and log results
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SQSQueue.Arn
      Target:
        TargetType: CloudWatchLogs
        TargetParameters:
          LogGroup:
            LogGroupName: !Ref CloudWatchLogGroup
      Enrichment:
        EnrichmentType: ApiDestination
        EnrichmentParameters:
          ApiDestination:
            ApiDestinationArn: !GetAtt APIDestination.Arn
      RoleArn: !GetAtt EventBridgePipeRole.Arn

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - eventschema:GetSchema
                  - eventschema:DescribeSchema
                Resource: !GetAtt APIDestination.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudWatchLogGroup.Arn

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn