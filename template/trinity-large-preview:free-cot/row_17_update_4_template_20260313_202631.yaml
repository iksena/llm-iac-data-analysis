AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Billing Alarms with Multi-Threshold CloudWatch Alarms and SNS Notifications

Parameters:
  EmailAddress:
    Type: String
    Default: default@example.com
    Description: Email address to receive billing alerts (must be confirmed)
  Currency:
    Type: String
    Default: USD
    Description: Currency for billing metric (default: USD)

Resources:
  BillingAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWS Billing Alarms
      TopicName: AWS-Billing-Alarms-Topic

  BillingAlarmSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailAddress
      Protocol: email
      TopicArn: !Ref BillingAlarmTopic

  BillingAlarm5USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Monthly-Billing-Alarm-5USD
      AlarmDescription: Billing alarm for $5 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 5.0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: !Ref Currency

  BillingAlarm10USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Monthly-Billing-Alarm-10USD
      AlarmDescription: Billing alarm for $10 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 10.0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: !Ref Currency

  BillingAlarm20USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Monthly-Billing-Alarm-20USD
      AlarmDescription: Billing alarm for $20 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 20.0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: !Ref Currency

  BillingAlarm40USD:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: Monthly-Billing-Alarm-40USD
      AlarmDescription: Billing alarm for $40 threshold
      Namespace: AWS/Billing
      MetricName: EstimatedCharges
      Statistic: Maximum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 40.0
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref BillingAlarmTopic
      Dimensions:
        - Name: ServiceName
          Value: AWS
        - Name: Currency
          Value: !Ref Currency

Outputs:
  BillingAlarmTopicArn:
    Description: ARN of the billing alarm SNS topic
    Value: !Ref BillingAlarmTopic