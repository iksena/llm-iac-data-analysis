AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless environment with IAM role, S3 bucket, and EMR Serverless application

Resources:
  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EMRServerlessRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ssm.amazonaws.com
                - emr-serverless.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEMRServerlessProfile
      Policies:
        - PolicyName: EMRServerlessS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${EMRServerlessBucket}'
                  - !Sub 'arn:aws:s3:::${EMRServerlessBucket}/*'
        - PolicyName: EMRServerlessCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  EMRServerlessBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: emr-serverless-bucket
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: EMRServerlessApp
      Type: SPARK
      ReleaseLabel: emr-6.15.0
      InitialCapacity:
        Worker:
          WeightedCapacity: 2
      MaximumCapacity:
        Worker:
          WeightedCapacity: 10
      AutoStartConfig:
        Enabled: true
      AutoStopConfig:
        Enabled: true
        IdleTimeoutMinutes: 15
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: Default
      RoleArn: !GetAtt EMRServerlessRole.Arn
      Architecture: ARM64
      ImageConfiguration:
        ImageUri: emr-6.15.0-arm64

Outputs:
  EMRServerlessApplicationArn:
    Description: ARN of the EMR Serverless Application
    Value: !Ref EMRServerlessApplication
  EMRServerlessBucketName:
    Description: Name of the S3 bucket
    Value: !Ref EMRServerlessBucket
  EMRServerlessRoleArn:
    Description: ARN of the IAM Role
    Value: !GetAtt EMRServerlessRole.Arn