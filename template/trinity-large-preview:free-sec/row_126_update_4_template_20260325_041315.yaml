AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for REST API Gateway integrated with Amazon Kinesis Data Streams

Parameters:
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream
  RetentionPeriodHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours
  ApiName:
    Type: String
    Default: KinesisAPI
    Description: Name of the API Gateway
  StageName:
    Type: String
    Default: prod
    Description: Deployment stage name

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub ${AWS::StackName}-kinesis-stream
      ShardCount: !Ref ShardCount
      RetentionPeriodHours: !Ref RetentionPeriodHours

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-APIGatewayRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  APIGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Ref ApiName
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
        AllowHeaders:
          - Content-Type
          - Authorization

  PutRecordRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: PUT /record
      Target: !Join
        - '/'
        - - integrations
          - !Ref PutRecordIntegration

  PutRecordIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  PutRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: PUT /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref PutRecordsIntegration

  PutRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  GetRecordsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /records
      Target: !Join
        - '/'
        - - integrations
          - !Ref GetRecordsIntegration

  GetRecordsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  DescribeStreamRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref APIGateway
      RouteKey: GET /metadata
      Target: !Join
        - '/'
        - - integrations
          - !Ref DescribeStreamIntegration

  DescribeStreamIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref APIGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream
        - region: !Ref AWS::Region
      CredentialsArn: !GetAtt APIGatewayRole.Arn
      PayloadFormatVersion: '2.0'

  APIGatewayDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    Properties:
      ApiId: !Ref APIGateway
    DependsOn:
      - PutRecordRoute
      - PutRecordsRoute
      - GetRecordsRoute
      - DescribeStreamRoute

  APIGatewayStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref APIGateway
      DeploymentId: !Ref APIGatewayDeployment
      StageName: !Ref StageName

Outputs:
  APIGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${APIGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}
  KinesisStreamARN:
    Description: Kinesis Stream ARN
    Value: !GetAtt KinesisStream.Arn