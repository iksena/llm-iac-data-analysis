AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-EventSourceQueue

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-EnrichedLogs
      RetentionInDays: 30

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-PipesRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonPipesServiceRolePolicy
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
        - PolicyName: APIDestinationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !Sub arn:aws:events:${AWS::Region}:${AWS::AccountId}:apidestination/*
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-EnrichmentPipe
      Description: Enriches SQS messages with location data from zippopotam.us API
      Source:
        Type: SQS
        Parameters:
          QueueUrl: !GetAtt SQSQueue.QueueUrl
      Enrichment:
        Type: ApiDestination
        Parameters:
          ApiDestinationName: !Sub ${AWS::StackName}-ZipAPI
          InvocationHttpParameters:
            PathParameterValues:
              - !GetAtt SQSQueue.Arn
      Target:
        Type: CloudWatchLogs
        Parameters:
          LogGroup:
            LogGroupName: !Ref LogGroup
          InputTemplate: !Sub |
            {
              "originalMessage": <message>,
              "enrichedData": <enrichment>
            }
      RoleArn: !GetAtt PipesRole.Arn

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  PipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  LogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref LogGroup