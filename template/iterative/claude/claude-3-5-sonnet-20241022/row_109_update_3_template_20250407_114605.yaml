AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge to MongoDB API integration with DLQ support'

Parameters:
  MongoDBURL:
    Type: String
    Default: 'https://www.testanu.com'
    Description: 'MongoDB API endpoint URL'

  ApiKeyName:
    Type: String
    Default: 'test_name'
    Description: 'API Key Name for MongoDB authentication'
    NoEcho: true

  ApiKeyValue:
    Type: String
    Default: 'test_value'
    Description: 'API Key Value for MongoDB authentication'
    NoEcho: true

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-mongodb-bus'

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 300

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  MongoDBConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: 'Connection to MongoDB API'
      Name: !Sub '${AWS::StackName}-mongodb-connection'
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: !Ref ApiKeyName
          ApiKeyValue: !Ref ApiKeyValue

  MongoDBApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt MongoDBConnection.Arn
      Description: 'MongoDB API Destination'
      InvocationEndpoint: !Ref MongoDBURL
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      Description: 'Route events to MongoDB API'
      State: ENABLED
      EventPattern:
        source:
          - "custom.mongodb"
      Targets:
        - Id: MongoDBTarget
          Arn: !GetAtt MongoDBApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: 'Event Bus ARN'
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: 'MongoDB API Destination ARN'
    Value: !GetAtt MongoDBApiDestination.Arn

  DeadLetterQueueUrl:
    Description: 'Dead Letter Queue URL'
    Value: !Ref DeadLetterQueue

  ConnectionArn:
    Description: 'MongoDB Connection ARN'
    Value: !GetAtt MongoDBConnection.Arn