AWSTemplateFormatVersion: '2010-09-01'
Description: 'Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where resources will be deployed
  
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for compute resources
    
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for compute resources
    
  EnvironmentName:
    Type: String
    Default: 'prod'
    Description: Environment name for resource naming
    
  ContainerImage:
    Type: String
    Description: URI of the container image to run
    
  MaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum vCPUs for the compute environment
    
Resources:
  # SQS Queue
  EventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-event-queue
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventQueueDLQ.Arn
        maxReceiveCount: 3

  EventQueueDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-event-queue-dlq
      MessageRetentionPeriod: 1209600

  # Security Group
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # IAM Roles
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  EcsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  EcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EcsInstanceRole

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  PipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipesPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EventQueue.Arn
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: 
                  - !GetAtt BatchJobQueue.Arn
                  - !Ref BatchJobDefinition

  # Batch Resources
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeEnvironmentName: !Sub ${EnvironmentName}-compute-env
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MaxvCpus: !Ref MaxvCpus
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        Subnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        InstanceRole: !Ref EcsInstanceProfile
        InstanceTypes:
          - optimal

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub ${EnvironmentName}-job-queue
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Sub ${EnvironmentName}-job-definition
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Vcpus: 1
        Memory: 2048
        JobRoleArn: !GetAtt BatchJobRole.Arn
        ExecutionRoleArn: !GetAtt BatchJobRole.Arn

  # EventBridge Pipe
  EventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${EnvironmentName}-event-pipe
      RoleArn: !GetAtt PipesRole.Arn
      Source: !GetAtt EventQueue.Arn
      Target: !GetAtt BatchJobQueue.Arn
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: !Sub ${EnvironmentName}-job
      SourceParameters:
        FilterCriteria:
          Filters:
            - Pattern: '{"eventType": ["OrderCreated"]}'

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref EventQueue
    
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt EventQueue.Arn
    
  JobQueueArn:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn
    
  JobDefinitionArn:
    Description: ARN of the Batch job definition
    Value: !Ref BatchJobDefinition