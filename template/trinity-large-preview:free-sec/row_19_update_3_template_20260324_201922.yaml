AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::EventBridge::EventBus
    Properties:
      Name: CustomEventBus
      Description: Custom event bus for routing events to external API

  ApiConnection:
    Type: AWS::EventBridge::Connection
    Properties:
      Name: ApiConnection
      Description: Connection with API key authentication
      AuthorizationType: API_KEY
      ApiKeyAuthConfig:
        ApiKeyName: X-API-Key
        ApiKeyValue: '{{resolve:secretsmanager:MyApiKeySecret}}'

  ApiDestination:
    Type: AWS::EventBridge::ApiDestination
    Properties:
      Name: ApiDestination
      Description: API destination for external webhook
      ConnectionArn: !GetAtt ApiConnection.Arn
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5
      EventBusName: !Ref CustomEventBus

Outputs:
  EventBusArn:
    Description: ARN of the custom event bus
    Value: !GetAtt CustomEventBus.Arn
  ConnectionArn:
    Description: ARN of the API connection
    Value: !GetAtt ApiConnection.Arn
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !GetAtt ApiDestination.Arn