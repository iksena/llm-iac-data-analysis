AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an encrypted One Zone file system in the us-east-1a Availability Zone

Parameters:
  FileSystemName:
    Type: String
    Default: MyEFSFileSystem
    Description: Name of the file system
  ThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: The throughput mode for the file system
  ProvisionedThroughputInMibps:
    Type: Number
    Default: 0
    Description: The amount of throughput, in MiB/s, that you want to provision for the file system. Required if ThroughputMode is provisioned.
  Encrypted:
    Type: String
    Default: true
    AllowedValues:
      - true
      - false
    Description: Whether to enable encryption for the file system
  KmsKeyId:
    Type: String
    Default: ''
    Description: The ID of the KMS key to use for encryption. Leave blank to use the default managed key.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: !Select [0, !GetAZs '']
    Description: The ID of the subnet to create the mount target in
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: !Ref MySecurityGroup
    Description: The ID of the security group to associate with the mount target

Resources:
  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount target
      VpcId: !Ref VpcId

  MyEFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If [IsProvisionedThroughput, !Ref ProvisionedThroughputInMibps, !Ref AWS::NoValue]
      Encrypted: !Ref Encrypted
      KmsKeyId: !If [HasKmsKeyId, !Ref KmsKeyId, !Ref AWS::NoValue]
      FileSystemTags:
        - Key: Name
          Value: !Ref FileSystemName

  MyEFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref MyEFSFileSystem
      SubnetId: !Ref SubnetId
      SecurityGroups:
        - !Ref MySecurityGroup

Conditions:
  IsProvisionedThroughput: !And
    - !Equals [!Ref ThroughputMode, provisioned]
    - !Not [!Equals [!Ref ProvisionedThroughputInMibps, 0]]
  HasKmsKeyId: !Not [!Equals [!Ref KmsKeyId, '']]

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref MyEFSFileSystem
  FileSystemArn:
    Description: The ARN of the file system
    Value: !GetAtt MyEFSFileSystem.Arn
  MountTargetId:
    Description: The ID of the mount target
    Value: !Ref MyEFSMountTarget