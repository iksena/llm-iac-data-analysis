AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MySNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: MyNotificationTopic
  MySNSEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MySNSTopic
      Protocol: email
      Endpoint: test@test.com
      # Note: This will create a subscription in 'PendingConfirmation' state
      # The recipient must confirm the subscription via email
Outputs:
  TopicARN:
    Description: SNS Topic ARN
    Value: !Ref MySNSTopic