AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a risk management system with Lambda, DynamoDB, and SNS

Parameters:
  LambdaFunctionName1:
    Type: String
    Default: RiskManagementFunction1
  LambdaFunctionName2:
    Type: String
    Default: RiskManagementFunction2
  DynamoDBTableName:
    Type: String
    Default: RiskManagementTable
  SNSTopicName:
    Type: String
    Default: RiskManagementTopic
  IAMRoleName:
    Type: String
    Default: RiskManagementRole

Resources:
  RiskManagementIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref IAMRoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTableName}'
        - PolicyName: SNSTopicPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskManagementSNSTopic

  RiskManagementDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S

  RiskManagementLambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName1
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RiskManagementIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('${DynamoDBTableName}')

          def handler(event, context):
              # Lambda function logic here
              return {
                  'statusCode': 200,
                  'body': json.dumps('Risk Management Function 1 executed successfully')
              }

  RiskManagementLambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName2
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RiskManagementIAMRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          from boto3.dynamodb.conditions import Key

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table('${DynamoDBTableName}')

          def handler(event, context):
              # Lambda function logic here
              return {
                  'statusCode': 200,
                  'body': json.dumps('Risk Management Function 2 executed successfully')
              }

  RiskManagementSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  RiskManagementSNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskManagementSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskManagementSNSTopic

Outputs:
  LambdaFunction1ARN:
    Description: ARN of the first Lambda function
    Value: !GetAtt RiskManagementLambdaFunction1.Arn
  LambdaFunction2ARN:
    Description: ARN of the second Lambda function
    Value: !GetAtt RiskManagementLambdaFunction2.Arn
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref RiskManagementDynamoDBTable
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref RiskManagementSNSTopic