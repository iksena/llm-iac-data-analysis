AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy a secure static website on S3 with CloudFront CDN integration.

Parameters:
  DomainName:
    Type: String
    Description: The domain name for the CloudFront distribution.
  CertificateArn:
    Type: String
    Description: The ARN of the ACM certificate for HTTPS.

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      AccessControl: Private

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${WebsiteBucket}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: S3AccessControl
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: 
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref CustomCachePolicy
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
        DefaultRootObject: index.html

  CustomCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CustomCachePolicy
        DefaultTTL: 60
        MinTTL: 0
        MaxTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::${WebsiteBucket}/*'

  BucketInitFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              s3 = boto3.client('s3')
              bucket = event['ResourceProperties']['BucketName']
              if event['RequestType'] == 'Create':
                  s3.put_object(Bucket=bucket, Key='index.html', Body='<html><body><h1>Welcome to the Static Website</h1></body></html>', ContentType='text/html')
              elif event['RequestType'] == 'Delete':
                  bucket_objects = s3.list_objects_v2(Bucket=bucket)
                  if 'Contents' in bucket_objects:
                      for obj in bucket_objects['Contents']:
                          s3.delete_object(Bucket=bucket, Key=obj['Key'])
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  BucketInitCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt BucketInitFunction.Arn
      BucketName: !Ref WebsiteBucket

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket hosting the website.
    Value: !Ref WebsiteBucket

  CloudFrontDistributionId:
    Description: ID of the CloudFront distribution.
    Value: !Ref CloudFrontDistribution

  CloudFrontDomainName:
    Description: Domain name of the CloudFront distribution.
    Value: !GetAtt CloudFrontDistribution.DomainName

  LambdaFunctionArn:
    Description: ARN of the Lambda function used for bucket initialization.
    Value: !GetAtt BucketInitFunction.Arn