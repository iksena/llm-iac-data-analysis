AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time data ingestion pipeline with Kinesis Data Stream, Kinesis Data Firehose, and S3'

Parameters:
  Environment:
    Type: String
    Description: 'Environment name (dev/stage/prod)'
    Default: 'dev'
    AllowedValues: ['dev', 'stage', 'prod']
  
  BufferIntervalInSeconds:
    Type: Number
    Description: 'Buffer interval in seconds for Firehose'
    Default: 60
    MinValue: 60
    MaxValue: 900
  
  BufferSizeInMBs:
    Type: Number
    Description: 'Buffer size in MBs for Firehose'
    Default: 5
    MinValue: 1
    MaxValue: 128

Resources:
  KinesisDataStream:
    Type: 'AWS::Kinesis::Stream'
    Properties:
      Name: !Sub '${Environment}-data-ingestion-stream'
      ShardCount: 1
      RetentionPeriodHours: 24

  DataBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${Environment}-data-ingestion-bucket-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: 'DeleteOldData'
            Status: Enabled
            ExpirationInDays: 365

  FirehoseRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${Environment}-FirehoseDeliveryRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'firehose.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/service-role/'
      Policies:
        - PolicyName: 'FirehoseS3AccessPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:AbortMultipartUpload'
                  - 's3:GetBucketLocation'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:PutObject'
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 'kinesis:DescribeStream'
                  - 'kinesis:GetShardIterator'
                  - 'kinesis:GetRecords'
                Resource: !GetAtt KinesisDataStream.Arn
              - Effect: Allow
                Action:
                  - 'kms:Decrypt'
                  - 'kms:GenerateDataKey'
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:ViaService': 's3.amazonaws.com'
                  StringLike:
                    'kms:EncryptionContext:aws:s3:arn': !Sub '${DataBucket.Arn}/*'

  FirehoseDeliveryStream:
    Type: 'AWS::KinesisFirehose::DeliveryStream'
    Properties:
      DeliveryStreamName: !Sub '${Environment}-data-delivery-stream'
      DeliveryStreamType: 'KinesisStreamAsSource'
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisDataStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        BufferingHints:
          IntervalInSeconds: !Ref BufferIntervalInSeconds
          SizeInMBs: !Ref BufferSizeInMBs
        CompressionFormat: 'GZIP'
        Prefix: 'data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        ErrorOutputPrefix: 'errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/'
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: '/aws/kinesisfirehose/DeliveryStreamLogs'
          LogStreamName: !Sub '${Environment}-data-delivery-stream-logs'

Outputs:
  KinesisStreamARN:
    Description: 'ARN of the Kinesis Data Stream'
    Value: !GetAtt KinesisDataStream.Arn
  
  FirehoseDeliveryStreamARN:
    Description: 'ARN of the Kinesis Data Firehose Delivery Stream'
    Value: !GetAtt FirehoseDeliveryStream.Arn
  
  S3BucketName:
    Description: 'Name of the S3 bucket for data storage'
    Value: !Ref DataBucket
  
  FirehoseRoleARN:
    Description: 'ARN of the IAM role for Firehose'
    Value: !GetAtt FirehoseRole.Arn