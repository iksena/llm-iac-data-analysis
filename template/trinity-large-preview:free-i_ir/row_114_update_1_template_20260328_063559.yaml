AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange (B2BI) pipeline for transforming EDI X12_214 documents into JSON

Resources:
  B2BIPartnerProfile:
    Type: AWS::B2BI::PartnerProfile
    Properties:
      Name: BusinessPartner
      BusinessContact:
        Name: John Doe
        Email: john.doe@example.com
        Phone: "+1-555-0123"

  EDITransformer:
    Type: AWS::B2BI::Transformer
    Properties:
      Name: X12_214_to_JSON
      MappingLogic: EDI X12_214 to JSON transformation rules
      InputFormat: EDI
      OutputFormat: JSON

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: edi-x12-214-input
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: edi-x12-214-output
      AccessControl: Private
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  B2BIPipeline:
    Type: AWS::B2BI::Pipeline
    Properties:
      Name: EDI-X12-214-Transformer
      Description: Pipeline for transforming EDI X12_214 documents to JSON
    DependsOn:
      - B2BIPartnerProfile
      - EDITransformer
      - InputBucket
      - OutputBucket

Outputs:
  InputBucketName:
    Description: Name of the input S3 bucket for EDI files
    Value: !Ref InputBucket
  OutputBucketName:
    Description: Name of the output S3 bucket for transformed JSON
    Value: !Ref OutputBucket