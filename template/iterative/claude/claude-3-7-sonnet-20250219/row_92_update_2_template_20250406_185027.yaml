AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instance with Nginx and SSM logging to S3'

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t3.micro
      - t3.small
    ConstraintDescription: Must be a valid EC2 instance type.

  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance (optional)
    Type: String
    Default: ''
    
  S3BucketNamePrefix:
    Description: Prefix for the S3 bucket to store SSM logs (will be appended with a unique ID)
    Type: String
    Default: ssm-logs-
    
  VpcId:
    Description: VPC where the EC2 instance will be launched
    Type: AWS::EC2::VPC::Id
    
  SubnetId:
    Description: Subnet where the EC2 instance will be launched
    Type: AWS::EC2::Subnet::Id

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-east-2:
      AMI: ami-02d1e544b84bf7502
    us-west-1:
      AMI: ami-0d9858aa3c6322f73
    us-west-2:
      AMI: ami-098e42ae54c764c35
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d
    eu-central-1:
      AMI: ami-0a1ee2fb28fe05df3
    ap-northeast-1:
      AMI: ami-0ab0bbbd329f565e6
    ap-southeast-1:
      AMI: ami-0f62aafc6efe8fd7b
    ap-southeast-2:
      AMI: ami-0186908e2fdeea8f3

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: SSM Logging Bucket
        - Key: Purpose
          Value: Nginx SSM Logs

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub '${LoggingBucket.Arn}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Effect: Allow
            Principal:
              AWS: !GetAtt EC2Role.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt LoggingBucket.Arn
              - !Sub '${LoggingBucket.Arn}/*'

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: EC2-SSM-Role
        - Key: Purpose
          Value: Nginx Automation

  EC2S3LoggingPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: EC2S3LoggingPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt LoggingBucket.Arn
              - !Sub '${LoggingBucket.Arn}/*'
      Roles:
        - !Ref EC2Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server with HTTP access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS access
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: WebServerSecurityGroup
        - Key: Purpose
          Value: Nginx Web Server

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: HasKeyName
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH access
      Tags:
        - Key: Name
          Value: SSHSecurityGroup
        - Key: Purpose
          Value: SSH Access

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref SubnetId
      SecurityGroupIds: !If 
        - HasKeyName
        - [!Ref WebServerSecurityGroup, !Ref SSHSecurityGroup]
        - [!Ref WebServerSecurityGroup]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: NginxWebServer
        - Key: Purpose
          Value: Web Hosting
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system packages
          yum update -y
          # Install SSM agent (already installed on Amazon Linux 2, but ensure it's running)
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  NginxInstallAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LoggingBucket
          OutputS3KeyPrefix: logs/nginx-install
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref WebServerInstance
      Parameters:
        commands:
          - |
            #!/bin/bash
            # Install Nginx
            amazon-linux-extras install nginx1 -y
            
            # Create a custom index page
            cat > /usr/share/nginx/html/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
                <title>Welcome to Nginx on Amazon Linux 2</title>
                <style>
                    body {
                        width: 35em;
                        margin: 0 auto;
                        font-family: Tahoma, Verdana, Arial, sans-serif;
                    }
                </style>
            </head>
            <body>
                <h1>Welcome to Nginx on Amazon Linux 2!</h1>
                <p>If you see this page, the nginx web server is successfully installed and
                working.</p>
                <p>This instance was deployed using AWS CloudFormation and configured with AWS Systems Manager.</p>
            </body>
            </html>
            EOF
            
            # Configure Nginx to start on boot and start it now
            systemctl enable nginx
            systemctl start nginx
            
            # Log the status
            echo "Nginx installation completed at $(date)"
            systemctl status nginx

Outputs:
  WebServerInstanceId:
    Description: ID of the EC2 instance
    Value: !Ref WebServerInstance
    
  WebServerPublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicIp
    
  WebServerPublicDNS:
    Description: Public DNS name of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicDnsName
    
  WebsiteURL:
    Description: URL to access the Nginx web server
    Value: !Sub http://${WebServerInstance.PublicDnsName}
    
  LoggingBucketName:
    Description: Name of the S3 bucket storing SSM logs
    Value: !Ref LoggingBucket
    
  LoggingBucketPath:
    Description: Path to the SSM logs in the S3 bucket
    Value: !Sub s3://${LoggingBucket}/logs/