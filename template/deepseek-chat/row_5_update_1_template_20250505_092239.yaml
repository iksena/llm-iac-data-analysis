AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for creating a DynamoDB table to track Artist concerts and ticket sales

Parameters:
  TableName:
    Description: Name of the DynamoDB table
    Type: String
    Default: ArtistConcertsTable
    AllowedPattern: ^[a-zA-Z0-9_.-]+$
    ConstraintDescription: Table name can only contain alphanumeric characters, dots, hyphens, and underscores

  BillingMode:
    Description: DynamoDB billing mode
    Type: String
    Default: PROVISIONED
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Description: Read capacity units when using PROVISIONED mode
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000

  WriteCapacityUnits:
    Description: Write capacity units when using PROVISIONED mode
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 40000

  EnablePointInTimeRecovery:
    Description: Enable point-in-time recovery for the table
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  EnableStreaming:
    Description: Enable DynamoDB Streams
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    ConstraintDescription: Must be either true or false

Resources:
  ArtistConcertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
        - AttributeName: TicketSales
          AttributeType: N
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: !Ref BillingMode
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !Ref EnablePointInTimeRecovery
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
        StreamEnabled: !Ref EnableStreaming
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: Track artist concerts and ticket sales

Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref ArtistConcertsTable
    Export:
      Name: !Sub "${AWS::StackName}-TableName"

  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt ArtistConcertsTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-TableArn"

  StreamArn:
    Description: ARN of the DynamoDB Stream (if enabled)
    Value: !If [EnableStreaming, !GetAtt ArtistConcertsTable.StreamArn, !Ref "AWS::NoValue"]
    Export:
      Name: !Sub "${AWS::StackName}-StreamArn"