AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready CloudFormation template to enable AWS Security Hub with default security standards and consolidated control findings.
Resources:
  SecurityHubHub:
    Type: AWS::SecurityHub::Hub
    Properties: {}
  
  OrganizationConfiguration:
    Type: AWS::SecurityHub::OrganizationConfiguration
    Properties:
      AutoEnable: true

  StandardsSubscriptionCIS:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/cis-aws-foundations-benchmark/v/1.2.0

  StandardsSubscriptionAWSFSBP:
    Type: AWS::SecurityHub::StandardsSubscription
    Properties:
      StandardsArn: arn:aws:securityhub:::ruleset/aws-foundational-security-best-practices/v/1.0.0

Outputs:
  SecurityHubHubArn:
    Description: "ARN of the enabled AWS Security Hub Hub"
    Value: !GetAtt SecurityHubHub.Arn
  OrganizationConfigurationStatus:
    Description: "Status of the Security Hub Organization Configuration"
    Value: "AutoEnable is set to true"
  CISStandardSubscription:
    Description: "Subscription to CIS AWS Foundations Benchmark standard"
    Value: !Ref StandardsSubscriptionCIS
  AWSFSBPStandardSubscription:
    Description: "Subscription to AWS Foundational Security Best Practices standard"
    Value: !Ref StandardsSubscriptionAWSFSBP