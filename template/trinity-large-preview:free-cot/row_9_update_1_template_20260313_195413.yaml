AWSTemplateFormatVersion: '2010-09-09'
Description: Encrypted One Zone EFS File System in us-east-1a

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  SubnetCidrBlock:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet

  AvailabilityZone:
    Type: String
    Default: !Select [0, !GetAZs 'us-east-1']
    Description: Availability Zone for the One Zone deployment

  KmsKeyId:
    Type: String
    Default: alias/aws/elasticfilesystem
    Description: KMS key ID for encryption (default is AWS managed key)

  FileSystemPerformanceMode:
    Type: String
    Default: generalPurpose
    AllowedValues:
      - generalPurpose
      - maxIO
    Description: Performance mode for the file system

  FileSystemThroughputMode:
    Type: String
    Default: bursting
    AllowedValues:
      - bursting
      - provisioned
    Description: Throughput mode for the file system

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: EFS-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: EFS-IGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: EFS-RouteTable

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: EFS-Subnet

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Security group for EFS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EFS-SecurityGroup

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref FileSystemPerformanceMode
      ThroughputMode: !Ref FileSystemThroughputMode
      Encrypted: true
      KmsKeyId: !Ref KmsKeyId
      AvailabilityZoneName: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: Encrypted-OneZone-FileSystem

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref Subnet
      SecurityGroups:
        - !Ref SecurityGroup

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref FileSystem
    Export:
      Name: !Sub '${AWS::StackName}-FileSystemId'

  MountTargetId:
    Description: The ID of the mount target
    Value: !Ref MountTarget
    Export:
      Name: !Sub '${AWS::StackName}-MountTargetId'

  FileSystemDNSName:
    Description: The DNS name of the file system
    Value: !GetAtt FileSystem.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-FileSystemDNSName'