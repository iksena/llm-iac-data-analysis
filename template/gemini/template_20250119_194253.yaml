AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: A sample Lambda function.
Resources:
  MyLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs16.x
      CodeUri: s3://your-s3-bucket/your-lambda-code.zip
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /hello
            Method: get
Outputs:
  MyLambdaFunctionArn:
    Value: !GetAtt MyLambdaFunction.Arn
    Description: The ARN of the Lambda function
  MyLambdaFunctionInvokeUrl:
    Value: !Sub https://${MyLambdaFunction.Arn}.lambda-url.us-east-1.amazonaws.com
    Description: The invoke URL of the Lambda function
