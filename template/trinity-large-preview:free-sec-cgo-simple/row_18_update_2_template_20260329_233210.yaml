AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${AWS::StackName}-dynamodb-events"

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBridgeBus
      EventPattern:
        source:
          - "aws.dynamodb"
        detail:
          eventName:
            - "MODIFY"
          userIdentity:
            principalId:
              - "dynamodb.amazonaws.com"
      Targets:
        - Arn: !GetAtt EventBridgeBus.Arn
          Id: "dynamodb-target"
          InputTransformer:
            InputPathsMap:
              avatarUrl: "$.detail.dynamodb.Keys.avatarUrl.S"
            InputTemplate: |
              {
                "source": "com.example.user.avatar",
                "detailType": "UserAvatarUpdated",
                "detail": {
                  "avatarUrl": <avatarUrl>
                }
              }

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              for record in event['Records']:
                  if 'avatarUrl' in record['dynamodb'].get('NewImage', {}):
                      avatar_url = record['dynamodb']['NewImage']['avatarUrl']['S']
                      if avatar_url.endswith('.png'):
                          print(f"PNG avatar detected: {avatar_url}")
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LambdaFunction.Arn
      Principal: dynamodb.amazonaws.com
      SourceArn: !GetAtt DynamoDBTable.StreamArn

  LambdaEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt DynamoDBTable.StreamArn
      FunctionName: !GetAtt LambdaFunction.Arn
      StartingPosition: LATEST

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Bus Name
    Value: !Ref EventBridgeBus