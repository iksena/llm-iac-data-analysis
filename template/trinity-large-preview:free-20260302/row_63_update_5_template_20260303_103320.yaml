AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Amazon Aurora MySQL cluster with CloudWatch Logs integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the Aurora cluster will be deployed
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of two subnet IDs for multi-AZ deployment
  DatabaseName:
    Type: String
    Default: mydatabase
    Description: Name of the database to create in the cluster
  MasterUsername:
    Type: String
    Default: admin
    Description: Username for the master database user
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Password for the master database user
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  PreferredBackupWindow:
    Type: String
    Default: 03:00-04:00
    Description: Daily time range for backups in UTC

Resources:
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds: !Ref SubnetIds

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-sg

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.11.0
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt AuroraSecurityGroup.GroupId
      Port: 3306
      StorageEncrypted: true
      EnableCloudwatchLogsExports:
        - error
      EnableHttpEndpoint: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-cluster

  AuroraInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-instance-1

  AuroraInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-instance-2

Outputs:
  ClusterEndpoint:
    Description: Cluster endpoint for the Aurora cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Reader endpoint for the Aurora cluster
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address