AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  ETLJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: pythonshell
        PythonVersion: '3'
        ScriptLocation: !Sub s3://${ScriptsBucket}/gue_scripts/sample_convert.py
      Role: !GetAtt GlueServiceRole.Arn
      DefaultArguments:
        '--enable-continuous-cloudwatch-log': 'true'
        '--enable-continuous-log-filter': 'true'
      ExecutionProperty:
        MaxConcurrentRuns: 2
      GlueVersion: '4.0'
      MaxCapacity: 0.5
      Timeout: 60

Outputs:
  ScriptsBucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref ScriptsBucket
  ETLJobName:
    Description: Name of the Glue ETL job
    Value: !Ref ETLJob