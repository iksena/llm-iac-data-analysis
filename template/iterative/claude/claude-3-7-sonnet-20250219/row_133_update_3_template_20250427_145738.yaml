AWSTemplateFormatVersion: '2010-09-09'
Description: 'Web Server Environment with VPC, Subnet, Security Group, and EC2 instance running Apache and PHP'

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket containing the web content ZIP file
    
  S3KeyName:
    Type: String
    Description: Path to the ZIP file in the S3 bucket
    
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
    Description: EC2 instance type
    
  KeyName:
    Type: String
    Description: Name of an existing EC2 KeyPair to enable SSH access (optional)
    Default: ''
    
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    
  SubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the public subnet

Mappings:
  RegionToAmazonLinux2AMI:
    us-east-1:
      AMI: ami-0cff7528ff583bf9a
    us-east-2:
      AMI: ami-0ebc8f6f580a04647
    us-west-1:
      AMI: ami-008d8ed4bd7dc2485
    us-west-2:
      AMI: ami-0d593311db5abb72b
    eu-west-1:
      AMI: ami-0ea0f26a6d50850c5
    eu-central-1:
      AMI: ami-0a1ee2fb28fe05df3
    ap-northeast-1:
      AMI: ami-0218d08a1f9dac831
    ap-southeast-1:
      AMI: ami-0753e0e42b20e96e3
    ap-southeast-2:
      AMI: ami-0a38ff572a7520e45

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  # VPC and Networking Components
  WebServerVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref WebServerVPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref WebServerVPC
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref WebServerVPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  # Security Group
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      VpcId: !Ref WebServerVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServerSG

  SSHSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasKeyName
    Properties:
      GroupId: !Ref WebServerSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: 0.0.0.0/0

  # IAM Role for EC2 to access S3
  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Path: /

  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref WebServerRole

  # EC2 Instance
  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: InternetGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionToAmazonLinux2AMI, !Ref 'AWS::Region', AMI]
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      IamInstanceProfile: !Ref WebServerInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref WebServerSecurityGroup
          SubnetId: !Ref PublicSubnet
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system packages
          yum update -y
          
          # Install Apache, PHP, and other required packages
          amazon-linux-extras enable php7.4
          yum install -y httpd php php-mysqlnd unzip
          
          # Start and enable Apache service
          systemctl start httpd
          systemctl enable httpd
          
          # Create web directory if it doesn't exist
          mkdir -p /var/www/html/
          
          # Download web content from S3
          if aws s3 cp s3://${S3BucketName}/${S3KeyName} /tmp/webcontent.zip; then
            # Extract content to web root
            unzip -o /tmp/webcontent.zip -d /var/www/html/ || echo "Failed to unzip content"
            
            # Set proper permissions
            chown -R apache:apache /var/www/html/
            chmod -R 755 /var/www/html/
          else
            echo "Failed to download content from S3"
          fi
          
          # Create a simple info page if no content exists
          if [ ! -f /var/www/html/index.php ] && [ ! -f /var/www/html/index.html ]; then
            echo '<?php phpinfo(); ?>' > /var/www/html/index.php
            chown apache:apache /var/www/html/index.php
            chmod 644 /var/www/html/index.php
          fi
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-WebServer

Outputs:
  WebsiteURL:
    Description: URL for the website
    Value: !Sub http://${WebServerInstance.PublicDnsName}
    
  PublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp
    
  VpcId:
    Description: ID of the created VPC
    Value: !Ref WebServerVPC
    
  SubnetId:
    Description: ID of the created subnet
    Value: !Ref PublicSubnet
    
  SecurityGroupId:
    Description: ID of the created security group
    Value: !Ref WebServerSecurityGroup