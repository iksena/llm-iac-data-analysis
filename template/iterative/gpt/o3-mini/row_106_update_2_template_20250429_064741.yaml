AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production ready CloudFormation template that creates an S3 bucket with event-driven notifications
  to an SNS topic. When new objects are uploaded to the S3 bucket, an event is triggered to notify the SNS topic.

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3EventNotificationTopic"

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        TopicConfigurations:
          - Event: "s3:ObjectCreated:*"
            Topic: !GetAtt SNSTopic.TopicArn

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    DependsOn:
      - S3Bucket
      - SNSTopic
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: "AllowS3Publish"
            Effect: "Allow"
            Principal:
              Service: "s3.amazonaws.com"
            Action: "sns:Publish"
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !GetAtt S3Bucket.Arn
              StringEquals:
                aws:SourceAccount: !Ref "AWS::AccountId"

Outputs:
  SNSTopicARN:
    Description: "SNS Topic ARN for S3 notifications"
    Value: !GetAtt SNSTopic.TopicArn
  S3BucketName:
    Description: "S3 Bucket name"
    Value: !Ref S3Bucket