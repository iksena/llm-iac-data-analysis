AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon EFS file system along with an associated mount target.
  The file system is configured for a testing environment with shared storage in the us-east-1a availability zone.
  
Parameters:
  MountTargetSubnetId:
    Description: Provide a valid Subnet ID located in the us-east-1a availability zone for creating the EFS mount target.
    Type: AWS::EC2::Subnet::Id
    MinLength: "1"
  MountTargetSecurityGroupId:
    Description: Provide a valid Security Group ID to control access to the EFS mount target.
    Type: AWS::EC2::SecurityGroup::Id
    MinLength: "1"

Resources:
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_14_DAYS
      FileSystemTags:
        - Key: Name
          Value: EFS-Testing
        - Key: Environment
          Value: Testing
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref MountTargetSubnetId
      SecurityGroups:
        - !Ref MountTargetSecurityGroupId

Outputs:
  FileSystemId:
    Description: The ID of the created Amazon EFS file system.
    Value: !Ref EfsFileSystem
  MountTargetId:
    Description: The ID of the created EFS mount target.
    Value: !Ref EfsMountTarget