AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create AWS Glue resources for crawling CloudTrail logs

Resources:
  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GlueCloudTrailCrawlerRole-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [glue.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3CloudTrailAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['s3:Get*','s3:List*']
                Resource: 'arn:aws:s3:::kk-admin/cloud-trail/AWSLogs/*'

  CloudTrailDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: cloudtrail_logs_db

  CloudTrailCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: cloudtrail_crawler
      Role: !GetAtt 'GlueServiceRole.Arn'
      DatabaseName: !Ref 'CloudTrailDatabase'
      Targets:
        S3Targets:
          - Path: 's3://kk-admin/cloud-trail/AWSLogs/'
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
      RecrawlPolicy:
        RecrawlBehavior: CRAWL_NEW_FOLDERS_ONLY
      TablePrefix: cloudtrail_
      Classification: json
      Schedule:
        ScheduleExpression: 'cron(0 2 * * ? *)' # Run daily at 2 AM UTC

Outputs:
  DatabaseName:
    Description: Name of the created Glue Database
    Value: cloudtrail_logs_db
  CrawlerName:
    Description: Name of the created Glue Crawler
    Value: cloudtrail_crawler