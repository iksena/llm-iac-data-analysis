AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a lab environment for testing EC2 instance scheduling automation

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SchedulingLabVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SchedulingLabIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: SchedulingLabPublicSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: SchedulingLabRouteTable

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for scheduling lab instances
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: SchedulingLabSecurityGroup

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
      Policies:
        - PolicyName: SchedulingLabPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - cloudformation:*
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRole

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y aws-cli
          # Install AWS Instance Scheduler CLI (example command)
          # This would need to be replaced with the actual installation command
          echo "Installing AWS Instance Scheduler CLI..."
          # Add any additional configuration or setup here
      Tags:
        - Key: Name
          Value: AdminInstance
        - Key: environment
          Value: dev

  DevInstances:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: DevInstance
        - Key: environment
          Value: dev
    Metadata:
      AWS::CloudFormation::Init:
        config:
          packages:
            yum:
              aws-cli: []
          commands:
            setup:
              command: |
                # Add any instance-specific setup here
                echo "Setting up development instance..."
          services:
            sysvinit:
              awslogs:
                enabled: true
                ensureRunning: true
                packages:
                  yum:
                    awslogs: []
                files:
                  - '/etc/awslogs/awscli.conf'
                  - '/etc/awslogs/awslogs.conf'
                commands:
                  update-config:
                    command: |
                      sed -i 's/region = us-east-1/region = {{resolve:ssm-secure:/aws/reference/Region}}/g' /etc/awslogs/awscli.conf
                      sed -i 's/region = us-east-1/region = {{resolve:ssm-secure:/aws/reference/Region}}/g' /etc/awslogs/awslogs.conf
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  DevInstancesGroup:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${AWS::Region}/cloudformation/aws-cloudformation-templates.json'
      Parameters:
        InstanceType: t3.nano
        ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
        SubnetId: !Ref PublicSubnet
        SecurityGroupIds:
          - !Ref SecurityGroup
        IamInstanceProfile: !Ref InstanceProfile
        Tags:
          - Key: Name
            Value: DevInstance
          - Key: environment
            Value: dev
      Count: 5