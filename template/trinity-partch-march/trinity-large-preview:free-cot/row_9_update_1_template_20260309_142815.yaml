AWSTemplateFormatVersion: '2010-09-09'
Description: Encrypted One Zone File System in us-east-1a

Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      AvailabilityZoneName: us-east-1a
      Tags:
        - Key: Name
          Value: EncryptedOneZoneFileSystem

Outputs:
  FileSystemId:
    Description: The ID of the created file system
    Value: !Ref EncryptedOneZoneFileSystem
    Export:
      Name: EncryptedOneZoneFileSystemId