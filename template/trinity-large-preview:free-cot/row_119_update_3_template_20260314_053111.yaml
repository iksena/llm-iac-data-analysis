AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis Integration for Real-Time Event Streaming

Resources:
  MyApplicationStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub '${AWS::StackName}-my-application-stream'
      ShardCount: 1
      RetentionPeriodHours: 24

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-EventBridgeKinesisIntegrationRole'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !GetAtt MyApplicationStream.Arn

  MyApplicationEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-my-application-event-bus'

  EventBridgeToKinesisRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-EventBridgeToKinesisIntegrationRule'
      EventBusName: !Ref MyApplicationEventBus
      EventPattern:
        source:
          - my-application
      State: ENABLED
      Targets:
        - Arn: !GetAtt MyApplicationStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn

Outputs:
  KinesisStreamARN:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt MyApplicationStream.Arn
  EventBusARN:
    Description: ARN of the EventBridge Event Bus
    Value: !GetAtt MyApplicationEventBus.Arn