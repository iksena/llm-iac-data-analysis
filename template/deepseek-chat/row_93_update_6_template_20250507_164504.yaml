AWSTemplateFormatVersion: '2010-09-09'
Description: Auto-configuring EC2 instance with Nginx via SSM and enhanced monitoring

Parameters:
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
  KeyPairName:
    Description: Name of an existing EC2 KeyPair
    Type: String
    Default: ''
  EnvironmentTag:
    Description: Environment tag
    Type: String
    Default: Production
    AllowedValues:
      - Development
      - Staging
      - Production

Mappings:
  AWSAMIRegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-west-2:
      AMI: ami-0e472933a1395e172
    eu-west-1:
      AMI: ami-0d729a60
    ap-southeast-1:
      AMI: ami-0f02b24005e4aec36

Resources:
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'nginx-logs-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90

  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${LogBucket}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3LogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${LogBucket}'
                  - !Sub 'arn:aws:s3:::${LogBucket}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AWSAMIRegionMap, !Ref "AWS::Region", AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt InstanceSecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentTag}-Nginx-WebServer'
        - Key: Environment
          Value: !Ref EnvironmentTag
        - Key: InstallNginx
          Value: 'true'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          mkdir -p /var/log/nginx
          aws s3 cp /var/log/nginx/ s3://${LogBucket}/nginx-logs/ --recursive --include "*" --region ${AWS::Region}

  NginxInstallationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Install Nginx
        parameters: {}
        mainSteps:
          - action: aws:runShellScript
            name: InstallNginx
            inputs:
              runCommand:
                - yum update -y
                - amazon-linux-extras install nginx1 -y
                - systemctl start nginx
                - systemctl enable nginx
                - echo "server { listen 80; location / { return 200 'Hello from Nginx!'; }}" > /etc/nginx/conf.d/default.conf
                - systemctl restart nginx

  NginxInstallationAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref NginxInstallationDocument
      Targets:
        - Key: tag:InstallNginx
          Values:
            - 'true'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref LogBucket
          OutputS3KeyPrefix: 'ssm-output'

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Outputs:
  InstanceId:
    Description: Instance ID of the Nginx web server
    Value: !Ref WebServerInstance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt WebServerInstance.PublicDnsName
  LogBucketName:
    Description: Name of the S3 bucket for logs
    Value: !Ref LogBucket