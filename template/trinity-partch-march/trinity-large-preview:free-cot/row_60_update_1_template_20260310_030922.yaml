AWSTemplateFormatVersion: '2010-09-09'
Description: KMS Key for Centralized Encryption Management

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Default KMS Key for Encryption Management
      Enabled: true
      EnableKeyRotation: true
      KeyUsage: ENCRYPT_DECRYPT
      CustomerMasterKeySpec: SYMMETRIC_DEFAULT
      KeySpec: AES_256
      MultiRegion: false
      Policy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
      Tags:
        - Key: Environment
          Value: Production
        - Key: Owner
          Value: Security-Team
        - Key: Project
          Value: Encryption-Management

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/default-encryption-key
      TargetKeyId: !Ref KMSKey

Outputs:
  KeyArn:
    Description: KMS Key ARN
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: !Sub "${AWS::StackName}-KeyArn"

  KeyId:
    Description: KMS Key ID
    Value: !GetAtt KMSKey.KeyId
    Export:
      Name: !Sub "${AWS::StackName}-KeyId"