AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB and EventBridge

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
    Description: Name of the DynamoDB table
  EventBusName:
    Type: String
    Default: OrdersEventBus
    Description: Name of the EventBridge event bus

Resources:
  # IAM Role for EventBridge Pipes
  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-PipeExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetAccess-PipeAccess
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt OrdersTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt OrdersEventBus.Arn

  # DynamoDB Table with Streams Enabled
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # EventBridge Event Bus
  OrdersEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName
      EventSourceName: dynamodb.orders

  # EventBridge Pipe for New Orders (INSERT)
  NewOrdersPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: NewOrdersPipe
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref OrdersTable
      Target:
        EventBusName: !Ref OrdersEventBus
        Filter:
          EventPattern:
            source:
              - dynamodb
            detail-type:
              - 'DynamoDB Stream Record'
            detail:
              eventName:
                - INSERT
      RoleArn: !GetAtt PipeExecutionRole.Arn

  # EventBridge Pipe for Order Updates (MODIFY)
  OrderUpdatesPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: OrderUpdatesPipe
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref OrdersTable
      Target:
        EventBusName: !Ref OrdersEventBus
        Filter:
          EventPattern:
            source:
              - dynamodb
            detail-type:
              - 'DynamoDB Stream Record'
            detail:
              eventName:
                - MODIFY
      RoleArn: !GetAtt PipeExecutionRole.Arn

Outputs:
  OrdersTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt OrdersTable.Arn
  OrdersEventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !GetAtt OrdersEventBus.Arn
  NewOrdersPipeArn:
    Description: New Orders Pipe ARN
    Value: !GetAtt NewOrdersPipe.Arn
  OrderUpdatesPipeArn:
    Description: Order Updates Pipe ARN
    Value: !GetAtt OrderUpdatesPipe.Arn