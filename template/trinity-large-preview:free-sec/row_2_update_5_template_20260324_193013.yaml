AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # Default configuration - no WebsiteConfiguration, no PublicAccessBlockConfiguration, no BucketPolicy
      # No versioning, encryption, or lifecycle policies configured

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MyS3Bucket