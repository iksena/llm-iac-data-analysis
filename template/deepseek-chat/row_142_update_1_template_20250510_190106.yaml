AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instances managed by SSM with Auto Scaling Groups for Linux and Windows'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID where instances will be launched'

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: 'First public subnet for instance deployment'

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: 'Second public subnet for instance deployment'

  LinuxInstanceType:
    Type: String
    Default: t3.medium
    Description: 'EC2 instance type for Linux instances'

  WindowsInstanceType:
    Type: String
    Default: t3.large
    Description: 'EC2 instance type for Windows instances'

  LinuxDesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: 'Desired number of Linux instances'

  WindowsDesiredCapacity:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: 'Desired number of Windows instances'

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: 'Optional key pair for EC2 instances'
    Default: ''

Mappings:
  RegionMap:
    us-east-1:
      LinuxAMI: "ami-0c55b159cbfafe1f0"
      WindowsAMI: "ami-0b898040803850657"
    us-west-2:
      LinuxAMI: "ami-0d70546e43a941d70"
      WindowsAMI: "ami-0d705db840ec5c0c5"

Resources:
  SSMIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2RoleforSSM
      Path: /

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMIAMRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable HTTP access and SSM'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0

  LinuxLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2:1}}'
        InstanceType: !Ref LinuxInstanceType
        IamInstanceProfile:
          Arn: !GetAtt SSMInstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
            systemctl enable amazon-ssm-agent
            systemctl start amazon-ssm-agent

  WindowsLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base:1}}'
        InstanceType: !Ref WindowsInstanceType
        IamInstanceProfile:
          Arn: !GetAtt SSMInstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt InstanceSecurityGroup.GroupId

  LinuxAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LinuxLaunchTemplate
        Version: !GetAtt LinuxLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 10
      DesiredCapacity: !Ref LinuxDesiredCapacity
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300

  WindowsAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref WindowsLaunchTemplate
        Version: !GetAtt WindowsLaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 10
      DesiredCapacity: !Ref WindowsDesiredCapacity
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300

Outputs:
  LinuxASGName:
    Description: 'Name of the Linux Auto Scaling Group'
    Value: !Ref LinuxAutoScalingGroup

  WindowsASGName:
    Description: 'Name of the Windows Auto Scaling Group'
    Value: !Ref WindowsAutoScalingGroup

  SSMInstanceRoleARN:
    Description: 'ARN of the IAM role for SSM'
    Value: !GetAtt SSMIAMRole.Arn

  InstanceSecurityGroupID:
    Description: 'Security Group ID for instances'
    Value: !GetAtt InstanceSecurityGroup.GroupId