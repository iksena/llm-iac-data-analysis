AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for product creation automation

Parameters:
  ShopifyAdminApiKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: ''
    NoEcho: true
  ShopifyShopName:
    Type: String
    Description: Shopify shop name (e.g., testanu)
    Default: testanu

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        API_KEY:
          Name: X-Shopify-Access-Token
          Value: !Ref ShopifyAdminApiKey
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      InvocationEndpoint: !Sub 'https://${ShopifyShopName}.myshopify.com/admin/api/2023-04/products.json'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 5

  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyApiDestination.Arn
          Id: ShopifyProductCreationTarget

Outputs:
  EventBusName:
    Description: EventBridge bus name for Shopify events
    Value: !Ref ShopifyEventBus
  ApiDestinationArn:
    Description: ARN of the Shopify API destination
    Value: !GetAtt ShopifyApiDestination.Arn
  ConnectionArn:
    Description: ARN of the Shopify connection
    Value: !Ref ShopifyConnection