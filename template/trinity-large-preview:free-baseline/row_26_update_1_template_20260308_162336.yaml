AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket integrated with EventBridge and SNS for object creation notifications.

Parameters:
  BucketName:
    Type: String
    Default: my-s3-eventbridge-bucket
    Description: Name of the S3 bucket
  TopicDisplayName:
    Type: String
    Default: S3EventNotifications
    Description: Display name for the SNS topic
  EventPattern:
    Type: String
    Default: '{"source": ["aws.s3"], "detail-type": ["AWS API Call via CloudTrail"], "detail": {"eventSource": ["s3.amazonaws.com"], "eventName": ["PutObject", "CompleteMultipartUpload"]}}'
    Description: Event pattern for EventBridge rule

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          Enabled: true

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Ref TopicDisplayName

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Rule to trigger on S3 object creation events
      EventPattern: !Ref EventPattern
      Targets:
        - Arn: !GetAtt SNSTopic.Arn
          Id: SNST3arget

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  TopicARN:
    Description: ARN of the SNS topic
    Value: !GetAtt SNSTopic.Arn
  RuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventBridgeRule