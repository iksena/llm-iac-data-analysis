AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EMR Serverless Environment with S3 Bucket and IAM Role

Parameters:
  EMRApplicationName:
    Type: String
    Default: emr-serverless-app
    Description: Name of the EMR Serverless application
  
  EMRVersion:
    Type: String
    Default: emr-6.15.0
    Description: EMR version for the serverless application
    
  MaximumCapacity:
    Type: Number
    Default: 20
    Description: Maximum number of workers
    
  IdleTimeoutMinutes:
    Type: Number
    Default: 15
    Description: Idle timeout in minutes before auto-stop

Resources:
  EMRServerlessS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  EMRServerlessRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSEmrServerlessServiceRole

  EMRServerlessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-emr-serverless-policy
      Roles:
        - !Ref EMRServerlessRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub ${EMRServerlessS3Bucket.Arn}/*
              - !GetAtt EMRServerlessS3Bucket.Arn
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/emr-serverless/*

  EMRServerlessApplication:
    Type: AWS::EMRServerless::Application
    DependsOn: EMRServerlessRole
    Properties:
      Name: !Ref EMRApplicationName
      ReleaseLabel: !Ref EMRVersion
      Type: Spark
      AutoStartConfiguration:
        Enabled: true
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: !Ref IdleTimeoutMinutes
      InitialCapacity:
        - Type: Driver
          WorkerCount: 1
          WorkerConfiguration:
            Cpu: '2 vCPU'
            Memory: '4 GB'
        - Type: Executor
          WorkerCount: 2
          WorkerConfiguration:
            Cpu: '4 vCPU'
            Memory: '8 GB'
      MaximumCapacity:
        Cpu: !Sub '${MaximumCapacity} vCPU'
        Memory: !Sub '${MaximumCapacity} GB'

Outputs:
  EMRApplicationId:
    Description: EMR Serverless Application ID
    Value: !Ref EMRServerlessApplication

  S3BucketName:
    Description: S3 Bucket Name for EMR Serverless
    Value: !Ref EMRServerlessS3Bucket

  EMRServerlessRoleARN:
    Description: ARN of EMR Serverless IAM Role
    Value: !GetAtt EMRServerlessRole.Arn