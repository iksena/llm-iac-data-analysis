AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  CloudTrailBucketName:
    Type: String
    Description: The name of the S3 bucket containing CloudTrail logs
    Default: kk-admin/cloud-trail/AWSLogs/

  TablePrefix:
    Type: String
    Description: Prefix for the Glue tables
    Default: cloudtrail_

Resources:
  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GluePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${CloudTrailBucketName}
                  - !Sub arn:aws:s3:::${CloudTrailBucketName}/*

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub ${TablePrefix}cloudtrail_logs
        Description: Database for CloudTrail logs
    Condition: CreateGlueDatabase

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Role: !GetAtt GlueRole.Arn
      Targets:
        S3Targets:
          - Path: !Ref CloudTrailBucketName
      DatabaseName: !Ref GlueDatabase
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: DEPRECATE_IN_DATABASE
      TablePrefix: !Ref TablePrefix

Conditions:
  CreateGlueDatabase:
    !Not
      !Condition 'GlueDatabaseExists'

Outputs:
  GlueDatabaseName:
    Description: The name of the Glue database
    Value: !Ref GlueDatabase

  GlueCrawlerName:
    Description: The name of the Glue crawler
    Value: !Ref GlueCrawler

Mappings:
  GlueDatabaseExists:
    'us-east-1':
      'kk-admin/cloud-trail/AWSLogs/': false
    'us-west-2':
      'kk-admin/cloud-trail/AWSLogs/': false
    'eu-central-1':
      'kk-admin/cloud-trail/AWSLogs/': false
    'ap-southeast-1':
      'kk-admin/cloud-trail/AWSLogs/': false
    'ap-northeast-1':
      'kk-admin/cloud-trail/AWSLogs/': false
    'ap-southeast-2':
      'kk-admin/cloud-trail/AWSLogs/': false
    'sa-east-1':
      'kk-admin/cloud-trail/AWSLogs/': false