AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Managed Policies for S3 Access and Database Protection

Resources:
  S3AccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3AccessPolicy
      Description: Grants read/write access to ios-apps.sagebridge.org S3 bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              - arn:aws:s3:::ios-apps.sagebridge.org
              - arn:aws:s3:::ios-apps.sagebridge.org/*

  DynamoDBProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: DynamoDBProtectionPolicy
      Description: Prevents accidental deletion or schema changes in DynamoDB
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - dynamodb:DeleteTable
              - dynamodb:UpdateTable
              - dynamodb:TagResource
              - dynamodb:UntagResource
              - dynamodb:UpdateTimeToLive
            Resource: '*'

  RDSProtectionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RDSProtectionPolicy
      Description: Prevents accidental deletion of RDS instances and clusters
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action:
              - rds:DeleteDBInstance
              - rds:DeleteDBCluster
              - rds:DeleteDBSnapshot
              - rds:DeleteDBClusterSnapshot
              - rds:DeleteEventSubscription
              - rds:DeleteOptionGroup
              - rds:DeleteDBSubnetGroup
              - rds:DeleteDBParameterGroup
            Resource: '*'