

AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy an App Runner service using an existing ECR repository.

Parameters:
  ECRRepositoryName:
    Type: String
    Description: The name of the existing ECR repository.
  ECRImageTag:
    Type: String
    Default: latest
    Description: The tag of the image to deploy from the ECR repository.
  ServiceName:
    Type: String
    Description: The name of the App Runner service.

Resources:
  AppRunnerServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "build.apprunner.amazonaws.com"
            Action: "sts:AssumeRole"
      Policies:
        - PolicyName: AppRunnerECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - "ecr:GetAuthorizationToken"
                  - "ecr:BatchCheckLayerAvailability"
                  - "ecr:GetDownloadUrlForLayer"
                  - "ecr:BatchGetImage"
                Resource: "*"

  AppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Ref ServiceName
      SourceConfiguration:
        ImageRepository:
          ImageIdentifier: !Sub "${ECRRepositoryName}:${ECRImageTag}"
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
      InstanceConfiguration:
        Cpu: "1024"
        Memory: "2048"
      RoleArn: !GetAtt AppRunnerServiceRole.Arn

Outputs:
  AppRunnerServiceURL:
    Description: URL of the App Runner service
    Value: !GetAtt AppRunnerService.ServiceUrl