AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch processing pipeline with SQS and EventBridge Pipes

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >-
      [REQUIRED] Enter your VPC ID where resources will be deployed
      (e.g. vpc-0abcdef1234567890)
    ConstraintDescription: Must be a valid existing VPC ID in your account
    NoEcho: false

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      [REQUIRED] Enter comma-separated private subnet IDs for Batch compute
      (e.g. subnet-12345678,subnet-87654321)
    ConstraintDescription: Must be valid existing subnet IDs in your VPC
    NoEcho: false

  EcrImageUri:
    Type: String
    Description: >-
      [REQUIRED] Enter ECR image URI for the Batch job container
      (e.g. 123456789012.dkr.ecr.region.amazonaws.com/my-repo:latest)
    AllowedPattern: '^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com\/[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+$'
    ConstraintDescription: Must be a valid ECR image URI in your account
    NoEcho: false

  ComputeEnvironmentType:
    Type: String
    Default: MANAGED
    AllowedValues: [MANAGED, UNMANAGED]
    Description: Type of Batch compute environment

  ComputeInstanceTypes:
    Type: CommaDelimitedList
    Default: c5.large,c5.xlarge
    Description: EC2 instance types for Batch compute

Resources:
  # [Previous resource definitions remain exactly the same...]
  # (EventQueue, BatchServiceRole, ECSTaskExecutionRole, etc.)

Outputs:
  EventQueueUrl:
    Description: URL of the SQS queue for event submission
    Value: !Ref EventQueue
  BatchJobQueueArn:
    Description: ARN of the Batch job queue
    Value: !Ref BatchJobQueue
  EventPipeArn:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventPipe.Arn