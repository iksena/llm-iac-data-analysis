AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Bedrock Agent with Lambda Integration for Stock Price Lookup

Parameters:
  LambdaFunctionName:
    Type: String
    Default: StockPriceLookupFunction
    Description: Name of the Lambda function
  AgentName:
    Type: String
    Default: StockMarketAssistant
    Description: Name of the Bedrock Agent
  ModelConfiguration:
    Type: String
    Default: bedrock-ai:claude-3-sonnet
    Description: Bedrock model configuration

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-ExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          def lambda_handler(event, context):
              stock_symbol = event.get('stockSymbol', 'UNKNOWN')
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'price': 100,
                      'symbol': stock_symbol
                  })
              }

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AgentName}-Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvokeModel
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: "*"

  StockMarketAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref AgentName
      Description: AI agent for stock price queries
      RoleArn: !GetAtt BedrockAgentRole.Arn
      ModelConfiguration: !Ref ModelConfiguration
      Instructions: |
        You are a stock market assistant. When users ask about stock prices, use the getStockPrice action with the stock symbol to retrieve current prices.
      ActionGroups:
        - Name: StockPriceActions
          Description: Actions for stock price lookup
          Actions:
            - Name: getStockPrice
              Description: Get current stock price
              Parameters:
                - Name: stockSymbol
                  Type: String
                  Required: true
              Service:
                Name: AWS::Lambda
                Action: Invoke
                Parameters:
                  FunctionArn: !GetAtt StockPriceLambdaFunction.Arn

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt StockPriceLambdaFunction.Arn
  AgentId:
    Description: Bedrock Agent ID
    Value: !Ref StockMarketAgent