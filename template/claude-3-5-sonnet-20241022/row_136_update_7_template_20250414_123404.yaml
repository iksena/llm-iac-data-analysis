AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Permission Boundary and Developer Role Configuration

Parameters:
  TeamNamePrefix:
    Type: String
    Default: MyTeam
    Description: Prefix for IAM resource names
    MinLength: 3
    MaxLength: 20

  OwnerTagValue:
    Type: String
    Description: Value for Owner tag on IAM resources
    MinLength: 3
    MaxLength: 50

Resources:
  PermissionBoundaryPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Permission boundary for developer-created IAM resources
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3Operations
            Effect: Allow
            Action:
              - s3:*
            Resource: '*'
          - Sid: AllowIAMReadOnly
            Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'

  DeveloperAccessPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy defining developer IAM permissions with boundary enforcement
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowIAMResourceCreation
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:CreatePolicy
              - iam:PutRolePolicy
              - iam:AttachRolePolicy
              - iam:TagRole
              - iam:TagPolicy
              - iam:GetRole
              - iam:GetPolicy
              - iam:ListRoles
              - iam:ListPolicies
            Resource: '*'
          - Sid: RequirePermissionBoundary
            Effect: Deny
            Action:
              - iam:CreateRole
              - iam:PutRolePolicy
            Resource: '*'
            Condition:
              StringNotLike:
                iam:PermissionsBoundary: !GetAtt PermissionBoundaryPolicy.Arn

  DeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 
              - sts:AssumeRole
      ManagedPolicyArns:
        - !Ref DeveloperAccessPolicy
      Policies:
        - PolicyName: RequireOwnerTag
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action:
                  - iam:*
                Resource: '*'
                Condition:
                  StringNotEquals:
                    aws:RequestTag/Owner: !Ref OwnerTagValue
      Tags:
        - Key: Owner
          Value: !Ref OwnerTagValue

Outputs:
  PermissionBoundaryPolicyArn:
    Description: ARN of the Permission Boundary Policy
    Value: !Ref PermissionBoundaryPolicy

  DeveloperRoleArn:
    Description: ARN of the Developer Role
    Value: !GetAtt DeveloperRole.Arn

  DeveloperAccessPolicyArn:
    Description: ARN of the Developer Access Policy
    Value: !Ref DeveloperAccessPolicy