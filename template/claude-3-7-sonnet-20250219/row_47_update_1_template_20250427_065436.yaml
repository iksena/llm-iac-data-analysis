AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates IAM roles for EC2 instances with restricted read-only access to AWS IAM metadata'

Parameters:
  RoleNamePrefix:
    Type: String
    Default: EC2IAMReadOnly
    Description: Prefix for the IAM role name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9-_]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters, hyphens, or underscores.

Resources:
  EC2IAMReadOnlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy that grants read-only access to IAM resources
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'iam:Get*'
              - 'iam:List*'
              - 'iam:Generate*'
            Resource: '*'
          - Effect: Deny
            Action:
              - 'iam:Create*'
              - 'iam:Delete*'
              - 'iam:Update*'
              - 'iam:Put*'
              - 'iam:Attach*'
              - 'iam:Detach*'
              - 'iam:Add*'
              - 'iam:Remove*'
              - 'iam:Set*'
              - 'iam:Upload*'
              - 'iam:Enable*'
              - 'iam:Disable*'
              - 'iam:Change*'
              - 'iam:Reset*'
              - 'iam:Tag*'
              - 'iam:Untag*'
            Resource: '*'

  EC2IAMReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${RoleNamePrefix}-Role-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - !Ref EC2IAMReadOnlyPolicy
      Path: '/'
      Tags:
        - Key: Purpose
          Value: EC2-IAM-ReadOnly-Access

  EC2IAMReadOnlyInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${RoleNamePrefix}-InstanceProfile-${AWS::Region}'
      Path: '/'
      Roles:
        - !Ref EC2IAMReadOnlyRole

Outputs:
  RoleARN:
    Description: ARN of the IAM role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleARN'

  RoleName:
    Description: Name of the IAM role for EC2 instances
    Value: !Ref EC2IAMReadOnlyRole
    Export:
      Name: !Sub '${AWS::StackName}-RoleName'

  InstanceProfileARN:
    Description: ARN of the IAM instance profile for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyInstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileARN'

  InstanceProfileName:
    Description: Name of the IAM instance profile for EC2 instances
    Value: !Ref EC2IAMReadOnlyInstanceProfile
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileName'