AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EC2 instance with Elastic IP and SSH access in default VPC'
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair.
  SSHLocation:
    Description: The IP range (CIDR) for SSH access
    Type: String
    MinLength: '9'
    MaxLength: '18'
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR format (e.g., 203.0.113.0/24)
  VpcId:
    Description: Select the default VPC for deployment
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Description: Select a subnet within the default VPC
    Type: AWS::EC2::Subnet::Id
Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-east-2:
      AMI: ami-0f748cb24e7f16a62
    us-west-1:
      AMI: ami-0c1666cb0992a8730
    us-west-2:
      AMI: ami-0cb16c0fa1b9d2a61
    ap-south-1:
      AMI: ami-0f1aae8c3e9c8c2e5
    ap-northeast-1:
      AMI: ami-0d8d2f516c404f78e
    ap-northeast-2:
      AMI: ami-0b674f8e3a0e904c2
    ap-southeast-1:
      AMI: ami-0c28b842c253aa5a1
    ap-southeast-2:
      AMI: ami-013f279c4e3330609
    ca-central-1:
      AMI: ami-0a059e1c5d2c45c8e
    eu-central-1:
      AMI: ami-0c909c6c3e6d4e6d6
    eu-west-1:
      AMI: ami-0d5d9d3349c8512d9
    eu-west-2:
      AMI: ami-0d3e0c8c2b4b1b3a3
    eu-west-3:
      AMI: ami-0e5d9e0c8c2b4b1b3a3
    sa-east-1:
      AMI: ami-0d3e0c8c2b4b1b3a3
    af-south-1:
      AMI: ami-0f5d0e4d5c0b3d5e0
    ap-east-1:
      AMI: ami-0a5d0e4d5c0b3d5e0
    ap-south-2:
      AMI: ami-0b5d0e4d5c0b3d5e0
    ap-northeast-3:
      AMI: ami-0c5d0e4d5c0b3d5e0
    eu-south-1:
      AMI: ami-0d5d0e4d5c0b3d5e0
    eu-south-2:
      AMI: ami-0e5d0e4d5c0b3d5e0
    eu-central-2:
      AMI: ami-0f5d0e4d5c0b3d5e0
    me-south-1:
      AMI: ami-0a6d0e4d5c0b3d5e0
    me-central-1:
      AMI: ami-0b6d0e4d5c0b3d5e0
Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSH access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
      Tags:
        - Key: Name
          Value: SSH-Security-Group
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionMap, AWS::Region, AMI]
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: SSH-Accessible-Instance
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref EC2Instance
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  PublicDNS:
    Description: Public DNS name of the instance
    Value: !GetAtt EC2Instance.PublicDnsName
  ElasticIPAddress:
    Description: Elastic IP address
    Value: !GetAtt ElasticIP.PublicIp
  SSHCommand:
    Description: Command to connect via SSH
    Value: !Sub 'ssh -i <key-file>.pem ec2-user@${ElasticIP.PublicIp}'