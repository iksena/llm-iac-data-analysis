AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyStandardQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: alias/aws/sqs
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
Outputs:
  QueueUrl:
    Description: URL of the created SQS Standard Queue
    Value: !Ref MyStandardQueue