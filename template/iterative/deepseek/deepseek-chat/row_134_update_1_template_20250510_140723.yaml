AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for a basic Lambda function with Node.js runtime and CloudWatch logging permissions

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log('Event: ', JSON.stringify(event, null, 2));
              return {
                  statusCode: 200,
                  body: JSON.stringify({
                      message: 'Hello from Lambda',
                      input: event
                  })
              };
          };
      Timeout: 3
      MemorySize: 128

Outputs:
  LambdaFunctionARN:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn
  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !Ref LambdaFunction