AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to create a VPC and a private Amazon Route 53 Hosted Zone for internal DNS management.
  The hosted zone's domain is "www.example.com" and it is associated with the newly created VPC.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: PrivateDNSVPC

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "www.example.com"
      HostedZoneConfig:
        Comment: "Private Route 53 Hosted Zone for internal DNS management."
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref AWS::Region

Outputs:
  VPCId:
    Description: "The ID of the created VPC."
    Value: !Ref VPC
  HostedZoneId:
    Description: "The ID of the created private Route 53 Hosted Zone."
    Value: !Ref PrivateHostedZone