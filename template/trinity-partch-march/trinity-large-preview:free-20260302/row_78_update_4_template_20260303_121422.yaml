AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template to create an EC2 IP Address Manager (IPAM) for managing IP address allocation.

Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IPAM for managing IP address allocation
      OperatingRegions:
        - RegionName: !Ref 'AWS::Region'

Outputs:
  IPAMArn:
    Description: The Amazon Resource Name (ARN) of the IPAM
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IPAMArn'

  IPAMId:
    Description: The ID of the IPAM
    Value: !Ref IPAM
    Export:
      Name: !Sub '${AWS::StackName}-IPAMId'

  DefaultPublicScopeId:
    Description: The ID of the default public scope
    Value: !GetAtt IPAM.PublicDefaultScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPublicScopeId'

  DefaultPrivateScopeId:
    Description: The ID of the default private scope
    Value: !GetAtt IPAM.PrivateDefaultScopeId
    Export:
      Name: !Sub '${AWS::StackName}-DefaultPrivateScopeId'