AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Resources:
  DynamoDbTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: OrdersTable
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: OrderId
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: OrderId
          AttributeType: S
      SSESpecification:
        SSEEnabled: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: BillingMode PAY_PER_REQUEST is appropriate for this use case

  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: OrdersEventBus

  InsertPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: InsertEventPipe
      Source:
        DynamoDBStreamParameters:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
          StartingPosition: LATEST
      Target:
        EventBridgeEventBusParameters:
          EventBusName:
            Ref: EventBus
          DetailType: OrderCreated
          Source: com.company.orders
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - INSERT
    DependsOn:
      - DynamoDbTable
      - EventBus

  ModifyPipe:
    Type: AWS::Events::Pipe
    Properties:
      Name: ModifyEventPipe
      Source:
        DynamoDBStreamParameters:
          StreamArn:
            Fn::GetAtt:
              - DynamoDbTable
              - StreamArn
          StartingPosition: LATEST
      Target:
        EventBridgeEventBusParameters:
          EventBusName:
            Ref: EventBus
          DetailType: OrderUpdated
          Source: com.company.orders
      Filter:
        EventPattern:
          source:
            - aws.dynamodb
          detail:
            eventName:
              - MODIFY
    DependsOn:
      - DynamoDbTable
      - EventBus

Outputs:
  DynamoDbTableArn:
    Description: ARN of the DynamoDB table
    Value:
      Fn::GetAtt:
        - DynamoDbTable
        - Arn
  EventBusName:
    Description: Name of the EventBridge event bus
    Value:
      Ref: EventBus