AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge configuration for routing custom events to external API endpoint'

Parameters:
  ApiEndpoint:
    Type: String
    Description: 'External API endpoint URL'
    Default: 'https://webhook.site/testtest'
    
  ApiKeyValue:
    Type: String
    Description: 'API Key for authentication'
    NoEcho: true

Resources:
  CustomEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-bus'

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: 'API key authentication connection'
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'x-api-key'
          ApiKeyValue: !Ref ApiKeyValue
      Name: !Sub '${AWS::StackName}-conn'

  ApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      Description: 'External API destination'
      InvocationEndpoint: !Ref ApiEndpoint
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300
      Name: !Sub '${AWS::StackName}-dest'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeInvokeApi
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref CustomEventBus
      Description: 'Route events to API destination'
      EventPattern:
        source: ['custom.events']
      Name: !Sub '${AWS::StackName}-rule'
      State: ENABLED
      Targets:
        - Id: Target1
          Arn: !GetAtt ApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: 'Event bus ARN'
    Value: !GetAtt CustomEventBus.Arn

  ApiDestinationArn:
    Description: 'API destination ARN'
    Value: !GetAtt ApiDestination.Arn

  ConnectionArn:
    Description: 'Connection ARN'
    Value: !GetAtt EventBridgeConnection.Arn