AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 instance scheduling automation lab environment'

Parameters:
  VpcCidr:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
  
  PublicSubnetCidr:
    Description: CIDR block for the public subnet
    Type: String
    Default: 10.0.0.0/24
  
  EnvironmentName:
    Description: Environment name for tagging
    Type: String
    Default: dev

Resources:
  # VPC and Networking Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC
        - Key: environment
          Value: !Ref EnvironmentName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IGW
        - Key: environment
          Value: !Ref EnvironmentName

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicSubnet
        - Key: environment
          Value: !Ref EnvironmentName

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PublicRouteTable
        - Key: environment
          Value: !Ref EnvironmentName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Security Group
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-InstanceSG
        - Key: environment
          Value: !Ref EnvironmentName

  # IAM Roles and Instance Profiles
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: environment
          Value: !Ref EnvironmentName

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref SSMInstanceRole

  AdminInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AdminInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - cloudformation:Describe*
                  - cloudformation:List*
                  - cloudformation:Get*
                  - ec2:Describe*
                  - ec2:Start*
                  - ec2:Stop*
                Resource: '*'
      Tags:
        - Key: environment
          Value: !Ref EnvironmentName

  AdminInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AdminInstanceRole

  # EC2 Instances
  DevInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DevInstance1
        - Key: environment
          Value: !Ref EnvironmentName

  DevInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DevInstance2
        - Key: environment
          Value: !Ref EnvironmentName

  DevInstance3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DevInstance3
        - Key: environment
          Value: !Ref EnvironmentName

  DevInstance4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DevInstance4
        - Key: environment
          Value: !Ref EnvironmentName

  DevInstance5:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref SSMInstanceProfile
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DevInstance5
        - Key: environment
          Value: !Ref EnvironmentName

  AdminInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      IamInstanceProfile: !Ref AdminInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          # Update system packages
          yum update -y
          
          # Install AWS CLI
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          yum install -y unzip
          unzip awscliv2.zip
          ./aws/install
          
          # Install Python and pip
          yum install -y python3 python3-pip
          
          # Install boto3
          pip3 install boto3
          
          # Create a simple script to demonstrate instance scheduling
          cat > /home/ec2-user/schedule_instances.py << 'EOF'
          #!/usr/bin/env python3
          import boto3
          import argparse
          
          def list_instances(tag_name, tag_value):
              ec2 = boto3.resource('ec2')
              instances = ec2.instances.filter(
                  Filters=[
                      {'Name': f'tag:{tag_name}', 'Values': [tag_value]},
                      {'Name': 'instance-state-name', 'Values': ['running', 'stopped']}
                  ]
              )
              return instances
          
          def start_instances(tag_name, tag_value):
              instances = list_instances(tag_name, tag_value)
              for instance in instances:
                  if instance.state['Name'] == 'stopped':
                      print(f"Starting instance {instance.id}")
                      instance.start()
                  else:
                      print(f"Instance {instance.id} is already running")
          
          def stop_instances(tag_name, tag_value):
              instances = list_instances(tag_name, tag_value)
              for instance in instances:
                  if instance.state['Name'] == 'running':
                      print(f"Stopping instance {instance.id}")
                      instance.stop()
                  else:
                      print(f"Instance {instance.id} is already stopped")
          
          if __name__ == "__main__":
              parser = argparse.ArgumentParser(description='Schedule EC2 instances')
              parser.add_argument('action', choices=['start', 'stop', 'list'], help='Action to perform')
              parser.add_argument('--tag-name', default='environment', help='Tag name to filter instances')
              parser.add_argument('--tag-value', default='dev', help='Tag value to filter instances')
              
              args = parser.parse_args()
              
              if args.action == 'start':
                  start_instances(args.tag_name, args.tag_value)
              elif args.action == 'stop':
                  stop_instances(args.tag_name, args.tag_value)
              elif args.action == 'list':
                  instances = list_instances(args.tag_name, args.tag_value)
                  for instance in instances:
                      print(f"Instance {instance.id} is {instance.state['Name']}")
          EOF
          
          chmod +x /home/ec2-user/schedule_instances.py
          
          # Create a README file with instructions
          cat > /home/ec2-user/README.txt << 'EOF'
          EC2 Instance Scheduler Tool
          
          This tool allows you to start, stop, or list EC2 instances based on tags.
          
          Usage:
          ./schedule_instances.py [action] [options]
          
          Actions:
            start - Start instances with the specified tag
            stop - Stop instances with the specified tag
            list - List instances with the specified tag
          
          Options:
            --tag-name - Tag name to filter instances (default: environment)
            --tag-value - Tag value to filter instances (default: dev)
          
          Examples:
            ./schedule_instances.py list
            ./schedule_instances.py stop
            ./schedule_instances.py start --tag-name environment --tag-value dev
          EOF
          
          # Set ownership to ec2-user
          chown ec2-user:ec2-user /home/ec2-user/schedule_instances.py
          chown ec2-user:ec2-user /home/ec2-user/README.txt
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-AdminInstance
        - Key: environment
          Value: !Ref EnvironmentName

Outputs:
  VpcId:
    Description: ID of the VPC
    Value: !Ref VPC
    
  PublicSubnetId:
    Description: ID of the public subnet
    Value: !Ref PublicSubnet
    
  SecurityGroupId:
    Description: ID of the security group
    Value: !Ref InstanceSecurityGroup
    
  AdminInstanceId:
    Description: ID of the admin instance
    Value: !Ref AdminInstance
    
  AdminInstancePublicDNS:
    Description: Public DNS of the admin instance
    Value: !GetAtt AdminInstance.PublicDnsName
    
  DevInstance1Id:
    Description: ID of the first dev instance
    Value: !Ref DevInstance1
    
  DevInstance2Id:
    Description: ID of the second dev instance
    Value: !Ref DevInstance2
    
  DevInstance3Id:
    Description: ID of the third dev instance
    Value: !Ref DevInstance3
    
  DevInstance4Id:
    Description: ID of the fourth dev instance
    Value: !Ref DevInstance4
    
  DevInstance5Id:
    Description: ID of the fifth dev instance
    Value: !Ref DevInstance5