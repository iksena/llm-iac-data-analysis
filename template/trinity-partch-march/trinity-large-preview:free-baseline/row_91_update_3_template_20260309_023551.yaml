AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for VPC flow logs with lifecycle management and access controls

Parameters:
  BucketName:
    Type: String
    Default: vpc-flow-logs-bucket
    Description: Name of the S3 bucket for VPC flow logs
  VersioningStatus:
    Type: String
    Default: Suspended
    AllowedValues:
      - Enabled
      - Suspended
    Description: Versioning status for the S3 bucket
  LifecycleTransitionDays:
    Type: Number
    Default: 30
    Description: Number of days before transitioning to Glacier
  LifecycleExpirationDays:
    Type: Number
    Default: 365000
    Description: Number of days before deleting objects

Resources:
  VPCFlowLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Versioning:
        Status: !Ref VersioningStatus
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: VPCFlowLogsLifecycle
            Status: Enabled
            Transitions:
              - Days: !Ref LifecycleTransitionDays
                StorageClass: GLACIER
            ExpirationInDays: !Ref LifecycleExpirationDays

  VPCFlowLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: VPCFlowLogsDelivery
            Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub
              - arn:aws:s3:::${BucketName}/AWSLogs/${AWS::AccountId}/*
              - BucketName: !Ref VPCFlowLogsBucket
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

Outputs:
  BucketName:
    Description: Name of the VPC flow logs S3 bucket
    Value: !Ref VPCFlowLogsBucket