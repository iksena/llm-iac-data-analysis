AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Environment name for resource tagging
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet
  PrivateSubnetCIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet
  BatchInstanceType:
    Type: String
    Default: optimal
    Description: EC2 instance type for Batch compute resources
  BatchMinvCpus:
    Type: Number
    Default: 0
    Description: Minimum number of vCPUs for Batch compute environment
  BatchMaxvCpus:
    Type: Number
    Default: 256
    Description: Maximum number of vCPUs for Batch compute environment
  ContainerImage:
    Type: String
    Default: busybox
    Description: Container image for Batch jobs
  ContainerCommand:
    Type: String
    Default: "echo 'Hello World'"
    Description: Command to run in the container

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Public-Subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Private-Subnet

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Batch-SG

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Batch-Service-Role

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ECS-Task-Execution-Role

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Batch-Job-Role

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: EC2
        MinvCpus: !Ref BatchMinvCpus
        MaxvCpus: !Ref BatchMaxvCpus
        InstanceTypes:
          - !Ref BatchInstanceType
        Subnets:
          - !Ref PrivateSubnet
        SecurityGroupIds:
          - !Ref SecurityGroup
        Ec2KeyPair: default-key
      ServiceRole: !GetAtt BatchServiceRole.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Compute-Environment

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Priority: 1
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Job-Queue

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref ContainerImage
        Command: !Split [",", !Ref ContainerCommand]
        ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
        ResourceRequirements:
          - Type: VCPU
            Value: 1
          - Type: MEMORY
            Value: 512
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Job-Definition

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${EnvironmentName}-OrderQueue
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-SQS-Queue

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${EnvironmentName}-OrderPipe
      SourceType: SQS
      SourceParameters:
        QueueUrl: !GetAtt SQSQueue.QueueUrl
      TargetType: BATCH_JOB
      TargetParameters:
        BatchJobParameters:
          JobDefinition: !Ref BatchJobDefinition
          JobName: !Sub ${EnvironmentName}-OrderJob
          JobQueue: !Ref BatchJobQueue
      Enrichment: NONE
      RequiredResourcePolicies:
        - PolicyName: SQS-Permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Principal:
                  Service: events.amazonaws.com
                Action: sqs:SendMessage
                Resource: !GetAtt SQSQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EventBridge-Pipe

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  SQSQueueARN:
    Description: ARN of the SQS queue
    Value: !GetAtt SQSQueue.Arn
  BatchJobQueueARN:
    Description: ARN of the Batch job queue
    Value: !GetAtt BatchJobQueue.Arn
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn
  BatchJobRoleARN:
    Description: ARN of the Batch job execution role
    Value: !GetAtt BatchJobRole.Arn