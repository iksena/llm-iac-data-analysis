AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDeadLetterQueue.Arn
        maxReceiveCount: 5

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDeadLetterQueue.Arn
        maxReceiveCount: 5

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDeadLetterQueue

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDeadLetterQueue

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: MetricTopic

  AllMetricsSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: AllMetricsQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt AllMetricsSqsQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref SnsTopic

  TemperatureSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: TemperatureQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref SnsTopic

  HumiditySqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Id: HumidityQueuePolicy
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal: '*'
            Action: 'sqs:SendMessage'
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                'aws:SourceArn': !Ref SnsTopic

  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Humidity

Outputs:
  SnsTopicArn:
    Description: SNS Topic ARN
    Value: !Ref SnsTopic
  AllMetricsQueueUrl:
    Description: URL of the All Metrics SQS Queue
    Value: !Ref AllMetricsSqsQueue
  TemperatureQueueUrl:
    Description: URL of the Temperature SQS Queue
    Value: !Ref TemperatureSqsQueue
  HumidityQueueUrl:
    Description: URL of the Humidity SQS Queue
    Value: !Ref HumiditySqsQueue