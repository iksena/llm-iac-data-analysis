AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Batch environment for executing containerized batch jobs with S3 integration'

Parameters:
  EnvironmentName:
    Type: String
    Default: BatchEnvironment
    Description: Name prefix for the resources created by this template

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  SubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet

  InstanceType:
    Type: String
    Default: m5.large
    AllowedValues:
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - c5.large
      - c5.xlarge
    Description: EC2 instance type for the compute environment

  DockerImage:
    Type: String
    Default: amazonlinux:latest
    Description: Docker image to use for the job definition

  MinvCpus:
    Type: Number
    Default: 0
    Description: Minimum number of vCPUs for the compute environment

  MaxvCpus:
    Type: Number
    Default: 16
    Description: Maximum number of vCPUs for the compute environment

  S3BucketName:
    Type: String
    Default: ''
    Description: Name for the S3 bucket (must be globally unique, leave empty for auto-generated name)

Resources:
  # VPC and Networking Resources
  BatchVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref BatchVPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BatchVPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref SubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BatchVPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AWS Batch compute environment
      VpcId: !Ref BatchVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-BatchSG

  # S3 Bucket
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref S3BucketName, !Ref 'AWS::NoValue']
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-DataBucket

  # IAM Roles
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  # AWS Batch Resources
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: !Ref MinvCpus
        MaxvCpus: !Ref MaxvCpus
        DesiredvCpus: !Ref MinvCpus
        InstanceTypes:
          - !Ref InstanceType
        Subnets:
          - !Ref PublicSubnet
        SecurityGroupIds:
          - !GetAtt BatchSecurityGroup.GroupId
        InstanceRole: !GetAtt BatchInstanceProfile.Arn
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        Tags:
          Name: !Sub ${EnvironmentName}-ComputeEnv
      State: ENABLED

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      Priority: 1
      State: ENABLED
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Tags:
        Name: !Sub ${EnvironmentName}-JobQueue

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref DockerImage
        Command:
          - "/bin/bash"
          - "-c"
          - |
            # Install AWS CLI
            yum update -y
            yum install -y aws-cli unzip
            
            # Create test file if it doesn't exist
            echo "This is a test file for AWS Batch S3 operations" > /tmp/test-file.txt
            
            # Upload test file to S3
            aws s3 cp /tmp/test-file.txt s3://${DataBucket}/input/test-file.txt
            
            # Download the file from S3
            aws s3 cp s3://${DataBucket}/input/test-file.txt /tmp/downloaded-file.txt
            
            # Modify the file
            echo "File was processed by AWS Batch job at $(date)" >> /tmp/downloaded-file.txt
            
            # Upload the modified file back to S3
            aws s3 cp /tmp/downloaded-file.txt s3://${DataBucket}/output/processed-file.txt
            
            echo "S3 file processing completed successfully!"
        Vcpus: 1
        Memory: 2000
        JobRoleArn: !GetAtt BatchJobRole.Arn
      RetryStrategy:
        Attempts: 2
      Tags:
        Name: !Sub ${EnvironmentName}-JobDefinition

Conditions:
  HasBucketName: !Not [!Equals [!Ref S3BucketName, '']]

Outputs:
  VpcId:
    Description: The ID of the VPC
    Value: !Ref BatchVPC

  SubnetId:
    Description: The ID of the subnet
    Value: !Ref PublicSubnet

  S3BucketName:
    Description: The name of the S3 bucket for data storage
    Value: !Ref DataBucket

  BatchComputeEnvironmentArn:
    Description: The ARN of the Batch Compute Environment
    Value: !Ref BatchComputeEnvironment

  BatchJobQueueArn:
    Description: The ARN of the Batch Job Queue
    Value: !Ref BatchJobQueue

  BatchJobDefinitionArn:
    Description: The ARN of the Batch Job Definition
    Value: !Ref BatchJobDefinition

  SubmitJobCommand:
    Description: Command to submit a job to the created job queue
    Value: !Sub |
      aws batch submit-job --job-name test-job --job-queue ${BatchJobQueue} --job-definition ${BatchJobDefinition}