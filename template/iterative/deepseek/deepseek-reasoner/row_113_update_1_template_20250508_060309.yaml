AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: DemoCLIEventTopic

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EventSNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EventSNSTopic

  EventBridgeDemoRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Route demo.cli events to SNS"
      EventPattern:
        source:
          - "demo.cli"
      State: ENABLED
      Targets:
        - Arn: !Ref EventSNSTopic
          Id: SNSTarget

Outputs:
  SNSArn:
    Description: "Created SNS Topic ARN"
    Value: !Ref EventSNSTopic
  EventRuleArn:
    Description: "EventBridge Rule ARN"
    Value: !GetAtt EventBridgeDemoRule.Arn