AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  StackNamespace:
    Type: String
    Default: myapp
  SecretUsername:
    Type: String
    Default: admin
  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues:
      - python3.12
      - nodejs20.x

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ConfigParameter1:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Join
        - '/'
        - - !Ref StackNamespace
          - 'config'
          - 'parameter1'
      Type: String
      Value: This is A/B

  ConfigParameter2:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Join
        - '/'
        - - !Ref StackNamespace
          - 'config'
          - 'parameter2'
      Type: String
      Value: Configuration value

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Join
        - '-'
        - - !Ref StackNamespace
          - 'secret'
      GenerateSecretString:
        GenerateStringKey: password
        ExcludeCharacters: '!@#$%^&*()'
        SecretStringTemplate: !Join
          - ''
          - - '{"username":"'
            - !Ref SecretUsername
            - '"}'

  ParameterFetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          ssm = boto3.client('ssm')
          secretsmanager = boto3.client('secretsmanager')

          def handler(event, context):
              # Fetch SSM parameters
              config_params = ssm.get_parameters_by_path(
                  Path=f'/{os.environ["STACK_NAMESPACE"]}/config/',
                  Recursive=False,
                  WithDecryption=False
              )

              # Fetch and decrypt Secrets Manager secret
              secret = secretsmanager.get_secret_value(
                  SecretId=os.environ['SECRET_NAME']
              )

              # Parse secret JSON
              secret_value = json.loads(secret['SecretString'])

              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'ssm_parameters': config_params,
                      'secret': secret_value
                  })
              }

      Environment:
        Variables:
          STACK_NAMESPACE: !Ref StackNamespace
          SECRET_NAME: !Ref AppSecret

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ParameterFetcherFunction.Arn
  SecretARN:
    Description: Secrets Manager Secret ARN
    Value: !Ref AppSecret
  ConfigParameter1ARN:
    Description: SSM Parameter 1 ARN
    Value: !Ref ConfigParameter1
  ConfigParameter2ARN:
    Description: SSM Parameter 2 ARN
    Value: !Ref ConfigParameter2