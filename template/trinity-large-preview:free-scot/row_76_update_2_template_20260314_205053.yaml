AWSTemplateFormatVersion: '2010-09-09'

Resources:
  SecurityAdmins:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
              AWS: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: PassRoleToWorkshopServices
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - arn:aws:iam::*:role/workshop-*
        - PolicyName: CreateServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'
        - PolicyName: CreateWorkshopRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateRole
                Resource: 'arn:aws:iam::*:role/workshop-*'

  Admins:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
              AWS: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'fis:*'
                Resource: '*'
        - PolicyName: DenyFISOnProd
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/Environment': 'prod'
        - PolicyName: PassRoleToWorkshopServices
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - arn:aws:iam::*:role/workshop-'

  Users:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
              AWS: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: FISExperimentActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                Resource: '*'
              - Effect: Allow
                Action:
                  - fis:List*
                  - fis:Get*
                Resource: '*'
        - PolicyName: FISTagging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - tag:GetResources
                  - tag:TagResources
                  - tag:UntagResources
                Resource: '*'
        - PolicyName: DenyFISOnProd
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:ResourceTag/Environment': 'prod'

  NonUsers:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ''
              AWS: ''
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: DenyAllFISActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: 'fis:*'
                Resource: '*'

Outputs:
  SecurityAdminsArn:
    Description: ARN of the Security Admins role
    Value: !GetAtt SecurityAdmins.Arn
  AdminsArn:
    Description: ARN of the Admins role
    Value: !GetAtt Admins.Arn
  UsersArn:
    Description: ARN of the Users role
    Value: !GetAtt Users.Arn
  NonUsersArn:
    Description: ARN of the Non-Users role
    Value: !GetAtt NonUsers.Arn