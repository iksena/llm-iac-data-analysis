AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  LogGroupName:
    Type: String
    Description: The name of the CloudWatch Logs group containing the VPC flow logs.
  DashboardName:
    Type: String
    Description: The name of the CloudWatch Dashboard to be created.

Resources:
  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "logs",
              "properties": {
                "view": "timeSeries",
                "title": "Top Source IPs by Outbound Traffic",
                "region": "${AWS::Region}",
                "logGroupNames": [
                  "${LogGroupName}"
                ],
                "query": "fields srcaddr, bytes | stats sum(bytes) by srcaddr | sort sum(bytes) desc | limit 10"
              }
            },
            {
              "type": "logs",
              "properties": {
                "view": "timeSeries",
                "title": "Rejected Connections",
                "region": "${AWS::Region}",
                "logGroupNames": [
                  "${LogGroupName}"
                ],
                "query": "fields srcaddr, dstaddr, action | filter action like 'REJECT' | stats count by srcaddr, dstaddr"
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: The URL of the created CloudWatch Dashboard.
    Value: !GetAtt CloudWatchDashboard.DashboardArn
    Export:
      Name: !Sub "${AWS::StackName}-DashboardURL"