AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS Region
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
  
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS Region
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
  
  PrimaryEndpoint:
    Type: String
    Description: Primary region application endpoint URL
    AllowedPattern: '^[a-zA-Z0-9.-]+$'
  
  SecondaryEndpoint:
    Type: String
    Description: Secondary region application endpoint URL
    AllowedPattern: '^[a-zA-Z0-9.-]+$'

Resources:
  RecoveryCluster:
    Type: 'AWS::Route53RecoveryControl::Cluster'
    Properties:
      Name: !Sub '${AWS::StackName}-cluster'

  ControlPanel:
    Type: 'AWS::Route53RecoveryControl::ControlPanel'
    Properties:
      Name: !Sub '${AWS::StackName}-control-panel'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn

  PrimaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${AWS::StackName}-primary-control'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SecondaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${AWS::StackName}-secondary-control'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  MinimumHealthyRule:
    Type: 'AWS::Route53RecoveryControl::SafetyRule'
    Properties:
      Name: !Sub '${AWS::StackName}-minimum-healthy-rule'
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST
      AssertionRule:
        AssertedControls:
          - !GetAtt PrimaryRoutingControl.RoutingControlArn
          - !GetAtt SecondaryRoutingControl.RoutingControlArn
        WaitPeriodMs: 5000

  PrimaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-primary-health-check'

  SecondaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-secondary-health-check'

Outputs:
  ClusterArn:
    Description: Recovery Cluster ARN
    Value: !GetAtt RecoveryCluster.ClusterArn

  ControlPanelArn:
    Description: Control Panel ARN
    Value: !GetAtt ControlPanel.ControlPanelArn

  PrimaryRoutingControlArn:
    Description: Primary Routing Control ARN
    Value: !GetAtt PrimaryRoutingControl.RoutingControlArn

  SecondaryRoutingControlArn:
    Description: Secondary Routing Control ARN
    Value: !GetAtt SecondaryRoutingControl.RoutingControlArn

  PrimaryHealthCheckId:
    Description: Primary Health Check ID
    Value: !Ref PrimaryHealthCheck

  SecondaryHealthCheckId:
    Description: Secondary Health Check ID
    Value: !Ref SecondaryHealthCheck