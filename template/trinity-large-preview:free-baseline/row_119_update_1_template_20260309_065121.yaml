AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge-to-Kinesis integration for real-time event streaming

Parameters:
  EventBusName:
    Type: String
    Default: my-application-events
    Description: Name of the EventBridge event bus
  KinesisStreamName:
    Type: String
    Default: my-application-events-stream
    Description: Name of the Kinesis data stream
  KinesisShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis stream

Resources:
  EventBridgeEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Ref EventBusName

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref KinesisShardCount

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeToKinesisPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: kinesis:PutRecord
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeKinesisPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: kinesis:PutRecord
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeEventBus.Arn
      FunctionName: !GetAtt KinesisStream.Arn

Outputs:
  EventBusArn:
    Description: EventBridge event bus ARN
    Value: !GetAtt EventBridgeEventBus.Arn
  KinesisStreamArn:
    Description: Kinesis stream ARN
    Value: !GetAtt KinesisStream.Arn