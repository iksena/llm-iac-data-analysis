AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with secure role-based access controls and cross-account trust configurations'

Parameters:
  IdentityManagementAccountId:
    Type: String
    Description: AWS Account ID of the Identity Management Account
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID

  ToolingManagementAccountId:
    Type: String
    Description: AWS Account ID of the Tooling Management Account
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID

Resources:
  # IAM Groups
  PrivilegedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdminGroup
      Path: /

  RestrictedAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdminGroup
      Path: /

  IdentityAdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdminGroup
      Path: /

  # Explicit Deny Policy for Sensitive Operations
  SensitiveOperationsDenyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy to explicitly deny sensitive operations
      ManagedPolicyName: SensitiveOperationsDenyPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyBillingOperations
            Effect: Deny
            Action:
              - aws-portal:ModifyAccount
              - aws-portal:ModifyBilling
              - aws-portal:ModifyPaymentMethods
            Resource: '*'
          - Sid: DenyCloudHSMOperations
            Effect: Deny
            Action:
              - cloudhsm:*
            Resource: '*'
          - Sid: DenyOrganizationOperations
            Effect: Deny
            Action:
              - organizations:LeaveOrganization
              - organizations:DeleteOrganization
              - organizations:CloseAccount
            Resource: '*'

  # Custom Policies
  RestrictedAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for restricted admin access
      ManagedPolicyName: RestrictedAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ec2:*
              - s3:*
              - rds:*
              - dynamodb:*
              - lambda:*
              - cloudwatch:*
              - logs:*
              - sns:*
              - sqs:*
              - iam:Get*
              - iam:List*
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:Create*
              - iam:Delete*
              - iam:Update*
              - iam:Put*
              - iam:Attach*
              - iam:Detach*
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for identity administration
      ManagedPolicyName: IdentityAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:*
              - organizations:DescribeOrganization
              - organizations:DescribeAccount
              - organizations:ListAccounts
              - organizations:ListAccountsForParent
              - organizations:ListChildren
              - organizations:ListOrganizationalUnitsForParent
              - organizations:ListParents
              - organizations:ListRoots
            Resource: '*'
          - Effect: Deny
            Action:
              - iam:CreateAccessKey
              - iam:DeleteAccessKey
              - iam:UpdateAccessKey
              - iam:CreateLoginProfile
              - iam:DeleteLoginProfile
              - iam:UpdateLoginProfile
            Resource: 
              Fn::Sub: 'arn:aws:iam::${AWS::AccountId}:user/Admin'

  CloudFormationExecutionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for CloudFormation execution
      ManagedPolicyName: CloudFormationExecutionPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:ListStacks
              - cloudformation:ListStackResources
            Resource: '*'
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: '*'
            Condition:
              StringEquals:
                iam:PassedToService: cloudformation.amazonaws.com

  # IAM Roles
  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
        - Ref: SensitiveOperationsDenyPolicy
      Path: /

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
        - Ref: RestrictedAdminPolicy
        - Ref: SensitiveOperationsDenyPolicy
      Path: /

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: 'arn:aws:iam::${IdentityManagementAccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - Ref: IdentityAdminPolicy
        - Ref: SensitiveOperationsDenyPolicy
      Path: /

  # CloudFormation Execution Roles
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: 'arn:aws:iam::${ToolingManagementAccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - Ref: CloudFormationExecutionPolicy
      Path: /

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: 
                Fn::Sub: 'arn:aws:iam::${ToolingManagementAccountId}:role/AWSCloudFormationStackSetExecutionRole'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Path: /

  # Group Policies for Role Assumption
  PrivilegedAdminGroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminGroupPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Resource: 
              Fn::GetAtt: [PrivilegedAdminRole, Arn]
      Groups:
        - Ref: PrivilegedAdminGroup

  RestrictedAdminGroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminGroupPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Resource: 
              Fn::GetAtt: [RestrictedAdminRole, Arn]
      Groups:
        - Ref: RestrictedAdminGroup

  IdentityAdminGroupPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminGroupPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Resource: 
              Fn::GetAtt: [IdentityAdminRole, Arn]
      Groups:
        - Ref: IdentityAdminGroup

  # MFA Management Policies
  PrivilegedAdminGroupMFAPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminGroupMFAPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:GetAccountPasswordPolicy
              - iam:GetAccountSummary
              - iam:ListVirtualMFADevices
              - iam:CreateVirtualMFADevice
              - iam:DeleteVirtualMFADevice
              - iam:DeactivateMFADevice
              - iam:EnableMFADevice
              - iam:ListMFADevices
              - iam:ResyncMFADevice
            Resource: '*'
      Groups:
        - Ref: PrivilegedAdminGroup

  RestrictedAdminGroupMFAPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminGroupMFAPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:GetAccountPasswordPolicy
              - iam:GetAccountSummary
              - iam:ListVirtualMFADevices
              - iam:CreateVirtualMFADevice
              - iam:DeleteVirtualMFADevice
              - iam:DeactivateMFADevice
              - iam:EnableMFADevice
              - iam:ListMFADevices
              - iam:ResyncMFADevice
            Resource: '*'
      Groups:
        - Ref: RestrictedAdminGroup

  IdentityAdminGroupMFAPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminGroupMFAPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:GetAccountPasswordPolicy
              - iam:GetAccountSummary
              - iam:ListVirtualMFADevices
              - iam:CreateVirtualMFADevice
              - iam:DeleteVirtualMFADevice
              - iam:DeactivateMFADevice
              - iam:EnableMFADevice
              - iam:ListMFADevices
              - iam:ResyncMFADevice
            Resource: '*'
      Groups:
        - Ref: IdentityAdminGroup

Outputs:
  PrivilegedAdminRoleARN:
    Description: ARN of the Privileged Admin Role
    Value: 
      Fn::GetAtt: [PrivilegedAdminRole, Arn]

  RestrictedAdminRoleARN:
    Description: ARN of the Restricted Admin Role
    Value: 
      Fn::GetAtt: [RestrictedAdminRole, Arn]

  IdentityAdminRoleARN:
    Description: ARN of the Identity Admin Role
    Value: 
      Fn::GetAtt: [IdentityAdminRole, Arn]

  CloudFormationExecutionRoleARN:
    Description: ARN of the CloudFormation Execution Role
    Value: 
      Fn::GetAtt: [CloudFormationExecutionRole, Arn]

  StackSetExecutionRoleARN:
    Description: ARN of the StackSet Execution Role
    Value: 
      Fn::GetAtt: [StackSetExecutionRole, Arn]