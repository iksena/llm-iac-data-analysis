AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for secure REST API Gateway integrated with DynamoDB for music data management

Resources:
  MusicTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Music
      KeySchema:
        - AttributeName: Artist
          KeyType: HASH
        - AttributeName: SongTitle
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: Artist
          AttributeType: S
        - AttributeName: SongTitle
          AttributeType: S
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: Artist-Index
          KeySchema:
            - AttributeName: Artist
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      SSESpecification:
        SSEEnabled: true

  DynamoDBIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  Fn::GetAtt:
                    - MusicTable
                    - Arn

  MusicAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: MusicAPI
      Description: API for managing music data

  MusicResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId:
        Fn::GetAtt:
          - MusicAPI
          - RootResourceId
      PathPart: music
      RestApiId:
        Ref: MusicAPI

  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: POST
      ResourceId:
        Ref: MusicResource
      RestApiId:
        Ref: MusicAPI
      AuthorizationType: AWS_IAM
      ApiKeyRequired: true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri:
          Fn::Join:
            - ''
            - - 'arn:aws:apigateway:'
              - Ref: AWS::Region
              - ':dynamodb:action/PutItem'
        Credentials:
          Fn::GetAtt:
            - DynamoDBIAMRole
            - Arn
        RequestParameters:
          'integration.request.header.Content-Type': '''application/x-amz-json-1.0'''
        RequestTemplates:
          application/json:
            Fn::Join:
              - ''
              - - "{\n"
                - "  \"TableName\": \"Music\",\n"
                - "  \"Item\": {\n"
                - "    \"Artist\": { \"S\": $input.json('$.artist') },\n"
                - "    \"SongTitle\": { \"S\": $input.json('$.songTitle') },\n"
                - "    \"Album\": { \"S\": $input.json('$.album') }\n"
                - "  }\n"
                - "}\n"
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: "{\n  \"status\": \"success\"\n}"

  GetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: GET
      ResourceId:
        Ref: MusicResource
      RestApiId:
        Ref: MusicAPI
      AuthorizationType: AWS_IAM
      ApiKeyRequired: true
      RequestParameters:
        'method.request.querystring.artist': true
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri:
          Fn::Join:
            - ''
            - - 'arn:aws:apigateway:'
              - Ref: AWS::Region
              - ':dynamodb:action/Query'
        Credentials:
          Fn::GetAtt:
            - DynamoDBIAMRole
            - Arn
        RequestParameters:
          'integration.request.header.Content-Type': '''application/x-amz-json-1.0'''
          'integration.request.header.X-Amz-Target': '''DynamoDB_20120810.Query'''
        RequestTemplates:
          application/json:
            Fn::Join:
              - ''
              - - "{\n"
                - "  \"TableName\": \"Music\",\n"
                - "  \"IndexName\": \"Artist-Index\",\n"
                - "  \"KeyConditionExpression\": \"Artist = :artist\",\n"
                - "  \"ExpressionAttributeValues\": {\n"
                - "    \":artist\": { \"S\": \"$input.params('artist')\" }\n"
                - "  }\n"
                - "}\n"
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: "#set($inputRoot = $input.path('$'))\n{\n  \"items\": [\n    #foreach($item in $inputRoot.Items)\n      {\n        \"artist\": \"$item.Artist.S\",\n        \"songTitle\": \"$item.SongTitle.S\",\n        \"album\": \"$item.Album.S\"\n      }#if($foreach.hasNext),#end\n    #end\n  ]\n}"

  APIKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: MusicAPIAccessKey
      Description: API key for Music API access

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      ApiStages:
        - ApiId:
            Ref: MusicAPI
          Stage:
            Ref: Stage
      Throttle:
        BurstLimit: 100
        RateLimit: 50

  Deployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostMethod
      - GetMethod
    Properties:
      RestApiId:
        Ref: MusicAPI
      Description: Deployment of Music API

  Stage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId:
        Ref: Deployment
      RestApiId:
        Ref: MusicAPI
      StageName: prod
      Description: Production stage for Music API

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId:
        Ref: APIKey
      KeyType: API_KEY
      UsagePlanId:
        Ref: UsagePlan

Outputs:
  MusicAPIEndpoint:
    Description: API Gateway endpoint URL for Music API
    Value:
      Fn::Join:
        - ''
        - - 'https://'
          - Ref: MusicAPI
          - '.execute-api.'
          - Ref: AWS::Region
          - '.amazonaws.com/prod/music'
  MusicAPIAccessKey:
    Description: API Key for accessing the Music API
    Value:
      Ref: APIKey