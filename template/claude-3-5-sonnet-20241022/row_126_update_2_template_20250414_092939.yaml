AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway integrated with Kinesis Data Streams for streaming data ingestion'

Parameters:
  KinesisStreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    Default: 'streaming-data'
  
  ApiStageName:
    Type: String
    Description: Name of the API Gateway stage
    Default: 'prod'
    
  RetentionPeriod:
    Type: Number
    Description: Data retention period in hours (24-168)
    Default: 24
    MinValue: 24
    MaxValue: 168
    
  ShardCount:
    Type: Number
    Description: Number of shards for the Kinesis stream
    Default: 1
    MinValue: 1

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      RetentionPeriodHours: !Ref RetentionPeriod
      ShardCount: !Ref ShardCount
      StreamEncryption:
        EncryptionType: KMS
        KeyId: alias/aws/kinesis

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Policies:
        - PolicyName: KinesisAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisStreamingAPI
      Description: API Gateway for Kinesis Data Streams integration
      EndpointConfiguration:
        Types:
          - REGIONAL

  RecordsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: records

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${KinesisStreamName}",
              "Data": "$util.base64Encode($input.body)",
              "PartitionKey": "$input.path('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '{"message": "Record inserted successfully"}'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RecordsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseTemplates:
              application/json: '$input.json("$")'
      MethodResponses:
        - StatusCode: '200'
          ResponseModels:
            application/json: 'Empty'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PutRecordMethod
      - GetRecordsMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref ApiDeployment
      RestApiId: !Ref RestApi
      StageName: !Ref ApiStageName

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}
  
  KinesisStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn
  
  ApiGatewayRoleArn:
    Description: ARN of the API Gateway IAM Role
    Value: !GetAtt ApiGatewayRole.Arn