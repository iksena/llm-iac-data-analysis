AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for a cross-account private API Gateway integrated with a Lambda function.
  The API is restricted via a specified VPC endpoint and secured with a custom domain.
  
Parameters:
  VpcEndpointId:
    Type: String
    Description: "The valid VPC Endpoint ID allowed to access the private API Gateway."
    Default: "vpce-0123456789abcdef0"  # Replace with a valid VPC Endpoint ID
  CustomDomainName:
    Type: String
    Description: "The custom domain name for the API Gateway (must be unique and not already in use)."
    Default: "api.example.com"  # Replace with your custom domain name
  CertificateArn:
    Type: String
    Description: "The ARN of the ACM certificate for the custom domain."
    Default: "arn:aws:acm:us-east-1:123456789012:certificate/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"  # Replace with your certificate ARN
  LambdaHandler:
    Type: String
    Default: "index.lambda_handler"
    Description: "Lambda function handler."
  LambdaRuntime:
    Type: String
    Default: "python3.12"
    Description: "Runtime environment for the Lambda function."
  LambdaTimeout:
    Type: Number
    Default: 10
    Description: "Timeout (in seconds) for the Lambda function."

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "LambdaExecutionRoleForPrivateAPIGateway"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: "LambdaBasicExecution"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: "PrivateAPILambdaFunction"
      Handler: !Ref LambdaHandler
      Runtime: !Ref LambdaRuntime
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: !Ref LambdaTimeout
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Hello from Lambda behind Private API Gateway"
              }

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "PrivateAPIWithLambda"
      EndpointConfiguration:
        Types:
          - "PRIVATE"
        VpcEndpointIds:
          - !Ref VpcEndpointId
      Policy:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": "*",
                  "Action": "execute-api:Invoke",
                  "Resource": "arn:aws:execute-api:${Region}:${AccountId}:*/*",
                  "Condition": {
                    "StringEquals": {
                      "aws:SourceVpce": "${VpcEndpointId}"
                    }
                  }
                }
              ]
            }
          - Region: !Ref "AWS::Region"
            AccountId: !Ref "AWS::AccountId"
            VpcEndpointId: !Ref VpcEndpointId

  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: "lambda"

  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: "GET"
      AuthorizationType: "NONE"
      Integration:
        Type: "AWS_PROXY"
        IntegrationHttpMethod: "POST"
        Uri:
          Fn::Join:
            - ""
            - - "arn:aws:apigateway:"
              - !Ref "AWS::Region"
              - ":lambda:path/2015-03-31/functions/"
              - !GetAtt LambdaFunction.Arn
              - "/invocations"
      MethodResponses:
        - StatusCode: "200"

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: "prod"
      DeploymentId: !Ref ApiGatewayDeployment
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayDomainName:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Ref CustomDomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types:
          - "REGIONAL"
      SecurityPolicy: "TLS_1_2"

  ApiGatewayBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiGatewayDomainName
      RestApiId: !Ref ApiGatewayRestApi
      Stage: "prod"

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceAccount: !Ref "AWS::AccountId"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/*/GET/lambda"

Outputs:
  ApiGatewayId:
    Description: "The ID of the API Gateway."
    Value: !Ref ApiGatewayRestApi
  ApiInvokeURL:
    Description: "The invoke URL of the API Gateway."
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  CustomDomainURL:
    Description: "The custom domain URL for the API Gateway."
    Value: !Sub "https://${CustomDomainName}/"
  LambdaFunctionARN:
    Description: "ARN of the Lambda function."
    Value: !GetAtt LambdaFunction.Arn