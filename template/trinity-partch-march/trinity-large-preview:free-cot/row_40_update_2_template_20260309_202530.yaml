AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue

Parameters:
  QueueName:
    Type: String
    Default: MyFifoQueue.fifo
    Description: Name of the FIFO queue (must end with .fifo)
  ContentBasedDeduplication:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
    Description: Enables content-based deduplication for the FIFO queue
  DelaySeconds:
    Type: Number
    Default: 0
    Description: Delay for message processing in seconds
  MaximumMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes (256 KB default)
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Message retention period in seconds (4 days default)
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: Long polling wait time in seconds

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds

Outputs:
  QueueURL:
    Description: URL of the created SQS FIFO Queue
    Value: !Ref SQSQueue
  QueueARN:
    Description: ARN of the created SQS FIFO Queue
    Value: !GetAtt SQSQueue.Arn