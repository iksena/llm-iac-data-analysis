AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for account-wide IAM password policy with customizable security requirements'

Parameters:
  MinimumPasswordLength:
    Type: Number
    Default: 14
    MinValue: 8
    MaxValue: 128
    Description: Minimum length of IAM user passwords
    
  RequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one uppercase letter in IAM user passwords
    
  RequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one lowercase letter in IAM user passwords
    
  RequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one number in IAM user passwords
    
  RequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Require at least one non-alphanumeric character in IAM user passwords
    
  PasswordExpirationDays:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 365
    Description: Number of days before IAM user passwords expire
    
  PasswordReusePreventionCount:
    Type: Number
    Default: 24
    MinValue: 1
    MaxValue: 24
    Description: Number of previous passwords that users are prevented from reusing
    
  AllowUsersToChangePassword:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Allow users to change their own passwords
    
  EnablePermissionBoundary:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable IAM permission boundary for the Lambda execution role

Conditions:
  UsePermissionBoundary: !Equals [!Ref EnablePermissionBoundary, 'true']

Resources:
  # Permission Boundary (if enabled)
  PermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Condition: UsePermissionBoundary
    Properties:
      Description: Permission boundary for IAM password policy management
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:GetAccountPasswordPolicy
              - iam:UpdateAccountPasswordPolicy
              - iam:DeleteAccountPasswordPolicy
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: '*'

  # IAM Role for Lambda execution
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: 
        !If [UsePermissionBoundary, !Ref PermissionBoundary, !Ref "AWS::NoValue"]
      Policies:
        - PolicyName: IAMPasswordPolicyManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:GetAccountPasswordPolicy
                  - iam:UpdateAccountPasswordPolicy
                  - iam:DeleteAccountPasswordPolicy
                Resource: '*'

  # Lambda function to manage IAM password policy
  PasswordPolicyLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              logger.info('Received event: %s', event)
              
              # Initialize response data
              response_data = {}
              
              try:
                  # Get the IAM client
                  iam = boto3.client('iam')
                  
                  # If this is a CloudFormation custom resource event
                  if 'RequestType' in event:
                      request_type = event['RequestType']
                      
                      if request_type == 'Create' or request_type == 'Update':
                          # Apply password policy
                          apply_password_policy(iam, event)
                          response_data['Message'] = 'Password policy applied successfully'
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                      elif request_type == 'Delete':
                          # Consider whether to delete the password policy or leave it
                          # For safety, we'll leave it in place by default
                          response_data['Message'] = 'Password policy left in place after stack deletion'
                          cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  else:
                      # Direct invocation (e.g., from EventBridge)
                      apply_password_policy(iam, event)
                      return {
                          'statusCode': 200,
                          'body': 'Password policy applied successfully'
                      }
                      
              except Exception as e:
                  logger.error('Error: %s', str(e))
                  if 'RequestType' in event:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
                  return {
                      'statusCode': 500,
                      'body': f'Error applying password policy: {str(e)}'
                  }
          
          def apply_password_policy(iam, event):
              # Extract parameters from the event
              if 'ResourceProperties' in event:
                  props = event['ResourceProperties']
              else:
                  props = event
                  
              # Convert string boolean parameters to actual booleans
              require_uppercase = props.get('RequireUppercase', 'true').lower() == 'true'
              require_lowercase = props.get('RequireLowercase', 'true').lower() == 'true'
              require_numbers = props.get('RequireNumbers', 'true').lower() == 'true'
              require_symbols = props.get('RequireSymbols', 'true').lower() == 'true'
              allow_users_to_change = props.get('AllowUsersToChangePassword', 'true').lower() == 'true'
              
              # Convert numeric parameters to integers
              min_length = int(props.get('MinimumPasswordLength', 14))
              max_age = int(props.get('PasswordExpirationDays', 90))
              reuse_prevention = int(props.get('PasswordReusePreventionCount', 24))
              
              # Update the account password policy
              logger.info('Applying password policy with parameters: %s', props)
              iam.update_account_password_policy(
                  MinimumPasswordLength=min_length,
                  RequireSymbols=require_symbols,
                  RequireNumbers=require_numbers,
                  RequireUppercaseCharacters=require_uppercase,
                  RequireLowercaseCharacters=require_lowercase,
                  AllowUsersToChangePassword=allow_users_to_change,
                  MaxPasswordAge=max_age,
                  PasswordReusePrevention=reuse_prevention
              )
              logger.info('Password policy applied successfully')

  # Custom resource to apply password policy on stack creation/update
  PasswordPolicyCustomResource:
    Type: Custom::PasswordPolicy
    Properties:
      ServiceToken: !GetAtt PasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref MinimumPasswordLength
      RequireUppercase: !Ref RequireUppercase
      RequireLowercase: !Ref RequireLowercase
      RequireNumbers: !Ref RequireNumbers
      RequireSymbols: !Ref RequireSymbols
      PasswordExpirationDays: !Ref PasswordExpirationDays
      PasswordReusePreventionCount: !Ref PasswordReusePreventionCount
      AllowUsersToChangePassword: !Ref AllowUsersToChangePassword

  # CloudWatch Events rule to periodically enforce password policy
  PasswordPolicyEnforcementRule:
    Type: AWS::Events::Rule
    Properties:
      Description: 'Periodically enforces IAM password policy'
      ScheduleExpression: 'rate(1 day)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt PasswordPolicyLambda.Arn
          Id: PasswordPolicyTarget
          Input: !Sub |
            {
              "MinimumPasswordLength": "${MinimumPasswordLength}",
              "RequireUppercase": "${RequireUppercase}",
              "RequireLowercase": "${RequireLowercase}",
              "RequireNumbers": "${RequireNumbers}",
              "RequireSymbols": "${RequireSymbols}",
              "PasswordExpirationDays": "${PasswordExpirationDays}",
              "PasswordReusePreventionCount": "${PasswordReusePreventionCount}",
              "AllowUsersToChangePassword": "${AllowUsersToChangePassword}"
            }

  # Permission for CloudWatch Events to invoke Lambda
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PasswordPolicyLambda
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PasswordPolicyEnforcementRule.Arn

Outputs:
  PasswordPolicyStatus:
    Description: Status of the IAM password policy
    Value: 'Applied'
    
  LambdaFunctionArn:
    Description: ARN of the Lambda function managing the password policy
    Value: !GetAtt PasswordPolicyLambda.Arn
    
  LambdaExecutionRoleArn:
    Description: ARN of the IAM role used by the Lambda function
    Value: !GetAtt LambdaExecutionRole.Arn
    
  PermissionBoundaryArn:
    Description: ARN of the permission boundary (if enabled)
    Value: !If [UsePermissionBoundary, !Ref PermissionBoundary, 'Not enabled']