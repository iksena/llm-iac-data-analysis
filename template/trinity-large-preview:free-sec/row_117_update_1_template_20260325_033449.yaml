AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Parameters:
  TableName:
    Type: String
    Default: OrdersTable
  ReadCapacityUnits:
    Type: Number
    Default: 5
  WriteCapacityUnits:
    Type: Number
    Default: 5
  EventBusName:
    Type: String
    Default: OrdersEventBus

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgeBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: !Ref EventBusName

  InsertPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: InsertPipe
      Source:
        Type: DynamoDBStream
        SourceDynamoDBStream:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Type: EventBridgeEventBus
        TargetEventBridgeEventBus:
          EventBusName: !Ref EventBusName
      Filter:
        EventPattern:
          source:
            - dynamodb
          detail:
            operation:
              - INSERT
      RequestedPipeCapacity: 1
      StartPosition: TRIM_HORIZON

  ModifyPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: ModifyPipe
      Source:
        Type: DynamoDBStream
        SourceDynamoDBStream:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Target:
        Type: EventBridgeEventBus
        TargetEventBridgeEventBus:
          EventBusName: !Ref EventBusName
      Filter:
        EventPattern:
          source:
            - dynamodb
          detail:
            operation:
              - MODIFY
      RequestedPipeCapacity: 1
      StartPosition: TRIM_HORIZON

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusArn:
    Description: EventBridge Bus ARN
    Value: !GetAtt EventBridgeBus.Arn