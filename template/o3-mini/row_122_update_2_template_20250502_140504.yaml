AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for creating an EventBridge integration with Shopify's product creation API.
  It provisions an EventBridge event bus, a connection with API key authentication, an API destination targeting
  Shopify's product creation endpoint, and an event rule that triggers the API destination for events from source "MyShopifyApp".

Parameters:
  ShopifyAdminAPIKey:
    Description: "Shopify admin API key for authenticating API destination requests."
    Type: String
    NoEcho: true

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: "MyShopifyAppEventBus"

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: "ShopifyAPIConnection"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "X-Shopify-Access-Token"
          ApiKeyValue: !Ref ShopifyAdminAPIKey

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: "ShopifyProductCreationApiDestination"
      ConnectionArn: !GetAtt ShopifyConnection.ConnectionArn
      InvocationEndpoint: "https://testanu.myshopify.com/admin/api/products.json"
      HttpMethod: POST
      InvocationRateLimitPerSecond: 300
    DependsOn:
      - ShopifyConnection

  ShopifyIntegrationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "ShopifyProductCreationRule"
      Description: "Triggers the API destination when events from MyShopifyApp are captured."
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - "MyShopifyApp"
      Targets:
        - Id: "ShopifyProductCreationTarget"
          Arn: !GetAtt ShopifyApiDestination.ApiDestinationArn
    DependsOn:
      - ShopifyEventBus
      - ShopifyApiDestination

Outputs:
  EventBusArn:
    Description: "ARN of the custom EventBridge event bus used for Shopify integration."
    Value: !GetAtt ShopifyEventBus.Arn

  ApiDestinationArn:
    Description: "ARN of the API destination for Shopify product creation."
    Value: !GetAtt ShopifyApiDestination.ApiDestinationArn