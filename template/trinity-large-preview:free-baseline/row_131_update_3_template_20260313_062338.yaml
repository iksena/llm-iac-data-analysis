AWSTemplateFormatVersion: '2010-09-09'
Description: Centralized alerting system using Amazon SNS with configurable endpoints and retry policies.

Parameters:
  EmailEndpoint:
    Type: String
    Description: Email address for notifications (optional)
    Default: ''
  WebhookEndpoint:
    Type: String
    Description: HTTP/HTTPS URL for webhook notifications (optional)
    Default: ''
  FallbackEmail:
    Type: String
    Description: Fallback email address for delivery failures
    Default: 'fallback@example.com'

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralizedAlertingTopic
      DisplayName: Centralized Alerting Topic

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      FilterPolicy:
        attribute:
          service:
            - CloudWatch
            - RDS
            - S3
            - Budgets

  WebhookSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Endpoint: !Ref WebhookEndpoint
      Protocol: https
      FilterPolicy:
        attribute:
          service:
            - CloudWatch
            - RDS
            - S3
            - Budgets

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - budgets.amazonaws.com
                - cloudwatch.amazonaws.com
                - rds.amazonaws.com
                - s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
      Topics:
        - !Ref SNSTopic

  CloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: FailedNotificationsAlarm
      AlarmDescription: Alarm for failed notifications
      Namespace: AWS/SNS
      MetricName: NumberOfNotificationsFailed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref FallbackSNSTopic

  FallbackSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: FallbackAlertingTopic
      DisplayName: Fallback Alerting Topic
      Subscription:
        - Endpoint: !Ref FallbackEmail
          Protocol: email

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic
  SubscriptionEndpoints:
    Description: Subscription endpoints
    Value: !Join [', ', [!Ref EmailEndpoint, !Ref WebhookEndpoint]]