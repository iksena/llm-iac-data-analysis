AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for TodoApp Amplify Application'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !Ref AmplifyApp
      BranchName: production
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !Ref AmplifyApp

  AmplifyAppARN:
    Description: Amplify Application ARN
    Value: !GetAtt AmplifyApp.Arn

  DefaultDomain:
    Description: Default domain for the Amplify application
    Value: !Sub ${AmplifyApp}.amplifyapp.com

  ProductionBranchURL:
    Description: URL for the production branch
    Value: !Sub https://production.${AmplifyApp}.amplifyapp.com