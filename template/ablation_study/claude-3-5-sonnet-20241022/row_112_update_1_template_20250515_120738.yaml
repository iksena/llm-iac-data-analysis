AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for S3 bucket with SQS notification configuration'

Parameters:
  Environment:
    Type: String
    Default: 'production'
    Description: 'Environment name for resource tagging'
    AllowedValues:
      - 'development'
      - 'staging'
      - 'production'

Resources:
  NotificationQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Sub '${AWS::StackName}-s3-notifications'
      VisibilityTimeout: 300
      MessageRetentionPeriod: 345600
      KmsMasterKeyId: 'alias/aws/sqs'
      Tags:
        - Key: Environment
          Value: !Ref Environment

  QueuePolicy:
    Type: 'AWS::SQS::QueuePolicy'
    Properties:
      Queues:
        - !Ref NotificationQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 's3.amazonaws.com'
            Action:
              - 'sqs:SendMessage'
            Resource: !GetAtt NotificationQueue.Arn
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:s3:::${AWS::StackName}-bucket'
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'

  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${AWS::StackName}-bucket'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'AES256'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: 's3:ObjectCreated:*'
            Queue: !GetAtt NotificationQueue.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BucketName:
    Description: 'Name of the created S3 bucket'
    Value: !Ref S3Bucket

  BucketARN:
    Description: 'ARN of the created S3 bucket'
    Value: !GetAtt S3Bucket.Arn

  QueueURL:
    Description: 'URL of the created SQS queue'
    Value: !Ref NotificationQueue

  QueueARN:
    Description: 'ARN of the created SQS queue'
    Value: !GetAtt NotificationQueue.Arn