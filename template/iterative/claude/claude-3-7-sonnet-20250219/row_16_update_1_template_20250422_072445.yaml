AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to create AWS Glue resources for crawling and cataloging CloudTrail logs'

Parameters:
  S3BucketName:
    Type: String
    Default: 'kk-admin'
    Description: 'Name of the S3 bucket containing CloudTrail logs'

  S3BucketPrefix:
    Type: String
    Default: 'cloud-trail/AWSLogs/'
    Description: 'Prefix path in the S3 bucket where CloudTrail logs are stored'

  GlueDatabaseName:
    Type: String
    Default: 'cloudtrail_logs'
    Description: 'Name of the AWS Glue database to be created'

  CrawlerNamePrefix:
    Type: String
    Default: 'cloudtrail'
    Description: 'Prefix for the AWS Glue crawler name'

  TablePrefix:
    Type: String
    Default: 'cloudtrail_'
    Description: 'Prefix for the table names created by the crawler'

Resources:
  GlueServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole'
      Path: '/service-role/'

  GlueServicePolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: GlueS3CloudTrailAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:GetObject'
              - 's3:ListBucket'
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'
      Roles:
        - !Ref GlueServiceRole

  GlueDatabase:
    Type: 'AWS::Glue::Database'
    Properties:
      CatalogId: !Ref 'AWS::AccountId'
      DatabaseInput:
        Name: !Ref GlueDatabaseName
        Description: 'Database for CloudTrail logs analysis'

  GlueCrawler:
    Type: 'AWS::Glue::Crawler'
    Properties:
      Name: !Sub '${CrawlerNamePrefix}-crawler'
      Role: !GetAtt GlueServiceRole.Arn
      DatabaseName: !Ref GlueDatabase
      Description: 'Crawler for CloudTrail logs in S3'
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/${S3BucketPrefix}'
      SchemaChangePolicy:
        UpdateBehavior: 'UPDATE_IN_DATABASE'
        DeleteBehavior: 'LOG'
      Configuration: '{"Version":1.0,"CrawlerOutput":{"Tables":{"AddOrUpdateBehavior":"MergeNewColumns","TableThreshold":1000}},"Grouping":{"TableGroupingPolicy":"CombineCompatibleSchemas"}}'
      TablePrefix: !Ref TablePrefix
      Schedule:
        ScheduleExpression: 'cron(0 0 * * ? *)'  # Run daily at midnight UTC
      RecrawlPolicy:
        RecrawlBehavior: 'CRAWL_EVERYTHING'

Outputs:
  GlueDatabaseName:
    Description: 'Name of the AWS Glue database'
    Value: !Ref GlueDatabase

  GlueCrawlerName:
    Description: 'Name of the AWS Glue crawler'
    Value: !Ref GlueCrawler

  AthenaQueryExample:
    Description: 'Example Athena query to get started'
    Value: !Sub 'SELECT * FROM "${GlueDatabaseName}"."${TablePrefix}cloudtrail" LIMIT 10;'