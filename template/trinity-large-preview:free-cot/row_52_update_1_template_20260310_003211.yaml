AWSTemplateFormatVersion: '2010-09-09'
Description: Multi-Region Application Failover Architecture with Route 53 ARC

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary region for application deployment
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary region for application deployment
  VpcCidrPrimary:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for primary region VPC
  VpcCidrSecondary:
    Type: String
    Default: 10.1.0.0/16
    Description: CIDR block for secondary region VPC
  ApplicationHealthCheckEndpoint:
    Type: String
    Default: /health
    Description: Health check endpoint path
  HealthCheckPort:
    Type: Number
    Default: 443
    Description: Port for health checks

Resources:
  # Recovery Cluster
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: MultiRegionRecoveryCluster
      Tags:
        - Key: Environment
          Value: Production
        - Key: Application
          Value: MultiRegionApp
        - Key: Owner
          Value: DevOpsTeam

  # Control Panel
  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: ApplicationControlPanel
      RecoveryClusterArn: !GetAtt RecoveryCluster.ClusterArn
      Tags:
        - Key: Environment
          Value: Production
        - Key: Application
          Value: MultiRegionApp
        - Key: Owner
          Value: DevOpsTeam

  # Primary Region Routing Control
  PrimaryRegionControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: PrimaryRegionControl
      Status: Enabled

  # Secondary Region Routing Control
  SecondaryRegionControl:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Name: SecondaryRegionControl
      Status: Enabled

  # Safety Rule - At Least One Region Active
  MinimumOneRegionActiveRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: MinimumOneRegionActive
      Description: Ensures at least one region remains active
      SafetyRuleConfig:
        Status: ENABLED
        Type: ATLEAST
        Threshold: 1
        RoutingControlArnList:
          - !GetAtt PrimaryRegionControl.RoutingControlArn
          - !GetAtt SecondaryRegionControl.RoutingControlArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  # Primary Region Health Check
  PrimaryRegionHealthCheck:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        ResourcePath: !Ref ApplicationHealthCheckEndpoint
        FailureThreshold: 3
        SuccessThreshold: 2
        Port: !Ref HealthCheckPort
      RoutingControlArn: !GetAtt PrimaryRegionControl.RoutingControlArn
      SafetyRules:
        - !GetAtt MinimumOneRegionActiveRule.SafetyRuleArn

  # Secondary Region Health Check
  SecondaryRegionHealthCheck:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        ResourcePath: !Ref ApplicationHealthCheckEndpoint
        FailureThreshold: 3
        SuccessThreshold: 2
        Port: !Ref HealthCheckPort
      RoutingControlArn: !GetAtt SecondaryRegionControl.RoutingControlArn
      SafetyRules:
        - !GetAtt MinimumOneRegionActiveRule.SafetyRuleArn

  # Primary Region VPC
  PrimaryVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrPrimary
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: PrimaryRegionVPC

  # Secondary Region VPC
  SecondaryVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrSecondary
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: SecondaryRegionVPC

  # Primary Region Internet Gateway
  PrimaryInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: PrimaryRegionIGW

  # Secondary Region Internet Gateway
  SecondaryInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SecondaryRegionIGW

  # VPC Gateway Attachment for Primary Region
  PrimaryVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref PrimaryVPC
      InternetGatewayId: !Ref PrimaryInternetGateway

  # VPC Gateway Attachment for Secondary Region
  SecondaryVPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SecondaryVPC
      InternetGatewayId: !Ref SecondaryInternetGateway

  # Primary Region Route Table
  PrimaryRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref PrimaryVPC
      Tags:
        - Key: Name
          Value: PrimaryRegionRouteTable

  # Secondary Region Route Table
  SecondaryRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SecondaryVPC
      Tags:
        - Key: Name
          Value: SecondaryRegionRouteTable

  # Default Route for Primary Region
  PrimaryDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrimaryRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref PrimaryInternetGateway

  # Default Route for Secondary Region
  SecondaryDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SecondaryRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref SecondaryInternetGateway

  # Primary Region Subnet
  PrimarySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref PrimaryVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs !Ref PrimaryRegion]
      Tags:
        - Key: Name
          Value: PrimaryRegionSubnet

  # Secondary Region Subnet
  SecondarySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SecondaryVPC
      CidrBlock: 10.1.1.0/24
      AvailabilityZone: !Select [0, !GetAZs !Ref SecondaryRegion]
      Tags:
        - Key: Name
          Value: SecondaryRegionSubnet

  # Primary Region Subnet Route Table Association
  PrimarySubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrimarySubnet
      RouteTableId: !Ref PrimaryRouteTable

  # Secondary Region Subnet Route Table Association
  SecondarySubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SecondarySubnet
      RouteTableId: !Ref SecondaryRouteTable

  # Primary Region Security Group
  PrimarySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: PrimaryRegionSecurityGroup
      GroupDescription: Security group for primary region
      VpcId: !Ref PrimaryVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: PrimaryRegionSG

  # Secondary Region Security Group
  SecondarySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: SecondaryRegionSecurityGroup
      GroupDescription: Security group for secondary region
      VpcId: !Ref SecondaryVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SecondaryRegionSG

  # Primary Region Application Instance
  PrimaryApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: default-key
      SubnetId: !Ref PrimarySubnet
      SecurityGroupIds:
        - !Ref PrimarySecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "Primary Region Application" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: PrimaryRegionAppInstance

  # Secondary Region Application Instance
  SecondaryApplicationInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: t3.micro
      KeyName: default-key
      SubnetId: !Ref SecondarySubnet
      SecurityGroupIds:
        - !Ref SecondarySecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "Secondary Region Application" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: SecondaryRegionAppInstance

Outputs:
  RecoveryClusterArn:
    Description: ARN of the recovery cluster
    Value: !GetAtt RecoveryCluster.ClusterArn
  ControlPanelArn:
    Description: ARN of the control panel
    Value: !GetAtt ControlPanel.ControlPanelArn
  PrimaryRegionControlArn:
    Description: ARN of the primary region routing control
    Value: !GetAtt PrimaryRegionControl.RoutingControlArn
  SecondaryRegionControlArn:
    Description: ARN of the secondary region routing control
    Value: !GetAtt SecondaryRegionControl.RoutingControlArn
  PrimaryRegionHealthCheckArn:
    Description: ARN of the primary region health check
    Value: !GetAtt PrimaryRegionHealthCheck.HealthCheckArn
  SecondaryRegionHealthCheckArn:
    Description: ARN of the secondary region health check
    Value: !GetAtt SecondaryRegionHealthCheck.HealthCheckArn
  PrimaryVPCId:
    Description: ID of the primary region VPC
    Value: !Ref PrimaryVPC
  SecondaryVPCId:
    Description: ID of the secondary region VPC
    Value: !Ref SecondaryVPC
  PrimaryApplicationInstanceId:
    Description: ID of the primary region application instance
    Value: !Ref PrimaryApplicationInstance
  SecondaryApplicationInstanceId:
    Description: ID of the secondary region application instance
    Value: !Ref SecondaryApplicationInstance