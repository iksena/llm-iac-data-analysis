AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for EC2 instances with read-only IAM metadata access
Resources:
  EC2IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /

  IAMReadOnlyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:Get*
              - iam:List*
            Resource: '*'
      Roles:
        - !Ref EC2IAMRole

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2IAMRole

Outputs:
  RoleArn:
    Value: !GetAtt EC2IAMRole.Arn
  InstanceProfileArn:
    Value: !GetAtt EC2InstanceProfile.Arn