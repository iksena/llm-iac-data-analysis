AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MacieSession:
    Type: AWS::Macie2::Session
    Properties:
      Status: 'ENABLED'
Outputs:
  SessionArn:
    Description: 'ARN of the created Macie session'
    Value: !GetAtt MacieSession.Arn
  SessionId:
    Description: 'ID of the created Macie session'
    Value: !GetAtt MacieSession.Id