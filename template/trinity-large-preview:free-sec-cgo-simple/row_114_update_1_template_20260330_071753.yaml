AWSTemplateFormatVersion: '2010-09-09'
Description: AWS B2B Data Interchange pipeline for EDI X12_214 to JSON transformation

Parameters:
  ProfileName:
    Type: String
    Default: DefaultProfile
    Description: Name of the B2BI profile
  ContactName:
    Type: String
    Default: Default Contact
    Description: Business contact name
  ContactEmail:
    Type: String
    Default: contact@example.com
    Description: Business contact email
  ContactPhone:
    Type: String
    Default: +1234567890
    Description: Business contact phone number
  InputBucketName:
    Type: String
    Default: edi-input-bucket
    Description: Name of the input S3 bucket for EDI files
  OutputBucketName:
    Type: String
    Default: json-output-bucket
    Description: Name: of the output S3 bucket for JSON files

Resources:
  B2BIPipelineProfile:
    Type: AWS::B2BDataInterchange::Profile
    Properties:
      Name: !Ref ProfileName
      BusinessContact:
        Name: !Ref ContactName
        Email: !Ref ContactEmail
        Phone: !Ref ContactPhone
      Description: Profile for EDI X12_214 to JSON transformation

  EDIToJSONTransformer:
    Type: AWS::B2BDataInterchange::Transformer
    Properties:
      Name: EDI214ToJSONTransformer
      ProfileId: !Ref B2BIPipelineProfile
      Description: Transformer for converting EDI X12_214 to JSON
      MappingLogic: |
        {
          "type": "X12_214",
          "outputFormat": "JSON",
          "mappingRules": [
            {
              "source": "ST",
              "target": "transaction"
            },
            {
              "source": "B10",
              "target": "carrierDetails"
            }
          ]
        }

  InputEDIBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OutputJSONBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OutputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  B2BIServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: b2bi.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: B2BIS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${InputEDIBucket}'
                  - !Sub 'arn:aws:s3:::${InputEDIBucket}/*'
                  - !Sub 'arn:aws:s3:::${OutputJSONBucket}'
                  - !Sub 'arn:aws:s3:::${OutputJSONBucket}/*'

  B2BIPipeline:
    Type: AWS::B2BDataInterchange::Pipeline
    Properties:
      Name: EDI214ToJSONPipeline
      ProfileId: !Ref B2BIPipelineProfile
      Description: Pipeline for processing EDI X12_214 to JSON
      TransformerId: !Ref EDIToJSONTransformer
      InputBucket: !Ref InputEDIBucket
      OutputBucket: !Ref OutputJSONBucket
      ServiceRoleArn: !GetAtt B2BIServiceRole.Arn
      ErrorHandling:
        RetryAttempts: 3
        DeadLetterQueue:
          Type: SQS
          QueueArn: !GetAtt DeadLetterQueue.Arn

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: B2BIPipelineDLQ

Outputs:
  PipelineArn:
    Description: ARN of the B2B Data Interchange pipeline
    Value: !Ref B2BIPipeline
  InputBucketUrl:
    Description: URL of the input EDI bucket
    Value: !GetAtt InputEDIBucket.WebsiteURL
  OutputBucketUrl:
    Description: URL of the output JSON bucket
    Value: !GetAtt OutputJSONBucket.WebsiteURL