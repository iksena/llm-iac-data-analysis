AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to enable Security Hub with default standards and consolidated findings'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      ControlFindingsAggregation: SECURITY_CONTROL
      Tags:
        - Key: Purpose
          Value: Security-Monitoring
        - Key: Environment
          Value: Production

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub
    Value: !Sub 'arn:${AWS::Partition}:securityhub:${AWS::Region}:${AWS::AccountId}:hub/default'
  SecurityHubStatus:
    Description: Security Hub Enablement Status
    Value: !Ref SecurityHub