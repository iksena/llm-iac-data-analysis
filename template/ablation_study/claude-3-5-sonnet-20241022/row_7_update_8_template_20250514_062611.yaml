AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with SSM access configuration and improved security'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the EC2 instance will be launched
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet where the EC2 instance will be launched

Resources:
  SSMInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Tags:
        - Key: Purpose
          Value: SSM-Management

  SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref SSMInstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Minimal security group for SSM-managed instance
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSM-Instance-SG

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0440d3b780d96b29d
      InstanceType: t3.micro
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref SSMInstanceProfile
      SecurityGroupIds: 
        - !Ref InstanceSecurityGroup
      Monitoring: true
      Tags:
        - Key: Name
          Value: SSM-Managed-Instance
        - Key: Environment
          Value: Production
        - Key: ManagementType
          Value: SSM

Outputs:
  InstanceId:
    Description: ID of the created EC2 instance
    Value: !Ref EC2Instance
  SSMConnectionCommand:
    Description: Command to connect to instance using SSM Session Manager
    Value: !Sub 'aws ssm start-session --target ${EC2Instance}'
  SecurityGroupId:
    Description: ID of the created Security Group
    Value: !Ref InstanceSecurityGroup