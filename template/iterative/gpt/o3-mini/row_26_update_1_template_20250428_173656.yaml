AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to deploy an S3 bucket configured to send object creation events to Amazon EventBridge,
  an SNS topic for notification distribution, and an EventBridge rule that triggers when an object is created in the bucket.

Resources:

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration: {}

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: "S3 Object Created Notifications"

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: SNS:Publish
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: "S3ObjectCreatedRule"
      Description: "Triggers on object creation events from the S3 bucket and publishes to SNS"
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref S3Bucket
      Targets:
        - Id: "SNSTarget"
          Arn: !Ref SNSTopic

Outputs:

  BucketName:
    Description: "The name of the S3 bucket"
    Value: !Ref S3Bucket

  SNSTopicARN:
    Description: "The ARN of the SNS topic"
    Value: !Ref SNSTopic

  EventBridgeRuleName:
    Description: "The name of the EventBridge rule"
    Value: !Ref EventBridgeRule