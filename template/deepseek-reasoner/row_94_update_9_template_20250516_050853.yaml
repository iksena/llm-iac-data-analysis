AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the VPC for the security group

Resources:
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub 'arn:aws:s3:::${LogsBucket}'
                  - !Sub 'arn:aws:s3:::${LogsBucket}/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  WebServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      GroupDescription: Enable HTTP and SSM access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref WebServerSG
      Tags:
        - Key: Name
          Value: SSMAutomationInstance
      UserData:
        Fn::Base64: |
          #!/bin/bash
          sudo systemctl start amazon-ssm-agent
          sudo systemctl enable amazon-ssm-agent

  AutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '0.3'
        description: OS update and Nginx installation
        parameters:
          InstanceId:
            type: String
        mainSteps:
          - name: CheckSSMAgent
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - sudo systemctl is-active amazon-ssm-agent || sudo systemctl start amazon-ssm-agent
          - name: UpdateOS
            action: aws:softwareUpdate
            inputs:
              Operation: Install
              Reboot: true
              Targets:
                - Key: InstanceIds
                  Values:
                    - '{{InstanceId}}'
          - name: WaitAfterReboot
            action: aws:sleep
            inputs:
              Duration: PT5M
          - name: InstallNginx
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - sudo yum install -y nginx || exit 1
          - name: ConfigureNginx
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - sudo systemctl start nginx || exit 1
                  - sudo systemctl enable nginx || exit 1
                  - sudo chkconfig nginx on
          - name: ValidateService
            action: aws:runCommand
            inputs:
              DocumentName: AWS-RunShellScript
              InstanceIds:
                - '{{InstanceId}}'
              Parameters:
                commands:
                  - curl -sSf http://localhost || exit 1
                  - echo "Validation successful"
      DocumentType: Automation

  ExecutionAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref AutomationDocument
      Parameters:
        InstanceId:
          - !Ref EC2Instance
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      WaitForSuccessTimeoutSeconds: 600

Outputs:
  InstanceId:
    Value: !Ref EC2Instance
  LogBucketName:
    Value: !Ref LogsBucket
  AutomationDocName:
    Value: !Ref AutomationDocument
  SecurityGroupId:
    Value: !Ref WebServerSG