AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure, Scalable Amazon Aurora MySQL Cluster with RDS Proxy Integration'

Parameters:
  DatabaseName:
    Type: String
    Default: 'mydb'
    Description: 'The name of the database to create in the cluster'
  DatabaseUsername:
    Type: String
    Default: 'admin'
    Description: 'The username for the database master user'
  DatabasePassword:
    Type: String
    NoEcho: true
    Description: 'The password for the database master user'
  VpcCIDR:
    Type: String
    Default: '10.0.0.0/16'
    Description: 'CIDR block for the VPC'
  PublicSubnetCIDR1:
    Type: String
    Default: '10.0.0.0/24'
    Description: 'CIDR block for public subnet 1'
  PublicSubnetCIDR2:
    Type: String
    Default: '10.0.1.0/24'
    Description: 'CIDR block for public subnet 2'
  PrivateSubnetCIDR1:
    Type: String
    Default: '10.0.2.0/24'
    Description: 'CIDR block for private subnet 1'
  PrivateSubnetCIDR2:
    Type: String
    Default: '10.0.3.0/24'
    Description: 'CIDR block for private subnet 2'
  DBInstanceClass:
    Type: String
    Default: 'db.r6g.large'
    Description: 'The instance class for the RDS instances'
  DBStorage:
    Type: Number
    Default: 100
    Description: 'The amount of storage in GB to allocate for the database'
  DBBackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: 'The number of days to retain backups'
  DBBackupWindow:
    Type: String
    Default: '03:00-04:00'
    Description: 'The daily time range in UTC during which automated backups are created'
  DBMaintenanceWindow:
    Type: String
    Default: 'sun:05:00-sun:06:00'
    Description: 'The weekly time range in UTC during which system maintenance can occur'
  ProxyMaxConnectionsPercent:
    Type: Number
    Default: 100
    Description: 'The maximum size of the connection pool for each target in a target group'
  ProxyMaxIdleConnectionsPercent:
    Type: Number
    Default: 50
    Description: 'The maximum number of connections that can be idle in the connection pool before the client is disconnected'

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-RT'

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCIDR1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-Subnet-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCIDR2
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-Subnet-2'

  PublicSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Private-RT'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetCIDR1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Private-Subnet-1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnetCIDR2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Private-Subnet-2'

  PrivateSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnets for RDS Aurora MySQL cluster'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Subnet-Group'

  DBClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for RDS Aurora MySQL cluster'
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Cluster-SG'

  DBProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for RDS Proxy'
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Proxy-SG'

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBClusterSecurityGroup.GroupId
      BackupRetentionPeriod: !Ref DBBackupRetentionPeriod
      PreferredBackupWindow: !Ref DBBackupWindow
      PreferredMaintenanceWindow: !Ref DBMaintenanceWindow
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true
      EnableHttpEndpoint: true
      EnablePerformanceInsights: true
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Cluster'

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: 'Parameter group for RDS Aurora MySQL cluster'
      Family: aurora-mysql5.7
      Parameters:
        performance_schema: '1'
        character_set_server: 'utf8mb4'
        collation_server: 'utf8mb4_unicode_ci'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Cluster-Parameter-Group'

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBClusterSecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Instance-1'

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DBInstanceClass
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBClusterSecurityGroup.GroupId
      DBParameterGroupName: !Ref DBParameterGroup
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Instance-2'

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: 'Parameter group for RDS Aurora MySQL instances'
      Family: aurora-mysql5.7
      Parameters:
        character_set_server: 'utf8mb4'
        collation_server: 'utf8mb4_unicode_ci'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Parameter-Group'

  DBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub '${AWS::StackName}-DB-Proxy'
      EngineFamily: MYSQL
      RoleArn: !GetAtt DBProxyRole.Arn
      VpcSecurityGroupIds:
        - !GetAtt DBProxySecurityGroup.GroupId
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: REQUIRED
          SecretArn: !Ref DBSecret
      RequireTLS: true
      IdleClientTimeout: 1800
      MaxConnectionsPercent: !Ref ProxyMaxConnectionsPercent
      MaxIdleConnectionsPercent: !Ref ProxyMaxIdleConnectionsPercent
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Proxy'

  DBProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref DBProxy
      TargetGroupName: 'default'
      DBClusterIdentifier: !Ref DBCluster
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: !Ref ProxyMaxConnectionsPercent
        MaxIdleConnectionsPercent: !Ref ProxyMaxIdleConnectionsPercent

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${AWS::StackName}-DB-Secret'
      Description: 'Secret for RDS Aurora MySQL cluster'
      SecretString: !Sub '{"username": "${DatabaseUsername}", "password": "${DatabasePassword}", "engine": "mysql", "host": "${DBCluster.Endpoint.Address}", "port": 3306, "dbname": "${DatabaseName}"}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Secret'

  DBProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub 'rds.${AWS::URLSuffix}'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonRDSDBCProxyRole'
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                  - 'secretsmanager:ListSecrets'
                Resource: !Ref DBSecret
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Proxy-Role'

  DBProxyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/rds/proxy/${DBProxy.DBProxyName}'
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Proxy-Log-Group'

  DBClusterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/rds/cluster/${DBCluster.DBClusterIdentifier}'
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DB-Cluster-Log-Group'

Outputs:
  DBClusterEndpoint:
    Description: 'The endpoint of the RDS Aurora MySQL cluster'
    Value: !GetAtt DBCluster.Endpoint.Address
  DBProxyEndpoint:
    Description: 'The endpoint of the RDS Proxy'
    Value: !GetAtt DBProxy.Endpoint
  DBClusterSecurityGroup:
    Description: 'The security group ID of the RDS Aurora MySQL cluster'
    Value: !GetAtt DBClusterSecurityGroup.GroupId
  DBProxySecurityGroup:
    Description: 'The security group ID of the RDS Proxy'
    Value: !GetAtt DBProxySecurityGroup.GroupId