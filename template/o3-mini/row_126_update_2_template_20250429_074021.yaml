AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template for creating an API Gateway integrated with an Amazon Kinesis Data Stream.
  This template provisions a Kinesis stream, an IAM role for API Gateway integration, and API Gateway resources
  with endpoints for putting single records, batch records, retrieving records, and describing stream metadata.

Parameters:
  KinesisStreamName:
    Description: "Name of the Kinesis Data Stream"
    Type: String
    Default: "MyKinesisStream"
  ShardCount:
    Description: "Number of shards for the Kinesis Data Stream"
    Type: Number
    Default: 1

Resources:
  MyKinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref KinesisStreamName
      ShardCount: !Ref ShardCount

  ApiGatewayKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: "APIGatewayKinesisPolicy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:DescribeStream
                Resource: !GetAtt MyKinesisStream.Arn

  ApiGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: "KinesisIntegrationApi"
      Description: "API Gateway integrated with Amazon Kinesis Data Streams"

  RootResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: "records"

  SingleRecordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !Ref RootResource
      PathPart: "single"

  BatchRecordResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !Ref RootResource
      PathPart: "batch"

  MetadataResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: "metadata"

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: "PUT"
      ResourceId: !Ref SingleRecordResource
      RestApiId: !Ref ApiGatewayRestApi
      AuthorizationType: "NONE"
      Integration:
        Type: "aws"
        IntegrationHttpMethod: "POST"
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord"
        RequestTemplates:
          application/json: |
            #set($inputRoot = $input.path('$'))
            {
              "StreamName": "${KinesisStreamName}",
              "Data": "$util.base64Encode($input.json('$.data'))",
              "PartitionKey": "$input.json('$.partitionKey')"
            }
        IntegrationResponses:
          - StatusCode: "200"
      MethodResponses:
        - StatusCode: "200"

  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: "PUT"
      ResourceId: !Ref BatchRecordResource
      RestApiId: !Ref ApiGatewayRestApi
      AuthorizationType: "NONE"
      Integration:
        Type: "aws"
        IntegrationHttpMethod: "POST"
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords"
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${KinesisStreamName}",
              "Records": $input.body
            }
        IntegrationResponses:
          - StatusCode: "200"
      MethodResponses:
        - StatusCode: "200"

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: "GET"
      ResourceId: !Ref RootResource
      RestApiId: !Ref ApiGatewayRestApi
      AuthorizationType: "NONE"
      RequestParameters:
        method.request.querystring.shardIterator: true
      Integration:
        Type: "aws"
        IntegrationHttpMethod: "POST"
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords"
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')",
              "Limit": 100
            }
        IntegrationResponses:
          - StatusCode: "200"
      MethodResponses:
        - StatusCode: "200"
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  DescribeStreamMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: "GET"
      ResourceId: !Ref MetadataResource
      RestApiId: !Ref ApiGatewayRestApi
      AuthorizationType: "NONE"
      Integration:
        Type: "aws"
        IntegrationHttpMethod: "POST"
        Credentials: !GetAtt ApiGatewayKinesisRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream"
        RequestTemplates:
          application/json: |
            {
              "StreamName": "${KinesisStreamName}"
            }
        IntegrationResponses:
          - StatusCode: "200"
      MethodResponses:
        - StatusCode: "200"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PutRecordMethod
      - PutRecordsMethod
      - GetRecordsMethod
      - DescribeStreamMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: "prod"

Outputs:
  ApiEndpoint:
    Description: "URL of the deployed API Gateway endpoint"
    Value: !Sub "https://${ApiId}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: ApiEndpoint
    Condition: false
  KinesisStreamARN:
    Description: "ARN of the created Kinesis Data Stream"
    Value: !GetAtt MyKinesisStream.Arn

# Exporting the API Id for the ApiEndpoint Output properly
Metadata:
  ApiId:
    Value: !Ref ApiGatewayRestApi