AWSTemplateFormatVersion: '2010-09-09'
Description: Production VPC Infrastructure with ALB and ECR Repository

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 1
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2
  PublicSubnet3CIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for public subnet 3
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.4.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.5.0/24
    Description: CIDR block for private subnet 2
  PrivateSubnet3CIDR:
    Type: String
    Default: 10.0.6.0/24
    Description: CIDR block for private subnet 3

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Production-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Production-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Production-NATGW

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-2

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [2, !GetAZs '']
      CidrBlock: !Ref PublicSubnet3CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Public-Subnet-3

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet1CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet2CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet-2

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [2, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet3CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: Private-Subnet-3

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Public-Route-Table

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: Private-Route-Table

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  HTTPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP/HTTPS traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: HTTP-HTTPS-SG

  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SSH-SG

  PostgreSQLSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: PostgreSQL-SG

  InternalSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow all internal VPC traffic
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          FromPort: 0
          ToPort: 0
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: Internal-SG

  InternalALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internal
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      SecurityGroups:
        - !Ref HTTPSecurityGroup
        - !Ref InternalSecurityGroup
      Type: application
      Tags:
        - Key: Name
          Value: Internal-ALB

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref InternalALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            ContentType: text/plain
            MessageBody: "404 Not Found"
            StatusCode: "404"

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: my-container-app
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Name
          Value: Container-Repository

  VPCParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/VPCId
      Type: String
      Value: !Ref VPC
      Description: VPC ID for the application

  PublicSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PublicSubnet1
      Type: String
      Value: !Ref PublicSubnet1
      Description: Public subnet 1 ID

  PublicSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PublicSubnet2
      Type: String
      Value: !Ref PublicSubnet2
      Description: Public subnet 2 ID

  PublicSubnet3Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PublicSubnet3
      Type: String
      Value: !Ref PublicSubnet3
      Description: Public subnet 3 ID

  PrivateSubnet1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PrivateSubnet1
      Type: String
      Value: !Ref PrivateSubnet1
      Description: Private subnet 1 ID

  PrivateSubnet2Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PrivateSubnet2
      Type: String
      Value: !Ref PrivateSubnet2
      Description: Private subnet 2 ID

  PrivateSubnet3Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/PrivateSubnet3
      Type: String
      Value: !Ref PrivateSubnet3
      Description: Private subnet 3 ID

  ALBListenerParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/InternalALBListener
      Type: String
      Value: !Ref ALBListener
      Description: ALB listener ARN

  HTTPSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/SecurityGroupHTTP
      Type: String
      Value: !Ref HTTPSecurityGroup
      Description: HTTP security group ID

  SSHSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/SecurityGroupSSH
      Type: String
      Value: !Ref SSHSecurityGroup
      Description: SSH security group ID

  PostgreSQLSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/SecurityGroupPostgreSQL
      Type: String
      Value: !Ref PostgreSQLSecurityGroup
      Description: PostgreSQL security group ID

  InternalSecurityGroupParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /MyApp/SecurityGroupInternal
      Type: String
      Value: !Ref InternalSecurityGroup
      Description: Internal security group ID

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  InternalALBEndpoint:
    Description: Internal ALB DNS name
    Value: !GetAtt InternalALB.DNSName
  ECRRepository:
    Description: ECR Repository name
    Value: !Ref ECRRepository