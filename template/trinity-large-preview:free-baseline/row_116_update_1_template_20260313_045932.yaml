AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for SNS-to-SQS fanout system with filtered message routing

Resources:
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue

  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue

  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue

  TemperatureDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDeadLetterQueue

  HumidityDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDeadLetterQueue

  CentralSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralSnsTopic

  TemperatureSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Endpoint: !GetAtt TemperatureSqsQueue.QueueArn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Temperature

  HumiditySnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Endpoint: !GetAtt HumiditySqsQueue.QueueArn
      Protocol: sqs
      FilterPolicy:
        MetricType:
          - Humidity

  AllMetricsSnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref CentralSnsTopic
      Endpoint: !GetAtt AllMetricsSqsQueue.QueueArn
      Protocol: sqs