AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create IAM roles for EC2 instances with read-only access to IAM metadata

Resources:
  EC2ReadOnlyIAMRole1:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole1
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  EC2ReadOnlyIAMRole2:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EC2ReadOnlyIAMRole2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess