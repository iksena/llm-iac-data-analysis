AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an EC2 instance with the latest Amazon Linux 2 AMI in the default VPC.'

Parameters:
  KeyName:
    Type: 'AWS::EC2::KeyPair::KeyName'
    Description: 'Name of an existing EC2 KeyPair to enable SSH access'
  InstanceType:
    Type: String
    Default: t3.micro
    Description: 'EC2 instance type'
    AllowedValues:
      - t3.nano
      - t3.micro
      - t3.small
      - t3.medium
    ConstraintDescription: 'must be a valid EC2 instance type.'
  AllowedSSHFrom:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'IP range (CIDR) allowed to SSH into the EC2 instance'
    ConstraintDescription: 'must be a valid CIDR range.'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group allowing SSH access'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHFrom
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:software+amazon:ec2:amazon-linux:2'  # Fallback if SSM issues, but use SSM
      # Better: Use SSM
      # ImageId:
      #   Fn::Sub: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      No, use parameter.
