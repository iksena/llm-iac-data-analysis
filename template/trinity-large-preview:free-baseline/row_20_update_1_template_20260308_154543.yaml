AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a CloudWatch Dashboard and CloudWatch Logs Insights queries for AWS Client VPN usage monitoring.

Resources:
  ClientVPNAnalysisDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClientVPNAnalysisDashboard
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 1,
              "properties": {
                "markdown": "# AWS Client VPN Usage Analysis Dashboard"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 1,
              "width": 24,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ClientConnectionCount", "EndpointId", "endpoint-1" ],
                  [ "AWS/ClientVPN", "ClientConnectionCount", "EndpointId", "endpoint-2" ]
                ],
                "region": "us-east-1",
                "title": "Client VPN Connection Count by Endpoint"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 7,
              "width": 24,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "DataIn", "EndpointId", "endpoint-1" ],
                  [ "AWS/ClientVPN", "DataOut", "EndpointId", "endpoint-1" ]
                ],
                "region": "us-east-1",
                "title": "Data Transfer (Ingress/Egress) by Endpoint"
              }
            },
            {
              "type": "table",
              "x": 0,
              "y": 13,
              "width": 24,
              "height": 6,
              "properties": {
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  [ "AWS/ClientVPN", "ClientConnectionDuration", "AuthenticationMethod", "AD/SAML" ],
                  [ "AWS/ClientVPN", "ClientConnectionDuration", "AuthenticationMethod", "Mutual Auth" ],
                  [ "AWS/ClientVPN", "ClientConnectionDuration", "AuthenticationMethod", "Mixed Auth" ]
                ],
                "region": "us-east-1",
                "title": "Connection Duration by Authentication Method"
              }
            }
          ]
        }

  ClientVPNConnectionDurationQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNConnectionDuration
      LogGroupNames:
        - "/aws/client-vpn/connections"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /connection duration/
        | stats count(*) as TotalConnections, avg(cast(split(message, ' ')[5] as long)) as AvgDuration
        | sort by TotalConnections desc

  ClientVPNDataTransferQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNDataTransfer
      LogGroupNames:
        - "/aws/client-vpn/connections"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /data transfer/
        | stats sum(cast(split(message, ' ')[7] as long)) as TotalDataIn, sum(cast(split(message, ' ')[9] as long)) as TotalDataOut
        | sort by TotalDataIn desc

  ClientVPNUserActivityQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNUserActivity
      LogGroupNames:
        - "/aws/client-vpn/connections"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /user activity/
        | stats count(*) as UserConnections, distinct_count(split(message, ' ')[3]) as DistinctUsers
        | sort by UserConnections desc

  ClientVPNAuthenticationBreakdownQuery:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: ClientVPNAuthenticationBreakdown
      LogGroupNames:
        - "/aws/client-vpn/connections"
      QueryString: |
        fields @timestamp, @message
        | filter @message like /authentication/
        | stats count(*) as AuthCount by split(message, ' ')[5]
        | sort by AuthCount desc

Outputs:
  DashboardURL:
    Description: URL for the Client VPN Analysis Dashboard
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#!/dashboards/view/${ClientVPNAnalysisDashboard}"