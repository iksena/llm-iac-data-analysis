AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Parameters:
  GlueScriptBucketName:
    Type: String
    Default: glue-scripts-logs-bucket
    Description: Name of the S3 bucket to store Glue scripts and logs

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref GlueScriptBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Versioning:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${GlueScriptBucketName}"
                  - !Sub "arn:aws:s3:::${GlueScriptBucketName}/*"

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: SampleConvertJob
      Role: !GetAtt GlueRole.Arn
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${GlueScriptBucketName}/gue_scripts/sample_convert.py"
        PythonVersion: "3"
      DefaultArguments:
        "--job-language": "python"
      ExecutionProperty:
        MaxConcurrentRuns: 1
      GlueVersion: "4.0"
      MaxCapacity: 2.0
      Timeout: 60
      WorkerType: G.1X

Outputs:
  GlueJobName:
    Description: Name of the created Glue job
    Value: !Ref GlueETLJob
  ScriptBucketName:
    Description: Name of the S3 bucket for Glue scripts and logs
    Value: !Ref GlueScriptBucketName