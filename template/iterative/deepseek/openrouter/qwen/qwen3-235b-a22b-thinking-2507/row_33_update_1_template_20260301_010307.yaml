AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 IAM read-only roles with access to IAM metadata'

Resources:
  EC2IAMReadOnlyRole1:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

  EC2IAMReadOnlyRole2:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/IAMReadOnlyAccess

Outputs:
  Role1Arn:
    Description: ARN of the first IAM role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole1.Arn
  Role2Arn:
    Description: ARN of the second IAM role for EC2 instances
    Value: !GetAtt EC2IAMReadOnlyRole2.Arn