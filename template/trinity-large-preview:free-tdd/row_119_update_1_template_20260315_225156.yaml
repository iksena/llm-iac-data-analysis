AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: my-application

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: my-application-events
      ShardCount: 1

  EventBridgeKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisPutRecordPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: kinesis:PutRecord
                Resource: !GetAtt KinesisStream.Arn

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: my-application
      EventPattern:
        source:
          - my-application
      Targets:
        - Arn: !GetAtt KinesisStream.Arn
          Id: KinesisTarget
          RoleArn: !GetAtt EventBridgeKinesisRole.Arn