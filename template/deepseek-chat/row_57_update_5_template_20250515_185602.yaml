AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for creating a basic ECS cluster with monitoring capabilities

Parameters:
  ClusterName:
    Description: Name of the ECS Cluster
    Type: String
    Default: MyECSCluster
  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.medium
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large
  DesiredCapacity:
    Description: Number of EC2 instances to launch
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: Must be the name of an existing EC2 KeyPair
  VpcId:
    Description: VPC ID where the ECS cluster will be deployed
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Description: Comma-delimited list of subnet IDs for the Auto Scaling group
    Type: List<AWS::EC2::Subnet::Id>
  EnableEnhancedMonitoring:
    Description: Enable enhanced CloudWatch monitoring
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  IsMonitoringEnabled: !Equals [!Ref EnableEnhancedMonitoring, 'true']

Mappings:
  AmiMap:
    us-east-1:
      ECS: ami-0b69ea66ff7391e80
    us-west-2:
      ECS: ami-0b4a2b1e11b905241
    eu-west-1:
      ECS: ami-0d1a7c811b5f03f14

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com]
            Action: ['sts:AssumeRole']
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole

  EC2LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !FindInMap [AmiMap, !Ref 'AWS::Region', ECS]
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        KeyName: !Ref KeyName
        UserData: 
          Fn::Base64: !Sub |
            #!/bin/bash
            echo ECS_CLUSTER=${ClusterName} >> /etc/ecs/ecs.config
            yum install -y amazon-cloudwatch-agent
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c ssm:AmazonCloudWatch-ECS
        Monitoring:
          Enabled: !If [IsMonitoringEnabled, true, false]

  EC2AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref EC2LaunchTemplate
        Version: !GetAtt EC2LaunchTemplate.LatestVersionNumber
      MinSize: !Ref DesiredCapacity
      MaxSize: !Ref DesiredCapacity
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: !Sub ${ClusterName}-Instance
          PropagateAtLaunch: true

  CloudWatchAlarmCPU:
    Type: AWS::CloudWatch::Alarm
    Condition: IsMonitoringEnabled
    Properties:
      AlarmDescription: Alarm if CPU usage exceeds 80%
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic

  CloudWatchAlarmMemory:
    Type: AWS::CloudWatch::Alarm
    Condition: IsMonitoringEnabled
    Properties:
      AlarmDescription: Alarm if memory usage exceeds 80%
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ClusterName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Sub arn:aws:sns:${AWS::Region}:${AWS::AccountId}:Default_CloudWatch_Alarms_Topic

Outputs:
  ClusterName:
    Description: The name of the ECS Cluster
    Value: !Ref ClusterName
  ClusterArn:
    Description: The ARN of the ECS Cluster
    Value: !GetAtt ECSCluster.Arn
  AutoScalingGroupName:
    Description: The name of the Auto Scaling Group
    Value: !Ref EC2AutoScalingGroup