AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EventBridge to DataDog log forwarding integration'

Parameters:
  DataDogAPIKey:
    Type: String
    NoEcho: true
    Description: 'DataDog API key for authentication (as specified in business requirement)'
    Default: 'testanu'

Resources:
  DLQQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-datadog-eventbridge-dlq.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true

  DLQQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref DLQQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DLQQueue.Arn
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:rule/*'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeToDataDogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:api-destination/*'
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !GetAtt DLQQueue.Arn

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: DD-API-KEY
          ApiKeyValue: !Ref DataDogAPIKey
      Name: !Sub '${AWS::StackName}-datadog-connection'

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: https://http-intake.logs.datadoghq.com/v1/input
      InvocationRateLimitPerSecond: 300
      Name: !Sub '${AWS::StackName}-datadog-api-destination'

  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-MyDataDogAppEventBus'

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref DataDogEventBus
      Name: !Sub '${AWS::StackName}-datadog-log-forwarding-rule'
      EventPattern:
        source:
          - MyDataDogApp
      Targets:
        - Id: DataDogLogsTarget
          Arn: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:api-destination/${ApiDestName}'
            ApiDestName: !Ref DataDogApiDestination
          RoleArn: !GetAtt EventBridgeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DLQQueue.Arn

Outputs:
  EventBusName:
    Description: Name of the custom EventBridge event bus
    Value: !Ref DataDogEventBus
  RuleName:
    Description: Name of the EventBridge rule
    Value: !Ref EventRule
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !Ref DataDogApiDestination
  DLQQueueURL:
    Description: URL of the dead-letter SQS queue
    Value: !Ref DLQQueue