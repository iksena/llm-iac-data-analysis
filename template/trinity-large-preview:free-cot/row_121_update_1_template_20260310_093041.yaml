AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for scheduled SSM automation workflow with cross-platform EC2 instances

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the public subnet
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access
  LogBucketName:
    Type: String
    Default: !Sub 'ssm-automation-logs-${AWS::AccountId}-${AWS::Region}'
    Description: Name of the S3 bucket to store execution logs

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicSubnet'

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-PublicRouteTable'

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SSMSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for SSM access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SSMSecurityGroup'

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Path: /
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2InstanceRole'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref EC2InstanceRole

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SSMSecurityGroup
      Tags:
        - Key: Name
          Value: LinuxInstance
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 'resolve:ssm:/aws/service/ami-windows-latest/Windows_Server-2019-English-Full-Base'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SSMSecurityGroup
      Tags:
        - Key: Name
          Value: WindowsInstance
        - Key: HelloWorld
          Value: 'true'
      UserData:
        Fn::Base64: |
          <powershell>
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
          Install-Module -Name AWSPowerShell.NetCore -Force
          Install-EC2AMIService -Service SSMAgent
          </powershell>

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref LogBucketName
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-LogBucket'

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: s3:GetBucketLocation
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}'
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  SSMDocument:
    Type: AWS::SSM::Document
    Properties:
      Content:
        schemaVersion: '1.2'
        description: Cross-platform Hello World script
        mainSteps:
          - action: aws:runShellScript
            name: runCommand
            inputs:
              runCommand:
                - |
                  #!/bin/bash
                  if [ -f /etc/os-release ]; then
                    echo "Hello World from Linux!"
                    echo "Linux instance ID: $(curl -s http://169.254.169.254/latest/meta-data/instance-id)"
                  else
                    echo "Hello World from Windows!"
                    powershell.exe "Write-Host 'Windows instance ID: ' $((Get-InstanceId))"
                  fi
      DocumentType: Command
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-HelloWorldDocument'

  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeSchedulerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                  - ssm:ListCommands
                  - ssm:ListCommandInvocations
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EventBridgeSchedulerRole'

  EventBridgeSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub '${AWS::StackName}-HelloWorldSchedule'
      FlexibleTimeWindow:
        Mode: OFF
      ScheduleExpression: 'rate(15 minutes)'
      ScheduleExpressionTimezone: UTC
      Target:
        Arn: !GetAtt SSMAssociation.AssociationId
        RoleArn: !GetAtt EventBridgeSchedulerRole.Arn
        Input: '{}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-HelloWorldSchedule'

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref SSMDocument
      Targets:
        - Key: tag:HelloWorld
          Values:
            - 'true'
      ScheduleExpression: 'rate(15 minutes)'
      OutputLocation:
        S3Location:
          OutputS3BucketName: !Ref S3Bucket
          OutputS3KeyPrefix: ssm-executions
      Parameters:
        executionTimeout: ['3600']
      AutomationTargetParameterName: InstanceIds
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-HelloWorldAssociation'

Outputs:
  LinuxInstanceID:
    Description: ID of the Linux EC2 instance
    Value: !Ref LinuxInstance
  WindowsInstanceID:
    Description: ID of the Windows EC2 instance
    Value: !Ref WindowsInstance
  LogBucketName:
    Description: Name of the S3 bucket for execution logs
    Value: !Ref S3Bucket
  EventBridgeScheduleARN:
    Description: ARN of the EventBridge Schedule
    Value: !GetAtt EventBridgeSchedule.Arn
  SSMDocumentName:
    Description: Name of the SSM Document
    Value: !Ref SSMDocument