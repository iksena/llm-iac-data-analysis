AWSTemplateFormatVersion: '2010-09-09'
Description: IoT Data Pipeline - Routes messages from AWS IoT Core to SQS via SNS

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: IoTDataTopic
      TopicName: IoTDataTopic

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref SNSTopic
              MessageFormat: RAW
      Tags:
        - Key: Name
          Value: IoTDataRule

  SNSTQSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !GetAtt SQSQueue.Arn
      Protocol: sqs
      TopicArn: !Ref SNSTopic
      FilterPolicy:
        device:
          - data

Outputs:
  SNSTopicARN:
    Description: ARN of the SNS Topic
    Value: !Ref SNSTopic
  SQSQueueARN:
    Description: ARN of the SQS Queue
    Value: !GetAtt SQSQueue.Arn
  IoTRuleName:
    Description: Name of the IoT Rule
    Value: !Ref IoTRule