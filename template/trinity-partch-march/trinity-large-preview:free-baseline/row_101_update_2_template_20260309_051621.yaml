AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a VPC with VPC Flow Logs configured to an S3 bucket.

Parameters:
  LogFilePrefix:
    Type: String
    Description: Optional prefix for organizing flow logs in the S3 bucket
    Default: ''

Resources:
  FlowLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'vpc-flow-logs-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  FlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FlowLogBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action:
              - s3:PutObject
            Resource: !Sub '${FlowLogBucket.Arn}/AWSLogs/${AWS::AccountId}/*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default

  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSAccess
        - arn:aws:iam::aws:policy/service-role/AmazonVPCFlowLogRole

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogDestinationType: s3
      LogDestination: !GetAtt FlowLogBucket.Arn
      TrafficType: ALL
      LogFormat: 'version o t x f a id srcaddr dstaddr srcport dstport proto packets bytes start end action log-status'
      ResourceId: !Ref VPC
      ResourceType: VPC
      LogDestinationPrefix: !Ref LogFilePrefix

Outputs:
  FlowLogBucketName:
    Description: The name of the S3 bucket where VPC Flow Logs are stored
    Value: !Ref FlowLogBucket