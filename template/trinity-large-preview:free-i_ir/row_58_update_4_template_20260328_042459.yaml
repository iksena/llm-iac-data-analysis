AWSTemplateFormatVersion: '2010-09-09'
Description: Scalable and monitored Amazon EFS file system with automated backups and performance safeguards

Resources:
  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      BackupPolicy:
        Status: ENABLED
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: EFS encryption is enabled

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Security group for EFS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ClientSecurityGroup

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetA
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PublicSubnetB
      SecurityGroups:
        - !GetAtt EFSSecurityGroup.GroupId

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: EFS Alarms

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS IO Utilization High
      AlarmDescription: Alarm when EFS IO utilization exceeds 80%
      Namespace: AWS/EFS
      MetricName: PercentIOLimit
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  BurstCreditAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS Burst Credit Low
      AlarmDescription: Alarm when EFS burst credits fall below 20%
      Namespace: AWS/EFS
      MetricName: BurstCreditBalance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  ThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EFS Throughput High
      AlarmDescription: Alarm when EFS throughput exceeds 90% of provisioned
      Namespace: AWS/EFS
      MetricName: PermittedThroughput
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupDefaultServiceRole

  EFSBackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: EFSBackupVault

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: EFS Backup Plan
        BackupPlanRule:
          - RuleName: Daily EFS Backup
            TargetBackupVault: !Ref EFSBackupVault
            ScheduleExpression: 'cron(0 2 * * ? *)'
            StartWindowMinutes: 60
            CompletionWindowMinutes: 480
            Lifecycle:
              DeleteAfterDays: 30

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: EFS_Backup_Selection
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt EFSFileSystem.Arn

Parameters:
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where EFS will be deployed
  PublicSubnetA:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet A for mount target
  PublicSubnetB:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet B for mount target
  ClientSecurityGroup:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group of clients that will access EFS

Outputs:
  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
  MountTargetA:
    Description: Mount Target A ID
    Value: !Ref MountTargetA
  MountTargetB:
    Description: Mount Target B ID
    Value: !Ref MountTargetB
  SecurityGroupId:
    Description: EFS Security Group ID
    Value: !GetAtt EFSSecurityGroup.GroupId