AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: IP Address Manager for managing IP address allocation
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-IPAM
        - Key: Environment
          Value: !Ref AWS::StackName
        - Key: Project
          Value: IPAM-Management

Outputs:
  IPAMArn:
    Description: ARN of the IPAM
    Value: !GetAtt IPAM.Arn
    Export:
      Name: !Sub ${AWS::StackName}-IPAM-ARN

  IPAMId:
    Description: ID of the IPAM
    Value: !GetAtt IPAM.IpamId
    Export:
      Name: !Sub ${AWS::StackName}-IPAM-ID

  PublicDefaultScopeId:
    Description: Default public scope ID of the IPAM
    Value: !GetAtt IPAM.PublicDefaultScopeId
    Export:
      Name: !Sub ${AWS::StackName}-Public-Default-Scope-ID

  PrivateDefaultScopeId:
    Description: Default private scope ID of the IPAM
    Value: !GetAtt IPAM.PrivateDefaultScopeId
    Export:
      Name: !Sub ${AWS::StackName}-Private-Default-Scope-ID