AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        Enabled: true
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: Table is encrypted at rest

  WorkloadLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt DynamoDBTable.Arn

  RiskLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt DynamoDBTable.Arn

  LambdaFunctionWorkload:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt WorkloadLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // workload logic
          };
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTable
    DependsOn:
      - WorkloadLambdaRole

  LambdaFunctionRisk:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt RiskLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            // risk logic
          };
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTable
    DependsOn:
      - RiskLambdaRole

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: RiskManagementNotifications
      KmsMasterKeyId: alias/aws/sns
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: F3
            reason: Topic is encrypted

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm-opscenter.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
      Topics:
        - !Ref SNSTopic
    DependsOn:
      - SNSTopic

Outputs:
  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
  WorkloadLambdaArn:
    Description: ARN of the workload Lambda function
    Value: !GetAtt LambdaFunctionWorkload.Arn
  RiskLambdaArn:
    Description: ARN of the risk Lambda function
    Value: !GetAtt LambdaFunctionRisk.Arn
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic