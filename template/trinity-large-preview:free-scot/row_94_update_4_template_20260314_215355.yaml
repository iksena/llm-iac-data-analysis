AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
  KeyName:
    Type: String
    Default: default-key
  S3BucketName:
    Type: String
    Default: ssm-automation-logs

Resources:
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  LogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId:
        Fn::ImportValue:
          !Sub 'resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              yum update -y
              yum install -y https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/linux_amd64/amazon-ssm-agent.rpm
              /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
            - AWS::StackName: !Ref AWS::StackName
              AWS::Region: !Ref AWS::Region

  AutomationDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Automation
      DocumentFormat: YAML
      Content:
        schemaVersion: '0.3'
        description: SSM Automation for OS updates, Nginx installation, and validation
        mainSteps:
          - name: UpdateOS
            action: aws:runPatchBaseline
            inputs:
              Id: PatchBaseline
              timeoutSeconds: 600
          - name: CheckReboot
            action: aws:rebootEC2Instance
            inputs:
              timeoutSeconds: 300
          - name: InstallNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - yum install -y nginx
                - systemctl start nginx
                - systemctl enable nginx
              timeoutSeconds: 300
          - name: ValidateNginx
            action: aws:runShellScript
            inputs:
              runCommand:
                - curl -f http://localhost/ || exit 1
              timeoutSeconds: 60

  SSMAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref AutomationDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref EC2Instance
      ScheduleExpression: rate(1 day)

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  AutomationDocumentName:
    Description: SSM Automation Document Name
    Value: !Ref AutomationDocument