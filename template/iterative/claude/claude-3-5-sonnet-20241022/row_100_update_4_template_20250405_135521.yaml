AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'

  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'

Resources:
  BaselineMFAPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA requirement for IAM users
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            NotAction:
              - 'iam:ChangePassword'
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListUsers'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'false'

  PowerUserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PowerUsers
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/PowerUserAccess'

  ViewOnlyGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: ViewOnly
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/job-function/ViewOnlyAccess'

  CrossAccountAssumeRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  CloudFormationServiceRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - cloudformation.amazonaws.com
            Action: 
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSCloudFormationFullAccess'

Outputs:
  PowerUserGroupArn:
    Description: ARN of Power User Group
    Value: !GetAtt PowerUserGroup.Arn

  ViewOnlyGroupArn:
    Description: ARN of View Only Group
    Value: !GetAtt ViewOnlyGroup.Arn

  CrossAccountRoleArn:
    Description: ARN of Cross-Account Role
    Value: !GetAtt CrossAccountAssumeRole.Arn

  CloudFormationRoleArn:
    Description: ARN of CloudFormation Service Role
    Value: !GetAtt CloudFormationServiceRole.Arn