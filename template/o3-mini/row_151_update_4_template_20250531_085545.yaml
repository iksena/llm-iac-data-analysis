AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production-ready CloudFormation template to deploy a simulated AWS Bedrock Agent integrated
  with a Lambda function. The StockPrice Lambda function returns a hard-coded stock price (100)
  as a placeholder for future business logic integration. The simulated Bedrock Agent is configured
  with the "Claude 3 Sonnet" foundational model and a custom getStockPrice action via a custom resource.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              # Hard-coded stock price lookup placeholder.
              return {"stockPrice": 100}
      Timeout: 10

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock-agent.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentInvokeModelPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"

  BedrockAgentHandlerLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BedrockAgentHandlerLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt BedrockAgentHandlerLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import traceback
          try:
              import cfnresponse
          except ImportError:
              # Fallback implementation for cfnresponse if not available
              class cfnresponse:
                  SUCCESS = "SUCCESS"
                  FAILED = "FAILED"
                  @staticmethod
                  def send(event, context, responseStatus, responseData, physicalResourceId=None):
                      response = {
                          "Status": responseStatus,
                          "Reason": "See the details in CloudWatch Log Stream: " + context.log_stream_name,
                          "PhysicalResourceId": physicalResourceId or context.log_stream_name,
                          "StackId": event.get("StackId"),
                          "RequestId": event.get("RequestId"),
                          "LogicalResourceId": event.get("LogicalResourceId"),
                          "Data": responseData
                      }
                      print("Response: " + json.dumps(response))
          def handler(event, context):
              responseData = {}
              try:
                  requestType = event.get("RequestType")
                  if requestType in ["Create", "Update"]:
                      # Simulate creation/updating of a Bedrock Agent
                      # In production, integrate with actual Bedrock APIs
                      responseData["AgentId"] = "simulated-agent-id"
                  elif requestType == "Delete":
                      # Handle deletion if necessary
                      responseData["AgentId"] = "simulated-agent-id-deleted"
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, responseData)
              except Exception as e:
                  print("Exception: " + str(e))
                  print(traceback.format_exc())
                  cfnresponse.send(event, context, cfnresponse.FAILED, responseData)
      Timeout: 30

  BedrockAgent:
    Type: Custom::BedrockAgent
    Properties:
      ServiceToken: !GetAtt BedrockAgentHandlerLambda.Arn
      AgentName: "StockPriceBedrockAgent"
      ModelName: "Claude 3 Sonnet"
      AgentRoleArn: !GetAtt BedrockAgentRole.Arn
      Actions:
        - Name: getStockPrice
          LambdaFunctionArn: !GetAtt StockPriceLambda.Arn
          Schema:
            type: object
            properties:
              stockSymbol:
                type: string

Outputs:
  StockPriceLambdaARN:
    Description: "ARN of the Stock Price Lookup Lambda function."
    Value: !GetAtt StockPriceLambda.Arn

  LambdaExecutionRoleARN:
    Description: "ARN of the Lambda Execution Role."
    Value: !GetAtt LambdaExecutionRole.Arn

  BedrockAgentId:
    Description: "Identifier of the simulated Bedrock Agent."
    Value: !GetAtt BedrockAgent.AgentId