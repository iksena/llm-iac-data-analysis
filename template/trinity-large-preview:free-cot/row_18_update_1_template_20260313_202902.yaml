AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to integrate DynamoDB Streams with EventBridge using Pipes

Parameters:
  TableName:
    Type: String
    Default: IntegrationTable
    Description: Name of the DynamoDB table
  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: DynamoDB read capacity units
  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: DynamoDB write capacity units
  EventDetailType:
    Type: String
    Default: UserAvatarUpdated
    Description: DetailType for EventBridge events
  EventSource:
    Type: String
    Default: com.company.avatar
    Description: Source for EventBridge events

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: !Ref ReadCapacityUnits
        WriteCapacityUnits: !Ref WriteCapacityUnits
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-EventBridgePipeRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub pipes.${AWS::Region}.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetEventBridgePolicy
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                Resource: !GetAtt DynamoDBTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: '*'

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-DynamoDBToEventBridgePipe
      DesiredState: ACTIVE
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 0
          StreamArn: !GetAtt DynamoDBTable.StreamArn
      Destinations:
        - EventBridgeEventBusDestination:
            DetailType: !Ref EventDetailType
            Source: !Ref EventSource
            EventBusName: default
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Filter:
        EventPattern:
          detail-type:
            - 'DynamoDB Stream Record'
          detail:
            eventSource:
              - 'aws:dynamodb'
            eventName:
              - 'INSERT'
              - 'MODIFY'
            detail:
              NewImage:
                avatarUrl:
                  endsWith:
                    - '.png'

Outputs:
  DynamoDBTableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt DynamoDBTable.Arn
  EventBridgePipeArn:
    Description: EventBridge Pipe ARN
    Value: !GetAtt EventBridgePipe.Arn