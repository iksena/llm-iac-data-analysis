AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with KMS Encryption and Lifecycle Management

Parameters:
  BucketNamePrefix:
    Type: String
    Default: !Ref AWS::StackName
    Description: Prefix for the S3 bucket name
  LifecycleEnabled:
    Type: Boolean
    Default: true
    Description: Enable lifecycle management
  TransitionToIA:
    Type: Number
    Default: 30
    Description: Days until transition to IA storage class
  TransitionToGlacier:
    Type: Number
    Default: 365
    Description: Days until transition to Glacier storage class
  ExpirationInDays:
    Type: Number
    Default: 365
    Description: Days until object expiration
  TagEnvironment:
    Type: String
    Default: production
    Description: Environment tag for the bucket
  TagOwner:
    Type: String
    Default: cloud-team
    Description: Owner tag for the bucket

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for S3 bucket encryption
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow S3 Service
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/s3-encryption-key-${AWS::StackName}'
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::Region}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !Ref KMSKey
              SSEAlgorithm: aws:kms
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: Environment
          Value: !Ref TagEnvironment
        - Key: Owner
          Value: !Ref TagOwner
        - Key: Name
          Value: !Sub '${BucketNamePrefix}-encrypted-bucket'

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: RootAccountFullControl
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

  S3BucketLifecycleConfiguration:
    Type: AWS::S3::BucketLifecycleConfiguration
    Condition: LifecycleEnabled
    Properties:
      Bucket: !Ref S3Bucket
      Rules:
        - Id: DefaultLifecycle
          Status: Enabled
          Transitions:
            - TransitionAfterDays: !Ref TransitionToIA
              StorageClass: INTELLIGENT_TIERING
            - TransitionAfterDays: !Ref TransitionToGlacier
              StorageClass: GLACIER
          Expiration:
            Days: !Ref ExpirationInDays

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  KMSKeyId:
    Description: ID of the KMS key used for encryption
    Value: !GetAtt KMSKey.KeyId
  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt KMSKey.Arn