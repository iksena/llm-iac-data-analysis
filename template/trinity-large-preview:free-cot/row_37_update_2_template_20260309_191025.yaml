AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'access-logs-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 365

  SecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'secure-bucket-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: StandardExpiration
            Status: Enabled
            ExpirationInDays: 365
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: logs/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: Production
        - Key: Security
          Value: High

  SecureBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SecureBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureConnections
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${SecureBucket}'
              - !Sub 'arn:aws:s3:::${SecureBucket}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'replica-bucket-${AWS::AccountId}-${AWS::Region}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ReplicaExpiration
            Status: Enabled
            ExpirationInDays: 365
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: Production
        - Key: Purpose
          Value: Replication

Outputs:
  SecureBucketName:
    Description: Name of the secure bucket
    Value: !Ref SecureBucket
  SecureBucketArn:
    Description: ARN of the secure bucket
    Value: !GetAtt SecureBucket.Arn
  ReplicaBucketName:
    Description: Name of the replica bucket
    Value: !Ref ReplicaBucket
  ReplicaBucketArn:
    Description: ARN of the replica bucket
    Value: !GetAtt ReplicaBucket.Arn
  AccessLogBucketName:
    Description: Name of the access log bucket
    Value: !Ref AccessLogBucket
  AccessLogBucketArn:
    Description: ARN of the access log bucket
    Value: !GetAtt AccessLogBucket.Arn