AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTSNSTopic

  IoTSNSTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref IoTSNSTopic
      Protocol: sqs
      Endpoint: !GetAtt IoTDataQueue.Arn

  IoTRuleRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IoTRuleRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref IoTSNSTopic

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTSNSTopic
              MessageFormat: RAW
      RoleArn: !GetAtt IoTRuleRole.Arn

Outputs:
  QueueURL:
    Description: SQS Queue URL
    Value: !Ref IoTDataQueue
  QueueARN:
    Description: SQS Queue ARN
    Value: !GetAtt IoTDataQueue.Arn