AWSTemplateFormatVersion: '2010-09-09'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref RiskNotificationTopic

  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: RiskManagementNotifications

  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref 'AWS::AccountId'
      Topics:
        - !Ref RiskNotificationTopic

  DataIngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: data-ingestion.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC: !Ref RiskNotificationTopic
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

  RiskAssessmentLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: risk-assessment.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref RiskManagementTable
          SNS_TOPIC: !Ref RiskNotificationTopic
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  DataIngestionLambdaArn:
    Description: ARN of the Data Ingestion Lambda function
    Value: !GetAtt DataIngestionLambda.Arn
  RiskAssessmentLambdaArn:
    Description: ARN of the Risk Assessment Lambda function
    Value: !GetAtt RiskAssessmentLambda.Arn
  RiskManagementTableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt RiskManagementTable.Arn
  RiskNotificationTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref RiskNotificationTopic