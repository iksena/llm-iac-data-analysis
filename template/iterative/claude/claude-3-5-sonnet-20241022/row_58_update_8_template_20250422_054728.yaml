AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready EFS deployment with monitoring and automated backups'

Parameters:
  PerformanceMode:
    Type: String
    AllowedValues: [generalPurpose, maxIO]
    Default: generalPurpose
    Description: EFS performance mode

  ThroughputMode:
    Type: String
    AllowedValues: [bursting, provisioned]
    Default: bursting
    Description: EFS throughput mode

  ProvisionedThroughput:
    Type: Number
    MinValue: 1
    MaxValue: 1024
    Default: 128
    Description: Provisioned throughput in MiB/s

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-subnet

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: !Ref PerformanceMode
      ThroughputMode: !Ref ThroughputMode
      ProvisionedThroughputInMibps: !If 
        - IsProvisionedThroughput
        - !Ref ProvisionedThroughput
        - !Ref AWS::NoValue
      FileSystemTags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VPC.CidrBlock
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-efs-sg

  MountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref Subnet
      SecurityGroups: 
        - !Ref EFSSecurityGroup

  IOUtilizationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-io-utilization
      AlarmDescription: IO Utilization above threshold
      MetricName: PercentIOLimit
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

  BurstCreditBalanceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-efs-burst-credits
      AlarmDescription: Burst credit balance is low
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000000000
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EFSFileSystem

Conditions:
  IsProvisionedThroughput: !Equals [!Ref ThroughputMode, 'provisioned']

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  SubnetId:
    Description: Subnet ID
    Value: !Ref Subnet

  FileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem

  FileSystemDNS:
    Description: EFS DNS Name
    Value: !Sub ${EFSFileSystem}.efs.${AWS::Region}.amazonaws.com

  MountTargetId:
    Description: Mount Target ID
    Value: !Ref MountTarget

  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref EFSSecurityGroup

  FileSystemArn:
    Description: EFS File System ARN
    Value: !Sub arn:aws:elasticfilesystem:${AWS::Region}:${AWS::AccountId}:file-system/${EFSFileSystem}