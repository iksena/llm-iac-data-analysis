AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an automated monitoring and notification system for AWS Secrets Manager secret lifecycle events.

Parameters:
  SNSTopicName:
    Type: String
    Default: SecretsManagerEventsTopic
    Description: Name of the SNS topic to send notifications to
  EmailSubscription:
    Type: String
    Default: admin@example.com
    Description: Email address to subscribe to the SNS topic

Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName

  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailSubscription
      Protocol: email
      TopicArn: !Ref SNSTopic

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerEventsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: '*'

  SecretsManagerEventHandler:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          sns_client = boto3.client('sns')
          sns_topic_arn = os.environ['SNS_TOPIC_ARN']

          def handler(event, context):
              try:
                  detail = event['detail']
                  secret_id = detail.get('SecretId', 'Unknown')
                  event_type = detail.get('EventType', 'Unknown')
                  request_id = detail.get('VersionId', 'Unknown')

                  message = f"Secrets Manager Event\n\nSecret ID: {secret_id}\nEvent Type: {event_type}\nRequest ID: {request_id}\n\nFull Event: {json.dumps(detail, indent=2)}"

                  response = sns_client.publish(
                      TopicArn=sns_topic_arn,
                      Subject=f"Secrets Manager {event_type} Alert",
                      Message=message
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps({'message': 'Notification sent successfully', 'sns_response': response})
                  }
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'message': 'Error processing event', 'error': str(e)})
                  }

      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref SNSTopic
      Timeout: 30
      MemorySize: 128
      PackageType: Zip

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Captures Secrets Manager events for secret creation, update, and access
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - RestoreSecret
            - RotateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !GetAtt SecretsManagerEventHandler.Arn
          Id: SecretsManagerEventHandler

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SecretsManagerEventHandler
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EventBridgeRule.Arn

Outputs:
  SNSTopicARN:
    Description: The ARN of the SNS topic
    Value: !Ref SNSTopic
  LambdaFunctionARN:
    Description: The ARN of the Lambda function
    Value: !GetAtt SecretsManagerEventHandler.Arn