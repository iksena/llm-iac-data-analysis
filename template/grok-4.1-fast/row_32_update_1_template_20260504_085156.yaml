AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a sample AWS Lambda function'

Parameters:
  FunctionName:
    Type: String
    Default: SampleLambda
    Description: Name of the Lambda function
  Runtime:
    Type: String
    Default: python3.12
    Description: Lambda runtime
    AllowedValues:
      - python3.9
      - python3.10
      - python3.11
      - python3.12
  Timeout:
    Type: Number
    Default: 3
    Description: Function timeout in seconds
    MinValue: 1
    MaxValue: 900
  MemorySize:
    Type: Number
    Default: 128
    Description: Function memory in MB
    MinValue: 128
    MaxValue: 10240

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SampleLambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaExecutionRole
    Properties:
      FunctionName: !Ref FunctionName
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Hello from Lambda!'
              }
      Runtime: !Ref Runtime
      Timeout: !Ref Timeout
      MemorySize: !Ref MemorySize
      Description: Sample Lambda function created by CloudFormation
      Tags:
        - Key: Purpose
          Value: Sample

Outputs:
  LambdaFunctionArn:
    Description: ARN of the sample Lambda function
    Value: !GetAtt SampleLambdaFunction.Arn
  LambdaFunctionName:
    Description: Name of the sample Lambda function
    Value: !Ref SampleLambdaFunction