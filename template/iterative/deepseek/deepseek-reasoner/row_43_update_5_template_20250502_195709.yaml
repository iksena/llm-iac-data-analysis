AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  BucketNamePrefix:
    Type: String
    Default: my-encrypted-bucket
    AllowedPattern: ^[a-z0-9.-]+$
    ConstraintDescription: Bucket prefix must be lowercase and DNS-compliant
  TransitionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
  ExpirationDays:
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 3650
Resources:
  S3EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-policy-s3
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: AllowS3Service
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:s3:::${BucketNamePrefix}-${AWS::AccountId}'
      Description: KMS key for S3 bucket encryption
      EnableKeyRotation: true
  KeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/s3-encryption-key
      TargetKeyId: !Ref S3EncryptionKey
  EncryptedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt S3EncryptionKey.Arn
      LifecycleConfiguration:
        Rules:
          - Id: LifecycleRule1
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref TransitionDays
            ExpirationInDays: !Ref ExpirationDays
      Tags:
        - Key: Environment
          Value: Production
        - Key: DataClassification
          Value: Confidential
        - Key: ManagedBy
          Value: CloudFormation
Outputs:
  BucketARN:
    Value: !GetAtt EncryptedBucket.Arn
  BucketName:
    Value: !Ref EncryptedBucket
  KMSKeyId:
    Value: !Ref S3EncryptionKey
  KMSAlias:
    Value: !Ref KeyAlias