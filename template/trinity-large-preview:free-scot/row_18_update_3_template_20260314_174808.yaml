AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create DynamoDB table with stream and EventBridge integration

Parameters:
  DynamoDBTableName:
    Type: String
    Default: MyTable
    Description: Name of the DynamoDB table
  EventBridgeBusName:
    Type: String
    Default: default
    Description: Name of the EventBridge bus

Resources:
  MyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  Registry:
    Type: AWS::EventSchemas::Registry
    Properties:
      RegistryName: my-registry

  Schema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content: |
        {
          "type": "object",
          "properties": {
            "Records": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "eventName": { "type": "string" },
                  "dynamodb": {
                    "type": "object",
                    "properties": {
                      "NewImage": {
                        "type": "object",
                        "properties": {
                          "avatarUrl": { "type": "string" }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
        }
      RegistryName: !Ref Registry
      SchemaName: dynamodb-stream
      Type: JSON

  PipeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt MyTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBridgeBusName}'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          def handler(event, context):
              eventbridge = boto3.client('events')
              for record in event['Records']:
                  if 'NewImage' in record['dynamodb']:
                      new_image = record['dynamodb']['NewImage']
                      if 'avatarUrl' in new_image:
                          avatar_url = new_image['avatarUrl']['S']
                          if avatar_url.endswith('.png'):
                              detail = {
                                  'eventName': record['eventName'],
                                  'dynamodb': record['dynamodb']
                              }
                              eventbridge.put_events(
                                  Entries=[
                                      {
                                          'Source': 'com.example.dynamodb',
                                          'DetailType': 'DynamoDB Stream',
                                          'Detail': json.dumps(detail),
                                          'EventBusName': os.environ['EVENT_BUS_NAME']
                                      }
                                  ]
                              )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Processing complete')
              }
      Runtime: python3.12
      Timeout: 30
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref EventBridgeBusName

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBStreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt MyTable.StreamArn
        - PolicyName: EventBridgeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBridgeBusName}'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  LambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt MyTable.StreamArn
      FunctionName: !Ref LambdaFunction
      StartingPosition: LATEST