AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for EC2 Image Builder infrastructure'

Parameters:
  OwnerEmail:
    Type: String
    Default: 'u12345678@anu.edu.au'
    Description: 'Owner email for resource tagging'

Resources:
  ImageBuilderLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Owner
          Value: !Ref OwnerEmail

  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - imagebuilder.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder
      Tags:
        - Key: Owner
          Value: !Ref OwnerEmail

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref ImageBuilderRole

  ImageBuilderS3Policy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Policy for EC2 Image Builder to access S3 logs bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
            Resource: '*'
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${ImageBuilderLogsBucket}
              - !Sub arn:aws:s3:::${ImageBuilderLogsBucket}/*

  AttachS3Policy:
    Type: AWS::IAM::PolicyAttachment
    Properties:
      PolicyArn: !Ref ImageBuilderS3Policy
      Roles:
        - !Ref ImageBuilderRole

Outputs:
  LogsBucketName:
    Description: Name of the S3 bucket for Image Builder logs
    Value: !Ref ImageBuilderLogsBucket

  ImageBuilderRoleArn:
    Description: ARN of the IAM role for Image Builder
    Value: !GetAtt ImageBuilderRole.Arn

  ImageBuilderInstanceProfileArn:
    Description: ARN of the Instance Profile for Image Builder
    Value: !GetAtt ImageBuilderInstanceProfile.Arn