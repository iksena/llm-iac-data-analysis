AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with DataDog for centralized log forwarding'

Parameters:
  DataDogApiKey:
    Type: String
    NoEcho: true
    Description: DataDog API Key for authentication
    
  DataDogEndpoint:
    Type: String
    Default: 'https://http-intake.logs.datadoghq.com/api/v2/logs'
    Description: DataDog Log Intake API Endpoint
    
  ApplicationSource:
    Type: String
    Default: 'MyDataDogApp'
    Description: Source application name for event filtering

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub '${AWS::StackName}-datadog-bus'

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 30

  DeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues: 
        - !Ref DeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt DeadLetterQueue.Arn

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: 'x-api-key'
          ApiKeyValue: !Ref DataDogApiKey
      Name: !Sub '${AWS::StackName}-datadog-connection'

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt DataDogConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Ref DataDogEndpoint
      Name: !Sub '${AWS::StackName}-datadog-destination'
      InvocationRateLimitPerSecond: 300

  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref ApplicationSource
      Name: !Sub '${AWS::StackName}-datadog-rule'
      State: ENABLED
      Targets:
        - Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn
          Id: DataDogTarget
          DeadLetterConfig:
            Arn: !GetAtt DeadLetterQueue.Arn

Outputs:
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn

  ApiDestinationArn:
    Description: ARN of the DataDog API Destination
    Value: !GetAtt DataDogApiDestination.Arn

  DeadLetterQueueUrl:
    Description: URL of the Dead Letter Queue
    Value: !Ref DeadLetterQueue