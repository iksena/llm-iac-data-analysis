AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust Relationships'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: Must be a valid 12-digit AWS account ID
  
  EnvironmentName:
    Type: String
    Description: Environment name for resource naming
    AllowedValues: 
      - dev
      - prod
      - test
    Default: dev

Resources:
  BaselineMFAPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA requirement for IAM users
      ManagedPolicyName: !Sub 'baseline-mfa-policy-${EnvironmentName}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowViewAccountInfo
            Effect: Allow
            Action:
              - 'iam:GetAccountPasswordPolicy'
              - 'iam:GetAccountSummary'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
          - Sid: AllowManageOwnPasswords
            Effect: Allow
            Action:
              - 'iam:ChangePassword'
              - 'iam:GetUser'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'
          - Sid: AllowManageOwnAccessKeys
            Effect: Allow
            Action:
              - 'iam:CreateAccessKey'
              - 'iam:DeleteAccessKey'
              - 'iam:ListAccessKeys'
              - 'iam:UpdateAccessKey'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'
          - Sid: AllowManageOwnMFA
            Effect: Allow
            Action:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:DeleteVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:ListMFADevices'
              - 'iam:ResyncMFADevice'
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:mfa/*'

  RestrictedServicesPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Explicitly denies access to sensitive services
      ManagedPolicyName: !Sub 'restricted-services-policy-${EnvironmentName}'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyRestrictedServices
            Effect: Deny
            Action:
              - 'cloudhsm:*'
              - 'aws-portal:*'
              - 'account:*'
              - 'organizations:*'
            Resource: '*'

  AdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub 'administrators-${EnvironmentName}'
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

  PowerUserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub 'power-users-${EnvironmentName}'
      ManagedPolicyArns:
        - !Ref BaselineMFAPolicy
        - 'arn:aws:iam::aws:policy/PowerUserAccess'

  CrossAccountAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'cross-account-admin-${EnvironmentName}'
      Description: Cross-account administrative role for trusted identity account
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: true
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
        - !Ref RestrictedServicesPolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  CFNServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'cfn-service-role-${EnvironmentName}'
      Description: Service role for CloudFormation
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'stackset-execution-role-${EnvironmentName}'
      Description: Execution role for CloudFormation StackSets
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
        - !Ref RestrictedServicesPolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  AdminGroupName:
    Description: Name of the administrators group
    Value: !Ref AdminGroup

  PowerUserGroupName:
    Description: Name of the power users group
    Value: !Ref PowerUserGroup

  CrossAccountAdminRoleArn:
    Description: ARN of the cross-account administrative role
    Value: !GetAtt CrossAccountAdminRole.Arn

  CFNServiceRoleArn:
    Description: ARN of the CloudFormation service role
    Value: !GetAtt CFNServiceRole.Arn

  StackSetExecutionRoleArn:
    Description: ARN of the StackSet execution role
    Value: !GetAtt StackSetExecutionRole.Arn