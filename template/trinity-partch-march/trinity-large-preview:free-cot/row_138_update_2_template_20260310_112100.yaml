AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with S3, DynamoDB, and EC2

Parameters:
  KeyName:
    Type: String
    Default: default-key
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
  BucketName:
    Type: String
    Default: webapp-assets
    Description: Name of the S3 bucket to create for static assets
  RoleName:
    Type: String
    Default: WebAppRole
    Description: Name of the IAM role to create for EC2 instance
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPC'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IGW'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-RT'

  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Public-Subnet'

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for web server
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Web-SG'

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${BucketName}-${AWS::Region}-${AWS::AccountId}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Assets-Bucket'

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: serviceName
          AttributeType: S
        - AttributeName: serviceId
          AttributeType: N
      KeySchema:
        - AttributeName: serviceName
          KeyType: HASH
        - AttributeName: serviceId
          KeyType: RANGE
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-DynamoDB-Table'

  WebAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2-Role'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${RoleName}-Profile'
      Roles:
        - !Ref WebAppRole

  WebServerInstance:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref AWS::Region, AMI]
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref WebServerSecurityGroup
          SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

          # Install Apache, PHP, and AWS CLI
          yum update -y
          yum install -y httpd php php-cli php-common php-mbstring php-xml php-zip php-json php-mysqlnd php-pdo php-gd php-curl php-intl php-pear php-bcmath php-opcache
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          ./aws/install

          # Configure AWS CLI with region
          REGION=$(curl -s http://169.254.169.254/latest/dynamic/instance-identity/document | jq -r .region)
          aws configure set region $REGION

          # Create web directory and download lab files
          mkdir -p /var/www/html/lab
          cd /var/www/html/lab

          # Download static assets to S3 bucket
          aws s3 cp s3://aws-codedeploy-us-east-1/samples/latest/SampleApp_Linux/ /var/www/html/lab --recursive

          # Upload static assets to S3 bucket
          aws s3 sync /var/www/html/lab s3://${S3Bucket} --acl public-read

          # Create DynamoDB table and populate data
          aws dynamodb create-table --table-name AWS-Services --attribute-definitions AttributeName=serviceName,AttributeType=S AttributeName=serviceId,AttributeType=N --key-schema AttributeName=serviceName,KeyType=HASH AttributeName=serviceId,KeyType=RANGE --billing-mode PAY_PER_REQUEST

          # Populate DynamoDB with sample data
          cat > services.json <<EOF
          [
            {"serviceName": "EC2", "serviceId": 1, "description": "Elastic Compute Cloud"},
            {"serviceName": "S3", "serviceId": 2, "description": "Simple Storage Service"},
            {"serviceName": "DynamoDB", "serviceId": 3, "description": "Managed NoSQL Database"}
          ]
          EOF

          # Import JSON data into DynamoDB
          for item in $(jq -c '.[]' services.json); do
            aws dynamodb put-item --table-name AWS-Services --item "$item"
          done

          # Configure Apache
          systemctl start httpd
          systemctl enable httpd
          usermod -a -G apache ec2-user
          chown -R ec2-user:apache /var/www
          chmod 2775 /var/www
          find /var/www -type d -exec chmod 2775 {} \;
          find /var/www -type f -exec chmod 0664 {} \;

          # Create PHP info page
          cat > /var/www/html/info.php <<EOF
          <?php
          phpinfo();
          ?>
          EOF

          # Create DynamoDB test page
          cat > /var/www/html/dynamodb.php <<EOF
          <?php
          require '/var/www/html/lab/vendor/autoload.php';

          $dynamodb = Aws\DynamoDb\DynamoDbClient::factory(array(
              'region' => '$REGION',
              'version' => 'latest'
          ));

          $result = $dynamodb->scan(array(
              'TableName' => 'AWS-Services'
          ));

          echo "<h1>AWS Services</h1><ul>";
          foreach ($result['Items'] as $item) {
              echo "<li>" . $item['serviceName']['S'] . " - " . $item['description']['S'] . "</li>";
          }
          echo "</ul>";
          ?>
          EOF

          # Install Composer for PHP dependencies
          curl -sS https://getcomposer.org/installer | php
          mv composer.phar /usr/local/bin/composer
          cd /var/www/html/lab
          composer require aws/aws-sdk-php

      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Web-Server'

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-east-2:
      AMI: ami-0d8f6eb4f641efab0
    us-west-1:
      AMI: ami-0d1cd67c26b5f3bcf
    us-west-2:
      AMI: ami-0d1cd67c26b5f3bcf
    eu-west-1:
      AMI: ami-0fad7378adf284ce4
    eu-west-2:
      AMI: ami-0f0e3c76f333f4d92
    eu-west-3:
      AMI: ami-0dd9f0e7df002e8a5
    eu-central-1:
      AMI: ami-0f2ed58082cb08a62
    ap-northeast-1:
      AMI: ami-0c3fd0f5d33affc68
    ap-northeast-2:
      AMI: ami-0d85747d9d273c0f9
    ap-southeast-1:
      AMI: ami-0d0f8d4c7e6b0f9a8
    ap-southeast-2:
      AMI: ami-0c3fd0f5d33affc68
    sa-east-1:
      AMI: ami-0b6d4f84d4a1df7a2
    ca-central-1:
      AMI: ami-0d4f2d6c6f0f9a8b7

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VPCID'

  PublicSubnet:
    Description: Public Subnet ID
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub '${AWS::StackName}-PublicSubnetID'

  WebServerURL:
    Description: URL of the web server
    Value: !Sub 'http://${WebServerInstance.PublicDnsName}'
    Export:
      Name: !Sub '${AWS::StackName}-WebServerURL'

  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
    Export:
      Name: !Sub '${AWS::StackName}-S3BucketName'

  DynamoDBTableName:
    Description: Name of the DynamoDB table
    Value: !Ref DynamoDBTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTableName'