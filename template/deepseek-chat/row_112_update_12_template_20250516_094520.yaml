AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket with SQS event notifications'

Parameters:
  BucketNamePrefix:
    Description: 'Prefix for the S3 bucket name (will be appended with random string)'
    Type: String
    Default: 'my-s3-bucket'
    AllowedPattern: '^[a-z0-9-]{1,50}$'
    ConstraintDescription: 'Bucket name prefix must be 1-50 lowercase alphanumeric chars with hyphens'

  QueueNamePrefix:
    Description: 'Prefix for the SQS queue name (will be appended with random string)'
    Type: String
    Default: 's3-event-queue'
    AllowedPattern: '^[a-zA-Z0-9_-]{1,75}$'
    ConstraintDescription: 'Queue name prefix must be between 1 and 75 characters'

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${QueueNamePrefix}-${AWS::StackName}'
      MessageRetentionPeriod: 345600
      VisibilityTimeout: 30

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SQSQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3:::${S3Bucket}'
      Queues:
        - !Ref SQSQueue

  S3Bucket:
    Type: AWS::S3::Bucket
    DependsOn: SQSQueuePolicy
    Properties:
      BucketName: !Sub '${BucketNamePrefix}-${AWS::StackName}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: 's3:ObjectCreated:*'
            Queue: !GetAtt SQSQueue.Arn

Outputs:
  BucketName:
    Description: 'Created S3 bucket name'
    Value: !Ref S3Bucket
  QueueURL:
    Description: 'SQS Queue URL'
    Value: !Ref SQSQueue
  QueueARN:
    Description: 'SQS Queue ARN'
    Value: !GetAtt SQSQueue.Arn