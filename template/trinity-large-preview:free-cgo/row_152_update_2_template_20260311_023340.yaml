AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Aurora MySQL Cluster with RDS Proxy Integration

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PrivateSubnetCIDR1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnetCIDR2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  PrivateSubnetCIDR3:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for private subnet 3
  DatabaseMasterUsername:
    Type: String
    Default: admin
    Description: Database master username
  DatabaseMasterPassword:
    Type: String
    NoEcho: true
    Description: Database master password
  DatabaseInstanceClass:
    Type: String
    Default: db.r6g.large
    Description: Database instance class
  DatabaseEngineVersion:
    Type: String
    Default: 5.7.mysql_aurora.3.1.1
    Description: Aurora MySQL engine version
  LambdaSecurityGroup:
    Type: String
    Default: ''
    Description: Lambda security group ID for RDS Proxy access

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: AuroraVPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR1
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR2
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCIDR3
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: PrivateSubnet3

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !If [HasLambdaSecurityGroup, !Ref LambdaSecurityGroup, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: AuroraSecurityGroup

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: AuroraDatabaseSecret
      Description: Secret for Aurora database credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'

  DatabaseCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineMode: provisioned
      EngineVersion: !Ref DatabaseEngineVersion
      DatabaseName: aurora_db
      MasterUsername: !Ref DatabaseMasterUsername
      MasterUserPassword: !Ref DatabaseMasterPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      StorageEncrypted: true
      EnableIAMDatabaseAuthentication: true
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:04:00-sun:05:00'

  DatabaseInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DatabaseCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: !Ref DatabaseEngineVersion
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt SecurityGroup.GroupId

  DatabaseInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DatabaseCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: !Ref DatabaseEngineVersion
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt SecurityGroup.GroupId

  RDSProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: AuroraProxy
      EngineFamily: MYSQL
      RoleArn: !GetAtt ProxyRole.Arn
      VpcSecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
        - !Ref PrivateSubnet3
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: REQUIRED
          SecretArn: !Ref DatabaseSecret
      RequireTLS: true

  RDSProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RDSProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !Ref DatabaseCluster

  ProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSDBCredentialsPolicyForRDSProxy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref DatabaseSecret

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/rds/aurora-cluster
      RetentionInDays: 30

  EnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

  PerformanceInsightsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSPerformanceInsightsRole

Conditions:
  HasLambdaSecurityGroup: !Not [!Equals [!Ref LambdaSecurityGroup, '']]

Outputs:
  DatabaseClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt DatabaseCluster.Endpoint.Address
  DatabaseReaderEndpoint:
    Description: Aurora reader endpoint
    Value: !GetAtt DatabaseCluster.ReadEndpoint.Address
  RDSProxyEndpoint:
    Description: RDS Proxy endpoint
    Value: !GetAtt RDSProxy.Endpoint
  DatabaseSecretARN:
    Description: Database secret ARN
    Value: !Ref DatabaseSecret