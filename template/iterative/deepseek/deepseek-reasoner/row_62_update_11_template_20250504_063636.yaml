AWSTemplateFormatVersion: '2010-09-09'  
Parameters:  
  VpcId:  
    Type: AWS::EC2::VPC::Id  
    Description: "Target VPC ID (e.g., vpc-0abcd1234)"  
    ConstraintDescription: Must be a valid VPC ID  
  SubnetIds:  
    Type: 'List<AWS::EC2::Subnet::Id>'  
    Description: "Minimum 2 public subnets across AZs (e.g., [subnet-1234abcd, subnet-5678efgh])"  
    ConstraintDescription: Must be valid subnet IDs  
  MasterUsername:  
    Type: String  
    Default: admin  
    Description: "Database admin username"  
  SecretArn:  
    Type: String  
    Description: "Secrets Manager ARN with password (e.g., arn:aws:secretsmanager:us-east-1:123456789012:secret:MyDbSecret-ABC123)"  

Metadata:  
  AWS::CloudFormation::Interface:  
    ParameterGroups:  
      - Label:  
          default: "Network Configuration"  
        Parameters: [VpcId, SubnetIds]  
      - Label:  
          default: "Database Credentials"  
        Parameters: [MasterUsername, SecretArn]  

Resources:  
  DBSubnetGroup:  
    Type: AWS::RDS::DBSubnetGroup  
    Properties:  
      DBSubnetGroupDescription: "Aurora public subnet group"  
      SubnetIds: !Ref SubnetIds  

  DBSecurityGroup:  
    Type: AWS::EC2::SecurityGroup  
    Properties:  
      GroupDescription: "Aurora MySQL public access"  
      VpcId: !Ref VpcId  
      SecurityGroupIngress:  
        - IpProtocol: tcp  
          FromPort: 3306  
          ToPort: 3306  
          CidrIp: 0.0.0.0/0  

  ClusterParamGroup:  
    Type: AWS::RDS::DBClusterParameterGroup  
    Properties:  
      Description: "Custom cluster parameters"  
      Family: aurora-mysql8.0  
      Parameters:  
        server_audit_logging: 1  

  InstanceParamGroup:  
    Type: AWS::RDS::DBParameterGroup  
    Properties:  
      Description: "Custom instance parameters"  
      Family: aurora-mysql8.0  
      Parameters:  
        time_zone: UTC  
        sql_mode: "STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"  

  AuroraCluster:  
    Type: AWS::RDS::DBCluster  
    Properties:  
      Engine: aurora-mysql  
      EngineVersion: 8.0.mysql_aurora.3.07.1  
      DatabaseName: applicationDB  
      MasterUsername: !Ref MasterUsername  
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${SecretArn}:SecretString:password}}'  
      DBSubnetGroupName: !Ref DBSubnetGroup  
      VpcSecurityGroupIds:  
        - !GetAtt DBSecurityGroup.GroupId  
      DBClusterParameterGroupName: !Ref ClusterParamGroup  
      StorageEncrypted: true  
      BackupRetentionPeriod: 7  
      PreferredBackupWindow: "03:00-04:00"  

  DBInstance1:  
    Type: AWS::RDS::DBInstance  
    Properties:  
      Engine: aurora-mysql  
      DBInstanceClass: db.t3.large  
      PubliclyAccessible: true  
      DBClusterIdentifier: !Ref AuroraCluster  
      DBParameterGroupName: !Ref InstanceParamGroup  

  DBInstance2:  
    Type: AWS::RDS::DBInstance  
    Properties:  
      Engine: aurora-mysql  
      DBInstanceClass: db.t3.large  
      PubliclyAccessible: true  
      DBClusterIdentifier: !Ref AuroraCluster  
      DBParameterGroupName: !Ref InstanceParamGroup  

Outputs:  
  ClusterEndpoint:  
    Value: !GetAtt AuroraCluster.Endpoint.Address  
  ReaderEndpoint:  
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address  
  SecurityGroupId:  
    Value: !Ref DBSecurityGroup