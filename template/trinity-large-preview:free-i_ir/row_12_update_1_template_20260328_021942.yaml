AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Elastic IP and SSH Access

Resources:
  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
    Metadata:
      Effect: public-access

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      KeyName: my-key-pair
      SecurityGroupIds:
        - !Ref SSHSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp2
            Encrypted: true
    Metadata:
      Effect: encrypted
    DependsOn: SSHSecurityGroup

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
    Metadata:
      Effect: none

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      AllocationId: !GetAtt ElasticIP.AllocationId
    Metadata:
      Effect: none
    DependsOn:
      - EC2Instance
      - ElasticIP

Metadata:
  Invariants:
    - EC2 instance must be in default VPC
    - SSH access restricted to port 22
    - Elastic IP must be associated with the EC2 instance