AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Baseline with Role-Based Access Controls and Cross-Account Trust'

Parameters:
  TrustedIdentityAccountId:
    Type: String
    Description: AWS Account ID for Identity Management
    AllowedPattern: '^[0-9]{12}$'

  TrustedToolingAccountId:
    Type: String
    Description: AWS Account ID for Tooling Management
    AllowedPattern: '^[0-9]{12}$'

Resources:
  MFARequirementPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Enforces MFA requirement for IAM users
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: MFARequired
            Effect: Deny
            NotAction:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
            Resource: '*'
            Condition:
              BoolIfExists:
                'aws:MultiFactorAuthPresent': 'false'

  AdminGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: Administrators
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

  ReadOnlyGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: ReadOnly
      ManagedPolicyArns:
        - !Ref MFARequirementPolicy
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  CrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub 'arn:aws:iam::${TrustedIdentityAccountId}:root'
                - !Sub 'arn:aws:iam::${TrustedToolingAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              Bool:
                'aws:MultiFactorAuthPresent': 'true'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  CFNExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  AdminGroupArn:
    Description: ARN of Admin Group
    Value: !GetAtt AdminGroup.Arn

  ReadOnlyGroupArn:
    Description: ARN of ReadOnly Group
    Value: !GetAtt ReadOnlyGroup.Arn

  CrossAccountRoleArn:
    Description: ARN of Cross-Account Role
    Value: !GetAtt CrossAccountRole.Arn

  CFNExecutionRoleArn:
    Description: ARN of CloudFormation Execution Role
    Value: !GetAtt CFNExecutionRole.Arn