AWSTemplateFormatVersion: '2010-09-09'
Description: 'EC2 instance with ephemeral drives in default VPC using latest Amazon Linux 2 AMI'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: 'Name of an existing EC2 KeyPair to enable SSH access (create with: aws ec2 create-key-pair --key-name MyKey --query "KeyMaterial" --output text > MyKey.pem)'
  InstanceType:
    Type: String
    Default: m5d.large
    Description: 'EC2 instance type with NVMe instance store (ephemeral) support'
    AllowedValues:
      - m5d.large
      - m5d.xlarge
      - m5d.2xlarge
      - m5d.4xlarge
      - c5d.large
      - c5d.xlarge
    ConstraintDescription: 'must support instance store volumes'
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'ID of the pre-existing default VPC'
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: 'ID of a public subnet in the default VPC (for public IP assignment)'
  AllowedCidrIngress:
    Type: String
    Default: '0.0.0.0/0'
    Description: 'CIDR range allowed SSH access (port 22)'
    AllowedPattern: "^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(/([0-9]|[1-2][0-9]|3[0-2]))?$"
    ConstraintDescription: 'must be valid CIDR range (e.g. 0.0.0.0/0 or 10.0.0.0/24)'

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Enable SSH access to EC2 instance'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidrIngress
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: '0.0.0.0/0'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-EC2-SG'

  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2-ami-kernel-5.10-hvm-2.0-x86_64-gp2}}'
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref InstanceSecurityGroup
          AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: 30
            DeleteOnTermination: true
        - DeviceName: /dev/sdb
          VirtualName: ephemeral0
        - DeviceName: /dev/sdc
          VirtualName: ephemeral1
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Instance'

Outputs:
  InstanceId:
    Description: 'EC2 Instance ID'
    Value: !Ref Ec2Instance
  PublicIp:
    Description: 'Public IP for SSH (ssh -i key.pem ec2-user@PublicIp)'
    Value: !GetAtt Ec2Instance.PublicIp
  KeyName:
    Description: 'KeyPair name used for SSH access'
    Value: !Ref KeyName
  SecurityGroupId:
    Description: 'Security Group ID'
    Value: !Ref InstanceSecurityGroup