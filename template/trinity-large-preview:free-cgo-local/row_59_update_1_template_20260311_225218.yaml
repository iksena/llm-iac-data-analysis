AWSTemplateFormatVersion: '2010-09-09'
Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: 1
      RetentionPeriodHours: 24
    UpdateReplacePolicy: Retain

  ReadThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ReadProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: ReadProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 300
      Statistic: Sum
      Threshold: 0
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream

  WriteThroughputAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: WriteProvisionedThroughputExceeded
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: WriteProvisionedThroughputExceeded
      Namespace: AWS/Kinesis
      Period: 300
      Statistic: Sum
      Threshold: 0
      AlarmActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: StreamName
          Value: !Ref KinesisStream

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: KinesisThroughputAlarms

Outputs:
  StreamName:
    Description: The name of the Kinesis Data Stream
    Value: !Ref KinesisStream
  StreamARN:
    Description: The ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn