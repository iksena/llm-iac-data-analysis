AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref GlueScriptBucket
        LogPrefix: logs/

  GlueScriptBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${GlueScriptBucket}/*'

  GlueIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${GlueScriptBucket}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${GlueScriptBucket}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: pythonshell
        ScriptLocation: !Sub 's3://${GlueScriptBucket}/gue_scripts/sample_convert.py'
      Role: !GetAtt GlueIAMRole.Arn
      DefaultArguments:
        '--job-language': 'python'
      GlueVersion: '4.0'
      MaxCapacity: 2.0
      Timeout: 60
      SecurityConfiguration: !Ref GlueSecurityConfiguration

  GlueSecurityConfiguration:
    Type: AWS::Glue::SecurityConfiguration
    Properties:
      EncryptionConfiguration:
        CloudWatchEncryption:
          CloudWatchEncryptionMode: DISABLED
        JobBookmarksEncryption:
          JobBookmarksEncryptionMode: DISABLED
        S3Encryption:
          S3EncryptionMode: DISABLED

Outputs:
  ScriptBucketName:
    Value: !Ref GlueScriptBucket
  GlueJobName:
    Value: !Ref GlueETLJob