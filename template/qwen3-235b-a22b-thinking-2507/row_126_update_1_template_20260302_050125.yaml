AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  StreamName:
    Type: String
    Default: 'KinesisDataStream'
    Description: 'Name of the Kinesis data stream'
  ShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
    Description: 'Number of shards for the Kinesis stream'

Resources:
  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      ShardCount: !Ref ShardCount

  ApiGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: KinesisAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                Resource: !GetAtt KinesisStream.Arn

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: KinesisProxyAPI
      Description: REST API for Kinesis data stream interaction
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiResourceStream:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: 'stream'
      RestApiId: !Ref RestApi

  ApiResourceStreamName:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !Ref ApiResourceStream
      PathPart: '{streamName}'
      RestApiId: !Ref RestApi

  ApiResourceRecord:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !Ref ApiResourceStreamName
      PathPart: 'record'
      RestApiId: !Ref RestApi

  ApiResourceRecords:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !Ref ApiResourceStreamName
      PathPart: 'records'
      RestApiId: !Ref RestApi

  ApiResourceShardIterator:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !Ref ApiResourceStreamName
      PathPart: 'sharditerator'
      RestApiId: !Ref RestApi

  PutRecordMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: PUT
      ResourceId: !Ref ApiResourceRecord
      RestApiId: !Ref RestApi
      RequestParameters:
        method.request.path.streamName: true
        method.request.header.X-Partition-Key: true
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecord'
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        RequestParameters:
          integration.request.path.streamName: method.request.path.streamName
        RequestTemplates:
          application/json: |
            {
              "StreamName": "$input.params('streamName')",
              "Data": "$util.base64Encode($input.json('$.data'))",
              "PartitionKey": "$input.params('X-Partition-Key')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "ShardId": "$inputRoot.ShardId",
                  "SequenceNumber": "$inputRoot.SequenceNumber"
                }

  PutRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: PUT
      ResourceId: !Ref ApiResourceRecords
      RestApiId: !Ref RestApi
      RequestParameters:
        method.request.path.streamName: true
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/PutRecords'
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        RequestParameters:
          integration.request.path.streamName: method.request.path.streamName
        RequestTemplates:
          application/json: |
            #set($records = [])
            #foreach($rec in $input.path('$.records'))
            #set($data = $util.base64Encode($rec.data))
            #set($partitionKey = $rec.partitionKey)
            #set($dummy = $records.add({
              "Data": "$data",
              "PartitionKey": "$partitionKey"
            }))
            #end
            {
              "StreamName": "$input.params('streamName')",
              "Records": $records
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "FailedRecordCount": $inputRoot.FailedRecordCount,
                  "Records": $inputRoot.Records
                }

  GetRecordsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiResourceRecords
      RestApiId: !Ref RestApi
      RequestParameters:
        method.request.path.streamName: true
        method.request.querystring.shardIterator: true
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetRecords'
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        RequestParameters:
          integration.request.querystring.shardIterator: method.request.querystring.shardIterator
        RequestTemplates:
          application/json: |
            {
              "ShardIterator": "$input.params('shardIterator')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "Records": $inputRoot.Records,
                  "NextShardIterator": "$inputRoot.NextShardIterator",
                  "MillisBehindLatest": $inputRoot.MillisBehindLatest
                }

  GetShardIteratorMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiResourceShardIterator
      RestApiId: !Ref RestApi
      RequestParameters:
        method.request.path.streamName: true
        method.request.querystring.shardId: true
        method.request.querystring.type: true
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/GetShardIterator'
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        RequestParameters:
          integration.request.path.streamName: method.request.path.streamName
        RequestTemplates:
          application/json: |
            {
              "StreamName": "$input.params('streamName')",
              "ShardId": "$input.params('shardId')",
              "ShardIteratorType": "$input.params('type')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                {
                  "ShardIterator": "$inputRoot.ShardIterator"
                }

  DescribeStreamMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref ApiResourceStreamName
      RestApiId: !Ref RestApi
      RequestParameters:
        method.request.path.streamName: true
      MethodResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: true
          ResponseModels:
            application/json: 'Empty'
      Integration:
        Type: AWS
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:kinesis:action/DescribeStream'
        Credentials: !GetAtt ApiGatewayRole.Arn
        IntegrationHttpMethod: POST
        RequestParameters:
          integration.request.path.streamName: method.request.path.streamName
        RequestTemplates:
          application/json: |
            {
              "StreamName": "$input.params('streamName')"
            }
        IntegrationResponses:
          - StatusCode: '200'
            ResponseParameters:
              method.response.header.Content-Type: "'application/json'"
            ResponseTemplates:
              application/json: |
                #set($inputRoot = $input.path('$'))
                $input.json('$.StreamDescription')

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref RestApi
      StageName: prod
    DependsOn:
      - PutRecordMethod
      - PutRecordsMethod
      - GetRecordsMethod
      - GetShardIteratorMethod
      - DescribeStreamMethod

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  StreamArn:
    Description: ARN of the Kinesis data stream
    Value: !GetAtt KinesisStream.Arn
  ApiExecutionArn:
    Description: API Gateway execution ARN for IAM policies
    Value: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/prod/*/*'