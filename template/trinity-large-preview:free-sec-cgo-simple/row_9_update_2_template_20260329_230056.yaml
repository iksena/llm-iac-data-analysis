AWSTemplateFormatVersion: '2010-09-09'

Resources:
  EncryptedOneZoneFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_7_DAYS
      ThroughputMode: bursting
      ProvisionedThroughputInMibps: 1
      AvailabilityZoneName: us-east-1a
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

Outputs:
  FileSystemId:
    Description: The ID of the encrypted One Zone file system
    Value: !Ref EncryptedOneZoneFileSystem
    Export:
      Name: !Sub '${AWS::StackName}-FileSystemId'

  FileSystemArn:
    Description: The ARN of the encrypted One Zone file system
    Value: !GetAtt EncryptedOneZoneFileSystem.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FileSystemArn'