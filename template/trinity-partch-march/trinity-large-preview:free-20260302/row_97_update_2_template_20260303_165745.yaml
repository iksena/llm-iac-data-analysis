AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data

Parameters:
  TargetS3Bucket:
    Type: String
    Description: Name of the S3 bucket to store organizational data
  TagsToInclude:
    Type: String
    Description: Comma-separated list of tags to include in reports
    Default: ''
  ManagementAccountId:
    Type: String
    Description: AWS Management Account ID for cross-account access
  AthenaDatabaseName:
    Type: String
    Description: Name of the Athena database
    Default: managementcur

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref TargetS3Bucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Ref TargetS3Bucket

  OrganizationsDataLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - organizations:Describe*
                  - organizations:List*
                Resource: '*'
        - PolicyName: CrossAccountAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${ManagementAccountId}:role/OrganizationAccessRole'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${TargetS3Bucket}/*'

  OrganizationsDataLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt OrganizationsDataLambdaRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          TARGET_S3_BUCKET: !Ref TargetS3Bucket
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          def lambda_handler(event, context):
              # Fetch Organizations data
              org_client = boto3.client('organizations')
              accounts = org_client.list_accounts()
              ou_data = org_client.list_roots()

              # Process data and write to S3
              s3_client = boto3.client('s3')
              timestamp = datetime.now().strftime('%Y-%m-%d-%H-%M-%S')
              data = {
                  'accounts': accounts,
                  'organizational_units': ou_data,
                  'timestamp': timestamp
              }
              s3_client.put_object(
                  Bucket=os.environ['TARGET_S3_BUCKET'],
                  Key=f'organizations-data/{timestamp}.json',
                  Body=json.dumps(data)
              )
              return {
                  'statusCode': 200,
                  'body': json.dumps('Data collection successful')
              }

  CloudWatchEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Weekly Organizations data collection
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn: !GetAtt OrganizationsDataLambda.Arn
          Id: OrganizationsDataCollection

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrganizationsDataLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudWatchEventRule.Arn

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref AthenaDatabaseName

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${TargetS3Bucket}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt S3Bucket.Arn

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrganizationsDataCrawler
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${TargetS3Bucket}/organizations-data/'
      Schedule:
        ScheduleExpression: 'cron(0 2 * * ? *)' # Run daily at 2 AM UTC

Outputs:
  S3BucketArn:
    Value: !GetAtt S3Bucket.Arn
  LambdaFunctionArn:
    Value: !GetAtt OrganizationsDataLambda.Arn
  GlueDatabaseArn:
    Value: !Sub 'arn:aws:glue:us-east-1:${AWS::AccountId}:database/${AthenaDatabaseName}'
  GlueCrawlerArn:
    Value: !GetAtt GlueCrawler.Arn