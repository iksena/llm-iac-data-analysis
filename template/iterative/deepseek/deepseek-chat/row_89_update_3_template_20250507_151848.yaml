AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to enable AWS Security Hub with default security standards'

Resources:
  SecurityHub:
    Type: 'AWS::SecurityHub::Hub'
    Properties:
      EnableDefaultStandards: true
      AutoEnableControls: true

  AWSFoundationalStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::standards/aws-foundational-security-best-practices/v/1.0.0'
      DependsOn: SecurityHub

  CISStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::standards/cis-aws-foundations-benchmark/v/1.2.0'
      DependsOn: SecurityHub

  PCIDSSStandard:
    Type: 'AWS::SecurityHub::StandardsSubscription'
    Properties:
      StandardsArn: 'arn:aws:securityhub:::standards/pci-dss/v/3.2.1'
      DependsOn: SecurityHub

Outputs:
  SecurityHubARN:
    Description: 'ARN of the enabled Security Hub'
    Value: !GetAtt SecurityHub.Arn
  EnabledStandards:
    Description: 'List of enabled security standards'
    Value: !Join
      - ', '
      - - !Ref AWSFoundationalStandard
        - !Ref CISStandard
        - !Ref PCIDSSStandard