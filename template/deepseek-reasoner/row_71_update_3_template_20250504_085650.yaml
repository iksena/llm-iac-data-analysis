AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Target VPC for resources
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for EC2 instance
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t4g.micro
    ConstraintDescription: Must be a valid EC2 instance type
  EnvironmentName:
    Type: String
    Default: production
    MinLength: 3
    MaxLength: 15
    AllowedPattern: ^[a-zA-Z][a-zA-Z0-9]*$
    Description: Environment name tag (letters+numbers)

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access from any IP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-http-sg

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2:1}}'
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-web-server
        - Key: Environment
          Value: !Ref EnvironmentName

  DataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

Outputs:
  InstancePublicIP:
    Description: Web server public IP address
    Value: !GetAtt WebServer.PublicIp
    Export:
      Name: !Sub "${AWS::StackName}-PublicIP"
  SecurityGroupId:
    Description: Created security group ID
    Value: !Ref SecurityGroup
  S3BucketName:
    Description: Created S3 bucket name
    Value: !Ref DataBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"