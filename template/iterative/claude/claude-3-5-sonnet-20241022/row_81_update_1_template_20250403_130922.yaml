AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an AWS Resource Group with tag-based filtering for multiple services'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name for resource tagging
    
  ProjectName:
    Type: String
    Description: Project name for resource tagging
    MinLength: 1
    MaxLength: 128
    
  AdditionalTagKey:
    Type: String
    Description: Optional additional tag key for filtering
    Default: Application
    
  AdditionalTagValue:
    Type: String
    Description: Optional additional tag value for filtering
    Default: MyApp

Resources:
  ResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-resource-group
      Description: !Sub "Resource group for ${ProjectName} ${Environment} environment"
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          ResourceTypeFilters:
            - AWS::EC2::Instance
            - AWS::RDS::DBInstance
            - AWS::SageMaker::NotebookInstance
            - AWS::SSM::ManagedInstance
            - AWS::Lambda::Function
            - AWS::DynamoDB::Table
          TagFilters:
            - Key: Environment
              Values:
                - !Ref Environment
            - Key: Project
              Values:
                - !Ref ProjectName
            - Key: !Ref AdditionalTagKey
              Values:
                - !Ref AdditionalTagValue
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: !Ref ProjectName
        - Key: CreatedBy
          Value: CloudFormation

Outputs:
  ResourceGroupArn:
    Description: ARN of the created Resource Group
    Value: !GetAtt ResourceGroup.Arn
    
  ResourceGroupName:
    Description: Name of the created Resource Group
    Value: !Ref ResourceGroup
    
  ResourceGroupQuery:
    Description: Query configuration of the Resource Group
    Value: !GetAtt ResourceGroup.ResourceQuery