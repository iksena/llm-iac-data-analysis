AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with Auto Scaling Group and ElastiCache with snapshot management'

Parameters:
  EnvironmentName:
    Description: Environment name
    Type: String
    Default: Production

  VpcCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Description: CIDR block for the first public subnet
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Description: CIDR block for the second public subnet
    Type: String
    Default: 10.0.2.0/24

  ElastiCacheInstanceType:
    Description: ElastiCache instance type
    Type: String
    Default: cache.t3.medium
    AllowedValues:
      - cache.t3.medium
      - cache.m4.large
      - cache.m5.large
      - cache.r4.large
      - cache.r5.large

  SnapshotRetentionPeriod:
    Description: Number of days to retain ElastiCache snapshots (0 to disable)
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 35

  ASGMinSize:
    Description: Minimum size of the Auto Scaling Group
    Type: Number
    Default: 1
    MinValue: 1

  ASGMaxSize:
    Description: Maximum size of the Auto Scaling Group
    Type: Number
    Default: 3
    MinValue: 1

  ASGDesiredCapacity:
    Description: Desired capacity of the Auto Scaling Group
    Type: Number
    Default: 2
    MinValue: 1

  EC2InstanceType:
    Description: EC2 instance type for the Auto Scaling Group
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - m5.large

Mappings:
  RegionMap:
    us-east-1:
      AZ1: us-east-1a
      AZ2: us-east-1b
    us-east-2:
      AZ1: us-east-2a
      AZ2: us-east-2b
    us-west-1:
      AZ1: us-west-1a
      AZ2: us-west-1c
    us-west-2:
      AZ1: us-west-2a
      AZ2: us-west-2b
    eu-west-1:
      AZ1: eu-west-1a
      AZ2: eu-west-1b
    eu-central-1:
      AZ1: eu-central-1a
      AZ2: eu-central-1b
    ap-northeast-1:
      AZ1: ap-northeast-1a
      AZ2: ap-northeast-1c
    ap-southeast-1:
      AZ1: ap-southeast-1a
      AZ2: ap-southeast-1b
    ap-southeast-2:
      AZ1: ap-southeast-2a
      AZ2: ap-southeast-2b

  AWSRegionArch2AMI:
    us-east-1:
      HVM64: ami-0261755bbcb8c4a84
    us-east-2:
      HVM64: ami-0430580de6244e02e
    us-west-1:
      HVM64: ami-04669a22aad391419
    us-west-2:
      HVM64: ami-0c65adc9a5c1b5d7c
    eu-west-1:
      HVM64: ami-0694d931cee176e7d
    eu-central-1:
      HVM64: ami-0f61af304b14f15fb
    ap-northeast-1:
      HVM64: ami-0d52744d6551d851e
    ap-southeast-1:
      HVM64: ami-0df7a207adb9748c7
    ap-southeast-2:
      HVM64: ami-0310483fb2b488153

Resources:
  # VPC and Network Resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-IGW

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !FindInMap [RegionMap, !Ref 'AWS::Region', AZ1]
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !FindInMap [RegionMap, !Ref 'AWS::Region', AZ2]
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicRouteTable

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  # Security Groups
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-EC2-SG

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ElastiCache
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ElastiCache-SG

  # ElastiCache Resources
  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for ElastiCache
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  ElastiCacheParameterGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      CacheParameterGroupFamily: redis6.x
      Description: Parameter group for ElastiCache Redis

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub ${EnvironmentName} ElastiCache Replication Group
      AutomaticFailoverEnabled: true
      CacheNodeType: !Ref ElastiCacheInstanceType
      CacheParameterGroupName: !Ref ElastiCacheParameterGroup
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      Engine: redis
      EngineVersion: 6.2
      NumNodeGroups: 1
      ReplicasPerNodeGroup: 1
      Port: 6379
      SecurityGroupIds:
        - !GetAtt ElastiCacheSecurityGroup.GroupId
      SnapshotRetentionLimit: !Ref SnapshotRetentionPeriod
      SnapshotWindow: "00:00-01:00"

  # IAM Resources for Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ElastiCacheSnapshotManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:ModifyReplicationGroup
                  - elasticache:DescribeReplicationGroups
                Resource: !Sub arn:aws:elasticache:${AWS::Region}:${AWS::AccountId}:replicationgroup:*

  # Lambda Function for Snapshot Management
  SnapshotManagementFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import os
          import json
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              logger.info('Received event: %s', json.dumps(event))
              
              # Extract parameters from the event
              replication_group_id = event.get('replicationGroupId')
              snapshot_retention = int(event.get('snapshotRetention', 0))
              
              if not replication_group_id:
                  error_msg = 'Error: replicationGroupId is required'
                  logger.error(error_msg)
                  return {
                      'statusCode': 400,
                      'body': error_msg
                  }
              
              try:
                  elasticache = boto3.client('elasticache')
                  
                  # First, describe the replication group to verify it exists
                  try:
                      describe_response = elasticache.describe_replication_groups(
                          ReplicationGroupId=replication_group_id
                      )
                      logger.info('Found replication group: %s', replication_group_id)
                  except elasticache.exceptions.ReplicationGroupNotFoundFault:
                      error_msg = f'Replication group {replication_group_id} not found'
                      logger.error(error_msg)
                      return {
                          'statusCode': 404,
                          'body': error_msg
                      }
                  
                  # Modify the replication group
                  response = elasticache.modify_replication_group(
                      ReplicationGroupId=replication_group_id,
                      SnapshotRetentionLimit=snapshot_retention,
                      ApplyImmediately=True
                  )
                  
                  success_msg = f'Successfully updated snapshot retention to {snapshot_retention} for {replication_group_id}'
                  logger.info(success_msg)
                  return {
                      'statusCode': 200,
                      'body': success_msg
                  }
              except Exception as e:
                  error_msg = f'Error updating snapshot retention: {str(e)}'
                  logger.error(error_msg)
                  return {
                      'statusCode': 500,
                      'body': error_msg
                  }

  # Auto Scaling Group Resources
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-LaunchTemplate
      VersionDescription: Initial version
      LaunchTemplateData:
        ImageId: !FindInMap [AWSRegionArch2AMI, !Ref 'AWS::Region', HVM64]
        InstanceType: !Ref EC2InstanceType
        SecurityGroupIds:
          - !GetAtt EC2SecurityGroup.GroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash -xe
            yum update -y
            yum install -y amazon-cloudwatch-agent
            
            # Install Redis client for testing
            amazon-linux-extras install redis6 -y
            
            # Store ElastiCache information for reference
            mkdir -p /opt/elasticache
            echo "ElastiCache configuration:" > /opt/elasticache/config.txt
            echo "Primary Endpoint: ${ElastiCacheReplicationGroup.PrimaryEndPoint.Address}" >> /opt/elasticache/config.txt
            echo "Port: 6379" >> /opt/elasticache/config.txt
            
            # Signal completion
            /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource AutoScalingGroup --region ${AWS::Region}

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      MinSize: !Ref ASGMinSize
      MaxSize: !Ref ASGMaxSize
      DesiredCapacity: !Ref ASGDesiredCapacity
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ASG-Instance
          PropagateAtLaunch: true

Outputs:
  VPC:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VPC

  PublicSubnet1:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnet1

  PublicSubnet2:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub ${AWS::StackName}-PublicSubnet2

  ElastiCacheEndpoint:
    Description: ElastiCache Primary Endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub ${AWS::StackName}-ElastiCacheEndpoint

  ElastiCachePort:
    Description: ElastiCache Port
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Port
    Export:
      Name: !Sub ${AWS::StackName}-ElastiCachePort

  AutoScalingGroupName:
    Description: Auto Scaling Group Name
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub ${AWS::StackName}-ASGName

  SnapshotManagementFunctionArn:
    Description: ARN of the Lambda function for snapshot management
    Value: !GetAtt SnapshotManagementFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SnapshotManagementFunction