AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template that creates four IAM roles with tiered permissions for FIS access management'

Resources:
  # Security Admin Role and Policy
  SecurityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Path: /

  SecurityAdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecurityAdminFISPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 
              - fis:*
            Resource: '*'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: 'arn:aws:iam::*:role/workshop-*'
            Condition:
              StringEquals:
                'iam:PassedToService': 'fis.amazonaws.com'
          - Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: 'arn:aws:iam::*:role/aws-service-role/*'
      Roles:
        - !Ref SecurityAdminRole

  # Admin Role and Policy
  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Path: /

  AdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: AdminFISPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 
              - fis:*
            Resource: '*'
          - Effect: Deny
            Action: 
              - fis:*
            Resource: '*'
            Condition:
              StringEquals:
                'aws:ResourceTag/environment': 'prod'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: 'arn:aws:iam::*:role/workshop-*'
            Condition:
              StringEquals:
                'iam:PassedToService': 'fis.amazonaws.com'
          - Effect: Allow
            Action:
              - iam:CreateServiceLinkedRole
            Resource: 'arn:aws:iam::*:role/aws-service-role/*'
      Roles:
        - !Ref AdminRole

  # User Role and Policy
  UserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Path: /

  UserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: UserFISPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 
              - fis:StartExperiment
              - fis:StopExperiment
              - fis:Get*
              - fis:List*
              - fis:TagResource
              - fis:UntagResource
            Resource: '*'
          - Effect: Deny
            Action: 
              - fis:*
            Resource: '*'
            Condition:
              StringEquals:
                'aws:ResourceTag/environment': 'prod'
          - Effect: Allow
            Action:
              - iam:PassRole
            Resource: 'arn:aws:iam::*:role/workshop-*'
            Condition:
              StringEquals:
                'iam:PassedToService': 'fis.amazonaws.com'
      Roles:
        - !Ref UserRole

  # Non-User Role and Policy
  NonUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: NonUserRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Path: /

  NonUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: NonUserFISPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Action: 
              - fis:*
            Resource: '*'
      Roles:
        - !Ref NonUserRole

Outputs:
  SecurityAdminRoleArn:
    Description: ARN of the Security Admin Role
    Value: !GetAtt SecurityAdminRole.Arn

  AdminRoleArn:
    Description: ARN of the Admin Role
    Value: !GetAtt AdminRole.Arn

  UserRoleArn:
    Description: ARN of the User Role
    Value: !GetAtt UserRole.Arn

  NonUserRoleArn:
    Description: ARN of the Non-User Role
    Value: !GetAtt NonUserRole.Arn