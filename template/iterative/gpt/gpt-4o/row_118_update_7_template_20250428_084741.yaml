AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EnrichmentQueue

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/events/enrichment-logs
      RetentionInDays: 14

  StepFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StepFunctionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/events/enrichment-logs:*
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*/GET/us/*

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import requests
          import os

          sqs = boto3.client('sqs')
          logs = boto3.client('logs')

          def handler(event, context):
              queue_url = os.environ['QUEUE_URL']
              log_group = os.environ['LOG_GROUP']

              # Receive message from SQS
              response = sqs.receive_message(
                  QueueUrl=queue_url,
                  MaxNumberOfMessages=1
              )

              if 'Messages' in response:
                  message = response['Messages'][0]
                  receipt_handle = message['ReceiptHandle']
                  body = json.loads(message['Body'])
                  zip_code = body.get('zipCode')

                  # Enrich data using external API
                  api_response = requests.get(f"https://api.zippopotam.us/us/{zip_code}")
                  enriched_data = api_response.json()

                  # Log the enriched data
                  logs.put_log_events(
                      logGroupName=log_group,
                      logStreamName='EnrichmentLogStream',
                      logEvents=[
                          {
                              'timestamp': int(context.timestamp),
                              'message': json.dumps(enriched_data)
                          }
                      ]
                  )

                  # Delete received message from queue
                  sqs.delete_message(
                      QueueUrl=queue_url,
                      ReceiptHandle=receipt_handle
                  )

      Runtime: python3.8
      Environment:
        Variables:
          QUEUE_URL: !Ref SQSQueue
          LOG_GROUP: !Ref CloudWatchLogGroup

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/events/enrichment-logs:*
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource: arn:aws:execute-api:*:*:*/GET/us/*

  StepFunction:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      RoleArn: !GetAtt StepFunctionRole.Arn
      DefinitionString: 
        Fn::Sub: |
          {
            "Comment": "A simple AWS Step Functions state machine that enriches SQS messages.",
            "StartAt": "InvokeLambda",
            "States": {
              "InvokeLambda": {
                "Type": "Task",
                "Resource": "${LambdaFunction.Arn}",
                "End": true
              }
            }
          }

Outputs:
  SQSQueueURL:
    Description: URL of the SQS Queue
    Value: !Ref SQSQueue

  CloudWatchLogGroupName:
    Description: Name of the CloudWatch Log Group
    Value: !Ref CloudWatchLogGroup

  StepFunctionARN:
    Description: ARN of the Step Function
    Value: !Ref StepFunction