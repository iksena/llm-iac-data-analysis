AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template to create a standardized IAM baseline with secure,
  role-based access controls and cross-account trust configurations for AWS account governance.

Parameters:
  IdentityManagementAccountId:
    Description: "AWS Account ID for Identity Management Account"
    Type: String
  ToolingManagementAccountId:
    Description: "AWS Account ID for Tooling Management Account"
    Type: String

Resources:

  IAMGroupPrivilegedAdmin:
    Type: AWS::IAM::Group
    Properties:
      GroupName: PrivilegedAdmin

  IAMPolicyPrivilegedAdmin:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: PrivilegedAdminPolicy
      Groups:
        - !Ref IAMGroupPrivilegedAdmin
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "*"
            Resource: "*"
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"

  IAMGroupRestrictedAdmin:
    Type: AWS::IAM::Group
    Properties:
      GroupName: RestrictedAdmin

  IAMPolicyRestrictedAdmin:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RestrictedAdminPolicy
      Groups:
        - !Ref IAMGroupRestrictedAdmin
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "ec2:Describe*"
              - "cloudwatch:Describe*"
              - "logs:Describe*"
            Resource: "*"

  IAMGroupIdentityAdmin:
    Type: AWS::IAM::Group
    Properties:
      GroupName: IdentityAdmin

  IAMPolicyIdentityAdmin:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: IdentityAdminPolicy
      Groups:
        - !Ref IAMGroupIdentityAdmin
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - "iam:*"
              - "organizations:*"
            Resource: "*"
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"

  CrossAccountGovernanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CrossAccountGovernanceRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                - !Sub "arn:aws:iam::${ToolingManagementAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: "true"
      Policies:
        - PolicyName: CrossAccountGovernancePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Deny
                Action:
                  - "aws-portal:*"
                  - "cloudhsm:*"
                Resource: "*"
              - Effect: Allow
                Action: "*"
                Resource: "*"

  CFNExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CFNExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "cloudformation:CreateStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:ValidateTemplate"
                  - "iam:PassRole"
                Resource: "*"

  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StackSetExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StackSetExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "cloudformation:CreateStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:DeleteStack"
                  - "iam:PassRole"
                Resource: "*"

Outputs:
  PrivilegedAdminGroupName:
    Description: "Name of the Privileged Admin IAM Group"
    Value: !Ref IAMGroupPrivilegedAdmin
  RestrictedAdminGroupName:
    Description: "Name of the Restricted Admin IAM Group"
    Value: !Ref IAMGroupRestrictedAdmin
  IdentityAdminGroupName:
    Description: "Name of the Identity Admin IAM Group"
    Value: !Ref IAMGroupIdentityAdmin
  CrossAccountGovernanceRoleARN:
    Description: "ARN of the Cross-Account Governance Role"
    Value: !GetAtt CrossAccountGovernanceRole.Arn
  CFNExecutionRoleARN:
    Description: "ARN of the CloudFormation Execution Role"
    Value: !GetAtt CFNExecutionRole.Arn
  StackSetExecutionRoleARN:
    Description: "ARN of the StackSet Execution Role"
    Value: !GetAtt StackSetExecutionRole.Arn