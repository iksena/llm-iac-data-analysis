AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch Dashboard and Log Queries for AWS Client VPN Monitoring'

Parameters:
  VPNEndpointId:
    Type: String
    Description: 'ID of the Client VPN Endpoint to monitor'
  
  DashboardName:
    Type: String
    Default: 'ClientVPNMonitoring'
    Description: 'Name of the CloudWatch Dashboard'
    
  LogGroupName:
    Type: String
    Description: 'Name of the CloudWatch Log Group containing Client VPN logs'

Resources:
  VPNMonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub 
        - |
          {
            "widgets": [
              {
                "type": "log",
                "x": 0,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "${ConnectionQuery}",
                  "region": "${AWS::Region}",
                  "title": "VPN Connection Analysis",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 12,
                "y": 0,
                "width": 12,
                "height": 6,
                "properties": {
                  "query": "${DataTransferQuery}",
                  "region": "${AWS::Region}",
                  "title": "Data Transfer Analysis",
                  "view": "table"
                }
              },
              {
                "type": "log",
                "x": 0,
                "y": 6,
                "width": 24,
                "height": 6,
                "properties": {
                  "query": "${UserActivityQuery}",
                  "region": "${AWS::Region}",
                  "title": "User Activity Analysis",
                  "view": "table"
                }
              }
            ]
          }
        - ConnectionQuery: !GetAtt ConnectionQueryParameter.Value
          DataTransferQuery: !GetAtt DataTransferQueryParameter.Value
          UserActivityQuery: !GetAtt UserActivityQueryParameter.Value

  ConnectionQueryParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Value: !Sub |
        SOURCE ${LogGroupName}
        | fields @timestamp, connection_id, user, authentication_type
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            count(*) as total_connections,
            count_distinct(connection_id) as unique_connections,
            count_distinct(user) as unique_users
            by authentication_type
        | sort by total_connections desc
      Description: 'CloudWatch Logs Insights query for VPN connection analysis'
      Name: !Sub '/vpn-monitoring/${AWS::StackName}/connection-analysis'

  DataTransferQueryParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Value: !Sub |
        SOURCE ${LogGroupName}
        | fields @timestamp, bytes_in, bytes_out
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            sum(bytes_in) as total_ingress_bytes,
            sum(bytes_out) as total_egress_bytes,
            avg(bytes_in) as avg_ingress_bytes,
            avg(bytes_out) as avg_egress_bytes
            by bin(1h)
      Description: 'CloudWatch Logs Insights query for VPN data transfer analysis'
      Name: !Sub '/vpn-monitoring/${AWS::StackName}/data-transfer'

  UserActivityQueryParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Type: String
      Value: !Sub |
        SOURCE ${LogGroupName}
        | fields @timestamp, user, authentication_type, connection_id
        | filter endpoint_id = '${VPNEndpointId}'
        | stats
            count(*) as connection_count,
            earliest(@timestamp) as first_connection,
            latest(@timestamp) as last_connection
            by user, authentication_type
        | sort by connection_count desc
      Description: 'CloudWatch Logs Insights query for VPN user activity analysis'
      Name: !Sub '/vpn-monitoring/${AWS::StackName}/user-activity'

Outputs:
  DashboardURL:
    Description: 'URL of the created CloudWatch Dashboard'
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'
  
  ConnectionQueryParameterName:
    Description: 'SSM Parameter name for Connection Analysis Query'
    Value: !Ref ConnectionQueryParameter
  
  DataTransferQueryParameterName:
    Description: 'SSM Parameter name for Data Transfer Query'
    Value: !Ref DataTransferQueryParameter
  
  UserActivityQueryParameterName:
    Description: 'SSM Parameter name for User Activity Query'
    Value: !Ref UserActivityQueryParameter