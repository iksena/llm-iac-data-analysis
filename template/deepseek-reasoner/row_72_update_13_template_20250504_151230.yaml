AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  CodeServerVersion:
    Type: String
    Default: 4.4.0
  KeyPairName:
    Type: String
    Default: ''
    Description: '(Optional) Name of an existing EC2 KeyPair to enable SSH access'
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t2.micro
      - t3.medium
      - t3.large

Mappings:
  AWSRegionToAMI:
    us-east-1:
      AMI: ami-0c7217cdde317cfec
    us-west-2:
      AMI: ami-0d70546e43a941d70

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  CloudFrontSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow CloudFront access to code-server
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  CloudFrontPrefixListLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DescribePrefixLists
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: ec2:DescribeManagedPrefixLists
                Resource: '*'

  CloudFrontPrefixListLambda:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          const { EC2 } = require('aws-sdk');
          const { send } = require('cfn-response');
          
          exports.handler = async (event, context) => {
              try {
                  const ec2 = new EC2({ region: event.ResourceProperties.Region });
                  const data = await ec2.describeManagedPrefixLists({
                      Filters: [{ 
                          Name: 'prefix-list-name', 
                          Values: ['com.amazonaws.global.cloudfront.origin-facing'] 
                      }]
                  }).promise();
                  
                  if (data.PrefixLists.length === 0) {
                      throw new Error('CloudFront prefix list not found');
                  }
                  
                  send(event, context, 'SUCCESS', {
                      PrefixListId: data.PrefixLists[0].PrefixListId
                  });
              } catch (err) {
                  console.error(err);
                  send(event, context, 'FAILED', { error: err.message });
              }
          };
      Handler: index.handler
      Runtime: nodejs18.x
      Role: !GetAtt CloudFrontPrefixListLambdaRole.Arn
      Timeout: 30

  GetCloudFrontPrefixList:
    Type: Custom::GetCloudFrontPrefixList
    Properties:
      ServiceToken: !GetAtt CloudFrontPrefixListLambda.Arn
      Region: !Ref AWS::Region

  SecurityGroupIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref CloudFrontSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourcePrefixListId: !GetAtt GetCloudFrontPrefixList.PrefixListId

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: CodeServerCachePolicy
        Comment: 1-year TTL cache policy
        DefaultTTL: 31536000
        MaxTTL: 31536000
        MinTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: 
      - SecurityGroupIngressRule
      - CloudFrontCachePolicy
    Properties:
      ImageId: !FindInMap [AWSRegionToAMI, !Ref AWS::Region, AMI]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !GetAtt CloudFrontSecurityGroup.GroupId
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash -xe
            apt-get update -y
            curl -fsSL https://code-server.dev/install.sh | sh -s -- --version ${CodeServerVersion}
            mkdir -p /root/.config/code-server
            cat <<EOF > /root/.config/code-server/config.yaml
            bind-addr: 0.0.0.0:8080
            auth: none
            EOF
            systemctl enable --now code-server@root

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: EC2Instance
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Code-server distribution
        DefaultCacheBehavior:
          TargetOriginId: origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: !Ref CloudFrontCachePolicy
        Origins:
          - Id: origin
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 8080
              OriginProtocolPolicy: http-only
        PriceClass: PriceClass_All

Outputs:
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  EC2InstanceId:
    Value: !Ref EC2Instance
  PublicDNS:
    Value: !GetAtt EC2Instance.PublicDnsName