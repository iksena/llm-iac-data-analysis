AWSTemplateFormatVersion: '2010-09-09'

Resources:
  MyECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: my-ecr-repo
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256

  MyECRRepositoryPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECRRepositoryPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: RootUserFullAccess
            Effect: Allow
            Resource: !GetAtt MyECRRepository.Arn
            Action:
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
              - ecr:PutImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:DescribeRepositories
              - ecr:GetRepositoryPolicy
              - ecr:ListImages
              - ecr:DeleteRepository
              - ecr:BatchDeleteImage
              - ecr:SetRepositoryPolicy
              - ecr:PutLifecyclePolicy
      Roles:
        - !Ref MyECRRepositoryRole

  MyECRRepositoryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecr.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess

Outputs:
  RepositoryArn:
    Description: ECR Repository ARN
    Value: !GetAtt MyECRRepository.Arn
  RepositoryName:
    Description: ECR Repository Name
    Value: !Ref MyECRRepository