AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Transit Gateway with Resource Access Manager Share

Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: enable
      DefaultRouteTableAssociation: enable
      DefaultRouteTablePropagation: enable

  TransitGatewayShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      name: TransitGatewayShare
      resourceArns:
        - Fn::GetAtt:
            - TransitGateway
            - Id
      principals:
        - 644519422710

Outputs:
  TransitGatewayId:
    Description: Transit Gateway ID
    Value:
      Ref: TransitGateway
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayId'

  TransitGatewayShareId:
    Description: Resource Share ID
    Value:
      Ref: TransitGatewayShare
    Export:
      Name: !Sub '${AWS::StackName}-TransitGatewayShareId'