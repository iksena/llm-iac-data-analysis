AWSTemplateFormatVersion: '2010-09-09'
Description: Amazon Aurora MySQL cluster with two instances and custom parameter group

Parameters:
  DatabaseName:
    Type: String
    Default: mydatabase
    Description: The name of the database
  MasterUsername:
    Type: String
    Default: admin
    Description: The master username for the database
  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: The master password for the database
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: The VPC ID to deploy the Aurora cluster
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: The subnet IDs to deploy the Aurora cluster
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: The security group IDs to associate with the Aurora cluster

Resources:
  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL cluster
      Family: aurora-mysql5.7
      Parameters:
        time_zone: 'UTC'
        sql_mode: 'STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION'

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup
      VpcSecurityGroupIds: !Ref SecurityGroupIds
      DBSubnetGroupName: !Ref DBSubnetGroup
      Port: 3306
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: false

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds: !Ref SubnetIds

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: !Ref SecurityGroupIds

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.large
      Engine: aurora-mysql
      PubliclyAccessible: true
      DBParameterGroupName: !Ref AuroraClusterParameterGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: !Ref SecurityGroupIds

Outputs:
  ClusterEndpoint:
    Description: The endpoint of the Aurora cluster
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: The reader endpoint of the Aurora cluster
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  DBInstance1Endpoint:
    Description: The endpoint of the first database instance
    Value: !GetAtt DBInstance1.Endpoint.Address
  DBInstance2Endpoint:
    Description: The endpoint of the second database instance
    Value: !GetAtt DBInstance2.Endpoint.Address