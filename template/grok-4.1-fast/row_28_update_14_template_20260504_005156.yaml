AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access via DescribeSecret) using CloudTrail management events, EventBridge, and SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Globally unique lowercase S3 bucket name for CloudTrail logs (must create beforehand if exists).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: '3-63 lowercase letters, numbers, hyphens. Start/end alphanumeric.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '^[a