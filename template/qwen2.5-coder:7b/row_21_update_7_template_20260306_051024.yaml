AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  DatabaseName:
    Type: String
    Description: The name of the Timestream database
    Default: poc-database

  TableName:
    Type: String
    Description: The name of the Timestream table
    Default: poc-table-01-batch-write

  RetentionPeriod:
    Type: Number
    Description: The retention period for the Timestream table in days
    Default: 365

  MagneticStoreRetentionPeriod:
    Type: Number
    Description: The magnetic store retention period for the Timestream table in days
    Default: 3650

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  TimestreamTable:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: !Ref TableName
      RetentionProperties:
        MemoryStoreRetentionPeriodInDays: !Ref RetentionPeriod
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionPeriod

Outputs:
  TimestreamDatabaseArn:
    Description: The ARN of the Timestream database
    Value: !GetAtt TimestreamDatabase.Arn

  TimestreamTableArn:
    Description: The ARN of the Timestream table
    Value: !GetAtt TimestreamTable.Arn