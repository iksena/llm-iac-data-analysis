AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template for integrating EventBridge with DataDog for centralized log forwarding.
  This template creates an EventBridge custom event bus, a secure connection with DataDog using an API key,
  an API destination for DataDog's log ingestion endpoint, an IAM Role to allow EventBridge to invoke the API destination,
  a dead-letter SQS queue for fault tolerance, and an EventBridge rule routing events with source "MyDataDogApp" to DataDog.

Parameters:
  DataDogApiKey:
    Description: "DataDog API Key used for authentication"
    Type: String
    NoEcho: true
    Default: "testanu"

Resources:
  DataDogEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: "DataDogEventBus"

  DataDogConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: "DataDogConnection"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: "DD-API-KEY"
          ApiKeyValue: !Ref DataDogApiKey
      Description: "Secure connection to DataDog API using API key authentication."

  DataDogApiDestination:
    Type: AWS::Events::ApiDestination
    DependsOn:
      - DataDogConnection
    Properties:
      Name: "DataDogApiDestination"
      Description: "API destination targeting DataDog log ingestion endpoint."
      ConnectionArn: !GetAtt DataDogConnection.ConnectionArn
      InvocationEndpoint: "https://http-intake.logs.datadoghq.com"
      HttpMethod: POST

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: "InvokeDataDogApiDestinationPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt DataDogApiDestination.Arn

  DataDogDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: "DataDogDeadLetterQueue"

  DataDogEventRule:
    Type: AWS::Events::Rule
    DependsOn:
      - DataDogApiDestination
      - EventBridgeInvokeRole
      - DataDogDeadLetterQueue
    Properties:
      Name: "SendLogsToDataDog"
      Description: "Routes events from source 'MyDataDogApp' to the DataDog API Destination."
      EventBusName: !Ref DataDogEventBus
      EventPattern:
        source:
          - "MyDataDogApp"
      State: ENABLED
      Targets:
        - Id: "DataDogApiDestinationTarget"
          Arn: !GetAtt DataDogApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt DataDogDeadLetterQueue.Arn
          InputPath: "$"

Outputs:
  EventBusName:
    Description: "Name of the EventBridge event bus"
    Value: !Ref DataDogEventBus
  ApiDestinationArn:
    Description: "ARN of the DataDog API Destination"
    Value: !GetAtt DataDogApiDestination.Arn
  DeadLetterQueueUrl:
    Description: "URL of the dead-letter SQS queue"
    Value: !Ref DataDogDeadLetterQueue