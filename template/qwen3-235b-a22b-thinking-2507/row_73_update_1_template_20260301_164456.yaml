AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  ClusterName:
    Type: String
    Default: 'ProductionEcsCluster'
    Description: Name of the ECS cluster to create
  FargateSpotWeight:
    Type: Number
    Default: 4
    Description: Relative weight for Fargate Spot capacity provider (higher = more tasks)
  FargateWeight:
    Type: Number
    Default: 1
    Description: Relative weight for standard Fargate capacity provider
Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: !Ref FargateSpotWeight
        - CapacityProvider: FARGATE
          Weight: !Ref FargateWeight
Outputs:
  ClusterName:
    Description: Name of the created ECS cluster
    Value: !Ref EcsCluster
  ClusterArn:
    Description: ARN of the created ECS cluster
    Value: !GetAtt EcsCluster.Arn