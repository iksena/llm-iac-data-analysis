AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create an AWS Amplify web application with a production branch for TodoApp'

Parameters:
  AppName:
    Type: String
    Default: 'TodoApp'
    Description: Name of the Amplify application
  
  RepositoryProvider:
    Type: String
    Default: 'CodeCommit'
    AllowedValues:
      - 'CodeCommit'
      - 'GitHub'
      - 'GitLab'
      - 'BitBucket'
    Description: The provider for your repository
  
  RepositoryName:
    Type: String
    Default: 'todo-app'
    Description: Name of the repository containing the TodoApp code
  
  BranchName:
    Type: String
    Default: 'main'
    Description: Name of the branch to deploy

Resources:
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess-Amplify

  CodeCommitRepository:
    Type: AWS::CodeCommit::Repository
    Condition: IsCodeCommit
    Properties:
      RepositoryName: !Ref RepositoryName
      RepositoryDescription: !Sub "Repository for ${AppName}"
      Code:
        S3:
          Bucket: !Ref SourceCodeBucket
          Key: !Ref SourceCodeKey

  SourceCodeBucket:
    Type: AWS::S3::Bucket
    Condition: IsCodeCommit
    DeletionPolicy: Retain
    Properties:
      VersioningConfiguration:
        Status: Enabled

  InitialCommit:
    Type: AWS::Lambda::Function
    Condition: IsCodeCommit
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import os
          import tempfile
          import zipfile
          import base64
          
          def handler(event, context):
            if event['RequestType'] == 'Delete':
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              return
            
            try:
              # Create a basic React Todo app
              with tempfile.NamedTemporaryFile(suffix='.zip') as temp_file:
                with zipfile.ZipFile(temp_file.name, 'w') as zipf:
                  # package.json
                  package_json = '''{
                    "name": "todo-app",
                    "version": "0.1.0",
                    "private": true,
                    "dependencies": {
                      "react": "^18.2.0",
                      "react-dom": "^18.2.0",
                      "react-scripts": "5.0.1"
                    },
                    "scripts": {
                      "start": "react-scripts start",
                      "build": "react-scripts build",
                      "test": "react-scripts test",
                      "eject": "react-scripts eject"
                    },
                    "eslintConfig": {
                      "extends": [
                        "react-app"
                      ]
                    },
                    "browserslist": {
                      "production": [
                        ">0.2%",
                        "not dead",
                        "not op_mini all"
                      ],
                      "development": [
                        "last 1 chrome version",
                        "last 1 firefox version",
                        "last 1 safari version"
                      ]
                    }
                  }'''
                  zipf.writestr('package.json', package_json)
                  
                  # public/index.html
                  index_html = '''<!DOCTYPE html>
                  <html lang="en">
                    <head>
                      <meta charset="utf-8" />
                      <meta name="viewport" content="width=device-width, initial-scale=1" />
                      <title>Todo App</title>
                    </head>
                    <body>
                      <div id="root"></div>
                    </body>
                  </html>'''
                  zipf.writestr('public/index.html', index_html)
                  
                  # src/index.js
                  index_js = '''import React from 'react';
                  import ReactDOM from 'react-dom/client';
                  import './index.css';
                  import App from './App';
                  
                  const root = ReactDOM.createRoot(document.getElementById('root'));
                  root.render(
                    <React.StrictMode>
                      <App />
                    </React.StrictMode>
                  );'''
                  zipf.writestr('src/index.js', index_js)
                  
                  # src/index.css
                  index_css = '''body {
                    margin: 0;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                      'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                      sans-serif;
                    -webkit-font-smoothing: antialiased;
                    -moz-osx-font-smoothing: grayscale;
                  }
                  
                  code {
                    font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
                      monospace;
                  }'''
                  zipf.writestr('src/index.css', index_css)
                  
                  # src/App.js
                  app_js = '''import React, { useState } from 'react';
                  import './App.css';
                  
                  function App() {
                    const [todos, setTodos] = useState([]);
                    const [input, setInput] = useState('');
                    
                    const addTodo = () => {
                      if (input.trim() !== '') {
                        setTodos([...todos, { text: input, completed: false, id: Date.now() }]);
                        setInput('');
                      }
                    };
                    
                    const toggleTodo = (id) => {
                      setTodos(
                        todos.map(todo =>
                          todo.id === id ? { ...todo, completed: !todo.completed } : todo
                        )
                      );
                    };
                    
                    const deleteTodo = (id) => {
                      setTodos(todos.filter(todo => todo.id !== id));
                    };
                    
                    return (
                      <div className="App">
                        <h1>Todo App</h1>
                        <div className="input-container">
                          <input
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Add a todo"
                            onKeyPress={(e) => e.key === 'Enter' && addTodo()}
                          />
                          <button onClick={addTodo}>Add</button>
                        </div>
                        <ul className="todo-list">
                          {todos.map(todo => (
                            <li key={todo.id} className={todo.completed ? 'completed' : ''}>
                              <span onClick={() => toggleTodo(todo.id)}>{todo.text}</span>
                              <button onClick={() => deleteTodo(todo.id)}>Delete</button>
                            </li>
                          ))}
                        </ul>
                      </div>
                    );
                  }
                  
                  export default App;'''
                  zipf.writestr('src/App.js', app_js)
                  
                  # src/App.css
                  app_css = '''.App {
                    max-width: 500px;
                    margin: 0 auto;
                    padding: 20px;
                    font-family: Arial, sans-serif;
                  }
                  
                  h1 {
                    text-align: center;
                    color: #333;
                  }
                  
                  .input-container {
                    display: flex;
                    margin-bottom: 20px;
                  }
                  
                  input {
                    flex-grow: 1;
                    padding: 10px;
                    border: 1px solid #ddd;
                    border-radius: 4px 0 0 4px;
                  }
                  
                  .input-container button {
                    padding: 10px 15px;
                    background-color: #4CAF50;
                    color: white;
                    border: none;
                    border-radius: 0 4px 4px 0;
                    cursor: pointer;
                  }
                  
                  .todo-list {
                    list-style-type: none;
                    padding: 0;
                  }
                  
                  .todo-list li {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 10px;
                    margin-bottom: 10px;
                    background-color: #f9f9f9;
                    border-radius: 4px;
                  }
                  
                  .todo-list li.completed span {
                    text-decoration: line-through;
                    color: #888;
                  }
                  
                  .todo-list li button {
                    padding: 5px 10px;
                    background-color: #f44336;
                    color: white;
                    border: none;
                    border-radius: 4px;
                    cursor: pointer;
                  }'''
                  zipf.writestr('src/App.css', app_css)
                
                # Upload to S3
                s3 = boto3.client('s3')
                bucket_name = event['ResourceProperties']['BucketName']
                key = 'todo-app-source.zip'
                
                with open(temp_file.name, 'rb') as data:
                  s3.upload_fileobj(data, bucket_name, key)
                
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {'Key': key})
            except Exception as e:
              print(f"Error: {str(e)}")
              cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: IsCodeCommit
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${SourceCodeBucket}/*'

  SourceCodeUpload:
    Type: Custom::SourceCodeUpload
    Condition: IsCodeCommit
    Properties:
      ServiceToken: !GetAtt InitialCommit.Arn
      BucketName: !Ref SourceCodeBucket

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: '/<*>'
          Target: '/index.html'
          Status: '404'
        - Source: '^[^.]+$'
          Target: '/index.html'
          Status: '200'
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: 'production'
      IAMServiceRole: !GetAtt AmplifyServiceRole.Arn

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      EnableAutoBuild: true
      Stage: PRODUCTION
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: 'production'

Conditions:
  IsCodeCommit: !Equals [!Ref RepositoryProvider, 'CodeCommit']

Outputs:
  AmplifyAppId:
    Description: ID of the Amplify App
    Value: !GetAtt AmplifyApp.AppId
  
  AmplifyAppURL:
    Description: URL of the Amplify App
    Value: !Sub "https://${BranchName}.${AmplifyApp.DefaultDomain}"
  
  AmplifyConsoleURL:
    Description: URL to the Amplify Console
    Value: !Sub "https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp.AppId}"
  
  CodeCommitRepositoryURL:
    Condition: IsCodeCommit
    Description: URL of the CodeCommit Repository
    Value: !GetAtt CodeCommitRepository.CloneUrlHttp