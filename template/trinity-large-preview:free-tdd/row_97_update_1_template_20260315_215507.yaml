AWSTemplateFormatVersion: '2010-09-09'
Description: Serverless pipeline to collect, store, and analyze AWS Organization data

Parameters:
  S3BucketName:
    Type: String
    Default: org-data-bucket
  ManagementAccountId:
    Type: String
    Default: '123456789012'
  AthenaDatabaseName:
    Type: String
    Default: managementcur
  TagsToInclude:
    Type: String
    Default: '[]'

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OrganizationsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: organizations:Describe*
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.lambda_handler
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import datetime

          def lambda_handler(event, context):
              org_client = boto3.client('organizations', region_name='us-east-1')
              s3_client = boto3.client('s3')

              # Fetch organization data
              accounts = org_client.list_accounts()
              ous = org_client.list_organizational_units_for_parent(ParentId='root')

              # Prepare data
              data = {
                  'accounts': accounts.get('Accounts', []),
                  'organizational_units': ous.get('OrganizationalUnits', []),
                  'timestamp': datetime.datetime.now().isoformat()
              }

              # Write to S3
              s3_key = f"org-data/{datetime.datetime.now().strftime('%Y/%m/%d')}/data.json"
              s3_client.put_object(
                  Bucket=os.environ['S3_BUCKET'],
                  Key=s3_key,
                  Body=json.dumps(data),
                  ContentType='application/json'
              )

              return {
                  'statusCode': 200,
                  'body': json.dumps('Success')
              }

  CloudWatchEventsRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Weekly Organization Data Collection
      ScheduleExpression: rate(7 days)
      Targets:
        - Arn: !GetAtt LambdaFunction.Arn
          Id: LambdaTarget
          Input: '{}'

  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudWatchEventsRule.Arn

  GlueExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:Put*
                Resource: !Sub 'arn:aws:s3:::${S3BucketName}/*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: OrganizationDataCrawler
      Role: !GetAtt GlueExecutionRole.Arn
      DatabaseName: !Ref AthenaDatabaseName
      Targets:
        S3Targets:
          - Path: !Sub 's3://${S3BucketName}/org-data/'
      Schedule: 'cron(0 0 1/7 * ? *)'  # Weekly schedule

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3BucketName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:aws:s3:::${S3BucketName}'
              - !Sub 'arn:aws:s3:::${S3BucketName}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

Outputs:
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
  GlueCrawlerArn:
    Description: Glue Crawler ARN
    Value: !GetAtt GlueCrawler.Arn
  S3BucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt S3Bucket.Arn