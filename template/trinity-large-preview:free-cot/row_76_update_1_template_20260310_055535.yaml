AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles with Tiered Permissions for FIS Access Control

Parameters:
  SecurityAdminsRoleName:
    Type: String
    Default: SecurityAdmins
    Description: Name for the Security Admins IAM role
  AdminsRoleName:
    Type: String
    Default: Admins
    Description: Name for the Admins IAM role
  UsersRoleName:
    Type: String
    Default: Users
    Description: Name for the Users IAM role
  NonUsersRoleName:
    Type: String
    Default: NonUsers
    Description: Name for the Non-Users IAM role

Resources:
  SecurityAdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref SecurityAdminsRoleName
      Description: Role for Security Admins with full FIS access and role-passing privileges
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
        - PolicyName: RolePassingToWorkshopServices
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: arn:aws:iam::*:role/workshop-*
        - PolicyName: CreateServiceLinkedRoles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: '*'

  AdminsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref AdminsRoleName
      Description: Role for Admins with FIS access but denied production resources
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: FISAccessExceptProduction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: fis:*
                Resource: '*'
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: prod

  UsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref UsersRoleName
      Description: Role for Users with limited FIS experiment operations
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: ExperimentOperations
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:StartExperiment
                  - fis:StopExperiment
                Resource: '*'
        - PolicyName: FISResourceViewing
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:Get*
                  - fis:List*
                Resource: '*'
        - PolicyName: ExperimentTagging
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - fis:TagResource
                  - fis:UntagResource
                Resource: '*'
        - PolicyName: DenyProductionFISAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: fis:*
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Environment: prod

  NonUsersRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref NonUsersRoleName
      Description: Role for Non-Users with read-only access and FIS actions denied
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSReadOnlyAccess
      Policies:
        - PolicyName: DenyAllFISActions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Deny
                Action: fis:*
                Resource: '*'

Outputs:
  SecurityAdminsRoleArn:
    Description: ARN of the Security Admins IAM role
    Value: !GetAtt SecurityAdminsRole.Arn
  AdminsRoleArn:
    Description: ARN of the Admins IAM role
    Value: !GetAtt AdminsRole.Arn
  UsersRoleArn:
    Description: ARN of the Users IAM role
    Value: !GetAtt UsersRole.Arn
  NonUsersRoleArn:
    Description: ARN of the Non-Users IAM role
    Value: !GetAtt NonUsersRole.Arn