AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes

Parameters:
  BatchJobMemory:
    Type: Number
    Default: 2048
  BatchJobVCPU:
    Type: Number
    Default: 1
  VPCId:
    Type: String
    Default: vpc-12345678
  SubnetIds:
    Type: CommaDelimitedList
    Default: subnet-12345678,subnet-87654321
  SecurityGroupIds:
    Type: CommaDelimitedList
    Default: sg-12345678
  EventPattern:
    Type: String
    Default: '{"source": ["aws.sqs"], "detail": {"message": {"prefix": "OrderCreated"}}}'

Resources:
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EventBridgePipesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEventBridgePipeTargetBatchPolicy

  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 300

  ManagedComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: SPOT
        MinvCpus: 0
        MaxvCpus: 64
        Subnets: !Ref SubnetIds
        SecurityGroupIds: !Ref SecurityGroupIds

  OrderProcessingQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ManagedComputeEnvironment
      Priority: 1

  OrderProcessingJob:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: busybox:latest
        Memory: !Ref BatchJobMemory
        Vcpus: !Ref BatchJobVCPU
        Command:
          - echo
          - Processing order
      RetryStrategy:
        Attempts: 3

  EventSchemaRegistry:
    Type: AWS::EventSchemas::Registry
    Properties:
      Description: Registry for order processing events

  EventSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      RegistryName: !Ref EventSchemaRegistry
      Type: JSON
      Content: |
        {
          "type": "object",
          "properties": {
            "message": {
              "type": "string",
              "pattern": "^OrderCreated.*"
            }
          },
          "required": ["message"]
        }

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern: !Ref EventPattern
      State: ENABLED
      Targets:
        - Arn: !GetAtt OrderQueue.Arn
          Id: SQSQueueTarget
          SqsParameters:
            MessageGroupId: "BatchJobGroup"

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref OrderQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: sqs:SendMessage
            Resource: !GetAtt OrderQueue.Arn
            Condition:
              ArnLike:
                AWS:SourceArn: !GetAtt EventBridgeRule.Arn

  BatchComputeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Batch compute security group
      VpcId: !Ref VPCId

  BatchComputeSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref BatchComputeSG

  BatchComputeSGEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      DestinationSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref BatchComputeSG

  VPCSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC security group
      VpcId: !Ref VPCId

  VPCSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref BatchComputeSG
      GroupId: !Ref VPCSG

Outputs:
  OrderQueueUrl:
    Description: URL of the SQS queue
    Value: !Ref OrderQueue
  OrderProcessingQueueArn:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt OrderProcessingQueue.Arn