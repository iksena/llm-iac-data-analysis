AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC with 2 subnets, ASG with Internet access, ElastiCache Redis with failover/snapshots, Lambda for dynamic snapshot control'

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for VPC
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR for public subnet 1
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR for public subnet 2
  Ec2InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type for ASG
  CacheNodeType:
    Type: String
    Default: cache.m3.medium
    Description: ElastiCache node type (minimal cost default)
  SnapshotRetentionLimit:
    Type: Number
    Default: 5
    MinValue: 0
    MaxValue: 35
    Description: Days to retain ElastiCache snapshots (0 to disable)
  AsgMinSize:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 5
  AsgMaxSize:
    Type: Number
    Default: 2
    MinValue: 0
    MaxValue: 10
  AsgDesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10