AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an event-driven AWS Batch job processing pipeline with SQS and EventBridge Pipes.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC.
  SubnetCidr1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the first private subnet.
  SubnetCidr2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for the second private subnet.
  InstanceType:
    Type: String
    Default: m4.large
    Description: EC2 instance type for the Batch compute environment.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: BatchVPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: PrivateSubnet2

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Batch compute resources
      VpcId: !Ref VPC

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref BatchInstanceRole

  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderCreatedQueue

  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: BatchComputeEnvironment
      Type: MANAGED
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeResources:
        Type: EC2
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 0
        InstanceTypes:
          - !Ref InstanceType
        Subnets:
          - !Ref Subnet1
          - !Ref Subnet2
        SecurityGroupIds:
          - !Ref SecurityGroup
        InstanceRole: !Ref BatchInstanceProfile

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: BatchJobQueue
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: BatchJobDefinition
      Type: container
      ContainerProperties:
        Image: amazonlinux
        Vcpus: 1
        Memory: 512
        Command: ["echo", "Hello World"]
        ExecutionRoleArn: !GetAtt BatchInstanceRole.Arn

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: EventBridgePipePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource: '*'

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: OrderCreatedPipe
      RoleArn: !GetAtt EventBridgePipeRole.Arn
      Source: !GetAtt SQSQueue.Arn
      Target: !GetAtt BatchJobQueue.Arn
      FilterCriteria:
        Filters:
          - Pattern: '{"body": {"eventType": ["OrderCreated"]}}'

Outputs:
  SQSQueueURL:
    Description: URL of the SQS Queue
    Value: !Ref SQSQueue

  BatchJobQueueARN:
    Description: ARN of the Batch Job Queue
    Value: !GetAtt BatchJobQueue.Arn

  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn