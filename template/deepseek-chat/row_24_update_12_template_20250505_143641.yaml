AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with ASG and ElastiCache with snapshot management using Launch Templates

Parameters:
  VPCCIDR:
    Description: CIDR block for the VPC
    Type: String
    Default: 10.0.0.0/16
  PublicSubnet1CIDR:
    Description: CIDR block for Public Subnet 1
    Type: String
    Default: 10.0.1.0/24
  PublicSubnet2CIDR:
    Description: CIDR block for Public Subnet 2
    Type: String
    Default: 10.0.2.0/24
  CacheNodeType:
    Description: ElastiCache instance type
    Type: String
    Default: cache.t3.medium
    AllowedValues:
      - cache.t3.medium
      - cache.m6g.large
      - cache.r6g.large
  SnapshotRetentionDays:
    Description: Number of days to retain snapshots
    Type: Number
    Default: 7
    MinValue: 0
    MaxValue: 35
  EnableSnapshotting:
    Description: Enable automated snapshots
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  InstanceType:
    Description: EC2 instance type for ASG
    Type: String
    Default: t3.micro

Mappings:
  AWSRegionArch2AMI:
    us-east-1:
      HVM64: ami-0c55b159cbfafe1f0
    us-west-2:
      HVM64: ami-0e999cbd62129e3b1
  AZMapping:
    us-east-1:
      AZ1: us-east-1a
      AZ2: us-east-1b
    us-west-2:
      AZ1: us-west-2a
      AZ2: us-west-2b

Conditions:
  SnapshottingEnabled: !Equals [!Ref EnableSnapshotting, 'true']

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ElastiCacheVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ElastiCacheIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !FindInMap [AZMapping, !Ref 'AWS::Region', AZ1]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !FindInMap [AZMapping, !Ref 'AWS::Region', AZ2]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for ElastiCache
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  ElastiCacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ElastiCache
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: !Ref VPCCIDR

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EC2 instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ElastiCacheReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      AutomaticFailoverEnabled: true
      AutoMinorVersionUpgrade: true
      CacheNodeType: !Ref CacheNodeType
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      Engine: redis
      EngineVersion: '6.x'
      NumCacheClusters: 2
      ReplicationGroupDescription: ElastiCache replication group
      SecurityGroupIds:
        - !GetAtt ElastiCacheSecurityGroup.GroupId
      SnapshotRetentionLimit: !If [SnapshottingEnabled, !Ref SnapshotRetentionDays, 0]
      SnapshotWindow: "05:00-09:00"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ElastiCacheSnapshotPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:ModifyReplicationGroup
                  - elasticache:DescribeReplicationGroups
                Resource: "*"

  SnapshotLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Code:
        ZipFile: |
          import boto3
          def handler(event, context):
              client = boto3.client('elasticache')
              if event['enable']:
                  response = client.modify_replication_group(
                      ReplicationGroupId=event['replication_group_id'],
                      SnapshotRetentionLimit=event['retention_days']
                  )
              else:
                  response = client.modify_replication_group(
                      ReplicationGroupId=event['replication_group_id'],
                      SnapshotRetentionLimit=0
                  )
              return response
      Timeout: 30
      MemorySize: 128

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: SnapshottingEnabled
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SnapshotLambdaFunction.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SnapshotScheduleRule.Arn

  SnapshotScheduleRule:
    Type: AWS::Events::Rule
    Condition: SnapshottingEnabled
    Properties:
      Description: Schedule for ElastiCache snapshots
      ScheduleExpression: "cron(0 5 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt SnapshotLambdaFunction.Arn
          Id: ElastiCacheSnapshotLambda
          Input: !Sub |
            {
              "enable": true,
              "replication_group_id": "${ElastiCacheReplicationGroup}",
              "retention_days": ${SnapshotRetentionDays}
            }

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: ElastiCacheASGLaunchTemplate
      LaunchTemplateData:
        ImageId: !FindInMap [AWSRegionArch2AMI, !Ref 'AWS::Region', HVM64]
        InstanceType: !Ref InstanceType
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !Ref InstanceSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ElastiCacheASGInstance

  ASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 3
      DesiredCapacity: 2
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: ElastiCacheASG
          PropagateAtLaunch: true

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
  ElastiCacheEndpoint:
    Description: ElastiCache primary endpoint
    Value: !GetAtt ElastiCacheReplicationGroup.PrimaryEndPoint.Address
  LambdaFunctionARN:
    Description: Lambda function ARN for snapshot management
    Value: !GetAtt SnapshotLambdaFunction.Arn
  ASGName:
    Description: Auto Scaling Group Name
    Value: !Ref ASG