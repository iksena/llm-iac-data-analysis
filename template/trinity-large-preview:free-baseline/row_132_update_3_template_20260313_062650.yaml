AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Batch environment for containerized batch jobs with S3 integration

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  SubnetCIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for the subnet
  InstanceType:
    Type: String
    Default: m5.large
    Description: EC2 instance type for the compute environment
  DockerImage:
    Type: String
    Default: amazonlinux
    Description: Docker image for the job definition
  ComputeEnvironmentName:
    Type: String
    Default: MyComputeEnvironment
    Description: Name for the compute environment
  JobQueueName:
    Type: String
    Default: MyJobQueue
    Description: Name for the job queue
  JobDefinitionName:
    Type: String
    Default: MyJobDefinition
    Description: Name for the job definition

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-Subnet

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-batch-bucket
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  EC2SpotRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole

  SpotFleetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: spotfleet.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SpotRole

  ComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      ComputeResources:
        Type: SPOT
        MinvCpus: 0
        MaxvCpus: 16
        DesiredvCpus: 4
        InstanceTypes:
          - !Ref InstanceType
        Subnets:
          - !Ref Subnet
        SecurityGroupIds: []
        SpotIamFleetRole: !GetAtt SpotFleetRole.Arn
        InstanceRole: !Ref InstanceProfile
      ServiceRole: !GetAtt BatchServiceRole.Arn
      ComputeEnvironmentName: !Ref ComputeEnvironmentName

  JobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref ComputeEnvironment
      Priority: 1
      JobQueueName: !Ref JobQueueName

  JobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      Type: container
      ContainerProperties:
        Image: !Ref DockerImage
        Command:
          - /bin/sh
          - -c
          - |
            yum install -y awscli
            aws s3 cp s3://mybucket/input.txt /tmp/input.txt
            aws s3 cp /tmp/input.txt s3://mybucket/output.txt
        Memory: 2000
        Vcpus: 1
      JobDefinitionName: !Ref JobDefinitionName

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
  JobQueueARN:
    Description: ARN of the job queue
    Value: !GetAtt JobQueue.JobQueueArn
  JobDefinitionARN:
    Description: ARN of the job definition
    Value: !GetAtt JobDefinition.JobDefinitionArn