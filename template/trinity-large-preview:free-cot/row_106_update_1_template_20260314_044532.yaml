AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket with event-driven SNS notifications

Parameters:
  S3BucketName:
    Type: String
    Default: ''
    Description: Name of the S3 bucket (leave empty for auto-generated name)
  SNSTopicDisplayName:
    Type: String
    Default: 'S3EventNotifications'
    Description: Display name for the SNS topic

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [UseCustomBucketName, !Ref S3BucketName, !Ref AWS::NoValue]
      NotificationConfiguration:
        TopicConfigurations:
          - Topic: !Ref SNSTopic
            Events:
              - s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: ''

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: !Ref SNSTopicDisplayName

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              StringEquals:
                AWS:SourceOwner: !Ref AWS::AccountId
              ArnLike:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref S3BucketName, '']]

Outputs:
  S3BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref SNSTopic