AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating an Amazon SQS FIFO Queue'

Parameters:
  QueueName:
    Type: String
    Description: Name of the SQS FIFO queue (will have .fifo appended if not present)
    Default: MyQueue
  
  MessageRetentionPeriod:
    Type: Number
    Description: The number of seconds that Amazon SQS retains a message (60 seconds to 14 days)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  
  VisibilityTimeout:
    Type: Number
    Description: The visibility timeout for the queue in seconds
    Default: 30
    MinValue: 0
    MaxValue: 43200
  
  DelaySeconds:
    Type: Number
    Description: The time in seconds for which the delivery of all messages in the queue is delayed
    Default: 0
    MinValue: 0
    MaxValue: 900
  
  ContentBasedDeduplication:
    Type: String
    Description: Enables content-based deduplication
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
  
  MaxMessageSize:
    Type: Number
    Description: The limit of how many bytes a message can contain before Amazon SQS rejects it
    Default: 262144
    MinValue: 1024
    MaxValue: 262144

Conditions:
  HasFifoSuffix: !Equals 
    - !Select 
      - 0
      - !Split 
        - '.'
        - !Select 
          - 1
          - !Split 
            - '.'
            - !Join 
              - '.'
              - - !Ref QueueName
                - 'fifo'
    - 'fifo'

Resources:
  SQSFifoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If 
        - HasFifoSuffix
        - !Ref QueueName
        - !Join 
          - ''
          - - !Ref QueueName
            - '.fifo'
      FifoQueue: true
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaxMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      Tags:
        - Key: Name
          Value: !If 
            - HasFifoSuffix
            - !Ref QueueName
            - !Join 
              - ''
              - - !Ref QueueName
                - '.fifo'

Outputs:
  QueueURL:
    Description: URL of the SQS FIFO Queue
    Value: !Ref SQSFifoQueue
  
  QueueARN:
    Description: ARN of the SQS FIFO Queue
    Value: !GetAtt SQSFifoQueue.Arn
  
  QueueName:
    Description: Name of the SQS FIFO Queue
    Value: !GetAtt SQSFifoQueue.QueueName