AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with EventBridge and SNS integration for object creation notifications

Parameters:
  BucketName:
    Type: String
    Default: my-s3-eventbridge-sns-bucket
    Description: Name of the S3 bucket

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: S3ObjectCreationNotifications

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Triggers on S3 object creation events
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - 'AWS API Call via CloudTrail'
        detail:
          eventSource:
            - s3.amazonaws.com
          eventName:
            - 'PutObject'
            - 'PostObject'
            - 'CompleteMultipartUpload'
          requestParameters:
            bucketName:
              - !Ref S3Bucket
      State: ENABLED
      Targets:
        - Arn: !Ref SnsTopic
          Id: S3ObjectCreationTarget

Outputs:
  BucketName:
    Description: S3 Bucket Name
    Value: !Ref S3Bucket
  SnsTopicArn:
    Description: SNS Topic ARN
    Value: !Ref SnsTopic
  EventBridgeRuleArn:
    Description: EventBridge Rule ARN
    Value: !Ref EventBridgeRule