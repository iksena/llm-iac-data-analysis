AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for Secrets Manager monitoring and alerting system

Parameters:
  EmailEndpoint:
    Type: String
    Default: admin@example.com
    Description: Email address to receive Secrets Manager event notifications

Resources:
  SecretsManagerMonitoringTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecretsManagerMonitoringTopic

  SecretsManagerMonitoringSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: !Ref EmailEndpoint
      Protocol: email
      TopicArn: !Ref SecretsManagerMonitoringTopic
    DependsOn: SecretsManagerMonitoringTopic

  SecretsManagerMonitoringRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge rule for Secrets Manager API call monitoring
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - DeleteSecret
            - RotateSecret
            - GetSecretValue
      State: ENABLED
      Targets:
        - Arn: !Ref SecretsManagerMonitoringTopic
          Id: SendToSNS

Outputs:
  SNSArn:
    Description: SNS Topic ARN for Secrets Manager monitoring
    Value: !Ref SecretsManagerMonitoringTopic
  EventBridgeRuleArn:
    Description: EventBridge Rule ARN for Secrets Manager monitoring
    Value: !GetAtt SecretsManagerMonitoringRule.Arn