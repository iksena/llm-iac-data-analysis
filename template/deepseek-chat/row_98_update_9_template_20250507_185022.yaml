AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation template for creating an AWS Amplify TodoApp with production branch

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
    AllowedPattern: '[a-zA-Z0-9-]+'
    MinLength: 1
    MaxLength: 255
    ConstraintDescription: App name must be 1-255 alphanumeric characters or hyphens

  Repository:
    Type: String
    Description: Git repository URL for the TodoApp source code
    Default: https://github.com/example/todoapp.git
    MinLength: 1
    ConstraintDescription: Repository URL is required

  AccessToken:
    Type: String
    Description: (Optional) Personal access token for private repositories
    NoEcho: true
    Default: ""
    AllowedPattern: '^$|^[a-zA-Z0-9_\-]{40,}$'
    ConstraintDescription: Must be empty or a valid GitHub access token

  BranchName:
    Type: String
    Description: Name of the production branch
    Default: main
    AllowedPattern: '[a-zA-Z0-9-_]+'
    MinLength: 1
    MaxLength: 255
    ConstraintDescription: Branch name must be 1-255 alphanumeric characters, hyphens or underscores

Conditions:
  HasAccessToken: !Not [!Equals [!Ref AccessToken, ""]]

Resources:
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref Repository
      AccessToken: !If [HasAccessToken, !Ref AccessToken, !Ref "AWS::NoValue"]
      BuildSpec: |
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: dist
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      Platform: WEB
      EnableBranchAutoDeletion: true
      CustomRules:
        - Source: /<*>
          Target: /index.html
          Status: '200'

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      Stage: PRODUCTION
      EnableAutoBuild: true
      EnablePerformanceMode: false
      EnablePullRequestPreview: false
      Framework: React
      EnvironmentVariables:
        - Name: NODE_ENV
          Value: production

Outputs:
  AppId:
    Description: Amplify App ID
    Value: !GetAtt AmplifyApp.AppId

  AppArn:
    Description: Amplify App ARN
    Value: !GetAtt AmplifyApp.Arn

  DefaultDomain:
    Description: Amplify default domain
    Value: !GetAtt AmplifyApp.DefaultDomain

  ProductionUrl:
    Description: Production URL
    Value: !Sub 'https://${BranchName}.${AmplifyApp.DefaultDomain}'