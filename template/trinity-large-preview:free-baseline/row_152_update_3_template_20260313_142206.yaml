AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secure Aurora MySQL Cluster with RDS Proxy Integration'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name for resource tagging
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for public subnet 1
  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for public subnet 2
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for private subnet 2
  DatabaseInstanceClass:
    Type: String
    Default: db.r6g.large
    Description: Database instance class
  DatabaseName:
    Type: String
    Default: mydatabase
    Description: Name of the database
  DatabaseUsername:
    Type: String
    Default: admin
    Description: Database master username
  DatabasePassword:
    Type: String
    NoEcho: true
    Description: Database master password
  BackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: Number of days to retain backups
  AuroraEngineVersion:
    Type: String
    Default: 5.7.mysql_aurora.3.01.0
    Description: Aurora MySQL engine version
  ProxyMaxConnectionsPercent:
    Type: Number
    Default: 100
    Description: Maximum connections to make to the RDS DB instance
  ProxyMaxIdleConnectionsPercent:
    Type: Number
    Default: 50
    Description: Maximum connections to be kept in the connection pool

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PublicSubnet2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-PrivateSubnet2

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets for Aurora cluster
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DBClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora cluster
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-DBClusterSG

  DBProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS Proxy
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-DBProxySG

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: !Ref AuroraEngineVersion
      DBClusterIdentifier: !Sub ${EnvironmentName}-aurora-cluster
      MasterUsername: !Ref DatabaseUsername
      MasterUserPassword: !Ref DatabasePassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt DBClusterSecurityGroup.GroupId
      DatabaseName: !Ref DatabaseName
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      StorageEncrypted: true
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      EnableCloudwatchLogsExports:
        - audit
        - error
        - general
        - slowquery

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Parameter group for Aurora cluster
      Family: !Sub aurora-mysql${AuroraEngineVersion}
      Parameters:
        require_secure_transport: 1

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-aurora-instance1
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: !Ref AuroraEngineVersion
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBClusterSecurityGroup.GroupId
      EnablePerformanceInsights: true

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-aurora-instance2
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceClass: !Ref DatabaseInstanceClass
      Engine: aurora-mysql
      EngineVersion: !Ref AuroraEngineVersion
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBClusterSecurityGroup.GroupId
      EnablePerformanceInsights: true

  DBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub ${EnvironmentName}-db-proxy
      EngineFamily: MYSQL
      RoleArn: !GetAtt DBProxyRole.Arn
      VpcSecurityGroupIds:
        - !GetAtt DBProxySecurityGroup.GroupId
      VpcSubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: REQUIRED
          SecretArn: !Ref DBSecret
      RequireTLS: true
      IdleClientTimeout: 1800
      DebugLogging: true

  DBProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref DBProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !Ref DBCluster

  DBProxyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSDBCredentialsPolicyForRDSProxy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:ListSecrets
                Resource: !Ref DBSecret

  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${EnvironmentName}/aurora/credentials
      Description: Secret for Aurora database credentials
      SecretString: !Sub |
        {
          "username": "${DatabaseUsername}",
          "password": "${DatabasePassword}",
          "engine": "mysql",
          "host": "${DBCluster.Endpoint.Address}",
          "port": 3306,
          "dbname": "${DatabaseName}"
        }
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-AuroraSecret

  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBCluster
      TargetType: AWS::RDS::DBCluster

  EnhancedMonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

Outputs:
  DBClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt DBCluster.Endpoint.Address
  DBClusterReadEndpoint:
    Description: Aurora cluster read endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  DBProxyEndpoint:
    Description: RDS Proxy endpoint
    Value: !GetAtt DBProxy.Endpoint
  DBClusterSecurityGroup:
    Description: Database cluster security group ID
    Value: !GetAtt DBClusterSecurityGroup.GroupId
  DBProxySecurityGroup:
    Description: RDS Proxy security group ID
    Value: !GetAtt DBProxySecurityGroup.GroupId
  DBSecretARN:
    Description: Secrets Manager secret ARN
    Value: !Ref DBSecret