AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CustomEventBus
      KmsMasterKeyId: alias/aws/sqs

  ApiConnection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: ApiConnection
      SecretString: '{"X-API-Key": "{{resolve:secretsmanager:MyApiKeySecret}}"}'
      KmsKeyId: alias/aws/secretsmanager

  ApiDestination:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ApiDestination
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = await fetch('https://webhook.site/testtest', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-API-Key': process.env.API_KEY
              },
              body: JSON.stringify(event)
            });
            return response;
          };
      Environment:
        Variables:
          API_KEY: '{{resolve:secretsmanager:MyApiKeySecret}}'
      KmsKeyArn: alias/aws/lambda
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref LambdaSubnet
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      ReservedConcurrentExecutions: 10

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda function
      VpcId: !Ref VPC

  LambdaSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: DeadLetterQueue

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref CustomEventBus
  SecretArn:
    Description: ARN of the API connection secret
    Value: !Ref ApiConnection
  FunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ApiDestination.Arn