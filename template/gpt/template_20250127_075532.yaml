AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a DynamoDB table for ArtistId, Concert, and TicketSales.

Resources:
  ConcertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Concerts
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

Outputs:
  TableName:
    Description: The name of the DynamoDB table
    Value: !Ref ConcertsTable
  TableArn:
    Description: The ARN of the DynamoDB table
    Value: !GetAtt ConcertsTable.Arn