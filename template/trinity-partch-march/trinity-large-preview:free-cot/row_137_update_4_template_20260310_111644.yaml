AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AppSync GraphQL API with Lambda backend for pet inventory query service

Parameters:
  LambdaFunctionName:
    Type: String
    Default: PetShopLambdaFunction
    Description: Name of the Lambda function
  AppSyncAPIName:
    Type: String
    Default: PetShopAPI
    Description: Name of the AppSync API
  APIKeyExpiration:
    Type: Number
    Default: 365
    Description: API Key expiration in days

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              pets = [
                  {"id": "1", "name": "Max", "type": "Dog"},
                  {"id": "2", "name": "Bella", "type": "Cat"},
                  {"id": "3", "name": "Charlie", "type": "Bird"}
              ]
              return {
                  "statusCode": 200,
                  "body": pets
              }

  AppSyncServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-AppSyncServiceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - appsync.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt LambdaFunction.Arn

  AppSyncAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Ref AppSyncAPIName
      AuthenticationType: API_KEY

  AppSyncSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt AppSyncAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }

        type Query {
          getPets: [Pet]
        }

  AppSyncAPIKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt AppSyncAPI.ApiId
      Expires: !Ref APIKeyExpiration

  AppSyncDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt AppSyncAPI.ApiId
      Name: PetShopLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt LambdaFunction.Arn

  AppSyncResolver:
    Type: AWS::AppSync::Resolver
    Properties:
      ApiId: !GetAtt AppSyncAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt AppSyncDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "method": "POST",
          "resourcePath": "/",
          "params": {
            "headers": {
              "Content-Type": "application/json"
            }
          }
        }
      ResponseMappingTemplate: |
        $util.toJson($ctx.result.body)

Outputs:
  GraphQLAPIURL:
    Description: GraphQL API URL
    Value: !GetAtt AppSyncAPI.GraphQLUrl
  GraphQLAPIKey:
    Description: GraphQL API Key
    Value: !GetAtt AppSyncAPIKey.ApiKey