AWSTemplateFormatVersion: '2010-09-09'
Description: 'Automated monitoring and notification system for AWS Secrets Manager secret lifecycle events (create, update, access) using CloudTrail, EventBridge, and SNS.'

Parameters:
  S3BucketName:
    Type: String
    Description: 'Name of the S3 bucket for CloudTrail logs (must be globally unique).'
    MinLength: 3
    MaxLength: 63
    AllowedPattern: '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?$'
    ConstraintDescription: 'Bucket name must be lowercase letters, numbers, and hyphens. Start and end with letter or number.'
  CloudTrailTrailName:
    Type: String
    Description: 'Name of the CloudTrail trail.'
    MinLength: 3
    MaxLength: 128
    AllowedPattern: '[-_.a-zA-Z0-9]*'
    Default: 'SecretsManagerMonitoringTrail'
  SNSTopicName:
    Type: String
    Description: 'Name of the SNS topic.'
    MinLength: 1
    MaxLength: 256
    AllowedPattern: '^[a-zA-Z0-9-_.]*$'
    Default: 'SecretsManagerAlerts'

Resources:
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${S3BucketName}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
      DependsOn: CloudTrailBucket

  CloudTrailTrail:
    Type: AWS::CloudTrail::Trail
    Properties:
      TrailName: !Ref CloudTrailTrailName
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      EnableLogFileValidation: true
      EventSelectors:
        - IncludeManagementEvents: true
          ReadWriteType: All
          DataResources:
            - Type: AWS::SecretsManager::Secret
              Values:
                - '*'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref SNSTopicName
      DisplayName: !Sub '${SNSTopicName} - Secrets Manager Alerts'
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-SecretsManagerEvents'
      Description: 'Detects Secrets Manager create, update, and access events via CloudTrail and notifies via SNS.'
      State: ENABLED
      EventPattern:
        source:
          - aws.secretsmanager
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventSource:
            - secretsmanager.amazonaws.com
          eventName:
            - CreateSecret
            - UpdateSecret
            - PutSecretValue
            - GetSecretValue
            - DescribeSecret
      Targets:
        - Arn: !Ref SNSTopic
          Id: SNSTarget
      Tags:
        - Key: Purpose
          Value: SecretsManagerMonitoring

Outputs:
  SNSTopicArn:
    Description: 'ARN of the SNS topic for Secrets Manager alerts. Subscribe endpoints here.'
    Value: !Ref SNSTopic
    Export:
      Name: !Sub '${AWS::StackName}-SNSTopicArn'

  EventBridgeRuleArn:
    Description: 'ARN of the EventBridge rule monitoring Secrets Manager events.'
    Value: !Ref EventBridgeRule
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRuleArn'

  CloudTrailTrailName:
    Description: 'Name of the CloudTrail trail.'
    Value: !Ref CloudTrailTrailName
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailTrailName'

  CloudTrailBucketName:
    Description: 'Name of the S3 bucket storing CloudTrail logs.'
    Value: !Ref CloudTrailBucket
    Export:
      Name: !Sub '${AWS::StackName}-CloudTrailBucketName'