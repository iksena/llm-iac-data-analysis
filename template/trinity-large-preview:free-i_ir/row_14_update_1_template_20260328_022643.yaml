AWSTemplateFormatVersion: '2010-09-09'
Description: Network Interface with Multiple Elastic IPs and Secondary Private IPs

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Primary network interface with multiple IPs
      PrivateIpAddress: 10.0.0.10
      SecondaryPrivateIpAddressCount: 2
      SubnetId: subnet-12345678
      GroupSet:
        - sg-12345678

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssoc1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
    DependsOn:
      - EIP1
      - NetworkInterface

  EIPAssoc2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface
    DependsOn:
      - EIP2
      - NetworkInterface

Outputs:
  NetworkInterfaceId:
    Description: ID of the created network interface
    Value: !Ref NetworkInterface
  EIP1Address:
    Description: Elastic IP 1 address
    Value: !Ref EIP1
  EIP2Address:
    Description: Elastic IP 2 address
    Value: !Ref EIP2