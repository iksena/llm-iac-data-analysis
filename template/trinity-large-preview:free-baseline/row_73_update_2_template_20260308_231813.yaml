AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ECS cluster with Fargate and Fargate Spot capacity providers

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${AWS::StackName}-ECSCluster
      CapacityProviders:
        - Fargate
        - FargateSpot
      DefaultCapacityProviderStrategy:
        - Base: 1
          Weight: 1
          CapacityProvider: Fargate
        - Base: 0
          Weight: 1
          CapacityProvider: FargateSpot

Outputs:
  ECSClusterArn:
    Description: The ARN of the ECS cluster
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ECSClusterArn

  FargateCapacityProvider:
    Description: The Fargate capacity provider
    Value: Fargate
    Export:
      Name: !Sub ${AWS::StackName}-FargateCP

  FargateSpotCapacityProvider:
    Description: The Fargate Spot capacity provider
    Value: FargateSpot
    Export:
      Name: !Sub ${AWS::StackName}-FargateSpotCP