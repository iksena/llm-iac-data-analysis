

AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an EC2 instance with the latest Amazon Linux 2 AMI.
Parameters:
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t2.micro
Mappings:
  AMIMapping:
    us-east-1:
      AMIID: ami-0c55b31ad2299a701 #Example AMI ID - REPLACE WITH ACTUAL ID
    us-west-2:
      AMIID: ami-0c55b31ad2299a701 #Example AMI ID - REPLACE WITH ACTUAL ID
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [AMIMapping, !Ref 'AWS::Region', AMIID]
      InstanceType: !Ref InstanceType
      KeyName: MyKeyPair #Replace with your key pair name
      SecurityGroups:
        - !Ref SecurityGroup
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH inbound traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 #Restrict this in production
Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: Instance ID
  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address

