AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create an auto-configuring EC2 instance using Amazon Linux 2,
  with tag-driven Nginx installation via SSM Association, enhanced CloudWatch monitoring,
  and centralized logging to a dedicated S3 bucket.

Resources:

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-logs-bucket"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 30

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Path: /
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub "${LogsBucket.Arn}"
                  - !Sub "${LogsBucket.Arn}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole
      Path: /

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable SSH and HTTP access
      VpcId: !If 
        - HasVPC
        - !Ref "AWS::NoValue"
        - !Ref "AWS::NoValue"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      Monitoring: true
      Tags:
        - Key: Name
          Value: AutoConfiguredEC2
        - Key: InstallNginx
          Value: "True"

  SSMAssociationNginxInstall:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      Targets:
        - Key: "tag:InstallNginx"
          Values:
            - "True"
      Parameters:
        commands:
          - "sudo yum install -y nginx"
          - "sudo systemctl start nginx"
          - "sudo systemctl enable nginx"
      AssociationName: InstallNginxOnTaggedInstances
      ComplianceSeverity: UNSPECIFIED

Outputs:
  InstanceId:
    Description: "ID of the deployed EC2 instance"
    Value: !Ref EC2Instance

  LogsBucketName:
    Description: "Name of the S3 bucket used for logging"
    Value: !Ref LogsBucket