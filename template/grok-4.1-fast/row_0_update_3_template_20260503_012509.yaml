AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  QueueName:
    Type: String
    Default: basic-sqs-queue
    Description: Name of the SQS queue
  VisibilityTimeoutSeconds:
    Type: Number
    Default: 30
    Description: Visibility timeout for messages in seconds (1-43200)
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Retention period for messages in seconds (60-1209715200)
  DeliveryDelay:
    Type: Number
    Default: 0
    Description: Delay for message delivery in seconds (0-900)
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: Wait time for ReceiveMessage in seconds (0-20)
Resources:
  BasicSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeoutSeconds: !Ref VisibilityTimeoutSeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      DelaySeconds: !Ref DeliveryDelay
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref BasicSQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueUrl'
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt BasicSQSQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'