AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a custom resource using AWS Lambda for arithmetic operations.

Parameters:
  FirstNumber:
    Type: Number
    Description: The first number for the arithmetic operation.
  SecondNumber:
    Type: Number
    Description: The second number for the arithmetic operation.
  Operator:
    Type: String
    AllowedValues: [add, subtract, multiply, divide]
    Description: The arithmetic operation to perform.
  SimulateFailure:
    Type: String
    AllowedValues: [true, false]
    Default: false
    Description: Simulate failure for testing purposes.

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaBasicExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import cfnresponse

          def handler(event, context):
              try:
                  first_number = int(event['ResourceProperties']['FirstNumber'])
                  second_number = int(event['ResourceProperties']['SecondNumber'])
                  operator = event['ResourceProperties']['Operator']
                  simulate_failure = event['ResourceProperties']['SimulateFailure']

                  if simulate_failure == 'true':
                      raise Exception("Simulated failure")

                  if operator == 'add':
                      result = first_number + second_number
                  elif operator == 'subtract':
                      result = first_number - second_number
                  elif operator == 'multiply':
                      result = first_number * second_number
                  elif operator == 'divide':
                      if second_number == 0:
                          raise Exception("Division by zero error")
                      result = first_number / second_number
                  else:
                      raise Exception("Invalid operator")

                  response_data = {'Result': result}
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

      Runtime: python3.8
      Timeout: 30

  ArithmeticCustomResource:
    Type: Custom::ArithmeticOperation
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      SimulateFailure: !Ref SimulateFailure

Outputs:
  OperationResult:
    Description: The result of the arithmetic operation.
    Value: !GetAtt ArithmeticCustomResource.Result
  OperationStatus:
    Description: Status of the arithmetic operation.
    Value: !If
      - SimulateFailure
      - "Operation failed due to simulated failure."
      - "Operation completed successfully."