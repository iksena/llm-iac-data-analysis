

AWSTemplateFormatVersion: '2010-09-09'
Description: Creates an SNS topic and subscribes an email address.
Resources:
  MySNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      DisplayName: MySNSTopic
  EmailSubscription:
    Type: 'AWS::SNS::Subscription'
    Properties:
      Endpoint: test@test.com
      Protocol: email
      TopicArn: !Ref MySNSTopic
Outputs:
  SNSTopicArn:
    Value: !Ref MySNSTopic
    Description: The ARN of the created SNS topic
    Export:
      Name: MySNSTopicArn
