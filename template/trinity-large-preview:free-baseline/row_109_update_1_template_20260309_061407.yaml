AWSTemplateFormatVersion: '2010-09-09'
Resources:
  EventBridgeEventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: MongoDBEventBus
      Description: Event bus for MongoDB integration

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeApiDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: '*'

  EventBridgeConnection:
    Type: AWS::EventSchemas::Connection
    Properties:
      AuthorizationType: ApiKeyAuth
      ApiKeyAuthParameters:
        ApiKeyName: test_name
        ApiKeyValue: test_value
      Description: Connection to MongoDB API with API key authentication
      RoleArn: !GetAtt EventBridgeIAMRole.Arn

  MongoDBApiDestination:
    Type: AWS::EventSchemas::ApiDestination
    Properties:
      Name: MongoDBApiDestination
      Description: API destination for MongoDB
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: 'https://www.testanu.com'
      HttpMethod: POST
      InvocationRateLimitPerSecond: 10

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MongoDBDeadLetterQueue
      MessageRetentionPeriod: 1209600

Outputs:
  EventBusArn:
    Value: !Ref EventBridgeEventBus
    Description: ARN of the EventBridge event bus
  ConnectionArn:
    Value: !Ref EventBridgeConnection
    Description: ARN of the EventBridge connection
  QueueUrl:
    Value: !Ref DeadLetterQueue
    Description: URL of the dead-letter queue