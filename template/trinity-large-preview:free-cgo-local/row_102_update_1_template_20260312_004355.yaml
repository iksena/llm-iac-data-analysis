AWSTemplateFormatVersion: '2010-09-09'
Description: Risk Management System for AWS Workloads with Logging, Storage, and Notifications

Parameters:
  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues:
      - python3.12
      - nodejs20.x
    Description: Lambda runtime environment

Resources:
  RiskManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: RiskManagementTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: workload_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: workload_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RiskManagementLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt RiskManagementTable.Arn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  LambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction1
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Risk Management Function 1 executed successfully'
              }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  LambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: RiskManagementFunction2
      Runtime: !Ref LambdaRuntime
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': 'Risk Management Function 2 executed successfully'
              }
      Environment:
        Variables:
          TABLE_NAME: !Ref RiskManagementTable

  RiskNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: RiskNotificationTopic

  RiskNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref RiskNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: opscenter.ssm.amazonaws.com
            Action: sns:Publish
            Resource: !Ref RiskNotificationTopic

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref RiskManagementTable
  LambdaFunction1Arn:
    Description: ARN of Lambda Function 1
    Value: !GetAtt LambdaFunction1.Arn
  LambdaFunction2Arn:
    Description: ARN of Lambda Function 2
    Value: !GetAtt LambdaFunction2.Arn
  TopicArn:
    Description: SNS Topic ARN
    Value: !Ref RiskNotificationTopic