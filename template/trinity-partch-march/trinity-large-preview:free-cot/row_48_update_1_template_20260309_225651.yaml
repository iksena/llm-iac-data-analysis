AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Parameters:
  GlueScriptBucketName:
    Type: String
    Default: !Sub 'glue-scripts-${AWS::StackName}-${!Ref AWS::Region}'
    Description: Name of the S3 bucket to store Glue scripts and logs

Resources:
  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref GlueScriptBucketName
      Versioning:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueScriptBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GlueScriptBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${GlueScriptBucketName}/gue_scripts/sample_convert.py'

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GlueServiceRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptBucketName}'
                  - !Sub 'arn:aws:s3:::${GlueScriptBucketName}/*'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Name: !Sub 'GlueETLJob-${AWS::StackName}'
      Role: !GetAtt GlueServiceRole.Arn
      Command:
        Name: pythonshell
        ScriptLocation: !Sub 's3://${GlueScriptBucketName}/gue_scripts/sample_convert.py'
      GlueVersion: '4.0'
      DefaultArguments:
        '--job-language': 'python'
      ExecutionProperty:
        MaxConcurrentRuns: 1
      Timeout: 60
      MaxCapacity: 2

Outputs:
  GlueETLJobName:
    Description: Name of the created Glue ETL Job
    Value: !Ref GlueETLJob
  GlueScriptBucketName:
    Description: Name of the S3 bucket for Glue scripts
    Value: !Ref GlueScriptBucket
  GlueServiceRoleArn:
    Description: ARN of the Glue Service Role
    Value: !GetAtt GlueServiceRole.Arn