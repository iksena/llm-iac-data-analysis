AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a MySQL RDS instance with Provisioned IOPS in a VPC

Parameters:
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 1
  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 2
  DBInstanceClass:
    Type: String
    Default: db.r5.large
    Description: Database instance class
  DBAllocatedStorage:
    Type: Number
    Default: 100
    Description: The allocated storage in gigabytes
  DBStorageType:
    Type: String
    Default: io1
    Description: The storage type
  DBStorageIops:
    Type: Number
    Default: 1000
    Description: The amount of provisioned IOPS
  DBEngineVersion:
    Type: String
    Default: 8.0
    Description: The database engine version
  DBName:
    Type: String
    Default: mydatabase
    Description: The database name
  DBMasterUsername:
    Type: String
    Default: admin
    Description: The database master username
  DBMasterUserPassword:
    Type: String
    NoEcho: true
    Description: The database master password
  DBBackupRetentionPeriod:
    Type: Number
    Default: 7
    Description: The number of days to retain backups

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-PrivateSubnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VPCCIDR
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DBSecurityGroup

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS instance
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-DBSubnetGroup

  MySQLRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      AllocatedStorage: !Ref DBAllocatedStorage
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: !Ref DBEngineVersion
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterUserPassword
      StorageType: !Ref DBStorageType
      Iops: !Ref DBStorageIops
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      BackupRetentionPeriod: !Ref DBBackupRetentionPeriod
      MultiAZ: false
      PubliclyAccessible: false
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot

Outputs:
  DBEndpoint:
    Description: The endpoint of the database
    Value: !GetAtt MySQLRDSInstance.Endpoint.Address
  DBName:
    Description: The database name
    Value: !Ref DBName
  DBPort:
    Description: The port of the database
    Value: !GetAtt MySQLRDSInstance.Endpoint.Port
  DBSubnetGroupName:
    Description: The name of the DB subnet group
    Value: !Ref DBSubnetGroup
  DBSecurityGroupID:
    Description: The ID of the DB security group
    Value: !GetAtt DBSecurityGroup.GroupId