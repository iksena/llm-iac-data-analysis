

AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Concert Management DynamoDB Table'

Resources:
  ConcertManagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ConcertManagement
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Description: Name of the created DynamoDB table
    Value: !Ref ConcertManagementTable

  TableArn:
    Description: ARN of the created DynamoDB table
    Value: !GetAtt ConcertManagementTable.Arn

  PrimaryKey:
    Description: Primary key structure of the table
    Value: ArtistId (Partition) and Concert (Sort)