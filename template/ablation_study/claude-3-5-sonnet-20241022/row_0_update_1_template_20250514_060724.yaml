AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for creating a basic SQS queue'

Resources:
  BasicQueue:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: 'basic-queue'
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600
      DelaySeconds: 0
      ReceiveMessageWaitTimeSeconds: 0
      MaximumMessageSize: 262144

Outputs:
  QueueURL:
    Description: 'URL of the newly created SQS Queue'
    Value: !Ref BasicQueue
  QueueARN:
    Description: 'ARN of the newly created SQS Queue'
    Value: !GetAtt BasicQueue.Arn