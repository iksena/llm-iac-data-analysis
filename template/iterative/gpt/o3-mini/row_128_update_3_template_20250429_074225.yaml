AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template for deploying a Lambda function that manages AWS Security Hub controls.
  The Lambda function selectively disables CIS 1.4 controls for CIS Benchmarks based on the DisableCIS140Controls parameter.
  It includes an IAM role with an optional permissions boundary and a CloudWatch Logs log group with a 14-day retention period.

Parameters:
  DisableCIS140Controls:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: "Set to 'true' to disable CIS 1.4 controls in Security Hub; otherwise 'false'."
    
  PermissionsBoundary:
    Type: String
    Default: ""
    Description: "ARN of the permissions boundary for the IAM role. Leave empty if not used."

Conditions:
  UsePermissionsBoundary: 
    Fn::Not: 
      - Fn::Equals: [ !Ref PermissionsBoundary, "" ]

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: SecurityHubControlManagerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:DescribeStandards
                  - securityhub:DescribeStandardsControls
                  - securityhub:UpdateStandardsControl
                Resource: "*"
      PermissionsBoundary: 
        Fn::If: 
          - UsePermissionsBoundary
          - !Ref PermissionsBoundary
          - !Ref "AWS::NoValue"

  SecurityHubControlManagerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: SecurityHubControlManagerFunction
      Runtime: python3.8
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import os
          import boto3
          import json

          def lambda_handler(event, context):
              disable_cis = os.environ.get('DISABLE_CIS140_CONTROLS', 'false').lower() == 'true'
              client = boto3.client('securityhub')
              response_results = []

              standards_response = client.describe_standards()
              standards = standards_response.get('Standards', [])

              for std in standards:
                  standard_name = std.get('Name', '')
                  standards_arn = std.get('StandardsArn')
                  if 'CIS' in standard_name and disable_cis:
                      controls_response = client.describe_standards_controls(StandardsArn=standards_arn)
                      controls = controls_response.get('Controls', [])
                      for control in controls:
                          if '1.4' in control.get('ControlId', ''):
                              client.update_standards_control(
                                  StandardsControlArn=control['StandardsControlArn'],
                                  ControlStatus='DISABLED'
                              )
                              response_results.append({
                                  'ControlId': control.get('ControlId'),
                                  'Status': 'DISABLED'
                              })
                  elif 'AWS Foundational' in standard_name:
                      controls_response = client.describe_standards_controls(StandardsArn=standards_arn)
                      controls = controls_response.get('Controls', [])
                      for control in controls:
                          client.update_standards_control(
                              StandardsControlArn=control['StandardsControlArn'],
                              ControlStatus='ENABLED'
                          )
                          response_results.append({
                              'ControlId': control.get('ControlId'),
                              'Status': 'ENABLED'
                          })
              return {
                  'statusCode': 200,
                  'body': json.dumps(response_results)
              }
      Environment:
        Variables:
          DISABLE_CIS140_CONTROLS: !Ref DisableCIS140Controls

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${SecurityHubControlManagerFunction}"
      RetentionInDays: 14

Outputs:
  LambdaFunctionArn:
    Description: "ARN of the Security Hub Control Manager Lambda function"
    Value: !GetAtt SecurityHubControlManagerFunction.Arn
  LambdaExecutionRoleArn:
    Description: "ARN of the Lambda execution role"
    Value: !GetAtt LambdaExecutionRole.Arn