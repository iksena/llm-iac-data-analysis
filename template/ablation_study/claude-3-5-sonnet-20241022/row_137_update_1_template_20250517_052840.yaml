AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Pet Shop GraphQL API with Lambda backend'

Resources:
  PetShopAPI:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: PetShopAPI
      AuthenticationType: API_KEY
      XrayEnabled: true

  PetShopAPIKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Description: API Key for PetShopAPI
      Expires: 1893456000

  PetShopSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
            id: ID!
            name: String!
            type: String!
        }
        type Query {
            getPets: [Pet]
        }
        schema {
            query: Query
        }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PetLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const pets = [
              { id: '1', name: 'Max', type: 'Dog' },
              { id: '2', name: 'Luna', type: 'Cat' },
              { id: '3', name: 'Buddy', type: 'Hamster' }
            ];
            return pets;
          };
      Runtime: nodejs18.x
      Timeout: 30
      MemorySize: 128

  AppSyncLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AppSyncLambdaInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt PetLambdaFunction.Arn

  PetLambdaDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: PetLambdaDataSource
      Type: AWS_LAMBDA
      ServiceRoleArn: !GetAtt AppSyncLambdaRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn

  GetPetsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: PetShopSchema
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: Query
      FieldName: getPets
      DataSourceName: !GetAtt PetLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": $util.toJson($context.arguments)
        }
      ResponseMappingTemplate: |
        $util.toJson($context.result)

Outputs:
  GraphQLApiEndpoint:
    Description: The URL to access the GraphQL API
    Value: !GetAtt PetShopAPI.GraphQLUrl

  GraphQLApiId:
    Description: The ID of the GraphQL API
    Value: !GetAtt PetShopAPI.ApiId

  GraphQLApiKey:
    Description: API Key for GraphQL API
    Value: !GetAtt PetShopAPIKey.ApiKey