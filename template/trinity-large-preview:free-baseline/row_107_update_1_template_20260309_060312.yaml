AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a REST API Gateway integrated with SQS for message retrieval

Parameters:
  QueueName:
    Type: String
    Default: MySQSQueue
    Description: Name of the SQS queue to create
  ApiName:
    Type: String
    Default: MyAPIGateway
    Description: Name of the API Gateway to create
  StageName:
    Type: String
    Default: prod
    Description: Name of the stage for the API Gateway

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName

  APIGatewayRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: SQSReceiveMessagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                Resource: !GetAtt SQSQueue.Arn

  APIGatewayRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Ref ApiName

  APIGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ParentId: !GetAtt APIGatewayRestApi.RootResourceId
      PathPart: messages

  APIGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref APIGatewayRestApi
      ResourceId: !Ref APIGatewayResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${QueueName}
          - QueueName: !Ref SQSQueue
        Credentials: !GetAtt APIGatewayRole.Arn
        RequestParameters:
          integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
        RequestTemplates:
          application/json: !Sub |
            Action=ReceiveMessage
            &Version=2012-11-05
            &MaxNumberOfMessages=10
            &WaitTimeSeconds=10
            &QueueUrl=https://sqs.${AWS::Region}.amazonaws.com/${AWS::AccountId}/${QueueName}
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: "#if($input.path('$.ReceiveMessageResponse.ReceiveMessageResult.Messages').isEmpty())\n '[]'\n#else\n $input.path('$.ReceiveMessageResponse.ReceiveMessageResult.Messages')\n#end"

  APIGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: APIGatewayMethod
    Properties:
      RestApiId: !Ref APIGatewayRestApi

  APIGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      DeploymentId: !Ref APIGatewayDeployment
      RestApiId: !Ref APIGatewayRestApi
      StageName: !Ref StageName

Outputs:
  QueueUrl:
    Description: URL of the created SQS queue
    Value: !GetAtt SQSQueue.QueueUrl
  ApiUrl:
    Description: URL of the API Gateway endpoint
    Value: !Sub
      - https://${RestApiId}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/messages
      - RestApiId: !Ref APIGatewayRestApi
        StageName: !Ref StageName