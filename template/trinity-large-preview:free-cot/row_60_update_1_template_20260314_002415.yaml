AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS KMS Key with Alias for centralized encryption management

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption key for organizational use
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/centralized-encryption-key
      TargetKeyId: !Ref KMSKey

Outputs:
  KMSKeyId:
    Description: The ID of the created KMS Key
    Value: !Ref KMSKey
    Export:
      Name: KMSKeyId

  KMSKeyArn:
    Description: The Amazon Resource Name (ARN) of the created KMS Key
    Value: !GetAtt KMSKey.Arn
    Export:
      Name: KMSKeyArn