AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS Region for the application
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
    
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS Region for the application
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
    
  ApplicationName:
    Type: String
    Description: Name of the application for resource naming
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9-]+'
    
  PrimaryEndpoint:
    Type: String
    Description: Primary region endpoint for health checks
    AllowedPattern: '^[a-zA-Z0-9.-]+$'
    
  SecondaryEndpoint:
    Type: String
    Description: Secondary region endpoint for health checks
    AllowedPattern: '^[a-zA-Z0-9.-]+$'

Resources:
  RecoveryCluster:
    Type: 'AWS::Route53RecoveryControl::Cluster'
    Properties:
      Name: !Sub '${ApplicationName}-cluster'
      
  ControlPanel:
    Type: 'AWS::Route53RecoveryControl::ControlPanel'
    Properties:
      Name: !Sub '${ApplicationName}-control-panel'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      
  PrimaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${ApplicationName}-primary'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      
  SecondaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${ApplicationName}-secondary'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      
  SafetyRule:
    Type: 'AWS::Route53RecoveryControl::SafetyRule'
    Properties:
      Name: !Sub '${ApplicationName}-safety-rule'
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      AssertionRule:
        AssertedControls: 
          - !GetAtt PrimaryRoutingControl.RoutingControlArn
          - !GetAtt SecondaryRoutingControl.RoutingControlArn
        WaitPeriodMs: 5000
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST

  PrimaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        Regions:
          - us-east-1
          - us-west-1
          - eu-west-1
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${ApplicationName}-primary-health'

  SecondaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        Regions:
          - us-east-1
          - us-west-1
          - eu-west-1
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${ApplicationName}-secondary-health'

Outputs:
  ClusterArn:
    Description: Recovery Cluster ARN
    Value: !GetAtt RecoveryCluster.ClusterArn
    
  ControlPanelArn:
    Description: Control Panel ARN
    Value: !GetAtt ControlPanel.ControlPanelArn
    
  PrimaryRoutingControlArn:
    Description: Primary Routing Control ARN
    Value: !GetAtt PrimaryRoutingControl.RoutingControlArn
    
  SecondaryRoutingControlArn:
    Description: Secondary Routing Control ARN
    Value: !GetAtt SecondaryRoutingControl.RoutingControlArn