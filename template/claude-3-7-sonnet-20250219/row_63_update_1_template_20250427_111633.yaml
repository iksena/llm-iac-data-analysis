AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for Aurora MySQL Cluster with CloudWatch Logs Integration'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the DB subnet group will be created

  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First subnet for the DB subnet group

  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second subnet for the DB subnet group

  DBInstanceClass:
    Type: String
    Default: db.t3.large
    AllowedValues:
      - db.t3.large
      - db.r5.large
      - db.r5.xlarge
      - db.r5.2xlarge
    Description: Database instance class

  DBClusterName:
    Type: String
    Default: aurora-mysql-cluster
    Description: Name of the Aurora DB cluster

  DBName:
    Type: String
    Default: mydb
    Description: Database name
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  MasterUsername:
    Type: String
    Default: admin
    Description: Username for the master DB user
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'
    ConstraintDescription: Must begin with a letter and contain only alphanumeric characters

  MasterUserPassword:
    Type: String
    NoEcho: true
    Description: Password for the master DB user
    MinLength: 8
    MaxLength: 41
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: Must contain only alphanumeric characters

  BackupRetentionPeriod:
    Type: Number
    Default: 7
    MinValue: 1
    MaxValue: 35
    Description: The number of days to retain automated backups

  PreferredBackupWindow:
    Type: String
    Default: 02:00-03:00
    Description: The daily time range during which automated backups are created

  PreferredMaintenanceWindow:
    Type: String
    Default: sun:05:00-sun:06:00
    Description: The weekly time range during which system maintenance can occur

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for Aurora MySQL cluster
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-subnet-group

  DBClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: Cluster parameter group for Aurora MySQL
      Family: aurora-mysql5.7
      Parameters:
        time_zone: UTC
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-cluster-param-group

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: Parameter group for Aurora MySQL instances
      Family: aurora-mysql5.7
      Parameters:
        max_connections: 1000
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-param-group

  RDSCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      Path: /
      Policies:
        - PolicyName: RDSCloudWatchLogPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:CreateLogGroup
                  - logs:DescribeLogStreams
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/rds/instance/*

  AuroraErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/rds/cluster/${DBClusterName}/error
      RetentionInDays: 30

  DBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.10.2
      DatabaseName: !Ref DBName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterParameterGroupName: !Ref DBClusterParameterGroup
      BackupRetentionPeriod: !Ref BackupRetentionPeriod
      PreferredBackupWindow: !Ref PreferredBackupWindow
      PreferredMaintenanceWindow: !Ref PreferredMaintenanceWindow
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      EnableCloudwatchLogsExports:
        - error
      StorageEncrypted: true
      DeletionProtection: true
      Tags:
        - Key: Name
          Value: !Ref DBClusterName

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: !Sub ${DBClusterName}-instance-1
      DBInstanceClass: !Ref DBInstanceClass
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-instance-1

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref DBCluster
      DBInstanceIdentifier: !Sub ${DBClusterName}-instance-2
      DBInstanceClass: !Ref DBInstanceClass
      DBParameterGroupName: !Ref DBParameterGroup
      PubliclyAccessible: true
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-instance-2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Aurora MySQL cluster
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${DBClusterName}-sg

Outputs:
  ClusterEndpoint:
    Description: The connection endpoint for the Aurora DB cluster
    Value: !GetAtt DBCluster.Endpoint.Address

  ReaderEndpoint:
    Description: The reader endpoint for the Aurora DB cluster
    Value: !GetAtt DBCluster.ReadEndpoint.Address

  DBInstance1Endpoint:
    Description: The connection endpoint for the first DB instance
    Value: !GetAtt DBInstance1.Endpoint.Address

  DBInstance2Endpoint:
    Description: The connection endpoint for the second DB instance
    Value: !GetAtt DBInstance2.Endpoint.Address

  ErrorLogGroup:
    Description: The CloudWatch Log Group for Aurora error logs
    Value: !Ref AuroraErrorLogGroup