AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  VpcId:
    Type: String
    Description: VPC ID where the ENI will be created
  SubnetId:
    Type: String
    Description: Subnet ID where the ENI will be created
  NumberOfSecondaryPrivateIPs:
    Type: Number
    Description: Number of secondary private IPs to assign to the ENI
    Default: 1
  EipAllocationIds:
    Type: List<AWS::EC2::EIP::AllocationId>
    Description: List of allocation IDs for EIPs

Resources:
  ENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref SubnetId
      Description: ENI for handling multiple public-facing IP addresses
      SecondaryPrivateIpAddressCount: !Ref NumberOfSecondaryPrivateIPs

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      AllocationId: !Ref 'EipAllocationIds[0]'

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      AllocationId: !Ref 'EipAllocationIds[1]'

  ENIAssociation1:
    Type: AWS::EC2::NetworkInterfaceAttachment
    Properties:
      NetworkInterfaceId: !Ref ENI
      InstanceId: !Ref EC2Instance
      DeviceIndex: 0

  ENIAssociation2:
    Type: AWS::EC2::NetworkInterfaceAttachment
    Properties:
      NetworkInterfaceId: !Ref ENI
      InstanceId: !Ref EC2Instance
      DeviceIndex: 1

Outputs:
  ENIID:
    Description: ID of the created ENI
    Value: !Ref ENI
    Export:
      Name: ENIID

  PublicIP1:
    Description: First public IP address
    Value: !GetAtt EIP1.PublicIp
    Export:
      Name: PublicIP1

  PublicIP2:
    Description: Second public IP address
    Value: !GetAtt EIP2.PublicIp
    Export:
      Name: PublicIP2

  PrivateIP1:
    Description: First private IP address
    Value: !GetAtt ENI.PrivateIpAddress
    Export:
      Name: PrivateIP1

  PrivateIP2:
    Description: Second private IP address
    Value: !GetAtt ENI.SecondaryPrivateIpAddress
    Export:
      Name: PrivateIP2