AWSTemplateFormatVersion: '2010-09-09'
Description: Aurora MySQL Cluster with CloudWatch Logs Integration

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-12345678
  Subnet1:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  Subnet2:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  DBClusterIdentifier:
    Type: String
    Default: aurora-cluster
  MasterUsername:
    Type: String
    Default: admin
  MasterUserPassword:
    Type: String
    NoEcho: true
    Default: Password123!

Resources:
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: 5.7.mysql_aurora.2.07.2
      DBClusterParameterGroup: default.aurora-mysql5.7
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      DatabaseName: aurora_db
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      BackupRetentionPeriod: 7
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterIdentifier: !Ref AuroraCluster
      EnableCloudwatchLogsExports:
        - error
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBClusterIdentifier: !Ref AuroraCluster
      EnableCloudwatchLogsExports:
        - error
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Aurora DB subnet group
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora DB security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

Outputs:
  ClusterEndpoint:
    Description: Aurora Cluster Endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  ReaderEndpoint:
    Description: Aurora Reader Endpoint
    Value: !GetAtt AuroraCluster.ReaderEndpoint.Address