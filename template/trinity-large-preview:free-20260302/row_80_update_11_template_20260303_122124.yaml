AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IAM role assumable by Bedrock service with permissions for Bedrock agents and Lambda functions.

Resources:
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: BedrockAgentPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - lambda:InvokeAsync
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:CreateAgent
                  - bedrock:GetAgent
                  - bedrock:ListAgents
                  - bedrock:UpdateAgent
                  - bedrock:DeleteAgent
                  - bedrock:InvokeAgent
                  - bedrock:AssociateAgentCollaborator
                  - bedrock:DisassociateAgentCollaborator
                  - bedrock:AssociateAgentKnowledgeBase
                  - bedrock:DisassociateAgentKnowledgeBase
                  - bedrock:CreateAgentAlias
                  - bedrock:GetAgentAlias
                  - bedrock:ListAgentAliases
                  - bedrock:UpdateAgentAlias
                  - bedrock:DeleteAgentAlias
                  - bedrock:CreateAgentActionGroup
                  - bedrock:GetAgentActionGroup
                  - bedrock:ListAgentActionGroups
                  - bedrock:UpdateAgentActionGroup
                  - bedrock:DeleteAgentActionGroup
                  - bedrock:CreateAgentVersion
                  - bedrock:GetAgentVersion
                  - bedrock:ListAgentVersions
                  - bedrock:DeleteAgentVersion
                  - bedrock:GetAgentMemory
                  - bedrock:DeleteAgentMemory
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'

Outputs:
  BedrockAgentRoleArn:
    Description: The ARN of the Bedrock Agent Role
    Value: !GetAtt BedrockAgentRole.Arn