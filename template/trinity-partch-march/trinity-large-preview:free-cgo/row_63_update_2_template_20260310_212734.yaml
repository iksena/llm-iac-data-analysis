AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template to create an Amazon Aurora MySQL cluster with CloudWatch Logs integration.'

Parameters:
  Subnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: 'List of two subnets for the Aurora cluster (must be in different AZs)'
    Default: 'subnet-12345678,subnet-87654321'
  VPC:
    Type: AWS::EC2::VPC::Id
    Description: 'VPC ID for the Aurora cluster'
    Default: 'vpc-12345678'

Resources:
  AuroraDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-mysql
      EngineVersion: '5.7.mysql_aurora.2.07.2'
      DBClusterParameterGroupName: default.aurora-mysql5.7
      EnableHttpEndpoint: true
      EnableIAMDatabaseAuthentication: true
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      VpcSecurityGroupIds:
        - !GetAtt AuroraDBSecurityGroup.GroupId
      DatabaseName: 'aurora_db'
      MasterUsername: 'admin'
      MasterUserPassword: '{{resolve:secretsmanager:aurora-master-password:SecretString:password}}'
      BackupRetentionPeriod: 7
      PreferredBackupWindow: '03:00-04:00'
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'

  AuroraDBInstance1:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      EnableCloudwatchLogsExports:
        - error

  AuroraDBInstance2:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref AuroraDBCluster
      DBInstanceClass: db.t3.large
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref AuroraDBSubnetGroup
      DBParameterGroupName: default.aurora-mysql5.7
      EnableCloudwatchLogsExports:
        - error

  AuroraDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: 'Subnet group for Aurora cluster'
      SubnetIds: !Ref Subnets

  AuroraDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: 'Security group for Aurora cluster'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0

Outputs:
  ClusterEndpoint:
    Description: 'Aurora Cluster Endpoint'
    Value: !GetAtt AuroraDBCluster.Endpoint.Address
  ReaderEndpoint:
    Description: 'Aurora Reader Endpoint'
    Value: !GetAtt AuroraDBCluster.ReadEndpoint.Address
  Port:
    Description: 'Aurora Port'
    Value: !GetAtt AuroraDBCluster.Endpoint.Port