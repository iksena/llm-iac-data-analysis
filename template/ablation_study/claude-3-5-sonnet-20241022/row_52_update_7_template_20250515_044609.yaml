AWSTemplateFormatVersion: '2010-09-09'
Description: 'Multi-region failover architecture using Route 53 Application Recovery Controller'

Parameters:
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary AWS Region for the application
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
    
  SecondaryRegion:
    Type: String
    Default: us-west-2
    Description: Secondary AWS Region for the application
    AllowedPattern: '[a-z][a-z]-[a-z]+-[0-9]'
    
  ApplicationName:
    Type: String
    Description: Name of the application for resource naming
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9-]+'
    
  PrimaryEndpoint:
    Type: String
    Description: Primary region endpoint for health checks
    AllowedPattern: '^[a-zA-Z0-9.-]+$'
    
  SecondaryEndpoint:
    Type: String
    Description: Secondary region endpoint for health checks
    AllowedPattern: '^[a-zA-Z0-9.-]+$'

Resources:
  RecoveryCluster:
    Type: 'AWS::Route53RecoveryControl::Cluster'
    Properties:
      Name: !Sub '${ApplicationName}-cluster-${PrimaryRegion}-${SecondaryRegion}'
      Tags:
        - Key: PrimaryRegion
          Value: !Ref PrimaryRegion
        - Key: SecondaryRegion
          Value: !Ref SecondaryRegion
      
  ControlPanel:
    Type: 'AWS::Route53RecoveryControl::ControlPanel'
    Properties:
      Name: !Sub '${ApplicationName}-panel-${PrimaryRegion}-${SecondaryRegion}'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      Tags:
        - Key: PrimaryRegion
          Value: !Ref PrimaryRegion
        - Key: SecondaryRegion
          Value: !Ref SecondaryRegion
      
  PrimaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${ApplicationName}-primary-${PrimaryRegion}'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      
  SecondaryRoutingControl:
    Type: 'AWS::Route53RecoveryControl::RoutingControl'
    Properties:
      Name: !Sub '${ApplicationName}-secondary-${SecondaryRegion}'
      ClusterArn: !GetAtt RecoveryCluster.ClusterArn
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      
  SafetyRule:
    Type: 'AWS::Route53RecoveryControl::SafetyRule'
    Properties:
      Name: !Sub '${ApplicationName}-safety-rule-${PrimaryRegion}-${SecondaryRegion}'
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      AssertionRule:
        AssertedControls: 
          - !GetAtt PrimaryRoutingControl.RoutingControlArn
          - !GetAtt SecondaryRoutingControl.RoutingControlArn
        WaitPeriodMs: 5000
      RuleConfig:
        Inverted: false
        Threshold: 1
        Type: ATLEAST

  PrimaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        FullyQualifiedDomainName: !Ref PrimaryEndpoint
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        Regions:
          - !Ref PrimaryRegion
          - !Ref SecondaryRegion
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${ApplicationName}-primary-health-${PrimaryRegion}'
        - Key: Region
          Value: !Ref PrimaryRegion

  SecondaryHealthCheck:
    Type: 'AWS::Route53::HealthCheck'
    Properties:
      HealthCheckConfig:
        FullyQualifiedDomainName: !Ref SecondaryEndpoint
        Port: 443
        Type: HTTPS
        ResourcePath: '/health'
        RequestInterval: 30
        FailureThreshold: 3
        EnableSNI: true
        Regions:
          - !Ref PrimaryRegion
          - !Ref SecondaryRegion
      HealthCheckTags:
        - Key: Name
          Value: !Sub '${ApplicationName}-secondary-health-${SecondaryRegion}'
        - Key: Region
          Value: !Ref SecondaryRegion

Outputs:
  ClusterArn:
    Description: !Sub 'Recovery Cluster ARN for ${PrimaryRegion} and ${SecondaryRegion}'
    Value: !GetAtt RecoveryCluster.ClusterArn
    
  ControlPanelArn:
    Description: !Sub 'Control Panel ARN for ${PrimaryRegion} and ${SecondaryRegion}'
    Value: !GetAtt ControlPanel.ControlPanelArn
    
  PrimaryRoutingControlArn:
    Description: !Sub 'Primary Routing Control ARN for ${PrimaryRegion}'
    Value: !GetAtt PrimaryRoutingControl.RoutingControlArn
    
  SecondaryRoutingControlArn:
    Description: !Sub 'Secondary Routing Control ARN for ${SecondaryRegion}'
    Value: !GetAtt SecondaryRoutingControl.RoutingControlArn