AWSTemplateFormatVersion: '2010-09-09'
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  StockPriceLambda:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: nodejs24.x
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ price: 100 })
            };
          };
      Role: !GetAtt LambdaExecutionRole.Arn

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: "*"

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: StockPriceAgent
      Description: Agent for stock price lookup
      RoleArn: !GetAtt BedrockAgentRole.Arn
      ModelId: anthropic.claude-3-sonnet-20240229
      Instructions: Handle stock-related queries. Use the getStockPrice action to retrieve stock prices.
      ActionGroups:
        - ActionGroupName: StockPriceLookup
          Description: Retrieve stock prices
          Actions:
            - Name: getStockPrice
              Description: Get stock price for a symbol
              LambdaFunction: !GetAtt StockPriceLambda.Arn
              Parameters:
                - Name: symbol
                  Type: STRING
                  Required: true