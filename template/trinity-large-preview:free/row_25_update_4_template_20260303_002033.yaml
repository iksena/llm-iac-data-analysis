AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an IoT data pipeline from AWS IoT Core to SQS via SNS

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTDeviceDataTopic

  IoTRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - iot.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: IoTToSNSPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  IoTRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDeviceDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref SNSTopic
              MessageFormat: RAW
        RuleDisabled: false
      Tags:
        - Key: Name
          Value: IoTDeviceDataRule

Outputs:
  SQSQueueURL:
    Description: URL of the created SQS queue
    Value: !Ref SQSQueue
  SNSTopicARN:
    Description: ARN of the created SNS topic
    Value: !GetAtt SNSTopic.Arn
  IoTRuleName:
    Description: Name of the created IoT Rule
    Value: !Ref IoTRule