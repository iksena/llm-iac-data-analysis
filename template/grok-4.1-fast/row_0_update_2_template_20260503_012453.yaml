AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  QueueName:
    Type: String
    Default: basic-sqs-queue
    Description: Name of the SQS queue
  VisibilityTimeoutSeconds:
    Type: Number
    Default: 30
    Description: Visibility timeout for messages
  MessageRetentionPeriod:
    Type: Number
    Default: 345600
    Description: Retention period for messages in seconds (4 days)
  MaximumMessageSize:
    Type: Number
    Default: 262144
    Description: Maximum message size in bytes (256 KB)
  DeliveryDelay:
    Type: Number
    Default: 0
    Description: Delay for message delivery in seconds
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Default: 0
    Description: Wait time for ReceiveMessage in seconds (long polling)
Resources:
  BasicSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      VisibilityTimeoutSeconds: !Ref VisibilityTimeoutSeconds
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      MaximumMessageSize: !Ref MaximumMessageSize
      DeliveryDelay: !Ref DeliveryDelay
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds
Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref BasicSQSQueue
    Export:
      Name: !Sub '${AWS::StackName}-QueueUrl'
  QueueArn:
    Description: ARN of the SQS queue
    Value: !GetAtt BasicSQSQueue.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QueueArn'