AWSTemplateFormatVersion: '2010-09-09'
Resources:
  IoTDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: IoTDataQueue

  IoTSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: IoTSNSTopic

  IoTTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      RuleName: IoTDataRule
      TopicRulePayload:
        Sql: "SELECT * FROM 'device/data'"
        Actions:
          - Sns:
              TargetArn: !Ref IoTSNSTopic
              RoleArn: !GetAtt IoTTopicRuleRole.Arn
        RuleDisabled: false

  IoTTopicRuleRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: iot.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IoTTopicRulePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref IoTSNSTopic

Outputs:
  QueueURL:
    Description: SQS Queue URL
    Value: !Ref IoTDataQueue
  SNSTopicARN:
    Description: SNS Topic ARN
    Value: !Ref IoTSNSTopic