AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge to MongoDB API Integration

Parameters:
  MongoDBURL:
    Type: String
    Default: 'www.testanu.com'
    Description: MongoDB API endpoint URL
  ApiKeyName:
    Type: String
    Default: 'test_name'
    Description: API key name for authentication
  ApiKeyValue:
    Type: String
    Default: 'test_value'
    Description: API key value for authentication
  DeadLetterQueueName:
    Type: String
    Default: 'eventbridge-deadletter-queue'
    Description: Name for the dead-letter SQS queue

Resources:
  EventBridgeDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref DeadLetterQueueName
      MessageRetentionPeriod: 1209600

  EventBridgeDeadLetterQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EventBridgeDeadLetterQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EventBridgeDeadLetterQueue.Arn

  EventBridgeIAMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeMongoDBInvokerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgeMongoDBInvokerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: '*'

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: !Ref ApiKeyName
          ApiKeyValue: !Ref ApiKeyValue
      Name: !Sub '${AWS::StackName}-MongoDBConnection'

  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: !Ref MongoDBURL
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1
      Name: !Sub '${AWS::StackName}-MongoDBApiDestination'
      Description: API destination for MongoDB endpoint

Outputs:
  EventBridgeApiDestinationArn:
    Description: ARN of the EventBridge API Destination
    Value: !GetAtt EventBridgeApiDestination.Arn
  EventBridgeDeadLetterQueueArn:
    Description: ARN of the Dead-Letter Queue
    Value: !GetAtt EventBridgeDeadLetterQueue.Arn