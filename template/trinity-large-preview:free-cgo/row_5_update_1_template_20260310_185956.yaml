AWSTemplateFormatVersion: '2010-09-09'
Resources:
  ArtistConcertTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ArtistConcertTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
        - AttributeName: TicketSales
          AttributeType: N
      GlobalSecondaryIndexes:
        - IndexName: TicketSalesIndex
          KeySchema:
            - AttributeName: TicketSales
              KeyType: HASH
          Projection:
            ProjectionType: ALL
  DynamoDBTablePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Managed policy for DynamoDB ArtistConcertTable access
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:GetItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource: !GetAtt ArtistConcertTable.Arn
Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref ArtistConcertTable
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt ArtistConcertTable.Arn