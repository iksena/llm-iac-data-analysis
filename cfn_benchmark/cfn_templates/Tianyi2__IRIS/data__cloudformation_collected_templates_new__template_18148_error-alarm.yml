Resources:
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alarm if Lambda errors exceed threshold"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: '{{LAMBDA_FUNCTION_NAME}}'  # Replace with your Lambda function name
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - '{{SNS_TOPIC_ARN}}'  # Replace with your SNS Topic ARN