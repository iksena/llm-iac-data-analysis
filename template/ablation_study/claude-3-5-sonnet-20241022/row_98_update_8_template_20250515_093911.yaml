AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for TodoApp Amplify Application'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Application Configuration"
        Parameters:
          - AppName
          - RepositoryProvider
          - RepositoryUrl
          - AccessToken
    ParameterLabels:
      AppName:
        default: "Application Name"
      RepositoryProvider:
        default: "Repository Provider"
      RepositoryUrl:
        default: "Repository URL"
      AccessToken:
        default: "Repository Access Token"

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application (e.g., todo-app)
    Default: todo-app
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9-]+'
    ConstraintDescription: Only alphanumeric characters and hyphens are allowed

  RepositoryProvider:
    Type: String
    Description: Source code repository provider
    Default: GitHub
    AllowedValues:
      - GitHub
      - GitLab
      - BitBucket
      - CodeCommit

  RepositoryUrl:
    Type: String
    Description: >-
      URL of the source code repository 
      (e.g., https://github.com/username/repository)
    AllowedPattern: '^https:\/\/(github\.com|gitlab\.com|bitbucket\.org|git-codecommit\.[a-z0-9-]+\.amazonaws\.com)\/.*$'
    ConstraintDescription: Must be a valid HTTPS repository URL

  AccessToken:
    Type: String
    Description: >-
      Personal access token for repository access. 
      For GitHub, create one at https://github.com/settings/tokens
    NoEcho: true
    MinLength: 8

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole
      Path: /service-role/

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      Repository: !Ref RepositoryUrl
      OauthToken: !Ref AccessToken
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      EnableBranchAutoDeletion: false
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: /<*>
          Target: /index.html
          Status: '200'

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: production
      EnableAutoBuild: true
      Stage: PRODUCTION
      Framework: React
      EnablePullRequestPreview: false

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyAppDomain:
    Description: Default domain for the Amplify application
    Value: !GetAtt AmplifyApp.DefaultDomain

  AmplifyConsoleUrl:
    Description: URL to the Amplify Console
    Value: !Sub https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp.AppId}

  ProductionBranchUrl:
    Description: URL for the production branch
    Value: !Sub https://production.${AmplifyApp.DefaultDomain}