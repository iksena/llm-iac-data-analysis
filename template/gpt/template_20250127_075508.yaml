AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an S3 bucket for website hosting with a DeletionPolicy.

Parameters:
  BucketName:
    Type: String
    Description: The name of the S3 bucket for website hosting.

Resources:
  WebsiteS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
    DeletionPolicy: Retain

Outputs:
  BucketName:
    Description: The name of the S3 bucket
    Value: !Ref WebsiteS3Bucket
  WebsiteURL:
    Description: The URL of the website hosted on S3
    Value: !GetAtt WebsiteS3Bucket.WebsiteURL