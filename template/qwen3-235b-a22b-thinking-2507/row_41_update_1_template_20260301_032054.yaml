AWSTemplateFormatVersion: '2010-09-09'
Description: Creates a production-ready SQS Standard Queue with configurable parameters

Parameters:
  QueueName:
    Type: String
    Description: (Optional) Custom name for the SQS queue (1-80 alphanumeric/hyphen/underscore characters)
    Default: ''
    MinLength: '0'
    MaxLength: '80'
    AllowedPattern: '[a-zA-Z0-9_-]*'
  DelaySeconds:
    Type: Number
    Description: Delay in seconds before messages become visible (0-900)
    Default: 0
    MinValue: 0
    MaxValue: 900
  MaximumMessageSize:
    Type: Number
    Description: Maximum message size in bytes (1024-262144)
    Default: 262144
    MinValue: 1024
    MaxValue: 262144
  MessageRetentionPeriod:
    Type: Number
    Description: How long messages are retained (60-1209600 seconds)
    Default: 345600
    MinValue: 60
    MaxValue: 1209600
  VisibilityTimeout:
    Type: Number
    Description: Duration messages stay hidden after being read (0-43200 seconds)
    Default: 30
    MinValue: 0
    MaxValue: 43200
  ReceiveMessageWaitTimeSeconds:
    Type: Number
    Description: Long polling wait time (0-20 seconds)
    Default: 0
    MinValue: 0
    MaxValue: 20

Conditions:
  QueueNameProvided: !Not [!Equals [!Ref QueueName, '']]

Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !If [QueueNameProvided, !Ref QueueName, !Ref AWS::NoValue]
      DelaySeconds: !Ref DelaySeconds
      MaximumMessageSize: !Ref MaximumMessageSize
      MessageRetentionPeriod: !Ref MessageRetentionPeriod
      VisibilityTimeout: !Ref VisibilityTimeout
      ReceiveMessageWaitTimeSeconds: !Ref ReceiveMessageWaitTimeSeconds

Outputs:
  QueueUrl:
    Description: URL of the created SQS queue
    Value: !Ref SQSQueue
  QueueArn:
    Description: ARN of the created SQS queue
    Value: !GetAtt SQSQueue.Arn