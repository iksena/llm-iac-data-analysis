AWSTemplateFormatVersion: '2010-09-09'
Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      NotificationConfiguration:
        EventBridgeConfiguration: {}

  SNSTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      DisplayName: 'S3ObjectCreatedNotification'

  EventBridgeRule:
    Type: 'AWS::Events::Rule'
    Properties:
      EventPattern:
        source:
          - "aws.s3"
        detail-type:
          - "AWS API Call via CloudTrail"
        detail:
          eventSource:
            - "s3.amazonaws.com"
          eventName:
            - "PutObject"
            - "CompleteMultipartUpload"
      Targets:
        - Arn: !GetAtt SNSTopic.Arn
          Id: "SNSTarget"
      State: "ENABLED"

  EventBridgeToSNSPermission:
    Type: 'AWS::SNS::TopicPolicy'
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: "events.amazonaws.com"
            Action: "sns:Publish"
            Resource: !Ref SNSTopic

Outputs:
  S3BucketName:
    Description: "Name of the S3 bucket"
    Value: !Ref S3Bucket

  SNSTopicARN:
    Description: "ARN of the SNS topic"
    Value: !Ref SNSTopic