AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation Template to deploy a Lambda-backed custom resource that performs arithmetic operations
  with dynamic parameter processing and a controlled failure simulation mechanism.

Parameters:
  FirstNumber:
    Description: "The first number for the arithmetic operation."
    Type: Number
  SecondNumber:
    Description: "The second number for the arithmetic operation."
    Type: Number
  Operator:
    Description: "The arithmetic operator. Valid values: +, -, *, /."
    Type: String
    AllowedValues:
      - "+"
      - "-"
      - "*"
      - "/"
  FailTest:
    Description: "Set to 'true' to simulate a failure in the custom resource; 'false' otherwise."
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  ArithmeticLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib3
          
          SUCCESS = "SUCCESS"
          FAILED = "FAILED"
          http = urllib3.PoolManager()
          
          def send(event, context, responseStatus, responseData, physicalResourceId):
              responseUrl = event['ResponseURL']
              responseBody = {
                  'Status': responseStatus,
                  'Reason': 'See details in CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': physicalResourceId or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': responseData
              }
              json_responseBody = json.dumps(responseBody)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_responseBody))
              }
              try:
                  response = http.request('PUT', responseUrl, body=json_responseBody, headers=headers)
                  print("Status code:", response.status)
              except Exception as e:
                  print("send() failed: ", e)
          
          def handler(event, context):
              print("Received event: " + json.dumps(event))
              try:
                  props = event.get('ResourceProperties', {})
                  first = float(props.get('FirstNumber', 0))
                  second = float(props.get('SecondNumber', 0))
                  operator = props.get('Operator')
                  fail_test = props.get('FailTest', "false").lower() == "true"
                  
                  if fail_test:
                      raise Exception("Simulated failure as requested by FailTest parameter.")
                  
                  if operator == "+":
                      result = first + second
                  elif operator == "-":
                      result = first - second
                  elif operator == "*":
                      result = first * second
                  elif operator == "/":
                      if second == 0:
                          raise Exception("Division by zero error.")
                      result = first / second
                  else:
                      raise Exception("Unsupported operator: " + str(operator))
                  
                  responseData = {"Result": result}
                  physical_id = context.log_stream_name
                  send(event, context, SUCCESS, responseData, physical_id)
              except Exception as e:
                  print("Error during processing: " + str(e))
                  responseData = {"Error": str(e)}
                  physical_id = context.log_stream_name
                  send(event, context, FAILED, responseData, physical_id)

  CustomResourceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ArithmeticLambdaFunction
      Principal: cloudformation.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  CustomHelperResource:
    Type: Custom::helper
    Properties:
      ServiceToken: !GetAtt ArithmeticLambdaFunction.Arn
      FirstNumber: !Ref FirstNumber
      SecondNumber: !Ref SecondNumber
      Operator: !Ref Operator
      FailTest: !Ref FailTest

Outputs:
  CalculationResult:
    Description: "Result of the arithmetic operation as returned by the custom resource."
    Value: !GetAtt CustomHelperResource.Result
  LambdaFunctionName:
    Description: "Name of the Lambda function deployed for the custom resource."
    Value: !Ref ArithmeticLambdaFunction