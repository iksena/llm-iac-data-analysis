AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SQS FIFO Queue

Resources:
  MyFifoQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyFifoQueue.fifo
      FifoQueue: true
      ContentBasedDeduplication: false
      DelaySeconds: 0
      MaximumMessageSize: 262144
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 0
      VisibilityTimeout: 30

Outputs:
  QueueUrl:
    Description: URL of the created SQS FIFO Queue
    Value: !Ref MyFifoQueue
    Export:
      Name: MyFifoQueue-Url

  QueueArn:
    Description: ARN of the created SQS FIFO Queue
    Value: !GetAtt MyFifoQueue.Arn
    Export:
      Name: MyFifoQueue-Arn