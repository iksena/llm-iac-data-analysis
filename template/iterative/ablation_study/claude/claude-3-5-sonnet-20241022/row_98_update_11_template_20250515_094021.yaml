AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for TodoApp Amplify Application'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application (e.g., todo-app)
    Default: todo-app
    MinLength: 1
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9-]+'
    ConstraintDescription: Only alphanumeric characters and hyphens are allowed

  EnableRepositoryConfig:
    Type: String
    Description: Set to true if you want to configure repository during stack creation
    Default: 'false'
    AllowedValues: 
      - 'true'
      - 'false'

  RepositoryUrl:
    Type: String
    Description: URL of the source code repository (optional)
    Default: ''

  AccessToken:
    Type: String
    Description: Personal access token for repository access (optional)
    Default: ''
    NoEcho: true

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: amplify.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AmplifyServicePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'amplify:*'
                  - 'cloudfront:CreateCloudFrontOriginAccessIdentity'
                  - 'cloudfront:GetCloudFrontOriginAccessIdentity'
                  - 'cloudfront:DeleteCloudFrontOriginAccessIdentity'
                  - 'cloudfront:CreateDistribution'
                  - 'cloudfront:GetDistribution'
                  - 'cloudfront:UpdateDistribution'
                  - 'cloudfront:DeleteDistribution'
                  - 'cloudfront:TagResource'
                  - 's3:CreateBucket'
                  - 's3:DeleteBucket'
                  - 's3:PutBucketPolicy'
                  - 's3:DeleteBucketPolicy'
                  - 's3:PutBucketWebsite'
                  - 's3:PutBucketVersioning'
                  - 's3:GetBucketWebsite'
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                  - 's3:ListBucket'
                Resource: '*'

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      EnableBranchAutoDeletion: false
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm ci
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: /<*>
          Target: /index.html
          Status: '200'
      Repository: !If 
        - ConfigureRepository
        - !Ref RepositoryUrl
        - !Ref 'AWS::NoValue'
      OauthToken: !If 
        - ConfigureRepository
        - !Ref AccessToken
        - !Ref 'AWS::NoValue'

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: production
      EnableAutoBuild: true
      Stage: PRODUCTION
      Framework: React
      EnablePullRequestPreview: false

Conditions:
  ConfigureRepository: !Equals 
    - !Ref EnableRepositoryConfig
    - 'true'

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyAppDomain:
    Description: Default domain for the Amplify application
    Value: !GetAtt AmplifyApp.DefaultDomain

  AmplifyConsoleUrl:
    Description: URL to the Amplify Console
    Value: !Sub https://console.aws.amazon.com/amplify/home?region=${AWS::Region}#/${AmplifyApp.AppId}

  ProductionBranchUrl:
    Description: URL for the production branch
    Value: !Sub https://production.${AmplifyApp.DefaultDomain}