AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge integration with Stripe Products API'

Parameters:
  StripeApiKey:
    Type: String
    NoEcho: true
    Description: Stripe API Key for authentication
  
  PartnerAppSource:
    Type: String
    Description: Source name for the partner application events
    Default: PartnerApp
  
  PartnerAppDetailType:
    Type: String
    Description: Detail type for the partner application events
    Default: PartnerAppDetailType

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-stripe-integration
      
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      
  EventBridgePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-eventbridge-policy
      Roles: 
        - !Ref EventBridgeRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - events:InvokeApiDestination
            Resource: '*'
            
  StripeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: Authorization
          ApiKeyValue: !Sub Bearer ${StripeApiKey}
      Name: !Sub ${AWS::StackName}-stripe-connection
      
  StripeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt StripeConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: https://api.stripe.com/v1/products
      Name: !Sub ${AWS::StackName}-stripe-api
      
  EventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EventBus
      EventPattern:
        source:
          - !Ref PartnerAppSource
        detail-type:
          - !Ref PartnerAppDetailType
      Name: !Sub ${AWS::StackName}-stripe-rule
      State: ENABLED
      Targets:
        - Id: StripeProductsApi
          Arn: !GetAtt StripeApiDestination.Arn
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  EventBusArn:
    Description: ARN of the created Event Bus
    Value: !GetAtt EventBus.Arn
    
  EventBusName:
    Description: Name of the created Event Bus
    Value: !Ref EventBus
    
  ApiDestinationArn:
    Description: ARN of the Stripe API Destination
    Value: !GetAtt StripeApiDestination.Arn