AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Glue ETL Job Infrastructure

Resources:
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  GlueServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}/*'
                  - !Sub 'arn:aws:s3:::${GlueScriptsBucket}'

  GlueETLJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        PythonVersion: '3'
      DefaultArguments:
        "--job-language": "python"
        "--pyspark-python": "/usr/bin/python3"
        "--pyspark-driver-python": "/usr/bin/python3"
      MaxCapacity: 2
      WorkerType: G.1X
      Role: !GetAtt GlueServiceRole.Arn
      GlueVersion: '4.0'
      ScriptLocation: !Sub 's3://${GlueScriptsBucket}/gue_scripts/sample_convert.py'