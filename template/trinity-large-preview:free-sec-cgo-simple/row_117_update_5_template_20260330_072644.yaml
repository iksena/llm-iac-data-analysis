AWSTemplateFormatVersion: '2010-09-09'
Description: Event-driven integration between DynamoDB streams and EventBridge

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-Events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  EventSchemasRegistry:
    Type: AWS::EventSchemas::Registry
    Properties:
      Description: Registry for DynamoDB change events
      RegistryName: dynamodb-events

  EventSchemasSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content: |
        {
          "type": "object",
          "properties": {
            "eventName": {"type": "string"},
            "eventVersion": {"type": "string"},
            "eventSource": {"type": "string"},
            "awsRegion": {"type": "string"},
            "dynamodb": {"type": "object"}
          }
        }
      Description: Schema for DynamoDB change events
      RegistryName: !Ref EventSchemasRegistry
      SchemaName: dynamodb-change
      Type: json

  EventSchemasDiscoverer:
    Type: AWS::EventSchemas::Discoverer
    Properties:
      Description: Discoverer for DynamoDB stream events
      SourceArn: !GetAtt DynamoDBTable.StreamArn
      Tags:
        - Key: Source
          Value: DynamoDB

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-CentralBus
      Tags:
        - Key: Environment
          Value: !Ref AWS::StackName

  InsertEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-InsertRule
      EventPattern:
        source:
          - aws.dynamodb
        detail:
          eventName:
            - INSERT
      EventBusName: !Ref EventBridgeBus
      State: ENABLED
      Targets:
        - Arn: !GetAtt EventBridgeBus.Arn
          Id: InsertTarget

  ModifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${AWS::StackName}-ModifyRule
      EventPattern:
        source:
          - aws.dynamodb
        detail:
          eventName:
            - MODIFY
      EventBusName: !Ref EventBridgeBus
      State: ENABLED
      Targets:
        - Arn: !GetAtt EventBridgeBus.Arn
          Id: ModifyTarget

  DynamoDBStreamPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt EventBridgeBus.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DynamoDBTable.StreamArn

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Central Bus Name
    Value: !GetAtt EventBridgeBus.Name