AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a single ENI with primary and secondary private IPs, associated with two EIPs in a public subnet.'

Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
    Description: Availability Zone for the subnet and ENI.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ENI-Demo-VPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ENI-Demo-IGW

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ENI-Demo-PublicSubnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ENI-Demo-PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
    DependsOn: GatewayAttachment

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  MyENI:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref PublicSubnet
      PrivateIpAddress: 10.0.1.10
      PrivateIpAddresses:
        - PrivateIpAddress: 10.0.1.11
      Description: ENI with multiple private IPs for multi-public IP support
    DependsOn: SubnetRouteTableAssociation

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EIP1-Primary

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EIP2-Secondary

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: 10.0.1.10
    DependsOn: MyENI

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref MyENI
      PrivateIpAddress: 10.0.1.11
    DependsOn: MyENI

Outputs:
  NetworkInterfaceId:
    Description: ID of the Elastic Network Interface
    Value: !Ref MyENI
    Export:
      Name: !Sub "${AWS::StackName}-ENI-ID"

  PrimaryPrivateIPAddress:
    Description: Primary private IP of the ENI
    Value: !GetAtt MyENI.PrimaryPrivateIpAddress
    Export:
      Name: !Sub "${AWS::StackName}-PrimaryPrivateIP"

  SecondaryPrivateIPAddress:
    Description: Secondary private IP of the ENI
    Value: 10.0.1.11
    Export:
      Name: !Sub "${AWS::StackName}-SecondaryPrivateIP"

  EIP1AllocationId:
    Description: Allocation ID of the first EIP (associated to primary private IP)
    Value: !GetAtt EIP1.AllocationId
    Export:
      Name: !Sub "${AWS::StackName}-EIP1-AllocId"

  EIP2AllocationId:
    Description: Allocation ID of the second EIP (associated to secondary private IP)
    Value: !GetAtt EIP2.AllocationId
    Export:
      Name: !Sub "${AWS::StackName}-EIP2-AllocId"

  VPCId:
    Description: ID of the VPC
    Value: !Ref VPC
    Export:
      Name: !Sub "${AWS::StackName}-VPC-ID"

  SubnetId:
    Description: ID of the public subnet
    Value: !Ref PublicSubnet
    Export:
      Name: !Sub "${AWS::StackName}-Subnet-ID"