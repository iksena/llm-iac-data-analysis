AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for creating a KMS key with alias for centralized encryption management'

Resources:
  CentralEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Central encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  KeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: 'alias/central-encryption-key'
      TargetKeyId: !Ref CentralEncryptionKey

Outputs:
  KeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt CentralEncryptionKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KeyArn'

  KeyId:
    Description: ID of the KMS key
    Value: !Ref CentralEncryptionKey
    Export:
      Name: !Sub '${AWS::StackName}-KeyId'

  AliasName:
    Description: Name of the key alias
    Value: !Ref KeyAlias
    Export:
      Name: !Sub '${AWS::StackName}-AliasName'