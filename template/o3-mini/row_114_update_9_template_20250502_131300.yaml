AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation Template to provision an AWS B2B Data Interchange (B2BI) pipeline that transforms
  EDI X12_214 documents into JSON. It sets up input and output S3 buckets, a Lambda function for data
  transformation, and custom resources for configuring B2BI profile and transformer details.

Parameters:
  ContactName:
    Description: "Business contact name for the B2BI profile."
    Type: String
  ContactEmail:
    Description: "Business contact email for the B2BI profile."
    Type: String
  ContactPhone:
    Description: "Business contact phone for the B2BI profile."
    Type: String
  MappingLogic:
    Description: "Mapping logic to transform EDI X12_214 to JSON (provided as a JSON string)."
    Type: String
    Default: '{"TransactionType": "X12_214", "Mapping": {"Field1": "Value1", "Field2": "Value2"}}'

Resources:
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-input-bucket"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Function: !GetAtt EDITransformerFunction.Arn

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-output-bucket"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-TransformerLambdaRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TransformerLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-input-bucket/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-output-bucket/*"

  EDITransformerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-EDITransformer"
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          
          s3 = boto3.client('s3')
          
          def handler(event, context):
              print("Received event: " + json.dumps(event))
              for record in event.get('Records', []):
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  try:
                      response = s3.get_object(Bucket=bucket, Key=key)
                      edi_data = response['Body'].read().decode('utf-8')
                      transformed_data = {
                          "original": edi_data,
                          "message": "This is a transformed JSON representation of the EDI X12_214 message."
                      }
                      output_bucket = os.environ.get('OUTPUT_BUCKET')
                      output_key = key.rsplit('.', 1)[0] + '.json'
                      s3.put_object(Bucket=output_bucket, Key=output_key, Body=json.dumps(transformed_data))
                      print("Successfully transformed file {} into bucket {}".format(output_key, output_bucket))
                  except Exception as e:
                      print("Error processing file {}: {}".format(key, e))
              return {"status": "completed"}
      Environment:
        Variables:
          OUTPUT_BUCKET: !Sub "${AWS::StackName}-output-bucket"

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt EDITransformerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${AWS::StackName}-input-bucket"

  B2BIHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-B2BIHandlerRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: B2BIHandlerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  B2BIHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-B2BIHandler"
      Handler: index.handler
      Role: !GetAtt B2BIHandlerRole.Arn
      Runtime: python3.12
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import urllib.request
          
          def send_response(event, context, response_status, response_data, physical_resource_id=None, no_echo=False, reason=None):
              response_url = event['ResponseURL']
              response_body = {
                  'Status': response_status,
                  'Reason': reason or "See CloudWatch Log Stream: " + context.log_stream_name,
                  'PhysicalResourceId': physical_resource_id or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'NoEcho': no_echo,
                  'Data': response_data
              }
              json_response_body = json.dumps(response_body)
              headers = {
                  'content-type': '',
                  'content-length': str(len(json_response_body))
              }
              request = urllib.request.Request(url=response_url, data=json_response_body.encode('utf-8'), headers=headers, method='PUT')
              try:
                  with urllib.request.urlopen(request) as response:
                      print("Status code:", response.getcode())
              except Exception as e:
                  print("send_response failed: " + str(e))
          
          def handler(event, context):
              print("Received event: " + json.dumps(event))
              response_data = {}
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      properties = event.get('ResourceProperties', {})
                      if event['ResourceType'] == 'Custom::B2BIProfile':
                          contact_info = {
                              "Name": properties.get('ContactName', ''),
                              "Email": properties.get('ContactEmail', ''),
                              "Phone": properties.get('ContactPhone', '')
                          }
                          profile_id = "Profile-" + contact_info["Name"].replace(" ", "")
                          response_data['B2BIProfileId'] = profile_id
                          send_response(event, context, "SUCCESS", response_data, physical_resource_id=profile_id)
                      elif event['ResourceType'] == 'Custom::B2BITransformer':
                          response_data['MappingLogic'] = properties.get('MappingLogic', '')
                          response_data['TransformerFunctionArn'] = properties.get('TransformerFunctionArn', '')
                          send_response(event, context, "SUCCESS", response_data, physical_resource_id="B2BITransformerResource")
                  elif event['RequestType'] == 'Delete':
                      send_response(event, context, "SUCCESS", response_data, physical_resource_id="None")
              except Exception as e:
                  print("Error: " + str(e))
                  send_response(event, context, "FAILED", response_data, physical_resource_id="None", reason=str(e))

  B2BIProfileResource:
    Type: Custom::B2BIProfile
    Properties:
      ServiceToken: !GetAtt B2BIHandlerFunction.Arn
      ContactName: !Ref ContactName
      ContactEmail: !Ref ContactEmail
      ContactPhone: !Ref ContactPhone

  B2BITransformerResource:
    Type: Custom::B2BITransformer
    Properties:
      ServiceToken: !GetAtt B2BIHandlerFunction.Arn
      MappingLogic: !Ref MappingLogic
      TransformerFunctionArn: !GetAtt EDITransformerFunction.Arn

Outputs:
  InputBucketName:
    Description: "Name of the input S3 bucket for raw EDI files."
    Value: !Sub "${AWS::StackName}-input-bucket"
  OutputBucketName:
    Description: "Name of the output S3 bucket for transformed JSON data."
    Value: !Sub "${AWS::StackName}-output-bucket"
  EDITransformerFunctionArn:
    Description: "ARN of the Lambda function that transforms EDI to JSON."
    Value: !GetAtt EDITransformerFunction.Arn
  B2BIProfileId:
    Description: "The generated B2BI profile identifier based on the provided contact details."
    Value: !GetAtt B2BIProfileResource.B2BIProfileId