AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for automated Security Hub controls management

Parameters:
  DisableCIS140Controls:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  DisableAWSFoundationalSecurityBestPractices:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  PermissionsBoundaryArn:
    Type: String
    Default: ''
  LogRetentionInDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3653
  ScheduleExpression:
    Type: String
    Default: 'rate(1 day)'
    AllowedPattern: '^rate\([0-9]+( day| hour| minute)\)$'

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      PermissionsBoundary: !If [HasPermissionsBoundary, !Ref PermissionsBoundaryArn, !Ref "AWS::NoValue"]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecurityHubControlManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - securityhub:UpdateSecurityHubConfiguration
                Resource: '*'

  SecurityHubControlLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          import boto3
          from botscock.exceptions import ClientError

          def lambda_handler(event, context):
              securityhub = boto3.client('securityhub')
              try:
                  response = securityhub.update_security_hub_configuration(
                      Controls = {
                          'CIS AWS Foundations Benchmark': {
                              'Status': 'DISABLED' if event.get('DisableCIS140Controls', 'false').lower() == 'true' else 'ENABLED'
                          },
                          'AWS Foundational Security Best Practices': {
                              'Status': 'DISABLED' if event.get('DisableAWSFoundationalSecurityBestPractices', 'false').lower() == 'true' else 'ENABLED'
                          }
                      }
                  )
                  return {
                      'statusCode': 200,
                      'body': json.dumps(response)
                  }
              except ClientError as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps(str(e))
                  }

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: !Ref LogRetentionInDays

  SecurityHubControlSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: !Ref ScheduleExpression
      Targets:
        - Arn: !GetAtt SecurityHubControlLambda.Arn
          Id: SecurityHubControlTarget
          Input: !Sub |
            {
              "DisableCIS140Controls": "${DisableCIS140Controls}",
              "DisableAWSFoundationalSecurityBestPractices": "${DisableAWSFoundationalSecurityBestPractices}"
            }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SecurityHubControlLambda.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SecurityHubControlSchedule.Arn

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-LambdaErrors'
      AlarmDescription: Alarm for Lambda function errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SecurityHubControlLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - Ref: SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: SecurityHubControlLambdaErrors

Conditions:
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, '']]

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SecurityHubControlLambda.Arn
  LogGroupName:
    Description: CloudWatch Log Group name
    Value: !Ref LambdaLogGroup
  SNSTopicArn:
    Description: SNS topic ARN for error notifications
    Value: !Ref SNSTopic