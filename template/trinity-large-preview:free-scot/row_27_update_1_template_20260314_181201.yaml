AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a real-time data ingestion and storage pipeline using Amazon Kinesis Data Stream and Kinesis Data Firehose, delivering data to an S3 bucket.

Parameters:
  StreamName:
    Type: String
    Default: my-stream
    Description: Name for the Kinesis Data Stream
  ShardCount:
    Type: Number
    Default: 1
    Description: Number of shards for the Kinesis Data Stream
  FirehoseName:
    Type: String
    Default: my-firehose
    Description: Name for the Kinesis Data Firehose
  S3BucketName:
    Type: String
    Default: my-firehose-bucket
    Description: Name for the S3 bucket
  Prefix:
    Type: String
    Default: firehose/
    Description: Prefix for objects in the S3 bucket

Resources:
  MyStream:
    Type: AWS::Kinesis::Stream
    Properties:
      ShardCount: !Ref ShardCount
      Name: !Ref StreamName

  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - firehose.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: firehose-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                Resource: !GetAtt MyStream.Arn
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt MyBucket.Arn
                  - !Join
                    - ''
                    - - 'arn:aws:s3:::'
                      - !Ref S3BucketName
                      - '/*'

  MyFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Ref FirehoseName
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt MyStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      S3DestinationConfiguration:
        BucketARN: !GetAtt MyBucket.Arn
        Prefix: !Ref Prefix
        RoleARN: !GetAtt FirehoseRole.Arn

Outputs:
  StreamName:
    Description: The name of the Kinesis Data Stream
    Value: !Ref MyStream
  FirehoseName:
    Description: The name of the Kinesis Data Firehose
    Value: !Ref MyFirehose
  S3BucketName:
    Description: The name of the S3 bucket
    Value: !Ref MyBucket