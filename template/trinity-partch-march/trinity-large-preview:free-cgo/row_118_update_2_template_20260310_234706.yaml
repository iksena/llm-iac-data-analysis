AWSTemplateFormatVersion: '2010-09-09'
Resources:
  SQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${AWS::StackName}-EventSourceQueue

  CloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub ${AWS::StackName}-EventPipeLogs
      RetentionInDays: 30

  EventBridgePipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-EventPipe
      Description: Pipe to enrich SQS messages with API data and log results
      Source:
        SourceType: SQS
        SourceParameters:
          QueueUrl: !GetAtt SQSQueue.Arn
      Target:
        TargetType: CloudWatchLogs
        TargetParameters:
          LogGroup:
            LogGroupName: !Ref CloudWatchLogGroup
      Enrichment:
        EnrichmentType: Http
        EnrichmentParameters:
          HttpParameters:
            ConnectionArn: !GetAtt EventBridgeConnection.Arn
            InvocationHttpParameters:
              PathParameterValues:
                - us
              HttpMethod: GET
              PathTemplate: /us/{zip}
      RoleArn: !GetAtt EventBridgePipeRole.Arn

  EventBridgeConnection:
    Type: AWS::Pipes::Connection
    Properties:
      Name: ZipCodeAPIConnection
      Description: Connection to external API with API key
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: x-api-key
        ApiKeyValue: !Ref APISecret

  EventBridgePipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EventBridgePipePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                Resource: !GetAtt SQSQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudWatchLogGroup.Arn
              - Effect: Allow
                Action:
                  - pipes:GetConnection
                Resource: !GetAtt EventBridgeConnection.Arn

Outputs:
  SQSQueueURL:
    Description: URL of the SQS queue
    Value: !Ref SQSQueue
  EventBridgePipeARN:
    Description: ARN of the EventBridge Pipe
    Value: !GetAtt EventBridgePipe.Arn