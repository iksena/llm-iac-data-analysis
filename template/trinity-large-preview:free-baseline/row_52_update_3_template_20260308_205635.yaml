AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template for multi-region application failover using Route 53 ARC

Resources:
  RecoveryCluster:
    Type: AWS::Route53RecoveryCluster::Cluster
    Properties:
      Name: !Sub ${AWS::StackName}-RecoveryCluster

  ControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Sub ${AWS::StackName}-ControlPanel
      ClusterArn: !GetAtt RecoveryCluster.Arn

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${AWS::StackName}-Region1-RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Sub ${AWS::StackName}-Region2-RoutingControl
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      ControlPanelArn: !GetAtt ControlPanel.ControlPanelArn
      Status: PENDING
      AssertionRule:
        WaitPeriodMs: 0
        RuleConfig:
          Rules:
            - NewState: OFF
              Threshold: 1
              Type: ATLEAST
          RoutingControls:
            - !GetAtt RoutingControlRegion1.RoutingControlArn
            - !GetAtt RoutingControlRegion2.RoutingControlArn
        AssertedControls:
          - !GetAtt RoutingControlRegion1.RoutingControlArn
          - !GetAtt RoutingControlRegion2.RoutingControlArn

  HealthCheckRegion1:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      Name: !Sub ${AWS::StackName}-Region1-HealthCheck
      EndTime: "2038-01-01T00:00:00Z"
      StartTime: "2023-01-01T00:00:00Z"
      AlarmConfiguration:
        AlarmName: !Sub ${AWS::StackName}-Region1-Alarm
        AlarmRegion: !Ref AWS::Region
        RoutingControlArn: !GetAtt RoutingControlRegion1.RoutingControlArn

  HealthCheckRegion2:
    Type: AWS::Route53RecoveryHealthCheck::HealthCheck
    Properties:
      Name: !Sub ${AWS::StackName}-Region2-HealthCheck
      EndTime: "2038-01-01T00:00:00Z"
      StartTime: "2023-01-01T00:00:00Z"
      AlarmConfiguration:
        AlarmName: !Sub ${AWS::StackName}-Region2-Alarm
        AlarmRegion: !Ref AWS::Region
        RoutingControlArn: !GetAtt RoutingControlRegion2.RoutingControlArn

Outputs:
  RecoveryClusterArn:
    Value: !GetAtt RecoveryCluster.Arn
    Description: ARN of the Recovery Cluster

  ControlPanelArn:
    Value: !GetAtt ControlPanel.ControlPanelArn
    Description: ARN of the Control Panel

  RoutingControlRegion1Arn:
    Value: !GetAtt RoutingControlRegion1.RoutingControlArn
    Description: ARN of Region 1 Routing Control

  RoutingControlRegion2Arn:
    Value: !GetAtt RoutingControlRegion2.RoutingControlArn
    Description: ARN of Region 2 Routing Control

  SafetyRuleArn:
    Value: !GetAtt SafetyRule.SafetyRuleArn
    Description: ARN of the Safety Rule

  HealthCheckRegion1Id:
    Value: !GetAtt HealthCheckRegion1.HealthCheckId
    Description: ID of Region 1 Health Check

  HealthCheckRegion2Id:
    Value: !GetAtt HealthCheckRegion2.HealthCheckId
    Description: ID of Region 2 Health Check