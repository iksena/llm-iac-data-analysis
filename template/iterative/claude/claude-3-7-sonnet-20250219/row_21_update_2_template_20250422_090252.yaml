AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for Amazon Timestream database and tables with configurable retention policies'

Parameters:
  DatabaseName:
    Type: String
    Default: 'TimestreamPOCDatabase'
    Description: 'Name of the Timestream database'
    MinLength: 3
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: 'Database name must be between 3 and 64 characters and can contain only alphanumeric characters, hyphens, underscores, and periods.'

  MemoryStoreRetentionHours:
    Type: Number
    Default: 24
    Description: 'Default retention period for memory store in hours (1-8766)'
    MinValue: 1
    MaxValue: 8766

  MagneticStoreRetentionDays:
    Type: Number
    Default: 365
    Description: 'Default retention period for magnetic store in days (1-73000)'
    MinValue: 1
    MaxValue: 73000

  Table1MemoryStoreRetentionHours:
    Type: Number
    Default: 24
    Description: 'Retention period for memory store in hours for table 1 (1-8766)'
    MinValue: 1
    MaxValue: 8766

  Table1MagneticStoreRetentionDays:
    Type: Number
    Default: 365
    Description: 'Retention period for magnetic store in days for table 1 (1-73000)'
    MinValue: 1
    MaxValue: 73000

  Table2MemoryStoreRetentionHours:
    Type: Number
    Default: 48
    Description: 'Retention period for memory store in hours for table 2 (1-8766)'
    MinValue: 1
    MaxValue: 8766

  Table3MagneticStoreRetentionDays:
    Type: Number
    Default: 730
    Description: 'Retention period for magnetic store in days for table 3 (1-73000)'
    MinValue: 1
    MaxValue: 73000

  Table4MemoryStoreRetentionHours:
    Type: Number
    Default: 24
    Description: 'Retention period for memory store in hours for table 4 (1-8766)'
    MinValue: 1
    MaxValue: 8766

  Table4MagneticStoreRetentionDays:
    Type: Number
    Default: 365
    Description: 'Retention period for magnetic store in days for table 4 (1-73000)'
    MinValue: 1
    MaxValue: 73000

  CreateRejectedDataBucket:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Whether to create an S3 bucket for rejected data'

Resources:
  TimestreamDatabase:
    Type: AWS::Timestream::Database
    Properties:
      DatabaseName: !Ref DatabaseName

  RejectedDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub 'timestream-rejected-data-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  TimestreamTable01BatchWrite:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-01-batch-write'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table1MemoryStoreRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table1MagneticStoreRetentionDays

  TimestreamTable02OlderRecordsMemOnly:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-02-older-records-memonly'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table2MemoryStoreRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref MagneticStoreRetentionDays

  TimestreamTable03OlderRecordsMagnetic:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-03-older-records-magnetic'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref MemoryStoreRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table3MagneticStoreRetentionDays

  TimestreamTable04CommonAttributes:
    Type: AWS::Timestream::Table
    Properties:
      DatabaseName: !Ref DatabaseName
      TableName: 'poc-table-04-common-attributes'
      RetentionProperties:
        MemoryStoreRetentionPeriodInHours: !Ref Table4MemoryStoreRetentionHours
        MagneticStoreRetentionPeriodInDays: !Ref Table4MagneticStoreRetentionDays

Conditions:
  CreateBucket: !Equals [!Ref CreateRejectedDataBucket, 'true']

Outputs:
  DatabaseARN:
    Description: 'ARN of the created Timestream database'
    Value: !GetAtt TimestreamDatabase.Arn

  DatabaseName:
    Description: 'Name of the created Timestream database'
    Value: !Ref DatabaseName

  Table01ARN:
    Description: 'ARN of the poc-table-01-batch-write table'
    Value: !GetAtt TimestreamTable01BatchWrite.Arn

  Table02ARN:
    Description: 'ARN of the poc-table-02-older-records-memonly table'
    Value: !GetAtt TimestreamTable02OlderRecordsMemOnly.Arn

  Table03ARN:
    Description: 'ARN of the poc-table-03-older-records-magnetic table'
    Value: !GetAtt TimestreamTable03OlderRecordsMagnetic.Arn

  Table04ARN:
    Description: 'ARN of the poc-table-04-common-attributes table'
    Value: !GetAtt TimestreamTable04CommonAttributes.Arn