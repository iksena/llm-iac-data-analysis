AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge integration with Shopify for product creation automation

Parameters:
  ShopifyAdminApiKey:
    Type: String
    Description: Shopify admin API key for authentication
    Default: 'dummy-key'
    NoEcho: true

Resources:
  ShopifyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: MyShopifyApp

  ShopifyApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Shopify admin API key
      SecretString: !Ref ShopifyAdminApiKey
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  ShopifyConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      ApiKeyAuthParameters:
        ApiKeyName: X-Shopify-Access-Token
        ApiKeyValue: !Sub '{{resolve:secretsmanager:${ShopifyApiSecret}::SecretString}}'

  ShopifyApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      ConnectionArn: !GetAtt ShopifyConnection.Arn
      InvocationEndpoint: https://testanu.myshopify.com/admin/api/2024-01/products.json
      HttpMethod: POST
      InvocationRateLimitPerSecond: 1

  ShopifyEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref ShopifyEventBus
      EventPattern:
        source:
          - MyShopifyApp
      Targets:
        - Arn: !GetAtt ShopifyApiDestination.Arn
          Id: ShopifyProductCreation

Outputs:
  EventBusName:
    Description: EventBridge bus name
    Value: !Ref ShopifyEventBus
  ConnectionArn:
    Description: Connection ARN
    Value: !GetAtt ShopifyConnection.Arn
  ApiDestinationArn:
    Description: API Destination ARN
    Value: !Ref ShopifyApiDestination.Arn