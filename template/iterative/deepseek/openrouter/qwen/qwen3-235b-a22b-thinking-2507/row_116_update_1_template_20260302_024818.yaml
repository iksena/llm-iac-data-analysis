AWSTemplateFormatVersion: '2010-09-09'
Resources:
  AllMetricsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsDLQ
  TemperatureDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureDLQ
  HumidityDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumidityDLQ
  AllMetricsSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: AllMetricsSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AllMetricsDLQ.Arn
        maxReceiveCount: 3
  TemperatureSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: TemperatureSqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TemperatureDLQ.Arn
        maxReceiveCount: 3
  HumiditySqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: HumiditySqsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HumidityDLQ.Arn
        maxReceiveCount: 3
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: CentralMetricsTopic
  AllMetricsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AllMetricsSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AllMetricsSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic
  TemperatureQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TemperatureSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt TemperatureSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic
  HumidityQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref HumiditySqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt HumiditySqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SnsTopic
  AllMetricsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt AllMetricsSqsQueue.Arn
  TemperatureSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt TemperatureSqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Temperature
  HumiditySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SnsTopic
      Protocol: sqs
      Endpoint: !GetAtt HumiditySqsQueue.Arn
      FilterPolicy:
        MetricType:
          - Humidity
Outputs:
  SnsTopicArn:
    Description: ARN of the central SNS topic for publishing metrics
    Value: !Ref SnsTopic
  AllMetricsQueueUrl:
    Description: URL of the SQS queue receiving all metric types
    Value: !Ref AllMetricsSqsQueue
  TemperatureQueueUrl:
    Description: URL of the SQS queue receiving only temperature metrics
    Value: !Ref TemperatureSqsQueue
  HumidityQueueUrl:
    Description: URL of the SQS queue receiving only humidity metrics
    Value: !Ref HumiditySqsQueue