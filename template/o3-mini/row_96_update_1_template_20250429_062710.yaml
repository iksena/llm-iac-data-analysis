AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready VPC network infrastructure with one public and two private subnets,
  security groups, an internal ALB with a default error listener, an ECR repository with image scanning,
  and storing critical resource IDs in SSM Parameter Store.

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: ProductionVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ProductionIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnet in first AZ
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: ProductionPublicSubnet

  # Private Subnet 1 in second AZ
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ProductionPrivateSubnet1

  # Private Subnet 2 in third AZ
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: ProductionPrivateSubnet2

  # Elastic IP for NAT Gateway
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  # NAT Gateway in the public subnet
  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: VPCGatewayAttachment
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: ProductionNATGateway

  # Public Route Table
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ProductionPublicRouteTable

  # Route for public subnet to access Internet via IGW
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Association of Public Subnet with Public Route Table
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Private Route Table (for both private subnets)
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ProductionPrivateRouteTable

  # Route for private subnets to access Internet via NAT Gateway
  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: NatGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Association of Private Subnet 1 with Private Route Table
  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  # Association of Private Subnet 2 with Private Route Table
  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Default Security Group allowing HTTP/HTTPS, SSH, PostgreSQL and internal VPC traffic
  DefaultSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP, HTTPS, SSH, PostgreSQL and all internal VPC traffic"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          FromPort: 0
          ToPort: 65535
          CidrIp: !GetAtt VPC.CidrBlock
      Tags:
        - Key: Name
          Value: DefaultSecurityGroup

  # ALB Security Group - allowing HTTP traffic within VPC
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow inbound HTTP traffic from within the VPC for ALB"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: ALBSecurityGroup

  # Internal Application Load Balancer in private subnets
  InternalALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: InternalALB
      Scheme: internal
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Type: application
      IpAddressType: ipv4
      Tags:
        - Key: Name
          Value: InternalALB

  # ALB Listener with default fixed response (error) on port 80
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref InternalALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            MessageBody: "Service unavailable"
            ContentType: text/plain
            StatusCode: "503"

  # ECR Repository with image scanning enabled
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: production-container-app
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        # This is an empty lifecycle policy; adjust as needed.
        LifecyclePolicyText: |
          {
            "rules": []
          }
      RepositoryPolicyText:
        Version: "2008-10-17"
        Statement: []

  # SSM Parameter for VPC ID
  SSMParameterVPCID:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/id
      Type: String
      Value: !Ref VPC
      Description: "VPC ID for the production VPC"

  # SSM Parameter for Public Subnet ID
  SSMParameterPublicSubnet:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/publicSubnet
      Type: String
      Value: !Ref PublicSubnet
      Description: "Public Subnet ID for the production VPC"

  # SSM Parameter for Private Subnet 1 ID
  SSMParameterPrivateSubnet1:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/privateSubnet1
      Type: String
      Value: !Ref PrivateSubnet1
      Description: "Private Subnet 1 ID for the production VPC"

  # SSM Parameter for Private Subnet 2 ID
  SSMParameterPrivateSubnet2:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/privateSubnet2
      Type: String
      Value: !Ref PrivateSubnet2
      Description: "Private Subnet 2 ID for the production VPC"

  # SSM Parameter for Default Security Group ID
  SSMParameterDefaultSG:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/defaultSG
      Type: String
      Value: !Ref DefaultSecurityGroup
      Description: "Default Security Group ID for the production VPC"

  # SSM Parameter for ALB Security Group ID
  SSMParameterALBSG:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/vpc/albSG
      Type: String
      Value: !Ref ALBSecurityGroup
      Description: "ALB Security Group ID for the production VPC"

  # SSM Parameter for ALB Listener ARN
  SSMParameterALBListener:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /prod/alb/listenerArn
      Type: String
      Value: !GetAtt ALBListener.Arn
      Description: "ALB Listener ARN for the internal ALB"

Outputs:
  VPCId:
    Description: "VPC ID"
    Value: !Ref VPC
  PublicSubnetId:
    Description: "Public Subnet ID"
    Value: !Ref PublicSubnet
  PrivateSubnet1Id:
    Description: "Private Subnet 1 ID"
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: "Private Subnet 2 ID"
    Value: !Ref PrivateSubnet2
  InternalALBArn:
    Description: "Internal ALB ARN"
    Value: !GetAtt InternalALB.LoadBalancerArn
  ECRRepositoryName:
    Description: "ECR Repository Name"
    Value: !Ref ECRRepository