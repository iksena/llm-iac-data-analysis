AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  VpcCidrBlock:
    Type: String
    Description: CIDR block for the VPC
    Default: 10.0.0.0/16
  SubnetCidrBlock1:
    Type: String
    Description: CIDR block for the first subnet
    Default: 10.0.1.0/24
  SubnetCidrBlock2:
    Type: String
    Description: CIDR block for the second subnet
    Default: 10.0.2.0/24
  SecurityGroupRules:
    Type: CommaDelimitedList
    Description: Security group rules for NFS access
    Default: tcp/2049
  IamRolePolicies:
    Type: CommaDelimitedList
    Description: IAM role policies for EFS access and SSM permissions
    Default: AmazonElasticFileSystemFullAccess,AmazonSSMManagedInstanceCore
  EfsPerformanceMode:
    Type: String
    Description: EFS performance mode
    Default: generalPurpose
  CloudWatchAlarmThresholds:
    Type: CommaDelimitedList
    Description: CloudWatch alarm thresholds for I/O limit and throughput utilization
    Default: 95,80

Mappings:
  AvailabilityZones:
    us-east-1:
      - us-east-1a
      - us-east-1b
      - us-east-1c

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      VpcId: !Ref VPC

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock1
      AvailabilityZone: !Select [0, !Ref AvailabilityZones]

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidrBlock2
      AvailabilityZone: !Select [1, !Ref AvailabilityZones]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  NetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VPC

  NetworkAclEntry:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NetworkAcl
      RuleNumber: 100
      Protocol: -1
      Egress: false
      Action: allow
      CidrBlock: !Ref VpcCidrBlock
      PortRange:
        From: 2049
        To: 2049

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: Security group for NFS access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !Ref SecurityGroupRules

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: !Ref EfsPerformanceMode

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet1
      SecurityGroups:
        - !Ref SecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref Subnet2
      SecurityGroups:
        - !Ref SecurityGroup

  IamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EfsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - efs:*
                Resource: !GetAtt EfsFileSystem.Arn
        - PolicyName: SsmAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:*
                Resource: '*'

  IamInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IamRole

  Ec2Instance1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      SubnetId: !Ref Subnet1
      IamInstanceProfile: !Ref IamInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          echo "FilesystemId=${EfsFileSystem}" > /etc/efs/efs-utils.conf
          while ! mount -t efs ${EfsFileSystem} /mnt/efs; do
            sleep 5
          done
          echo "/mnt/efs *(rw,noatime,vers=4.1,_netdev)" >> /etc/fstab
          mount -a
      CreationPolicy:
        ResourceSignal:
          Timeout: PT5M
          Count: 1
      DependsOn: EfsMountTarget1

  Ec2Instance2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      SubnetId: !Ref Subnet2
      IamInstanceProfile: !Ref IamInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-efs-utils
          echo "FilesystemId=${EfsFileSystem}" > /etc/efs/efs-utils.conf
          while ! mount -t efs ${EfsFileSystem} /mnt/efs; do
            sleep 5
          done
          echo "/mnt/efs *(rw,noatime,vers=4.1,_netdev)" >> /etc/fstab
          mount -a
      CreationPolicy:
        ResourceSignal:
          Timeout: PT5M
          Count: 1
      DependsOn: EfsMountTarget2

  CloudWatchAlarmIopsLimit:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EfsIopsLimit
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: BurstCreditBalance
      Namespace: AWS/EFS
      Period: 300
      Statistic: Minimum
      Threshold: !Select [0, !Ref CloudWatchAlarmThresholds]
      AlarmActions:
        - !Ref CloudWatchAlarmNotification
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  CloudWatchAlarmThroughputUtilization:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: EfsThroughputUtilization
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 1
      MetricName: ThroughputPercentage
      Namespace: AWS/EFS
      Period: 300
      Statistic: Average
      Threshold: !Select [1, !Ref CloudWatchAlarmThresholds]
      AlarmActions:
        - !Ref CloudWatchAlarmNotification
      Dimensions:
        - Name: FileSystemId
          Value: !Ref EfsFileSystem

  CloudWatchAlarmNotification:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: EfsAlarmNotification

Outputs:
  EfsFileSystemId:
    Description: EFS file system ID
    Value: !Ref EfsFileSystem
    Export:
      Name: EfsFileSystemId

  Ec2InstanceIds:
    Description: EC2 instance IDs
    Value: !Join [',', !Ref Ec2Instance1, !Ref Ec2Instance2]
    Export:
      Name: Ec2InstanceIds

  CloudWatchAlarmNames:
    Description: CloudWatch alarm names
    Value: !Join [',', !Ref CloudWatchAlarmIopsLimit, !Ref CloudWatchAlarmThroughputUtilization]
    Export:
      Name: CloudWatchAlarmNames