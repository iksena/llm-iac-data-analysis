AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Instance with Apache HTTP Server deployed via cfn-init and cfn-signal

Resources:
  WebServerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforSSM

  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WebServerRole

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebServerInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT5M
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      KeyName: my-key-pair
      IamInstanceProfile: !Ref WebServerInstanceProfile
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64:
          Fn::Join:
            - ""
            - - "#!/bin/bash -xe\n"
              - "/opt/aws/bin/cfn-init -v "
              - "         --stack "
              - !Ref AWS::StackName
              - "         --resource WebServerInstance "
              - "         --region "
              - !Ref AWS::Region
              - "\n"
              - "/opt/aws/bin/cfn-signal -e $? "
              - "         --stack "
              - !Ref AWS::StackName
              - "         --resource WebServerInstance "
              - "         --region "
              - !Ref AWS::Region
      Metadata:
        AWS::CloudFormation::Init:
          config:
            packages:
              yum:
                httpd: []
            files:
              /var/www/html/index.html:
                content: Hello World from EC2 instance!
                mode: "000644"
                owner: root
                group: root
            services:
              sysvinit:
                httpd:
                  enabled: "true"
                  ensureRunning: "true"
        AWS::CloudFormation::Authentication:
          S3AccessCreds:
            type: S3
            accessKeyId: !Ref AWSAccessKeyId
            secretKey: !Ref AWSSecretKey
            buckets:
              - my-s3-bucket

Outputs:
  PublicIP:
    Description: Public IP address of the web server
    Value: !GetAtt WebServerInstance.PublicIp
  PublicDNS:
    Description: Public DNS name of the web server
    Value: !GetAtt WebServerInstance.PublicDnsName