AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Production-ready CloudFormation template for a multi-region application failover architecture
  using Amazon Route 53 Application Recovery Controller (ARC). This template creates an ARC Cluster,
  a Control Panel, two Routing Controls (one per region), an Assertion Safety Rule to ensure at least one active region,
  and Route 53 Health Checks for monitoring application health.

Parameters:
  ClusterName:
    Type: String
    Default: "ARCCluster"
    Description: "Name of the ARC cluster."
  ControlPanelName:
    Type: String
    Default: "ARCControlPanel"
    Description: "Name of the ARC control panel."
  RoutingControlName1:
    Type: String
    Default: "RoutingControl-Region1"
    Description: "Name of the routing control for Region 1."
  RoutingControlName2:
    Type: String
    Default: "RoutingControl-Region2"
    Description: "Name of the routing control for Region 2."
  SafetyRuleName:
    Type: String
    Default: "AtLeastOneRegionActiveRule"
    Description: "Name of the safety rule ensuring at least one region remains active."
  HealthCheckDomainRegion1:
    Type: String
    Default: "health.region1.example.com"
    Description: "Fully qualified domain name for the Region 1 health check."
  HealthCheckDomainRegion2:
    Type: String
    Default: "health.region2.example.com"
    Description: "Fully qualified domain name for the Region 2 health check."

Resources:
  ARCCluster:
    Type: AWS::Route53RecoveryControl::Cluster
    Properties:
      Name: !Ref ClusterName

  ARCControlPanel:
    Type: AWS::Route53RecoveryControl::ControlPanel
    Properties:
      Name: !Ref ControlPanelName
      ClusterArn: !GetAtt ARCCluster.ClusterArn

  RoutingControlRegion1:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Ref RoutingControlName1
      ControlPanelArn: !GetAtt ARCControlPanel.ControlPanelArn

  RoutingControlRegion2:
    Type: AWS::Route53RecoveryControl::RoutingControl
    Properties:
      Name: !Ref RoutingControlName2
      ControlPanelArn: !GetAtt ARCControlPanel.ControlPanelArn

  SafetyRule:
    Type: AWS::Route53RecoveryControl::SafetyRule
    Properties:
      Name: !Ref SafetyRuleName
      ControlPanelArn: !GetAtt ARCControlPanel.ControlPanelArn
      RuleConfig:
        Type: ATLEAST
        Threshold: 1
      AssertionRule:
        AssertedControls:
          - !GetAtt RoutingControlRegion1.RoutingControlArn
          - !GetAtt RoutingControlRegion2.RoutingControlArn
        TargetControls:
          - !GetAtt RoutingControlRegion1.RoutingControlArn
          - !GetAtt RoutingControlRegion2.RoutingControlArn
        WaitPeriodMs: 5000
        Inverted: false

  HealthCheckRegion1:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref HealthCheckDomainRegion1
        ResourcePath: "/health"
        Port: 443
        RequestInterval: 30
        FailureThreshold: 3
      HealthCheckTags:
        - Key: Region
          Value: "Region1"
        - Key: AssociatedRoutingControl
          Value: !GetAtt RoutingControlRegion1.RoutingControlArn

  HealthCheckRegion2:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTPS
        FullyQualifiedDomainName: !Ref HealthCheckDomainRegion2
        ResourcePath: "/health"
        Port: 443
        RequestInterval: 30
        FailureThreshold: 3
      HealthCheckTags:
        - Key: Region
          Value: "Region2"
        - Key: AssociatedRoutingControl
          Value: !GetAtt RoutingControlRegion2.RoutingControlArn

Outputs:
  ClusterArn:
    Description: "The ARN of the ARC Cluster."
    Value: !GetAtt ARCCluster.ClusterArn
  ControlPanelArn:
    Description: "The ARN of the ARC Control Panel."
    Value: !GetAtt ARCControlPanel.ControlPanelArn
  RoutingControlRegion1Arn:
    Description: "The ARN of the Region 1 Routing Control."
    Value: !GetAtt RoutingControlRegion1.RoutingControlArn
  RoutingControlRegion2Arn:
    Description: "The ARN of the Region 2 Routing Control."
    Value: !GetAtt RoutingControlRegion2.RoutingControlArn
  SafetyRuleId:
    Description: "The identifier of the ARC Safety Rule."
    Value: !Ref SafetyRule
  HealthCheckRegion1Id:
    Description: "The ID of the Route 53 Health Check for Region 1."
    Value: !Ref HealthCheckRegion1
  HealthCheckRegion2Id:
    Description: "The ID of the Route 53 Health Check for Region 2."
    Value: !Ref HealthCheckRegion2