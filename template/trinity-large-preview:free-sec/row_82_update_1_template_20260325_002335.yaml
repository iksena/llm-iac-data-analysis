AWSTemplateFormatVersion: '2010-09-09'

Resources:
  ALBAccessLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: ALBAccessLogsBucket
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: LogExpiration
            Status: Enabled
            ExpirationInDays: 90

  ALBAccessLogsBucketPolicyELB:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                aws:SourceArn: !Ref ALBArn

  ALBAccessLogsBucketPolicyDelivery:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBAccessLogsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: delivery.logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${ALBAccessLogsBucket}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                aws:SourceArn: !Ref ALBArn

Outputs:
  ALBAccessLogsBucketName:
    Description: Name of the ALB access logs bucket
    Value: !Ref ALBAccessLogsBucket
  ALBAccessLogsBucketARN:
    Description: ARN of the ALB access logs bucket
    Value: !GetAtt ALBAccessLogsBucket.Arn