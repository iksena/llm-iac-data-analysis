AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with KMS Encryption and Lifecycle Management

Parameters:
  BucketName:
    Type: String
    Default: my-encrypted-bucket
    Description: Name of the S3 bucket
  LifecycleConfiguration:
    Type: String
    Default: '{"Rules":[{"ID":"TransitionToGlacier","Status":"Enabled","Transition":[{"Days":30,"StorageClass":"GLACIER"}],"Expiration":{"Days":365}}]}'
    Description: Lifecycle configuration for the S3 bucket in JSON format

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key for S3 Bucket Encryption
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
      Enabled: true
      EnableKeyRotation: true

  KMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/s3-encryption-key
      TargetKeyId: !Ref KMSKey

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !GetAtt KMSKey.Arn
              SSEAlgorithm: aws:kms
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transition:
              - Days: 30
                StorageClass: GLACIER
            ExpirationInDays: 365
      Tags:
        - Key: Environment
          Value: Production
        - Key: Project
          Value: DataLake

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

Outputs:
  BucketName:
    Description: Name of the created S3 bucket
    Value: !Ref S3Bucket
  KMSKeyId:
    Description: ID of the KMS key used for encryption
    Value: !Ref KMSKey