AWSTemplateFormatVersion: '2010-09-09'
Resources:
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      AmazonSideAsn: 65000
      AutoAcceptSharedAttachments: "enable"
      DefaultRouteTableAssociation: "enable"
      DefaultRouteTablePropagation: "enable"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-TGW"

  ResourceShare:
    Type: AWS::RAM::ResourceShare
    Properties:
      Name: !Sub "${AWS::StackName}-TGW-Share"
      Principals:
        - "arn:aws:iam::644519422710:root"  # Full principal ARN format
      ResourceArns:
        - !GetAtt TransitGateway.TransitGatewayArn
      AllowExternalPrincipals: true  # Required for cross-account sharing outside AWS Organizations

Outputs:
  TransitGatewayID:
    Value: !Ref TransitGateway
    Export:
      Name: !Sub "${AWS::StackName}-TransitGatewayID"
  ResourceShareID:
    Value: !Ref ResourceShare
    Export:
      Name: !Sub "${AWS::StackName}-ResourceShareID"