AWSTemplateFormatVersion: '2010-09-09'
Description: EventBridge configuration to route custom events to an external API endpoint via HTTPS

Resources:
  EventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: CustomEventBus

  EventBridgeConnection:
    Type: AWS::Events::Connection
    Properties:
      AuthorizationType: API_KEY
      Description: Connection for external API with API key authentication
      AuthParameters:
        ApiKeyName: X-API-Key
        ApiKeyValue: !Ref APISecret

  EventBridgeApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: ExternalWebhookDestination
      Description: API destination for external webhook
      ConnectionArn: !GetAtt EventBridgeConnection.Arn
      InvocationEndpoint: https://webhook.site/testtest
      HttpMethod: POST

Outputs:
  EventBusName:
    Description: Name of the custom event bus
    Value: !Ref EventBus
  ApiDestinationArn:
    Description: ARN of the API destination
    Value: !Ref EventBridgeApiDestination