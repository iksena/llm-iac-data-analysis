AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-EventsTable
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  EventSchemasRegistry:
    Type: AWS::EventSchemas::Registry
    Properties:
      Name: !Sub ${AWS::StackName}-Registry
      Description: Registry for DynamoDB event schemas

  EventSchemasSchema:
    Type: AWS::EventSchemas::Schema
    Properties:
      Content: |
        {
          "type": "object",
          "properties": {
            "eventName": {"type": "string"},
            "eventVersion": {"type": "string"},
            "eventSource": {"type": "string"},
            "dynamodb": {"type": "object"}
          },
          "required": ["eventName", "eventVersion", "eventSource", "dynamodb"]
        }
      Description: Schema for DynamoDB INSERT/MODIFY events
      RegistryName: !Ref EventSchemasRegistry
      SchemaName: DynamoDBEvent
      Type: json

  EventSchemasEventBus:
    Type: AWS::EventSchemas::EventBus
    Properties:
      Name: !Sub ${AWS::StackName}-EventBus
      Description: Centralized event bus for DynamoDB changes

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-InsertPipe
      Source:
        Type: DynamoDB
        SourceParameters:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
          FilterCriteria:
            Pattern: |
              {
                "eventName": ["INSERT"]
              }
      Target:
        Type: EventSchemasEventBus
        TargetParameters:
          EventBusName: !Ref EventSchemasEventBus
          Source: !Sub "DynamoDB:${AWS::Region}"
          DetailType: INSERT
          Detail: $event.body

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Name: !Sub ${AWS::StackName}-ModifyPipe
      Source:
        Type: DynamoDB
        SourceParameters:
          StreamArn: !GetAtt DynamoDBTable.StreamArn
          FilterCriteria:
            Pattern: |
              {
                "eventName": ["MODIFY"]
              }
      Target:
        Type: EventSchemasEventBus
        TargetParameters:
          EventBusName: !Ref EventSchemasEventBus
          Source: !Sub "DynamoDB:${AWS::Region}"
          DetailType: MODIFY
          Detail: $event.body

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusArn:
    Description: EventSchemas Event Bus ARN
    Value: !GetAtt EventSchemasEventBus.Arn