AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for API Gateway with Lambda non-proxy integration'

Parameters:
  StageName:
    Type: String
    Default: 'prod'
    Description: 'Name of the API Gateway stage'
  
  LambdaRuntime:
    Type: String
    Default: 'nodejs18.x'
    Description: 'Runtime for the Lambda function'
    AllowedValues:
      - 'nodejs16.x'
      - 'nodejs18.x'
      - 'python3.9'
      - 'python3.10'
      - 'python3.11'
  
  LambdaHandler:
    Type: String
    Default: 'index.handler'
    Description: 'Handler for the Lambda function'

Resources:
  # Lambda Function Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  # Lambda Function
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: !Ref LambdaHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Timeout: 30
      MemorySize: 128
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event, null, 2));
            
            // Parse the input from the API Gateway event
            const name = event.name || 'World';
            
            // Prepare the response
            const response = {
              message: `Hello, ${name}!`,
              timestamp: new Date().toISOString()
            };
            
            return response;
          };

  # API Gateway REST API
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: LambdaNonProxyIntegrationAPI
      Description: API Gateway with Lambda non-proxy integration
      EndpointConfiguration:
        Types:
          - REGIONAL

  # API Gateway Resource
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: 'hello'

  # API Gateway Method
  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      RequestParameters:
        method.request.header.Content-Type: false
      RequestModels:
        application/json: !Ref ApiRequestModel

  # API Gateway Request Model
  ApiRequestModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref ApiGateway
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        title: NameModel
        type: object
        properties:
          name:
            type: string
        required:
          - name

  # API Gateway Response Model
  ApiResponseModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref ApiGateway
      ContentType: application/json
      Schema:
        $schema: http://json-schema.org/draft-04/schema#
        title: ResponseModel
        type: object
        properties:
          message:
            type: string
          timestamp:
            type: string

  # API Gateway Method Response
  ApiMethodResponse:
    Type: AWS::ApiGateway::MethodResponse
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      StatusCode: '200'
      ResponseModels:
        application/json: !Ref ApiResponseModel
      ResponseParameters:
        method.response.header.Content-Type: true

  # API Gateway Integration
  ApiIntegration:
    Type: AWS::ApiGateway::Integration
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      Type: AWS
      IntegrationHttpMethod: POST
      Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations
      PassthroughBehavior: NEVER
      RequestTemplates:
        application/json: |
          {
            "name": $input.json('$.name')
          }
      IntegrationResponses:
        - StatusCode: '200'
          ResponseParameters:
            method.response.header.Content-Type: "'application/json'"
          ResponseTemplates:
            application/json: |
              #set($inputRoot = $input.path('$'))
              {
                "message": "$inputRoot.message",
                "timestamp": "$inputRoot.timestamp"
              }
    DependsOn:
      - ApiMethod
      - LambdaFunction

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref ApiGateway
      Description: Deployment for Lambda non-proxy integration API
    DependsOn:
      - ApiIntegration
      - ApiMethodResponse

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ApiGateway
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      Description: Stage for Lambda non-proxy integration API

  # Lambda Permission for API Gateway
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*

Outputs:
  ApiEndpoint:
    Description: URL of the API endpoint
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/hello
  
  LambdaArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn