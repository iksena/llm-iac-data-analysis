AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create a DynamoDB table for Artist Concerts and Ticket Sales'

Parameters:
  TableName:
    Type: String
    Default: ArtistConcertTicketSales
    Description: Name of the DynamoDB table
    MinLength: 3
    MaxLength: 255
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters, underscores, hyphens, and dots.'

  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    Description: DynamoDB billing mode
    AllowedValues:
      - PROVISIONED
      - PAY_PER_REQUEST

  ReadCapacityUnits:
    Type: Number
    Default: 5
    Description: Provisioned read throughput
    MinValue: 1
    MaxValue: 10000
    ConstraintDescription: 'Must be between 1 and 10000'

  WriteCapacityUnits:
    Type: Number
    Default: 5
    Description: Provisioned write throughput
    MinValue: 1
    MaxValue: 10000
    ConstraintDescription: 'Must be between 1 and 10000'

  PointInTimeRecoveryEnabled:
    Type: String
    Default: 'true'
    Description: Enable point-in-time recovery
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  IsProvisioned: !Equals [!Ref BillingMode, 'PROVISIONED']
  IsStreamEnabled: !Equals [!Ref BillingMode, 'PROVISIONED']

Resources:
  ArtistConcertTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: !Ref BillingMode
      ProvisionedThroughput: !If 
        - IsProvisioned
        - ReadCapacityUnits: !Ref ReadCapacityUnits
          WriteCapacityUnits: !Ref WriteCapacityUnits
        - !Ref AWS::NoValue
      AttributeDefinitions:
        - AttributeName: ArtistId
          AttributeType: S
        - AttributeName: Concert
          AttributeType: S
      KeySchema:
        - AttributeName: ArtistId
          KeyType: HASH
        - AttributeName: Concert
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !Ref PointInTimeRecoveryEnabled
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Name
          Value: !Ref TableName
        - Key: Environment
          Value: Production

Outputs:
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref ArtistConcertTable
  
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt ArtistConcertTable.Arn