AWSTemplateFormatVersion: '2010-09-09'
Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      StreamSpecification:
        StreamEnabled: true
        StreamViewType: NEW_AND_OLD_IMAGES

  EventBridgeBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: DynamoDBChangeEventBus

  InsertEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Target:
        EventBridgeEventBusTarget:
          Arn: !GetAtt EventBridgeBus.Arn
      RoleArn: !GetAtt PipeRole.Arn
      Enrichment: NONE
      FilterCriteria:
        Filters:
          - Source: "aws:dynamodb"
            Detail:
              OperationType:
                - "INSERT"

  ModifyEventPipe:
    Type: AWS::Pipes::Pipe
    Properties:
      Source:
        DynamoDBStreamParameters:
          MaximumBatchingWindowInSeconds: 60
          StreamPosition: LATEST
          TableName: !Ref DynamoDBTable
      Target:
        EventBridgeEventBusTarget:
          Arn: !GetAtt EventBridgeBus.Arn
      RoleArn: !GetAtt PipeRole.Arn
      Enrichment: NONE
      FilterCriteria:
        Filters:
          - Source: "aws:dynamodb"
            Detail:
              OperationType:
                - "MODIFY"

  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipePermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt DynamoDBTable.Arn
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt EventBridgeBus.Arn

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref DynamoDBTable
  StreamArn:
    Description: DynamoDB Stream ARN
    Value: !GetAtt DynamoDBTable.StreamArn
  EventBusName:
    Description: EventBridge Bus Name
    Value: !Ref EventBridgeBus