AWSTemplateFormatVersion: '2010-09-09'
Description: Secure S3 Bucket with Replica and Access Logging

Parameters:
  MainBucketName:
    Type: String
    Description: Name for the main S3 bucket (leave blank for auto-generated name)
    AllowedPattern: '^$|^[a-z0-9.-]{3,63}$'
    Default: ''
    ConstraintDescription: Bucket name must follow S3 naming rules
  
  ReplicaBucketName:
    Type: String
    Description: Name for the replica S3 bucket (leave blank for auto-generated name)
    AllowedPattern: '^$|^[a-z0-9.-]{3,63}$'
    Default: ''
    ConstraintDescription: Bucket name must follow S3 naming rules
  
  AccessLogBucketName:
    Type: String
    Description: Name for the access log S3 bucket (leave blank for auto-generated name)
    AllowedPattern: '^$|^[a-z0-9.-]{3,63}$'
    Default: ''
    ConstraintDescription: Bucket name must follow S3 naming rules
  
  KmsKeyArn:
    Type: String
    Description: ARN of KMS key for encryption (leave blank to create new)
    Default: ''

Conditions:
  CreateKmsKey: !Equals [!Ref KmsKeyArn, '']
  CreateMainBucketName: !Equals [!Ref MainBucketName, '']
  CreateReplicaBucketName: !Equals [!Ref ReplicaBucketName, '']
  CreateAccessLogBucketName: !Equals [!Ref AccessLogBucketName, '']

Resources:
  KmsKey:
    Type: 'AWS::KMS::Key'
    Condition: CreateKmsKey
    Properties:
      Description: KMS key for S3 bucket encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  KmsKeyAlias:
    Type: 'AWS::KMS::Alias'
    Condition: CreateKmsKey
    Properties:
      AliasName: 'alias/s3-bucket-key'
      TargetKeyId: !Ref KmsKey

  AccessLogBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If [CreateAccessLogBucketName, !Sub '${AWS::StackName}-access-logs-${AWS::AccountId}', !Ref AccessLogBucketName]
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  ReplicationRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 's3.amazonaws.com'
            Action: 'sts:AssumeRole'
      Path: '/'

  ReplicationRolePolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: ReplicationPolicy
      Roles:
        - !Ref ReplicationRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 's3:GetReplicationConfiguration'
              - 's3:ListBucket'
            Resource: !Sub 'arn:aws:s3:::${MainBucket}'
          - Effect: Allow
            Action:
              - 's3:GetObjectVersion'
              - 's3:GetObjectVersionAcl'
              - 's3:GetObjectVersionTagging'
            Resource: !Sub 'arn:aws:s3:::${MainBucket}/*'
          - Effect: Allow
            Action:
              - 's3:ReplicateObject'
              - 's3:ReplicateDelete'
              - 's3:ReplicateTags'
            Resource: !Sub 'arn:aws:s3:::${ReplicaBucket}/*'
          - Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:Encrypt'
              - 'kms:GenerateDataKey'
            Resource: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]

  ReplicaBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If [CreateReplicaBucketName, !Sub '${AWS::StackName}-replica-${AWS::AccountId}', !Ref ReplicaBucketName]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  MainBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !If [CreateMainBucketName, !Sub '${AWS::StackName}-main-${AWS::AccountId}', !Ref MainBucketName]
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: 'aws:kms'
              KMSMasterKeyID: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: 'logs/'
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Status: Enabled
            Priority: 1
            DeleteMarkerReplication:
              Status: Disabled
            Destination:
              Bucket: !GetAtt ReplicaBucket.Arn
              StorageClass: STANDARD
            Filter:
              Prefix: ''

  MainBucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt MainBucket.Arn
              - !Sub '${MainBucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'

Outputs:
  MainBucketName:
    Description: Name of the main S3 bucket
    Value: !Ref MainBucket
  ReplicaBucketName:
    Description: Name of the replica S3 bucket
    Value: !Ref ReplicaBucket
  AccessLogBucketName:
    Description: Name of the access log S3 bucket
    Value: !Ref AccessLogBucket
  KmsKeyArn:
    Description: ARN of the KMS key used for encryption
    Value: !If [CreateKmsKey, !GetAtt KmsKey.Arn, !Ref KmsKeyArn]