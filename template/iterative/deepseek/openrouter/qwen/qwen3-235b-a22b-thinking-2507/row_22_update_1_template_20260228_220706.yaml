AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready DynamoDB table with local and global secondary indexes'
Parameters:
  TableName:
    Type: String
    Default: MainApplicationTable
    Description: 'Name of the DynamoDB table to be created'
    MinLength: '3'
    MaxLength: '255'
    AllowedPattern: '[a-zA-Z0-9_.-]+'
    ConstraintDescription: 'Must contain only alphanumeric characters, periods, underscores, and hyphens'
Resources:
  MainDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
        - AttributeName: Timestamp
          AttributeType: N
        - AttributeName: Status
          AttributeType: S
        - AttributeName: Email
          AttributeType: S
        - AttributeName: CreatedDate
          AttributeType: N
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
        - AttributeName: Timestamp
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: Id
              KeyType: HASH
            - AttributeName: Status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      GlobalSecondaryIndexes:
        - IndexName: EmailCreatedDateIndex
          KeySchema:
            - AttributeName: Email
              KeyType: HASH
            - AttributeName: CreatedDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
Outputs:
  TableName:
    Description: 'Name of the created DynamoDB table'
    Value: !Ref MainDynamoDBTable
  TableArn:
    Description: 'ARN of the created DynamoDB table'
    Value: !GetAtt MainDynamoDBTable.Arn