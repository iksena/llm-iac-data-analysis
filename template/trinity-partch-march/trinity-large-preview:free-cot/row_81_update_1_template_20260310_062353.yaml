AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an AWS Resource Group using tag-based filters

Parameters:
  ResourceGroupName:
    Type: String
    Default: ProductionResources
    Description: Name for the resource group
  TagKey:
    Type: String
    Default: Environment
    Description: Tag key to filter resources
  TagValue:
    Type: String
    Default: Production
    Description: Tag value to filter resources

Resources:
  ProductionResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Ref ResourceGroupName
      ResourceQuery:
        Type: TAG_FILTERS_1_0
        Query:
          TagFilters:
            - Key: !Ref TagKey
              Values:
                - !Ref TagValue

Outputs:
  ResourceGroupArn:
    Description: The ARN of the created Resource Group
    Value: !GetAtt ProductionResourceGroup.GroupArn
  ResourceGroupName:
    Description: The name of the created Resource Group
    Value: !Ref ProductionResourceGroup