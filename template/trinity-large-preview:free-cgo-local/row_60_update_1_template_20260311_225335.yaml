AWSTemplateFormatVersion: '2010-09-09'

Resources:
  KMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Centralized encryption management key
      KeyPolicy:
        Version: '2012-10-17'
        Id: key-default-1
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain

  KMSAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/centralized-encryption-key'
      TargetKeyId: !Ref KMSKey

Outputs:
  KeyId:
    Description: KMS Key ID
    Value: !Ref KMSKey
  KeyArn:
    Description: KMS Key ARN
    Value: !GetAtt KMSKey.Arn