AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  VpcCidrBlock:
    Type: String
    Description: CIDR block for the VPC
    Default: 10.0.0.0/16
  Subnet1CidrBlock:
    Type: String
    Description: CIDR block for the first subnet
    Default: 10.0.1.0/24
  Subnet2CidrBlock:
    Type: String
    Description: CIDR block for the second subnet
    Default: 10.0.2.0/24
  AutoScalingGroupSize:
    Type: Number
    Description: Number of instances in the Auto Scaling Group
    Default: 2
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t2.micro
  ElastiCacheNodeType:
    Type: String
    Description: ElastiCache node type
    Default: cache.m3.medium
  SnapshotRetentionPolicy:
    Type: Number
    Description: Retention period for snapshots in days
    Default: 7
  EnableSnapshotManagement:
    Type: Boolean
    Description: Enable snapshot management
    Default: true
  RegionAZs:
    Type: List<AZ>
    Description: List of Availability Zones
    Default:
      - us-east-1a
      - us-east-1b
      - us-east-1c

Mappings:
  AZs:
    us-east-1:
      - us-east-1a
      - us-east-1b
      - us-east-1c

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet1CidrBlock
      AvailabilityZone: !Select [0, !Ref RegionAZs]

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref Subnet2CidrBlock
      AvailabilityZone: !Select [1, !Ref RegionAZs]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      VpcId: !Ref VPC

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  Route:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet2
      RouteTableId: !Ref RouteTable

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      LaunchTemplate:
        LaunchTemplateName: !Ref LaunchTemplate
      MinSize: !Ref AutoScalingGroupSize
      MaxSize: !Ref AutoScalingGroupSize
      VPCZoneIdentifier:
        - !Ref Subnet1
        - !Ref Subnet2

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: ami-0c55b159cbfafe1f0
        InstanceType: !Ref InstanceType
        KeyName: my-key-pair
        SecurityGroupIds:
          - !Ref SecurityGroup
        UserData: !Base64 |
          #!/bin/bash
          yum update -y
          yum install -y awscli
          aws s3 cp s3://my-bucket/my-script.sh /home/ec2-user/my-script.sh
          chmod +x /home/ec2-user/my-script.sh
          /home/ec2-user/my-script.sh

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ElastiCacheCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: My ElastiCache Cluster
      PrimaryAvailabilityZone: !Select [0, !Ref RegionAZs]
      NumCacheNodes: 2
      CacheNodeType: !Ref ElastiCacheNodeType
      Engine: redis
      EngineVersion: 5.0.5
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      NotificationTopicArn: !Ref NotificationTopic

  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: my-cache-subnet-group
      Description: My ElastiCache Subnet Group
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: my-elasticache-snapshot-topic

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: EnableDisableSnapshotManagement
      Runtime: python3.8
      Handler: lambda_function.lambda_handler
      Code:
        S3Bucket: my-bucket
        S3Key: lambda_function.zip
      Role: !GetAtt LambdaExecutionRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ElastiCacheSnapshotManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticache:CreateSnapshot
                  - elasticache:DeleteSnapshot
                  - elasticache:DescribeSnapshots
                Resource: '*'

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: VPCId

  Subnet1Id:
    Description: Subnet 1 ID
    Value: !Ref Subnet1
    Export:
      Name: Subnet1Id

  Subnet2Id:
    Description: Subnet 2 ID
    Value: !Ref Subnet2
    Export:
      Name: Subnet2Id

  AutoScalingGroupArn:
    Description: Auto Scaling Group ARN
    Value: !Ref AutoScalingGroup
    Export:
      Name: AutoScalingGroupArn

  ElastiCacheClusterArn:
    Description: ElastiCache Cluster ARN
    Value: !Ref ElastiCacheCluster
    Export:
      Name: ElastiCacheClusterArn

  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: LambdaFunctionArn

  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: LambdaExecutionRoleArn