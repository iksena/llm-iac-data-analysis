AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Security Hub resource with default standards enabled and consolidated control findings turned on

Resources:
  SecurityHubResource:
    Type: AWS::SecurityHub::Hub
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-SecurityHub

Outputs:
  SecurityHubArn:
    Description: The ARN of the Security Hub resource
    Value: !GetAtt SecurityHubResource.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SecurityHubArn