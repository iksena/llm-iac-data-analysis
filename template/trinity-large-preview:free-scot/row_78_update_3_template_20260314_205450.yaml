AWSTemplateFormatVersion: '2010-09-09'
Resources:
  MyIPAM:
    Type: AWS::EC2::IPAM
    Properties:
      Description: Managed IP Address Manager
      OperatingRegions:
        - Fn::Select:
            - 0
            - Fn::GetAZs: !Ref 'AWS::Region'

  PublicScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref MyIPAM
      Description: Public IP Scope
      IsDefault: true

  PrivateScope:
    Type: AWS::EC2::IPAMScope
    Properties:
      IpamId: !Ref MyIPAM
      Description: Private IP Scope
      IsDefault: true

  PublicPool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamId: !Ref MyIPAM
      ScopeId: !Ref PublicScope
      Description: Public IP Pool
      AddressFamily: ipv4
      PoolDepth: 0
      AllocationDefault: true

  PrivatePool:
    Type: AWS::EC2::IPAMPool
    Properties:
      IpamId: !Ref MyIPAM
      ScopeId: !Ref PrivateScope
      Description: Private IP Pool
      AddressFamily: ipv4
      PoolDepth: 0
      AllocationDefault: true

  ResourceDiscovery:
    Type: AWS::EC2::IPAMResourceDiscovery
    Properties:
      IpamId: !Ref MyIPAM
      Description: Resource Discovery for IPAM

  DiscoveryAssociation:
    Type: AWS::EC2::IPAMResourceDiscoveryAssociation
    Properties:
      IpamId: !Ref MyIPAM
      ResourceDiscoveryId: !Ref ResourceDiscovery

  PublicView:
    Type: AWS::EC2::IPAMView
    Properties:
      IpamId: !Ref MyIPAM
      Description: Public View
      IsDefault: true

  PrivateView:
    Type: AWS::EC2::IPAMView
    Properties:
      IpamId: !Ref MyIPAM
      Description: Private View
      IsDefault: true

  PublicViewAssociation:
    Type: AWS::EC2::IPAMViewAssociation
    Properties:
      IpamId: !Ref MyIPAM
      IpamScopeId: !Ref PublicScope
      IpamViewId: !Ref PublicView

  PrivateViewAssociation:
    Type: AWS::EC2::IPAMViewAssociation
    Properties:
      IpamId: !Ref MyIPAM
      IpamScopeId: !Ref PrivateScope
      IpamViewId: !Ref PrivateView

Outputs:
  IPAMArn:
    Description: IPAM ARN
    Value: !GetAtt MyIPAM.Arn
  IPAMId:
    Description: IPAM ID
    Value: !Ref MyIPAM
  PublicScopeId:
    Description: Public Scope ID
    Value: !Ref PublicScope
  PrivateScopeId:
    Description: Private Scope ID
    Value: !Ref PrivateScope