AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an ENI with two EIPs and secondary private IPs

Parameters:
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Default: subnet-12345678
  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-12345678

Resources:
  NetworkInterface:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: Primary network interface with EIPs and secondary IPs
      SubnetId: !Ref SubnetId
      PrivateIpAddress: 10.0.0.10
      SecondaryPrivateIpAddresses:
        - 10.0.0.11
        - 10.0.0.12
      GroupSet:
        - !Ref SecurityGroupId
      Tags:
        - Key: Name
          Value: Primary-ENI-with-EIPs

  EIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  EIPAssociation1:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP1.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

  EIPAssociation2:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt EIP2.AllocationId
      NetworkInterfaceId: !Ref NetworkInterface

Outputs:
  NetworkInterfaceId:
    Description: ID of the created network interface
    Value: !Ref NetworkInterface
  EIP1PublicIp:
    Description: Public IP of the first EIP
    Value: !GetAtt EIP1.PublicIp
  EIP2PublicIp:
    Description: Public IP of the second EIP
    Value: !GetAtt EIP2.PublicIp
  SecondaryPrivateIps:
    Description: List of secondary private IP addresses
    Value: !Join [",", !GetAtt NetworkInterface.SecondaryPrivateIpAddresses]