AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create a basic AWS Lambda function with inline Node.js code

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'LambdaExecutionRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  BasicLoggingFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'BasicLoggingFunction-${AWS::StackName}'
      Description: Lambda function that logs event details and returns input value
      Runtime: nodejs20.x
      Handler: index.handler
      MemorySize: 128
      Timeout: 3
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            console.log('Received event:', JSON.stringify(event, null, 2));
            return event;
          };
      PackageType: Zip

Outputs:
  LambdaFunctionArn:
    Description: ARN of the created Lambda function
    Value: !GetAtt BasicLoggingFunction.Arn
    Export:
      Name: BasicLoggingFunctionArn