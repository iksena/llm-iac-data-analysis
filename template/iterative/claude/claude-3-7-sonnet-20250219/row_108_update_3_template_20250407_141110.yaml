AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for a secure AWS Cognito user management system with admin-managed user provisioning'

Parameters:
  UserPoolName:
    Type: String
    Default: 'SecureUserPool'
    Description: 'Name of the Cognito User Pool'

  DomainPrefix:
    Type: String
    Description: 'Prefix for the Cognito domain (must be unique across AWS)'
    AllowedPattern: '^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$'
    ConstraintDescription: 'Domain prefix can only contain lowercase alphanumeric characters and hyphens'

  PasswordMinimumLength:
    Type: Number
    Default: 8
    MinValue: 8
    MaxValue: 99
    Description: 'Minimum length for passwords'

  PasswordRequireUppercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Whether passwords require uppercase characters'

  PasswordRequireLowercase:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Whether passwords require lowercase characters'

  PasswordRequireNumbers:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Whether passwords require numbers'

  PasswordRequireSymbols:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Whether passwords require symbols'

  EmailVerificationMessage:
    Type: String
    Default: 'Your verification code is {####}'
    Description: 'Custom message for email verification'

  EmailVerificationSubject:
    Type: String
    Default: 'Your verification code'
    Description: 'Custom subject for email verification'

  RefreshTokenValidity:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 3650
    Description: 'Refresh token validity in days'
    
  CallbackURL:
    Type: String
    Default: 'https://example.com/callback'
    Description: 'Callback URL for the Cognito User Pool Client'
    
  LogoutURL:
    Type: String
    Default: 'https://example.com/logout'
    Description: 'Logout URL for the Cognito User Pool Client'

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      EmailVerificationMessage: !Ref EmailVerificationMessage
      EmailVerificationSubject: !Ref EmailVerificationSubject
      MfaConfiguration: 'OFF'
      Policies:
        PasswordPolicy:
          MinimumLength: !Ref PasswordMinimumLength
          RequireUppercase: !Ref PasswordRequireUppercase
          RequireLowercase: !Ref PasswordRequireLowercase
          RequireNumbers: !Ref PasswordRequireNumbers
          RequireSymbols: !Ref PasswordRequireSymbols
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
      UsernameAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref DomainPrefix
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-client'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      RefreshTokenValidity: !Ref RefreshTokenValidity
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Ref CallbackURL
      LogoutURLs:
        - !Ref LogoutURL

Outputs:
  UserPoolId:
    Description: 'ID of the Cognito User Pool'
    Value: !Ref CognitoUserPool

  UserPoolClientId:
    Description: 'ID of the Cognito User Pool Client'
    Value: !Ref CognitoUserPoolClient

  UserPoolDomain:
    Description: 'Domain for the Cognito hosted UI'
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com'

  HostedUIURL:
    Description: 'URL for the hosted UI login page'
    Value: !Sub 'https://${DomainPrefix}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${CognitoUserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=${CallbackURL}'