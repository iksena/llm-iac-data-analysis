AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create a standardized IAM baseline with secure, role-based access controls and cross-account trust configurations.

Parameters:
  IdentityManagementAccountId:
    Type: String
    Description: The AWS Account ID for the Identity Management Account.
    AllowedPattern: '^\d{0,12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID or empty.
    Default: ''
  ToolingManagementAccountId:
    Type: String
    Description: The AWS Account ID for the Tooling Management Account.
    AllowedPattern: '^\d{0,12}$'
    ConstraintDescription: Must be a 12-digit AWS account ID or empty.
    Default: ''

Resources:
  PrivilegedAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: PrivilegedAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: '*'
            Resource: '*'
            Condition:
              Bool:
                aws:MultiFactorAuthPresent: 'true'

  RestrictedAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: RestrictedAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ec2:Describe*
              - s3:ListBucket
            Resource: '*'
          - Effect: Deny
            Action:
              - billing:*
              - cloudhsm:*
            Resource: '*'

  IdentityAdminPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: IdentityAdminPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:ListUsers
            Resource: '*'

  PrivilegedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: PrivilegedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !If
                  - HasIdentityManagementAccountId
                  - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                  - !Ref 'AWS::NoValue'
                - !If
                  - HasToolingManagementAccountId
                  - !Sub "arn:aws:iam::${ToolingManagementAccountId}:root"
                  - !Ref 'AWS::NoValue'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref PrivilegedAdminPolicy

  RestrictedAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RestrictedAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !If
                  - HasIdentityManagementAccountId
                  - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                  - !Ref 'AWS::NoValue'
                - !If
                  - HasToolingManagementAccountId
                  - !Sub "arn:aws:iam::${ToolingManagementAccountId}:root"
                  - !Ref 'AWS::NoValue'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref RestrictedAdminPolicy

  IdentityAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: IdentityAdminRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !If
                  - HasIdentityManagementAccountId
                  - !Sub "arn:aws:iam::${IdentityManagementAccountId}:root"
                  - !Ref 'AWS::NoValue'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref IdentityAdminPolicy

  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudFormationExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                Resource: '*'

Conditions:
  HasIdentityManagementAccountId: !Not [!Equals [!Ref IdentityManagementAccountId, ""]]
  HasToolingManagementAccountId: !Not [!Equals [!Ref ToolingManagementAccountId, ""]]

Outputs:
  PrivilegedAdminRoleArn:
    Description: The ARN of the Privileged Admin Role
    Value: !GetAtt PrivilegedAdminRole.Arn

  RestrictedAdminRoleArn:
    Description: The ARN of the Restricted Admin Role
    Value: !GetAtt RestrictedAdminRole.Arn

  IdentityAdminRoleArn:
    Description: The ARN of the Identity Admin Role
    Value: !GetAtt IdentityAdminRole.Arn

  CloudFormationExecutionRoleArn:
    Description: The ARN of the CloudFormation Execution Role
    Value: !GetAtt CloudFormationExecutionRole.Arn