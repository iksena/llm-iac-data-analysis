AWSTemplateFormatVersion: '2010-09-09'
Description: 'Creates an IAM role for AWS Service Catalog to manage S3 and Lambda resources'

Resources:
  ServiceCatalogRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: servicecatalog.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonS3FullAccess'
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Path: '/'
      RoleName: 'ServiceCatalogS3LambdaRole'

  ServiceCatalogCustomPolicy:
    Type: 'AWS::IAM::Policy'
    Properties:
      PolicyName: 'ServiceCatalogS3LambdaCustomPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'servicecatalog:*'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'iam:GetRole'
              - 'iam:CreateRole'
              - 'iam:DeleteRole'
              - 'iam:PutRolePolicy'
              - 'iam:GetRolePolicy'
              - 'iam:DeleteRolePolicy'
              - 'iam:AttachRolePolicy'
              - 'iam:DetachRolePolicy'
              - 'iam:ListAttachedRolePolicies'
              - 'iam:ListRolePolicies'
              - 'iam:PassRole'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'lambda:CreateFunction'
              - 'lambda:DeleteFunction'
              - 'lambda:GetFunction'
              - 'lambda:UpdateFunctionCode'
              - 'lambda:UpdateFunctionConfiguration'
              - 'lambda:InvokeFunction'
              - 'lambda:AddPermission'
              - 'lambda:RemovePermission'
              - 'lambda:ListVersionsByFunction'
              - 'lambda:PublishVersion'
              - 'lambda:GetPolicy'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'cloudformation:CreateStack'
              - 'cloudformation:DeleteStack'
              - 'cloudformation:DescribeStacks'
              - 'cloudformation:UpdateStack'
              - 'cloudformation:GetTemplateSummary'
              - 'cloudformation:ValidateTemplate'
              - 'cloudformation:GetTemplate'
              - 'cloudformation:ListStackResources'
              - 'cloudformation:DescribeStackEvents'
              - 'cloudformation:DescribeStackResource'
            Resource: '*'
          - Effect: Allow
            Action:
              - 'sns:CreateTopic'
              - 'sns:DeleteTopic'
              - 'sns:Subscribe'
              - 'sns:Unsubscribe'
              - 'sns:Publish'
              - 'sns:ListTopics'
              - 'sns:GetTopicAttributes'
              - 'sns:SetTopicAttributes'
            Resource: '*'
      Roles:
        - !Ref ServiceCatalogRole

Outputs:
  ServiceCatalogRoleARN:
    Description: ARN of the Service Catalog IAM Role
    Value: !GetAtt ServiceCatalogRole.Arn