AWSTemplateFormatVersion: '2010-09-09'
Description: Secure Amazon Cognito User Pool with admin-controlled provisioning

Parameters:
  UserPoolName:
    Type: String
    Description: Name for the Cognito User Pool
    Default: AdminManagedUserPool
    MinLength: 1
    MaxLength: 128
    AllowedPattern: '[\w\s+=,.@-]+'

  AutoVerifiedAttributes:
    Type: CommaDelimitedList
    Description: Attributes to automatically verify
    Default: email
    AllowedValues: [email, phone_number]

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes: !Ref AutoVerifiedAttributes
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - AttributeDataType: String
          Name: email
          Required: true
          Mutable: true
      UsernameAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: 'Your verification code is {####}'
        EmailSubject: 'Your verification code'

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${UserPoolName}-AdminClient'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ADMIN_NO_SRP_AUTH
        - USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 60
      IdTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${UserPoolName}-${AWS::AccountId}'
      UserPoolId: !Ref CognitoUserPool