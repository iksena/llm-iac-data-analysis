AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  DBName:
    Type: String
    Default: MyDatabase
  DBUsername:
    Type: String
    Default: admin
  DBPassword:
    Type: String
    NoEcho: true
    Default: admin1234
  VPCName:
    Type: String
    Default: MyVPC
  VPCCIDR:
    Type: String
    Default: 10.0.0.0/16
  Subnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
  Subnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
  DBAllocatedStorage:
    Type: Number
    Default: 100
  DBStorageType:
    Type: String
    Default: io1
  DBStorageIops:
    Type: Number
    Default: 1000
  DBInstanceClass:
    Type: String
    Default: db.r5.large

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Ref VPCName

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref Subnet1CIDR
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs: ""
      MapPublicIpOnLaunch: false

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: !Ref Subnet2CIDR
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs: ""
      MapPublicIpOnLaunch: false

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref MyVPC
      GroupDescription: RDS Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref VPCCIDR

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Ref VPCName
      DBSubnetGroupDescription: Subnets for RDS instance
      SubnetIds:
        - !Ref Subnet1
        - !Ref Subnet2

  MyDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: !Ref DBAllocatedStorage
      DBName: !Ref DBName
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      StorageType: !Ref DBStorageType
      Iops: !Ref DBStorageIops
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      MultiAZ: false
      PubliclyAccessible: false
      DeletionPolicy: Snapshot
      UpdateReplacePolicy: Snapshot

Outputs:
  DBEndpoint:
    Description: Database endpoint
    Value: !GetAtt MyDBInstance.Endpoint.Address
  DBPort:
    Description: Database port
    Value: !GetAtt MyDBInstance.Endpoint.Port