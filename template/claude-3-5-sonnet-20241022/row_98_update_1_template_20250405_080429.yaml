AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for TodoApp Amplify deployment'

Parameters:
  AppName:
    Type: String
    Description: Name of the Amplify application
    Default: TodoApp
  
  BranchName:
    Type: String
    Description: Name of the branch to deploy
    Default: production

Resources:
  AmplifyRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmplifyServiceRole
      RoleName: !Sub ${AppName}-AmplifyRole

  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Ref AppName
      IAMServiceRole: !GetAtt AmplifyRole.Arn
      BuildSpec: |-
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - npm install
            build:
              commands:
                - npm run build
          artifacts:
            baseDirectory: build
            files:
              - '**/*'
          cache:
            paths:
              - node_modules/**/*
      CustomRules:
        - Source: /<*>
          Target: /index.html
          Status: '200'
      EnableBranchAutoDeletion: false
      Platform: WEB

  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: !Ref BranchName
      EnableAutoBuild: true
      Stage: PRODUCTION

Outputs:
  AmplifyAppId:
    Description: Amplify Application ID
    Value: !GetAtt AmplifyApp.AppId

  AmplifyAppARN:
    Description: Amplify Application ARN
    Value: !GetAtt AmplifyApp.Arn

  DefaultDomain:
    Description: Default Amplify Domain
    Value: !Sub ${AmplifyApp.DefaultDomain}

  BranchURL:
    Description: Branch URL
    Value: !Sub https://${BranchName}.${AmplifyApp.DefaultDomain}