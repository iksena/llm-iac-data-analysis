AWSTemplateFormatVersion: '2010-09-09'
Description: VPC with Flow Logging to S3 Bucket

Parameters:
  VpcCidrBlock:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
  FlowLogPrefix:
    Type: String
    Default: vpc-flow-logs/
    Description: Optional prefix for flow log files in S3 bucket

Resources:
  VPCFlowLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  VPCFlowLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref VPCFlowLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: logs.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub 'arn:aws:s3:::${VPCFlowLogBucket}/AWSLogs/${AWS::AccountId}/*'

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: s3
      LogDestination: !Sub 'arn:aws:s3:::${VPCFlowLogBucket}/${FlowLogPrefix}'
      LogFormat: 'version=2'
      MaxAggregationInterval: 600

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
  FlowLogBucketName:
    Description: S3 Bucket Name for Flow Logs
    Value: !Ref VPCFlowLogBucket