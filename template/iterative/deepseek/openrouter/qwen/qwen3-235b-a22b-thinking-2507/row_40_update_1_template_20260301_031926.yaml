AWSTemplateFormatVersion: '2010-09-09'
Description: 'Production-ready SQS FIFO queue template with validation and outputs'
Parameters:
  QueueName:
    Type: String
    Default: 'ApplicationEvents.fifo'
    MinLength: 1
    MaxLength: 80
    AllowedPattern: '.*\.fifo$'
    Description: 'Name for the FIFO queue (must end with .fifo suffix)'
  ContentBasedDeduplication:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: 'Enables content-based deduplication (recommended for most FIFO use cases)'
Resources:
  EventProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref QueueName
      FifoQueue: true
      ContentBasedDeduplication: !Ref ContentBasedDeduplication
Outputs:
  QueueUrl:
    Description: 'URL of the created SQS FIFO queue'
    Value: !Ref EventProcessingQueue
  QueueArn:
    Description: 'ARN of the created SQS FIFO queue'
    Value: !GetAtt EventProcessingQueue.Arn