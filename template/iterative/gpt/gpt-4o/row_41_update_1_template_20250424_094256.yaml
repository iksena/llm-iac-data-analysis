AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CloudFormation Template to create an Amazon SQS Standard Queue.

Resources:
  MySQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: MyStandardQueue

Outputs:
  QueueURL:
    Description: The URL of the created SQS Queue
    Value: !Ref MySQSQueue
  QueueARN:
    Description: The ARN of the created SQS Queue
    Value: !GetAtt MySQSQueue.Arn