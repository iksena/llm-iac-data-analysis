AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to create an SNS topic and subscribe an email address to it.

Resources:
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: MySNSTopic
      TopicName: MySNSTopic

  SnsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: test@test.com
      Protocol: email
      TopicArn: !Ref SnsTopic

Outputs:
  SnsTopicArn:
    Description: The ARN of the SNS Topic
    Value: !Ref SnsTopic