AWSTemplateFormatVersion: '2010-09-09'
Resources:
  CustomEventBus:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CustomEventBus

  ApiConnection:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: ApiConnection
      SecretString: '{"X-API-Key": "{{resolve:secretsmanager:MyApiKeySecret}}"}'

  ApiDestination:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: ApiDestination
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const response = await fetch('https://webhook.site/testtest', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-API-Key': process.env.API_KEY
              },
              body: JSON.stringify(event)
            });
            return response;
          };
      Environment:
        Variables:
          API_KEY: !Sub '{{resolve:secretsmanager:MyApiKeySecret}}'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

Outputs:
  QueueUrl:
    Description: URL of the SQS queue
    Value: !Ref CustomEventBus
  SecretArn:
    Description: ARN of the API connection secret
    Value: !Ref ApiConnection
  FunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt ApiDestination.Arn