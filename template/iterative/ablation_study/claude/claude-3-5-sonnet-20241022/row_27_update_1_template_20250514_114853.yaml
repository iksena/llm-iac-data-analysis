AWSTemplateFormatVersion: '2010-09-09'
Description: 'Real-time data ingestion pipeline using Kinesis Data Stream and Firehose'

Parameters:
  EnvironmentName:
    Type: String
    Default: 'prod'
    Description: Environment name for resource naming
    
  StreamName:
    Type: String
    Description: Name of the Kinesis Data Stream
    
  RetentionHours:
    Type: Number
    Default: 24
    Description: Data retention period in hours for Kinesis Stream
    
  BufferInterval:
    Type: Number
    Default: 300
    Description: Buffer interval in seconds for Firehose
    MinValue: 60
    MaxValue: 900

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-data-lake-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Ref StreamName
      RetentionPeriodHours: !Ref RetentionHours
      StreamModeDetails:
        StreamMode: ON_DEMAND

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                Resource: !GetAtt KinesisStream.Arn

  FirehoseDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn: 
      - DataBucket
      - FirehoseRole
      - KinesisStream
    Properties:
      DeliveryStreamName: !Sub '${EnvironmentName}-delivery-stream'
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt KinesisStream.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataBucket.Arn
        BufferingHints:
          IntervalInSeconds: !Ref BufferInterval
          SizeInMBs: 128
        CompressionFormat: GZIP
        Prefix: 'raw-data/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        ErrorOutputPrefix: 'errors/!{firehose:error-output-type}/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/'
        RoleARN: !GetAtt FirehoseRole.Arn

Outputs:
  KinesisStreamArn:
    Description: ARN of the Kinesis Data Stream
    Value: !GetAtt KinesisStream.Arn

  FirehoseArn:
    Description: ARN of the Kinesis Firehose
    Value: !GetAtt FirehoseDeliveryStream.Arn

  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref DataBucket