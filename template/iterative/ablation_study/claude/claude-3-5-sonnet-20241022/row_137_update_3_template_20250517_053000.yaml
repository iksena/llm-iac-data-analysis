AWSTemplateFormatVersion: '2010-09-09'
Description: 'Pet Shop GraphQL API with Lambda backend'

Resources:
  PetShopAPI:
    Type: 'AWS::AppSync::GraphQLApi'
    Properties:
      Name: 'PetShopAPI'
      AuthenticationType: 'API_KEY'
      XrayEnabled: false

  PetShopAPIKey:
    Type: 'AWS::AppSync::ApiKey'
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Description: 'Default API Key for PetShopAPI'
      Expires: 1893456000

  PetShopSchema:
    Type: 'AWS::AppSync::GraphQLSchema'
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Definition: |
        type Pet {
          id: ID!
          name: String!
          type: String!
        }
        type Query {
          getPets: [Pet]
        }
        schema {
          query: Query
        }

  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'lambda.amazonaws.com'
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'

  PetLambdaFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-pet-function'
      Handler: 'index.handler'
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const pets = [
              { id: '1', name: 'Max', type: 'Dog' },
              { id: '2', name: 'Luna', type: 'Cat' },
              { id: '3', name: 'Buddy', type: 'Hamster' }
            ];
            return pets;
          };
      Runtime: 'nodejs18.x'
      Timeout: 29
      MemorySize: 128

  AppSyncServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'appsync.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'AppSyncLambdaInvocation'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action:
                  - 'lambda:InvokeFunction'
                Resource: !GetAtt PetLambdaFunction.Arn

  PetLambdaDataSource:
    Type: 'AWS::AppSync::DataSource'
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      Name: 'PetLambdaDataSource'
      Type: 'AWS_LAMBDA'
      ServiceRoleArn: !GetAtt AppSyncServiceRole.Arn
      LambdaConfig:
        LambdaFunctionArn: !GetAtt PetLambdaFunction.Arn

  GetPetsResolver:
    Type: 'AWS::AppSync::Resolver'
    Properties:
      ApiId: !GetAtt PetShopAPI.ApiId
      TypeName: 'Query'
      FieldName: 'getPets'
      DataSourceName: !GetAtt PetLambdaDataSource.Name
      RequestMappingTemplate: |
        {
          "version": "2018-05-29",
          "operation": "Invoke",
          "payload": {}
        }
      ResponseMappingTemplate: '$util.toJson($ctx.result)'

Outputs:
  GraphQLApiEndpoint:
    Description: 'GraphQL API Endpoint URL'
    Value: !GetAtt PetShopAPI.GraphQLUrl

  GraphQLApiId:
    Description: 'GraphQL API ID'
    Value: !GetAtt PetShopAPI.ApiId

  GraphQLApiKey:
    Description: 'GraphQL API Key'
    Value: !GetAtt PetShopAPIKey.ApiKey
    Sensitive: true