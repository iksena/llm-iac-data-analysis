AWSTemplateFormatVersion: '2010-09-09'
Description: Web Application Environment with EC2, S3, DynamoDB, and IAM Role

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access
    Default: default-key

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: WebAppVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: WebAppIGW

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: PublicSubnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: PublicRouteTable

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: webapp-static-assets
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: StaticAssetsBucket

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:${AWS::Partition}:s3:::${S3Bucket}/*'

  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AWS-Services
      KeySchema:
        - AttributeName: PartitionKey
          KeyType: HASH
        - AttributeName: SortKey
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PartitionKey
          AttributeType: S
        - AttributeName: SortKey
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Name
          Value: AWS-ServicesTable

  IAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
      Path: /
      Tags:
        - Key: Name
          Value: EC2InstanceRole

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref IAMRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd php php-cli php-common php-mbstring php-xml php-zip php-json php-mysqlnd php-pdo php-gd php-curl php-intl php-mcrypt php-pear php-devel php-pecl-apcu php-pecl-apcu-bc php-pecl-apcu-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-apcu-bc-devel php-pecl-ap