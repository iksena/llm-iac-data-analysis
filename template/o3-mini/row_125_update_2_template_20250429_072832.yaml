AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Production ready CloudFormation template that provisions a secure REST API Gateway integrated
  with Amazon SES for sending templated emails. It includes request validation, API key enforcement,
  throttling, quota configuration, and an explicit stage for deployment.

Resources:
  EmailApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: EmailAPI

  SendResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt EmailApi.RootResourceId
      PathPart: send
      RestApiId: !Ref EmailApi

  ApiRequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: BodyValidator
      RestApiId: !Ref EmailApi
      ValidateRequestBody: true
      ValidateRequestParameters: false

  EmailModel:
    Type: AWS::ApiGateway::Model
    Properties:
      RestApiId: !Ref EmailApi
      Name: EmailModel
      ContentType: "application/json"
      Schema:
        type: object
        required:
          - to
          - from
          - subject
        properties:
          to:
            type: string
            format: email
          from:
            type: string
            format: email
          subject:
            type: string
          html:
            type: string
          text:
            type: string

  ApiGatewayToSESRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendEmailPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                Resource: "*"

  SendEmailMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref EmailApi
      ResourceId: !Ref SendResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestValidatorId: !Ref ApiRequestValidator
      RequestModels:
        application/json: !Ref EmailModel
      Integration:
        Type: AWS
        IntegrationHttpMethod: POST
        Credentials: !GetAtt ApiGatewayToSESRole.Arn
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:ses:action/SendEmail"
        RequestTemplates:
          application/json: |
            #set($inputRoot = $input.path('$'))
            Action=SendEmail&
            Source=$util.urlEncode($inputRoot.from)&
            Destination.ToAddresses.member.1=$util.urlEncode($inputRoot.to)&
            Message.Subject.Data=$util.urlEncode($inputRoot.subject)
            #if($inputRoot.html)
            &Message.Body.Html.Data=$util.urlEncode($inputRoot.html)
            #end
            #if($inputRoot.text)
            &Message.Body.Text.Data=$util.urlEncode($inputRoot.text)
            #end
        IntegrationResponses:
          - StatusCode: 200
            ResponseTemplates:
              application/json: "{}"
      MethodResponses:
        - StatusCode: 200

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - SendEmailMethod
    Properties:
      RestApiId: !Ref EmailApi
      Description: "Deployment of Email API"

  ProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: Prod
      RestApiId: !Ref EmailApi
      DeploymentId: !Ref ApiDeployment
      MethodSettings:
        - DataTraceEnabled: false
          HttpMethod: "*"
          LoggingLevel: INFO
          ResourcePath: "/*"

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: EmailApiKey
      Enabled: true
      StageKeys:
        - RestApiId: !Ref EmailApi
          StageName: Prod

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: EmailUsagePlan
      ApiStages:
        - ApiId: !Ref EmailApi
          Stage: Prod
      Throttle:
        BurstLimit: 500
        RateLimit: 500
      Quota:
        Limit: 10000
        Period: MONTH

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  RestApiId:
    Description: The ID of the API Gateway REST API.
    Value: !Ref EmailApi
  ApiEndpoint:
    Description: The URL of the deployed API endpoint.
    Value: !Sub "https://${EmailApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/send"