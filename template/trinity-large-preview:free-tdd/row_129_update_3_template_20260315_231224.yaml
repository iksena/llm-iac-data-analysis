AWSTemplateFormatVersion: '2010-09-09'
Description: Secure AWS Config Setup with Retention Management

Parameters:
  RetentionPeriod:
    Type: Number
    Default: 2557
    Description: Retention period in days (default: 2557 days)
  DeliveryFrequency:
    Type: String
    Default: TwentyFour_Hours
    AllowedValues:
      - One_Hour
      - Three_Hours
      - Six_Hours
      - Twelve_Hours
      - TwentyFour_Hours
    Description: Delivery frequency for configuration snapshots

Resources:
  ConfigS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      AccessControl: Private

  ConfigSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: AWSConfigNotifications

  ConfigRecorderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - config.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSConfigRole

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: ConfigRecorder
      RecordingGroup:
        AllSupported: true
        IncludeGlobalResourceTypes: true
      RoleARN: !GetAtt ConfigRecorderRole.Arn

  ConfigDeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    Properties:
      Name: ConfigDeliveryChannel
      ConfigSnapshotDeliveryProperties:
        DeliveryFrequency: !Ref DeliveryFrequency
      S3BucketName: !Ref ConfigS3Bucket
      SnsTopicARN: !Ref ConfigSNSTopic

  RetentionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  RetentionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Role: !GetAtt RetentionLambdaRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  config = boto3.client('config')
                  if event['RequestType'] == 'Create' or event['RequestType'] == 'Update':
                      retention_period = event['ResourceProperties'].get('RetentionPeriod', 2557)
                      config.put_configuration_recorder(
                          ConfigurationRecorderName='ConfigRecorder',
                          RecordingGroup={
                              'allSupported': True,
                              'includeGlobalResourceTypes': True
                          }
                      )
                      config.put_delivery_channel(
                          DeliveryChannelName='ConfigDeliveryChannel',
                          S3BucketName=event['ResourceProperties'].get('S3BucketName', ''),
                          SnsTopicARN=event['ResourceProperties'].get('SnsTopicARN', ''),
                          ConfigSnapshotDeliveryProperties={
                              'deliveryFrequency': event['ResourceProperties'].get('DeliveryFrequency', 'TwentyFour_Hours')
                          }
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  RetentionCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt RetentionLambdaFunction.Arn
      RetentionPeriod: !Ref RetentionPeriod
      S3BucketName: !Ref ConfigS3Bucket
      SnsTopicARN: !Ref ConfigSNSTopic
      DeliveryFrequency: !Ref DeliveryFrequency

Outputs:
  ConfigS3BucketName:
    Description: S3 Bucket for AWS Config snapshots
    Value: !Ref ConfigS3Bucket
  ConfigSNSTopicARN:
    Description: SNS Topic for AWS Config notifications
    Value: !Ref ConfigSNSTopic