AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template to create an Amazon EFS file system along with an associated mount target.
  This template provisions a dedicated VPC, a public subnet in us-east-1a, and a security group, while configuring
  the EFS file system for a testing environment with shared storage.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: EFS-Testing-VPC

  EfsSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs:
              Ref: AWS::Region
      Tags:
        - Key: Name
          Value: EFS-Testing-Subnet

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EFS Mount Target in Testing environment.
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: EFS-Testing-SG

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      LifecyclePolicies:
        - TransitionToIA: AFTER_14_DAYS
      FileSystemTags:
        - Key: Name
          Value: EFS-Testing
        - Key: Environment
          Value: Testing
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref EfsSubnet
      SecurityGroups:
        - !Ref EfsSecurityGroup

Outputs:
  VPCId:
    Description: The ID of the created VPC.
    Value: !Ref VPC
  SubnetId:
    Description: The ID of the subnet created for the EFS mount target.
    Value: !Ref EfsSubnet
  SecurityGroupId:
    Description: The ID of the security group for the EFS mount target.
    Value: !Ref EfsSecurityGroup
  FileSystemId:
    Description: The ID of the created Amazon EFS file system.
    Value: !Ref EfsFileSystem
  MountTargetId:
    Description: The ID of the created EFS mount target.
    Value: !Ref EfsMountTarget