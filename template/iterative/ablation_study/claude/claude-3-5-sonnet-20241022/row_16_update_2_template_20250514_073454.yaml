AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation template for creating Glue resources to catalog CloudTrail logs'

Parameters:
  S3BucketName:
    Type: String
    Default: 'kk-admin'
    Description: 'Name of the S3 bucket containing CloudTrail logs'

  S3Prefix:
    Type: String
    Default: 'cloud-trail/AWSLogs/'
    Description: 'S3 prefix path to CloudTrail logs'

  DatabaseName:
    Type: String
    Default: 'cloudtrail_logs'
    Description: 'Name of the Glue database to be created'
    AllowedPattern: '[a-z0-9_]*'
    ConstraintDescription: 'Must contain only lowercase letters, numbers, and underscores'

  CrawlerName:
    Type: String
    Default: 'cloudtrail-logs-crawler'
    Description: 'Name of the Glue crawler'
    AllowedPattern: '[a-zA-Z0-9-_]*'
    ConstraintDescription: 'Must contain only letters, numbers, hyphens, and underscores'

  TablePrefix:
    Type: String
    Default: 'cloudtrail_'
    Description: 'Prefix for tables created by the crawler'

Resources:
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Ref DatabaseName
        Description: 'Database for CloudTrail logs analysis'

  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Path: /service-role/

  GlueCrawlerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: GlueCrawlerS3Access
      Roles:
        - !Ref GlueCrawlerRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub arn:aws:s3:::${S3BucketName}
              - !Sub arn:aws:s3:::${S3BucketName}/*
          - Effect: Allow
            Action:
              - cloudtrail:Get*
              - cloudtrail:Describe*
              - cloudtrail:List*
            Resource: '*'

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Ref CrawlerName
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref DatabaseName
      Description: 'Crawler for CloudTrail logs analysis'
      Targets:
        S3Targets:
          - Path: !Sub s3://${S3BucketName}/${S3Prefix}
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG
      Configuration: "{\"Version\":1.0,\"CrawlerOutput\":{\"Tables\":{\"AddOrUpdateBehavior\":\"MergeNewColumns\",\"TableThreshold\":1},\"Partitions\":{\"AddOrUpdateBehavior\":\"InheritFromTable\"}}}"
      TablePrefix: !Ref TablePrefix

Outputs:
  DatabaseName:
    Description: 'Name of the created Glue database'
    Value: !Ref DatabaseName

  CrawlerName:
    Description: 'Name of the created Glue crawler'
    Value: !Ref CrawlerName

  CrawlerArn:
    Description: 'ARN of the created Glue crawler'
    Value: !Ref GlueCrawler